body:
  text: 劉裕篡晉晉安帝隆安三年𥘉彭城劉裕生而母死父翹僑居京口家貧將棄之同郡劉懷敬之母𥙿之從母也生懷敬未朞走往救之斷懷敬乳而乳之及長勇健有大志僅識文字以賣履為業好樗蒲為鄉閭所賤劉牢之擊孫恩引𥙿參軍事恩事見盧劉𥙿擊孫亂循之元興三年桓玄之亂劉𥙿入朝玄謂其司徒王謐曰裕風骨不常蓋人傑也玄后劉氏有智鑒謂玄曰劉𥙿龍行虎步視瞻不凡恐終不為人下不如早除之玄曰我方平蕩中原非𥙿莫可用者俟關河平定然後别議耳劉𥙿與何無忌密謀興復劉邁弟毅亦與無忌謀討玄於是相與合謀起兵劉𥙿克京口玄懼浮江南走𥙿入建康王謐推𥙿為使持節都督楊徐兖豫青冀幽并八州諸軍事徐州刺史玄至尋陽逼帝西上劉毅等追之玄挾帝至江陵毅等自尋陽西至與玄遇玄衆大潰挾帝西走馮遷擊斬之乘輿返正於江陵桓振襲陷江陵義熙元年春正月劉毅等擊破桓振軍迎帝於江陵何無忌奉帝東還三月帝至建康以劉𥙿為侍中車騎將軍都督中外諸軍事𥙿固讓不受屢請歸藩詔百僚敦勸帝幸其第𥙿復詣闕陳請乃聽歸藩楚之亂並見僞夏四月劉𥙿旋鎮京口改授都督荆司等十六州諸軍事加領兖州刺史六月劉𥙿遣使求和於秦且求南鄉等諸郡秦王興許之羣臣咸以為不可興曰天下之善一也劉𥙿拔起細微能討誅桓玄興復晉室內釐庶政外修封疆吾何惜數郡不以成其美乎遂割南鄉順陽新野舞隂等十二郡歸于晉二年冬十月尚書論建義功奏封劉𥙿豫章郡公四年春正月劉毅等不欲劉𥙿入輔政議以中領軍謝混為楊州刺史或欲令𥙿於丹徒領楊州以內事付孟昶遣尚書右丞皮沈以二議咨𥙿沈先見𥙿記室録事參軍劉穆之具道朝議穆之僞起如厠密疏白𥙿曰皮沈之言不可從𥙿既見沈且令出外呼穆之問之穆之曰晉朝失政日久天命已移公興復皇祚勳髙位重今日形勢豈得居謙遂為守藩之將耶劉孟諸公與公俱起布衣共立大義以取富貴事有前後故一時相推非為委體心服宿定臣主之分也力敵勢均終相吞噬楊州根本所係不可假人前者以授王謐事出權道今若復以他授便應受制於人一失權柄無由可得將來之危難可熟念今朝議如此宜相酬答必云在我措辭又難唯應云神州治本宰輔崇要此事既大非可懸論便暫入朝共盡同異公至京邑彼必不敢越公更授餘人明矣𥙿從之朝廷乃徴𥙿為侍中車騎將軍開府儀同三司楊州刺史録尚書事徐兖二州刺史如故𥙿表解兖州以諸葛長民為青州刺史鎮丹徒劉道憐為并州刺史戍石頭五年春二月劉𥙿伐南燕平南燕事見劉𥙿𥘉符氏之敗也王猛之孫鎮惡來奔以為臨澧令鎮惡有謀略善果斷喜論軍國大事或薦鎮惡於劉𥙿𥙿與語說之因留宿明旦謂參佐曰吾聞將門有將鎮惡信然即以為中軍參軍秋九月加劉𥙿太尉𥙿固辭六年六月以劉𥙿為太尉中書監加黃鉞𥙿受黃鉞餘固辭司馬國璠及弟叔璠叔道奔秦秦王興曰劉𥙿方誅桓玄輔晉室卿何為來對曰𥙿削弱王室臣宗族有自修立𥙿輒除之方為國患甚於桓玄耳七年春正月己未劉𥙿還建康三月劉𥙿始受太尉中書監八年夏四月以後將軍豫州刺史劉毅為衛將軍都督荆寧秦雍四州諸軍事荆州刺史毅謂左衛將軍劉敬宣曰吾忝西任欲屈卿為長史南蠻豈有見輔意乎敬宣懼以告太尉𥙿𥙿笑曰但令老兄平安必無過慮毅性剛愎自謂建義之功與𥙿相埒深自矜伐雖權事推𥙿而心不服及居方嶽常怏怏不得志𥙿每柔而順之毅驕縱滋甚嘗云恨不遇劉項與之爭中原及敗於桑落知物情去已彌復憤激𥙿素不學而毅頗涉文雅故朝士有清望者多歸之與尚書僕射謝混丹楊尹郗僧施深相慿結僧施超之從子也毅既據上流隂有圖𥙿之志求兼督交廣二州𥙿許之毅又奏以郗僧施為南蠻校尉後軍司馬毛修之為南郡太守𥙿亦許之以劉穆之代僧施為丹楊尹毅表求至京口辭墓𥙿往㑹之於倪塘寧逺將軍胡藩言於𥙿曰公謂劉衛軍終能為公下乎𥙿默然久之曰卿謂何如藩曰連百萬之衆攻必取戰必克毅固以此服公至於涉獵傳記一談一詠自許以為雄豪以是搢紳白靣之士輻湊歸之恐終不為公下不如因㑹取之𥙿曰吾與毅俱有克復之功其過未彰不可自相圖也秋九月劉毅至江陵多變易守宰輒割豫州文武江州兵力萬餘人以自隨㑹毅疾篤郗僧施等恐毅死其黨危乃勸毅請從弟兖州刺史藩以自副太尉𥙿僞許之藩自廣陵入朝己卯𥙿以詔書罪狀毅云與藩及謝混共謀不軌收藩及混賜死庚辰詔大赦以前㑹稽內史司馬休之為都督荆雍梁秦寧益六州諸軍事荆州刺史北徐州刺史劉道憐為兖青二州刺史鎮京口使豫州刺史諸葛長民監太尉留府事𥙿疑長民難獨任乃加劉穆之建武將軍置佐史配給資力以防之壬午𥙿帥諸軍發建康參軍王鎮惡請給百舸為前驅丙申至姑孰以鎮惡為振武將軍與龍驤將軍蒯恩將百舸前發𥙿戒之曰若賊可擊擊之不可者燒其船艦留屯水際以待我於是鎮惡晝夜兼行揚聲言劉兖州至冬十月己未鎮惡至豫章口去江陵城二十里捨船步上蒯恩軍居前鎮惡次之舸留一二人對舸岸上立六七旗旗下置鼓語所留人計我將至城便鼓嚴令若後有大軍狀又分遣人燒江津船艦鎮惡徑前襲城語前軍士有問者但云劉兖州至津戍及民間皆晏然不疑未至城五六里逢毅要將朱顯之欲出江津問劉兖州何在軍士曰在後顯之至軍後不見藩而見軍人擔彭排戰具望江津船艦已𬒳燒鼓嚴之聲甚盛知非藩上便躍馬馳去告毅行令閉諸城門鎮惡亦馳進門未及下關軍人因得入城衛軍長史謝純入參承毅出聞兵至左右欲引車歸純叱之曰我人吏也逃將安之馳還入府純安兄據之孫也鎮惡與城內兵鬪且攻其金城自食時至中晡城內人敗散鎮惡穴其金城而入遣人以詔及赦文并𥙿手書示毅毅皆燒不視與司馬毛修之等督士卒力戰城內人猶未信𥙿自來軍士從毅自東來者與臺軍多中表親戚且鬪且語知𥙿自來人情離駭逮夜聽事前兵皆散斬毅勇將趙蔡毅左右兵猶閉東西閣拒戰鎮惡慮暗中自相傷犯乃引軍出圍金城開其南靣毅慮南有伏兵夜半帥左右三百許人開北門突出毛修之謂謝純曰君但隨僕去純不從為人所殺毅夜投牛牧佛寺𥘉桓蔚之敗也走投牛牧寺僧昌昌保藏之毅殺昌至是寺僧拒之曰昔亡師容桓蔚為劉衛軍所殺今實不敢容異人毅歎曰為法自弊一至於此遂縊而死明日居人以告乃斬首於市井子姪皆伏誅毅兄模奔襄陽魯宗之斬送之𥘉毅季父鎮之間居京口不應辟召常謂毅及藩曰汝輩才器足以得志但恐不久耳我不就爾求財位亦不同爾受罪纍每見毅藩導從到門輒詬之毅甚敬畏未至宅數百步悉屏儀衛與白衣數人俱進及毅死太尉𥙿奏徴鎮之為散騎常侍光祿大夫固辭不至冬十一月己卯太尉𥙿至江陵殺郗僧施初毛修之雖為劉毅僚佐素自結於𥙿故𥙿特宥之賜王鎮惡爵漢壽子𥙿問毅府咨議參軍申永曰今日何施而可永曰除其宿釁倍其惠澤貫叙門次顯擢才能如此而已𥙿納之下書寬租省調節役原刑禮辟名士荆人恱之諸葛長民驕縱貪侈所為多不法為百姓患常懼太尉𥙿按之及劉毅𬒳誅長民謂所親曰昔年醢彭越今年殺韓信禍其至矣乃屏人問劉穆之曰悠悠之言皆云太尉與我不平何以至此穆之曰公泝流逺征以老母稚子委節下若一豪不盡豈容如此邪長民意乃小安長民弟輔國大將軍黎民說長民曰劉氏之亡亦諸葛氏之懼也宜因𥙿未還而圖之長民猶豫未發既而歎曰貧賤常思富貴富貴必履危機今日欲為丹徒布衣豈可得邪因遺冀州刺史劉敬宣書曰盤龍狼戾專恣自取夷滅異端將盡丗路方夷富貴之事相與共之敬宣報曰下官自義熙以來忝三州七郡常懼福過災生思避盈居損富貴之㫖非所敢當且使以書呈𥙿𥙿曰阿壽故為不負我也𥙿在江陵輔國將軍王誕白𥙿求先下𥙿曰諸葛長民似有自疑心卿詎宜便去誕曰長民知我蒙公垂眄今輕身單下必當以為無虞乃可以少安其意耳𥙿笑曰卿勇過賁育矣乃聽先還冬十二月加太尉𥙿太傅楊州牧九年春二月太尉𥙿自江陵東還駱驛遣輜重兼行而下前刻至日每淹留不進諸葛長民與公卿頻日奉候於新亭輒差其期乙丑晦𥙿輕舟徑進潜入東府三月丙寅朔旦長民聞之驚趨至門𥙿伏壯士丁旿於幔中引長民却人間語凡平生所不盡者皆及之長民甚恱丁旿自幔後出於座拉殺之輿尸付廷尉收其弟黎民黎民素驍勇格鬪而死并殺其季弟大司馬參軍幼民從弟寧朔將軍秀之三月戊寅加𥙿豫州剌史𥙿固讓太傅州牧秋九月再命太尉𥙿為太傅楊州牧固辭十年司馬休之在江陵頗得江漢民心子譙王文思在建康性凶㬥好通輕俠太尉𥙿惡之三月有司奏文思擅捶殺國吏詔誅其黨而宥文思休之上疏謝罪請解所任不許𥙿執文思送休之令自訓厲意欲休之殺之休之但表廢文思并與𥙿書陳謝𥙿由是不以恱江州剌史孟懷玉兼督豫州六郡以僃之十一年春正月太尉𥙿收司馬休之次子文寶兄子文祖竝賜死發兵擊之詔加𥙿黃鉞領荆州剌史庚午大赦辛巳太尉𥙿發建康以中軍將軍劉道憐監留府事劉穆之兼右僕射事無大小皆决於穆之又以髙陽內史劉鍾領石頭戍事屯冶亭休之府司馬張𥙿南平太守檀範之聞之皆逃歸建康𥙿邵之兄也雍州刺史魯宗之自疑不為太尉𥙿所容與其子竟陵太守軌起兵應休之二月休之上表罪狀𥙿勒兵拒之𥙿密書招休之府録事參軍南陽韓延之廷之復書曰承親帥戎馬逺履西畿闔境士庶莫不惶駭辱疏知以譙王前事良增歎息司馬平西體國忠貞𣢾懷待物以公有匡復之勳家國蒙賴推德委誠每事詢仰譙王往以微事見劾猶自表遜位况以大過而當默然邪前以表奏廢之所不盡者命耳推寄相與正當如此而遽興兵甲所謂欲加之罪其無辭乎劉𥙿足下海內之人誰不見足下此心而復欲欺誑國士來示云處懷期物自有由來今伐人之君啖人以利真可謂處懷期物自有由來者乎劉藩死於閶闔之門諸葛斃於左右之手甘言詫方伯襲之以輕兵遂使席上靡𣢾懷之士閫外無自信諸矦以是為得算良可恥也貴府將佐及朝廷賢德寄命過日吾誠鄙劣嘗聞道於君子以西平之至德寧可無授命之臣乎必未能自投虎口比迹郗僧施之徒明矣假令天長喪亂九流渾濁當與臧洪遊於地下不復多言𥙿視書歎息以示將佐曰事人當如此矣延之以𥙿父名翹字顯宗乃更其字曰顯宗名其子曰翹以示不臣劉氏太尉𥙿使參軍檀道濟朱超石將步騎出襄陽超石齡石之弟也江夏太守劉䖍之將兵屯三連立橋聚糧以待道濟等積日不至魯軌襲擊䖍之殺之𥙿使其壻振威將軍東海徐逵之統參軍蒯恩王允之沈淵子為前鋒出江夏口逵之等與魯軌戰于破冡兵敗逵之允之淵子皆死獨蒯恩勒兵不動軌乘勝力攻之不能克乃退淵子林子之兄也𥙿軍於馬頭聞逵之死怒甚三月壬午帥諸將濟江魯軌司馬文思將休之兵四萬臨峭岸置陳軍士無能登者𥙿自被甲欲登諸將諌不從怒愈甚太尉主簿謝晦前抱持𥙿𥙿抽劒指晦曰我斬卿晦曰天下可無晦不可無公建武將軍胡藩領遊兵在江津𥙿呼藩使登藩有疑色𥙿命左右録來欲斬之藩顧曰正欲擊賊不得奉教乃以刀頭穿岸劣容足指騰之而上隨之者稍多既登岸直前力戰休之兵不能當稍引却𥙿兵因而乘之休之兵大潰遂克江陵休之宗之俱北走軌留石城𥙿命閬中侯下邳趙倫之太尉參軍沈林子攻之遣武陵內史王鎮惡以舟師追休之等青冀二州剌史劉敬宣參軍司馬道賜宗室之疏屬也聞太尉𥙿攻司馬休之道賜與同府辟閭道秀左右小將王猛子謀殺敬宣據廣固以應休之乙卯敬宣召道秀屏人語左右悉出戶猛子逡巡在後取敬宣僃身刀殺敬宣文武佐吏即時討道賜等皆斬之夏五月趙倫之沈林子破魯軌於石城司馬休之魯宗之救之不及遂與軌奔襄陽宗之參軍李應之閉門不納甲午休之宗之軌及譙王文思新蔡王道賜梁州剌史馬敬南陽太守魯範俱奔秦宗之素得士民心爭為之衛送出境王鎮惡等追之盡境而還𥘉休之等求救於秦魏秦征虜將軍姚成王及司馬國璠引兵至南陽魏長孫嵩至河東聞休之等敗皆引還休之至長安秦王興以為楊州剌史使侵擾襄陽侍御史唐盛言於興曰据符䜟之文司馬氏當復得河洛今使休之擅兵於外猶縱魚於淵也不如以髙爵厚禮留之京師興曰昔文王卒免羑里髙祖不斃鴻門苟天命所在誰能違之脫如符䜟之言留之適足為害遂遣之詔加太尉𥙿太傅楊州牧劒履上殿入朝不趨贊拜不名秋八月甲子太尉𥙿還建康固辭太傅州牧其餘受命十二年春正月加太尉𥙿兖州剌史都督南秦州凡都督二十二州三月加太尉𥙿中外大都督𥙿戒嚴將伐秦加𥙿領司豫二州剌史夏五月癸巳加太尉領北雍州剌史秋八月太尉𥙿以丗子義符為中軍將軍監太尉留府事劉穆之為左僕射領監軍中軍二府軍司入居東府揔攝內外丁巳發建康冬十一月太尉𥙿遣左長史王弘還建康諷朝廷求九錫時劉穆之掌留任而㫖從北來穆之由是愧懼發病弘珣之子也十二月壬申詔以𥙿為相國揔百揆楊州牧封十郡為宋公僃九錫之禮位在諸侯上領征西將軍司豫北徐雍四州剌史如故𥙿辭不受十三年春正月太尉𥙿引水軍發彭城三月太尉𥙿將水軍自淮泗入清河將泝河西上先遣使假道于魏魏人以數千騎隨𥙿軍西行𥙿遣兵擊之魏軍奔潰秋八月太尉𥙿至潼關王鎮惡大破秦兵於渭橋姚泓將妻子羣臣詣鎮惡降九月𥙿至長安以秦金玉繒帛頒賜將士送姚泓至建康斬之滅後秦事見劉𥙿癸酉司馬休之司馬文思司馬國璠司馬道賜魯軌韓延之等皆降於魏司馬休之尋卒魏賜國璠爵淮南公道賜爵池陽子魯軌爵襄陽公冬十月詔進宋公爵為王增封十郡辭不受十一月辛未穆之卒太尉𥙿以根本無托決意東還十二月太尉𥙿發長安十四年春正月太尉𥙿至彭城解嚴夏六月太尉𥙿始受相國九錫之命赦國中殊死以下崇繼母蘭陵蕭氏為太妃以太尉軍咨祭酒孔靖為宋國尚書令左長史王弘為僕射領選從事中郎傅亮蔡廓皆為侍中謝晦為右衛將軍右長史鄭鮮之為奉常行參軍殷景仁為祕書郎其餘百官悉依天朝之制靖辭不受亮咸之孫廓謨之曽孫鮮之渾之玄孫景仁融之曾孫也景仁學不為文敏有思致口不談義深逹理體至於國典朝儀舊章記注莫不撰録識者知其有當丗之志冬十二月彗星出天津入太微經北斗絡紫微八十餘日而滅魏主嗣復召諸儒術士問之曰今四海分裂災咎之應果在何國朕甚畏之卿輩盡言勿有所隱衆推崔浩使對浩曰夫災異之興皆象人事人苟無舋又何畏焉昔王莽將篡漢彗星出入正與今同國家主尊臣卑民無異望晉室陵夷危亡不逺彗之為異其劉𥙿將篡之應乎無以易其言宋公𥙿以䜟云昌明之後尚有二帝乃使中書侍郎王韶之與帝左右密謀鴆帝而立琅邪王德文德文常在帝左右飲食寢處未嘗暫離韶之伺之經時不得間㑹德文有疾出居於外戊寅韶之以散衣縊帝於東堂韶之廙之曾孫也𥙿因稱遺詔奉德文即皇帝位大赦恭帝元熙元年春正月甲午徴宋公𥙿入朝進爵為王𥙿辭𥘉司馬楚之奉其父榮期之喪歸建康㑹宋公𥙿誅翦宗室之有才望者楚之叔父宣期兄貞之皆死楚之亡匿竟陵蠻中及從祖休之自江陵奔秦楚之亡之汝穎間聚衆以謀復讎楚之少有英氣能折節下士有衆萬餘屯據長社𥙿使剌客沐謙往剌之楚之待謙甚厚謙欲發未得間乃夜稱疾知楚之必往問疾因欲剌之楚之果自齎湯藥往視之情意勤篤謙不忍發乃出匕首於席下以狀告之曰將軍深為劉𥙿所忌願勿輕率以自保全遂委身事之為之防衛時宗室多逃亡在河南有司馬文榮者帥乞活千餘户屯金墉城南又有司馬道恭自東垣帥三千人屯城西司馬順明帥五千人屯陵雲臺司馬楚之屯柏谷塢皆降於魏秋七月宋公𥙿始受進爵之命八月移鎮壽陽以度支尚書劉懷愼為督淮北諸軍事徐州剌史鎮彭城九月宋王𥙿自解楊州牧冬十二月辛卯宋王𥙿加殊禮進王太妃為太后丗子為太子宋髙祖永𥘉元年春正月宋王欲受禪而難於發言乃集朝臣宴飲從容言曰桓玄篡位鼎命已移我首唱大義興復帝室南征北伐平定四海功成業著遂荷九錫今年將衰暮崇極如此物忌盛滿非可久安今欲奉還爵位歸老京師羣臣惟盛稱功德莫諭其意日晚坐散中書令傅亮還外乃悟而宫門已閉亮叩扉請見王即開門見之亮入但曰臣暫宜還都王解其意無復他言直云須幾人自送亮曰數十人可也即時奉辭亮出已夜見長星竟天拊髀歎曰我常不信天文今始驗矣亮至建康夏四月徴王入朝王留子義康為都督豫司雍并四州諸軍事豫州剌史鎮夀陽義康尚幼以相國參軍南陽劉湛為長史決府州事湛自弱年即有宰物之情常自比管葛博涉書史不為文章不喜談議王甚重之夏六月壬戌王至建康傅亮諷晉恭帝禪位於宋具詔草呈帝使書之帝欣然操筆謂左右曰桓玄之時晉氏已無天下重為劉公所延將二十載今日之事本所甘心遂書赤紙為詔甲子帝遜于琅邪第百官拜辭祕書監徐廣流涕哀慟丁卯王為壇於南郊即皇帝位禮畢自石頭僃法駕入建康宫徐廣又悲感流涕侍中謝晦謂之曰徐公得無少過廣曰君為宋朝佐命身是晉室遺老悲歡之事固不可同廣邈之弟也帝臨太極殿大赦改元其犯鄉論清議一皆蕩滌與之更始裴子野論曰昔重華受終四凶流放武王克殷頑民遷洛天下之惡一也鄉論清議除之過矣奉晉恭帝為零陵王優崇之禮皆倣晉𥘉故事即宫于故秣陵縣使冠軍將軍劉遵考將兵防衛降禇后為王妃追尊皇考為孝穆皇帝皇妣趙氏為孝穆皇后尊王太后蕭氏為皇太后上事蕭太后素謹及即位春秋已髙每旦入朝太后未嘗失時刻詔晉氏封爵當隨運改獨置始興廬陵始安長沙康樂五公降爵為縣公及縣侯以奉王導謝安溫嶠陶侃謝玄之祀其宣力義熙豫同艱難者一仍本秩庚午以司空道憐為太尉封長沙王追封司徒道規為臨川王以道憐子義慶襲其爵其餘功臣徐羡之等增位進爵各有差追封劉穆之為南康郡公王鎮惡為龍陽縣侯上每歎念穆之曰穆之不死當助我治天下可謂人之云亡邦國殄瘁又曰穆之死人輕易我立皇子桂陽公義真為廬陵王彭城公義隆為宜都王義康為彭城王己卯改泰始曆為永𥘉曆秋八月辛未追諡妃臧氏為敬皇后立王太子義符為皇太子二年𥘉帝以毒酒一罌授前琅邪郎中令張偉使鴆零陵王偉歎曰鴆君以求生不如死乃於道自飲而卒偉邵之兄也太常禇秀之侍中禇淡之皆王之妃兄也王每生男帝輒令秀之兄弟方便殺之王自遜位深慮禍及與嬪妃共處一室自煮食於牀前飲食所資皆出禇妃故宋人莫得伺其隙九月帝令淡之與兄右衛將軍叔度往視妃妃出就别室相見兵人踰垣而入進藥於王王不肯飲曰佛教自殺者不復得人身兵人以被掩殺之帝帥百官臨于朝堂三日元魏寇宋晉安帝義熙十三年夏五月乙未齊郡太守王懿降於魏上書言劉𥙿在洛宜發兵絶其歸路可不戰而克魏主嗣善之崔浩侍講在前嗣問之曰劉𥙿伐姚泓果能克乎對曰克之嗣曰何故對曰昔姚興好事虛名而少實用子泓懦而多病兄弟乖爭𥙿乘其危兵精將勇何故不克嗣曰𥙿才何如慕容垂對曰勝之垂藉父兄之資修復舊業國人歸之若夜蟲之就火少加倚仗易以立功劉𥙿奮起寒微不階尺土討滅桓玄興復晉室北禽慕容超南梟盧循所向無前非其才之過人安能如是乎嗣曰𥙿既入關不能進退我以精騎直搗彭城夀春𥙿將若之何對曰今西有屈丏北有柔然窺伺國隙陛下既不可親御六師雖有精兵未睹良將長孫嵩長於治國短於用兵非劉𥙿敵也興兵逺攻未見其利不如且安靜以待之𥙿克秦而歸必篡其主關中華戎雜錯風俗徑悍𥙿欲以荆楊之化施之函秦此無異解衣包火張羅捕虎雖留兵守之人情未洽趨尚不同適足為寇敵之資耳願陛下按兵息民以觀其變秦地終為國家之有可坐而守也嗣笑曰卿料之審矣浩曰臣嘗私論近丗將相之臣若王猛之治國符堅之管仲也慕容恪之輔幼主慕容暐之霍光也劉𥙿之平禍亂司馬德宗之曹操也嗣曰屈丏何如浩曰屈丏國破家覆孤孑一身寄食姚氏受其封殖不思酬恩報義而乘時徼利盜有一方結怨四鄰撅豎小人雖能縱㬥一時終當為人所吞食耳嗣大恱語至夜半賜浩御縹醪十觚水精鹽一兩曰朕味卿言如此鹽酒故欲與卿共饗其美然猶命長孫嵩叔孫建各簡精兵伺𥙿西過自成臯濟河南侵彭沛若不時過則引兵隨之宋高祖永𥘉三年𥘉魏主聞髙祖克長安大懼遣使請和自是每歲交聘不絶及髙祖殂殿中將軍沈範等奉使在魏還及河魏主遣人追執之議發兵取洛陽虎牢滑臺崔浩諌曰陛下不以劉𥙿歘起納其使貢𥙿亦敬事陛下不幸今死遽乘喪伐之雖得之不足為美且國家今日亦未能一舉取江南也而徒有伐喪之名竊為陛下不取臣謂宜遣人弔祭存其孤弱恤其凶災使義聲布於天下則江南不攻自服矣況𥙿新死黨與未離兵臨其境必相帥拒戰功不可必不如緩之待其彊臣爭權變難必起然後命將出師可以兵不疲勞坐收淮北也魏主曰劉𥙿乘姚興之死而滅之今我乘𥙿喪而伐之何為不可浩曰不然姚興死諸子交爭故𥙿乘舋伐之今江南無舋不可比也魏主不從假司空奚斤節加晉兵大將軍行楊州刺史使督宋兵將軍交州刺史周幾吳兵將軍廣州刺史公孫表同入寇冬十月魏軍將發公卿集議於監國之前以先攻城與先略地奚斤欲先攻城崔浩曰南人長於守城若符氏攻襄陽經年不拔今以大兵坐攻小城若不時克挫傷軍勢敵得徐嚴而來我怠彼鋭此危道也不如分軍略地至淮為限列置守宰收斂租榖則洛陽滑臺虎牢更在軍北絶望南救必㳂河東走不則為囿中之物何憂其不獲也公孫表固請攻城魏主從之於是奚斤等帥步騎二萬濟河營於滑臺之東時司州剌史毛德祖戍虎牢東郡太守王景度告急於德祖德祖遣司馬翟廣等將步騎三千救之先是司馬楚之聚衆在陳留之境聞魏兵濟河遣使迎降魏以楚之為征南將軍荆州剌史使侵擾北境德祖遣長社令王法政將五百人戍邵陵將軍劉憐將二百騎戍雍丘以僃之楚之引兵襲憐不克㑹臺送軍資憐出迎之酸棗民王玉馳以告魏丁酉魏尚書滑稽引兵襲倉垣兵吏悉踰城走陳留太守馮翊嚴稜詣斤降魏以王玉為陳留太守給兵守倉垣奚斤等攻滑臺不拔求益兵魏主怒切責之壬辰自將諸國兵五萬餘人南出天關踰恆嶺為斤等聲援十一月魏太子燾將兵出屯塞上使安定王彌與安同居守庚戌奚斤等急攻滑臺拔之王景度出走景度司馬陽瓉為魏所執不降而死魏主以成臯侯茍兒為兖州剌史鎮滑臺斤等進擊翟廣等於土樓破之乘勝進逼虎牢毛德祖與戰屢破之魏主别遣黑矟將軍于栗磾將三千人屯河陽謀取金墉德祖遣振威將軍竇晃等緣河拒之十二月丙戌魏主至冀州遣楚兵將軍徐州剌史叔孫建將兵自平原濟河徇青兖豫州剌史劉粹遣治中髙道瑾將步騎五百據項城徐州剌史王仲德將兵屯湖陸于栗磾濟河與奚斤并力攻竇晃等破之魏主遣中領軍代人娥清期思侯柔然閭大肥將兵七千人㑹周幾叔孫建南渡河軍於碻磝癸未兖州剌史徐琰棄尹卯南走於是泰山髙平金鄉等郡皆沒於魏叔孫建等東入青州司馬愛之季之先聚衆於濟東皆降於魏戊子魏兵逼虎牢青州剌史東莞笁夔鎮東陽城遣使告急己丑詔南兖州剌史檀道濟監征討諸軍事與王仲德共救之廬陵王義真遣龍驤將軍沈叔狸將三千人就劉粹量宜赴援營陽王景平元年春正月魏于栗磾攻金墉癸卯河南太守王㳙之棄城走魏主以栗磾為豫州剌史鎮洛陽庚申檀道濟軍于彭城魏叔孫建入臨淄所向城邑皆潰笁夔聚民保東陽城其不入城者使各依據山險芟夷禾稼魏軍至無所得食濟南太守垣苗帥衆依夔刁雍見魏主於鄴魏主曰叔孫建等入青州民皆藏避攻城不下彼素服卿威信今遣卿助之乃以雍為青州剌史給雍騎使行募兵以取青州魏兵濟河向青州者凡六萬騎刁雍募兵得五千人撫慰土民皆送租供軍三月魏奚斤公孫表等共攻虎牢魏主自鄴遣兵助之毛德祖於城內穴地入七丈分為六道出魏圍外募敢死之士四百人使參軍范道基等帥之從穴中出掩襲其後魏兵驚擾斬首數百級焚其攻具而還魏兵雖退散隨復更合攻之益急奚斤自虎牢將步騎三千攻頴川太守李元德等於許昌元德等敗走魏以頴川人庾龍為頴川太守戍許昌毛德祖出兵與公孫表大戰從朝至晡殺魏兵數百㑹奚斤自許昌還合擊德祖大破之亡甲士千餘人復嬰城自守魏主又遣萬餘人從白沙度河屯濮陽南朝議以項城去魏不逺非輕軍所抗使劉粹召髙道瑾還壽陽若沈叔狸已進亦宜且追粹奏虜攻虎牢未復南向若遽攝軍捨項城則淮西諸郡無所慿依沈叔狸已頓肥口又不宜遽退時李元德帥散卒二百至項劉粹使助髙道瑾戍守請宥其奔敗之罪朝議並許之乙巳魏主畋於韓陵山遂如汲郡至枋頭𥘉毛德祖在北與公孫表有舊表有權略德祖患之乃與交通音問密遣人說奚斤云表與之連謀每答表書輒多所治定表以書示斤斤疑之以告魏主先是表與太史令王亮少同營署好輕侮亮亮奏表置軍虎牢東不得便地故令賊不時滅魏主素好術數以為然積前後忿使人夜就帳中縊殺之乙卯魏主濟自靈昌津遂如東郡陳留叔孫建將三萬騎逼東陽城城中文武才一千五百人笁夔垣苗悉力固守時出竒兵擊魏破之魏步騎繞城列陳千餘里大治攻具夔作四重塹魏人填其三重為橦車以攻城夔遣人從地道中出以大麻絙挽之令折魏人復作長圍進攻逾急歷時浸久城轉墮壞戰士多死傷餘衆困乏旦暮且陷檀道濟至彭城以司青二州並急而所領兵少不足分赴青州道近笁夔兵弱乃與王仲德兼行先救之甲子劉粹遣李元德襲許昌斬庾龍元德因留綏撫并上租糧魏主至盟津于栗磾造浮橋於冶阪津乙丑魏主引兵北濟西如河內娥清周幾閭大肥徇地至湖陸髙平民屯聚而射之清等盡攻破髙平諸縣滅數千家虜掠萬餘口兖州剌史鄭順之戍湖陸以兵少不敢出魏主又遣并州剌史伊樓拔助奚斤攻虎牢毛德祖隨方抗拒頗殺魏兵而將士稍零落夏四月丁卯魏主如成臯絶虎牢汲河之路停三日自督衆攻城竟不能下遂如洛陽觀石經遣使祀嵩髙叔孫建攻東陽墮其城北三十許步刁雍請速入建不許遂不克及聞檀道濟等將至雍又謂建曰賊畏官軍突騎以鎖連車為函陳大峴以南處處狹隘車不得方軌雍請將所募兵五千據險以邀之破之必矣時天暑魏軍多疫建曰兵人疫病過半若相持不休兵自死盡何須復戰今全軍而返計之上也己巳道濟軍于臨朐壬申建等燒營及器械而遁道濟至東陽糧盡不能追笁夔以東陽城壞不可守移鎮不其城叔孫建自東陽趨滑臺道濟分遣王仲德向尹卯道濟停軍湖陸仲德未至尹卯聞魏兵已逺還就道濟刁雍遂留鎮尹卯招集譙梁彭沛民五千餘家置二十七營以領之閏四月丁未魏主如河內登太行至髙都叔孫建自滑臺西就奚斤共攻虎牢虎牢被圍二百日無日不戰徑兵戰死殆盡而魏增兵轉多魏人毁其外城毛德祖於其內更築三重城以拒之魏人又毁其二重德祖唯保一城晝夜相拒將士眼皆生創德祖撫之以恩終無離心時檀道濟軍湖陸劉粹軍項城沈叔狸軍髙橋皆畏魏兵彊不敢進丁巳魏人作地道以泄虎牢城中井井深四十丈山勢峻峭不可得防城中人馬渴乏被創者不復出血重以饑疫魏仍急攻之己未城陷將士欲扶德祖出走德祖曰我誓與此城俱斃義不使城亡而身存也魏主命將士得德祖者必生致之將軍代人豆代田執德祖以獻將佐在城中者皆為魏所虜唯參軍范道基將二百人突圍南還魏士卒疫死者亦什二三奚斤等悉定司兖豫諸郡縣置守宰以撫之魏主命周幾鎮河南河南人安之徐羡之傅亮謝晦以亡失境土上表自劾詔勿問五月魏主還平城秋九月乙亥魏主還宫召奚斤還平城留兵守虎牢使娥清周幾鎮枋頭以司馬楚之所將戶口置汝南南陽南頓新置四郡以益豫州冬十一月魏周幾寇許昌許昌潰潁川太守李元德奔項戊辰魏人圍汝陽太守王公度亦奔項劉粹遣其將姚聳夫等將兵助守項城魏人夷許昌城毁鍾城以立封疆而還徐傅廢立宋髙祖永𥘉元年秋八月癸酉立王太子義符為皇太子三年春三月上不豫太尉長沙王道憐司空徐羡之尚書僕射傅亮領軍將軍謝晦護軍將軍檀道濟並入侍醫藥羣臣請祈禱神祇上不許唯使侍中謝方明以疾告宗廟而已上性不信竒怪微時多符瑞及貴史官審以所聞上拒而不答檀道濟出為鎮北將軍南兖州剌史鎮廣陵悉監淮南諸軍皇太子多狎羣小謝晦言於上曰陛下春秋既髙宜思存萬世神器至重不可使負荷非才上曰廬陵何如晦曰臣請觀焉出造廬陵王義真義真盛欲與談晦不甚答晦還曰德輕於才非人主也丁未出義真為都督南豫豫雍司秦并六州諸軍事車騎將軍開府儀同三司南豫州剌史夏五月帝疾甚召太子誡之曰檀道濟雖有幹略而無逺志非如兄韶有難御之氣也徐羡之傅亮當無異圗謝晦數從征伐頗識機變若有同異必此人也又為手詔曰後世若有幼主朝事一委宰相母后不煩臨朝司空徐羡之中書令傅亮領軍將軍謝晦鎮北將軍檀道濟同𬒳顧命癸亥帝殂于西殿太子即皇帝位年十七大赦尊皇太后曰太皇太后立妃司馬氏為皇后文帝元嘉元年營陽王居喪無禮好與左右狎昵遊戲無度特進致仕范泰上封事曰伏聞陛下時在後園頗習武備鼓鞞在宫聲聞于外黷武掖庭之內喧譁省闥之間非徒不足以威四夷秪生逺近之怪陛下踐祚委政宰臣實同髙宗諒暗之美而更親狎小人懼非社稷至計經丗之道也不聽南豫州剌史廬陵王義鎮警悟愛文義而性輕易與太子左衛率謝靈運貟外常侍顔延之慧琳道人情好𣢾密嘗云得志之日以靈運延之為宰相慧琳為西豫州都督靈運性𥚹傲不遵法度自謂才能宜參權要常懷憤邑延之嗜酒放縱徐羡之等惡義真與靈運等遊於是羡之等以為靈運延之構扇異同非毁執政出靈運為永嘉太守延之為始安太守義真至歷陽多所求索執政每裁量不盡與義真深怨之數有不平之言又表求還都咨議參軍何尚之屢諌不聽時羡之等已密謀廢帝而次立者應在義真乃因義真與帝有隙先奏列其罪惡廢為庶人徙新安郡前吉陽令堂邑張約之上疏曰廬陵王少蒙先皇優慈之遇長受陛下睦愛之恩故在心必言所懷必亮容犯臣子之道致招驕恣之愆至於天姿夙成實有卓然之美宜在容飬録善掩瑕訓盡義方進退以漸今猥加剝辱幽徙逺郡上傷陛下常棣之篤下令逺近恇然失圖臣伏思大宋開基造次根條未繁宜廣樹藩戚敦睦以道人誰無過貴能自新以武皇之愛子陛下之懿弟豈可以其一眚長致淪棄哉書奏以約之為梁州府參軍尋殺之夏四月徐羡之等以南兖州剌史檀道濟先朝舊將威服殿省具有兵衆乃召道濟及江州刺史王弘入朝五月皆至建康以廢立之謀告之甲申謝晦以領軍府屋敗悉令家人出外聚將士於府內又使中書舍人邢安泰潘盛為內應夜邀檀道濟同宿晦悚動不得眠道濟就寢便熟晦以此服之時帝於華林園為列肆親自沽賣又與左右引船為樂夕游天淵池即龍舟而寢乙酉詰旦道濟引兵居前羡之等繼其後入自雲龍門安泰等先誡宿衛莫有禦者帝未興軍士進殺二侍者傷帝指扶出東閣收璽綬羣臣拜辭衛送故太子宫侍中程道惠勸羡之等立皇弟南豫州剌史義恭羡之等以宜都王義隆素有令望又多符瑞乃稱皇太后令數帝過惡廢為營陽王以宜都王纂承大統赦死罪以下又稱皇太后令奉還璽綬并廢皇后為營陽王妃遷營陽王於吳使檀道濟入守朝堂王至吳止金昌亭六月癸丑羡之等使邢安泰就弒之王多力突走出昌門追者以門關踣而弒之裴子野論曰古者人君養子能言而師授之辭能行而傅相之禮宋之教誨雅異於斯居中則任僕妾處外則近趨走太子皇子有帥有侍是二職者皆臺皂也制其行止授其法則導逹臧否罔弗由之言不及於禮義識不逹於今古謹敕者能勸之以吝嗇狂愚者或誘之以凶慝雖有師傅多以耆艾大夫為之雖有友及文學多以膏梁年少為之具位而已亦弗與遊幼王臨州長史行事宣傳教命又有典籖往往專恣竊弄威權是以本枝雖茂而端良甚寡嗣君沖幼世繼姦回雖惡物醜類天然自出然習則生常其流逺矣降及太宗舉天下而棄之亦昵比之為也烏呼有國有家其鑑之矣傅亮帥行臺百官奉法駕迎宜都王于江陵祠部尚書蔡廓至尋陽遇疾不堪前亮與之别廓曰營陽在吳宜厚加供奉一旦不幸卿諸人有弒主之名欲立於丗將可得邪時亮已與羡之議害營陽王乃馳信止之不及羡之大怒曰與人共計議如何旋背即賣惡於人邪羡之等又遣使者殺前廬陵王義真於新安羡之以荆州地重恐宜都王至或别用人乃亟以録命除領軍將軍謝晦行都督荆湘等七州諸軍事荆州剌史欲令居外為援精兵舊將悉以配之秋七月行臺至江陵立行門於城南題曰大司馬門傅亮帥百僚詣門上表進璽紱儀物甚盛宜都王時年十八下教曰猥以不德謬降大命顧已兢悸何以克堪輒當暫歸朝廷展哀陵寢并與賢彥申寫所懷望體其心勿為辭費府州佐史並稱臣請題榜諸門一依宫省王皆不許教州府國綱紀宥其統內見刑原逋責諸將佐聞營陽廬陵王死皆以為疑勸王不可東下司馬王華曰先帝有大功於天下四海所服雖嗣主不綱人望未改徐羡之中才寒士傅亮布衣諸生非有晉宣帝王大將軍之心明矣受寄崇重未容遽敢背德畏廬陵嚴斷將來必不自容以殿下寬睿慈仁逺近所知且越次奉迎冀以見德悠悠之論殆必不然又羡之等五人同功並位孰肯相讓就懷不軌勢必不行廢主若存慮其將來受禍致此殺害蓋由貪生過深寧敢一朝頓懷逆志不過欲握權自固以少主仰待耳殿下但當長驅六轡以副天人之心王曰卿復欲為宋昌邪長史王曇首南蠻校尉到彥之皆勸王行曇首仍陳天人符應王乃曰諸公受遺不容背義且勞臣舊將內外充滿今兵力又足以制物夫何所疑乃命王華揔後任留鎮荆州王欲使到彥之將兵前驅彥之曰了彼不反便應朝服順流若使有虞此師既不足恃更開嫌隙之端非所以副逺邇之望也㑹雍州剌史禇叔度卒乃遣彥之權鎮襄陽甲戌王發江陵引見傅亮號泣哀動左右既而問義真及少帝薨廢本末悲哭嗚咽侍側者莫能仰視亮流汗沾背不能對乃布腹心於到彥之王華等深自結納王以府州文武嚴兵自衛臺所遣百官衆力不得近部伍中兵參軍朱容子抱刀處王所乘舟户外不解帶者纍旬八月丙申宜都王至建康羣臣迎拜於新亭徐羡之問傅亮曰王可方誰亮曰晉文景以上人羡之曰必能明我赤心亮曰不然丁酉王謁𥘉寧陵還止中堂百官奉璽綬王辭讓數四乃受之即皇帝位于中堂僃法駕入宫御太極前殿大赦改元文武賜位二等戊戌謁太廟詔復廬陵王先封迎其柩及孫修華謝妃還建康庚子以行荆州刺史謝晦為真晦將行與蔡廓别屏人問曰吾其免乎廓曰卿受先帝顧命任以社稷廢昏立明義無不可但殺人二兄而以之北靣挾震主之威據上流之重以古推今自免為難晦始懼不得去既發顧望石頭城喜曰今得脫矣癸卯徐羡之進位司徒王弘進位司空傅亮加開府儀同三司謝晦進號衛將軍檀道濟進號征北將軍有司奏車駕依故事臨華林園聽訟詔曰政刑多所未悉可如先者二公推訊帝以王曇首王華為侍中曇首領右衛將軍華領驍騎將軍朱容子為右軍將軍甲辰徐羡之等欲即以到彥之為雍州帝不許徴彥之為中領軍委以戎政彥之自襄陽南下謝晦已至鎮慮彥之不過已彥之至楊口步往江陵深布誠𣢾晦亦厚自結納彥之留馬及利劒名刀以與晦晦由此大安二年春正月徐羡之傅亮上表歸政表三上帝乃許之丙寅始親萬機羡之仍遜位還第徐珮之程道惠及吳興太守王韶之等並謂非宜敦勸甚苦乃復奉詔視事秋八月王弘自以始不預定䇿不受司空表讓彌年乃許之十一月𥘉㑹稽孔寧子為帝鎮西咨議參軍及即位以寧子為步兵校尉與侍中王華並有富貴之願疾徐羡之傅亮專權日夜構之於帝㑹謝晦二女當適彭城王義康新野侯義賔遣其妻曹氏及長子世休送女至建康帝欲誅羡之亮并發兵討晦聲言當伐魏取河南又言拜京陵治行裝艦亮與晦書曰薄伐河朔事猶未巳朝野之慮憂懼者多又言朝士多諌北征上當遣外監萬幼宗往相咨訪時朝廷處分異常其謀頗泄三年春正月謝晦弟黃門侍郎㬭馳使告晦晦猶謂不然以傅亮書示咨議參軍何承天曰計幼宗一二日必至傅公慮我好事故先遣此書承天曰外閒所聞咸謂西討已定幼宗豈有上理晦尚謂虛妄使承天豫立答詔啓草言伐虜宜須明年江夏內史程道惠得尋陽人書言朝廷將有大處分其事已審使其輔國府中兵參軍樂冏封以示晦晦問承天曰若果爾卿令我云何對曰蒙將軍殊顧常思報德事變至矣何敢隱情然明日戒嚴動用軍法區區所懷懼不得盡晦懼曰卿豈欲我自裁邪承天曰尚未至此以王者之重舉天下以攻一州大小既殊逆順又異境外求全上計也其次以腹心將兵屯義陽將軍自帥大衆戰於夏口若敗即趨義陽以出北境其次也晦良久曰荆州用武之地兵糧易給聊且決戰走復何晚乃使承天造立表檄又與衛軍咨議參軍琅邪顔邵謀舉兵邵飲藥而死晦立幡戒嚴謂司馬庾登之曰今當自下欲屈卿以三千人守城僃禦劉粹登之曰下宫魏老在都又素無部衆情計二三不敢受此旨晦仍問諸將佐戰士三千足守城否南蠻司馬周超對曰非徒守城而已若有外寇可以立功登之因曰超必能辦下官請解司馬南郡以授之晦即於坐命超為司馬領南義陽太守轉登之為長史南郡如故帝以王弘檀道濟始不預廢弒之謀弘弟曇首又為帝所親委事將發密使報弘且召道濟欲使討晦王華等皆以為不可帝曰道濟止於脅從本非創謀殺害之事又所不關吾撫而使之必將無慮乙丑道濟至建康丙寅下詔㬥羡之亮晦殺營陽王廬陵王之罪命有司誅之且曰晦據有上流或不即罪朕當親帥六師為其過防可遣中領軍到彥之即日電發征北將軍檀道濟駱驛繼路符衛軍府州以時收翦已命雍州剌史劉粹等斷其走伏罪止元凶餘無所問是日詔召羡之亮羡之行至西明門外謝㬭正直遣報亮云殿內有異處分亮辭以嫂病暫還遣信報羡之羡之還西州乘內人問訊車出郭步走至新林入陶竈中自經死亮乘車出郭門乘馬奔兄迪墓屯騎校尉郭泓收之至廣莫門上遣中書舍人以詔書示亮并謂曰以公江陵之誠當使諸子無恙亮讀詔書訖曰亮受先帝布衣之眷遂蒙顧託黜昏立明社稷之計也欲加之罪其無辭乎於是誅亮而徙其妻子於建安誅羡之二子而宥其兄子珮之又誅晦子丗休收繫謝㬭帝將討謝晦問䇿於檀道濟對曰臣昔與晦同從北征入關十䇿晦有其九才略明練殆為少敵然未嘗孤軍決勝戎事恐非其長臣悉晦智晦悉臣勇今奉王命而討之可未陳而擒也丁卯徴王弘為侍中司徒録尚書事楊州刺史以彭城王義康為都督荆湘等八州諸軍事荆州刺史樂冏復遣使告謝晦以徐傅及㬭等已誅晦先舉羡之亮哀次發子弟凶問既而自出射堂勒兵晦從髙祖征討指麾處分莫不曲盡其宜數日閒四逺投集得精兵三萬人乃奉表稱羡之亮等忠貞橫被冤酷且言臣等若志欲執權不專為國𥘉廢營陽陛下在逺武皇之子尚有童幼擁以號令誰敢非之豈得泝流三千里虛館七旬仰望鸞旗者哉故廬陵王於營陽之丗積怨犯上自貽非命不有所廢將何以興耿弇不以賊遺君父臣亦何負於宋室邪此皆王弘王曇首王華險躁猜忌讒構成禍今當舉兵以除君側之惡帝下詔戒嚴大赦諸軍相次進路以討謝晦晦以弟遁為竟陵內史將萬人揔留任帥衆二萬發江陵列舟艦自江津至于破冡旌旗蔽日歎曰恨不得以此為勤王之師二月庚申上發建康命王弘與彭城王義康居守入居中書下省侍中殷景仁參掌留任帝姊㑹稽公主留止臺內揔攝六宫謝晦自江陵東下何承天留府不從晦至江口到彥之已至彭城洲庾登之據巴陵畏懦不敢進㑹霖雨連日參軍劉和之曰彼此各有雨耳檀征北尋至東軍方彊唯宜速戰登之恇怯使小將陳祐作大囊貯茅懸於帆􅧃云可以焚艦用火宜須晴以緩戰期晦然之停車十五日乃使中兵參軍孔延秀攻將軍蕭欣於彭城洲破之又攻洲口柵陷之諸將咸欲退還夏口到彥之不可乃保隱圻晦又上表自訟且自矜其捷曰陛下若梟四凶於廟庭懸三監於絳闕臣便勒衆旋旗還保所任𥘉晦與徐羡之傅亮為自全之計以為晦據上流而檀道濟鎮廣陵各有彊兵足以制朝廷羡之亮居中秉權可得持久及聞道濟帥衆來上惶懼無計道濟既至與到彥之軍合牽艦緣岸晦始見艦數不多輕之不即出戰至晚因風帆上前後連咽西人離沮無復鬪心戊辰臺軍至忌置洲尾列艦過江晦軍一時皆潰晦夜出投巴陵得小船還江陵先是帝遣雍州剌史劉粹自陸道帥步騎襲江陵至沙橋周超帥萬餘人逆戰大破之士衆傷死者過半俄而晦敗問至𥘉晦與粹善以粹子曠之為參軍帝疑之王弘曰粹無私必無憂也及受命南討一無所顧帝以此嘉之晦亦不殺曠之遣還粹所丙子帝自蕪湖東還晦至江陵無它處分惟愧謝周超而已其夜超捨軍單舸詣到彥之降晦衆散略盡乃攜其弟遁等七騎北走遁肥壯不能乘馬晦每待之行不得速己卯至安陸延頭為戍主光順之所執檻送建康到彥之至馬頭何承天自歸彥之因監荆州府事以周超為參軍劉粹以沙橋之敗告乃執之於是誅晦㬭遁及其兄弟之子并同黨孔延秀周超等晦女彭城王妃𬒳髮徒跣與晦訣曰大丈夫當橫尸戰埸奈何狼籍都市庾登之以無任免官禁錮何承天及南蠻行參軍新興王玄謨等皆見原三月辛巳帝還建康徴謝靈運為祕書監顔延之為中書侍郎賞遇甚厚夏五月乙未以檀道濟為征南大將軍開府儀同三司江州刺史到彥之為南豫州剌史彭城王專政宋髙祖永𥘉元年夏六月立皇子義康為彭城王文帝元嘉五年春正月荆州剌史彭城王義康性聰察在州職事修治左光祿大夫范泰謂司徒王弘曰天下事重權要難居卿兄弟盛滿當深存降挹彭城王帝之次弟宜徴還入朝共參朝政弘納其言時大旱疾疫弘上表引咎遜位帝不許六年春正月王弘上表乞解州録以授彭城王義康帝優詔不許癸丑以義康為侍中都督楊南徐兖三州諸軍事司徒録尚書事領南徐州剌史弘與義康二府並置佐領兵共輔朝政弘既多疾且欲委逺大權每事推讓義康由是義康專揔內外之務七年彭城王義康與王弘並録尚書義康意猶怏怏欲得楊州形於辭㫖以弘弟曇首居中為上所親委愈不恱弘以老病屢乞骸骨曇首自求吳郡上皆不許義康謂人曰王公久病不起神州詎宜卧治曇首勸弘減府中文武之半以授義康上聽割二千人義康乃恱九年夏六月戊寅司徒南徐州剌史彭城王義康改領楊州剌史十二年春三月領軍將軍劉湛與僕射殷景仁素善湛之入也景仁實引之湛既至以景仁位遇本不踰已而一旦居前意甚憤憤俱𬒳時遇以景仁専管內任謂為閒已猜隙漸生知帝信仗景仁不可移奪時司徒義康專秉朝權湛嘗為義康上佐遂委心自結欲因宰相之力以回上意傾黜景仁獨當時務夏四月己巳帝加景仁中書令中護軍即家為府湛加太子詹事湛愈憤怒使義康毁景仁於帝帝遇之益隆景仁對親舊歎曰引之令入入便噬人乃稱疾解職表疏纍上帝不許使停家養病湛議遣人若劫盜者於外殺之以為帝雖知當有以解之不能傷義康至親之愛帝微聞之遷護軍府於西掖門外使近宫禁故湛謀不行義康僚屬及諸附麗湛者潜相約勒無敢歷殷氏之門彭城王主簿沛郡劉敬文父成未悟其機詣景仁求郡敬文遽往謝湛曰老父悖耄遂就殷鐡干祿由敬文暗淺上負生成闔門慙懼無地自處唯後將軍司馬庾炳之遊二人之間皆得其歡心而密輸忠於朝廷景仁卧家不朝謁帝常使炳之銜命往來湛不疑也炳之登之之弟也十二年春二月司空江州剌史永修公檀道濟立功前朝威名甚重左右腹心竝經百戰諸子又有才氣朝廷疑畏之帝久疾不愈劉湛說司徒義康以為宫車一日晏駕道濟不復可制㑹帝疾篤義康言於帝召道濟入朝其妻向氏謂道濟曰髙丗之勳自古所忌今無事相召禍其至矣既至留之纍月帝稍閒將遣還已下渚未發㑹帝疾動義康矯詔召道濟入祖道因執之三月己未下詔稱道濟潜散金貨招誘剽猾因朕寢疾規肆禍心收付廷尉并其子給事黃門侍郎植等十一人誅之唯宥其孫孺又殺司空參軍薛􅊮髙進之二人皆道濟腹心有勇力時人比之關張道濟見收憤怒目光如炬脫幘投地曰乃壞汝萬里長城魏人聞之喜曰道濟死吳子輩不足復憚庚申大赦以中軍將軍南譙王義宣為江州剌史十六年春正月庚寅司徒義康進位大將軍領司徒南兖州剌史江夏王義恭進位司空十七年司徒義康專揔朝權上羸疾積年心勞輒發屢至危殆義康盡心營奉藥食非口所親嘗不進或連夕不寐內外衆事皆專決施行性好吏職糾剔文案莫不精盡上由是多委以事凡所陳奏入無不可方伯以下竝令義康選用生殺大事或以録命斷之勢傾逺近朝野輻湊每旦府門常有車數百乘義康傾身引接未嘗懈倦復能彊記耳目所經終身不忘好於稠人廣席標題所憶以示聰明士之幹練者多被意遇嘗謂劉湛曰王敬弘王球之屬竟何所堪坐取富貴復那可解然素無學術不識大體朝士有才用者皆引入己府府僚無施及忤㫖者乃斥為臺官自謂兄弟至親不復存君臣形迹率心而行曽無猜防私置僮六千餘人不以言臺四方獻饋皆以上品薦義康而以次者供御上嘗冬月噉甘歎其形味竝劣義康曰今年甘殊有佳者遣人還東府取甘大供御者三寸領軍劉湛與僕射殷景仁有隙湛欲倚義康之重以傾之義康權勢已盛湛愈推崇之無復人臣之禮上浸不能平湛𥘉入朝上恩禮甚厚湛善論治道諳前代故事叙致銓理聽者忘疲每入雲龍門御者即解駕左右及羽儀隨意分散不夕不出以此為常及晚節驅煽義康上意雖內離而接遇不改嘗謂所親曰劉班𥘉自西還宫與語常視日早晚慮其將去比入吾亦視日早晚苦其不去殷景仁密言於上曰相王權重非社稷計宜少加裁抑上隂然之司徒左長史劉斌湛之宗也大將軍從事中郎王履謐之孫也及主簿劉敬文祭酒魯郡孔胤秀皆以傾諂有寵於義康見上多疾皆謂宫車一日晏駕宜立長君上嘗疾篤使義康具顧命詔義康還省流涕以告湛及景仁湛曰天下艱難詎是幼主所御義康景仁竝不答而胤秀等輒就尚書議曹索晉咸康末立康帝舊事義康不知也及上疾瘳微聞之而斌等密謀欲使大業終歸義康遂邀結朋黨伺察禁省有不與已同者必百方􅌟陷之又採拾景仁短長或虛造異同以告湛自是主相之勢分矣義康欲以劉斌為丹楊尹言次啓上陳其家貧言未卒上曰以為吳郡後㑹稽太守羊玄保求還義康又欲以斌代之啓上曰羊玄保欲還不審以誰為㑹稽上時未有所擬倉猝曰我巳用王鴻自去年秋上不復往東府五月癸巳劉湛遭母憂去職湛自知罪舋已彰無復全地謂所親曰今年必敗常曰正賴口舌爭之故得推遷耳今既窮毒無復此望禍至其能久乎上以司徒彭城王義康嫌隙已著將成禍亂冬十月戊申收劉湛付廷尉下詔㬥其罪惡就獄誅之并誅其子黯亮儼及其黨劉斌劉敬文孔胤秀等八人徙尚書庫部郎何默子等五人於廣州因大赦是日敕義康入宿留止中書省其夕分收湛等青州剌史杜驥勒兵殿內以僃非常遣人宣旨告義康以湛等罪狀義康上表遜位詔以義康為江州剌史侍中大將軍如故出鎮豫章𥘉殷景仁卧疾五年雖不見上而密函去來日以十數朝政大小必以咨之影迹周密莫有窺其際者收湛之日景仁使拂拭衣冠左右皆不曉其意其夜上出華林園延賢堂召景仁景仁猶稱腳疾以小牀輿就坐誅討處分一皆委之𥘉檀道濟薦吳興沈慶之忠謹曉兵上使領隊防東掖門劉湛為領軍嘗謂之曰卿在省歲久比當相論慶之正色曰下官在省十年自應得轉不復以此仰纍收湛之夕上開門召慶之慶之戎服縛袴而入上曰卿何意乃爾急裝慶之曰夜半喚隊主不容緩服上遣慶之收劉斌殺之驍騎將軍徐湛之逵之之子也與義康尤親厚上深銜之義康敗湛之被收罪當死其母㑹稽公主於兄弟為長嫡素為上所禮家事大小必咨而後行髙祖微時常自於新洲伐荻有納布衫襖臧皇后手所作也既貴以付公主曰後丗有驕奢不節者可以此衣示之至是公主入宫見上號哭不復施臣妾之禮以錦囊盛納衣擲地曰汝家本貧賤此是我母與汝父所作今日得一飽餐遽欲殺我兒邪上乃赦之吏部尚書王球履之叔父也以簡淡有美名為上所重履性進利深結義康及湛球屢戒之不從誅湛之夕履徒跣告球球命左右為取履先溫酒與之謂曰常日語汝云何履怖懼不得答球徐曰阿父在汝亦何憂上以球故履得免死廢於家義康方用事人爭求親昵唯司徒主簿江湛早能自踈求出為武陵內史檀道濟嘗為其子求婚於湛湛固辭道濟因義康以請之湛拒之愈堅故不染於二公之難上聞而嘉之湛夷之子也彭城王義康停省十餘日見上奉辭便下渚上唯對之慟哭餘無所言上遣沙門慧琳視之義康曰弟子有還理不慧琳曰恨公不讀數百卷書𥘉吳興太守謝述𥙿之弟也纍佐義康數有規益早卒義康將南歎曰昔謝述唯勸吾退劉班唯勸吾進今班存而述死其敗也宜哉上亦曰謝述若存義康必不至此以征虜司馬蕭斌為義康咨議參軍領豫章太守事無大小皆以委之斌摹之之子也使龍驤將軍蕭承之將兵防守義康左右愛念者竝聽隨從資奉優厚信賜相係朝廷大事皆報示之久之上就㑹稽公主宴集甚歡主起再拜叩頭悲不自勝上不曉其意自起扶之主曰車子歲暮必不為陛下所容今特請其命因慟哭上亦流涕指蔣山曰必無此慮若違今誓便是負初寧陵即封所飲酒賜義康并書曰㑹稽姊飲宴憶弟所餘酒今封送故終主之身義康得無恙臣光曰文帝之於義康友愛之情其始非不隆也終於失兄弟之歡虧君臣之義迹其亂階正由劉湛權利之心無有厭已詩云貪人敗類其是之謂乎徴南兖州剌史江夏王義恭為司徒録尚書事戊寅以臨川王義慶為南兖州刺史冬十一月殷景仁既拜楊州羸疾遂篤上為之敕西州道上不得有車聲癸丑卒十二月癸亥以光祿大夫王球為僕射戊辰以始興王濬為楊州刺史時濬尚幼州事悉委後軍長史范曄主簿沈璞曄泰之子璞林子之子也曄尋遷左衛軍將以吏部郎沈演之為右衛將軍對掌禁旅又以庾炳之為吏部郎俱參機密演之徑之曾孫也曄有俊才而薄情淺行數犯名教為士流所鄙性躁競自謂才用不盡常怏怏不得志吏部尚書何尚之言於帝曰范曄志趨異常請出為廣州刺史若在內舋成不得不加鈇鉞鈇鉞亟行非國家之美也帝曰始誅劉湛復遷范曄人將謂卿等不能容才朕信受讒言但共知其如此無能為害也十八年春正月彭城王義康至豫章辭刺史甲辰以義康都督江交廣三州諸軍事前龍驤參軍巴東扶令育詣闕上表稱昔袁盎諌漢文帝曰淮南王若道路遇霜露死陛下有殺弟之名文帝不用追悔無及彭城王義康先朝之愛子陛下之次弟若有迷謬之愆正可數之以善惡導之以義方奈何信疑似之嫌一旦黜削逺送南垂草萊黔首皆為陛下痛之廬陵往事足為龜鑑恐義康年窮命盡奄忽于南臣雖微賤竊為陛下羞之陛下徒知惡枝之宜伐豈知伐枝之傷樹伏願亟召義康返于京甸兄弟協和君臣輯睦則四海之望塞多言之路絶矣何必司徒公楊州牧然後可以置彭城王哉若臣所言於國為非請伏重誅以謝陛下表奏即收付建康獄賜死裴子野論曰夫在上為善若雲行雨施萬物受其賜及其惡也若天裂地震萬物所驚駭其誰弗知其誰弗見豈戮一人之身鉗一夫之口所能攘逃所能弭滅哉是不勝其忿怒而有增於疾疹也以太祖之含弘尚掩耳於彭城之戮自斯以後誰易由言有宋纍葉罕聞直諒豈骨鯁之氣俗愧前古抑時王刑政使之然乎張約隕於權臣扶育斃於哲后宋之鼎鑊吁可畏哉二十二年𥘉魯國孔熙先博學文史兼通數術有縱橫才志為員外散騎侍郎不為時所知憤憤不得志父默之為廣州剌史以贓獲罪大將軍彭城王義康為救解得免及義康遷豫章熙先密懷報效且以為天文圖䜟帝必以非道晏駕由骨肉相殘江州應出天子以范曄志意不滿欲引與同謀而熙先素不為曄所重太子中舍人謝綜曄之甥也熙先傾身事之綜引熙先與曄相識熙先家饒於財數與曄博故為拙行以物輸之曄既利其財又愛其文藝由是情好欵洽熙先乃從容說曄曰大將軍英斷聰敏人神攸屬失職南垂天下憤怨小人受先君遺命以死報大將軍之德頃人情騷動天文舛錯此所謂時運之至不可推移者也若順天人之心結英豪之士表裏相應發於肘腋然後誅除異我崇奉明聖號令天下誰敢不從小人請以七尺之軀三寸之舌立功立事而歸諸君子丈人以為何如曄甚愕然熙先曰昔毛玠竭節於魏武張溫畢議於孫權彼二人者皆國之俊人豈言行玷缺然後至於禍辱哉皆以廉直徑正不得久容丈人之於本朝不深於二主人閒雅譽過於兩臣讒夫側目為日久矣比肩競逐庸可遂乎近者殷鐡一言而劉班碎首彼豈父兄之讎百丗之怨乎所爭不過榮名勢利先後之閒耳及其末也唯恐陷之不深發之不早戮及百口猶曰未厭是可為寒心悼懼豈書籍逺事也哉今建大勳奉賢哲圖難於易以安易危享厚利收鴻名一旦苞舉而有之豈可弃置而不取哉曄猶疑未决熙先曰又有過於此者愚則未敢道耳曄曰何謂也熙先曰丈人奕葉清通而不得連姻帝室人以犬豕相遇而丈人曾不恥之欲為之死不亦惑乎曄門無內行故熙先以此激之曄默然不應反意乃決曄與沈演之竝為帝所知曄先至必待演之俱入演之先至嘗獨𬒳引曄以此為怨曄纍經義康府佐中閒獲罪於義康謝綜及父述皆為義康所厚綜弟約娶義康女綜為義康記室參軍自豫章還申義康意欲曄求解晚隙復敦往好大將軍府史仲承祖有寵於義康聞熙先有謀密相結納丹楊尹徐湛之素為義康所愛承祖因此結事湛之告以密計道人法略尼法靜皆感義康舊恩竝與熙先往來法靜妹夫許曜領隊在臺許為內應法靜之豫章熙先付以箋書陳說圖䜟於是密相署置及素所不善者竝入死目熙先又使弟休先作檄文稱賊臣趙伯符肆兵犯蹕禍流儲宰湛之曄等投命奮戈即日斬伯符首及其黨與今遣護軍將軍臧質奉璽綬迎彭城王正位辰極熙先以為舉大事宜須以義康之㫖諭衆曄又詐作義康與湛之書令誅君側之惡宣示同黨帝之燕武帳岡也曄等謀以其日作亂許曜侍帝扣刀目曄曄不敢仰視俄而座散徐湛之恐事不濟密以其謀白帝帝使湛之具探取本末得其檄書選署姓名上之帝乃命有司收掩窮治其夜呼曄置客省先於外收綜及熙先兄弟皆欵服帝遣使詰問曄曄猶隱拒熙先聞之笑曰凡處分符檄書疏皆范所造云何於今方作如此抵踏邪帝以曄墨迹示之乃具陳本末明日仗士送付廷尉熙先望風吐𣢾辭氣不橈上竒其才遣人慰勉之曰以卿之才而滯於集書省理應有異志此乃我負卿也又責前吏部尚書何尚之曰使孔熙先年將三十作散騎郎那不作賊熙先於獄中上書謝恩且陳圖䜟深戒上以骨肉之禍曰願且勿遺棄存之中書若囚死之後或可追録庶九泉之下少塞舋責曄在獄為詩曰雖無嵇生琴庶同夏侯色曄本意謂大獄即死而上窮治其獄遂經二旬曄更有生望獄吏戲之曰外傳詹事或當長繫曄聞之驚喜綜熙先笑之曰詹事疇昔攘𬒮瞋目躍馬顧盻自以為一丗之雄今擾攘紛紜畏死乃爾設令賜以性命人臣圖主何顔可以生存十二月乙未曄綜熙先及其子弟黨與皆伏誅曄母至市涕泣責曄以手擊曄頸曄色不怍妹及妓妾來别曄悲涕流漣綜曰舅殊不及夏侯色曄收淚而止謝約不預逆謀見兄綜與熙先遊嘗諌之曰此人輕事好竒不近於道果鋭無檢未可與狎綜不從而敗綜母以子弟自蹈逆亂獨不出視曄語綜曰姊今不來勝人多矣收籍曄家樂器服玩竝皆珍麗妓妾不勝珠翠母居止單陋唯有一厨盛樵薪弟子冬無被叔父單布衣裴子野論曰夫有逸羣之才必思冲天之據蓋俗之量則憤常均之下其能守之以道將之以禮殆為鮮乎劉弘仁范蔚宗皆忸志而貪權矜才以徇逆纍葉風素一朝而隕嚮之所謂智能翻為亡身之具矣徐湛之所陳多不盡為曄等辭所連引上赦不問臧質熹之子也先為徐兖二州刺史與曄厚善曄敗以為義興太守有司奏削彭城王義康爵收付廷尉治罪丁酉詔免義康及其男女皆為庶人絶屬籍徙付安成郡以寧朔將軍沈邵為安成相領兵防守邵璞之兄也義康在安成讀書見淮南厲王長事廢書歎曰自古有此我乃不知得罪為宜也庚戌以前豫州剌史趙伯符為護軍將軍伯符孝穆皇后之弟子也二十四年冬十月壬午胡藩之子誕世殺豫章太守桓隆之據郡反欲奉前彭城王義康為主前交州剌史檀和之去官歸過豫章擊斬之二十八年胡誕世之反也江夏王義恭等奏彭城王義康數有怨言搖動民聽故不逞之族因以生心請徙廣州上將徙義康先遣使語之義康曰人生㑹死吾豈愛生必為亂階雖逺何益請死於此恥復屢遷竟未及往魏師之瓜步人情忷懼上慮不逞之人復奉義康為亂太子劭及武陵王駿尚書左僕射何尚之屢啓宜早為之所上乃遣中書舍人嚴龍齎藥賜義康死義康不肯服曰佛教不許自殺願隨宜處分使者以𬒳掩殺之宋文圖恢復宋文帝元嘉七年帝自踐位以來有恢復河南之志三月戊子詔簡甲卒五萬給右將軍到彥之統安北將軍王仲德兖州剌史竺靈秀舟師入河又使驍騎將軍假宏將精兵八千直指虎牢豫州剌史劉德武將兵一萬繼進後將軍長沙王義欣將兵三萬監征討諸軍事先遣殿中將軍田竒使於魏告魏主曰河南舊是宋土中為彼所侵今當修復舊境不關河北魏主大怒曰我生髮未燥已聞河南是我地此豈可得必若進軍今當權斂戍相避須冬寒地淨河冰堅合自更取之甲午以前南廣平太守尹沖為司州剌史長沙王義欣出鎮彭城為衆軍聲援以游擊將軍胡藩戍廣陵行府州事魏南邊諸將表稱宋人大嚴將入寇請兵三萬先其未發逆擊之足以挫其鋭氣使不敢深入因請悉誅河北流民在境上者以絶其鄉導魏主使公卿議之皆以為當然崔浩曰不可南方下􅊜入夏之後水潦方降草木蒙密地氣鬱蒸易生疾癘不可行師且彼既嚴僃則城守必固留屯久攻則糧運不繼分軍四掠則衆力單寡無以應敵以今擊之未見其利彼若果能北來宜待其勞倦秋涼馬肥因敵取食徐往擊之此萬全之計也朝廷羣臣及西北守將從陛下征伐西平赫連北破蠕蠕多獲美女珍寶牛馬成羣南邊諸將聞而慕之亦欲南鈔以取資財皆營私計為國生事不可從也魏主乃止諸將復表南寇已至所部兵少乞簡幽州以南徑兵助已戍守及就漳水造船嚴僃以拒之公卿皆以宜如所請并署司馬楚之魯軌韓延之等為將帥使招誘南人浩曰非長䇿也楚之等皆彼所畏忌今聞國家悉發幽州以南精兵大造舟艦隨以輕騎謂國家欲存立司馬氏誅除劉宗必舉國震駭懼於滅亡當悉發精鋭并心竭力以死爭之則我南邊諸將無以禦之今公卿欲以威力却敵乃所以速之也張虛聲而召實害此之謂矣故楚之之徒往則彼來止則彼息其勢然也且楚之等皆纎利小才止能招合輕薄無賴而不能成大功徒使國家兵連禍結而已昔魯軌說姚興以取荆州至則敗散為蠻人掠賣為奴終於禍及姚泓此已然之效也魏主未以為然浩乃復陳天時以為南方舉兵必不利曰今兹害氣在楊州一也庚午自刑先發者傷二也日食晝晦宿值斗牛三也熒惑伏於翼軫主亂及喪四也太白未出進兵者敗五也夫興國之君先修人事次盡地利後觀天時故萬舉萬全今劉義隆新造之國人事未洽災變屢見天時不協舟行水涸地利不盡三者無一可而義隆行之必敗無疑魏主不能違衆言乃詔冀定相三州造船三千艘簡幽州以南戍兵集河上以僃之夏六月魏主使平南大將軍丹楊王大毗屯河上以司馬楚之為安南大將軍荆州剌史封琅邪王屯頴川以僃宋到彥之自淮入泗泗水滲日行才十里自四月至秋七月始至須昌乃泝河西上魏主以河南四鎮兵少命諸軍悉收衆北渡戊子魏碻磝戍兵棄城去戊戌滑臺戍兵亦去庚子魏主以大鴻臚陽平公杜超為都督冀定相三州諸軍事太宰進爵陽平王鎮鄴為諸軍節度庚戌魏洛陽虎牢戍兵皆棄城去到彥之留朱修之守滑臺尹沖守虎牢建武將軍杜驥守金墉諸軍進屯靈昌津列守南岸至于潼關於是司兖既平諸軍皆喜王仲德獨有憂色曰諸賢不諳北土情僞必墮其計胡虜雖仁義不足而凶狡有餘今斂戍北歸必并力完聚若河氷既合將復南來豈可不以為憂乎八月魏主遣冠軍將軍安頡督護諸軍擊到彥之丙寅彥之遣禆將吳興姚聳夫渡河攻冶坂與頡戰聳夫兵敗死者甚衆戊寅魏主遣征西大將軍長孫道生㑹丹楊王大毗屯河上禦彥之冬十月到彥之王仲德㳂河置守還保東平乙亥魏安頡自委粟津濟河攻金墉金墉城不治既久又無糧食杜驥欲棄城走恐獲罪𥘉髙祖滅秦遷其鍾虡於江南有大鍾沒於洛水帝使姚聳夫將千五百人往取之驥紿之曰金墉城已修完糧食亦足所乏者人耳今虜騎南渡當相與併力禦之大功既立牽鍾未晚聳夫從之既至見城不可守乃引去驥遂南遁丙子安頡拔洛陽殺將士五千餘人杜驥歸言於帝曰本欲以死固守姚聳夫及城遽走人情沮貶不可復禁上大怒誅聳夫於壽陽聳夫勇健諸偏禆莫及也魏河北諸軍㑹於七女津到彥之恐其南渡遣禆將王蟠龍泝流奪其船杜超等擊斬之安頡與龍驤將軍陸俟進攻虎牢辛巳拔之尹冲及滎陽太守清和崔模降魏十一月壬辰加征南大將軍檀道濟都督征討諸軍事帥衆伐魏甲午魏壽光侯叔孫建汝隂公長孫道生濟河而南到彥之聞洛陽虎牢不守諸軍相繼奔敗欲引兵還殿中將軍垣護之以書諫之以為宜使笁靈秀助朱修之守滑臺自帥大軍進擬河北且曰昔人有連年攻戰失衆乏糧猶張膽爭前莫肯輕退況今青州豐穰濟漕流通士馬飽逸威力無損若空棄滑臺坐喪成業豈朝廷受任之㫖邪彥之不從護之苗之子也彥之欲焚舟步走王仲德曰洛陽既陷虎牢不守自然之勢也今虜去我猶千里滑臺尚有彊兵若遽捨舟南走士卒必散當引舟入濟至馬耳谷口更詳所宜彥之先有目疾至是大動且將士疾疫乃引兵自清入濟南至歷城焚舟棄甲步趨彭城笁靈秀棄須昌南奔湖陸青兖大擾長沙王義欣在彭城將佐恐魏兵大至勸義欣委鎮還都義欣不從魏兵攻濟南濟南太守武進蕭承之帥數百人拒之魏衆大集承之使偃兵開城門衆曰賊衆我寡奈何輕敵之甚承之曰今懸守窮城事已危急若復示弱必為所屠唯當見彊以待之耳魏人疑有伏兵遂引去戊戌魏叔孫建攻笁靈秀於湖陸靈秀大敗死者五千餘人建還屯范城辛丑魏安頡督諸軍攻滑臺魏以叔孫建都督冀青等四州諸軍事十二月右將軍到彥之安北將軍王仲德皆下獄免官兖州剌史笁靈秀坐棄軍伏誅上見垣護之書而善之以為北髙平太守彥之之北伐也甲兵資實甚盛及敗還委棄蕩盡府藏武庫為之空虛八年春正月丙申檀道濟等自淸水救滑臺魏叔孫建長孫道生拒之丁酉道濟至壽張遇魏安平么乙旃眷道濟帥寧朔將軍王仲德驍騎將軍段宏奮擊大破之轉戰至髙梁亭斬魏濟州剌史悉煩庫結二月檀道濟等進至濟上二十餘日閒前後與魏三十餘戰道濟多捷軍至歷城叔孫建等縱輕騎邀其前後焚燒穀草道濟軍乏食不能進由是安頡司馬楚之等得專力攻滑臺魏主復使楚兵將軍王慧龍助之朱修之堅守數月糧盡士卒熏鼠食之辛酉魏克滑臺執修之及東郡太守申謨虜獲萬餘人檀道濟等食盡自歷城引還軍士有亡降魏者具告之魏人追之衆忷懼將潰道濟夜唱籌量沙以所餘少米覆其上及旦魏軍見之謂道濟資糧有餘以降者為妄而斬之時道濟兵少魏兵甚盛騎士四合道濟命軍士皆𬒳甲巳白服乘輿引兵徐出魏人以為有伏兵不敢逼稍稍引退道濟全軍而返青州刺史蕭思話聞道濟南歸欲委鎮保險濟南太守蕭承之固諌不從丁丑思話棄鎮奔平昌參軍劉振之戍下邳聞之亦妄城走魏軍竟不至而東陽積聚已為百姓所焚思話坐徴繫尚方庚戌魏安頡等還平城魏主嘉朱修之守節拜侍中妻以宗女𥘉帝之遣到彥之也戒之曰若北國兵動先其未至徑前入河若其不動留彭城勿進及安頡得宋俘魏主始聞其言謂公卿曰卿輩前謂我用崔浩計為謬驚怖固諌常勝之家始皆自謂踰人至於歸終乃不能及司馬楚之上疏以為諸方已平請大舉伐宋魏主以兵久勞不許徴楚之為散騎常侍以王慧龍為滎陽太守慧龍在郡十年農戰並修大著聲績歸附者萬餘家帝縱反間於魏云慧龍自以功髙位下欲引宋人入寇因執司馬楚之以叛魏主聞之賜慧龍璽書曰劉義隆畏將軍如虎欲相中害朕自知之風塵之言想不足介意帝復遣刺客吕玄伯刺之曰得慧龍首封二百户男賞絹千匹玄伯詐為降人求屏人有所論慧龍疑之使人探其懷得尺刀玄伯叩頭請死慧龍曰各為其主耳釋之左右諌曰宋人為謀未巳不殺玄伯無以制將來慧龍曰死生有命彼亦安能害我我以仁義為扞蔽又何憂乎遂捨之夏閏六月魏主遣散騎侍郎周紹來聘且求昏帝依違答之九年夏五月帝遣使者趙道生聘于魏六月魏主遣散騎常侍鄧頴來聘十年春二月壬午魏主如河西遣兼散騎常侍宋宣來聘且為太子晃求婚帝依違答之冬十二月魏寧朔將軍盧玄來聘十四年春二月帝遣散騎常侍劉熙伯如魏議納幣㑹帝女亡而止十八年秋八月辛亥魏遣散騎侍郎張偉來聘二十一年魏王使貟外散騎常侍髙濟來聘二十二年夏六月帝謀伐魏冬十一月魏選六州驍騎二萬使永昌王仁髙涼王那分將之為二道掠淮泗以北徙青徐之民以實河北二十三年春二月太原顔白鹿私入魏境為魏人所得將殺之詐云青州刺史杜驥使其歸誠魏人送白鹿詣平城魏主喜曰我外家也使崔浩作書與驥且命永昌王仁髙涼王那將兵迎驥攻冀州剌史申恬於歷城杜驥遣其府司馬夏侯祖歡等將兵救歷城魏人遂寇兖青冀三州至清東而還殺掠甚衆北邊騷動帝以魏寇為憂咨訪羣臣御史中丞何承天上表以為凡僃胸奴之䇿不過二科武夫盡征伐之謀儒主講和親之約今若欲追蹤衛霍自非大田淮泗內實青徐使民有贏儲野有積榖然後發精卒十萬一舉蕩夷則不足為也若但欲遣軍追討報其侵㬥則彼必輕騎奔走不肯㑹戰徒興巨費不損於彼報復之役將遂無已斯䇿之最末者也安邊固守於計為長臣竊以曹孫之霸才均智敵江淮之閒不居各數百里何者斥候之郊非耕牧之地故堅壁清野以候其來整甲繕兵以乘其弊保民全境不出此塗要而歸之其䇿有四一曰移逺就近今青兖舊民及冀州新附在界首者三萬餘家可悉徙置大峴之南以實內地二曰多築城邑以居新徙之家假其經用春夏佃牧秋冬入保寇至之時一城千家堪戰之士不下二千其餘羸弱猶能登陴鼓譟足抗羣虜三萬矣三曰纂偶車牛以載糧械計千家之資不下五百耦牛為車五百兩參合鉤連以衛其衆設使城不可固平行趨險賊所不能干有急徴發信宿可聚四曰計丁課仗凡戰士二千隨其便能各自有仗素所服習銘刻由己還保輸之於庫出行請以自新弓簳利鐡民不得者官以漸充之數年之內軍用粗僃矣近郡之師逺屯清濟功費既重嗟怨亦深以臣料之未若即用彼衆之易也今因民所利導而帥之兵彊而敵不戒國富而民不勞比於優復隊伍坐食糧廪者不可同年而校矣二十六年帝欲經略中原羣臣爭獻䇿以迎合取寵彭城太守王玄謨尤好進言帝謂侍臣曰觀玄謨所陳令人有封狼居須意御史中丞袁淑言於上曰陛下今當席卷趙魏檢玉岱宗臣逢千載之㑹願上封禪書上恱淑耽之曾孫也秋七月辛未以廣陵王誕為雍州刺史上以襄陽外接關河欲廣其資力乃罷江州軍府文武悉配雍州湘州入臺租稅悉給襄陽二十七年春正月魏主將入寇二月甲午大獵於梁川帝聞之敕淮泗諸郡若魏寇小至則各堅守大至則拔民歸壽陽邊戍偵候不明辛亥魏主自將步騎十萬奄至南頓太守鄭琨潁川太守郭道隱並棄城走是時豫州刺史南平王鑠鎮壽陽遣左軍行參軍陳憲行汝南郡事守懸瓠城中戰士不滿千人魏主圍之三月以軍興減內外百官俸三分之一魏人晝夜攻懸瓠多作髙樓臨城以射之矢下如雨城中負戶以汲施大鉤於衝車之端以牽樓堞壞其南城陳憲內設女牆外立木柵以拒之魏人填塹肉薄登城憲督厲將士苦戰積尸與城等魏人乘尸上城短兵相接憲鋭氣愈奮戰士無不一當百殺傷萬計城中死者亦過半魏主遣永昌王仁將步騎萬餘驅所掠六郡生口北屯汝陽時徐州剌史武陵王駿鎮彭城帝遣閒使命駿發騎齎三日糧襲之駿發百里內馬得千五百匹分為五軍遣參軍劉泰之帥安北騎兵行參軍垣謙之田曹行參軍臧肇之集曹行參軍尹定武陵左常侍杜幼文殿中將軍程天祚等將之直趨汝陽魏人唯慮救兵自壽陽來不僃彭城丁酉泰之等潜進擊之殺三千餘人燒其輜重魏人奔散諸生口悉得東走魏人偵知泰之等兵無後繼復引兵擊之垣謙之先退士卒驚亂棄仗走泰之為魏人所殺肇之溺死天祚為魏所擒謙之定幼文及士卒免者九百餘人馬還者四百匹魏主攻懸瓠四十二日帝遣南平內史臧質詣壽陽與安蠻司馬劉康祖共將兵救懸瓠魏主遣殿中尚書任城公乞地真逆拒之質等擊斬乞地真康祖道錫之從兄也夏四月魏主引兵還癸卯至平城壬子安北將軍武陵王駿降號鎮軍將軍垣謙之伏誅尹定杜幼文付尚方以陳憲為龍驤將軍汝南新蔡二郡太守魏主遺帝書曰前蓋吳反逆扇動關隴彼復使人就而誘之丈夫遺以弓矢婦人遺以環釧是曹正欲譎誑取賂豈有逺相服從之理為大丈夫何不自來取之而以貨誘我邊民募往者復除七年是賞姦也我今來至此土所得多少孰與彼前後得我民邪彼若欲存劉氏血食者當割江以北輸之攝守南度如此當釋江南使彼居之不然可善敕方鎮刺史守宰嚴供帳之具來秋當往取楊州大勢已至終不相縱彼往日北通蠕蠕西結赫連沮渠吐谷渾東連馮弘髙麗凡此數國我皆滅之以此而觀彼豈能獨立蠕蠕吳提吐賀真皆已死我今北征先除有足之寇彼若不從命來秋當復往取之以彼無足故不先討耳我往之日彼作何計為掘塹自守為築垣以自障也我當顯然往取楊州不若彼翳行竊步也彼來偵諜我已擒之復縱還其人目所盡見委曲善問之彼前使裴方明取仇池既得之疾其勇功已不能容有臣如此尚殺之烏得與我校邪彼非我敵也彼常欲與我一交戰我亦不癡復非符堅何時與彼交戰晝則遣騎圍繞夜則離彼百里外宿吳人止有斫營伎彼募人以來不過行五十里天已明矣彼募人之首豈得不為我有哉彼公時舊臣雖老猶有智䇿知今已殺盡豈非天資我邪取彼亦不須我兵刃此有善呪婆羅門當使鬼縛以來耳六月上欲伐魏丹楊尹徐湛之吏部尚書江湛彭城太守王玄謨等並勸之左軍將軍劉康祖以為歲月已晚請待明年上曰北方苦虜虐政義徒並起頓兵一周沮向義之心不可太子步兵校尉沈慶之諌曰我步彼騎其勢不敵檀道濟再行無功到彥之失利而返今料王玄謨等未踰兩將六軍之盛不過往時恐重辱王師上曰王師再屈别自有由道濟養寇自資彥之中塗疾動虜所恃者唯馬今夏水浩汗河道流通泛舟北下碻磝必走滑臺小戍易可覆拔克此二城館榖弔民虎牢洛陽自然不固比及冬𥘉城守相接虜馬過河即成擒也慶之又固陳不可上使徐湛之江湛難之慶之曰治國譬如治家耕當問奴織當訪婢陛下今欲伐國而與白靣書生輩謀之事何由濟上大笑太子劭及護軍將軍蕭思話亦諌上皆不從魏主聞上將北伐復與上書曰彼此和好日久而彼志無厭誘我邊民今春南巡聊省我民驅之使還今聞彼欲自來設能至中山及桑乾川隨意而行來亦不迎去亦不送若厭其區宇者可來平城居我亦往楊州相與易地彼年已五十未嘗出戶雖自力而來如三歲嬰兒與我鮮卑生長馬上者果如何哉更無餘物可以相與今送獵馬十二匹并氊藥等物彼來道逺馬力不足可乘或不服水土藥可自療也秋七月庚午詔曰虜近雖摧挫獸心靡革比得河朔秦雍華戎表疏歸訴困棘跋望綏拯潜相糾結以候王師芮芮亦遣間使逺輸誠𣢾誓為掎角經略之㑹實在兹日可遣寧朔將軍王玄謨帥太子步兵校尉沈慶之鎮軍咨議參軍申坦水軍入河受督於青冀二州刺史蕭斌太子左衛率臧質驍騎將軍王方回徑造許洛徐兖二州刺史武陵王駿豫州刺史南平王鑠各勒所部東西齊舉梁南北秦三州刺史劉秀之震蕩汧隴太尉江夏王義恭出次彭城為衆軍節度坦鍾之曾孫也是時軍旅大起王公妃主及朝士牧守下至富民各獻金帛雜物以助國用又以兵力不足悉發青冀徐豫二兖六州三五民丁倩使暫行符到十日裝束緣江五郡集廣陵緣淮三郡集盱眙又募中外有馬步衆藝武力之士應科者皆加厚賞有司又奏軍用不充楊南徐兖江四州富民家資滿五十萬僧尼滿二十萬並四分借一事息即還建武司馬申元吉引兵趣碻磝乙亥魏濟州剌史王買德棄城走蕭斌遣將軍崔猛攻樂安魏青州剌史張淮之亦棄城走斌與沈慶之留守碻磝使王玄謨進圍滑臺雍州刺史隨王誕遣中兵參軍柳元景振威將軍尹顯祖奮武將軍曾方平建武將軍薛安都略陽太守龐法起將兵出弘農後軍外兵參軍龎季明年七十餘自以關中豪右請入長安招合夷夏誕許之乃自資谷入盧氏盧氏民趙難納之季明遂誘說士民應之者甚衆安都等因之自熊耳山出元景引兵繼進豫州剌史南平王鑠遣中兵參軍胡盛之出汝南梁坦出上蔡向長社魏荆州剌史魯爽鎮長社棄城走爽軌之子也幢主王陽兒擊魏豫州剌史僕蘭破之僕蘭奔虎牢鑠又遣安蠻司馬劉康祖將兵助坦進逼虎牢魏羣臣𥘉聞有宋師言於魏主請遣兵救緣河榖帛魏主曰馬今未肥天時尚熱速出必無功若兵來不止且還隂山避之國人本著羊皮袴何用綿帛展至十月吾無憂矣九月辛卯魏主引兵南救滑臺命太子晃屯漠南以僃柔然吳王余守平城庚子魏發州郡兵五萬分給諸軍王玄謨士衆甚盛器械精嚴而玄謨貪愎好殺𥘉圍滑臺城中多茅屋衆請以火箭燒之玄謨曰彼吾財也何遽燒之城中即撤屋穴處時河洛之民競出租榖操兵來赴者日以千數玄謨不即其長帥而以配私昵家付匹布責大梨八百由是衆心失望攻城數月不下聞魏救將至衆請發車為營玄謨不從冬十月癸亥魏主至枋頭使關內侯代人陸真夜與魏人犯圍潜入滑臺撫慰城中且登城視玄謨營曲折還報乙丑魏王渡河衆號百萬鞞鼓之聲震動天地玄謨懼退走魏人追擊之死者萬餘人麾下散亡略盡委棄軍資器械山積先是玄謨遣鍾離太守垣護之以百舸為前鋒據石濟在滑臺西南百二十里護之聞魏兵將至馳書勸玄謨急攻曰昔武皇攻廣固死沒者甚衆況今事迫於曩日豈得計士衆傷疲願以屠城為急玄謨不從及玄謨敗退不暇報護之魏人以所得玄謨戰艦連以鐡鎖三重斷河以絶護之還路河水迅急護之中流而下每至鐡鎖以長柯斧斷之魏不能禁唯失一舸餘皆完僃而返蕭斌遣沈慶之將五千人救玄謨慶之曰玄謨士衆疲老寇虜已逼得數萬人乃可進小軍輕往無益也斌固遣之㑹玄謨遁還斌將斬之慶之固諌曰佛狸威震天下控弦百萬豈玄謨所能當且殺戰將以自弱非良計也斌乃止斌欲固守碻磝慶之曰今青冀虛弱而坐守窮城若虜衆東過清東非國家有也碻磝孤絶復作朱修之滑臺耳㑹詔使至不聽斌等退師斌復召諸將議之並謂宜留慶之曰閫外之事將軍得以專之詔從逺來不知事勢節下有一范增不能用空議何施斌及坐者並笑曰沈公乃更學問慶之厲聲曰衆人雖知古今不如下官耳學也斌乃使王玄謨戍碻磝申坦垣護之據清口自帥諸軍還歷城閏月龐法起等諸軍入盧氏斬縣令李封以趙難為盧氏令使帥其衆為鄉導栁元景自百丈崖從諸軍於盧氏法起等進攻弘農辛未拔之擒魏弘農太守李𥘉古拔薛安都留屯弘農丙戌龐法起進向潼關魏主命諸將分道並進永昌王仁自洛陽趣壽陽尚書長孫真趣馬頭楚王建趣鍾離髙涼王那自青州趣下邳魏主自東平趣鄒山十一月辛卯魏主至鄒山魯郡太守崔邪利為魏所擒魏主見秦始皇石刻使人排而仆之以太牢祠孔子楚王建自清西進屯蕭城步尼公自清東進屯留城武陵王駿遣參軍馮文恭將兵向蕭城江夏王義恭遣軍主嵇玄敬將兵向留城文恭為魏所敗步尼公遇玄敬引兵趣苞橋欲渡清西沛縣民燒苞橋夜於林中擊鼓魏為宋兵大至爭渡苞水溺死者殆半詔以柳元景為弘農太守元景使薛安都尹顯祖先引兵就龐法起等於陜元景於後督租陜城險固諸軍攻之不拔魏洛州刺史張是連提帥衆二萬度崤救陜安都等與戰於城南魏人縱突騎諸軍不能敵安都怒脫兜鍪解鎧唯著絳納兩當衫馬亦去具裝瞋目橫矛單騎突陳所向無前魏人夾射不能中如是數四殺傷不可勝數㑹日暮别將魯元保引兵自函谷關至魏兵乃退元景遣軍副柳元怙將步騎二千救安都等夜至魏人不之知明日安都等陳於城西南曾方平謂安都曰今勍敵在前堅城在後是吾取死之日卿若不進我當斬卿我若不進卿斬我也安都曰善卿言是也遂合戰元怙引兵自南門鼓譟直出旌旗甚盛魏衆驚駭安都梃身奮擊流血凝肘矛折易之更入諸軍齊奮自旦至日昊魏衆大潰斬張是連提及將卒三千餘級其餘赴河塹死者甚衆生降二十餘人明日元景至讓降者曰汝輩本中國民今為虜盡力力屈乃降何也皆曰虜驅民使戰後出者滅族以騎蹙步未戰先死此將軍所親見也諸將欲盡殺之元景曰今王旗北指當令仁聲先路盡釋而遣之皆稱萬歲而去甲午克陜城龐法起等進攻潼關魏戍主婁須棄城走法起等據之關中豪傑所在蜂起及四山羌胡皆來送𣢾上以王玄謨敗退魏兵深入柳元景等不宜獨進皆召還元景使薛安都斷後引兵歸襄陽詔以元景為襄陽太守魏永昌王仁攻懸瓠項城拔之帝恐魏兵至壽陽召劉康祖使還癸卯仁將八萬騎追及康祖於尉武康祖有衆八千人軍副胡盛之欲依山險間行取至康祖怒曰臨河求敵遂無所見幸其自送奈何避之乃結車營而進下令軍中曰顧望者斬首轉步者斬足魏人四靣攻之將士皆殊死戰自旦至晡殺魏兵萬餘人流血沒踝康祖身被十創意氣彌厲魏分其衆為三且休且戰㑹日暮風急魏以騎負草燒車營康祖隨𥙷其闕有流矢貫康祖頸墜馬死餘衆不能戰遂潰魏人掩殺殆盡南平王鑠使左軍行參軍王羅漢以三百人戍尉武魏兵至衆欲南依卑林以自固羅漢以受命居此不去魏人攻而擒之鎖其頸使三郎將掌之羅漢夜斷三郎將首抱鎖亡奔盱眙魏永昌王仁進逼壽陽焚掠馬頭鍾離南平王鑠嬰城固守魏軍在蕭城去彭城十餘里彭城兵雖多而食少太尉江夏王義恭欲棄彭城南歸安北中兵參軍沈慶之以為歷城兵少食多欲為函箱車陳以精兵為外翼奉二王及妃女直趨歷城分兵配護軍蕭思話使留守彭城太尉長史何朂欲席卷奔鬱洲自海道還京師義恭去意已判唯二議彌日未決安北長史沛郡太守張暢曰若歷城鬱洲有可至之理下官敢不髙贊今城中乏食百姓咸有走志但以關扄嚴固欲去莫從耳一旦動足則各自逃散欲至所在何由可得今軍食雖寡朝夕猶未窘罄豈有捨萬安之術而就危亡之道若此計必行下官請以頸血汚公馬蹄武陵王駿謂義恭曰阿父既為總統去留非所敢干道民忝為城主而委鎮奔逃實無顔復奉朝廷必與此城共其存沒張長史言不可異也義恭乃止壬子魏主至彭城立氊屋於戲馬臺以望城中馬文恭之敗也隊主蒯應沒於魏魏主遣應至小市門求酒及甘蔗武陵王駿與之仍就求橐駝明日魏主使尚書李孝伯至南門餉義恭貂裘餉駿橐駝及騾且曰魏主致意安北可暫出見我我亦不攻此城何為勞苦將士備守如此駿使張暢開門出見之曰安北致意魏主常遲靣寫但以人臣無境外之交恨不暫悉備守乃邊鎮之常恱以使之則勞而無怨耳魏主求甘橘及借博具皆與之復餉氊及九種鹽胡豉又借樂器義恭應之曰受任戎行不齎樂具孝伯問暢何為匆匆閉門絶橋暢曰二王以魏主營壘未立將士疲勞此精甲十萬恐輕相陵踐故閉城耳待休息士馬然後共治戰埸刻日交戲孝伯曰賔有禮主則擇之暢曰昨見衆賔至門未為有禮魏主使人來言曰致意太尉安北何不遣人來至我所彼此之情雖不可盡要須見我小大知我老少觀我為人若諸佐不可遣亦可使僮幹來暢以二王命對曰魏主形狀才力久為來往所具李尚書親自銜命不患彼此不盡故不復遣使孝伯又曰王玄謨亦常才耳南國何意作如此任使以致奔敗自入此境七百餘里主人竟不能一相拒逆鄒山之險君家所慿前鋒始接崔邪利遽藏入穴諸將倒曵出之魏主賜其餘生今從在此暢曰王玄謨南土偏將不謂為才但以之為前驅大軍未至河冰向合玄謨因夜還軍致戎馬小亂耳崔邪利陷沒何損於國魏主自以數十萬衆制一崔邪利乃足言邪知入境七百里無相拒者此自太尉神算鎮軍聖略用兵有機不用相語孝伯曰魏主當不圍此城自帥衆軍直造瓜步南事若辦彭城不待圍若其不捷彭城亦非所須也我今當南飲江湖以療渴耳暢曰去留之事自適彼懷若虜馬遂得飲江便為無復天道先是童謡云虜馬飲江水佛狸死卯年故暢云然暢音容雅麗孝伯與左右皆歎息孝伯亦辨贍且去謂暢曰長史深自愛相去步武恨不執手暢曰君善自愛冀蕩定有期相見無逺君若得還宋朝今為相識之始上起楊文德為輔國將軍引兵自漢中西入搖動汧隴魏主攻彭城不克十二月丙辰朔引兵南下使中書郎魯秀出廣陵髙涼王那出山陽永昌王仁出橫江所過無不殘滅城邑皆望風奔潰戊午建康纂嚴己未魏兵至淮上上使輔國將軍臧質將萬人救彭城至盱眙魏主已過淮質使冗從僕射胡崇之積弩將軍臧澄之營東山建威將軍毛熙祚據前浦質營於城南乙丑魏燕王談攻崇之等三營皆敗沒質案兵不敢救是夕質軍亦潰質棄輜重器械單將七百人赴城𥘉盱眙太守沈璞到官王玄謨猶在滑臺江淮無警璞以郡當衝要乃繕城浚隍積財榖儲矢石為城守之僃僚屬皆非之朝廷亦以為過及魏兵南向守宰多棄城走或勸璞宜還建康璞曰虜若以城小不顧夫復何懼若肉薄來攻此乃吾報國之秋諸君封侯之日也奈何去之諸君嘗見數十萬人聚於小城之下而不敗者乎昆陽合肥前事之明驗也衆心稍定璞收集得二千精兵曰足矣及臧質向城衆謂璞曰虜若不攻城則無所事衆若其攻城則城中止可容見力耳地狹人多鮮不為患且敵衆我寡人所共知若以質衆能退敵完城者則全功不在我若避罪歸都㑹資舟楫必更相蹂踐正足為患不若閉門勿受璞歎曰虜必不能登城敢為諸軍保之舟楫之計固已久息虜之殘害古今未有屠剝之苦衆所共見其中幸者不過得驅還北國作奴婢耳彼雖烏合寧不憚此邪所謂同舟而濟胡越一心者也今兵多則虜退速少則退緩吾寧可欲專功而留虜乎乃開門納質質見城中豐實大喜衆皆稱萬歲因與璞共守魏人之南寇也不齎糧用唯以抄掠為資及過淮民多竄匿抄掠無所得人馬飢乏聞盱眙有積粟欲以為北歸之資既破崇之等一攻城不拔即留其將韓元興以數千人守盱眙自帥大衆南向由是盱眙得益完守備庚午魏主至瓜步壞民廬舍及伐葦為筏聲言欲渡江建康震懼民皆荷檐而立壬午內外戒嚴丹陽統內盡戶發丁王公以下子弟皆從役命領軍將軍劉遵考等將兵分守津要遊邏上接于湖下至蔡洲陳艦列營周亘江濵自采石至于暨陽六七百里太子劭出鎮石頭揔統水軍丹楊尹徐湛之守石頭倉城吏部尚書江湛兼領軍軍事處置悉以委焉上登石頭城有憂色謂江湛曰北伐之計同議者少今日士民勞怨不得無慙貽大夫之憂豫之過也又曰檀道濟若在豈使胡馬至此上又登莫府山觀望形勢購魏主及王公首許以封爵金帛又募人齎野葛酒置空村中欲以毒魏人竟不能傷魏主鑿瓜步山為蟠道於其上設氊屋魏主不飲河南水以橐駝負河北水自隨餉上橐駝名馬并求和請婚上遣奉朝請田竒餉以珍羞異味魏主得黃甘即噉之并大進酃酒左右有附耳語者疑食中有毒魏主不應舉手指天以其孫示竒曰吾逺來至此非欲為功名實欲繼好息民永結姻投宋若能以女妻此孫我以女妻武陵王自今匹馬不復南顧竒還上召太子劭及羣臣議之衆並謂宜許江湛曰戎狄無親許之無益劭怒謂湛曰今三王在厄詎宜苟執異議聲色甚厲坐散俱出劭使班劒及左右排湛湛幾至僵仆劭又言於上曰北伐敗辱數州淪破獨有斬江湛徐湛之可以謝天下上曰北伐自是我意江徐但不異耳由是太子與江徐不平魏亦竟不成婚二十八年春正月丙戌朔魏主大㑹羣臣於瓜步山上班爵行賞有差魏人緣江舉火太子右衛率尹弘言於上曰六夷如此必走丁亥魏掠居民焚廬舍而去江夏王義恭以碻磝不可守召王玄謨還歷城魏人追擊敗之遂取碻磝𥘉上聞魏將入寇命廣陵太守劉懷之逆燒城府船乘盡帥其民渡江山陽太守蕭僧珍悉斂其民入城臺送糧收詣盱眙及滑臺者以路不通皆留山陽蓄陂水令滿須魏人至決以灌之魏人過山陽不敢留因攻盱眙魏主就臧質求酒質封溲便與之魏主怒築長圍一夕而合運東山土石以填塹作浮橋於君山絶水陸道魏主遺質書曰吾今所遣鬪兵盡非我國人城東北是丁零與胡南是氐羌設使丁零死正可減常山趙郡賊胡死減并州賊氐羌死減關中賊卿若殺之無所不利質復書曰省示具悉姦懷爾自恃四足屢犯邊境王玄謨退於東申坦散於西爾知其所以然邪爾獨不聞童謡之言乎蓋卯年未至故以二軍開飲江之路耳冥期使然非復人事寡人受命相滅期之白登師行未逺爾自送死豈容復令爾生全饗有桑乾哉爾有幸得為亂兵所殺不幸則生相鎖縛載以一驢直送都市耳我本不圖全若天地無靈力屈於爾韲之粉之屠之裂之猶未足以謝本朝爾智識及衆力豈能勝符堅邪今春雨已降兵方四集爾但安意攻城勿遽走糧食乏者可見語當出廩相貽得所送劒刀欲令我揮之爾身邪魏主大怒作鐡牀於其上施鐡鑱曰破城得質當坐之此上質又與魏衆書曰爾語虜中諸士庶佛狸見與書相待如此爾等正朔之民何為自取糜滅豈可不知轉禍為福邪并寫臺格以與之云斬佛狸首封萬戶侯賜布絹各萬匹魏人以鉤車鉤城樓城內繫以彄絙數百人唱呼引之車不能退既夜縋桶懸卒出截其鉤獲之明日又以衝車攻城城土堅密每至頽落不過數升魏人乃肉薄登城分番相代墜而復升莫有退者殺傷萬計尸與城平凡攻之三旬不拔㑹魏軍中多疾疫或告以建康遣水軍自海入淮又敕彭城斷其歸路二月丙辰朔魏主燒攻具退走盱眙人欲追之沈璞曰今兵不多雖可固守不可出戰但整舟楫示若欲北渡者以速其走計不須實行也臧質以璞城主使之上露板璞固辭歸功於質上聞益嘉之魏師過彭城江夏王義恭震懼不敢擊或告虜驅南口萬餘夕應宿安王陂去城數十里今追之可悉得諸將皆請行義恭禁不許明日驛使至上敕義恭悉力急追魏師已逺義恭乃遣鎮軍司馬檀和之向蕭城魏人先已聞之盡殺所驅者而去程天祚逃歸魏人凡破南兖徐兖豫青冀六州殺掠不可勝計丁壯者即加斬截嬰兒貫於槊上槃舞以為戲所過郡縣赤地無餘春燕歸巢於林木魏之士馬死傷亦過半國人皆尤之上每命將出師常授以成律交戰日時亦待中詔是以將帥趑趄莫敢自決又江南白丁輕進易退此其所以敗也自是邑里蕭條元嘉之政衰矣癸酉詔賑恤郡縣民遭寇者蠲其稅調甲戌降太尉義恭為驃騎將軍開府儀同三司戊寅魏主濟河辛巳降鎮軍將軍武陵王駿為北中郎將壬午上如瓜步是日解嚴三月乙酉帝還宫己亥魏主還平城飲至告廟以降民五萬餘家分置近畿𥘉魏主過彭城遣人語城中曰食盡且去須麥熟更來及期江夏王義恭議欲芟麥剪苗移民保聚鎮軍録事參軍王孝孫曰虜不能復來既自可保如其更至此議亦不可立百姓閉其內城饑饉日久方春之月野採自資一入保聚餓死立至民知必死何可制邪虜若必來芟麥無晚四坐默然莫之敢對長史張暢曰孝孫之議實有可尋鎮軍府典籖董元嗣侍武陵王駿之側進曰王録事議不可奪别駕王子夏曰此論誠然暢斂板白駿曰下官欲命孝孫彈子夏駿曰王别駕有何事邪暢曰芟麥移民可謂大議一方安危事係於此子夏親為州端曽無同異及聞元嗣之言則歡笑酬答阿意左右何以事君子夏元嗣皆大慙義恭之議遂寢𥘉魯宗之奔魏其子軌為魏荆州剌史襄陽公鎮長社常思南歸以昔殺劉康祖及徐湛之之父故不敢來軌卒子爽襲父官爵爽少有武幹與弟秀皆有寵於魏主秀為中書郎既而兄弟各有罪魏主詰責之爽秀懼誅從魏王自瓜步還至湖陸請曰奴與南有仇每兵來常恐禍及墳墓乞共迎喪還葬平城魏主許之爽至長社殺魏戍兵數百人帥部曲及願從者千餘家奔汝南夏四月爽遣秀詣壽陽奉書於南平王鑠以請降上聞之大喜以爽為司州剌史鎮義陽秀為潁川太守餘弟姪並授官爵賞賜甚厚魏人毁其墳墓徐湛之以為廟算逺圖特所獎納不敢苟申私怨乞屏居田里不許二十九年春二月甲寅魏侍中宗愛弒丗祖三月上聞魏丗祖殂更謀北伐魯爽等復勸之上訪於羣臣太子中庶子何偃以為淮泗數州瘡痍未復不宜輕動上不從偃尚之之子也夏五月丙申詔曰虐虜窮凶著於自昔未勞資斧已伏天誅拯溺蕩穢今其㑹也可符驃騎司空二府各部分所統東西應接歸義建績者隨勞酬獎於是遣撫軍將軍蕭思話督冀州剌史張永等向碻磝魯爽魯秀程天祚將荆州甲士四萬出許洛雍州剌史臧質帥所領趣潼關永茂度之子也沈慶之固諌北伐上以其異議不使行青州刺史劉興祖上言以為河南阻飢野無所掠脫諸城固守非旬月可拔稽留大衆轉輸方勞應機乘勢事存急速今僞帥始死兼逼暑時國內猜擾不暇逺赴愚謂宜長驅中山據其關要冀州以北民人尚豐兼麥已向熟因資為易向義之徒必應響赴若中州震動黃河以南自當消潰臣請發青冀七千兵遣將領之直入其心腹若前驅克勝張永及河南衆軍宜一時濟河使聲實兼舉並建司牧撫柔𥘉附西拒太行北塞軍都因事指麾隨宜加授畏威欣寵人百其懷若能成功清一可待若不克捷不為大傷並催促裝束伏聽敕㫖上意止存河南亦不從上又使貟外散騎侍郎琅邪徐爰隨軍向碻磝銜中㫖授諸將方略臨時宣示秋七月張永等至碻磝引兵圍之諸軍攻碻磝治三攻道張永等當東道濟南太守申坦等當西道揚武司馬崔訓當南道攻之纍旬不拔八月辛亥夜魏人自地道潜出燒崔訓營及攻具癸丑夜又燒東圍及攻具尋復毁崔訓攻道張永夜撤圍退軍不告諸將士卒驚擾魏人乘之死傷塗地蕭思話自往增兵力攻旬餘不拔是時青徐不稔軍食乏丁卯思話命諸軍皆退屯歷城斬崔訓繫張永申坦於獄魯爽至長社魏戍主秃髮幡棄城走臧質頓兵近郊不以時發獨遣冠軍司馬栁元景帥後軍行參軍薛安都等向潼關元景等進據洪關梁州剌史劉秀之遣司馬馬注與左軍中兵參軍蕭道成將兵向長安道成承之之子也魏冠軍將軍封禮自浢津南渡赴弘農九月司空髙平公兒烏干屯潼關平南將軍黎公遼屯河內庚寅魯爽與魏豫州剌史拓跋僕蘭戰于大索破之進攻虎牢聞碻磝敗退與柳元景皆引兵還蕭道成馬汪等聞魏救兵將至還趣仇池己丑詔解蕭思話徐州更領冀州剌史鎮歷城上以諸將屢出無功不可專責張永等賜思話詔曰虜既乘利方向盛冬若脫敢送死兄弟父子自共當之耳言及憎憤可以示張永申坦又與江夏王義恭書曰早知諸將輩如此恨不以白刃驅之今者悔何所及義恭尋奏免思話官從之宗愛逆節宋文帝元嘉九年春正月丙午魏主立子晃為皇太子大赦改元二十八年夏六月魏太子晃監國頗信任左右又營園田收其利髙允諌曰天地無私故能覆載王者無私故能容養今殿下國之儲二萬方所則而營立私田畜養雞犬乃至酤販市㕓與民爭利謗聲流布不可追掩夫天下者殿下之天下富有四海何求而無乃與販夫販婦競此尺寸之利乎昔虢之將亡神賜之土田漢靈帝私立府藏皆有顚覆之禍前鑒若此甚可畏也武王愛周邵齊畢所以王天下殷紂愛飛廉惡來所以喪其國今東宫俊乂不少頃來侍御左右者恐非在朝之選願殿下斥去佞邪親近忠良所在田園分給貧下販賣之物以時收散如此則休聲日至謗議可除矣不聽太子為政精察而中常侍宗愛性險㬥多不法太子惡之給事中仇尼道盛侍郎任平城有寵於太子頗用事皆與愛不協愛恐為道盛等所糾遂構告其罪魏主怒斬道盛等於都街東宫官屬多坐死帝怒甚戊辰太子以憂卒壬申葬金陵諡曰景穆帝徐知太子無罪甚悔之冬十二月丁丑魏主封景穆太子之子濬為髙陽王既而以王孫丗嫡不當為藩王乃止二十九年春正月魏丗祖追悼景穆太子不已中常侍宗愛懼誅二月甲寅弒帝尚書左僕射蘭延侍中和匹薛禔等祕不發喪延匹以皇孫濬沖幼欲立長君徴秦王翰置之祕室提以濬嫡皇孫不可廢議久不決宗愛知之自以得罪於景穆太子而素惡秦王翰善南安王余乃密迎余自中宫便門入禁中矯稱赫連皇后令召延等延等以愛素賤不以為疑皆隨入愛先使宦者三千人持兵伏於禁中延等入以次收縛斬之殺秦王翰於永巷而立余大赦改元承平尊皇后為皇太后以愛為大司馬大將軍太師都督中外諸軍事領中祕書封馮翊王魏南安隱王余自以違次而立厚賜羣下欲以收衆心旬月之閒府藏虛竭又好酣飲及聲樂畋獵不恤政事宗愛為宰相録三省揔宿衛坐召公卿專恣日甚余患之謀奪其權愛憤怒冬十月丙午朔余夜祭東廟愛使小黃門賈周等就弒余而祕之唯羽林郎中代人劉尼知之尼勸愛立皇孫濬愛驚曰君大癡人皇孫若立豈忘正平時事乎尼曰若爾今當立誰愛曰待還宫當擇諸王賢者立之尼恐愛為變密以狀告殿中尚書源賀賀時與尼俱典兵宿衛乃與南部尚書陸麗謀曰宗愛既立南安還復殺之今又不立皇孫將不利於社稷遂與麗定謀共立皇孫麗俟之子也戊申賀與尚書長孫渴侯嚴兵守衛宫禁使尼麗迎皇孫於苑中麗抱皇孫於馬上入平城賀渴候開門納之尼馳還東廟大呼曰宗愛弒南安王大逆不道皇孫已登大位有詔宿衛之士皆還宫衆咸呼萬歲遂執宗愛賈周等勒兵而入奉皇孫即皇帝位登永安殿大赦改元興安殺愛周皆具五刑夷三族太子劭弒逆宋文帝元嘉三年𥘉袁皇后生皇子劭后自詳視使馳白帝曰此兒形貌異常必破國亡家不可舉即欲殺之帝狼狽至后殿戶外手撥幔禁之乃止以尚在諒暗故祕之閏正月丙戌始言劭生六年春三月丁巳立皇子劭為太子十五年夏四月納故黃門侍郎殷淳女為太子劭妃十六年乙亥太子劭加元服大赦劭美鬢眉好讀書便弓馬喜延賔客意之所欲上必從之東宫置兵與羽林等二十九年𥘉潘淑妃生始興王濬元皇后性妬以淑妃有寵於上恚恨而殂淑妃專揔內政由是太子劭深惡淑妃及濬濬懼為將來之禍乃曲意事劭劭更與之善吳興巫嚴道育自言能辟榖服食役使鬼物因東陽公主婢王鸚鵡出入主家道育謂主曰神將有符賜主主夜卧見流光若螢飛入書笥開視得二青珠由是主與劭濬皆信惑之劭濬並多過失數為上所詰責使道育祈請欲令過不上聞道育曰我已為上天陳請必不泄露劭等敬事之號曰天師其後遂與道育鸚鵡及東陽主奴陳天與黃門陳慶國共為巫蠱琢玉為上形像埋於含章殿前劭𥙷天與為隊主東陽王卒鸚鵡應出嫁劭濬慮語泄濬府佐吳興沈懷逺素為濬所厚以鸚鵡嫁之為妾上聞天與領隊以讓劭曰汝所用隊主副並是奴邪劭懼以書告濬濬復書曰彼人若所為不已正可促其餘命或是大慶之漸耳劭濬相與往來書疏常謂上為彼人或曰其人謂江夏王義恭為佞人鸚鵡先與天與私通既適懷逺恐事泄白劭使密殺之陳慶國懼曰巫蠱事唯我與天與宣傳往來今天與死我其危哉乃具以其事白上上大驚即遣收鸚鵡封籍其家得劭濬書數百紙皆呪詛巫蠱之言又得所埋玉人命有司窮治其事道育亡命捕之不獲先是濬自楊州刺史出鎮京口及廬陵王紹以疾解楊州意謂已必復得之既而上用南譙王義宣濬殊不樂乃求鎮江陵上許之濬入朝遣還京口為行留處分至京口數日而巫蠱事發上惋歎彌日謂潘淑妃曰太子圖富貴更是一理虎頭復如此非復思慮所及汝母子豈可一日無我邪遣中使切責劭濬劭濬惶懼無辭唯陳謝而已上雖怒甚猶未忍罪也三十年春正月壬午以征北將軍始興王濬為荆州刺史帝怒未解故濬久留京口既除荆州乃聽入朝嚴道育之亡命也上分遣使者搜捕甚急道育變服為尼匿於東宫又隨始興王濬至京口或出止民張旿家濬入朝復載還東宫欲與俱往江陵丁巳上臨軒濬入受拜是日有告道育在張旿家者上遣掩捕得其二婢云道育隨征北還都上謂濬與太子劭已斥遣道育而聞其猶與往來惆悵惋駭乃命京口送二婢須至檢覆乃治劭濬之罪潘淑妃抱濬泣曰汝前祝詛事發猶冀能刻意思愆何意更藏嚴道育上怒甚我叩頭乞恩不能解今何用生為可送藥來當先自取盡不忍見汝禍敗也濬奮衣起曰天下事尋自當判願小寬慮必不上纍帝欲廢太子劭賜始興王濬死先與侍中王僧綽謀之使僧綽尋漢魏以來廢太子諸王典故送尚書僕射徐湛之及吏部尚書江湛武陵王駿素無寵故屢出外藩不得留建康南平王鑠建平王宏皆為帝所愛鑠妃江湛之妹隨王誕妃徐湛之之女也湛勸帝立鑠湛之意欲立誕僧綽曰建立之事仰由聖懷臣謂唯宜速斷不可稽緩當斷不斷反受其亂願以義割恩略小不忍不爾便應坦懷如𥘉無煩疑論事機雖密易致宣廣不可使難生慮表取笑千載帝曰卿可謂能斷大事然此事至重不可不殷勤三思且彭城始亡人將謂我無復慈愛之道僧綽曰臣恐千載之後言陛下唯能裁弟不能裁兒帝默然江湛同侍坐出閣謂僧綽曰卿向言將不太傷切直僧綽曰弟亦恨君不直鑠自壽陽入朝既至失㫖帝欲立宏嫌其非次是以議久不決每夜與湛之屏人語或連日纍夕常使湛之自秉燭繞壁檢行慮有竊聽者帝以其謀告潘淑妃淑妃以告濬濬持報劭劭乃密與腹心隊主陳叔兒齊帥張超之等謀為逆初帝以宗室彊盛慮有內難特加東宫兵使與羽林相若至有實甲萬人劭性黠而剛猛帝深倚之及將作亂每夜饗將士或親自行酒王僧綽密以啓聞㑹嚴道育婢將至癸亥夜劭詐為帝詔云魯秀謀反汝可平明守闕帥衆入因使張超之等集素所畜養兵士二千餘人皆被甲召內外幢隊主副豫加部勒云有所討夜呼前中庶子右軍長史蕭斌左衛率袁淑中舍人殷仲素左積弩將軍王正見並入宫劭流涕謂曰主上信讒將見罪廢內省無過不能受枉明旦當行大事望相與勠力因起遍拜之衆驚愕莫能對久之淑斌皆曰自古無此願加善思劭怒變色斌懼與衆俱曰當竭身奉令淑叱之曰卿便謂殿下真有是邪殿下幼嘗患風或是疾動耳劭愈怒因眄淑曰事當克不淑曰居不疑之地何患不克但既克之後不為天地所容大禍亦旋至耳假有此謀猶將可息左右引淑出曰此何事而云可罷乎淑還省繞牀行至四更乃寢甲子宫門未開劭以朱衣加戎服上乘畫輪車與蕭斌同載衛從如常入朝之儀呼袁淑甚急淑眠不起劭停車奉化門催之相續淑徐起至車後劭使登車又辭不上劭命左右殺之守門開從萬春門入舊制東宫隊不得入城劭以僞詔示門衛曰受敕有所收討令後隊速來張超之等數十人馳入雲龍門及齊閣拔刃徑上合殿帝其夜與徐湛之屏人語至旦燭猶未滅門階戶席直衛兵尚寢未起帝見超之入舉几捍之五指皆落遂弒之湛之驚起趣北户未及開兵人殺之劭進至合殿中閣聞帝已殂出坐東堂蕭斌執刀侍直呼中書舍人顧嘏嘏震懼不時出既至問曰欲共見廢何不早啓嘏未及答即於前斬之江湛直上省聞喧譟聲歎曰不用王僧綽言以至於此乃匿傍小屋中劭遣兵就殺之宿衛舊將羅訓徐罕皆望風屈附左細仗主廣威將軍吳興卜天與不暇被甲執刀持弓疾呼左右出戰徐罕曰殿下入汝欲何為天與罵曰殿下常來云何於今乃作此語只汝是賊手射劭於東堂幾中之劭黨擊之斷臂而死隊將張泓之朱道欽陳滿與天與俱戰死左衛將軍尹弘惶怖通啓求受處分劭使人從東閣入殺潘淑妃及太祖親信左右數十人急召始興王濬使帥衆屯中堂濬時在西州府舍人朱法瑜奔告濬曰臺內喧噪宫門皆閉道上傳太子反未測禍變所至濬陽驚曰今當奈何法瑜勸入據石頭濬未得劭信不知事之濟不騷擾不知所為將軍王慶曰今宫內有變未知主上安危凡在臣子當投𬒮赴難慿城自守非臣節也濬不聽乃從南門出徑向石頭文武從者千餘人時南平王鑠戍石頭兵士亦千餘人俄而劭遣張超之馳馬召濬濬屏人問狀即戎服乘馬而去朱法瑜固止濬濬不從出中門王慶又諌曰太子反逆天下怨憤明公但當堅閉城門坐食積粟不過三日凶黨自離公情事如此今豈宜去濬曰皇太子令敢有復言者斬既入見劭劭謂濬曰潘淑妃遂為亂兵所害濬曰此是下情由來所願劭詐以太祖詔召大將軍義恭尚書令何尚之入拘於內并召百官至者才數十人劭遽即位下詔曰徐湛之江湛弒逆無狀吾勒兵入殿已無所及號惋崩衄肝心破裂今罪人斯得元凶克殄可大赦改元太𥘉即位畢亟稱疾還永福省不敢臨喪以白刃自守夜則列燈以防左右以蕭斌為尚書僕射領軍將軍以何尚之為司空前右衛率檀和之戍石頭征虜將軍營道侯義綦鎮京口義綦義慶之弟也乙丑悉收先給諸處兵還武庫殺江徐親黨尚書左丞荀赤松右丞臧凝之等凝之燾之孫也以殷仲素為黃門侍郎王正見為左軍將軍張超之陳叔兒等皆拜官賞賜有差輔國將軍魯秀在建康劭謂秀曰徐湛之常欲相危我已為卿除之矣使秀與屯騎校尉龐秀之對掌軍隊劭不知王僧綽之謀以僧綽為吏部尚書司徒左長史何偃為侍中武陵王駿屯五洲沈慶之自巴水來咨受軍略三月乙亥典籖董元嗣自建康至五洲具言太子弒逆駿使元嗣以告僚佐沈慶之密謂腹心曰蕭斌婦人其餘將帥皆易與耳東宫同惡不過三十人此外屈逼必不為用今輔順討逆不憂不濟也太子劭分浙東五郡為㑹州省楊州立司隸校尉以其妃父殷冲為司隸校尉冲融之曾孫也以大將軍義恭為太保荆州剌史南譙王義宣為太尉始興王濬為驃騎將軍雍州刺史臧質為丹楊尹㑹稽太守隨王誕為㑹州剌史劭料檢文帝巾箱及江湛家書疏得王僧綽所啓饗士并前代故事甲申收僧綽殺之僧綽弟僧䖍為司徒左西屬所親咸勸之逃僧䖍泣曰吾兄奉國以忠貞撫我以慈愛今日之事苦不見及耳若得同歸九泉猶羽化也劭因誣北第諸王侯云與僧綽謀反殺長沙悼王瑾瑾弟楷臨川哀王燁桂陽孝侯覬新渝懷侯玠皆劭素所惡也瑾義欣之子燁義慶之子覬玠義慶之弟子也劭密與沈慶之手書令弒武陵王駿慶之求見王王懼辭以疾慶之突入以劭書示王王泣求入內與母訣慶之曰下官受先帝厚恩今日之事唯力是視殿下何見疑之深王起再拜曰家國安危皆在將軍慶之即命內外勒兵府主簿顔峻曰今四方未知義師之舉劭據有天府若首尾不相應此危道也宜待諸鎮協謀然後舉事慶之厲聲曰今舉大事而黃頭小兒皆得參預何得不敗宜斬以徇衆王令峻拜謝慶之慶之曰君但當知筆札事耳於是專委慶之處分旬日之間內外整辦人以為神兵峻延之之子也庚寅武陵王戒嚴誓衆以沈慶之領府司馬襄陽太守柳元景隨郡太守宗慤為咨議參軍領中兵將軍內史朱修之行平東將軍記室參軍顔峻為咨議參軍領録事兼揔內外以咨議參軍劉延孫為長史尋陽太守行留府事延孫道産之子也南譙王義宣及臧質皆不受劭命與司州剌史魯爽同舉兵以應駿質爽俱詣江陵見義宣且遣使勸進於王辛卯臧質子敦等在建康者聞質舉兵皆逃亡劭欲相慰恱下詔曰臧質國戚勳臣方贊翼京輦而子弟波迸良可怪歎可遣宣譬令還咸復本位劭尋録得敦使大將軍義恭行訓杖三十厚給賜之乙未武陵王發西陽丁酉至尋陽庚子王命顔峻移檄四方使共討劭州郡承檄翕然響應南譙王義宣遣臧質引兵詣尋陽與駿同下留魯爽於江陵劭以兖冀二州剌史蕭思話為徐兖二州剌史起張永為青州剌史思話自歷城引部曲還平城起兵以應尋陽建武將軍垣護之在歷城亦帥所領赴之南譙王義宣板張永為冀州剌史永遣司馬崔勳之等將兵赴義宣義宣慮蕭思話與永不釋前憾自為書與思話使長史張暢為書與永勸使相與坦懷隨王誕將受劭命參軍事沈正說司馬顧琛曰國家此禍開闢未聞今以江東驍鋭之衆唱大義於天下其誰不響應豈可使殿下北靣凶逆受其僞寵乎琛曰江東忘戰日久雖逆順不同然彊弱亦異常須四方有義舉者然後應之不為晚也正曰天下未嘗有無父無君之國寧可自安讎恥而責義於餘方乎今正以弒逆冤醜義不同天舉兵之日豈求必全邪馮衍有言大漢之貴臣將不如荆齊之賤士乎況殿下義兼臣子事實國家者哉琛乃與正共入說誕誕從之正田子之兄子也劭自謂素習武事語朝士曰卿等但助我理文書勿措意戎旅若有寇難吾自當之但恐賊虜不敢動耳及聞四方兵起始憂懼戒嚴悉召下番將吏遷淮南岸居民於北岸盡聚諸王及大臣於城內移江夏王義恭處尚書下舍分義恭諸子處侍中下省夏四月癸卯朔柳元景統寧朔將軍薛安都等十二軍發湓口司空中兵參軍徐遺寶以荆州之衆繼之丁未武陵王發尋陽沈慶之揔中軍以從劭立妃殷氏為皇后庚戌武陵王檄書至建康劭以示太常顔延之曰彼誰筆也延之曰竣之筆也劭曰言辭何至於是延之曰竣尚不顧老臣安能顧陛下劭怒稍解悉拘武陵王子於侍中下省南譙王義宣子於太倉空舍劭欲盡殺三鎮士民家口江夏王義恭何尚之皆曰凡舉大事者不顧家且多是驅逼今忽誅其室纍正足堅彼意耳劭以為然乃下書一無所問劭疑朝廷舊臣皆不為已用乃厚撫魯秀及右軍參軍王羅漢悉以軍事委之以蕭斌為謀主殷沖掌文符蕭斌勸劭勒水軍自上決戰不爾則保據梁山江夏王義恭以南軍倉猝船舫陋小不利水戰乃進䇿曰賊駿少年未習軍旅逺來疲弊宜以逸待之今逺出梁山則京都空弱東軍乘虛或能為患若分力兩赴則兵敗勢離不如養鋭待期坐而觀舋割棄南岸柵斷石頭此先朝舊法不憂賊不破也劭善之斌厲色曰南中郎二十年少能建如此大事豈復可量三方同惡勢據上流沈慶之甚練軍事柳元景宗慤屢嘗立功形勢如此實非小敵唯宜及人情未離尚可決力一戰端坐臺城何由得久今主相咸無戰意豈非天也劭不聽或勸劭保石頭城劭曰昔人所以固石頭城者俟諸侯勤王耳我若守此誰當見救唯應力戰决之不然不克日日自出行軍慰勞將士親督都水治船艦壬子焚淮南岸室屋淮內船舫悉驅民家度水北立子偉之為皇太子以始興王濬妃父禇湛之為丹楊尹湛之𥙿之之兄子也濬為侍中中書監司徒録尚書六條事加南平王鑠開府儀同三司以南兖州剌史建平王宏為江州刺史太尉司馬龐秀之自石頭失衆南奔人情由是大震以營道侯義綦為湘州剌史檀和之為雍州剌史癸丑武陵王軍于鵲頭宣城太守王僧逹得武陵王檄未知所從客說之曰方今舋逆滔天古今未有為君計莫若承義師之檄移告傍郡苟在有心誰不響應此上䇿也如其不能可躬帥向義之徒詳擇水陸之便致身南歸亦其次也僧逹乃自候道南奔逢武陵王於鵲頭王即以為長史僧逹弘之子也王𥘉發尋陽沈慶之謂人曰王僧逹必來赴義人問其故慶之曰吾見其在先帝前議論開張執意明決以此言之其至必也柳元景以舟艦不堅憚於水戰乃倍道兼行丙辰至江寧步上使薛安都帥鐡騎耀兵於淮上移書朝士為陳逆順劭加吳興太守汝南周嶠冠軍將軍隨王誕檄亦至嶠素恇怯回惑不知所從府司馬丘珍孫殺之舉郡應誕戊午武陵王至南洲降者相屬己未軍于溧洲王自發尋陽有疾不能見將佐唯顔竣出入卧內擁王於膝親視起居疾屢危篤不任咨禀竣皆專決軍正之外間以文教書檄應接遐邇昏曉臨哭若出一人如是纍旬自舟中甲士亦不知王之危疾也癸亥柳元景潜至新亭依山為壘新降者皆勸元景速進元景曰不然理順難侍同惡相濟輕進無防實啓寇心元景營未立劭龍驤將軍詹叔兒覘知之勸劭出戰劭不許甲子劭使蕭斌統步軍禇湛之統水軍與魯秀王羅漢劉簡之等精兵合萬人攻新亭壘劭自登朱雀門督戰元景宿令軍中曰鼓繁氣易衰呌數力易竭但銜枚疾戰一聽吾鼓聲劭將士懷劭重賞皆殊死戰元景水陸受敵意氣彌彊麾下勇士悉遣出鬪左右唯留數人宣傳劭兵勢垂克魯秀擊退鼓劭衆遽止元景乃開壘鼓譟以乘之劭衆大潰墜淮死者甚多劭更帥餘衆自來攻壘元景復大破之所殺傷過於前戰士卒爭赴死馬澗澗為之溢劭手斬退者不能禁劉簡之死蕭斌被創劭僅以身免走還宫魯秀禇湛之檀和之皆南奔丙寅武陵王至江寧丁卯江夏王義恭單騎南奔劭殺義恭十二子劭濬憂迫無計以輦迎蔣侯神像置宫中稽顙乞恩拜為大司馬封中山王拜蘇侯神為驃騎將軍以濬為南徐州剌史與南平王鑠並録尚書事戊辰武陵王軍于新亭大將軍義恭上表勸進散騎侍郎徐爰在殿中誑劭云自追義恭遂歸武陵王時王軍府草創不曉朝章爰素所諳練乃以爰兼太常丞撰即位儀注己巳王即皇帝位大赦文武賜爵一等從軍者二等改諡大行皇帝曰文廟號太祖以大將軍義恭為太尉録尚書六條事南徐州剌史是日劭亦臨軒拜太子偉之大赦唯劉駿義恭義宣誕不在原例庚子以南醮王義宣為中書監丞相録尚書六條事楊州剌史隨王誕為衛將軍開府儀同三司荆州刺史臧質為車騎將軍開府儀同三司江州剌史沈慶之為領軍將軍蕭思話為尚書左僕射壬申以王僧逹為右僕射柳元景為侍中左衛將軍宗慤為右衛將軍張暢為吏部尚書劉延孫顔竣並為侍中五月癸酉朔臧質以雍州兵二萬至新亭豫州刺史劉遵考遣其將夏侯獻之帥步騎五千軍于瓜步先是丗祖遣寧朔將軍顧彬之將兵東入受隨王誕節度誕遣參軍劉季之將兵與彬之俱向建康誕自頓西陵為之後繼劭遣殿中將軍燕欽等拒之相遇於曲阿奔牛塘欽等大敗劭於是緣淮樹柵以自守又決破岡方山埭以絶東軍時男子既盡召婦女供役甲戌魯秀等募勇士攻大航克之王羅漢聞官軍已度節放仗降緣渚幢隊以次奔散器仗鼓蓋充塞路衢是夜劭閉守六門於門內鑿塹立柵城中沸亂丹楊尹尹弘等文武將吏爭踰城出降劭燒輦及衮冕服于宫庭蕭斌宣令所統皆使解甲自石頭戴白幡來降詔斬斌於軍門濬勸劭載寶貨逃入海劭以人情離散不果行乙亥輔國將軍朱修之克東府丙子諸軍克臺城各由諸門入㑹于殿庭獲王正見斬之張超之走至合殿御牀之所為軍士所殺刳腸割心諸將臠其肉生噉之建平等七王號哭俱出劭穿西垣入武庫井中隊副髙禽執之劭曰天子何在禽曰近在新亭至殿前臧質見之慟哭劭曰天地所不覆載丈人何為見哭又謂質曰可得為啓乞逺徙不質曰主上近在航南自當有處分縛劭於馬上防送軍門時不見傳國璽以問劭劭曰在嚴道育處就取得之斬劭及四子於牙下濬帥左右數十人挾南平王鑠南走遇江夏王義恭於越城濬下馬曰南中郎今何所作義恭曰上巳君臨萬國又曰虎頭來得無晚乎義恭曰殊當恨晚又曰故當不死邪義恭曰可詣行闕請罪又曰未審猶能賜一職自效不義恭又曰此未可量勒與俱歸於道斬之及其三子劭濬父子首並梟於大航暴尸於市劭妃殷氏及劭濬諸女妾媵皆賜死於獄汙潴劭所居齊殷氏且死謂獄丞江恪曰汝家骨肉相殘何以枉殺無罪人恪曰受拜皇后非罪而何殷氏曰此權時耳當以鸚鵡為后禇湛之之南奔也濬即與禇妃離絶故免於誅嚴道育王鸚鵡並都街鞭殺焚尸楊灰於江殷沖尹弘王羅漢及淮南太守沈璞皆伏誅庚辰解嚴辛巳帝如東府百官請罪詔釋之甲申尊帝母路淑媛為皇太后太后丹楊人也乙酉立妃王氏為皇后后父偃導之玄孫也戊子以柳元景為雍州剌史辛卯追贈袁淑為太尉諡忠憲公徐湛之為司空諡忠烈公江湛為開府儀同三司諡忠簡公王僧綽為金紫光祿大夫諡簡侯壬辰以太尉義恭為楊南徐二州剌史進位太傅領大司馬𥘉劭以尚書令何尚之為司空領尚書令子征北長史偃為侍中父子並居權要及劭敗尚之左右皆散自洗黃閣殷沖等既誅人為之寒心帝以尚之偃素有令譽且居劭朝用智將迎時有全脫故特免之復以尚之為尚書令偃為大司馬長史任遇無改甲午帝謁初寧長寧陵追贈卜天與益州剌史諡壯侯與袁淑等四家長給廪祿張泓之等各贈郡守戊戌以南平王鑠為司空建平王宏為尚書左僕射蕭思話為中書令丹楊尹六月丙午帝還宫𥘉帝之討西陽蠻也臧質使柳元景將兵㑹之及質起兵欲奉南醮王義宣為主潜使元景帥所領西還元景即以質書呈帝語其信曰臧冠軍當是未知殿下義舉耳方應伐逆不容西還質以此恨之及元景為雍州質慮其為荆江後患建議元景當為爪牙不宜逺出帝重違其言戊申以元景為護軍將軍領石頭戍事己酉以司州剌史魯爽為南豫州剌史庚戌以衛將軍司馬徐遺寶為兖州剌史庚申詔有司論功行賞封顔竣等為公侯辛未徙南譙王義宣為南郡王隨王誕為竟陵王立義宣次子宜陽侯愷為南譙王閏月壬申以領軍將軍沈慶之為南兖州剌史鎮盱眙癸酉以柳元景為領軍將軍丞相義宣固辭內任及子愷王爵甲午更以義宣為荆湘二州剌史愷為宜陽縣王將佐以下竝加賞秩以竟陵王誕為楊州剌史秋七月南平穆王鑠素負才能意常輕上又為太子劭所任出降最晚上潜使人毒之己巳鑠卒贈司徒以商臣之諡諡之冬十一月丙午以左軍將軍魯秀為司州剌史十二月癸未以將置東宫省大子率更令等官中庶子等各減舊貟之半武帝孝建元年春正月己亥改元大赦甲辰以尚書令何尚之為左光祿大夫護軍將軍以左衛將軍顔埈為吏部尚書領驍騎將軍丙子立皇子業為太子南郡王之叛武帝孝建元年𥘉江州剌史臧質自謂人才足為一丗英雄太子劭之亂質潜有異圖以荆州剌史南郡王義宣庸暗易制欲外相推奉因而覆之質於義宣為內兄既至江陵即稱名拜義宣義宣驚愕問故質曰事中宜然時義宣已奉帝為主故其計不行及至新亭又拜江夏王義恭曰天下屯危禮異常日劭既誅義宣與質功皆第一由是驕恣事多專行凡所求欲無不必從義宣在荆州十年財富兵彊朝廷所下制度意有不同一不遵承質自建康之江州舫千餘乘部伍前後百餘里帝方自攬威權而質以少主遇之政刑慶賞一不咨禀擅用湓口鉤折米臺符屢加檢詰漸致猜懼帝淫義宣諸女義宣由是恨怒質乃遣密信說義宣以為負不賞之功挾震主之威自古能全者有幾今萬物係心於公聲迹已著見幾不作將為它人所先若今徐遺寶魯爽驅西北精兵來屯江上質帥九江樓船為公前驅已為得天下之半公以八州之衆徐進而臨之雖韓白更生不能為建康計矣且少主失德聞於道路沈柳諸將亦我之故人誰肯為少主盡力者夫不可留者年也不可失者時也質常恐溘先朝露不得展其旅力為公掃除於時悔之何及義宣腹心將佐咨議參軍蔡超司馬笁超民等咸有富貴之望欲倚質威名以成其業共勸義宣從其計質女為義宣子採之婦義宣謂質無復異同遂許之超民夔之子也臧敦時為黃門侍郎帝使敦至義宣所道經尋陽質更令敦說誘義宣義宣意遂定豫州刺史魯爽有勇力義宣質素與之相結義宣密使人報爽及兖州刺史徐遺寶期以今秋同舉兵使者至壽陽爽方飲醉失義宣指即日舉兵爽弟瑜在建康聞之逃叛爽使其衆戴黃標竊造法服登壇自號建平元年疑長史韋處穆中兵參軍楊元駒治中庾騰之不與已同皆殺之遺寶亦勒兵向彭城二月義宣聞爽已反狼狽舉兵魯瑜弟弘為質府佐帝敕質收之質即執臺使舉兵義宣與質皆上表言為左右所讒疾欲誅君側之惡義宣進爽號征北將軍爽於是送所造輿服詣江陵使征北府户曹板義宣等文曰丞相劉今𥙷天子名義宣車騎臧今𥙷丞相名質西平朱今𥙷車騎名修之皆板到奉行義宣駭愕爽所送法物並留竟陵不聽進質加魯弘輔國將軍下戍大雷義宣遣咨議參軍劉諶之將萬人就弘召司州剌史魯秀欲使為諶之後繼秀至江陵見義宣出拊膺曰吾兄誤我乃與癡人作賊今年敗矣義宣兼荆江兖豫四州之力威震逺近帝欲奉乘輿法物迎之竟陵王誕固執不可曰奈何持此座與人乃止己卯以領軍將軍柳元景為撫軍將軍辛卯以左衛將軍王玄謨為豫州剌史命元景統玄謨等諸將以討義宣癸巳進據梁山洲於兩岸築偃月壘水陸待之義宣自稱都督中外諸軍事命僚佐悉稱名丙申以安北司馬夏侯祖歡為兖州剌史三月己亥內外戒嚴辛丑以徐州剌史蕭思話為江州剌史柳元景為雍州剌史癸卯以太子左衛率龐秀之為徐州剌史義宣移檄州郡加進位號使同發兵雍州剌史朱修之僞許之而遣使陳誠於帝益州剌史劉秀之斬義宣使者遣中兵參軍韋嵩將萬人襲江陵戊申義宣帥衆十萬發江津舳艫數百里以子慆為輔國將軍與左司馬笁超民留鎮江陵檄朱修之使發兵萬人繼進修之不從義宣知修之二於己乃以魯秀為雍州剌史使將萬餘人擊之王玄謨聞秀不來喜曰臧質易與耳冀州剌史垣護之妻徐遺寶之姊也遺寶邀護之同反護之不從發兵擊之遺寶遣兵襲徐州長史明胤於彭城不克胤與夏侯祖歡垣護之共擊遺寶於湖陸遺寶棄衆焚城奔魯爽義宣至尋陽以質為前鋒而進爽亦引兵直趣歷陽與質水陸俱下殿中將軍沈靈賜將百舸破質前軍於南陵擒軍主徐慶安等質至梁山夾陳兩岸與官軍相拒夏四月戊辰以後將軍劉義綦為湘州剌史甲申以朱修之為荆州剌史上遣左軍將軍薛安都龍驤將軍南陽宗越等戍歷陽與魯爽前鋒楊胡興等戰斬之爽不能進留軍大峴使魯瑜屯小峴上復遣鎮軍將軍沈慶之濟江督諸將討爽爽食少引兵稍退自留斷後慶之使薛安都帥輕騎追之丙戌及爽於小峴爽將戰飲酒過醉安都望見爽即躍馬大呼直往剌之應手而倒左右范雙斬其首爽衆奔散瑜亦為部下所殺遂進攻壽陽克之徐遺寶奔東海東海人殺之李延壽論曰凶人之濟其身非亂丗莫由焉魯爽以丗亂之情而行之於平日其取敗也宜哉南郡王義宣至鵲頭慶之送爽首示之并與書曰僕荷任一方而舋生所統近聊帥輕師指往翦撲軍鋒裁及賊爽授首公情契異常或欲相見及其可識指送相呈爽纍丗將家驍猛善戰號萬人敵義宣與質聞其死皆駭懼柳元景軍于采石王玄謨以臧質衆盛遣使來求益兵上使元景進屯姑孰太傅義恭與義宣書曰往時仲堪假兵靈寶尋害其族孝伯推誠牢之旋踵而敗臧質少無美行弟所具悉今藉西楚之彊力圖濟其私凶謀若果恐非復池中物也義宣由此疑之五月甲辰義宣至蕪湖質進計曰今以萬人取南州則梁山中絶萬人綴梁山則玄謨必不敢動下官中流鼓棹直趣石頭此上䇿也義宣將從之劉諶之密言於義宣曰質求前驅此志難測不如盡鋭攻梁山事克然後長驅此萬安之計也義宣乃止冗從僕射胡子反等守梁山西壘㑹西南風急質遣其將尹周之攻西壘子反方度東岸就玄謨計事聞之馳歸周之攻壘甚急偏將劉季之帥水軍殊死戰求救於玄謨玄謨不遣大司馬參軍崔勳之固爭乃遣勳之與積弩將軍垣詢之救之比至城已陷勳之詢之皆戰死詢之護之之弟也子反等奔還東岸質又遣其將龐法起將數千兵趨南浦欲自後掩玄謨游擊將軍垣護之引水軍與戰破之朱修之斷馬鞍山道據險自守魯秀攻之不克屢為修之所敗乃還江陵修之引兵躡之或勸修之急追修之曰魯秀驍將也獸窮則攫不可迫也王玄謨使垣護之告急於柳元景曰西城不守唯餘東城萬人賊軍數倍彊弱不敵退還姑孰欲就節下協力當之更議進取元景不許曰賊勢方盛不可先退吾當卷甲赴之護之曰賊謂南州有三萬人而將軍麾下裁十分之一若往造賊壘則虛實露矣王豫州必不可來不如分兵援之元景曰善乃留羸弱自守悉遣精兵助玄謨多張旗幟梁山望之如數萬人皆以為建康兵悉至衆心乃安質請自攻東城咨議參軍顔樂之說義宣曰質若復克東城則大功盡歸之矣宜遣麾下自行義宣乃遣劉諶之與質俱進甲寅義宣至梁山頓兵兩岸質與劉諶之進攻東城玄謨督諸軍大戰薛安都帥突騎先衝其陳之東南陷之斬諶之首劉季之宗越又陷其西北質等兵大敗垣護之燒江中舟艦煙熖覆水延及西岸營壘殆盡諸軍乘勢攻之義宣兵亦潰義宣單舸迸走閉戶而泣荆州人隨之者猶百餘舸質欲見義宣計事而義宣已去質不知所為亦走其衆皆降散己未解嚴六月臧質至尋陽焚燒府舍載妓妾西走使嬖人何文敬領餘兵居前至西陽西陽太守魯方平紿文敬曰詔書唯捕元惡餘無所問不如逃之文敬棄衆亡去質先以妹夫羊沖為武昌郡質往投之沖已為郡丞胡庇之所殺質無所歸乃逃于南湖掇蓮實噉之追兵至以荷覆頭自沈於水出其鼻戊辰軍主鄭俱兒望見射之中心兵刃亂至腸胃縈水草斬首送建康子孫皆棄市并誅其黨豫章太守樂安任薈之臨川內史劉懷之鄱陽太守杜仲儒仲儒驥之兄弟也功臣柳元景等封賞各有差丞相義宣走至江夏聞巴陵有軍回向江陵衆散且盡與左右十許人徒步腳痛不能前僦民露車自載緣道求食至江陵郭外遣人報笁超民超民具羽儀兵衆迎之時荆州帶甲尚萬餘人左右翟靈寶誡義宣使撫慰將佐以臧質違指授之宜用致失利今治兵繕甲更為後圖昔漢髙百敗終成大業而義宣忘靈寶之言誤云項羽千敗衆咸掩口魯秀笁超民等猶欲收餘兵更圗一决而義宣惛阻無復神守入內不復出左右腹心稍稍離叛魯秀北走義宣不能自立欲隨秀去乃擕息慆及所愛妾五人著男子服相隨城內擾亂白刃交橫義宣懼墜馬遂步進笁超民送至城外更以馬與之歸而城閉義宣求秀不得左右盡棄之夜復還南郡空廨旦日超民收送剌姦義宣止獄戶坐地歎曰臧質老奴誤我五妾尋被遣出義宣號泣語獄吏曰常日非苦今日分别始是苦魯秀衆散不能去還向江陵城上人射之秀赴水死就取其首詔右僕射劉延孫使荆江二州旌别枉直就行誅賞且分割二州之地議更置新州𥘉晉氏南遷以楊州為京畿榖帛所資皆出焉以荆江為重鎮甲兵所聚盡在焉常使大將居之三州戶口居江南之半上惡其彊大故欲分之癸未分楊州浙東五郡置東楊州治㑹稽分荆湘江豫州之八郡置郢州治江夏罷南蠻校尉遷其營於建康太傅義恭議使郢州治巴陵尚書令何尚之曰夏口在荆江之中正對沔口通接雍梁實為津要由來舊鎮根基不易既有見城浦大容舫於事為便上從之既而荆楊因此虛耗尚之請復合二州上不許上惡宗室彊盛不欲權在臣下太傅義恭知其指故請省之上使王公八座與荆州剌史朱修之書令丞相義宣自為計書未逹庚寅修之入江陵殺義宣并誅其子十六人及同黨笁超民從事中郎蔡超咨議參軍顔樂之等超民兄弟應從誅何尚之上言賊既遁走一夫可擒若超民反覆昧利即當取之非唯免愆亦可要不義之賞而超民曾無此意微足觀過知仁且為官保全城府謹守庫藏端坐待縛今戮及兄弟則與其餘逆黨無異於事為重上乃原之竟陵王之叛宋武帝孝建二年春二月辛巳以尚書右僕射劉延孫為南兖州剌史冬十月壬午以竟陵王誕為司空領南徐州剌史大明元年秋八月甲辰徙司空南徐州剌史竟陵王誕為南兖州剌史以太子詹事劉延孫為南徐州剌史初髙祖遺詔以京口要地去建康密邇自非宗室近親不得居之延孫先雖與髙祖同源而髙祖屬彭城延孫屬莒縣從來不序昭穆上既命延孫鎮京口仍詔與延孫合族使諸王皆序長幼上閨門無禮不擇親踈尊卑流聞民間無所不至誕寬而有禮又誅太子劭丞相義宣皆有大功人心竊向之誕多聚才力之士蓄精甲利兵上由是畏而忌之不欲誕居中使出鎮京口猶嫌其逼更徙之廣陵以延孫腹心之臣故使鎮京口以防之三年夏四月竟陵王誕知上意忌之亦潜為之備因魏人入寇修城浚隍聚糧治仗誕記室參軍江智淵知誕有異志請假先還建康上以為中書侍郎智淵夷之弟子也少有操行沈懷文每稱之曰人所應有盡有人所應無盡無者其唯江智淵乎是時道路皆云誕反㑹吳郡民劉成上書稱息道龍昔事誕見誕在石頭城修乘輿法物習唱警蹕道龍憂懼私與伴侣言之誕殺道龍又豫章民陳談之上書稱弟詠之在誕左右見誕疏陛下年紀姓諱往巫鄭師憐家祝詛詠之密以啓聞誕誣詠之乘酒罵詈殺之上乃令有司奏誕罪惡請收付廷尉治罪乙卯詔貶誕爵為侯遣之國詔書未下先以羽林禁兵配兖州剌史垣閬使以之鎮為名與給事中戴明寶襲誕閬至廣陵誕未悟也明寶夜報誕典籖蔣成使明晨開門為內應成以告府舍人許宗之宗之入告誕誕驚起呼左右及素所畜飬數百人執蔣成勒兵自衛天將曉明寶與閬帥精兵數百人猝至而門不開誕已列兵登降自在門上斬蔣成赦作徒繫囚開門擊閬殺之明寶從間道逃還詔內外纂嚴以始興公沈慶之為車騎大將軍開府儀同三司南兖州剌史將兵討誕甲子上親揔禁兵頓宣武堂司州剌史劉季之誕故將也素與都督宗慤有隙聞誕反恐為慤所害委官間道欲赴朝廷至盱眙盱眙太守鄭瑗疑季之與誕同謀邀殺之沈慶之至歐陽誕遣慶之宗人沈道愍齎書說慶之餉以玉環刀慶之遣道愍返數以罪惡誕焚郭邑驅居民悉使入城閉門自守分遣書檄邀結逺近時山陽內史梁曠家在廣陵誕執其妻子遣使邀曠曠斬使拒之誕怒滅其家誕奉表投之城外曰陛下信用讒言遂令無名小人來相掩襲不任枉酷即加誅翦雀鼠貪生仰違詔敕今親勒部曲鎮扞徐兖先經何福同生皇家今有何愆便成胡越陵鋒奮戈萬沒豈顧戡定之期冀在旦夕又曰陛下宫帷之醜豈可三緘上大怒凡誕左右腹心同籍朞親在建康者並誅之死者以千數或有家人已死方自城內出奔者慶之至城下誕登樓謂之曰沈公垂白之年何苦來此慶之曰朝廷以君狂愚不足勞少壯故耳上慮誕奔魏使慶之斷其走路慶之移營白土去城十八里又進軍新亭豫州剌史宗慤徐州剌史劉道隆並帥衆來㑹兖州剌史沈僧明慶之兄子也亦遣兵助慶之先是誕誑其衆云宗慤助我慤至繞城躍馬呼曰我宗慤也誕見衆軍大集欲棄城北走留中兵參軍申靈賜守廣陵自將步騎數百人親信並自隨聲云出戰邪趨海陵道慶之遣龍讓將軍武念追之誕行十餘里衆皆不欲去互請誕還城誕曰我還易耳卿能為我盡力乎衆皆許諾誕乃復還築壇㰱血以誓衆凡府州文武皆加秋以主簿劉琨之為中兵參軍琨之遵考之子也辭曰忠孝不得並琨之老父在不敢承命誕囚之十餘日終不受乃殺之右衛將軍垣護之虎賁中郎將殷孝祖等擊魏還至廣陵上並使受慶之節度慶之進營逼廣陵城誕餉慶之食提挈者百餘人出自北門慶之不開視悉焚之誕於城上授函表請慶之為送慶之曰我受詔討賊不得為汝送表汝必欲歸死朝廷自應開門遣使吾為汝護送六月上命沈慶之為三烽於桑里若克外城舉一烽克內城舉兩烽擒到誕舉三烽璽書督趣前後相繼慶之焚其東門塞塹造攻道立行樓土山并諸攻具值久雨不得攻城上使御史中丞庾徽之奏免慶之官詔勿問以激之自四月至于秋七月雨止城猶未拔上怒命太史擇日將自濟江討誕太宰義恭固諫乃止誕𥘉閉城拒使者記室參軍山隂賀弼固諫誕怒抽刀向之乃止誕遣兵出戰屢敗將佐多踰城出降或勸弼宜早出弼曰公舉兵向朝廷此事既不可從荷公厚恩又義無違背唯當以死明心耳乃飲藥自殺參軍何康之等謀開門納官軍不果斬關出降誕為髙樓置康之母於其上暴露之不與食母呼康之數日而死誕以中軍長史濟陽范義為左司馬義母妻子皆在城內或謂義曰事必不振子其行乎義曰吾人吏也子不可以棄母吏不可以叛君必若何康之而活吾弗為也沈慶之帥衆攻城身先士卒親犯矢石乙巳克其外城乘勝而進又克小城誕聞兵入走趨後園隊主沈胤之等追及之擊傷誕墜水引出斬之誕母妻皆自殺上聞廣陵平出宣陽門敕左右皆呼萬歲侍中蔡興宗陪輦上顧曰卿何獨不呼興宗正色曰陛下今日正應涕泣行誅豈得皆稱萬歲上不恱詔貶誕姓留氏廣陵城中士民無小大悉命殺之沈慶之請自五尺以下全之其餘男子皆死女子以為軍賞猶殺三千餘口長水校尉宗越臨決皆先刳腸抉眼或笞靣鞭腹苦酒灌創然後斬之越對之欣欣若有所得上聚其首於石頭南岸為京觀侍中沈懷文諫不聽𥘉誕自知將敗使黃門吕曇濟與左右素所信者將丗子景粹匿於民間謂曰事若不濟思相全脫如其不免可深埋之各分以金寶齎送既出門並散走唯曇濟不去擕負景粹十餘日捕得斬之臨川內史楊璿坐與誕素善下獄死擢梁曠為後將軍贈劉琨之給事黃門侍郎蔡興宗奉㫖慰勞廣陵興宗與范義素善收斂其尸送喪歸豫章上謂曰卿何敢故觸王憲興宗抗言對曰陛下自殺賊臣自葬故交何不可之有上有慙色通鑑紀事本末卷第十九
