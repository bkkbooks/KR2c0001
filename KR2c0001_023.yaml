body:
  text: 魏分東西梁武帝中大通四年魏高歡之討爾朱氏也爾朱仲逺來奔仲逺帳下都督喬寧張子期自滑臺詣歡降歡責之曰汝事仲逺擅其榮利盟契百重許同生死前仲逺自徐州為逆汝為戎首今仲逺南走汝復叛之事天子則不忠事仲逺則無信犬馬尚識飼之者汝曽犬馬之不如遂斬之五年春正月魏侍中斛斯椿聞喬寧張子期之死内不自安與南陽王寶炬武衞將軍元毗王思政宻勸魏主圖丞相歡毗遵之玄孫也舍人元士弼又言歡受詔不敬帝由是不悅椿勸帝置閤内都督部曲又増武直人數自直閤已下員别數百皆選四方驍勇者充之帝數出遊幸椿自部勒别爲行陳由是朝政軍謀帝專與椿決之帝以關中大行臺賀拔岳擁重兵宻與相結又出侍中賀拔勝爲都督三荆等七州諸軍事荆州刺史欲倚勝兄弟以敵歡歡益不悦侍中司空高乾之在信都也遭父喪不暇終服及孝武帝即位表請解職行喪詔聴解侍中司空如故乾雖求退不謂遽見許既去内侍朝政多不關預居常怏怏帝既貳於歡冀乾爲己用常於華林園宴罷獨留乾謂之曰司空奕世忠良今日復建殊効相與雖則君臣義同兄弟宜共立盟約以敦情契殷勤逼之乾對曰臣以身許國何敢有貳時事出倉猝且不謂帝有異圖遂不固辭亦不以啟歡及帝置部曲乾乃私謂所親曰主上不親勲賢而招集羣小數遣元士弼王思政往來關西與賀拔岳計議又出賀拔勝為荆州外示疎忌實欲樹黨令其兄弟相近冀據有西方禍難將作必及於我乃宻啟歡歡召乾詣并州面論時事乾因勸歡受魏禪歡以袖掩其口曰勿妄言今令司空復為侍中門下之事一以相委歡屢啟請帝不許乾知變難將起宻啟歡求為徐州二月辛酉以乾為驃騎大將軍開府儀同三司徐州刺史三月高乾將之徐州魏主聞其漏泄機事乃詔丞相歡曰乾邕與朕私有盟約今乃反覆兩端歡聞其與帝盟亦惡之即取乾前後數啟論時事者遣使封上帝召乾對歡使責之乾曰陛下自立異圖乃謂臣為反覆人主加罪其可辭乎遂賜死帝又宻敕東徐州刺史潘紹業殺其弟敖曹敖曹先聞乾死伏壯士於路執紹業得敕書於袍領遂將十餘騎奔晉陽歡抱其首哭曰天子枉害司空敖曹兄仲宻為光州刺史帝敕青州斷其歸路仲宻亦間行奔晉陽仲宻名慎以字行秋七月壬辰魏以廣陵王欣為大司馬趙郡王諶為太師庚戌以前司徒賀拔允為太尉初賀拔岳遣行臺郎馮景詣晉陽丞相歡聞岳使至甚喜曰賀拔公詎憶吾邪與景㰱血約與岳為兄弟景還言於岳曰歡姦詐有餘不可信也府司馬宇文泰自請使晉陽以觀歡之為人歡奇其狀貌曰此兒視瞻非常將留之泰固求復命歡既遣而悔之發驛急追至關不及而返泰至長安謂岳曰高歡所以未簒者正憚公兄弟耳侯莫陳悦之徒非所忌也公但潜為之備圖歡不難今費乜頭控弦之騎不下一萬夏州刺史斛拔彌俄突勝兵三千餘人靈州刺史曹泥河西流民紇豆陵伊利等各擁部衆未有所屬公若移軍近隴扼其要害震之以威懷之以惠可収其士馬以資吾軍西輯氐羌北撫沙塞還軍長安匡輔魏室此桓文之功也岳大悦復遣泰詣洛陽請事宻陳其狀魏主喜加泰武衞將軍使還報八月帝以岳為都督雍華等二十州諸軍事雍州刺史又割心前血遣使者齎以賜之岳遂引兵西屯平涼以牧馬為名斛拔彌俄突紇豆陵伊利及費乜頭万俟受洛千鐵勒斛律沙門等皆附於岳唯曹泥附於歡秦南秦河渭四州刺史同㑹平涼受岳節度岳以夏州被邊要重欲求良刺史以鎮之衆舉宇文泰岳曰宇文左丞吾左右手何可廢也沈吟累日卒表用之冬十二月魏丞相歡患賀拔岳侯莫陳悦之彊右丞翟嵩曰嵩能間之使其自相屠滅歡遣之歡又使長史侯景招撫紇豆陵伊利伊利不從六年春正月壬辰魏丞相歡撃伊利於河西擒之遷其部落於河東魏主讓之曰伊利不侵不叛為國純臣王忽伐之詎有一介行人先請之乎魏賀拔岳將討曹泥使都督武川趙貴至夏州與宇文泰謀之泰曰曹泥孤城阻逺未足為憂侯莫陳悦貪而無信宜先圖之岳不聴召悦㑹於高平與共討泥悦既得翟嵩之言乃謀取岳岳數與悦宴語長史武川雷紹諫不聴岳使悦前行至河曲悦誘岳入營坐論軍事悦陽稱腹痛而起其壻元洪景拔刀斬岳岳左右皆散走悦遣人諭之云我别受㫖止取一人諸君勿怖衆以為然皆不敢動而悦心猶豫不即撫納乃還入隴屯水洛城岳衆散還平涼趙貴詣悦請岳尸葬之悦許之岳既死悦軍中皆相賀行臺郎中薛憕私謂所親曰悦才略素寡輒害良將吾屬今為人虜矣何賀之有憕真度之從孫也岳衆未有所屬諸將以都督武川冦淮年最長推使揔諸軍洛素無威略不能齊衆乃自請避位趙貴曰宇文夏州英略冠世逺近歸心賞罰嚴明士卒用命若迎而奉之大事濟矣諸將或欲南召賀拔勝或欲東告魏朝猶豫未決都督盛樂杜朔周曰逺水不救近火今日之事非宇文夏州無能濟者趙將軍議是也朔周請輕騎告哀且迎之衆乃使朔周馳至夏州召泰泰與將佐賓客共議去留前太中大夫潁川韓褒曰此天授也又何疑乎侯莫陳悦井中蛙耳使君往必擒之衆以為悦在水洛去平涼不逺若已有賀拔公之衆則圖之實難願且留以觀變泰曰悅既害元帥自應乗埶直據平涼而退屯水洛吾知其無能為也夫難得易失者時也若不早赴衆心將離夏州首望都督彌姐元進隂謀應悦泰知之與帳下都督高平蔡祐謀執之祐曰元進㑹當反噬不如殺之泰曰汝有大決乃召元進等入計事泰曰隴賊逆亂當與諸人戮力討之諸人似有不同者何也祐即被甲持刀直入瞋目謂諸將曰朝謀夕異何以為人今日必斷姦人首舉坐皆叩頭曰願有所擇祐乃叱元進斬之并誅其黨因與諸將同盟討悅泰謂祐曰吾今以爾為子爾其以我為父乎泰與帳下輕騎馳赴平涼令杜朔周帥衆先據彈筝峽時民間惶懼逃散者多軍士爭欲掠之朔周曰宇文公方伐罪弔民柰何助賊為虐乎撫而遣之逺近悅附泰聞而嘉之朔周本姓赫連曽祖庫多汗避難改焉泰命復其舊姓名之曰達丞相歡使侯景招撫岳衆泰至安定遇之謂曰賀拔公雖死宇文泰尚存卿何為者景失色曰我猶箭耳唯人所射遂還泰至平涼哭岳甚慟將士皆悲喜歡復使侯景與散騎常侍代郡張華原義寧太守太安王基勞泰泰不受欲刧留之曰留則共享富貴不然命在今日華原曰明公欲脅使者以死亡此非華原所懼也泰乃遣之基還言泰雄傑請及其未定撃滅之歡曰卿不見賀拔侯莫陳乎吾當以計拱手取之魏主聞岳死遣武衞將軍元毗慰勞岳軍召還洛陽并召侯莫陳悦毗至平涼軍中已奉宇文泰為主悦既附丞相歡不肯應召泰因元毗上表稱臣岳忽罹非命都督冦洛等令臣權掌軍事奉詔召岳軍入京今高歡之衆已至河東侯莫陳悦猶在水洛士卒多是西人顧戀鄉邑若逼令赴闕悦躡其後歡邀其前恐敗國殄民所損更甚乞少賜停緩徐事誘導漸就東引魏主乃以泰為大都督即統岳兵初岳以東雍州刺史李虎為左廂大都督岳死虎奔荆州説賀拔勝使収岳衆勝不從虎聞宇文泰代岳統衆乃自荆州還赴之至閿鄉為丞相歡别將所獲送洛陽魏主方謀取關中得虎甚喜拜衛將軍厚賜之使就泰虎歆之玄孫也泰與悦書責以賀拔公有大功於朝廷君名㣲行薄賀拔公薦君為隴右行臺又高氏專權君與賀拔公同受宻㫖屢結盟約而君黨附國賊共危宗廟口血未乾匕首已發今吾與君皆受詔還闕今日進退唯君是視君若下隴東邁吾亦自北道同歸若首鼠兩端吾則指日相見魏主問泰以安秦隴之策泰表言宜召悦授以内官或處以瓜涼一藩不然終為後患原州刺史史歸素為賀拔岳所親任河曲之變反為悅守悦遣其黨王伯和成次安將兵二千助歸鎮原州泰遣都督侯莫陳崇帥輕騎一千襲之崇乘夜將十騎直抵城下餘衆皆伏於近路歸見騎少不設備崇即入據城門高平令隴西李賢及弟逺穆在城中為崇内應於是中外鼓譟伏兵悉起遂擒歸及次安伯和等歸于平涼泰表崇行原州事三月泰引兵撃悦至原州衆軍畢集夏四月魏南秦州刺史隴西李弼説侯莫陳悦曰賀拔公無罪而公害之又不撫納其衆今奉宇文夏州以來聲言為主報讎此其埶不可敵也宜解兵謝之不然必及禍悦不從宇文泰引兵上隴留兄子導為都督鎮原州泰軍令嚴肅秋毫無犯百姓大悦軍出木狹關雪深二尺泰倍道兼行出其不意悦聞之退保略陽留萬人守水洛泰至水洛即降泰遣輕騎數百趣略陽悦退保上邽召李弼與之拒泰弼知悦必敗隂遣使詣泰請為内應悦棄州城南保山險弼謂所部曰侯莫陳公欲還秦州汝輩何不裝束弼妻悦之姨也衆咸信之爭趣上邽弼先據城門以安集之遂舉城降泰泰即以弼為秦州刺史其夜悦出軍將戰軍自驚潰悦性猜忌既敗不聴左右近已與其二弟并子及謀殺岳者七八人棄軍迸走數日之中槃桓往來不知所趣左右勸向靈州依曹泥恱從之自乗驢令左右皆步從欲自山中趣靈州宇文泰使原州都督賀拔穎追之悦望見追騎縊死於野泰入上邽引薛憕為記室參軍収悦府庫財物山積泰秋毫不取皆以賞士卒左右竊一銀甕以歸泰知而罪之即剖賜將士悦黨幽州刺史孫定兒據州不下有衆數萬泰遣都督中山劉亮襲之定兒以大軍逺不為備亮先豎一纛於近城高嶺自將二千騎馳入城定兒方置酒衆猝見亮至駭愕不知所為亮麾兵斬定兒遥指城外纛命二騎曰出召大軍城中皆懾服莫敢動先是故氐王楊紹先乗魏亂逃歸武興復稱王涼州刺史李叔仁為其民所執氐羌吐谷渾所在蜂起自南岐至瓜鄯跨州據郡者不可勝數宇文泰令李弼鎮原州夏州刺史拔也惡蚝鎮南秦州渭州刺史可朱渾元鎮渭州衛將軍趙貴行秦州事徵豳涇東秦岐四州之粟以給軍楊紹先懼稱藩送妻子為質夏州長史于謹言於泰曰明公據關中險固之地將士驍勇土地膏腴今天子在洛迫於羣凶若陳明公之懇誠筭時事之利害請都關右挾天子以令諸侯奉王命以討暴亂此桓文之業千載一時也泰善之丞相歡聞泰定秦隴遣使甘言厚禮以結之泰不受封其書使都督濟北張軌獻於魏主斛斯椿問軌曰高歡逆謀行路皆知之人情所恃唯在西方未知宇文何如賀拔軌曰宇文公文足經國武能定亂椿曰誠如君言真可恃也魏主命泰發二千騎鎮東雍州助為埶援仍命泰稍引軍而東泰以大都督武川梁禦為雍州刺史使將步騎五千前行先是丞相歡遣其都督太安韓軌將兵一萬據蒲反以救侯莫陳悦雍州刺史賈顯度以舟迎之梁禦見顯度説使從泰顯度即出迎禦禦入據長安魏主以泰為侍中驃騎大將軍開府儀同三司關西大都督略陽縣公承制封拜泰乃以冦洛為涇州刺史李弼為秦州刺史前略陽太守張獻為南岐州刺史南岐州刺史盧待伯不受代泰遣輕騎襲而擒之侍中封隆之言於丞相歡曰斛斯椿等今在京師必構禍亂隆之與僕射孫騰爭尚魏主妹平原公主公主歸隆之騰泄其言於椿椿以白帝隆之懼逃還鄉里歡召隆之詣晉陽㑹騰帶仗入省擅殺御史懼罪亦逃就歡領軍婁昭辭疾歸晉陽帝以斛斯椿兼領軍改置都督及河南關西諸刺史華山王鷙在徐州歡使大都督邸珍奪其管鑰建州刺史韓賢濟州刺史蔡儁皆歡黨也帝省建州以去賢使御史舉儁罪以汝陽王叔昭代之歡上言儁勲重不可解奪汝陽懿德當受大藩臣弟永寶猥任定州宜避賢路帝不聴五月丙子魏主増置勲府庶子廂别六百人又增騎官廂别二百人魏主欲伐晉陽辛卯下詔戒嚴云欲自將伐梁發河南諸州兵大閲於洛陽南臨洛水北際邙山帝戎服與斛斯椿臨觀之六月丁巳魏主宻詔丞相歡稱宇文黒獺賀拔勝頗有異志故假稱南伐潜為之備王亦宜共為形援讀訖燔之歡表以為荆雍將有逆謀臣今濳勒兵馬三萬自河東渡又遣恒州刺史庫狄干等將兵四萬自來違津渡領軍將軍婁昭等將兵五萬以討荆州冀州刺史尉景等將山東兵七萬突騎五萬以討江左皆勒所部伏聴處分帝知歡覺其變乃出歡表命羣臣議之欲止歡軍歡亦集幷州僚佐共議還以表聞仍云臣為嬖佞所閒陛下一旦賜疑臣若敢負陛下使身受天殃子孫殄絶陛下若垂信赤心使干戈不動佞臣一二人願斟量廢出丁卯帝使大都督源子恭守陽湖汝陽王暹守石濟又以儀同三司賈顯智為濟州刺史帥豫州刺史斛斯元壽東趣濟州元壽椿之弟也蔡儁不受代帝愈怒辛未帝復録洛中文武議意以答歡且使舍人温子昇為敕賜歡曰朕不勞尺刃坐為天子所謂生我者父母貴我者高王今若無事背王規相攻討則使身及子孫還如王誓近慮宇文為亂賀拔應之故戒嚴欲與王俱為聲援今觀其所為更無異迹東南不賓為日已乆今天下户口減半未宜窮兵極武朕既闇昧不知佞人為誰頃高乾之死豈獨朕意王忽對昻言兄枉死人之耳目何易可輕如聞庫狄干語王云本欲取懦弱者為主無事立此長君使其不可駕御今但作十五日行自可廢之更立餘者如此議論自是王閒勲人豈出佞人之口去嵗封隆之叛今年孫騰逃去不罪不送誰不怪王王若事君盡誠何不斬送二首王雖啟云西去而四道俱進或欲南度洛陽或欲東臨江左言之者猶應自怪聞之者寧能不疑王若晏然居北在此雖有百萬之衆終無圖彼之心王若舉旗南指縱無匹馬隻輪猶欲奮空拳而爭死朕本寡德王已立之百姓無知或謂實可若為他人所圖則彰朕之惡假令還為王殺幽辱虀粉了無遺恨本望君臣一體若合符契不圖今日分踈至此中軍將軍王思政言於魏主曰髙歡之心昭然可知洛陽非用武之地宇文㤗乃心王室今往就之還復舊京何慮不克帝深然之遣散騎侍郎河東柳慶見㤗於高平共論時事㤗請奉迎輿駕慶復命帝復私謂慶曰朕欲向荆州何如慶曰關中形勝宇文泰才略可依荆州地非要害南迫梁冦臣愚未見其可帝又問閤内都督宇文顯和顯和亦勸帝西幸時帝廣徵州郡兵東郡太守河東裴俠帥所部詣洛陽王思政問曰今權臣擅命王室日卑柰何俠曰宇文泰為三軍所推居百二之地所謂已操戈矛寧肯授人以柄雖欲投之恐無異避湯入火也思政曰然則如何而可俠曰圖歡有立至之憂西巡有將來之慮且至關右徐思其宜耳思政然之乃進俠於帝授左中郎將初丞相歡以為洛陽乆經喪亂欲遷都於鄴帝曰高祖定鼎河洛為萬世之基王既功存社稷宜遵太和舊事歡乃止至是復謀遷都遣三千騎鎮建興益河東及濟州兵擁諸州和糴粟悉運入鄴城帝又敕歡曰王若厭伏人情杜絶物議唯有歸河東之兵罷建興之戍送相州之粟追濟州之軍使蔡儁受代邸珍出徐止戈散馬各事家業脫須糧廪别遣轉輸則䜛人結舌疑悔不生王高枕太原朕垂拱京洛矣王若馬首南向問鼎輕重朕雖不武為社稷宗廟之計欲止不能決在於王非朕能定為山止簣相為惜之歡上表極言宇文泰斛斯椿罪惡帝以廣寧太守廣寧任祥兼尚書左僕射加開府儀同三司祥棄官走渡河據郡待歡帝乃敕文武官北來者任其去留遂下制書數歡咎惡召賀拔勝赴行在所勝以問太保掾范陽盧柔柔曰高歡悖逆公席卷赴都與決勝負死生以之上䇿也北阻魯陽南幷舊楚東連兖豫西引關中帶甲百萬觀舋而動中䇿也舉三荆之地庇身於梁功名皆去下䇿也勝笑而不應帝以宇文泰兼尚書僕射為關西大行臺許妻以馮翊長公主謂泰帳内都督秦郡楊荐曰卿歸語行臺遣騎迎我以荐為直閤將軍泰以前秦州刺史駱超為大都督將輕騎一千赴洛又遣荐與長史宇文測出關候接丞相歡召其弟定州刺史琛使守晉陽命長史崔暹佐之暹挺之族孫也歡勒兵南出告其衆曰孤以爾朱擅命建大義於海内奉戴主上誠貫幽明横為斛斯椿䜛構以忠為逆今者南邁誅椿而已以高敖曹為前鋒宇文泰亦移檄州郡數歡罪惡自將大軍發髙平前軍屯弘農賀拔勝軍于汝水秋七月己丑魏主親勒兵十餘萬屯河橋以斛斯椿為前驅陳於邙山之北椿請帥精騎二千夜度河掩其勞弊帝始然之黄門侍郎楊寛説帝曰髙歡以臣伐君何所不至今假兵於人恐生它變椿若度河萬一有功是滅一髙歡生一髙歡矣帝遂敕椿停行椿歎曰頃熒惑入南斗今上信左右閒構不用吾計豈天道乎宇文泰聞之謂左右曰高歡數日行八九百里此兵家所忌當乗便撃之而主上以萬乗之重不能度河決戰方緣津據守且長河萬里扞禦為難若一處得渡大事去矣即以大都督趙貴為别道行臺自蒲坂濟趣并州遣大都督李賢將精騎一千赴洛陽帝使斛斯椿與行臺長孫稚大都督穎川王斌之鎮虎牢行臺長孫子彦鎮陜賈顯智斛斯元壽鎮滑臺斌之鑒之弟子彦稚之子也歡使相州刺史竇泰趣滑臺建州刺史韓賢趣石濟竇泰與顯智遇於長壽津顯智隂約降於歡引軍退軍司元玄覺之馳還請益師帝遣大都督侯幾紹赴之戰於滑臺東顯智以軍降紹戰死北中郎將田怙為歡内應歡濳軍至野王帝知之斬怙歡至河北十餘里再遣使口申誠欵帝不報丙午歡引軍度河魏主問計於羣臣或欲奔梁或云南依賀拔勝或云西就關中或云守洛口死戰計未決元斌之與斛斯椿争權弃椿還紿帝云高歡兵已至丁未帝遣使召椿還遂帥南陽王寶炬清河王亶廣陽王湛以五千騎宿於瀍西南陽王别舍沙門惠臻負璽持千牛刀以從衆知帝將西出其夜亡者過半亶湛亦逃歸湛深之子也武衛將軍雲中獨孤信單騎追帝帝歎曰將軍辭父母捐妻子而來世亂識忠臣豈虚言也戊申帝西奔長安李賢遇帝于崤中己酉歡入洛陽舍於永寧寺遣領軍婁昭等追帝請帝東還長孫子彦不能守陜弃城走高敖曹帥勁騎追帝至陜西不及帝鞭馬長騖糗漿乏絶三二日間從官唯飲澗水至湖城有王思村民以麥飯壺漿獻帝帝悅復一村十年至稠桑潼關大都督毛鴻賓迎獻酒食從官始解飢渴八月甲寅丞相歡集百官謂曰為臣奉主匡救危亂若處不諫争出不陪從緩則耽寵争榮急則委之逃竄臣節安在衆莫能對兼尚書左僕射辛雄曰主上與近習圖事雄等不得預聞及乗輿西幸若即追隨恐跡同佞黨留待大王又以不從蒙責雄等進退無所逃罪歡曰卿等備位大臣當以身報國羣佞用事卿等嘗有一言諫争乎使國家之事一朝至此罪欲何歸乃収雄及開府儀同三司叱列延慶兼吏部尚書崔孝芬都官尚書劉廞兼度支尚書天水楊機散騎常侍元士弼皆殺之孝芬子司徒從事中郎猷間行入關魏主使以本官奏門下事歡推司徒清河王亶為大司馬承制決事居尚書省宇文泰使趙貴梁禦帥甲騎二千奉迎帝循河西行謂禦曰此水東流而朕西上若得復見洛陽親謁陵廟卿等功也帝及左右皆流涕泰備儀衛迎帝謁見於東陽驛免冠流涕曰臣不能式遏冦虐使乗輿播遷臣之罪也帝曰公之忠節著於遐邇朕以不德負乗致冦今日相見深用厚顔方以社稷委公公其勉之將士皆呼萬嵗遂入長安以雍州廨舍為宫大赦以泰為大將軍雍州刺史兼尚書令軍國之政咸取決焉别置二尚書分掌機事以行臺尚書毛遐周惠達為之時軍國草創二人積糧儲治器械簡士馬魏朝賴之泰尚馮翊長公主拜駙馬都尉先是熒惑入南斗去而復還留止六旬上以諺云熒惑入南斗天子下殿走乃跣而下殿以禳之及聞魏主西奔慙曰虜亦應天象邪辛酉魏丞相歡自追迎魏主戊辰清河王亶下制大赦歡至弘農九月乙巳使行臺僕射元子思帥侍官迎帝己酉攻潼關克之擒毛鴻賓進屯華隂長城龍門都督薛崇禮以城降歡賀拔勝使長史元頴行荆州事守南陽自帥所部西赴關中至淅陽聞歡已屯華隂欲還行臺左丞崔謙曰今帝室顛覆主上蒙塵公宜倍道兼行朝於行在然後與宇文行臺同心勠力倡舉大義天下孰不望風響應今捨此而退恐人人解體一失事機後悔何及勝不能用遂還歡退屯河東使行臺尚書長史薛瑜守潼關大都督庫狄温守封陵築城於蒲津西岸以薛紹宗為華州刺史使守之以高敖曹行豫州事歡自發晉陽至是凡四十啟魏主皆不報歡乃東還遣行臺侯景等引兵向荆州荆州民鄧誕等執元頴以應景賀拔勝至景逆撃之勝兵敗帥數百騎來奔魏主之在洛陽也宻遣閤内都督河南趙剛召東荆州刺史馮景昭帥兵入援兵未及發魏主西入關景昭集府中文武議所從司馬馮道和請據州待北方處分剛曰公宜勒兵赴行在所乆之更無言者剛抽刀投地曰公若欲為忠臣請斬道和如欲從賊可速見殺景昭感悟即帥衆赴關中侯景引兵逼穰城東荆州民楊祖歡等起兵應之以其衆邀景昭於路景昭戰敗剛沒蠻中冬十月丞相歡至洛陽又遣僧道榮奉表於孝武帝曰陛下若逺賜一制許還京洛臣當帥勒文武式清宫禁若返正無日則七廟不可無主萬國須有所歸臣寧負陛下不負社稷帝亦不答歡乃集百官耆老議所立時清河王亶出入已稱警蹕歡醜之乃託以孝昌以來昭穆失序永安以孝文為伯考永熈遷孝明於夾室業喪祚短職此之由遂立清河世子善見為帝謂亶曰欲立王不如立王之子亶不自安輕騎南走歡追還之丙寅孝静帝即位於城東北時年十一大赦改元天平魏宇文泰進軍攻潼關斬薛瑜虜其卒七千人還長安進位大丞相東魏行臺薛脩義等度河據楊氏壁魏司空參軍河東薛端紏帥村民撃却東魏兵復取楊氏丞相泰遣南汾州刺史蘇景恕鎮之丁卯以信武將軍元慶和為鎮北將軍帥衆伐東魏髙盛為司徒髙敖曹為司空坦樹之弟也丞相歡以洛陽西逼西魏南近梁境乃議遷鄴書下三日即行丙子東魏主發洛陽四十萬戸狼狽就道收百官馬尚書丞郎已上非陪從者盡令乗驢歡留後部分事畢還晉陽改司州為洛州以尚書令元弼為洛州刺史鎮洛陽以行臺尚書司馬子如為尚書左僕射與右僕射髙隆之侍中髙岳孫騰留鄴共知朝政詔以遷民貲産未立出粟一百三十萬石以賑之十一月兗州刺史樊子鵠據瑕丘以拒東魏南青州刺史大野拔帥衆就之庚寅東魏主至鄴居北城相州之廨改相州刺史為司州牧魏郡太守為魏尹是時六坊之衆從孝武帝西行者不及萬人餘皆北徙並給常廩春秋賜帛以供衣服乃於常調之外隨豐稔之處折絹糴粟以供國用十二月魏丞相泰遣儀同李虎李弼趙貴撃曹泥於靈州魏孝武帝復與丞相泰有隙帝飲酒遇酖而殂泰奉太宰南陽王寶炬而立之東魏高敖曹侯景兵至荆州魏荆州刺史獨孤信兵少不敵與都督楊忠皆來犇大同元年春正月戊申朔魏文帝即位於城西大赦改元大統魏渭州刺史可朱渾道元先附侯莫陳悦悦死丞相泰攻之不能克與盟而罷道元世居懷朔與東魏丞相歡善又母兄皆在鄴由是常與歡通泰欲撃之道元帥所部三千户西北度烏蘭津抵靈州靈州刺史曹泥資送至雲州歡聞之遣資糧迎侯拜車騎大將軍道元至晉陽歡始聞孝武帝之喪啓請舉哀制服東魏主使羣臣議之太學博士潘崇和以為君遇臣不以禮則無反服是以湯之民不哭桀周武之臣不服紂國子博士衛既隆李同軌議以為高后於永熈離絶未彰宜為之服東魏從之李虎等攻靈州凡四旬曹泥請降己酉魏進丞相略陽公泰為都督中外諸軍録尚書事大行臺封安定王泰固辭王爵及録尚書乃封安定公以尚書令斛斯椿為太保廣平王贊為司徒己巳東魏以丞相歡為相國假黄鉞殊禮固辭東魏大行臺尚書司馬子如帥大都督竇泰太州刺史韓軌等攻潼關魏丞相泰軍于霸上子如與軌回軍從蒲津宵濟攻華州刺史王羆合戰破之子如弘等遂引去夏四月元慶和攻東魏城父丞相歡遣高敖曹帥三萬人趣項竇泰帥三萬人趣城父侯景帥三萬人趣彭城以任祥為東南道行臺僕射節度諸軍秋七月魏下詔數高歡二十罪且曰朕將親揔六軍與丞相掃除凶醜歡亦移檄於魏謂宇文黒獺斛斯椿為逆徒且言今分命諸將領兵百萬刻期西討二年春正月甲子東魏丞相歡自將萬騎襲魏夏州身不火食四日而至縛矟為梯夜入其城擒刺史斛拔俄彌突因而用之留都督張瓊將兵鎮守遷其部落五千户以歸魏靈州刺史曹泥復叛降東魏秋七月魏降將賀拔勝等北還冬十二月丁丑東魏丞相歡督諸軍伐魏遣司徒高敖曹趣上洛大都督竇泰趣潼關三年春正月東魏丞相歡軍蒲坂造三浮橋欲渡河魏丞相泰軍廣陽謂諸將曰賊掎吾三面作浮橋以示必度此欲綴吾軍使竇泰得西入耳歡自起兵以來竇泰常為前鋒其下多鋭卒屢勝而驕今襲之必克克泰則歡不戰自走矣諸將皆曰賊在近捨而襲逺脫有蹉跌悔何及也不如分兵禦之丞相泰曰歡再攻潼關吾軍不出灞上今大舉而來謂吾亦當自守有輕我之心乗此襲之何患不克賊雖作浮橋未能徑度不過五日吾取竇泰必矣行臺左丞蘇綽中兵參軍代人達奚武亦以為然庚戌丞相泰還長安諸將意猶異同丞相泰隱其計以問族子直事郎中深深曰竇泰歡之驍將今大軍攻蒲坂則歡拒守而泰救之吾表裏受敵此危道也不如選輕鋭潜出小關竇泰躁急必來決戰歡持重未即救我急撃泰必可擒也擒泰則歡勢自沮回師撃之可以決勝丞相泰喜曰此吾心也乃聲言欲保隴右辛亥謁魏主而潜軍東出癸丑旦至小關竇泰猝聞軍至自風陵度丞相泰出馬抜澤撃竇泰大破之士衆皆盡竇泰自殺傳首長安丞相歡以河冰薄不得赴救撤浮橋而退儀同代人薛孤延為殿一日之中斫十五刀折乃得免丞相泰亦引軍還髙敖曹自商山轉鬬而進所向無前遂攻上洛郡人泉岳及弟猛略與順陽人杜窋等謀翻城應之洛州刺史泉企知之殺岳及猛略杜窋走歸敖曹敖曹以為鄉導而攻之敖曹被流矢通中者三殞絶良乆復上馬免胄巡城企固守旬餘二子元禮仲遵力戰拒之仲遵傷目不堪復戰城遂陷企見敖曹曰吾力屈非心服也敖曹以杜窋為洛州刺史敖曹創甚曰恨不見季式作刺史丞相歡聞之即以髙季式為濟州刺史敖曹欲入藍田關歡使人告曰竇泰軍沒人心恐動宜速還路險賊盛拔身可也敖曹不忍弃衆力戰全軍而還以泉企泉元禮自隨泉仲遵以傷重不行企私戒二子曰吾餘生無幾汝曹才器足以立功勿以吾在東遂虧臣節元禮於路逃還魏以元禮世襲洛州刺史夏五月魏以賀拔勝為太師秋七月獨孤信北還與楊忠皆至長安魏宇文深勸丞相泰取恒農八月丁丑泰帥李弼等十二將伐東魏以北雍州刺史于謹為前鋒攻盤豆拔之戊子至恒農庚寅拔之擒東魏陜州刺史李徽伯俘其戰士八千時河北諸城多附東魏左丞楊㯹自言父猛嘗為邵郡白水令知其豪傑請往説之以取邵郡泰許之㯹乃與土豪王覆憐等舉兵収邵郡守程保及縣令四人斬之表覆憐為郡守遣諜説諭東魏城堡旬月之間歸附甚衆閏九月東魏丞相歡將兵二十萬自壺口趣蒲津使高敖曹將兵三萬出河南時關中饑魏丞相泰所將將士不滿萬人館糓於恒農五十餘日聞歡將濟河乃引兵入關高敖曹遂圍恒農歡右長史薛琡言於歡曰西賊連年饑饉故冒死來入陜州欲取倉粟今敖曹已圍陜城粟不得出但置兵諸道勿與野戰比及麥秋其民自應餓死寶炬黒獺何憂不降願勿度河侯景曰今兹舉兵形勢極大萬一不捷猝難収斂不如分為二軍相繼而進前軍若勝後軍全力前軍若敗後軍承之歡不從自蒲津濟河丞相泰遣使戒華州刺史王羆羆語使者曰老羆當道卧貉子那得過歡至馮翊城下謂罷曰何不早降羆大呼曰此城是王羆冢死生在此欲死者來歡知不可攻乃涉洛軍於許原西泰至渭南徵諸州兵皆未㑹欲進撃歡諸將以衆寡不敵請待歡更西以觀其勢泰曰歡若至長安則人情大擾今及其逺來新至可撃也即造浮橋於渭令軍士齎三日糧輕騎度渭輜重自渭南夾渭而西冬十月壬辰泰至沙苑距東魏軍六十里諸將皆懼宇文深獨賀泰問其故對曰歡鎮撫河北甚得衆心以此自守未易可圖今懸師度河非衆所欲獨歡恥失竇泰愎諫而來所謂忿兵可一戰擒也事理昭然何為不賀願假深一節發王羆之兵邀其走路使無遺類泰遣須昌縣公達奚武覘歡軍武從三騎皆效歡將士衣服日暮去營數百步下馬潜聴得其軍號因上馬歴營若警夜者有不如灋往往撻之具知敵之情狀而還歡聞泰至癸巳引兵㑹之候騎告歡兵且至泰召諸將謀之開府儀同三司李弼曰彼衆我寡不可平地置陳此東十里有渭曲可先據以待之泰從之背水東西為陳李弼為右拒趙貴為左拒命將士皆偃戈於葦中約聞鼓聲而起晡時東魏兵至渭曲都督太安斛律羌舉曰黑獺舉國而來欲一死決譬如猘狗或能噬人且渭曲葦深土濘無所用力不如緩與相持宻分精鋭徑掩長安巢穴既傾則黒獺不戰成擒矣歡曰縱火焚之何如侯景曰當生擒黒獺以示百姓若衆中燒死誰復信之彭樂盛氣請鬪曰我衆賊寡百人擒一何憂不克歡從之東魏兵望見魏兵少爭進撃之無復行列兵將交丞相泰鳴鼓士皆奮起于謹等六軍與之合戰李弼等帥鐵騎横撃之東魏兵中絶為二遂大破之李弼弟檦身小而勇每躍馬陷陳隱身鞍甲之中敵見皆曰避此小兒泰歎曰膽決如此何必八尺之軀征虜將軍武川耿令貴殺傷多甲裳盡赤泰曰觀其甲裳足知令貴之勇何必數級彭樂乗醉深入魏陳魏人刺之腸出内之復戰丞相歡欲収兵更戰使張華原以簿歴營㸃兵莫有應者還白歡曰衆盡去營皆空矣歡猶未肯去阜城侯斛律金曰衆心離散不可復用宜急向河東歡據鞍未動金以鞭拂馬乃馳去夜度河船去岸逺歡跨槖駝就船乃得度喪甲士八萬人弃鎧仗十有八萬丞相泰追歡至河上選留甲士二萬餘人餘悉縱歸都督李穆曰高歡破膽矣速追之可獲泰不聴還軍渭南所徵之兵甫至乃於戰所人種柳一株以旌武功侯景言於歡曰黑獺新勝而驕必不為備願得精騎二萬徑往取之歡以告婁妃妃曰設如其言景豈有還理得黒獺而失景何利之有歡乃止魏加丞相泰柱國大將軍李弼等十二將皆進爵增邑有差高敖曹聞歡敗釋恒農退保洛陽己酉魏行臺宫景壽等向洛陽東魏洛州大都督韓賢撃走之州民韓木蘭作亂賢撃破之一賊匿尸間賢自按檢収鎧仗賊歘起斫之斷脛而卒魏復遣行臺馮翊王季海與獨孤信將步騎二萬趣洛陽洛州刺史李顯趣三荆賀拔勝李弼圍蒲坂東魏丞相歡之西伐也蒲坂民敬珍謂其從祖兄祥曰高歡迫逐乗輿天下忠義之士皆欲倳刃於其腹今又稱兵西上吾欲與兄起兵斷其歸路此千載一時也祥從之紏合鄉里數日有衆萬餘㑹歡自沙苑敗歸祥珍帥衆邀之斬獲甚衆賀拔勝李弼至河東祥珍帥猗氏等六縣十餘萬户歸之丞相泰以珍為平陽太守祥為行臺郎中東魏秦州刺史薛崇禮守蒲坂别駕薛善崇禮之族弟也言於崇禮曰高歡有逐君之罪善與兄忝衣冠緒餘世荷國恩今大軍已臨而猶為高氏固守一旦城陷函首送長安署為逆賊死有餘愧及今歸欵猶為愈也崇禮猶豫不決善與族人斬關納魏師崇禮出走追獲之丞相泰進軍蒲坂略定汾絳凡薛氏預開城之謀者皆賜五等爵善曰背逆歸順臣子常節豈容闔門大小俱叨封邑與其弟慎固辭不受東魏行晉州事封祖業弃城走儀同三司薛修義追至洪洞説祖業還守祖業不從修義還據晉州安集固守魏儀同三司長孫子彦引兵至城下修義開府伏甲以待之子彦不測虛實遂退走丞相歡以修義為晉州刺史獨孤信至新安高敖曹引兵北度河信逼洛陽洛州刺史廣陽王湛弃城歸鄴信遂據金墉城孝武帝之西遷也散騎常侍河東裴寛謂諸弟曰天子既西吾不可以東附高氏帥家屬逃於大石嶺獨孤信入洛乃出見之時洛陽荒廢人士流散唯河東柳蚪在陽城裴諏之在潁川信俱徵之以蚪為行臺郎中諏之為開府屬東魏潁州長史賀若統執刺史田迄舉城降魏魏都督梁迴入據其城前通直散騎侍郎鄭偉起兵陳留攻東魏梁州執其刺史鹿永吉前大司馬從事中郎崔彦穆攻滎陽執其太守蘇淑與廣州長史劉志皆降於魏偉先䕶之子也丞相泰以偉為北徐州刺史彦穆為滎陽太守十一月東魏行臺任祥帥督將堯雄趙育是云寶攻潁川丞相泰使大都督宇文貴樂陵公遼西怡峰將步騎二千救之軍至陽翟雄等軍已去潁川三十里祥帥衆四萬繼其後諸將咸以為彼衆我寡不可争鋒貴曰雄等謂吾兵少必不敢進彼與任祥合兵攻穎川城必危矣若賀若統陷沒吾輩坐此何為今進據潁川有城可守又出其不意破之必矣遂疾趨據潁川背城為陳以待雄等至合戰大破之雄走趙育請降俘其士卒萬餘人悉縱遣之任祥聞雄敗不敢進貴與怡峰乗勝逼之祥退保宛陵貴追及撃之祥軍大敗是云寶殺其陽州刺史那椿以州降魏魏以貴為開府儀同三司是云寶趙育為車騎大將軍都督杜陵韋孝寛攻東魏豫州拔之執其行臺馮邕孝寛名叔裕以字行丙子東魏以驃騎大將軍儀同三司万俟普為太尉十二月魏行臺楊白駒與東魏陽州刺史段粲戰於蓼塢魏師敗績魏荆州刺史郭鸞攻東魏東荆州刺史清都慕容儼儼晝夜拒戰二百餘日乗閒出撃鸞大破之時河南諸州多失守唯東荆獲全河間邢磨納范陽盧仲禮仲禮從弟仲裕等皆起兵海隅以應魏東魏濟州刺史高季式有部曲千餘人馬八百匹鎧仗皆備濮陽民杜靈椿等為盜聚衆近萬人攻城剽野季式遣騎三百一戰擒之又撃陽平賊路文徒等悉平之於是逺近肅清或謂季式曰濮陽陽平乃畿内之郡不奉詔命又不侵境何急而使私軍逺戰萬一失利豈不獲罪乎季式曰君何言之不忠也我與國家同安共危豈有見賊而不討乎且賊知臺軍猝不能來又不疑外州有兵撃之乗其無備破之必矣以此獲罪吾亦無恨四年春二月東魏大都督善無賀拔仁攻魏南汾州刺史韋子粲降之丞相泰滅子粲之族東魏大行臺侯景等治兵於虎牢將復河南諸州魏梁迴韋孝寛趙繼宗皆棄城西歸侯景攻廣州數旬未拔聞魏救兵將至集諸將議之行洛州事盧勇請進觀形勢乃帥百騎至大隗山遇魏師日已暮勇多置幡旗於樹顛夜分騎為十隊鳴角直前擒魏儀同三司程華斬儀同三司王征蠻而還廣州守將駱超遂以城降東魏丞相歡以勇行廣州事勇辯之從弟也於是南汾潁豫廣四州復入東魏三月辛酉東魏丞相歡以沙苑之敗請解大丞相詔許之頃之復故秋七月東魏侯景高敖曹等圍魏獨孤信于金墉太師歡帥大軍繼之景悉燒洛陽内外官寺民居存者什二三魏主將如洛陽拜園陵㑹信等告急遂與丞相泰俱東命尚書左僕射周惠達輔太子欽守長安開府儀同三司李弼車騎大將軍達奚武帥千騎為前驅八月庚寅丞相泰至穀城侯景等欲整陳以待其至儀同三司太安莫多婁貸文請帥所部撃其前鋒景等固止之貸文勇而専不受命與可朱渾道元以千騎前進夜遇李弼達奚武於孝水弼命軍士鼓譟曳柴揚塵貸文走弼追斬之道元單騎獲免悉俘其衆送恒農泰進軍瀍東侯景等夜解圍去辛卯泰帥輕騎追景至河上景為陳北據河橋南屬邙山與泰合戰泰馬中流矢驚逸遂失所之泰墜地東魏兵追及之左右皆散都督李穆下馬以䇿扶泰背罵曰籠東軍士爾曹主何在而獨留此追者不疑其貴人捨之而過穆以馬授泰與之俱逸魏兵復振撃東魏兵大破之東魏兵北走京兆忠武公高敖曹意輕泰建旗蓋以陵陳魏人盡鋭攻之一軍皆沒敖曹單騎走投河陽南城守將北豫州刺史高永樂歡之從祖兄子也與敖曹有怨閉門不受敖曹仰呼求繩不得拔刀穿闔未徹而追兵至敖曹伏橋下追者見其從奴持金帶問敖曹所在奴指示之敖曹知不免奮頭曰來與汝開國公追者斬其首去高歡聞之如喪肝膽杖高永樂二百贈敖曹太師大司馬太尉泰賞殺敖曹者布絹萬段嵗嵗稍與之比及周亡猶未能足魏又殺東魏西兖州刺史宋顯等虜甲士萬五千人赴河死者以萬數初歡以万俟普尊老特禮之嘗親扶上馬其子洛免冠稽首曰願出死力以報深恩及邙山之戰諸軍北度橋洛獨勒兵不動謂魏人曰万俟受洛干在此能來可來也魏人畏之而去歡名其所營地為回洛是日東西魏置陳既大首尾懸逺從旦至未戰數十合氛霧四塞莫能相知魏獨孤信李逺居右趙貴怡峰居左戰並不利又未知魏主及丞相泰所在皆棄其卒先歸開府儀同三司李虎念賢等爲後軍見信等退即與俱去泰由是燒營而歸留儀同三司長孫子彦守金墉王思政下馬舉長矟左右横撃一舉輒踣數人陷陳既深從者盡死思政被重創悶絶㑹日暮敵亦収兵思政每戰常著破衣弊甲敵不知其將帥故得免帳下督雷五安於戰處哭求思政㑹其已蘇割衣裹創扶思政上馬夜乆始得還營平東將軍蔡祐下馬步鬬左右勸乗馬以備倉猝祐怒曰丞相愛我如子今日豈惜生乎帥左右十餘人合聲大呼撃東魏兵殺傷甚衆東魏人圍之十餘重祐彎弓持滿四靣拒之東魏人募厚甲長刀者直進取之去祐可三十步左右勸射之祐曰吾曹之命在此一矢豈可虛發將至十步祐乃射之應弦而倒東魏兵稍却祐徐引還魏主至恒農守將已弃城走所虜降卒在恒農者相與閉門拒守丞相泰攻拔之誅其魁首數百人蔡祐追及泰於恒農夜見泰泰曰承先爾來吾無憂矣泰驚不得寢枕祐股然後安祐每從泰戰常為士卒先戰還諸將皆爭功祐終無所言泰每歎曰承先口不言勲我當代其論叙泰留王思政鎮恒農除侍中東道行臺魏之東伐也關中留守兵少前後所虜東魏士卒散在民間聞魏兵敗謀作亂李虎等至長安計無所出與太尉王盟僕射周惠達等奉太子欽出屯渭北百姓互相剽掠關中大擾於是沙苑所虜東魏都督趙青雀雍州民于伏德等遂反青雀據長安子城伏德保咸陽與咸陽太守慕容思慶各収降卒以拒還兵長安大城民相帥以拒青雀日與之戰大都督侯莫陳順撃賊屢破之賊不敢出順崇之兄也扶風公王羆鎮河東大開城門悉召軍士謂曰今聞大軍失利青雀作亂諸人莫有固志王羆受委於此以死報恩有能同心者可共固守必恐城陷任自出城衆感其言皆無異志魏主留閺鄉丞相泰以士馬疲弊不可速進且謂青雀等烏合不能為患曰我至長安以輕騎臨之必當面縛通直散騎常侍呉郡陸通諫曰賊逆謀乆定必無遷善之心蜂蠆有毒安可輕也且賊詐言東冦將至今若以輕騎臨之百姓謂為信然益當驚擾今軍雖疲弊精鋭尚多以明公之威揔大軍以臨之何憂不克泰從之引兵西入父老見泰至莫不悲喜士女相賀華州刺史宇文導引兵襲咸陽斬思慶擒伏德南度渭與泰㑹攻青雀破之太保梁景睿以疾留長安與青雀通謀泰殺之東魏太師歡自晉陽將七千騎至孟津未濟聞魏師已遁遂濟河遣别將追魏師至崤不及而還歡攻金墉長孫子彦棄城走焚城中室屋俱盡歡毁金墉而還東魏之遷鄴也主客郎中裴讓之留洛陽獨孤信之敗也讓之弟諏之隨丞相泰入關爲大行臺倉曹郎中歡囚讓之兄弟五人讓之曰昔諸葛亮兄弟事呉蜀各盡其心况讓之老母在此不忠不孝必不爲也明公推誠待物物亦歸心若用猜忌去霸業逺矣歡皆釋之九月魏主入長安丞相泰還屯華州冬十月魏歸高敖曹竇泰莫多婁貸文之首于東魏十二月魏是云寶襲洛陽東魏洛州刺史王元軌棄城走都督趙剛襲廣州拔之於是自襄廣以西城鎮復為魏初魏伊川土豪李長壽為防蠻都督積功至北華州刺史孝武帝西遷長壽帥其徒拒東魏魏以長壽為廣州刺史侯景攻拔其壁殺之其子延孫復収集父兵以拒東魏魏之貴臣廣陵王欣録尚書長孫稚等皆攜家往依之延孫資遣衛送使達關中東魏高歡患之數遣兵攻延孫不能克魏以延孫為京南行臺節度河南諸軍事廣州刺史延孫以澄清伊洛為己任魏以延孫兵少更以長壽之壻京兆韋灋保為東洛州刺史配兵數百以助之灋保名祐以字行既至與延孫連兵置柵於伏流獨孤信之入洛陽也欲繕修宫室使外兵郎中天水權景宣帥徒兵三千出採運㑹東魏兵至河南皆叛景宣間道西走與李延孫相㑹攻孔城拔之洛陽以南尋亦西附丞相泰即留景宣守張白塢節度東南諸軍應關西者是嵗延孫為其長史楊伯蘭所殺韋灋保即引兵據延孫之柵東魏將段琛等據宜陽遣陽州刺史牛道恒誘魏邊民魏南兖州刺史韋孝寛患之乃詐為道恒與孝寛書論歸欵之意使諜人遺之於琛營琛果疑道恒孝寛乗其猜阻出兵襲之擒道恒及琛崤澠遂清東道行臺王思政以玉壁險要請築城自恒農徙鎮之詔加都督汾晉并州諸軍事幷州刺史行臺如故六年春二月東魏大行臺侯景出三鵶將復荆州魏丞相泰遣李弼獨孤信各將五千騎出武關景乃還夏五月乙酉魏行臺宫延和陜州刺史宫延慶降于東魏東魏以河北馬埸為義州以處之八年春三月魏初置六軍秋八月東魏丞相歡撃魏入自汾絳連營四十里丞相泰使王思政守玉壁以斷其道歡以書招思政曰若降當受以幷州思政復書曰可朱渾道元降何以不得冬十月己亥歡圍玉壁凡九日遇大雪士卒飢凍多死者遂解圍去魏遣太子欽鎮蒲坂丞相泰出軍蒲坂至皂莢聞歡退度汾追之不及十一月東魏以可朱渾道元為幷州刺史九年春二月壬申東魏御史中尉高仲宻以虎牢叛降魏魏以仲宻為侍中司徒歡以仲宻之叛由崔暹將殺之高澄匿暹為之固請歡曰我匄其命須與苦手澄乃出暹而謂大行臺都官郎陳元康曰卿使崔暹得杖勿復相見元康為之言於歡曰大王方以天下付大將軍大將軍有一崔暹不能免其杖父子尚爾况於它人歡乃釋之高季式在永安戍仲宻遣信報之季式走告歡歡待之如舊魏丞相泰帥諸軍以應仲宻以太子少傅李逺為前驅至洛陽遣開府儀同三司于謹攻柏谷拔之三月壬申圍河橋南城東魏丞相歡將兵十萬至河北泰退軍瀍上縱火船於上流以燒河橋斛律金使行臺郎中張亮以小艇百餘載長鎖伺火船將至以釘釘之引鎻向岸橋遂獲全歡度河據邙山為陳不進者數日泰留輜重於瀍曲夜登邙山以襲歡候騎白歡曰賊距此四十餘里蓐食乾飯而來歡曰自當渴死乃正陳以待之戊申黎明泰軍與歡軍遇東魏彭樂以數千騎為右甄衝魏軍之北垂所向奔潰遂馳入魏營人告彭樂叛歡甚怒俄而西北塵起樂使來告捷虜魏侍中開府儀同三司大都督臨洮王柬蜀郡王榮宗江夏王昇鉅鹿王闡譙郡王亮詹事趙善及督將僚佐四十八人諸將乗勝撃魏大破之斬首三萬餘級歡使彭樂追泰泰窘謂樂曰汝非彭樂邪癡男子今日無我明日豈有汝邪何不急還營収汝金寶樂從其言獲泰金帶一囊以歸言於歡曰黒獺漏刃破膽矣歡雖喜其勝而怒其失泰令伏諸地親捽其頭連頓之幷數以沙苑之敗舉刃將下者三噤齘良乆樂曰乞五千騎復為王取之歡曰汝縱之何意而言復取邪命取絹三千匹壓樂背因以賜之明日復戰泰為中軍中山公趙貴為左軍領軍若干惠等為右軍中軍右軍合撃東魏大破之悉俘其步卒歡失馬赫連陽順下馬以授歡歡上馬走從者步騎七人追兵至親信都督尉興慶曰王速去興慶腰有百箭足殺百人歡曰事濟以爾為懷州刺史若死用爾子興慶曰兒小願用兄歡許之興慶拒戰矢盡而死東魏軍士有逃奔魏者告以歡所在泰募勇敢三千人皆執短兵配大都督賀拔勝以攻之勝識歡於行間執槊與十三騎逐之馳數里槊刄垂及因字之曰賀六渾賀拔破胡必殺汝歡氣殆絶河州刺史劉洪徽從傍射勝中其二騎武衛將軍段韶射勝馬斃之比副馬至歡已逸去勝歎曰今日不執弓矢天也魏南郢州刺史耿令貴大呼獨入敵中鋒刃亂下人皆謂已死俄奮刀而還如是數四當令貴前者死傷相繼乃謂左右曰吾豈樂殺人壯士除賊不得不爾若不能殺賊又不爲賊所傷何異逐坐人也左軍趙貴等五將戰不利東魏兵復振泰與戰又不利㑹日暮魏兵遂遁東魏兵追之獨孤信于謹収散卒自後撃之追兵驚擾魏諸軍由是得全若干惠夜引去東魏兵追之惠徐下馬顧命厨人營食食畢謂左右曰長安死此中死有以異乎乃建旗鳴角収散卒徐還追騎疑有伏兵不敢逼泰遂入關屯渭上歡進至陜泰使開府儀同三司達奚武等拒之行臺郎中封子繪言於歡曰混壹東西正在今日昔魏太祖平漢中不乗勝取巴蜀失在遲疑後悔無及願大王不以為疑歡深然之集諸將議進止咸以為野無青草人馬疲瘦不可逺追陳元康曰兩雄交争嵗月已乆今幸而大捷天授我也時不可失當乗勝追之歡曰若遇伏兵孤何以濟元康曰王前沙苑失利彼尚無伏今奔敗若此何能逺謀若捨而不追必成後患歡不從使劉豐生將數千騎追泰遂東歸泰召王思政於玉壁將使鎮虎牢未至而泰敗乃使守恒農思政入城令開門解衣而卧慰勉將士示不足畏後數日劉豐生至城下憚之不敢進引軍還思政乃修城郭起樓櫓營農田積芻粟由是恒農始有守禦之備丞相泰求自貶魏主不許是役也魏諸將皆無功唯耿令貴與太子武衛率王胡仁都督王文達力戰功多泰欲以雍岐北雍三州授之以州有優劣使探籌取之仍賜胡仁名勇令貴名豪文達名傑用彰其功於是廣募關隴豪右以増軍旅高仲宻之將叛也隂遣人扇動冀州豪傑使為内應東魏遣高隆之馳驛慰撫由是得安高澄宻書與隆之曰仲宻枝黨與之俱西者宜悉収其家屬以懲將來隆之以為恩㫖既行理無追改若復収治示民不信脫致驚擾所虧不細乃啟丞相歡而罷之夏四月丞相泰使諜潜入虎牢令守將魏光固守侯景獲之改其書云宜速去縱諜入城光宵遁景獲高仲宻妻子送鄴北豫洛二州復入于東魏五月壬辰東魏以克復虎牢降死罪已下囚惟不赦高仲宻家丞相歡以高乾有義勲高昻死王事季式先自告皆為之請免乙未以侯景為司空中大同元年秋八月魏徙幷州刺史王思政為荆州刺史使之舉諸將可代鎮玉壁者思政舉晉州刺史韋孝寛丞相泰從之東魏丞相歡悉奉山東之衆將伐魏癸巳自鄴㑹兵於晉陽九月至玉壁圍之以挑西師西師不出冬十月東魏丞相歡攻玉壁晝夜不息魏韋孝寛隨機拒之城中無水汲於汾歡使移汾一夕而畢歡於城南起土山欲乗之以入城上先有二樓孝寛縛木接之今常高於土山以禦之歡使告之曰雖爾縛樓至天我當穿地取爾乃鑿地為十道又用術士李業興孤虚灋聚攻其北北天險也孝寛掘長塹邀其地道選戰士屯塹上每穿至塹戰士輒擒殺之又於塹外積柴貯火敵有在地道内者塞柴投火以皮排吹之一鼓皆焦爛敵以攻車撞城車之所及莫不摧毁無能禦者孝寛縫布為幔隨其所向張之布既懸空車不能壞敵又縛松麻於竿灌油加火以燒布并欲焚樓孝寛作長鉤利其刄火竿將至以鉤遥割之松麻俱落敵又於城四面穿地為二十道其中施梁柱縱火燒之柱折城崩孝寛隨崩處豎木柵以扞之敵不得入城外盡攻撃之術而城中守禦有餘孝寛又奪據其土山歡無如之何乃使倉曹參軍祖珽説之曰君獨守孤城而西方無救恐終不能全何不降也孝寛報曰我城池嚴固兵食有餘攻者自勞守者常逸豈有旬朔之間已須救援適憂爾衆有不返之危孝寛關西男子必不為降將軍也珽復謂城中人曰韋城主受彼榮禄或復可爾自外軍民何事相隨入湯火中乃射募格於城中云能斬城主降者拜太尉封開國郡公賞帛萬匹孝寛手題書背返射城外云能斬高歡者準此珽瑩之子也東魏苦攻凡五十日士卒戰及病死者七萬人共為一冢歡智力皆困因而發疾有星墜歡營中士卒驚懼十一月庚子解圍去先是歡别使侯景將兵趣齊子嶺魏建州刺史楊􅋆鎮車箱恐其冦邵郡帥騎禦之景聞􅋆至斫木斷路六十餘里猶驚而不安遂還河陽庚戌歡使段韶從太原公洋鎮鄴辛亥徵世子澄㑹晉陽魏以韋孝寛為驃騎大將軍開府儀同三司進爵建忠公時人以王思政為知人十二月己卯歡以無功表解都督中外諸軍東魏主許之歡之自玉壁歸也軍中訛言韋孝寛以定功弩射殺丞相魏人聞之因下令曰勁弩一發凶身自殞歡聞之勉至見諸貴使斛律金作敕勒歌歡自和之哀感流涕太清元年春正月丙午東魏勃海獻武王歡卒二年夏四月甲戌東魏遣太尉高岳行臺慕容紹宗大都督劉豐生等將步騎十萬攻魏王思政於潁川思政命卧皷偃旗若無人者岳恃其衆四面陵城思政選驍勇開門出戰岳兵敗走岳更築土山晝夜攻之思政隨方拒守奪其土山置樓堞以助防守三年夏四月東魏高岳等攻魏潁川不克大將軍澄益兵助之道路相繼踰年猶不下山鹿忠武公劉豐生建䇿堰洧水以灌之城多崩頺岳悉衆分休迭進王思政身當矢石與士卒同勞苦城中泉涌懸釡而炊太師泰遣大將軍趙貴督東南諸州兵救之自長社以北皆為陂澤兵至穰不得前東魏人使善射者乗大艦臨城射之城垂陷燕郡景惠公慕容紹宗與劉豐生臨堰視之見東北塵起同入艦坐避之俄而暴風至逺近晦冥纜斷飄船徑向城城上人以長鉤牽船弓弩亂發紹宗赴水溺死豐生游水向土山城上人射殺之五月東魏高岳既失慕容紹宗等志氣沮喪不敢復逼長社城陳元康言於大將軍澄曰王自輔政以來未有殊功雖破侯景本非外賊今潁川垂陷願王自以為功澄從之戊寅自將步騎十萬攻長社親臨作堰堰三決澄怒推負土者及囊并塞之六月長社城中無鹽人病攣腫死者什八九大風從西北起吹水入城城壞東魏大將軍澄令城中曰有能生致王大將軍者封侯若大將軍身有損傷親近左右皆斬王思政帥衆據土山告之曰吾力屈計窮唯當以死謝國因仰天大哭西向再拜欲自刎都督駱訓曰公常語訓等汝齎我頭出降非但得富貴亦完一城人今高相既有此令公獨不哀士卒之死乎衆共執之不得引決澄遣通直散騎趙彦深就土山遺以白羽扇執手申意牽之以下澄不令拜延而禮之思政初入穎川將士八千人及城陷纔三千人卒無叛者澄悉散配其將卒於逺方改潁川為鄭州禮遇思政甚重西閤祭酒盧潜曰思政不能死節何足可重澄謂左右曰我有盧潜乃是更得一王思政潜度世之曽孫也初思政屯襄陽欲以長社為行臺治所遣使者魏仲啟陳於太師泰并致書於淅州刺史崔猷猷復書曰襄城控帶京洛寔當今之要地如有動静易相應接潁川既鄰寇境又無山川之固賊若潜來徑至城下莫若頓兵襄城為行臺之所潁川置州遣良將鎮守則表裏膠固人心易安縱有不虞豈能為患仲見泰具以啟聞泰令依猷䇿思政固請且約賊水攻期年陸攻三年之内朝廷不煩赴救泰乃許之及長社不守泰深悔之猷孝芬之子也侯景之南叛也丞相泰恐東魏復取景所部地使諸將分守諸城及潁川陷泰以諸城道路阻絶皆令拔軍還高氏簒東魏比齊梁武帝大清元年東魏静帝美容儀旅力過人能拔石師子踰宫牆射無不中好文學從容沈雅時人以為有孝文風烈大將軍澄深忌之始獻武王自病逐君之醜事静帝禮甚恭事無大小必以聞可否聴㫖每侍宴俯伏上壽帝設灋㑹乗輦行香歡執香爐步從鞠躬屏氣承望顔色故其下奉帝莫敢不恭及澄當國倨慢頓甚使中書黄門郎崔季舒察帝動静小大皆令季舒知之澄與季舒書曰癡人比復何似癡勢小差未宜用心檢校帝嘗獵于鄴東馳逐如飛監衛都督烏那羅受工伐從後呼曰天子勿走馬大將軍嗔澄嘗侍飲酒舉大觴屬帝曰臣澄勸陛下酒帝不勝忿曰自古無不亡之國朕亦何用此生為澄怒曰朕朕狗脚朕使崔季舒敺帝三拳奮衣而出明日澄使季舒入勞帝帝亦謝焉賜季舒絹百匹帝不堪憂辱詠謝靈運詩曰韓亡子房奮秦帝魯連耻本自江海人忠義動君子常侍侍講潁川荀濟知帝意乃與祠部郎中元瑾長秋卿劉思逸華山王大器淮南王宣洪濟北王徽等謀誅澄大器鷙之子也帝謬為枚問濟曰欲以何日開講乃詐於宫中作土山開地道向北城至千秋門門者覺地下響以告澄澄勒兵入宫見帝不拜而坐曰陛下何意反臣父子功存社稷何負陛下邪此必左右妃嬪輩所為欲殺胡夫人及李嬪帝正色曰自古唯聞臣反君不聞君反臣王自欲反何乃責我我殺王則社稷安不殺則滅亡無日我身且不暇惜况於妃嬪必欲弑逆緩速在王澄乃下牀叩頭大啼謝罪於是酣飲夜乆乃出居三日幽帝於含章堂壬辰烹濟等於市初濟少居江東博學能文與上有布衣之舊知上有大志然負氣不服常謂人曰㑹於盾鼻上磨墨檄之上甚不平及即位或薦之於上上曰人雖有才亂俗好反不可用也濟上書諌上崇信佛灋為塔寺奢費上大怒欲集朝衆斬之朱异宻告之濟逃奔東魏澄為中書監欲用濟為侍讀獻武王曰我愛濟欲全之故不用濟濟入宫必敗澄固請乃許之及敗侍中楊遵彦謂之曰衰暮何苦復爾濟曰壯氣在耳因下辨曰自傷年紀摧頽功名不立故欲挾天子誅權臣澄欲宥其死親問之曰荀公何意反濟曰奉詔誅高澄何謂反有司以濟老病鹿車載詣東市并焚之澄疑諮議温子昇知瑾等謀方使之作獻武王碑既成餓於晉陽獄食弊襦而死棄尸路隅沒其家口太尉長史宋遊道収葬之澄謂遊道曰吾近書與京師諸貴論及朝士以卿僻於朋黨將為一病今乃知卿真是重故舊尚節義之人天下人代卿怖者是不知吾心也九月辛丑澄還晉陽三年夏四月甲辰東魏進大將軍勃海王澄位相國封齊王加殊禮丁未澄入朝于鄴固辭不許澄召將佐宻議之皆勸澄宜膺朝命獨散騎常侍陳元康以為未可澄由是嫌之崔暹乃薦陸元規為大行臺郎以分元康之權秋七月東魏大將軍澄詣鄴辭爵位殊禮且請立太子澄謂濟隂王暉業曰比讀何書暉業曰數尋伊霍之傳不讀曹馬之書八月辛卯東魏立皇子長仁為太子勃海文襄王高澄以其弟太原公洋次長意常忌之洋深自晦匿言不出口常自貶退與澄言無不順從澄輕之常曰此人亦得富貴相書亦何可解洋為其夫人趙郡李氏營服玩小佳澄輒奪取之夫人或恚未與洋笑曰此物猶應可求兄須何容吝惜澄或愧不取洋即受之亦無飾讓每退朝還第輒閉閤静坐雖對妻子能竟日不言或時袒跣奔躍夫人問其故洋曰為爾漫戯其實蓋欲習勞也澄獲衡州刺史蘭欽子京以為膳奴欽請贖之不許京屢自訴澄杖之曰更訴當殺汝京與其黨六人謀作亂澄在鄴居北城東柏堂嬖琅邪公主欲其往來無閒侍衞者常遣出外辛卯澄與散騎常侍陳元康吏部尚書侍中楊愔黄門侍郎崔季舒屏左右謀受魏禪署擬百官蘭京進食澄却之謂諸人曰昨夜夢此奴斫我當急殺之京聞之寘刀盤下冒言進食澄怒曰我未索食何為遽來京揮刀曰來殺汝澄自投傷足入于床下賊去床弑之愔狼狽走出遺一靴季舒匿于厠中元康以身蔽澄與賊争刀被傷腸出庫真王紘冒刃禦賊紇奚舍樂鬪死時變起倉猝内外震駭太原公洋在城東䨇堂聞之神色不變指麾部分入討羣賊斬而臠之徐出言曰奴反大將軍被傷無大苦也内外莫不驚異洋祕不發喪陳元康手書辭母口占使功曹參軍祖珽作書陳便宜至夜而卒洋殯之第中詐云出使虚除元康中書令以王紘為領左右都督紘基之子也勲貴以重兵皆在幷州勸洋早如晉陽洋從之夜召大將軍督䕶太原唐邕使部分將士鎮遏四方邕支配須臾而畢洋由是重之癸巳洋諷東魏主以立太子大赦澄死問漸露東魏主竊謂左右曰大將軍今死似是天意威權當復歸帝室矣洋留太尉高岳太保高隆之開府儀同三司司馬子如侍中楊愔守鄴餘勲貴皆自隨甲午入謁東魏主於昭陽殿從甲士八千人登階者二百餘人皆攘袂扣刃若對嚴敵令主者傳奏曰臣有家事須詣晉陽再拜而出東魏主失色目送之曰此人又似不相容朕不知死在何日晉陽舊臣宿將素輕洋及至大㑹文武神彩英暢言辭敏洽衆皆大驚澄政令有不便者洋皆改之簡文帝大寶元年春正月戊辰東魏進太原公高洋位丞相都督中外諸軍録尚書事大行臺齊郡王三月庚申東魏進丞相洋爵為齊王東魏齊王洋之為開府也勃海高德政為管記由是親昵言無不盡金帶光禄大夫丹楊徐之才北平太守廣宗宋景業皆善圖䜟以為太嵗在午當有革命因德政以白洋勸之受禪洋以告婁太妃太妃曰汝父如龍兄如虎猶以天位不可妄據終身北靣汝獨何人欲行舜禹之事乎洋以告之才之才曰正為不及父兄故宜早升尊位耳洋鑄像卜之而成乃使開府儀同三司段韶問肆州刺史斛律金金來見洋固言不可以宋景業首陳符命請殺之洋與諸貴議於太妃前太妃曰吾兒懦直必無此心高德政樂禍教之耳洋以人心不壹使高德政如鄴察公卿之意未還洋擁兵而東至平都城召諸勲貴議之莫敢對長史杜弼曰關西國之勍敵若受魏禪恐彼挾天子自稱義兵而東向王何以待之徐之才曰今與王争天下者彼亦欲為王所為縱其屈彊不過隨我稱帝耳弼無以應高德政至鄴諷公卿莫有應者司馬子如逆洋於遼陽固言未可洋欲還倉丞李集曰王來為何事而今欲還洋偽使於東門殺之而别令賜絹十匹遂還晉陽自是居常不悦徐之才宋景業等日陳隂陽雜占云宜早受命高德政亦敦勸不已洋使術士李宻卜之遇大横曰漢文之卦也又使宋景業筮之遇乾之鼎曰乾君也鼎五月卦也宜以仲夏受禪或曰五月不可入官犯之終於其位景業曰王為天子無復下期豈得不終於其位乎洋大悦乃發晉陽高德政録在鄴諸事條進於洋洋令左右陳山提馳驛齎事條幷宻書與楊愔是月山提至鄴楊愔即召太常卿邢劭等議撰儀注祕書監魏収草九錫禪讓勸進諸文引魏宗室諸王入北宫留於康齋甲寅東魏進洋位相國揔百揆備九錫洋行至前亭所乗馬忽倒意甚惡之至平都城不復肯進高德政徐之才苦請曰山提先去恐其漏泄即命司馬子如杜弼馳驛續入觀察物情子如等至鄴衆人以事勢已決無敢異言洋至鄴召夫齎築具集城南高隆之請曰用此何為洋作色曰我自有事君何問為欲族滅邪隆之謝而退於是作圓丘備灋物丙辰司空潘樂侍中張亮黄門郎趙彦深等求入啟事東魏孝静帝在昭陽殿見之亮曰五行遞運有始有終齊王聖德欽明萬方歸仰願陛下逺灋堯舜帝歛容曰此事推挹已乆謹當遜避又曰若爾須作制書中書郎崔劼裴讓之曰制已作訖使侍中楊愔進之東魏主既署曰居朕何所愔對曰北城别有館宇乃下御坐步就東廊詠范蔚宗後漢書賛曰獻生不辰身播國屯終我四百永作虞賓所司請發帝曰古人念遺簮弊履朕欲與六宫别可乎高隆之曰今日天下猶陛下之天下况在六宫帝步入與妃嬪已下别舉宫皆哭趙國李嬪誦陳思王詩云王其愛玉體俱享黄髪期直長趙道德以故犢車一乗候於東閤帝登車道德超上抱之帝叱之曰朕自畏天順人何物奴敢逼人如此道德猶不下出雲龍門王公百僚拜辭高隆之灑泣遂入北城居司馬子如南宅遣太尉彭城王韶等奉璽綬禪位于齊戊午齊王即皇帝位于南郊大赦改元天保自魏敬宗以來百官絶禄至是始復給之己未封東魏主為中山王待以不臣之禮追尊齊獻武王為獻武皇帝廟號太祖後改為高祖文襄王為文襄皇帝廟號世宗辛酉尊王太后婁氏為皇太后乙丑降魏朝封爵有差其宣力霸朝及西南投化者不在降限夏六月齊主封宗室高岳等十人功臣庫狄干等七人皆為王癸未封弟浚為永安王淹為平陽王浟為彭城王演為常山王渙為上黨王淯為襄城王湛為長廣王湝為任城王湜為高陽王濟為博陵王凝為新平王潤為馮翊王洽為漢陽王二年齊主每出入常以中山王自隨王妃太原公主恒為之嘗飲食䕶視之冬十二月齊主飲公主酒使人鴆中山王殺之并其三子謚王曰魏孝静皇帝葬於鄴西漳北其後齊主忽掘其陵投梓宫於漳水齊主初受禪魏神主悉寄於七帝寺至是亦取焚之彭城公元韶以髙氏壻寵遇異於諸元開府儀同三司美陽公元暉業以位望隆重又志氣不倫尤為齊主所忌從齊主在晉陽暉業於宫門外罵韶曰爾不及一老嫗負璽與人何不擊碎之我出此言知即死爾亦詎得幾時齊主聞而殺之及臨淮公元孝友皆鑿汾水冰沈其尸孝友彧之弟也齊主嘗剃元韶鬢鬚加之粉黛以自隨曰吾以彭城為嬪御言其懦弱如婦人也宇文簒西魏後周梁武帝中大通六年魏孝武帝閨門無禮從妹不嫁者三人皆封公主平原公主明月南陽王寶炬之同産也從帝入關丞相泰使元氏諸王取明月殺之帝不悦或時彎弓或時椎桉由是復與泰有隙冬閏十二月癸巳帝飲酒遇酖而殂泰與羣臣議所立多舉廣平王賛賛孝武之兄子也侍中濮陽王順於别室垂涕謂泰曰高歡逼逐先帝立㓜主以專權明公宜反其所為廣平沖㓜不如立長君而奉之泰乃奉太宰南陽王寶炬而立之順素之曾孫也殯孝武帝於草堂佛寺諫議大夫宋球慟哭嘔血漿粒不入口者數日泰以其名儒不之罪也大同八年魏丞相泰妻馮翊公主生子覺大清二年夏五月魏以丞相泰為太師元帝承聖二年春二月魏太師泰去丞相大行臺為都督中外諸軍事冬十一月魏尚書元烈謀殺宇文泰事泄泰殺之三年魏主自元烈之死有怨言宻謀誅太師泰臨淮王育廣平王賛垂涕切諫不聴泰諸子皆㓜兄子章武公導中山公䕶皆出鎮唯以諸壻為心膂大都督清河公李基義城公李暉常山公于翼俱為武衛將軍分掌禁兵基逺之子暉弼之子翼謹之子也由是魏主謀泄泰廢魏主置之雍州立其弟齊王廓去年號稱元年復姓拓跋氏九十九姓改為單者皆復其舊魏初統國三十六大姓九十九後多滅絶泰乃以諸將功高者為三十六國次者為九十九姓所將士卒亦改從其姓夏四月庚戌魏太師泰酖殺廢帝敬帝紹泰元年魏宇文泰諷淮安王育上表請如古制降爵為公於是宗室諸王皆降為公太平元年春正月丁丑魏初建六官以宇文泰為太師大冢宰夏四月魏太師泰尚孝武妹馮翊公主生略陽公覺姚夫人生寧都公毓毓於諸子最長娶大司馬獨孤信女泰將立嗣謂公卿曰孤欲立子以嫡恐大司馬有疑如何衆黙然未有言者尚書左僕射李逺曰夫立子以嫡不以長略陽公為世子公何所疑若以信為嫌請先斬之遂拔刀而起泰亦起曰何至於是信又自陳解逺乃止於是羣公竝從逺議逺出外拜謝信曰臨大事不得不爾信亦謝逺曰今日賴公決此大議遂立覺為世子太師泰北巡秋八月泰北度河冬十月魏安定文公宇文泰還至牽屯山而病驛召中山公䕶䕶至涇州見泰泰謂䕶曰吾諸子皆幼外寇方彊天下之事屬之於汝宜努力以成吾志乙亥卒於雲陽䕶還長安發喪泰能駕御英豪得其力用性好質素不尚虛飾明達政事崇儒好古凡所施設皆依倣三代而為之丙子世子覺嗣位為太師柱國大冢宰出鎮同州時年十五中山公䕶名位素卑雖為泰所屬而羣公各圖執政莫肯服從䕶問計於大司冦于謹謹曰謹早蒙先公非常之知恩深骨肉今日之事必以死爭之若對衆定䇿公必不得讓明日羣公㑹議謹曰昔帝室傾危非安定公無復今日今公一旦違世嗣子雖㓜中山公親其兄子兼受顧託軍國之事理須歸之辭色抗厲衆皆悚動䕶曰此乃家事䕶雖庸昧何敢有辭謹素與泰等夷䕶常拜之至是謹起而言曰公若統理軍國謹等皆有所依遂再拜羣公迫於謹亦再拜於是衆議始定䕶綱紀内外撫循文武人心遂安十二月魏封世子覺為周公魏宇文護以周公幼弱欲早使正位以定人心庚子以魏恭帝詔禪位于周使大宗伯趙貴持節奉册濟北公迪致皇帝璽綬恭帝出居大司馬府陳高祖永定元年春正月辛丑周公即天王位柴燎告天朝百官于露門追尊王考文公為文王妣為文后大赦封魏恭帝為宋公以木德承魏水行夏之時服色尚黒以李弼為太師趙貴為太傅獨孤信為太保中山公䕶為大司馬二月周人殺魏恭帝秋八月晉公䕶廢周王為略陽公迎立岐州刺史寧都公毓後月餘䕶弑略陽公見事逆節宇文護二年秋九月甲申周封少師元羅為韓國公以紹魏後三年秋八月周御正中大夫崔猷建議以為聖人㳂革因時制宜今天子稱王不足以威天下請遵秦漢舊制稱皇帝建年號己亥周王始稱皇帝追尊文王曰文皇帝改元武成侯景之亂梁武帝中大同元年東魏司徒河南大將軍大行臺侯景右足偏短弓馬非其長而多謀筭諸將髙敖曹彭樂等皆勇冠一時景常輕之曰此屬皆如豕突勢何所至景嘗言於丞相髙歡願得兵三萬横行天下要須濟江縛取蕭衍老公以為太平寺主歡使將兵十萬専制河南杖任若已之半體景素輕髙澄嘗謂司馬子如曰髙王在吾不敢有異王沒吾不能與鮮卑小兒共事子如掩其口及歡疾篤澄詐為歡書以召景先是景與歡約曰今握兵在逺人易為詐所賜書背請加㣲㸃歡從之景得書無㸃辭不至又聞歡疾篤用其行臺郎潁川王偉計遂擁兵自固歡謂澄曰我雖病汝面更有餘憂何也澄未及對歡曰豈非憂侯景叛邪對曰然歡曰景專制河南十四年矣常有飛揚跋扈之志顧我能畜養非汝所能駕御也今四方未定勿遽發哀庫狄干鮮卑老公斛律金敕勒老公並性遒直終不負汝可朱渾道元劉豐生逺來投我必無異心潘相樂本作道人心和厚汝兄弟當得其力韓軌少戅宜寛借之彭樂心腹難得宜防䕶之堪敵侯景者唯有慕容紹宗我故不貴之留以遺汝又曰段孝先忠亮仁厚智勇兼僃親戚之中唯有此子軍旅大事宜共籌之又曰邙山之戰吾不用陳元康之言留患遺汝死不瞑目相樂廣寧人也太清元年春正月丙午東魏勃海獻武王歡卒侯景自念已與髙氏有隙内不自安辛亥據河南叛歸于魏潁川刺史司馬世雲以城應之景誘執豫州刺史髙元成㐮州刺史李宻廣州刺史懷朔暴顯等遣軍士二百人載仗暮入西兖州欲襲取之刺史邢子才覺之掩捕盡獲之因散檄東方諸州各為之備由是景不能取諸將皆以為景之叛由崔暹澄不得已欲殺暹以謝景陳元康諫曰今雖四海未清綱紀已定若以數將在外茍悦其心枉殺無辜虧廢刑典豈直上負天神何以下安黎庶晁錯前事願公慎之澄乃止遣司空韓軌督諸軍討景二月魏以開府儀同三司若干惠為司空侯景為太傅河南大行臺上谷公庚辰景又遣其行臺郎中丁和來上表言臣與髙澄有隙請舉函谷以東瑕丘以西豫廣潁荆襄兖南兖濟東豫洛陽北荆北揚等十三州内附惟青徐數州僅須折簡且黄河以南皆臣所職易同反掌若齊宋一平徐事燕趙上召羣臣廷議尚書僕射謝舉等皆曰頃嵗與魏通和邊境無事今納其叛臣竊謂非宜上曰雖然得景則塞北可清機㑹難得豈宜膠柱是嵗正月乙夘上夢中原牧守皆以地來降舉朝稱慶旦見中書舍人朱异告之且曰吾為人少夢若有夢必實异曰此乃宇内混壹之兆也及丁和至稱景定計以正月乙夘上愈神之然意猶未決嘗獨言我國家如金甌無一傷缺今忽受景地詎是事宜脫致紛紜悔之何及朱异揣知上意對曰聖明御宇南北歸仰正以事無機㑹未逹其心今侯景分魏土之半以來自非天誘其衷人賛其謀何以至此若拒而不納恐絶後來之望此誠易見願陛下無疑上乃定議納景壬午以景為大將軍封河南王都督河南北諸軍事大行臺承制如鄧禹故事平西諮議參軍周弘正善占候前此謂人曰國家數年後當有兵起及聞納景曰亂階在此矣三月甲辰遣司州刺史羊鴉仁督兖州刺史桓和仁州刺史湛海珍等將兵三萬趣懸瓠運糧食應接侯景夏五月髙澄遣武衛將軍元柱等將數萬衆晝夜兼行以襲侯景遇景於潁川北柱等大敗景以羊鴉仁等軍猶未至乃退保潁川東魏司徒韓軌等圍侯景於潁川景懼割東荆北兖州魯陽長社四城賂魏以求救尚書左僕射于謹曰景少習兵姦詐難測不如厚其爵位以觀其變未可遣兵也荆州刺史王思政以為若不因機進取後悔無及即以荆州步騎萬餘從魯陽關向陽翟丞相㤗聞之加景大將軍兼尚書令遣太尉李弼儀同三司趙貴將兵一萬赴潁川景恐上責之遣中兵參軍栁昕奉啟於上以為王旅未接死亡交急遂求援關中自救目前臣既不安於髙氏豈見容於宇文但螫手解腕事不得已本圖為國願不賜咎臣獲其力不容即棄今以四州之地為餌敵之資已令宇文遣人入守自豫州以東齊海以西悉臣控壓見有之地盡歸聖朝懸瓠項城徐州南兖事須迎納願陛下速敕境上各置重兵與臣影嚮不使差互上報之曰大夫出境尚有所専况始創奇謀將建大業理須適事而行隨方以應卿誠心有本何假詞費六月東魏韓軌等圍潁川聞魏李弼趙貴等將至己巳引兵還鄴侯景欲因㑹執弼與貴奪其軍貴疑之不往貴欲誘景入營而執之弼止之羊鴉仁遣長史鄧鴻將兵至汝水弼引兵還長安王思政入據潁川景陽稱略地引軍出屯懸瓠景復乞兵於魏丞相㤗使同軌防主韋灋保及都督賀蘭願徳等將兵助之大行臺左丞藍田王悦言於㤗曰侯景之於髙歡始敦鄉黨之情終定君臣之契任居上將位重台司今歡始死景遽外叛蓋所圗甚大終不為人下故也且彼既能背徳於髙氏豈肯盡節於朝廷今益之以勢援之以兵竊恐朝廷貽笑將來也㤗乃召景入朝景隂謀叛魏事計未成厚撫韋灋保等冀為己用外示親宻無猜間每往來諸軍間侍從至少魏軍中名將皆身自造詣同軌防長史裴寛謂灋保曰侯景狡詐必不肯入關欲託欵於公恐未可信若伏兵斬之此亦一時之功也如其不爾即應深為之防不得信其誑誘自貽後悔灋保深然之不敢圖景但自為備而已尋辭還所鎮王思政亦覺其詐宻召賀蘭願徳等還分布諸軍據景七州十二鎮景果辭不入朝遺丞相㤗書曰吾耻與髙澄鴈行安能比肩大弟㤗乃遣行臺郎中趙士憲悉召前後所遣諸軍援景者景遂決意來降魏將任約以所部千餘人降於景㤗以所授景使持節太傅大將軍兼尚書令河南大行臺都督河南諸軍事回授王思政思政並讓不受頻使敦諭惟受都督河南諸軍事秋七月庚申羊鴉仁入懸瓠城甲子詔更以懸瓠為豫州夀春為南豫州改合肥為合州以鴉仁為司豫二州刺史鎮懸瓠西陽太守羊思達為殷州刺史鎮項城八月乙丑下詔大舉伐東魏遣南豫州刺史貞陽侯淵明南兖州刺史南康王㑹理分督諸將淵明懿之子㑹理續之子也始上欲以鄱陽王範為元帥朱异取急在外聞之遽入曰鄱陽雄豪蓋世得人死力然所至殘暴非弔民之材且陛下昔登北顧亭以望謂江右有反氣骨肉為戎首今日之事尤宜詳擇上黙然曰㑹理何如對曰陛下得之矣㑹理懦而無謀所乗襻輿施版屋冠以牛皮上聞不恱貞陽侯淵明時鎮夀陽屢請行上許之㑹理自以皇孫復為都督自淵明以下殆不對接淵明與諸將宻告朱异追㑹理還遂以淵明為都督或告東魏大將軍澄云侯景有北歸之志㑹景將蔡道遵北歸言景頗知悔過景母及妻子皆在鄴澄乃以書諭之語以闔門無恙若還許以豫州刺史終其身還其寵妻愛子所部文武更不追攝景使王偉復書曰今已引二邦揚旌北討熊豹齊奮克復中原幸自取之何勞恩賜昔王陵附漢母在不歸太上囚楚乞羮自若矧伊妻子而可介意脫謂誅之有益欲止不能殺之無損徒復阬戮家累在君何關僕也戊子詔以景録行臺尚書事九月上命蕭淵明堰泗水於寒山以灌彭城俟得彭城乃進軍與侯景掎角癸夘淵明軍于寒山去彭城十八里斷流立堰侍中羊侃監作堰再旬而成東魏徐州刺史太原王則嬰城固守侃勸淵明乗水攻彭城不從諸將與淵明議軍事淵明不能對但云臨時制宜冬十一月東魏大將軍澄使大都督髙岳救彭城欲以金門郡公潘樂為副陳元康曰樂緩於機變不如慕容紹宗且先王之命也公但推赤心於斯人景不足憂也時紹宗在外澄欲召見之恐其驚叛元康曰紹宗知元康特䝉顧待新使人來餉金元康欲安其意受之而厚答其書保無異也乙酉以紹宗為東南道行臺與岳樂偕行初景聞韓軌來曰噉猪腸兒何能為聞髙岳來曰兵精人凡諸將無不為所輕者及聞紹宗來叩鞍有懼色曰誰教鮮卑兒解遣紹宗來若然髙王定未死邪澄以廷尉卿杜弼為軍司攝行臺左丞臨發問以政事之要可為戒者使録一二條弼請口陳之曰天下大務莫過賞罰賞一人使天下之人喜罰一人使天下之人懼茍二事不失自然盡美澄大悦曰言雖不多於理甚要紹宗帥衆十萬據槖駝峴羊侃勸貞陽侯淵明乗其逺來擊之不從旦日又勸出戰亦不從侃乃帥所領出屯堰上丙午紹宗至城下引步騎萬人攻潼州刺史郭鳯營矢下如雨淵明醉不能起命諸將救之皆不敢出北兖州刺史胡貴孫謂譙州刺史趙伯超曰吾屬將兵而來本欲何為今遇敵而不戰乎伯超不能對貴孫獨帥麾下與東魏戰斬首二百級伯超擁衆數千不敢救謂其下曰虜盛如此與戰必敗不如全軍早歸可以免罪皆曰善遂遁還初侯景常戒梁人曰逐北勿過二里紹宗將戰以梁人輕悍恐其衆不能支一一引將卒謂之曰我當陽退誤呉兒使前爾擊其背東魏兵實敗走梁人不用景言乗勝深入魏將卒以紹宗之言為信爭共掩擊之梁兵大敗貞陽侯淵明及胡貴孫趙伯超等皆為東魏所虜失亡士卒數萬人羊侃結陳徐還上方晝寢宦者張僧胤白朱异啟事上駭之遽起升輿至文徳殿閤异曰韓山失律上聞之怳然將墜牀僧胤扶而就坐乃歎曰吾得無復為晉家乎郭鳯退保潼州慕容紹宗進圍之十二月甲子朔鳯弃城走東魏使軍司杜弼作檄移梁朝曰皇家垂統光配彼天唯彼呉越獨阻聲教元首懷止戈之心上宰薄兵車之命遂解縶南冠喻以好睦雖嘉謀長筭爰自我始罷戰息民彼獲其利侯景豎子自生猜貳逺託關隴依憑姦僞逆主定君臣之分偽相結兄弟之親豈曰無恩終成難養俄而易慮親尋干戈釁暴惡盈側首無託以金陵逋逃之藪江南流寓之地甘辭卑禮進孰圖身詭言浮說抑可知矣而偽朝大小幸災忘義主荒於上臣蔽於下連結姦惡斷絶鄰好徴兵保境縱盗侵國蓋物無定方事無定勢或乗利而受害或因得而更失是以呉侵齊境遂得句踐之師趙納韓地終有長平之役矧乃鞭撻疲民侵軼徐部築壘擁川舍舟徼利是以援枹秉麾之將拔拒投石之士含怒作色如赴私讎彼連營擁衆依山傍水舉螳蜋之斧被蛣蜣之甲當窮轍以待輪坐積薪而候燎及鋒刄暫交埃塵且接已亡㦸弃戈土崩瓦解掬指舟中衿甲鼓下同宗異姓縲紲相望曲直既殊彊弱不等獲一人而失一國見黄雀而忘深穽智者所不為仁者所不向誠既往之難逮猶將來之可追侯景以鄙俚之夫遭風雲之㑹位班三事邑啟萬家揣身量分乆當止足而周章向背離披不已夫豈徒然意亦可見彼乃授之以利器誨之以慢藏使其勢得容姦時堪乗便今見南風不競天亡有徴老賊姦謀將復作矣然推堅彊者難為功摧枯朽者易為力計其雖非孫呉猛將燕趙精兵猶是乆涉行陳曾習軍旅豈同剽輕之師不比危脆之衆拒此則作氣不足攻彼則為勢有餘終恐尾大於身踵麤於股倔彊不掉狼戾難馴呼之則反速而舋小不徴則叛遲而禍大㑹應遥望廷尉不肯為臣自據淮南亦欲稱帝但恐楚國亡猨禍延林木城門失火殃及池魚横使江淮士子荆楊人物死亡矢石之下夭折霧露之中彼梁主操行無聞輕險有素射雀論功蕩舟稱力年既老矣耄又及之政散民流禮崩樂壞加以用舍乖方廢立失所矯情動俗飾智驚愚毒螫滿懷妄敦戒業躁競盈胷謬治清淨災異降於上怨讟興於下人人厭苦家家思亂履霜有漸堅冰且至傳險躁之風俗任輕薄之子孫朋黨路開兵權在外必將禍生骨肉舋起腹心彊弩衝城長戈指闕徒探雀鷇無救府蔵之虚空請熊蹯詎延晷刻之命外崩中潰今實其時鷸蚌相持我乗其敝方使駿騎追風精甲輝日四七並列百萬為羣以轉石之形為破竹之勢當使鍾山渡江青蓋入洛荆棘生於建業之宫麋鹿遊於姑蘇之館但恐革車之所􅞂轢劒騎之所蹂踐𣏌梓於焉傾折竹箭以此摧殘若吳之王孫蜀之公子歸欵軍門委命下吏當即授客卿之秩特加驃騎之號凡百君子勉求多福其後梁室禍敗皆如弼言侯景圍譙城不下退攻城父拔之壬申遣其行臺左丞王偉等詣建康説上曰鄴中文武合謀召臣共討髙澄事泄澄幽元善見於金墉殺諸元六十餘人河北物情俱念其主請立元氏一人以從人望如此則陛下有繼絶之名臣景有立功之效河之南北為聖朝之邾莒國之男女為大梁之臣妾上以為然乙亥下詔以太子舍人元貞為咸陽王資以兵力使還北主魏須度江許即位儀衛以乗輿之副給之貞樹之子也蕭淵明至鄴東魏主升閶闔門受俘讓而釋之送於晉陽大將軍澄待之甚厚慕容紹宗引軍擊侯景景輜重數千兩馬數千匹士卒四萬人退保渦陽紹宗士卒十萬旗甲耀日鳴鼓長驅而進景使謂之曰公等為欲送客為欲定雌雄邪紹宗曰欲與公決勝負遂順風布陳景閉壘俟風過乃出紹宗曰侯景多詭計好乗人背使備之果如其言景命戰士皆被短甲執短刀入東魏陳但低視斫人脛馬足東魏兵遂敗紹宗墜馬儀同三司劉豐生被傷顯州刺史張遵業為景所擒紹宗豐生俱奔譙城禆將斛律光張恃顯尤之紹宗曰吾戰多矣未見如景之難克者也君輩試犯之光等被甲將出紹宗戒之曰勿度渦水二人軍於水比光輕騎射之景臨渦水謂光曰爾求勲而來我懼死而去我汝之父友何為射我汝豈自解不度水南慕容紹宗教汝也光無以應景使其徒田遷射光馬洞胷光易馬隠樹又中之退入於軍景擒恃顯既而捨之光走入譙城紹宗曰今定何如而尤我也光金之子也開府儀同三司叚韶夾渦而軍潛於上風縱火景帥騎入水出而却走草濕火不復然侯景與東魏慕容紹宗相持數月景食盡司馬世雲降於紹宗二年春正月己亥慕容紹宗以鐵騎五千夾擊侯景景誑其衆曰汝輩家屬已為髙澄所殺衆信之紹宗遥呼曰汝輩家屬並完若歸官勲如舊被髪向北斗為誓景士卒不樂南渡其將暴顯等各帥所部降於紹宗景衆大潰爭赴渦水水為之不流景與腹心數騎自硤石濟淮稍收散卒得步騎八百人南過小城人登陴詬之曰跛奴欲何為邪景怒破城殺詬者而去晝夜兼行追軍不敢逼使謂紹宗曰景若就禽公復何用紹宗乃縱之甲辰豫州刺史羊鴉仁以東魏軍漸逼稱運糧不繼棄懸瓠還義陽殷州刺史羊思達亦棄項城走東魏人皆據之上怒責讓鴉仁鴉仁懼啟申後期頓軍淮上侯景既敗不知所適時鄱陽王範除南豫州刺史未至馬頭戍主劉神茂素為監州事韋黯所不容聞景至故住候之景問曰夀陽去此不逺城池險固欲往投之韋黯其納我乎神茂曰黯雖據城是監州耳王若馳至近郊彼必出迎因而執之可以集事得城之後徐以啟聞朝廷喜王南歸必不責也景執其手曰天教也神茂請帥步騎百人先爲鄉導壬子景夜至夀陽城下韋黯以爲賊也授甲登陴景遣其徒告曰河南王戰敗來投此鎮願速開門黯曰皆不奉敕不敢聞命景謂神茂曰事不諧矣神茂曰黯懦而寡智可說下也乃遣夀陽徐思玉入見黯曰河南王爲朝廷所重君所知也今失利來投何得不受黯曰吾之受命唯知守城河南自敗何預吾事思玉曰國家付君以閫外之略今君不肯開城若魏追兵來至河南爲魏所殺君豈能獨守縱使或存何顔以見朝廷黯然之思玉出報景大恱曰活我者卿也癸丑黯開門納景景遣其將分守四門詰責黯將斬之既而撫手大笑置酒極歡黯叡之子也朝廷聞景敗未得審問或云景與將士盡沒上下咸以為憂侍中太子詹事何敬容詣東宫大子曰淮北始更有信侯景定得身免不如所傳敬容對曰得景遂死深為朝廷之福太子失色問其故敬容曰景翻覆叛臣終當亂國太子於玄圃自講老莊敬容謂學士呉孜曰昔西晉祖尚玄虚使中原淪於胡羯今東宫復爾江南亦將為戎乎甲寅景遣儀同三司于子恱馳以敗聞并自求貶削優詔不許景復求資給上以景兵新破未忍移易乙夘即以景為南豫州牧本官如故更以鄱陽王範為合州刺史鎮合肥光禄大夫蕭介上表諫曰竊聞侯景以渦陽敗績隻馬歸命陛下不悔前禍復敕容納臣聞凶人之性不移天下之惡一也昔吕布殺丁原以事董卓終誅董而為賊劉牢反王恭以歸晉還背晉以構妖何者狼子野心終無馴狎之性養虎之喻必見飢噬之禍侯景以凶狡之才荷髙歡卵翼之遇位忝台司任居方伯然而髙歡墳土未乾即還反噬逆力不逮乃復逃死關西宇文不容故復投身於我陛下前者所以不逆細流正欲比屬國降胡以討匈奴兾獲一戰之效耳今既亡師失地直是境上之匹夫陛下愛匹夫而弃與國臣竊不取也若國家猶待其更鳴之晨嵗暮之效臣竊惟侯景必非嵗暮之臣弃鄉國如脫屣背君親如遺芥豈知逺慕聖徳為江淮之純臣乎事迹顯然無可致惑臣朽老疾侵不應干預朝政但楚囊將死有城郢之忠衞魚臨亡亦有尸諫之節臣忝為宗室遺老敢忘劉向之心上歎息其忠然不能用介思話之孫也二月東魏殺其南兖州刺史石長宣討侯景之黨也其餘為景所脅從者皆赦之東魏既得懸瓠項城悉復舊境大將軍澄數遣書移復求通好朝廷未之許澄謂貞陽侯淵明曰先王與梁主和好十有餘年聞彼禮佛文云奉為魏主并及先王此乃梁王厚意不謂一朝失信致此紛擾知非梁主本心當是侯景扇動耳宜遣使諮論若梁主不忘舊好吾亦不敢違先王之意諸人並即遣歸侯景家屬亦當同遣淵明乃遣省事夏侯僧辯奉啓於上稱勃海王弘厚長者若更通好當聴淵明還上得啟流涕與朝臣議之右衞將軍朱异御史中丞張綰等皆曰靜冦息民和實爲便司農卿傅岐獨曰髙澄何事須和必是設閒故命貞陽遣使欲令侯景自疑景意不安必圖禍亂若許通好正墮其計中异等固執宜和上亦厭用兵乃從异言賜淵明書曰知髙大將軍禮汝不薄省啟甚以慰懷當别遣行人重敦鄰睦僧辯還過夀陽侯景竊訪知之攝問具服乃寫答淵明之書陳啟於上曰髙氏心懷鴆毒怨盈北土人願天從歡身殞越子澄嗣惡討滅待時所以昧此一勝者蓋天蕩澄心以盈凶毒耳澄茍行合天心腹心無疾又何急急奉璧求和豈不以秦兵扼其喉胡騎迫其背故甘辭厚幣取安大國臣聞一日縱敵數世之患何惜髙澄一豎以弃億兆之心竊以北魏安彊莫過天監之始鍾離之役匹馬不歸當其彊也陛下尚伐而取之及其弱也反慮而和之舍已成之功縱垂死之虜使其假命彊梁以遺後世非直愚臣扼腕實亦志士痛心昔伍相奔呉楚邦卒滅陳平去項劉氏用興臣雖才劣古人心同往事誠知髙澄忌賈在翟惡㑹居秦求盟請和兾除其患若臣死有益萬殞無辭唯恐千載有穢良史景又致書於朱异餉金三百兩异納金而不通其啓己夘上遣使弔澄景又啓曰臣與髙氏舋隙已深仰慿威靈期雪讎恥今陛下復與髙氏連和使臣何地自處乞申後戰宣暢皇威上報之曰朕與公大義已定豈有成而相納敗而相弃乎今髙氏有使求和朕亦更思偃武進退之宜國有常制公但清靜自居無勞慮也景又啓曰臣今蓄糧聚衆秣馬潜戈指日計期克清趙魏不容軍出無名故願以陛下為主耳今陛下弃臣遐外南北復通將恐微臣之身不免髙氏之手上又報曰朕為萬乗之主豈可失信於一物想公深得此心不勞復有啟也景乃詐為鄴中書求以貞陽侯易景上將許之舍人傅岐曰侯景以窮歸義弃之不祥且百戰之餘寧肯束手受縶謝舉朱异曰景奔敗之將一使之力耳上從之復書曰貞陽旦至侯景夕返景謂左右曰我固知呉老公薄心腸王偉說景曰今坐聴亦死舉大事亦死唯王圖之於是始為反計屬城居民悉召募為軍士輙停責市估及田租百姓子女悉以配將士夏五月上遣建康令謝挺散騎常侍徐陵聘于東魏復修前好陵摛之子也秋八月侯景自至夀陽徴求無已朝廷未嘗拒絶景請娶於王謝上曰王謝門髙非偶可於朱張以下訪之景恚曰㑹將呉兒女配奴又啟求錦萬匹為軍人作袍中領軍朱异議以青布給之又以臺所給仗多不能精啟請東冶鍜工欲更營造敕並給之景以安北將軍夏侯䕫之子譒為長史徐思玉為司馬譒遂去夏稱侯託為族子上既不用景言與東魏和親是後景表疏稍稍悖慢又聞徐陵等使魏反謀益甚元貞知景有異志累啟還朝景謂曰河北事雖不果江南何慮失之何不小忍貞懼逃歸建康具以事聞上以貞為始興内史亦不問景臨賀王正徳所至貪暴不灋屢得罪於上由是憤恨隂養死士儲米積貨幸國家有變景知之正徳在北與徐思玉相知景遣思玉致牋於正徳曰今天子年尊姦臣亂國以景觀之計日禍敗大王屬當儲貳中被廢黜四海業業歸心大王景雖不敏實思自效願王允副蒼生鑒斯誠欵正徳大喜曰侯公之意闇與吾同天授我也報之曰朝廷之事如公所言僕之有心為日乆矣今僕為其内公為其外何有不濟機事在速今其時矣鄱陽王範宻啟景謀反時上以邊事専委朱异動靜皆關之异以為必無此理上報範曰景孤危寄命譬如嬰兒仰人乳哺以此事勢安能反乎範重陳之曰不早翦撲禍及生民上曰朝廷自有處分不須汝深憂也範復請自以合肥之衆討之上不許朱异謂範使曰鄱陽王遂不許朝廷有一客自是範啟异不復為通景邀羊鴉仁同反鴉仁執其使以聞异曰景數百叛虜何能為敕以使者付建康獄俄解遣之景益無所憚啟上曰若臣事是實應罹國憲如䝉照察請戮鴉仁景又上言髙澄狡猾寧可全信陛下納其詭語求與連和臣亦竊所笑也臣寧堪粉骨投命讎門乞江西一境受臣控督如其不許即帥甲騎臨江上向閩越非唯朝廷自恥亦是三公旰食上使朱异宣語答景使曰譬如貧家畜十客五客尚能得意朕唯有一客致有忿言亦朕之失也益加賞賜錦綵錢布信使相望戊戌景反於夀陽以誅中領軍朱异少府卿徐驎太子右衞率陸驗制局監周石珍為名异等皆以姦佞驕貪蔽主弄權為時人所疾故景託以興兵驎驗呉郡人石珍丹楊人驎驗迭為少府丞以苛刻為務百賈怨之异尤與之暱世人謂之三蠹司農卿傅岐梗直士也嘗謂异曰卿任參國鈞榮寵如此比日所聞鄙穢狼藉若使聖主發悟欲免得乎异曰外閒謗讟知之乆矣心茍無媿何䘏人言岐謂人曰朱彦和將死矣恃謟以求容肆辯以拒諫聞難而不懼知惡而不改天奪其鑒其能乆乎景西攻馬頭遣其將宋子仙東攻木栅執戍主曹璆等上聞之笑曰是何能爲吾折箠笞之敕購斬景者封三千户公除州刺史甲辰詔以合州刺史鄱陽王範爲南道都督北徐州刺史封山侯正表爲北道都督司州刺史栁仲禮爲西道都督通直散騎常侍裴之髙爲東道都督以侍中開府儀同三司邵陵王綸持節董督衆軍以討景正表宏之子仲禮慶逺之孫之髙邃之兄子也九月侯景聞臺軍討之問策於王偉偉曰邵陵若至彼衆我寡必為所困不如弃淮南決志東向帥輕騎直掩建康臨賀反其内大王攻其外天下不足定也兵貴拙速宜即進路景乃留外弟中軍大都督王顯貴守夀陽癸未詐稱遊獵出夀陽人不之覺冬十月庚寅景揚聲趣合肥而實襲譙州助防董紹先開城降之執刺史豐城侯泰泰範之弟也先為中書舍人傾財以事時要超授譙州刺史至州徧發民丁使擔腰輿扇繖等物不限士庶恥為之者重加杖責多輸財者即縱免之由是人皆思亂及侯景至人無戰心故敗庚子詔遣寧逺將軍王質帥衆三千巡江防遏景攻歴陽太守莊鐵丁未鐵以城降因說景曰國家承平嵗乆人不習戰聞大王舉兵内外震駭宜乗此際速趨建康可兵不血刃而成大功若使朝廷徐得為備内外小安遣羸兵千人直據采石大王雖有精甲百萬不得濟矣景乃留儀同三司田英郭駱守歴陽以鐵為導引兵臨江江上鎮戍相次啟聞上問討景之策於都官尚書羊侃侃請以二千人急據采石令邵陵王襲取夀陽使景進不得前退失巢穴烏合之衆自然瓦解朱异曰景必無度江之志遂寢其議侃曰今兹敗矣戊申以臨賀王正徳為平北將軍都督京師諸軍事屯丹楊郡正徳遣大船數十船詐稱載荻宻以濟景景將濟慮王質為梗使諜視之會臨川太守陳昕啟稱采石急須重鎮王質水軍輕弱恐不能濟上以昕為雲旗將軍代質戍采石徴質知丹楊尹事昕慶之之子也質去采石而昕猶未下渚諜告景云質已退景使折江東樹枝為驗諜如言而返景大喜曰吾事辦矣己酉自横江濟于采石有馬數百匹兵八千人是夕朝廷始命戒嚴景分兵襲姑孰執淮南太守文成侯寧南津校尉江子一帥舟師千餘人欲於下流邀景其副童桃生家在江北與其徒先潰走子一收餘衆歩還建康子一子四之兄也太子見事急戎服入見上稟受方畧上曰此自汝事何更問為内外軍悉以付汝太子乃停中書省指揮軍事物情惶駭莫有應募者朝廷猶不知臨賀王正徳之情命正徳屯朱雀門寧國公大臨屯新亭太府卿韋黯屯六門繕脩宫城為受敵之備大臨大器之弟也己酉景至慈湖建康大駭御街人更相劫掠不復通行赦東西冶尚方錢署及建康繫囚以揚州刺史宣城王大器都督城内諸軍事以羊侃為軍師將軍副之南浦侯推守東府西豐公大春守石頭輕車長史謝禧始興太守元貞守白下韋黯與右衛將軍栁津等分守宫城諸門及朝堂推秀之子大春大臨之弟津仲禮之父也攝諸寺庫公蔵錢聚之徳陽堂以充軍實庚戌侯景至板橋遣徐思玉來求見上實欲觀城中虚實上召問之思玉詐稱叛景請閒陳事上將屏左右舍人髙善寶曰思玉從賊中來情偽難測安可使獨在殿上朱异侍坐曰徐思玉豈刺客邪思玉出景啟言异等弄權乞帶甲入朝除君側之惡异甚慚悚景又請遣了事舍人出相領解上遣中書舍人賀季主書郭寶亮隨思玉勞景于板橋景北面受敕季曰今者之舉何名景曰欲為帝也王偉進曰朱异等亂政除姦臣耳景既出惡言遂留季獨遣寶亮還宫百姓聞景至競入城公私混亂無復次第羊侃區分防擬皆以宗室閒之軍人爭入武庫自取器甲所司不能禁侃命斬數人方止是時梁興四十七年境内無事公卿在位及閭里士大夫罕見甲兵賊至猝迫公私駭震宿將已盡後進少年並出在外軍旅指撝一決於侃侃膽力俱壯太子深仗之辛亥景至朱雀桁南太子以臨賀王正徳守宣陽門東宫學士新野庾信守朱雀門帥宫中文武三千餘人營桁北太子命信開大桁以挫其鋒正徳曰百姓見開桁必大驚駭可且安物情太子從之俄而景至信帥衆開桁始除一舶見景軍皆著鐵面退隠于門信方食甘蔗有飛箭中門柱信手甘蔗應弦而落遂弃軍走南塘遊軍沈子睦臨賀王正徳之黨也復閉桁度景太子使王質將精兵三千援信至領軍府遇賊未陳而走正徳帥衆於張侯橋迎景馬上交揖既入宣陽門望闕而拜歔欷流涕隨景度淮景軍皆著青袍正徳軍並著絳袍碧裏既與景合悉反其袍景乗勝至闕下城中恟懼羊侃詐稱得射書云邵陵王西昌侯援兵已至近路衆乃少安西豐公大春弃石頭奔京口謝禧元貞弃白下走津主彭文粲等以石頭城降景景遣其儀同三司于子恱守之壬子景列兵繞臺城旛旗皆黑射啟於城中曰朱异等蔑弄朝權輕作威福臣為所䧟欲加屠戮陛下若誅朱异等臣則斂轡北歸上問太子有是乎對曰然上將誅之太子曰賊以异等為名耳今日殺之無救於急適足貽笑將來俟賊平誅之未晚上乃止景繞城既帀百道俱攻鳴鼓吹脣喧聲震地縱火燒大司馬東西華諸門羊侃使鑿門上為竅下水沃火太子自捧銀鞍往賞戰士直閣將軍朱思帥戰士數人踰城出外灑水乆之方滅賊又以長柯斧斫東掖門門將開羊侃鑿扇為孔以槊刺殺二人斫者乃退景據公車府正德據左衞府景黨宋子仙據東宫范桃棒據同泰寺景取東宫妓數百分給軍士東宫近城景衆登其牆射城内至夜景於東宫置酒奏樂太子遣人焚之臺殿及所聚圖書皆盡景又燒乗黄廐士林館太府寺癸丑景作木驢數百攻城城上投石碎之景更作尖項木驢石不能破羊侃使作雉尾炬灌以膏蠟叢擲焚之俄盡景又作登城樓髙十餘丈欲臨射城中侃曰車髙塹虚彼來必倒可卧而觀之及車動果倒景攻既不克士卒死傷多乃築長圍以絶内外又啟求誅朱异等城中亦射賞格出外曰有能送景首者授以景位并錢一億萬布絹各萬匹朱异張綰議出兵擊之上問羊侃侃曰不可今出人若少不足破賊徒挫銳氣若多則一旦失利門隘橋小必大致失亡异等不從使千餘人出戰鋒未及交退走爭橋赴水死者太半侃子鷟為景所獲執至城下以示侃侃曰我傾宗報主猶恨不足豈計一子幸早殺之數日復持來侃謂鷟曰乆以汝為死矣猶在邪引弓射之景以其忠義亦不之殺莊鐵慮景不克託稱迎母與左右數十人趣歴陽先遣書紿田英郭駱曰侯王已為臺軍所殺國家使我歸鎮駱等大懼弃城奔夀陽鐵入城不敢守奉其母奔尋陽十一月戊午朔刑白馬祀蚩尤於太極殿前臨賀王正徳即帝位於儀賢堂下詔稱普通已來姦邪亂政上乆不豫社稷將危河南王景釋位來朝猥用朕躬紹兹寶位可大赦改元正平立其世子見理為皇太子以景為丞相妻以女并出家之寳貨悉助軍資於是景營於闕前分其兵二千人攻東府南浦侯推拒之三日不克景自徃攻之矢石雨下宣城王防閤許伯衆潛引景衆登城辛酉克之殺南浦侯推及城中戰士三千人載其尸聚於杜姥宅遥語城中人曰若不早降正當如此景聲言上已晏駕雖城中亦以為然壬戌太子請上巡城上幸大司馬門城上聞蹕聲皆鼓譟流涕衆心粗安江子一之敗還也上責之子一拜謝曰臣以身許國常恐不得其死今所部皆弃臣去臣以一夫安能擊賊若賊遂能至此臣誓當碎身以贖前罪不死闕前當死闕後癸亥子一啟太子與弟尚書左丞子四東宫主帥子五帥所領百餘人開承明門出戰子一直抵賊營賊伏兵不動子一呼曰賊輩何不速出乆之賊騎出夾攻之子一徑前引槊刺賊從者莫敢繼賊解其肩而死子四子五相謂曰與兄俱出何面獨旋皆免胄赴賊子四中稍洞胷而死子五傷脰還至塹一慟而絶景初至建康謂朝夕可拔號令嚴整士卒不敢侵暴及屢攻不克人心離沮景恐援兵四集一旦潰去又食石頭常平諸倉既盡軍中乏食乃縱士卒掠奪民米及金帛子女是後米一升直七八萬錢人相食餓死者什五六乙丑景於城東西起土山驅迫士民不限貴賤亂加敺捶疲羸者因殺以填山號哭動地民不敢竄匿並出從之旬日間衆至數萬城中亦築土山以應之太子宣城王以下皆親負土執畚鍾於山上起芙蓉層樓髙四丈飾以錦罽募敢死士二千人厚衣袍鎧謂之僧騰客分配二山晝夜交戰不息㑹大雨城内土山崩賊乗之垂入苦戰不能禁羊侃令多擲火為火城以斷其路徐於内築城賊不能進景募人奴降者悉免為良得朱异奴以為儀同三司异家資産悉與之奴乗良馬衣錦袍於城下仰訴异曰汝五十年仕宦方得中領軍我始事侯王已為儀同失於是三日之中羣奴出就景者以千數景皆厚撫以配軍人人感恩為之致死荆州刺史湘東王繹聞景圍臺城丙寅戒嚴移檄所督湘州刺史河東王譽雍州刺史岳陽王詧江州刺史當陽公大心郢州刺史南平王恪等發兵入援大心大器之弟恪偉之子也朱异遺景書為陳禍福景報書并告城中士民以為梁自近嵗以來權倖用事割剥齊民以供嗜欲如曰不然公等試觀今日國家池苑王公第宅僧尼寺塔及在位庶僚姬姜百室僕從數于不耕不織錦衣玉食不奪百姓從何得之僕所以趨赴闕庭指誅權佞非傾社稷今城中指望四方入援吾觀主侯諸將志在全身誰能竭力致死與吾爭勝負哉長江天險二曹所歎吾一葦航之日明氣淨自非天人允協何能如是幸各三思自求元吉景又奉啟於東魏主稱臣進取夀春暫欲停憇而蕭衍識此運終自辭寶位臣軍未入其國已投同泰捨身去月二十九日届此建康江海未蘇干戈暫止永言故鄉人馬同戀尋當整轡以奉聖顔臣之母弟乆謂屠滅近奉明敕始承猶在斯乃陛下寛仁大將軍恩念臣之弱劣知何仰報今輙齎啟迎臣母弟妻兒伏願聖慈特賜裁放己巳湘東王繹遣司馬呉曅天門太守樊文皎等將兵發江陵陳昕為景所擒景與之極飲使昕收集部曲欲用之昕不可景使其儀同三司范桃棒囚之昕因說桃棒使帥所部襲殺王偉宋子仙詣城降桃棒從之潛遣昕夜縋入城上大喜敕鐫銀劵賜桃棒曰事定之日封汝河南王即有景衆并給金帛女樂太子恐其詐猶豫不决上怒曰受降常理何忽致疑太子召公卿㑹議朱异傅岐曰桃棒降必非謬桃棒既降賊景必驚乗此擊之可大破也太子曰吾堅城自守以俟外援援兵既至賊豈足平此萬全策也今開門納桃棒桃棒之情何易可知萬一為變悔無所及社稷事重須更詳之异曰殿下若以社稷之急宜納桃棒如其猶豫非异所知太子終不能決桃棒又使昕啟曰今止將所領五百人若至城門皆自脫甲乞朝廷開門賜容事濟之後保擒侯景太子見其懇切愈疑之朱异拊膺曰失此社稷事去矣俄而桃棒為部下所告景拉殺之陳昕不知如期而出景邀得之逼使射書城中曰桃棒且輕將數十人先入景欲衷甲隨之昕不肯期以必死乃殺之景使蕭見理與儀同三司盧暉略戍東府見理凶險夜與羣盗剽劫於大桁中流矢而死邵陵王綸行至鍾離聞侯景已度采石綸晝夜兼道旋軍入援濟江中流風起人馬溺者什一二遂帥寧逺將軍西豐公大春新塗公大成永安侯確安南侯駿前譙州刺史趙伯超武州刺史蕭弄璋等歩騎三萬自京口西上大成大春之弟確綸之子駿懿之孫也景遣軍至江乗拒綸軍趙伯超曰若從黄城大路必與賊遇不如徑指鍾山突據廣莫門出賊不意城圍必解矣綸從之夜行失道迂二十餘里庚辰旦營于蔣山景見之大駭悉送所掠婦女珍貨於石頭具舟欲走分兵三道攻綸綸與戰破之時山巔寒雪乃引軍下愛敬寺景陳兵於覆舟山北乙酉綸進軍玄武湖側與景對陳不戰至暮景更約明日㑹戰綸許之安南侯駿見景軍退以為走即與壯士逐之景旋軍擊之駿敗走趣綸軍趙伯超望見亦引兵走景乗勝追擊之諸軍皆潰綸收餘兵近千人入天保寺景追之縱火燒寺綸犇朱方士卒踐冰雪徃徃墮足景悉收綸輜重生擒西豐公大春安前司馬莊丘慧主帥霍俊等而還丙戌景陳所獲綸軍首虜鎧仗及大春等於城下使言曰邵陵王已為亂兵所殺霍俊獨曰王小失利已全軍還京口城中但堅守援軍尋至賊以刀敺其背俊辭色彌厲景義而釋之臨賀王正徳殺之是日晚鄱陽王範遣其世子嗣與西豫州刺史裴之髙建安太守趙鳯舉各將兵入援軍于蔡洲以待上流諸軍範以之髙督江右援軍事景悉驅南岸居民於水北焚其廬舍大街已西掃地俱盡北徐州刺史封山侯正表鎮鍾離上召之入援正表託以船糧未集不進景以正表為南兖州刺史封南郡王正表乃於歐陽立柵以斷援軍帥衆一萬聲言入援實欲襲廣陵宻書誘廣陵令劉詢使燒城為應詢以告南兖州刺史南康王㑹理十二月㑹理使詢帥歩騎千人夜襲正表大波之正表走還鍾離詢收其兵糧歸就㑹理與之入援癸巳侍中都官尚書羊侃卒城中益懼侯景大造攻具陳於闕前大車髙數丈一車二十輪丁酉復進攻城以蝦蟇車運土填塹湘東王繹遣世子方等將歩騎一萬入援建康庚子發公安繹又遣竟陵太守王僧辯將舟師萬人出自漢川載糧東下方等有俊才善騎射每戰親犯矢石以死節自任壬寅侯景以火車焚臺城東南樓材官呉景有巧思於城内構地為樓火纔滅新樓即立賊以為神景因火起潜遣人於其下穿城城將崩乃覺之呉景於城内更築迃城狀如却月以擬之兼擲火焚其攻具賊乃退走太子遣洗馬元孟恭將千人自大司馬門出盪孟恭與左右奔降於景己酉景土山稍逼城樓栁津命作地道以取其土外山崩壓賊且盡又於城内作飛橋懸罩二土山上景衆見飛橋逈出崩騰而走城内擲雉尾炬焚其東山樓柵蕩盡賊積死於城下乃弃土山不復修自焚其攻具材官將軍宋嶷降於景教之引玄武湖水以灌臺城闕前皆為洪流上徴衡州刺史韋粲為散騎常侍以都督長沙歐陽頠監州事粲放之子也還至廬陵聞侯景亂粲簡閱部下得精兵五千倍道赴援至豫章聞景已出横江粲就内史劉孝儀謀之孝儀曰必如此當有敕豈可輕信人言妄相驚動或恐不然時孝儀置酒粲怒以杯抵地曰賊已度江便逼宫闕水陸俱斷何暇有報假令無敕豈得自安韋粲今日何情飲酒即馳馬出部分將發㑹江州刺史當陽公大心遣使邀粲粲乃馳往見大心曰上游藩鎮江州去京最近殿下情計誠宜在前但中流任重當須應接不可闕鎮今宜且張聲埶移鎮湓城遣偏將賜隨於事便足大心然之遣中兵栁昕帥兵二千人隨粲粲至南洲外弟司州刺史桞仲禮亦帥歩騎萬餘人至横江粲即送糧仗贍給之并散私金帛以賞其戰士西豫州刺史裴之髙自張公洲遣船度仲禮丙辰夜粲仲禮及宣猛將軍李孝欽前司州刺史羊鴉仁南陵太守陳文徹合軍屯新林王遊苑粲議推仲禮為大都督報下流衆軍裴之髙自以年位恥居其下議累日不決粲抗言於衆曰今者同赴國難義在除賊所以推栁司州者正以乆悍邊疆先為侯景所憚且士馬精銳無出其前若論位次栁在粲下語其年齒亦少於粲直以社稷之計不得復論今日形埶貴在將和若人心不同大事去矣裴公朝之舊徳豈應復挾私情以沮大計粲請為諸軍解之乃單舸至之髙營切讓之曰今二宫危逼猾冦滔天臣子當戮力同心豈可自相矛楯豫州必欲立異鋒鏑便有所歸之髙垂泣致謝遂推仲禮為大都督宣城内史楊白華遣其子雄將郡兵繼至援軍大集衆十餘萬緣淮樹柵景亦於北岸樹柵以應之裴之髙與弟之横以舟師一萬屯張公洲景囚之髙弟姪子孫臨水陳兵連鏁列於陳前以鼎鑊刀鋸隨其後謂曰裴公不降今即烹之之髙召善射者使射其子再發皆不中景帥歩騎萬人於後渚挑戰仲禮欲出擊之韋粲曰日晚我勞未可戰也仲禮乃堅壁不出景亦引退湘東王繹將銳卒三萬發江陵留其子綏寧侯方諸居守諮議參軍劉之迡等三上牋請留荅教不許鄱陽王範遣其將梅伯龍攻王顯貴於夀陽克其羅城攻中城不克而退範益其衆使復攻之丙辰晦栁仲禮夜入韋粲營部分衆軍旦日㑹戰諸將各有據守令粲頓青塘粲以青塘當石頭中路賊必爭之頗憚之仲禮曰青塘要地非兄不可若疑兵少當更遣軍相助乃使直閤將軍劉叔胤助之三年春正月丁巳朔栁仲禮自新亭徙營大桁會大霧韋粲軍迷失道比及青塘夜已過半立柵未合侯景望見之亟帥銳卒攻粲粲使軍主鄭逸逆擊之命劉叔胤以舟師截其後叔胤畏懦不敢進逸遂敗景乗勝入粲營左右牽粲避賊粲不動叱子弟力戰遂與子尼及三弟助警構從弟昂皆戰死親戚死者數百人仲禮方食投箸被甲與其麾下百騎馳往救之與景戰於青塘大破之斬首數百級沈淮水死者千餘人仲禮矟將及景而賊將支伯仁自後斫仲禮中肩馬䧟于淖賊聚矟刺之騎將郭山石救之得免仲禮被重瘡㑹稽人惠臶吮瘡斷血故得不死自是景不敢復濟南岸仲禮亦氣衰不復言戰矣邵陵王綸復收散卒與東揚州刺史臨城公大連新淦公大成等自東道並至庚申列營于桁南亦推栁仲禮為大都督大連大臨之弟也朝野以侯景之禍共尤朱异异慙憤發疾庚申卒故事尚書官不以為贈上痛惜异特贈尚書右僕射甲子湘東世子方等及王僧辯軍至己巳太子遷居永福省髙州刺史李遷仕天門太守樊文皎將援兵萬餘人至城下臺城與援軍信命乆絶有羊車兒獻策作紙鴟繫以長繩寫敕於内放以從風兾達衆軍題云得鴟送援軍賞銀百兩太子自出太極殿前乗西北風縱之賊怪之以為厭勝射而下之援軍募人能入城送啓者鄱陽世子嗣左右李朗請先受鞭詐為得罪叛投賊因得入城城中方知援兵四集舉城鼓譟上以朗為直閣將軍賜金遣之朗緣鍾山之後宵行晝伏積日乃達癸未鄱陽世子嗣永安侯確莊鐵羊鴉仁栁敬禮李遷仕樊文皎將兵度淮攻東府前柵焚之侯景退衆軍營於青溪之東遷仕文皎帥銳卒五千獨進深入所向摧靡至菰首橋東景將宋子仙伏兵擊之文皎戰死遷仕遁還敬禮仲禮之弟也仲禮神情傲狠陵蔑諸將邵陵王綸每日執鞭至門亦移時弗見由是與綸及臨城公大連深相仇怨大連又與永安侯確有隙諸軍互相猜阻莫有戰心援軍初至建康士民扶老攜幼以候之纔過淮即縱兵剽掠由是士民失望賊中有謀應官軍者聞之亦止臨賀王記室呉郡顧野王起兵討侯景二月己丑引兵來至初臺城之閉也公卿以食為念男女貴賤並出負米得四十萬斛收諸府藏錢帛五十萬億並聚徳陽堂而不備薪芻魚鹽至是壞尚書省為薪撤薦剉以飼馬薦盡又食以飯軍士無膎或煮鎧熏䑕捕雀而食之御甘露厨有乾苔味酸鹹分給戰士軍人屠馬於殿省間雜以人肉食者必病侯景衆亦飢抄掠無所獲東城有米可支一年援軍斷其路又聞荆州兵將至景甚患之王偉曰今臺城不可猝拔援兵日盛吾軍乏食若偽且求和以緩其埶東城之米足支一年因求和之際運米入石頭援軍必不得動然後休士息馬繕修器械伺其懈怠擊之一舉可取也景從之遣其將任約于子恱至城下拜表求和乞復先鎮太子以城中窮困白上請許之上怒曰和不如死太子固請曰侯景圍逼已乆援軍相仗不戰宜且許其和更為後圖上遲回乆之乃曰汝自圖之勿令取笑千載遂報許之景乞割江右四州之地并求宣城王大器出送然後濟江中領軍傅岐固爭曰豈有賊舉兵圍宫闕而更與之和乎此特欲却援軍耳戎狄獸心必不可信且宣城嫡嗣之重國命所繫豈可為質上乃以大器之弟石城公大款為侍中出質於景又敕諸軍不得復進下詔曰善兵不戰止戈為武可以景為大丞相都督江西四州諸軍事豫州牧河南王如故己亥設壇於西華門外遣僕射王克上甲侯韶吏部郎蕭瑳與于子恱任約王偉登壇共盟太子詹事栁津出西華門景出柵門遥相對更殺牲㰱血為盟既盟而景長圍不解專修鎧仗託云無船不得即發又云恐南軍見躡遣石城公還臺求宣城王出送邀求稍廣了無去志太子知其詐言猶羈縻不絶韶懿之孫也庚子前南兖州刺史南康王㑹理前青冀二州刺史湘潭侯退西昌侯世子彧衆合三萬至于馬卬洲景慮其自白下而上啟云請敕北軍聚還南岸不爾妨臣濟江太子即勒㑹理自白下城移軍江潭苑退恢之子也辛丑以邵陵王綸為司空鄱陽王範為征北將軍栁仲禮為侍中尚書右僕射景以于子恱任約傅士悊皆為儀同三司夏侯譒為豫州刺史董紹先為東徐州刺史徐思玉為北徐州刺史王偉為散騎常侍上以偉為侍中乙夘景又啟曰適有西岸信至髙澄已得夀陽鍾離臣今無所投足求借廣陵并譙州俟得夀陽即奉還朝廷又云援軍既在南岸須於京口度江太子並荅許之癸夘大赦庚戌景又啟曰永安侯確直閤趙威方頻隔柵見詬云天子自與汝盟我終當破汝乞召侯及威方入即當引路上遣吏部尚書張綰召確辛亥以確為廣州刺史威方為盱眙太守確累啟固辭不入上不許確先遣威方入城因欲南奔邵陵王綸泣謂確曰圍城既乆聖上憂危臣子之情切於湯火故欲且盟而遣之更申後計成命已決何得拒違時臺使周石珍東宫主書左灋生在綸所確謂之曰侯景雖云欲去而不解長圍意可見也今召僕入城何益於事石珍曰敕㫖如此郎那得辭確意尚堅綸大怒謂趙伯超曰譙州為我斬之持其首去伯超揮刃眄確曰伯超識君侯刀不識也確乃流涕入城上常蔬食及圍城日乆上厨蔬茹皆絶乃食鷄子綸因使者蹔通上鷄子數百枚上手自料簡歔欷哽咽湘東王繹軍於郢州之武城湘州刺史河東王譽軍於青草湖信州刺史桂陽王慥軍於西峽口託云俟四方援兵淹留不進中記室參軍蕭賁骨鯁士也以繹不早下心非之嘗與繹雙六食子未下賁曰殿下都無下意繹深衘之及得上敕繹欲旋師賁曰景以人臣舉兵向闕今若放兵未及度江童子能斬之矣必不為也大王以十萬之衆未見賊而退柰何繹不恱未幾因事殺之慥懿之孫也侯景運東府米入石頭既畢王偉聞荆州軍退援軍雖多不相統壹乃說景曰王以人臣舉兵圍守宫闕逼辱妃主殘穢宗廟擢王之髪不足數罪今日持此欲安所容身乎背盟而捷自古多矣願且觀其變臨賀王正德亦謂景曰大功垂就豈可弃去景遂上啟陳上十失且曰臣方事睽違所以冒陳讜直陛下崇飾虚誕惡聞實録以妖怪為嘉禎以天譴為無咎敷演六藝排擯前儒王莽之灋也以鐵為貨使輕重無常公孫之制也爛羊䥴印朝章鄙雜更始趙倫之化也豫章以所天為血讎邵陵以父存而冠布石虎之風也修建浮圖百度糜費使四民飢餒笮融姚興之代也又言建康宫室崇侈陛下惟與主書參斷萬機政以賄成諸閹豪盛衆僧殷實皇太子珠玉是好酒色是耽吐言止於輕薄賦詠不出桑中邵陵所在殘破湘東羣下貪縱南康定襄之屬皆如沐猴而冠耳親為孫姪位則藩屏臣至百日誰肯勤王此而靈長未之有也昔鬻拳兵諫王卒改善今日之舉復奚罪乎伏願陛下小懲大戒放讒納忠使臣無再舉之憂陛下無嬰城之辱則萬姓幸甚上覽啟且慙且怒三月丙辰朔立壇於太極殿前告天地以景違盟舉烽鼓譟初閉城之日男女十餘萬擐甲者二萬餘人被圍既乆人多身腫氣急死者什八九乗城者不滿四千人率皆羸喘横尸滿路不可瘞埋爛汁滿溝而衆心猶望外援栁仲禮唯聚妓妾置酒作樂諸將日往請戰仲禮不許安南侯駿說邵陵王綸曰城危如此而都督不救若萬一不虞殿下何顔自立於世今宜分軍為三道出賊不意攻之可以得志綸不從栁津登城謂仲禮曰汝君父在難不能竭力百世之後謂汝為何仲禮亦不以為意上問策於津對曰陛下有邵陵臣有仲禮不忠不孝賊何由平戊午南康王㑹理與羊鴉仁趙伯超等進營於東府城北約夜度軍既而鴉仁等曉猶未至景衆覺之營未立景使宋子仙擊之趙伯超望風退走㑹理等兵大敗戰及溺死者五千人景積其首於闕下以示城中景又使于子恱求和上使御史中丞沈浚至景所景實無去志謂浚曰今天時方熱軍未可動乞且留京師立效浚發憤責之景不對横刀叱之浚曰負恩忘義違弃詛盟固天地所不容沈浚五十之年常恐不得死所何為以死相懼邪因徑去不顧景以其忠直捨之於是景決石闕前水百道攻城晝夜不息邵陵世子堅屯太陽門終日蒱飲不恤吏士其書佐董勛熊曇㓪恨之丁夘夜向曉勛曇㓪於城西北樓引景衆登城永安侯確力戰不能却乃排闥入啟上云城已䧟上安卧不動曰猶可一戰乎對曰不可上歎曰自我得之自我失之亦復何恨因謂確曰汝速去語汝父勿以二宫為念因使慰勞在外諸軍俄而景遣王偉入文徳殿奉謁上命褰簾開户引偉入偉拜呈景啟稱為姦佞所蔽領衆入朝驚動聖躬今詣闕待罪上問景何在可召來景入見於太極東宫以甲士五百人自衛景稽顙殿下典儀引就三公榻上神色不變問曰卿在軍中日乆無乃為勞景不敢仰視汗流被面又曰卿何州人而敢至此妻子猶在北邪景皆不能對任約從旁代對曰臣景妻子皆為髙氏所屠唯以一身歸陛下上又問初度江有幾人景曰千人圍臺城幾人曰十萬今有幾人曰率土之内莫非己有上俛首不言景復至永福省見太子太子亦無懼容侍衛皆驚散唯中庶子徐摛通事舍人陳郡殷不害側侍摛謂景曰侯王當以禮見何得如此景乃拜太子與言又不能對景退謂其廂公王僧貴曰吾常跨鞍對陳矢刃交下而意氣安緩了無怖心今見蕭公使人自慴豈非天威難犯吾不可以再見之於是悉撤兩宫侍衛縱兵掠乗輿服御宫人皆盡收朝士王侯送永福省使王偉守武徳殿于子恱屯太極東堂矯詔大赦自加大都督中外諸軍録尚書事建康士民逃難四出太子洗馬蕭允至京口端居不行曰死生有命如何可逃禍之所來皆生於利茍不求利禍從何生己巳景遣石城公大款以詔命解外援軍栁仲禮召諸將議之邵陵王綸曰今日之命委之將軍仲禮熟視不對裴之髙王僧辯曰將軍擁衆百萬致宫闕淪沒正當悉力決戰何所多言仲禮竟無一言諸軍乃隨方各散南兖州刺史臨城公大連湘東世子方等鄱陽世子嗣北兖州刺史湘潭侯退呉郡太守袁君正晉陵太守陸經等各還本鎮君正昻之子也邵陵王綸奔㑹稽仲禮及弟敬禮羊鴉仁王僧辯趙伯超並開營降軍士莫不歎憤仲禮等入城先拜景而後見上上不與言仲禮見父津津慟哭曰汝非我子何勞相見湘東王繹使全威將軍㑹稽王琳送米二十萬石以饋軍至姑孰聞臺城䧟沈米於江而還景命燒臺内積尸病篤未絶者亦聚而焚之庚子詔征鎮牧守可復本任景留栁敬禮羊鴉仁而遣栁仲禮歸司州王僧辯歸竟陵初臨賀王正徳與景約平城之日不得全二宫及城開正徳帥衆揮刀欲入景先使其徒守門故正徳不果入景更以正徳為侍中大司馬百官皆復舊職正徳入見上拜且泣上曰啜其泣矣何嗟及矣秦郡陽平旴眙三郡皆降景景改陽平為北滄州改秦郡為西兖州侯景以儀同三司蕭邕為南徐州刺史代西昌侯淵藻鎮京口又遣其將徐相攻晉陵陸經以郡降之侯景以前臨江太守董紹先為江北行臺使齎上手敕召南兖州刺史南康王㑹理壬午紹先至廣陵衆不滿二百皆積日飢疲㑹理士馬甚盛僚佐說㑹理曰景已䧟京邑欲先除諸藩然後篡位若四方拒絶立當潰敗柰何委全州之地以資冦手不如殺紹先發兵固守與魏連和以待其變㑹理素懦即以城授之紹先既入衆莫敢動㑹理弟通理請先還建康謂其姊曰事既如此豈可闔家受斃前途亦思立效但未知天命如何耳紹先悉收廣陵文武部曲鎧仗金帛遣㑹理單馬還建康湘潭侯退與北兖州刺史定襄侯祇出奔東魏侯景以蕭弄璋為北兖州刺史州民發兵拒之景遣直閤將軍羊海將兵助之海以其衆降東魏東魏遂據淮隂祗偉之子也癸未侯景遣于子恱等將羸兵數百東略呉郡新城戍主戴僧逷有精甲五千說太守袁君正曰賊今乏食臺中所得不支一旬若閉關拒守立可餓死土豪陸映公等恐不能勝而資産被掠皆勸君正迎之君正素怯載米及牛酒郊迎子恱執君正掠奪財物子女東人皆立堡拒之景又以任約為南道行臺鎮姑孰夏四月湘東世子方等至江陵湘東王繹始知臺城不守命於江陵四旁七里樹木為柵掘塹三重而守之上雖外為侯景所制而内甚不平景欲以宋子仙為司空上曰調和隂陽安用此物景又請以其黨二人為便殿主帥上不許景不能彊心甚憚之太子入泣諫上曰誰令汝來若社稷有靈猶當克復如其不然何事流涕景使其軍士入直省中或驅驢馬帶弓刀出入宫庭上怪而問之直閤將軍周石珍對曰侯丞相甲士上大怒叱石珍曰是侯景何謂丞相左右皆懼是後上所求多不遂志飲膳亦為所裁節憂憤成疾太子以幼子大圜屬湘東王繹并翦爪髪以寄之五月丙辰上卧淨居殿口苦索蜜不得再曰荷荷遂殂年八十六景祕不發喪遷殯於昭陽殿迎太子於永福省使如常入朝王偉陳慶皆侍太子太子嗚咽流涕不敢泄聲殿外文武皆莫之知辛巳發髙祖喪升梓宫於太極殿是日太子即皇帝位大赦侯景出屯朝堂分兵守衛壬午詔北人在南為奴婢者皆免之所免萬計景或更加超擢兾收其力髙祖之末建康士民服食噐用爭尚豪華糧無半年之儲常資四方委輸自景作亂道路斷絶數月之間人至相食猶不免餓死存者百無一二貴戚豪族皆自出採稆填委溝壑不可勝紀癸未景遣儀同三司來亮入宛陵宣城太守楊白華誘而斬之甲申景遣其將李賢明攻之不克景又遣中軍侯子鑒入呉郡以廂公蘇單于為呉郡太守遣儀同宋子仙等將兵東屯錢塘新城戍主戴僧逷據縣拒之御史中丞沈浚避難東歸至呉興太守張嵊與之合謀舉兵討景嵊稷之子也東揚州刺史臨城公大連亦據州不受景命景號令所行唯呉郡以西南陵以北而已六月丁亥立宣城王大器為皇太子壬辰封皇子大心為尋陽王大款為江陵王大臨為南海王大連為南郡王大春為安陸王大成為山陽王大封為宜都王宋子仙圍戴僧逷不克丙午呉盗陸緝等起兵襲呉郡殺蘇單于推前淮南太守文成侯寧為主臨賀王正徳怨侯景賣已宻書召鄱陽王範使以兵入景遮得其書癸丑縊殺正徳景以儀同三司郭元建為尚書僕射北道行臺揔江北諸軍事鎮新秦封元羅等諸元十餘人皆為王景愛永安侯確之勇常寘左右邵陵王綸潜遣人呼之確曰景輕佻一夫力耳我欲手刃之正恨未得其便卿還啓家王勿以確為念景與確遊鍾山引弓射鳥因欲射景弦斷不發景覺而殺之侯景以趙威方為豫章太守江州刺史尋陽王大心遣軍拒之擒威方繫州獄威方逃還建康陸緝等競為暴掠呉人不附宋子仙自錢塘旋軍擊之壬戌緝弃城奔海鹽子仙復據呉郡戊辰侯景置呉州於呉郡以安陸主大春為刺史鄱陽王範聞建康不守戒嚴欲入僚佐或說之曰今魏人已據夀陽大王移足則虜騎必窺合肥前賊未平後城失守將若之何不如待四方兵集使良將將精卒赴之進不失勤王退可固本根範乃止㑹東魏大將軍澄遣西兖州刺史李伯穆逼合肥又使魏收為書諭範範方謀討侯景藉東魏為援乃帥戰士二萬出東關以合州輸伯穆并遣諮議劉靈議送二子勤廣為質于東魏以乞師範屯濡須以待上游之軍遣世子嗣將千餘人守安樂柵上遊軍皆不下範糧乏采苽稗菱藕以自給勤廣至鄴東魏人竟不為出師範進退無計乃泝流西上軍于樅陽景出屯姑孰範將裴之悌以衆降之之悌之髙之弟也秋八月甲申朔侯景遣其中軍都督侯子鑒等擊呉興侯景以宋子仙為司徒郭元建為尚書左僕射與領軍任約等四十人並開府儀同三司仍詔自今開府儀同不須更加將軍是後開府儀同至多不可復記矣鄱陽王範自樅陽遣信告江州刺史尋陽王大心大心遣信邀之範引兵詣江州大心以湓城處之吳興兵力寡弱張嵊書生不閑軍旅或勸嵊効袁君正以郡迎侯子鑒嵊歎曰袁氏世濟忠貞不意君正一旦隳之吾豈不知呉郡既沒呉興勢難乆全但以身許國有死無貳耳九月癸丑朔子鑒軍至呉興嵊戰敗還府整服安坐子鑒執送建康侯景嘉其守節欲活之嵊曰吾忝任專城朝廷傾危不能匡復今日速死為幸景猶欲存其一子嵊曰吾一門已在鬼録不就爾虜求恩景怒盡殺之并殺沈浚冬十月宋子仙自呉郡趣錢塘劉神茂自呉興趣富陽前武州刺史富陽孫國恩以城降之十一月乙夘葬武皇帝于脩陵廟號髙祖百濟遣使入貢見城闕荒圯異於曏來哭於端門侯景怒録送莊嚴寺不聽出壬戌宋子仙急攻錢塘戴僧逷降之宋子仙乗勝度浙江至㑹稽邵陵王綸聞錢塘已敗出奔鄱陽鄱陽内史開建侯蕃以兵拒之範進擊蕃破之南郡王大連為東揚州刺史時㑹稽豐沃勝兵數萬糧仗山積東人懲侯景殘虐咸樂為用而大連朝夕酣飲不恤軍事司馬東陽留異凶狡殘暴為衆所患大連悉以軍事委之十二月庚寅宋子仙攻㑹稽大連弃城走異奔還鄉里尋以其衆降於子仙大連欲奔鄱陽異為子仙鄉導追及大連於信安執送建康大連猶醉不之知帝聞之引帷自蔽掩袂而泣於是三呉盡沒於景公侯在㑹稽者俱南度嶺景以留異為東陽太守收其妻子為質邵陵王綸進至九江尋陽王大心以江州讓之綸不受引兵西上簡文帝大寶元年春正月始興太守陳霸先發兵討侯景據嶺南事見蕭勃廣陵人來嶷說前廣陵太守祖皓曰董紹先輕而無謀人情不附襲而殺之此壯士之任耳今欲紏帥義勇奉戴府君若其克㨗可立桓文之勲必天未悔禍猶足為梁室忠臣皓曰此僕所願也乃相與紏合勇士得百餘人癸酉襲廣陵斬南兖州刺史董紹先據城馳檄逺近推前太子舍人蕭勔為刺史乙亥景遣郭元建帥衆奄至皓嬰城固守二月侯景遣任約于度等帥衆二萬攻諸藩侯景遣侯子鑒帥舟師八千自帥徒兵一萬攻廣陵三日克之執祖皓縛而射之箭徧體然後車裂以徇城中無少長皆埋之於地馳馬射而殺之以子鑒為南兖州刺史鎮廣陵景還建康宣城内史楊白華進據安呉侯景遣于子恱等帥衆攻之不克侯景納上女溧陽公主甚愛之三月甲申景請上禊宴於樂遊苑悵飲三日上還宫景與公主共據御牀南面並坐羣臣文武列坐侍宴鄱陽世子嗣與任約戰於三章約敗走嗣因徙鎮三章謂之安樂柵夏四月丙午侯景請上幸西州上御素輦侍衛四百餘人景浴鐵數千翼衛左右上聞絲竹悽然泣下命景起舞景亦請上起舞酒闌坐散上抱景于牀曰我念丞相景曰陛下如不念臣臣何得至此逮夜乃罷時江南連年旱蝗江揚尤甚百姓流亡相與入山谷江湖采草根木葉菱芡而食之所在皆盡死者蔽野富室無食皆鳥面鵠形衣羅綺懷金玉俯伏牀帷待命聴終千里絶烟人迹罕見白骨成聚如丘隴焉景性殘酷於石頭立大碓有犯灋者擣殺之常戒諸將曰破柵平城當淨殺之使天下知吾威名故諸將每戰勝專以焚掠為事斬刈人如草芥以資戯笑由是百姓雖死終不附之又禁人偶語犯者刑及外族為其將帥者悉稱行臺來降附者悉稱開府其親寄隆重者曰左右廂公勇力兼人者曰庫直都督侯景召宋子仙還京口湘東王繹自去嵗聞髙祖之喪以長沙未下故匿之壬寅始發喪刻檀為髙祖像置於百福殿事之甚謹動静必咨焉繹以為天子制於賊臣不肯從太寶之號猶稱大清四年丙午繹下令大舉討侯景移檄逺近鄱陽王範至湓城以晉熈為晉州遣其世子嗣為刺史江州郡縣多輙改易尋陽王大心政令所行不出一郡大心遣兵擊莊鐵嗣與鐵素善請發兵救之範遣侯瑱帥精甲五千助鐵由是二鎮互相猜忌無復討賊之志大心使徐嗣徽帥衆二千築壘稽亭以備範市糴不通範數萬之衆無所得食多餓死範憤恚疽發於背五月乙夘卒其衆祕不發喪奉範弟安南侯恬爲主有衆數千人丙辰侯景以元思䖍爲東道大行臺鎮錢塘丁巳以侯子鑒爲南兖州刺史六月侯景以羊鴉仁爲五兵尚書庚子鴉仁出奔江西將赴江陵至東莞盗疑其懷金邀殺之湘東王繹以霸先爲豫州刺史領豫章内史初東魏遣儀同武威牒雲洛等迎鄱陽世子嗣使鎮皖城嗣未及行任約軍至洛等引去嗣遂失援出戰敗死約遂略地至湓城尋陽王大心遣司馬韋質出戰而敗帳下猶有戰士千餘人咸勸大心走保建州大心不能用戊辰以江州降約先是大心使前太子洗馬韋臧鎮建昌有甲士五千聞尋陽不守欲帥衆犇江陵未發為麾下所殺臧粲之子也于慶略地至豫章侯瑱力屈降之慶送瑱於建康景以瑱同姓待之甚厚留其妻子及弟為質遣瑱隨慶徇蠡南諸郡以瑱為湘州刺史初巴山人黄灋氍有勇力侯景之亂合徒衆保鄉里太守賀詡下江州命灋氍監郡事灋氍屯新淦于慶自豫章分兵襲新淦灋氍敗之陳霸先使周文育進軍擊慶灋氍引兵㑹之邵陵王綸聞任約將至使司馬蔣思安將精兵五千襲之約衆潰思安不設備約收兵襲之思安敗走秋九月任約進冦西陽武昌初寧州刺史彭城徐文盛募兵數萬人討侯景湘東王繹以為秦州刺史使將兵東下與約遇於武昌繹以廬陵王應為江州刺史以文盛為長史行府州事督諸將拒之應續之子也邵陵王綸引齊兵未至移營馬柵距西陽八十里任約聞之遣儀同叱羅通等將鐡騎二百襲之綸不為僃策馬亡走時湘東王繹亦與齊連和故齊人觀望不助綸定州刺史田祖龍迎綸綸以祖龍為繹所厚懼為所執復歸齊昌行至汝南魏所署汝南城主李素綸之故吏也開城納之任約遂據西陽武昌裴之髙帥子弟部曲千餘人至夏首湘東王繹召之以為新興永寧二郡太守又以南平王恪為武州刺史鎮武陵初邵陵王綸以衡陽王獻為齊州刺史鎮齊昌任約擊擒之送建康殺之獻暢之孫也乙亥進侯景位相國封二十郡為漢王如殊禮冬十月乙未侯景自加宇宙大將軍都督六合諸軍事以詔文呈上上驚曰將軍乃有宇宙之號乎十一月丁夘徐文盛軍貝磯任約帥水軍逆戰文盛大破之斬叱羅子通趙威方仍進軍大舉口侯景遣宋子仙等將兵二萬助約以約守西陽乆不能進自出屯晉熈南康王㑹理以建康空虚與太子左衛將軍栁敬禮西鄉侯勸東鄉侯勔謀起兵誅王偉安樂侯乂理出奔長蘆集衆得千餘人建安侯賁中宿世子子邕知其謀以告偉偉收㑹理敬禮勸勔及㑹理弟祁陽侯通理俱殺之乂理爲左右所殺錢塘禇冕以㑹理故舊捶掠千計終無異言㑹理隔壁謂之曰禇郎卿豈不爲我致此卿雖忍死明我我心實欲殺賊冕竟不服景乃宥之勸昺之子賁正徳之弟子子邕憺之孫也帝自即位以來景防衛甚嚴外人莫得進見唯武林侯諮及僕射王克舍人殷不害並以文弱得出入卧内帝與之講論而已及㑹理死克不害懼禍稍自疎諮獨不離帝朝請無絶景惡之使其仇人刁戍刺殺諮於廣莫門外帝之即位也景與帝登重雲殿禮佛為誓云自今君臣兩無猜貳臣固不負陛下陛下亦不得負臣及㑹理謀泄景疑帝知之故殺諮帝自知不乆指所居殿謂殷不害曰龐涓當死此下景自帥衆討楊白華于宣城白華力屈而降景以其北人全之以為左民尚書誅其兄子彬以報來亮之怨十二月丙子朔景封建安侯賁為竟陵王中宿世子子邕為隨王仍賜姓侯氏侯景還建康二年春正月新呉余孝頃舉兵拒侯景景遣于慶攻之不克庚戌湘東王繹遣䕶軍將軍尹恱安東將軍杜幼安巴州刺史王珣將兵二萬自江夏趣武昌受徐文盛節度張彪遣其將趙稜圍錢塘孫鳯圍富春侯景遣儀同三司田遷趙伯超救之稜鳯敗走稜伯超之兄子也侯景以王克為太師宋子仙為太保元羅為太傅郭元建為太尉張化仁為司徒任約為司空王偉為尚書左僕射索超世為右僕射景置三公官動以十數儀同尤多以子仙元建化仁為佐命元功偉超世為謀主于子恱彭雋主擊斷陳慶吕季略盧暉略丁和等為爪牙梁人為景用者則故將軍趙伯超前制局監周石珍内監嚴亶邵陵王記室伏知命自餘王克元羅及侍中殷不害太常周弘正等景從人望加以尊位非腹心之任也北兖州刺史蕭邕謀降魏侯景殺之三月乙夘徐文盛等克武昌進軍蘆洲任約告急侯景自帥衆西上攜太子大器從軍以為質留王偉居守閏月景發建康自石頭至新林舳艫相接約分兵襲破定州刺史田祖龍於齊安壬寅景軍至西陽與徐文盛夾江築壘癸夘文盛擊破之射其右丞庫狄式和墜水死景遁走還營夏四月郢州刺史蕭方諸年十五以行事鮑泉和弱常侮易之或使伏牀騎背為馬恃徐文盛在近不復設備日以蒱酒為樂後景聞江夏空虚乙巳使宋子仙任約帥精騎四百由淮内襲郢州丙午大風疾雨天色晦冥有登陴望見賊者告永曰虜騎至矣泉曰徐文盛大軍在下賊何因得至當是王珣軍人還耳既而走告者稍衆始命閉門子仙等已入城方諸方踞泉腹以五色綵辮其髯見子仙至方諸迎拜泉匿于牀下子仙俯窺見泉素髯閒綵驚愕遂擒之及司馬虞豫送於景所景因便風中江舉帆遂越文盛等軍丁未入江夏文盛衆懼而潰與長沙王韶等逃歸江陵王珣杜幼安以家在江夏遂降於景湘東王繹以王僧辯為大都督帥巴州刺史丹楊淳于量定州刺史杜龕宣州刺史王綝郴州刺史裴之横東擊景徐文盛以下並受節度戊申僧辯等軍至巴陵聞郢州已䧟因留戍之繹遺僧辯書曰賊既乗勝必將西下不勞逺擊但守巴丘以逸待勞無慮不克又謂僚佐曰景若水歩兩道直指江陵此上策也據夏首積兵糧中策也悉力攻巴陵下策也巴陵城小而固僧辯足可委任景攻城不拔野無所掠暑疫時起食盡兵疲破之必矣乃命羅州刺史徐嗣徽自岳陽武州刺史杜崱自武陵引兵㑹僧辯景使丁和將兵五千守夏首宋子仙將兵一萬為前驅趣巴陵分遣任約直指江陵景帥大兵水歩繼進於是緣江戍邏望風請服景拓邏至于隠磯僧辯乗城固守偃旗卧鼓安若無人壬戌景衆濟江遣輕騎至城下問城内為誰答曰王領軍騎曰何不早降僧辯曰大軍但向荆州此城自當非礙騎去頃之執王珣等至城下使說其弟琳琳曰兄受命討賊不能死難曽不内慙翻欲賜誘取弓射之珣慙而退景肉薄百道攻城城中鼓譟矢石雨下景士卒死者甚衆乃退僧辯遣輕兵出戰凡十餘返皆㨗景被甲在城下督戰僧辯著綬乗輿奏鼓吹巡城景望之服其膽勇五月侯景晝夜攻巴陵不克軍中食盡疾疫死傷太半湘東王繹遣晉州刺史蕭惠正將兵援巴陵惠正辭不堪舉胡僧祐自代僧祐時坐謀議忤㫖繫獄繹即出之拜武猛將軍令赴援戒之曰賊若水戰但以大艦臨之必克若欲歩戰自可鼓棹直就巴丘不須交鋒也僧祐至湘浦景遣任約帥銳卒五千據白塉以待之僧祐由它路西上約謂其畏已急追之及於芊口呼僧祐曰呉兒何不早降走何所之僧祐不應潜引兵至赤沙亭㑹信州刺史陸灋和至與之合軍灋和有異術先隠於江陵百里洲衣食居處一如苦行沙門或豫言吉凶多中人莫能測侯景之圍臺城也或問之曰事將何如灋和曰凡人取果宜待熟時不撩自落固問之灋和曰亦克亦不克及任約向江陵灋和自請擊之繹許之壬寅約至赤亭六月甲辰僧祐灋和縱兵擊之約兵大潰殺溺死者甚衆禽約送江陵景聞之乙巳焚營宵遁以丁和爲郢州刺史留宋子仙等衆號二萬戍郢城别將支化仁鎮魯山范希榮行江州事儀同三司任延和晉州刺史夏侯威生守晉州景與麾下兵數千順流而下丁和以大石磕殺鮑泉及虞預沈於黄鶴磯任約至江陵繹赦之徐文盛坐怨望下獄死巴州刺史余孝頃遣兄子僧重將兵救鄱陽于慶退走繹以王僧辯為征東將軍尚書令胡僧祐等皆進位號使引兵東下陸灋和請還既至謂繹曰侯景自然平矣蜀賊將至請守險以待之乃引兵屯峽口庚申王僧辯至漢口先攻魯山擒支化仁送江陵辛酉攻郢州克其羅城斬首千級宋子仙退據金城僧辯四面起土山攻之豫州刺史荀㓪自巢湖出濡須邀景破其後軍景奔歸船前後相失太子船入樅陽浦船中腹心皆勸太子因此入北太子曰自國家喪敗志不圖生主上䝉塵寧忍違離左右吾今若去乃是叛父非避賊也因涕泗鳴咽即命前進甲子宋子仙等困蹙乞輸郢城身還就景王僧辯偽許之命給船百艘以安其意子仙謂為信然浮舟將發僧辯命杜龕帥精勇千人攀堞而上鼓譟奄進水軍主宋遥帥樓船暗江雲合子仙且戰且走至白楊浦大破之周鐵虎生擒子仙及丁和送江陵殺之秋七月乙亥湘東王繹以長沙王韶監郢州事丁亥侯景還至建康于慶自鄱陽還豫章侯瑱閉門拒之慶走江州據郭黙城繹以瑱為兖州刺史景悉殺瑱子弟辛丑王僧辯乗勝下湓城陳霸先帥所部三萬人將㑹之屯于巴丘西軍乏食霸先有糧五十萬石分三十萬以資之八月壬寅朔王僧辯前軍襲于慶慶弃郭黙城走范希榮亦弃尋陽城走晉熈王僧振等起兵圍郡城僧辯遣沙州刺史丁道貴助之任延和等弃城走湘東王繹命僧辯且頓尋陽以待諸軍之集初景既克建康常言呉兒怯弱易以掩取當須拓定中原然後為帝景尚帝女溧陽公主嬖之妨於政事王偉屢諫景以告主主有惡言偉恐為所讒因說景除帝及景自巴陵敗歸猛將多死自恐不能乆存欲早登大位王偉曰自古移鼎必須廢立既示我威權且絶彼民望景從之使前夀光殿學士謝昊為詔書以為弟姪争立星辰失次皆由朕非正緒召亂致災宜禪位於豫章王棟使吕季略齎入逼帝書之棟歡之子也戊午景遣衛尉卿彭雋等帥兵入殿廢帝為晉安王幽于永福省悉撤内外侍衛使突騎左右守之牆垣悉布枳棘庚申下詔迎豫章王棟棟時幽拘廩餼甚薄仰蔬茹為食方與妃張氏鉏葵灋駕奄至棟驚不知所為泣而升輦景殺哀太子大器尋陽王大心西陽王大鈞建平王大球義安王大昕及王侯在建康者二十餘人太子神明端嶷於景黨未嘗屈意所親竊問之太子曰賊若於事義未須見殺吾雖陵慢呵叱終不敢言若見殺時至雖一日百拜亦無所益又曰殿下今居困阨而神貌怡然不貶平日何也太子曰吾自度死日必在賊前若諸叔能滅賊賊必先見殺然後就死若其不然賊亦殺我以取富貴安能以必死之命為無益之愁乎及難太子顔色不變徐曰乆知此事嗟其晚耳刑者將以衣帶絞之太子曰此不能見殺命取繫帳繩絞之而絶壬戌棟即帝位大赦改元天正太尉郭元建聞之自秦郡馳還謂景曰主上先帝太子既無愆失何得廢之景曰王偉勸吾云早除民望吾故從之以安天下元建曰吾挾天子令諸侯猶懼不濟無故廢之乃所以自危何安之有景欲迎帝復位以棟為太孫王偉曰廢立大事豈可數改邪乃止乙丑景又使使殺南海王大臨於呉郡南郡王大連於姑孰安陸王大春於㑹稽髙唐王大壯於京口以太子妃賜郭元建元建曰豈有皇太子妃乃為人妾乎竟不與相見聴使入道丙寅追尊昭明太子為昭明皇帝豫章安王為安皇帝以劉神茂為司空王偉說侯景弑太宗以絶衆心景從之冬十月壬寅夜偉與左衛將軍彭雋王脩纂進酒於太宗太宗極飲既醉而寢偉乃出雋進土囊脩纂坐其上而殂偉撤户扉為棺遷殯于城北酒庫中諡曰明皇帝廟號髙宗司空東道行臺劉神茂聞侯景自巴丘敗還隂謀叛景呉中士大夫咸勸之乃與儀同三司尹思合劉歸義王曅雲麾將軍元頵等據東陽以應江陵遣頵及别將李占下據建徳江口張彪攻永嘉克之新安民程靈洗起兵據郡以應神茂於是浙江以東皆附江陵湘東王繹以靈洗為譙州刺史領新安太守十一月侯景以趙伯超為東道行臺據錢塘以田遷為軍司據富春以李慶緒為中軍都督謝答仁為右廂都督李遵為左廂都督以討劉神茂己夘加侯景九錫漢國置丞相以下官己丑豫章王棟禪位于景景即皇帝位于南郊還登太極殿其黨數萬皆吹脣呼譟而上大赦改元太始封棟為淮隂王并其二弟橋樛同鎻於宻室王偉請立七廟景曰何謂七廟偉曰天子祭七世祖考并請七世諱景曰前世吾不復記惟記我父名標且彼在朔州那得來噉此衆咸咲之景黨有知景祖名乙羽周者自外皆王偉制其名位追尊父標為元皇帝景之作相也以西州為府文武無尊卑皆引接及居禁中非故舊不得見由是諸將多怨望景好獨乗小馬彈射飛鳥王偉每禁止之不許輕出景鬰鬰不樂更成失志曰吾無事為帝與受擯不殊十二月丁未謝答仁李慶緒攻建徳擒元頵李占送建康景截其手足以徇經日乃死元帝承聖元年春正月湘東王命王僧辯等東擊侯景二月庚子諸軍發尋陽舳艫數百里陳霸先帥甲士三萬舟艦二千自南江出湓口㑹僧辯於白茅灣築壇㰱血共讀盟文流涕慷慨癸夘僧辯使侯瑱襲南陵鵲頭二戍克之戊申僧辯等軍于大雷丙辰發鵲頭戊午侯子鑒還至戰鳥西軍奄至子鑒驚懼奔還淮南侯景儀同三司謝答仁攻劉神茂於東陽程靈洗張彪皆勒兵將救之神茂欲專其功不許營於下淮或謂神茂曰賊長於野戰下淮地平四面受敵不如據七里瀬賊必不能進不從神茂偏禆多北人不與神茂同心别將王曅酈通並據外營降於答仁劉歸義尹思合等弃城走神茂孤危辛未亦降於答仁答仁送之建康癸酉王僧辯等至蕪湖侯景守將張黒弃城走景聞之甚懼下詔赦湘東王繹王僧辯之罪衆咸笑之侯子鑒據姑孰南洲以拒西師景遣其黨史安和等將兵二千助之三月己巳朔景下詔欲自至姑孰又遣人戒子鑒曰西人善水戰勿與争鋒往年任約之敗良為此也若得歩騎一交必當可破汝但結營岸上引船入浦以待之子鑒乃捨舟登岸閉營不出僧辯等停軍蕪湖十餘日景黨大喜告景曰西師畏吾之彊勢將遁矣不擊且失之景乃復命子鑒為水戰之備丁丑僧辯至姑孰子鑒帥歩騎萬餘人度洲於岸挑戰又以鵃䑠千艘載戰士僧辯麾細船皆令退縮留大艦夾泊兩岸子鑒之衆謂水軍欲退争出趨之大艦斷其歸路鼓譟大呼合戰中江子鑒大敗士卒赴水死者數千人子鑒僅以身免收散卒走還建康據東府僧辯留虎臣將軍莊丘慧達鎮姑孰引軍而前歴陽戍迎降景聞子鑒敗大懼涕下覆面引衾而卧良乆方起歎曰誤殺乃公庚辰僧辯督諸軍至張公洲辛巳乗潮入淮進至禪靈寺前景召石頭津主張賔使引淮中舣䑰及海艟以石縋之塞淮口緣淮作城自石頭至于朱雀街十餘里中樓堞相接僧辯問計於陳霸先霸先曰前栁仲禮數十萬兵隔水而坐韋粲在青溪竟不度岸賊登髙望之表裏俱盡故能覆我師徒今圍石頭須度北岸諸將若不能當鋒霸先請先往立柵壬午霸先於石頭西落星山築柵衆軍次連入城直出石頭西北景恐西州路絶自帥侯子鑒等亦於石頭東北築五城以遏大路景使王偉等守臺城乙酉景殺湘東世子方諸前平東將軍杜幼安劉神茂至建康丙戌景命為大剉碓先進其足寸寸斬之以至於頭留異外同神茂而潜通於景故得免禍丁亥王僧辯進軍招提寺北侯景帥衆萬餘人鐵騎八百餘匹陳於西州之西陳霸先曰我衆賊寡應分其兵埶以彊制弱何故聚其鋒銳令致死於我乃命諸將分處置兵景衝將軍王僧志陳僧志小縮霸先遣將軍安陸徐度將弩手二千横截其後景兵乃却霸先與王琳杜龕等以鐵騎乗之僧辯以大軍繼進景兵敗退據其柵龕岸之兄子也景儀同三司盧暉略守石頭城開北門降僧辯入據之景與霸先殊死戰景帥百餘騎弃矟執刀左右衝陳陳不動衆遂大潰諸軍逐北至西明門景至闕下不敢入臺召王偉責之曰爾令我為帝今日誤我偉不能對繞闕而藏景欲走偉執鞚諫曰自古豈有叛天子邪宫中衛士猶足一戰弃此將欲安之景曰我昔敗賀拔勝破葛榮揚名河朔度江平臺城降栁仲禮如反掌今日天亡我也因仰觀石闕歎息乆之以皮囊盛其江東所生二子挂之鞍後與房世貴等百餘騎東走欲就謝答仁於呉侯子鑒王偉陳慶奔朱方僧辯命裴之横杜龕屯杜姥宅杜崱入據臺城僧辯不戢軍士剽掠居民男女裸露自石頭至于東城號泣滿道是夜軍士遺火焚太極殿及東西堂寶噐羽儀輦輅無遺戊子僧辯命侯瑱等帥精甲五千追景王克元羅等帥臺内舊臣迎僧辯於道僧辯勞克曰甚苦事夷狄之君克不能對又問璽紱何在克良乆曰趙平原持去僧辯曰王氏百世卿族一朝而墜僧辯迎太宗梓宫升朝堂帥百官哭踊如禮己丑僧辯等上表勸進且迎都建業湘東王答曰淮海長鯨雖云授首襄陽短狐未全革面太平玉燭爾乃議之庚寅南兖州刺史郭元建秦郡戍主郭正買陽平戍主魯伯和行南徐州事郭子仲並據城降僧辯之發江陵也啟湘東王曰平賊之後嗣君萬福未審何以為禮王曰六門之内自極兵威僧辯曰討賊之謀臣為己任成濟之事請别舉人王乃宻諭宣猛將軍朱買臣使為之所及景敗太宗已殂豫章王棟及二弟橋樛相扶出於宻室逢杜崱於道為去其鎻二弟曰今日始免横死矣棟曰倚伏難知吾猶有懼辛夘遇朱買臣呼之就船共飲未竟並沈於水僧辯遣陳霸先將兵向廣陵受郭元建等降又遣使者往安慰之諸將多私使别索馬仗㑹侯子鑒度江至廣陵謂元建等曰我曹梁之深讎何顔復見其主不若投北可得還鄉遂皆降齊霸先至歐陽齊行臺辛術已據廣陵王偉與侯子鑒相失直瀆戍主黄公喜獲之送建康王僧辯問曰卿為賊相不能死節而求活草閒邪偉曰廢興命也使漢帝早從偉言明公豈有今日尚書左丞虞隲嘗為偉所辱乃唾其面偉曰君不讀書不足與語隲慙而退僧辯命羅州刺史徐嗣徽鎮朱方壬辰侯景至晉陵得田遷餘兵因驅掠居民東趨呉郡謝答仁討劉神茂還至富陽聞侯景敗走帥萬人欲北出候之趙伯超據錢塘拒之侯景進至嘉興聞伯超叛之乃退據呉己酉侯瑱追及景於松江景猶有船二百艘衆數千人瑱進擊敗之擒彭雋田遷房世貴蔡夀樂王伯醜瑱生剖雋腹抽其腸雋猶不死手自收之乃斬之景與腹心數十人單舸走推墮二子於水將入海瑱遣副將焦僧度追之景納羊侃之女為小妻以其兄鵾為庫直都督待之甚厚鵾隨景東走與景所親王元禮謝葳㽔宻圖之葳㽔答仁之弟也景下海欲向蒙山己夘景晝寢鵾語海師此中何處有蒙山汝但聴我處分遂直向京口至胡豆洲景覺大驚問岸上人云郭元建猶在廣陵景大憙將依之鵾拔刀叱海師向京口因謂景曰吾等為王効力多矣今至於此終無所成欲就乞頭以取富貴景未及答白刃交下景欲投水鵾以刀斫之景走入船中以佩刀抉船底鵾以矟刺殺之尚書右僕射索超世在别船葳㽔以景命召而執之南徐州刺史徐嗣徽斬超世以鹽納景腹中送其尸於建康僧辯傳首江陵截其手使謝葳㽔送于齊暴景尸於市士民爭取食之并骨皆盡溧陽公主亦預食焉初景之五子在北齊世宗剝其長子面而烹之㓜者下蠶室齊顯祖即位夢獮猴坐其御牀乃盡烹之趙伯超謝答仁皆降於侯瑱瑱并田遷等送建康王僧辯斬房世貴於市送王偉吕季略周石珍嚴亶趙伯超伏知命於江陵丁巳湘東王下令解嚴乙丑葬簡文帝于莊陵廟號太宗侯景之敗也以傳國璽自隨使其侍中兼平原太守趙思賢掌之曰若我死宜沈於江勿令呉兒復得之思賢自京口濟江遇盗從者弃之草間至廣陵以告郭元建元建取之以與辛術壬申術送之至鄴五月庚午司空南平王恪等復勸進湘東王猶不受遣侍中豐城侯泰等謁山陵脩復廟社戊寅侯景首至江陵梟之於市三日煮而漆之以付武庫庚辰以南平王恪為楊州刺史甲申以王僧辯為司徒鎮衛將軍封長寧公陳霸先為征虜將軍開府儀同三司封長城縣侯乙酉誅侯景所署尚書僕射王偉左民尚書吕季略少府周石珍舍人嚴亶於市趙伯超伏知命餓死於獄以謝答仁不失禮於太宗特宥之王偉於獄中上五百言詩湘東王愛其才欲宥之有嫉之者言於王曰前日偉作檄文甚佳王求而視之檄云項羽重瞳尚有烏江之敗湘東一目寧為赤縣所歸王大怒釘其舌於柱剜腹臠肉而殺之丁亥下令以王偉等既死自餘衣冠舊貴被逼偷生猛士勲豪和光茍免者皆不問通鑑紀事本末卷第二十三
