body:
  text: 突厥朝隋梁武帝大同十一年春二月魏丞相泰遣酒泉胡安諾槃陀始通使於突厥突厥本西方小國姓阿史那氏世居金山之陽為柔然鐵工至其酋長土門始強大頗侵魏西邊安諾槃陀至其國人皆喜曰大國使者至吾國其將興矣簡文帝大寶二年夏六月土門恃其強盛求婚於柔然柔然頭兵可汗大怒使人詈辱之曰爾我之鍛奴也何敢發是言土門亦怒殺其使者遂與之絶而求婚於魏魏丞相泰以長樂公主妻之元帝承聖元年春正月突厥土門自號伊利可汗號其妻為可賀敦子弟謂之特勒别將兵者皆謂之設二年春二月突厥伊利可汗卒子科羅立號乙息記可汗三月遣使獻馬五萬于魏乙息記卒捨其子攝圖而立其弟俟斤號木杆可汗木杆狀貌奇異性剛勇多智略善用兵鄰國畏之冬十一月癸亥齊主自晉陽親追突厥於朔州突厥請降許之而還自是貢獻相繼敬帝紹泰元年冬十二月木杆西破嚈噠東走契丹北並契骨威服塞外諸國其地東自遼海西至西海長萬里南自沙漠以北五六千里皆屬焉太平元年突厥木杆可汗襲擊吐谷渾魏太師泰使涼州刺史史寧帥騎隨之吐谷渾奔南山寧説木杆使攻樹敦賀真二城以拔其根本木杆從之木杆破賀真獲吐谷渾可汗夸吕寧破樹敦虜其征南王還與木杆會於青海渾盛襄詳見吐谷陳文帝天嘉四年初周人與突厥木杆連兵伐齊許納其女為后遣御伯大夫楊荐等往結之齊人亦遣使求昏木杆欲執荐等送齊荐知而責之木杆許共平東賊然後送女伐齊詳見周冬十二月突厥木杆地頭步離三可汗以十萬騎會周師於晉陽五年春正月突厥引兵出塞縱兵大掠自晉陽七百里人畜無遺秋九月突厥冦齊幽州衆十餘萬入長城大掠而還突厥自幽州還留屯塞北閏月突厥寇齊幽州六年春二月辛丑周遣陳公純許公貴神武公竇毅南陽公楊荐等備皇后儀衛行殿並六宫百二十人詣突厥可汗牙帳逆女夏五月突厥遣使至齊始與齊通臨海王光大二年春二月突厥木杆可汗二於周更許齊人以昏留陳公純等數年不返會大雷風壞其穹廬旬日不止木杆懼以為天譴即備禮送其女於周純等奉之以歸三月癸卯至長安周主行親迎之禮宣帝太建四年突厥木杆可汗卒復捨其子大邏便而立其弟是為他鉢可汗他鉢以攝圖為爾伏可汗統其東面又以其弟褥但可汗之子為步離可汗居西面周人與之和親嵗給繒絮錦綵十萬段突厥在長安者衣錦食肉常以千數齊人亦畏其為寇爭厚賂之他鉢益驕謂其下曰但使我在南兩兒常孝何憂於貧五年突厥求昏于齊九年周師之克晉陽也齊使開府儀同三司紇奚永安求救於突厥比至齊已亡十年夏四月庚申突厥寇周幽州殺掠吏民五月己丑周高祖帥諸軍伐突厥遣柱國原公姬願東平公神舉等將兵五道俱入帝不豫詔停諸軍六月帝殂冬十一月突厥冦周邊圍酒泉殺掠吏民十一年春二月突厥他鉢可汗請和於周周主以趙王招女為千金公主妻之突厥寇周並州六月周發山東諸民修長城十二年春二月戊午突厥入貢于周且迎千金公主夏六月周遣汝南公神慶司衛上士長孫晟送千金公主於突厥十三年冬十二月突厥他鉢可汗病且卒謂其子菴邏曰吾兄不立其子委位於我我死汝當避大邏便及卒國人將立大邏便以其母賤衆不服菴邏實貴突厥素重之攝圖最後至謂國人曰若立菴邏者我當帥兄弟事之若立大邏便我必守境利刃長矛以相待攝圖長且雄勇國人莫敢拒竟立菴邏為嗣大邏便不得立心不服菴邏每遣人詈辱之菴邏不能制因以國讓攝圖國中相與議曰四可汗子攝圖最賢共迎立之號沙鉢略可汗居都斤山菴邏降居獨洛水稱第二可汗大邏便乃謂沙鉢略曰我與爾俱可汗子各承父後爾今極尊我獨無位何也沙鉢略患之以為阿波可汗還領所部又沙鉢略從父玷厥居西面號達頭可汗諸可汗各統部衆分居四面沙鉢略勇而得衆北方皆畏附之隋主既立待突厥禮薄突厥大怨千金公主傷其宗祀覆沒日夜言於沙鉢略請為周室復讎沙鉢略謂其臣曰我周之親也今隋公自立而不能制復何面目見可賀敦乎乃與故齊營州刺史高寶寧合兵為寇隋主患之敕緣邊修保障峻長城命上柱國武威隂壽鎮幽州京兆尹虞慶則鎮並州屯兵數萬以備之初奉車都尉長孫晟送千金公主入突厥突厥可汗愛其善射留之竟嵗命諸子弟貴人與之親友冀得其射法沙鉢略弟處羅侯號突利設尤得衆心為沙鉢略所忌密託心腹隂與晟盟晟與之遊獵因察山川形勢部衆強弱靡不知之及突厥入寇晟上書曰今諸夏雖安戎虜尚梗興師致討未是其時棄於度外又相侵擾故宜密運籌䇿漸以攘之玷厥之於攝圖兵強而位下外名相屬內隙已彰鼓動其情必將自戰又處羅侯者攝圖之弟姦多勢弱曲取衆心國人愛之因為攝圖所忌其心殊不自安迹示彌縫實懷疑懼又阿波首鼠介在其間頗畏攝圖受其牽率唯強是與未有定心今宜逺交而近攻離強而合弱通使玷厥説合阿波則攝圖回兵自防右地又引處羅遣連奚霫則攝圖分衆還備左方首尾猜嫌腹心離阻十數年後乘舋討之必可一舉而空其國矣帝省表大悅因召與語晟復口陳形勢手畫山川寫其虛實皆如指掌帝深嗟異皆納用之遣太僕元暉出伊吾道詣達頭賜以狼頭纛達頭使來引居沙鉢略使上以晟為車騎將軍出黃龍道齎幣賜奚霫契丹遣為鄉導得至處羅侯所深布心腹誘之內附反間既行果相猜二十四年夏四月庚寅隋大將軍韓僧壽破突厥於雞頭山上柱國李充破突厥於河北山五月己未高寶寧引突厥冦隋平州突厥悉發五可汗控弦之士四十萬入長城六月乙酉隋上柱國李光敗突厥於馬邑突厥又冦蘭州涼州揔管賀婁子幹敗之於可洛峐冬十月癸酉隋太子勇屯兵咸陽以備突厥十二月乙酉隋遣沁源公虞慶則屯弘化以備突厥行軍揔管達奚長儒將兵二千與突厥沙鉢略可汗遇於周槃沙鉢略有衆十餘萬軍中大懼長儒神色慷慨且戰且行為虜所衝突散而復聚四面抗拒轉鬬三日晝夜凡十四戰五兵咸盡士卒以拳驅之手皆骨見殺傷萬計虜氣稍奪於是解去長儒身被五瘡通中者二其戰士死傷者什八九詔以長儒為上柱國餘勳回授一子時柱國馮昱屯乙弗泊蘭州揔管叱列長乂守臨洮上柱國李崇屯幽州皆為突厥所敗於是突厥縱兵自木硤石門兩道入寇武威天水安定金城上郡弘化延安六畜咸盡沙鉢略更欲南入達頭不從引兵而去長孫晟又説沙鉢略之子染干詐告沙鉢略曰鐵勒等反欲襲其牙沙鉢略懼回兵出塞長城公至德元年春二月突厥冦隋北邊夏四月突厥數為隋冦隋主下詔曰往者周齊抗衡分割諸夏突厥之虜俱通二國周人東慮恐齊好之深齊氏西虞懼周交之厚謂虜意輕重國遂安危蓋並有大敵之憂思減一邊之防也朕以為厚斂兆庶多惠豺狼未嘗感恩資而為賊節之以禮不為虛費省徭薄賦國用有餘因入賊之物加賜將士息道路之民務為耕織清邊制勝成䇿在心凶醜愚暗未知深旨將大定之日比戰國之時乘昔世之驕結今時之恨近者盡其巢窟俱犯北邊蓋上天所忿驅就齊斧諸將今行義兼含育有降者納有違者死使其不敢南望永服威刑何用侍子之朝寧勞渭橋之拜於是命衛王爽等為行軍元帥分八道出塞擊之爽督揔管李充等四將出朔州道己卯與沙鉢略可汗遇於白道李充言於爽曰突厥狃於驟勝必輕我而無備以精兵襲之可破也諸將多以為疑唯長史李徹贊成之遂與充帥精騎五千掩擊突厥大破之沙鉢棄所服金甲濳草中而遁其軍中無食粉骨為糧加以疾疫死者甚衆甲午突厥遣使入見于隋五月癸卯隋行軍揔管李晃破突厥於摩那度口隋秦州揔管竇榮定帥九揔管步騎三萬出涼州與突厥阿波可汗相拒於高越原阿波屢敗榮定熾之兄子也前上大將軍京兆史萬嵗坐事配敦煌為戍卒詣榮定軍門請自效榮定素聞其名見而大悅壬戌將戰榮定遣人謂突厥曰士卒何罪而殺之但當各遣一壯士決勝負耳突厥許諾因遣一騎挑戰榮定遣萬嵗出應之萬嵗馳斬其首而還突厥大驚不敢復戰遂請盟引軍而去長孫晟時在榮定軍中為偏將使謂阿波曰攝圖每來戰皆大勝阿波才入遽即奔敗此乃突厥之耻也且攝圖之與阿波兵勢本敵今攝圖日勝為衆所崇阿波不利為國生辱攝圖必當以罪歸阿波成其宿計滅北牙矣願自量度能禦之乎阿波使至晟又謂之曰今達頭與隋連和而攝圖不能制可汗何不依附天子結連達頭相合為強此萬全計也豈若喪兵負罪歸就攝圖受其戮辱邪阿波然之遣使隨晟入朝沙鉢略素忌阿波驍悍自白道敗歸又聞阿波二於隋因先歸襲擊北牙大破之殺阿波之母阿波還無所歸西奔達頭達頭大怒遣阿波帥兵而東其部落歸之者將十萬騎遂與沙鉢略相攻屢破之復得故地兵勢益強貪汗可汗素睦於阿波沙鉢略奪其衆而廢之貪汗亡奔達頭沙鉢略從弟地勤察别統部落與沙鉢略有隙復以衆叛歸阿波連兵不已各遣使詣長安請和求援隋主皆不許六月突厥冦幽州隋幽州揔管廣宗壯公李崇帥步騎三千拒之轉戰十餘日師人多死遂保砂城突厥圍之城荒頽不可守禦曉夕力戰又無所食每夜出掠虜營得六畜以繼軍糧突厥畏之厚為其備每夜中結陳以待之崇軍苦飢出輒遇敵死亡略盡及明奔還城者尚百許人然多重傷不堪更戰突厥意欲降之遣使謂崇曰若來降者封為特勒崇知不免令其士卒曰崇喪師徒罪當萬死今日效命以謝國家汝俟吾死且可降賊便散走努力還鄉若見至尊道崇此意乃挺刃突陳復殺二人突厥亂射殺之秋七月辛丑以豫州刺史代人周搖為幽州揔管命李崇子敏襲爵秋八月壬午隋遣尚書左僕射高潁出寧州道內史監虞慶則出原州道以擊突厥二年春二月突厥蘇尼部男女萬餘口降隋突厥逹頭可汗請降于隋秋九月突厥沙鉢略可汗數為隋所敗乃請和親千金公主自請改姓楊氏為隋主女隋主遣開府儀同三司徐平和使於沙鉢略更封千金公主為大義公主晉王廣請因舋乘之隋主不許沙鉢略遣使致書曰從天生大突厥天下賢聖天子伊利俱盧設莫何沙鉢略可汗致書大隋皇帝皇帝婦父乃是翁比此為女夫乃是兒例兩境雖殊情義如一自今子子孫孫乃至萬世親好不絶上天為證終不違負此國羊馬皆皇帝之畜彼之繒綵皆此國之物帝復書曰大隋天子貽書大突厥沙鉢略可汗得書知大有善意既為沙鉢略婦翁今日視沙鉢略與兒子不異時遣大臣往彼省女復省沙鉢略也於是遣尚書右僕射虞慶則使於沙鉢略車騎將軍長孫晟副之沙鉢略陳兵列其珍寶坐見慶則稱病不能起且曰我諸父以來不向人拜慶則責而諭之千金公主私謂慶則曰可汗豺狼性過與爭將齧人長孫晟謂沙鉢略曰突厥與隋俱大國天子可汗不起安敢違意但可賀敦為帝女則可汗是大隋女壻奈何不敬婦翁沙鉢略笑謂其達官曰須拜婦翁乃起拜頓顙跪受璽書以戴於首既而大慙與羣下相聚慟哭慶則又遣稱臣沙鉢略謂左右曰何謂臣左右曰隋言臣猶此云奴耳沙鉢略曰得為大隋天子奴虞僕射之力也贈慶則馬千匹並以從妹妻之三年初突厥阿波可汗既與沙鉢略有隙分而為二阿波浸強東距都斤西越金山龜兹鐵勒伊吾及西域諸胡悉附之號西突厥隋主亦遣上大將軍元契使于阿波以撫之秋七月突厥沙鉢略既為達頭所困又畏契丹遣使告急於隋請將部落度漠南寄居白道川隋主許之命晉王廣以兵援之給以衣食賜之車服鼓吹沙鉢略因西擊阿波破之而阿拔國乘虛掠其妻子官軍為擊阿拔敗之所獲悉與沙鉢略沙鉢略大喜乃立約以磧為界因上表曰天無二日土無二王大隋皇帝真皇帝也豈敢阻兵恃險偷竊名號今感慕淳風歸心有道屈膝稽顙永為藩附遣其子庫合真入朝八月丙戌庫合真至長安隋主下詔曰沙鉢略往雖與和猶是二國今作君臣便成一體因命肅告郊廟普頒逺近凡賜沙鉢略詔不稱其名宴庫合真於內殿引見皇后賞勞甚厚沙鉢略大悅自是嵗時貢獻不絶四年春正月庚午隋頒曆於突厥禎明元年夏四月突厥沙鉢略可汗遣其子入貢于隋因請獵於恆代之間隋主許之仍遣人賜以酒食沙鉢略帥部落再拜受賜沙鉢略尋卒隋為之廢朝三日遣太常弔祭初沙鉢略以其子雍虞閭懦弱遺令立其弟葉護處羅侯雍虞閭遣使迎處羅侯將立之處羅侯曰我突厥自木杆可汗以來多以弟代兄以庶奪嫡失先祖之法不相敬畏汝當嗣位我不憚拜汝雍虞閭曰叔與我父共根連體我枝葉也豈可使根本反從枝葉叔父屈於卑幼乎且亡父之命何可廢也願叔勿疑遣使相讓者五六處羅侯竟立是為莫何可汗以雍虞閭為葉護遣使上表言狀隋使車騎將軍長孫晟持節拜之賜以鼓吹幡旗莫何勇而有謀以隋所賜旗鼓西擊阿波阿波之衆以為得隋兵助之多望風降附遂生擒阿波上書請其死生之命隋主下其議樂安公元諧請就彼梟首武陽公李充請生取入朝顯戮以示百姓隋主謂長孫晟於卿何如晟對曰若突厥背誕須齊之以刑今其昆弟自相夷滅阿波之惡非負國家因其困窮取而為戮恐非招逺之道不如兩存之左僕射高熲曰骨肉相殘教之蠧也宜存養以示寬大隋主從之二年冬十二月突厥莫何可汗西擊鄰國中流矢而卒國人立雍虞閭號頡伽施多那都藍可汗隋文帝開皇十三年上之滅陳也以陳叔寶屛風賜突厥大義公主公主以其宗國之覆心常不平書屛風為詩敘陳亡以自寄上聞而惡之禮賜漸薄彭公劉昶先尚周公主流人楊欽亡入突厥詐言昶欲與其妻作亂攻隋遣欽來密告大義公主發兵擾邊都藍可汗信之乃不修職貢頗為邊患上遣車騎將軍長孫晟使於突厥微觀察之公主見晟言辭不遜又遣所私胡人安遂迦與楊欽計議扇惑都藍晟至京師具以狀聞上遣晟往索欽都藍不與曰檢校客內無此色人晟乃賂其達官知欽所在夜掩獲之以示都藍因發公主私事國人大以為恥都藍執安遂迦等並以付晟上大喜加授開府儀同三司仍遣入突厥廢公主內史侍郎裴矩請説都藍使殺公主時處羅侯之子染干號突利可汗居北方遣使求婚上使裴矩謂之曰當殺大義公主乃許婚突利復譛之於都藍都藍因發怒殺公主更表請婚朝議將許之長孫晟曰臣觀雍虞閭反覆無信直以與玷厥有隙所以欲依倚國家雖與為婚終當叛去今若得尚公主承藉威靈玷厥染干必受其徵發強而更反後恐難圖且染干者處羅侯之子素有誠欵於今兩代前乞通婚不如許之招令南徙兵少力弱易可撫馴使敵雍虞閭以為邊捍上曰善復遣晟慰諭染于許尚公主十七年秋戊戌突厥突利可汗來逆女上舍之太常教習六禮妻以宗女安義公主上欲離間都藍故特厚其禮遣太常卿牛弘納言蘇威民部尚書斛律孝卿相繼為使突利本居北方既尚主長孫晟説其帥衆南徙居度斤舊鎮錫賚優厚都藍怒曰我大可汗也反不如染干於是朝貢遂絶亟來抄掠邊鄙突利伺知動靜輒遣奏聞由是邊鄙每先有備十九年春二月突厥突利可汗因長孫晟奏言都藍可汗作攻具欲攻大同城詔以漢王諒為元帥尚書左僕射高熲出朔州道右僕射楊素出靈州道上柱國燕榮出幽州道以擊都藍皆取漢王節度然漢王竟不臨戎都藍聞之與達頭可汗結盟合兵掩襲突利大戰長城下突利大敗都藍盡殺其兄弟子姪遂度河入蔚州突利部落散亡夜與長孫晟以五騎南走比旦行百餘里收得數百騎突利與其下謀曰今兵敗入朝一降人耳大隋天子豈禮我乎玷厥雖來本無寃隙若往投之必相存濟晟知之密遣使者入伏逺鎮令速舉烽突利見四烽俱發以問晟晟紿之曰城高地迥必遙見賊來我國家法若賊少舉二烽來多舉三烽大逼舉四烽彼見賊多而又近耳突利大懼謂其衆曰追兵已逼且可投城既入鎮晟留其達官執室領其衆自將突利馳驛入朝夏四月丁酉突利至長安帝大喜以晟為左勳衛驃騎將軍持節護突厥上令突利與都藍使者因頭特勒相辨詰突利辭直上乃厚待之都藍弟都速六棄其妻子與突利歸朝上嘉之使突利多遺之珍寶以慰其心高熲使上柱國趙仲卿將兵三千為前鋒至族蠡山與突厥遇交戰七日大破之追奔至乞伏泊復破之虜千餘口雜畜萬計突厥復大舉而至仲卿為方陳四面拒戰凡五日會高熲大兵至合擊之突厥敗走追度白道踰秦山七百餘里而還楊素軍與達頭遇先是諸將與突厥戰慮其騎兵奔突皆以戎車步騎相參設鹿角為方陳騎在其內素曰此乃自固之道未足以取勝也於是悉除舊法令諸軍為騎陳達頭聞之大喜曰天賜我也下馬仰天而拜帥騎兵十餘萬直前上儀同三司周羅㬋曰賊陳未整請擊之先帥精騎逆戰素以大兵繼之突厥大敗逹頭被重創而遁殺傷不可勝計其衆號哭而去冬十月甲午以突厥突利可汗為意利珍豆啓民可汗華言意智健也突厥歸啓民者男女萬餘口上命長孫晟將五萬人於朔州築大利城以處之時安義公主已卒復使晟持節送宗女義成公主以妻之晟奏染干部落歸者益衆雖在長城之內猶被雍虞閭抄掠不得寧居請徙五原以河為固於夏勝兩州之間東西至河南北四百里掘為橫塹令處其內使得任情畜牧上從之又令上柱國趙仲卿屯兵二萬為啓民防達頭代州揔管韓洪等將步騎一萬鎮恆安達頭騎十萬來冦韓洪軍大敗仲卿自樂寧鎮邀擊斬首虜千餘級帝遣越公楊素出靈州行軍揔管韓僧壽出慶州太平公史萬嵗出燕州大將軍武威姚辨出河州以擊都藍師未出塞十二月乙未都藍為部下所殺達頭自立為步迦可汗其國大亂長孫晟言於上曰今官軍臨境戰數有功虜內自攜離其主被殺乘此招撫可以盡降請遣染干部下分道招慰上從之降者甚衆二十年夏四月壬戌突厥達頭可汗犯塞詔命晉王廣楊素出靈武道漢王諒史萬嵗出馬邑道以擊之長孫晟帥降人為秦州行軍揔管受晉王節度晟以突厥飲泉易可行毒因取諸藥毒水上流突厥人畜飲之多死於是大驚曰天雨惡水其亡我乎因夜遁晟追之斬首千餘級史萬嵗出塞至大斤山與虜相遇達頭遣使問隋將為誰候騎報史萬嵗也突厥復問得非敦煌戌卒乎候騎曰是也達頭懼而引去萬嵗馳追百餘里縱擊大破之斬數千級逐北入磧數百里虜逺遁而還詔遣長孫晟復還大利城安撫新附達頭復遣其弟子俟利伐從磧東攻啓民上又發兵助啓民守要路俟利伐退走入磧啓民上表陳謝曰大隋聖人可汗憐養百姓如天無不覆地無不載染干如枯木更葉枯骨更肉千世萬世常為大隋典羊馬也帝又遣趙仲卿為啓民築金河定襄二城仁壽元年春正月突厥步迦可汗犯塞敗代州揔管韓洪於恆安夏五月突厥男女九萬口來降冬十一月詔以楊素為雲州行軍元帥長孫晟為受降使者挾啓民可汗北擊步迦二年春三月突厥思力俟斤等南度河掠啓民男女六千口雜畜二十餘萬而去楊素帥諸軍追擊轉戰六十餘里大破之突厥北走素復進追夜及之恐其越逸令其騎稍後親引兩騎並降突厥二人與虜並行虜不之覺候其頓舍未定趣後騎掩擊大破之悉得人畜以歸啓民自是突厥逺遁磧南無復寇掠三年秋九月突厥步迦可汗所部大亂鐵勒僕骨等十餘部皆叛步迦降於啓民步迦衆潰西奔吐谷渾長孫晟送啓民置磧口啓民於是盡有步迦之衆煬帝大業三年春正月朔旦大陳文物時突厥啓民可汗入朝見而慕之請襲冠帶帝不許明日又帥其屬上表固請帝大悅謂牛弘等曰令衣冠大備致單于解辮卿等功也各賜帛甚厚夏四月丙寅車駕北巡己亥頓赤岸澤五月丁巳突厥啓民可汗遣其子拓特勒來朝戊午發河北十餘郡丁男鑿太行山達于並州以通馳道丙寅啓民遣其兄子毗黎伽特勒來朝辛未啓民遣使請自入塞奉迎輿駕上不許六月戊子車駕頓榆林郡帝欲出塞耀兵徑突厥中指于涿郡恐啓民驚懼先遣武衛將軍長孫晟諭旨啓民奉詔因召所部諸國奚霫室韋等酋長數十人咸集晟見牙帳中草穢欲令啓民親除之示諸部落以明威重乃指帳前草曰此根大香啓民遽嗅之曰殊不香也晟曰天子行幸所在諸侯躬自灑掃耕除御路以表至敬之心今牙內蕪穢謂是留香草耳啓民乃悟曰奴之罪也奴之骨肉皆天子所賜得效筋力豈敢有辭特以邊人不知法耳賴將軍教之此將軍之惠奴之幸也遂拔所佩刀自芟庭草其貴人及諸部爭效之於是發榆林北境至其牙東達於薊長三千里廣百步舉國就役開為御道帝聞晟䇿益嘉之丁酉啓民及義成公主來朝行宫己亥吐谷渾高昌並遣使入貢甲辰上御北樓觀漁於河以宴百僚定襄太守周法尚朝于行宫太府卿元壽言於帝曰漢武出關旌旗千里今御營之外請分為二十四軍日别遣一軍發相去三十里旗幟相望鉦鼓相聞首尾相屬千里不絶此亦出師之盛者也法尚曰不然兵亘千里動間山川猝有不虞四分五裂腹心有事首尾未知道路俱長難以相救雖有故事乃取敗之道也帝未懌曰卿意如何法尚曰結為方陳四面外拒六宫及百官家屬並在其內若有變起所當之面即令抗拒內引奇兵出外奮擊車為壁壘重設鈎陳此與據城理亦何異若戰而捷抽騎追奔萬一不捷屯營自守臣謂此萬全之策也帝曰善因拜法尚左武衛將軍啓民可汗復上表以為先帝可汗憐臣賜臣安義公主種種無乏臣兄弟嫉妬共欲殺臣臣當是時走無所適仰視唯天俯視唯地奉身委命依歸先帝先帝憐臣且死養而生之以臣為大可汗還撫突厥之民至尊今御天下還如先帝養生臣及突厥之民種種無乏臣荷戴聖恩言不能盡臣今非昔日突厥可汗乃是至尊臣民願帥部落變改衣服一如華夏帝以為不可秋七月辛亥賜啓民璽書諭以磧北未靜猶須征戰但存心恭順何必變服帝欲誇示突厥令宇文愷為大帳其下可坐數千人甲寅帝於城東御大帳備儀衛宴啓民及其部落作散樂諸胡駭悅爭獻牛羊駝馬數千萬頭帝賜啓民帛二十萬段其下各有差又賜啓民路車乘馬鼓吹幡旗贊拜不名位在諸侯王上又詔發丁男百餘萬築長城西距榆林東至紫河尚書左僕射蘇威諫帝不聽築之二旬而畢八月壬午車駕發榆林歷雲中泝金河時天下承平百物豐實甲士五十餘萬馬十萬匹旌旗輜重千里不絶令宇文愷等造觀風行殿上容侍衛者數百人離合為之下施輪軸倐忽推移又作行城周二千步以板為幹衣之以布飾以丹青樓櫓悉備胡人驚以為神每望御營十里之外屈膝稽顙無敢乘馬啓民奉廬帳以俟車駕乙酉帝幸其帳啓民奉觴上壽跪伏恭甚王侯以下袒割於帳前莫敢仰視帝大恱賦詩曰呼韓頓顙至屠耆接踵來何如漢天子空上單于臺皇后亦幸義成公主帳帝賜啓民及公主金甕各一並衣服被褥錦綵特勒以下受賜各有差帝還啓民從入塞己丑遣歸國四年夏四月乙卯詔以突厥啓民可汗遵奉朝化思改戎俗宜於萬壽戍置城造屋其帷帳牀褥以上務從優厚五年春正月突厥啓民可汗來朝禮賜益厚冬十一月突厥啓民可汗卒上為之廢朝三日立其子咄吉是為始畢可汗表請尚公主詔從其俗八年春二月北平襄侯段文振為兵部尚書上表以為帝寵待突厥太厚處之塞內資以兵食戎狄之性無親而貪異日必為國患宜以時諭遣令出塞外然後明設烽候緣邊鎮防務令嚴重此萬嵗之長策也三月辛卯文振卒帝甚惜之隋討高麗隋文帝開皇十七年高麗王湯聞陳亡大懼治兵積穀為拒守之䇿是嵗上賜湯璽書責以雖稱藩附誠節未盡且曰彼之一方雖地狹人少今若黜王不可虛置終須更選官屬就彼安撫王若灑心易行率由憲章即是朕之良臣何勞别遣才彥王謂遼水之廣何如長江高麗之人多少陳國朕若不存含育責王前愆命一將軍何待多力殷勤曉示許王自新耳湯得書惶恐將奉表陳謝會病卒子元嗣立上使使拜元為上開府儀同三司襲爵遼東公元奉表謝恩因請封王上許之十八年春二月高麗王元帥靺鞨之衆萬餘冦遼西營州揔管韋沖擊走之上聞而大怒乙巳以漢王諒王世積並為行軍元帥將水陸三十萬伐高麗以尚書左僕射高熲為漢王長史周羅㬋為水軍揔管夏六月丙寅下詔黜高麗王元官爵漢王諒軍出臨渝關值水潦餽運不繼軍中乏食復遇疾疫周羅㬋自東萊泛海趣平壤城亦遭風船多飄沒秋九月己丑師還死者什八九高麗王元亦惶懼遣使謝罪上表稱遼東糞土臣元上於是罷兵待之如初百濟王昌遣使奉表請為軍導帝下詔諭以高麗服罪朕已赦之不可致伐厚其使而遣之高麗頗知其事以兵侵掠其境煬帝大業六年帝之幸啓民帳也高麗使者在啓民所啓民不敢隱與之見帝黃門侍郎裴矩説帝曰高麗本箕子所封之地漢晉皆為郡縣今乃不臣别為異域先帝欲征之久矣但楊諒不肖師出無功當陛下之時安可不取使冠帶之境遂為蠻貃之鄉乎今其使者親見啓民舉國從化可因其恐懼脅使入朝帝從之敕牛弘宣旨曰朕以啓民誠心奉國故親至其帳明年當往涿郡爾還日語高麗王宜早來朝勿自疑懼存育之禮當如啓民茍或不朝將帥啓民往巡彼土高麗王元懼藩禮頗闕帝將討之課天下富人買武馬匹至十萬簡閲器仗務令精新或有濫惡則使者立斬七年春二月乙亥帝自江都行幸涿郡壬午下詔討高麗敕幽州揔管元弘嗣往東萊海口造船三百艘官吏督役晝夜立水中略不敢息自腰以下皆生蛆死者什三四夏四月庚午車駕至涿郡之臨朔宫文武從官九品以上並令給宅安置先是詔揔徵天下之兵無問逺近俱會於涿又發江淮以南水手一萬人弩手三萬人嶺南排鑹手三萬人於是四逺奔赴如流五月敕河南淮南江南造戎車五萬乘送高陽供載衣甲幔幕令兵士自挽之發河南北民夫以供軍須秋七月發江淮以南民夫及船運黎陽及洛口諸倉米至涿郡舳艫相次千餘里載兵甲及攻取之具往還在道常數十萬人填咽於道晝夜不絶死者相枕臭穢盈路天下騷動八年春正月四方兵皆集涿郡帝徵合水令庾質問曰高麗之衆不能當我一郡今朕以此衆伐之卿以為克不對曰伐之可克然臣竊有愚見不願陛下親行帝作色曰朕今揔兵至此豈可未見賊而先自退邪對曰戰而未克懼損威靈若車駕留此命猛將徑卒指授方略倍道兼行出其不意克之必矣事機在速緩則無功帝不悅曰汝既憚行自可留此右尚方署監事耿詢上書切諫帝大怒命左右斬之何稠苦救得免壬午詔左十二軍出鏤方長岑滇海蓋馬建安南蘇遼東玄菟扶餘朝繹沃沮樂浪等道右十二軍出黏蟬含資渾彌臨屯候城提奚踏頓肅慎碣石東暆帶方襄平等道絡繹引途揔集平壤凡一百一十三萬三千八百人號二百萬其餽運者倍之宜社於南桑乾水上類上帝於臨朔宫南祭馬祖於薊城北帝親授節度每軍大將亞將各一人騎兵四十隊隊百人十隊為團步卒八十隊分為四團團各有偏將一人其鎧胄纓拂旗幡每團異色受降使者一人承詔慰撫不受大將節制其輜重散兵等亦為四團使步卒挾之而行進止立營皆有次敘儀法癸未第一軍發日遣一軍相去四十里連營漸進終四十日發乃盡首尾相繼鼓角相聞旌旗亘九百六十里御營內合十二衛三臺五省九寺分隸內外前後左右六軍次後發又亘八十里近古出師之盛未之有也二月以段文振為左候衛大將軍出南蘇道文振於道中疾篤上表曰竊見遼東小醜未服嚴刑逺降六師親勞萬乘但夷狄多詐深須防擬口陳降款毋宜遽受水潦方降不可淹遲唯願嚴勒諸軍星馳速發水陸俱前出其不意則平壤孤城勢可拔也若傾其本根餘城自克如不時定脫遇秋霖深為艱阻兵糧既竭強敵在前靺鞨出後遲疑不決非上䇿也三月辛卯文振卒帝甚惜之癸巳上始御師進至遼水衆軍揔會臨水為大陳高麗兵阻水拒守隋兵不得濟左屯衛大將軍麥鐵杖謂人曰丈夫性命自有所在豈能然艾炙頞瓜蒂噴鼻治黃不差而卧死兒女手中乎乃自請為前鋒謂其三子曰吾荷國恩今為死日我得良殺汝當富貴帝命工部尚書宇文愷造浮橋三道於遼水西岸既成引橋趣東岸橋短不及岸丈餘高麗兵大至隋兵驍勇者爭赴水接戰高麗兵乘高擊之隋兵不得登岸死者甚衆麥鐵杖躍登岸與虎賁郎將錢士雄孟義等皆戰死乃斂兵引橋復就西岸詔贈鐵杖宿公使其子孟才襲爵次子仲才季才並拜正議大夫更命少府監何稠接橋二日而成諸軍相次繼進大戰于東岸高麗兵大敗死者萬計諸軍乘勝進圍遼東城即漢之襄平城也車駕度遼引曷薩那可汗及高昌王伯雅觀戰處以攝憚之因下詔赦天下命刑部尚書衛文升尚書右丞劉士龍撫遼左之民給復十年建置郡縣以相統攝諸將之東下也帝親戒之曰今者弔民伐罪非為功名諸將或不識朕旨欲輕兵掩襲孤軍獨鬪立一身之名以邀勳賞非大軍行法公等進軍當分為三道有所攻擊必三道相知毋得輕軍獨進以致失亡又凡軍事進止皆須奏聞待報毋得專擅遼東數出戰不利乃嬰城固守帝命諸軍攻之又敕諸將高麗若降即宜撫納不得縱兵遼東城將陷城中人輒言請降諸將奉旨不敢赴機先令馳奏比報至城中守禦亦備隨出拒戰如此再三帝終不悟既而城久不下六月己未帝幸遼東城南觀其城池形勢因召諸將詰責之曰公等自以官高又恃家世欲以暗懦待我邪在都之日公等皆不願我來恐見病敗耳我今來此正欲觀公等所為斬公輩耳公今畏死莫肯盡力謂我不能殺公邪諸將咸戰懼失色帝因留止城西數里御六合城高麗諸城各堅守不下右翊衛大將軍來護兒帥江淮水軍舳艫數百里浮海先進入自浿水去平壤六十里與高麗相遇進擊大破之護兒欲乘勝趣其城副揔管周法尚止之請俟諸軍至俱進護兒不聽簡精甲四萬直造城下高麗伏兵於羅郭內空寺中出兵與護兒戰而偽敗護兒逐之入城縱兵俘掠無復部伍伏兵發護兒大敗僅而獲免士卒還者不過數千人高麗追至船所周法尚整陳待之高麗乃退護兒引兵還屯海浦不敢復留應接諸軍左翊衛大將軍宇文述出扶餘道右翊衛大將軍于仲文出樂浪道左驍衛大將軍荆元恆出遼東道右翊衛將軍薛世雄出沃沮道右屯衛將軍辛世雄出玄菟道右禦衛將軍張瑾出襄平道右武候將軍趙孝才出碣石道涿郡太守檢校左武衛將軍崔弘升出遂城道檢校右禦衛虎賁郎將衛文升出增地道皆會於鴨緑水西述等兵自瀘河懷逺二鎮人馬皆給百日糧又給排甲槍矟並衣資戎具火幕人别三石已上重莫能勝致下令軍中遺棄米粟者斬士卒皆於幕下掘坑埋之才行及中路糧已將盡高麗遣大臣乙支文德詣其營詐降實欲觀虛實于仲文先奉密旨若遇高元及文德來者必擒之仲文將執之尚書右丞劉士龍為慰撫使固止之仲文遂聽文德還既而悔之遣人紿文德曰更欲有言可復來文德不顧濟鴨緑水而去仲文與述等既失文德內不自安述以糧盡欲還仲文議以精鋭追文德可以有功述固止之仲文怒曰將軍仗十萬之衆不能破小賊何顔以見帝且仲文此行固知無功何則古之良將能成功者軍中之事決在一人今人各有心何以勝敵時帝以仲文有計畫令諸軍咨稟節度故有此言由是述等不得已而從之與諸將度水追文德文德見述軍士有飢色故欲疲之每戰輒走述一日之中七戰皆捷既恃驟勝又逼羣議於是遂進東濟薩水去平壤城三十里因山為營文德復遣使詐降請於述曰若旋師者當奉高元朝行在所述見士卒疲弊不可復戰又平壤城險固度難猝拔遂因其詐而還述等為方陳而行高麗四面鈔擊述等且戰且行秋七月壬寅至薩水軍半濟高麗自後擊其後軍右屯衛將軍辛世雄戰死於是諸軍俱潰不可禁止將士奔還一日一夜至鴨緑水行四百五十里將軍天水王仁恭為殿擊高麗却之來護兒聞述等敗亦引還唯衛文升一軍獨全初九軍度遼凡三十萬五千及還至遼東城唯二千七百人資儲器械巨萬計失亡蕩盡帝大怒鎖繫述等癸卯引還初百濟王璋遣使請討高麗帝使之覘高麗動靜璋內與高麗潛通隋軍將出璋使其臣國智牟來請師期帝大悅厚加賞賜遣尚書起部郎席律詣百濟告以期會及隋軍度遼百濟亦嚴兵境上聲言助隋實持兩端是行也唯於遼水西拔高麗武厲邏置遼東郡及通定鎮而已八月敕運黎陽洛口太原等倉穀向望海頓使民部尚書廬江樊子蓋留守涿郡九月庚寅車駕至東郡宇文述素有寵於帝且其子士及尚帝女南陽公主故帝不忍誅甲申與于仲文等皆除名為民斬劉士龍以謝天下薩水之敗高麗追圍薛世雄於白石山世雄奮擊破之由是獨得免官以衛文升為金紫光祿大夫諸將皆委罪於于仲文帝既釋諸將獨繫仲文仲文憂恚發病困篤乃出之卒于家九年春正月丁丑詔徵天下兵集涿郡始募民為驍果修遼東古城以貯軍糧二月壬午詔宇文述以兵糧不繼遂陷王師乃軍吏失於支料非述之罪宜復其官爵尋又加開府儀同三司帝謂侍臣曰高麗小虜侮慢上國今拔海移山猶望克果况此虜乎乃復議伐高麗左光祿大夫郭榮諫曰戎狄失禮臣下之事千鈞之弩不為鼷鼠發機奈何親辱萬乘以敵小寇乎帝不聽夏四月庚午車駕度遼壬申遣宇文述與上大將軍楊義臣趣平壤左光祿大夫王仁恭出扶餘道仁恭進軍至新城高麗兵數萬拒戰仁恭帥徑騎一千擊破之髙麗嬰城固守帝命諸將攻遼東聽以便宜從事飛樓撞雲梯地道四面俱進晝夜不息而高麗應變拒之二十餘日不拔主客死者甚衆衝梯竿長十五丈驍果吳興沈光升其端臨城與高麗戰短兵接殺十數人高麗競擊之而墜未及地適遇竿有垂絙光接而復上帝望見壯之即拜朝散大夫恆置左右遼東城久不拔帝遣造布囊百餘萬口滿貯土欲積為魚梁大道闊三十步高與城齊使戰士登而攻之又作八輪樓車高出於城夾魚梁道欲俯射城內指期將攻城內危蹙會楊玄感反書至帝大懼兵部侍郎斛斯政素與玄感善玄感之反政與之通謀玄縱兄弟亡歸政潛遣之帝將窮治玄縱等黨與政內不自安戊辰亡奔高麗庚午夜二更帝密召諸將使引軍還軍資器械攻具積如丘山營壘帳幕案堵不動皆棄之而去衆心忷懼無復部分諸道分散高麗即時覺之然不敢出但於城內鼓譟至來日午時方漸出外四逺覘偵猶疑隋軍詐之經二日乃出數千兵追躡畏隋軍之衆不敢逼常相去八九十里將至遼水知御營畢度乃敢逼後軍時後軍猶數萬人高麗隨而抄擊最後羸弱數千人為所殺略初帝再征高麗復問太史令庾質曰今段何如對曰臣實愚迷猶執前見陛下若親動萬乘勞費實多帝怒曰我自行猶不克直遣人去安得有功及還謂質曰卿前不欲我行當為此耳十年春二月辛未詔百僚議伐高麗數日無敢言者戊子詔復徵天下兵百道俱進三月壬子帝行幸涿郡士卒在道亡者相繼癸亥至臨渝宫禡祭黃帝斬叛軍者以釁鼓亡者亦不止夏四月甲午車駕至北平秋七月癸丑車駕次懷逺鎮時天下已亂所徵兵多失期不至高麗亦困弊來護兒至卑奢城高麗舉兵逆戰護兒擊破之將趣平壤高麗王元懼甲子遣使乞降囚送斛斯政帝大悅遣使持節召護兒還護兒集衆曰大軍三出未能平賊此還不可復來勞而無功吾竊恥之今高麗實困以此衆擊之不日可克吾欲進兵徑圍平壤取高元獻捷而歸不亦善乎答表請行不肯奉詔長史崔君肅固爭護兒不可曰賊勢破矣獨以相任自足辦之吾在閫外事當專決寧得高元還而獲譴捨此成功所不能矣君肅告衆曰若從元帥違拒詔書必當聞奏皆應獲罪諸將懼俱請還乃始奉詔八月己巳帝自懷逺鎮班師邯鄲賊帥楊公卿帥其黨八千人抄駕後第八隊得飛黃上廄馬四十二匹而去冬十月丁卯上至東都己丑還西京以高麗使者及斛斯政告太廟仍徵高麗王元入朝元竟不至敕將帥嚴裝更圖後舉竟不果行初開皇之末國家殷盛朝野皆以高麗為意劉炫獨以為不可作撫夷論以刺之至是其言始驗十一月丙申殺斛斯政於金光門外煬帝亡隋隋文帝仁壽四年立仇太翼言於帝曰陛下木命雍州為破水之衝不可久居又讖云修治洛陽還晉家帝深以為然十一月乙未幸洛陽留晉王昭守長安丙申發丁男數十萬掘塹自龍門東接長平汲郡抵臨清關度河至浚儀襄城達於上洛以置關防癸丑下詔於伊洛營建東京煬帝大業元年春三月丁未詔楊素與納言楊達將作大匠宇文愷營建東京每月役丁二百萬人徙洛州郭內居民及諸州富商大賈數萬户以實之廢二崤道開葼册道敕宇文愷與內史舍人封德彝等營顯仁宫南接皂澗北跨洛濵發大江之南五嶺以北奇材異石輸之洛陽又求海內嘉木異草珍禽奇獸以實園苑辛亥命尚書右丞皇甫議發河南淮北諸郡民前後百餘萬開通濟渠自西苑引穀洛水達于河復自板渚引河歷滎澤入汴又自大梁之東引汴水入泗達于淮又發淮南民十餘萬開邗溝自山陽至楊子入江渠廣四十步渠旁皆築御道樹以柳自長安至江都置離宫四十餘所庚申遣黃門侍郎王弘等往江南造龍舟及雜船數萬艘東京官吏督役嚴急役丁死者什四五所司以車載死丁東至成臯北至河陽相望於道又作天經官於東宫四時祭高祖夏五月築西苑周二百里其內為海周十餘里為方丈蓬萊瀛洲諸山高出水百餘尺臺觀宫殿羅絡山上向背如神海北有龍鱗渠縈紆注海內緣渠作十六院門皆臨渠每院以四品夫人主之堂殿樓觀窮極華麗宫樹秋冬雕落則翦綵為花葉綴於枝條色渝則易以新者常如陽春沼內亦翦綵為荷芰菱芡乘輿遊幸則去冰而布之十六院競以殽羞精麗相高求市恩寵上好以月夜從宫女數千騎遊西苑作清夜遊曲於馬上奏之秋八月壬寅上行幸江都發顯仁宫王弘遣龍舟奉迎乙巳上御小朱航自漕渠出洛口御龍舟龍舟四重高四十五尺長二百尺上重有正殿內殿東令獻食多者一州至百輿極水陸珍奇後宫厭飫將發之際多棄埋之二年春正月辛酉東京成進將作大匠宇文愷位開府儀同三司二月丙戍詔吏部尚書牛弘等議定輿服儀衛制度以開府儀同三司何稠為太府少卿使之營造送江都稠智思精巧博覽圖籍參會古今多所損益衮冕畫日月星辰皮辨用漆紗為之又作黃麾三萬六千人仗及輅輦車輿皇后鹵簿百官儀服務為華盛以稱上意課州縣送羽毛民求捕之網羅被水陸禽獸有堪氅毦之用者殆無遺類烏程有高樹踰百尺旁無附枝上有鶴巢民欲取之不可上乃伐其根鶴恐殺其子自拔􅌁毛投於地時人或稱以為瑞曰天子造羽儀鳥獸自獻毛羽所役工十萬餘人用金銀錢帛巨億計帝每出遊幸羽儀填街溢路亘二十餘里三月庚午上發江都夏四月庚戌自伊闕陳法駕備千乘萬騎入東京辛亥御端門大赦免天下今年租賦制五品已上文官乘車在朝辨服佩玉武官馬加珂戴幘服袴褶文物之盛近世莫及也秋七月甲戌元德太子昭薨帝哭之數聲而止尋奏聲伎無異平日八月辛卯封皇孫倓為燕王侗為越王侑為代王皆昭之子也九月乙丑立秦孝三子浩為秦王冬十月置洛口倉於鞏東南原上築倉城周回二十餘里穿三千窖窖容八千石以還置監官並鎮兵千人十二月置回洛倉於洛陽北七里倉城周回十里穿三百窖初齊溫公之世有魚龍山車等戲謂之散樂周宣帝時鄭譯奏徵之高祖受禪命牛弘定樂非正聲清商及九部四舞之色悉放遣之帝以啓民可汗將入朝欲以富樂誇之太常少卿裴藴希旨奏括天下周齊梁陳樂家子弟皆為樂戶其六品以下至庶人有善音樂者皆直太常帝從之於是四方散樂大集東京閲之於芳華苑積翠池側有舍利獸先來跳躍激水滿衢黿鼉龜鱉水人蟲魚遍覆于地又有鯨魚噴霧翳日倐忽化成黃龍長七八丈又二人戴竿上有舞者欻然騰過左右易處又有神鼇負山幻人吐火千變萬化伎人皆衣錦繡繒綵舞者鳴環佩綴花眊課京兆河南製其衣兩京錦綵為之空竭帝多製豔篇令樂正白明達造新聲播之音極哀怨帝甚悅謂明達曰齊氏偏隅樂工曹妙達猶封王我今天下大同方且貴汝宜自修謹三年夏四月庚辰下詔欲安輯河北巡省趙魏丙寅車駕北巡􅊨􅊨六月帝過鴈門自榆林出塞甲士五十萬旌旗輜重千里不絶作觀風殿及行城周二千步八月幸突厥啓民帳而還厥朝隋事見突西域諸胡多至張掖交市帝使吏部侍郎裴矩掌之矩知帝好逺略諸商胡至者矩誘訪諸國山川風俗王及庶人儀形服飾撰西域圖記三卷合四十四國入朝奏之仍别造地圖窮其要害從西傾以去縱橫所亘將二萬里發自敦煌至于西海凡為三道北道從伊吾中道從高昌南道從鄯善揔湊敦煌且云以國家威德將士驍雄泛濛汜而越崑崙易如反掌但突厥吐渾分領羌胡之國為其壅遏故朝貢不通今並因商人密送誠款引領翹首願為臣妾若服而撫之務存安輯皇華遣使弗動兵車諸蕃既從渾厥可滅混一戎夏其在兹乎帝大悅賜物五百段日引矩至御坐親問西域事矩盛言胡中多諸珍寶吐谷渾易可並吞帝於是慨然慕秦皇漢武之功甘心將通西域四夷經略咸以委之以矩為黃門侍郎復使至張掖引致諸胡啖之以利勸令入朝自是西域諸胡往來相繼所經郡縣疲於送迎糜費以萬萬計令中國疲弊以至於亡皆矩之唱導也四年正月乙巳詔發河北諸軍百餘萬衆穿永濟渠引沁水南達于河北通涿郡丁男不供始役婦人三月乙丑車駕幸五原因出塞巡長城帝無日不治宫室兩京及江都苑囿亭殿雖多久而益厭每遊幸左右顧矚無可意者不知所適乃備責天下山川之圖躬自歷覽以求勝地可置宫苑者夏四月詔於汾州之北汾水之源營汾陽宫秋七月辛巳發丁男二十餘萬築長城自榆谷而東九月辛未徵天下鷹師悉集東京至者萬餘人五年春正月丙子改東京為東都戊子上自東都西還二月戊申車駕至西京三月己巳西巡河右乙亥幸扶風舊宅夏四月癸亥出臨津關度黃河至西平陳兵講武將擊吐谷渾五月乙亥上大獵於拔延山長圍周亘二十里庚辰入長寧谷度星嶺丙戌至浩亹川以橋未成斬都水使者黃亘及督役者九人數日橋成乃行六月辛丑帝謂給事郎蔡徵曰自古天子有巡狩之禮而江東諸帝多傅脂粉坐深宫不與百姓相見此何理也對曰此其所以不能長世丙午至張掖帝之將西巡也命裴矩説高昌王麴伯雅及伊吾吐屯設等啖以厚利召使入朝壬子帝至燕支山伯雅吐屯設等及西域二十七國謁於道左皆令佩金玉被錦罽焚香奏樂歌舞喧譟帝復令武威張掖士女盛飾縱觀衣服車馬不鮮者郡縣督課之騎乘填咽周亘數十里以示中國之盛吐屯設獻西域數千里之地上大悅癸丑置西海河源鄯善且末等郡謫天下罪人為戌卒以守之命劉權鎮河源郡積石鎮大開屯田扞禦吐谷渾以通西域之路是時天下凡有郡一百九十縣一千二百五十五户八百九十萬有奇東西九千三百里南北萬四千八百一十五里隋氏之盛極於此矣帝謂裴矩有綏懷之略進位銀青光祿大夫自西京諸縣及西北諸郡皆轉輸塞外每嵗巨億萬計經途險逺及遇冦鈔人畜死亡不達者郡縣皆徵破其家由是百姓失業西方先困矣丙辰上御觀風殿大備文物引高昌王麴伯雅及伊吾吐屯設升殿宴飲其餘蠻夷使者陪階庭者二十餘國奏九部樂及魚龍戲以娛之賜賚有差戊午赦天下吐谷渾有青海俗傳置牝馬於其上得龍種秋七月丁卯置馬牧於青海縱牝馬二千匹於川谷以求龍種無效而止車駕東還行經大斗拔谷山路隘險魚貫而出風雪晦冥文武飢餒沾濕夜久不逮前營士卒凍死者太半馬驢什八九後宫妃主或狼狽相失與軍士雜宿山間九月癸未車駕入西京冬十一月丙子復幸東都六年春正月帝以諸蕃酋長畢集洛陽丁丑於端門街盛陳百戲戲場周圍五千步執絲竹者萬八千人聲聞數十里自昏達旦燈火光燭天地終月而罷所費巨萬自是嵗以為常諸蕃請入豐都市交易帝許之先命整飾店肆簷宇如一盛設帷帳珍貨充積人物華盛賣菜者亦藉以龍須席胡客每過酒食店悉令邀延就坐醉飽而散不取其直紿之曰中國豐饒酒食例不取直胡客皆驚嘆其黠者頗覺之見以繒帛纒樹曰中國亦有貧者衣不蓋形何如以此物與之纒樹何為市人慙不能答帝稱裴矩之能謂羣臣曰裴矩大識朕意凡所陳奏皆朕之成算未發之頃矩輒以聞自非奉國盡心孰能若是是時矩與左翊衛大將軍宇文述內史侍郎虞世基御史大夫裴藴光祿大夫郭衍皆以諂諛有寵述善於供奉容止便辟侍衛者咸取則焉郭衍嘗勸帝五日一視朝曰無效高祖空自勤苦帝益以為忠曰唯有郭衍心與朕同帝臨朝凝重發言降詔辭義可觀而內存聲色其在兩都及巡遊常以僧尼道士女官自隨謂之四道場梁公蕭巨琮之弟子千牛左右宇文皛慶之孫也皆有寵於帝帝每日於苑中林亭間盛陳酒饌敕燕王倓與巨皛及高祖嬪御為一席僧尼道士女官為一席帝與諸寵姬為一席略相連接罷朝即從之宴飲更相勸侑酒酣殽亂靡所不至以是為常楊氏婦女之美者往往進御皛出入宫掖不限門禁至於妃嬪公主皆有醜聲帝亦不之罪也二月庚申以所徴周齊梁陳散樂悉配太常皆置博士弟子以相傳授樂工至三萬餘人三月癸亥帝幸江都宫初帝欲大營汾陽宫令御史大夫張衡具圖奏之衡承間進諫曰比年勞役繁多百姓疲弊伏願留神稍加抑損帝意甚不平後目衡謂侍臣曰張衡自謂由其計畫令我有天下也乃録齊王􅌔擕皇甫詡從駕及前幸涿郡祠恆嶽時父老謁見者衣冠多不整譴衡以憲司不能舉正出為榆林太守久之衡督役築樓煩城因帝巡幸得謁帝帝惡衡不損瘦以為不念咎謂衡曰公甚肥澤宜且還郡復遣之榆林未幾敕衡督役江都宫禮部尚書楊玄感使至江都衡謂玄感曰薛道衡真為枉死玄感奏之江都郡丞王世充又奏衡頻減頓具帝於是發怒鎖詣江都市將斬之久乃得釋除名為民放還田里以王世充領江都宫監冬十二月敕穿江南河自京口至餘杭八百餘里廣十餘丈使可通龍舟並置驛宫草頓欲東巡會稽七年春二月己未上升釣臺臨楊子津大宴百僚乙亥帝自江都行幸涿郡御龍舟度河入永濟渠仍敕選部門下內史御史四司之官於前船選補其受選者三千餘人或徒步隨船三千餘里不得處分凍餒瘦頓因而致死者什一二壬午下詔討高麗隋討髙麗討髙麗事見帝自去嵗謀討高麗詔山東置府令養馬以供軍役又發民夫運米積於瀘河懷逺二鎮車牛往者皆不返士卒死亡過半耕稼失時田疇多荒加之飢饉榖價踊貴東北邊尤甚斗米直數百錢所運米或粗惡令民糴以償之又發鹿車夫六十餘萬二人共推米三石道途險逺不足充糇糧至鎮無可輸皆懼罪亡命重以官吏貪殘因緣侵漁百姓困窮財力俱竭安居則不勝凍餒死期交急剽掠則猶得延生於是始相聚為羣盜鄒平民王薄擁衆據長白山剽掠齊濟之郊自稱知世郎言事可知矣又作無向遼東浪死歌以相感勸避征役者多往歸之平原東有豆子䴚負海帶河地形深阻自高齊以來羣盜多匿其中有劉霸道者家於其旁纍世仕宦資産富厚霸道嘉遊俠食客常數百人及羣盜起逺近多往依之有衆十餘萬號阿舅賊漳南人竇建德同縣孫安祖亦集無賴少年入高雞泊中為羣盜時鄃人張金稱聚衆河曲蓨人高士達聚衆於清河境內為盜平河朔事見唐自是所在羣盜蜂起不可勝數徒衆多者至萬餘人攻陷城邑甲子敕都尉鷹揚與郡縣相知追捕隨獲斬決然莫能禁止八年春三月癸巳上始御師進至遼水夏六月己未帝幸遼東城南秋七月進軍至薩水高麗擊之諸軍俱潰初九軍度遼凡三十萬五千及還至遼東城二千七百人資儲器械亡失蕩盡九月庚寅車駕至東都九年春正月丁丑詔徵天下兵集涿郡己亥命刑部尚書衛文升等輔代王侑留守西京二月帝復議伐高麗左光祿大夫郭榮諌不聽三月丙子濟隂孟海公起為盜保據周橋衆至數萬丁丑發丁男十萬城大興戊寅帝幸遼東命民部尚書樊子蓋等輔越王侗留守東都時所在盜起齊郡王薄孟讓北海郭方預清河張金稱平原郝孝德河間格謙勃海孫宣雅各聚種攻剽多者十餘萬少者數萬人山東苦之天下承平日久人不習兵郡縣吏每與賊戰望風沮敗夏四月庚午車駕度遼禮部尚書楊玄感反於黎陽秋七月癸未餘杭民劉元進起兵以應玄感元進手長尺餘臂垂過膝自以相表非常隂有異志皇帝再發三吳兵征高麗三吳兵皆相謂曰往嵗天下全盛吾輩父兄征高麗者猶太半不返今已罷弊復為此行吾屬無遺類矣由是多亡命郡縣捕之急聞元進舉兵亡命者雲集旬月間衆至數萬秋八月玄感兵敗執送行在所磔尸東都市癸卯吳郡朱燮晉陵管崇聚衆冦掠江左燮本還俗道人涉獵經史頗知兵法形容眇小為崑山縣博士與數十學生起兵民苦役者赴之如歸崇長大美姿容志氣倜儻隱居常孰自言有王者相故羣盜相與奉之時帝在涿郡命虎牙郎將趙六兒將兵萬人屯楊子分為五營以備南賊崇遣其將陸顗度江夜襲六兒破其兩營收其器械軍資而去衆益盛至十萬辛酉帝使大理卿鄭善果御史大夫裴藴刑部侍郎骨儀與留守樊子蓋推玄感黨與儀本天笁胡人也帝謂藴曰玄感一呼而從者十萬益知天下人不欲多多即相聚為盜耳不盡加誅無以懲後子蓋性既殘酷藴復受此旨由是峻法治之所殺三萬餘人皆籍沒其家枉死者太半流徙者六千餘人玄感之圍東都也開倉賑給百姓凡受米者皆坑之於都城之南玄感所善文士會稽虞綽琅邪王胄俱坐徙邊綽胄亡命捕得誅之帝善屬文不欲人出其右薛道衡死帝曰更能作空梁落燕泥否王胄死帝誦其佳句曰庭草無人隨意緑復能作此語邪帝自負才學每驕天下之士嘗謂侍臣曰天下皆謂朕承藉緒餘而有四海設令朕與士大夫高選亦當為天子矣帝從容謂祕書郎虞世南曰我性不喜人諫若位望通顯而諫以求名者彌所不耐至於卑賤之士雖少寬假然卒不置之地上汝其知之世南世基之弟也九月己卯東海民彭孝才起為盜有衆數萬冬十月丁丑賊帥吕明星圍東郡虎賁郎將費青奴擊破之劉元進帥其衆將度江會楊玄感敗朱燮管崇共迎元進推以為主據吳郡稱天子燮崇俱為尚書僕射署置百官毗陵東陽會稽建安豪傑多執長史以應之帝遣左屯衛大將軍代人吐萬緒光祿大夫下邽魚俱羅將兵討之十一月己酉右侯衛將軍馮孝慈討張金稱於清河孝慈敗死十二月唐縣人宋子賢善幻術能變佛形自稱彌勒出世逺近信惑遂謀因無遮大會舉兵襲乘輿事泄伏誅並誅黨與千餘家扶風桑門向海明亦自稱彌勒出世人有歸心者輒獲吉夢由是三輔人翕然奉之因舉兵反衆至數萬丁亥海明自稱皇帝改元白烏詔太僕卿楊義臣擊破之劉元進攻丹楊吐萬緒濟江擊破之元進解圍去緒進屯曲阿元進結柵拒緒相持百餘日緒擊之賊衆大潰死者以萬數元進挺身夜遁保其壘朱燮管崇等屯毗陵連營百餘里緒乘勝進擊復破之賊退保黃山緒圍之元進燮僅以身免於陳斬崇及其將卒五千餘人收其子女三萬餘口進解會稽圍魚俱羅與緒偕行戰無不捷然百姓從亂者如歸市賊敗而復聚其勢益盛元進退據建安帝令緒進討緒以士卒疲弊請息甲待來春帝不悅俱羅亦以賊非嵗月可平諸子在洛京潛遣家僕迎之帝怒有司希旨奏緒怯懦俱羅敗衄俱羅坐斬徵緒詣行在緒憂憤道卒帝更遣江都丞王世充發淮南兵數萬人討元進世充度江頻戰皆捷元進燮敗死於吳其餘衆或降或散世充召先降者於通玄寺瑞像前焚香為誓約降者不殺散者始欲入海為盜聞之旬日之間歸首略盡世充悉坑之於黃亭澗死者三萬餘人由是餘黨復相聚為盜官軍不能討以至隋亡帝以世充有將帥才益加寵任是嵗詔為盜者籍沒其家時羣盜所在皆滿郡縣官因之各專威福生殺任情矣章丘杜伏威與臨濟輔公祏俱亡命為羣盜十年春二月議伐高麗丁酉扶風賊帥唐弼立李弘芝為天子有衆十萬自稱唐王三月壬子帝行幸涿郡士卒在道亡者相繼夏四月車駕至北平五月庚申延安賊帥劉迦論自稱皇王建元大世有衆十萬與稽胡相表裏為冦詔以左驍衛大將軍屈突通為關內討捕大使發兵擊之戰於上郡斬迦論並將卒萬餘級虜男女數萬口而還秋七月癸丑車駕次懷逺鎮班師冬十月丁卯上至東都十一月乙卯離石胡劉苗王反自稱天子衆至數萬將軍潘長文討之不克汲郡賊帥王德仁擁衆數萬保林慮山為盜帝將如東都太史令庾質諌曰比嵗伐遼民實勞弊陛下宜鎮撫關內使百姓盡力農桑三五年間四海稍豐實然後巡省於事為宜帝不悅質辭疾不從帝怒下質獄竟死獄中十二月壬申帝如東都赦天下戊子入東都東海賊帥彭孝才轉掠沂水彭城留守董純討擒之純戰雖屢捷而盜賊日滋或譛純怯懦帝怒鎖純詣東都誅之孟讓自長白山冦掠諸郡至盱眙衆十餘萬據都梁宫阻淮為固江都丞王世充將兵拒之為五柵以塞險要羸形示弱讓笑曰世充文法小吏安能將兵吾今生縛取鼓行入江都耳時民皆結堡自固野無所掠賊衆漸餒乃少留兵圍五柵分人於南方抄掠世充伺其懈縱兵出擊大破之讓以數十騎遁去斬首萬餘級齊郡賊帥左孝友衆十萬屯蹲狗山郡丞張須陀列營逼之孝友窘迫出降須陀威振東夏以功遷齊郡通守領河南道十二郡黜陟討捕大使涿郡賊帥盧明月衆十餘萬軍祝阿須陀將萬人邀之相持十餘日糧盡將退謂將士曰賊見吾退必悉衆來追若以千人襲據其營可有大利此誠危事誰能往者衆莫對唯羅士信及歷城秦叔寶請行於是須陀委柵而遁使二人分將千人伏葭葦中明月悉衆追之士信叔寶馳至其柵柵門閉二人超升其樓各殺數人營中大亂二人斬關以納外兵因縱火焚其三十餘柵煙焰漲天明月奔還須陀回軍奮擊大破之明月以數百騎遁去所俘斬無算叔寶名瓊以字行十一年帝以户口逃亡盜賊繁多二月庚午詔民悉城居田隨近給郡縣驛亭村塢皆築城上谷賊帥王須拔自稱漫天王國號燕賊帥魏刀兒自稱歷山飛衆各十餘萬北連突厥南冦燕趙初高祖夢洪水沒都意惡之故遷都大興申明公李穆薨高祖以渾為穆嗣纍官至右驍衛大將軍改封郕公帝以其門族強盛忌之會有方士安伽陀言李氏當為天子勸帝盡誅海內凡姓李者渾從子將作監敏小名洪兒帝疑其名應讖嘗面告之兾其引決虎賁郎將河東裴仁基告渾反帝收渾敏及宗族三十二人殺之三月己酉帝行幸太原夏四月幸汾陽宫避暑宫城迫隘百官士卒布散山谷間結草為營而居之以衛尉少卿李淵為山西河東撫慰大使承制黜陟選補郡縣文武官仍發河東兵討捕羣盜淵行至龍門擊賊帥毋端兒破之秋八月乙丑帝巡北塞突厥始畢帥騎數十萬謀襲乘輿平突厥事見太宗九月丁未車駕還至太原蘇威言於帝曰今盜賊不息士馬疲弊願陛下亟還西京深根固本為社稷計帝初然之宇文述曰從官妻子多在東都宜便道向洛陽自潼關而入帝從之冬十月壬戌帝至東都顧眄街衢謂侍臣曰猶大有人在意謂嚮日平楊玄感殺人尚少故也楊玄感之亂龍舟水殿皆為所焚詔江都更造凡數千艘制度仍大於舊者壬申盧明月帥衆十萬冦陳汝東海李子通起長白山依左才相才相忌之度淮與杜伏威合自稱將軍城父朱粲始為縣佐史從軍遂亡命聚衆為盜謂之可達寒賊自稱迦樓羅王衆至十餘萬引兵轉掠荆沔及山南郡縣所過噍類無遺十二月庚寅詔民部尚書樊子蓋發關中兵數萬擊絳賊敬盤陀等子蓋不分臧否自汾水之北村塢盡焚之賊有降者皆坑之百姓怨憤益相聚為盜詔以李淵代之有降者淵引置左右由是賊衆多降前後數萬人餘黨散入它郡十二年春正月朝集使不至者二十餘郡始議分遣使者十二道發兵討捕盜賊詔毗陵通守路道德集十郡兵數萬人於郡東南起宫苑周圍十二里內為十六離宫大抵倣東都西苑之制而奇麗過之又欲築宫於會稽會亂不果成三月上已帝與羣臣飲於西苑水上命學士杜寶撰水飾圖經采古水事七十二使朝散大夫黃衮以木為之間以妓航酒船人物自動如生鍾磬筝瑟能成音曲己丑張金稱陷平恩一朝殺男女萬餘口又陷武安巨鹿清河諸縣金稱比諸賊尤殘暴所過民無孑遺夏四月丁巳大業殿西院火帝以為盜起驚走入西苑匿草間火定乃還帝自八年以後每夜眠中恆驚悸云有賊令數婦人搖撫乃得眠癸亥歷山飛别將甄翟兒衆十萬冦太原將軍潘長文敗死帝問侍臣盜賊左翊衛大將軍宇文述曰漸少帝曰比從來少幾何對曰不能什一納言蘇威引身隱柱帝呼前問之對曰臣非所司不委多少但患漸近帝曰何謂也威曰他日賊據長白山今近在汜水且往日租賦丁役今皆何在豈非其人皆化為盜乎比見奏賊皆不以實遂使失於支計不時翦除又昔在鴈門許罷征遼今復徵發賊何由息帝不悅而罷尋屬五月五日百僚多饋珍玩威獨獻尚書或譖之曰尚書有五子之歌威意甚不遜帝益怒頃之帝問威以伐高麗事威欲帝知天下多盜對曰今兹之役願不發兵但赦羣盜自可得數十萬遣之東征彼喜於免罪爭務立功高麗可滅帝不懌威出御史大夫裴藴奏曰此大不遜天下何處有許多賊帝曰老革多姦以賊脅我欲批其口且復隱忍藴知帝意遣河南白衣張行本奏威昔在高陽典選濫授人官畏怯突厥請還京師帝令案驗獄成下詔數威罪狀除名為民後月餘復有奏威與突厥隂圖不軌者事下裴藴推之藴處威死威無以自明但摧謝而已帝憫而釋之曰未忍即殺遂並其子孫三世皆除名秋七月江都新作龍舟成送東都宇文述勸幸江都帝從之右候衛大將軍酒泉趙才諌曰今百姓疲勞府藏空竭盜賊蜂起禁令不行願陛下還京師安兆庶帝大怒以才屬吏旬日意解乃出之朝臣皆不欲行帝意甚堅無敢諫者建節尉任宗上書極諫即日於朝堂杖殺之甲子帝幸江都命越王侗與光祿大夫段達太府卿元文郁檢校民部尚書韋津右武衛將軍皇甫無逸右司郎盧楚等揔留後事津孝寬之子也帝以詩留别宫人曰我夢江都好征遼亦偶然奉信郎崔民象以盜賊充斥於建國門上表諫帝大怒先解其頥然後斬之戊辰馮翊孫華舉兵為盜虞世基以盜賊充斥請發兵屯洛口倉帝曰卿是書生定猶恇怯戊辰車駕至鞏敕有司移箕山公路二府於倉內仍令築城以備不虞至汜水奉信郎王愛仁復上表請還西京帝斬之而行至梁郡郡人邀車駕上書曰陛下若遂幸江都天下非陛下之有又斬之是時李子通據海陵左才相掠淮北杜伏威屯六合衆各數萬帝遣光祿大夫陳稜將宿衛精兵八千討之往往克捷八月乙巳賊帥趙萬海衆數十萬自恆山寇高陽冬十月己丑許恭公宇文述卒初述子化及智及皆無賴化及事帝於東宫帝寵昵之及即位以為太僕少卿帝幸榆林化及智及冒禁與突厥交市帝怒將斬之已解衣辮髮既而釋之賜述為奴智及弟士及以尚主之故常輕智及唯化及與之親昵述卒帝復以化及為右屯衛將軍智及為將作少監韋城翟讓亡命於瓦岡為羣盜同郡單雄信往從之聚徒至萬餘人時又有外黃王當仁濟南王伯當韋城周文舉雍丘李公逸等皆擁衆為盜李密亡命往來諸帥間説以取天下之䇿鄱陽賊帥操師乞自稱元興王建元始興攻陷豫章郡以其鄉人林士弘為大將軍詔治書侍御史劉子翊將兵討之師乞中流矢死士弘代統其衆與子翊戰於彭蠡湖子翊敗死士弘兵大振至十餘萬人十二月壬辰士弘自稱皇帝國號楚建元太平遂取九江臨川南康宜春等郡豪傑爭殺隋守令以郡縣應之其地北自九江南及番禺皆為所有詔以右驍衛將軍唐公李淵為太原留守以虎賁郎將王威虎牙郎將高君雅為之副將兵討甄翟兒與翟兒遇於雀鼠谷淵衆才數千賊圍淵數匝李世民將精兵救之拔淵於萬衆之中會步兵至合擊大破之張金稱郝孝德孫宣雅高士逹楊公卿等寇掠河北屠陷郡縣隋將帥敗亡相繼惟虎賁郎將王辨清河郡丞楊善會數有功帝遣太僕楊義臣討張金稱金稱與左右逃於清河之東楊善會討擒之餘衆皆歸竇建德內史侍郎虞世基以帝惡聞賊盜諸將及郡縣有告敗求救者世基皆抑損表狀不以實聞但云鼠竊狗盜郡縣捕逐行當殄盡願陛下勿以介懷帝良以為然或杖其使者以為妄言由是盜賊遍海內陷沒郡縣帝皆弗之知也楊義臣破降河北賊數十萬列狀上聞帝歎曰我初不聞賊頓如此義臣降賊何多也世基對曰小竊雖多未足為慮義臣克之擁兵不少久在閫外此最非宜帝曰卿言是也遽追義臣放散其兵賊由是復盛治書侍御史韋雲起劾奏世基及御史大夫裴藴職典樞要維持內外四方告變不為奏聞賊數實多裁減言少陛下既聞賊少發兵不多衆寡懸殊往皆不克故使官軍失利賊黨日滋請付有司結正其罪大理卿鄭善果奏雲起詆訾名臣所言不實非毁朝政妄作威權由是左遷雲起為大理司直帝至江都江淮郡官謁見者專問禮餉豐薄豐則超遷丞守薄則率從停解江東郡丞王世充獻銅鏡屛風遷通守歷陽郡丞趙元楷獻異味遷江都郡丞由是郡縣競務刻剝以充貢獻民外為盜賊所掠內為郡縣所賦生計無遺加之飢饉無食民始采樹皮葉或搗藁為末或煮土而食之諸物皆盡乃自相食而官食猶充牣吏皆畏法莫敢振救王世充密為帝簡閲江淮民間美女獻之由是益有寵河間賊帥格謙擁衆十餘萬據豆子䴚自稱燕王帝命王世充將兵討斬之謙將勃海高開道收其餘衆冦掠燕地軍勢復振恭帝義寧元年春正月右禦衛將軍陳稜討杜伏威伏威奮擊大破之伏威乘勝破高郵引兵據歷陽自稱揔管以輔公祐為長史分遣諸將徇屬縣所至輒下江淮間小盜爭附之平江淮事見唐丙辰竇建德自稱長樂王辛巳魯郡賊帥徐圓朗攻陷東平分兵略地自琅邪以西北至東平盡有之勝兵二萬餘人盧明月轉掠河南至于淮北衆號四十萬自稱無上王帝命江都通守王世充討之世充與戰於南陽大破之斬明月餘衆皆散二月壬午朔方鷹楊郎將梁師都殺郡丞唐世宗據郡自稱大丞相北連突厥馬邑人劉武周殺太守王仁恭自稱太守平河東事見唐李密翟讓襲興洛倉破之讓推密為主上密號為魏公即位稱元年平東都事見唐三月梁師都略定雕隂弘化延安等郡遂即皇帝位國號梁改元永隆左翊衛蒲城郭子和坐事徙榆林會郡中大飢子和潛結敢死二十八人攻郡門執郡丞王才數以不恤百姓斬之開倉賑施自稱永樂王改元丑平尊其父為太公以其弟子政為尚書令子端子升為左右僕射有二千餘騎南連梁師都北附突厥各遣子為質以自固始畢以劉武周為定楊天子梁師都為解事天子子和為平楊天子子和固辭不敢當乃更以為屋利設夏四月汾隂薛舉劫金城令郝瑗發兵自稱西秦霸王平隴右事見唐李密帥衆據回洛倉以逼東都越王侗遣太常丞元善達間行賊中詣江都奏稱李密有衆百萬圍逼東都據洛口倉城內無食若陛下速還烏合必散不然者東都決沒因歔欷嗚咽帝為之改容虞世基進曰越王年少此輩誑之若如所言善達何緣來至帝乃勃然怒曰善達小人敢廷辱我因使經賊中向東陽催運善達遂為羣盜所殺是後人人杜口莫敢以賊聞世基容貌沈審言多合意特為帝所親愛朝臣無與為比親黨憑之鬻官賣獄賄賂公行其門如市由是朝野共疾怨之內史舍人封德彞託附世基以世基不間吏務密為指畫宣行詔命諂順帝意羣臣表疏忤旨者皆屛而不奏鞠獄用法多峻文深詆論功行賞則抑削就薄故世基之寵日隆而隋政益壞皆德彞所為也五月甲子唐公李淵舉兵於晉陽秋七月李淵發晉陽移檄郡縣諭以尊立代王之意周武威鷹揚府司馬李軌自稱河西大梁王置官屬並擬開皇故事薛舉自稱秦帝立子仁杲為太子驍果從帝在江都者多逃亡帝患之以問裴矩對曰人情非有匹偶難以久處請聽軍士於此納室帝從之九月悉召江都境內寡婦處女集宫下恣將士所取或先與姦者聽自首即以配之戊午李淵帥諸軍圍河東屈突通嬰城自守淵留諸將圍河東自引兵趣長安庚申諸軍濟河甲子至朝邑舍於長春宫冬十月淵至長安羅川令蕭銑自稱梁王十一月淵迎代王即位遙尊煬帝為太上皇進封淵為唐王唐高祖武德元年隋煬帝至江都荒淫益甚宫中為百餘房各盛供張實以美人日令一房為主人江都郡丞趙元楷掌供酒饌帝與蕭后及幸姬歷就宴飲酒巵不離口從姬十餘人亦常醉然帝見天下危亂意亦擾擾不自安退朝則幅巾短衣䇿杖步遊遍歷臺館非夜不止汲汲顧景唯恐不足帝自曉占候卜相好為吳語常夜置酒仰視天文謂蕭后曰外間大有人圖儂然儂不失為長城公卿不失為沈后且共樂飲耳因引滿沉醉又嘗引鏡自照顧謂蕭后曰好頭頸誰當斫之后驚問故帝笑曰貴賤苦樂更迭為之亦復何傷帝見中原已亂無心北歸欲都丹陽保據江東命羣臣廷議之內史侍郎虞世基等皆以為善右侯衛大將軍李才極陳不可請車駕還長安與世基忿爭而出門下録事衡水李桐客曰江東卑濕土地險狹內奉萬乘外給三軍民不堪命恐亦將散亂耳御史劾桐客謗毁朝政於是公卿皆阿意言江東之民望幸已久陛下過江撫而臨之此大禹之事也乃命治丹陽宫將徙都之時江都糧盡從駕驍果多關中人久客思鄉里見帝無西意多謀叛歸郎將竇賢遂帥所部西走帝遣騎追斬之而亡者猶不止帝患之虎賁郎將扶風司馬德戡素有寵於帝帝使領驍果屯於東城德戡與所善虎賁郎將元禮直閣裴虔通謀曰今驍果人人欲亡我欲言之恐先事受誅不言於後事發亦不免族滅奈何又聞關內淪沒李孝常以華隂叛上囚其二弟欲殺之我輩家屬皆在西能無此慮乎二人皆懼曰然計將安出德戡曰驍果若亡不若與之俱去二人皆曰善因轉相招引內史舍人元敏虎牙郎將趙行樞鷹揚郎將孟秉符璽郎李覆牛方裕直長許弘仁薛世良城門郎唐奉義醫正張愷勳侍楊士覽等皆與之同謀日夜相結約於廣座明論叛計無所畏避有宫人白蕭后曰外間人人欲反后曰任汝奏之宫人言於帝帝大怒以為非所宜言斬之其後宫人復白后曰天下事一朝至此無可救者何用言之徒令帝憂耳自是無復言者趙行樞與將作少監宇文智及素厚楊士覽智及之甥也二人以謀告智及智及大喜德戡等期以三月望日結黨西遁智及曰主上雖無道威令尚行卿等亡去正如竇賢取死耳今天實喪隋英雄並起同心叛者已數萬人因行大事此帝王之業也德戡等然之行樞薛世良請以智及兄右屯衛將軍許公化及為主結約既定乃告化及化及性駑怯聞之變色流汗既而從之德戡使許弘仁張愷入備身府告所識者云陛下聞驍果欲叛多醖毒酒欲因享會盡鴆殺之獨與南人留此驍果皆懼轉相告語反謀益急乙卯德戡悉召驍果軍吏諭以所為皆曰唯將軍命是日風霾晝昏晡後德戡盜御廄馬潛厲兵刃是夕元禮裴虔通直閣下專主殿內唐奉義主閉城門與虔通相知諸門皆不下鍵至三更德戡於東城集兵得數萬人舉火與城外相應帝望見火且聞外喧囂問何事虔通對曰草坊失火外人共救之耳時內外隔絶帝以為然智及與孟秉於城外集千餘人劫候衛虎賁馮普樂布兵分守衢巷燕王倓覺有變夜穿芳林門側水竇而入至玄武門詭奏曰臣猝中風命懸俄頃請得面辭裴虔通等不以聞執囚之丙辰天未明德戡授虔通兵以代諸門衛士虔通自門將數百騎至成象殿宿衛者傳呼有賊虔通乃還閉諸門獨開東門驅殿內宿衛者令出皆投杖而走右屯衛將軍獨孤盛謂虔通曰何物兵形勢大異虔通曰事勢已然不預將軍事將軍㥀毋動盛大罵曰老賊是何物語不及被甲與左右十餘人拒戰為亂兵所殺盛楷之弟也千牛獨孤開逺帥殿內兵數百人詣玄覽門叩閣請曰兵仗尚全猶堪破賊陛下若出臨戰人情自定不然禍今至矣竟無應者軍士稍散賊執開逺義而釋之先是帝選驍健官奴數百人置玄武門謂之給使以僃非常待遇優厚至以宫人賜之司宫魏氏為帝所信化及等結之使為內應是日魏氏矯詔悉聽給使出外倉猝之際無一人在者德戡等引兵自玄武門入帝聞亂易服逃於西閣虔通與元禮進兵排左閣魏氏啓之遂入永巷問陛下安在有美人出指之校尉令狐行達拔刀直進帝映窗扉謂行達曰汝欲殺我邪對曰臣不敢但欲奉陛下西還耳因扶帝下閣虔通本帝為晉王時親信左右也帝見之謂曰卿非我故人乎何恨而反對曰臣不敢反但將士思歸欲奉陛下還京師耳帝曰朕方欲歸正為上江米船不至今與汝歸耳虔通因勒兵守之至旦孟秉以甲騎迎化及化及戰栗不能言人有來謁之者但俯首據鞍稱罪過化及至城門德戡迎謁引入朝堂號為丞相裴虔通謂帝曰百官悉在朝堂陛下須親出慰勞進其從騎逼帝乘之帝嫌其鞍勒弊更易新者乃乘之虔通執轡挾刀出宫門賊徒喜譟動地化及揚言曰何用持此物出亟還與手帝問世基何在賊黨馬文舉曰已梟首矣於是引帝還至寢殿虔通德戡等拔白刃侍立帝歎曰我何罪至此文舉曰陛下違棄宗廟巡遊不息外勤征討內極奢淫使丁壯盡於矢刃女弱填於溝壑四民喪業盜賊蜂起專任佞諛飾非拒諫何謂無罪帝曰我實負百姓至於爾輩榮祿兼極何乃如是今日之事孰為首邪德戡曰溥天同怨何止一人化及又使封德彝數帝罪帝曰卿乃士人何為亦爾德彝赧然而退帝愛子趙王杲年十二在帝側號慟不已虔通斬之血濺御服賊欲弒帝帝曰天子死自有法何得加以鋒刃取鴆酒來文舉等不許使令狐行達頓帝令坐帝自解練巾授行達縊殺之初帝自知必及於難常以罌貯毒藥自隨謂所幸諸姬曰若賊至汝曹當先飲之然後我飲及亂顧索藥左右皆逃散竟不能得蕭后與官人撤漆牀板為小棺與趙王杲同殯於西院流珠堂帝每巡幸常以蜀王秀自隨囚於驍果營化及弒帝欲奉秀立之衆議不可乃殺秀及其七男又殺齊王暕及其二子並燕王倓隋氏宗室外戚無少長皆死唯秦王浩素與智及往來且以計全之齊王暕素失愛於帝恆相猜忌帝聞亂顧蕭后曰得非阿孩邪化及使人就第誅暕暕謂帝使收之曰詔使且緩兒兒不負國家賊曳至街中斬之暕竟不知殺者為誰父子至死不相明又殺內史侍郎虞世基御史大夫裴藴左翊衛大將軍來護兒袐書監袁充右翊衛將軍宇文協千牛宇文皛梁公蕭巨等及其子巨琮之弟子也難將作江陽長張惠紹馳告裴藴與惠紹謀欲矯詔發郭下兵收化及等扣門援帝議定遣報虞世基世基疑告反者不實抑而不許須臾難作藴歎曰謀及播郎竟誤人事虞世基宗人伋謂世基子符璽郎熙曰事勢已然吾將濟卿南度同死何益熙曰棄父背君求生何地感尊之懷自此決矣世基弟世南抱世基號泣請以身代化及不許黃門侍郎裴矩知必將有亂雖厮役皆厚遇之又建䇿為驍果娶婦及亂作賊皆曰非裴黃門之罪既而化及至矩迎拜馬首故得免化及以蘇威不預朝政亦免之威名位素重往參化及化及集衆而見之曲加殊禮百官悉詣朝堂賀給事郎許善心獨不至許弘仁馳告之曰天子已崩宇文將軍攝政闔朝文武咸集天道人事自有代終何預於叔而低回若此善心怒不肯行弘仁反走上馬泣而去化及遣人就家擒至朝堂既而釋之善心不舞蹈而出化及怒曰此人大負氣復命擒還殺之其母范氏年九十二撫柩不哭曰能死國難吾有子矣因卧不食十餘日而卒唐王之入關也張季珣之弟仲琰為上洛令帥吏民拒守部下殺之以降宇文化及之亂仲琰弟琮為千牛左右化及殺之兄弟三人皆死國難時人愧之化及自稱大丞相揔百揆以皇后令立秦王浩為帝居别宫令發詔畫敕書而已仍以兵監守之化及以弟智及為左僕射士及為內史令裴矩為右僕射戊辰隋恭帝詔以唐王為相國揔百揆宇文化及以左武衛將軍陳稜為江都太守綜領留事壬申令內外戒嚴云欲還長安皇后六宫皆依舊式為御營營前别立帳化及視事其中仗衛部伍皆擬乘輿奪江都人舟楫取彭城水路西歸以折衝郎將沈光驍勇使將給使營於禁內行至顯福宫虎賁郎將麥孟才虎牙郎錢傑與光謀曰吾儕受先帝厚恩今俯首事讎受其驅帥何面目視息世間哉吾必欲殺之死無所恨光泣曰是所望於將軍也孟才乃紏合恩舊帥所將數千人期以晨起將發時襲化及語泄化及夜與腹心走出營外留人告司馬德戡等使討之光聞營內喧知事覺即襲化及營空無所獲值內史侍郎元敏數而斬之德戡引兵入圍之殺光其麾下數百人皆鬬死一無降者孟才亦死孟才鐵杖之子也宇文化及擁衆十餘萬據有六宫自奉養一如煬帝每於帳中南面坐人有白事者默然不對下牙方取啓狀與唐奉義牛方裕薛世良張愷等參決之以少主浩付尚書省令衛士十餘人守之遣令史取其畫敕百官不復朝參至彭城水路不通復奪民車牛得二千兩並載宫人珍寶其戈甲戎器悉令軍士負之道逺疲劇軍士始怨司馬德戡竊謂趙行樞曰君大謬誤我當今撥亂必藉英賢化及庸暗羣小在側事將必敗若之何行樞曰在我等耳廢之何難初化及既得政賜司馬德戡爵溫國公加光祿大夫以其專統驍果心忌之後數日化及署諸將分配士卒以德戡為禮部尚書外示美遷實奪其兵柄德戡由是憤怨所獲賞賜皆以賂智及智及為之言乃使之將後軍萬餘人以從於是德戡行樞與諸將李本尹正卿宇文導師等謀以後軍襲殺化及便立德戡為主遣人詣孟海公結為外助遷延未發待海公報許弘仁張愷知之以告化及化及遣宇文士及陽為遊獵至後軍德戡不知事露出營迎謁因執之化及讓之曰與公戮力共定海內出於萬死今始事成方願共守富貴公又何反也德戡曰本殺昏主苦其淫虐推立足下而又甚之逼於物情不獲已也化及縊殺之並殺其支黨十餘人孟海公畏化及之強帥衆具牛酒迎之蕭銑即皇帝位置百官凖梁室故事煬帝凶問至長安五月戊午隋恭帝禪位于唐甲子唐王即皇帝位戊辰東都留守官奉越王即皇帝位大赦改元皇泰乙酉唐奉隋帝為酅國公宇文化及留輜重於滑臺以王軌為刑部尚書使守之引兵共趣黎陽李密將徐世績據黎陽畏其軍鋒以兵西保倉城化及渡河保黎陽分兵圍世績密帥步騎二萬壁於清淇與世績以烽火相應深溝高壘不與化及戰化及每攻倉城密輒引兵以掎其後密與化及隔水而語密數之曰卿本胸奴皂隸破野頭耳父兄子弟並受隋恩富貴纍世舉朝莫二主上失德不能死諌反行弒逆欲規篡奪不追諸葛瞻之忠誠乃為霍禹之惡逆天地所不容將欲何之若速來歸我尚可得全後嗣化及默然俯視良久瞋目大言曰與爾論相殺事何須作書語邪密謂從者曰化及庸愚如此忽欲圖為帝王吾當折杖驅之耳化及盛修攻具以逼倉城世績於城外掘深溝以固守化及阻塹不得至城下世績於塹中為地道出兵擊之化及大敗焚其攻具時李密請降皇泰主令先平化及賜以詔書密受詔東擊化及王軌降於密化及大懼欲取以北諸郡其將陳智略等皆降化及趣魏縣平東都詳見唐秋八月隋江都太守陳稜求得煬帝之柩僃天子儀衛改葬於江都宫西吳公臺下其王公以下皆列瘞於帝塋之側九月辛未追諡隋太上皇為煬帝宇文化及至魏縣張愷等謀去之事覺化及殺之腹心稍盡兵勢日蹙兄弟更無他計但相聚酣宴奏女樂化及醉尤智及曰我初不知由汝為計強來立我今所向無成士馬日散負弒君之名天下所不容今者族滅豈不由汝乎持其兩子而泣智及怒曰事捷之日初不賜尤及其將敗乃欲歸罪何不殺我以降竇建德數相鬬鬩言無長幼醒而復飲以此為恆其衆多亡化及自知必敗嘆曰人生固當死豈不一日為帝乎於是鴆殺秦王浩即皇帝位於魏縣國號許改元天壽署置百官冬十月丙戌皇泰主以王世充為太尉二年春正月戊午淮安王神通擊宇文化及於魏縣化及不能抗東走聊城神通拔魏縣引兵追化及至聊城圍之閏二月宇文化及以珍貨誘海曲諸賊賊帥王薄帥衆從之與共守聊城竇建德謂其羣下曰吾為隋民隋為吾君今宇文化及弒逆乃吾讎也吾不可以不討乃引兵趣聊城淮安王神通攻聊城化及糧盡請降神通不許安撫副使崔世幹勸神通許之神通曰軍士暴露日久賊食盡計窮克在旦暮吾當攻取以示國威且散其玉帛以勞戰士若受其降將何以為軍賞乎世幹曰今建德方至若化及未平內外受敵吾軍必敗夫不攻而下之為功甚易奈何貪其玉帛而不受乎神通怒囚世幹於軍中既而宇文士及自濟北餽之化及軍稍振遂復拒戰神通督兵攻之貝州刺史趙君德攀堞先登神通心害其功收兵不戰君德大詬而下遂不克建德軍且至神通引兵退建德與化及連戰大破之化及復保聊城建德縱兵四面急攻王薄開門納之建德入城生擒化及先謁隋蕭皇后語皆稱臣素服哭煬帝盡哀收傳國璽及鹵簿儀仗撫存隋之百官然後執逆黨宇文智及楊士覽元武達許弘仁孟景集隋官而斬之梟首軍門之外以檻車載化及並二子承基承趾至襄國斬之夏四月癸卯王世充稱皇泰主命禪位于鄭遣其兄世惲幽皇泰主於含涼殿戊申世充奉皇泰主為潞國公乙巳王世充即皇帝位五月王世充遣兄子唐王仁則及家奴梁百年鴆皇泰主縊殺之諡曰恭皇帝見事東都唐平高祖興唐隋恭帝義寧元年初唐公李淵娶於神武肅公竇毅生四男建成世民玄霸元吉一女適太子千牛備身臨汾柴紹世民聰明勇決識量過人見隋室方亂隂有安天下之志傾身下士散財結客咸得其歡心世民娶右驍衛將軍長孫晟之女右勳衛長孫順德晟之族弟也與右勳侍池陽劉弘基皆避遼東之役亡命在晉陽依淵與世民善左親衛竇琮熾之孫也亦亡命在太原素與世民有隙每以自疑世民加意待之出入卧內琮意乃安晉陽宫監猗氏裴寂晉陽令武功劉文靜相與同宿見城上烽火寂歎曰貧賤如此復逢亂離何以自存文靜笑曰時事可知吾二人相得何憂貧賤文靜見李世民而異之深自結納謂寂曰此非常人豁達類漢高神武同魏祖年雖少命世才也寂初未然之文靜坐與李密連昏繫太原獄世民就省之文靜曰天下大亂非高光之才不能定也世民曰安知其無但人不識耳我來相省非兒女子之情欲與君議大事也計將安出文靜曰今主上南巡江淮李密圍逼東都羣盜殆以萬數當此之際有真主驅駕而用之取天下如反掌耳太原百姓皆避盜入城文靜為令數年知其豪傑一旦收集可得十萬人尊公所將之兵復且數萬一言出口誰敢不從以此乘虛入關號令天下不過半年帝業成矣世民笑曰君言正合我意乃隂部署賓客淵不之知也世民恐淵不從猶豫久之不敢言淵與裴寂有舊每相與宴語或連日夜文靜欲因寂關説乃引寂與世民交世民出私錢數百萬使龍山令高斌亷與寂博稍以輸之寂大喜由是日從世民遊情欵益狎世民乃以其謀告之寂許諾會突厥冦馬邑淵遣高君雅將兵與馬邑太守王仁恭並力拒之仁恭君雅戰不利淵恐並獲罪甚憂之世民乘間屛人説淵曰今主上無道百姓困窮晉陽城外皆為戰場大人若守小節下有冦盜上有嚴刑危亡無日不若順民心興義兵轉禍為福此天授之時也淵大驚曰汝安得為此言吾今執汝以告縣官因取紙筆欲為表世民徐曰世民覩天時人事如此故敢發言必欲執告不敢辭死淵曰吾豈忍告汝汝慎勿出口明日世民復説淵曰今盜賊日繁遍於天下大人受詔討賊賊可盡乎要之終不免罪且世人皆傳李氏當應圖讖故李金才無罪一朝族滅大人設能盡賊則功高不賞身益危矣唯昨日之言可以救禍此萬全之䇿也願大人勿疑淵乃歎曰吾一夕思汝言亦大有理今日破家亡軀亦由汝化家為國亦由汝矣先是裴寂私以晉陽宫人侍淵淵從寂飲酒酣寂從容言曰二郎隂養士馬欲舉大事正為寂以宫人侍公恐事覺並誅為此急計耳衆情已協公意如何淵曰吾兒誠有此謀事已如此當復奈何正須從之耳帝以淵與王仁恭不能禦冦遣使者執詣江都淵大懼世民與寂等復説淵曰今主昏國亂盡忠無益偏禆失律而罪及明公事已迫矣宜早定計且晉陽士馬精強宫監蓄積巨萬以兹舉事何患無成代王幼沖關中豪桀並起未知所附公若鼓行而西撫而有之如探囊中之物耳奈何受單使之囚坐取夷滅乎淵然之密部勒將發會帝繼遣使者馳驛赦淵及仁恭使復舊任淵謀亦緩淵之為河東討捕使也請大理司直夏侯端為副端祥之孫也善占候及相人謂淵曰金玉牀搖動帝座不安參墟得嵗必有真人起於其分非公而誰乎主上猜忍尤忌諸李金才既死公不思變通必為之次矣淵心然之及留守晉陽鷹揚府司馬太原許世緒説淵曰公姓在圖籙名應歌謡握五郡之兵當四戰之地舉事則帝業可成端居則亡不旋踵唯公圖之行軍司鎧文水武士彠前太子左勳衛唐憲憲弟儉皆勸淵舉兵儉説淵曰明公北招戎狄南收豪傑以取天下此湯武之舉也淵曰湯武非所敢擬在私則圖存在公則拯亂卿姑自重吾將思之憲雍之孫也時建成元吉尚在河東故淵遷延未發劉文靜謂裴寂曰先發制人後發制於人何不早勸唐公舉兵而推遷不已且公為宫監而以宫人侍客公死可爾何誤唐公也寂甚懼屢趣淵起兵淵乃使文靜詐為敕書發太原西河鴈門馬邑民年二十已上五十已下悉為兵期嵗暮集涿郡擊高麗由是人情忷忷思亂者益衆及劉武周據汾陽宫世民言於淵曰大人為留守而盜賊竊據離宫不早建大計禍今至矣淵乃集將佐謂之曰武周據汾陽宫吾輩不能制罪當族滅若之何王威等皆懼再拜請計淵曰朝廷用兵動止皆稟節度今賊在數百里內江都在三千里外加以道路險要復有它賊據之以嬰城膠柱之兵當巨猾豕突之勢必不全矣進退維谷何為而可威等皆曰公地兼親賢同國休戚若俟奏報豈及事機要在平賊專之可也淵陽若不得已而從之者曰然則先當集兵乃命世民與劉文靜長孫順德劉弘基等各募兵逺近赴集旬日間近萬人仍密遣使召建成元吉於河東柴紹於長安王威高君雅見兵大集疑淵有異志謂武士彠曰順德弘基皆背征三寺所犯當死安得將兵欲收桉之士彠曰二人皆唐公客若爾必大致紛紜威等乃止留守司兵田德平欲勸威等桉募人之狀士彠曰討捕之兵悉隸唐公威君雅但寄坐耳彼何能為德平亦止晉陽鄉長劉世龍密告淵云威君雅欲因晉祠祈雨為不利五月癸亥夜淵使丗民伏兵於晉陽宫城之外甲子旦淵與威君雅共坐視事使劉文靜引開陽府司馬胙城劉政會入立庭中稱有密狀淵目威等取狀視之政會不與曰所告乃副留守事唯唐公得視之淵陽驚曰豈有是邪視其狀云威君雅濳引突厥入寇君雅攘𬒮大詬曰此乃反者欲殺我耳時丗民已布兵塞衢路文靜因與劉弘基長孫順德等共執威君雅繫獄丙寅突厥數萬衆寇晉陽輕騎入外郭北門出其東門淵命裴寂等勒兵為僃而悉開諸城門突厥不能測莫敢進衆以為威君雅實召之也淵於是斬威君雅以徇淵部將王康達將千餘人出戰皆死城中忷懼淵夜遣軍潛出城且則張旗鳴鼓自它道來如援軍者突厥終疑之留城外二日大掠而去李建成李元吉棄其弟智雲於河東而去吏執智雲送長安殺之建成元吉遇柴紹於道與之偕行六月己卯李建成等至晉陽劉文靜勸李淵與突厥相結資其士馬以益兵勢淵從之自為手啓卑辭厚禮遺始畢可汗云欲大舉義兵逺迎主上復與突厥和親如開皇之時若能與我俱南願勿侵暴百姓若但和親坐受寶貨亦唯可汗所擇始畢得啓謂其大人曰隋主為人我所知也若迎以來必害唐公而擊我無疑矣茍唐公自為天子我當不避盛暑以兵馬助之即命以此意為復書使者七日而返將佐皆喜請從突厥之言淵不可裴寂劉文靜等皆曰今義兵雖集而戎馬殊乏胡兵非所須而馬不可失若復稽回恐其有悔淵曰諸君宜更思其次寂等乃請尊天子為太上皇立代王為帝以安隋室移檄郡縣改易旗幟雜用絳白以示突厥淵曰此可謂掩耳盜鐘然逼於時事不得不爾乃許之遣使以此議告突厥西河郡不從淵命甲申淵使建成世民將兵擊西河命太原令太原溫大有與之偕行曰吾兒年少以卿參謀軍事事之成敗當以此行卜之時軍士新集咸未閲習建成世民與之同甘苦遇敵則以身先之近道菜果非買不食軍士有竊之者輒求其主償之亦不詰竊者軍士及民皆感悅至西河城下民有欲入城者皆聽其入郡丞高德儒閉城拒守己丑攻拔之執德儒至軍門世民數之曰汝指野鳥為鸞以欺人主取高官吾興義兵正為誅佞人耳遂斬之自餘不戮一人秋毫無犯各慰撫使復業逺近聞之大悅建成等引兵還晉陽往返凡九日淵喜曰以此行兵雖橫行天下可也遂定入關之計淵開倉以賑貧民應募者日益多淵命為三軍分左右通謂之義士裴寂等上淵號為大將軍癸巳建大將軍府以寂為長史劉文靜為司馬唐儉及前長安尉溫大雅為記室大雅仍與弟大有共掌機密武士彠為鎧曹劉政會及武城崔善為太原張道原為户曹晉陽長上邽薑謨為司功參軍太谷長殷開山為府掾長孫順德劉弘基竇琮及鷹揚郎將高平王長諧天水薑寶誼陽屯為左右統軍自餘文武隨才授任又以世子建成為隴西公左領軍大都督左三統軍隸焉世民為敦煌公右領軍大都督右三統軍隸焉各置官屬以柴紹為右領軍府長史咨議譙人劉贍領西河通守道源名河開山名嶠皆以字行開山不害之孫也突厥遣其柱國康鞘利等送馬千匹詣李淵為互市許發兵送淵入關多少隨所欲丁酉淵引見康鞘利等受可汗書禮容盡恭贈遣康鞘利等甚厚擇其馬之善者止市其半義士請以私錢市其餘淵曰虜饒馬而貪利其來將不已恐汝不能市也吾所以少取者示貧且不以為急故也當為汝貰之不足為汝費乙巳靈壽賊帥郗士陵帥衆數千降於淵淵以為鎮東將軍燕郡公仍置鎮東府補僚屬以招撫山東郡縣己巳康鞘利北還淵命劉文靜使於突厥以請兵私謂文靜曰胡騎入中國生民之大蠧也吾所以欲得之者恐劉武周引之共為邊患又胡馬行牧不費芻粟聊欲藉之以為聲勢耳數百人之外無所用之秋七月壬子李淵以子元吉為太原太守留守晉陽宫後事並委之癸丑淵帥甲士三萬發晉陽立軍門誓衆並移檄郡縣諭以尊立代王之意西突厥阿史那大奈亦帥其衆以從甲寅遣通議大夫張綸將兵徇稽胡丙辰淵至西河慰勞吏民賑贍窮乏民年七十已上皆除散官其餘豪傑隨才授任口詢功能手注官秩一日除千餘人受官者皆不取告身各分淵所書官名而去淵入雀鼠谷壬戌軍賈胡堡去霍邑五十餘里代王侑遣虎牙郎將宋老生帥精兵二萬屯霍邑左武候大將軍屈突通將驍果數萬屯河東以拒淵會積雨淵不得進遣府佐沈叔安等將羸兵還太原更運一月糧乙丑張綸克離石殺太守楊子崇劉文靜至突厥見始畢可汗請兵且與之約曰若入長安民衆土地入唐公金玉繒帛歸突厥始畢大喜丙寅遣其大臣級失特勒先至淵軍告以兵已上道淵以書招李密密自恃兵強欲為盟主己巳使祖君彥復書曰與兄派流雖異根系本同自唯虛薄為四海英雄共推盟主所望左提右挈戮力同心執子嬰於咸陽殪商辛於牧野豈不盛哉且欲使淵以步騎數千自至河內面結盟約淵得書笑曰密妄自矜大非折簡可致吾方有事關中若遽絶之乃是更生一敵不如卑辭推奬以驕其志使為我塞成皋之道綴東都之兵我得專意西征俟關中平定據險養威徐觀蚌鷸之勢以收漁人之功未為晚也乃使溫大雅復書曰吾雖庸劣幸承餘緒出為八使入典六屯顛而不扶通賢所責所以大會義兵和親北狄共匡天下志在尊隋天生蒸民必有司牧當今為牧非子而誰老夫年逾知命願不及此欣戴大弟攀鱗附翼唯弟早膺圖籙以寧兆民宗盟之長屬籍見容復封於唐斯榮足矣殪商辛於牧野所不忍言執子嬰於咸陽未敢聞命汾晉左右尚須安輯盟津之會未暇卜期密得書甚喜以示將佐曰唐公見推天下不足定矣自是信使往來不絶雨久不止淵軍中糧乏劉文靜未返或傳突厥與劉武周乘虛襲晉陽淵召將佐謀北還裴寂等皆曰宋老生屈突通連兵據險未易猝下李密雖云連和姦謀難測突厥貪而無信唯利是視武周事胡者也太原一方都會且義兵家屬在焉不如還救根本更圖後舉李世民曰今禾菽被野何憂乏糧老生輕躁一戰可擒李密顧戀倉粟未遑逺略武周與突厥外雖相附內實相猜武周雖逺利太原豈可近忘馬邑本興大義奮不顧身以救蒼生當先入咸陽號令天下今遇小敵遽已班師恐從義之徒一朝解體還守太原一城之地為賊耳何以自全李建成亦以為然淵不聽促令引發世民將復入諫會日暮淵已寢世民不得入號哭於外聲聞帳中淵召問之世民曰今兵以義動進戰則克退還則散衆散於前敵乘於後死亡無日何得不悲淵乃悟曰軍已發奈何世民曰右軍嚴而未發左軍雖去計亦未逺請自追之淵笑曰吾之成敗皆在爾知復何言唯爾所為世民乃與建成分道夜追左軍復還丙子太原運糧亦至八月己卯雨霽庚辰李淵命軍中曝鎧仗行裝辛巳旦東南由山足細道趣霍邑淵恐宋老生不出李建成李世民曰老生勇而無謀以輕騎挑之理無不出脫其固守則誣以二於我彼恐為左右所奏安敢不出淵曰汝測之善老生不能逆戰賈胡吾知其無能為也淵與數百騎先至霍邑城東數里以待步兵使建成世民將數十騎至城下舉鞭指麾若將圍城之狀且詬之老生怒引兵三萬自東門南門分道而出淵使殷開山趣召後軍後軍至淵欲使軍士先食而戰世民曰時不可失淵乃與建成陳於城東世民陳於城南淵建成戰小却世民與軍頭臨淄段志玄自南原引兵馳下衝老生陳出其背世民手殺數十人兩刀皆缺流血滿袖灑之復戰淵兵復振因傳呼曰已獲老生矣老生兵大敗淵兵先趣其門門閉老生下馬投塹劉弘基就斬之僵尸數里日已暮淵即命登城時無攻具將士肉薄而登遂克之淵賞霍邑之功軍吏疑奴應募者不得與良人同淵曰矢石之間不辨貴賤論勳之際何有等差宜並從本勳授壬午淵引見霍邑吏民勞賞如西河選其丁壯使從軍關中軍士欲歸者並授五品散官遣歸或諌以官太濫淵曰隋氏吝惜勳賞此所以失人心也奈何效之且收衆以官不勝於用兵乎丙戌淵入臨汾郡慰撫如霍邑庚寅宿鼓山綘郡通守陳叔達拒守辛卯進攻克之叔達陳高宗之子有才學淵禮而用之癸巳淵至龍門劉文靜康鞘利以突厥兵五百人馬二千匹來至淵喜其來援謂文靜曰吾西行及河突厥始至兵少馬多皆君將命之功也汾陽薛大鼎説淵請勿攻河東自龍門直濟河據永豐倉傳檄逺近關中可坐取也淵將從之諸將請先攻河東乃以大鼎為大將軍府察非椽河東縣户曹任瓌説淵曰關中豪傑皆企踵以待義兵瓌在馮翊積年知其豪傑請往諭之必從風而靡義師自梁山濟河指韓城逼郃陽蕭造文吏必望塵請服孫華之徒皆當逺迎然後鼓行而進直據永豐雖未得長安關中固已定矣淵恱以瓌為銀青光祿大夫時關內羣盜孫華最強丙申淵至汾隂以書招之己亥淵進軍壷口河濵之民獻舟者日以百數仍置水軍壬寅孫華自郃陽輕騎度河見淵淵握手與坐慰奬之以華為左光祿大夫武鄉縣公領馮翊太守其徒有功者委華以次授官賞賜甚厚使之先濟繼遣左右統軍王長諧劉弘基及左領軍長史陳演壽金紫光祿大夫史大奈將步騎六千自梁山濟營於河西以待大軍以任瓌為招慰大使瓌説韓城下之淵謂長諧等曰屈突通精兵不少相去五十餘里不敢來戰足明其衆不為之用然通畏罪不敢不出若自濟河擊卿等則我進攻河東必不能守若全軍守城則卿等絶其河梁前扼其喉後拊其背彼不走必為擒矣九月乙卯張綸徇龍泉文成等郡皆下之獲文成太守鄭元璹元璹譯之子也屈突通遣虎牙郎將桑顯和將驍果數千人夜襲王長諧等營長諧等戰不利孫華史大奈以遊騎自後擊顯和大破之顯和脫走入城仍自絶河梁丙辰馮翊太守蕭造降於李淵造修之子也戊午淵帥諸軍圍河東屈突通嬰城自守將佐復推淵領太尉增置官屬淵從之時河東未下三鋪豪傑至者日以千數淵欲引兵西趣長安猶豫未決裴寂曰屈突通擁大衆馮堅城吾捨之而去若進攻長安不克退為河東所踵腹背受敵此危道也不若先克河東然後西上長安恃通為援通敗長安必破矣李世民曰不然兵貴神速吾席纍勝之威撫歸附之衆鼓行而西長安之人望風震駭智不及謀勇不及斷取之若振稿葉耳若淹留自弊於堅城之下彼得成謀修備以待我坐費日月衆心離沮則大事去矣且關中蜂起之將未有所屬不可不早招懷也屈突通自守虜耳不足為慮淵兩從之留諸將圍河東自引軍而西朝邑法曹武功靳孝謨以蒲津中渾二城降華隂令李孝常以永豐倉降仍應接河西諸軍孝常圓通之子也京兆諸縣亦多遣使請降庚申李淵帥諸軍濟河甲子至朝邑舍於長春宫關中士民歸之者如市丙寅淵遣世子建成司馬劉文靜帥王長諧等諸軍數萬人屯永豐倉守潼關以備東方兵慰撫使竇軌等受其節度敦煌公世民帥劉弘基等諸軍數萬人徇渭北慰撫使殷開山等受其節度軌琮之兄也冠氏長于志寧安養尉顔師古及世民婦兄長孫無忌謁見淵於長春宫師古名籕以字行志寧宣敏之兄子師古之推之孫也皆以文學知名無忌仍有才略淵皆禮而用之以志寧為記室師古為朝散大夫無忌為渭北行軍典籖屈突通聞淵西入署鷹揚郎將湯隂堯君素領河東通守使守蒲坂自引兵數萬趣長安為劉文靜所遏將軍劉綱戌潼關屯都尉南城通欲往依之王長諧先引兵襲斬綱據城以拒通通退保北城淵遣其將吕紹宗等攻河東不能克柴紹之自長安赴太原也謂其妻李氏曰尊公舉兵今偕行則不可留此則及禍奈何李氏曰君第速行我一婦人易以濳匿當自為計紹遂行李氏歸鄠縣别墅散家資聚徒衆淵從弟神通在長安亡入鄠縣山中與長安大俠史萬寶等起兵以應淵西域商胡何潘仁入司竹園為盜有衆數萬劫前尚書右丞李綱為長史李氏使其奴馬三寶説潘仁與之就神通合勢攻鄠縣下之神通衆踰一萬自稱關中道行軍揔管以前藥城長令狐德棻為記室德棻熙之子也李氏又使馬三寶説羣盜李仲文向善志丘師利等皆帥衆從之仲文密之從父師利和之子也西京留守屢遣兵討潘仁等皆為所敗李氏徇盩厔武功始平皆下之衆至七萬左親衛段綸文振之子也娶淵女亦聚徒於藍田得萬餘人及淵濟河神通李氏綸各遣使迎淵淵以神通為光祿大夫子道彥為朝請大夫綸為金紫光祿大夫使柴紹將數百騎並南山迎李氏何潘仁李仲文向善志及關中羣盜皆請降於淵淵一一以書慰勞授官使各居其所受敦煌公世民節度刑部尚書領京兆內史衛文升年老聞淵兵向長安憂懼成疾不復預事獨左翊衛將軍隂世師京兆郡丞骨儀奉代王侑乘城拒守己巳淵如蒲津庚午自臨晉濟渭至永豐倉勞軍開倉賑飢民辛未還長春宫壬申進屯馮翊世民所至吏民及羣盜歸之如流世民收其豪俊以備僚屬營于涇陽勝兵九萬李氏將精兵萬餘會世民於渭北與柴紹各置幕府號娘子軍先是平涼奴賊數萬圍扶風太守竇璡數月不下賊中食盡丘師利遣其弟行恭帥五百人負米麥持牛酒詣奴賊營奴帥長揖行恭手斬之謂其衆曰汝輩皆良人何故事奴為主使天下謂之奴賊衆皆俯伏曰願改事公行恭即帥其衆與師利共謁世民於渭北世民以為光祿大夫璡琮之從子也隰城尉房玄齡謁世民於軍門世民一見如舊識署記室參軍引為謀主玄齡亦自以遇知己罄竭心力知無不為淵命劉弘基殷開山分兵西略扶風有衆六萬南度渭水屯長安故城城中出戰弘基逆擊破之世民引兵趣司竹李仲文何潘仁向善志皆帥衆從之頓于阿城勝兵十三萬軍令嚴整秋毫不犯乙亥世民自盩厔遣使白淵請期日赴長安淵曰屈突東行不能復西不足虞矣乃命建成選倉上精兵自新豐趣長樂宫世民帥新附諸軍北屯長安故城至並聽教延安上郡雕隂皆請降於淵丙子淵引軍西行所過離宫園苑皆罷之出宫女還其親屬冬十月辛巳淵至長安營於春明門之西北諸軍皆集合二十餘萬淵命各依壘壁毋得入村落侵暴屢遣使至城下諭衛文升等以欲尊隋之意不報辛卯命諸軍進圍城甲午淵遷館於安興坊甲辰李淵命諸軍攻城約毋得犯七廟及代王宗室違者夷三族孫華中流矢卒十一月丙辰軍頭雷永吉先登遂克長安代王在東宫左右奔散唯侍讀姚思亷侍側軍士將登殿思亷厲聲訶之曰唐公舉義兵匡帝室卿等毋得無禮衆皆愕然布立庭下淵迎王於東宫遷居大興殿後聽思亷扶王至順陽閣下泣拜而去思亷察之子也淵還舍於長樂宫與民約法十二條悉除隋苛禁淵之起兵也留守官發其墳墓毁其五廟至是衛文升已卒戊午執隂世師骨儀等數以貪婪苛酷且拒義師俱斬之死者十餘人餘無所問馬邑郡丞三原李靖素與淵有隙淵入城收靖將斬之靖大呼曰公興義兵欲平暴亂乃以私怨殺壯士乎世民為之固請乃捨之世民因召置幕府靖少負志氣有文武才略其舅韓擒虎每撫之曰可與言將帥之略者獨此子耳壬戍李淵備法駕迎代王即皇帝位於天興殿時年十三大赦改元遙尊煬帝為太上皇甲子淵自長樂宫入長安以淵為假黃鉞使持節大都督內外諸軍事尚書令大丞相進封唐王以武德殿為丞相府改教稱令日於虔化門視事乙丑榆林靈武平涼安定諸郡皆遣使請命丙寅詔軍國機務事無大小文武設官位無貴賤憲章賞罰咸歸相府唯郊祀天地四時禘祫奏聞置丞相府官屬以裴寂為長史劉文靜為司馬何潘仁使李綱入見淵留之以為丞相府司録專掌選事又以前考功郎中竇威為司録參軍使定禮儀威熾之子也淵傾府庫以賜勳人國用不足右光祿大夫劉世龍獻䇿以為今義師數萬並在京師樵蘇貴而布帛賤請伐六街及苑中樹為樵以易布帛可得十數萬匹淵從之己巳以李建成為唐世子李世民為京兆尹秦公李元吉為齊公十二月癸未追諡唐王淵大父襄公為景王考仁公為元王夫人竇氏為穆妃世民破薛仁杲於扶風平隴右事見唐乙未平涼留守張隆丁酉河池太守蕭瑀及扶風漢陽郡相繼來降以竇璡為工部尚書燕國公蕭瑀為禮部尚書宋國公李孝恭擊破朱粲諸將請盡殺其俘孝恭曰不可自是以往誰復肯降矣皆釋之於是自金川出巴蜀檄書所至降附者三十餘州屈突通與劉文靜相持月餘通復使桑顯和夜襲其營文靜與左光祿大夫段志玄悉力苦戰顯和敗走盡俘其衆通勢益蹙或説通降通泣曰吾歷事兩主恩顧甚厚食人之祿而違其難吾不為也每自摩其頸曰要當為國家受一刀勞勉將士未嘗不流涕人亦以此懷之丞相淵遣其家僮召之通立斬之及聞長安不守家屬皆為淵所虜乃留顯和鎮潼關引兵東出將趣洛陽通適去顯和即以城降文靜文靜遣竇珍等將輕騎與顯和追之及於稠桑通結陳自固竇琮遣通子壽往諭之通罵曰此賊何來昔與汝為父子今與汝為仇讎命左右射之顯和謂其衆曰今京城已陷汝輩皆關中人去欲何之衆皆釋仗而降通知不免下馬東南再拜號哭曰臣力屈至此非敢負國天地神祇實知之軍人執通送長安淵以為兵部尚書賜爵蔣公兼秦公元帥府長史淵遣通至河東城下招諭堯君素君素見通歔欷不自勝通亦泣下霑襟因謂君素曰吾軍已敗義旗所指莫不響應事勢如此卿當早降君素曰公為國大臣主上委公以關中代王付公以社稷奈何負國生降乃更為人作説客邪公所乘馬即代王所賜也公何面目乘之哉通曰吁君素我力屈而來君素曰方今力猶未屈何用多言通慙而退劉文靜等引兵東略地取弘農郡遂定新安以西甲辰李淵遣雲陽令詹俊武功縣正李仲衮徇巴蜀下之唐高祖武德元年春正月丁未朔隋恭帝詔唐王劒履上殿贊拜不名唐王既克長安以書諭諸郡縣於是東自商洛南盡巴蜀郡縣長史及盜賊渠帥氐羌酋長爭遣子弟入見請降有司復書日以百數二月己卯唐王遣太常卿鄭元璹將兵出商洛徇南陽左領軍府司馬安陸馬元規徇安陸及荆襄三月己酉以齊公元吉為鎮北將軍太原道行軍元帥都督十五郡諸軍事聽以便宜從事乙卯徒秦公世民為趙公戊辰隋恭帝詔以十郡益唐國仍以唐王為相國揔百揆唐國置丞相以下官又加九錫王謂僚屬曰此諂諛者所為耳孤秉大政而自加寵錫可乎必若循魏晉之迹彼皆繁文偽飾欺天罔人考其實不及五霸而求名欲過三王此孤常所非笑竊亦恥之或曰歷代所行亦何可廢王曰堯舜湯武名因其時取與異道皆推其至誠以應天順人未聞夏商之末必效唐虞之禪也若使少帝有知必不肯為若其無知孤自尊而飾讓平生素心所不為也但改丞相府為相國府其九錫殊禮皆歸有司夏四月焬帝凶問至長安唐王哭之慟曰吾北面事人失道不能救敢忘哀乎五月戊午隋恭帝禪位于唐遜居代邸甲子唐王即皇帝位于太極殿遣刑部尚書蕭造告天於南郊大赦改元罷郡置州以太守為刺史推五運為土德色尚黃六月甲戌朔以趙公世民為尚書令黃臺公瑗為刑部侍郎相國府長史裴寂為右僕射知政事司馬劉文靜為納言司録竇威為內史令李綱為禮部尚書參掌選司掾殷開山為吏部侍郎屬趙慈景為兵部侍郎韋義節為禮部侍郎主簿陳叔達博陵崔民幹並為黃門侍郎唐儉為內史侍郎録事參軍裴晞為尚書右丞以隋民部尚書蕭瑀為內史令禮部尚書竇璡為户部尚書蔣公屈突通為兵部尚書長安令獨孤懷恩為工部尚書瑗上之從子懷恩舅子也上待裴寂甚厚羣臣無與為比賞賜服玩不可勝紀命尚書奉御日以御膳賜寂視朝必引與同坐入閣則延之卧內言無不從稱為裴監而不名委蕭瑀以庶政事無大小莫不關掌瑀亦孜孜盡力繩違舉過人皆憚之毁之者衆終不自理上嘗有敕而內史不時宣行上責其遲瑀對曰大業之世內史宣敕或前後相違有司不知所從其易在前其難在後臣在省日久備見其事今王業經始事繫安危逺方有疑恐失機會故臣每受一敕必勘審使與前敕不違始敢宣行稽緩之愆實由於此上曰卿用心如是吾復何憂己卯祔四親廟主追尊皇高祖瀛州府君曰宣簡公皇曽祖司空曰懿王皇祖景王曰景皇帝廟號太祖祖妣曰景烈皇后皇考元王曰元皇帝廟號世祖妣獨孤氏曰元貞皇后追諡妃竇氏曰穆皇后每嵗祀昊天上帝皇地祇神州地祇以景帝配感生帝明堂以元帝配庚辰立世子建成為皇太子趙公世民為秦王齊公元吉為齊王宗室黃瓜公白駒為平原王蜀公孝基為永安王柱國道玄為淮陽王長平公叔良為長平王鄭公神通為永康王安吉公神符為襄邑王柱國德良為新興王上柱國博乂為隴西王上柱國奉慈為勃海王孝基叔良神符德良帝之從父弟博乂奉慈弟子道玄從父兄子也乙酉奉隋帝為酅國公詔曰近世以來時運遷革前代親族莫不誅夷興亡之效豈伊人力其隋蔡王智積等子孫並付所司量才選用丁酉萬年縣法曹武城孫伏伽上表以為隋以惡聞其過亡天下陛下龍飛晉陽逺近響應未期年而登帝位徒知得之之易不知隋失之之不難也臣謂宜易其覆轍務盡下情凡人君言動不可不慎竊見陛下今日即位而明日有獻鷂雛者此乃少年之事豈聖主所須哉又百戲散樂亡國淫聲近太常於民間借婦女裙襦五百餘襲以充妓衣擬五月五日玄武門遊戲此亦非所以為子孫法也凡如此類悉宜廢罷善惡之習朝夕漸染易以移人皇太子諸王參僚左右宜謹擇其人其有門風不能雍睦為人素無行義專好奢靡以聲色遊獵為事者皆不可使之親近也自古及今骨肉乖離以至敗國亡家未有不因左右離間而然也願陛下慎之上省表大悅下詔褒稱擢為治書侍御史賜帛三百匹仍頒示逺近秋九月虞州刺史韋義節攻隋河東通守堯君素久不下軍數不利壬子以工部尚書獨孤懷恩代之十一月癸丑獨孤懷恩攻堯君素於蒲阪行軍揔管趙慈景尚帝女桂陽公主為君素所擒梟首城外以示無降意冬十二月隋將堯君素守河東上遣吕紹宗韋義節獨孤懷恩相繼攻之俱不下時外圍嚴急君素為木鵝置表於頸具論事勢浮之於河河陽守者得之達於東都皇泰主見而歎息拜君素金紫光祿大夫龎玉皇甫無逸自東都來降上悉遣詣城下為陳利害君素不從又賜金劵許以不死其妻又至城下謂之曰隋室已亡君何自苦君素曰天下名義非婦人所知引弓射之應弦而倒君素亦自知不濟然志在守死每言及國家未嘗不歔欷謂將士曰吾昔事主上於藩邸大義不得不死必若隋祚永終天命有屬自當斷頭以付諸君聽君等持取富貴今城池甚固倉儲豐備大事猶未可知不可橫生心也君素性嚴明善御衆下莫敢叛久之倉粟盡人相食又獲外人微知江都傾覆丙子君素左右薛宗等殺君素以降傳首京師二年秋八月丁酉酅公薨諡曰隋恭帝無後以族子行基嗣通鑑紀事本末卷第二十六
