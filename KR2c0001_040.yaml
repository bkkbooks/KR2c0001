  text: 通鑑紀事本末卷第四十
  hash: sha256:ad9f2a6202bbecc8f9123f5033325e635789bafac4b159e60e68c557c6c07bfa
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0001_SBCK_040-1a}
body:
  text: 馬氏據湖南唐僖宗光啓二年初忠武決勝指揮使孫儒與龍驤指揮使朗山劉建鋒戍蔡州拒黄巢扶溝馬殷隷軍中以材勇聞及秦宗權叛儒等皆屬焉三年秦宗權與楊行宻争揚州以孫儒為副張佶劉建鋒馬殷皆從昭宗景福元年夏五月楊行宻屢敗孫儒兵破其廣徳營張訓屯安吉㫁其糧道儒食盡士卒大疫遣其將劉建鋒馬殷分兵掠諸縣行宻縦兵擊儒斬之儒衆多降於行宻劉建鋒馬殷收餘衆七千南走洪州推建鋒爲帥殷爲先鋒指揮使以行軍司馬張佶爲謀主比至江西衆十餘萬乾寧元年五月劉建鋒馬殷引兵至澧陵武安節度使鄧處訥遣邵州指揮使蔣勛鄧繼崇將步騎三千守龍回闗殷先至闗下遣使詣勛勛等以牛酒犒師殷使説勛曰劉龍驤智勇兼人術家言當興翼軫間今將十萬衆精鋭無敵而君以鄉兵數千拒之難矣不如先下之取富貴還鄉里不亦善乎勛等然之謂衆曰東軍許吾屬還士卒皆懽呼棄旗幟鎧仗遁去建鋒令前鋒衣其甲張其旗趨潭州潭人以爲邵州兵還不爲備建鋒徑入府處訥方宴擒斬之戊辰建鋒入潭州自稱留後二年以劉建鋒為武安節度使建鋒以馬殷為内外馬步軍都指揮使蔣勛求為邵州刺史劉建鋒不許勛據邵州使其將屯定勝鎮以扼潭人三年春正月丁巳劉建鋒遣都指揮使馬殷將兵討蔣勛攻定勝寨破之夏四月武安節度使劉建鋒既得志嗜酒不親政事長直兵陳贍妻美建鋒私之贍袖鐵檛擊殺建鋒諸將殺贍迎行軍司馬張佶為留後佶將入府馬忽踶齧傷左髀時馬殷攻邵州未下佶謝諸將曰馬公勇而有謀寛厚樂善吾所不及真乃主也乃以牒召之殷猶豫未行聽直軍將汝南姚彥章説殷曰公與劉龍驤張司馬一體人也今龍驤遇禍司馬傷髀天命人望舍公尚誰屬哉殷乃使親從都副指揮使李瓊留攻邵州徑詣長沙五月馬殷至長沙張佶肩輿入府坐受殷拜謁已乃命殷升聽事以留後讓之即趨下帥將吏拜賀後為行軍司馬代殷將兵攻邵州秋九月以湖南軍留後馬殷判湖南軍府事殷以高郁為謀主郁揚州人也殷畏楊行宻成汭之彊議以金帛結之高郁曰成汭不足畏也行宻公之讐雖以萬金賂之安肯為吾援乎不若上奉天子下撫士民訓卒厲兵以修霸業則誰與為敵矣殷従之光化元年春三月以潭州刺史判湖南軍府事馬殷知武安留後時湖南管内七州賊帥楊師逺據衡州唐世旻據永州蔡結據道州陳彥謙據郴州魯景仁據連州殷所得惟潭邵二州而已夏五月湖南將姚彥章言於馬殷請取衡永道連郴五州仍薦李瓊為將殷以瓊及秦彥暉為嶺北七州游奕使張圖英李唐副之將兵攻衡州斬楊師逺引兵趣永州圍之月餘唐世旻走死殷以李唐為永州刺史二年秋七月馬殷遣其將李唐攻道州蔡結聚羣蠻伏兵於隘以擊之大破唐兵唐曰蠻所恃者山林耳若戰平地安能敗我乃命因風燔林光燭天地羣蠻驚遁遂拔道州擒結斬之冬十一月馬殷遣其將李瓊攻郴州執陳彥謙斬之進攻連州魯景仁自殺湖南皆平三年冬十月静江節度使劉士政聞馬殷悉平嶺北大懼遣副使陳可璠屯全義嶺以備之殷遣使修好於士政可璠拒之殷遣其將秦彥暉李瓊等將兵七千擊士政湖南軍至全義士政又遣指揮使王建武屯秦城可璠掠縣民耕牛以犒軍縣民怨之請為湖南鄉導曰此西南有小徑距秦城纔五十里僅通單騎彥暉遣李瓊將騎六十步兵三百襲秦城中宵踰垣而入擒王建武比明復還糸斥之以練造可璠壁下示之可璠猶未之信斬其首投壁中桂人震恐瓊因勒兵撃之擒可璠降其將士二千皆殺之引兵趣桂州自秦城以南二十餘壁皆望風犇潰遂圍桂州數日士政出降桂宜巖栁象五州皆降於湖南馬殷以李瓊為桂州刺史未幾表為静江節度使天復三年夏四月楊行宻遣使詣馬殷言朱全忠跋扈請殷絶之約為兄弟湖南大將許徳勲曰全忠雖無道然挾天子以令諸侯明公素奉王室不可輕絶也殷従之天祐元年初馬殷弟賨性沈勇事孫儒為百勝指揮使儒死事楊行宻屢有功遷黑雲指揮使行宻嘗從容問其兄弟乃知為殷之弟大驚曰吾常怪汝器度瓌偉果非常人當遣汝歸賨泣辭曰賨淮西殘兵大王不殺而寵任之湖南地近常得兄聲問賨事大王久不願歸也行宻固遣之是嵗賨歸長沙行宻親餞之郊賨至長沙殷表賨為節度副使它日殷議入貢天子賨曰楊王地廣兵彊與吾鄰接不若與之結好大可以為緩急之援小可通商旅之利殷作色曰楊王不事天子一旦朝廷致討罪將及吾汝置此論勿為吾禍昭宣帝天祐三年吉州刺史彭玕遣使請降於湖南玕本赤石洞蠻酋鎮南節度使鍾傳用為吉州刺史後梁太祖開平元年夏四月辛未以武安節度使馬殷為楚王五月弘農王以鄂岳觀察使劉存為西南面都招討使岳州刺史陳知新為岳州團練使廬州觀察使劉威為應援使别將許玄應為監軍將水軍三萬以擊楚楚王馬殷甚懼静江軍使楊定真賀曰我軍勝矣殷問其故定真曰夫戰懼則勝驕則敗今淮南兵直趨吾城是驕而輕敵也而王有懼色吾是以知其必勝也殷命在城都指揮使秦彥暉將水軍三萬浮江而下水軍副指揮使黄璠帥戰艦三百屯瀏陽口六月存等遇大雨引兵還至越堤北彥暉追之存數戰不利乃遺殷書詐降彦暉使謂殷曰此必詐也勿受存與彥暉夾水而陳存遥呼曰殺降不祥公獨不為子孫計耶彥暉曰賊入吾境而不擊奚顧子孫鼓譟而進存等走黄璠自瀏陽引兵絶江與彥暉合擊大破之執存及知新禆將死者百餘人士卒死者以萬數獲戰艦八百艘威以餘衆遁歸彥暉遂拔岳州殷釋存知新之縛慰諭之二人皆罵曰丈夫以死報主肯事賊乎遂斬之許玄應弘農王之腹心也常預政事張顥徐温因其敗收斬之楚王殷遣兵㑹吉州刺史彭玕攻洪州不克武貞節度使雷彥恭㑹楚兵攻江陵荆南節度使高季昌引兵屯公安絶其糧道彥恭敗楚兵亦走秋七月雷彥恭攻岳州不克八月辛亥楚王殷兼武昌節度使充本道招討制置使九月雷彥恭攻涔陽公安高季昌擊敗之彦恭貪殘類其父專以焚掠為事荆湖間常被其患又附於淮南丙申詔削彦恭官爵命季昌與楚王殷討之冬十月高季昌遣其將倪可福㑹楚將秦彦暉攻朗州雷彦恭遣使乞降於淮南且告急弘農王遣將冷業將水軍屯平江李饒將步騎屯瀏陽以救之楚王殷遣岳州刺史許徳勲將兵拒之冷業進屯朗口徳勲使善遊者五十人以木枝葉覆其首持長刀浮江而下夜犯其營且舉火業軍中驚擾徳勲以大軍進擊大破之追至鹿角鎮擒業又破瀏陽寨擒李饒掠上高唐年而歸斬業饒於長沙市二年夏五月静江節度使同平章事李瓊卒楚王殷以其弟永州刺史存知桂州事乙亥楚兵冦鄂州淮南所署知州秦裴擊破之雷彦恭引沆江環朗州以自守秦彥暉頓兵月餘不戰彦恭守備稍懈彦暉使禆將曹徳昌帥壯士夜入自水竇内外舉火相應城中驚亂彦暉鼓譟壞門而入彦恭輕舟犇廣陵彦暉虜其弟彦雄送于大梁淮南以彦恭為節度副使先是澧州刺史向瓌與彦恭相表裏至是亦降於楚楚始得澧朗二州湖南判官高郁請聽民自采茶賣於北客收其征以贍軍楚王殷從之秋七月殷奏於抃荆襄唐郢復州置回圖務運茶於河南北賣之以易繒纊戰馬而歸仍嵗貢茶二十五萬斤詔許之湖南由是富贍九月荆南節度使高季昌遣兵屯漢口絶楚朝貢之路楚王殷遣其將許徳勲將水軍擊之至沙頭季昌懼而請和殷又遣步軍都指揮使吕師周將兵擊嶺南與清海節度使劉隠十餘戰取昭賀梧䝉龔富六州殷土宇既廣乃養士息民湖南遂安三年夏六月撫州刺史危全諷自稱鎮南節度使帥撫信袁吉之兵號十萬攻洪州淮南守兵纔千人將吏皆懼節度使劉威宻遣使告急於廣陵日召寮佐宴飲全諷聞之屯象牙潭不敢進袁州刺史彭彦章圍高安以助全諷徐溫以周本為西南面行營招討應援使將兵七千救高安本曰楚人為全諷聲援耳非欲取高安也吾敗全諷援兵必還乃疾趣象牙潭過洪州劉威欲犒軍本不肯留或曰全諷兵彊君宜觀形勢然後進本曰賊衆十倍於我我軍聞之必懼不若乘其鋭而用之秋七月危全諷在象牙潭營柵臨溪亘數十里庚辰周本隔溪布陳先使羸兵嘗敵全諷兵涉溪追之本乘其半濟縦兵擊之全諷兵大潰自相蹂藉溺水死者甚衆本分兵㫁其歸路擒全諷及將士五千人乘勝克袁州執刺史彭章進攻吉州歙州刺史陶雅使其子敬昭及都指揮使徐章將兵襲饒信信州刺史危仔倡請降饒州刺史唐寶棄城走行營都指揮使米志誠都尉吕師造等敗苑玫於上高吉州刺史彭玕帥衆數千人犇楚楚王殷表玕為彬州刺史為子希範娶其女四年夏六月楚王殷求為天策上將詔加天策上將軍殷始開天策府以弟賨為左相存為右相殷遣將侵荆南軍于油口高季昌擊破之斬首五千級逐北至白田而還冬十二月辰州蠻酋宋鄴破溆州蠻酋潘金盛恃其所居深險數擾楚邊至是鄴冦湘鄉金盛冦武岡楚王殷遣昭州刺史吕師周將衡山兵五千討之乾化元年春正月吕師周引兵攀藤緣崖入飛山洞襲潘金盛擒送武岡斬之移兵擊宋鄴冬十二月乙夘以朗州留後馬賨為永順節度使同平章事二年春二月辰州蠻酋宋鄴昌師益皆帥衆降於楚楚王殷以鄴為辰州刺史師益為溆州刺史夏四月癸丑以楚王殷為武安武昌静江寧逺節度使洪鄂四面行營都統冬十一月吴淮南節度副使陳璋等將水軍襲楚岳州執刺史苑玫楚王殷遣水軍都指揮使楊定真救岳州璋等進攻荆南高季昌遣其將倪可福拒之吴恐楚人救荆南遣撫州刺史劉信帥江撫袁吉信五州兵屯吉州為璋聲援均王乾化三年春正月呉陳璋攻荆南不克而還荆南兵與楚兵㑹於江口以邀之璋知之舟二百艘駢為一列夜過二鎮兵遽出追之不能及秋八月楚寧逺節度使姚彦章將水軍侵吴鄂州吴以池州團練使吕師造為水陸行營應援使未至楚兵引去四年夏四月吴袁州刺史劉崇景叛附于楚崇景威之子也楚將許貞將萬人援之吴都指揮使柴再用米志誠帥諸將討之楚岳州刺史許徳勲將水軍巡邊夜分南風暴起都指揮使王環乗風趣黄州以繩梯登城徑趣州署執吴刺史馬鄴大掠而還徳勲曰鄂州將邀我宜備之環曰我軍入黄州鄂人不知奄過其城彼自救不暇安敢邀我乃展旗鳴鼓而行鄂人不敢逼五月吴柴再用等與劉崇景許貞戰於萬勝岡大破之崇景貞棄袁州遁去貞明三年春三月楚王殷遣其弟存攻吴上高俘獲而還龍徳元年辰溆州蠻侵楚楚寧逺節度副使姚彦章討平之後唐莊宗同光元年楚王殷遣其子牙内馬步都指揮使希範入見納洪鄂行營都統印上本道將吏籍二年夏四月乙亥加楚王殷兼尚書令三年初楚王殷既得湖南不征商旅由是四方商旅輻湊湖南地多鈆鐵殷用軍都判官高郁策鑄鈆鐵為錢商旅出境無所用之皆易它貨而去故能以境内所餘之物易天下百貨國以富饒湖南民不事桑蠶郁命民輸税者皆以帛代錢未幾民間機杼大盛明宗天成元年秋九月加楚王殷守尚書令二年夏五月楚王殷遣中使史光憲入貢過荆南高季興執史光憲而奪其貢物據荆南事見髙氏六月丙申封楚王殷為楚國王三年春二月楚王殷遣六軍使袁詮副使王環等將水軍擊荆南高季興據荆南事見髙氏夏四月吴右雄武軍使苗璘静江統軍王彦章將水軍萬人攻楚岳州至君山楚王殷遣右丞相許徳勲將戰艦千艘禦之徳勲曰吴人掩吾不備見大軍必懼而走乃潛軍角子湖使王環夜帥戰艦二百屯楊林浦絶吴歸路遲明吴人進軍荆江口將㑹荆南兵攻岳州丁亥至道人磯徳勲命戰棹都虞候詹信以輕舟三百出吴軍後徳勲以大軍當其前夾擊之吴軍大敗虜璘及彦章以歸吴遣使求和於楚請苗璘王彦章楚王殷歸之使許徳勲餞之徳勲謂二人曰楚國雖小舊臣宿將猶在願吴朝勿以措懐必俟衆駒争皁棧然後可圖也時殷多内寵嫡庶無别諸子驕奢故徳勲語及之六月帝詔楚王殷討高季興四年春三月楚王殷命其子武安節度副使判長沙府希聲知政事揔録内外諸軍事自是國政先厯希聲乃聞於殷初楚王殷用都軍判官高郁為謀主國賴以富彊鄰國皆疾之莊宗入洛殷遣其子希範入貢莊宗愛其警敏曰比聞馬氏當為高郁所奪今有子如此郁安能得之高季興亦屢以流言間郁於殷殷不聽乃遣使遺節度副使知政事希聲書盛稱郁功名願為兄弟使者言於希聲曰高公常云馬氏政事皆出高郁此子孫之憂也希聲信之行軍司馬楊昭遂希聲之妻族也謀代郁任日譖之於希聲希聲屢言於殷稱郁奢僭且外交鄰藩請誅之殷曰成吾功業皆郁力也汝勿為此言希聲固請罷其兵柄乃左遷郁行軍司馬郁謂所親曰亟營西山吾將歸老猘子漸大能咋人矣希聲聞之益怒明日矯以殷命殺郁於府舍牓諭中外誣郁謀叛並誅其族黨至暮殷尚未知是日大霧殷謂左右曰吾昔從孫儒度淮毎殺不辜多致茲異馬步院豈有寃死者乎明日吏以郁死告殷拊膺大慟曰吾老耄政非已出使我勲舊横罹寃酷既而顧左右曰吾亦何可久處此乎長興元年冬十月楚王殷寢疾遣使詣闕請傳位於其子希聲朝廷疑殷已死辛亥以希聲為起復武安節度使兼侍中十一月己巳楚王殷卒遺命諸子兄弟相繼寘劒於祠堂曰違吾命者戮之諸將議遣兵守四境然後發喪兵部侍郎黄損曰吾喪君有君何備之有宜遣使詣鄰道告終稱嗣而已丙戌馬希聲襲位稱遺命去建國之制復藩鎮之舊十二月庚戌以武安節度使馬希聲為武安静江節度使加兼中書令二年冬十二月武安静江節度使馬希聲聞梁太祖嗜食鷄慕之既襲位日殺五十鷄為膳居喪無戚容庚申葬武穆王于衡陽將發引頓食雞􅌜數盤前吏部侍郎潘起譏之曰昔阮籍居喪食蒸豚何代無賢三年秋七月武安静江節度使馬希聲以湖南比年大旱命閉南嶽及境内諸神祠門竟不雨辛卯希聲卒六軍使袁詮潘約等迎鎮南節度使希範於朗州而立之八月馬希範至長沙辛酉襲位九月以鎮南節度使馬希範為武安節度使兼侍中四年春二月乙卯以馬希範為武安武平節度使兼中書令初馬希聲希範同日生希聲母曰袁徳妃希範母曰陳氏希範怨希聲先立不讓及嗣位不禮於袁徳妃希聲母弟希旺為親從都指揮使希範多譴責之袁徳妃請納希旺官為道士不許解其軍職使居竹屋草門不得預兄弟燕集徳妃卒希旺憂憤而卒潞王清泰元年春正月壬辰以武安武平節度使馬希範為楚王後晉高祖天福元年静江節度使同平章事馬希杲有善政監軍裴仁煦譖之於楚王希範言其收衆心希範疑之夏四月漢將孫徳威侵䝉桂二州希範命其弟武安節度副使希廣權知軍府事自將步騎五千如桂州希杲懼其母華夫人逆希範於全義嶺謝曰希杲為治無狀致冦戎入境煩殿下親涉險阻皆妾之罪也願削封邑灑掃掖廷以贖希杲罪希範曰吾久不見希杲聞其治行尤異故來省之無它也漢兵自䝉州引去徙希杲知朗州秋七月庚寅楚王希範自桂州北還二年冬十二月詔加馬希範江南諸道都統制置武平静江等軍事三年冬十月楚順賢夫人彭氏卒彭夫人貎陋而治家有法楚王希範憚之既卒希範始縦聲色為長夜之飲内外無别商人妻美希範殺其夫而奪之妻誓不辱自經死四年夏四月戊申加楚王希範天策上將軍賜印開府置官屬黔南巡内溪州刺史彭士愁引蔣錦州蠻萬餘人冦辰澧州九月辛未楚王希範命左静江指揮使劉勍決勝指揮使廖匡齊帥衡山兵五千討之冬十一月楚王希範始開天策府置䕶軍都尉領軍司馬等官以諸弟及將校為之又以幕僚拓跋恒李弘皋廖匡圖徐仲雅等十八人為學士劉勍等進攻溪州彭士愁兵敗棄州走保山寨石崖四絶勍為梯棧上圍之廖匡齊戰死楚王希範遣弔其母其母不哭謂使者曰廖氏三百口受王温飽之賜舉族效死未足以報況一子乎願王無以為念王以其母為賢厚恤其家五年春正月楚劉勍等因大風以火箭焚彭士愁寨而攻之士愁帥麾下逃入溪錦深山乙未遣其子師景帥諸酋長納溪錦奬三州印請降於楚二月劉勍引兵還長沙楚王希範徙溪州於便地表彭士愁為溪州刺史以劉勍為錦州刺史自是羣蠻服於楚希範自謂伏波之後以銅五千斤鑄柱高丈二尺入地六尺銘誓狀於上立之溪州七年冬十月楚王希範作天策府極棟宇之盛户牖欄檻皆飾以金玉塗壁用丹砂數十萬斤地衣春夏用角簟秋冬用木綿與子弟僚屬遊宴其間齊王天福八年楚地多産金銀茶利尤厚由是財貨豐殖而楚王希範奢欲無厭喜自誇大為長槍大槊節之以金可執而不可用募富民年少肥澤者八千人為銀鎗都宫室園囿服用之物務窮侈靡作九龍殿刻沈香為八龍飾以金寶長十餘丈抱柱相向希範居其中自為一龍其幞頭脚長丈餘以象龍角用度不足重為賦斂毎遣使者行田專以增頃畒為功民不勝租賦而逃王曰但令田在何憂無糓命營田使鄧懿文籍逃田募民耕藝出租民捨故從新僅能自存自西徂東各失其業又聽人入財拜官以財多少為官高卑之差富商大賈布在列位外官還者必責貢獻民有罪則富者輸財彊者為兵惟貧弱受刑又置函使人投匿名書相告訐至有滅族者是歲用孔目官周陟議令常税之外大縣貢米二千斛中千斛小七百斛無米者輸布帛天策學士拓跋恒上書曰殿下長深宫之中藉已成之業身不知稼穡之勞耳不聞鼔鼙之音馳騁遨遊雕墻玉食府庫盡矣而浮費益甚百姓困矣而厚斂不息今淮南為仇讐之國畨禺懐呑噬之志荆渚日圖窺伺溪洞待我姑息諺曰足寒傷心民怨傷國願罷輸米之令誅周陟以謝郡縣去不急之務減興作之役無令一旦禍敗為四方所笑王大怒它日恒請見辭以晝寢恒謂客將區弘練曰王逞欲而愎諌吾見其千口飄零無日矣王益怒遂終身不復見之開運二年秋七月楚王希範疑静江節度使兼侍中知朗州希杲得人心遣人伺之希杲懼稱疾求歸不許遣醫往視疾因毒殺之冬十二月楚湘隂處士戴偃為詩多譏刺楚王希範囚之天策副都軍使丁思瑾上書切諫希範削其官爵三年秋九月楚王希範知帝好奢靡以珍玩為獻求都元帥甲辰以希範為諸道兵馬都元帥後漢高祖天福十二年夏五月武安節度副使天策府都尉領鎮南節度使馬希廣楚文昭王希範之母弟也性謹順希範愛之使判内外諸司事壬辰夜希範卒將佐議所立都指揮使張少敵都押牙袁友恭以武平節度使知永州事希萼於希範諸弟為最長請立之長直都指揮使劉彦瑫天策府學士李弘臯鄧懿文小門使楊滌皆欲立希廣張少敵曰永州齒長而性剛必不為都尉之下明矣必立都尉當思長策以制永州使帖然不動則可不然社稷危矣彦瑫等不從天策府學士拓跋恒曰三十五郎雖判軍府之政然三十郎居長請遣使以讓之不然必起争端彦瑫等皆曰今日軍政在手天與不取使它人得之異日吾輩安所自容乎希廣懦弱不能自決乙未彦瑫等稱希範遺命共立之張少敵退而歎曰禍其始此乎與拓跋恒皆稱疾不出秋七月甲午以馬希廣為天策上將軍武安節度使江南諸道都統兼中書令封楚王冬十月楚王希廣庶弟天策左司馬希崇性狡險隂遺兄希萼書言劉彦瑫等違先王之命廢長立少以激怒之希萼自永州來犇喪乙巳至砆石彦瑫白希廣遣侍從都指揮使周廷誨等將水軍逆之命永州將士皆釋甲而入館希萼於碧湘宫成服於其次不聽入與希廣相見希萼求還朗州周廷誨勸希廣殺之希廣曰吾何忍殺兄寧分潭朗而治之乃厚贈希萼遣還朗州希崇常為希萼詗希廣語言動作悉以告之約為内應乾祐元年秋八月武平節度使馬希萼請與楚王希廣各修職貢求朝廷别加官爵希廣用天策府内都狎牙歐弘練進奏官張仲荀謀厚賂執政使拒其請九月壬子賜希萼及楚王希廣詔書諭以兄弟宜相輯睦凢希萼所貢當附希廣以聞希萼不従隠帝乾祐二年秋八月馬希萼悉調朗州丁壯為鄉兵造號静江軍作戰艦七百艘將攻潭州其妻苑氏諌曰兄弟相攻勝負為人所笑不聽引兵趣長沙馬希廣聞之曰朗州吾兄也不可與争當以國讓之而已劉彦瑫李弘臯等固争以為不可乃以岳州刺史王贇為都部署戰棹指揮使以彦瑫監其軍己丑大破希萼於僕射洲獲其戰艦三百艘贇追希萼將及之希廣遣使召之曰勿傷吾兄贇引兵還贇環之子也希萼自赤沙湖乘輕舟遁歸苑氏泣曰禍將至矣余不忍見也赴井而死冬十月壬午加楚王希廣太尉楚静江節度使馬希瞻以兄希萼希廣交争屢遣使諌止不從知終覆族疽發于背丁亥卒三年夏六月馬希萼既敗歸乃以書誘辰溆州及梅山蠻欲與共擊湖南蠻素聞長沙帑藏之富大喜争出兵赴之遂攻益陽楚王希廣遣指揮使陳璠拒之戰于淹溪璠敗死馬希萼又遣羣蠻攻迪田秋八月戊戌破之殺其鎮將張延嗣楚王希廣遣指揮使黄處超救之處超敗死潭人震恐復遣牙内指揮使崔洪璉將兵七千屯玉潭馬希萼表請别置進奏務於京師九月辛巳詔以湖南已有進奏務不許亦賜楚王希廣詔勸以敦睦馬希萼以朝廷意佑楚王希廣怒遣使稱藩于唐乞師攻楚唐加希萼同平章事以鄂州今年租税賜之命楚州刺史何敬洙將兵助希萼冬十月丙午希廣遣使上表告急言荆南嶺南江南連謀欲分湖南之地乞發兵屯澧州以扼江南荆南援朗州之路楚王希廣以朗州與山蠻入冦諸將屢敗憂形於色劉彦瑫言於希廣曰朗州兵不滿萬馬不滿千都府精兵十萬何憂不勝願假臣兵萬餘人戰艦百五十艘徑入朗州縛取希萼以解大王之憂王悦以彦瑫為戰棹都指揮使朗州行營都統彦瑫入朗州境父老争以牛酒犒軍曰百姓不願従亂望都府之兵久矣彦瑫厚賞之戰艦過則運竹木以㫁其後是日馬希萼遣朗兵及蠻兵六千戰艦百艘逆戰於湄州彦瑫乗風縦火以焚其艦頃之風回反自焚彦瑫還走江路已㫁士卒戰及溺死者數千人希廣聞之涕泣不知所為希廣平日罕頒賜至是大出金帛以取悦於士卒或告天策左司馬希崇流言惑衆反狀已明請殺之希廣曰吾自害其弟何以見先王於地下馬軍指揮使張暉將兵自它道擊朗州至龍陽聞彦瑫敗退屯益陽希萼又遣指揮使朱進忠等將兵三千急攻益陽張暉紿其衆曰我以麾下出賊後汝輩留城中待我相與合勢擊之既出遂自竹頭市遁歸長沙朗兵知城中無主急擊之士卒九千餘人皆死十一月楚王希廣遣其僚屬孟駢説馬希萼曰公忘父兄之讐北面事唐何異袁譚求救於曹公邪希萼將斬之駢曰古者兵交使在其間駢若愛死安肯此來駢之言非私於潭人實為公謀也乃釋之使還報曰大義絶矣非地下不相見也朱進忠請希萼自將兵取潭州辛未希萼留其子光賛守朗州悉發境内之兵趣長沙自稱順天王先是馬希萼遣蠻兵圍玉潭朱進忠引兵㑹之崔洪璉兵敗犇還長沙希萼引兵繼攻岳州刺史王贇拒之五日不克希萼使人謂贇曰公非馬氏之臣乎不事我欲事異國乎為人臣而懐貳心豈不辱其先人贇曰亡父為先王將六破淮南兵今大王兄弟不相容贇常恐淮南坐收其弊一旦以遺體臣淮南誠辱先人耳大王茍能釋憾罷兵兄弟雍睦如初贇敢不盡死以事大王兄弟豈有二心乎希萼慙引兵去辛卯至湘隂焚掠而過至長沙軍于湘西步兵及蠻兵軍于嶽麓朱進忠自玉潭引兵㑹之馬希廣遣劉彦瑫召水軍指揮使許可瓊帥戰艦五百艘屯城北津屬于南津以馬希崇為監軍又遣馬軍指揮使李彦温將騎兵屯駞口扼湘隂路步軍指揮使韓禮將二千人屯楊栁橋扼柵路可瓊徳勲之子也初蠻酋彭師暠降於楚楚人惡其獷直楚王希廣獨怜之以為彊弩指揮使領辰州刺史師暠常欲為希廣死及朱進忠與蠻兵合七千餘人至長沙營於江西師暠登城望之言於希廣曰朗人驟勝而驕雜以蠻兵攻之易破也願假臣步卒三千自巴溪渡江出岳麓之後至水西令許可瓊以戰艦渡江腹背合擊必破之前軍敗則其大軍自不敢輕進矣希廣將從之時馬希萼已遣間使以厚利啖許可瓊許分湖南而治可瓊有貳心乃謂希廣曰師暠與梅山諸蠻皆族類安可信也可瓊世為楚將必不負大王希萼竟何能為希廣乃止希萼尋以戰艦四百餘艘泊江西希廣命諸將皆受可瓊節度日賜可瓊銀五百兩希廣屢造其營計事可瓊常閉壘不使士卒知朗軍進退希廣歎曰真將軍也吾何憂哉可瓊或夜乘單舸詐稱巡江與希萼㑹水西約為内應一旦彭師暠見可瓊瞋目叱之拂衣入見希廣曰可瓊將叛國人皆知之請速除之無貽後患希廣曰可瓊許侍中之子豈有是邪師暠退歎曰王仁而不斷敗亡可翹足俟也潭州大雪平地四尺潭朗兩軍久不得戰希廣信巫覡及僧語塑鬼於江上舉手以却朗兵又作大象于高樓手指水西怒目視之命衆僧日夜誦經希廣自衣僧服膜拜求福甲辰朗州步軍指揮使武陵何敬真等以蠻兵三千陳于楊栁橋敬真望韓禮營旌旗紛錯曰彼衆已懼擊之易破也朗人雷暉衣潭卒之服潛入禮寨手劒擊禮不中軍中驚擾敬真等乗其亂擊之禮軍大潰禮被創走至家而卒於是朗兵水陸急攻長沙步軍指揮使吴宏小門使楊滌相謂曰以死報國此其時矣各引兵出戰宏出清泰門戰不利滌出長樂戰自辰至午朗兵小却許可瓊劉彦瑫按兵不救滌士卒飢疲退就食彭師暠戰於城東北隅蠻兵自城東縦火城上人招許可瓊軍使救城可瓊舉全軍降希萼長沙遂陷朗兵及蠻兵大掠三日殺吏民焚廬舍自武穆王以來所營宫室皆為灰燼所積寶貨皆入蠻落李彦温望見城中火起自駝口引兵救之朗人已據城拒戰彦温攻清泰門不克與劉彦瑫各將千餘人奉文昭王及希廣諸子趣袁州遂奔唐張暉降於希萼左司馬希崇帥將吏詣希萼勸進吴宏戰血滿袖見希萼曰不幸為許可瓊所誤今日死不愧先王矣彭師暠投槊於地大呼請死希萼歎曰鐵石人也皆不殺乙巳希崇迎希萼入府視事閉城分捕希廣及掌書記李宏臯弟弘節都軍判官唐昭胤及邵懿文楊滌等皆獲之希萼謂希廣曰承父兄之業豈無長㓜乎希廣曰將吏見推朝廷見命耳希萼皆囚之丙午希萼命内外巡檢侍衛指揮使劉賔禁止焚掠丁未希萼自稱天策上將軍武安武平静江寧逺等軍節度使楚王以希崇為節度副使判軍府事湖南要職悉以朗人為之臠食李弘臯弘節唐昭胤楊滌斬鄧懿文於市戊申希萼謂將吏曰希廣懦夫為左右所制耳吾欲生之可乎諸將皆不對朱進忠嘗為希廣所笞對曰大王三年血戰始得長沙一國不容二主它日必悔之戊申賜希廣死希廣臨刑猶誦佛書彭師暠葬之於瀏陽門外楚王希萼以子光賛為武平留後以何敬真為朗州牙内都指揮使將兵戍之希萼召拓跋恒欲用之恒稱疾不起後周太祖廣順元年春二月甲辰楚王希萼遣掌書記劉光輔入貢于唐三月唐以楚王希萼為天策上將軍武安武平静江寧逺節度使兼中書令楚王以右僕射孫忌客省使姚鳳為冊禮使楚王希萼既得志多思舊怨殺戮無度晝夜縦酒荒淫悉以軍府事委馬希崇希崇復多私曲政刑紊亂府庫既盡於亂兵籍民財以賞賚士卒或封其門而取之士卒猶以不均怨望雖朗州舊將佐從希萼來者亦皆不悦有離心劉光輔之入貢于唐也唐主待之厚光輔宻言湖南民疲主驕可取也唐主乃以營屯都虞候邉鎬為信州刺史將兵屯袁州潛圖進取小門使謝彦顒本希萼家奴以首靣有寵於希萼至與妻妾雜坐恃恩專横常肩隨希崇或拊其背希崇銜之故事府宴小門使執鈇在門外希萼使彦顒預坐或居諸將之上諸將皆恥之希萼以府舍焚蕩命朗州静江指揮使王逵副使周行逢帥所部兵千餘人治之執役甚勞又無犒賜士卒皆怨竊言曰囚免死則役作之我輩従大王出萬死取湖南何罪而囚役之且大王終日酣歌豈知我輩之勞苦乎逵行逢聞之相謂曰衆怨深矣不早為計禍及吾曹壬申旦帥其衆各執長柯斧白梃逃歸朗州時希萼醉未醒左右不敢白癸酉始白之希萼遣湖南指揮使唐師翥將千餘人追之不及直抵朗州逵等乘其疲乏伏兵縦擊士卒死傷殆盡師翥脱歸逵等黜留後馬光賛更以希萼兄子光恵知州事光恵希振之子也尋奉光恵為節度使逵等與何敬眞及諸軍指揮使張倣參決軍府事希萼具以狀言於唐唐主遣使以厚賞招諭之逵等納其賞縦其使不荅其詔唐亦不敢詰也武平節度使馬光恵愚懦嗜酒不能服諸將王逵周行逢何敬眞謀以辰州刺史廬陵劉言驍勇得蠻夷心欲迎以為副使言知逵等難制曰不往將攻我乃單騎赴之既至衆廢光恵送于唐推言權武平留後表求旄節於唐唐人未許亦稱藩于周秋九月楚王希萼既克長沙不賞許可瓊疑可瓊怨望出為䝉州刺史遣馬步都指揮使徐威左右軍馬步使陳敬遷水軍都指揮使魯公綰牙内侍衛指揮使陸孟俊帥步兵立寨于城西北隅以備朗兵不存撫役者將卒皆怨怒謀作亂希崇知其謀戊寅希萼宴將吏徐威等不預希崇亦辭疾不至威等使人先驅踶齧馬十餘入府自帥其徒執斧斤白梃聲言縶馬奄至座上縦横擊人顛踣滿地希萼踰垣走威等執囚之執謝彦顒自頂及踵剉之立希崇為武安留後縦兵大掠幽希萼於衡山縣劉言聞希崇立遣兵趣潭州聲言討其篡奪之罪壬午軍于益陽之西希崇懼癸未發兵二千拒之又遣使如朗州求和請為鄰藩掌書記桂林李觀象説言曰希萼舊將佐猶在長沙此必不欲與公爲鄰不若先檄希崇取其首然後圖湖南可兼有也言從之希崇畏言即㫁都軍判官楊仲敏掌書記劉光輔牙内指揮使魏師進都押牙黄勍等十餘人首遣前辰陽縣令李翊齎送朗州至則腐敗言與王逵等皆以爲非仲敏等首怒責翊翊惶恐自殺希崇既襲位亦縦酒荒淫爲政不公語多矯妄國人不附初馬希萼入長沙彭師暠雖免死猶杖背黜爲民希崇以爲師暠必怨之使送希萼于衡山實欲師暠殺之師暠曰欲使我爲弑君之人乎奉事逾謹丙戌至衡山衡山指揮使廖偃匡圖之子也與其季父節度巡官匡凝謀曰吾家世受馬氏恩今希萼長而被黜必不免禍盍相與輔之於是帥莊戸及鄉人悉為兵與師暠共立希萼為衡山王以縣為行府㫁江為柵編竹為戰艦以師暠為武清節度使召募徒衆數日至萬餘人州縣多應之遣判官劉虚已求援于唐徐威等見希崇所為知必無成又畏朗州衡山之逼恐一朝喪敗俱及禍欲殺希崇以自解希崇微覺之大懼宻遣客將范守牧奉表請兵于唐唐主命邊鎬自袁州將兵萬人西趣長沙冬十月唐邊鎬引兵入醴陵癸巳楚王希崇遣使犒軍壬寅遣天策府學士拓跋恒奉牋詣鎬請降恒歎曰吾久不死乃為小兒送降狀癸卯希崇帥弟姪迎鎬望塵而拜鎬下馬稱詔勞之甲辰希崇等從鎬入城鎬舍於瀏陽門樓湖南將吏畢賀鎬皆厚賜之時湖南饑饉鎬大發馬氏倉粟賑之楚人大悦癸丑唐武昌節度使劉仁贍帥戰艦二百取岳州撫納降附人忘其亡仁贍金之子也唐百官共賀湖南平起居郎高逺曰我乗楚亂取之甚易觀諸將之才但恐守之甚難耳逺幽州人也司徒致仕李建勲曰禍其始於此乎唐主自即位以來未嘗親祠郊廟禮官以為請唐主曰俟天下一家然後告謝及一舉取楚謂諸國指麾可定魏岑侍宴言臣少遊元城樂其風土俟陛下定中原乞魏博節度使唐主許之岑趨下拜謝其主驕臣佞如此馬希萼望唐人立已為潭帥而潭人惡希萼共請邉鎬為帥唐主乃以鎬為武安節度使唐邊鎬趣馬希崇帥其族入朝馬氏聚族相泣欲重賂鎬奏乞留居長沙鎬微哂曰國家與公家世為仇敵殆六十年然未嘗敢有意窺公之國今公兄弟鬬鬩困窮自歸若復二三恐有不測之憂希崇無以應十一月辛酉與宗族及將佐千餘人號慟登舟送者皆哭響振川谷楚静江節度副使知桂州馬希隠武穆王殷之少子也楚王希廣希萼兄弟争國南漢主以内侍使吴懐恩為西北招討使將兵屯境上伺間宻謀進取希廣遣指揮使彭彦暉將兵屯龍峒以備之希萼自衡山遣使以彦暉為桂州都監在城外内巡檢使判軍府事希隠惡之潛遣人告䝉州刺史許可瓊可瓊方畏南漢之逼即棄䝉州引兵趣桂州與彦暉戰於城中彦暉敗犇衡山可瓊留屯桂州吴懐恩據䝉州進兵侵掠桂管大擾希隠可瓊不知所為但相與飲酒對泣南漢主遺希隠書言武穆王奄有全楚富彊安靖五十餘年正由三十五舅三十舅兄弟尋戈自相魚肉舉先人基業北面仇讐今聞唐兵已據長沙竊計桂林繼為所取當朝世為與國重以昏姻覩茲傾危忍不赴救己發大軍水陸俱進當令相公舅永擁節旄常居方靣希隠得書與僚佐議降之支使潘玄珪以為不可丙寅吴懐恩引兵奄至城下希隠可瓊帥其衆夜斬闗犇全州桂州遂潰懐恩因以兵畧定宜連梧嚴富昭栁象龔等州南漢始盡有嶺南之地辛未唐邊鎬遣先鋒指揮使李承戩將兵如衡山趣馬希萼入朝庚辰希萼與將佐士卒萬餘人自潭州東下十二月唐主以鎮南節度使兼中書令宋齊丘為太傅以馬希萼為江南西道觀察使守中書令鎮洪州仍賜爵楚王以馬希崇為永泰節度使兼侍中鎮舒州湖南將吏位高者拜刺史將軍卿監卑者以次拜官唐主嘉廖偃彭師暠之忠以偃為左殿直軍使萊州刺史師暠為殿直都虞候賜予甚厚湖南刺史皆入朝于唐永州刺史王贇獨後至唐主毒殺之南漢主遣内侍省丞潘崇徹將軍謝實將兵攻郴州唐邊鎬發兵救之崇徹敗唐兵於義章遂取郴州邊鎬請除全道二州刺史以備南漢丙辰唐主以廖偃為道州刺史以黒雲指揮使張巒知全州初䝉城鎮將咸師朗將部兵降唐唐主以其兵為奉節都従邊鎬平湖南唐悉收湖南金帛珍玩倉粟乃至舟艦亭舘花果之美者皆徙於金陵遣都官郎中楊繼勲等收湖南租賦以贍戍兵繼勲等務為苛刻湖南人失望行營糧料使王紹顔減士卒糧賜奉節指揮使孫朗曹進怒曰昔吾從咸公降唐唐待我豈如今日湖南將士之厚哉今有功不增禄賜又減之不如殺紹顔及鎬據湖南歸中原富貴可圖也二年春正月庚申夜孫朗曹進帥其徒作亂束藁潛燒府門火不然邊鎬覺之出兵格鬬且命鳴鼓角朗進等以為將曉斬闗犇朗州王逵問朗曰吾昔從武穆王與淮南戰屢捷淮南兵易與耳今欲以朗州之衆復取湖南可乎朗曰朗在金陵數年備見其政事朝無賢臣軍無良將忠佞無别賞罰不當如此得國存幸矣何暇兼人朗請為公前驅取湖南如拾芥耳逵悦厚遇之唐主既克湖南遣其將李建期屯益陽以圖朗州以知全州張巒兼桂州招討使以圖桂州久之未有功唐主謂馮延已孫晟曰楚人求息肩於我我未有以撫其瘡痍而虐用其力非所以副來蘇之望吾欲罷桂林之役斂益陽之戍以旌節授劉言何如晟以為宜然延已曰吾出偏將舉湖南逺近震驚一旦三分喪二人將輕我請委邊將察其形勢唐主乃遣統軍使侯訓將兵五千自吉州路趣全州與張巒合兵攻桂州南漢伏兵於山谷巒等始至城下罷乏伏兵四起城中出兵夾擊之唐兵大敗訓死巒收散卒數百犇歸全州唐武安節度使邊鎬昏懦無㫁在湖南政出多門不合衆心吉水人歐陽廣上書言鎬非將帥才必喪湖南宜别擇良帥益兵以救其敗不報唐主使鎬經畧朗州有自朗州來者多言劉言忠順鎬由是不爲備唐王召劉言入朝言不行謂王逵曰唐必伐我奈何逵曰武陵負江湖之險帶甲數萬安能拱手受制於人邊鎬撫馭無方士民不附可一戰擒也言猶豫未決周行逢曰機事貴速緩則彼為之備不可圖也言乃以逵行逢及牙將何敬真張倣蒲公益朱全琇宇文瓊彭萬和潘叔嗣張文表十人皆為指揮使部分發兵叔嗣文表皆朗州人也行逢能謀文表善戰叔嗣果敢三人多相須成功情𣢾甚昵諸將欲召溆州酋長符彥通為援行逢曰蠻貪而無義前年從馬希萼入潭州焚掠無遺吾兵以義舉往無不克烏用此物暴殄百姓哉乃止然亦畏彥通為後患以蠻酋土團都指揮使劉瑫為羣蠻所憚補西境鎮遏使以備之冬十月逵等將兵分道趣長沙以孫朗曹進為先鋒使邊鎬遣指揮使郭再誠等將兵屯益陽以拒之戊子逵等克沅江執都監劉承遇禆將李師徳帥衆五百降之壬辰逵等命軍士舉小舟自蔽直造益陽四面斧寨而入遂克之殺戍兵二千人邊鎬告急於唐甲午逵等克橋口及湘隂乙未至潭州邊鎬嬰城自守救兵未至城中兵少丙申夜鎬棄城走吏民俱潰醴陵門橋折死者萬餘人道州刺史廖偃為亂兵所殺丁酉旦王逵入城自稱武平節度副使權知軍府事以何敬真為行軍司馬遣敬真等追鎬不及斬首五百級蒲公益攻岳州唐岳州刺史宋徳權走劉言以公益權知岳州唐將守湖南諸州者聞長沙陷相繼遁去劉言盡復馬氏嶺北故地惟郴連入于南漢劉言遣使奉表來告稱湖南世事朝廷不幸為鄰冦所陷臣雖不奉詔輙紏合義兵削平舊國唐主削邊鎬官爵流饒州十二月王逵將兵及洞蠻五萬攻郴州南漢將潘崇徹救之遇于蠔石崇徹登高望湖南兵曰疲而不整可破也縦擊大破之伏尸八十里劉言表稱潭州殘破乞移使府治朗州且請貢獻賣茶悉如馬氏故事許之唐江西觀察使楚王馬希萼入朝唐主留之後數年卒於金陵謚曰恭孝三年春正月丙辰以武平留後劉言為武平節度使制置武安静江等軍事同平章事以王逵爲武安節度使何敬眞爲静江節度使周行逢爲武安行軍司馬初王逵既克潭州以指揮使何敬眞爲静江節度副使朱全琇爲武安節度副使張文表爲武平節度副使周行逢爲武安行軍司馬敬眞全琇各置牙兵與逵分㕔視事吏民莫知所從毎宴集諸將使酒紛拏如市無復上下之分惟行逢文表事逵盡禮逵親愛之敬眞與逵不恊辭歸朗州又不能事劉言與全琇謀作亂言素忌逵之彊疑逵使敬眞伺已將討之逵聞之甚懼行逢曰劉言素不與吾輩同心何敬眞朱全琇恥在公下公宜早圖之逵喜曰與公共除凶黨同治潭朗夫復何憂㑹南漢寇全道永州行逢請身至朗州説言遣敬真全琇南討俟至長沙以計取之如掌中物耳逵従之行逢至朗州言以敬真為南面行營招討使全琇為先鋒使將牙兵百餘人㑹潭州兵以禦南漢二人至長沙逵出郊迎相見甚歡宴飲連日多以美妓餌之敬真因淹留不進朗州指揮使李仲遷部兵三千人久戍潭州敬真使之先發趣嶺北都頭符㑹等因士卒思歸刼仲遷擅還朗州逵乘敬真醉使人詐為言使者責敬真以南冦深侵不亟捍禦而專務荒宴大帥命械公歸西府因收繫獄全琇逃去遣兵追捕之二月辛亥朔斬敬真以徇未幾獲全琇及其黨十餘人皆斬之王逵遣使以斬何敬真告劉言言不得己庚申斬符㑹等數人周行逢惡武平節度副使張倣言於王逵曰何敬真倣之親戚臨刑以後事屬倣公宜備之夏四月庚申逵召倣飲醉而殺之夏六月王逵以周行逢知潭州自將兵襲朗州克之殺指揮使鄭珓執武安節度使同平章事劉言幽于别館秋八月王逵遣使上表誣劉言謀以朗州降唐又欲攻潭州其衆不從廢而囚之臣已至朗州撫安軍府訖且請復移使府治潭州甲戌遣通事舍人翟光裔詣湖南宣撫從其所請逵還長沙以周行逢知朗州事又遣潘叔嗣殺劉言於朗州顯徳元年夏四月王逵表請復徙使府治朗州五月甲戌朔王逵自潭州遷于朗州以周行逢知潭州事以潘叔嗣為岳州團練使是嵗湖南大飢民食草木實武清節度使知潭州事周行逢開倉以賑之全活甚衆行逢起於微賤知民間疾苦勵精為治嚴而無私辟署僚屬皆取亷介之士約束簡要吏民便之其自奉甚薄或譏其太儉行逢曰馬氏父子窮奢極靡不恤百姓今子孫乞食於人又足效乎晉王滅燕後梁太祖開平元年春三月梁王以亳州刺史李思安為北路行軍都統將兵擊幽州盧龍節度使劉仁恭驕侈貪暴常慮幽州城不固築館於大安山曰此山四面懸絶可以少制衆其棟宇壯麗擬於帝者選美女實其中與方士鍊丹藥求不死悉歛境内錢瘞於山巔令民間用堇泥為錢又禁江南茶商無得入境自採山中草木為茶鬻之仁恭有愛妾羅氏其子守光通焉仁恭杖守光而斥之不以為子數李思安引兵入其境所過焚蕩無餘夏四月己酉直抵幽州城下仁恭猶在大安山城中無備幾至不守守光自外引兵入登城拒守又出兵與思安戰思安敗退守光遂自稱節度使令部將李小喜元行欽將兵攻大安山仁恭遣兵拒戰為小喜所敗虜仁恭以歸囚於别室仁恭將佐及左右凢守光素所惡者皆殺之甲子梁王即皇帝位劉守光既囚其父自稱盧龍留後遣使請命秋七月甲午以守光為盧龍節度使同平章事冬十一月義昌節度使劉守文聞其弟守光幽其父集將吏大哭曰不意吾家生此梟獍吾生不如死誓與諸君討之乃發兵擊守光互有勝負天雄節度使鄴王羅紹威謂其下曰守光以窘急歸國守文孤立無援滄州可不戰服也乃遺守文書諭以禍福守文亦恐梁乘虚襲其後戊子遣使請降以子延祐為質帝拊手曰紹威折簡勝十萬兵加守文中書令撫納之二年冬十一月劉守文舉滄徳兵攻幽州劉守光求救於晉晉王遣兵五千救之丁亥守文兵至盧臺軍為守光所敗又戰王田亦敗守文乃還三年夏五月劉守文頻年攻劉守光不克乃大發兵以重賂招契丹吐谷渾之衆合四萬屯薊州守光逆戰於雞蘇為守文所敗守文單馬立於陳前泣謂其衆曰勿殺吾弟守光將元行欽識之直前擒之滄徳兵皆潰守光囚之别室栫以藂棘乘勝進攻滄州滄州節度判官吕兖孫鶴推守文子延祚為帥乗城拒守兖安次人也六月劉守光遣使上表告捷且言俟滄徳事畢為陛下掃除并冦亦致書晉王云欲與之同破偽梁秋七月甲子以劉守光為燕王九月劉守光奏遣其子中軍兵馬繼威安撫滄州吏民戊申以繼威為義昌留後冬十二月劉守光圍滄州久不下執劉守文至城下示之猶固守城中食盡民食堇泥軍士食人驢馬相噉騣尾吕兖選男女羸弱者飼以麴麫而烹之以給軍食謂之宰殺務四年春正月乙未劉延祚力盡出降時劉繼威尚㓜守光使大將張萬進周知裕輔之鎮滄州以延祚及其將佐歸幽州族吕兖而釋孫鶴劉守光爲其父仁恭請致仕丙午以仁恭爲太師致仕守光尋使人潛殺其兄守文歸罪於殺者而誅之秋八月以劉守光兼義昌節度使乾化元年春二月盧龍義昌節度使兼中書令燕王守光既克滄州自謂得天助淫虐滋甚毎刑人必置諸鐵籠以火逼之又爲鐵刷刷人面聞梁兵敗於柏鄉使人謂趙王鎔及王處直曰聞二鎮與晉王破梁兵舉軍南下僕亦有精騎三萬欲自將之爲諸公啓行然四鎭連兵必有盟主僕若至彼何以處之鎔患之遣使告于晉王晉王笑曰趙人告急守光不能出一卒以救之及吾成功乃復欲以兵威離間二鎭愚莫甚焉諸將曰雲代與燕接境彼若擾我城戍動揺人情吾千里出征緩急難應此亦腹心之患也不若先取守光然後可以專意南討王曰善夏六月燕王守光嘗衣赭袍顧謂將吏曰今天下大亂英雄角逐吾兵彊地險亦欲自帝何如孫鶴曰今内難新平公私困竭太原窺吾西契丹伺吾北遽謀自帝未見其可大王但養士愛民訓兵積榖徳政既修四方自服矣守光不悦又使人諷鎮定求尊己為尚父趙王鎔以告晉王晉王怒欲伐之諸將皆曰是為惡極矣行當族滅不若陽為推尊以稔之乃與鎔及義武王處直昭義李嗣昭振武周徳威天徳宋瑶六節度使共奉冊推守光為尚書令尚父守光不寤以為六鎮實畏已益驕乃具表其狀曰晉王等推臣臣荷陛下厚恩未之敢受竊思其宜不若陛下授臣河北都統則并鎮不足平矣上亦知其狂愚乃以守光為河北道采訪使遣閤門使王瞳受旨史彥羣冊命之守光命僚屬草尚父采訪使受冊儀乙卯僚屬取唐冊太尉儀獻之守光視之問何得無郊天改元之事對曰尚父雖貴人臣也安有郊天改元者乎守光怒投之於地曰我地方二千里帶甲三十萬直作河北天子誰能禁我尚父何足為哉命趣具即帝位之儀械繫瞳彥羣及諸道使者於獄既而皆釋之秋八月燕王守光將稱帝將佐多竊議以為不可守光乃置斧質於庭曰敢諌者斬孫鶴曰滄州之破鶴分當死䝉王生全以至今日敢愛死而忘恩乎竊以為今日之帝未可也守光怒伏諸質上令軍士咼而噉之鶴呼曰百日之外必有急兵守光命以土窒其口寸斬之甲子守光即皇帝位國號大燕改元應天以梁使王瞳為左相盧龍判官齊涉為右相史彥羣為御史大夫受冊之日契丹陷平州燕人驚擾冬十月晉王聞燕主守光稱帝大笑曰俟彼卜年吾當問其鼎矣張承業請遣使致賀以驕之晉王遣太原少尹李承勲往承勲至幽州用鄰藩通使之禮燕之典客者曰吾王帝矣公當稱臣庭見承勲曰吾受命於唐朝為太原少尹燕王自可臣其境内豈可臣它國之使乎守光怒囚之數日出而問之曰臣我乎承勲曰燕王能臣我王則我請為臣不然有死而已守光竟不能屈冬十一月燕王守光集將吏謀攻易定幽州參軍景城馮道以為未可守光怒繫獄或救之得免道亡犇晉戊申燕主守光將兵二萬冦易定攻容城王處直告急于晉十二月甲子晉王遣蕃漢馬步緫管周徳威將兵三萬攻燕以救易定二年春正月徳威東出飛狐與趙王將王徳明義武將程巖㑹于易水丙戌三鎮兵進攻燕祁溝闗下之戊子圍涿州刺史劉知温遂降先是燕主守光籍境内丁壯悉文面為兵雖士人亦不免鳳詐為僧犇晉守竒客之丁酉徳威至幽州城下守光來求救二月帝議自將擊鎮定以救之三月周徳威遣禆將李存暉等攻瓦橋其將吏及莫州刺史李嚴皆降嚴幽州人也夏四月周徳威白晉王以兵少不足以攻城晉王遣李存審將吐谷渾契苾騎兵㑹之李嗣源攻瀛州刺史趙敬降五月燕主守光遣其將單廷珪將精兵萬人出戰與周徳威遇於龍頭岡廷珪曰今日必擒周楊五以獻楊五徳威小名也既戰見徳威於陳援槍單騎逐之槍及徳威背徳威側身避之奮檛反擊廷珪墜馬生擒置於軍門燕兵退走徳威引騎乗之燕兵大敗斬首三千級廷珪燕饒將也燕人失之奪氣均王乾化三年春正月丁巳晉周徳威拔燕順州晉周徳威拔燕安逺軍薊州將成行言等降于晉二月丙申晉李存暉等攻燕檀州刺史陳確以城降三月甲辰朔晉周徳威拔燕盧臺軍乙丑晉將劉光濬克古北口燕居庸闗使胡令圭等犇晉燕主守光命大將元行欽將騎七千牧馬於山北募山北兵以應契丹又以騎將高行珪為武州刺史以為外援晉李嗣源分兵徇山後八軍皆下之晉王以其弟存矩為新州刺史使總之以燕納降軍使盧文進為禆將李嗣源進攻武州高行珪以城降元行欽聞之引兵攻行珪行珪使其弟行周為質於晉軍以求救李嗣源引兵救之行欽解圍去嗣源與行周追至廣邊軍凢八戰行欽力屈而降嗣源愛其饒勇養以為子嗣源進攻儒州拔之以行珪為代州刺史行周留事嗣源常與嗣源假子從珂分將牙兵以從夏四月晉周徳威進軍逼幽州南門壬辰燕主守光遣使致書於徳威以請和語甚卑而哀徳威曰大燕皇帝尚未郊天何雌伏如是邪予受命討有罪者結盟繼好非所聞也不荅書守光懼復遣人祈哀徳威乃以聞於晉王己亥晉劉光濬拔燕平州執刺史張在吉五月光濬攻營州刺史楊靖降六月壬申朔晉主遣張承業詣幽州與周徳威議軍事辛卯燕主守光遣使詣張承業請以城降承業以其無信不許秋七月甲子晉五院軍使李信抜莫州擒燕將畢元福八月乙亥李信拔瀛州晉王與趙王鎔㑹于天長九月燕主守光引兵夜出復取順州冬十月己巳朔燕主守光帥衆五千夜出將入檀州庚午周徳威自涿州引兵邀擊大破之守光以百餘騎逃歸幽州其將卒降者相繼盧龍巡屬皆入于晉燕主守光獨守幽州城求援於契丹契丹以其無信竟不救守光屢請降於晉晉人疑其詐終不許至是守光登城謂周徳威曰俟晉王至吾則開門泥首聽命徳威使白晉王十一月甲辰晉王以監軍張承業權知軍府事自詣幽州辛酉單騎抵城下謂守光曰朱温篡逆余本欲與公合河朔五鎮之兵興復唐祚公謀之不臧乃効彼狂僭鎮定二帥皆俛首事公而公曾不之恤是以有今日之役丈夫成敗須決所向公將何如守光曰今日爼上肉耳惟王所裁王憫之與折弓矢為誓曰但出相見保無它也守光辭以它日先是守光愛將李小喜多賛成守光之惡言聽計從權傾境内至是守光將出降小喜止之是夕小喜踰城詣晉軍降且言城中力竭壬戌晉王督諸軍四面攻城克之擒劉仁恭及其妻妾守光帥妻子亡去癸亥晉王入幽州冬十二月庚午晉王以周徳威為盧龍節度使兼侍中以李嗣本為振武節度燕主守光將犇滄州就劉守竒涉寒足腫且迷失道至燕樂之境晝匿阬谷數日不食令妻祝氏乞食於田父張師造家師造恠婦人異狀詰知守光處并其三子擒之癸酉晉王方宴將吏擒守光適至王語之曰主人何避客之深邪并仁恭置之館舍以器服膳飲賜之王命掌書記王緘草露布緘不知故事書之於布遣人曳之晉王欲自雲代歸趙王鎔及王處直請由中山真定趣井陘王從之庚辰晉王發幽州劉仁恭父子皆荷校於露布之下守光父母唾其面而罵之曰逆賊破我家至此守光俛首而已甲申至定州舍于闗城丙戌晉王與王處直謁北嶽廟是日至行唐趙王鎔逆謁于路四年春正月戊戌朔趙王鎔詣晉王行帳上夀置酒鎔願識劉太師面晉王命吏脱劉仁恭及守光械引就席同宴鎔荅其拜又以衣服鞍馬酒饌贈之己亥晉王與鎔畋于行唐之西鎔送至境上而别壬子晉王以練糸斥劉仁恭父子凱歌入于晉陽丙辰獻于太廟自臨斬劉守光守光呼曰守光死不恨然教守光不降者李小喜也王召小喜證之小喜瞋目叱守光曰汝内亂禽獸行亦我教邪王怒其無禮先斬之守光曰守光善騎射王欲成霸業何不留之使自効其二妻李氏祝氏讓之曰皇帝事已如此生亦何益妾請先死即伸頸就戮守光至死號泣哀祈不已王命節度副使盧汝弼等械仁恭至代州刺其心血以祭先王墓然後斬之後唐滅梁唐昭宗天祐元年夏閏四月更命魏博曰天雄軍進天雄節度使長沙郡王羅紹威爵鄴王昭宣帝天祐二年七月庚午夜天雄牙將李公佺與牙軍謀亂羅紹威覺之公佺焚府舍剽掠犇滄州三年初田承嗣鎮魏博選募六州饒勇之士五千人為牙軍厚其給賜以自衛為腹心自是父子相繼親黨膠固歲久益驕横小不如意輒族舊帥而易之自史憲誠以來皆立於其手天雄節度使羅紹威心惡之力不能制朱全忠之圍鳳翔也紹威遣軍將楊利言宻以情告全忠欲借其兵以誅之全忠以事方急未暇如其請隂許之及李公佺作亂紹威益懼復遣牙將臧延範趣全忠全忠乃發河南諸鎮兵七萬遣其將李思安將之㑹魏鎮兵屯深州樂城聲言擊滄州討其納李公佺也㑹全忠女適紹威子廷規者卒全忠遣客將馬嗣勲實甲兵於橐中選長直兵千人為擔夫帥之入魏詐云㑹葬全忠自以大軍繼其後云赴行營牙軍皆不之疑正月庚午紹威潛遣人入庫斷弓弦甲襻是夕紹威帥其奴客數百與嗣勲合擊牙軍牙軍欲戰而弓甲皆不可用遂闔營殪之凢八千家嬰孺無遺詰旦全忠引兵入城羅紹威既誅牙軍魏之諸軍皆懼紹威雖數撫諭之而猜怨益甚朱全忠營於魏州城東數旬將北巡行營㑹天進牙將史仁遇作亂聚衆數萬據高唐自稱留後天雄巡内州縣多應之全忠移軍入城遣使召行營兵還攻高唐至厯亭魏兵在行營者作亂與仁遇相應元帥府左司馬李周彞右司馬符道昭擊之所殺殆半進攻高唐克之城中兵民無少長皆死擒史仁遇鋸殺之先是仁遇求救於河東及滄州李克用遣其將李嗣昭將三千騎攻邢州以救之時邢州兵纔二百團練使牛存節守之嗣昭攻七日不克全忠遣右長直都將張筠將數千騎助存節守城筠伏兵於馬嶺擊嗣昭敗之嗣昭遁去義昌節度使劉守文遣兵萬人攻貝州又攻冀州拔蓨縣進攻阜城時鎮州大將王釗攻魏州叛將李重霸於宗城全忠遣歸救冀州滄州兵去四月丙午重霸棄城走汴將胡規追斬之五月丁巳朱全忠如洺州遂巡北邊視戎備還入于魏秋七月朱全忠克相州時魏之亂兵散據貝博澶相衛州及魏之諸縣全忠分命諸將攻討至是悉平之引兵南還全忠留魏半嵗羅紹威供億所殺牛羊豕近七十萬資糧稱是所賂遺又近百萬比去蓄積為之一空紹威雖去其逼而魏兵自是衰弱紹威悔之謂人曰合六州四十三縣鐵不能為此錯也壬申全忠至大梁八月朱全忠以幽滄相首尾為魏患欲先取滄州甲辰引兵發大梁九月辛亥朔朱全忠自白馬度河丁卯至滄州軍於長蘆滄人不出羅紹威饋運自魏至長蘆五百里不絶於路又建元帥府舍於魏所過驛亭供酒饌幄幕什器上下數十萬人無一不備劉仁恭救滄州戰屢敗乃下令境内男子十五以上七十以下悉自備兵糧詣行營軍發之後有一人在閭里刑無赦或諌曰今老弱悉行婦人不能轉餉此令必行濫刑者衆矣乃命勝執兵者盡行文其面曰定霸都士人則文其腕或臂曰一心事主於是境内士民穉孺之外身無不文者得兵十萬軍于瓦橋時汴軍築壘圍滄州鳥鼠不能通仁恭畏其疆不敢戰城中食盡丸土而食或互相掠啖朱全忠使人説劉守文曰援兵勢不相及何不早降守文登城應之曰僕於幽州父子也梁王方以大義服天下若子叛父而來將安用之全忠愧其辭直為之緩攻冬十月劉仁恭求救於河東前後百餘輩李克用恨仁恭返覆竟未之許其子存朂諫曰今天下之勢歸朱温者什七八雖疆大如魏博鎮定莫不附之自河以北能為温患者獨我與幽滄耳今幽滄為温所囷我不與之併力拒之非我之利也夫為天下者不顧小怨且彼嘗困我而我救其急以徳懐之乃一舉而名實附也此乃吾復振之時不可失也克用以為然與將佐謀召幽州兵與攻潞州曰於彼則可以解圍於我則可以拓境乃許仁恭和召其兵仁恭遣都指揮使李溥將兵三萬詣晉陽克用遣其將周徳威李嗣昭將兵與之共攻潞州十二月朱全忠分步騎數萬遣行軍司馬李周彝將之自河陽救潞州初昭宗凶訃至潞州昭義節度使丁㑹帥將士縞素流涕久之及李嗣昭攻潞州㑹舉軍降於河東李克用以嗣昭為昭義留後㑹見克用泣曰㑹非力不能守也梁王陵虐唐室㑹雖受其舉拔之恩誠不忍其所為故來歸命耳克用厚待之位於諸將之上己巳朱全忠命諸軍治攻具將攻滄州壬申聞潞州不守甲戌引兵還先是調河南北芻糧水陸輸軍前諸營山積全忠將還命悉焚之煙炎數里在舟中者鑿而沈之劉守文使遺全忠書曰王以百姓之故赦僕之罪解圍而去王之恵也城中數萬口不食數月矣與其焚之為煙沈之為泥願乞其所餘以救之全忠為之留數囷以遺之滄人賴以濟河東兵進攻澤州不克而退後梁太祖開平元年春正月辛巳梁王休兵于貝州河東兵猶屯長子欲窺澤州王命保平節度使康懐貞悉發京兆同華之兵屯晉州以備之三月甲辰唐昭宣帝禪位于梁夏四月壬戌梁王即皇帝位乙亥下制削奪李克用官爵五月壬辰命保平節度使康懐貞將兵八萬㑹魏博兵攻潞州六月康懐貞至潞州晉昭義節度使李嗣昭副使李嗣弼閉城拒守懐貞晝夜攻之半月不克乃築壘穿蚰蜒塹而守之内外㫁絶晉王以蕃漢都指揮使周徳威為行營都指揮使帥馬軍都指揮使李嗣本馬步都虞候李存璋先鋒指揮使史建瑭鐵林都指揮使安元信横衝指揮使李嗣源騎將安金全救潞州嗣弼克脩之子嗣本本姓張建瑭敬思之子金全代北人也晉兵攻澤州帝遣左神勇軍使范居實將兵救之秋八月晉周徳威壁于高河康懐貞遣親騎都頭秦武將兵擊之武敗丁巳帝以亳州刺史李思安代懷貞爲潞州行營都統黜懐貞爲行營都虞候思安將河北兵西上至潞州城下更築重城内以防犇突外以拒援兵謂之夾寨調山東民饋軍糧徳威日以輕騎抄之思安乃自東南山口築甬道屬於夾寨徳威與諸將互往攻之排牆塡塹一晝夜間數十發梁兵疲於犇命夾寨中出芻牧者徳威輙抄之於是梁兵閉壁不出冬十一月晉王命李存璋攻晉州以分上黨兵勢十二月壬戌詔河中陜州發兵救之丁夘晉兵冦洺州二年春正月晉王疽發於首病篤周徳威等退屯亂栁晉王命其弟内外蕃漢都知兵馬使振武節度使克寧監軍張承業大將李存璋吴珙掌書記盧質立其子晉州刺史存朂為嗣曰此子志氣逺大必能成吾事爾曹善教導之辛夘晉王謂存朂曰嗣昭厄於重圍吾不及見矣俟葬畢汝與徳威輩速竭力救之又謂克寧等曰以亞子累汝亞子存朂小名也言終而卒克寧綱紀軍府中外無敢諠譁克寧久總兵柄有次立之勢時上黨圍未解軍中外以存朂年少多竊議者人情恟恟存朂懼以位讓克寧克寧曰汝冢嗣也且有先王之命誰敢違之將吏欲謁見存朂存朂方哀哭久未出張承業入謂存朂曰大孝在不墜基業多哭何為因扶存朂出襲位為河東節度使晉王李克寧首帥諸將拜賀王悉以軍府事委之以李存璋為河東軍城使馬步都虞候先王之時多寵借胡人及軍士侵擾市肆存璋既領職執其尤暴横者戮之旬月間城中肅然李思安等攻潞州久不下士卒疲弊多逃亡晉兵猶屯余吾寨帝疑晉王克用詐死欲召兵還恐晉人躡之乃議自至澤州應接歸師且召匡國節度使劉知俊將兵趣澤州三月壬申朔帝發大梁丁丑次澤州辛巳劉知俊至壬午以知俊為潞州行營招討使帝以李思安久無功亡將校四十餘人士卒以萬計更閉壁自守遣使召詣行在甲午削思安官爵勒歸本貫充役斬監押楊敏貞晉李嗣昭固守踰年城中資用將竭嗣昭登城宴諸將作樂流矢中嗣昭足嗣昭宻拔之座中皆不覺帝數遣使賜嗣昭詔諭降之嗣昭焚詔書斬使者帝留澤州旬餘欲召上黨兵還遣使就與諸將議之諸將以為李克用死余吾兵且退上黨孤城無援請更留旬月以俟之帝從之命增運芻糧以饋其軍劉知俊將精兵萬餘人擊晉軍斬獲甚衆表請自留攻上黨車駕宜還京師帝以闗中空虚慮𡵨人侵同華命知俊休兵長子旬日退屯晉州俟五月歸鎮初晉王克用卒周徳威握重兵在外國人皆疑之晉王存朂召徳威使引兵還夏四月辛丑朔徳威至晉陽留兵城外獨徒步而入伏先王柩哭極哀退謁嗣王禮甚恭衆心由是釋然夾寨奏余吾晉兵已引去帝以為援兵不能復來潞州必可取丙午自澤州南還壬子至大梁梁兵在夾寨者亦不復設備晉王與諸將謀曰上黨河東之藩蔽無上黨是無河東也且朱温所憚者獨先王耳聞吾新立以為童子未閑軍旅必有驕怠之心若簡精兵倍道趣之出其不意破之必矣取威定霸在此一舉不可失也張承業亦勸之行乃遣承業及判官王緘乞師於鳳翔又遣使賂契丹王阿保機求騎兵𡵨王衰老兵弱財竭竟不能應晉王大閲士卒以前昭義節度使丁㑹為都招討使甲子帥周徳威等發晉陽己巳晉王軍于黄碾距上黨四十五里五月辛未朔晉王伏兵三垂岡下詰旦大霧進兵直抵夾寨梁軍無斥候不意晉兵之至將士尚未起軍中驚擾晉王命周徳威李嗣源分兵為二道徳威攻西北隅嗣源攻東北隅填塹燒寨鼓譟而入梁兵大潰南走招討使符道昭馬倒為晉人所殺失亡將校士卒以萬計委棄資糧器械山積周徳威等至城下呼李嗣昭曰先王已薨今王自來破賊夾寨賊已去矣可開門嗣昭不信曰此必為賊所得使來誑我耳欲射之左右止之嗣昭曰王果來可見乎王自往呼之嗣昭見王白服大慟幾絶城中皆哭遂開門初徳威與嗣昭有隙晉王克用臨終謂晉王存朂曰進通忠孝吾愛之深今不出重圍豈徳威不忘舊怨邪汝為吾以此意諭之若潞圍不解吾死不瞑目進通嗣昭小名也晉王存朂以告徳威徳威感泣由是戰夾寨甚力既與嗣昭相見遂歡好如初康懐貞以百餘騎自天井闗遁歸帝聞夾寨不守大驚既而歎曰生子當如李亞子克用為不亡矣至如吾兒豚犬耳詔所在安集散兵周徳威李存璋乘勝進趣澤州刺史王班素失人心衆不為用龍虎統軍牛存節自西都將兵應接夾寨潰兵至天井闗謂其衆曰澤州要害地不可失也雖無詔旨當救之衆皆不欲曰晉人勝氣方鋭且衆寡不敵存節曰見危不救非義也畏敵疆而避之非勇也遂舉策引衆而前至澤州城中人已縦火諠譟欲應晉王班閉牙城自守存節至乃定晉兵尋至緣城穿地道攻之存節晝夜拒戰凢旬有三日劉知俊自晉州引兵救之徳威焚攻具退保高平晉王歸晉陽休兵行賞以周徳威為振武節度使同平章事命州縣舉賢才黜貪殘寛租賦撫孤窮伸寃濫禁姦盜境内大治以河東地狹兵少乃訓練士卒令騎兵不見敵無得乗馬部分已定無得相踰越及留絶以避險分道並進期㑹無得差晷刻犯者必斬故能兼山東取河南由士卒精整故也潞州圍守厯年士民凍餓死者大半市里蕭條李嗣昭勸課農桑寛租緩刑數年之間軍城完復壬辰夾寨諸將詣闕待罪皆赦之帝賞牛存節全澤州之功以為六軍馬步都指揮使六月帝欲自將擊潞州丁夘詔㑹諸道兵秋九月晉周徳威李嗣昭將兵三萬出隂地闗攻晉州刺史徐懐玉拒守帝自將救之丁丑發大梁乙酉至陜州周徳威等聞帝將至乙未退保隰州冬十月丁巳帝還大梁三年春三月以山南東道節度使楊師厚兼潞州行營四面招討使秋八月𡵨王約晉王使攻晉絳晉王引兵南下先遣周徳威等將兵出隂地闗攻晉州刺史邊繼威悉力固守晉兵穿地道陷城二十餘步城中血戰拒之一夕城復成詔楊師厚將兵救晉州周徳威以騎扼䝉阬之險師厚撃破之進抵晉州晉兵解圍遁去四年鎭定自帝踐阼以來雖不輸常賦而貢獻甚勤㑹趙王鎔母何氏卒庚申遣使弔之且授起復官時鄰道弔客皆在館使者見晉使歸言於帝曰鎔潛與晉通鎭定勢疆終恐難制帝深然之冬十月遣鎭國節度使楊師厚相州刺史李思安將兵屯澤州以圖上黨十一月己丑以寧國節度使同平章事王景仁充北面行營都指揮招討使潞州副招討使韓勍副之以李思安爲先鋒將趣上黨尋遣景仁等屯魏州楊師厚還陜上疑趙王鎔貳於晉且欲因鄴王紹威卒除移鎮定㑹燕王守光發兵屯淶水欲侵定州上遣供奉官杜廷隠丁延徽監魏博兵三千分屯深冀聲言恐燕兵南冦助趙守禦又云分兵就食趙將石公立戍深州白趙王鎔請拒之鎔遽命開門移公立於外以避之公立出門指城而泣曰朱氏滅唐社稷三尺童子知其為人而我王猶恃姻好以長者期之此所謂開門揖盜者也惜乎此城之人今為虜矣梁人有亡犇真定以其謀告鎔者鎔大懼又不敢先自絶但遣使詣洛陽訴稱燕兵已還與定州講和如故深冀民見魏博兵入犇走驚駭乞召兵還上遣使詣真定慰諭之未幾廷隠等閉門盡殺趙戍兵乘城拒守鎔始命石公立攻之不克乃遣使求援於燕晉鎔使者至晉陽義武節度使王處直使者亦至欲共推晉王為盟主合兵攻梁晉王㑹將佐謀之皆曰鎔久臣朱温嵗輸重賂結以昏姻其交深矣此必詐也宜徐觀之王曰彼亦擇利害而為之耳王氏在唐世猶或臣或叛况肯終為朱氏之臣乎彼朱温之女何如夀安公主今救死不贍何顧昏姻我若疑而不救正墯朱氏計中宜趣發兵赴之晉趙叶力破梁必矣乃發兵遣周徳威將之出井陘屯趙州鎔使者至幽州燕王守光方獵幕僚孫鶴馳詣野謂守光曰趙人來乞師此天欲成王之功業也守光曰何故對曰比常患其與朱温膠固温之志非盡呑河朔不已今彼自為讎敵王若與之併力破梁則鎮定皆歛衽而朝燕矣王不早出師但恐晉人先我矣守光曰王鎔數負約今使之與梁自相弊吾可以坐承其利又何救焉趙使者交錯於路守光竟不為出兵自是鎮定復稱唐天祐年號復以武順為成徳軍司天言來月太隂虧不利宿兵於外上召王景仁等還洛陽十二月己未上聞趙與晉合晉兵已屯趙州乃命王景仁等將兵擊之庚申景仁等自河陽度河㑹羅周翰兵合四萬軍于邢洺丁丑王景仁等進軍柏鄉趙王鎔復告急於晉晉王以蕃漢副緫管李存審守晉陽自將兵自賛皇東下王處直遣將將兵五千以從辛巳晉王至趙州與周徳威合獲梁芻蕘者二百人問之曰初發洛陽梁主有何號令對曰梁主戒上將云鎮州反覆終為子孫之患今悉以精兵付汝鎮州雖以鐵為城必為我取之晉王命送於趙壬午晉王進軍距柏鄉三十里遣周徳威等以胡騎迫梁營挑戰梁兵不出癸未復進距柏鄉五里營於野河之北又遣胡騎迫梁營馳射且詬之梁將韓勍等將步騎三萬分三道追之鎧胄皆被繒綺鏤金銀光彩炫曜晉人望之奪氣周徳威謂李存璋曰梁人志不在戰徒欲曜兵耳不挫其鋭則吾軍不振乃徇于軍曰彼皆汴州天武軍屠酤傭販之徒耳衣鎧雖鮮十不能當汝一擒獲一夫足以自富此乃竒貨不可失也徳威自帥精騎千餘撃其兩端左馳右突出入數四俘獲百餘人且戰且却距野河而止梁兵亦退徳威言於晉王曰賊勢甚盛宜按兵以待其衰王曰吾孤軍逺來救人之急三鎮烏合利於速戰公乃欲按兵持重何也徳威曰鎮定之兵長於守城短於野戰且吾所恃者騎兵利於平原廣野可以馳突今壓賊壘門騎無所展其足且衆寡不敵使彼知吾虚實則事危矣王不悦退卧帳中諸將莫敢言徳威往見張承業曰大王驟勝而輕敵不量力而務速戰今去賊咫尺所限者一水耳彼若造橋以薄我我衆立盡矣不若退軍高邑誘賊離營彼出則歸彼歸則出别以輕騎掠其饋餉不過踰月破之必矣承業入褰帳撫王曰此豈王安寢時邪周徳威老將知兵其言不可忽也王蹶然而興曰予方思之時梁兵閉壘不出有降者詰之曰景仁方多造浮橋王謂徳威曰果如公言是日抜營退保髙邑乾化元年柏鄉比不儲芻梁兵刈芻自給晉人以遊軍抄之梁兵不出周徳威使胡騎環營馳射而詬之梁兵疑有伏愈不敢出剉屋茅坐席以飼馬馬多死春正月丁亥周徳威與别將史建瑭李嗣源將精騎三千壓梁壘門而詬之王景仁韓勍怒悉衆而出徳威等轉戰而北至高邑南李存璋以步兵陳於野河之上梁兵横亘數里競前奪橋鎮定步兵禦之勢不能支晉王謂匡衛都指揮使李建及曰賊過橋則不可復制矣建及選卒二百援槍大譟力戰却之建及許州人姓王李罕之之假子也晉王登高丘以望曰梁兵爭進而囂我兵整而静我必勝戰自巳至午勝負未決晉王謂周徳威曰兩軍已合勢不可離我之興亡在此一舉我為公先登公可繼之徳威叩馬而諫曰觀梁兵之勢可以勞逸制之未易以力勝也彼去營三十餘里雖挾糗糧亦不暇食日昳之後飢渇内迫矢刃外交士卒勞倦必有退志當是時我以精騎乘之必大捷於今未可也王乃止時魏滑之兵陳於東宋汴之兵陳於西至晡梁軍未食士無鬬志景仁等引兵稍却周徳威疾呼曰梁兵走矣晉兵大譟爭進魏滑兵先退李嗣源帥衆譟於西陳之前曰東陳已走爾何久留梁兵互相驚怖遂大潰李存璋引步兵乘之呼曰梁人亦吾人也父兄子弟餉軍者勿殺於是戰士悉解甲投兵而棄之囂聲動天地趙人以深冀之憾不顧剽掠但奮白刃追之梁之龍驤神捷精兵殆盡自野河至柏鄉僵尸蔽地王景仁韓勍李思安以數十騎走晉兵夜至柏鄉梁軍已去棄糧食資財器械不可勝計凢斬首二萬級李嗣源等追犇至邢州河朔大震保義節度使王擅嚴備然後開城納敗卒給以資糧散遣歸本道晉王收兵屯趙州杜廷隠等聞梁兵敗棄深冀而去悉驅二州丁壯為奴婢老弱者坑之城中存者壞垣而已癸巳復以楊師厚爲北靣都招討使將兵屯河陽收集散兵旬餘得萬人己亥晉王遣周徳威史建瑭將三千騎趣澶魏張承業李存璋以步兵攻邢州自以大軍繼之移檄河北州縣諭以利害帝遣别將徐仁溥將兵千人自西山夜入邢州助王檀城守己酉罷王景仁招討使落平章事二月己未晉王至魏州攻之不克上以羅周翰年少且忌其舊將佐庚申以户部尚書李振爲天雄節度副使命杜廷隠將兵千人衛之自楊劉濟河間道夜入魏州助周翰城守癸亥晉王觀河於黎陽梁兵萬餘將度河聞晉王至皆棄舟而去乙丑周徳威自臨清攻貝州拔夏津高唐攻博州拔東武朝城攻澶州刺史張可臻棄城走帝斬之徳威進攻黎陽拔臨河淇門逼衛州掠新鄉共城庚午帝帥親軍屯白司馬阪以備之楊師厚自磁相引兵救邢魏壬申晉解圍去師厚追之逾漳水而還邢州圍亦解師厚留屯魏州趙王鎔自來謁晉王於趙州大犒將士自是遣其養子徳明將三十七都常從晉王征討徳明本姓張名文禮燕人也壬午晉王發趙州歸晉陽留周徳威等將三千人戍趙州夏六月帝命楊師厚將兵三萬屯邢州秋七月趙王鎔以楊師厚在邢州甚懼㑹晉王于承天軍晉王謂鎔父友也事之甚恭鎔以梁冦為憂晉王曰朱温之惡極矣天將誅之雖有師厚輩不能救也脱有侵軼僕自帥衆當之叔父勿以為憂鎔捧巵為夀謂晉王為四十六舅鎔㓜子昭誨從行晉王㫁衿為盟許妻以女由是晉趙之交遂固九月帝聞晉趙謀入冦自將拒之戊戌以張宗奭為西都留守庚子帝發洛陽甲辰至衛州方食軍前奏晉軍已出井陘帝遽命輦北趣邢洺晝夜倍道兼行丙午至相州聞晉兵不出乃止冬十月甲寅夜帝發相州乙夘至洹水是夜邊吏言晉趙兵南下帝即時進軍丙辰至魏縣或告云沙陀至矣士卒忷懼多逃亡嚴刑不能禁既而復告云無冦上下始定戊午貝州奏晉兵冦東武尋引去帝以夾寨柏鄉屢失利故力疾北巡思一雪其恥意鬱鬱多躁忿功臣宿將往往以小過被誅衆心益懼既而晉趙兵竟不出十一月壬午帝南還二年春二月甲子帝發洛陽從官以帝誅戮無常多憚行帝聞之益怒是日至白馬頓賜從官食多未至遣騎趣之於路左散騎常侍孫隲右諫議大夫張衍兵部郎中張儁最後至帝命撲殺之衍宗奭之姪也丙寅帝至武陟段明逺供饋有加於前丁夘至獲嘉帝追思李思安去歲供饋有闕貶栁州司户告辭稱明逺之能曰觀明逺之忠勤如此見思安之悖慢何如尋常流思安於崖州賜死明逺後更名凝乙亥帝至魏州命都招討使宣義節度使楊師厚副使前河陽節度使李周彛圍棗彊招討應接使平盧節度使賀徳倫副使天平留後袁象先圍蓨縣徳倫河西胡人象先下邑人也戊寅帝至貝州帝晝夜兼行三月辛巳至下博南登觀津冢趙將符習引數百騎出巡邏不知是帝遽前逼之或告曰晉兵大至矣帝棄行幄亟引兵趣棗彊與楊師厚軍合習趙州人也棗彊城小而堅趙人聚精兵數千守之師厚急攻之數日不下城壞復修死傷者以萬數城中矢石將竭謀出降有一卒奮曰賊自柏鄉喪敗以來視我鎮人裂眥我今往歸之如自投虎狼之口耳困窮如此何用身為我請獨往試之夜縋城出詣梁軍詐降李周彞召問城中之備對曰非半月未易下也因謀曰某既歸命願得一劒効死先登取守城將首周彞不許使荷擔從軍卒得間舉擔撃周彞首踣地左右救至得免帝聞之愈怒命師厚晝夜急攻丙戌拔之無問老㓜盡殺之流血盈城初帝引兵度河聲言五十萬晉忻州刺史李存審屯趙州患兵少禆將趙行實請入土門避之存審不可及賀徳倫攻蓨縣存審謂史建瑭李嗣肱曰吾王方有事幽薊無兵此來南方之事委吾輩數人今蓨縣方急吾輩安得坐而視之使賊得蓨縣必西侵深冀患益深矣當與公等以竒計破之存審乃引兵扼下博橋使建瑭嗣肱分道擒生建瑭分其麾下為五隊隊各百人一之衡水一之南宫一之信都一之阜城自將一隊深入與嗣肱遇梁軍之樵芻者皆執之獲數百人明日㑹於下博橋皆殺之留數人㫁臂縦去曰為我語朱公晉王大軍至矣時蓨縣未下帝引楊師厚兵五萬就賀徳倫共攻之丁亥始至縣西未及置營建瑭嗣肱各將三百騎効梁軍旗幟服色與樵芻者雜行日且暮至徳倫營門殺門者縦火大譟弓矢亂發左右馳突既暝各斬馘執俘而去營中大擾不知所為㫁臂者復來曰晉軍大至矣帝大駭燒營夜遁迷失道委曲行百五十里戊子旦乃至冀州蓨之耕者皆荷鉏奮梃逐之委棄軍資器械不可勝計既而復遣騎覘之曰晉軍實未來此乃史先鋒遊騎耳帝不勝慙憤由是病增劇不能乘肩輿留貝州旬餘諸軍始集乙巳帝發貝州丁未至魏州夏四月乙卯博王友文來朝請帝還東都丁巳發魏州己未至黎陽以疾淹留乙丑至滑州己巳帝至大梁戊寅帝發大梁五月甲申帝至洛陽疾甚閏月壬戌帝疾增甚謂近臣曰我經營天下三十年不意太原餘孽更昌熾如此吾觀其志不小天復奪我年我死諸兒非彼敵也吾無葬地矣因哽咽絶而復蘇六月戊寅郢王友珪弑帝冬十一月趙將王徳明將兵三萬掠武城至于臨清攻宗城下之癸丑楊師厚伏兵唐店邀擊大破之斬首五千餘級均王乾化三年春二月均王即位于大梁三月庚戌加楊師厚兼中書令賜爵鄴王賜詔不名事無巨細必咨而後行夏五月楊師厚與博州刺史劉守竒將汴滑徐兖魏博邢洺之兵十萬大掠趙境師厚自柏鄉入攻土門趣趙州守竒自貝州入趣冀州所過焚掠庚戌師厚至鎮州營於南門外燔其闗城壬子師厚自九門退軍下博守竒引兵與師厚㑹攻下博拔之晉將李存審史建瑭戍趙州兵少趙王告急於周徳威徳威遣騎將李紹衡㑹趙將王徳明同拒梁軍師厚守竒自弓高渡御河而東逼滄州張萬進懼請遷于河南師厚表徙萬進鎮青州以守竒為順化節度使四年晉王既克幽州乃謀入㓂晉王滅燕克幽州事見秋七月㑹趙王鎔及周徳威於趙州南冦邢州李嗣昭引昭義兵㑹之楊師厚引兵救邢州軍於漳水之東晉軍至張公橋禆將曹進金來犇晉軍退諸鎭兵皆引歸八月晉王還晉陽貞明元年春三月天雄節度使兼中書令鄴王楊師厚卒師厚晩年矜功恃衆擅割財賦選軍中驍勇置銀槍効節都數千人給賜優厚欲以復故時牙兵之盛帝雖外加尊禮内實忌之及卒私於宫中受賀租庸使趙巖判官邵賛言於帝曰魏博爲唐腹心之蠧二百餘年不能除去者以其地廣兵彊之故也羅紹威楊師厚據之朝廷皆不能制陛下不乗此時為之計所謂彈疽不嚴必將復聚安知來者不為師厚乎宜分六州為兩鎭以弱其權帝以為然以平盧節度使賀徳倫為天雄節度使置昭徳軍於相州割澶衛二州隷焉以宣徽使張筠為昭徳節度使仍分魏州將士府庫之半於相州筠海州人也二人既赴鎭朝廷恐魏人不服遣開封尹劉鄩將兵六萬自白馬濟河以討鎭定為名實張形勢以脅之魏兵皆父子相承數百年族姻磐結不願分徙徳倫屢趣之應行者皆嗟怨連營聚哭己丑劉鄩屯南樂先遣澶州刺史王彥章將龍驤五百騎入魏州屯金波亭魏兵相與謀曰朝廷忌吾軍府彊盛欲設策使之殘破耳吾六州厯代藩鎮兵未嘗逺出河門一旦骨肉流離生不如死是夕軍亂縦火大掠圍金波亭王彦章斬闗而走詰旦亂兵入牙城殺賀徳倫之親兵五百人刼徳倫置樓上有効節軍校張彦者自帥其黨拔白刃止剽掠夏四月帝遣供奉官扈異撫諭魏軍許張彦以刺史彦請復相澶衛三州如舊制異還言張彦易與但遣劉鄩加兵立當傳首帝由是不許但以優詔荅之使者再返彦裂詔書抵於地㦸手南向詬朝廷謂徳倫曰天子愚暗聽人穿鼻今我兵甲雖彊茍無外援不能獨立宜投欵於晉遂逼徳倫以書求援於晉晉王得賀徳倫書命馬步副緫管李存審自趙州引兵進據臨清五月存審至臨清劉鄩屯洹水賀徳倫復遣使吿急于晉晉王引大軍自黄澤嶺東下與存審㑹於臨清猶疑魏人之詐按兵不進徳倫遣判官司空頲犒軍宻言於晉王曰除亂當除根因言張彦凶狡之狀勸晉王先除之則無虞矣王黙然頲貝州人也晉王進屯永濟張彦選銀槍効節五百人皆執兵自衛詣永濟謁見王登驛樓語之曰汝陵脅主帥殘虐百姓數日中迎馬訴寃者百餘輩我今舉兵而來以安百姓非貪人土地汝雖有功於我不得不誅以謝魏人遂斬彦及其黨七人餘衆股栗王召諭之曰罪止八人餘無所問自今當竭力為吾爪牙衆皆拜伏呼萬嵗明日王緩帶輕裘而進令張彦之卒擐甲執兵翼馬而從仍以為帳前銀槍都衆心由是大服劉鄩聞晉軍至選兵萬餘人自洹水趣魏縣晉王留李存審屯臨清遣史建瑭屯魏縣以拒之王自引親軍至魏縣與鄩夾河為營帝聞魏博叛大悔懼遣天平節度使牛存節將兵屯楊劉為鄩聲援㑹存節病卒以匡國節度使王檀代之六月庚寅朔賀徳倫帥將吏請晉王入府城慰勞既入徳倫上印節請王兼領天雄軍王固辭曰比聞汴冦侵逼貴道故親董師徒逺來相救又聞城中新罹塗炭故暫入存撫明公不垂鑒信乃以印節見推誠非素懐徳倫再拜曰今冦敵宻邇軍城新有大變人心未安徳倫腹心紀綱為張彦所殺殆盡形孤勢弱安能統衆一旦生事恐負大恩王乃受之徳倫帥將吏拜賀王承制以徳倫為大同節度使遣之官徳倫至晉陽張承業留之時銀槍効節都在魏城猶驕横晉王下令自今有朋黨流言及暴掠百姓者殺無赦以沁州刺史李存進為天雄都巡按使有訛言揺衆及彊取人一錢已上者存進皆梟首磔尸於市旬日城中肅然無敢喧譁者張彦之以魏博歸晉也貝州刺史張源徳不從北結滄徳南連劉鄩以拒晉數斷鎮定糧道或説晉王請先發兵萬人取源徳然後東兼滄景則海隅之地皆爲我有晉王曰不然貝州城堅兵多未易猝攻徳州隷於滄州而無備若得而戍之則滄貝不得往來二壘既孤然後可取乃遣騎兵五百晝夜兼行襲徳州刺史不意晉兵至踰城走遂克之以遼州守捉將馬通爲刺史秋七月晉人夜襲澶州陷之刺史王彦章在劉鄩營晉人獲其妻子待之甚厚遣間使誘彦章彦章斬其使者晉人盡滅其家晉王以魏州李巖爲澶州刺史晉王勞軍於魏縣因帥百餘騎循河而上覘劉鄩營㑹天隂晦鄩伏兵五千於河曲叢林間皷譟而出圍王數重王躍馬大呼帥騎馳突所向披靡禆將夏魯竒等操短兵力戰自午至申乃得出亡其七騎魯竒手殺百餘人傷痍遍體㑹李存審救兵至乃得免王顧謂從騎曰幾為虜嗤皆曰適足使敵人見大王之英武耳魯竒青州人也王以是益愛之賜姓名曰李紹竒劉鄩以晉兵盡在魏州晉陽必虚欲以竒計襲取之乃潛引兵自黄澤西去晉人怪鄩軍數日不出寂無聲迹遣騎覘之城中無煙火但時見旗幟循堞往來晉王曰吾聞劉鄩用兵一步百計此必詐也更使覘之乃縛芻為人執旗乘驢在城上耳得城中老弱者詰之云軍去已二日矣晉王曰劉鄩長於襲人短於決戰計彼行纔及山下亟發騎兵追之㑹隂雨積旬黄澤道險堇泥深尺餘士卒援藤葛而進皆腹疾足腫或墜崖谷死者什二三晉將李嗣恩倍道先入晉陽城中知之勒兵為備鄩至樂平糗糧且盡又聞晉有備追兵在後衆懼將潰鄩諭之曰今去家千里深入敵境腹背有兵山谷高深如墜井中去將何之惟力戰庶幾可免不則以死報君親耳衆泣而止周徳威聞鄩西上自幽州引千騎救晉陽至土門鄩已整衆下山自邢州陳宋口踰漳水而東屯於宗城鄩軍往還馬死殆半時晉軍乏食鄩知臨清有蓄積欲據之以絶晉糧道徳威急追鄩再宿至南宫遣騎擒其斥候者數十人㫁腕而縦之使言曰周侍中已據臨清矣鄩軍大駭詰朝徳威畧鄩營而過入臨清鄩引軍趣貝州時晉王出師屯博州劉鄩軍堂邑周徳威攻之不克翌日鄩軍于莘縣晉軍踵之鄩治莘城塹而守之自莘及河築甬道以通饋餉晉王營於莘西三十里煙火相望一日數戰絳州刺史尹皓攻晉之隰州八月又攻慈州皆不克王檀與昭義留後賀瓌攻澶州抜之執李巖送東都帝以楊師厚故將楊延直爲澶州刺史使將兵萬人助劉鄩且招誘魏人晉王遣李存審將兵五千擊貝州張源徳有卒三千每夕分出剽掠州民苦之請塹其城以安耕耘存審乃發入縣丁夫塹而圍之劉鄩在莘久饋運不給晉人數抵其寨下挑戰鄩不出晉人乃攻絶其甬道以千餘斧斬寨木梁人驚擾而出因俘獲而還帝以詔書讓鄩老師費糧失亡多不速戰鄩奏稱臣比欲以竒兵擣其腹心還取鎮定期以旬時再清河朔無何天未厭亂滛雨積旬糧竭士病又欲據臨清㫁其饋餉而周楊五奄至馳突如神臣今退保莘縣享士訓兵以俟進取觀其兵數甚多便習騎射誠爲勍敵未易輕也茍有隙可乘臣豈敢偷安養冦帝復問鄩決勝之策鄩曰臣今無策惟願人給十斛糧賊可破矣帝怒責鄩曰將軍蓄米欲破賊邪欲療飢邪乃遣中使徃督戰鄩集諸將問曰主上深居禁中不知軍旅徒與少年新進輩謀之夫兵在臨機制變不可預度今敵尚彊與戰必不利柰何諸將皆曰勝負須一決曠日何待鄩黙然不悦退謂所親曰主暗臣諛將驕卒惰吾未知死所矣他日復集諸將於軍門人置河水一器於前令飲之衆莫之測鄩諭之曰一器猶難滔滔之河可勝盡乎衆失色後數日鄩將萬餘人薄鎮定營鎮定人驚擾晉李存審以騎兵二千横擊之李建及以銀槍千人助之鄩大敗犇還晉人逐之及寨下俘斬千計冬十月劉鄩遣卒詐降於晉謀賂膳夫以毒晉王事泄晉王殺之并其黨五人二年春二月帝屢趣劉鄩戰鄩閉壁不出晉王乃留副總管李存審守營自勞軍於貝州聲言歸晉陽鄩聞之奏請襲魏州帝報曰今掃境内以屬將軍社稷存亡繫茲一舉將軍勉之鄩令澶州刺史楊延直引兵萬人㑹於魏州延直夜半至城南城中選壯士五百潛出擊之延直不為備潰亂而走詰旦鄩自莘縣悉衆至城東與延直餘衆合李存審引營中兵踵其後李嗣源以城中兵出戰晉王亦自貝州至與嗣源當其前鄩見之驚曰晉王邪引兵稍却晉王躡之至故元城西與李存審遇晉王為方陳於西北存審為方陳於東南鄩為圎陳於其中間四面受敵合戰良久梁兵大敗鄩引數十騎突圍走梁步卒凡七萬晉兵環而擊之敗卒登木木枝為之折追至河上殺溺殆盡鄩收散卒自黎陽度河保滑州匡國節度使王檀宻疏請發闗西兵襲晉陽帝從之發河中陜同華諸鎮兵合三萬出隂地闗奄至晉陽城下晝夜急攻城中無備發諸司丁匠及驅市人乗城拒守城幾陷者數四張承業大懼代北故將安金全退居太原往見承業曰晉陽根本之地若失之則大事去矣僕雖老病憂兼家國請以庫甲見授為公擊之承業即與之金全帥其子弟及退將之家得數百人夜出北門擊梁兵於羊馬城内梁兵大驚引却昭義節度使李嗣昭聞晉陽有冦遣牙將石君立將五百騎救之君立朝發上黨夕至晉陽梁兵扼汾橋君立擊破之徑至城下大呼曰昭義侍中大軍至矣遂入城夜與安金全等分出諸門擊梁兵梁兵死傷什二三詰朝王檀引兵大掠而還晉王性矜伐以策非已出故金全等賞皆不行梁兵之在晉陽城下也大同節度使賀徳倫部兵多逃入梁軍張承業恐其為變收徳倫斬之帝聞劉鄩敗又聞王檀無功歎曰吾事去矣􅊨􅊨三月乙卯朔晉王攻衛州壬戌刺史米昭降之又攻惠州刺史靳紹走擒斬之復以惠州為磁州晉王還魏州􅊨上屢召劉鄩不至己巳即以鄩為宣義節度使使將兵屯黎陽夏四月晉人拔洺州以魏州都巡檢使袁建豐為洺州刺史劉鄩既敗河南大恐鄩復不應召由是將卒皆揺心􅊨􅊨六月晉人攻邢州保義節度使閻寶拒守帝遣捉生都指揮使張温將兵五百救之温以其衆降晉秋七月甲寅朔晉王至魏州八月晉王自將攻邢州昭徳節度使張筠棄相州走晉人復以相州隷天雄軍以李嗣源為刺史晉王遣人告閻寶以相州已拔又遣張温帥援兵至城下諭之寶舉城降晉王以寶為東南面招討使領天平節度使同平章事以李存審為安國節度使鎮邢州九月晉王還晉陽晉人以兵逼滄州順化節度使戴思逺棄城犇東都滄州將毛璋據城降晉晉王命李嗣源將兵鎮撫之嗣源遣璋詣晉陽晉王徙李存審為横海節度使鎮滄州以嗣源為安國節度使嗣源以安重誨為中門使委以心腹重誨亦為嗣源盡力重誨應州胡人也晉人圍貝州踰年張源徳聞河北諸州皆為晉有欲降謀於其衆衆以窮而後降恐不免死不從共殺源徳嬰城固守城中食盡噉人為糧乃謂晉將曰出降懼死請擐甲執兵而降事定而釋之晉將許之其衆三千人出降既釋甲圍而殺之盡殪晉王以毛璋為貝州刺史於是河北皆入于晉惟黎陽為梁守晉王如魏州冬十月晉王遣使如吴㑹兵以擊梁十一月吳以行軍副使徐知訓為淮北行營都招討使及朱瑾等将兵趣宋毫與晉相應既渡淮移檄州縣進圍潁州三年春正月詔宣武節度使袁象先救潁州既至呉引軍還二月甲申晉王攻黎陽劉鄩拒之數日不克而去劉鄩自滑州入朝朝議以河朔失守責之九月落鄩平章事左遷亳州團練使冬十月晉王還晉陽王連嵗出征凢軍府政事一委監軍使張承業承業勸課農桑畜積金糓收市兵馬徴租行法不寛貴戚由是軍城肅清饋餉不乏十一月晉王聞河冰合曰用兵數嵗限一冰不得度今水自合天賛我也亟如魏州十二月戊辰晉王畋于朝城是日大寒晉王視河氷已堅引步騎稍度梁甲士三千戍楊劉城緣河數十里列柵相望晉王急攻皆陷之進攻楊劉城使步卒斬其鹿角負葭葦塞塹四面進攻即日拔之獲其守將安彦之先是租庸使戸部尚書趙巖言於帝曰陛下踐阼以來尚未南郊議者以為無異藩侯為四方所輕請幸西都行郊禮遂謁宣陵敬翔諌曰自劉鄩失利以來公私困竭人心惴恐今展禮圎丘必行賞賚是募虚名而受實弊也且勍敵近在河上乗輿豈宜輕動俟北方既平報本未晩帝不聽己巳如洛陽閲車服飾宫闕郊祀有日聞楊劉失守道路訛言晉軍已入大梁扼汜水矣從官皆憂其家相顧涕泣帝惶駭失圖遂罷郊祀犇歸大梁四年春正月帝至大梁晉兵侵掠至鄆濮而還敬翔上疏曰國家連年喪師疆土日蹙陛下居深宫之中所與計事者皆左右近習豈能量敵國之勝負乎先帝之時奄有河北親御豪傑之將猶不得志今敵至鄆州陛下不能留意臣聞李亞子繼位以來于今十年攻城野戰無不親當矢石近者攻楊劉身負束薪為士卒先一皷拔之陛下儒雅守文宴安自若使賀瓌輩敵之而望攘逐冦讎非臣所知也陛下宜詢訪黎老别求異策不然憂未艾也臣雖駑怯受國重恩陛下必苦乏才乞於邊垂自効疏奏趙張之徒言翔怨望帝遂不用二月河陽節度使北面行營排陳使謝彦章將兵數萬攻楊劉城甲子晉王自魏州輕騎詣河上彦章築壘自固決河水瀰浸數里以限晉兵晉兵不得進彦章許州人也安彦之散卒多聚於兖鄆山谷為羣盜以觀二國成敗晉王招募之多降於晉夏六月壬戌晉王自魏州勞軍於楊劉自泛舟測河水其深沒槍王謂諸將曰梁軍非有戰意但欲阻水以老我師當涉水攻之甲子王引親軍先涉諸軍隨之褰甲横槍結陳而進是日水落深纔及膝匡國節度使北面行營排陳使謝彦章帥衆臨岸拒之晉兵不得進乃稍引却梁兵從之及中流皷譟復進彦章不能支稍退登岸晉兵因而乗之梁兵大敗死傷不可勝紀河水為之赤彦章僅以身免是日晉人遂陷濵河四寨秋七月晉王謀大舉入冦周徳威將幽州步騎三萬李存審將滄景步騎萬人李嗣源將邢洺步騎萬人王處直遣將將易定步騎萬人及麟勝雲蔚新武等州諸部落奚契丹室韋吐谷渾皆以兵㑹之八月并河東魏博之兵大閲於魏州晉王自魏州如楊劉引兵略鄆濮而還循河而上軍於麻家渡賀瓌謝彦章將梁兵屯濮州北行臺村相持不戰晉王好自引輕騎迫敵營挑戰危窘者數四賴李紹榮力戰翼衛之得免趙王鎔及王處直皆遣使致書曰元元之命繫於王本朝中興繫於王柰何自輕如此王笑謂使者曰定天下者非百戰何由得之安可但深居帷房以自肥乎一旦王將出營都營使李存審扣馬泣諌曰大王當爲天下自重彼先登陷陳將士之職也存審輩宜爲之非大王之事也王爲之攬轡而還它日伺存審不在策馬急出顧左右曰老子妨人戲王以數百騎抵梁營謝彦章伏精甲五千於隄下王引十餘騎發隄伏兵發圍王數十重王力戰於中後騎繼至者攻之於外僅得出㑹李存審救至梁兵乃退王始以存審之言為忠晉王欲趣大梁而梁軍扼其前堅壁不戰百餘日十二月庚子朔晉王進兵距梁軍十里而舍初北面行營招討使賀瓌善將步兵排陳使謝彦章善將騎兵瓌惡其與已齊名一日瓌與彦章治兵於野瓌指一高地曰此可以立柵至是晉軍適置柵於其上瓌疑彦章與晉通謀瓌屢欲戰謂彦章曰主上悉以國兵授吾二人社稷是賴今彊冦壓吾門而逗遛不戰可乎彦章曰彊冦憑陵利在速戰今深溝高壘據其要津彼安敢深入若輕與之戰萬一蹉跌則大事去矣瓌益疑之宻譖之於帝與行營馬步都虞候曹州刺史朱珪謀因享士伏甲殺彦章及濮州刺史孟審澄别將侯温𥙿以謀叛聞審澄温𥙿亦騎將之良者也丁未以朱珪為匡國留後癸丑又以為平盧節度使兼行營馬步副指揮使以賞之晉王聞彦章死喜曰彼將帥自相魚肉亡無日矣賀瓌殘虐失士卒心我若引軍直指其國都彼安得堅壁不動幸而一與之戰蔑不勝矣王欲自將萬騎直趣大梁周徳威曰梁人雖屠上將其軍尚全輕行徼利未見其福不從戊午下令軍中老弱悉歸魏州起師趨汴庚申毁營而進衆號十萬賀瓌聞晉王已西亦棄營而踵之晉王發魏博白丁三萬從軍以供營柵之役所至營柵立成壬戌至胡栁陂癸亥旦候者言梁兵自後至矣周徳威曰賊倍道而來未有所舎我營柵已固守備有餘既深入敵境動須萬全不可輕發此去大梁至近梁兵各念其家内懐憤激不以方畧制之恐難得志王宜按兵勿戰徳威請以騎兵擾之使彼不得休息至暮營壘未立樵爨未具乘其疲乏可一舉滅也王曰前在河上恨不見賊今賊至不擊尚復何待公何怯也顧李存審曰敇輜重先發吾為爾殿後破賊而去即以親軍先出徳威不得已引幽州兵從之謂其子曰吾無死所矣賀瓌結陳而至横亘數十里王帥銀槍都陷其陳衝盪撃斬往返十餘里行營左廂馬軍都指揮使鄭州防禦使王彦章軍先敗西走趣濮陽晉輜重在陳西望見梁旗幟驚潰入幽州陳幽州兵亦擾亂自相蹈藉周徳威不能制父子皆戰死魏博節度副使王緘與輜重俱行亦死晉兵無復部伍梁兵四集勢甚盛晉王據高丘收散兵至日中軍復振陂中有土山賀瓌引兵據之晉王謂將士曰今日得此山者勝吾與汝曹奪之即引騎兵先登李從珂與銀槍大將王建及以步卒繼之梁兵紛紛而下遂奪其山日向晡賀瓌陳於山西晉兵望之有懼色諸將以為諸軍未盡集不若歛兵還營詰朝復戰天平節度使東南面招討使閻寶曰王彦章騎兵已入濮陽山下惟步卒向晚皆有歸志我乗高趣下撃之破之必矣今王深入敵境偏師不利若復引退必為所乗諸軍未集者聞梁再克必不戰自潰凢決勝料敵惟觀情勢情勢已得㫁在不疑王之成敗在此一戰若不決力取勝縦收餘衆北歸河朔非王有也昭義節度使李嗣昭曰賊無營壘日晚思歸但以精騎擾之使不得夕食俟其引退追擊可破也我若歛兵還營彼歸整衆復來勝負未可知也王建及擐甲横槊而進曰賊大將已遁王之騎軍一無所失今擊此疲乏之衆如拉朽耳王但登山觀臣為王破賊王愕然曰非公等言吾幾誤計嗣昭建及以騎兵大呼陷陳諸軍繼之梁兵大敗元城令呉瓊貴鄉令胡裝各帥白丁萬人於山下曳柴揚塵皷譟以助其勢梁兵自相騰藉棄甲山積死亡者幾三萬人裝証之曾孫也是日兩軍所喪士卒各三之二皆不能振晉王歸營聞周徳威父子死哭之慟曰喪吾良將是吾罪也以其子幽州中軍兵馬使光輔為嵐州刺史李嗣源與李從珂相失見晉軍撓敗不知王所之或曰王已北度河矣嗣源遂乗冰北度將之相州是日從珂從王奪山晩戰皆有功甲子晉王進攻濮陽拔之李嗣源知晉軍之捷復來見王於濮陽王不悦曰公以吾為死邪度河安之嗣源頓首謝罪以從珂有功但賜大鍾酒以罰之然自是待嗣源稍薄晉軍至徳勝渡王彦章敗卒有走至大梁者曰晉人戰勝將至矣頃之晉兵有先至大梁問次舍者京城大恐帝驅市人登城又欲犇洛陽遇夜而止敗卒至者不滿千人傷夷逃散各歸鄉里月餘僅能成軍五年春正月晉李存審於徳勝南北夾河築兩城而守之晉王以存審代周徳威為内外蕃漢馬步總管晉王還魏州遣李嗣昭權知幽州軍府事三月晉王自領盧龍節度使以中門使李紹宏提舉軍府事代李嗣昭紹宏宦者也本姓馬晉王賜姓名使與知嵐州事孟知祥俱為河東魏博中門使知祥又薦教練使鴈門郭崇韜能治劇王以為中門副使崇韜倜儻有智畧臨事敢決王寵待日隆先是中門使呉珪張䖍厚相繼獲罪及紹宏出幽州知祥懼禍稱疾辭位王乃以知祥為河東馬步都虞候自是崇韜專典機宻夏四月賀瓌攻徳勝南城百道俱進以竹笮聮艨艟十餘艘䝉以牛革設睥睨戰格如城狀横於河流以斷晉之救兵使不得度晉王自引兵馳往救之陳於北岸不能進遣善游者馬破龍入南城見守將氏延賞延賞言矢石將盡陷在頃刻晉王積金帛於軍門募能破艨艦者衆莫知為計親將李建及曰賀瓌悉衆而來冀此一舉若我軍不度則彼為得計今日之事建及請以死決之乃選効節敢死士得三百人被鎧操斧帥之乗舟而進將至艨艟流矢雨集建及使操斧者入艨艟間斧其竹笮又以木甖載薪沃油然火於上流縦之隨以巨艦實甲士皷譟攻之艨艟既斷隨流而下梁兵焚溺者殆半晉兵乃得度瓌解圍走晉兵追之至濮州而還瓌退屯行臺村秋七月晉王歸晉陽以巡官馮道為掌書記中門使郭崇韜以諸將陪食者衆請省其數王怒曰孤為效死者設食亦不得專可令軍中别擇河北帥孤自歸太原即召馮道令草詞以示衆道執筆逡巡不為曰大王方平河南定天下崇韜所請未至大過大王不從可矣何必以此驚動逺近使敵國聞之謂大王君臣不和非所以隆威望也㑹崇韜入謝王乃止八月乙未朔宣義節度使賀瓌卒以開封尹王瓚為北靣行營招討使瓚將兵五萬自黎陽度河掩撃澶魏至頓丘遇晉兵而旋瓚為治嚴令行禁止據晉人上游十八里楊村夾河築壘運洛陽竹木造浮梁自滑州饋運相繼晉蕃漢馬步副總管振武節度使李存進亦造浮梁於徳勝或曰浮梁須竹笮鐵牛石囷我皆無之何以能成存進不聽以葦笮維巨艦繋於土山巨木踰月而成人服其智冬十月晉王如魏州發徒數萬廣徳勝北城日與梁人爭大小百餘戰互有勝負左射軍使石敬塘與梁人戰于河壖梁人撃敬瑭㫁其馬甲横衝兵馬使劉知逺以所乗馬授之自乗㫁甲者徐行為殿梁人疑有伏不敢迫俱得免敬瑭以是親愛之敬瑭知逺其先皆沙陀人敬瑭李嗣源之壻也十一月辛卯王瓉引兵至戚城與李嗣源戰不利梁築壘貯糧於潘張距楊村五十里十二月晉王自將騎兵自河南岸西上邀其餉者俘獲而還梁人伏兵於要路晉兵大敗晉王以數騎走梁數百騎圍之李紹榮識其旗單騎奮擊救之僅免戊戌晉王復與王瓉戰於河南瓉先勝獲晉將石君立等既而大敗乗小舟度河走保北城失亡萬計帝聞石君立勇欲將之繫於獄而厚餉之使人誘之君立曰我晉之敗將而爲用於梁雖竭誠効死誰則信之人各有君何忍反為仇讎用哉帝猶惜之盡殺所獲晉將獨置君立晉王乗勝遂拔濮陽帝召王瓚還以天平節度使戴思逺代為北面招討使屯河上以拒晉人六年夏四月河中節度使冀王友謙以兵襲取同州逐忠武節度使程全暉全暉犇大梁友謙以其子令徳為忠武留後表求節鉞帝怒不許既而懼友謙怨望己酉以友謙兼忠武節度使制下友謙已求節鉞於晉王晉王以墨制除令徳忠武節度使六月帝以泰寧節度使劉鄩為河東道招討使帥感化節度使尹皓静勝節度使温昭圖莊宅使段凝攻同州閏月劉鄩等圍同州朱友謙求救于晉秋七月晉王遣李存審李嗣昭李建及慈州刺史李存質將兵救之九月李存審等至河中即日濟河梁人素輕河中河中兵每戰必窮追不置存審選精甲二百雜河中兵直壓劉鄩壘鄩出千騎逐之知晉人已至大驚自是不敢輕出晉人軍于朝邑河中事梁人將士皆持兩端諸軍大集芻粟踊貴友謙諸子説友謙且歸欵於梁以退其師友謙曰昔晉王親赴吾急秉燭夜戰今方與梁相拒又命將星行分我資糧豈可負邪晉人分兵攻華州壞其外城李存審等按兵累旬乃進逼劉鄩營鄩等悉衆出戰大敗收餘衆退保羅文寨又旬餘存審謂李嗣昭曰獸窮則搏不如開其走路然後擊之乃遣人牧馬於沙苑鄩等宵遁追撃至渭水又破之殺獲甚衆存審等移檄告諭闗右引兵畧地至下邽謁唐帝陵哭之而還河中兵進攻崇州龍徳元年春正月蜀主吳王屢以書勸晉王稱帝晉王以書示僚佐曰昔王太師亦嘗遺先王書勸以唐室已亡宜自帝一方先王語余云昔天子幸石門吾發兵誅賊臣當是之時威振天下吾若挾天子據闗中自作九錫禪文誰能禁我顧吾家世忠孝立功帝室誓死不為耳汝它日當務以復唐社稷為心慎勿効此曹所為言猶在耳此議非所取聞也因泣既而將佐及藩鎮勸進不巳乃令有司市玉造法物黄巢之破長安也魏州僧傳真之師得傳國寶藏之四十年至是傳真以為常玉將鬻之或識之曰傳國寶也傳真乃詣行臺獻之將佐皆奉觴稱賀張承業在晉陽聞之亟詣魏州諌曰吾王世世忠於唐室救其患難所以老奴三十餘年為王捃拾財賦召補兵馬誓滅逆賊復本朝宗社耳今河北甫定朱氏尚存而王遽即大位殊非従來征伐之意天下其誰不解體乎王何不先滅朱氏復列聖之深讎然後求唐後而立之南取呉西取蜀汛掃宇内合為一家當是之時雖使高祖太宗復生誰敢居王上者讓之愈久則得之愈堅矣老奴之志無它但以受先王大恩欲為王立萬年之基耳王曰此非余所願柰羣下意何承業知不可止慟哭曰諸侯血戰本為唐家今王自取之誤老奴矣即歸晉陽邑邑成疾不復起二月趙王鎔養子張文禮使親軍殺鎔盡滅王氏之族獨置其子昭祚之妻普寧公主以自託於梁三月文禮遣使告亂于晉王且奉牋勸進固求節鉞晉王欲討之僚佐以為吾方與梁争不可更立敵於肘腋且従其請以安之王不得已夏四月承制授文禮成徳留後初劉鄩與朱友謙為昏鄩之受詔討友謙也至陜州先遣使移書諭以禍福待之月餘友謙不従然後進兵尹皓段凝素忌鄩因譖之於帝曰鄩逗遛養冦俾俟授兵帝信之鄩既敗歸以疾請解兵柄詔聽於西都就醫宻令留守張宗奭酖之五月丁亥卒秋七月晉王既許藩鎮之請求唐舊臣欲以備百官朱友謙遣前禮部尚書蘇循詣行臺循至魏州入牙城望府廨即拜謂之拜殿見王呼萬嵗舞蹈泣而稱臣翌日又獻大筆三十枝謂之畫日筆王大喜即令循以本官為河東節度副使張承業深惡之張文禮雖受晉命内不自安復遣間使因盧文進求援於契丹又遣間使告曰王氏為亂兵所屠公主無恙今臣已北召契丹乞朝廷發精甲萬人相助自徳棣度河則晉人遁逃不暇矣帝疑未决敬翔曰陛下不乘此舋以復河北則晉人不可復破矣宜徇其請不可失也趙張輩皆曰今彊冦近在河上盡吾兵力以拒之猶懼不支何暇分萬人以救張文禮乎且文禮坐持兩端欲以自固於我何利焉帝乃止晉人屢於塞上及河津獲文禮蠟丸絹書晉王皆遣使歸之文禮慙懼文禮忌趙故將多所誅㓕趙將符習將兵萬人従晉王在徳勝文禮請召歸以它將代之且以習子䝉為都督府參軍遣人齎錢帛勞行營將士以悦之習見晉王泣涕請留晉王曰吾與趙王同盟討賊義猶骨肉不意一旦禍生肘腋吾誠痛之汝茍不忘舊君能為之復讐乎吾以兵糧助汝習與部將三十餘人舉身投地慟哭曰故使授習等劒使之攘除冦敵自聞變故以來寃憤無訴欲引劒自剄顧無益於死者今大王念故使輔佐之勤許之復寃習等不敢煩霸府之兵願以所部徑前搏取凶豎以報王氏累世之恩死不恨矣八月庚申晉王以習為成徳留後又命天平節度使閻寶相州刺史史建瑭將兵助之自邢洺而北文禮先病腹疽甲子晉兵拔趙州刺史王鋋降晉王復以爲刺史文禮聞之驚懼而卒其子處瑾祕不發喪與其黨韓正時謀悉力拒晉九月晉兵渡滹沱圍鎭州决漕渠以灌之獲其深州刺史張友順壬辰史建瑭中流矢卒晉王欲自分兵攻鎭州北面招討使戴思逺聞之謀悉楊村之衆襲徳勝北城晉王得梁降者知之冬十月己未晉王命李嗣源伏兵於戚城李存審屯徳勝先以騎兵誘之僞示羸怯梁兵競進晉王嚴中軍以待之梁兵至晉王以鐵騎三千奮擊梁兵大敗思逺走趣楊村士卒為晉兵所殺傷及自相蹈藉墜河陷水失亡二萬餘人晉王以李嗣源為蕃漢内外馬步副總管同平章事十一月晉王使李存審李嗣源守徳勝自將兵攻鎮州張處瑾遣其弟處珙幕僚齊儉謝罪請服晉王不許盡鋭攻之旬日不克處瑾使韓正時將千騎突圍出趣定州欲求救於王處直晉兵追至行唐斬之二年晉王之北攻鎮州也李存審謂李嗣源曰梁人聞我在南兵少不攻徳勝必襲魏州吾二人聚於此何為不若分軍備之遂分軍屯澶州戴思逺果悉楊村之衆趣魏州嗣源引兵先之軍於狄公祠下遣人告魏州使為之備思逺至魏店嗣源遣其將石萬全將騎兵挑戰思逺知有備乃西度洹水㧞成安大掠而還又將兵五萬攻徳勝北城重塹複壘㫁其出入晝夜急攻之李存審悉力拒守晉王聞徳勝勢危二月自幽州赴之五日至魏州思逺聞之燒營遁還楊村晉天平節度使兼侍中閻寶築壘以圍鎮州決呼沱水環之内外㫁絶城中食盡丙午遣五百餘人出求食寶縦其出欲伏兵取之其人遂攻長圍寶輕之不為備俄數千人繼至諸軍未集鎮人遂壞長圍而出縦火攻寶營寶不能拒退保趙州鎮人悉毁晉之營壘取其芻粟數日不盡晉王聞之以昭義節度使兼中書令李嗣昭為北面招討使以代寶夏四月甲戌張處瑾遣兵千人迎糧於九門李嗣昭設伏於故營邀擊之殺獲殆盡餘五人匿於牆墟間嗣昭環馬而射之鎮兵發矢中其腦嗣昭箙中矢盡㧞矢於腦以射之一發而殪㑹日暮還營創流血不止是夕卒晉王聞之不御酒肉者累日嗣昭遺命悉以澤潞兵授節度判官任圜使督諸軍攻鎮州號令如一鎮人不知嗣昭之死圜三原人也晉王以天雄馬歩都指揮使振武節度使李存進為北面招討使閻寶慙憤疽發於背甲戌卒五月乙酉晉李存進至鎮州營于東垣渡夾呼沱水為壘晉衛州刺史李存儒本姓楊名婆兒以俳優得幸於晉王頗有膂力晉王賜姓名以為刺史專事掊歛防城卒皆徴月課縦歸八月莊宅使段凝與歩軍都指揮使張朗引兵夜度河襲之詰旦登城執存儒遂克衛州戴思逺又與凝攻陷淇門共城新鄉於是澶州之西相州之南皆為梁有晉人失軍儲三之一梁軍復振帝以張朗為衛州刺史朗徐州人也九月戊寅朔張處瑾使其弟處球乘李存進無備將兵士千人奄至東垣渡時晉之騎兵亦向鎮州城下兩不相遇鎮兵及存進營門存進狼狽引十餘人鬬于橋上鎮兵退晉騎兵㫁其後夾撃之鎮兵殆盡存進亦戰沒晉王以蕃漢馬歩總管李存審為北面招討使鎮州食竭力盡處瑾遣使詣行臺請降未報存審兵至城下丙午夜城中將李再豐為内應宻投縋以納晉兵比明畢登執處瑾兄弟家人及其黨高濛李翥齊儉送行臺趙人皆請而食之磔張文禮尸於市趙王故侍者得趙王遺骸於灰燼中晉王命祭而葬之以趙將符習為成徳節度使烏震為趙州刺史趙仁貞為深州刺史李再豐為冀州刺史震信都人也符習不敢當成徳辭曰故使無後而未葬習當斬衰以葬之俟禮畢聽命既葬即詣行臺趙人請晉王兼領成徳節度使従之晉王割相衛二州置義寧軍以習為節度使習辭曰魏博覇府不可分也願得河南一鎮習自取之乃以為天平節度使東南面招討使加李存審兼侍中後唐莊宗同光元年春三月晉王築壇於魏州牙城之南夏四月己巳升壇祭告上帝遂即皇帝位國號大唐大赦改元以魏州為興唐府建東京又於太原府建西京又以鎮州為真定府建北都時唐國所有凢十三節度五十州時契丹屢入宼抄掠饋運幽州食不支半年衛州為梁所取潞州内叛人情岌岌以為梁未可取帝患之㑹鄆州將盧順宻來犇先是梁天平節度使戴思逺屯楊村留順宻與巡檢使劉遂嚴都指揮使燕顒守鄆州順宻言於帝曰鄆州守兵不滿千人遂嚴顒皆失衆心可襲取也郭崇韜等皆以為懸軍逺襲萬一不利虚棄數千人順宻不可従帝宻召李嗣源於帳中謀之曰梁人志在吞澤潞不備東方若得東平則潰其心腹東平果可取乎嗣源自胡柳有度河之慙常欲立竒功以補過對曰今用兵嵗久生民疲弊茍非出竒取勝大功何由可成臣願獨當此役必有以報帝悦壬寅遣嗣源將所部精兵五千自徳勝趣鄆州比及楊劉日已暮隂雨道黑將士皆不欲進高行周曰此天賛我也彼必無備夜度河至城下鄆人不知李從珂先登殺守卒啓闗納外兵進攻牙城城中大擾癸卯旦嗣源兵盡入遂㧞牙城劉遂嚴燕顒犇大梁嗣源禁焚掠撫吏民執知州事節度副使崔簹判官趙鳯送興唐帝大喜曰緫管眞竒才吾事集矣即以嗣源爲天平節度使梁主聞鄆州失守大懼斬劉遂嚴燕顒於市罷戴思逺招討使降授宣化留後遣使詰讓北面諸將段凝王彦章等趣令進戰敬翔知梁室已危以繩内靴中入見梁王曰先帝取天下不以臣爲不肖所言無不用今敵勢益彊而陛下棄忽臣言臣身無用不如死引繩將自經梁主止之問所欲言翔曰事急矣非用王彦章為大將不可救也梁主従之以彦章代思逺為北面招討使仍以段凝為副帝聞之自將親軍屯澶州命蕃漢馬歩都虞候朱守殷守徳勝戒之曰王鐵槍勇决乘憤激之氣必來唐突宜謹備之梁主召問王彦章以破敵之期彦章對曰三日左右皆失笑彦章出兩日馳至滑州辛酉置酒大㑹隂遣人具舟於楊村夜命甲士六百皆持巨斧載冶者具鞴炭乘流而下㑹飲尚未散彦章陽起更衣引精兵數千循河南岸趨徳勝天微雨朱守殷不為備舟中兵舉鏁燒㫁之因以巨斧斬浮橋而彦章引兵急擊南城浮橋㫁南城遂破斬首數千級時受命適三日矣守殷以小舟載甲士濟河救之不及彦章進攻潘張麻家口景店諸寨皆拔之聲勢大振帝遣宦者焦彦賔急趣楊劉與鎮使李周固守命守殷棄徳勝北城撤屋材為栰載兵械浮河東下助楊劉守備徙其芻糧薪炭於澶州所耗失殆半王彦章亦撤南城屋材浮河而下各行一岸每遇灣曲輙於中流交鬬飛矢雨集或全舟覆沒一日百戰互有勝負比及楊劉殆亡士卒之半己巳王彦章段凝以十萬之衆攻楊劉百道俱進晝夜不息連巨艦九艘横亘河津以絶援兵城垂陷者數四賴李周悉力拒之與士卒同甘苦彦章不能克退屯城南為連營以守之楊劉告急於帝請日行百里以赴之帝引兵救之曰李周在内何憂日行六十里不廢畋獵六月乙亥至楊劉梁兵塹壘重複嚴不可入帝患之問計於郭崇韜對曰今彦章據守津要意謂可以坐取東平茍大軍不南則東平不守矣臣請築壘於愽州東岸以固河津既得以應接東平又可以分賊兵勢但慮彦章詗知徑來薄我城不能就願陛下募敢死之士日令挑戰以綴之茍彦章旬日不東則城成矣時李嗣源守鄆州河北聲問不通人心漸離不保朝夕㑹梁右先鋒指揮使康延孝宻請降於嗣源延孝者太原胡人有罪亡犇梁時隷段凝麾下嗣源遣押牙臨漳范延光送延孝蠟書詣帝延光因言於帝曰楊劉控扼已固梁人必不能取請築壘馬家口以通鄆州之路帝従之遣崇韜將萬人夜發倍道趣博州至馬家口度河築城晝夜不息帝在楊劉與梁人晝夜苦戰崇韜築新城凢六日王彦章聞之將兵數萬人馳至戊子急攻新城連巨艦十餘艘於中流以絶援路時版築僅畢城猶卑下沙土䟽惡未有樓櫓及守備崇韜慰諭士卒以身先之四面拒戰遣間使告急於帝帝自楊劉引大軍救之陳於新城西岸城中望之增氣大呼叱梁軍梁人㫁紲歛艦帝檥舟将度彦章解圍退保鄒家口鄆州奏報始通李嗣源宻表請正朱守殷覆軍之罪帝不従秋七月丁未帝引兵循河而南彦章等棄鄒家口復趣楊劉甲寅遊奕將李紹興敗梁遊兵於清丘驛南段凝以為唐兵已自上流渡驚駭失色面數彦章尤其深入戊午帝遣騎將李紹榮直抵梁營擒其斥候梁人益恐又以火栰焚其連艦王彦章等聞帝引兵已至鄒家口己未解楊劉圍走保楊村唐兵追逐之復屯徳勝梁兵前後急攻諸城士卒遭矢石溺水暍死者且萬人委棄資糧鎧仗鍋幕動以千計楊劉比至圍解城中無食已三日矣王彦章疾趙張亂攻及為招討使謂所親曰待我成功還當盡誅姦臣以謝天下趙張聞之私相謂曰我輩寧死於沙陀不可為彦章所殺相與恊力傾之段凝素疾彦章之能而諂附趙張在軍中與彦章動相違戾百方沮撓之惟恐其有功潛伺彦章過失以聞於梁主毎㨗奏至趙張悉歸功於凝由是彦章功竟無成及歸楊村梁主信䜛猶恐彦章旦夕成功難制徴還大梁使將兵㑹董璋攻澤州甲子帝至楊劉勞李周曰微卿善守吾事敗矣八月甲戌帝自楊劉還興唐梁主命於滑州决河東注曹濮及鄆以限唐兵初梁主遣段凝監大軍於河上敬翔李振屢請罷之梁主曰凝未有過振曰俟其有過則社稷危矣至是凝厚賂趙張求為招討使翔振力争以為不可趙張主之竟代王彦章為北面招討使於是宿將憤怒士卒亦不服天下兵馬副元帥張元奭言於梁主曰臣為副元帥雖衰朽猶足為陛下扞禦北方段凝晩進功名未能服人衆議詾詾恐貽國家深憂敬翔曰將帥繫國安危今國勢已爾陛下豈可尚不留意邪梁主皆不聼戊子凝將全軍五萬營于王村自高陵津濟河剽掠澶州諸縣至于頓丘梁主又命王彦章將保鑾騎士及它兵合萬人屯兖鄆之境謀復鄆州以張漢傑監其軍庚寅帝引兵屯朝城戊戌康延孝帥百餘騎來犇帝解所御錦𫀆玉帶賜之以為南面招討都指揮使領博州刺史帝屏人問延孝以梁事對曰梁朝地不為狹兵不為少然迹其行事終必敗亡何則主既暗懦趙張兄弟擅權内結宫掖外納貨賂官之高下唯視賂之多少不擇才徳不校勲勞段凝智勇俱無一旦居王彦章霍彦威之右自將兵以來專率歛行伍以奉權貴梁主毎出一軍不能專任將帥常以近臣監之進止可否動為所制近又聞欲數道出兵令董璋引陜虢澤潞之兵自石㑹闗趣太原霍彦威以汝洛之兵自相衛邢洺冦鎮定王彦章張漢傑以禁軍攻鄆州段凝杜晏球以大軍當陛下决以十月大舉臣竊觀梁兵聚則不少分則不多願陛下養勇蓄力以待其分兵帥精騎五千自鄆州直抵大梁擒其偽主旬月之間天下定矣帝大悦九月帝在朝城梁段凝進至臨河之南澶西相南日有冦掠自徳勝失利以來喪芻糧數百萬租庸副使孔謙暴歛以供軍民多流亡租税益少倉廪之積不支半嵗澤潞未下盧文進王郁引契丹屢過瀛涿之南傳聞俟草枯水合深入為冦又聞梁人欲大舉數道入冦帝深以為憂召諸將㑹議宣徽使李紹宏等皆以為鄆州城門之外皆為冦境孤逺難守有之不如無之請以易衛州及黎陽於梁以之約和以河為境休兵息民俟財力稍集更圖後舉帝不悦曰如此吾無葬地矣乃罷諸將獨召郭崇韜問之對曰陛下不櫛沐不解甲十五餘年其志欲以雪家國之讎恥也今已正尊號河北士庶日望升平始得鄆州尺寸之地不能守而棄之安能盡有中原乎臣恐將士解體將來食盡衆散雖畫河爲境誰爲陛下守之臣嘗細詢康延孝以河南之事度已料彼日夜思之成敗之機决在今嵗梁今悉以精兵授段凝據我南鄙又決河自固謂我猝不能渡恃此不復爲備使王彦章侵逼鄆州其意冀有姦人動揺變生於内耳段凝本非將材不能臨機决策無足可畏降者皆言大梁無兵陛下若留兵守魏固保楊劉自以精兵與鄆州合勢長驅入汴彼城中既空虚必望風自潰茍僞主授首則諸將自降矣不然今秋糓不登軍糧將盡若非陛下决志大功何由可成諺曰當道築室三年不成帝王應運必有天命在陛下勿疑耳帝曰此正合朕志丈夫得則為王失則為虜吾行决矣司天奏今嵗天道不利深入必無功帝不聴王彦章引兵踰汶水將攻鄆州李嗣源遣李従珂將騎兵逆戰敗其前鋒於逓坊鎮獲將士三百人斬首二百級彦章退保中都戊辰捷奏至朝城帝大喜謂郭崇韜曰鄆州告捷足壮吾氣己巳命將士悉遣其家歸興唐冬十月帝遣魏國夫人劉氏皇子繼岌歸興唐與之訣曰事之成敗在此一决若其不濟當聚吾家於魏宫而焚之仍命豆盧革李紹宏張憲王正言同守東京壬申帝以大軍自楊劉濟河癸酉至鄆州中夜進軍踰汶以李嗣源為前鋒甲戌旦遇梁兵一戰敗之追至中都圍其城城無守備少頃梁兵潰圍出追擊破之王彦章以數十騎走龍武大將軍李紹竒單騎追之識其聲曰王鐵槍也㧞矟刺之彦章重傷馬躓遂擒之并擒都監張漢傑曹州刺史李知節禆將趙廷隠劉嗣彬等二百餘人斬首數千級廷隠開封人嗣彬知俊之族子也彦章嘗謂人曰李亞子鬬雞小兒何足畏至是帝謂彦章曰爾常謂我小兒今日服未又問爾名善將何不守兖州中都無壁壘何以自固彦章對曰天命已去無足言者帝惜彦章之材欲用之賜藥傳其創屢遣人誘諭之彦章曰余本匹夫䝉梁恩位至上將與皇帝交戰十五年今兵敗力窮死自其分縦皇帝憐而生我我何面目見天下之人乎豈有朝為梁將暮為唐臣此我所不為也帝復遣李嗣源自往諭之彦章卧謂嗣源曰汝非邈佶烈乎彦章素輕嗣源故以小名呼之於是諸將稱賀帝舉酒屬李嗣源曰今日之功公與崇韜之力也曏従紹宏輩語大事去矣帝又謂諸將曏所患惟王彦章今已就擒是天意滅梁也段凝猶在河上進退之計宜何向而可諸將以為傳者雖云大梁無備未知虚實今東方諸鎮兵皆在段凝麾下所餘空城耳以陛下天威臨之無不下者若先廣地東傳干海然後觀釁而動可以萬全康延孝固請亟取大梁李嗣源曰兵貴神速今彦章就擒段凝必未之知就使有人走告之疑信之間尚須三日設若知吾所向即發救兵直路則阻決河湏自白馬南渡數萬之衆舟檝亦難猝辦此去大梁至近前無山險方陳横行晝夜兼程信宿可至段凝未離河上友貞已為吾擒矣延孝之言是也請陛下以大軍徐進臣願以千騎前驅帝従之令下諸軍皆踊躍願行是夕嗣源帥前軍倍道趣大梁乙亥帝發中都舁王彦章自隨遣中使問彦章曰吾此行克乎對曰段凝有精兵六萬雖主將非材亦未肯遽爾倒戈殆難克也帝知其終不為用遂斬之丁丑至曹州梁守將降王彦章敗卒有先至大梁告梁主以彦章就擒唐軍長驅且至者梁主聚族哭曰運祚盡矣召羣臣問策皆莫能對梁主謂敬翔曰朕居常忽卿所言以至於此今事急矣卿勿以為懟將若之何翔泣曰臣受先帝厚恩殆將三紀名為宰相其實朱氏老奴事陛下如郎君臣前後獻言莫匪盡忠陛下初用段凝臣極言不可小人朋比致有今日今唐兵且至段凝限於水北不能赴救臣欲請陛下出居避狄陛下必不聽従欲請陛下出竒合戰陛下必不果决雖使良平更生誰能為陛下計者臣願先賜死不忍見宗廟之亡也因與梁主相向慟哭梁主遣張漢倫馳驅追段凝軍漢倫至滑州墜馬傷足復限水不能進時城中尚有控鶴軍數千朱珪請帥之出戰梁主不従命開封尹王瓉驅市人乘城為備初梁陜州節度使邵王友誨全昱之子也性穎悟人心多向之或言其誘致禁軍欲為亂梁主召還與其兄友諒友能並幽于别第及唐師將至梁主疑諸兄弟乘危謀亂并皇弟賀王友雍建王友徽盡殺之梁主登建國樓面擇親信厚賜之使衣野服齎蠟詔促段凝軍既辭皆亡匿或請幸洛陽收集諸軍以拒唐唐雖得都城勢不能久留或請幸段凝軍控鶴都指揮使皇甫麟曰凝本非將材官由幸進今危窘之際望其臨機制勝轉敗為功難矣且凝聞彦章軍敗其膽已破安知能終為陛下盡節乎趙巖曰事勢如此一下此樓誰心可保梁主乃止復召宰相謀之鄭珏請自懷傳國寶詐降以紓國難梁主曰今日固不敢愛寶但如卿此策竟可了否珏俯首乆之曰但恐未了左右皆縮頸而笑梁主日夜涕泣不知所為置傳國寶於卧内忽失之已為左右竊之迎唐軍矣戊寅或告唐軍已過曹州塵埃漲天趙巖謂従者曰吾待温許州厚必不負我遂犇許州梁主謂皇甫麟曰李氏吾世讎理難降首不可俟彼刀鋸吾不能自裁卿可斷吾首麟泣曰臣為陛下揮劒死唐軍則可矣不敢奉此詔梁主曰卿欲賣我邪麟欲自剄梁主持之曰與卿俱死麟遂弑梁主因自殺梁主為人温恭儉約無荒滛之失但寵信趙張使擅威福踈棄敬李舊臣不用其言以至於亡己卯旦李嗣源軍至大梁攻封丘門王瓚開門出降嗣源入城撫安軍民是日帝入自梁門百官迎謁於馬首拜伏請罪帝慰勞之使各復其位李嗣源迎賀帝喜不自勝手引嗣源衣以頭觸之曰吾有天下卿父子之功也天下與爾共之帝命訪求梁主頃之或以其首獻李振謂敬翔曰有詔洗滌吾輩相與朝新君乎翔曰吾二人為梁宰相君昏不能諫國亡不能救新君若問將何辭以對是夕未曙或報翔曰崇攻李太保已入朝矣翔歎曰李振謬為丈夫朱氏與新君世為仇讎今國亡君死縦新君不誅何面目入建國門乎乃縊而死庚辰梁百官復待罪於朝堂帝宣敕赦之趙巖至許州温昭圖迎謁歸第斬首來獻盡沒巖所齎之貨昭圖復名韜辛巳詔王瓉收朱友貞尸殯於佛寺漆其首函之藏於太社段凝自滑州濟河入援以諸軍排陳使杜晏球爲前鋒至封丘遇李従珂晏球先降壬午凝將其衆五萬至封丘亦解甲請降凝帥諸大將先詣闕待罪帝勞賜之慰諭士卒使各復其所凝出入公卿間揚揚自得無愧色梁之舊臣見者皆欲齕其面抉其心丙戌詔貶梁中書侍郎同平章事鄭珏為萊州司戸蕭頃爲登州司戸翰林學士劉岳爲均州司馬任贊爲房州司馬姚顗爲復州司馬封翹爲唐州司馬李懌爲懷州司馬竇夢徵爲沂州司馬崇政學士劉光素爲宻州司戸陸崇爲安州司戸御史中丞王權爲隨州司戸以其世受唐恩而仕梁貴顯故也岳宗龜之從子顗萬年人翹敖之孫懌京兆人權龜之孫也段凝杜晏球上言僞梁要人趙巖趙鵠張希逸張漢倫張漢傑張漢融朱珪等竊弄威福殘蠧羣生不可不誅詔敬翔李振首佐朱温共傾唐祚契丹撒刺阿撥叛兄棄母負恩背國宜與巖等並族誅於市自餘文武將吏一切不問又詔追廢朱温朱友貞為庶人毁其宗廟神主帝之與梁戰於河上也梁拱宸左廂都指揮使陸思鐸善射常於笴上自鏤姓名射帝中馬鞍帝拔箭藏之至是思鐸從衆俱降帝出箭示之思鐸伏地待罪帝慰而釋之尋授龍武右廂都指揮使以豆盧革尚在魏命樞宻使郭崇韜權行中書事梁諸藩鎮稍稍入朝或上表待罪帝皆慰釋之宋州節度使袁象先首來入朝陝州留後霍彦威次之象先輦珍貨數十萬徧賂劉夫人及權貴伶官宦者旬日中外爭舉之恩寵隆異己丑詔偽庭節度觀察防禦團練使刺史及諸將校並不議改更將校官吏先犇偽庭者一切不問庚寅豆盧革至自魏甲午加崇韜守侍中領成德節度使崇韜權兼内外謀猷規益竭忠無隠頗亦薦引人物豆盧革受成而已無所裁正丙辰賜滑州留後段凝姓名曰李紹欽耀州刺史杜晏球曰李紹䖍乙酉梁西都留守河南尹張宗奭來朝復名全義獻幣馬千計帝命皇子繼岌皇弟存紀等兄事之帝欲發梁太祖墓斵棺焚其尸全義上言朱温雖國之深讎然其人已死刑無可加屠滅其家足以為報乞免焚斵以存聖恩帝從之但鏟其闕室削封樹而已戊戌加天平節度使李嗣源兼中書令以北京留守繼岌為東京留守同平章事帝遣使宣諭諭諸道梁所除節度使五十餘人皆上表入貢郭崇韜上言河南節度使刺史上表者但稱姓名未新除官恐負憂疑十一月始降制以新官命之癸卯河中節度使朱友謙入朝張全義請帝迁都洛陽従之乙巳賜朱友謙姓名曰李繼麟命繼岌兄事之以康延孝爲鄭州防禦使賜姓名曰李紹琛廢北都復爲成徳軍賜宣武節度使袁象先姓名曰李紹安匡國節度使温韜入朝賜姓名曰李紹冲紹冲多齎金帛賂劉夫人及權貴伶官旬日復遣還鎮郭崇韜曰國家爲唐雪恥温韜發唐山陵殆徧其罪與朱温相捋耳何得復居方鎮天下義士其謂我何上曰入沛之初已赦其罪竟遣之初梁均王將祀南郊於洛陽聞楊劉陷而止其儀物具在張全義請上亟幸洛陽謁廟畢即祀南郊従之丙辰復以梁東京爲宣府軍詔文武官先詣洛陽甲子帝發大梁十二月庚午至洛陽二年春二月己巳朔上祀南郊大赦莊宗滅蜀後梁均王乾化三年蜀太子元膺豭喙齙齒目視不正而警敏知書善騎射性狷急猜忍蜀主命杜光庭選純静有徳者使侍東宫光庭薦儒者許寂徐簡夫太子未嘗與之交言日與樂工羣小嬉戲無度僚屬莫敢諫秋七月蜀主將以七夕出逰丙午太子召諸王大臣宴飲集王宗翰内樞宻使潘峭翰林學士承旨高陽毛文錫不至太子怒曰集王不來必峭與文錫離間也大昌軍使徐瑶常謙素為太子所親信酒行屢目少保唐道襲道襲懼而起丁未旦太子入白蜀主曰潘峭毛文錫離間兄弟蜀主怒命貶逐峭文錫以前武泰節度使兼侍中潘炕為内樞宻使太子出道襲入蜀主以其事告之道襲曰太子謀作亂欲召諸將諸王以兵錮之然後舉事耳蜀主疑焉遂不出道襲請召屯營兵入宿衛許之内外戒嚴太子初不為備聞道襲召兵乃以天武甲士自衛捕潘峭毛文錫至檛之幾死囚諸東宫又捕成都尹潘嶠囚諸得賢門戊申徐瑶常謙與懐勝軍使嚴璘等各帥所部兵奉太子攻道襲至清風樓道襲引屯營兵出拒戰道襲中流矢逐至城西斬之殺屯營兵甚衆中外驚擾潘炕言於蜀主曰太子與唐道襲争權耳無它志也陛下宜面諭大臣以安社稷蜀主乃召兼中書令王宗侃王宗賀前利州團練使王宗魯等使發兵討為亂者徐瑶常謙等宗侃等陳於西毬塲門兼侍中王宗黯自太安門梯城而入與瑶謙戰於㑹同殿前殺數十人餘衆皆潰瑶死謙與太子犇龍躍池匿於艦中及暮稍定己酉旦太子出就舟人匄食舟人以告蜀主遣集王宗翰往慰撫之比至太子已為衛士所殺蜀主疑宗翰殺之大慟不已左右恐事變㑹張格呈慰諭軍民牓讀至不行斧鉞之誅將誤社稷之計蜀主收涕曰朕何敢以私害公於是下詔廢太子元膺爲庶人宗翰奏誅手刃太子者元膺左右坐誅死者數十人貶竄者甚衆庚戌贈唐道襲太帥謚忠壮復以潘峭爲樞宻使冬十月蜀潘炕屢請立太子蜀主以雅王宗輅類已信王宗傑才敏欲擇一人立之鄭王宗衍最㓜其母徐賢妃有寵欲立其子使飛龍使唐文扆諷張格上表請立宗衍格夜以表示功臣王宗侃等詐云受宻旨衆皆署名蜀主令相者視諸子亦希旨言鄭王相最貴蜀主以爲衆人實欲立宗衍不得已許之曰宗衍㓜懦能堪其任乎甲午立宗衍為太子四年春正月丙子蜀主命太子判六軍開崇勲府置僚屬至境上而别秋八月戊子以内樞宻使潘峭為武泰軍節度使同平章事翰林學士承旨毛文錫為禮部尚書判樞宻院貞明三年秋七月蜀飛龍使唐文扆居中用事張格附之與司徒判樞宻院事毛文錫争權文錫將以女適左僕射兼中書侍郎同平章事庾傳素之子㑹親族於樞宻院用樂不先表聞蜀主聞樂聲怪之文扆従而譖之八月庚寅貶文錫茂州司馬其子司封員外郎詢流維州籍沒其家貶文錫弟翰林學士文晏爲榮經尉傳素罷爲工部尚書以翰林學士承旨庾凝績權判内樞宻院事凝績傳素之再從弟也四年蜀太子衍好酒色樂遊戲蜀主嘗自夾城過聞太子與諸王鬪雞擊毬喧呼之聲歎曰吾百戰以立基業此輩其能守之乎由是惡張格而徐賢妃爲之内主竟不能去也信王宗傑有才略屢陳時政蜀主賢之有廢立意二月癸亥宗傑暴卒蜀主深疑之蜀主自永平末得疾昏瞀至是增劇以北面行營招討使兼中書令王宗弼沉静有謀五月召還以爲馬歩都指揮使乙亥召大臣入寢殿告之曰太子仁弱朕不能違諸公之請踰次而立之若其不堪大業可寘諸别宫幸勿殺之但王氏子弟諸公擇而輔之徐妃兄弟止可優其禄位慎勿使之掌兵預政以全其宗族内飛龍使唐文扆久典禁兵參預機宻欲去諸大臣遣人守宫門王宗弼輩三十餘人日至朝堂不得入見文扆屢以蜀主之命慰撫之伺蜀主殂即作難遣其黨内皇城使潘在迎偵察外事在迎以其謀告宗弼等宗弼等排闥入言文扆之罪以天冊府掌書記崔延昌權判六軍事召太子入侍疾丙子貶唐文扆為眉州刺史翰林學士承旨王保晦坐附㑹文扆削官爵流瀘州在迎炕之子也丙申蜀主詔中外財賦中書除授諸司刑獄案牘專委庾凝績都城及行營軍旅之事委宣徽南院使宋光嗣丁酉削唐文扆官爵流雅州辛丑以宋光嗣為内樞宻使與兼中書令王宗弼宗瑶宗綰宗䕫並受遺詔輔政初蜀主雖因唐制置樞宻使專用士人及唐文扆得罪蜀主以諸將多許州故人恐其不為幼主用故以光嗣代之自是官者始用事六月壬寅朔蜀主殂癸卯太子即皇帝位尊徐賢妃為太后徐淑妃為太妃以宋光嗣判六軍諸衛事乙卯殺唐文扆王保晦命西面招討副使王宗昱殺天雄節度使唐文裔於秦州免左保勝軍使領右街使唐道崇官蜀唐文扆既死太傅門下侍郎同平章事張格内不自安或勸格稱疾俟命禮部尚書楊玢自恐失勢謂格曰公有援立大功不足憂也庚午貶格為茂州刺史玢為榮經尉吏部侍郎許寂户部侍郎潘嶠皆坐格黨貶官格尋再貶維州司户秋七月壬申朔蜀主以兼中書令王宗弼為鉅鹿王宗瑶為臨淄王宗綰為臨洮王宗播為臨潁王宗裔宗䕫及兼侍中宗黯皆為琅邪郡王甲戌以王宗侃為樂安王丙子以兵部尚書庾傳素為太子少保兼中書侍郎同平章事蜀主不親政事内外遷除皆出於王宗弼宗弼納賄多私上下咨怨宋光嗣通敏善希合蜀主寵任之蜀由是遂衰蜀諸王皆領軍使彭王宗鼎謂其昆弟曰親王典兵禍亂之本今王少臣彊讒間將興繕甲訓士非吾輩所宜為也因固辭軍使蜀主許之但營書舍植松竹自娯而已乙丑蜀主以内給事王廷紹歐陽晃李周輅朱光葆宋承蕰田魯儔等為將軍及軍使皆干預政事驕縦貪暴大為蜀患周庠切諫不聽晃患所居之隘夜因風縦火焚西鄰軍營數百間明旦召匠廣其居蜀主亦不之問光葆光嗣之従弟也五年蜀主奢縦無度日與太后太妃遊宴於貴臣之家及遊近郡名山飲酒賦詩所費不可勝紀仗内教坊使嚴旭彊取士民女子内宫中或得厚賂而免之以是累遷至蓬州刺史太后太妃各出教令賣刺史令録等官毎一官闕數人争納賂賂多者得之六年秋七月乙卯蜀主下詔北巡以禮部尚書兼成都尹長安韓昭為文思殿大學士位在翰林承旨上昭無文學以便佞得幸出入宫禁就蜀主乞通渠巴集數州刺史賣之以營居第蜀主許之識者知蜀之將亡八月戊辰蜀主發成都被金甲冠珠㡌執弓矢而行旌旗兵甲亘百餘里雒令段融上言不宜逺離都邑當委大臣征討不従九月次安逺城冬十月辛酉蜀主如武定軍數日復還安逺十一月庚戌蜀主發安逺城十二月庚申至利州閬州團練使林思諤來朝請幸所治従之癸亥泛江而下龍舟畫舸輝映江渚州縣供辦民始愁怨壬申至閬州州民何康女色美將嫁蜀主取之賜其夫家帛百匹夫一慟而卒癸未至梓州龍徳元年春正月甲午蜀主還成都初蜀主之爲太子高祖爲聘兵部尚書高知言女爲妃無寵及韋妃入宫尤見踈薄至是遣還家知言驚仆不食而卒韋妃者徐耕之孫也有殊色蜀主適徐氏見而悦之太后因納於後宫蜀主不欲娶於母族託云韋昭度之孫初為婕妤累加元妃蜀主常列錦步障擊毬其中往往逺適而外人不知爇諸香晝夜不絶久而厭之更爇皁莢以亂其氣結繒為山及宫殿樓觀於其上或為風雨所敗則更以新者易之或樂飲繒山涉旬不下山前穿渠通禁中或乘船夜歸令宫女秉蠟炬千餘居前船却立照之水面如晝或酣飲禁中鼓吹沸騰以至達旦以是為常二年春二月蜀主好為微行酒肆倡家靡所不到惡人識之乃下令士民皆著大裁㡌夏四月蜀軍使王承綱女將嫁蜀主取之入宫承綱請之蜀主怒流於茂州女聞父得罪自殺後唐莊宗同光元年秋八月蜀主以文思殿大學士韓昭内皇城使潘在迎武勇軍使顧在珣為狎客陪侍逰宴與宫女雜坐或為艶歌相唱和或談嘲謔浪鄙俚褻慢無所不至蜀主樂之在珣彦朗之子也時樞宻使宋光嗣等專㫁國事恣為威虐務徇蜀主之欲以盜其權宰相王鍇庾傳素等各保寵禄無敢規正潘在迎毎勸蜀主誅諫者無使謗國嘉州司馬劉贊獻陳後主三閣圖并作歌以諷賢良方正蒲禹卿對策語極切直蜀主雖不罪亦不能用也九月庚戌蜀主以重陽宴近臣於宣華苑酒酣嘉王宗夀乘間極言社稷將危流涕不已韓昭潘在迎曰嘉王好酒悲因諧笑而罷冬十月彗星見輿鬼長丈餘蜀司天監言國有大災蜀主詔於玉局化設道塲右補闕張雲上䟽以為百姓怨氣上徹於天故彗星見此乃亡國之徴非祈禳可弭蜀主怒流雲黎州卒於道二年春三月己亥朔蜀主宴近臣於怡神亭酒酣君臣及宫人皆脱露髻喧譁自恣知制誥京兆李龜禎諫曰君臣沈湎不憂國政臣恐啟北敵之謀不聼夏四月帝遣客省使李嚴使于蜀嚴盛稱帝威徳有混一天下之志且言朱氏篡竊諸侯曽無勤王之舉王宗儔以其語侵蜀請斬之蜀主不従宣徽北院使宋光葆上言晉王有憑陵我國家之志宜選將練兵屯戍邊鄙積糗糧治戰艦以待之蜀主乃以光葆為梓州觀察使充武徳節度留後五月戊申蜀主遣李嚴還初帝因嚴入蜀令以馬市宫中珍玩而蜀法禁錦綺珍竒不得入中國其粗惡者乃聴入中國謂之入草物嚴還以聞帝怒曰王衍寧免為入草之人乎嚴因言於帝曰衍童騃荒縦不親政務斥逺故老昵比小人其用事之臣王宗弼宋光嗣等諂諛專恣黷貨無厭賢愚易位刑賞紊亂君臣上下專以奢滛相尚以臣觀之大兵一臨瓦解土崩可翹足而待也帝深以為然秋入月戊辰蜀主以右定逺軍使王宗鍔為招討馬歩使帥二十一軍屯洋州乙亥以長直馬軍使林思諤為昭武節度使戍利州以備唐帝復遣使者李彦稠入蜀九月己亥至成都蜀前山南節度使兼中書令王宗儔以蜀主失徳與王宗弼謀廢立宗弼猶豫未决庚戌宗儔憂憤而卒宗弼謂樞宻使宋光嗣景潤澄等曰宗儔教我殺爾曹今日無患矣光嗣輩俯伏泣謝宗弼子承班聞之謂人曰吾家難乎免矣乙卯蜀主以前鎭江節度使張武爲峽路應援招討使蜀宣徽北院使王承休請擇軍驍勇者萬二千人置駕下左右龍武步騎四十軍兵械給賜皆優異於它軍以承休爲龍武軍馬步都指揮使以禆將安重霸副之舊將無不憤恥重霸雲州人以狡佞賄賂事承休故承休悦之冬十一月蜀主遣其翰林學士歐陽彬來聘彬衡山人也又遣李彦稠東還蜀以唐修好罷威武城戍召闗宏業等二十四軍還成都戊申又罷武定武興招討劉潛等三十七軍辛酉蜀主罷天雄軍招討命王承騫等二十九軍還成都蜀主罷金州屯戍命王承勲等七軍還成都初唐僖昭之世宦官雖盛未嘗有建節者蜀安重霸勸王承休求秦州節度使承休言於蜀主曰秦州多美婦人請為陛下采擇以獻蜀主許之庚午以承休為天雄節度使封魯國公以龍武軍為承休牙兵乙亥蜀主以前武徳節度使兼中書令徐延瓊為京城内外馬步都指揮使延瓊以外戚代王宗弼居舊將之右衆皆不平三年夏六月帝將伐蜀辛卯詔天下括市戰馬秋九月蜀主與太后太妃逰青城山厯文人觀上清宫遂至彭州陽平化漢州三學山而還丁酉帝與宰相議伐蜀威勝節度使李紹欽素諂事宣徽使李紹宏紹宏薦紹欽有蓋世竒才雖孫呉不如可以大任郭崇韜曰段凝亡國之將姦諂絶倫不可信也衆舉李嗣源崇韜曰契丹方熾總管不可離河朔魏王地當儲副未立殊功請依故事以為伐蜀都統成其威名帝曰兒幼豈能獨往當求其副既而曰無以易卿庚子以魏王繼岌充西川四面行營都統崇韜充東北面行營都招討制置等使軍事悉以委之又以荆南節度使高季興充東南面行營都招討使鳯翔節度使李繼曮充都供軍轉運應接等使同州節度使李令徳充行營副招討使陜州節度使李紹琛充蕃漢馬步軍都排陳斬斫使兼馬步軍都指揮使西京留守張筠充西川管内安撫應接使華州節度使毛璋充左廂馬步都虞候邠州節度使董璋充右廂馬步都虞候客省使李嚴充西川管内招撫使將兵六萬伐蜀仍詔季興自取夔忠萬三州為巡屬都統置中軍以供奉官李従襲充中軍馬歩都指揮監押高品李廷安吕知柔充魏王牙通謁辛丑以工部尚書任圜翰林學士李愚並參預都統軍機蜀安重霸勸王承休請蜀主東遊秦州承休到官即毁府署作行宫大興力役彊取民間女子教歌舞圖形遺韓昭使言於蜀主又獻花木圖盛稱秦州山川土風之美蜀主將如秦州羣臣諫者甚衆皆不聼王宗弼上表諫蜀主投其表於地太后涕泣不食止之亦不能得前秦州節度判官蒲禹卿上表幾二千言其畧曰先帝艱難創業欲傳之萬世陛下少長富貴荒色惑酒秦州人雜羌胡地多瘴癘萬衆困於犇馳郡縣罷於供億鳯翔久為仇讎必生釁隙唐國方通歡好恐懐疑貳先皇未嘗無故盤游陛下率意頻離宫闕秦皇東狩鑾駕不還煬帝南巡龍舟不返蜀都彊盛雄視鄰邦邊亭無烽火之虞境内有腹心之疾百姓失業盜賊公行昔李勢屈於桓温劉禪降於鄧艾山河險固不足憑恃韓昭謂禹卿曰吾收汝表俟主上西歸當使獄吏字字問汝王承休妻嚴氏美蜀主私焉故鋭意欲行冬十月排陳斬斫使李紹琛與李嚴將驍騎三千歩兵萬人為前鋒招討判官陳乂至寶雞稱疾乞留李愚厲聲曰陳乂見利則進懼難則止今大軍涉險人心易揺宜斬以徇由是軍中無敢顧望者乂薊州人也癸亥蜀主引兵數萬發成都甲子至漢州武興節度使王承捷告唐兵西上蜀主以為羣臣同謀沮已猶不信大言曰吾方欲耀武遂東行在道與羣臣賦詩殊不為意丁丑李紹琛攻蜀威武城蜀指揮使唐景思將兵出降城使周彦禋等知不能守亦降景思秦州人也得城中糧二十萬斛紹琛縦其敗兵萬餘人逸去因倍道趣鳯州李嚴飛書以諭王承捷李繼曮竭鳯翔蓄積以饋軍不能充人情憂恐郭崇韜入散闗指其山曰吾輩進無成功不復得還此矣當盡力一决今饋運將竭宜先取鳯州因其糧諸將皆言蜀地險固未可長驅宜按兵觀釁崇韜以問李愚愚曰蜀人苦其主荒滛莫為之用宜乘其人情崩離風驅霆擊彼皆破膽雖有險阻誰與守之兵勢不可緩也是日李紹琛告捷崇韜喜謂愚曰公料敵如此吾復何憂乃倍道而進戊寅王承捷以鳯興文扶四川印節迎降得兵八千糧四十萬斛崇韜曰平蜀必矣即以都統牒命承捷攝武興節度使己卯蜀主至利州威武敗卒犇還始信唐兵之來王宗弼宋光嗣言於蜀主曰東川山南兵力尚完陛下但以大軍扼利州唐人安敢懸兵深入従之庚辰以隨駕清道指揮使王宗勲王宗儼兼侍中王宗昱為三招討將兵三萬逆戰従駕兵自綿漢至深渡千里相屬皆怨憤曰龍武軍糧賜倍於它軍它軍安能禦敵李紹琛等過長舉興州都指揮使程奉璉將所部兵五百來降且請先治橋棧以俟唐軍由是軍行無險阻之虞辛巳興州刺史王承鑒棄城走紹琛等克興州郭崇韜以唐景思攝興州刺史乙酉成州刺史王承朴棄城走李紹琛等與蜀三招討戰于三泉蜀兵大敗斬首五千級餘衆潰走又得糧十五萬斛於三泉由是軍食優足蜀主聞王宗勲等敗自利州倍道西走㫁桔柏津浮梁命中書令判六軍諸衛事王宗弼將大軍守利州且令斬王宗勲等三招討李紹琛晝夜兼行趣利州蜀武徳留後宋光葆遺郭崇韜書請唐兵不入境當舉巡屬内附茍不如約則背城决戰以報本朝崇韜復書撫納之己丑魏王繼岌至興州光葆以梓綿劒龍普五州武定節度使王承肇以洋蓬壁三州山南節度使兼侍中王宗威以梁開通渠麟五州階州刺史王崇岳以階州皆降承肇宗侃之子也自餘城鎮皆望風𣢾附天雄節度使王承休與副使安重霸謀掩擊唐軍重霸曰擊之不勝則大事去矣蜀中精兵十萬天下險固唐兵雖勇安能直度劒門邪然公受國恩聞難不可不赴願與公俱西承休素親信之以為然重霸請賂羌人買文扶州路以歸承休従之使重霸將龍武軍及所募兵萬二千人以従將行州人餞於城外承休上道重霸拜於馬前曰國家竭力以得秦隴若従開府還朝誰當守之開府行矣重覇請為公留守承休業已上道無如之何遂與招討副使王宗汭自文扶而南其地皆不毛羗人抄之且戰且行士卒凍餒比至茂州餘衆二千而已重覇遂以秦隴來降郭崇韜遺王宗弼等書為陳利害李紹琛未至利州宗弼棄城引兵西歸王宗勲等三招討追及宗弼於白艻宗弼懐中探詔書示之曰宋光嗣令我殺爾曹因相持而泣遂合謀送𣢾於唐十一月丙申蜀主至成都百官及後宫迎於七里亭蜀主入妃嬪中作回鶻隊入宫丁酉出見羣臣於文明殿泣下霑襟君臣相視竟無一言以救國患戊戌李紹琛至利州修桔栢浮梁昭武節度使林思諤先棄城犇閬州遣使請降甲辰魏王繼岌至劒州蜀武信節度使兼中書令王宗夀以遂合渝瀘昌五州降王宗弼至成都登太玄門嚴兵自衛蜀主及太后自往勞之宗弼驕慢無復臣禮乙巳劫遷蜀主及太后後宫諸王于西宫收其璽綬使親吏於義興門邀取内庫金帛悉歸其家其子承涓杖劒入宫取蜀主寵姫數人以歸丙午宗弼自稱權西川兵馬留後李紹琛進至綿州倉庫居民已為蜀兵所燔又㫁綿江浮梁水深無舟楫可渡紹琛謂李嚴曰吾懸軍深入利在速戰乘蜀人破膽之時但得百騎過鹿頭闗彼且迎降不暇若俟修繕橋梁必留數日或教王衍堅閉近闗折吾兵勢倘延旬浹則勝負未可知矣乃與嚴乘馬浮度江従兵得濟者僅千人溺死者亦千餘人遂入鹿頭闗丁未進據漢州居三日後軍始至王宗弼遣使以幣馬牛酒勞軍且以蜀主書遺李嚴曰公來吾即降或謂嚴曰公首建伐蜀之策蜀人怨公深入骨髓不可往嚴不従欣然馳入成都撫諭吏民告以大軍繼至蜀君臣後宫皆慟哭蜀主引嚴見太后以母妻為託宗弼猶乗城為守備嚴悉命撤去樓櫓己酉魏王繼岌至綿州蜀主命翰林學士李昊草降表又命中書侍郎同平章事王鍇草降書遣兵部侍郎歐陽彬奉之以迎繼岌及郭崇韜王宗弼稱蜀君臣久欲歸命而内樞宻使宋光嗣景潤澄宣徽使李周輅歐陽晃熒惑蜀主皆斬之函首送繼岌又責文思殿大學士禮部尚書成都尹韓昭佞諛梟于金馬坊門内外馬步都指揮使兼中書令徐延瓊果州團練使潘在迎嘉州刺史顧在珣及諸貴戚皆惶恐傾其家金帛妓妾以賂宗弼僅得免死凢素所不快者宗弼皆殺之辛亥繼岌至徳陽宗弼遣使奉牋稱已遷蜀主於西第安撫軍城以俟王師又使其子承班以蜀主後宫及珍玩賂繼岌及郭崇韜求西川節度使繼岌曰此皆我家物奚以獻為留其物而遣之李紹琛留漢州八日以俟都統甲寅繼岌至漢州王宗弼迎謁乙卯至成都丙辰李嚴引蜀主及百官儀衛出降於升遷橋蜀主白衣銜璧牽羊草繩縈首百官衰絰徒跣輿櫬號哭俟命繼岌受璧崇韜解縛焚櫬承制釋罪君臣東北向拜謝丁巳大軍入成都崇韜禁軍士侵掠市不改肆自出師至克蜀凢七十日得節度十州六十四縣二百四十九兵三萬鎧仗錢糧金銀繒錦共以千萬計高季興聞蜀亡方食失匕箸曰是老夫之過也梁震曰不足憂也唐主得蜀益驕亡無日矣安知其不為吾福楚王殷聞蜀亡上表稱臣已營衡麓之間為菟裘之地願上印綬以保餘齡上優詔慰諭之十二月癸酉王承休王宗汭至成都魏王繼岌詰之曰居大鎮擁彊兵何以不拒戰對曰畏大王神武曰然則何不降對曰王師不入境曰所俱入羌者幾人對曰萬二千人曰今歸者幾人對曰二千人曰可以償萬人之死矣皆斬之并其子閏十二月丁酉詔蜀朝所署官四品以上降授有差五品以下才地無取者悉縦歸田里其先降及有功者委崇韜隨事奬任又賜王衍詔略曰固當裂土而封必不薄人於險三辰在上一言不欺明宗天成元年春正月庚申魏王繼岌遣李繼曮李嚴部送王衍及其宗族百官數千人詣洛陽二月乙巳王衍至長安有詔止之三月伶人景進等言於帝曰魏王未至康延孝初平西南猶未安王衍族黨不少聞車駕東征恐其為變不若除之帝乃遣中使向延嗣齎敇往誅之敇曰王衍一行並従殺戮已印畫樞宻使張居翰覆視就殿柱揩去行字改為家字由是蜀百官及衍僕役獲免者千餘人延嗣至長安盡殺衍宗族於秦川驛衍母徐氏且死呼曰吾兒以一國迎降不免族誅信義俱棄吾知汝行亦受禍矣夏六月蜀百官至洛陽永平節度使兼侍中馬全曰國亡至此生不如死不食而卒以平章事王鍇等為諸州府刺史少尹判官司馬亦有復歸蜀者三年夏六月陜州行軍司馬王宗夀表請葬故蜀主王衍秋七月乙巳贈衍順正公以諸侯禮葬之通鑑紀事本末卷第四十
