body:
  text: 慕容叛秦復燕慕容滅西燕肥水之役姚萇滅秦晉海西公太和四年燕車騎大將軍吳王垂奔秦初秦王堅聞太宰恪卒隂有圖燕之志憚垂威名不敢發及聞垂至大喜郊迎執手曰天生賢傑必相與共成大功此自然之數也要當與卿共定天下告成岱宗然後還卿本邦丗封幽州使卿去國不失為子之孝歸朕不失事君之忠不亦美乎垂謝曰羇旅之臣免罪為幸本邦之榮非所敢望堅復愛丗子令及慕容楷之才皆厚禮之賞賜巨萬每進見屬目觀之關中士民素聞垂父子名皆嚮慕之王猛言於堅曰慕容垂父子譬如龍虎非可馴之物若借以風雲將不可復制不如早除之堅曰吾方收攬英雄以清四海奈何殺之且其始來吾已推誠納之矣匹夫猶不棄言况萬乘乎乃以垂為冠軍將軍封賔徒侯楷為積弩將軍五年秦王猛之克壺關也黃門侍郎封孚問司徒長史申胤曰事將何如胤歎曰鄴必亡矣吾屬今兹將為秦虜然越得歲而吳伐之卒受其禍今福德在燕秦雖得志而燕之復建不過一紀耳初秦王堅入鄴宫慕容垂見燕公卿大夫及故時僚吏有愠色髙弼密言於垂曰大王憑祖宗積纍之資負英傑髙丗之略遭值迍厄棲集外邦今雖家國傾覆安知其不為興運之始邪愚謂國之舊人宜恢江海之量有以慰結其心以立覆簣之基成九仭之功奈何以一怒捐之愚竊為大王不取也垂恱從之燕故太史黃泓歎曰燕必中興其在吳王乎恨吾老不及見耳汲郡趙秋曰天道在燕而秦滅之不及十五年秦必復為燕有慕容桓之子鳳年十一隂有復讎之志鮮卑丁零有氣幹者皆傾身與之交結權翼見而謂之曰兒方以才望自顯勿效爾父不識天命鳳厲色曰先王欲建忠而不遂此乃人臣之節君侯之言豈奬勸將來之義乎翼改容謝之言於秦王堅曰慕容鳳慷慨有才器但狼子野心恐終不為人用耳簡文帝咸安元年春正月秦王堅徙關東豪傑及雜夷十五萬户于關中處烏桓于馮翊北地丁零翟斌于新安澠池孝武帝寧康元年有彗星出于尾箕長十餘丈經太微掃東井自四月始見及秋冬不滅秦太史令張孟言於秦王堅曰尾箕燕分東井秦分也今彗起尾箕而掃東井十年之後燕當滅秦二十年之後代當滅燕慕容暐父子兄弟我之仇敵而布列朝廷貴盛莫二臣竊憂之宜剪其魁傑者以消天變堅不聽陽平公融上疏曰東胡跨據六州南面稱帝陛下勞師纍年然後得之本非慕義而來今陛下親而幸之使其父子兄弟森然滿朝執權履職藝傾勳舊臣愚以為狼虎之心終不可飬星變如此願少留意堅報曰朕方混六合為一家視夷狄為赤子汝宜息慮勿懷耿介夫惟修德可以禳災茍能內求諸己何懼外患乎二年冬十二月有人入秦明光殿大呼曰甲申乙酉魚羊食人悲哉無復遺秦王堅命執之不獲袐書監朱肜袐書侍郎略陽趙整固請誅諸鮮卑堅不聽整宦官也博聞彊記能屬文好直言上書及面諫前後五十餘事慕容垂夫人得幸於堅堅與之同輦遊于後庭整歌曰不見雀來入燕室但見浮雲蔽白日堅改容謝之命夫人下輦三年夏六月秦清河武侯王猛寢疾秦王堅親為之祈南北郊及宗廟社稷分遣侍臣遍禱河嶽諸神猛疾少瘳為之赦殊死以下猛上疏曰不圖陛下以臣之命而虧天地之德開闢以來未之有也臣聞報德莫如盡言謹以垂沒之命竊獻遺欵伏惟陛下威烈振乎八荒聲教光乎六合九州百郡十居其七平燕定蜀有如拾芥夫善作者不必善成善始者不必善終是以古先哲王知功業之不易戰戰兢兢如臨深谷伏惟陛下追蹤前聖天下幸甚堅覽之悲慟秋七月堅親至猛第視疾訪以後事猛曰晉雖僻處江南然正朔相承上下安和臣沒之後願勿以晉為圖鮮卑西羌我之仇敵終為人患宜漸除之以便社稷言終而卒堅比斂三臨哭謂太子宏曰天不欲使吾平一六合耶何奪吾景略之速也葬之如漢霍光故事太元元年陽平國常侍慕容紹私謂其兄楷曰秦恃其彊大務勝不休北戍雲中南守蜀漢轉運萬里道殣相望兵疲於外民困於內危亡近矣冠軍叔仁智度英拔必能恢復燕祚吾屬但當愛身以待時耳二年春髙句麗新羅西南夷皆遣使入貢于秦趙故將作功曹熊邈屢為秦王堅言石氏宫室器玩之盛堅以邈為將作長史領尚方丞大修舟艦兵器飾以金銀頗極精巧慕容農私言於慕容垂曰自王猛之死秦之法制日以頽靡今又重之以奢侈殃將至矣圖䜟之言行當有驗大王宜結納英傑以承天意時不可失也垂笑曰天下事非爾所及荆州刺史桓豁表兖州刺史朱序為梁州刺史鎮襄陽秋七月丁未以尚書僕射謝安為司徒安讓不拜復加侍中都督楊豫徐兖青五州諸軍事丙辰征西大將軍荆州刺史桓豁卒冬十月辛丑以桓沖都督江荆梁益寧交廣七州諸軍事領荆州刺史以沖子嗣為江州刺史又以五兵尚書王藴都督江南諸軍事假節領徐州刺史征西司馬領南郡相謝玄為兖州刺史領廣陵相監江北諸軍事桓沖以秦人彊盛欲移阻江南奏自江陵徙鎮上明使冠軍將軍劉波守江陵咨議參軍楊亮守江夏王藴固讓徐州謝安曰卿居后父之重不應妄自菲薄以虧時遇藴乃受命初中書郎郗超自以其父愔位遇應在謝安之右而安入掌機權愔優遊散地常憤邑形於辭色由是與謝氏有隙是時朝廷方以秦寇為憂詔求文武良將可以鎮禦北方者謝安以兄子玄應詔超聞之歎曰安之明乃能違衆舉親玄之才足以不負所舉衆咸以為不然超曰吾嘗與玄共在桓公府見其使才雖履屐間未嘗不得其任是以知之玄募驍勇之士得彭城劉牢之等數人以牢之為參軍常領精鋭為前鋒戰無不捷時號北府兵敵人畏之三年春二月秦王堅遣征南大將軍都督征討諸軍事守尚書令長樂公丕武衛將軍茍萇尚書慕容暐帥步騎七萬寇襄陽以荆州刺史楊安帥樊鄧之衆為前鋒征虜將軍始平石越帥精騎一萬出魯陽關京兆尹慕容垂揚武將軍姚萇帥衆五萬出南鄉領軍將軍茍池右將軍毛當彊弩將軍王顯帥衆四萬出武當㑹攻襄陽夏四月秦兵至沔北梁州刺史朱序以秦無舟楫不以為虞既而石越帥騎五千浮渡漢水序惶駭固守中城越克其外郭獲船百餘艘以濟餘軍長樂公丕督諸將攻中城序母韓氏聞秦兵將至自登城履行至西北隅以將不固帥百餘婢及城中女丁築邪城於其內及秦兵至西北隅果潰衆移守新城襄陽人謂之夫人城桓沖在上明擁衆七萬憚秦兵之彊不敢進丕欲急攻襄陽茍萇曰吾衆十倍於敵糗糧山積但稍遷漢沔之民於許洛塞其運道絶其援兵譬如網中之禽何患不獲而多殺將士急求成功哉丕從之慕容垂拔南陽執太守鄭裔與丕㑹襄陽秋七月秦兖州刺史彭超請攻沛郡太守戴􅋟於彭城且曰願更遣重將攻淮南諸城為征南棊劫之藝東西並進丹楊不足平也秦王堅從之使都督東討諸軍事後將軍俱難右禁將軍毛盛洛州刺史卲保帥步騎七萬寇淮陽盱眙超越之弟保羌之從弟也八月彭超攻彭城詔右將軍毛虎生帥衆五萬鎮姑孰以禦秦兵秦梁州刺史韋鍾圍魏興太守吉挹於城西冬十二月秦御史中丞李柔劾奏長樂公丕等擁衆十萬攻圍小城日費萬金久而無效請徵下廷尉秦王堅曰丕等廣費無成實宜貶戮但師已淹時不可虛返其特原之令以成功贖罪使黃門侍郎韋華持節切讓丕等賜丕劒曰來春不捷汝可自裁勿復持面見吾也四年春正月秦長樂公丕等得詔惶恐乃命諸軍并力攻襄陽秦王堅欲自將攻襄陽詔陽平公融以關東六州之兵㑹夀春梁熙以河西之兵為後繼陽平公融諫曰陛下欲取江南固當博謀熟慮不可倉猝若止取襄陽又豈足親勞大駕乎未有動天下之衆而為一城者所謂以隋侯之珠彈千仭之雀也梁熙諫曰晉主之㬥未如孫皓江山險固易守難攻陛下必欲廓清江表亦不過分命將帥引關東之兵南臨淮泗下梁益之卒東出巴峽又何必親屈鑾輅逺幸沮澤乎昔漢光武誅公孫述晉武帝擒孫皓未聞二帝自統六師親執枹鼓䝉矢石也堅乃止詔冠軍將軍南郡相劉波帥衆八千救襄陽波畏秦不敢進朱序屢出戰破秦兵引退稍逺序不設備二月襄陽督護李伯護密遣其子送款於秦請為內應長樂公丕命諸軍進攻之戊午克襄陽執朱序送長安秦王堅以序能守節拜度支尚書以李伯護為不忠斬之秦將軍慕容越拔順陽執太守譙國丁穆堅欲官之穆固辭不受堅以中壘將軍梁成為荆州刺史配兵一萬鎮襄陽選其才望禮而用之桓沖以襄陽陷沒上疏送章節請解職不許詔免劉波官俄復以為冠軍將軍兖州刺史謝玄帥衆萬餘救彭城軍于泗口欲遣間使報戴􅋟而不可得部曲將田泓請沒水潜行趣彭城玄遣之泓為秦人所獲厚賂之使云南軍已敗泓僞許之既而告城中曰南軍垂至我單行來報為賊所得勉之秦人殺之彭超置輜重於留城謝玄揚聲遣後軍將軍東海何謙向留城超聞之釋彭城圍引兵還保輜重戴􅋟帥彭城之衆隨謙奔玄超遂據彭城留兖州治中徐褒守之南攻盱眙俱難克淮隂留邵保戍之夏四月秦毛當王顯帥衆二萬自襄陽東㑹俱難彭超攻淮南五月乙丑難超拔盱眙執髙密內史毛璪之秦兵六萬圍幽州刺史田洛于三阿去廣陵百里朝廷大震臨江列戍遣征虜將軍謝石帥舟師屯涂中石安之弟也右衛將軍毛安之等帥衆四萬屯堂邑秦毛當毛盛帥騎二萬襲堂邑安之等驚潰兖州刺史謝玄自廣陵救三阿丙子難超戰敗退保盱眙六月戊子玄與田洛帥衆五萬進攻盱眙難超又敗退屯淮隂玄遣何謙等帥舟師乘潮而上夜焚淮橋邵保戰死難超退屯淮北玄與何謙戴􅨕田洛共追之戰于君川復大破之難超北走僅以身免謝玄還廣陵詔進號冠軍將軍加領徐州刺史秦王堅聞之大怒秋七月檻車徴超下廷尉超自殺難削爵為民以毛當為徐州刺史鎮彭城毛盛為兖州刺史鎮胡陸王顯為楊州刺史戍下邳謝安為宰相秦人屢入冦邉兵失利衆心危懼安每鎮之以和靜其為政務舉大綱不為小察時人比安於王導而謂其文雅過之五年夏五月朝廷以秦兵之退為謝安桓沖之功拜安衛將軍與沖皆開府儀同三司六月秦王堅召陽平公融為侍中中書監車騎大將軍司隸校尉録尚書事以征南大將軍守尚書令長樂公丕為都督關東諸軍事征東大將軍冀州牧堅以諸氐種類繁滋秋七月分三原九嵕武都汧雍氐十五萬户使諸宗親各領之散居方鎮如古諸侯長樂公丕領氐三千户以仇池氐酋射聲校尉楊膺為征東左司馬九嵕氐酋長水校尉齊午為右司馬各領一千五百户為長樂丗卿長樂國郎中令略陽垣敞為録事參軍侍講扶風韋幹為參軍事申紹為别駕膺丕之妃兄也午膺之妻父也八月分幽州置平州以石越為平州刺史鎮龍城中書令梁讜為幽州刺史鎮薊城撫軍將軍毛興為都督河秦二州諸軍事河州刺史鎮枹罕長水校尉王騰為并州刺史鎮晉陽河并二州各配氐户三千興騰竝符氏婚姻氐之崇望也平原公暉為都督豫洛荆南兖東豫楊六州諸軍事鎮東大將軍豫州牧鎮洛陽移洛州刺史治豐陽以巨鹿公睿為雍州刺史鎮蒲坂各配氐户三千二百堅送丕至灞上諸氐别其父兄皆慟哭哀感路人趙整因侍宴援琴而歌曰阿得脂阿得脂博勞舅父是仇綏尾長翼短不能飛逺徙種人留鮮卑一旦緩急當語誰堅笑而不納冬十二月秦以左將軍都貴為荆州刺史鎮彭城置東豫州以毛當為刺史鎮許昌六年春正月丁酉以尚書謝石為僕射冬十一月秦荆州刺史都貴遣其司馬閻振中兵參軍吳仲帥衆二萬寇竟陵桓沖遣南平太守桓石䖍衛軍參軍桓石民等帥水陸二萬拒之石民石䖍之弟也十二月甲辰石䖍襲擊振仲大破之振仲退保管城石䖍進攻之癸亥拔管城獲振仲斬首七千級俘虜萬人詔封桓沖子謙為宜陽侯以桓石䖍領河東太守七年夏四月秦王堅以陽平公融為司徒融固辭不受堅方謀伐晉乃以融為征南大將軍開府儀同三司秋八月秦王堅以諫議大夫裴元略為巴西梓潼二郡太守使密具舟師九月桓沖使揚威將軍朱綽擊秦荆州刺史都貴于襄陽焚踐沔北屯田掠六百餘户而還冬十月秦王堅㑹羣臣于太極殿議曰自吾承業垂三十載四方略定唯東南一隅未霑王化今略計吾士卒可得九十七萬吾欲自將以討之何如袐書監朱肜曰陛下恭行天罰必有征無戰晉主不銜壁軍門則走死江海陛下返中國士民使復其桑梓然後回輿東巡告成岱宗此千載一時也堅喜曰是吾志也尚書左僕射權翼曰昔紂為無道三仁在朝武王猶為之旋師今晉雖微弱未有大惡謝安桓冲皆江表偉人君臣輯睦內外同心以臣觀之未可圖也堅默然良久曰諸君各言其志太子左衛率石越曰今歲鎮守斗福德在吳伐之必有天殃且彼據長江之險民為之用殆未可伐也堅曰昔武王伐紂逆歲違卜天道幽逺未易可知夫差孫皓皆保據江湖不免於亡今以吾之衆投鞭於江足斷其流又何險之足恃乎對曰三國之君皆淫虐無道故敵國取之易於拾遺今晉雖無德未有大罪願陛下且案兵積穀以待其釁於是羣臣各言利害久之不決堅曰此所謂築室道旁無時可成吾當內斷於心耳羣臣皆出獨留陽平公融謂之曰自古定大事者不過一二臣而已今衆言紛紛徒亂人意吾當與汝決之對曰今伐晉有三難天道不順一也晉國無釁二也我數戰兵疲民有畏敵之心三也羣臣言晉不可伐者皆忠臣也願陛下聽之堅作色曰汝亦如此吾復何望吾疆兵百萬資仗如山吾雖未為令主亦非暗劣乘纍捷之勢擊垂亡之國何患不克豈可復留此殘寇使長為國家之憂哉融泣曰晉未可滅昭然甚明今勞師大舉恐無萬全之功且臣之所憂不止於此陛下寵育鮮卑羌羯布滿畿甸此屬皆我之深仇太子獨與弱卒數萬留守京師臣懼有不虞之變生於腹心肘腋不可悔也臣之頑愚誠不足采王景略一時英傑陛下常比之諸葛武侯獨不記其臨沒之言乎堅不聽於是朝臣進諫者衆堅曰以吾擊晉校其彊弱之勢猶疾風之掃秋葉而朝廷內外皆言不可誠吾所不解也太子宏曰今歲在吳分又晉君無罪若大舉不捷恐威名外挫財力內竭此羣下所以疑也堅曰昔吾滅燕亦犯歲而捷天道固難知也秦滅六國六國之君豈皆㬥虐乎冠軍京兆尹慕容垂言於堅曰弱併於彊小併於大此理藝自然非難知也以陛下神武應期威加海外虎旅百萬韓白滿朝而蕞爾江南獨違王命豈可復留之以遺子孫哉詩云謀夫孔多是用不集陛下斷自聖心足矣何必廣詢朝衆晉武平吳所仗者張杜二三臣而已若從朝衆之言豈有混一之功乎堅大恱曰與吾共定天下者獨卿而已賜帛五百匹堅鋭意欲取江東寢不能旦陽平公融諫曰知足不辱知止不殆自古窮兵極武未有不亡者且國家本戎狄也正朔曽不歸之江東雖微弱僅存然中華正統天意必不絶之堅曰帝王歷數豈有常邪惟德之所在耳劉禪豈非漢之苖裔邪終為魏所滅汝所以不如吾者正病此不逹變通耳堅素信重沙門道安羣臣使道安乘間進言十一月堅與道安同輦遊于東苑堅曰朕將與公南遊吳越泛長江臨滄海不亦樂乎安曰陛下應天御丗居中土而制四維自足以比隆堯舜何必櫛風沐雨經略遐方乎且東南卑濕沴氣易御名太上虞舜遊而不歸大禹往而不復何足以上勞大駕也堅曰天生蒸民而樹之君使司牧之朕豈敢憚勞使彼一方獨不被澤乎必如公言是古之帝王皆無征伐也道安曰必不得已陛下宜駐蹕洛陽遣使者奉尺書於前諸將總六師於後彼必稽首入臣不必親涉江淮也堅不聽堅所幸張夫人諫曰妾聞天地之生萬物聖王之治天下皆因其自然而順之故功無不成是以黃帝服牛乘馬因其性也禹濬九川障九澤因其藝也后稷播殖百榖因其時也湯武帥天下而攻桀紂因其心也皆有因則成無因則敗今朝野之人皆言晉不可伐陛下獨决意行之妾不知陛下何所因也書曰天聰明自我民聰明天猶因民而况人乎妾又聞王者出師必上觀天道下順人心今人心既不然矣請驗之天道諺云雞夜鳴者不利行師犬羣嘷者宫室將空兵動馬驚軍敗不歸自秋冬以來衆雞夜鳴羣犬哀嘷廄馬多驚武庫兵器自動有聲此皆非出師之祥也堅曰軍旅之事非婦人所當預也堅幼子中山公詵最有寵亦諫曰臣聞國之興亡繫賢人之用捨今陽平公國之謀主而陛下違之晉有謝安桓沖而陛下伐之臣竊惑之堅曰天下大事孺子安知八年夏五月桓沖帥衆十萬伐秦攻襄陽遣前將軍劉波等攻沔北諸城輔國將軍楊亮攻蜀拔五城進攻涪城鷹揚將軍郭銓攻武當六月沖别將攻萬歲筑陽拔之秦王堅遣征南將軍巨鹿公睿冠軍將軍慕容垂等帥步騎五萬救襄陽兖州刺史張崇救武當後將軍張蚝步兵校尉姚萇救涪城睿軍于新野垂軍于鄧城桓沖退屯沔南秋七月郭銓及冠軍將軍桓石䖍敗張崇于武當掠二千户以歸巨鹿公睿遣慕容垂為前鋒進臨沔水垂夜命軍士人持十炬繫于樹枝光照數十里沖懼退還上明張蚝出斜谷楊亮引兵還沖表其兄子石民領襄城太守戍夏口沖自求領江州刺史詔許之秦王堅下詔大舉入寇民每十丁遣一兵其良家子年二十已下有林勇者皆拜羽林郎又曰其以司馬昌明為尚書左僕射謝安為吏部尚書桓沖為侍中勢還不逺可先為起第良家子至者三萬餘騎拜秦州主簿金城趙盛之為少年都統是時朝臣皆不欲堅行獨慕容垂姚萇及良家子勸之陽平公融言於堅曰鮮卑羌虜我之仇讎常思風塵之變以逞其志所陳䇿畫何可從也良家少年皆富饒子弟不間軍旅茍為諂諛之言以㑹陛下之意耳今陛下信而用之輕舉大事臣恐功既不成仍有後患悔無及也堅不聽八月戊午堅遣陽平公融督張蚝慕容垂等步騎二十五萬為前鋒以兖州刺史姚萇為龍驤將軍督益梁州諸軍事堅謂萇曰昔朕以龍驤建業未嘗輕以授人卿其勉之左將軍竇衝曰王者無戲言此不祥之徴也堅默然慕容楷慕容紹言於慕容垂曰主上驕矜已甚叔父建中興之業在此行也垂曰然非汝誰與成之甲子堅發長安戎卒六十餘萬騎二十七萬旗鼓相望前後千里九月堅至項城涼州之兵始逹咸陽蜀漢之兵方順流而下幽冀之兵至于彭城東西萬里水陸齊進運漕萬艘陽平公融等兵三十萬先至頴口詔以尚書僕射謝石為征虜將軍征討大都督以徐兖二州刺史謝玄為前鋒都督與輔國將軍謝琰西中郎將桓伊等衆共八萬拒之使龍驤將軍胡彬以水軍五千援夀陽琰安之子也是時秦兵既盛都下震恐謝玄入問計於謝安安夷然答曰已别有㫖既而寂然玄不敢復言乃令張玄重請安遂命駕出遊山墅親朋畢集與玄圍棊賭墅安棊常劣於玄是日玄懼便為敵手而又不勝安遂游陟至夜乃還桓沖深以根本為憂遣精鋭三千入援京師謝安固却之曰朝廷處分已定兵甲無闕西藩宜留以為防沖對佐吏歎曰謝安石有廟堂之量不間將略今大敵垂至方遊談不暇遣諸不經事少年拒之衆又寡弱天下事已可知吾其左祍矣冬十月秦陽平公融等攻夀陽癸酉克之執平虜將軍徐元喜等融以其參軍河南郭褒為淮南太守慕容垂拔鄖城胡彬聞夀陽陷退保硤石融進攻之秦衛將軍梁成等帥衆五萬屯于洛澗柵淮以遏東兵謝石謝玄等去洛澗二十五里而軍憚成不敢進胡彬糧盡潜遣使告石等曰今賊盛糧盡恐不復見大軍秦人獲之送於陽平公融融馳使白秦王堅曰賊少易擒但恐逃去宜速赴之堅乃留大軍於項城引輕騎八千兼道就融於夀陽遣尚書朱序來說謝石等以彊弱異藝不如速降序私謂石等曰若秦百萬之衆盡至誠難與為敵今乘諸軍未集宜速擊之若敗其前鋒則彼已奪氣可遂破也石聞堅在夀陽甚懼欲不戰以老秦師謝琰勸石從序言十一月謝玄遣廣陵相劉牢之帥精兵五千趣洛澗未至十里梁成阻澗為陳以待之牢之直前渡水擊成大破之斬成及弋陽太守王詠又分兵斷其歸津秦步騎崩潰爭赴淮水士卒死者萬五千人執秦楊州刺史王顯等盡收其器械軍實於是謝石等諸軍水陸繼進秦王堅與陽平公融登夀陽城望之見晉兵部陳嚴整又望見八公山上草木皆以為晉兵顧謂融曰此亦勍敵何謂弱也憮然始有懼色秦兵逼肥水而陳晉兵不得渡謝玄遣使謂陽平公融曰君懸軍深入而置陳逼水此乃持久之計非欲速戰者也若移陳小却使晉兵得渡以決勝負不亦善乎秦諸將皆曰我衆彼寡不如遏之使不得上可以萬全堅曰但引兵少却使之半渡我以鐡騎蹙而殺之蔑不勝矣融亦以為然遂麾兵使却秦兵遂退不可復止謝玄謝琰桓伊等引兵渡水擊之融馳騎略陳欲以師退者馬倒為晉兵所殺秦兵遂潰玄等乘勝追擊至于青岡秦兵大敗自相蹈藉而死者蔽野塞川其走者聞風聲鶴唳皆以為晉兵且至晝夜不敢息草行露宿重以飢凍死者什七八初秦兵小却朱序在陳後呼曰秦兵敗矣衆遂大奔序因與張天錫徐元喜皆來奔復取夀陽執其淮南太守郭褒堅中流矢單騎走至淮北飢甚民有進壺飱豚髀者堅食之賜綿帛辭曰陛下厭苦安樂自取危困臣為陛下子陛下為臣父安有子飼其父而求報乎弗顧而去堅謂張夫人曰吾今復何面目治天下乎澘然流涕是時諸軍皆潰惟慕容垂所將三萬人獨全堅以千餘騎赴之丗子寶言於垂曰家國傾覆天命人心皆歸至尊但時運未至故晦迹自藏耳今秦主兵敗委身於我是天借之便以復燕祚此時不可失也願不以意氣微恩忘社稷之重垂曰汝言是也然彼以赤心投命於我若之何害之天茍棄之何患不亡不若保護其危以報德徐俟其釁而圖之既不負宿心且可以義取天下奮威將軍慕容德曰秦彊而并燕秦弱而圖之此為報仇雪恥非負宿心也兄奈何得而不取釋數萬之衆以授人乎垂曰吾昔為太傅所不容置身無所逃死于秦秦主以國士遇我恩禮備至後復為王猛所賣無以自明秦王獨能明之此恩何可忘也若氐運必窮吾當懷集關東以復先業耳關西㑹非吾有也冠軍行參軍趙秋曰明公當紹復燕祚著於圖䜟今天時已至尚復何待若殺秦主據鄴都鼓行而西三秦亦非符氏之有也垂親黨多勸垂殺堅垂皆不從悉以兵授堅平南將軍慕容暐屯鄖城聞堅敗棄其衆遁去至滎陽慕容德復說暐起兵以復燕祚暐不從謝安得驛書時方與客圍棊攝書置牀上了無喜色圍棊如故客問之徐答曰小兒輩遂已破賊既罷還內過户限不覺屐齒之折丁亥謝石歸建康乙未以張天錫為散騎常侍朱序為琅邪內史秦王堅收集離散比至洛陽衆十餘萬百官儀物軍容粗備慕容農謂慕容垂曰尊不迫人於險其義聲足以感動天地農聞袐記曰燕復興當在河陽夫取果於未熟與自落不過晚旬日之間然其難易美惡相去逺矣垂心善其言行至澠池言於堅曰北鄙之民聞王師不利輕相扇動臣請奉詔書以鎮慰安集之因過謁陵廟堅許之權翼諫曰國兵新破四方皆有離心宜徴集名將置之京師以固根本鎮枝葉垂勇略過人丗豪東夏頃以避禍而來其心豈止欲作冠軍而已哉譬如養鷹飢則附人每聞風飈之起常有陵霄之志正宜謹其絛籠豈可解縱任其所欲哉堅曰卿言是也然朕已許之匹夫猶不食言況萬乘乎若天命有廢興固非智力所能移也翼曰陛下重小信而輕社稷臣見其往而不返關東之亂自此始矣堅不聽遣將軍李蠻閔亮尹國帥衆三千送垂又遣驍騎將軍石越帥精卒三千戍鄴驃騎將軍張蚝帥羽林五千戍并州鎮軍將軍毛當帥衆四千戍洛陽權翼密遣壯士邀垂於河橋南空倉中垂疑之自凉馬臺結草筏以渡使典軍程同衣已衣乘已馬與僮僕趣河橋伏兵發同馳馬獲免十二月秦王堅至長安哭陽平公融而後入諡曰哀公大赦復死事者家庚午大赦以謝石為尚書令進謝玄號前將軍固讓不受慕容垂至安陽遣參軍田山修箋於長樂公丕丕聞垂北來疑其欲為亂然猶身自迎之趙秋勸垂於座取丕因據鄴起兵垂不從丕謀襲擊垂侍郎天水姜讓諫曰垂反形未著而明公擅殺之非臣子之義不如待以上賓之禮嚴兵衛之密表情狀聽敕而後圖之丕從之館垂於鄴西垂潛與燕之故臣謀復燕祚㑹丁零翟斌起兵叛秦謀攻豫州牧平原公暉於洛陽秦王堅驛書使垂將兵討之石越言於丕曰王師新敗民心未安負罪亡匿之徒思亂者衆故丁零一唱旬日之中衆已數千此其驗也慕容垂燕之宿望有興復舊業之心今復資之以兵此為虎傅翼也丕曰垂在鄴如藉虎寢蛟常恐為肘腋之變今逺之於外不猶愈乎且翟斌凶悖必不肯為垂下使兩虎相斃吾從而制之此卞莊子之術也乃以羸兵二千及鎧仗之弊者給垂又遣廣武將軍符飛龍帥氐騎一千為垂之副密戒飛龍曰垂為三軍之帥卿為謀垂之將行矣勉之垂請入鄴城拜廟丕弗許乃潜服而入亭吏禁之垂怒斬吏燒亭而去石越言於丕曰垂敢輕侮方鎮殺吏燒亭反形已露可因此除之丕曰淮南之敗垂侍衛乘輿此功不可忘也越曰垂尚不忠於燕安能盡忠於我失今不取必為後患丕不從越退告人曰公父子好為小仁不顧大計終當為人擒耳垂留慕容農慕容楷慕容紹於鄴行至安陽之湯池閔亮李毗自鄴來以丕與符飛龍所謀告垂垂因激怒其衆曰吾盡忠於符氏而彼專欲圖吾父子吾雖欲已得乎乃託言兵少停河內募兵旬日閒有衆八千平原公暉遣使讓垂趣使進兵垂謂飛龍曰今寇賊不逺當晝止夜行襲其不意飛龍以為然壬午夜垂遣丗子寶將兵居前少子隆勒兵從已令氐兵五人為伍隂與寶約聞鼓聲前後合擊氐兵及飛龍盡殺之參佐家在西者皆遣還并以書遺秦王堅言所以殺飛龍之故初垂從堅入鄴以其子麟屢嘗告變於燕立殺其母然猶不忍殺麟置之外舍希得侍見及殺符飛龍麟屢進䇿畫啓發垂意垂更竒之寵待與諸子均矣慕容鳳及燕故臣之子燕郡王騰遼西假延等聞翟斌起兵各帥部曲歸之平原公暉使武平武侯毛當討斌慕容鳳曰鳳今將雪先王之耻請為將軍斬此氐奴乃擐甲直進丁零之衆隨之大敗秦兵斬毛當遂進攻陵雲臺戍克之收萬餘人甲仗癸未慕容垂濟河焚橋有衆三萬留遼東鮮卑可足渾談集兵於河內之沙城垂遣田山如鄴密告慕容農等使起兵相應時日已暮農與慕容楷留宿鄴中慕容紹先出至蒲池盜丕駿馬數百匹以待農楷甲申晦農楷將數十騎微服出鄴遂同奔列人九年春正月乙酉朔秦長樂公丕大㑹賔客請慕容農不得始覺有變遣人四出求之三日乃知其在列人已起兵矣慕容鳯王騰假延皆勸翟斌奉慕容垂為盟主斌從之垂欲襲洛陽且未知斌之誠僞乃拒之曰吾來救豫州不來赴君君既建大事成享其福敗受其禍吾無預焉丙戌垂至洛陽平原公暉聞其殺符飛龍閉門拒之翟斌復遣長史郭通往說垂垂猶未許通曰將軍所以拒通者豈非以翟斌兄弟山野異類無竒才逺略必無所成故邪獨不念將軍今日憑之可以濟大業乎垂乃許之於是斌帥其衆來與垂㑹勸垂稱尊號垂曰新興侯吾主也當迎歸返正耳垂以洛陽四面受敵欲取鄴而據之乃引兵而東故扶餘王餘蔚為滎陽太守及昌黎鮮卑衛駒各帥其衆降垂垂至滎陽羣下同請上尊號垂乃依晉中宗故事稱大將軍大都督燕王承制行事謂之統府羣下稱臣文表奏誥封拜官爵皆如王者以弟德為車騎大將軍封范陽王兄子楷為征西大將軍封太原王翟斌為建義大將軍封河南王餘蔚為征東將軍統府左司馬封扶餘王衛駒為鷹揚將軍慕容鳳為建䇿將軍帥衆二十餘萬自石門濟河長驅向鄴慕容農之奔列人也止於烏桓魯利家利為之置饌農笑而不食利謂其妻曰惡奴郎貴人家貧無以饌之奈何妻曰郎有雄才大志今無故而至必將有異非為飲食來也君亟出逺望以備非常利從之農謂利曰吾欲集兵列人以圖興復卿能從我乎利曰死生唯郎是從農乃詣烏桓張驤說之曰家王已舉大事翟斌等咸相推奉逺近響應故來相告耳驤再拜曰得舊主而奉之敢不盡死於是農驅列人居民為士卒斬桑榆為兵裂䄡裳為旗使趙秋說屠各畢聰聰與屠各卜勝張延李白郭超及東夷餘和敕勃易陽烏桓劉大各帥部衆數千赴之農假張驤輔國將軍劉大安逺將軍魯利建威將軍農自將攻破館陶收其軍資器械遣蘭汗假讚趙秋慕輿悕略取康臺牧馬數千匹汗燕王垂之從舅讚聰之子也於是步騎雲集衆至數萬驤等共推農為使持節都督河北諸軍事驃騎大將軍監統諸將隨才部署上下肅然農以燕王垂未至不敢封賞將士趙秋曰軍無賞士不往今之來者皆欲建一時之功規萬丗之利宜承制封拜以廣中興之基農從之於是赴者相繼垂聞而善之農西招庫傉官偉於上黨東引乞特歸於東阿北召光烈將軍平睿及睿兄汝陽太守幼於燕國偉等皆應之又遣蘭汗等攻頓丘克之農號令整肅軍無私掠士女喜恱長樂公丕使石越將步騎萬餘討之農曰越有智勇之名今不南拒大軍而來此是畏王而陵我也必不設備可以計取之衆請治列人城農曰善用兵者結士以心不以異物今起義兵唯敵是求當以山河為城池何列人之足治也辛卯越至列人西農使趙秋及參軍綦毋滕擊越前鋒破之參軍太原趙謙言於農曰越甲仗雖精人心危駭易破也宜急擊之農曰彼甲在外我甲在心晝戰則士卒見其外貌而憚之不如待暮擊之可以必克令軍士嚴備以待毋得妄動越立柵自固農笑謂諸將曰越兵精士衆不乘其初至之鋭以擊我方更立柵吾知其無能為也向暮農鼓譟出陳于城西牙門劉木請先攻越柵農笑曰凡人見美食誰不欲之何得獨請然汝猛鋭可嘉當以先鋒惠汝木乃帥壯士四百騰柵而入秦兵披靡農督大衆隨之大敗秦兵斬越送首於垂越與毛當皆秦之驍將也故秦王堅使助二子鎮守既而相繼敗沒人情騷動所在盜賊羣起庚戌燕王垂至鄴改秦建元二十年為燕元年服色朝儀皆如舊章以前岷山公庫傉官偉為左長史前尚書假崇為右長史滎陽鄭豁等為從事中郎慕容農引兵㑹垂於鄴垂因其所稱之官而授之立丗子寶為太子封從弟拔等十七人及甥宇文輸舅子蘭審皆為王其餘宗族及功臣封公者三十七人侯伯子男者八十九人可足渾談集兵得二萬餘人攻野王拔之引兵㑹攻鄴平幼及弟睿規亦帥衆數萬㑹垂於鄴長樂公丕使姜讓誚讓燕王垂且說之曰過而能改今猶未晚也垂曰孤受主上不丗之恩故欲安全長樂公使盡衆赴京師然後修復國家之業與秦永為鄰好何故暗於機運不以鄴城見歸若迷而不復當窮極兵藝恐單馬求生亦不可得也讓厲色責之曰將軍不容於家國投命聖朝燕之尺土將軍豈有分乎主上與將軍風殊類别一見傾心親如宗戚寵踰勳舊自古君臣際遇有如是之厚者乎一旦因王師小敗遽有異圖長樂公主上元子受分陜之任寧可束手輸將軍以百城之地乎將軍欲裂冠毁冕自可極其兵藝奚更云云但惜將軍以七十之年懸首白旗髙丗之忠更為逆鬼耳垂默然左右請殺之垂曰彼各為其主耳何罪禮而歸之遺丕書及上秦王堅表陳述利害請送丕歸長安堅及丕怒復書切責之壬子燕王垂攻鄴拔其外郭長樂公丕退守中城關東六州郡縣多送任請降於燕癸丑垂以陳留王紹行冀州刺史屯廣阿桓沖聞謝玄等有功自以失言慙恨成疾而卒二月燕王垂引丁零烏桓之衆二十餘萬為飛梯地道以攻鄴不拔乃築長圍守之分處老弱於肥鄉築新興城以置輜重燕范陽王德擊秦枋頭取之置戍而還東胡王晏據館陶為鄴中聲援鮮卑烏桓及郡縣民據塢壁不從燕者尚衆燕王垂遣太原王楷與鎮南將軍陳留王紹討之楷謂紹曰鮮卑烏桓及冀州之民本皆燕臣今大業始爾人心未洽所以小異唯宜綏之以德不可震之以威吾當止一處為軍聲之本汝巡撫民夷示以大義彼必當聽從楷乃屯于辟陽紹帥騎數百往說王晏為陳禍福晏隨紹詣楷降於是鮮卑烏桓及塢民降者數十萬口楷留其老弱置守宰以撫之發其丁壯十餘萬與王晏詣鄴垂大恱曰汝兄弟才兼文武足以繼先王矣三月秦北地長史慕容泓聞燕王垂攻鄴亡奔關東收集鮮卑衆至數千還屯華隂敗秦將軍彊永其衆遂盛自稱都督陜西諸軍事大將軍雍州牧濟北王推垂為丞相都督陜東諸軍事領大司馬冀州牧吳王秦王堅謂權翼曰不用卿言使鮮卑至此關東之地吾不復與之爭將若泓何乃以廣平公熙為雍州刺史鎮蒲坂徴雍州牧巨鹿公睿為都督中外諸軍事衛大將軍録尚書事配兵五萬以左將軍竇衝為長史龍驤將軍姚萇為司馬以討泓平陽太守慕容沖亦起兵於平陽有衆二萬進攻蒲坂堅使竇衝討之庫傉官偉帥營部數萬至鄴燕王垂封偉為安定主秦冀州刺史阜城侯定守信都髙城男紹在其國高邑侯亮重合侯謨守常山固安侯鑒守中山燕王垂遣前將軍樂浪王溫督諸軍攻信都不克夏四月丙辰遣撫軍大將軍麟益兵助之定鑒秦王堅之從叔紹謨從弟亮從子也溫燕王之弟子也慕容泓聞秦兵且至懼帥衆將奔關東秦巨鹿愍公睿粗猛輕敵欲馳兵邀之姚萇諫曰鮮卑皆有思歸之志故起而為亂宜驅令出關不可遏也夫執鼷鼠之尾猶能反噬於人彼自知困窮致死於我萬一失利悔將何及但可鳴鼓隨之彼將奔敗不暇矣睿弗從戰于華澤睿兵敗為泓所殺萇遣龍驤長史趙都參軍姜協詣秦王堅謝罪堅怒殺之萇懼奔渭北馬牧於是天水尹緯尹詳南安龐演等紏扇羌豪帥其户口歸萇者五萬餘家推萇為盟主萇自稱大將軍大單于萬年秦王大赦改元白雀以尹詳龐演為左右長史南安姚晃及尹緯為左右司馬天水狄伯支等為從事中郎姜訓等為掾屬王據等為參軍王欽盧姚方成等為將帥秦竇衝擊慕容沖于河東大破之沖帥鮮卑騎八千奔慕容泓泓衆至十餘萬遣使謂秦王堅曰吳王已定關東可速資備大駕奉送家兄皇帝泓當帥關中燕人翼衛乘輿還返鄴都與秦以虎牢為界永為鄰好堅大怒召慕容暐責之曰今泓書如此卿欲去者朕當相資卿之宗族可謂人面獸心不可以國士期也暐叩頭流血涕泣陳謝堅久之曰此自三豎所為非卿之過復其位待之如初命暐以書招諭泓沖及垂暐密遣使謂泓曰吾籠中之人必無還理且燕室之罪人也不足復顧汝勉建大業以吳王為相國中山王為太宰領大司馬汝可為大將軍領司徒承制封拜聽吾死問汝便即尊位泓於是進向長安改元燕興燕王垂以鄴城猶固㑹寮佐議之右司馬封衡請引漳水灌之從之垂行圍因飲於華林園秦人密出兵掩之矢下如雨垂幾不得出冠軍大將軍隆將騎衝之垂僅而得免五月秦符定符紹皆降於燕燕慕容麟引兵西攻常山後秦王萇進屯北地秦華隂北地新平安定羌胡降之者十餘萬六月秦王堅自帥步騎二萬以擊後秦軍于趙氏塢使護軍將軍楊璧等分道攻之後秦兵屢敗斬後秦王萇之弟鎮軍將軍尹買後秦軍中無井秦人塞安公谷堰同官水以困之後秦人忷懼有渴死者㑹天大雨後秦營中水三尺繞營百步之外寸餘而已後秦軍復振秦王堅歎曰天亦佑賊乎慕容泓謀臣髙蓋等以泓德望不如慕容沖且持法苛峻乃殺泓立沖為皇太弟承制行事置百官以髙蓋為尚書令後秦王萇遣其子嵩為質於沖以請和後秦王萇帥衆七萬擊秦秦王堅遣楊璧等拒之為萇所敗獲楊璧及右將軍徐成鎮軍將軍毛盛等將吏數十人萇皆禮而遣之燕慕容麟拔常山秦符亮符謨皆降麟進圍中山秋七月克之執符鑒麟威聲大振留屯中山秦幽州刺史王永平州刺史符沖帥二州之衆以擊燕燕王垂遣寧朔將軍平規擊永永遣昌黎太守宋敞逆戰於范陽敞兵敗規進據薊南秦平原公暉帥洛陽陜城之衆七萬歸于長安秦王堅聞慕容沖去長安浸近乃引兵歸遣撫軍大將軍髙陽公方戍驪山拜平原公暉為都督中外諸軍事配兵五萬以拒沖沖與暉戰於鄭西大破之堅又遣前將軍姜宇與少子河間公琳帥衆三萬拒沖於灞上琳宇皆敗死沖遂據阿房城燕翟斌與秦長樂公丕通謀垂殺斌翟真奔邯鄲零叛燕事見丁八月鄴中芻糧俱盡削松木以飼馬燕王垂謂諸將曰符丕窮冦必無降理不如退屯新城開丕西歸之路以謝秦王疇昔之恩且為討翟真之計丙寅夜垂解圍趨新城遣慕容農徇清河平原徴督租賦農明立約束均適有無軍令嚴整無所侵㬥由是榖帛屬路軍資豐給秦王永求救於振威將軍劉庫仁庫仁遣其妻兄公孫希帥騎三千救之大破平規於薊南乘勝長驅進據唐城與慕容麟相持九月慕容沖進逼長安秦王堅登城觀之歎曰此虜何從出哉大呼責沖曰奴何苦來送死沖曰奴厭奴苦欲取汝為代耳沖少有寵於堅堅遣使以錦袍稱詔遺之沖遣詹事稱皇太弟令答之曰孤今心在天下豈顧一袍小惠茍能知命君臣束手早送皇帝自當寬貸符氏以酬曩好堅大怒曰吾不用王景略陽平公之言使白虜敢至於此冬十月秦長樂公丕遣宦者冗從僕射清河光祚將兵數百赴中山與燕叛將翟真相結又遣陽平太守邵興將數千騎招集冀州故郡縣與光祚期㑹襄國是時燕軍疲弊秦勢復振冀州郡縣皆觀望成敗趙郡人趙栗等起兵柏鄉以應興燕王垂遣冠軍大將軍隆龍驤將軍張崇將兵邀擊興命驃騎大將軍農自清河引兵㑹之隆與興戰於襄國大破之興走至廣阿遇農執之光祚聞之循西山走歸鄴隆遂擊趙栗等皆破之冀州郡縣復從燕劉庫仁聞公孫希已破平規欲大舉兵以救長樂公丕發鴈門上谷代郡兵屯繁畤燕太子太保慕輿句之子文零陵公慕輿䖍之子常時在庫仁所知三郡兵不樂逺征因作亂夜攻庫仁殺之竊其駿馬奔燕公孫希之衆聞亂自潰秦長樂公丕遣光祚及參軍封孚召驃騎將軍張蚝并州刺史王騰於晉陽以自救蚝騰以衆少不能赴丕進退路窮謀於僚佐司馬楊膺請自歸於晉丕未許㑹謝玄遣龍驤將軍劉牢之等據碻磝濟陽太守郭滿據滑臺將軍顔肱劉襲軍于河北丕遣將軍桑據屯黎陽以拒之丕懼乃遣從弟就與參軍焦逵請救於玄致書稱欲假途求糧西赴國難須援軍既接以鄴與之若西路不通長安陷沒請帥所領保守鄴城逵與參軍姜讓密謂楊膺曰今喪敗如此長安阻絶存亡不可知屈節竭誠以求糧援猶懼不獲而公豪氣不除方設兩端事必無成宜正書為表許以王師之至當致身南歸如其不從可逼縛與之膺自以力能制丕乃改書而遣之後秦王萇聞慕容沖攻長安㑹羣僚議進止皆曰大王宜先取長安建立根本然後經營四方萇曰不然燕人因其衆有思歸之心以起兵若得其志必不久留關中吾當移屯嶺北廣收資實以待秦亡燕去然後拱手取之耳乃留其長子興守北地使寧北將軍姚穆守同官川自將其衆攻新平初新平人殺其郡將秦王堅缺其城角以恥之新平民望深以為病欲立忠義以雪之及後秦王萇至新平新平太守南安茍輔欲降之郡人遼西太守馮傑蓮勺令馮羽尚書郎趙義汶山太守馮苗諫曰昔田單以一城存齊今秦之州鎮猶連城過百奈何遽為叛臣乎輔喜曰此吾志也但恐久而無救郡人橫被無辜諸君能爾吾豈顧生哉於是憑城固守後秦為土山地道輔亦於內為之或戰地下或戰山上後秦之衆死者萬餘人輔詐降以誘萇萇將入城覺之而返輔伏兵邀擊幾獲之又殺萬餘人鮮卑在長安城中者猶千餘人慕容紹之兄肅與慕容暐隂謀結鮮卑為亂十二月暐白堅以其子新昏請堅幸其家置酒欲伏兵殺之堅許之㑹天大雨不果往事覺堅召暐及肅肅曰事必泄矣入則俱死今城內已嚴不如殺使者馳出既得出門大衆便集暐不從遂俱入堅曰吾相待何如而起此意暐飾辭以對肅曰家國事重何論意氣堅先殺肅乃殺暐及其宗族城內鮮卑無少長男女皆殺之燕王垂幼子柔養於宦者宋牙家為牙子故得不坐與太子寶之子盛乘間得出奔慕容沖燕王垂以秦長樂公丕猶據鄴不去乃更引兵圍鄴開其西走之路焦逵見謝玄玄欲徴丕任子然後出兵逵固陳丕款誠并述楊膺之意玄乃遣劉牢之滕恬之等帥衆二萬救鄴丕告饑玄水陸運米二千斛以饋之十年春正月秦王堅朝饗羣臣時長安饑人相食諸將歸吐肉以飼妻子慕容沖即皇帝位于阿房改元更始沖有自得之志賞罰任情慕容盛年十三謂慕容柔曰夫十人之長亦須才過九人然後得安今中山王才不逮人功未有成而驕汰已甚殆難濟乎後秦王萇留諸將攻新平自引兵擊安定擒秦安西將軍勃海公珍嶺北諸城悉降之甲寅秦王堅與西燕主沖戰于仇班渠大破之乙卯戰于雀桑又破之甲子戰于白渠秦兵大敗西燕兵圍秦王堅殿中將軍鄧邁等力戰却之堅乃得免壬申沖遣尚書令髙蓋夜襲長安入其南城左將軍竇衝前禁將軍李辨等擊破之斬首八百級分其尸而食之乙亥髙蓋引兵攻渭北諸壘太子宏與戰於成二壁大破之斬首三萬二月癸未秦王堅與西燕主沖戰于城西大破之追奔至阿城諸將請乘勝入城堅恐為沖所掩引兵還劉牢之至枋頭楊膺姜讓謀泄長樂公丕收殺之牢之聞之盤桓不進秦平原悼公暉數為西燕主沖所敗秦王堅讓之曰汝吾之才子也擁大衆與白虜小兒戰而屢敗何用生為三月暉憤恚自殺西燕主沖攻秦髙陽愍公方於驪山殺之執秦尚書韋鍾以其子謙為馮翊太守使招集三輔之民馮翊壘主邵安民等責謙曰君雍州望族今乃從賊與之為不忠不義何面目以行於丗乎謙以告鍾鍾自殺謙來奔秦左將軍茍池右將軍俱石子與西燕主沖戰於驪山兵敗西燕將軍慕容永斬茍池俱石子奔鄴永廆弟運之孫石子難之弟也秦王堅遣領軍將軍楊定擊沖大破之虜鮮卑萬餘人而還悉坑之三月燕王垂攻鄴久不下將北詣冀州乃命撫軍大將軍麟屯信都樂浪王溫屯中山召驃騎大將軍農還鄴於是逺近聞之以燕為不振頗懷去就農至髙邑遣從事中郎眭邃近出違期不還長史李攀言於農曰邃目下參佐敢欺罔不還請回軍討之農不應敕備假板以邃為高陽太守參佐家在趙北者悉假署遣歸凡舉補太守三人長史二十餘人退謂攀曰君所見殊誤當今豈可自相魚肉俟吾北還邃等自當迎於道左君但觀之樂浪王溫在中山兵力甚弱丁零四布分據諸城溫謂諸將曰以吾之衆攻則不足守則有餘驃騎撫軍首尾連兵㑹須滅賊但應聚糧厲兵以俟時耳於是撫舊招新勸課農桑民歸附者相繼郡縣壁壘爭送軍糧倉庫充溢翟真夜襲中山溫擊破之自是不敢復至溫乃遣兵一萬運糧以餉垂且營中山宫室劉牢之攻燕黎陽太守劉撫于孫就栅燕王垂留慕容農守鄴圍自引兵救之秦長樂公丕聞之出兵乘虛夜襲燕營農擊敗之劉牢之與垂戰不勝退屯黎陽垂復還鄴夏四月劉牢之進兵至鄴燕王垂逆戰而敗遂撤圍退屯新城乙卯自新城北遁牢之不告秦長樂公丕即引兵追之丕聞之發兵繼進庚申牢之追及垂於董唐淵垂曰秦晉瓦合相待為彊一勝則俱豪一失則俱潰非同心也今兩軍相繼藝既未合宜急擊之牢之軍疾趨二百里至五橋澤爭燕輜重垂邀擊大破之斬首數千級牢之單馬走㑹秦救至得免鄴中饑甚秦長樂公丕帥衆就晉榖於枋頭劉牢之入屯鄴城收集亡散兵復少振坐軍敗徴還燕秦相持經年幽冀大饑人相食邑落蕭條燕之軍士多餓死燕王垂禁民養蠶以桑椹為軍糧垂將北趣中山以驃騎大將軍農為前驅前所假授吏眭邃等皆來迎候上下如初李攀乃服農之智略新平糧竭矢盡外救不至後秦王萇使人謂茍輔曰吾方以義取天下豈讎忠臣邪卿但帥城中之人還長安吾正欲得此城耳輔以為然帥民五千口出城萇圍而坑之男女無遺獨馮傑子終得脫奔長安秦王堅追贈輔等官爵皆諡曰節愍侯以終為新平太守五月西燕主沖攻長安秦王堅身自督戰飛矢滿體流血淋漓沖縱兵㬥掠關中士民流散道路斷絶千里無煙有堡壁三十餘推平逺將軍趙敖為主相與結盟冒難遣兵糧助堅多為西燕兵所殺堅謂之曰聞來者率不善逹此誠忠臣之義然今寇難殷繁非一人之力所能濟也徒相隨入虎口何益汝曹宜為國自愛畜糧厲兵以俟天時庶幾善不終否有時而泰也三輔之民為沖所略者遣人密告堅請遣兵攻沖欲縱火為內應堅曰甚哀諸卿忠誠然吾猛士如虎豹利兵如霜雪困於烏合之虜豈非天乎恐徒使諸卿坐自夷滅吾不忍也其人固請不已乃遣七百騎赴之沖營縱火者反為風火所燒其得免者什一二堅祭而哭之衛將軍楊定與沖戰於城西為沖所擒定秦之驍將也堅大懼以䜟書云帝出五將久長得乃留太子宏守長安謂之曰天其或者欲導豫出外汝善守城勿與賊爭利吾當出隴收兵運糧以給汝遂帥騎數百與張夫人及中山公詵二女寶錦出奔五將山宣告州郡期以孟冬救長安六月秦太子宏不能守長安將數千騎與母妻宗室西奔下辨百官逃散司隸校尉權翼等數百人奔後秦西燕主沖入據長安縱兵大掠死者不可勝計秋七月秦王堅至五將山後秦王萇遣驍騎將軍吳忠帥騎圍之秦兵皆散走獨侍御十數人在側堅神色自若坐而待之召宰人進食俄而忠至執之送詣新平幽於别室太子宏至下辨南秦州刺史楊璧拒之璧妻堅之女順陽公主也棄其夫從宏宏奔武都投氐豪彊熙假道來奔詔處之江州長樂公丕帥衆自枋頭將歸鄴城龍驤將軍檀玄擊之玄兵敗丕復入鄴城八月後秦王萇使求傳國璽於秦王堅曰萇次應歷數可以為惠堅瞋目叱之曰小羌敢逼天子五胡次序無汝羌名璽已送晉不可得也萇復遣右司馬尹緯說堅求為禪代堅曰禪代聖賢之事姚萇叛賊何得為之堅與緯語問緯在朕朝何官緯曰尚書令史堅歎曰卿王景略之儔宰相才也而朕不知卿宜其亡也堅自以平生遇萇有恩尤忿之數罵萇求死謂張夫人曰豈可令羌奴辱吾兒乃先殺寶錦辛丑萇遣人縊堅於新平佛寺張夫人中山公詵皆自殺後秦將士皆為之哀慟萇欲隱其名諡堅曰壯烈天王臣光曰論者皆以為秦王堅之亡由不殺慕容垂姚萇故也臣獨以為不然許劭謂魏武帝治丗之能臣亂丗之姦雄使堅治國無失其道則垂萇皆秦之能臣也烏能為亂哉堅之所以亡由驟勝而驕故也魏文侯問李充吳之所以亡對曰數戰數勝文侯曰數戰數勝國之福也何故亡對曰數戰則民疲數勝則主驕以驕主御疲民未有不亡者也秦王堅似之矣長樂公丕在鄴將西赴長安幽州刺史王永在壺關遣使招丕丕乃帥鄴中男女六萬餘口西如潞川驃騎將軍張蚝并州刺史王騰迎之入晉陽王永留平州刺史符沖守壺關自帥騎一萬㑹丕于晉陽丕始知長安不守堅已死乃發喪即皇帝位追諡堅曰宣昭皇帝廟號丗祖大赦改元大安燕王垂以魯王和為南中郎將鎮鄴九月秦王丕以張蚝為侍中司空王永為侍中都督中外諸軍事車騎大將軍尚書令王騰為中軍大將軍司隸校尉符沖為尚書左僕射封西平王又以左長史楊輔為右僕射右長史王亮為護軍將軍立妃楊氏為皇后子寧為皇太子夀為長樂王鏘為平原王懿為勃海王昶為濟北王秦尚書令魏昌公纂自關中奔晉陽秦主丕拜纂太尉封東海王冬十月西燕主冲遣尚書令髙蓋帥衆五萬伐後秦戰于新平南蓋大敗降於後秦符定符紹符謨符亮聞秦主丕即位皆自河北遣使謝罪中山太守王兖本新平氐也固守博陵為秦拒燕十一月丕以兖為平州刺史定為冀州牧紹為冀州都督謨為幽州牧亮為幽平二州都督竝進爵郡公左將軍竇衝據兹川有衆數萬與秦州刺史王統河州刺史毛興益州刺史王廣南秦州刺史楊璧衛將軍楊定皆自隴右遣使邀丕共擊後秦丕以定為雍州牧衝為梁州牧加統鎮西大將軍興車騎大將軍璧征南大將軍並開府儀同三司加廣安西將軍皆進位州牧慕容麟攻王兖于博陵城中糧竭矢盡功曹張猗踰城出聚衆以應麟兖臨城數之曰卿是秦民吾是卿君卿起兵應賊自號義兵何名實之相違也古人求忠臣必於孝子之門卿母在城棄而不顧吾何有焉今人取卿一切之功則可矣寧能忘卿不忠不孝之事乎不意中州禮義之邦乃有如卿者也十二月麟拔博陵執兖及符鑑殺之昌黎太守宋敞帥烏桓索頭之衆救兖不及而還秦主丕以敞為平州刺史十二月燕王垂北如中山謂諸將曰樂浪王招流散實倉廪外給軍糧內營宫室雖蕭何何以加之丙申垂始定都中山秦符定據信都以拒燕燕王垂以從弟北地王精為冀州刺史將兵攻之十一年春正月燕王垂即皇帝位後秦王萇如安定秦益州牧王廣自隴右引兵攻河州牧毛興於枹罕興遣建節將軍衛平帥其宗人一千七百夜襲廣大破之二月秦州牧王統遣兵助廣攻興興嬰城自守燕大赦改元建興置公卿尚書百官繕宗廟社稷西燕主沖樂在長安且畏燕主垂之彊不敢東歸課農築室為久安之計鮮卑咸怨之左將軍韓延因衆心不恱攻沖殺之立沖將假隨為燕王改元昌平三月西燕左僕射慕容恆尚書慕容永襲假隨殺之立宜都王子顗為燕王改元建明帥鮮卑男女四十餘萬口去長安而東恆弟護軍將軍韜誘顗殺之於臨晉恆怒捨韜去永與武衛將軍刁雲帥衆攻韜韜敗奔恆營恆立西燕主沖之子瑶為帝改元建平諡沖曰威皇帝衆皆去瑶奔永永執瑶殺之立慕容泓子忠為帝改元建武忠以永為太尉守尚書令封河東公永持法寬平鮮卑安之至聞喜聞燕主垂已稱尊號不敢進築燕熙城而居之鮮卑既東長安空虛前滎陽太守髙陵趙榖等招杏城盧水胡郝奴帥户四千入于長安渭北皆應之以榖為丞相扶風王驎有衆數千保據馬嵬奴遣弟多攻之夏四月後秦王萇自安定伐之驎奔漢中萇執多而進奴懼請降拜鎮北將軍六谷大都督毛興襲擊王廣敗之廣奔秦州隴西鮮卑匹蘭執廣送於後秦興復欲攻王統於上邽枹罕諸氐皆厭苦兵事乃共殺興推衛平為河內刺史遣使請命于秦秦大赦以衛平為撫軍將軍河州刺史使者沒於後秦不能逹後秦王萇即皇帝位于長安大赦改元建初國號大秦追尊其父弋仲為景元皇帝立妻蛇氏為皇后子興為太子置百官萇與羣臣宴酒酣言曰諸卿皆與朕北面秦朝今忽為君臣得無恥乎趙遷曰天不恥以陛下為子臣等何恥為臣萇大笑六月西燕刁雲等殺西燕主忠推慕容永為使持節大都督中外諸軍事大將軍大單于雍秦梁凉四州牧録尚書事河東王稱藩于燕燕主垂遣太原王楷趙王麟陳留王紹章武王宙攻秦符定符紹符謨符亮等楷先以書與之為陳禍福定等皆降垂封定等為侯曰以酬秦主之德秦主丕以都督中外諸軍事司徒録尚書事王永為左丞相大尉東海王纂為大司馬司空張蚝為太尉尚書令咸陽徐義為司空司隸校尉王騰為驃騎大將軍儀同三司永傳檄四方公侯牧守壘主民豪共討姚萇慕容垂令各帥所統以孟冬上旬㑹大駕于臨晉於是天水姜延馮翊冦明河東王昭新平張晏京兆杜敏扶風馬朗建忠將軍髙平牧官都尉扶風王敏等咸承檄起兵各有衆數萬遣使詣秦丕皆就拜將軍郡守封列侯冠軍將軍鄧景擁衆五千據彭池與竇衝為首尾以擊後秦丕以景為京兆尹景羌之子也後秦主萇徙安定五千餘户于長安秋七月秦平涼太守金熙安定都尉沒奕干與後秦左將軍姚方城戰于孫兵谷方成兵敗後秦王萇以其弟征虜將軍緒為司隸校尉鎮長安自將至安定擊熙等大破之金熙本東胡之種沒奕干鮮卑多蘭部帥也枹罕諸氐以衛平衰老難以成功議廢之而憚其宗彊纍日不決氐啖青謂諸將曰大事宜時定不然變生諸君但請衛公為㑹觀我所為㑹七夕大宴青抽劒而前曰今天下大亂吾曹休戚同之非賢主不可以濟大事衛公老宜返初服以避賢路狄道長符登雖王室踈屬志略雄明請共立之以赴大駕諸君有不同者即下異議乃奮劒攘𬒮將斬異已者衆皆從之莫敢仰視於是推登為使持節都督隴右諸軍事大將軍雍河二州牧略陽公帥衆五萬東下隴攻南安拔之馳使請命于秦登秦主丕之族子也八月秦主丕以符登為征西大將軍開府儀同三司南安王持節州牧都督皆因其所稱而授之又以徐義為右丞相留王騰守晉陽右僕射楊輔戍壺關帥衆四萬進屯平陽初後秦王萇之弟碩德統所部羌居隴上聞萇起兵自稱征西將軍聚衆於冀城以應之以兄孫詳為安逺將軍據隴城從孫訓為安西將軍據南安之赤亭與秦秦州刺史王統相持萇自安定引兵㑹碩德攻統天水屠各略陽羌胡應之者二萬餘户秦略陽太守王皮降之九月王統以秦州降于後秦後秦主萇以姚碩德為使持節都督隴右諸軍事秦州刺史鎮上邽冬十月西燕慕容永遣使詣秦主丕求假道東歸丕弗許與永戰於襄陵秦兵大敗左丞相王永衛大將軍俱石子皆死初東海王纂自長安來麾下壯士三千餘人丕忌之既敗懼為纂所殺帥騎數千南奔東垣謀襲洛陽楊威將軍馮該自陜邀擊之殺丕執其太子寧長樂王夀送建康詔赦不誅以付符宏纂與其弟尚書永平侯師奴帥秦衆數萬走據杏城其餘王公百官皆沒於永永遂進據長子即皇帝位改元中興將以秦后楊氏為上夫人楊氏引劒刺永為永所殺後秦主萇還安定秦南安王登既克南安夷夏歸之者三萬餘户遂進攻姚碩德于秦州後秦主萇自往救之登與萇戰于胡奴阜大破之斬首二萬餘級將軍啖青射萇中之萇創重走保上邽姚碩德代之統衆十一月秦尚書寇遺奉勃海王懿濟北王昶自杏城奔南安南安王登發喪行服諡秦主丕曰哀平皇帝登議立懿為主衆曰勃海王雖先帝之子然年在幼沖未堪多難今三虜窺覦宜立長君非大王不可登乃為壇於隴東即皇帝位大赦改元太初置百官慕容柔慕容盛及盛弟㑹皆在長子盛謂柔㑹曰主上已中興幽冀東西未一吾屬居嫌疑之地為智為愚皆將不免不若以時東歸無為坐待魚肉也遂相與亡歸燕後歲餘西燕主永悉誅燕主雋及燕主垂之子孫男女無遺十二月秦主登立丗祖神主於軍中載以輜軿建黃旗青蓋以虎賁三百人衛之凡所欲為必啓主而後行引兵五萬東擊後秦將士皆刻鉾鎧為死休字每戰以劒矟為方圓大陳知有厚薄從中分配故人自為戰所向無前初長安之將敗也中壘將軍徐嵩屯騎校尉胡空各聚衆五千結壘自固既而受後秦官爵後秦主萇以王禮葬秦主堅於二壘之間及登至嵩空以衆降之登拜嵩雍州刺史空京兆尹改葬堅以天子之禮十二年春正月秦主登立妃毛氏為皇后勃海王懿為太弟后興之女也遣使拜東海王纂為使持節都督中外諸軍事太師領大司馬封魯王纂弟師奴為撫軍大將軍并州牧封朔方公纂怒謂使者曰勃海王先帝之子也南安王何以不立而自立乎長史王旅諫曰南安已立理無中改今寇虜未滅不可宗室之中自為仇敵也纂乃受命於是盧水胡彭沛穀屠各董成張龍丗新平羌雷惡地等皆附於纂有衆十餘萬後秦主萇徙秦州豪傑三萬户于安定三月秦主登以竇衝為南秦州牧楊定為益州牧楊璧為司空梁州牧夏四月後秦征西將軍姚碩德為楊定所逼退守涇陽定與秦魯王纂共攻之戰于涇陽碩德大敗後秦主萇自隂密救之纂退屯敷陸燕主垂自碻磝還中山慕容柔慕容盛慕容㑹來自長子庚辰垂為之大赦垂問盛長子人情如何為可取乎盛曰西軍擾擾人有東歸之志陛下唯當修仁政以俟之耳若大軍一臨必投戈而來若孝子之歸慈父也垂恱癸未封柔為陽平王盛為長樂公㑹為清河公秋七月秦主登軍于瓦亭後秦主萇攻彭沛穀堡拔之榖奔杏城萇還隂密以太子興鎮長安八月秦馮翊太守蘭櫝帥衆二萬自頻陽入和寧與魯王纂謀攻長安纂弟師奴勸纂稱尊號纂不從師奴殺纂而代之櫝遂與師奴絶西燕主永攻櫝櫝遣使請救於秦後秦主萇欲自救之尚書令姚旻左僕射尹緯曰符登近在瓦亭將乘虛襲吾後萇曰符登衆盛非旦夕可制登遲重少決必不能輕軍深入比兩月閒吾必破賊而返登雖至無能為也九月萇軍于泥源師奴逆戰大敗亡奔鮮卑後秦盡收其衆屠各董成等皆降秦主登進據胡空堡戎夏歸者十餘萬後秦主萇進擊西燕主永於河西永走蘭櫝復列兵拒守萇攻之十二月禽櫝遂如杏城後秦姚方成攻秦雍州刺史徐嵩壘拔之執嵩而數之嵩罵曰汝姚萇罪當萬死符黃眉欲斬之先帝止之授任內外榮寵極矣曽不如犬馬識所飬之恩親為大逆汝羌輩豈可以人理期也何不速殺我早見先帝取姚萇於地下治之方成怒三斬嵩悉坑其士卒以妻子賞軍後秦主萇掘秦主堅尸鞭撻無數剝衣倮形薦之以棘坎土而埋之十三年春二月秦主登軍朝那後秦主萇軍武都秋七月秦後秦自春相持屢戰互有勝負至是各解歸關西豪桀以後秦久無成功多去而附秦八月秦主登立子崇為皇太子冬十月後秦主萇還安定秦主登就食新平帥衆萬餘圍萇營四面大哭萇命營中哭以應之登乃退十四年春正月後秦主萇以秦戰屢勝謂得秦王堅之神助亦於軍中立堅像而禱之曰臣兄襄敕臣復讎新平之禍臣行襄之命非臣罪也符登陛下踈屬猶欲復讎况臣敢忘其兄乎且陛下命臣以龍驤建業臣敢違之今為陛下立像陛下勿追計臣過也秦主登升樓遙謂萇曰為臣弒君而立像求福庸有益乎因大呼曰弒君賊姚萇何不自出吾與汝決之萇不應久之以戰未有利軍中每夜數驚乃斬像首以送秦夏五月後秦主萇與秦主登戰數敗乃遣中軍將軍姚崇襲大界登邀擊之於安丘又敗之秋七月秦主登攻後秦右將軍吳忠等於平涼克之八月登據茍頭原以逼安定諸將勸後秦主萇決戰萇曰與窮寇競勝兵家之忌也吾將以計取之乃留尚書令姚旻守安定夜帥騎三萬襲秦輜重于大界克之殺毛后及南安王辨北海王尚擒名將數十人驅掠男女五萬餘口而還毛氏美而勇善騎射後秦兵入其營毛氏猶彎弓跨馬帥壯士數百力戰殺七百餘人衆寡不敵為後秦所執萇將納之毛氏罵且哭曰姚萇汝先已殺天子今又欲辱皇太后皇天后土寧汝容乎萇殺之諸將欲因秦軍駭亂擊之萇曰登衆雖亂怒氣猶盛未可輕也遂止登收餘衆屯胡空堡萇使姚碩德鎮安定徙安定千餘家于隂密遣其弟征南將軍靖鎮之秦主登之東也後秦主萇使姚碩德置秦州守宰以從弟常戍隴城邢奴戍冀城姚詳戍略陽楊定攻隴冀克之斬常執邢奴詳棄略陽奔隂密定自稱秦州牧隴西王秦因其所稱而授之冬十月秦主登以竇衝為大司馬都督隴東諸軍事雍州牧楊定為左丞相都督中外諸軍事秦梁二州牧楊璧為都督隴右諸軍事南秦益二州牧約與共攻後秦又約監河西諸軍事并州刺史楊政都督河東諸軍事冀州刺史楊楷各帥其衆㑹長安政楷皆河東人秦主丕既敗政楷收集流民數萬户政據河西楷據湖陜之間遣使請命於秦登因而授之十二月後秦主萇使其東門將軍任瓫詐遣使招秦主登許關門納之登將從之征東將軍雷惡地將兵在外聞之馳騎見登曰姚萇多詐不可信也登乃止長聞惡地詣登謂諸將曰此羌見登事不成矣登以惡地勇略過人隂憚之惡地懼降於後秦萇以惡地為鎮軍將軍十五年春正月西燕王永引兵向洛陽朱序自河隂北濟河擊敗之三月後秦主萇攻秦扶風太守齊益男於新羅堡克之益男走秦主登攻後秦天水太守張業生於隴東萇救之登引去秋七月馮翊人郭質起兵於廣鄉以應秦移檄三輔曰姚萇凶虐毒被神人吾屬丗䝉先帝堯舜之仁非常伯納言之子即卿校牧守之孫也與其含恥而存孰若蹈道而死於是三輔壁壘皆應之獨鄭縣人茍曜不從聚衆數千附於後秦秦以質為馮翊太守後秦以曜為豫州刺史冬十二月郭質及茍曜戰于鄭東質敗奔洛陽十六年春三月秦主登自雍攻後秦安東將軍金榮于范氏堡克之遂渡渭水攻京兆太守韋範于假氏堡不克進據曲牢夏四月燕蘭汗破賀染干於牛都茍曜有衆一萬密召秦主登許為內應登自曲牢向繁川軍于馬頭原五月後秦主萇引兵逆戰登擊破之斬其右將軍吳忠萇收衆復戰姚碩德曰陛下慎於輕戰每欲以計取之今戰失利而更前逼賊何也萇曰登用兵遲緩不識虛實今輕兵直進遙據吾東此必茍曜豎子與之有謀也緩之則其謀得成故及其交之未合急擊之以敗散其事耳遂進戰大破之登退屯於郿秦兖州刺史彊金槌據新平降後秦以其子逵為質後秦主萇將數百騎入金槌營羣下諫之萇曰金槌既去符登又欲圖我將安所歸乎且彼初來欵附宜推心以結之奈何復以不信疑之乎既而羣氐欲取萇金槌不從秋七月秦主登攻新平後秦主萇救之登引去冬十二月秦主登攻安定後秦主萇如隂密以拒之謂太子興曰茍曜聞吾北行必來見汝汝執誅之曜果見興於長安興使尹緯讓而誅之萇敗登於安定城東登退據路承堡萇置酒髙㑹諸將皆曰若值魏武王不令此賊至今陛下將牢太過耳萇笑曰吾不如亡兄有四身長八尺五寸臂垂過膝人望而畏之一也將十萬之衆與天下爭衡望麾而進前無橫陳二也溫古知今講論道藝收羅英雋三也董帥大衆上下咸恱人盡死力四也所以得建立功業驅䇿羣賢者正望算略中有片長耳羣臣咸稱萬歲十七年春三月後秦主萇寢疾命姚碩德鎮李潤尹緯守長安召太子興詣行營征南將軍姚方成言於興曰今寇敵未滅上復寢疾王統等皆有部曲終為人患宜盡除之興從之殺王統王廣符胤徐成毛盛萇怒曰王統兄弟吾之州里實無他志徐成等皆前朝名將吾方用之奈何輒殺之秋七月秦主登聞後秦主萇疾病大喜告祠丗祖神主大赦百官進位二等秣馬厲兵進逼安定去城九十餘里八月萇疾小瘳出兵拒之登引兵出營將逆戰萇遣安南將軍姚熙隆别攻秦營登懼而還萇夜引兵旁出以躡其後旦而候騎告曰賊諸營已空不知所向登驚曰彼為何人去令我不知來令我不覺謂其將死忽然復來朕與此羌同丗何其厄哉登遂還雍萇亦還安定巴蜀人在關中者皆叛後秦據弘農以附秦秦主登以竇衝為左丞相衝徙屯華隂郗恢遣將軍趙睦守金墉河南太守楊佺期帥衆軍湖城擊衝走之十八年夏五月秦右丞相竇衝矜才尚人自請封天水王秦主登不許六月衝自稱秦王改元元光秋七月秦主登攻竇衝於野人堡衝求救於後秦尹緯言於後秦主萇曰太子仁厚之稱著於逺近而英略未著請使擊符登以著之萇從之太子興將兵攻胡空堡登解衝圍以赴之興因襲平凉大獲而歸萇使興還鎮長安冬十月後秦主萇疾甚還長安燕主垂議伐西燕諸將皆曰永未有釁我連年征討士卒疲弊未可也范陽王德曰永既國之枝葉又僣舉位號惑民視聽宜先除之以一民心士卒雖疲庸得已乎垂曰司徒意正與吾同吾比老叩囊底智足以取之終不復留此賊以纍子孫也遂戒嚴十一月垂發中山步騎七萬遣鎮西將軍丹楊王纘龍驤將軍張崇出井陘攻西燕武鄉公友于晉陽征東將軍平規攻鎮東將軍假平于沙亭西燕主永遣其尚書令刁雲車騎將軍慕容鍾帥衆五萬守潞川友永之弟也十二月垂至鄴己亥後秦主萇召太尉姚旻僕射尹緯姚晃將軍姚大目尚書狄伯支入禁中受遺詔輔政萇謂太子興曰有毁此諸公者慎勿受之汝撫骨肉以恩接大臣以禮待物以信遇民以仁四者不失吾無憂矣姚晃垂涕問取符登之䇿萇曰今大業垂成興才智足辦奚所復問庚子萇卒興祕不發喪以其叔父緒鎮安定碩德鎮隂密弟崇守長安或謂碩德曰公威名素重部曲最彊今易丗之際必為朝廷所疑不如且奔秦州觀望事勢碩德曰太子志度寬明必無它慮今符登未滅而骨肉相攻是自亡也吾有死而已終不為也遂往見興興優禮而遣之興自稱大將軍以尹緯為長史狄伯支為司馬帥衆伐秦十九年春正月秦主登聞後秦主萇卒喜曰姚興小兒吾折杖笞之耳乃大赦盡衆而東留司徒安成王廣守雍太子崇守胡空堡二月燕主垂留清河公㑹鎮鄴發司冀青兖兵遣太原王楷出滏口遼西王農出壺關垂自出沙庭以擊西燕標榜所趣軍各就頓西燕主永聞之嚴兵分道拒守聚糧臺壁遣從子征東將軍小逸豆歸鎮東將軍王次多右將軍勒馬駒帥衆萬餘人戍之夏四月秦主登自六陌趣廢橋後秦始平太守姚詳據馬嵬堡以拒之太子興遣尹緯將兵救詳緯據廢橋以待秦秦兵爭水不能得渴死者什二三因急攻緯興馳遣狄伯支謂緯曰符登窮寇宜持重以挫之緯曰先帝登遐人情擾懼今不因思奮之力以禽敵大事去矣遂與秦戰秦兵大敗其夜秦衆潰登單騎奔雍太子崇及安成王廣聞敗皆棄城走登至無所歸乃奔平涼收集遺衆入馬毛山燕主垂頓軍鄴西南月餘不進西燕王永怪之以為太行道寬疑垂欲詭道取之乃悉斂諸軍屯軹關杜太行口惟留臺壁一軍甲戌垂引大軍出滏口入天井關五月乙酉燕軍至臺壁永遣從兄太尉大逸豆歸救之平規擊破之小逸豆歸出戰遼西王農又擊破之斬勒馬駒禽王次多遂圍臺壁永召太行軍還自將精兵五萬以拒之刁雲慕容鍾震怖帥衆降燕永誅其妻子己亥垂陳于臺壁南遣驍騎將軍慕容國伏千騎於澗下庚子與永合戰垂僞退永衆追之行數里國騎從澗中出斷其後諸軍四面俱進大破之斬首八千餘級永走歸長子晉陽守將聞之棄城走丹楊王瓚等進取晉陽五月後秦太子興始發喪即皇帝位于槐里大赦改元皇初遂如安定諡後秦主萇曰武昭皇帝廟號大祖六月燕主垂進軍圍長子西燕主永欲奔後秦侍中蘭英曰昔石虎伐龍都太祖堅守不去卒成大燕之基今垂七十老翁厭苦兵革終不能頓兵連歲以攻我也但當城守以疲之永從之秦主登遣其子汝隂王宗為質於河南王乾歸以請救進封乾歸梁王納其妹為梁王后乾歸遣前軍將軍乞伏益州等帥騎一萬救之秋七月登引兵出迎乾歸兵後秦主興自安定如涇陽與登戰于山南執登殺之悉歸其部衆使歸農業徙隂密三萬户於長安以李后賜姚晃益州等聞之引兵還秦太子崇奔湟中即帝位改元延初諡登曰髙皇帝廟號太宗八月西燕王永困急遣其子常山公弘等求救於雍州刺史郗恢并獻玉璽一紐恢上書言垂若并永為患益深不如兩存之可以乘機雙斃帝以為然詔青兖二州刺史王恭豫州刺史庾楷救之楷亮之孫也永恐晉兵不出又遣其太子亮來為質平規追亮及於髙都獲之永又告急於魏魏王圭遣陳留公䖍將軍庾嶽帥騎五萬東渡河屯秀容以救之晉魏兵皆未至大逸豆歸等部將伐勤等開門納燕兵燕人執永斬之并斬其公卿大將刁雲大逸豆歸等三十餘人得永所統八郡七萬餘户及秦乘輿服御妓樂珍寶甚衆九月垂自長子如鄴十月秦王崇為梁王乾歸所逐奔隴西王楊定定留司馬邵彊守秦州帥衆二萬與崇共攻乾歸乾歸遣凉州牧軻彈秦州牧益州立義將軍詰歸帥騎三萬拒之益州與定戰敗於平州軻彈詰歸皆引退軻彈司馬翟瑥奮劒怒曰主上以雄武開基所向無敵威振秦蜀將軍以宗室居元帥之任當竭力致命以佐國家今秦州雖敗二軍尚全奈何望風退衄將何面以見主上乎瑥雖無任獨不能以便宜斬將軍乎軻彈謝曰向者未知衆心何如耳果能若是吾敢愛死乃帥騎進戰益州詰歸亦勒兵繼之大敗定兵殺定及崇斬首萬七千級乾歸於是盡有隴西之地定無子其叔父佛狗之子盛先守仇池自稱征西將軍秦州刺史仇池公諡定為武王仍遣使來稱藩秦太子宣奔盛盛分氐羌為二十部護軍各為鎮戍不置郡縣丁零叛燕晉武帝太元八年丁零翟斌起兵叛秦慕容鳳及燕故臣之子燕郡王騰遼西假延等各帥部曲歸之初丁零翟斌丗居康居後徙中國九年慕容鳳王騰假延皆勸翟斌奉慕容垂為盟主斌從之垂至洛陽斌帥其衆來與垂㑹勸垂稱尊號垂至滎陽稱大將軍大都督燕王承制以翟斌為建義大將軍封河南王叛秦復燕事見慕容燕翟斌恃功驕縱邀求無厭又以鄴城久不下潜有二心太子寶請除之燕王垂曰河南之盟不可負也若其為難罪由於斌今事未有形而殺之人必謂我忌憚其功能吾方收攬豪傑以隆大業不可示人以狹失天下之望也藉彼有謀吾以智防之無能為也范陽王德陳留王紹驃騎大將軍農皆曰翟斌兄弟恃功而驕必為國患垂曰驕則速敗焉能為患彼有大功當聽其自斃耳禮遇彌重斌諷丁零及其黨請斌為尚書令垂曰翟王之功宜居上輔但臺既未建此官不可遽置耳斌怒密與前秦長樂公丕通謀使丁零決隄潰水事覺垂殺斌及其弟檀敏餘皆赦之斌兄子真夜將營衆北奔邯鄲引兵還向鄴圍欲與丕內外相應太子寶與冠軍大將軍隆擊破之真還走邯鄲太原王楷陳留王紹言於垂曰丁零非有大志但寵過為亂耳今急之則屯聚為寇緩之則自散散而擊之無不克矣垂從之秋八月翟真自邯鄲北走燕王垂遣太原王楷驃騎大將軍農帥騎追之甲寅及於下邑楷欲戰農曰士卒飢倦且視賊營不見丁壯殆有他伏楷不從進戰燕兵大敗真北趨中山屯于承營冬十月翟真在承營與公孫希宋敞遙相首尾十一月燕慕容農自信都西擊丁零翟遼於魯口破之遼退屯無極農屯藁城以逼之遼真之從兄也十二月燕慕容麟慕容農合兵襲翟遼大破之遼單騎奔翟真十年春二月慕容農引兵㑹慕容麟於中山與共攻翟真麟農先帥數千騎至承營觀察形藝翟真望見陳兵而出諸將欲退農曰丁零非不徑勇而翟真懦弱今簡精鋭望真所在而衝之真走衆必散矣乃邀門而蹙之可盡殺也使驍騎將軍慕容國帥百餘騎衝之真走其衆爭門自相蹈藉死者太半遂拔承營外郭夏四月翟真自承營徙屯行唐真司馬鮮于乞殺真及諸翟自立為趙王營人共殺乞立真從弟成為主其衆多降於燕閏五月庚戌燕王垂至常山圍翟成於行唐命帶方王佐鎮龍城秋七月癸酉翟成長史鮮于得斬成出降垂屠行唐盡坑成衆十一年鮮于乞之殺翟真也翟遼奔黎陽黎陽太守滕恬之甚愛信之恬之喜畋獵不愛士卒遼潜施姦惠以收衆心恬之南攻鹿鳴城遼於後閉門拒之恬之東奔鄄城遼追執之遂據黎陽豫州刺史朱序遣將軍秦膺童斌與淮泗諸郡共討之春三月泰山太守張願以郡叛降翟遼秋八月翟遼寇譙朱序擊走之十二年春正月翟遼遣其子釗寇陳潁朱序遣將軍秦膺擊走之夏四月髙平人翟暢執太守徐含逺以郡降翟遼燕主垂謂諸將曰遼以一城之衆返覆二國之間不可不討五月以章武王宙監中外諸軍事輔太子寶守中山垂自帥諸將南攻遼以太原王楷為前鋒都督遼衆皆燕趙之人聞楷至皆曰太原王子吾之父母也相帥歸之遼懼遣使請降垂以遼為徐州牧封河南公前至黎陽受降而還井陘人賈鮑招引北山丁零翟遙等五千餘人夜襲中山陷其外郭章武王宙以竒兵出其外太子寶鼓譟於內合擊大破之盡俘其衆唯遙鮑單馬走免冬十月翟遼復叛燕遣兵與王祖張申寇抄清河平原十三年春二月翟遼遣司馬眭瓊詣燕謝罪燕主垂以其數反覆斬瓊以絶之遼乃自稱魏天王改元建光置百官夏五月翟遼徙屯滑臺十四年夏四月翟遼寇滎陽執太守張卓冬十月燕樂浪悼王溫為冀州刺史翟遼遣丁零故堤詐降於溫為溫帳下乙酉刺溫殺之并其長史司馬驅帥守兵二百户奔西燕遼西王農邀擊於襄國盡獲之惟堤走免十五年秋八月劉牢之擊翟釗於鄄城釗走河北又敗翟遼於滑臺張願來降十六年冬十月翟遼卒子釗代立改元定鼎攻燕鄴城燕遼西王農却之十七年春二月壬寅燕主垂自魯口如河間渤海平原翟釗遣其將翟都侵館陶屯蘇康壘三月垂引兵南擊釗燕主垂進逼蘇康壘夏四月翟都南走滑臺翟釗求救於西燕西燕主永謀於羣臣尚書郎渤海鮑遵曰使兩寇相弊吾承其後此卞莊子之䇿也中書侍郎太原張騰曰垂彊釗弱何弊之承不如速救之以成鼎足之勢今我引兵趨中山晝多疑兵夜多火炬垂必懼而自救我衝其前釗躡其後此天授之機不可失也永不從六月燕主垂軍黎陽臨河欲濟翟釗列兵南岸以拒之辛亥垂徙營就西津去黎陽西四十里為牛皮船百餘艘僞列兵仗泝流而上釗亟引兵趣西津垂潜遣中壘將軍桂林王鎮等自黎陽津夜濟營于河南比明而營成釗聞之亟還攻鎮等營垂命鎮等堅壁勿戰釗兵往來疲暍攻營不能拔將引去鎮等引兵出戰驃騎將軍農自西津濟與鎮等夾擊大破之釗走還滑臺將妻子收遺衆北濟河登白鹿山憑險自守燕兵不得進農曰釗無糧不能久居山中乃引兵還留騎候之釗果下山還兵掩擊盡獲其衆釗單騎奔長子西燕主永以釗為車騎大將軍兖州牧封東郡王歲餘釗謀反永殺之初郝晷崔逞及清河崔宏新興張卓遼東䕫騰陽平路纂皆仕於秦避秦亂來奔詔以為冀州諸郡各將部曲營於河南既而受翟氏官爵翟氏敗皆降於燕燕主垂各隨其材而用之釗所統七郡三萬餘户皆按堵如故以章武王宙為兖豫二州刺史鎮滑臺徙徐州民七千餘户于黎陽以彭城王脫為徐州刺史鎮黎陽脫垂之弟子也垂以崔䕃為宙司馬初陳留王紹為鎮南將軍太原王楷為征西將軍樂浪王溫為征東將軍垂皆以䕃為之佐䕃才幹明敏彊正善規諫四王皆嚴憚之所至簡刑法輕賦役流民歸之户口滋息秋七月以太原王楷為冀州牧右光祿大夫餘蔚為太僕射拓跋興魏魏元皇帝景元二年鮮卑索頭部大人拓跋力微始遣其子沙漠汗入貢因留為質力微之先丗居北荒不交南夏至可汗毛始彊大統國三十六大姓九十九後五丗至可汗推寅南遷大澤又七丗至可汗鄰使其兄弟七人及族人乙旃氏惃氏分統部衆為十族鄰老以位授其子詰汾使南遷遂居胸奴故地詰汾卒力微立復徙居定襄之盛樂部衆浸盛諸部皆畏服之晉武帝泰始三年遣鮮卑拓跋沙漠汗歸其國咸寧元年夏六月鮮卑拓跋力微復遣其子沙漠汗入貢將還幽州刺史衛瓘表請留之又密以金賂其諸部大人離間之三年冬十二月衛瓘遣拓跋沙漠汗歸國自沙漠汗入質力微可汗諸子在側者多有寵及沙漠汗歸諸部大人共譖而殺之既而力微疾篤烏桓王庫賢親近用事受衛瓘賂欲擾動諸部乃礪斧於庭謂諸大人曰可汗恨汝曹讒殺太子欲盡收汝曹長子殺之諸大人懼皆散走力微以憂卒時年一百四子悉祿立其國遂衰初幽并二州皆與鮮卑接東有務桓西有力微多為邊患衛瓘密以計間之務桓降而力微死朝廷嘉瓘功封其弟為亭侯太康七年鮮卑拓跋悉鹿卒弟綽立惠帝元康三年夏六月拓跋綽卒弟子弗立四年拓跋弗卒叔父祿官立五年冬十二月拓跋祿官分其國為三部一居上俗之北濡源之西自統之一居代郡參合陂之北使兄沙漠汗之子猗㐌統之一居定襄之盛樂故城使猗㐌弟猗盧統之猗盧善用兵西擊胸奴烏桓諸部皆破之代人衛操與從子雄及同郡箕淡往依拓跋氏說猗㐌猗盧招納晉人猗㐌恱之任以國事晉人附者稍衆七年秋九月拓跋猗㐌度漠北巡因西略諸國積五歲降附者三十餘國永興元年秋七月東嬴公騰乞師於拓跋猗㐌以擊劉淵猗㐌與弟猗盧合兵擊淵於西河破之與騰盟于汾東而還二年夏六月漢王淵攻東嬴公騰騰復乞師於拓跋猗㐌衛操勸猗㐌助之猗㐌帥輕騎數千救騰斬漢將綦毋豚詔假猗㐌大單于加操右將軍甲申猗㐌卒子普根代立懷帝永嘉元年拓跋祿官卒弟猗盧揔攝三部四年冬十月劉琨之討劉虎白部也遣使卑辭厚禮說鮮卑拓跋猗盧以請兵猗盧使其弟弗之子鬱律帥騎二萬助之遂破劉虎白部屠其營琨與猗盧結為兄弟表猗盧為大單于以代郡封之為代公猗盧以封邑去國懸逺民不相接乃帥部落萬餘家自雲中入鴈門從琨求陘北之地琨不能制且欲倚之為援乃徙樓煩馬邑隂館繁畤崞五縣民於陘南以其地與猗盧由是猗盧益盛五年劉琨遣子遵請兵於代公猗盧猗盧遣其子六修將兵助琨戍新興寇河朔事見石勒六年漢靳沖等攻劉琨於晉陽猗盧遣兵救琨擊走之劉粲等復攻晉陽拔之猗盧自將破粲等琨復入晉陽晉之亂事並見西愍帝建興元年代公猗盧城盛樂以為北都治故平城為南都又作新平城於灅水之陽使右賢王六修鎮之統領南部三年春二月詔進拓跋猗盧爵為代王置官屬食代常山二郡猗盧請并州從事鴈門莫含於劉琨琨遣之含不欲行琨曰以并州單弱吾之不材而能自存於胡羯之間者代王之力也吾傾身竭資以長子為質而奉之者庶幾為朝廷雪大耻也卿欲為忠臣奈何惜共事之小誠而忘徇國之大節乎往事代王為之腹心乃一州之所賴也含遂行猗盧甚重之常與參大計猗盧用法嚴國人犯法者或舉部就誅老幼相攜而行人問何之曰往就死無一人敢逃匿者四年初代王猗盧愛其少子比延欲以為嗣使長子六修出居新平城而黜其母六修有駿馬日行五百里猗盧奪之以與比延六修來朝猗盧使拜比延六修不從猗盧乃坐比延於其步輦使人導從出遊六修望見以為猗盧伏謁路左至乃比延六修慙怒而去猗盧召之不至大怒帥衆討之為六修所敗猗盧微服逃民間有賤婦人識之遂為六修所弒拓跋普根先守外境聞難來赴攻六修滅之普根代立國中大亂新舊猜嫌迭相誅滅左將軍衛雄信義將軍箕淡久佐猗盧為衆所附謀歸劉琨乃言於衆曰聞舊人忌新人悍戰欲盡殺之將奈何晉人及烏桓皆驚懼曰死生隨二將軍乃與琨質子遵帥晉人及烏桓三萬家馬牛羊十萬頭歸于琨琨大喜親詣平城撫納之琨兵由是復振夏四月普根卒其子始生普根母惟氏立之十二月拓跋普根之子又卒國人立其從父鬱律元帝大興元年夏六月劉虎自朔方侵拓跋鬱律西部秋七月鬱律擊虎大破之虎走出塞從弟路孤帥其部落降于鬱律於是鬱律西取烏孫故地東兼勿吉以西士馬精彊雄於北方四年拓跋猗㐌妻惟氏忌代王鬱律之彊恐不利於其子乃殺鬱律而立其子賀傉大人死者數十人鬱律之子什翼犍幼在襁褓其母王氏匿於袴中祝之曰天苟存汝則勿啼久之不啼乃得免惟氏專制國政遣使聘後趙後趙人謂之女國使明帝大寧二年代王賀傉始親國政以諸部多未服乃築城於東木根山徙居之三年十二月代王賀傉卒弟紇那立成帝咸和二年代王鬱律之子翳槐居於其舅賀蘭部紇那遣使求之賀蘭大人藹頭擁護不遣紇那與宇文部共擊藹頭不克四年賀蘭部及諸大人共立拓跋翳槐為代王代王紇那奔宇文部翳槐遣其弟什翼犍質於趙以請和咸康三年趙將李穆納拓跋翳槐于大寧其故部落多歸之代王紇那奔燕國人復奉翳槐為代王翳槐城盛樂而居之四年代王翳槐之弟什翼犍質於趙翳槐疾病命諸大人立之翳槐卒諸大人梁蓋等以新有大故什翼犍在逺來未可必比其至恐有變亂謀更立君而翳槐次弟屈剛猛多詐不如屈弟孤仁厚乃相與殺屈而立孤孤不可自詣鄴迎什翼犍請身留為質趙王虎義而俱遣之十一月什翼犍即代王位於繁畤北改元曰建國分國之半以與孤初代王猗盧既卒國多內難部落離散拓跋氏寖衰及什翼犍立雄勇有智略能修祖業國人附之始置百官分掌衆務以代人燕鳳為長史許謙為郎中令始制反逆殺人姦盜之法號令明白政事清簡無繫訊連逮之煩百姓安之於是東自濊貊西及破落那南距隂山北盡沙漠率皆歸服有衆數十萬人五年五月代王什翼犍㑹諸大人於參合陂議都灅源川其母王氏曰吾自先丗以來以遷徙為業今國家多難若城郭而居一旦寇來無所避之乃止代人謂它國之民來附者皆為烏桓什翼犍分之為二部各置大人以監之弟孤監其北子實君監其南什翼犍求昏於燕燕王皓以其妹妻之六年春三月代王什翼犍始都雲中之盛樂宫七年秋九月代王什翼犍築盛樂城於故城南八里代王妃慕容氏卒冬十月胸奴劉虎寇代西部代王什翼犍遣軍逆擊大破之虎卒子務桓立遣使求和於代什翼犍以女妻之務桓又朝貢於趙趙以務桓為平北將軍左賢王康帝建元元年代王什翼犍復求婚於燕燕王皓使納馬千匹為禮什翼犍不與又倨慢無子壻禮八月皓遣丗子雋帥前軍師評等擊代什翼犍帥衆避去燕人無所見而還二年春正月代王什翼犍遣其大人長孫秩迎婦於燕穆帝永和十二年春正月胸奴大人劉務桓卒弟閼頭立將二於代二月代王什翼犍引兵西巡臨河閼頭懼請降升平二年冬十二月胸奴劉閼頭部落多叛懼而東走乘冰度河半度而冰解後衆盡歸劉悉勿祈閼頭奔代悉勿祈務桓之子也三年夏四月胸奴劉悉勿祈卒弟衛辰殺其子而代之四年胸奴劉衛辰遣使降秦請田內地春來秋返秦王堅許之夏四月雲中護軍賈雍遣司馬徐贇帥騎襲之大獲而還堅怒曰朕方以恩信懷戎狄而汝貪小利以敗之何也黜雍以白衣領職遣使還其所獲慰撫之衛辰於是入居塞內貢獻相尋六月代王什翼犍妃慕容氏卒秋七月劉衛辰如代㑹葬因求婚什翼犍以女妻之五年春正月劉衛辰掠秦邊民五十餘口為奴婢以獻於秦秦王堅責之使歸所掠衛辰由是叛秦專附於代哀帝興寧三年劉衛辰復叛代代王什翼犍東渡河擊走之海西公太和元年代王什翼犍遣左長史燕鳯入貢于秦二年冬十月代王什翼犍擊劉衛辰河冰未合什翼犍命以葦絙約流澌俄而冰合然猶未堅乃散葦於其上冰草相結有如浮梁代兵乘之以渡衛辰不意兵猝至與宗族西走什翼犍收其部落什六七而還衛辰奔秦秦王堅送衛辰還朔方遣兵戍之簡文帝咸安元年春三月代將長孫斤謀弒代王什翼犍丗子實格之傷脅遂執斤殺之夏五月代丗子實病傷而卒秋七月代丗子實娶東部大人賀野干之女有遺腹子甲戌生男代王什翼犍為之赦境內名曰涉圭武帝寧康元年夏代王什翼犍使燕鳳入貢于秦二年代王什翼犍擊劉衛辰南走太元元年冬十月劉衛辰為代所逼求救於秦秦王堅以幽州刺史行唐公洛為北討大都督帥幽冀兵十萬擊代使并州刺史俱難鎮軍將軍鄧羌尚書趙遷李柔前將軍朱肜前禁將軍張蚝右禁將軍郭慶帥步騎二十萬東出和龍西出上郡皆與洛㑹以衛辰為鄉道十一月代王什翼犍使白部獨孤部南禦秦兵皆不勝又使南部大人劉庫仁將十萬騎禦之庫仁者衛辰之族什翼犍之甥也與秦戰戰於石子嶺庫仁大敗什翼犍病不能自將乃帥諸部奔隂山之北髙車雜種盡叛四面寇鈔不得芻牧什翼犍復度漠南聞秦兵稍退十二月什翼犍還雲中初什翼犍分國之半以授弟孤孤卒子斤失職怨望丗子實及弟翰早卒實子圭尚幼慕容妃之子閼婆夀鳩紇根地干力真窟咄皆長繼嗣未定時秦兵尚在君子津諸子每夜執兵警衛斤因說什翼犍之庶長子實君曰王將立慕容妃之子欲先殺汝故頃來諸子每夜戎服以兵繞廬帳伺使將發耳實君信之遂殺諸弟并弒什翼犍是夜諸子婦及部人奔告秦軍秦李柔張蚝勒兵趨雲中部衆逃潰國中大亂圭母賀氏以圭走依賀訥訥野干之子也秦王堅召代長史燕鳯問代所以亂故鳯具以狀對堅曰天下之惡一也乃執實君及斤至長安車裂之堅欲遷圭於長安鳯固請曰代王初亡羣下叛散遺孫冲幼莫相統攝其别部大人劉庫仁勇而有智鐡弗衛辰狡猾多變皆不可獨任宜分諸部為二令此兩人統之兩人素有深讎其藝莫敢先發俟其孫稍長引而立之是陛下有存亡繼絶之德於代使其子子孫孫永為不侵不叛之臣此安邊之良䇿也堅從之分代民為二部自河以東屬庫仁自河以西屬衛辰各拜官爵使統其衆賀氏以圭歸獨孤部與南部大人長孫嵩元他等皆依庫仁行唐公洛以什翼犍子窟咄年長遷之長安劉庫仁招撫離散恩信甚著奉事拓跋圭恩勤周備不以廢興易意常謂諸子曰此兒有髙天下之志必能恢隆祖業汝曹當謹遇之秦王堅賞其功加廣武將軍給幢麾鼓蓋劉衛辰恥在庫仁之下怒殺秦五原太守而叛庫仁擊衛辰破之追至隂山西北千餘里獲其妻子又西擊庫狄部徙其部落置之桑乾川久之堅以衛辰為西單于督攝河西雜類屯代來城九年冬十月燕太子太保慕輿句之子文零陵公慕輿䖍之子常攻殺劉庫仁庫仁弟頭眷代領庫仁部衆十年秋八月鮮卑劉頭眷擊破賀蘭部於善無又破柔然於意親山頭眷子羅辰言於頭眷曰比來行兵所向無敵然心腹之疾願早圖之頭眷曰誰也羅辰曰從兄顯忍人也必將為亂頭眷不聽顯庫仁之子也頃之顯果殺頭眷自立又將殺拓跋圭顯弟亢埿妻圭之姑也以告圭母賀氏顯謀主梁六眷代王什翼犍之甥也亦使其部人穆崇奚牧密告圭且以其愛妻駿馬付崇曰事泄當以此自明賀氏夜飲顯酒令醉使圭隂與舊臣長孫犍元他羅結輕騎亡去向晨賀氏故驚廄中羣馬使顯起視之賀氏哭曰吾子適在此今皆不見汝等誰殺之邪顯以故不急追圭遂奔賀蘭部依其舅賀訥訥驚喜曰復國之後當念老臣圭笑曰誠如舅言不敢忘也顯疑梁六眷泄其謀將囚之穆崇宣言曰六眷不顧恩義助顯為逆我掠得其妻馬足以解忿顯乃捨之賀氏從弟外朝大人賀恱舉所部以奉圭顯怒將殺賀氏賀氏奔亢埿家匿神車中三日亢埿舉家為之請乃得免故南部大人長孫嵩帥所部七百餘家叛顯將奔五原時拓跋實君之子渥亦聚衆自立嵩欲歸之烏渥謂嵩曰逆父之子不足從也不如歸圭嵩從之久之劉顯所部有亂故中部大人庾和辰奉賀氏奔圭賀訥弟染干以圭得衆心忌之使其黨侯引七突殺圭代人尉古真知之以告圭侯引七突不敢發染干疑古真泄其謀執而訊之以兩車軸夾其頭傷一目不伏乃免之染干遂舉兵圍圭賀氏出謂染干曰汝等欲於何置我而殺吾子乎染干慙而去冬十二月拓跋圭從曾祖紇羅與其弟建及諸部大人共請賀訥推圭為主十一年春正月戊申拓跋圭大㑹於牛川即代王位改元登國以長孫嵩為南部大人叔孫普洛為北部大人分治其衆以上谷張衮為左長史許謙為右司馬廣寧王建代人和跋叔孫建庾嶽等為外朝大人奚牧為治民長皆掌宿衛及參軍國謀議長孫道生賀毗等侍從左右出納教命王建娶代王什翼犍之女嶽和辰之弟道生嵩之從子也二月代王圭徙居定襄之盛樂務農息民國人恱之三月劉顯自善無南走馬邑其族人奴真帥所部降於代奴真有兄犍先居賀蘭部奴真言於代王圭請召犍而以所部讓之圭許之犍既領部遣弟去斤遺賀訥金馬賀染干謂去斤曰我待汝兄弟厚汝今領部宜來從我去斤許之奴真怒曰我祖父以來丗為代忠臣故我以部讓汝等欲為義也今汝等無狀乃謀叛國義於何在遂殺犍及去斤染干聞之引兵攻奴真奴真奔代圭遣使責染干染干乃止夏四月代王圭初改稱魏王魏王圭東如陵石護佛侯部帥侯辰乙佛部帥代題皆叛走諸將請追之圭曰侯辰等纍丗服役有罪且當忍之方今國家草創人情未一愚者固宜前却不足追也秋七月己酉魏王圭還盛樂代題復以部落來降十餘日又奔劉顯圭使其孫倍斤代領其衆劉顯弟肺泥帥衆降魏初秦滅代遷代王什翼犍少子窟咄于長安從慕容永東徙亢以窟咄為新興太守劉顯遣其弟永埿迎窟咄以兵隨之逼魏南境諸部騷動魏王圭左右于桓等與部人謀執圭以應窟咄憧將代人莫題等亦潛與窟咄交通桓舅穆崇告之圭誅桓等五人莫題等七姓悉原不問圭懼內難北踰隂山復依賀蘭部遣外朝大人遼東安同求救於燕燕主垂遣趙王麟救之冬十月燕趙王麟軍未至魏拓拔窟咄稍前逼魏王圭賀染干侵魏北部以應之魏衆驚擾北部大人叔孫普洛亡奔劉衛辰麟聞之遽遣安同等歸魏人知燕軍在近衆心少安窟咄進屯髙柳圭引兵與麟㑹擊之窟咄大敗奔劉衛辰衛辰殺之圭悉收其衆以代人庫狄干為北部大人麟引兵還中山劉衛辰居朔方士馬甚盛後秦主萇以衛辰為大將軍大單于河西王幽州牧西燕主永以衛辰為大將軍朔州牧十二月燕主垂以魏王圭為西單于封上谷王圭不受十二年劉顯地廣兵彊雄於北方㑹其兄弟乖爭魏長史張衮言於魏王圭曰顯志在并吞今不乘其內潰而取之必為後患然吾不能獨克請與燕共攻之圭從之復遣安同乞師於燕秋七月劉衛辰獻馬於燕劉顯掠之燕主垂怒遣太原王楷將兵助趙王麟擊顯大破之顯奔馬邑西山魏王圭引兵㑹麟擊顯於彌澤又破之顯奔西燕麟悉收其部衆獲馬牛羊以千萬數十三年魏王圭破庫莫奚於弱落水南秋七月庫莫奚復襲魏營圭又破之庫莫奚者本屬宇文部與契丹同類而異種其先皆為燕王皓所破徙居松漠之間十四年春正月甲寅魏王圭襲髙車破之二月癸巳魏王圭擊吐突鄰部於女水大破之盡徙其部落而還十五年夏四月丙寅魏王圭㑹燕趙王麟於意幸山擊賀蘭紇突鄰紇奚三部破之紇突鄰紇奚皆降於魏秋七月劉衛辰遣子直力鞮攻賀蘭部賀訥困急請降於魏丙子魏王圭引兵救之直力鞮退圭徙訥部落處之東境十六年冬十月劉衛辰遣子直力鞮帥衆八九萬攻魏南部十一月己卯魏王圭引兵五六千人拒之壬午大破直力鞮於鐡歧山南直力鞮單騎走乘勝追之戊子自五原金津南濟河徑入衛辰國衛辰部落駭亂辛卯圭直抵其所居恱跋城衛辰父子出走壬辰分遣諸將輕騎追之將軍伊謂禽直力鞮於木根山衛辰為其部下所殺十二月圭軍于鹽池誅衛辰宗黨五千餘人皆投尸于河自河以南諸部悉降獲馬三十餘萬匹牛羊四百餘萬頭國用由是遂饒衛辰少子勃勃亡奔薛于部圭使人求之薛干部帥大悉伏出勃勃以示使者曰勃勃國破家亡以窮歸我我寧與之俱亡何忍執以與魏乃送勃勃於沒奕干沒奕干以女妻之十八年秋七月魏王圭以薛干大悉伏不送劉勃勃八月襲其城屠之太悉伏奔秦二十一年秋七月魏羣臣勸魏王圭稱尊號圭始建天子旌旗出警入蹕改元皇始安帝隆安二年夏六月丙子魏王圭命羣臣議國號皆曰周秦以前皆自諸侯升為天子因以其國為天下號漢氏以來皆無尺土之資我國家百丗相承開基代北遂撫有方夏今宜以代為號黃門侍郎崔宏曰昔商人不常厥居故兩稱殷商代雖舊邦其命惟新登國之初已更曰魏夫魏者大名神州之上國也宜稱魏如故圭從之秋七月魏王圭遷都平城始營宫室建宗廟立社稷宗廟歲五祭用分至及臘魏王圭命有司正封畿標道里平權衡審度量遣使循行郡國舉奏守宰不法者親考察黜陟之冬十一月辛亥魏王圭命尚書吏部郎鄧淵立官制協音律儀曹郎清河董謐制禮儀三公郎王德定律令太史令鼂崇考天象吏部尚書崔宏揔而裁之以為永式淵羌之孫也十二月己丑魏王圭即皇帝位大赦改元天興命朝野皆束髮加帽追尊逺祖毛以下二十七人皆為皇帝諡六丗祖力微曰神元皇帝廟號始祖祖什翼犍曰昭成皇帝廟號髙祖父實曰獻明皇帝魏之舊俗孟夏祀天及東廟季夏帥衆却霜於隂山孟秋祀天於西郊至是始依倣古制定郊廟朝饗禮樂然惟孟夏祀天親行其餘多有司攝事又用崔宏議自謂黃帝之後以土德王徙六州二十二郡守宰豪傑二千家于代都東至代郡西及善無南極隂館北盡參合皆為畿內其外四方四維置八部帥以監之魏伐後燕晉武帝太元十三年魏王圭密有圖燕之志遣九原公儀奉使至中山燕主垂詰之曰魏王何以不自來儀曰先王與燕並事晉室丗為兄弟臣今奉使於理未失垂曰吾今威加四海豈得以昔日為比儀曰燕若不修德禮欲以兵威自彊此乃將帥之事非使臣所知也儀還言於圭曰燕主衰老太子暗弱范陽王自負材氣非少主臣也燕主既沒內難必作於時乃可圖也今則未可圭善之儀圭母弟翰之子也十六年春正月賀染干謀殺其兄訥訥知之舉兵相攻魏王圭告于燕請為鄉導以討之二月甲戌燕主垂遣趙王麟將兵擊訥夏六月甲辰燕趙王麟破賀訥於赤城禽之降其部落數萬燕主垂命麟歸訥部落徙染干於中山麟歸言於垂曰臣觀拓跋圭舉動終為國患不若攝之還朝使其弟監國事垂不從秋七月魏王圭遣其弟觚獻見於燕燕主垂衰老子弟用事留觚以求良馬魏王圭弗與遂與燕絶使長史張衮求好於西燕觚逃歸燕太子寶追獲之垂待之如初二十年魏王圭叛燕侵逼附塞諸部夏五月甲戌燕主垂遣太子寶遼西王農趙王麟帥衆八萬自五原伐魏范陽王德陳留王紹别將步騎萬八千為後繼散騎常侍髙湖諫曰魏與燕丗為昏姻彼有內難燕實存之其施德厚矣結好久矣間以求馬不獲而留其弟曲在於我奈何遽興兵擊之拓跋涉圭沈勇有謀幼歷艱難兵精馬彊未易輕也皇太子富於春秋志果氣鋭今委之專征必小魏而易之萬一不如所欲傷威毁重願陛下深圖之言頗激切垂怒免湖官湖泰之子也秋七月魏張衮聞燕軍將至言於魏王圭曰燕狃於滑臺長子之捷竭國之資力以來有輕我之心宜羸形以驕之乃可克也圭從之悉徙部落畜産西渡河千餘里以避之燕軍至五原降魏别部三萬餘家收穄田百餘萬斛置黑城進軍臨河造船為濟具圭遣右司馬許謙乞師於秦八月魏王圭治兵河南九月進軍臨河燕太子寶列兵將濟㬥風起漂其船數十艘泊南岸魏獲其甲士三百餘人皆釋而遣之寶之發中山也燕主垂已有疾既至五原圭使人邀中山之路伺其使者盡執之寶等數月不聞垂起居圭使所執使者臨河告之曰若父已死何不早歸寶等憂恐士卒駭動圭使陳留公䖍將五萬騎屯河東東平公儀將十萬騎屯河北略陽公遵將七萬騎塞燕軍之南遵夀鳩之子也秦主興遣楊佛嵩將兵救魏燕術士靳安言於太子寶曰天時不利燕必大敗速去可免寶不聽安退告人曰吾輩皆當棄尸草野不得歸矣燕魏相持積旬趙王麟將慕輿嵩等以垂為實死謀作亂奉麟為主事泄嵩等皆死寶麟等內自疑冬十月辛未燒船夜遁時河冰未結寶以魏兵必不能度不設斥候十一月己卯㬥風氷合魏王圭引兵濟河留輜重選精鋭二萬餘騎急追之燕軍至參合陂有大風黑氣如堤自軍後來臨覆軍上沙門攴曇猛言於寶曰風氣㬥迅魏兵將至之候宜遣兵禦之寶以去魏軍已逺笑而不應曇猛固請不已麟怒曰以殿下神武師徒之盛足以橫行沙漠索虜何敢逺來而曇猛妄言驚衆當斬以徇曇猛泣曰符氏以百萬之師敗於淮南正由恃衆輕敵不信天道故也司徒德勸寶從曇猛言寶乃遣麟帥騎三萬居軍後以備非常麟以曇猛為妄縱騎遊獵不肯設備寶遣騎還詗魏兵騎行十餘里即解鞍寢魏軍晨夜兼行乙酉暮至參合陂西燕軍在陂東營於蟠羊山南水上魏王圭夜部分諸將掩覆燕軍士卒銜枚束馬口潛進丙戌日出魏軍登山下臨燕營燕軍將東引顧見之士卒大驚擾亂圭縱兵擊之燕兵走赴水人馬相騰躡壓溺死者以萬數略陽公遵以兵邀擊其前燕兵四五萬人一時放仗斂手就禽其遺迸去者不過數千人太子寶等皆單騎僅免殺燕右僕射陳留悼王紹生禽魯陽王倭奴桂林王道成濟隂公尹國等文武將吏數千人兵甲糧貨以巨萬計道成垂之弟子也魏王圭擇燕臣之有才用者代郡太守廣川賈閏閏從弟驃騎長史昌黎太守彞太史郎遼東朝崇等留之其餘欲悉給衣糧遣還以招懷中州之人中部大人王建曰燕衆彊盛今傾國而來我幸而大捷不如悉殺之則其國空虛取之為易且獲寇而縱之無乃不可乎乃盡坑之十二月圭還雲中之盛樂燕太子寶恥於參合之敗請更擊魏司徒德言於燕主垂曰虜以參合之捷有輕太子之心宜及陛下神略以服之不然將為後患垂乃以清河公㑹録留臺事領幽州刺史代髙陽王隆鎮龍城以陽城王蘭汗為北中郎將代長樂公盛鎮薊命隆盛悉引其精兵還中山期以明年大舉擊魏二十一年春正月燕髙陽王隆引龍城之甲入中山軍容精整燕人之氣稍振三月庚子燕王垂留范陽王德守中山引兵密發踰青嶺經天門鑿山通道出魏不意直詣雲中魏陳留公䖍帥部落三萬餘家鎮平城垂至獵嶺以遼西王農髙陽王隆為前鋒以襲之是時燕兵新敗皆畏魏惟龍城兵勇鋭爭先䖍素不設備閏月乙卯燕軍至平城䖍乃覺之帥麾下出戰敗死燕軍盡收其部落魏王圭震怖欲走諸部聞䖍死皆有二心圭不知所適垂之過參合陂也見積骸如山為之設祭軍士皆慟哭聲震山谷垂慚憤嘔血由是發疾乘馬輿而進頓平城西北三十里太子寶等聞之皆引還燕軍叛者奔告於魏云垂已死輿尸在軍魏王圭欲追之聞平城已沒乃引還隂山垂在平城積十日疾轉篤乃築燕昌城而還夏四月癸未卒於上谷之沮陽袐不發喪丙申至中山戊戌發喪諡曰成武皇帝廟號丗祖壬寅太子寶即位大赦改元永康五月辛亥以范陽王德為都督冀兖青徐荆豫六州諸軍事車騎大將軍冀州牧鎮鄴遼西王農為都督并雍益梁秦涼六州諸軍事并州牧鎮晉陽又以安定王庫傉官偉為太師夫餘王蔚為太傅甲寅以趙王麟領尚書左僕射髙陽王隆領右僕射長樂公盛為司隸校尉宜都王鳳為冀州刺史初燕主垂先假后生子令寶後假后生子朗鑒愛諸姬子麟農隆柔熙寶初為太子有美稱已而荒怠中外失望後假后嘗言於垂曰太子遭承平之世足為守成之主今國步艱難恐非濟世之才遼西髙陽二王陛下之賢子宜擇一人付以大業趙王麟姦詐彊愎異日必為國家之患宜早圖之寶善事垂左右左右多譽之故垂以為賢謂假氏曰汝欲使我為晉獻公乎假氏泣而退告其妹范陽王妃曰太子不才天下所知吾為社稷言之主上乃以吾為驪姬何其苦哉觀太子必喪社稷范陽王有非常器度若燕祚未盡其在王乎寶及麟聞而恨之乙丑寶使麟謂假氏曰后常謂主上不能守大業今竟能不宜早自裁以全假宗假氏怒曰汝兄弟不難逼殺其母况能守先業乎吾豈愛死但念國亡不久耳遂自殺寶議以假后謀廢嫡統無母后之道不宜成喪羣臣咸以為然中書令眭邃揚言於朝曰子無廢母之義漢安思閻后親廢順帝猶得配饗大廟况先后曖昧之言虛實未可知乎乃成喪夏六月癸酉魏王圭遣將軍王建等擊燕廣寧太守劉亢泥斬之徙其部落於平城燕上谷太守開封公詳棄郡走詳皓之曽孫也燕主寶定士族舊籍分辨清濁校閲户口罷軍營封䕃之戶悉屬郡縣由是士民嗟怨始有離心上谷張恂勸圭進取中原圭善之燕遼西王農悉將部曲數萬口之并州并州素乏儲偫是歲早霜民不得供其食又遣諸部護軍分監諸胡由是民夷俱怨潛召魏軍八月己亥魏王圭大舉伐燕步騎四十餘萬南出馬邑踰句注旌旗二千餘里鼓行而進左將軍鴈門李栗將五萬騎為前驅别遣將軍封真等從東道出軍都襲燕幽州燕征北大將軍幽平二州牧清河公㑹毋賤而平長雄俊有器藝燕主垂愛之寶之伐魏也垂命㑹攝東宫事揔録禮遇一如太子及垂伐魏命㑹鎮龍城委以東北之任國官府佐皆選一時才望垂疾篤遺言命寶以㑹為嗣而寶愛少子濮陽公䇿意不在㑹長樂公盛與㑹同年耻為之下乃與趙王麟共勸寶立䇿寶從之乙亥立妃假氏為皇后䇿為皇太子㑹盛皆進爵為王䇿年十一素蠢弱㑹聞之心愠懟九月章武王宙奉燕主垂及成哀段后之喪葬于龍城宣平陵寶詔宙悉徙髙陽王隆參佐部曲家屬還中山㑹違詔多留部曲不遣宙年長屬尊㑹每事陵侮之見者皆知其有異志戊午魏軍至陽曲乘西山臨晉陽遣騎環城大譟而去燕遼西王農出戰大敗奔還晉陽司馬慕輿嵩閉門拒之農將妻子帥數千騎東走魏中領將軍長孫肥追之及於潞川獲農妻子燕軍盡沒農被創獨與三騎逃歸中山魏王圭遂取并州初建臺省置刺史太守尚書郎以下官悉用儒生為之士大夫詣軍門者無少長皆引入存慰使人人盡言少有才用咸加擢叙己未遣輔國將軍奚收略地汾川獲燕丹楊王買得及離石護軍髙秀和以中書侍郎張恂等為諸郡太守招撫離散勸課農桑燕主寶聞魏軍將至議于東堂中山尹符謨曰今魏軍衆彊千里逺鬪乘勝氣鋭若縱之使入平土不可敵也宜杜險以拒之中書令眭邃曰魏多騎兵往來剽速馬上齎糧不過旬日宜令都縣聚民千家為一堡深溝髙壘清野以待之彼至無所掠不過六旬食盡自退尚書封懿曰今魏兵數十萬天下之勍敵也民雖築堡不足以自固是聚兵及糧以資之也且動搖民心示之以弱不如阻關拒戰計之上也趙王麟曰魏今乘勝氣鋭其鋒不可當宜完守中山待其弊而乘之於是修城積粟為持久之備命遼西王農出屯安喜軍事動靜悉以委麟冬十月魏王圭使冠軍將軍代人于栗磾寧朔將軍公孫蘭帥步騎二萬潜自晉陽開韓信故道己酉圭自井陘趨中山李先降魏圭以為征東左長史魏王圭進攻常山拔之獲太守茍延自常山以東守宰或走或降諸郡縣皆附於魏惟中山鄴信都三城為燕守十一月圭命東平公儀將五萬騎攻鄴冠軍將軍王建左將軍李栗攻信都戊午圭進軍中山己未攻之燕髙陽王隆守南郭帥衆力戰自旦至晡殺傷數千人魏兵乃退圭謂諸將曰中山城固寶必不肯出戰急攻則傷士久圍則費糧不如先取鄴信都然後圖之丁卯圭引兵而南章武王宙自龍城還聞有魏寇馳入薊與鎮北將軍陽城王蘭乘城固守蘭垂之從弟也魏别將石河頭攻之不克退屯漁陽圭軍于魯口博陵太守申永奔河南髙陽太守崔宏奔海渚圭素聞宏名遣吏追求獲之以為黃門侍郎與給事黃門侍郎張衮對掌機要創立制度博陵令屈遵降魏圭以為中書令出納號令兼揔文誥燕范陽王德使南安王青等夜擊魏軍於鄴下破之魏軍退屯新城青等請追擊之别駕韓􅒲曰古人先計而後戰魏軍不可擊者四懸軍逺客利在野戰一也深入近畿頓兵死地二也前鋒既敗後陳方固三也彼衆我寡四也官軍不宜動者三自戰其地一也動而不勝衆心難固二也城隍未修敵來無備三也今魏無資糧不如深壘固軍以老之德從之召青還青詳之兄也十二月魏遼西公賀賴盧帥騎二萬㑹東平公儀攻鄴賴盧訥之弟也魏别部大人沒根有膽勇魏王圭惡之沒根懼誅己丑將親兵數十人降燕燕主寶以為鎮東大將軍封鴈門公沒根求還襲魏寶難與重兵給百餘騎沒根效其號令夜入魏營至中仗圭乃覺之狼狽驚走沒根以所從人少不能壞其大衆多獲首虜而還安帝隆安元年春正月燕范陽王德求救於秦奏兵不出鄴中恟懼賀賴盧自以魏王圭之舅不受東平公儀節度由是與儀有隙儀司馬丁建隂與德通從而構間之射書入城中言其狀甲辰風霾晝晦賴盧營有火建言於儀曰賴盧燒營為變矣儀以為然引兵退賴盧聞之亦退建帥其衆詣德降且言儀師老可擊德遣桂陽王鎮南安王青帥騎七千追擊魏軍大破之燕主寶使左衛將軍慕輿騰攻博陵殺魏所置守宰王建等攻信都六十餘日不下士卒多死庚申魏王圭自攻信都壬戌夜燕冝都王鳯踰城奔中山癸亥信都降魏燕主寶聞魏王圭攻信都出屯深澤遣趙王麟攻楊城殺守兵三百寶悉出珍寶及宫人募郡縣羣盜以擊魏二月己巳朔圭還屯楊城沒根兄子醜提為并州監軍聞其叔父降燕懼誅帥所部兵還國作亂圭欲北還遣其國相涉延永和於燕且請以其弟為質寶聞魏有內難不許使冗從㒒蘭真責圭負恩悉發其衆步卒二十萬騎三萬七千屯於曲陽之柏肆營於滹沱水北以邀之丁丑魏軍至營於水南寶潛師夜濟募勇敢萬餘人襲魏營寶陳於營北以為之援募兵因風縱火急擊魏軍魏軍大亂圭驚起棄營跣走燕將軍乞特真帥百餘人至其帳下得圭衣鞾既而募兵無故自驚互相斫射圭於營外望見之乃擊鼓收衆左右及中軍將士稍稍來集多布火炬於營外縱騎衝之募兵大敗還赴寶陳寶引兵復渡水北戊寅魏整衆而至與燕相持燕軍奪氣寶引還中山魏兵隨而擊之燕兵屢敗寶懼棄大軍帥騎二萬奔還時大風雪凍死者相枕寶恐為魏軍所及命士卒皆棄袍仗兵器數十萬寸刃不返燕之朝臣將卒降魏及為魏所係虜者甚衆先是張衮常為魏王圭言燕祕書監崔逞之材圭得之甚喜以逞為尚書使録三十六曹任以政事己卯夜燕尚書郎慕輿皓謀弒燕主寶立趙王麟不克斬關出奔魏麟由是不自安初燕清河王㑹聞魏軍東下表求赴難燕主寶許之㑹初無去意使征南將軍庫傉官偉建威將軍餘崇將兵五千為前鋒崇嵩之子也偉等頓盧龍近百日無食噉馬牛且盡㑹不發寶怒纍詔切責㑹不得已以治行簡練為名復留月餘時道路不通偉欲使輕軍前行通道偵魏彊弱且張聲藝諸將皆畏避不欲行餘崇奮曰今巨寇滔天京都危逼匹夫猶思致命以救君父諸君荷國寵任而更惜生乎若社稷傾覆臣節不立死有餘辱諸君安居於此崇請當之偉喜簡給步騎數百人崇進至漁陽遇魏千餘騎崇謂其衆曰彼衆我寡不擊則不得免乃鼓譟直進崇手殺十餘人魏騎潰去崇亦引還斬首獲生具言敵中闊狹衆心稍振㑹乃上道徐進是月始逹薊城魏圍中山既久城中將士皆思出戰征北大將軍隆言於寶曰涉圭雖屢獲小利然頓兵經年凶藝沮屈士馬死傷太半人心思歸諸部離解正是可破之時也加之舉城思奮若因我之鋭乘彼之衰往無不克如其持重不决將卒氣喪日益困逼事久變生後雖欲用之不可得也寶然之而衛大將軍麟每沮其議隆成列而罷者前後數四寶使人請於魏王圭欲還其弟觚割常山以西皆與魏以求和圭許之既而寶悔之己酉圭如盧奴辛亥復圍中山燕將士數千人俱自請於寶曰今坐守窮城終於困弊臣等願得一出樂戰而陛下每抑之此為坐自摧敗也且受圍歷時無他竒變徒望積久寇賊自退今內外之藝彊弱懸絶彼必不自退明矣宜從衆一决寶許之隆退而勒兵召諸參佐謂之曰皇威不振寇賊內侮臣子同耻義不願生今幸而破賊吉還固善若其不幸亦使吾志節獲展卿等有北見吾母者為吾道此情也乃被甲上馬詣門俟命麟復固止寶衆大忿恨隆涕泣而還是夜麟以兵劫左衛將軍北地王精使帥禁兵弒寶精以義拒之麟怒殺精出奔西山依丁零餘衆於是城中人情震駭寶不知麟所之以清河王㑹軍在近恐麟奪㑹軍先據龍城乃召隆及驃騎大將軍農謀去中山走保龍城隆曰先帝櫛風沐雨以成中興之業崩未朞年而天下大壞豈得不謂之孤負邪今外寇方盛而內難復起骨肉乖離百姓疑懼誠不可以拒敵北遷舊都亦事之宜然龍川地狹民貧若以中國之意取足其中復朝夕望有大功此必不可若節用愛民務農訓兵數年之中公私充實而趙魏之閒厭苦寇㬥民思燕德庶幾返斾克復故業如其未能則慿險自固猶足以優遊養鋭耳寶曰卿言盡理朕一從卿意耳遼東髙撫善卜筮素為隆所信厚私謂隆曰殿下北行終不能逹太妃亦不可得見若使主上獨往殿下潛留於此必有大功隆曰國有大難主上䝉塵且老母在北吾得北首而死猶無所恨卿是何言也乃遍召僚佐問其去留唯司馬魯恭參軍成岌願從餘皆欲留隆並聽之農部將谷㑹歸說農曰城中之人皆涉圭參合所殺者父兄子弟泣血踊躍欲與魏戰而為衛軍所抑今聞主上當北遷皆曰得慕容氏一人奉而立之以與魏戰死無所恨大王幸而留此以副衆望擊退魏軍撫寧畿甸奉迎大駕亦不失為忠臣也農欲殺歸而惜其材力謂之曰必如此以望生不如就死壬子夜寶與太子䇿遼西王農髙陽王隆長樂王盛等萬餘騎出赴㑹軍河間王熙勃海王朗博陵王鑒皆幼不能出城隆還入迎之自為鞁乘俱得免燕將王沈等降魏樂浪王惠中書侍郎韓範貟外郎假宏太史令劉起等帥工伎三百奔鄴中山城中無主百姓惶惑東門不閉魏王圭欲夜入城冠軍將軍王建志在虜掠乃言恐士卒盜府庫物請俟明旦理乃止燕開封公詳從寶不及城中立以為主閉門拒守圭盡衆攻之連日不拔使人登巢車臨城諭之曰慕容寶已棄汝走汝曹百姓空自取死欲誰為乎皆曰羣小無知恐復如參合之衆故茍延旬月之命耳圭顧王建而唾其面使中領將軍長孫肥左將軍李東將三千騎追寶至范陽不及破其新城戍而還燕主寶出中山與趙王麟遇于􅛪城麟不意寶至驚駭帥其衆奔蒲隂復出屯望都土人頗供給之慕容詳遣兵掩擊麟獲其妻子麟脫走入山甲寅寶至薊殿中親近散亡略盡惟髙陽王隆所領數百騎為宿衛清河王㑹帥騎卒二萬迎于薊南寶怪㑹容止怏怏有恨色密告隆及遼西王農農隆俱曰㑹年少專任方面習驕所致豈有它也臣等當以禮責之寶雖從之然猶詔解㑹兵以屬隆隆固辭乃減㑹兵分給農隆又遣西河公庫傉官驥帥兵三千助守中山丙辰寶盡徙薊中府庫北趣龍城魏石河頭引兵追之戊午及寶於夏謙澤寶不欲戰清河王㑹曰臣撫教士卒惟敵是求今大駕䝉塵人思效命而虜敢自送衆心忿憤兵法曰歸師勿遏又曰置之死地而後生今我皆得之何患不克若其捨去賊必乘人或生餘變寶乃從之㑹整陳與魏兵戰農隆等將南來騎衝之魏兵大敗追奔百餘里斬首數千級隆又獨追數十里而還謂故吏留臺治書陽璆曰中山城中積兵數萬不得展吾意今日之捷令人遺恨因慷慨流涕㑹既敗魏兵矜很滋甚隆屢訓責之㑹益忿恚㑹以農隆皆嘗鎮龍城屬尊位重名望素出已右恐至龍城權政不復在已又知終無為嗣之望乃謀作亂幽平之兵皆懷㑹恩不樂屬二王請於寶曰清河王勇略髙丗臣等與之誓同生死願陛下與皇太子諸王留薊宫臣等從王南解京師之圍還迎大駕寶左右皆惡㑹言於寶曰清河王不得為太子神色甚不平且其才武過人善收人心陛下若從衆請臣恐解圍之後必有衛輒之事寶乃謂衆曰道通年少才不及二王豈可當專征之任且朕方自統六師仗㑹以為羽翼何可離左右也衆不恱而退左右勸寶殺㑹侍御史仇尼歸聞之告㑹曰大王所恃者父父已異圖所杖者兵兵已去手欲於何所自容乎不如誅二王廢太子大王自處東宫兼將相之任以匡復社稷此上䇿也㑹猶豫未許寶謂農隆曰觀道通志趣必反無疑宜早除之農隆曰今寇敵內侮中土紛紜社稷之危有如纍卵㑹鎮撫舊都逺赴國難其威名之重足以震動四鄰逆狀未彰而遽殺之豈徒傷父子之恩亦恐大損威望寶曰㑹逆志已成卿等慈恕不忍早殺恐一旦為變必先害諸父然後及吾至時勿悔自負也㑹聞之益懼夏四月癸酉寶宿廣都黃榆谷㑹遣其黨仇尼歸吳提染干帥壯士二十餘人分道襲農隆殺隆於帳下農被重創執仇尼歸逃入山中㑹以仇尼歸被執事終顯發乃夜詣寶曰農隆謀逆臣已除之寶欲討㑹陽為好言以安之曰吾素疑二王久矣除之甚善甲戌旦㑹立仗嚴僃乃引道㑹欲棄隆喪餘崇涕泣固請乃聽載隨軍農出自歸寶呵之曰何以自負邪命執之行十餘里寶顧召羣臣食且議農罪㑹就坐寶目衛軍將軍慕輿騰使斬㑹傷其首不能殺㑹走赴其軍勒兵攻寶寶帥數百騎馳二百里晡時至龍城㑹遣騎追至石城不及乙亥㑹遣仇尼歸攻龍城寶夜遣兵襲擊破之㑹遣使請誅左右佞臣并求為太子寶不許㑹盡收乘輿器服以後宫分給將帥署置百官自稱皇太子録尚書事引兵向龍城以討慕輿騰為名丙子頓兵城下寶臨西門㑹乘馬遙與寶語寶責讓之㑹命軍士向寶大譟以耀威城中將士皆憤怒向暮出戰大破之㑹兵死傷太半走還營侍御郎髙雲夜帥敢死士百餘人襲㑹軍㑹衆皆潰㑹將十餘騎奔中山開封公詳殺之寶殺㑹母及其三子丁丑寶大赦凡與㑹同謀者皆除罪復舊職論功行賞拜將軍封侯者數百人魏王圭以軍食不給命東平公儀去鄴徙屯巨鹿積租楊城慕容詳出步卒六千人伺閒襲魏諸屯圭擊破之斬首五千生擒七百人皆縱之五月燕庫傉官驥入中山與開封公詳相攻詳殺驥盡滅庫傉官氏又殺中山尹符謨夷其族中山城無定主民恐魏兵乘之男女結盟人自為戰甲辰魏王圭罷中山之圍就榖河間督諸郡義租甲寅以東平公儀為驃騎大將軍都督中外諸軍事兖豫雍荆徐楊六州牧左丞相封衛王慕容詳自謂能却魏兵威德已振乃即皇帝位改元建始置百官以新平公可足渾潭為車騎大將軍尚書令殺拓跋觚以固衆心鄴中官屬勸范陽王德稱尊號㑹有自龍城來者知燕主寶猶存乃止秋七月慕容詳殺可足渾潭詳嗜酒奢淫不恤士民刑殺無度所誅王公以下五百餘人羣下離心城中饑窘詳不聽民出采稆死者相枕舉城咨謀迎趙王麟詳遣輔國將軍張驤帥五千餘人督租於常山麟自丁零入驤軍潛襲中山城門不閉執詳斬之麟遂稱尊號聽人四出采稆人既飽求與魏戰麟不從稍復窮餒魏王圭軍魯口遣長孫肥帥騎七千襲中山入其郛麟追至派水為魏所敗而還八月丙寅朔魏王圭徙軍常山之九門軍中大疫人畜多死將士皆思歸圭問疫於諸將對曰在者才什四五圭曰此固天命將若之何四海之民皆可為國在吾所以御之耳何患無民羣臣乃不敢言遣撫軍大將軍略陽公遵襲中山入其郛而還中山饑甚慕容麟帥二萬餘人出據新市九月甲子晦魏王圭進軍攻之太史令鼂崇曰不吉昔紂以甲子亡謂之疾日兵家忌之圭曰紂以甲子亡周武不以甲子興乎崇無以對冬十月丙寅麟退阻派水甲戌圭與麟戰於義臺大破之斬首九千餘級麟與數十騎馳取妻子入西山遂奔鄴甲申魏克中山燕公卿尚書將吏士卒降者二萬餘人燕人有自中山至龍城者言拓跋涉圭衰弱司徒德完守鄴城㑹德表至勸燕主寶南還十二月寶遣將軍啓崙視形勢乙亥慕容麟至鄴說范陽王德曰魏既克中山將乘勝攻鄴鄴中雖有蓄積然城大難固且人心恇懼不可守也不如南趣滑臺時魯陽王和鎮滑臺亦遣使迎德二年春正月范陽王德自鄴徙滑臺魏衛王儀入鄴追德至河弗及趙王麟上尊號於德德稱燕王以統府行帝制置百官以趙王麟為司空領尚書令燕啓崘還至龍城言中山已陷燕主寶命罷兵遼西王農言於寶曰今遷都尚新未可南征宜因成師襲庫莫奚取其牛馬以充軍資更審虛實俟明年而議之寶從之己未北行庚申渡澆洛水㑹南燕王德遣侍郎李延詣寶言涉圭西上中國空虛延追寶及之寶大喜即日引還燕主寶還龍城宫詔諸軍就頓不聽罷散文武將士皆以家屬隨駕遼西王農長樂王盛切諫以為兵疲力弱魏新得志未可與敵宜且飬兵觀釁寶將從之撫軍將軍慕輿騰曰百姓可與樂成難與圖始今師衆已集宜獨決聖心乘機進取不宜廣采異同以沮大計寶乃曰吾計決矣敢諫者斬二月乙亥寶出就頓留盛統後事己卯燕軍發龍城慕輿騰為前軍司空農為中軍寶為後軍相去各一頓連營百里壬午寶至乙連長上假速骨宋赤眉等因衆心之憚征役遂作亂速骨等皆髙陽王隆舊隊共逼立隆子髙陽王崇為主殺樂浪威王宙中牟熙公假誼及宗室諸王河間王熙素與崇善崇擁佑之故獨得免燕主寶將十餘騎奔司空農營農將出迎左右抱其腰止之曰宜小清澄不可便出農引刀將斫之遂出見寶又馳信追慕輿騰癸未寶農引兵還趣大營討速骨等農營兵亦厭征役皆棄仗走騰營亦潰寶農奔還龍城長樂王盛聞亂引兵出迎寶農僅而得免燕尚書頓丘王蘭汗隂與假速骨等通謀引兵營龍城之東城中留守兵至少長樂王盛徙內近城之民得丁夫萬餘乘城以禦之速骨等同謀才百餘人餘皆為所驅脅莫有鬪志三月甲午速骨等將攻城遼西桓烈王農恐不能守且為蘭汗所誘夜潛出赴之冀以自全明旦速骨等攻城城上拒戰甚力速骨之衆死者以百數速骨乃將農循城農素有忠節威名城中之衆恃以為彊忽見在城下無不驚愕喪氣遂皆逃潰速骨入城縱兵殺掠死者狼藉寶盛與慕輿騰餘崇張真李旱趙恩等輕騎南走速骨幽農於殿內長上阿交羅速骨之謀主也以髙陽王崇幼弱更欲立農崇親信鬷讓出力犍等聞之丁酉殺羅及農速骨即為之誅讓等農故吏左衛將軍宇文拔亡奔遼西庚子蘭汗襲擊速骨并其黨盡殺之廢崇奉太子䇿承制大赦遣使迎寶及於薊城寶欲還長樂王盛等皆曰汗之忠詐未可知今單騎赴之萬一汗有異志悔之無及不如南就范陽王合衆以取冀州若其不捷收南方之衆徐歸龍都亦未晚也寶從之夏四月燕主寶過鄴鄴人請留寶不許南至黎陽伏於河西遣中黃門令趙思告北地王鍾曰上以二月得丞相表即時南征至乙連㑹長上作亂失據來此王亟白丞相奉迎鍾德之從弟也首勸德稱尊號聞而惡之執思付獄以狀白南燕主德德謂羣下曰卿等以社稷大計勸吾攝政吾亦以嗣帝播越民神乏主故權順羣議以繫衆心今天方悔禍嗣帝得還吾將具法駕奉迎謝罪行闕何如黃門侍郎張華曰今天下大亂非雄才無以寧濟羣生嗣帝暗懦不能紹隆先統陛下若蹈匹夫之節捨天授之業威權一去身首不保況社稷其得血食乎慕輿護曰嗣帝不逹時宜委棄國都自取敗亡不堪多難亦已明矣昔蒯聵出奔衛輒不納春秋是之以子拒父猶可況以父拒子乎今趙思之言未明虛實臣請為陛下馳往詗之德流涕遣之護帥壯士數百人隨思而北聲言迎衛其實圖之寶既遣思詣鍾於後得樵者言德已稱制懼而北走護至無所見執思以還德以思練習典故欲留而用之思曰犬馬猶知戀主思雖刑臣乞還就上德固留之思怒曰周室東遷晉鄭是依殿下親則叔父位為上公不能帥先羣后以匡帝室而幸本根之傾為趙王倫之事思雖不能如申包胥之存楚猶慕龔君賔不偷生於莽丗也德斬之寶遣扶風忠公慕輿騰與長樂王盛收兵冀州盛以騰素㬥橫為民所怨乃殺之行至巨鹿長樂說諸豪傑皆願起兵奉寶寶以蘭汗祀燕宗廟所為似順意欲還龍城不肯留冀州乃北行至建安抵民張曹家曹素武健請為寶合衆盛亦勸寶宜且駐留察汗情狀寶乃遣冗從僕射李旱先往見汗寶留頓石城㑹汗遣左將軍蘇超奉迎陳汗忠款寶以汗燕主垂之舅盛之妃父也謂必無它不待旱返遂行盛流涕固諫寶不聽留盛在後盛與將軍張真下道避匿丁亥寶至索莫汗陘去龍城四十里城中皆喜汗惶怖欲自出請罪兄弟共諫止之汗乃遣弟加難帥五百騎出迎又遣兄堤閉門止仗禁人出入城中皆知其將為變而無如之何加難見寶於陘北拜謁已從寶俱進潁隂烈公餘崇密言於寶曰觀加難形色禍變甚逼宜留三思奈何徑前寶不從行數里加難先執崇崇大呼罵曰汝家幸緣肺附䝉國寵榮覆宗不足以報今乃敢謀篡逆此天地所不容計旦暮即屠滅但恨我不得手膾汝曹耳加難殺之引寶入龍城外邸弒之汗諡寶曰靈帝殺獻哀太子䇿及王公卿士百餘人自稱大都督大將軍大單于昌黎王改元青龍以堤為太尉加難為車騎將軍封河間王熙為遼東公如𣏌宋故事長樂王盛聞之馳欲赴哀張真止之盛曰我今以窮歸汗汗性愚淺必念婚姻不忍殺我旬月之間足以展吾情志遂往見汗汗妻乙氏及盛妃皆泣涕請盛於汗盛妃復頓頭於諸兄弟汗惻然哀之乃舍盛於宫中以為侍中左光祿大夫親待如舊堤加難屢請殺盛汗不從堤驕很荒淫事汗多無禮盛因而間之由是汗兄弟浸相嫌忌燕太原王竒楷之子蘭汗之外孫也汗亦不殺以為征南將軍得入見長樂王盛盛潛使竒逃出起兵竒起兵於建安衆至數千汗遣蘭堤討之盛謂汗曰善駒小兒未能辦此豈非有假託其名欲為內應者乎太尉素驕難信不宜委以大衆汗然之罷堤兵更遣撫軍將軍仇尼慕將兵討竒於是龍城自夏不雨至于秋七月汗日詣燕諸廟及寶神座頓首禱請委罪於蘭加難堤及加難聞之怒且懼誅乙巳相與帥所部襲仇尼慕軍敗之汗大懼遣太子穆將兵討之穆謂汗曰慕容盛我之仇讎必與竒相表裏此乃腹心之疾不可養也宜先除之汗欲殺盛先引見察之盛妃知之密以告盛盛稱疾不出汗亦止不殺李旱衛雙劉忠張豪張真皆盛素所厚也而穆引以為腹心旱雙得出入至盛所潛與盛結謀丁未穆擊堤加難等破之庚戌饗將士汗穆皆醉盛夜如厠因踰垣入于東宫與旱等共殺穆時軍未解嚴皆聚在穆舍聞盛得出呼躍爭先攻汗斬之汗子魯公和陳公揚分屯令支白狼盛遣旱真襲誅之堤加難亡匿捕得斬之於是內外帖然士女相慶宇文拔帥壯士數百來赴盛拜拔為大宗正辛亥告于太廟令曰賴五祖之休文武之力宗廟社稷幽而復顯不獨孤以眇眇之身免不同天之責凡在臣民皆得明目當丗因大赦改元建平盛謙不敢稱尊號以長樂王攝行統制諸王皆降稱公以東陽公根為尚書左僕射衛倫陽璆魯恭王騰為尚書恱真為侍中陽哲為中書監張通為中領軍自餘文武各復舊位改諡寶曰惠閔皇帝廟號烈宗羣臣固請上尊號盛不許八月燕以河間公熙為侍中車騎大將軍中領軍司隸校尉城陽公元為衛將軍元寶之子也又以劉忠為左將軍張豪為後將軍竝賜姓慕容氏冬十月癸酉燕羣臣復上尊號丙子長樂王盛始即皇帝位大赦尊皇后假氏曰皇太后太妃丁氏曰獻莊皇后三年初秦主登之弟廣帥衆三千依南燕王德德以為冠軍將軍處之乞活堡㑹熒惑守東井或言秦當復興廣乃自稱秦王擊南燕北地王鍾破之是時滑臺孤弱土無十城衆不過一萬鍾既敗附德者多去德而附廣德乃留魯陽王和守滑臺自帥衆討廣斬之燕主寶之至黎陽也魯陽王和長史李辨勸和納之和不從辨懼故潛引晉軍至管城欲因德出戰而作亂既而德不出辨愈不自安及德討符廣辨復勸和反和不從辨乃殺和以滑臺降魏魏行臺尚書和跋在鄴帥輕騎自鄴赴之既至辨悔之閉門拒守跋使尚書郎鄧暉說之辨乃開門內跋跋悉收德宫人府庫德遣兵擊跋跋逆擊破之又破德將桂陽王鎮俘獲千餘人陳潁之民多附於魏南燕右衛將軍慕容雲斬李辨帥將士家屬二萬餘口出滑臺赴德德欲攻滑臺韓範曰嚮也魏為客吾為主人今也吾為客魏為主人人心危懼不可復戰不如先據一方自立基本乃圖進取張華曰彭城楚之舊都可攻而據之北地王鍾等皆勸德攻滑臺尚書潘聰曰滑臺四通八逹之地北有魏南有晉西有秦居之未嘗一日安也彭城土曠人稀平夷無嶮且晉之舊鎮未易可取又密邇江淮夏秋多水乘舟而戰者吳之所長我之所短也青州沃野二千里精兵十餘萬左有負海之饒右有山河之固廣固城曹嶷所築地形阻峻足為帝王之都三齊英傑思得明主以立功於丗久矣辟閭渾昔為燕臣今宜遣辨士馳說於前大兵繼踵於後若其不服取之如拾芥耳既得其地然後閉關養鋭伺隙而動此乃陛下之關中河內也德猶豫未决沙門竺朗素善占候德使牙門蘇撫問之朗曰敬覽三䇿潘尚書之議興邦之言也且今歲之初彗星起奎婁掃虛危彗者除舊布新之象奎婁為魯虛危為齊宜先取兖州巡撫琅邪至秋乃北徇齊地此天道也撫又密問以年丗朗以周易筮之曰燕衰庚戌年則一紀丗則及子撫還報德德乃引師而南兖州北鄙諸郡縣皆降之德置守宰以撫之禁軍士無得虜掠百姓大恱牛酒屬路秋七月南燕王德遣使說幽州刺史辟閭渾欲下之渾不從德遣北地王鍾帥步騎二萬擊之德進據琅邪徐兖之民歸附者十餘萬德自琅邪引兵而北以南海王法為兖州刺史鎮梁父進攻莒城守將任安委城走德以潘聰為徐州刺史鎮莒城蘭汗之亂燕吏部尚書封孚南奔辟閭渾渾表為勃海太守及德至孚出降德大喜曰孤得青州不為喜喜得卿耳遂委以機密北地王鍾傳檄青州諸郡諭以禍福辟閭渾徙八千餘家入守廣固司馬崔誕戍薄荀固平原太守張豁戍柳泉誕豁承檄皆降於德渾懼擕妻子奔魏德遣射聲校尉劉綱追之及於莒城斬之渾子道秀自詣德請與父俱死德曰父雖不忠而子能孝特赦之渾參軍張瑛為渾作檄辭多不遜德執而讓之瑛神色自若徐曰渾之有臣猶韓信之有蒯通通遇漢祖而生臣遭陛下而死比之古人竊為不幸耳德殺之遂定都廣固四年南燕王德即皇帝位于廣固大赦改元建平更名備德欲使吏民易避追諡燕主暐曰幽皇帝以北地王鍾為司徒慕輿拔為司空封孚為左僕射慕輿護為右僕射立妃段氏為皇后通鑑紀事本末卷第十六
