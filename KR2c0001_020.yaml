  text: 通鑑紀事本末卷第二十
  hash: sha256:e32b8375242f4529150e7a927023f43918cbdffbeea21a743cc7669c799da881
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0001_SBCK_020-1a}
body:
  text: 廢帝之亂宋武帝大明二年初上在江州山隂戴法興戴明寶蔡間為典籖及即位皆以為南臺侍御史兼中書通事舍人是嵗三典籖並以初舉兵預密謀賜爵縣男間已卒追賜之時上親覽朝政不任大臣而腹心耳目不得無所委寄法興頗知古今素見親待魯郡巢尚之人士之末涉獵文史為上所知亦以為中書通事舍人凡選授遷徙誅賞大處分上皆與法興尚之參懷內外雜事多委明寶三人權重當時而法興明寶大納貨賄凡所薦達言無不行天下輻凑門外成市家産並纍千金八年夏閏五月庚申上殂於玉燭殿是日太子即皇帝位廢帝年十六大赦吏部尚書蔡興宗親奉璽綬太子受之傲惰無戚容興宗出告人曰昔魯昭不哀叔孫知其不終家國之禍其在此乎秋七月乙卯罷南北二馳道及孝建以來所改制度還依元嘉尚書蔡興宗於都座慨然謂顔師伯曰先帝雖非盛德之主要以道始終三年無改古典所貴今殯宫甫撤山陵未逺而凡諸制度興造不論是非一皆刋削雖復禪代亦不至爾天下有識當以此窺人師伯不從太宰義恭素畏戴法興巢尚之等雖受遺輔政而引身避事由是政歸近習法興等専制朝權威行近逺詔敕皆出其手尚書事無大小咸取决焉義恭與顔師伯但守空名而已蔡興宗自以職管銓衡每至上朝輒為義恭陳登賢進士之意又針規得失博論朝政義恭性恇撓阿順法興恆慮失㫖聞興宗言輒戰懼無答興宗每奏選事法興尚之等輒點定回換僅有在者興宗於朝堂謂義恭師伯曰主上諒暗不親萬機而選舉密事多被刪改復非公筆亦不知是何天子意數與義恭等爭選事往復論執義恭法興皆惡之左遷興宗新昌太守既而以其人望復留之建康八月王太后疾篤使呼廢帝帝曰病人閒多鬼那可往太后怒謂侍者取刀來剖我腹那得生寧馨兒已丑太后殂明帝泰始元年廢帝幼而狷㬥及即位始猶難太后大臣及戴法興等未敢自恣太后既殂帝年漸長欲有所為法興輒抑制之謂帝曰官所為如此欲作營陽邪帝稍不能平所幸閹人華願兒賜與無算法興常加裁減願兒恨之帝使願兒於外察聽風謡願兒言於帝曰道路皆言宫中有二天子法興為真天子官為贋天子且官居深宫與人物不接法興與太宰顔柳共為一體往來門客恆有數百內外士庶莫不畏服法興是孝武左右久在宫闈今與它人作一家深恐此坐席非復官有帝遂發詔免法興官遣還田里仍徙逺郡八月辛酉賜法興死解巢尚之舍人員外散騎侍郎東海奚顯度亦有寵於世祖常典作役課督苛虐捶朴慘毒人皆苦之帝常戲曰顯度為百姓患比當除之左右因唱諾即宣㫖殺之尚書右僕射領衛尉卿丹楊尹顔師伯居權日久海內輻湊驕奢淫恣為衣冠所疾帝欲親朝政庚午以師伯為尚書左僕射解卿尹以吏部尚書王彧為右僕射分其權任師伯始懼初世祖多猜忌王公大臣重足屏息莫敢妄相過從世祖殂太宰義恭等皆相賀曰今日始免橫死矣甫過山陵義恭與柳元景顔師伯等聲樂酣飲不捨晝夜帝內不能平既殺戴法興諸大臣無不震懾各不自安於是元景師伯密謀廢帝立義恭日夜聚謀而持疑不能决元景以其謀告沈慶之慶之與義恭素不厚又師伯常専斷朝事不與慶之參懷謂令史曰沈公瓜牙耳安得預政事慶之恨之乃發其事癸酉帝自帥羽林兵討義恭殺之并其四子斷絶義恭支體分裂腸胃挑取眼睛以蜜漬之謂之鬼目粽别遣使者稱詔召柳元景以兵隨之左右奔告兵刃非常元景知禍至入辭其母整朝服乘車應召弟車騎司馬叔仁戎服帥左右壯士欲拒命元景苦禁之既出巷軍士大至元景下車受戮容色恬然并其八子六弟及諸姪獲顔師伯於道殺之并其六子又殺廷尉劉德願改元景和文武進位二等遣使誅湘州刺史江夏世子伯禽自是公卿以下皆被捶曵如奴隸矣初帝在東宫多過失世祖欲廢之而立新安王子鸞侍中袁顗盛稱太子好學有日新之美世祖乃止帝由是德之既誅羣公欲引進顗任以朝政遷為吏部尚書與尚書左丞徐爰皆以誅義恭等功賜爵縣子徐爰便僻善事人頗涉書傳自元嘉初入侍左右豫參顧問既長於附㑹又飾以典文故為太祖所任遇大明之世委寄尤重時殿省舊人多見誅逐唯爰巧於將迎始終無忤廢帝待之益厚羣臣莫及帝每出常與沈慶之及山隂公主同輦爰亦預焉山隂公主帝姊也適駙馬都尉何戢戢偃之子也公主尤淫恣嘗謂帝曰妾與陛下男女雖殊俱託體先帝陛下六宫萬數而妾唯駙馬一人事太不均帝乃為公主置面首左右三十人進爵㑹稽郡長公主秩同郡王吏部郎楮淵貌美公主就帝請以自侍帝許之淵侍公主十日備見逼迫以死自誓乃得免淵湛之之子也帝令太廟别畫祖考之像帝入廟指髙祖像曰渠大英雄生擒數天子指太祖像曰渠亦不惡但末年不免兒斫去頭指世祖像曰渠大齄鼻如何不齄立召畫工令齄之新安王子鸞有寵於世祖帝疾之九月辛丑遣使賜子鸞死又殺其母弟南海王子師及其母妹發殷貴妃墓又欲掘景寧陵太史以為不利於帝乃止廢帝自即位以來未嘗戒嚴因民訛言義陽王昶反而討之昶奔魏元魏事見齊寇吏部尚書袁顗始為帝所寵任俄而失指待遇頓衰使有司糾奏其罪白衣領職顗懼詭辭求出甲寅以顗為督雍梁等四州諸軍事雍州刺史顗舅蔡興宗謂之曰襄陽星惡何可往顗曰白刃交前不救流矢今者之行唯願生出虎口耳且天道遼逺何必皆驗是時臨海王子頊為都督荆湘等八州諸軍事荆州刺史朝廷以興宗為子頊長史南郡太守行府州事興宗辭不行顗說興宗曰朝廷形勢人所共見在內大臣朝不保夕舅今出居峽西為八州行事顗在襄沔地勝兵彊去江陵咫尺水陸流通若朝廷有事可以共立桓文之功豈比受制凶狂臨不測之禍乎今得間不去後復求出豈可得邪興宗曰吾素門平進與主上甚踈未容有患宫省內外人不自保㑹應有變若內難得弭外舋未必可量汝欲在外求全我欲居中免禍各行其志不亦善乎顗於是狼狽上路猶慮見追行至尋陽喜曰今始免矣鄧琬為晉安王子勛鎮軍長史尋陽內史行江州事顗與之𣢾狎過常每清間必盡日窮夜顗與琬人地本殊見者知其有異志矣尋復以興宗為吏部尚書帝舅東陽太守王藻尚世祖女臨川長公主公主妬譖藻於帝冬十月己卯藻下獄死㑹稽太守孔靈符所至有政績以忤犯近臣近臣譛之帝遣使鞭殺靈符并誅其二子寧朔將軍何邁瑀之子也尚帝姑新蔡長公主帝納公主於後宫謂之謝貴嬪詐言公主薨殺宫婢送邁第殯葬行喪禮庚辰拜貴嬪為夫人加鸞輅龍旗出警入蹕邁素豪俠多養死士謀因帝出逰廢之立晉安王子勛事泄十一月壬辰帝自將兵誅邁初沈慶之既發顔柳之謀遂自昵於帝數盡言規諌帝浸不恱慶之懼禍杜門不接賔客嘗遣左右范羡至吏部尚書蔡興宗所興宗使羡謂慶之曰公閉門絶客以避悠悠請託者耳如興宗非有求於公者也何為見拒慶之使羡邀興宗興宗往見慶之因說之曰主上比者所行人倫道盡率德改行無可復望今所忌憚唯在於公百姓喁喁所瞻賴者亦在公一人而已公威名素著天下所服今舉朝遑遑人懷危怖指麾之日誰不響應如猶豫不斷欲坐觀成敗豈惟旦暮及禍四海重責將有所歸僕䝉眷異常故敢盡言願公詳思其計慶之曰僕誠知今日憂危不復自保但盡忠奉國始終以之當委任天命耳加老退私門兵力頓闕雖欲為之事亦無成興宗曰當今懷謀思奮者非欲邀功賞富貴正求脫朝夕之死耳殿中將帥唯聽外間消息若一人唱首則俯仰可定况公統戎纍朝舊日部曲布在宫省受恩者多沈攸之輩皆公家子弟耳何患不從且公門徒義附並三吳勇士殿中將軍陸攸之公之鄉人今入東討賊大有鎧仗在青溪未發公取其器仗以配衣麾下使陸攸之帥以前驅僕在尚書中自當帥百僚案前世故事更簡賢明以奉社稷天下之事立定矣又朝廷諸所施為民間傳言公悉豫之公今不决當有先公起事者公亦不免附從之禍聞車駕屢幸貴第酣醉淹留又聞屏左右獨入閣內此萬世一時不可失也慶之曰感君至言然此大事非僕所能行事至固當抱忠以沒耳青州刺史沈文秀慶之弟子也將之鎮帥部曲出屯白下亦說慶之曰主上狂㬥如此禍亂不久而一門受其寵任萬物皆謂與之同心且若人愛憎無常猜忍特甚不測之禍進退難免今因此衆力圖之易於反掌機㑹難值不可失也再三言之至於流涕慶之終不從文秀遂行及帝誅何邁量慶之必當入諌先閉青溪諸橋以絶之慶之聞之果往不得進而還帝乃使慶之從父兄子直閣將軍攸之賜慶之藥慶之不肯飲攸之以被掩殺之時年八十慶之子侍中文叔欲亡恐如太宰義恭被支解謂其弟中書郎文季曰我能死爾能報遂飲慶之之藥而死弟祕書郎昭明亦自經死文季揮刀馳馬而去追者不敢逼遂得免帝詐言慶之病薨贈侍中太尉諡曰忠武公葬禮甚厚領軍將軍王玄謨數流涕諌帝以刑殺過差帝大怒玄謨宿將有威名道路訛言玄謨已見誅蔡興宗嘗為東陽太守玄謨典籖包法榮家在東陽玄謨使法榮至興宗所興宗謂法榮曰領軍殊當憂懼法榮曰領軍比日殆不復食夜亦不眠恆言收已在門不保俄頃興宗曰領軍憂懼當為方略那得坐待禍至因使法榮勸玄謨舉事玄謨使法榮謝曰此亦未易可行期當不泄君言右衛將軍劉道隆為帝所寵任専典禁兵興宗嘗與之俱從帝夜出道隆過興宗車後興宗曰劉君比日思一間寫道隆解其意搯興宗手曰蔡公勿多言帝畏忌諸父恐其在外為患皆聚之建康拘於殿內毆捶陵曵無復人理湘東王彧建安王休仁山陽王休祐皆肥壯帝為竹籠盛而稱之以彧尤肥謂之豬王謂休仁為殺王休祐為賊王以三王年長尤惡之常録以自隨不離左右東海王禕性凡劣謂之驢王桂陽王休範巴陵王休若年尚少故並得從容嘗以木槽盛飯并雜食攪之掘地為坑實以泥水祼彧內坑中使以口就槽食之用為歡笑前後欲殺三王以十數休仁多智數每以談笑佞諛說之故得推遷少府劉曚妾孕臨月帝迎入後宫俟其生男欲立為太子彧嘗忤㫖帝祼之縛其手足貫之以杖使人檐付太官曰今日屠豬休仁笑曰豬未應死帝問其故休仁曰待皇太子生殺豬取其肝肺帝怒乃解曰且付廷尉一宿釋之丁未曚妾生子名曰皇子為之大赦賜為父後者爵一級帝又以太祖世祖在兄弟數皆第三江州刺史晉安王子勛亦第三故惡之因何邁之謀遣左右朱景雲送藥賜子勛死景雲至湓口停不進子勛典籖謝道邁主帥潘欣之侍書禇靈嗣聞之馳以告長史鄧琬泣涕請計琬曰身南土寒士䝉先帝殊恩以愛子見託豈得惜門户百口期當以死報效幼主昏㬥社稷危殆雖曰天子事猶獨夫今便指帥文武直造京邑與羣公卿士廢昏立明耳戊申琬稱子勛教令所部戒嚴子勛戎服出聽事集僚佐使潘欣之口宣㫖諭之四座未對録事參軍陶亮首請效死前驅衆皆奉㫖乃以亮為咨議參軍領中兵揔統軍事功曹張沈為咨議參軍統作舟艦南陽太守沈懷寶岷山太守薛常寶彭澤令陳紹宗等並為將帥初帝使荆州録送前軍長史荆州行事張恱至湓口琬稱子勛命釋其桎梏迎以所乘車以為司馬恱暢之弟也琬恱二人共掌內外衆事遣將軍俞伯竒帥五百人斷大雷禁絶商旅及公私使命遣使上諸郡民丁收斂器械旬日之內得甲士五千人出頓大雷於兩岸築壘又以巴東建平二郡太守孫冲之為咨議參軍領中兵與陶亮並統前軍移檄逺近戊午帝召諸妃主列於前彊左右使辱之南平王鑠妃江氏不從帝怒殺妃三子南平王敬猷廬陵王敬先安南侯敬淵鞭江妃一百先是民間訛言湘中出天子帝將南巡荆湘二州以厭之明旦欲先誅湘東王彧然後發初帝既殺諸公恐羣下謀已以直閣將軍宗越談金童太一沈牧之等有勇力引為爪牙賞賜美人金帛充牣其家越等久在殿省衆所畏服皆為帝盡力帝恃之益無所顧憚恣為不道中外騷然左右宿衛之士皆有異志而畏越等不敢發時三王久幽不知所為湘東王彧主衣㑹稽阮佃夫內監吳興王道隆學宫令臨淮李道兒與直閣將軍柳光世及帝左右琅邪淳于文祖等隂謀弒帝帝以立后故假諸王閹人彧左右錢藍生亦在中彧密使候帝動止先是帝逰華林園竹林堂使宫人倮相逐一人不從命斬之夜夢在竹林堂有女子罵曰帝悖虐不道明年不及熟矣帝於宫中求得一人似所夢者斬之又夢所殺者罵曰我已訴上帝矣於是巫覡言竹林堂有鬼是日晡時帝出華林園建安王休仁山陽王休祐㑹稽公主並從湘東王彧獨在祕書省不被召益憂懼帝素惡主衣吳興夀寂之見輒切齒阮佃夫以其謀告寂之及外監典事東陽朱幼細鎧王南彭城姜産之細鎧將晉陵王敬則中書舍人戴明寶寂之等聞之皆響應幼豫約勒內外使錢藍生密報休仁休祐時帝欲南巡腹心宗越等並聽出外裝束唯隊主樊僧整防華林閣柳光世與僧整鄉人因密邀之僧整即受命凡同謀十餘又阮佃夫慮力少不濟更欲招合夀寂之曰謀廣或泄不煩多人其夕帝悉屏侍衛與羣巫及綵女數百人射鬼於竹林堂事畢將奏樂夀寂之抽刀前入姜産之次之淳于文祖等皆隨其後休仁聞行聲甚疾謂休祐曰事作矣相隨奔景陽山帝見寂之至引弓射之不中綵女皆迸走帝亦走大呼寂寂者三寂之追而弒之宣令宿衛曰湘東王受太皇太后令除狂主今已平定殿省惶惑未知所為休仁就袐書省見湘東王即稱臣引升西堂登御座召見諸大臣于時事起倉猝王失履跣至西堂猶著烏帽坐定休仁呼主衣以白帽代之令備羽儀雖未即位凡事悉稱令書施行宣太皇太后令數廢帝罪惡命湘東王纂承皇極及明宗越等始入湘東王撫接甚厚廢帝母弟司徒楊州刺史豫章王子尚頑悖有兄風已未湘東王以太皇太后令賜子尚及㑹稽公主死建安王休仁等始得出居外舍釋謝莊之囚廢帝猶橫尸太醫閣口蔡興宗謂尚書右僕射王彧曰此雖凶悖要是天下之主宜使喪禮粗足若直如此四海必將乘人乃葬之秣陵縣南初湘東王母沈媫妤早卒路太后養之王事太后甚謹太后愛王亦篤王既弒廢帝欲慰太后心下令以太后弟子休之為黃門侍郎茂之為中書侍郎論功行賞夀寂之等十四人皆封縣侯縣子十二月庚申朔以東海王禕為中書監太尉進鎮軍將軍江州刺史晉安王子勛為車騎將軍開府儀同三司癸亥以建安王休仁為司徒尚書令楊州刺史以山陽王休祐為荆州刺史桂陽王休範為南徐州刺史丙寅湘東王即皇帝位大赦改元其廢帝時昏制謬封並皆刋削庚午以右衛將軍劉道隆為中護軍道隆昵於廢帝嘗無禮於建安太妃至是建安王休仁求解職明帝乃賜道隆死宗越談金童太一等雖為上所撫接內不自安上亦不欲使居中從容謂之曰卿等遭罹㬥朝勤勞日久應得自養之地兵馬大郡隨卿等所擇越等素已自疑聞之皆相顧失色因謀作亂以告沈攸之攸之以聞上收越等下獄死攸之復入直閣壬申以尚書右僕射王景文為尚書僕射景文即彧也避上名以字行初豫州刺史山陽王休祐入朝以長史南梁郡大守陳郡殷琰行府州事及休祐徙荆州即以琰為督豫司二州諸軍事豫州刺史江州佐吏得上所下令書皆喜共造鄧琬曰㬥亂既除殿下又開黃閣實為公私大慶琬以晉安王子勛次弟居三又以尋陽起事與世祖同符謂事必有成取令書投地曰殿下當開端門黃閣是吾徒事耳衆皆駭愕琬更與陶亮等繕治器甲徴兵四方袁顗既至襄陽即與咨議參軍劉胡繕修兵械簡集士卒詐稱被太皇太后令使其起兵即建牙馳檄奉表勸子勛即大位辛巳更以山陽王休祐為江州刺史荆州刺史臨海王子頊即留本任先是廢帝以邵陵王子元為湘州刺史中兵參軍沈仲玉為道路行事至鵲頭聞尋陽兵起不敢進琬遣數百人劫迎之令子勛建牙於桑尾傳檄建康稱孤志遵前典黜幽陟明又謂上矯害明茂篡竊天寶干我昭穆寡我兄弟藐孤同氣猶有十三聖靈何辜而當乏饗郢州刺史安陸王子綏承子勛𥘉檄欲攻廢帝聞廢帝已隕即解甲下標既而聞江雍猶治兵郢府行事茍卞之大懼即遣咨議領中兵參軍鄭景玄帥軍馳下并送軍糧荆州行事孔道存奉刺史臨海王子頊㑹稽將佐奉太守尋陽王子房皆舉兵以應子勛二年春正月癸巳徴㑹稽太守尋陽王子房為撫軍將軍以巴陵王休若代之甲午中外戒嚴以司徒建安王休仁都督征討諸軍事車騎將軍江州刺史王玄謨副之休仁軍於南州以沈攸之為尋陽太守將兵屯虎檻時玄謨未發前鋒凡十軍絡繹繼至每夜各立姓號不相禀受攸之謂諸將曰今衆軍姓號不同若有耕夫漁父夜相呵叱便致駭亂取敗之道也請就一軍取號衆咸從之鄧琬稱說符瑞詐稱受路太后璽書帥將佐上尊號於晉安王子勛乙未子勛即皇帝位於尋陽改元義嘉以安陸王子綏為司徒楊州刺史尋陽王子房臨海王子頊並加開府儀同三司以鄧琬為尚書右僕射張恱為吏部尚書袁顗加尚書左僕射自餘將佐及諸州郡除官進爵號各有差丙申以征虜司馬申令孫為徐州刺史令孫坦之子也置司州於義陽以義陽內史龎孟虯為司州刺史徐州刺史薛安都冀州刺史清河崔道固皆舉兵應尋陽上徴兵於青州刺史沈文秀文秀遣其將平原劉彌之等將兵赴建康㑹薛安都遣使邀文秀文秀更令彌之等應安都濟隂太守申闡據睢陵應建康安都遣其從子直閣將軍索兒太原太守清河傅靈越等攻之闡令孫之弟也安都壻裴祖隆守下邳劉彌之至下邳更以所領應建康襲擊祖隆祖隆兵敗與征北參軍垣崇祖奔彭城崇祖護之之從子也彌之族人北海太守懷恭從子善明皆舉兵以應彌之薛索兒聞之釋睢陵引兵擊彌之彌之戰敗走保北海申令孫進據淮陽請降於索兒龎孟虯亦不受命舉兵應尋陽帝召尋陽王長史行㑹稽郡事孔顗為太子詹事以平西司馬庾業代之又遣都水使者孔璪入東慰勞璪說覬以建康虛弱不如擁五郡以應袁鄧覬遂發兵馳檄奉尋陽吳郡太守顧琛吳興太守王曇生義興太守劉延熙晉陵太守袁標皆據郡應之上又以庾業代延熙為義興業至長塘湖即與延熙合益州刺史蕭惠開聞晉安王子勛舉兵集將佐謂之曰湘東太祖之昭晉安世祖之穆其於當壁並無不可但景和雖昏本是世祖之嗣不任社稷其次猶多吾荷世祖之眷當推奉九江乃遣巴郡太守費欣夀將五千人東下於是湘州行事何慧文廣州刺史袁曇逺梁州刺史柳元怙山陽太守程天祚皆附於子勛元怙元景之從兄也是嵗四方貢計皆歸尋陽朝廷所保唯丹楊淮南等數郡其間諸縣或應子勛東兵已至永世宫省危懼上集羣臣以謀成敗蔡興宗曰今普天同叛人有異志宜鎮之以靜至信待人叛者親戚布在宫省若繩之以法則土崩立至宜明罪不相及之義物情既定人有戰心六軍精勇器甲犀利以待不習之兵其勢相萬耳願陛下勿憂上善之建武司馬劉順說豫州刺史殷琰使應尋陽琰以家在建康未許右衛將軍柳光世自省內出奔彭城過夀陽言建康必不能守琰信之且素無部曲為大豪前右軍參軍杜叔寶等所制不得已而從之琰以叔寶為長史內外軍事皆叔寶専之上謂蔡興宗曰諸處未平殷琰已復同逆頃日人情云何事當濟不興宗曰逆之與順臣無以辨今商旅斷絶米甚豐賤四方雲合而人情更安以此卜之清蕩可必但臣之所憂更在事後猶羊公言既平之後方當勞聖慮耳上曰誠如卿言上知琰附尋陽非本意乃更厚撫其家以招之汝南新蔡二郡太守周矜起兵於懸瓠以應建康袁顗誘矜司馬汝南常珍竒執矜斬之以珍竒代為太守上使冗從僕射垣榮祖還徐州說薛安都安都曰今京都無百里地不論攻圍取勝自可拍手笑殺且我不欲負孝武榮祖曰孝武之行足致餘殃今雖天下雷同正是速死無能為也安都不從因留榮祖使為將榮祖崇祖之從父兄也兖州刺史殷孝祖之甥司法參軍穎川葛僧韶請徴孝祖入朝上遣之時薛索兒屯據津徑僧韶閒行得至說孝祖曰景和凶狂開闢未有朝野危極假命漏刻主上夷凶翦㬥更造天地國亂朝危宜立長君而羣迷相煽構造無端貪利幼弱競懷希望使天道助逆羣凶事申則主幼時艱權柄不一兵難互起豈有自容之地舅少有立功之志若能控濟義勇還奉朝廷非唯臣主靜亂乃可以垂名竹帛孝祖具問朝廷消息僧韶隨方酬譬并陳兵甲精彊主上欲委以前驅之任孝祖即日委妻子於瑕丘帥文武二千人隨僧韶還建康時四方皆附尋陽朝廷唯保丹楊一郡而永世令孔景宣復叛義興兵垂至延陵內外憂危咸欲奔散孝祖忽至衆力不少並傖楚壯士人情大安甲辰進孝祖號撫軍將軍假節督前鋒諸軍事遣向虎檻寵賚甚厚初上遣東平畢衆敬詣兖州募人至彭城薛安都以利害說之矯上命以衆敬行兖州事衆敬從之殷孝祖使司馬劉文石守瑕丘衆敬引兵擊殺之安都素與孝祖有隙使衆敬殺孝祖諸子州境皆附之唯東平太守申纂據無鹽不從纂鍾之曾孫也丙午上親揔兵出頓中堂辛亥以山陽王休祐為豫州刺史督輔國將軍彭城劉勔寧朔將軍廣陵吕安國等諸軍西討殷琰巴陵王休若督建威將軍吳興沈懷明尚書張永輔國將軍蕭道成等諸軍東討孔覬時將士多東方人父兄子弟皆已附覬上因送軍普加宣示曰朕方務德簡刑使父子兄弟罪不相及助順同逆者一以所從為斷卿等當深達此懷勿以親戚為慮也衆於是大恱凡叛者親黨在建康者皆使居職如故孔覬遣其將孫曇瓘等軍於晉陵九里部陳甚盛沈懷明至奔牛所領寡弱乃築壘自固張永至曲阿未知懷明安否百姓驚擾永退還延陵就巴陵王休若諸將帥咸勸休若退保破岡其日大寒風雪甚猛塘埭决壞衆無固心休若宣令敢有言退者斬衆小定乃築壘息甲尋得懷明書賊定未進軍主劉亮又至兵力轉盛人情乃安亮懷慎之從孫也殿中御史吳喜以主書事世祖稍遷至河東太守至是請得精兵三百致死於東上假喜建武將軍簡羽林勇士配之議者以喜刀筆主者未嘗為將不可遣中書舍人巢尚之曰喜昔隨沈慶之屢經軍旅性既勇决又習戰陳若能任之必有成績諸人紛紜皆是不别才耳乃遣之喜先時數奉使東吳性寬厚所至人並懷之百姓聞吳河東來皆望風降散故喜所至克捷永世人徐崇之攻孔景宣斬之喜板崇之領縣事喜至國山遇東軍進擊大破之自國山進屯吳城劉延熙遣其將楊玄等拒戰喜兵力甚弱玄等衆盛喜奮擊斬之進逼義興延熙柵斷長橋保郡自守喜築壘與之相持庾業於長塘湖口夾岸築城有衆七千人與延熙遙相應接沈懷明張永與晉陵軍相持久不決外監朱幼舉司徒參軍督護任農夫驍果有膽力上以四百人配之使助東討農夫自延陵出長塘庾業築城猶未合農夫馳往攻之力戰大破之庾業棄城走義興農夫收其船仗進向義興助吳喜二月己未朔喜渡水攻郡城分兵擊諸壘登髙指麾若令四面俱進者義興人大懼諸壘皆潰延熙赴水死遂克義興沈懷明張永蕭道成等軍於九里西與東軍相持東軍聞義興敗皆震恐上遣積射將軍濟陽江方興御史王道隆至晉陵視東軍形勢孔覬將孫曇瓘程扞宗等列五城互相連帶扞宗城猶未固王道隆與諸將謀曰扞宗城既未立可以藉手上副聖㫖下成衆氣辛酉道隆帥所領急攻拔之斬扞宗首永等因乘勝進擊曇瓘等壬戌曇瓘等兵敗與袁標俱棄城走遂克晉陵吳喜軍至義鄉孔璪屯吳與南亭太守王曇生詣璪計事聞臺軍已近璪大懼墮牀曰懸賞所購唯我而已今不遽走將為人擒遂與曇生奔錢唐喜入吳興任農夫引兵向吳郡顧琛棄郡奔㑹稽上以四郡既平乃留吳喜使統沈懷明等諸將東擊㑹稽召張永等北擊彭城江方興等南擊尋陽丁卯吳喜至錢唐孔璪王雲生奔浙東喜遣彊弩將軍任農夫等引兵向黃山浦東軍據岸結寨農夫等擊破之喜自柳浦渡取西陵擊斬庾業㑹稽人大懼將士多奔亡孔覬不能制戊寅上虞令王晏起兵攻郡覬逃奔嵴山車騎從事中郎張綏封府庫以待吳喜己卯王晏入城殺綏執尋陽王子房於别署縱兵大掠府庫皆空獲孔璪殺之庚辰嵴山民縛孔覬送晏晏謂之曰此事孔璪所為無預卿事可作首辭當相為申上覬曰江東處分莫不由身委罪求活便是君輩行意耳晏乃斬之顧琛王曇生袁摽等詣吳喜歸罪喜皆宥之東軍主凡七十六人於陳斬十七人其餘皆原宥薛索兒攻申闡久不下使申令孫入睢陵說闡闡出降索兒并令孫殺之山陽王休祐在歷陽輔國將軍劉勔進軍小峴殷琰所署南汝隂太守裴季以合肥來降鄧琬性鄙暗貪吝既執大權父子賣官鬻爵使婢僕出市道販賣酣歌博奕日夜不休大自矜遇賔客到門歷旬不得前內事悉委禇靈嗣等三人羣小橫恣競為威福於是士民忿怨內外離心琬遣孫冲之帥龍驤將軍薛常寶陳紹宗焦度等兵一萬為前鋒據赭圻冲之於道與晉安王子勛書曰舟楫已辦器械亦整三軍踊躍人爭效命便欲㳂流挂帆直取白下願速遣陶亮衆軍兼行相接分據新亭南州則一麾定矣子勛加冲之左衛將軍以陶亮為右衛將軍統郢荆湘梁雍五州兵合二萬人一時俱下陶亮本無幹略聞建安王休仁自上殷孝祖又至不敢進屯軍鵲洲殷孝祖負其誠節陵轢諸將臺軍有父子兄弟在南者孝祖悉欲推治由是人情乖離莫樂為用寧朔將軍沈攸之內撫將士外諧羣帥衆並賴之孝祖每戰常以鼓蓋自隨軍中人相謂殷統軍可謂死將矣今與賊交鋒而以羽儀自標顯若善射者十人共射之欲不斃得乎三月庚寅衆軍水陸欲進攻赭圻陶亮等引兵救之孝祖於陳為流矢所中死軍主范潜帥五百人降於亮人情震駭並謂沈攸之宜代孝祖為統時建安王休仁屯虎檻遣寧朔將軍江方興龍驤將軍襄陽劉靈遺各將三千人赴赭圻攸之以為孝祖既死亮等有乘勝之心明日若不更攻則示之以弱方興名位相亞必不為已下軍政不一致敗之由也乃帥諸軍主詣方興曰今四方並反國家所保無復百里之地唯有殷孝祖為朝廷所委賴鋒鏑裁交輿尸而反文武喪氣朝野危心事之濟否唯在明旦一戰戰若不捷則大事去矣詰朝之事諸人或謂吾應統之自卜懦薄幹略不如卿今輒相推為統但當相與勠力耳方興甚恱許諾攸之既出諸軍主並尤之攸之曰吾本以濟國活家豈計此之升降且我能下彼彼必不能下我共濟艱難豈可自措同異也孫冲之謂陶亮曰孝祖梟將一戰便死天下事定矣不須復戰便當直取京都亮不從辛卯方興帥諸軍進戰建安王休仁又遣軍主郭季之步兵校尉杜幼文屯騎校尉垣恭祖龍驤將軍濟地頓生京兆假佛榮等三萬人往㑹戰自寅及午大破之追奔至姥山而還幼文驥之子也孫冲之於湖白口築二城軍主竟陵張興丗攻拔之壬辰詔以沈攸之為輔國將軍假節代殷孝祖督前鋒諸軍事陶亮聞湖白二城不守大懼急召孫冲之還鵲尾留薛常寶等守赭圻先於姥山及諸岡分立營寨亦悉散還共保濃湖時軍旅大起國用不足募民上錢榖者賜荒縣荒郡或五品至三品散官有差軍中食少建安王休仁撫循將士均其豐儉弔死問傷身親隱恤故十萬之衆莫有離心鄧琬遣其豫州刺史劉胡帥衆三萬鐡騎三千東屯鵲尾并舊兵凡十餘萬胡宿將勇健多權略屢有戰功將士畏之司徒中兵參軍冠軍蔡那子弟在襄陽胡每戰懸之城外那進戰不顧吳喜既定三吳帥所領五千人并運資實至于赭圻薛索兒將馬步萬餘人自睢陵渡淮進逼青冀二州刺史張永營丙申詔南徐州刺史桂陽王休範統北討諸軍事進據廣陵又詔蕭道成將兵救永戊戌尋陽王子房至建康上宥之貶爵為松滋侯上遣寧朔將軍劉懷珍帥龍驤將軍王敬則等步騎五千助劉勔討夀陽斬廬江太守劉道蔚懷珍善明之從子也中書舍人戴明寶啓上遣軍主竟陵黃回募兵擊斬尋陽所署馬頭太守王廣元前奉朝請夀陽鄭黑起兵於淮上以應建康東扞殷琰西拒常珍竒乙巳以黑為司州刺史殷琰將劉順柳倫皇甫道烈龎天生等馬步八千人東據宛唐劉勔帥衆軍並進去順數里立營時琰所遣諸軍並受順節度而以皇甫道烈土豪柳倫臺之所遣順本卑微唯不使統督二軍勔始至塹壘未立順欲擊之道烈倫不同順不能獨進乃止勔營既立不可復攻因相持守沈攸之帥諸軍圍赭圻薛常寶等糧盡告劉胡求救胡以囊盛米繫流查及船腹陽覆船順風流下以餉之沈攸之疑其有異遣人取船及流查大得囊米丙辰劉胡帥步卒一萬夜斫山開道以布囊運米餉赭圻平旦至城下猶隔小塹未能入沈攸之帥諸軍邀之殊死戰胡衆大敗捨糧棄甲緣山走斬獲甚衆胡被瘡僅得還營常寶等惶懼夏四月辛酉開城突圍走還胡軍攸之拔赭圻城斬其寧朔將軍沈懷寶等納降數千人陳紹宗單舸奔鵲尾建安王休仁自虎檻進屯赭圻劉胡等兵猶盛上欲綏慰人情遣吏部尚書褚淵至虎檻選用將士時以軍功除官者衆板不能供始用黃紙鄧琬以晉安王子勛之命徴袁顗下尋陽顗悉雍州之衆馳下琬以黃門侍郎劉道憲行荆州事侍中孔道存行雍州事上庸太守柳世隆乘虛襲襄陽不克世隆元景之弟子也散騎侍郎明僧皓起兵攻沈文秀以應建康壬午以僧皓為青州刺史平原樂安二郡太守王玄默據琅邪清河廣川二郡太守王玄邈據盤陽城髙陽勃海二郡太守劉乘民據臨濟城並起兵以應建康玄邈玄謨之從弟乘民彌之之從子也沈文秀遣軍主解彥士攻北海拔之殺劉彌之乘民從弟伯宗合帥鄉黨復取北海因引兵向青州所治東陽城文秀拒之伯宗戰死僧皓玄默玄邈乘民合兵攻東陽城每戰輒為文秀所破離而復合如此者十餘卒不能克杜叔寶謂臺軍住歷陽不能遽進及劉勔等至上下震恐劉順等始行唯齎一月糧既與勔久相持糧盡叔寶發車千五百乘載米餉順自將五千精兵送之吕安國聞之言於劉勔曰劉順精甲八千而我衆不能居半相持既久彊弱勢殊更復推遷則無以自立所賴者彼糧行竭我食有餘耳若使叔寶米至非唯難可復圖我亦不能持久今唯有間道襲其米車出彼不意若能制之將不戰走矣勔以為然以疲弱守營簡精兵千人配安國及龍驤將軍黃回使從間道出順後於橫塘抄之安國始行齎二日熟食食盡叔寶不至將士欲還安國曰卿等旦已一食今晚米車不容不至若其不至夜去不晚叔寶果至以米車為函箱陳叔寶於外為逰軍幢主楊仲懷將五百人居前安國回等擊斬之及其士卒皆盡叔寶至回欲乘勝擊之安國曰彼將自走不假復擊退三十里止宿夜遣騎參候叔寶果棄米車走安國復夜往燒米車驅牛二千餘頭而還五月丁亥朔夜劉順衆潰順走淮西就常珍竒於是劉勔鼓行進向壽陽叔寶斂居民及散卒嬰城自守勔與諸軍分營城外山陽王休祐與殷琰書為陳利害上又遣御史王道隆齎詔宥琰罪勔與琰書并以琰兄瑗子邈書與之琰與叔寶等皆有降意而衆心不一復嬰城固守弋陽西山蠻田益之起兵應建康詔以益之為輔國將軍督弋陽四山事壬辰以輔國將軍沈攸之為雍州刺史丁未以尚書左僕射王景文為中軍將軍庚戌以寧朔將軍劉乘民為冀州刺史張永蕭道成等與薛索兒戰大破之索兒退保石梁食盡而潰走向樂平為申令孫子孝叔所斬薛安都子道智走向合肥詣裴季降傅靈越走至淮西武衛將軍沛郡王廣之生獲之送詣勔勔詰其叛逆靈越曰九州唱義豈獨在我薛公不能専任智勇委付子姪此其所以敗也人生歸於一死實無面求活勔送詣建康上欲赦之靈越辭終不改乃殺之鄧琬以劉胡與沈攸之等相持久不决乃加袁顗督征詩諸軍事六月甲戌顗帥樓船千艘戰士二萬來入鵲尾顗本無將略性又怯橈在軍中未嘗戎服語不及戰陳唯賦詩談義而已不復撫接諸將劉胡每論事酬對甚簡由此大失人情胡常切齒恚恨胡以南運米未至軍士匱乏就顗借襄陽之資顗不許曰都下兩宅未成方應經理又信往來之言云建康米貴斗至數百以為將不攻自潰擁甲以待之田益之帥蠻衆萬餘人圍義陽鄧琬使司州刺史龎孟虯帥精兵五千救之益之不戰潰去安成太守劉襲始安內史王識之建安內史趙道生並舉郡來降襲道憐之孫也蕭道成世子賾為南康贛令鄧琬遣使收繫之門客蘭陵桓康擔賾妻裴氏及其子長懋子良逃於山中與賾族人蕭欣祖等結客得百餘人攻郡破獄出賾南康相沈肅之帥將吏追賾賾與戰擒之賾自號寧朔將軍據郡起兵與劉襲等相應琬以中護軍殷孚為豫章太守督上流五郡以防襲等衡陽內史王應之起兵應建康襲擊襄州行事何慧文於長沙應之與慧文捨軍身戰斫慧文八創慧文斫應之斷足殺之始興人劉嗣祖等據郡起兵應建康廣州刺史袁曇逺遣其將李萬周等討之嗣祖誑萬周云尋陽已平萬周還襲番禺擒曇逺斬之上以萬周行廣州事諸軍與袁顗相拒於濃湖久未决龍驤將軍張興世建議曰賊據上流兵彊地勝我雖持之有餘而制之不足若以竒兵數千潛出其上因險而壁見利而動使其首尾周遑進退疑阻中流既梗糧運自艱此制賊之竒也錢溪江岸最狹去大軍不逺下臨洄洑船下必來沿岸又有橫浦可以藏船千人守險萬人不能過衝要之地莫出於此沈攸之吳喜並贊其䇿㑹龎孟虯引兵來助殷琰劉勔遣使求救甚急建安王休仁欲遣興世救之沈攸之曰孟虯蟻聚必無能為遣别將馬步數千足以相制興世之行是安危大機必不可輟乃遣假佛榮將兵救勔而選戰士七千輕舸二百配興世興世帥其衆泝流西上尋復退歸如是者纍日劉胡聞之笑曰我尚不敢越彼下取楊州張興世何物人欲輕據我上不為之備一夕四更值便風興世舉帆直前度湖白過鵲尾胡既覺乃遣其將胡靈秀將兵於東岸翼之而進戊戌夕興世宿景洪浦靈秀亦留興世濳遣其將黃道標帥七十舸徑趣錢溪立營寨己亥興世引兵進據之靈秀不能禁庚子劉胡自將水步二十六軍來攻錢溪將士欲迎擊之興世禁之曰賊來尚逺氣盛而矢驟驟既易盡盛亦易衰不如待之令將士治城如故俄而胡來轉近船入洄洑興世命壽寂之任農夫帥壯士數百擊之衆軍相繼並進胡敗走斬首數百胡收兵而下時興世城寨未固建安王休仁慮袁顗并力更攻錢溪欲分其勢辛丑命沈攸之吳喜等以皮艦進攻濃湖斬獲千數是日劉胡帥步卒二萬鐡馬一千欲更攻興世未至錢溪數十里袁顗以濃湖之急遽追之錢溪城田此得立胡遣人傳唱錢溪已平衆並懼沈攸之曰不然若錢溪實敗萬人中應有一人逃亡得還者必是彼戰失利唱空聲以惑衆耳勒軍中不得妄動錢溪捷報尋至攸之以錢溪所送胡軍耳鼻示濃湖袁顗駭懼攸之日暮引歸龍驤將軍劉道符攻山陽程天祚請降龎孟虯進至弋陽劉勔遣吕安國等迎擊於蓼潭大破之孟虯走向義陽王玄謨之子曇善起兵據義陽以應建康孟虯走死蠻中劉胡遣輔國將軍薛道標襲合肥殺汝隂太守裴季劉勔遣輔國將軍垣閎擊之閎閬之弟道標安都之子也淮西人鄭叔舉起兵擊常珍竒以應鄭黑辛亥以叔舉為北豫州刺史八月皇甫道烈等聞龎孟虯敗並開門出降張興世既據錢溪濃湖軍乏食鄧琬大送資糧畏興世不敢進劉胡帥輕舸四百由鵲頭內路欲攻錢溪既而謂長史王念叔曰吾少習步戰未間水鬭若步戰恆在數萬人中水戰在一舸之上舸舸各進不復相關正在三十人中此非萬全之計吾不為也乃託瘧疾住鵲頭不進遣龍驤將軍陳慶將三百舸向錢溪戒慶不須戰張興世吾之所悉自當走耳陳慶至錢溪軍於梅根胡遣别將王起將百舸攻興世興世擊起大破之胡帥其餘舸馳還謂顗曰興世營寨已立不可猝攻昨日小戰未足為損陳慶已與南陵大雷諸軍共遏其上大軍在此鵲頭諸將又斷其下流已墮圍中不足復慮顗怒胡不戰謂曰糧運鯁塞當如此何胡曰彼尚得泝流越我而上此運何以不得沿流越彼而下邪乃遣安北府司馬沈仲玉將千人步趣南陵迎糧仲玉至南陵載米三十萬斛錢布數十舫豎榜為城規欲突過行至貴口不敢進遣聞信報胡令遣重軍援接張興世遣壽寂之任農夫等將三千人至貴口擊之仲玉走還顗營悉虜其資實胡衆駭懼胡將張喜來降鎮東中兵參軍劉亮進兵逼胡營胡不能制袁顗懼曰賊入人肝脾裏何由得活胡隂謀遁去己卯誑顗云欲更帥步騎二萬上取錢溪兼下大雷餘運令顗悉選馬配之其日胡委顗去徑趣梅根先令薛常寶辦船悉發南陵諸軍燒大雷諸城而走至夜顗方知之大怒罵曰今年為小子所誤呼取常所乘善馬飛燕謂其衆曰我當自出追之因亦走庚辰建安王休仁勒兵入顗營納降卒十萬遣沈攸之等追顗顗走至鵲頭與戍主薛伯珍并所領數千人偕去欲向尋陽夜止山間殺馬以勞將士顧謂伯珍曰我非不能死且欲一至尋陽謝罪主上然後自刎耳因慷慨叱左右索節無復應者及旦伯珍請屏人言事遂斬顗首詣錢溪馬軍主襄陽俞湛之湛之因斬伯珍并送首以為己功劉胡帥二萬人向尋陽詐晉安王子勛云袁顗已降軍皆散唯已帥所領獨返宜速處分為一戰之資當停據湓城誓死不二乃於江外夜趣沔口鄧琬聞胡去憂惶無計呼中書舍人禇靈嗣等謀之並不知所出張恱詐稱疾呼琬計事令左右伏甲帳後戒之若聞索酒便出琬既至恱曰卿首唱此謀今事已急計將安出琬曰正當斬晉安王封府庫以謝罪耳恱曰今日寧可賣殿下求活邪因呼酒子洵提刀出斬琬中書舍人潘欣之聞琬死勒兵而至恱使人語之曰鄧琬謀反今已梟戮欣之乃還取琬子並殺之恱因單舸齎琬首馳下詣建安王休仁降尋陽亂蔡那之子道淵在尋陽被繫作部脫鎖入城執子勛囚之沈攸之等諸軍至尋陽斬晉安王子勛傳首建康時年十一初鄧琬遣臨川內史張淹自鄱陽嶠道入三吳軍于上饒聞劉胡敗軍副鄱陽太守費曅斬淹以降淹暢之子也廢帝之世衣冠懼禍咸欲逺出至是流離外難百不一存衆乃服蔡興宗之先見九月壬辰以山陽王休祐為荆州刺史癸巳解嚴大赦庚子司徒休仁至尋陽遣吳喜張興世向荆州沈懷明向郢州劉亮及寧朔將軍南陽張敬兒向雍州孫超之向湘州沈思仁任農夫向豫章平定餘冦劉胡逃至石城捕得斬之郢州行事張沈變形為沙門潛走追獲殺之荆州行事劉道憲聞濃湖平散兵遣使歸罪荆州治中宗景等勒兵入城殺道憲執臨海王子頊以降孔道存知尋陽已平遣使請降尋聞栁世隆劉亮當至衆悉逃潰道存及三子皆自殺上以何慧文才兼將吏使吳喜宣㫖赦之慧文曰既陷逆節手害忠義何靣見天下之士遂自殺安陵王子綏臨海王子頊邵陵王子元並賜死劉順及餘黨在荆州者皆伏誅詔追贈諸死節之臣及封賞有功者各有差上既誅晉安王子勛等待世祖諸子猶如平日司徒休仁還自尋陽言於上曰松滋侯兄弟尚在將來非社稷計宜早為之所冬十月乙卯松滋侯子房永嘉王子仁始安王子真淮南王子孟南平王子産廬陵王子輿子趨子期東平王子嗣子恱並賜死及鎮北咨議參軍路休之司徒從事中郎路茂之兖州刺史劉祗中書舍人嚴龍皆坐誅世祖二十八子於此盡矣劉勔圍壽陽垣閎攻合肥俱未下勔患之召諸將㑹議馬隊主王廣之曰得將軍所乘馬判能平合肥幢主皇甫肅怒曰廣之敢奪節下馬可斬勔笑曰觀其意必能立功即推鞍下馬與之廣之往攻合肥三日克之薛道標突圍奔淮西歸常珍竒勔擢廣之為軍主廣之謂肅曰節下若從卿言何以平賊卿不賞才乃至於此肅有學術及勔卒更依廣之廣之薦於齊世祖為東海太守徐州刺史薛安都等遣使乞降帝比伐事見明冬十二月劉勔圍夀陽自首春至于末冬內攻外禦戰無不捷以寬厚得將士心尋陽既平上使中書為詔諭殷琰蔡興宗曰天下既定是琰思過之日陛下宜賜手詔數行以相慰引今直中書為詔彼必疑謂非真非所以速清方難也不從琰得詔謂劉勔詐為之不敢降杜叔寶閉絶尋陽敗問有傳者即殺之守備益固凡有降者上輒送夀陽城下使與城中人語由是衆情離沮琰欲請降於魏主簿譙郡夏侯詳說琰曰今日之舉本效忠節若社稷有奉便當歸身朝廷何可北面左衽乎且今魏軍近在淮次官軍未測吾之去就若遣使歸𣢾必厚相慰納豈止免罪而已琰乃使詳出見劉勔詳說勔曰今城中士民知困而猶固守者畏將軍之誅皆欲自歸於魏願將軍緩而赦之則莫不相帥而至矣勔許諾使詳至城下呼城中人諭以勔意丙寅琰帥將佐面縛出降勔悉加慰撫不戮一人入城約勒將士士民資財秋豪無所失夀陽人大恱魏兵至師水將救夀陽聞琰已降乃掠義陽數千人而去久之琰復仕至少府而卒宋明帝北伐宋明帝泰始二年晉安王子勛之敗於尋陽也徐州刺史薛安都益州刺史蕭惠開梁州刺史柳元怙兖州刺史畢衆敬豫章太守殷孚汝南太守常珍竒並遣使乞降上以南方已平欲示威淮北冬十月乙亥命鎮軍將軍張永中領軍沈攸之將士甲十五萬迎薛安都蔡興宗曰安都歸順此誠非虛正須單使尺書今以重兵迎之勢必疑懼或能招引北虜為患方深若以叛臣罪重不可不誅則嚮之所有亦已多矣况安都外據大鎮密邇邉陲地險兵彊攻圍難克考之國計尤宜馴養如其外叛將為朝廷旰食之憂上不從謂征北司馬行南徐州事蕭道成曰吾今因此北討卿意以為何如對曰安都狡猾有餘今以兵逼之恐非國之利上曰諸軍猛鋭何往不克卿勿多言安都聞大兵北上懼遣使乞降於魏常珍竒亦以懸瓠降魏皆請兵自救薛安都以其子為質於魏魏遣鎮東大將軍代人尉元鎮東將軍魏郡孔伯恭等帥騎一萬出東道救彭城鎮西大將軍西河公石都督荆豫南雍州諸軍事張窮竒出西道救懸瓠以安都為都督徐兖等五州諸軍事鎮南大將軍徐州刺史河東公常珍竒為平南將軍豫州刺史河內公兖州刺史申纂詐降於魏尉元受之而隂為之備魏師至無鹽纂閉門拒守薛安都之召魏兵也畢衆敬不與之同遣使來請降上以衆敬為兖州刺史衆敬子元賔在建康先坐它罪誅衆敬聞之怒拔刀斫柱曰吾皓首唯一子不能全安用獨生十一月壬子魏師至瑕丘衆敬請降於魏尉元遣部將先據其城衆敬悔恨數日不食元長驅而進十二月己未軍于秅西河公石至上蔡常珍竒帥文武出迎石欲頓軍汝北未即入城中書博士鄭羲曰今珍竒雖來意未可量不如且入其城奪其管籥據有府庫制其腹心策之全者也石遂策馬入城因置酒嬉戲羲曰視珍竒之色甚不平不可不為之備乃嚴兵設備其夕珍竒使人燒府屋欲為變以石有備而止羲豁之曾孫也淮西七郡民多不願屬魏連營南奔魏遣建安王陸馛宣慰新附民有陷軍為奴婢者馛悉免之新民乃恱是嵗張永沈攸之進兵逼彭城軍于下礚分遣羽林監王穆之將卒五千守輜重於武原魏尉元至彭城薛安都出迎元遣李璨與安都先入城收其管籥别遣孔伯恭以精甲二千安撫內外然後入其夜張永攻南門不克而退元不禮於薛安都安都悔降復謀叛魏元知之不果發安都重賂元等委罪於女壻裴阻隆而殺之元使李璨與安都守彭城自將兵擊張永絶其糧道又破王穆之於武原穆之帥餘衆就永元進攻之三年春正月張永等棄城夜遁㑹天大雪泗水冰合永等棄船步走士卒凍死者太半手足斷者什七八尉元邀其前薛安都乘其後大破永等於吕梁之東死者以萬數枕尸六十餘里委棄軍資器械不可勝計永足指亦墮與沈攸之僅以身免梁南秦二州刺史垣恭祖等為魏所虜上聞之召蔡興宗以敗書示之曰我愧卿甚永降號左將軍攸之免官以貞陽公領職還屯淮隂由是失淮北四州及豫州淮西之地裴子野論曰昔齊桓矜於葵丘而九國叛曹公不禮張松而天下分一失豪釐其差逺矣太宗之初威令所被不滿百里卒有離心士無固色而能開誠心布𣢾實莫不感恩服德致命效死故西摧北蕩㝢內褰開既而六軍獻捷方隅束手天子欲賈其餘威師出無名長淮以北倐忽為戎惜乎若以嚮之虛懷不驕不伐則三叛奚為而起哉髙祖蟣虱生介胄經啓彊場後之子孫日蹙百里播穫堂構豈云易哉魏尉元以彭城兵荒之後公私困竭請發冀相濟兖四州粟取張永所棄船九百艘沿河運載以賑新民魏朝從之沈文秀崔道固為土人所攻遣使乞降於魏且請兵自救二月魏西河公石自懸瓠引兵攻汝隂太守張超不克退屯陳項議還長社待秋擊之鄭羲曰張超蟻聚窮命糧食已盡不降當走可翹足而待也今棄之逺去超修城浚隍積薪儲榖更來恐難圖矣石不從遂還長社初尋陽既平帝遣沈文秀弟文炳以詔書諭文秀又遣輔國將軍劉懷珍將馬步三千人與文炳偕行未至值張永等敗退懷珍還鎮山陽文秀攻青州刺史明僧皓帝使懷珍帥龍驤將軍王廣之將五百騎步卒二千人浮海救之至東海僧皓已退保東萊懷珍進據朐城衆心凶懼欲且保郁洲懷珍曰文秀欲以青州歸索虜計齊之士民安肯甘心左衽邪今揚兵直前宣布威德諸城可飛書而下奈何守此不進自為沮橈乎遂進至黔陬文秀所署髙密平昌二郡太守棄城走懷珍送致文炳達朝廷意文秀猶不降百姓聞懷珍至皆喜文秀所署長廣太守劉桃根將數千人戍不其城懷珍軍於洋水衆謂且宜堅壁伺隙懷珍曰今衆少糧竭懸軍深入正當以精兵速進掩其不備耳乃遣王廣之將百騎襲不其城拔之文秀聞諸城皆敗乃遣使請降帝復以為青州刺史崔道固亦請降復以為冀州刺史懷珍乃還沈攸之之自彭城還也留長水校尉王玄載守下邳積射將軍沈韶守宿豫睢陵淮陽皆留兵戍之玄載玄謨之從將也時東平太守申纂守無鹽幽州刺史劉休賔守梁鄒并州刺史清河房崇吉守升城輔國將軍清河張讜守團城及兗州刺史王整蘭陵太守桓欣肥城糜溝垣苗等戍皆不附於魏休賔乘民之兄子也魏遣平東將軍長孫陵等將兵赴青州征南大將軍慕容白曜將騎五萬為之繼援白曜燕太祖之玄孫也白曜至無鹽欲攻之將佐皆以為攻具未備不宜遽進左司馬范陽酈範曰今輕軍逺襲深入敵境豈宜淹緩且申纂必謂我軍來速不暇攻圍將不為備今若出其不意可一鼓而克白曜曰司馬策是也乃引兵僞退申纂不復設備白曜夜中部分三月甲寅旦攻城食時克之纂走追擒殺之白曜欲盡以無鹽人為軍賞酈範曰齊形勝之地宜逺為經略今王師始入其境人心未洽連城相望咸有拒守之志茍非以德信懷之未易平也白曜曰善皆免之白曜將攻肥城酈範曰肥城雖小攻之引日勝之不能益軍勢不勝足以銼軍威彼見無鹽之破死傷塗地不敢不懼若飛書告諭縱使不降亦當逃散白曜從之肥城果潰獲粟三十萬斛白曜謂範曰此行得卿三齊不足定也遂取垣苖糜溝二戍一旬中連拔四城威震齊土房崇吉守升城勝兵者不過七百人慕容白曜築長圍以攻之自二月至于夏四月乃克之白曜忿其不降欲盡坑城中人參軍事昌黎韓麒麟諫曰今勍敵在前而坑其民自此以東諸城人自為守不可克也師老糧盡外冦乘之此危道也白曜乃慰撫其民各使復業崇吉脫身走崔道固閉門拒魏沈文秀遣使迎降於魏請兵援接白曜欲遣兵赴之酈範曰文秀室家墳墓皆在江南擁兵數萬城固甲堅彊則拒戰屈則遁去我師未逼其城無朝夕之急何所畏忌而遽求援軍且觀其使者視下而色愧語煩而志怯此必挾詐以誘我不可從也不若先取歷城克盤陽下梁鄒平樂陵然後案兵徐進不患其不服也白曜曰崔道固等兵力單弱不敢出戰吾通行無礙直抵東陽彼自知必亡故望風求服夫又何疑範曰歷城兵多糧足非朝夕可拔文秀坐據東陽為諸城根本今多遣兵則無以攻歷城少遣兵則不足以制東陽若進為文秀所拒退為諸城所邀腹背受敵必無全理願更審計無墮賊彀中白曜乃止文秀果不降魏尉元上表稱彭城賊之要藩不有重兵積粟則不可固守若資儲既廣雖劉彧師徒悉起不敢窺淮北之地又言若賊向彭城必由清泗過宿豫歷下邳趨青州亦由下邳沂水經東安此數者皆為賊用師之要今若先定下邳平宿豫鎮淮陽戍東安則青冀諸鎮可不攻而克若四城不服青冀雖拔百姓狼顧猶懷僥幸之心臣愚以為宜釋青冀之師先定東南之地斷劉彧北顧之意絶愚民南望之心夏木雖盛無津途可由冬路雖通無髙城可固如此則淮北自舉暫勞永逸兵貴神速久則生變若天雨既降彼或因水通運糧益衆規為進取恐近淮之民翻然改圖青冀二州猝未可拔也五月沈攸之自送運米至下邳魏人遣清泗閒人詐攸之云薛安都欲降求軍迎接軍副吳喜請遣千人赴之攸之不許既而來者益多喜固請不已攸之乃集來者告之曰君諸人既有誠心若能與薛徐州子弟俱來者皆即假君以本鄉縣唯意所欲如其不爾無為空勞往還自是一去不返攸之使軍主彭城陳顯達將千人助戍下邳而還薛安都子伯令亡命梁雍之間聚黨數千人攻陷郡縣秋七月雍州刺史巴陵王休若遣南陽太守張敬兒等擊斬之上復遣中領軍沈攸之等擊彭城攸之以為清泗方涸糧運不繼固執以為不可使者七返上怒彊遣之八月壬寅以攸之行南兖州刺史將兵比出使行徐州事蕭道成將千人鎮淮隂魏之入彭城也垣崇祖將部曲奔朐山據之遣使來降蕭道成以為朐山戍主朐山濵海孤絶人情未安崇祖浮舟水側欲有急則逃入海魏東徐州刺史成固公戍圂城崇祖部將有罪亡降魏成固公遣步騎二萬襲朐山去城二十里崇祖方出送客城中人驚懼皆下船欲去崇祖還謂腹心曰虜非有宿謀承叛者之言而來耳易誑也今得百餘人還事必濟矣但人情一駭不可斂集卿等可亟去此二里外大呼而來云艾塘義人已得破虜須戍軍速往相助逐之舟中人果喜爭上岸崇祖引入據城遣羸弱入島持兩炬火登山鼓譟魏參騎以為軍備甚盛乃退上以崇祖為北琅邪蘭陵二郡太守垣榮祖亦自彭城奔朐山以奉使不效畏罪不敢出往依蕭道成於淮隂魏尉元遣孔伯恭帥步騎一萬拒沈攸之又以攸之前敗所喪士卒瘃墮膝行者悉還攸之以沮其氣上尋悔遣攸之等復召使還攸之至焦墟去下邳五十餘里陳顯逹引兵迎攸之至㫿清口伯恭擊破之攸之引兵退伯恭追擊之攸之大敗龍驤將軍姜彥之等戰沒攸之創重入保顯達營丁酉夜衆潰攸之輕騎南走委棄軍資器械以萬計還屯淮隂尉元以書諭徐州刺史王玄載玄載棄下邳走魏以隴西辛紹先為下邳太守紹先不尚苛察務舉大綱教民治生禦冦而已由是下邳安之孔伯恭進攻宿豫宿豫戍將魯僧遵亦棄城走魏將孔太恆等將千騎南攻淮陽淮陽太守崔武仲焚城走慕容白曜進屯瑕丘崔道固之未降也綏邉將軍房法夀為王玄邈司馬屢破道固軍歷城人畏之及道固降皆罷兵道固畏法夀扇動百姓迫遣法夀使還建康㑹從弟崇吉自升城來以母妻為魏所獲謀於法夀法夀雅不欲南行怨道固迫之時道固遣兼治中房靈賔督清河廣川二郡事戍磐陽法夀乃與崇吉謀襲磐陽據之降於慕容白曜以贖崇吉母妻道固遣兵攻之白曜自瑕丘遣將軍長孫觀救磐陽道固兵退白曜表冠軍將軍韓麒麟與法夀對為冀州刺史以法夀從弟靈民思順靈恱伯憐伯玉叔玉思安幼安等八人皆為郡守白曜自瑕丘引兵攻崔道固於歷城遣平東將軍長孫陵等攻沈文秀於東陽道固拒守不降白曜築長圍守之陵等至東陽文秀請降陵等入其西郭縱士卒㬥掠文秀悔怒閉城拒守擊陵等破之陵等退屯清西屢進攻城不克冬十一月乙卯分徐州置東徐州以輔國將軍張讜為刺史十二月庚戌以幽州刺史劉休賔為兖州刺史休賔之妻崔邪利之女也生子文曄與邪利皆沒於魏慕容白曜將其妻子至梁鄒城下示之休賔密遣主簿尹文達至歷城見白曜且視其妻子休賔欲降而兄子聞慰不可白曜使人至城下呼曰劉休賔數遣人來見僕射約降何故違期不至由是城中皆知之共禁制休賔不得降魏兵圍之魏西河公石復攻汝隂汝隂有備無功而還常珍竒雖降於魏實懷二心劉勔復以書招之㑹西河公石攻汝隂珍竒乘虛燒劫懸瓠驅掠上蔡安成平輿三縣民屯於灌水四年春正月魏汝陽司馬趙懷仁帥衆冦武津豫州刺史劉勔遣龍驤將軍申元德擊破之又斬魏于都公閼于拔於汝陽臺東獲運車千三百乘魏復冦義陽勔使司徒參軍孫臺瓘擊破之淮西民賈元友上書陳伐魏取陳蔡之策上以其書示劉勔勔上言元友稱虜主幼弱內外多難天亡有期臣以為虜自去冬蹈藉王土磐據數郡百姓殘亡今春以來連城圍逼國家未能復境何暇滅虜元友所陳率多夸誕狂謀皆非事實言之甚易行之甚難臣竊尋元嘉以來傖荒逺人多干國議負擔歸闕皆勸討虜從來信納皆貽後悔境上之人唯視彊弱王師至彼必壺漿候塗裁見退軍便抄截蜂起此前後所見明驗非一也上乃止魏尉元遣使說東徐州刺史張讜讜以團城降魏魏以中書侍郎髙閭與讜對為東徐州刺史李璨與畢衆敬對為東兖州刺史元又說兖州刺史王整蘭陵太守桓欣整欣皆降於魏魏以元為開府儀同三司都督徐南北兗三州諸軍事徐州刺史鎮彭城召薛安都畢衆敬入朝至平城魏以上客待之羣從皆封侯賜第宅資給甚厚慕容白曜圍歷城經年二月庚寅拔其東郭癸巳崔道固面縛出降白曜遣道固之子景業與劉文曄同至梁鄒劉休賔亦出降白曜送道固休賔及其僚屬於平城辛丑以前龍驤將軍常珍竒為都督司北豫二州諸軍事司州刺史魏西河公石攻之珍竒單騎奔夀陽三月魏慕容白曜進圍東陽上以崔道固兄子僧祐為輔國將軍將兵數千從海道救歷城至其不聞歷城已沒遂降於魏夏四月劉勔敗魏兵於許昌秋七月上以沈文秀之弟征北中兵參軍文靜為輔國將軍統髙密等五郡軍事自海道救東陽至不其城為魏所斷因保城自固魏人攻之不克辛卯分青州置東青州以文靜為刺史冬十月發諸州兵北伐十二月魏人拔不其城殺沈文靜入東陽西郭五年沈文秀守東陽魏人圍之三年外無救援士卒晝夜拒戰甲胄生蟣蝨無離叛之志春正月乙丑魏人拔東陽文秀解戎服正衣冠取所持節坐齊內魏兵交至問沈文秀何在文秀厲聲曰身是魏人執之去其衣縛送慕容白曜使之拜文秀曰各兩國大臣何拜之有白曜還其衣為之設饌鎖送平城魏主數其罪而宥之待為下客給惡衣疏食既而重其不屈稍嘉禮之拜外都下大夫於是青冀之地盡入於魏矣二月己卯魏以慕容白曜為都督青齊東徐三州諸軍事征南大將軍開府儀同三司青州刺史進爵濟南王自曜撫御有方東人安之魏自天安以來比嵗旱饑重以青徐用兵山東之民疲於賦役顯祖命因民貧富為三等輸租之法等為三品上三品輸平城中輸它州下輸本州又魏舊制常賦之外有雜調十五至是悉罷之由是民稍贍給夏五月魏徙青齊民於平城置升城歷城民望於桑乾立平齊郡以居之自餘悉為奴婢分賜百官魏沙門統曇曜奏平齊户及諸民有能嵗輸榖六十斛入僧曹者即為僧祇戶粟為僧祇粟遇凶嵗賑給饑民又請民犯重罪及官奴以為佛圖户以供諸寺掃灑魏主並許之於是僧祗戶粟及寺户遍於州鎮矣蕭道成篡宋宋明帝泰始三年秋八月以征北司馬行南徐州事蕭道成鎮淮隂道成收養豪俊賔客始盛垣崇祖奔昫山道成以為戍主垣榮祖亦奔昫山往依道成於淮隂劉僧副避魏居海島道成亦召而撫之是年秋七月庚申以蕭道成為南兖州刺史先是中書侍郎舍人皆以名流為之太祖始用寒士秋當世祖猶雜選士庶巢尚之戴法興皆用事及上即位盡用左右細人游擊將軍阮佃夫中書通事舍人王道隆員外散騎侍郎楊運長等並參預政事權亞人主巢戴所不及也佃夫尤恣橫人有順忤禍福立至大納貨賂所餉减二百匹絹則不報書園宅飲饌過於諸王妓樂服飾宫掖不如也朝士貴賤莫不自結僕隸皆不次除官捉車人至虎賁中郎將馬士至員外郎六年南兖州刺史蕭道成在軍中久民間或言道成有異相當為天子上疑之徴為黃門侍郎越騎校尉道成懼不欲內遷而無計得留冠軍參軍廣陵荀伯玉勸道成遣數十騎入魏境安置標榜魏果遣逰騎數百履行境上道成以聞上使道成復本任秋九月命道成遷鎮淮隂七年初上為諸王寬和有令譽獨為世祖所親即位之初義嘉之黨多䝉全宥隨才引用有如舊臣及晚年更猜忌忍虐好鬼神多忌諱言語文書有禍敗凶喪及疑似之言應回避者數百千品有則必加罪戮改騧字為􅚷以其似禍字故也左右上意往往有刳斫者時淮泗用兵府藏空竭內外百官並斷俸祿而上奢費過度每所造器用必為正御副御次副各三十枚嬖幸用事貨賂公行上素無子密取諸王姬有孕者內宫中生男則殺其母使寵姬子之至是寢疾以太子幼弱深忌諸弟南徐州刺史晉平刺王休祐前鎮江陵貪虐無度上不使之鎮留之建康遣上佐行府州事休祐性剛很前後忤上非一上積不能平且慮將來難制欲方便除之春二月甲寅休祐從上於巖山射雉左右從者並在仗後日欲暗上遣左右壽寂之等數人逼休祐令墜馬因共毆拉殺之傳呼驃騎落馬上陽驚遣御醫絡驛就視比其左右至休祐已絶去車輪輿還第追贈司空葬之如禮建康民間訛言荆州刺史巴陵王休若有至貴之相上以此言報之休若憂懼戊午以休若代休祐為南徐州刺史休若腹心將佐皆謂休若還朝必不免禍中兵參軍京兆王敬先說休若曰今主上彌留政成省閣羣豎恟恟欲悉去宗支以便其私殿下聲著海內受詔入朝必往而不返荆州帶甲十餘萬地方數千里上可以匡天子除姦臣下可以保境土至一身孰與賜劒邸第使臣妾飲泣而不敢葬乎休若素謹畏僞許之敬先出使人執之以白於上而誅之晉平刺王既死建安王休仁益不自安上與嬖臣楊運長等為身後之計運長等亦慮上晏駕後休仁秉政已輩不得専權彌贊成之上疾嘗㬥甚內外莫不屬意於休仁主書以下皆往東府訪休仁所親信豫自結納其或在直不得出者皆恐懼上聞愈惡之五月戊午召休仁入見既而謂曰今夕停尚書下省宿明可早來其夜遣人齎藥賜死休仁罵曰上得天下誰之力邪孝武以誅鉏兄弟子孫滅絶今復為爾宋祚其得久乎上慮有變力疾乘輿出端門休仁死乃入下詔稱休仁規結禁兵謀為亂逆朕未忍明法申詔詰厲休仁慙恩懼罪遽自引决可宥其二子降為始安縣王聽其子伯融襲封上慮人情不恱乃與諸大臣及方鎮詔稱休仁與休祐深相親結語休祐云汝但作佞此法自足安身我從來頗得此力休祐之隕本欲為民除患而休仁從此日生嬈懼吾每呼令入省便入辭楊太妃吾春中多與之射雉或隂雨不出休仁輒語左右云我已復得今一日休仁既經南討與宿衛將帥經習狎共事吾前者積日失適休仁出入殿省無不和顔厚相撫勞如其意趣人莫能測事不獲已反覆思惟不得不有近日處分恐當不必即解故相報知上與休仁素厚雖殺之每謂人曰我與建安年時相鄰少便款狎景和泰始之間勳誠實重事計交切不得不相除痛念之至不能自已因流涕不自勝初上在藩與褚淵以風素相善及即位深相委仗上寢疾淵為吳郡太守急召之既至入見上流涕曰吾近危篤故召卿欲使著黃􅘼耳黃􅘼者乳母服也上與淵謀誅建安王休仁淵以為不可上怒曰卿癡人不足與計事淵懼而從命復以淵為吏部尚書庚午以尚書右僕射袁粲為尚書令褚淵為左僕射丙戌追廢晉平王休祐為庶人巴陵王休若至京口聞建安王死益懼上以休若和厚能諧緝物情恐將來傾奪幼主欲遣使殺之慮不奉詔欲徴入朝又恐猜駭六月丁酉以江州刺史桂陽王休範為南徐州刺史以休若為江州刺史手書殷勤召休若使赴七月七日宴秋七月巴陵哀王休若至建康乙丑賜死於第贈侍中司空復以桂陽王休範為江州刺史時上諸弟俱盡唯休範以人才凡劣不為上所忌故得全沈約論曰聖人立法垂制所以必稱先王蓋由遺訓餘風足以貽之來世也太祖經國之義雖弘隆家之道不足彭城王照不窺古徒見昆弟之義未識君臣之禮冀以家情行之國道主猜而猶犯恩薄而未悟致以呵訓之微行遂成滅親之大禍開端樹隙垂之後人太宗因易隙之情據已行之典翦落洪枝不待顧慮既而本根無庇幼主孤立神器以勢弱傾移靈命隨樂推回改斯蓋履霜有漸堅氷自至所由來逺矣裴子野論曰夫噬虎之獸知愛己子搏狸之鳥非護異巢太宗保字螟蛉剿拉同氣既迷在原之天屬未識父子之自然宋德告終非天廢也夫危亡之君未嘗不先棄本枝嫗煦旁孽推誠嬖狎疾惡父兄前乘覆車後來并轡借使叔仲有國猶不失配天而它人入室將七廟絶祀曾是莫懷甘心揃落晉武背文明之託而覆中州者賈后太祖棄初寧之誓而登合殿者元凶禍福無門奚其豫擇友于兄弟不亦安乎或譛蕭道成在淮隂有二心於魏上封銀壺酒使吳喜自持賜道成道成懼欲逃喜以情告道成且先為之飲道成即飲之喜還朝保證道成或密以啓上上以喜多計數素得人情恐其不能事幼主乃召喜入內殿與共言謔甚𣢾既出賜以名饌尋賜死戊寅以淮隂為北兖州徴蕭道成入朝道成所親以朝廷方誅大臣勸勿就徴道成曰諸卿殊不見事主上自以太子稚弱翦除諸弟何預它人今唯應速發淹留顧望必將見疑且骨肉相殘自非靈長之祚禍難將興方與卿等勠力耳既至拜散騎常侍太子左衛率泰豫元年夏四月己亥上大漸以江州刺史桂陽王休範為司空又以尚書右僕射禇淵為護軍將軍加中領軍劉勔右僕射詔淵勔與尚書令袁粲荆州刺史蔡興宗郢州刺史沈攸之並受顧命禇淵素與蕭道成善引薦於上詔又以道成為右衛將軍領衛尉與袁粲等共掌機事是夕上殂庚子太子即皇帝位大赦時蒼梧王方十嵗袁粲禇淵秉政承太宗奢侈之後務弘節儉欲救其弊而阮佃夫王道隆等用事貨賂公行不能禁也冬十一月中書通事舍人阮佃夫加給事中輔國將軍權任轉重欲用其所親吳郡張淡為武陵郡袁粲等皆不同佃夫稱敕施行粲等不敢執蒼梧王元徽元年桂陽王休範素凡訥少知解不為諸兄所齒遇物情亦不向之故太宗之末得免於禍及帝即位年在冲幼素族秉政近習用權休範自謂尊親莫二應入為宰輔既不如志怨憤頗甚典籖新蔡許公輿為之謀主令休範折節下士厚相資給於是逺近赴之嵗中萬計收養勇士繕治器械朝廷知其有異志亦隂為之備㑹夏口闕鎮朝廷以其地居尋陽上流欲使腹心居之二月乙亥以晉熙王燮為郢州刺史燮始四嵗以黃門郎王奐為長史行府州事配以資力使鎮夏口復恐其過尋陽為休範所劫留使自太洑徑去休範聞之大怒密與許公輿謀襲建康表治城湟多解材板而蓄之奐景文之兄子也二年夏五月壬午桂陽王休範反掠民船使軍隊稱力請受付以材板合手裝治數日即辦丙戌休範帥衆二萬騎五百發尋陽晝夜取道以書與諸執政稱楊運長王道隆蠱惑先帝使建安巴陵二王無罪被戮望執録二豎以謝寃魂庚寅大雷戍主杜道欣馳下告變朝廷惶駭護軍禇淵征北將軍張永領軍劉勔僕射劉乘右衛將軍蕭道成游擊將軍戴明寶驍騎將軍阮佃夫右軍將軍王道隆中書舍人孫千齡員外郎楊運長集中書省計事莫有言者道成曰昔上流謀逆皆因淹緩至敗休範必逺懲前失輕兵急下乘我無備今應變之術不宜逺出若偏師失律則大沮衆心宜頓新亭白下堅守宫城東府石頭以待賊至千里孤軍後無委積求戰不得自然瓦解我請頓新亭以當其鋒征北守白下領軍屯宣陽門為諸軍節度諸貴安坐殿中不須競出我自破賊必矣因索筆下議衆並注同孫千齡隂與休範通謀獨曰宜依舊遣軍據梁山道成正色曰賊今已近梁山豈可得至新亭既是兵衝所欲以死報國耳常時乃可屈曲相從今不得也坐起道成顧謂劉勔曰領軍已同鄙議不可改易袁粲聞難扶曵入殿即日內外戒嚴道成將前鋒兵出屯新亭張永屯白下前南兖州刺史沈懷古戍石頭袁粲禇淵入衛殿省時倉猝不暇授甲開南北二武庫隨將士意所取蕭道成至新亭治城壘未畢辛卯休範前軍已至新林道成方解衣髙卧以安衆心徐索白虎幡登西垣使寧朔將軍髙道慶羽林監陳顯達員外郎王敬則帥舟師與休範戰頗有殺獲壬辰休範自新林捨舟步上其將丁文豪請休範直攻臺城休範遣文豪别將兵趣臺城自以大衆攻新亭壘道成帥將士悉力拒戰自已至午外勢愈盛衆皆失色道成曰賊雖多而亂尋當破矣休範白服乘肩輿自登城南臨滄觀以數十人自衛屯騎校尉黃回與越騎校尉張敬兒謀詐降以取之回謂敬兒曰卿可取之我誓不殺諸王敬兒以白道成道成曰卿能辦事當以本州相賞乃與回出城南放仗走大呼稱降休範喜召至輿側回陽致道成密意休範信之以二子德宣德嗣付道成為質二子至道成即斬之休範致回敬兒於左右所親李恆鍾爽諫不聽時休範日飲醇酒回見休範無備目敬兒敬兒奪休範防身刃斬休範首左右皆散走敬兒馳馬持首歸新亭道成遣隊主陳靈寶送休範首還臺靈寶道逢休範兵棄首於水挺身得達唱云已平而無以為驗衆莫之信休範將士亦不之知其將杜黑騾攻新亭甚急蕭道成在射堂司空主簿蕭惠朗帥敢死士數十人突入東門至射堂下道成上馬帥麾下搏戰惠朗乃退道成復得保城惠朗惠開之弟也其姊為休範妃惠朗兄黃門郎惠明時為道成軍副在城內了不自疑道成與黑騾拒戰自晡達旦矢石不息其夜大雨鼓叫不復相聞將士積日不得寢食軍中馬夜驚城內亂走道成秉燭正坐厲聲呵之如是者數四丁文豪破臺軍於皂莢橋直至朱雀桁南杜黑騾亦捨新亭北趣朱雀桁右軍將軍王道隆將羽林精兵在朱雀門內急召鄱陽忠昭公劉勔於石頭勔至命撤桁以折南軍之勢道隆怒曰賊至但當急擊寧言開桁自弱邪勔不敢復言道隆趣勔進戰勔度桁南戰敗而死黑騾等乘勝度淮道隆棄衆走還臺黑騾兵追殺之黃門侍郎王藴重傷踣於御溝之側或扶之以免藴景文之兄子也於是中外大震道路皆云臺城已陷白下石頭之衆皆潰張永沈懷明逃還宫中傳新亭亦陷太后執帝手泣曰天下敗矣先是月犯右執法太白犯上將或勸劉勔解職勔曰吾執心行已無愧幽明若災眚必至避豈得免勔晚年頗慕髙尚立園宅名為東山遺落世務罷遣部曲蕭道成謂勔曰將軍受顧命輔幼主當此艱難之日而深尚從容廢省羽翼一朝事至悔可追乎勔不從而敗甲午撫軍長史禇澄開東府門納南軍擁安成王準據東府稱桂陽王教曰安成王吾子也勿得侵犯澄淵之弟也杜黑騾徑進至杜姥宅中書舍人孫千齡開承明門出降宫省恇擾時府藏已竭皇太后太妃剔取宫中金銀器物以充賞衆莫有鬬志俄而丁文豪之衆知休範已死稍欲退散文豪厲聲曰我獨不能定天下邪許公輿詐稱桂陽王在新亭士民惶惑詣蕭道成壘投刺者以千數道成得皆焚之登北城謂曰劉休範父子昨已就戮尸在南岡下身是蕭平南諸君諦視之名刺皆已焚勿憂懼也道成遣陳顯達張敬兒及輔師將軍任農夫馬軍主東平周盤龍等將兵自石頭濟淮從承明門入衛宫省袁粲慷慨謂諸將曰今冦賊已逼而衆情離沮孤子受先帝付託不能綏靖國家請與諸君同死社稷被甲上馬將驅之於是陳顯達等引兵出戰大破杜黑騾於杜姥宅飛矢貫顯達目丙申張敬兒等又破黑騾等於宣陽門斬黑騾及丁文豪進克東府餘黨悉平蕭道成振旅還建康百姓緣道聚觀曰全國家者此公也道成與袁粲禇淵劉秉皆上表引咎解職不許丁酉解嚴大赦六月庚子以平南將軍蕭道成為中領軍南兖州刺史留衛建康與袁粲禇淵劉秉更日入直决事號為四貴桂陽王休範之反也使道士陳公昭作天公書題云沈丞相付荆州刺史沈攸之門者攸之不開視推得公昭送之朝廷及休範反攸之謂僚佐曰桂陽必聲言我與之同若不顛沛勤王必增朝野之惑乃與南徐州刺史建平王景素郢州刺史晉熙王燮湘州刺史王僧䖍雍州刺史張興世同舉兵討休範休範留中兵參軍毛惠連等守尋陽燮遣中兵參軍馮景祖襲之癸卯惠連等開門請降殺休範二子諸鎮皆罷兵三年冬十二月南徐州刺史建平王景素孝友清令服用儉素又好文學禮接士大夫由是有美譽太宗特愛之異其禮秩時太祖諸子俱盡諸孫唯景素為長帝凶狂失德朝野皆屬意於景素帝外家陳氏深惡之楊運長阮佃夫等欲専權勢不利立長君亦欲除之其腹心將佐多勸景素舉兵鎮軍參軍濟陽江淹獨諌之景素不恱是嵗防閣將軍王季符得罪於景素單騎亡奔建康告景素謀反運長等即欲發兵討之袁粲蕭道成以為不可景素亦遣世子延齡詣闕自陳乃徙季符於梁州奪景素征北將軍開府儀同三司四年夏六月乙亥加蕭道成尚書左僕射楊運長阮佃夫等忌建平王景素益甚景素乃與録事參軍陳郡殷瀰中兵參軍略陽垣慶延參軍沈顒左暄等謀為自全之計遣人往來建康要結才力之士冠軍將軍黃回游擊將軍髙道慶輔國將軍曹欣之前軍將軍韓道清長水校尉郭蘭之羽林監垣祗祖皆隂與通謀武人不得志者無不歸之時帝好獨出逰走郊野欣之謀據石頭城伺帝出作亂道清蘭之欲說蕭道成因帝夜出執帝迎景素道成不從者即圖之景素每禁使緩之楊阮微聞其事遣傖人周天賜僞投景素勸令舉兵景素知之斬天賜首送臺秋七月祗祖帥數百人自建康奔京口云京師已潰亂勸令速入景素信之戊子據京口起兵士民赴之者以千數楊阮聞祗祖叛走即命纂嚴己丑遣驍騎將軍任農夫領軍將軍黃回左軍將軍蘭陵李安民將步軍右軍將軍張保將水軍以討之辛卯又命南豫州刺史假佛榮為都統蕭道成知黃回有異志故使安民佛榮與之偕行回私戒其士卒道逢京口兵勿得戰道成屯玄武湖冠軍將軍蕭賾鎮東府始安王伯融都鄉侯伯猷皆建安王休仁之子也楊阮忌其年長悉稱詔賜死景素欲斷竹里以拒臺軍垣慶延垣祗祖沈顒皆曰今天時旱熱臺軍逺來疲困引之使至以逸待勞可一戰而克殷濔等固爭不能得農夫等既至縱火燒市邑慶延等各相顧望莫有鬬志景素本乏威略恇擾不知所為黃回迫於假佛榮且見京口軍弱遂不發張保泊西渚景素左右勇士數十人自相要結進擊水軍甲午張保敗死而諸將不相應赴復為臺軍所破臺軍既薄城下顒先帥衆走祗祖次之其餘諸軍相繼奔退獨左暄與臺軍力戰於萬嵗樓下而所配兵力甚弱不能敵而散乙未拔京口黃回軍先入自以有誓不殺諸王乃以景素讓殿中將軍張倪奴倪奴擒景素斬之并其三子同黨垣祗祖等數十人皆伏誅蕭道成釋黃回髙道慶不問撫之如舊是日解嚴丙申大赦八月庚午以給事黃門侍郎阮佃夫為南豫州刺史留鎮京師順帝升明元年初蒼梧王在東宫好緣漆帳竿去地丈餘喜怒乖節主帥不能禁太宗屢敕陳太妃痛捶之及即帝位內畏太后太妃外憚諸大臣未敢縱逸自加元服內外稍無以制數出逰行始出宫猶整儀衛俄而棄車騎帥左右數人或出郊野或入市㕓太妃每乘青犢車隨相檢攝既而輕騎逺走一二十里太妃不復能追儀衛亦懼禍不敢追尋唯整部伍别在一處瞻望而已初太宗嘗以陳太妃賜嬖人李道兒已復迎還生帝故帝每微行自稱劉統或稱李將軍常著小袴衫營署巷陌無不貫穿或夜宿客舍或晝卧道傍排突厮養與之交易或遭慢辱恱而受之凡諸鄙事裁衣作帽過目則能未嘗吹箎執管便韻及京口既平驕恣尤甚無日不出夕去晨返晨出暮歸從者並執鋋矛行人男女及犬馬牛驢逢無免者民間擾懼商販皆息門户晝閉行人殆絶針椎鑿鋸不離左右小有忤意即加屠剖一日不殺則慘然不樂殿省憂惶食息不保阮佃夫與直閣將軍申伯宗等謀因帝出江乘射雉稱太后令喚隊仗還閉城門遣人執帝廢之立安成王凖事覺甲戌帝收佃夫等殺之太后數訓戒帝帝不恱㑹端午太后賜帝毛扇帝嫌其不華令太醫煮藥欲鴆太后左右止之曰若行此事官便應作孝子豈復得出入狡獪帝曰汝語大有理乃止六月甲戌有告散騎常侍杜幼文司徒左長史沈勃游擊將軍孫超之與阮佃夫同謀者帝登帥衛士自掩三家悉誅之刳解臠割嬰孩不免沈勃時居喪在廬左右未至帝揮刀獨前勃知不免手搏帝耳唾罵之曰汝罪踰桀紂屠戮無日遂死是日大赦帝嘗直入領軍府時盛熱蕭道成晝卧裸袒帝立道成於室內畫腹為的自引滿將射之道成斂板曰老臣無罪左右王天恩曰領軍腹大是佳射堋一箭便死後無復射不如以骲箭射之帝乃更以骲箭射正中其齊投弓大笑曰此手何如帝忌道成威名嘗自磨鋋曰明日殺蕭道成陳太妃罵之曰蕭道成有功於國若害之誰復為汝盡力邪帝乃止道成憂懼密與袁粲禇淵謀廢立粲曰主上幼年微過易改伊霍之事非季世所行縱使功成亦終無全地淵默然領軍功曹丹陽紀僧真言於道成曰今朝廷猖狂人不自保天下之望不在袁禇明公豈得坐受夷滅存亡之機仰希熟慮道成然之或勸道成奔廣陵起兵道成世子賾時為晉熙王長史行郢州事欲使賾將郢州兵東下㑹京口道成密遣所親劉僧副告其從兄行青冀二州刺史劉善明曰人多見勸北固廣陵恐未為長算今秋風行起卿若能與垣東海微共動虜則我諸計可立亦告東海太守垣榮祖善明曰宋氏將亡愚智共知北虜若動反為公患公神武髙世唯當靜以待之因機奮發功業自定不可逺去根本自貽猖蹶榮祖亦曰領府去臺百步公走人豈不知若單騎輕行廣陵人閉門不受公欲何之公今動足下牀恐即有扣臺門者公事去矣紀僧真曰主上雖無道國家纍世之基猶為安固公百口北度必不得俱縱得廣陵城天子居深宫施號令目公為逆何以避之此非萬全䇿也道成族弟鎮軍長史順之及次子驃騎從事中郎嶷皆以為帝好單行道路於此立計易以成功外州起兵鮮有克捷徒先人受禍耳道成乃止東中郎司馬行㑹稽郡事李安民欲奉江夏王躋起兵於東方道成止之越騎校尉王敬則潜自結於道成夜著青衣扶匐道路為道成聽察帝之往來道成命敬則隂結帝左右楊玉夫楊萬年陳奉伯等二十五人於殿中詗伺機便秋七月丁亥夜帝微行至領軍府門左右曰一府皆眠何不緣牆入帝曰我今夕欲於一處作適宜待明夕員外郎桓康等於道成門閒聽聞之戊子帝乘露車與左右於臺岡賭跳仍往青園尼寺晚至新安寺偷狗就曇度道人煮之飲酒醉還仁夀殿寢楊玉夫常得帝意至是忽憎之見輒切齒曰明日當殺小子取肝肺是夜令王夫伺織女度河曰見當報我不見將殺汝時帝出入無常省內諸閣夜皆不閉廂下畏相逢值無敢出者宿衛並逃避內外莫相禁攝是夕王敬則出外玉夫伺帝熟寢與楊萬年取帝防身刀刎之敕廂下奏伎陳奉伯袖其首依常行法稱敕開承明門出以首與敬則敬則馳詣領軍府叩門大呼蕭道成慮蒼梧王誑之不敢開門敬則於牆上投其首道成洗視乃戎服乘馬而出敬則桓康等皆從入宫至承明門詐為行還敬則恐內人覘見以刀環塞窐孔呼門甚急門開而入他夕蒼梧王每開門門者震懾不敢仰視至是弗之疑道成入殿殿中驚怖既而聞蒼梧王死咸稱萬嵗己丑旦道成戌服出殿庭槐樹下以太后令召袁粲褚淵劉秉入㑹議道成謂秉曰此使君家事何以斷之秉未答道成須髯盡張目光如電秉曰尚書衆事可以見付軍旅處分一委領軍道成次讓袁粲粲亦不敢當王敬則拔白刃在牀側跳躍曰天下事皆應關蕭公敢有開一言者血染敬則刀仍手取白紗帽加道成首令即位曰今日誰敢復動事須及熱道成正色呵之曰卿都自不解粲欲有言敬則叱之乃止禇淵曰非蕭公無以了此手取事授道成道成曰相與不肯我安得辭乃下議備法駕詣東城迎立安成王於是長刀遮粲秉等各失色而去秉出於路逢從弟韞韞開車迎問曰今日之事當歸兄邪秉曰吾等已讓領軍矣韞拊膺曰兄肉中詎有血邪今年族矣是日以太后令數蒼梧王罪惡曰吾密令蕭領軍潜運明略安成王凖宜臨萬國追封昱為蒼梧王儀衛至東府門安成王令門者勿開以待袁司徒粲至王乃入居朝堂壬辰王即皇帝位時年十一改元大赦葬蒼梧王於郊壇西甲午蕭道成出鎮東府丙申以道成為司空録尚書事驃騎大將軍袁粲遷中書監禇淵加開府儀同三司劉秉遷尚書令加中領軍以晉熙王燮為楊州刺史劉秉始謂尚書萬機本以宗室居之則天下無變既而蕭道成兼揔軍國布置心膂與奪自専禇淵素相憑附秉與袁粲閣手仰成矣辛丑以尚書右僕射王僧䖍為僕射丙午以武陵王贊為郢州刺史蕭道成改領南徐州刺史八月癸亥詔袁粲鎮石頭粲性冲靜每有朝命常固辭逼切不得已乃就職至是知蕭道成有不臣之志隂欲圖之即時順命蕭道成固讓司空庚辰以為驃騎大將軍開府儀同三司九月戊申封楊玉夫等二十五人為侯伯子男初沈攸之與蕭道成於大明景和之閒同直殿省深相親善道成女為攸之子中書侍郎文和婦攸之在荆州直閣將軍髙道慶家在華容假還過江陵與攸之爭戲槊馳還建康言攸之反狀已成請以三千人襲之執政皆以為不可道成仍保證其不然楊運長等惡攸之密與道慶謀遣刺客殺攸之不克會蒼梧王遇弒主簿宗儼之功曹臧寅勸攸之因此起兵攸之以其長子元琰在建康為司徒左長史故未發寅凝之之子也時楊運長等已不在內蕭道成遣元琰以蒼梧王刳斫之具示攸之攸之以道成名位素出已下一旦専制朝權心不平謂元琰曰吾寧為王陵死不為賈充生然亦未暇舉兵乃上表稱慶因留元琰雍州刺史張敬兒素與攸之司馬劉攘兵善疑攸之將起事密以問攘兵攘兵無所言寄敬兒馬橙一隻敬兒乃為之備攸之有素書十數行常韜在裲襠角云是明帝與已約誓攸之將舉兵其妾崔氏諌曰官年已老那不為百口計攸之指裲襠角示之且稱太后使至賜攸之燭割之得太后手令云社稷之事一以委公於是勒兵移檄遣使邀張敬兒及豫州刺史劉懷珍梁州刺史梓潼范柏年司州刺史姚道和湘州行事庾佩玉巴陵內史王文和同舉兵敬兒懷珍文和並斬其使馳表以聞文和尋棄州奔夏口柏年道和佩玉皆懷兩端道和後秦髙祖之孫也辛酉攸之遣輔國將軍孫同等相繼東下攸之遺道成書以為少帝昏狂宜與諸公密議共白太后下令廢之奈何交結左右親行弒逆乃至不殯流蟲在户凡在臣下誰不惋駭又移易朝舊布置親黨宫閣管籥悉關家人吾不知子孟孔明遺訓固如此乎足下既有賊宋之心吾寧敢捐包胥之節邪朝廷聞之忷懼十二月丁卯道成入守朝堂命侍中蕭嶷代鎮東府撫軍行參軍蕭映鎮京口映嶷之弟也戊辰內外纂嚴己巳以郢州刺史武陵王贊為荆州刺史庚午以右衛將軍黃回為郢州刺史督前鋒諸軍以討攸之初道成以世子賾為晉熙王燮長史行郢州事修治器械以備攸之及徴燮為楊州以賾為左衛將軍與燮俱下劉懷珍言於道成曰夏口衝要宜得其人道成與賾書曰汝既入朝當須文武兼資與汝意合者委以後事賾乃薦燮司馬柳世隆自代道成以世隆為武隆王􅐌長史行郢州事賾將行謂世隆曰攸之一旦為變焚夏口舟艦沿流而東不可制也若得攸之留攻郢城必未能猝拔君為其內我為其外破之必矣及攸之起兵賾行至尋陽未行朝廷處分衆欲倍道趨建康賾曰尋陽地居中流密邇畿甸若留屯湓口內藩朝廷外援夏首保據形勝控制西南今日㑹此天所置也或以為湓口城小難固左中郎將周山圖曰今據中流為四方勢援不可以小事難之茍衆心齊一江山皆城隍也庚午賾奉燮鎮湓口賾悉以事委山圖山圖斷取行旅船板以造樓櫓立水柵旬日皆辦道成聞之喜曰賾真我子也以賾為西討都督賾啓山圖為軍副時江州刺史邵陵王友鎮尋陽賾以為尋陽城不足固表移友同鎮湓口留江州别駕豫章胡諧之守尋陽湘州刺史王藴遭母喪罷歸王巴陵與沈攸之深相結時攸之未舉兵藴過郢州欲因蕭賾出弔作難據郢城賾知之不出還至東府又欲因蕭道成出弔作難道成又不出藴乃與袁粲劉秉密謀誅道成將帥黃回任候伯孫曇瓘王宜興卜伯興等皆與通謀伯興天與之子也道成初聞攸之事起自往詣粲粲辭不見通直郎袁達謂粲不宜示異同粲曰彼若以主幼時艱與桂陽時不異劫我入臺我何辭以拒之一朝同止欲異得乎道成乃召禇淵與之連席每事必引淵共之時劉韞為領軍將軍入直門下省卜伯興為直閣黃回等諸將皆出屯新亭初禇淵為衛將軍遭母憂去職朝廷敦迫不起粲素有重名自往譬說淵乃從之及粲為尚書令遭母憂淵譬說懇至粲遂不起淵由是恨之及沈攸之事起道成與淵議之淵曰西夏舋難事必無成公當先僃其內耳粲謀既定將以告淵衆謂淵與道成素善不可告粲曰淵與彼雖善豈容大作同異今若不告事定便應除之乃以謀告淵淵即以告道成道成亦先聞其謀遣軍主蘇烈薛淵太原王天生將兵助粲守石頭薛淵固辭道成彊之淵不得已涕泣拜辭道成曰卿近在石頭日夕去來何悲如是且又何辭淵曰不審公能保袁公共為一家否今淵往與之同則負公不同則立受禍何得不悲道成曰所以遣卿正為能盡臨事之宜使我無西顧之憂耳但當弩力無所多言淵安都之從子也道成又以驍騎將軍王敬則為直閣與伯興共揔禁兵粲謀矯太后令使韞伯興帥宿衛兵攻道成於朝堂回等帥所領為應劉秉任候伯等並赴石頭本期壬申夜發秉恇擾不知所為晡後即束裝臨去啜羮寫胸上手振不自禁未暗載婦女盡室奔石頭部曲數百赫奕滿道既至見粲粲驚曰何事遽來今敗矣秉曰得見公萬死何恨孫曇瓘聞之亦奔石頭丹楊丞王遜等走告道成事乃大露遜僧綽之子也道成密使人告王敬則時閣已閉敬則欲開閣出卜伯興嚴兵為僃敬則乃鋸所止屋壁得出至中書省收韞韞已戒嚴列燭自照見敬則猝至驚起迎之曰兄何能夜顧敬則呵之曰小子那敢作賊韞抱敬則敬則拳驅其頰仆地而殺之又殺伯興蘇烈等據倉城拒粲王藴聞秉已走歎曰事不成矣狼狽帥部曲數百向石頭本期開南門時暗夜薛淵據門射之藴謂粲已敗即散走道成遣軍主㑹稽戴僧靜帥數百人向石頭助烈等自倉門得入與之并力攻粲孫曇瓘驍勇善戰臺軍死者百餘人王天生殊死戰故得相持自亥至丑戴僧靜分兵攻府西門焚之粲與秉在城東門見火起欲還赴府秉與二子俁陔踰城走粲下城列燭自照謂其子最曰本知一木不能止大厦之崩但以名義至此耳僧靜乘暗踰城獨進最覺有異人以身衛粲僧靜直前斫之粲謂最曰我不失忠臣汝不失孝子遂父子俱死百姓哀之為之謡曰可憐石頭城寧為袁粲死不作禇淵生劉秉父子走至額檐湖追執斬之任候伯等並乘船赴石頭既至臺軍已集不得入乃馳還黃回嚴兵期詰旦帥所領從御道直向臺門攻道成聞事泄不敢發道成撫之如舊王藴孫曇瓘皆逃竄先捕得藴斬之其餘粲黨皆無所問粲典籖莫嗣祖為粲秉宣通密謀道成召詰之曰袁粲謀反何不啓聞嗣祖曰小人無識但知報恩何敢泄其大事今袁公已死義不求生藴嬖人張承伯藏匿藴道成並赦而用之粲簡淡平素而無經世之才好飲酒善吟諷身居劇任不肯當事主事每往咨決或髙詠對之間居髙卧門無雜賔物情不接故及於敗裴子野論曰袁景倩民望國華受付託之重智不足以除姦權不足以處變蕭條散落危而不扶及九鼎既輕三才將換區區斗城之裏出萬死而不辭蓋蹈匹夫之節而無棟梁之具矣乙亥以尚書僕射王僧䖍為左僕射新除中書令王延之為右僕射度支尚書張岱為吏部尚書吏部尚書王奐為丹楊尹延之裕之孫也劉秉弟遐為吳郡太守司徒右長史張瓌永之子也遭父喪在吳家素豪盛蕭道成使瓌伺間取遐㑹遐召瓌詣府瓌帥部曲十餘人直入齊中執遐斬之郡中莫敢動道成聞之以告瓌從父領軍冲冲曰瓌以百口一擲出手得盧矣道成即以瓌為吳郡太守道成移屯閲武堂猶以重兵付黃回使西上而配以腹心回素與王宜興不協恐宜興反告其謀閏月辛巳因事收宜興斬之諸將皆言回握彊兵必反寧朔將軍桓康請獨往刺之道成曰卿等何疑彼無能為也沈攸之遣中兵參軍孫同等五將以三萬人為前驅司馬劉懷兵等五將以二萬人次之又遣中兵參軍王靈秀等四將分兵出夏口據魯山癸巳攸之至夏口自恃兵彊有驕色以郢城弱小不足攻云欲問訊安西暫泊黃金浦遣人告柳世隆曰被太后令當暫還都卿既相與奉國想得此意世隆曰東下之師久承聲問郢城小鎮自守而已宗儼之勸攸之攻郢城臧寅以為郢城兵雖少而地險攻守勢異非旬日可拔若不時舉挫鋭損威今順流長驅計日可捷既傾根本則郢城豈能自固攸之從其計欲留偏師守郢城自將大衆東下乙未將發柳世隆遣人於西渚挑戰前軍中兵參軍焦度於城樓上肆言罵攸之且穢辱之攸之怒改計攻城令諸軍登岸燒郭邑築長圍晝夜攻戰世隆隨宜拒應攸之不能克道成命吳興太守沈文秀督吳錢唐軍事文秀收攸之弟新安太守登之誅其宗族乙未以後軍將軍楊運長為宣城太守於是太宗嬖臣無在禁省者矣沈約論曰夫人君南面九重奧絶陪奉朝夕義隔卿士階闥之任宜有司存既而恩以狎生信由恩固無可憚之姿有易親之色孝建泰始主威獨運而刑政紏雜理難遍通耳目所寄事歸近習及覘歡愠候慘舒動中主情舉無謬㫖人主謂其身卑位薄以為權不得重曽不知鼠慿社貴狐藉虎威外無逼主之嫌內有専用之效勢傾天下未之或悟及太宗晚運慮經盛衰權幸之徒懾憚宗戚欲使幼主孤立永竊國權構造同異興樹禍隙帝弟宗王相繼屠勦寶祚夙傾實由於此矣辛丑尚書左丞濟陽江謐建議假蕭道成黃銊從之乙巳蕭道成出頓新亭謂驃騎參軍江淹曰天下紛紛君謂何如淹曰成敗在德不在衆寡公雄武有竒略一勝也寬容而仁恕二勝也賢能畢力三勝也民望所歸四勝也奉天子以伐叛逆五勝也彼志鋭而器小一敗也有威而無恩二敗也士卒解體三敗也搢紳不懷四敗也懸兵數千里而無同惡相濟五敗也雖豺狼十萬終為我獲道成笑曰君談過矣南徐州行事劉善明言於道成曰攸之收衆聚騎造舟治械苞藏禍心於今十年性既險躁才非持重而起逆纍旬遲回不進一則暗於兵機二則人情離怨三則有掣肘之患四則天奪其魄本慮其剽勇輕速掩襲未備决於一戰今六師齊奮諸侯同舉此籠中之鳥耳蕭賾問攸之於周山圖山圖曰攸之相與鄰鄉數共征伐頗悉其為人性度險刻士心不附今頓兵堅城之下適以為離散之漸耳二年春正月己酉朔百官戎服入朝沈攸之盡鋭攻郢城柳世隆乘間屢破之蕭賾遣軍主桓敬等八軍據西塞為世隆聲援攸之獲郢府法曹南鄉范雲使送書入城餉武陵王􅐌犢一羫柳世隆魚三十尾皆去其首城中欲殺之雲曰老母弱弟懸命沈氏若違其命禍必及親今日就戮甘心如薺乃赦之攸之遣其將皇甫仲賢向武昌中兵參軍公孫方平向西陽武昌太守臧渙降於攸之西陽太守王育奔湓城方平據西陽豫州刺史劉懷珍遣建寧太守張謨等將萬人擊之辛酉方平敗走平西將軍黃回等軍至西陽泝流而進攸之素失人情但劫以威力初發江陵已有逃者及攻郢城三十餘日不拔逃者稍多攸之日夕乘馬歷營撫慰而去者不息攸之大怒召諸軍主曰我被太后令建義下都大事若克白紗帽共著耳如其不振朝廷自誅我百口不關餘人比軍人叛散皆卿等不以為意我亦不能問叛身自今軍中有叛者軍主任其罪於是一人叛遣人追之亦去不返莫敢發覺咸有異計劉攘兵射書入城請降柳世隆開門納之丁卯夜攘兵燒營而去軍中見火起爭棄甲走將帥不能禁攸之聞之怒銜須咀之收攘兵兄子天賜女壻張平虜斬之向旦攸之帥衆過江至魯山軍遂大散諸將皆走臧寅曰幸其成而棄其敗吾不忍為也乃投水死攸之猶有數十騎自隨宣令軍中曰荆州城中大有錢可相與還取以為資糧郢城未有追軍而散軍畏蠻抄更相聚結可二萬人隨攸之還江陵張敬兒既斬攸之使者即勒兵偵攸之下遂襲江陵攸之使子元琰與兼長史江乂别駕傳宣共守江陵城敬兒至沙橋觀望未進城中夜聞鶴唳謂為軍來又宣開門出走吏民崩潰元琰奔寵洲為人所殺敬兒至江陵誅攸之二子四孫攸之將至江陵百餘里聞城已為敬兒所據士卒隨之者皆散攸之無所歸與其子大和走至華容界皆縊于櫟林己巳村民斬首送江陵敬兒擎之以楯覆以青繖徇諸市郭乃送建康敬兒誅攸之親黨收其財物數十萬皆以入私初倉曹參軍金城邉榮為府録事所辱攸之為榮鞭殺録事及敬兒將至榮為留府司馬或說之使詣敬兒降榮曰受沈公厚恩共如此大事一朝緩急便易本心吾不能也城潰軍士執以見敬兒敬兒曰邉公何不早來榮曰沈公見留守城不忍委去本不祈生何須見問敬兒曰死何難得命斬之榮歡笑而去榮客太山程雍之抱榮曰與邉公周逰不忍見邉公死乞先見殺兵人不得行戮以白敬兒敬兒曰求死甚易何為不許先殺雍之然後及榮軍人莫不垂泣孫同宗儼之等皆伏誅丙子解嚴以侍中柳世隆為尚書右僕射蕭道成還鎮東府丁丑以左衛將軍蕭賾為江州刺史侍中蕭嶷為中領軍二月庚辰以尚書左僕射王僧䖍為尚書令右僕射王延之為左僕射癸未加蕭道成太尉都督南徐等十六州諸軍事以衛將軍禇淵為中書監司空道成表送黃鉞夏四月蕭道成以黃回終為禍亂回有部曲數千人欲遣收恐為亂辛卯召回入東府至停外齊使桓康將數十人數回罪而殺之秋八月乙未以蕭賾為領軍將軍蕭嶷為江州刺史九月蕭道成欲引時賢參贊大業夜召驃騎長史謝朏屏人與語久之朏無言唯二小兒捉燭道成慮朏難之仍取燭遣兒朏又無言道成乃呼左右朏莊之子也太尉右長史王儉知其指它日請間言於道成曰功髙不賞古今非一以公今日位地欲終北面可乎道成正色裁之而神采內和儉因曰儉䝉公殊眄所以吐所難吐何賜拒之深宋氏失德非公豈復寧濟但人情澆薄不能持久公若小復推遷則人望去矣豈唯大業永淪七尺亦不可得保道成曰卿言不無理儉曰公今名位故是經常宰相宜禮絶羣后微示變革當先令禇公知之儉請銜命道成曰我當自往經少日道成自造禇淵款言移晷乃謂曰我夢應得官淵曰今授始爾恐一二年間未容便移且吉夢未必應在旦夕道成還以告儉儉曰禇是未達理耳儉乃唱議加道成太傅假黃鉞使中書舍人虞整作詔道成所親任遐曰此大事應報禇公道成曰禇公不從奈何遐曰彥回惜身保妻子非有竒才異節遐能制之淵果無違異丙午詔進道成假黃鉞大都督中外諸軍事太傅領楊州牧劎履上殿入朝不趨贊拜不名使持節太尉驃騎大將軍録尚書南徐州刺史如故道成固辭殊禮戊申太傅道成以蕭映為南兖州刺史冬十月丁丑以蕭晃為豫州刺史齊髙帝建元元年春正月甲辰以江州刺史蕭嶷為都督荆湘等八州諸軍事荆州刺史太傅道成以謝朏有重名必欲引參佐命以為左長史嘗置酒與論魏晉故事因曰石苞不早勸晉文死方慟哭方之馮異非知機也朏曰晉文世事魏室必將身終北面借使魏依唐虞故事亦當三讓彌髙道成不恱甲寅以朏為侍中更以王儉為左長史丙辰以給事黃門侍郎蕭長懋為雍州刺史二月甲午詔申前命命太傅贊拜不名三月甲辰以太傅為相國揔百揆封十郡為齊公加九錫其驃騎大將軍楊州牧南徐州刺史如故乙巳詔齊國官爵禮儀並倣天朝丙午以世子賾領南豫州刺史楊運長去宣城郡還家齊公遣人殺之凌源令潘智與運長厚善臨川王綽義慶之孫也綽遣腹心陳讃說智曰君先帝舊人身是宗室近屬如此形勢豈得久全若招合內外計多有從者臺城內人常有此心正苦無人建意耳智即以告齊公庚戌誅綽兄弟及其黨與甲寅齊公受䇿命赦其境內以石頭為世子宫一如東宫禇淵引何曾自魏司徒為晉丞相故事求為齊官齊公不許以王儉為齊尚書右僕射領吏部儉時年二十八夏四月壬申朔進齊公爵為王增封十郡甲戌武陵王贊卒非疾也丙戌加齊王殊禮進世子為太子辛卯宋順帝卞詔禪位于齊壬辰帝當臨軒不肯出逃于佛蓋之下王敬則勒兵殿庭以板輿入迎帝太后懼自帥閹人索得之敬則啓譬令出引令升車帝收淚謂敬則曰欲見殺乎敬則曰出居别宫耳官先取司馬家亦如此帝泣而彈指曰願後身世世勿復生天王家宫中皆哭帝拍敬則手曰必無過慮當餉輔國十萬錢是日百僚陪位侍中謝朏在直當解璽綬陽為不知曰有何公事傳詔云解璽綬授齊王朏曰齊自應有侍中乃引枕卧傳詔懼使朏稱疾欲取兼人朏曰我無疾何所道遂朝服步出東掖門仍登車還宅乃以王儉為侍中解璽綬禮畢帝乘畫輪車出東掖門就東邸問今日何不奏鼓吹左右莫有應者右光祿大夫王琨華之從父弟也在晉世已為郎中至是攀車獺尾慟哭曰人以夀為歡老臣以夀為戚既不能先驅螻蟻乃復頻見此事嗚咽不自勝百官雨泣司空兼太保禇淵等奉璽綬帥百官詣齊宫勸進王辭讓未受淵從弟前成安太守照謂淵子賁曰司空今日何在賁曰奉璽綬在齊大司馬門照曰不知汝家司空將一家物與一家亦復何謂甲午王即皇帝位于南郊還宫大赦改元奉宋順帝為汝隂王優崇之禮皆倣宋初築宫丹楊置兵守衛之宋神主遷汝隂廟諸王皆降為公自非宣力齊室餘皆除國獨置南康華容䓑鄉三國以奉劉穆之王弘何無忌之後除國者凡百二十人二臺官僚依任攝職名號不同員限盈長者别更詳議以禇淵為司徒賔客賀者滿座禇照歎曰彥回少立名行何意披猖至此門户不幸乃復有今日之拜使彥回作中書郎而死不當為一名士邪名德不昌乃復有期頥之夀淵固辭不拜奉朝請河東裴顗上表數帝過惡掛冠徑去帝怒殺之太子賾請殺謝朏帝曰殺之遂成其名正應容之度外耳久之因事廢于家帝問為政於前撫軍行參軍沛國劉瓛對曰政在孝經凡宋氏所以亡陛下所以得者皆是也陛下若戒前車之失加之以寬厚雖危可安若循其覆轍雖安必危矣帝歎曰儒者之言可寶萬世夏五月己未或走馬過汝隂王之門衛士恐有為亂者奔入殺王而以疾聞上不罪而賞之辛酉殺宋宗室隂安公燮等無少長皆死前豫州刺史劉澄之遵考之子也與禇淵善淵為之固請曰澄之兄弟不武且於劉宗又踈故遵考之族獨得免丙寅追尊皇考曰宣皇帝皇妣陳氏曰孝皇后丁卯封皇子鈞為衡陽王六月甲子立王太子賾為皇太子皇子嶷為豫章王映為臨川王晃為長沙王曅為武陵王皓為安成王鏘為鄱陽王鑠為桂陽王鑑為廣陵王皇孫長懋為南郡王乙酉葬宋順帝干遂寧陵魏遷洛陽齊武帝永明十一年魏主以平城地寒六月雨雪風沙常起將遷都洛陽恐羣臣不從乃議大舉伐齊欲以脅衆齊於明堂右個使太常卿王諶筮之遇革帝曰湯武革命順乎天而應乎人吉孰大焉羣臣莫敢言尚書任城王澄曰陛下奕葉重光帝有中土今出師以征未服而得湯武革命之象未為全吉也帝厲聲曰繇云大人虎變何言不吉澄曰陛下龍興已久何得今乃虎變帝作色曰社稷我之社稷任城欲沮衆邪澄曰社稷雖為陛下之有臣為社稷之臣安可知危而不言帝久之乃解曰各言其志夫亦何傷既還宫召澄入見逆謂之曰嚮者革卦今當更與卿論之明堂之忿恐人人競言沮我大計故以聲色怖文武耳想識朕意因屏人謂澄曰今日之舉誠為不易但國家興自朔土徙居平城此乃用武之地非可文治今將移風易俗其道誠難朕欲因此遷宅中原卿以為何如澄曰陛下欲卜宅中土以經略四海此周漢之所以興隆也帝曰北人習常戀故必將驚擾奈何澄曰非常之事故非常人之所及陛下斷自聖心彼亦何所能為帝曰任城吾之子房也六月丙戌命作河橋欲以濟師祕書監盧淵上表以為前世承平之主未嘗親御六軍决勝行陳之間豈非勝之不足為武不勝有虧威重乎昔魏武以弊卒一萬破袁紹謝玄以步兵三千摧符秦勝負之變决於須臾不在衆寡也詔報曰承平之主所以不親戎事者或以同軌無敵或以儒劣偷安今謂之同軌則未然比之懦劣則可恥必若王者不當親戎則先王制革輅何所施也魏武之勝蓋由仗順符氏之敗亦由失政豈寡必能勝衆弱必能制彊邪丁未魏主講武命尚書李冲典武選秋九月戊辰魏主濟河庚午至洛陽魏主自發平城至洛陽霖雨不止丙子詔諸軍前發丁丑帝戎服執鞭乘馬而出羣臣稽顙於馬前帝曰廟算已定大軍將進諸公更欲何云尚書李冲等曰今者之舉天下所不願唯陛下欲之臣不知陛下獨行竟何之也臣等有其意而無其辭敢以死請帝大怒曰吾方經營天下期於混一而卿等儒生屢疑大計斧鉞有常卿勿復言䇿馬將出於是安定王休等並殷勤泣諌帝乃諭羣臣曰今者興發不小動而無成何以示後朕世居幽朔欲南遷中土苟不南伐當遷都於此王公以為何如欲遷者左不欲者右安定王休等相帥如右南安王楨進曰成大功者不謀於衆今陛下茍輟南伐之謀遷都洛邑此臣等之願蒼生之幸也羣臣皆呼萬嵗時舊人雖不願內徙而憚於南伐無敢言者遂定遷都之計李冲言於上曰陛下將定鼎洛邑宗廟宫室非可馬上行逰以待之願陛下暫還代都俟羣臣經營畢功然後僃文物鳴和鸞而臨之帝曰朕將巡省州郡至鄴小停春首即還未宜歸北乃遣任城王澄還平城諭留司百官以遷都之事曰今日真所謂革也王其勉之帝以羣臣意多異同謂衛尉卿鎮南將軍于烈曰卿意如何烈曰陛下聖略淵逺非愚淺所測若隱心而言樂遷之與戀舊適中半耳帝曰卿既不唱異即是肯同深感不言之益使還鎮平城曰留臺庶政一以相委冬十月戊寅朔魏主如金墉城徴穆亮使與尚書李冲將作大匠董爾經營洛都己卯如河南城乙酉如豫州癸巳舍于石濟乙未魏解嚴設壇於滑臺城東告行廟以遷都之意大赦起滑臺宫任城王澄至平城衆始聞遷都莫不驚駭澄援引古今徐以曉之衆乃開伏澄還報於滑臺魏主喜曰非任城朕事不成乙巳魏主遣安定王休帥從官迎家於平城魏主築宫於鄴西冬十一月癸亥徙居之明帝建武元年春正月乙亥魏主如洛陽西宫中書侍郎韓顯宗上書陳四事其一以為竊聞輿駕今夏不巡三齊當幸中山往冬輿駕停鄴當農隙之時猶比屋供奉不勝勞費况今蠶麥方急將何以堪命且六軍涉暑恐生癘疫臣願早還北京以省諸州供張之苦成洛都營繕之役其二以為洛陽宫殿故基皆魏明帝所造前世已譏其奢今兹營繕宜加裁損又頃來此都富室競以第舍相尚宜因遷徙為之制度及端廣衢路通利溝渠其三以為陛下之還洛陽輕將從騎王者於闈闥之內猶施警蹕况涉履山河而不加三思乎其四以為陛下耳聽法音目玩墳典口對百辟心虞萬機景昊而食夜分而寢加以孝思之至隨時而深文章之業日成篇卷雖睿明所用未足為煩然非所以嗇神養性保無疆之祚也伏願陛下垂拱司契而天下治矣帝頗納之顯宗麒麟之子也顯宗又上言以為州郡貢察徒有秀孝之名而無秀孝之實朝廷但檢其門望不復彈坐如此則可令别貢門望以叙士人何假冒秀孝之名也夫門望者乃其父祖之遺烈亦何益於皇家益於時者賢才而已茍有其才雖屠釣奴虜聖王不恥以為臣茍非其才雖三后之胤墜於皂隸矣議者或云今世等無竒才不若取士於門此亦失矣豈可以世無周邵遂廢宰相邪但當校其寸長銖重者先叙之則賢才無遺矣又刑罰之要在於明當不在於重茍不失有罪雖捶撻之薄人莫敢犯若容可僥幸雖參夷之嚴不足懲禁今內外之官欲邀當時之名爭以深酷為無私迭相敦厲遂成風俗陛下居九重之內視人如赤子百司分萬務之任遇下如仇讎是則堯舜止一人而桀紂以千百和氣不至蓋由於此謂宜敕示百僚以惠元元之命又昔周居洛邑猶存宗周漢遷東都京兆置尹案春秋之義有宗廟曰都無曰邑况代京宗廟山陵所託王業所基其為神鄉福地實亦逺矣今便同之郡國臣竊不安謂宜建畿置尹一如故事崇本重舊光示萬葉又古者四民異居欲其業専志定也太祖道武皇帝創基撥亂日不暇給然猶分别士庶不令雜居工伎屠沽各有攸處但不設科禁久而混殽今聞洛邑居民之制專以官位相從不分族類夫官位無常朝榮夕悴則是衣冠皂隸不日同處矣借使一里之內或調習歌舞或講肄詩書縱羣兒隨其所之則必不棄歌舞而從詩書矣然則使工伎之家習士人風禮百年難成士人之子效工伎容態一朝而就是以仲尼稱里仁之美孟母勤三徙之訓此乃風俗之原不可不察朝廷每選人士校其一㛰一宦以為升降何其密也至於度地居民則清濁連甍何其略也今因遷徙之初皆是公地分别工伎在於一言有何可疑而闕盛美又南人昔有淮北之地自比中華僑置郡縣自歸附聖化仍而不改名實交錯文書難辨宜依地理舊名一皆釐革小者并合大者分置及中州郡縣昔以户少併省今民口既多亦可復舊又君人者以天下為家不可有所私倉庫之儲以供軍國之用自非有功德者不當加賜在朝諸貴受祿不輕比來頒賚動以千計若分以賜鰥寡孤獨之民所濟實多今直以與親近之臣殆非周急不繼富之謂也帝覽奏甚善之二月壬寅魏主北巡癸卯濟河三月壬申至平城使羣臣更論遷都利害各言其志燕州刺史穆羆曰今四方未定未宜遷都且征伐無馬將何以克帝曰廏牧在代何患無馬今代在恆山之北九州之外非帝王之都也尚書于果曰臣非以代地為勝伊洛之美也但自先帝以來久居於此百姓安之一旦南遷衆情不樂平陽公丕曰遷都大事當訊之卜筮帝曰昔周邵聖賢乃能卜宅今無其人卜之何益且卜以决疑不疑何卜黃帝卜而龜焦天老曰吉黃帝從之然則至人之知未然審於龜矣王者以四海為家或南或北何常之有朕之逺祖世居北荒平文皇帝始都東木根山昭成皇帝更營盛樂道武皇帝遷于平城朕幸屬勝殘之運何為獨不得遷乎羣臣不敢復言羆夀之孫果烈之弟也癸酉魏主臨朝堂部分遷留冬十月戊申魏王親告太廟使髙陽王雍于烈奉遷神主于洛陽辛亥發平城十一月魏主至洛陽欲澄清流品以尚書崔亮兼吏部郎十二月魏主欲變易舊風壬寅詔禁士民胡服國人多不恱通直散騎常侍劉芳纘之族弟也與給事黃門侍郎太原郭祚皆以文學為帝所親禮多引與講論及密議政事大臣貴戚皆以為踈已怏怏有不平之色帝使給事黃門侍郎陸凱私諭之曰至尊但欲廣知古事詢訪前世法式耳終不親彼而相疏也衆意乃稍解戊申詔代民遷洛者復租賦三年二年夏五月魏主欲變北俗引見羣臣謂曰卿等欲朕逺追商周為欲不及漢晉邪咸陽王禧對曰羣臣願陛下度越前王耳帝曰然則當變風易俗當因循守故邪對曰願聖政日新帝曰為止於一身為欲傳之子孫邪對曰願傳之百世帝曰然則必當改作卿等不得違也對曰上令下從其誰敢違帝曰夫名不正言不順則禮樂不可興今欲斷諸北語一從正音其年三十已上習性已久容不可猝革三十已下見在朝廷之人語音不聽仍舊若有故為當加降黜各宜深戒王公卿士以為然不對曰實如聖㫖帝曰朕嘗與李冲論此冲曰四方之語竟知誰是帝者言之即為正矣冲之此言其罪當死因顧冲曰卿負社稷當令御史牽下冲免冠頓首謝又責留守之官曰昨望見婦女猶服夾領小袖卿等何為不遵前詔皆謝罪帝曰朕言非是卿等當庭爭如何入則順㫖退則不從乎六月己亥下詔不得為北俗之語於朝廷違者免所居官戊午魏改用長尺大斗其法依漢士為之秋八月立國子太學四門小學於洛陽九月庚午魏六宫文武悉還于洛陽冬十二月甲子魏王引見羣臣於光極堂頒賜冠服三年春正月魏主下詔以為北人謂土為拓后為跋魏之先出於黃帝以土德王故為拓跋氏夫土者黃中之色黃物之元也宜改姓元氏諸功臣舊族自代來者姓或重復皆改之秋七月魏太子恂不好學體素肥大苦河南地熱常思北歸魏主賜之衣冠恂常私著胡服八月戊戌恂密謀召牧馬輕騎奔平城尚書陸琇啓帝帝引見恂數其罪杖之百餘下囚於城西廢為庶人初魏主南遷洛陽所親任者多中州儒士宗室及代人往往不樂穆泰與陸睿謀作亂帝召任城王澄於凝間堂謂之曰穆泰謀為不軌扇誘宗室脫或必然今遷都甫爾北人戀舊南北紛擾朕洛陽不立也此國家大事非卿不能辦卿雖疾彊為我北行審觀其勢儻其微弱直往擒之若已彊盛可承制發并肆兵擊之對曰泰等愚惑正由戀舊為此計耳非有深謀逺慮臣雖駑怯足以制之願陛下勿憂雖有犬馬之疾何敢辭也帝笑曰任城肯行朕復何憂遂授澄節銅虎竹使符御仗左右仍行恆州事行至鴈門鴈門太守夜告云泰已引兵西就陽平澄遽令進發右丞孟斌曰事未可量宜依敕召并肆兵然後徐進澄曰泰既謀亂應據堅城而更迎陽平度其所為當似勢弱泰既不相拒無故發兵非宜也但速往鎮之民心自定遂倍道兼行先遣治書侍御史李煥單騎入代出其不意曉諭泰黨示以禍福皆莫為之用泰計無所出帥麾下數百人攻煥不克走出城西追擒之澄亦尋至窮治黨與收陸睿等百餘人皆繫獄民閒帖然澄具狀表聞帝喜召公卿以表示之曰任城可謂社稷臣也觀其獄辭正復臯陶何以過之顧謂咸陽王禧等曰汝曹當此不能辦也四年春二月癸酉魏主至平城引見穆泰陸睿之黨問之無一人稱枉者時人皆服任城王澄之明穆泰及其親黨皆伏誅賜陸睿死於獄宥其妻子徙遼西為民初魏主遷都變易舊俗并州刺史新興公丕皆所不樂帝以其宗室耆舊亦不之逼但誘示大理令其不生同異而已及朝臣皆變衣冠朱衣滿坐而丕獨胡服於其閒晚乃稍加冠帶而不能修飾容儀帝亦不彊也太子恂自平城將遷洛陽元隆與穆泰等密謀留恂因舉兵斷關規據陘北丕在并州隆等以其謀告之丕外慮不成口雖折難心頗然之及事覺丕從帝至平城帝每推問泰等常令丕坐觀有司奏元業元隆元超罪當族丕應從坐帝以丕常受詔許以不死聽免死為民留其後妻二子與居于太原殺隆超同産乙升餘子徙敦煌初丕睿與僕射李冲領軍于烈俱受不死之詔睿既誅帝賜冲烈詔曰睿反逆之志自負幽冥違誓在彼不關朕也反逆既異餘犯雖欲矜恕如何可得然猶不忘前言聽自死别府免其孥戮元丕二子一弟首為賊端連坐應死特恕為民朕本期始終而彼自棄絶違心乖念一何可悲故此别示想無致怪謀反之外皎如白日耳沖烈皆上表謝臣光曰夫爵祿廢置殺生豫奪人君所以馭臣之大柄也是故先王之制雖有親故賢能功貴勤賔苟有其罪不直赦也必議於槐棘之下可赦則赦可宥則宥可刑則刑可殺則殺輕重視情寬猛隨時故君得以施恩而不失其威臣得以免罪而不敢目恃及魏則不然勳貴之臣往往豫許之以不死使彼驕而觸罪又從而殺之是以不信之令誘之使陷於死地也刑政之失無此為大焉蕭鸞篡弒齊髙帝建元二年春三月丁酉朔以侍中西昌侯蕭驚為郢州刺史鸞帝兄始安貞王道生之子也早孤為帝所養恩過諸子四年夏六月甲申朔立南郡王長懋為皇太子武帝永明十一年春正月丙子文惠太子長懋卒太子素惡西昌侯鸞嘗謂竟陵王子良曰我意中殊不喜此人不解其故當由其福薄故也子良為之救解及鸞得政太子子孫無遺焉夏四月甲午立南郡王昭業為皇太孫東宫文武悉改為太孫官屬以太子妃琅邪王氏為皇太孫太妃南郡王妃何氏為皇太孫妃妃戢之女也秋七月戊午上不豫詔竟陵王子良甲仗入延昌殿侍醫藥子良以蕭衍范雲等皆為帳內軍主子良日夜在內太孫閒日參承戊寅上疾亟暫絶太孫未入內外惶懼百僚皆已變服中書郎王融欲矯詔立子良詔草已立蕭衍謂范雲曰道路籍籍皆云將有非常之舉王元長非濟世才視其敗也雲曰憂國家者唯有王中書耳衍曰憂國欲為周召欲為豎刁邪雲不敢答及太孫來王融戎服絳衫於中書省閣口斷東宫仗不得進頃之上復蘇問太孫所在因召東宫器甲皆入以朝事委尚書左僕射西昌侯鸞俄而上殂融處分以子良兵禁諸門鸞聞之急馳至雲龍門不得進鸞曰有敕召我排之而入奉太孫登殿命左右扶出子良指麾部署音響如鍾殿中無不從命融知不遂釋服還省歎曰公誤我由是鬱林王深怨之遺詔曰太孫進德日茂社稷有寄子良善相毗輔思弘治道內外衆事無大小悉與鸞參懷共下意鬱林王之未立也衆皆疑立子良口語喧騰武陵王曅於衆中大言曰若立長則應在我立嫡則應在太孫由是帝深憑賴之初西昌侯鸞為太祖所愛鸞性儉素車服儀從同於素士所居官名為嚴能故世祖亦重之世祖遺詔使竟陵王子良輔政鸞知尚書事子良素仁厚不樂世務乃更推鸞故遺詔云事無大小悉與鸞參懷子良之志也帝少養於子良妃袁氏慈愛甚著及王融有謀遂深忌子良大行出太極殿子良居中書省帝使虎賁中郎將潘敞領二百人仗屯太極西階以防之既成服諸王皆出子良乞停至山陵不許壬午稱遺詔以武陵王曅為衛將軍與征南大將軍陳顯達並開府儀同三司尚書左僕射西昌侯鸞為尚書令太孫詹事沈文季為護軍癸未以竟陵王子良為太傅鬱林王性辨慧美容止善應對哀樂過人世祖由是愛之而矯情飾詐隂懷鄙慝與左右羣小共衣食同卧起始為南郡王從竟陵王子良在西州文惠太子每禁其起居節其用度王密就富人求錢無敢不與别作鑰鉤夜開西州後閣與左右至諸營署中淫宴師史仁祖侍書胡天翼相謂曰若言之二宫則其事未易若於營署為異人所毆及犬物所傷豈直罪止一身亦當盡室及禍年各七十餘生寧足吝邪數日閒二人相繼自殺二宫不知也所愛左右皆逆加官爵疏於黃紙使囊盛帶之許南面之日依此施行侍太子疾及居喪憂容號毁見者嗚咽裁還私室即歡笑酣飲常令女巫楊氏禱祀速求天位及太子卒謂由楊氏之力倍加敬信既為太孫世祖有疾又令楊氏禱祀時何妃猶在西州世祖疾稍危太孫與何妃書紙中央作一大喜字而作三十六小喜字繞之侍世祖疾言發淚下世祖以為必能負荷大業謂曰五年中一委宰相汝勿措意五年外勿復委人若自作無成無所多恨臨終執其手曰若憶翁當好作遂殂大斂始畢悉呼世祖諸伎備奏衆樂即位十餘日即收王融下廷尉使中丞孔稚圭奏融險躁輕狡招納不逞誹謗朝政融求援於竟陵王子良子良憂懼不敢救遂於獄賜死明帝建武元年春正月西昌侯鸞將謀廢立引前鎮西咨議參軍蕭衍與同謀荆州刺史隨王子隆性溫和有文才鸞欲徴之恐其不從衍曰隨王雖有美名其實庸劣既無智謀之士爪牙唯仗司馬垣歷生武陵太守卞白龍耳二人唯利是從若啖以顯職無有不來隨王止須折簡耳鸞從之徴歷主為太子左衛率白龍為游擊將軍二人並至續召子隆為侍中撫軍將軍豫州刺史崔慧景髙武舊將鸞疑之以蕭衍為寧朔將軍戍夀陽慧景懼白服出迎衍撫安之帝寵幸中書舍人綦母珍之朱隆之直閣將軍曹道剛周奉叔宦者徐龍駒等珍之所論薦事無不允內外要職皆先論價旬月之閒家纍千金擅取官物及役作不俟詔㫖有司至相語云寧拒至尊敕不可違舍人命帝以龍駒為後閣舍人常居含章殿著黃綸帽被貂裘南面向案代帝畫敕左右侍直與帝不異帝自山陵之後即與左右微服逰走市里好於世宗崇安陵隧中擲塗賭跳作諸鄙戲極意賞賜左右動至百數十萬每見錢曰我昔思汝一枚不得今日得用汝未世祖聚錢上庫五億萬齊庫亦出三億萬金銀布帛不可勝計鬱林王即位未朞嵗所用垂盡入主衣庫令何后及寵姬以諸寶器相投擊破碎之用為笑樂蒸於世祖幸姬霍氏更其姓曰徐朝事大小皆决於西昌侯鸞鸞數諌爭帝多不從心忌鸞欲除之以尚書右僕射鄱陽王鏘為世祖所厚私謂鏘曰公聞鸞於法身如何鏘素和謹對曰臣鸞於宗戚最長且受寄先帝臣等皆年少朝廷所賴唯鸞一人願陛下無以為慮帝退謂徐龍駒曰我欲與公共計取鸞公既不同我不能獨辦且復小聽衛尉蕭諶世祖之族子也自世祖在郢州諶已為腹心及即位常典宿衛機密之事無不預聞征南咨議蕭坦之諶之族人也嘗為東宫直閣為世宗所知帝以二人祖父舊人甚親信之諶每請急出宿帝通夕不寐諶還乃安坦之得出入後宫帝䙝狎宴逰坦之皆在側帝醉後常裸袒坦之輒扶持諌諭西昌侯鸞欲有所諌帝在後宫不出唯遣諶坦之徑進乃得聞達何后亦淫泆私於帝左右楊珉與同寢處如伉儷又與帝相愛狎故帝恣之迎后親戚入宫以耀靈殿處之齊閣通夜洞開外內淆雜無復分别西昌侯鸞遣坦之入奏誅珉何后流涕覆面曰楊郎好年少無罪何可枉殺坦之附耳語帝曰外間並云楊珉與皇后有情事彰遐邇不可不誅帝不得已許之俄敕原之已行刑矣鸞又啓誅徐龍駒帝亦不能違而心忌鸞益甚蕭諶蕭坦之見帝狂縱日甚無復悛改恐禍及已乃更回意附鸞勸其廢立隂為鸞耳目帝不之覺也周奉叔恃勇挾勢陵轢公卿常翼單刀二十口自隨出入禁闥門衛不敢訶每語人曰周郎刀不識君鸞忌之使蕭諶蕭坦之說帝出奉叔為外援己巳以奉叔為青州刺史曹道剛為中軍司馬奉叔就帝求千戶侯許之鸞以為不可封曲江縣男食三百户奉叔大怒於衆中攘刀厲色鸞說諭之乃受奉叔辭畢將之鎮部伍已出鸞與蕭諶稱敕召奉叔於省中驅殺之啓云奉叔慢朝廷帝不獲已可其奏溧陽令錢塘杜文謙嘗為南郡王侍讀前此說綦母珍之曰天下事可知灰盡粉滅匪朝伊夕不早為計吾徒無類矣珍之曰計將安出文謙曰先帝舊人多見擯斥今召而使之誰不慷慨近聞王洪範與宿衛將萬靈㑹等共語皆攘袂捶牀君其密報周奉叔使萬靈㑹等殺蕭諶則宫內之兵皆我用也即勒兵入尚書斬蕭令兩都伯力耳今舉大事亦死不舉事亦死二死等耳死社稷可乎若遲疑不斷復少日録君稱敕賜死父母為殉在眼中矣珍之不能用及鸞殺奉叔并收珍之文謙殺之秋七月西昌侯鸞既誅徐龍駒周奉叔而尼媪外入者頗傳異語中書令何胤以后之從叔為帝所親使直殿省帝與胤謀誅鸞令胤受事胤不敢當依違諌說帝意復止乃謀出鸞於西州中敕用事不復關咨於鸞是時蕭諶蕭坦之握兵權左僕射王晏揔尚書事諶密召諸王典籖約語之不許諸王外接人物諶親要日久衆皆憚而從之鸞以其謀告王晏晏聞之響應又告丹楊尹徐孝嗣孝嗣亦從之驃騎録事南陽樂豫謂孝嗣曰外傳籍籍似有伊周之事君䝉武帝殊常之恩荷託附之重恐不得同人此舉人笑禇公至今齒冷孝嗣心然之而不能從帝謂蕭坦之曰人言鎮軍與王晏蕭諶欲共廢我似非虛傳卿所聞云何坦之曰天下寧當有此誰樂無事廢天子邪朝貴不容造此論當是諸尼姥言耳豈可信邪官若無事除此三人誰敢自保直閣將軍曹道剛疑外閒有異密有處分謀未能發時始興內史蕭季敞南陽太守蕭頴基皆內遷諶欲待二人至藉其勢力以舉事鸞慮事變以告坦之坦之馳謂諶曰廢天子古來大事比聞曹道剛朱隆之等轉已猜疑衛尉明日若不就事無所復及弟有百嵗母豈能坐聽禍敗正應作餘計耳諶惶遽從之壬辰鸞使蕭諶先入言遇曹道剛及中書舍人朱隆之皆殺之直後徐僧亮盛怒大言於衆曰吾等荷恩今日應死報又殺之鸞引兵自尚書入雲龍門戎服加朱衣於上比入門三失履王晏徐孝嗣蕭坦之陳顯達王廣之沈文季皆隨其後帝在夀昌殿聞外有變猶密為手敕呼蕭諶又使閉內殿諸房閣俄而諶引兵入夀昌閣帝走趨徐姬房拔劔自刺不入以帛纒頸輿接出延德殿諶初入殿宿衛將士皆操弓楯欲拒戰諶謂之曰所取自有人卿等不須動宿衛素隸服於諶皆信之及見帝出各欲自奮帝竟無一言行至西弄殺之輿尸出殯徐龍駒宅葬以王禮徐姬及諸嬖幸皆伏誅鸞既弒帝欲作太后令徐孝嗣於袖中出而進之鸞大恱癸巳以太后令追廢帝為鬱林王又廢何后為王妃迎立新安王昭文丁酉新安王即皇帝位時年十五以西昌侯鸞為驃騎大將軍録尚書事揚州刺史宣城郡公大赦改元延興八月以始安王遙光為南郡太守不之官遙光鸞之兄子也鸞有異志遙光贊成之凡大誅賞無不預謀戊申以中書郎蕭遙欣為兖州刺史遙欣遙光之弟也鸞欲樹置親黨故用之鬱林王之廢也鄱陽王鏘初不知謀及宣城公鸞勢益重中外皆知其蓄不臣之志鏘每詣鸞鸞常屣履至車後迎之語及家國言淚俱發鏘以此信之宫臺之內皆屬意於鏘勸鏘入宫發兵輔政制局監謝粲說鏘及隨王子隆曰二王但乘油璧車入宫出天子置朝堂夾輔號令粲等閉城門上仗誰敢不同東城人正共縛送蕭令耳子隆欲定計鏘以上臺兵力既悉度東府且慮事不捷意甚猶豫馬隊主劉巨世祖時舊人詣鏘請間叩頭勸鏘立事鏘命駕將入復還內與母陸太妃别日暮不成行典籖知其謀告之九月癸酉鸞遣兵二千人圍鏘第殺鏘遂殺子隆及謝粲等於時太祖諸子子隆最壯大有才能故鸞尤忌之江州刺史晉安王子懋聞鄱陽隨王死欲起兵謂防閣吳郡陸超之曰事成則宗廟獲安不成猶為義鬼防閣丹陽董僧慧曰此州雖小宋孝武嘗用之若舉兵向闕以請鬱林之罪誰能禦之子懋母阮氏在建康密遣書迎之阮氏報其同母兄于謡之為計謡之馳告宣威公鸞乙亥假鸞黃鉞內外纂嚴遣中護軍王玄邈討子懋又遣軍主裴叔業與于謡之先襲尋陽聲云為郢府司馬子懋知之遣三百人守湓城叔業泝流直上至夜回襲湓城城局參軍樂賁開門納之子懋聞之帥府州兵力據城自守子懋部曲多雍州人皆勇躍願奮叔業畏之遣于謡之說子懋曰今還都必無過憂正當作散官不失富貴也子懋既不出兵攻叔業衆情稍沮中兵參軍于琳之瑶之兄也說子懋重賂叔業可以免禍子懋使琳之往琳之因說叔業取子懋叔業遣軍主徐玄慶將四百人隨琳之入州城僚佐皆奔散琳之從二百人拔白刃入齊子懋罵曰小人何忍行此琳之以袖鄣面使人殺之王玄邈執董僧慧將殺之僧慧曰晉安舉義兵僕實豫其謀得為主人死不恨矣願至大斂畢退就鼎鑊玄邈義之具以白鸞免死配東冶子懋子昭基九嵗以方二寸絹為書參其消息并遺錢五百行金得達僧慧視之曰郎君書也悲慟而卒于琳之勸陸超之逃亡超之曰人皆有死此不足懼吾若逃亡非唯孤晉安之眷亦恐田橫客笑人玄邈等欲囚以還都超之端坐俟命超之門生謂殺超之當得賞密自後斬之頭墜而身不僵玄邈厚加殯斂門生亦助舉棺棺墜壓其首折頸而死鸞遣平西將軍王廣之襲南兖州刺史安陸王子敬廣之至歐陽遣部將濟隂陳伯之先驅伯之因城開獨入斬子敬鸞又遣徐玄慶西上害諸王臨海王昭秀為荆州刺史西中郎長史何昌㝢行州事玄慶至江陵欲以便宜從事昌㝢曰僕受朝廷意寄翼輔外藩殿下未有愆失君以一介之使來何容即以相付邪若朝廷必須殿下當自啓聞更聽後㫖昭秀由是得還建康昌㝢尚之之弟子也鸞以吳興太守孔琇之行郢州事欲使之殺晉熙王銶琇之辭不許遂不食而死琇之靖之孫也裴叔業自尋陽仍進向湘州欲殺湘州刺史南平王鋭防閣周伯玉大言於衆曰此非天子意今斬叔業舉兵匡社稷誰敢不從鋭典籖叱左右斬之乙酉殺鋭又殺郢州刺史晉熙王銶南豫州刺史宜都王鏗冬十月以宣城公鸞為太傅領大將軍楊州牧都督中外諸軍事加殊禮進爵為王宣城王謀繼大統多引朝廷名士與參籌策侍中謝朏心不願乃求出為吳興太守至郡致酒數斛遺其弟吏部尚書瀹為書曰可力飲此勿豫人事臣光曰臣聞衣人之衣者懷人之憂食人之食者死人之事二謝兄弟比肩貴近安享榮祿危不預知為臣如此可謂忠乎宣城王雖専國政人情猶未服王胛上有赤志驃騎咨議參軍考城江祐勸王出以示人王以示晉夀太守王洪範曰人言此是日月相卿幸勿泄洪範曰公日月在軀如何可隱當轉言之王母祏之姑也戊戌殺桂陽王鑠衡陽王鈞江夏王鋒建安王子真巴陵王子倫鑠與鄱陽王鏘齊名鏘好文章鑠好名理時人稱為鄱桂鏘死鑠不自安至東府見宣城王還謂左右曰向録公見接殷勤流連不能已而面有慙色此必欲殺我是夕遇害宣城王每殺諸王常夜遣兵圍其第斬關踰垣呼譟而入家資皆封籍之江夏王鋒有才行宣城王嘗與之言遙光才力可委鋒曰遙光之於殿下猶殿下之於髙皇衛宗廟安社稷實有攸寄宣城王失色及殺諸王鋒遺宣城王書誚責之宣城王深憚之不敢於第收鋒使兼祠官於太廟夜遣兵廟中收之鋒出登車兵人欲上車鋒有力手擊數人皆仆地然後死宣城王遣典籖柯令孫殺建安王子真子真走入牀下令孫手牽出之叩頭乞為奴不許而死又遣中書舍人茹法亮殺巴陵王子倫子倫性英果時為南蘭陵太守鎮琅邪城有守兵宣城王恐不肯就死以問典籖華伯茂伯茂曰公若以兵取之恐不可即辦若委伯茂一夫力耳乃手自執鴆逼之子倫正衣冠出受詔謂法亮曰先朝昔滅劉氏今日之事理數固然君是身家舊人今銜此使當由事不獲已此酒非勸酬之爵因仰之而死時年十六法亮及左右皆流涕初諸王出鎮皆置典籖主帥一方之事悉以委之時入奏事一嵗數返時主輒與之間語訪以州事刺史美惡専繫其口自刺史以下莫不折節奉之恆慮弗及於是威行州部大為姦利武陵王曅為江州性烈直不可干典籖趙渥之謂人曰今出都易刺史及見世祖盛毁之曅遂免還南海王子罕戍琅邪欲暫游東堂典籖姜秀不許子罕還泣謂母曰兒欲移五步亦不得與囚何異邵陵王子貞嘗求熊白厨人答典籖不在不敢與永明中巴東王子響殺劉寅等世祖聞之謂羣臣曰子響遂反戴僧靜大言曰諸王都自應反豈唯巴東上問其故對曰天王無罪而一時被囚取一挺藕一杯漿皆咨籖帥籖帥不在則竟日忍渴諸州唯聞有籖帥不聞有刺史何得不反竟陵王子良嘗問衆曰士大夫何意詣籖帥參軍范雲曰詣長史以下皆無益詣籖帥立有倍本之價不詣謂何子良有愧色及宣城王誅諸王皆令典籖殺之竟無一人能抗拒者孔圭聞之流涕曰齊之衡陽江夏最有意而復害之若不立籖帥故當不至於此宣城王亦深知典籖之弊乃詔自今諸州有急事當密以奏聞勿復遣典籖入都自是典籖之任浸輕矣蕭子顯論曰帝王之子生長富厚朝出閨閫暮司方嶽防驕翦逸積代常典故輔以上佐簡自帝心勞舊左右用為主帥飲食逰居動應聞啓處地雖重行已莫由威不在身恩未下及一朝艱難揔至望其釋位扶危何可得矣斯宋氏之餘風至齊室而尤弊也海陵王在位起居飲食皆咨宣城王而後行嘗思食蒸魚菜太官令答無録公命竟不與辛亥皇太后令曰嗣主冲幼庶政多昧且早嬰尫疾弗克負荷太傅宣城王胤體宣皇鍾慈太祖宜入承寶命帝可降封海陵王吾當歸老别館且以宣城王為太祖第三子癸亥髙宗即皇帝位大赦改元以太尉王敬則為大司馬司空陳顯達為太尉尚書令王晏加驃騎大將軍左僕射徐孝嗣加中軍大將軍中領軍蕭諶為領軍將軍度支尚書虞悰稱疾不陪位帝以悰舊人欲引參佐命使王晏齎廢主事示悰悰曰主上聖明公卿戮力寧假朽老以􅐌惟新乎不敢聞命因慟哭朝議欲糾之徐孝嗣曰此亦古之遺直乃止十一月上詐稱海陵恭王有疾數遣御師瞻視因而殞之葬禮並依漢東海恭王故事通鑑紀事本末卷第二十
