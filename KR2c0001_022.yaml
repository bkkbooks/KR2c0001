body:
  text: 肇忠用事齊東昏侯永元元年夏六月戊辰魏追尊皇妣髙氏為文昭皇后配饗髙祖增修舊冢號終寧陵追賜后父揚爵勃海公諡曰敬以其嫡孫猛襲爵封后兄肇為平原公肇弟顯為澄城公三人同日受封魏主素未識諸舅始賜衣幘引見皆惶懼失措數日之間冨貴赫奕和帝中興元年魏主時年十六不能親決庶務委之左右於是幸臣茹皓趙郡王仲興上谷寇猛趙郡趙修南陽趙雍及外戚髙肇等始用事魏政浸衰梁武帝天監元年冬十二月魏陳留公主寡居僕射髙肇秦州刺史張彞皆欲尚之公主許彞而不許肇肇怒譛彞於魏主彞坐沈廢纍年二年冬十一月魏主納髙肇兄偃之女為貴嬪三年魏冠軍將軍茹皓以巧思有寵於帝常在左右傳可門下奏事弄權納賄朝野憚之北海王詳亦附焉皓娶尚書令髙肇從妹皓妻之姊為詳從父安定王燮之妃詳蒸於燮妃由是與皓益相昵狎直閣將軍劉胄本詳所引薦殿中將軍常季賢以善養馬陳掃靜掌櫛皆得幸於帝與皓相表裏賣權勢髙肇本出髙麗時望輕之帝既黜六輔誅咸陽王禧專委事於肇肇以在朝親族至少乃邀結朋援附之者旬月超擢不附者陷以大罪尤忌諸王以詳位居其上欲去之獨執朝政乃譛之於帝云詳與皓胄季賢掃靜謀為逆亂夏四月帝夜召中尉崔亮入禁中使彈奏詳貪淫奢縱及皓等四人怙權貪橫收皓等繫南臺遣虎賁百人圍守詳第又慮詳驚懼逃逸遣左右郭翼開金墉門馳出諭旨示以中尉彈狀詳曰審如中尉所糾何憂也正恐更有大罪橫至耳人與我物我實受之詰朝有司奏處皓等罪皆賜死帝引髙陽王雍等五王入議詳罪詳單車防衛送華林園母妻隨入給小奴弱婢數圍守甚嚴內外不通五月丁未朔下詔宥詳死免為庶人頃之徙詳於太府寺圍禁彌急母妻皆還南第五日一來視之詳暴卒詔有司以禮殯葬先是典事史元顯獻雞雛四翼四足詔以問侍中崔光光上表曰漢元帝初元中丞相府史家雌雞伏子漸化為雄冠距將鳴永光中有獻雄雞生角劉向以為雞者小畜主司時起居人小臣執事為政之象也竟寧元年石顯伏辜此其效也靈帝光和元年南宫寺雌雞欲化為雄但頭冠未變詔以問議郎蔡雍對曰頭為元首人君之象也今雞一身已變未至於頭而上知之是將有其事而不遂成之象也若應之不精政無所改頭冠或成為患滋大是後黃巾破壞四方天下遂大亂今之雞狀雖與漢不同而其應頗相類誠可畏也臣以向雍言推之翼足衆多亦羣下相扇助之象雛而未大足羽差小亦其勢尚微易制御也臣聞災異之見皆所以示吉凶明君覩之而懼乃能致福暗主觀之而慢所以致禍或者今亦有自賤而貴關預政事如前丗石顯之比者邪願陛下進賢黜佞則妖弭慶集矣後數日皓等伏誅帝愈重光髙肇説帝使宿衛隊主帥羽林虎賁守諸王第殆同幽禁彭城王協切諌不聽五年魏主委任髙肇踈薄宗室好桑門之法不親政事六年髙貴嬪有寵而妬髙肇勢傾中外后暴疾而殂人皆歸咎髙氏宫禁事袐莫能詳也七年春三月戊子魏皇子昌卒侍御師王顯失於療治時人皆以為承髙肇之意也秋七月甲午魏立髙貴嬪為皇后尚書今髙肇益貴重用事肇多變更先朝舊制減削封秩抑黜勳人由是怨聲盈路羣臣宗室皆卑下之唯度支尚書元匡與肇抗衡先自造棺置聽事欲輿棺詣闕論肇罪惡自殺以切諌肇聞而惡之會匡與太常劉芳議權量事肇主芳議匡遂與肇喧競表肇指鹿為馬御史中尉王顯奏彈匡誣毁宰相有司處匡死刑詔恕死降為光祿大夫初魏主為京兆王愈納于后之妹為妃愈不愛愛妾李氏生子寶月于后召李氏入宫捶之愈驕奢貪縱所為多不法帝召愈入禁中推案杖愈五十出為冀州刺史愈自以年長而勢位不及二弟濳懷愧恨又身與妾屢𬒳頓辱髙肇數譖愈兄弟愈不勝忿癸亥殺長史羊靈引司馬李遵詐稱得清河王懌密疏云髙肇弒逆遂為壇於信都之南即皇帝位大赦改元建平立李氏為皇后法曹參軍崔伯驥不從愈殺之在北州鎮皆疑魏朝有變定州刺史安樂王詮具以狀告之州鎮乃安乙丑魏以尚書李平為都督北討諸軍行冀州事以討愈平崇之從父弟也魏髙后之立也彭城武宣王協固諌魏主不聽髙肇由是怨之數譖協於魏主魏主不之信協薦其舅潘僧固為長樂太守京兆王愈之反脅僧固與之同肇因誣協北與愈通南招蠻賊彭城郎中令魏偃前防閣髙祖珍希肇提擢􅌟成其事肇令侍中元暉以聞暉不從又令左衛元珍言之帝以問暉暉明協不然又以問肇肇引魏偃髙祖珍為證帝乃信之戊戌召協及髙陽王雍廣陽王嘉清河王懌廣平王懷髙肇俱入宴協妃李氏方産固辭不赴中使相繼召之不得已與妃訣而登車入東掖門度小橋牛不肯進擊之良久更有使者責協來遲乃去牛人挽而進宴於禁中至夜皆醉各就别所消息俄而元珍引武士齎毒酒而至協曰吾無罪願一見至尊死無恨元珍曰至尊何可復見協曰至尊聖明不應無事殺我乞與告者一對曲直武士以刀鐶築之協大言曰冤哉皇天忠而見殺武士又築之協乃飲毒酒武士就殺之向晨以褥裹尸載歸其第云王因醉而薨李妃號哭大言曰髙肇枉理殺人天道有靈汝安得良死魏主舉哀於東堂贈官葬禮皆優厚加等在朝貴賤莫不喪氣行路士女皆流涕曰髙令公枉殺賢王由是中外惡之益甚京兆王愈不能守信都癸卯燒門攜李氏及其四子從百餘騎突走李平入信都斬愈所置冀州牧韋超等遣統軍叔孫頭追執愈置信都以聞羣臣請誅愈魏主弗許命鎖送洛陽申以家人之訓行至野王髙肇密使人殺之諸子至洛魏主皆赦之魏主將屠李氏中書令崔光諌曰李氏方妊刑至刳胎乃桀紂所為酷而非法請俟産畢然後行刑從之李平捕愈餘黨千餘人將盡殺之録事參軍髙皓曰此皆脅從前既許之原免矣宜為表陳平從之皆得免死皓祐之孫也濟州刺史髙植帥州軍擊愈有功當封植不受曰家荷重恩為國致效乃其常節何敢求賞植肇之子也加李平散騎常侍髙肇及中尉王顯素惡平顯彈平在冀州隱截官口肇奏除平名十一年春正月丙辰魏以車騎大將軍尚書令髙肇為司徒清河王懌為司空廣平王懷進號驃騎大將軍加儀同三司肇雖登三司猶自以去要任怏怏形於言色見者嗤之尚書右丞髙綽國子博士封軌素以方直自業及肇為司徒綽送迎往來軌竟不詣肇綽顧不見軌乃遽歸嘆曰吾平生自謂不失規矩今日舉措不如封生逺矣綽允之孫軌懿之族孫也清河王懌有才學聞望懲彭城之禍因侍宴謂肇曰天子兄弟詎有幾人而翦之幾盡昔王莽頭秃藉渭陽之資遂篡漢室今君身曲亦恐終成亂階會大旱肇擅録囚徒欲以收衆心懌言於魏主曰昔季氏旅於泰山孔子疾之誠以君臣之分宜防微杜漸不可瀆也減膳録囚乃陛下之事今司徒行之豈人臣之義乎明君失之於上姦臣竊之於下禍亂之基於此在矣帝笑而不應十四年春正月魏丗宗殂太子詡即位先是髙肇擅權尤忌宗室有時望者太子太保任城王澄數為肇所譖懼不自全乃終日酣飲所為如狂朝廷機要無所關豫及丗宗殂肇擁兵於外朝野不安領軍將軍于忠與門下議以肅宗幼未能親政宜使太保髙陽王雍入居西柏堂省決庶政以任城王澄為尚書令揔攝百揆奏皇后請即敕授王顯素有寵於丗宗恃勢使威為丗所疾恐不為澄等所容與中常侍孫伏連等密謀寢門下之奏矯皇后令以髙肇録尚書事以顯與勃海公髙猛同為侍中于忠等聞之託以侍療無效執顯於禁中下詔削爵任顯臨執呼冤直閣以刀鐶撞其掖下送右衛府一宿而死庚申下詔如門下所奏百官揔已聽於二王中外恱服二月庚辰尊皇后為皇太后魏王稱名為書告哀於髙肇且召之還肇承變憂懼朝夕哭泣至于羸悴歸至瀍澗家人迎之不與相見辛巳至闕下衰服號哭升太極殿盡哀髙陽王雍與于忠密謀伏直寢邢豹等十餘人於舍人省下肇哭畢引入西廡清河諸王皆竊言目之肇入省豹等扼殺之下詔暴其罪惡稱肇自盡自餘親黨悉無所問削除職爵葬以士禮逮昏於厠門出尸歸其家魏于忠既居門下又揔宿衛遂專朝政權傾一時魏尚書裴植自謂人門不後王肅以朝廷處之不髙意常怏怏表請解官隱嵩山丗宗不許深怪之及為尚書志氣驕滿每謂人曰非我須尚書尚書亦須我每入參議論好面譏毁羣官又表征南將軍田益宗言華夷異類不應在百丗衣冠之上于忠元昭見之切齒尚書左僕射郭祚冒進不已自以東宫師傅列辭尚書望封侯儀同詔以祚為都督雍𡵨華三州諸軍事征西將軍雍州刺史祚與植皆惡于忠專橫密勸髙陽王雍使出之忠聞之大怒令有司誣奏其罪尚書奏羊祉告植姑子皇甫仲逹云受植旨詐稱𬒳詔帥合部曲欲圖于忠臣等窮治辭不伏引然衆證明昞準律當死衆證雖不見植皆言仲逹為植所使植召仲逹責問而不告列推論情狀不同之理不可分明不得同之常獄在所降減計同仲逹處植死刑植親帥城衆附從王化依律上議乞賜裁處忠矯詔曰凶謀既爾罪不當恕雖有歸化之誠無容上議亦不須待秋分八月乙亥植與郭祚及都水使者杜陵韋雋皆賜死雋祚之昏家也忠又欲殺髙陽王雍崔光固執不從乃免雍官以王還第朝野冤憤莫不切齒庚寅魏以車騎大將軍于忠為尚書令特進加儀同三司自郭祚等死詔令生殺皆出于忠王公畏之重足脅息太后既親政乃解忠侍中領軍崇訓衛尉止為儀同三司尚書令後旬餘太后引門下侍官於崇訓宫問曰忠在端右聲望何如咸曰不稱厥任乃出忠為都督冀定瀛三州諸軍事征北大將軍冀州刺史初魏于忠用事自言丗宗許其優轉太傅雍等皆不敢違加忠車騎大將軍忠又自謂新故之際有定社稷之功諷百僚令加已賞雍等議封忠常山郡公忠又難於獨受乃諷朝廷同在門下者皆加封邑雍等不得已復封崔光為博平縣公而尚書元昭等上訴不已太后敕公卿再議太傅懌等上言先帝升遐奉迎乘輿待衛省闥乃臣子常職不容以此為功臣等前議授忠茅土正以畏其威權茍免暴戾故也若以功過相除悉不應賞請皆追奪崔光亦奉送章綬茅土表十餘上太后從之髙陽王雍上表自劾稱臣初入柏堂見詔旨之行一由門下臣出君行深知不可而不能禁于忠專權生殺自恣而臣不能違忠規欲殺臣賴在事執拒臣欲出忠於外在心未行返為忠廢忝官尸祿孤負恩私請返私門伏聽司敗太后以忠有保護之功不問其罪十五年春二月魏中尉元匡奏彈于忠幸國大災專擅朝命裴郭受冤宰輔黜辱又自矯旨為儀同三司尚書令領崇訓衛尉原其此意欲以無上自處既事在恩後宜加顯戮請遣御史一人就州行決自去歲丗宗晏駕以後皇太后未親覽以前諸不由階級或發門下詔書或由中書宣敕擅相拜授者已經恩宥正可免罪並宜追奪太后令曰忠已蒙特原無宜追罪餘如奏夏四月魏胡太后追思于忠之功曰豈宜以一謬棄其餘勳復封忠為靈壽縣公十七年春三月辛未魏靈壽武敬公于忠卒邢巒冦巴西梁武帝天監四年初譙國夏侯道遷以輔國將軍從裴叔業鎮壽陽為南譙太守與叔業有隙單騎奔魏魏以道遷為驍騎將軍從王肅鎮壽陽使道遷守合肥肅卒道遷棄戍來奔從梁秦二州刺史莊丘黑鎮南鄭以道遷為長史領漢中太守黑卒詔以都官尚書王珍國為刺史未至道遷隂與軍主考城江忱之等謀降魏先是魏仇池鎮將楊靈珍叛魏來奔朝廷以為征虜將軍假武都王助戍漢中有部曲六百餘人道遷憚之上遣左右吳公之等使南鄭道遷遂殺使者發兵擊靈珍父子斬之并使者首送於魏白馬戍主尹天寶聞之引兵擊道遷敗其將龐樹遂圍南鄭道遷求救於氐王楊紹先楊集起楊集義皆不應集義弟集朗獨引兵救道遷擊天寶殺之魏以道遷為平南將軍豫州刺史豐縣侯又以尚書邢巒為鎮西將軍都督征梁漢諸軍事將兵赴之道遷受平南辭豫州且求公爵魏主不許春二月魏邢巒至漢中擊諸城戍所向摧破晉壽太守王景胤據石亭巒遣統軍李義珍擊走之魏以巒為梁秦二州刺史巴西太守龐景民據郡不下郡民嚴玄思聚衆自稱巴州刺史附於魏攻景民斬之楊集起集義聞魏克漢中而懼閏月帥羣氐叛魏斷漢中糧道巒屢遣軍擊破之夏四月冠軍將軍孔陵等將兵二萬戍深坑魯方逹戍南安任僧褒等戍石同以拒魏邢巒遣統軍王足將兵擊之所至皆捷遂入劒閣陵等退保梓潼足又進擊破之梁州十四郡地東西七百里南北千里皆入于魏𥘉益州刺史當陽侯鄧元起以母老乞歸詔徵為右衛將軍以西昌侯淵藻代之淵藻懿之子也夏侯道遷之叛也尹天寶馳使報元起及魏寇晉壽王景胤等並遣告急衆勸元起急救之元起曰朝廷萬里軍不猝至若冦賊侵淫方須撲討董督之任非我而誰何事匆匆救之詔假元起都督征討諸軍事救漢中而晉壽已陷蕭淵藻將至元起營還裝糧儲器械取之無遺淵藻入城恨之又求其良馬元起曰年少郎子何用馬為淵藻恚因醉殺之元起麾下圍城哭且問故淵藻曰天子有詔衆乃散遂誣以反上疑焉元起故吏廣漢羅研詣闕訟之上曰果如我所量也使讓淵藻曰元起為汝報讎汝為讎報讎忠孝之道如何乃貶淵藻號為冠軍將軍贈元起征西將軍諡曰忠侯李延壽論曰元起勤乃胥附功惟闢土勞之不圖禍機先陷冠軍之貶於罰已輕梁之政刑於斯為失私戚之端自斯而啓年之不永不亦宜乎益州民焦僧護聚衆數萬作亂蕭淵藻年未弱冠集僚佐議自擊之或陳不可淵藻大怒斬于階側乃乘平肩輿巡行賊壘賊弓亂射矢下如雨從者舉楯禦矢淵藻命去之由是人心大安擊僧護等皆平之秋八月庚戌秦梁二州刺史魯方逹與魏王足統軍紀洪雅盧祖遷戰敗方逹等十五將皆死壬子王景胤等又與祖遷戰敗景胤等二十四將皆死冬十一月魏王足圍涪城蜀人震恐益州城戍降魏者什二三民自上名籍者五萬餘户邢巒表於魏主請乘勝取蜀以為建康成都相去萬里陸行既絶惟資水路水軍西上非周年不逹益州外無軍援一可圖也頃經劉季連反鄧元起攻圍資儲空竭吏民無復固守之志二可圖也蕭淵藻裙屐少年未洽治務宿昔名將多見囚戮今之所任皆左右少年三可圖也蜀之所恃唯在劒閣今既克南安已奪其險據彼境內三分已一自南安向涪方軌無礙前軍纍敗後衆喪魄四可圖也淵藻是蕭衍骨肉至親必無死理若克涪城淵藻安肯城中坐而受困必將望風逃去若其出鬪庸蜀士卒駑怯弓矢寡弱五可圖也臣內省文吏不習軍旅賴將士竭力頻有薄捷既克重阻民心懷服瞻望涪益旦夕可屠正以兵少糧匱未宜前出今若不取後圖便難況益州殷實户口十萬比壽春義陽其利三倍朝廷若欲進取時不可失若欲保境寧民則臣居此無事乞歸侍養魏主詔以平蜀之舉當更聽後敕冦難未夷何得以養親為辭巒又表稱昔鄧艾鍾會帥十八萬衆傾中國資儲僅能平蜀所以然者鬪實力也況臣才非古人何宜以二萬之衆而希平蜀所以敢者正以據得要險士民慕義此往則易彼來則難任力而行理有可克今王足已逼涪城脫得涪則益州乃成擒之物但得之有早晚耳且梓潼已附民户數萬朝廷豈可不守又劒閣天險得而棄之良可惜矣臣誠知戰伐危事未易可為自軍度劒閣以來鬢髮中白日夜戰懼何可為為所以勉強者既得此地而自退不守恐負陛下之爵祿故也且臣之意算正欲先取涪城以漸而進若得涪城則中分益州之地斷水陸之衝彼外無援軍孤城自守何能復持久哉臣今欲使軍軍相次聲勢連接先為萬全之計然後圖功得之則大利不得則自全又巴西南鄭相距千四百里去州迢遰恆多擾動昔在南之日以其統綰勢難曾立巴州鎮靜夷獠梁州藉利因而表罷彼土民望嚴蒲何楊非唯一族雖率居山谷而豪右甚多文學風流亦為不少但以去州既逺不獲仕進至於州綱無由厠迹是以鬱怏多生異圖比道遷建義之始嚴玄思自號巴州刺史克城以來仍使行事巴西廣袤千里户餘四萬若於彼立州鎮攝華獠則大帖民情從墊江已還不勞征伐自為國有魏主不從先是魏主以王足行益州刺史上遣天門太守張齊將兵救益州未至魏主更以梁州軍司泰山羊祉為益州刺史王足聞之不恱輒引兵還遂不能定蜀久之足自魏來奔邢巒在梁州接豪右以禮撫小民以惠州人恱之巒之克巴西也使軍主李仲遷守之仲遷溺於酒色費散兵儲公事咨承無能見者巒忿之切齒仲遷懼謀叛城人斬其首以城來降五年春正月楊集義圍魏關城邢巒使建武將軍傅豎眼討之集義逆戰擊破之乘勝逐北壬申克武興執楊紹先送洛陽楊集起楊集義亡走遂滅其國以為武興鎮又改為東益州楊集起兄弟相率降魏梁魏爭淮堰梁武帝天監十二年夏五月壽陽久雨大水入城廬舍皆沒魏楊州刺史李崇勒兵泊於城上水增未已乃乘船附於女牆城不沒者二板將佐勸崇棄壽陽保北山崇曰吾忝守藩嶽德薄致災淮南萬里繫于吾身一旦動足百姓瓦解揚州之地恐非國物吾豈愛一身取愧王尊但憐此士民無辜同死可結筏隨髙人規自脫吾必與此城俱沒幸諸君勿言楊州治中裴絢帥城南民數千家泛舟南走避水髙原謂崇還北因自稱豫州刺史與别駕鄭祖起等送任子來請降馬仙琕遣兵赴之崇聞絢叛未測虛實遣國侍郎韓方興單舸召之絢聞崇在悵然驚恨報曰比因大水顚狽為衆所推今大計已爾勢不可追恐民非公民吏非公吏願公早行無犯將士崇遣從弟寧朔將軍神等將水軍討之絢戰敗神追拔其營絢走為村民所執還至尉升湖曰吾何面見李公乎乃投水死絢叔業之兄孫也鄭祖起等皆伏誅崇上表以水災求解州任魏主不許崇沈深寬厚有方略得士衆心在壽春十年常養壯士數千人寇來無不摧破鄰敵謂之卧虎上屢設反間以疑之又授崇車騎大將軍開府儀同三司萬户郡公諸子皆為縣侯而魏主素知其忠篤委信不疑十三年冬十月魏降人王足陳計求堰淮水以灌壽陽上以為然使水工陳承伯材官將軍祖暅視地形咸謂淮內沙土漂輕不堅實功不可就上弗聽發徐楊民率二十户取五丁以築之假太子右衛率康絢都督淮上諸軍事并護堰作於鍾離役人及戰士合二十萬南起浮山北抵巉石依岸築土合脊於中流十四年春三月魏左僕射郭祚表稱蕭衍狂悖謀斷川瀆役苦民勞危亡已兆宜命將出師長驅撲討魏詔平南將軍楊大眼督諸軍鎮荆山夏四月浮山堰成而復潰或言蛟龍能乘風雨破堰其性惡鐵乃運東西冶鐵器數千萬斤沈之亦不能合乃伐樹為井幹填以巨石加土其上緣淮百里內木石無巨細皆盡負簷者肩上皆穿夏日疾疫死者相枕蠅蟲晝夜聲合秋九月左遊擊將軍趙祖恱襲魏西硤石據之以逼壽陽更築外城徙緣淮之民以實城內將軍田道龍等散攻諸戍魏楊州刺史李崇分遣諸將拒之癸亥魏遣假鎮南將軍崔亮攻西硤石又遣鎮東將軍蕭寶寅決淮堰冬十二月己酉魏崔亮至硤石趙祖恱逆戰而敗閉城自守亮進圍之是冬寒甚淮泗盡凍浮山堰士卒死者什七八十五年春正月魏崔亮攻硤石未下與李崇約水陸並進崇屢違期不至胡太后以諸將不一乃以吏部尚書李平為使持節鎮軍大將軍兼尚書右僕射將步騎二千赴壽陽别為行臺節度諸軍如有乖異以軍法從事蕭寶寅遣輕車將軍劉智文等渡淮攻破三壘二月乙巳又敗將軍垣孟孫等於淮北李平至硤石督李崇崔亮等刻日水陸進攻無敢乖互戰屢有功上使左衛將軍昌義之將兵救浮山未至康絢已擊魏兵却之上使義之與直閣王神念泝淮救硤石崔亮遣將軍博陵崔延伯守下蔡延伯與别將伊甕生夾淮為營延伯取車輪去輞削鋭其輻兩兩接對揉竹為絙貫連相屬並十餘道橫水為橋兩頭施大鹿盧出沒隨意不可燒斫既斷趙祖恱走路又令戰艦不通義之神念屯梁城不得進李平部分水陸攻硤石克其外城乙丑祖恱出降斬之盡俘其衆胡太后賜崔亮書使乘勝深入平部分諸將水陸並進攻浮山堰亮違平節度以疾請還隨表輒發平奏處亮死刑太后令曰亮去留自擅違我經略雖有小捷豈免大咎但吾攝御萬機庶幾惡殺可特聽以功輔過魏師遂還三月魏論西硤石之功辛未以李崇為驃騎將軍加儀同三司李平為尚書右僕射崔亮進號鎮北將軍亮與平爭功於禁中太后以亮為殿中尚書魏蕭寶寅在淮堰上為手書誘之使襲彭城許送其國廟及室家諸從還北寶寅表上其書於魏朝夏四月淮堰成長九里下廣一百四十丈上廣四十五丈髙二十丈樹以𣏌柳軍壘列居其上或謂康絢曰四瀆天所以節宣其氣不可久塞若鑿湬東注則遊波寬緩堰得不壞絢乃開湬東注又縱反間於魏曰梁人所懼開湬不畏野戰蕭寶寅信之鑿山深五丈開湬北注水日夜分流猶不減魏軍竟罷歸水之所及夾淮方數百里李崇作浮橋於硤石戍間又築魏昌城於八公山東南以僃壽陽城壞居民散就岡壟其水清徹俯視廬舍冡墓了然在下𥘉堰起於徐州境內刺史張豹子宣言謂已必掌其事既而康絢以他官來監作豹子甚慙俄而敕豹子受絢節度豹子遂譖絢與魏交通上雖不納猶以事畢徴絢還秋八月康絢既還張豹子不復修淮堰九月丁丑淮水暴漲堰壞其聲如雷聞三百里緣淮城戍村落十餘萬口皆漂入海初魏人患淮堰以任城王澄為上將軍大都督南討諸軍事勒衆十萬將出徐州來攻堰尚書右僕射李平以為不假兵力終當自壞及聞破太后大喜賞平甚厚澄遂不行元義幽后梁武帝天監九年春三月丙戍魏皇子詡生大赦詡母胡充華臨涇人父國珍襲武始伯充華初選入掖庭同列以故事祝之曰願生諸王公主勿生太子充華曰妾之志異於諸人奈何畏一身之死而使國家無嗣乎及有娠同列勸去之充華不可私自誓曰若幸而生男次第當長男生身死所不憾也既而生詡先是魏主頻喪皇子年漸長深加愼護擇良家宜子者以為乳保養於别宫皇后充華皆不得近十一年冬十月乙亥魏立皇子詡為太子始不殺其母十二年秋八月魏主幸東宫以中書監崔光為太子少傅十四年春正月甲寅魏主有疾丁巳殂于式乾殿侍中中書監太子少傅崔光侍中領軍將軍于忠詹事王顯忠庶子代人侯剛迎太子詡於東宫即皇帝位髙后欲殺胡貴嬪中給事譙郡劉騰以告侯剛剛以告于忠忠問計於崔光光使置貴嬪於别所嚴加守衛由是貴嬪深德四人二月庚辰尊皇后為皇太后己亥尊胡貴嬪為皇太妃三月甲辰朔以髙太后為尼徙居金墉城瑶光寺非大節慶不得入宫秋八月丙子魏尊胡太妃為皇太后居崇訓宫于忠領崇訓衛尉劉騰為崇訓太僕加侍中侯剛為侍中撫軍將軍又以太后父國珍為光祿大夫魏江陽王繼之子義娶胡太后妹以義為通直散騎侍郎義妻為新平郡君仍拜女侍中羣臣奏請皇太后臨朝稱制九月乙未靈太后始臨朝聽政太后聰悟頗好讀書屬文射能中針孔政事皆出手筆自決加胡國珍侍中封安定公十五年秋九月魏胡太后數幸宗戚勳貴之家侍中崔光表諌曰禮諸侯非問疾弔喪而入諸臣之家謂之君臣為謔不言王后夫人明無適臣家之義夫人父母在有歸寧沒則使卿寧漢上官皇后將廢昌邑霍光外祖也親為宰輔后猶御武帳以接羣臣示男女之别也今帝族方衍勳貴增遷祗請遂多將成彞式願陛下簡息遊幸則率土屬賴含生仰恱矣十七年秋七月魏宦者劉騰手不解書而多姦謀善揣人意胡太后以其保護之功纍遷至侍中右光祿大夫遂干預政事納賂為人求官無不效者河間王琛簡之子也為定州刺史以貪縱著名及罷州還太后詔曰琛在定州唯不將中山宫來自餘無所不致何可更復敘用遂廢于家琛乃求為騰養息賂騰金寶巨萬計騰為之言於太后得兼都官尚書出為秦州刺史會騰疾篤太后欲及其生而貴之九月癸未朔以騰為衛將軍加儀同三司普通元年魏太傅侍中清河文獻王懌美風儀胡太后逼而幸之然素有才能輔政多所匡益好文學禮敬士人時望甚重侍中領軍將軍元義在門下兼揔禁兵恃寵驕恣志欲無極懌每裁之以法義由是怨之衛將軍儀同三司劉騰權傾內外吏部希騰意奏用騰弟為郡人資乖越懌抑而不奏騰亦怨之龍驤府長史宋維辨之子也懌薦為通直郎浮薄無行義許維以富貴使告司染都尉韓文殊父子謀作亂立懌懌坐禁止案驗無反狀得釋維當反坐義言於太后曰今誅維後有真反者人莫敢告乃黜維為昌平郡守義恐懌終為已害乃與劉騰密謀使主食中黃門胡定自列云懌貨定使毒魏主若已得為帝許定以富貴帝時年十一信之秋七月丙子太后在嘉福殿未御前殿義奉帝御顯陽殿騰閉永巷門太后不得出懌入遇義於含章殿後義厲聲不聽懌入懌曰汝欲反邪義曰義不反正欲縛反者耳命宗士及直齋執懌衣袂將入含章東省使人防守之騰稱詔集公卿議論懌大逆衆咸畏義無敢異者唯僕射新泰文貞公遊肇抗言以為不可終不下署義騰持公卿議入奏俄而得可夜中殺懌於是詐為太后詔自稱有疾還政於帝幽太后於北宫宣光殿宫門晝夜長閉內外斷絶騰自執管籥帝亦不得省見裁聽傳食而已太后服膳俱廢不免飢寒乃歎曰養虎得噬我之謂矣義使中常侍酒泉賈粲侍帝書密令防察動止義遂與太師髙陽王雍等同輔政帝謂義為姨父義與騰表裏擅權義為外禦騰為內防常直禁省共裁刑賞政無巨細決於二人威振內外百僚重迹朝野聞懌死無不喪氣胡夷為之剺面者數百人遊肇憤悒而卒魏相州刺史中山文莊王熙英之子也與弟給事黃門侍郎略司徒祭酒纂皆為清河王懌所厚聞懌死起兵於鄴上表欲誅元義劉騰纂亡奔鄴後十日長史柳元章等帥城人鼓譟而入殺其左右執熙纂并諸子置於髙樓八月甲寅元義遣尚書左丞盧同就斬熙於鄴街并其子弟熙好文學有風義名士多與之遊將死與故知書曰吾與弟並蒙皇太后知遇兄據大州弟則入侍殷勤言色恩同慈母今皇太后見廢北宫太傳清河王橫受屠酷主上幼年獨在前殿君親如此無以自安故帥兵民欲建大義於天下但智力淺短旋見囚執上慙朝廷下愧相知本以名義干心不得不爾流腸碎首復何言哉凡百君子各敬爾儀為國為身善朂名節聞者憐之熙首至洛陽親故莫敢視前驍騎將軍刀整獨收其尸而藏之二年魏元義劉騰之幽胡大后也右衛將軍奚康生預其謀義以康生為撫軍大將軍河南尹仍使之領左右康生子難當娶侍中左衛將軍侯剛女剛子義之妹夫也義以康生通姻深相委託三人率多俱宿禁中時或迭出以難當為千牛備身康生性粗武言氣髙下義稍憚之見于顔色康生亦微懼不安甲午魏主朝太后于西林園文武侍坐酒酣迭舞康生乃為力士舞及折旋之際每顧視太后舉手蹈足瞋目頷首為執殺之勢太后解其意而不敢言日暮太后欲攜帝宿宣光殿侯剛曰至尊已朝訖嬪御在南何必留宿康生曰至尊陛下之兒隨陛下將東西更復訪誰羣臣莫敢應太后自起援帝臂下堂而去康生大呼唱萬歲帝前入閣左右競相排閣不得閉康生奪難當千牛刀斫直後元思輔乃得定帝既升宣光殿左右侍臣俱立西階下康生乘酒勢將出處分為義所執鎖於門下光祿勳賈粲紿太后曰侍官懷恐不安陛下宜親安慰太后信之適下殿粲即扶帝出東序前御顯陽殿還閉太后於宣光殿至晚義不出令侍中黃門僕射尚書等十餘人就康生所訊其事處康生斬刑難當絞刑義與剛並在內矯詔決之康生如奏難當恕死從流難當哭辭父康生慷慨不悲曰我不反死汝何哭也時已昏暗有司驅康生赴市斬之尚食典御奚混與康生同執刀入內亦坐絞難當以侯剛壻得留百餘日竟流安州久之義使行臺盧同就殺之以劉騰為司空八坐九卿常旦造騰宅參其顔色然後赴省府亦有歷日不能見者公私屬請唯視貨多少舟車之利山澤之饒所在榷酤刻剝六鎮交通互市歲入利息以巨萬萬計逼奪鄰舍以廣其居逺近苦之四年春三月魏司空劉騰卒宦官為騰義息重服者四十餘人衰絰送葬者以百數朝貴送葬者塞路滿野六年𥘉魏劉騰既卒胡太后及魏主左右防衛微緩元義亦自寬時出遊於外留連不返其所親諌義不納太后察知之至秋太后對帝謂羣臣曰今隔絶我母子不聽往來復何用我為我當出家修道於嵩山間居寺耳因欲自下髮帝及羣臣叩頭泣涕殷勤苦請太后聲色愈厲帝乃宿於嘉福殿積數日遂與太后密謀黜義然帝深匿形迹太后有忿恚欲得往來顯陽之言皆以告義又對義流涕敘太后欲出家憂怖之心日有數四義殊不以為疑乃勸帝從太后所欲於是太后數御顯陽殿二宫無復禁礙義舉元法僧為徐州法僧反太后數以為言義深愧悔丞相髙陽王雍雖位居義上而深畏憚之會太后與帝遊洛水雍邀二宫幸其第日晏帝與太后至雍內室從者皆不得入遂相與定圖義之計於是太后謂義曰元郎若忠於朝廷無反心何故不去領軍以餘官輔政義甚懼免冠求解領軍乃以義為驃騎大將軍開府儀同三司尚書令侍中領左右魏元義雖解兵權猶揔任內外殊不自意有廢黜之理胡太后意猶豫未決侍中穆紹勸太后速去之紹亮之子也潘嬪有寵於魏主宦官張景嵩説之云義欲害嬪嬪泣訴於帝曰義非獨欲殺妾又將不利於陛下帝信之因義出宿解義侍中明旦義將入宫門者不納夏四月辛卯太后復臨朝攝政下詔追削劉騰官爵除義名為民清河國郎中令韓子熙上書為清河王懌訟冤乞誅元義等曰昔趙髙柄秦令關東鼎沸今元義專魏使四方雲擾開逆之端起於宋維成禍之末良由劉騰宜梟首汙宫斬骸沈族以明其罪太后命發劉騰之墓露散其骨籍沒家資盡殺其養子以子熙為中書舍人子熙麒麟之孫也義之解領軍也太后以義黨與尚強未可猝制乃以侯剛代義為領軍以安其意尋出剛為冀州刺史加儀同三司未至州黜為征虜將軍卒於家太后欲殺賈粲以義黨多恐驚動內外乃出粲為濟州刺史尋追殺之籍沒其家唯義以妹夫未忍行誅先是給事黃門侍郎元順以剛直忤義意出為齊州刺史太后徵還為侍中侍坐於太后義妻在太后側順指之曰陛下奈何以一妹之故不正元義之罪使天下不得伸其冤憤太后默然順澄之子也它日太后從容謂侍臣曰劉騰元義昔邀朕求鐵劵冀得不死朕賴不與韓子熙曰事關生殺豈繫鐵劵且陛下昔雖不與何解今日不殺太后憮然未幾有告義及弟爪謀誘六鎮降户反於定州又招魯陽諸蠻侵擾伊闕欲為內應得其手書太后猶未忍殺之羣臣固執不已魏主亦以為言太后乃從之賜義及弟爪死於家猶贈義驃騎大將軍儀同三司尚書令江陽王繼廢於家病卒前幽州刺史盧同坐義黨除名太后頗事粧飾數出遊幸元順面諌曰禮婦人夫沒自稱未亡人首去珠玉衣不文采陛下母臨天下年垂不惑修飾過甚何以儀刑後丗太后慙而還宫召順責之曰千里相徵豈欲衆中見辱邪順曰陛下不畏天下之笑而恥臣之一言乎順與穆紹同直順因醉入其寢所紹擁被而起正色讓順曰身二十年侍中與卿先君亟連職事縱卿方進用何宜相排突也遂謝事還家詔諭久之乃起六鎮之叛梁武帝普通四年夏四月甲申魏遣尚書令李崇擊柔然阿那瓌崇長史巨鹿魏蘭説崇曰昔緣邊初置諸鎮地廣人稀或徴發中原強宗子弟或國之胏腑寄以爪牙中年以來有司號為府户役同厮養官婚班齒致失清流而夲來族類各居榮顯顧瞻彼此理當憤怨宜改鎮立州分置郡縣凡是府户悉免為民入仕次敘一準其舊文武兼用威恩並施此計若行國家庶無北顧之慮矣崇為之奏聞事寢不報初元義既幽胡太后常入直於魏主所居殿側曲盡佞媚帝由是寵信之義出入禁中恆令勇士持兵以自先後時出休於千秋門外施木欄楯使腹心防守以僃竊發士民求見者遙對之而已其始執政之時矯情自飾以謙勤接物時事得失頗以關懷既得志遂自驕愎嗜酒好色貪吝寶賄與奪任情紀綱壞亂父京兆王繼尤貪縱與其妻子各受賂遺請屬有司莫敢違者乃至郡縣小吏亦不得公選牧守令長率皆貪汙之人由是百姓困窮人人思亂武衛將軍于景忠之弟也謀廢義義黜為懷荒鎮將及柔然入冦鎮民請糧景不肯給鎮民不勝忿遂反執景殺之未幾沃野鎮民破六韓拔陵聚衆反殺鎮將改元真王諸鎮華夷之民往往響應拔陵引兵南侵遣别帥衛可孤圍武川鎮又攻懷朔鎮尖山賀拔度拔及其三子允勝嶽皆有材勇懷朔鎮將楊鈞擢度拔為統軍三子為軍主以拒之五年春三月魏以臨淮王彧都督北討諸軍事討破六韓拔陵夏四月髙平鎮民赫連恩等反推敕勒酋長胡琛為髙平王攻髙平鎮以應拔陵魏將盧祖遷擊破之琛北走衛可孤攻懷朔鎮經年外援不至楊鈞使賀拔勝詣臨淮王彧告急勝募敢死少年十餘騎夜伺隙潰圍出賊騎追及之勝曰我賀拔破胡也賊不敢逼勝見彧於雲中説之曰懷朔被圍旦夕淪陷大王今頓兵不進懷朔若陷則武川亦危賊之鋭氣百倍雖有良平不能為大王計矣彧許為出師勝還復突圍而入鈞復遣勝出覘武川武川已陷勝馳還懷朔亦潰勝父子俱為可孤所虜五月臨淮王彧與破六韓拔陵戰於五原兵敗彧坐削除官爵安北將軍隴西李叔仁又敗於白道賊勢日盛魏主引丞相令僕尚書侍中黃門於顯陽殿問之曰今冦連恆朔逼近金陵計將安出吏部尚書元修義請遣重臣督軍鎮恆朔以捍冦帝曰去歲阿那瓌叛亂遣李崇北征崇上表求改鎮為州朕以舊章難革不從其請尋崇此表開鎮户非冀之心致有今日之患但既往難追聊復略論耳然崇貴戚重望器識英敏意欲還遣崇行何如僕射蕭寶寅等皆曰如此實合羣望崇曰臣以六鎮遐僻密邇冦戎欲以慰恱彼心豈敢導之為亂臣罪當就死陛下赦之今更遣臣北行正是報恩改過之秋但臣年七十加之疲病不堪軍旅願更擇賢材帝不許修義天賜之子也臣光曰李崇之表乃所以銷禍於未萌制勝於無形魏肅宗既不能用及亂生之日曽無愧謝之言乃更以為崇罪彼不明之君烏可與謀哉詩云聽言則對誦言如醉匪用其良覆俾我悖其是之謂矣夏四月壬申加崇使持節開府儀同三司北討大都督命撫軍將軍崔暹鎮軍將軍廣安王深皆受崇節度深嘉之子也六月魏自破六韓拔陵之反二夏豳涼寇盜蜂起秦州刺史李彥政刑殘虐在下皆怨是月城內薛珍等聚黨突入州門擒彥殺之推其黨莫折大提為帥大提自稱秦王魏遣雍州刺史元志討之𥘉南奉州豪右楊松柏兄弟數為冦盜刺史博陵崔遊誘之使降引為主簿接以辭色使説下羣氐既而因宴會盡收斬之由是所部莫不猜懼遊聞李彥死自知不安欲逃去未果城民張長命韓祖香孫掩等攻遊殺之以城應大提大提遣其黨卜胡襲髙平克之殺鎮將赫連略行臺髙元榮大提尋卒子念生自稱天子置百官改元天建秋七月甲寅魏遣吏部尚書元修義兼尚書僕射為西道行臺帥諸將討莫折念生崔暹違李崇節度與破六韓拔陵戰于白道大敗單騎走還拔陵并力攻崇崇力戰不能禦引還雲中與之相持廣陽王深上言先朝都平城以北邊為重盛簡親賢擁麾作鎮配以髙門子弟以死防遏非唯不廢仕宦乃更獨得復除當時人物欣慕為之太和中僕射李沖用事涼州土人悉免厮役帝鄉舊門仍防邊戍自非得罪當丗莫肯與之為伍本鎮驅使但為虞候白直一生推遷不過軍主然其同族留京師者得上品通官在鎮者即為清途所隔或多逃逸乃峻邊兵之格鎮人不聽浮遊在外於是少年不得從師長者不得遊宦獨為匪人言之流涕自定鼎伊洛邊任益輕唯底滯凡才乃出為鎮將轉相模習專事聚斂或諸方姦吏犯罪配邊為之指蹤政以賄立邊人無不切齒及阿那瓌背恩縱掠發奔命追之十五萬衆度沙漠不日而還邊人見此援師遂自意輕中國尚書令臣崇求改鎮為州抑亦先覺朝廷未許而髙關戌主御下失和拔陵殺之遂相帥為亂攻城掠地所過夷滅王師屢北賊黨日盛此假之舉指望銷平而崔暹隻輪不返臣崇與臣逡巡復路相與還次雲中將士之情莫不解體今日所慮非止西北將恐諸鎮尋亦如此天下之事何易可量書奏不省詔徵崔暹繫廷尉暹以女妓田園賂元義卒得不坐丁丑莫折念生遣其都督楊伯年等攻仇鳩河沌二戍東益州刺史魏子建遣將軍伊祥等擊破之斬首千餘級東益州本氐王楊紹先之國將佐皆以城民徑勇二秦反者皆其族類請先收其器械子建曰城民數經行陳撫之足以為用急之則腹背為患乃悉召城民慰諭之既而漸分其父兄子弟外戍諸郡內外相顧卒無叛者子建蘭根之族兄也八月魏貟外散騎侍郎李苗上書曰凡食少兵精利於速戰糧多卒衆事宜持久今隴賊猖狂非有素蓄雖據兩城本無德義其勢在於疾攻日有降納遲則人情離沮坐待崩潰夫飈至風舉逆者求萬一之功髙壁深壘王師有全制之䇿但天下久泰人不曉兵奔利不相待逃難不相顧將無法令士非教習不思長久之計各有輕敵之心如令隴東不守汧軍敗散則兩秦遂強三輔危弱國之右臂於斯廢矣宜勒大將堅壁勿戰别命偏禆帥精兵數千出麥積崖以襲其後則汧岐之下羣妖自散魏以苗為統軍與别將淳于誕俱出梁益隸魏子建未至莫折念生遣其弟髙陽王天生將兵下隴甲午都督元志與戰於隴口志兵敗棄衆東保岐州東西部敕勒皆叛魏附於破六韓拔陵魏主始思李崇及廣陽王深之言丙申下詔諸州鎮軍實非有罪配隸者皆免為民改鎮為州以懷朔鎮為朔州更命朔州曰雲州遣兼黃門侍郎酈道元為大使撫慰六鎮時六鎮已盡叛道元不果行先是代人遷洛者多為選部所抑不得仕進及六鎮叛元義乃用代來寒人為傳詔以慰恱之戊戌莫折念生遣都督竇雙攻魏盤頭郡東益州刺史魏子建遣將軍竇念祖擊破之九月魏西道行臺元修義得風疾不能治軍壬申魏以尚書左僕射齊王蕭寶寅為西道行臺大都督帥諸將討莫折念生冬十月胡琛遣其將宿勤明逹冦幽夏北華三州壬午魏遣都督北海王皓帥諸將討之皓詳之子也魏廣陽王深上言今六鎮盡叛髙車二部亦與之同以此疲兵擊之必無勝理不若選練精兵守恆州諸要更為後圖遂與李崇引兵還平城崇謂諸將曰雲中者白道之衝賊之咽喉若此地不全則并肆危矣當留一人鎮之誰可者衆舉費穆崇乃請穆為朔州刺史賀拔度拔父子及武川宇文肱糾合鄉里豪傑共襲衛可孤殺之度拔尋與鐵勒戰死莫折天生進攻魏岐州十一月戊申陷之執都督元志及刺史裴芬之送莫折念生殺之念生又使卜胡等寇涇州敗光祿大夫薛巒於平涼東巒安都之孫也髙平人攻殺卜胡共迎胡琛十二月壬辰魏以京兆王繼為太師大將軍都督西道諸軍以討莫折念生魏魏子建招諭南秦諸氐稍稍降附遂復六郡十二戍斬賊帥韓祖香魏以子建兼尚書為行臺刺史如故梁巴二益二秦諸州皆受節度莫折念生遣兵攻涼州城民趙天安復執刺史以應之六年春正月莫折天生軍於黑水兵勢甚盛魏以岐州刺史崔延伯為征西將軍西道都督帥衆五萬討之延伯與行臺蕭寶寅軍于馬嵬延伯素驍勇寶寅趣之使戰延伯曰明晨為公參賊勇怯乃選精兵數千西度黑水整陳向天生營寶寅軍於水東遙為繼援延伯直抵天生營下揚威脅之徐引兵還天生見延伯衆少開營爭逐之其衆多於延伯一倍蹙延伯於水次寶寅望之失色延伯自為後殿不與之戰使其衆先渡部伍嚴整天生兵不敢擊須臾渡畢延伯徐渡天生之衆亦引還寶寅喜曰崔君之勇關張不如延伯曰此賊非老奴敵也明公但安坐觀老奴破之癸亥延伯勒兵出寶寅與軍繼其後天生悉衆逆戰延伯身先士卒陷其前鋒將士盡鋭競進大破之俘斬十餘萬追奔至小隴𡵨雍及隴東皆平將士稽留採掠天生遂塞隴道由是諸軍不能進寶寅破宛川俘其民以為奴婢以美女十人賞岐州刺史魏蘭根蘭根辭曰此縣介於強冦不能自立故附從以救死官軍之至宜矜而撫之奈何助賊為虐翦以為賤役乎悉求其父兄而歸之二月壬辰莫折念生遣都督楊鮓等攻仇池郡行臺魏子建擊破之夏四月胡琛據髙平遣其大將万俟醜奴宿勤明逹等冦魏涇州將軍盧祖遷伊甕生討之不克蕭寶寅崔延伯既破莫折天生引兵會祖遷等於安定甲卒十二萬鐵馬八千軍威甚盛醜奴軍於安定西北七里時以輕騎挑戰大兵未交輒委走延伯恃其勇且新有功遂唱議為先驅擊之别造大盾內為鎖柱使壯士負而趨謂之排城置輜重於中戰士在外自安定北緣原北上將戰有賊數百騎詐持文書云是降簿且乞緩師寶寅延伯未及閲視宿勤明逹引兵自東北至降賊自西競下覆背擊之延伯上馬奮擊逐北徑抵其營賊皆輕騎延伯軍雜步卒戰久疲乏賊乘間得入排城延伯遂大敗死傷近二萬人寶寅收衆退保安定延伯自恥其敗乃繕甲兵募驍勇復自安定西進去賊七里結營壬辰不告寶寅獨出襲賊大破之俄頃平其數柵賊見軍士採掠散亂復還擊之魏兵大敗延伯中流矢卒士卒死者萬餘人時大寇未平復失驍將朝野為之憂恐於是賊勢愈盛而羣臣自外來者太后問之皆言賊弱以求恱媚由是將帥求益兵者往往不與夏六月破六韓拔陵圍魏廣陽王深於五原軍主賀拔勝募二百人開東門出戰斬首百餘級賊稍退深拔軍向朔州勝常為殿雲州刺史費穆招撫離散四面拒敵時北境州鎮皆沒唯雲中一城獨存久之道路阻絶援軍不至糧仗俱盡穆棄城南奔爾朱榮於秀容既而詣闕請罪詔原之長流參軍于謹言於廣陽王深曰今冦盜蜂起未易專用武力勝也謹請奉大王之威命諭以禍福庶幾稍可離也深許之謹兼通諸國語乃單騎詣叛胡營見其酋長開示恩信於是西部鐵勒酋長乜列河等將三萬餘户南詣深降深欲引兵至折敷嶺迎之謹曰破六韓拔陵兵勢甚盛聞乜列河等來降必引兵邀之若先據險要未易敵也不若以乜列河餌之而伏兵以待之必可破也深從之拔陵果引兵邀擊乜列河盡俘其衆伏兵發拔陵大敗復得乜列河之衆而還柔然頭兵可汗大破破六韓拔陵斬其將孔雀等拔陵避柔然南徙渡河將軍李叔仁以拔陵稍逼求援於廣陵王深深帥衆赴之賊前後降附者二十萬人深與行臺元纂表乞於恆州北别立郡縣安置降戶隨宜賑賚息其亂心魏朝不從詔黃門侍郎楊置分處之於冀定瀛三州就食深謂纂曰此輩復為乞活矣秋八月魏柔玄鎮民杜洛周聚衆反於上谷改元真王攻沒郡縣髙歡蔡雋尉景及假榮安定彭樂皆從之洛周圍魏燕州刺史博陵崔秉九月丙辰魏以幽州刺史常景兼尚書為行臺與幽州都督元談討之景爽之孫也自盧龍塞至軍都關皆置兵守險談屯居庸關初敕勒酋長斛律金事懷朔鎮將楊鈞為軍主行兵用胸奴法望塵知馬步多少嗅地知軍逺近及破六韓拔陵反金擁衆歸之拔陵署金為王既而知拔陵終無所成乃詣雲州降仍稍引其衆南出黃爪堆為杜洛周所破脫身歸爾朱榮榮以為别將七年春正月魏安州石離穴城斛盬三戍兵反應杜洛周衆合二萬洛周自松岍赴之行臺常景使别將崔仲哲屯軍都關以邀之仲哲戰沒元談軍夜潰魏以别將李琚代談為都督仲哲秉之子也五原降户鮮于修禮等帥北鎮流民反於定州之左城改元魯興夏四月杜洛周南出鈔掠薊城魏常景遣統軍梁仲禮擊破之丁未都督李琚與洛周戰於薊城之北敗沒常景帥衆拒之洛周引還上谷六月杜洛周遣都督王曹紇真等將兵掠薊南秋七月丙午行臺常景遣都督于榮等擊之於栗園大破之斬曹紇真及將卒三千餘級洛周帥衆南趣范陽景與榮等又破之八月癸巳賊帥元洪業斬鮮于修禮請降于魏賊黨葛榮復殺洪業自立九月葛榮既得杜洛周之衆北趣瀛州自稱天子國號齊改元廣安甲申魏行臺常景破杜洛周斬其武川王賀拔文興等捕虜四百人天水民吕伯度本莫折念生之黨也後更據顯親以拒念生已而不勝亡歸胡琛琛以為大都督秦王資以士馬使擊念生伯度屢破念生軍復據顯親乃叛琛東引魏軍念生窘迫乞降於蕭寶寅寶寅復行臺左丞崔士和據秦州魏以伯度為涇州刺史封平秦郡公大都督元修義停軍隴口久不進念生復反執士和送胡琛於道殺之久之伯度為万俟醜奴所殺賊勢益盛寶寅不能制胡琛與莫折念生交通事破六韓拔陵浸慢拔陵遣其臣費律至髙平誘琛斬之醜奴盡并其衆冬十一月杜洛周圍范陽戊戌民執魏幽州刺史王延年行臺常景送洛周開門納之大通元年春正月魏分定相二州四郡置殷州以北道行臺博陵崔楷為刺史楷表稱州今新立尺刃斗糧皆所未有乞資以兵糧詔付外量聞竟無所給或勸楷留家單騎之官楷曰吾聞食人之祿者憂人之憂若吾獨往則將士誰肯用志哉遂舉家之官葛榮逼州城或勸減弱小以避之楷遣幼子及一女夜出既而悔之曰人謂吾心不固虧忠而全愛也遂命追還賊至強弱相懸又無守禦之具楷撫勉將士以拒之莫不爭奮皆曰崔公尚不惜百口吾屬何愛一身連戰不息死者相枕終無叛志辛未城陷楷執節不屈榮殺之遂圍冀州魏蕭寶寅出兵纍年將士疲弊秦賊擊之寶寅大敗於涇州收散兵萬餘人屯逍遙園東秦州刺史潘義淵以汧城降賊莫折念生進逼𡵨州城人執刺史魏蘭根應之豳州刺史畢祖暉戰沒行臺羊深棄城走北海王皓軍亦敗賊帥胡引祖據北華州叱千麒麟據幽州以應天生關中大擾雍州刺史楊椿募兵得七千餘人帥以拒守詔加椿侍中兼尚書右僕射為行臺節度關西諸將北地功曹毛鴻賔引賊抄掠渭北雍州録事參軍楊侃將兵三千掩擊之鴻賔懼請討賊自效遂擒送宿勤烏過仁烏過仁者明逹之兄子也莫折天生乘勝寇雍州蕭寶寅部將羊侃隱身塹中射之應弦而斃其衆遂潰侃祉之子也魏右民郎陽平路思令上疏以為師出有功在於將帥得其人則六合唾掌可清失其人則三河方為戰地竊以比年將帥多寵貴子孫銜杯躍馬志逸氣浮軒眉攘腕以攻戰自許及臨大敵憂怖交懷雄圖鋭氣一朝頓盡乃令羸弱在前以當寇強壯居後以衛身兼復器械不精進止無節以當負險之衆敵數戰之虜欲其不敗豈可得哉是以兵知必敗始集而先逃將帥畏敵遷延而不進國家謂官爵未滿屢加寵命復疑賞賚之輕日散金帛帑藏空竭民財殫盡遂使賊徒益甚生民雕弊凡以此也夫德可感義夫恩可勸死士今若黜陟幽明賞罰善惡簡練士卒繕修器械先遣辨士曉以禍福如其不悛以順討逆如此則何異勵蕭斧而伐朝菌鼓洪爐而燎毛髮哉弗聽二月秦賊據魏潼關三月甲子魏主詔將西討中外戒嚴會奏賊西走復得潼關戊辰詔回駕北討其實皆不行葛榮久圍信都魏以金紫光祿大夫源子雍為北討大都督以救之魏蕭寶寅之敗也有司處以死刑詔免為庶人雍州刺史楊椿有疾求解復以寶寅為都督雍涇等四州諸軍事征西將軍雍州刺史開府儀同三司西討大都督自關以西皆受節度椿還鄉里其子昱將適洛陽椿謂之曰當今雍州刺史亦無踰寶寅者但其上佐朝廷應遣心膂重人何得任其牒用此乃聖朝百慮之一失也且寶寅不藉刺史為榮吾觀其得州喜恱特甚至於賞罰云為不依常憲恐有異心汝今赴京師當以吾此意啓二聖并白宰輔更遣長史司馬防城都督欲安關中正須三人耳如不遣必成深憂昱面啓魏主及太后皆不聽秋七月魏相州刺史樂安王鑒與北道都督裴衍共救信都鑒幸魏多故隂有異志遂據鄴叛降葛榮八月魏遣都督源子雍李神軌裴衍攻鄴子雍行及湯隂樂安王鑒遣弟斌之夜襲子雍營不克子雍乘勝進圍鄴城丁未拔之斬鑒傳首洛陽改姓拓跋氏魏因遣子雍裴衍討葛榮九月秦州城民杜粲殺莫折念生闔門皆盡粲自行州事南秦州城民辛琛亦自行州事遣使詣蕭寶寅請降魏復以寶寅為尚書令還其舊封蕭寶寅之敗於涇州也或勸之歸罪洛陽或曰不若留關中立功自效行臺都令史河間馮景曰擁兵不還此罪將大寶寅不從自念出師纍年糜費不資一旦覆敗內不自安魏朝亦疑之中尉酈道元素名嚴猛司州牧汝南王恱嬖人丘念弄權縱恣道元收念付獄恱請之於胡太后太后敕赦之道元殺之并以劾恱時寶寅反狀已露恱乃奏以道元為關右大使寶寅聞之謂為取已甚懼長安輕薄子弟復勸使舉兵寶寅以問河東柳楷楷曰大王齊明帝子天下所屬今日之舉實允人望且謠言鸞生十子九子毈一子不毈關中亂亂者治也大王當治關中何所疑道元至隂盤驛寶寅遣其將郭子恢攻殺之收殯其尸表言白賊所害又上表自理稱為楊椿父子所譖寶寅行臺郎中武功蘇湛卧病在家寶寅令湛從母弟開府屬天水薑儉説湛曰元略受蕭衍旨欲見勦除道元之來事不可測吾不能坐受死亡今須為身計不復作魏臣矣死生榮辱與卿共之湛聞之舉聲大哭儉遽止之曰何得便爾湛曰我百口今屠滅云何不哭哭數十聲徐謂儉曰為我白齊王王本以窮鳥投人賴朝廷假王羽翼榮寵至此屬國步多虞不能竭忠報德乃欲乘人間隙信惑行路無識之語欲以羸敗之兵守關問鼎今魏德雖衰天命未改且王之恩義未洽於民但見其敗未見有成蘇湛不能以百口為王族滅寶寅復使謂曰我救死不得不爾所以不先相白者恐沮吾計耳湛曰凡謀大事當得天下竒才與之從事今但與長安博徒謀之此有成理不湛恐荆棘必生於齋閣願賜骸骨還鄉里庶得病死下見先人寶寅素重湛且知其不為己用聽還武功冬十月甲寅寶寅自稱齊帝改元隆緒赦其所部置百官都督長史毛遐鴻賔之兄也與鴻賔帥氐羌起兵於馬祇柵以拒寶寅寶寅遣大將軍盧祖遷擊之為遐所殺寶寅方祀南郊行即位禮未畢聞敗色變不暇整部伍狼狽而歸以薑儉為尚書左丞委以心腹文安周惠逹為寶寅使在洛陽有司欲收之惠逹逃歸長安寶寅以惠逹為光祿勳丹楊王蕭贊聞寶寅反懼而出走趣白鹿山至河橋為人所獲魏主知其不預謀釋而慰之行臺郎封偉伯等與關中豪傑謀舉兵誅寶寅事泄而死魏以尚書僕射長孫稚為行臺以討寶寅正平民薛鳯賢及宗人薛修義亦聚衆河東分據鹽池攻圍蒲坂東西連結以應寶寅詔都督宗正珍孫討之十一月葛榮圍魏信都自春及冬冀州刺史元孚帥勵將士晝夜拒守糧儲既竭外無救援己丑城陷榮執孚逐出居民凍死者什六七孚兄祐為防城都督榮大集將士議其生死孚兄弟各自引咎爭相為死都督潘紹等數百人皆叩頭請就法以活使君榮曰此皆魏之忠臣義士於是同禁者五百人皆得免魏以源子雍為冀州刺史將兵討榮裴衍表請同行詔許之子雍上言衍行臣請留臣行請留衍若逼使同行敗在旦夕不許十二月戊申行至陽平東北漳水曲榮帥衆十萬擊之子雍衍俱敗死相州吏民聞冀州已陷子雍等敗人不自保相州刺史恆農李神志氣自若撫勉將士大小致力葛榮盡鋭攻之卒不能克二年春正月魏北道行臺楊津守定州城居鮮于修禮杜洛周之間迭來攻圍津蓄薪糧治器械隨機拒擊賊不能克津潛使人以鐵劵説賊黨賊黨有應津者遺津書曰賊所以圍城正為取北人耳城中北人宜盡殺之不然必為患津悉收北人內子城中而不殺衆無不感其仁及葛榮代修禮統衆使人説津許以為司徒津斬其使固守三年杜洛周圍之魏不能救津遣其子遁突圍出詣柔然頭兵可汗求救遁日夜泣請頭兵遣其從祖吐豆發帥精騎一萬南出前鋒至廣昌賊塞隘口柔然遂還己丑津長史李裔引賊入執津欲烹之既而捨之瀛州刺史元寧以城降洛周蕭寶寅圍馮翊未下長孫稚軍至恆農行臺左丞楊侃謂稚曰昔魏武與韓遂馬超據潼關相拒遂超之才非魏武敵也然而勝負久不決者扼其險要故也今賊守禦已固雖魏武復生無以施其智勇不如北取蒲坂渡河而西入其腹心置兵死地則華州之圍不戰自解潼關之守必內顧而走支節既解長安可坐取也若愚計可取願為明公前驅稚曰子之計則善矣然今薛修義圍河東薛鳯賢據安邑宗正珍孫守虞坂不得進如何可往侃曰珍孫行陳一夫因緣為將可為人使安能使人河東治在蒲反西逼河漘封疆多在郡東修義驅帥士民西圍郡城其父母妻子皆留舊村一旦聞官軍來至皆有內顧之心必望風自潰矣稚乃使其子彥與侃帥騎兵自恆農北渡據右錐壁侃聲言今且停此以待步兵且觀民情向背命送降名者各自還村俟臺軍舉三烽當亦舉烽相應其無應烽者乃賊黨也當進擊屠之以所獲賞軍於是村民轉相告語雖實未降者亦詐舉烽一宿之間火光遍數百里賊圍城者不測其故各自散歸修義亦逃還與鳯賢俱請降丙子稚克潼關遂入河東蕭寶寅遣其將侯終德擊毛遐會郭子恢等屢為魏軍所敗終德因其勢挫還軍襲寶寅至白門寶寅始覺丁丑與終德戰敗攜其妻南陽公主及其少子帥麾下百餘騎自後門出奔万俟醜奴醜奴以寶寅為太傅二月葛榮擊杜洛周殺之併其衆三月癸未葛榮陷魏滄州執刺史薛慶之居民死者什八九夏六月葛榮軍乏食遣其僕射任褒將兵南掠至沁水魏以元天穆為大都督東北道諸軍事帥宗正珍孫等討之前幽州平北府主簿河間邢杲帥河北流民十萬餘户反於青州之北海自稱漢王改元天統戊申魏以征東將軍李叔仁為車騎大將軍儀同三司帥衆討之辛亥魏主詔曰朕當親御六戎掃靜燕代以大將軍爾朱榮為左軍上黨王天穆為前軍司徒楊椿為右軍司空穆紹為後軍葛榮退屯相州之北秋七月万俟醜奴自稱天子置百官會波斯國獻師子於魏醜奴留之改元神獸八月葛榮引兵圍鄴衆號百萬遊兵已過汲郡所至殘掠爾朱榮啓求討之九月爾朱榮召從子肆州刺史天光留鎮晉陽曰我身不得至處非汝無以稱我心自帥精騎七千馬皆有副倍道兼行東出滏口以侯景為前驅葛榮為盜日久橫行河北爾朱榮衆寡非敵議者謂無取勝之理葛榮聞之喜見於色令其衆曰此易與耳諸人俱辦長繩至則縛取自鄴以北列陳數十里箕張而進爾朱榮濳軍山谷為竒兵分督將已上三人為一處處有數百騎令所在揚塵鼓譟使賊不測多少又以人馬逼戰刀不如棒勒軍士齎袖棒一枚置於馬側至戰時慮廢騰逐不聽斬級以棒棒之而已分命壯勇所向衝突號令嚴明戰士同奮爾朱榮身自陷陳出於賊後表裏合擊大破之於陳擒葛榮餘衆悉降以賊徒既衆若即分割恐其疑懼或更結聚乃下令各從所樂親屬相隨任所居止於是羣情大喜登即四散數十萬衆一朝散盡待出百里之外乃始分道押領隨便安置咸得其宜擢其渠帥量才授任新附者咸安時人服其處分機速以檻車送葛榮赴洛冀定滄瀛殷五州皆平時上黨王天穆軍於朝歌之南穆紹楊椿猶未發而葛榮已滅乃皆罷兵乙亥魏大赦改元永安辛巳以爾朱榮為大丞相都督河北畿外諸軍事以楊椿為太保城陽王徽為司徒冬十月丁亥葛榮至洛魏主御閶闔門引見斬於都市十二月葛榮餘黨韓樓復據幽州反北邊被其患爾朱榮以撫軍將軍賀拔勝為大都督鎮中山樓畏勝威名不敢南出中大通元年三月壬戌魏詔上黨王天穆討邢杲夏四月辛丑破邢杲於濟南杲降送洛陽斬之秋九月爾朱榮使大都督尖山侯淵討韓樓於薊配卒甚少騎止七百或以為言榮曰侯淵臨機設變是其所長若揔大衆未必能用今以此衆擊此賊必能取之淵遂廣張軍聲多設供具親帥數百騎深入樓境去薊百餘里值賊帥陳周馬步萬餘淵濳伏以乘其背大破之虜其卒五千餘人尋還其馬仗縱令入城左右諌曰既獲賊衆何為復資遣之淵曰我兵既少不可力戰須為竒計以離間之乃可克也淵度其已至遂帥騎夜進昧旦叩其城門韓樓果疑降卒為淵內應遂走追擒之幽州平以淵為平州刺史鎮范陽先是魏使征東將軍劉靈助兼尚書左僕射慰勞幽州流民於濮陽頓丘因帥流民北還與侯淵共滅韓樓仍以靈助行幽州事加車騎將軍又為幽平營安四州行臺万俟醜奴攻魏東秦州拔之殺刺史髙子朗二年春正月万俟醜奴侵擾關中魏爾朱榮遣武衛將軍賀拔嶽討之嶽私謂其兄勝曰醜奴勍敵也今攻之不勝固有罪勝之讒嫉將生勝曰然則奈何嶽曰願得爾朱氏一人為帥而佐之勝為之言於榮榮恱以爾朱天光為使持節都督二雍二岐諸軍事驃騎大將軍雍州刺史以嶽為左大都督又以征西將軍代郡侯莫陳恱為右大都督並為天光之副以討之天光初行唯配軍士千人發洛陽以西路次民馬以給之時赤水蜀賊斷路詔侍中楊侃先行慰諭并稅其馬蜀持疑不下軍至潼關天光不敢進嶽曰蜀賊鼠竊公尚遲疑若遇大敵將何以戰天光曰今日之事一以相委嶽遂進擊蜀於渭北破之獲馬二千匹簡其壯健以充軍士又稅民馬合萬餘匹以軍士尚少淹留未進榮怒遣騎兵參軍劉貴乘驛至軍中責天光杖之一百以軍士二千人助之三月醜奴自將其衆圍岐州遣其大行臺尉遲菩薩僕射万俟仵自武功南渡渭攻圍趣柵天光使賀拔嶽將千騎救之菩薩等已拔柵而還嶽故殺掠其吏民以挑之菩薩帥步騎二萬至渭北嶽以輕騎數十自渭南與菩薩隔水而語稱揚國威菩薩令省事傳語嶽怒曰我與菩薩語卿何人也射殺之明日復引百餘騎隔水與賊語稍引而東至水淺可涉之處嶽即馳馬東出賊以為走乃棄步兵輕騎南渡渭追嶽嶽依橫岡設伏兵以待之賊半度岡東嶽還兵擊之賊敗走嶽下令賊下馬者勿殺賊悉投馬俄獲三千人馬亦無遺遂擒菩薩仍度渭北降步卒萬餘并收其輜重醜奴聞之棄岐州北走安定置柵於平亭天光方自雍至岐與嶽合夏四月天光至汧渭之間停軍牧馬宣言天時將熱未可行師俟秋涼更圖進止獲醜奴覘候者縱遣之醜奴信之散衆耕於細川使其太尉侯伏侯元進將兵五千據險立柵其餘千人已下為柵者甚衆天光知其勢分晡時密嚴諸軍相繼俱發黎明圍元進大柵拔之所得俘囚一皆縱遣諸柵聞之皆降天光晝夜徑進抵安定城下賊涇州刺史侯幾長貴以城降醜奴棄平亭走欲趣高平天光遣賀拔嶽輕騎追之丁卯及於平涼賊未成列直閣代郡侯莫陳崇單騎入賊中於馬上生擒醜奴因大呼衆皆披靡無敢當者後騎益集賊衆崩潰遂大破之天光進逼高平城中執送蕭寶寅以降甲戌魏以關中平大赦万俟醜奴蕭寶寅至洛陽置閶闔門外都街之中士女聚觀凡三日丹陽王蕭贊表請寶寅之命吏部尚書李神雋黃門侍郎高道穆素與寶寅善欲左右之言於魏主曰寶寅叛逆事在前朝會應詔王道習自外至帝問道習在外所聞對曰唯聞李尚書高黃門與蕭寶寅周款並居得言之地必能全之且二人謂寶寅叛逆在前朝寶寅為醜奴太傅豈非陛下時邪賊臣不翦法欲安施帝乃賜寶寅死於駝牛署斬醜奴於都市夏六月万俟醜奴既敗自涇豳以西至靈州賊黨皆降於魏唯所署行臺万俟道洛帥衆六千逃入山中不降時高平大旱爾朱天光以馬乏草退屯城東五十里遣都督長孫邪利帥二百人行原州事以鎮之道洛濳與城民通謀掩襲邪利并其所部皆殺之天光帥諸軍赴之道洛出戰而敗帥其衆西入牽屯山據險自守爾朱榮以天光失邪利不獲道洛復遣使杖之一百以詔書黜天光為撫軍將軍雍州刺史降爵為侯天光追擊道洛於牽屯道洛敗走入隴歸略陽賊帥王慶雲道洛驍果絶倫慶雲得之甚喜謂大事可濟遂稱帝於水洛城置百官以道洛為大將軍秋七月天光帥諸軍入隴至水洛城慶雲道洛出戰天光射道洛中臂失弓還走拔其東城賊併兵趣西城城中無水衆渴乏有降者言慶雲道洛欲突走天光恐失之乃遣人招諭慶雲使早降曰若未能自決當聽諸人今夜共議明晨早報慶雲等冀得小緩因待夜突出乃報曰請俟明日天光因使謂曰知須水今相為小退任取澗水飲之賊衆恱無復走心天光密使軍士多作木槍各長七尺昏後繞城布列要路加厚又伏人槍中僃其衝突兼令密縛長梯於城北其夜慶雲道洛果馳馬突出遇槍馬各傷倒伏兵起即時擒之軍士緣梯入城餘衆皆出城南遇槍而止窮窘乞降丙子天光悉收其仗而坑之死者萬七千人分其家口於是三秦河渭瓜涼鄯州皆降天光頓軍略陽詔復天光官爵尋加侍中儀同三司以賀拔嶽為涇州刺史侯莫陳恱為渭州刺史秦州城民謀殺刺史駱超南秦州城民謀殺刺史辛顯超顯皆覺之走歸天光天光遣兵討平之步兵校尉宇文泰從賀拔嶽入關以功遷征西將軍行原州事時關隴雕弊泰撫以恩信民皆感恱曰早遇宇文使君吾輩豈從亂乎元皓入洛梁武帝天監八年秋九月辛巳魏封故北海王詳子皓為北海王大通二年春正月癸亥魏以北海王皓為驃騎大將軍開府儀同三司相州刺史夏四月魏北海王皓將之相州至汲郡聞葛榮南侵及爾朱榮縱暴隂為自安之計盤桓不進以其舅殷州刺史范遵行相州事代前刺史李神守鄴行臺甄密知皓有異志相帥廢遵復推李神攝州事遣兵迎皓且察其變皓聞之帥左右來奔冬十月帝以魏北海王皓為魏王遣東宫直閣將軍陳慶之將兵送之還北元皓取魏銍城而據之中大通元年夏四月魏元天穆將擊邢杲以北海王皓方入冦集文武議之衆皆曰杲衆強盛宜以為先行臺尚書薛琡曰邢杲兵衆雖多鼠竊狗偷非有逺志皓帝室近親來稱義舉其勢難測宜先去之天穆以諸將多欲擊杲又魏朝亦以皓為孤弱不足慮命天穆等先定齊地還師擊皓遂引兵東出皓與陳慶之乘虛自銍城進拔滎城遂至梁國魏丘大千有衆七萬分築九城以拒之慶之攻之自旦至申拔其三壘大千請降皓登壇燔燎即帝位於睢陽城南改元孝基五月丁巳魏以東南道大都督楊昱鎮滎陽尚書僕射爾朱世隆鎮虎牢侍中爾朱丗承鎮崿坂乙丑內外戒嚴戊辰北海王皓克梁國皓以陳慶之為衛將軍徐州刺史引兵而西楊昱擁衆七萬據滎陽慶之攻之未拔皓遣人説昱使降昱不從元天穆與驃騎將軍爾朱吐沒兒將大軍前後繼至梁士卒皆恐慶之解鞍秣馬諭將士曰吾至此以來屠城略地實為不少君等殺人父兄掠人子女亦無算矣天穆之衆皆是仇讎我輩衆才七千虜衆三十餘萬今日之事唯有必死乃可得生耳虜騎多不可與之野戰當及其未盡至急攻取其城而據之諸君勿或狐疑自取屠膾乃鼓之使登城將士即相帥蟻附而入癸酉拔滎陽執楊昱諸將三百餘人伏皓帳前請曰陛下渡江三十里無遺鏃之費昨滎陽城下一朝殺傷五百餘人願乞楊昱以快衆意皓曰我在江東聞梁王言初舉兵下都袁昻為吳郡不降每稱其忠節楊昱忠臣奈何殺之此外唯卿等所取於是斬昱所部統帥三十七人皆刳其心而食之俄而天穆等引兵圍城慶之帥騎三千貫城力戰大破之天穆吐沒兒皆走慶之進擊虎牢爾朱丗隆棄城走獲魏東中郎將辛纂魏主將出辭皓未知所之或勸之長安中書舍人高道穆曰關中荒殘何可復往皓士衆不多乘虛深入由將帥不得其人故能至此陛下若親帥宿衛高募重賞背城一戰臣等竭其死力破皓孤軍必矣或恐勝負難期則車駕不若渡河徵大將軍天穆大丞相榮各使引兵來會掎角進討旬月之間必見成功此萬全之䇿也魏主從之甲戌魏主北行夜至河內郡北命高道穆於燭下作詔書數十紙布告逺近於是四方始知魏主所在乙亥魏主入河內臨淮王彧安豐王延明帥百僚封府庫僃法駕迎皓丙子皓入洛陽宫改元建武大赦以陳慶之為侍中車騎大將軍增邑萬户楊椿在洛陽椿弟順為冀州刺史兄子侃為北中郎將從魏主在河北皓意忌椿而以其家丗顯重恐失人望未敢誅也或勸椿出亡椿曰吾內外百口何所逃匿正當坐待天命耳皓後軍都督侯暄守睢陽為後援魏行臺崔孝芬大都督刁宣馳往圍暄晝夜急攻戊寅暄突走擒斬之上黨王天穆等帥衆四萬攻拔大梁分遣費穆將兵二萬攻虎牢皓使陳慶之擊之天穆畏皓將北渡河謂行臺郎中濟隂溫子升曰卿欲向洛為隨我北渡子升曰主上以虎牢失守致此狼狽元皓新入人情未安今往擊之無不克者大王平定京邑奉迎大駕此桓文之舉也捨此北渡竊為大王惜之天穆善之而不能用遂引兵渡河費穆攻虎牢將拔聞天穆北渡自以無後繼遂降於慶之慶之進擊大梁梁國皆下之慶之以數千之衆自發銍縣至洛陽凡取三十二城四十七戰所向皆克皓使黃門郎祖瑩作書遺魏主曰朕泣請梁朝誓在復恥正欲問罪於爾朱出卿於桎梏卿託命豺狼委身虎口假獲民地本是榮物固非卿有今國家隆替在卿與我若天道助順則皇魏再興脫或不然在榮為福於卿為禍卿宜三復富貴可保皓既入洛自河以南州郡多附之齊州刺史沛郡王欣集文武議所從曰北海長樂俱帝室近親今宗祏不移我欲受赦諸君意何如在坐莫不失色軍司崔光韶獨抗言曰元皓受制於梁引寇讎之兵以覆宗國此魏之賊臣亂子也豈唯大王家事所宜切齒下官等皆荷朝眷未敢仰從長史崔景茂等皆曰軍司議是欣乃斬皓使光韶亮之從父弟也於是襄州刺史賈思同廣州刺史鄭先護南兖州刺史元暹亦不受皓命思同思伯之弟也皓以冀州刺史元孚為東道行臺彭城郡王孚封送其書於魏主陽平王敬先起兵於河橋以討皓不克而死魏以侍中車騎將軍尚書右僕射爾朱世隆為使持節行臺僕射大將軍相州刺史鎮鄴城魏主之出也單騎而去侍衛後宫皆按堵如故皓一旦得之號令已出四方人情想其風政而皓自謂天授遽有驕怠之志宿昔賔客近習咸見寵待干擾政事日夜縱酒不恤軍國所從南兵陵暴市里朝野失望高道穆兄子儒自洛陽出從魏主魏主問洛中事子儒曰皓敗在旦夕不足憂也爾朱榮聞魏主北出即時馳傳見魏主於長子行且部分魏主即日南還榮為前驅旬日之間兵衆大集資糧器仗相繼而至六月壬午魏大赦榮既南下并肆不安乃以爾朱天光為并肆等九州行臺仍行并州事天光至晉陽部分約勒所部皆安己丑費穆至洛陽皓引入責以河隂之事而殺之皓使都督宗正珍孫與河內太守元襲據河內爾朱榮攻之上黨王天穆引兵會之壬寅拔其城斬珍孫及襲魏北海王皓既得志密與臨淮王彧安豐王延明謀叛梁以事難未平藉陳慶之兵力故外同內異言多猜忌慶之亦密為之僃説皓曰今遠來至此未服者尚多彼若知吾虛實連兵四合將何以禦之宜啓天子更請精兵并敕諸州有南人沒此者悉須部送皓欲從之延明曰慶之兵不出數千已自難制今更增其衆寧肯復為人用乎大權一去動息由人魏之宗廟於斯墜矣皓乃不用慶之言又慮慶之密啓乃表於上曰今河北河南一時克定惟爾朱榮尚敢跋扈臣與慶之自能擒討州郡新服正須綏撫不宜更復加兵搖動百姓上乃詔諸軍繼進者皆停於境上洛中南兵不滿一萬而羌胡之衆十倍軍副馬佛念謂慶之曰將軍威行河洛聲震中原功高勢重為魏所疑一旦變生不測可無慮乎不若乘其無僃殺皓據洛此千載一時也慶之不從皓先以慶之為徐州刺史因固求之鎮皓心憚之不遣曰主上以洛陽之地全相任委忽聞捨此朝寄欲往彭城謂君遽取富貴不為國計非徒有損於君恐僕并受其責慶之不敢復言爾朱榮與皓相持於河上慶之守北中城皓自據南岸慶之三日十一戰殺傷甚衆有夏州義士為皓守河中渚隂與榮通謀求破橋立效榮引兵赴之及橋破榮應接不逮皓悉屠之榮悵然失望又以安豐王延明緣河固守而北軍無船可渡議欲還北更圖後舉黃門郎楊侃曰大王發并州之日已知夏州義士之謀指來應之邪為欲廣施經略匡復帝室乎夫用兵者何嘗不散而更合瘡愈更戰況今未有所損豈可以一事不諧而衆謀頓廢乎今四方顒顒視公此舉若未有所成遽復引歸民情失望各懷去就勝負所在未可知也不若徵發民材多為桴筏間以舟楫緣河布列數百里中皆為渡勢首尾既逺使皓不知所防一旦得渡必立大功高道穆曰今乘輿飄蕩主憂臣辱大王擁百萬之衆輔天子而令諸侯若分兵造筏所在散渡指掌可克奈何捨之北歸使皓復得完聚徵兵天下此所謂養虺成蛇悔無及矣榮曰楊黃門已陳此䇿當相與議之劉靈助言於榮曰不出十日河南必平伏波將軍正平楊檦與其族居馬渚自言有小船數艘求為鄉導戊辰榮命車騎將軍爾朱兆與大都督賀拔勝縛材為筏自馬渚西硤石夜渡襲擊皓子領軍將軍冠受擒之安豐王延明之衆聞之大潰皓失據帥麾下數百騎南走陳慶之收步騎數千結陳東還皓所得諸城一時復降於魏爾朱榮自追陳慶之會嵩高水漲慶之軍士死散略盡乃削須髮為沙門間行出汝隂還建康猶以功除右衛將軍封永興縣侯中軍大都督兼領軍大將軍楊津入宿殿中掃灑宫庭封閉府庫出迎魏主於北邙流涕謝罪帝慰勞之庚午帝入居華林園大赦以爾朱兆為車騎大將軍儀同三司北來軍士及隨駕文武諸立義者加五級河北執事之官及河南立義者加二級壬申加大丞相榮天柱大將軍增封通前二十萬户北海王皓自轘轅南出至臨潁從騎分散臨潁縣卒江豐斬之癸酉傳首洛陽臨淮王彧復自歸於魏主安豐王延明攜妻子來奔乙亥魏主宴勞爾朱榮上黨王天穆及北來督將於都亭出宫人三百繒錦雜綵數萬匹班賜有差凡受元皓爵賞階復者悉追奪之元魏之亂梁武帝天監十八年春正月魏征西將軍平陸文侯張彝之子仲瑀上封事求銓削選格排抑武人不使豫清品於是喧謗盈路立榜大巷克期會集屠害其家彞父子晏然不以為意二月庚午羽林虎賁近千人相帥至尚書省詬罵求仲瑀兄左民郎中始均不獲以瓦石擊省門上下懾懼莫敢禁討遂持火掠道中薪蒿以杖石為兵器直造其第曳彞堂下捶辱極意唱呼動地焚其第舍始均踰垣走復還拜賊請其父命賊就毆擊生投之火中仲瑀重傷走免彞僅有餘息再宿而死逺近震駭胡太后收掩羽林虎賁凶強者八人斬之其餘不復窮治乙亥大赦以安之因令武官得依資入選識者知魏之將亂矣初燕燕郡太守髙湖奔魏其子謐為侍御史坐法徙懷朔鎮丗居北邊遂習鮮卑之俗謐孫歡沈深有大志家貧執役在平城富人婁氏女見而竒之遂嫁焉始有馬得給鎮為函使至洛陽見張彞之死還家傾資以結客或問其故歡曰宿衛相帥焚大臣之第朝廷懼其亂而不問為政如此事可知矣財物豈可常守邪歡與懷朔省事雲中司馬子如秀容劉貴中山賈顯智戶曹史咸陽孫騰外兵史懷朔侯景獄掾善無尉景廣寧蔡雋特相友善並以任俠雄於鄉里普通五年秀容酋長爾朱榮羽健之玄孫也榮神機明決御衆嚴整時四方兵起榮隂有大志散其畜牧資財招合驍勇結納豪傑於是侯景司馬子如賈顯度及五原段榮太安竇泰皆往依之顯度顯智之兄也六年初鄭羲之兄孫儼為司徒胡國珍行參軍私得幸於太后人未之知蕭寶寅西討以儼為開府屬太后再攝政儼請奉使還朝太后留之拜諌議大夫中書舍人領尚食典御晝夜禁中每休沐太后嘗遣宦者隨之儼見其妻唯得言家事而已中書舍人樂安徐紇粗有文學先以諂事趙修坐徙枹罕後還復除中書舍人又諂事清河王懌懌死出為鴈門太守還洛復諂事元義義敗太后以紇為懌所厚復召為中書舍人紇又諂事鄭儼儼以紇有智數仗為謀主紇以儼有內寵傾身承接共相表裏勢傾內外號為徐鄭儼纍遷至中書令車騎將軍紇纍遷至給事黃門侍郎仍領舍人揔攝中書門下之事軍國詔令莫不由之紇有機辨強力終日治事略無休息不以為勞時有急詔令數吏執筆或行或卧人别占之造次俱成不失事理然無經國大體專好小數見人矯為恭謹逺近輻湊附之給事黃門侍郎袁翻李神軌皆領中書舍人為太后所信任時人云神軌亦得幸於太后衆莫能明也大通二年春二月魏靈太后再臨朝以來嬖佞用事政事縱弛威恩不立盜賊蜂起封疆日蹙魏肅宗年浸長太后自以所為不謹恐左右聞之於帝凡帝所愛信者太后輒以事去之務為壅蔽不使帝知外事通直散騎常侍昌黎谷士恢有寵於帝使領左右太后屢諷之欲用為州士恢懷寵不願出外太后乃誣以罪而殺之有蜜多道人能胡語帝嘗置左右太后使人殺之於城南而詐懸賞購賊由是母子之間嫌隙日深是時車騎將軍儀同三司并肆汾廣恆雲六州討虜大都督爾朱榮兵勢強盛魏朝憚之高歡假榮尉景蔡雋先在杜洛周黨中欲圖洛周不果逃奔葛榮又亡歸爾朱榮劉貴先在爾朱榮所屢薦歡於榮榮見其憔悴未之竒也歡從榮之馬廄廄有悍馬榮命歡翦之歡不加羈絆而翦之竟不蹄齧起謂榮曰御惡人亦猶是矣榮竒其言坐歡於牀下屏左右訪以時事歡曰聞公有馬十二谷色别為羣畜此竟何用也榮曰但言爾意歡曰今天子暗弱太后淫亂嬖孽擅命朝政不行以明公雄武乘時奮發討鄭儼徐紇之罪以清帝側霸業可舉鞭而成此賀六渾之意也榮大恱語自日中至夜半乃出自是每參軍謀并州刺史元天穆孤之五丗孫也與榮善榮兄事之榮常與天穆及帳下都督賀拔嶽密謀欲舉兵入洛內誅嬖幸外清羣盜二人皆勸成之榮上書以山東羣盜方熾冀定覆沒官軍屢敗請遣精騎三千東援相州太后疑之報以念生梟戮寶寅就擒醜奴請降關隴已定費穆大破羣蠻絳蜀漸平又北海王皓帥衆二萬出鎮相州不須出兵榮復上書以為賊勢雖衰官軍屢敗人情危怯恐實難用若不更思方略無以萬全臣愚以為蠕蠕主阿那瓌荷國厚恩未應忘報宜遣發兵東趣下口以躡其背北海之軍嚴加警僃以當其前臣麾下雖少輒盡力命自井陘以北滏口以西分據險要攻其肘腋葛榮雖并洛周威恩未著人類差異形勢可分遂勒兵召集義勇北捍馬邑東塞井陘徐紇説太后以鐵劵間榮左右榮聞而恨之魏肅宗亦惡儼紇等逼於太后不能去密詔榮舉兵內向欲以脅太后榮以髙歡為前鋒行至上黨帝復以私詔止之儼紇恐禍及已隂與太后謀鴆帝癸丑帝暴殂甲寅太后立皇女為帝大赦既而下詔稱潘充華本實生女故臨洮王寶暉丗子釗體自髙祖宜膺大寶百官文武加二階宿衛加三階乙卯釗即位釗始生三嵗太后欲久專政故貪其幼而立之爾朱榮聞之大怒謂元天穆曰主上晏駕春秋十九海內猶謂之幼君況今奉未言之兒以臨天下欲求治安其可得乎吾欲帥鐵騎赴哀山陵翦誅姦佞更立長君何如天穆曰此伊霍復見於今矣乃抗表稱大行皇帝背棄萬方海內咸稱鴆毒致禍豈有天子不豫𥘉不召醫貴戚大臣皆不侍側安得不使遠近怪愕又以皇女為儲兩虛行赦宥上欺天地下惑朝野已乃選君於孩提之中實使姦豎專朝隳亂綱紀此何異掩目捕雀塞耳盜鍾今羣盜沸騰鄰敵窺窬而欲以未言之兒鎮安天下不亦難乎願聽臣赴闕參預大議問侍臣帝崩之由訪禁衛不知之狀以徐鄭之徒付之司敗雪同天之恥謝逺近之怨然後更擇宗親以承寶祚榮從弟丗隆時為直閣太后遣詣晉陽慰諭榮榮欲留之丗隆曰朝廷疑兄故遣世隆來今留丗隆使朝廷得預為之僃非計也乃遣之三月爾朱榮與元天穆議以彭城武宣王有忠勳其子長樂王子攸素有令望欲立之又遣從子天光及親信奚毅倉頭王相入洛與爾朱丗隆密議天光見子攸具論榮心子攸許之天光等還晉陽榮猶疑之乃以銅為顯祖諸子孫各鑄像唯長樂王像成榮乃起兵發晉陽丗隆逃出會榮於上黨靈太后聞之甚懼悉召王公等入議宗室大臣皆疾太后所為莫肯致言徐紇獨曰爾朱榮小胡敢稱兵向闕文武宿衛足以制之但守險要以逸待勞彼懸軍千里士馬疲弊破之必矣太后以為然以黃門侍郎李神軌為大都督帥衆拒之别將鄭季明鄭先護將兵守河橋武衛將軍費穆屯小平津先護儼之從祖兄弟也榮至河內復遣王相密至洛迎長樂王子攸夏四月丙申子攸與兄彭城王劭弟霸城公子王濳自高渚渡河丁酉會榮於河陽將士咸稱萬嵗戊戌濟河子攸即帝位以劭為無上王子正為始平王以榮為侍中都督中外諸軍事大將軍尚書令領軍將軍領左右封太原王鄭先護素與敬宗善聞帝即位與鄭季明開城納之李神軌至河橋聞北中不守即遁還費穆棄衆先降於榮徐紇矯詔夜開殿門取驊騮廄御馬十匹東奔兖州鄭儼亦走還鄉里太后盡召肅宗後宫皆令出家太后亦自落髮榮召百官迎車駕己亥百官奉璽綬僃法駕迎敬宗於河橋庚子榮遣騎執太后及幼主送至河隂太后對榮多所陳説榮拂衣而起沈太后及幼主於河費穆密説榮曰公士馬不出萬人今長驅向洛前無橫陳既無戰勝之威群情素不厭服以京師之衆百官之盛知公虛實有輕侮之心若不大行誅罰更樹親黨恐公還北之日未度太行而內變作矣榮心然之謂所親慕容紹宗曰洛中人士繁盛驕侈成俗不加芟翦終難制馭吾欲因百官出迎悉誅之何如紹宗曰太后荒淫失道嬖幸弄權殽亂四海故明公興義兵以清朝廷今無故殱夷多士不分忠佞恐大失天下之望非長䇿也榮不聽乃請帝循河西至淘渚引百官於行宫西北云欲祭天百官既集列胡騎圍之責以天下喪亂肅宗暴崩皆由朝臣貪虐不能匡弼因縱兵殺之自丞相高陽王雍司空元欽儀同三司義陽王略以下死者二千餘人前黃門郎王遵業兄弟居父喪其母敬宗之從母也相帥出迎俱死遵業慧龍之孫也雋爽涉學時人惜其才而譏其躁有朝士百餘人後至榮復以胡騎圍之令曰有能為禪文者免死侍御史趙元則出應募遂使為之榮又令其軍士言元氏既滅爾朱氏興皆稱萬嵗榮又遣數十人拔刀向行宫帝與無上王劭始平王子正俱出帳外榮先遣并州人郭羅剎西部高車叱烈殺鬼侍帝側詐言防衛抱帝入帳餘人即殺劭及子正又遣數十人遷帝於河橋置之幕下帝憂憤無計使人諭旨於榮曰帝王迭興盛衰無常今四方瓦解將軍奮袂而起所向無前此乃天意非人力也我本相投志在全生豈敢妄希天位將軍見逼以至於此若天命有歸將軍宜時正尊號若推而不居存魏社稷亦當更擇親賢而輔之時都督高歡勸榮稱帝左右多同之榮疑未決賀拔嶽進曰將軍首舉義兵志除姦逆大勳未立遽有此謀正可速禍未見其福榮乃自鑄金為像凡四鑄不成功曹參軍燕郡劉靈助善卜筮榮信之靈助言天時人事未可榮曰若我不吉當迎天穆立之靈助曰天穆亦不吉唯長樂王有天命耳榮亦精神恍惚不自支持久而方寤深自愧悔曰過誤若是唯當以死謝朝廷賀拔嶽請殺高歡以謝天下左右皆曰歡雖復愚踈言不思難今四方多事須藉武將請捨之收其後效榮乃止夜四更復迎帝還營榮望馬首叩頭請死榮所從胡騎殺朝士既多不敢入洛城即欲向北為遷都之計榮狐疑甚久武衛將軍泛禮固諫辛丑榮奉帝入城帝御太極殿下詔大赦改元建義從太原王將士普加五階在京文官二階武官三階百姓復租役三年時百官蕩盡存者皆竄匿不出唯散騎常侍山偉一人拜赦於闕下洛中士民草草人懷異慮或云榮欲縱兵大掠或云欲遷都晉陽富者棄宅貧者襁負率皆逃竄什不存一二直衛空虛官守曠廢榮乃上書稱大兵交際難可齊一諸王朝貴橫死者衆臣今粉軀不足塞咎乞追贈亡者微申私責無上王請追尊為無上皇帝自餘死於河隂者諸王贈三司三品贈令僕五品贈刺史七品已下及白民贈郡鎮死者無後聽繼即授封爵又遣使者循城勞問詔從之於是朝士稍出人心粗安封無上王之子韶為彭城王榮猶執遷都之議帝亦不能違都官尚書元諶爭之以為不可榮怒曰何關君事而固執也且河隂之役君應知之諶曰天下事當與天下論之奈何以河隂之酷而恐元諶諶國之宗室位居常伯生既無益死復何損正使今日碎首流腸亦無所懼榮大怒欲抵諶罪爾朱丗隆固諌乃止見者莫不震悚諶顔色自若後數日帝與榮登高見宫闕壯麗列樹成行乃歎曰臣昨愚暗有北遷之意今見皇居之盛熟思元尚書言深不可奪由是罷遷都之議庚戌魏賜爾朱榮子義羅爵梁郡主五月丁巳朔魏加爾朱榮北道大行臺爾朱榮入見魏主於明光殿重謝河橋之事誓言無復二心帝自起止之因復為榮誓言無疑心榮喜因求酒飲之熟醉帝欲誅之左右苦諌乃止即以牀輿向中常侍省榮夜半方寤遂逹旦不眠自此不復禁中宿矣榮女先為肅宗嬪榮欲敬宗立以為后帝疑未決給事黃門侍郎祖瑩曰昔文公在秦懷嬴入侍事有反經合義陛下獨何疑焉帝遂從之榮意甚恱榮舉止輕脫喜馳射每入朝見更無所為唯戲上下馬於西林園宴射恆請皇后出觀并召王公妃主共在一堂每見天子射中輒自起舞叫將相卿士悉皆盤旋乃至妃主亦不免隨之舉袂及酒酣耳熱必自匡坐唱虜歌日暮罷歸與左右連手踏地唱回波樂而出性甚嚴暴喜愠無恆刀槊弓矢不離於手每有瞋嫌即行擊射左右恆有死憂嘗見沙彌重騎一馬榮即令相觸力窮不復能動遂使傍人以頭相擊死而後已辛酉榮還晉陽帝餞之於邙隂榮令元天穆入洛陽加天穆侍中録尚書事京畿大都督兼領軍將軍以行臺郎中桑乾朱瑞為黃門侍郎兼中書舍人朝廷要官悉用其腹心為之魏貟外散騎常侍高乾祐之從子也與弟敖曹季式皆喜輕俠與魏主有舊爾朱榮之向洛也逃奔齊州聞河隂之亂遂集流民起兵於河濟之間受葛榮官爵頻破州軍魏王使元欣諭旨乾等乃降以乾為給事黃門侍郎兼武衛將軍敖曹為通直散騎侍郎榮以乾兄弟前為叛亂不應復居近要魏主乃聽解官歸鄉里敖曹復行抄掠榮誘執之與薛修義同拘於晉陽敖曹名昻以字行秋七月乙丑魏加爾朱榮柱國大將軍録尚書事初宇文肱從鮮于修禮攻定州戰死於唐河其子泰在修禮軍中修禮死從葛榮葛榮敗爾朱榮愛泰之才以為統軍辛巳以爾朱榮為大丞相都督河北畿外諸軍事榮子平昌公文殊樂昌公文暢並進爵為王中大通二年秋八月魏爾朱榮雖居外藩遙制朝政樹置親黨布列魏主左右伺察動靜大小必知魏主雖受制於榮然性勤政事朝夕不倦數親覽辭訟理寃獄榮聞之不恱帝又與吏部尚書李神雋議清治選部榮嘗關補曲陽縣令神雋以階懸不奏别更擬人榮大怒即遣所補者往奪其任神雋懼而辭位榮使尚書左僕射爾朱丗隆攝選榮啓北人為河南諸州帝未之許太宰天穆入見面論帝猶不許天穆曰天柱既有大功為國宰相若請普代天下官恐陛下亦不得違之如何啓數人為州遽不用也帝正色曰天柱若不為人臣朕亦須代如其猶存臣節無代天下百官之理榮聞之大恚恨曰天子由誰得立今乃不用我語爾朱皇后性妬忌屢致忿恚帝遣爾朱丗隆語以大理后曰天子由我家置立今便如此我父本即自作今亦復決丗隆曰止自不為若本自為之臣今亦封王矣帝既外逼於榮內迫皇后恆怏怏不以萬乘為樂唯幸冦盜未息欲使與榮相持及關隴既定告捷之日乃不甚喜謂尚書令臨淮王彧曰即今天下便是無賊彧見帝色不恱曰臣恐賊平之後方勞聖慮帝畏餘人怪之還以它語亂之曰然撫寧荒餘彌成不易榮見四方無事奏稱參軍許周勸臣取九錫臣惡其言已斥遣令去榮時望得殊禮故以意諷朝廷帝實不欲與之因稱嘆其忠榮好獵不捨寒暑列圍而進令士卒必齊一雖遇險阻不得違避一鹿逸出必數人坐死有一卒見虎而走榮謂曰汝畏死邪即斬之自是每獵士卒如登戰場嘗見虎在窮谷中榮令十餘人空手搏之毋得損傷死者數人卒擒得之以此為樂其下甚苦之太宰天穆從容謂榮曰大王勳業已盛四方無事唯宜修政養民順時搜狩何必盛夏馳逐感傷和氣榮攘袂曰靈后女主不能自正推奉天子乃人臣常節葛榮之徒本皆奴才乘時作亂譬如奴走擒獲即已頃來受國大恩未能混一海內何得遽言勳業如聞朝士猶自寬縱今秋欲與兄戒勒士馬校獵嵩高令貪汚朝貴入圍搏虎仍出魯陽歷三荆悉擁生蠻北填六鎮回軍之際掃平汾胡明年簡練精騎分出江淮蕭衍若降乞萬户侯如其不降以數千騎徑度縛取然後與兄奉天子巡四方乃可稱勳耳今不頻獵兵士懈怠安可復用也城陽王徽之妃帝之舅女侍中李彧延實之子帝之姊壻也徽彧欲得權寵惡榮為已害日毁榮於帝勸帝除之帝懲河隂之難恐榮終難保由是密有圖榮之意侍中楊侃尚書右僕射元羅亦預其謀會榮請入朝欲視皇后娩乳徽等勸帝因其入刺殺之唯膠東侯李侃晞濟隂王暉業言榮若來必當有僃恐不可圖又欲殺其黨與發兵拒之帝疑未定而洛陽人懷憂懼中書侍郎邢子才之徒已避之東出榮乃遍與朝士書相任去留中書舍人溫子升以書呈帝帝恆望其不來及見書以榮必來色甚不恱子才名邵以字行巒之族弟也時人多以字行者舊史皆因之武衛將軍奚毅建義初往來通命帝每期之甚重然猶以榮所親信不敢與之言情毅曰若必有變臣寧死陛下不能事契胡帝曰朕保天柱無異心亦不忘卿忠款爾朱丗隆疑帝欲為變乃為匿名書自榜其門云天子與楊侃高道穆等為計欲殺天柱取以呈榮榮自恃其強不以為意手毁其書唾地曰丗隆無膽誰敢生心榮妻北鄉長公主亦勸榮不行榮不從是月榮將四五千騎發并州時人皆言榮反又云天子必當圖榮九月榮至洛陽帝即欲殺之以太宰天穆在并州恐為後患故忍未發并召天穆有人告榮云帝欲圖之榮即具奏帝曰外人亦言王欲害我豈可信之於是榮不自疑每入謁帝從人不過數十又皆挺身不持兵仗帝欲止城陽王徽曰縱不反亦何可耐況不可保邪先是長星出中台掃大角恆州人高榮祖頗知天文榮問之對曰除舊布新之象也榮甚恱榮至洛陽行臺郎中李顯和曰天柱至那無九錫安須王自索也亦是天子不見機都督郭羅察曰今年真可作禪文何但九錫參軍禇光曰人言并州城上有紫氣何慮天柱不應之榮下人皆陵侮帝左右無所忌憚故其事皆上聞奚毅又見帝求間帝即下明光殿與語知其至誠乃召城陽王徽及楊侃李彧告以毅語榮小女適帝兄子陳留王寬榮嘗指之曰我終當得此壻力徽以白帝曰榮慮陛下終為己患脫有東宫必貪立孩幼若皇后不生太子則立陳留耳帝夢手把刀自割落十指惡之告徽及楊侃徽曰蝮蛇螫手壯士解腕割指亦是其類乃吉祥也戊子天穆至洛陽帝出迎之榮與天穆並從入西林園宴射榮奏曰近來侍官皆不習武陛下宜將五百騎出獵因省辭訟先是奚毅言榮欲因獵挾天子移都由是帝益疑之辛卯帝召中書舍人溫子升告以殺榮狀并問以殺董卓事子升具通本末帝曰王允若即赦涼州人必不應至此良久語子升曰朕之情理卿所具知死猶須為況不必死吾寧為高貴鄉公死不為常道鄉公生帝謂殺榮天穆即赦其黨皆應不動應詔王道習曰爾朱丗隆司馬子如朱元龍特為榮所委任具知天下虛實謂不宜留徽及楊侃皆曰若丗隆不全仲逺天光豈有來理帝亦以為然徽曰榮腰間嘗有刀或能狼戾傷人臨事願陛下起避之乃伏侃等十餘人於明光殿東其日榮與天穆並入坐食未訖起出侃等從東階上殿見榮天穆已至中庭事不果壬辰帝忌日癸巳榮忌日甲午榮暫入即詣陳留王家飲酒極醉遂言病動頻日不入帝謀頗泄丗隆又以告榮且勸其速發榮輕帝以為無能為曰何匆匆預帝謀者皆懼帝患之城陽王徽曰以生太子為辭榮必入朝因此斃之帝曰后懷孕始九月可乎徽曰婦人不及期而産者多矣彼必不疑帝從之戊戌帝伏兵於明光殿東序聲言皇子生遣徽馳騎至榮第告之榮方與上黨王天穆博徽脫榮帽歡舞盤旋兼殿內文武傳聲趣之榮遂信之與天穆俱入朝帝聞榮來不覺失色中書舍人溫子升曰陛下色變帝連索酒飲之帝令子升作赦文既成執以出遇榮自外入問是何文書子升顔色不變曰敕榮不取視而入帝在東序下西向坐榮天穆在御榻西北南向坐徽入始一拜榮見光祿少卿魯安典御李侃晞等抽刀從東戶入即起趨御坐帝先橫刀膝下遂手刃之安等亂斫榮與天穆同時俱死榮子菩提及車騎將軍爾朱陽覩等三十人從榮入宫亦為伏兵所殺帝得榮手板上有數牒啓皆左右去留人名非其腹心者悉在出限帝曰竪子若過今日遂不可制於是內外喜譟聲滿洛陽城百僚入賀帝登閶闔門下詔大赦遣武衛將軍奚毅前燕州刺史崔淵將兵鎮北中是夜爾朱丗隆奉北鄉長公主帥榮部曲焚西陽門出屯河隂衛將軍賀拔勝與榮黨田怡等聞榮死奔赴榮第時宫殿門猶未加嚴防怡等議即攻門勝止之曰天子既行大事必當有僃吾等衆少何可輕爾但得出城更為它計怡乃止及丗隆走勝遂不從帝甚嘉之朱瑞雖為榮所委而善處朝廷之間帝亦善遇之故瑞從丗隆走而中道逃還榮素厚金紫光祿大夫司馬子如榮死自宫中突出至榮第棄家隨榮妻子走出城丗隆即欲還北子如曰兵不厭詐今天下恟恟唯強是視當此之際不可以弱示人若亟北走恐變生肘腋不如分兵守河橋遣軍向京師出其不意或可成功假使不得所欲亦足示有餘力使天下畏我之強不敢叛散丗隆從之己亥攻河橋擒奚毅等殺之據北中城魏朝大懼遣前華陽太守假育慰諭之丗隆斬首以徇魏以雍州刺史爾朱天光為侍中儀同三司以司空楊津為都督并肆等九州諸軍事驃騎大將軍并州刺史兼尚書令北道大行臺經略河汾榮之入洛也以高敖曹自隨禁於駝牛署榮死帝引見勞勉之兄乾自東冀州馳赴洛陽帝以乾為河北大使敖曹為直閣將軍使歸招集鄉曲為表裏形援帝親送之於河橋舉酒指水曰卿兄弟冀部豪傑能令士卒致死京城儻有變可為朕河上一揚塵乾垂涕受詔敖曹援劒起舞誓以必死冬十月癸卯朔丗隆遣爾朱拂律歸將胡騎一千皆白服來至郭下索太原王尸帝升大夏門望之遣主書牛法尚謂之曰太原王立功不終隂圖舋逆王法無親已正刑書罪止榮身餘皆不問卿等若降官爵如故拂律歸曰臣等從太原王入朝忽致寃酷今不忍空歸願得太原王尸生死無恨因涕泣哀不自勝羣胡皆慟哭聲振城邑帝亦為之愴然遣侍中朱瑞齎鐵劵賜丗隆丗隆謂瑞曰太原王功格天地赤心奉國長樂不顧信誓枉加屠害今日兩行鐵字何足可信吾為太原王報讎終無降理瑞還白帝帝即出庫物置城西門外募敢死之士以討丗隆一日即得萬人與拂律歸等戰於郭外拂律歸等生長戎旅洛陽之人不習戰鬭屢戰不克甲辰以前車騎大將軍李叔仁為大都督帥衆討丗隆戊申皇子生大赦以中書令魏蘭根兼尚書左僕射為河北行臺定相殷三州皆稟蘭根節度爾朱氏兵猶在城下帝集羣臣博議皆恇懼不知所出通直散騎常侍李苗奮衣起曰今小賊唐突如此朝廷有不測之危正是忠臣烈士效節之日臣雖不武請以一旅之衆為陛下徑斷河橋城陽王徽高道穆皆以為善帝許之乙卯苗募人從馬渚上流乘船夜下去橋數里縱火船焚河橋倐忽而至爾朱氏兵在南岸者望之爭橋北度俄而橋絶溺死者甚衆苗將百許人泊於小渚以待南援官軍不至爾朱氏就擊之左右皆盡苗赴水死帝傷惜之贈車騎大將軍儀同三司封河陽侯諡曰忠烈丗隆亦收兵北遁丙辰詔行臺源子恭將步騎一萬出西道楊昱將募士八千出東道以討之子恭仍鎮太行丹谷築壘以防之丗隆至建州刺史陸希質閉城拒守丗隆攻拔之殺城中人無遺類以肆其忿唯希質走免詔以前東荆州刺史元顯恭為晉州刺史兼尚書左僕射西道行臺魏東徐州刺史廣長斛斯椿素依附爾朱榮榮死椿懼棄州歸汝南王恱汾州刺史爾朱兆聞榮死自汾州帥騎據晉陽丗隆至長子兆來會之壬申共推太原太守行并州事長廣王曄即皇帝位大赦改元建明曄英之弟子也以兆為大將軍進爵為王丗隆為尚書令賜爵樂平王加太傅司州牧又以榮從弟度律為太尉賜爵常山王丗隆兄天柱長史彥伯為侍中徐州刺史仲逺為車騎大將軍兼尚書左僕射三徐州大行臺仲逺亦起兵向洛陽爾朱天光之克平涼也宿勤明達請降既而復叛北走天光遣賀拔嶽討之明逹奔東夏嶽聞爾朱榮死不復窮追還涇州以待天光天光與侯莫陳恱亦下隴與嶽謀引兵向洛魏敬宗使朱瑞慰諭天光天光與嶽謀欲令帝外奔而更立宗室乃頻啓云臣實無異心惟欲仰奉天顔以申宗門之罪又使其下僚屬啓云天光密有異圖願思勝算以防之范陽太守盧文偉誘平州刺史侯淵出獵閉門拒之淵屯於郡南為榮舉哀勒兵南向進至中山行臺僕射魏蘭根邀擊之為淵所敗敬宗以城陽王徽兼大司馬録尚書事揔統內外徽意謂榮既死枝葉自應散落及爾朱丗隆等兵四起黨衆日盛徽憂怖不知所出性多忌嫉不欲人居已前每獨與帝謀議羣臣有獻䇿者徽輒勸帝不納且曰小賊何慮不平又靳惜財貨賞賜率皆薄少或多而中減或與而復追故徒有糜費而恩不感物十一月癸酉朔敬宗以車騎將軍鄭先護為大都督與行臺楊昱共討爾朱仲逺乙亥以司徒長孫稚為太尉臨淮王彧為司徒丙子進雍州刺史廣宗公爾朱天光爵為王長廣王亦以天光為隴西王爾朱仲逺攻西兖州丁丑拔之擒刺史王衍衍肅之兄子也癸未敬宗以右衛將軍賀拔勝為東征都督壬辰又以鄭先護兼尚書左僕射為行臺與勝共討仲逺戊戌詔罷魏蘭根行臺以定州刺史薛曇尚兼尚書為北道行臺鄭先護疑賀拔勝置之營外庚子勝與仲逺戰於滑臺東兵敗降於仲逺初爾朱榮嘗從容問左右曰一日無我誰可主軍皆稱爾朱兆榮曰兆雖勇於戰鬭然所將不過三千騎多則亂矣堪代我者唯賀六渾耳因戒兆曰爾非其匹終當為其穿鼻乃以高歡為晉州刺史及兆引兵向洛遣使召歡歡遣長史孫騰詣兆辭以山蜀未平今方攻討不可委去致有後憂定蜀之日當隔河為掎角之勢兆不恱曰還白髙晉州吾得吉夢夢與吾先人登高丘丘旁之地耕之已熟獨餘馬藺先人命吾拔之隨手而盡以此觀之往無不克騰還報歡曰兆狂愚如是而敢為悖逆吾勢不得久事爾朱矣十二月壬寅朔爾朱兆攻丹谷都督崔伯鳯戰死都督史仵龍開壁請降源子恭退走兆輕兵倍道兼行從河橋西涉渡先是敬宗以大河深廣謂兆未能猝濟是日水不沒馬腹甲辰暴風黃塵漲天兆騎叩宫門宿衛乃覺彎弓欲射矢不得發一時散走華山王鷙斤之玄孫也素附爾朱氏帝始聞兆南下欲自帥諸軍討之鷙説帝曰黃河萬仞兆安得渡帝遂自安及兆入宫鷙復約止衛兵不使鬪帝步出雲龍門外遇城陽王徽乘馬走帝屢呼之不顧而去兆騎執帝鎖於永寧寺樓上帝寒甚就兆求頭巾不與兆營於尚書省用天子金鼓設刻漏於庭撲殺皇子汙辱嬪御妃主縱兵大掠殺司空臨淮王彧尚書左僕射范陽王誨青州刺史李延實等城陽王徽走至山南抵前洛陽令冦祖仁家祖仁一門三刺史皆徽所引拔以有舊恩故投之徽齎金百斤馬五十匹祖仁利其財外雖容納而私謂子弟曰如聞爾朱兆購募城陽王得之者封千户侯今日富貴至矣乃怖徽云官捕將至令其逃於它所使人於路邀殺之送首於兆兆亦不加勳賞兆夢徽謂已曰我有金二百斤馬百匹在祖仁家卿可取之兆既覺意所夢為實即掩捕祖仁徴其金馬祖仁謂人密告望風款服云實得金百斤馬五十匹兆疑其隱匿依夢徵之祖仁家舊有金三十斤馬三十匹盡以輸兆兆猶不信發怒執祖仁懸首高樹大石墜足捶之至死爾朱丗隆至洛陽兆自以為已功責丗隆曰叔父在朝日久耳目應廣如何令天柱受禍按劒瞋目聲色甚厲丗隆遜辭拜謝然後得已由是深恨之爾朱仲逺亦自滑臺至洛戊申魏長廣王大赦爾朱榮之死也敬宗詔河西賊帥紇豆陵步蕃使襲秀容及兆入洛步蕃南下兵勢甚盛故兆不暇久留亟還晉陽以禦之使爾朱丗隆度律彥伯等留鎮洛陽甲寅兆遷敬宗於晉陽兆自於河梁監閲財資高歡聞敬宗向晉陽帥騎東巡以邀之不及因與兆書為陳禍福不宜害天子受惡名兆怒不納爾朱天光輕騎入洛見丗隆等即還雍州𥘉敬宗恐北軍不利欲為南走之計託云征蠻以高道穆為南道大行臺未及發而兆入洛道穆託疾去丗隆殺之主者請追李苗封贈丗隆曰當時衆議更一二日即欲縱兵大掠焚燒郭邑賴苗之故京師獲全天下之善一也不宜復追爾朱榮之死也丗隆等徵兵於大寧太守代人房謨謨不應前後斬其三使遣弟育詣洛陽及兆得志其黨建州刺史是蘭安定執謨繫州獄郡中蜀人聞之皆叛安定給謨弱馬令軍前慰勞諸賊見謨莫不遙拜謨先所乘馬安定别給將士戰敗蜀人得之謂謨遇害莫不悲泣善養其馬不聽人乘之兒童婦女競投草粟皆言此房公馬也爾朱丗隆聞之捨其罪以為其府長史北道大行臺楊津以衆少留鄴召募欲自滏口入并州會爾朱兆入洛津乃散衆輕騎還朝爾朱丗隆與兄弟密謀慮長廣王母衛氏干預朝政伺其出行遣數十騎如劫盜者於京巷殺之尋懸榜以千萬錢募賊甲子爾朱兆縊敬宗於晉陽三級佛寺并殺陳留王寬是月紇豆陵步蕃大破爾朱兆於秀容南逼晉陽兆懼使人召高歡并力僚屬皆勸歡勿應召歡曰兆方急保無它慮遂行歡所親賀拔焉過兒請緩行以弊之歡往往逗留辭以河無橋不得渡步蕃兵日盛兆屢敗告急於歡歡乃往從之兆時避步蕃南出步蕃至平樂郡歡與兆進兵合擊大破之斬步蕃於石鼓山其衆退走兆德歡相與誓為兄弟將數十騎詣歡通夜宴飲初葛榮部衆流入并肆者二十餘萬為契胡陵暴皆不聊生大小二十六反誅夷者半猶謀亂不止兆患之問計於歡歡曰六鎮反殘不可盡殺宜選王腹心使統之有犯者罪其帥則所罪者寡矣兆曰善誰可使者賀拔允時在坐請使歡領之歡拳驅其口折一齒曰平生天柱時奴輩伏處分如鷹犬今日天下事取捨在王而阿鞠泥敢僣易妄言請殺之兆以歡為誠遂以其衆委焉歡以兆醉恐醒而悔之遂出宣言受委統州鎮兵可集汾東受號令乃建牙陽曲川陳部分軍士素惡兆而樂屬歡莫不皆至居無何又使劉貴請兆以并肆頻嵗霜旱降戶掘田鼠而食之面無榖色徒汙人境內請令就食山東待溫飽更受處分兆從其議長史慕容紹宗諫曰不可方今四方紛擾人懷異望高公雄才蓋丗復使握大兵於外譬如借蛟龍以雲雨將不可制矣兆曰有香火重誓何慮邪紹宗曰親兄弟尚不可信何論香火時兆左右已受歡金因稱紹宗與歡有舊隙兆怒囚紹宗趣歡發歡自晉陽出滏口道逢北鄉長公主自洛陽來有馬三百匹盡奪而易之兆聞之乃釋紹宗而問之紹宗曰此猶是掌握中物也兆乃自追歡至襄垣會漳水暴漲橋壞歡隔水拜曰所以借公主馬非有它故僃山東盜耳王信公主之讒自來賜追今不辭度水而死恐此衆便叛兆自陳無此意因輕馬度水與歡坐幕下陳謝授歡刀引頸使歡斫之歡大哭曰自天柱之薨賀六渾更何所仰但願大家千萬嵗以申力用耳今為旁人所􅌟間大家何忍復出此言兆投刀於地復斬白馬與歡為誓因留宿夜飲尉景伏壯士欲執兆歡齧臂止之曰今殺之其黨必奔歸聚結兵飢馬瘦不可與敵若英雄乘之而起則為害滋甚不如且置之兆雖驍勇凶悍無謀不足圖也旦日兆歸營復召歡歡將上馬詣之孫騰牽歡衣歡乃止兆隔水肆罵馳還晉陽兆腹心念賢領降户家屬别為營歡偽與之善覩其佩刀因取殺之士衆感恱益願附從斛斯椿復棄汝南王恱奔魏三年春正月魏右僕射鄭先護聞洛陽不守士衆逃散遂來奔丙申以先護為征北大將軍魏自敬宗被囚宫室空近百日爾朱丗隆鎮洛陽商旅流通盜賊不作丗隆兄弟密議以長廣王踈逺又無人望欲更立近親儀同三司廣陵王恭羽之子也好學有志度正光中領給事黃門侍郎以元義擅權託瘖病居龍華佛寺無所交通永安未有白敬宗言王陽瘖將有異志恭懼逃於上洛山洛州刺史執送之繫治久之以無狀獲免關西大行臺郎中薛孝通説爾朱天光曰廣陵王高祖猶子夙有令望沈晦不言多歷年所若奉以為主必天人允叶天光與為隆等謀之疑其實瘖使爾朱彥伯潛往敦諭且脅之恭乃曰天何言哉丗隆等大喜孝通聰之子也二月己巳長廣王至邙山南丗隆等為之作禪文使泰山太守遼西竇瑗執鞭獨入啓長廣王曰天人之望皆在廣陵願行堯舜之事遂署禪文廣陵王奉表三讓然後即位大赦改元普泰黃門侍郎邢子才為赦文敘敬宗枉殺太原王榮之狀節閔帝曰永安手翦強臣非為失德直以天未厭亂故逢成濟之禍耳因顧左右取筆自作赦文直言門下朕以寡德運屬樂推思與億兆同兹大慶肆眚之科一依常式帝閉口八年至是乃言中外欣然以為明主望致太平庚午詔以三皇稱皇五帝稱帝三代稱王蓋遞為沖挹自秦以來競稱皇帝豫今但稱帝亦已褒矣加爾朱世隆儀同三司贈爾朱榮相國晉王加九錫丗隆使百官議榮配饗司直劉季明曰若配丗宗於時無功若配孝明親害其母若配莊帝為臣不終以此論之無所可配丗隆怒曰汝應死季明曰下官既為議首依禮而行不合聖心翦戮唯命丗隆亦不之罪以榮配高祖廟廷又為榮立廟於首陽山因周公舊廟而為之以為榮功可比周公廟成尋為火所焚爾朱兆以不預廢立之謀大怒欲攻為隆丗隆使爾朱彥伯往諭之乃止初敬宗使安東將軍史仵龍平北將軍楊文義各領兵三千守太行嶺侍中源子恭鎮河內及爾朱兆南向仵龍文義帥衆先降由是子恭之軍望風亦潰兆遂乘勝直入洛陽至是爾朱丗隆論仵龍文義之功各封千户侯魏主曰仵龍文義於王有功於國無勳竟不許爾朱仲逺鎮滑臺表用其下都督為西兖州刺史先用後表詔答曰已能近補何勞逺聞幽安營并四州行臺劉靈助自謂方術可以動人又推算知爾朱氏將衰乃起兵自稱燕王開府儀同三司大行臺聲言為敬宗復讎且妄述圖讖云劉氏當王由是幽瀛滄冀之民多從之從之者夜舉火為號不舉火者諸村共屠之引兵南至博陵之安國城爾朱兆遣監軍孫白鷂至冀州託言調發民馬欲俟高乾兄弟送馬而收之乾等知之與前河內太守封隆之等合謀濳部勒壯士襲據信都殺自鷂執刺史元嶷乾等欲推其父翼行州事翼曰和集鄉里我不如封皮乃奉隆之行州事為敬宗舉哀將士皆縞素升壇誓衆移檄州郡共討爾朱氏仍受劉靈助節度隆之磨奴之族孫也殷州刺史爾朱羽生將五千人襲信都高敖曹不暇擐甲將十餘騎馳擊之乾在城中繩下五百人追救未及敖曹已交兵羽生敗走敖曹馬矟絶丗左右無不一當百時人比之項籍高歡屯壺關大王山六旬乃引兵東出聲言討信都信都人皆懼高乾曰吾聞高晉州雄略蓋丗其志不居人下且爾朱無道弒君虐民正是英雄立功之會今日之來必有深謀吾當輕馬迎之密參意旨諸君勿懼也乃將十餘騎與封隆之子子繪潛謁歡於滏口説歡曰爾朱酷逆痛結人神凡曰有知莫不思奮明公威德素著天下傾心若兵以義立則屈強之徒不足為明公敵矣鄙州雖小户口不減十萬榖秸之稅足濟軍資願公熟思其計乾辭氣慷慨歡大恱與之同帳寢𥘉河南太守趙郡李顯甫喜豪俠集諸李數千家於殷州西山方五六十里居之顯甫卒子元忠繼之家素富多出貸求利元忠悉焚契免責鄉人甚敬之時盜賊蜂起清河有五百人西戍還經趙郡以路梗共投元忠元忠遣奴為導曰若逢賊但道李元忠遣如言賊皆舍避及葛榮起元忠帥宗黨作壘以自保坐大槲樹下前後斬違命者凡三百人賊至元忠輒擊却之葛榮曰我自中山至此連為趙李所破何以能成大事乃悉衆攻圍執元忠以隨軍賊平就拜南趙郡太守好酒無政績及爾朱兆殺敬宗元忠棄官歸謀舉兵討之會髙歡東出元忠乘露車載素箏濁酒以奉迎歡聞其酒容未即見之元忠下車獨坐酌酒擘脯食之謂門者曰本言公招延雋傑今聞國士到門不吐哺輟洗其人可知還吾刺勿通也門者以告歡遽見之引入觴再行元忠車上取箏鼓之長歌慷慨歌闋謂歡曰天下形勢可見明公猶事爾朱邪歡曰冨貴皆因彼所致安敢不盡節元忠曰非英雄也髙乾雍兄弟來未時乾已見歡歡紿之曰從叔輩粗何肯來元忠曰雖粗並解事歡曰趙郡醉矣使人扶出元忠不肯起孫騰進曰此君天遣來不可違也歡乃復留與語元忠慷慨流涕歡亦悲不自勝元忠因進䇿曰殷州小無糧仗不足以濟大事若向冀州高乾雍兄弟必為明公主人殷州便以賜委冀殷既合滄瀛幽定自然弭服唯劉誕黠胡或當乖拒然非明公之敵歡急握元忠手而謝焉歡至山東約勒士卒絲毫之物不聽侵犯每過麥地歡輒步牽馬逺近聞之皆稱高儀同將兵整肅益歸心焉歡求糧於相州刺史劉誕誕不與有車營租米歡掠取之進至信都封隆之高乾等開門納之高敖曹時在外略地聞之以乾為婦人遺以布裙歡使世子澄以子孫禮見之敖曹乃與俱來癸酉魏封長廣王曄為東海王以青州刺史魯郡王肅為太師淮陽王欣為太傅爾朱丗隆為太保長孫稚為太尉趙郡王諶為司空徐州刺史爾朱仲逺雍州刺史爾朱天光並為大將軍并州刺史爾朱兆為天柱大將軍賜高歡爵勃海王徴使入朝長孫稚固辭太傅乃以為驃騎大將軍開府儀同三司爾朱兆辭天柱曰此叔父所終之官我何敢受固辭不拜尋加都督十州諸軍事丗襲并州刺史髙歡辭不就徴爾朱仲逺徙鎮大梁復加充州刺史爾朱丗隆之𥘉為僕射也畏爾朱榮之威嚴深自刻厲留心几案應接賔客有開敏之名及榮死無所顧憚為尚書令家居視事坐符臺省事無大小不先白丗隆有司不敢行使尚書郎宋遊道邢昕在其聽事東西别坐受納辭訟稱命施行公為貪淫生殺自恣及欲收軍士之意泛加階級皆為將軍無復貟限自是勳賞之官大致猥濫人不復貴是時天光專制關右兆奄有並汾仲逺擅命徐兖丗隆居中用事競為貪暴而仲逺尤甚所部冨室大族多誣以謀反籍沒其婦女財物入私家投其男子於河如是者不可勝數自滎陽以東租稅悉入其軍不送洛陽東南州郡自牧守以下至士民畏仲逺如豺狼由是四方之人皆惡爾朱氏而憚其強莫敢違也己丑魏以涇州刺史賀拔嶽為岐州刺史渭州刺史侯莫陳恱為秦州刺史並加儀同三司魏使大都督侯淵驃騎大將軍代人叱列延慶討劉靈助至固城淵畏其衆欲引兵西入據關拒險以待其變延慶曰靈助庸人假妖術以惑衆大兵一臨彼皆恃其符厭豈肯戮力致死與吾爭勝負哉不如出營城外詐言西歸靈助聞之必自寬縱然後潛軍擊之往則成擒矣淵從之出頓城西聲云欲還丙申簡精騎一千夜發直抵靈助壘靈助戰敗斬之傳首洛陽𥘉靈助起兵自占勝負曰三月之末我必入定州爾朱氏不久當滅及靈助首函入定州果以是月之末夏四月癸丑魏以高歡為大都督東道大行臺冀州刺史丙寅魏以侍中驃騎大將軍爾朱彥伯為司徒魏高歡將起兵討爾朱氏鎮南大將軍斛律金軍主善無庫狄干與歡妻弟婁昭妻之姊夫段榮皆勸成之歡乃詐為書稱爾朱兆將以六鎮人配契胡為部曲衆皆憂懼又為并州符徵兵討步落稽發萬人將遣之孫騰與都督尉景為請留五日如此者再歡親送之郊雪涕執别衆皆號慟聲震郊野歡乃諭之曰與爾俱為失鄉客義同一家不意在上徵發乃爾今直西向已當死後軍期又當死配國人又當死奈何衆曰唯有反耳歡曰反乃急計然當推一人為主誰可者衆共推歡歡曰爾鄉里難制不見葛榮乎雖有百萬之衆曽無法度終自敗滅今以吾為主當與前異毋得陵漢人犯軍令生死任吾則可不然不能為天下笑衆皆頓顙曰死生唯命歡乃椎牛饗士庚申起兵於信都亦未敢顯言叛爾朱氏也會李元忠舉兵逼殷州歡令高乾帥衆救之乾輕騎入見刺史爾朱羽生與指畫軍計羽生與乾俱出因擒斬之持羽生首謁歡歡撫膺曰今日反決矣乃以元忠為殷州刺史鎮廣阿歡於是抗表罪狀爾朱氏爾朱丗隆匿之不通魏楊播及弟椿津皆有名德播剛毅椿津謙恭家丗孝犮緦服同爨男女百口人無間言椿津皆至三公一門七郡太守三十二州刺史敬宗之誅爾朱榮也播子侃預其謀城陽三徽李彧皆其姻戚也爾朱兆入洛侃逃歸華隂爾朱天光使侃婦父韋義逺招之與盟許貰其罪侃曰彼雖食言死者不過一人猶冀全百口乃出應之天光殺之時椿致仕與其子昱在華隂椿弟冀州刺史順司空津順子東雍州刺史辨正平太守仲宣皆在洛秋七月爾朱丗隆誣奏楊氏謀反請收治之魏主不許丗隆苦請帝不得已命有司檢案以聞壬申夜丗隆遣兵圍津第天光亦遣兵掩椿家於華隂東西之族無少長者殺之籍沒其家丗隆奏云楊氏實反與收兵相拒皆已格殺帝惋悵久之不言而已朝野聞之無不痛憤津子逸為光州刺史爾朱仲逺遣使就殺之唯津子愔於被收時適出在外逃匿獲免往見高歡於信都泣欣家禍因為言討爾朱氏之䇿歡甚重之即署行臺郎中丙戌魏司徒爾朱彥伯以旱遜位戊子以彥伯為侍中開府儀同三司彥伯於兄弟中差無過惡爾朱丗隆固讓太保魏主特置儀同三師之官位次上公之下庚寅以丗隆為之斛斯椿譖朱瑞於丗隆丗隆殺之魏爾朱仲逺度律等聞高歡起兵恃其強不以為慮獨爾朱丗隆憂之爾朱兆將步騎二萬出井陘趣殷州李元忠棄城奔信都八月丙午爾朱仲逺度律將兵討高歡九月己卯魏以仲逺為太宰庚辰以爾朱天光為大司馬孫騰説高歡曰今朝廷隔絶號令無所稟不權有所立則衆將沮散歡疑之騰再三固請乃立勃海太守元朗為帝朗融之子也冬十月壬寅朗即位於信都城西改元中興以歡為侍中丞相都督中外諸軍大將軍録尚書事大行臺高乾為侍中司空高敖曹為驃騎大將軍儀同三司冀州刺史孫騰為尚書左僕射河北行臺魏蘭根為右僕射己酉爾朱仲逺度律與驃騎大將軍斛斯椿車騎大將軍儀同三司賀拔勝車騎大將軍賈顯智軍於陽平顯智名智以字行顯度之弟也爾朱兆出井陘軍于廣阿衆號十萬高歡縱反間云丗隆兄弟謀殺兆復云兆與歡同謀殺仲逺等由是迭相猜二徘徊不進仲逺等屢使斛斯椿賀拔勝往諭兆兆帥輕騎三百來就仲逺同坐幕下意色不平手舞馬鞭長嘯凝望疑仲逺等有變遂趨出馳還仲逺遣椿勝等追曉説之兆執椿勝還營仲逺度律大懼引兵南遁兆數勝罪將斬之曰爾殺衛可孤罪一也天柱薨爾不與丗隆等俱來而東征仲逺罪二也我欲殺爾久矣今復何言勝曰可孤為國巨患勝父子誅之其功不小反以為罪乎天柱被戮以君誅臣勝寧負王不負朝廷今日之事生死在王但寇賊密邇骨肉􅌟隙自古及今未有如是而不亡者勝不憚死恐王失䇿兆乃捨之高歡將與兆戰而畏其衆強以問親信都督假韶韶曰所謂衆者得衆人之死所謂強者得天下之心爾朱氏上弒天子中屠公卿下暴百姓王以順討逆如湯沃雪何衆強之有歡曰雖然吾以小敵大恐無天命不能濟也韶曰韶聞小能敵大小道大淫皇天無親唯德是輔爾朱氏外亂天下內失英雄心智者不為謀勇者不為鬬人心已去天意安有不從者哉韶榮之子也辛亥歡大破兆於廣阿俘其甲卒五千餘人十一月庚辰魏高歡引兵攻鄴相州刺史劉誕嬰城固守四年春正月魏高歡攻鄴為地道施柱而焚之城陷入地壬午拔鄴擒劉誕以楊愔為行臺右丞時軍國多事文檄教令皆出於愔及開府咨議參軍崔㥄㥄逞之五丗孫也二月辛亥魏安定王追諡敬宗曰武懷皇帝甲子以高歡為丞相柱國大將軍太師三月丙寅以高澄為驃騎大將軍丁丑安定王帥百官入居於鄴爾朱兆與爾朱為隆等互相猜阻丗隆卑辭厚禮諭兆欲使之赴洛唯其所欲又請節閔帝納兆女為后兆乃恱并與天光度律更立誓約復相親睦斛斯椿隂謂賀拔勝曰天下皆怨毒爾朱而吾等為之用亡無日矣不如圖之勝曰天光與兆各據一方欲盡去之甚難去之不盡必為後患奈何椿曰此易致耳乃説丗隆追天光等赴洛共討高歡丗隆屢徵天光天光不至使椿自往邀之曰髙歡作亂非王不能定豈可坐視宗族夷滅邪天光不得已將東出問䇿於雍州刺史賀拔嶽嶽曰王家跨據三方士馬殷盛高歡烏合之衆豈能為敵但能同心戮力往無不捷若骨肉相疑則圖存之不暇安能制人如下官所見莫若且鎮關中以固根本分遣鋭師與衆軍合勢進可以克敵退可以自全天光不從閏月壬寅天光自長安兆自晉陽度律自洛陽仲逺自東郡皆會於鄴衆號二十萬夾洹水而軍節閔帝以長孫稚為大行臺揔督之高歡令吏部尚書封隆之守鄴癸丑出頓紫陌大都督高敖曹將鄉里部曲王桃湯等三千人以從歡曰高都督所將皆漢兵恐不足集事欲割鮮卑兵千餘人相雜用之何如敖曹曰敖曹所將練習已久前後格鬬不減鮮卑今若雜之情不相洽勝則爭功退則推罪不煩更配也庚申爾朱兆帥輕騎三千夜襲鄴城叩西門不克而退壬戌歡將戰馬不滿二千步兵不滿三萬衆寡不敵乃於韓陵為圓陳連繫牛騎以塞歸道於是將士皆有死志兆望見歡遙責歡以叛已歡曰本所以戮力者共輔帝室今天子何在兆曰永安枉害天柱我報讎耳歡曰我昔親聞天柱訃汝在户前立豈得言不反邪且以君殺臣何報之有今日義絶矣遂戰歡將中軍高敖曹將左軍歡從父弟嶽將右軍歡戰不利兆等乘之嶽以五百騎衝其前别將斛律敦收散卒躡其後敖曹以千騎自栗園出橫擊之兆等大敗賀拔勝與徐州刺史杜德於陳降歡兆對慕容紹宗撫膺曰不用公言以至於此欲輕騎西走紹宗反旗鳴角收散卒成軍而去兆還晉陽仲逺奔東郡爾朱彥伯聞度律等敗欲自將兵守河橋丗隆不從度律天光將之洛陽大都督斛斯椿謂都督賈顯度賈顯智曰今不先報爾朱氏吾屬死無類矣乃夜於桑下盟約倍道先還丗隆使其外兵參軍陽叔淵單騎馳赴北中簡閲敗衆以次內之椿至不得入城乃詭説叔淵曰天光部下皆是西人聞欲大掠洛邑遷都長安宜先內我以為之僃叔淵信之夏四月甲子朔椿等入據河橋盡殺爾朱氏之黨度律天光欲攻之會大雨晝夜不止士馬疲頓弓矢不可施遂西走至灅波津為人所擒送於椿所椿使行臺長孫稚詣洛陽奏狀别使賈顯智張歡帥騎掩襲丗隆執之彥伯時在禁直長孫稚於神虎門啓陳高歡義功既振請誅爾朱氏節閔帝使舍人郭崇報彥伯彥伯狼狽走出為人所執與丗隆俱斬於閶闔門外送其首并度律天光於高歡節閔帝使中書舍人盧辨勞歡於鄴歡使之見安定王辨抗辭不從歡不能奪乃捨之辨同之兄子也爾朱天光之東下也留其弟顯壽鎮長安召泰州刺史侯莫陳恱欲與之俱東賀拔嶽知天光必敗欲留恱共圖顯壽以應高歡計未有所出宇文泰謂嶽曰今天光尚近恱未必有二心若以此告之恐其驚懼然恱雖為主將不能制物若先説其衆必人有留心恱進失爾朱之期退恐人情變動乘此説恱事無不遂嶽大喜即令泰入恱軍説之恱遂與嶽共襲長安泰帥輕騎為前驅顯壽棄城走追至華隂擒之歡以嶽為關西大行臺嶽以泰為行臺左丞領府司馬事無巨細皆委之辛巳安定王至邙山高歡以安定王踈逺使僕射魏蘭根慰諭洛邑且觀節閔帝之為人欲復奉之蘭根以帝神采高明恐於後難制與高乾兄弟及黃門侍郎崔㥄共勸歡廢之歡集百官問所宜立莫有應者太僕代人綦母俊盛稱節閔帝賢明宜主社稷歡欣然是之㥄作色曰若言賢明自可待我高王徐登大位廣陵既為逆胡所立何得猶為天子若從俊言王師何名義舉歡遂幽節閔帝於崇訓佛寺歡入洛陽斛斯椿謂賀拔勝曰今天下事在吾與君耳若不先制人將為人所制高歡初至圖之不難勝曰彼有功於時害之不祥比數夜與歡同宿具序往昔之懷兼荷兄恩意甚多何苦憚之椿乃止歡以汝南王恱高祖之子召欲立之聞其狂暴無常乃止時諸王多逃匿尚書左僕射平陽王修懷之子也匿於田舍歡欲立之使斛斯椿求之椿見修所親貟外散騎侍郎太原王思政問王所在思政曰須知問意椿曰欲立為天子思政乃言之椿從思政見修修色變謂思政曰得無賣我邪曰不也曰敢保之乎曰變態百端何可保也椿馳報歡歡遣四百騎迎修入氊帳陳誠泣下霑襟修讓以寡德歡再拜修亦拜歡出僃服御進湯沐達夜嚴警昧爽文武執鞭以朝使斛斯椿奉勸進表椿入帷門罄折延首而不敢前修令思政取表視之曰便不得不稱朕矣乃為安定王作詔䇿而禪位焉戊子孝武帝即位於東郭之外用代都舊制以黑氊蒙七人歡居其一帝於氊上西向拜天畢入御太極殿羣臣朝賀升閶闔門大赦改元太昌以高歡為大丞相天柱大將軍太師丗襲定州刺史庚寅加高澄侍中開府儀同三司初歡起兵信都爾朱丗隆知司馬子如與歡有舊自侍中驃騎大將軍出為南岐州刺史歡入洛召子如為大行臺尚書朝夕左右參知軍國廣州刺史廣寧韓賢素為歡所善歡入洛凡爾朱氏所除官爵例皆削奪唯賢如故以前御史中尉樊子鵠兼尚書左僕射為東南道大行臺與徐州刺史杜德追爾朱仲逺仲逺已出境遂攻元樹於譙丞相歡徵賀拔嶽為冀州刺史嶽畏歡欲單馬入朝行臺右丞薛孝通説嶽曰高王以數千鮮卑破爾朱百萬之衆誠亦難敵然諸將或素居其上或與之等夷雖屈首從之勢非獲已今或在京師或據州鎮高王除之則失人望留之則為腹心之疾且土萬人雖復敗走猶在并州高王方內撫羣雄外抗勍敵安能去其巢穴與公爭關中之地乎今關中豪俊皆屬心於公願效其智力公以華山為城黃河為塹進可以兼山東退可以封函谷奈何欲束手受制於人乎言未卒嶽執孝通手曰君言是也乃遜辭為啓而不就徴壬辰丞相歡還鄴送爾朱度律天光於洛陽斬之五月丙申魏主鴆節閔帝於門下外省詔百司會喪葬用殊禮以沛郡王欣為太師趙郡王諶為太保南陽王寶炬為太尉長孫稚為太傅寶炬愈之子也丞相歡固辭天柱大將軍戊戌許之己酉清河王亶為司徒侍中河南高隆之本徐氏養子丞相歡命以為弟恃歡勢驕狎公卿南陽王寶炬驅之曰鎮兵何敢爾魏主以歡故六月丁卯黜寶炬為驃騎大將軍歸第魏主避廣平武穆王之諱改諡武懷皇帝曰孝莊皇廟號敬宗秋七月庚子魏復以南陽王寶炬為太尉壬寅魏丞相歡引兵入滏口大都督庫狄干入井陘擊爾朱兆庚戌魏主使驃騎大將軍儀同三司高隆之帥步騎十萬會丞相歡於太原因以隆之為丞相軍司歡軍於武鄉爾朱兆大掠晉陽北走秀容並州平歡以晉陽四塞乃建大丞相府而居之冬十一月甲辰魏殺安定王朗東海王曄己酉以汝南王恱為侍中大司馬魏主以汝南王恱屬近地尊丁亥殺之十二月魏主納丞相歡女為后命太常卿李元忠納幣於晉陽歡與之宴論及舊事元忠曰昔日建義轟轟大樂比來寂寥無人問歡撫掌笑曰此人逼我起兵元忠戲曰若不與侍中當更求建義處歡曰建義不慮無止畏如此老翁不可遇耳元忠曰止為此翁難遇所以不去因捋歡須大笑歡悉其雅意深重之爾朱兆既至秀容分兵守隘出入冦掠魏丞相歡揚聲討之師出復止者數四兆意怠歡揣其嵗首當宴會遣都督竇泰以精騎馳之一日一夜行三百里歡以大軍繼之五年春正月魏竇泰奄至爾朱兆庭軍人因宴休惰忽見泰軍驚走追破之於赤谼嶺衆並降散兆逃於窮山命左右西河張亮及蒼頭陳山提斬已首以降皆不忍兆乃殺所乘白馬自縊於樹歡親臨厚葬之慕容紹宗攜爾朱榮妻子及兆餘衆詣歡降歡以義故待之甚厚通鑑紀事本末卷第二十二
