body:
  text: 通鑑紀事本末卷二十四上宋袁樞撰梁氏亂亡陳霸先簒梁梁武帝中大通三年夏四月乙巳昭明太子統卒五月丙申立太子母弟晉安王綱為皇太子朝野多以為不順司議侍郎周𢎞正嘗為晉安王主簿乃奏記曰謙讓道廢多厯年所伏惟明大王殿下天挺將聖四海歸仁是以皇上發徳音以大王為儲副意者願聞殿下抗目夷上仁之義執子臧大賢之節逃玉輿而弗乗棄萬乗如脫屣庶改澆競之俗以大呉國之風古有其人今聞其語能行之者非殿下而誰使無為之化復生於遂古讓王之道不墜於來葉豈不盛歟王不能從六月癸丑立華容公歡為豫章王其弟枝江公譽為河東王曲阿公詧為岳陽王上以人言不息故封歡兄弟以大郡用慰其心中大同元年上年高諸子心不相下互相猜忌邵陵王綸為丹楊尹湘東王繹在江州武陵王紀在益州皆權侔人主太子綱惡之嘗選精兵以衛東宫八月以綸為南徐州刺史冬十月乙亥以前東揚州刺史岳陽王詧為雍州刺史上捨詧兄弟而立太子綱内常愧之寵亞諸子以㑹稽人物殷阜故用詧兄弟迭為東揚州以慰其心詧兄弟亦内懐不平詧以上衰老朝多秕政遂蓄聚貨財折節下士招募勇敢左右至數千人以襄陽形勝之地梁業所基遇亂可以圖大功乃克已為政撫循士民數施恩惠延納規諫所部稱治太清三年初上以河東王譽為湘州刺史徙湘州刺史張纉為雍州刺史代岳陽王詧纉恃其才望輕譽少年迎候有闕譽至檢括州府付度事留纉不遣聞侯景作亂頗陵蹙纉纉恐為所害輕舟夜遁將之雍部復慮詧拒之纉與湘東王繹有舊欲因之以殺譽兄弟乃如江陵及臺城陷諸王各還州鎭譽自湖口歸湘州桂陽王慥以荆州督府留軍江陵欲待繹至拜謁乃還信州纉遺繹書曰河東戴檣上水欲襲江陵岳陽在雍共謀不逞江陵遊軍主朱榮亦遣使告繹云桂陽留此欲應譽詧繹懼鑿船沉米斬纜自蠻中步道馳歸江陵囚慥殺之湘東王繹之入援也令所督諸州皆發兵雍州刺史岳陽王詧遣府司馬劉方貴將兵出漢口繹召詧使自行詧不從方貴潜與繹相知謀襲襄陽未發㑹詧以它事召方貴方貴以為謀泄遂據樊城拒命詧遣軍攻之繹厚資遣張纉使赴鎭纉至大堤詧已㧞樊城斬方貴繹至襄陽詧推遷未去但以城西白馬寺處之詧猶總軍府之政聞臺城陷遂不受代助防杜岸紿纉曰觀岳陽勢不容使君不如且徃西山以避禍岸既襄陽豪族兄弟九人皆以驍勇著名纉乃與岸結盟著婦人衣乗青布輿逃入西山詧使岸將兵追擒之纉乞為沙門更名法纉詧許之夏五月丙辰上殂辛巳太子即皇帝位六月上甲侯韶自建康出犇江陵稱受高祖密詔徵兵以湘東王繹為侍中假黄鉞大都督中外諸軍事司徒承制自餘藩鎭並加位號湘州刺史河東王譽驍勇得士心湘東王繹將討侯景遣使督其糧衆譽曰各自軍府何忽𨽻人使者三返譽不與湘東王世子方等請討之繹乃以少子安南侯方矩為湘州刺史使方等將精卒二萬送之方等將行謂所親曰是行也吾必死之死得其所吾復奚恨湘東世子方等軍至麻溪河東王譽將七千人擊之方等軍敗溺死安南侯方矩收餘衆還江陵湘東王繹無戚容西江督䕶陳霸先起兵討侯景湘東王繹遣竟陵太守王僧辯信州刺史東海鮑泉擊湘州分給兵糧刻日就道僧辯以竟陵部下未盡至欲俟衆集然後行與泉入白繹求申期日繹疑僧辯觀望案劍厲聲曰卿憚行拒命欲同賊邪今唯有死耳因斫僧辯中其左髀悶絶乆之方蘇即送獄泉震怖不敢言僧辯母徒行流涕入謝自陳無訓繹意解賜以良藥故得不死丁卯鮑泉獨將兵擊湘州秋八月己亥鮑泉軍于石椁寺河東王譽逆戰而敗辛丑又敗于橘洲戰及溺死者萬餘人譽退保長沙泉引軍圍之九月河東王譽告急於岳陽王詧詧留諮議參軍濟陽蔡大寳守襄陽帥衆二萬騎二千伐江陵以救湘州湘東玉繹大懼遣左右就獄中問計於王僧辯僧辯具陳方畧繹乃赦之以為城中都督乙卯詧至江陵作十三營以攻之㑹大雨平地水深四尺詧軍氣沮繹與新興太守杜崱有舊密邀之乙丑崱與兄岌岸弟㓜安兄子龕各帥所部降于繹岸請以五百騎襲襄陽晝夜兼行去襄陽三十里城中覺之蔡大寳奉詧母龔保林登城拒戰詧聞之夜遁棄糧食金帛鎧仗於湕水不可勝紀張纉病足詧載以隨軍及敗走守者恐為追兵所及殺之棄尸而去詧至襄陽岸犇廣平依其兄南陽太守巚湘東王繹以鮑泉圍長沙乆不克怒之以平南將軍王僧辯代為都督數泉十罪命舍人羅重懽與僧辯偕行泉聞僧辯來愕然曰得王竟陵來助我賊不足平拂席待之僧辯入背泉而坐曰鮑郎卿有罪令㫖使我鎻卿卿勿以故意見期使重懽宣令鎻之牀側泉為啟自申且謝淹緩之罪繹怒解遂釋之冬十一月岳陽王詧使將軍薛暉攻廣平㧞之獲杜岸送襄陽詧㧞其舌鞭其靣支解而烹之又發其祖父墓焚其骸而揚之以其頭為漆椀詧既與湘東王繹為敵恐不能自存遣使求援於魏請為附庸丞相泰令東閣祭酒榮權使於襄陽繹使司州刺史柳仲禮鎭竟陵以圖詧詧懼遣其妃王氏及世子嶚為質於魏丞相泰欲經畧江漢以開府儀同三司楊忠都督三荆等十五州諸軍事鎭穰城仲禮至安陸安陸太守桞勰以城降之仲禮留長史馬岫與其弟子禮守之帥衆一萬趣襄陽泰遣楊忠及行臺僕射長孫儉將兵擊仲禮以救詧魏楊忠將至義陽太守馬伯符以下溠城降之忠以伯符為鄉導伯符岫之子也十二月魏楊忠㧞隨郡執太守桓和簡文帝大寳元年春正月陳霸先進軍南康湘東王繹承制授霸先明威將軍交州刺史魏楊忠圍安陸柳仲禮馳歸救之諸將恐仲禮至則安陸難下請急攻之忠曰攻守勢殊未可猝㧞若引日勞師表裏受敵非計也南人多習水軍不閑野戰仲禮師在近路吾出其不意以竒兵襲之彼怠我奮一舉可克克仲禮則安陸不攻自㧞諸城可傳檄定也乃選騎二千銜枚夜進敗仲禮於漴頭獲仲禮及其弟子禮盡俘其衆馬岫以安陸别將王叔孫以竟陵皆降於忠於是漢東之地盡入于魏二月魏楊忠乗勝至石頭欲進逼江陵湘東王繹遣舍人庾恪說忠曰詧來伐叔而魏助之何以使天下歸心忠遂停湕北繹遣舍人王孝祀等送子方畧為質以求和魏人許之繹與忠盟曰魏以石城為封梁以安陸為界請同附庸并送質子貿遷有無永敦鄰睦忠乃還邵陵王綸欲救河東王譽而兵糧不足乃致書於湘東王繹曰天時地利不及人和况乎手足肱支豈可相害今社稷危恥創巨痛深唯應剖心嘗膽泣血枕戈其餘小忿或宜容貰若外難未除家禍仍構料今訪古未或不亡夫征戰之理唯求克勝至於骨肉之戰愈勝愈酷㨗則非功敗則有喪勞兵損義虧失多矣侯景之軍所以未窺江外者良為藩屏盤固宗鎭彊密弟若陷洞庭不戢兵刃雍川疑廹何以自安必引進魏軍以求形援弟若不安家國去矣必希解湘州之圍存社稷之計繹復書陳譽過惡不赦且曰詧引揚忠來相侵逼頗遵談笑用却秦軍曲直有在不復自陳臨湘旦平暮便即路綸得書投之於案慷慨流涕曰天下之事一至於斯湘州若敗吾亡無日矣夏四月邵陵王綸在郢州以聽事為正陽殿内外齋閣悉加題署其部下陵暴軍府郢州將佐莫不怨之諮議參軍江仲舉南平王恪之謀主也説恪圖綸恪驚曰若我殺邵陵寜静一鎭荆益兄弟必皆内喜海内若平則以大義責我矣且巨逆未梟骨肉相殘自亡之道也卿且息之仲舉不從部分諸將刻日將發謀泄綸壓殺之恪狼狽徃謝綸曰羣小所作非由兄也兇黨已斃兄勿深憂王僧辯急攻長沙辛巳克之執河東王譽斬之傳首江陵湘東王繹反其首而葬之繹以僧辯為左衛將軍加侍中鎭西長史六月魏人欲令岳陽王詧發哀嗣位詧辭不受丞相泰使榮權册命詧為梁王始建臺置百官秋七月辛酉梁王詧入朝于魏邵陵王綸大脩鎧仗將討侯景湘東王繹惡之八月甲午遣左衛將軍王僧辯信州刺史鮑泉等帥舟師一萬東趣江郢聲言拒任約且云迎邵陵王還江陵授以湘州九月王僧辯軍至鸚鵡洲郢州司馬劉龍虎等潜送質於僧辯邵陵王綸聞之遣其子威正侯礩將兵擊之龍虎敗犇于僧辯綸以書責僧辯曰將軍前年殺人之姪今嵗伐人之兄以此求榮恐天下不許僧辯送書于湘東王繹繹命進軍辛酉綸集其麾下於西園涕泣言曰我本無佗志在滅賊湘東常謂與之争帝遂爾見伐今日欲守則交絶糧儲欲戰則取笑千載不容無事受縛當於下流避之麾下壯士争請出戰綸不從與礩自倉門登舟北出僧辯入據郢州繹以南平王恪為尚書令開府儀同三司世子方諸為郢州刺史王僧辯為領軍將軍綸遇鎭東將軍裴之高於道之高之子畿掠其軍器綸與左右輕舟犇武昌澗飲寺僧灋馨匿綸於巖穴之下綸長史韋質司馬姜律等聞綸尚存馳徃迎之說七栅流民以求糧仗綸出營巴水流民八九千人附之稍收散卒屯于齊昌遣使請降于齊齊以綸為梁王岳陽王詧還襄陽冬十一月甲子南平王恪帥文武拜牋推湘東王繹為相國總百揆繹不許十二月邵陵王綸在汝南脩城池集士卒將圖安陸魏安州刺史馬祐以告丞相泰泰遣楊忠將萬人救安陸二年春正月魏楊忠圍汝南李素戰死二月乙亥城陷執邵陵攜王綸殺之投尸江岸岳陽王詧取而葬之齊遣散騎常侍曹文皎使于江陵湘東王繹使兼散騎常侍王子敏報之三月己未齊以湘東王繹為梁相國建梁臺總百揆承制岳陽王詧聞侯景克郢州遣蔡大寳將兵一萬進據武寜遣使至江陵詐稱赴援衆議欲答以侯景已破令其退軍湘東王繹曰今語以退軍是趣之令進也乃使謂大寳曰岳陽累啟連和不相侵犯卿那忽據武寜今當遣天門太守胡僧祐精甲二萬鐡馬五千頓湕水待時進軍詧聞之召其軍還僧祐南陽人也秋八月侯景廢帝為晉安王下詔迎豫章王棟壬戌棟即帝位九月己亥湘東王繹以尚書令王僧辯為江州刺史江州刺史陳霸先為東揚州刺史冬十月壬寅侯景弑太宗王僧辯等聞太宗殂丙辰啟湘東王繹請上尊號繹弗許十一月乙亥王僧辯復上表勸進湘東王繹不許己丑豫章王棟禪位于侯景景封棟為淮隂王元帝承聖元年春三月己丑王僧辯等上表勸進且迎都建業不許辛卯宣猛將軍朱買臣沈豫章王棟於水夏四月王僧辯啟陳霸先鎭京口五月庚午司空南平王恪等復勸進湘柬王猶不受庚辰以南平王恪為揚州刺史甲申以王僧辯為司徒鎭衛將軍封長寜公陳霸先為征虜將軍開府儀同三司封長城縣侯齊主使其散騎常侍曹文皎等來聘湘東王使散騎常侍柳暉等報之齊主使潘樂郭元建將兵圍秦郡行臺尚書辛術諫曰朝廷與湘東王信使不絶陽平侯景之土取之可也今王僧辯已遣嚴超達守秦郡於義何得復爭之且水潦方降不如班師弗從陳霸先命别將徐度引兵助秦郡固守齊衆七萬攻之甚急王僧辯使左衛將軍杜崱救之霸先亦自歐陽來㑹與元建大戰於士林大破之斬首萬餘級生擒千餘人元建收餘衆北遁猶以通好不窮追也六月立安南侯方矩為王太子齊政煩賦重江北之民不樂屬齊其豪傑數請兵於王僧辯僧辯以與齊通好皆不許秋七月廣陵僑人朱盛等潜聚黨數千人謀襲殺齊刺史温仲邕遣使求援於陳霸先云已克其外城霸先使告僧辯僧辯曰人之情偽未易可測若審克外城亟須應援如其不爾無煩進軍使未報霸先已濟江僧辯乃命武州刺史杜崱等助之㑹盛等謀泄霸先因進軍圍廣陵九月甲戌司空南平王恪卒甲申以王僧辯為揚州刺史齊主使告王僧辯陳霸先曰請釋廣陵之圍必歸廣陵厯陽兩城霸先引兵還京口江北之民從霸先濟江者萬餘口湘東王以霸先為征北大將軍開府儀同三司南徐州刺史徵霸先世子昌及兄子頊詣江陵以昌為員外散騎常侍頊為領直霸公卿藩鎭數勸進於湘東王十一月丙子世祖即皇帝位於江陵改元大赦是日帝不升正殿公卿陪列而已己卯立王太子方矩為皇太子更名元良皇子方智為晉安王方畧為始安王方等之子莊為永嘉王侯景之亂州郡大半入魏自巴陵以下至建康以長江為限荆州界北盡武寜西拒硤口嶺南復為蕭勃所據詔令所行千里而近民戸著籍者不盈三萬而已二年春正月王僧辯發建康承制使陳霸先代鎭揚州秋八月下詔將還建康領軍將軍胡僧祐太府卿黄羅漢吏部尚書宗懔御史中丞劉瑴諫曰建業王氣已盡與虜止隔一江若有不虞悔無及也且古老相承云荆州洲數滿百當出天子今枝江生洲百數已滿陛下龍飛是其應也上令朝臣議之黄門侍郎周𢎞正尚書右僕射王襃曰今百姓未見輿駕入建康謂是列國諸王願陛下從四海之望時羣臣多荆州人皆曰𢎞正等東人也志願東下恐非良計𢎞正面折之曰東人勸東謂非良計君等西人欲西豈成長䇿上笑又議於後堂㑹者五百人上問之曰吾欲還建康諸卿以為如何衆莫敢先對上曰勸吾去者左􅃝左袒者過半武昌太守朱買臣言於上曰建康舊都山陵所在荆鎭邉彊非王者之宅願陛下勿疑以致後悔臣家在荆州豈不願陛下居此但恐是臣富貴非陛下富貴耳上使術士杜景豪卜之不吉對上曰未去退而言曰此兆為鬼賊所留也上以建康彫殘江陵全盛意亦安之卒從僧祐等議九月庚午詔王僧辯還鎭建康陳霸先復還京口齊主使郭元建治水軍二萬餘人於合肥將襲建康納湘潭侯退又遣將軍邢景逺步大汗薩帥衆繼之陳霸先在建康聞之白上上詔王僧辯鎭姑孰以禦之冬十月己酉王僧辯至姑孰遣婺州刺史侯瑱呉郡太守張彪呉興太守裴之横築壘東關以待齊師閏月丁丑南豫州刺史侯瑱與郭元建戰於東關齊師大敗溺死者萬計湘潭侯退復歸于鄴王僧辯還建康十一月丙寅上使侍中王琛使於魏太師泰隂有圖江陵之志梁王詧聞之益重其貢獻三年春正月陳霸先自丹徒濟江圍齊廣陵秦州刺史嚴超達自齊郡進圍涇州南豫州刺史侯瑱呉郡太守張彪皆出石梁為之聲援三月己酉魏侍中宇文仁恕來聘會齊使者亦至江陵帝接仁恕不及齊使仁恕歸以告太師泰帝又請據舊圖定疆境辭頗不遜泰曰古人有言天之所棄誰能興之其蕭繹之謂乎荆州刺史長孫儉屢陳攻取之䇿泰徵儉入朝問以經畧復命還鎭密為之備馬伯符密使告帝帝弗之信夏四月丙寅上使散騎常侍庾信等聘於魏癸酉以陳霸先為司空五月散騎郎新野庾季才言於上曰去年八月丙申月犯心中星今月丙戌赤氣干北斗心為天王丙主楚分臣恐建子之月有大兵入江陵陛下宜留重臣鎭江陵整斾還都以避其患假令魏虜侵蹙止失荆湘在於社稷猶得無慮上亦曉天文知楚有災歎曰禍福在天避之何益六月壬午齊步大汗薩將兵四萬趣涇州王僧辯使侯瑱張彪自石梁引兵助嚴超達拒之瑱彪遲留不進將軍尹令思將萬餘人謀襲盱眙齊冀州刺史段韶將兵討東方白額於宿預廣陵涇州皆來告急諸將患之韶曰梁氏喪亂國無定主人懐去就彊者從之霸先等外託同徳内有離心諸君不足憂吾揣之熟矣乃留儀同三司敬顯攜等圍宿預自引兵倍道趣涇州塗出盱眙令思不意齊兵猝至望風退走韶進擊超達破之回趣廣陵陳霸先解圍走杜僧明還丹徒侯瑱張彪還秦郡秋九月乙巳魏遣柱國常山公于謹中山公宇文䕶大將軍楊忠將兵五萬入冦冬十月壬戌發長安長孫儉問謹曰為蕭繹之計將如何謹曰耀兵漢沔席卷渡江直據丹楊上䇿也移郭内居民退保子城峻其陴堞以待援軍中䇿也若難於移動據守羅郭下䇿也儉曰揣繹定出何䇿謹曰下䇿儉曰何故謹曰蕭氏保據江南緜厯數紀屬中原多故未遑外畧又以我有齊氏之患必謂力不能分且繹懦而無謀多疑少斷愚民難與慮始皆戀邑居所以知其用下䇿也癸亥武寜太守宗均告魏兵且至帝召公卿議之領軍胡僧祐太府卿黄羅漢曰二國通好未有嫌隙必應不爾侍中王琛曰臣揣宇文容色必無此理乃復使琛使魏丙寅于謹至樊鄧梁王詧帥衆㑹之丁卯内外戒嚴王琛至石梵未見魏軍馳書報黄羅漢曰吾至石梵境上帖然前言皆兒戯耳帝聞而疑之辛未帝使主書李膺至建康徵王僧辯為大都督荆州刺史命陳霸先徙鎭揚州僧辯遣豫州刺史侯瑱帥程靈洗等為前軍兖州刺史杜僧明帥呉明徹等為後軍甲戌帝夜登鳯凰閣徙倚歎息曰客星入翼軫今必敗矣嬪御皆泣陸法和聞魏師至自郢州入漢口將赴江陵帝使逆之曰此自能破賊但鎭郢州不須動也灋和還州堊其城門著衰絰坐葦席終日乃脫之十一月帝大閱於津陽門外遇北風暴雨輕輦還宫癸未魏軍濟漢于謹令宇文䕶楊忠帥精騎先據江津斷東路甲申䕶克武寜執宗均是日帝乗馬出城行栅挿木為之周圍六十餘里以領軍將軍胡僧祐都督城東諸軍事尚書右僕射張綰為之副左僕射王襃都督城西諸軍事四廂領直元景亮為之副王公已下各有所守丙戌命太子廵行城樓令居人助運木石夜魏軍至黄華去江陵四十里丁亥至柵下戊子嶲州刺史裴畿畿弟新興太守機武昌太守朱買臣衡陽太守謝答仁開枇杷門出戰裴機殺魏儀同三司胡文伐畿之高之子也帝徵廣州刺史王琳為湘州刺史使引兵入援丁酉栅内火焚數千家及城樓二十五帝臨所焚樓望魏軍濟江四顧歎息是夜遂止宫外宿民家己亥移居祗洹寺于謹令築長圍中外信命始絶庚子信州刺史徐世譜晉安王司馬任約等等築壘於馬頭遙為聲援是夜帝廵城猶口占為詩羣臣亦有和者帝裂帛為書趣王僧辯曰吾忍死待公可以至矣壬寅還宫癸卯出長沙寺戊申王襃胡僧祐朱買臣謝答仁等開門出戰皆敗還己酉帝移居天居寺癸丑移居長沙寺朱買臣按劍進曰唯斬宗懔黄羅漢可以謝天下帝曰曩實吾意宗黄何罪二人退入衆中王琳軍至長沙鎭南府長史裴政請間道先報江陵至百里洲為魏人所獲梁王詧謂政曰我武皇帝之孫也不可為爾君乎若從我計貴及子孫如或不然腰領分矣政詭曰唯命詧鎻之至城下使言曰王僧辯聞臺城被圍已自為帝王琳孤弱不復能至政告城中曰援兵大至各思自勉吾以間使被擒當碎身報國監者擊其口詧怒命速殺之西中即參軍蔡大業諫曰此民望也殺之則荆州不可下矣乃釋之政之禮之子大業大寳之弟也時徵兵四方皆未至甲寅魏人百道攻城城中負戸䝉楯胡僧祐親當矢石晝夜督戰奬勵將士明行賞罰衆咸致死所向摧殄魏不得前俄而僧祐中流矢死内外大駭魏悉衆攻柵反者開西門納魏師帝與太子王襃謝答仁朱買臣退保金城令汝南王大封晉熈王大圓質於于謹以請和魏軍之初至也衆以王僧辯子侍中顗可為都督帝不用更奪其兵使與左右十人入守殿中及胡僧祐死乃用為都督城中諸軍事裴畿裴機厯陽侯峻皆出降于謹以機手殺胡文伐並畿殺之峻淵猷之子也時城南雖破而城北諸將猶苦戰日暝聞城䧟乃散帝入東閣竹殿命舍人高善寳焚古今圖書十四萬卷將自赴火宫人左右共止之又以寳劍擊柱令折歎曰文武之道今夜盡矣乃使御史中丞王孝祀作降文謝答仁朱買臣諌曰城中兵衆猶彊乗闇突圍而出賊必驚因而薄之可度江就任約帝素不便走馬曰事必無成秖增辱耳答仁求自扶帝以問王襃襃曰答仁侯景之黨豈足可信成彼之勲不如降也答仁又請守子成收兵可得五千人帝然之即授城中大都督配以公主既而召王襃謀之以為不可答仁請入不得歐血而去于謹徵太子為質帝使王襃送之謹子以襃善書給之紙筆襃乃書曰柱國常山公家奴王襃有頃黄門郎裴政犯門而出帝遂去羽儀文物白馬素衣出東門抽劍擊闔曰蕭世誠一至此乎魏軍士度塹牽其轡至白馬寺北奪其所乗駿馬以駑馬代之遣長壯胡人手扼其背以行逢于謹胡人牽帝使拜梁王詧使鐡騎擁帝入營囚于烏幔之下甚為詧所詰辱帝性殘忍且懲高祖寛縱之弊故為政尚嚴及魏師圍城獄中死囚且數千人有司請釋之以充戰士帝不許悉令棓殺之事未成而城䧟十二月丙辰徐世譜任約退戍巴陵于謹逼帝使為書召王僧辯帝不可使者曰王今豈得自由帝曰我既不自由僧辯亦不由我又從長孫儉求宫人王氏茍氏及㓜子犀首儉並還之或問何意焚書帝曰讀書萬卷猶有今日故焚之辛未帝為魏人所殺梁王詧遣尚書傅準監刑以土囊隕之詧使以布帊纒尸斂以蒲席束以白茅葬於津陽門外並殺愍懐太子元良始安王才畧桂陽王大成等世祖性好書常令左右讀書晝夜不絶雖熟睡卷猶不釋或差誤及欺之帝輒驚寤作文章援筆立就常言我韜於文士愧於武夫論者以為得言魏立梁王詧為梁主資以荆州之地延袤三百里仍取其雍州之地詧居江陵東城魏置防主將兵居西城名曰助防外示助詧傋禦内實防之以前儀同三司王恱留鎭江陵于謹收府庫珍寳及宋渾天儀梁銅晷表大玉徑四尺及諸灋物盡俘王公以下及選百姓男女數萬口為奴婢分賞三軍驅歸長安小弱者皆殺之得免者三百餘家而人馬所踐及凍死者什二三魏師之在江陵也梁王詧將尹徳毅說詧曰魏虜貪惏肆其殘忍殺掠士民不可勝紀江東之人塗炭至此咸謂殿下為之殿下既殺人父兄孤人子弟人盡讎也誰與為國今魏之精銳盡萃于此若殿下為設享㑹請于謹等為歡預伏武士因而斃之分命諸將掩其營壘大殱羣醜俾無遺類收江陵百姓撫而安之文武羣寮隨材銓授魏人懾息未敢送死王僧辯之徒折簡可致然後朝服濟江入踐皇極晷刻之間大功可立古人云天與不取反受其咎願殿下恢𢎞逺畧勿懐匹夫之行詧曰卿此䇿非不善也然魏人待我厚未可背徳若遽為卿計人將不食吾餘既而闔城長㓜被虜又失襄陽詧乃歎曰恨不用尹徳毅之言王僧辯陳霸先共奉江州刺史晉安王方智為太宰承制王襃王克劉瑴宗懔殷不害及尚書右丞呉興沈炯至長安太師泰皆厚禮之敬帝紹泰元年春正月壬午朔邵陵太守劉棻將兵援江陵至三百里灘部曲宋文徹殺之帥其衆還據邵陵梁王詧即皇帝位於江陵改元大定追尊昭明太子為昭明皇帝廟號高宗妃蔡氏為昭徳皇后尊其母龔氏為皇太后立妻王氏為皇后子巋為皇太子賞刑制度並同王者唯上疏於魏則稱臣奉其正朔至於官爵其下亦依梁氏之舊其勲級則兼用柱國等名以諮議參軍蔡大寳為侍中尚書令參掌選事外兵參軍太原王操為五兵尚書大寳嚴整有智謀雅達政事文辭贍速後梁主推心任之以為謀主比之諸葛孔明操亦亞之追贈邵陵王綸太宰諡曰壯武河東王譽丞相諡曰武桓齊主使清河王岳將兵攻魏安州以救江陵岳至義陽江陵䧟因進軍臨江郢州刺史陸灋和及儀同三司宋蒞舉州降之長史江夏太守王岷不從殺之甲午齊召岳還使儀同三司清都慕容儼戍郢州王僧辯遣江州刺史侯瑱攻郢州任約徐世譜宜豐侯循皆引兵㑹之辛丑齊立貞陽侯淵明為梁主使其上黨王渙將兵送之徐陵湛海珍等皆聽從淵明歸貞陽侯陷魏事見侯景之亂二月癸丑晉安王至自尋陽入居朝堂即梁王位時年十三以太尉王僧辯為中書監録尚書驃騎大將軍都督中外諸軍事加陳霸先征西大將軍齊主先使殿中尚書邢子才馳傳詣建康與王僧辯書以為嗣主冲藐未堪負荷彼貞陽侯梁武猶子長沙之𦙍以年以望堪保金陵故置為梁主納於彼國卿宜部分舟艫迎接今主并心一力善建良圖乙卯貞陽侯淵明亦與僧辯書求迎僧辯復書曰嗣主體自宸極受於文祖明公儻能入朝同奬王室伊呂之任僉曰仰歸意在主盟不敢聞命甲子齊以陸灋和為都督荆雍等十州諸軍事太尉大都督西南道大行臺又以宋蒞為郢州刺史蒞弟簉為湘州刺史甲戌上黨王渙克譙郡己卯淵明又與僧辯書僧辯不從故劉棻主帥趙朗殺宋文徹以邵陵歸于王琳三月貞陽侯淵明至東關散騎常侍裴之横禦之丙戌齊克東關斬裴之横俘數千人王僧辯大懼出屯姑孰謀納淵明夏五月王琳迎永嘉王莊送之建康王僧辯遣使奉啟於貞陽侯淵明定君臣之禮又遣别使奉表於齊以子顯及顯母劉氏弟子世珍為質於淵明遣左民尚書周𢎞正至厯陽奉迎因求以晉安王為皇太子淵明許之淵明求度衛士三千僧辯慮其為變止受散卒千人庚子遣龍舟灋駕迎之淵明與齊上黨王渙盟於江北辛丑自采石濟江於是梁輿南度齊師北返僧辯疑齊擁檝中流不敢就西岸齊侍中裴英起衛送淵明與僧辯㑹于江寜癸卯淵明入建康望朱雀門而哭道逆者以哭對丙午即皇帝位改元天成以晉安王為皇太子王僧辯為大司馬陳霸先為侍中六月齊慕容儼始入郢州而侯瑱等奄至城下儼隨方備禦瑱等不能克乗間出擊瑱等軍大破之城中食盡煮草木根葉及靴皮帶角食之與士卒分甘共苦堅守半嵗人無異志貞陽侯淵明立乃命瑱等解圍瑱還鎭豫章齊人以城在江外難守因割以還梁儼歸望齊主悲不自勝齊主呼前執其手脫㡌看髮歎息乆之呉興太守杜龕王僧辯之壻也僧辯以呉興為震州用龕為刺史又以其弟侍中僧愔為豫章太守壬子齊主以梁國稱藩詔凡梁民悉遣南還初王僧辯與陳霸先共滅侯景情好甚篤僧辯為子頠娶霸先女㑹僧辯有母喪未成昏僧辯居石頭城霸先在京口僧辯推心待之頠兄顗屢諫不聽及僧辯納貞陽侯淵明霸先遣使苦爭之徃返數四僧辯不從霸先竊歎謂所親曰武帝子孫甚多唯孝元能復讎雪耻其子何罪而忽廢之吾與王公並處託孤之地而王公一旦改圖外依戎狄援立非次其志欲何所為乎乃密具袍數千領及錦綵金銀為賞賜之具㑹有告齊師大舉至壽春將入冦者僧辯遣記室江旴告霸先使為之備霸先因是留旴於京口舉兵襲僧辯九月壬寅召部將侯安都周文育及安陸徐度錢塘杜稜謀之稜以為難霸先懼其謀泄以手巾絞稜悶絶于地因閉於别室部分將士分賜金帛以弟子著作郎曇朗鎭京口知留府事使徐度侯安都帥水軍趨石頭霸先帥馬步自江乗羅落㑹之是夜皆發召杜稜與同行知其謀者唯安都等四將外人皆以為江旴徵兵禦齊不之怪也甲辰安都引舟艦將趣石頭霸先控馬未進安都大懼追霸先罵曰今日作賊事勢已成生死須決在後欲何所望若敗俱死後期得免斫頭邪霸先曰安都嗔我乃進安都至石頭城北棄舟登岸石頭城北接岡阜不甚危峻安都被甲帶長刀軍人捧之投於女垣内衆隨而入進及僧辯卧室霸先兵亦自南門入僧辯方視事外白有兵俄而兵自内出僧辯遽走遇子頠與俱出閤帥左右數十人苦戰于聽事前力不敵走登南門樓拜請求哀霸先欲縱火焚之僧辯與頠俱下就執霸先曰我有何辜公欲與齊師賜討且曰何意全無備僧辯曰委公北門何謂無備是夜霸先縊殺僧辯父子既而竟無齊兵亦非霸先之譎也前青州刺史新安程靈洗帥所領救僧辯力戰於石頭西門軍敗霸先遣使招諭乆之乃降霸先深義之以為蘭陵太守使助防京口乙巳霸先為檄布告中外列僧辯罪狀且曰資斧所指唯王僧辯父子兄弟其餘親黨一無所問丙午貞陽侯淵明遜位出就邸百僚上晉安王表勸進冬十月己酉晉安王即皇帝位大赦改元中外文武賜位一等以貞陽侯淵明為司徒封建安公告齊云僧辯隂圖篡逆故誅之仍請稱臣於齊永為藩國齊遣行臺司馬恭與梁人盟于厯陽壬子加陳霸先尚書令都督中外諸軍事車騎將軍揚南徐二州刺史杜龕恃王僧辯之勢素不禮於陳霸先在呉興毎以灋繩其宗族霸先深怨之及將圖僧辯密使兄子蒨還長城立柵以備龕僧辯死龕據呉興拒霸先義興太守韋載以郡應之呉郡太守王僧智僧辯之弟也亦據城拒守陳蒨至長城收兵纔數百人杜龕遣其將杜泰將精兵五千奄至將士相視失色蒨言笑自若部分益明衆心乃定泰日夜苦攻數旬不克而退霸先使周文育攻義興義興屬縣卒皆霸先舊兵善用弩韋載收得數十人繫以長鎻命所親監之使射文育軍約曰十發不兩中者死故毎發輒斃一人文育軍稍却載因於城外據水立柵相持數旬杜龕遣其從弟北叟將兵拒戰北叟敗歸于義興霸先聞文育軍不利辛未自表東討留高州刺史侯安都石州刺史杜稜宿衛臺省甲戌軍至義興丙子㧞其水柵譙秦二州刺史徐嗣徽從弟嗣先僧辯之甥也僧辯死嗣先亡就嗣徽嗣徽以州入于齊及陳霸先東討義興嗣徽密結南豫州刺史任約將精兵五千乗虚襲建康是日入據石頭游騎至闕下侯安都閉門藏旗幟示之以弱令城中曰登陴闚賊者斬及夕嗣徽等收兵還石頭安都夜為戰備將旦嗣徽等又至安都帥甲士三百開東西掖門出戰大破之嗣徽等犇還石頭不敢復逼臺城陳霸先遣韋載族弟翽齎書諭戰丁丑載及杜北叟皆降霸先厚撫之以翽監義興郡引載置左右與之謀議覇先巻甲還建康使周文育討杜龕救長城將軍黄他攻王僧智於呉郡不克霸先使寜逺將軍裴忌助之忌選所部精兵輕行倍道自錢塘直趣呉郡夜至城下鼓譟薄之僧智以為大軍至輕舟犇呉興忌入據呉郡因以忌為太守十一月己卯齊遣兵五千度江據姑孰以應徐嗣徽任約陳霸先使合州刺史徐度立柵於冶城庚寅齊又遣安州刺史翟子崇楚州刺史劉士榮淮州刺史柳達摩將兵萬人於胡墅度米三萬石馬千匹入石頭霸先問計於韋載載曰齊師若分兵先據三呉之路畧地東境則時事去矣今可急於淮南因侯景故壘築城以通東道轉輸分兵絶彼之糧運使進無所資則齊將之首旬日可致霸先從之癸未使侯安都夜襲胡墅燒齊船千餘艘仁威將軍周鐡虎斷齊運輸擒其北徐州刺史張領州仍遣韋載於大航築侯景故壘使杜稜守之齊人於倉門水南立二柵與梁兵相拒壬辰齊大都督蕭軌將兵屯江北甲辰徐嗣徽等攻冶城柵陳霸先將精甲自西明門出擊之嗣徽等大敗留柳達摩等守城自徃采石迎齊援十二月癸丑侯安都襲秦郡破徐嗣徽柵俘數百人收其家得其琵琶及鷹遣使送之曰昨至弟處得此今以相還嗣徽大懼丙辰陳霸先對冶城立航悉度衆軍攻其水南二柵柳達摩等度淮置陳霸先督兵疾戰縱火燒柵齊兵大敗爭舟相擠溺死者以千數呼聲震天地盡收其船艦是日嗣徽與任約引齊兵水步萬餘人還據石頭霸先遣兵詣江寜據要險嗣徽等水步不敢進頓江寜浦口霸先遣侯安都將水軍襲破之嗣徽等單舸脫走盡收其軍資器械己未霸先四面攻石頭城中無水升水直絹一匹庚申達摩遣使請和於霸先且求質子時建康虚弱糧運不繼朝臣皆欲與齊和請以霸先從子曇朗為質霸先曰今在位諸賢欲息肩於齊若違衆議謂孤愛曇朗不恤國家今決遣曇朗棄之冦庭齊人無信謂我微弱必當背盟齊寇若來諸君須為孤力鬭也乃以曇朗及永嘉王莊丹陽尹王冲之子珉為質與齊人盟於城外將士恣其南北辛酉霸先陳兵石頭南門送齊人歸北徐嗣徽任約皆犇齊收齊馬仗船米不可勝計齊主誅柳達摩壬戌齊和州長史烏丸逺自南州犇還厯陽江寜令陳嗣黄門侍郎曹朗據姑孰反霸先命侯安都等討平之霸先恐陳曇朗亡竄自帥步騎至京口迎之太平元年春正月癸未陳霸先使從事中郎江旴說徐嗣徽使南歸嗣徽執旴送齊陳蒨周文育合軍攻杜龕於呉興龕勇而無謀嗜酒常醉其將杜泰隂與蒨等通龕與蒨等戰敗泰因說龕使降龕然之其妻王氏曰霸先讐隙如此何可求和因出私財賞募復擊蒨等大破之既而杜泰降於蒨龕尚醉未覺蒨遣人負出於項王寺前斬之王僧智與其弟豫章太守僧愔俱犇齊東揚州刺史張彪素為王僧辯所厚不附霸先二月庚戌陳蒨周文育輕兵襲㑹稽彪兵敗走入若邪山中蒨遣其將呉興章昭達追斬之東陽太守留異饋蒨糧食霸先以異為縉州刺史江州刺史侯瑱本事王僧辯亦擁兵據豫章及江州不附霸先霸先以周文育為南豫州刺史使將兵擊湓城庚申又遣侯安都周鐡虎將舟師立柵於梁山以備江州癸亥徐嗣徽任約襲采石執戍主明州刺史張懐鈞送於齊三月戊戌齊遣儀同三司蕭軌庫狄伏連尭難宗東方老等與任約徐嗣徽合兵十萬入寇出柵口向梁山陳霸先帳内盪主黄叢逆擊破之齊師退保蕪湖霸先遣定州刺史沈泰等就侯安都共據梁山以禦之周文育攻湓城未克召之還夏四月丁巳霸先如梁山廵撫諸軍侯安都輕兵襲齊行臺司馬恭於厯陽大破之俘獲萬計五月齊人召建安公淵明詐許退師陳霸先具舟送之癸未淵明疽發背卒甲申齊兵發蕪湖庚寅入丹陽縣丙申至秣陵故治陳霸先遣周文育屯方山徐度頓馬牧杜稜頓大航南以禦之辛丑齊人跨淮立橋柵度兵夜至方山徐嗣徽等列艦於青墩至於七磯以斷周文育歸路文育鼓譟而發嗣徽等不能制至旦反攻嗣徽嗣徽驍將鮑砰獨以小艦殿軍文育乗單舴艋與戰跳入艦中斬砰仍牽其艦而還嗣徽衆大駭因留船蕪湖自丹陽步上陳霸先追侯安都徐度皆還癸卯齊兵自方山進及倪塘游騎至臺建康震駭帝總禁兵出頓長樂寺内外纂嚴霸先拒嗣徽等於白城適與周文育㑹將戰風急霸先曰兵不逆風文育曰事急矣何用古灋抽槊上馬先進衆軍從之風亦尋轉殺傷數百人侯安都與嗣徽等戰於耕壇南安都帥十二騎突其陳破之生擒齊儀同三司乞伏無勞霸先潜撤精卒三千配沈泰度江襲齊行臺趙彦深於瓜步獲艦百餘艘粟萬斛六月甲辰齊兵潜至鍾山侯安都與齊將王敬寳戰于龍尾軍主張纂戰死丁未齊師至幕府山霸先遣别將錢明將水軍出江乘邀擊齊人糧運盡獲其船米齊軍乏食殺馬驢食之庚戌齊軍踰鍾山霸先與衆軍分頓樂遊苑東及覆舟山北斷其衝要壬子齊軍至𤣥武湖西北將據北郊壇衆軍自覆舟東移頓壇北與齊人相對㑹連日大雨平地水丈餘齊軍晝夜坐立泥中足指皆爛懸鬲以㸑而臺中及潮溝北路燥梁軍毎得番易時四方壅隔糧運不至建康戸口流散徵求無所甲寅少霽霸先將戰調市人得麥飯分給軍士士皆飢疲㑹陳蒨饋米二千斛鴨千頭霸先命炊米煮鴨人人以荷葉裹飯婫以鴨肉數臠乙卯未明蓐食比曉霸先帥麾下出幕府山侯安都謂其部將蕭摩訶曰卿驍勇有名千聞不如一見摩訶對曰今日令公見之及戰安都墜馬齊人圍之摩訶單騎大呼直衝齊軍齊軍披靡安都乃免霸先與呉明徹沈泰等衆軍首尾齊舉縱兵大戰安都自白下引兵横出其後齊師大潰斬獲數千人相蹂藉而死者不可勝計生擒徐嗣徽及弟嗣宗斬之以徇追犇至于臨沂其江乗攝山鍾山等諸軍相次克㨗虜蕭軌東方老王敬寳等將帥凡四十六人其軍士得竄至江者縳荻筏以濟中江而溺流尸至京口翳水彌岸唯任約王僧愔得免丁巳衆軍出南州燒齊舟艦戊午大赦己未解嚴軍士以賞俘貿酒一人裁得一醉庚申斬齊將蕭軌等齊人聞之亦殺陳曇朗霸先啟解南徐州以授侯安都秋七月丙子以陳霸先為中書監司徒揚州刺史進爵長城公餘如故九月以陳霸先為丞相録尚書事鎭衛大將軍揚州牧義興公陳高祖永定元年夏五月王琳將攻陳霸先霸先以侯安都周文育帥舟師㑹武昌以擊之事見王琳犇齊秋八月甲午進丞相霸先位太傅加黄銊殊禮賛拜不名九月辛丑進丞相為相國總百揆封陳公備九錫陳國置百司冬十月戊辰進陳公爵爲王辛未梁敬帝禪位于陳陳王使中書舍人劉師知引宣猛將軍沈恪勒兵入宫衛送梁主如别宫恪排闥見王叩頭謝曰恪身經事蕭氏今日不忍見此分受死耳決不奉命王嘉其意不復逼更以盪主王僧志代之乙亥王即皇帝位于南郊還宫大赦改元奉梁敬帝為江隂王梁太后為太妃皇后為妃二年春正月王琳求援于齊且請納梁永嘉王莊以主梁祀三月齊發兵援送永嘉王莊於江南册拜王琳為梁王相琳奉莊即皇帝位乙丑上使人害梁敬帝立梁武林侯諮之子季卿為江隂王文帝天嘉元年王琳兵敗犇齊御史中丞劉仲威奉永嘉王莊犇齊六月詔葬梁元帝於江寜車旗禮章悉用梁典三年閏二月後梁主以封疆褊隘邑居殘毁干戈日用鬰鬰不得志疽發背而殂葬平陵諡曰宣皇帝廟號中宗太子巋即皇帝位改元太保宣帝太建二年冬十月永嘉王莊卒於鄴十三年梁主遣其弟太宰巖入賀于隋長城公至徳元年夏五月乙巳梁太子琮入朝于隋三年梁主殂謚曰孝明皇帝廟號世宗太子琮嗣位禎明元年秋八月隋徵梁主入朝梁主帥其羣臣二百餘人發江陵庚申至長安九月隋主廢梁國遣尚書左僕射高熲安集遺民梁中宗世宗各給守冢十戸拜梁主琮上柱國賜爵莒公西魏取蜀梁簡文帝大寶元年侯景之亂太尉益州刺史武陵王紀移告征鎭使世子圓照帥兵三萬受湘東王節度圓照軍至巴水繹授以信州刺史令屯白帝未許東下冬十一月武陵王紀帥諸軍發城都湘東王繹遣使以書止之曰蜀人勇悍易動難安弟可鎭之吾自當滅賊又别紙云地擬孫劉各安境界情深魯衛書信恒通二年江安侯圓正為西陽太守寛和好施歸附者衆有兵一萬湘東王繹欲圖之署為平南將軍及至弗見使南平王恪與之飲醉因囚之内省分其部曲使人告其罪荆益之釁自此起矣冬十一月益州長史劉孝勝等勸武陵王紀稱帝紀雖未許而大造乗輿車服元帝承聖元年益州刺史太尉武陵王紀頗有武畧在蜀十七年南開寜州越嶲西通資陵吐谷渾内脩耕桑鹽鐡之政外通商賈逺方之利故能殖其財用器甲殷積有馬八千匹聞侯景陷臺城湘東王將討之謂僚佐曰七官文士豈能匡濟内寢柏殿柱繞節生花紀以為已瑞夏四月乙巳即皇帝位改元天正立子圓照為皇太子圓正為西陽王圓滿為竟陵王圓普為譙王圓肅為宜都王以巴西梓潼二郡太守永豐侯撝為征西大將軍益州刺史封秦郡王司馬王僧畧直兵參軍徐怦固諫不從僧畧僧辯之弟怦勉之從子也初臺城之圍怦勸紀速入援紀意不欲行内銜之㑹蜀人費合告怦反怦有與將帥書云事事徃人口具紀即以為反徵謂怦曰以卿舊情當使諸子無恙對曰生兒悉如殿下留之何益紀乃盡誅之梟首於市亦殺王僧畧永豐侯撝歎曰王事不成矣善人國之基也今先殺之不亡何待紀徵宜封侯諮議參軍劉璠為中書侍郎使者八反乃至紀令劉孝勝深布腹心璠苦求還中記室韋登私謂璠曰殿下忍而蓄憾足下不留將致大禍孰若共構大厦使身名俱羙哉璠正色曰卿欲緩頰於我邪我與府侯分義已定豈以夷險易其心乎殿下方布大義於天下終不逞志於一夫紀知必不為己用乃厚禮遣之秋八月武陵王紀舉兵由外水東下以永豐侯撝為益州刺史守成都使其子宜都王圓肅副之二年春二月上聞武陵王紀東下使方士畫版為紀像親釘支體以厭之又執侯景之俘以報紀初紀之舉兵皆太子圓照之謀也圓照時鎭巴東執留使者啟紀云侯景未平宜急進討已聞荆鎭為景所破紀信之趣兵東下上甚懼與魏書曰子糾親也請君討之太師泰曰取蜀制梁在兹一舉諸將咸難之大將軍代人尉遲迥泰之甥也獨以為可克泰問以方畧迥曰蜀與中國隔絶百有餘年恃其險逺不虞我至若以鐡騎兼行襲之無不克矣泰乃遣迥督開府儀同三司原珍等六軍甲士萬二千騎萬匹自散關伐蜀夏五月武陵王紀至巴郡聞有魏兵遣前梁州刺史巴西譙淹還軍救蜀初楊乾運求為梁州刺史紀以為潼州楊灋琛求黎州刺史以為沙州二人皆不恱乾運兄子畧說乾運曰今侯景初平宜同心戮力保國寜民而兄弟尋戈此自亡之道也夫木朽不雕世衰難佐不如送欵關中可以功名兩全乾運然之令畧將二千人鎭劍閣又遣其壻樂廣鎭安州與灋琛皆潜通於魏魏太師泰密賜乾運鐡券授驃騎大將軍開府儀同三司梁州刺史尉遲迥以開府儀同三司侯吕陵始為前軍至劍閣畧退就樂廣翻城應始始入據安州甲戌迥至涪水乾運以州降迥分軍守之進襲成都時成都見兵不滿萬人倉庫空竭永豐侯撝嬰城自守迥圍之譙淹遣江州刺史景欣幽州刺史趙㧞扈援成都迥使原珍等擊走之武陵王紀至巴東知侯景已平乃自悔召太子圓照責之對曰侯景雖平江陵未服紀亦以既稱尊號不可復為人下欲遂東進將卒日夜思歸其江州刺史王開業以為宜還救根本更思後圖諸將皆以為然圓照及劉孝勝固言不可紀從之宣言於衆曰敢諫者死己丑紀至西陵軍勢甚盛舳艫翳川䕶軍陸灋和築二城於峽口兩岸運石塡江鐡鎻斷之帝赦任約於獄以為晉安王司馬使助灋和拒紀謂之曰汝罪不容誅我不殺汝本為今日因撤禁兵以配之仍許妻以盧陵王續之女使宣猛將軍劉棻與之俱夏六月壬辰武陵王紀築連城攻絶鐡鎻陸灋和告急相繼上以謝答仁為步兵校尉配兵使助灋和武陵王紀遣將軍侯叡將衆七千築壘與陸灋和相拒上遣使與紀書許其還蜀專制一方紀不從報書如家人禮上復與紀書曰吾年為一日之長屬有平亂之功膺此樂推事歸當璧儻遣使乎良所遲也如曰不然於此投筆友于兄弟分形共氣兄肥弟瘦無復相見之期讓棗推梨永罷懽愉之日心乎愛矣書不盡言紀頓兵日乆頻戰不利又聞魏冦深入成都孤危憂懣不知所為乃遣其度支尚書樂奉業詣江陵求和請依前㫖還蜀奉業知紀必敗啟上曰蜀軍乏糧士卒多死危亡可待上遂不許其和紀以黄金一斤為餅餅百為篋至有百篋銀五倍於金錦罽繒綵稱是毎戰懸示將士不以為賞寜州刺史陳智祖請散之以募勇士弗聽智祖哭而死有請事者紀辭疾不見由是將卒解體秋七月辛未巴東民符昇等斬峽口城主公孫晃降於王琳謝答仁任約進攻侯叡破之㧞其三壘於是兩岸十四城俱降紀不獲退順流東下逰擊將軍南陽樊猛追擊之紀衆大潰赴水死者八千餘人猛圍而守之上密敕猛曰生還不成功也猛引兵至紀所紀在舟中繞牀而走以金囊擲猛曰以此雇卿送我一見七官猛曰天子何由可見殺足下金將安之遂斬紀及其㓜子圓滿陸灋和收太子圓照兄弟三人送江陵上絶紀屬籍賜姓饕餮氏下劉孝勝獄已而釋之上使謂江安侯圓正曰西軍已敗汝父不知存亡意欲使其自裁圓正聞之號哭稱世子不絶聲上頻使覘之知不能死移送廷尉獄見圓照曰兄何乃亂人骨肉使痛酷如此圓照唯云計誤上並命絶食於獄至齧臂啖之十三日而死逺近聞而悲之魏尉遲迥圍成都五旬永豐侯撝屢出戰皆敗乃請降諸將欲不許迥曰降之則將士全逺人恱攻之則將士傷逺人懼遂受之八月戊戌撝與宜都王圓肅帥文武詣軍門降迥以禮接之與盟於益州城北吏民皆復其業唯收奴婢及儲積以賞將士軍無私焉魏以撝及圓肅並為開府儀同三司以迥為大都督益潼等十二州諸軍事益州刺史三年魏加益州刺史尉遲迥督六州通前十八州自劍閣以南得承制封拜及黜陟迥明賞罰布威恩綏輯新民經畧未附華夷懐之通鑑紀事本末巻二十四上欽定四庫全書通鑑紀事本末卷二十四中宋袁樞撰蕭勃據嶺南梁武帝太清三年西江督䕶陳霸先欲起兵討侯景景使人誘廣州刺史元景仲許奉以為主景仲由是附景隂圖霸先霸先知之與成州刺史王懐明等集兵南海馳檄以討景仲曰元景仲與賊合從朝廷遣曲陽侯蕭勃為刺史軍已頓朝亭景仲所部聞之皆棄景仲而散秋七月甲寅景仲縊於閤下霸先迎定州刺史蕭勃鎮廣州前髙州刺史蘭裕欽之弟也與其諸弟扇誘始興等十郡攻監衡州事歐陽頠勃使霸先救之悉擒裕等勃因以霸先監始興郡事冬十二月始興太守陳霸先結郡中豪傑欲討侯景郡人矦安都張偲等各帥衆千餘人歸之霸先遣主帥杜僧明將二千人頓於嶺上廣州刺史蕭勃遣人止之曰侯景驍雄天下無敵前者援軍十萬士馬精彊猶不能克君以區區之衆將何所之如聞嶺北王矦又皆鼎沸親尋干戈以君踈外詎可暗投未若且留始興遥張聲勢保太山之安也霸先曰僕荷國恩往聞矦景渡江即欲赴援遭值元蘭梗我中道今京都覆沒君辱臣死誰敢愛命君侯體則皇枝任重方岳遣僕一軍猶賢乎已乃更止之乎乃遣使間道詣江陵受湘東王繹節度時南康土豪蔡路養起兵據郡勃乃以腹心譚世逺為曲江令與路養相結同遏霸先簡文帝大寳元年春正月陳霸先發始興至大庾嶺蔡路養將二萬人軍於南野以拒之路養妻姪蘭陵蕭摩訶年十三單騎出戰無敢當者杜僧明馬被傷陳霸先救之授以所乗馬僧明上馬復戰衆軍因而乗之路養大敗脫身走元帝承聖三年廣州刺史曲江矦勃自以非上所授内不自安上亦疑之勃啟求入朝五月乙巳上以王琳為廣州刺史勃為晉州刺史秋九月曲江侯勃遷居始興陳髙祖永定元年初梁世祖以始興郡為東衡州以歐陽頠為刺史久之徙頠為郢州刺史蕭勃留頠不遣世祖以王琳代勃為廣州刺史勃遣其將孫盪監廣州盡帥所部屯始興以避之頠别據一城不往謁閉門自守勃怒遣兵襲之盡收其貲財馬仗尋赦之使復其所與之結盟江陵䧟頠遂事勃二月庚午勃起兵於廣州遣頠及其將傅泰蕭孜為前軍孜勃之從子也南江州刺史余孝頃以兵㑹之詔平西將軍周文育帥諸軍討之歐陽頠等出南康頠屯豫章之苦竹灘傅泰據蹠口城余孝頃遣其弟孝勱守郡城自出豫章據石頭巴山太守熊曇朗誘頠共襲髙州刺史黄灋􅉤又語灋􅉤約共破頠且曰事捷與我馬仗遂出軍與頠俱進至灋􅉤城下曇朗陽敗走灋􅉤乗之頠失援而走曇朗取其馬仗歸于巴山周文育軍少舡余孝頃有舡在上牢文育遣軍主焦僧度襲之盡取以歸仍於豫章立柵軍中食盡諸將欲退文育不許使人間行遺衡州刺史周迪書約為兄弟迪得書甚喜許饋以糧於是文育分遣老弱乗故舡㳂流俱下燒豫章柵偽若遁去者孝頃望之大喜不復設備文育由間道兼行據芉韶芉韶上流則歐陽頠蕭孜下流則傅泰余孝頃營文育據其中間築城饗士頠等大駭頠退入泥溪文育遣嚴威將軍周鐡虎等襲頠癸巳擒之文育盛陳兵甲與頠乗舟而宴廵蹠口城下使其將丁法洪攻泰擒之孜孝頃退走三月庚子周文育送歐陽頠傅泰于建康丞相霸先與頠有舊釋而厚待之曲江矦勃在南康聞歐陽頠等敗軍中忷懼甲寅徳州刺史陳法武前衡州刺史譚世逺攻勃殺之夏四月故曲江矦勃主帥蘭敳襲殺譚世逺軍主夏侯明徹殺敳持勃首降勃故記室李寳藏奉懐安矦任據廣州蕭孜余孝頃猶據石頭為兩城各居其一多設舡艦夾水而陳丞相霸先遣平南將軍矦安都助周文育擊之戊戌安都潜師夜燒其舡艦文育帥水軍安都帥步騎進攻之蕭孜出降孝頃逃歸新吳文育等引兵還丞相霸先以歐陽頠聲著南土復以頠為衡州刺史使討嶺南未至其子紇已克始興頠至嶺南諸郡皆降遂克廣州嶺南悉平五月戊辰余孝頃遣使詣丞相府乞降二年王琳之引兵東下也衡州刺史周迪欲自據南川乃總召所部八郡守宰結盟齊言入赴上恐其為變厚慰撫之新吳洞主余孝頃遣沙門道林說琳曰周廸黄法􅉤皆依附金陵隂窺間隙大軍若下必為後患不如先定南川然後東下孝頃請席卷所部以從下吏琳乃遣輕車將軍樊猛平南將軍李孝欽平東將軍劉廣徳將兵八千赴之使孝頃總督三將屯於臨川故郡徴兵糧於迪以觀其所為夏五月癸巳余孝頃等屯二萬軍于工塘連八城以逼周迪迪懼請和并送兵糧樊猛等欲受盟而還孝頃貪其利不許樹柵圍之由是猛等與孝頃不協秋七月髙州刺史黄法􅉤吳興太守沈恪寧州刺史周敷合兵救周迪敷自臨川故郡斷江口分兵攻余孝頃别城樊猛等不救而沒劉廣徳乗流先下故獲全孝頃等皆棄舟引兵步走迪追擊盡擒之送孝頃及李孝欽於建康歸樊猛於王琳九月余孝頃之弟孝勱及子公颺猶據舊柵不下庚午詔開府儀同三司周文育都督衆軍出豫章討之三年夏五月周文育周迪黄法􅉤共討余公颺豫章太守熊曇朗引兵㑹之衆且萬人文育軍於金口公颺詐降謀執文育文育覺之囚送建康文育進屯三陂王琳遣其將曹慶帥二千人救余孝勱慶分遣主帥常衆愛與文育相拒自帥其衆攻周迪及安南將軍吳明徹迪等敗文育退據金口熊曇朗因其失利謀殺文育以應衆愛監軍孫白象聞其謀勸文育先之文育不從時周迪棄舡走不知所在乙酉文育得迪書自齎以示曇朗曇朗殺之於坐而併其衆因據新淦城曇朗將兵萬人襲周敷敷擊破之曇朗單騎犇巴山六月周文育之討余孝勱也帝令南豫州刺史矦安都繼之文育死安都還遇王琳將周炅周協南歸與戰擒之孝勱弟孝猷帥所部四千家詣安都降安都進軍至左里擊曹慶常衆愛破之衆愛奔廬山庚寅廬山民斬之傳首文帝天嘉元年王琳之東下也帝徴南川兵江州刺史周迪髙州刺史黄法􅉤帥舟師將赴之熊曇朗據城列艦塞其中路迪等與周敷共圍之琳敗曇朗部衆離心迪攻拔其城虜男女萬餘口曇朗走入村中村民斬之傳首建康盡滅其族王琳奔齊陳伐齊梁元帝承聖元年冬十月戊申湘東王執湘州刺史王琳於殿中殺其副將殷宴琳本會稽兵家其姊妹皆入王宫故琳少在王左右琳好勇王以為將帥琳傾身下士所得賞賜不以入家麾下萬人多江淮羣盗從王僧辯平矦景與杜龕功居第一在建康恃寵縱暴僧辯不能禁僧辯以宫殿之燒恐得罪欲以琳塞責乃宻啟王請誅琳王以琳為湘州琳自疑及禍使長史陸納帥部曲赴湘州身詣江陵陳謝謂納等曰吾若不返子將安之咸曰請死之相泣而别至江陵王下琳吏辛酉以王子方略為湘州刺史又以廷尉黄羅漢為長史使與太舟卿張載至巴陵先據琳軍載有寵於王而御下峻刻荆州人疾之如讐羅漢等至琳軍陸納及士卒並哭不肯受命執羅漢及載王遣宦者陳旻往諭之納對旻刳載腹抽膓以繫馬足使繞而走腸盡氣絶又臠割出其心向之忭舞焚其餘骨以黄羅漢清謹而勉之納與諸將引兵襲湘州時州中無主納遂據之十一月湘東王即皇帝位於江陵陸納襲擊衡州刺史丁道貴於渌口破之道貴奔零陵其衆悉降於納上聞之遣使徴司徒王僧辯右衛將軍杜崱平北將軍裴之横與宜豐矦循共討納循軍巴陵以待之二年春三月陸納遣其將吳藏潘烏黒李賢明等下據車輪王僧辯至巴陵宜豐矦循讓都督於僧辯僧辯弗受上乃以僧辯循為東西都督夏四月丙申僧辯軍于車輪陸納夾岸為城以拒王僧辯納士卒皆百戰之餘僧辯憚之不敢輕進稍作連城以逼之納以僧辯為怯不設備五月甲子僧辯命諸軍水陸齊進急攻之僧辯親執旗鼓宜豐矦循身受矢石拔其二城納衆大敗步走保長沙六月上遣使送王琳令說諭陸納乙未琳至長沙僧辯使送示之納衆悉拜且泣使謂僧辯曰朝廷若赦王郎乞聽入城僧辯不許復送江陵陸法和求救不已上欲召長沙兵恐失陸納乃復遣琳許其入城琳既入納遂降湘州平上復琳官爵秋八月以湘州刺史王琳為衡州刺史三年夏五月乙巳以王琳為廣州刺史上以琳部衆彊盛又得衆心故欲逺之琳與主書廣漢李膺厚善私謂膺曰琳小人也䝉官拔擢至此今天下未定遷琳嶺南如有不虞安得琳力竊揆官意不過疑琳琳分望有限豈與官爭為帝乎何不以琳為雍州刺史鎮武寧琳自放兵作田為國禦捍膺然其言而弗敢啟冬十一月魏師圍江陵帝徴廣州刺史王琳為湘州刺史使引兵入援王琳軍至長沙鎮南府長史裴政間道先報江陵為魏人所獲臺城䧟帝為魏人所殺事見梁氏亂亡敬帝紹㤗元年春正月梁王詧即皇帝位於江陵以莫勇為武州刺史魏永壽為巴州刺史湘州刺史王琳將兵自小桂北下至蒸城聞江陵已䧟為世祖發哀三軍縞素遣别將矦平帥舟師攻後梁琳屯兵長沙傳檄州郡為進取之計長沙王韶及上㳺諸將皆推琳為盟主二月矦平攻後梁巴武二州故劉棻主帥趙朗殺宋文徹以邵陵歸于王琳夏五月庚辰矦平等擒莫勇魏永壽江陵之䧟也永嘉王莊生七年矣尼法慕匿之王琳迎莊送之建康秋八月辛巳王琳自蒸城還長沙冬十月以王琳為車騎將軍開府儀同三司十二月以陳霸先從子曇朗及永嘉王莊為質于齊事見梁氏亂亡太平元年春二月後梁主擊矦平於公安平與長沙王韶引兵還長沙王琳遣平鎮巴州夏五月矦平頻破後梁軍以王琳兵威不接更不受指麾琳遣將討之平殺巴州助防吕旬收其衆奔江州矦瑱與之結為兄弟琳軍勢益衰乙丑遣使奉表詣齊并獻馴象江陵之䧟也琳妻蔡氏世子毅皆沒于魏琳又獻欵于魏以求妻子亦稱臣于梁秋七月魏太師泰遣安州長史鉗耳康買使于王琳琳遣長史席豁報之且請歸世祖及愍懐太子之柩泰許之八月魏以王琳為大將軍長沙郡公九月甲子王琳以舟師襲江夏冬十月壬申豐城矦泰以州降之十二月辛丑豐城矦泰奔齊齊以為永州刺史詔徴王琳為司空琳辭不至留其將潘純陀監郢州身還長沙魏人歸其妻子陳髙祖永定元年春正月詔以王琳為司空驃騎大將軍三月甲辰以司空王琳為湘郢二州刺史夏五月王琳既不就徴大治舟艦將攻陳霸先六月戊寅霸先以開府儀同三司矦安都為西道都督周文育為南道都督將舟師二萬㑹武昌以擊之秋八月丁卯周人歸梁世祖柩及諸將家屬千餘人於王琳冬十月梁敬帝禪位於陳矦安都至武昌王琳將樊猛棄城走周文育自豫章㑹之安都聞上受禪歎曰吾今兹必敗戰無名矣時兩將俱行不相統攝部下交爭稍不相平軍至郢州琳將潘純陀於城中遥射官軍安都怒進軍圍之未克而王琳至弇口安都乃釋郢州悉衆詣沌口留沈泰一軍守漢曲安都遇風不得進琳據東岸安都等據西岸相持數日乃合戰安都等大敗安都文育及禆將徐敬成周鐡虎程靈洗皆為琳所擒沈泰引軍奔歸琳引見諸將與語周鐵虎辭氣不屈琳殺鐵虎而囚安都等總以一長鏁繫之置琳所坐䑽下令所親宦者王子晉掌視之琳乃移湘州軍府就郢城又遣其將樊猛襲據江州二年春正月王琳引兵下至湓城屯於白水浦帶甲十萬琳以北江州刺史魯悉達為鎮北將軍上亦以悉達為征西將軍各送鼓吹女樂悉達兩受之遷延顧望皆不就上遣安西將軍沈泰襲之不克琳欲引軍東下而悉達制其中流琳遣使說誘終不從己亥琳遣記室宗虩求援於齊且請納梁永嘉王莊以主梁祀三月齊發兵援送梁永嘉王莊於江南冊拜王琳為梁丞相都督中外諸軍録尚書事琳遣兄子叔寶帥所部十州刺史子弟赴鄴琳奉莊即皇帝位改元天啟追諡建安公淵明曰閔皇帝帝以琳為侍中大將軍中書監餘依齊朝之命夏六月己巳詔司空矦瑱領軍將軍徐度帥舟師為前軍以討王琳秋七月戊戌上幸石頭送矦瑱等甲辰上遣吏部尚書謝哲往諭王琳哲朏之孫也八月謝哲返命王琳請還湘州詔追衆軍還癸未衆軍至自大雷冬十二月後梁主遣其大將軍王操將兵略取王琳之長沙武陵南平等郡三年春正月王琳召桂州刺史淳于量量雖與琳合而潜通於陳二月辛酉以量為開府儀同三司三月梁永嘉王莊至郢州遣使入貢于齊王琳遣其將雷文策襲後梁監利太守蔡大有殺之夏六月丁酉上不豫丙午殂冬十月王琳聞髙祖殂乃以少府卿吳郡孫瑒為郢州刺史總留任奉梁永嘉王莊出屯濡須口齊揚州道行䑓慕容儼帥衆臨江為之聲援十一月乙卯琳冦大雷詔矦瑱矦安都及儀同徐度將兵禦之安州刺史吳明徹夜襲湓城琳遣巴陵太守任忠擊明徹大破之明徹僅以身免琳因引兵東下文帝天嘉元年春二月王琳至柵口矦瑱督諸軍出屯蕪湖相持百餘日東關春水稍長舟艦得通琳引合肥漅湖之衆舳艫相次而下軍勢甚盛瑱進軍虎檻州琳亦出船列于江西隔洲而泊明日合戰琳軍少却退保西岸及夕東北風大起吹其舟艦竝壊没于沙中浪大不得還浦及旦風靜琳入浦治舡瑱等亦引軍退入蕪湖周人聞琳東下遣都督荆襄等五十二州諸軍事荆州刺史史寧將兵數萬乗虗襲郢州孫瑒嬰城自守琳聞之恐其衆潰乃帥舟師東下去蕪湖十里而泊擊柝聞於陳軍齊儀同三司劉伯球將兵萬餘人助琳水戰行䑓慕容恃徳之子子㑹將鐡騎二千屯蕪湖西岸為之聲勢丙申瑱令軍中晨炊蓐食以待之時西南風急琳自謂得天助引兵直趣建業瑱等徐出蕪湖躡其後西南風翻為瑱用琳擲火炬以燒陳舡皆反燒其舡瑱發拍以擊琳艦又以牛皮冐䝉衝小舡以觸其艦并鎔鐵灑之琳軍大敗軍士溺死者什二三餘皆棄舡登岸走為陳軍所殺殆盡齊步騎在西岸者自相蹂踐並䧟于蘆荻泥淖中騎皆棄馬脫走得免者什二三擒劉伯球慕容子㑹斬獲萬計盡收梁齊軍資器械琳乗舴艋冐陳走至湓城欲收合離散衆無附者乃與妻妾左右十餘人奔齊先是琳使侍中袁泌御史中丞劉仲威侍衛永嘉王莊及敗左右皆散泌以輕舟送莊達于齊境拜辭而還遂來降仲威奉莊奔齊泌昻之子也樊猛及其兄毅帥部曲來降周軍復至郢州孫瑒士卒皆死戰周人不能克既而聞王琳敗陳兵將至乃解圍去瑒遣使舉中流之地來降二年春正月齊主使王琳出合肥召募傖楚更圖進取合州刺史裴景徽琳兄珉之壻也請以私屬為鄉導齊主使琳與行臺左丞盧潜將兵赴之琳沉吟不决景徽恐事泄挺身奔齊齊主以琳為驃騎大將軍開府儀同三司揚州刺史鎮壽陽三年春閏二月齊揚州刺史行臺王琳數欲南侵尚書盧潜以為時事未可上遣移書壽陽欲與齊和親潜以其書奏齊朝仍上啟且請息兵齊主許之遣散騎常侍崔瞻來聘且歸南康愍王曇朗之䘮琳由是與潜有隙更相表列齊主徴琳赴鄴以潜為揚州刺史領行臺尚書瞻㥄之子也秋七月上遣使聘齊冬十一月丁丑齊遣兼散騎常侍封孝琰來聘四年夏六月乙卯齊主使兼散騎常侍崔子武來聘五年夏四月辛卯齊主使兼散騎常侍皇甫亮來聘冬十一月戊戍齊主使兼散騎常侍劉逖來聘六年夏六月己巳齊主使兼散騎常侍王季髙來聘天康元年夏六月齊遣兼散騎常侍韋道儒來聘臨海王光大元年夏四月癸丑齊遣散騎常侍司馬㓜之來聘二年春正月癸亥齊主使兼散騎常侍鄭大護來聘宣帝太建二年春正月戊申齊使兼散騎常侍裴讞之來聘冬十月齊以梁永嘉王莊為開府儀同三司梁王許以興復竟不果及齊亡莊憤邑卒於鄴三年春正月丁巳齊使兼散騎常侍劉環儁來聘夏四月齊遣使來聘五年春三月帝謀伐齊公卿各有異同唯鎮前將軍吳明徹决䇿請行帝謂公卿曰朕意已决卿可共舉元帥衆議以中權將軍淳于量位重共署推之尚書左僕射徐陵獨曰吳明徹家在淮左悉彼風俗將略人才當今亦無過者都官尚書河東裴忌曰臣同徐僕射陵應聲曰非但明徹良將裴忌即良副也壬午分命衆軍以明徹都督征討諸軍事忌監軍事統衆十萬伐齊明徹出秦郡都督黄法􅉤出歴陽夏四月齊人於秦郡置秦州州前江浦通涂水齊人以大木為柵於水中辛亥吳明徹遣豫章内史程文季將驍勇拔其柵克之文季靈洗之子也齊人議禦陳師開府儀同三司王紘曰官軍比屢失利人情騷動若復出頓江淮恐北狄西冦乗弊而來則世事去矣莫若薄賦省徭息民養士使朝廷恊睦遐邇歸心天下皆當肅清豈直陳氏而已不從遣軍救歴陽庚申黄法􅉤擊破之又遣開府儀同三司尉破胡長孫洪略救秦州趙彦深私問計於祕書監源文宗曰吳賊侏張遂至於此弟往為秦涇刺史悉江淮間情事今何術以禦之文宗曰朝廷精兵必不肯多付諸將數千已下適足為吳人之餌尉破胡人品王之所知敗績之事匪朝伊夕國家待遇淮南失之同於蒿箭如文宗計者不過專委王琳招募淮南三四萬人風俗相通能得死力兼令舊將將兵屯於淮北足以固守且琳之於頊必不肯北面事之明矣竊謂此計之上者若不推赤心於琳更遣餘人掣肘復成速禍彌不可為彦深歎曰弟此䇿誠足制勝千里但口舌爭之十日已不見從時事至此安可盡言因相顧流涕文宗名彪以字行子恭之子也文宗子師為左外兵郎中攝祠部嘗白髙阿那肱龍見當雩阿那肱驚曰何處龍見其色如何師曰龍星初見禮當雩祭非真龍也阿那肱怒曰漢兒多事彊知星宿遂不祭師出竊歎曰禮既廢矣齊能久乎齊師選長大有膂力者為前隊號蒼頭犀角大力其鋒甚銳又有西域胡善射弦無虗發衆軍尤憚之辛酉戰于吕梁將戰吳明徹謂巴山太守蕭摩訶曰若殪此胡則彼軍奪氣君才不减關侯矣摩訶曰願示其狀當為公取之明徹乃召降人有識胡者使指示之自酌酒以飲摩訶摩訶飲畢馳馬衝齊軍胡挺身出陳前十餘步彀弓未發摩訶遥擲銑鋧正中其額應手而仆齊軍大力十餘人出戰摩訶又斬之於是齊軍大敗尉破胡走長孫洪略戰死破胡之出師也齊人使侍中王琳與之俱琳謂破胡曰吳兵甚銳宜以長䇿制之慎勿輕鬬破胡不從而敗琳單騎僅免還至彭城齊人即使之赴壽陽召募以拒陳師復以盧潜為揚州道行臺尚書甲子南譙太守徐槾克石梁城五月己巳瓦梁城降癸酉陽平郡降甲戌徐槾克廬江城歴陽窮蹙乞降黄法􅉤緩之則又拒守法􅉤怒帥卒急攻丙子克之盡殺戍卒進軍合肥合肥望旗請降法􅉤禁侵掠撫勞戌卒與之盟而縱之己卯齊北髙唐郡降辛巳詔南豫州刺史黄法􅉤徙鎮歴陽乙酉南齊昌太守黄詠克齊昌外城丙戌廬陵内史任忠軍于東關克其東西二城進克蘄城戊子又克譙郡城秦州城降癸巳𤓰步胡墅二城降六月庚子郢州刺吏李綜克灄口城乙巳任忠克合州外城庚戌淮陽沐陽郡並棄城走癸丑程文季攻齊涇州拔之乙卯宣毅司馬湛陀克新蔡城癸亥黄法􅉤克合州吳明徹進攻仁州甲子克之秋七月戊辰齊遣尚書左丞陸騫將兵二萬救齊昌出自巴蘄遇西陽太守汝南周炅炅留羸弱設疑兵以當之身率精銳由間道邀其後大破之己巳征北大將軍吳明徹軍至峽口克其北岸城南岸守者棄城走周炅克巴州淮北絳城及榖陽士民並殺其戍主以城降齊巴陵王王琳與揚州刺史王貴顯保壽陽外郭吳明徹以琳初入衆心未固丙戍乗夜攻之城潰齊兵退據相國城及金城八月乙未山陽城降壬寅盱眙城降壬子戎昭將軍徐敬辯克海安城青州東海城降戊午平固矦敬㤗等克晉州九月甲子陽平城降壬申髙陽太守沈善慶克馬頭城甲戌齊安城降丙子左衛將軍樊毅克廣陵楚子城冬十月吳明徹攻壽陽堰肥水以灌城城中多病腫泄死者什六七齊行臺右僕射琅邪皮景和等救壽陽以尉破胡新敗怯懦不敢前屯於淮口敕使屢促之然始度淮衆數十萬去壽陽三十里頓軍不進諸將皆懼曰堅城未拔大援在近將若之何明徹曰兵貴神速而彼結營不進自挫其鋒吾知其不敢戰明矣乙巳躬擐甲胄四面疾攻一鼓拔之生擒王琳王貴顯盧潜及扶風王可朱渾道裕尚書左丞李騊駼送建康景和北遁盡收其駝馬輜重琳體貌閑雅喜怒不形於色彊記明敏軍府佐吏千數皆能識其姓名刑罰不濫輕財愛士得將卒心雖失地流寓在鄴齊人皆重其忠義及被擒故麾下將卒多在明徹軍中見者皆􅒣欷不能仰視争為請命及致資給明徹恐其為變遣使追斬之於壽陽東二十里哭者聲如雷有一叟以酒脯來祭哭盡哀收其血而去田夫野老知與不知聞者莫不流涕齊穆提婆韓長鸞聞壽陽䧟握槊不輟曰本是彼物從其取去齊主聞之頗以為憂提婆等曰假使國家盡失黄河以南猶可作一龜兹國更可憐人生如寄唯當行樂何用愁為左右嬖臣因共賛和之帝即大喜酣飲鼓舞仍使於黎陽臨河築城戍丁未齊遣萬人至頴口樊毅擊走之辛亥遣兵援蒼陵又破之齊主以皮景和全軍而還賞之除尚書令丙辰詔以壽陽復為豫州以黄城為司州以明徹為都督豫合等六州諸軍事車騎大將軍豫州刺史遣謁者蕭淳風就壽陽冊命於城南設壇士卒二十萬陳旗鼔戈甲明徹登壇拜受成禮而退將卒榮之上置酒舉杯屬徐陵曰賞卿知人陵避席曰定䇿聖𠂻非臣力也以黄法􅉤為征西大將軍合州刺史戊午湛陀克齊昌城十一月甲戍淮隂城降庚辰威虜將軍劉桃枝克朐山城辛巳樊毅克濟隂城己丑魯廣達攻濟南徐州克之以廣達為北徐州刺史鎮其地齊北徐州民多起兵以應陳逼其州城祖珽命不閉城門禁人不得出衢路城中寂然反者不測其故疑人走城空不設備珽忽令鼓譟震天反者皆驚走既而復結陳向城珽令録事叅軍王君植將兵拒之自乗馬臨陳左右射反者先聞其盲謂其必不能出忽見之大驚穆提婆欲令城䧟不遣援兵珽且戰且守十餘日反者竟散走詔懸王琳首於建康市故吏梁驃騎倉曹叅軍朱瑒致書徐陵求其首曰竊以典午將滅徐廣為晉家遺老當塗已謝馬孚稱魏室忠臣梁故建寧公琳當離亂之辰總方伯之任天厭梁徳尚思匡繼徒藴包胥之志終遘萇𢎞之眚至使身没九泉頭行千里伏惟聖恩博厚明詔爰發赦王經之哭許田横之塟不使壽春城下唯傳報葛之人滄洲島上獨有悲田之客陵為之啟上十二月壬辰朔詔琳首皆還其親屬瑒瘞琳於八公山側義故㑹塟者數千人瑒間道奔齊别議迎塟尋有壽陽人茅智勝等五人宻送其柩於鄴齊贈琳開府儀同三司録尚書事謚曰忠武王給輼輬車以塟之齊顯祖狂暴常山王篡立附梁敬帝紹㤗元年初齊平秦王歸彦幼孤髙祖令清河昭武王岳養之岳情禮甚薄歸彦心銜之及顯祖即位歸彦為領軍大將軍大被寵遇岳謂其徳已更倚賴之岳屢將兵立功有威名而性豪侈好酒色起第於城南㕔事後開巷歸彦譛之於帝曰清河僣擬宫禁制為永巷但無闕耳帝由是惡之帝納倡婦薛氏於後宫岳先嘗因其姊迎之至第帝夜逰於薛氏家其姊為父乞司徒帝大怒縣其姊鋸殺之讓岳以姦岳不服帝益怒十一月乙亥使歸彦鴆岳岳自訴無罪歸彦曰飲之則家全飲之而卒塟贈如禮薛嬪有寵於帝久之帝忽思其與岳通無故斬首藏之於懐出東山宴飲勸酬始合忽探出其首投於柈上支解其尸弄其髀為琵琶一座大驚帝方收取對之流涕曰佳人難再得載尸以出被髮步哭而隨之太平元年齊發丁匠三十餘萬修廣三臺宫殿齊顯祖之初立也留心政術務存簡靖坦於任使人得盡力又能以法馭下或有違犯不容勳戚内外莫不肅然至於軍國機䇿獨决懐抱每臨行陳親當矢石所向有功數年之後漸以功業自矜遂嗜酒淫佚肆行狂暴或身自歌舞盡日通宵或散髮胡服雜衣錦綵或袒露形體塗傅粉黛或乗牛驢槖駞白象不施鞍勒或令崔季舒劉桃枝負之而行擔胡鼓拍之勳戚之第朝夕臨幸㳺行市里街坐巷宿或盛夏日中暴身或隆冬去衣馳走從者不堪帝居之自若三䑓構木髙二十七丈兩棟相距二百餘尺工匠危怯皆繫䋲自防帝登脊疾走殊無怖畏時復雅儛折旋中節傍人見者莫不寒心嘗於道上問婦人曰天子何如曰顛顛癡癡何成天子帝殺之婁太后以帝酒狂舉杖擊之曰如此父生如此兒帝曰即當嫁此老母與胡太后大怒遂不言笑帝欲太后笑自匍匐以身舉牀墜太后於地頗有所傷既醒大慙恨使積柴熾火欲入其中太后驚懼親自持挽彊為之笑曰曏汝醉耳帝乃設地席命平秦王歸彦執杖口自責數脫背就罰謂歸彦曰杖不出血當斬汝太后前自抱之帝流涕苦請乃笞脚五十然後衣冠拜謝悲不自勝因是戒酒一旬又復如初帝幸李后家以鳴鏑射后母崔氏罵曰吾醉時尚不識太后老婢何事馬鞭亂擊一百有餘雖以楊愔為宰相使進厠籌以馬鞭鞭其背流血浹袍嘗欲以小刀剺其腹崔季舒託俳言曰老小公子惡戯因掣刀去之又置愔於棺中載以轜車又嘗持槊走馬以擬左丞相斛律金之胷者三金立不動乃賜帛千段髙氏婦女不問親疎多與之亂或以賜左右又多方苦辱之彭城王浟太妃爾朱氏魏敬宗之后也帝欲蒸之不從手刄殺之故魏樂安王元昻李后之姊壻也其妻有色帝數幸之欲納為昭儀召昻令伏以鳴鏑射之百餘下凝血垂將一石竟至於死后啼不食乞讓位於姊太后又以為言帝乃止又嘗於衆中召都督韓哲無罪斬之作大鑊長鋸剉碓之屬陳之於庭每醉輒手殺人以為􅃧樂所殺者多令支解或焚之於火或投之於水楊愔乃簡鄴下死囚置之仗内謂之供御囚帝欲殺人輒執以應命三月不殺則宥之開府參軍裴謂之上書極諫帝謂楊愔曰此愚人何敢如是對曰彼欲陛下殺之以成名於後世耳帝曰小人我且不殺爾焉得名帝與左右飲曰樂哉都督王紘曰有大樂亦有大苦帝曰何謂也對曰長夜之飲不寤國亡身隕所謂大苦帝縛紘欲斬之思其有救世祖之功乃捨之帝逰宴東山以關隴未平投盃震怒召魏收於前立為詔書宣示逺近將事西行魏人震恐常為度隴之計然實未行一日泣謂羣臣曰黒獺不受我命奈何都督劉桃枝曰臣得三千騎請就長安擒之以來帝壯之賜帛千匹趙道徳進曰東西兩國彊弱力均彼可擒之以來此亦可擒之以往桃枝妄言應誅陛下奈何濫賞帝曰道徳言是囬絹賜之帝乗馬欲下峻岸入于漳道徳攬轡回之帝怒將斬之道徳曰臣死不恨當於地下啟先帝論此兒酣酗顛狂不可敎訓帝黙然而止它日帝謂道徳曰我飲酒過須痛杖我道徳抶之帝走道徳逐之曰何物人為此舉止典御丞李集面諫比帝於桀紂帝令縛置流中沈没久之復令引出謂曰吾何如桀紂集曰向來彌不及矣帝又令沈之引出更問如此數四集對如初帝大笑曰天下有如此癡人方知龍逢比干未是俊物遂釋之頃之又被引入見似有所諫帝令將出要斬其或斬或赦莫能測焉内外􅉃􅉃各懐怨毒而素能黙識彊記加以嚴斷羣下戰慄不敢為非又能委政楊愔愔總攝機衡百度脩敕故時人皆言主昏於上政清於下秋八月庚申齊主將西巡百官辭於紫陌帝使矟騎圍之曰我舉鞭即殺之日晏帝醉不能起黄門郎是連子暢曰陛下如此羣臣不勝忍怖帝曰大怖邪若然勿殺遂如晉陽冬十二月齊自西河總秦戍築長城東至於海前後所築東西凢三千餘里陳髙祖永定元年秋七月河南北大蝗齊主問魏郡丞崔叔瓉曰何故致蝗對曰五行志土功不時蝗蟲為災今外築長城内興三臺殆以此乎齊主大怒使左右敺之擢其髮以溷沃其頭曵足以出叔瓉季舒之兄也初齊有術士言亾髙者黒衣故髙祖每出不欲見沙門顯祖在晉陽問左右何物最黑對曰無過於漆帝以上黨王渙於兄弟第七使庫直都督破六韓伯昇之鄴徴渙渙至紫陌橋殺伯昇而逃浮河南度至濟州為人所執送鄴帝之為太原公也與永安王浚偕見世宗帝有時洟出浚責帝左右曰何不為二兄拭鼻帝心銜之及即位浚為青州刺史聰明矜恕吏民恱之浚以帝嗜酒私謂親近曰一兄因酒敗徳朝臣無敢諫者大敵未滅吾甚以為憂欲乘驛至鄴面諫不知用吾言不或宻以白帝帝益銜之浚入朝從幸東山帝裸裎為樂浚進諫曰此非人主所宜帝不恱浚又於屏處石楊愔譏其不諌帝時不欲大臣與諸王交通愔懼奏之帝大怒曰小人由來難忍遂罷酒還宫浚尋還州又上書切諫詔徴浚浚懼禍謝疾不至帝遣馳驛收浚老㓜泣送者數千人至鄴與上黨王渙皆盛以鐡籠寘於北城地牢飲食溲穢共在一所二年冬十一月齊三䑓成更名銅爵曰金鳯金虎曰聖應氷井曰崇光甲午齊主至鄴大赦齊主遊三䑓􅃧以槊刺都督尉子輝應手而斃常山王演以帝沈湎憂憤形於顔色帝覺之謂曰但令汝在我何為不縱樂演唯涕泣拜伏竟無所言帝亦大悲抵盃於地曰汝似嫌我如是自今敢進酒者斬之因取所御盃盡壊棄未㡬沈湎益甚或於諸貴戚家角力批拉不限貴賤唯演至則内外肅然演又宻撰事條將諫其友王晞以為不可演不從因間極言遂逢大怒演性頗嚴尚書郎中剖斷有失輙加捶楚令史姦慝即考竟帝乃立演於前以刀鐶擬脅召被演罰者臨以白刄求演之短咸無所陳乃釋之晞昕之弟也帝疑演假辭於晞以諫欲殺之王私謂晞曰王博士明日當作一條事為欲相活亦圗自全宜深體勿怪乃於衆中杖晞二十帝尋發怒聞晞得杖以故不殺髠鞭配甲坊居三年演又因諫争被敺撻閉口不食太后日夜涕泣帝不知所為曰儻小兒死奈我老母何於是數往問演疾謂曰努力彊食當以王晞還汝乃釋晞令詣演演抱晞曰吾氣息惙然恐不復相見晞流涕曰天道神明豈令殿下遂斃此舍至尊親為人兄尊為人主安可與計殿下不食太后亦不食殿下縱不自惜獨不念太后乎言未卒演彊坐而飯晞由是得免徒還為王友及演録尚書事除官者皆詣演謝去必辭晞言於演曰受爵天朝拜恩私第自古以為不可宜一切約絶演從之久之演從容謂晞曰主上起居不恒卿宜耳目所具吾豈可以前逢一怒遂爾結舌卿宜為撰諫草吾當伺便極諫晞遂條十餘事以呈因謂演曰今朝廷所恃者唯殿下乃欲學匹夫耿介輕一朝之命狂藥令人不自覺刀箭豈復識親疎一旦禍出理外將奈殿下家業何奈皇太后何演欷􅒣不自勝曰乃至是乎明日見晞曰吾長夜久思今遂息意即命火對晞焚之後復承間苦諫帝使力士反接拔白刃注頸罵曰小子何知是誰教汝演曰天下噤口非臣誰敢有言帝趣杖亂捶之數十㑹醉卧得解帝䙝黷之逰遍於宗戚所往留連唯至常山第多無適而去尚書左僕射崔暹屢諫演謂暹曰今太后不敢致言吾兄弟杜口僕射獨能犯顔内外深相感愧太子殷自幼温裕開朗禮士好學關覧時政甚有美名帝常嫌太子得漢家性質不似我欲廢之帝登金鳯䑓召太子使手刄囚太子惻然有難色再三不斷其首帝大怒親以馬鞭捶之太子由是氣悸語吃精神昬擾帝因酣宴屢云太子性懦社稷事重終當傳位常山太子少傅魏收謂楊愔曰太子國之根本不可動揺至尊三爵之後每言傳位常山令臣下疑二若其實也當决行之此言非所以為戯恐徒使國家不安愔以收言白帝帝乃止帝既殘忍有司訊囚莫不嚴酷或燒犁耳使立其上或燒車釭使以臂貫之既不勝苦皆至誣服唯三公郎中武彊蘇瓊厯職中外所至皆以寛平為治時趙州及清河屢有人告謀反者前後皆付瓊推檢事多申雪尚書崔昻謂瓊曰若欲立功名當更思餘理數雪反逆身命何輕瓊正色曰所雪者寃枉耳不縱反逆也昻大慙帝怒臨漳令嵇􅁮舍人李文師以賜臣下為奴中書侍郎彭城鄭頥私誘祠部尚書王昕曰自古無朝士為奴者昕曰箕子為之奴頥以白帝曰王元景比陛下於紂帝銜之頃之帝與朝廷酣飲昕稱疾不至帝遣騎執之見方揺膝吟詠遂斬扵殿前投尸漳水齊主北築長城南助蕭莊士馬死者以數十萬計重以脩築臺殿賜與無節府藏之積不足以供乃减百官之禄撒軍人常廩併省州郡縣鎮戍之職以節費用焉十二月齊主如北城因視永安簡平王浚上黨剛肅王涣於地牢帝臨穴謳歌令浚等和之浚等惶怖且悲不覺聲顫帝愴然為之下泣將赦之長廣王湛素與浚不睦進曰猛虎安可出穴帝黙然浚等聞之呼湛小字曰步落稽皇天見汝帝亦以浚與渙皆有雄略恐為後害乃自刺渙又使壯士劉桃枝就籠亂刺槊每下浚渙輙以手拉折之號哭呼天於是薪火亂投燒殺之填以土石後出之皮髮皆盡尸色如炭逺近為之痛憤三年春二月丙戍齊主於甘露寺禪居深觀唯軍國大事乃以聞尚書左僕射崔暹卒齊主幸其第哭之謂其妻李氏曰頗思暹乎對曰思之帝曰然則自往省之因手斬其妻擲首牆外夏閏四月齊髙徳政與楊愔同為相愔常忌之齊主酣飲徳政數彊諫齊主不恱謂左右曰髙徳政恒以精神凌逼人徳政懼稱疾欲自退帝謂楊愔曰我大憂徳政病對曰陛下若用為冀州刺史病當自差帝從之徳政見除書即起帝大怒召徳政謂曰聞爾病我為爾針親以小刀刺之血流霑地又使曵下斬去其足劉桃枝執刀不敢下帝責桃枝曰爾頭即堕地桃枝乃斬其足之三指帝怒不解囚徳政於門下其夜以氊輿送還家明旦徳政妻出珍寳滿四牀欲以寄人帝奄至其宅見之怒曰我内府猶無是物詰其所從得皆諸元賂之遂曵出斬之妻出拜又斬之并其子伯堅五月齊太史奏今年當除舊布新齊主問於特進彭城公元韶曰漢光武何故中興對曰為誅諸劉不盡於是齊主悉殺諸元厭之癸未誅始平公元世哲等二十五家囚韶等十九家幽於地牢絶食㗖衣袖而死秋七月齊顯祖將如晉陽乃盡誅諸元或祖父為王或身嘗貴顯皆斬於東市其嬰兒投於空中承之以矟前後死者凡七百二十一人悉棄尸漳水剖魚者往往得人爪甲鄴下為之久不食魚使元黄頭與諸囚自金鳯臺各乗紙鴟以飛黄頭獨能至紫陌乃墮仍付御史中丞畢義雲餓殺之唯開府儀同三司元蠻祠部郎中元文遥等數家獲免蠻繼之子常山王演之妃父文遥遵之五世孫也定襄令元景安䖍之𤣥孫也欲請改姓髙氏其從兄景皓曰安有棄其本宗而從人之姓者乎丈夫寧可玊碎何能瓦全景安以其言白帝帝收景皓誅之賜景安姓髙氏齊顯祖嗜酒成疾不復能食自知不能久謂李后曰人生必有死何足致惜但憐正道尚幼人將奪之耳又謂常山王演曰奪則任汝慎勿殺也尚書令開封王楊愔領軍大將軍平秦王歸彦侍中廣漢燕子獻黄門侍郎鄭頥皆受遺詔輔政冬十月甲午殂癸卯發喪羣臣號哭無下淚者唯楊愔涕泗嗚咽太子殷即位大赦庚戌尊皇太后為太皇太后皇后為皇太后辛未齊顯祖之喪至鄴文帝天嘉元年齊髙陽王湜以滑稽便辟有寵於顯祖常在左右執杖以撻諸王太皇太后深銜之及顯祖殂湜有罪太皇太后杖之百餘正月癸亥卒齊主自晉陽還至鄴二月己亥齊以常山王演為太師録尚書事以長廣王湛為大司馬并省録尚書事齊顯祖之喪常山王演居禁中䕶喪事婁太后欲立之而未果太子即位乃就朝列以天子諒隂詔演居東館欲奏之事皆先咨决楊愔等以演與長廣王湛位地親逼恐不利於嗣主心忌之居頃之演出歸第自是詔敕多不關預或謂演曰鷙鳥離巢必有探卵之患今日王何宜屢出中山太守楊休之詣演演不見休之謂王友王晞曰昔周公朝讀百篇書夕見七十士猶恐不足録王何所嫌疑乃爾拒絶賔客先是顯祖之世羣臣人不自保及濟南王立演謂王晞曰一人垂拱吾曹亦保優閑因言朝廷寛仁真守文良主王晞曰先帝時東宫委一胡人傅之今春秋尚富驟覽萬機殿下宜朝夕先後親承音旨而使他姓出納詔命大權必有所歸殿下雖欲守藩其可得邪借令得遂冲退自審家祚得保靈長乎演黙然久之曰何以處我晞曰周公抱成王攝政七年然後復子明辟惟殿下慮之演曰我何敢自比周公晞曰殿下今日地望欲不為周公得邪演不應顯祖嘗使畨人康虎兒保䕶太子故晞言及之齊主將發晉陽時議謂常山王必當留守根本之地執政欲使常山王從帝之鄴留長廣王鎮晉陽既而又疑之乃敕二王俱從至鄴外朝聞之莫不駭愕又敕以王晞為并州長史演既行晞出郊送之演恐有覘察命晞還城執晞手曰努力自慎因躍馬而去平秦王歸彦總知禁衛楊愔宣敕留從駕五千兵於西中隂備非常至鄴數日歸彦乃知之由是怨愔領軍大將軍可朱渾天和道元之子也尚帝姑東平公主每曰若不誅二王少主無自安之理燕子獻謀處太皇太后於北宫使歸政皇太后又自天保八年以來爵賞多濫楊愔欲加澄汰乃先自表解開府及開封王諧叨竊恩榮者皆從黜免由是嬖寵失職之徒盡歸心二叔平秦王歸彦初與楊燕同心既而中變盡以疎忌之迹告二王侍中宋欽道弁之孫也顯祖使在東宫教太子以吏事欽道面奏帝稱二叔威權既重宜速去之帝不許曰可與令公共詳其事愔等議出二王為刺史以帝慈仁恐不可所奏乃通啟皇太后具述安危宫人李昌儀即髙仲宻之妻也李太后以其同姓甚相昵愛以啟示之昌儀宻啟太皇太后愔等又議不可令二王俱出乃奏以長廣王湛鎮晉陽以常山王演録尚書事二王既拜職乙巳於尚書省大㑹百僚愔等將赴之散騎常侍兼中書侍郎鄭頥止之曰事未可量不宜輕脫愔曰吾等至誠體國豈常山拜職有不赴之理長廣王湛旦伏家僮數十人於録尚書後室仍與席上勲貴賀拔仁斛律金等數人相知約曰行酒至愔等我各勸雙盃彼必致辭我一曰執酒二曰執酒三曰何不執爾軰即執之及宴如之愔大言曰諸王反逆欲殺忠良邪尊天子削諸侯赤心奉國何罪之有常山王演欲緩之湛曰不可於是拳杖亂敺愔及天和欽道皆頭面血流各十人持之燕子獻多力頭又少髪狼狽排衆走出門斛律光逐而擒之子獻歎曰丈夫為計遲遂至於此使太子太保薛孤延等執頥於尚藥局頥曰不用智者言至此豈非命也二王與平秦王歸彦賀拔仁斛律金擁愔等唐突入雲龍門見都督叱利騷招之不進使騎殺之開府儀同三司成休寧抽刃呵演演使歸彦諭之休寧厲聲不從歸彦久為領軍素為軍士所服皆弛仗休寧方歎息而罷演入至昭陽殿湛及歸彦在朱華門外帝與太皇太后竝出太皇太后坐殿上皇太后及帝側立演以㙛叩頭進言曰臣與陛下骨肉至親楊遵彦等欲獨擅朝權威福自己自王公已下皆重足屏氣共相唇齒以成亂階若不早圗必為宗社之害臣與湛為國事重賀拔仁斛律金惜獻武皇帝之業共執遵彦等入宫未敢刑戮專擅之罪誠當萬死時庭中及兩廡衛士二千餘人皆被甲待詔武衛娥永樂武力絶倫素為顯祖所厚叩刀仰視帝不睨之帝素吃訥倉猝不知所言太皇太后令却仗不退又厲聲曰奴軰即今頭落乃退永樂内刀而泣太皇太后因問楊郎何在賀拔仁曰一眼已出太皇太后愴然曰楊郎何所能為留使豈不佳邪乃讓帝曰此等懐逆欲殺我二子次將及我爾何為縱之帝猶不能言太皇太后怒且悲曰豈可使我母子受漢老嫗斟酌太后拜謝太皇太后又為太后誓言演無異志但欲去逼而已演叩頭不止太后謂帝何不安慰爾叔帝乃曰天子亦不敢為叔惜况此漢軰但匄兒命兒自下殿去此屬任叔父處分遂皆斬之長廣王湛以鄭頥昔嘗讒已先拔其舌截其手而殺之演令平秦王歸彦引侍衛之士向華林園以京畿軍士入守門閣斬娥永樂於園太皇太后臨愔喪哭曰楊郎忠而獲罪以御金為之一眼親内之曰以表我意演亦悔殺之於是下詔罪狀愔等且曰罪止一身家屬不問頃之復簿録五家王晞固諫乃各没一房孩㓜盡死兄弟皆除名以中書令趙彦深代楊愔總機務鴻臚少卿楊休之私謂人曰將涉千里殺騏驎而䇿蹇驢可悲之甚也戊申演為大丞相都督中外諸軍録尚書事湛為太傅京畿大都督段韶為大將軍平陽王淹為太尉平秦王歸彦為司徒彭城王浟為尚書令齊大丞相演入晉陽既至謂王晞曰不用卿言㡬至傾覆今君側雖清終當何以處我晞曰殿下往時位地猶可以名教出處今日事勢遂關天時非復人理所及演奏趙郡王叡為長史王晞為司馬三月甲寅詔軍國之政皆申晉陽禀大丞相規筭秋七月齊丞相演以王晞儒緩恐不允武將之意每夜載入晝則不與語嘗進晞宻室謂曰比王矦諸貴每見敦迫言我違天不祥恐當或有變起吾欲以法䋲之何如晞曰朝廷比者疎逺親戚殿下倉猝所行非復人臣之事芒刺在背上下相疑何由可久殿下雖欲謙退粃糠神器實恐違上𤣥之意墜先帝之基演曰卿何敢發此言須置卿於法晞曰天時人事皆無異謀是以敢冒犯斧鉞抑亦神明所賛耳演曰拯難匡時方俟聖哲吾何敢私議幸勿多言丞相從事中郎陸杳將出使握晞手使之勸進晞以杳言告演演曰若内外咸有此意趙彦深朝夕左右何故初無一言晞乃以事隙宻問彦深彦深曰我比亦驚此聲論每欲陳聞則口噤心悸弟既發端吾亦當昧死一披肝膽因兵勸演演遂言於太皇太后趙道徳曰相王不效周公輔成王而欲骨肉相奪不畏後世謂之篡邪太皇太后曰道徳之言是也未㡬演又啟云天下人心未定恐奄忽變生須早定名位太皇太后乃從之八月壬千太皇太后下令廢齊主為濟南王出居别宫以常山王演入纂大統且戒之曰勿令濟南有他也肅宗即皇帝位於晉陽大赦改元皇建太皇太后還稱皇太后皇太后稱文宣皇后宫曰昭信乙酉詔紹封功臣禮賜耆老延訪直言襃賞死事追贈名徳帝謂王晞曰卿何為自同外客略不可見自今假非局司但有所懐隨宜作一牒俟少隙即徑進也因敕與尚書楊休之鴻臚卿崔勂等三人每日職務罷竝入東廊共舉録厯代禮樂職官及田市徴稅或不便於時而相承施用或自古為利而於今廢墜或道徳髙雋久在沈淪或巧言眩俗妖邪害政者悉令詳思以漸條奏朝晡給御食畢景聽還帝識度沈敏少居臺閣明習吏事即位尤自勤勵大革顯祖之弊時人服其明而譏其細羣臣進言帝皆從容受納戊子以長廣王湛為右丞相平陽王淹為太傅彭城王浟為大司馬冬十一月辛巳立世子百年為太子百年時纔五歲二年齊主之謀誅楊燕也許以長廣王湛為太弟既而立太子百年湛心不平帝在晉陽湛居守於鄴散騎常侍髙元海髙祖之從孫也留典機宻帝以領軍代人庫狄伏連為幽州刺史以斛律光之弟羡為領軍以分湛權湛留伏連不聽羡視事先是濟南閔悼王常在鄴望氣者言鄴中有天子氣平秦王歸彦恐濟南王復立為己不利勸帝除之帝乃使歸彦至鄴徴濟南王如晉陽湛内不自安問計於髙元海元海曰皇太后萬福至尊孝友異常殿下不須異慮湛曰此豈我推誠之意邪元海乞還省一夜思之湛即留元海於後堂元海達旦不眠唯遶床徐步夜漏未盡湛遽出曰神筭如何元海曰有三䇿恐不堪用耳請殿下如梁孝王故事從數騎入晉陽先見太后求哀後見主上請去兵權以死為限不干朝政必保太山之安此上䇿也不然當具表云威權太盛恐取謗衆口請青齊二州刺史沈靖自居必不招物議此中䇿也更問下䇿曰發言即恐族誅固逼之元海曰濟南世嫡主上假太后令而奪之今集文武示以徴濟南之敕執斛律豐樂斬髙歸彦尊立濟南號令天下以順討逆此萬世一時也湛大恱然性怯狐疑未能用使術士鄭道謙等卜之皆曰不利舉事静則吉有林慮令潘子宻曉占候潜謂湛曰宫車當晏駕殿下為天下主湛拘之於内以候之又令巫覡卜之多云不須舉兵自有大慶湛乃奉詔令數百騎送濟南王至晉陽九月帝使人酖之濟南王不從乃扼殺之帝尋亦悔之冬十月齊肅宗出畋有兎驚馬墜地絶肋婁太后視疾問濟南所在者三齊主不對太后怒曰殺之邪不用吾言死其宜矣遂去不顧十一月甲辰詔以嗣子冲眇可遣尚書右僕射趙郡王叡諭旨徴長廣王湛統兹大寶又與湛書曰百年無罪汝可以樂處置之勿效前人也是日殂於晉陽宫臨終言恨不見太后山陵顔之推論曰孝昭天性至孝而不知忌諱乃至於此良由不學之所為也趙郡王叡先使黄門侍郎王松年馳至鄴宣肅宗遺命湛猶疑其詐使所親先詣殯所發而視之使者復命湛喜馳赴晉陽使河南王孝瑜先入宫改易禁衛癸丑世祖即皇帝位於南宫大赦改元太寧立太子百年為樂陵王三年春正月乙亥齊主至鄴辛巳祀南郊壬午享太廟丙戌立妃胡氏為皇后子緯為皇太子后魏兖州刺史安定胡延之之女也戊子齊大赦己亥以馮翊王潤為尚書左僕射閏二月丁未齊以太宰平陽王淹為青州刺史太傅平秦王歸彦為太宰冀州刺史歸彦為肅宗所厚恃勢驕盈陵侮貴戚世祖即位侍中開府儀同三司髙元海御史中丞畢義雲黄門郎髙乾和數言其短且云歸彦威權震主必為禍亂帝亦尋其反覆之跡漸忌之伺歸彦還家召魏收於帝前作詔草除歸彦冀州使乾和繕寫畫日仍敕門司不聽歸彦輒入宫時歸彦縱酒為樂經宿不知至明欲叅至門知之大驚而退及通名謝敕令早發别賜錢帛等物甚厚又敕督將悉送至清陽宫拜辭而退莫敢與語唯趙郡王叡與之久語時無聞者秋七月齊平秦王歸彦至冀州内不自安欲待齊主如晉陽乗虗入鄴其郎中令吕思禮告之詔大司馬段韶司空婁叡討之歸彦於南境置私驛聞大軍將至即閉城拒守長史宇文仲鸞等不從皆殺之歸彦自稱大丞相有衆四萬齊主以都官尚書封子繪冀州人祖父世為本州刺史得人心使乗傳至信都巡城諭以禍福吏民降者相繼城中動静小大皆知之歸彦登城大呼云孝昭皇帝初崩六軍百萬悉在臣手投身向鄴奉迎陛下當時不反今日豈反耶正恨髙元海畢義雲髙乾和誑惑聖上疾忌忠良但為殺此三人即臨城自刎既而城破單騎北走至交津獲之鎻送鄴乙未載以露車銜木靣縛劉桃枝臨之以刃擊鼓隨之并其子孫十五人皆棄市命封子繪行冀州事齊主知歸彦前譛清河王岳以歸彦家良賤百口賜岳家贈岳太師丁酉以段韶為太傅婁叡為司徒平陽王淹為太宰斛律光為司空趙郡王叡為尚書令河間王孝琬為左僕射五年夏六月齊主殺樂陵王百年時白虹暈日再重又横貫而不達赤星見齊主欲以百年厭之㑹博陵人賈徳胄教百年書百年嘗作數敕字徳胄封以奏之帝發怒使召百年百年自知不免割帶玦留與其妃斛律氏見帝於涼風堂使百年書敕字騐與徳胄所奏相似遣左右亂捶之又令曵之遶堂行且捶所過血皆遍地氣息將盡乃斬之棄諸池池水盡赤妃把玦哀號不食月餘亦卒玦猶在手拳不可開其父光自擘之乃開通鑑紀事本末卷二十四中欽定四庫全書通鑑紀事本末卷二十四下宋袁樞撰安成王篡立頊陳文帝天嘉元年江陵之䧟也長城世子昌及中書侍郎頊皆沒於長安高祖即位屢請之於周周人許而不遣高祖殂周人乃遣昌還以王琳之難居于安陸琳敗昌發安陸將濟江致書於上辭甚不遜上不懌召侯安都從容謂曰太子將至須别求一藩為歸老之地安都曰自古豈有被代天子臣愚不敢奉詔因請自迎昌於是羣臣上表請加昌爵命春二月庚戍以昌為驃騎將軍湘州牧封衡陽王三月甲戌衡陽獻王昌入境詔主書舍人縁道迎候丙子濟江中流隕之使以溺告侯安都以功進爵清逺公初高祖遣榮陽毛喜從安城王頊詣江陵梁世祖以喜為侍郎沒於長安與昌俱還因進和親之䇿上乃使侍中周𢎞正通好於周二年夏六月乙酉周主使御正殷不害來聘冬十一月周人許歸安成王頊使司㑹上士京兆杜果來聘上恱即遣使報之拜賂以黔中地及魯山郡三年春正月丁未周以安成王頊為柱國大將軍遣杜杲送之南歸三月丙子安成王頊至建康詔以為中書監中衛將軍上謂杜杲曰家弟今䝉禮遣實周朝之惠然魯山不返亦恐未能及此杲對曰安成長安一布衣耳而陳之介弟也其價豈止一城而已哉本朝敦睦九族恕己及物上遵太祖遺㫖下思繼好之義是以遣之南歸今乃云以尋常之土易骨肉之親非使臣之所敢聞也上甚慚曰前言戯之耳待果之禮有加焉頊妃柳氏及子叔寳猶在穰成上復遣毛喜如周請之周人皆歸之天康元年夏四月上不豫臺閣衆事並令尚書僕射到仲舉五兵尚書孔奐共决之奐琇之之曾孫也疾篤奐仲舉與司空尚書令揚州刺史安成王頊吏部尚書袁樞中書舍人劉師知入侍醫藥樞君正之子也太子伯宗柔弱上憂其不能守位謂頊曰吾欲遵太伯之事頊拜伏泣涕固辭上又謂仲舉奐等曰今三方鼎峙四海事重宜須長君朕欲近則晉成逺隆殷法卿等宜遵此意孔奐流涕對曰陛下御膳違和痊復非久皇太子春秋鼎盛聖徳日躋安成王介弟之尊足為周旦若有廢立之心臣等愚誠不敢聞詔上曰古之遺直復見於卿乃以奐為太子詹事臣光曰夫臣之事君宜將順其美正救其惡孔奐在陳處腹心之重任决社稷之大計茍以世祖之言為不誠則當如竇嬰面辯袁盎廷争防微杜漸以絶顗覦之心以為誠邪則當請明下詔書宣告中外使世祖有宋宣之美髙宗無楚靈之惡不然謂太子嫡嗣不可動揺欲保輔而安全之則當盡忠竭節以死繼之如晉之荀息趙之肥義奈何於君之存則逆探其情而求合焉及其既沒則權臣移國而不能救嗣主失位而不能死斯乃姦諛之尤者而世祖謂之遺直以託六尺之孤豈不悖哉癸酉上殂太子即位大赦五月庚寅以安成王頊為驃騎大將軍司徒録尚書都督中外諸軍事臨海王光大元年初髙祖為梁相用劉師知為中書舍人師知渉學工文練習儀體厯世祖朝雖位宦不遷而委任甚重與揚州刺史安成王頊尚書僕射到仲舉同受遺詔輔政師知仲舉恒居禁中參决衆事頊與左右三百人入居尚書省師知見頊地望權勢為朝野所屬心忌之與尚書左丞王暹等謀出頊於外衆猶豫未敢先發東宫通事舍人殷不佞素以名節自任又受委東宫乃馳詣相府矯敕謂頊曰今四方無事王可還東府經理州務頊將出中記室毛喜馳入見頊曰陳有天下日淺國禍繼臻中外危懼太后深惟至計令王入省共康庶績今日之言必非太后之意宗社之重願王三思須更聞奏無使姦人得肆其謀今出外即受制於人譬如曹爽願作富家翁其可得邪頊遣喜與領軍將軍呉明徹籌之明徹曰嗣君諒闇萬機多闕殿下親實周召當輔安社稷願留中勿疑頊乃稱疾召劉師知留之與語使毛喜先入言於太后太后曰今伯宗㓜弱政事並委二郎此非我意喜又言於帝帝曰此自師知等所為朕不知也喜出以報頊頊因囚師知自入見太后及帝以陳師知之罪仍自草敕請畫以師知付廷尉其夜於獄中賜死以到仲舉為金紫光祿大夫王暹殷不佞並付治不佞不害之弟也少有孝行頊雅重之故獨得不死免官而已王暹伏誅自是國政盡歸於頊右衛將軍㑹稽韓子高鎭領軍府在建康諸將中士馬最盛與仲舉通謀事未發毛喜請簡士馬配子高拜賜鐡炭使脩噐甲頊驚曰子高謀反方欲收執何為更如是邪喜曰山陵始畢邉冦尚多而子高受委前朝名為杖順若收之恐不即授首或能為人患宜推心安誘使不自疑伺間圖之一壯士之力耳頊深然之仲舉既廢歸私第心不自安子郁尚世祖妹信義長公主除南康内史未之官子高亦自危求出為衡廣諸鎮郁毎乗小輿䝉婦人衣與子高謀㑹前上虞令陸昉及子高軍主告其謀反頊在尚書省因召文武在位議立皇太子平旦仲舉子高入省皆執之並郁送廷尉下詔於獄賜死餘黨一無所問癸丑以東揚州刺史始興王伯茂為中衛大將軍開府儀同三司伯茂帝之母弟也劉師知韓子高之謀伯茂皆預之司徒頊恐扇動中外故以為中衛專使之居禁中與帝遊處夏四月湘州刺史華皎聞韓子高死内不自安繕甲聚徒撫循所部啟求廣州以卜朝廷之意司徒頊偽許之而詔書未出皎遣使潜引周兵又自歸於梁以其子𤣥響為質五月癸巳頊以丹陽尹呉明徹為湘州刺史司徒頊遣呉明徹帥舟師三萬趣郢州丙申遣征南大將軍淳于量帥舟師五萬繼之又遣冠武將軍楊文通從安成歩道出茶陵巴山太守黄法慧從宜陽出澧陵共襲華皎并與江州刺史章昭達郢州刺史程靈洗合謀進討六月壬寅以司空徐度為車騎將軍總督建康諸軍歩道趣湘州華皎使者至長安梁王亦上書言狀且乞師周人議出師應之司㑹崔猷曰前嵗東征死傷過半比雖循撫瘡痍未復今陳氏保境息民共敦鄰好豈可利其土地納其叛臣違盟約之信興無名之師乎晉公䕶不從閏六月戊寅遣襄州總管衛公直督柱國陸通大將軍田𢎞權景宣元定等將兵助之秋八月華皎遣使誘章昭達昭達執送建康又誘程靈洗靈洗斬之皎以武州居其心腹遣使誘都督陸子隆子隆不從遣兵攻之不克巴州刺史戴僧朔等並𨽻於皎長沙太守曹慶等本𨽻皎下遂為之用司徒頊恐上流守宰皆附之乃曲赦湘巴二州九月乙巳悉誅皎家屬梁以皎為司空遣其柱國王操將兵二萬㑹之周權景宣將水軍元定將陸軍衛公直總之與皎俱下淳于量軍夏口直軍魯山使元定以歩騎數千圍郢州皎軍于白螺與呉明徹等相持徐度楊文通由嶺路襲湘州盡獲其所留軍士家屬皎自巴陵與周梁水軍順流乘風而下軍勢甚盛戰于沌口量明徹募軍中小艦多賞金銀令先出當西軍大艦受其拍西軍諸艦發拍皆盡然後量等以大艦拍之西軍艦皆碎沒于中流西軍又以艦載薪因風縱火俄而風轉自焚西軍大敗皎與戴僧朔單舸走過巴陵不敢登岸徑犇江陵衛公直亦犇江陵元定孤軍進退無路斫竹開徑且戰且引欲趣巴陵巴陵已為徐度等所據度等遣使偽與結盟許縱之還國定信之解仗就度度執之盡俘其衆并擒梁大將軍李廣定憤恚而卒皎黨曹慶等四十餘人並伏誅唯以岳陽太守章昭裕昭達之弟杜陽太守曹宣高祖舊臣衡陽内史汝隂任忠嘗有密啟皆宥之呉明徹乘勝攻梁河東㧞之周衛公直歸罪於梁柱國殷亮梁主知非其罪然不敢違遂誅之周與陳既交惡周沔州刺史裴寛白襄州總管請益戍兵并遷城於羊蹄山以避水總管兵未至程靈洗舟師奄至城下㑹大雨水暴漲靈洗引大艦臨城發拍擊樓堞皆碎矢石晝夜攻之三十餘日陳人登城寛猶帥衆執短兵拒戰又二日乃擒之二年春正月己亥安城王頊進位太傅領司徒加殊禮冬十一月始興王伯茂以安成王頊專政意甚不平屢肆惡言甲寅以太皇太后令誣帝云與劉師知華皎等通謀且曰文皇知子之鑒事等帝堯傳弟之懐又符太伯今可還申曩志崇立賢君遂廢帝為臨海王以安成王入纂又下令黜伯茂為温麻侯寘諸别館安成王使盗邀之於道殺之車中宣帝大建元年春正月甲午安成王即皇帝位改元大赦復太皇太后為皇太后皇太后為文皇后立妃柳氏為皇后世子叔寳為太子封皇子叔陵為始興王奉昭烈王祀乙未上謁太廟丁酉以尚書僕射沈欽為左僕射度支尚書王勱為右僕射勱份之孫也周陳之叛梁敬帝紹泰元年初晉安民陳羽世為閩中豪姓其子寳應多權詐郡中畏服侯景之亂晉安太守賔化侯雲以郡讓羽羽老但治郡事令寳應典兵時東境荒饉而晉安獨豐衍寳應數自海道出寇抄臨安永嘉㑹稽或戴米粟與之貿易由是能致富彊侯景平世祖因以羽為晉安太守及陳霸先輔政羽求傳郡於寳應霸先許之太平元年初侯景之亂臨川民周續起兵郡中始興王毅以郡讓之而去續部將皆郡中豪族多驕横續裁制之諸將皆怨相與殺之續宗人廸勇冠軍中衆推為主廸素寒微恐郡人不服以同郡周敷族望高顯折節交之敷亦事廸甚謹廸據上塘敷據故郡朝廷以廸為衡州刺史領臨州内史時民遭侯景之亂皆棄農業羣聚為盗唯廸所部獨務農桑各有贏儲政教嚴明徵歛必至餘郡乏絶者皆仰以取給廸性質樸不事威儀居常徒跣雖外列兵衛内有女伎挼繩破篾傍若無人訥於言語而襟懐信實臨川人皆附之陳武帝永定元年詔給事黄門侍郎蕭乾招諭閩中時熊曇朗在豫章周廸在臨川留異在東陽陳寳應在晉安共相連結閩中豪帥徃徃立砦以自保上患之使乾諭以禍福豪師皆帥衆請降即以乾為建安太守乾子範之子也文帝天嘉二年初高祖以帝女豐安公主妻留異之子貞臣徵異為南徐州刺史異遷延不就帝即位復以異為縉州刺史領東陽太守異屢遣其長史王澌入朝澌毎言朝廷虚弱異信之雖外示臣節恒懐兩端與王琳自鄱陽信安嶺濳通使徃來琳敗上遣左衛將軍沈恪代異實以兵襲之異出軍下淮以拒恪恪與戰而敗退還錢塘異復上表遜謝時衆軍方事湘郢乃降詔書慰諭且羈縻之異知朝廷終將討己乃以兵戌下淮及建徳以傋江路十二月丙午詔司空南徐州刺史侯安都討之三年春二月帝徵江州刺史周廸出鎭湓城又徵其子入朝廸趑且顧望並不至其餘南江酋帥私署令長多不受召朝廷未暇致討但羈縻之豫章太守周敷獨先入朝進號安西將軍給鼓吹一部賜以女妓金帛令還豫章廸以敷素出已下深不平之乃隂與留異相結遣其弟方興將兵襲敷敷與戰破之又遣其兄子伏甲船中詐為賈人欲襲湓城未發事覺尋陽太守監江州事晉陵華皎遣兵逆擊之盡獲其船仗上以閩州刺史陳寳應之父為光禄大夫子女皆受封爵命宗正編入屬籍而寳應以留異女為妻隂與異合虞荔弟寄流寓閩中荔思之成疾上為荔徴之寳應留不遣寄常從容諷以逆順寳應輙引它語以亂之寳應嘗使人讀漢書卧而聼之至蒯通說韓信曰相君之背貴不可言蹶然起坐曰可謂智士寄曰通一說殺三士何足稱智豈若班彪王命識所歸乎寄知寳應不可諫恐禍及己乃著居士服居東山寺陽稱足疾寳應使人燒其屋寄安卧不動親近將扶之出寄曰吾命有所懸避將安徃縱火者自救之三月丁丑以安右將軍呉明徹為江州刺史督高州刺史黄法􅉤豫章太守周敷共討周廸留異始謂臺軍必自錢塘上既而侯安都歩由諸暨出永康異大驚犇桃枝嶺於巖口􅆆柵以拒之安都為流矢所中血流至踝乗轝指麾容止不變因其山勢迮而為堰㑹潦水漲滿安都引船入堰超樓艦與異城等發拍碎其樓堞異與其子忠臣脱身犇晉安依陳寶應安都虜其妻及餘子盡収鎧仗而還異黨向文政據新安上以貞毅將軍程文季為新安太守帥精甲三百徑往攻之文政戰敗遂降文季靈洗之子也秋九月吳明徹至臨川攻周廸不能克丁亥詔安成王頊代之四年春正月甲申周廸衆潰脫身踰嶺犇晉安依陳寳應官軍克臨川獲廸妻子寳應以兵資廸留異又遣子忠臣隨之虞寄與寳應書以十事諫之曰自天厭梁徳英雄互起人人自以為得之然夷凶翦亂四海樂推者陳氏也豈非厯數有在惟天所授乎一也以王琳之彊侯瑱之力進足以揺蕩中原争衡天下退足以屈彊江外雄張偏隅然或命一旅之帥或資一士之說琳則瓦解氷泮投身異域瑱則厥角稽顙委命闕廷斯又天假之威而除其患二也今將軍以藩戚之重東南之衆盡忠奉上戮力勤王豈不勲高竇融寵過呉芮析珪判野南靣稱孤乎三也聖朝棄瑕忘過寛厚得人至於余孝頃潘純陀李孝欽歐陽頠等悉委以心腹任以爪牙胷中豁然曾無纎芥况將軍亹非張繡罪異畢諶當何慮於危亡何失於富貴四也方今周齊鄰睦境外無虞并兵一向匪朝伊夕非劉項競逐之機楚趙連從之勢何得雍容高拱坐論西伯哉五也且留將軍狼顧一隅亟經摧衂聲實虧喪膽氣衰沮其將帥首䑕兩端唯利是視孰能被堅執銳長驅深入繫馬埋輪奮不顧命以先士卒者乎六也將軍之彊孰如侯景將軍之衆孰如王琳武皇㓕侯景於前今上摧王琳於後此乃天時非復人力且兵革已後民皆厭亂其孰能棄墳墓捐妻子出萬死不顧之計從將軍於白刄之間乎七也厯觀前古子陽季孟傾覆相尋餘善右渠危亡繼及天命可畏山川難恃况將軍欲以數郡之地當天下之兵以諸侯之資拒天子之命彊弱逆順可得侔乎八也且非我族類其心必異不愛其親豈能及物留將軍身縻國爵子尚王姬猶且棄天屬而弗顧背明君而孤立危急之日豈能同憂共患不背將軍者乎至於師老力屈懼誅利賞必有韓智晉陽之謀張陳井陘之勢九也北軍萬里逺鬪鋒不可當將軍自戰其地人多顧後衆寡不敵將帥不侔師以無名而出事以無機而動以此稱兵未知其利十也為將軍計莫若絶親留氏遣子入質釋甲偃兵一遵詔㫖方今藩維尚少皇子㓜冲凡預宗枝皆䝉寵樹况以將軍之地將軍之才將軍之名將軍之勢而克脩藩服北靣稱臣寜與劉澤同年而語其功業哉寄感恩懐徳不覺狂言斧鉞之誅其甘如薺寳應覽書大怒或謂寳應曰虞公病勢漸篤言多錯謬寳應意乃小釋亦以寄民望故優容之秋九月周廸復越東興嶺為寇辛未詔䕶軍章昭達將兵討之冬十一月辛酉章昭達大破周廸廸脫身潜竄山谷民相與匿之雖加誅戮無肯言者十二月章昭達進軍度嶺趣建安討陳寳應詔益州刺史余孝頃督㑹稽東陽臨海永嘉諸軍自東道㑹之五年冬十月周廸復出東興宣城太守錢肅鎭東興以城降廸呉州刺史陳詳將兵擊之詳兵大敗廸衆復振南豫州刺史西豐脫侯周敷帥所部擊之至定川與廸對壘廸紿敷曰吾昔與弟戮力同心豈規相害今願伏罪還朝因弟披露心腑先乞挺身共盟敷許之方登壇為廸所殺陳寳應據建安晉安二郡水陸為柵以拒章昭達昭達與戰不利因據上流命軍士伐木為筏施拍其上㑹大雨江漲昭達放筏衝寳應水柵盡壊之又出兵攻其歩軍方合戰上遣將軍余孝頃自海道適至并力乘之十一月己丑寳應大敗逃至莆口謂其子曰早從虞公計不至今日昭達追擒之并擒留異及其族黨送建康斬之異子貞臣以尚主得免寳應賔客皆死上聞虞寄嘗諫寳應命昭達禮遣詣建康既見勞之曰管寜無恙以為衡陽王掌書記六年秋七月上遣都督程靈洗自鄱陽别道擊周廸破之廸與麾下十餘人竄于山穴中日月浸乆從者亦稍苦之後遣人潜出臨州市魚鮭臨川太守駱牙執之令取廸自效因使腹心勇士隨之入山其人誘廸出獵勇士伏於道傍出斬之丙戌傳首至建康宇文䕶逆節陳高祖永定元年春二月周楚公趙貴衛公獨孤信故皆與太祖等夷及晉公䕶専政皆怏怏不服貴謀殺䕶信止之開府儀同三司宇文盛告之丁亥貴入朝䕶執而殺之免信官三月周晉公䕶以趙景公獨孤信名重不欲顯誅之己酉逼令自殺夏四月周儀同三司齊軌謂御正中大夫薛善曰軍國之政當歸天子何得猶在權門善以告晉公䕶䕶殺之以善為中外府司馬周孝愍帝性剛果惡晉公䕶之專權司㑹李植自太祖時為相府司録參掌朝政軍司馬孫恒亦乆居權要及䕶執政植恒恐不見容乃與宫伯乙弗鳯賀㧞提等共譖之於周主植恒曰䕶自誅趙貴以來威權日盛謀臣宿將争徃附之大小之政皆决於䕶以臣觀之將不守臣節願陛下早圖之王以為然鳯提曰以先王之明猶委植恒以朝政今以事付二人何患不成且䕶常自比周公臣聞周公攝政七年陛下安能七年邑邑如此乎王愈信之數引武士於後園講習為執縳之勢植等又引宫伯張光洛同謀光洛以告䕶䕶乃出植為梁州刺史恒為潼州刺史欲散其謀後王思植等毎欲召之䕶泣諫曰天下至親無過兄弟若兄弟尚相疑它人誰可信者太祖以陛下富於春秋屬臣後事臣情兼家國實願竭其股肱若陛下親覽萬機威加四海臣死之日猶生之年但恐除臣之後姦回得志非唯不利陛下亦將傾覆社稷使臣無靣目見太祖於九泉且臣既為天子之兄位至宰相尚復何求願陛下勿信讒人之言疎棄骨肉王乃止不召而心猶疑之鳯等益懼密謀滋甚刻日召羣公入醼因執䕶誅之張光洛又以告䕶䕶乃召柱國賀蘭祥領軍尉遲綱等謀之祥等勸䕶廢立時綱總領禁兵䕶遣綱入宫召鳯等議事及至以次執送䕶第因罷散宿衛兵王方悟獨在内殿令宫人執兵自守䕶遣賀蘭祥逼王遜位幽於舊第悉召公卿㑹議廢王為畧陽公迎立岐州刺史寜都公毓公卿皆曰此公之家事敢不唯命是聽乃斬鳯等於門外孫恒亦伏誅時李植父柱國大將軍逺鎮𢎞農䕶召逺及植還朝逺疑有變沉吟乆之乃曰大丈夫寜為忠鬼安可作叛臣邪遂就徴至長安䕶以逺功名素重猶欲全之引與相見謂之曰公児遂有異謀非止屠戮䕶身乃是傾危宗社叛臣賊子理宜同疾公可早為之所乃以植付逺逺素愛植植又口辯自陳初無此謀逺謂為信然詰朝將植謁䕶䕶謂植已死左右曰植亦在門䕶大怒曰陽平公不信我乃召入仍命逺同坐令畧陽公與植相質於逺前植辭窮謂畧陽公曰本為此謀欲安社稷利至尊耳今日至此何事云云逺聞之自投於牀曰若爾誠合萬死於是䕶乃害植并逼逺令自殺植弟叔詣叔謙叔讓亦死餘子以㓜得免初逺弟開府儀同三司穆知植非保家之主毎勸逺除之逺不能用及逺臨刑泣謂穆曰吾不用汝言以至此穆當從坐以前言獲免除名為民及其子弟亦免官植弟浙州刺史基尚義歸公主當從坐穆請以二子代基命䕶兩釋之後月餘䕶弑畧陽公黜王后元氏為尼癸亥寧都公自岐州至長安甲子即天王位大赦二年春正月周以晉公䕶為太師夏四月周以太師䕶為雍州牧三年春正月周太師䕶上表歸政周王始親萬機軍旅之事䕶猶總之周處士韋夐孝寛兄也志尚夷簡魏周之際十徴不屈周太祖甚重之不奪其志世宗禮敬尤厚號曰逍遥公晉公䕶延之至第訪以政事䕶盛脩第舍夐仰視堂歎曰酣酒嗜音峻宇彫牆有一于此未或不亡䕶不恱文帝天嘉元年夏四月周世宗明敏有識量晉公䕶憚之使膳部中大夫李安寘毒於糖䭔而進之帝頗覺之庚子大漸口授遺詔五百餘言且曰朕子年㓜未堪當國魯公朕之介弟寛仁大度海内共聞能宏我周家必此子也辛丑殂魯公㓜有器質特為世宗所親愛朝廷大事多與之參議性深沉有逺識非因顧問終不輙言世宗毎歎曰夫人不言言必有中壬寅魯公即皇帝位大赦二年春正月戊申周改元保定以大冢宰䕶為都督中外諸軍事令五府總於天官事無巨細皆先斷後聞四年春二月辛酉周詔大冢宰晉國公親則懿昆任當元輔自今詔誥及百司文書並不得稱公名䕶抗表固讓宣帝大建四年初周太祖為魏相立左右十二軍總屬相府太祖殂皆受晉公䕶處分凡所徵發非䕶書不行䕶第屯兵侍衛盛於宫闕諸子僚屬皆貪殘恣横士民患之周主深自晦匿無所關預人不測其淺深䕶問稍伯大夫庾季才曰比日天道何如季才對曰荷恩深厚敢不盡言頃上台有變公宜歸政天子請老私門此則享期頥之壽受旦奭之羙子孫常為藩屏不然非復所知䕶沉吟乆之曰吾本志如此但辭未獲免耳公既為王官可依朝例無煩别參寡人也自是疎之衛公直帝之母弟也深昵於䕶及沌口之敗坐免官由是怨䕶勸帝誅之冀得其位帝乃密與直及右宫伯中大夫字文神舉内史下大夫太原王軌右侍上士宇文孝伯謀之神舉顯和之子孝伯安化公深之子也帝毎於禁中見䕶常行家人禮太后賜䕶坐帝立侍於旁丙辰䕶自同州還長安帝御文安殿見之因引䕶入含仁殿謁太后且謂之曰太后春秋高頗好飲酒雖屢諫未䝉垂納兄今入朝願更啟請因出懐中酒誥授之曰以此諫太后䕶既入如帝所戒讀酒誥未畢帝以玉珽自後擊之䕶踣於地帝令宦者何泉以御刀斫之泉惶懼斫不能傷衛公直匿於戸内躍出斬之時神舉等皆在外更無知者帝召宫伯長孫覽等告以䕶已誅令收䕶子柱國譚公㑹大將軍莒公至崇業公静正平公乾嘉及其弟乾基乾光乾蔚乾祖乾威并柱國北地侯龍恩龍恩弟大將軍萬壽大將軍劉勇中外府司録尹公正袁傑膳部下大夫李安等於殿中殺之覽稚之孫也初䕶既殺趙貴等諸將多不自安侯龍恩為䕶所親其從弟開府儀同三司植謂龍恩曰主上春秋既富安危繫於數公若多所誅戮以自立威權豈唯社稷有累卵之危恐吾宗亦縁此而敗兄安得知而不言龍恩不能從植又承間言於䕶曰公以骨肉之親當社稷之寄願推誠王室擬迹伊周則率土幸甚䕶曰我誓以身報國卿豈謂吾有佗志邪又聞其先與龍恩言隂忌之植以憂卒及䕶敗龍恩兄弟皆死高祖以植為忠特免其子孫大司馬兼小冡宰雍州牧齊公憲素為䕶所親任賞罰之際皆得參預權勢頗盛䕶欲有所陳多令憲聞奏其間或有可不憲慮主相嫌隙毎曲而暢之帝亦察其心及䕶死召憲入憲免冠拜謝帝慰勉之使詣䕶弟收兵符及諸文籍衛公直素忌憲固請誅之帝不許䕶世子訓為蒲州刺史是夜帝遣柱國越公盛乗傳徵訓至同州賜死昌城公深使突厥未還遣開府儀同三司宇文徳齎璽書就殺之䕶長史代郡叱羅協司録𢎞農馮遷及所親任者皆除名丁巳大赦改元以宇文孝伯為車騎大將軍與王軌並加開府儀同三司初孝伯與帝同日生太祖愛之養於第中㓜與帝同學及即位欲引致左右託言欲與孝伯講習舊經故䕶弗之疑也以為右侍上士出入卧内預聞機務孝伯為人沉正忠諒朝政得失外間細事無不使帝聞之帝閱䕶書記有假託符命妄造異謀者皆坐誅唯得庾季才書兩紙盛言緯候災祥宜返政歸權帝賜季才粟三百石帛二百叚遷太中大夫癸亥以尉遲㢠為太師柱國竇熾為太傅李穆為太保齊公憲為大冡宰衛公直為大司徒陸通為大司馬柱國辛威為大司冦趙公招為大司空時帝始親覽朝政頗事威刑雖骨肉無所寛借齊公憲雖遷冡宰實奪之權又謂憲侍讀裴文舉曰昔魏末不綱太祖輔政及周室受命晉公復執大權積習生常愚者謂灋應如是豈有年三十天子而可為人所制乎詩云夙夜匪懈以事一人一人謂天子耳卿雖陪侍齊公不得遽同為臣欲効死於所事宜輔以正道勸以義方輯睦我君臣協和我兄弟勿令自致嫌疑文舉咸以白憲憲指心撫几曰吾之夙心公寜不知但當盡忠竭節耳知復何言衛公直性浮詭貪狠意望大冡宰既不得殊怏怏更請為大司馬欲據兵權帝揣知其意曰汝兄弟長㓜有序豈可返居下列由是用為大司徒夏四月庚寅周追尊畧陽公為孝閔皇帝周伐齊周齊争宜陽附陳文帝天嘉四年初周人欲與突厥木杆可汗連兵伐齊許納其女為后遣御伯大夫楊荐及左武伯太原王慶徃結之齊人聞之懼亦遣使求昏於突厥賂遺甚厚木杆貪齊幣重欲執荐等送齊荐知之責木杆曰太祖昔與可汗共敦鄰好蠕蠕部落數千來降太祖悉以付可汗使者以快可汗之意如何今日遽欲背恩忘義獨不愧鬼神乎木杆慘然良乆曰君言是也吾意决矣當相與共平東賊然後遣女荐等復命公卿請發十萬人擊齊柱國楊忠獨以為得萬騎足矣戊子遣忠將歩騎一萬與突厥自北道伐齊又遣大將軍達奚武帥歩騎三萬自南道出平陽期㑹於晉陽冬十二月周楊忠㧞齊二十餘城齊人守陘嶺之隘忠擊破之突厥木杆地頭歩離三可汗以十萬騎㑹之己丑自恒州三道俱入時大雪數旬南北千餘里平地數尺齊主自鄴倍道赴之戊午至晉陽斛律光將歩騎三萬屯平陽己未周師及突厥逼晉陽齊主畏其彊戎服帥宫人欲東走避之趙郡王叡河間王孝琬叩馬諫孝琬請委叡部分必得嚴整帝從之命六軍進止皆取叡節度而使并州刺史叚韶總之五年春正月庚申齊主登北城軍容甚整突厥咎周人曰爾言齊亂故來伐之今齊人眼中亦有鐡何可當邪周人以歩卒為前鋒從西山下去城二里許諸將咸欲逆擊之叚韶曰歩卒力勢自當有限今積雪既厚逆戰非便不如陳以待之彼勞我逸破之必矣既至齊悉其銳兵鼓譟而出突厥震駭引上西山不肯戰周師大敗而還突厥引兵出塞縱兵大掠自晉陽以徃七百餘里人畜無遺叚韶追之不敢逼突厥還至陘嶺凍滑乃鋪氊以度胡馬寒痩膝已下皆無毛比至長城馬死且盡截矟杖之以歸達奚武至平陽未知忠退斛律光與書曰鴻鵠已翔於寥廓羅者猶視於沮澤武得書亦還光逐之入周境獲二千餘口而還光見帝於晉陽帝以新遭大冦抱光頭而哭任城王湝進曰何至於此乃止初齊顯祖之世周人常懼齊兵西度每至冬月守河椎氷及世祖即位嬖幸用事朝政漸紊齊人椎氷以備周兵之逼斛律光憂之曰國家常有吞關隴之志今日至此而唯翫聲色乎初周太祖之從賀㧞岳在關中也遣人迎晉公䕶於晉陽䕶母閻氏及周主之姑皆留晉陽齊人以配中山宫及䕶用事遣間使入齊求之莫知音息齊遣使者至玉璧求通互市䕶欲訪求母姑使司馬下大夫尹公正至玉璧與之言使者甚恱勲州刺史韋孝寛獲關東人復縱之因致書為言西朝欲通好之意是時周人以前攻晉陽不得志謀與突厥再伐齊齊主聞之大懼許遣䕶母西歸且求通好先遣其姑歸秋八月周遣柱國楊忠將兵㑹突厥伐齊至北河而還九月突厥冦齊幽州衆十餘萬入長城大掠而還周皇姑之歸也齊主遣人為晉公䕶母作書言䕶㓜時數事又寄其所著錦袍以為信驗且曰吾屬千載之運䝉大齊之徳矜老開恩許得相見禽獸草木母子相依吾有何罪與汝分離今復何福還望見汝言此悲喜死而更蘇世間所有求皆可得母子異國何處可求假汝貴極王公富過山海有一老母八十之年飄然千里死亡旦夕不得一朝蹔見不得一日同處寒不得汝衣饑不得汝食汝雖窮榮極盛光耀世間於吾何益吾今日之前汝既不得申其供養事徃何論今日以後吾之殘命唯繫於汝爾戴天履地中有鬼神勿云𡨕昧而可欺負䕶得書悲不自勝復書曰區宇分崩遭遇災禍違離膝下三十五年受形禀氣皆知母子誰同薩保如此不孝子為公侯母為俘𨽻暑不見母暑寒不見母寒衣不知有無食不知饑飽冺如天地之外無由暫聞分懐寃酷終此一生死若有知冀奉見於泉下耳不謂齊朝解網惠以徳音摩敦四姑並許矜放初聞此㫖魂爽飛越號天叩地不能自勝齊朝霈然之恩既已霑洽有家有國信義為本伏度來期已應有日一得奉見慈顔永畢生願生死肉骨豈過今恩負山戴岳未足勝荷齊人留䕶母使更與䕶書邀䕶重報徃返再三時叚韶拒突厥軍於塞下齊主遣黄門徐世榮乗傳齎周書問韶韶以周人反覆本無信義比晉陽之役其事可知䕶外託為相其實主也既為母請和不遣一介之使若據移書即送其母恐示之以弱不如且外許之待和親堅定然後遣之未晩齊主不聽即遣之閻氏至周舉朝稱慶周主為之大赦突厥自幽州還留屯塞北更集諸部兵遣使告周欲與共擊齊如前約閏月乙巳突厥冦齊幽州晉公䕶新得其母未欲伐齊又恐負突厥約更生邊患不得已徵二十四軍及左右廂散𨽻秦隴巴蜀之兵并羌胡内附者凡二十萬人冬十月甲子周主授䕶斧鉞於廟庭丁卯親勞軍於沙苑癸酉還宫䕶軍至潼關遣柱國尉遲迥帥精兵十萬為前鋒趣洛陽大將軍權景宣帥山南之兵趣懸瓠少師楊檦出軹關十一月周晉公䕶進屯𢎞農甲午尉遲迥圍洛陽雍州牧齊公憲同州刺史達奚武涇州總管王雄軍於邙山初周楊檦為邵州刺史鎭捍東境二十餘年數與齊戰未嘗不㨗由是輕之既出軹關獨引兵深入又不設備甲辰齊大尉婁叡將兵奄至大破檦軍檦遂降齊權景宣圍懸瓠十二月齊豫州道行臺豫州刺史太原王士良永州刺史蕭世怡並以城降之景宣使開府郭彦守豫州謝徹守永州送士良世怡及降卒千人於長安周人為土山地道以攻洛陽三旬不克晉公䕶命諸將塹斷河陽路遏齊救兵然後同攻洛陽諸將以為齊兵必不敢出唯張斥候而已齊遣蘭陵王長恭大將軍斛律光救洛陽畏周兵之彊未敢進齊主召并州刺史叚韶謂曰洛陽危急今欲遣王救之突厥在北復須鎭禦如何對曰北虜侵邊事等疥癬今西鄰闚逼乃腹心之病請奉詔南行齊主曰朕意亦爾乃令韶督精騎一千發晉陽丁巳齊主亦自晉陽赴洛陽叚韶自晉陽行五日濟河㑹連日隂霧壬戍韶至洛陽帥帳下三百騎與諸將登邙阪觀周軍形勢至太和谷與周軍遇韶即馳告諸營追集騎士結陳以待之韶為左軍蘭陵王長恭為中軍斛律光為右軍周人不意其至皆忷懼韶遥謂周人曰汝宇文䕶纔得其母遽來為冦何也周人曰天遣我來有何可問韶曰天道賞善罰惡當遣汝送死來耳周人以歩兵在前上山逆戰韶且戰且却以誘之待其力弊然後下馬擊之周師大敗一時瓦解投墜溪谷死者甚衆蘭陵王長恭以五百騎突入周軍遂至金墉城下城上人弗識長恭免胄示之靣乃下弩手救之周師在城下者亦解圍遁去委棄營幕自邙山至榖水三十里中軍資器械彌滿川澤唯齊公憲達奚武及庸忠公王雄在後勒兵拒戰王雄馳馬衝斛律光陳光退走雄追之光左右皆散惟餘一奴一矢雄按矟不及光者丈餘謂光曰吾惜爾不殺當生將爾見天子光射雄中額雄抱馬走至營而卒軍中益懼齊公憲拊循督勵衆心小安至夜收軍憲欲待明更戰達奚武曰洛陽軍散人情震駭若不因夜速還明日欲歸不得武在軍乆傋見形勢公少年未經事豈可以數營士卒委之虎口乎乃還權景宣亦棄豫州走丁卯齊主至洛陽己巳以叚韶為太宰斛律光為太尉蘭陵王長恭為尚書令壬申齊主如虎牢遂自滑臺如黎陽丙子至鄴楊忠引兵出沃野應接突厥軍糧不給諸軍憂之計無所出忠乃招誘稽胡酋長咸在坐詐使河州刺史王傑勒兵鳴鼓而至曰大冡宰已平洛陽欲與突厥共討稽胡之不服者坐者皆懼忠慰諭而遣之於是諸胡相帥饋輸軍糧塡積屬周師罷歸忠亦還晉公䕶本無將畧是行也又非本心故無功與諸將稽首謝罪周主慰勞罷之六年五月突厥遣使至齊始與齊通宣帝太建元年秋八月庚辰盗殺周孔城防主以其地入齊九月辛卯周遣齊公憲與柱國李穆將兵趣宜陽築崇徳等五城冬十二月周齊公憲等圍齊宜陽絶其糧道二年春正月齊太傅斛律光將歩騎三萬救宜陽屢破周軍築統關豐化二城以通宜陽糧道而還周軍追之光縱擊又破之獲其開府儀同三司字文英梁景興二月己巳齊以斛律光為右丞相并州刺史又以任城王湝為太師賀㧞仁録尚書事周齊争宜陽乆不决勲州刺史韋孝寛謂其下曰宜陽一城之地不足損益兩國争之勞師彌年彼豈無智謀之士若棄崤東來圖汾北我必失地令宜速於華谷及長秋築城以杜其意脫其先我圖之是難乃畫地形具陳其狀晉公䕶謂使者曰韋公子孫雖多數不滿百汾北築城遣誰守之事遂不行齊斛律光果出晉州道於汾北築華谷龍門二城光至汾東與孝寛相見光曰宜陽小城乆勞争戰今既舍彼欲於汾北取償幸勿怪也孝寛曰宜陽彼之要衝汾北我之所棄我棄彼取其償安在君輔翼㓜主位望隆重不撫循百姓而極武窮兵茍貪尋常之地塗炭疲弊之民竊為君不取也光進圍定陽築南汾城以逼之周人釋宜陽之圍以救汾北晉公䕶問計於齊公憲憲曰兄宜暫出同州以為聲勢憲請以精兵居前隨機攻取䕶從之三年春正月齊斛律光築十三城於西境馬上以鞭指畫而成拓地五百里而未嘗伐功又與周韋孝寛戰於汾北破之齊公憲督諸將東拒齊師三月周齊公憲自龍門度河斛律光退保華谷憲攻㧞其新築五城齊太宰叚韶蘭陵王長恭將兵禦周師攻柏谷城㧞之而還夏四月周陳公純等取齊宜陽等九城齊斛律光將歩騎五萬赴之五月周晉公䕶使中外府參軍郭榮城於姚襄城南定陽城西齊叚韶引兵襲周師破之六月韶圍定陽城周汾州刺史楊敷固守不下韶急攻之屠其外城時韶卧病謂蘭陵王長恭曰此城三靣重澗皆無走路唯慮東南一道耳賊必從此出宜簡精兵專守之此必成擒長恭乃令壯士千餘人伏於東南澗口城中糧盡齊公憲總兵救之憚韶不敢進敷帥見兵突圍夜走伏兵擊擒之盡俘其衆乙巳齊取周汾州及姚襄城唯郭榮所築城獨存敷愔之族子也齊斛律光與周師戰於宜陽城下取周建安等四戌捕虜千餘人而還軍未至鄴齊主敕使散兵光以軍士多有功者未得慰勞乃密通表請遣使宣㫖軍仍且進齊朝發使遲留軍還將至紫陌光乃駐營待使帝聞光軍已逼心甚惡之亟令舍人召光入見然後宣勞散兵吐谷渾盛衰晉元帝建武元年河南王吐谷渾卒吐谷渾者慕容廆之庶兄也父渉歸分戸一千七百以𨽻之及廆嗣位二部馬闘廆遣使讓吐谷渾曰先公分建有别奈何不相逺異而令馬有闘傷吐谷渾怒曰馬是六畜闘乃其常何至怒及於人欲逺别甚易恐後㑹為難耳今當去汝萬里之外遂帥其衆西徙廆悔之遣其長史乙那婁馮追謝之吐谷渾曰先公嘗稱卜筮之言云吾二子皆當彊盛祚流後世我孽子也理無並大今因馬而别殆天意乎遂不復還西傅隂山而居屬永嘉之亂因度隴而西據洮水之西極于白蘭地方數千里鮮卑謂兄為阿干廆追思之為之作阿干之歌吐谷渾有子六十人長子吐延嗣吐延長大有勇力羗胡皆畏之成帝咸和四年河南王吐延雄勇多猜忌羌酋姜聰刺之吐延不抽劍召其將紇扢埿使輔其子葉延保于白蘭抽劍而死葉延孝而好學以為禮公孫之子得以王父字為氏乃自號其國曰吐谷渾穆帝永和七年吐谷渾葉延卒子辟奚立文帝咸安元年吐谷渾王辟奚聞楊纂敗五月遣使獻馬千匹金銀五百斤于秦秦以辟奚為安逺將軍漒川侯辟奚葉延之子也好學仁厚而無威斷三弟専恣國人患之長史鍾惡地西漒羌豪也謂司馬乞宿雲曰三弟縱横勢出王右㡬亡國矣吾二人位為元輔豈得坐而視之詰朝月望文武並會吾將討焉王之左右皆吾羌子轉目一顧必可擒也宿雲請先白王惡地曰王仁而無斷白之必不從萬一事泄吾屬無類矣事已出口何可中變遂於坐收三弟殺之辟奚驚怖自投牀下惡地宿雲趨而扶之曰臣昨夢先王敕臣云三弟將為逆不可不討故誅之耳辟奚由是發病恍惚命世子視連曰吾禍及同生何以見之於地下國事大小任汝治之吾餘年殘命寄食而已遂以憂卒視連立不飲酒遊畋者七年軍國之事委之將佐鍾惡地諫以為人主當自娯樂建威布徳視連泣曰孤自先世以來以仁孝忠恕相承先王念友愛之不終悲憤而亡孤雖纂業尸存而已聲色遊娯豈所安也威徳之建當付之將來耳武帝太元十五年吐谷渾視連遣使獻見於金城王乾歸乾歸拜視連沙州牧白蘭王秋九月吐谷渾視連卒子視羆立視羆以其父祖慈仁為四鄰所侵侮乃督厲將士欲建功業冬十月金城王乾歸遣使拜視羆沙州牧白蘭王視羆不受安帝隆安二年九月西秦王乾歸遣秦州牧益州武衛將軍慕兀冠軍將軍翟瑥帥騎二萬伐吐谷渾西秦乞伏益州與吐谷渾王視羆戰於度周川視羆大敗走保白蘭山遣子宕豈為質於西秦以請和西秦王乾歸以宗女妻之四年夏四月吐谷渾視羆卒世子樹洛干方九嵗弟烏紇堤立妻樹洛干之母念氏生慕璝慕延烏紇堤懦弱荒滛不能治國念氏專制國事有膽智國人畏服之義熈元年春正月乞伏乾歸擊吐谷渾大孩大破之俘萬餘口而還大孩走死胡園視羆世子樹洛干帥其餘衆數千家犇莫何川自稱車騎大將軍大單于吐谷渾王樹洛干輕徭薄賦信賞必罰吐谷渾復興沙漒諸戎皆附之八年春二月河南王乾歸擊吐谷渾樹洛干於赤水降之九年夏四月河南王熾盤遣安北將軍烏地延冠軍將軍翟紹擊吐谷渾别統句旁于涇勒川大破之秋七月河南王熾盤擊吐谷渾支旁于長柳川虜旁及其民五千餘户而還九月河南王熾磐擊吐谷渾别統掘逵於渇渾川大破之擄男女二萬三千冬十月掘逵帥其餘衆降于熾磐十三年春二月西秦安東將軍木弈干擊吐谷渾樹洛干破其弟阿柴於堯杆川俘五千餘口而還樹洛干走保白蘭山慚憤發疾將卒謂阿柴曰吾子拾䖍㓜弱今以大事付汝樹洛干卒阿柴立自稱驃騎將軍沙州刺史謚樹洛干曰武王阿柴稍用兵侵併其旁小種地方數千里遂為彊國宋武帝永初二年夏四月吐谷渾王阿柴遣使降秦秦王熾磐以阿柴為征西大將軍開府儀同三司安州牧白蘭王營陽王景平元年吐谷渾王阿柴遣使入貢詔以阿柴為督塞表諸軍事安西將軍沙州刺史澆河公文帝元嘉元年冬十月吐谷渾威王阿柴卒阿柴有子二十人疾病召諸子弟謂之曰先公車騎以大業之故捨其子拾䖍而授孤孤敢私於緯代而忘先君之志乎我死汝曹當奉慕璝為主緯代者阿柴之長子慕璝者阿柴之母弟叔父烏紇堤之子也阿柴又命諸子各獻一箭取一箭授其弟慕利延使折之慕利延折之又取十九箭使折之慕利延不能折阿柴乃諭之曰汝曹知之乎孤則易折衆則難摧汝曹當戮力一心然後可以保國寜家言終而卒慕璝亦有才畧撫納秦凉失業之民及氏羌雜種至五六百落部衆轉盛三年秋九月吐谷渾掘逵等帥部衆二萬餘落叛秦犇昴州附于吐谷渾王慕璝六年冬十二月吐谷渾王慕璝遣使入貢七年春正月癸巳以吐谷渾王慕璝為征西將軍沙州刺史隴西公夏四月吐谷渾王慕璝將其衆萬八千襲秦定連秦輔國大將軍段暉等擊走之八年秋八月吐谷渾王慕璝遣侍郎謝太寧奉表于魏請送赫連定己丑魏以慕璝為大將軍西秦王九年春三月壬申吐谷渾王慕璝送赫連定于魏魏人殺之慕璝上表曰臣俘擒僣逆獻㨗王府爵秩雖崇而土不增廓車旗既飾而財不周賞願垂鑒察魏主下其議公卿以為慕璝所致唯定而已塞外之民皆為己有而貪求無厭不可許也魏主乃詔曰西秦王所得金城枹罕隴西之地朕即與之乃是裂土何須復廓西秦欵至綿絹隨使疏數臨時增益非一賜而止也自是慕璝貢使至魏者稍簡吐谷渾王慕璝遣其司馬趙叙入貢且來告㨗乙未以吐谷渾王慕璝為都督西秦河沙三州諸軍事征西大將軍西秦河二州刺史進爵隴西王且命慕璝悉歸南方將士先沒於夏者得百五十餘人十三年冬十二月吐谷渾惠王慕璝卒弟慕利延立十四年秋九月丁酉魏主遣使者拜吐谷渾王慕利延為鎮西大將軍儀同三司改封西平王十五年春二月丁未以吐谷渾王慕利延為都督西秦河沙三州諸軍事鎭西大將軍西秦河二州刺史隴西王十六年夏六月己酉改封隴西王吐谷渾慕利延為河南王冬十二月吐谷渾王慕利延聞魏克涼州大懼帥衆西遁踰沙漠魏主以其兄慕璝有擒赫連定之功遣使撫諭之慕利延乃還故地二十一年夏六月吐谷渾王慕利延兄子緯世與魏使者謀降魏慕利延殺之是月緯世弟叱力延等八人犇魏魏以叱力延為歸義王秋八月吐谷渾叱力延等請師於魏以討吐谷渾王慕利延魏主使晉王伏羅督諸軍擊之魏晉王伏羅至樂都引兵從間道襲吐谷渾至大母橋吐谷渾王慕利延大驚逃犇白蘭慕利延兄子拾寅犇河西魏軍斬首五千餘級慕利延從弟伏念等帥師萬三千部落降於魏二十二年夏四月庚戌魏主遣征西大將軍高凉王那等擊吐谷渾王慕利延於白蘭秦州刺史代人封敕文安逺將軍乙烏頭繫慕利延兄子什歸於枹罕吐谷渾什歸聞魏軍將至棄城夜遁八月丁亥封敕文入枹罕分徙其民千家還上邽留乙烏頭守枹罕萬度歸至敦煌留輜重以輕騎五千度流沙襲鄯善壬辰鄯善王真達靣縳出降度歸留軍屯守與真達詣平城西域復通壬寅魏高凉王那軍至寜頭城吐谷渾王慕利延擁其部落西度流沙吐谷渾慕璝之子被囊逆戰那擊破之被囊遁走中山公杜豐帥精騎追之度三危至雪山生擒被囊及吐谷渾什歸乞伏熾磐之子成龍皆送平城慕利延遂西入于闐殺其王據其地死者數萬人二十三年吐谷渾復還舊土二十七年吐谷渾王慕利延為魏所逼上表求入保越嶲上許之慕利延竟不至二十九年秋九月吐谷渾王慕利延卒樹洛干之子拾寅立始居伏羅川遣使來請命于魏丁亥以拾寅為安西將軍西秦河沙三州刺史河南王魏以拾寅為鎭西大將軍沙州刺史西平王武帝大明四年吐谷渾王拾寅兩受宋魏爵命居止出入擬於王者魏人忿之定陽侯曹安表言拾寅今保白蘭若分軍出其左右必走保南山不過十日人畜乏食可一舉而定六月甲午魏遣征西大將軍陽平王新成等督統萬高平諸軍出南道南郡公中山李惠等督凉州諸軍出北道以擊吐谷渾秋七月魏軍至西平吐谷渾王拾寅走保南山九月魏軍濟河追之㑹疾疫引還獲雜畜三十餘萬明帝泰始六年春二月魏主遣征西大將軍上黨王長孫觀擊吐谷渾夏四月戊申魏長孫觀與吐谷渾王拾寅戰於曼頭山拾寅敗走遣别駕康盤龍入貢魏主囚之蒼梧王元徽元年吐谷渾王拾寅寇魏澆河夏四月戊申魏以司空長孫觀為大都督發兵討之秋八月庚申魏長孫觀入吐谷渾境芻其秋稼吐谷渾王拾寅窘急請降遣子斤入侍自是嵗修職貢齊高帝建元三年吐谷渾王拾寅卒世子度易侯立冬十月戊子朔以度易侯為西秦河二州刺史河南王武帝永明八年秋八月河南王度易侯卒乙酉以其世子伏連籌為秦河二州刺史遣振武將軍丘冠先拜授且弔之伏連籌逼冠先使拜冠先不從伏連籌推冠先墜崖而死上厚賜其子雄敕以喪委絶域不可復尋仕進無嫌九年初魏主召吐谷渾王伏連籌入朝伏連籌辭疾不至輙修洮陽泥和二城置戌兵焉二月乙亥魏枹罕鎭將長孫百年請擊二戍魏主許之五月魏長孫百年攻洮陽泥和二戍克之俘三千餘人十年魏文明太后之喪使人告於吐谷渾吐谷渾王伏連籌拜命不恭羣臣請討之魏主不許又請還其貢物帝曰貢物乃人臣之禮今而不受是棄絶之彼雖欲自新其路無由矣因命歸洮陽泥和之俘秋七月庚申吐谷渾遣其世子賀虜頭入朝于魏詔以伏連籌為都督西垂諸軍事西海公吐谷渾王遣兼員外散騎常侍張禮使於吐谷渾伏連籌謂禮曰曩者宕昌常曰稱名而見謂為大王今忽稱僕又拘執使人欲使偏師徃問何如禮曰君與宕昌皆為魏藩比輙興兵攻之殊違臣節離京師之日宰輔有言以為君能自知其過則藩業可保若其不悛禍難將至矣伏連籌黙然東昏侯永元二年吐谷渾王伏連籌事魏盡禮而居其國置百官皆如天子之制稱制於其鄰國魏主遣使責而宥之梁武帝天監三年秋九月以吐谷渾王伏連籌為西秦河二州刺史河南王大同六年冬十一月吐谷渾自莫折念生之亂不通于魏伏連籌卒子夸吕立始稱可汗居伏俟城其地東西三千里南北千餘里官有王僕射尚書郎中將軍之號是嵗始遣使假道柔然聘於東魏元帝承聖二年夏四月吐谷渾可汗夸吕雖通使於魏而冦抄不息宇文泰將騎三萬踰隴至姑臧討之夸吕懼請服既而復通使於齊凉州刺史史寜覘知其還襲之於赤泉獲其僕射乞伏觸狀敬帝太平元年秋九月突厥木杆可汗假道於凉州以襲吐谷渾魏太師泰使凉州刺史史寜帥騎隨之至畨禾吐谷渾覺之犇南山木杆將分兵追之寜曰樹敦賀真二城吐谷渾之巢穴也㧞其本根餘衆自散木杆從之木杆從北道趣賀真寜從南道趣樹敦吐谷渾可汗夸吕在賀真使其征南王將數千人守樹敦木杆破賀真獲夸吕妻子寜破樹敦虜征南王還與木杆㑹于青海木杆歎寜勇决贈遺甚厚陳武帝永定元年春正月吐谷渾為冦於周攻凉鄯河三州秦州都督遣渭州刺史于翼赴援翼不從僚屬咸以為言翼曰攻取之術非北俗所長此冦之來不過抄掠邊牧耳掠而無獲勢將自走勞師以徃必無所及翼揣之已了幸勿復言數日問至果如翼所䇿文帝天康元年夏五月吐谷渾龍涸王莫昌帥部落附於周以其地為扶州宣帝太建八年春二月辛酉周主命太子廵撫西土因伐吐谷渾秋八月周太子伐吐谷渾至伏俟城而還十三年秋八月吐谷渾冦凉州隋主遣行軍元帥樂安公元諧等歩騎數萬擊之諧擊破吐谷渾於豐利山又敗其太子可博汗於青海俘斬萬計吐谷渾震駭其王侯三十人各帥所部來降吐谷渾可汗夸吕帥親兵逺遁隋主以其高寜王移兹裒為河南王使統降衆以元諧為寜州刺史留行軍總管賀婁子幹鎮凉州長城公至徳元年夏四月庚午吐谷渾冦隋臨洮洮州刺史皮子信出戰敗死汶州總管梁逺擊走之又冦廓州州兵擊走之夏六月庚辰隋行軍總管梁逺破吐谷渾於爾汗山二年夏四月隋上大將軍賀婁子幹發五州兵擊吐谷渾殺男女萬餘口二旬而還帝以隴西頻被冦掠而俗不設村塢命子幹勒民為堡仍營田積榖子幹上書曰隴西河右土曠民稀邊境未寜不可廣佃比見屯田之所獲少費多虚役人功卒逢踐暴屯田疎逺者請皆廢省但隴右之民以畜牧為事若更屯聚彌不自安但使鎮戍連接烽堠相望民雖散居必謂無慮帝從之以子幹曉習邊事丁巳以為榆關總管四年吐谷渾可汗夸吕在位百年屢因喜怒廢殺太子後太子懼謀執夸吕而降請兵於隋邊吏秦州總管河間王𢎞請以兵應之隋主不許太子謀洩為夸吕所殺復立其少子嵬王訶為太子疊州刺史杜粲請因其釁而討之隋主又不許是嵗嵬王訶復懼誅謀帥部落萬五千户降隋遣使詣闕請兵迎之隋主曰渾賊風俗特異人倫父既不慈子復不孝朕以徳訓人何有成其惡逆乎乃謂使者曰父有過失子當諫争豈可潜謀非法受不孝之名溥天之下皆朕臣妾各為善事即稱朕心嵬王既欲歸朕唯教嵬王為臣子之法不可逺遣兵馬助為惡事嵬王訶乃止禎明二年吐谷渾禆王拓䟦木彌請以千餘家降隋隋主曰溥天之下皆是朕臣朕之撫育俱存仁孝渾賊惛狂妻子懐怖並思歸化自救危亡然叛夫背父不可收納又其本意正自避死今若違拒又復不仁若更有音信但宜慰撫任其自㧞不須出兵應接其妹夫及甥欲來亦任其意不勞勸誘也隋文帝開皇十一年春二月戊午吐谷渾遣使入貢吐谷渾可汗夸吕聞陳亡大懼遁逃保險不敢為冦夸吕卒子世伏立使其兄子無素奉表稱藩并獻方物請以女傋後庭上謂無素曰若依來請佗國聞之必當相傚何以拒之朕情存安養各令遂性豈可聚歛子女以實後宫乎竟不許十六年冬十一月帝以光化公主妻吐谷渾可汗世伏世伏上表請稱公主為天后上不許十七年吐谷渾大亂國人殺世伏立其弟伏允為主遣使陳廢立之事并謝專命之罪且請依俗尚主上從之自是朝貢嵗至煬帝大業四年秋七月裴矩說鐡勒使擊吐谷渾大破之吐谷渾可汗伏允東走入西平境内遣使請降求救帝遣安徳王雄出澆河許公宇文述出西平迎之述至臨羌城吐谷渾畏述兵盛不敢降帥衆西遁述引兵追之㧞曼頭赤水二城斬三千餘級獲其王公以下二百人擄男女四千口而還伏允南犇雪山其故地皆空東西四千里南北二千里皆為隋有置郡縣鎮戌天下輕罪徙居之五年夏四月癸亥上出臨津關度黄河至西平陳兵講武將擊吐谷渾五月吐谷渾可汗伏允帥衆保覆袁川帝分命内史元壽南屯金山兵部尚書叚文振北屯雪山太僕卿楊義臣東屯琵琶峽將軍張壽西屯泥嶺四靣圍之伏允以數十騎遁出遣其名王詐稱伏允保車我真山壬辰詔右屯衛大將軍張定和徃捕之定和輕其衆少不被甲挺身登山吐谷渾伏兵射殺之其亞將柳武建擊吐谷渾破之甲午吐谷渾仙頭王窮䠞帥男女十餘萬口來降六月丁酉遣左光禄大夫梁黙等追討伏允兵敗為伏允所殺衛尉卿彭城劉權出伊吾道擊吐谷渾至青海虜獲千餘口乗勝追奔至伏俟城初吐谷渾伏允使其子順來朝帝留順不遣伏允敗走無以自資帥數千騎客於党項帝立順為可汗送至玉門令統其餘衆以其大寳王尼洛周為輔至西平其部下殺洛周順不果入而還通鑑紀事本末巻二十四下
