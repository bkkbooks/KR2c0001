body:
  text: 通鑑紀事本末卷十八上宋袁樞撰馮跋烕後燕晉安帝隆安五年燕王盛懲其父寳以懦弱失國務峻威刑又自矜聰察多所猜忌羣臣有纎介之嫌皆先事誅之由是宗親勲舊人不自保八月丁亥左将軍慕容國與殿上将軍秦輿段讃謀帥禁兵襲盛事發死者五百餘人壬辰夜前将軍段璣與秦輿之子興段讃之子泰潛於禁中鼓譟大呼盛聞變帥左右出戰賊衆逃潰璣被創匿廂屋間俄有一賊從闇中擊盛盛被傷輦升前殿申約禁衛事定而卒中壘将軍慕容拔冗從僕射郭仲白太后丁氏以為國家多難宜立長君時衆望在盛弟司徒尚書令平原公元而河間熈素得幸於丁氏丁氏乃廢太子定密迎熈入宫明旦羣臣入朝始知有變因上表勸進於熈熈以譲元元不敢當癸巳熈即天王位捕獲段璣等皆夷三族甲午大赦丙申平原公元以嫌賜死閏月辛酉葬盛于興平陵謚曰昭武皇帝廟號中宗丁氏送葬未還中領軍慕容提歩軍校尉張佛等謀立故太子定事覺伏誅定亦賜死丙寅大赦改元光始元興元年燕王熈納故中山尹符謨二女長曰娀娥為貴人幼曰訓英為貴嬪貴嬪尤有寵丁太后怨恚與兄子尚書信謀廢熈立章武公淵事覺熈逼丁太后令自殺葬以后禮謚曰獻幽皇后十一月戊辰殺淵及信辛未熈畋于北原石城令髙和與尚方兵於後作亂殺司𨽻校尉張顯入掠官殿取庫兵脅營署閉門乗城熈馳還城上人皆投仗開門盡誅反者唯和走免甲戌大赦二年夏五月燕王熈作龍騰苑方十餘里役徒二萬人築景雲山於苑内基廣五百歩峯髙十七丈財費浩繁冬十二月己酉立符貴嬪為皇后大赦三年夏四月燕王熈於龍騰苑起逍遙宫連房數百鑿曲光海盛夏士卒不得休息暍死者大半秋七月燕符昭儀有疾龍城人王榮自言能療之昭儀卒燕王熈立榮於公車門支觧而焚之至冬十一月燕王熈與符后逰畋北登白鹿山東踰青嶺南臨滄海而還士卒為虎狼所殺及凍死者五千餘人義熈元年冬十二月燕王熈襲契丹二年春正月燕王熈至陘北畏契丹之衆欲還符后不聼戊申遂棄輜重輕兵襲髙句麗二月燕軍行三千餘里士馬疲凍死者屬路攻髙句麗木底城不克而還夕陽公雲傷於矢且畏燕王熈之虐遂以疾去官二年春二月燕王熈為其后符氏起承華殿負土於北門土與榖同價宿衛典軍杜静載棺詣闕極諌熈斬之符氏甞季夏思凍魚仲冬須生地黄熈下有司切責不得而斬之夏四月癸丑符氏卒熈哭之懣絶久而復蘓䘮之如父母服斬衰食粥命百官宫内設位而哭使人案檢哭者無淚則罪之羣臣皆含辛以為淚髙陽王妃張氏熈之嫂也羙而有巧思熈欲以為殉乃毁其襚鞾中得弊氈遂賜死右僕射韋璆等皆恐為殉沐浴俟命公卿以下至兵民户率營陵費殫府藏陵周圍數里熈謂監作者曰善為之朕将繼徃丁酉燕太后段氏去尊號出居外宫秋七月癸亥燕王熈葬其后符氏于徽平陵䘮車髙大毁北門而出熈被髪徒跣歩從二十餘里甲子大赦初中衛将軍馮跋及弟侍御郎素弗皆得罪於熈熈欲殺之跋兄弟亡命山澤熈賦役繁數民不堪命跋素弗與其從弟萬泥謀曰吾輩還首無路不若因民之怨共舉大事可以建公侯之業事之不㨗死未晚也遂相與乗車使婦人御潛入龍城匿於北部司馬孫䕶之家及熈出送葬跋等與左衛将軍張興及符進餘黨作亂跋素與慕容雲善乃推雲為主雲以疾辭跋曰河間滛虐人神共怒此天亡之時也公髙氏名家何能為人飬子而棄難得之運乎扶之而出跋弟乳陳等帥衆攻𢎞光門鼓譟而進禁衛皆散走遂入宫授甲閉門拒守中黄門趙洛生走告于熈熈曰䑕盗何能為朕當還誅之乃置后柩于南苑收髪貫甲馳還赴難夜至龍城攻北門不克宿於門外乙丑雲即天王位大赦改元正始熈退入龍騰苑尚方兵楮頭踰城從熈稱營兵同心效順唯俟軍至熈聞之驚走而出左右莫敢廹熈從溝下潛遁良久左右怪其不還相與尋之唯得衣冠不知所適中領軍慕容拔謂中常侍張仲曰大事垂㨗而帝無故自驚深可怪也然城内企遲至必成功不可稽留吾當先徃趣城卿留待帝得帝速来若帝未還吾得如意安撫城中徐追未晚乃分将壮士二千餘人登北城将士謂熈至皆投仗請降既而熈久不至拔兵無後繼衆心疑懼復下城赴苑遂皆潰去拔為城中人所殺丙寅熈微服匿於林中為人所執送於雲雲數而殺之并其諸子雲復姓髙氏幽州刺史上庸公懿以令支降魏魏以懿為平州牧昌黎王懿評之孫也秋八月北燕王雲以馮跋為都督中外諸軍事開府儀同三司錄尚書事馮萬泥為尚書令馮素弗為昌黎尹馮𢎞為征東大将軍孫䕶為尚書左僕射張興為輔國大将軍𢎞跋之弟也四年春正月北燕王雲立妻李氏為皇后子彭城為太子夏五月北燕以尚書令馮萬泥為幽冀二州牧鎮肥如中軍将軍馮乳陳為并州牧鎮白狼撫軍大将軍馮素弗為司𨽻校尉務銀提為尚書令秋七月北燕王雲封慕容歸為遼東公使主燕祀五年冬十月北燕王雲自以無功徳而居大位内懐危懼常畜飬壮士以為腹心爪牙寵臣離班桃仁専典禁衛賞賜以巨萬計衣食起居皆與之同而班仁志願無厭猶有怨憾戊辰雲臨東堂班仁懐劍執紙而入稱有所啓班抽劒擊雲雲以几扞之仁從旁撃雲弑之馮跋升洪光門以觀變帳下督張泰李桑言於跋曰此豎勢何所至請為公斬之乃奮劒而下桑斬班于西門泰殺仁於庭中衆推跋為主跋以讓其弟范陽公素弗素弗不可跋乃即天王位於昌黎大赦詔曰陳氏代姜不改齊國宜即國號曰燕改元太平謚雲曰惠懿皇帝跋尊母張氏為太后立妻孫氏為王后子永為太子以范陽公素弗為車騎大将軍錄尚書事孫䕶為尚書令張興為左僕射汲郡公𢎞為右僕射廣川公萬泥為幽平二州牧上谷公乳陳為并青二州牧素弗少豪俠放蕩甞請㛰於尚書左丞韓業業拒之及為宰輔待業尤厚好申拔舊門謙恭儉約以身帥下百僚憚之論者羙其有宰相之度七年秋七月燕王跋以太子永領大單于置四輔柔然可汗斛律遣使獻馬三千匹於跋求娶跋女樂浪公主跋命羣臣議之遼西公素弗曰前世皆以宗女妻六夷宜許以妃嬪之女樂浪公主不冝下降非類跋曰朕方崇信殊俗奈何欺之乃以樂浪公主妻之跋勤於政事勸課農桑省徭役薄賦稅每遣守宰必親引見問為政之要以觀其能燕人恱之十年夏五月河間人楮匡言於燕王跋曰陛下龍飛遼碣舊邦族黨傾首朝陽以日為嵗請徃迎之跋曰道路數千里復隔異國如何可致匡曰章武臨海舟楫可通出於遼西臨渝不為難也跋許之以匡為逰擊将軍中書侍郎厚資遣之匡與跋從兄買從弟睹自長樂帥五千餘戸歸于和龍契丹庫莫奚皆降于燕跋署其大人為歸善王跋弟丕避亂在髙句麗跋召之以為左僕射封常山公䝉遜滅西凉晉安帝隆安四年初隴西李暠好文學有令名甞與郭黁及同母弟燉煌宋繇同宿黁起謂繇曰君當位極人臣李君終當有國家有騧馬生白額駒此其時也及孟敏為沙州刺史以暠為效榖令宋繇事北凉王業為中散常侍孟敏卒燉煌䕶軍馮翊郭謙沙州治中敦煌索仙等以暠温毅有惠政推為燉煌太守暠初難之㑹宋繇自張掖告歸謂暠曰段王無逺略終必無成兄忘郭黁之言邪白額駒今已生矣暠乃從之遣使将命于業業因以暠為燉煌太守右衛将軍燉煌索嗣言於業曰李暠不可使處燉煌業以嗣代暠為燉煌太守使帥五百騎之官嗣未至二十里移暠迎已暠驚疑将出迎之效榖令張邈及宋繇止之曰段王闇弱正是英豪有為之日将軍據一國成資奈何拱手授人嗣自恃本郡謂人情附已不意将軍猝能拒之可一戰禽也暠從之先遣繇見嗣㗖以甘言繇退謂暠曰嗣志驕兵弱易取也暠乃遣邈繇與其二子歆譲逆撃之嗣敗走還張掖暠素與嗣善尤恨之表業請誅嗣沮渠男成亦惡嗣勸業除之業乃殺嗣遣使謝暠進暠都督凉興巴西諸軍事鎮西将軍冬十一月北凉晉昌太守唐瑶叛移檄六郡推李暠為冠軍大将軍沙州刺史凉公領墩煌太守暠赦其境内改元庚子以瑶為征虜将軍郭謙為軍諮祭酒索仙為左長史張邈為右長史尹建興為左司馬張體順為右司馬遣從事中郎宋繇東伐凉興并擊王門巴西諸城皆下之酒泉太守王徳亦叛北凉自稱河州刺史北凉王業使沮渠䝉遜討之徳焚城将部曲犇唐瑶䝉遜追至沙頭大破之虜其妻子部落而還元興三年秋九月西凉公暠立子歆為世子義熈元年春正月西凉公暠自稱大将軍大都督領秦凉二州牧大赦改元建初遣舍人黄始梁興間行奉表詣建康秋九月西涼公暠與長史張邈謀徙都酒泉以逼沮渠䝉遜以張體順為建康太守鎮樂涫以宋繇為燉煌䕶軍與其子燉煌太守譲鎮燉煌遂遷于酒泉暠手令戒諸子以為從政者當審慎賞罰勿任愛憎近忠正逺佞䛕勿使左右竊弄威福毁譽之来當研覈真偽聼訟折獄必和顔任理慎勿逆詐億必輕加聲色務廣咨詢勿自専用吾蒞事五年雖未能息民然含垢匿瑕朝為冦讎夕委心膂粗無負于新舊事任公平坦然無纇初不容懐有所損益計近則如不足經逺乃為有餘庶亦無愧前人也二年秋九月沮渠䝉遜襲酒泉至安珍暠戰敗城守䝉遜引還六年秋八月沮渠䝉遜伐西涼敗西涼世子歆于馬廟禽其将朱元虎而還涼公暠以銀二千斤金二千兩贖元虎䝉遜歸之遂與暠結盟而還七年秋八月沮渠䝉遜帥輕騎襲西涼西涼公暠曰兵有不戰而敗敵者挫其銳也䝉遜新與吾盟而遽来襲我我閉門不與戰待其鋭氣竭而擊之蔑不克矣頃之䝉遜糧盡而歸暠遣世子歆帥騎七千邀擊之䝉遜大敗獲其将沮渠百年十二年夏六月涼司馬索承明上書勸涼公暠伐河西王䝉遜暠引見謂之曰䝉遜為百姓患孤豈忘之顧勢力未能除耳卿有必禽之䇿當為孤陳之直唱大言使孤東討此與言石虎小豎宜肆諸市朝者何異承明慚懼而退十三年春正月涼公暠寝疾遺命長史宋繇曰吾死之後世子猶卿子也善訓導之二月暠卒官屬奉世子歆為大都督大将軍涼公領涼州牧大赦改元嘉興尊歆母天水尹氏為太后以宋繇錄三府事謚暠曰武昭王廟號太祖夏四月河西王䝉遜遣張掖太守沮渠廣宗詐降以誘涼公歆歆發兵應之䝉遜将兵三萬㐲於蓼泉歆覺之引兵還䝉遜追之歆與戰於觧支澗大破之斬首七千餘級䝉遜城建康置戍而還十四年秋九月河西王䝉遜復引兵伐涼涼公歆将拒之左長史張體順固諌乃止䝉遜芟其秋稼而還歆遣使来告襲位冬十月以歆為都督七郡諸軍事鎮西大将軍酒泉公恭帝元熈元年涼公歆用刑過嚴又好治宫室從事中郎張顯上疏以為凉土三分勢不支久兼并之本在於務農懐逺之略莫如寛簡今入嵗已来隂陽失序風雨乖和是宜减膳撤懸側身修道而更繁刑峻法繕築不止殆非所以致興隆也昔文王以百里而興二世以四海而滅前車之軌得失昭然太祖以神聖之姿為西夏所推左取酒泉右開西域殿下不能奉承遺志混壹涼土侔蹤張后将何以下見先王乎沮渠䝉遜胡夷之傑内修政事外禮英賢攻戰之際身均士卒百姓懐之樂為之用臣謂殿下非但不能平殄䝉遜亦懼䝉遜方為社稷之憂歆覽之不恱主簿汜稱上疏諌曰天之子愛人主殷勤至矣故政之不修下災異以戒告之改者雖危必昌不改者雖安必亡元年三月癸卯燉煌謙徳堂䧟八月效榖地裂二年元日昬霧四塞四月日赤無光三旬乃復十一月狐上南門今茲春夏地頻五震六月隕星于建康臣雖學不稽古年五十有九請為殿下略言耳目之所聞見不復能逺論書傳之事也乃者咸安之初西平地裂狐入謙光殿前俄而秦師奄至都城不守梁熈既為涼州不撫百姓専為聚斂建元十九年姑臧南門崩隕石於閒豫堂明年為吕光所殺段業稱制此方三年之中地震五十餘所既而先王龍興于𤓰州䝉遜篡弑於張掖此皆目前之成事殿下所明知也效榖先王鴻漸之地謙徳即尊之室基䧟地裂大凶之徴也日者太陽之精中國之象赤而無光中國将衰諺曰野獸入家主人将去狐上南門亦變異之大者也今蠻夷益盛中國益微願陛下亟罷宫室之役止逰畋之娯延禮英俊愛飬百姓以應天變防未然歆不從宋髙祖武帝初元元年秋七月甲辰詔以涼公歆為都督髙昌等七郡諸軍事征西大将軍酒泉公秦王熾磐為安西大将軍河西王䝉遜欲伐涼先引兵攻秦浩亹既至潛師還屯川巖涼公歆欲乗虚襲張掖宋繇張體順切諌不聼太后尹氏謂歆曰汝新造之國地狹民希自守猶懼不足何暇伐人先王臨終殷勤戒汝深慎用兵保境寕民以俟天時言猶在耳奈何棄之䝉遜善用兵非汝之敵數年以来常有兼并之志汝國雖小足為善政修徳飬民静以待之彼若昬暴民将歸汝若其休明汝将事之豈得輕為舉動僥冀非望以吾觀之非但䘮師殆将亡國亦不聼宋繇嘆曰今茲大事去矣歆将歩騎三萬東出䝉遜聞之曰歆已入吾術中然聞吾旋師必不敢前乃露布西境云已克浩亹将進攻黄谷歆聞之喜進入都瀆澗䝉遜引兵擊之戰於懐城歆大敗或勸歆還保酒泉歆曰吾違老母之言以取敗不殺此敵何靣目復見吾母遂勒兵戰于蓼泉為䝉遜所殺歆弟酒泉太守翻新城太守預領羽林右監宻左将軍眺右将軍亮西犇燉煌䝉遜入酒泉禁侵掠士民安堵以宋繇為吏部委之選舉涼之舊臣有才望者咸禮而用之以其子牧犍為酒泉太守燉煌太守李恂翻之弟也與翻等棄燉煌奔北山䝉遜以索嗣之子元緒行燉煌太守䝉遜還姑臧見涼太后尹氏娶其女為牧犍婦索元緒麤險好殺大失人和郡人宋承張𢎞密信招李恂冬恂帥數千騎入燉煌元緒東犇涼與承等推恂為冠軍将軍涼州刺史二年春正月河西王䝉遜帥衆二萬攻李恂于燉煌三月河西王䝉遜築堤壅水以灌燉煌李恂乞降不許宋承舉城降恂自殺䝉遜屠其城獲恂子弟寳囚于姑臧乞伏滅南涼晉安帝義熈六年初南涼王傉檀遣左将軍枯木等伐沮渠䝉遜掠臨松千餘戸而還䝉遜伐南涼至顯羙徙數千戸而去南涼太尉俱延復伐䝉遜大敗而歸是月傉檀自将五萬騎伐䝉遜戰于窮泉傉檀大敗單馬奔還䝉遜乗勝進圍姑臧姑臧人懲王鍾之誅皆驚潰夷夏萬餘戸降于䝉遜傉檀懼遣司𨽻校尉敬歸及子佗為質於䝉遜以請和䝉遜許之歸至胡阬逃還佗為追兵所執䝉遜徙其衆八千餘戸而去右衛将軍折掘竒鎮據石驢山以叛傉檀畏䝉遜之逼且懼嶺南為竒鎮所據乃遷于樂都留大司農成公緒守姑臧傉檀纔出城魏安人侯諶等閉門作亂收合三千餘家據南城推焦朗為大都督龍􅋮大将軍諶自稱涼州刺史降于䝉遜七年焦朗猶據姑臧沮渠䝉遜攻拔其城執朗而宥之以其弟挐為秦州刺史鎮姑臧遂伐南涼圍樂都三旬不克南涼王傉檀以子安周為質乃還南涼王傉檀欲復伐沮渠䝉遜邯川䕶軍孟愷諌曰䝉遜新并姑臧凶勢方盛不可攻也傉檀不從五道俱進至番禾苕藋掠五千餘戸而還将軍屈右曰今既獲利宜倍道旋師早度險阨䝉遜善用兵若輕軍猝至大敵外逼徙户内叛此危道也衛尉伊力延曰彼歩我騎勢不相及今倍道而歸則示弱且捐棄資財非計也俄而昬霧風雨䝉遜兵大至傉檀敗走䝉遜進圍樂都傉檀嬰城固守以子染干為質以請和䝉遜乃還九年南涼王傉檀伐河西王䝉遜䝉遜敗之於若厚塢又敗之于若涼因進圍樂都二旬不克南涼湟河太守文支以郡降于䝉遜䝉遜以文支為廣武太守䝉遜復伐南涼傉檀以太尉俱延為質乃還十年唾契汗乙弗等部皆叛南涼南涼王傉檀欲討之邯川䕶軍孟愷諌曰今連年饑饉南逼磐熾北逼䝉遜百姓不安逺征雖克必有後患不如與熾磐結盟通糴慰撫雜部足食繕兵俟時而動傉檀不從謂太子虎臺曰䝉遜近去不能猝来日夕所慮唯在熾磐然熾磐兵少易禦汝謹守樂都吾不過一月必還矣乃帥騎七千襲乙弗大破之獲馬牛羊四十餘萬河南王熾磐聞之欲襲樂都羣臣咸以為不可太府主簿焦襲曰傉檀不顧近患而貪逺利我今伐之絶其西路使不得還救則虎臺獨守窮城可坐禽也此天亡之時必不可失熾磐從之帥歩騎二萬襲樂都虎臺慿城拒守熾磐四靣攻之南涼撫軍從事中郎尉肅言於虎臺曰外城廣大易守殿下不若聚國人守内城肅等帥晉人拒戰于外雖有不㨗猶足自存虎臺曰熾磐小賊旦夕當走卿何過慮之深虎臺疑晉人有異心悉召豪望有謀勇者閉之於内孟愷泣曰熾磐乗虚内侮國家危於累卵愷等進欲報恩退顧妻子人思效死而殿下乃疑之如是邪虎臺曰吾豈不知君之忠篤懼餘人脫生慮表以君等安之耳一夕城潰熾磐入樂都遣平逺将軍㨗䖍帥騎五千追傉檀以鎮南将軍謙屯為都督河右諸軍事涼州刺史鎮樂都秃髪赴單為西平太守鎮西平以趙恢為廣武太守鎮廣武曜武将軍王基為晉興太守鎮浩亹徙虎臺及其文武百姓萬餘户于枹罕赴單烏孤之子也樂都之潰也南涼安西将軍樊尼自西平犇告南涼王傉檀傉檀謂其衆曰今妻子皆為熾磐所虜退無所歸卿等能與吾藉乙弗之資取契汗以贖妻子乎乃引兵西衆多逃還傉檀遣鎮北将軍段茍追之茍亦不還於是将士皆散唯樊尼與中軍将軍紇勃後軍将軍洛肱􅄆騎常侍隂利鹿不去傉檀曰䝉遜熾磐昔皆委質於吾今而歸之不亦鄙乎四海之廣無所容身何其痛也與其聚而同死不若分而或全樊尼吾長兄之子宗部所寄吾衆在北者户垂一萬䝉遜方招懐士民存亡繼絶汝其從之紇勃洛肱亦與尼俱行吾年老矣所適不容寕見妻子而死遂歸于熾磐唯隂利鹿随之傉檀謂利鹿曰吾親屬皆散卿何獨留利鹿曰臣老母在家非不思歸然委質為臣忠孝之道難以兩全臣不才不能為陛下泣血求救于鄰國敢離左右乎傉檀嘆曰知人固未易大臣親戚皆棄我去今日忠義終始不虧者唯卿一人而已傉檀諸城皆降於熾磐獨尉賢政屯浩亹固守不下熾磐遣人謂之曰樂都已潰卿妻子皆在吾所獨守一城将何為也賢政曰受涼王厚恩為國藩屏雖知樂都已䧟妻子為禽先歸獲賞後順受誅然不知主上存亡未敢歸命妻子小事豈足動心若貪一時之利忘委付之重者大王亦安用之熾磐乃遣虎臺以手書諭之賢政曰汝為儲副不能盡節靣縳於人棄父忘君堕萬世之業賢政義士豈效汝乎聞傉檀至左南乃降熾磐聞傉檀至遣使郊迎待以上賔之禮秋七月熾磐以傉檀為驃騎大将軍賜爵左南公南涼文武依才銓叙嵗餘熾磐使人鴆傉檀左右請觧之傉檀曰吾病豈宜療邪遂死謚曰景王虎臺亦為熾磐所殺傉檀子保周賀俱延子覆龍利鹿孤孫副周烏孤孫承鉢皆犇河西王䝉遜久之又犇魏宋營陽王景平元年南涼秃髪傉檀之死也河西王䝉遜遣人誘其故太子虎臺許以番禾西安二郡處之且借之兵使伐秦報其父讎復取故地虎臺隂許之事泄而止秦王熾磐之后虎臺之妹也熾磐待之如初后密與虎臺謀曰秦本我之仇讎雖以㛰姻待之盖時宜耳先王之薨又非天命遺令不治者欲全濟子孫故也為人子者豈可臣妾於仇讎而不思報復乎乃與武衛将軍越質洛城謀弑熾磐后妹為熾磐左夫人有寵知其謀而告之熾磐殺后及虎臺等十餘人䝉遜伐西秦晉安帝義熈十一年春三月河西王䝉遜攻西秦廣武郡拔之西秦王熾磐遣将軍乞㐲魋尼寅邀䝉遜于浩亹䝉遜擊斬之又遣将軍折斐等帥騎一萬據勒姐嶺䝉遜擊禽之夏五月西秦王熾磐帥衆三萬襲湟河䝉遜弟漢平遣司馬隗仁夜出擊破之熾磐将引去漢平長史焦昶将軍段景潛召熾磐熾磐復攻之漢平力屈為熾磐所禽十二年春正月西秦王熾磐攻秦洮陽公彭利和於漒川沮渠䝉遜攻石泉以救之熾磐至㳫中引還二月熾磐遣㐮武侯曇達救石泉䝉遜亦引去䝉遜遂與熾磐結和親宋武帝永初元年春正月秦王熾磐立其子暮末為太子秋九月秦襄武将軍王基等襲河西王䝉遜胡園戍俘二千餘人而還二年秋七月河西王䝉遜遣右衛将軍沮渠鄯善建節将軍沮渠茍生帥衆七千伐秦秦王熾磐遣征北将軍木弈干等帥歩騎五千拒之敗鄯善等于五澗虜茍生斬首二千而還三年秋七月河西王䝉遜遣前将軍沮渠成都帥衆壹萬耀兵嶺南遂屯五澗九月秦王熾磐遣征北将軍出連䖍等帥騎六千擊之冬十月秦出連䖍與河西沮渠成都戰擒之營陽王景平元年夏四月秦王熾磐謂其羣臣曰今宋雖奄有江南夏人雄據闗中皆不足與也獨魏王弈世英武賢能為用且䜟云恒代之北當有真人吾将舉國而事之乃遣尚書郎莫者阿胡等入見于魏貢黄金二百斤并陳伐夏方略文帝元嘉元年秋七月秦王熾磐遣太子暮末帥征北将軍木弈午等歩騎三萬出貂渠谷攻河西白草嶺臨松郡皆破之徙民二萬餘口而還二年夏四月秦王熾磐遣平逺将軍叱盧犍等襲河西鎮南将軍沮渠白蹄於臨松擒之徙其民五千餘戸于枹罕三年春正月秦王熾磐復遣使如魏請用師于夏秋八月秦王熾磐伐河西至亷川遣太子暮末等歩騎三萬攻西安不克又攻番禾河西王䝉遜發兵禦之且遣使説夏主使乗虚襲枹罕夏主遣征南大将軍呼盧古将騎二萬攻苑川車騎大将軍韋伐将騎三萬攻南安熾磐聞之引歸九月徙其境内老弱畜産于澆河及莫河仍寒川留左丞相曇達守枹罕韋伐攻拔南安獲秦秦州刺史翟爽南安太守李亮冬十月秦左丞相曇達與夏呼盧古戰于嵻㟍山曇達兵敗十一月呼盧古韋伐進攻枹罕秦王熾磐遷保定連呼盧古入南城鎮東将軍趙夀生帥死士三百人力戰却之呼盧古韋伐又攻沙州刺史出連䖍于湟河䖍遣後将軍乞㐲萬年擊敗之又攻西平執安西将軍庫洛干阬戰士五千餘人掠民二萬餘户而去四年夏六月秦王熾磐還枹罕秋八月秦王熾磐遣其叔父平逺将軍埿頭等入貢于魏五年夏五月秦文昭王熾磐卒太子暮末即位大赦改元永𢎞六月葬秦文昭王于武平陵廟號太祖秦王暮末以右丞相元基為侍中相國都督中外諸軍錄尚書事以鎮軍大将軍河州牧謙屯為驃騎大将軍徴安北将軍涼州刺史段暉為輔國大将軍御史大夫右禁将軍千年為鎮北将軍涼州牧鎮湟河以征北将軍木奕干為尚書令車騎大将軍以征南将軍吉毗為尚書僕射衛大将軍河西王䝉遜因秦䘮伐秦西平西平太守􅀈承謂之曰殿下若先取樂都則西平必為殿下之有西平茍望風請服亦明主之所疾也䝉遜乃釋西平攻樂都相國元基帥騎三千救樂都甫入城而河西兵至攻其外城克之絶其水道城中飢渇死者大半東𦍑乞提從元基救樂都隂與河西通謀下繩引内其兵登城者百餘人鼓譟燒門元基帥左右奮擊河西兵乃退初文昭王疾病謂暮末曰吾死之後汝能保境則善矣沮渠成都為䝉遜所推重汝宜歸之至是暮末遣使詣䝉遜許歸成都以求和䝉遜引兵還遣使入秦弔祭暮末厚資送成都遣将軍王伐送之䝉遜猶疑之使恢武将軍沮渠竒珍㐲兵於捫天嶺執伐并其騎士三百人以歸既而遣尚書郎王杼送伐還秦并遺暮末馬千匹及錦􅄢銀繒秋七月暮末遣記室郎中馬艾如河西報聘冬十二月河西王䝉遜伐秦至磐夷秦相國元基等将騎萬五千拒之䝉遜還攻西平征虜将軍出連輔政等将騎二千救之六年春正月秦出連輔政等未至西平河西王䝉遜拔西平執太守麴承夏五月河西王䝉遜伐秦秦王暮末留相國元基守枹罕遷保定連西安太守翟承伯等據罕开谷以應河西暮末擊破之進至冶城西安太守莫者幼眷據汧川以叛暮末討之為幼眷所敗還于定連䝉遜至枹罕遣世子興國進攻定連六月慕末逆擊興國于冶城擒之追擊䝉遜至譚郊吐谷渾王慕璝遣其弟沒利延将騎五千㑹䝉遜伐秦暮未遣輔國大将軍段暉等邀擊大破之秋七月河西王䝉遜遣使送榖三十萬斛以贖世子興國于秦秦王暮末不許䝉遜乃立興國母弟菩提為世子暮末以興國為散騎常侍以其妹平昌公主妻之七年秦王暮末為河西所逼遣其臣王愷烏納闐請迎于魏魏許以平涼安定封之暮末乃焚城邑毁寳器帥户萬五千如上邽至髙田谷給事黄門侍郎郭恒謀劫沮渠興國以叛事覺暮末殺之夏主聞暮末将至發兵拒之暮末留保南安其故地皆入於吐谷渾十一月魏尚書庫結引還南安諸𦍑萬餘人叛秦推安南将軍督八郡諸軍事廣寗太守焦遺為主遺不從乃劫遺族子長城䕶軍亮為主帥衆攻南安暮末請救於氐主楊難當難當遣将軍符獻帥騎三千救之暮末與之合擊諸𦍑諸𦍑潰亮犇還廣寗暮末進軍攻之以手令與焦遺使取亮十二月遺斬亮首出降暮末進遺號鎮國将軍秦略陽太守𢎞農楊顯以郡降夏八年夏主擊秦将姚獻敗之遂遣其叔父北平公韋伐帥衆一萬攻南安城中大飢人相食秦侍中征虜将軍出連輔政侍中右衛将軍乞㐲延祚吏部尚書跋跋踰城犇夏秦王暮末窮蹙輿櫬出降并沮渠興國送於上邽秦太子司直焦楷犇廣寕泣謂其父遺曰大人荷國寵靈居藩鎮重任今本朝顛覆豈得不帥見衆唱大義以殄冦讎遺曰今主上已䧟賊庭吾非愛死而忘義顧以大兵追之是趣絶其命也不如擇王族之賢者奉以為主而伐之庶有濟也楷乃築壇誓衆二旬之間赴者萬餘人㑹遺病卒楷不能獨舉事亡犇河西夏五月夏主殺乞㐲暮末及其宗族五百人劉裕滅南燕晉安帝義熈元年初南燕王備徳仕秦為張掖太守其兄納與母公孫氏居於張掖備徳之從秦王堅冦淮南也留金刀與其母别備徳與燕王垂舉兵于山東張掖太守符昌收納及備徳諸子皆誅之公孫氏以老獲免納妻段氏方娠未决獄掾呼延平備徳之故吏也竊以公孫氏及段氏逃于𦍑中段氏生子超十嵗而公孫氏病臨卒以金刀授超曰汝得東歸當以此刀還汝叔也呼延平又以超母子犇涼及吕隆降秦超随涼州民徙長安平卒段氏為超娶其女為婦超恐為秦人所錄乃陽狂行乞秦人賤之惟東平公紹見而異之言於秦王興曰慕容超姿幹瓌偉殆非真狂願微加官爵以縻之興召見與語超故為謬對或問而不答興謂紹曰諺云妍皮不裹癡骨徒妄語耳乃罷遣之備徳聞納有遺腹子在秦遣濟隂人呉辯徃視之辯因鄉人宗正謙賣卜在長安以告超超不敢告其母妻潛與謙變姓名逃歸南燕行至梁父鎮南長史恱夀以告兖州刺史慕容法法曰昔漢有卜者詐稱衛太子今安知非此類也不禮之超由是與法有隙備徳聞超至大喜遣騎三百迎之超至廣固以金刀獻與備徳慟哭悲不自勝封超為北海王拜侍中驃騎大将軍司𨽻校尉開府妙選時賢為之僚佐備徳無子欲以超為嗣超入則侍奉盡懽出則傾身下士由是内外譽望翕然歸之秋九月汝水竭南燕主備徳惡之俄而寝疾北海王超請禱之備徳曰人主之命長短在天非汝水所能制也固請不許戊午備徳引見羣臣于東陽殿議立超為太子俄而地震百僚驚恐備徳亦不自安還宫是夜疾篤瞑不能言段后大呼令召中書作詔立超可乎備徳開目頷之乃立超為皇太子大赦備徳尋卒為十餘棺夜分出四門皆瘞山谷已未超即皇帝位大赦改元太上尊段后為皇太后以北地王鍾都督中外諸軍錄尚書事慕容法為征南大将軍都督徐兖揚南兖四州諸軍事加慕容鎮開府儀同三司以尚書令封孚為太尉麴仲為司空封嵩為尚書左僕射癸亥虚葬偹徳於東陽陵謚曰獻武皇帝廟號世宗超引所親公孫五樓為腹心備徳故大臣北地王鍾段宏等皆不自安求補外職超以鍾為青州牧宏為徐州刺史公孫五樓為武衛将軍領屯騎校尉内參政事封孚諌曰臣聞親不處外羇不處内鍾國之宗臣社稷所頼宏外戚懿望百姓具瞻正應參翼百揆不宜逺鎮外方今鍾等出藩五樓内輔臣竊未安超不從鍾宏心皆不平相謂曰黄犬之皮恐終補狐裘也五樓聞而恨之二年南燕王超猜虐日甚政出權倖盤于逰畋封孚韓􅒲屢諌不聼超甞臨軒問孚曰朕可方前世何主對曰桀紂超慙怒孚徐歩而出不為改容鞠仲謂孚曰與天子言何得如是宜還謝孚曰行年七十惟求死所耳竟不謝超以其時望優容之秋九月南燕公孫五樓欲擅朝權譛北地王鍾於南燕王超請誅之南燕王備徳之卒也慕容法不犇䘮超遣使譲之法懼遂與鍾及段宏謀反超聞之徴鍾鍾稱疾不至超收其黨慕容統等殺之征南司馬卜珍告左僕射封嵩数與法徃来疑有奸超收嵩下廷尉太后懼泣告超曰嵩数遣黄門令牟常說吾云帝非太后所生恐依永康故事我婦人識淺恐帝見殺即以語法法為謀見誤知復何言超乃車裂嵩西中郎将封融犇魏超遣慕容鎮攻青州慕容昱攻徐州右僕射濟陽王凝及韓範攻兖州昱拔莒城段宏犇魏封融與羣盗襲石塞城殺鎮西大将軍餘鬱國中振恐濟陽王凝謀殺韓範襲廣固範知之勒兵攻凝凝犇梁父範并将其衆攻梁父克之法出犇魏凝出犇秦暮容鎮克青州鍾殺其妻子為地道以出與髙都公始皆犇秦秦以鍾為始平太守凝為侍中南燕主超好變更舊制朝野多不恱又欲復肉刑増置烹轘之法衆議不合而止冬十月封孚卒三年南燕主超母妻猶在秦超遣御史中丞封愷使於秦以請之秦王興曰昔符氏之敗大樂諸伎悉入于燕燕今稱藩送伎或送呉口千人所請乃可得也超與羣臣議之左僕射段暉曰陛下嗣守社稷不宜以私親之故遂降尊號且大樂先代遺音不可與也不如掠呉口與之尚書張華曰侵掠鄰國兵連禍結此既能徃彼亦能来非國家之福也陛下慈親在人掌握豈可靳惜虚名不為降屈乎中書令韓範甞與秦王俱為符氏太子舍人若使之徃必得如志超從之乃使韓範聘于秦稱藩奉表慕容凝言於興曰燕王得其母妻不復可臣宜先使送伎興乃謂範曰朕歸燕王家屬必矣然今天時尚熱當俟秋凉八月秦使員外散騎常侍韋宗聘於燕超與羣臣議見宗之禮張華曰陛下前既奉表今宜北靣受詔封逞曰大燕七聖重光奈何一旦為豎子屈節超曰吾為太后屈願諸君勿復言遂北靣受詔冬十月南燕王超使左僕射張華給事中宗正元獻大樂伎一百二十人於秦秦王興乃還超母妻厚其資禮而遣之超親帥六宫迎於馬耳闗四年春正月南燕主超尊其母段氏為皇太后妻呼延氏為皇后超祀南郊有獸如䑕而赤大如馬来至壇側須􅁷大風晝晦羽儀帷幄皆毁裂超懼以問太史令成公綏對曰陛下信用姦佞誅戮賢良賦斂繁多事役殷重之所致也超乃大赦黜公孫五樓等俄而復用之冬十一月南燕汝水竭河凍皆合而澠水不氷南燕主超惡之問於李宣對曰澠水無氷良由逼帶京城近日月也超大悦賜朝服一具五年春正月庚寅朔南燕主超朝㑹羣臣歎太樂不備議掠晉人以補伎領軍將軍韓􅒲諌曰先帝以舊京傾覆戢翼三齊陛下不養士息民以伺魏釁恢復先業而更侵掠南鄰以廣讎敵可乎超曰我計已定不與卿言二月南燕將慕容興宗斛榖提公孫歸等帥騎㓂宿豫拔之大掠而去簡男女二千五百付太樂教之歸五樓之兄也是時五樓為侍中尚書領左衛將軍専總朝政宗親並居顯要王公内外無不憚之南燕王超論宿豫之功封斛穀提等並為郡縣公桂林王鎮諌曰此數人者勤民頓兵為國結怨何功而封超怒不答尚書都令史王儼謟事五樓比歲屢遷官至左丞國人為之語曰欲得侯事五樓超又使公孫歸等冦濟南俘男女千餘人而去自彭城以南民皆堡聚以自固詔并州刺史劉道憐鎮淮隂以備之三月劉裕抗表伐南燕朝議皆以為不可惟左僕射孟昶車騎司馬謝裕參軍臧熹以為必克勸裕行裕以昶監中軍留府事謝裕安之兄孫也己巳劉裕發建康帥舟師自淮入泗五月至下邳留船艦輜重歩進至瑯邪所過皆築城留兵守之或謂裕曰燕人若塞大峴之險或堅壁清野大軍深入不惟無功将不能自歸奈何裕曰吾慮之熟矣鮮卑貪婪不知逺計進利虜獲退惜禾苖謂我孤軍逺入不能持久不過進據臨朐退守廣固必不能守險清野敢為諸君保之南燕主超聞有晉師引羣臣㑹議征虜将軍公孫五樓曰呉兵輕果利在速戰不可争鋒冝據大峴使不得入曠日延時沮其銳氣然後徐簡精騎二千循海而南絶其糧道别勅段暉帥兖州之衆縁山東下腹背擊之此上䇿也各命守宰依險自固校其資儲之外餘悉焚蕩芟除禾苗使敵無所資彼僑軍無食求戰不得旬月之間可以坐制此中䇿也縱賊入峴出城逆戰此下䇿也超曰今嵗星居齊以天道推之不戰自克客主勢殊以人事言之彼逺来疲弊勢不能久吾據五州之地擁富庶之民鐡騎萬羣麥禾布野奈何芟苗徙民先自蹙弱乎不如縱使入峴以精騎蹂之何憂不克輔國将軍廣寕王賀頼盧苦諌不從退謂五樓曰必若此亡無日矣太尉桂林王鎮曰陛下必以騎兵利平地者宜出峴逆戰戰而不勝猶可退守不宜縱敵入峴自棄險固也超不從鎮出謂韓􅒲曰主上既不能逆戰却敵又不肯徙民清野延敵入腹坐待攻圍酷似劉璋矣今年國滅吾必死之卿中華之士復為文身矣超聞之大怒收鎮下獄乃攝莒梁父二戍修城隍簡士馬以待之劉裕過大峴燕兵不出裕舉手指天喜形于色左右曰公未見敵而先喜何也裕曰兵已過險士有必死之志餘糧棲畝人無匱乏之憂虜已入吾掌中矣六月己巳裕至東莞超先遣公孫五樓賀頼盧及左将軍段暉等将歩騎五萬屯臨朐聞晉兵入峴自将歩騎四萬徃就之使五樓帥騎進據巨蔑水前鋒孟龍符與戰破之五樓退走裕以車四千乗為左右翼方軌徐進與燕兵戰于臨朐南日向昃勝負猶未决參軍胡藩言於裕曰燕悉兵出戰臨朐城中留守必寡願以竒兵從間道取其城此韓信所以破趙也裕遣藩及諮議參軍檀韶建威将軍河内向彌潛師出燕兵之後攻臨胊聲言輕兵自海道至矣向彌擐甲先登遂克之超大驚單騎就段暉於城南裕因縱兵奮擊燕衆大敗斬段暉等大将十餘人超遁還廣固獲其玉璽輦及豹尾裕乗勝逐北至廣固丙子克其大城超收衆入保小城裕築長圍守之圍髙三丈穿塹三重撫納降附采㧞賢俊華夷大恱於是因齊地糧儲悉停江淮漕運超遣尚書郎張綱乞師於秦赦桂林王鎮以為錄尚書都督中外諸軍事引見謝之且問計焉鎮曰百姓之心係於一人今陛下親董六師犇敗而還羣臣離心士民䘮氣聞秦人自有内患恐不暇分兵救人散卒還者尚有數萬宜悉出金帛以餌之更决一戰若天命助我必能破敵如其不然死亦為羙比於閉門待盡不猶愈乎司徒樂浪王惠曰不然晉兵乗勝氣勢百倍我以敗軍之卒當之不亦難乎秦雖與勃勃相持不足為患且與我分據中原勢如唇齒安得不来相救但不遣大臣則不能得重兵尚書令韓範為燕秦所重宜遣乞師超從之秋七月加劉裕北青冀二州刺史南燕尚書略陽桓尊及弟京兆太守苗踰城来降裕以為行參軍尊苗皆超所委任以為腹心者也或謂裕曰張綱有巧思若得綱使為攻具廣固必可拔也㑹綱自長安還太山太守申宣執之送於裕裕升綱於樓車使周城呼曰劉勃勃大破秦軍無兵相救城中莫不失色江南毎發兵及遣使者至廣固裕輙潛遣兵夜迎之明日張旗鳴鼓而至北方之民執兵負糧歸裕者日以千數圍城益急張華封愷皆為裕所獲超請割大峴以南地為藩臣裕不許秦王興遣使謂裕曰慕容氏相與鄰好今晉攻之急秦已遣鐡騎十萬屯洛陽晉軍不還當長驅而進裕呼秦使者謂曰語汝姚興我克燕之後息兵三年當取闗洛今能自送便可速来劉穆之聞有秦使馳入見裕而秦使者已去裕以所言告穆之穆之尤之曰常日事無大小必賜預謀此宜善詳云何遽爾答之此語不足以威敵適足以怒之若廣固未下𦍑冦奄至不審何以待之裕笑曰此是兵機非卿所觧故不相語耳夫兵貴神速彼若審能赴救必畏我知寕容先遣信命逆設此言是自張大之辭也晉師不出為日久矣𦍑見伐齊始将内懼自保不暇何能救人邪秋八月封融詣劉裕降初秦王興遣衛将軍姚彊帥歩騎一萬随韓範徃就姚紹於洛陽并兵以救南燕及為勃勃所敗追彊兵還長安韓範嘆曰天滅燕矣南燕尚書張俊自長安還降於劉裕因説裕曰燕人所恃者謂韓範必能致秦師也今得範以示之燕必降矣裕乃表範為散騎常侍且以書招之長水校尉王蒲勸範犇秦範曰劉裕起布衣滅桓𤣥復晉室今興師伐燕所向崩潰此殆天授非人力也燕亡則秦為之次矣吾不可以再辱遂降于裕裕将範循城城中人情離沮或勸燕主超誅範家超以範弟􅒲盡忠無貳并範家赦之冬十月段宏自魏犇于裕張綱為裕造攻具盡諸竒巧超怒縣綱母於城上支觧之冬十二月乙巳太白犯虚危南燕靈臺令張光勸南燕主超出降超手殺之六年春正月甲寅朔南燕主超登天門朝羣臣于城上乙卯超與寵姬魏夫人登城見晉兵之盛握手對泣韓􅒲諌曰陛下遭堙厄之運正當努力自彊以壯士民之志而更為兒女子泣邪超拭目謝之尚書令董銑勸超降超怒囚之二月南燕賀頼盧公孫五樓為地道出擊晉兵不能却城久閉城中男女病脚弱者大半出降者相繼超輦而登城尚書恱夀説超曰今天助冦為虐戰士彫瘁獨守窮城絶望外援天時人事亦可知矣茍厯数有終堯舜避位陛下豈可不思變通之計乎超嘆曰廢興命也吾寕奮劒而死不能銜璧而生丁亥劉裕悉衆攻城或曰今日徃亡不利行師裕曰我徃彼亡何為不利四靣急攻之恱夀開門納晉師超與左右數十騎踰城突圍出走追獲之裕數以不降之罪超神色自若一無所言惟以母託劉敬宣而已裕忿廣固久不下欲盡阬之以妻女賞将士韓範諌曰晉室南遷中原鼎沸士民無援彊者附之既為君臣必須為之盡力彼皆衣冠舊族先帝遺民今王師弔伐而盡阬之使安所歸乎竊恐西北之人無復来蘇之望矣裕改容謝之然猶斬王公以下三千人沒入家口萬餘夷其城隍送超詣建康斬之臣光曰晉自濟江以来威靈不競戎狄横騖虎噬中原劉裕始以王師翦平東夏不於此際旌賢俊慰撫疲民宣愷悌之風滌殘穢之政使羣士嚮風遺黎企踵而更恣行屠戮以快忿心迹其施設曽符姚之不如宜其不能混壹四海成羙大之業豈非雖有智勇而無仁義使之然哉劉裕滅後秦晉安帝元興元年秦王興立子泓為太子大赦泓孝友寛和喜文學善談詠而懦弱多病興欲以為嗣而狐疑不决久乃立之是嵗秦王興立昭儀張氏為皇后封子懿弼洸宣諶愔璞質逵裕國児皆為公義熈三年秦王興以太子泓錄尚書事七年秦廣平公弼有寵於秦王興為雍州刺史鎮安定姜紀謟附於弼勸弼結左右以求入朝興徴弼為尚書令侍中大将軍弼遂傾身結納朝士收采名藝以傾東宫國人惡之㑹興以西北多叛亂欲命重将鎮撫之隴東太守郭播請使弼出鎮興不從十年夏五月秦左将軍姚文宗有寵於太子泓廣平公弼惡之誣文宗有怨言秦王怒賜文宗死於是羣臣畏弼側目弼言於興無不從者以所親天水尹沖為給事黄門侍郎唐盛為治書侍御史興左右掌機要者皆其黨也右僕射梁喜侍中任謙京兆尹尹昭承間言於興曰父子之際人所難言然君臣之義不薄於父子故臣等不得黙然廣平公弼潛有奪嫡之志陛下寵之太過假其威權傾險無頼之徒輻湊附之道路皆言陛下将有廢立之計信有之乎興曰豈有此邪喜等曰茍無之則陛下愛弼適所以禍之願去其左右損其威權如此非特安弼乃所以安宗廟社稷興不應大司農竇温司徒左長史王弼皆密疏勸興立弼為太子興雖不從亦不責也興疾篤弼潛聚衆数千人謀作亂姚裕遣使以弼逆状告諸兄之在藩鎮者於是姚懿治兵于蒲阪鎮東将軍豫州牧洸治兵於洛陽平西将軍諶治兵於雍皆欲赴長安討弼㑹興疾瘳見羣臣征虜将軍劉𦍑泣以告興梁喜尹昭請誅弼且曰茍陛下不忍殺弼亦當奪其權任興不得已免弼尚書令使以将軍公還第懿等各罷兵懿洸諶與姚宣皆入朝使裕入白興求見興曰汝等正欲論弼事耳吾已知之裕曰弼茍有可論陛下所宜垂聼若懿等言非是便當寘之刑辟奈何逆拒之於是懿等引見於諮議堂宣流涕極言興曰吾自處之非汝曹所憂撫軍東曹屬姜虬上疏曰廣平公弼釁成逆著道路皆知之昔文王之化刑于寡妻今聖朝之亂起自愛子雖欲含忍掩蔽而逆黨扇惑不已弼之亂心何由可革宜斥散凶徒以絶禍端興以虬表示梁喜曰天下人皆以吾児為口實将何以處之喜曰信如虬言陛下早宜裁决興黙然十一年春三月秦廣平公弼譛姚宣於秦王興宣司馬權丕至長安興責以不能輔導将誅之丕懼誣宣罪惡以求自免興怒遣使就杏城收宣下獄命弼将三萬人鎮秦州尹昭曰廣平公與皇太子不平今握彊兵於外陛下一旦不諱社稷必危小不忍亂大謀陛下之謂也興不從秋九月秦王興藥動廣平公稱疾不朝聚兵於第興聞之怒收弼黨唐盛孫𤣥等殺之太子泓請曰臣不肖不能輯諧兄弟使至於此皆臣之罪也若臣死而國家安願賜臣死若陛下不忍殺臣乞退就藩興惻然憫之召姚讃梁喜尹昭歛曼嵬與之謀囚弼将殺之窮治黨與泓流涕固請乃并其黨赦之泓待弼如初無忿恨之色魏太史奏熒惑在匏𤓰中忽亡不知所在於法當入危亡之國先為童謡妖言然後行其禍罰魏主嗣召名儒十餘人使與太史議熒惑所詣崔浩對曰按春秋左氏傳神降于莘以其至之日推知其物庚午之夕辛未之朝天有隂雲熒惑之亡當在二日庚之與午皆主於秦辛為西夷今姚興據長安熒惑必入秦矣衆皆怒曰天上失星人間安知所詣浩笑而不應後八十餘日熒惑出東井留守盤旋久之乃去秦大旱昆明池竭童謠訛言國人不安間一嵗而秦亡衆乃服浩之精妙十二年春二月秦王興如華隂使太子泓監國入居西宫興疾篤還長安黄門侍郎尹沖謀因泓出迎而殺之興至泓将出迎宫臣諌曰主上疾篤姦臣在側殿下今出進不得見主上退有不測之禍泓曰臣子聞君父疾篤而端居不出何以自安對曰全身以安社稷孝之大者也泓乃止尚書姚沙彌謂尹沖曰太子不出迎宜奉乗輿幸廣平公第宿衛将士聞乗輿所在自當来集太子誰與守乎且吾屬以廣平公之故已䧟名逆節将何所自容今奉乗輿以舉事乃仗大順不惟救廣平之禍吾屬前罪亦盡雪矣沖以興死生未可知欲隨興入宫作亂不用沙彌之言興入宫命太子泓錄尚書事東平公紹及右衛将軍胡翼度典兵禁中防制内外遣殿中上将軍斂曼嵬收弼第中甲仗内之武庫興疾轉篤其妹南安長公主問疾不應幼子耕児出告其兄南陽公愔曰上已崩矣宜速决計愔即與尹沖帥甲士攻端門歛曼嵬胡翼度等勒兵閉門拒戰愔等遣壯士登門縁屋而入及於馬道泓侍疾在諮議堂太子右衛率姚和都帥東宫兵入屯馬道南愔等不得進遂燒端門興力疾臨前殿賜弼死禁兵見興喜躍争進赴賊賊衆驚擾和都以東宫兵自後擊之愔等大敗愔逃於驪山其黨建康公吕隆犇雍尹沖及弟泓来犇興引東平公紹及姚讃梁喜尹昭斂曼嵬入内寝受遺詔輔政明日興卒泓秘不發䘮捕南陽公愔及吕隆大将軍尹元等皆誅之乃發䘮即皇帝位大赦改元永和三月加太尉裕中外大都督裕戒嚴将伐秦詔加裕領司豫二州刺史以其世子義符為徐兖二州刺史琅邪王徳文請啟行戎路修敬山陵詔許之秋八月寧州獻琥珀枕於太尉裕裕以琥珀治金創得之大喜命碎𢷬分賜北征将士裕以世子義符為中軍将軍監太尉留府事劉穆之為左僕射領監軍中軍二府軍司入居東府總攝内外以大尉左司馬東海徐羡之為穆之之副左将軍朱齡石守衛殿省徐州刺史劉懐鎮守衛京師楊州别駕從事使張裕任留州事懐慎懐敬之弟也丁巳裕發建康遣龍驤将軍王鎮惡冠軍将軍檀道濟将歩軍自淮淝向許洛新野太守朱超石寧朔将軍胡藩趨陽城振武将軍沈田子建威将軍傅𢎞之趨武闗建武将軍沈林子彭城内史劉遵考将水軍出石門自汴入河以冀州刺史王仲徳督前鋒諸軍開鉅野入河遵考裕之族弟也劉穆之謂王鎮惡曰公今委卿以伐秦之任卿其勉之鎮惡曰吾不克闗中誓不復濟江裕既行青州刺史檀祗自廣陵帥衆至涂中掩討亡命劉穆之恐祗為變議欲遣軍時檀韶為江州刺史張邵曰今韶據中流道濟為軍首若有相疑之跡則大府立危不如逆遣慰勞以觀其意必無患也穆之乃止九月太尉裕至彭城加領徐州刺史以太原王𤣥謨為從事史王鎮惡檀道濟入秦境所向皆㨗秦将王苟生以漆丘降鎮惡徐州刺史姚掌以項城降道濟諸屯守皆望風欵附惟新蔡太守董遵不下道濟攻㧞其城執遵殺之進克許昌獲秦頴川太守姚垣及大将楊業沈林子自汴入河㐮邑人董神虎聚衆千餘人来降太尉裕㧞為參軍林子與神虎共攻倉垣克之秦兖州刺史韋華降神虎擅還㐮邑林子殺之秦東平公紹言於秦主泓曰晉兵已過許昌安定孤逺難以救衛宜遷其鎮戸内實京畿可得精兵十萬雖晉夏交侵猶不亡國不然晉攻豫州夏攻安定将若之何事機已至宜在速决左僕射梁喜曰齊公恢有威名為嶺北所憚鎮人已與勃勃深仇理應守死無貳勃勃終不能越安定逺冦京畿若無安定虜馬必至於郿今闗津兵足以拒晉無為豫削也泓從之吏部郎懿横密言於泓曰恢於廣平之難有忠勲於陛下自陛下龍飛紹統未有殊賞以答其意今外則致之死地内則不豫朝權安定人自以孤危逼冦思南遷者十室而九若恢擁精兵数萬鼓行而向京師得不為社稷之累乎宜徴還朝廷以慰其心泓曰恢若懐不逞之心徴之適所以速禍耳又不從王仲徳水軍入河将逼滑臺魏兖州刺史尉建畏懦帥衆棄城北渡河仲徳入滑臺宣言曰晉本欲以右帛七萬匹假道于魏不謂魏之守将棄城遽去魏主嗣聞之遣叔孫建公孫表自河内向祊頭因引兵濟河斬尉建于城下投尸于河呼仲徳軍人問以侵冦之状仲徳使司馬竺和之對曰劉太尉使王征虜自河入洛清掃山陵非敢為冦於魏也魏之守将自棄滑臺去王征虜借空城以息兵行當西引於晉魏之好無廢也何必揚旗鳴鼓以曜威乎嗣使建以問太尉裕裕遜辭謝之曰洛陽晉之舊都而𦍑據之晉欲修復山陵久矣諸桓宗族司馬休之國璠兄弟魯宗之父子皆晉之蠧也而𦍑收之以為晉患今晉将伐之欲假道於魏非敢為不利也魏河内鎮将于栗磾有勇名築壘于河上以備侵軼裕以書與之題曰黒矟公麾下栗磾好操黒矟以自標故裕以此目之司馬休之等犇秦事見劉裕篡晉冬十月秦陽城滎陽二城皆降晉兵進至成臯秦征南将軍陳留公洸鎮洛陽遣使求救於長安秦王泓遣越騎校尉閻生帥騎三千救之武衛将軍姚益男将歩卒一萬助守洛陽又遣并州牧姚懿南屯陜津為之聲援寕朔将軍趙𤣥言於洸曰今晉冦益深人情駭動衆寡不敵若出戰不㨗則大事去矣宜攝諸戍之兵固守金墉以待西師之救金墉不下晉必不敢越我而西是我不戰而坐收其弊也司馬姚禹隂與檀道濟通主簿閻恢楊䖍皆禹之黨也共嫉𤣥言於洸曰殿下以英武之略受任方靣今嬰城示弱得無為朝廷所責乎洸以為然乃遣趙𤣥将兵千餘南守栢谷塢廣武将軍石無諱東戍鞏城𤣥泣謂洸曰𤣥受三帝重恩所守正有死耳但明公不用忠臣之言為姦人所誤後必悔之既而成臯虎牢皆来降檀道濟等長驅而進無諱至石闗犇還龍驤司馬滎陽毛徳祖與𤣥戰於栢谷𤣥兵敗被十餘創據地大呼𤣥司馬蹇鑒冐刃抱𤣥而泣𤣥曰吾創已重君宜速去鑒曰将軍不濟鑒去安之與之皆死姚禹踰城犇道濟甲子道濟進逼洛陽丙寅洸出降道濟獲秦人四千餘人議者欲盡阬之以為京觀道濟曰伐罪弔民正在今日皆釋而遣之於是夷夏感恱歸之者甚衆閻生姚益男未至聞洛陽已沒不敢進己丑詔遣兼司空髙密王恢之修謁五陵置守衛太尉裕以冠軍将軍毛修之為河南河内二郡太守行司州事戍洛陽十一月西秦王熾磐遣使詣太尉裕求擊秦以自效裕拜熾磐平西将軍河南公秦姚懿司馬孫暢說懿使襲長安誅東平公紹廢秦主泓而代之懿以為然乃散榖以賜河北夷夏欲樹私恩左常侍張敞侍郎左雅諌曰殿下以母弟居方靣安危休戚與國同之今呉冦内侵四州傾沒西虜擾邉秦涼復敗朝廷之危有如累卵榖者國之本也而殿下無故散之虚損國儲将若之何懿怒笞殺之泓聞之召東平公紹密與之謀紹曰懿性識鄙淺從物推移造此謀者必孫暢也但馳使徴暢遣撫軍将軍讃據陕城臣向潼闗為諸軍節度若暢奉詔而至臣當遣懿帥河東見兵共禦晉師若不受詔命便當聲其罪而討之泓曰叔父之言社稷之計也乃遣姚讃及冠軍将軍司馬國璠建義将軍虵𤣥屯陕津武衛将軍姚驢屯潼闗懿遂舉兵稱帝傳檄州郡欲運匃奴堡榖以給鎮人寧東将軍姚成都拒之懿卑辭誘之送佩刀為誓成都不從懿遣驍騎将軍王國帥甲士数百攻成都成都擊禽之遣使譲懿曰明公以至親當重任國危不能救而更圖非望三祖之靈其肯佑明公乎成都将紏合義兵徃見明公於河上耳於是傳檄諸城諭以逆順徴兵調食以討懿懿亦發諸城兵莫有應者惟臨晉数千戸應懿成都引兵濟河擊臨晉叛者破之鎮人安定郭純等起兵圍懿東平公紹入蒲阪執懿誅孫暢等十三年春正月秦主泓朝㑹百官於前殿以内外危廹君臣相泣征北将軍齊公恢帥安定鎮戸三萬八千焚廬舍自北雍州趨長安自稱大都督建義大将軍移檄州郡欲除君側之惡楊威将軍姜紀帥衆歸之建節将軍彭完都棄隂密犇還長安恢至新支姜紀説恢曰國家重将大兵皆在東方京師空虚公亟引輕兵襲之必克恢不從南攻郿城鎮西将軍姚諶為恢所敗長安大震泓馳使徴東平公紹遣姚裕及輔國将軍胡翼度屯灃西扶風太守姚雋等皆降于恢東平公紹引諸軍西還與恢相持于靈臺姚讃留寕朔将軍尹雅為𢎞農太守守潼闗亦引兵還恢衆見諸軍四集皆有懼心其将齊黄等詣大軍降恢進兵逼紹讃自後擊之恢兵大敗殺恢及其三弟泓哭之慟葬以公禮太尉裕引水軍發彭城留其子彭城公義隆鎮彭城詔以義隆為監徐兖青冀四州諸軍事秦州刺史二月王鎮惡進軍澠池遣毛徳祖襲尹雅於蠡吾城禽之雅殺守者而逃鎮惡引兵徑前抵潼闗檀道濟沈林子自陕北渡河拔襄邑堡秦河北太守薛帛犇河東又攻秦并州刺史尹昭於蒲阪不克别将攻匈奴堡為姚成都所敗辛酉滎陽守将傳洪以虎牢降魏秦主泓以東平公紹為太宰大将軍都督中外諸軍事假黄鉞改封魯公使督武衛将軍姚鸞等歩騎五萬守潼闗又遣别将姚驢救蒲阪沈林子謂檀道濟曰蒲阪城堅兵多不可猝拔攻之傷衆守之引日王鎮惡在潼闗勢孤力弱不如與鎮惡合勢并力以争潼關若得之尹昭不攻自潰矣道濟從之三月道濟林子至潼關秦魯公紹引兵出戰道濟林子奮擊大破之斬獲以千数紹退屯定城據險拒守謂諸将曰道濟等兵力不多懸軍深入不過堅壁以待繼援吾分軍絶其糧道可坐禽也乃遣姚鸞屯大路以絶道濟糧道鸞遣尹雅将兵與晉戰於關南為晉兵所獲将殺之雅曰雅前日已當死幸得脫至今死固甘心然夷夏雖殊君臣之義一也晉以大義行師獨不使秦有守節之臣乎乃免之丙子夜沈林子将銳卒襲鸞營斬鸞殺其士卒數千人紹又遣東平公讃屯河上以㫁水道沈林子擊之讃敗走還定城薛帛據河曲来降太尉裕将水軍自淮泗入清河将泝河西先遣使假道於魏秦王泓亦遣使求救於魏魏主嗣使羣臣議之皆曰潼關天險劉裕以水軍攻之甚難若登岸北侵其勢便易裕聲言伐秦其志難測且秦㛰姻之國不可不救也宜發兵㫁河上流勿使得西慱士祭酒崔浩曰裕圗秦久矣今姚興死子泓懦劣國多内難裕承其危而伐之其志必取若遏其上流裕心忿戾必上岸北侵是我代秦受敵也今柔然寇邊民食又乏若復與裕為敵發兵南赴則北冦愈深救北則南州復危非良計也不若假之水道聼裕西上然後屯兵以塞其東使裕克㨗必徳我之假道不㨗吾不失救秦之名此䇿之得者也且南北異俗借使國家棄恒山以南裕必不能以呉越之兵與吾争守河北之地安能為吾患乎夫為國計者惟社稷是利豈顧一女子乎議者猶曰裕西入關則恐吾㫁其後腹背受敵北上則姚氏必不出闗助我其勢必聲西而實北也嗣乃以司徒長孫嵩督山東諸軍事又遣振威将軍娥清冀州刺史阿薄千将歩騎十萬屯河北岸庚辰裕引軍入河以左将軍向彌為北青州刺史留戍碻磝初裕命王鎮惡等若克洛陽須大軍到進鎮惡等乗利徑趨潼關為秦兵所拒不得前久之乏食衆心疑懼或欲棄輜重還赴大軍沈林子按劒怒曰相公志清六合今許洛已定闗右将平事之濟否繫於前鋒奈何沮乗勝之氣棄垂成之功乎且大軍尚逺賊衆方盛雖欲求還豈可得乎下官授命不顧今日之事當自為将軍辦之未知二三君子将何靣以見相公之旗鼓邪鎮惡等遣使馳告裕求遣糧援裕呼使者開舫北戸指河上魏軍以示之曰我語令勿進今輕佻深入岸上如此何由得遣軍鎮惡乃親至𢎞農説諭百姓百姓競送義租軍食復振魏人以数千騎縁河随裕軍西行軍人於南岸牽百丈風水迅急有漂渡北岸者輙為魏人所殺略裕遣軍擊之裁登岸則走退則復来夏四月裕遣白直隊主丁旿帥仗士七百人車百乗渡北岸去水百餘歩為却月陣兩端抱河車置七仗士事畢使豎一白既魏人不觧其意皆未動裕先命寧朔将軍朱超石戒嚴白眊既舉超石帥二千人馳徃赴之齎大弩百張一車益二十人設彭排於轅上魏人見營陣旣立乃進圍之長孫嵩帥三萬騎助之四靣肉薄攻營弩不能制時超石别齎大鎚及矟千餘張乃㫁矟長三四尺以鎚鎚之一矟輙洞貫三四人魏兵不能當一時犇潰死者相積臨陣斬阿薄干魏人退還畔城超石帥寕朔将軍胡藩寕逺将軍劉榮祖追擊又破之殺獲千計魏主嗣聞之乃恨不用崔浩之言秦魯公紹遣長史姚洽寧朔将軍安鸞䕶軍姚墨蠡河東太守唐小方帥衆三千屯河北之九原阻河為固欲以絶檀道濟糧援沈林子邀擊破之斬洽墨蠡小方殺獲殆盡林子因啓大尉裕曰紹氣葢關中今兵屈于外國危于内恐其凶命先盡不得以膏齊斧耳紹聞洽等敗死憤恚嘔血以兵屬東平公讃而卒讃既代紹衆力猶盛引兵襲林子復擊破之太尉裕至洛陽行視城塹嘉毛修之完葺之功賜衣服玩好直二千萬秋七月太尉裕至陜沈田子傅𢎞之入武關秦戍将皆委城走田子等進屯青泥秦主泓使給事黄門侍郎姚和都屯嶢栁以拒之大尉裕至閺鄉沈田子等将攻嶢栁秦主泓欲自将以禦裕軍恐田子等襲其後先擊滅田子等然後傾國東出乃帥歩騎数萬奄至青泥田子本為疑兵所領裁千餘人聞泓至欲擊之傅𢎞之以衆寡不敵止之田子曰兵貴用竒不必在衆且今衆寡相懸勢不兩立若彼結圍既固則我無所逃矣不如乗其始至營陣未立先薄之可以有功遂帥所領先進𢎞之繼之秦兵合圍数重田子撫慰士卒曰諸君冐險逺來正求今日之戰死生一决封侯之業於此在矣士卒皆踴躍鼓譟執短兵奮擊秦兵大敗折馘萬餘級得其乗輿服御物秦主泓犇還㶚上初裕以田子等衆少遣沈林子将兵自秦嶺徃助之至則秦兵已敗乃相與追之關中郡縣多潜送欵於田子辛丑太尉裕至潼關以朱超石為河東太守使與振武将軍徐猗之㑹薛帛於河北共攻蒲阪秦平原公璞與姚和都共擊之猗之敗死超石犇還潼關東平公讃遣司馬國璠引魏兵以躡裕後王鎮惡請帥水軍自河入渭以趨長安裕許之秦恢武将軍姚難自香城引兵而西鎮惡追之秦主泓自㶚上引兵還屯石橋以為之援鎮北将軍姚疆與難合兵屯涇上以拒鎮惡鎮惡使毛徳祖進擊破之疆死難犇長安東平公讃退屯鄭城太尉裕進軍逼之泓使姚丕守渭橋胡翼度屯石積東平公讃屯㶚東泓屯逍遙園鎮惡泝渭而上乗蒙衝小艦行船者皆在艦内秦人見艦進而無行船者皆驚以為神壬戌旦鎮惡至渭橋令軍士食畢皆持仗登岸後登者斬衆既登渭水迅急艦皆随流倐忽不知所在時泓所将尚数萬人鎮惡諭士卒曰吾屬並家在江南此為長安北門去家萬里舟楫衣糧皆已随流今進戰而勝則功名俱顯不勝則骸骨不返無它岐矣卿等勉之乃身先士卒衆騰踊争進大破姚丕於渭橋泓引兵救之為丕敗卒所蹂踐不戰而潰姚諶等皆死泓單馬還宫鎮惡入自平朔門泓與姚裕等数百騎逃犇石橋東平公讃聞泓敗引兵赴之衆皆潰去胡翼度降於太尉裕泓将出降其子佛念年十一言於泓曰晉人将逞其欲雖降必不免不如引决泓憮然不應佛念登宫牆自投而死癸亥泓将妻子羣臣詣鎮惡壘門請降鎮惡以屬吏城中夷晉六萬餘戸鎮惡以國恩撫慰號令嚴肅百姓安堵九月太尉裕至長安鎮惡迎於㶚上裕勞之曰成吾覇業者卿也鎮惡再拜謝曰明公之威諸将之力鎮惡何功之有裕笑曰卿欲學馮異邪鎮惡性貪秦府庫盈積鎮惡盗取不可勝紀裕以其功大不問或譛諸裕曰鎮惡藏姚泓偽輦将有異志裕使人覘之鎮惡剔取其金銀棄輦於垣側裕意乃安裕收秦彛器渾儀土圭記里鼓指南車送詣建康其餘金玊繒帛珍寳皆以頒賜将士秦平原公璞并州刺史尹昭以蒲阪降東平公讃帥宗族百餘人詣裕降裕皆殺之送姚泓至建康斬於市裕以薛辯為平陽太守使鎮捍北道裕議遷都洛陽諮議參軍王仲徳曰非常之事固非常人所及必致駭動今暴師日久士卒思歸遷都之計未可議也裕乃止𦍑衆十萬萬口西犇隴上沈林子追擊至槐里俘虜萬計初夏王勃勃聞太尉裕伐秦謂羣臣曰姚泓非裕敵也且其兄弟内叛安能拒人裕取關中必矣然裕不能久留必将南歸留子弟及諸将守之吾取之如拾芥耳乃秣馬礪兵訓飬士卒進據安定秦嶺北郡縣鎮戍皆降之裕遣使遺勃勃書約為兄弟勃勃使中書侍郎皇甫徽為報書而隂誦之對裕使者口授舍人使書之裕讀其文嘆曰吾不如也冬十一月辛未劉穆之卒太尉裕聞之驚慟哀惋者累日始裕欲留長安經略西北而諸将佐皆久役思歸多不欲留㑹穆之卒裕以根本無托遂决意東還穆之之卒也朝廷恇懼欲發詔以太尉左司馬徐羡之代之中軍諮議參軍張邵曰今誠急病任終在徐然世子無専命宜須諮之裕欲以王𢎞代穆之從事中郎謝晦曰休元輕易不若羡之乃以羡之為吏部尚書建威将軍丹陽尹代管留任於是朝廷大事常决於穆之者並悉北諮裕以次子桂陽公義真為都督雍梁秦三州諸軍事安西将軍領雍東秦二州刺史義真時年十二以太尉諮議參軍京兆王修為長史王鎮惡為司馬領馮翼太守沈田子毛徳祖皆為中兵參軍仍以田子領始平太守徳祖領秦州刺史天水太守傅𢎞之為雍州治中從事史先是隴上流戸寓關中者望因兵威得復本土及置東秦州知裕無復西略之意皆嘆息失望裕之克長安王鎮惡功為多由是南人皆忌之沈田子自以嶢栁之㨗與鎮惡争功不平裕将還田子及傅𢎞之屡言於裕曰鎮惡家在關中不可保信裕曰今留卿文武将士精兵萬人彼若欲為不善正足自滅且勿復多言裕私謂田子曰鍾㑹不得遂其亂者以有衛瓘故也語曰猛獸不如羣狐卿等十餘人何懼王鎮惡臣光曰古人有言疑則勿任任則勿疑裕既委鎮惡以關中而復與田子有後言是鬬之使為亂也惜乎百年之冦千里之土得之艱難失之造次使豐鄗之都復輸寇手荀子曰兼并易能也堅凝之難信哉三秦父老聞裕将還詣門流涕訴曰殘民不霑王化於今百年始覩衣冠人人相賀長安十陵是公家墳墓咸陽宫殿是公家室宅捨此欲何之乎裕為之愍然慰諭之曰受命朝廷不得擅留誠多諸君懐本之志今以次息與文武賢才共鎮此境勉與之居十二月庚子裕發長安自洛入河開汴渠以歸閏月夏王勃勃聞太尉裕東還大喜問於王買徳曰朕欲取關中卿試言其𤣥略買徳曰關中形勝之地而裕以幼子守之狼狽而歸正欲急成篡事耳不暇復以中原為意此天以關中賜我不可失也青泥上洛南北之險要宜先遣逰軍㫁之東塞潼闗絶其水陸之路然後傳檄三輔施以威徳則義真在網罟之中不足取也勃勃乃以其子撫軍大将軍璝都督前鋒諸軍事帥騎二萬向長安前将軍昌屯潼闗以買徳為撫軍右長史屯青泥勃勃将大軍為後繼十四年春正月夏赫連璝至渭陽關中民降之者屬路龍驤将軍沈田子将兵拒之畏其衆盛退屯劉廻堡遣使還報王鎮惡謂王修曰公以十嵗児付吾屬當共思竭力而擁兵不進虜何由得乎使者還以告田子田子與鎮惡素有相圖之志由是益忿懼未幾鎮惡與田子俱出北地以拒夏兵軍中訛言鎮惡欲盡殺南人以数十人送義真南還因據關中反辛亥田子請鎮惡至傅𢎞之營計事田子求屏人語使其宗人沈敬仁斬之幕下矯稱受太尉令誅之𢎞之犇告劉義真義真與王修被甲登黄門以察其變俄而田子帥数十人来至言鎮惡反修執田子數以専戮斬之以冠軍将軍毛修之代鎮惡為安西司馬傅𢎞之大破赫連璝於池陽又破之於寡婦渡斬獲甚衆夏兵乃退壬戌太尉裕至彭城觧嚴琅邪王徳文先歸建康裕聞王鎮惡死表言沈田子忽發狂易奄害忠勲追贈左将軍青州刺史以彭城内史劉遵考為并州刺史領河東太守鎮蒲阪徴荆州刺史劉道憐為徐兖二州刺史裕欲以世子義符鎮荆州以徐州刺史劉義隆為司州刺史鎮洛陽中軍諮議張邵諌曰儲貳之重四海所繫不宜處外乃更以義隆為都督荆益寕雍梁秦六州諸軍事西中郎将荆州刺史以南郡太守到彦之為南蠻校尉張邵為司馬領南郡相冠軍功曹王曇首為長史北徐州從事王華為西中郎主簿沈林子為西中郎參軍義隆尚幼府事皆决於邵曇首𢎞之弟也裕謂義隆曰王曇首沉毅有器度宰相才也汝毎事諮之以南郡公劉義慶為豫州刺史義慶道憐之子也裕觧司州領徐冀二州刺史冬十月劉義真年少賜與左右無節王修每裁抑之左右皆怨譛修於義真曰王鎮惡欲反故沈田子殺之修殺田子是亦欲反也義真信之使左右劉乞等殺修修既死人情離駭莫相統壹義真悉召外軍入長安閉門拒守關中郡縣悉降于夏赫連璝夜襲長安不克夏王勃勃進據咸陽長安樵采路絶宋公裕聞之使輔國将軍蒯恩如長安召義真東歸以相國右司馬朱齡石為都督關中諸軍事右将軍雍州刺史代鎮長安裕謂齡石曰卿至可敕義真輕装速發既出關然後可徐行若關右必不可守可與義真俱歸又命中書侍郎朱超石慰勞河洛十一月齡石至長安義真将士貪縱大掠而東多載寳貨子女方軌徐行雍州别駕韋華犇夏赫連璝帥衆三萬追義真建威将軍傅𢎞之曰公處分亟進今多将輜重一日行不過十里虜追騎且至何以待之宜棄車輕行乃可以免義真不從俄而夏兵大至傅𢎞之蒯恩㫁後力戰連日至青泥晉兵大敗𢎞之恩皆為王買徳所禽司馬毛修之與義真相失亦為夏兵所禽義真行在前㑹日暮夏兵不窮追故得免左右盡散獨逃草中中兵參軍叚宏單騎追尋縁道呼之義真識其聲出就之曰君非段中兵邪身在此行矣必不兩全可刎身頭以南使家公望絶宏泣曰死生共之下官不忍乃束義真於背單馬而歸義真謂宏曰今日之事誠無筭略然丈夫不經此何以知艱難夏王勃勃欲降傅𢎞之𢎞之不屈時天寒勃勃祼之𢎞之呌罵而死勃勃積人頭為京觀號曰髑髏臺長安百姓逐朱齡石齡石焚其宫殿犇潼關勃勃入長安大饗将士舉觴謂買徳曰卿徃日之言一朞而驗可謂筭無遺䇿此觴所集非卿而誰以買徳為都官尚書封河陽侯龍驤将軍王敬先戍曹公壘齡石徃從之朱超石至蒲阪聞齡石所在亦徃從之赫連昌攻敬先壘㫁其水道衆渇不能戰城且䧟齡石謂超石曰弟兄俱死異域使老親何以為心爾求間道亡歸我死此無恨矣超石持兄泣曰人誰不死寕忍今日辭兄去乎遂與敬先及右軍參軍劉欽之皆被執送長安勃勃殺之欽之弟秀之悲泣不歡燕者十年欽之穆之之從兄子也宋公裕聞青泥敗未知義真存亡怒甚刻日北伐侍中謝晦諌以士卒疲弊請俟它年不從鄭鮮之上表以為虜聞殿下親征必併力守潼關徑徃攻之恐未易可克若輿駕頓洛則不足上勞聖躬且虜雖得志不敢乗勝過陜者猶懾服大威為将来之慮故也若造洛而返虜必更有揣量之心或益生邊患况大軍逺出後患甚多昔嵗西征劉鍾狼狽去年北討廣州傾覆既徃之效後来之鑒也今諸州大水民食寡乏三呉羣盗攻沒諸縣皆由困於征役故也江南士庶引領顒顒以望殿下之返斾聞更北出不測淺深之謀徃還之期臣恐返顧之憂更在腹心也若慮西虜更為河洛之患者宜結好北虜北虜親則河南安河南安則濟泗静矣㑹得段宏啓知義真得免裕乃止但登城北望慨然流涕而已降義真為建威将軍司州刺史以段宏為宋臺黄門郎領太子右衛率裕以天水太守毛徳祖為河東太守代劉遵考守蒲阪通鑑紀事本末卷十八上欽定四庫全書通鑑紀事本末卷十八下宋袁樞撰赫連據朔方晉安帝義熈三年初魏王珪滅劉衛辰其子勃勃犇秦秦髙平公沒奕干以女妻之勃勃魁岸羙容儀性辯慧秦王興見而竒之與論軍國大事寵遇踰於勲舊興弟邕諌曰勃勃不可近也興曰勃勃有濟世之才吾方與之平天下奈何逆忌之乃以為安逺將軍使助沒弈干鎮髙平以三城朔方雜夷及衛辰部衆三萬配之使伺魏間隙邕固争以為不可興曰卿何以知其為人邕曰勃勃奉上慢御衆殘貪猾不仁輕為去就寵之踰分恐終為邊患興乃止久之竟以勃勃為安北將軍五原公配以三交五部鮮卑及雜虜二萬餘落鎮朔方魏主珪歸所虜秦將唐小方于秦秦王興請歸賀狄干仍送良馬千匹以贖狄伯支珪許之勃勃聞秦復與魏通而怒乃謀叛秦柔然可汗社崘獻馬八千匹於秦至大城勃勃掠取之悉集其衆三萬餘人偽畋於髙平川因襲殺沒奕干而并其衆勃勃自謂夏后氏之苗裔六月自稱大夏天王大單于大赦改元龍升置百官初魏主珪遣北部大人賀狄干獻馬千匹求昏於秦秦王興止狄千而絶其昬於是秦魏有隙秦王興遣尚書右僕射狄伯支等伐魏魏主珪自將大軍擊之敗狄伯支及趙騎校尉唐小方等冬十月夏王勃勃破鮮卑薛干等三部降其衆以萬數進攻秦三城已北諸戍斬秦將楊丕姚石生等諸將皆曰陛下欲經營關中宜先固根本使人心有所慿係髙平山川險固土田饒沃可以定都勃勃曰卿知其一未知其二吾大業草創士衆未多姚興亦一時之雄諸將用命關中未可圗也我今専固一城彼必并力於我衆非其敵亡可立待不如以驍騎風馳出其不意救前則擊後救後則擊前使彼疲於奔命我則㳺食自若不及十年嶺北河東盡為我有待興既死嗣子闇弱徐取長安在吾計中矣於是侵掠嶺北嶺北諸城門不晝啓興乃嘆曰吾不用黄兒之言以至于此十一月勃勃又敗秦將張佛生于青石原俘斬五千餘人四年夏五月秦王興使左僕射齊難帥騎二萬討勃勃秋七月夏王勃勃聞秦兵且至退保河曲齊難以勃勃既逺縱兵野掠勃勃潛師襲之俘斬七千餘人難引兵退走勃勃追至木城禽之虜其將士萬三千人於是嶺北夷夏附於勃勃者以萬數勃勃皆置守宰以撫之五年春正月秦王興遣其弟平北將軍沖征虜將軍狄伯支等帥騎四萬擊夏王勃勃沖至嶺北謀還襲長安伯支不從而止酖殺伯支以滅口夏四月夏王勃勃帥騎二萬攻秦掠取平涼雜胡七千餘戸進屯依力川秋九月秦王興自將擊夏王勃勃至貳城遣安逺將軍姚詳等分督租運勃勃乗虚奄至興懼欲輕騎就詳等右僕射韋華曰若鑾輿一動衆心駭懼必不戰自潰詳營亦未必可至也興與勃勃戰秦兵大敗將軍姚榆生為勃勃所禽左將軍姚文宗等力戰勃勃乃退興還長安勃勃復攻秦敕竒堡黄石固我羅城皆㧞之徙七千餘家於大城以其丞相右地代領幽州牧以鎮之六年春三月夏王勃勃遣尚書胡金纂攻平涼秦王興救平涼擊金纂殺之勃勃又遣兄子左將軍羅提攻㧞定陽阬將士四千餘人秦將曹熾曹雲王肆佛等各千戸内徙興處之湟山及陳倉勃勃寇隴右破白崖堡遂趣清水略陽太守姚夀都棄城走勃勃徙其民萬六千戸於大城興自安定追之至夀渠川不及而還七年春正月秦姚詳屯杏城為夏王勃勃所逼南犇大蘓勃勃遣平東將軍鹿奕干追斬之盡俘其衆勃勃南攻安定破尚書楊佛嵩于青石北原降其衆四萬五千進攻東鄉下之徙三千餘戸于貳城秦鎮北參軍王買徳犇夏夏王勃勃問以滅秦之䇿買徳曰秦徳雖衰藩鎮猶固願且蓄力以待之勃勃以買徳為軍師中郎將秦王興遣衛大將軍常山公顯迎姚詳弗及遂屯杏城八年冬十月秦王興以楊佛嵩為雍州刺史帥嶺北見兵以擊夏行數日興謂羣臣曰佛嵩每見敵勇不自制吾常節其兵不過五千人今所將既多遇敵必敗行已逺追之無及將若之何佛嵩與夏王勃勃戰果敗為勃勃所執絶亢而死九年春三月夏王勃勃大赦改元鳳翔以叱干阿利領將作大匠發嶺北夷夏十萬人築都城於朔方水北黒水之南勃勃曰朕方統一天下君臨萬邦宜名新城曰統萬阿利性巧而殘忍蒸土築城錐入一寸即殺作者而并築之勃勃以為忠委任之凡造兵器成呈之工人必有死者射甲不入則斬弓人入則斬甲匠又鑄為一大鼓飛亷翁仲銅鉈龍虎之屬飾以黄金列於宫殿之前凡殺工匠数千由是器物皆精利勃勃自謂其祖從母姓為劉非禮也古人氏族無常乃改姓赫連氏言帝王係天為子其徽赫與天連也其非正統者皆以鐡伐為氏言其剛銳如鐡皆堪伐人也十一年春三月夏王勃勃攻秦杏城㧞之執守將姚逵阬士卒二萬人秦王興如北地遣廣平公弼及輔國將軍斂曼嵬向新平興還長安秋九月夏赫連建將兵擊秦執平涼太守姚周都遂入新平廣平公弼與戰於龍尾堡禽之十二年春正月秦王興卒太子泓即皇帝位大赦改元永和夏六月夏王勃勃帥騎四萬襲上邽未至嵩與盛戰於竹嶺敗死勃勃攻上邽二旬克之殺秦州刺史姚軍都及將士五千餘人因毁其城進攻隂密又殺秦将姚良子及將士萬餘人以其子昌為雍州刺史鎮隂密征北將軍姚恢棄安定奔還長安安定人胡儼等帥戸五萬據城降於夏勃勃使鎮東將軍羊茍兒將鮮卑五千鎮安定進攻秦鎮西將軍姚諶于雍城諶委鎮犇長安勃勃據雍進掠郿城秦東平公紹及征虜將軍尹昭等將步騎五萬擊之勃勃退趨安定胡儼閉門拒之殺羊茍兒及所將鮮卑復以安定降秦紹進擊勃勃於馬鞍阪破之追至朝那不及而還勃勃歸杏城楊盛復遣兄子倦擊秦至陳倉秦歛曼嵬擊却之夏王勃勃復遣兄子提南侵泄陽秦車騎將軍姚裕等擊却之十三年夏王勃勃聞太尉裕伐秦乃進據安定秦嶺北郡縣鎮戍皆降之太尉裕克秦東還留次子桂陽公義真為都督夏王勃勃聞太尉裕東還乃以其子撫軍大將軍璝都督前鋒諸軍事帥騎二萬向長安十四年夏赫連璝至渭龍驤將軍沈田子將兵拒之田子殺王鎮惡王修執田子斬之以冠軍將軍毛修之代鎮惡傅𢎞之大破慕容璝夏兵乃退劉義真召外軍入長安關中郡縣悉降于夏夏王勃勃進據咸陽宋公裕召義真東歸以相國右司馬朱齡石代鎮長安義真將士大掠而東赫連璝帥衆追之傅𢎞之等力戰晉兵大敗夏兵不窮追故得免長安百姓逐朱齡石齡石犇潼關勃勃入長安五事并見劉裕滅後秦夏王勃勃築壇于灞上即皇帝位改元昌武恭帝元熈元年春二月夏羣臣請都長安勃勃曰朕豈不知長安厯世帝王之都沃饒險固然晉人僻逺終不能為吾患魏與我風俗略同土壌隣接自統萬距魏境裁百餘里朕在長安統萬必危若在統萬魏必不敢濟河而西諸卿適未見此耳皆曰非所及也乃於長安置南臺以赫連璝領大将軍雍州牧錄南臺尚書事勃勃還統萬大赦改元真興勃勃性驕虐視民如草芥常居城上置弓劒於側有所嫌忿手自殺之羣臣迕視者鑿其目笑者決其唇諌者先截其舌然後斬之魏滅北燕晉安帝義熈十年秋八月辛丑魏主嗣遣謁者于什門使於燕于什門至和龍不肯入見曰大魏皇帝有詔須馮王出受然後敢入燕王跋使人牽逼令入什門見跋不拜跋使人按其項什門曰馮王拜受詔吾自以賔主致敬何苦見逼邪跋怒留什門不遣什門數衆辱之左右請殺之跋曰彼各為其主耳乃幽執什門欲降之什門終不降久之衣冠弊壊略盡蟣虱流溢跋遺之衣冠什門皆不受十四年初和龍有赤氣四塞蔽日自寅至申燕太史令張穆言於燕王跋曰此兵氣也今魏方彊盛而執其使者好命不通臣竊懼焉跋曰吾方思之五月魏主嗣東廵至濡源及甘松遣征東將軍長孫道生安東將軍李先給事黄門侍郎奚觀帥精騎二萬襲燕又命驍騎將軍延普幽州刺史尉諾自幽州引兵趨遼西為之聲勢嗣屯突門嶺以得之道生等拔乙連城進攻和龍與燕單于右輔古泥戰破之殺其將皇甫軌燕王跋嬰城自守魏人攻之不克掠其民萬餘家而還宋文帝元嘉三年秋八月燕太子永卒立次子翼為太子七年秋八月燕太祖寝疾召中書監申秀侍中陽哲於内殿屬以後事九月病甚輦而臨軒命太子翼攝國事勒兵聼政以備非常宋夫人欲立其子受居惡翼聼政謂翼曰上疾將瘳奈何遽欲代父臨天下乎翼性仁弱遂還東宫日三往省疾宋夫人矯詔絶内外遣閽寺傳問而已翼及諸子大臣並不得見唯中給事胡福獨得出入専掌禁衛福慮宋夫人遂成其謀乃言於司徒錄尚書事中山公𢎞𢎞與壮士數十人被甲入禁中宿衛皆不戰而散宋夫人命閉東閤𢎞家僮庫斗頭勁㨗有勇力踰閤而入至于皇堂射殺女御一人太祖驚懼而殂𢎞遂即天王位遣人廵城告曰天降凶禍大行崩背太子不侍疾羣公不犇䘮疑有逆謀社稷將危吾備介弟之親遂攝大位以寕國家百官叩門入者進階二等太子翼帥東宫兵出戰而敗兵皆潰去𢎞遣使賜翼死太祖有子百餘人𢎞皆殺之諡太祖曰文成皇帝葬長谷陵九年春正月立慕容后之子王仁為太子夏五月魏主治兵於南郊謀伐燕六月庚寅魏主伐燕命太子晃錄尚書事時晃纔五嵗秋七月己未魏主之濡水庚申遣安東將軍奚斤發幽州民及密雲丁零萬餘人運攻具出南道㑹和龍魏主至遼西燕王遣其侍御史崔聘奉牛酒犒師己巳魏主至和龍燕石城太守李崇等十郡降於魏魏發其民三萬穿圍塹以守和龍崇績之子也八月燕王使數萬人出戰魏昌黎公丘等擊破之死者萬餘人燕尚書髙紹帥萬餘家保羌胡固辛巳魏主攻紹斬之平東將軍賀多羅攻帶方撫軍大將軍永昌王健攻建徳驃騎大將軍樂平王丕攻冀陽皆拔之九月乙卯魏主引兵西還徙營丘成周遼東樂浪帶方𤣥菟六郡民三萬家於幽州燕尚書郭淵勸燕王送欵獻女於魏乞為附庸燕王曰負亹在前結忿已深降附取死不如守志更圖也魏主之圍和龍也宿衛之士多在戰陳行宫人少雲中鎮將朱修之謀與南人襲殺魏主因入和龍浮海南歸以告冠軍將軍毛修之毛修之不從乃止既而事泄朱修之逃奔燕魏人數伐燕燕王遣修之南歸求救修之汎海至東萊遂還建康拜黄門侍郎初燕王嫡妃王氏生長樂公崇崇於兄弟為最長及即位立慕容氏為皇后王氏不得立又黜崇使鎮肥如崇母弟廣平公朗樂陵公邈相謂曰今國家将亡人無愚智皆知之王復受慕容后之譛吾兄弟死無日矣乃相與亡犇遼西說崇使降魏崇從之㑹魏主使給事郎王徳招崇十二月己丑崇使邈如魏請舉邵降燕王聞之使其將封羽圍崇於遼西十年春正月乙卯魏主遣永昌王健督諸軍救遼西二月庚午魏主以馮崇為都督幽平東夷諸軍事車騎大將軍幽平二州牧封遼西王錄其國尚書事食遼西十郡承制假授尚書刺史征虜已下官夏六月魏永昌王健左僕射安原督諸軍擊和龍將軍樓勃将五千騎圍凡城燕守将封羽以凡城降收其三千餘家而還秋八月馮崇上表請說降其父魏主不聼十一年春正月戊戌燕王遣使請和於魏魏主不許閏三月辛巳燕王遣尚書髙顒上表稱藩請罪于魏乞以季女充掖庭魏主乃許之徴其太子王仁入朝燕王送魏使者于什門還平城什門在燕二十一年不屈節魏主下詔褒稱以比蘓武拜治書御史夏六月燕王不遣太子質魏散騎常侍劉滋諌曰昔劉禪有重山之險孫皓有長江之阻皆為晉擒何則彊弱之勢異也今吾弱於呉蜀而魏彊於晉不從其欲将有危亡之禍願亟遣太子而修政事撫百姓收離散賑飢窮勸農桑省賦役社稷猶庶幾可保燕王怒殺之辛亥魏主遣撫軍大将軍永昌王健等伐燕收其禾稼徙民而還十二年春正月燕王數為魏所攻遣使詣建康稱藩奉貢癸酉詔封為燕王江南謂之黄龍國三月癸亥燕王遣大将湯燭入貢於魏辭以太子王仁有疾故未之遣夏六月戊申魏主命驃騎大将軍樂平王丕鎮東大将軍徒河屈垣等帥騎四萬伐燕秋七月己卯魏樂平王丕等至和龍燕王以牛酒犒軍獻甲三千屈垣責其不送侍子掠男女六千口而還冬十一月魏人數伐燕燕日危蹙上下憂懼太常楊㟭復勸燕王速遣太子入侍燕王曰吾未忍為此若事急且東依髙麗以圖後舉㟭曰魏舉天下以擊一隅理無不克髙麗無信始雖相親終恐為變燕王不聼密遣尚書陽伊請迎於髙麗十三年春二月戊子燕王遣使入貢於魏請送侍子魏主不許将舉兵討之壬辰遣使者十餘軰詣東方髙麗等諸國告諭之三月辛未魏平東将軍娥清安西将軍古弼将精騎一萬伐燕平州刺史拓拔嬰帥遼西諸軍㑹之夏四月魏娥清古弼攻燕白狼城克之髙麗遣其将葛盧孟光将衆數萬随陽伊至和龍迎燕王髙麗屯於臨川燕尚書令郭生因民之憚遷開城門納魏兵魏人疑之不入生遂勒兵攻燕王王引髙麗兵入自東門與生戰於闕下生中流矢死葛盧孟光入城命軍士脫弊褐取燕武庫精仗以給之大掠城中五月乙卯燕王帥龍城見户東徙焚宫殿火一旬不滅令婦人被甲居中陽伊等勒精兵居外葛盧孟光帥騎殿後方軌而進前後八十餘里古弼部将髙茍子帥騎欲追之弼醉拔刀止之故燕王得逃去魏主聞之怒檻車徴弼及娥清至平城皆黜為門卒戊午魏主遣散騎常侍封撥使髙麗令送燕王秋九月髙麗不送燕王於魏遣使奉表稱當與馮𢎞俱奉王化魏主以髙麗違詔議擊之将發隴右騎卒劉絜曰秦隴新民且當優復俟其饒實然後用之樂平王丕曰和龍新定宜廣修農桑以豐軍實然後進取則髙麗一舉可滅也魏主乃止十五年初燕王𢎞至遼東髙麗王璉遣使勞之曰龍城王馮君爰適野次士馬勞乎𢎞慙怒稱制譲之髙麗處之平郭尋徙北豐𢎞素侮髙麗政刑賞罰猶如其國髙麗乃奪其侍人取其太子王仁為質𢎞怨髙麗遣使来上表求迎上遣使者王白駒等迎之并令髙麗資遣髙麗王不欲使𢎞南来遣将孫潄髙仇等殺𢎞于北豐并其子孫十餘人諡𢎞曰昭成皇帝魏滅夏宋文帝元嘉元年夏主将廢太子璝而立少子酒泉公倫璝聞之将兵七萬北伐倫倫将騎三萬拒之戰于髙平倫敗死倫兄太原公昌将騎一萬襲璝殺之并其衆八萬五千歸于統萬夏主大悦立昌為太子夏主好自矜大名其四門東曰招魏南曰朝宋西曰服涼北曰平朔二年秋八月夏武烈帝殂廟號世祖太子昌即皇帝位大赦改元承光三年夏六月魏主詔問公卿今當用兵赫連蠕蠕二國何先長孫嵩長孫翰奚斤皆曰赫連土着未能為患不如先伐蠕蠕太常崔浩曰赫連氏土地不過千里政刑殘虐人神所棄宜先伐之尚書劉絜武京侯安原請先伐燕於是魏主自雲中西廵至五原因略於隂山東至和兠山秋八月還平城秋九月魏主聞夏世祖殂諸子相圗國人不安欲伐之長孫嵩等皆曰彼若城守以逸待勞大檀聞之乗虚入寇此危道也崔浩曰徃年以来熒惑再守羽林鉤已而行其占秦亡今年五星并出東方利以西伐天人相應不可失也嵩固争之帝大怒責嵩在官貪汚命武士頓辱之於是遣司空奚斤帥四萬五千人襲蒲阪宋兵将軍周幾帥萬人襲陜城以河東太守薛謹為鄉導謹辨之子也魏主欲以中書慱士平棘李順總前驅之兵訪於崔浩浩曰順誠有籌略然臣與之㛰姻深知其為人果於去就不可専委帝乃止冬十月丁巳魏主發平城魏主行至君子津㑹天暴寒冰合十一月戊寅帥輕騎二萬濟河襲統萬壬午冬至夏主方燕羣臣魏師奄至上下驚擾魏主軍於黒水去城三十餘里夏主出戰而敗退走入城門未及閉門三郎豆代田帥衆乗勝入西宫焚其西門宫門閉代田踰宫垣而出魏主拜代田勇武將軍魏軍夜宿城北癸未分兵四掠殺獲數萬魏主謂諸将曰統萬未可得也它年當與卿等取之乃徙其民萬餘家而還夏𢎞農太守曹達聞周幾将至不戰而走魏師乗勝長驅遂入三輔㑹幾卒于雲中蒲坂守将軍平公乙斗聞奚斤将至遣使詣統萬告急使者至統萬魏軍已圍其城還告乙斗曰統萬已敗矣乙斗懼棄城西犇長安斤遂克蒲坂夏主之弟助興先守長安乙斗至與助興棄長安西犇安定十二月斤入長安四年春正月乙酉魏主還平城統萬徙民在道多死能至平城者什纔六七己亥魏主如幽州夏主弟平原公定帥衆二萬向長安魏主聞之伐木隂山大造攻具再謀伐夏二月魏主還平城三月丙子魏主遣髙涼王禮鎮長安禮斤之孫也又詔執金吾桓貸造橋於君子津夏四月魏奚斤與夏平原公定相持於長安魏主欲乗虚伐統萬簡兵練士部分諸将命司徒長孫翰等將三萬騎為前驅常山王素等将歩兵三萬為後繼南陽王伏真等将歩兵三萬部送攻具將軍賀多羅将精騎三千為前候素遵之子也五月魏主發平城命龍驤將軍代人陸俟督諸軍鎮大磧以備柔然辛巳濟君子津魏主至拔鄰山築城捨輜重以輕騎三萬倍道先行羣臣咸諌曰統萬城堅非朝夕可拔今輕軍討之進不可克退無所資不若與步兵攻具一時俱徃帝曰用兵之術攻城最下必不得已然後用之今以步兵攻具皆進彼必懼而堅守若攻不時拔食盡兵疲外無所掠進退無地不如以輕騎直抵其城彼見步兵未至意必寛弛吾羸形以誘之彼或出戰則成擒矣所以然者吾之軍士去家二千餘里又隔大河所謂置之死地而後生者也故以之攻城則不足決戰則有餘矣遂行六月魏主至統萬分軍㐲於深谷以少衆至城下夏将狄子玉降魏言夏主聞有魏師遣使召平原公定定曰統萬堅峻未易攻拔待我擒奚斤然後徐徃内外擊之蔑不濟矣故夏主堅守以待之魏主患之乃退軍以示弱遣娥清及永昌王健帥騎五千西掠居民魏軍士有得罪亡犇夏者言魏軍糧盡士卒食菜輜重在後步兵未至宜急擊之夏主從之甲辰將步騎三萬出城長孫翰等皆言夏兵步陳難陷宜避其鋒魏主曰吾逺来求賊唯恐不出今既出矣乃避而不擊彼奮我弱非計也遂收衆偽遁引而疲之夏兵為兩翼鼓譟追之行五六里㑹有風雨從東南来揚沙冥晦宦者趙倪頗曉方術言於魏主曰今風雨從賊上来我向之彼背之天不助人且将士飢溺願陛下攝騎避之更待後日崔浩叱之曰是何言也吾千里制勝一日之事豈得變易賊貪進不止後軍已絶宜隱軍分出奄擊不意風道在人豈有常也魏主曰善乃分騎為左右隊以掎之魏主馬蹶而墜幾為夏将所獲拓跋齊以身捍蔽決死力戰夏兵乃退魏主騰馬得上刺夏尚書斛黎文殺之又殺騎兵十餘人身中流矢奮擊不輟夏衆大潰齊翳槐之𤣥孫也魏人乗勝逐夏主至北城殺夏主之弟河南公滿及兄子䝉遜死者萬餘人夏主不及入城遂犇上邽魏主微服逐犇者入其城拓跋齊固諌不聼夏人覺之諸門悉閉魏主因與齊等入其宫中得婦人裙繫之槊上魏主乗之而上僅乃得免㑹日暮夏尚書僕射問至奉夏主之母出走長孫翰将八千騎追夏主至髙平不及而還己巳魏主入城獲夏主公卿將校及諸母后妃娣妹宫人以萬數馬三十餘萬匹牛羊數千萬頭府庫珍寳車旗器物不可勝計頒賜将士有差初夏世祖豪侈築統萬城髙十仞基厚三十步上廣十步宫􅉹髙五仞其堅可以厲刀斧臺榭壯大皆彫鏤圖畫被以綺繡窮極文采魏主顧謂左右曰蕞爾國而用民如此欲不亡得乎得夏太史令張淵徐辯復以為太史令得故晉将毛修之秦將軍庫洛千歸庫洛千於秦以毛修之善烹調用為太官令魏主見夏著作郎天水趙逸所為文譽夏主太過怒曰此豎無道何敢如是誰所為邪當速推之崔浩曰文士襃貶多過其實盖不得已不足罪也乃止魏主納夏世祖三女為貴人奚斤與夏平原公定猶相拒於長安魏主命宗正娥清太僕丘堆帥騎五千略地闗右定聞統萬已破遂奔上邽斤追至雍不及而還清堆攻夏貳城拔之魏主詔斤等班師斤上䟽言赫連昌亡保上邽鳩合餘燼未有蟠據之資今因其危滅之為易請益鎧馬平昌而還魏主不許斤固請乃許之給斤兵萬人遣将軍劉拔送馬三千匹并留娥清丘堆使共擊夏辛酉魏主自統萬東還以常山王素為征南大将軍假節與執金吾桓貸莫雲留鎮統萬雲題之弟也五年春二月魏平北将軍尉眷攻夏主於上邽夏主退屯平涼奚斤進軍安定與丘堆娥清軍合斤馬多疫死士卒乏糧乃深壘自固遣丘堆督租於民間士卒暴掠不設儆備夏主襲之堆兵敗以數百騎還城夏主乗勝日来城下鈔掠不得芻牧諸将患之監軍侍御史安頡曰受詔滅賊今更為賊所困退守窮城若不為賊殺當坐法誅進退皆無生理而諸王公晏然曽不為計乎斤曰今軍士無馬以步擊騎必無勝理當須京師救騎至合擊之頡曰今猛冦逰逸於外吾兵疲食盡不一决戰則死在旦夕救騎何可待乎等於就死死戰不亦可乎斤又以馬少為辭頡曰今斂諸将所乗馬可得二百匹頡請募敢死之士出擊之就不能破敵亦可以折其銳且赫連昌狷而無謀好勇而輕毎自出挑戰衆皆識之若伏兵掩擊昌可禽也斤猶難之頡乃隂與尉眷等謀選騎待之既而夏主来攻城頡出應之夏主自出陳前摶戰軍士識其貌争赴之㑹天大風揚塵晝昬夏主敗走頡追之夏主馬蹶而墜遂擒之頡同之子也夏大将軍領司徒平原王定收其餘衆數萬奔還平涼即皇帝位大赦改元勝光三月辛巳赫連昌至平城魏主館之於西宫門内器用皆給乗輿之副又以妹始平公主妻之假常忠将軍賜爵㑹稽公以安頡為建節将軍賜爵西平公尉眷為寕北将軍進爵漁陽公魏主常使赫連昌侍從左右與之單騎共逐鹿深入山澗昌素有勇名諸将咸以為不可魏主曰天命有在亦何所懼親遇如初奚斤自以為元帥而昌為偏禆所擒深恥之乃捨其輜重齎三日糧追夏主於平涼娥清欲循水而徃斤不從自北道邀其走路至馬髦嶺夏軍将遁㑹魏小将有罪亡歸於夏告以魏軍食少無水夏主乃分兵邀斤前後夹擊之魏兵大潰斤及娥清劉拔皆為夏所擒士卒死者六七千人丘堆守輜重在安定聞斤敗棄輜重奔長安與髙涼王禮偕犇蒲坂夏人復取長安魏主大怒命安頡斬丘堆代将其衆鎮蒲坂以拒之夏四月夏主遣使請和於魏魏主以詔諭之使降六年春正月夏酒泉公雋自平涼犇魏夏五月夏主欲復取統萬引兵東至侯尼城不敢進而還夏主少凶暴無頼不為世祖所知十月畋于隂槃登苛藍山望統萬城泣曰先帝若以朕承大業者豈有今日之事乎七年春三月壬寅魏封赫連昌為秦王秋九月夏主遣其弟謂以代伐魏鄜城魏平西将軍始平公隗歸等擊之殺萬餘人謂以代遁去夏主自将數萬人邀擊隗歸於鄜城東留其弟上谷公社干廣陽公度洛孤守平涼遣使来求和約合兵滅魏遙分河北自恒山以東屬宋以西屬夏魏主聞之治兵将伐夏羣臣咸曰劉義隆兵猶在河中捨之西行前寇未可必克而義隆乗虚濟河則失山東矣魏主以問崔浩對曰義隆與赫連定遙相招引以虚聲唱和共窺大國義隆望定進定待義隆前皆莫敢先入譬如連雞不得俱飛無能為害也赫連定殘根易摧擬之必仆克定之後東出潼關席卷而前則威振南極江淮以北無立草矣聖䇿獨發非愚近所及願陛下勿疑魏主如統萬遂襲平涼以衛兵将軍王斤鎮蒲坂冬十一月乙酉魏主至平涼夏上谷公社干等嬰城固守魏主使赫連昌招之不下乃使安西将軍古弼等将兵趣安定夏主自鄜城還安定将歩騎二萬北救平涼與弼遇弼偽退以誘之夏主追之魏主使髙車馳擊之夏兵大敗斬首數千級夏主還走登鶉觚原為方陳以自固魏兵就圍之魏軍圍夏主數日㫁其水草人馬飢渇丁酉夏主引衆下鶉觚原魏武衛將軍丘眷擊之夏衆大潰死者萬餘人夏主中重創單騎走收其餘衆驅民五萬西保上邽魏人獲夏主之弟丹楊公烏視拔武陵公禿骨及公侯以下百餘人是日魏兵乗勝進攻安定夏東平公乙斗棄城犇長安驅略數千家西奔上邽己亥魏主如安定庚子還臨平涼掘塹圍之安慰初附赦秦雍之民賜復七年夏隴西守將降魏十二月丁卯夏上谷公社干廣陽公度洛孤出降魏克平涼關中侯豆代田得奚斤娥清等獻於魏主魏主以夏主之后賜代田命斤膝行執酒以奉代田謂斤曰全汝生者代田也賜代田爵井陘侯加散騎常侍右衛将軍領内都幢将夏長安臨晉武功守将皆走關中悉入於魏魏主留巴東公延普鎮安定以鎮西將軍王斤鎮長安壬申魏主東還以奚斤為宰士使負酒食以從王斤驕矜不法信用左右調役百姓民不堪命南奔漢川者數千家魏主案治得實斬斤以徇八年夏六月夏主畏魏人之逼擁秦民十餘萬口自治城濟河欲擊河西王䝉遜而奪其地吐谷渾王慕璝遣益州刺史慕利延寕州刺史拾䖍帥騎三萬乗其半濟邀擊之執夏主定以歸秋八月吐谷渾王慕璝遣侍郎謝太寕奉表于魏請送赫連定九年春三月壬申吐谷渾王慕璝送赫連定于魏魏人殺之十一年春閏三月甲戌赫連昌叛魏西走丙子河西侯将格殺之魏人并其羣弟誅之魏滅北涼宋文帝元嘉七年冬十一月河西王䝉遜遣尚書郎宗舒等入貢于魏魏主與之宴執崔浩之手以示舒等曰汝所聞崔公此則是也才略之羙於今無比朕動止咨之豫陳成敗若合符契未甞失也八年秋八月乙酉河西王蒙遜遣子安周入侍于魏九月魏主欲選使者詣河西崔浩薦尚書李順乃以順為太常拜河西王䝉遜為侍中都督涼州西域羌戎諸軍事太傅行征西大将軍涼州牧涼王王武威張掖敦煌酒泉西海金城西平七郡冊曰盛衰存亡與魏升降北盡窮髮南極庸㟭西被崑嶺東至河西王實征之以夹輔皇室置将相羣卿百官承制假授建天子旌旗出入警蹕如漢初諸侯王故事元年冬十二月魏李順復奉使至涼涼王蒙遜遣中兵校郎楊定歸謂順曰年衰多疾腰髀不随不堪拜伏比三五日消息小差當相見順曰王之老疾朝廷所知豈得自安不見詔使明日蒙遜延順入至庭中䝉遜箕坐隠几無動起之状順正色入言曰不謂此叟無禮乃至於此今不憂覆亡而敢陵侮天地魂魄逝矣何用見之握節將出涼王使定歸追止之曰太常既雅恕衰疾傳聞朝廷有不拜之詔是以敢自安耳順曰齊桓公九合諸侯一匡天下周天子賜胙命無下拜桓公猶不敢失臣禮下拜登受今王雖功髙未如齊桓朝廷雖相崇重未有不拜之詔而遽自偃蹇此豈社稷之福邪蒙遜乃起拜受詔使還魏主問以涼事順曰䝉遜控制河右踰二十年經涉艱難粗識機變綏集荒裔羣下畏服雖不能貽厥孫謀猶足以終其一世然禮者徳之輿敬者身之基也䝉遜無禮不敬以臣觀之不復年矣魏主曰易世之後何時當滅順曰蒙遜諸子臣略見之皆庸才也如聞敦煌太守牧犍器性粗立繼䝉遜者必此人也然比之於父皆云不及此殆天之所以資聖明也魏主曰朕方有事東方未暇西略如卿所言不為晚也初􅄢賔沙門曇無䜟自云能使鬼治病且有祕術涼王蒙遜甚重之謂之聖人諸女及子婦皆徃受術魏主聞之使李順徃徴之䝉遜留不遣仍殺之魏主由是怒涼䝉遜荒淫猜虐羣下苦之十年夏四月涼王蒙遜病甚國人共議以世子菩提幼弱立菩提之兄敦煌太守牧犍為世子加中外都督大將軍錄尚書事䝉遜卒諡曰武宣王廟號太祖牧犍即河西王位大赦改元永和立子封檀為世子加撫軍大将軍錄尚書事遣使請命于魏牧犍聪頴好學和雅有度量故國人立之先是魏主遣李順迎武宣王女為夫人㑹牧犍稱先王遺意遣左丞宋繇送其妹興平公主于魏拜右昭儀魏主謂李順曰卿言䝉遜今則驗矣又言牧犍立何其妙哉朕克涼州亦當不逺於是賜絹十匹廐馬一乗進號安西将軍寵待彌厚政事無巨細皆與之參議遣順拜牧犍都督涼沙河三州西域羌戎諸軍事車騎将軍開府儀同三司涼州刺史河西王以宋繇為河西王右相牧犍以無功受賞留順上表乞安平一號優詔不許牧犍尊敦煌劉昞為國師親拜之命官屬以下皆北面受業十一年夏四月河西王牧犍遣使上表告嗣位戊寅詔以牧犍為都督涼秦等四州諸軍事征西大将軍涼州刺史河西王十二年春正月有老父投書于敦煌東門求之不獲書曰涼王三十年若七年河西王牧犍以問奉常張慎對曰昔虢之将亡神降于莘願殿下崇徳修政以享三十之祚若盤于逰畋荒于酒色臣恐七年将有大變牧犍不恱十四年冬十一月魏主以其妹武威公主妻河西王牧犍河西王遣宋繇奉表詣平城謝且問其母及公主所宜稱魏主使羣臣議之皆曰母以子貴妻從夫爵牧犍母宜稱河西國太后公主於其國稱王后於京師則稱公主魏主從之牧犍遣将軍沮渠旁周入貢于魏魏主遣侍中古弼尚書李順賜其侍臣衣服并徴世子封檀入侍是嵗牧犍遣封檀如魏李順自河西還魏主問之曰卿徃年言取涼州之䇿朕以東方有事未遑也今和龍已平吾欲即以此年西征可乎對曰臣疇昔所言以今觀之私謂不謬然國家戎車屢動士馬疲勞西征之議請俟它年魏主乃止十六年春三月河西王牧犍通於其嫂李氏兄弟三人傳嬖之李氏與牧犍之姊共毒魏公主魏主遣鮮毒醫乗傳救之得愈魏主徴李氏牧犍不遣厚資給使居酒泉魏毎遣使者詣西域常詔牧犍發導䕶送出流沙使者自西域還至武威牧犍左右有告魏使者曰我君承蠕蠕可汗妄言云去嵗魏天子自来伐我士馬疫死大敗而還我擒其長弟樂平王丕我君大喜宣言於國又聞可汗遣使告西域諸國稱魏已削弱今天下唯我為彊若更有魏使勿復供奉西域諸國頗有貳心使還具以状聞魏遣尚書賀多羅使涼州觀虚實多羅還亦言牧犍雖外修臣禮内實乖悖魏主欲討之以問崔浩對曰牧犍逆心已露不可不誅官軍徃年北伐雖不克獲實無所損戰馬三十萬匹計在道死傷不滿八千常嵗羸死亦不減萬匹而逺方乗虚遽謂衰耗不能復振今出其不意大軍猝至彼必駭擾不知所為擒之必矣魏主曰善吾意亦以為然於是大集公卿議於西堂𢎞農王奚斤等三十餘人皆曰牧犍西垂下國雖心不純臣然繼父位以来職貢不乏朝廷待以藩臣妻以公主今其罪惡未彰宜加恕宥國家新征蠕蠕士馬疲弊未可大舉且聞其土地鹵瘠難得水草大軍既至彼必嬰城固守攻之不拔野無所掠此危道也初崔浩惡尚書李順順使涼州凡十二返魏主以為能涼武宣王數與順逰宴對其羣下時為驕慢之語恐順泄之随以金寳納於順懐順亦為之隠浩知之密以白魏主魏主未之信及議伐涼州順與尚書古弼皆曰自温圉水以西至姑臧地皆枯石絶無水草彼人言姑臧城南天梯山上冬有積雪深至丈餘春夏消釋下流成川居民引以溉灌彼聞軍至決此渠口水必乏絶環城百里之内地不生草人馬飢渇難以久留斤等之議是也魏主乃命浩與斤等相詰難衆無復它言但云彼無水草浩曰漢書地理志稱涼州之畜為天下饒若無水草畜何以蕃又漢人終不於無水草之地築城郭建郡縣也且雪之消釋僅能斂塵何得通渠溉灌乎此言大為欺誣矣李順曰耳聞不如目見吾甞目見何可共辯崔浩曰汝受人金錢欲為之遊説謂我目不見便可欺邪帝隱聼聞之乃出見斤等辭色嚴厲羣臣不敢復言唯唯而已羣臣既出振威将軍代人伊馥言於帝曰涼州若果無水草彼何以為國衆議皆不可用宜從浩言帝善之夏五月丁丑魏主治兵於西郊六月甲辰發平城使侍中宜都王穆夀輔太子晃監國決留臺事内外聽焉又使大将軍長樂王嵇敬輔國大将軍建寕王崇将二萬人屯漢南以備柔然命公卿為書以譲河西王牧犍數其十二罪且曰若親帥羣臣委贄逺迎謁拜馬首上䇿也六軍既臨面縳輿櫬其次也若守迷窮城不時悛悟身死族滅為世大戮宜思厥中自求多福魏主自雲中濟河秋七月己巳至上郡屬國城壬午留輜重部分諸軍使撫軍大将軍永昌王健尚書令劉絜與常山王素為前鋒兩道並進驃騎大将軍樂平王丕太宰陽平王杜超為後繼以平西将軍源賀為鄉導魏主問賀以取涼州方略對曰姑臧城旁有四部鮮卑皆臣祖父舊民臣願處軍前宣國威信示以禍福必相帥歸命外援既絶然後取其孤城如反掌耳魏主曰善八月甲午永昌王健獲河西畜産二十餘萬河西王牧犍聞有魏師驚曰何為乃爾用左丞姚定國計不肯出迎求救於柔然遣其弟征南大将軍董来将兵萬餘人出戰於城南望風犇潰劉絜用卜者言以為日辰不利斂兵不追董来遂得入城魏主由是怒之丙申魏主至姑臧遣使諭牧犍令出降牧犍聞柔然欲入魏邊為寇冀幸魏主東還遂嬰城固守其兄子祖踰城出降魏主具知其情乃分軍圍之源賀引兵招慰諸部下三萬餘落故魏主得専攻姑臧無復外慮魏主見姑臧城外水草豐饒由是恨李順謂崔浩曰卿之昔言今果驗矣對曰臣之言不敢不實類皆如此魏主之伐涼州也太子晃亦以為疑至是魏主賜太子詔曰姑臧城東西門外涌泉合於城北其大如河自餘溝渠流入漠中其間乃無燥地故有此敕以釋汝疑九月丙戌河西王牧犍兄子萬年帥所領降魏姑臧城潰牧犍帥其文武五千人面縳請降魏主釋其縳而禮之收其城内戸口二十餘萬倉庫珍寳不可勝計使張掖王秃髪保周龍驤将軍穆罷安逺将軍源賀分徇諸郡雜胡降者又數十萬初牧犍以其弟無諱為沙州刺史都督建康以西諸軍事領酒泉太守宜得為秦州刺史都督丹嶺以西諸軍事領張掖太守安周為樂都太守從弟唐兒為敦煌太守及姑臧破魏主遣鎮南将軍代人奚眷擊張掖鎮北將軍封沓擊樂都宜得燒倉庫西犇酒泉安周南奔吐谷渾封沓掠數千戸而還奚眷進攻酒泉無諱宜得收遺民犇晉昌遂就唐兒於敦煌魏主使弋陽公元絜守酒泉及武威張掖皆置将守之魏主置酒姑臧謂羣臣曰崔公智略有餘吾不復以為竒伊馥弓馬之士而所見乃與崔公同此深可竒也冬十月辛酉魏主東還留樂平王丕及征西将軍賀多羅鎮涼州徙沮渠牧犍宗族及吏民三萬戸于平城十二月壬午魏主至平城猶以妹壻待沮渠牧犍尤喜文學以敦煌闞駰為姑臧太守張湛為兵部尚書劉昞索敞隂興為國師助教金城宋欽為世子洗馬趙柔為金部郎廣平程駿駿從弟𢎞為世子侍講魏主克涼州皆禮而用之十七年春正月己酉沮渠無諱寇魏酒泉元絜輕之出城與語壬子無諱執絜以圍酒泉三月沮渠無諱拔酒泉夏四月庚辰沮渠無諱寇魏張掖丙戌魏主遣撫軍大将軍永昌王健督諸将討之五月乙巳沮渠無諱復圍張掖不克退保臨松魏主不復加討但以詔諭之秋八月甲申沮渠無諱使其中尉梁偉詣魏永昌王健請降歸酒泉郡及所虜将士元絜等魏主使尉眷留鎮涼州十八年春正月癸卯魏以沮渠無諱為征西大将軍涼州牧酒泉王三月辛亥魏賜沮渠萬年為張掖王夏四月沮渠唐兒叛沮渠無諱無諱留從弟天周守酒泉與弟宜得引兵擊唐兒唐兒敗死魏以無諱終為邊患庚辰遣鎮南将軍奚眷擊酒泉冬十一月酒泉城中食盡萬餘口皆餓死沮渠天周殺妻以食戰士庚子魏奚眷拔酒泉獲天周送平城殺之沮渠無諱乏食且畏魏兵之盛乃謀西度流沙遣其弟安周西擊鄯善鄯善王欲降㑹魏使者至勸令拒守安周不能克退保東城十九年夏四月沮渠無諱将萬餘家棄敦煌西就沮渠安周未至鄯善比龍畏之将其衆犇且末其世子降於安周無諱遂據鄯善其士卒經流沙渇死者大半李寳自伊吾帥衆二千入據敦煌繕修城府安集故民沮渠牧犍之亡也涼州人闞爽據髙昌自稱太守唐契為柔然所逼據衆西趨髙昌欲奪其地柔然遣其将阿若追擊之契敗死契弟和收餘衆犇車師前部王伊洛時沮渠安周屯横截城和攻拔之又拔髙寕白力二城遣使請降於魏唐契之攻闞爽也爽遣使詐降於沮渠無諱欲與之共擊契八月無諱将其衆趨髙昌比至契已死爽閉門拒之九月無諱将衛興奴夜襲髙昌屠其城爽奔柔然無諱據髙昌遣其常侍泥雋奉表詣建康詔以無諱為都督涼河沙三州諸軍事征西大将軍河州刺史河西王二十一年秋九月甲辰以沮渠安周為都督涼河沙三州諸軍事河州刺史河西王二十四年魏師之克敦煌也沮渠牧犍使人斫開府庫取金玉及寳器因不復閉小民争入盜取之有司索盜不獲至是牧犍所親及守藏者告之且言牧犍父子多蓄苺藥潛殺人前後以百數姊妹皆學左道有司索牧犍家得所匿物魏主大怒賜沮渠昭儀死并誅其宗族唯沮渠祖以先降得免又有告牧犍猶與故臣民交通謀反者三月魏主遣崔浩就第賜牧犍死諡曰哀王魏平仇池晉武帝太元十年冬十月西燕主沖遣尚書令髙蓋帥衆五萬伐後秦戰於新平蓋大敗降於後秦初蓋以楊定為子及蓋敗定亡奔隴右復收集其舊衆定佛奴之孫也十一月衛将軍楊定徙治厯城置儲蓄於百頃自稱龍驤将軍仇池公遣使来稱藩詔因其所號假之其後又取天水略陽之地自稱秦州刺史隴西王十九年冬十月秦主崇為梁王乾歸所逐犇隴西王楊定定與崇共攻乾歸乾歸遣涼州牧軻彈等拒之大敗定兵殺定及崇定無子其叔父佛狗之子盛先守仇池自稱征西将軍秦州刺史仇池公諡定為武王仍遣使来稱藩秦太子宣奔盛二十一年冬十二月楊盛遣使来請命詔拜盛鎮南将軍仇池公盛表符宣為平北将軍安帝隆安二年楊盛遣使附魏魏以盛為仇池王義熈元年夏六月秦隴西公碩徳伐仇池屡破楊盛兵秋七月楊盛請降于秦秦以盛為都督益寕二州諸軍事征南大将軍益州牧三年夏四月氐王楊盛以平北将軍符宣為梁州督䕶将兵入漢中秦梁州别駕吕瑩等起兵應之刺史王敏攻之瑩等求援於盛盛遣軍臨濜口敏退屯武興盛復通於晉晉以盛為都督隴右諸軍事征西大将軍開府儀同三司盛因以宣行梁州刺史八年冬十月仇池公楊盛叛秦侵擾祁山秦王興遣建威将軍趙琨為前鋒立節将軍姚伯夀繼之前将軍姚恢出鷲峽秦州刺史姚嵩出羊頭峽右衛将軍胡翼度出汧城以討盛興自雍赴之與諸将㑹於隴口天水太守王松忽言於嵩曰先帝神略無方徐洛生以英武佐命再入仇池無功而還非楊氏智勇能全也直地勢險固耳今以趙琨之衆使君之威凖之先朝實未見成功使君具悉形便何不表聞嵩不從盛帥衆與琨相持伯夀畏懦不進琨衆寡不敵為盛所敗興斬伯夀而還十二年夏六月氐王楊盛攻秦祁山拔之進逼秦州秦後将軍姚平救之盛引兵退平與上邽守将姚嵩追之嵩與盛戰於竹嶺敗死宋髙祖永初三年夏四月乙亥詔封仇池公楊盛為武都王文帝元嘉二年夏六月武都惠文王楊盛卒初盛聞晉亡不改義熈年號謂世子𤣥曰吾老矣當終為晉臣汝善事宋帝及盛卒𤣥自稱都督隴右諸軍事征西大将軍開府儀同三司秦州刺史武都王遣使来告䘮始用元嘉年號三年冬十月仇池氐楊興平求内附梁南秦二州刺史吉翰遣始平太守龐諮據武興氐王楊𤣥遣其弟難當将兵拒諮諮擊走之四年秋九月氐王楊𤣥遣将軍符白作圍秦梁州刺史出連輔政于赤水城中糧盡民執輔政以降輔政至駱谷逃還冬十月秦以驍騎將軍呉漢為平南将軍梁州刺史鎮南漒冬十一月魏主遣軍司馬公孫軌兼大鴻臚持節䇿拜楊𤣥為都督荆梁等四州諸軍事梁州刺史南秦王及境𤣥不出迎軌責讓之欲奉策以還𤣥懼而郊迎六年秋七月武都孝昭王楊𤣥疾病欲以國授其弟難當難當固辭請立𤣥子保宗而輔之𤣥許之𤣥卒保宗立難當妻姚氏勸難當自立難當乃廢保宗自稱都督雍涼秦三州諸軍事征西大將軍開府儀同三司秦州刺史武都王七年夏六月己卯以氐王楊難當為冠軍將軍秦州刺史武都王九年夏六月加北秦州刺史楊難當征西將軍難當以兄子保宗為鎮南將軍鎮宕昌以其子順為秦州刺史守上邽保宗謀襲難當事泄難當囚之十年夏四月帝聞梁南秦三州刺史甄灋䕶刑政不治失氐羌之和乃自徒中起蕭思話為梁南秦二州刺史灋䕶灋崇之兄也秋九月戊午魏主遣兼大鴻臚崔頤持節拜氐王楊難當為征南大將軍開府儀同三司秦梁二州牧南秦王頤逞之子也楊難當因蕭思話未至甄灋䕶將下舉兵襲梁州破白馬獲晉昌太守張範敗灋䕶參軍魯安期等又攻葭萌獲晉夀太守范延朗冬十一月丁未灋䕶棄城犇洋川之西城難當遂有漢中之地以其司馬趙温為梁秦二州刺史十一年春正月楊難當以克漢中告捷於魏送雍州流民七千家於長安蕭思話至襄陽遣横野司馬蕭承之為前驅承之縁道収兵得千人進據磝頭楊難當焚掠漢中引衆西還留趙温守梁州又遣其魏興太守薛健據黄金山思話遣陰平太守蕭坦攻鐵城戍拔之二月趙温薛健與其馮翊太守蒲甲子合攻坦營坦擊破之温等退保西水臨川王義慶遣龍驤將軍裴方明將三千人助承之拔黄金戍而據之温棄州城退據小城健甲子退保下桃城思話繼至與承之共擊趙温等屢破之行參軍主靈濟别將出洋川攻南城拔之擒其守將趙英南城空無所資靈濟引兵還與承之合三月楊難當遣其子和將兵與蒲甲子等共擊蕭承之相拒四十餘日圍承之數十重短兵相接弓矢無所復施氐悉衣犀甲戈矛所不能入承之㫁矟長數尺以大斧椎之一矟輙貫數人氐不能當燒營走據大桃閏月承之等追擊之至南城氐敗走斬獲甚衆悉收漢中故地置戍於葭萌水初桓希既敗氐王楊盛據漢中梁州刺史范元之傅歆皆治魏興唯得魏興上庸新城三郡及索邈為刺史乃治南城至是南城為氐所焚不可復固蕭思話徙鎮南鄭夏四月甄法䕶坐委鎮賜死于獄楊難當遣使奉表謝罪帝下詔赦之十二年楊難當釋楊保宗之囚使鎮童亭十三年春三月氐王楊難當自稱大秦王改元建義立妻為王后世子為太子置百官皆如天子之制然猶貢奉宋魏不絶赫連定之西遷也楊難當遂據上邽秋七月魏主遣驃騎大将軍樂平王丕尚書令劉絜督河西髙平諸軍以討之先遣平東將軍崔賾齎詔書諭難當九月庚戌魏樂平王丕等至略陽楊難當懼請奉詔攝上邽守兵還仇池諸將議以為不誅其豪帥軍還之後必相聚為亂又大衆逺出不有所掠無以充軍實賞將士丕將從之中書侍郎髙允參丕軍事諌曰如諸將之謀是傷其向化之心大軍既還為亂必速丕乃止撫慰初附秋毫不犯秦隴遂安難當以其子順為雍州刺史守下辯十六年春三月楊保宗與兄保顯自童亭奔魏庚寅魏主以保宗為都督隴西諸軍事征西大將軍開府儀同三司秦州牧武都王鎮上邽妻以公主保顯為鎮西將軍晉夀公冬十二月氐王楊難當將兵數萬寇魏上邽秦州人多應之東平吕羅漢說鎮將拓跋意頭曰難當衆盛今不出戰示之以弱衆情離沮不可守也意頭遣羅漢將精騎千餘出衝難當陳所向披靡殺其左右騎八人難當大驚㑹魏主以璽書責讓難當難當引還仇池十七年大秦王楊難當復稱武都王十八年冬十一月氐王楊難當傾國入冦謀據蜀土遣其建忠將軍符沖出東洛以禦涼州兵梁秦二州刺史劉真道擊沖斬之真道懐敬之子也難當攻拔葭萌獲晉夀太守申坦遂圍涪城巴西梓潼二郡太守劉道錫嬰城固守難當攻之十餘日不克乃還道錫道産之弟也十二月癸亥詔龍驤將軍裴方明等帥甲士三千人又發荆雍二州兵以討難當皆受劉真道節度十九年夏五月裴方明等至漢中與劉真道分兵攻武興下辯白水皆取之楊難當遣建節將軍符𢎞祖守蘭臯使其子撫軍大將軍和將重兵為後繼方明與𢎞祖戰於濁水大破之斬𢎞祖和退走追至赤亭又破之難當犇上邽獲難當兄子建節將軍保熾難當以其子虎為益州刺史守隂平聞難當走引兵還至下辯方明使其子肅之邀擊之擒虎送建康斬之仇池平以輔國司馬胡崇之為北秦州刺史鎮其地立楊保熾為楊𤣥後使守仇池魏人遣中山王辰迎楊難當詣平城秋七月以劉真道為雍州刺史裴方明為梁南秦二州刺史方明辭不拜丙寅魏主使安西將軍古弼督隴右諸軍及殿中虎賁與武都王楊保宗自祁山南入征西將軍漁陽皮豹子與琅邪王司馬楚之督闗中諸軍自散關西入俱㑹仇池又使譙王司馬文思督洛豫諸軍南趨襄陽征南將軍刁雍東趨廣陵移書徐州稱為楊難當報仇二十年春正月魏皮豹子等進撃樂鄉將軍王奐之等敗沒魏軍進至下辯將軍强𤣥明等敗死二月胡崇之與魏戰于濁水崇之為魏所擒餘衆走還漢中將軍姜道祖兵敗降魏魏遂取仇池楊保熾走魏河間公齊與武都王楊保宗對鎮雒谷保宗弟文徳說保宗令閉險自固以叛魏或以告齊夏四月齊誘執保宗送平城殺之前鎮東司馬符達征西從事中郎任朏等遂舉兵立楊文徳為主據白崖分兵取諸戎進圍仇池自號征西將軍秦河梁二州牧仇池公夏五月魏古弼發上邽髙平岍城諸軍擊楊文徳文徳退走皮豹子督關中諸軍至下辯聞仇池解圍欲還弼遣人謂豹子曰宋人恥敗必將復来軍還之後再舉為難不如練兵蓄力以待之不出秋冬宋師必至以逸待勞無不克矣豹子從之魏以豹子為仇池鎮將楊文徳遣使来求援秋七月癸丑詔以文徳為都督北秦雍二州諸軍事征西大將軍北秦州刺史武都王文徳屯葭蘆城以任詘為左司馬武都隂平氐多歸之甲子前雍州刺史劉真道梁南秦州刺史裴方明坐破仇池減匿金寳及善馬下獄死冬十一月将軍姜道盛與楊文徳合衆二萬攻魏濁水城魏皮豹子河間公齊救之道盛敗死二十四年冬十二月楊文徳據葭蘆城招誘氐羌武都等五郡氐皆應之二十五年春正月魏仇池鎮將皮豹子帥諸軍擊之文徳兵敗棄城犇漢中豹子收其妻子僚屬軍資及楊保宗所尚魏公主而還初保宗將叛公主勸之或曰奈何叛父母之國公主曰事成為一國之母豈比小縣公主哉魏主賜之死楊文徳坐失守免官削爵土通鑑紀事本末卷十八下
