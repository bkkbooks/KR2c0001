body:
  text: 通鑑紀事本末卷四十二上宋袁樞撰契丹滅晉劉知逺復汴京附後晉高祖天福四年成徳節度使安重榮出於行伍性粗率恃勇驕暴毎謂人曰今世天子兵彊馬壯則為之耳府廨有幡竿高數十尺嘗挾弓矢謂左右曰我能中竿上龍首者必有天命一發中之以是益自負帝之遣重榮代祕瓊也戒之曰瓊不受代當别除汝一鎮勿以力取恐為患滋深重榮由是以帝為怯謂人曰祕瓊匹夫耳天子尚畏之況我以將相之重士馬之衆乎毎所奏請多踰分為執政所可否意憤憤不快乃聚亡命市戰馬有飛揚之志帝知之義武節度使皇甫遇與重榮婣家七月徙遇為昭義節度使五年初帝割鴈門之北以賂契丹由是吐谷渾皆屬契丹苦其貪虐思歸中國成徳節度使安重榮復誘之於是吐谷渾帥部落千餘帳自五臺來奔契丹大怒遣使讓帝以招納叛人六年春正月丙寅帝遣供奉官張澄將兵二千索吐谷渾在并鎮忻代四州山谷者逐之使還故土成徳節度使安重榮恥臣契丹見契丹使者必箕踞慢罵使過其境或潜遣人殺之契丹以讓帝帝為之遜謝六月戊午重榮執契丹使伊喇遣輕騎掠幽州南境軍於博野上表稱吐谷渾兩突厥渾契苾沙陁各帥部衆歸附党項等亦遣使納契丹告身職牒言為契丹陵暴又言自二月以來令各具精甲壯馬將以上秋南㓂恐天命不佑與之俱滅願自備十萬衆與晉共擊契丹又朔州節度副使趙崇已逐契丹節度使劉山求歸命朝廷臣相繼以聞陛下屢敇臣承奉契丹勿自起釁端其如天道人心難以違拒機不可失時不再來諸節度使沒於北庭者皆延頸企踵以待王師良可哀憫願早決計表數千言大扺斥帝父事契丹竭中國以媚無厭之求又以此意為書遺朝貴及移藩鎮云已勒兵必與契丹決戰帝以重榮方握彊兵不能制甚患之時鄴都留守侍衞馬步都指揮使劉知逺在大梁泰寧節度使桑維翰知重榮已蓄姦謀又慮朝廷重違其意宻上疏曰陛下免於晉陽之難而有天下皆契丹之功也不可負之今重榮恃勇輕敵吐谷渾假手報仇皆非國家之利不可聽也臣竊觀契丹數年以來士馬精彊吞噬四鄰戰必勝攻必取割中國之土地収中國之器械其君智勇過人其臣上下輯睦牛馬蕃息國無天災此未可與為敵也且中國新敗士氣彫沮以當契丹乘勝之威其勢相去甚逺又和親既絶則當發兵守塞兵少則不足以待冦兵多則饋運無以繼之我出則彼歸我歸則彼至臣恐禁衞之士疲於奔命鎮定之地無復遺民今天下粗安瘡痍未復府庫虚竭蒸民困弊静而守之猶懼不濟其可妄動乎契丹與國家思義非輕信誓甚著彼無間隙而自啓釁端就使克之後患愈重萬一不克大事去矣議者以嵗輸繒帛謂之耗蠧有所卑遜謂之屈辱殊不知兵連而不休禍結而不解財力將匱耗蠧孰甚焉用兵則武吏功臣過求姑息邊藩逺郡得以驕矜下陵上替屈辱孰大焉臣願陛下訓農習戰養兵息民俟國無内憂民有餘力然後觀釁而動則動必有成矣又鄴都富盛國家藩屏今主帥赴闕軍府無人臣竊思慢藏誨盜之言勇夫重閉之義乞陛下畧加巡幸以杜姦謀帝謂使者曰朕比日以來煩懣不快今見卿奏如醉醒矣卿勿以為憂秋七月帝憂安重榮跋扈己巳以劉知逺為北京留守河東節度使八月帝以詔諭安重榮曰爾身為大臣家有老母忿不思難棄君與親吾因契丹得天下爾因吾致富貴吾不敢忘徳爾乃忘之何邪今吾以天下臣之爾欲以一鎮抗之不亦難乎宜審思之無取後悔重榮得詔愈驕聞山南東道節度使安從進有異志陰遣使與之通謀九月帝以安重榮殺契丹使者恐其犯塞乙亥遣安國節度使楊彦珣使于契丹彦珣至其帳契丹主責以使者死狀彦珣曰譬如人家有惡子父母所不能制將如之何契丹主意乃解劉知逺遣親將郭威以詔旨說吐谷渾酋長白承福令去安重榮歸朝廷許以節鉞威還謂知逺曰彼惟利是嗜安鐵胡止以袍袴賂之今欲其來莫若重賂乃可致耳知逺從之且使謂承福曰朝廷已割爾曹𨽻契丹爾曹當自安部落今乃南來助安重榮為逆重榮已為天下所棄朝夕敗亡爾曹宜早從化勿俟臨之以兵南北無歸悔無及矣承福懼冬十月帥其衆歸于知逺知逺處之太原東山及嵐石之間表承福領大同節度使収其精騎以𨽻麾下始安重榮移檄諸道云與吐谷渾韃靼契苾同起兵既而承福降知逺韃靼契苾亦莫之赴重榮勢大沮冬十二月安重榮聞安從進舉兵反謀遂決大集境内饑民衆至數萬南向鄴都聲言入朝初重榮與深州人趙彦之俱為散指揮使相得歡甚重榮鎮成徳彦之自闗西歸之重榮待遇甚厚使彦之招募黨衆然心實忌之及舉兵止用為排陣使彦之恨之帝聞重榮反壬辰遣護聖等馬步三十九指揮擊之以天平節度使杜重威為招討使安國節度使馬全節副之前永清節度使王周為馬步都虞候戊戌杜重威與安重榮遇於宗城西南重榮為偃月陣官軍再擊之不動重威懼欲退指揮使宛丘王重𦙍曰兵家忌退鎮之精兵盡在中軍請公分銳士擊其左右翼重𦙍為公以契丹直衝其中軍彼必狼狽重威從之鎮人陣稍却趙彦之卷旗策馬來降彦之以銀飾鎧胄及鞍勒官軍殺而分之重榮聞彦之叛大懼退匿於輜重中官軍從而乘之鎮人大潰斬首萬五千級重榮収餘衆走保宗城官軍進攻夜分拔之重榮以十餘騎走還鎮州嬰城自守會天寒鎮人戰及凍死者二萬餘人契丹聞重榮反乃聽楊彦珣還七年春正月丁巳鎮州牙將自西郭水碾門導官軍入城殺守陴民二萬人執安重榮斬之杜重威殺導者自以為功庚申重榮首至鄴都帝命漆之函送契丹夏四月契丹以晉招納吐谷渾遣使來讓帝憂悒不知為計五月己亥始有疾帝寢疾一旦馮道獨對帝命幼子重睿出拜之又令宦者抱重睿置道懷中其意葢欲道輔立之六月乙丑帝殂道與天平節度使侍衞馬步都虞候景延廣議以國家多難宜立長君乃奏廣晉尹齊王重貴為嗣是日齊王即皇帝位延廣以為已功始用事禁都下人毋得偶語初高祖疾亟有詔召河東節度使劉知逺入輔政齊王寢之知逺由是怨齊王秋七月癸夘加景延廣同平章事兼侍衞馬步都指揮使冬十一月庚寅葬聖文章武明徳孝皇帝于顯陵廟號高祖帝之初即位也大臣議奉表稱臣告哀於契丹景延廣請致書稱孫而不稱臣李崧曰屈身以為社稷何恥之有陛下如此它日必躬擐甲胄與契丹戰於時悔無益矣延廣固争馮道依違其間帝卒從延廣議契丹大怒遣使來責議且言何得不先承禀遽即帝位延廣復以不遜語答之契丹盧龍節度使趙延夀欲代晉帝中國屢說契丹擊晉契丹主頗然之齊王天福八年帝聞契丹將入寇二月己未發鄴都乙丑至東京然猶與契丹問遺相往來無虚月初河陽牙將喬榮從趙延夀入契丹契丹以為囘圖使往來販易於晉置邸大梁及契丹與晉有隙景延廣說帝囚榮於獄悉取邸中之貨凡契丹之人販易在晉境者皆殺之奪其貨大臣皆言契丹有大功於晉不可負戊子釋榮慰賜而歸之榮辭延廣延廣大言曰歸語而主先帝為北朝所立故稱臣奉表今上乃中國所立所以降志於北朝者正以不敢忘先帝盟約故耳爲隣稱孫足矣無稱臣之理北朝皇帝勿信趙延夀誑誘輕侮中國中國士馬爾所目覩翁怒則來戰孫有十萬横磨劒足以相待它日為孫所敗取笑天下毋悔也榮自以亡失貨財恐歸獲罪且欲為異時據驗乃曰公所言頗多懼有遺忘願記之紙墨延廣命吏書其語以授之榮具以白契丹主契丹主大怒入冦之志始決晉使如契丹者皆縶之幽州不得見桑維翰屢請遜辭以謝契丹毎為延廣所沮帝以延廣有定䇿功故寵冠羣臣又總宿衞兵故大臣莫能與之爭河東節度使劉知逺知延廣必致冦而畏其方用事不敢言但益募兵奏置興捷武節等十餘軍以備契丹楊光逺之叛也宻告契丹以晉主負徳違盟境内大饑公私困竭乘此際攻之一舉可取趙延夀亦勸之契丹主乃集山後及盧龍兵合五萬人使延夀將之委延夀經畧中國曰若得之當立汝為帝又常指延夀謂晉人曰此汝主也延夀信之由是為契丹盡力畫取中國之策朝廷頗聞其謀丙辰遣使城南樂及徳清軍徵近道兵以備之開運元年春正月乙亥邊藩馳告契丹前鋒將趙延夀趙延照將兵五萬入冦逼貝州延照思温之子也先是朝廷以貝州水陸要衝多聚芻粟為大軍數年之儲以備契丹軍校邵珂性凶悖永清節度使王令温黜之珂怨望宻遣人亡入契丹言貝州粟多而兵弱易取也㑹令温入朝執政以前復州防禦使吳巒權知州事巒既至推誠撫士㑹契丹入冦巒書生無爪牙珂自請願效死巒使將兵守南門巒自守東門契丹主自攻貝州巒悉力拒之燒其攻具殆盡己夘契丹復攻城珂引契丹自南門入巒赴井死契丹遂䧟貝州所殺且萬人庚辰以歸徳節度使高行周為北面行營都部署以河陽節度使符彦卿為馬軍左廂排陣使以右神武統軍皇甫遇為馬軍右廂排陳使以陜府節度使王周為步軍左廂排陳使以左羽林將軍潘環為步軍右廂排陳使太原奏契丹入鴈門闗恒邢滄皆奏契丹入冦成徳節度使杜威遣幕僚曹光裔往說楊光逺光逺遣光裔入奏朝廷遣使與光裔往復慰諭之事見范陽之叛帝遣使持書遺契丹契丹已屯鄴都不得通而返壬午以侍衞馬步都指揮使景延廣為御營使前靜難節度使李周為東京留守是日高行周以前軍先發時用兵方畧號令皆出延廣宰相以下皆無所預延廣乘勢使氣陵侮諸將雖天子亦不能制乙酉帝發東京丁亥滑州奏契丹至黎陽戊子帝至澶州契丹主屯元城趙延夀屯南樂以延夀為魏博節度使封魏王契丹侵太原劉知逺與白承福合兵二萬擊之甲午以知逺為幽州道行營招討使杜威為副使馬全節為都虞候丙申遣右武衞上將軍張彦澤等將兵拒契丹於黎陽帝復遣譯者孟守忠致書於契丹求修舊好契丹主復書曰已成之勢不可改也辛丑太原奏破契丹偉王於秀容斬首三千級契丹自鴉鳴谷遁去天平節度副使知鄆州顔衎遣觀察判官竇儀奏博州刺史周儒以城降契丹又與楊光逺通使往還引契丹自馬家口濟河擒左武衞將軍蔡行遇儀謂景延廣曰敵若濟河與光逺合則河南危矣延廣然之儀薊州人也二月甲辰朔命前保義節度使石贇守麻家口前威勝節度使何重建守楊劉鎮䕶聖都指揮使白再榮守馬家口西京留守安彦威守河陽未幾周儒引契丹將滿達自馬家口濟河營於東岸攻鄆州北津以應楊光逺滿達契丹主之從弟也乙巳遣侍衞馬軍都指揮使義成節度使李守貞神武統軍皇甫遇陳州防禦使梁漢璋懷州刺史薛懷讓將兵萬人緣河水陸俱進守貞河陽漢璋應州懷讓太原人也丙午契丹圍高行周符彦卿及先鋒指揮使石公霸於戚城先是景延廣令諸將分地而守無得相救行周等告急延廣徐白帝帝自將救之契丹解去三將泣訴救兵之緩幾不免戊申李守貞等至馬家口契丹遣步卒萬人築壘散騎兵於其外餘兵數萬屯河西船數千艘渡兵未巳晉兵薄之契丹騎兵退走晉兵進攻其壘抜之契丹大敗乗馬赴河溺死者數千人俘斬亦數千人河西之兵慟哭而去由是不敢復東辛亥定難節度使李彛殷奏將兵四萬自麟州濟河侵契丹之境壬子以彛殷為契丹西南面招討使初契丹主得貝州博州皆撫慰其人或拜官賜服章及敗於戚城及馬家口忿恚所得民皆殺之得軍士燔炙之由是晉人憤怒戮力争奮楊光逺將青州兵欲西㑹契丹戊午詔石贇分兵屯鄆州以備之詔劉知逺將部兵自土門出恒州擊契丹又詔㑹杜威馬全節於邢州知逺引兵屯樂平不進契丹偽棄元城去伏精騎於古頓丘城以俟晉軍與恒定之兵合而擊之鄴都留守張從恩屢奏虜已遁去大軍欲進追之㑹霖雨而止契丹設伏旬日人馬饑疲趙延夀曰晉軍悉在河上畏我鋒銳必不敢前不如即其城下四合攻之奪其浮梁則天下定矣契丹主從之三月癸酉朔自將兵十餘萬陳於澶州城北東西横掩城之兩隅登城望之不見其際高行周前軍在戚城之南與契丹戰自午及晡互有勝負契丹主以精兵當中軍而來帝亦出陳以待之契丹主望見晉軍之盛謂左右曰楊光逺言晉兵半已餒死今何多也以精騎左右畧陳晉軍不動萬弩齊發飛矢蔽地契丹稍却又攻晉陳之東偏不克苦戰至暮兩軍死者不可勝數昏後契丹引去營於三十里之外乙亥契丹主帳中小校竊其馬亡來云契丹主已傳木書収軍北去景延廣疑其詐閉壁不敢追契丹主自澶州北分為兩軍一出滄徳一出深冀而歸所過焚掠方廣千里民物殆盡留趙延照為貝州留後滿達䧟德州擒刺史尹居璠丁亥詔太原恒定兵各還本鎮辛夘馬全節攻契丹泰州拔之敇天下籍鄉兵毎七户共出兵械資一卒夏四月丁未緣河巡檢使梁進以鄉社兵復取徳州己酉命歸徳節度使高行周保義節度使王周留鎮澶州庚戌帝發澶州甲寅至大梁侍衛馬步都指揮使天平節度使同平章事景延廣既為上下所惡帝亦憚其不遜難制桑維翰引其不救戚城之罪辛酉加延廣兼侍中出為西京留守以歸徳節度使兼侍中高行周為侍衞馬步都指揮使延廣鬱鬱不得志見契丹彊盛始憂國破身危遂日夜縱酒朝廷因契丹入冦國用愈竭復遣使者三十六人分道括率民財各封劒以授之使者多從吏卒攜鎖械刀杖入民家小大驚懼求死無地州縣吏復因緣為姦河南府出緡錢二十萬景延廣率三十七萬留守判官河南盧億言於延廣曰公位兼將相富貴極矣今國家不幸府庫空竭不得已取於民公何忍復因而求利為子孫之累乎延廣慙而止先是詔以楊光逺叛命兖州修守備泰寧節度使安審信以治樓堞為名率民財以實私藏大理卿張仁愿為括率使至兖州賦緡錢十萬值審信不在拘其守藏吏指取錢一囷已滿其數丙戌詔諸州所籍鄉兵號武定軍凡得七萬餘人時兵荒之餘復有此擾民不聊生丁亥鄴都留守張從恩上言趙延照雖據貝州麾下兵皆乆客思歸宜速進軍攻之詔以從恩為貝州行營都部署督諸將擊之辛夘從恩奏趙延照縱火大掠棄城而遁屯於瀛莫阻水自固六月或謂帝曰陛下欲禦北方安天下非桑維翰不可丙午復置樞宻院以維翰為中書令兼樞宻使事無大小悉以委之數月之間朝廷差治初高祖割北邊之地以賂契丹由是府州刺史折從逺亦北屬契丹欲盡徙河西之民以實遼東州人大恐從逺因保險拒之及帝與契丹絶遣使諭從逺使攻契丹從逺引兵深入抜十餘寨戊午以從逺為府州團練使從逺雲州人也秋八月辛丑朔以河東節度使劉知逺為北面行營都統順國節度使杜威為都招討使督十三節度以備契丹桑維翰兩秉朝政出楊光逺景延廣於外至是一制指揮節度使十五人無敢違者時人服其膽畧契丹之入冦也帝再命劉知逺會兵山東皆後期不至帝疑之謂所親曰太原殊不助朕必有異圖果有分何不速為之至是雖為都統而實無臨制之權宻謀大計皆不得預知逺亦知見疎但慎事自守而已郭威見知逺有憂色謂知逺曰河東山河險固風俗尚武土多戰馬静則勤稼穡動則習軍旅此霸王之資也何憂乎十二月契丹復大舉入侵盧龍節度使趙延夀引兵先進契丹前鋒至邢州順國節度使杜威遣使間道吿急帝欲自將拒之㑹有疾命天平節度使張從恩鄴都留守馬全節䕶國節度使安審琦㑹諸道兵屯邢州武寧節度使趙在禮屯鄴都契丹主以大兵繼至建牙於元氏朝廷憚契丹之盛詔從恩等引兵稍却於是諸軍忷懼無復部伍委棄器甲所過焚掠比至相州不復能整二年春正月詔趙在禮還屯澶州馬全節還鄴都又遣右神武統軍張彦澤屯黎陽西京留守景延廣自滑州引兵守胡梁渡庚子張從恩奏契丹逼邢州詔滑州鄴都復進軍拒之義成節度使皇甫遇將兵趣邢州契丹冦邢洺磁三州殺掠殆盡入鄴都境壬子張從恩馬全節安審琦悉以行營兵數萬陳於相州安陽水之南皇甫遇與濮州刺史慕容彦超將數千騎前覘契丹至鄴縣將度漳水遇契丹數萬遇等且戰且却至榆林店契丹大至二將謀曰吾屬今走死無遺矣乃止布陳自午至未力戰百餘合相殺傷甚衆遇馬斃因步戰其僕杜知敏以所乘馬授之遇乘馬復戰乆之稍解顧知敏已為契丹所擒遇曰知敏義士不可棄也與彦超躍馬入契丹陳取知敏而還俄而契丹繼出新兵來戰二將曰吾屬勢不可走以死報國耳日且暮安陽諸將怪覘兵不還安審𤦺曰皇甫太師寂無聲問必為敵所困語未半有一騎白遇等為敵數萬所圍審𤦺即引騎兵出將救之張從恩曰此言未足信必若虜衆猥至盡吾軍恐未足以當之公往何益審𤦺曰成敗天也萬一不濟當共受之借使虜不南來坐失皇甫太師吾屬何顔以見天子遂踰水而進契丹望見塵起即解去遇等乃得還與諸將俱歸相州軍中皆服二將之勇彦超本吐谷渾也與劉知逺同母契丹亦引軍退其衆自相驚曰晉軍悉至矣時契丹主在邯鄲聞之即時北遁不再宿至鼔城是夕張從恩等議曰契丹傾國而來吾兵不多城中糧不支一旬萬一有姦人往告吾虚實虜悉衆圍我死無日矣不若引軍就黎陽倉南倚大河以拒之可以萬全議未決從恩引兵先發諸軍繼之擾亂失亡復如發邢州之時從恩等留步兵五百守安陽橋夜四鼓知相州事符彦倫謂將佐曰此夕紛紜人無固志五百弊卒安能守橋即召入棄城為備至曙望之契丹數萬騎已陳於安陽水北彦倫命城上揚旌鼔譟約束契丹不測日加辰趙延夀與契丹惕隠帥衆踰水環相州而南詔右神武統軍張彦澤將兵趨相州延夀等至湯陰聞之甲寅引還馬全節等擁大軍在黎陽不敢追延夀悉陳甲騎於相州城下若將攻城狀符彦倫曰此敵將走耳出甲卒五百陳於城北以待之契丹果引去以天平節度使張從恩權東京留守庚申振武節度使折從逺擊契丹圍勝州遂攻朔州帝疾小愈河北相繼告急帝曰此非安寢之時乃部分諸將為行計北面副招討使馬全節等奏據降者言敵衆不多宜乘其散歸種落大舉徑襲幽州帝以為然徵兵諸道壬戌下詔親征乙丑帝發大梁二月壬辰朔帝至滑州壬申命安審𤦺屯鄴都甲戌帝發滑州乙亥至潼州己夘馬全節等諸軍以次北上劉知逺聞之曰中國疲弊自守恐不足乃横挑彊敵勝之猶有後患况不勝乎契丹自恒州還以羸兵驅牛羊過祁州城下刺史下邳沈斌出兵擊之契丹以精騎奪其門州兵不得還趙延夀知城中無餘兵引契丹急攻之斌在上延夀語曰沈使君吾之故人擇禍莫若輕何不早降斌曰侍中父子失計䧟身北庭忍帥仇讐以殘父母之邦不自愧恥更有驕色何哉沈斌弓折矢盡寧為國家死耳終不效公所為明日城䧟斌自殺丙戌詔北面行營都招討使杜威以本道兵㑹馬全節等進軍端明殿學士户部侍郎馮玉宣徽北院使權侍衞馬步都虞候太原李彦韜皆挾恩用事惡中書令桑維翰數毁之帝欲罷維翰政事李崧劉昫固諫而止維翰請以玉為樞密副使玉殊不平丙申中旨以玉為户部尚書樞宻使以分維翰之權彦韜少事閻寶為僕夫後𨽻高祖帳下高祖自太原南下留彦韜侍帝為腹心由是有寵性纎巧與嬖幸相結以蔽帝耳目帝委信之至於升黜將相亦得預議常謂人曰吾不知朝廷設文官何所用且欲澄汰徐當盡去之初高祖置徳清軍於故澶州城及契丹入冦澶州鄴都之間城戍俱䧟議者以澶州鄴都相去百五十里宜於中塗築城以應接南北從之三月戊戌更築徳清軍城合徳清南樂之民以實之乙巳杜威等諸軍㑹于定州以供奉官蕭處鈞權知祁州事庚戌諸軍攻契丹泰州刺史晉廷謙舉州降甲寅取蒲城獲契丹酋長穆蘭及其兵二千人乙夘取遂城趙延夀部曲有降者言契丹主還至虎北口聞晉取泰州復擁衆南向約八萬餘騎計來夕當至宜速為備杜威等懼丙辰退保泰州戊午契丹至泰州己未晉軍南行契丹踵之晉軍至陽城庚申契丹大至晉軍與戰逐北十餘里契丹踰白溝而去壬戌晉軍結陳而南胡騎四合如山諸軍力戰拒之是日纔行十餘里人馬饑乏癸亥晉軍至白團衞村埋鹿角為行寨契丹圍之數重竒兵出寨後斷糧道是日東北風大起破屋折樹營中掘井方及水輒崩士卒取其泥帛絞而飲之人馬俱渴至曙風尤甚契丹主坐奚車中令其衆曰晉軍止此耳當盡擒之然後南取大梁命鐵鷂四面下馬抜鹿角而入奮短兵以擊晉軍又順風縱火揚塵以助其勢軍士皆憤怒大呼曰都招討使何不用兵令士卒徒死諸將請出戰杜威曰俟風稍緩徐觀可否馬步都監李守貞曰彼衆我寡風沙之内莫測多少惟力鬬者勝此風乃助我也若俟風止吾屬無類矣即呼曰諸軍齊擊賊又謂威曰令公善守禦守貞以中軍決死矣馬軍左廂都排陳使張彦澤召諸將問計皆曰虜得風勢宜俟風囘與戰彦澤亦以為然諸將退馬軍右廂副排陳使太原藥元福獨留謂彦澤曰今軍中饑渴已甚若俟風囘吾屬已為擒矣敵謂我不能逆風以戰若出其不意争擊之此兵之詭道也馬步左右廂都排陳使符彦卿曰與其束手就擒曷若以身狥國乃與彦澤元福及左廂都排陳使皇甫遇引精騎出西門擊之諸將繼至契丹却數百步彦卿等謂守貞曰且曵隊往來乎直前奮擊以勝為度乎守貞曰事勢如此安可回鞚宜長驅取勝耳彦卿等躍馬而去風勢愈甚昏晦如夜彦卿等擁萬餘騎横擊契丹呼聲動天地契丹大敗而走勢如崩山李守貞亦令步兵盡抜鹿角出鬭步騎俱進逐北二十餘里鐵鷂既下馬蒼黄不能復上皆委棄馬及鎧仗蔽地契丹散卒至陽城東南水上稍復布列杜威曰賊已破膽不宜更令成列遣精騎擊之皆度水去契丹主乘奚車走十餘里追兵急獲一槖駝乘之而走諸將請急追之杜威揚言曰逢賊幸不死更索衣囊邪李守貞曰兩日人馬渴甚今得水飲皆足重難以追冦不若全軍而還乃退保定州契丹主至幽州散兵稍集以軍失利杖其酋長各數百唯趙延夀得免乙丑諸軍自定州引歸詔以泰州𨽻定州夏四月辛巳帝發澶州甲申還大梁順國節度使杜威乆鎮恒州性貪殘自恃貴戚多不法毎以備邊為名斂吏民錢帛以充私藏富室有珍貨或名姝駿馬皆奪取之或誣以罪殺之籍沒其家又畏懦過甚毎契丹數十騎入境威已閉門登陴或數騎驅所掠華人千百過城下威但瞋目延頸望之無意邀取由是敵無所忌憚屬城多為所屠威竟不出一卒救之千里之間暴骨如莽村落殆盡威見所部殘弊為衆所怨又畏契丹之彊累表請入朝帝不許威不俟報遽委鎮入朝朝廷聞之驚駭桑維翰言於帝曰威固違朝命擅離邊鎮居常慿恃勲親邀求姑息及疆場多事曽無守禦之意宜因此時廢之庶無後患帝不悅維翰曰陛下不忍廢之宜授以近京小鎮勿復委以雄藩帝曰威朕之密親必無異志但宋國長公主切欲相見耳公勿以為疑維翰自是不敢復言國事以足疾辭位五月丙辰威至大梁己未杜威獻部曲步騎合四千人并鎧仗庚申又獻粟十萬斛芻二十萬束云皆在本道帝以其所獻騎兵𨽻扈聖步兵𨽻護國威復請以為牙隊而稟賜皆仰縣官威又令公主白帝求天雄節鉞帝許之六月癸酉以杜威為天雄節度使契丹連嵗入㓂中國疲於奔命邊民塗地契丹人畜亦多死國人厭苦之舒嚕太后謂契丹主曰使漢人主契丹可乎曰不可太后曰然則汝何故欲為漢主曰石氏負恩不可容太后曰汝今雖得漢地不能居也萬一蹉跌悔何所及又謂其羣下曰漢兒何得一向眠自古但聞漢和蕃不聞蕃和漢漢兒果能囘意我亦何惜與和桑維翰屢勸帝復請和於契丹以紓國患帝假開封軍將張暉供奉官使奉表稱臣詣契丹卑辭謝過契丹主曰使景延廣桑維翰自來仍割鎮定兩道𨽻我則可和朝廷以契丹語忿謂其無和意乃止及契丹主入大梁謂李崧等曰曏使晉使再來則南北不戰矣秋八月丙寅右僕射兼中書侍郎同平章事和凝罷守本官加樞密使户部尚書馮玉中書侍郎同平章事事無大小悉以委之帝自陽城之捷謂天下無虞驕侈益甚四方貢獻珍竒皆歸内府多造器玩廣宫室崇飾後庭近朝莫之及作織錦樓以織地衣用織工數百期年乃成又賞賜優伶無度桑維翰諫曰曏者陛下親禦外冦戰士重傷者賞不過帛數端今優人一談一笑稱旨往往賜束帛萬錢錦袍銀帶彼戰士見之能不觖望曰我曹冐白刃絶筋折骨曽不如一談一笑之功乎如此則士卒解體陛下誰與衞社稷乎帝不聴馮玉毎善承迎帝意由是益有寵嘗有疾在家帝謂諸宰相曰自刺史以上俟馮玉出乃得除其倚任如此玉乘勢弄權四方賂遺輻輳其門由是朝政益壞九月戊申置威信軍於曹州遣侍衞馬步都指揮使李守貞戌澶州乙夘遣彰徳節度使張彦澤戍恒州初帝疾未平㑹正旦樞宻使中書令桑維翰遣女僕入宫起居太后因問皇弟睿近讀書否帝聞之以告馮玉玉因譛維翰有廢立之志帝疑之李守貞素惡維翰馮玉李彦韜與守貞合謀排之以中書令行開封尹趙瑩柔而易制共薦以代維翰十二月罷維翰政事為開封尹以瑩為中書令李崧為樞宻使守侍中維翰遂稱足疾希復朝謁杜絶賓客或謂馮玉曰桑維翰元老今既解其樞務縱不留之相位猶當優以大藩奈何使之尹京親猥細之務乎玉曰恐其反耳曰儒生安能反玉曰縱不自反恐其教人耳三年定州西北二百里有狼山土人築堡於山上以避敵冦堡中有佛舍尼孫深意居之以妖術惑衆言事頗驗逺近信奉之中山人孫方簡及弟行友自言深意之姪不飲酒食肉事深意甚謹深意卒方簡嗣行其術稱深意坐化嚴飾事之如生其徒日滋㑹晉與契丹絶好北邊賦役䌓重冦盜充斥民不安其業方簡行友因帥鄉里豪健者據寺為寨以自保契丹入㓂方簡帥衆邀擊頗獲其甲兵牛馬軍資人挈家往依之者益衆乆之至千餘家遂為羣盜懼為吏所討乃歸欵朝廷朝廷亦資其禦㓂署東北招収指揮使方簡時入契丹境抄掠多所殺獲既而邀求不已朝廷小不副其意則舉寨降於契丹請為鄉道以入冦時河北大饑民餓死者所在以萬數兖鄆滄貝之間盜賊蠭起吏不能禁天雄節度使杜威遣元隨軍將劉延翰市馬於邊方簡執之獻於契丹延翰逃歸六月壬戌至大梁言方簡欲乘中國凶饑引契丹入冦宜為之備乙丑定州言契丹勒兵壓境詔以天平節度使侍衞馬步都指揮使李守貞為北面行營都部署義成節度使皇甫遇副之彰徳節度使張彦澤充馬軍都指揮使兼都虞候義武節度使薊人李殷充步軍都指揮使兼都排陳使遣䕶聖指揮使臨清王彦超太原白延遇以部兵十營詣邢州時馬軍都指揮使鎮安節度使李彦韜方用事視守貞蔑如也守貞在外所為事無大小彦韜必知之守貞外雖敬奉而内恨之秋七月有自幽州來者言趙延夀有意歸國樞宻使李崧馮玉信之命天雄節度使杜威致書於延夀具述朝旨啖以厚利洺州軍將趙行實嘗事延夀遣齎書潜往遺之延夀復書言乆處異域思歸中國乞發大軍應接抜身南去辭旨懇密朝廷欣然復遣行實詣延夀與為期約八月李守貞言與契丹千餘騎遇於長城北轉鬭四十里斬其酋帥轄哩擁餘衆入水溺死者甚衆丁夘詔李守貞還屯澶州帝既與契丹絶好數召吐谷渾酋長白承福入朝宴賜甚厚承福從帝與契丹戰澶州又與張從恩戍滑州屬嵗大熱遣其部落還太原畜牧於嵐石之境部落多犯法劉知逺無所縱捨部落知朝廷微弱且畏知逺之嚴謀相與遁歸故地有白可乆者位亞承福帥所部先亡歸契丹契丹用為雲州觀察使以誘承福知逺與郭威謀曰今天下多事置此屬於太原乃腹心之疾也不如去之承福家甚富飼馬用銀槽威勸知逺誅之収其貨以贍軍知逺密表吐谷渾反覆難保請遷於内地帝遣使發其部落千九百人分置河陽及諸州知逺遣威誘承福等入居太原城中因誣承福等五族謀叛以兵圍而殺之合四百口籍沒其家貲詔褒賞之吐谷渾由是遂微九月契丹三萬侵河東壬辰劉知逺敗之於楊武谷斬首七千級張彦澤奏敗契丹於定州北又敗之於泰州斬首二千級契丹使瀛州刺史劉延祚遺樂壽監軍王巒書請舉城内附且云城中契丹兵不滿千人乞朝廷發輕兵襲之已為内應又今秋多雨自瓦橋以北積水無際契丹主已歸牙帳雖聞闗南有變地逺阻水不能救也巒與天雄節度使兼中書令杜威屢奏瀛莫乘此可取深州刺史慕容遷獻瀛莫圖馮玉李崧信以為然欲發大兵迎趙延夀及延祚先是侍衞馬步都指揮使天平節度使李守貞數將兵過廣晉杜威厚待之贈金帛甲兵動以萬計守貞由是與威親善守貞入朝帝勞之曰聞卿為將常費私財以賞戰士對曰此皆杜威盡忠於國以金帛資臣臣安敢掠有其美因言陛下若它日用兵臣願與威戮力以清沙漠帝由是亦賢之及將北征帝與馮玉李崧議以威為元帥守貞副之趙瑩私謂馮李曰杜令國戚貴為將相而所欲未厭心常慊慊豈可復假以兵權必若有事北方不若止任守貞為愈也不從冬十月辛未以威為北面行營都招討使守貞為兵馬都監以泰寧節度使安審琦為左右廂都指揮使武寧節度使符彦卿為馬軍左廂都指揮使義成節度使皇甫遇為馬軍右廂都指揮使永清節度使梁漢璋為馬軍都排陳使前威勝節度使宋彦筠為步軍左廂都指揮使奉國左廂都指揮使王饒為步軍右廂都指揮使洺州團練使薛懷讓為先鋒都指揮使仍下敇牓曰専發大軍往平黠寇先収瀛莫安定闗南次復幽燕盪平塞北又曰有能擒獲敵主者除上鎮節度使賞錢萬緡絹萬匹銀萬兩時自六月積雨至是未止軍行及饋運者甚艱苦杜威李守貞㑹兵於廣晉而北行威屢使公主入奏請益兵曰今深入敵境必資衆力由是禁軍皆在其麾下而宿衞空虚十一月丁酉以李守貞權知幽州行府事己亥杜威等至瀛州城門洞啓寂若無人威等不敢進聞契丹將高謨幹先已引兵濳出威遣梁漢璋將二千騎追之漢璋遇契丹於南陽務敗死威等聞之引兵而南時束城等數縣請降威等焚其廬舍掠其婦女而還契丹主大舉入境自易定趣恒州杜威等至武强聞之將自冀貝而南彰徳節度使張彦澤時在恒州引兵㑹之言契丹可破之狀威等乃復趣恒州以彦澤為前鋒甲寅威等至中度橋契丹已據橋彦澤帥騎争之契丹焚橋而退晉兵與契丹夾滹沱而軍始契丹見晉軍大至又爭橋不勝恐晉軍急度滹沱與恒州合勢擊之議引兵還及聞晉軍築壘為持乆之計遂不去杜威雖以貴戚為上將性懦怯偏禆皆節度使但日相承迎置酒作樂罕議軍事磁州刺史兼北面轉運使李糓說威及李守貞曰今大軍去恒州咫尺煙火相望若多以三股木置水中積薪布土其上橋可立成宻約城中舉火相應夜募壯士斫敵營而入表裏合勢敵必遁逃諸將皆以為然獨杜威不可遣糓南至懷孟督軍糧契丹以大兵當晉軍之前濳遣其將蕭翰通事劉重進將百騎及羸卒並西山出晉軍之後斷晉糧道及歸路樵采者遇之盡為所掠有逸歸者皆稱敵衆之盛軍中忷懼翰等至欒城城中戍兵千餘人不覺其至狼狽降之契丹獲晉民黥其面曰奉敇不殺縱之南走運夫在道遇之皆棄車驚潰翰契丹之舅也十二月丁巳朔李糓自書宻奏具言大軍危急之勢請車駕幸滑州遣高行周符彦卿扈從及發兵守澶州河陽以備敵之奔衝遣軍將闗勲走馬上之己未帝始聞大軍屯中度是夕闗勲至庚申杜威奏請益兵詔悉發守宫禁者得數百人赴之又詔發河北及滑孟澤潞芻糧五十萬詣軍前督迫嚴急所在鼎沸辛酉威又遣從者張祚等來告急祚等還為契丹所獲自是朝廷與軍前聲問兩不相通時宿衞兵皆在行營人心懍懍莫知為計開封尹桑維翰以國家危在旦夕求見帝言事帝方在苑中調鷹辭不見又詣執政言之執政不以為然退謂所親曰晉氏不血食矣帝欲自將北征李彦韜諫而止時符彦卿雖任行營職事帝留之使戌荆州口壬戌詔以歸徳節度使高行周為北面都部署以彦卿副之共戍澶州以西京留守景延廣戍河陽且張形勢奉國都指揮使王清言於杜威曰今大軍去恒州五里守此何為營孤食盡勢將自潰請以步卒二千為前鋒奪橋開道公帥諸軍繼之得入恒州則無憂矣威許諾遣清與宋彦筠俱進清戰甚鋭契丹不能支勢小却諸將請以大軍繼之威不許彦筠為契丹所敗浮水抵岸得免因退走清獨帥麾下陳於水北力戰互有殺傷屢請救於威威竟不遣一騎助之清謂其衆曰上將握兵坐觀吾輩困急而不救此有異志吾輩當以死報國耳衆感其言莫有退者至暮戰不息契丹以新兵繼之清及士衆盡死由是諸軍皆奪氣清洛州人也甲子契丹遙以兵環晉營内外斷絶軍中食且盡杜威與李守貞宋彦筠謀降契丹威潜遣腹心詣契丹牙帳邀求重賞契丹主紿之曰趙延夀威望素淺恐不能帝中國汝果降者當以汝為之威喜遂定降計丙寅伏甲召諸將出降表示之使署名諸將駭愕莫敢言者但唯唯聴命威遣閤門使高勲齎詣契丹契丹主賜詔慰納之是日威悉命軍士出陳於外軍士皆踊躍以為且戰威親諭之曰今食盡塗窮當與汝曹共求生計因命釋甲軍士皆慟哭聲振原野威守貞仍於衆中揚言主上失徳信任姦邪猜忌於已聞者無不切齒契丹主遣趙延夀衣赭袍至晉營慰撫士卒曰彼皆汝物也杜威已下皆迎謁於馬前亦以赭袍衣威以示晉軍其實皆戲之耳以威為太傅李守貞為司徒威引契丹主至恒州城下諭順國節度使王周以已降之狀周亦出降戊辰契丹主入恒州遣兵襲代州刺史王暉以城降之先是契丹屢攻易州刺史郭璘固守拒之契丹主毎過城下指而嘆曰吾能吞併天下而為此人所扼及杜威既降契丹主遣通事耿崇美至易州誘諭其衆衆皆降璘不能制遂為崇美所殺璘邢州人也義武節度使李殷安國留後方太皆降於契丹契丹主以孫方簡為義武節度使滿達為安國節度使以客省副使馬崇祚權知恒州事契丹翰林承旨吏部尚書張礪言於契丹主曰今大遼已得天下中國將相宜用中國人為之不宜用北人及左右近習茍政令乖失則人心不服雖得之猶將失之契丹主不從引兵自邢相而南杜威將降兵以從遣張彦澤將二千騎先取大梁且撫安吏民以通事傅珠爾為都監杜威之降也皇甫遇初不預謀契丹主欲遣遇先將兵入大梁遇辭退謂所親曰吾位為將相敗不能死忍復圖其主乎至平棘謂從者曰吾不食累日矣何面目復南行遂扼吭而死張彦澤倍道疾驅夜度白馬津壬申帝始聞杜威等降是夕又聞彦澤至滑州召李崧馮玉李彦韜入禁中計事欲詔劉知逺發兵入援癸酉未明彦澤自封邱門斬闗而入李彦韜帥禁兵五百赴之不能遏彦澤頓兵明徳門外城中大擾帝於宫中起火自携劒驅後宫十餘人將赴火為親軍將薛超所持俄而彦澤自寛仁門傳契丹主與太后書慰撫之且召桑維翰景延廣帝乃命滅火悉開宫城門帝坐苑中與后妃相聚而泣召翰林學士范質草降表自稱孫男臣重貴禍至神惑運盡天亡今與太后及妻馮氏舉族於郊野面縛待罪次遣男鎮寧節度使延煦威信節度使延寶奉國寶一金印三出迎太后亦上表稱新婦李氏妾傅珠爾入宣契丹主命帝脱黄袍服素衫再拜受宣左右皆掩泣帝使召張彦澤欲與計事彦澤曰臣無面目見陛下帝復召之彦澤微笑不應或勸桑維翰逃去維翰曰吾大臣逃將安之坐而俟命彦澤以帝命召維翰維翰至天街遇李崧駐馬語未畢有軍吏於馬前揖維翰赴侍衞司維翰知不免顧謂菘曰侍中當國今日國亡反令維翰死之何也崧有愧色彦澤踞坐見維翰維翰責之曰去年拔公於罪人之中復領大鎮授以兵權何乃負恩至此彦澤無以應遣兵守之宣徽使孟承誨素以佞巧有寵於帝至是帝召承誨欲與之謀承誨伏匿不至張彦澤捕而殺之彦澤縱兵大掠貧民乘之亦争入富室殺人取其貨二日方止都城為之一空彦澤所居寶貨山積自謂有功於契丹晝夜以酒樂自娛出入騎從常數百人其旗幟皆題赤心為主見者笑之軍士擒罪人至前彦澤不問所犯但瞋目䜿三指即驅出斷其腰領彦澤素與閤門使高勲不協乘醉至其家殺其叔父及弟尸諸門首士民不寒而慄中書舍人李濤謂人曰吾與其逃於溝瀆而不免不若往見之乃投刺謁彦澤曰上疏請殺太尉人李濤謹來請死彦澤欣然接之謂濤曰舍人今日懼乎濤曰濤今日之懼亦猶足下昔日之懼也曏使高祖用濤言事安至此彦澤大笑命酒飲之濤引滿而去旁若無人天福七年張彦澤獲亡將楊洪斷其手足斬之朝義節度使王周奏之帝釋而不問李濤伏閤極論其罪甲戌張彦澤遷帝於開封府頃刻不得留宮中慟哭帝與太后皇后乘肩輿宫人宦者十餘人步從見者流涕帝悉以内庫金珠自隨彦澤使人諷之曰契丹主至此物不可匿也帝悉歸之亦分以遺彦澤彦澤擇取其竒貨而封其餘以待契丹彦澤遣控鶴指揮使李筠以兵守帝内外不通帝姑烏氏公主賂守門者入與帝訣相持而泣歸第自經死帝與太后所上契丹主表章皆先示彦澤然後敢發帝使取内庫帛數段主者不與曰此非帝物也又求酒於李菘崧亦辭以它故不進又欲見李彦韜彦韜亦辭不往帝惆悵乆之馮玉佞張彦澤求自送傳國寶冀契丹復任用楚國夫人丁氏延煦之母也有美色彦澤使人取之太后遲迴未與彦澤詬詈立載之去是夕彦澤殺桑維翰以帶加頸白契丹主云其自經契丹主曰吾無意殺維翰何為如是命厚撫其家高行周符彦卿皆詣契丹牙帳降契丹主以陽城之戰為彦卿所敗詰之彦卿曰臣當時惟知為晉主竭力今日死生惟命契丹主笑而釋之己夘延煦延寶自牙帳還契丹主賜帝手詔且遣轄哩謂帝曰孫勿憂必使汝有噉飯之所帝心稍安上表謝恩契丹以所獻傳國寶追琢非工又不與前史相應疑其非真以詔書詰帝使獻真者帝奏頃王從珂自焚舊傳國寶不知所在必與之俱燼此寶先帝所為羣臣備知臣今日焉敢匿寶乃止帝聞契丹主將度河欲與太后於前塗奉迎張彦澤先奏之契丹主不許有司又欲使帝衘璧牽羊大臣輿櫬迎於郊外先具儀注白契丹主契丹主曰吾遣竒兵直取大梁非受降也亦不許又詔晉文武羣官一切如故朝廷制度並用漢禮有司欲備法駕迎契丹主報曰吾方擐甲總戎太常儀衞未暇施也皆却之先是契丹主至相州即遣兵趣河陽捕景延廣延廣倉猝無所逃伏往見契丹主於封邱契丹主詰之曰致兩主失歡皆汝所為也十萬横磨劒安在召喬榮使相辨證事凡十條延廣初不服榮以紙所記語示之乃服毎服一事輒授一籌至八籌延廣但以面伏地請死乃鎖之丙戌晦百官宿於封禪寺後漢高祖天福十二年春正月丁亥朔百官遙辭晉主於城北乃易素服紗㡌迎契丹主伏路側請罪契丹主貂㡌貂裘衷甲駐馬高阜命起改服撫慰之左衞上將軍安叔千獨出班胡語契丹主曰汝安沒字邪汝昔鎮邢州已累表輸誠我不忘也叔千拜謝呼躍而退晉主與太后已下迎於封邱門外契丹主辭不見契丹主入門民皆驚呼而走契丹主登城樓遣通事諭之曰我亦人也汝曹勿懼㑹當使汝曹蘇息我無心南來漢兵引我至此耳至明徳門下馬拜而後入宫以其樞密副使劉密權開封尹事日暮契丹主復出屯於赤岡高勲訴張彦澤殺其家人於契丹主契丹主亦怒彦澤剽掠京城并傅珠爾鎖之以彦澤之罪宣示百官問應死否皆言應死百姓亦投牒争䟽彦澤罪己丑斬彦澤珠爾於北市仍命高勲監刑彦澤前所殺士大夫子孫皆絰杖號哭隨而詬詈以杖扑之勲命斷腕出鎖剖其心以祭死者市人争破其腦取髓臠其肉而食之契丹送景延廣歸其國庚寅宿陳橋夜伺守者稍怠扼吭而死辛夘契丹以晉主為負義侯置於黄龍府黄龍府即慕容氏和龍城也契丹主使謂李太后曰聞重貴不用母命以至于此可求自便勿與俱行太后曰重貴事妾甚謹所以失者違先君之志失兩國之歡耳今幸䝉大恩全生保家母不隨子欲何所歸癸巳契丹遷晉主及其家人於封禪寺遣大同節度使兼侍中河内崔廷勲以兵守之契丹主數遣使存問晉主毎聞使至舉家憂恐時雨雪連旬外無供億上下凍餒太后使人謂寺僧曰吾嘗於此飯僧數萬今日獨無一人相念邪僧辭以敵意難測不敢獻食晉主陰祈守者乃稍得食是日契丹主自赤岡引兵入宫都城諸門及宫禁門皆以契丹守衛晝夜不釋兵仗磔犬於門以竿懸羊皮於庭為厭勝契丹主謂晉羣臣曰自今不修甲兵不市戰馬輕賦省役天下太平矣廢東京降開封府為汴州尹為防禦使乙未契丹主改服中國衣冠百官起居皆如舊制趙延夀張礪共薦李崧之才㑹威勝節度使馮道自鄧州入朝契丹主素聞二人名皆禮重之未幾以崧為太子太師充樞宻使道守太傅於樞宻院祇候以備顧問契丹主分遣使者以詔書賜晉之藩鎮晉之藩鎮争上表稱臣被召者無不奔馳而至惟彰義節度使史匡威據涇州不受命匡威建瑭之子也雄武節度使何重建斬契丹使者以秦成階三州降蜀初杜重威既以晉軍降契丹契丹主悉収其鎧仗數百萬貯恒州驅馬數萬歸其國遣重威將其衆從已而南及河契丹主以晉兵之衆恐其為變欲悉以胡騎擁而納之河流或諫曰晉兵在它所者尚多彼聞降者盡死必皆拒命為患不若且撫之徐思其策契丹主乃使重威以其衆屯陳橋㑹乆雪官無所給士卒凍餒咸怨重威相聚而泣重威毎出道旁人皆罵之契丹主猶欲誅晉兵趙延夀言於契丹主曰皇帝親冐矢石以取晉國欲自有之乎將為它人取之乎契丹主變色曰朕舉國南征五年不解甲僅能得之豈為它人乎延夀曰晉國南有唐西有蜀常為仇敵皇帝亦知之乎曰知之延夀曰晉國東自沂宻西及秦鳯延袤數千里邊於吳蜀常以兵戍之南方暑濕上國之人不能居也它日車駕北歸以晉國如此之大無兵守之吳蜀必相與乘虛入冦如此豈非為它人取之乎契丹主曰我不知也然則奈何延夀曰陳橋降卒可分以戍南邊則吳蜀不能為患矣契丹主曰吾昔在上黨失於斷割悉以唐兵授晉既而返為仇讎北向與吾戰辛勤累年僅能勝之今幸入吾手不因此時悉除之豈可復留以為後患乎延夀曰曏留晉兵於河南不質其妻子故有此憂今若悉徙其家於恒定雲朔之間毎嵗分畨使戍南邊何憂其為變哉此上策也契丹主悅曰善惟大王所以處之由是陳橋兵始得免分遣還營癸夘晉主與李太后安太妃馮后及弟睿子延煦延寶俱北遷後宫左右從者百餘人契丹遣三百騎援送之又遣晉中書令趙瑩樞宻使馮玉馬軍都指揮使李彦韜與之俱晉主在塗供饋不繼或時與太后俱絶食舊臣無敢進謁者獨磁州刺史李糓迎謁於路相對泣下糓曰臣無狀負陛下因傾貲以獻晉主至中度橋見杜重威寨歎曰天乎我家何負為此賊所破慟哭而去契丹主以前燕京留守劉晞為西京留守永康王鄂約之弟留珪為義成節度使族人隆鄂特為鎮寧節度使鄂約姊婿潘實訥為横海節度使趙延夀之子匡賛為䕶國節度使漢將張彦超為雄武節度使史佺為彰義節度使客省副使劉晏僧為忠武節度使前䕶國節度使侯益為鳯翔節度使權知鳯翔府事焦繼勲為保大節度使晞涿州人也既而何重建附蜀史匡威不受代契丹勢稍沮晉主之絶契丹也匡國節度使劉繼勲為宣徽北院使頗預其謀契丹主入汴繼勲入朝契丹主責之時馮道在殿上繼勲急指道曰馮道為首相與景延廣實為此謀臣位卑安敢發言契丹主曰此叟非多事者勿妄引之命鎖繼勲將送黄龍府趙在禮至洛陽謂人曰契丹主嘗言莊宗之亂由我所致我此行良可憂契丹遣契丹將蘓葉奚王伊喇勃海將高謨翰戌洛陽在禮入謁拜於庭下伊喇等皆踞坐受之乙夘在禮至鄭州聞繼勲被鎖大驚夜自經於馬􅌴間契丹主聞在禮死乃釋繼勲繼勲憂憤而卒劉晞在契丹嘗為樞宻使同平章事至洛陽詬奚王曰趙在禮漢家大臣爾北方一酋長耳安得慢之如此立於庭下以挫之由是洛人稍安契丹主廣受四方貢獻大縱酒作樂毎謂晉臣曰中國事我皆知之吾國事汝曹弗知也趙延夀請給上國兵廩食契丹主曰吾國無此法乃縱胡騎四出以収馬為名分畨剽掠謂之打草糓丁壯斃於鋒刃老弱委以溝壑自東西兩畿及鄭滑曹濮數百里間財畜殆盡契丹主謂判三司劉昫曰契丹兵三十萬既平晉國應有優賜速宜營辦時府庫空竭昫不知所出請括借都城士民錢帛自將相以下皆不免又分遣使者數十人詣諸州括借皆迫以嚴誅人不聊生其實無所頒給皆蓄之内庫欲輦歸其國於是内外咸怨憤始患契丹皆思逐之矣初晉主與河東節度使中書令北平王劉知逺相猜忌雖以為北面行營都統徒尊以虚名而諸軍進止實不得預聞知逺因之廣募士卒陽城之戰諸軍散卒歸之者數千人又得吐谷渾財畜由是河東富彊冠諸鎮步騎至五萬人晉主與契丹結怨知逺知其必危而未嘗論諫契丹屢深入知逺初無邀遮入援之志及聞契丹入汴知逺分兵守四境以防侵軼遣客將安陽王峻奉三表詣契丹主一賀入汴二以太原夷夏雜居戍兵所聚未敢離鎮三以應有貢物值契丹將劉九一軍自土門西入屯於南川城中憂懼俟召還此軍道路始通可以入貢契丹主賜詔褒美及進畫親加兒字於知逺姓名之上仍賜以木柺胡法優禮大臣則賜之如漢賜几杖之比惟偉王以叔父之尊得之知逺又遣北都副留守太原白文珂入獻竒繒名馬契丹主知知逺觀望不至及文珂還使謂知逺曰汝不事南朝又不事北朝意欲何所俟邪蕃漢孔目官郭威言於知逺曰敵恨我深矣王峻言契丹貪殘失人心必不能乆有中國或勸知逺舉兵進取知逺曰用兵有緩有急當隨時制宜今契丹新降晉軍十萬虎據京邑未有它變豈可輕動哉且觀其所利止於貨財貨財既足必將北去況冰雪已消勢難乆留宜待其去然後取之可以萬全昭義節度使張從恩以地迫懐洛欲入朝於契丹遣使謀於知逺知逺曰我以一隅之地安敢抗天下之大君宜先行我當繼往從恩以為然判官高防諫曰公晉室懿親不可輕變臣節從恩不從左驍衞大將軍王守恩與從恩姻家時在上黨從恩以副使趙行遷知留後牒守恩權巡檢使與高防佐之遂行守恩建立之子也契丹主召晉百官悉集於庭問曰吾國廣大方數萬里有君長二十七人今中國之俗異於吾國吾欲擇一人君之如何皆曰天無二日夷夏之心皆願推戴皇帝如是者再契丹主乃曰汝曹既欲君我今兹所行何事為先對曰王者初有天下應大赦三月丁巳朔契丹主服通天冠絳紗袍登正殿設樂懸儀衛於庭百官朝賀華人皆法服北人仍國服立於文武班中間下制稱大遼㑹同十年大赦仍云自今節度使刺史毋得置牙兵市戰馬趙延夀以契丹主負約心怏怏令李崧言於契丹主曰漢天子所不敢望乞為皇太子崧不得已為言之契丹主曰我於燕王雖割吾肉有用於燕王吾無所愛然吾聞皇太子當以天子兒為之豈燕王所可為也因令為燕王遷官時契丹以恒州為中京翰林承旨張礪奏擬燕王中京留守大丞相録尚書事都督中外諸軍事樞密使如故契丹主取筆塗去録尚書事都督中外諸軍事而行之劉知逺聞何重建降蜀歎曰戎狄慿陵中原無主令藩鎮外附吾為方伯良可愧也於是將佐勸知逺稱尊號以號令四方觀諸侯去就知逺不許聞晉主北遷聲言欲出兵井陘迎歸晉陽丁夘命武節都指揮使榮澤史𢎞肇集諸軍於毬場告以出師之期軍士皆曰今契丹䧟京城執天子天下無主主天下者非我王而誰宜先正位號然後出師争呼萬嵗不已知逺曰敵勢尚彊吾軍威未振當且建功業士卒何知命左右遏止之己巳行軍司馬潞城張彦威等三上牋勸進知逺疑未決郭威與都押牙冠氏楊邠入說知逺曰今逺近之心不謀而同此天意也王不乘此際取之謙讓不居恐人心且移移則反受其咎知逺從之契丹以其將劉愿為保義節度副使陜人苦其暴虐奉國都頭王晏與指揮使趙暉都頭侯章謀曰今契丹亂華乃吾屬奮發之秋河東劉公威徳逺著吾輩若殺愿舉陜城歸之為天下唱取富貴如反掌耳暉等然之晏與壯士數人夜踰牙城入府出庫兵以給衆庚午旦斬愿首懸諸府門又殺契丹監軍奉暉為留後晏徐州暉澶州章太原人也辛未劉知逺即皇帝位自言未忍改晉國又惡開運之名乃更稱天福十二年壬申詔諸道為契丹括率錢帛者皆罷之其晉臣被迫脅為使者勿問令詣行在其餘契丹所在誅之甲戌帝自將東迎晉主及太后至夀陽聞已過恒州數日乃留兵戍承天軍而還晉主既出塞契丹無復供給從官宫女皆自采木實草葉而食之至錦州契丹令晉主及后妃拜契丹主按巴堅墓晉主不勝屈辱泣曰薛超誤我馮后陰令左右求毒藥欲與晉主俱自殺不果契丹主聞帝即位以通事耿崇美為昭義節度使高唐英為彰徳節度使崔廷勲為河陽節度使以控扼要害初晉置鄉兵號天威軍教習嵗餘村民不閑軍旅竟不可用悉罷之但令七戸輸錢十千其鎧仗悉輸官而無賴子弟不復肯復農業山林之盜自是而䌓及契丹入汴縱胡騎打草穀又多以其子弟及親信左右為節度使刺史不通政事華人之狡獪者多往依其麾下教之妄作威福掊斂貨財民不堪命於是所在相聚為盜多者數萬人少者不減千百攻䧟州縣殺掠吏民􅇭陽賊帥梁暉有衆數百送欵晉陽求效用帝許之磁州刺史李穀密通表於帝令暉襲相州暉偵知高唐英未至相州積兵器無守備丁丑夜遣壯士踰城入啓闗納其衆殺契丹數百其守將突圍走暉據州自稱留後表言其狀戊寅帝還至晉陽議率民財以賞將士夫人李氏諫曰陛下因河東創大業未有以惠澤其民而先奪其生生之資殆非新天子所以救民之意也今宫中所有請悉出之以勞軍雖復不厚人無怨言帝曰善即罷率民傾内府蓄積以賜將士中外聞之大悅李氏晉陽人也建雄留後劉在明朝于契丹以節度副使駱從朗知州事帝遣使者張晏洪等如晉州諭以已即帝位從朗皆囚之大將藥可儔殺從朗推晏洪權留後庚辰遣使以聞契丹主遣右諫議大夫趙熈使晉州括率錢帛徵督甚急從朗既死民相帥兵殺熈契丹主賜趙暉詔即以為保義留後暉斬契丹使者焚其詔遣支使河間趙矩奉表詣晉陽契丹遣其將高謨翰攻暉不克帝見矩甚善曰子挈咽喉之地以歸我天下不足定也矩因勸帝早引兵南向以副天下之望帝善之辛巳以暉為保義節度使侯章為鎮國節度使保義軍馬步都指揮使王晏為絳州防禦使保義軍馬步副都指揮使鎮寧節度使耶律隆鄂特性殘虐澶州人苦之賊帥王瓊帥其徒千餘人夜襲據南城北度浮航縱兵大掠圍隆鄂特於牙城契丹主聞之甚懼始遣天平節度使李守貞天雄節度使杜重威還鎮由是無乆留河南之意遣兵救澶州瓊退屯近郊遣其弟超奉表來求救癸未帝厚賜超遣還瓊兵败為契丹所殺契丹舒嚕太后遣使以其國中酒饌脯果賜契丹主賀平晉國契丹主與羣臣宴於永福殿東方羣盜大起䧟宋亳密三州契丹主謂左右曰我不知中國之人難制如此亟遣㤗寧節度使安審𤦺武寧節度使符彦卿等歸鎮仍以契丹兵送之彦卿至埇橋賊帥李仁恕帥衆數萬急攻徐州彦卿與數十騎至城下揚鞭欲招諭之仁恕控彦卿馬請從相公入城彦卿子昭序自城中遣軍校陳守習縋而出呼於賊中曰相公已䧟虎口聴相公助賊攻城城不可得也賊知不可刼乃相帥羅拜於彦卿馬前乞赦其罪彦卿與之誓乃解去三月丙戌朔契丹主服赭袍坐崇元殿百官行入閤禮戊子帝遣使以詔書安集農民保聚山谷避契丹之患者契丹主復召晉百官諭之曰天時向暑吾難乆留欲暫至上國省太后當留親信一人於此為節度使百官請迎太后契丹主曰太后族大如古栢根不可移也契丹主欲盡以晉之百官自隨或曰舉國北遷恐搖人心不如稍稍遷之乃詔有職事者從行餘留大梁復以汴州為宣武軍以蕭翰為節度使翰舒嚕太后之兄子其妺復為契丹主后翰始以蕭為姓自是契丹后族皆稱蕭氏壬寅契丹主發大梁晉文武諸司從者數千人諸軍吏卒又數千人宫女宦官數百人盡載府庫之寶以行所留樂器儀仗而已夕宿赤岡契丹主見村落皆空命有司發牓數百通所在招撫百姓然竟不禁胡騎剽掠丙午契丹自白馬渡河謂宣徽使高勲曰吾在上國以射獵為樂至此令人悒悒今得歸死無恨矣庚戌以皇弟北京馬步都指揮使崇行太原尹辛亥契丹主將攻相州梁暉請降契丹主赦之許以為防禦使暉疑其詐復乘城拒守夏四月己未未明契丹主命蕃漢諸軍急攻相州食時克之悉殺城中男子驅其婦女而北敵人擲嬰孩於空中舉刃接之以為樂留高唐英守相州唐英閱城中遺民男女得七百餘人其後節度使王繼𢎞斂城中髑髏瘞之凡得十餘萬或告磁州刺史李穀謀舉州應漢契丹主執而詰之穀不服契丹主引手於車中若取所獲文書者穀知其詐因請曰必有其驗乞顯示之凡六詰穀辭氣不屈乃釋之帝以從弟北京馬軍都指揮使信領義成節度使充侍衛馬軍都指揮使武節都指揮使史𢎞肇領忠武節度使充步軍都指揮使右都押牙楊邠權樞宻使蕃漢兵馬都孔目官郭威權副樞宻使兩使都孔目官南樂王章權三司使契丹主見所過城邑丘墟謂蕃漢羣臣曰致中國如此皆燕王之罪也顧張礪曰爾亦有力焉契丹昭義節度使耿崇美屯澤州將攻潞州乙丑詔史𢎞肇將步騎萬人救之帝聞契丹北歸欲經畧河南故以𢎞肇為前驅又遣閻萬進出北方以分契丹兵勢萬進并州人也契丹主以船數十艘載晉鎧仗將自汴泝河歸其國命寧國都虞候榆次武行徳將士卒千餘人部送之至河陰行徳與將士謀曰今為敵所制將逺去鄉里人生會有死安能為異域之鬼乎敵勢不能乆留中國不若共逐其黨堅守河陽以俟天命之所歸者而臣之豈非長策乎衆以為然行徳即以鎧仗授之相與殺契丹監軍使㑹契丹河陽節度使崔廷勲以兵送耿崇美之潞州行徳遂乘虚入據河陽衆推行徳為河陽都部署行徳遣弟行友奉蠟表間道詣晉陽契丹遣武定節度使方太詣洛陽巡檢至鄭州州有戍兵共迫太為鄭王梁嗣宻王朱乙逃禍為僧嵩山賊帥張遇得之立以為天子取嵩岳神衮冕以衣之帥衆萬餘襲鄭州太擊走之太以契丹尚彊恐事不濟說諭戍兵欲與之俱西衆不從太自西門逃奔洛陽戍兵既失太反譖太於契丹云脅我為亂太遣子師朗自訴於契丹契丹將滿達殺之太無以自明㑹羣盜攻洛陽契丹留守劉晞棄城奔許州太乃入府行留守事與巡檢使潘環擊羣盜却之張遇殺朱乙請降伊闕賊帥自稱天子誓衆於南郊壇將入洛陽太逆擊走之太欲自歸於晉陽武行徳使人誘太曰我禆校也公舊鎮此地今虚位相待太信之至河陽為行徳所殺蕭翰遣高謨翰援送劉晞自許還洛陽晞疑潘環構其衆逐已使謨翰殺之戊辰武行友至晉陽庚午史𢎞肇奏遣先鋒將馬誨擊契丹斬首千餘級時耿崇美崔廷勲至澤州聞𢎞肇兵已入潞州不敢進引兵而南𢎞肇遣誨追擊破之崇美廷勲與奚王伊喇退保懷州辛未以武行徳為河陽節度使契丹主聞河陽亂嘆曰我有三失宜天下之叛我也諸道括錢一失也令上國人打草穀二失也不早遣諸節度使還鎮三失也契丹主至臨城得疾及欒城病甚苦熱聚冰於胷腹手足且啖之丙子至殺胡林而卒國人剖其腹實鹽數斗載之北去晉人謂之帝羓趙延夀恨契丹主負約謂人曰我不復入龍沙矣即日先引兵入恒州契丹永康王鄂約及南北二王各以所部兵相繼而入延夀欲拒之恐失大援乃納之時契丹諸將已宻議奉鄂約為主鄂約登鼓角樓受叔兄拜而延夀不之知自稱受契丹皇帝遺詔權知南朝軍國事仍下教布告諸道所以供給鄂約與諸將同鄂約衘之恒州諸門管鑰及倉庫出納鄂約皆自主之延夀使人請之不與契丹主喪至國舒嚕太后不哭曰待諸部寧壹如故則葬汝矣帝之自夀陽還也留兵千人戍承天軍戍兵聞契丹北還不為備契丹襲擊之戍兵驚潰契丹焚其市邑一日狼煙百餘舉帝曰此敵將遁張虚勢也遣親將葉仁魯將步騎三千赴之㑹契丹出剽掠仁魯乘虚大破之丁丑復取承天軍或說趙延夀曰契丹諸大人數日聚謀此必有變今漢兵不減萬人不若先事圖之延夀猶豫不決壬午延夀下令以來月朔日於待賢館上事受文武官賀其儀宰相樞宻使拜於階上節度使以下拜於階下李崧以敵意不同事理難測固請趙延夀未行此禮乃止五月乙酉朔永康王鄂約召延夀及張礪和凝李崧馮道於所館飲酒鄂約妻素以兄事延夀鄂約從容謂延夀曰妺自上國來寧欲見之乎延夀欣然與之俱入良乆鄂約出謂礪等曰燕王謀反適已鎖之矣又曰先帝在汴時遺我一籌許我知南朝軍國近者臨崩别無遺詔而燕王擅自知南朝軍國豈理邪下令延夀親黨皆釋不問間一日鄂約至待賢館受蕃漢官謁賀笑謂張礪等曰燕王果於此禮上吾以鐵騎圍之諸公亦不免矣後數日集蕃漢之臣於府署宣契丹主遺制其畧曰永康王大聖皇帝之嫡孫人皇王之長子太后鍾愛羣情允歸可於中京即皇帝位於是始舉哀成服帝集羣臣庭議進取諸將咸請出師井陘次取鎮魏先定河北則河南拱手自服帝欲自石㑹趨上黨郭威曰敵主雖死敵衆猶盛各據堅城我出河北兵少路迂傍無應援若羣敵合勢共擊我軍進則遮前退則邀後糧餉路絶此危道也上黨山路險澁粟少民殘無以供億亦不可由近者陜晉二鎮相繼欵附引兵從之萬無一失不出兩旬洛汴定矣帝曰卿言是也蘇逢吉等曰史𢎞肇大軍已屯上黨羣敵繼遁不若出天井抵孟津為便司天奏太嵗在午不利南行宜由晉絳抵陜帝從之辛夘詔以十二日發北京告諭諸道甲午以太原尹崇為北京留守以趙州刺史李存瓌為副留守河東幕僚真定李驤為少尹牙將太原蔚進為馬步指揮使以佐之存瓌唐莊宗之從弟也丙申帝發太原自隂地闗出晉絳丁酉史𢎞肇奏克澤州始𢎞肇攻澤州刺史翟令竒固守不下帝以𢎞肇兵少欲召還蘇逢吉楊邠曰今陜晉河陽皆已向化崔廷勲耿崇美朝夕遁去若召𢎞肇還則河南人心動搖敵勢復壯矣帝未決使人諭指於𢎞肇曰兵已及此勢若破竹可進不可退與逢吉等議合帝乃從之𢎞肇遣部將李萬超說令竒令竒乃降𢎞肇以萬超權知澤州崔廷勲耿崇美奚王伊喇合兵逼河陽張遇帥衆數千救之戰於南阪敗死武行徳出戰亦敗閉城自守伊喇欲攻之廷勲曰今北軍已去得此何用且殺一夫猶可惜况一城乎聞𢎞肇已得澤州乃釋河陽還保懷州𢎞肇將至廷勲等擁衆北遁過衛州大掠而去契丹在河南者相繼北去𢎞肇引兵與武行徳合𢎞肇為人沈毅寡言御衆嚴整將校小不從命立撾殺之士卒所過犯民田及繫馬於樹者皆斬之軍中惕息莫敢犯令故所向必克帝自晉陽安行入洛及汴兵不血刃皆𢎞肇之力也帝由是倚愛之辛丑帝至霍邑甲辰帝至晉州帝之即位也絳州刺史李從朗與契丹將成霸卿等拒命帝遣西南面招討使䕶國節度使白文珂攻之未下帝至城下命諸軍四布而勿攻以利害諭之戊申從朗舉城降帝命親將分䕶諸門士卒一人毋得入以偏將薛瓊為防禦使辛亥帝至陜州趙暉自御帝馬而入壬子至石濠汴人有來迎者六月乙夘帝至新安西京留司官悉來迎丙辰帝至洛陽入居宫中汴州百官奉表來迎詔諭以受契丹補署者皆勿自疑聚其告牒而焚之趙逺更名上交命鄭州防禦使郭從義先入大梁清宫宻令殺李從益及王淑妃淑妃且死曰吾兒為契丹所立何罪而死何不留之使毎嵗寒食以一盂麥飯洒明宗陵乎聞者泣下戊午帝發洛陽辛酉汴州百官竇貞固等迎於滎陽甲子帝至大梁晉之藩鎮相繼來降戊辰帝下詔大赦凡契丹所除節度使下至將吏各安職任不復變更復以汴州為東京改國號曰漢仍稱天福年曰余未忍忘晉也復青襄汝三節度秋閏七月庚辰制建宗廟太祖高皇帝世祖光武皇帝皆百世不遷又立四親廟追尊諡號凡六廟三叛連兵後漢高祖天福十二年夏五月乙酉朔契丹永康王鄂約囚趙延夀於恒州辛丑帝遣使諭河中節度使趙匡賛仍以契丹囚其父延夀告之秋七月或傳趙延夀已死郭威言於帝曰趙匡賛契丹所署今猶在河中宜遣使弔祭因起復移鎮彼既家國無歸必感恩承命從之㑹鄴都留守天雄節度使兼中書令杜重威天平節度使兼侍中李守貞皆奉表歸命重威仍請移它鎮歸徳節度使兼中書令高行周入朝丙申徙重威為歸徳節度使以行周代之守貞為䕶國節度使加兼中書令徙䕶國節度使趙匡賛為晉昌節度使後二年延夀始卒於契丹杜重威自以附契丹負中國内常疑懼及移鎮制下復拒而不受遣其子𢎞璲質於滿達以求援趙延夀有幽州親兵二千在恒州指揮使張璉將之重威請以守魏滿達遣其將楊衮將契丹千五百人及幽州兵赴之閏月庚午詔削奪重威官爵以高行周為招討使鎮寧節度使慕容彦超副之以討重威慕容彦超欲急攻城行周欲緩之由是二將不協帝恐生它變欲自將擊重威九月戊寅詔幸澶魏勞軍庚辰帝發大梁晉昌節度使趙匡賛恐終不為朝廷所容冬十月遣使降蜀請自終南山路出兵應援帝至鄴都遣給事中陳觀往諭指重威復閉門拒之城中食浸竭將士多出降者慕容彦超固請攻城帝從之丙午親督諸將攻城自寅至辰士卒傷者萬餘人死者千餘人不克而止彦超乃不敢復言初契丹留幽州兵千五百人戍大梁帝入大梁或告幽州兵將為變帝盡殺之於繁臺之下及圍鄴都張璉將幽州兵二千助重威拒守帝屢遣人招諭許以不死璉曰繁臺之卒何罪而戮今守此以死為期耳由是城乆不下十一月丙辰内殿直韓訓獻攻城之具帝曰城之所恃者衆心耳衆心茍離城無所保用此何為杜重威之叛也觀察判官金鄉王敏屢泣諫不聴及食竭力盡甲戍遣敏奉表出降乙亥重威子𢎞璉來見丙子妻石氏來見石氏即晉之宋國長公主也帝復遣入城丁丑重威開門出降城中餒死者什七八其存者皆尫瘠無人狀張璉先邀朝廷信誓詔許以歸鄉里及出降殺璉等將校數十人縱其士卒北歸將出境大掠而去郭威請殺重威牙將百餘人并重威家貲籍之以賞戰士從之以重威為太傅兼中書令楚國公重威毎出入路人往往擲瓦礫詬之臣光曰漢髙祖殺幽州無辜千五百人非仁也誘張璉而誅之非信也杜重威罪大而赦之非刑也仁以合衆信以行令刑以懲姦失此三者何以守國其祚運之不延也宜哉冬十二月丙戌帝發鄴都蜀主遣雄武都押牙吳崇惲以樞宻使王處囘書招鳯翔節度使侯益庚寅以山南西道節度使兼中書令張䖍釗為北面行營招討安撫使雄武節度使何重建副之宣徽使韓保貞為都虞候共將兵五萬䖍釗出散闗重建出隴州以擊鳯翔奉鑾肅衛都虞候李廷珪將兵二萬出子午谷以援長安諸軍發成都旌旗數十里癸巳帝至大梁侯益請降於蜀使吳崇惲持兵籍粮帳西還與趙匡賛同上表請出兵平定闗中乾祐元年春正月帝以趙匡賛侯益與蜀兵共為冦患之㑹囘鶻入貢訴稱為党項所阻乞兵應接詔右衛大將軍王景崇將軍齊藏珍將禁軍數千赴之因使之經略闗西晉昌節度判官李恕乆在趙延夀幕下延夀使之佐匡賛匡賛將入蜀恕諫曰燕王入朝豈所願哉今漢家新得天下方務招懷若謝罪歸朝必保富貴入蜀非全計也蹄涔不容尺鯉公必悔之匡賛乃遣恕奉表請入朝景崇等未行而恕至帝問恕匡賛何為附蜀對曰匡賛自以身受敵官父在敵廷恐陛下未之察故附蜀求茍免耳臣以為國家必應存撫故遣臣來祈哀帝曰匡賛父子本吾人也不幸陷敵今延夀方墜檻穽吾何忍更害匡賛乎即聽其入朝侯益亦請赴二月四日聖夀節上夀景崇等將行帝召入臥内敇之曰匡賛益之心皆未可知汝至彼彼已入朝則勿問若尚遷延顧望當以便宜從事趙匡賛不俟李恕返命已離長安丙子入見王景崇等至長安聞蜀兵已入秦州以兵少發本道及趙匡賛牙兵千餘人同拒之景崇恐匡賛牙兵亡逸欲文其面㣲露風旨軍校趙思綰首請自文其面以帥下景崇悅齊藏珍竊言曰思綰凶暴難制不如殺之景崇不聽思綰魏州人也蜀李廷珪將至長安聞趙匡賛已入朝欲引歸王景崇邀之敗廷珪於子午谷張䖍釗至寶鷄諸將議不協按兵未進侯益聞廷珪西還因閉壁拒蜀兵䖍釗勢孤引兵夜遁景崇帥鳯翔隴邠涇鄜坊之兵追敗蜀兵於散闗俘將卒四百人丁丑帝殂秘不發喪庚辰下詔稱重威父子因朕小疾謗議搖衆并其子𢎞璋𢎞璉𢎞璨皆斬之二月辛巳發喪宣遺制皇子承祐即皇帝位詔以王景崇兼鳯翔巡檢使景崇引兵至鳯翔侯益尚未行景崇以禁兵分守諸門或勸景崇殺益景崇以受先朝宻旨嗣主未之知或疑於専殺猶豫未決益聞之不告景崇而去景崇悔自詬戊戌益入朝隠帝問何故召蜀軍對曰臣欲誘致而殺之帝哂之二月侯益家富於財厚賂執政由是大臣争譽之丙寅以益兼中書令行開封尹侯益盛毁王景崇於朝言其恣横景崇聞益尹開封知事已變内不自安且怨朝廷㑹詔遣供奉官王益如鳯翔徵趙匡賛牙兵詣闕趙思綰等甚懼景崇因以言激之思綰途中謂其黨常彦卿曰小太尉已落其手吾屬至京師并死矣奈何彦卿曰臨機制變子勿復言癸酉至長安永興節度副使安友規巡檢喬守湿出迎王益置酒於客亭思綰前白曰壕寨使已定舍館於城東今將士家屬皆在城中欲各入城挈家詣城東宿友規等然之時思綰等皆無鎧仗既入西門有州校坐門側思綰遽奪其劒斬之其徒因大譟持白梃殺守門者十餘人分遣其黨守諸門思綰入府開庫取鎧仗給之友規等皆逃去思綰遂據城集城中少年得四千餘人繕城隍葺樓堞旬日間戰守之具皆備王景崇諷鳯翔吏民表景崇知軍府事朝廷患之甲戌徙静難節度使王守恩為永興節度使徙保義節度使趙暉為鳯翔節度使竝同平章事以景崇為邠州留後令便道之官虢州伶人靖邊庭殺團練使田令方驅掠州民奔趙思綰至潼闗潼闗守將出擊之其衆皆潰丁丑邠涇同華四鎮俱上言䕶國節度使兼中書令李守貞與永興鳯翔同反始守貞聞杜重威死而懼陰有異志自以晉世嘗為上將有戰功素好施得士卒心漢室新造天子年少初立執政皆後進有輕朝廷之志乃招納亡命養死士治城塹繕甲兵晝夜不息遣人間道齎蠟丸結契丹屢為邊吏所獲浚儀人趙修已素善術數自守貞鎮滑州署司户參軍累從移鎮為守貞言時命不可勿妄動前後切諫非一守貞不聽乃稱疾歸鄉里僧總倫以術媚守貞言其必為天子守貞信之又嘗㑹將佐置酒引弓指䑛掌虎圖曰吾有非常之福當中其舌一發中之左右皆賀守貞益自負會趙思綰據長安奉表獻御衣於守貞守貞自謂天人協契乃自稱秦王遣其驍將平陸王繼勲將兵據潼闗以思綰為晉昌節度使同州距河中最近匡國節度使張彦威常詗守貞所為奏請先為之備詔滑州馬軍都指揮使羅金山將部兵戍同州故守貞起兵同州不為所併金山雲州人也夏四月以鎮寧節度使郭從義充永興行營都部署將侍衛兵討趙思綰戊子以保義節度使白文珂為河中行營都部署内客省使王峻為都監辛夘削奪李守貞官爵命文珂等㑹兵討之乙未以寧江節度使侍衛步軍都指揮使尚洪遷為西面行營都虞候王景崇遷延不之邠州閱集鳯翔丁壯詐言討趙思綰仍牒邠州㑹兵王景崇遺蜀鳯州刺史徐彦書求通互市壬戌蜀主使彦復書招之六月乙酉王景崇遣使請降于蜀亦受李守貞官爵西面行營都虞候尚洪遷攻長安重傷而卒秋七月鳯翔節度使趙暉至長安乙亥表王景崇反狀益明請進兵擊之自河中永興鳯翔三鎮拒命以來朝廷繼遣諸將討之昭義節度使常思屯潼闗白從珂屯同州趙暉屯咸陽惟郭從義王峻置柵近長安而二人相惡如水火自春徂秋皆相仗莫肯攻戰帝患之欲遣重臣臨督八月壬午以郭威為西面軍前招諭安撫使諸軍皆受威節度威將行問策於太師馮道道曰守貞自謂舊將為士卒所附願公勿愛官物以賜士卒則奪其所恃矣威從之由是衆心始附於威詔白文珂趣河中趙暉趣鳯翔戊子蜀改鳯翔曰岐陽軍己丑以王景崇為岐陽節度使同平章事郭威與諸將議攻討諸將欲先取長安鳯翔鎮國節度使扈彦珂曰今三叛連衡推守貞為主守貞亡則兩鎮自破矣若捨近而攻逺萬一王趙拒吾前守貞掎吾後此危道也威善之於是威自陜州白文珂及寧江節度使侍衛歩軍都指揮使劉詞自同州常思自潼闗三道攻河中威撫養士卒與同苦樂小有功輒厚賞之微有傷常親視之士無賢不肖有所陳啟皆温辭色而受之違忤不怒小過不責由是將卒咸歸心於威始李守貞以禁軍皆嘗在麾下受其恩施又士卒素驕苦漢法之嚴謂其至則叩城奉迎可坐而待之既而士卒新受賜於郭威皆忘守貞舊恩己亥至城下揚旗伐鼓踊躍詬譟守貞視之失色白文珂克西闗城柵於河西常思柵於城南威柵於城西未幾威以常思無將領才先遣歸鎮諸將欲急攻城威曰守貞前朝宿將健鬭好施屢立戰功況城臨大河樓堞完固未易輕也且彼馮城而鬭吾仰而攻之何異帥士卒投湯火乎夫勇有盛衰攻有緩急時有可否事有後先不若且設長圍而守之使飛走路絶吾洗兵牧馬坐食轉輸温飽有餘俟城中無食公帑家財皆竭然後進梯衝以逼之飛書檄以招之彼之將士脫身逃死父子且不相保況烏合之衆乎思綰景崇但分兵縻之不足慮也乃發諸州民夫二萬餘人使白文珂等帥之刳長壕築連城列隊伍而圍之威又謂諸將曰守貞鄉畏高祖不敢鴟張以我輩崛起太原事功未著有輕我心故敢反耳正宜静以制之乃偃旗臥鼔但循河設火鋪連延數十里畨步卒以守之遣水軍艤舟於岸冦有潜往來者無不擒之於是守貞如坐網中矣九月蜀兵援王景崇軍于散闗趙暉遣都監李彦從襲擊破之蜀兵遁去王景崇盡殺侯益家屬七十餘人益子前天平行軍司馬仁矩先在外得免庚申以仁矩為隰州刺史仁矩子延廣尚在襁褓乳母劉氏以己子易之抱延廣而逃乞食至于大梁歸于益家李守貞屢出兵欲突長圍皆敗而返遣人齎蠟丸求救於唐蜀契丹皆為邏者所獲城中食且盡殍死者日衆守貞憂形於色召總倫詰之總倫曰大王當為天子人不能奪但此分野有災待磨滅將盡只餘一人一騎乃大王鵲起之時也守貞猶以為然冬十月王景崇遣其子徳讓趙思綰遣其子懷乂見蜀主于成都戊寅景崇遣兵出西門趙暉擊破之遂取西闗城景崇退守大城暉塹而圍之數挑戰不出暉潜遣千餘人擐甲執兵效蜀旗幟循南山而下令諸軍聲言蜀兵至矣景崇果遣兵數千出迎之暉設伏掩擊盡殪之自是景崇不復敢出蜀主遣山南西道節度使安思謙將兵救鳯翔左僕射兼門下侍郎同平章事毋昭裔上疏諌曰臣竊見莊宗皇帝志貪西顧前蜀主意欲北行凡在庭臣皆貢諫䟽殊無聴納有何所成只此兩朝可為鑒誡不聴又遣雄武節度使韓保貞引兵出汧陽以分漢兵之勢王景崇遣前義成節度使酸棗李彦舜等逆蜀兵丙申安思謙屯右界漢兵屯寶雞思謙遣眉州刺史申貴府兵二千趣模壁設伏於竹林丁酉旦貴以兵數百壓寶雞而陳漢兵逐之遇伏而敗蜀兵遂北破寶雞寨蜀兵去漢兵復入寶雞己亥思謙進屯渭水漢益兵五千戍寶雞思謙畏之謂衆曰糧少敵强宜更為後圖辛丑退屯鳯州尋歸興元貴潞州人也彰武節度使高允權與定難節度使李彛殷有隙李守貞宻求援於彛殷發兵屯延丹境上聞官軍圍河中乃退甲辰允權以其狀聞彛殷亦自訴朝廷和解之初沈丘人舒元嵩山道士楊訥俱以遊客干李守貞守貞為漢所攻遣元更姓朱訥更姓李名平間道奉表求救於唐唐諌議大夫查文徽兵部侍郎魏岑請出兵應之唐主命北面行營招討使李金全將兵救河中以清淮節度使劉彦貞副之文徽為監軍使岑為沿淮巡檢使軍于沂州之境金全與諸將方㑹食候騎白有漢軍數百在澗北皆羸弱請掩之金全令曰敢言過澗者斬及暮伏兵四起金鼓聞十餘里金全曰卿可與之戰乎時唐士卒厭兵莫有鬭志又河中道逺勢不相及十一月丙寅唐兵退保海州唐主遺帝書謝請復通商旅且請赦守貞朝廷不報王景崇累表告急於蜀蜀主命安思謙再出兵救之十二月壬午思謙自興元引兵屯鳯州請先運糧四十萬斛乃可出境蜀主曰觀思謙之志安肯為朕進取然亦發興州興元米數萬斛以饋之戊子思謙進屯散闗遣馬步使高彦儔眉州刺史申貴擊漢箭筈安都寨破之庚寅思謙敗漢兵於玉女潭漢兵退屯寶雞思謙進屯模壁韓保貞出新闗壬辰軍于隴州神前漢兵不出保貞亦不敢進趙暉告急於郭威威自往赴之時李守貞遣副使周光遜禆將王繼勲聶知遇守城西威戒白文珂劉詞曰賊茍不能突圍終為我擒萬一得出則吾不得復留於此成敗之機於是乎在賊之驍銳盡在城西我去必來突圍爾曹謹備之威至華州聞蜀兵食盡引去威乃還韓保貞聞安思謙去亦退保弓川寨隠帝乾祐二年春正月郭威將至河中白文珂出迎之戊申夜李守貞遣王繼勲等引精兵千餘人循河而南襲漢柵坎岸而登遂入之縱火大譟軍中狼狽不知所為劉詞神色自若下令曰小盗不足驚也帥衆擊之客省使閻晉卿曰賊甲皆黄紙為火所照易辨耳奈衆無鬭志何禆將李韜曰安有無事食君禄有急不死鬭者邪援矟先進衆從之河中兵退走死者七百人繼勲重傷僅以身免己酉郭威至劉詞迎馬首請罪威厚賞之曰吾所憂正在於此㣲兄健鬭幾為敵嗤然敵技殫於此矣晉卿忻州人也守貞之欲攻河西柵也先遣人出酤酒於村墅或貰與不責其直邏騎多醉由是河中兵得潜行入寨幾至不守郭威乃下令將士非犒宴無得私飲愛將李審晨飲少酒威怒曰汝為吾帳下首違軍令何以齊衆立斬以狥詔以静州隸定難軍二月辛未李彛殷上表謝彛殷以中原多故有輕傲之志毎藩鎮有叛者常隂助之邀其重賂朝廷知其事亦以恩澤羈縻之夏四月河中城中食且盡民餓死者付五六癸夘李守貞出兵五千餘人齎梯橋分五道以攻長圍之西北隅郭威遣都監吳䖍裕引兵横擊之河中兵敗走殺傷大半奪其攻具五月丙午守貞復出兵又敗之擒其將魏延朗鄭賓壬子周光遜王繼勲聶知遇帥其衆千餘人來降守貞將士降者相繼威乘其離散庚申督諸軍百道攻之趙思綰好食人肝嘗面剖而膾之膾盡人猶未死又好以酒吞人膽謂人曰吞此千枚則膽無敵矣及長安城中食盡取婦女幼稚為軍糧日計數而給之毎犒軍輒屠數百人如羊豕法思綰計窮不知所出郭從義使人誘之初思綰少時求為左驍衛上將軍致仕李肅僕肅不納曰是人目亂而語誕它日必為叛臣肅妻張氏全義之女也曰君今拒之後且為患乃厚以金帛遺之及思綰據長安肅閒居在城中思綰數就見之拜伏如故禮肅曰是子亟來且汙我欲自殺妻曰曷若勸之歸國㑹思綰問自全之計肅乃與判官程讓能說思綰曰公本與國家無嫌但懼罪耳今國家三道用兵俱未有功若以此時翻然改圖朝廷必喜自可不失富貴孰與坐而待斃乎思綰從之遣使詣闕請降乙丑以思綰為華州留後都指揮使常彦卿為虢州刺史令便道之官秋七月甲辰趙思綰釋甲出城受詔郭從義以兵守其南門復遣還城思綰求其牙兵及鎧仗從義亦給之思綰遷延収斂財賄三改行期從義等疑之密白郭威請圖之威許之壬子從義與都監南院宣徽使王峻按轡入城處于府舍召思綰酌别因執之并常彦卿及其父兄部曲三百人皆斬於市甲寅郭威攻河中克其外郭李守貞収餘衆退保子城諸將請急攻之威曰夫鳥窮則啄況一軍乎涸水取魚安用急為壬戌李守貞與妻及子崇勲等自焚威入城獲其子崇玉等及所署宰相靖􅀈孫愿樞宻使劉内國師總倫等送大梁磔於市徵趙修已為翰林天文威閱守貞文書得朝廷權臣及藩鎮與守貞交通書詞意悖逆欲奏之袐書郎榆次王溥諫曰魑魅乘夜争出見日自消願一切焚之以安反側威從之戊辰加永興節度使郭從義同平章事徙鎮國節度使扈彦珂為䕶國節度使以河中行營馬步都虞候劉詞為鎮國節度使八月戊戌郭威至大梁入見帝勞之賜金帛衣服玉帶鞍馬辭曰臣受命期年僅克一城何功之有且臣將兵在外凡鎮安京師供億所須使兵食不乏皆諸大臣居中者之力也臣安敢獨膺此賜請徧賞之又議加領方鎮辭曰楊邠位在臣上未有茅土且帷幄之臣不可以𢎞肇為比九月壬寅徧賜宰相樞密宣徽三司侍衞使九人與威如一帝欲特賞威辭曰運籌建畫出於廟堂發兵饋糧資於藩鎮暴露戰鬭在於將士而功獨歸臣臣何以堪之乙巳加威兼侍中史𢎞肇兼中書令辛亥加竇貞固司徒蘇逢吉司空蘇禹珪左僕射楊邠右僕射諸大臣議以朝廷執政溥加恩恐藩鎮觖望乙夘加天雄節度使高行周守太師山南東道節度使安審𤦺守太傅泰寧節度使符彦卿守太保河東節度使劉崇兼中書令己未加忠武節度使劉信天平節度使慕容彦超平盧節度使劉銖竝兼侍中辛酉加朔方節度使馮暉定難節度使李彛殷兼中書令冬十月壬申加義武節度使孫方簡武寧節度使劉贇同平章事壬午加吳越王𢎞俶尚書令楚王希廣太尉丙戌加荆南節度使高保融兼侍中議者以郭威不專有其功推以分人信為美矣而國家爵位以一人立功而覃及天下不亦濫乎初邢州人周璨為諸衛將軍罷秩無依從王景崇西征景崇叛遂為謀主趙暉急攻鳯翔周璨謂王景崇曰公曏與蒲雍相表裏今二鎮已平蜀兒不足恃不如降也景崇曰善吾更思之後數日外攻轉急景崇謂其黨曰事窮矣吾欲為急計乃謂其將公孫輦張思練曰趙暉精兵多在城北來日五鼓前爾二人燒城東門詐降勿令冦入吾與周璨以牙兵出北門突暉軍縱無成而死猶勝束手皆曰善癸巳未明輦思練燒東門請降府牙火亦發二將遣人詗之景崇已與家人自焚矣璨亦降通鑑紀事本末卷四十二上欽定四庫全書通鑑紀事本末卷四十二下宋袁樞撰郭威篡漢劉旻據河東附後漢高祖乾祐元年帝自魏王承訓卒悲痛過甚春正月甲子始不豫丁丑帝大漸召蘇逢吉楊邠史𢎞肇郭威入受顧命曰承祐幼弱後事託在卿輩是日帝殂二月辛巳朔立皇子左衛大將軍大内都㸃檢承祐為周王同平章事宣遺制令周王即皇帝位丁亥尊皇后曰皇太后蘇逢吉等為相多遷補官吏楊邠以為虚費國用所奏多抑之逢吉等不悅三月中書侍郎兼戸部尚書同平章事李濤上疏言今闗西紛擾外禦為急二樞宻皆佐命功臣官雖貴而家未富宜授以要害大鎮樞機之務在陛下目前易以裁决逢吉禹珪自先帝時任事皆可委也楊邠郭威聞之見太后泣訴稱臣等從先帝起艱難中今天子聽人言欲棄之於外況闗西方有事臣等何忍自取安逸不顧社稷若臣等必不任職乞留過山陵太后怒以讓帝曰國家勲舊之臣奈何聴人言而逐之帝曰此宰相所言也因詰責宰相濤曰此疏臣獨為之它人無預丁丑罷濤政事勒歸私第夏四月帝與左右謀以太后怒李濤離間欲更進用二樞密以明非帝意左右亦疾二蘇之専欲奪其權共勸之壬午制以樞宻使楊邠為中書侍郎兼吏部尚書同平章事樞宻使如故以副樞宻使郭威為樞宻使又加三司使王章同平章事凡中書除官諸司奏事帝皆委邠斟酌自是三相拱手政事盡決於邠事有未經邠所可否者莫敢施行遂成凝滯三相毎進擬用人茍不出邠意雖簿尉亦不之與邠素不喜書生常言國家府廩實甲兵彊乃為急務至於文章禮樂何足介意既恨二蘇排己以其除官太濫為衆所非欲矯其弊由是艱於除拜士大夫往徃有自漢興至亡不霑一命者凡門廕及百司入仕悉罷之雖由邠之愚蔽時人亦咎二蘇之不公所致云秋七月庚申加樞宻使郭威同平章事隠帝乾祐二年三叛既平帝浸驕縱與左右狎暱飛龍使瑕丘後匡賛茶酒使太原郭允明以諂媚得幸帝好與之為廋辭醜語太后屢戒之帝不以為意七月太常卿張昭上言宜親近儒臣講習經訓不聽昭即昭逺避高祖諱改之三年夏四月楊邠求解樞密使帝遣中使諭止之宣徽北院使吳䖍裕在旁曰樞密重地難以乆居當使後來者迭為之相公辭之是也帝聞之不悅辛巳以䖍裕為鄭州防禦使朝廷以契丹近入侵横行河北諸藩鎮各自守無扞禦之者議以郭威鎮鄴都使督諸將以備契丹史𢎞肇欲威仍領樞宻使蘇逢吉以為故事無之𢎞肇曰領樞宻使則可以便宜從事諸軍畏服號令行矣帝卒從𢎞肇議𢎞肇怨逢吉異議逢吉曰以内制外順也今反以外制内其可乎壬午制以威為鄴都留守天雄節度使樞宻使如故仍詔河北兵甲錢穀但見郭威文書立皆稟應明日朝貴㑹飲於竇貞固之第𢎞肇舉大觴屬威厲聲曰昨日廷議一何同異今日為弟飲之逢吉與楊邠亦舉觴曰是國家之事何足介意𢎞肇又厲聲曰安定國家在長槍大劒安用毛錐王章曰無毛錐則財賦何從可出自是將相始有隙壬辰以左監門衛將軍郭榮為貴州刺史天雄牙内都指揮使榮本姓柴父守禮郭威之妻兄也威未有子時養以為子五月庚子郭威辭行言於帝曰太后從先帝乆多厯天下事陛下富於春秋有事宜稟其教而行之親近忠直放逺讒邪善惡之間所宜明審蘇逢吉楊邠史𢎞肇皆先帝舊臣盡忠狥國願陛下推心任之必無敗失至於疆場之事臣願竭其愚駑庶不負驅策帝斂容謝之癸丑王章置酒㑹諸朝貴酒酣為手勢令史𢎞肇不閑其事客省使閻晉卿坐次𢎞肇屢教之蘇逢吉戲之曰旁有姓閻人何憂罰爵𢎞肇妻閻氏本酒家倡也意逢吉譏之大怒以醜語詬逢吉逢吉不應𢎞肇欲毆之逢吉起去𢎞肇索劒欲追之楊邠泣止之曰蘇公宰相公若殺之置天子何地願熟思之𢎞肇即上馬去邠與之聮鑣送至其第而還於是將相如水火矣帝使宣徽使王峻置酒和解之不能得逢吉欲求出鎮以避之既而中止曰吾去朝廷止煩史公一處分吾虀粉矣王章亦忽忽不樂欲求外官楊史固止之帝自即位以來樞宻使右僕射同平章事楊邠總機政樞宻使兼侍中郭威主征伐歸徳節度使侍衛親軍都指揮使兼中書令史𢎞肇典宿衛三司使同平章事王章掌財賦邠頗公忠退朝門無私謁雖不却四方饋遺有餘輒獻之𢎞肇督察京城道不拾遺是時承契丹蕩覆之餘公私困竭章招摭遺利吝於出納以實府庫屬三叛連衡宿兵累年而供饋不乏及事平賜予之外尚有餘積以是國家粗安章聚斂刻急舊制田稅毎斛更輸二升謂之雀鼠耗章始令更輸二升謂之省耗舊錢出入皆以八十為陌章始令入者八十出者七十七謂之省陌有犯鹽礬酒麴之禁者錙銖㳙滴罪皆死由是百姓愁怨章尤不喜文臣嘗曰此輩授之握筭不知縱横何益於用俸禄皆以不堪資軍者給之吏已高其估章更増之帝左右嬖佞浸用事太后親戚亦干預朝政邠等屢裁抑之太后有故人子求補軍職𢎞肇怒而斬之武徳使李業太后之弟也高祖使掌内帑帝即位尤䝉寵任㑹宣徽使闕業意欲之帝及太后亦諷執政邠𢎞肇以為内使遷補有次不可以外戚超居乃止内客省使閻晉卿次當為宣徽使乆而不補樞密承旨聶文進飛龍使後匡賛翰林茶酒使郭允明皆有寵於帝乆不遷官共怨執政文進并州人也平盧節度使劉銖罷青州歸乆奉朝請未除官常㦸手於執政帝初除三年喪聽樂賜伶人錦袍玉帶伶人詣𢎞肇謝𢎞肇怒曰士卒守邊苦戰猶未有以賜之汝曹何功而得此皆奪以還官帝欲立所幸耿夫人為后邠以為太速夫人卒帝欲以后禮葬之邠復以為不可帝年益壯厭為大臣所制邠𢎞肇嘗議事於帝前帝曰審圖之勿令人有言邠曰陛下但禁聲有臣等在帝積不能平左右因乗間譛之於帝云邠等専恣終當為亂帝信之嘗夜聞作坊鍜聲疑有急兵逹旦不寐司空同平章事蘇逢吉既與𢎞肇有隙知李業等怨𢎞肇屢以言激之帝遂與業文進匡賛允明謀誅邠等議既定入白太后太后曰兹事何可輕發更宜與宰相議之業時在旁曰先帝嘗言朝廷大事不可謀及書生懦怯誤人太后復以為言帝忿曰國家之事非閨閤所知拂衣而出十一月乙亥業等以其謀告閻晉卿晉卿恐事不成詣𢎞肇第欲告之𢎞肇以它故辭不見丙子旦邠等入朝有甲士數十自廣政殿出殺邠𢎞肇章於東廡下文進亟召宰相朝臣班於崇元殿宣云邠等謀反已伏誅與卿等同慶又召諸軍將校至萬嵗殿庭帝親諭之且曰邠等以穉子視朕朕今始得為汝主汝等免横憂矣皆拜謝而退又召前節度使刺史等升殿諭之分遣使者帥騎収捕邠等親戚黨與傔從盡殺之𢎞肇待侍衛步軍都指揮使王殷尤厚邠等死帝遣供奉官孟業齎宻詔詣澶州及鄴都令鎮寧節度使李洪義殺殷又令鄴都行營馬軍都指揮使郭崇威步軍都指揮使真定曹威殺郭威及監軍宣徽使王峻洪義太后之弟也又急詔徵天平軍節度使高行周平盧節度使符彦卿永興節度使郭崇義泰寧節度使慕容彦超匡國節度使薛懷讓鄭州防禦使吳䖍裕陳州刺史李穀入朝以蘇逢吉權知樞宻院事前平盧節度使劉銖權知開封府侍衛馬步都指揮使李洪建權判侍衛司事内侍省使閻晉卿權侍衛馬軍都指揮使洪建業之兄也時中外人情憂駭蘇逢吉雖惡𢎞肇而不預李業等謀聞變驚愕私謂人曰事太怱怱主上儻以一言見問不至於此業等命劉銖誅郭威王峻之家銖極其慘毒嬰孺無免者命李洪建誅王殷之家洪建但使人守視仍飲食之丁丑使者至澶州李洪義畏懦慮王殷已知其事不敢發乃引孟業見殷殷囚業遣副使陳光穗以宻詔示郭威威召樞宻吏魏仁浦示以詔書曰奈何仁浦曰公國之大臣功名素著加之握彊兵據重鎮一旦為羣小所構禍出非意此非辭說所能解時事如此不可坐而待死威乃召郭崇威曹威及諸將告以楊邠等寃死及有宻詔之狀且曰吾與諸公披荆棘從先帝取天下受託孤之任竭力以衞國家今諸公已死吾何心獨生君輩當奉行詔書取吾首以報天子庶不相累郭崇威等皆泣曰天子幼冲此必左右羣小所為若使此輩得志國家其得安乎崇威願從公入朝自訴盪滌鼠輩以清朝廷不可為單使所殺受千載惡名翰林天文趙修已謂郭威曰公徒死何益不若順衆心擁兵而南此天啟也郭威乃留其養子榮鎮鄴都命郭崇威將騎兵前驅戊寅自將大兵繼之慕容彦超方食得詔捨匕筯入朝帝悉以軍事委之己夘吳䖍裕入朝帝聞郭威舉兵南向議發兵拒之前開封尹侯益曰鄴都戍兵家屬皆在京師官軍不可輕出不若閉城以挫其鋒使其母妻登城招之可不戰而下也慕容彦超曰侯益衰老為懦夫計耳帝乃遣益及閻晉卿吳䖍裕前保大節度使張彦超將禁軍趣澶州是日郭威已至澶州李洪義納之王殷迎謁慟哭以所部兵從郭威涉河帝遣内養鸗脫覘郭威威獲之以表置鸗脫衣領中使歸白帝曰臣昨得詔書延頸俟死郭崇威等不忍殺臣云此皆陛下左右貪權無厭者譛臣耳逼臣南行詣闕請罪臣求死不獲力不能制臣數日當至闕廷陛下若以臣為有罪安敢逃刑若實有譛臣者願執付軍前以快衆心臣敢不撫諭諸軍退歸鄴都庚辰郭威趣滑州辛巳義成節度使宋延渥迎降延渥洛陽人其妻高祖女永寧公主也郭威取滑州庫物以勞將士且諭之曰聞侯令公已督諸軍自南來今遇之交戰則非入朝之義不戰則為其所屠吾欲全汝曹功名不若奉行前詔吾死不恨皆曰國家負公公不負國所以萬人争奮如報私讎侯益輩何能為乎王峻狥於衆曰我得公處分俟克京城聽旬日剽掠衆皆踊躍辛巳鸗脫至大梁前此帝議自徃澶州聞郭威已至河上而止帝甚有悔懼之色私謂竇貞固曰屬者亦太草草李業等請傾府庫以賜諸軍蘇禹珪以為未可業拜禹珪於帝前曰相公且為天子勿惜府庫乃賜禁軍人二十緡下軍半之將士在北者給其家仍使通家信以誘之壬午郭威軍至封邱人情忷懼太后泣曰不用李濤之言宜其亡也慕容彦超恃其驍勇言於帝曰臣視北軍猶蠛蠓耳當為陛下生致其魁退見聶文進問北來兵數及將校姓名頗懼曰是亦劇賊未易輕也帝復遣左神武統軍袁㠖前威勝節度使劉重進等帥禁軍與侯益等㑹屯赤岡㠖象先之子也彦超以大軍屯七里店癸未東北軍遇於劉子陂帝欲自出勞軍太后曰郭威吾家故舊非死亡切身何至此但按兵守城飛詔諭之觀其志趣必有辭理則君臣之禮尚全慎勿輕出帝不從時扈從軍甚盛太后遣使戒聶文進曰大須在意對曰有臣在雖郭威百人可擒也至暮兩軍不戰帝還宫慕容彦超大言曰陛下來日宫中無事幸再出觀臣破賊臣不必與之戰但叱散使歸營耳甲申帝欲再出太后力止之不可既陳郭威戒其衆曰吾來誅羣小非敢敵天子也慎勿先動乆之慕容彦超引輕騎直前奮擊郭崇威與前博州刺史李榮帥騎兵拒之彦超馬倒幾獲之彦超引兵退麾下死者百餘人於是諸軍奪氣稍稍降於北軍侯益吳䖍裕張彦超袁㠖劉重進皆潜往見郭威威各遣還營又謂宋延渥曰天子方危公近親宜以牙兵往衛乘輿且附奏陛下願乘間早幸臣營延渥未至御營亂兵雲擾不敢進而還比暮南軍多歸於北慕容彦超與麾下十餘騎奔還兖州是夕帝獨與三相及從官數十人宿於七里寨餘皆逃潰乙酉旦郭威望見天子旌旗在高坂上下馬免胄往從之至則帝已去矣帝策馬將還宫至𤣥化門劉銖在門上問帝左右兵馬何在因射左右帝囘轡西北至趙村追兵已至帝下馬入民家為亂兵所弑蘇逢吉閻晉卿郭允明皆自殺聶文進挺身走軍士追斬之李業奔陜州後匡賛奔兖州郭威聞帝遇弑號慟曰老夫之罪也威至𤣥化門劉銖雨射城外威自迎春門入歸私第遣前曹州防禦使何福進將兵守明徳門諸軍大掠通夕煙火四發軍士入前義成節度使白再榮之第執再榮盡掠其財既而進曰某等昔嘗趨走麾下一旦無禮至此何面目復見公遂刎其首而去吏部侍郎張允家貲以萬計而性吝雖妻亦不之委常自繫衆鑰於衣下行如環珮是夕匿於佛殿藻井之上登者浸多板壞而墜軍士掠其衣遂以凍卒初作坊使賈延徽有寵於帝與魏仁浦為鄰欲併仁浦所居以自廣屢譛仁浦於帝幾至不測至是有擒延徽以授仁浦者仁浦謝曰因亂而報怨吾所不為也郭威聞之待仁浦益厚右千牛衛大將軍棗彊趙鳯曰郭侍中舉兵欲誅君側之惡以安國家耳而鼠輩敢爾乃賊也豈侍中意耶執弓矢踞胡床坐於巷首掠者至輒射殺之里中皆賴以全丙戌獲劉銖李洪建囚之銖謂其妻曰我死汝且為人婢乎妻曰以公所為雅當然耳王殷郭崇威言於郭威曰不止剽掠今夕止有空城耳威乃命諸將分部禁止掠者不從則斬之至晡乃定竇貞固蘇禹珪自七里寨逃歸郭威使人訪求得之尋復其位貞固為相值楊史弄權李業等作亂但以凝重處其間自全而已郭威命有司遷隠帝梓宫於西宫或請如魏高貴鄉公故事葬以公禮威不許曰倉猝之際吾不能保衛乘輿罪已大矣況敢貶君乎太師馮道帥百官謁見郭威威見猶拜之道受拜如平時徐曰侍中此行不易丁亥郭威帥百官詣明徳門起居太后且奏稱軍國事殷請早立嗣君太后誥稱郭允明弑逆神器不可無主河東節度使崇忠武節度使信皆高祖之弟武寧節度使贇開封尹勲高祖之子其令百官議擇所宜贇崇之子也高祖愛之養視如子郭威王峻入見太后於萬歲宫請以勲為嗣太后曰勲乆羸疾不能起威出諭諸將諸將請見之太后令左右以臥榻舉之示諸將諸將乃信之於是郭威與峻議立贇己丑郭威帥百官表請以贇承大統太后誥所司擇日備灋駕迎贇即皇帝位郭威奏遣太師馮道及樞宻直學士王度祕書監趙上交詣徐州奉迎郭威之討三叛也毎見朝廷詔書處分軍事皆合機宜問使者誰為此詔使者以翰林學士范質對威曰宰相器也入城訪求得之甚喜時大雪威解所服紫袍衣之令草太后誥令迎新君儀注蒼黄之中討論撰定皆得其宜初隠帝遣供奉官押班陽曲張永徳賜昭義節度使常思生辰物永徳郭威之壻也㑹楊邠等誅宻詔思殺永徳思素聞郭威多竒異囚永徳以觀變及威克大梁思乃釋永徳而謝之庚寅郭威帥羣臣上言比皇帝到闕動涉浹旬請太后臨朝聴政壬辰太后始臨朝以王峻為樞宻使袁㠖為宣徽南院使王殷為侍衛馬步軍都指揮使郭崇威為侍衛馬軍都指揮使曹威為侍衛步軍都指揮使陳州刺史李穀權判三司劉銖李洪建及其黨皆梟首於市而赦其家郭威謂公卿曰劉銖屠吾家吾復屠其家怨讎反覆庸有極乎由是數家獲免王殷屢為洪建請免死郭威不許後匡賛至兖州慕容彦超執而獻之李業至陜州其兄保義節度使洪信不敢匿於家業懷金將奔晉陽至絳州盗殺之而取其金鎮將邢州奏契丹主將數萬騎入侵攻内邱五日不克死傷甚衆有戍兵五百叛應契丹引契丹入城屠之又陷饒陽太后敇郭威將大軍擊之國事權委竇貞固蘇禹珪王峻軍事委王殷十二月甲午朔郭威發大梁丁酉以翰林學士户部侍郎范質為樞宻副使武寧節度使贇留右都押牙鞏廷美元從都教練使楊温守徐州與馮道等西來在道仗衛皆如王者左右呼萬嵗郭威至滑州留數日贇遣使慰勞諸將受命之際相顧不拜私相謂曰我輩屠陷京師其罪大矣若劉氏復立我輩尚有種乎己酉威聞之即引兵趣澶州辛亥遣蘇禹珪如宋州迎嗣君壬子郭威度河館于澶州癸丑旦將發將士數千人忽大譟威令閉門將士踰垣登屋而入曰天子須侍中自為之將士已與劉氏為仇不可立也或裂黄旗以被威體共扶抱之呼萬嵗震地因擁威南行威乃上太后牋請奉漢宗廟事太后為母丙辰至韋城下書撫諭大梁士民以昨離河上在道秋毫不犯勿有憂疑戊午威至七里店竇貞固帥百官出迎拜謁因勸進威營於臯門村武寧節度使贇已至宋州王峻王殷閴澶州軍變遣侍衛馬軍都指揮使郭崇威將七百騎往拒之又遣前申州刺史馬鐸將兵詣許州巡檢崇威忽至宋州陳於府門外贇大驚闔門登樓詰之對曰澶州軍變郭公慮陛下未察故遣崇威來宿衛無它也贇召崇威崇威不敢進馮道出與崇威語崇威乃登樓贇執崇威手而泣崇威以郭威意安諭之少頃崇威出時䕶聖指揮使張令超帥部兵為贇宿衛徐州判官董裔說贇曰觀崇威視瞻舉措必有異謀道路皆言郭威已為帝而陛下深入不止禍其至哉請急召張令超諭以禍福使夜以兵刼崇威奪其兵明日掠睢陽金帛募士卒北走晉陽彼新定京邑未暇追我此策之上也贇猶豫未決是夕崇威宻誘令超令超帥衆歸之贇大懼郭威遺贇書云為諸軍所迫召馮道先歸留趙上交王度奉侍道辭行贇曰寡人此來所恃者以公三十年舊相故無疑耳今崇威奪吾衞兵事危矣公何以為計道黙然客將賈貞數目道欲殺之贇曰汝輩勿草草此無預馮公事崇威遷贇於外館殺其腹心董裔賈貞等數人己未太后誥廢贇為湘隂公馬鐸引兵入許州劉信惶惑自殺庚申太后誥以侍中監國百官藩鎮相繼上表勸進壬戌夜監國營有步軍將校醉揚言曏者澶州騎兵扶立今步兵亦欲扶立監國斬之後周太祖廣順元年春正月丁夘漢太后下誥授監國符寶即皇帝位監國自臯門入宫即位於崇元殿制曰朕周室之裔虢叔之後國號宜曰周改元大赦楊邠史𢎞肇王章等皆贈官官為斂𦵏仍訪其子孫叙用之凡倉場庫務掌納官吏無得収斗餘稱耗舊所進羡餘物悉罷之犯竊盜及姦者竝依晉天福元年以前刑名罪人非反逆無得誅及親族籍沒家貲唐莊宗明宗晉高祖各置守陵十戸漢高祖陵職員官人時月薦享及守陵户竝如故初唐衰多盜不用律文更定峻灋竊盜贓三匹者死晉天福中加至五匹姦有夫婦人無問彊和男女竝死漢灋竊盜一錢以上皆死又罪非反逆往往族誅籍沒故帝即位首革其弊初楊邠以功臣國戚為方鎮者多不閑吏事乃以三司軍將補都押牙孔目官内知客其人自恃敇補多専横節度使不能制至是悉罷之戊辰以前復州防禦使王彦超權武寧節度使漢李太后遷居西宫己巳上尊號曰昭聖皇太后癸酉加王峻同平章事以衛尉卿劉皥主漢隠帝之喪初河東節度使兼中書令劉崇聞隠帝遇害欲起兵南向聞迎立湘陰公乃止曰吾兒為帝吾又何求太原少尹李驤陰說崇曰觀郭公之心終欲自取公不如疾引兵逾太行據孟津俟徐州相公即位然後還鎮則郭公不敢動矣不然且為所賣崇怒曰腐儒欲離間吾父子命左右曵出斬之驤呼曰吾負經濟之才而為愚人謀事死固甘心家有老妻願與之同死崇并其妻殺之且奏於朝廷示無二心及贇廢崇乃遣使請贇歸晉陽詔報以湘陰公比在宋州今方取歸京師必令得所公勿為憂公能同力相輔當加王爵永鎮河東鞏廷美楊温聞湘隂公贇失位奉贇妃董氏據徐州拒守以俟河東援兵帝使贇以書諭之廷美温欲降而懼死帝復遺贇書曰爰念斯人盡心於主足以賞其忠義何由責以悔尤俟新節度使入城當各除刺史公可更以委曲示之丙子帝帥百官詣西宫為漢隠帝舉哀成服皆如天子禮慕容彦超遣使入貢帝慮其疑懼賜詔慰安之曰今兄事已至此言不欲䌓望弟扶持同安億兆戊寅殺湘隂公於宋州是日劉崇即皇帝位於晉陽仍用乾祐年號所有者并汾忻代嵐憲隆蔚沁遼麟石十二州之地以節度判官鄭珙為中書侍郎觀察判官滎陽趙華為户部侍郎並同平章事以次子承鈞為侍衛親軍都指揮使太原尹以節度副使李存瓌為代州防禦使禆將武安張元徽為馬步軍都指揮使陳光裕為宣徽使北漢主謂李存瓌張元徽曰朕以高祖之業一朝墜地今日位號不得已而稱之顧我是何天子汝曹是何節度使邪由是不建宗廟祭祀如家人宰相俸錢月止百緍節度使止三十緡自餘薄有資給而已故其國中少廉吏客省使河南李光美嘗為直省官頗諳故事北漢朝廷制度皆出於光美北漢主聞湘陰公死哭曰吾不用忠臣之言以至於此為李驤立祠歲時祭之己夘以太師馮道為中書令加竇貞固侍中蘇禹珪司空初北漢主立契丹主使潘實訥遺劉承鈞書北漢主使承鈞復書稱本朝淪亡紹襲帝位欲循晉室故事求援北朝契丹主大喜北漢主發兵屯隂地黄澤團栢丁亥以承鈞為招討使與副招討使白從暉都監李存瓌將步騎萬人侵晉州從暉吐谷渾人也郭崇威更名崇曹威更名英二月丁酉以皇子天雄牙内都指揮使榮為鎮寧節度使選朝士為之僚佐以侍御史王敏為節度判官右補闕崔頌為觀察判官校書郎王朴為掌書記頌協之子朴東平人也戊戌北漢兵五道攻晉州節度使王晏閉城不出劉承鈞以為怯蟻附登城晏伏兵奮擊北漢兵死傷者千餘人承鈞遣副兵馬使安元寶焚晉州西城元寶來降承鈞乃移軍攻隰州癸夘隰州刺史許遷遣步軍都指揮使孫繼業迎擊北漢兵於長夀村執其將程筠等殺之未幾北漢兵攻州城數日不克死傷甚衆乃引兵去遷鄆州人也丁未契丹主遣其臣舒古濟與朱憲偕來賀即位丁巳遣尚書右丞田敏使契丹北漢主遣通事舍人李􅈯使于契丹乞兵為援詔加泰寧節度使慕容彦超中書令遣翰林學士魚崇諒詣兖州諭指崇諒即崇逺也彦超上表謝三月壬戌詔報之曰向以前朝失徳少主用讒倉猝之間召卿赴闕卿即奔馳應命信宿至京救國難而不顧身聞君召而不俟駕以至天亡漢祚兵散梁郊降將敗軍相繼而至卿即便囘馬首徑返龜隂為主為時有始有終所謂危亂見忠臣之節疾風知勁草之心若使為臣者皆能如兹則有國者誰不欲用所言朕潜龍河朔之際平難浚郊之時緣不奉示諭之言亦不得差人至行闕且事主之道何必如斯若或二三於漢朝又安肯忠信於周室以此為懼不亦過乎卿但悉力推心安民體國事朕之節如事故君不惟黎庶獲安抑亦社稷是賴但堅表率未議替移由衷之誠言盡於此王彦超奏克徐州殺鞏廷美北漢李誓至契丹契丹主使伊喇摩哩報之夏四月契丹主遣使如北漢告以周使田敏來約嵗輸錢十萬緡北漢主使鄭珙以厚賂謝契丹自稱姪皇帝致書於叔天授皇帝請行冊禮五月己巳遣左金吾將軍姚漢英等使于契丹契丹留之辛未北漢禮部侍郎同平章事鄭珙卒于契丹六月辛亥以樞宻使同平章事王峻為左僕射兼門下侍郎樞宻副使兵部侍郎范質戸部侍郎判三司李穀為中書侍郎竝同平章事穀仍判三司司徒兼侍中竇貞固司空兼中書侍郎同平章事蘇禹珪竝罷守本官癸丑范質參知樞宻院事丁巳以宣徽北院使翟光鄴兼樞宻副使初帝討河中已為人望所屬李穀時為轉運使帝數以㣲言諷之穀但以人臣盡節為對帝以是賢之即位首用為相時國家新造四方多故王峻夙夜盡心知無不為軍旅之謀多所禆益范質明敏彊記謹守灋度李穀沈毅有器畧在帝前議論辭氣忼慨善譬諭以開主意契丹遣燕王蘇葉等冊命北漢主為大漢神武皇帝妃為皇后北漢主更名旻秋七月北漢主遣翰林學士博興衛融等詣契丹謝冊禮且請兵八月壬戌葬漢隠帝于潁陵九月北漢主遣招討使李存瓌將兵自團栢入冦契丹欲引兵㑹之與酋長議於九十九泉諸部皆不欲南侵契丹主强之癸亥行至新州之西火神淀燕王蘇葉及偉王之子太寧王烏遜作亂弑契丹主而立烏遜契丹主徳光之子齊王舒嚕逃入南山諸部奉舒嚕以攻蘇葉烏遜殺之并其族黨立舒嚕為帝改元應厯自火神淀入幽州遣使告于北漢北漢主遣樞宻直學士上黨王得中如契丹賀即位復以叔父事之請兵以擊晉州契丹主年少好遊戲不親國事毎夜酣飲逹旦乃寐日中方起國人謂之睡王後更名明冬十月辛夘潞州巡檢陳思讓敗北漢兵於虒亭契丹遣彰國節度使蕭伊濟將奚契丹五萬㑹北漢兵入寇北漢主自將兵二萬自隂地闗寇晉州丁未軍于城北三面置寨晝夜攻之遊兵至絳州時王晏已離鎮王彦超未至巡檢使王萬敢權知晉州與龍捷都指揮使史彦超虎捷指揮使何徽共拒之史彦超雲州人也十一月帝以北漢契丹之兵猶在晉州甲子以王峻為行營都部署將兵救之詔諸軍皆受峻節度聴以便宜從事得自選擇將吏乙丑峻行帝自至城西餞之王峻留陜州旬日帝以北漢攻晉州急憂其不守議自將由澤州路與峻㑹兵救之且遣使諭峻十二月戊子朔下詔以三日西征使者至陜峻因使者言於帝曰晉州城堅未易可拔劉崇兵鋒方銳不可力争所以駐兵待其氣衰耳非臣怯也陛下新即位不宜輕動若車駕出汜水則慕容彦超引兵入汴大事去矣帝聞之自以手提耳曰幾敗吾事庚寅敇罷親征初泰寧節度使兼中書令慕容彦超聞徐州平疑懼愈甚乃招納亡命畜聚薪糧潜以書結北漢吏獲其書以聞又遣人詐為商人求援於唐帝遣通事舍人鄭好謙就申慰諭與之為誓彦超益不自安屢遣都押牙鄭麟詣闕偽輸情欵實覘機事又獻天平節度使高行周書其言皆謗毁朝廷與彦超相結之意帝笑曰此彦超之詐也以書示行周行周上表謝恩既而彦超反跡益露丙申遣閤門使張凝將兵赴鄆州巡檢以備之庚子王峻至絳州乙巳引兵趣晉州晉州南有䝉阬最為險要峻憂北漢兵據之是日聞前鋒已度䝉阬喜曰吾事濟矣慕容彦超奏請入朝帝知其詐即許之既而復稱境内多盜未敢離鎮北漢主攻晉州乆不克㑹大雪民相聚保山寨野無所掠軍乏食契丹思歸聞王峻至䝉阬燒營夜遁峻入晉州諸將請亟追之峻猶豫未決明日乃遣行營馬軍都指揮使仇𢎞超都排陳使藥元福左廂排陳使陳思讓康延沼將騎兵追之及於霍邑縱兵奮擊北漢兵墜崖谷死者甚衆霍邑道隘延沼畏懦不急追由是北漢兵得度藥元福曰劉崇悉發其衆挾敵騎而來志吞晉絳今氣衰力憊狼狽而遁不乘此翦撲必為後患諸將不欲進王峻復遣使止之遂還契丹比至晉陽士馬什喪三四蕭禹厥恥無功釘大酋長一人於市旬日而斬之北漢主始息意於進取北漢土瘠民貧内供軍國外奉契丹賦䌓役重民不聊生逃入周境者甚衆二年正月慕容彦超發鄉兵入城引泗水注壕中為戰守之備又多以旗幟授諸鎮將令募羣盗剽掠鄰境所在奏其反狀甲子敇沂密二州不復隸泰寧軍以侍衛步軍都指揮使昭武節度使曹英為都部署討彦超齊州防禦使史延超為副部署皇城使河内向訓為都監陳州防禦使藥元福為行營馬步都虞候帝以元福宿將命英訓無得以軍禮見之二人皆父事之唐主發兵五千軍于下邳以援彦超聞周兵將至退屯沭陽徐州巡檢使張令彬擊之大破唐兵殺溺死者千餘人獲其將燕敬權初彦超以周室新造謂其易搖故北召北漢及契丹南誘唐人使侵邊鄙冀朝廷奔命不暇然後乘間而動及北漢契丹自晉州北走唐兵敗於沭陽彦超之勢遂沮壬申王峻自晉州還入見曹英等至兖州設長圍慕容彦超屢出戰藥元福皆擊敗之彦超不敢出十餘日長圍合遂進攻之初彦超將反判官崔周度諫曰魯詩書之國自伯禽以來不能霸諸侯然以禮義守之可以長世公於國家非有私憾胡為自疑況主上開諭勤至茍撤備歸誠則坐享泰山之安矣獨不見杜中令安襄陽李河中竟何所成乎彦超怒以周度阿庇司馬閻𢎞魯等斬於市夏四月帝以曹英等攻兖州乆未克乙夘下詔親征以李穀權東京留守兼判開封府鄭仁誨權大内都㸃檢又以侍衛馬軍都指揮使郭崇充在京都巡檢五月庚申帝發大梁戊辰至兖州己巳帝使人招諭慕容彦超城上人語不遜庚午命諸軍進攻先是術者紿彦超云鎮星行至角亢角亢兖州之分其下有福彦超乃立祠而禱之令民家皆立黄幡彦超性貪吝官軍攻城急猶瘞藏珍寶由是人無鬬志將卒相繼有出降者乙亥官軍克城彦超方禱鎮星祠帥衆力戰不勝乃焚鎮星祠與妻赴井死子繼勲出走追獲殺之官軍大掠城中死者近萬人丁丑以端明殿學士顔衎權知兖州事癸未降泰寧軍為防禦州顯徳元年春正月壬辰帝殂晉王榮即帝位北漢主聞太祖晏駕甚喜謀大舉入冦遣使請兵于契丹二月契丹遣其武定節度使政事令楊衮將萬餘騎如晉陽北漢主自將兵三萬以義成節度使白從暉為行軍都部署武寧節度使張元徽為前鋒都指揮使與契丹自團栢南趣潞州北漢兵屯梁侯驛昭義節度使李筠遣其將穆令均將步騎二千逆戰筠自將大軍壁於太平驛張元徽與令均戢陽不勝而北令均逐之伏發殺令均俘斬士卒千餘人筠遁歸上黨嬰城自守筠即李榮也避上名改焉世宗聞北漢主入寇欲自將兵禦之羣臣皆曰劉崇自平陽遁走以來勢蹙氣沮必不敢自來陛下新即位山陵有日人心易搖不宜輕動宜命將禦之帝曰崇幸我大喪輕朕年少新立有吞天下之心此必自來朕不可不往馮道固争之帝曰昔唐太宗定天下未嘗不自行朕何敢偷安道曰未審陛下能為唐太宗否帝曰以吾兵力之彊破劉崇如山壓卵耳道曰未審陛下能為山否帝不悅惟王溥勸行帝從之三月北漢乘勝進逼潞州丁丑詔天雄節度使符彦卿引兵自磁州固鎮出北漢軍後以鎮寧節度使郭崇副之又詔河中節度使王彦超引兵自晉州東出邀北漢軍以保義節度使韓通副之又命馬軍都指揮使寧江節度使樊愛能步軍都指揮使清淮節度使何徽義成節度使白重賛鄭州防禦使史彦超前耀州團練使符彦能將兵先趣澤州宣徽使向訓監之重賛憲州人也癸未帝命馮道奉梓宫赴山陵以鄭仁誨為東京留守乙酉帝發大梁庚寅至懷州帝欲兼行速進控鶴都指揮使真定趙晁私謂通事舍人鄭好謙曰賊勢方盛宜持重以挫之好謙言於帝帝怒曰汝安得此言必為人所使言其人則生不然必死好謙以實對帝命并晁械於州獄壬辰帝過澤州宿於州東北北漢主不知帝至過潞州不攻引兵而南是夕軍於高平之南癸巳前鋒與北漢兵遇擊之北漢兵却帝慮其遁去趣諸軍亟進北漢主以中軍陳於巴公原張元徽軍其東楊衮軍其西衆頗嚴整時河陽節度使劉詞將後軍未至衆心危懼而帝志氣益鋭命白重賛與侍衞馬步都虞候李重進將左軍居西樊愛能何徽將右軍居東向訓史彦超將精騎居中央殿前都指揮使張永徳將禁兵衛帝帝介馬自臨陣督戰北漢主見周軍少悔召契丹謂諸將曰吾自用漢軍可破也何必契丹今日不帷克周亦可使契丹心服諸將皆以為然楊衮策馬前望周軍退謂北漢主曰勍敵也未可輕進北漢主奮髯曰時不可失請公勿言試觀我戰衮黙然不悅時東北風方盛俄而忽轉南風北漢副樞宻使王延嗣使司天監李義白北漢主云時可戰矣北漢主從之樞宻直學士王得中扣馬諫曰義可斬也風勢如此豈助我者邪北漢主曰吾計已決矣書生勿妄言且斬汝麾東軍先進張元徽將千騎擊周右軍合戰未幾樊愛能何徽引騎兵先遁右軍潰步兵千餘人解甲呼萬歲降于北漢帝見軍勢危自引親兵犯矢石督戰太祖皇帝時為宿衛將謂同列曰主危如此吾屬何得不致死又謂張永徳曰賊氣驕力戰可破也公麾下多能左射者請引兵乘高西出為左翼我引兵為右翼以擊之國家安危在此一舉永徳從之各將二千人進戰太祖皇帝身先士卒馳犯其鋒士卒死戰無不一當百北漢兵披靡内殿直夏津馬仁瑀謂衆曰使乘輿受敵安用我輩躍馬引弓大呼連斃數十人士氣益振殿前右畨行首馬全乂言於帝曰賊勢極矣將為我擒願陛下按轡勿動徐觀諸將破之即引數百騎進陷陳北漢主知帝自臨陳襃賞張元徽趣使乘勝進兵元徽前略陳馬倒為周兵所殺元徽北漢之驍將也北軍由是奪氣時南風益盛周兵争奮北漢兵大敗北漢主自舉赤幟収兵不能止楊衮畏周兵之彊不敢救且恨北漢主之語全軍而退樊愛能何徽引數千騎南走控弦露刃剽掠輜重役徒驚走失亡甚多帝遣近臣及親軍校追諭止之莫肯奉詔使者或為軍士所殺揚言契丹大至官軍敗績餘衆已降敵矣劉詞遇愛能等於塗愛能等止之詞不從引兵而北時北漢主尚有餘衆萬餘人阻澗而陳薄暮詞至復與諸軍擊之北漢兵又敗殺王延嗣追至高平僵尸滿山谷委棄御物及輜重器械雜畜不可勝紀是日帝宿於野次得步兵之降敵者皆殺之樊愛能等聞周兵大捷與士卒稍稍復還有逹曙不至者甲午休兵於高平選北漢降卒數千人為效順指揮命前武勝行軍司馬唐景思將之使戍淮上餘二千餘人賞貲裝縱遣之李穀為亂兵所迫潜竄山谷數日乃出丁酉帝至潞州北漢主自高平被褐戴笠乘契丹所贈黄騮帥百餘騎由雕窠嶺遁歸宵迷俘村民為導誤之晉州行百餘里乃覺之殺導者晝夜北走所至得食未舉筯或傳周兵至輒蒼黄而去北漢主衰老力憊伏於馬上晝夜馳驟殆不能支僅得入晉陽帝欲誅樊愛能等以肅軍政猶豫未決己亥晝臥行宫帳中張永徳侍側帝以其事訪之對曰愛能等素無大功忝冐節鉞望敵先逃死未塞責且陛下方欲削平四海茍軍灋不立雖有熊羆之士百萬之衆安得而用之帝擲枕於地大呼稱善即収愛能徽及所部軍使以上七十餘人責之曰汝輩皆累朝宿將非不能戰今望風奔遁者無它正欲以朕為竒貨賣與劉崇耳悉斬之帝以何徽先守晉州有功欲免之既而以灋不可廢遂并誅之而給槥車歸塟自是驕將惰卒始知所懼不行姑息之政矣庚子賞高平之功以李重進兼忠武節度使向訓兼義成節度使張永徳兼武信節度使史彦超為鎮國節度使張永徳盛稱太祖皇帝之智勇帝擢太祖皇帝為殿前都虞候領嚴州刺史以馬仁瑀為控鶴弓箭直指揮使馬全乂為散員指揮使自餘將校遷拜者凡數十人士卒有自行間擢主軍廂者釋趙晁之囚北漢主収散卒繕甲兵完城塹以備周楊衮將其衆北屯代州北漢主遣王得中送衮因求救於契丹契丹主遣得中還報許發兵救晉陽壬寅以符彦卿為河東行營都部署兼知太原行府事以郭崇副之向訓為都監李重進為馬步都虞候史彦超為先鋒都指揮使將步騎二萬發潞州仍詔王彦超韓通自隂地闗入與彦卿合軍而進又以劉詞為隨駕部署保大節度使白重賛副之夏四月北漢盂縣降符彦卿軍晉陽城下王彦超攻汾州北漢防禦使董希顔降帝遣萊州防禦使康延沼攻遼州宻州防禦使田瓊攻沁州皆不下供備庫副使太原李謙溥單騎說遼州刺史張漢超漢超即降乙夘葬聖神恭肅文武孝皇帝于嵩陵廟號太祖初帝遣符彦卿等北征但欲耀兵於晉陽城下未議攻取既入北漢境其民争以食物迎周師泣訴劉氏賦役之重願供軍需助攻晉陽北漢州縣繼有降者帝聞之始有兼并之志遣使徃與諸將議之諸將皆言芻糧不足請且班師以俟再舉帝不聴既而諸軍數十萬聚於太原城下軍士不免剽掠北漢民失望稍稍保山谷自固帝聞之馳詔禁止剽掠安撫農民止徵今嵗租稅及募民入粟拜官有差仍發澤潞晉絳慈隰及山東近便諸州民運糧以饋軍己未遣李穀詣太原計度芻糧庚申太師中書令瀛文懿王馮道卒道少以孝謹知名唐莊宗世始貴顯自是累朝不離將相三公三師之位為人清儉寛𢎞人莫測其喜愠滑稽多智浮沈取容嘗著長樂老叙自述累朝榮遇之狀時人往往以徳量推之歐陽修論曰禮義廉恥國之四維四維不張國乃滅亡禮義治人之大法廉恥立人之大節況為大臣而無廉恥天下其有不亂國家其有不亡者乎予讀馮道長樂老叙見其自述以為榮其可謂無廉恥者矣則天下國家可從而知也予於五代得全節之士三死事之臣十有五皆武夫戰卒豈於儒者果無其人哉得非高節之士惡時之亂薄其世而不肯出歟抑君天下者不足顧而莫能致之歟予嘗聞五代時有王凝者家青齊之間為虢州司戸參軍以疾卒于官凝家素貧一子尚㓜妻李氏携其子負其遺骸以歸東過開封府止於旅舍主人不納李氏顧天已暮不肯去主人牽其臂而出之李氏仰天慟哭曰我為婦人不能守節而此手為人所執邪即引斧自斷其臂見者為之嗟泣開封尹聞之白其事於朝厚䘏李氏而笞其主人嗚呼士不自愛其身而忍恥以偷生者聞李氏之風宜少知愧哉臣光曰天地設位聖人則之以制禮立法内有夫婦外有君臣婦之從夫終身不改臣之事君有死無貳此人道之大倫也茍或廢之亂莫大焉范質稱馮道厚徳稽古宏才偉量雖朝代遷貿人無問言屹若巨山不可轉也臣愚以為貞女不從二夫忠臣不事二君為女不貞雖復華色之美織紝之巧不足賢矣為臣不忠雖復材智之多治行之優不足貴矣何則大節已虧故也道之為相厯五朝八姓若逆旅之視過客朝為仇敵暮為君臣易面變辭曽無愧怍大節如此雖有小善庸足稱乎或以為自唐室之亡羣雄力争帝王興廢逺者十餘年近者三四年雖有忠智將若之何當是之時失臣節者非道一人豈得獨罪道哉臣愚以為忠臣憂公如家見危致命君有過則彊諌力爭國敗亡則竭節致死智士邦有道則見邦無道則隠或滅迹山林或優遊下僚今道尊寵則冠三師權任則首諸相國存則依違拱嘿竊位素餐國亡則圖全茍免迎謁勸進君則興亡接踵道則富貴自如兹乃奸臣之尤安得與它人為比哉或謂道能全身逺害於亂世斯亦賢己臣謂君子有殺身成仁無求生害仁豈専以全身逺害為賢哉然則盜跖病終而子路醢果誰賢乎抑此非特道之愆也時君亦有責焉何則不貞之女中士羞以為家不忠之人中君羞以為臣彼相前朝語其忠則反君事讎語其智則社稷為墟後來之君不誅不棄乃復用以為相彼又安肯忠於我而能獲其用乎故曰非特道之愆亦時君之責也辛酉符彦卿奏北漢憲州刺史太原韓光愿嵐州刺史郭言皆舉城降王彦超韓通攻石州克之執刺史安彦進癸亥沁州刺史李廷誨降庚午帝發潞州趣晉陽癸酉北漢忻州監軍李勍殺刺史趙臯及契丹通事楊訥格舉城降以勍為忻州刺史五月丙子帝至晉州城下旗幟環城四十里楊衮疑北漢代州防禦使鄭處謙二于周召與計事欲圖之處謙知之不往衮使胡騎數十守其城門處謙殺之因閉門拒衮衮奔歸契丹契丹主怒其無功囚之處謙舉城來降丁丑置静塞軍於代州以鄭處謙為節度使契丹數千騎屯忻代之間為北漢之援庚辰遣符彦卿等將步騎萬餘擊之彦卿入忻州契丹退保忻口丁亥置寧化軍於汾州以石沁二州隸之代州將桑珪解文遇殺鄭處謙誣奏云潜通契丹符彦卿南請益兵癸巳遣李筠張永徳將兵三千赴之契丹游騎時至忻州城下丙申彦卿與諸將陳以待之史彦超將二千騎為前鋒遇契丹與戰李筠引兵繼之殺契丹二千人彦超恃勇輕進去大軍浸逺衆寡不敵為契丹所殺筠僅以身免周兵死傷甚衆彦卿退保忻州尋引兵還晉陽府州防禦使折徳扆將州兵來朝辛丑復置永安軍於府州以徳扆為節度使時大發兵夫東自懷孟西及蒲陜以攻晉陽不克㑹乆雨士卒疲病及史彦超死乃議引還初王得中返自契丹值周兵圍晉陽留止代州及桑珪殺鄭處謙囚得中送於周軍帝釋之賜以帶馬問敵兵何時當至得中曰臣受命送楊衮它無所求或謂得中曰契丹許公發兵公不以實告契丹兵即至公得無危乎得中太息曰吾食劉氏禄有老母在圍中若以實告周人必發兵據險而拒之如此家國兩亡吾獨生何益不若殺身以全家國所得多矣甲辰帝以得中欺罔縊殺之乙巳帝發晉陽匡國節度使藥元福言於帝曰進軍易退軍難帝曰朕一以委卿元福乃勒兵成列而殿北漢果出兵追躡元福擊走之然軍還怱遽芻粮數十萬在城下者悉焚棄之軍中訛言相驚或相剽掠軍須失亡不可勝計所得北漢州縣周所置刺史等皆棄城走惟代州桑珪既叛北漢又不敢歸周嬰城自守北漢遣兵攻抜之乙酉帝至潞州甲子至鄭州丙寅謁嵩陵庚午至大梁帝違衆議破北漢自是政事無大小皆親決百官受成於上而已河南府推官高錫上書諫以為四海之廣萬機之衆雖堯舜不能獨治必擇人而任之今陛下一以身親之天下不言陛下聪明睿智足以兼百官之任皆言陛下褊迫疑忌舉不信羣臣也不若選能知人公正者以為宰相能愛民聴訟者以為守令能豐財足食者使掌金穀能原情守法者使掌刑獄陛下但垂拱明堂視其功過而賞罰之天下何憂不治何必降君尊而代臣職屈貴位而親賤事無乃失為政之本乎帝不從錫河中人也北漢主憂憤成疾悉以國事委其子侍衛都指揮使承鈞初帝與北漢主相拒於高平命前澤州刺史李彦崇將兵守江猪嶺遏北漢主歸路彦崇聞樊愛能等南遁引兵退北漢主果自其路遁去八月己酉貶彦崇率府副率冬十一月北漢主疾病命其子承鈞監國尋殂遣使告哀于契丹契丹遣驃騎大將軍知内侍省事劉承訓冊命承鈞為帝更名鈞北漢孝和帝性孝謹既嗣位勤於為政愛民禮士境内粗安毎上表於契丹主稱男契丹主賜之詔謂之兒皇帝三年夏四月北漢葬神武帝於交城北山廟號世祖世宗征淮南後周世宗顯徳二年夏四月上謂宰相曰朕毎思致治之方未得其要寢食不忘又自唐晉以來吳蜀幽并皆阻聲教未能混一宜命近臣著為君難為臣不易論及開邊策一篇朕將覽焉比部郎中王朴獻策以為中國之失吳蜀幽并皆由失道今必先觀所以失之之原然後知所以取之之術其始失之也莫不以君暗臣邪兵驕民困姦黨内熾武夫外横因小致大積微成著今欲取之莫若反其所為而已夫進賢退不肖所以収其才也恩隠誠信所以結其心也賞功罰罪所以盡其力也去奢節用所以豐其財也時使薄斂所以阜其民也俟羣才既集政事既治財用既充士民既附然後舉而用之功無不成矣彼之人觀我有必取之勢則知其情狀者願為間諜知其山川者願為鄉導民心既歸天意必從矣凡攻取之道必先其易者唐與吾接境幾二千里其勢易擾也擾之當以無備之處為始備東則擾西備西則擾東彼必奔走而救之奔走之間可以知其虚實彊弱然後避實擊虚避彊擊弱未須大舉且以輕兵擾之南人懦怯聞小有警必悉師以救之師數動則民疲而財竭不悉師則我可以乘虚取之如此江北諸州將悉為我有既得江北則用彼之民行我之法江南亦易取也得江南則嶺南巴蜀可傳檄而定南方既定則燕地必望風内附若其不至移兵攻之庶幾可平矣惟河東必死之㓂不可以恩信誘必當以彊兵制之然彼自高平之敗力竭氣沮必未能為邊患宜且以為後圖俟天下既平然後伺間一舉可擒也今士卒精練甲兵有備羣下畏法諸將効力期年之後可以出師宜自夏秋蓄積實邊矣上欣然納之時羣臣多守常偷安所對少有可取者惟朴神峻氣勁有謀能斷凡所規畫皆稱上意上由是重其器識未幾遷左諫議大夫知開封府事唐主性和柔好文華而喜人順已由是諂諛之臣多進用政事日亂既克建州破湖南益驕有吞天下之志李守貞慕容彦超之叛皆為之出師遙為聲援又遣使自海道通契丹及北漢約共圖中國值中國多事未暇與之校先是毎冬淮水淺涸唐人常發兵戍守謂之把淺夀州監軍吳廷紹以為疆場無事坐費資糧悉罷之清淮節度使劉仁贍上表固争不能得十一月乙未朔帝以李穀為淮南道前軍行營都部署兼知廬夀等行府事以忠武節度使王彦超副之督侍衛馬軍都指揮使韓令坤等十二將以伐唐令坤磁州武安人也汴水自唐末潰決自埇橋東南悉為汚澤上謀擊唐先命武寧節度使武行徳發民夫因故堤䟽導之東至泗上議者皆以為難成上曰數年之後必獲其利唐人聞周兵將至而懼劉仁贍神氣自若部分守禦無異平日衆情稍安唐主以神武統軍劉彦貞為北面行營都部署將兵二萬趣夀州舉化節度使同平章事皇甫暉為應援使常州團練使姚鳯為應援都監將兵三萬屯定逺召鎮南節度使宋齊丘還金陵謀國難以翰林承旨戸部尚書殷崇義為吏部尚書知樞宻院事李穀等為浮梁自正陽濟淮十二月甲戌穀奏王彦超敗唐兵二千餘人於夀州城下己夘又奏先鋒都指揮使白延遇敗唐兵千餘人於山口鎮帝詔吳越王𢎞俶使出兵擊唐三年春正月丁酉李穀奏敗唐兵千餘人於上窑戊戌發開封府曹滑鄭州之民十餘萬築大梁外城庚子帝下詔親征淮南以宣徽南院使鎮安節度使向訓權東京留守端明殿學士王朴副之彰信節度使韓通權㸃檢侍衛司及在京内外都巡檢命侍衛都指揮使歸徳節度使李重進將兵先赴正陽河陽節度使白重賛將親兵三千屯潁上壬寅帝發大梁李穀攻夀州乆不克唐劉彦貞引兵救之至來逺鎮拒夀州二百里又以戰艦數百艘趣正陽為攻浮梁之勢李穀畏之召將佐謀曰我軍不能水戰若賊斷浮梁則腹背受敵皆不歸矣不如退守浮梁以待車駕上至圉鎮聞其謀亟遣中使乘驛止之比至已焚芻糧退保正陽丁未帝至陳州亟遣李重進引兵趣淮上辛亥李穀奏賊艦中流而進弩礮所不能及若浮梁不守則衆心動搖須至退軍今賊艦日進淮水日漲若車駕親臨萬一糧道阻絶其危不測願陛下且駐驛陳潁俟李重進至臣與之共度賊艦可禦浮梁可完立具奏聞但若厲兵秣馬春去冬來足使賊中疲弊取之未晚帝覽奏不悅劉彦貞素驕貴無才略不習兵所厯藩鎮専為貪暴積財巨億以賂權要由是魏岑等争譽之以為治民如龔黄用兵如韓彭故周師至唐主首用之其禆將咸師朗等皆勇而無謀聞李穀退喜引兵直抵正陽旌旗輜重數百里劉仁贍及池州刺史張全約固止之仁贍曰公軍未至而敵人先遁是畏公之威聲也安用速戰萬一失利則大事去矣彦貞不從既行仁贍曰果遇必敗乃益兵乘城為備李重進度淮逆戰於正陽東大破之斬彦貞生擒咸師朗等斬首萬餘級伏尸三十里収軍資器械三十餘萬是時江淮乆安民不習戰彦貞既敗唐人大恐張全約収餘衆奔夀州劉仁贍表全約為馬步左廂都指揮使皇甫暉姚鳯退保清流闗滁州刺史王紹顔委城走壬子帝至永寧鎮謂侍臣曰聞夀州圍解農民多歸村落今聞大軍至必復入城憐其聚為餓殍宜先遣使存撫各令安業甲寅帝至正陽以李重進代李穀為淮南道行營都招討使以穀判夀州行府事丙辰帝至夀州城下營於淝水之陽命諸軍圍夀州徙正陽浮梁於下蔡鎮丁巳徵宋亳陳潁徐宿許蔡等州丁夫數十萬以攻城晝夜不息唐兵萬餘人維舟於淮營於塗山之下庚申帝命太祖皇帝擊之太祖皇帝遣百餘騎薄其營而偽遁伏兵邀之大敗唐兵於渦口斬其都監何延錫等奪戰艦五十餘艘詔以武平節度使兼中書令王逵為南面行營都統使攻唐之鄂州唐主聞湖南兵將至命武昌節度使何敬洙徙民入城為固守之計敬洙不從使除地為戰場曰敵至則與兵民俱死於此耳唐主善之二月丙寅下蔡浮梁成上自往視之戊辰廬夀光黄巡檢使元城司超奏敗唐兵三千餘人於盛唐擒都監高弼等獲戰艦四十餘艘上命太祖皇帝倍道襲清流闗皇甫暉等陳於山下方與前鋒戰太祖皇帝引兵出山後暉等大驚走入滁州欲斷橋自守太祖皇帝躍馬麾兵涉水直抵城下暉曰人各為其主願容成列而戰太祖皇帝笑而許之暉整衆而出太祖皇帝擁馬頸突陳而入大呼曰吾止取皇甫暉他人非吾敵也手劒擊暉中腦生擒之并擒姚鳯遂克滁州後數日宣祖皇帝為馬軍副都指揮使引兵夜半至滁州城下傳呼開門太祖皇帝曰父子雖至親城門王事也不敢奉命明旦乃得入上遣翰林學士竇儀籍滁州帑藏太祖皇帝遣親吏取藏中絹儀曰公初克城時雖傾藏取之無傷也今既籍為官物非有詔書不可得也太祖皇帝由是重儀詔左金吾衛將軍馬崇祚知滁州初永興節度使劉詞遺表薦其幕僚薊人趙普有才可用㑹滁州平范質薦普為滁州軍事判官太祖皇帝與語悅之時獲盜百餘人皆應死普請先訊鞫然後決所活什七八太祖皇帝益竒之太祖皇帝威名日盛毎臨陳必以䌓纓飾馬鎧仗鮮明或曰如此為敵所識太祖皇帝曰吾固欲其識之耳唐主遣泗州牙將王知朗齎書抵徐州稱唐皇帝奉書大周皇帝請息兵修好願以兄事帝嵗輸貨財以助軍費甲戌徐州以聞帝不答戊寅命前武勝節度使侯章等攻夀州水寨決其濠之西北隅導壕水入于淝太祖皇帝遣使獻皇甫暉等暉傷甚見上臥而言曰臣非不忠於所事但士卒勇怯不同耳臣曏日屢與契丹戰未嘗見兵精如此因盛稱太祖皇帝之勇上釋之後數日卒帝詗知揚州無備己夘命韓令坤等將兵襲之戒以毋得殘民其李氏陵寢遣人與李氏人共守䕶之唐主兵屢敗懼亡乃遣翰林學士户部侍郎鍾謨工部侍郎文理院學士李徳明奉表稱臣來請平獻御服茶藥及金器千兩銀器五千兩繒錦二千匹犒軍牛五百頭酒二千斛壬午至夀州城下謨徳明素辯口上知其欲遊説盛陳甲兵而見之曰爾主自謂唐室苗裔宜知禮義異於它國與朕止隔一水未嘗遣一介修好惟泛海通契丹捨華事夷禮義安在且汝欲說我令罷兵邪我非六國愚主豈汝口舌所能移邪可歸語汝主亟來見朕再拜謝過則無事矣不然朕欲往觀金陵城借府庫以勞軍汝君臣得無悔乎謨徳明戰栗不敢言吳越王𢎞俶遣兵屯境上以俟周命乙酉韓令坤奄至揚州平旦先遣白延遇以數百騎馳入城城中不之覺令坤繼至唐東都營屯使賈崇焚官府民舍棄城南走副留守工部侍郎馮延魯髠髪被僧服匿於佛寺軍士執之令坤慰撫其民使皆安堵庚寅王逵奏拔鄂州長山寨執其將陳澤等獻之辛夘太祖皇帝奏唐天長制置使耿謙降獲芻糧二十餘萬韓令坤攻唐泰州抜之刺史方訥奔金陵唐主遣人以蠟丸求救於契丹壬辰静安軍使何繼筠獲而獻之以給事中高防權知泰州三月甲午朔上行視水寨至淝橋自取一石馬上持之至寨以供礟從官過橋者人齎一石太祖皇帝乘皮船入夀春壕中城上發連努射之矢大如屋椽牙將舘陶張瓊遽以身蔽之矢中瓊髀死而復蘇鏃著骨不可出瓊飲酒一大巵令人破骨出之流血數升神色自若唐主復以右僕射孫晟為司空遣與禮部尚書王崇質奉表入見稱自天祐以來海内分崩或跨據一方或遷革異代臣紹襲先業奄有江表顧以瞻烏未定附鳯何從今天命有歸聲教逺被願比兩浙湖南仰奉正朔謹守土疆乞収薄伐之威赦其後服之罪首於下國俾作外臣則柔逺之徳云誰不服又獻金千兩銀十萬兩羅綺二千匹晟謂馮延已曰此行當在左相晟若辭之則負先帝既行知不免中夜歎息謂崇質曰君家百口宜自為謀吾思之熟矣終不負永陵一抔土餘無所知光舒黄招安巡檢使行光州刺史何超以安隨申蔡四州兵數萬攻光州丙申超奏唐光州刺史張紹棄城走都監張承翰以城降丁酉行舒州刺史郭令圖抜舒州唐蘄州將李福殺其知州王承儁舉州來降遣六宅使齊藏珍攻黄州秦鳯之平也上赦所俘蜀兵以𨽻軍籍從征淮南復亡降於唐癸夘唐主表獻百五十人上悉命斬之丙午孫晟等至上所庚戌上遣中使以孫晟詣夀春城下示劉仁贍且招諭之仁贍見晟戎服拜於城上晟謂仁贍曰君受國厚恩不可開門納冦上聞之甚怒晟曰臣為唐宰相豈可教節度使外叛邪上乃釋之唐主使李徳明孫晟言於上請去帝號割夀濠泗楚光海六州之地仍歲輸金帛百萬以求罷兵上以淮南之地已半為周有諸將捷奏日至欲盡得江北之地不許徳明見周兵日進奏稱唐主不知陛下兵力如此之盛願寛臣五日之誅得歸白唐主盡獻江北之地上乃許之晟因奏遣王崇質與徳明俱歸上遣供奉官安𢎞道送徳明等歸金陵賜唐主詔書其略曰但存帝號何爽嵗寒儻堅事大之心終不迫人于險又曰俟諸郡之悉來即大軍之立罷言盡於此更不煩云茍曰未然請從兹絶又賜其將相書使熟議而來唐主復上表謝李徳明盛稱上威徳及甲兵之彊勸唐主割江北之地唐主不悅宋齊丘以割地為無益徳明輕佻言多過實國人亦不之信樞密使陳覺副使李徵古素惡徳明及孫晟使王崇質異其言因譛徳明於唐主曰徳明賣國求利唐主大怒斬徳明於市唐主命諸道兵馬元帥齊王景逹將兵拒周以陳覺為監軍使前武安節度使邉鎬為應援都軍使中書舍人韓熈載上書曰信莫信於親王重莫重於元帥安用監軍使為唐主不從遣鴻臚卿潘承祐詣泉建召募驍勇承祐薦前永安節度使許文稹靜江指揮使陳徳誠建州人鄭彦華林仁肇唐主以文稹為西面行營應援使彦華仁肇皆為將仁肇仁翰之弟也夏四月甲子以侍衛親軍都指揮使歸徳節度使李重進為廬夀等州招討使以武徳節度使武行徳為濠州城下都部署唐右衞將軍陸孟俊自常州將兵萬餘人趣泰州周兵遁去孟俊復取之遣陳徳誠戍泰州孟俊進攻揚州屯于蜀岡韓令坤棄揚州走帝遣張永徳將兵救之令坤復入揚州帝又遣太祖皇帝將兵屯六合太祖皇帝令曰揚州兵有過六合者折其足令坤始有固守之志帝自至夀春以來命諸軍晝夜攻城乆不克㑹大雨營中水深數尺攻具及士卒失亡頗多糧運不繼李徳明失期不至乃議旋師或勸帝東幸濠州聲言夀州已破從之己巳帝自夀春循淮而東乙亥至濠州韓令坤敗唐兵於城東擒陸孟俊唐齊王景逹將兵二萬自𤓰步濟江距六合二十餘里設柵不進諸將欲擊之太祖皇帝曰彼設柵自固懼我也今吾衆不滿二千若往擊之則彼見吾衆寡矣不如俟其來而擊之破之必矣居數日唐出兵趣六合太祖皇帝奮擊大破之殺獲近五千人餘衆尚萬餘走度江争舟溺死者甚衆於是唐之精卒盡矣是戰也士卒有不致力者太祖皇帝陽為督戰以劔斫其皮笠明日徧閱其笠有劒跡者數十人皆斬之由是部兵莫敢不盡死先是唐主聞揚州失守命四旁發兵取之己夘韓令坤奏敗楚州兵萬餘人於灣頭堰獲漣州刺史秦進崇張永徳奏敗泗州兵萬餘人於曲溪堰丙戌以宣徽南院使向訓為淮南節度使兼沿江招討使渦口奏新作浮梁成丁亥帝自濠州如渦口帝銳於進取欲自至揚州范質等以兵疲食少泣諫而止帝嘗怒翰林學士竇儀欲殺之范質入救之帝望見知其意即起避之質趨前伏地叩頭諌曰儀罪不至死臣為宰相致陛下枉殺近臣罪皆在臣繼之以泣帝意解乃釋之五月壬辰朔以渦口為鎮淮軍戊戌帝留侍衛親軍都指揮使李重進等圍夀州自渦口北歸乙夘至大梁六月壬申赦淮南諸州繫囚除李氏非理賦役事有不便於民者委長吏以聞侍衛步軍都指揮使彰信節度使李繼勲營於夀州城南唐劉仁贍伺繼勲無備出兵擊之殺士卒數百人焚其攻具唐駕部員外郎朱元因奏事論用兵方略唐主以為能命將兵復江北諸州秋七月唐將朱元取舒州刺史郭令圖棄城走李平取蘄州唐主以元為舒州團練使平為蘄州刺史元又取和州初唐人以茶鹽彊民而徵其粟帛謂之博徴又興營田於淮南民甚苦之及周師至争奉牛酒迎勞而將帥不之恤専事俘掠視民如土芥民皆失望相聚山澤立堡壁自固操農器為兵積紙為甲時人謂之白甲軍周兵討之屢為所敗先所得唐諸州多復為唐有唐之援兵營於紫金山與夀州城中烽火相應淮南節度使向訓奏請以廣陵之兵併力攻夀春俟克城更圖進取詔許之訓封府庫以授揚州主者命揚州牙將分部按行城中秋毫不犯揚州民感悅軍還或負糗糒以送之滁州守將亦乘城去皆引兵趣夀春唐諸將請據險以邀周師宋齊丘曰如此則怨益深不如縱之以徳於敵則兵易解也乃命諸將各自守毋得擅出擊周兵於是夀春之圍益急齊王景逹軍于濠州遙為夀州聲援軍政皆出於陳覺景逹署紙尾而已擁兵五萬無決戰意將吏畏覺無敢言者八月殿前都指揮使義成節度使張永徳屯下蔡唐將林仁肇等以水陸軍援夀春永徳與之戰仁肇以船實薪芻因風縱火欲焚下蔡浮梁俄而風囘唐兵敗退永徳為鐵綆千餘尺距浮梁十餘步横絶淮流繫以巨木由是唐兵不能近冬十月癸酉李重進奏唐人寇盛唐鐵騎都指揮使王彦昇等擊之斬首三千餘級彦昇蜀人也壬午張永徳奏敗唐兵於下蔡是時唐復以水軍攻永徳永徳夜令善游者沒其船下縻以鐵鎻縱兵擊之船不得進退溺死者甚衆永徳解金帶以賞善游者甲申以太祖皇帝為定國節度使兼殿前都指揮使張永徳與李重進不相悅永徳宻表重進有二心帝不之信時二將各擁重兵衆心憂恐重進一日單騎詣永徳營從容宴飲謂永徳曰吾與公幸以肺腑俱為將帥奚相疑若此之深邪永徳意乃解衆心亦安唐主聞之以蠟書遺重進誘以厚利其書皆謗毁及反間之語重進奏之初唐使者孫晟鍾謨從帝至大梁帝待之甚厚毎朝㑹班之於中書省官之後時召見飲以醇酒問以唐事晟但言唐主畏陛下神武事陛下無二心及得唐蠟書帝大怒召晟責以所對不實晟正色抗辭請死而已問以唐虚實黙然不對十一月乙巳帝命都承旨曹翰送晟於右軍巡院更以帝意問之翰與之飲酒數行從容問之晟終不言翰乃謂曰有敇賜相公死晟神色怡然索靴笏整衣冠南向拜曰臣謹以死報國乃就刑并從者百餘人皆殺之貶鍾謨耀州司馬既而帝憐晟忠節悔殺之召謨拜衞尉少卿十二月壬申以張永徳為殿前都㸃檢分命中使發陳蔡宋亳潁兖曹單等州丁夫數萬城下蔡是嵗唐主詔淮南營田害民尤甚者罷之遣兵部郎中陳處堯持重幣浮海如契丹乞兵契丹不能為之出兵而留處堯不遣處堯剛直有口辯乆之忿懟數面責契丹主契丹主亦不之罪也四年春正月周兵圍夀春連年未下城中食盡齊王景逹自濠州遣應援使永安節度使許文稹都軍使邊鎬北面招討使朱元將兵數萬泝淮救之軍於紫金山列十餘寨如連珠與城中烽火晨夕相應又築甬道抵夀春欲運糧以饋之綿亘數十里將及夀春李重進邀擊大破之死者五千人奪其二寨丁未重進以聞戊申詔以來月幸淮上劉仁贍請以邉鎬守城自帥衆決戰齊王景逹不許仁贍憤悒成疾其幼子崇諫夜泛舟度淮北為小校所執仁贍命腰斬之左右莫敢救監軍使周廷構哭於中門以救之仁贍不許廷構復使求救於夫人夫人曰妾於崇諫非不愛也然軍法不可私名節不可虧若貸之則劉氏為不忠之門妾與公何面目見將士乎趣命斬之然後成喪將士皆感泣議者以唐援兵尚彊多請罷兵帝疑之李穀寢疾在第二月丙寅帝使范質王溥就與之謀穀上疏以為夀春危困破在旦夕若鑾駕親征則將士争奮援兵震恐城中知亡必可下矣上悅甲戌以王朴權東京留守兼判開封府事以三司使張美為大内都巡檢以侍衛都虞候韓通為京城内外都巡檢乙亥帝發大梁先是周與唐戰唐水軍鋭敏周人無以敵之帝毎以為恨返自夀春於大梁城西汴水側造戰艦數百艘命唐降卒教北人水戰數月之後縱横出沒殆勝唐兵至是命右驍衛大將軍王環將水軍數千自閔河沿潁入淮周人見之大驚乙酉帝至下蔡三月己丑夜帝度淮抵夀春城下庚寅旦躬擐甲冑軍於紫金山南命太祖皇帝擊唐先鋒寨及山北一寨皆破之斬獲三千餘級斷其甬道由是唐兵首尾不能相救至暮帝分兵守諸寨還下蔡唐朱元恃功頗違元帥節度陳覺與元有隙屢表元反覆不可將兵唐主以武昌節度使楊守忠代之守忠至濠州覺以齊王景逹之命召元詣濠州計事將奪其兵元聞之憤怒欲自殺門下客宋垍說元曰大丈夫何往不富貴何必為妻子死乎辛夘夜元與先鋒壕寨使朱仁裕等舉寨萬餘人降禆將時厚卿不從元殺之帝慮其餘衆沿流東潰遽命虎捷左廂都指揮使趙晁將水軍數千沿淮而下壬辰旦帝軍於趙步諸將擊唐紫金山寨大破之殺獲萬餘人擒許文稹邊鎬楊守忠餘衆果沿淮東走帝自趙步將騎數百循北岸追之諸將以步騎循南岸追之水軍自中流而下唐兵戰溺死及降者殆四萬人獲船艦糧仗以十萬數晡時帝馳至荆山洪距趙步二百餘里是夜宿鎮淮軍癸酉從官始至劉仁贍聞援兵敗扼腕歎息甲午發近縣丁夫數千城鎮淮軍為二城夾淮水徙下蔡浮梁於其間扼濠夀應援之路㑹淮水漲唐濠州都監彭城郭廷謂以水軍沂淮欲掩不備焚浮梁右龍武統軍趙匡賛覘知之㐲兵邀擊破之唐齊王景逹及陳覺皆自濠州奔歸金陵惟静江指揮使陳徳誠全軍而還戊戌以淮南節度使向訓為武寧節度使淮南道行營都監將兵戌鎮淮軍己亥上自鎮淮軍復如下蔡庚子賜劉仁贍詔使自擇禍福唐主議自督諸將拒周中書舍人喬匡舜上疏切諌唐主以為沮衆流撫州唐主問神衛統軍朱匡業劉存忠以守禦方略匡業誦羅隠詩曰時來天地皆同力運去英雄不自由存忠以匡業言為然唐主怒貶匡業撫州副使流存忠於饒州既而竟不敢自出甲辰帝耀兵於夀春城北唐清淮節度使兼侍中劉仁贍病甚不知人丙午監軍使周廷構營田副使孫羽等作仁贍表遣使奉之來降丁未帝賜仁贍詔遣閤門使萬年張保續入城宣諭仁贍子崇讓復出謝罪戊申帝大陳甲兵受降於夀春城北廷構等舁仁贍出城仁贍臥不能起帝慰勞賜賚復令入城養疾庚戌徙夀州治下蔡赦州境死罪以下州民受唐文書聚山林者竝召令復業勿問罪有嘗為其殺傷者毋得讎訟曏日政令有不便於民者令本州條奏辛亥以劉仁贍為天平節度兼中書令制辭畧曰盡忠所事抗節無虧前代名臣幾人堪比朕之伐叛得爾為多是日卒追賜爵彭城郡王唐主聞之亦贈太師帝復以清淮軍為忠正軍以旌仁贍之節以右羽林統軍楊信為忠正節度使同平章事詔開夀州倉賑飢民丙辰帝北還夏四月己巳至大梁甲申分江南降卒為六軍三十指揮號懷徳軍五月丁酉以太祖皇帝領義成節度使唐郭廷謂將水軍斷渦口浮梁又襲敗武寧節度使武行徳于定逺行徳僅以身免唐主以廷謂為滁州團練使充上淮水陸應援使秋七月丁亥上治定逺軍及夀春城南之敗以武寧節度使兼中書令武行徳為左衛上將軍河陽節度使李繼勲為右衛大將軍冬十月壬申帝發大梁十一月丙戌至鎮淮軍是夜五鼓濟淮丁亥至濠州城西濠州東北十八里有灘唐人柵其上環水自固謂周兵必不能涉戊子帝自攻之命内殿直康保裔帥甲士數百乘橐駝涉水太祖皇帝帥騎兵繼之遂拔之李重進破濠州南闗城癸巳帝自攻濠州王審琦抜其水寨唐人屯戰船數百於城北植巨木於淮水以限周兵帝命水軍攻抜其木焚戰船七十餘艘斬首二千餘級又攻抜其羊馬城城中震恐丙申夜唐濠州團練使郭廷謂上表言臣家在江南今若遽降恐為唐所種族請先遣使詣金陵稟命然後出降帝許之辛丑帝聞唐有戰船數百艘在渙水東欲救濠州自將兵夜發水陸擊之癸夘大破唐兵於洞口斬首五千餘級降卒二千餘人因鼔行而東所至皆下乙巳至泗州城下太祖皇帝先攻其南因焚城門破水寨及月城帝居於月城樓督將士攻城十二月乙夘唐泗州守將范再遇舉城降以再遇為宿州團練使上自至泗州城下禁軍中芻蕘者毋得犯民田民皆感悅争獻芻粟既克泗州無一卒敢擅入城者帝聞唐戰船數百艘泊洞口遣騎詗之唐兵退保清口戊午旦上自將親軍自淮北進命太祖皇帝將步騎自淮南進諸將以水軍自中流進共追唐兵時淮濱乆無行人葭葦如織多泥淖溝塹士卒乗勝氣苃涉争進皆忘其勞庚申追及唐兵且戰且行金鼔聲聞數十里辛酉至楚州西北大破之唐兵有沿淮東下者帝自追之太祖皇帝為前鋒行六十里擒其保義節度使濠泗楚海都應援使陳承昭以歸所獲戰船燒沈之餘得三百餘艘士卒殺溺之餘得七千餘人唐之戰船在淮上者於是盡矣郭廷謂使者自金陵還知唐不能救命録事參軍鄱陽李延鄒草降表延鄒責以忠義廷謂以兵臨之延鄒擲筆曰大丈夫終不負國為叛臣作降表廷謂斬之舉濠州降得兵萬人糧數萬斛唐主賞李延鄒之子以官壬戌帝濟淮至楚州營于城西北乙丑唐雄武軍使知漣水縣事崔萬迪降丙寅以郭廷謂為亳州防禦使戊辰帝攻楚州克其月城庚午郭廷謂見於行宫帝曰朕南征以來江南諸將敗亡相繼獨卿能斷渦口浮梁破定逺寨所以報國足矣濠州小城使李璟自守能守之乎使將濠州兵攻天長帝遣鐵騎左廂都指揮使武守𤦺將騎數百趣揚州至高郵唐人悉焚揚州官府民居驅其人南度江後數日周兵至城中餘癃病十餘人而已癸酉守𤦺以聞帝聞泰州無備遣兵襲之丁丑拔泰州五年春正月丁亥右龍武將軍王漢璋奏克海州己丑以侍衛馬軍都指揮使韓令坤權揚州軍府事上欲引戰艦自淮入江阻北神堰不得度欲鑿楚州西北鸛水以通其道遣使行視還言地形不便計功甚多上自往視之授以規畫發楚州民夫浚之旬日而成用功甚省巨艦數百艘皆逹于江唐人大驚以為神壬辰拔靜海軍始通吳越之路先是帝遣左諌議大夫長安尹日就等使吳越語之曰卿今去雖汎海比還淮南已平當陸歸耳已而果然周兵攻楚州踰四旬唐楚州防禦使張彦卿固守不下乙巳帝自督諸將攻之宿於城下丁未克之彦卿與都監鄭昭業猶帥衆拒戰矢刃皆盡彦卿舉繩床以鬭而死所部千餘人至死無一人降者荆南節度使高保融遣指揮使魏璘將戰船百艘東下㑹伐唐至于鄂州唐以天長為雄州以建武軍使易文贇為刺史二月甲寅文贇舉城降戊午帝發楚州丁夘至揚州命韓令坤發丁夫萬餘築故城之東南隅為小城以治之乙亥黄州刺史司超奏與控鶴右廂都指揮使王審琦攻唐舒州擒其刺史施仁望三月壬午朔帝如泰州唐太弟景遂前後凡十表辭位且言今國危不能扶請出就藩鎮燕王𢎞冀嫡長有軍功宜為嗣謹奉上太弟寳冊齊王景逹亦以敗軍辭元帥唐主立景遂為晉王加天策上將軍江南西道兵馬元帥洪州大都督太尉尚書令以景逹為浙西道元帥潤州大都督景逹以浙西方用兵固辭改撫州大都督立𢎞冀為皇太子參決庶政辛夘上如迎鑾鎮屢至江口遣水軍擊唐兵破之上聞唐戰艦數百艘泊東㳍州將趨海口扼蘇杭路遣殿前都虞候慕容廷釗將步騎右神武統軍宋延渥將水軍循江而下甲午延釗奏大破唐兵於東㳍州上遣李重進將兵趣廬州唐主聞上在江上恐遂南度又恥降號稱藩乃遣兵部侍郎陳覺奉表請傳位於太子𢎞冀使聴命於中國時淮南惟廬舒蘄黄未下丙申覺至迎鑾見周兵之盛白上請遣人度江取表獻四州之地畫江為境以求息兵辭指甚哀上曰朕本興師止取江北今爾主能舉國内附朕復何求覺拜謝而退丁酉覺請遣其屬閤門承旨劉承遇如金陵上賜唐主書稱皇帝恭問江南國主慰納之戊戌吳越奏遣上直都指揮使處州刺史卲可遷秀州刺史路彦銖以戰艦四百艘士卒萬七千人屯通州南岸唐主復遣劉承遇奉表稱唐國主請獻江北四州嵗輸貢物數十萬於是江北悉平得州十四縣六十庚子上賜唐主書諭以緣江諸軍及兩浙湖南荆南兵竝當罷歸其廬蘄黄三道亦令斂兵近外俟彼將士及家屬皆就道可遣人召將校以城邑付之江中舟艦有須往來者竝令就北岸引之辛丑陳覺辭行又賜唐主書諭以不必傳位於子壬寅上自迎鑾復如揚州癸夘詔吳越荆南軍各歸本道賜錢𢎞俶犒軍帛三萬匹高保融一萬匹甲辰置保信軍於廬州以右龍武統軍趙匡賛為節度使丙午唐主遣馮延已獻銀錢絹茶穀共百萬以犒軍己酉命宋延渥將水軍三千泝江巡警庚戌敇故淮南節度使楊行宻故昇府節度使徐温等墓竝量給守戸其江南羣臣墓在江北者亦委長吏以時檢校辛亥唐主遣其臨汝公徐遼代己來上夀五月詔賞勞南征士卒及淮南新附之民辛夘以太祖皇帝領忠武節度使唐主避周諱更名景下令去帝號稱國主凡天子儀制皆有降損去年號用周正朔仍告于太廟左僕射同平章事馮延已罷為太子太傅門下侍郎同平章事嚴續罷為少傅樞宻使兵部侍郎陳覺罷守本官初馮延已以取中原之策說唐主由是有寵延已常笑烈祖戢兵為齷齪曰安陸所喪纔數千兵為之輟食咨嗟者旬日此田舍翁識量耳安足與成大事豈如今上暴師數萬於外而擊毬宴樂無異平日真英主也延已與其黨談論常以天下為己任更相唱和翰林學士常夢錫屢言延已等浮誕不可信唐主不聽夢錫曰奸言似忠陛下不悟國必亡矣及臣服於周延已之黨相與言有謂周為大朝者夢錫大笑曰諸分常欲致君堯舜何意今日自為小朝邪衆黙然自唐主内附帝止因使者賜書未嘗遣使至其國己酉始命太府卿馮延魯衛尉少卿鍾謨使于唐賜以御衣玉帶等及犒軍帛十萬并今年欽天厯劉承遇之還金陵也唐主使陳覺白帝以江南無鹵田願得海陵鹽監南屬以贍軍帝曰海陵在江北難以交居當别有處分至是詔嵗支鹽三十萬斛以給江南所俘獲江南士卒稍稍歸之秋八月辛丑馮延魯鍾謨來自唐唐主手表謝恩其畧曰天地之恩厚矣父母之恩深矣子不謝父人何報天惟有赤心可酬大造又乞比藩方賜詔書又稱有情事令鍾謨上奏乞令早還唐主復令謨白帝欲傳位太子九月丁巳以延魯為刑部侍郎謨為給事中己未先遣謨還賜書諭以未可傳位之意唐主復遣吏部尚書知樞密院殷崇義來賀天清節冬十一月乙丑唐主復遣禮部侍郎鍾謨入見初唐太傅兼中書令楚國公宋齊丘多樹朋黨欲以専固朝權躁進之士争附之推奬以為國之元老樞密使陳覺副使李徵古恃齊丘之勢尤驕慢及許文稹等敗於紫金山覺與齊丘景逹自濠州遁歸國人忷懼唐主嘗歎曰吾國家一朝至此因泣下徵古曰陛下當治兵以扞敵涕泣何為豈飲酒過量邪將乳母不至邪唐主色變而徵古舉止自若㑹司天奏天文有變人主宜避位禳災唐主乃曰禍難方殷吾欲釋去萬機棲心冲寂誰可以托國者徵古曰宋公造國手也陛下如厭萬機何不舉國授之覺曰陛下深居禁中國事皆委宋公先行後聞臣等時入侍談釋老而已唐主心愠即命中書舍人豫章陳喬草詔行之喬惶恐請見曰陛下一署此詔臣不復得見矣因極言其不可唐主笑曰爾亦知其非邪乃止由是因晉王出鎮以徵古為之副覺自周還亦罷近職鍾謨素與李德明善以徳明之死怨齊丘及奉使歸唐言於唐主曰齊丘乘國之危遽謀篡竊陳覺李徵古為之羽翼理不可容陳覺之自周還矯以帝命謂唐主曰聞江南連嵗拒命皆宰相嚴續之謀當為我斬之唐主知覺素與續有隙固未之信鍾謨請覆之於周唐主乃因謨復命上言久拒王師皆臣愚迷非續之罪帝聞之大驚曰審如此則續乃忠臣朕為天下主豈教人殺忠臣乎謨還以白唐主唐主欲誅齊丘等復遣謨入稟於帝帝以異國之臣無所可否十二月己亥唐主命知樞宻院殷崇義草詔暴齊丘覺徵古罪惡聴齊丘歸九華山舊隠官爵悉如故覺責授國子博士宣州安置徵古削奪官爵賜自盡黨與皆不問遣使告于周六年春正月唐宋齊丘至九華山唐主命鎖其第穴牆給飲食齊丘歎曰吾昔獻謀幽讓皇帝族於泰州宜其及此乃縊而死諡曰醜繆夏六月唐清源節度使留從效遣使入貢請置進奏院於京師直𨽻中朝戊寅詔報以江南近服方務綏懷卿乆奉金陵未可改圖若置抵上都與彼抗衡受而有之罪在於朕卿逺修職貢足表忠勤勉事舊君且宜如故如此則於卿篤始終之義於朕盡柔逺之宜惟乃通方諒逹予意唐主遣其子紀公從善與鍾謨俱入貢上問謨曰江南亦治兵修守備乎對曰既臣事大國不敢復爾上曰不然曏時則為仇敵今日則為一家吾與汝國大義已定保無它虞然人生難期至於後世則事不可知歸語汝主可及吾時完城郭繕甲兵據守要害為子孫計謨歸以告唐主唐主乃城金陵凡諸州城之不完者葺之戍兵少者益之臣光曰或問臣五代帝王唐莊宗周世宗皆稱英武二主孰賢臣應之曰夫天子所以統治萬國討其不服撫其微弱行其號令一其法度敦明信義以兼愛兆民者也莊宗既滅梁海内震動湖南馬氏遣子希範入貢莊宗曰比聞馬氏之業終為高郁所奪今有兒如此郁豈能得之哉郁馬氏之良佐也希範兄希聲聞莊宗言卒矯其父命而殺之此乃市道商賈之所為豈帝王之體哉葢莊宗善戰者也故能以弱晉勝强梁既得之曽不數年外内離叛置身無所誠由知用兵之術不知為天下之道故也世宗以信令御羣臣以正義責諸國王環以不降受賞劉仁贍以堅守䝉襃嚴續以盡忠獲存蜀兵以反覆就誅馮道以失節被棄張美以私恩見疎江南未服則親犯矢石期於必克既服則愛之如子推誠盡言為之逺慮其宏規大度豈得與莊宗同日語哉書曰無偏無黨王道蕩蕩又曰大邦畏其力小邦懐其德世宗近之矣通鑑紀事本末巻四十二下
