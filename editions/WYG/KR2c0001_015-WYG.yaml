body:
  text: 通鑑紀事本末卷十五上宋袁樞撰江左經略中原晉成帝咸康五年春三月征西將軍庾亮欲開復中原表桓宣為都督沔北前鋒諸軍事司州刺史鎮襄陽又表其弟臨川太守懌為監梁雍二州諸軍事梁州刺史鎮魏興西陽太守翼為南蠻校尉領南郡太守鎮江陵皆假節又請解豫州以授征虜將軍毛寳詔以寳監揚州及江西諸軍事豫州刺史與西陽太守樊峻帥精兵萬人戍邾城以建威將軍陶稱為南中郎將江夏相入沔中稱將二百人下見亮亮素惡稱輕狡數稱前後罪惡収而斬之後以魏興險逺命庾懌徙屯半洲更以武昌太守陳囂為梁州刺史趣漢中遣參軍李松攻漢巴郡江陽夏四月執漢荆州刺史李閎巴郡太守黄植送建康漢主夀以李奕為鎮東將軍代閎守巴郡庾亮上疏言蜀甚弱而胡尚彊欲帥大衆十萬移鎮石城遣諸軍羅布江沔為伐趙之規帝下其議丞相導請許之太尉鑒議以為資用未備不可大舉太常蔡謨議以為時有否泰道有屈伸茍不計彊弱而輕動則亡不終日何功之有為今之計莫若養威以俟時時之可否繫胡之彊弱胡之彊弱繋石虎之能否自石勒舉事虎常為爪牙百戰百勝遂定中原所據之地同於魏世勒死之後虎挾嗣君誅將相内難旣平翦削外㓂一舉而㧞金墉再戰而禽石生誅石聰如拾遺取郭權如振槁四境之内不失尺土以是觀之虎為能乎將不能也論者以胡前攻襄陽不能㧞謂之無能為夫百戰百勝之彊而以不㧞一城為劣譬諸射者百發百中而一失可以謂之拙乎且石遇偏師也桓平北邊將也所爭者疆場之土利則進否則退非所急也今征西以重鎮名賢自將大軍欲席卷河南虎必自帥一國之衆來決勝負豈得以襄陽為比哉今征西欲與之戰何如石生若欲城守何如金墉欲阻沔水何如大江欲拒石虎何如蘓峻凡此數者宜詳校之石生猛將闗中精兵征西之戰殆不能勝也金墉險固劉曜十萬衆不能㧞征西之守殆不能勝也又當是時洛陽闗中皆舉兵擊虎今此三鎮反為其用方之於前倍半之勢也石生不能敵其半而征西欲當莫倍愚所疑也蘓峻之彊不及石虎沔水之險不及大江大江不能禦蘓峻而欲以沔水禦石虎又所疑也昔祖士雅在譙佃於城北界胡來攻豫置軍屯以禦其外榖將熟胡果至丁夫戰於外老弱穫於内多持炬火急則燒榖而走如此數年竟不得其利當是時胡惟據河北方之於今四分之一耳士雅不能捍其一而征西欲以禦其四又所疑也然此但論征西旣至之後耳尚未論道路之慮也自沔以西水急岸髙魚貫泝流首尾百里若胡無宋襄之義及我未陣而撃之將如之何今王土與胡水陸異埶便習不同胡若送死則敵之有餘若棄江逺進以我所短撃彼所長懼非廟勝之筭也朝議多與謨同乃詔亮不聽移鎮秋八月南昌文成公郄鑒疾篤以府事付長史劉遐上疏乞骸骨且曰臣所統錯雜率多北人或逼遷徙或是新附百姓懷土皆有歸本之心臣宣國恩示以好惡處與田宅漸得少安聞臣疾篤衆情駭動若當北渡必啟㓂心太常臣謨平簡貞正素望所歸謂可以為都督徐州刺史詔以蔡謨為太尉軍司加侍中辛酉鑒薨即以謨為征北將軍都督徐兖青三州諸軍事領徐州刺史假節時左衞將軍陳光請伐趙詔遣光攻夀陽謨上疏曰夀陽城小而固自夀陽至琅邪城壁相望一城見攻衆城必救又王師在路五十餘日前驅未至聲息久聞賊之郵驛一日千里河北之騎足以來赴夫以白起韓信項籍之勇猶發梁焚舟背水而陣今欲停船水渚引兵造城前對堅敵顧臨歸路此兵灋之所誡若進攻未㧞胡騎猝至懼桓子不知所為而舟中之指可掬也今光所將皆殿中精兵宜令所向有征無戰而頓之堅城之下以國之爪士撃㓂之下邑得之則利薄而不足損敵失之則害重而足以益㓂懼非策之長者也乃止初陶侃在武昌議者以江北有邾城宜出兵戍之侃毎不答而言者不已侃乃渡水獵引將佐語之曰我所以設險而禦㓂者正以長江耳邾城隔在江北内無所倚外接羣夷夷中利深晉人貪利夷不堪命必引虜入㓂此乃致禍之由非禦㓂也且吳時戍此城用三萬兵今縱有兵守之亦無益於江南若羯虜有可乘之㑹此又非所資也及庾亮鎮武昌卒使毛寳樊峻戍邾城趙王虎惡之以䕫安為大都督帥石鑒石閔李農張貉李菟等五將軍兵五萬人㓂荆揚北鄙二萬騎攻邾城毛寳求救於庾亮亮以城固不時遣兵九月石閔敗晉兵於沔隂殺將軍蔡懷夔安李農䧟沔南朱保敗晉兵於白石殺鄭豹等五將軍張貉䧟邾城死者六千人毛寳樊峻突圍出走赴江溺死夔安進據胡亭㓂江夏義陽將軍黄沖義陽太守鄭進皆降於趙安進圍石城竟陵太守李陽拒戰破之斬首五千餘級安乃退遂掠漢東擁七千餘戸遷于幽冀是時庾亮猶上疏欲遷鎮石城聞邾城陷乃止上表陳謝自貶三等行安西將軍有詔復位以輔國將軍庾懌為豫州刺史監宣城廬江歴陽安豐四郡諸軍事假節鎮蕪湖六年春正月庚子朔都亭文康侯庾亮薨以䕶軍録尚書何充為中書令庚戌以南郡太守庾翼為都督江荆司雍梁益六州諸軍事安西將軍荆州刺史假節代亮鎮武昌時人疑翼年少不能繼其兄翼悉心為治戎政嚴明數年之間公私充實人皆稱其才八年庾翼在武昌數有妖恠欲移鎮樂鄉征虜長史王述與庾冰牋曰樂鄉去武昌千有餘里數萬之衆一旦移徙興立城壁公私勞擾又江州當泝流數千里供給軍府力後增倍且武昌實江東鎮戍之中非但扞禦上流而已緩急赴告駿犇不難若移樂鄉逺在西陲一朝江渚有虞不相接救方嶽重將固當居要害之地為内外形埶使闚􅎿之心不知所向昔秦思亡胡之䜟卒為劉項之資周惡檿弧之謠而成褒姒之亂是以達人君子直道而行禳避之道皆所不取正當擇人事之勝理思社稷之長計耳朝議亦以為然翼乃止秋七月已未以何充為驃騎將軍都督徐州揚州之晉陵諸軍事領徐州刺史鎮京口避諸庾也康帝建元元年庾翼為人慷慨喜功名不尚浮華琅邪内史桓温彞之子也尚南康公主豪爽有風槩翼與之友善相期以寜濟海内翼嘗薦温於成帝曰桓温有英雄之才願陛下勿以常人遇之常壻畜之宜委以方邵之任必有𢎞濟艱難之勲時杜乂殷浩並才名冠世翼獨弗之重也曰此輩宜束之髙閣俟天下太平然後徐議其任耳浩累辭徴辟屏居墓所幾將七年時人擬之管葛江夏相謝尚長山令王濛常伺其出處以卜江左興亡嘗相與省之知浩有確然之志既返相謂深源不起當如蒼生何尚鯤之子也翼請浩為司馬詔除侍中安西軍司浩不應翼遺浩書曰王夷甫立名非真雖云談道實長華競明徳君子遇㑹處際寜可然乎浩猶不起殷羨為長沙相在郡貪殘庾氷與翼書屬之翼報曰殷君驕豪亦似由有佳兒弟故小令物情容之大較江東之政以嫗煦豪彊常為民蠹時有行法輒施之寒劣如往年偷石頭倉米一百萬斛皆是豪將輩而直殺倉督監以塞責山遐為餘姚長為官出豪彊所藏二千戸而衆共驅之令遐不得安席雖皆前宰之惛謬江東事去寔此之由兄弟不幸横陷此中自不能㧞足於風塵之外當共明目而治之荆州所統二十餘郡唯長沙最惡惡而不黜與殺督監者復何異邪遐簡之子也翼以滅胡取蜀為己任遣使東約燕王皝西約張駿刻期大舉朝議多以為難唯庾冰意與之同而桓温譙王無忌皆賛成之無忌丞之子也秋七月趙汝南太守戴開帥數千人詣翼降丁巳下詔議經略中原翼欲悉所部之衆北伐表桓宣為都督同雍梁三州荆州之四郡諸軍事梁州刺史前趣丹水桓温為前鋒小督假節帥衆入臨淮並發所統六州奴及車牛驢馬百姓嗟怨八月庾翼欲移鎮襄陽恐朝廷不許乃奏云移鎮安陸帝及朝士皆遣使譬止翼翼遂違詔北行至夏口復上表請鎮襄陽翼時有衆四萬詔加翼都督征討諸軍事先是車騎將軍揚州刺史庾氷屢求出外辛巳以冰都督荆江寜益梁交廣七州豫州之四郡諸軍事領江州刺史假節鎮武昌以為翼繼援徵徐州刺史何充為都督揚豫徐州之琅邪諸軍事領揚州刺史録尚書事輔政以琅邪内史桓温為都督青徐兖三州諸軍事徐州刺史徴江州刺史楮裒為衞將軍領中書令二年夏四月征西將軍庾翼使梁州刺史桓宣撃趙將李羆於丹水為羆所敗翼貶宣為建威將軍宣慙憤成疾秋八月庚辰卒翼以長子方之為義城太守代領宣衆又以司馬應誕為襄陽太守參軍司馬勲為梁州刺史戍西城中書令禇裒固辭樞要閏月丁巳以裒為左將軍都督兖州徐州之琅邪諸軍事兖州刺史鎮金城秋九月帝崩穆帝即位以裒為侍中衞將軍録尚書事持節督刺史如故裒以近戚懼獲譏嫌上疏固請居藩改授都督徐兖青三州揚州之二郡諸軍事衞將軍徐兖二州刺史鎮京口冬十月江州刺史庾冰有疾太后徴冰輔政冰辭十一月庚辰卒庾翼以家國情事留子方之為建武將軍戍襄陽方之年少以參軍毛穆之為建武司馬以輔之穆之寳之子也翼還鎮夏口詔翼復督江州又領豫州刺史翼辭豫州復欲移鎮樂鄉詔不許翼仍繕修軍器大佃積榖以圖後舉穆帝永和元年春正月詔徴衞將軍禇裒欲以為揚州刺史録尚書事吏部尚書劉遐長史王胡之說裒曰㑹稽王令徳雅望國之周公也足下宜以大政授之裒乃固辭歸藩壬戌以㑹稽王昱為撫軍大將軍録尚書六條事都亭肅侯庾翼疽發于背表子爰之行輔國將軍荆州刺史委以後任司馬義陽朱燾為南蠻校尉以千人守巴陵秋七月庚午卒庾翼旣卒朝議皆以諸庾世在西藩人情所安宜依翼所請以庾爰之代其任何充曰荆楚國之西門戸口百萬北帶彊胡西隣勁蜀地埶險阻周旋萬里得人則中原可定失人則社稷可憂陸抗所謂存則吳存亡則吳亡者也豈可以白面少年當之哉桓温英略過人有文武器幹西夏之任無出温者議者又曰庾爰之肯避温乎如令阻兵恥懼不淺充曰温足以制之諸君勿憂丹陽尹劉惔毎竒温才然知其有不臣之志謂㑹稽王昱曰温不可使居形勝之地其位號常宜抑之勸昱自鎮上流以己為軍司昱不聽又請自行亦不聽庚辰以徐州刺史桓温為安西將軍持節都督荆司雍益梁寜六州諸軍事領䕶南蠻校尉荆州刺史爰之果不敢爭又以劉惔監沔中諸軍事領義成太守代庾方之徙方之爰之于豫章桓温甞雪欲獵先過劉惔惔見其裝束甚嚴謂之曰老賊欲持此何為温笑曰我不為此卿安得坐談乎二年春二月禇裒薦前光禄大夫顧和前司徒左長史殷浩三月丙子以和為尚書令浩為建武將軍揚州刺史和有母喪固辭不起謂所親曰古人有釋衰絰從王事者以其才足幹時故也如和者正足以虧孝道傷風俗耳識者美之浩亦固辭㑹稽王昱與浩書曰屬當厄運危弊理極足下沈識淹長足以經濟若復深存挹退茍遂本懷吾恐天下之事於此去矣足下去就即時之廢興則家國不異足下宜深思之浩乃就職四年夏四月㑹稽王昱以揚州刺史殷浩有盛名朝野推服乃引為心膂與參綜朝權欲以抗温由是與温寖相疑貳浩以征北長史荀羨前江州刺史王羲之夙有令名擢羨為吳國内史義之為䕶軍將軍以為羽翼羨㽔之弟羲之導之從子也羲之以為内外恊和然後國家可安勸浩及羨不宜與温搆隙浩不從五年夏六月桓温聞趙亂出屯安陸遣諸將經營北方趙揚州刺史王浹舉夀春降西中郎將陳逵進據夀春征北大將軍禇裒上表請伐趙即日戒嚴直指泗口朝議以裒事任貴重不宜深入宜先遣偏師裒奏言前已遣前鋒督䕶王頥之等徑造彭城後遣督䕶麋嶷進據下邳今宜速發以成聲勢秋七月加裒征討大都督督徐兖青楊豫五州諸軍事裒帥衆三萬徑赴彭城北方士民降附者日以干計朝野皆以為中原指期可復光禄大夫蔡謨獨謂所親曰胡滅誠為大慶然恐更貽朝廷之憂其人曰何謂也謨曰夫能順天乘時濟羣生於艱難者非上聖與英雄不能為也自餘則莫若度徳量力觀今日之事殊非時賢所及必將經營分表疲民以逞旣而材略疎短不能副心財殫力竭智勇俱困安得不憂及朝廷乎魯郡民五百餘家相與起兵附晉求援於禇裒裒遣部將王龕李邁將銳卒三千迎之趙南討大都督李農帥騎二萬與龕等戰於代陂龕等大敗皆沒於趙八月裒退屯廣陵陳逵聞之焚夀春積聚毁城遁還裒上疏乞自貶詔不許命裒還鎮京口解征討都督時河北大亂遺民二十餘萬口渡河欲來歸附㑹裒已還威埶不接皆不能自㧞死亡畧盡冬十一月都鄉元穆侯禇裒已至京口聞哭聲甚多以問左右對曰皆代陂死者之家也裒慙憤發疾十二月己酉卒以吳國内史荀羨為使持節監徐兖二州揚州之晉陵諸軍事徐州刺史時年二十八中興方伯未有如羨之少者六年春正月朝廷聞中原大亂復謀進取己丑以揚州刺史殷浩為中軍將軍假節都督楊豫徐兖青五州諸軍事以蒲洪為氐王使持節征北大將軍都督河北諸軍事冀州刺史廣川郡公蒲健為假節右將軍監河北征討前鋒諸軍事襄國公七年初桓温聞石氏亂上疏請出師經略中原事乆不報温知朝廷仗殷浩以抗已甚忿之然素知浩之為人亦不之憚也以國無他釁遂得相持彌年雖有君臣之跡羈縻而已八州士衆資調殆不為國家用屢求北伐詔書不聽十二月辛未温拜表輒行帥衆四五萬順流而下軍于武昌朝廷大懼殷浩欲去位以避温又欲以騶虞幡駐温軍吏部尚書王彪之言於㑹稽王昱曰此屬皆自為計非能保社稷為殿下計也若殷浩去職人情離駭天子獨坐當此之際必有任其責者非殿下而誰乎又謂浩曰彼若抗表問罪卿為之首事任如此猜釁已成欲作匹夫豈有全地邪且當静以待之令相王與手書示以款誠為陳成敗彼必旋師若不從則遣中詔又不從乃當以正義相裁奈何無故忩忩先自猖獗乎浩曰決大事正自難頃日來欲使人悶聞卿此謀意始得了彪之彬之子也撫軍司馬髙崧言於昱曰王宜致書諭以禍福自當返斾如其不爾使六軍整駕逆順於兹判矣乃於坐為昱草書曰㓂難宜平時㑹宜接此實為國逺圖經略大筭能𢎞斯㑹非足下而誰但以比興師動衆要當以資實為本運轉之艱古人所難不可易之於始而不熟慮頃所以深用為疑惟在此耳然異常之舉衆之所駭遊聲噂􅊱想足下亦少聞之茍患失之無所不至或能望風振擾一時崩散如此則望實並喪社稷之事去矣皆由吾闇弱徳信不著不能鎮静羣庻保固維城所以内愧于心外慙良友吾與足下雖職有内外安社稷保家國其致一也天下安危繋之明徳當先思寜國而後圖其外使王基克隆大義𢎞著所望於足下區區誠懐豈可復顧嫌而不盡哉温即上疏惶恐致謝回軍還鎮八年春正月尚書左丞孔嚴言於殷浩曰比來衆情良可寒心不知使君當何以鎮之愚謂宜明受任之方韓彭專征伐蕭曹守管籥内外之任各有攸司深思亷藺屈身之義平勃交歡之謀令穆然無間然後可以保大定功也觀頃日降附之徒皆人靣獸心貪而無親恐難以義感也浩不從嚴愉之從子也浩上疏請北出許洛詔許之以安西將軍謝尚北中郎將荀羨為都統進屯夀春謝尚不能撫慰張遇遇怒㨿許昌叛使其將上官㤙㨿洛陽樂𢎞攻督䕶戴施於倉垣浩軍不能進三月命荀羨鎮淮隂尋加監青州諸軍事又領兖州刺史鎮下邳姚弋仲卒子襄帥歸晉襄單騎渡淮見謝尚于夀春尚聞其名命去仗衞幅巾待之歡若平生襄慱學善談論江東人士皆重之夏四月秦以張遇為征東大將軍豫州牧六月謝尚姚襄共攻張遇于許昌秦主健遣丞相東海王雄衞大將軍平昌王菁略地闗東帥步騎二萬救之丁亥戰于潁水之誡橋尚等大敗死者萬五千人尚犇還淮南襄棄輜重送尚于芍陂尚悉以後事付襄殷浩聞尚敗退屯夀春秋七月秦丞相雄徙張遇及陳潁許洛之民五萬餘戸於闗中以右衞將軍楊羣為豫州刺史鎮許昌謝尚降號建威將軍殷浩之北伐也中軍將軍王羲之以書止之不聽旣而無功復謀再舉羲之遺浩書曰今以區區江左天下寒心固己乆矣力爭武功非所當作自頃處内外之任者未有深謀逺慮而疲竭根本各從所志竟無一功可論遂令天下將有土崩之埶任其事者豈得辭四海之責哉今軍破於外資竭於内保淮之志非所復及莫若還保長江督將各復舊鎮自長江以外羈縻而已引咎責躬更為善治省其賦後與民更始庻可以救倒懸之急也使君起於布衣任天下之重當董統之任而敗喪至此恐闔朝羣賢未有與人分其任者若猶以前事為未工故復求之於分外宇宙雖廣自容何所此愚智所不解也又與㑹稽王昱牋曰為人臣者誰不願尊其主比隆前世况遇難得之運哉顧力有所不及豈可不權輕重而處之也今雖有可喜之㑹内求諸已而所憂乃重於所喜功未可期遺黎殱盡勞後無時徴求日重以區區吳越經緯天下十分之九不亡何待而不度徳量力不弊不已此封内所痛心歎悼而莫敢吐誠者也往者不可諌來者猶可追願殿下更垂三思先為不可勝之基須根立埶舉謀之未晚若不行恐麋鹿之游將不止林數而已願殿下蹔廢虚逺之懷以救倒懸之急可謂以亡為存轉禍為福也不從九月浩屯泗口遣河南太守戴施據石門滎陽太守劉遯戍倉垣浩以軍興罷遣太學生徒學校由此遂廢冬十月謝尚遣冠軍將軍王侠攻許昌克之秦豫州刺史楊羣退屯𢎞農徴尚為給事中戍石頭九年秋七月張遇叛秦伏誅九月姚襄屯歴陽以燕秦方强未有北伐之志乃夾淮廣興屯田訓厲將士殷浩在夀春惡其彊盛囚襄諸弟累遣刺客刺之刺客皆以情告襄安北將軍魏統卒弟憬代領部曲浩潜遣憬帥衆五千襲之襄斬憬并其衆浩愈惡之使龍驤將軍劉啟守譙遷襄于梁國蠡臺表授梁國内史魏憬子弟數往來夀春襄益疑懼遣參軍權翼使於浩浩曰身與姚平北共為王臣休戚同之平北每舉動自專甚失輔車之理豈所望也翼曰平北英姿絶世擁兵數萬而逺歸晉室者以朝廷有道宰輔明哲故也今將軍輕信讒慝之言與平北有隙愚謂猜嫌之端在此不在彼也浩曰平北姿性豪邁生殺自由又縱小人掠奪吾馬王臣之體固若是乎翼曰平北歸命聖朝豈肯妄殺無辜姦宄之人亦王灋所不容也殺之何害浩曰然則掠馬何也翼曰將軍謂平北雄武難制終將討之故取馬欲以自衞耳浩笑曰何至是也初浩隂遣人誘秦梁安雷弱兒使殺秦主健許以闗右之任弱兒等偽許之且請兵應接浩聞張遇作亂健兄子輔國將軍黄眉自洛陽西犇以為安等事已成冬十月浩自夀春帥衆七萬北伐欲進據洛陽修復園陵吏部尚書王彪之上㑹稽王昱牋以為弱兒等容有詐偽浩未應輕進不從浩以姚襄為前驅襄引兵北行度浩將至詐令部衆夜遁隂伏甲以邀之浩聞而追襄至山桑襄縱兵撃之浩大敗棄輜重走保譙城襄俘斬萬餘悉収其資仗使兄益守山桑襄復如淮南㑹稽王昱謂王彪之曰君言無不中張陳無以過也冬十一月殷浩使部將劉啟王彬之攻姚益於山桑姚襄自淮南撃之啟彬之皆敗死襄進據芍陂十二月姚襄濟淮屯盱眙招掠流民衆至七萬分置守宰勸課農桑遣使詣建康罪狀殷浩并自陳謝詔以謝尚都督江西淮南諸軍事豫州刺史鎮歴陽十年故魏降将周成反自宛襲洛陽殷浩連年北伐師徒屢敗糧械都盡征西將軍桓温因朝野之怨上疏數浩之罪請廢之朝廷不得已免浩為庻人徙東陽之信安自此内外大權一歸於温矣春二月乙丑桓温統步騎四萬發江陵水軍自襄陽入均口至南鄉步兵自浙川趣武闗命司馬勲出子午道以伐秦姚襄遣使降燕三月桓温别將攻上洛獲秦荆二州刺史郭敬進撃青泥破之司馬勲掠秦西鄙凉秦州刺史王擢攻陳倉以應温秦主健遣太子萇丞相雄淮南王生平昌王菁北平王碩帥衆五萬軍于嶢桞以拒温夏四月已亥温與秦兵戰于藍田秦淮南王生單騎突陳出入以十數殺傷晉將士甚衆温督衆力戰秦兵大敗將軍桓冲又敗秦丞相雄于白鹿原沖温之弟也温轉戰而前壬寅進至灞上秦太子萇等退屯城南秦主健與老弱六千固守長安小城悉發精兵三萬遣大司馬雷弱兒等與萇合兵以拒温三輔郡縣皆來降温撫諭居民使安堵復業民争持牛酒迎勞男女夾路觀之耆老有垂泣者曰不圖今日復覩官軍夏五月北海王猛少好學倜儻有大志不屑細務人皆輕之猛悠然自得隱居華隂間桓温入闗披褐詣之捫虱而談當世之務旁若無人温異之問曰吾奉天子之命將銳兵十萬為百姓除殘賊而三秦豪傑未有至者何也猛曰公不逺數千里深入敵境今長安咫尺而不度灞水百姓未知公心所以不至温嘿然無以應徐曰江東無卿比也乃署猛軍謀祭酒温與秦丞相雄等戰于白鹿原温兵不利死者萬餘人初温指秦麥以為糧旣而秦人悉芟麥清野以待之温軍乏食六月丁丑徙闗中三千餘戸而歸以王猛為髙官督䕶欲與俱還猛辭不就呼延毒帥衆一萬從温還秦太子萇等隨温撃之比至潼闗温軍屢敗失亡以萬數温之屯灞上也順陽太守薛珍勸温徑進逼長安温弗從珍以徧師獨濟頗有所獲及温退乃還顯言於衆自矜其勇而咎温之持重温殺之秋九月桓温還自伐秦帝遣侍中黄門勞温于襄陽十一年夏四月姚襄所部多勸襄北還襄從之五月襄攻冠軍將軍髙季於外黄㑹季卒襄進據許昌冬十月以豫州刺史謝尚督并冀幽三州鎮夀春十二年春二月桓温請移都洛陽修復園陵章十餘上不許拜征討大都督督司冀二州諸軍事以討姚襄夏四月姚襄自許昌攻周成于洛陽秋七月姚襄攻洛陽踰月不克長史王亮諌曰明公英名葢世兵彊民附今頓兵堅城之下力屈威挫或為他㓂所乗此危亡之道也襄不從桓温自江陵北伐遣督䕶髙武據魯陽輔國將軍戴施屯河上自帥大兵繼進與僚屬登平乗樓望中原歎曰遂使神州陸沈百年丘墟王夷甫諸人不得不任其責記室陳郡袁宏曰運有興廢豈必諸人之過温作色曰昔劉景升有千斤大牛噉芻豆十倍於常牛負重致逺曽不若一羸牸魏武入荆州殺以享軍八月己亥温至伊水姚襄撤圍拒之匿精鋭於水北林中遣使謂温曰承親帥王師以來襄今奉身歸命願敕三軍小却當拜伏路左温曰我自開復中原展敬山陵無預君事欲來者便前相見在近何煩使人襄據水而戰温結陳而前親被甲督戰襄衆大敗死者數千人襄帥麾下數千騎犇於洛陽北山其夜民棄妻子隨襄者五千餘人襄勇而愛人雖戰屢敗民知襄所在輒扶老携幼奔馳而赴之温軍中傳言襄病創已死許洛士女為温所得者無不北望而泣襄西走温追之不及𢎞農楊亮自襄所來奔温問襄之為人亮曰襄神明器宇孫䇿之儔而雄武過之周成帥衆出降温屯故太極殿前既而徙屯金墉城己丑謁諸陵有毁壊者修復之各置陵令表鎮西將軍謝尚都督司州諸軍事鎮洛陽以尚未至留潁川太守毛穆之督䕶陳午河南太守戴施以二千人戍洛陽衛山陵徙降民三千餘家於江漢之間執周成以歸姚襄奔平陽秦并州刺史尹赤復以衆降襄襄遂據襄陵秦大將軍張平擊之襄為平所敗乃與平約為兄弟各罷兵冬十一月詔遣兼司空散騎常侍車灌等持節如洛陽修五陵十二月庚戌帝及羣臣皆服緦臨於太極殿三日司州都督謝尚以疾不行以丹陽尹王胡之代之未行而卒胡之廙之子也桓温伐燕晉穆帝升平二年趙之亡也其將髙昌遣使降燕已而降晉又降秦各受爵位欲中立以自固燕主儁使司空陽騖討昌於東燕三年夏六月髙昌不能拒燕秋七月自白馬犇滎陽五年春二月髙昌卒燕河内太守吕䕶并其衆遣使來降拜䕶冀州刺史䕶欲引晉兵以襲鄴三月燕太宰恪將兵五萬冠軍將軍皇甫真將兵萬人共討之燕兵至野王䕶嬰城自守䕶軍將軍傅顔請急攻之以省大費恪曰老賊輕變多矣觀其守備未易猝攻頃攻黎陽多殺精鋭卒不能拔自取困辱䕶内無蓄積外無救援我深溝髙壘坐而守之休兵養士離間其黨於我不勞而賊勢日蹙不過十旬取之必矣何為多殺士卒以求旦夕之功乎乃築長圍守之夏四月桓温以其弟黄門郎豁督沔中七郡諸軍事兼新野義城二郡太守將兵取許昌破燕將慕容塵燕人圍野王數月吕䕶遣其將張興出戰傅顔擊斬之城中日蹙皇甫真戒部將曰䕶勢窮犇突必擇虚隙而投之吾所部士卒多羸器甲不精宜深為之備乃多課櫓楯親察行夜者䕶食盡果夜悉精鋭趨真所部突圍不得出太宰恪引兵擊之䕶衆死傷殆盡棄妻子犇滎陽恪存撫降民給其廩食徙士人將帥於鄴自餘各隨所樂以䕶參軍廣平梁琛為中書著作郎冬十月吕䕶復叛犇燕燕人赦之以為廣州刺史哀帝隆和元年春正月燕豫州刺史孫興請攻洛陽曰晉將陳祐弊卒千餘介守孤城不足取也燕人從其言遣寧南將軍吕䕶屯河隂二月辛未以吳國内史庾希為北中郎將徐兖二州刺史鎮下邳龍驤將軍袁真為西中郎將監䕶豫司并冀四州諸軍事豫州刺史鎮汝南並假節希冰之子也燕吕䕶攻洛陽三月乙酉河南太守戴施犇宛陳祐告急五月丁巳桓温遣庾希及竟陵太守鄧遐帥舟師三千人助祐守洛陽遐嶽之子也温上疏請遷都洛陽自永嘉之亂播流江表者請一切北徙以實河南朝廷畏温不敢為異而北上蕭條人情疑懼雖並知不可莫敢先諫散騎常侍領著作郎孫緯上疏曰昔中宗龍飛非惟信順協於天人實賴萬里長江畫而守之耳今自䘮亂已來六十餘年河洛丘墟函夏蕭條士民播流江表已經數世存者老子長孫亡者丘隴成行雖北風之思感其素心目前之哀實為交切若遷都旋軫之日中興五陵即復緬成遐域泰山之安既難以理保烝烝之思豈不纒於聖心哉温今此舉誠欲大覽始終為國逺圖而百姓震駭同懷危懼豈不以反舊之樂賖而趨死之憂促哉何者植根江外數十年矣一朝頓欲拔之驅踧於空荒之地提挈萬里踰險浮深離墳墓棄生業田宅不可復售舟車無從而得捨安樂之國適習亂之鄉將頓仆道塗飄溺江川僅有達者此仁者所宜哀矜國家所宜深慮也臣之愚計以為且宜遣將帥有威名資實者先鎮洛陽掃平梁許清壹河南運漕之路既通開墾之積已豐犲狼逺竄中夏小康然後可徐議遷徙耳奈何捨百勝之長理舉天下而一擲哉緯楚之孫也少慕髙尚嘗著遂初賦以見志温見緯表不悦曰致意興公何不尋君遂初賦而知人家國事邪時朝廷憂懼將遣侍中止温揚州刺史王述曰温欲以虚聲威朝廷耳非事實也但從之自無所至乃詔温曰在昔䘮亂忽涉五紀戎狄肆暴繼襲凶跡眷言西顧慨歎盈懷知欲躬帥三軍蕩滌氛穢廓清中畿光復舊京非夫外身狗國孰能若此諸所處分委之髙筭但河洛丘墟所營者廣經始之勤政勞懷也事果不行温又議移洛陽鐘虡述曰永嘉不競暫都江左方當蕩平區宇旋軫舊京若其不爾宜改遷園陵不應先事鐘虡温乃止朝廷以交廣遼逺改授温都督并司冀三州温表辭不受秋七月吕䕶退守小平津中流矢而卒燕將叚崇收軍北渡屯于野王鄧遐進屯新城八月西中郎將袁真進屯汝南運粟五萬斛以饋洛陽冬十二月庾希自下邳退屯山陽袁真自汝南退屯夀陽興寧元年夏四月燕寧東將軍慕容忠攻滎陽太守劉逺逺犇魯陽五月以西中郎將袁真都督司冀并三州諸軍事北中郎將庾希都督青州諸軍事癸夘燕人拔密城劉逺犇江陵冬十月燕鎮南將軍慕容塵攻陳留太守袁披于長平汝南太守朱斌乗虚襲許昌克之二年春二月燕太傅評龍驤將軍李洪略地河南夏四月甲辰燕李洪攻許昌汝南敗晉兵於懸瓠潁川太守李福戰死汝南太守朱斌犇夀春陳郡太守朱輔退保彭城大司馬温遣西中郎將袁真等禦之温帥舟師屯合肥燕人遂拔許昌汝南陳郡徙萬餘戸于幽冀二州遣鎮南將軍慕容塵屯許昌秋八月燕太宰恪將取洛陽先遣人招納士民逺近諸塢皆歸之乃使司馬悦希軍于盟津豫州刺史孫興軍于成皋初沈充之子勁以其父死於逆亂志欲立功以雪舊恥年三十餘以刑家不得仕吳興太守王胡之為司州刺史上疏稱勁才行請解禁錮參其府事朝廷許之㑹胡之以病不行及燕人逼洛陽冠軍將軍陳祐守之衆不過二千勁自表求配祐効力詔以勁補冠軍長史令自募壯士得千餘人以行勁屢以少擊燕衆摧破之而洛陽糧盡援絶祐自度不能守乃以救許昌為名九月留勁以五百人守洛陽祐帥衆而東勁喜曰吾志欲致命今得之矣祐聞許昌已沒遂犇新城燕悦希引兵略河南諸城盡取之三年春正月大司馬温移鎮姑孰二月乙未以其弟右將軍豁監荆州揚州之義城雍州之京兆諸軍事領荆州刺史加江州刺史桓冲監江州及荆豫八郡諸軍事並假節司徒昱聞陳祐棄洛陽㑹大司馬温于洌洲共議征討丙申帝崩于西堂事遂寢燕太宰恪吳王垂共攻洛陽恪謂諸將曰卿等常患吾不攻今洛陽城髙而兵弱易克也勿更畏懦而怠惰遂攻之三月克之執揚武將軍沈勁勁神氣自若恪將宥之中軍将軍慕輿虔曰勁雖竒士觀其志度終不為人用今赦之必為後患遂殺之恪略地至崤澠闗中大震秦王堅自將屯陜城以備之燕人以左中郎將慕容筑為洛州刺史鎮金墉吳王垂為都督荆揚洛徐兖豫雍益凉秦十州諸軍事征南大將軍荆州牧配兵一萬鎮魯陽海西公太和元年冬十月燕撫軍將軍下邳王厲冦兖州拔魯髙平數郡置守宰而還十二月南陽督䕶趙億據宛城降燕太守桓澹走保新野燕人遣南中郎將趙盤自魯陽戍宛二年夏四月燕慕容塵冦竟陵太守羅崇擊破之荆州刺史桓豁竟陵太守羅崇攻宛拔之趙億遁走趙盤退歸魯陽豁追擊盤於雉城擒之留兵戍宛而還秋九月以㑹稽内史郗愔為都督徐兖青幽楊州之晉陵諸軍事徐兖二州刺史鎮京口四年春三月大司馬温請與徐兖二州刺史郗愔江州刺史桓冲豫州刺史袁真等伐燕初愔在北府温常云京口酒可飲兵可用深不欲愔居之而愔暗於事機乃遺温牋欲共奬王室請督所部出河上愔子超為温參軍取視寸寸毁裂乃更作愔牋自陳非將帥才不堪軍旅老病乞閒地自養勸温并領已所統温得牋大喜即轉愔冠軍將軍㑹稽内史温自領徐兖二州刺史夏四月庚戌温帥步騎五萬發姑熟大司馬温自兖州伐燕郗超曰道逺汴水又淺恐漕運難通温不從六月辛丑温至金鄉天旱水道絶温使冠軍將軍毛虎生鑿鉅野三百里引汶水㑹于清水虎生寶之子也温引舟自清水入河舳艫數百里郗超曰清水入河難以通運若冦不戰運道又絶因敵為資復無所得此危道也不若盡舉見衆直趨鄴城彼畏公威名必望風逃潰北歸遼碣若能出戰則事可立決若欲城鄴而守之則當此盛夏難為功力百姓布野盡為官有易水以南必交臂請命矣但恐明公以此計輕鋭勝負難必欲務持重則莫若頓兵河濟控引漕運俟資儲充備至來夏乃進兵雖如賖遲然期於成功而已捨此二䇿而連軍北上進不速決退必愆乏賊因此勢以日月相引漸及秋冬水更澁滯且北土早寒三軍裘褐者少恐於時所憂非獨無食而已温又不從温遣建威將軍檀𤣥攻胡陸拔之獲燕寧東將軍慕容忠燕主暐以下邳王厲為征討大都督帥步騎二萬逆戰于黄墟厲兵大敗單馬犇還髙平太守徐翻舉郡來降前鋒鄧遐朱序敗燕將傅顔於林渚暐復遣樂安王臧統諸軍拒温臧不能抗乃遣散騎常侍李鳯求救于秦秋七月温屯武陽燕故兖州刺史孫元帥其族黨起兵應温温至枋頭暐及太傅評大懼謀犇和龍吳王垂曰臣請擊之若其不捷走未晚也暐乃以垂代樂安王臧為使持節南討大都督帥征南將軍范陽王徳等衆五萬以拒温垂表司徒左長史申𦙍黄門侍郎封孚尚書郎悉羅騰皆從軍𦙍鍾之子孚放之子也暐又遣散騎侍郎樂嵩請救于秦許賂以虎牢以西之地秦王堅引羣臣議于東堂皆曰昔桓温伐我至灞上燕不我救今温伐燕我何救焉且燕不稱藩於我我何為救之王猛密言於堅曰燕雖彊大慕容評固非温敵也若温舉山東進屯洛邑收幽冀之兵引并豫之粟觀兵崤澠則陛下大事去矣今不如與燕合兵以退温温退燕亦病矣然後我承其弊而取之不亦善乎堅從之八月遣將軍茍池洛州刺史鄧羌帥步騎二萬以救燕出自洛陽軍至潁川又遣散騎侍郎姜撫報使于燕以王猛為尚書令太子太傅封孚問於申𦙍曰温衆彊士整乗流直進今大軍徒逡巡髙岸兵不接刃未見克殄之理事將何如􅉙曰以温今日聲勢似能有為然在吾觀之必無成功何則晉室衰弱温專制其國晉之朝臣未必皆與之同心故温之得志衆所不願也必將乖阻以敗其事又温驕而恃衆怯於應變大衆深入值可乗之㑹反更逍遥中流不出赴利欲望持乆坐取全勝若糧廩愆懸情見勢屈必不戰自敗此自然之數也温以燕降人段思為鄉導悉羅騰與温戰生擒思温使故趙將李述徇趙魏騰又與虎賁中郎將染于津共擊斬之温軍奪氣初温使豫州刺史袁真攻譙梁開石門以通水運真克譙梁而不能開石門水運路塞九月燕范陽王徳帥騎一萬蘭臺治書侍御史劉當帥騎五千屯石門豫州刺史李邽帥州兵五千㫁温糧道當佩之子也徳使將軍慕容宙帥騎一千為前鋒與晉兵遇宙曰晉人輕剽怯於陷敵勇於乗退宜設餌以釣之乃使二百騎挑戰分餘騎為三伏挑戰者兵未交而走晉兵追之宙帥伏以擊之晉兵死者甚衆温戰數不利糧儲復竭又聞秦兵將至丙申焚舟棄輜重鎧仗自陸道犇還以毛虎生督東燕等四郡諸軍事領東燕太守温自東燕出倉垣鑿井而飲行七百餘里燕之諸將爭欲追之吳王垂曰不可温初退惶恐以嚴設警備簡精鋭為後拒擊之未必得志不如緩之彼幸吾未至必晝夜疾趨俟其士衆力盡氣衰然後擊之無不克矣乃帥八千騎徐行躡其後温果兼道而進數日垂告諸將曰温可擊矣乃急追之及温於襄邑范陽王徳先帥勁騎四千伏於襄邑東澗中與垂夾擊温大破之斬首三萬級秦茍池邀擊温於譙又破之死者復以萬計孫元遂據武陽以拒燕燕左衛將軍孟髙討擒之冬十月己巳大司馬温收散卒屯于山陽温深恥䘮敗乃歸罪於袁真奏免真為庶人又免冠軍將軍鄧遐官真以温誣已不服表温罪狀朝廷不報真遂據夀春叛降燕且請救亦遣使如秦温以毛虎生領淮南太守守厯陽燕主暐遣大鴻臚温統拜袁真使持節都督淮南諸軍事征南大將軍揚州刺史封宜城公統未踰淮而卒冬十一月辛丑丞相昱與大司馬温㑹涂中以謀後舉以温世子熈為豫州刺史假節十二月大司馬温發徐兖州民築廣陵城徙鎮之時征役既頻加之疫癘死者什四五百姓嗟怨祕書監太原孫盛作晉春秋直書時事大司馬温見之怒謂盛子曰枋頭誠為失利何至乃如尊君所言若此史遂行自是闗君門户事其子遽拜謝請改之時盛年老家居性方嚴有軌度子孫雖頒白待之愈峻至是諸子乃共號泣稽顙請為百口切計盛大怒不許諸子遂私改之盛先已冩别本傳之外國及孝武帝購求異書得之於遼東人與見本不同遂兩存之五年春二月癸酉袁真卒陳郡太守朱輔立真子瑾為建威將軍豫州刺史以保壽春遣其子乾之及司馬爨亮如鄴請命燕人以瑾為揚州刺史輔為荆州刺史夏四月燕秦皆遣兵助袁瑾大司馬温遣督撫竺瑶等禦之燕兵先至瑶等與戰於武丘破之南頓太守桓石䖍克南城石䖍温之弟子也秋七月大司馬温自廣陵帥衆二萬討袁瑾以襄城太守劉波為淮南内史將五千人鎮石頭波隗之孫也癸丑温敗瑾于壽春遂圍之燕左衛將軍孟髙將騎兵救瑾至淮北未渡㑹秦伐燕燕召髙還簡文帝咸安元年春正月袁瑾朱輔求救於秦秦王堅以瑾為揚州刺史輔為交州刺史遣武衛將軍武都王鑒前將軍張蚝帥步騎二萬救之大司馬温遣淮南太守桓伊南頓太守桓石䖍等擊鑒蚝於石橋大破之秦兵退屯慎城伊宣之子也丁亥温拔壽春擒瑾及輔拜其宗族送建康斬之桓温滅蜀晉明帝大寜二年成主雄后任氏無子有妾子十餘人雄立其兄蕩之子班為太子使任后母之羣臣請立諸子雄曰吾兄先帝之嫡統有竒材大功事垂克而早世朕常悼之且班仁孝好學必能負荷先烈太傅驤司徒王達諫曰先王立嗣必子者所以明定分而防簒奪也宋宣公吳餘祭足以觀矣雄不聽驤退而流涕曰亂自此始矣班為人謙恭下士動遵禮灋雄每有大議輒令豫之成帝咸和九年夏六月成主雄生瘍於頭身素多金創及病舊痕皆膿潰諸子皆惡而逺之獨太子班晝夜侍側不脱衣冠親為吮膿雄召大將軍建寧王夀受遺詔輔政丁夘雄卒太子班即位以建寧王夀録尚書事政事皆委於夀及司徒何㸃尚書令王瓌班居中行䘮禮一無所預秋九月成主雄之子車騎將軍越屯江陽奔䘮至成都以太子班非雄所生意不服與其弟安東将軍期謀作亂班弟玝勸班遣越還江陽以期為梁州刺史鎮葮萌班以未葬不忍遣推心待之無所疑間遣玝出屯於涪冬十月癸亥朔越因班夜哭弑之於殯宫幷殺班兄領軍將軍都矯太后任氏令罪狀班而廢之初期母冉氏賤任氏母養之期多才藝有令名及班死衆欲立越越奉期而立之甲子期即皇帝位諡班曰戾太子以越為相國封建寧王加大將軍夀大都督徙封漢王皆録尚書事以兄霸為中領軍鎮南大將軍弟保為鎮西大將軍汶山太守從兄始為征東大將軍代越鎮江陽丙寅葬雄於安都陵諡曰武皇帝廟號太宗始欲與夀共攻期夀不敢發始怒反譛夀於期請殺之期欲藉夀以討李玝故不許遣夀將兵向涪壽先遣使告玝以去就利害開其去路玝遂來犇詔以玝為巴郡太守期以夀為梁州刺史屯涪咸康元年秋九月成太子班之舅羅演與漢王相天水上官澹謀殺成主期立班子事覺期殺演澹及班母羅氏期自以得志輕諸舊臣信任尚書令景騫尚書姚華田襃中常侍許涪等刑賞大政皆決於數人希復關公卿襃無它才嘗勸成主雄立期為太子故有寵由是紀綱隳紊雄業始衰四年成主期驕虐日甚多所誅殺而籍沒其資財婦女由是大臣多不自安漢王壽素貴重有威名期及建寜王越等皆忌之壽懼不免每當入朝常詐為邉書辭以警急初巴西處士龔壯父叔皆為李特所殺壯欲報仇積年不除䘮壽數以禮辟之壯不應而往見夀夀密問壯以自安之䇿壯曰巴蜀之民本皆晉臣節下若能發兵西取成都稱藩於晉誰不爭為節下奮臂前驅者如此則福流子孫名垂不朽豈徒脱今日之禍而已夀然之隂與長史略陽羅恒巴西解思明謀攻成都期頗聞之數遣許涪至夀所伺其動靜又鴆殺夀養弟安北將軍攸夀乃詐為妹夫任調書云期當取夀其衆信之遂帥步騎萬餘人自涪襲成都許賞以城中財物以其將李奕為前鋒期不意其至初不設備夀世子勢為翊軍校尉開門納之遂克成都屯兵宫門期遣侍中勞夀夀奏建寧王越景騫田襃姚華許涪及征西將軍李遐將軍李西等懷姦亂政皆收殺之縱兵大掠數日乃定夀矯以太后任氏令廢期為卭都縣公幽之别宫追諡戾太子曰哀皇帝羅恒解思明李奕等勸夀稱鎮西將軍益州牧成都王稱藩於晉送卭都公於建康任調及司馬蔡興侍中李豔等勸夀自稱帝夀命筮之占者曰可數年天子調喜曰一日尚足况數年乎思明曰數年天子孰與百世諸侯夀曰朝聞道夕死可矣遂即皇帝位改國號曰漢大赦改元漢興以安車束帛徴龔壯為太師壯誓不仕夀所贈遺一無所受夀改立宗廟追尊父驤曰獻皇帝母昝氏為皇太后立妃閻氏為皇后世子勢為皇太子更以舊廟為大成廟凡諸制度多所改易以董皎為相國羅恒為尚書令解思明為廣漢太守任調為鎮北將軍梁州刺史李奕為西夷校尉從子權為寧州刺史公卿州郡悉用其遼佐代之成氏舊臣近親及六郡士人皆見疎斥卭都縣公期歎曰天下主乃為小縣公不如死五月縊而卒夀諡曰幽公葬以王禮夏六月漢李奕従兄廣漢太守乾告大臣謀廢立秋七月漢主夀使其子廣與大臣盟于前殿徙乾為漢嘉太守以李閎為荆州刺史鎮巴郡八月蜀中乆雨百姓饑疫夀命羣臣極言得失龔壯上封事稱陛下起兵之初上指星辰昭告天地㰱血盟衆舉國稱藩天應人悦大功克集而論者未諭權宜稱制今淫雨百日饑疫竝臻天其或者將以監示陛下故也愚謂宜遵前盟推奉建康彼必不愛髙爵重位以報大功雖降階一等而子孫無窮永保福祚不亦休哉論者或言二州附晋則榮六郡人事之不便昔公孫述在蜀羈客用事劉備在蜀楚士多貴及吳郡西伐舉國屠滅寧分客主論者不達安固之基茍惜名位以為劉氏守令方仕州郡曽不知彼乃國亡主易豈同今日義舉主榮臣顯哉論者又謂臣當為法正臣䝉陛下大恩恣臣所安至於榮禄無問漢晉臣皆不處復何為效法正乎壽省書内慙祕而不宣九月漢僕射任顔謀反誅顔任太后之弟也漢主夀因盡誅成主雄諸子五年秋九月漢主夀疾病羅恒解思明復議奉晉夀不從李演復上書言之夀怒殺演夀常慕漢武魏明之為人恥聞父兄時事上書者不得言先世政教自以為勝之也舍人杜襲作詩十篇託言應璩以諷諫夀報曰省詩知意若今人所作乃賢哲之話言若古人所作則死鬼之常辭耳七年冬十二月漢主夀以其太子勢領大將軍録尚書事初成主雄以儉約寛惠得蜀人心及李閎王嘏還自鄴盛稱鄴中繁庶宫殿壯麗且言趙王虎以刑殺御下故能控制境内夀慕之徙旁郡民三丁以上者以實成都大修宫室治器玩人有小過輒殺以立威左僕射蔡興右僕射李嶷皆坐直諫死民疲於賦役吁嗟滿道思亂者衆矣康帝建元元年秋八月漢主壽卒諡曰昭文廟號中宗太子勢即位大赦二年夏四月漢太史令韓皓上言熒惑守心乃宗廟不修之譴漢主勢命羣臣議之相國董皎侍中王嘏以為景武創業獻文承基至親不逺無宜疎絶勢乃更命祀成始祖太宗皆謂之漢穆帝永和元年秋八月漢主勢之弟大將軍廣以勢無子求為太弟勢不許馬當解思明諫曰陛下兄弟不多若復有所廢將益孤危固請許之勢疑其與廣有謀收當思明斬之夷其三族遣太保李奕襲廣於涪城貶廣為臨卭侯廣自殺思明被收歎曰國之不亡以我數人在也今其殆矣言笑自若而死思明有智略敢諌諍馬當素得人心及其死士民無不哀之二年冬漢太保李奕自晉壽舉兵反蜀人多從之衆至數萬漢主勢登城拒戰奕單騎突門門者射而殺之其衆皆潰勢大赦境内改年嘉寜勢驕淫不恤國事多居禁中罕接公卿疎忌舊臣信任左右䜛諂竝進刑罰苛濫由是中外離心蜀土先無獠至是始從山出自巴西至犍為梓潼布滿山谷十餘萬落不可禁制大為民患加以饑饉四境之内遂至蕭條安西將軍桓温將伐漢將佐皆以為不可江夏相袁喬勸之曰夫經略大事固非常情所及智者了於胷中不必待衆言皆合也今為天下之患者胡蜀二冦而已蜀雖險固比胡為弱將欲除之宜先其易者李勢無道臣民不附且恃其險逺不修戰備宜以精卒萬人輕齎疾趨比其覺之我已出其險要可一戰擒也蜀地富饒戸口繁庶諸葛武侯用之抗衡中夏若得而有之國家之大利也論者恐大軍既西胡必闚覦此似是而非胡聞我萬里逺征以為内有重備必不敢動縱有侵軼縁江諸軍足以拒守必無憂也温從之喬瓌之子也十一月辛未温帥益州刺史周撫南郡太守譙王無忌伐漢拜表即行委安西長史范汪以留事加撫督梁州之四郡諸軍事使袁喬帥二千人為前鋒三年春二月桓温軍至青衣漢主勢大發兵遣叔父右衛將軍福從兄鎮南將軍權前將軍昝堅等將之自山陽趣合水諸將欲設伏於江南以待晉兵昝堅不從引兵自江北鴛鴦碕渡向犍為三月温至彭模議者欲分為兩軍異道俱進以分漢兵之勢袁喬曰今懸軍深入萬里之外勝則大功可立不勝則噍類無遺當合勢齊力以取一戰之捷若分兩軍則衆心不一萬一偏敗大事去矣不如全軍而進棄去釡甑齎三日糧以示無還心勝可必也温從之留參軍孫盛周楚將羸兵守輜重温自將步卒直指成都楚撫之子也李福進攻彭模孫盛等奮擊走之温進遇李權三戰三捷漢兵散走歸成都鎮東將軍李位都迎詣温降昝堅至犍為乃知與温異道還自沙頭津濟比至温已軍於成都之十里陌堅衆自潰勢悉衆出戰于笮橋温前鋒不利參軍龔䕶戰死矢及温馬首衆懼欲退而鼓吏誤嗚進鼓袁喬拔劍督士卒力戰遂大破之温乘勝長驅至成都縱火燒其城門漢人惶懼無復鬬志勢夜開東門走至葭萌使散騎常侍王幼送降文於温自稱略陽李勢叩頭死罪尋輿櫬面縳詣軍門温解縛焚櫬送勢及宗室十餘人於建康引漢司空譙獻之等以為參佐舉賢旌善蜀人悦之漢故尚書僕射王誓鎮東將軍鄧定平南將軍王潤將軍隗文等皆舉兵反衆各萬餘桓温自擊定使袁喬擊文皆破之温命益州刺史周撫鎮彭模斬王誓王潤温留成都三十日振旅還江陵李勢至建康封歸義侯夏四月丁巳鄧定隗文等入據成都隗文鄧定等立故國師范長生之子賁為帝而奉之以妖異惑衆蜀人多歸之五年夏四月益州刺史周撫龍驤將軍朱燾擊范賁斬之益州平桓温廢立晉穆帝永和二年冬十一月安西將軍桓温伐漢朝廷以蜀道險逺温衆少而深入皆以為憂惟劉惔以為必克或問其故惔曰以博知之温善博者也不必得則不為但恐克蜀之後温終專制朝廷耳三年漢主勢降於温事見桓温滅蜀四年秋八月朝廷論平蜀之功欲以豫章郡封桓温尚書左丞荀㽔曰温若復平河洛將何以賞之乃加温征西大將軍開府儀同三司封臨賀郡公加譙王無忌前將軍袁喬龍驤將軍封湘西伯㽔崧之子也温既滅蜀威名大振朝廷憚之升平四年冬十一月封桓温為南郡公温弟沖為豐城縣公子濟為臨賀縣公哀帝興寧元年夏五月加征西大將軍桓温侍中大司馬都督中外諸軍領尚書事假黄鉞温以撫軍司馬王坦之為長史坦之述之子也又以征西􅁺郗超為參軍王珣為主簿每事必與二人謀之府中為之語曰髯參軍短主簿能令公喜能令公怒温氣槩髙邁罕有所推與超言常自謂不能測傾身待之超亦深自結納珣導之孫也與謝𤣥皆為温掾温俱重之曰謝掾年四十必擁旄杖節王􅁺當作黑頭公皆未易才也𤣥奕之子也二年夏五月戊辰加大司馬温揚州牧録尚書事壬申使侍中召温入參朝政温辭不至秋七月丁夘詔復徴大司馬温入朝八月温至赭圻詔尚書車灌止之温遂城赭圻居之固讓内録遥領揚州牧三年大司馬温移鎮姑孰二月丙申帝崩于西堂帝無嗣皇后詔以琅邪王奕承大統百官奉迎于琅邪第是日即皇帝位大赦海西公太和三年冬十二月加大司馬温殊禮位在諸侯王上簡文帝咸安元年大司馬温恃其材略位望隂蓄不臣之志嘗撫枕歎曰男子不能流芳百世亦當遺臭萬年術士杜炅能知人貴賤温問炅以禄位所至炅曰明公勲格宇宙位極人臣温不悦温欲先立功河朔以收時望還受九錫及枋頭之敗威名頓挫既克夀春謂參軍郗超曰足以雪枋頭之恥乎超曰未也乆之超就温宿中夜謂温曰明公都無所慮乎温曰卿欲有言邪超曰明公當天下重任今以六十之年敗於大舉不建不世之勲不足以鎮愜民望温曰然則奈何超曰明公不為伊霍之舉者無以立大威權鎮壓四海温素有心深以為然遂與之定議以帝素謹無過而牀第易誣乃言帝早有痿疾嬖人相龍計好朱靈寶等參侍内寢二美人田氏孟氏生三男將建儲立王傾移皇基密播此言於民間時人莫能審其虚實十一月癸夘温自廣陵將還姑孰屯于白石丁未詣建康諷褚太后請廢帝立丞相㑹稽王昱幷作令草呈之太后方在佛屋燒香内侍啟云外有急奏太后出倚户視奏數行乃曰我本自疑此至半便止索筆益之曰未亡人不幸罹此百憂感念存沒心焉如割己酉温集百官於朝堂廢立既曠代所無莫有識其故典者百官震慄温亦色動不知所為尚書僕射王彪之知事不可止乃謂温曰公阿衡皇家當倚傍先代乃命取霍光傳禮度儀制定於須臾彪之朝服當階神彩毅然曽無懼容文武儀凖莫不取定朝廷以此服之於是宣太后令廢帝為東海王以丞相録尚書事㑹稽王昱統承皇極百官入太極前殿温使督䕶竺瑤散騎侍郎劉亨收帝璽綬帝著白帢單衣步下西堂乗犢車出神虎門羣臣拜辭莫不戯欷侍御史殿中監將兵百人衛送東海第温帥百官具乗輿灋駕迎㑹稽王于㑹稽邸王於朝堂變服著平巾幘單衣東向流涕拜受璽綬是日即皇帝位改元温出次中堂分兵屯衞温有足疾詔乗輿入殿温撰辭欲陳述廢立本意帝引見便泣下數十行温兢懼竟不能一言而出太宰武陵王晞好習武事為温所忌欲廢之以事示王彪之彪之曰武陵親尊未有顯罪不可以猜嫌之閒便相廢徙公建立聖明當崇奬王室與伊周同美此大事宜更深詳温曰此已成事卿勿復言乙夘温表晞聚納輕剽息綜矜忍袁真叛逆事相連染頃日猜懼將成亂階請免晞官以王歸蕃從之幷免其世子綜梁王㻱等官温使魏郡太守毛安之帥所領宿衛殿中安之虎生之弟也庚戍尊褚太后曰崇徳太后初殷浩卒大司馬温使人齎書弔之浩子㳙不荅亦不詣温而與武陵王睎遊廣州刺史庾藴希之弟也素與温有隙温惡殷庾宗彊欲去之辛亥使其弟祕逼新蔡王晃詣西堂叩頭自列稱與晞及子綜著作郎殷㳙太宰長史庾倩掾曹秀舍人劉彊散騎常侍庾柔等謀反帝對之流涕温皆收付廷尉倩柔皆藴之弟也癸丑温殺東海王三子及其母甲寅御史中丞譙王恬承温旨請依律誅武陵王晞詔曰悲惋惶怛非所忍聞況言之哉其更詳議恬承之孫也乙夘温重表固請誅晞詞甚酷切帝乃賜温手詔曰若晉祚靈長公便宜奉行前詔如其大運去矣請避賢路温覽之流汗變色乃奏廢晞及三子家屬皆徙新安郡丙辰免新蔡王晃為庶人徙衡陽殷涓庾倩曹秀劉彊庾柔皆族誅庾藴飲酖死藴兄東陽太守友子婦桓豁之女也故温特赦之庾希聞難與弟㑹稽王參軍邈及子攸之逃于海陵陂澤中温既誅殷庾威勢翕赫侍中謝安見温遙拜温驚曰安石卿何事乃爾安曰未有君拜於前臣揖於後戊午大赦璔文武位二等已未温如白石上書求歸姑孰庚申詔進温丞相大司馬如故留京師輔政温固辭仍請還鎮辛酉温自白石還姑孰秦王堅聞温廢立謂羣臣曰温前敗灞上後敗枋頭不能思愆自貶以謝百姓方更廢君以自説六十之叟舉動如此將何以自容於四海乎諺曰怒其室而作色於父其桓温之謂矣十二月大司馬温奏廢放之人屏之以逺不可以臨黎元東海王宜依昌邑故事築第呉郡太后詔曰使為庶人情有不忍可特封王温又奏可封海西縣侯庚寅封海西縣公温威振内外帝雖處尊位拱黙而已常懼廢黜先是熒惑守太微端門踰月而海西廢辛卯熒惑逆行入太微帝甚惡之中書侍郎郗超在直帝謂超曰命之脩短本所不計故當無復近日事邪超曰大司馬臣温方内固社稷外恢經略非常之事臣以百口保之及超請急省其父帝曰致意尊公家國之事遂至於此由吾不能以道匡衛愧歎之深言何能諭因詠庾闡詩云志士痛朝危忠臣哀主辱遂泣下霑襟帝美風儀善容止留心典籍凝塵滿席湛如也雖神識恬暢然無濟世大略謝安以為惠帝之流但清談差勝耳郄超以温故朝中皆畏事之謝安嘗與左衛將軍王坦之共詣超日旰未得前坦之欲去安曰獨不能為性命忍須㬰邪二年春三月戊午遣侍中王坦之徵大司馬温入輔温復辭夏四月徙海西公於吳縣西柴里敇吳國内史刁彛防衛又遣御史顧允監察之彛協之子也六月庾希庾邈與故青州刺史武林之子遵聚衆夜入京口城晉陵太守卞􅀈踰城犇曲阿希詐稱受海西公密㫖誅大司馬温建康震擾内外戒嚴卞􅀈發諸縣兵二千人擊希希敗閉城自守温遣東海内史周少孫討之秋七月壬辰拔其城擒希邈及其親黨皆斬之􅀈壺之子也甲寅帝不豫急召大司馬温入輔一日一夜發四詔温辭不至初帝為㑹稽王娶王述從妺為妃生世子道生及弟俞生道生踈躁無行毋子皆以幽廢死餘三子郁朱生天流皆早夭諸姬絶孕將十年王使善相者視之皆曰非其人又使視諸婢媵有李陵容者在織坊中黑而長宮人謂之崑崙相者驚曰此其人也王召之侍寢生子昌明及道子已未昌明為皇太子生十年矣以道子為琅邪王領㑹稽國以奉帝母鄭太妃之祀遺詔大司馬温依周公居攝故事又曰少子可輔者輔之如不可君自取之侍中王坦之自持詔入於帝前毁之帝曰天下儻來之運卿何所嫌坦之曰天下宣元之天下陛下何得專之帝乃使坦之改詔曰家國事一禀大司馬如諸葛武侯王丞相故事是日帝崩羣臣疑惑未敢立嗣或曰當須大司馬處分尚書僕射王彪之正色曰天子崩太子代立大司馬何容得異若先面諮必反為所責朝議乃定太子即皇帝位大赦崇德太后令以帝冲幼加在諒闇令温依周公居攝故事事已施行王彪之曰此異常大事大司馬必當固讓使萬機停滯稽廢山陵未敢奉令謹具封還事遂不行温望簡文臨終禪位於己不爾便當居攝既不副所望甚憤怨與弟冲書曰遺詔使吾依武侯王公故事耳温疑王坦之謝安所為心銜之詔謝安徵温入輔温又辭冬十月彭城妖人盧悚自稱大道祭酒事之者八百餘家十一月遣弟子許龍如吳晨到海西公門稱太后密詔奉迎興復公初欲從之納保母諫而止龍曰大事垂捷焉用兒女子言乎公曰我得罪於此幸䝉寛宥豈敢妄動且太后有詔便應官屬來何獨使汝也汝必為亂因叱左右縛之龍懼而走甲午悚帥衆三百人晨攻廣莫門詐稱海西公還由雲龍門突入殿庭略取武庫甲仗門下吏士駭愕不知所為游擊將軍毛安之聞難帥衆直入雲龍門手自奮擊左衛將軍殷康中領軍桓祕入止車門與安之并力討誅之并黨與死者數百人海西公深慮横禍專飲酒恣聲色有子不肖時人憐之朝廷以其安於屈辱故不復為虞武帝寧康元年春二月大司馬温來朝辛巳詔吏部尚書謝安侍中王坦之迎于新亭是時都下人情恟恟或云欲誅王謝因移晉室坦之甚懼安神色不變曰晉祚存亡決於此行温既至百官拜於道側温大陳兵衛延見朝士有位望者皆戰慴失色坦之流汗沾衣倒執手板安從容就席坐定謂温曰安聞諸侯有道守在四鄰明公何須壁後置人邪温笑曰正自不能不然爾遂命左右撤之與安笑語移日郗超常為温謀主安與坦之見温温使超卧帳中聽其言風動帳開安笑曰郄生可謂入幕之賓矣時天子幼弱外有彊臣安與坦之盡忠輔衛卒安晉室三月温有疾停建康十四年甲午還姑孰秋七月己亥南郡宣武公桓温薨初桓温疾篤諷朝廷求九錫屢使人趣之謝安王坦之故緩其事使袁宏具草宏以示王彪之彪之歎其文辭之美因曰卿固大才安可以此示人謝安見其草輒改之由是厯旬不就宏密謀於彪之彪之曰聞彼病日增亦當不復支久自可更少遲迴宏從之温弟江州刺史冲問温以謝安王坦之所任温曰渠等不為汝所處分其意以為已存彼必不敢立異死則非冲所制若害之無益於冲更失時望故也温以世子熙才弱使冲領其衆於是桓祕與熙弟濟謀共殺冲冲密知之不敢入俄頃温薨冲先遣力士拘録熙濟而後臨喪祕遂被廢棄熙濟俱徙長沙詔葬温依漢霍光及安平獻王故事冲稱温遺命以少子𤣥為嗣時方五嵗襲封南郡公庚戌加右將軍荆州刺史桓豁征西將軍督荆楊雍交廣五州諸軍事以江州刺史桓冲為中軍將軍都督楊豫江三州諸軍事揚豫二州刺史鎮姑孰竟陵太守桓石秀為寧逺將軍江州刺史鎮潯陽石秀豁之子也冲既代温居任盡忠王室或勸冲誅除時望専執時權冲不從始温在鎮死罪皆專決不請冲以為生殺之重當歸朝廷凡大辟皆先上須報然後行之謝安以天子幼冲新喪元輔欲請崇德太后臨朝王彪之曰前世人主幼在襁褓母子一體故可臨朝太后亦不能決事要須顧問大臣今上年出十嵗垂及冠婚反令從嫂臨朝示人君幼弱豈所以光揚聖德乎諸公必欲行此豈僕所制所惜者大體耳安不欲委任桓冲故使太后臨朝已得以專獻替裁決遂不從彪之之言八月壬子太后復臨朝攝政太元二年冬十二月臨海太守郗超卒初超黨於桓氏以父愔忠於王室不令知之及病甚出一箱書授門生曰公年尊我死之後若以哀惋害寢食者可呈此箱不爾即焚之既而愔果哀惋成疾門生呈箱皆與桓温往返密計愔大怒曰小子死已晚矣遂不復哭十一年冬十月甲申海西公奕薨於吳通鑑紀事本末卷十五上欽定四庫全書通鑑紀事本末卷十五下宋袁樞撰苻氐據長安晉懐帝永嘉四年略陽臨渭氐酋蒲洪驍勇多權略羣氐畏服之漢主聰遣使拜洪平逺將軍洪不受自稱䕶氐校尉秦州刺史略陽公元帝大興二年蒲洪降趙趙主矅以洪為率義侯成帝咸和四年秋八月後趙中山公虎攻集木且羌於河西克之氐王蒲洪羌酋姚弋仲俱降於虎虎表洪監六夷軍事八年冬十月氐帥蒲洪自稱雍州刺史西附張駿丞相虎分命諸將屯汧隴遣將軍麻秋討蒲洪洪帥户二萬降於虎虎迎拜洪光烈將軍䕶氐校尉洪至長安說虎徙闗中豪桀及氐羌以實東方曰諸氐皆洪家部曲洪帥以從誰敢違者虎從之徙秦雍及氐羌十餘萬户於闗東以洪為龍驤將軍流民都督使居枋頭咸康四年趙王虎之攻燕蒲洪以功拜使持節都督六夷諸軍事冠軍大將軍封平西郡公石閔言於虎曰蒲洪雄儁得將士死力諸子皆有非常之才且握彊兵五萬屯據近畿宜密除之以安社稷虎曰吾方倚其父子以取吳蜀奈何殺之待之愈厚穆帝永和五年髙力督定陽梁犢作亂趙王虎以車騎將軍蒲洪討㓕進封蒲洪為侍中車騎大將軍開府儀同三司都督雍秦州諸軍事雍州刺史進封略陽郡公夏四月趙王虎病卒太子世即位以彭城王遵為丞相遵殺世自立武興公石閔言於遵曰蒲洪人傑也今以洪鎮闗中臣恐秦雍之地非復國家所有此雖先帝臨終之命然陛下踐祚自宜改圖遵從之罷洪都督餘如前制洪怒歸枋頭冬十一月秦雍流民相帥西歸路由枋頭共推蒲洪為主衆至十餘萬洪子健在鄴斬闗出犇枋頭侍中王鑒懼洪之通欲以計遣之乃以洪為都督闗中諸軍事征西大將軍雍州牧領秦州刺史洪㑹官屬議應受與不主簿程朴請且與趙連和如列國分境而治洪怒曰吾不堪為天子邪而云列國乎引朴斬之六年春正月姚弋仲蒲洪各有據闗右之志弋仲遣其子襄帥衆五萬撃洪洪迎撃破之斬獲三萬餘級洪自稱大都督大將軍大單于三秦王改姓苻氏以南安雷弱兒為輔國將軍安定梁楞為前將軍領左長史馮翊魚遵為後將軍領右長史京兆叚陵為左將軍領左司馬王墮為右將軍領右司馬天水趙俱隴西牛夷北地辛牢皆為從事中郎氐酋毛貴為單于輔相三月麻秋說苻洪曰冉閔石祇方相持中原之亂未可平也不如先取闗中基業己固然後東争天下誰能敵之洪深然之既而秋因宴鴆洪欲并其衆世子健收秋斬之洪謂健曰吾所以未入闗者以為中州可定今不幸為豎子所困中州非汝兄弟所能辦我死汝急入闗言終而卒健代綂其衆乃去大都督大將軍三秦王之號稱晉官爵遣其叔父安來告喪且請朝命秋八月京兆杜洪據長安自稱晉征北將軍雍州刺史以馮翊張琚為司馬闗西夷夏皆應之苻健欲取之恐洪知之乃受趙官爵以趙俱為河内太守戍温牛夷為綏集將軍戍懐治宫室於枋頭課民種麥示無西意有知而不種者健殺之以徇既而自稱晉征西大將軍都督闗中諸軍事雍州刺史以武威賈𤣥碩為左長史略陽梁安為右長史叚純為左司馬辛牢為右司馬京兆王魚安定程肱胡文等為軍諮祭酒悉衆而西以魚遵為先鋒行至盟津為浮梁以濟遣弟輔國將軍雄帥衆五千自潼闗入兄子揚武將軍菁帥衆七千自軹闗入臨别執菁手曰若事不捷汝死河北我死河南不復相見既濟焚橋自帥大衆隨雄而進杜洪聞之與健書侮嫚之以張琚弟先為征虜將軍帥衆萬三千逆戰於潼闗之北先兵大敗走還長安洪悉召闗中之衆以拒健洪弟郁勸洪迎健洪不從郁帥所部降於健健遣苻雄徇渭北氐酋毛受屯髙陵徐嗟屯好畤羌酋白犢屯黄白衆各數萬皆斬洪使遣子降於健苻菁魚遵所過城邑無不降附洪懼固守長安九月苻菁與張先戰於渭北擒之三輔郡縣堡壁皆降冬十月苻健長驅至長安杜洪張琚犇司竹十一月甲午苻健入長安以民心思晉乃遣參軍杜山伯指建康獻捷并修好扵桓温於是秦雍夷夏皆附之趙涼州刺史石寧獨據上邽不下十二月苻健撃斬之七年春正月苻健左長史賈𤣥碩等請依劉備稱漢中王故事表健為都督闗中諸軍事大將軍大單于秦王健怒曰吾豈堪為秦王邪且晉使未返我之官爵非汝曹所知也既而密使梁安諷𤣥碩等上尊號健辭讓再三然後許之丙辰健即天子大單于位國號大秦大赦改元皇始追尊父洪為武惠皇帝廟號太祖立妻彊氏為天王后子萇為太子靚為平原公生為淮南公覿為長樂公方為髙陽公碩為北平公騰為淮陽公栁為晉公桐為汝南公庾為魏公武為燕公幼為趙公以苻雄為都督中外諸軍事丞相領車騎大將軍雍州牧東海公苻菁為衛大將軍平昌公宿衛二宫雷弱兒為太尉毛貴為司空略陽姜伯周為尚書令梁楞為左僕射王墮為右僕射魚遵為太子太師彊平為太傳叚純為太保吕婆樓為散騎常侍伯周健之舅平王后之弟婆樓本略陽氐酋也三月秦王健分遣使者周民疾苦搜羅儁異寛重歛之稅弛離宫之禁罷無用之器去侈靡之服凡趙之苛政不便於民者皆除之杜洪張琚遣使召梁州刺史司馬勲夏四月勲帥歩騎三萬赴之秦王健禦之於五丈原勲屢戰皆敗退歸南鄭健以中書令賈𤣥碩始者不上尊號銜之使人告𤣥碩與司馬勲通并其諸子皆殺之八年春正月秦丞相雄等請秦王健正尊號依漢晉之舊不必效石氏之初健從之即皇帝位大赦諸公皆進爵為王且言單于所以綂一百蠻非天子所宜領以授太子萇司馬勲既還漢中杜洪張琚屯宜秋洪自以右族輕琚琚遂殺洪自立為秦王改元建昌夏五月秦主健攻張琚於宜秋斬之十年夏六月丙申秦東海敬武王雄卒秦王健哭之嘔血曰天不欲吾平四海邪何奪吾元才之速也贈魏王雄以佐命元勲位兼將相權侔人主而謙恭汎愛遵奉法度故健重之常曰元才吾之周公也子堅襲爵堅性至孝幼有志度慱學多能交結英豪吕婆樓彊汪及略陽梁平老皆與之善十一月秦淮南王苻生幼無一目性麤暴其祖父洪嘗戯之曰吾聞瞎兒一淚信乎生怒引佩刀自刺出血曰此亦一淚也洪大驚鞭之生曰性耐刀槊不堪鞭棰洪謂其父健曰此兒性悖宜早除之不然必破人家健將殺之健弟雄止之曰兒長自應改何可遽爾及長力舉千鈞手格猛獸走及犇馬撃刺騎射冠絶一時獻哀太子卒彊后欲立少子晉王栁秦主健以䜟文有三羊五眼乃立生為太子以司空平昌王菁為太尉尚書令王墮為司空司𨽻校尉梁楞為尚書令夏六月丙子秦主健寢疾庚辰平昌王菁勒兵入東宫將殺太子生而自立時生侍疾西宫菁以為健已卒攻東掖門健聞變登端門陳兵自衛衆見健惶懼皆捨仗逃散健執菁數而殺之餘無所問壬午以大司馬武都王安都督中外諸軍事甲申健引太師魚遵丞相雷弱皃太傳毛貴司空王墮尚書令梁楞左僕射梁安右僕射叚純吏部尚書辛牢等受遺詔輔政健謂太子生曰六夷酋帥及大臣執權者若不從汝命宜斬除之臣光曰顧命大臣所以輔導嗣子為之羽翼也為之羽翼而教使翦之能無斃乎知其不忠則勿任而已矣任以大柄又從而猜之鮮有不召亂者也乙酉健卒謚曰景明皇帝廟號髙祖丙戌太子生即位大赦改元羣臣奏曰未踰年而改元非禮也生怒窮推議主得右僕射叚純殺之秋七月秦主生尊母彊氏曰皇太后立妃梁氏為皇后梁氏安之女也以其嬖臣太子門大夫南安趙韶為右僕射太子舍人趙誨為中䕶軍著作郎董榮為尚書八月秦主生封衛大將軍黄眉為廣平王前將軍飛為新興王皆素所善也徵大司馬武都王安領太尉以晉王栁為征東大將軍并州牧鎮蒲坂魏王庾為鎮東大將軍豫州牧鎮陜城中書監胡文中書令王魚言於生曰比有星孛於大角熒惑入東井大角帝􅚋東井秦分於占不出三年國有大喪大臣戮死願陛下修德以禳之生曰皇后與朕對臨天下可以應大喪矣毛太傳梁車騎梁僕射受遺輔政可以應大臣矣九月生殺梁后及毛貴梁楞梁安貴后之舅也右僕射趙韶中䕶軍趙誨皆洛州刺史俱之從弟也有寵於生乃以俱為尚書令俱固辭以疾謂韶誨曰汝等不復顧祖宗欲為滅門之事毛梁何罪而誅之吾何功而代之汝等可自為吾其死矣遂以憂卒冬十一月秦以辛牢守尚書令趙韶為左僕射尚書董榮為右僕射中䕶軍趙誨為司𨽻校尉十二月秦丞相雷弱兒性剛直以趙韶董榮亂政毎公言於朝見之常切齒韶榮譛之於秦主生生殺弱兒及其九子二十七孫於是諸羌皆有離心生雖在諒隂逰飲自若彎弓露刄以見朝臣錘鉗鋸鑿可以害人之具備置左右即位未幾后妃公卿已下至於僕𨽻凡殺五百餘人截脛拉脅鋸項刳胎者比比有之十二月秦司空王墮性剛峻右僕射董榮侍中彊國皆以佞幸進墮疾之如讎毎朝見榮未嘗與之言或謂墮曰董君貴幸無比公宜小降意接之墮曰董龍是何雞狗而令國士與之言乎㑹有天變榮與彊國言於秦主生曰今天譴甚重宜以貴臣應之生曰貴臣唯有大司馬及司空耳榮國曰大司馬國之懿親不可殺也乃殺王墮將刑榮謂之曰今日復敢比董龍於雞狗乎墮瞋目叱之洛州刺史杜郁墮之甥也左僕射趙韶惡之譛於生以為貳於晉而殺之壬戍生宴羣臣於太極殿以尚書令辛牢為酒監酒酣生怒曰何不彊人酒而猶有坐者引弓射牢殺之羣臣懼莫敢不醉偃仆失冠生乃恱春三月秦主生發三輔民治渭橋金紫光禄大夫程肱諫以為妨農生殺之夏四月長安大風發屋拔木秦宫中驚擾或稱賊至宫門晝閉五日乃止秦主生推告賊者刳出其心左光禄大夫彊平諫曰天降災異陛下當愛民事神緩刑崇德以應之乃可弭也生怒鑿其頂而殺之衛將軍廣平王黄眉前將軍新興王飛建節將軍鄧羌以平太后之弟叩頭固諫生弗聽出黄眉為左馮翊飛為右扶風羌行咸陽太守猶惜其驍勇故皆弗殺五月太后彊氏以憂恨卒謚曰明德六月秦主生下詔曰朕受皇天之命君臨萬邦嗣綂已來有何不善而謗讟之音扇滿天下殺不過千而為之殘虐行者比肩未足為希方當峻刑極罰復如朕何自去春以來潼闗之西至於長安虎狼為暴晝則繼道夜則廢屋不食六畜專務食人凡殺七百餘人民廢耕桑相聚邑居而為害不息秋七月秦羣臣奏請禳災生曰野獸飢則食人飽當自止何禳之有且天豈不愛民哉正以犯罪者多故助朕殺之耳冬十月秦主生夜食棗多旦而有疾召太醫令程延使診之延曰陛下無它疾食棗多耳生怒曰汝非聖人安知吾食棗遂斬之升平元年春二月太白入東井秦有司奏太白罰星東井秦分必有暴兵起京師秦主生曰太白入井自為渴耳何所怪乎夏五月秦主生夢大魚食蒲又長安謠曰東海大魚化為龍男皆為王女為公生乃誅太師録尚書事廣寗公魚遵并其七子十孫金紫光禄大夫牛夷懼禍求為荆州生不許以為中軍將軍引見調之曰牛性遲重善持轅􅀈雖無驥足動負百石夷曰雖服大車未經峻璧願試重載乃知勲績生笑曰何其快也公嫌所載輕乎朕將以魚公爵位處公夷懼歸而自殺生飲酒無晝夜或連月不出奏事不省往往寢落或醉中決事左右因以為姦賞罰無凖或至申酉乃出視朝乗醉多所殺戮自以𦕈目諱言殘缺偏隻少無不具之類誤犯而死者不可勝數好生剥牛羊驢馬燖雞豚鵝鴨縱之殿前數十為羣或剥人面皮使之歌舞臨觀以為樂嘗問左右曰自吾臨天下汝外間何所聞或對曰聖明宰世賞罰明當天下唯歌太平怒曰汝媚我也引而斬之它日又問或對曰陛下刑罰微過又怒曰汝謗我也亦斬之勲舊親戚誅之殆盡羣臣得保一日如度十年東海王堅素有時譽與故姚襄參軍薛讃權翼善讃翼密說堅曰主上猜忍暴虐中外離心方今宜主秦祀者非殿下而誰願早為計勿使它姓得之堅以問尚書吕婆樓婆樓曰僕刀鐶上人耳不足以辦大事僕里舍有王猛者其人謀略不世出殿下宜請而咨之堅因婆樓以招猛一見如舊友語及時事堅大說自謂如劉𤣥德之遇諸葛孔明也六月太史令康權言於秦主生曰昨夜三月並出孛星入太微連東井自去月上旬沈隂不雨以至於今將有下人謀上之禍生怒以為妖言撲殺之特進領御史中丞梁平老等謂堅曰主上失德上下嗷嗷人懐異志燕晉二方伺隙而動恐禍發之日家國俱亡此殿下之事也宜早圖之堅心然之畏生趫勇未敢發生夜對侍婢言曰阿灋兄弟亦不可信明當除之婢以告堅及堅兄清河王灋灋與梁平老及特進光禄大夫彊汪帥壯士數百潜入雲龍門堅與吕婆樓帥麾下三百人鼔譟繼進宿衛將士皆舍仗歸堅生猶醉寐堅兵至生驚問左右曰此輩何人左右曰賊也生曰何不拜之堅兵皆笑復又大言何不速拜不拜者斬之堅兵引生置别室廢為越王尋殺之謚曰厲王堅以位讓灋灋曰汝嫡嗣且賢宜立堅曰兄年長宜立堅母茍氏泣謂羣臣曰社稷重事小兒自知不能它日有悔失在諸君羣臣皆頓首請立堅堅乃去皇帝之號稱大秦天王即位於太極殿誅生倖臣中書監董榮左僕射趙韶等二十餘人大赦改元永興追尊父雄為文桓皇帝母茍氏為皇太后妃茍氏為皇后世子宏為皇太子以清河王灋為都督中外諸軍事丞相録尚書事東海公諸王皆降爵為公以從祖右光禄大夫永安公侯為太尉晉公栁為車騎大將軍尚書令封弟融為陽平公雙為河南公子丕為長樂公暉為平原公熈為廣平公叡為鉅鹿公以漢陽李威為左僕射梁平老為右僕射彊汪為領軍將軍吕婆樓為司𨽻校尉王猛為中書侍郎融好文學明辯過人耳聞則誦過目不忘力敵百夫善騎射撃刺少有令譽堅愛重之常與共議國事融經綜内外刑政修明薦才揚滯補益𢎞多丕亦有文武才幹治民㫁獄皆亞於融威茍太后之姑子也素與魏王雄友善生屢欲殺堅頼威營救得免威得幸於茍太后堅事之如父威知王猛之賢常勸堅以國事任之堅謂猛曰李公知君猶鮑叔牙之知管仲也猛以兄事之秋八月秦王堅以權翼為給事黄門侍郎薛讃為中書侍郎與王猛並掌機密九月追復大師魚遵等官以禮改𦵏子孫存者皆隨才擢叙冬十一月秦太后茍氏逰宣明臺見東海公灋之第門車馬輻湊恐終不利於秦王堅乃與李威謀賜灋死堅與灋訣於東堂慟哭歐血謚曰獻哀公封其子陽為東海公敷為清河公十二月秦王堅行至尚書以文案不治免左丞程卓官以王猛代之堅舉異才修廢職課農桑恤困窮禮百神立學校旌節義繼絶世秦民大恱苻秦滅涼晉穆帝永和九年冬十月西平敬烈公張重華有疾子矅靈纔十嵗立為世子赦其境内重華庻兄長寧侯祚有勇力吏幹而傾巧善事内外與重華嬖臣趙長尉緝等結異姓兄弟都尉常據請出之重華曰吾方以祚為周公使輔幼子君是何言也謝艾以枹罕之功有寵於重華左右疾之譛艾出為酒泉太守艾上疏言權倖用事公室將危乞聽臣入侍且言長寧侯祚及趙長等將為亂宜盡逐之十一月己未重華疾甚手令徵艾為衛將軍監中外諸軍事輔政祚等匿而不宣丁卯重華卒世子矅靈立稱大司馬涼州刺史西平公趙長等矯重華遺令以長寧侯祚為都督中外諸軍事撫軍大將軍輔政冬十二月涼右長史趙長等建議以為時難未夷宜立長君矅靈沖幼請立長寜侯祚張祚先得幸於重華之母馬氏馬氏許之乃廢張矅靈為涼寧侯立祚為大都督大將軍涼州牧涼公祚既得志咨為滛虐殺重華妃裴氏及謝艾十年春正月張祚自稱涼王改建興四十二年為和平元年立妻辛氏為王后子太和為太子封弟天鍚為長寧侯子庭堅為建康侯矅靈弟𤣥靚為涼武侯置百官郊祀天地用天子禮樂尚書馬岌切諫坐免官郎中丁琪復諫曰我自武公以來世守臣節抱忠履謙五十餘年故能以一州之衆抗舉世之虜師徒嵗起民不告疲殿下勲德未髙於先公而亟謀革命臣未見其可也彼士民所以用命四逺所以歸嚮者以吾能奉晉室故也今而自尊則中外離心安能以一隅之地拒天下之彊敵乎祚大怒斬之於闗下十一年秋七月涼王祚滛虐無道上下怨憤祚惡河州刺史張瓘之彊遣張掖太守索孚代瓘守枹罕使瓘討叛胡又遣其將易揣張玲帥歩騎萬三千以襲瓘張掖人王鸞知術數言於祚曰此軍出必不還涼國將危并陳祚三不道祚大怒以鸞為妖言斬以徇鸞臨刑曰我死軍敗於外王死於内必矣祚族滅之瓘聞之斬孚起兵撃祚傳檄州郡廢祚以侯還第復立涼寧侯矅靈易揣張玲軍始濟河瓘撃破之揣等單騎犇還瓘軍躡之姑臧振恐驍騎將軍敦煌宋混兄修與祚有隙懼禍八月混與弟澄西走合衆萬餘人以應瓘還向姑臧祚遣楊秋胡將矅靈於東苑拉其腰而殺之埋於沙坑謚曰哀公九月涼宋混軍於武始大澤為矅靈發哀閏月混軍至姑臧涼王祚收張瓘弟琚及子嵩將殺之琚嵩聞之募市人數百揚言張祚無道我兄大軍已至城東敢舉手者誅三族遂開西門納混兵領軍將軍趙長等懼罪入閤呼張重華母馬氏出殿立涼武侯𤣥靚為主易揣等引兵入殿收長等殺之祚案劔殿上大呼叱左右力戰祚素失衆心莫肯為之鬭者遂為兵人所殺混等梟其首宣示内外㬥尸道左城内咸稱萬嵗以庻人禮𦵏之并殺其二子混琚上𤣥靚為大將軍涼州牧西平公赦境内復稱建興四十三年時𤣥靚始七嵗張瓘至姑臧推𤣥靚為涼王自為使持節都督中外諸軍事尚書令涼州牧張掖郡公以宋混為尚書僕射隴西人李儼據郡不受瓘令用江東年號衆多歸之瓘遣其將牛霸討之未至西平人衛綝亦據郡叛霸兵潰犇還瓘遣弟琚擊綝敗之酒泉太守馬基起兵以應綝瓘遣司馬張姚王國擊斬之十二年春正月秦征東大將軍晉王栁遣參軍閻負梁殊使於涼以書說涼王𤣥靚負殊至姑臧張瓘見之曰我晉臣也臣無境外之交二君何以來辱負殊曰晉王與君鄰藩雖山河阻絶風通道㑹故來修好君何怪焉瓘曰吾盡忠事晉於今六世矣若與苻征東通使是上違先君之志下隳士民之節其可乎負殊曰晉室衰微墜失天命固己乆矣是以涼之先王北面二趙唯知機也今大秦威德方盛涼王若欲自帝河右則非秦之敵欲以小事大則曷若捨晉事秦長保福禄乎瓘曰中州好食言嚮者石氏使車適返而戎騎已至吾不敢信也負殊曰自古帝王居中州者政化各殊趙為姦詐秦敦信義豈得一槩待之乎張先楊初皆阻兵不服先帝討而擒之赦其罪戾寵以爵秩固非石氏之比也瓘曰必如君言秦之威德無敵何不先取江南則天下盡為秦有征東何辱命焉負殊曰江南文身之俗道汚先叛化隆後服主上以為江南必須兵服河右則可以義懐故遣行人先申大好若君不逹天命則江南得延數年之命而河右恐非君之土也瓘曰我跨據三州帶甲十萬西苞葱嶺東距大河伐人有餘况於自守何畏於秦負殊曰貴州山河之固孰若崤函民物之饒孰若秦雍杜洪張琚因趙氏成資兵彊財富有囊括闗中席卷四海之志先帝戎旗西指冰消雲散旬月之間不覺易主主上若以貴州不服赫然奮怒控弦百萬鼓行而西未知貴州將何以待之瓘笑曰兹事當決之於王非身所了負殊曰涼王雖英睿夙成然年在幼沖君居伊霍之任國家安危繋君一舉耳瓘懼乃以𤣥靚之命遣使稱藩於秦秦因𤣥靚所稱官爵而授之升平三年涼州牧張瓘猜忌苛虐專以愛憎為賞罸郎中殷邭諫之瓘曰虎生三日自能食肉不須人教也由是人情不附輔國將軍宋混性忠鯁瓘憚之欲殺混及弟澄因廢涼王𤣥靚而代之徴兵數萬集姑臧混知之與澄帥壯士楊和等四十餘騎奄入南城宣告諸營曰張瓘謀逆被太后令誅之俄而衆至二千瓘帥衆出戰混擊破之瓘麾下𤣥臚刺混不能穿甲混擒之瓘衆悉降瓘與弟琚皆自殺混夷其家族𤣥靚以混為使持節都督中外諸軍事驃騎大將軍酒泉郡侯代瓘輔政混乃請𤣥靚去涼王之號復稱涼州牧混謂𤣥臚曰卿刺我幸而不傷今我輔政卿其懼乎臚曰臚受瓘恩唯恨刺節下不深耳竊無所懼混義之任為心膂五年夏四月涼驃騎大將軍宋混疾甚張𤣥靚及其祖母馬氏往省之曰將軍萬一不幸寡婦孤兒將何所託欲以林宗繼將軍可乎混曰臣子林宗幼弱不堪大任殿下儻未棄臣門臣弟澄政事愈於臣但恐其懦緩機事不稱耳殿下䇿勵而使之可也混戒澄及諸子曰吾家受國大恩當以死報無恃勢位以驕人又見朝臣皆戒之以忠貞及卒行路為之揮涕𤣥靚以澄為領軍將軍輔政秋九月涼右司馬張邕惡宋澄專政起兵攻澄殺之并滅其族張𤣥靚以邕為中䕶軍叔父天錫為中領軍同輔政涼張邕驕矜滛縱樹黨專權多所刑殺國人患之張天錫所親敦煌劉肅謂天鍚曰國家事欲未静天錫曰何謂也肅曰今䕶軍出入有似長寧天錫驚曰我固疑之未敢出口計將安出肅曰正當速除之耳天鍚曰安得其人肅曰肅即其人也肅時年未二十天錫曰汝年少更求其助肅曰趙白駒與肅二人足矣十一月天錫與邕俱入朝肅與白駒從天錫值邕於門下肅斫之不中白駒繼之又不克二人與天鍚俱入宫中邕得速走帥甲士三百餘人攻宫門天錫登屋大呼曰張邕凶逆無道既滅宋氏又欲傾覆我家汝將士世為涼臣何忍以兵相向邪今所取者止張邕耳它無所問於是邕兵悉散走邕自刎死盡滅其族黨𤣥靚以天錫為使持節冠軍大將軍都督中外諸軍事輔政十二月始改建興四十九年奉升平年號詔以𤣥靚為大都督隴右諸軍事涼州刺史䕶羌校尉西平公哀帝興寧元年秋八月張𤣥靚祖母馬氏卒尊庻母郭氏為太妃郭氏以張天鍚專政與大臣張欽等謀誅之事泄欽等皆死𤣥靚懼以位讓天錫天錫不受右將軍劉肅等勸天鍚自立閏月天錫使肅等夜帥兵入宫弑𤣥靚宣言暴卒謚曰冲公天錫自稱使持節大都督大將軍涼州牧西平公年十八尊母劉美人曰太妃遣司馬綸騫奉章詣建康請命并送御史俞歸東還二年夏六月秦王堅遣大鴻臚拜張天錫為大將軍涼州牧西平公海西公太和元年冬十月張天鍚遣使至秦境上告絶於秦簡文帝咸安元年秦王堅命王猛為書諭天錫曰昔貴先公稱藩劉石者惟審於彊弱也今論涼土之力則損於往時語大秦之德則非二趙之匹而將軍翻然自絶無乃非宗廟之福也歟以秦之威旁振無外可以回弱水使東流返江河使西注闗東既平將移兵河右恐非六郡士民所能抗也劉表謂漢南可保將軍謂西河可全吉凶在身元龜不逺宜深筭妙慮以求多福無使六世之業一旦而墜地也天錫大懼遣使謝罪稱藩堅拜天錫使持節都督河右諸軍事驃騎大將軍開府儀同三司涼州刺史進西平公冬十二月秦以河州刺史李辯領興晉太守還鎮枹罕徙涼州治金城張天錫聞秦有兼并之志大懼立壇於姑臧南刑三牲帥其官屬遥與晉三公盟遣從事中郎韓慱奉表送盟文并獻書於大司馬温期以明年夏同大舉㑹於上邽武帝太元元年初張天錫之殺張邕也劉肅及安定梁景皆有功二人由是有寵賜姓張氏以為已子使預政事天錫荒於酒色不親庶務黜世子大懐而立嬖妾焦氏之子大豫以焦氏為左夫人人情憤怨從弟從事中郎憲輿櫬切諫不聽秦王堅下詔曰張天錫雖稱藩受位然臣道未純可遣使持節武衛將軍武都茍萇左將軍毛盛中書令梁熈歩兵校尉姚萇等將兵臨西河尚書郎閻負梁殊奉詔徵天錫入朝若有違王命即進師撲討是時秦歩騎十三萬軍司叚鏗謂周虓曰以此衆戰誰能敵之虓曰戎狄以來未之有也堅又命秦州刺史茍池河州刺史李辯涼州刺史王綂帥三州之衆為茍萇後繼秋七月閻負梁殊至姑臧張天錫㑹官屬謀之曰今入朝必不返如其不從秦兵必至將若之何禁中録事席仂曰以愛子為質賂以重寳以退其師然後徐為之計此屈伸之術也衆皆怒曰吾世事晉朝忠節著於海内今一旦委身賊庭辱及祖宗醜莫大焉且河西天險百年無虞若悉境内精兵右招西域北引匈奴以拒之何遽知其不捷也天錫攘袂大言曰孤計決矣言降者斬使謂閻負梁殊曰君欲生歸乎死歸乎殊等辭氣不屈天錫怒縛之軍門命軍士交射之曰射而不中不與我同心者也其母嚴氏泣曰秦主以一州之地横制天下東平鮮卑南取巴蜀兵不留行所向無敵汝若降之猶可延數年之命今以蕞爾一隅抗衡大國又殺其使者亡無日矣天錫使龍驤將軍馬建帥衆二萬拒秦秦人聞天錫殺閻負梁殊八月梁熈姚萇王綂李辯濟自清石津攻涼驍烈將軍梁濟於河㑹城降之甲申茍萇濟自石城津與梁熈等㑹攻纒縮城拔之馬建懼自楊非退屯清塞天錫又遣征東將軍常據帥衆三萬軍於洪池天錫自將餘衆五萬軍於金昌城安西將軍敦煌宋皓言於天錫曰臣晝察人事夜觀天文秦兵不可敵也不如降之天錫怒貶皓為宣威䕶軍廣武太守辛章曰馬建出於行陳必不為國家用茍萇使姚萇帥甲士三千為前驅庚寅馬建帥萬人迎降餘兵皆散走辛卯茍萇及常據戰於洪池據兵敗馬為亂兵所殺其屬董儒授之以馬據曰吾三督諸軍再秉節鉞八將禁旅十總外兵寵任極矣今卒困於此此吾之死地也尚安之乎乃就帳免胄西向稽首伏劒而死秦兵殺軍司席仂癸已秦兵入清塞天錫遣兵司趙克哲帥衆拒之秦兵與克哲戰於赤岸大破之俘斬三萬八千級克哲死天錫出城自戰城内又叛天錫與數千騎犇還姑臧甲午秦兵至姑臧天錫素車白馬面縛輿櫬降於軍門茍萇釋縛焚櫬送於長安涼州郡縣悉降於秦九月秦王堅以梁熈為涼州刺史鎮姑臧徙豪右七千餘户於闗中餘皆安堵如故封天錫為歸義侯拜北部尚書初秦兵之出也先為天錫築第於長安至則居之以天錫晉興太守隴西彭和正為黄門侍郎治中從事武興蘇膺敦煌太守張烈為尚書郎西平太守金城趙凝為金城太守髙昌楊幹為髙昌太守餘皆隨才擢叙苻秦滅燕晉穆帝永和九年春二月庚子燕王儁立其妃可足渾氏為皇后世子􅁮為皇太子皆自龍城遷於薊宫十年夏四月戊申燕主儁命冀州刺史吳王霸徙治信都初燕王皝竒霸之才故名之曰霸將以為世子羣臣諫而止然寵遇猶踰於世子由是儁惡之以其嘗墜馬折齒更名曰缺尋以其應䜟文更名曰垂遷侍中録留臺事徙鎮龍城垂大得東北之和儁愈惡之復召還十二年秋七月丙子燕獻太子􅁮卒升平元年春二月癸丑燕主儁立其子中山王暐為太子二年燕吳王垂娶叚末柸女生子令寳叚氏才髙性烈自以貴姓不尊事可足渾后可足渾氏銜之燕主儁素不快於垂中常侍湟皓因希旨告叚氏及吳國典書令遼東髙弼為巫蠱欲以連汙垂儁收叚氏及弼下大長秋廷尉考驗叚氏及弼志氣確然終無橈辭掠治日急垂愍之私使人謂叚氏曰人生㑹當一死何堪楚毒如此不若引服叚氏歎曰吾豈愛死者邪若自誣以惡逆上辱祖宗下累於王固不為也辨荅益明故垂得免禍而叚氏竟死於獄中出垂為平州刺史鎮遼東垂以叚氏女弟為繼室可足渾氏黜之以其妹長安君妻垂垂不恱由是益惡之三年春二月燕主儁宴羣臣於蒲池語及周太子晉澘然流涕曰才子難得自景先之亡吾鬢髪中白卿等謂景先何如司徒左長史李績對曰獻懐太子之在東宫臣為中庻子太子志業敢不知之太子大德有八至孝一也聰敏二也沈毅三也疾諛喜直四也好學五也多藝六也謙恭七也好施八也儁曰卿譽之雖過然此兒在吾死無憂矣景茂何如時太子暐侍側績曰皇太子天資岐嶷雖八德已聞然二闕未補好逰畋而樂絲竹此其所以為損也儁顧謂暐曰伯陽之言藥石之惠也汝宜誡之暐甚不平儁夢趙主虎齧其臂乃發虎墓求尸不獲購以百金鄴女子李莬知而告之得尸於東明觀下僵而不腐儁蹋而罵之曰死胡何敢怖生天子數其殘曓之罪而鞭之投於漳水尸倚橋柱不流及秦滅燕王猛為之誅李莬收而𦵏之冬十二月辛酉燕主儁寢疾謂大司馬太原王恪曰吾疾必不濟今二方未平景茂沖幼國家多難吾欲效宋宣公以社稷屬汝何如恪曰太子雖幼勝殘致治之主也臣實何人敢干王綂儁怒曰兄弟之間豈虚飾邪恪曰陛下若以臣能荷天下之任者豈不能輔少主乎儁喜曰汝能為周公吾復何憂李績清方忠亮汝善遇之召吳王垂還鄴四年春正月癸巳燕主儁疾篤召大司馬恪等受遺詔輔政甲午卒戊戍太子暐即位年十一大赦改元建熈二月燕人尊可足渾氏為皇太后以太原王恪為太宰專録朝政上庸王評為太傅陽騖為太保慕輿根為太師參輔朝政根性木彊自恃先朝勲舊心不服恪舉動倨傲時太后可足渾氏頗預外事根欲為亂乃言於恪曰今主上幼沖母后干政殿下宜防意外之變思有以自全且定天下者殿下之功也兄亡弟及古今成灋俟畢山陵宜廢主上為王殿下自踐尊位以為大燕無窮之福恪曰公醉邪何言之悖也吾與公受先帝遣詔云何而遽有此議根愧謝而退恪以告吳王垂垂勸恪誅之恪曰今新遭大喪二鄰觀釁而宰輔自相誅夷恐乖逺近之望且可忍之祕書監皇甫真言於恪曰根本庸豎過䝉先帝厚恩引參顧命而小人無識自國哀已來驕狠日甚將成禍亂明公今日居周公之地當為社稷深謀早為之所恪不聽根又言於可足渾氏及燕主暐曰太宰太傅將謀不􅁤臣請帥禁兵以誅之可足渾氏將從之暐曰二國公之親賢先帝選之託以孤嫠必不肯爾安知非太師欲為亂也乃止根又思戀東土言於可足渾氏及􅀈曰今天下蕭條外冦非一國大憂深不如還東恪聞之乃與太傅評謀密奏根罪狀使右衛將軍傅顔就内省誅根并其妻子黨與不赦哀帝興寧二年燕侍中慕輿龍詣龍城徙宗廟及所留百官皆詣鄴海西公太和二年夏四月燕太原相王恪言於燕主􅀈曰吳王垂將相之才十倍於臣先帝以長幼之次臣得先之臣死之後願陛下舉國以聽吳王五月壬辰恪疾病􅀈親視之問以後事恪曰臣聞報恩莫大於薦賢賢者雖在板築猶可為相况至親乎吳王文武兼資管蕭之亞陛下若任以大政國家可安不然秦晉必有窺窬之計言終而卒秦王堅聞恪卒隂有圖燕之計欲覘其可否命匈奴曹轂發使如燕朝貢以西戎主簿馮翊郭辯為之副燕司空皇甫真兄腆及從子奮覆皆仕秦腆為散騎常侍辯至燕歴造公卿謂真曰僕本秦人家為秦所誅故寄命曹王貴兄常侍及奮覆兄弟竝相知有素真怒曰臣無境外之交此言何以及我君似姧人得無因縁假託乎白􅀈請窮治之太傳評不許辨還為堅言燕朝政無綱紀實可圖也鑒機識變唯皇甫真耳堅曰以六州之衆豈不得使有智士一人哉曹轂尋卒秦分其部落為二使其二子分統之號東西曹三年初燕太宰恪有疾以燕主暐幼弱政不在已太傳評多猜忌恐大司馬之任不當其人謂暐兄樂安王臧曰今南有遺晉西有彊秦二國常蓄進取之志顧我未有隙耳夫國之興衰繋於輔相大司馬總統六軍不可任非其人我死之後以親疎言之當在汝及沖汝曹雖才識明敏然年少未堪多難吳王天資英傑智略超世汝曹若能推大司馬以授之必能混壹四海况外冦不足憚也慎勿冐利而忘害不以國家為意也又以語太傳評及恪卒評不能用其言三月以車騎將軍中山王沖為大司馬沖暐之弟也以荆州刺史吳王垂為侍中車騎大將軍儀同三司秦鎮東將軍洛州刺史魏公庾據陜城舉兵反以陜城降燕請兵應接秦人大懼盛兵守華隂燕魏尹范陽王德上疏以為先帝應天受命志平六合陛下纂統當繼而成之今苻氏骨肉乖離國分為五投誠請援前後相尋是天以秦賜燕也天與不取反受其殃吳越之事足以觀矣宜命皇甫真引并冀之衆徑趨蒲陜吳王垂引許洛之兵馳解庾圍太傳總京師虎旅為二軍後繼傳檄三輔示以禍福明立購賞彼必望風嚮應混壹之期於此乎在矣時燕人多請救陜因圖闗中者太傳評曰秦大國也今雖有難未易可圖朝廷雖明未如先帝吾等智略又非太宰之比但能閉闗保境足矣平秦非吾事也魏公庾遣吳王垂及皇甫真牋曰苻堅王猛皆人傑也謀為燕患乆矣今不乗機取之恐異日燕之君臣將有甬東之悔矣垂謂真曰方今為人患者必在於秦主上富於春秋觀太傳識度豈能敵苻堅王猛乎真曰然吾雖知之如言不用何四年晉大司馬温伐燕下邳王厲與温戰敗於黄墟燕又使樂安王臧拒温臧不能抗温至枋頭暐與太傳評謀犇龍城吳王垂自請擊之又使樂嵩請救於秦許賂以虎牢以西之地秦遣茍池鄧羌帥歩騎救燕范陽王德李邽㫁温糧道温數戰不利糧儲復竭聞秦兵將至棄輜重鎧仗犇還吳王垂追温及襄邑大破之事見桓温伐燕燕秦既結好使者數往來燕散騎侍郎太原郝晷給事黄門侍郎梁琛相繼如秦晷與王猛有舊猛接以平生問晷東方之事晷見燕政不修而秦大治知燕將亡隂欲自託於猛頗泄其實琛至長安秦王堅方畋於萬年欲引見琛琛曰秦使至燕燕之君臣朝服備禮灑掃宫庭然後敢見今秦主欲野見之使臣不敢聞命尚書郎辛勁謂琛曰賔客入境惟主人所以處之君焉得專制其禮且天子稱乘輿所至曰行在所何常居之有又春秋亦有遇禮何為不可乎琛曰晉室不綱靈祚歸德二方承運俱受明命而桓温猖狂闚我王略燕危秦孤勢不獨立是以秦主同恤時患要結好援東朝君臣引領西望愧其不競以為隣憂西使之辱敬待有加今彊冦既退交聘方始謂宜崇禮篤義以固二國之歡若忽慢使臣是卑燕也豈修好之義乎夫天子以四海為家故行曰乘輿止曰行在今海縣瓜裂天光分矅安得以乘輿行在為言哉禮不期而見曰遇蓋因事權行其禮簡略豈平居容與之所為哉客使單行誠埶屈於主人然茍不以禮亦不敢從也堅乃為之設行官百僚陪位然後延客如燕朝之儀事畢堅與之私宴問東朝名臣為誰琛曰太傳上庸王評明德茂親光輔王室車騎大將軍吳王垂雄略冠世折衝禦侮其餘或以文進或以武用官皆稱職野無遺賢琛從兄奕為秦尚書郎監使典客館琛於奕舍琛曰昔諸葛瑾為吳聘蜀與諸葛亮惟公朝相見退無私面余竊慕之今使之即安私室所不敢也乃不果館奕數來就邸舍與琛卧起間問琛東國事琛曰今二方分據兄弟並䝉榮寵論其本心各有所在琛欲言東國之美恐非西國之所欲聞欲言其惡又非使臣之所得論也兄何用問為堅使太子延琛相見秦人欲使琛拜太子先諷之曰隣國之君猶其君也隣國之儲君亦何以異乎琛曰天子之子視元士欲其由賤以登貴也尚不敢臣其父之臣况它國之臣乎茍無純敬則禮有往來情豈忘恭但恐降屈為煩耳乃不果拜王猛勸堅留琛堅不許吳王垂自襄邑還鄴威名益振太傳評愈忌之垂奏所募將士忘身立效將軍孫蓋等推鋒䧟陳應蒙殊賞評皆抑而不行垂數以為言與評廷争怨隙愈深太后可足渾氏素惡垂毁其戰功與評密謀誅之太宰恪之子楷及垂舅蘭建知之以告垂曰先發制人但除評及樂安王臧餘無能為矣垂曰骨肉相殘而首亂於國吾有死而已不忍為也頃之二人又以告曰内意已決不可不早發垂曰必不可彌縫吾寧避之於外餘非所議垂内以為憂而未敢告諸子世子令請曰尊比者如有憂色豈非以主上幼沖太傳疾賢功髙望重愈見猜邪垂曰然吾竭力致命以破彊冦本欲保全家國豈知成功之後反令身無所容汝既知吾心何以為吾謀令曰主上闇弱委任太傳一旦禍發疾於駭機今欲保族全身不失大義莫若逃之龍城遜辭謝罪以待主上之察若周公之居東庶幾可以感窹而淂還此幸之大者也如其不然則内撫燕代外懐羣夷守肥如之險以自保亦其次也垂曰善十一月辛卯朔垂請畋於大陸因微服出鄴將趨龍城至邯鄲少子麟素不為垂所愛逃還告狀垂左右多亡叛太傳評白燕王暐遣西平公彊帥精騎追之及於范陽世子令㫁後彊不敢逼會日暮令謂垂曰本欲保東都以自全今事已泄謀不及設秦主方招延英傑不如往歸之垂曰今日之計舍此安之乃散騎滅迹傍南山復還鄴隠於趙之顯原陵俄有獵者数百騎四面而來抗之則不能敵逃之則無路不知所為㑹獵者鷹皆飛颺衆騎散去垂乃殺白馬以祭天且盟從者世子令言於垂曰太傳忌賢疾能構事以來人尤忿恨今鄴城之中莫知尊處如嬰兒之思母夷夏同之若順衆心襲其無備取之如指掌耳事定之後革弊簡能大匡朝政以輔主上安國存家功之大者也今日之便誠不可失願給騎數人足以辦之垂曰如汝之謀事成誠為大福不成悔之何及不如西犇可以萬全子馬奴潜謀逃歸殺之而行至河陽為津吏所禁斬之而濟遂自洛陽與叚夫人世子令令弟寳農隆兄子楷舅蘭建郎中令髙弼俱犇秦留妃可足渾氏於鄴乙泉戍主吳歸追及於閺郷世子令擊之而退初秦王堅隂有圖燕之志憚吳王垂不敢發及聞垂至大喜郊迎執手與語乃以垂為冠軍將軍封賔徒侯楷為積弩將軍事見慕容叛秦復燕秦留梁琛月餘乃遣歸琛兼程而進比至鄴吳王垂已犇秦琛言於太傳評曰秦人日閱軍旅多聚糧於陜東以琛觀之為和必不能乆今吳王又往歸之秦必有窺燕之計宜早為之備評曰秦豈肯受叛臣而敗和好哉琛曰今二國分據中原常有相吞之志桓温之入冦彼以計相救非愛燕也若燕有釁彼豈忘其本志哉評曰秦主何如人琛曰明而善㫁問王猛曰名不虚得評皆不以為然琛又以告燕主暐暐亦不然之以告皇甫真真深憂之上疏言苻堅雖聘問相尋然實有窺上國之心非能慕樂德義不忘乆要也前出兵洛川及使者繼至國之險易虚實彼皆得之矣今呉王垂又往從之為其謀主伍員之禍不可不備洛陽太原壺闗皆宜選將益兵以防未然暐召太傳評謀之評曰秦國小力弱恃我為援且苻堅庶幾善道終不肯納叛臣之言絶二國之好不宜輕自驚擾以啟冦心卒不為備秦遣黄門郎石越聘於燕太傳評示之以奢欲以誇燕之富盛髙泰及太傳參軍河間劉靖言於評曰越言誕而視逺非求好也乃觀釁也宜耀兵以示之用折其謀今乃示之以奢益為其所輕矣評不從泰遂謝病歸是時太后可足渾氏侵撓國政太傳評貪昧無厭貨賂上流官非才舉羣下怨憤尚書左丞申紹上疏以為守宰者致治之本今之守宰率非其人或武人出於行伍或貴戚生長綺紈既非鄉曲之選又不更朝廷之職加之黜陟無法貪惰者無刑罰之懼清修者無旌賞之勸是以百姓困弊冦盗充斥綱頽紀紊莫相紏攝又官吏猥多踰於前世公私紛然不勝煩擾入燕戸口數兼二冦弓馬之勁四方莫及而比者戰則屢北皆由守宰賦調不平侵漁無已行留俱窘莫肯致命故也後宫之女四千餘人僮侍厮役尚在其外一日之費厥直萬金民士承風競為奢靡彼秦吳僣僻猶能條治所部有兼并之心而我上下因循日失其序我之不修彼之願也謂宜精擇守宰併官省職存恤兵家使公私両遂節抑浮靡愛惜用度賞必當功罸必當罪如此則温猛可梟二方可取豈特保境安民而已哉又索頭什翼犍疲病昏悖雖乏貢御無能為患而勞兵逺戍有損無益不若移於并土控制西河南堅壺闗北重晉陽西冦來則拒守過則㫁後猶愈於戍孤城守無用之地也疏奏不省初燕人許割虎牢以西賂秦晉兵既退燕人悔之謂秦人曰行人失辭有國有家者分災救難理之常也秦王堅大怒遣輔國將軍王猛建威將軍梁成洛州刺史鄧羌帥歩騎三萬伐燕十二月進攻洛陽五年春正月秦王猛遺燕荆州刺史武威王筑書曰國家今已塞成皋之險杜盟津之路大駕虎旅百萬自軹闗取鄴都金庸窮戍外無救援城下之師將軍所監豈三百弊卒所能支也筑懼以洛陽降猛陳師受之燕衛大將軍樂安王臧城新樂破秦兵於石門執秦將楊猛王猛之發長安也請慕容令參其軍事以為鄉導將行造慕容垂飲酒從容謂垂曰今當逺别卿何以贈我使我覩物思人垂脫佩刀贈之猛至洛陽賂垂所親金熈使詐為垂使者謂令曰吾父子來此以逃死也金王猛疾人如讐䜛毁日深秦主雖外相厚善其心難知丈夫逃死而卒不免將為天下笑吾聞東朝比來始更悔寤主后相尤吾今還東故遣告汝吾已行矣便可速發令疑之躊躇終日又不可審覆乃將舊騎詐為出獵遂犇樂安王臧於石門猛表令叛狀垂懼而出走及藍田為追騎所獲秦王堅引見東堂勞之曰卿家國失和委身投朕賢子心不忘本猶懐首丘亦各其志不足深咎然燕之將亡非令所能存惜其徒入虎口耳且父子兄弟罪不相反卿何為過懼而狼狽如是乎待之如舊燕人以令叛而復還其父為秦所厚疑令為反間徙之沙城在龍都東北六百里臣光曰昔周得微子而革商命秦得由余而霸西戎吳得伍員而克彊楚漢得陳平而誅項籍魏得許攸而破袁紹彼敵國之材臣來為己用進取之良資也王猛知慕容垂之心久而難信獨不念燕尚未滅垂以材髙功盛無罪見疑窮困歸秦未有異心遽以猜忌殺之是助燕為無道而塞來者之門也如何其可哉故秦王堅禮之以收燕望親之以盡燕情寵之以傾燕衆信之以結燕心未為過矣猛何汲汲以殺垂至乃為市井鬻賣之行有如嫉其寵而䜛之者豈雅德君子所宜為哉樂安王臧進屯滎陽王猛遣建威將軍梁成洛州刺史鄧羌撃走之留羌鎮金墉以輔國司馬桓寅為𢎞農太守代羌戍陜城而還秦王堅以王猛為司徒録尚書事封平陽郡侯猛固辭曰今燕吳未平戎車方駕而始得一城即受三事之賞若克殄二冦將何以加之堅曰茍不蹔抑朕心何以顯卿謙光之美已詔有司權聽所守封爵酬庸其勉從朕命秦王堅復遣王猛督鎮南將軍楊安等十將歩騎六萬以伐燕夏六月己卯秦王堅送王猛於灞上曰今委卿以闗東之任當先破壺闗平上黨長驅取鄴所謂疾雷不及掩耳吾當親督萬衆繼卿星發舟車糧運水陸俱進卿勿以為後慮也猛曰臣仗威靈奉成筭盪平殘胡如風掃葉願不煩鑾輿親犯塵霧但願速勅所司部置鮮卑之所堅大悦秋七月秦王猛攻壺闗楊安攻晉陽八月燕主暐命太傳上庸王評將中外精兵三十萬以拒秦暐以秦冦為憂召散騎侍郎李鳯黄門侍郎梁琛中書侍郎樂嵩問曰秦兵衆寡何如今大軍既出秦能戰乎鳯曰秦國小兵弱非王師之敵景略常才又非太傳之比不足憂也琛嵩曰勝敗在謀不在衆寡秦逺來為冦安肯不戰且吾當用謀以求勝豈可冀其不戰而已乎暐不恱王猛克壺闗執上黨太守南安王越所過郡縣皆望風降附燕人大震秦楊安攻晉陽晉陽兵多糧足乆之未下王猛留屯騎校尉茍萇戍壺闗引兵助安攻晉陽為地道使虎牙將軍張蚝帥壯士數百潜入城中大呼斬闗納秦兵辛巳猛安入晉陽執燕并州刺史東海王莊太傳評畏猛不敢進屯於潞川冬十月辛亥猛留將軍武都毛當戍晉陽進兵潞川與慕容評相持壬戍猛遣將軍徐成覘燕軍形要期以日中及昏而返猛怒將斬之鄧羌請之曰今賊衆我寡詰朝將戰成大將也宜且宥之猛曰若不殺成軍法不立羌固請曰成羌之郡將也雖違期應斬羌願與成效戰以贖之猛弗聽羌怒還營嚴鼓勒兵將攻猛猛問其故羌曰受詔討逺賊今有近賊自相殺欲先除之猛謂羌義而有勇使語之曰將軍止吾今赦之成既免羌詣猛謝猛執其手曰吾試將軍耳將軍於部將尚爾况國家乎吾不復憂賊矣太傳評以猛懸軍深入欲以持乆制之評為人貪鄙鄣固山泉鬻樵及水積財帛如邱陵士卒怨憤莫有鬭志猛聞之笑曰慕容評真奴才雖億兆之衆不足畏况數十萬乎吾今兹破之必矣乃遣㳺擊將軍郭慶帥騎五千夜從間道出評營後燒評輜重火見鄴中燕主暐懼遣侍中蘭伊讓評曰王髙祖之子也當以宗廟社稷為憂奈何不撫戰士而㩁賣樵水專以殖貨為心乎府庫之積朕與王共之何憂於貧若賊兵遂進家國喪亡王持錢帛欲安所置之乃命悉以其錢帛散之軍士且趨使戰評大懼遣使請戰於猛甲子猛陳於渭源而誓之曰王景略受國厚恩任兼内外今與諸君深入賊地當竭力致死有進無退共立大功以報國家受爵明君之朝稱觴父母之室不亦美乎衆皆踊躍破釡棄糧大呼競進猛望燕兵之衆謂鄧羌曰今日之事非將軍不能破勍敵成敗之機在兹一舉將軍勉之羌曰若能以司隸見與者公勿以為憂猛曰此非吾所及也必以安定太守萬户侯相處羌不悦而退俄而兵交猛召羌羌寢弗應猛馳就許之羌乃大飲帳中與張蚝徐成等跨馬運矛馳赴燕陣出入數四旁若無人所殺傷數百及日中燕兵大敗俘斬五萬餘人乘勝追擊所殺及降者又十萬餘人評單騎走還鄴崔鴻曰鄧羌請郡將以橈法徇私也勒兵欲攻王猛無上也臨戰豫求司隸邀君也有此三者罪孰大焉猛能容其所短收其所長若馴猛虎馭悍馬以成大功詩云采葑采菲無以下體猛之謂矣秦兵長驅而東丁夘圍鄴猛上疏稱臣以甲子之日大殱醜類順陛下仁愛之志使六州士庶不覺易主自非守迷違命一無所害秦王堅報之曰將軍役不踰時而元惡克舉勲髙前古朕今親帥六軍星言電赴將軍其休養將士以待朕至然後取之猛之未至也鄴旁剽劫公行及猛至逺近帖然號令嚴明軍無私犯法簡政寛燕民各安其業更相謂曰不圖今日復見太原王猛聞之歎曰慕容𤣥恭信竒士也可謂古之遺愛矣設太牢以祭之十一月秦王堅留李威輔太子守長安陽平公融鎮洛陽自帥精鋭十萬赴鄴七日而至安陽宴祖父時故老猛潜入安陽謁堅堅曰昔周亞夫不迎漢文帝今將軍臨敵而棄軍何也猛曰亞夫前却人主以求名臣竊少之且臣奉陛下威靈撃垂亡之虜譬如釡中之魚何足慮也監國冲幼鑾駕逺臨脱有不虞悔之何及陛下忘臣灞上之言邪初燕宜都王桓帥衆萬餘屯沙亭為太傅評後繼聞評敗引兵屯内黄堅使鄧羌攻信都丁丑桓帥鮮卑五千犇龍城戊寅燕散騎侍郎餘蔚帥扶餘髙句麗及上黨質子五百餘人夜開鄴北門納秦兵燕主暐與上庸王評樂安王臧定襄王淵左衛將軍孟髙殿中將軍艾朗等犇龍城辛巳秦王堅入鄴宫燕主暐之出鄴也衛士猶千餘騎既出城皆散惟十餘騎從行秦王堅使游撃將軍郭慶追之時道路艱難孟髙扶侍暐經護二王極其勤瘁又所在遇盜轉鬬而前數日行至福祿依家解息盜二十餘人猝至皆挾弓矢髙持刀與戰殺傷數人髙力竭自度必死乃直前抱一賊頓撃於地大呼曰男兒窮矣餘賊從旁射髙殺之艾朗見髙獨戰亦還趨賊并死暐失馬步走郭慶追及於髙陽部將巨武將縳之暐曰汝何小人敢縳天子武曰我受詔追賊何謂天子執以詣秦王堅堅詰其不降而走之狀對曰狐死首丘欲歸死於先人墳墓耳堅哀而釋之令還宫帥文武出降暐稱孟髙艾朗之忠於堅堅命厚加歛葬拜其子為郎中郭慶進至龍城太傅評犇髙句麗髙句麗執評送於秦宜都王桓殺鎮東將軍渤海王亮并其衆犇遼東遼東太守韓稠先已降秦桓至不得入攻之不克郭慶遣將軍朱嶷撃之桓棄衆單走嶷獲而殺之諸州牧守及六夷渠帥盡降於秦凡得郡百五十七户二百四十六萬口九百九十九萬以燕宫人珍寶分賜將士下詔大赦曰朕以寡薄猥承休命不能懷逺以德柔服四維至使戎車屢駕有害斯民雖百姓之過然亦朕之罪也其大赦天下與之更始初梁琛之使秦也以侍輦茍純為副琛毎應對不先告純純恨之歸言於燕主暐曰琛在長安與王猛甚親善疑有異謀琛又數稱秦王堅及王猛之美且言秦將興師宜為之備已而秦果伐燕皆如琛言暐乃疑琛知其情及慕容評敗遂收琛繫獄秦王堅入鄴而釋之除中書著作郎引見謂之曰卿昔言上庸王吳王皆將相竒材何為不能謀畫自使亡國對曰天命廢興豈一人所能移也堅曰卿不能見幾而作虛稱燕美忠不自防反為身禍可謂智乎對曰臣聞幾者動之微吉凶之先見者也如臣愚暗實所不及然為臣莫如忠為子莫如孝自非有一至之心者莫能保忠孝之始終是以古之烈士臨危不改見死不避以徇君親彼知幾者心達安危身擇去就不顧家國臣就使知之尚不忍為況非所及邪堅聞悦綰之忠恨不及見拜其子為郎中堅以王猛為使持節都督闗東六州諸軍事車騎大將軍開府儀同三司冀州牧鎮鄴進爵清河郡侯悉以慕容評第中之物賜之賜楊安爵博平縣侯以鄧羌為持節征虜將軍安定太守賜爵真定郡侯郭慶為持節都督幽州諸軍事幽州刺史鎮薊賜爵襄城侯其餘將士封賞各有差堅以京兆韋鍾為魏郡太守彭豹為陽平太守其餘州縣牧守令長皆因舊而授之以燕常山太守申紹為散騎侍郎使與散騎侍郎京兆韋儒俱為繡衣使者循行闗東州郡觀省風俗勸課農桑振恤窮困收葬死亡旌顯節行燕政有不便於民者皆變除之十二月秦王堅遷慕容暐及燕后妃王公百官并鮮卑四萬餘户于長安王猛表留梁琛為主簿領記室督它日猛與僚屬宴語及燕朝使者猛曰人心不同昔梁君至長安專美本朝樂君但言桓温軍盛郝君微説國弊參軍馮誕曰今三子皆為國臣敢問取臣之道何先猛曰郝君知幾為先誕曰然則明公賞丁公而誅季布也猛大笑秦王堅自鄴如枋頭宴父老改枋頭為永昌復之終世甲寅至長安封慕容暐為新興侯以燕故臣慕容評為給事中皇甫真為奉車都尉李洪為駙馬都尉皆奉朝請李邽為尚書封衡為尚書郎慕容德為張掖太守燕國平叡為宣威將軍悉羅騰為三署郎其餘封授各有差衡裕之子也簡文帝咸安二年春二月冠軍將軍慕容垂言於秦王堅曰臣叔父評燕之惡來輩也不宜復汚聖朝願陛下為燕戮之堅乃出評為范陽太守燕之諸王悉補邊郡臣光曰古之人滅人之國而人悦何哉為人除害故也彼慕容評者蔽君専政忌賢疾功愚闇貪虐以喪其國國亡不死逃遁見擒秦王堅不以為誅首又從而寵秩之是愛一人而不愛一國之人也其失人心多矣是以施㤙於人而人莫之㤙盡誠於人而人莫之誠卒於功名不遂容身無所由不得其道故也通鑑紀事本末巻十五下
