body:
  text: 通鑑紀事本末卷十九上宋袁樞撰劉裕簒晉晉安帝隆安三年初彭城劉裕生而母死父翹僑居京口家貧將棄之同郡劉懐敬之母裕之從母也生懷敬未朞走徃救之㫁懐敬乳而乳之及長勇健有大志僅識文字以賣履為業好樗蒲為鄉閭所賤劉牢之擊孫恩引裕參軍事劉裕擊孫恩事見盧循之亂元興三年桓𤣥之亂劉裕入朝𤣥謂其司徒王謐曰裕風骨不常蓋人傑也𤣥后劉氏有智鑒謂𤣥曰劉裕龍行虎歩視瞻不凡恐終不為人下不如早除之𤣥曰我方平蕩中原非裕莫可用者候闗河平定然後别議耳劉裕與何無忌密謀興復劉邁弟毅亦與無忌謀討𤣥於是相與合謀起兵劉裕克京口𤣥懼浮江南走裕入建康王謐推裕為使持節都督揚徐兖豫青冀幽并八州諸軍事徐州刺史𤣥至尋陽逼帝西上劉毅等追之𤣥挾帝至江陵毅等自尋陽西至與𤣥遇𤣥衆大潰挟帝西走馮遷擊斬之乗輿返正於江陵桓振襲䧟江陵義熈元年春正月劉毅等擊破桓振軍迎帝於江陵何無忌奉帝東還三月帝至建康以劉裕為侍中車騎將軍都督中外諸軍事裕固譲不受屡請歸藩詔百僚敦勸帝幸其第裕復詣闕陳請乃聼歸藩並見偽楚之亂夏四月劉裕旋鎮京口改授都督荆司等十六州諸軍事加領兖州刺史六月劉裕遣使求和於秦且求南鄉等諸郡秦王興許之羣臣咸以為不可興曰天下之善一也劉裕拔起細微能討誅桓𤣥興復晉室内釐庶政外修封疆吾何惜數郡不以成其羙乎遂割南鄉順陽新野舞隂等十二郡歸于晉二年冬十月尚書論建義功奏封劉裕豫章郡公四年春正月劉毅等不欲劉裕入輔政議以中領軍謝混為揚州刺史或欲令裕於丹徒領揚州以内事付孟昶遣尚書右丞皮沈以二議諮裕沈先見裕記室錄事參軍劉穆之具道朝議穆之偽起如厠密疏白裕曰皮沈之言不可從裕既見沈且令出外呼穆之問之穆之曰晉朝失政日久天命已移公興復皇祚勲髙位重今日形勢豈得居謙遂為守藩之將耶劉孟諸公與公俱起布衣共立大義以取富貴事有前後故一時相推非為委體心服宿定臣主之分也力敵勢均終相吞噬揚州根本所係不可假人前者以授王謐事出權道今若復以佗授便應受制於人一失權柄無由可得將来之危難可熟念今朝議如此宜相酬答必云在我措辭又難唯應云神州治本宰輔崇要此事既大非可懸論便蹔入朝共盡同異公至京邑彼必不敢越公更授餘人明矣裕從之朝廷乃徴裕為侍中車騎將軍開府儀同三司揚州刺史錄尚書事徐兖二州刺史如故裕表觧兖州以諸葛長民為青州刺史鎮丹徒劉道憐為并州刺史戍石頭五年春二月劉裕伐南燕事見劉裕平南燕初苻氏之敗也王猛之孫鎮惡来奔以為臨灃令鎮惡有謀略善果㫁喜論軍國大事或薦鎮惡於劉裕裕與語悦之因留宿明旦謂參佐曰吾聞將門有將鎮惡信然即以為中軍參軍秋九月加劉裕太尉裕固辭六年六月以劉裕為太尉中書監加黄鉞裕受黄鉞餘固辭司馬國璠及弟叔璠叔道犇秦秦王興曰劉裕方誅桓𤣥輔晉室卿何為来對曰裕削弱王室臣宗族有自修立裕輙除之方為國患甚於桓𤣥耳七年春正月己未劉裕還建康三月劉裕始受太尉中書監八年夏四月以後將軍豫州刺史劉毅為衛将軍都督荆寕秦雍四州諸軍事荆州刺史毅謂左衛將軍劉敬宣曰吾忝西任欲屈卿為長史南蠻豈有見輔意乎敬宣懼以告太尉裕裕笑曰但令老兄平安必無過慮毅性剛愎自謂建義之功與裕相埒深自矜伐雖權事推裕而心不服及居方岳常怏怏不得志裕每柔而順之毅驕縱滋甚甞云恨不遇劉項與之争中原及敗於桑落知物情去已彌復憤激裕素不學而毅頗渉文雅故朝士有清望者多歸之與尚書僕射謝混丹陽尹郄僧施深相慿結僧施超之從子也毅既據上流隂有圖裕之志求兼督交廣二州裕許之毅又奏以郄僧施為南蠻校尉後軍司馬毛修之為南郡太守裕亦許之以劉穆之代僧施為丹陽尹毅表求至京口辭墓裕徃㑹之於倪塘寕逺將軍胡藩言於裕曰公謂劉衛軍終能為公下乎裕黙然久之曰卿謂何如藩曰連百萬之衆攻必取戰必克毅固以此服公至於渉獵傳記一談一詠自許以為雄豪以是縉紳白靣之士輻輳歸之恐終不為公下不如因㑹取之裕曰吾與毅俱有克復之功其過未彰不可自相圖也秋九月劉毅至江陵多變易守宰輙割豫州文武江州兵力萬餘人以自隨㑹毅疾篤郄僧施等恐毅死其黨危乃勸毅請從梁兖州刺史藩以自副太尉裕偽許之藩自廣陵入朝己卯裕以詔書罪狀毅云與藩及謝混共謀不軌收藩及混賜死庚辰詔大赦以前㑹稽内史司馬休之為都督荆雍梁秦寧益六州諸軍事荆州刺史北徐州刺史劉道憐為兖青二州刺史鎮京口使豫州刺史諸葛長民監太尉留府事裕疑長民難獨任乃加劉穆之建武將軍置佐史配給資力以防之壬午裕帥諸軍發建康參軍王鎮惡請給百舸為前驅丙申至姑孰以鎮惡為振武將軍與龍驤將軍蒯恩將百舸前發裕戒之曰若賊可擊擊之不可者燒其船艦留屯水際以待我於是鎮惡晝夜兼行揚聲言劉兖州至冬十月己未鎮惡至豫章口去江陵城二十里捨船歩上蒯恩軍居前鎮惡次之舸留一二人對舸岸上立六七旗旗下置鼓語所留人計我將至城便鼓嚴令若後有大軍状又分遣人燒江津船艦鎮惡徑前襲城語前軍士有問者但云劉兖州至津戍及民間皆晏然不疑未至城五六里逢毅要將朱顯之欲出江津問劉兖州何在軍士曰在後顯之至軍後不見而見軍人擔鼓排戰具望江津船艦已被燒鼓嚴之聲甚盛知非藩上便躍馬馳去告毅行令閉諸城門鎮惡亦馳進門未及下關軍人因得入城衛軍長史謝純入參承毅出聞兵至左右欲引車歸純叱之曰我人吏也逃將安之馳還入府純安兄據之孫也鎮惡與城内兵鬬且攻其金城自食時至中晡城内人敗散鎮惡穴其金城而入遣人以詔及赦文并裕手書示毅毅皆燒不視與司馬毛修之等督士卒力戰城内人猶未信裕自来軍士從毅自東来者與臺軍多中表親戚且鬬且語知裕自来人情離駭逮夜聼事前軍皆散斬毅勇將趙蔡毅左右兵猶閉東西閤拒戰鎮惡慮闇中自相傷犯乃引軍出圍金城開其南靣毅慮南有伏兵夜半帥左右三百許人開北門突出毛修謂謝純曰君但隨僕去純不從為人所殺毅夜投牛牧佛寺初桓蔚之敗也走投牛牧寺僧昌昌保藏之毅殺昌至是寺僧拒之曰昔亡師容桓蔚為劉衛軍所殺今實不敢容異人毅嘆曰為灋自弊一至於此遂縊而死明日居人以告乃斬首於市并子姪皆伏誅毅兄模犇㐮陽魯宗之斬送之初毅季父鎮之閒居京口不應辟召常謂毅及藩曰汝輩才器足以得志但恐不久耳我不就爾求財位亦不同爾受罪累毎見毅藩導從到門輙詬之毅甚敬畏未至宅數百歩悉屏儀衛與白衣數人俱進及毅死太尉裕奏徴鎮之為散騎常侍光祿大夫固辭不至冬十一月己卯太尉裕至江陵殺郄僧施初毛修之雖為劉毅僚佐素自結於裕故裕特宥之賜王鎮惡爵漢夀子裕問毅府諮議參軍申永曰今日何施而可永曰除其宿釁倍其惠澤貫叙門次顯擢才能如此而已裕納之下書寛租省調節役原刑禮辟名士荆人恱之諸葛長民驕縱貪侈所為多不法為百姓患常懼太尉裕按之及劉毅被誅長民謂所親曰昔年醢彭越今年殺韓信禍其至矣乃屏人問劉穆之曰悠悠之言皆云太尉與我不平何以至此穆之曰公泝流逺征以老母稚子委節下若一毫不盡豈容如此邪長民意乃小安長民弟輔國大將軍黎民説長民曰劉氏之亡亦諸葛氏之懼也宜因裕未還而圖之長民猶豫未發既而嘆曰貧賤常思富貴富貴必履危機今日欲為丹徒布衣豈可得邪因遺冀州刺史劉敬宣書曰盤龍狼戾専恣自取夷滅異端將盡世路方夷富貴之事相與共之敬宣報曰下官自義熈以来叅三州七郡常懼福過災生思避盈居損富貴之㫖非所敢當且使以書呈裕裕曰阿夀故為不負我也裕在江陵輔國將軍王誕白裕求先下裕曰諸葛長民似有自疑心卿詎宜便去誕曰長民知我䝉公垂眄今輕身單下必當以為無虞乃可以少安其意耳裕笑曰卿勇過賁育矣乃聼先還冬十二月加太尉裕太傅揚州牧九年春二月太尉裕自江陵東還駱驛遣輜重兼行而下前刻至日每淹留不進諸葛長民與公卿頻日奉候於新亭輙差其期乙丑晦裕輕舟徑進潜入東府三月丙寅朔旦長民聞之驚趨至門裕伏壮士丁旿於幔中引長民却人閒語凡平生所不盡者皆及之長民甚恱丁旿自幔後出於座拉殺之輿尸付廷尉收其弟黎民黎民素驍勇格鬬而死并殺其季弟大司馬參軍幼民從弟寕朔將軍秀之三月戊寅加裕豫州刺史裕固譲太傅州牧秋九月再命太尉裕為太傅揚州牧固辭十年司馬休之在江陵頗得江漢民心子譙王文思在建康性凶暴好通輕俠太尉裕惡之三月有司奏文思擅捶殺國吏詔誅其黨而宥文思休之上疏謝罪請觧所任不許裕執文思送休之令自訓厲意欲休之殺之休之但表廢文思并與裕書陳謝裕由是不恱江州刺史孟懐玉兼督豫州六郡以備之十一年春正月太尉裕收司馬休之次子文寳兄子文祖並賜死發兵擊之詔加裕黄鉞領荆州刺史庚午大赦辛巳太尉裕發建康以中軍將軍劉道憐監留府事劉穆之兼右僕射事無大小皆决於穆之又以髙陽内史劉鍾領石頭戍事屯冶亭休之府司馬張裕南平太守檀範之聞之皆逃歸建康裕邵之兄也雍州刺史魯宗之自疑不為太尉裕所容與其子竟陵太守軌起兵應休之二月休之上表罪状裕勒兵拒之裕密書招休之府錄事參軍南陽韓延之廷之復書曰承親帥戎馬逺履西畿闔境士庶莫不惶駭辱疏知以譙王前事良増嘆息司馬平西體國忠貞欵懐待物以公有匡復之勲家國䝉頼推徳委誠每事詢仰譙王徃以微事見劾猶自表遜位况以大過而當黙然邪前以表奏廢之所不盡者命耳推寄相與正當如此而遽興兵甲所謂欲加之罪其無辭乎劉裕足下海内之人誰不見足下此心而復欲欺誑國士来示云處懐期物自有由来今伐人之君㗖人以利真可謂處懐期物自有由来者乎劉藩死於閶闔之門諸葛斃於左右之手甘言詫方伯襲之以輕兵遂使席上靡欵懐之士閫外無自信諸侯以是為得筭良可恥也貴府將佐及朝廷賢徳寄命過日吾誠鄙劣甞聞道於君子以西平之至徳寕可無授命之臣乎必未能自投虎口比迹郄僧施之徒明矣假令天長䘮亂九流渾濁當與臧洪遊於地下不復多言裕視書嘆息以示將佐曰事人當如此矣延之以裕父名翹字顯宗乃更其字曰顯宗名其子曰翹以示不臣劉氏太尉裕使參軍檀道濟朱超石將歩騎出㐮陽超石齡石之弟也江夏太守劉䖍之將兵屯三連立橋聚糧以待道濟等積日不至魯軌襲擊䖍之殺之裕使其婿振威將軍東海徐逵之統參軍蒯恩王允之沈淵子為前鋒出江夏口逵之等與魯軌戰于破冢兵敗逵之允之淵子皆死獨蒯恩勒兵不動軌乗勝力攻之不能克乃退淵子林子之兄也裕軍於馬頭聞逵之死怒甚三月壬午帥諸將濟江魯軌司馬文思將休之兵四萬臨峭岸置陳軍士無能登者裕自被甲欲登諸將諌不從怒愈甚太尉主簿謝晦前抱持裕裕抽劒指晦曰我斬卿晦曰天下可無晦不可無公建武將軍胡藩領逰兵在江津裕呼藩使登藩有疑色裕命左右錄来欲斬之藩顧曰正欲擊賊不得奉教乃以刀頭穿岸少容足指騰之而上隨之者稍多既登岸直前力戰休之兵不能當稍引却裕兵因而乗之休之兵大潰遂克江陵休之宗之俱北走軌留石城裕命閬中侯下邳趙倫之太尉參軍沈林子攻之遣武陵内史王鎮惡以舟師追休之等青冀二州刺史劉敬宣參軍司馬道賜宗室之疏屬也聞太尉裕攻司馬休之道賜與同府辟閭道秀左右小將王猛子謀殺敬宣據廣固以應休之乙卯敬宣召道秀屏人語左右悉出戸猛子逡廵在後取敬宣備身刀殺敬宣文武佐吏即時討道賜等皆斬之夏五月趙倫之沈林子破魯軌于石城司馬休之魯宗之救之不及遂與軌犇㐮陽宗之參軍李應之閉門不納甲午休之宗之軌及譙王文思新蔡王道賜梁州刺史馬敬南陽太守魯範俱犇秦宗之素得士民心争為之衛送出境王鎮惡等追之盡境而還初休之等求救於秦魏秦征虜將軍姚成王及司馬國璠引兵至南陽魏長孫嵩至河東聞休之等敗皆引還休之至長安秦王興以為揚州刺史使侵擾㐮陽侍御史唐盛言於興曰据符䜟之文司馬氏當復得河洛今使休之擅兵於外猶縱魚於淵也不如以髙爵厚禮留之京師興曰昔文王卒免羑里髙祖不斃鴻門茍天命所在誰能違之脫如符䜟之言留之適足為害遂遣之詔加太尉裕太傅揚州牧劒履上殿入朝不趨賛拜不名秋八月甲子太尉裕還建康固辭太傅州牧其餘受命十二年春正月加太尉裕兖州刺史都督南秦州凡都督二十二州三月加太尉裕中外大都督裕戒嚴將伐秦加裕領司豫二州刺史夏五月癸巳加太尉領北雍州刺史秋八月太尉裕以世子義符為中軍將軍監太尉留府事劉穆之為左僕射領監軍中軍二府軍司入居東府揔攝内外丁巳發建康冬十一月大尉裕遣左長史王𢎞還建康諷朝廷求九錫時劉穆之掌留任而㫖從北来穆之由是愧懼發病𢎞珣之子也十二月壬申詔以裕為相國揔百揆揚州牧封十郡為宋公備九錫之禮裕在諸侯上領征西將軍司豫北徐雍四州刺史如故裕辭不受十三年春正月太尉裕引水軍發彭城三月太尉裕將水軍自淮泗入清河將泝河西上先遣使假道于魏魏人以數千騎随裕軍西行裕遣兵擊之魏軍奔潰秋八月太尉裕至潼闗王鎮惡大破秦兵於渭橋姚泓將妻子羣臣詣鎮惡降九月裕至長安以秦金玉繒帛頒賜將士送姚泓至建康斬之事見劉裕滅後秦癸酉司馬休之司馬文思司馬國璠司馬道賜魯軌韓延之等皆降于魏司馬休之尋卒魏賜國璠爵淮南公道賜爵池陽子魯軌爵㐮陽公冬十月詔進宋公爵為王増封十郡辭不受冬十一月辛未穆之卒太尉裕以根本無托决意東還十二月太尉裕發長安十四年春正月太尉裕至彭城觧嚴夏六月太尉裕始受相國九錫之命赦國中殊死以下崇繼母蘭陵蕭氏為太妃以太尉軍咨祭酒孔靖為宋國尚書令左長史王𢎞為僕射領選從事中郎傅亮蔡廓皆為侍中謝晦為右衛將軍右長史鄭鮮之為奉常行參軍殷景仁為秘書郎其餘百官悉依天朝之制靖辭不受亮咸之孫廓謨之曽孫鮮之渾之𤣥孫景仁融之曽孫也景仁學不為文敏有思致口不談義深達理體至於國典朝儀舊章記注莫不撰錄識者知其有當世之志冬十二月彗星出天津入太微絡紫微八十餘日而滅魏主嗣復召諸儒術士問之曰今四海分裂災咎之應果在何國朕甚畏之卿輩盡言勿有所隠衆推崔浩使對浩曰夫災異之興皆象人事人茍無釁又何畏焉昔王莾將簒漢彗星出入正與今同國家主尊臣卑民無異望晉室陵夷危亡不逺彗之為異其劉裕將簒之應乎無以易其言宋公裕以䜟云昌明之後尚有二帝乃使中書侍郎王韶之與帝左右密謀酖帝而立琅邪王徳文徳文常在帝左右飲食寝處未甞暫離韶之伺之經時不得間㑹徳文有疾出居於外戊寅韶之以散衣縊帝於東堂韶之廙之曽孫也裕因稱遺詔奉徳文即皇帝位大赦恭帝元熈元年春正月甲午徴宋公裕入朝進爵為王裕辭初司馬楚之奉其父榮期之䘮歸建康㑹宋公裕誅翦宗室之有才望者楚之叔父宣期兄貞之皆死楚之亡匿竟陵蠻中及從祖休之自江陵犇秦楚之亡之汝潁間聚衆以謀復讎楚之少有英氣能折節下士有衆萬餘屯據長社裕使刺客沐謙徃刺之椘之待謙甚厚謙欲發未得間乃夜稱疾知楚之必徃問疾因欲刺之楚之果自齎湯藥徃視之情意勤篤謙不忍發乃出匕首於席下以状告之曰將軍深為劉裕所忌願勿輕率以自保全遂委身事之為之防衛時宗室多逃亡在河南有司馬文榮者帥乞活千餘户屯金墉城南又有司馬道恭自東垣帥三千人屯城西司馬順明帥五千人屯陵雲臺司馬楚之屯栢谷塢皆降於魏秋七月宋公裕始受進爵之命八月移鎮夀陽以度支尚書劉懐慎為督淮北諸軍事徐州刺史鎮彭城九月宋王裕自觧揚州牧冬十二月辛卯宋王裕加殊禮進王太妃為太后世子為太子宋髙祖永初元年春正月宋王欲受禪而難於發言乃集朝臣宴飲從容言曰桓𤣥簒位鼎命已移我首唱大義興復帝室南征北伐平定四海功成業著遂荷九錫今年將衰暮崇極如此物忌盛滿非可久安今欲奉還爵位歸老京師羣臣惟盛稱功徳莫諭其意日晚坐散中書令傅亮還外乃悟而宫門已閉亮叩扉請見王即開門見之亮入但曰臣暫宜還都王觧其意無復他言直云須幾人自送亮曰數十人可也即時奉辭亮出已夜見長星竟天拊髀歎曰我常不信天文今始驗矣亮至建康夏四月徴王入朝王留子義康為都督豫司雍并四州諸軍事豫州刺史鎮夀陽義康尚幼以相國參軍南陽劉湛為長史决府州事湛自弱年即有宰物之情常自比管葛慱渉書史不為文章不喜談議王甚重之夏六月壬戌王至建康傅亮諷晉恭帝禪位於宋具詔草呈帝使書之帝欣然操筆謂左右曰桓𤣥之時晉氏已無天下重為劉公所延將二十載今日之事本所甘心遂書赤紙為詔甲子帝遜于琅邪第百官拜辭秘書監徐廣流涕哀慟丁卯王為壇於南郊即皇帝位禮畢自石頭備灋駕入建康宫徐廣又悲感流涕侍中謝晦謂之曰徐公得無少過廣曰君為宋朝佐命身是晉室遺老悲歡之事固不可同廣邈之弟也帝臨太極殿大赦改元其犯鄉論清議一皆蕩滌與之更始裴子野論曰昔重華受終四凶流放武王克殷頑民遷洛天下之惡一也鄉論清議除之過矣奉晉恭帝為零陵王優崇之禮皆倣晉初故事即宫于故秣陵縣使冠軍將軍劉遵考將兵防衛降禇后為王妃追尊皇考為孝穆皇帝皇妣趙氏為孝穆皇后尊王太后蕭氏為皇太后上事蕭太后素謹及即位春秋已髙每旦入朝太后未甞失時刻詔晉氏封爵當隨運改獨置始興廬陵始安長沙康樂五公降爵為縣公及縣侯以奉王導謝安温嶠陶侃謝𤣥之祀其宣力義熈豫同艱難者一仍本秩庚午以司空道憐為太尉封長沙王追封司徒道規為臨川王以道憐子義慶襲其爵其餘功臣徐羡之等増位進爵各有差追封穆之為南康郡公王鎮惡為龍陽縣侯上每嘆念穆之曰穆之不死當助我治天下可謂人之云亡邦國殄瘁又曰穆之死人輕易我立皇子桂陽公義真為廬陵王彭城公義隆為宜都王義康為彭城王己卯改泰始厯為永初厯秋八月辛未追謚妃臧氏為敬皇后立王太子義符為皇太子二年初帝以毒酒一􅑥授前琅邪郎中令張偉使酖零陵偉嘆曰酖君以求生不如死乃於道自飲而卒偉邵之兄也太常禇秀之侍中禇淡之皆王之妃兄也王毎生男帝輙令秀之兄弟方便殺之王自遜位深慮禍及與妃嬪共處一室自煑食於牀前飲食所資皆出禇妃故宋人莫得伺其隙九月帝令淡之與兄右衛將軍叔度徃視妃妃出就别室相見兵人踰垣而入進藥於王王不肯飲曰佛教自殺者不復得人身兵人以被掩殺之帝帥百官臨于朝堂三日元魏冦宋晉安帝義熈十三年夏五月乙未齊郡太守王懿降于魏上書言劉裕在洛宜發兵絶其歸路可不戰而克魏主嗣善之崔浩侍講在前嗣問之曰劉裕伐姚泓果能克乎對曰克之嗣曰何故對曰昔姚興好事虚名而少實用子泓懦而多病兄弟乖争裕乗其危兵精將勇何故不克嗣曰裕才何如慕容垂對曰勝之垂藉父兄之資修復舊業國人歸之若夜蟲之就火少加倚仗易以立功劉裕奮起寒微不階尺土討滅桓𤣥興復晉室北禽慕容超南梟盧循所向無前非其才之過人安能如是乎嗣曰裕既入闗不能進退我以精騎直𢷬彭城夀春裕將若之何對曰今西有屈丏北有柔然窺伺國隙陛下既不可親御六師雖有精兵未睹良將長孫嵩長於治國短於用兵非劉裕敵也興兵逺攻未見其利不如且安静以待之裕克秦而歸必簒其主關中華戎錯雜風俗勁悍裕欲以荆楊之化施之函秦此無異觧衣包火張羅捕虎雖留兵守之人情未洽趨尚不同適足為冦敵之資耳願陛下按兵息民以觀其變秦地終為國家之有可坐而守也嗣笑曰卿料之審矣浩曰臣嘗私論近世將相之臣若王猛之治國符堅之管仲也慕容恪之輔幼主慕容暐之霍光也劉裕之平禍亂司馬徳宗之曹操也嗣曰屈丏何如浩曰屈丏國破家覆孤孑一身寄食姚氏受其封殖不思醻恩報義而乗時徼利盗有一方結怨四鄰撅䜿小人雖能縱暴一時終當為人所吞食耳嗣大恱語至夜半賜浩御縹醪十觚水精鹽一兩曰朕味卿言如此鹽酒故欲與卿共饗其羙然猶命長孫嵩叔孫建各簡精兵伺裕西過自成臯濟河南侵彭沛若不時過則引兵隨之宋髙祖永初三年初魏主聞髙祖克長安大懼遣使請和自是毎嵗交聘不絶及髙祖殂殿中將軍沈範等奉使在魏還及河魏主遣人追執之議發兵取洛陽虎牢滑臺崔浩諌曰陛下不以劉裕歘起納其使貢裕亦敬事陛下不幸今死遽乗䘮伐之雖得之不足為羙且國家今日亦未能一舉取江南也而徒有伐䘮之名竊為陛下不取臣謂宜遣人弔祭存其孤弱恤其凶災使義聲布于天下則江南不攻自服矣况裕新死黨與未離兵臨其境必相帥拒戰功不可必不如緩之待其彊臣争權變難必起然後命將出師可以兵不疲勞坐收淮北也魏主曰劉裕乗姚興之死而滅之今我乗裕䘮而伐何為不可浩曰不然姚興死諸子交争故裕乗釁伐之今江南無釁不可比也魏主不從假司空奚斤節加晉兵大將軍行揚州刺史使督宋兵將軍交州刺史周幾呉兵將軍廣州刺史公孫表同入冦冬十月魏軍將發公卿集議於監國之前以先攻城與先略地奚斤欲先攻城崔浩曰南人長于守城若符氏攻襄陽經年不拔今以大兵坐攻小城若不時克挫傷軍勢敵得徐嚴而来我怠彼銳此危道也不如分軍略地至淮為限列置守宰收歛租榖則洛陽滑臺虎牢更在軍北絶望南救必㳂河東走不則為囿中之物何憂其不獲也公孫表固請攻城魏主從之於是奚斤等帥歩騎二萬濟河營於滑臺之東時司州刺史毛徳祖戍虎牢東郡太守王景度告急於徳祖徳祖遣司馬翟廣等將歩騎三千救之先是司馬楚之聚衆在陳留之境聞魏兵濟河遣使迎降魏以楚之為征南將軍荆州刺史使侵擾北境徳祖遣長社令王法政將五百人戍邵陵將軍劉憐將二百騎戍雍丘以備之楚之引兵襲憐不克㑹臺送軍資憐出迎之酸棗民王玉馳以告魏丁酉魏尚書滑稽引兵襲倉垣兵吏悉踰城走陳留太守馮翊嚴稜詣斤降魏以王玉為陳留太守給兵守倉垣奚斤等攻滑臺不拔求益兵魏主怒切責之壬辰自將諸國兵五萬餘人南出天關踰恒嶺為斤等聲援十一月魏太子燾將兵出屯塞上使安定王彌與安同居守庚戌奚斤等急攻滑臺拔之王景度出走景度司馬陽瓉為魏所執不降而死魏主以成臯侯茍兒為兖州刺史鎮滑臺斤等進擊翟廣等於土樓破之乗勝進逼虎牢毛徳祖與戰屢破之魏主别遣黒矟將軍于栗磾將三千人屯河陽謀取金墉徳祖遣振威將軍竇晃等縁河拒之十二月丙戌魏主至冀州遣楚兵將軍徐州刺史叔孫建將兵自平原濟河徇青兖豫州刺史劉粹遣治中髙道瑾將歩騎五百據項城徐州刺史王仲徳將兵屯湖陸于栗磾濟河與奚斤并力攻竇晃等破之魏主遣中領軍代人娥清期思侯柔然閭大肥將兵七千人㑹周幾叔孫建南渡河軍於碻磝癸未兖州刺史徐琰棄尹卯南走於是泰山髙平金鄉等郡皆沒於魏叔孫建等東入青州司馬愛之季之先聚衆於濟東皆降于魏戊子魏兵逼虎牢青州刺史東莞竺䕫鎮東陽城遣使告急己丑詔南兖州刺史檀道濟監征討諸軍事與王仲徳共救之廬陵王義真遣龍驤將軍沈叔狸將三千人就劉粹量宜赴援營陽王景平元年春正月魏于栗磾攻金墉癸卯河南太守王㳙之棄城走魏主以栗磾為豫州刺史鎮洛陽庚申檀道濟軍于彭城魏叔孫建入臨淄所向城邑皆潰竺䕫聚民保東陽城其不入城者使各依據山險芟夷禾稼魏軍至無所得食濟南太守垣苗帥衆依䕫刁雍見魏主於鄴魏主曰叔孫建等入青州民皆藏避攻城不下彼素服卿威信今遣卿助之乃以雍為青州刺史給雍騎使行募兵以取青州魏兵濟河向青州者凡六萬騎刁雍募兵得五千人撫慰士民皆送租供軍三月魏奚斤公孫表等共攻虎牢魏主自鄴遣兵助之毛徳祖於城内穴地入七丈分為六道出魏圍外募敢死之士四百人使參軍范道基等帥之從六中出掩襲其後魏兵驚擾斬首數百級焚其攻具而還魏兵雖退散随復更合攻之益急奚斤自虎牢將歩騎三千攻頴川太守李元徳等於許昌元徳等敗走魏以頴川人庾龍為頴川太守戍許昌毛徳祖出兵與公孫表大戰從朝至晡殺魏兵數百㑹奚斤自許昌還合擊徳祖大破之亡甲士千餘人復嬰城自守魏主又遣萬餘人從白沙渡河屯濮陽南朝議以項城去魏不逺非輕軍所抗使劉粹召髙道瑾還夀陽若沈叔狸已進亦宜且退粹奏魏攻虎牢未復南向若遽攝軍捨項城則淮西諸郡無所慿依沈叔狸已􅉐肥口又不宜遽退時李元徳帥散卒二百至項劉粹使助髙道瑾戍守請宥其犇敗之罪朝議並許之乙巳魏主畋於韓陵山遂如汲郡至枋頭初毛徳在北與公孫表有舊表有權略徳祖患之乃與交通音問密遣人説奚斤云表與之連謀毎答表書輙多所治定表以書示斤斤疑之以告魏主先是表與太史令王亮少同營署好輕侮亮亮奏表置軍虎牢東不得便地故令賊不時滅魏主素好術數以為然積前後忿使人夜就帳中縊殺之乙卯魏主濟自靈昌津遂如東郡陳留叔孫建將三萬騎逼東陽城城中文武纔一千五百人竺䕫垣苗悉力固守時出竒兵擊魏破之魏歩騎繞城列陳千餘里大治攻具䕫作四重塹魏人填其三重為撞車以攻城䕫遣人從地道中出以大麻絙挽之令折魏人復作長圍進攻逾急歴時寖久城轉隨壊戰士多死傷餘衆困乏旦暮且䧟檀道濟至彭城以司青二州並急而所領兵少不足分赴青州道近竺䕫兵弱乃與王仲徳兼行先救之甲子劉粹遣李元徳襲許昌斬庾龍元徳因留綏撫并上租糧魏主至盟津于栗磾造浮橋於治阪津乙丑魏主引兵北濟西如河内娥清周幾閭大肥徇地至湖陸髙平民屯聚而射之清等盡攻破髙平諸縣滅數千家擄掠萬餘口兖州刺史鄭順之戍湖陸以兵少不敢出魏主又遣并州刺史伊樓拔助奚斤攻虎牢毛徳祖隨方抗拒頗殺魏兵而將士稍零落夏四月丁卯魏主如成臯絶虎牢汲河之路停三日自督衆攻城竟不能下遂如洛陽觀石經遣使祀嵩髙叔孫建攻東陽堕其城北三十許歩刁雍請速入建不許遂不克及聞檀道濟等將至雍又謂建曰賊畏官軍突騎以鎻連車為函陳大峴以南處處狹隘車不得方軌雍請將所募兵五千據險以邀之破之必矣時天暑魏軍多疫建曰兵人疫病過半若相持不休兵自死盡何須復戰今全軍而返計之上也己巳道濟軍于臨朐壬申建等燒營及器械而遁道濟至東陽糧盡不能追竺䕫以東陽城壊不可守移鎮不其城叔孫建自東陽趨滑臺道濟分遣王仲徳向尹卯道濟停軍湖陸仲徳未至尹卯聞魏兵已逺還就道濟刁雍遂留鎮尹卯招集譙梁彭沛民五千餘家置二十七營以領之閏四月丁未魏主如河内豋太行至髙都叔孫建自滑臺西就奚斤共攻虎牢虎牢被圍二百日無日不戰勁兵戰死殆盡而魏増兵轉多魏人毁其外城毛徳祖於其内更築三重城以拒之魏人又毁其二重徳祖唯保一城晝夜相拒將士眼皆生創徳祖撫之以恩終無離心時檀道濟軍湖陸劉粹軍項城沈叔狸軍髙橋皆畏魏兵彊不敢進丁巳魏人作地道以洩虎牢城中井井深四十丈山勢峻峭不可得防城中人馬渇乏被創者不復出血重以饑疫魏仍急攻之已未城䧟將士欲扶徳祖出走徳祖曰我誓與此城俱斃義不使城亡而身存也魏主命將士得徳祖者必生致之將軍代人豆代田執徳祖以獻將佐在城中者皆為魏所擄唯參軍范道基將二百人突圍南還魏士卒疫死者亦什二三奚斤等悉定司兖豫諸郡縣置守宰以撫之魏主命周幾鎮河南河南人安之徐羡之傅亮謝晦以亡失境土上表自劾詔勿問五月魏主還平城秋九月乙亥魏主還宫召奚斤還平城留兵守虎牢使娥清周幾鎮枋頭以司馬楚之所將戸口置汝南南陽南􅉐新置四郡以益豫州冬十一月魏周幾冦許昌許昌潰潁川太守李元徳犇項戊辰魏人圍汝陽太守王公度亦犇項劉粹遣其將姚聳夫等將兵助守項城魏人夷許昌城毁鍾城以立封疆而還徐傅廢立宋髙祖永初元年秋八月癸酉立王太子義符為皇太子三年春三月上不豫太尉長沙王道憐司空徐羡之尚書僕射傅亮領軍將軍謝晦䕶軍將軍檀道濟並入侍醫藥羣臣請祈禱神袛上不許唯使侍中謝方明以疾告宗廟而已上性不信竒怪微時多符瑞及貴史官審以所聞上拒而不答檀道濟出為鎮北將軍南兖州刺史鎮廣陵悉監淮南諸軍皇太子多狎羣小謝晦言於上曰陛下春秋既髙宜思存萬世神器至重不可使負荷非才上曰廬陵何如晦曰臣請觀焉出造廬陵王義真義真盛欲與談晦不甚答晦還曰徳輕於才非人主也丁未出義真為都督南豫豫雍司秦并六州諸軍事車騎將軍開府儀同三司南豫州刺史五月帝疾甚召太子誡之曰檀道濟雖有幹略而無逺志非如兄韶有難御之氣也徐羡之傅亮當無異圗謝晦數從征伐頗識機變若有同異必此人也又為手詔曰後世若有幼主朝事一委宰相母后不煩臨朝司空徐羡之中書令傅亮領軍將軍謝晦鎮北將軍檀道濟同被顧命癸亥帝殂于西殿太子即皇帝位年十七大赦尊皇太后曰太皇太后立妃司馬氏為皇后文帝元嘉元年營陽王居䘮無禮好與左右狎暱逰戲無度特進致仕范泰上封事曰伏聞陛下時在後園頗習武備鼓鞞在宫聲聞于外黷武掖庭之内諠譁省闥之間非徒不足以威四夷祗生逺近之怪陛下踐祚委政宰臣實同髙宗諒闇之義而更親狎小人懼非社稷至計經世之道也不聼南豫州刺史廬陵王義真警悟愛文義而性輕易與太子左衛率謝靈運員外常侍顔延之慧琳道人情好欵密甞云得志之日以靈運延之為宰相慧琳為西豫州都督靈運性褊傲不遵法度自負才能宜參權要常懐憤邑延之嗜酒放縱徐羡之等惡義真與靈運等逰於是羡之等以為靈運延之構扇異同非毁執政出靈運為永嘉太守延之為始安太守義真至歴陽多所求索執政每裁量不盡與義真深怨之數有不平之言又表求還都諮議參軍何尚之屢諌不聼時羡之等已密謀廢帝而次立者應在義真乃因義真與帝有隙先奏列其罪惡廢為庶人徙新安郡前吉陽令堂邑張約之上疏曰廬陵王少䝉先皇優慈之遇長受陛下睦愛之恩故在心必言所懐必亮容犯臣子之道致招驕恣之愆至於天姿夙成實有卓然之羙宜在容飬錄善掩瑕訓盡義方進退以漸今猥加剥辱幽徙逺郡上傷陛下棠棣之篤下令逺近恇然失圖臣伏思大宋開基造次根條未繁宜廣樹藩戚敦睦以道人誰無過貴能自新以武皇之愛子陛下之懿弟豈可以其一𤯝長致淪棄哉書奏以約之為梁州府參軍尋殺之夏四月徐羡之等以南兖州刺史檀道濟先朝舊將威服殿省具有兵衆乃召道濟及江州刺史王𢎞入朝五月皆至建康以廢立之謀告之甲申謝晦以領軍府屋敗悉令家人出外聚將士於府内又使中書令龍舟安泰潘盛為内應夜邀檀道濟同宿晦竦動不得眠道濟就寝便熟晦以此服之時帝於華林園為列肆親自沽賣又與左右引船為樂夕逰天淵池即龍舟而寝乙酉詰旦道濟引兵居前羡之等繼其後入自雲龍門安泰等先誡宿衛莫有禦者帝未興軍士進殺二侍者傷帝指扶出東閤收璽綬羣臣拜辭衛送故太子宫侍中程道惠勸羡之等立皇弟南豫州刺史義恭羡之等以宜都王義隆素有令望又多符瑞乃稱皇太后令數帝過惡廢為營陽王以宜都王纂承大統赦死罪以下又稱皇太后令奉還璽綬并廢皇后為營陽王妃遷營陽王於呉使檀道濟入守朝堂王至呉止金昌亭六月癸丑羡之等使邢安泰就弑之王多力突走出昌門追者以門關踣而弑之裴子野論曰古者人君飬子能言而師授之辭能行而傅相之禮宋之教誨雅異於斯居中則任僕妾處外則近趨走太子皇子有師有侍是二職者皆臺皁也制其行止授其法則導達臧否罔弗由之言不及於禮義識不達於今古謹敕者能勸之以吝嗇狂愚者或誘之以凶慝雖有師傅多以耆艾大夫為之雖有友及文學多以膏梁年少為之具位而已亦弗與逰幼王臨州長史行事宣傳教命又有符䜟徃徃専恣竊弄威權是以本枝雖茂而端士微寡嗣君冲幼世繼姦回雖惡物醜類天然自出然習則生常其流逺矣降及太宗舉天下而棄之亦昵比之為也嗚呼有國有家其鑑之矣傅亮帥行臺百官奉法駕迎宜都王于江陵祠部尚書蔡廓至尋陽遇疾不堪前亮與之别廓曰營陽在呉宜厚加供奉一旦不幸卿諸人有弑主之名欲立於世將可得邪時亮已與羡之議害營陽王乃馳信止之不及羡之大怒曰與人共計議如何旋背即賣惡於人邪羡之等又遣使者殺前廬陵王義真於新安羡之以荆州地重恐宜都王至或别用人乃亟以錄命除領軍將軍謝晦行都督荆湘等七州諸軍事荆州刺史欲令居外為援精兵舊將悉以配之秋七月行臺至江陵立行門於城南題曰大司馬門傅亮帥百僚詣門上表進璽紱儀物甚盛宜都王時年十八下教曰猥以不徳謬降大命顧已兢悸何以克堪輙當暫歸朝廷展哀陵寢并與賢彦申寫所懐望體其心勿為辭責府州佐史並稱臣請題榜諸門一依宫省王皆不許教州府國綱紀宥其統内見刑原逋責諸將佐聞營陽廬陵王死皆以為疑勸王不可東下司馬王華曰先帝有大功於天下四海所服雖嗣主不綱人望未改徐羡之中才寒士傅亮布衣諸生非有晉宣帝王大將軍之心明矣受寄崇重未容遽敢背徳畏廬陵嚴㫁將来必不自容以殿下寛叡慈仁逺近所知且越次奉迎冀以見徳悠悠之論殆必不然又羡之等五人同功並位孰肯相譲就懐不軌勢必不行廢主若存慮其將来受禍致此殺害盖由貪生過深寕敢一朝􅉐懐逆志不過欲握權自固以少主仰待耳殿下但當長驅六轡以副天人之心王曰卿復欲為宋昌邪長史王曇首南蠻校尉劉彦之皆勸王行曇首仍陳天人符應王乃曰諸公受遺不容背義且勞臣舊將内外充滿今兵力又足以制物夫何所疑乃命王華揔後任留鎮荆州王欲使劉彦之將兵前驅彦之曰了彼不反便應朝服順流若使有虞此師既不足恃更開嫌隙之端非所以副逺邇之望也㑹雍州刺史禇叔度卒乃遣彥之權鎮㐮陽甲戌王發江陵引見傅亮號泣哀動左右既而問義真及少帝薨廢本末悲哭嗚咽侍側者莫能仰視亮流汗沾背不能對乃布腹心於到彦之王華等深自結納王以府州文武嚴兵自衛臺所遣百官衆力不得近部伍中兵參軍朱容子抱刀處王所乗舟戸外不觧帶者累旬八月丙申宜都王至建康羣臣迎拜於新亭徐羡之問傅亮曰王可方誰亮曰晉文帝以上人羡之曰必能明我赤心亮曰不然丁酉王謁初寕陵還止中堂百官奉璽綬王辭譲數四乃受之即皇帝位于中堂備法駕入宫御太極前殿大赦改元文武賜位二等戊戌謁太廟詔復廬陵王先封迎其柩及孫修華謝妃還建康庚子以行荆州刺史謝晦為真晦將行與蔡廓别屏人問曰吾其免乎廓曰卿受先帝顧命任以社稷廢昬立明義無不可但殺人二兄而以之北靣挾震主之威據上流之重以古推今自免為難晦始懼不得去既發顧望石頭城喜曰今得脫矣癸卯徐羡之進位司徒王𢎞進位司空傅亮加開府儀同三司謝晦進號衛將軍檀道濟進號征北將軍有司奏車駕依故事臨華林園聼訟詔曰政刑多所未悉可如先者二公推訊帝以王曇首王華為侍中曇首領右衛將軍華領驍騎將軍朱容子為右軍將軍甲辰徐羡之等欲即以到彦之為雍州帝不許徴彥之為中領軍委以戎政彦之自襄陽南下謝晦已至鎮慮彦之不過已彥之至揚口歩徃江陵深布誠欵晦亦厚自結納彦之留馬及利劒名刀以與晦晦由此大安二年春正月徐羡之傅亮上表歸政表三上帝乃許之丙寅始親萬機羡之仍遜位還第徐珮之程道惠及呉興太守王韶之等並謂非宜敦勸甚苦乃復奉詔視事秋八月王𢎞自以始不預定䇿不受司空表譲彌年乃許之十一月初㑹稽孔寗子為帝鎮西諮議參軍及即位以寗子為歩兵校尉與侍中王華並有富貴之願疾羡之傅亮専權日夜構之於帝㑹謝晦二女當適彭城王義康新野侯義賔遣其妻曹氏及長子世休送女至建康帝欲誅羡之亮并發兵討晦聲言當伐魏取河南又言拜京陵治行装艦亮與晦書曰薄伐河朔事猶未已朝野之慮憂懼者多又言朝士多諌北征上當遣外監萬幼宗徃相諮訪時朝廷處分異常其謀頗泄三年春正月謝晦弟黄門侍郎㬭馳使告晦晦猶謂不然以𫝊亮書示諮議參軍何承天曰計幼宗一二日必至傅公慮我好事故先遣此書承天曰外間所聞咸謂西討已定幼宗豈有上理晦尚謂虚妄使承天豫立答詔啓草言伐魏宜須明年江夏内史程道惠得尋陽人書言朝廷將有大處分其事已審使其輔國府中兵參軍樂冏封以示晦晦問承天曰若果爾卿令我云何對曰䝉將軍殊顧常思報徳事變至矣何敢隠情然明日戒嚴動用軍灋區區所懐懼不得盡晦懼曰卿豈欲我自裁邪承天曰尚未至此以王者之重舉天下以攻一州大小既殊逆順又異境外求全上計也其次以腹心將兵屯義陽將軍自帥大衆戰於夏口若敗即趨義陽以出北境其次也晦良久曰荆州用武之地兵糧易給聊且决戰走復何晚乃使承天造立表檄又與衛軍諮議參軍琅邪顔邵謀舉兵邵飲藥而死晦立幡戒嚴謂司馬庾登之曰今當自下欲屈卿以三千人守城備禦劉粹豋之曰下官親老在都又素無部衆情計二三不敢受此言晦仍問諸將佐戰士三千足守城否南蠻司馬周超對曰非徒守城而已若有外冦可以立功登之因曰超必能辦下官請觧司馬南郡以授之晦即於坐命超為司馬領南義陽太守轉登之為長史南郡如故帝以王𢎞檀道濟始不預廢弑之謀𢎞弟曇首又為帝所親委事將發密使報𢎞且召道濟欲使討晦王華等皆以為不可帝曰道濟止於脅從本非創謀殺害之事又所不關吾撫而使之必將無慮乙丑道濟至建康丙寅下詔暴羡之亮晦殺營陽王廬陵王之罪命有司誅之且曰晦據有上流或不即罪朕當親帥六師為其過防可遣中領軍到彦之即日電發征北將軍檀道濟駱驛犇路符衛軍府州以時收翦已命雍州刺史劉粹等㫁其走伏罪止元凶餘無所問是日詔召羡之亮羡之行至西明門外謝㬭正直遣報亮云殿内有異處分亮辭以嫂病暫還遣信報羡之羡之還西州乗内人問訊車出郭歩走至新林入陶竈中自經死亮乗車出郭門乗馬犇兄廸墓屯騎校尉郭泓收之至廣莫門上遣中書舍人以詔書示亮并謂曰以公江陵之誠當使諸子無恙亮讀詔書訖曰亮受先帝布衣之眷遂䝉顧託黜昬立明社稷之計也欲加之罪其無辭乎於是誅亮而徙其妻子於建安誅羡之二子而宥其兄子珮之又誅晦子世休收繫謝㬭帝將討謝晦問䇿於檀道濟對曰臣昔與晦同從北征入關十䇿晦有其九才略明練殆為少敵然未甞孤軍决勝戎事恐非其長臣悉晦智晦悉臣勇今奉王命而討之可未陳而擒也丁卯徴王𢎞為侍中司徒錄尚書事揚州刺史以彭城王義康為都督荆湘等八州諸軍事荆州刺史樂冏復遣使告謝晦以徐傅及㬭等已誅晦先舉羡之亮哀次發子弟凶問既而自出射堂勒兵晦從髙祖征討指麾處分莫不曲盡其宜數日間四逺投集得精兵三萬人乃奉表稱羡之亮等忠貞横被寃酷且言臣等若志欲執權不専為國初廢營陽陛下在逺武皇之子尚有童幼擁以號令誰敢非之豈得泝流三千里虚館七旬仰望鸞旗者哉故廬陵王於營陽之世積怨犯上自貽非命不有所廢將何以興耿弇不以賊遺君父臣亦何負於宋室邪此皆王𢎞王曇首王華險躁猜忌讒構成禍今當舉兵以除君側之惡帝下詔戒嚴大赦諸軍相次進路以討謝晦晦以弟遯為竟陵内史將萬人揔留任帥衆二萬發江陵列舟艦自江津至于破冢旌旗蔽日歎曰恨不得以此為勤王之師二月庚申上發建康命王𢎞與彭城王義康居守入居中書下省侍中殷景仁參掌留任帝姊㑹稽公主留止臺内揔攝六宫謝晦自江陵東下何承天留府不從晦至江口到彥之已至彭城洲庾登之據巴陵畏懦不敢進㑹霖雨連日參軍劉和之曰彼此各有雨耳檀征北尋至東軍方彊唯宜速戰登之恇怯使小將陳祐作大嚢貯茅懸於帆檣云可以焚艦用火宜須晴以緩戰期晦然之停車十五日乃使中兵參軍孔延秀攻將軍蕭欣於彭城洲破之又攻洲口柵䧟之諸將咸欲退還夏口到彦之不可乃保隠圻晦又上表自訟且自矜其㨗曰陛下若梟四凶於廟庭懸三監於絳闕臣便勒衆旋旗還保所任初晦與徐羡之傅亮為自全之計以為晦據上流而檀道濟鎮廣陵各有彊兵足以制朝廷羡之亮居中秉權可得持久及聞道濟帥衆来晦惶懼無計道濟既至與到彦之軍合牽艦縁岸晦始見艦數不多輕之不即出戰至晚因風帆上前後連咽西人離沮無復鬬心戊辰臺軍至忌置洲尾列艦過江晦軍一時皆潰晦夜出投巴陵得小船還江陵先是帝遣雍州刺史劉粹自陸道帥歩騎襲江陵至沙橋周超帥萬餘人逆戰大破之士衆傷死者過半俄而晦敗問至初晦與粹善以粹子曠之為參軍帝疑之王𢎞曰粹無私必無憂也及受命南討一無所顧帝以此嘉之晦亦不殺曠之遣還粹所丙子帝自蕪湖東還晦至江陵無它處分惟愧謝周超而已其夜超捨軍單舸詣到彦之降晦衆散略盡乃携其弟遯等七騎北走遯肥壮不能乗馬晦毎待之行不得速己卯至安陸延頭為戍主光順之所執檻送建康到彦之至馬頭何承天自歸彦之因監荆州府事以周超為參軍劉粹以沙橋之敗告乃執之於是誅晦㬭遯及其兄弟之子并同黨孔延秀周超等晦女彭城王妃被髪徒跣與晦訣曰大丈夫當横尸戰場奈何狼藉都市庾登之以無任免官禁錮何承天及南蠻行參軍新興王𤣥謨等皆見原三月辛巳帝還建康徴謝靈運為祕書監顔延之為中書侍郎賞遇甚厚夏五月乙未以檀道濟為征南大將軍開府儀同三司江州刺史到彥之為南豫州刺史彭城王専政宋髙祖永初元年夏六月立皇子義康為彭城王文帝元嘉五年春正月荆州刺史彭城王義康性聰察在州職事修治左光祿大夫范泰謂司徒王𢎞曰天下事重權要難居卿兄弟盛滿當深存降挹彭城王帝之次弟宜徴還入朝共參朝政𢎞納其言時大旱疾疫𢎞上表引咎遜位帝不許六年春正月王𢎞上表乞觧州錄以授彭城王義康帝優詔不許癸丑以義康為侍中都督揚南徐兖三州諸軍事司徒錄尚書事領南徐州刺史𢎞與義康二府並置佐領兵共輔朝政𢎞既多疾且欲委逺大權毎事推讓義康由是義康専揔内外之務七年彭城王義康與王𢎞並錄尚書義康意猶怏怏欲得揚州形於辭㫖以𢎞弟曇首居中為上所親委愈不恱𢎞以老病屢乞骸骨曇首自求呉郡上皆不許義康謂人曰王公久病不起神州詎宜卧治曇首勸𢎞減府中文武之半以授義康上聼割二千人義康乃恱九年夏六月戊寅司徒南徐州刺史彭城王義康改領揚州刺史十二年春三月領軍將軍劉湛與僕射殷景仁素善湛之入也景仁實引之湛既至以景仁位遇本不踰已而一旦居前意甚憤憤俱被時遇以景仁専管内任謂為間已猜隙漸生知帝信仗景仁不可移奪時司徒義康専秉朝權湛甞為義康上佐遂委心自結欲因宰相之力以回上意傾黜景仁獨當時務夏四月己巳帝加景仁中書令中䕶軍即家為府湛加太子詹事湛愈憤怒使義康毁景仁於帝帝遇之益隆景仁對親舊嘆曰引之令入入便噬人乃稱疾觧職表疏累上帝不許使停家飬病湛議遣人若劫盗者於外殺之以為帝雖知當有以觧之不能傷義康至親之愛帝微聞之遷䕶軍府於西掖門外使近宫禁故湛謀不行義康僚属及諸附麗湛者潜相約勒無敢歴殷氏之門彭城王主簿沛郡劉敬文父成未悟其機詣景仁求郡敬文遽徃謝湛曰老父悖耄遂就殷鐡干祿由敬文闇淺上負生成闔門慙懼無地自處唯後將軍司馬庾炳之逰二人之間皆得其歡心而密輸忠於朝廷景仁卧家不朝謁帝常使炳之銜命徃来湛不疑也炳之登之之弟也十二年春二月司空江州刺史永修公檀道濟立功前朝威名甚重左右腹心竝經百戰諸子又有才氣朝廷疑畏之帝久疾不愈劉湛説司徒義康以為宫車一日晏駕道濟不復可制㑹帝疾篤義康言於帝召道濟入朝其妻向氏謂道濟曰髙立之勲自古所忌今無事相召禍其至矣既至留之累月帝稍間將遣還已下渚未發㑹帝疾動義康矯詔召道濟入祖道因執之三月己未下詔稱道濟潜散金貨招誘剽猾因朕寝疾規肆禍心收付廷尉并其子給事黄門侍郎植等十一人誅之唯宥其孫孺又殺司空參軍薛彤髙進之二人皆道濟腹心有勇力時人比之關張道濟見收憤怒目光如炬脱幘投地曰乃壊汝萬里長城魏人聞之喜曰道濟死呉子輩不足復憚庚申大赦以中軍將軍南譙王義宣為江州刺史十六年春正月庚寅司徒義康進位大將軍領司徒南兖州刺史江夏王義恭進位司空十七年司徒義康専揔朝權上羸疾積年心勞輙發屢至危殆義康盡心營奉藥食非口所親甞不進或連夕不寐内外衆事皆専决施行性好吏職紏剔文案莫不精盡上由是多委以事凡所陳奏入無不可方伯以下竝令義康選用生殺大事或以錄命㫁之勢傾逺近朝野輻輳毎旦府門常有車數百乗義康傾身引接未甞懈倦復能彊記耳目所經終身不忘好於稠人廣席標題所憶以示聰明士之幹練者多被意遇嘗謂劉湛曰王敬𢎞王球之屬竟何所堪坐取富貴復那可觧然素無學術不識大體朝士有才用者皆引入己府府僚無施及忤㫖者乃斥為臺官自謂兄弟至親不復存君臣形迹率心而行曽無猜防私置僮六千餘人不以言臺四方獻饋皆以上品薦義康而以次者供御上嘗冬月噉甘歎其形味並劣義康曰今年甘殊有佳者遣人還東府取甘大供御者三寸領軍劉湛與僕射殷景仁有隙湛欲倚義康之重以傾之義康權勢已盛湛愈推崇之無復人臣之禮上寖不能平湛初入朝上恩禮甚厚湛善論治道諳前代故事叙致銓理聼者忘疲毎入雲龍門御者即觧駕左右及羽儀随意分散不夕不出以此為常及晚節驅煽義康上意雖内離而接遇不改甞謂所親曰劉班初自西還宫與語常視日早晚慮其將去比入吾亦視日早晚苦其不去殷景仁密言於上曰相王權重非社稷計宜少加裁抑上隂然之司徒左長史劉斌湛之宗也大將軍從事中郎王履謐之孫也及主簿劉敬文祭酒魯郡孔𦙍秀皆以傾謟有寵於義康見上多疾皆謂宫車一日晏駕宜立長君上甞疾篤使義康具顧命詔義康還省流涕以告湛及景仁湛曰天下艱難詎是幼主所御義康景仁並不答而𦙍秀等輙就尚書議曹索晉咸康末立康帝舊事義康不知也及上疾瘳微聞之而斌等密謀欲使大業終歸義康遂邀結朋黨伺察禁省有不與己同者必百方構䧟之又採拾景仁短長或虚造異同以告湛自是主相之勢分矣義康欲以劉斌為丹陽尹言次啓上陳其家貧言未卒上曰以為呉郡後㑹稽太守羊𤣥保求還義康又欲以斌代之啟上曰羊𤣥保欲還不審以誰為㑹稽上時未有所議倉猝曰我巳用王鴻自去年秋上不復徃東府五月癸巳劉湛遭母憂去職湛自知罪釁已彰無復全地謂所親曰今年必敗常曰正頼口舌争之故得推遷耳今既窮毒無復此望禍至其能久乎上以司徒彭城王義康嫌隙已著將成禍亂冬十月戊申收劉湛付廷尉下詔暴其罪惡就獄誅之并誅其子黯亮儼及其黨劉斌劉敬文孔𦙍秀等八人徙尚書庫部郎何黙子等五人於廣州因大赦是日敕義康入宿留止中書省其夕分收湛青等州刺史杜驥勒兵殿内以備非常遣人宣㫖告義康以湛等罪状義康上表遜位詔以義康為江州刺史侍中大將軍如故出鎮豫章初殷景仁卧疾五年雖不見上而密函去来日以十數朝政大小必以咨之形迹周密莫有窺其際者收湛之日景仁使拂拭衣冠左右皆不曉其意其夜上出華林園延賢堂召景仁景仁猶稱脚疾以小牀輿就坐誅討處分一皆委之初檀道濟薦呉興沈慶之忠謹曉兵上使領隊防東掖門劉湛為領軍甞謂之曰卿在省嵗久比當相論慶之正色曰下官在省十年自應得轉不復以此仰累收湛之夕上開門召慶之慶之戎服縛絝而入上曰卿何意乃爾急装慶之曰夜半喚隊主不容緩服上遣慶之收劉斌殺之驍騎將軍徐湛之逵之之子也與義康尤親厚上深銜之義康敗湛之被收罪當死其母㑹稽公主於兄弟為長嫡素為上所禮家事大小必咨而後行髙祖微時常自於新洲伐荻有納布衫襖臧皇后手所作也既貴以付公主曰後世有驕奢不節者可以此衣示之至是公主入宫見上號哭不復施臣妾之禮以錦嚢盛納衣擲地曰汝家本貧賤此是我母與汝父所作今日得一飽餐遽欲殺我兒邪上乃赦之吏部尚書王球履之叔父也以簡淡有羙名為上所重履性進利深結義康及湛球屢戒之不從誅湛之夕履徒跣告球球命左右為取履先温酒與之謂曰常日語汝云何履怖懼不得答球徐曰阿父在汝亦何憂上以球故履得免死廢於家義康方用事人争求親暱唯司徒主簿江湛早能自踈求出為武陵内史檀道濟甞為其子求㛰於湛湛固辭道濟因義康以請之湛拒之愈堅故不染於二公之難上聞而嘉之湛夷之子也彭城王義康停省十餘日見上奉辭便下渚上唯對之慟哭餘無所言上遣沙門慧琳視之義康曰弟子有還理不慧琳曰恨公不讀數百卷書初呉興太守謝述裕之弟也累佐義康數有規益早卒義康將南歎曰昔謝述唯勸吾退劉班唯勸吾進今班存而述死其敗也宜哉上亦曰謝述若存義康必不至此以征虜司馬蕭斌為義康諮議參軍領豫章太守事無大小皆以委之斌摹之之子也使龍驤將軍蕭承之將兵防守義康左右愛念者竝聼随從資奉優厚信賜相係朝廷大事皆報示之久之上就㑹稽公主宴集甚懽主起再拜叩頭悲不自勝上不曉其意自起扶之主曰車子嵗暮必不為陛下所容今特請其命因慟哭上亦流涕指蔣山曰必無此慮若違今誓便是失初寕陵即封所飲酒賜義康并書曰㑹稽姊飲宴憶弟所餘酒今封送故終主之身義康得無恙臣光曰文帝之於義康友愛之情其始非不隆也終於失兄弟之懽虧君臣之義迹其亂階正由劉湛權利之心無有厭已詩云貪人敗類其是之謂乎徴南兖州刺史江夏王義恭為司徒錄尚書事戊寅以臨川王義慶為南兖州刺史冬十一月殷景仁既拜揚州羸疾遂篤上為之敕西州道上不得有車聲癸丑卒十二月癸亥以光祿大夫王球為僕射戊辰以始興王濬為揚州刺史時濬尚幼州事悉委後軍長史范煜主簿沈璞煜泰之子也璞林子之子也煜尋遷左衛將軍以吏部郎沈演之為右衛將軍對掌禁旅又以庾炳之為吏部郎俱參機密演之勁之曾孫也煜有儁才而薄情淺行為士林所鄙性躁競自謂才用不盡常怏怏不得志吏部尚書何尚之言於帝曰范煜志趨異常請出為廣州刺史若在内釁成不得不加鈇鉞鈇鉞亟行非國家之羙也帝曰始誅劉湛復遷范煜人將謂卿等不能容才朕信受讒言但共知其如此無能為害也十八年春正月彭城王義康至豫章辭刺史甲辰以義康都督江交廣三州諸軍事前龍驤參軍巴東扶令育詣闕上表稱昔袁盎諌漢文帝曰淮南王若道路遇霜露死陛下有殺弟之名文帝不用追悔無及彭城王義康先朝之愛子陛下之次弟若有迷謬之愆正可數之以善惡道之以義方奈何信疑似之嫌一旦黜削逺送南垂草萊黔首皆為陛下痛之廬陵徃事足為龜鑑恐義康年窮命盡奄忽于南臣雖微賤竊為陛下羞之陛下徒知惡枝之宜伐豈知伐枝之傷樹伏願亟召義康返于京甸兄弟協和君臣輯睦則四海之望塞多言之路絶矣何必司徒公揚州牧然後可以置彭城王哉若臣所言於國為非請伏重誅以謝陛下表奏即收付建康獄賜死裴子野論曰夫在上為善若雲行雨施萬物受其賜及其惡也若天裂地震萬物所驚駭其誰弗知其誰弗見豈戮一人之身鉗一夫之口所能攘逃所能弭滅哉是不勝其忿怒而有増於疾疹也以太祖之含𢎞尚掩耳於彭城之戮自斯以後誰易由言有宋累葉罕聞直諒豈骨鯁之氣俗愧前古抑時王刑政使之然乎張約隕於權臣扶育斃於哲后宋之鼎鑊吁可畏哉二十二年初魯國孔熈先博學文史兼通數術有縱横才志為員外散騎侍郎不為時所知憤憤不得志父黙之為廣州刺史以贓獲罪大將軍彭城王義康為救觧得免及義康遷豫章熈先密懐報効且以為天文圖䜟帝必以非道晏駕由骨肉相殘江州應出天子以范煜志意不滿欲引與同謀而熈先素不為煜所重太子中舍人謝綜煜之甥也熈先傾身事之綜引熈先與煜相識熈先家饒於財數與煜博故為拙行以物輸之煜既利其財又愛其文藝由是情好欵洽熈先乃從容説煜曰大將軍英㫁聪敏人神攸屬失職南垂天下憤怨小人受先君遺命以死報大將軍之徳頃人情騷動天文舛錯此所謂時運之至不可推移者也若順天人之心結英豪之士表裏相應發於肘腋然後誅除異我崇奉明聖號令天下誰敢不從小人請以七尺之軀三寸之舌立功立事而歸諸吾子丈人以為何如煜甚愕然熈先曰昔毛玠竭節於魏武張温畢議於孫權彼二人者皆國之俊人豈言行玷缺然後至於禍辱哉皆以亷直勁正不得久容丈人之於本朝不深于二主人間雅譽過於兩臣讒夫側目為日久矣比肩競逐庸可遂乎近者殷鐡一言而劉班碎首彼豈父兄之讎百世之怨乎所争不過榮名勢利先後之間耳及其末也唯恐䧟之不深發之不早戮及百口猶曰未厭是可為寒心悼懼豈書籍逺事也哉今建大勲奉賢哲圗難於易以安易危享厚利収鴻名一旦包舉而有之豈可棄置而不取哉煜猶疑未决熈先曰又有過於此者愚則未敢道耳煜曰何謂也熈先曰丈人奕葉清通而不得連姻帝室人以犬豕相遇而丈人曽不恥之欲為之死不亦惑乎煜門無内行故熈先以此激之煜黙然不應反意乃决煜與沈演之並為帝所知煜先至必待演之俱入演之先至甞獨被引􅁮以此為怨煜累經義康府佐中間獲罪於義康謝崇及父述皆為義康所厚綜弟約娶義康女綜為義康記室參軍自豫章還申義康意欲煜求觧晚隙復敦徃好大將軍府史仲承祖有寵於義康聞熈先有謀密相結納丹陽尹徐湛之素為義康所愛承祖因此結事湛之告以密計道人灋略尼法静皆感義康舊恩並與熈先徃来法静妹夫許曜領隊在臺許為内應法静之豫章熈先付以牋書陳説圖䜟於是密相署置及素所不善者並入死目熈先又使弟休先作檄文稱賊臣趙伯符肆兵犯蹕禍流儲宰湛之煜等投命奮戈即日斬伯符首及其黨與今遣䕶軍將軍臧質奉璽綬迎彭城王正位辰極熈先以為舉大事宜須以義康之㫖諭衆煜又詐作義康與湛之書令誅君側之惡宣示同黨帝之燕武帳岡也煜等謀以其日作亂許曜侍帝扣刀目煜煜不敢仰視俄而座散徐湛之恐事不濟密以其謀白帝帝使湛之具探取本末得其檄書選署姓名上之帝乃命有司收掩窮治其夜呼煜置客省先於外收綜及熈先兄弟皆欵服帝遣使詰問煜煜猶隠拒熈先聞之笑曰凡處分符檄書疏皆范所造云何於今方作如此抵蹋邪帝以煜墨迹示之乃具陳本末明日仗士送付廷尉熈先望風吐欵辭氣不撓上竒其才遣人慰勉之曰以卿之才而滯於集書省理應有異志此乃我負卿也又責前吏部尚書何尚之曰使孔熈先年將三十作散騎郎那不作賊熈先於獄中上書謝恩且陳圗䜟深戒上以骨肉之禍曰願且勿遺棄存之中書若囚死之後或可追錄庶九泉之下少塞釁責曄在獄為詩曰雖無嵇生琴庶同夏侯色煜本意謂大獄即死而上窮治其獄遂經二旬煜更有生望獄吏戲之曰外傳詹事或當長繫煜聞之驚喜綜熈先笑之曰詹事疇昔攘袂瞋目躍馬顧盻自以為一世之雄今擾攘紛紜畏死乃爾設令賜以性命人臣圗主何顔可以生存十二月乙未煜綜熈先及其子弟黨與皆伏誅煜母至市涕泣責煜以手擊煜頸煜色不作妹及妓妾来别煜悲涕流漣綜曰舅殊不及夏侯色煜收淚而止謝約不預逆謀見兄綜與熈先逰甞諌之曰此人輕事好竒不近於道果銳無檢未可與狎綜不從而敗綜母以子弟自蹈逆亂獨不出視煜語綜曰姊今不来勝人多矣收籍煜家樂器服玩並皆珍麗妓妾不勝珠翠母居止單陋惟有一厨盛樵薪弟子冬無被叔父單布衣裴子野論曰夫有逸羣之才必思冲天之據盖俗之量則憤常均之下其能守之以道將之以禮殆為鮮乎劉𢎞仁范蔚宗皆忸志而貪權矜才以徇逆累葉風素一朝而隕嚮之所謂智能翻為亡身之具矣徐湛之所陳多不盡為煜等辭所連引上赦不問臧質熹之子也先為徐兖二州刺史與煜厚善煜敗以為義興太守有司奏削彭城王義康爵收付廷尉治罪丁酉詔免義康及其男女皆為庶人絶屬籍徙付安城郡以寕朔將軍沈邵為安城相領兵防守邵璞之兄也義康在安城讀書見淮南厲王長事廢書歎曰自古有此我乃不知得罪為宜也庚戌以前豫州刺史趙伯符為䕶軍將軍伯符孝穆皇后之弟子也二十四年冬十月壬午胡藩之子誕世殺豫章太守桓隆之據郡反欲奉前彭城王義康為主前交州刺史檀和之去官歸過豫章擊斬之二十八年胡誕世之反也江夏王義恭等奏彭城王義康數有怨言揺動民聼故不逞之族因以生心請徙廣州上將徙義康先遣使語之義康曰人生㑹死吾豈愛生必為亂階雖逺何益請死於此恥復屢遷竟未及徃魏師之𤓰歩人情忷懼上慮不逞之人復奉義康為亂太子劭及武陵玉駿尚書左僕射何尚之屢啓宜早為之所上乃遣中書舍人嚴龍齎藥賜義康死義康不肯服曰佛教不許自殺願隨宜處分使者以被揜殺之通鑑紀事本末卷十九上欽定四庫全書通鑑紀事本末卷十九下宋袁樞撰宋文圖恢復宋文帝元嘉七年帝自踐位以来有恢復河南之志三月戊子詔簡甲卒五萬給右將軍到彦之統安北將軍王仲徳兖州刺史竺靈秀舟師入河又使驍騎將軍段宏將精兵八千直指虎牢豫州刺史劉徳武將兵一萬繼進後將軍長沙王義欣將兵三萬監征討諸軍事先遣殿中將軍田竒使於魏告魏主曰河南舊是宋土中為彼所侵今當修復舊境不關河北魏主大怒曰我生髪未燥已聞河南是我地此豈可得必若進兵今當權歛戍相避須冬寒地净河氷堅合自更取之甲午以前南州平太守尹冲為司州刺史長沙王義欣出鎮彭城為衆軍聲援以逰擊將軍胡藩戍廣陵行府州事魏南邊諸將表稱宋人大嚴將入冦請兵三萬先其未發逆擊之足以挫其銳氣使不敢深入因請悉誅河北流民在境上者以絶其鄉導魏主使公卿議之皆以為當然崔浩曰不可南方下濕入夏之後水潦方降草木䝉密地氣鬱蒸易生疾厲不可行師且彼既嚴偹則城守必固留屯久攻則糧運不繼分軍四掠則衆力單寡無以應敵以今擊之未見其利彼若果能北来宜待其勞倦秋凉馬肥因敵取食徐徃擊之此萬全之計也朝廷羣臣及西北守將從陛下征伐西平赫連北破蠕蠕多獲羙女珍寳牛馬成羣南邊諸將聞而慕之亦欲南鈔以取資財皆營私計為國生事不可從也魏主乃止諸將復表南冦已至所部兵少乞簡幽州以南勁兵助己戍守及就漳水造船嚴備以拒之公卿皆以宜如所請并署司馬楚之魯軌韓延之等為將帥使招誘南人浩曰非長䇿也楚之等皆彼所畏忌今聞國家悉發幽州以南精兵大造舟艦隨以輕騎謂國家欲存立司馬氏誅除劉宗必舉國震駭懼於滅亡當悉發精銳并心竭力以死争之則我南邊諸將無以禦之今公卿欲以威力却敵乃所以速之也張虚聲而召實害此之謂矣故楚之之徒徃則彼来止則彼息其勢然也且楚之等皆纎利小才止能招合輕薄無頼而不能成大功徒使國家兵連禍結而已昔魯軌説姚興取荆州至敗散為蠻人掠賣為奴終於禍及姚泓此已然之效也魏主未以為然浩乃復陳天時以為南方舉兵必不利曰今茲害氣在揚州一也庚午自刑先發者傷二也日食晝晦宿值斗牛三也熒惑伏於翼軫主亂及䘮四也太白未出進兵者敗五也夫興國之君先修人事次盡地利後觀天時故萬舉萬全今劉義隆新造之國人事未洽災變屢見天時不協舟行水涸地利不盡三者無一可而義隆行之必敗無疑魏主不能違衆言乃詔冀定相三州造船三千艘簡幽州以南戍兵集河上以備之夏六月魏主使平南大將軍丹陽王大毗屯河上以司馬楚之為安南大將軍荆州刺史封琅邪王屯頴川以備宋到彥之自淮入泗泗水滲日行纔十里自四月至秋七月始至須昌乃泝河西上魏主以河南四鎮兵少命諸軍悉收衆北渡戊子魏碻磝戍兵棄城去戊戌滑臺戍兵亦去庚子魏主以大鴻臚陽平公杜超為都督冀定相三州諸軍事太宰進爵陽平王鎮鄴為諸軍節度庚戌魏洛陽虎牢戍兵皆棄城去到彥之留朱修之守滑臺尹冲守虎牢建武將軍杜驥守金墉諸軍進屯靈昌津列守南岸至于潼關於是司兖既平諸軍皆喜王仲徳獨有憂色曰諸賢不諳北土情偽必堕其計魏主雖仁義不足而凶狡有餘今歛戍北歸必并力完聚若河氷既合將復南来豈可不以為憂乎八月魏主遣冠軍將軍安頡督䕶諸軍擊到彦之丙寅彦之遣禆將呉興姚聳夫渡河攻冶坂與頡戰聳夫兵敗死者甚衆戊寅魏主遣征西大將軍長孫道生㑹丹陽王大毗屯河上禦彦之冬十月到彦之王仲徳㳂河置守還保東平乙亥魏安頡自委粟津濟河攻金墉金墉城不治既久又無糧食杜驥欲棄城走恐獲罪初髙祖滅秦遷其鐘虡於江南有大鐘沒於洛水帝使姚聳夫將千五百人徃取之驥紿之曰金墉城已修完糧食亦足所乏者人耳今敵騎南渡當相與并力禦之大功既立牽鐘未晚聳夫從之既至見城不可守乃引去驥遂南遁丙子安頡拔洛陽殺將士五千餘人杜驥歸言於帝曰本欲以死固守姚聳夫及城遽走人情沮貶不可復禁上大怒誅聳夫於夀陽聳夫勇健諸偏禆莫及也魏河北諸軍㑹於七女津到彦之恐其南渡遣禆將王燔龍泝流奪其船杜超等擊斬之安頡與龍驤將軍陸俟進攻虎牢辛巳拔之尹冲及滎陽太守清和崔模降魏十一月壬辰加征南大將軍檀道濟都督征討諸軍事帥衆伐魏甲午魏夀光侯叔孫建汝隂公長孫道生濟河而南到彥之聞洛陽虎牢不守諸軍相繼犇敗欲引兵還殿中將軍垣䕶之以書諌之以為宜使竺靈秀助朱修之守滑臺自帥大軍進擬河北且曰昔人有連年攻戰失衆乏糧猶張膽争前莫肯輕退况今青州豐穣濟漕流通士馬飽逸威力無損若空棄滑臺坐䘮成業豈朝廷受任之㫖邪彦之不從䕶之苗之子也彦之欲焚舟歩走王仲徳曰洛陽既䧟虎牢不守自然之勢也今敵去我猶千里滑臺尚有彊兵若遽捨舟南走士卒必散當引舟入濟至馬耳谷口更詳所宜彦之先有目疾至是大動且將士疾疫乃引兵自清入濟南至歴城焚舟棄甲歩趨彭城竺靈秀棄湏昌南犇湖陸青兖大擾長沙王義欣在彭城將佐恐魏兵大至勸義欣委鎮還都義欣不從魏兵攻濟南濟南太子武進蕭承之帥數百人拒之魏衆大集承之使偃兵開城門衆曰賊衆我寡奈何輕敵之甚承之曰今懸守窮城事已危急若復示弱必為所屠唯當見彊以待之耳魏人疑有伏兵遂引去戊戌魏叔孫建攻竺靈秀於湖陸靈秀大敗死者五千餘人建還屯范城辛丑魏安頡督諸軍攻滑臺魏以叔孫建都督冀青等四州諸軍事十二月右將軍到彦之安北將軍王仲徳皆下獄免官兖州刺史竺靈秀坐棄軍伏誅上見垣䕶之書而善之以為北髙平太守彦之之北伐也甲兵資實甚盛及敗還委棄盪盡府藏武庫為之空虚八年春正月丙申檀道濟等自清水救滑臺魏叔孫建長孫道生拒之丁酉道濟至夀張遇魏安平公乙旃眷道濟帥寧朔將軍王仲徳驍騎將軍段宏奮擊大破之轉戰至髙梁亭斬魏濟州刺史悉煩庫結二月檀道濟等進至濟上二十餘日間前後與魏三十餘戰道濟多㨗軍至歴城叔孫建等縱輕騎邀其前後焚燒榖草道濟軍乏食不能進由是安頡司馬楚之等得専力攻滑臺魏主復使楚兵將軍王慧龍助之朱修之堅守數月糧盡士卒熏䑕食之辛酉魏克滑臺執修之及東郡太守申謨擄獲萬餘人檀道濟等食盡自歴城引還軍士有亡降魏者具告之魏人追之衆忷懼將潰道濟夜唱籌量沙以所餘少米覆其上及旦魏軍見之謂道濟資糧有餘以降者為妄而斬之時道濟兵少魏兵甚盛騎士四合道濟命軍士皆被甲巳白服乗輿引兵徐出魏人以為有伏兵不敢逼稍稍引退道濟全軍而返青州刺史蕭思話聞道濟南歸欲委鎮保險濟南太守蕭承之固諌不從丁丑思話棄鎮犇平昌參軍劉振之戍下邳聞之亦委城走魏軍竟不至而東陽積聚已為百姓所焚思話坐徴繫尚方庚戌魏安頡等還平城魏主嘉朱修之守節拜侍中妻以宗女初帝之遣到彥之也戒之曰若北國兵動先其未至徑前入河若其不動留彭城勿進及安頡得宋俘魏主始聞其言謂公卿曰卿軰前謂我用崔浩計為謬驚怖固諌常勝之家始皆自謂踰人至於歸終乃不能及司馬楚之上疏以為諸方已平請大舉伐宋魏主以兵久勞不許徴楚之為散騎常侍以王慧龍為滎陽太守慧龍在郡十年農戰並修大著聲績歸附者萬餘家帝縱反間於魏云慧龍自以功髙位下欲引宋人入冦因執司馬楚之以叛魏王聞之賜慧龍璽書曰劉義隆畏將軍如虎欲相中害朕自知之風塵之言想不足介意帝復遣刺客吕𤣥伯刺之曰得慧龍首封二戸男賞絹千匹𤣥伯詐為降人求屏人有所論慧龍疑之使人探其懐得尺刀𤣥伯叩頭請死慧龍曰各為其主耳釋之左右諌曰宋人為謀未已不殺𤣥伯無以制將来慧龍曰死生有命彼亦安能害我我以劉義為扞蔽又何憂乎遂捨之夏閏六月魏主遣散騎侍郎周紹来聘且求昬帝依違答之九年夏五月帝遣使者趙道生聘於魏六月魏主遣散騎常侍鄧頴来聘十年春二月壬午魏主如河西遣兼散騎常侍宋宣来聘且為太子晃求㛰帝依違答之冬十二月魏寕朔將軍来聘十四年春二月帝遣散騎常侍劉熈伯如魏議納幣㑹帝女亡而止十八年秋八月辛亥魏遣散騎侍郎張偉来聘二十一年魏主使員外散騎常侍髙濟来聘二十二年夏六月帝謀伐魏冬十一月魏選六州驍騎二萬使永昌王仁髙凉王那分將之為二道掠淮泗以北徙青徐之民以實河北二十三年春二月太原顔白鹿私入魏境為魏人所得將殺之詐云青州刺史杜驥使其歸誠魏人送白鹿詣平城魏主喜曰我外家也使崔浩作書與驥且命永昌王仁髙凉王那將兵迎驥攻冀州刺史申恬於歴城杜驥遣其府司馬夏侯祖歡等將兵救歴城魏人遂冦兖青冀三州至清東而還殺掠甚衆北邊騷動帝以魏冦為憂咨訪羣臣御史中丞何承天上表以為凡備匈奴之䇿不過二科武夫盡征伐之謀儒生講和親之約今若欲追踪衛霍自非大田淮泗内實青徐使民有贏儲野有積榖然後發精卒十萬一舉蕩夷則不足為也若但欲遣軍追討報其侵暴則彼必輕騎犇走不肯㑹戰徒興巨費不損於彼報復之役將遂無已斯䇿之最末者也安邊固守於䇿為長臣竊以曹孫之覇才均智敵江淮之間不居各數百里何者斥候之郊非耕牧之地故堅壁清野以候其来整甲繕兵以乗其弊保民全境不出此塗要而歸之其䇿有四一曰移逺就近今青兖舊民及冀州新附在界首者三萬餘家可悉徙置大峴之南以實内地二曰多築城邑以居新徙之家假其經用春夏佃牧秋冬入保冦至之時一城千家堪戰之士不下二千其餘羸弱猶能登陴鼓譟足抗羣虜三萬矣三曰纂耦車牛以載糧械計千家之資不下五百耦牛為車五百兩參合鉤連以衛其衆設使城不可固平行趨險賊所不能干有急徴發信宿可聚四曰計丁課仗凡戰士二千隨其便能各自有仗素所服習銘刻由己還保輸之於庫出行請以自新弓簳利鐡民不得者官以漸充之數年之内軍用粗備矣近郡之師逺屯清濟功費既重嗟怨亦深以臣料之未若即用彼衆之易也今因民所利導而帥之兵彊而敵不戒國富而民不勞比於優復隊伍坐食糧廩者不可同年而校矣二十六年帝欲經畧中原羣臣争獻䇿以迎合取寵彭城太守王𤣥謨尤好進言帝謂侍臣曰觀𤣥謨所陳令人有封狼居胥意御史中丞袁淑言於上曰陛下今當席卷趙魏檢玉岱宗臣逢千載之㑹願上封禪書上悦淑耽之曾孫也秋七月辛未以廣陵王誕為雍州刺史上以襄陽外接關河欲廣其資力乃罷江州軍府文武悉配雍州湘州入臺租税悉給㐮陽二十七年春正月魏主將入冦二月甲午大獵於梁川帝聞之敕淮泗諸郡若魏冦小至則各堅守大至則拔民歸夀陽邊戍偵候不明辛亥魏主自將歩騎十萬奄至南頓太守鄭琨潁川太守郭道隠並棄城走是時豫州刺史南平王鑠鎮夀陽遣左軍行參軍陳憲行汝南郡事守懸瓠城中戰士不滿千人魏主圍之三月以軍興減内外百官俸三分之一魏人晝夜攻懸瓠多作髙樓臨城以射之矢下如雨城中負戸以汲施大鉤於衝車之端以牽樓堞壊其南城陳憲内設女墻外立木柵以拒之魏人填塹肉薄登城憲督厲將士苦戰積尸與城等魏人乗尸上城短兵相接憲銳氣愈奮將士無不一當百殺傷萬計城中死者亦過半魏主遣永昌王仁將歩騎萬餘驅所掠六郡生口北屯汝陽時徐州刺史武陵王駿鎮彭城帝遣間使命駿發騎齎三日糧襲之駿發百里内馬得千五百匹分為五軍遣參軍劉泰之帥安北騎兵行參軍垣謙之田曹行參軍臧肇之集曹行參軍尹定武陵左常侍杜幼文殿中將軍程天祚等將之直趨汝陽魏人唯慮救兵自夀陽来不備彭城丁酉泰之等潜進擊之殺三千餘人燒其輜重魏人犇散諸生口悉得東走魏人偵知泰之等兵無後繼復引兵擊之垣謙之先退士卒驚亂棄仗走泰之為魏人所殺肇之溺死天祚為魏所擒謙之定幼文及士卒免者九百餘人馬還者四百匹魏主攻懸瓠四十二日帝遣南平内史臧質詣夀陽與安蠻司馬劉康祖共將兵救懸瓠魏主遣殿中尚書任城公乞地真逆拒之質等擊斬乞地真康祖道錫之從兄也夏四月魏主引兵還癸卯至平城壬子安北將軍武陵王駿降號鎮軍將軍垣謙之伏誅尹定杜幼文付尚方以陳憲為龍驤將軍汝南新蔡二郡太守魏主遺帝書曰前盖呉反逆扇動關隴彼復使人就而誘之丈夫遺以弓矢婦人遺以環釧是曹孫欲譎誑取賂豈有逺相服從之理為大丈夫何不自来取之而以貨誘我邊民募徃者復除七年是賞姦也我今来至此土所得多少孰與彼前後得我民邪彼若欲存劉氏血食者當割江以北輸之攝守南度如此當釋江南使彼居之不然可善敕方鎮刺史守宰嚴供帳之具来秋當徃取揚州大勢已至終不相縱彼徃日北通蠕蠕西結赫連沮渠吐谷渾東連馮𢎞髙麗凡此數國我皆滅之以此而觀彼豈能獨立蠕蠕呉提吐賀真皆已死我今北征先除有足之冦彼若不從命来秋當復徃取之以彼無足故不先討耳我徃之日彼作何計為掘塹自守為築垣以自障也我當顯然徃取揚州不若彼翳行竊歩也彼来偵諜我已擒之復縱還其人目所盡見委曲善問之彼前使裴方明取仇池既得之疾其勇功已不能容有臣如此尚殺之烏得與我校邪彼非我敵也彼常欲與我一交戰我亦不癡復非苻堅何時與彼交戰晝則遣騎圍繞夜則離彼百里外宿呉人止有斫營伎彼募人以来不過行五十里天已明矣彼募人之首豈得不為我有哉彼公時舊臣雖老猶有智䇿知今已殺盡豈非天資我邪取彼亦不須我兵刃此有善呪婆羅門當使鬼縛以来耳六月上欲征魏丹陽尹徐湛之吏部尚書江湛彭城太守王𤣥謨等並勸之左軍將軍劉康祖以為嵗月已晚請待明年上曰北方苦魏虐政義徒竝起􅉐兵一周沮向義之心不可太子歩兵校尉沈慶之諌曰我歩彼騎其勢不敵檀道濟再行無功到彦之失利而返今料王𤣥謨等未踰兩將六軍之盛不過徃時恐重辱王師上曰王師再屈别自有由道濟飬冦自資彦之中塗疾動魏所恃者唯馬今夏水浩汗河道流通泛舟北下碻磝必走滑臺小戍易可覆拔克此二城館榖弔民虎牢洛陽自然不固比及冬初城守相接敵馬過河即成擒也慶之又固陳不可上使徐湛之江湛難之慶之曰治國譬如治家耕當問奴織當問婢陛下今欲伐國而與白靣書生輩謀之事何由濟上大笑太子劭及䕶軍將軍蕭思話亦諌上皆不從魏主聞上將北伐復與上書曰彼此和好日久而彼志無厭誘我邊民今春南廵聊省我民驅之使還今聞彼欲自来設能至中山及桑乾川随意而行来亦不迎去亦不送若厭其區宇者可来平城居我亦徃揚州相與易地彼年已五十未嘗出戸雖自力而来如三嵗嬰兒與我鮮卑生長馬上者果何如哉更無餘物可以相與今送獵馬十二匹并氊藥等物彼来道逺馬力不足可乗或不服水土藥可自療也秋七月庚午詔曰敵近雖摧挫雄心靡革比得河朔秦雍華戎表疏歸訴困棘豉望綏拯潜相紏結以候王師芮芮亦遣間使逺輸誠欵誓為犄角經略之㑹實在茲日可遣寕朔將軍王𤣥謨帥太子歩兵校尉沈慶之鎮軍諮議參軍申坦水軍入河受督於青冀二州刺史蕭斌太子左衛率臧質驍騎將軍王方回徑造許洛徐兖二州刺史武陵王駿豫州刺史南平王鑠各勒所部東西齊舉梁南北秦三州刺史劉秀之震盪汧隴太尉江夏王義恭出次彭城為衆軍節度坦鍾之曾孫也是時軍旅大起王公妃主及朝士牧守下至富民各獻金帛雜物以助國用又以兵力不足悉發青冀徐豫二兖六州三五民丁倩使暫行符到十日装束縁江五郡集廣陵縁淮三郡集旴􅇇又募中外有馬歩衆藝武力之士應科者皆加厚賞有司又奏軍用不充揚南徐兖江四州富民家貲滿五十萬僧尼滿二十萬並四分借一事息即還建武司馬申元吉引兵趨碻磝乙亥魏濟州刺史王買徳棄城走蕭斌遣將軍崔猛攻樂安魏青州刺史張淮之亦棄城走斌與慶之留守碻磝使王𤣥謨進圍滑臺雍州刺史随王誕遣中兵參軍栁元景振威將軍尹顯祖奮武將軍曽方平建武將軍薛安都略陽太守龎法起將兵出𢎞農後軍外兵參軍龎季明年七十餘自以關中豪右請入長安招合夷夏誕許之乃自貲谷入盧氏盧氏民趙難納之季明遂誘說士民應者甚衆安都等因之自熊耳山出元景引兵繼進豫州刺史南平王鑠遣中兵參軍胡盛之出汝南梁坦出上蔡向長社魏荆州刺史魯爽鎮長社棄城走爽軌之子也幢主王陽兒擊魏豫州刺史僕蘭破之僕蘭犇虎牢鑠又遣安蠻司馬劉康祖將兵助坦進逼虎牢魏羣臣初聞有宋師言於魏主請兵救縁河榖帛魏主曰馬今未肥天時尚熱速出必無功若兵来不止且還隂山避之國人本著羊皮袴何用綿帛展至十月吾無憂矣九月辛卯魏主引兵南救滑臺命太子晃屯漢南以備柔然呉王余守平城庚子魏發州郡兵五萬分給諸軍王𤣥謨士衆甚盛器械精嚴而𤣥謨貪愎好殺初圍滑臺城中多茅屋衆請以火箭燒之𤣥謨曰彼吾財也何遽燒之城中即撤屋穴處時河洛之民競出租谷操兵来赴者日以千數𤣥謨不即其長帥而以配私暱家付匹布責大梨八百由是衆心失望攻城數月不下聞魏救將至衆請發車為營𤣥謨不從冬十月癸亥魏主至枋頭使關内侯代人陸真夜與魏人犯圍潛入滑臺撫慰城中且登城視𤣥謨營曲折還報乙丑魏主渡河衆號百萬鞞鼓之聲震動天地𤣥謨懼退走魏人追擊之死者萬餘人麾下散亡略盡委棄軍資器械山積先是𤣥謨遣鍾離太守垣䕶之以百舸為前鋒據石濟在滑臺西南百二十里䕶之聞魏兵將至馳書勸𤣥謨急攻曰昔武皇攻廣固死沒者甚衆况今事廹於曩日豈得計士衆傷疲願以屠城為急𤣥謨不從及𤣥謨敗退不暇報䕶之魏人以所得𤣥謨戰艦連以鐡鎻三重㫁河以絶䕶之還路河水迅急䕶之中流而下毎至鐡鎻以長柯斧㫁之魏不能禁唯失一舸餘皆完備而返蕭斌遣沈慶之將五千人救𤣥謨慶之曰𤣥謨士衆疲老冦虜已逼得數萬人乃可進小軍輕徃無益也斌固遣之㑹𤣥謨遁還斌將斬之慶之固諌曰佛狸威震天下控弦百萬豈𤣥謨所能當且殺戰將以自弱非良計也斌乃止斌欲固守碻磝慶之曰今青冀虚弱而坐守窮城若魏衆東過青東非國家有也碻磝孤絶復作朱修之滑臺耳㑹詔使至不聼斌等退師斌復召諸將議之並謂宜留慶之曰閫外之事將軍得以専之詔從逺来不知事勢節下有一范増不能用空議何施斌及坐者並笑曰沈公乃更學問慶之厲聲曰衆人雖知古今不如下官耳學也斌乃使王𤣥謨戍碻磝申坦垣䕶之據清口自帥諸軍還歴城閏月龎法起等諸軍入盧氏斬縣令李封以趙難為盧氏令使帥其衆為鄉導栁元景自百丈崖從諸軍於盧氏法起等進攻𢎞農辛未拔之擒魏𢎞農太守李初古拔薛安都留屯𢎞農丙戌龎法起進向潼關魏主命諸將分道並進永昌王仁自洛陽趨夀陽尚書長孫真趣馬頭楚王建趣鍾離髙凉王那自青州趣下邳魏主自東平趣鄒山十一月辛卯魏主至鄒山魯郡太守崔邪利為魏所擒魏主見秦始皇石刻使人排而仆之以太牢祠孔子楚王建自清西進屯蕭城歩尼公自清東進屯留城武陵王駿遣參軍馮文恭將兵向蕭城江夏王義恭遣軍主嵇𤣥敬將兵向留城文恭為魏所敗歩尼公遇𤣥敬引兵趣苞橋欲渡清西沛縣民燒苞橋夜於林中擊鼓魏謂宋兵大至争渡苞水溺死者殆半詔以栁元景為𢎞農太守元景使薛安都尹顯祖先引兵就龎法起等於陜元景於後督租陜城險固諸軍攻之不拔魏洛州刺史張是連提帥衆二萬度崤救陜安都等與戰於城南魏人縱突騎諸軍不能敵安都怒脫兠鍪觧鎧唯著絳納兩當衫馬亦去具装瞋目横矛單騎突陳所向無前魏人夾射不能中如是數四殺傷不可勝數㑹日暮别將魯元保引兵自函谷關至魏兵乃退元景遣軍副栁元怙將歩騎二千救安都等夜至魏人不之知明日安都等陳於城西南曽方平謂安都曰今勍敵在前堅城在後是吾取死之日卿若不進吾當斬卿我若不進卿當斬我也安都曰善卿言是也遂合戰元怙引兵自南門鼓譟直出旌旗甚盛魏衆驚駭安都挺身奮擊流血凝肘矛折易之更入諸軍齊奮自旦至日昃魏衆大潰斬張是連提及將卒三千餘級其餘赴河塹死者甚衆生降二十餘人明日元景至譲降者曰汝輩本中國民今為魏盡力力屈乃降何也皆曰魏驅民使戰後出者滅族以騎蹙歩未戰先死此將軍所親見也諸將欲盡殺之元景曰今王旗北指當令仁聲先路盡釋而遣之皆稱萬嵗而去甲午克陕城龎法起等進攻潼關魏戍主婁須棄城走法起等據之關中豪傑所在蠭起及四山𦍑胡皆来送欵上以王𤣥謨敗退魏兵深入栁元景等不宜獨進皆召還元景使薛安都㫁後引兵歸㐮陽詔以元景為㐮陽太守魏永昌王仁攻懸瓠項城拔之帝恐魏兵至夀陽召劉康祖使還癸卯仁將八萬騎追及康祖於尉武康祖有衆八千人軍副胡盛之欲依山險間行取至康祖怒曰臨河求敵遂無所見幸其自送奈何避之乃結車營而進下令軍中曰顧望者斬首轉歩者斬足魏人四靣攻之將士皆殊死戰自旦至晡殺魏兵萬餘人流血滿踝康祖身被十創意氣彌厲魏分其衆為三且休且戰㑹日暮風急魏以騎負草燒車營康祖随補其闕有流矢貫康祖頸墜馬死餘衆不能戰遂潰魏人掩殺殆盡南平王鑠使左軍行參軍王羅漢以三百人戍尉武魏兵至衆欲南依卑林以自固羅漢以受命居此不去魏人攻而擒之鎻其頸使三郎將掌之羅漢夜㫁三郎將首抱鎻亡犇盱眙魏永昌王仁進逼夀陽焚掠馬頭鍾離南平王鑠嬰城固守魏軍在蕭城去彭城十餘里彭城兵雖多而食少太尉江夏王義恭欲棄彭城南歸安北中兵參軍沈慶之以為歴城兵少食多欲為函箱車陳以精兵為外翼奉二王及妃女直趨歴城分兵配䕶軍蕭思話使留守彭城太尉長史何朂欲席卷犇鬰洲自海道還京師義恭去意已判唯二議彌日未决安北長史沛郡太守張暢曰若歴城鬰洲有可至之理下官敢不髙賛今城中乏食百姓咸有走志但以關扄嚴固欲去莫從耳一旦動足則各自逃散欲至所在何由可得今軍食雖寡朝夕猶未窘罄豈有捨萬安之術而就危亡之道若此計必行下官請以頸血汙公馬蹄武陵王駿謂義恭曰阿父既為總統去留非所敢干道民忝為城主而委鎮犇逃實無顔復奉朝廷必與此城共其存沒張長史言不可異也義恭乃止壬子魏主至彭城立氊屋於戯馬臺以望城中馬文恭之敗也隊主蒯應沒於魏魏主遣應至小市門求酒及甘蔗武陵王駿與之仍就求槖駝明日魏主使尚書李孝伯至南門餉義恭貂裘餉駿槖駝及騾且曰魏主致意安北可蹔出見我我亦不攻此城何為勞苦將士備守如此駿使張暢開門出見之曰安北致意魏主常遲面寫但以人臣無境外之交恨不蹔悉備守乃邊鎮之常恱以使之則勞而無怨耳魏主求甘橘及借慱具皆與之復餉氊及九種鹽胡豉又借樂器義恭應之曰受任戎行不齎樂具孝伯問暢何為匆匆閉門絶橋暢曰二王以魏主營壘未立將士疲勞此精甲十萬恐輕相陵踐故閉城耳待休息士馬然後共治戰塲刻日交戲孝伯曰賓有禮主則擇之暢曰昨見衆賔至門未為有禮魏主使人来言曰致意太尉安北何不遣人来至我所彼此之情雖不可盡要湏見我小大知我老少觀我為人若諸佐不可遣亦可使僮幹来暢以二王命對曰魏主形状才力久為来徃所具李尚書親自銜命不患彼此不盡故不復遣使孝伯又曰王𤣥謨亦常才耳南國何意作如此任使以致奔敗自入此境七百餘里主人竟不能一相拒逆鄒山之險君家所慿前鋒所接崔邪利遽藏入穴諸將倒曵出之魏主賜其餘生今從在此暢曰王𤣥謨南土偏將不謂為才但以之為前驅大軍未至河氷向合𤣥謨因夜還軍致戎馬小亂耳崔邪利䧟沒何損於國魏主自以數十萬衆制一崔邪利乃足言邪知入境七百里無相拒者此自太尉神筭鎮軍聖略用兵有機不用相語孝伯曰魏主當不圍此城自帥衆軍直造𤓰歩南事若辦彭城不待圍若其不㨗彭城亦非所須也我今當南飲江湖以療渇耳暢曰去留之事自適彼懐若胡馬遂得飲江便為無復天道先是童謡云胡馬飲江水佛狸死卯年故暢云然暢音容雅麗孝伯與左右皆嘆息孝伯亦辯且去謂暢曰長史深自愛相去歩武恨不執手暢曰君為自愛冀蕩定有期相見無逺君若得還宋朝今為相識之始上起楊文徳為輔國將軍引兵自漢中西入揺動汧隴魏主攻彭城不克十二月丙辰朔引兵南下使中書郎魯秀出廣陵髙凉王那出山陽永昌王仁出横江所過無不殘滅城邑皆望風犇潰戊午建康纂嚴己未魏兵至淮上上使輔國將軍臧質將萬人救彭城至盱眙魏主已過淮質使冗從僕射胡崇之積弩將軍臧澄之營東山建威將軍毛熈祚據前浦質營於城南乙丑魏燕王譚攻崇之等三營皆敗沒質案兵不敢救是夕質軍亦潰質棄輜重器械單將七百人赴城初盱眙太守沈璞到官王𤣥謨猶在滑臺江淮無警璞以郡當衝要乃繕城浚隍積財榖儲矢石為城守之備僚屬皆非之朝廷亦以為過及魏兵南向守宰多棄城走或勸璞宜還建康璞曰虜若以城小不顧夫復何懼若肉薄来攻此乃吾報國之秋諸君封侯之日也奈何去之諸君甞見數十萬人聚於小城之下而不敗者乎昆陽合肥前事之明驗也衆心稍定璞收集得二千精兵曰足矣及臧質向城衆謂璞曰虜若不攻城則無所事衆若其攻城則城中止可容見力耳地狭人多鮮不為患且敵衆我寡人所共知若以質衆能退敵完城者則全功不在我若避罪歸都㑹資舟楫必更相蹂踐正足為患不若閉門勿受璞嘆曰敵必不能登城敢為諸君保之舟楫之計固已久息魏之殘害古今未有屠剝之苦衆所共見其中幸者不過得驅還北國作奴婢耳彼雖烏合寧不憚此邪所謂同舟而濟胡越一心者也今兵多則敵退速少則退緩吾寕可欲専功而留敵乎乃開門納質質見城中豐實大喜衆皆稱萬嵗因與璞共守魏人之南寇也不齎糧用唯以抄掠為資及過淮民多竄匿抄掠無所得人馬飢乏聞盱眙有積粟欲以為北歸之資既破崇之等一攻城不拔即留其將韓元興以數千人守盱眙自帥大衆南向由是盱眙得益完守偹庚午魏主至瓜歩壊民廬舍及伐葦為筏聲言欲渡江建康震懼民皆荷擔而立壬午内外戒嚴丹陽統内盡戸發丁王公以下子弟皆從役命領軍將軍劉遵考等將兵分守津要逰邏上接于湖下至蔡洲陳艦列營周亘江濱自采石至于暨陽六七百里太子劭出鎮石頭揔統水軍丹陽尹徐湛之守石頭倉城吏部尚書江湛兼領軍軍事處置悉以委焉上登石頭城有憂色謂江湛曰北伐之計同議者少今日士民勞怨不得無慙貽大夫之憂予之過也又曰檀道濟若在豈使胡馬至此上又登幕府山觀望形勢購魏主及王公首許以封爵金帛又募人齎野葛酒置空村中欲以毒魏人竟不能傷魏主鑿𤓰歩山為蟠道於其上設氊屋魏主不飲河南水以槖駝負河北水自随餉上槖駝名馬以求和請㛰上遣奉朝請田竒餉以珍羞異味魏主得黄甘即噉之并大進酃酒左右有附耳語者疑食中有毒魏主不應舉手指天以其孫示竒曰吾逺来至此非欲為功名實欲繼好息民永結姻投宋若能以女妻此孫我以女妻武陵王自今匹馬不復南顧竒還上召太子劭及羣臣議之衆並謂宜許江湛曰戎狄無親許之無益劭怒謂湛曰今三王在阨詎宜茍執異議聲色甚厲坐散俱出劭使班劒及左右排湛湛幾至僵仆劭又言於上曰北伐敗辱數州淪破獨有斬江湛徐湛之可以謝天下上曰北伐自是我意江徐但不異耳由是太子與江徐不平魏亦竟不成㛰二十八年春正月丙戌朔魏主大㑹羣臣於瓜歩山上班爵行賞有差魏人縁江舉火太子右衛率尹𢎞言於上曰魏人如此必走丁亥魏掠居民焚廬舍而去江夏王義恭以碻磝不可守召王𤣥謨還歴城魏人追擊敗之遂取碻磝初上聞魏將入寇命廣陵太守劉懐之逆燒城府船乗盡帥其民渡江山陽太守蕭僧珍悉歛其民入城臺送糧收詣盱眙及滑臺者以路不通皆留山陽蓄陂水令滿須魏人至决以灌之魏人過山陽不敢留因攻盱眙魏主就臧質求酒封溲便與之魏主怒築長圍一夕而合運東山土石以填塹作浮橋於君山絶水陸道魏主遺質書曰吾今所遣鬬兵盡非我國人城東北是丁零與胡南是氐𦍑設使丁零死正可減常山趙郡賊胡死減并州賊氐𦍑死減關中賊卿若殺之無所不利質復書曰省示具悉姦懐爾自恃四足屢犯邊境王𤣥謨退於東申坦散於西爾知其所以然邪爾獨不聞童謡之言乎盖卯年未至故以二軍開飲江之路耳㝠期使然非復人事寡人受命相滅期之白登師行未逺爾自送死豈容復令爾生全饗有桑乾哉爾有幸得為亂兵所殺不幸則生相鎻縳載以一驢直送都市耳我本不圗全若天地無靈方屈於爾虀之粉之屠之裂之猶未足以謝本朝爾智識及衆力豈能勝符堅邪今春雨已降兵方四集爾但安意攻城勿遽走糧食乏者可見語當出廪相貽得所送劒刀欲令我揮之爾身邪魏主大怒作鐡牀於其上施鐡鑱曰破城得質當坐之此上質又與魏衆書曰爾語北中諸士庶佛狸見與書相待如此爾等正朔之民何為自取糜滅豈可不知轉禍為福邪并寫臺格以與之云斬佛狸首封萬戸侯賜布絹各萬匹魏人以鉤車鉤城樓城内繫以彄絙數百人唱呼引之車不能退既夜縋桶懸卒出截其鉤獲之明日又以衝車攻城城土堅密毎至頺落不過數升魏人乃肉薄登城分畨相代墜而復升莫有退者殺傷萬計尸與城平凡攻之三旬不拔㑹魏軍中多疾疫或告以建康遣水軍自海入淮又敕彭城㫁其歸路二月丙辰朔魏主燒攻具退走盱眙人欲追之沈璞曰今兵不多雖可固守不可出戰但整舟楫示若欲北渡者以速其走計不湏實行也臧質以璞城主使之上露板璞固辭歸功于質上聞益嘉之魏師逼彭城江夏王義恭震懼不敢擊或告敵去南口萬餘夕應宿安王陂去城數十里今追之可悉得諸將皆請行義恭禁不許明日驛使至上敕義恭悉力急追魏師已逺義恭乃遣鎮軍檀和之向蕭城魏人先已聞之盡殺所驅者而去程天祚逃歸魏人凡破南兖徐兖豫青冀六州殺掠不可勝計丁壮者即加斬戮嬰兒貫於槊上槃舞以為戲所過郡縣赤地無餘春燕歸巢於林木魏之士馬死傷亦過半國人皆尤之上每命將出師常授以成律交戰日時亦待中詔是以將帥趦趄莫敢自决又江南白丁輕進易退此其所以敗也自是邑里蕭條元嘉之政衰矣癸酉詔賑恤郡縣民遭冦者蠲其稅調甲戌降太尉義恭為驃騎將軍開府儀同三司戊寅魏主濟河辛巳降鎮軍將軍武陵王駿為北中郎將壬午上如𤓰歩是日觧嚴三月乙酉帝還宫己亥魏主還平城飲至告廟以降民五萬餘家分置近畿初魏主過彭城遣人語城中曰食盡且去須麥熟更来及期江夏王義恭議欲芟麥剪苗移民保聚鎮軍錄事參軍王孝孫曰敵不能復来既自可保如其更至此議亦不可立百姓閉其内城饑饉日久方春之月野採自資一入保聚餓死立至民知必死何可制邪敵若必来芟麥無晚四坐黙然莫之敢對長史張暢曰孝孫之議實有可尋鎮軍府典籖董元嗣侍武陵王駿之側進曰王錄事議不可奪别駕王子夏曰此論誠然暢歛板白駿曰下官欲命孝孫彈子夏駿曰王别駕有何事邪暢曰芟麥移民可謂大議一方安危事係於此子夏親為州端曽無同異及聞元嗣之言則懽笑酬答阿意左右何以事君子夏元嗣皆大慙義恭之議遂寝初魯宗之犇魏其子軌為魏荆州刺史㐮陽公鎮長社常思南歸以昔殺劉康祖及徐湛之之父故不敢来軌卒子爽襲父官爵爽少有武幹與弟秀有寵於魏主秀為中書郎既而兄弟各有罪魏主詰責之爽秀懼誅從魏王自𤓰歩還至湖陸請曰奴與南有仇每兵来常恐禍及墳墓乞共迎䘮還𦵏平城魏主許之爽至長社殺魏戍兵數百人帥部曲及願從者千餘家奔汝南夏四月爽遣秀詣夀陽奉書於南平王鑠以請降上聞之大喜以爽為司州刺史鎮義陽秀為頴川太守餘弟姪並授官爵賞賜甚厚魏人毁其墳墓徐湛之以為廟筭逺圖特所奨納不敢茍申私怨乞屏居田里不許二十九年春二月甲寅魏侍中宗愛弑世祖三月上聞魏世祖殂更謀北伐魯爽等復勸之上訪於羣臣太子中庶子何偃以為淮泗數州瘡痍未復不宜輕動上不從偃尚之之子也夏五月丙申詔曰虐冦窮凶著於自昔未勞資斧已伏天誅拯溺蕩穢今其㑹也可符驃騎司空二府各部分所統東西應接歸義建績者随勞酬奨於是遣撫軍將軍蕭思話督冀州刺史張永等向碻磝魯爽魯秀程天祚將荆州甲士四萬出許洛雍州刺史臧質帥所領趣潼關永茂度之子也沈慶之固諌北伐上以其異議不使行青州刺史劉興祖上言以為河南阻飢野無所掠脫諸城固守非旬月可拔稽留大衆轉輸方勞應機乗勢事存急速今偽帥始死兼逼暑時國内猜擾不暇逺赴愚謂宜長驅中山據其關要冀州以其民人尚豐兼麥已向熟因資為易向義之徒必應響赴若中州震動黄河以南自當消潰臣請發青冀七千兵遣將領之直入其心腹若前驅克勝張永及河南衆軍宜一時濟河使聲實兼舉並建司牧撫柔初附西拒太行北塞軍都因事指麾随宜加授畏威欣寵人百其懐若能成功清壹可待若不克㨗不為大傷並催促装束伏聼敕㫖上意止存河南亦不從上又使員外散騎侍郎琅邪徐爰隨軍向碻磝銜中㫖授諸將方略臨時宣示秋七月張永等至碻磝引兵圍之諸軍攻碻磝治三攻道張永等當東道濟南太守申坦等當西道揚武司馬崔訓當南道攻之累旬不拔八月辛亥夜魏人自地道潛出燒崔訓營及攻具癸丑夜又燒東圍及攻具尋復毁崔訓攻道張永夜撤圍退軍不告諸將士卒驚擾魏人乗之死傷塗地蕭思話自徃增兵力攻旬餘不拔是時青徐不稔軍食乏丁卯思話命諸軍皆退屯歴城斬崔訓繫張永申坦於獄魯爽至長社魏戍主秃髪幡棄城走臧質􅉐兵近郊不以時發獨遣冠軍司馬栁元景帥後軍行參軍薛安都等向潼關元景等進據洪闗梁州刺史劉秀之遣司馬馬注與左軍中兵參軍蕭道成將兵向長安道成承之之子也魏冠軍將軍封禮自浢津南渡赴𢎞農九月司空髙平公兒烏干屯潼關平南將軍黎公遼屯河内庚寅魯爽與魏豫州刺史拓跋侯蘭戰於大索破之進攻虎牢聞碻磝敗退與栁元景皆引兵還蕭道成馬注等聞魏救兵將至還趣仇池己丑詔觧蕭思話徐州更領冀州刺史鎮歴城上以諸將屢出無功不可専責張永等賜思話詔曰敵既乗利方向盛冬若脫敢送死兄弟父子自共當之耳言及増憤可以示張永申坦又與江夏王義恭書曰早知諸將輩如此恨不以白刃驅之今者悔何所及義恭尋奏免思話官從之宗愛逆節宋文帝元嘉九年春正月丙午魏主立子晃為皇太子大赦改元二十八年夏六月魏太子晃監國頗信任左右又營園田收其利髙允諌曰天地無私故能覆載王者無私故能容飬今殿下國之儲貳萬方所則而營立私田蓄飬雞犬乃至酤販市㕓與民争利謗聲流布不可追掩夫天下者殿下之天下富有四海何求而無乃與販夫販婦競此尺寸之利乎昔虢之將亡神賜之土田漢靈帝私立府藏皆有顛覆之禍前鑒若此甚可畏也武王愛周邵齊畢所以王天下殷紂愛飛亷惡来所以䘮其國今東宫儁乂不少頃来侍御左右者恐非在朝之選願殿下斥去佞邪親近忠良所在田園分給貧下販賣之物以時收散如此則休聲日至謗議可除矣不聼太子為政精察而中常侍宗愛性險暴多不法太子惡之給事中仇尼道盛侍郎任平城有寵於太子頗用事皆與愛不協愛恐為道盛等所紏遂構告其罪魏主怒斬道盛等於都街東宫官屬多坐死帝怒甚戊辰太子以憂卒壬申𦵏金陵謚曰景穆帝徐知太子無罪甚悔之冬十二月丁丑魏主封景穆太子之子濬為髙陽王既而以王孫世嫡不當為藩王乃止二十九年春正月魏世祖追悼景穆太子不已宗愛懼誅二月甲寅弑帝尚書左僕射蘭延侍中和疋薛禔等祕不發䘮延疋以皇孫濬沖幼欲立長君徴秦王翰置之祕室疑以濬嫡皇孫不可廢議久不决宗愛知之自以得罪於景穆太子而素惡秦王翰善南安王余乃密迎余自中宫便門入禁中矯稱赫連皇后令召延等延等以愛素賤不以為疑皆隨入愛先使宦者三千人持兵伏於禁中延等入以次收縳斬之殺秦王翰於永巷而立余大赦改元承平尊皇后為皇太后以愛為大司馬大將軍太師都督中外諸軍事領中祕書封馮翊王魏南安隠王余自以違次而立厚賜羣下欲以收衆心旬月之間府藏虚竭又好酣飲及聲樂畋獵不恤政事宗愛為宰相錄三省摠宿衛坐召公卿専恣日甚余患之謀奪其權愛憤怒冬十月丙午朔余夜祭東廟愛使小黄門賈周等就弑余而祕之唯羽林郎中代人劉尼知之尼勸愛立皇孫濬愛驚曰君大癡人皇孫若立豈忘正平時事乎尼曰若爾今當立誰愛曰待還宫當擇諸王賢者立之尼恐愛為變密以狀告殿中尚書源賀賀時與尼俱典兵宿衛乃與南部尚書陸麗謀曰宗愛既立南安還復殺之今又不立皇孫將不利於社稷遂與麗定謀共立皇孫麗俟之子也戊申賀與尚書長孫渇侯嚴兵守衛宫禁使尼麗迎皇孫於苑中麗抱皇孫於馬上入平城賀渇侯開門納之尼馳還東廟大呼曰宗愛弑南安王大逆不道皇孫已登大位有詔宿衛之士皆還宫衆咸呼萬嵗遂執宗愛賈周等勒兵而入奉皇孫即皇帝位登永安殿大赦改元興安殺愛周皆具五刑夷三族太子劭弑逆宋文帝元嘉三年初袁皇后生皇子劭后自詳視使馳白帝曰此兒形貌異常必破國亡家不可舉即欲殺之帝狼狽至后殿戸外手撥幔禁之乃止以尚在諒闇故祕之閏正月丙戌始言劭生六年春三月丁丑立皇子劭為太子十五年夏四月納故黄門侍郎殷淳女為太子劭妃十六年乙亥太子劭加元服大赦劭羙鬢眉好讀書便弓馬喜延賔客意之所欲上必從之東宫置兵與羽林等二十九年初潘淑妃生始興王濬元皇后性妬以淑妃有寵於上恚恨而殂淑妃専揔内政由是太子劭深惡淑妃及濬濬懼為將来之禍乃曲意事劭劭更與之善呉興巫嚴道育自言能辟榖服食役使鬼物因東陽公主婢王鸚鵡出入主家道育謂主曰神將有符賜主主夜卧見流光若螢飛入書笥開視得二青珠由是主與劭濬皆信惑之劭濬並多過失數為上所詰責使道育祈請欲令過不上聞道育曰我已為上天陳請必不泄露劭等敬事之號曰天師其後遂與道育鸚鵡及東陽王奴陳天與黄門陳慶國共為巫蠱琢玉為上形象埋於含章殿前劭補天與為隊主東陽王卒鸚鵡應出嫁劭濬慮語泄濬府佐呉興沈懐逺素為濬所厚以鸚鵡嫁之為妾上聞天與領隊以讓劭曰汝所用隊主副並是奴邪劭懼以書告濬濬視書曰彼人若所為不已正可促其餘命或是大慶之漸耳劭濬相與徃来書疏常謂上為彼人或曰其人謂江夏王義恭為佞人鸚鵡先與天與私通既適懐逺恐事泄白劭使密殺之陳慶國懼曰巫蠱事唯我與天與宣傳徃来今天與死我其危哉乃具以其事白上上大驚即遣收鸚鵡封籍其家得劭濬書數百紙皆咒詛巫蠱之言又得所埋玉人命有司窮治其事道育亡命捕之不獲先是濬自揚州刺史出鎮京口及廬陵王紹以疾觧揚州意謂已必復得之既而上用南譙王義宣濬殊不樂乃求鎮江陵上許之濬入朝遣還京口為行留處分至京口數日而巫蠱事發上惋嘆彌日謂潘淑妃曰太子圖富貴更是一理虎頭復如此非復思慮所及汝母子豈可一日無我邪遣中使切責劭濬劭濬惶懼無辭唯陳謝而已上雖怒甚猶未忍罪也二十年春正月壬午以征北將軍始興王濬為荆州刺史帝怒未觧故濬久留京口既除荆州乃聼入朝嚴道育之亡命也上分遣使者摉捕甚急道育變服為尼匿於東宫又隨始興王濬至京口或出止民張旿家濬入朝復載還東宫欲與俱徃江陵丁巳上臨軒濬入受拜是日有告道育止張旿家者上遣掩捕得其二婢云道育隨征北還都王謂濬與太子劭已斥遣道育而聞其猶與徃来惆悵惋駭命京口送二婢須至檢覆乃治劭濬之罪潘淑妃抱濬泣曰汝前祝詛事發猶冀能刻意思愆何意更藏嚴道育上怒甚我叩頭乞恩不能觧今何用生為可送藥来當先自取盡不忍見汝禍敗也濬奮衣起曰天下事尋自當判願少寛慮必不上累文帝欲廢太子劭賜始興王濬死先與侍中王僧綽謀之使僧綽尋漢魏以来廢太子諸王典故送尚書僕射徐湛之及吏部尚書江湛武陵王駿素無寵故屢出外藩不得留建康南平王鑠建平王宏皆為上所爱鑠妃江湛之妹隨王誕妃徐湛之之女也湛勸帝立鑠湛之意欲立誕僧綽曰建立之事仰由聖懐臣謂唯宜速㫁不可稽緩當㫁不㫁反受其亂願以義割恩略小不忍不爾便應坦懐如初無煩疑論事機雖密易致宣廣不可使難生慮表取笑千載帝曰卿可謂能㫁大事然此事至重不可不慇懃三思且彭城始亡人將謂我無復慈愛之道僧綽曰臣恐千載之下唯能裁弟不能裁兒帝黙然江湛同侍坐出閣謂僧綽曰卿向言將不太傷切直僧綽曰弟亦恨君不直鑠自夀陽入朝既至失㫖帝欲立宏嫌其非次是以議久不决毎夜與湛之屏人語或連日累夕常使湛之自秉燭繞壁檢行慮有竊聼者帝以其謀告潘淑妃淑妃以告濬濬持報劭劭乃宻與腹心隊主陳叔兒齋帥張超之等謀為逆初帝以宗室彊盛慮有内難特加東宫兵使與羽林相若至有實甲萬人劭性黠而剛猛帝深倚之及將作亂毎夜饗將士或親自行酒僧綽宻以啓聞㑹嚴道育婢將至癸亥夜劭詐為帝詔云魯秀謀反汝可平明守闕帥衆入因使張超之等集素所畜飬兵士三千餘人皆被甲召内外幢隊主副豫加部勒云有所討夜呼前中庶子右軍長史蕭斌左衛率袁淑中舍人殷仲素左積弩將軍王正見並入宫劭流涕謂曰主上信讒將見罪廢内省無過不能受枉明旦當行大事望相與戮力因起徧拜之衆驚愕莫能對久之淑斌皆曰自古無此願加善思劭怒變色斌懼與衆俱曰當竭身奉令淑叱之曰卿便謂殿下真有是邪殿下幼嘗患風或是疾動耳劭愈怒因眄淑曰事當克不淑曰居不疑之地何患不克但既克之後不為天地所容大禍亦旋至耳假有此謀猶將可息左右引淑出曰此何事而云可罷乎淑還省繞牀行至四更乃寝甲子宫門未開劭以朱衣加戎服上乗畫輪車與蕭斌同載衛從如常入朝之儀呼袁淑甚急淑眠不起劭停車奉化門催之相續淑徐起至車後劭使登車又辭不上劭命左右殺之守門開從萬春門入舊制東宫隊不得入城劭以偽詔示門衛曰受敕有所收討令後隊速来張超之等數十人馳入雲龍門及齋閣拔刃徑上合殿帝其夜與徐湛之屏人語至旦燭猶未滅門階戸席直衛兵尚寝未起帝見超之入舉几捍之五指皆落遂弑之湛之驚起趨北戸未及開兵人殺之劭進至合殿中閤聞帝已殂出坐東堂蕭斌執刀侍直呼中書舍人顧嘏嘏震懼不時出既至問曰欲共見廢何不早啓嘏未及答即於前斬之江湛直上省聞喧譟聲嘆曰不用王僧綽言以至於此乃匿旁小屋中劭遣兵就殺之宿衛舊將羅訓徐罕皆望風屈附左細仗主廣威將軍呉興卜天與不暇被甲執刀持弓疾呼左右出戰徐罕曰殿下入汝欲何為天與罵曰殿下常来云何於今乃作此語只汝是賊手射劭於東堂幾中之劭黨擊之㫁臂而死隊將張泓之朱道欽陳滿與天與俱戰死左衛將軍尹𢎞惶怖通啓求受處分劭使人入東閤殺潘淑妃及太祖親信左右數十人急召始興王濬使帥衆屯中堂濬時在西州府舍人朱法瑜犇告濬曰臺内喧譟宫門皆閉道上傳太子反未測禍變所至濬陽驚曰今當奈何法瑜勸入據石頭濬未得劭信不知事之濟不騷擾不知所為將軍王慶曰今宫内有變未知主上安危凡在臣子當投􅃑赴難慿城自守非臣節也濬不聼乃從南門出徑向石頭文武從者千餘人時南平王鑠戍石頭兵士亦千餘人俄而劭遣張超之馳馬召濬濬屏人問状即戎服乗馬而去朱法瑜固止濬濬不從出中門王慶又諌曰太子反逆天下怨憤明公但當堅閉城門坐食積粟不過三日凶黨自離公情事如此今豈宜去濬曰皇太子令敢有復言者斬既入見劭劭謂濬曰潘淑妃遂為亂兵所害濬曰此是下情由来所願劭詐以太祖詔召大將軍義恭尚書令何尚之入拘於内并召百官至者纔數十人劭遽即位下詔曰徐湛之江湛弑逆無狀吾勒兵入殿已無所及號惋崩衂肝心破裂今罪人斯得元凶克殄可大赦改元太初即位畢亟稱疾還永福省不敢臨䘮以白刃自守夜則列燈以防左右以蕭斌為尚書僕射領軍將軍以何尚之為司空前右衛率檀和之戍石頭征虜將軍營道侯義綦鎮京口義綦義慶之弟也乙丑悉收先給諸處兵還武庫殺江徐親黨尚書左丞荀赤松右丞臧凝之等凝之燾之孫也以殷仲素為黄門侍郎王正見為左軍將軍張超之陳叔兒等皆拜官賞賜有差輔國將軍魯秀在建康劭謂秀曰徐湛之常欲相危我已為卿除之矣使秀與屯騎校尉龎秀之對掌庫隊劭不知王僧綽之謀以僧綽為吏部尚書司徒左長史何偃為侍中武陵王駿屯五州沈慶之自巴水来咨受軍略三月乙亥典籖董元嗣自建康至五州具言太子弑逆駿使元嗣以告僚佐沈慶之宻謂腹心曰蕭斌婦人其餘將帥皆易與耳東宫同惡不過三十人此外屈逼必不為用今輔順討逆不憂不濟也太子劭分浙東五郡為㑹州省揚州立司𨽻校尉以其妃父殷冲為司𨽻校尉冲融之曽孫也以大將軍義恭為太保荆州刺史南醮王義宣為太尉始興王濬為驃騎將軍雍州刺史臧質為丹陽尹㑹稽太守隨王誕為㑹州刺史劭料檢文帝巾箱及江湛家書疏得王僧綽所啓饗士并前代故事甲申收僧綽殺之僧綽弟僧䖍為司徒在西屬所親咸勸之逃僧䖍泣曰吾兄奉國以忠貞撫我以慈愛今日之事苦不見及耳若得同歸九泉猶羽化也劭因誣北第諸王侯云與僧綽謀反殺長沙悼王瑾瑾弟楷臨川哀王􅂱桂陽孝侯覬新渝懐侯玠皆劭素所惡也瑾義欣之子􅂱義慶之子覬玠義慶之弟子也劭密與沈慶之手書令弑武陵王駿慶之求見王王懼辭以疾慶之突入以劭書示王王泣求入内與母訣慶之曰下官受先帝厚恩今日之事唯力是視殿下何見疑之深王起再拜曰家國安危皆在將軍慶之即命内外勒兵府主簿顔峻曰今四方未知義師之舉劭據有天府若首尾不相應此危道也宜待諸鎮協謀然後舉事慶之厲聲曰今舉大事而黄頭小兒皆得參預何得不敗宜斬以徇衆王令峻拜謝慶之慶之曰君但當知筆札事耳於是専委慶之處分旬日之間内外整辦人以為神兵峻延之子也庚寅武陵王戒嚴誓衆以沈慶之領府司馬㐮陽太守栁元景随郡太守宗慤為諮議參軍領中兵將軍内史朱修之行平東將軍記室參軍顔峻為諮議參軍領錄事兼揔内外以諮議參軍劉延孫為長史尋陽太守行留府事延孫道産之子也南醮王義宣及臧質皆不受劭命與司州刺史魯爽同舉兵以應駿質爽俱詣江陵見義宣且遣使勸進於王辛卯臧質子敦等在建康者聞質舉兵皆逃亡劭欲相慰恱下詔曰臧質國戚勲臣方賛翼京輦而子弟波迸良可怪歎可遣宣譬令還咸復本位劭尋錄得敦使大將軍義恭行訓杖三十厚給賜之乙未武陵王發西陽丁酉至尋陽庚子王命顔峻移檄四方使共討劭州郡承檄翕然響應南譙王義宣遣臧質引兵詣尋陽與駿同下留魯爽於江陵劭以兖冀二州刺史蕭思話為徐兖二州刺史起張永為青州刺史思話自歴城引部曲還平城起兵以應尋陽建武將軍垣䕶之在歴城亦帥所領赴之南醮王義宣拔張永為冀州刺史永遣司馬崔勲之等將兵赴義宣義宣慮蕭思話與永不釋前憾自為書與思話使長史張暢為書與永勸使相與坦懐随王誕將受劭命參軍事沈正說司馬顧琛曰國家此禍開闢未聞今以江東驍銳之衆唱大義於天下其誰不響應豈可使殿下北靣凶逆受其偽寵乎琛曰江東忘戰日久雖逆順不同然彊弱亦異常須四方有義舉者然後應之不為晚也正曰天下未嘗有無父無君之國寕可自安讎恥而責義於餘方乎今正以弑逆寃醜義不同天舉兵之日豈求必全邪馮衍有言大漢之貴臣將不如荆齊之賤士乎况殿下義兼臣子事實國家者哉琛乃與正共入說誕誕從之正田子之兄子也劭自謂素習武事語朝士曰卿等但助我理文書勿措意戎旅若有冦讎吾自當之但恐賊虜不敢動耳及聞四方兵起始憂懼戒嚴悉召下畨將吏遷淮南岸居民於北岸盡聚諸王及大臣於城内移江夏王義恭處尚書下舍分義恭諸子處侍中下省夏四月癸卯朔栁元景統寕朔將軍薛安都等十二軍發湓口司空中兵參軍徐遺寳以荆州之衆繼之丁未武陵王發尋陽沈慶之揔中軍以從劭立妃殷氏為皇后庚戌武陵王檄書至建康劭以示太常顔延之曰彼誰筆也延之曰峻之筆也劭曰言辭何至於是延之曰峻尚不顧老臣安能顧陛下劭怒稍觧悉拘武陵王子於侍中下省南譙王義宣子於太倉空舍劭欲盡殺三鎮士民家口江夏王義恭何尚之皆曰凡舉大事者不顧家且多是驅逼今忽誅其家累正足堅彼意耳劭以為然乃下書一無所問劭疑朝廷舊臣皆不為已用乃厚撫魯秀及右軍參軍王羅漢悉以軍事委之以蕭斌為謀主殷冲掌文符蕭斌勸劭勒水軍自上决戰不爾則保據梁山江夏王義恭以南軍倉猝船舫陋小不利水戰乃進䇿曰賊駿少年未習軍旅逺来疲弊宜以逸待之今逺出梁山則京都空弱東軍乗虚或能為患若分力兩赴則兵敗勢離不如飬銳待期坐而觀釁割棄南岸柵㫁石頭此先朝舊法不憂賊不破也劭善之斌厲色曰南中郎二十年少能建如此大事豈復可量三方同惡勢據上流沈慶之甚練軍事栁元景宗慤屢甞立功形勢如此實非小敵唯宜及人情未離尚可决力一戰端坐臺城何由得久今主相咸無戰意豈非天也劭不聼或勸劭保石頭城劭曰昔人所以固石頭城者候諸侯勤王耳我若守此誰當見救唯應力戰决之不然不克日日自出行軍慰勞戰士親督都水治船艦壬子焚淮南岸室屋淮内船舫悉驅民家度水北立子偉之為皇太子以始興王濬妃父禇湛之為丹陽尹湛之裕之之兄子也濬為侍中中書監司徒錄尚書六條事加南平王鑠開府儀同三司以南兖州刺史建平王宏為江州刺史太尉司馬龎秀之自石頭失衆南犇人情由是大震以營道侯義綦為湘州刺史檀和之為雍州刺史癸丑武陵王軍於鵲頭宣城太守王僧達得武陵王檄未知所從客說之曰方今釁逆滔天古今未有為君計莫若承義師之檄移告傍郡茍在有心誰不響應此上䇿也如其不能可躬帥向義之徒詳擇水陸之便致身南歸亦其次也僧達乃自侯道南犇逢武陵王於鵲頭王即以為長史僧達𢎞之子也王初發尋陽沈慶之謂人曰王僧達必来赴義人問其故慶之曰吾見其在先帝前議論開張執意明决以此言之其至必也栁元景以舟艦不堅憚於水戰乃倍道兼行丙辰至江寕歩上使薛安都帥鐡騎耀兵於淮上移書朝士為陳逆順劭加吳興太守汝南周嶠冠軍將軍随王誕檄亦至嶠素恇怯回惑不知所從府司馬丘珍孫殺之舉郡應誕戊午武陵王至南州降者相屬己未軍于溧洲王自發尋陽有疾不能見將佐唯顔峻出入卧内擁王于膝親視起居疾屡危篤不任咨禀峻皆専决軍政之外間以文教書檄應接遐邇昏曉臨哭若出一人如是累旬自舟中甲士亦不知王之危疾也癸亥栁元景潜至新亭依山為壘新降者皆勸元景速進元景曰不然理順難恃同惡相濟輕進無防實啓冦心元景營未立劭龍驤將軍詹叔兒覘知之勸劭出戰劭不許甲子劭使蕭斌統歩軍禇湛之統水軍與魯秀王羅漢劉簡之等精兵合萬人攻新亭壘劭自登朱雀門督戰桞元景宿令軍中曰鼓繁氣易衰呌數力易竭但銜枚疾戰一聼吾鼓聲劭将士懐劭重賞皆殊死戰元景水陸受敵意氣彌彊麾下勇士悉遣出鬬左右唯留數人宣傳劭兵勢垂克魯秀擊退鼓劭衆遽止元景乃開壘鼓譟以乗之劭衆大潰墜淮死者甚多劭更帥餘衆自来攻壘元景復大破之所殺傷過於前戰士卒争赴死馬澗澗為之溢劭手斬退者不能禁劉簡之死蕭斌被創劭僅以身免走還宫魯秀禇湛之檀和之皆南犇丙寅武陵王至江寧丁卯江夏王義恭單騎南犇劭殺義恭十二子劭濬憂廹無計以輦迎蔣侯神像置宫中稽顙乞恩拜為大司馬封中山王拜蘓侯神為驃騎将軍以濬為南徐州刺史與南平王鑠並錄尚書事戊辰武陵王軍於新亭大將軍義恭上表勸進散騎侍郎徐爰在殿中誑劭云自追義恭遂歸武陵王時王軍府草創不曉朝章爰素所諳練乃以爰兼太常丞撰即位儀注己巳王即皇帝位大赦文武賜爵一等從軍者二等改謚大行皇帝曰文廟號太祖以大將軍義恭為太尉錄尚書六條事南徐州刺史是日劭亦臨軒拜太子偉之大赦唯劉駿義恭義宣誕不在原例庚子以南醮王義宣為中書監丞相錄尚書六條事揚州刺史隨王誕為衛將軍開府儀同三司荆州刺史臧質為車騎將軍開府儀同三司江州刺史沈慶之為領軍将軍蕭思話為尚書左僕射壬申以王僧達為右僕射栁元景為侍中左衛將軍宗慤為右衛將軍張暢為吏部尚書劉延孫顔峻並為侍中五月癸酉朔臧質以雍州兵二萬至新亭豫州刺史劉遵考遣其將夏侯獻之帥歩騎軍于𤓰歩先是世祖遣平朔將軍顧彬之將兵東入受随王誕節度誕遣參軍劉季之將兵與彬之俱向建康誕自頓西陵為之後繼劭遣殿中將軍燕欽等拒之相遇於曲阿犇牛塘欽等大敗劭於是縁淮樹柵以自守又决破崗方山埭以絶東軍時男子既盡召婦女供役甲戌魯秀等募勇士攻大航克之王羅漢聞官軍已度節放仗降縁渚幢隊以次犇散器仗鼓盖充塞路衢是夜劭閉守六門於門内鑿塹立柵城中沸亂丹陽尹尹𢎞等文武將吏争踰城出降劭燒輦及衮冕服於宫庭蕭斌宣令所統皆使觧甲自石頭戴白幡来降詔斬斌於軍門濬勸劭載寳貨逃入海劭以人情離散不果行乙亥輔國將軍朱修之克東府丙子諸軍克臺城各由諸門入㑹于殿庭獲王正見斬之張超之走至合殿御牀之所為軍士所殺刳腸割心諸將臠其肉生噉之建平等七王號哭俱出劭穿西垣入武庫井中隊副髙禽執之劭曰天子何在禽曰近在新亭至殿前臧質見之慟哭劭曰天地所不覆載丈人何為見哭又謂質曰可得為啓乞逺徙不質曰主上近在航南自當有處分縛劭於馬上防送軍門時不見傳國璽以問劭劭曰在嚴道育處就取得之斬劭及四子於牙下濬帥左右數十人挾南平王鑠南走遇江夏王義恭於越城濬下馬曰南中郎令何所作義恭曰上己君臨萬國又曰虎頭来得無晚乎義恭曰殊當恨晚又曰故當不死邪義恭曰可詣行闕請罪又曰未審猶能賜一職自效不義恭又曰此未可量勒與俱歸於道斬之及其三子劭濬父子首並梟於大航暴尸於市劭妃殷氏及劭濬諸女妾媵皆賜死於獄汙瀦劭所居齋殷氏且死謂獄丞江恪曰汝家骨肉相殘何以枉殺無罪人恪曰受拜皇后非罪而何殷氏曰此權時耳當以鸚鵡為后禇湛之之南犇也濬即與禇妃離絶故免於誅嚴道育王鸚鵡並都街鞭死焚尸揚灰於江殷冲尹𢎞王羅漢及淮南太守沈璞皆伏誅庚辰觧嚴辛巳帝如東府百官請罪詔釋之甲申尊帝母路淑媛為皇太后太后丹陽人也乙酉立妃王氏為皇后后父偃導之𤣥孫也戊子以栁元景為雍州刺史辛卯追贈袁淑為太尉謚忠憲公徐湛之為司空謚忠烈公江湛為開府儀同三司謚忠簡公王僧綽為金紫光祿大夫謚簡侯壬辰以太尉義恭為揚南徐二州刺史進位太傅領大司馬初劭以尚書令何尚之為司空領尚書令子征北長史偃為侍中父子並居權要及劭敗尚之左右皆散自洗黄閤殷冲等既誅人為之寒心帝以尚之偃素有令譽且居劭朝用智將迎時有全脫故特免之復以尚之為尚書令偃為大司馬長史任遇無改甲午帝謁初寕長寕陵追贈卜天與益州刺史謚壯侯與袁淑等四家長給廪祿張泓之等各贈郡守戊戌以南平王鑠為司空建平王宏為尚書左僕射蕭思話為中書令丹陽尹六月丙午帝還宫初帝之討西陽蠻也臧質使栁元景將兵㑹之及質起兵欲奉南醮王義宣為主潜使元景帥所領西還元景即以質書呈帝語其信曰臧冠軍當是未知殿下義舉耳方應伐逆不容西還質以此恨之及元景為雍州質慮其為荆江後患建議元景當為爪牙不宜逺出帝重違其言戊申以元景為䕶軍將軍領石頭戍事己酉以司州刺史魯爽為南豫州刺史庚戌以衛將軍司馬徐遺寶為兖州刺史庚申詔有司論功行賞封顔峻等為公侯辛未從南醮王義宣為南郡王随王誕為竟陵王立義宣次子宜陽侯愷為南醮王閏月壬申以領軍將軍沈慶之為南兖州刺史鎮盱眙癸酉以栁元景為領軍將軍丞相義宣固辭内任及子愷王爵甲午更以義宣為荆湘二州刺史愷為宜陽縣王將佐以下並加賞秩以竟陵王誕為揚州刺史秋七月南平穆王鑠素負才能意常輕上又為太子劭所任出降最晚上潜使人毒之己巳鑠卒贈司徒以商臣之謚謚之冬十一月丙午以左軍將軍魯秀為司州刺史十二月癸未以將置東宫省太子率更令等官中庶子等各減舊員之半武帝孝建元年春正月乙亥改元大赦甲辰以尚書令何尚之為左光祿大夫䕶軍將軍以左衛將軍顔峻為吏部尚書領驍騎將軍丙子立皇子業為太子南郡王之叛武帝孝建元年初江州刺史臧質自謂人才足為一世英雄太子劭之亂質潜有異圖以荆州刺史南郡王義宣庸闇易制欲外相推奉因而覆之質於義宣為内兄既至江陵即稱名拜義宣義宣驚愕問故質曰事中宜然時義宣已奉帝為主故其計不行及至新亭又拜江夏王義恭曰天下屯危禮異常日劭既誅義宣與質功皆第一由是驕恣事多専行凡所求欲無不必從義宣在荆州十年財富兵彊朝廷所下制度意有不同一不遵承質自建康之江州舫千餘乗部伍前後百餘里帝方自攬威權而質以少主遇之政刑慶賞一不咨禀擅用湓口鉤折米臺符屡加檢詰漸致猜懼帝淫義宣諸女義宣由是憤怒質乃遣宻信説義宣以為負不賞之功挟震主之威自古能全者有幾今萬物係心於公聲迹已著見㡬不作將為它人所先若今徐遺寳魯爽驅西北精兵来屯江上質帥九江樓船為公前驅已為得天下之半公以八州之衆徐進而臨之雖韓白更生不能為建康計矣且少主失徳聞於道路沈栁諸將亦我之故人誰肯為少主盡力者夫不可留者年也不可失者時也質常恐溘先朝露不得展其旅力為公掃除於時悔之何及義宣腹心將佐諮議參軍蔡超司馬竺超民等咸有富貴之望欲倚質威名以成其業共勸義宣從其計質女為義宣子採之婦義宣謂質無復異同遂許之超民䕫之子也臧敦時為黄門侍郎帝使敦至義宣所道經尋陽質更令敦誘説義宣義宣意遂定豫州刺史魯爽有勇力義宣質素與之相結義宣密使人報爽及兖州刺史徐遺寳期以今秋同舉兵使者至夀陽爽方飲醉失義宣指即日舉兵爽弟瑜在建康聞之逃叛爽使其衆戴黄標竊造法服登壇自號建平元年疑長史韋處穆中兵參軍楊元駒治中庾騰之不與已同皆殺之遺寳亦勒兵向彭城二月義宣聞爽已反狼狽舉兵魯瑜弟𢎞為質府佐帝敕質救之質即執臺使舉兵義宣與質皆上表言為左右所讒疾欲誅君側之惡義宣進爽號征北將軍爽於是送所造輿服詣江陵使征北府户曹板義宣等文曰丞相劉今補天子名義宣車騎臧今補丞相名質西平朱今補車騎名脩之皆板到奉行義宣駭愕爽所送法物並留竟陵不聽進質加魯𢎞輔國將軍下戍大雷義宣遣諮議參軍劉諶之將萬人就𢎞召司州刺史魯秀欲使為諶之後繼秀至江陵見義宣出拊膺曰吾兄誤我乃與癡人作賊今年敗矣義宣兼荆江兖豫四州之力威震逺近帝欲奉乗輿法物迎之竟陵王誕固執不可曰奈何持此座與人乃止己卯以領軍將軍柳元景為撫軍將軍辛卯以左衛將軍王𤣥謨為豫州刺史命元景統𤣥謨等諸將以討義宣癸巳進據梁山洲於兩岸築偃月壘水陸待之義宣自稱都督中外諸軍事命僚佐悉稱名丙申以安北司馬夏侯祖歡為兖州刺史三月己亥内外戒嚴辛丑以徐州刺史蕭思話為江州刺史柳元景為雍州刺史癸卯以太子左衛率龎秀之為徐州刺史義宣移檄州郡加進位號使同發兵雍州刺史朱脩之偽許之而遣使陳誠於帝益州刺史劉秀之斬義宣使者遣中兵參軍韋崧將萬人襲江陵戊申義宣帥衆十萬發江津舳艫數百里以子慆為輔國將軍與左司馬竺超民留鎮江陵檄朱脩之使發兵萬人繼進脩之不從義宣知脩之貳於己乃以魯秀為雍州刺史使將萬餘人擊之王𤣥謨聞秀不來喜曰臧質易與耳冀州刺史垣䕶之妻徐遺寶之姊也遺寶邀䕶之同反䕶之不從發兵擊之遺寶遣兵襲徐州長史明𦙍於彭城不克𦙍與夏侯祖歡垣䕶之共擊遺寶於湖陸遺寶棄衆焚城犇魯爽義宣至尋陽以質為前鋒而進爽亦引兵直趣厯陽與質水陸俱下殿中將軍沈靈賜將百舸破質前軍於南陵擒軍主徐慶安等質至梁山夾陳兩岸與官軍相拒夏四月戊辰以後將軍劉義綦為湘州刺史甲申以朱脩之為荆州刺史上遣左軍將軍薛安都龍驤將軍南陽宗越等戍厯陽與魯爽前鋒楊胡興等戰斬之爽不能進留軍大峴使魯瑜屯小峴上復遣鎮軍將軍沈慶之濟江督諸將討爽爽食少引兵稍退自留㫁後慶之使薛安都帥輕騎追之丙戌及爽於小峴爽將戰飲酒過醉安都望見爽即躍馬大呼直徃刺之應手而倒左右范雙斬其首爽衆犇散瑜亦為部下所殺遂進攻夀陽克之徐遺寳犇東海東海人殺之李延夀論曰凶人之濟其身非亂世莫由焉魯爽以世亂之情而行之於平日其取敗也宜哉南郡王義宣至鵲頭慶之送爽首示之并與書曰僕荷任一方而釁生所統近聊帥輕師指徃翦撲軍鋒裁及賊爽授首公情契異常或欲相見及其可識指送相呈爽累世將家驍猛善戰號萬人敵義宣與質聞其死皆駭懼栁元景軍于采石王𤣥謨以臧質衆盛遣使来求益兵上使元景進屯姑孰太傅義恭與義宣書曰徃時仲堪假兵靈寳尋害其族孝伯推誠牢之旋踵而敗臧質少無羙行弟所具悉今藉西楚之彊力圗濟其私凶謀若果恐非復池中物也義宣由此疑之五月甲辰義宣至蕪湖臧質進計曰今以萬人取南州則梁山中絶萬人綴梁山則𤣥謨必不敢動下官中流鼓棹直趣石頭此上䇿也義宣將從之劉湛之宻言於義宣曰質求前驅此志難測不如盡銳攻梁山事克然後長驅此萬安之計也義宣乃止宂從僕射胡子反等守梁山西壘㑹西南風急質遣其將尹周之攻西壘子反度東岸就𤣥謨計事聞之馳歸周之攻壘甚急偏將劉季之帥水軍殊死戰求救於𤣥謨𤣥謨不遣大司馬參軍崔勲之固争乃遣勲之與積弩將軍垣詢之救之比至城已䧟勲之詢之皆戰死詢之䕶之之弟也子反等犇還東岸質又遣其將龎法起將數千兵趨南浦欲自後掩𤣥謨逰擊將軍垣䕶之引水軍與戰破之朱修之㫁馬鞍山道據險自守魯秀攻之不克屢為修之所敗乃還江陵修之引兵躡之或勸修之急追修之曰魯秀驍將也獸窮則攫不可廹也王𤣥謨使垣䕶之告急於栁元景曰西城不守唯餘東城萬人賊軍數倍彊弱不敵退還姑孰欲就節下協力當之更議進取元景不許曰賊勢方盛不可先退吾當卷甲赴之䕶之曰賊謂南州有三萬人而將軍麾下裁十分之一若徃造賊壘則虚實露矣王豫州必不可来不如分兵援之元景曰善乃留羸弱自守悉遣精兵助𤣥謨多張旗幟梁山望之如數萬人皆以為建康兵悉至衆心乃安質請自攻東城諮議參軍顔樂之説義宣曰質若復克東城則大功盡歸之矣宜遣麾下自行義宣乃遣劉諶之與質俱進甲寅義宣至梁山頓兵兩岸質與劉諶之進攻東城𤣥謨督諸軍大戰薛安都帥突騎先衝其陳之東南䧟之斬諶之首劉季之宗越又䧟其西北質等兵大敗垣䕶之燒江中舟艦烟熖覆水延及西岸營壘殆盡諸軍乗勢攻之義宣兵亦潰義宣單舸迸走閉戸而泣荆州人隨之者猶百餘舸質欲見義宣計事而義宣已去質不知所為亦走其衆皆降散己未觧嚴六月臧質至尋陽焚燒府舍載妓妾西走使嬖人何文敬領餘兵居前至西陽西陽太守魯方平紿文敬曰詔書唯捕元惡餘無所問不如逃之文敬棄衆亡去質先以妹夫羊沖為武昌郡質徃投之沖已為郡丞胡庇之所殺質無所歸乃逃于南湖掇蓮實噉之追兵至以荷覆頭自沉於水出其鼻戊辰軍主鄭俱兒望見射之中心兵刃亂至腸胃縈水草斬首送建康子孫皆棄市并誅其黨豫章太守樂安任薈之臨川内史劉懐之鄱陽太守杜仲儒仲儒驥之兄弟也功臣栁元景等封賞各有差丞相義宣走至江夏聞巴陵有軍回向江陵衆散且盡與左右十許人徒歩脚痛不能前僦民露車自載縁道求食至江陵郭外遣人報竺超民超民具羽儀兵衆迎之時荆州帶甲尚萬餘人左右翟靈寳誡義宣使撫慰將佐以臧質違指授之宜用致失利今治兵繕甲更為後圖昔漢髙百敗終成大業而義宣忘靈寳之言誤云項羽千敗衆咸掩口魯秀竺超民等猶欲收餘兵更圗一决而義宣惽阻無復神守入内不復出左右腹心稍稍離叛魯秀逃走義宣不能自立欲隨秀去乃携息慆及所愛妾五人著男子服相隨城内擾亂白刃交横義宣懼墜馬遂歩進竺超民送至城外更以馬與之歸而城閉義宣求秀不得左右盡棄之夜復還南郡空廨旦日超民收送刺姦義宣止獄戸坐地嘆曰臧質老奴誤我五妾尋被遣出義宣號泣語獄吏曰常日非苦今日分别始是苦魯秀衆散不能去還向江陵城上人射之秀赴水死就取其首詔右僕射劉延孫使荆江二州旌别枉直就行誅賞且分割二州之地議更置新州初晉氏南遷以揚州為京畿榖帛所資皆出焉以荆江為重鎮甲兵所聚盡在焉常使大將居之三州戸口居江南之半上惡其彊大故欲分之癸未分揚州浙東五郡置東揚州治㑹稽分荆湘江豫州之八郡置郢州治江夏罷南蠻校尉遷其營於建康太傅義恭議使郢州治巴陵尚書令何尚之曰夏口在荆江之中正對沔口通接雍梁實為津要由来舊鎮根基不易既有見城浦大容舫於事為便上從之既而荆揚因此虚耗尚之請復合二州上不許上惡宗室彊盛不欲權在臣下太傅義恭知其指故請省之上使王公八座與荆州刺史朱修之書令丞相義宣自為計書未達庚寅修之入江陵殺義宣并誅其子十六人及同黨竺超民從事中郎蔡超諮議參軍顔樂之等超民兄弟應從誅何尚之上言賊既遁走一夫可擒若超民反覆昧利即當取之非唯免愆亦可要不義之賞而超民曽無此意正足觀過知仁且為官保全城府謹守庫藏端坐待縳今戮及兄弟則與其餘逆黨無異於事為重上乃原之竟陵王之叛宋武帝孝建二年春二月辛巳以尚書右僕射劉延孫為南兖州刺史冬十月壬午以竟陵王誕為司空領南徐州刺史大明元年秋八月甲辰徙司空南徐州刺史竟陵王誕為南兖州刺史以太子詹事劉延孫為南徐州刺史初髙祖遺詔以亰口要地去建康密邇自非宗室近親不得居之延孫先雖與髙祖同源而髙祖屬彭城延孫為莒縣從来不序昭穆上既命延孫鎮亰口仍詔與延孫合族使諸王皆序長幼上閨門無禮不擇親踈尊卑流聞民間無所不至誕寛而有禮又誅太子劭丞相義宣皆有大功人心竊向之誕多聚才力之士蓄精甲利兵上由是畏而忌之不欲誕居中使出鎮京口猶嫌其逼更徙廣陵以延孫腹心之臣故使鎮京口以防之三年夏四月竟陵王誕知上意忌之亦潜為之備因魏人入冦修城浚隍聚糧治仗誕記室參軍江智淵知誕有異志請假先還建康上以為中書侍郎智淵夷之弟子也少有操行沈懐文毎稱之曰人所應有盡有人所應無盡無者其唯江智淵乎是時道路皆云誕反㑹呉郡民劉成上書稱息道龍昔事誕見誕在石頭城修乗輿法物習唱警蹕道龍憂懼私與伴侣言之誕殺道龍又豫章民陳談之上書稱弟詠之在誕左右見誕䟽陛下年紀姓諱徃巫鄭師憐家祝詛詠之密以啟聞誕誣詠之乗酒罵詈殺之上乃令有司奏誕罪惡請收付廷尉治罪乙卯詔貶誕爵為侯遣之國詔書未下先以羽林禁兵配兖州刺史垣閬使以之鎮為名與給事中戴明寳襲誕閬至廣陵誕未悟也明寳夜報誕典籖蔣成使明晨開門為内應成以告府舍人許宗之宗之入告誕誕驚起呼左右及素所蓄飬數百人執蒋成勒兵自衛天將曉明寳與閬帥精兵數百人猝至而門不開誕已列兵登陴自在門上斬蔣成赦作徒繫囚開門擊閬殺之明寳從間道逃還詔内外纂嚴以始興公沈慶之為車騎大將軍開府儀同三司南兖州刺史將兵討誕甲子上親揔禁兵頓宣武堂司州刺史劉季之誕故將也素與都督宗慤有隙聞誕反恐為慤所害委官間道欲赴朝廷至盱眙盱眙太守鄭瑗疑季之與誕同謀邀殺之沈慶之至歐陽誕遣慶之宗人沈道愍齎書説慶之餉以玉環刀慶之遣道愍返數以罪惡誕焚郭邑驅居民悉使入城閉門自守分遣書檄邀結逺近時山陽内史梁曠家在廣陵誕執其妻子遣使邀曠曠斬使拒之誕怒滅其家誕奉表投之城外曰陛下信用讒言遂令無名小人来相掩襲不任枉酷即加誅翦雀䑕貪生仰違詔敕今親勒部曲扞徐兖先經何福同生皇家今有何愆便成胡越陵鋒奮戈萬沒豈顧戡定之期冀在旦夕又曰陛下宫帷之醜豈可三緘上大怒凡誕左右腹心同籍朞親在建康者並誅之死者以千數或有家人已死方自城内出犇者慶之至城下誕登樓謂之曰沈公垂白之年何苦来此慶之曰朝廷以君狂愚不足勞少壯故耳上慮誕奔魏使慶之㫁其走路慶之移營白土去城十八里又進軍新亭豫州刺史宗慤徐州刺史劉道隆並帥衆来㑹兖州刺史沈僧明慶之兄子也亦遣兵助慶之先是誕誑其衆云宗慤助我慤至繞城躍馬呼曰我宗慤也誕見衆軍大集欲棄城北走留中兵參軍申靈賜守廣陵自將歩騎數百人親信並自随聲云出戰邪趨海陵道慶之遣龍驤將軍武念追之誕行十餘里衆皆不欲去互請誕還城誕曰我還易耳卿能為我盡力乎衆皆許諾誕乃復還築壇㰱血以誓衆凡府州文武皆加秩以主簿劉琨之為中兵參軍琨之遵考之子也辭曰忠孝不得並琨之老父在不敢承命誕囚之十餘日終不受乃殺之右衛將軍垣䕶之虎賁中郎將殷孝祖等擊魏還至廣陵上並使受慶之節度慶之進營逼廣陵城誕餉慶之食提挈者百餘人出自北門慶之不開視悉焚之誕於城上授函表請慶之為送慶之曰我受詔討賊不得為汝送表汝必欲歸死朝廷應開門遣使吾為汝䕶送六月上命沈慶之為三烽於桑里若克外城舉一烽克内城舉兩烽擒到誕舉三烽璽書督趨前後相繼慶之焚其東門塞塹造攻道立行樓土山并諸攻具值久雨不得攻城上使御史中丞庾徽之奏免慶之官詔勿問以激之自四月至于秋七月雨止城猶未拔上怒命太史擇日將自濟江討誕太宰義恭固諌乃止誕初閉城拒使者記室參軍山隂賀弼固諌誕怒抽刀向之乃止誕遣兵出戰屡敗將佐多踰城出降或勸弼宜早出弼曰公舉兵向朝廷此事既不可從荷公厚恩又義無違背唯當以死明心耳乃飲藥自殺參軍何康之等謀開門納官軍不果斬關出降誕為髙樓置康之母於其上暴露之不為食母呼康之數日而死誕以中軍長史入濟陽范義為左司馬義母妻子皆在城内或謂義曰事必不振子其行乎義曰吾人吏也子不可以棄母吏不可以叛君必若何康之而活吾弗為也沈慶之帥衆攻城身先士卒親犯矢石乙巳克其外城乗勝而進又克小城誕聞兵入走趨後園隊主沈𦙍之等追及之擊傷誕墜水引出斬之誕母妻皆自殺上聞廣陵平出宣陽門敕左右皆呼萬嵗侍中蔡興宗陪輦上顧曰卿何獨不呼興宗正色曰陛下今日正應出涕泣行誅豈得皆稱萬嵗上不恱詔貶誕姓留氏廣陵城中士民無小大悉命殺之沈慶之請自五尺以下全之其餘男子皆死女子以為軍賞猶殺三千餘口長水校尉宗越臨決皆先刳腸抉眼或笞靣鞭腹苦酒灌創然後斬之越對之欣欣若有所得上聚其首於石頭南岸為京觀侍中沈懐文諌不聼初誕自知將敗使黄門吕曇濟與左右素所信者將世子景粹匿於民間謂曰事若不濟思相全脫如其不免可深埋之各分以金寳齎送既出門並散走唯曇濟不去携負景粹十餘日捕得斬之臨川内史楊璿坐與誕素善下獄死擢梁曠為後將軍贈劉琨之給事黄門侍郎蔡興宗奉㫖慰勞廣陵興宗與范義素善收歛其尸送䘮歸豫章上謂曰卿何敢故觸王憲興宗抗言對曰陛下自殺賊臣自𦵏故交何不可之有上有慙色通鑑紀事本末卷十九下
