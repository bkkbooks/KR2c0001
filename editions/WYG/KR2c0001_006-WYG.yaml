body:
  text: 通鑑紀事本末卷六上宋袁樞撰光武平赤眉王莽始建國二年春二月下詔曰周禮有賖貸樂語有五均傳記各有筦焉今開賖貸張五均設諸筦者所以齊衆庶抑并兼也遂於長安及洛陽邯鄲臨菑宛成都立五均司市錢府官天鳯四年秋八月莽置羲和命士以督五均六筦郡有數人皆用富賈為之乘傳求利交錯天下因與郡縣通姦多張空簿府藏不實百姓愈病是嵗莽復下詔申明六筦每一筦為設科條防禁犯者罪至死姦吏猾民並侵衆庻各不安生又一切調上公以下諸有奴婢者率一口出錢三千六百天下愈愁納言馮常以六筦諫莽大怒免常官灋令煩苛民揺手觸禁不得耕桑繇役煩劇而枯旱蝗蟲相因獄訟不決吏用苛暴立威旁縁莽禁侵刻小民富者不自保貧者無以自存於是並起為盗賊依阻山澤吏不能禽而覆蔽之浸滛日廣五年春琅邪樊崇起兵於莒衆百餘人轉入太山群盗以崇勇猛皆附之一歳間至萬餘人崇同郡人逢平東海人徐宣謝禄楊音各起兵合數萬人復引從崇共還攻莒不能下轉掠青徐間地皇三年夏四月遣太師王匡更始將軍廉丹東討衆賊初樊崇等衆既䆮盛乃相與為約殺人者死傷人者償創其中最尊號三老次從事次卒史及聞太師更始將討之恐其衆與莽兵亂乃皆朱其眉以相識别由是號曰赤眉匡丹合將鋭士十餘萬人所過放縱東方為之語曰寧逢赤眉不逢太師太師尚可更始殺我淮陽王更始元年冬十月更始遣使降赤眉樊崇等聞漢室復興即畱其兵自將渠帥二十餘人隨使者至洛陽更始皆封為列侯崇等既未有國邑而畱衆稍有離叛者乃復亡歸其營二年冬赤眉樊崇等將兵入頴川分其衆為二部崇與逢安為一部徐宣謝禄楊音為一部赤眉雖數戰勝而疲敝厭兵皆日夜愁泣思欲東歸崇等計議慮衆東向必散不如西攻長安於是崇安自武關宣等從陸渾關兩道俱入更始使王匡成丹與抗威將軍劉均等分據河東𢎞農以拒之蕭王度赤眉必破長安乃拜鄧禹為前將軍中分麾下精兵二萬人遣西入關漢光武建武元年春正月赤眉二部俱㑹𢎞農更始遣討難將軍蘇茂拒之茂軍大敗赤眉衆遂大集乃分萬人為一營凡三十營三月更始遣丞相松與赤眉戰於蓩鄉松等大敗死者三萬餘人赤眉遂轉北至湖六月張卬王匡叛更始入長安赤眉進至華隂軍中有齊巫常鼓舞祠城陽景王巫狂言景王大怒曰當為縣官何故為賊有笑巫者輙病軍中驚動方望弟陽説樊崇等曰今將軍擁百萬之衆西向帝城而無稱號名為群賊不可以久不如立宗室挾議誅伐以此號令誰敢不從崇等以為然而巫言益甚前至鄭乃相與議曰今廹近長安而鬼神若此當求劉氏共尊立之先是赤眉過式掠故式侯萌之子恭茂盆子三人自隨恭少習尚書隨樊崇等降更始於洛陽復封式侯為侍中在長安茂與盆子畱軍中屬右校卒史劉俠卿主牧牛及崇等欲立帝求軍中景王後得七十餘人惟茂盆子及前西安侯孝最為近屬崇等曰聞古者天子將兵稱上將軍乃書札為符曰上將軍又以兩空札置笥中於鄭北設壇埸祠城陽景王諸三老從事皆大㑹列盆子等三人居中立以年次探札盆子最幼後探得符諸將皆稱臣拜盆子時年十五被髪徒跣敝衣赭汗見衆拜恐畏欲啼茂謂曰善藏符盆子即齧折棄之以徐宣為丞相樊崇為御史大夫逢安為左大司馬謝禄為右大司馬其餘皆列卿將軍盆子雖立猶朝夕拜劉俠卿時欲出從牧兒戱俠卿怒止之崇等亦不復候視也秋八月赤眉至髙陵張卬等降之九月赤眉入長安更始單騎走從厨城門出式侯恭以赤眉立其弟自繫詔獄聞更始敗走乃出見定陶王祉祉為之除械相與從更始於渭濵右輔都尉嚴本恐失更始為赤眉所誅即將更始至髙陵本將兵宿衞其實圍之更始將相皆降赤眉獨丞相曹竟不降手劔格死冬十月赤眉下書曰聖公降者封為長沙王過二十日勿受更始遣劉恭請降赤眉使其將謝禄往受之更始隨禄肉􅃝上璽綬於盆子赤眉坐更始置庭中將殺之劉恭謝禄為請不能得遂引更始出劉恭追呼曰臣誠力極請得先死㧞劔欲自刎樊崇等遽共救止之乃赦更始封為畏威侯劉恭復為固請竟得封長沙王更始常依謝禄居劉恭亦擁䕶之劉盆子居長樂宫三輔郡縣營長遣使貢獻兵士輙剽奪之又數暴掠吏民由是皆復固守百姓不知所歸聞鄧禹乘勝獨克而師行有紀皆望風相攜負以迎諸降者日以千數衆號百萬禹所止輙停車拄節以勞來之父老童穉埀髪戴白滿其車下莫不感悦於是名震關西諸將豪桀皆勸禹徑攻長安禹曰不然今吾衆雖多能戰者少前無可仰之積後無轉饋之資赤眉新㧞長安財榖充實鋒鋭未可當也夫盗賊群居無終日之計財榖雖多變故萬端寧能堅守者也上郡北地安定三郡土廣人稀饒榖多畜吾且休兵北道就糧養士以觀其敝乃可圖也於是引軍北至枸邑所到諸營保郡邑皆開門歸附三輔苦赤眉暴虐皆憐更始欲盗出之張卬等深以為慮使謝禄縊殺之劉恭夜往收藏其尸帝詔鄧禹葬之於霸陵帝以關中未定而鄧禹久不進兵賜書責之曰司徒堯也亡賊桀也長安吏民遑遑無所依歸宜以時進討鎮慰西京繋百姓之心禹猶執前意别攻上郡諸縣更徴兵引榖歸至大要積弩將軍馮愔車騎將軍宗歆守栒邑二人爭權相攻愔遂殺歆因反撃禹禹遣使以聞帝問使人愔所親愛為誰對曰䕶軍黄防帝度愔防不能久和執必相忤因報禹曰縛馮愔者必黄防也乃遣尚書宗廣持節往降之後月餘防果執愔將其衆歸罪更始諸將王匡胡殷成丹等皆詣廣降臘日赤眉設樂大㑹酒未行群臣更相辨鬭而兵衆遂各踰宫斬關入掠酒肉互相殺傷衞尉諸葛穉聞之勒兵入格殺百餘人乃定劉盆子惶恐日夜啼泣從官皆憐之二年春正月劉恭知赤眉必敗宻教弟盆子歸璽綬習為辭讓之言及正旦大㑹恭先曰諸君共立恭弟為帝德誠深厚立且一年殽亂日甚誠不足以相成恐死而無益願得退為庻人更求賢知唯諸君省察樊崇等謝曰此皆崇等罪也恭復固請或曰此寧式侯事邪恭惶恐起去盆子乃下牀解璽綬叩頭曰今設置縣官而為賊如故四方怨恨不復信向此皆立非其人所致願乞骸骨避賢聖路必欲殺盆子以塞責者無所離死因涕泣噓唏崇等及㑹者數百人莫不哀憐之乃皆避席頓首曰臣無狀負陛下請自今已後不敢復放縱因共抱持盆子帶以璽綬盆子號呼不得已既罷出各閉營自守三輔翕然稱天子聰明百姓爭還長安市里且滿後二十餘日復出大掠如故長安城中糧盡赤眉收載珍寳大縱火燒宫室市里恣行殺掠長安城中無復人行乃引兵而西衆號百萬自南山轉掠城邑遂入安定北地鄧禹引兵南至長安軍昆明池謁祠髙廟收十一帝神主送詣洛陽因廵行園陵為置吏士奉守焉九月赤眉引兵欲西上隴隗囂遣將軍楊廣迎撃破之又追敗之於烏氏涇陽間赤眉至陽城番須中逢大雪坑谷皆滿士多凍死乃復還發掘諸陵取其寳貨凡有玉匣殮者率皆如生賊遂汙辱吕后尸鄧禹遣兵撃之於郁夷反為所敗禹乃出之雲陽赤眉復入長安延岑屯杜陵赤眉將逢安撃之鄧禹以安精兵在外引兵襲長安㑹謝禄救至禹兵敗走延岑撃逢安大破之死者十餘萬人廖湛將赤眉十八萬攻漢中王嘉嘉與戰於谷口大破之嘉手殺湛遂到雲陽就榖嘉妻兄新野來歙帝之姑子也帝令鄧禹招嘉嘉因歙詣禹降鄧禹自馮愔叛後威名稍損又乏糧食戰數不利歸附者日益離散赤眉延岑暴亂三輔郡縣大姓各擁兵衆禹不能定帝乃遣偏將軍馮異代禹討之車駕送至河南敇異曰三輔遭王莽更始之亂重以赤眉延岑之醜元元塗炭無所依訴將軍今奉辭討諸不軌營堡降者遣其渠帥詣京師散其小民令就農桑壊其營壁無使復聚征伐非必畧地屠城要在平定安集之耳諸將非不徤鬬然好虜掠卿本能御吏士念自脩敕無為郡縣所苦異頓首受命引而西所至布威信羣盗多降臣光曰昔周人頌武王之德曰敷時繹思我徂惟求定言王者之兵志在布陳威德安民而已觀光武之所以取關中用是道也豈不美哉又詔徵鄧禹還曰慎毋與窮冦争鋒赤眉無榖自當來東吾以飽待饑以逸待勞折箠笞之非諸將憂也無得復妄進兵三輔大饑人相食城郭皆空白骨蔽野遺民往往聚為營保各堅壁清野赤眉虜掠無所得乃引而東歸衆尚二十餘萬隨道復散帝遣破姦將軍侯進等屯新安建威大將軍耿弇等屯宜陽以要其還路敕諸將曰賊若東走可引宜陽兵㑹新安賊若南走可引新安兵㑹宜陽馮異與赤眉遇於華隂相拒六十餘日戰數十合降其將卒五千餘人三年春正月甲子以馮異為征西大將軍鄧禹慙於受任無功數以饑卒徼赤眉戰輙不利乃率車騎將軍鄧𢎞等自河北度至湖要馮異共攻赤眉異曰異與賊相拒數十日雖虜獲雄將餘衆尚多可稍以恩信傾誘難卒用兵破也上今使諸將屯澠池要其東而異撃其西一舉取之此萬成計也禹𢎞不從𢎞遂大戰移日赤眉陽敗棄輜重走車皆載土以豆覆其上兵士饑爭取之赤眉引還撃𢎞𢎞軍潰亂異與禹合兵救之赤眉小郤異以士卒饑倦可且休禹不聴復戰大為所敗死傷者三千餘人禹以二十四騎脱歸宜陽異棄馬步走上回谿阪與麾下數人歸營收其散卒復堅壁自守閠月馮異與赤眉約期㑹戰使壯士變服與赤眉同伏於道側旦日赤眉使萬人攻異前部異少出兵以救之賊見埶弱遂悉衆攻異異乃縱兵大戰日昃賊氣衰伏兵卒起衣服相亂赤眉不復識别衆遂驚潰追撃大破之於崤底降男女八萬人帝降璽書勞異曰始雖垂翅回谿終能奮翼澠池可謂失之東隅收之桑榆方論功賞以答大勲赤眉餘衆東向宜陽甲辰帝親勒六軍嚴陳以待之赤眉忽遇大軍驚震不知所謂乃遣劉恭乞降曰盆子將百萬衆降陛下何以待之帝曰待汝以不死耳丙午盆子及丞相徐宣以下三十餘人肉袒降上所得傳國璽綬積兵甲宜陽城西與熊耳山齊赤眉衆尚十餘萬人帝令縣厨皆賜食明日大陳兵馬臨雒水令盆子君臣列而觀之帝謂樊崇等曰得毋悔降乎朕今遣卿歸營勒兵鳴鼓相攻決其勝負不欲彊相服也徐宣等叩頭曰臣等出長安東都門君臣計議歸命聖德百姓可與樂成難與圖始故不告衆耳今日得降猶去虎口歸慈母誠歡誠喜無所恨也帝曰卿所謂鐡中錚錚傭中佼佼者也戊申還自宜陽帝令樊崇等各與妻子居雒陽賜之田宅其後樊崇逢安反誅楊音徐宣卒於鄉里帝憐盆子以為趙王郎中後病失明賜榮陽均輸官地使食其税終身劉恭為更始報仇殺謝禄自繋獄帝赦不誅光武平漁陽淮陽王更始元年宛人彭寵呉漢亡命在漁陽鄉人韓鴻為更始使徇北州承制拜寵偏將軍行漁陽太守事以漢為安樂令二年邯鄲王郎遣將狥漁陽上谷上谷太守耿况約寵俱歸大司馬秀事見光武中興漢光武建武二年帝之討王郎也彭寵發突騎以助軍轉糧食前後不絶及帝追銅馬至薊寵自負其功意望甚髙帝接之不能滿以此懐不平及即位呉漢王梁寵之所遣並為三公而寵獨無所加愈怏怏不得志歎曰如此我當為王但爾者陛下忘我邪是時北州破散而漁陽差完有舊鐡官寵轉以貿榖積珍寳益富彊幽州牧朱浮年少有俊才欲厲風迹收士心辟召州中名宿及王莽時故吏二千石皆引置幕府多發諸郡倉榖禀贍其妻子寵以為天下未定師旅方起不宜多置官屬以損軍實不從其令浮性矜急自多寵亦狠彊嫌怨轉積浮數譖構之密奏寵多聚兵榖意計難量上輙漏泄令寵聞以脅恐之至是有詔徴寵寵上訴願與浮俱徴帝不許寵益以自疑其妻素剛不堪抑屈固勸無受徴曰天下未定四方各自為雄漁陽大郡兵馬最精何故為人所奏而棄此去乎寵又與所親信吏計議皆懐怨於浮莫有勸行者帝遣寵從弟子后蘭卿喻之寵因畱子后蘭卿遂發兵反拜署將帥自將二萬餘人攻朱浮於薊又以與耿况俱有重功而恩賞並薄數遣使要誘况况不受斬其使八月帝遣游撃將軍鄧隆助朱浮討彭寵隆軍潞南浮軍雍奴遣吏奏狀帝讀檄怒謂使吏曰營相去百里其埶豈可得相及比若還北軍必敗矣彭寵果遣輕兵撃隆軍大破之浮逺遂不能救三年三月涿郡太守張豐反自稱無上大將軍與彭寵連兵朱浮以帝不自征彭寵上䟽求救詔報曰往年赤眉䟦扈長安吾䇿其無榖必東果来歸附今度此反虜勢無久全其中必有内相斬者今軍資未充故須後麥耳浮城中糧盡人相食㑹耿況遣騎來救浮乃得脱身走薊城遂降於彭寵寵自稱燕王攻㧞右北平上谷數縣賂遺匈奴借兵為助又南結張步及冨平獲索諸賊皆與交通四年五月上將親征彭寵伏湛諫曰今兖豫青冀中國之都而冦賊從横未及從化漁陽邉外荒耗豈足先圖陛下捨近務逺棄易求難誠臣之所惑也上乃還帝遣建義大將軍朱祜建威大將軍耿弇征虜將軍祭遵驍騎將軍劉喜討張豐於涿郡祭遵先至急攻豐禽之初豐好方術有道士言豐當為天子以五綵囊裹石繋豐肘云石中有玉璽豐信之遂反既執當斬猶曰肘石有玉璽傍人為椎破之豐乃知被詐仰天歎曰當死無恨上詔耿弇進撃彭寵弇以父況與寵同功又兄弟無在京師者不敢獨進求詣雒陽詔報曰將軍舉宗為國功效尤著何嫌何疑而欲求徴況聞之更遣弇弟國入侍時祭遵屯良鄉劉喜屯陽鄉彭寵引匃奴兵欲擊之耿況使其子舒襲破匈奴兵斬兩王寵乃退走五年二月彭寵妻數為惡夢又多見怪變卜筮望氣者皆言兵當從中起寵以子后蘭卿質漢歸不信之使將兵居外無親於中寵齋在便室蒼頭子宻等三人因寵臥寐共縳著牀告外吏云大王齋禁皆使吏休偽稱寵命收縛奴婢各置一處又以寵命呼其妻妻入驚曰奴反奴乃捽其頭撃其頰寵急呼曰趣為諸將軍辦裝於是兩奴將妻入取寳物畱一奴守寵寵謂守奴曰若小兒吾素所愛也今為子密所廹劫耳解我縛當以女珠妻汝家中財物皆以與若小奴意欲解之視户外見子宻聴其語遂不敢解於是收金玉衣物至寵所裝之被馬六匹使妻縫兩縑囊昏夜後解寵手令作記告城門將軍云今遣子宻等至子后蘭卿所速開門出勿稽畱之書成斬寵及妻頭置囊中便持記馳出城因以詣闕明旦閤門不開官屬踰牆而入見寵尸驚怖其尚書韓立等共立寵子午為王國師韓利斬午首詣祭遵降夷其家族帝封子宻為不義侯權德輿議曰伯通之叛命子宻之戕君同歸於亂罪不相蔽宜各致於法昭示王度反乃爵於五等又以不義為名且舉以不義莫可侯也此而可侯漢爵為不足勸矣春秋書齊豹盜三叛人名之義毋乃異於是乎光武平齊淮陽王更始元年冬十月故梁王立之子永詣洛陽更始封為梁王都睢陽二年冬梁王永據國起兵招諸郡豪桀沛人周建等並署為將帥攻下濟隂山陽沛楚淮陽汝南凢得二十八城又遣使拜西防賊帥山陽佼彊為横行將軍東海賊帥董憲為翼漢大將軍琅邪賊帥張步為輔漢大將軍督青徐二州與之連兵遂專㨿東方漢光武建武元年十一月梁王永稱帝於睢陽初更始以王閎為琅邪太守張歩據郡拒之閎諭降得贛榆等六縣收兵與歩戰不勝歩既受劉永官號治兵於劇遣將狥㤗山東萊城陽膠東北海濟南齊郡皆下之閎力不敵乃詣歩相見歩大陳兵而見之怒曰歩有何罪君前見攻之甚閎按劔曰太守奉朝命而文公擁兵相距閎攻賊耳何謂甚邪歩起跪謝與之宴飲待為上賔令閎關掌郡事二年夏四月虎牙大將軍蓋延都駙馬都尉馬武等四將軍撃劉永破之遂圍永於睢陽故更始將蘓茂反殺淮陽太守潘蹇據廣樂而臣於永永以茂為大司馬淮陽王秋八月蓋延圍睢陽數月克之劉永走至虞虞人反殺其母妻永與麾下數十人犇譙蘓茂佼彊周建合軍三萬餘人救永延與戰於沛西大破之永彊建走保湖陵茂犇還廣樂延遂定沛楚臨淮帝使大中大夫伏隆持節使青徐二州招降郡國青徐羣盗聞劉永破敗皆惶怖請降張歩遣其掾孫昱隨隆詣闕上書獻鰒魚隆湛之子也帝以伏隆為光禄大夫復使於張歩拜歩東萊太守并與新除青州牧守都尉俱東詔隆輙拜令長以下三年二月劉永立董憲為海西王永聞伏隆至劇亦遣使立張歩為齊王歩貪王爵猶豫未決隆曉譬曰髙祖與天下約非劉氏不王今可得為十萬户侯耳歩欲畱隆與共守二州隆不聴求得反命歩遂執隆而受永封隆遣間使上書曰臣隆奉使無狀受執凶逆雖在困阨授命不顧又吏民知歩反叛心不附之願以時進兵無以臣隆為念臣隆得生到闕廷受誅有司此其大願若令没身冦手以父母昆弟長累陛下陛下與皇后太子永享萬國與天無極帝得隆奏召其父湛流涕示之曰恨不且許而遽求還也其後歩遂殺之帝方北憂漁陽南事梁楚故張歩得專集齊地據郡十二焉夏四月呉漢率驃騎大將軍杜茂等七將軍圍蘓茂於廣樂周建招集得十餘萬人救之漢迎與之戰不利墮馬傷厀還營建等遂連兵入城諸將謂漢曰大敵在前而公傷卧衆心懼矣漢乃勃然裹創而起椎牛饗士慰勉之士氣自倍旦日蘇茂周建出兵圍漢漢奮撃大破之茂走還湖陵睢陽人反城迎劉永蓋延率諸將圍之呉漢畱杜茂陳俊守廣樂自將兵助延圍睢陽秋七月蓋延圍睢陽百日劉永蘇茂周建突出將走酇延追撃之急永將慶吾斬永首降蘇茂周建犇垂惠共立永子紆為梁王佼彊犇保西防四年秋七月丁亥上幸譙遣捕虜將軍馬武騎都尉王霸圍劉紆周建於垂惠董憲將賁休以蘭陵降憲聞之自剡圍之蓋延及平狄將軍山陽龐萌在楚請往救之帝敕曰可直往擣郯則蘭陵自解延等以賁休城危遂先赴之憲逆戰而陽敗退延等因㧞圍入城明日憲大出兵合圍延等懼遽出突走因往攻郯帝讓之曰間欲先赴郯者以其不意故耳今既犇走賊計已立圍豈可解乎延等至郯果不能克而董憲遂㧞蘭陵殺賁休五年二月蘇茂將五校兵救周建於垂惠馬武為茂建所敗犇過王霸營大呼求救霸曰賊兵盛出必兩敗努力而已乃閉營堅壁軍吏皆爭之霸曰茂兵精鋭其衆又多吾吏士心恐而捕虜與吾相恃兩軍不一此敗道也今閉營固守示不相援賊必乗勝輕進捕虜無救其戰自倍如此茂衆疲勞吾承其敝乃可克也茂建果悉出攻武合戰良久霸軍中壯士數十人斷髪請戰霸乃開營後出精騎襲其背茂建前後受敵驚亂敗走霸武各歸營茂建復聚兵挑戰霸堅臥不出方饗士作倡樂荗雨射營中中霸前酒樽霸安坐不動軍吏皆曰茂前日已破今易撃也霸曰不然蘇茂客兵逺來糧食不足故數挑戰以徼一時之勝今閉營休士所謂不戰而屈人兵者也茂建既不得戰乃引還營其夜周建兄子誦反閉城拒之建於道死茂犇下邳與董憲合劉紆犇佼彊上詔耿弇進討張步三月將軍龎萌為人遜順帝信愛之常稱曰可以託六尺之孤寄百里之命者龎萌是也使與蓋延共撃董憲時詔書獨下延而不及萌萌以為延譖已自疑遂反襲延軍破之與董憲連和自號東平王屯桃鄉之北帝聞之大怒自將討萌與諸將書曰吾常以龎萌為社稷之臣將軍得毋笑其言乎老賊當族其各厲兵馬㑹睢陽龎萌攻破彭城將殺楚郡太守孫萌郡吏劉平伏太守身上號泣請代其死身被七創龎萌義而捨之太守已絕復蘇渇求飲平傾創血以飲之六月董憲與劉紆蘇茂佼彊去下邳還蘭陵使茂彊助龎萌圍桃城帝時幸蒙聞之乃畱輜重自將輕兵晨夜馳赴至亢父或言百官疲倦可且止宿上不聴復行十里宿在城去桃城六十里旦日諸將請進龎萌等亦勒兵挑戰帝令諸將不得出休士養鋭以挫其鋒時呉漢等在東郡馳使召之萌等驚曰數百里晨夜行以為至當戰而堅坐任城致人城下真不可往也乃悉兵攻桃城城中聞車駕至衆心益固萌等攻二十餘日衆疲困不能下呉漢王常蓋延王梁馬武王霸等皆至帝乃率衆軍進救桃城親自摶戰大破之龎萌蘇茂佼彊夜走從董憲秋七月丁丑帝幸沛進幸湖陵董憲與劉紆悉其兵數萬人屯昌慮憲招誘五校餘賊與之拒守建陽帝至蕃去憲所百餘里諸將請進帝不聴知五校乏食當退敕各堅壁以待其敝頃之五校果引去帝乃親臨四面攻憲三日大破之佼彊將其衆降蘇茂犇張歩憲及龎萌走保郯八月己酉帝幸郯畱呉漢攻之車駕轉徇彭城下邳呉漢㧞郯董憲龎萌走保朐劉紆不知所歸其軍士髙扈斬之以降呉漢進圍朐冬十月張歩聞耿弇將至使其大將軍費邑軍厯下又令兵屯祝阿别於㤗山鐘城列營數十以待之弇渡河先擊祝阿自旦攻城日未中而㧞之故開圍一角令其衆得犇歸鐘城鐘城人聞祝阿已潰大恐懼遂空壁亡去費邑分遣弟敢守巨里弇進兵先脅巨里嚴令軍中趣脩攻具宣敇諸部後三日當悉力攻巨里城隂緩生口令得亡歸以弇期告邑邑至日果自將精兵三萬餘人來救之弇喜謂諸將曰吾所以脩攻具者欲誘致之耳野兵不撃何以城為即分三千人守巨里自引精兵上岡阪乘髙合戰大破之臨陳斬邑既而收首級以示城中城中兒懼費敢悉衆亡歸張歩弇復收其積聚縱兵撃諸未下者平四十餘營遂定濟南時張歩都劇使其弟藍將精兵二萬守西安諸郡太守合萬餘人守臨菑相去四十里弇進軍畫中居二城之間弇視西安城小而堅且藍兵又精臨菑名雖大而實易攻乃敕諸校後五日㑹攻西安藍聞之晨夜警守至期夜半弇敕諸將皆蓐食㑹明至臨菑城䕶軍荀梁等爭之以為攻臨菑西安必救之攻西安臨菑不能救不如攻西安弇曰不然西安聞吾欲攻之日夜為備方自憂何暇救人臨菑出不意而至必驚擾吾攻之一日必㧞㧞臨菑即西安孤與劇隔絕必復亡去所謂撃一而得二者也若先攻西安不能卒下頓兵堅城死傷必多縱能㧞之藍引軍還奔臨菑并兵合勢觀人虛實吾深入敵地後無轉輸旬月之間不戰而困矣遂攻臨菑半日㧞之入據其城張藍聞之懼遂將其衆亡歸劇弇乃令軍中無得虜掠湏張歩至乃取之以激怒歩歩聞大笑曰以尤來大彤十餘萬衆吾皆即其營而破之今大耿兵少於彼又皆疲勞何足懼乎乃與三弟藍𢎞夀及故大彤渠師重異等兵號二十萬至臨菑大城東將攻弇弇上書曰臣據臨菑深塹髙壘張歩從劇縣來攻疲勞饑渇欲進誘而攻之欲去随而擊之臣依營而戰精鋭百倍以逸待勞以實擊虛旬日之間歩首可獲於是弇先出菑水上與重異遇突騎欲縱弇恐挫其鋒令歩不敢進故示弱以盛其氣乃引歸小城陳兵於内使都尉劉歆泰山太守陳俊分陳於城下歩氣盛直攻弇營與劉歆等合戰弇升王宫壊䑓望之視歆等鋒交乃自引精兵以横突歩陳於東城下大破之飛矢中弇股以佩刀截之左右無知者至暮罷弇明旦復勒兵出是時帝在魯聞弇為歩所攻自往救之未至陳俊謂弇曰劇虜兵盛可且閉營休士以須上來弇曰乗輿且到臣子當撃牛釃酒以待百官反欲以賊虜遺君父邪乃出兵大戰自旦及昏復大破之殺傷無數溝塹皆滿弇知歩困將退豫置左右翼為伏以待之人定時歩果引去伏兵起縱撃追至鉅昧水上八九十里僵尸相屬收得輜重二千餘兩歩還劇兄弟各分兵散去後數日車駕至臨菑自勞軍羣臣大㑹帝謂弇曰昔韓信破厯下以開基今將軍攻祝阿以發迹此皆齊之西界功足相方而韓信襲撃已降將軍獨㧞勍敵其功又難於信也又田横烹酈生及田横降髙帝詔衞尉不聴為仇張步前亦殺伏隆若步來歸命吾當詔大司徒釋其怨又事尤相類也將軍前在南陽建此大策常以為落落難合有志者事竟成也帝進幸劇耿弇復追張歩歩犇平壽蘇茂將萬餘人來救之茂讓歩曰以南陽兵精延岑善戰而耿弇走之大王奈何就攻其營既呼茂不能待邪歩曰負負無可言者帝遣使告歩茂能相斬降者封為列侯歩遂斬茂詣耿弇軍門肉袒降弇傳詣行在所而勒兵入據其城樹十二郡旗鼓令歩兵各以郡人詣旗下衆尚十餘萬輜重七千餘兩皆罷遣歸鄉里張歩三弟各自繫所在獄詔皆赦之封歩為安丘侯與妻子居雒陽於是琅邪未平上徙陳俊為琅邪太守始入境盗賊皆散耿弇復引兵至城陽降五校餘黨齊地悉平振旅還京師弇為將凡所平郡四十六屠城三百未嘗挫折焉六年呉漢等㧞朐斬董憲龎萌江淮山東悉平諸將還京師光武平隴蜀淮陽王更始元年秋七月成紀隗崔隗義上邽楊廣冀人周宗同起兵以應漢衆數千人攻平襄殺莽鎮戎大尹李育崔兄子囂素有名好經書崔等共推為上將軍崔為白虎將軍義為左將軍囂遣使聘平陵方望以為軍師望説囂立髙廟於邑東已已祀髙祖太宗世宗囂等皆稱臣執事殺馬同盟以興輔劉宗移檄郡國數莽罪惡勒兵十萬撃殺雍州牧陳慶安定大尹王向分遣諸將狥隴西武都金城武威張掖酒泉燉煌皆下之初茂陵公孫述為清水長有能名遷導江卒正治臨卭漢兵起南陽宗成商人王岑起兵徇漢中以應漢殺王莽庸部牧宋遵衆合數萬人述遣使迎成等成等至成都虜掠暴横述召郡中豪桀謂曰天下同苦新室思劉氏久矣故聞漢將軍到馳迎道路今百姓無辜而婦子係獲此冦賊非義兵也乃使人詐稱漢使者假述輔漢將軍蜀郡太守兼益州牧印綬選精兵西撃成等殺之并其衆二年春二月更始徴隗囂及其叔父崔義等囂將行方望以為更始成敗未可知固止之囂不聴望以書辭謝而去囂等至長安更始以囂為右將軍崔義皆即舊號南鄭人延岑起兵據漢中漢中王嘉撃降之有衆數十萬夏四月更始遣柱功侯李寳益州刺史張忠將兵萬餘人徇蜀漢公孫述遣其弟恢撃寳忠於綿竹大破走之述遂自立為蜀王都成都民夷皆附之冬隗崔隗義謀叛歸天水隗囂恐并及禍乃告之更始誅崔義以囂為御史大夫汝南田戎攻陷夷陵衆數萬人漢光武建武元年春正月蜀郡功曹李熊説公孫述宜稱天子夏四月述即帝位號成家改元龍興以李熊為大司徒光為大司馬恢為大司空越嶲任貴據郡降述六月隗囂走歸天水十二月隗囂歸天水復招聚其衆興脩故業自稱西州上將軍三輔士大夫避亂者多歸囂囂傾身引接為布衣交以平陵范逡為師友前涼州刺史河南鄭興為祭酒茂陵申屠剛杜林為治書馬援為綏德將軍楊廣王遵周宗及平襄行廵阿陽王捷長陵王元為大將軍安陵班彪之屬為賔客由此名震西州聞於山東初平陵竇融累世仕宦河西知其土俗與更始右大司馬趙萌善因萌求往河西萌薦融於更始以為張掖屬國都尉是時酒泉太守梁統金城太守庫鈞張掖都尉史苞酒泉都尉竺曽敦煌都尉辛肜並州郡英俊融皆與厚善及更始敗融與梁統等計議曰今天下擾亂未知所歸河西斗絕在羗胡中不同心戮力則不能自守權鈞力齊復無以相率當推一人為大將軍共全五郡議既定乃推融行河西事五郡大將軍事以梁統為武威太守史苞為張掖太守竺曾為酒泉太守辛肜為敦煌太守融居屬國領都尉如故置從事監察五郡馮愔之反引兵向天水隗囂撃破之鄧禹承制命囂為西州大將軍專制涼州朔方事二年二月延岑復反圍南鄭漢中王嘉兵敗走岑遂據漢中進兵武都為更始柱功侯李寳所破岑走天水公孫述遣將侯丹取南鄭嘉收散卒得數萬人以李寳為相從武都南撃侯丹不利還軍河池下辨復與延岑連戰岑引北入散關至陳倉嘉追撃破之公孫述又遣將軍任滿從閬中下江州東據扞關於是盡有益州之地三年十一月帝謂太中大夫來歙曰今西州未附子陽稱帝道里阻逺諸將方務關東思西州方畧未知所在奈何歙曰臣嘗與隗囂相遇長安其人始起以漢為名臣願得奉威命開以丹青之信囂必束手自歸則述自亡之勢不足圖也帝然之始令歙使於囂囂既有功於漢又受鄧禹爵署其腹心議者多勸通使京師囂乃奉奏詣闕帝報以殊禮言稱字用敵國之儀所以慰藉之甚厚四年二月延岑復冦順陽遣鄧禹將兵撃破之岑犇漢中公孫述以岑為大司馬封汝寧王冬十月隗囂使馬援往觀公孫述援素與述同里閈相善以為既至當握手歡如平生而述盛陳陛衛以延援入交拜禮畢使出就舘更為援制都布單衣交讓冠㑹百官於宗廟中立舊交之位述鸞旗旄騎警蹕就車磬折而入禮饗官屬甚盛欲授援以封侯大將軍位賔客皆樂畱援曉之曰天下雄雌未定公孫不吐哺走迎國士與圖成敗反脩飾邊幅如偶人形此子何足久稽天下士乎因辭歸謂囂曰子陽井底蛙耳而妄自尊大不如專意東方囂乃使援奉書雒陽援初到良久中黄門引入帝在宣德殿南廡下但幘坐迎笑謂援曰卿遨遊二帝間今見卿使人大慙援頓首辭謝因曰當今之世非但君擇臣臣亦擇君矣臣與公孫述同縣少相善臣前至蜀述陛㦸而後進臣臣今逺來陛下何知非刺客姦人而簡易若是帝復笑曰卿非刺客顧説客耳援曰天下反覆盗名字者不可勝數今見陛下恢廓大度同符髙祖乃知帝王自有真也十二月公孫述聚兵數十萬人積糧漢中又造十層樓船多刻天下牧守印章遣將軍李育程烏將數萬衆出屯陳倉就吕鮪將徇三輔馮異迎撃大破之育烏俱犇漢中異還撃破吕鮪營堡降者甚衆是時隗囂遣兵佐異有功遣使上狀帝報以手書曰慕樂德義思相結納昔文王三分猶服事殷但駑馬鈆刀不可彊扶數䝉伯樂一顧之價將軍南拒公孫之兵北御羗胡之亂是以馮異西征得以數千百人躑躅三輔微將軍之助則咸陽已為他人禽矣如令子陽到漢中三輔願因將軍兵馬鼓旗相當儻肯如言即智士計功割地之秋也管仲曰生我者父母成我者鮑子自今以後手書相聞勿用傍人間搆之言其後公孫述數遣使間出囂輙與馮異合勢共摧挫之述遣使以大司空扶安王印綬授囂囂斬其使出兵撃之以故蜀兵不復北出五年春正月帝使來歙持節送馬援歸隴右隗囂與援共臥起問以東方事曰前到朝廷上引見數十每接燕語自夕至旦才明勇畧非人敵也且開心見誠無所隠伏闊逹多大節畧與髙帝同經學博覽政事文辯前世無比囂曰卿謂何如髙帝援曰不如也髙帝無可無不可今上好吏事動如節度又不喜飲酒囂意不懌曰如卿言反復勝邪二月岑彭攻㧞夷陵田戎亡入蜀盡獲其妻子士衆數萬人公孫述以戎為翼江王岑彭謀伐蜀以夾州榖少水險難漕畱威虜將軍馮駿軍江州都尉田鴻軍夷陵領軍李𤣥軍夷道自引兵還屯津鄉當荆州要㑹喻告諸蠻夷降者奏封其君長夏四月隗囂問於班彪曰往者周亡戰國並爭數世然復定意者從横之事復起於今乎將承運迭興在於一人也彪曰周之廢興與漢殊異昔周爵五等諸侯從政本根既微枝葉彊大故其末流有從横之事勢數然也漢承秦制改立郡縣主有尊巳之威臣無百年之柄至於成帝假借外家哀平短祚國嗣三絕故王氏擅朝能竊號位危自上起傷不及下是以即真之後天下莫不引領而歎十餘年間中外騷擾逺近俱發假號雲合咸稱劉氏不謀同辭方今雄桀𢃄州域者皆無六國世業之資而百姓謳吟思仰漢必復興已可知矣囂曰生言周漢之勢可也至於但見愚人習識劉氏姓號之故而謂漢復興踈矣昔秦失其鹿劉季逐而掎之時民復知漢乎彪乃為之著王命論以風切之曰昔堯之禪舜曰天之厯數在爾躬舜亦以命禹洎於稷契咸佐唐虞至湯武而有天下劉氏承堯之祚堯據火德而漢紹之有赤帝子之符故為鬼神所福饗天下所歸往由是言之未見運世無本功德不紀而得屈起在此位者也俗見髙祖興於布衣不逹其故至比天下於逐鹿幸捷而得之不知神器有命不可以智力求也悲夫此世所以多亂臣賊子者也夫餓饉流𨽻饑寒道路所願不過一金然終轉死溝壑何則貧窮亦有命也况虖天子之貴四海之富神明之祚可得而妄處哉故雖遭罹阨㑹竊其權柄勇如信布彊如梁籍威如王莽然卒潤鑊伏質亨醢分裂又况么麽尚不及數子而欲闇奸天位者虖昔陳嬰之母以嬰家世貧賤卒富貴不祥止嬰勿王王陵之母知漢王必得天下伏劔而死以固勉陵夫以匹婦之明猶能推事理之致探禍福之機而全宗祀於無窮垂策書於春秋而况大丈夫之事虖是故窮逹有命吉凶由人嬰母知廢陵母知興審此二者帝王之分決矣加之髙祖寛明而仁恕知人善任使當食吐哺納子房之策㧞足揮洗揖酈生之説舉韓信於行陳收陳平於亡命英雄陳力羣策畢舉此髙祖之大畧所以成帝業也若乃靈瑞符應其事甚衆故淮隂畱侯謂之天授非人力也英雄誠知覺寤超然逺覽淵然深識收陵嬰之明分絕信布之覬覦拒逐鹿之瞽説審神器之有授毋貪不可冀為二母之所笑則福祚流於子孫天禄其永終矣囂不聴彪遂避地河西竇融以為從事甚禮重之彪遂為融畫策使之專意事漢焉初竇融等聞帝威德心欲東向以河西隔逺未能自通乃從隗囂受建武正朔囂皆假其將軍印綬囂外順人望内懷異心使辯士張𤣥説融等曰更始事已成尋復亡滅此一姓不再興之效也今即有所主便相係屬一旦拘制自令失柄後有危敗雖悔無及方今豪桀競逐雌雄未決當各據土宇與隴蜀合從髙可為六國下不失尉佗融等召豪桀議之其中識者皆曰今皇帝姓名見於圖書自前世博物道術之士谷子雲夏賀良等皆言漢有再受命之符故劉子駿改易名字冀應其占及莽末西門君惠謀立子駿事覺被殺出謂觀者曰䜟文不誤劉秀眞汝主也此皆近事㬥著衆所共見者也况今稱帝者數人而雒陽土地最廣甲兵最彊號令最明觀符命而察人事它姓殆未能當也衆議或同或異融遂決策東向遣長史劉鈞等奉書詣雒陽先是帝亦發使遺融書以招之遇鈞於道即與俱還帝見鈞歡甚禮饗畢乃遣令還賜融璽書曰今益州有公孫子陽天水有隗將軍方蜀漢相攻權在將軍舉足左右便有輕重以此言之欲相厚豈有量哉欲遂立桓文輔微國當勉卒功業欲三分鼎足連衡合從亦宜以時定天下未并吾與爾絶域非相吞之國今之議者必有任囂敎尉佗制七郡之計王者有分土無分民自適已事而已因授融為涼州牧璽書至河西河西皆驚以為天子明見萬里之外十二月隗囂矜已飾智毎自比西伯與諸將議欲稱王鄭興曰昔文王三分天下有二尚服事殷武王八百諸侯不謀同㑹猶還兵待時髙祖征伐累年猶以沛公行師今令德雖明世無宗周之祚威畧雖振未有髙祖之功而欲舉未可之事昭速禍患無乃不可乎囂乃止後又廣置職位以自尊髙鄭興曰夫中郎將太中大夫使持節官皆王者之器非人臣所當制也無益於實有損於名非尊上之意也囂病之而止時關中將帥數上書言蜀可撃之狀帝以書示囂因使撃蜀以效其信囂上書盛言三輔單弱劉文伯在邊未宜謀蜀帝知囂欲持兩端不願天下統一於是稍黜其禮正君臣之儀帝以囂與馬援來歙相善數使歙援奉使徃來勸令入朝許以重爵囂連遣使深持謙辭言無功德須四方平定退伏閭里帝復遣來歙説囂遣子入侍囂聞劉永彭寵皆已破滅乃遣長子恂随歙詣闕帝以為胡騎校尉封鐫羗侯鄭興因恂求歸𦵏父母囂不聴而徙興舎益其秩禮興入見曰今為父母未𦵏乞骸骨若以增秩徙舎中更停畱是以親為餌也無禮甚矣將軍焉用之願畱妻子獨歸葬將軍又何猜焉囂乃令與妻子俱東馬援亦將家屬隨恂歸雒陽以所將賔客猥多求屯田上林苑中帝許之囂將王元以為天下成敗未可知不願專心内事説囂曰昔更始西都四方響應天下喁喁謂之太平一旦壞敗將軍幾無所厝今南有子陽北有文伯江湖海岱王公十數而欲牽儒生之説棄千乗之基覊旅危國以求萬全此循覆車之軌者也今天水完富士馬最强元請以一丸泥為大王東封函谷關此萬世一時也若計不及此且畜養士馬據隘自守曠日持久以待四方之變圖王不成其敝猶足以霸要之魚不可脱於淵神龍失勢與蚯蚓同囂心然元計雖遣子入質猶負其險阨欲專制方面申屠剛諫曰愚聞人所歸者天所與人所叛者天所去也本朝誠天之所福非人力也今璽書數到委國歸信欲與將軍共同吉凶布衣相與尚有没身不負然諾之信况於萬乗者哉今何畏何利而久疑若是卒有非常之變上負忠孝下愧當世夫未至豫言固常為虛及其已至又無所及是以忠言至諫希得為用誠願反覆愚老之言囂不納於是遊士長者稍稍去之六年春正月帝積苦兵間以隗囂遣子内侍公孫述逺據邊埀乃謂諸將曰且當置此兩子於度外耳因休諸將於雒陽分軍士於河内數騰書隴蜀告示禍福公孫述屢移書中國自陳符命冀以惑衆帝與述書曰圖䜟言公孫即宣帝也代漢者姓當塗其名髙君豈髙之身邪乃復以掌文為瑞王莽何足效乎君非吾賊臣亂子倉卒時人皆欲為君事耳君日月已逝妻子弱小當早為定計天下神器不可力爭宜畱三思署曰公孫皇帝述不答其騎都尉平陵荆邯説述曰漢髙祖起於行陳之中兵破身困者數矣然軍敗復合瘡愈復戰何則前死而成功愈於却就於滅亡也隗囂遭遇運㑹割有雍州兵彊士附威加山東遇更始政亂復失天下衆庶引領四方瓦解囂不及此時推危乘勝以爭天命而退欲為西伯之事尊師章句賓友處士偃武息戈卑辭事漢喟然自以文王復出也令漢帝釋關隴之憂專精東伐四分天下而有其三發間使召攜貳使西州豪桀咸居心於山東則五分而有其四若舉兵天水必至沮潰天水既定則九分而有其八陛下以梁州之地内奉萬乗外給三軍百姓愁困不堪上命將有王氏自潰之變矣臣之愚計以為宜及天下之望未絕豪桀尚可招誘急以此時發國内精兵令田戎據江陵臨江南之㑹倚巫山之固築壘堅守傳檄呉楚長沙以南必隨風而靡令延岑出漢中定三輔天水隴西拱手自服如此海内震搖冀有大利述以問群臣博士呉柱曰武王伐殷八百諸侯不期同辭然猶還師以待天命未聞無左右之助而欲出師千里之外者也邯曰今東帝無尺土之柄驅烏合之衆跨馬䧟敵所向輙平不亟乗時與之分功而坐談武王之説是復效隗囂欲為西伯也述然邯言欲悉發北軍屯士及山東客兵使延岑田戎分出兩道與漢中諸將合兵并勢蜀人及其弟光以為不宜空國千里之外決成敗於一舉固爭之述乃止延岑田戎亦數請兵立功述終疑不聴唯公孫氏得任事述廢銅錢置鐡錢貨幣不行百姓苦之為政苛細察於小事如為清水令時而已好改易郡縣官名少嘗為郎習漢家故事出入灋駕鸞旗旄騎又立其兩子為王食犍為廣漢各數縣或諫曰成敗未可知戎士暴露而先王愛子示無大志也述不從由此大臣皆怨三月公孫述使田戎出江關招其故衆欲以取荆州不克帝乃詔隗囂欲從天水伐蜀囂上言白水險阻棧閣敗絶述性嚴酷上下相患須其罪惡孰著而攻之此大呼響應之勢也帝知其終不為用乃謀討之夏四月丙子上行幸長安謁園陵遣耿弇蓋延等七將軍從隴道伐蜀先使中郎將來歙奉璽書賜囂諭㫖囂復多設疑故事乆猶豫不决歙遂發憤質責囂曰國家以君知臧否曉廢興故以手書暢意足下推忠誠既遣伯春委質而反欲用佞惑之言為族滅之計邪因欲前刺囂囂起入部勒兵將殺歙歙徐杖節就車而去囂使牛邯將兵圍守之囂將王遵諫曰君叔雖單車逺使而陛下之外兄也殺之無損於漢而隨以族滅昔宋執楚使遂有析骸易子之禍小國猶不可辱况於萬乗之主重以伯春之命哉歙為人有信義言行不違及往來遊説皆可案覆西州士大夫皆信重之多為其言故得免而東歸五月隗囂遂發兵反使王元據隴坁伐木塞道諸將因與囂戰大敗各引兵下隴囂追之急馬武選精騎為後拒殺數千人諸軍乃得還諸將之下隴也帝詔耿弇軍漆馮異軍枸邑祭遵軍汧呉漢等還屯長安馮異引軍未至枸邑隗囂乘勝使王元行廵將二萬餘人下隴分遣廵取枸邑異即馳兵欲先據之諸將曰虜兵盛而乘勝不可與爭鋒宜止軍便地徐思方畧異曰虜兵臨境忸怵小利遂欲深入若得枸邑三輔動搖夫攻者不足守者有餘今先據城以逸待勞非所以爭也潛往閉城偃旗鼓行廵不知馳赴之異乘其不意卒撃鼓建旗而出廵軍驚亂犇走追撃大破之祭遵亦破王元於汧於是北地諸豪長耿定等悉叛隗囂降詔異進軍義渠撃破盧芳將賈覽匈奴奥鞬日逐王北地上郡安定皆降竇融復遣其弟友上書曰臣幸得託先后末屬累世二千石臣復假厯將帥守持一隅故遣劉鈞口陳肝膽自以底裏上露長無纎介而璽書盛稱蜀漢二主三分鼎足之權任囂尉佗之謀竊自痛傷臣融雖無識猶知利害之際順逆之分豈可背眞舊之主事姦偽之人廢忠貞之節為傾覆之事棄已成之基求無冀之利此三者雖問狂夫猶知去就而臣獨何以用心謹遣弟友詣闕口陳至誠友至髙平會隗囂反道不通乃遣司馬席封間道通書帝復遣封賜融友書所以慰藉之甚厚融乃與隗囂書曰將軍親遇厄㑹之際國家不利之時守節不回承事本朝融等所以欣服髙義願從役於將軍者良為此也而忿悁之閒改節易圖委成功造難就百年累之一朝毁之豈不惜乎殆執事者貪功建謀以至於此當今西州地勢局廹民兵離散易以輔人難以自建計若失路不反聞道猶迷不南合子陽則北入文伯耳夫負虛交而易彊禦恃逺救而輕近敵未見其利也自兵起以來城郭皆為丘墟生民轉於溝壑幸賴天運少還而將軍復重其難是使積痾不得遂瘳幼孤將復流離言之可為酸鼻庸人且猶不忍况仁者乎融聞為忠甚易得宜實難憂人太過以德取怨知且以言獲罪也囂不納融乃與五郡太守共砥厲兵馬上疏請師期帝深嘉美之融即與諸郡守將兵入金城撃囂黨先零羗封何等大破之因並河楊威武伺候車駕時大兵未進融乃引還帝以融信效著明益嘉之脩理融父墳墓祠以太牢數馳輕使致遺四方珍羞梁統猶恐衆心疑惑乃使人刺殺張𤣥遂與隗囂絕皆解所假將軍印綬先是馬援聞隗囂欲貳於漢數以書責譬之囂得書增怒及囂發兵反援乃上書曰臣與隗囂本實交友初遣臣東謂臣曰本欲為漢願足下往觀之於汝意可即專心矣及臣還反報以赤心實欲導之於善非敢譎以非義而囂自挾姦心盗憎主人怨毒之情遂歸於臣臣欲不言則無以上聞願聴詣行在所極陳滅囂之術帝乃召之援具言謀畫帝因使援將突騎五千往來游説囂將髙峻任禹之屬下及羌豪為陳禍福以離囂支黨援又為書與囂將楊廣使曉勸於囂曰援竊見四海已定兆民同情而季孟閉拒背叛為天下表的常懼海内切齒思相屠裂故遺書戀戀以致惻隠之計乃聞季孟歸罪於援而納王游翁謟邪之説因自謂函谷以西舉足可定以今而觀竟何如邪援間至河内過存伯春見其奴吉從西方還説伯春小弟仲舒望見吉欲問伯春無它否竟不能言曉夕號泣宛轉塵中又説其家悲愁之狀不可言也夫怨讎可刺不可毁援聞之不自知泣下也援素知季孟孝愛曾閔不過夫孝於其親豈不慈於其子可有子抱三木而跳梁妄作自同分羮之慘乎季孟平生自言所以擁兵衆者欲以保全父母之國而完墳墓也又言茍厚士大夫而已而今所欲全者將破亡之所欲完者將毁傷之所欲厚者將反薄之季孟嘗折愧子陽而不受其爵今更共陸陸欲往附之將難為顔乎若復責以重質當安從得子主給是哉往時子陽獨欲以王相待而春卿拒之今者歸老更欲低頭與小兒曹共槽櫪而食併肩側身於怨家之朝乎今國家待春卿意深宜使牛孺卿與諸耆老大人共説季孟若計畫不從眞可引領去矣前披輿地圖見天下郡國百有六所奈何欲以區區二邦以當諸夏百有四乎春卿事外有君臣之義内有季孟朋友之道言君臣邪固當諫爭語朋友邪應有切磋豈有知其無成而但萎腇昨舌义手從族乎及今成計殊尚善也過是欲少味矣且來君叔天下信士朝廷重之其意依依常獨為西州言援商朝廷尤欲立信於此必不負約援不得久畱願急賜報廣竟不答諸將毎有疑議更請呼援咸敬重焉隗囂上疏謝曰吏民聞大兵卒至驚恐自救臣囂不能禁止兵有大利不敢廢臣子之節親自追還昔虞舜事父大杖則走小杖則受臣雖不敏敢忘斯義今臣之事在本朝賜死則死加刑則刑如更得洗心死骨不朽有司以囂言慢請誅其子帝不忍復使來歙至汧賜囂書曰昔柴將軍云陛下寛仁諸侯雖有亡叛而後歸輙復位號不誅也今若束手復遣恂弟歸闕庭者則爵禄獲全有浩大之福矣吾年埀四十在兵中十歳厭浮語虛辭即不欲勿報囂知帝審其詐遂遣使稱臣於公孫述七年春三月公孫述立隗囂為朔寧王遣兵往來為之援埶秋隗囂將歩騎三萬侵安定至隂槃馮異率諸將拒之囂又令别將下隴攻祭遵於汧並無利而還帝將自征隗囂先戒竇融師期㑹遇雨道斷且囂兵已退乃止帝令來歙以書招王遵遵來降拜太中大夫封向義候八年春來歙將二千餘人伐山開道從畨須回中徑襲畧陽斬隗囂守將金梁囂大驚曰何其神也帝聞得畧陽甚喜曰畧陽囂所依阻心腹已壞則制其支體易矣呉漢等諸將聞歙據畧陽爭馳赴之上以為囂失所恃亡其要城勢必悉以精鋭來攻曠日久圍而城不㧞士卒頓敝乃可乘危而進皆追漢等還隗囂果使王元拒隴坻行廵守畨須口王孟塞雞頭道牛邯軍瓦亭囂自悉其大衆數萬人圍畧陽公孫述遣將李育田弇助之斬山築堤激水灌城來歙與將士固死堅守矢盡發屋斷木以為兵囂盡鋭攻之累月不能下夏閏四月帝自將征隗囂光禄勲汝南郭憲諫曰東方初定車駕未可逺征乃當車㧞佩刀以斷車靷帝不從西至漆諸將多以王師之重不宜逺入險阻計尤豫未決帝召馬援問之援因説隗囂將帥有土崩之勢兵進有必破之狀又於帝前聚米為山谷指畫形勢開示衆軍所從道徑往來分析昭然可曉帝曰虜在吾目中矣明旦遂進軍至髙平第一竇融率五郡太守及羗虜小月氐等歩騎數萬輜重五千餘兩與大軍㑹是時軍旅草創諸將朝㑹禮容多不肅融先遣從事問㑹見儀適帝聞而善之以宣告百僚乃置酒髙㑹待融等以殊禮遂共進軍數道上隴使王遵以書招牛邯下之拜邯太中大夫於是囂大將十三人屬縣十六衆十餘萬皆降囂將妻子犇西城從楊廣而田弇李育保上邽畧陽圍解帝勞賜來歙班坐絕席在諸將之右賜歙妻縑千匹進幸上邽詔告隗囂曰若束手自詣父子相見保無他也若遂欲為黥布者亦自任也囂終不降於是誅其子恂使呉漢岑彭圍西城耿弇蓋延圍上邽以四縣封竇融為安豐侯弟友為顯親侯及五郡太守皆封列侯遣西還所鎮融以久專方面懼不自安數上書求代詔報曰吾與將軍如左右手耳數執謙退何不曉人意勉循士民無擅離部曲頴川盜賊群起冦没屬縣河東守兵亦叛京師騷動帝聞之曰吾悔不用郭子横之言秋八月帝自上邽晨夜東馳賜岑彭等書曰兩城若下便可將兵南撃蜀虜人苦不知足既平隴復望蜀每一發兵頭須為白十一月楊廣死隗囂窮困其大將王捷别在戎邱登城呼漢軍曰為隗王城守者皆必死無二心願諸軍亟罷請自殺以明之遂自刎死初帝勅呉漢曰諸部甲卒但坐費糧食若有逃亡則沮敗衆心宜悉罷之漢等貪并力攻囂遂不能遣糧食日少吏士疲役逃亡者多岑彭壅谷水灌西城城未没丈餘㑹王元行廵周宗將蜀救兵五千餘人乘髙卒至鼓譟大呼曰百萬之衆方至漢軍大驚未及成陳元等決圍殊死戰遂得入城迎囂歸冀呉漢軍食盡乃燒輜重引兵下隴蓋延耿弇亦相隨而退囂出兵尾撃諸營岑彭為後拒諸將乃得全軍東歸唯祭遵屯汧不退呉漢等復屯長安岑彭還津鄉於是安定北地天水隴西復反為囂校尉太原温序為囂將茍宇所獲宇曉譬數四欲降之序大怒叱宇等曰虜何敢廹脅漢將因以節撾殺數人宇衆爭欲殺之宇止之曰此義士死節可賜以劔序受劔銜須於口顧左右曰既為賊所殺無令須汙土遂伏劔而死從事王忠持其喪歸雒陽詔賜以冡地拜三子為郎九年春正月潁陽成侯祭遵薨於軍詔馮異并將其營隗囂病且餓餐糗糒恚憤而卒王元周宗立囂少子純為王搃兵據冀公孫述遣將趙匡田弇助純帝使馮異撃之公孫述遣其翼江王田戎大司徒任滿南郡太守程況將數萬人下江關撃破馮駿等軍遂㧞巫及夷道夷陵因據荆門虎牙横江水起浮橋關樓立櫕柱以絕水道結營跨山以塞陸路拒漢兵夏六月帝使來歙悉監䕶諸將屯長安太中大夫馬援為之副歙上書曰公孫述以隴西天水為藩蔽故得延命假息今二郡平蕩則述智計窮矣宜益選兵馬儲積資糧今西州新破兵人疲饉若招以財榖則其衆可集臣知國家所給非一用度不足然有不得已也帝然之於是詔於汧積榖六萬斛秋八月來歙率馮異等五將軍討隗純於天水十年夏陽節侯馮異等與趙匡田弇戰且一年皆斬之隗純未下諸將欲且還休兵異固持不動共攻落門未㧞夏異薨於軍初隗囂將安定髙峻擁兵據髙平第一建威大將軍耿弇等圍之一歳不㧞帝自將征之冦恂諫曰長安道里居中應接近便安定隴西必懷震懼此從容一處可以制四方也今士馬疲倦方履險阻非萬乘之固也前年潁川可為至戒帝不從戊戍進幸汧峻猶不下帝遣冦恂往降之恂奉璽書至第一峻遣軍師皇甫文出謁辭禮不屈恂怒將誅之諸將諫曰髙峻精兵萬人率多彊弩西遮隴道連年不下今欲降之而反戮其使毋乃不可乎恂不應遂斬之遣其副歸告峻曰軍師無禮已戮之矣欲降急降不欲固守峻惶恐即日開城門降諸將皆賀因曰敢問殺其使而降其城何也恂曰皇甫文峻之腹心其所取計者也今來辭意不屈必無降心全之則文得其計殺之亡其膽是以降耳諸將皆曰非所及也冬十月來歙與諸將攻破落門周宗行廵茍宇趙恢等將隗純降王元犇蜀徙諸隗於京師以東後隗純與賔客亡入胡至武威捕得誅之十一年春三月岑彭屯津鄉數攻田戎等不克帝遣呉漢率誅虜將軍劉隆等三將發荆州兵凡六萬餘人騎五千匹與彭㑹荆門彭裝戰船數十艘呉漢以諸郡棹卒多費糧糓欲罷之彭以為蜀兵盛不可遣上書言狀帝報彭曰大司馬習用歩騎不曉水戰荆門之事一由征南公為重而已閠月岑彭令軍中募攻浮橋先登者上賞於是偏將軍魯竒應募而前時東風狂急魯竒船逆流而上直衝浮橋而欑柱有反杷鉤竒船不得去竒等乗勢殊死戰因飛炬焚之風怒火盛橋樓崩燒岑彭悉軍順風並進所向無前蜀兵大亂溺死者數千人斬任滿生獲程汎而田戎走保江州彭上劉隆為南郡太守自率輔威將軍臧宫驍騎將軍劉歆長驅入江關令軍中無得虜掠所過百姓皆奉牛酒迎勞彭復讓不受百姓大喜爭開門降詔彭守益州牧所下郡輙行太守事彭若出界即以太守號付後將軍選官屬守州中長吏彭到江州以其城固糧多難卒㧞畱馮駿守之自引兵乗利直指墊江攻破平曲收其米數十萬石呉漢畱夷陵裝露橈繼進夏公孫述以王元為將軍使與領軍環安拒河池六月來歙與蓋延等進攻元安大破之遂克下辨乗勝遂進蜀人大懼使刺客刺歙未殊馳召蓋延延見歙因伏悲哀不能仰視歙叱延曰虎牙何敢然今使者中刺客無以報國故呼巨卿欲相屬以軍事而反效兒女子涕泣乎刄雖在身不能勒兵斬公邪延收淚彊起受所誡歙自書表曰臣夜人定後為何人所賊傷中臣要害臣不敢自惜誠恨奉職不稱以為朝廷羞夫理國以得賢為本太中大夫叚襄骨鯁可任願陛下裁察又臣兄弟不肖終恐被罪陛下哀憐數賜教督投筆抽刄而絕帝聞大驚省書攬涕以揚武將軍馬成守中郎將代之帝自將征公孫述秋七月次長安公孫述使其將延岑吕鮪王元公孫恢悉兵拒廣漢及資中又遣將侯丹率二萬餘人拒黄石岑彭使臧宫將降卒五萬從涪水上平曲拒延岑自分兵浮江下還江州泝都江而上襲撃侯丹大破之因晨夜倍道兼行二千餘里徑㧞武陽使精騎馳撃廣都去成都數十里勢若風雨所至皆犇散初述聞漢兵在平曲故遣大兵逆之及彭至武陽繞出延岑軍後蜀地震駭述大驚以杖撃地曰是何神也延岑盛兵於沅水臧宫衆多食少轉輸不至降者皆欲散畔郡邑復更保聚觀望成敗宫欲引還恐為所反㑹帝遣謁者將兵詣岑彭有馬七百匹宫矯制取以自益晨夜進兵多張旗幟豋山鼓譟右歩左騎挾船而引呼聲動山谷岑不意漢軍卒至登山望之大震恐宫因縱撃大破之斬首溺死者萬餘人水為之濁延岑犇成都其衆悉降盡獲其兵馬珍寳自是乘勝追北降者以十萬數軍至陽鄉王元舉衆降帝與公孫述書陳言禍福示以丹青之信述省書歎息以示所親太常少隆光禄勲張隆皆勸述降述曰廢興命也豈有降天子哉左右莫敢復言少隆皆以憂死帝還自長安冬十月公孫述使刺客詐為亡奴降岑彭夜刺殺彭太中大夫監軍鄭興領其營以俟呉漢至而授之彭持軍整齊秋毫無犯卭榖王任貴聞彭威信數千里遣使迎降㑹彭已被害帝盡以任貴所獻賜彭妻子蜀人為立廟祠之十二月呉漢自夷陵將三萬人泝江而上伐公孫述十二年春正月呉漢破公孫述將魏黨公孫永於魚涪津遂圍武陽述遣子婿史興救之漢迎撃破之因入犍為界諸縣皆城守詔漢直取廣都據其心腹漢乃進軍攻廣都㧞之遣輕騎燒成都市橋公孫述將帥恐懼日夜離叛述雖誅滅其家猶不能禁帝必欲降之又下詔喻述曰勿以來歙岑彭受害自疑今以時自詣則宗族完全詔書手記不可數得述終無降意秋七月馮駿㧞江州獲田戎帝戒呉漢曰成都十餘萬衆不可輕也但堅據廣都待其來攻勿與爭鋒若不敢來公轉營廹之須其力疲乃可擊也漢乗利遂自將歩騎二萬進逼成都去城十餘里阻江北營作浮橋使副將武威將軍劉尚將萬餘人屯於江南為營相去二十餘里帝聞之大驚讓漢曰比敕公千條萬端何意臨事勃亂旣輕敵深入又與尚别營事有緩急不復相及賊若出兵綴公以大衆攻尚尚破公即敗矣幸無它者急引兵還廣都詔書未到九月述果使其大司徒謝豐執金吾袁吉將衆十許萬分為二十餘營出攻漢使别將將萬餘人劫劉尚令不得相救漢與大戰一日兵敗走入壁豐因圍之漢乃召諸將厲之曰吾與諸君踰越險阻轉戰千里遂深入敵地至其城下而今與劉尚二處受圍勢既不接其禍難量欲潛師就尚於江南并兵禦之若能同心一力人自為戰大功可立如其不然敗必無餘成敗之機在此一舉諸將皆曰諾於是饗士秣馬閉營三日不出乃多樹幡旗使煙火不絕夜銜枚引兵與劉尚合軍豐等不覺明日乃分兵拒水北自將攻江南漢悉兵迎戰自旦至晡遂大破之斬豐吉於是引還廣都畱劉尚拒述具以狀上而深自譴責帝報曰公還廣都甚得其宜述必不敢畧尚而擊公也若先攻尚公從廣都五十里悉歩騎赴之適當值其危困破之必矣自是漢與述戰於廣都成都之間八戰八克遂軍于其郭中臧宫㧞緜竹破涪城斬公孫恢復攻㧞繁郫與呉漢㑹于成都公孫述困急謂延岑曰事當柰何岑曰男兒當死中求生可坐窮乎財物易聚耳不宜有愛述乃悉散金帛募敢死士五千餘人以配岑岑於市橋偽建旗幟鳴鼓挑戰而潛遣竒兵出呉漢軍後襲擊破漢漢墯水縁馬尾得出漢軍餘七日糧隂具船欲遁去蜀郡太守南陽張堪聞之馳往見漢説述必敗不宜退師之策漢從之乃示弱以挑敵冬十一月臧宫軍咸陽門戊寅述自將數萬人攻漢使延岑拒宫大戰岑三合三勝自旦及日中軍士不得食並疲漢因使護軍髙午唐邯將鋭卒數萬擊之述兵大亂髙午犇陳刺述洞胷墮馬左右輿入城述以兵屬延岑其夜死明旦延岑以城降辛巳呉漢夷述妻子盡滅公孫氏并族延岑遂放兵大掠焚述宫室帝聞之怒以譴漢又讓劉尚曰城降三日吏民從服孩兒老母口以萬數一旦放兵縱火聞之可為酸鼻尚宗室子孫嘗更吏職何忍行此仰視天俯視地觀放麑啜羮二者孰仁良失斬將弔民之義也初述徴廣漢李業為博士業固稱疾不起述羞不能致使大鴻臚尹融奉詔命以劫業若起則受公侯之位不起賜以毒酒融譬㫖曰方今天下分崩孰知是非而以區區之身試於不測之淵乎朝廷貪慕名徳曠官缺位于今七年四時珍御不以忘君宜上奉知己下為子孫身名俱全不亦優乎業乃歎曰古人危邦不入亂邦不居為此故也君子見危授命何乃誘以髙位重餌哉融曰宜呼室家計之業曰丈夫斷之於心久矣何妻子之為遂飲毒而死述恥有殺賢之名遣使弔祠賻贈百匹業子翬逃辭不受述又聘巴郡譙𤣥𤣥不詣亦遣使者以毒藥劫之太守自詣𤣥廬勸之行𤣥曰保志全髙死亦奚恨遂受毒藥𤣥子瑛泣血叩頭於太守願奉家錢千萬以贖父死太守為請述許之述又徴蜀郡王皓王嘉恐其不至先擊其妻子使者謂嘉曰速裝妻子可全對曰犬馬猶識主况於人乎王皓先自刎以首付使者述怒遂誅皓家屬王嘉聞而歎曰後之哉乃對使者伏劎而死犍為費貽不肯仕述漆身為癩陽狂以避之同郡任永馮信皆託青盲以辭徴命帝既平蜀詔贈常少為太常張隆為光禄勲譙𤣥已卒祠以中牢敕所在還其家錢而表李業之閭徴費貽任永馮信㑹永信病卒獨貽仕至合浦太守上以述將程烏李育有才幹皆擢用之於是西土咸悦莫不歸心焉上詔竇融與五郡太守入朝既至引見賞賜恩寵傾動京師拜融冀州牧十三年春三月呉漢自蜀振旅而還至宛詔過家上冡賜榖二萬斛夏四月至京師通鑑紀事本末卷六上欽定四庫全書通鑑紀事夲末卷六下宋袁樞撰楚王英之獄漢光武建武十五年夏四月丁巳封皇子輔為右翊公英為楚公陽為東海公康為濟南公蒼為東平公延為准陽公荆為山陽公衡為臨淮公焉為左翊公京為琅邪公十七年冬十月進右翊公輔為中山王其餘九國公皆為王二十八年初馬援兄子壻王磐平阿侯仁之子也王莽敗磐擁富貲為㳺俠有名江淮間後游京師與諸貴戚友善援謂姊子曹訓曰王氏廢姓也子石當屏居自守而反游京師長者用氣自行多所陵折其敗必也後嵗餘磐坐事死磐子肅復出入王侯邸第時禁罔尚疏諸王皆在京師競修名譽招㳺士馬援謂司馬呂种曰建武之元名為天下重開自今以往海内日當安耳但憂國家諸子並壯而舊防未立若多通賔客則大獄起矣卿曹戒慎之至是有上書告肅等受誅之家為諸王賔客慮因事生亂㑹更始之子壽光侯鯉得幸於沛王怨劉盆子結客殺故式侯恭帝怒沛王坐繫詔獄三日乃得出因詔郡縣收捕諸王賔客更相牽引死者以千數吕种亦與其禍臨命嘆曰馬將軍誠神人也秋八月戊寅東海王彊沛王輔楚王英濟南王康淮陽王延始就國明帝永平八年冬十月丙子募死罪繫囚詣度遼營有罪亡命者令贖罪各有差楚王英奉黄縑白紈詣國相曰託在蕃輔過惡累積歡喜大恩奉送縑帛以贖愆罪國相以聞詔報曰楚王誦黄老之㣲言尚浮屠之仁慈潔齊三月與神為誓何嫌何疑當有悔吝其還贖以助伊蒲塞桑門之盛饌初帝聞西域有神其名曰佛因遣使之天竺求其道得其書及沙門以來其書大抵以虚無為宗貴慈悲不殺以為人死精神不㓕隨復受形生時所行善惡皆有報應故所貴修練精神以至為佛善為宏闊勝大之言以勸誘愚俗精於其道者號曰沙門於是中國始傳其術圗其形像而王公貴人獨楚王英最先好之十三年冬十月楚王英與方士作金龜玉鶴刻文字為符瑞男子燕廣告英與漁陽王平顔忠等造作圗書有逆謀事下案騐有司奏英大逆不道請誅之帝以親親不忍十一月廢英徙丹陽涇縣賜湯沐邑五百户男女為侯主者食邑如故許太后勿上璽綬留住楚宫先是有私以英謀告司徒虞延者延以英藩戚至親不然其言及英事覺詔言切譲延十四年夏四月楚王英至丹陽自殺詔以諸侯禮葬於涇封燕廣為折姦侯是時窮治楚獄遂至累年其辭語相連自京師親戚諸侯州郡豪桀及考案吏阿附坐死徙者以千數而繫獄者尚數千人初樊鯈弟鮪為其子賞求楚王英女鯈聞而止之曰建武中吾家並受榮寵一宗五侯時特進一言女可以配王男可以尚主但以貴寵過盛即為禍患故不為也且爾一子奈何棄之於楚乎鮪不從及楚事覺鯈巳卒上追念鯈謹恪故其諸子皆得不坐英隂疏天下名士上得其録有吳郡太守尹興名乃徴興及掾史五百餘人詣廷尉就考諸吏不勝掠治死者大半唯門下掾陸續主簿梁宏功曹史駟勲備受五毒肌肉消爛終無異辭續母自吴來雒陽作食以饋續續雖見考辭色未嘗變而對食悲泣不自勝治獄使者問其故續曰母來不得見故悲耳問何以知之續曰毋截肉未嘗不方斷葱以寸為度故知之使者以狀聞上乃赦興等禁錮終身顔忠王平辭引隧鄉侯耿建朗陵侯臧信濩澤侯鄧鯉曲成侯劉建建等辭未嘗與忠平相見是時上怒甚吏皆惶恐諸所連及率一切陷入無敢以情入者侍御史寒朗心傷其寃試以建等物色獨問忠平而二人錯愕不能對朗知其詐乃上言建等無姦專為忠平所誣疑天下無辜􅁼多如此帝曰即如是忠平何故引之對曰忠平自知所犯不道故多有虚引冀以自明帝曰即如是何不早奏對曰臣恐海内别有發其姦者帝怒曰吏持两端促提下捶之左右方引去朗曰願一言而死帝曰誰與共為章對曰臣獨作之上曰何以不與三府議對曰臣自知當必族㓕不敢多汚染人上曰何故族㓕對曰臣考事一年不能窮盡姦狀反為罪人訟寃故知當族㓕然臣所以言者誠冀陛下一覺悟而已臣見考囚在事者咸共言妖惡大故臣子所宜同疾今出之不如入之可無後責是以考一連十考十連百又公卿朝㑹陛下問以得失皆長跪言舊制大罪禍及九族陛下大恩裁止於身天下幸甚及其歸舍口雖不言而仰屋竊歎莫不知其多寃無敢牾陛下言者臣今所陳誠死無悔帝意解詔遣朗出後二日車駕自幸洛陽獄録囚徒理出千餘人時天旱即大雨馬后亦以楚獄多濫乘間為帝言之帝惻然感悟夜起彷徨由是多所降宥任城令汝南袁安遷楚郡太守到郡不入府先往案楚王英獄事理其無明騐者條上出之府丞掾史皆叩頭爭以為阿附反虜者與同罪不可安曰如有不合太守自當坐之不以相及也遂分别具奏帝感悟即報許得出者四百餘家章帝建初元年春正月上問司徒鮑昱何以消復旱災對曰陛下始踐天位雖有失得未能致異臣前為汝南太守典治楚事繫者千餘人恐未能盡當其罪夫大獄一起寃者過半又諸徙者骨肉分離孤魂不祀宜一切還諸徙家蠲除禁錮使死生獲所則和氣可致帝納其言二年夏四月戊子詔還坐楚淮陽事徙者四百餘家馬后抑外家漢明帝永平三年春二月甲子立貴人馬氏為皇后皇子炟為太子后援之女也光武時以選入太子宫能奉承隂后傍接同列禮則修備上下安之遂見寵異及帝即位為貴人時后前母姊女賈氏亦以選入生皇子炟帝以后無子命養之謂曰人未必當自生子但患愛養不至耳后於是盡心撫育勞悴過於所生太子亦孝性淳篤母子慈愛始終無纎介之間后常以皇嗣未廣薦逹左右若恐不及後宫有進見者每加慰納若數所寵引輙増隆遇及有司奏立長秋宫帝未有所言皇太后曰馬貴人德冠後宫即其人也后既正位宫闈愈自謹肅好讀書常衣大練裙不加縁朔望諸姬主朝請望見后袍衣踈麤以為綺縠就視乃笑后曰此繒特宜染色故用之耳羣臣奏事有難平者帝數以試后后輙分解趣理各得其情然未嘗以家私干政事帝由是寵敬始終無衰焉十八年八月壬子帝崩太子即位年十八尊皇后曰皇太后太后兄弟虎賁中郎廖及黄門郎防光終明帝世未嘗改官帝以廖為衛尉防為中郎將光為越騎校尉廖等傾身交結冠蓋之士爭赴趣之第五倫上疏曰臣聞書曰臣無作威作福其害于而家凶于而國近世光烈皇后雖友愛天至而抑損隂氏不假以權埶其後梁竇之家互有非法明帝即位竟多誅之自是雒中無復權戚書記請託一皆斷絶又諭諸外戚曰苦身待士不如為國戴盆望天事不兩施今之議者復以馬氏為言竊聞衛尉廖以布三千匹城門挍尉防以錢三百萬私贍三輔衣冠知與不知莫不畢給又聞臘日亦遺其在雒中者錢各五千越騎校尉光臘用羊三百頭米四百斛肉五千斤臣愚以為不應經義惶恐不敢不以聞陛下情欲厚之亦宜所以安之臣今言此誠欲上忠陛下下全后家也章帝建初二年夏四月上欲封爵諸舅太后不聼㑹大旱言事者以為不封外戚之故有司請依舊典太后詔曰凡言事者皆欲媚朕以要福耳昔王氏五侯同日俱封黄霧四塞不聞澍雨之應夫外戚貴盛鮮不傾覆故先帝防慎舅氏不令在樞機之位又言我子不當與先帝子等今有司奈何欲以馬氏比隂氏乎且隂衛尉天下稱之省中御者至門出不及履此蘧伯玉之敬也新陽侯雖剛彊㣲失理然有方略據地談論一朝無雙原鹿貞侯勇猛誠信此三人者天下選臣豈可及哉馬氏不及隂氏逺矣吾不才夙夜累息常恐虧先后之法有毛髪之罪吾不釋言之不捨晝夜而親屬犯之不止治喪起墳又不時覺是吾言之不立而耳目之塞也吾為天下母而身服大練食不求甘左右但著帛布無香薫之􅎖者欲身率下也以為外親見之當傷心自敕但笑言太后素好儉前過濯龍門上見外家問起居者車如流水馬如游龍蒼頭衣緑褠領袖正白顧視御者不及逺矣故不加譴怒但絶嵗用而已冀以黙愧其心猶懈怠無憂國忘家之慮知臣莫若君况親属乎吾豈可上負先帝之㫖下虧先人之德重襲西京敗亡之禍哉固不許帝省詔悲歎復重請曰漢興舅氏之封侯猶吾子之為王也太后誠存謙虛奈何令臣獨不加恩三舅乎且衛尉年尊兩校尉有大病如令不諱使臣長抱刻骨之恨宜及吉時不可稽留太后答曰吾反覆念之思令兩善豈徒欲獲謙譲之名而使帝受不外施之嫌哉昔竇太后欲封王皇后之兄丞相條侯言髙祖約無軍功不侯今馬氏無功於國豈得與隂郭中興之后等邪常觀冨貴之家禄位重疊猶再實之木其根必傷且人所以願封侯者欲上奉祭祀下求温飽耳今祭祀則受太官之賜衣食則䝉御府餘資斯豈不可足而必當得一縣乎吾計之孰矣勿有疑也夫至孝之行安親為上今數遭變異榖價數倍憂惶晝夜不安坐卧而欲先營外家之封違慈母之拳拳乎吾素剛急有匈中氣不可不順也子之未冠由於父母已冠成人則行子之志念帝人君也吾以未踰三年之故自吾家族故得專之若隂陽調和邉境清靜然後行子之志吾但當含飴弄孫不能復闗政矣上乃止太后嘗詔三輔諸馬昬親有属託郡縣干亂吏治者以法聞太夫人葬起墳㣲髙太后以為言兄衛尉廖等即時减削其外親有謙素義行者輙假借温言賞以財位如有纎介則先見嚴恪之色然後加譴其美車服不遵法度者便絶属籍遣歸田里廣平鉅鹿樂成王車騎朴素無金銀之􅎖或以白太后即賜錢各五百萬於是内外從化被服如一諸家惶恐倍於永平時置織室蠶於濯龍門數往觀視以為娱樂常與帝旦夕言道政事及教授小王論語經書述叙平生雍和終日馬廖慮美業難終上疏勸成德政曰昔元帝罷服官成帝御浣衣哀帝去樂府然而侈費不息至於衰亂者百姓從行不從言也夫改政移風必有其夲傳曰吴王好劒客百姓多創瘢楚王好細腰宫中多餓死長安語曰城中好髙結四方髙一尺城中好廣眉四方且半額城中好大䄂四方全匹帛斯言如戯有切事實前下制度未幾後稍不行雖或吏不奉法良由慢起京師今陛下素簡所安發自聖性試令斯事一竟則四海誦德聲薫天地神明可通况於行令乎太后深納之四年夏四月有司連據舊典請封諸舅帝以天下豐稔方垂無事癸卯遂封衛尉廖為順陽侯車騎將軍防為頴陽侯執金吾光為許侯太后聞之曰吾少壯時但慕竹帛志不顧命今雖已老猶戒之在得故日夜愓厲思自降損冀乘此道不負先帝所以化導兄弟共同斯志欲令瞑目之日無所復恨何意老志復不從哉萬年之日長恨矣廖等並辭譲願就闗内侯帝不許廖等不得已受封爵而上書辭位帝許之五月丙辰防廖光皆以特進就第竇氏專恣漢章帝建初二年十二月帝納竇勲女為貴人有寵貴人母即東海恭王女泚陽公主也三年三月癸巳立貴人竇氏為皇后八年皇后兄憲為侍中虎賁中郎將弟篤為黄門侍郎並侍宫省賞賜累積喜交通賔客司空第五倫上疏曰臣伏見虎賁中郎將竇憲椒房之親典司禁兵出入省闥年盛志美卑譲樂善此誠其好士交結之方然諸出入貴戚者類多瑕釁禁錮之人尤少守約安貧之節士大夫無志之徒更相販賣雲集其門蓋驕佚所從生也三輔論議者至云以貴戚廢錮當復以貴戚浣濯之猶觧酲當以酒也詖險趣埶之徒誠不可親近臣愚願陛下中宫嚴敕憲等閉門自守無妄交通士大夫防其未萌慮於無形令憲永保福禄君臣交歡無纎介之隙此臣之所至願也憲恃宫掖聲埶自王主及隂馬諸家莫不畏憚憲以賤直請奪沁水公主園田主逼畏不敢計後帝出過園指以問憲憲隂喝不得對後發覺帝大怒召憲切責曰深思前過奪主田園時何用愈趙髙指鹿為馬乆念使人驚怖昔永平中常令隂黨隂博鄧疊三人更相糾察故諸馬戚莫敢犯法者今貴主尚見枉奪何况小民哉國家棄憲如孤雛腐䑕耳憲大懼皇后為毁服深謝良乆乃得觧使以田還主雖不䋲其罪然亦不授以重任臣光曰人臣之罪莫大於欺罔是以明君疾之孝章謂竇憲何異指鹿為馬善矣然卒不能罪憲則姦臣安所懲哉夫人主之於臣下患在不知其姦茍或知之而復赦之則不若不知之為愈也何以言之彼或為姦而上不之知猶有所畏既知而不能討彼知其不足畏也則放縱而無所顧矣是故知善而不能用知惡而不能去人主之深戒也元和三年三月太尉鄭𢎞數陳侍中竇憲權埶太盛言甚苦切憲疾之㑹𢎞奏憲黨尚書張林雒陽令楊光在官貪殘書奏吏與光故舊因以告之光報憲憲奏𢎞大臣漏泄密事帝詰譲𢎞夏四月丙寅收𢎞印綬𢎞自詣廷尉詔敕出之因乞骸骨歸未許病篤上書陳謝曰竇憲姦惡貫天逹地海内疑惑賢愚疾惡謂憲何術以迷主上近日王氏之禍昞然可見陛下處天子之尊保萬世之祚而信䜛佞之臣不計存亡之機臣雖命在晷刻死不忘忠願陛下誅四凶之罪以厭人鬼憤結之望帝省章遣醫視𢎞病比至已薨章和二年春正月壬辰帝崩於章德前殿太子即位年十嵗尊皇后曰皇太后三月太后臨朝竇憲以侍中内幹機密出宣誥命弟篤為虎賁中郎將篤弟景瓌並為中常侍兄弟皆在親要之地憲客崔駰以書戒憲曰傳曰生而冨者驕生而貴者慠生冨貴而能不驕慠者未之有也今寵禄初隆百僚觀行豈可不庶幾夙夜以永終譽乎昔馮野王以外戚居位稱為賢臣近隂衛尉克己復禮終受多福外戚所以獲譏於時垂愆於後者蓋在滿而不挹位有餘而仁不足也漢興以後迄于哀平外家二十保族全身四人而已書曰鑒于有殷可不慎哉庚戌皇太后詔以故太尉鄧彪為太傅賜爵闗内侯録尚書事百官緫己以聽竇憲以彪有義譲先帝所敬而仁厚委隨故尊崇之其所施為輙外令彪奏内白太后事無不從彪在位修身而已不能有所匡正憲性果急睚眦之怨莫不報復永平時謁者韓紆考劾憲父勲獄憲遂令客斬紆子以首祭勲冡秋七月南單于上言請出兵共討北匈奴太后議欲從之㑹齊殤王子都鄉侯暢来弔國憂太后數召見之竇憲懼暢分宫省之權遣客刺殺暢於屯衛之中而歸罪於暢弟利侯剛乃使侍御史與青州刺史雜考剛等尚書潁川韓稜以為賊在京師不宜捨近問逺恐為姦臣所笑太后怒以切責稜稜固執其議何敞說宋由曰暢宗室肺府茅土藩臣来弔大憂上書湏報親在武衛致此殘酷奉憲之吏莫適討捕蹤跡不顯主名不立敞備數股肱職典賊曹欲親至發所以糾其變而二府執事以為故事三公不與賊盗公縱姦慝莫以為咎敞請獨奏案之由乃許焉二府聞敞行皆遣主者隨之於是推舉具得事實太后怒閉憲於内宫憲懼誅因自求擊匈奴以贖死冬十月乙亥以憲為車騎將軍伐北匈奴和帝永元元年春竇憲將征匈奴三公九卿詣朝堂上書諌事見兩匈奴叛服竇憲嘗使門生齎書詣尚書僕射郅夀有所請託夀即送詔獄前後上書陳憲驕恣引王莽以誡國家又因朝㑹刺譏憲等以伐匈奴起第宅事厲音正色辭㫖甚切憲怒陷夀以買公田誹謗下吏當誅何敞上䟽曰夀機密近臣匡救為職若懐黙不言其罪當誅今夀違衆正議以安宗廟豈其私邪臣所以觸死瞽言非為夀也忠臣盡節以死為歸臣雖不知夀度其甘心安之誠不欲聖朝行誹謗之誅以傷晏晏之化杜塞忠直垂機無窮臣敞謬與機密言所不宜罪名明曰當填牢獄先夀僵仆萬死有餘書奏夀得减死論從合浦未行自殺夀惲之子也夏六月竇憲出朔方雞鹿塞分遣副校尉閻盤等破北單于於􅄞落山事見兩匈奴叛服秋九月庚申以竇憲為大將軍中郎將劉尚為車騎將軍封憲武陽侯食邑二萬户憲固辭封爵詔許之舊大將軍位在三公下至是詔憲位次太傅下三公上長史司馬秩中二千石竇氏兄弟驕縱而執金吾景尤甚奴客緹騎彊奪人財貨篡取罪人妻略婦女商賈閉塞如避冦讎又擅發縁邊諸郡突騎有才力者有司莫敢舉奏袁安劾景擅發邊兵驚惑吏民二千石不待符信而輒承景檄當伏顯誅又奏司𨽻校尉河南尹阿附貴戚不舉劾請免官案罪並寢不報駙馬都尉瓌獨好經書節約自修尚書何敞上封事曰昔鄭武姜之幸叔叚衛莊公之寵州吁愛而不教終至凶戾由是觀之愛子若此猶饑而食之以毒適所以害之也伏見大將軍憲始遭大憂公卿比奏欲令典幹國事憲深執謙退固辭盛位懇懇勤勤言之深至天下聞之莫不恱喜今踰年無幾大禮未終卒然中改兄弟專朝憲秉三軍之重篤景緫宫衛之權而虐用百姓奢侈僣偪誅戮無罪肆心自縱今者議論訩訩咸謂叔叚州吁復生於漢臣觀公卿懐持兩端不肯極言者以為憲等若有匪懈之志則已受吉甫褒申伯之功如憲等陷於罪辜則自取陳平周勃順吕后之權終不以憲等吉凶為憂也臣敞區區誠欲計䇿兩安絶其緜緜塞其㳙㳙上不欲令皇太后損文母之號陛下有誓泉之譏下使憲等得長保其福祐也駙馬都尉瓌比請退身願抑家權可與參謀聴順其意誠宗廟至計竇氏之福時濟南王康尊貴驕甚憲乃白出敞為濟南太傅康有違失敞輒諌爭康雖不能從然素敬重敞無所嫌牾焉二年六月詔封竇憲為冠軍侯篤為郾侯瓌為夏陽侯憲獨不受封三年春二月竇憲遣左校尉耿䕫等破北單于於金㣲山事見両匈奴叛服竇憲既立大功威名益盛以耿䕫任尚等為𤓰牙鄧疊郭璜為心腹班固傳毅之徒典文章刺史守令多出其門競賦歛吏民共為賂遺司徒袁安司空任隗舉奏諸二千石并所連及貶秩免官者四十餘人竇氏大恨但安隗素行髙亦未有以害之尚書僕射樂恢刺舉無所囬避憲等疾之恢上疏曰陛下富於春秋纂承大業諸舅不宜幹正王室以示天下之私方今之宜上以義自制下以謙自引四舅可長保爵土之榮皇太后永無慙負宗廟之憂誠䇿之上者也書奏不省恢稱疾乞骸骨歸長陵憲風厲州郡迫脅恢飲藥死於是朝臣震慴望風承㫖無敢違者袁安以天子㓜弱外戚擅權毎朝㑹進見及與公卿言國家事未嘗不喑鳴流涕自天子及大臣皆恃頼之冬十月詔竇憲與車駕㑹長安憲至尚書以下議欲拜之伏稱萬嵗尚書韓稜正色曰夫上交不謟下交不黷禮無人臣稱萬嵗之制議者皆慙而止尚書左丞王龍私奏記上牛酒於憲稜舉奏龍論為城旦竇憲請遣使立北單于弟右谷蠡王於除鞬為單于袁安上封事爭之後上竟從憲䇿事見兩匈奴叛服四年初廬江周榮辟袁安府安舉奏竇景及爭立北單于事皆榮所具草竇氏客太尉掾徐齮深惡之脅榮曰子為袁公腹心之謀排奏竇氏竇氏悍士刺客滿城中謹備之矣榮曰榮江淮孤生得備宰士縱為竇氏所害誠所甘心因敕妻子若卒遇飛禍無得殯斂冀以區區腐身覺悟朝廷夏四月丙辰竇憲還至京師六月戊戍朔日有食之丁鴻上疏曰昔諸吕握權統嗣幾移哀平之末廟不血食故雖有周公之親而無其徳不得行其埶也今大將軍雖欲敕身自約不敢僣差然而天下逺近皆惶怖承㫖刺史二千石初除謁辭求通待報雖奉符璽受臺敕不敢便去乆者至數十日背王室向私門此乃上威損下權盛也人道悖於下效騐見於天雖有𨼆謀神照其情垂象見戒以告人君禁㣲則易救末者難人莫不忽於㣲細以致其大恩不忍誨義不忍割去事之徵未然之明鏡也夫天不可以不剛不剛則三光不明王不可以不彊不彊則宰牧從横宜因大變改政匡失以塞天意竇氏父子兄弟並為卿校充滿朝廷穣侯鄧疊疊弟歩兵校尉磊及母元憲女壻射聲校尉郭舉舉父長樂少府璜共相交結元舉並出入禁中舉得幸太后遂共圗為殺害帝隂知其謀是時憲兄弟專權帝與内外臣僚莫由親接所與居者閹宦而已帝以朝臣上下莫不附憲獨中常侍鈎盾令鄭衆謹敏有心幾不事豪黨遂與衆定議誅憲以憲在外慮其為亂忍而未發㑹憲與鄧疊皆還京師時清河王慶恩遇尤渥常入省宿止帝將發其謀欲得外戚傳懼左右不敢使令慶私從千乗王求夜獨内之又令慶傳語鄭衆求索故事庚申帝幸北宫詔執金吾五校尉勒兵屯衛南北宫閉城門收捕郭璜郭舉鄧疊鄧磊皆下獄死遣謁者僕射收憲大將軍印綬更封為冠軍侯與篤景瓌皆就國帝以太后故不欲名誅憲為選嚴能相督察之憲篤景到國皆迫令自殺初河南尹張酺數以正灋䋲治竇景及竇氏敗酺上疏曰方憲等寵貴群臣阿附唯恐不及皆言憲受顧命之託懐伊吕之忠至乃復比鄧夫人於文毋今嚴威既行皆言當死不復顧其前後考折厥𠂻臣伏見夏陽侯瓌毎存忠善前與臣言常有盡節之心檢敕賔客未嘗犯灋臣聞王政骨肉之刑有三宥之義過厚不過薄今議者欲為瓌選嚴能相恐其迫切必不完免宜裁加貸宥以崇厚德帝感其言由是瓌獨得全竇氏宗族賔客以憲為官者皆免歸故郡初班固奴嘗醉罵洛陽令种兢兢因逮考竇氏賔客收捕固死獄中初竇憲納妻天下郡國皆有禮慶漢中郡亦當遣吏户曹李郃諌曰竇將軍椒房之親不修德禮而專權驕恣危亡之禍可翹足而待願明府一心王室勿與交通太守固遣之郃不能止請求自行許之郃遂所在遲留以觀其變行至扶風而憲就國凡交通者皆坐免官漢中太守獨不與焉西域歸附漢光武建武五年元帝之世莎車王延嘗為侍子京師慕樂中國及王莽之亂匈奴略有西域唯延不肯附属常敕諸子當世奉漢家不可負也延卒子康立康率傍國拒匈奴擁衛故都䕶吏士妻子千餘口檄書河西問中國動静竇融乃承制立康為漢莎車建功懐徳王西域大都尉五十五國皆属焉九年秋八月莎車王康卒弟賢立十四年冬莎車王賢鄯善王安皆遣使奉獻西域苦匈奴重歛皆願屬漢復置都䕶上以中國新定不許十七年莎車王賢復遣使奉獻請都䕶帝賜賢西域都䕶印綬及車旗黄金錦繡敦煌太守裴遵上言夷狄不可假以大權又令諸國失望詔書收還都䕶印綬更賜賢以漢大將軍印綬其使不肯易遵迫奪之賢由是始恨而猶詐稱大都䕶移書諸國諸國悉服屬焉二十一年莎車王賢浸以驕横欲兼并西域數攻諸國重求賦稅諸國愁懼車師前王鄯善焉耆等十八國俱遣子入侍獻其珍寳及得見皆流涕稽首願得都䕶帝以中國初定北邊未服皆還其侍子厚賞賜之諸國聞都䕶不出而侍子皆還大憂恐乃與敦煌太守檄願留侍子以示莎車言侍子見留都䕶尋出冀且息其兵裴遵以狀聞帝許之二十二年西域諸國侍子乆留敦煌皆愁思亡歸莎車王賢知都䕶不至擊破鄯善攻殺龜兹王鄯善王安上書願復遣子入侍更請都䕶都䕶不出誠迫於匈奴帝報曰今使者大兵未能得出如諸國力不從心東西南北自在也於是鄯善車師復附匈奴班固論曰孝武之世圖制匈奴患其兼從西國結黨南羌乃表河曲列四郡開玉門通西域以斷匃奴右臂隔絶南羌月氏單于失援由是逺遁而幕南無王庭遭値文景𤣥黙養民五世財力有餘士馬彊盛故能睹犀布瑇瑁則建珠厓七郡感蒟醤竹杖則開牂柯越嶲聞天馬蒲陶則通大宛安息自是殊方異物四面而至於是開苑囿廣宫室盛帷帳美服玩設酒池肉林以饗四夷之客作魚龍角抵之戯以觀視之及賂遺贈送萬里相奉師旅之費不可勝計至於用度不足乃𣙜酒酤筦塩鐡鑄白金造皮幣筭至車船租及六畜民力屈財用竭因之以凶年㓂盗並起道路不通直指之使始出衣繡杖斧斷斬於郡國然後勝之是以末年遂棄輪臺之地而下哀痛之詔豈非仁聖之所悔哉且通西域近有龍堆逺則葱嶺身熱頭痛懸度之阨淮南杜欽揚雄之論皆以為此天地所以界别區域絶外内也西域諸國各有君長兵衆分弱無所統一雖屬匈奴不相親附匈奴能得其馬畜旃罽而不能統率與之進退與漢隔絶道里又逺得之不為益棄之不為損盛德在我無取於彼故自建武以來西域思漢威德咸樂内屬數遣使置質于漢願請都䕶聖上逺覧古今因時之宜辭而未許雖大禹之序西戎周公之譲白雉太宗之郤走馬義兼之矣明帝永平三年冬十月莎車王賢以兵威逼奪于窴大宛媯塞王國使其將守之于窴人殺其將軍德立大人休莫霸為王賢率諸國兵數萬擊之大為休莫霸所敗脫身走還休莫霸進圍莎車中流矢死于窴人復立其兄子廣德為王廣德使其弟仁攻賢廣德父先拘在莎車賢乃歸其父以女妻之與之和親四年冬十月于窴王廣德將諸國兵三萬人攻莎車誘莎車王賢殺之并其國匈奴發諸國兵圍于窴廣德請降匈奴立賢質子不居徴為莎車王廣德又攻殺之更立其弟齊黎為莎車王十六年奉車都尉竇固之伐北匈奴也使假司馬班超與從事郭恂俱使西域超行到鄯善鄯善王廣奉超禮敬甚備後忽更踈懈超謂其官屬曰寧覺廣禮意薄乎官属曰胡人不能常乆無它故也超曰此必有北虜使來狐疑未知所從故也明者暏未萌况已著邪乃召侍胡詐之曰匈奴使來數日今安在乎侍胡惶恐曰到已三日去此三十里超乃閉侍胡悉㑹其吏士三十六人與共飲酒酣因激怒之曰卿曹與我俱在絶域今虜使到裁數日而王廣禮敬即廢如令鄯善收吾屬送匈奴骸骨長為豺狼食矣為之奈何官屬皆曰今在危亡之地死生從司馬超曰不入虎穴不得虎子當今之計獨有因夜以火攻虜使彼不知我多少必大震怖可殄盡也㓕此虜則鄯善破膽功成事立矣衆曰當與從事議之超怒曰吉凶决於今日從事文俗吏聞此必恐而謀泄死無所名非壯士也衆曰善初夜超遂將吏士往犇虜營㑹天大風超令十人持鼓藏虜舍後約曰見火然皆當鳴鼓大呼餘人悉持兵弩夾門而伏超乃順風縱火前後鼓噪虜衆驚亂超手格殺三人吏兵斬其使及從士三十餘級餘衆百許人悉燒死明日乃還告郭恂恂大驚既而色動超知其意舉手曰掾雖不行班超何心獨擅之乎恂乃恱超於是召鄯善王廣以虜使首示之一國震怖超告以漢威德自今以後勿復與北虜通廣叩頭願属漢無二心遂納子為質還白竇固固大喜具上超功效并求更選使使西域帝曰吏如班超何故不遣而更選乎今以超為軍司馬令遂前功固復使超使于窴欲益其兵超願但將夲所從三十六人曰于窴國大而逺今將數百人無益於彊如有不虞多益為累耳是時于窴王廣德雄張南道而匈奴遣使監䕶其國超既至于窴廣德禮意甚踈且其俗信巫巫言神怒何故欲向漢漢使有騧馬急求取以祠我廣德乃遣國相私來比就超請馬超密知其狀報許之而令巫自來取馬有頃巫至超即斬其首收私來比鞭笞數百以巫首送廣德因責譲之廣德素聞超在鄯善誅㓕虜使大惶恐即殺匈奴使者而降超重賜其王以下因鎮撫焉於是諸國皆遣子入侍西域與漢絶六十五載至是乃復通焉超彪之子也十七年初龜兹王建為匈奴所立倚恃虜威據有北道攻殺疏勒王立其臣兠題為疏勒王班超從間道至疏勒去兠題所居槃槖城九十里逆遣吏田慮先往降之敕慮曰兠題夲非疏勒種國人必不用命若不即降便可執之慮既到兠題見慮輕弱殊無降意慮因其無備遂前刼縳兠題左右出其不意皆驚懼犇走慮馳報超超即赴之悉召疏勒將吏說以龜兹無道之狀因立其故王兄子忠為王國人大恱超問忠及官屬當殺兠題邪生遣之邪咸曰當殺之超曰殺之無益於事當令龜兹知漢威德遂觧遣之冬十一月遣奉車都尉竇固駙馬都尉耿秉騎都尉劉張出敦煌昆侖塞擊西域秉張皆去符傳以属固合兵萬四千騎擊破白山虜於蒲類海上遂進擊車師車師前王即後王之子也其廷相去五百餘里固以後王道逺山谷深士卒寒苦欲攻前王秉以為先赴後王并力根夲則前王自服固計未决秉奮身而起曰請行前乃上馬引兵北入衆軍不得已並進斬首數千級後王安得震怖走出門迎秉脫㡌抱馬足降秉將以詣固其前王亦歸命遂定車師而還十八年春二月詔竇固等罷兵還京師十一月焉耆龜兹攻没都䕶陳睦事見兩匈奴叛服章帝建初元年三月詔徴還班超超將發還疏勒舉國憂恐其都尉黎弇曰漢使棄我我必復為龜兹所㓕耳誠不忍見漢使去因以刀自剄超還至于窴王侯以下皆號泣曰依漢使如父母誠不可去互抱超馬脚不得行超亦欲遂其夲志乃更還疏勒疏勒兩城已降龜兹而與尉頭連兵超捕斬反者擊破尉頭殺六百餘人疏勒復安三年閏四月西域假司馬班超率疏勒康居于窴拘彌兵一萬人攻姑墨石城破之斬首七百級五年夏五月班超欲遂平西域上疏請兵曰臣竊見先帝欲開西域故北擊匈奴西使外國鄯善于寘即時向化今拘彌莎車䟽勒月氏烏孫康居復願歸附欲共并力破㓕龜兹平通漢道若得龜兹則西域未服者百分之一耳前世議者皆曰取三十六國號為斷匈奴右臂今西域諸國自日之所入莫不向化大小欣欣貢奉不絶唯焉耆龜兹獨未服從臣前與官屬三十六人奉使絶域備遭艱戹自孤守疏勒於今五載胡夷情數臣頗識之問其城郭小大皆言倚漢與依天等以是效之則葱領可通龜兹可伐今宜拜龜兹侍子白霸為其國王以歩騎數百送之與諸國連兵嵗月之間龜兹可禽以夷狄攻夷狄計之善者也臣見莎車疏勒田地肥廣草牧饒衍不比敦煌鄯善間也兵可不費中國而糧食自足且姑墨温宿二王特為龜兹所置既非其種更相厭苦其埶必有降者若二國來降則龜兹自破願下臣章參考行事誠有萬分死復何恨臣超區區特蒙神靈竊冀未便僵仆目見西域平定陛下舉萬年之觴薦勲祖廟布大喜於天下書奏帝知其功可成議欲給兵平陵徐幹上疏願奮身佐超帝以幹為假司馬將弛刑及義從千人就超先是莎車以為漢兵不出遂降於龜兹而疏勒都尉番辰亦叛㑹徐幹適至超遂與幹擊番辰大破之斬首千餘級欲進攻龜兹以烏孫兵彊宜因其力乃上言烏孫大國控弦十萬故武帝妻以公主至孝宣帝卒得其用今可遣使招慰與共合力帝納之八年冬十二月帝拜班超為將兵長史以徐幹為軍司馬别遣衛候李邑䕶送烏孫使者邑到于窴值龜兹攻疏勒恐懼不敢前因上書陳西域之功不可成又盛毁超擁愛妻抱愛子安樂外國無内顧心超聞之歎曰身非曽參而有三至之䜛恐見疑於當時矣遂去其妻帝知超忠乃切責邑曰縱超擁愛妻抱愛子思歸之士千餘人何能盡與超同心乎令邑詣超受節度元和元年十二月帝復遣假司馬和恭等將兵八百人詣班超超因發疏勒于窴兵擊莎車莎車以賂誘疏勒王忠忠遂反從之西保烏即城超乃更立其府丞成大為疏勒王悉發其不反者以攻忠使人説康居王執忠以歸其國烏即城遂降三年九月疏勒王忠從康居王借兵還據損中遣使詐降於班超超知其姦而偽許之忠從輕騎奔超超斬之因擊破其衆南道遂通章和元年班超發于窴諸國兵共二萬五千人擊莎車龜兹王發温宿姑墨尉頭兵合五萬人救之超召將校及于窴王議曰今兵少不敵其計莫若各散去于窴從是而東長史亦於此西歸可湏夜鼓聲而發隂緩所得生口龜兹王聞之大喜自以萬騎於西界遮超温宿王將八千騎於東界徼于窴超知二虜已出密召諸部勒兵鷄鳴馳赴莎車營胡大驚亂犇走追斬五千餘級莎車遂降龜兹等因各退散自是威震西域和帝永元二年夏五月月氏求尚公主班超拒還其使由是怨恨遣其副王謝將兵七萬攻超超衆少皆大恐超譬軍士曰月氏兵雖多然數千里踰葱領來非有運輸何足憂也但當收榖堅守彼饑窮自降不過數十日决矣謝遂前攻超不下又鈔掠無所得超度其糧將盡必從龜兹求食乃遣兵數百於東界要之謝果遣騎齎金銀珠玉以賂龜兹超伏兵遮擊盡殺之持其使首以示謝謝大驚即遣使請罪願得生歸超縱遣之月氏由是大震嵗奉貢獻三年冬十月龜兹姑墨温宿諸國皆降十二月復置西域都䕶騎都尉戊巳校尉官以班超為都䕶徐幹為長史拜龜兹侍子白霸為龜兹王遣司馬姚光送之超與光共脅龜兹廢其王尤利多而立白霸使光將尤利多還詣京師超居龜兹它乾城徐幹屯疏勒唯焉耆危湏尉犂以前没都䕶猶懐二心其餘悉定六年秋七月西域都䕶班超發龜兹鄯善等八國兵合七萬餘人討焉耆到其城下誘焉耆王廣尉犂王汎等於陳睦故城斬之傳首京師因縱兵鈔掠斬首五千餘級獲生口萬五千人更立焉耆左侯元孟為焉耆王超留焉耆半嵗慰撫之於是西域五十餘國悉納質内属至于海濵四萬里外皆重譯貢獻九年十二月西域都䕶定逺侯班超遣掾甘英使大秦條支窮西海皆前世所不至莫不備其風土傳其珍恠焉十四年秋七月班超乆在絶域年老思土上書乞歸曰臣不敢望到酒泉郡但願生入玉門闗謹遣子勇隨安息獻物入塞及臣生在令勇目見中土朝廷乆之未報超妹曹大家上書曰蠻夷之性悖逆侮老而超旦暮入地乆不見代恐開姦宄之源生逆亂之心而卿大夫咸懐一切莫肯逺慮如有卒暴超之氣力不能從心便為上損國家累世之功下棄忠臣竭力之用誠可痛也故超萬里歸誠自陳苦急延頸踰望三年於今未䝉省録妾竊聞古者十五受兵六十還之亦有休息不任職也故妾敢觸死為超求哀匄超餘年一得生還復見闕廷使國家無勞逺之慮西域無倉卒之憂超得長䝉文王𦵏骨之恩子方哀老之恵帝感其言乃徴超還八月超至洛陽拜為射聲校尉九月卒超之被徴以戊巳校尉任尚代為都䕶尚謂超曰君侯在外國三十餘年而小人猥承君後任重慮淺冝有以誨之超曰年老失智君數當大位豈班超所能及哉必不得已願進愚言塞外吏士本非孝子順孫皆以罪過徙補邊屯而蠻夷懐鳥獸之心難飬易敗今君性嚴急水清無大魚察政不得下和宜蕩佚簡易寛小過總大綱而已超去後尚私謂所親曰我以班君當有竒䇿今所言平平耳尚後竟失邊和如超所言殤帝延平元年九月詔以北地梁慬為西域副校尉慬行至河西㑹西域諸國反攻都䕶任尚於疏勒尚上書求救詔慬將河西四郡羗胡五千騎馳赴之慬未至而尚已得觧詔徴尚還以騎都尉叚禧為都䕶西域長史趙博為騎都尉禧博守它乾城城小梁慬以為不可固乃譎説龜兹王白覇欲入共保其城白覇許之吏民固諫白覇不聴慬既入遣將急迎叚禧趙博合軍八九千人龜兹吏民並叛其王而與温宿姑墨數萬兵反共圍城慬等出戰大破之連兵數月胡衆敗走乗勝追擊凡斬首萬餘級獲生口數千人龜兹乃定安帝永初元年五月西域都䕶叚禧等雖保龜兹而道路阻塞檄書不通公卿議者以為西域阻逺數有背叛吏士屯田其費無已六月壬戍罷西域都䕶遣騎都尉王𢎞發關中兵迎禧及梁慬趙博伊吾盧桞中屯田吏士而還元初六年初西域諸國既絶於漢北匃奴復以兵威役屬之與共為邊宼敦煌太守曹宗患之乃上遣行長史索班將千餘人屯伊吾以招撫之於是車師前王及鄯善王復來降永寧元年春三月北匈奴率車師後王軍就共殺後部司馬及敦煌長史索班等遂擊走其前王略有北道鄯善逼急求救於曹宗宗因此請出兵五千人擊匈奴以報索班之耻因復取西域公卿多以宜閉玉門關絶西域大后聞軍司馬班勇有父風召詣朝堂問之勇上議曰昔孝武皇帝患匈奴彊盛於是開通西域論者以為奪匈奴府藏斷其右臂光武中興未遑外事故匈奴負彊驅率諸國及至永平再攻燉煌河西諸郡城門晝閉孝明皇帝深惟廟䇿乃命虎臣出征西域故匈奴逺遁邊境得安及至永元莫不内屬㑹間者羌亂西域復絶北虜遂遣責諸國備其逋租髙其價直嚴以期㑹鄯善車師皆懐憤怨思樂事漢其路無從前所以時有叛者皆由牧養失宜還為其害故也今曹宗徒恥於前負欲報雪匈奴而不尋出兵故事未度當時之宜也夫要功荒外萬無一成若兵連禍結悔無所及况今府藏未充師無後繼是示弱於逺夷暴短於海内臣愚以為不可許也舊敦煌郡有營兵三百人今宜復之復置護西域副校尉居於敦煌如永元故事又宜遣西域長史將五百人屯樓蘭西當焉蓍龜兹徑路南彊鄯善于寘心膽北扞匈奴東近敦煌如此誠便尚書復問勇利害云何勇對曰昔永平之末始通西域初遣中郎將居敦煌後置副校尉於車師既為胡虜節度又禁漢人不得有所侵擾故外夷歸心匈奴畏威今鄯善王尤還漢人外孫若匈奴得志則尤還必死此等雖同鳥獸亦知避害若出屯樓蘭足以招附其心愚以為便長樂衛尉鐔顯廷尉綦毋參司𨽻校尉崔據難曰朝廷前所以棄西域者以其無益於中國而費難供也令車師已屬匈奴鄯善不得保信一旦反覆班將能保北虜不為邉害乎勇對曰今中國置州牧者以禁郡縣姦猾盜賊也若州牧能保盜賊不犯者臣亦願以要斬保匈奴之不為邉害也今通西域則虜埶必弱虜埶弱則為患微矣孰與歸其府藏續其斷臂哉今置校尉以扞撫西域設長吏以招懐諸國若棄而不立則西域望絶望絶之後屈就北虜緣邉之郡將受困害恐河西城門必湏復有晝閉之儆矣今不廓開朝廷之徳而拘屯戍之費若此北虜遂熾豈安邉久長之䇿哉太尉屬毛軫難曰今若置校尉則西域絡繹遣使求索無厭與之則費難供不與則失其心一旦為匈奴所廹當復求救則為役大矣勇對曰令設以西域歸匈奴而使其恩徳大漢不為鈔盗則可矣如其不然則因西域租入之饒兵馬之衆以擾動縁邉是為富仇雔之財增暴夷之埶也置校尉者宣威布徳以繫諸國内向之心以疑匈奴覬覦之情而無費財耗國之慮也且西域之人無他求索其來入者不過禀食而已今若拒絶埶歸北屬夷虜并力以㓂并涼則中國之費不止十億置之誠便於是從勇議復敦煌郡營兵三百人置西域副校尉居敦煌雖復覊縻西域然亦未能出屯其後匈奴果數與車師共入為㓂鈔河西大被其害延光二年北匈奴連與車師入㓂河西議者欲復閉玉門陽關以絶其患敦煌太守張璫上書曰臣在京師亦以為西域宜棄今親踐其土地乃知棄西域則河西不能自存謹陳西域三䇿北虜呼衍王常展轉蒲類秦海之間専制西城共為㓂鈔今以酒泉屬國吏士二千餘人集昆侖塞先擊呼衍王絶其根本因發鄯善兵五千人脅車師後部此上計也若不能出兵可置軍司馬將士五百人四郡供其黎牛榖食出據柳中此中計也如又不能則宜棄交河城收鄯善等悉使入塞此下計也朝廷下其議陳忠上疏曰西域内附日久區區東望扣關者數矣此其不樂匈奴慕漢之效也今北虜已破車師埶必南攻鄯善棄而不救則諸國從矣若然則虜財賄益增膽埶益殖威臨南𦍑與之交通如此河西四郡危矣河西既危不可不救則百倍之役興不訾之費發矣議者但念西域絶逺䘏之煩費不見孝武苦心勤勞之意也方今敦煌孤厄逺來告急復不輔助内無以慰勞吏民外無以威示百蠻蹙國滅土非良計也臣以為敦煌冝置校尉按舊増四郡屯兵以西撫諸國帝納之於是復以班勇為西域長史將兵五百人出屯桞中三年春正月班勇至樓蘭以鄯善歸附特加三綬而龜兹王白英猶自疑未下勇開以恩信白英乃率姑墨温宿自縳詣勇因發其兵歩騎萬餘人到車師前王庭擊走匈奴伊蠡王於伊和谷收得前部五千餘人於是前部始復開通罷屯田桞中四年秋七月西域長史班勇發敦煌張掖酒泉六千騎及鄯善疏勒車師前部兵擊後部王軍就大破之獲首虜八千餘人生得軍就及匈奴持節使者將至索班沒處斬之傳首京師順帝永建元年冬十月班勇更立車師後部故王子加特奴為王勇又使别校誅斬東且彌王亦更立其種人為王於是車師六國悉平勇遂發諸國兵擊匈奴呼衍王亡走其衆二萬餘人皆降生得单于從兄勇使加特奴手斬之以結車師匈奴之隙北單于自將萬餘騎入後部至今且谷勇使假司馬曹俊救之單于引去俊追斬其貴人骨都侯於是呼衍王遂徙居枯梧河上是後車師無復虜跡二年六月西域城郭諸國皆服於漢唯焉耆王元孟未降班勇奏請攻之於是遣敦煌太守張朗將河西四郡兵三千人配勇因發諸國兵四萬餘人分為兩道擊之勇從南道朗從北道約期俱至焉耆而朗先有罪欲徼功自贖遂先期至爵離關遣司馬將兵前戰獲首虜二千餘人元孟懼誅逆遣使乞降張朗徑入焉耆受降而還朗得免誅勇以後期徴下獄免通鑑紀事夲末卷六下
