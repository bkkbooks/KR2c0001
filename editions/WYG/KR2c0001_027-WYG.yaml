body:
  text: 通鑑紀事本末巻二十七上宋袁樞撰唐平東都隋煬帝大業九年禮部尚書楊𤣥感驍勇便騎射好讀書喜賓客海内知名之士多與之遊與蒲山公李宻善宻弼之曽孫也少有才略志氣雄逺輕財好士為左親侍帝見之謂宇文述曰向者左仗下黑色小兒瞻視異常勿令宿衞述乃諷宻使稱病自免宻遂屛人事專務讀書嘗乗黄牛讀漢書楊素遇而異之因召至家與語大悦謂其子𤣥感等曰李宻識度如此汝等不及也由是𤣥感與為深交時或侮之宻曰人言當指實寧可面諛若決機兩陳之間喑嗚咄嗟使敵人震懾宻不如公驅策天下賢俊各伸其用公不如宻豈可以階級稍崇而輕天下士大夫邪𤣥感笑而服之素恃功驕倨朝宴之際或失臣禮帝心銜而不言素亦覺之及素薨帝謂近臣曰使素不死終當族滅𤣥感頗知之且自以累世貴顯在朝文武多父之故吏見朝政日紊而帝多猜忌内不自安乃與諸弟潜謀作亂帝方事征伐𤣥感自言世荷國恩願為將領帝喜曰將門必有將相門必有相固不虚也由是寵遇日隆頗預朝政帝伐高麗命𤣥感於黎陽督運遂與虎賁郎將王仲伯汲郡賛治趙懷義等謀故逗遛漕運不時進發欲令度遼諸軍乏食帝遣使者促之𤣥感揚言水路多盜不可前後而發𤣥感弟虎賁郎將𤣥縱鷹揚郎將萬石並從幸遼東𤣥感潜遣人召之二人皆亡還萬石至高陽為監事許華所執斬於涿郡時右驍衞大將軍來䕶兒以舟師自東萊將入海趣平壤𤣥感遣家奴偽為使者從東方來詐稱䕶兒反六月乙巳𤣥感入黎陽縣閉城大索男夫取帆布為牟甲署官屬皆准開皇之舊移書傍郡以討䕶兒為名各令發兵㑹於倉所郡縣官有幹用者𤣥感皆以運糧追集之以趙懷義為衞州刺史東光尉元務本為黎州刺史河内郡主簿唐禕為懷州刺史治書侍御史游元督運在黎陽𤣥感謂曰獨夫肆虐陷身絶域此天亡之時也我今親帥義兵以誅無道卿意如何元正色曰尊公荷國寵靈近古無比公之弟兄青紫交映當謂竭誠盡節上答鴻恩豈意墳土未乾親圖反噬僕有死而已不敢聞命𤣥感怒而囚之屢脅以兵不能屈乃殺之元明根之孫也𤣥感選運夫少壯者得五千餘人丹陽宣城篙梢三千餘人刑三牲誓衆且諭之曰主上無道不以百姓為念天下搔擾死遼東者以萬計今與君等起兵以救兆民之弊何如衆皆踴躍稱萬嵗乃勒兵部分唐褘自𤣥感所逃歸河内先是𤣥感隂遣家僮至長安召李宻及弟𤣥挺赴黎陽及舉兵宻適至𤣥感大喜以為謀主謂宻曰子常以濟物為己任今其時矣計將安出宻曰天子出征逺在遼外去幽州猶隔千里南有巨海北有强胡中間一道理極艱危公擁兵出其不意長驅入薊據臨渝之險扼其咽喉歸路既絶高麗聞之必躡其後不過旬月資糧皆盡其衆不降則潰可不戰而擒此上計也𤣥感曰更言其次宻曰關中四塞天府之國雖有衛文昇不足為意今帥衆鼓行而西經城勿攻直取長安収其豪傑撫其士民據險而守之天子雖還失其根本可徐圖也𤣥感曰更言其次宻曰簡精鋭晝夜倍道襲取東都以號令四方但恐唐禕告之先已固守若引兵攻之百日不克天下之兵四面而至非僕所知也𤣥感曰不然今百官家口並在東都若先取之足以動其心且經城不拔何以示威公之下計乃上策也遂引兵向洛陽遣楊𤣥挺將驍勇千人為前鋒先取河内唐禕據城拒守𤣥挺無所獲禕又使人告東都越王侗與樊子蓋等勒兵為備修武民相帥守臨清關𤣥感不得渡乃於汲郡南渡河從之者如市使弟積善將兵三千自偃師南縁洛水西入𤣥挺自白司馬坂逾邙山南入𤣥感將三千餘人隨其後相去十里許自稱大軍其兵皆執單刀柳楯無弓矢甲胄東都遣河南令達奚善意將精兵五千人拒積善將作監河南賛治裴𢎞䇿將八千人拒𤣥挺善意渡洛南營於漢王寺明日積善兵至不戰自潰鎧仗皆為積善所取𢎞䇿出至白司馬坂一戰敗走棄鎧仗者大半𤣥挺亦不追𢎞䇿退三四里収散兵復結陳以待之𤣥挺徐至坐息良乆忽起撃之𢎞䇿又敗如是五戰丙辰𤣥挺直抵太陽門𢎞䇿將十餘騎馳入官城自餘無一人返者皆歸於𤣥感𤣥感屯上春門每誓衆曰我身為上柱國家累鉅萬金至於富貴無所求也今不顧滅族者但為天下解倒懸之急耳衆皆悦父老争獻牛酒子弟詣軍門請自效者日以千數内史舍人韋福嗣洸之兄子也從軍出拒𤣥感為𤣥感所獲𤣥感厚禮之使與其黨胡師耽共掌文翰𤣥感令福嗣為書遺樊子蓋數帝罪惡云今欲廢昏立明願勿拘小禮自貽伊戚樊子蓋新自外藩入為京官東都舊宦多慢之至於部分軍事未甚承稟裴𢎞策與子蓋同班前出討賊失利子蓋更使出戰不肯行子蓋命引出斬之以徇國子祭酒河東楊汪小有不恭子蓋又將斬之汪頓首流血乃得免於是將吏震肅無敢仰視令行禁止𤣥感盡鋭攻城子蓋隨方拒守𤣥感不能克然達官子弟應募從軍者聞𢎞䇿死皆不敢入城韓擒虎子世咢觀王雄子恭道虞世基子柔來䕶兒子淵裴藴子爽大理卿鄭善果子儼周羅㬋子仲等四十餘人皆降於𤣥感𤣥感悉以親要重任委之善果譯之兄子也𤣥感収兵得五萬餘人分五千人守慈磵道五千守伊闕道遣韓世咢將三千人圍滎陽顧覺將五千人取虎牢虎牢降以覺為鄭州刺史鎮虎牢代王侑使刑部尚書衛文昇帥兵四萬救東都文昇至華隂掘楊素冢焚其骸骨示士卒以必死遂鼓行出淆澠直趨東都城北𤣥感逆拒之文昇且戰且行屯於金谷遼東城乆不拔帝遣造布囊百餘萬口滿貯土欲積為魚梁大道濶三十步高與城齊使戰士登而攻之又作八輪樓車高出於城夾魚梁道欲俯射城内指期將攻城内危蹙㑹楊𤣥感反書至帝大懼引納言蘇威入帳中謂曰此兒聰明得無為患威曰夫識是非審成敗乃謂之聰明𤣥感麤疎必無所慮但恐因此寢成亂階耳帝又聞達官子弟皆在𤣥感所益憂之帝問太史令庾質曰𤣥感其有成乎質曰𤣥感地勢雖隆素非人望因百姓之勞冀幸成功今天下一家未易可動帝遣虎賁郎將陳稜攻元務本於黎陽又遣左翊衛大將軍宇文述左候衛將軍屈突通乗傳發兵以討𤣥感來䕶兒至東萊聞𤣥感圍東都召諸將議旋軍救之諸將咸以無勅不宜擅還固執不從䕶兒厲聲曰洛陽被圍心腹之疾高麗逆命猶疥癬耳公家之事知無不為專擅在吾不關諸人有沮議者軍法從事即日迴軍令子𢎞整馳驛奏聞帝時還至涿郡已敕䕶兒救東都見𢎞整甚悦賜䕶兒璽書曰公旋師之時是朕敕公之日君臣意合逺同符契先是右武侯大將軍李子雄坐事除名令從軍自效從來䕶兒在東萊帝疑之詔鎖子雄送行在所子雄殺使者逃犇𤣥感衛文昇以步騎二萬渡瀍水與𤣥感戰𤣥感屢破之𤣥感每戰身先士卒所向摧陷又善撫悦其下皆樂為致死由是每戰多捷衆益盛至十萬人文昇衆寡不敵死傷大半且盡乃更進屯邙山之陽與𤣥感決戰一日十餘合㑹楊𤣥挺中流矢死𤣥感軍乃稍却秋七月癸未餘杭民劉元進起兵以應𤣥感衆至數萬始楊𤣥感至東都自謂天下響應功在朝夕得韋福嗣委以心膂不復專任李宻福嗣每畫䇿皆持兩端宻揣知其意謂𤣥感曰福嗣元非同盟實懷觀望明公初起大事而姦人在側聽其是非必為所誤請斬之𤣥感曰何至於此宻退謂所親曰楊公好反而不欲勝吾屬今為虜矣李子雄勸𤣥感速稱尊號𤣥感以問宻宻曰昔陳勝自欲稱王張耳諫而被外魏武將求九錫荀彧止而見誅今者宻欲正言還恐追蹤二子阿䛕順意又非宻之本圖何者兵起以來雖復頻捷至於郡縣未有從者東都守禦尚彊天下救兵益至公當挺身力戰早定關中迺急欲自尊何示人不廣也𤣥感笑而止屈突通引軍屯河陽宇文述繼之𤣥感問計於李子雄子雄曰通曉習兵事若一得渡河則勝負難決不如分兵拒之通不能濟則樊衛失援𤣥感然之將拒通樊子蓋知其謀數擊其營𤣥感不得往通濟河軍於破陵𤣥感分為兩軍西抗文昇東拒通子蓋復出兵大戰𤣥感軍屢敗與其黨謀之李子雄曰東都援軍益至我軍數敗不可乆留不如直入關中開永豐倉以賑貧乏三輔可指麾而定據有府庫東面而争天下亦霸王之業也李宻曰𢎞化留守元𢎞嗣握彊兵在隴右可聲言其反遣使迎公因此入關可以紿衆㑹華隂諸楊請為鄉導壬辰𤣥感解東都圍引兵西趣潼關宣言我已破東都取關西矣宇文述等諸軍躡之至𢎞農宫父老遮説𤣥感曰宫城空虚又多積粟攻之易下𤣥感以為然𢎞農太守蔡王智積謂官屬曰𤣥感聞大軍將至欲西圖關中若成其計則難克也當以計縻之使不得進不出一旬可以成擒及𤣥感軍至城下智積登陴詈之𤣥感怒留攻之李宻諌曰公今詐衆西入軍事貴速况乃追兵將至安可稽留若前不得據關退無所守大衆一散何以自全𤣥感不從遂攻之燒其城門智積於内益火𤣥感兵不得入三日不拔乃引而西至閺鄉宇文述衛文昇來䕶兒屈突通等軍追及之於皇天原𤣥感上槃豆布陳亘五十里且戰且行𤣥感一日三敗八月壬寅𤣥感陳於董杜原諸軍擊之𤣥感大敗獨與十餘騎奔上洛追騎至𤣥感叱之皆反走至葭蘆戌獨與弟積善徒步走自度不免謂積善曰我不能受人戮辱汝可殺我積善抽刀斫殺之因自刺不死為追兵所執與𤣥感首俱送行在所磔𤣥感尸於東都市三日復臠而焚之𤣥感弟𤣥奬為義陽太守將赴𤣥感為郡丞周旋玉所殺仁行為朝請大夫伏誅於長安𤣥感之圍東都也梁郡民韓相國舉兵應之𤣥感以為河南道元帥旬日間衆十餘萬攻剽郡縣至襄城聞𤣥感敗衆稍散為吏所獲傳首東都楊𤣥感之西也韋福嗣亡詣東都歸首是時如其比者皆不問樊子蓋収𤣥感文簿得其書草封以呈帝帝命執送行在李宻亡命為人所獲亦送東都樊子蓋鎖送福嗣宻及楊積善王仲伯等十餘人詣高陽宻與王仲伯等竊謀亡去悉使出其所齎金以示使者曰吾等死日此金並留付公幸用相瘞其餘即皆報德使者利其金許諾防禁漸弛宻請通市酒食每宴飲諠譁竟夕使者不以為意行至魏郡石梁驛飲防守者皆醉穿牆而逸宻呼韋福嗣同去福嗣曰我無罪天子不過一面責我耳至高陽帝以書草示福嗣収付大理諸應刑者支體糜碎積善福嗣仍加車裂十二年李宻之亡也往依郝孝德孝德不禮之又入王薄薄亦不之奇也宻困乏至削樹皮而食之匿於淮陽村舍變姓名聚徒教授郡縣疑而捕之宻亡去抵其妹夫雍丘令丘君明君明不敢舍匿轉寄宻於遊俠王秀才家秀才以女妻之君明從姪懷義告其事帝令懷義自齎敕書與梁郡通守楊汪相知収捕汪遣兵圍秀才宅適值宻出外由是獲免君明秀才皆死韋城翟讓為東都法曹坐事當斬獄吏黄君漢奇其驍勇夜中潜謂讓曰翟法司天時人事抑亦可知豈能守死獄中乎讓驚喜叩頭曰讓圏牢之豕死生唯黄曹主所命君漢即破械出之讓再拜曰讓蒙再生之恩則幸矣奈黄曹主何因泣下君漢怒曰本以公為大丈夫可救生民之命故不顧其死以奉脫奈何反效兒女子涕泣相謝乎君但努力自免勿憂吾也讓遂亡命於瓦岡為羣盜同郡單雄信驍健善用馬槊聚少年往從之離狐徐世勣家於衛南年十七有勇略説讓曰東郡於公與勣皆為鄉里人多相識不宜侵掠滎陽梁郡汴水所經剽行舟商旅足以自資讓然之引衆入二郡界掠公私船資用豐給附者益衆聚徒至萬餘人時又有外黄王當仁濟陽王伯當韋城周文舉雍丘李公逸等皆擁衆為盜李宻自雍丘亡命往來諸帥間説以取天下之䇿始皆不信乆之稍以為然相謂曰斯人公卿子孫志氣若是今人人皆云楊氏將滅李氏將興吾聞王者不死斯人再三獲濟豈非其人乎由是漸敬宻宻察諸帥唯翟讓最强乃因王伯當以見讓為讓畫䇿往説諸小盜皆下之讓説稍親近宻與之計事宻因説讓曰劉項皆起布衣為帝王今主昬於上民怨於下鋭兵盡於遼東和親絶於突厥方乃巡遊楊越委棄東都此亦劉項奮起之㑹也以足下雄才大畧士馬精鋭席卷二京誅滅暴虐隋氏不足亡也讓謝曰吾儕羣盜日反偷生草間君之言者非吾所及也㑹有李𤣥英者自東都逃來經歴諸賊求訪李宻曰斯人當代隋家人問其故𤣥英言比來民間謡歌有桃李章曰桃李子皇后繞楊州宛轉花園裏勿浪語誰道許桃李子謂逃亡者李氏之子也皇與后皆君也宛轉花園裏謂天子在楊州無還日將轉於溝壑也莫浪語誰道許者宻也既與宻遇遂委身事之前宋城尉齊郡房彦藻自負其才恨不為時用預於楊𤣥感之謀變姓名亡命遇宻於梁宋之間遂與之俱遊漢沔徧入諸賊説其豪傑還日從者數百人仍為遊客處於讓營讓見宻為豪傑所歸欲從其計猶豫未決有賈雄者曉隂陽占候為讓軍師言無不用宻深結於雄使之託術數以説讓雄許諾懷之未發㑹讓召雄告以宻所言問其可否對曰吉不可言又曰公自立恐未必成若立斯人事無不濟讓曰如卿言蒲山公當自立何來從我對曰事有相因所以來者將軍姓翟翟者澤也蒲非澤不生故須將軍也讓然之與宻情好日篤宻因説讓曰今四海糜沸不得耕耘公士衆雖多食無倉廩唯資野掠常苦不給若曠日持乆加以大敵臨之必渙然離散未若先取滎陽休兵館糓待士馬肥充然後與人争利讓從之於是破金隄關攻滎陽諸縣多下之滎陽太守郇王慶𢎞之子也不能討帝徙張須陁為滎陽通守以討之庚戌須陁引兵擊讓讓曏數為須陁所敗聞其來大懼將避之宻曰須陁勇而無謀兵又驟勝既驕且狠可一戰擒也公但列陳以待宻保為公破之讓不得已勒兵將戰宻分兵千餘人伏於大海寺北林間須陁素輕讓方陳而前讓與戰不利須陁乗之逐北十餘里宻發伏掩之須陁兵敗宻與讓及徐世勣王伯當合軍圍之須陁潰圍出左右不能盡出須陁躍馬復入救之來往數四遂戰死所部兵晝夜號哭數日不止河南郡縣為之喪氣鷹揚郎將河東賈務本為須陁之副亦被傷帥餘衆五千餘人奔梁郡務本尋卒詔以光禄大夫裴仁基為河南道討捕大使代領其衆徙鎮虎牢讓乃令宻建牙别統所部號蒲山公營宻部分嚴整凡號令士卒雖盛夏皆如背負霜雪躬服儉素所得金寶悉頒賜麾下由是人為之用麾下士卒多為讓士卒所陵辱以威約有素不敢報也讓謂宻曰今資糧粗足意欲還向瓦岡公若不往唯公所適讓從此别矣讓帥輜重東引宻亦西行至康城説下數城大獲資儲讓尋悔復引兵從宻恭帝義寧元年春二月李宻説翟讓曰今東都空虚兵不素練越王沖㓜越王太子昭之子侗煬帝命留守東都留守諸官政令不壹士民離心段達元文都闇而無謀以僕料之彼非將軍之敵若將軍能用僕計天下可指麾而定也乃遣其黨裴叔方覘東都虚實留守官司覺之始為守禦之備且馳表告江都宻謂讓曰事勢如此不可不發兵法曰先則制於己後則制於人今百姓饑饉洛口倉多積粟去都百里有餘將軍若親帥大衆輕行掩襲彼逺未能救又先無預備取之如拾遺耳比其聞知吾已獲之發粟以賑窮乏逺近孰不歸附百萬之衆一朝可集枕威養鋭以逸待勞縱彼能來吾有備矣然後檄召四方引賢豪而資計䇿選驍悍而授兵柄除亡隋之社稷布將軍之政令豈不盛哉讓曰此英雄之略非僕所堪惟君之命盡力從事請君先發僕為後殿庚寅宻讓將精兵七千人出陽城北踰方山自羅口襲興洛倉破之開倉恣民所取老弱繦負道路相屬朝散大夫時德叡以尉氏應宻前宿城令祖君彦自昌平往歸之君彦珽之子也博學强記文辭贍敏著名海内吏部侍郎薛道衡嘗薦之於高祖高祖曰是歌殺斛律明月人兒邪朕不須此輩煬帝即位尤疾其名依常調選東平郡書佐檢校宿城令君彦自負其才恒鬱鬱思亂宻素聞其名得之大喜引為上客軍中書檄悉以委之越王侗遣虎賁郎將劉長恭光禄少卿房崱帥步騎三萬五千討宻時東都人皆以宻為飢賊盜米烏合易破争來應募國子三館學士及貴勝親戚皆來從軍器械修整衣服鮮華旌旗鉦鼓甚盛長恭等當其前使河南討捕使裴仁基等將所部兵自汜水西入以掩其後約十一日㑹於倉城南宻譲具知其計東都兵先至士卒未朝食長恭等驅之度洛水陳於石子河西南北十餘里宻讓選驍雄分為十隊令四隊伏横嶺下以待仁基以六隊陳於石子河東長恭等見宻兵少輕之讓先接戰不利宻帥麾下横衝之隋兵飢疲遂大敗長恭等解衣潜竄得免奔還東都士卒死者什五六越王侗釋長恭等罪慰撫之宻讓盡収其輜重器甲威聲大振讓於是推宻為主上宻號為魏公庚子設壇場即位稱元年大赦其文書行下稱行軍元帥府其魏公府置三司六衛元帥府置長史以下官屬拜翟讓為上柱國司徒東郡公亦置長史以下官減元帥府之半以單雄信為左武候大將軍徐世勣為右武候大將軍各領所部房彦藻為元帥左長史東郡邴元真為右長史楊德方為左司馬鄭德韜為右司馬祖君彦為記室其餘封拜各有差於是趙魏以南江淮以北羣盜莫不響應孟讓郝孝德王德仁及濟隂房獻伯上谷王君廓長平李士才淮陽魏六兒李德謙譙郡張遷魏郡李文相譙郡黒社白社濟北張青特上洛周比洮胡驢賊等皆歸宻宻悉拜官爵使各領其衆置百營簿以領之道路降者不絶如流衆至數十萬乃命其護軍四茂廣築洛口城周四十里而居之宻遣房彦藻將兵東略地取安陸汝南淮安濟陽河南郡縣多陷於宻夏四月李宻以孟讓為總管齊郡公己丑夜讓帥步騎二千入東都外郭燒掠豐都市比曉而去於是東都居民悉遷入宫城臺省府寺皆滿鞏縣長柴孝和監察御史鄭頲以城降宻宻以孝和為䕶軍頲為右長史裴仁基每破賊得軍資悉以賞士卒監軍御史蕭懷静不許士卒怨之懷静又屢求仁基長短劾奏之倉城之戰仁基失期不至聞劉長恭等敗懼不敢進屯百花谷固壘自守又恐獲罪於朝李宻知其狼狽使人説之啗以厚利賈務本之子閏甫在軍中勸仁基降宻仁基曰如蕭御史何閏甫曰蕭君如栖上雞若不知機變在明公一刀耳仁基從之遣閏甫詣宻請降宻大喜以閏甫為元帥府司兵參軍兼直記室事使之復命遺仁基書慰納之仁基還屯虎牢蕭懷静宻表其事仁基知之遂殺懷静帥其衆以虎牢降宻宻以仁基為上柱國河東公仁基子行儼驍勇善戰宻亦以為上柱國絳郡公宻得秦叔寶及東阿程齩金皆用為驃騎選軍中尤驍勇者八千人分𨽻四驃騎以自衛號曰内軍常曰此八千人足當百萬齩金更名知節羅士信趙仁基皆帥衆歸宻宻署為總管使各統所部癸巳宻遣裴仁基孟讓帥二萬餘人襲回洛東倉破之遂燒天津橋縱兵大掠東都出兵擊之仁基等敗走宻自帥衆屯回洛倉東都兵尚二十餘萬人乗城擊柝晝夜不解甲宻攻偃師金墉皆不克乙未還洛口東都城内乏糧而布帛山積至以絹為汲綆然布以㸑越王侗使人運回洛倉米入城遣兵五千屯豐都市五千屯上春門五千屯北邙山為九營首尾相應以備宻丁酉房獻伯陷汝隂淮陽太守趙陁舉郡降宻己亥宻帥衆三萬復據回洛倉大修營塹以逼東都段達等出兵七萬拒之辛丑戰於倉北隋兵敗走丁未宻使其幕府移檄郡縣數煬帝十罪且曰罄南山之竹書罪無窮決東海之波流惡難盡祖君彦之辭也五月煬帝命監門將軍涇陽龎玉虎賁郎將霍世舉將關内兵援東都柴孝和説李宻曰秦地山川之固秦漢所憑以成王業者也今不若使翟司徒守洛口裴柱國守回洛明公自簡精鋭西襲長安既克京邑業固兵强然後東向以平河洛傳檄而天下定矣方今隋失其鹿豪傑競逐不早為之必有先我者悔無及矣宻曰此誠上䇿吾亦思之乆矣但昏主尚存從兵猶衆我所部皆山東人見洛陽未下誰肯從我西入諸將出於羣盜留之各競雌雄如此則大業隳矣孝和曰然則大軍既未可西上僕請間行觀釁宻許之孝和與數十騎至陜縣山賊歸之者萬餘人時宻兵鋒甚鋭每入苑與隋兵連戰㑹宻為流矢所中卧營中丁丑越王侗使段達與龐玉等夜出陳於回洛倉西北密與裴仁基出戰達等大破之殺傷大半宻乃棄回洛奔洛口龎玉霍世舉軍于偃師柴孝和之衆聞宻退各散去孝和輕騎歸宻楊德方鄭德韜皆死宻以鄭頲為左司馬滎陽鄭乾象為右司馬六月李宻復帥衆向東都丙申大戰于平樂園宻左騎右步中列强弩鳴千鼓以衝之東都兵大敗宻復取回洛倉秋七月煬帝遣江都通守王世充將江淮勁卒將軍王隆帥卭黄蠻河北大使太常少卿韋霽河南大使虎牙郎將王辯等各帥所領同赴東都相知討李宻霽世康之子也煬帝詔左禦衛大將軍涿郡留守薛世雄將燕地精兵三萬討李宻命王世充等諸將皆受世雄節度軍所過盜賊隨便誅翦九月武陽郡丞元寶藏以郡降李宻甲寅宻以寶藏為上柱國武陽公寶藏使其客鉅鹿魏徵為啓謝宻且請改武陽為魏州又請帥所部西取魏郡南㑹諸將取黎陽倉宻喜即以寶藏為魏州總管召魏徵為元帥府文學參軍掌記室徵少孤貧好讀書有大志落拓不事生業始為道士寶藏召典書記宻愛其文辭故召之初貴鄉長𢎞農魏德深為政清静不嚴而治遼東之役徵稅百端使者旁午責成郡縣民不堪命唯貴鄉閭里不擾有無相通不竭其力所求皆給元寶藏受詔捕賊數調器械動以軍法從事其鄰城營造皆聚於聽事官吏遞相督責晝夜喧囂猶不能濟德深聴隨便修營官府寂然恒若無事唯戒吏以不須過勝餘縣使百姓勞苦然民各自竭心常為諸縣之最縣民愛之如父母寶藏深喜其能遣將千兵赴東都所領兵聞寶藏降宻思其親戚輒出都門東向慟哭而返或勸之降宻皆泣曰我與魏明府同來何忍棄去河南山東大水餓殍滿野煬帝詔開黎陽倉賑之吏不時給死者日數萬人徐世勣言於李宻曰天下大亂本為饑饉今更得黎陽倉大事濟矣宻遣世勣帥麾下五千人自原武濟河㑹元寶藏郝孝德李文相及洹水賊帥張升清河賊帥趙君德共襲破黎陽倉據之開倉恣民就食浹旬間得勝兵二十餘萬武安永安義陽弋陽齊郡相繼降宻竇建德朱粲之徒亦遣使附宻宻以粲為揚州總管鄧公泰山道士徐洪客獻書於宻以為大衆乆聚恐米盡人散師老厭戰難可成功勸宻乗進取之機因士馬之鋭沿流東指直向江都執取獨夫號令天下宻壯其言以書招之洪客竟不出莫知所之王世充韋霽王辯及河内通守孟善誼河陽郡尉獨孤武都各帥所領㑹東都唯王隆後期不至己未越王侗使虎賁郎將劉長恭等帥留守兵龎玉等帥偃師兵與世充等合十餘萬衆撃李宻於洛口與宻夾洛水相守煬帝詔諸軍皆受世充節度帝遣攝江都郡丞馮慈明向東都為宻所獲宻素聞其名延坐勞問禮意甚厚因謂曰隋祚已盡公能與孤共立大功乎慈明曰公家歴事先朝榮禄兼備不能善守門閲乃與𤣥感舉兵偶脱網羅得有今日唯圖反噬未諭高旨莽卓敦𤣥非不强盛一朝夷滅罪及祖宗僕死而後已不敢聞命宻怒囚之慈明説防人席務本使亡走奉表江都及致書東都論賊形勢至雍丘為宻將李公逸所獲宻又義而釋之出至營門翟讓殺之慈明子琮之子也宻之克洛口也箕山府郎將張季珣固守不下宻以其寡弱遣人呼之季珣罵宻極口宻怒遣兵攻之不能克時宻衆數十萬在其城下季珣四面阻絶所領不過數百人而執志彌固誓以必死乆之糧盡水竭士卒羸病季珣撫循之一無離散自三月至于是月城遂陷季珣見宻不肯拜曰天子爪牙何容拜賊宻猶欲降之誘諭終不屈乃殺之季珣祥之子也冬十月壬寅王世充夜渡洛水營於黒石明日分兵守營自將精兵陳於洛北李宻聞之引兵渡洛逆戰宻兵大敗柴孝和溺死宻帥麾下精騎渡洛南餘衆東走月城世充追圍之宻自洛南䇿馬直趣黒石營中懼連舉六烽世充釋月城之圍狼狽自救宻還與戰大破之斬首三千餘級王世充自洛北之敗堅壁不出越王侗遣使勞之世充慙懼請戰於宻丙辰世充與宻夾石子河而陳宻布陳南北十餘里翟讓先與世充戰不利而退世充逐之王伯當裴仁基從旁横斷其後宻勒中軍擊之世充大敗西走翟讓司馬王儒信勸讓自為大冢宰總統衆軍以奪宻權讓不從讓兄柱國滎陽公寛粗愚人也謂讓曰天子汝當自為奈何與人汝不為者我當為之讓但大笑不以為意宻聞而惡之刺史崔世樞自鄢陵初附於宻讓囚之私府責其貨世樞營錢未辦遽欲加刑讓召元帥府記室邢義期博逡巡未就杖之八十讓謂左長史房彦藻曰君前破汝南大得寶貨獨與魏公全不與我魏公我之所立事未可知彦藻懼以狀告宻因與左司馬鄭頲共説宻曰讓貪愎不仁有無君之心宜早圖之宻曰今安危未定遽相誅殺何以示逺頲曰毒虵螫手壯夫解腕所全者大故也彼先得志悔無所及宻乃從之置酒召讓戊午讓與兄寛及兄子司徒府長史摩侯同詣宻宻與讓寛裴仁基郝孝德共坐單雄信等皆立侍房彦藻鄭頲往來檢校宻曰今日與達官飲不須多人左右止留數人給使而已宻左右皆引去讓左右猶在彦藻白宻曰今方為樂天時甚寒司徒左右請給酒食宻曰聴司徒進止讓應曰甚佳乃引讓左右盡出獨宻下壯士蔡建德持刀立侍食未進宻出良弓與讓習射讓方引滿建德自後斫之踣於牀前聲若牛吼幷寛摩侯儒信皆殺之徐世勣走出門者斫之傷頸王伯當遥訶止之單雄信叩頭請命宻釋之左右驚擾莫知所為宻大言曰與君等同起義兵本除暴亂司徒專行貪虐陵辱羣僚無復上下今所誅止其一家諸君無預也命扶徐世勣置幕下親為傳創讓麾下欲散宻使單雄信前往宣慰宻尋獨騎入其營歴加撫諭令世勣雄信伯當分領其衆中外遂定讓殘忍摩侯猜忌儒信貪縱故死之日所部無哀之者然宻之將佐始有自疑之心矣始王世充知讓與宻必不乆睦冀其相圖得從而乘之及聞讓死大失望嘆曰李宻夫資明決為龍為蛇固不可測也十二月庚子王世充軍士有亡降李宻者宻問世充軍中何所為軍士曰比見益募兵再饗將士不知其故宻謂裴仁基曰吾幾落奴度中光禄知之乎吾乆不出兵世充芻糧將竭求戰不得故募兵饗士欲乘月晦以襲倉城耳宜速備之乃命平原公郝孝德琅邪公王伯當齊郡公孟讓勒兵分屯倉城之側以待之其夕三鼓世充兵果至伯當先遇之與戰不利世充兵即陵城總管魯儒拒却之伯當更収兵擊之世充大敗斬其驍將費青奴士卒戰溺死者千餘人世充屢與宻戰不勝越王侗遣使勞之世充訴以兵少數戰疲弊侗以兵七萬益之唐高祖武德元年春正月王世充既得東都兵進擊李宻於洛北敗之遂屯鞏北辛酉世充命諸軍各造浮橋渡洛擊宻橋先成者先進前後不一虎賁郎將王辯破宻外柵宻營中驚擾將潰世充不知鳴角収衆宻因帥敢死士乗之世充大敗爭橋溺死者萬餘人王辯死世充僅自免洛北諸軍皆潰世充不敢入東都北趣河陽是夜疾風寒雨軍士涉水沾濕道路凍死者又以萬數世充獨與數千人至河陽自繫獄請罪越王侗遣使赦之召還東都賜金帛美女以安其意世充収合亡散復得萬餘人屯含嘉城不敢復出宻乗勝進據金墉城修其門城廬舍而居之鉦鼔聲聞於東都未幾擁兵三十餘萬陳於北邙南逼上春門乙丑金紫光禄大夫段達民部尚書韋津出兵拒之達望見宻兵盛懼而先還宻縱兵乗之軍遂潰韋津死於是偃師柏谷及河陽都尉獨孤武都檢校河内郡丞柳燮職方郎柳續等各舉所部降於宻竇建德朱粲孟海公徐圓朗等並遣使奉表勸進宻官屬裴仁基等亦上表請正位號宻曰東都未平不可議此戊辰唐王以世子建成為左元帥秦公世民為右元帥督諸軍十餘萬人救東都東都乏食太府卿元文都等募守城者不食公糧進散官二品於是商賈執象而朝者不可勝數二月李宻遣房彦藻鄭頲等東出黎陽分道招慰州縣以梁郡太守楊汪為上柱國宋州總管又以手書與之曰昔在雍丘曽相追捕射鈎斬袂不敢庶幾汪遣使往來通意宻亦羈縻待之彦藻以書招竇建德使來見宻建德復書卑辭厚禮託以羅藝南侵請捍禦北垂彦藻還至衛州賊帥王德仁邀殺之德仁有衆數萬據何慮山四出抄掠為數州之患夏四月世子建成等至東都軍於芳華苑東都閉門不出遣人招諭不應李宻出軍争之小戰各引去城中人多欲為内應者趙公世民曰吾新定關中根本未固懸軍逺來雖得東都不能守也遂不受戊寅引軍還東都號令不出四門人無固志朝議郎段世𢎞等謀應西師㑹西師已還乃遣人招李宻期以己亥夜納之事覺越王命王世充討誅之宻聞城中已定乃還五月王德仁既殺房彦藻李宻遣徐世勣討之德仁兵敗甲寅與武安通守袁子幹皆來降詔以德仁為鄴郡太守隋煬帝凶聞至東都戊辰留守官奉越王即皇帝位大赦改元皇泰以段達為納言陳國公王世充為納言鄭國公元文都為内史令魯國公皇甫無逸為兵部尚書把國公又以盧楚為内史令郭文懿為内史侍郎趙長文為黄門侍郎共掌朝政時人號七貴皇泰主眉目如畫温厚仁愛風格儼然東都聞宇文化及西來上下震懼有蓋琮者上疏請説李宻與之合勢拒化及文都謂盧楚等曰今讎恥未雪而兵力不足若赦宻罪使撃化及兩賊自鬬吾徐承其弊化及既破宻兵亦疲又其將士利吾官賞易可離間幷宻亦可擒也楚等皆以為然即以琮為通直散騎常侍齎勅書賜宻宻與東都相持日乆又東拒化及常畏東都議其後見蓋琮至大喜遂上表乞降請討化及以贖罪送所獲凶黨雄武郎將于洪建遣元帥府記室參軍李儉上開府徐師譽等入見皇泰主命戮洪建於左掖門外元文都等以宻降為誠實盛飭賓館於宣仁門東皇泰主引見儉等以儉為司農卿師譽為尚書右丞冊拜宻太尉尚書令東南道大行臺行軍元帥魏國公令先平化及然後入朝輔政以徐世勣為右武侯大將軍仍下詔稱宻忠款且曰其用兵機略一稟魏公節度元文都等喜於和解謂天下可定置酒作樂王世充作色曰朝廷官爵乃以與賊志欲何為邪文都等亦疑世充由是有隙秋七月皇泰主遣大理卿張權鴻臚卿崔善福賜李宻書曰今日以前咸共刷蕩使至以後彼此通懷七政之重佇公匡弼九伐之利委公指揮權等既至宻北面拜受詔書既無西慮悉以精兵東拒化及宻知化及軍糧且盡因偽與和化及大喜恣其兵食冀宻饋之㑹宻下有人獲罪亡抵化及具言其情化及大怒其食又盡乃渡永濟渠與宻戰于童山之下自辰達酉宻為流矢所中墮馬悶絶左右奔散追兵且至惟秦叔寶獨捍衛之宻由是獲免叔寶復収兵與之力戰化及乃退化及入汲郡求軍糧又遣使拷掠東郡吏民以責米粟王軌等不堪其弊遣通事舍人許敬宗詣宻請降宻以軌為滑州總管以敬宗為元帥府記室與魏徵共掌文翰房公蘇威在東都隨衆降宻王軌叛大懼自汲郡引兵欲取以比諸郡其將陳智略帥嶺南驍果萬餘人樊文超帥江淮排􅗋張童兒率江東驍果數千人皆降於宻化及猶有衆二萬北趣魏縣宻知其無能為西還鞏洛留徐世勣以備之李宻每戰勝輒遣使告捷於皇泰主隋人皆喜王世充獨謂其麾下曰元文都輩刀筆吏耳吾觀其勢必為李宻所擒且吾軍士屢與宻戰沒其父兄子弟前後已多一旦為之下吾屬無類矣欲以激怒其衆文都聞之大懼與盧楚等謀因世充入朝伏甲誅之段達性庸懦恐事不就遣其壻張志以楚等謀告世充戊午夜三鼓世充勒兵襲含嘉門元文都聞變入奉皇泰主御乾陽殿陳兵自衛命諸將閉門拒守將軍跋野綱將兵遇世充下馬降之將軍費曜田闇戰於門外不利文都自將宿衛兵欲出𤣥武門以襲其後長秋監段瑜稱求門鑰不獲稽留遂乆天且曙文都引兵復欲出太陽門逆戰還至乾陽殿世充已攻太陽門得入皇甫無逸棄母及妻子斫右掖門奔長安盧楚匿於太官署世充之黨擒之至興教門見世充世充令亂斬殺之進攻紫㣲宫門皇泰主使人登紫㣲觀問稱兵欲何為世充下馬謝曰元文都盧楚等横見規圖請殺文都甘從刑典段達乃令將軍黄桃樹執送文都文都顧謂皇泰主曰臣今朝死陛下夕及矣皇泰主慟哭遣之出興教門亂斬如盧楚幷殺盧元諸子段達又以皇泰主命開門納世充世充悉遣人代宿衛者然後入見皇㤗主於乾陽殿皇泰主謂世充曰擅相誅殺曽不聞奏豈為臣之道乎公欲肆其强力敢及我邪世充拜伏流涕謝曰臣蒙先皇采拔粉骨非報文都等包藏禍心欲召李宻以危社稷疾臣違異深積猜嫌臣迫於救死不暇聞奏若内懷不臧違負陛下天地日月實所照臨使臣闔門殄滅無復遺類詞淚俱發皇泰主以為誠引令升殿與語乆之因與俱入見皇太后世充被髪為誓不敢有二心乃以世充為左僕射總督内外諸軍事比及日中捕獲趙長文郭文懿殺之然後巡城告諭以誅元盧之意世充自含嘉城移居尚書省漸結黨援恣行威福用兄世惲為内史令入居禁中子弟咸典兵馬分政事為十頭悉以其黨主之勢震内外莫不趨赴皇泰主拱手而已李宻將入朝至温聞元文都等死乃還金墉東都大饑私錢濫惡大半雜以錫鐶其細如線米斛直錢八九萬初李宻嘗受業於儒生徐文逺文逺為皇泰主國子祭酒自出樵采為宻軍所執宻令文逺南面坐備弟子禮北面拜之文逺曰老夫既荷厚禮敢不盡言未審將軍之志欲為伊霍以繼絶扶傾乎則老夫雖遲暮猶願盡力若為莽卓乗危邀利則無所用老夫矣宻頓首曰昨奉朝命備位上公冀竭庸虚匡濟國難此宻之本志也文逺曰將軍名臣之子失塗至此若能不逺而復猶不失為忠義之臣及王世充殺元文都等宻復問計於文逺文逺曰世充亦門人也其為人殘忍􅄶隘既乗此勢必有異圖將軍前計為不諧矣非破世充不得入朝也宻曰始謂先生儒者不達時事今乃坐決大計何其明也文逺孝嗣之𤣥孫也初李宻既殺翟讓頗自驕矜不恤士衆倉粟雖多無府庫錢帛戰士有功無以為賞又厚撫初附之人衆心頗怨徐世勣嘗因宴㑹刺譏其短宻不懌使世勣出鎮黎陽雖名委任實亦疎之宻開洛口倉散米無防守典當者又無文劵取之者隨意多少或離倉之後力不能致委棄衢路自倉城至郭門米厚數寸為車馬所轥踐羣盜來就食者并家屬近百萬口無甕盎織荆筐淘米洛水兩岸十里之間望之皆如白沙宻喜謂賈閏甫曰此可謂足食矣閏甫對曰國以民為本民以食為天今民所以襁負如流而至者以所天在此故也而有司曽無愛吝屑越如此竊恐一旦米盡民散明公孰與成大業哉宻謝之即以閏甫判司倉參軍事宻以東都兵數敗㣲弱而將相自相屠滅謂朝夕可平王世充既專大權厚賞將士繕治器械亦隂圖取宻時隋軍乏食宻軍少衣世充請交易宻難之長史邴元真等各求私利勸宻許之先是東都人歸宻者日以百數既得食降者益少宻悔而止宻破宇文化及還其勁卒良馬多死士卒疲病世充欲乗其弊撃之恐人心不一乃詐稱左軍衛士張永通三夢周公令宣意於世充當勒兵相助撃賊乃為周公立廟每出兵輒先祈禱世充令巫宣言周公欲令僕射急討李宻當有大功不即兵皆疫死世充兵多楚人信妖言皆請戰世充簡練精鋭得二萬餘人馬二千餘匹壬子出師撃宻旗幡之上皆書永通字軍容甚盛癸丑至偃師營於通濟渠南作三橋於渠上宻留王伯當守金墉自引精兵出偃師北阻邙山以待之宻召諸將㑹議裴仁基曰世充悉衆而至洛下必虚可分兵守其要路令不得東簡精兵三萬傍河西出以逼東都世充還我且按甲世充再出我又逼之如此則我有餘力彼勞奔命破之必矣宻曰公言大善今東都兵有三不可當兵仗精鋭一也決計深入二也食盡求戰三也我但乗城固守蓄力以待之彼欲鬬不得求走無路不過十日世充之頭可致麾下陳智略樊文超單雄信皆曰計世充戰卒甚少屢經摧破悉已喪膽兵法曰倍則戰况不啻倍哉且江淮新附之士望因此機展其勲效及其鋒而用之可以得志於是諸將喧然欲戰者什七八宻惑於衆議而從之仁基苦争不得撃地嘆曰公後必悔之魏徵言於長史鄭頲曰魏公雖驟勝而驍將鋭卒多死戰士心怠此二者難以應敵且世充乏食志在死戰難與争鋒未若深溝高壘以拒之不過旬月世充糧盡必自退追而撃之蔑不勝矣頲曰此老生之常談耳徵曰此乃奇䇿何謂常談拂衣而起程知節將内馬軍與宻同營在北邙山上單雄信將外馬軍營於偃師城北世充遣數百騎度通濟渠攻雄信營宻遣裴行儼與知節助之行儼先馳赴敵中流矢墜於地知節救之殺數人世充軍披靡乃抱行儼重騎而還為世充騎所逐刺槊洞過知節迴身捩折其槊兼斬追者與行儼俱免㑹日暮各斂兵還營宻驍將孫長樂等十許人皆被重創宻新破宇文化及有輕世充之心不設壁壘世充夜遣二百餘騎潜入北山伏谿谷中命軍士皆秣馬蓐食甲寅將戰世充誓衆曰今日之戰非直争勝負死生之分在此一舉若其捷也富貴固所不論若其不捷必無一人獲免所争者死非獨為國各宜勉之遲明引兵薄宻宻出兵應之未及成列世充縱兵撃之世充士卒皆江淮剽勇出入如飛世充先索得一人貌類宻者縛而匿之戰方酣使牽以過陳前譟曰已獲李宻矣士卒皆呼萬嵗其伏兵發乘高而下馳壓宻營縱火焚其廬舍宻衆大潰其將張童仁陳智略皆降宻與萬餘人馳向洛口世充夜圍偃師鄭頲守偃師其部下翻城納世充初世充家屬在江都隨宇文化及至滑臺又隨王軌入李宻宻留於偃師欲以招世充及偃師破世充得其兄世偉子𤣥應䖍恕瓊等又獲宻將佐裴仁基鄭頲祖君彦等數十人世充於是整兵向洛口得邴元真妻子鄭䖍象母及宻諸將子弟皆撫慰之令潜呼其父兄初邴元真為縣吏坐贓亡命從翟讓於瓦岡讓以其嘗為吏使掌書記及宻開幕府妙選時英讓薦元真為長史宻不得已用之行軍謀畫未嘗參預宻西拒世充留元真洛口倉元真性貪鄙宇文温謂宻曰不殺元真必為公患宻不應元真知之隂謀叛宻楊慶聞之以告宻宻固疑焉至是宻將入洛口城元真已遣人潜引世充矣宻知而不發因與衆謀待世充兵半濟洛水然後擊之世充軍至宻候騎不時覺比將出戰世充軍悉已濟矣單雄信等又勒兵自據宻自度不能支帥麾下輕騎奔虎牢元真遂以城降初雄信驍捷善用馬槊名冠諸軍軍中號曰飛將彦藻以雄信輕於去就勸宻除之宻愛其才不忍也及宻失利雄信遂以所部降世充宻將如黎陽或曰殺翟讓之際徐世勣幾死今失利而就之安可保乎時王伯當棄金墉保河陽宻自虎牢歸之引諸將共議宻欲南阻河北守太行東連黎陽以圖進取諸將皆曰今兵新失利衆心危懼若更停留恐叛亡不日而盡又人情不願難以成功宻曰孤所恃者衆也衆既不願孤道窮矣欲自刎以謝衆伯當抱宻號絶衆皆悲泣宻復曰諸君幸不相棄當共歸關中宻身雖無功諸君必保富貴府椽柳燮曰明公與唐公同族兼有疇昔之好雖不陪起兵然阻東都斷隋歸路使唐公不戰而據長安此亦公之功也衆咸曰然宻又謂王伯當曰將軍室家重大豈復與孤俱行哉伯當曰昔蕭何盡帥子弟以從漢王伯當恨不兄弟俱從豈以公今日失利遂輕去就乎縱分身原野亦所甘心左右莫不感激從宻入關者凡二萬人於是宻之將帥州縣多降於隋冬十月李宻將至上遣使迎勞相望於道宻大喜謂其徒曰我擁衆百萬一朝解甲歸唐山東連城數百知我在北遣使招之亦當盡至比於竇融功亦不細豈不以一台司見處乎己卯至長安有司供待稍薄所部兵累日不得食衆心頗怨既而以宻為光禄卿上柱國賜爵邢國公宻既不滿望朝臣又多輕之執政者或來求賄意甚不平獨上親禮之常呼為弟以舅子獨孤氏妻之癸未王世充収李宻美人珍寶及將卒十餘萬人還東都陳於闕下乙酉皇泰主大赦丙戌以世充為太尉尚書令内外諸軍事仍使之開太尉府備置官屬妙選人物李宻總管李育德以武陟來降拜陟州刺史其餘將佐劉德威賈閏甫高季輔等相繼來降上使李宻迎秦王世民於豳州宻自恃智略功名見上猶有傲色及見世民不覺驚服私謂殷開山曰真英主也不如是何以定禍亂乎徐世勣據李宻舊境未有所屬魏徵隨宻至長安乆不為朝廷所知乃自請安集山東上以為秘書丞乗傳至黎陽遺徐世勣書勸之早降世勣遂決計西向謂長史陽翟郭孝恪曰此民衆土地皆魏公有也吾若上表獻之是利主之敗自為功以邀富貴也吾實恥之今宜籍郡縣户口士馬之數以啓魏公使自獻之乃遣孝恪詣長安又運糧以餉淮安王神通上聞世勣使者至無表止有啓與李宻甚怪之孝恪具言世勣意上乃嘆曰徐世勣不背德不邀功真純臣也賜姓李氏以孝恪為宋州刺史使與世勣經營虎牢以東所得州郡委之選補李宻驕貴日乆又自負歸國之功朝廷待之不副本望鬱鬱不樂嘗遇大朝㑹宻為光禄卿當進食深以為恥退以告左武衛大將軍王伯當伯當心亦怏怏因謂宻曰天下事在公度内耳今東海公在黎陽襄陽公在羅口河南兵馬屈指可計豈得乆如此也宻大喜乃獻策於上曰臣虚蒙榮寵安坐京師曽無報効山東之衆皆臣故時麾下請往収而撫之憑藉國威取王世充如拾地芥耳上聞宻故將士多不附世充亦欲遣宻往収之羣臣多諌曰李宻狡猾好反今遣之如投魚於泉放虎於山必不反矣上曰帝王自有天命非小子所能取借使叛去如以蒿箭射蒿中耳今使二賊交鬬吾可以坐収其弊辛未遣宻詣山東収其餘衆之未下者宻請與賈閏甫偕行上許之命宻及閏甫同升御榻賜食傳飲巵酒曰吾三人同飲是酒以明同心善建功名以副朕意丈夫一言許人千金不易有人確執不欲弟行朕推赤心於弟非他人所能間也宻閏甫再拜受命上又以王伯當為宻副而遣之十二月上遣李宻分其麾下之半留華州將其半出關長史張寶德預在行中恐宻亡去罪相及上封事言其必叛上意乃中變又恐宻驚駭乃降敕書勞來令宻留所部徐行單騎入朝更受節度宻至稠桑得敕謂賈閏甫曰敕遣我去無故復召我還天子曏云有人確執不許此譖行矣吾今若還無復生理不若破桃林縣収其兵糧北走度河比信達熊州吾已逺矣茍得至黎陽大事必成公意如何閏甫曰主上待明公甚厚况國家姓名著在圖䜟天下終當一統明公既已委質復生異圖任瓌史萬寶㨿熊糓二州此事朝舉彼兵夕至雖克桃林兵豈暇集一稱叛逆誰復容人為明公計不若且應朝命以明元無異心自然浸潤不行更欲出就山東徐思其便可也宻怒曰唐使吾與絳灌同列何以堪之且䜟文之應彼我所共今不殺我聴使東行足明王者不死縱使唐遂定關中山東終為我有天與不取乃欲束手投人公吾之心腹何意如是若不同心當斬而後行閏甫泣曰明公雖云應䜟近察天人稍已相違今海内分崩人思自擅强者為雄明公奔亡甫爾誰相聴受且自翟讓受戮之後人皆謂明公棄恩忘本今日誰肯復以所有之兵束手委公乎彼必慮公見奪逆相拒抗一朝失勢豈有容足之地哉自非荷恩殊厚者詎能深言不諱乎願明公熟思之但恐大福不再茍明公有所措身閏甫亦何辭就戮宻大怒揮刃欲撃之王伯當等固請乃釋之閏甫奔熊州伯當亦止宻以為未可宻不從伯當乃曰義士之志不以存亡易心公必不聴伯當與公同死耳然終恐無益也宻因執使者斬之庚子旦宻紿桃林縣官曰奉詔蹔還京師家人請寄縣舍乃簡驍勇數十人著婦人衣戴羃䍦藏刀裙下詐為妻妾自帥之入縣舍須㬰變服突出因據縣城驅掠徒衆直趣南山乗險而東遣人馳告故將伊州刺史襄城張善相令以兵應接右翊衛將軍史萬寶鎮熊州謂行軍總管盛彦師曰李宻驍賊也又輔以王伯當今決䇿而叛殆不可當也彦師笑曰請以數千之衆邀之必梟其首萬寶曰公以何䇿能爾彦師曰兵法尚詐不可為公言之即帥衆踰熊耳山南據要道令弓弩夾路乗高刀楯伏於溪谷令之曰俟賊半渡一時俱發或問曰聞李宻欲向洛州而公入山何也彦師曰宻聲言向洛實欲出人不意走襄城就張善相耳若賊入谷口我自後追之山路險隘無所施力一夫殿後必不能制今吾先得入谷擒之必矣李宻既度險以為餘不足慮遂擁衆徐行果踰山南出彦師撃之宻衆首尾斷絶不得相救遂斬宻及伯當俱傳首長安盛彦師以功賜爵葛國公拜武衛將軍仍領熊州李世勣在黎陽上遣使以宻首示之告以反狀世勣北面拜伏號慟表請収葬詔歸其尸世勣為之行服備君臣之禮大具儀衛舉軍縞素葬宻于黎陽山二年春正月壬寅王世充悉取隋朝顯官名士為太尉府官屬杜淹戴胄皆預焉王世充專總朝政事無大小悉關太尉府臺省監署莫不閴然世充立三牌於府門外一求文學才識堪濟時務者一求武勇智略能推鋒陷敵者一求能理寃滯擁抑不申者於是上書陳事者日有數百世充悉引見躬自省覽殷勤慰諭人人自喜以為言聴計從然終無所施行下至士卒厮養世充皆以甘言悦之而實無恩施隋馬軍總管獨孤武都為世充所親任其從弟司𨽻大夫機與虞部郎楊恭慎前勃海郡主簿孫師孝步軍總管劉孝元李儉崔孝仁謀召唐兵使孝仁説武都曰王公徒為兒女之態以悦下愚而鄙隘貪忍不顧親舊豈能成大業哉圖䜟之文應歸李氏人皆知之唐起晉陽奄有關内兵不留行英雄景附且坦懷待物舉善貴功不念舊惡據勝勢以争天下誰能敵之吾屬託身非所坐待夷滅今任管公兵近在新安又吾之故人也若遣閒使召之使夜造城下吾曹共為内應開門納之事無不集矣武都從之事泄世充皆殺之恭慎達之子也初王世充既殺元盧慮人情未服猶媚事皇泰主禮甚謙敬又請為劉太后假子尊號曰聖感皇太后既而漸驕横嘗賜食於宫中還家大吐疑遇毒自是不復朝謁皇泰主知其終不為臣而力不能制唯取内庫綵物大造幡花又出諸服玩令僧散施貧乏以求福世充使其黨張績董濬守章善顯福二門宫内雜物毫釐不得出是月世充使人獻印及劍又言河水清欲以耀衆為己符瑞云閏二月丁巳驃騎將軍張孝珉以勁卒百人襲王世充汜水城入其郛沉米船百五十艘己未世充冦糓州世充以秦叔寶為龍驤大將軍程知節為將軍待之皆厚然二人疾世充多詐知節謂叔寶曰王公器度淺狹而多妄語好為咒誓此乃老巫嫗耳豈撥亂之主乎世充與唐兵戰於九曲叔寶知節皆將兵在陳與其徒數十騎西馳百許步下馬拜世充曰僕荷公殊禮深思報效公性猜忌喜信䜛言非僕託身之所今不能仰事請從此辭遂躍馬來降世充不敢逼上使事秦王世民世民素聞其名厚禮之以叔寶為馬軍總管知節為左三統軍時世充驍將又有驃騎武安李君羨征南將軍臨邑田留安亦惡世充之為人帥衆來降世民引君羨置左右以留安為右四統軍王世充囚李育德之兄厚德於獲嘉厚德與其守將趙君穎逐殷州刺史段大師以城來降以厚德為殷州刺史癸亥陟州刺史李育德攻下王世充河内堡聚三十一所乙丑世充遣其兄子君廓侵陟州李育德撃走之斬首千餘級李厚德歸省親疾使李育德守獲嘉世充倂兵攻之丁卯城陷育德及弟三人皆戰死三月壬申王世充冦糓州刺史史萬寶戰不利王世充之寇新安也外示攻取實召文武之附己者議受禪李世英深以為不可曰四方所以奔馳歸附東都者以公能中興隋室故也今九州之地未清其一遽正位號恐逺人皆思叛去矣世充曰公言是也長史韋節楊續等曰隋氏數窮在理昭然夫非常之事固不可與常人議之太史令樂德融曰昔嵗長星出乃除舊布新之徵今嵗星在角亢亢鄭之分野若不亟順天道恐王氣衰息世充從之外兵曹參軍戴胄言於世充曰君臣猶父子也休戚同之明公莫若竭忠徇國則家國俱安矣世充詭辭稱善而遣之世充議受九錫胄復固諫世充怒出為鄭州長史使與兄子行本鎮虎牢乃使段達等言於皇泰主請加世充九錫皇泰主曰鄭公近平李宻已拜太尉自是以來未有殊績俟天下稍平議之未晚段達曰太尉欲之皇泰主熟視達曰任公辛巳達等以皇泰主之詔命世充為相國假黄鉞總百揆進爵鄭王加九錫鄭國置丞相以下官甲午王世充遣其將高毗冦義州東都道士桓法嗣獻孔子閉房記於王世充言相國當代隋為天子世充大悦以法嗣為諌議大夫世充又羅取雜鳥書帛繫頸自言符命而縱之有得鳥來獻者亦拜官爵於是段達以皇泰主命加世充殊禮世充奉表三讓百官勸進設位於都堂納言蘇威年老不任朝謁世充以威隋氏重臣欲以眩耀士民每勸進必冠威名及受殊禮之日扶威置百官之上然後南面正坐受之夏四月王世充令長史韋節楊續等及太常博士衡水孔穎達造禪代儀遣段達雲定興等十餘人入奏皇泰主曰天命不常鄭王功德甚盛願陛下遵唐虞之迹皇泰主斂膝據按怒曰天下高祖之天下若隋祚未亡此言不應輒發必天命已改何煩禪讓公等或祖禰舊臣或台鼎高位既有斯言朕復何望顔色凜冽在廷者皆流汗退朝泣對太后世充更使人謂之曰今海内未寧須立長君候四方安集當復子明辟必如前誓癸卯世充稱皇泰主命禪泣於鄭遣其兄世惲幽皇泰主於含涼殿雖有三表陳讓及勅書敦勸皇泰主皆不知也遣諸將引兵入清宫城又遣術人以楊柳葦火祓除禁省乙巳王世充備法駕入宫即皇帝位丙午大赦改元開明戊申王世充立子𤣥應為太子𤣥恕為漢王餘兄弟宗族十九人皆為王奉皇泰主為潞國公以蘇威為太史段達為司徒雲定興為太尉張僅為司空楊續為納言韋節為内史王隆為左僕射韋霽為右僕射齊王世惲為尚書令楊汪為吏部尚書杜淹為少吏部鄭頲為御史大夫世惲世充之兄也又以國子助敎呉人陸德明為漢王師令𤣥恕就其家行束修禮德明恥之故服巴豆散卧稱病𤣥恕入跪牀下對之遺利竟不與語德明名朗以字行世充于闕下及𤣥武門等處皆設榻坐無常所親受章表或輕騎遊歴衢市亦不清道民但避路而已世充按轡徐行語之曰昔時天子深居九重在下事情無由聞徹今世充非貪天位但欲救恤時危正如一州刺史親覽庶務當與士庶共評朝政尚恐門有禁限令於門外設坐聽朝宜各盡情又令西朝堂納寃抑東朝堂納直諫於是獻書上策者日有數百條流既煩省覽難遍數日後不復更出王世充將軍丘懷義居門下内省召越王君度漢王𤣥恕將軍郭士衡雜妓妾飲博侍御史張藴古彈之世充大怒令散手埶君度𤣥恕批其耳數十又命引入東上閣杖之各四十懷義士衡不問賞藴古帛百段遷太子舍人君度世充之兄子也世充每聽朝殷勤誨諭言詞重複千端萬緒侍衛之人不勝倦弊百司奏事疲於聴受御史大夫蘇良諫曰陛下語太多而無領要計云爾即可何煩許辭也世充黙然良乆亦不罪良然性如是終不能改也王世充數攻伊州總管張善相拒之糧盡援兵不至癸亥城陷善相罵世充極口而死帝聞嘆曰吾負善相善相不負吾也賜其子爵襄城郡公五月王世充陷義州復冦西濟州遣右驍衛大將軍劉𢎞基將兵救之癸巳梁州總管山東道安撫副使陳政為麾下所殺攜其首奔王世充政茂之子也王世充以禮部尚書裴仁基左輔大將軍裴行儼有威名忌之仁基父子知之亦不自安乃與尚書左丞宇文儒童儒童弟尚食直長温散騎常侍崔德本謀殺世充及其黨復尊立皇泰主事泄皆夷三族齊王世惲言於世充曰儒童等謀反正為皇泰主尚在故也不如早除之世充從之遣兄子唐王仁則及家奴梁百年酖皇泰主皇泰主曰更為請太尉以往者之言未應至此百年欲為啓陳世惲不許又請與太后辭訣亦不許乃布席焚香禮佛願自今已往不復生帝王家飲藥不能絶以帛縊殺之謚曰恭皇帝世充以其兄楚王世偉為太保齊王世惲為太傅領尚書令秋七月王世充遣其將羅士信冦糓州士信帥其衆千餘人來降先是士信從李宻撃世充兵敗為世充所得世充厚禮之與同寢食既而得邴元真等待之如士信士信恥之士信有駿馬世充兄子趙王道詢欲之不與世充奪之以賜道詢士信怒故來降上聞其來甚喜遣使迎勞賜帛五千段廩食其所部以士信為陜州道行軍總管世充左龍驤將軍臨涇席辯與同列楊䖍安李君義皆帥所部來降丙子王世充遣其將郭士衡寇糓州刺史任瓌大破之俘斬且盡甲申行軍總管劉𢎞基遣其將种如願襲王世充河陽城毁其河橋而還八月丙午將軍秦武通軍至洛陽敗世充將葛彦璋冬十月王世充自將兵徇地至滑臺臨黎陽尉氏城主時德叡汴州刺史王要漢亳州刺史丁叔則遣使降之以德叡為尉州刺史要漢伯當之兄也王世充遣其從弟世辨以徐亳之兵攻雍丘李公逸遣使求救上以隔賊境不能救公逸乃留其屬李善行守雍丘身帥輕騎入朝至襄城為世充伊州刺史張殷所獲世充謂曰卿越鄭臣唐其説安在公逸曰我於天下惟知有唐不知有鄭世充怒斬之善行亦沒上以公逸子為襄邑公三年王世充將帥州縣來降者時月相繼世充乃峻其法一人亡叛舉家無少長就戮父子兄弟夫婦許相告而免之又使伍家為保有舉家亡者四鄰不覺皆坐誅殺人益多而亡者益甚至於樵采之人出入皆有限數公私愁窘人不聊生矣以宫城為大獄意所忌者并其家屬収繋宫中諸將出討亦質其家屬於宫中禁止者常不減萬口餒死者日有數十世充又以臺省官為司鄭管原伊殷梁湊嵩谷懷德等十二州營田使丞郎得為此行者喜若登仙夏四月羅士信圍慈澗王世充使太子𤣥應拒之士信刺𤣥應墜馬人救之得免庚申懷州總管黄君漢撃王世充太子𤣥應於西濟州大破之熊州行軍總管史萬寶邀之於九曲又破之辛酉世充陷鄧州五月突厥遣阿史那揭多獻馬千匹於王世充且求婚世充以宗女妻之幷與之互市顯州行臺尚書令楚王楊士林雖受唐官爵而北結王世充南通蕭銑詔廬江王瑗與安撫使李𢎞敏討之兵未行長史田瓚為士林所忌甲寅瓉殺士林降於世充世充以瓚為顯州總管上議撃世充世充聞之選諸州鎮驍勇皆集洛陽置四鎮將軍募人分守四城秋七月壬戌詔秦王世民督諸軍撃世充陜東道行臺屈突通二子在洛陽上謂通曰今欲使卿東征如卿二兒何通曰臣昔為俘囚分當就死陛下釋縛加以恩禮當是之時臣心口相誓期以更生餘年為陛下盡節但恐不獲死所耳今得備先驅二兒何足顧乎上嘆曰徇義之士一至此乎癸亥突厥遣使潜詣王世充潞州總管李襲譽邀撃敗之虜牛羊萬計壬午秦王世民至新安王世充遣魏王𢎞烈鎮襄陽荆王行本鎮虎牢宋王泰鎮懷州齊王世惲檢校南城楚王世偉守寶城太子𤣥應守東城漢王𤣥恕守含嘉城魯王道徇守曜儀城世充自將戰兵左輔大將軍楊公卿帥左龍驤二十八府騎兵右游擊大將軍郭善才帥内軍二十八府步兵左游撃大將軍跋野綱帥外軍二十八府步兵總三萬人以備唐𢎞烈行本世偉之子泰世充之兄子也羅士信將前鋒圍慈澗王世充自將兵三萬救之己丑秦王世民將輕騎前覘世充猝與之遇衆寡不敵道路險阨為世充所圍世民左右馳射皆應弦而斃獲其左建威將軍燕琪世充乃退世民還營埃塵覆面軍不復識欲拒之世民免胄自言乃得入旦日帥步騎五萬進軍慈澗世民拔慈澗之戌歸于洛陽世民遣行軍總管史萬寶自宜陽南據龍門將軍劉德威自太行東圍河内上谷公王君廓自洛口斷其餉道懷州總管黄君漢自河隂攻回洛城大軍屯於北邙連營以逼世充洧州長史䌓水張公謹與刺史崔樞以州城來降八月鄧州土豪執王世充所署刺史來降甲辰黄君漢遣校尉張夜叉以舟師襲迴洛城克之獲其將達奚善定斷河陽南橋而還降其堡聚二十餘世充使太子𤣥應帥楊公卿等攻迴洛不克乃築月城於其西留兵戌之世充陳於青城宫秦王世民亦置陳當之世充隔水謂世民曰隋室傾覆唐帝關中鄭帝河南世充未嘗西侵王忽舉兵東來何也世民使宇文士及應之曰四海咸仰皇風唯公遏阻聲教為此而來世充曰相與息兵講好不亦善乎又應之曰奉詔取東都不令講好至暮各引兵還九月癸酉王世充顯州總管田瓉以所部二十五州來降自是襄陽聲問與世充絶史萬寶進軍甘泉宫丁丑秦王世民遣右武衛將軍王君廓攻轘轅拔之王世充遣其將魏隱等撃君廓君廓偽遁設伏大破之遂東徇地至管城而還先是王世充將郭士衡許羅漢掠唐境君廓以䇿撃却之詔勞之曰卿以十三人破賊一萬自古以少制衆未之有也世充尉州刺史時德叡帥所部把夏陳隨許穎尉七州來降秦王世民以便宜命州縣官竝依世充所署無所變易改尉州為南汴州於是河南州縣相繼來降辛巳世民以五百騎行戰地登魏宣武陵王世充帥步騎萬餘猝至圍之單雄信引槊直趨世民尉遲敬德躍馬大呼横刺雄信墜馬世充兵稍却敬德翼世民出圍世民敬德更帥騎兵還戰出入世充陳往返無所礙屈突通引大兵繼至世充大敗僅以身免擒其冠軍大將軍陳智略斬首千餘級獲排矟兵六千冬十月甲午王世充大將軍張鎮周來降甲辰行軍總管羅士信襲王世充硤石堡拔之士信又圍千金堡堡中大罵之士信夜遣百餘人抱嬰兒數十至堡下使兒啼呼詐云從東都來歸羅總管既而相謂曰此千金堡也吾屬誤矣即去堡中以為士信已去來者洛陽亡人出兵追之士信伏兵於道伺其門開突入屠之李宻之敗也楊慶歸洛陽世充以為管州總管妻以兄女秦王世民逼洛陽楊慶潜遣人請降世民遣總管李世勣將兵往據其城慶來降拜上柱國郇國公時世充太子𤣥應鎮虎牢軍于榮汴之間聞之引兵趣管城李世勣撃却之使郭孝恪為書説榮州刺史魏陸陸宻請降𤣥應遣大將軍張志就陸徵兵丙辰陸擒志等四將舉州來降陽城令王雄帥諸堡來降秦王世民使李世勣引兵應之以雄為嵩州刺史嵩南之路始通魏陸使張志詐為𤣥應書停其東道之兵令其將張慈寶且還汴州又宻告汴州刺史王要漢使圖慈寶要漢斬慈寶以降𤣥應聞諸州皆叛大懼奔還洛陽詔以要漢為汴州總管賜爵郳國公十一月戊子安撫大使李大亮取王世充沮華二州唐兵逼洛陽王世充遣使求救於竇建德建德遣使詣世充許以赴援事見唐平河朔十二月辛卯王世充許亳等十一州皆請降辛丑王世充隨州總管徐毅舉州降王世充遣其兄子代王琬長孫安世詣竇建德報聘且乞師四年春正月王世充梁州總管程嘉㑹以所部來降杜伏威遣其將陳正通徐紹宗帥精兵二千來㑹秦王世民撃王世充甲申攻梁克之秦王世民選精鋭千餘騎皆皂衣𤣥甲分為左右隊使秦叔寶程知節尉遲敬德翟長孫分將之每戰世民親被𤣥甲帥之為前鋒乘機進撃所向無不摧破敵人畏之行臺僕射屈突通賛皇公竇軌將兵按行營屯猝與王世充遇戰不利秦王世民帥𤣥甲救之世充大敗獲其騎將葛彦璋俘斬六千餘人世充遁歸王世充太子𤣥應將兵數千人自虎牢運糧入洛陽秦王世民遣將軍李君羨邀撃大破之𤣥應僅以身免世民使宇文士及奏請進圍東都上謂士及曰歸語爾王今取洛陽止欲息兵克城之日乗輿法物圖籍器械非私家所須者委汝収之其餘子女玉帛並以分賜將士辛丑世民移軍青城宫壁壘未立王世充帥衆二萬自方諸門出憑故馬坊垣塹臨糓水以拒唐兵諸將皆怯世民以精騎陳於北邙魏宣武陵以望之謂左右曰賊勢窘矣悉衆而出徼幸一戰今日破之後不敢復出矣命屈突通帥步卒五千渡水撃之戒通曰兵交則縱煙煙作世民引騎南下身先士卒與通合勢力戰世民欲知世充陳厚薄與精騎數十衝之直出其背衆皆披靡殺傷甚衆既而限以長堤與諸騎相失將軍丘行恭獨從世民世充數騎追及之世民馬中流矢而斃行恭回騎射追者發無不中追者不敢前乃下馬以授世民行恭於馬前步執長刀距躍大呼斬數人突陳而出得入大軍世充亦帥衆殊死戰散而復合者數四自辰至午世充兵始退世民縱兵乗之直抵城下俘斬七千人遂圍之驃騎將軍段志𤣥與世充兵力戰深入馬倒為世充兵所擒兩騎夾持其髻將渡洛水志𤣥踴身而奮二人俱墜馬志𤣥馳歸追者數百騎不敢逼初驃騎將軍王懷文為唐軍斥候為世充所獲世充欲慰悦之引置左右壬寅世充出右掖門臨洛水為陳懷文忽引槊刺世充世充裹甲槊折不能入左右猝出不意皆愕眙不知所為懷文走趣唐軍至寫口追獲殺之世充歸解去衷甲袒示羣臣曰懷文以槊刺我卒不能傷豈非天所命乎先是御史大夫鄭頲不樂仕世充多稱疾不預事至是謂世充曰臣聞佛有金剛不壞身陛下真是也臣實多幸得生佛世願棄官削髪為沙門服勤精進以資陛下之神武世充曰國之大臣聲望素重一旦入道將駭物聴俟兵革休息當從心志頲固請不許退謂其妻曰吾束髪從官志慕名節不幸遭遇亂世流離至此側身猜忌之朝累足危亡之地智力淺薄無以自全人生㑹當有死早晩何殊姑從吾所好死亦無憾遂削髪被僧服世充聞之大怒曰爾以我為必敗欲茍免邪不誅之何以制衆遂斬頲於市頲言笑自若觀者壯之詔贈王懷文上柱國朔州刺史庚戌王泰棄河陽走其將趙敻等以城來降别將單雄信裴孝達與總管王君廓相持於洛口秦王世民帥步騎五千援之至轘轅雄信等遁去君廓追敗之乙卯王世充懷州刺史陸善宗以城降秦王世民圍洛陽宫城城中守禦甚嚴大礟飛石重五十斤擲二百步八弓弩箭如車輻鏃如巨斧射五百步世民四面攻之晝夜不息旬餘不克城中欲翻城者凡十三輩皆不果發而死唐將士皆疲弊思歸總管劉𢎞基等請班師世民曰今大舉而來當一勞永逸東方諸州已望風款服唯洛陽孤城勢不能乆功在垂成奈何棄之而去乃下令軍中曰洛陽未破師必不還敢言班師者斬衆乃不敢復言上聞之亦宻敕世民使還世民表稱洛陽必可克又遣參謀軍事封德彞入朝面論形勢德彞言於上曰世充得地雖多率皆羈屬號令所行唯洛陽一城而已智盡力窮克在朝夕今若旋師賊勢復振更相連結後必難圖上乃從之世民遺世充書諭以禍福世充不報戌午王世充鄭州司兵沈悦遣使詣左武候大將軍李世勣請降左衛將軍王君廓夜引兵襲虎牢悅為内應遂拔之獲其荆王行本及長史戴胄悅君理之孫也唐兵圍洛陽掘塹築壘而守之城中乏食絹一匹直粟三升布十匹直廩一升服飾珍玩賤如土芥民食草根木葉皆盡相與澄取浮泥投米屑作餠食之皆病身腫脚弱死者相枕倚於道皇泰主之遷民入宫城也凡三萬家至是無三千家雖貴為公卿糠覈不充尚書郎以下躬自負戴往往餒死竇建德使其將范願守曹州悉發孟海公徐圓朗之衆西救洛陽至滑州王世充行臺僕射韓洪開門納之己卯軍于酸棗秦王世民中分麾下使屈突通副齊王元吉圍守東都世民將驍勇三千五百人東趣武平事見唐平河朔夏四月壬寅王世充騎將楊公卿單雄信引兵出戰齊王元吉撃之不利行軍總管盧君諤戰死王世充平州刺史周仲隱以城來降五月擒竇建德甲子王世充偃師鞏縣皆降乙丑以太子左庶子鄭善果為山東道撫慰大使世充將王德仁棄故洛陽城而遁亞將趙季卿以城降秦王世民囚竇建德王琬長孫安世郭士衡等至洛陽城下以示世充世充與建德語而泣仍遣安世等入城言敗狀世充召諸將議突圍走襄陽諸將皆曰吾所恃者夏王夏王今已為擒雖得出終必無成丙寅世充素服帥其太子羣臣二千餘人詣軍門降世民禮接之世充俯伏流汗世民曰卿昔以童子見處今見童子何恭之甚邪世充頓首謝罪於是部分諸軍先入洛陽分守市肆禁止侵掠無敢犯者丁卯世民入宫城命記室房𤣥齡先入中書門下省収隋圖籍制詔已為世充所毁無所獲命蕭瑀竇軌等封庫収其金帛班賜將士収世充之黨罪尤大者段達王隆崔洪丹薛德音楊汪孟孝義單雄信楊公卿郭什柱郭士衡董叡張童兒王德仁朱粲郭善才等十餘人斬於洛水之上士民疾朱粲殘忍競投瓦礫撃其尸須臾如冢囚韋節楊續長孫安世等十餘人送長安士民無罪為世充所囚者皆釋之所殺者祭而誄之戊寅王世充徐州行臺把王世辯以徐宋等三十八州詣河南道安撫大使任瓌請降世充故地悉平秋七月庚申王世充行臺王𢎞烈王泰左僕射豆盧行襃右僕射蘇世長以襄州來降上與行襃世長皆有舊先是屢以書招之行襃輒殺使者既至長安上誅行襃而責世長世長曰隋失其鹿天下共逐之陛下既得之矣豈可復忿同獵之徒問争肉之罪乎上笑而釋之以為諌議大夫甲子俘王世充于太廟上見王世充而數之王世充曰臣罪固當誅然秦王許臣不死丙寅詔赦世充為庶人與兄弟子侄徙處蜀王世充以防夫未備置雍州廨舍獨孤機之子定州刺史修德帥兄弟至其所矯稱救呼鄭王世充與兄世惲趨出修德等殺之詔免修德官其餘兄弟子姪等於道亦以謀反誅通鑑紀事本末巻二十七上欽定四庫全書通鑑紀事本末巻二十七下宋袁樞撰唐平河朔隋煬帝大業七年漳南人竇建德少尚氣侠膽力過人為鄉黨所歸附㑹募人征高麗建德以勇敢選為二百人長同縣孫安祖亦以驍勇選為征士安祖辭以家為水所漂妻子餒死縣令怒笞之安祖刺殺令亡抵建德建德匿之官司逐捕蹤跡至建德家建德謂安祖曰文皇帝時天下殷盛發百萬之衆以伐高麗尚為所敗今水潦為災百姓困窮加之往嵗西征行者不歸瘡痍未復主上不恤乃更發兵親撃高麗天下必大亂丈夫不死當立大功豈可但為亡虜邪乃集無賴少年得數百人使安祖將之入高雞泊中為羣盜安祖自號將軍時鄃人張金稱聚衆河曲蓨人高士達聚衆於清河境内為盜郡縣疑建德與賊通悉収其家屬殺之建德帥麾下二百人亡歸士達士達自稱東海公以建德為司兵頃之孫安祖為張金稱所殺其衆悉歸建德建德兵至萬餘人建德能傾身接物與士卒均勞逸由是人争附之為之致死十二年冬十二月涿郡通守郭絢將兵萬餘人討高士達士達自以才略不及竇建德乃進建德為軍司馬悉以兵授之建德請士達守輜重自簡精兵七千人拒絢詐為與士達有隙而叛遣人請降於絢願為前驅擊士達以自效絢信之引兵隨建德至長河不復設備建德襲之殺虜數千人斬絢首獻士達張金稱餘衆皆歸建德楊義臣乗勝至平原欲入高雞泊討之建德謂士達曰歴觀隋將善用兵者無如義臣今滅張金稱而來其鋒不可當請引兵避之使其欲戰不得坐費嵗月將士疲倦然後乘間擊之乃可破也不然恐非公之敵士達不從留建德守營自帥精兵逆撃義臣戰小勝因縱酒高宴建德聞之曰東海公未能破敵遽自矜大禍至不乆矣後五日義臣大破士達於陳斬之乘勝逐北趣其營營中守兵皆潰建德與百餘騎亡去至饒陽乗其無偹攻陷之収兵得三千餘人義臣既殺士達以為建德不足憂引去建德還平原収士達散兵収葬死者為士達發喪軍復大振自稱將軍先是羣盜得隋官及士族子弟皆殺之獨建德善遇之由是隋官稍以城降之聲勢日甚勝兵至十餘萬人恭帝義寧元年春正月丙辰竇建德為壇於樂壽自稱長樂王置百官改元丁丑秋七月煬帝詔左禦衛大將軍涿郡留守薛世雄將燕地精兵三萬討李宻命王世充等諸將皆受世雄節度軍所過盜賊隨便誅翦世雄行至河間軍於七里井竇建德士衆惶懼悉拔諸城南遁聲言還入豆子䴚世雄以為畏己不復設備建德謀還襲之其處去世雄營百四十里建德帥敢死士二百八十人先行令餘衆續發建德與其士衆約曰夜至則擊其營已明則降之未至二里所天欲明建德惶惑議降㑹天大霧人咫尺不相辨建德喜曰天賛我也遂突入其營撃之世雄士卒大亂皆騰柵走世雄不能禁與左右數十騎遁歸涿郡慙恚發病卒建德遂圍河間唐高祖武德元年隋河間郡丞王琮守郡城以拒羣盜竇建德攻之嵗餘不下聞煬帝凶問帥吏士發喪乘城者皆哭建德遣使弔之琮因使者請降建德退舍具饟以待之琮言及隋亡俯伏流涕建德亦為之泣諸將曰琮乆拒我軍殺傷甚衆力盡乃降請烹之建德曰琮忠臣也吾方賞之以勸事君奈何殺之往在高雞泊為盜容可妄殺人今欲安百姓定天下豈得害忠良乎乃徇軍中曰先與王琮有怨敢妄動者夷三族以琮為瀛州刺史於是河北郡縣聞之争附於建德先是建德陷景城執户曹河東張𤣥素將殺之縣民千餘人號泣請代其死曰户曹清慎無比大王殺之何以勸善建德乃釋之以為治書侍御史固辭及江都敗復以為黄門侍郎𤣥素乃起饒陽令宋正本博學有才氣説建德以定河北之䇿建德引為謀主建德定都樂壽命所居曰金城宫備置百官冬十一月有大鳥五集于樂壽羣鳥數萬從之經日乃去竇建德以為已瑞改元五鳯宗城人有得𤣥圭獻於建德者宋正本及景城丞㑹稽孔德紹皆曰此天所以賜大禹也請改國號曰夏建德從之以正本為納言德紹為内史侍郎初王須拔掠幽州中流矢死其將魏刀兒代領其衆據深澤掠冀定之間衆至十萬自稱魏帝建德偽與連和刀兒弛備建德襲撃破之遂圍深澤其徒執刀兒降建德斬之盡幷其衆易定等州皆降唯冀州刺史麴稜不下稜壻崔履行䢰之孫也自言有奇術可使攻者自敗稜信之履行命守城者皆坐毋得妄鬬曰賊雖登城汝曹勿怖吾將使賊自縛於是為壇夜設章醮然後自衣衰絰杖行登北樓慟哭又令婦女升屋四向振裙建德攻之急稜將戰履行固止之俄而城陷履行哭猶未已建德見稜曰卿忠臣也厚禮之以為内史令建德既克冀州兵威益盛帥衆十萬冦幽州總管羅藝將逆戰薛萬均曰彼衆我寡出戰必敗不若使羸兵背城阻水為陳彼必渡水撃我萬均請以精騎百人伏於城旁俟其半渡撃之蔑不勝矣藝從之建德果引兵渡水萬均邀撃大破之建德竟不能至其城下乃分兵掠霍堡及雍奴等縣藝復邀撃之凡相拒百餘日建德不能克乃還樂壽萬均世雄之子也二年春閏二月宇文化及保聊城竇建德縱兵攻之生擒化及建德每戰勝克城所得資財悉以分將士身無所取又不噉肉常食蔬茹粟飯妻曹氏不衣紈綺所役婢妾纔十許人及破化及得隋宫人千數即時散遣之以隋黄門侍郎裴矩為左僕射掌選事兵部侍郎崔君肅為侍中少府令何稠為工部尚書右司郎中柳調為左丞虞世南為黄門侍郎歐陽詢為太常卿詢紇之子也自餘隨才授職委以政事其不願留欲詣關中及東都者亦聽之仍給資糧以兵援之出境隋驍果尚近萬人亦各縱遣任其所之又與王世充結好遣使奉表於隋皇泰主皇泰主封為夏王建德起於羣盜雖建國未有文物法度裴矩為之定朝儀制律令建德甚悦每從之諮訪典禮竇建德陷邢州執總管陳君賔初宇文化及以隋大理卿鄭善果為民部尚書從至聊城為化及督戰中流矢竇建德克聊城王琮獲善果責之曰公名臣之家隋室大臣奈何為弑君之賊效命苦戰傷痍至此乎善果大慙欲自殺宋正本馳往救止之建德復不為禮乃奔相州淮安王神通送之長安庚午善果至上優禮之拜左庶子檢校内史侍郎夏四月竇建德聞王世充廢皇泰主自立乃絶之始建天子旌旗出警入蹕下書稱詔追謚隋煬帝為閔帝齊王暕之死也有遺腹子政道建德立以為鄖公然猶依倚突厥以壯其兵勢隋義成公主遣使迎蕭皇后及南陽公主建德遣千餘騎送之又傳宇文化及首以獻義成公主六月庚子竇建德陷滄州秋八月竇建德將兵十餘萬趣洺州淮安王神通帥諸軍退保相州己亥建德兵至洺州城下丁未竇建德䧟洺州總管袁子幹降之乙卯引兵趣相州淮安王神通聞之帥諸軍就李世勣於黎陽己巳竇建德陷相州殺刺史吕珉淮安王神通使慰撫使張道源鎮趙州庚寅竇建德陷趙州執總管張志昻及道源建德以二人及邢州刺史陳君賓不早下欲殺之國子祭酒凌敬諫曰人臣各為其主用彼堅守不下乃忠臣也今大王殺之何以勵羣下乎建德怒曰吾至城下彼猶不降力屈就擒何可捨也敬曰今大王使大將高士興拒羅藝於易水藝纔至興即降大王之意以為如何建德乃悟即命釋之冬十月己亥賜幽州總管燕公羅藝姓李氏封燕郡王辛丑李藝破建德於衡水竇建德引兵趣衛州建德每行軍常為三道輜重細弱居中央步騎夾左右相去三里許建德以千騎前行過黎陽三十里李世勣遣騎將丘孝剛將二百騎偵之孝剛驍勇善馬槊與建德遇遂撃之建德敗走右方兵救之撃斬孝剛建德怒還攻黎陽克之虜淮安王神通李世勣父葢魏徵及帝妹同安公主唯李世勣以數百騎走濟河數日以其父故還詣建德降衛州聞黎陽陷亦降建德以李世勣為左驍衛將軍使守黎陽常以其父蓋自隨為質以魏徵為起居舍人滑州刺史王軌奴殺軌攜其首詣建德降建德曰奴殺主大逆吾何為受之立命斬奴返其首於滑州吏民感悦即日請降於是其旁州縣及徐圓朗等皆望風歸附己未建德還洺州築萬春宫徙都之置淮安王神通於下博待以客禮十一月李世勣欲歸唐恐禍及其父謀於郭孝恪孝恪曰吾新事竇氏動則見疑宜先立效以取信然後可圖也世勣從之襲王世充獲嘉破之多所俘獲以獻建德建德由是親之十二月李世勣復遣人説竇建德曰曹戴二州户口完實孟海公竊有其地與鄭人外合内離若以大軍臨之指期可取既得海公臨徐兖河南可不戰而定也建德以為然欲自將徇河南先遣其行臺曹旦等將兵五萬濟河世勣引兵三千㑹之二年春正月李世勣謀俟竇建德至河南掩襲其營殺之冀得其父幷建德土地以歸唐㑹建德妻産乆之不至曹旦建德之妻兄也在河南多所侵擾諸賊羈屬者皆怨之賊帥魏郡李文相號李商胡聚衆五千餘人據孟津中潬母霍氏亦善騎射自稱霍總管世勣結商胡為昆弟入拜商胡之母母泣謂世勣曰竇氏無道如何事之世勣曰母無憂不過一月當殺之相與歸唐耳世勣辭去母謂商胡曰東海公許我共圖此賊事乆變生何必待其來不如速決是夜商胡召曹旦偏禆二十三人飲之酒盡殺之旦别將高雅賢阮君明尚在河北未濟商胡以巨舟四艘濟河北之兵三百人至中流悉殺之有獸醫游水得免至南岸告曹旦旦嚴警為備商胡既舉事始遣人告李世勣世勣與曹旦連營郭孝恪勸世勣襲旦世勣未決聞旦已有備遂與孝恪帥數十騎來奔商胡復引精兵二千北襲阮君明破之高雅賢収衆去商胡追之不及而還建德羣臣請誅李蓋建德曰世勣唐臣為我所虜不忘本朝乃忠臣也其父何罪遂赦之甲午世勣孝恪至長安曹旦遂取濟州復還洺州二月竇建德攻李商胡殺之建徳至洺州勸課農桑境内無盜商旅野宿夏五月竇建德遣高世興撃李藝於幽州不克退軍籠火城藝襲撃大破之斬首五千級建德大將軍王伏寶勇略冠軍中諸將疾之言其謀反建德殺之伏寶曰大王奈何聴䜛言自斬左右手乎秋八月竇建德共州縣令唐綱殺刺史以州來降上遣使與竇建德連和建德遣同安公主隨使者俱還冬十月竇建德帥衆二十萬復攻幽州建德兵已攀堞薛萬均薛萬徹帥敢死士百人從地道出其背掩撃之建德兵潰走斬首千餘級李藝兵乘勝薄其營建德陳於營中填塹而出奮撃大破之建德逐北至其城下攻之不克而還十一月竇建德濟河撃孟海公初王世充侵建德黎陽建德襲破殷州以報之自是二國交惡信使不通及唐兵逼洛陽世充遣使求救於建德建德中書侍郎劉斌説建德曰天下大亂唐得關西鄭得河南夏得河北共成鼎足之勢今唐舉兵臨鄭自秋涉冬唐兵日增鄭地日蹙唐强鄭弱勢必不支鄭亡則夏不能獨立矣不如解仇除忿發兵救之夏撃其外鄭攻其内破唐必矣唐師既退徐觀其變若鄭可取則取之倂二國之兵乗唐師之老天下可取也建德從之遣使詣世充許以赴援又遣其禮部侍郎李大師等詣唐請罷洛陽之兵秦王世民留之不答十二月壬辰燕郡王李藝又撃竇建德於籠火城破之張道源從竇建德在河南宻遣人詣長安請出兵攻洺州以震山東丙午詔劉世讓為行軍總管使將兵出土門趣洺州竇建德行臺尚書令恒山胡大恩請降四年春二月竇建德克周橋虜孟海公三月行軍總管劉世讓攻竇建德黄州拔之洺州嚴備世讓不得進㑹突厥將入寇上召世讓還竇建德所署普樂令平恩程名振來降竇建德陷管州殺刺史郭士安又陷滎陽陽翟等縣水陸並進汎舟運糧泝河西上王世充之弟徐州行臺世辯遣其將郭士衡將兵數千㑹之合十餘萬號三十萬軍於成皋之東原築宫板渚遣使與王世充相聞先是建德遺秦王世民書請退軍潼關返鄭侵地復修前好世民集將佐議之皆請避其鋒郭孝恪曰世充窮蹙垂將面縛建德逺來助之此天意欲兩亡之也宜據武牢之險以拒之伺間而動破之必矣記室薛収曰世充保據東都府庫充實所將之兵皆江淮精鋭即日之患但乏糧食耳以是之故為我所持求戰不得守則難乆建德親帥大衆逺來赴援亦當極其精鋭致死於我若縱之至此兩冦合從轉河北之粟以饋洛陽則戰争方始偃兵無日混一之期殊未有涯也今宜分兵守洛陽深溝高壘世充出兵慎勿與戰大王親帥驍鋭先據成皋厲兵訓士以待其至以逸待勞決可克也建德既破世充自下不過二旬兩主就縛矣世民善之収道衡之子也蕭瑀屈突通封德􅂜皆曰吾兵疲老世充憑守堅城未易猝拔建德席勝而來鋒鋭氣盛吾腹背受敵非完䇿也不若退保新安以承其弊世民曰世充兵摧食盡上下離心不煩力攻可以坐克建德新破海公將驕卒惰吾據武牢扼其咽喉彼若冒險争鋒吾取之甚易若狐疑不戰旬月之間世充自潰城破兵强氣勢自倍一舉兩克在此行矣若不速進賊入武牢諸城新附必不能守兩賊倂力其勢必强何弊之承吾計決矣通等又請解圍據險以觀其變世民不許中分麾下使通等副齊王元吉圍守東都世民將驍勇三千五百人東趣武牢時正晝出兵歴北邙抵河南陽趨鞏而去王世充登城望見莫之測也竟不敢出癸未世民入武牢甲申將驍騎五百出武牢東二十餘里覘建德之營緣道分留從騎使李世勣程知節秦叔寶將之伏於道旁纔餘四騎與之偕進世民謂尉遲敬德曰吾執弓矢公執槊相隨雖百萬衆若我何又曰賊見我而還上䇿也去建德營三里所建德遊兵遇之以為斥候也世民大呼曰我秦王也引弓射之斃其一將建德軍中大驚出五六千騎逐之從者咸失色世民曰汝苐前行吾自與敬德為殿於是按轡徐行追騎將至則引弓射之輒斃一人追者懼而止止而復來如是再三每來必有斃者世民前後射殺數人敬德殺十許人追者不敢復逼世民逡巡稍却以誘之入於伏内世勣等奮撃大破之斬首三百餘級獲其驍將殷秋石瓉以歸乃為書報建德諭以趙魏之地乆為我有足下所侵奪但以淮安見禮公主得歸故相與坦懷釋怨世充頃與足下修好已嘗反覆今亡在朝夕更飾辭相誘足下乃以三軍之衆仰哺他人千金之資坐供外費良非上䇿今前茅相遇彼遽崩摧郊勞未通能無懷愧故抑止鋒鋭冀聞擇善若不獲命恐雖悔難追竇建德迫於武牢不得進留屯累月戰數不利將士思歸夏四月丁巳秦王世民遣王君廓將輕騎千餘抄其糧運又破之獲其大將軍張青特凌敬言於建德曰大王悉兵濟河攻取懷州河陽使重將守之更鳴鼓建旗踰太行入上黨徇汾晉趣蒲津如此有三利一則蹈無人之境取勝可以萬全二則拓地収衆形勢益强三則關中震駭鄭圍自解為今之策無以易此建德將從之而王世充遣使告急相繼於道王琬長孫安世朝夕涕泣請救洛陽又隂以金王啗建德諸將以撓其謀諸將皆曰凌敬書生安知戰事其言豈可用也建德乃謝敬曰今衆心甚鋭天賛我也因之決戰必將大捷不得從公言敬固争之建德怒令扶出其妻曹氏謂建德曰祭酒之言不可違也今大王自滏口乗唐國之虚連營漸進以取山北又因突厥西抄關中唐必還師自救鄭圍何憂不解若頓兵於此老師費財欲求成功在於何日建德曰此非女子所知吾來救鄭鄭今倒懸亡在朝夕吾乃捨之而去是畏敵而棄信也不可諜者告曰建德伺唐軍芻盡牧馬於河北將襲武牢五月戊午秦王世民北濟河南臨廣武察敵形勢因留馬十餘匹牧於河渚以誘之夕還武牢己未建德果悉衆而至自板渚出牛口置陳北距大河西薄汜水南屬鵲山亘二十里鼓行而進諸將皆懼世民將數騎升高丘以望之謂諸將曰賊起山東未嘗見大敵今渡險而囂是無紀律逼城而陳有輕我心我按兵不出彼勇氣自衰陳乆卒飢勢將自退追而撃之無不克者與公等約甫過日中必破之矣建德意輕唐軍遣三百騎涉汜水距唐營一里所止遣使與世民相聞曰請選鋭士數百與之劇世民遣王君廓將長槊二百以應之相與交戰乍進乍退兩無勝負各引還王琬乗隋煬帝驄馬鎧仗甚鮮迥出陳前以誇衆世民曰彼所乘真良馬也尉遲敬德請往取之世民止之曰豈可以一馬喪猛士敬德不從與高甑生梁建方三騎直入其陳擒琬引其馬以歸衆無敢當者世民使召河北馬待其至乃出戰建德列陳自辰至午士卒飢倦皆坐列又争飲水逡巡欲退世民命宇文士及將三百騎經建德陳西馳而南上戒之曰賊若不動爾宜引歸動則引兵東出士及至陳前陳果動世民曰可撃矣時河渚馬亦至乃命出戰世民帥輕騎先進大軍繼之東涉汜水直薄其陳建德羣臣方朝謁唐騎猝來朝臣趨就建德建德召騎兵使拒唐兵騎兵阻朝臣不得過建德揮朝臣前却進退之間唐兵已至建德窘迫退依東陂竇抗引兵撃之戰小不利世民帥騎赴之所向皆靡淮陽王道𤣥挺身陷陳直出其後復突陳而歸再入再出飛矢集其身如蝟毛勇氣不衰射人皆應弦而仆世民給以副馬使從己於是諸軍大戰塵埃漲天世民帥史大奈程知節秦叔寶宇文歆等巻斾而入出其陳後張唐旗幟建德將士顧見之大潰追奔三十里斬首三千餘級建德中槊竄匿於牛口渚車騎將軍白士讓楊武威逐之建德墮馬士讓援槊欲刺之建德曰勿殺我我夏王也能富貴汝武威下擒之載以從馬來見世民世民讓之曰我自討王世充何預汝事而來越境犯我兵鋒建德曰今不自來恐煩逺取建德將士皆潰去所俘獲五萬人世民即日散遣之使還鄉里封德􅂜入賀世民笑曰不用公言得有今日智者千慮不免一失乎德􅂜甚慙建德妻曹氏與左僕射齊善行將數百騎遁歸洺州壬申齊善行以洺相魏等州來降時建德餘衆走至洺州欲立建德養子為主徵兵以拒唐又欲剽掠民還向海隅為盜善行獨以為不可曰隋末喪亂故吾屬相聚草野茍求生耳以夏王之英武平定河朔士馬精强一朝為擒易如反掌豈非天命有所屬非人力所能争邪今喪敗如此守亦無成逃亦不免等為亡國豈可復遺毒於民不若悉心請命於唐必欲得繒帛者當盡散府庫之物勿復殘民也於是運府庫之帛數十萬段置萬春宫東街以散將卒凡三晝夜乃畢仍布兵守坊巷得物者即出無得更入人家士卒散盡然後與右僕射裴矩行臺曹旦帥其百官奉建德妻曹氏及傳國八璽幷破宇文化及所得珍寶請降于唐上以善行為秦王左二䕶軍仍厚賜之竇建德博州刺史馮士羨復推淮安王神通為慰撫山東使徇下三十餘州建德之地悉平秋七月甲子秦王世民至長安世民被黄金甲齊王元吉李世勣二十五將從其後鐵騎萬匹甲士三萬人前後部鼓吹俘王世充竇建德及隋乗輿御物獻于太廟行飲至之禮以饗之丙寅斬建德于市唐平隴右薛舉隋恭帝義寧元年汾隂薛舉僑居金城驍勇絶倫家貲鉅萬交結豪傑雄於西邊為金城府校尉時隴右盜起金城令郝瑗募兵得數千人使舉將而討之夏四月癸未方授甲置酒饗士舉與其子仁杲及同黨十三人於座劫瑗發兵囚郡縣官開倉賑施自稱西秦霸王改元秦興以仁杲為齊公少子仁越為晉公招集羣盜掠官牧馬賊帥宗羅㬋帥衆歸之以為義興公將軍皇甫綰將兵一萬屯抱罕舉選精鋭二千人襲之遂克抱罕岷山羌酋鍾利俗擁衆二萬歸之舉兵大振更以仁杲為齊王領東道行軍元帥仁越為晉王兼河州刺史羅㬋為興王以副仁杲分兵略地取西平澆河二郡未幾盡有隴西之地衆至十三萬秋七月薛舉自稱秦帝立其妻鞠氏為皇后子仁杲為皇太子遣仁將兵圍天水克之舉自金城徙都之仁杲多力善騎射軍中號萬人敵然性貪而好殺嘗獲庾信子立怒其不降磔於火上稍割以噉軍士及克天水悉召富人倒懸之以醋灌鼻責其金寶舉每戒之曰汝之才略足以辦事然苛虐無恩終當覆我國家舉遣晉王仁越將兵趨劍口至河池郡太守蕭瑀拒却之冬十二月薛舉遣其子仁杲冦扶風唐弼據汧源拒之舉遣使招弼弼乃殺李𢎞芝請降於舉仁杲乘其無備襲破之悉幷其衆弼以數百騎走詣扶風請降扶風太守竇璡殺之舉勢益張衆號三十萬謀取長安聞丞相淵已定長安進圍扶風淵使李世民將兵擊之又使姜謩竇軌俱出散關安撫隴右癸巳世民撃薛仁杲於扶風大破之追奔至隴坻而還薛舉大懼問其羣臣曰自古天子有降者乎黄門侍郎錢唐禇亮曰趙佗歸漢劉禪仕晉近世蕭琮至今猶貴轉禍為福自古有之衛尉卿郝瑗趨進曰陛下失問禇亮之言又何悖也昔漢高祖屢經奔敗蜀先主亟亡妻子卒成大業陛下奈何以一戰不利遽為亡國之計乎舉亦悔之曰聊以此試君等耳乃厚賞瑗引為謀主姜謩竇軌進至長道為薛舉所敗引還淵使通議大夫醴泉劉世讓安集唐弼餘黨與舉相遇戰敗為舉所虜唐高祖武德元年郝瑗説薛舉與梁師都及突厥連兵以取長安舉從之突厥拒舉師都等不納其使夏六月癸未薛舉冦涇州以秦王世民為元帥將八總管兵以拒之秋七月薛舉進逼高墌游兵至于豳岐秦王世民深溝高壘不與戰㑹世民得瘧疾委軍事於長史納言劉文静司馬殷開山且戒之曰薛舉懸軍深入食少兵疲若來挑戰慎勿應也俟吾疾愈為君等破之開山退謂文静曰王慮公不能辦故有此言耳且賊聞王有疾必輕我宜曜武以威之乃陳於高墌西南恃衆而不設備舉潜師掩其後壬子戰於淺水原八總管皆敗士卒死者什五六大將軍慕容羅㬋李安逺劉𢎞基皆沒世民引兵還長安舉遂拔高墌収唐兵死者為京觀文静等皆坐除名八月薛舉遣其子仁杲進圍寧州刺史胡演擊却之郝瑗言於舉曰今唐兵新破關中騷動宜乘勝直取長安舉然之㑹有疾而止辛巳舉卒太子仁杲立居於折墌城謚舉曰武帝己丑以秦王世民為元帥撃薛仁杲九月甲寅秦州總管竇軌擊薛仁杲不利驃騎將軍劉感鎮涇州仁杲圍之城中糧盡感殺所乗馬以分將士感一無所噉惟煮馬骨取汁和水屑食之城垂陷者數矣㑹長平王叔良將士至涇州仁杲乃揚言食盡引兵南去乙卯又遣高墌人偽以城降叔良遣感帥衆赴之己未至城下叩門城中人曰賊已去可踰城入感命燒其門城上下水灌之感知其詐遣步兵先還自帥精兵為殿俄而城上舉三烽仁杲兵自南原大下戰於百里細川唐軍大敗感為仁杲所擒仁杲復圍涇州令感語城中云援軍已敗不如早降感許之至城下大呼曰逆賊飢餒亡在朝夕秦王帥數十萬衆四面集城中勿憂勉之仁杲怒執感於城旁埋之至膝馳騎射之至死聲色逾厲叔良嬰城固守僅能自全感豐生之孫也庚申隴州刺史陜人常達撃薛仁果於宜禄川斬首千餘級薛仁杲屢攻常達不能克乃遣其將仵士政以數百人詐降達厚撫之乙丑士政伺隙以其徒刼達擁城中二千人降於仁杲達見仁杲詞色不屈仁杲壯而釋之奴賊帥張貴謂達曰汝識我乎達曰汝逃死奴賊耳貴怒欲殺之人救之獲免薛仁杲之為太子也與諸將多有隙及即位衆心猜懼郝瑗哭舉得疾遂不起由是國勢寖弱秦王世民至高墌仁杲使宗羅㬋將兵拒之羅㬋數挑戰世民堅壁不出諸將咸請戰世民曰我軍新敗士氣沮喪賊恃勝而驕有輕我心宜閉壘以待之彼驕我奮可一戰而克也乃令軍中曰敢言戰者斬相持六十餘日仁杲糧盡其將梁胡郎等帥所部來降世民知仁杲將士離心命行軍總管梁實營於淺水源以誘之羅㬋大喜盡鋭攻之梁實守險不出營中無水人馬不飲者數日羅㬋攻之甚急世民度賊已疲謂諸將曰可以戰矣遲明使右武候大將軍龎玉陳於淺水原南羅㬋幷兵擊之玉戰幾不能支世民引大軍自原北出其不意羅㬋引兵還戰世民帥驍騎數十先陷陳唐兵表裏奮擊呼聲動地羅㬋士卒大潰斬首數千級世民帥二千餘騎追之竇軌叩馬苦諫曰仁杲猶據堅城雖破羅㬋未可輕進請且按兵以觀之世民曰吾慮之乆矣破竹之勢不可失也舅勿復言遂進仁杲陳於城下世民據涇水臨之仁杲驍將渾幹等數人臨陳來降仁杲懼引兵入城拒守日向暮大軍繼至遂圍之夜半守城者爭自投下仁杲計窮己酉出降得其精兵萬餘人男女五萬口諸將皆賀因問曰大王一戰而勝遽捨步兵又無攻具輕騎直造城下衆皆以為不克而卒取之何也世民曰羅㬋所將皆隴外之人將驍卒悍吾特出其不意而破之斬獲不多若緩之則皆入城仁杲撫而用之未易克也急之則散歸隴外折墌虚弱仁果破膽不暇為謀此吾所以克也衆皆悦服世民所得降卒悉使仁杲兄弟及宗羅㬋翟長孫等將之與之射獵無所疑間賊畏威銜恩皆願效死世民聞禇亮名求訪獲之禮遇甚厚引為王府文學上遣使謂世民曰薛舉父子多殺我士卒必盡誅其黨以謝寃魂李宻諌曰薛舉虐殺不辜此其所以亡也陛下何訾焉懷服之民不可不撫乃命戮其謀首餘皆赦之癸亥秦王世民至長安斬薛仁杲於市上賜常達帛三百段贈劉感平原郡公謚忠壯撲殺仵士政於殿庭以張貴尤淫暴腰斬之上享勞將士因謂羣臣曰諸公共相翊戴以成帝業若天下承平可共保富貴使王世充得志公輩豈有種乎如薛仁杲君臣豈可不以為前鑑也唐平河西李軌隋恭帝義寧元年武威鷹揚府司馬李軌家富好任俠薛舉作亂於金城軌與同郡曹珍關謹梁碩李贇安修仁等謀曰薛舉必來侵暴郡官庸怯勢不能禦吾輩豈可束手幷妻孥為人所虜邪不若相與幷力拒之保據河右以待天下之變衆皆以為然欲推一人為主各相讓莫肯當曹珍曰乆聞圖䜟李氏當王今軌在謀中乃天命也遂相與拜軌奉以為主秋七月丙辰軌令修仁集諸胡軌結民間豪傑共起兵執虎賁郎將謝統師郡丞韋士政軌自稱河西大涼王置官屬並擬開皇故事關謹等欲盡殺隋官分其家貲軌曰諸人既逼以為主當稟其號令今興義兵以救生民乃殺人取貨類羣盜耳將何以濟於是以統師為太僕卿士政為太府卿西突厥闕達度設據㑹寧川自稱闕可汗請降於軌薛舉選其將常仲興濟河撃李軌與軌將李贇戰於昌松仲興舉軍敗沒軌欲縱遣之贇曰力戰獲俘復縱以資敵將焉用之不如盡阬之軌曰天若祚我當擒其主此屬終為我有若其無成留此何益乃縱之未幾攻張掖敦煌西平抱罕皆克之盡有河西五郡之地唐高祖武德元年秋八月上欲與李軌共圖秦隴遣使潜詣涼州招撫之與之書謂之從弟軌大喜遣其弟懋入貢上以懋為大將軍命鴻臚少卿張俟德冊拜軌為涼州總管封涼王冬十一月乙巳涼王李軌即皇帝位改元安樂李軌吏部尚書梁碩有智略軌常倚之以為謀主碩見諸胡浸盛隂勸軌宜加防察由是與户部尚書安修仁有隙軌子仲琰嘗詣碩碩不為禮乃與修仁共譛碩於軌誣以謀反軌酖碩殺之有胡巫謂軌曰上帝當遣玉女自天而降軌信之發民築臺以候玉女勞費甚廣河右饑人相食軌傾家財以賑之不足欲發倉粟召羣臣議之曹珍等皆曰國以民為本豈可愛倉粟而坐視其死乎謝統師等皆故隋官心終不服宻與羣胡為黨排軌故人乃詬珍曰百姓餓者自是羸弱勇壯之士終不至此國家倉粟以備不虞豈可散之以飼羸弱僕射茍悦人情不為國計非忠臣也軌以為然由是士民離怨二年春二月張俟德至涼李軌召其羣臣廷議曰唐天子吾之從兄今已正位京邑一姓不可自爭天下吾欲去帝號受其官爵可乎曹珍曰隋失其鹿天下共逐之稱王稱帝者奚啻一人唐帝關中涼帝河右固不相防且已為天子奈何復自貶黜必欲以小事大請依蕭詧事魏故事軌從之戊戌軌遣其尚書左丞鄧曉入見奉書稱皇從弟大涼皇帝臣軌而不受官爵帝怒拘曉不遣始議興師討之上遣使與吐谷渾可汗伏允連和使擊李軌李軌將安修仁兄興貴仕長安表請説軌諭以禍福上曰軌阻兵恃險連結吐谷渾突厥吾興兵撃之尚恐不克豈口舌所能下乎興貴曰臣家在涼州奕世豪望為民夷所附弟修仁為軌所信任子弟在機近者以十數臣往説之軌聴臣固善若其不聴圖之肘腋易矣上乃遣之興貴至武威軌以為左右衛大將軍興貴乘間説軌曰涼地不過千里土薄民貧今唐起太原取函秦宰制中原戰必勝攻必取此殆天啓非人力也不若舉河西歸之庶竇融之功復見於今日矣軌曰吾據山河之固彼雖强大若我何汝自唐來為唐遊説耳興貴謝曰臣聞富貴不歸故鄉如衣繡夜行臣闔門受陛下榮禄安肯附唐但欲效其愚慮可否在陛下耳於是退與修仁隂結諸胡起兵撃軌軌出戰而敗嬰城自守興貴徇曰大唐遣我來誅李軌敢助之者夷三族城中人爭出就興貴軌計窮與妻子登玉女臺置酒為别夏五月庚辰興貴執之以聞河西悉平鄧曉在長安舞蹈稱慶上曰汝為人使臣聞國亡不蹙而喜以求媚於朕不忠于李軌肯為朕用乎遂廢之終身軌至長安幷子弟皆伏誅以安興貴為右武侯大將軍上柱國涼國公賜帛萬段安修仁為左武候大將軍申國公唐平河東劉武周隋恭帝義寧元年馬邑太守王仁恭多受貨賂不能振施郡人劉武周驍勇喜任俠為鷹揚府校尉仁恭以其土豪甚親厚之令帥親兵屯閤下武周與王仁恭侍兒私通恐事泄謀作亂先宣言曰今百姓饑饉僵尸滿道王府君閉倉不賑䘏豈為民父母之意乎衆皆憤怒武周稱疾卧家豪傑來候問武周椎牛縱酒因大言曰壯士豈能坐待溝壑今倉粟爛積誰敢與我共取之豪傑皆許諾春二月己丑仁恭坐聴事武周上謁其黨張萬嵗等隨入升階斬仁恭持其首出徇郡中無敢動者於是開倉以賑飢民馳檄境内屬城皆下之収兵得萬餘人武周自稱太守遣使附於突厥鴈門郡丞河東陳孝意與虎賁郎將王智辯共討劉武周圍其桑乾鎮壬寅武周與突厥合兵擊智辯殺之孝意奔還鴈門三月丁卯武周襲破樓煩郡進取汾陽宫獲隋宫人以賂突厥始畢可汗始畢以馬報之兵勢益振又攻陷定襄突厥立武周為定楊可汗遺以狼頭纛武周即皇帝位立妻沮氏為皇后改元天興以衛士楊伏念為尚書左僕射妹壻同縣苑君璋為内史令武周引兵圍鴈門陳孝意悉力拒守乗間出撃武周屢破之既而外無救援遣間使詣江都皆不報孝意誓以必死旦暮向詔敕庫俯伏流涕悲動左右圍城百餘日食盡校尉張倫殺孝意以降唐高祖武德二年春三月辛卯劉武周冦并州夏四月劉武周引突厥之衆軍於黄蛇嶺兵鋒甚盛齊王元吉使車騎將軍張達以步卒百人嘗冦達辭以兵少不可往元吉强遣之至則俱沒達忿恨庚子引武周襲榆次陷之丙辰劉武周圍幷州齊王元吉拒却之戊午詔太常卿李仲文將兵救幷州五月丙戌劉武周陷平遥初易州賊帥宋金剛有衆萬餘與魏刀兒連結刀兒為竇建德所滅金剛救之戰敗帥衆四千西奔劉武周武周聞其善用兵得之甚喜號曰宋王委以軍事中分家貲以遺之金剛亦深自結出其故妻納武周之妹因説武周圖晉陽南向爭天下武周以金剛為西南道大行臺使將兵二萬冦幷州丁未武周進逼介州沙門道澄以佛幡縋之入城遂陷介州詔左武衛大將軍姜寶誼行軍總管李仲文撃之武周將黄子英往來雀鼠谷數以輕兵挑戰兵纔接子英陽不勝而走如是再三寶誼仲文悉衆逐之伏兵發唐兵大敗寶誼仲文皆為所虜既而俱逃歸上復使二人將兵撃武周上以劉武周入寇為憂右僕射裴寂請自行癸亥以寂為晉州道行軍總管討劉武周聴以便宜從事秋七月辛卯宋金剛冦浩州浹旬而退九月裴寂至介休宋金剛據城拒之寂軍于度索原營中飲澗水金剛絶之士卒渴乏寂欲移營就水金剛縱兵撃之寂軍遂潰失亡略盡寂一日一夜馳至晉州先是劉武周屢遣兵攻西河浩州刺史劉贍拒之李仲文引兵就之與共守西河及裴寂敗自晉州以北城鎮俱沒唯西河獨存姜寶誼復為金剛所虜謀逃歸金剛殺之裴寂上表謝罪上慰諭之復使鎮撫河東劉武周進逼并州齊王元吉紿其司馬劉德威曰卿以老弱守城吾以强兵出戰辛巳元吉夜出兵攜其妻妾棄州奔還長安元吉始去武周兵已至城下晉陽土豪薛深以城納武周上聞之大怒謂禮部尚書李綱曰元吉㓜弱未習時事故遣竇誕宇文歆輔之晉陽强兵數萬食支十年興王之基一旦棄之聞宇文歆首畫此䇿我當斬之綱曰王年少驕逸竇誕曾無規諫又掩覆之使士民憤怨今日之敗誕之罪也歆諌王不悛尋皆聞奏乃忠臣也豈可殺哉明日上召綱入升御座曰我得公遂無濫刑元吉自為不善非二人所能禁也幷誕赦之衛尉少卿劉政㑹在太原為武周所虜政㑹宻遣人奉表論武周形勢武周據太原遣宋金剛攻晉州拔之虜右驍衛大將軍劉𢎞基𢎞基逃歸金剛進逼絳州陷龍門冬十月劉武周將宋金剛進攻澮州陷之軍勢甚鋭裴寂性怯無將帥之畧惟發使駱驛趣虞泰二州収民入城堡焚其積聚民驚擾愁怨皆思為盜夏縣民吕崇茂聚衆自稱魏王以應武周寂討之為所敗詔永安王孝基工部尚書獨孤懷恩陜州總管于筠内史侍郎唐儉將兵討之時王行本猶據蒲坂未下亦與武周相應關中震駭上出手勅曰賊勢如此難與争鋒宜棄大河以東謹守關西而已秦王世民上表曰太原王業所基國之根本河東殷實京邑所資若舉而棄之臣竊憤恨願假臣精兵三萬必冀平殄武周克復汾晉上於是悉發關中兵以益世民所統使撃武周乙卯幸華隂至長春宫以送之十一月己卯武周冦浩州秦王世民引兵自龍門乗氷堅度河屯栢壁與宋金剛相持時河東州縣俘掠之餘未有倉廩人情恇擾聚入城堡徵斂無所得軍中乏食世民發教諭民民聞世民為帥而來莫不歸附自近及逺至者日多然後漸収其糧軍食以充乃休兵秣馬唯令偏禆乘間抄掠大軍堅壁不戰由是賊勢日衰世民嘗自帥輕騎覘敵騎皆四散世民獨與一甲士登丘而寢俄而賊兵四合初不之覺㑹有蛇逐鼠觸甲士之面甲士驚寤遽白世民俱上馬馳百餘步為賊所及世民以大羽箭射殪其驍將賊騎乃退十二月于筠説永安王孝基急攻吕崇茂獨孤懷恩請先成攻具然後進孝基從之崇茂求救於宋金剛金剛遣其將吾陽尉遲敬德尋相將兵奄至夏縣孝基表裏受敵軍遂大敗孝基懷恩筠唐儉及行軍總管劉世讓皆為所虜敬德名恭以字行上徵裴寂入朝責其敗軍下吏既而釋之寵待彌厚尉遲敬德尋相將還澮州秦王世民遣兵部尚書殷開山總管秦叔寶等邀之於美良川大破之斬首二千餘級頃之敬德相潜引精騎援王行本於蒲坂世民自將步騎二千從間道夜趨安邑邀撃大破之敬德相僅以身免悉俘其衆復歸栢壁諸將咸請與宋金剛戰世民曰金剛懸軍深入精兵猛將咸聚於是武周據太原倚金剛為扞蔽金剛軍無蓄積以虜掠為資利在速戰我閉門養鋭以挫其鋒分兵汾隰衝其心腹彼糧盡計窮自當遁走當待此機未宜速戰孝基謀逃歸武周殺之三年春正月將軍秦武通攻王行本於蒲坂行本出戰而敗開門出降辛巳斬行本宋金剛圍絳州二月劉武周遣兵冦潞州陷長子壺關潞州刺史郭子武不能禦上以將軍河東王行敏助之行敏與子武不叶或言子武將叛行敏斬子武以徇乙巳武周復遣兵冦潞州行敏撃破之三月乙丑劉武周遣其將張萬嵗冦浩州李仲文撃走之俘斬數千人甲申行軍副總管張綸敗劉武周於浩州斬俘千餘人劉武周數攻浩州為李仲文所敗宋金剛軍中食盡夏四月丁未金剛北走秦王世民追之秦王世民追及尋相於吕州大破之乗勝逐北一晝夜行二百餘里戰數十合至高壁嶺總管劉𢎞基執轡諌曰大王破賊逐北至此功亦足矣深入不已不愛身乎且士卒飢疲宜留壁於此俟兵糧畢集然後復進未晩也世民曰金剛計窮而走衆心離沮功難成而易敗機難得而易失必乗此勢取之若更淹留使之計立備成不可復攻矣吾竭忠徇國豈顧身乎遂䇿馬而進將士不敢復言飢追及金剛於雀鼠谷一日八戰皆破之俘斬數萬人夜宿於雀鼠谷西原世民不食二日不解甲三日矣軍中止有一羊世民與將士分而食之丙辰陜州總管于筠自金剛所逃來世民引兵趣介休金剛尚有衆二萬戊午出西門背城布陳南北七里世民遣總管李世勣等與戰小却為賊所乗世民帥精騎撃之出其陳後金剛大敗斬首三千級金剛輕騎走世民追之數十里至張難堡浩州行軍總管樊伯通張德政據堡自守世民免胄示之堡中喜譟且泣左右告以王不食獻濁酒脫粟飯尉遲敬德収餘衆守介休世民遣任城王道宗宇文士及往諭之敬德與尋相舉介休及永安降世民得敬德甚喜以為左一府統軍使將其舊衆八千與諸營相參屈突通慮其變驟以為言世民不聴劉武周聞金剛敗大懼棄并州走突厥金剛収其餘衆欲復戰衆莫肯從亦與百餘騎走突厥世民至晉陽武周所署僕射楊伏念以城降唐儉封府庫以待世民武周所得州縣皆入于唐未幾金剛謀走上谷突厥追獲腰斬之嵐州總管劉六兒從宋金剛在介休秦王世民擒斬之其兄季真棄石州奔劉武周將馬邑高滿政滿政殺之武周之南冦也其内史令苑君璋諫曰唐主舉一州之衆直取長安所向無敵此乃天授非人力也晉陽以南道路險隘縣軍深入無繼於後若進戰不利何以自還不如北連突厥南結唐朝南面稱孤足為長䇿武周不聴留君璋守朔州及敗泣謂君璋曰不用君言以至於此乆之武周謀亡歸馬邑事泄突厥殺之上聞并州平大悦壬戌宴羣臣賜繒帛使自入御府盡力取之復唐儉官爵仍以為并州道安撫大使所籍獨孤懷恩田宅資財悉以賜之世民留李仲文鎮并州劉武周數遣兵入冦仲文輒撃破之下城堡百餘所詔仲文檢校并州總管唐平江陵蕭銑隋恭帝義寧元年巴陵校尉鄱陽董景珍雷世猛旅帥鄭文秀許𤣥徹萬瓚徐德基郭華沔陽張繡等謀據郡叛隋推景珍為主景珍曰吾素寒賤不為衆所服羅川令蕭銑梁室之後寛仁大度請奉之以從衆望乃遣使報銑銑喜從之聲言討賊召募得數千人銑巖之孫也㑹潁川賊帥沈柳生冦羅川銑與戰不利因謂其衆曰今天下皆叛隋政不行巴陵豪傑起兵欲奉吾為主若從其請以號令江南可以中興梁祚以此召柳生亦當從我矣衆皆悦聴命乃自稱梁公改隋服色旗幟皆如梁舊柳生即帥衆歸之以柳生為車騎大將軍起兵五日逺近歸附者至數萬人遂帥衆向巴陵景珍遣徐德基帥郡中豪傑數百人出迎未及見銑柳生與其黨謀曰我先奉梁公勲居第一今巴陵諸將皆位高兵多我若入城反出其下不如殺德基質其首領獨挾梁公進取郡城則無出我右者矣遂殺德基入白銑銑大驚曰今欲撥亂反正忽自相殺吾不能為若主矣因步出軍門柳生大懼伏地請罪銑責而赦之陳兵入城景珍言於銑曰徐德基建義功臣而柳生無故擅殺之此而不誅何以為政且柳生為盜日乆今雖從義凶悖不移共處一城勢必為變失今不取後悔無及銑又從之景珍収柳生斬之其徒皆潰去丙申銑築壇燔燎自稱梁王改元鳴鳯唐高祖武德元年夏四月蕭銑即皇帝位置百官凖梁室故事謚其從父琮為孝靖皇帝祖巖為河間忠烈王父璿為文憲王封董景珍等功臣七人皆為王遣宋王楊道生撃南郡下之徙都江陵修復園廟引岑文本為中書侍郎使典文翰委以機宻又使魯王張繡徇嶺南隋將張鎮周王仁壽等拒之既而聞煬帝遇弑皆降於銑欽州刺史寗長真亦以鬱林始安之地附於銑漢陽太守馮盎以蒼梧高涼珠崖畨禺之地附於林士𢎞銑士𢎞各遣人招交趾太守丘和和不從銑遣寗長真帥嶺南兵自海道攻和和欲出迎之司法書佐高士亷説和曰長真兵數雖多懸軍逺至不能持乆城中勝兵足以當之奈何望風受制於人和從之以士亷為軍司馬將水陸諸軍逆撃破之長真僅以身免盡俘其衆既而有驍果自江都至得煬帝凶問亦以郡附於銑士亷勱之子也始安郡臣李襲志遷哲之孫也隋末散家財募士得二千人以保郡城蕭銑林士𢎞曹武徹迭來攻之皆不克聞煬帝遇弑帥吏民臨三日或説襲志曰公中州貴族乆臨鄙郡華夷悦服今隋室無主海内鼎沸以公威惠號令嶺表尉佗之業可坐致也襲志怒曰吾世繼忠貞今江都雖覆宗社尚存尉佗狂僣何足慕也欲斬説者衆乃不敢言堅守二年外無聲援城陷為銑所虜銑以為工部尚書檢校桂州總管於是東自九江西抵三峽南盡交趾北距漢川銑皆有之勝兵四十餘萬二年秋八月蕭銑遣其將楊道生冦峽州刺史許紹撃破之銑又遣其將陳普環帥舟師上峽規取巴蜀紹遣其子智仁及録事參軍李𢎞節等追至西陵大破之擒普環銑遣兵戌安蜀城及荆門城先是上遣開府李靖詣䕫州經略蕭銑靖至峽州阻銑兵乆不得進上怒其遲留隂敕許紹斬之紹惜其才為之奏請獲免三年蕭銑性偏狹多猜忌諸將恃功恣横好專誅殺銑患之乃宣言罷兵營農欲奪諸將之權大司馬董景珍弟為將軍怨望謀作亂事泄伏誅景珍時鎮長沙銑下詔赦之召還江陵景珍懼冬十一月甲子以長沙來降詔峽州刺史許紹出兵應之十二月癸卯峽州刺史許紹攻蕭銑荆門鎮拔之蕭銑遣其齊王張繡攻長沙董景珍謂繡曰前年醢彭越往年殺韓信卿不見之乎何為相攻繡不應進兵圍之景珍欲潰圍走為麾下所殺銑以繡為尚書令繡恃功驕横銑又殺之由是功臣諸將皆有離心兵勢益弱四年春正月丙戍黔州刺史田世康攻蕭銑五州四鎮皆克之李靖説趙郡王孝恭以取蕭銑十䇿孝恭上之二月辛卯改信州為䕫州以孝恭為總管使大造舟艦習水戰以孝恭未更軍旅以靖為行軍總管兼孝恭長史委以軍事靖説孝恭悉召巴蜀酋長子弟量才授任置之左右外示引擢實以為質夏六月黄州總管周法明攻蕭銑安州拔之獲其總管馬貴遷秋七月辛巳襃州道安撫使郭行方攻蕭銑鄀州拔之九月詔發巴蜀兵以趙郡王孝恭為荆湘道行軍總管李靖攝行軍長史統十二總管自䕫州順流東下以廬江王瑗為荆郢道行軍元帥出襄州道黔州刺史田世康出辰州道黄州總管周法明出夏口道以撃蕭銑是月孝恭發䕫州時峽江方漲諸將請俟水落進軍李靖曰兵貴神速今吾兵始集銑尚未知若乗江漲倐忽抵其城下掩其不備此必成擒不可失也孝恭從之冬十月辛卯蕭銑鄂州刺史雷長穎以魯山來降趙郡王孝恭帥戰艦二千餘艘東下蕭銑以江水方漲殊不為備孝恭等抜其荆門宜都二鎮進至夷陵銑將文士𢎞將精兵數萬屯清江癸巳孝恭撃走之獲戰艦三百餘艘殺溺死者萬計追奔至百里洲士𢎞収兵復戰又敗之進入北江銑江州總管蓋彦舉以五州來降方蕭銑之罷兵營農也纔留宿衛數千人聞唐兵至文士𢎞敗大懼倉猝徵兵皆在江嶺之外道塗阻逺不能遽集乃悉見兵出拒戰孝恭將撃之李靖止之曰彼救敗之師策非素立勢不能乆不若且自南岸緩之一日彼必分其兵或留拒我或歸自守兵分勢弱我乗其懈而撃之蔑不勝矣今若急之彼則幷力死戰楚兵飄鋭未易當也孝恭不從留靖守營自帥鋭師出戰果敗走趣南岸銑衆委舟収掠軍資人皆負重靖見其衆亂縱兵奮撃大破之乘勝直抵江陵入其外郭又攻水城拔之大獲舟艦李靖使孝恭盡散之江中諸將皆曰破敵所獲當籍其用奈何棄以資敵靖曰蕭銑之地南出嶺表東距洞庭吾懸軍深入若攻城未拔援兵四集吾表裏受敵進退不獲雖有舟楫將安用之今棄舟艦使塞江而下援兵見之必謂江陵已破未敢輕進往來覘伺動淹旬月吾取之必矣銑援兵見舟艦果疑不進其交州總管丘和長史高士亷司馬杜之松等將朝江陵聞銑敗悉詣孝恭降孝恭勒兵圍江陵銑内外阻絶問䇿於中書侍郎岑文本文本勸銑降銑乃謂羣下曰天不祚梁不可復支矣若必待力屈則百姓蒙患奈何以我一人之故陷百姓於塗炭乎乙巳銑以太牢告於太廟下令開門出降守城者皆哭銑帥羣臣緦縗布幘詣軍門曰當死者唯銑耳百姓無罪願不殺掠孝恭入據其城諸將欲大掠岑文本説孝恭曰江南之民自隋末以來困於虐政重以羣雄虎争今之存者皆鋒鏑之餘跂踵延頸以望真主是以蕭氏君臣江陵父老決計歸命庶幾有所息肩今若縱兵俘掠使士民失望恐自此以南無復向化之心矣孝恭稱善遽禁止之諸將又言梁之將帥與官軍拒鬬死者其罪既深請籍沒其家以賞將士李靖曰王者之師宜使義聲先路彼為其主鬬死乃忠臣也豈可同叛逆之科籍其家乎於是城中安堵秋毫無犯南方州縣聞之皆望風款附銑降數日援兵至者十餘萬聞江陵不守皆釋甲而降孝恭送銑於長安上數之銑曰隋失其鹿天下共逐之銑無天命故至此若以為罪無所逃死竟斬於都市唐平江淮杜伏威沈法興李子通輔公祏隋煬帝大業九年章丘杜伏威與臨濟輔公祏為刎頸交俱亡命為羣盜伏威年十六每出則居前入則殿後由是其徒推以為帥下邳苗海潮亦聚衆為盜伏威使公祏謂之曰今我與君同苦隋政各舉大義力分勢弱常恐被擒若合而為一則足以敵隋矣君能為主吾當敬從自揆不堪宜來聴命不則一戰以決雌雄海潮懼即帥其衆降之伏威轉掠淮南自稱將軍江都留守遣校尉宋顥討之伏威與戰陽為不勝引顥衆入葭葦中因從上風縱火顥衆皆燒死海陵賊帥趙破陳以伏威兵少輕之召與幷力伏威使公祏嚴兵居外自與左右十人齎牛酒入謁於座殺破陳幷其衆十一年東海李子通有勇力先依長白山賊帥左才相羣盜皆殘忍而子通獨寛仁由是人多歸之未半嵗有衆萬人才相忌之子通引去渡淮與杜伏威合伏威選軍中壯士養為假子凡三十餘人濟隂王雄誕臨濟闞稜為之冠既而李子通謀殺伏威遣兵襲之伏威被重創墜馬雄誕負之逃葭葦中収散兵復振將軍來整撃伏威破之其將西門君儀之妻王氏勇而多力負伏威以逃雄誕帥壯士十餘人衛之與隋兵力戰由是得免來整又撃李子通破之子通帥其餘衆奔海陵復収兵得二萬人自稱將軍恭帝義寧元年春正月右禦衛將軍陳稜討杜伏威伏威帥衆拒之稜閉壁不戰伏威遺以婦人之服謂之陳姥稜怒出戰伏威奮撃大破之稜僅以身免伏威乗勝破高郵引兵據歴陽自稱總管以輔公祏為長史分遣諸將徇屬縣所至輒下江淮間小盜争附之伏威常選敢死之士五千人謂之上募寵遇甚厚有攻戰輒令上募先撃之戰罷閲視有傷在背者即殺之以其退而被撃故也所獲資財皆以賞軍士有戰死者以妻妾殉葬故人自為戰所向無敵唐高祖武德元年武康沈法興世為郡著姓宗族數千家法興為呉興太守聞宇文化及弑逆舉兵以討化及為名比至烏程得精卒六萬遂攻餘杭毗陵丹陽皆下之據江表十餘郡自稱江南道大總管承制置百官宇文化及之發江都也以杜伏威為歴陽太守伏威不受仍上表於隋皇泰主拜伏威為東道大總管封楚王沈法興亦上表於皇泰主自稱大司馬録尚書事天門公二年沈法興既克毗陵謂江淮之南指撝可定自稱梁王都毗陵改元延康置百官性殘忍專尚威刑將士小有過即斬之由是其下離怨時杜伏威據歴陽陳稜據江都李子通據海陵俱有窺江表之心法興軍數敗㑹子通圍稜於江都稜送質求救於法興及伏威法興使其子綸將兵數萬與伏威共救之伏威軍清流綸軍楊子相去數十里子通納言毛文深獻策募江南人詐為綸兵夜襲伏威營伏威怒復遣兵襲綸由是二人相疑莫敢先進子通得盡鋭攻江都克之稜奔伏威子通入江都因縱撃綸大破之伏威亦引去子通即皇帝位國號呉改元明政丹陽賊帥樂伯通帥衆萬餘降之子通以為左僕射杜伏威請降丁丑以伏威為淮南安撫大使和州總管三年夏六月壬辰詔以和州總管東南道行臺尚書令楚王杜伏威為使持節總管江淮以南諸軍事揚州刺史東南道行臺尚書令淮南安撫使封呉王賜姓李氏以輔公祏為行臺左僕射封舒國公李子通渡江攻沈法興取京口法興遣其僕射蔣元超拒之戰於庱亭元超敗死法興棄毗陵奔呉郡於是丹陽毗陵等郡皆降於子通子通以法興府掾李伯樂為内史侍郎國子祭酒杜伏威遣行臺左僕射輔公祏將卒數千攻子通以將軍闞稜王雄誕為之副公祏渡江攻丹陽克之進屯溧水子通帥衆數萬拒之公祏簡精甲千人執長刀為前鋒又使千人踵其後曰有退者即斬之自帥餘衆復居其後子通為方陳而前公祏前鋒千人殊死戰公祏復張左右翼以撃之子通敗走公祏逐之反為所敗還閉壁不出王雄誕曰子通無壁壘又狃於初勝乗其無備撃之可破也公祏不從雄誕以其私屬數百人夜出撃之因風縱火子通大敗降其卒數千人子通食盡棄江都保京口江西之地盡入於伏威伏威徙居丹陽子通復東走太湖収合亡散得二萬人襲沈法興於呉郡大破之法興帥左右數百人棄城走呉郡賊帥聞人遂安遣其將葉孝辯迎之法興中塗而悔欲殺孝辯更向㑹稽孝辯覺之法興窘迫赴江溺死子通軍勢復振帥其羣臣徙都餘杭盡収法興之地北自太湖南至嶺東包㑹稽西距宣城皆有之四年冬十一月杜伏威遣其將王雄誕撃李子通子通以精兵守獨松嶺雄誕遣其禆將陳當將千餘人乗高據險以逼之多張旗幟夜則縛炬火於樹布滿山澤子通懼燒營走保杭州雄誕追撃之又敗之於城下庚寅子通窮蹙請降伏威執子通并其左僕射樂伯通送長安上釋之先是汪華據黟歙稱王十餘年雄誕還軍撃之華拒之於新安洞口甲兵甚鋭雄誕伏精兵於山谷帥羸弱數千犯其陳戰纔合陽不勝走還營華進攻之不能克㑹日暮引還伏兵已據其洞口華不得入窘迫請降聞人遂安據崑山無所屬伏威使雄誕撃之雄誕以崑山險隘難以力勝乃單騎造其城下陳國威靈示以禍福遂安感悦帥諸將出降於是伏威盡有淮南江東之地南至嶺東距海雄誕以功除歙州總管賜爵宜春郡公五年秋七月秦王世民撃徐圓朗下十餘城聲震淮泗杜伏威懼請入朝丁亥杜伏威入朝延升御榻拜太子太保仍兼行臺尚書令留長安位在齊王元吉上以寵異之以闞稜為左領軍將軍李子通謂樂伯通曰伏威既來江東未定我往収舊兵可以立大功遂相與亡至藍田關為吏所獲俱伏誅六年春正月庚子以呉王杜伏威為太保秋八月壬子淮南道行臺僕射輔公祏反初杜伏威與公祏相友善公祏年長伏威兄事之軍中謂之伯父畏敬與伏威等伏威浸忌之乃署其養子闞稜為左將軍王雄誕為右將軍潜奪其兵權公祏知之怏怏不平與其故人左遊仙陽為學道辟糓以自晦及伏威入朝留公祏守丹陽令雄誕典兵為之副隂謂雄誕曰吾至長安茍不失職勿令公祏為變伏威既行左遊仙説公祏謀反而雄誕握兵公祏不得發乃詐稱得伏威書疑雄誕有二心雄誕聞之不悦稱疾不視事公祏因奪其兵使其黨西門君儀諭以反計雄誕始寤而悔之曰今天下方平定呉王又在京師大唐兵威所向無敵奈何無故自求滅族乎雄誕有死而已不敢聞命今從公為逆不過延百日之命耳大丈夫安能愛斯須之死而自陷於不義乎公祏知不可屈縊殺之雄誕善撫士卒得其死力又約束嚴整每破城邑秋毫無犯死之日江南軍中及民間皆為之流涕公祏又詐稱伏威不得還江南貽書令其起兵大修鎧仗運糧儲尋稱帝於丹陽國號宋修陳故宫室而居之署置百官以左遊仙為兵部尚書東南道大使越州總管與張善安連兵以善安為西南道大行臺五年二月豫章賊帥張善安以䖍吉等五州來降拜洪州總管是嵗三月善安反遣舒州總管張鎮周等撃之乙丑詔襄州道行臺僕射趙郡王孝恭以舟師趣江州嶺南道大使李靖以交廣泉桂之衆趣宣州懷州總管黄君漢出譙亳齊州總管李世勣出淮泗以討輔公祏孝恭將發與諸將宴集命取水忽變為血在坐皆失色孝恭舉止自若曰此乃公祏授首之徵也飲而盡之衆皆悅服九月戊子輔公祏遣其將徐紹宗冦海州陳政通冦壽陽冬十一月黄州總管周法明將兵撃輔公祏張善安據夏口拒之法明屯荆口鎮壬午法明登戰艦飲酒善安遣刺客數人詐乗漁艓而至見者不以為虞遂殺法明而去甲申舒州總管張鎮周等撃輔公祏將陳當世於猷州之黄沙大破之十二月癸卯安撫使李大亮誘張善安執之大亮撃善安於洪州與善安隔水而陳遥相與語大亮諭以禍福善安曰善安初無反心正為將士所誤欲降又恐不免大亮曰張總管有降心則與我一家耳因單騎度水入其陳與善安執手共語示無猜間善安大悦遂許之降既而善安將數十騎詣大亮營大亮止其騎於門外引善安入與語乆之善安辭去大亮命武士執之從騎皆走善安營中聞之大怒悉衆而來將攻大亮大亮使人諭之曰吾不留總管總管赤心歸國謂我曰若還營恐將士或有異同為其所制故自留不去耳卿輩何怒於我其黨復大罵曰張總管賣我以自媚於人遂皆潰去大亮追撃多所虜獲送善安於長安善安自稱不與輔公祏交通上赦其罪善遇之及公祏敗得所與往還書乃殺之七年春正月壬午趙郡王孝恭撃輔公祏别將於摐陽破之二月辛丑輔公祏遣兵圍猷州刺史左難當嬰城自守安撫使李大亮引兵撃公祏破之趙郡王孝恭攻公祏鵲頭鎮拔之壬子行軍副總管權文誕破輔公祏之黨於猷州拔其枚洄等四鎮太保呉王杜伏威薨輔公祏之反也詐稱伏威之命以紿其衆及公祏平趙郡王孝恭不知其詐以狀聞詔追除伏威名籍沒其妻子及太宗即位知其寃赦之復其官爵三月丙戌趙郡王孝恭破輔公祏於蕪湖拔梁山等三鎮辛卯安撫使任瓌拔楊子城廣陵城主龍龕降戊戌趙郡王孝恭克丹陽先是輔公祏遣其將馮慧亮陳當世將舟師三萬屯博望山陳正通徐紹宗將步騎二萬屯青林山仍於梁山連鐵鏁以斷江路築却月城延袤十餘里又結壘江西以拒官軍孝恭與李靖帥舟師次舒州李世勣帥步卒一萬渡淮拔壽陽次硤石慧亮等堅壁不戰孝恭遣奇兵絶其糧道慧亮等軍乏食夜遣兵薄孝恭營孝恭安卧不動孝恭集諸將議軍事皆曰慧亮等擁强兵據水陸之險攻之不可猝拔不如直指丹陽掩其巢穴丹陽既潰慧亮等自降矣孝恭將從其議李靖曰公祏精兵雖在此水陸二軍然所自將亦為不少今博望諸柵尚不能拔公祏保據石頭豈易取哉進攻丹陽旬月不下慧亮等躡吾後腹背受敵此危道也慧亮正通皆百戰餘賊其心非不欲戰正以公祏立計使之持重欲以老我師耳我今攻其城以挑之一舉可破也孝恭然之使羸兵先攻賊壘而勒精兵結陳以待之攻壘者不勝而走賊出兵追之行數里遇大軍與戰大破之闞稜免胄謂賊衆曰汝曹不識我邪何敢來與我戰賊衆多稜故部曲皆無鬬志或有拜者由是遂敗孝恭靖乗勝逐北轉戰百餘里博山青林兩戍皆潰慧亮正通等遁歸殺傷及溺死者萬餘人李靖兵先至丹陽公祏大懼擁兵數萬棄城東走欲就左遊仙於㑹稽李世勣追之公祏至句容從兵能屬者纔五百人夜宿常州其將呉騷等謀執之公祏覺之棄妻子獨將腹心數十人斬關走至武康為野人所攻西門君儀戰死執公祏送丹陽梟首分捕餘黨悉誅之江南皆平己亥以孝恭為東南道行臺右僕射李靖為兵部尚書頃之廢行臺以孝恭為揚州大都督靖為府長史上深美靖功曰靖蕭輔之膏肓也闞稜功多頗自矜伐公祏誣稜與己通謀㑹趙郡王孝恭籍沒賊黨田宅稜及杜伏威王雄誕田宅在賊境者孝恭幷籍沒之稜自訢理忤孝恭孝恭怒以謀反誅之唐平山東劉黑闥唐高祖武德二年初漳南人劉黒闥少驍勇狡獪與竇建德善後為羣盜轉事郝孝德李宻王世充世充以為騎將每見世充所為竊笑之世充使黒闥守新鄉李世勣撃虜之獻於建德建德署為將軍賜爵漢東公四年竇建德之敗也其諸將多盜匿庫物及居閭里暴横為民患唐官吏以法繩之或加捶撻建德故將皆驚懼不安高雅賢王小胡家在洺州欲竊其家以逃官吏捕之雅賢等亡命至貝州㑹上徵建德故將范願董康買曹湛及雅賢等於是願等相謂曰王世充以洛陽降唐其將相大臣段達單雄信等皆夷滅吾屬至長安必不免矣吾屬自十年以來身經百戰當死乆矣今何惜餘生不以之立事且夏王得淮安王遇以客禮唐得夏王即殺之吾屬皆為夏王所厚今不為之報仇將無以見天下之士乃謀作亂卜之以劉氏為主吉因相與之漳南見建德故將劉雅以其謀告之雅曰天下適安定吾將老於耕桑不願復起兵衆怒且恐泄其謀遂殺之故漢東公劉黒闥時屛居漳南諸將往詣之告以其謀黒闥欣然從之黒闥方種蔬即殺耕牛與之共飲食定計聚衆得百人秋七月甲戌襲漳南縣據之是時諸道有事則置行臺尚書省無事則罷之朝廷聞黒闥作亂乃置山東道行臺於洺州魏冀定滄並置總管府丁丑以淮安王神通為山東道行臺右僕射八月丁酉劉黑闥陷鄃縣魏州刺史權威貝州刺史戴元祥與戰皆敗死黒闥悉収其餘衆及器械竇建德舊黨稍稍出歸之衆至二千人為壇於漳南祭建德告以舉兵之意自稱大將軍詔發關中步騎三千使將軍秦武通定州總管藍田李𤣥通撃之又詔幽州總管李藝引兵㑹撃黒闥丁未劉黒闥陷歴亭執屯衛將軍王行敏使之拜不可遂殺之初洛陽既平徐圓朗請降拜兖州總管封魯郡公劉黒闥作亂隂與圓朗通謀上使葛公盛彦師安集河南行至任城辛亥圓朗執彦師舉兵反黒闥以圓朗為大行臺元帥兖鄆陳把伊洛曹戴等八州豪右皆應之辛酉徐圓朗自稱魯王淮安王神通將關内兵至冀州與李藝兵合又發邢洺相魏恒趙等州兵合五萬餘人與劉黒闥戰於饒陽城南布陳十餘里黒闥衆少依隄單行而陳以當之㑹風雪神通乗風撃之既而風返神通大敗士馬軍資失亡三分之二李藝居西偏撃高雅賢破之逐奔數里聞大軍不利退保藁城黒闥就撃之藝亦敗薛萬均萬徹皆為所虜截髮驅之萬均兄弟亡歸藝引兵歸幽州黒闥兵勢大振庚寅劉黑闥陷瀛州刺史盧士叡觀州人執刺史雷德備以城降之毛州刺史趙元愷性嚴急下不堪命丁卯州民董燈明等作亂殺元愷以應劉黒闥冬十月壬寅劉黒闥陷定州執總管李𤣥通黒闥愛其才欲以為大將𤣥通不可故吏有以酒肉饋之者𤣥通曰諸君哀吾幽辱幸以酒肉來相開慰當為諸君一醉酒酣謂守者曰吾能劍舞願假吾刀守者與之𤣥通舞竟太息曰大丈夫受國厚恩鎮撫方面不能保全所守亦何面目視息世間哉即引刀自刺潰腹而死上聞之為之流涕拜其子伏䕶為大將十二月乙卯劉黒闥陷冀州殺刺史麴稜黒闥既破淮安王神通移書趙魏故竇建德將卒争殺唐官吏以應黒闥庚申遣右屯衛大將軍義安王孝常將兵討黒闥黒闥將兵數萬進逼宗城黎州總管李世勣先屯宗城棄城走保洺州甲子黒闥追撃世勣等破之殺步卒五千人世勣僅以身免丙寅洺州土豪飜城應黒闥黒闥築壇城於城東南告天及祭竇建德而後入後旬目引兵攻拔相州執刺史房晃右武衛將軍張士貴潰圍走黒闥南取黎衛二州半嵗之間盡復建德舊境又遣使北連突厥頡利可汗遣俟斤宋邪那帥胡騎從之左武衛將軍秦武通洺州刺史陳君賓永寧令程名振皆自河北遁歸長安丁卯命秦王世民齊王元吉討黒闥己巳劉黒闥陷邢州趙州庚午陷魏州殺總管潘道毅辛未陷莘州五年春正月劉黑闥自稱漢東王改元天造定都洺州以范願為左僕射董康買為兵部尚書高雅賢為右領軍徵王琮為中書令劉斌為中書侍郎竇建德時文武悉復本位其設法行政悉師建徳而攻戰勇決過之庚寅東鹽州治中王才藝殺刺史田華以城應劉黑闥秦王世民軍至獲嘉劉黑闥棄相州退保洺州丙申世民復取相州進軍肥鄉列營洺水之上以逼之幽州總管李藝將所部兵數萬㑹秦王世民討劉黑闥黒闥聞之留兵萬人使范願守洺州自將兵拒藝夜宿沙河程名振載鼓六十具於城西二里隄上急擊之城中地皆震動范願驚懼馳告黑闥黒闥遽還遣其弟十善與行臺張君立將精兵一萬擊藝於鼓城壬子戰於徐河十善君立大敗所亡八千人洺水人李𤣥感據城來降秦王世民遣彭公王君廓將千五百騎赴之入城共守二月劉黒闥引兵還攻洺水癸亥行至列人秦王世民使秦叔寳邀擊破之己巳秦王世民復取邢州辛未并州人馮伯讓以城來降丙子李藝取劉黑闥定欒亷趙四州獲黑闥尚書劉希道引兵與秦王世民㑹洺州劉黑闥攻洺水甚急城四旁皆有水廣五十餘步黑闥於城東北築二甬道以攻之世民三引兵救之黑闥拒之不得進世民恐王君廓不能守召諸將謀之李世勣曰若甬道達城下城必不守行軍總管郯勇公羅士信請代君廓守之世民乃登城西南高冢以旗招君廓君廓帥其徒力戰潰圍而出士信帥左右二百人乗之入城代君廓固守黒闥晝夜急攻㑹大雪救兵不得往凡八日丁丑城陷黑闥素聞其勇欲生之士信詞色不屈乃殺之時年二十辛巳秦王世民拔洺水三月世民與李藝營於洺水之南分兵屯水北黒闥數挑戰世民堅壁不應别遣奇兵絶其糧道壬辰黒闥以高雅賢為左僕射軍中高㑹李世勣引兵逼其營雅賢乘醉單騎逐之世勣部將潘毛刺之墜馬左右繼至扶歸未至營而卒甲午諸將復往逼其營潘毛為王小胡所擒黒闥運糧於冀貝滄瀛諸州水陸俱進程名振以千餘人邀之沉其舟焚其車秦王世民與劉黒闥相持六十餘日黒闥潜師襲李世勣營世民引兵掩其後以救之為黒闥所圍尉遲敬德帥壯士犯圍而入世民與略陽公道宗乗之得出道宗帝之從子也世民度黒闥糧盡必來決戰乃使人堰洺水上流謂守吏曰待我與賊戰乃決之丁未黒闥帥步騎二萬南渡洺水壓唐營而陳世民自將精騎撃其精兵破之乗勝蹂其步兵黒闥帥衆殊死戰自午至昏戰數合黒闥力不能支王小胡謂黒闥曰智力盡矣宜早亡奔遂與黒闥先遁餘衆不知猶格戰守吏決堰洺水大至深丈餘黒闥衆大潰斬首萬餘級溺死數千人黒闥與范願等二百騎奔突厥山東悉平徐圓朗聞劉黒闥敗大懼不知所出河間人劉復禮説圓朗曰有劉世徹者其人才略不世出名高東夏且有非常之相真帝王之器將軍若自立恐終無成若迎世徹而奉之天下指揮可定圓朗然之使復禮迎世徹於浚儀或説圓朗曰將軍為人所惑欲迎劉世徹而奉之世徹若得志將軍豈有全地乎僕不敢逺引前古將軍獨不見翟讓之於李宻乎圓朗復以為然世徹至已有衆數千人頓於城外以待圓朗出迎圓朗不出使人召之世徹知事變欲亡走恐不免乃入謁圓朗悉奪其兵以為司馬使徇譙把二州東人素聞其名所向皆下圓朗遂殺之秦王世民自河北引兵將撃圓朗㑹上召之使馳傳入朝乃以兵屬齊王元吉庚申世民至長安上迎之於長樂世民具陳取圓朗形勢上復遣之詣黎陽㑹大軍趨濟隂丙子行臺民部尚書史萬寶攻徐圓朗陳州拔之夏六月辛亥劉黒闥引突厥冦山東詔燕郡王李藝撃之乙卯遣淮安王神通撃徐圓朗丁卯劉黒闥引突厥冦定州秋七月甲申秦王世民以淮濟之間略定使淮安王神通行軍總管任瓌李世勣攻圓朗乙酉班師劉黒闥至定州其故將曹湛董康買亡命在鮮虞復聚兵應之甲午以淮陽王道𤣥為河北道行軍總管以討之九月劉黒闥陷瀛州殺刺史馬匡武鹽州人馬君德以城叛附黒闥冬十月己酉詔齊王元吉討劉黒闥於山東壬子以元吉為領軍大將軍幷州大總管癸丑貝州刺史許善䕶與黒闥弟士善戰於鄃縣善䕶全軍皆沒甲寅右武候將軍桑顯和撃黒闥於晏城破之觀州刺史劉㑹以城叛附黒闥乙丑行軍總管淮陽壯王道𤣥與劉黒闥戰於下博軍敗為黒闥所殺時道𤣥將兵三萬與副將史萬寶不協道𤣥帥輕騎先出犯陳使萬寶將大軍繼之萬寶擁兵不進謂所親曰我奉手敇云淮陽小兒軍事皆委老夫今王輕鋭妄進若與之俱必同敗沒不如以王餌賊王敗賊必争進我堅陳以待之破之必矣由是道𤣥獨進敗沒萬寶勒兵將戰士卒皆無鬬志軍遂大潰萬寶逃歸道𤣥數從秦王世民征伐死時年十九世民深惜之謂人曰道𤣥常從吾征伐見吾深入賊陳心慕效之以至於此為之流涕世民自起兵以來前後數十戰常身先士卒輕騎深入雖屢危殆而未嘗為矢刃所傷淮陽王道𤣥之敗也山東震駭洺州總管廬江王援棄城西走州縣皆叛附於劉黒闥旬日間黒闥盡復故地乙亥進據洺州十一月庚辰滄州刺史程大買為黒闥所迫棄城走齊王元吉畏黒闥兵强不敢進甲申詔太子建成將兵討黒闥其陜東道大行臺及山東道行軍元帥河南河北諸州並受建成處分得以便宜從事己亥齊王元吉遣兵撃劉十善於魏州破之劉黒闥擁兵而南自相州以北州縣皆附之唯魏州總管田留安勒兵拒守黒闥攻之不下引兵南拔元城復還攻之十二月戊午劉黒闥陷恒州殺刺史王公政癸亥幽州大總管李藝復亷定二州甲子田留安撃劉黒闥破之獲其莘州刺史孟柱降將卒六千人是時山東豪傑多殺長吏以應黒闥上下相猜人益離怨留安待吏民獨坦然無疑白事者無問親疎皆聴直入卧内每謂吏民曰吾與爾曹俱為國禦賊固宜同心協力必欲棄順從逆者但自斬吾首去吏民皆相戒曰田公推至誠以待人當共竭死力報之必不可負有花竹林者本黒闥之黨潜有異志留安知之不發其事引置左右委以管鑰竹林感激遂更歸心卒収其用以功進封道國公乙丑幷州刺史成仁重撃范願破之劉黒闥攻魏州未下太子建成齊王元吉大軍至昌樂黒闥引兵拒之再陳皆不戰而罷魏徵言於太子曰前破黒闥其將卒皆懸名處死妻子係虜故齊王之來雖有詔書赦其黨與之罪皆未之信今宜悉解其囚俘慰諭遣之則可坐視其離散矣太子從之黒闥食盡衆多亡或縛其渠帥以降黒闥恐城中兵出與大軍表裏撃之遂夜遁至館陶永濟橋未成不得渡壬申太子齊王以大軍至黒闥使王小胡背水而陳自視作橋成即過橋西衆遂大潰棄仗來降大軍渡橋進黒闥渡者纔千餘騎橋壞由是黒闥得與數百騎亡去六年春正月己卯劉黒闥所署饒州刺史諸葛德威執黒闥舉城降時太子遣騎將劉𢎞基追黒闥黒闥為官軍所迫奔走不得休息至饒陽從者纔百餘人餒甚德威出迎延黒闥入城黒闥不可德威涕泣固請黒闥乃從之至城旁市中憇止德威饋之食食未畢德威勒兵執之送詣太子幷其弟十善斬於洺州黒闥臨刑嘆曰我幸在家鉏菜為高雅賢輩所誤至此二月丙寅徐圓朗窮蹙與數騎棄城走為野人所殺其地悉平通鑑紀事本末巻二十七下
