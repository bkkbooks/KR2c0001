body:
  text: 通鑑紀事本末卷三十四上宋袁樞撰伾文用事唐德宗貞元十九年初翰林待詔王伾善書山隂王叔文善碁俱出入東宫娛侍太子伾杭州人也叔文譎詭多計自言讀書知治道乘閒常為太子言民間疾苦太子嘗與諸侍讀及叔文等論及宫市事太子曰寡人方欲極言之衆皆稱賛獨叔文無言既退太子目留叔文謂曰向者君獨無言豈有意邪叔文曰叔文䝉幸太子有所見敢不以聞太子職當視膳問安不宜言外事陛下在位久如疑太子收人心何以自解太子大驚因泣曰非先生寡人無以知此遂大愛幸與王伾相依附叔文因為太子言某可為相某可為將幸異日用之密結翰林學士韋執誼及當時朝士有名而求速進者陸淳吕温李景儉韓煜韓泰陳諫栁宗元劉禹錫等定為死友而凌準程异等又因其黨以進日與遊處蹤跡詭祕莫有知其端者藩鎮或隂進資幣與之相結淳吳人嘗為左司郎中温渭之子時為左拾遺景儉瑀之孫進士及第煜滉之族子諌嘗為侍御史宗元禹錫時為監察御史左補闕張正一上書得召見正一與吏部員外郎王仲舒主客員外郎劉伯芻等相親善叔文之黨疑正一言己隂事令韋執誼反譛正一等於上云其朋黨遊宴無度九月甲寅正一等皆坐逺貶人莫知其由伯芻廼之子也十二月庚申以太常卿髙郢為中書侍郎吏部侍郎鄭珣瑜為門下侍郎並同平章事珣瑜餘慶之從父兄弟也二十年秋九月太子始得風疾不能言順宗永貞元年春正月辛未朔諸王親戚入賀德宗太子獨以疾不能來德宗涕泣悲歎由是得疾日益甚凢二十餘日中外不通莫知兩宫安否癸巳德宗崩蒼猝召翰林學士鄭絪衛次公等至金鑾殿草遺詔宦官或曰禁中議所立尚未定衆莫敢對次公遽言曰太子雖有疾地居冢嫡中外屬心必不得已猶應立廣陵王不然必大亂絪等從而和之議始定次公河東人也太子知人情憂疑紫衣麻鞋力疾出九僊門召見諸軍使京師粗安甲午宣遺詔於宣政殿太子縗服見百官丙申即皇帝位於太極殿衛士尚疑之企足引領而望之曰真太子也乃喜而泣時順宗失音不能決事常居深宫施簾帷獨宦官李忠言昭容牛氏侍左右百官奏事自帷中可其奏自德宗大漸王伾先入稱詔召王叔文坐翰林中使決事伾以叔文意入言於忠言稱詔行下外初無知者以杜佑攝冢宰二月癸夘上始朝百官於紫宸門辛亥以吏部郎中韋執誼為尚書左丞同平章事王叔文欲專國政首引執誼為相已用事於中與相唱和壬戌以殿中丞王伾為左散騎常侍依前翰林待詔蘇州司功王叔文為起居舍人翰林學士伾寢陋吳語上所䙝狎而叔文頗任事自許微知文義好言事上以故稍敬之不得如伾出入無阻叔文入至翰林而伾入至柿林院見李忠言牛昭容計事大抵叔文依伾伾依忠言忠言依牛昭容轉相交結每事先下翰林使叔文可否然後宣于中書韋執誼承而行之外黨則韓泰栁宗元劉禹錫等主采聴外事謀議唱和日夜汲汲如狂互相推奬曰伊曰周曰管曰葛僴然自得謂天下無人榮辱進退生於造次惟其所欲不拘程式士大夫畏之道路以目素與往還者相次拔擢至日除數人其黨或言曰某可為官不過一二日輙已得之於是叔文及其黨十餘家之門晝夜車馬如市候見叔文伾者至宿其坊中餅肆酒壚下一人得千錢乃容之伾尤闒茸專以納賄為事作大匱貯金帛夫婦寢其上三月辛未以王伾為翰林學士以王叔文為度支鹽鐵轉運副使先是叔文與其黨謀得國賦在手則可以結諸用事人取軍士心以固其權又懼驟使重權人心不服藉杜佑雅有㑹計之名位重而務自全易可制故先令佑主其名而自除為副以專之叔文雖判兩使不以簿書為意日夜與其黨屏人竊語人莫測其所為以御史中丞武元衡為左庶子德宗之末叔文之黨多為御史元衡薄其為人待之莽鹵元衡為山陵儀仗使劉禹錫求為判官不許叔文以元衡在風憲欲使附已使其黨誘以權利元衡不從由是左遷元衡平一之孫也侍御史竇羣奏屯田員外郎劉禹錫挾邪亂政不宜在朝又嘗謁叔文揖之曰事固有不可知者叔文曰何謂也羣曰去嵗李實怙恩挾貴氣葢一時公當此時逡巡路旁乃江南一吏耳今公一旦復據其地安知路旁無如公者乎其黨欲逐之韋執誼以羣素有彊直名止之上疾久不愈時扶御殿羣臣瞻望而已莫有親奏對者中外危懼思早立太子而王叔文之黨欲專大權惡聞之宦官俱文珍劉光琦薛盈珍等皆先朝任使舊人疾叔文忠言等朋黨專恣乃啟上召翰林學士鄭絪衛次公李程王涯入金鑾殿草立太子制時牛昭容輩以廣陵王淳英睿惡之絪不復請書紙為立嫡以長字呈上上頷之癸巳立淳為太子更名純程神符五世孫也賈躭以王叔文黨用事心惡之稱疾不出屢乞骸骨丁酉諸宰執會食中書故事丞相方食百寮無敢謁見者叔文至中書欲與執誼計事令直省通之直省以舊事告叔文怒叱直省直省懼入白執誼執誼逡巡慙赧竟起迎叔文就其閤語良久杜佑髙郢鄭珣瑜皆停筯以待有報者云叔文索飯韋相公已與之同食閤中矣佑郢心知不可畏叔文執誼莫敢出言珣瑜獨歎曰吾豈可復居此位顧左右取馬徑歸遂不起二相皆天下重望相次歸卧叔文執誼等益無所顧忌逺近大懼夏四月乙巳上御宣政殿冊太子百官睹太子儀表退皆相賀至有感泣者中外大喜而叔文獨有憂色口不敢言但吟杜甫題諸葛亮祠堂詩曰出師未捷身先死長使英雄淚滿襟聞者哂之先是太常卿杜黄裳為裴延齡所惡留滯臺閣十年不遷及其壻韋執誼為相始遷太常卿黄裳勸執誼帥羣臣請太子監國執誼驚曰丈人甫得一官奈何啟口議禁中事黄裳勃然曰黄裳受恩三朝豈得以一官相買乎拂衣起出戊申以給事中陸淳為太子侍讀仍更名質韋執誼自以專權恐太子不悦故以質為侍讀使潜伺太子意且解之及質發言太子怒曰陛下令先生為寡人講經義耳何為預它事質惶懼而出五月辛未以右金吾大將軍范希朝為左右神策京西諸城鎮行營節度使甲戌以度支郎中韓泰為其行軍司馬王叔文自知為内外所憎疾欲奪取宦官兵權以自固藉希朝老將使主其名而實以泰專其事人情不測其所為益疑懼辛夘以王叔文為户部侍郎依前充度支鹽鐵轉運副使俱文珍等惡其專權削去翰林之職叔文見制書大驚謂人曰叔文日時至此啇量公事若不得此院職事則無因而至矣王伾即為疏請不從再疏乃許三五日一入翰林去學士名叔文始懼六月己亥貶宣歙巡官羊士諤為汀州寧化尉士諤以公事至長安遇叔文用事公言其非叔文聞之怒欲下詔斬之執誼不可則令杖煞之執誼又以為不可遂貶焉由是叔文始大惡執誼往來二人門下者皆懼先時劉闢以劔南支度副使將韋臯之意于叔文求都領劔南三川謂叔文曰太尉使闢致微誠於公若與某三川當以死相助若不與亦當有以相酬叔文怒亦將斬之執誼固執不可闢尚遊長安未去聞貶士諤遂逃歸執誼初為叔文所引用深附之既得位欲掩其迹且迫於公議故時時為異同輙使人謝叔文曰非敢負約乃欲曲成兄事耳叔文詬怒不之信遂成仇怨癸丑韋臯上表以為陛下哀毁成疾重勞萬機故久而未安請權令皇太子親監庶政俟皇躬痊愈復歸春宫臣位兼將相今之所陳乃其職分又上太子牋以為聖上逺灋髙宗亮隂不言委政臣下而所付非人王叔文王伾李忠言之徒輙當重任賞罰縱情墮紀紊綱散府庫之積以賂權門樹置心腹徧於貴位潜結左右憂在蕭牆竊恐傾太宗盛業危殿下家邦願殿下即日奏聞斥逐羣小使政出人主則四方獲安臯自恃重臣逺處西蜀度王叔文不能動搖遂極言其姦俄而荆南節度使裴均河東節度使嚴綬牋表繼至意與臯同中外皆倚以為援而邪黨震懼均光庭之曾孫也王叔文既以范希朝韓泰主京西神策軍諸宦者尚未寤㑹邊上諸將各以狀辭中尉且言方屬希朝宦者始寤兵柄為叔文等所奪乃大怒曰從其謀吾屬必死其手密令其使歸告諸將曰無以兵屬人希朝至奉天諸將無至者韓泰馳歸白之叔文計無所出唯曰柰何柰何無幾其母病甚丙辰叔文盛具酒饌與諸學士及李忠言俱文珍劉光琦等飲於翰林叔文言曰叔文母病以身任國事之故不得親醫藥今將求假歸侍叔文比竭心力不避危難皆為朝廷之恩一旦去歸百謗交至誰肯見察以一言相助乎文珍随其語輙折之叔文不能對但引滿相勸酒數行而罷丁巳叔文以母喪去位秋七月王叔文既有母喪韋執誼益不用其語叔文怒與其黨日夜謀起復必先斬執誼而盡誅不附己者聞者忷懼自叔文歸第王伾失據日詣宦官及杜佑請起叔文為相且總北軍既不獲則請以為威逺軍使平章事又不得其黨皆憂悸不自保是日伾坐翰林中疏三上不報知事不濟行且卧至夜忽呌曰伾中風矣明日遂輿歸不出己丑以倉部郎中判度支案陳諌為河中少尹伾叔文之黨至是始去乙未制以積疹未復其軍國政事權令皇太子純勾當時内外共疾王叔文黨與專恣上亦惡之俱文珍等屢啟上請令太子監國上固厭倦萬機遂許之又以太常卿杜黄裳為門下侍郎左金吾大將軍袁滋為中書侍郎竝同平章事俱文珍等以其舊臣故引用之又以鄭珣瑜為吏部尚書髙郢為刑部尚書竝罷政事太子見百官於東朝堂百官拜賀太子涕泣不答拜八月庚子制令太子即皇帝位朕稱太上皇制敇稱誥辛丑太上皇徙居興慶官誥改元永貞立良娣王氏為太上皇后后憲宗之母也壬寅貶王伾開州司馬王叔文渝州司户伾尋病死貶所明年賜叔文死乙巳憲宗即位於宣政殿九月己夘貶神策行軍司馬韓泰為撫州刺史司封郎中韓􅁮為池州刺史禮部員外郎栁宗元為邵州刺史屯田員外郎劉禹錫為連州刺史冬十一月壬申貶中書侍郎同平章事韋執誼為崖州司馬執誼以甞與王叔文異同且杜黄裳壻故獨後貶然叔文敗執誼亦自失形勢知禍且至雖尚為相常不自得奄奄無氣聞人行聲輙惶悸失色以至於貶朝議謂王叔文之黨或自員外郎出為刺史貶之太輕己夘再貶韓泰為䖍州司馬韓􅁮為饒州司馬栁宗元為永州司馬劉禹錫為朗州司馬又貶河中少尹陳諌為台州司馬和州刺史凌準為連州司馬岳州刺史程异為郴州司馬憲宗元和四年初王叔文之黨既貶有詔雖遇赦無得量移十年王叔文之黨坐謫官者凡十年不量移執政有憐其才欲漸進之者悉召至京師諫官爭言其不可上與武元衡亦惡之三月乙酉皆以為逺州刺史官雖進而地益逺永州司馬栁宗元為栁州刺史朗州司馬劉禹錫為播州刺史宗元曰播州非人所居而夢得親在堂萬無母子俱往理欲請於朝願以栁易播㑹中丞裴度亦為禹錫言曰禹錫誠有罪然母老與其子死别良可傷上曰為人子尤當自謹勿貽親憂此則禹錫重可責也度曰陛下方侍太后恐禹錫在所宜矜上良久乃曰朕所言以責為人子者耳然不欲傷其親心退謂左右曰裴度愛我終切明日禹錫改連州刺史憲宗平蜀劉闢唐順宗永貞元年秋七月癸丑西川節度使南康忠武王韋臯薨臯在蜀二十一年重加賦歛豐貢獻以結主恩厚給賜以撫士卒士卒婚嫁死喪皆供其資費以是得久安其位而士卒樂為之用服南詔摧吐蕃幕僚嵗久官崇者則為刺史已復還幕府終不使還朝恐泄其所為故也府庫既實時寛其民三年一復租賦蜀人服其智謀而畏其威至今畫像以為土神家家祀之度支副使劉闢自為留後劉闢使諸將表求節鉞朝廷不許己未以袁滋為劔南東西川山南西道安撫大使冬十月戊戌以中書侍郎同平章事袁滋同平章事充西川節度使徵劉闢為給事中十一月劉闢不受徵阻兵自守袁滋畏其彊不敢進上怒貶滋為吉州刺史十二月己酉以給事中劉闢為西川節度副使知節度事上以初嗣位力未能討故也右諫議大夫韋丹上疏以為今釋闢不誅則朝廷可以指臂而使者惟兩京耳此外誰不為叛上善其言壬子以丹為東川節度使丹津之五世孫也憲宗元和元年劉闢既得旌節志益驕求兼領三川上不許闢遂發兵圍東川節度使李康於梓州欲以同幕盧文若為東川節度使推官莆田林藴力諫闢舉兵闢怒械繫於獄引出將斬之隂戒行刑者使不殺但數礪刄於其頸欲使屈服而赦之藴叱之曰豎子當斬即斬我頸豈汝砥石邪闢顧左右曰真忠烈之士也乃黜為唐昌尉上欲討闢而重於用兵公卿議者亦以為蜀險固難取杜黄裳獨曰闢狂戇書生取之如拾芥耳臣知神策軍使髙崇文勇畧可用願陛下專以軍事委之勿置監軍闢必可擒上從之翰林學士李吉甫亦勸上討蜀上由是器之戊子命左神策行營節度使髙崇文將步騎五千為前軍神策京西行營兵馬使李元奕將歩騎二千為次軍與山南西道節度使嚴礪同討劉闢時宿將名位素重者甚衆皆自謂當征蜀之選及詔用崇文皆大驚上與杜黄裳論及藩鎮黄裳曰德宗自經憂患務為姑息不生除節帥有物故者先遣中使察軍情所與則授之中使或私受大將賂歸而譽之即降旄鉞未甞有出朝廷之意者陛下必欲振舉綱紀宜稍以灋度裁制藩鎮然後天下可得而理也上深以為然於是始用兵討蜀以致威行兩河皆黄裳啟之也髙崇文屯長武城練卒五千常如冦至夘時受詔辰時即行器械糗糧一無所闕甲午崇文出斜谷李元奕出駱谷同趣梓州崇文軍至興元軍士有食於逆旅折人匕筯者崇文斬之以狥劉闢䧟梓州執李康二月嚴礪拔劔州斬其刺史文德昭三月髙崇文引兵自閬州趣梓州劉闢將邢泚引兵遁去崇文入屯梓州闢歸李康於崇文以求自雪崇文以康敗軍失守斬之丙子嚴礪奏克梓州丁丑制削奪劉闢官爵東川節度使韋丹至漢中表言髙崇文客軍逺鬬無所資若與梓州綴其士心必能有功夏四月丁酉以崇文為東川節度副使知節度事夏五月劉闢城鹿頭闗連八柵屯兵萬餘人以拒髙崇文六月丁酉崇文擊敗之闢置柵於闗東萬勝堆戊戌崇文遣驍將范陽髙霞寓攻奪之下瞰闗城凢八戰皆㨗庚子髙崇文破劉闢於德陽癸夘又破之於漢州嚴礪遣其將嚴秦破闢衆萬餘人於綿州石碑谷秋七月癸丑髙崇文破劉闢之衆萬人於𤣥武甲午詔凡西川繼援之兵悉取崇文處分九月壬寅髙崇文又敗劉闢之衆於鹿頭闗嚴秦敗劉闢之衆於神泉河東將阿跌光顔將兵㑹髙崇文於行營愆期一日懼誅欲深入自贖軍于鹿頭之西斷其糧道城中憂懼扵是闢綿江栅將李文悦鹿頭守將仇良輔皆以城降於崇文獲闢壻蘇彊士卒降者萬計崇文遂長驅直指成都所向崩潰軍不留行辛亥克成都劉闢盧文若帥數十騎西犇吐蕃崇文使髙霞寓等追之及於羊灌田闢赴江不死擒之文若先殺妻子乃繫石自沈崇文入成都屯於通衢休息士卒市肆不驚珍寶山積秋毫不犯檻劉闢送京師斬闢大將邢泚館驛巡官沈衍餘無所問軍府事無巨細命一遵韋南康故事從容指撝一境皆平初韋臯以西山運糧使崔從知卭州事劉闢反從以書諫闢闢發兵攻之從嬰城固守闢敗乃得免從融之曾孫也韋臯參佐房式韋乾度獨孤密符載郗士美段文昌等素服麻屨銜土請罪崇文皆釋而禮之草表薦式等厚贐而遣之目段文昌曰君必為將相未敢奉薦載廬山人式琯之從子文昌志𤣥之𤣥孫也闢有二妾皆殊色監軍請獻之崇文曰天子命我討平凶豎當以撫百姓為先遽獻婦人以求媚豈天子之意邪崇文義不為此乃以配將吏之無妻者杜黄裳建議征蜀及指授髙崇文方畧皆懸合事宜崇文素憚劉澭黄裳使謂之曰若無功當以劉澭相代故能得其死力及蜀平宰相入賀上目黄裳曰卿之功也冬十月制割資簡陵榮昌瀘六州𨽻東川房式等未至京師皆除省寺官丙寅以髙崇文為西川節度使戊辰以嚴礪為東川節度使庚午以將作監栁晟為山南西道節度使晟至漢中府兵討劉闢還未至城詔復遣戍梓州軍士怨怒脅監軍謀作亂晟聞之疾驅入城慰勞之既而問曰汝曹何以得成功對曰誅反者劉闢耳晟曰闢以不受詔命故汝曹得以立功豈可復使它人誅汝以為功邪衆皆拜謝請詣戍所如詔書軍府由是獲安戊子劉闢至長安并族黨誅之憲宗平吳李錡唐德宗貞元十五年春二月以常州刺史李錡為浙西觀察使諸道鹽鐵轉運使錡國貞之子也閑廐宫苑使李齊運受其賂數十萬薦之於上故用之錡刻剥以事進奉上由是悦之十七年李錡既執天下利權以貢獻固主恩又以饋遺結權貴恃此驕縱無所忌憚盜取縣官財所部官屬無罪受戮者相繼浙西布衣崔善貞詣闕上封事言宫市進奉及鹽鐵之弊因言錡不法事上覽之不悦命械送錡錡聞其將至先鑿阬於道旁己亥善貞至并鎖械内阬中生瘞之逺近聞之不寒而慄錡復欲為自全計增廣兵衆選有材力善射者謂之挽彊胡奚雜類謂之蕃落給賜十倍它卒轉運判官盧坦屢諫不悛與幕僚李約等皆去之約勉之子也順宗永貞元年春三月丙戍加杜佑度支及諸道鹽鐵轉運使以浙西觀察使李錡為鎮海節度使解其鹽鐵轉運使錡雖失利權而得節旄故反謀亦未發冬十二月以刑部郎中杜兼為蘇州刺史兼辭行上書稱李錡且反必奏族臣上然之留為吏部郎中憲宗元和二年夏蜀既平藩鎮惕息多求入朝鎮海節度使李錡亦不自安求入朝上許之遣中使至京口慰撫且勞其將士錡雖署判官王澹為留後實無行意屢遷行期澹與敕使數勸諭之錡不悦上表稱疾請至嵗暮入朝上以問宰相武元衡曰陛下初即政錡求朝得朝求止得止可否在錡將何以令四海上以為然下詔徵之錡詐窮遂謀反王澹既掌留務於軍府頗有制置錡益不平密諭親兵使殺之㑹頒冬服錡嚴兵坐幄中澹遣敕使入謁有軍士數百譟於庭曰王澹何人擅主軍務曵下臠食之大將趙錡出慰止又臠食之注刄於敕使之頸詬詈將殺之錡陽驚起救之冬十月己未詔徵錡為左僕射以御史大夫李元素為鎮海節度使庚申錡表言軍變殺留後大將先是錡選腹心五人為所部五州鎮將姚志安處蘇州李深處常州趙惟忠處湖州丘自昌處杭州髙肅處睦州各有兵數千伺察刺史動靜至是錡各使殺其刺史遣牙將庾伯良將兵三千治石頭城常州刺史顔防用客李雲計矯制稱招討副使斬李深傳檄蘇杭湖睦請同進討湖州刺史辛秘潜募鄊閭子弟數百夜襲趙惟忠營斬之蘇州刺史李素為姚志安所敗生致於錡具桎梏釘於船舷未及京口㑹錡敗得免乙丑制削李錡官爵及屬籍以淮南節度使王鍔統諸道兵為招討處置使徵宣武武寧武昌兵并淮南宣歙兵俱出宣州江西兵出信州浙東兵出杭州以討之李錡以宣州富饒欲先取之遣兵馬使張子良李奉仙田少卿將兵三千襲之三人知錡必敗與牙將裴行立同謀討之行立錡之甥也故悉知錡之密謀三將營於城外將發召士卒諭之曰僕射反逆官軍四集常湖二將繼死其勢已蹙今乃欲使吾輩逺取宣城吾輩何為隨之族滅豈若棄逆效順轉禍為福乎衆悦許諾即夜還趨城行立舉火鼓譟應之於内引兵趨牙門錡聞子良等舉兵怒聞行立應之撫膺曰吾何望矣跣足匿樓下親將李鈞引挽彊三百趨山亭欲戰行立伏兵邀斬之錡舉家皆哭左右執錡裹之以幕縋於城下械送京師挽彊蕃落爭自殺尸相枕藉癸酉本軍以聞乙亥羣臣賀於紫宸殿上愀然曰朕之不德致宇内數有千紀者朕之愧也何賀之為宰相議誅錡大功以上親兵部郎中蔣乂曰錡大功親皆淮安靖王之後也淮安有佐命之功陪陵享廟豈可以末孫為惡而累之乎又欲誅其兄弟乂曰錡兄弟故都綂國貞之子也國貞死王事豈可使之不祀乎宰相以為然辛巳錡從父弟宋州刺史銛等皆貶官流放十一月甲申朔錡至長安上御興安門面詰之對曰臣初不反張子良等教臣耳上曰卿為元帥子良等謀反何不斬之然後入朝錡無以對乃并其子師回腰斬之有司請毁錡祖考冢廟中丞盧坦上言李錡父子受誅罪已塞矣昔漢誅霍禹不罪霍光先朝誅房遺愛不及房𤣥齡康誥曰父子兄弟罪不相及況以錡為不善而罪及五代祖乎乃不毁有司籍錡家財輸京師翰林學士裴垍李絳上言以為李錡僭侈割剥六州之人以富其家或枉殺其身而取其財陛下閔百姓無告故討而誅之今輦金帛以輸上京恐逺近失望願以逆人資財賜浙西百姓代今年租賦上嘉歎乆之即從其言魏慱歸朝田𢎞正唐憲宗元和七年秋八月戊戌魏愽節度使田季安薨初季安娶洺州刺史元誼女生子懷諫為節度副使牙内兵馬使田興庭玠之子也有勇力頗讀書性恭遜季安淫虐興數規諫軍中賴之季安以為收衆心出為臨清鎮將欲殺之興陽為風痺炙灼滿身乃得免季安病風殺戮無度軍政廢亂夫人元氏召諸將立懷諫為副大使知軍務時年十一遷季安於别寢月餘而薨召田興為步射都知兵馬使辛亥以左龍武大將軍薛平為鄭滑節度使欲以控制魏􅀶上與宰相議魏􅀶事李吉甫請興兵討之李綘以為魏􅀶不必用兵當自歸朝廷吉甫盛陳不可不用兵之狀上曰朕意亦以為然綘曰臣竊觀兩河藩鎮之䟦扈者皆分兵以𨽻諸將不使專在一人恐其權任太重乘間而謀已故也諸將勢均力敵莫能相制欲廣相連結則衆心不同其謀必泄欲獨起為變則兵少力微勢必不成加以購賞既重刑誅又峻是以諸將互相顧忌莫敢先發䟦扈者恃此以為長策然臣竊思之若常得嚴明主帥能制諸將之死命者以臨之則粗能自固矣今懷諫乳臭子不能自聴㫁軍府大權必有所歸諸將厚薄不均怨怒必起不相服從然則曏日分兵之䇿適足為今日禍亂之階也田氏不為屠肆則悉為俘囚矣何煩天兵哉彼自列將起代主師鄰道所惡莫甚於此彼不倚朝廷之援以自存則立為鄰道所虀粉矣故臣以為不必用兵可坐待魏愽之自歸也但願陛下按兵養威嚴敇諸道選練士馬以須後敕使賊中知之不過數月必有自效於軍中者矣至時惟在朝廷應之敏速中其機㑹不愛期禄以賞其人使兩河藩鎮聞之恐其麾下效之以取朝廷之賞必皆恐懼爭為恭順矣此所謂不戰而屈人兵者也上曰善它日吉甫復於延英盛陳用兵之利且言芻糧金帛皆已有備上顧問綘綘對曰兵不可輕動前年討恒州四面發兵近二十萬又發兩神䇿兵自京師赴之天下騷動所費七百餘萬緡訖無成功為天下笑今瘡痍未復人皆憚戰若又以敕命驅之臣恐非直無功或生它變況魏􅀶不必用兵事勢明白願陛下勿疑上奮身撫案曰朕不用兵決矣綘曰陛下雖有是言恐退朝之後復有熒惑聖聽者上正色厲聲曰朕志已決誰能惑之綘乃拜賀曰此社稷之福也既而田懷諫幼弱軍政皆決於家臣蔣士則數以愛憎移易諸將衆皆憤怒朝命久未至軍中不安田興晨入府士卒數千人大譟環興而拜請為留後興驚仆於地衆不散久之興度不免乃謂衆曰汝肯聽吾言乎皆曰惟命興曰勿犯副大使守朝廷灋令申版籍請官吏然後可皆曰諾興乃殺蔣士則等十餘人遷懷諫於外冬十月乙未魏􅀶監軍以狀聞上亟召宰相謂李綘曰卿揣魏􅀶若符契李吉甫請遣中使宣慰以觀其變李綘曰不可今田興奉其土地兵衆坐待詔命不乘此際推心撫納結以大恩必待敕使至彼持將士表來為請節鉞然後與之則是恩出於下非出於上將士為重朝廷為輕其感戴之心亦非今日之比也機㑹一失悔之無及吉甫素與樞密使梁守謙相結守謙亦為之言於上曰故事皆遣中使宣勞今此鎮獨無恐更不諭上竟遣中使張忠順如魏􅀶宣慰欲俟其還而議之癸夘李絳復上言朝廷恩威得失在此一舉時機可惜柰何棄之利害甚明願聖心勿疑計忠順之行甫應過陜乞明旦即降白麻除興節度使猶可及也上欲且除留後降曰興恭順如此自非恩出不次則無以使之感激殊常上從之甲辰以興為魏􅀶節度使忠順未還制命已至魏州興感恩流涕士衆無不鼓舞李絳又言魏􅀶五十餘年不霑皇化一旦舉六州之地來歸刳河朔之腹心傾叛亂之巢穴不有重賞過其所望則無以慰士卒之心使四鄰勸慕請發内庫錢百五十萬緡以賜之左右宦官以為所與太多後有此比將何以給之上以語絳絳曰田興不貪專地之利不顧四鄰之患歸命聖朝陛下柰何愛小費而遺大計不以收一道人心錢用盡更來機事一失不可復追借使國家發十五萬兵以取六州期年而克之其費豈止百五十萬緡而已乎上悦曰朕所以惡衣菲食蓄聚貨財正為欲平定四方不然徒貯之府庫何為十一月辛酉遣知制誥裴度至魏愽宣慰以錢百五十萬緡賞軍士六州百姓給復一年軍士受賜歡聲如雷成德兖鄆使者數輩見之相顧失色歎曰倔彊者果何益乎度為興陳君臣上下之義興聴之終夕不倦待度禮極厚請度徧至所部州縣宣布朝命奏乞除節度副使於朝廷詔以户部郎中河東胡証為之興又奏所部缺官九十員請有司注擬行朝廷灋令輸賦税田承嗣以來室屋僣侈者皆避不居鄆蔡恒遣逰客間説百方興終不聽李師道使人謂宣武節度使韓𢎞曰我世與田氏約相保援今興非其族又首變兩河事亦公之所惡也我將與成德合軍討之𢎞曰我不知利害知奉詔行事耳若兵北度河我則以兵東取曹州師道懼不敢動田興既葬田季安送田懷諫于京師辛巳以懐諫為右監門衛將軍八年春正月辛夘賜魏愽節度使田興名𢎞正十四年秋八月己未田𢎞正入朝上待之尤厚甲辰以田𢎞正兼侍中魏􅀶節度使如故𢎞正三表請留上不許𢎞正常恐一旦物故魏人猶以故事繼襲故兄弟子姪皆仕諸朝上皆擢居顯列朱紫盈庭時人榮之憲宗討成德王承宗唐德宗貞元二十年夏六月昭義節度使李長榮薨上遣中使以手詔授本軍大將但軍士所附者即授之時大將來希皓為衆所服中使將以手詔付之希皓言於衆曰此軍取人合是希皓但作節度使不得若朝廷以一束草來希皓亦必敬事中使言面奉進止只令此軍取大將㧞與節鉞朝廷不别除人希皓固辭兵馬使盧從使其位居四潜與監軍相結起出伍曰若來大夫不肯受詔從史請且勾當此軍監軍曰盧中丞若如此此亦固合聖㫖中使因探懐取詔以授之從史捧詔再拜舞蹈希皓亟回揮同列北面稱賀軍士畢集更無一言秋八月己未詔以從史為節度使憲宗元和二年冬十一月昭義節度使盧從史内與王士真劉濟潜通而外獻策請圖山東擅引兵東出上召令還上黨從史託言就食邢洺不時奉詔久之乃還四年春三月成德節度使王士真薨其子副大使承宗自為留後河北三鎮相承各置副大使以嫡長為之父没則代領軍務王承宗叔父士則以承宗擅自立恐禍及宗與幕客劉栖楚俱自歸京師詔以士則為神䇿大將軍上欲革河北諸鎮世襲之弊乘王士真死欲自朝廷除人不從則興師討之中書侍郎同平章事裴垍曰李納䟦扈不恭王武俊有功於國陛下前許師道今奪承宗沮勸違理彼必不服由是議久不決上以問諸學士李絳等對曰河北不遵聲教誰不憤歎然今日取之或恐未能成德軍自武俊以來父子相承四十餘年人情貫習不以為非況承宗已總軍務一旦易之恐未即奉詔又范陽魏􅀶易定淄青以地相傳與成德同體彼聞成德除人必内不自安隂相黨助雖茂昭有請亦恐非誠所以然者今國家除人代承宗彼鄰道勸成進退有利若所除之人得入彼則自以為功若詔令有所不行彼因潜相交結在於國體豈可遽休須應興師四面攻討彼將帥則加官爵士卒則給衣糧按兵玩冦坐觀勝負而勞費之病咸歸國家矣今江淮水公私困竭軍旅之事殆未可輕議也左軍中尉吐突承璀欲希上意奪裴垍權自請將兵討之上疑未決宗正少卿李拭奏稱承宗不可不討承璀親近信臣宜委以禁兵使統諸軍誰敢不服上以拭狀示諸學士曰此姦臣也知朕欲將承璀故上此奏卿曹記之自今勿令得進用昭義節度使盧從史遭父喪朝廷久未起復從史懼因承璀説上請發本軍討承宗壬辰起復從史左金吾大將軍餘如故秋七月上密問諸學士曰今欲用王承宗為成德留後割其德棣二州更為一鎮以離其勢并使承宗輸二税請官吏一如師道何如李絳等對曰德棣之𨽻成德為日已久今一旦割之恐承宗及其將士憂疑怨望得以為辭況其鄰道情狀一同各慮它日分割或潜相構扇萬一旅拒倍難處置願更三思所是二税官吏願因弔祭使至彼自以其意諭承宗令上表陳乞如師道例勿令知出陛下意如此則幸而聽命於理固順若其不聽體亦無損上又問今劉濟田季安皆有疾若其物故豈可盡如成德付授其子天下何時當平議者皆言宜乘此際代之不受則發兵討之時不可失如何對曰羣臣見陛下西取蜀東取吳易於反掌故謟䛕躁競之人爭獻策畫勸開河北不為國家深謀逺慮陛下亦以前日成功之易而信其言臣等夙夜思之河北之勢與二方異何則西川浙西皆非反側之地其四鄰皆國家臂指之臣劉闢李錡獨生狂謀其下皆莫之與闢錡徒以貨財㗖之大軍一臨則渙然離耳故臣等當時亦勸陛下誅之以其萬全故也成德則不然内則膠固嵗深外則蔓連勢廣其將士百姓懐其累代喣嫗之恩不知君臣逆順之理諭之不從威之不服將為朝廷羞又鄰道平居或相猜恨及聞代易必合為一心葢各為子孫之謀亦慮它日及此故也萬一餘道或相表裏兵連禍結財盡力竭西戎北狄乘間窺窬其為憂患可勝道哉濟季安與承宗事體不殊若物故之際有間可乘當臨事圖之於今用兵則恐未可太平之業非朝夕可致願陛下審處之時吳少誠病甚絳等復上言少誠病必不起淮西事體與河北不同四旁皆國家州縣不與賊鄰無黨援相助朝廷命帥今正其時萬一不從可議征討臣願捨恒冀難致之䇿就申蔡易成之謀脱或恒冀連兵事未如意蔡州有舋勢可興師南北之役俱興財力之用不足儻事不得已須赦承宗則恩德虚施威令頓廢不如早賜處分以收鎮冀之心坐待機宜必獲申蔡之利既而承宗久未得朝命頗懼累表自訴八月壬午上乃遣京兆少尹裴武詣真定宣慰承宗受詔甚恭曰三軍見迫不暇俟朝㫖請獻德棣二州以明懇欵九月甲辰朔裴武復命庚戌以承宗為成德軍節度恒冀深趙州觀察使德州刺史薛昌朝為保信軍節度德棣二州觀察使昌朝嵩之子王氏之壻也故就用之田季安得飛報先知之使謂承宗曰昌朝隂與朝廷通故受節鉞承宗遽遣數百騎馳入德州執昌朝至真定囚之中使送昌朝節過魏州季安陽為宴勞留使者累日比至德州已不及矣上以裴武為欺㒺又有譛之者曰武使還先宿裴垍家明旦乃入見上怒甚以語李綘欲貶武於嶺南絳曰武昔䧟李懐光軍中守節不屈豈容今日遽為姦回葢賊多變詐人未易盡其情承宗始懼朝廷誅討故請獻二州既䝉恩貸而鄰道皆不欲成德開分割之端計必有隂行間説誘而脅之使不得守其初心者非武之罪也今陛下選武使入逆亂之地使還一語不相應遽竄之遐荒臣恐自今奉使賊廷者以武為戒茍求便身率為依阿兩可之言莫肯盡誠具陳利害如此非國家之利也且垍武久處朝廷諳練事體豈有使還未見天子而先宿宰相家乎臣敢為陛下必保其不然此殆有讒人欲傷武及垍者願陛下察之上良久曰理或有此遂不問上遣中使諭王承宗使遣薛昌朝還鎮承宗不奉詔冬十月癸未制削奪承宗官爵以左神䇿中尉吐突承璀為左右神䇿河中河陽浙西宣歙等道行營兵馬使招討處置等使翰林學士白居易上奏以為國家征伐當責成將帥近嵗始以中使為監軍自古及今未有徵天下之兵專令中使統領者也今神䇿軍既不置行營節度使則承璀乃制将也又統諸軍招討處置使則承璀乃都統也臣恐四方聞之必輕朝廷四夷聞之必笑中國陛下忍令後代相傳云以中官為制将都統自陛下始乎臣又恐劉濟茂昭及希朝從史乃至諸道将校皆恥受承璀指麾心既不齊功何由立此是資承宗之計而挫諸将之勢也陛下念承璀勤勞貴之可也憐其忠赤富之可也至於軍國權柄動闗理亂朝廷制度出自祖宗陛下寧忍徇下之情而自隳法制從人之欲而自損聖明何不思於一時之間而取笑於萬代之後乎時諫官御史論承璀職名太重者相屬上皆不聽戊子上御延英殿度支使李元素鹽鐵使李鄘京兆尹許孟容御史中丞李夷簡諫議大夫孟簡給事中吕元膺穆質右補闕獨孤郁等極言其不可上不得已明日削承璀四道兵馬使改處置為宣慰而已李絳甞極言宦官驕横侵害政事讒毁忠貞上曰此屬安敢為讒就使為之朕亦不聽絳曰此屬大抵不知仁義不分枉直惟利是嗜得賂則譽跖蹻為㢘良怫意則毁龔黄為貪暴能用傾巧之智構成疑似之端朝夕左右浸潤以入之陛下必有時而信之矣自古宦官敗國者備載方冊陛下豈得不防其漸乎己亥吐突承璀将神䇿兵發長安命恒州四面藩鎮各進兵招討田季安聞吐突承璀将兵討王承宗聚其徒曰師不跨河二十五年矣今一旦越魏伐趙趙虜魏亦虜矣計為之柰何其将有超伍而言者曰願借騎五千以除君憂季安大呼曰壯哉兵決出格沮者斬幽州牙將絳人譚忠為劉濟使魏知其謀入謂季安曰如某之謀是引天下之兵也何者今王師越魏代趙不使耆臣宿將而專付中臣不輸天下之甲而多出秦甲君知誰為之謀此乃天子自為之謀欲將夸服於臣下也若師未叩趙而先碎於魏是上之謀反不如下其能不恥於天下乎既恥且怒必任智士畫長䇿伏猛將練精兵畢力再舉涉河鑑前之敗必不越魏而伐趙校罪輕重必不先趙而後魏是上不上下不下當魏而來也季安曰然則若之何忠曰王師入魏君厚犒之於是悉甲壓境號曰伐趙則可隂遺趙人書曰魏若伐趙則河北義士謂魏賣友魏若與趙則河南忠臣謂魏反君賣友反君之名魏不忍受執事若能隂解陴障遺魏一城魏得持之奏捷天子以為符信此乃使魏北得以奉趙西得以為臣於趙有角尖之耗於魏獲不世之利執事豈能無意於魏乎趙人脱不拒君是魏霸基安矣季安曰善先生之來是天眷魏也遂用忠之謀與趙隂計得其堂陽忠歸幽州謀欲激劉濟討王承宗會濟合諸將言曰天子知我怨趙今命我伐之趙亦必大備我伐與不伐孰利忠疾對曰天子終不使我伐趙趙亦不備燕濟怒曰爾何不直言濟與承宗反乎命繫忠獄使人視成德之境果不為備後一日詔果來令濟專護北彊勿使朕復挂胡憂而得專心於承宗濟乃解獄召忠曰信如子㫁矣何以知之忠曰盧從史外親燕内實忌之外絶趙内實與之此為趙畫曰燕以趙為障雖怨趙必不殘趙不必為備一且示趙不敢抗燕二且使燕獲疑天子趙人既不備燕潞人則走吿于天子曰燕厚怨趙趙見伐而不備燕是燕反與趙也此所以知天子終不使君伐趙趙亦不備燕也濟曰今則柰何忠曰燕趙為怨天下無不知今天子伐趙君坐全燕之甲一人未濟易水此正使潞人以燕賣恩於趙敗忠於上兩皆售也是燕貯忠義之心卒染私趙之口不見德於趙人惡聲徒嘈嘈於天下耳惟君熟思之濟曰吾知之矣乃下令軍中曰五日畢出後者醢以狥五年春正月劉濟自將兵七萬人擊王承宗時諸軍皆未進濟獨前奮擊拔饒陽束鹿河東河中振武義武四軍為恒州北面招討㑹于定州㑹望夜軍吏以有外軍請罷張燈張茂昭曰三鎮官軍也何謂外軍命張燈不禁行人不閉里門三夜如平日亦無敢喧譁者丁夘河東將王榮拔王承宗洄湟鎮吐突承璀至行營威令不振與承宗戰屢敗左神策大將軍酈定進戰死定進驍將也軍中奪氣諸軍討王承宗者久無功白居易上言以為河北本不當用兵今既出師承璀未甞苦戰已失大將與從史兩軍入賊境遷延進退不惟意在逗留亦是力難支敵希朝茂昭至新市鎮竟不能過劉濟引全軍攻圍樂夀久不能下師道季安元不可保察其情狀似相計㑹各收一縣遂不進軍陛下觀此事勢成功有何所望以臣愚見速須罷兵若又遲疑其害有四可為痛惜者二可為深憂者二何則若保有成即不論用度多少既的知不可即不合虚費貲糧悟而後行事亦非晩今遲校一日有一日之費更延旬月所費滋多終須罷兵何如早罷以府庫賤帛百姓脂膏資助河北諸侯轉令彊大此臣為陛下痛惜者一也臣又恐河北諸將見吳少陽已受制命必引事例輕重同詞請雪承宗若章表繼來即義無不許請而後捨體勢可知轉令承宗膠固同類如此則與奪皆由鄰道恩信不出朝廷實恐威權盡歸河北此為陛下痛惜者二也今天時已熱兵氣相蒸至於饑渴疲勞疾疫暴露驅以就戰人何以堪縱不惜身亦難忍苦況神䇿烏雜城市之人例皆不慣如此忽思生路或有犇逃一人若逃百人相扇一軍若散諸軍必搖事忽至此悔將何及此為陛下深憂者一也臣聞回鶻吐蕃皆有細作中國之事小大盡知今聚天下之兵唯討承宗一賊自冬及夏都未立功則兵力之彊弱資費之多少豈宜使西戎北虜一一知之忽見利生心承虚入寇以今日之勢力可能救其首尾哉兵連禍生何事不有萬一及此實闗安危此其為陛下深憂者二也盧從史首建伐王承宗之謀及朝廷興師從史逗遛不進隂與承宗通謀令軍士潜懐承宗號又髙芻粟之價以販度支諷朝廷求平章事誣奏諸道與賊通不可進兵上甚患之㑹從史遣牙將王翊元入奏事裴垍引與語為言為臣之義微動其心翊元遂輸誠言從史隂謀及可取之狀垍令翊元還本軍經營復來京師遂得其都知兵馬使烏重𦙍等欵要垍言於上曰從史狡猾驕狠必且為亂今聞其與承璀對營視承璀如嬰兒往來殊不設備失今不取後雖興大兵未可以嵗月平也上初愕然熟思良久乃許之從史性貪承璀盛陳竒玩視其所欲稍以遺之從史喜益相昵狎甲申承璀與行營兵馬使李聽謀召從史入營博伏壯士於幕下突出擒詣帳後縳之内車中馳詣京師左右驚亂承璀斬十餘人諭以詔㫖從史營中士卒聞之皆甲以出操兵趨譁烏重𦙍當軍門叱之曰天子有詔從者賞敢違者斬士卒皆歛兵還部伍㑹夜車疾驅未明已出境重𦙍承洽之子聽晟之子也丁亥范希朝張茂昭大破承宗之衆於木刀溝上嘉烏重𦙍之功欲即授以昭義節度使李絳以為不可請授重𦙍河陽以河陽節度使孟元陽鎮昭義㑹吐突承璀奏已牒重𦙍勾當昭義留後絳上言昭義五州據山東要害魏愽恒幽諸鎮蟠結朝廷惟恃此以制之磁邢洺入其腹内誠國之寶地安危所繫也曏為從史所據使朝廷旰食今幸而得之承璀復以與重𦙍臣聞之驚歎實所痛心昨國家誘執從史雖為長䇿已失大體今承璀又以文牒差人為重鎮留後為之求旌節無君之心孰甚於此陛下昨日得昭義人神同慶威令再立今日忽以授本軍牙將物情頓沮紀綱大紊校計利害更不若從史為之何則從史雖蓄姦謀已是朝廷牧伯重𦙍出於列校以承璀一牒代之竊恐河南北諸侯聞之無不憤怒恥與為伍且謂承璀誘重𦙍使逐從史而代其位彼人人麾下各有將校能無自危乎儻劉濟茂昭季安執恭韓𢎞師道繼有章表陳其情狀并指承璀專命之罪不知陛下何以處之若皆不報則衆怒益甚若為之改除則朝廷之威重去矣上復使樞密使梁守謙密謀於絳曰今重𦙍已摠軍務事不得已須應與節對曰從史為帥不由朝廷故啟其邪心終成逆節今以重𦙍典兵即授之節威福之柄不在朝廷何以異於從史乎重𦙍之得河陽已為望外之福豈敢更為旅拒況重𦙍所以能執從史本以仗順成功一旦自逆詔命安知同列不襲其跡而動乎重𦙍軍中等夷甚多必不願重𦙍獨為主帥移之它鎮乃愜衆心何憂其致亂乎上悦皆如其請壬辰以重𦙍為河陽節度使戊戌貶盧從史驩州司馬夏六月甲申白居易復上奏以為臣比請罷兵今之事勢又不如前不知陛下復何所待是時上毎有軍國大事必與諸學士謀之甞踰月不見學士李絳等上言臣等飽食不言其自為計則得矣如陛下何陛下詢訪理道開納直言實天下之幸豈臣等之幸上遽令明日三殿對來白居易甞因論事言陛下錯上色荘而罷密召承㫖李絳謂曰居易小臣不遜須令出院絳曰陛下容納直言故羣臣敢竭誠無隠居易言雖少思志在納忠陛下今日罪之臣恐天下各思箝口非所以廣聰明昭聖德也上悦待居易如初秋七月庚子王承宗遣使自陳為盧從史所離閒乞輸貢賦請官吏許其自新李師道等數上表請雪承宗朝廷亦以師久無功丁未制洗雪承宗以為成徳軍節度使復以德棣二州與之悉罷諸道行營將士共賜布帛二十八萬端匹加劉濟中書令秋九月己亥吐突承璀自行營還辛亥復為左衛上將軍充左軍中尉裴垍曰承璀首唱用兵疲弊天下卒無成功陛下縱以舊恩不加顯戮豈得全不貶黜以謝天下乎給事中段平仲吕元膺言承璀可斬李絳奏稱陛下不責承璀它日復有敗軍之將何以處之若或誅之則同罪異罰彼必不服若或釋之則誰不保身而玩寇乎願陛下割不忍之恩行不易之典使將帥有所懲勸間二日上罷承璀中尉降為軍器使中外相賀中書侍郎同平章事裴垍數以疾辭位冬十一月庚申罷為兵部尚書十二月翰林學士司勲郎中李絳面陳吐突承璀專横語極懇切上作色曰卿言大過絳泣曰陛下置臣於腹心耳目之地若臣畏避左右愛身不言是臣負陛下言之而陛下惡聞乃陛下負臣也上怒解曰卿所言皆人所不能言使朕聞所不聞真忠臣也它日盡言皆應如是己丑以絳為中書舍人學士如故絳甞從容諌上聚財上曰今兩河數十州皆國家政令所不及河湟數千里淪於左衽朕日夜思雪祖宗之恥而財力不贍故不得不蓄聚耳不然朕宫中用度極儉薄多藏何用邪六年冬十一月己丑以户部侍郎李絳為中書侍郎同平章事七年春三月丙戌上御延英殿李吉甫言天下已太平陛下宜為樂李絳曰漢文帝時兵木無刃家給人足賈誼猶以為厝火積薪之下不可謂安今灋令所不能制者河南北五十餘州犬戎腥羶近接涇隴烽火屢驚加之水旱時作倉廪空虛此正陛下宵衣旰食之時豈得謂之太平遽為樂哉上欣然曰卿言正合朕意退謂左右曰吉甫專為悦媚如李絳真宰相也九年李絳屢以足疾辭位正月癸夘罷為禮部尚書初上欲相絳先出吐突承璀為淮南監軍至是召還承璀先罷絳相十年夏六月賊殺武元衡詔中外捜捕成徳軍進奏院有恒州卒張晏等行止無狀神䇿將軍王士則等告王承宗遣晏等殺元衡吏捕得晏鞫之詔以王承宗前後三表出示百寮議其罪事見憲宗平淮西乙丑以裴度為中書侍郎同平章事秋七月甲戌詔數王承宗罪惡絶其朝貢曰冀其翻然改過束身自歸攻討之期更俟後命上雖絶王承宗朝貢未有詔討之魏愽節度使田𢎞正屯兵於其境承宗屢敗之𢎞正忿表請擊之上不許表十上乃聽至貝州丙午𢎞正軍于貝州冬十一月詔發振武兵二千㑹義武軍以討王承宗十二月王承宗縱兵四掠幽滄定三鎮皆苦之爭上表請討承宗上欲許之中書侍郎同平章事張𢎞靖以為兩役並興恐國力所不支請併力平淮西乃征恒冀上不為之止𢎞靖乃求罷十一年春正月乙亥幽州節度使劉總奏敗成德兵拔武彊斬首千餘級癸未制削王承宗官爵命河東幽州義武横海魏愽昭義六道進討韋貫之屢請先取吳元濟後討承宗曰陛下不見建中之事乎始於討魏及齊而蔡燕趙皆應之卒致朱泚之亂由德宗不能忍數年之憤邑欲太平之功速成故也上不聽二月乙夘昭義節度使郗士美奏破成德兵斬首千餘級己未劉總破成德兵斬首千餘級辛酉魏愽奏敗成德兵拔其固城乙丑又奏拔其鵶城三月幽州節度使劉總圍樂夀四月劉總奏破成德兵於深州斬首二千五百級乙丑義武節度使渾鎬奏破成德兵於九門殺千餘人鎬瑊之子也秋七月田𢎞正奏破成德兵於南宫殺二千餘人諸軍討王承宗者互相觀望獨昭義節度使郗士美引精兵壓其境己未士美奏大破承宗之衆於柏鄊殺千餘人降者亦如之為三壘以環柏鄊十二月壬寅程執恭奏敗成德兵於長河斬首千餘級義武節度使渾鎬與王承宗戰屢勝遂引全師壓其境距恒州三十里而軍承宗懼潜遣兵入鎬境焚掠城邑人心始内顧而搖㑹中使督其戰鎬引兵進薄恒州與承宗戰大敗犇還定州丙午詔以易州刺史陳楚為義武節度使軍中聞之掠鎬及家人衣至於倮露陳楚馳入定州鎮遏亂者歛軍中衣以歸鎬以兵衛送還朝楚定州人張茂昭之甥也十二年春三月郗士美敗於柏鄊拔營而歸士卒死者千餘人戊辰賜程執恭名權戊寅王承宗遣兵二萬入東光㫁白橋路程權不能禦以衆歸滄州六鎮討王承宗者兵十餘萬回環數千里既無統帥又相去逺期約難一由是歴二年無功千里饋運牛驢死者什四五劉總既得武彊引兵出境纔五里留屯不進月給度支錢十五萬緡李逢吉及朝士多言宜併力先取淮西俟淮西平乘其勝勢回取恒冀如拾芥耳上猶豫久乃從之丙子罷河北行營各使還鎮十三年裴度之在淮西也布衣柏耆以䇿干韓愈曰吳元濟既就擒王承宗破膽矣願得奉丞相書往説之可不煩兵而服愈白度為書遣之承宗懼求哀於田𢎞正請以二子為質及獻德棣二州輸租税請官吏𢎞正為之奏請上初不許𢎞正上表相繼上重違𢎞正意乃許之夏四月甲寅朔魏愽遣使送承宗子知感知信及德棣二州圖印至京師庚辰詔洗雪王承宗及成德將士復其官爵十五年冬十月王承宗薨其下祕不發喪子知感知信皆在朝諸將欲取帥於屬内諸州參謀崔燧以承宗祖母涼國夫人命告諭諸將及親兵立承宗之弟觀察支使承元承元時年二十將士拜之承元不受泣且拜諸將固請不已承元曰天子遣中使監軍有事當與之議及監軍至亦勸之承元曰諸公未忘先德不以承元年少欲使之攝軍務承元請盡節天子以遵忠烈王之志諸公肯從之乎衆許諾承元乃視事於都將聽事令左右不得謂已為留後委事於參佐密表請朝廷除帥庚辰監軍奏承宗疾亟弟承元權知留後并以承元表聞成德軍始奏王承宗薨乙酉徙田𢎞正為成德節度使以王承元為義節度使十一月癸夘遣諫議大夫鄭覃詣鎮州宣慰賜錢一百萬緍以賞將士王承元既請朝命諸將及鄰道爭以故事勸之承元皆不聽及移鎮義成將士諠譁不受命承元與柏耆召諸將以詔㫖諭之諸將號泣不從承元出家財以散之擇其有勞者擢之謂曰諸公以先代之故不欲承元去此意甚厚然使承元違天子之詔其罪大矣昔李師道之未敗也朝廷甞赦其罪師道欲行諸將固留之其後殺師道者亦諸將也諸將勿使承元為師道則幸矣因涕泣不自勝且拜之十將李寂等十餘人固留承元承元斬以狥軍中乃定丁未承元赴滑州將吏或以鎮州器用財貨行承元悉命留之憲宗平淮蔡吳元濟德宗討吳少誠附唐德宗貞元二年淮西兵馬使吳少誠殺陳仙竒自為留後少誠素狡險為李希烈所寵任故為之報仇七月己酉以䖍王諒為申光隨蔡節度大使以少誠為留後三年初李希烈據淮西選騎兵尤精者為左右門槍奉國四將步兵尤精者為左右克平十將淮西少馬精兵皆乘騾謂之騾軍陳仙竒舉淮西降纔數月詔發其兵於京西防秋仙竒遣都知兵馬使蘇浦悉將淮西精兵五千人以行㑹仙竒為吳少誠所殺少誠密遣人召門槍兵馬使吳灋超等使引兵歸浦不之知灋超等引步騎四千自鄜州叛歸上急遣中使敕陜虢觀察使李泌發兵防遏勿令濟河泌遣押牙唐英岸將兵邀擊之賊衆大敗擒其騾軍兵馬使張崇獻英岸追至永寧東賊皆潰入山谷吳灋超帥其衆趣長水都將燕子楚擊之斬灋超殺其士卒三分之二上命汴州刺史劉𤣥佐以詔書縁道誘之得百三十餘人至汴州盡殺之其潰兵在道復為村民所殺得至蔡者纔四十七人吳少誠以其少悉斬之以聞且遣使以幣謝李泌為其破叛卒也泌執張崇獻等六十餘人送京師詔悉腰斬於鄜州軍門以令防秋之衆夏五月申蔡留後吳少誠繕兵完城欲拒朝命判官鄭常大將楊冀謀逐之詐為手詔賜諸將申州刺史張伯元等事泄少誠殺常冀伯元大將宋旻曹濟犇長安十三年冬十月淮西節度使吳少誠擅開刀溝入汝上遣中使諭止之不從命兵部郎中盧羣往詰之少誠曰開此水大利於人羣曰君令臣行雖利人臣敢專乎公承天子之令而不從何以使下吏從公之令乎少誠遽為之罷役十四年秋九月彰義節度使吳少誠遣兵掠夀州霍山殺鎮遏使謝詳侵地五十餘里置兵鎮守十五年春三月甲寅吳少誠遣兵襲唐州殺監軍邵國朝鎮遏使張嘉瑜掠百姓千餘人而去秋八月丙申陳許節度使曲環薨乙未吳少誠遣兵掠臨潁陳州刺史上官涚知陳許留後遣大將王令忠將兵三千救之皆為少誠所虜丙午以説為陳許節度使少誠遂圍許州涗欲棄城走營田副使劉昌裔止之曰城中兵足以辦賊但閉城勿與戰不過數日賊氣自衰吾以全制其弊蔑不克矣少誠晝夜急攻昌裔募勇士千人鑿城出擊少誠大破之城由是全昌裔兖州人也少誠又寇西華陳許大將孟元陽拒却之陳許都知兵馬使安國寧與上官涗不叶謀翻城應少誠劉昌裔以計斬之召其麾下人給二縑伏兵要巷見持縑者悉斬之無得脫者丙辰詔削奪吳少誠官爵令諸道進兵討之辛酉以韓𢎞為宣武節度使先是少誠遣使與宣武節度使劉全諒約共攻陳許以陳州歸宣武使者數軰猶在館𢎞悉驅出斬之選卒三千㑹諸軍擊少誠於許下少誠由是失勢山南東道節度使于頔安黄節度使伊慎知夀州事王宗與上官涗韓𢎞進擊吳少誠屢破之十一月壬子于頔奏拔吳房朗山諸軍討吳少誠者既無統帥每出兵人自規利進退不一乙未諸軍自潰於小溵水委棄器械資糧皆為少誠所有於是始議置招討使十六年春正月乙巳恒冀易定陳許河陽四軍與吳少誠戰皆不利而退夏綏節度使韓全義本出神䇿軍中尉竇文場愛厚之薦於上使統諸軍討吳少誠二月乙酉以全義為蔡州四面行營招討使十七道兵皆受全義節度韓全義素無勇略專以巧佞貨賂結宦官得為大帥毎議軍事宦官為監軍者數十人坐帳中爭論紛然莫能決而罷天漸暑士卒久屯沮洳之地多病疫全義不存撫人有離心五月庚戌與吳少誠將吳秀吳少陽等戰于溵南廣利原鋒鏑纔交諸軍大潰秀等乗之全義退保五樓少陽滄州清池人也秋七月吳少誠進擊韓全義於五樓諸軍復大敗全義夜遁保溵水縣城九月癸丑吳少誠進逼溵水數里置營韓全義復帥諸軍退保陳州宣武河陽兵私歸本道獨陳許將孟元陽神䇿將蘇光榮帥所部留軍溵水全義以詐誘昭義將夏侯仲宣義成將時昻河陽將權文變河中將郭湘等斬之欲以威衆全義至陳州刺史劉昌裔登城謂之曰天子命公討蔡州今乃來此昌裔不敢納請舍于城外既而昌裔齎牛酒入全義營犒師全義驚喜心服之己未孟元陽等與少誠戰殺二千餘人冬十月吳少誠引兵還蔡州先是韋臯聞諸軍討少誠無功上言請以渾瑊賈耽為元帥統諸軍若重煩元老則臣請以精銳萬人下巴峽出荆楚以翦凶逆不然因其請罪而赦之罷兩河諸軍以休息公私亦䇿之次也若少誠一旦罪盈惡稔為麾下所殺則又當以其爵位授之是除一少誠生一少誠為患無窮矣賈耽言於上曰賊意葢亦望恩貸恐須開其生路上然之㑹少誠致書幣於監官軍者求昭洗監軍奏之戊子詔赦少誠及彰義將士復其官爵十七年春正月甲寅韓全義至長安竇文場為掩其敗迹上禮遇甚厚全義稱足疾不任朝謁遣司馬崔放入對放為全義引咎謝無功上曰全義為招討使能招來少誠其功大矣何必殺人然後為功邪閠月甲戌歸夏州順宗永貞元年春三月加彰義節度使吳少誠同平章事憲宗元和四年初吳少誠寵其大將吳少陽名以從弟署為軍職出入少誠家如至親累遷申州刺史少誠病不知人家僮鮮于熊兒詐以少誠命召少陽攝副使知軍州事少誠有子元慶少陽殺之十一月己巳少誠薨少陽自為留後五年上以河朔方用兵不能討吳少陽二月己未以少陽為淮西留後六年春正月甲辰以彰義留後吳少陽為節度使九年閠八月丙辰彰義節度使吳少陽薨少陽在蔡州隂聚亡命牧養馬騾時抄掠夀州茶山以實其軍其子攝蔡州刺史元濟匿喪以病聞自領軍務上自平蜀即欲取淮西淮南節度使李吉甫上言少陽軍中上下􅂝離請徙理夀州以經營之㑹朝廷方討王承宗未暇也及吉甫入相田𢎞正以魏愽歸附吉甫以為汝州扞蔽東都河陽宿兵本以制魏慱今𢎞正歸順則河陽為内鎮不應屯重兵以示猜阻辛酉以河陽節度使烏重𦙍為汝州刺史充河陽懐汝節度使徙理汝州己巳𢎞正檢校右僕射賜其軍錢二十萬緡𢎞正曰吾未若移河陽軍之為喜也九月庚辰以洺州刺史李光顔為陳州刺史充忠武軍都知兵馬使以泗州刺史令狐通為夀州防禦使通彰之子也丙戌以山南東道節度使袁滋為荆南節度使以荆南節度使嚴綬為山南東道節度使吳少陽判官蘇兆楊元卿大將侯惟清皆勸少陽入朝元濟惡之殺兆囚惟清元卿先奏事在長安具以淮西虚實及取元濟之䇿告李吉甫請討之時元濟猶匿喪元卿勸吉甫凢蔡使入奏者所在止之少陽死近四十日不為輟朝但易環蔡諸鎮將帥益兵為備元濟殺元卿妻及四男以圬射堋淮西宿將董重質吳少誠之壻也元濟以為謀主李吉甫言於上曰淮西非如河北四無黨援國家常宿數十萬兵以備之勞費不可支也失今不取後難圖矣上將討之張𢎞靖請先為少陽輟朝贈官遣使弔贈待其有不順之迹然後加兵上從之遣工部員外郎李君何弔祭元濟不迎敕使發兵四出屠舞陽焚葉掠魯山襄城闗東震駭君何不得入而還冬十月壬戌以忠武節度副使李光顔為節度使甲子以嚴綬為申光蔡招撫使督諸道兵招討吳元濟十年吳元濟縱兵侵掠及於東畿正月己亥制削元濟官爵命宣武等十六道進軍討之嚴綬擊淮西兵小勝不設備淮西兵夜還襲之二月甲辰綬敗于磁丘却五十餘里馳入唐州而守之夀州團練使令狐通為淮西兵所敗走保州城境上諸柵盡為淮西所屠癸丑以左金吾大將軍李文通代之貶通昭州司户詔鄂岳觀察使栁公綽以兵五千授安州刺史李聽使討吳元濟公綽曰朝廷以吾書生不知兵邪即奏請自行許之公綽至安州李聽屬橐鞬迎之公綽以鄂岳都知兵馬使先鋒行營兵馬都虞候二牒授之選卒六千以屬聽戒其部校曰行營之事一決都將聽感恩畏威如出麾下公綽號令整肅區處軍事諸將無不服士卒在行營者其家疾病死喪厚給之妻淫泆者沉之於江士卒皆喜曰中丞為我治家我何得不前死故毎戰皆捷公綽所乘馬踶殺圉人公綽命殺馬以祭之或曰圉人自不備耳此良馬可惜公綽曰材良性駑何足惜也竟殺之三月庚子李光顔奏破淮西兵於臨潁田𢎞正遣其子布將兵三千助嚴綬討吳元濟甲辰李光顔又奏破淮西兵於南頓吳元濟遣使求救於恒鄆王承宗李師道數上表請赦元濟上不從是時發諸道兵討元濟而不及淄青師道使大將將三千人趣夀春聲言助官軍討元濟實欲為元濟之援也師道素養刺客奸人數十人厚資給之其徒説師道曰用兵所急莫先糧儲今河隂院積江淮租賦請潜往焚之募東都惡少年數百刼都市焚宫闕則朝廷未暇討蔡先自救腹心此亦救蔡一竒也師道從之自是所在盜賊竊發辛亥暮盜數十人攻河隂轉運院殺傷十餘人燒錢帛三十餘萬緡匹糓二萬餘斛於是人情恇懼羣臣多請罷兵上不許諸軍討淮西久未有功五月上遣中丞裴度詣行營宣慰察用兵形勢度還言淮西必可取之狀且曰觀諸將惟李光顔勇而知義必能立功上悦考功郎中知制誥韓愈上言以為淮西三小州殘弊困劇之餘而當天下之全力其破敗可立而待然所未可知者在陛下㫁與不㫁耳因條陳用兵利害以為今諸道發兵各二三千人勢力單弱羈旅異鄉與賊不相諳委望風懾懼將帥以其客兵待之既薄使之又苦或分割隊伍兵將相失心孤意怯難以有功又其本軍各須資遣道路遼逺勞費倍多聞陳許安唐汝夀等州與賊連接處村落百姓悉有兵器習於戰鬬識賊深淺比來未有處分猶願自備衣糧保䕶鄉里若令召募立可成軍賊平之後易使歸農乞悉罷諸道軍募土人以代之又言蔡州士卒皆國家百姓若勢力窮不能為惡者不須過有殺戮丙申李光顔奏敗淮西兵於時曲淮西兵晨壓其壘而陳光顔不得出乃自毁其柵之左右出騎以擊之光顔自將數騎衝其陳出入數四賊皆識之矢集其身如蝟毛其子攬轡止之光顔舉刃叱去於是人爭致死淮西兵大潰殺數千人上以裴度為知人上自李吉甫薨悉以用兵事委武元衡李師道所養客説師道曰天子所以銳意誅蔡者元衡賛之也請密往刺之元衡死則它相不敢主其謀爭勸天子罷兵矣師道以為然即資給遣之王承宗遣牙將尹少卿奏事為吳元濟遊説少卿至中書辭指不遜元衡叱出之承宗又上書詆毁元衡六月癸夘天未明元衡入朝出所居靖安坊東門有賊自暗中突出射之從者皆散走賊執元衡馬行十餘步而殺之取其顱骨而去又入通化坊擊裴度傷其首墜溝中度氊㡌厚得不死傔人王義自後抱賊大呼賊㫁義臂而去京城大駭於是詔宰相出入加金吾騎士張弦露刃以衛之所過坊門呵索甚嚴朝士未曉不敢出門上或御殿久之朝班猶未齊賊遺紙於金吾及府縣曰毋急捕我我先殺汝故捕賊者不敢甚急兵部侍郎許孟容見上言自古未有宰相横尸路隅而盜不獲者此朝廷之辱也因涕泣又詣中書揮涕言請奏起裴中丞為相大索賊黨窮其姦源戊申詔中外所在搜捕獲賊者賞錢萬緡官五品敢庇匿者舉族誅之於是京城大索公卿家有複壁重橑者皆索之成徳軍進奏院有恒州卒張晏等數人行止無狀衆多疑之庚戌神䇿將軍王士則等告王承宗遣晏等殺元衡吏捕得晏等八人命京兆尹裴武監察御史陳中師鞫之癸亥詔以王承宗前後三表出示百寮議其罪裴度病瘡卧二旬詔以衛兵宿其第中使問訊不絶或請罷度官以安恒鄆之心上怒曰若罷度官是姧謀得成朝廷無復綱紀吾用度一人足破二賊甲子上召度入對乙丑以度為中書侍郎同平章事度上言淮西腹心之疾不得不除且朝廷業已討之兩河藩鎮跋扈者將視此為髙下不可中止上以為然悉以用兵事委度討賊愈急初德宗多猜忌朝士有相過從者金吾皆伺察以聞宰相不敢私第見客度奏今寇盜未平宰相宜招延四方賢才與參謀議始請於私第見客許之陳中師按張晏等具服殺武元衡張𢎞靖疑其不實屢言於上上不聽戊辰斬晏等五人殺其黨十四人李師道客竟潜匿亡去吕元膺捕賊獲中岳寺僧圓淨按驗其黨始知殺武元衡者乃是李師道事見憲宗討淄青秋八月乙丑李光顔敗於時曲初上以嚴綬在河東所遣禆將多立功故使鎮襄陽且督諸軍討吳元濟綬無它材能到軍之日傾府庫賚士卒累年之積一朝而盡又厚賂宦官以結聲援擁八州之衆萬餘人屯境上閉璧經年無尺寸功裴度屢言其軍無政九月癸酉以韓𢎞為淮西諸軍都統𢎞樂於自擅欲倚賊以自重不願淮西速平李光顔在諸將中戰最力𢎞欲結其歡心舉大梁城索得一美婦人教之歌舞絲竹飾以珠玉金翠直數百萬錢遣使遺之使者先致書光顔乃大饗將士使者進妓容色絶世一座盡驚光顔謂使者曰相公愍光顔覊旅賜以美妓荷德誠深然戰士數萬皆棄家逺來冐犯白刃光顔何忍獨以聲色自娱悦乎因流涕座者皆泣即於席上厚以繒帛贈使者并妓返之曰為光顔多謝相公光顔以身許國誓不與逆賊同戴日月死無貳矣冬十月以户部侍郎李遜為襄復郢均房節度使右羽林大將軍髙霞寓為唐隨鄧節度使朝議以唐與蔡接故使霞寓專事攻戰而遜調五州之賦以餉之十一月夀州刺史李文通奏敗淮西兵壬申韓𢎞請命衆軍合攻淮西從之李光顔烏重𦙍敗淮西兵於小溵水拔其城乙亥以嚴綬為太子少保盜焚襄州佛寺軍儲盡徙京城積草於四郊以備火丁丑李文通敗淮西兵於固始戊寅盜焚獻陵寢宫永巷初吳少陽聞信州人吳武陵名邀以為賔友武陵不荅及元濟反武陵以書諭之曰足下勿謂部曲不我欺人情與足下一也足下反天子人亦反足下易地而論則其情可知矣十一年春三月夀州團練使李文通奏敗淮西兵於固始拔􅌯山己夘唐鄧節度使髙霞寓奏敗淮西兵於朗山斬首千餘級焚二柵夏四月庚子李光顔烏重𦙍奏敗淮西兵於陵雲柵斬首五千級五月壬申李光顔烏重𦙍奏敗淮西兵於陵雲柵斬首二千餘級六月甲辰髙霞寓大敗於鐵城僅以身免時諸將討淮西者勝則虚張殺獲敗則匿之至是大敗不可掩始上聞中外駭愕宰相入見將勸上罷兵上曰勝負兵家之常今但論用兵方畧察將帥之不勝任者易之兵食不足者助之耳豈得以一將失利遽議罷兵邪於是獨用裴度之言它人言罷兵者亦稍息矣己酉霞寓退保唐州上責髙霞寓之敗霞寓稱李遜應接不至秋七月丁丑貶霞寓為歸州刺史遜亦左遷恩王傳以河南尹鄭權為山南東道節度使袁滋為彰義節度申光蔡唐隋鄧觀察使以唐州為理所壬午宣武軍奏破郾城之衆二萬殺二千餘人捕虜千餘人九月乙酉李光顔烏重𦙍奏拔吳元濟陵雲柵丁亥光顔又奏拔石越二柵夀州奏敗殷城之衆拔六柵討淮西諸軍近九萬上怒諸將久無功冬十一月辛巳命知樞密梁守謙宣慰因留監其軍授以空名告身五百通及金帛以勸死士庚寅先加李光顔等檢校官而詔書切責示以無功必罰辛夘李文通奏敗淮西兵於固始斬首千餘級十二月袁滋至唐州去斥候止其兵不使犯吳元濟境元濟圍其新興柵滋卑辭以請之元濟由是不復以滋為意朝廷知之甲寅以太子詹事李愬為唐隨鄧節度使愬聽之兄也初置淮潁水運使楊子院米自淮隂泝淮入潁至項城入溵輸于郾城以饋討淮西諸軍省汴運之費七萬餘緡十二年春正月甲申貶袁滋為撫州刺史李愬至唐州軍中承喪敗之餘士卒皆憚戰愬知之有出迓者愬謂之曰天子知愬柔懦能忍恥故使來拊循爾曹至於戰攻進取非吾事也衆信而安之愬親行視士卒傷病者存恤之不事威嚴或以軍政不肅為言愬曰吾非不知也袁尚書專以恩惠懐賊賊易之聞吾至必增備吾故示之以不肅彼必以吾為懦而懈惰然後可圖也淮西人自以甞敗髙袁二帥輕愬名位素微遂不為備二月李愬謀襲蔡州表請益兵詔以昭義河中鄜坊步騎二千給之丁酉愬遣十將馬少良將十餘騎巡邏遇吳元濟捉生虞候丁士良與戰擒之士良元濟驍將常為東邊患衆請刳其心愬許之既而召詰之士良無懼色愬曰真丈夫也命釋其縛士良乃自言本非淮西士貞元中𨽻安州與吳氏戰為其所擒自分死矣吳氏釋我而用之我因吳氏而再生故為吳氏父子竭力昨日力屈復為公所擒亦分死矣今公又生之請盡死以報德愬乃給其衣服器械署為捉生將己亥淮西行營奏克蔡州古葛伯城丁士良言於李愬曰吳秀琳擁三千之衆據文城柵為賊左臂官軍不敢近者有陳光洽為之謀主也光洽勇而輕好自出戰請為公先擒光洽則秀琳自降矣戊申士良擒光洽以歸淮西被兵數年竭倉廪以奉戰士民多無食采菱芡魚鱉鳥獸食之亦盡相帥歸官軍者前後五千餘户賊亦患其耗糧食不復禁庚申敕置行縣以處之為擇縣令使之撫養并置兵以衛之三月乙丑李愬自唐州徙屯宜陽柵吳秀琳以文城柵降于李愬戊子愬引兵至文城西五里遣唐州刺史李進誠將甲士八千至城下召秀琳城中矢石如雨衆不得前進誠還報賊偽降未可信也愬曰此待我至耳即前至城下秀琳束兵投身馬足下愬撫其背慰勞之降其衆三千人秀琳將李憲有材勇愬更其名曰忠義而用之悉遷婦女於唐州入據其城於是唐鄧軍氣復振人有欲戰之志賊中降者相繼於道随其所便而置之聞有父母者給粟帛遣之曰汝曹皆王人勿棄親戚衆皆感泣官軍與淮西兵夾溵水而軍諸軍相顧望無敢度溵水者陳許兵馬使王沛先引兵五千度溵水據要地為城於是河陽宣武河東魏愽等軍相繼皆度進逼郾城丁亥李光顔敗淮西兵三萬於郾城走其將張伯良殺士卒什二三己丑李愬遣山河十將董少玢等分兵攻諸柵其日少玢下馬鞍山拔路口柵夏四月辛夘山河十將馬少良下嵖岈山擒淮西將栁子野吳元濟以蔡人董昌齡為郾城令質其母楊氏楊氏謂昌齡曰順死賢於逆生汝去逆而吾死乃孝子也從逆而吾生是戮吾也㑹官軍圍青陵絶郾城歸路郾城守將鄧懐金謀於昌齡昌齡勸之歸國懐金乃請降於李光顔曰城人之父母妻子皆在蔡州請公來攻城吾舉鋒求救兵至公逆擊之蔡兵必敗然後吾降則父母妻子庶免矣光顔從之乙未昌齡懐金舉城降光顔引兵入據之吳元濟聞郾城不守甚懼時董重質將騾軍守洄曲元濟悉發親近及守城卒詣重質以拒之李愬山河十將媯雅田智榮下冶爐城丙申十將閻士榮下白狗汶港二柵癸夘媯雅田智榮破西平丙午逰奕兵馬使王義破楚城五月辛酉李愬遣栁子野李中義襲朗山擒其將梁希果丁丑李愬遣方城鎮遏使李榮宗擊青喜城拔之愬毎得降卒必親引問委曲由是賊中險易逺近虚實盡知之愬厚待吳秀琳與之謀取蔡秀琳曰公欲取蔡非得李祐不可如秀琳無能為也祐者淮西騎將有勇略守興橋柵常陵暴官軍庚辰祐帥士卒刈麥於張柴村愬召廂虞候史用誠戒之曰爾以三百騎伏彼林中又使人搖幟於前若將焚其麥積者祐素易官軍必輕騎來逐之爾乃發騎掩之必擒之用誠如言而徃生擒祐以歸將士以祐曏日多殺官軍爭請殺之愬不許釋縛待以客禮時愬欲襲蔡而更密其謀獨召祐及李忠義屏人語或至夜分它人莫得預聞諸將恐祐為變多諫愬愬待祐益厚士卒亦不悦諸軍日有牒稱祐為賊内應且言得賊牒者具言其事愬恐謗先達於上已不及救乃持祐泣曰豈天不欲平此賊邪何吾二人相知之深而不能勝衆口也因謂衆曰諸君既以祐為疑請令歸死於天子乃械祐送京師先密表其狀且曰若諜者屠其家詔除其令使厚還愬愬見之喜執其手曰爾之得全社稷之靈也乃署散兵馬使令佩刀巡警出入帳中或與之同宿密語不寐達曙有竊聽於帳外者但聞祐感泣聲時唐隨牙隊三千人號六院兵馬皆山南東道之精銳也愬又以祐為六院兵馬使舊軍令舍賊殺祐則無以成功愬釋之以待之諜反以情告愬益知賊中虚實乙酉愬遣兵攻朗山淮西兵救之官軍不利衆皆悵恨愬獨歡然曰此吾計也乃募敢死士三千人號曰突將朝夕自教習之使常為行備欲以襲蔡㑹久雨所在積水未果吳元濟見其下數叛兵勢日蹙六月壬戌上表謝罪願束身自歸上遣中使賜詔許以不死而為左右及大將董重質所制不得出諸軍討淮西四年不克饋運疲弊民至有以驢耕者上亦病之以問宰相李逢吉等競言師老財竭意欲罷兵裴度獨無言上問之對曰臣請自往督戰秋七月乙夘上復謂度曰卿真能為朕行乎對曰臣誓不與此賊俱生臣比觀吳元濟表勢實窘蹙但諸將心不一不併力迫之故未降耳若臣自詣行營諸將恐臣奪其功必爭進破賊矣上悦丙戌以度為門下侍郎同平章事兼彰義節度使仍充淮西宣慰招討處置使又以户部侍郎崔羣為中書侍郎同平章事制下度以韓𢎞已為都統不欲更為招討請但稱宣慰處置使仍奏刑部侍郎馬總為宣慰副使右庶子韓愈為彰義行軍司馬判官書記皆朝廷之選上皆從之度將行言於上曰臣若滅賊則朝天有期賊在則歸闕無日上為之流涕八月庚申度赴淮西上御通化門送之右神武將軍張茂和茂昭弟也甞以膽略自􅃷於度度表為都押牙茂和辭以疾度奏請斬之上曰此忠順之門為卿逺貶辛酉貶茂和永州司馬以嘉王傅髙承簡為都押牙承簡崇文之子也李逢吉不欲討蔡翰林學士令狐楚與逢吉善度恐其合中外之勢以沮軍事乃請改制書數字且言其草制失辭壬戌罷楚為中書舍人李光顔烏重𦙍與淮西戰癸亥敗于賈店裴度過襄城南白草原淮西人以驍騎七百邀之鎮將楚丘曹華知而為備擊却之度雖辭招討名實行元帥事以郾城為治所甲申至郾城先是諸道皆有中使監陳進退不由主將勝則先使獻捷不利則陵挫百端度悉奏去之諸將始得專其軍事戰多有功九月庚子淮西兵寇溵水鎮殺三將焚芻藁而去甲寅李愬將攻吳房諸將曰今日往亡愬曰吾兵少不足戰宜出其不意彼以往亡不吾虞正可擊也遂往克其外城斬首千餘級餘衆保子城不敢出愬引兵還以誘之淮西將孫獻忠果以驍騎五百追擊其背衆驚將走愬下馬據胡牀令曰敢退者斬返斾力戰獻忠死淮西兵乃退或勸愬乗勝攻其子城可拔也愬曰非吾計也引兵還營李祐言於李愬曰蔡之精兵皆在洄曲及四境拒守守州城者皆羸老之卒可以乘虚直抵其城比賊將聞之元濟已成擒矣愬然之冬十月甲子遣掌書記鄭澥至郾城密白裴度度曰兵非出竒不勝常侍良圖也裴度帥僚佐觀築城於沱口董重質帥騎出五溝邀之大呼而進注弩挺刃勢將及度李光顔與田布力戰拒之度僅得入城賊退布扼其溝中歸路賊下馬踰溝墜壓死者千餘人辛未李愬命馬步都虞候隨州刺史史旻等留鎮文城命李祐李忠義帥突將三千為前驅自與監軍將三千人為中軍命李進誠將三千人殿其後軍出不知所之愬曰但東行行六十里夜至張柴村盡殺其戍卒及􅇏子據其柵命士卒少休食乾糒整羈靮留義成軍五百人鎮之以斷朗山救兵命丁士良將五百人㫁洄曲及諸道橋梁復夜引兵出門諸將請所之愬曰入蔡州取吳元濟諸將皆失色監軍哭曰果落李祐姦計時大風雪旌旗裂人馬凍死者相望天隂黒自張柴村以東道路皆官軍所未甞行人人自以為必死然畏愬莫敢違夜半雪愈甚行七十里至州城近城有鵝鴨池愬令驚之以混軍聲自吳少誠拒命官軍不至蔡州城下三十餘年故蔡人不為備壬申四鼓愬至城下無一人知者李祐李忠義钁其城為坎以先登壯士從之守門卒方熟寐盡殺之而留擊柝者使擊柝如故遂開門納衆及裏城亦然城中皆不之覺鷄鳴雪止愬入居元濟外宅或告元濟曰官軍至矣元濟尙寢笑曰俘囚為盜耳曉當盡戮之又有告者曰城陷矣元濟曰此必洄曲子弟就吾求寒衣也起聽於廷聞愬軍號令曰常侍傳語應者近萬人元濟始懼曰何等常侍能至於此乃帥左右登牙城拒戰時董重質擁精兵萬餘人據洄曲愬曰元濟所望者重質之救耳乃訪重質家厚撫之遣其子傳道持書諭重質重質遂單騎詣愬降愬遣李進誠攻牙城毁其外門得甲庫取其器械癸酉復攻之燒其南門民爭負薪芻助之城上矢如蝟毛晡時門壊元濟於城上請罪進誠梯而下之甲戌愬以檻車送元濟詣京師且告于裴度是日申光二州及諸鎮兵二萬餘人相繼來降自元濟就擒愬不戮一人凡元濟官吏帳下廚廐之卒皆復其職使之不疑然後屯於鞠場以待裴度己邜淮西行營奏獲吳元濟光禄少卿楊元卿言於上曰淮西大有珍寶臣能知之往取必得上曰朕討淮西為人除害珍寶非所求也董重質之去洄曲軍也李光顔馳入其壁悉降其衆庚辰裴度遣馬總先入蔡州慰撫辛巳度建彰義軍節將降卒萬餘人入城李愬具櫜鞬出迎拜於路左度將避之愬曰蔡人頑悖不識上下之分數十年矣願公因而示之使知朝廷之尊度乃受之李愬還軍文城諸將請曰始公敗於朗山而不憂勝於吳房而不取冒大風甚雪而不止孤軍深入而不懼然卒以成功皆衆人所不諭也敢問其故愬曰朗山不利則賊輕我不為備矣取吳房則其衆犇蔡併力固守故存之以分其兵風雪隂晦則烽火不接不知吾至孤軍深入則人皆致死戰自倍矣夫視逺者不顧近慮大者不計細若矜小勝恤小敗先自撓矣何暇立功乎衆皆服愬儉於奉已而豐於待士知賢不疑見可能㫁此其所以成功也裴度以蔡卒為牙兵或諫曰蔡人反仄者尚多不可不備度笑曰吾為彰義節度使元惡既擒蔡人則吾人也又何疑焉蔡人聞之感泣先是吳氏父子阻兵禁人偶語於塗夜不然燭有以酒食相過從者罪死度既視事下令惟禁盜賊鬬殺餘皆不問往來者不限晝夜蔡人始知有生民之樂甲申詔韓𢎞裴度條列平蔡將士功狀及蔡之將士降者皆差第以聞淮西州縣百姓給復二年近賊四州免來年夏税官軍戰亡者皆為收葬給其家衣糧五年其因戰傷殘廢者勿停衣糧十一月丙戌朔上御興安門受俘遂以吳元濟獻廟社斬于獨栁之下初淮西之人刼於李希烈吳少誠之威虐不能自拔久而老者衰幼者壯安於悖逆不復知有朝廷矣自少誠以來遣諸將出兵皆不束以灋制聽各以便宜自戰故人人得盡其才韓全義之敗于溵水也於其帳中得朝貴所與問訊書少誠束而示衆曰此皆公卿屬全義書云破蔡州日乞一將士妻女為婢妾由是衆皆憤怒以死為賊用雖居中土其風俗獷戾過於夷貊故以三州之衆舉天下之兵環而攻之四年然後克之戊子以李愬為山南東道節度使賜爵涼國公加韓𢎞兼侍中李光顔烏重𦙍等各遷官有差辛丑以唐隨兵馬使李祐為神武將軍知軍事裴度以馬總為彰義留後癸丑發蔡州上封二劒以授梁守謙使誅吳元濟舊將度至郾城遇之復與俱入蔡州量罪施刑不盡如詔㫖仍上疏言之十二月壬戌賜裴度爵晉國公復入知政事以馬總為淮西節度使庚辰貶淮西降將董重質為春州司户重質為吳元濟謀主屢破官軍上欲殺之李愬奏先許重質以不死通鑑紀事本末卷三十四上欽定四庫全書通鑑紀亊本末卷三十四下宋袁樞撰憲宗討淄青李師道唐憲宗元和元年初李師古有異母弟曰師道常踈斥在外不免貧窶師古私謂所親曰吾非不友扵師道也吾年十五擁節旄自恨不知稼穡之艱難况師道復減吾數嵗吾欲使之知衣食之所自來且以州縣之務付之計諸公必不察也及師古疾篤師道時知宻州事好畫及觱篥師古謂判官髙沐李公度曰迨吾之未亂也欲有問扵子我死子欲奉誰為帥乎二人相顧未對師古曰豈非師道乎人情誰肯薄骨肉而厚他人顧置帥不善則非徒敗軍政也且覆吾族師道為公侯子孫不務訓兵理人専習小人賤事以為已能果堪為帥乎幸諸公審圖之閏六月壬戌朔師古薨沐公度秘不發䘮潜逆師道扵宻州奉以為節度副使秋八月李師道總軍務乆之朝命未至師道謀扵將佐或請出兵掠四境髙沐固止之請輸兩稅申官吏行鹽法遣使相繼奉表詣京師杜黄裳請乘其未定而分之上以劉闢未平己巳以師道為平盧留後知鄆州事冬十月壬午以平盧留後李師道為節度使十年官軍之討吳元濟也李師道使大將將二千趣夀春欲為元濟之援又使盜攻河隂轉運院燒錢帛三十餘萬緡匹榖二萬餘斛事見憲宗平淮蔡夏六月癸夘盜殺武元衡秋八月李師道置留後院扵東都本道人雜沓往來吏不敢詰時淮西兵犯東畿防禦兵悉屯伊闕師道潜内兵扵院中至數十百人謀焚宫闕縱兵殺掠已烹牛饗士眀日將發其小卒詣留守吕元膺吿變元膺亟追伊闕兵圍之賊衆突出防禦兵踵其後不敢迫賊出長夏門望山而遁是時都城震駭留守兵寡弱元膺坐皇城門指使部分意氣自若都人賴以安東都西南接鄧虢皆髙山深林民不耕種専以射獵為生人皆趫勇謂之山棚元膺設重購以捕賊數日有山棚鬻鹿賊遇而奪之山棚走召其儕類且引官軍共圍之谷中盡獲之按驗得其魁乃中岳寺僧圓淨故甞為史思明將勇悍過人為師道謀多買田扵伊闕陸渾之間以舎山棚而衣食之有訾嘉珍門察者潜部分以屬圓淨圓淨以師道錢千萬陽為治佛光寺結黨定謀約令嘉珍等竊發城中圓淨舉火扵山中集二縣山棚入城助之圓淨時年八十餘捕者既得之奮鎚擊其脛不能折圓淨罵曰䑕子折人脛且不能敢稱健兒乃自置其脛教使折之臨刑歎曰誤我事不得使洛城流血黨與死者凡數千人留守防禦將二人及驛卒八人皆受其職名為之耳目元膺鞫訾嘉珍門察始知殺武元衡者乃師道也元膺宻以聞以檻車送二人詣京師上業已討王承宗不復窮治元膺上言近日藩鎮跋扈不臣有可容貸者至扵師道謀屠都城燒宫闕悖逆尤甚不可不誅上以為然而方討吴元濟絶王承宗故未暇治師道也冬十一月丁酉武寧節度使李愿奏敗李師道之衆時師道數遣兵攻徐州敗蕭沛數縣愿悉以步騎委都押牙温人王智興擊破之十二月甲辰智興又破師道之衆斬首二千餘級逐北至平隂而還愿晟之子也十一年冬十一月李師道聞李光顔等拔吳元濟淩雲柵而懼詐請輸欵上以力未能討加師道檢校司空十二年官軍之攻吳元濟也李師道募人通使扵蔡察其形勢牙前虞候劉晏平應募出汴宋間潜行至蔡元濟大喜厚禮而遣之晏平還至鄆師道屏人而問之晏平曰元濟暴兵數萬扵外阽危如此而日與僕妾逰戲愽奕扵内晏然曾無憂色以愚觀之殆必亡不久矣師道素倚淮西為援聞之驚怒尋誣以它過杖殺之十三年初李師道謀逆命判官髙沐與同僚郭昈李公度屢諫之判官李文㑹孔目官林英素為師道所親信涕泣言扵師道曰文會等盡誠為尚書憂家事反為髙沐等所疾尚書柰何不憂十二州之土地以成沭等之功名乎師道由是踈沐等出沐知萊州會林英入奏事令進奏吏宻申師道云沐潜輸欵扵朝廷文會從而構之師道殺沐并囚郭昈凡軍中勸師道效順者文會皆指為髙沐之黨而囚之及淮西平師道憂懼不知所為李公度及牙將李英曇因其懼而說之使納質獻地以自贖師道從之遣使奉表請使長子入侍并獻沂宻海三州上許之春正月遣左常侍李遜詣鄆州宣慰李師道暗弱軍府大事獨與妻魏氏奴胡惟堪楊自温婢蒲氏袁氏及孔目官王再升謀之大將及幕僚莫得預焉魏氏不欲其子入質與蒲氏袁氏言扵師道曰自先司徒以來有此十二州柰何無故割而獻之今計境内之兵不下數十萬不獻三州不過以兵相加若力戰不勝獻之未晩師道乃大悔欲殺李公度幕僚賈直言謂其用事奴曰今大禍將至豈非髙沐寃氣所為若又殺公度軍府其危哉乃囚之遷李英曇扵萊州未至縊殺之李遜至鄆州師道大陳兵迎之遜盛氣正色為陳禍福責其決語欲白天子師道退與其黨謀之皆曰第許之它日止煩一表解紛耳師道乃謝曰曏以父子之私且迫扵將士之情故遷延未遣今重煩朝使豈敢復有二三遜察師道非實誠歸言扵上曰師道頑愚反覆恐必須用兵既而師道表言軍情不聴納質割地上怒決意討之賈直言冒刃諫師道者二輿櫬諫者一又畫縛載檻車妻子係纍者以獻師道怒囚之五月丙申以忠武節度使李光顔為義成節度使謀討師道也以河陽都知兵馬使曺華為棣州刺史詔加横海節度副使六月丁丑復以烏重𦙍領懐州刺史鎮河陽秋七月癸未朔徙李愬為武寧節度使乙酉下制罪狀李師道令宣武魏愽義成武寧横海兵共討之吳元濟既平韓𢎞懼九月自將兵擊李師道圍曺州冬十一月壬寅以河陽節度使烏重𦙍為横海節度使丁未以華州刺史令狐楚為河陽節度使重𦙍以河陽精兵三千赴鎮河陽兵不樂去鄉里中道潰歸又不敢入城屯于城北將大掠令狐楚適至單騎出慰撫之與俱歸先是田𢎞正請自黎陽度河會義成節度使李光顔討李師道裴度曰魏􅀶軍既度河不可復退立須進擊方有成功既至滑州即仰給度支徒有供餉之勞更生觀望之勢又或與李光顔互相疑阻益至遷延與其度河而不進不若養威扵河北宜且使之厲兵秣馬俟霜降水落自楊劉度河直指鄆州得至陽榖置營則兵勢自盛賊衆揺心矣上從之是月𢎞正將魏􅀶全師自楊劉度河距鄆州四十里築壘賊中大震十二月戊寅魏愽義成軍送所獲李師道都知兵馬使夏侯澄等四十七人上皆釋弗誅各付所獲行營驅使曰若有父母欲歸者優給遣之朕所誅者師道而已扵是賊中聞之降者相繼初李文㑹與兄元規皆在李師古幕下師古薨師道立元規辭去文會屬師道親黨請留元規將行謂文會曰我去身退而安全汝留必驟貴而受禍及官軍四臨平盧兵勢日蹙將士喧然皆曰髙沐郭昈李存為司空忠謀李文會奸佞殺沐囚昈存以致此禍師道不得已出文會攝登州刺史召昈存還幕府武寧節度使李愬與平盧兵十一戰皆㨗己夘晦進攻金鄉克之李師道性懦怯自官軍致討聞小敗及失城邑輒憂悸成疾由是左右皆蔽匿不以實吿金鄉兖州之要地既失之其刺史遣驛騎告急左右不為通師道至死竟不知也十四年春正月辛巳韓𢎞拔考城殺二千餘人丙戌師道所署沐陽令梁洞以縣降于楚州刺史李聽壬辰武寧節度使李愬拔魚臺丙申田𢎞正奏敗淄青兵扵東阿殺萬餘人丙午田𢎞正奏敗平盧兵扵陽糓二月李聽襲海州克東海朐山懐仁等縣李愬敗平盧兵扵沂州拔丞縣李師道聞官軍侵逼發民治鄆州城塹修守備役及婦人民益懼且怨都知兵馬使劉悟正臣之孫也師道使之將兵萬餘人屯陽榖以拒官軍悟務為寛恵使士卒人人自便軍中號曰劉父及田𢎞正度河悟軍無備戰又數敗或謂師道曰劉悟不修軍法専收衆心恐有它志宜早圖之師道召悟計事欲殺之或諫曰今官軍四合悟無逆状用一人言殺之諸將誰肯為用是自脫其爪牙也師道留悟旬日復遣之厚贈金帛以安其意悟知之還營隂為之備師道以悟將兵在外署悟子從諫門下别奏從諫與師道諸奴日逰戱頗得其隂謀宻䟽以白父又有謂師道者曰劉悟終為患不如早除之丙辰師道潜遣二使齎帖授行營兵馬副使張暹令斬悟首獻之勒暹權領行營時悟方據髙丘張幕置酒去營二三里二使至營宻以帖授暹暹素與悟善陽與使者謀曰悟自使府還頗為備不可怱怱暹請先往白之云司空遣使存問將士兼有賜物請都頭速歸同受傳語如此則彼不疑乃可圖也使者然之暹懐帖走詣悟屏人示之悟潜遣人先執二使殺之時已向暮悟按轡徐行還營坐帳下嚴兵自衛召諸將厲色謂之曰悟與公等不顧死亡以抗官軍誠無負扵司空今司空信讒言來取悟首悟死諸公其次矣且天子所欲誅者獨司空一人今軍勢日蹙吾曺何為隨之族滅欲與諸公巻旗束甲還入鄆州奉行天子之命豈徒免危亡富貴可圖也諸公以為何如兵馬使趙垂棘立扵衆首良久對曰如此事果濟否悟應聲罵曰汝與司空合謀邪立斬之徧問其次有遲疑未言者悉斬之并斬軍中素為衆所惡者凡三十餘尸扵帳前餘皆股栗曰惟都頭命願盡死乃令士卒曰入鄆人賞錢百緡惟不得近軍帑其使宅及逆黨家財任自掠取有仇者報之使士卒皆飽食執兵夜半聴鼓三聲絶即行人衘放馬縛口遇行人執留之人無知者距城數里天未眀悟駐軍使聽城上柝聲絶使十人前行宣言劉都頭奉帖追入城門者請俟寫簡白使十人拔刃擬之皆竄匿悟引大軍繼至城中譟譁動地比至子城已洞開惟牙城拒守尋縱火斧其門而入牙中兵不過數百始猶有發弓矢者俄知不支皆投扵地悟勒兵升聽事使捕索師道師道與二子伏厠牀下索得之悟命置牙門外隙地使人謂曰悟奉宻詔送司空歸闕然司空亦何顔復見天子師道猶有幸生之意其子𢎞方仰曰事已至此速死為幸尋皆斬之自夘至午悟乃命兩都虞候廵坊市禁掠者即時皆定大集兵民扵毬場親乘馬廵繞慰安之斬賛師道逆謀者二十餘家文武將吏且懼且喜皆入賀悟見李公度執手歔欷出賈直言扵獄置之幕府悟之自陽糓還兵趨鄆也潜使人以其謀告田𢎞正曰事成當舉烽相白萬一城中有備不能入願公引兵為助功成之日皆歸扵公悟何敢有之且使𢎞正進據已營𢎞正見烽知得城遣使往賀悟函師道父子三首遣使送𢎞正營𢎞正大喜露布以聞淄青等十二州皆平𢎞正初得師道首疑其非真召夏侯澄使識之澄熟視其面長號隕絶乆之乃抱其首䑛其目中塵垢復慟哭𢎞正為之改容義而不責壬戌田𢎞正㨗奏至乙丑命户部侍郎楊於陵為淄青宣撫使己巳李師道首函至自廣徳以來垂六十年藩鎮跋扈河南北三十餘州自除官吏不供貢賦至是盡遵朝廷約束上命楊於陵分李師道地於陵按圖籍視土地逺邇計士馬衆寡校倉庫虚實分為三道使之適均以鄆曹濮為一道淄青齊登萊為一道兖海沂宻為一道上從之劉悟以初討李師道詔云部將有能殺師道以衆降者師道官爵悉以與之意謂盡得十二州之地遂補署文武將佐更易州縣長吏謂其下曰軍府之政一切循舊自今但與諸公抱子弄孫夫復何憂上欲移悟它鎮恐悟不受代復須用兵宻詔田𢎞正察之𢎞正日遣使者詣悟託言修好實觀其所為悟多力好手搏得鄆州三日則教軍中壯士手搏與魏愽使者庭觀之自揺肩攘臂離坐以助其勢𢎞正聞之笑曰是聞除改登即行矣何能為哉庚午以悟為義成節度使悟聞制下手足失墜明日遂行𢎞正將數道兵已至城西二里與悟相見扵客亭即受旌節馳詣滑州辟李公度李存郭昈賈直言以自随悟素與李文㑹善既得鄆州使召之未至聞將移鎮昈存謀曰文會佞人敗亂淄青一道滅李司空之族萬人所共讐也不乗此際誅之田相公至務施寛大將何以雪三齊之憤怨乎乃詐為悟帖遣使即文會所至取其首以來使者遇文會扵豐齊驛斬之比還悟及昈存已去無所復命矣文會二子一亡去一死扵獄家貲悉為人所掠田宅没官詔以淄青行營副使張暹為戎州刺史癸酉加田𢎞正檢校司徒同平章事先是李師道將敗數月聞風動鳥飛皆疑有變禁鄆人親識宴聚及道路偶語犯者有刑𢎞正既入鄆悉除苛禁縱人逰樂寒食七晝夜不禁行人或諫曰鄆人乆為寇敵今雖平人心未安不可不備𢎞正曰今為暴者既除宜施以寛恵若復為嚴察是以桀易桀也庸何愈焉先是賊數遣人入闗截陵㦸焚倉場流矢飛書以震駭京師沮撓官軍有司督察甚嚴潼闗吏至發人囊箧以索之然終不能絶及田𢎞正入鄆閱李師道簿書有賞殺武元衡人王士元等及賞潼闗蒲津吏卒案乃知曏者皆吏卒受賂扵賊容其姦也裴度纂述蔡鄆用兵以來上之憂勤機略因侍宴獻之請内印出付史官上曰如此似出朕志非所欲也弗許三月戊子以華州刺史馬總為鄆曹濮等州節度使己丑以義成節度使薛平為平盧節度淄青齊登萊等州觀察使以淄青四面行營供軍使王遂為沂海兖宻等州觀察使横海節度使烏重𦙍奏河朔藩鎮所以能旅拒朝命六十餘年者由諸州縣各置鎮將領事収刺史縣令之權自作威福曏使刺史各得行其職則雖有奸雄如安史必不能以一州獨反也臣所領徳棣景三州已舉牒各還刺史職事應在州兵並令刺史領之夏四月丙寅詔諸道節度都團練都防禦經略等使所統支郡兵馬並令刺史領之自至徳以來節度使權重所統諸州各置鎮兵以大將主之暴横為患故重𦙍論之其後河北諸鎮惟横海最為順命由重𦙍處之得宜故也秋七月丁丑朔田𢎞正送殺武元衡賊王士元等十六人詔仗内京兆府御史臺徧鞫之皆欵服京兆尹崔元略以元衡物色詢之則多異同元略問其故對曰恒鄆同謀遣客刺元衡而士元等後期聞恒人事成遂竊以為己功逺報受賞耳今自度為罪均終不免死故承之上亦不欲復辨正悉殺之戊寅宣武節度使韓𢎞始入朝上待之甚厚𢎞獻馬三千絹五千雜繒三萬金銀器千而汴之庫廐尚有錢百餘萬緡絹百餘萬匹馬七千匹糧三百萬斛沂海兖宻觀察使王遂本錢榖吏性狷急無逺識時軍府草創人情未安遂専以嚴酷為治所用杖絶大扵常行者每詈將卒輙曰反虜又盛夏役士卒營府舎督責峻急將卒憤怨辛夘役卒王弁與其徒四人浴扵沂水宻謀作亂曰今服役觸罪亦死奮命立事亦死死扵立事不猶愈乎眀日常侍與監軍副使有宴軍將皆在告直兵多休息吾屬乘此際出其不意取之可以萬全四人皆以為然約事成推弁為留後壬辰遂方宴飲日過中弁等五人突入扵直房前取弓刀徑前射副使張敦實殺之遂與監軍狼狽起走弁執遂數之以盛暑興役用刑刻暴立斬之傳聲勿驚監軍弁即自稱留後朝廷聞沂州軍亂甲辰以棣州刺史曺華為沂海兖宻觀察使八月朝廷議興兵討王弁恐青鄆相扇繼變乃除弁開州刺史遣中使賜以告身中使紿之曰開州計已有人迎候道路留後宜速發弁即日發沂州導從尚百餘人入徐州境所在減之其衆亦稍逃散遂加以杻械乘驢入闗九月戊寅腰斬東市先是三分鄆兵以隷三鎮及王遂死朝廷以為師道餘黨凶態未除命曹華引棣州兵赴鎮以討之沂州將士迎候者華皆以好言撫之使先入城慰安其餘衆皆不疑華視事三日大饗將士伏甲士千人扵幕下乃集衆而諭之曰天子以鄆人有遷徙之勞特加優給宜令鄆人處右沂人處左既定令沂人皆出因闔門謂鄆人曰王常侍以天子之命為帥扵此將士何得輒害之語未畢伏者出圍而殺之死者千二百人無一得脫者門屏間赤霧髙丈餘乆之方散臣光曰春秋書楚子䖍誘蔡侯般殺之于申彼列國也孔子猶深貶之惡其誘討也况為天子而誘匹夫乎王遂以聚斂之才殿新造之邦用苛虐致亂王弁庸夫乘釁竊發茍沂帥得人戮之易扵犬豕耳何必以天子詔書為誘人之餌乎且作亂者五人耳乃使曺華設詐屠千餘人不亦濫乎然則自今士卒孰不猜其將帥將帥何以令其士卒上下盻盻如寇讐聚處得間則更相魚肉惟先發者為雄耳禍亂何時而弭哉惜夫憲宗削平僣亂㡬致治平其美業所以不終由茍徇近功不敦大信故也河朔再叛唐憲宗元和五年劉濟之討王承宗也以長子緄為副大使掌幽州留務濟軍瀛州次子總為瀛州刺史濟署行營都知兵馬使使屯饒陽濟有疾總與判官張玘孔目官成國寳謀詐使人從長安來曰朝廷以相公逗留無功已除副大使為節度使矣明日又使人來告曰副大使旌節已至太原又使人走而呼曰旌節已過代州舉軍驚駭濟憤怒不知所為殺大將素與緄厚者數十人追緄詣行營以張玘兄臯代知留務濟自朝至日昃不食渇索飲總因寘毒而進之乙夘濟薨緄行至涿州總矯以父命杖殺之遂領軍務十三年夏四月幽州大將譚忠說劉總曰自元和以來劉闢李錡田季安盧從史吳元濟阻兵馮險自以為深根固蔕天下莫能危也然顧眄之間身死家覆皆不自知此非人力所能及殆天誅也况今天子神聖威武苦身焦思縮衣節食以養戰士此志豈湏臾忘天下哉今國兵駸駸北來趙人已獻城十二忠深為公憂之總泣且拜曰聞先生言吾心定矣遂専意歸朝廷穆宗長慶元年盧龍節度使劉總既殺其父兄心常自疑數見父兄為祟甞扵府舎飯僧數百使晝夜為佛事每視事退則處其中或處他室則驚悸不能寐晩年恐懼尤甚亦見河南北皆從化春正月己夘奏乞棄官為僧仍乞賜錢百萬緡以賞將士三月癸丑以劉總兼侍中充天平節度使以宣武節度使張𢎞靖為盧龍節度使乙夘以權知京兆尹盧士玫為瀛莫觀察使丁巳詔劉總兄弟子姪皆除官大將僚佐亦宜超擢百姓給復一年軍士賜錢一百萬緡劉總奏懇乞為僧且以其私第為佛寺詔賜總名大覺寺名報恩遣中使以紫僧服及天平節鉞侍中告身并賜之惟其所擇詔未至總已削髪為僧將士欲遮留之總殺其唱帥者十餘人夜以印節授留後張玘遁去及明軍中始知之玘奏總不知所在癸亥卒于定州之境初劉總奏分所屬為三道以幽涿營為一道請除張𢎞靖為節度使平薊媯澶為一道請除平盧節度使薛平為節度使瀛莫為一道請除權知京兆尹盧士玫為觀察使𢎞靖先在河東以寛簡得衆總與之鄰境聞其風望以燕人桀驁日久故舉𢎞靖自代以安輯之平嵩之子知河朔風俗而盡誠扵國故舉之士玫則總妻族之親也總又盡擇麾下宿將有功伉健難制者都知兵馬使朱克融等送之京師乞加奨拔使燕人有慕羨朝廷禄位之志又獻征馬萬五千匹然後削髪委去克融滔之孫也是時上方酣宴不留意天下之務崔植杜元頴無逺略不知安危大體茍欲崇重𢎞靖惟割瀛莫二州以士玫領之自餘皆統扵𢎞靖朱克融輩乆羈旅京師至假匄衣食日詣中書求官植元頴不之省及除𢎞靖幽州勒克融輩歸本軍驅使克融輩皆憤怨先是河北節度使皆親冒寒暑與士卒均勞逸及𢎞靖至雍容驕貴肩輿扵萬衆之中燕人訝之𢎞靖莊黙自尊涉旬乃一出坐決事賔客將吏罕得聞其言情意不接政事多委之幕僚而所辟判官韋雍輩多年少輕薄之士嗜酒豪縱出入傳呼甚盛或夜歸燭火滿街皆燕人所不習也詔以錢百萬緡賜將士𢎞靖留其二十萬緡充軍府雜用雍輩復裁刻軍士糧賜繩之以法數以反虜詬責吏卒謂軍士曰今天下太平汝曺能挽兩石弓不若識一丁字由是軍中人人怨怒秋七月甲辰韋雍出逢小將策馬衝其前導雍命曳下欲扵街中杖之河朔軍士不慣受杖不服雍以白𢎞靖𢎞靖命軍虞候繫治之是夕士卒連營呼譟作亂將校不能制遂入府舍掠𢎞靖貨財婦女囚𢎞靖扵薊門館殺幕僚韋雍張宗元崔仲卿鄭塤都虞候劉操押牙張抱元眀日軍士稍稍自悔悉詣館謝𢎞靖請改心事之凡三請𢎞靖不應軍士乃相謂曰相公無言是不赦吾曺軍中豈可一日無帥乃相與迎舊將朱洄奉以為留後洄克融之父也時以疾廢卧家自辭老病請使克融為之衆從之衆以判官張徹長者不殺徹罵曰汝何敢反行且族滅衆共殺之甲寅幽州監軍奏軍亂丁巳貶張𢎞靖為賔客分司己未再貶吉州刺史庚申以昭義節度使劉悟為盧龍節度使悟以朱克融方彊奏請且授克融節鉞徐圖之乃復以悟為昭義節度使初田𢎞正受詔鎮成徳自以乆與鎮人戰有父兄之仇乃以魏兵二千從赴鎮因留以自衛奏請度支供其糧賜户部侍郎判度支崔倰性剛褊無逺慮以為魏鎮各自有兵恐開事例不肯給𢎞正四上表不報不得已遣魏兵歸倰沔之孫也𢎞正厚扵骨肉兄弟子姪在兩都者數十人競為侈靡日費約二十萬𢎞正輦魏鎮之貨以供之相屬扵道河北將士頗不平詔以錢百萬緡賜成徳軍度支輦運不時至軍士益不悅都知兵馬使王庭湊本回鶻阿布思種也性果悍隂狡潜謀作亂每抉其細故以激怒之尚以魏兵故不敢發及魏兵去壬戌夜庭湊結牙兵譟於府署殺𢎞正及僚佐元從將吏并家屬三百餘人庭湊自稱留後逼監軍宋惟澄奏求節鉞八月癸巳惟澄以聞朝廷震駭崔倰扵崔植為再從兄故時人莫敢言其罪初朝廷易置魏鎮帥臣左金吾將軍楊元卿上言以為非便又詣宰相深陳利害及鎮州亂上賜元卿白玉帯辛未以元卿為涇原節度使瀛莫將士家屬多在幽州壬申莫州都虞候張良佐潜引朱克融兵入城刺史吳暉不知所在癸酉王庭湊遣人殺冀州刺史王進岌分兵據其州魏􅀶節度使李愬聞田𢎞正遇害素服令将士曰魏人所以得通聖化至今安寧富樂者田公之力也今鎮人不道輒敢害之是輕魏以為無人也諸君受田公恩宜如何報之衆皆慟哭深州刺史牛元翼成徳良將也愬使以寳劍玉帯遺之曰昔吾先人以此劍立大勲吾又以之平蔡州今以授公努力翦庭湊元翼以劍帯徇于軍報曰願盡死愬將出兵會疾作不果元翼趙州人也乙亥起復前涇原節度使田布為魏􅀶節度使令乘驛之鎮布固辭不獲與妻子賔客訣曰吾不還矣悉屏去旌節導從而行未至魏州三十里被髪徒跣號哭而入居于堊室月俸千緡一無所取賣舊産得錢十餘萬緡皆以頒士卒舊將老者兄事之丙子瀛州軍亂執觀察使盧士玫及監軍僚佐送幽州囚扵客館王庭湊遣其將王立攻深州不克丁丑詔魏愽横海昭義河東義武諸軍各出兵臨成徳之境若王庭湊執迷不復宜即進討成徳大將王儉等五人謀殺王庭湊事泄并部兵三千人皆死己夘以深州刺史牛元翼為深冀節度使丁亥以殿中侍御史温造為起居舎人充鎮州四面諸軍宣慰使厯澤潞河東魏􅀶横海深冀易定等道諭以軍期造大雅之五世孫也己丑以裴度為幽鎮兩道招撫使癸巳王庭湊引幽州兵圍深州九月壬子朱克融焚掠易州淶水遂城滿城冬十月以裴度為鎮州四面行營都招討使左領軍大將軍杜叔良以善事權倖得進時幽鎮兵勢方盛諸道兵未敢進上欲功速成宦官薦叔良以為深州諸道行營節度使以牛元翼為成徳節度使丁丑裴度自將兵出承天軍故闗以討王庭湊朱克融遣兵冦蔚州戊寅王庭湊遣兵冦貝州己夘易州刺史栁公濟敗幽州兵扵白石嶺殺千餘人庚辰横海節度使烏重𦙍奏敗成徳軍扵饒陽辛巳魏愽節度使田布將全軍三萬人討王庭湊屯扵南宫之南抜其二柵翰林學士元稹與知樞宻魏𢎞簡深相結求為宰相由是有寵扵上每事咨訪焉稹無怨扵裴度但以度先逹重望恐其復有功大用妨已進取故度所奏畫軍事多與𢎞簡從中沮壊之度乃上表極陳其朋比奸蠧之狀以為逆豎構亂震驚山東姦臣作朋撓敗國政陛下欲掃蕩幽鎮先宜肅清朝廷何者為患有大小議事有先後河朔逆賊祇亂山東禁闈奸臣必亂天下是則河朔患小禁闈患大小者臣與諸將必能翦滅大者非陛下覺悟制斷無以驅除今文武百僚中外萬品有心者無不憤忿有口者無不咨嗟直以奬用方深不敢抵觸恐事未行而禍已及不為國計且為身謀臣自兵興以來所陳章䟽事皆要切所奉書詔多有參差蒙陛下委付之意不輕遭奸臣抑損之事不少臣素與佞倖亦無讐嫌正以臣前請乘傳詣闕面陳軍事姦臣最所畏憚恐臣發其過惡百計止臣臣又謂與諸軍齊進随便攻討奸臣恐臣或有成功曲加阻礙逗遛日時進退皆受羈牽意見悉遭蔽塞但欲令臣失所臣無成則天下理亂山東勝負悉不顧矣為臣事君一至扵此若朝中姦臣盡去則河朔逆賊不討自平若朝中姦臣尚存則逆賊縱平無益陛下儻未信臣言乞出臣表使百官集議彼不受責臣當伏辜表三上上雖不悅以度大臣不得已癸未以𢎞簡為弓箭庫使稹為工部侍郎稹雖解翰林恩遇如故横海節度使烏重𦙍將全軍救深州諸軍倚重𦙍獨當幽鎮東南重𦙍宿將知賊未可破按兵觀釁上怒丙戌以杜叔良為横海節度使徙重𦙍為山南西道節度使十一月辛酉淄青節度使薛平奏突將馬廷崟作亂伏誅時幽鎮兵攻棣州平遣大將李叔佐將兵救之刺史王稷供饋稍薄軍士怨怒宵潰推廷崟為主行且收兵至七千餘人徑逼青州城中兵少不敵平悉發府庫及家財召募得精兵二千人逆戰大破之斬廷崟其黨死者數千人横海節度使杜叔良將諸道兵與鎮人戰遇敵輙北鎮人知其無勇常先犯之十二月庚午監軍謝良通奏叔良大敗扵愽野失亡七千餘人叔良脫身還營䘮其旌節丁丑義武節度使陳楚奏敗朱克融兵扵望都及北平斬獲萬餘人戊寅以鳳翔節度使李光顔為忠武節度使兼深州行營節度使代杜叔良將自憲宗征伐四方國用已虚上即位賞賜左右及宿衛諸軍無節及幽鎮用兵乆無功府藏空竭勢不能支執政乃議王庭湊殺田𢎞正而朱克融全張𢎞靖罪有重輕請赦克融専討庭湊上從之乙酉以朱克融為平盧節度使戊子義武奏破莫州清源等三柵斬獲千餘人二年春正月丁酉幽州兵陷弓髙先是弓髙守備甚嚴有中使夜至守將不内旦乃得入中使大詬怒賊諜知之他日偽遣人為中使投夜至城下守將遽内之賊衆随之遂陷弓髙又圍下愽中書舎人白居易上言以為自幽鎮逆命朝廷徴諸道兵計十七八萬四面攻圍已逾半年王師無功賊勢猶盛弓髙既陷糧道不通下愽深州飢窮日急盖由節將太衆其心不齊莫肯率先遞相顧望又朝廷賞罰近日不行未立功者或已拜官已敗衂者不聞得罪既無懲勸以至遷延若不改張必無所望請令李光顔將諸道勁兵約三四萬人從東速進開弓髙糧路合下愽諸軍解深邢重圍與元翼合勢令裴度將太原全軍兼招討舊職西面壓境觀釁而動若乘虚得便即令同力翦除若戰勝賊窮亦許受降納欵如此則夾攻以分其力招諭以動其心必未及誅夷自生變故又請詔光顔選諸道兵精銳者留之其餘不可用者悉遣歸本道自守土疆蓋兵多而不精豈惟虚費資糧兼恐撓敗軍陳故也今既祇留東西二帥請各置都監一人諸道監軍一時停罷如此則衆齊令一必有成功又朝廷本用田布令報父讐今領全師出界供給度支數月已來都不進討非田布固欲如此抑有其由聞魏愽一軍累經優賞兵驕將富莫肯為用况其軍一月之費計實錢近二十八萬緡若更遷延将何供給此尤宜早令退軍者也若兩道止共留兵六萬所費無多既易支持自然豐足今事宜日急其間變故逺不可知茍兵數不抽軍費不減食既不足衆何以安不安之中何事不有況有司迫扵供軍百端斂率不許即用度交闕盡許則人心無憀自古安危皆繫扵此伏乞聖慮察而念之䟽奏不省己亥度支饋滄州糧車六百乘至下愽盡為成徳兵所掠時諸軍匱乏供軍院所運衣糧往往不得至院在塗為諸軍邀奪其懸軍深入者皆凍餒無所得初田布從其父𢎞正在魏善視牙將史憲誠屢稱薦至右職及為節度使遂寄以腹心以為先鋒兵馬使軍中精銳悉以委之憲誠之先奚人也世為魏將魏與幽鎮本相表裏及幽鎮叛魏人固揺心布以魏兵討鎮軍于南宫上屢遣中使督戰而將士驕惰無鬭志又屬大雪度支饋運不繼布發六州租賦以供軍將士不悅曰故事軍出境皆給朝廷今尚書刮六州肌肉以奉軍雖尚書瘠已肥國六州之人何罪乎憲誠隂蓄異志因衆心不悅離間鼓扇之㑹有詔分魏愽軍與李光顔使救深州庚子布軍大潰多歸憲誠布獨與中軍八千人還魏壬寅至魏州癸夘布召諸將議出兵諸將益偃蹇曰尚書能行河朔舊事則死生以之若使復戰則不能也布無如之何歎曰功不成矣即日作遺表具其狀略曰臣觀衆意終負國恩臣既無功敢忘即死伏願陛下速救光顔元翼不然者義士忠臣皆為河朔屠害矣奉表號哭拜授幕僚李石乃入啓父靈抽刀而言曰上以謝君父下以示三軍遂刺心而死憲誠聞布已死乃諭其衆遵河北舊事衆悅擁憲誠還魏奉為留後戊申魏州奏布自殺己酉以憲誠為魏愽節度使憲誠雖喜得旄鉞外奉朝廷然内實與幽鎮連結庚戌以徳州刺史王日簡為横海節度使日簡乃成徳牙將也壬子貶杜叔良為歸州刺史王庭湊圍牛元翼扵深州官軍三面救之皆以乏糧不能進雖李光顔亦閉壁自守而已軍士自采薪芻日給不過陳米一勺深州圍益急朝廷不得已二月甲子以庭湊為成徳節度使軍中将士官爵皆復其舊以兵部侍郎韓愈為宣慰使上之初即位也兩河畧定蕭俛段文昌以為天下已太平漸宜消兵請宻詔天下軍鎮有兵處每嵗百人之中限八人逃死上方荒宴不以國事為意遂可其奏軍士落籍者衆皆聚山澤為盜及朱克融王庭湊作亂一呼而亡卒皆集詔徴諸道兵討之諸道兵既少皆臨時召募烏合之衆又諸節度既有監軍其領偏師者亦置中使監陳主將不得専號令戰小勝則飛驛奏㨗自以為功不勝則迫脅主將以罪歸之悉擇軍中驍勇以自衛遣羸懦者就戰故每戰多敗又凡用兵舉動皆自禁中授以方畧朝令夕改不知所從不度可否惟督令速戰中使道路如織驛馬不足掠行人馬以繼之人不敢由驛路行故雖以諸道十五萬之衆裴度元臣宿望烏重𦙍李光顔皆當時名將討幽鎮萬餘之衆屯守踰年竟無成功財竭力盡崔植杜元頴王播為相皆庸才無逺畧史憲誠既逼殺田布朝廷不能討遂并朱克融王庭湊以節鉞授之由是再失河朔訖于唐亡不能復取朱克融既得旌節乃出張𢎞靖及盧士玟丙寅以牛元翼為山南東道節度使以左神策行營樂夀鎮兵馬使清河傅良弼為沂州刺史以瀛州􅀶野鎮遏使李寰為忻州刺史良弼寰所戍在幽鎮之閒朱克融王庭湊互加誘脅良弼寰不從各以其衆堅壁賊竟不能取故賞之丙子賜横海節度使王日簡姓名為李全畧癸未加李光顔横海節度使滄景觀察使其忠武深州行營節度如故以横海節度使李全畧為徳棣節度使時朝廷以光顔懸軍入饋運難通故割滄景以隷之王庭湊雖受旌節不解深州之圍丙戌以知制誥東陽馮宿為山南東道節度副使權知留後仍遣中使入深州督牛元翼赴鎮裴度亦與幽鎮書責以大義朱克融即解圍去王庭湊雖引兵少退猶守之不去元稹怨裴度欲解其兵柄故勸上雪王庭湊而罷兵丁亥以度為司空東都留守平章事如故諫官爭上言時未偃兵度有將相全才不宜置之散地上乃命度入朝然後赴東都以靈武節度使李聽為河東節度使三月丙午加朱克融王庭湊檢校工部尚書上聞其解深州之圍故襃之然庭湊之兵實猶在深州城下韓愈既行衆皆危之詔愈至境更觀事勢勿遽入愈曰止君之仁死臣之義遂徃至鎮庭湊拔刃弦弓以逆之及館甲士羅扵庭庭湊言曰所以紛紛者乃此曺所為非庭湊心愈厲聲曰天子以尚書有將帥材故賜之節鉞不知尚書乃不能與健兒語邪甲士前曰先太師為國擊走朱滔血衣猶在此軍何負朝廷乃以為賊乎愈曰汝曹尚能記先太師則善矣夫逆順之為禍福豈逺邪自禄山思明以來至元濟師道其子孫有今尚存仕宦者乎田令公以魏愽歸朝廷子孫雖在孩提皆為美官王承元以此軍歸朝廷弱冠為節度使劉悟李祐今皆為節度使汝曺亦聞之乎庭湊恐衆心動麾之使出謂愈曰侍郎來欲使庭湊何為愈曰神策六軍之將如牛元翼者不少但朝廷顧大體不可棄之耳尚書何為圍之不置庭湊曰即當出之因與愈宴禮而歸之未幾牛元翼將十騎突圍出深州大將臧平等舉城降庭湊責其乆堅守殺平等將吏百八十餘人戊申裴度至長安見上謝討賊無功李光顔所將兵聞當留滄景皆大呼西走光顔不能制因驚懼成疾己酉上表固辭横海節乞歸許州許之壬子以裴度為淮南節度使餘如故時言事者皆謂裴度不宜出外上亦自重之戊午制留度輔政以中書侍郎同平章事王播同平章亊代度鎮淮南仍兼諸道鹽鐵轉運使李寰帥其衆三千出􅀶野王庭湊遣兵追之寰與戰殺三百餘人庭湊兵乃還餘衆二千猶固守慱野上復以徳棣節度使李全畧為横海節度使夏四月甲戌以傅良弼李寰為神策都知兵馬使王庭湊之圍牛元翼也和王傅于方欲以竒策干進言扵元稹請遣客王昭于友明間說賊黨使出元翼仍賂兵吏部令史偽出告身二十通令以便宜給賜稹皆然之有李賞者知其謀乃告裴度云方為稹結客刺度度隐而不發賞詣左神策告其事五月丁巳詔左僕射韓臯等鞫之戊午幽州節度使朱克融進馬萬匹羊十萬口而表云先請其直充犒賞三司按于方刺裴度事皆無騐六月甲子度及元稹皆罷相度為右僕射稹為同州刺史以兵部尚書李逢吉為門下侍郎同平章事諫官上言裴度無罪不當免相元稹與于方為邪謀責之大輕上不得已壬申削稹長春宫使三年夏五月丙子以晉慈二州為保義軍以觀察使李寰為節度使秋八月以左僕射裴度為司空山南西道節度使不兼平章事李逢吉惡度右補闕張又新等附逢吉競流謗毁傷度竟出之四年初牛元翼在襄陽數賂王庭湊以請其家庭湊不與聞元翼薨甲子盡殺之夏六月上聞王庭湊屠牛元翼家歎宰輔非才使凶賊縱暴翰林學士韋處厚因上䟽言裴度勲髙中夏聲播外夷若置之巖廊委其參決河北山東必禀朝算管仲曰人離而聽之則愚合而聽之則聖理亂之本非有它術順人則理違人則亂伏承陛下當食歎息恨無蕭曺今有一裴度尚不能留此馮唐所以謂漢文得㢘頗李牧不能用也夫御宰相當委之信之親之禮之扵亊不效扵國無勞則置之散寮黜之逺郡如此則在位者不敢不厲將進者不敢茍求臣與逢吉素無私嫌甞為裴度無辜貶官今之所陳上答聖明下達羣義耳上見度奏狀無平章事以問處厚處厚具言李逢吉排沮之狀上曰何至是邪李程亦勸上加禮扵度丙申加度同平章事冬十二月庚寅加天平節度使烏重𦙍同平章事敬宗寳厯二年春正月壬辰裴度自興元入朝李逢吉之黨百計毁之上雖年少悉察其誣謗待度益厚二月丁未以度為司空同平章事上自即位以來欲幸東都令度支員外郎盧貞按視修東都宫闕會朱克融王庭湊皆請以兵匠助修東都三月丁亥敇以修東都煩擾罷之召盧貞還先是朝廷遣中使賜朱克融時服克融以為疎惡執留敇使又奏當道今嵗將士春衣不足乞度支給三十萬端匹又奏欲將兵馬及丁匠五千助修宫闕上患之以問宰相欲遣重臣宣慰仍索敇使裴度對曰克融無禮已甚殆将斃矣譬如猛獸自扵山林中咆哮跳踉乆當自困必不敢輒離巢穴願陛下勿遣宣慰亦勿索敇使旬日之後徐賜詔書云聞中官至彼稍失去就俟還朕自有處分時服有司製造不謹朕甚欲知之已令區處其將士春衣從來非朝廷徴發皆本道自備朕不愛數十萬匹物但素無此例不可獨與范陽所稱助修宫闕皆是虚語若欲直挫其姦宜云丁匠宜速遣來已令所在排比供擬彼得此詔必蒼黄失圖若且示含容則云修宫闕事在有司不假丁匠逺來如是而已不足勞聖慮也上悅從之横海節度使李全畧薨其子副大使同㨗擅領留後重賂鄰道以求承繼夏五月幽州軍亂殺朱克融及其子延齡軍中立其少子延嗣主軍務秋八月朱延嗣既得幽州虐用其人都知兵馬使李載義與弟牙内兵馬使載寧共殺延嗣并屠其家三百餘人載義權知留後九月數延嗣之罪以聞載義承乾之後也庚申魏愽節度使史憲誠妄奏李同㨗為軍士所逐走歸本道請束身歸朝尋奏同㨗復歸滄州冬十月己亥以李載義為盧龍節度使文宗太和元年春二月李同捷擅據滄景朝廷經嵗不問同㨗冀易世之後或加恩貸三月壬戌朔遣掌書記崔從長奉表與其弟同志同巽俱入見請遵朝旨夏五月丙子以天平節度使烏重𦙍為横海節度使以前横海節度副使李同捷為兖海節度使朝廷猶慮河南北節度使構扇同㨗使拒命乃加魏愽史憲誠同平章事丁丑加盧龍李載義平盧康志睦成徳王庭湊檢校官秋七月李同捷託為將士所留不受詔乙酉武寧節度使王智興奏請將本軍三萬人自備五月糧以討同捷許之八月庚子削同捷官爵命烏重𦙍王智興康志睦史憲誠李載義與義成節度使李聽義武節度使張播各帥本軍討之同捷遣其子弟以珍玩女妓賂河北諸鎮戊午李載義執其姪并所賂獻之史憲誠與李全畧為㛰姻及同捷叛宻以糧助之裴度不知其所為謂憲誠無貳心憲誠遣親吏至中書請事韋處厚謂曰晉公扵上前以百口保爾使主處厚則不然但仰俟所為自有朝典耳憲誠懼不敢復與同捷通王庭湊為同捷求節鉞不獲乃助之為亂出兵境上以撓魏師又遣使厚賂沙陀酋長朱邪執宜欲與之連兵執宜拒不受冬十月天平横海節度使烏重𦙍擊同捷屢破之十一月丙寅重𦙍薨庚辰以保義節度使李寰為横海節度使從王智興之請也十二月庚戌加王智興同平章事二年春三月己夘王智興攻棣州焚其三門閏月丙戌朔史憲誠奏遣其子副大使唐都知兵馬使开志紹將兵二萬五千趣徳州討李同捷時憲誠欲助同捷唐泣諫且請發兵討之憲誠不能違夏六月王庭湊隂以兵及鹽糧助李同捷上欲討之秋七月甲辰詔中書集百官議其事宰相以下莫敢違衛尉卿殷侑獨以為庭湊雖附凶徒事未甚露宜且含容専討同捷己巳下詔罪狀庭湊命鄰道各嚴兵守備聴其自新九月丁亥王智興奏拔棣州李寰自晉州引兵赴鎮不戢士卒所過殘暴至則擁兵不進但坐索供饋庚寅以寰為夏綏節度使甲午詔削王庭湊官爵命諸軍四面進討加王智興守司徒以前夏綏節度使傅良弼為横海節度使冬十月魏􅀶敗横海兵扵平原遂拔之十一月癸未朔易定節度使栁公濟奏攻李同㨗堅固寨拔之又破其兵扵寨東時河北諸軍討同捷乆未成功每有小勝則虚張首虜以邀厚賞朝廷竭力奉之江淮為之耗弊傅良弼至陜而薨乙酉以左金吾大將軍李祐為横海節度使十二月丁巳王智興奏兵馬使李君謀將兵濟河破無棣壬申中書侍郎同平章事韋處厚薨李同捷軍勢日蹙王庭湊不能救乃遣人說魏􅀶大將开志紹使殺史憲誠父子取魏愽志紹遂作亂引所部兵二萬人還逼魏州丁丑命諫議大夫柏耆宣慰魏愽且發義成河陽兵以討志紹辛巳史憲誠奏开志紹兵屯永濟告急求援詔義成節度使李聴帥滄州行營諸軍以討志紹三年春正月开志紹與成徳合兵掠貝州義成行營兵三千人先屯齊州使之禹城中道潰叛横海節度使李祐討誅之李聽史唐合兵擊开志紹破之志紹將其衆五千奔鎮州李載義奏攻滄州長蘆拔之甲辰昭義奏开志紹餘衆萬五千人詣本道降寘之洺州二月横海節度使李祐帥諸道行營兵擊李同捷破之進攻徳州憲誠聞滄景將平而懼其子唐勸之入朝丙寅憲誠使唐奉表請入朝且請以所管聽命夏四月戊辰李載義奏攻滄州破其羅城李祐拔徳州城中將卒三千餘人奔鎮州李同捷與祐書請降祐并奏其書諫議大夫柏耆受詔宣慰行營好張大聲勢以威制諸將諸將已惡之矣及李同捷請降扵祐祐遣大將萬洪代守滄州耆疑同捷之詐自將數百騎馳入滄州以事誅洪取同捷及其家屬詣京師乙亥至將陵或言王庭湊欲以竒兵簒同捷乃斬同捷傳首滄景悉平五月庚寅加李載義同平章事諸道兵攻李同捷三年僅能下之而柏耆徑入城取為己功諸將疾之爭上表論列辛夘貶耆為循州司户李祐尋薨壬寅攝魏􅀶副使史唐奏改名孝章六月丙辰詔鎮州四面行營各歸本道休息但務保境勿相往來惟庭湊或效順為逹表章餘皆勿受辛酉以史憲誠為兼侍中河中節度使以李聽兼魏愽節度使分相衛澶三州以史孝章為節度使初李祐聞柏耆殺萬洪大驚疾遂劇上曰祐若死是耆殺之也癸酉賜耆自盡河東節度使李程奏得王庭湊書請納景州又奏开志紹自縊上遣中使賜史憲誠旌節癸酉至魏州時李聽自貝州還軍館陶遷延未進憲誠竭府庫以治行將士怒甲戌軍亂殺憲誠奉牙内都知兵馬使靈武何進滔知留後李聽進至魏州進滔拒之不得入秋七月進滔出兵擊李聽聽不為備大敗潰走晝夜兼行趣淺口失亡過半輜重兵械盡棄之昭義兵救之聴僅而得免歸于滑臺河北乆用兵饋運不給朝廷厭苦之八月壬子以進滔為魏􅀶節度使復以相衛澶三州歸之滄州承䘮亂之餘骸骨蔽地城空野曠户口存者什無三四癸丑以衛尉卿殷侑為齊徳滄景節度使侑至鎮與士卒同甘苦招撫百姓勸之耕桑流散者稍稍復業先是本軍三萬人皆仰給度支侑至一年租稅自能贍其半二年請悉罷度支給賜三年之後户口滋殖倉廪充盈王庭湊因鄰道微露請服之意壬申赦庭湊及將士復其官爵四年夏四月裴度以高年多疾懇辭機政六月丁未以度為司徒平章軍國重事俟疾損三五日一入中書五年春正月庚申盧龍監軍奏李載義與敕使宴於毬場後院副兵馬使楊志誠與其徒呼譟作亂載義與子正元奔易州志誠又殺莫州刺史張慶初上召宰相謀之牛僧孺曰范陽自安史以來非國所有劉總蹔獻其地朝廷費錢八十萬緡而無絲毫所獲今日志誠得之猶前日載義得之也因而撫之使捍北狄不必計其逆順上從之載義自易州赴京師上以載義有平滄景之功且事朝廷恭順二月壬辰以載義為太保同平章事如故以楊志誠為盧龍留後臣光曰昔者聖人順天理察人情知齊民之莫能相治也故置師長以正之知羣臣之莫能相使也故建諸侯以制之知列國之莫能相服也故立天子以統之天子之於萬國能襃善而黜惡抑彊而輔弱撫服而懲違禁暴而誅亂然後發號施令而四海之内莫不率從也詩云勉勉我王綱紀四方載義藩屏大臣有功於國無罪而志誠逐之此天子所宜治也若一無所問因以其土田爵位授之則是將帥之廢置殺生皆出扵士卒之手天子雖在上奚為哉國家之有方鎮豈専利其財賦而已乎如僧孺之言姑息偷安之術耳豈宰相佐天子御天下之道哉夏四月己丑以李載義為山南西道節度楊志誠為幽州節度使七年春二月癸亥加盧龍節度使檢校工部尚書楊志誠檢校吏部尚書進奏官徐迪詣宰相言軍中不識朝廷之制唯知尚書改僕射為遷不知工部改吏部為美敇使往恐不得出辭氣甚慢宰相不以為意三月楊志誠怒不得僕射留官告使魏寳義并春衣使焦奉鸞送奚契丹使尹士恭甲午遣牙將王文頴來謝恩并讓官丙申復以告身并批答賜之文頴不受而去夏六月乙巳以山南西道節度使李載義為河東節度使秋八月壬寅加幽州節度使楊志誠檢校右僕射仍别遣使慰諭之杜牧憤河朔三鎮之桀驁而朝廷議者専事姑息乃作書名曰罪言大畧以為國家自天寳盜起河北百餘城不得尺寸人望之若回鶻吐蕃無敢窺者齊梁蔡被其風流因亦為冦未甞五年間不戰焦焦然七十餘年矣今上策莫如先自治中策莫如取魏最下策為浪戰不計地勢不審攻守是也又傷府兵廢壊作原十六衛以為國家始踵隋制開十六衛自今觀之設官言無謂者其十六衛乎本原事迹其實天下之大命也貞觀中内以十六衛蓄養武臣外開折衝果毅府五百七十四以儲兵伍有事則戎臣提兵居外無事則放兵居内其居内也富貴恩澤以奉養其身所部之兵散舍諸府上府不越千二百人三時耕稼一時治武籍藏將府伍散田畆力觧勢破人人自愛雖有蚩尤為帥亦不可使為亂耳及其居外也縁部之兵被檄乃來斧鉞在前爵賞在後飄暴交捽豈暇異略雖有蚩尤為帥亦無能為叛也自貞觀至于開元百三十年間戎臣兵伍未始逆簒此大聖人所以能柄統輕重制鄣表裏聖算神術也至于開元末愚儒奏章曰天下文勝矣請罷府兵武夫奏章曰天下力彊矣請搏四夷扵是府兵内剷邉兵外作戎臣兵伍湍奔矢往内無一人矣尾大中乾成燕偏重而天下掀然根萌燼然七聖旰食求欲除之且不能也由此觀之戎臣兵伍豈可一日使出落鈐鍵哉然為國者不能無兵居外則叛居内則篡使外不叛内不篡古今以還法術最長其置府立衛乎近代已來扵其將也弊復為甚率皆市兒輩多齎金玉負倚幽隂折劵交貨所能致也絶不識父兄禮義之教復無慷慨感槩之氣百城千里一朝得之其彊傑愎勃者則撓削法制不使縛已斬族忠良不使違己力一勢便罔不為冦其隂泥巧狡者亦能家算口斂委扵邪倖由卿市公去郡得都四履所治指為别館或一夫不幸而夀則戛割生人略帀天下是以天下兵亂不息齊人乾耗靡不由是矣嗚呼文皇帝十六衛之㫖其誰原而復之乎又作戰論以為河北視天下猶珠璣也天下視河北猶四支也河北氣俗渾厚果扵戰耕加以土息健馬便扵馳敵是以出則勝處則饒不窺天下之産自可封殖亦猶大農之家不待珠璣然後以為富也國家無河北則精甲銳卒利刃良弓健馬無有也是一支兵去矣河東盟津滑臺大梁彭城東平盡宿厚兵以塞虜衝不可它使是二支兵去矣六鎮之師厥數三億低首仰給横拱不為則沿淮以北循河之南東盡海西叩落赤地盡取才能應費是三支財去矣咸陽西北戎夷大屯盡剷吳越荆楚之饒以啖兵戍是四支財去矣天下四支盡解頭腹兀然其能以是久為安乎今者誠能治其五敗則一戰可定四支可生夫天下無事之時殿寄大臣偷安奉私戰士離落兵甲鈍敝是不蒐練之過其敗一也百人荷戈仰食縣官則挾千夫之名大將小禆操其餘贏以虜壯為幸以師老為娛是執兵者常少糜食者常多此不責實料食之過其敗二也戰小勝則張皇其功奔走獻狀以邀上賞或一日再賜一月累封凱旋未歌書品已崇爵命極矣田宫廣矣金繒溢矣子孫官矣焉肯搜竒出死勤扵我矣此厚賞之過其敗三也多䘮兵士顛飜大都則跳身而來刺邦而去回視刀鋸氣色甚安一嵗未更旋已立扵壇墀之上矣此輕罰之過其敗四也大將兵柄不得専恩臣敇使迭來揮之堂然將陳殷然將鼔一則曰必為偃月一則曰必為魚麗三軍萬夫環旋翔羊愰駭之間虜騎乘之遂取吾之鼓旗此不専任責成之過其敗五也今者誠欲調持干戈洒掃垢汙以為萬世安而乃踵前非是不可為也又作守論以為今之議者咸曰夫崛彊之徒吾以良將勁兵為銜策高位美爵充飽其腸安而不撓外而不拘亦猶豢擾虎狼而不拂其心則忿氣不萌此大厯貞元所以守邦也亦何必疾戰焚煎吾民然後以為快也愚曰大厯貞元之間適以此為禍也當是之時有城數十千百卒夫則朝廷别待之貸以法度扵是乎闊視大言自樹一家破制削法角為尊奢天子養威而不問有司守恬而不呵王侯通爵越録受之覲聘不來几杖扶之逆息虜嗣皇子嬪之装縁采飾無不備之是以地益廣兵益彊僣擬益甚侈心益昌扵是土田名器分劃殆盡而賊夫貪心未及畔岸遂有淫名越號或帝或王盟詛自立恬淡不畏走兵四略以飽其志者也是以趙魏燕齊卓起大唱梁蔡吳蜀躡而和之其餘混傾軒囂欲相效者往往而是運遭孝武宵旰不忘前英後傑夕思朝議故能大者誅鋤小者惠來不然周秦之郊幾為犯獵哉大扺生人油然多欲欲而不得則怒怒則爭亂随之是以教笞扵家刑罰扵國征戰扵天下此所以裁其欲而塞其爭也大厯貞元之間盡反此道提區區之有而塞無涯之爭是以首尾指支㡬不能相運掉也今者不知非此而反用以為經愚見為盜者非止扵河北而已嗚呼大厯貞元守邦之術永戒之哉又注孫子為之序以為兵者刑也刑者政事也為夫子之徒實仲由冉有之事也不知自何代何人分為二道曰文武離而俱行因使搢紳之士不敢言兵或恥言之茍有言者世以為麤暴異人人不比數嗚呼亡失根本斯最為甚禮曰四郊多壘此卿大夫之辱也厯觀自古樹立其國滅亡其國未始不由兵也主兵者必聖賢材能多聞􅀶識之士乃能有功議扵廊廟之上兵形已成然後付之扵將漢相言指縱者人也獲兎者犬也此其是也彼為相者曰兵非吾事吾不當知君子曰勿居其位可也八年冬十月辛巳幽州軍亂逐節度使楊志誠及監軍李懐仵推兵馬使史元忠主留務楊志誠過太原李載義自毆撃欲殺之幕僚諫救得免殺其妻子及從行将卒朝廷以載義有功不問載義母死𦵏幽州志誠發取其財載義奏乞取志誠心以祭母不許十一月史元忠獻楊志誠所造衮衣及諸僣物丁夘流志誠扵嶺南道殺之十二月癸未以史元忠為盧龍留後九年春正月乙夘以王元逵為成徳節度使三月丙辰以史元忠為盧龍節度使通鑑紀事本末巻三十四下
