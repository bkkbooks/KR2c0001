body:
  text: 通鑑紀事本末卷三十一上宋袁樞撰李林甫專政唐𤣥宗開元二十二年吏部侍郎李林甫柔佞多狡數深結宦官及妃嬪家伺候上動靜無不知之由是每奏對常稱㫖上悦之時武惠妃寵幸傾後宫生壽王瑁諸子莫得為比太子浸疎薄林甫乃因宦官言於惠妃願盡力保護夀王惠妃徳之隂為内助由是擢黃門侍郎五月戊子以裴耀卿為侍中張九齡為中書令林甫為禮部尚書同中書門下三品二十四年初上欲以李林甫為相問於中書令張九齡九齡對曰宰相繫國安危陛下相林甫臣恐異日為廟社之憂上不從時九齡方以文學為上所重林甫雖恨猶曲意事之侍中裴耀卿與九齡善林甫並疾之是時上在位嵗久漸肆奢欲怠於政事而九齡遇事無細大皆力爭林甫巧俟上意日思所以中傷之上之為臨淄王也趙麗妃皇甫徳儀劉才人皆有寵麗妃生太子瑛徳儀生鄂王瑤才人生光王琚及即位幸武惠妃麗妃等愛皆弛惠妃生壽王瑁寵冠諸子太子與瑤琚㑹於内第各以母失職有怨望語駙馬都尉楊洄尚咸宜公主常伺三子過失以告惠妃惠妃泣訴於上曰太子隂結黨與將害妾母子亦指斥至尊上大怒以語宰相欲皆廢之九齡曰陛下踐祚垂三十年太子諸王不離深宫日受聖訓天下之人皆慶陛下享國久長子孫蕃昌今三子皆已成人不聞大過陛下奈何一旦以無根之語喜怒之際盡廢之乎且太子天下本不可輕搖昔晉獻公聽驪姬之讒殺申生三世大亂漢武帝信江充之誣罪戾太子京城流血晉惠帝用賈后之譖廢愍懷太子中原塗炭隋文帝納獨孤后之言黜太子勇立煬帝遂失天下由此觀之不可不慎陛下必欲為此臣不敢奉詔上不悦林甫初無所言退而私謂宦官之貴幸者曰此主上家事何必問外人上猶豫未決惠妃密使官奴牛貴兒謂九齡曰有廢必有興公為之援宰相可長處九齡叱之以其語白上上為之動色故訖九齡罷相太子得無動林甫日夜短九齡於上上浸疎之林甫引蕭炅為户部侍郎炅素不學嘗對中書侍郎嚴挺之讀伏臘為伏獵挺之言於九齡曰省中豈容有伏獵侍郎由是出炅為岐州刺史故林甫怨挺之九齡與挺之善欲引以為相嘗謂之曰李尚書方承恩足下宜一造門與之款暱挺之素負氣薄林甫為人竟不之詣林甫恨之益深挺之先娶妻出之更嫁蔚州刺史王元琰元琰坐贓罪下三司按鞠挺之為之營解林甫因左右使於禁中白上上謂宰相曰挺之為罪人請屬所由九齡曰此乃挺之出妻不宜有情上曰雖離乃復有私於是上積前事以耀卿九齡為阿黨十一月壬寅以耀卿為左丞相九齡為右丞相並罷政事以林甫兼中書令仙客為工部尚書同中書門下三品領朔方節度如故嚴挺之貶洺州刺史王元琰流嶺南九齡既得罪自是朝廷之士皆容身保位無復直言李林甫欲蔽塞人主視聽自專大權明召諸諫官謂曰今明主在上羣臣將順之不暇烏用多言諸君不見立仗馬乎食三品料一鳴輙斥去悔之何及補闕杜璡嘗上書言事明日黜為下邽令自是諫爭路絶矣牛仙客既為林甫所引進專給唯諾而已然二人皆謹守格式百官遷除各有常度雖竒才異行不免終老常調其以巧諂邪險自進者則超騰不次自有它蹊矣林甫城府深密人莫窺其際好以甘言啗人而隂中傷之不露辭色凡為上所厚者始則親結之及位勢相逼輙以計去之雖老姦巨猾無能逃其術者二十五年夏四月辛酉監察御史周子諒彈牛仙客非才引讖書為證上怒甚命左右㩧於殿庭絶而復蘇仍杖之朝堂流瀼州至藍田而死李林甫言子諒張九齡所薦也甲子貶九齡荆州刺史楊洄又譖太子瑛鄂王瑤光王琚云與太子妃兄駙馬薛鏽潛構異謀上召宰相謀之李林甫對曰此陛下家事非臣等所宜豫上意乃決乙丑使宦者宣制於宫中廢瑛瑤琚為庶人流鏽於瀼州瑛瑤琚尋賜死城東驛鏽賜死於藍田瑤琚皆好學有才識死不以罪人皆惜之丙寅瑛舅家趙氏妃家薛氏瑤舅家皇甫氏坐流貶者數十人惟瑤妃家韋氏以妃賢得免二十六年太子瑛既死李林甫數勸上立夀王瑁上以忠王璵年長且仁孝恭謹又好學意欲立之猶豫嵗餘不決自念春秋浸高三子同日誅死繼嗣未定常忽忽不樂寢膳為之減高力士乘間請其故上曰汝我家老奴豈不能揣我意力士曰得非以郎君未定邪上曰然對曰大家何必如此虚勞聖心但推長而立誰敢復爭上曰汝言是也汝言是也由是遂定六月庚子立璵為太子二十七年夏四月己丑以牛仙客為兵部尚書兼侍中李林甫為吏部尚書兼中書令揔文武選事秋九月戊午太子更名紹天寶元年李林甫為相凡才望功業出己右及為上所厚勢位將逼己者必百計去之尤忌文學之士或陽與之善啗以甘言而隂陷之世謂李林甫口有蜜腹有劍上嘗陳樂於勤政樓下垂簾觀之兵部侍郎盧絢謂上已起垂鞭按轡橫過樓下絢風標清粹上目送之深歎其藴藉林甫常厚以金帛賂上左右上舉動必知之乃召絢子弟謂曰尊君素望清崇今交廣藉才聖上欲以尊君為之可乎若憚逺行則當左遷不然以賓詹分務東洛亦優賢之命也何如絢懼以賓詹為請林甫恐乖衆望乃除華州刺史到官未幾誣其有疾州事不理除詹事員外同正上又嘗問林甫以嚴挺之今安在是人亦可用挺之時為絳州刺史林甫退召挺之弟損之諭以上待尊兄意甚厚盍為見上之策奏稱風疾求還京師就醫挺之從之林甫以其奏白上云挺之衰老得風疾宜且授以散秩使便醫藥上歎吒久之夏四月壬寅以為詹事又以汴州刺史河南采訪使齊澣為少詹事皆員外同正於東京養疾澣亦朝廷宿望故並忌之秋七月辛未左相牛仙客薨八月丁丑以刑部尚書李適之為左相二年上以右贊善大夫楊慎矜知御史中丞事時李林甫專權公卿之進有不出其門者必以罪去之慎矜由是固辭不敢受五月辛丑以慎矜為諫議大夫三載冬十二月户部尚書裴寬素為上所重李林甫恐其入相忌之刑部尚書裴敦復擊海賊還受請託廣序軍功寬微奏其事林甫以告敦復敦復言寬亦嘗以親故屬敦復林甫曰君速奏之勿後於人敦復乃以五百金賂女官楊太真之姊使言於上甲午寬坐貶睢陽太守初上自東都還李林甫知上厭巡幸乃與牛仙客謀増近道粟賦及和糴以實闗中數年蓄積稍豐上從容謂高力士曰朕不出長安近十年天下無事朕欲高居無為悉以政事委林甫何如對曰天子巡狩古之制也且天下大柄不可假人彼威勢既成誰敢復議之者上不悦力士頓首自陳臣狂疾發妄言罪當死上乃為力士置酒左右皆呼萬嵗力士自是不敢深言天下事矣四載李適之與李林甫爭權有隙適之領兵部尚書駙馬張垍為侍郎林甫亦惡之使人發兵部銓曹姦利事收吏六十餘人付京兆與御史對鞫之數日竟不得其情京兆尹蕭炅使法曹吉溫鞫之溫入院置兵部吏於外先於後㕔取二重囚訊之或杖或壓號呼之聲所不忍聞皆曰茍存餘生乞紙盡答兵部吏素聞溫之慘酷引入皆自誣服無敢違溫意者頃刻而獄成驗囚無榜掠之迹及林甫欲除不附己者求治獄吏炅薦溫於林甫林甫得之大喜溫常曰若遇知己南山白額虎不足縛也時又有杭州人羅希奭為吏深刻林甫引之自御史臺主簿再遷殿中侍御史二人皆隨林甫所欲深淺鍜鍊成獄無能自脱者時人謂之羅鉗吉網秋九月癸未以陜郡太守江淮租庸轉運使韋堅為刑部尚書罷其諸使以御史中丞楊慎矜代之堅妻姜氏皎之女林甫之舅子也故林甫昵之及堅以通漕有寵於上遂有入相之志又與李適之善林甫由是惡之故遷以美官實奪之權也五載春正月乙丑以隴右節度使皇甫惟明兼河西節度使李適之性疎率李林甫嘗謂適之曰華山有金礦采之可以富國主上未之知也他日適之因奏事言之上以問林甫對曰臣久知之但華山陛下本命王氣所在鑿之非宜故不敢言上以林甫為愛已薄適之慮事不熟謂曰自今奏事宜先與林甫議之無得輕説適之由是束手矣適之既失恩韋堅失權益相親密林甫愈惡之初太子之立非林甫意林甫恐異日為已禍常有動揺東宫之志而堅又太子之妃兄也皇甫惟明嘗為忠王友時破吐蕃入獻捷見林甫專權意頗不平時因見上乗間微勸上去林甫林甫知之使楊慎矜密伺其所為㑹正月望夜太子出遊與堅相見堅又與惟明㑹於景龍觀道士之室慎矜發其事以為堅戚里不應與邊將狎暱林甫因譖堅與惟明結謀欲共立太子堅惟明下獄林甫使慎矜與御史中丞王鉷京兆府法曹吉溫共鞫之上亦疑堅與惟明有謀而不顯其罪癸酉下制責堅以干進不已貶縉雲太守惟明以離間君臣貶播川太守仍别下制戒百官夏四月韋堅等既貶左相李適之懼自求散地庚寅以適之為太子少保罷政事其子衛尉少卿霅嘗盛饌召客客畏李林甫竟日無一人敢往者以門下侍郎崇𤣥館大學士陳希烈同平章事希烈宋州人以講老莊得進專用神仙符瑞取媚於上李林甫以希烈為上所愛且柔佞易制故引以為相凡政事一決於林甫希烈但給唯諾故事宰相午後六刻乃出林甫奏今太平無事巳時即還第軍國機務皆決於私家主書抱成案詣希烈書名而巳秋七月將作少匠韋蘭兵部員外郎韋芝為其兄堅訟寃且引太子為言上益怒太子懼表請與妃離昏乞不以親廢法丙子再貶堅江夏别駕蘭芝皆貶嶺南然上素知太子孝謹故譴怒不及李林甫因言堅與李適之等為朋黨後數日堅長流臨封適之貶宜春太守太常少卿韋斌貶巴陵太守嗣薛王琄貶夷陵别駕雎陽太守裴寛貶安陸别駕河南尹李齊物貶竟陵太守凡堅親黨連坐流貶者數十人斌安石之子琄業之子堅之甥也琄母亦令隨琄之官冬十一月贊善大夫杜有鄰女為太子良娣良娣之姊為左驍衛兵曹栁勣妻勣性狂疎好功名喜交結豪俊淄川太守裴敦復薦於北海太守李邕邕與之定交勣至京師與著作郎王曽等為友皆當時名士也勣與妻族不協欲陷之為飛語告有鄰妄稱圖䜟交搆東宫指斥乘輿林甫令京兆士曹吉溫與御史鞫之乃勣首謀也溫令勣連引曽等入臺十二月甲戌有鄰勣及曽等皆杖死積尸大理妻子流逺方中外震慄嗣虢王巨貶義陽司馬巨邕之子也别遣監察御史羅希奭往按李邕太子亦出良娣為庶人乙亥鄴郡太守王琚坐􅂍貶江華司馬琚性豪侈與李邕皆自謂耆舊久在外意怏怏李林甫惡其負才使氣故因事除之六載春正月辛巳李邕裴敦復皆杖死邕才藝出衆盧藏用常語之曰君如干將莫邪難與爭鋒然終虞缺折耳邕不能用林甫又奏分遣御史即貶所賜皇甫惟明韋堅兄弟等死羅希奭自青州如嶺南所過殺遷謫者郡縣惶駭排馬牒至宜春李適之憂懼服藥自殺至江華王琚仰藥不死聞希奭已至即自縊希奭又迂路過安陸欲怖殺裴寛寛向希奭叩頭祈生希奭不宿而過乃得免李適之子霅迎父喪至東京李林甫令人誣告霅杖死於河南府給事中房琯坐與適之善貶宜春太守琯融之子也林甫恨韋堅不已遣使於循河及江淮州縣求堅罪所在收繫綱典船夫溢於牢獄徵剥逋負延及鄰伍皆裸露死於公府至林甫薨乃止李林甫以王忠嗣功名日盛恐其入相忌之董延光之攻吐蕃也過期不克言王忠嗣沮撓軍計上怒李林甫因使濟陽别駕魏林告忠嗣嘗自言我幼養宫中與忠王相愛狎欲擁兵以尊奉太子敇徵忠嗣入朝委三司鞫之户部侍郎兼御史中丞楊慎矜為上所厚李林甫浸忌之慎矜與王鉷父晉中表兄弟也少與鉷狎鉷之入臺頗因慎矜推引及鉷遷中丞慎矜與語猶名之鉷自恃與林甫善意稍不平慎矜奪鉷職田鉷母本賤慎矜嘗以語人鉷深衘之慎矜猶以故意待之嘗與之私語䜟書慎矜與術士史敬忠善敬忠言天下將亂勸慎矜於臨汝山中買莊為避亂之所㑹慎矜父墓田中草木皆流血慎矜惡之以問敬忠敬忠請禳之設道場於後園慎矜退朝輙躶貫桎梏坐其中旬日血止慎矜徳之慎矜有侍婢明珠色美敬忠屢目之慎矜即以遺敬忠車載過貴妃栁氏姊樓下姊邀敬忠上樓求車中美人敬忠不敢拒明日姊入宫以明珠自隨上見而異之問所從來明珠具以實對上以慎矜與術士為妖法惡之含怒未發楊釗以告鉷鉷心喜因侮慢慎矜慎矜怒林甫知鉷與慎矜有隙密誘使圖之鉷乃遣人以飛語告慎矜隋煬帝孫與凶人往來家有䜟書謀復祖業上大怒收慎矜繫獄命刑部大理與侍御史楊釗殿中侍御史盧鉉同鞫之大府少卿張瑄慎矜所薦也盧鉉誣瑄嘗與慎矜論䜟拷掠百端瑄不肯答辨乃以木綴其足使人張其枷柄向前挽之身加長數尺腰細欲絶眼鼻出血瑄竟不答又使吉溫捕史敬忠於汝州敬忠與溫父素善溫之幼也敬忠常抱撫之及捕獲溫不與交言鎖其頸以布䝉首驅之馬前至戲水温使吏誘之曰楊慎矜已款服惟湏子一辨若解人意則生不然必死前至溫湯則求首不獲矣敬忠顧謂溫曰七郎求一紙溫陽不應去溫湯十餘里敬忠懇請哀切乃於桑下令答三紙辨皆如溫意溫徐謂曰大人且勿怪因起拜之至㑹昌始鞫慎矜以敬忠為證慎矜皆引服惟捜䜟書不獲林甫危之使盧鉉入長安捜慎矜家鉉袖䜟書入闇中詬而出曰逆賊深藏祕記至㑹昌以示慎矜歎曰吾不蓄䜟書此何從在吾家哉吾應死而已十一月丁酉賜慎矜及兄少府少監慎餘洛陽令慎名自盡敬忠杖一百妻子皆流嶺南瑄杖六十流臨封死於㑹昌嗣虢王巨雖不預謀坐與敬忠相識解官南賓安置自餘連坐者數十人愼名聞敇神色不變為書别姊愼餘合掌指天而縊三司按王忠嗣上曰吾兒居深宫安得與外人通謀此必妄也但劾忠嗣沮撓軍功哥舒翰之入朝也或勸多齎金帛以救忠嗣翰曰若直道尚存王公必不寃死如其將喪多賂何為遂單囊而行三司奏忠嗣罪當死翰始遇知於上力陳忠嗣之寃且請以己官爵贖忠嗣罪上起入禁中翰叩頭隨之言與淚俱上感悟己亥貶忠嗣漢陽太守李林甫屢起大獄别置推事院於長安以楊釗有掖廷之親出入禁闥所言多聴乃引以為援擢為御史事有微渉東宫者皆指摘使之奏劾付羅希奭吉溫鞫之釗因得逞其私志所擠陷誅夷者數百家皆釗發之幸太子仁孝謹靜張垍高力士常保護於上前故林甫終不能間也十二月丙寅命百官閲天下嵗貢物於尚書省既而悉以車載賜李林甫家上或時不視朝百司悉集林甫第門臺省為空陳希烈雖坐府無一人入謁者林甫子岫為將作監頗以滿盈為懼嘗從林甫遊後園指役夫言於林甫曰大人久處鈞軸怨仇滿天下一朝禍至欲為此得乎林甫不樂曰勢已如此將若之何先是宰相皆以徳度自處不事威勢騶從不過數人士民或不之避林甫自以多結怨常虞刺客出則步騎百餘人為左右翼金吾靜街前驅在數百步外公卿走避居則重關複壁以石甃地牆中置板如防大敵一夕屢徙牀雖家人莫知其處宰相騶從之盛自林甫始八載夏四月咸寧太守趙奉璋告李林甫罪二十餘條狀未達林甫知之諷御史逮捕以為妖言杖殺之九載夏四月己巳御史中丞宋渾坐􅂍巨萬流潮陽初吉溫因李林甫得進及兵部侍郎兼御史中丞楊釗恩遇浸深溫遂去林甫而附之為釗畫代林甫執政之策蕭炅及渾皆林甫所厚也求得其罪使釗奏而逐之以翦其心腹林甫不能救也十載春正月丁酉命李林甫遙領朔方節度使十一載户部侍郎兼御史大夫京兆尹王鉷弟户部郎中銲凶險不法召術士任海川問我有王者之相否海川懼亡匿鉷恐事泄捕得託以他事杖殺之王府司馬韋㑹定安公主之子王繇之同彥也話之私庭鉷又使長安尉賈季鄰收㑹繫獄縊殺之繇不敢言銲所善邢縡與龍武萬騎謀殺龍武將軍以其兵作亂殺李林甫陳希烈楊國忠前期二日有告之者夏四月乙酉上臨朝以告狀面授鉷使捕之鉷意銲在縡所先遣人召之日晏乃命賈季鄰等捕縡縡居金城坊季鄰等至門縡帥其黨數十人持弓刀格鬭突出鉷與楊國忠引兵繼至縡黨曰勿傷大夫人國忠之傔密謂國忠曰賊有號不可戰也縡鬭且走至皇城西南隅㑹高力士引飛龍禁軍四百至擊斬縡捕其黨皆擒之國忠以狀白上曰鉷必預謀上以鉷任遇深不應同逆李林甫亦為之辨解上乃命特原銲不問然意欲鉷表請罪之使國忠諷之鉷不忍上怒㑹陳希烈極言鉷大逆當誅戊子敕希烈與國忠鞫之仍以國忠兼京兆尹於是任海川韋㑹等事皆發獄具鉷賜自盡銲杖死於朝堂鉷子準偁流嶺南尋殺之有司籍其第舍數日不能徧鉷賓佐莫敢窺其門獨采訪判官裴冕收其尸葬之初李林甫以陳希烈易制引為相政事常隨林甫左右晩節遂與林甫為敵林甫懼㑹李獻忠叛林甫乃請解朔方節制且薦河西節度使安思順自代夏四月庚子以思順為朔方節度使初李林甫以國忠為才且貴妃之族故善遇之國忠與王鉷俱為中丞鉷用林甫徵為大夫故國忠不悦遂深探邢縡獄令引林甫交私鉷兄弟及阿布思事狀陳希烈哥舒翰從而證之上由是疎林甫國忠貴震天下始與林甫為仇敵矣南詔數冦邊蜀人請楊國忠赴鎮左僕射兼右相李林甫奏遣之國忠將行泣辭上言必為林甫所害貴妃亦為之請上謂國忠曰卿蹔到蜀區處軍事朕屈指待卿還當入相林甫時已有疾憂懣不知所為巫言一見上可小愈上欲就視之左右固諫上乃命林甫出庭中上登降聖閣遥望以紅巾招之林甫不能拜使人代拜國忠比至蜀上遣中使召還至昭應謁林甫拜於牀下林甫流涕謂曰林甫死矣公必為相以後事累公國忠謝不敢當汗流覆面十二月丁卯林甫薨上晚年自恃承平以為天下無復可憂遂深居禁中專以聲色自娯悉委政事於林甫林甫媚事左右迎合上意以固其寵杜絶言路掩蔽聦明以成其姦姤賢疾能排抑勝已以保其位屢起大獄誅逐貴臣以張其勢自皇太子以下畏之側足凡在相位十九年養成天下之亂而上不之寤也十二載楊國忠使人説安祿山誣李林甫與阿布思謀反祿山使阿布思部落降者詣闕誣告林甫與阿布思約為父子上信之下吏按問林甫壻諫議大夫楊齊宣懼為所累附國忠意證成之時林甫尚未葬二月癸未制削林甫官爵子孫有官爵者除名流嶺南及黔中給隨身衣及糧食自餘貲產並沒官近親及黨與坐貶者五十餘人剖林甫棺抉取含珠褫金紫更以小棺如庶人禮葬之己亥賜陳希烈爵許國公楊國忠爵魏國公賞其成林甫之獄也姦臣聚斂宇文融王鉷楊慎矜楊釗韋堅唐𤣥宗開元九年春正月監察御史宇文融上言天下户口逃移巧偽甚衆請加檢括融㢸之𤣥孫也源乾曜素愛其才贊成之二月乙酉敇有司議招集流移按詰巧偽之法以聞丁亥制州縣逃亡户口聽百日自首或於所在附籍或牒歸故鄉各從所欲過期不首即加檢括謫徙邊州公私敢容庇者扺罪以宇文融充使括逃移户口及籍外田所獲巧偽甚衆遷兵部員外郎兼侍御史融奏置勸農判官十人竝攝御史分行天下其新附客户免六年賦調使者兢為刻急州縣承風勞擾百姓苦之陽翟尉皇甫憬上疏言其狀上方任融貶憬盈川尉州縣希㫖務於獲多虚張其數或以實户為客凡得户八十餘萬田亦稱是十一年秋八月敇前令檢括逃人慮成煩擾令所在州縣安集遂其生業十二年夏六月壬辰制聽逃户自首闢所在閑田隨宜收税毋得差科征役租庸一皆蠲免仍以兵部員外郎兼侍御史宇文融為勸農使巡行州縣與吏民議定賦役秋八月已亥以宇文融為御史中丞乘驛周流天下事無大小諸州先牒上勸農使後申中書省司亦待融指撝然後處決時上將大攘四夷急於用度州縣畏融多張虚數凡得客户八十餘萬田亦稱是嵗終増緡錢數百萬悉進入宫由是有寵議者多言煩擾不利百姓上令集百寮於尚書省議之公卿已下畏融恩勢皆不敢立異惟户部侍郎楊㻛獨抗議以為括客免税不利居人徵籍外田税使百姓困弊所得不補所失未幾㻛出為華州刺史十三年以宇文融兼户部侍郎制以所得客户税錢均充常平倉本錢十四年中書令張説惡御史中丞宇文融之為人且患其權重融所建白多抑之夏四月壬子融及御史大夫崔隱甫御史中丞李林甫共彈説引術士占星徇私僭侈受納賄賂庚申罷説中書令十五年春正月御史大夫崔隱甫中丞宇文融恐右丞相張説復用數奏毁之各為朋黨上惡之二月乙巳制説致仕隱甫免官侍母融出為魏州刺史乙卯制諸州逃户先經勸農使括定按比後復有逃來者隨到準白丁例輸當年租庸有征役者免差十六年春正月甲寅以魏州刺史宇文融為户部侍郎兼魏州刺史充河北道宣撫使丙寅以魏州刺史宇文融檢校汴州刺史充河南北溝渠堤堰決九河使融請用禹貢九河故道開稻田并囘易陸運錢官收其利興役不息事多不就十七年宇文融性精敏應對辯給以治財賦得幸於上始廣置諸使競為聚斂由是百官浸失其職而上心益侈百姓皆怨苦之為人疎躁多言好自矜伐在相位謂人曰使吾居此數月則海内無事矣信安王褘以軍功有寵於上融疾之褘入朝融使御史李寅彈之泄於所親褘聞之先以白上明日寅奏果入上怒九月壬子融坐貶汝州刺史凡為相百日而罷是後言財利以取貴仕者皆祖於融冬十月宇文融既得罪國用不足上復思之謂裴光庭等曰卿等皆言融之惡朕既黜之矣今國用不足將若之何卿等何以佐朕光庭等懼不能對㑹有飛狀告融􅂍賄事又貶平樂尉至嶺外嵗餘司農少卿蔣岑奏融在汴州隱没官錢鉅萬計制窮治其事融坐流巖州道卒二十一年太府卿楊崇禮政道之子也在太府二十餘年前後為太府者莫能及時承平日久財貨山積嘗經楊卿者無不精美毎嵗鉤校省便出錢百萬緡是嵗以户部尚書致仕年九十餘矣上問宰相崇禮諸子誰能繼其父者對曰崇禮三子慎餘慎矜慎名皆亷勤有才而慎矜為優上乃擢慎矜自汝陽令為監察御史知太府出納慎名攝監察御史知含嘉倉出給亦皆稱職上甚悦之慎矜奏諸州所輸布帛有漬汚穿破者皆下本州徵折倍錢轉市輕貨徵調始繁矣天寶元年春三月以長安令韋堅為陜郡太守領江淮租庸轉運使初宇文融既敗言利者稍息及楊慎矜得幸於是韋堅王鉷之徒競以利進百司有事權者稍稍别置使以領之舊官充位而已堅太子之妃兄也為吏以幹敏稱上使之督江淮租運嵗増巨萬上以為能故擢任之王鉷方翼之孫也亦以善治租賦為户部員外郎兼侍御史二年春三月江淮南租庸等使韋堅引滻水抵苑東望春樓下為潭以聚江淮運船役夫匠通漕渠發人丘壟自江淮至京城民間蕭然愁怨二年而成丙寅上幸望春樓觀新潭堅以新船數百艘遍榜郡名各陳郡中珍貨於船背陜尉崔成甫著錦半臂缺胯綠衫而裼之紅袙首居前船唱得寶歌使美婦百人盛飾而和之連檣數里堅跪進諸郡輕貨仍上百牙盤食上置宴竟日而罷觀者山積夏四月加堅左散騎常侍其僚屬吏卒褒賞有差名其潭曰廣運四載秋九月癸未以陜郡太守江淮租庸轉運使韋堅為刑部尚書罷其諸使以御史中丞楊慎矜代之冬十月上以户部郎中王鉷為户口色役使敇賜百姓復除鉷奏徵其輦運之費廣張錢數又使市本郡輕貨百姓所輸乃甚於不復除舊制戍邊者免其租庸六歲而更時邊將恥敗士卒死者皆不申牒貫籍不除王鉷志在聚斂以有籍無人者皆為避課桉籍戍邊六嵗之外悉徴其租庸有倂徴三十年者民無所訴上在位久用度日侈後宫賞賜無節不欲數於左右藏取之鉷探知上指嵗貢額外錢帛百億萬貯於内庫以供宫中宴賜曰此皆不出於租庸調無預經費上以鉷為能富國益厚遇之鉷務為割剥以求媚中外嗟怨丙子以鉷為御史中丞京畿采訪使楊釗侍宴禁中專掌樗蒲文簿鉤校精密上賞其彊明曰好度支郎諸楊數徵此言於上又以屬王鉷鉷因奏充判官楊釗入禁中事見楊氏之寵七載度支郎中兼侍御史楊釗善窺上意所愛惡而迎之以聚斂驟遷嵗中領十五餘使夏六月甲辰遷給事中兼御史中丞專判度支事恩幸日隆蘇冕論曰設官分職各有司存政有恒而易守事歸本而難失經遠之理捨此奚據洎姦臣廣言利以邀恩多立使以示寵刻下民以厚斂張虚數以獻狀上心蕩而益奢人望怨而成禍使天子有司守其位而無其事受厚祿而虚其用宇文融首倡其端楊慎矜王鉷繼遵其軌楊國忠終成其亂仲尼云寧有盜臣而無聚斂之臣誠哉是言前車既覆後轍未改求達化本不亦難乎八載春二月戊申引百官觀左藏賜帛有差是時州縣殷富倉庫積粟帛動以萬計楊釗奏請所在糶變為輕貨及徵丁租地税皆變布帛輸京師屢奏帑藏充牣古今罕儔故上帥羣臣觀之賜釗紫衣金魚以賞之上以國用豐衍故視金帛如糞壤賞賜貴寵之家無有限極楊氏之寵唐𤣥宗天寶三載初武惠妃薨上悼念不已後宫數千無當意者或言壽王妃楊氏之美絶世無雙上見而悦之乃令妃自以其意乞為女官號太真更為壽王娶左衛郎將韋昭訓女潛内太真宫中太真肌態豐艶曉音律性警穎善承迎上意不期嵗寵遇如惠妃宫中號曰娘子凡儀體皆如皇后四載秋八月壬寅冊楊太真為貴妃贈其父𤣥琰兵部尚書以其叔父𤣥珪為光祿卿從兄銛為殿中少監錡為駙馬都尉癸卯冊武惠妃女為太華公主命錡尚之及貴妃三姊皆賜第京師寵貴赫然楊釗貴妃之從祖兄也不學無行為宗黨所鄙從軍於蜀得新都尉考滿家貧不能自歸新政富民鮮于仲通常資給之楊𤣥琰卒於蜀釗往來其家遂與其中女通鮮于仲通名向以字行頗讀書有材智劍南節度使章仇兼瓊引為采訪支使委以心腹嘗從容謂仲通曰今吾獨為上所厚茍無内援必為李林甫所危聞楊妃新得幸人未敢附之子能為我至長安與其家相結吾無患矣仲通曰仲通蜀人未嘗遊上國恐敗公事今為公更求得一人因言釗本末兼瓊引見釗儀觀甚偉言辭敏給兼瓊大喜即辟為推官往來浸親密乃使之獻春綵於京師將别謂曰有少物在郫以具一日之糧子過可取之釗至郫兼瓊使親信大齎蜀貨精美者遺之可直萬緡釗大喜過望晝夜兼行至長安歴抵諸妹以蜀貨遺之曰此章仇公所贈也時中女新寡釗遂館於其室中分蜀貨以與之於是諸楊日夜譽兼瓊且言釗善樗蒲引之見上得隨供奉官出入禁中改金吾兵曹參軍五載夏五月乙亥以劒南節度使章仇兼瓊為户部尚書諸楊引之也楊貴妃方有寵毎乘馬則高力士執轡授鞭織繡之工專供貴妃院者七百人中外爭獻器服珍玩嶺南經畧使張九章廣陵長史王翼以所獻精美九章加三品翼入為户部侍郎天下從風而靡民間歌之曰生男勿喜生女勿悲君今㸔女作門楣妃欲得生荔枝嵗命嶺南馳驛致之比至長安色味不變至是妃以妬悍不遜上怒命送歸兄銛之第是日上不懌比日中猶未食左右動不稱㫖橫被捶撻高力士欲嘗上意請悉載院中儲偫送貴妃凡百餘車上自分御膳以賜之及夜力士伏奏請迎貴妃歸院遂開禁門而入自是恩遇愈隆後宫莫得進矣七載冬十一月癸未以楊貴妃姊適崔氏者為韓國夫人適裴氏者為虢國夫人適栁氏者為秦國夫人三人皆有才色上呼之為姨出入宫掖並承恩澤勢傾天下毎命婦入見玉真公主等皆讓不敢就位三姊與銛錡五家凡有請託府縣承迎峻於制敇四方賂遺輻凑其門惟恐居後朝夕如市十宅諸王及百孫院昬嫁皆先以錢千緡賂韓虢使請無不如志上所賜與及四方獻遺五家如一競開第舍極其壯麗一堂之費動踰千萬既成見他人有勝己者輙毁而改為虢國尤為豪蕩一旦帥工徒突入韋嗣立宅即撤去舊屋自為新第但授韋氏以隙地十畆而已中堂既成召工圬墁約錢二百萬復求賞技虢國以絳羅五百叚賞之嗤而不顧曰請取螻蟻蜥蜴記其數置堂中茍失一物不敢受直九載春二月楊貴妃復忤㫖送歸私第户部郎中吉溫因宦官言於上曰婦人識慮不逺違忤聖心陛下何愛宫中一席之地不使之就死豈辱之於外舍邪上亦悔之遣中使賜以御膳妃對使者涕泣曰妾罪當死陛下幸不殺而歸之今當永離掖庭金玉珍玩皆陛下所賜不足為獻惟髮者父母所與敢以薦誠乃剪髮一繚而獻之上遽使高力士召還寵待益深時貴戚競以進食相尚上命宦官姚思藝為檢校進食使水陸珍羞數千盤一盤費中人十家之產中書舍人竇華嘗退朝值公主進食列於中衢傳呼按轡出其間宫苑小兒數百奮挺於前華僅以身免楊釗以圖䜟有金刀請更名上賜名國忠十載春正月庚子楊氏五宅夜遊與廣平公主從者爭西市門楊氏奴揮鞭及公主衣公主墜馬駙馬陳昌裔下扶之亦被數鞭公主泣訴於上上為之杖殺楊氏奴明日免昌裔官不聽朝謁十一載京兆尹王鉷權寵日盛領二十餘使鉷得罪敇楊國忠鞫之仍以國忠兼京兆尹夏五月丙辰楊國忠加御史大夫京畿關内採訪使凡王鉷所綰使務悉歸國忠十一月庚申以楊國忠為右相兼文部尚書其判使並如故國忠為人彊辯而輕躁無威儀既為相以天下為己任裁決機務果敢不疑居朝廷攘袂扼腕公卿以下頥指氣使莫不震慴自侍御史至為相凡領四十餘使臺省官有才行時名不為己用者皆出之或勸陜郡進士張彖謁國忠曰見之富貴立可圖彖曰君輩倚楊右相為泰山吾以為冰山耳若皎日既出君輩得無失所恃乎遂隱居嵩山十二月楊國忠欲收人望建議文部選人無問賢不肖選深者留之依資據闕注官滯淹者翕然稱之國忠凡所施置皆曲徇時人所欲故頗得衆譽十二載春正月京兆尹鮮于仲通諷選人請為國忠刻頌立於省門制仲通撰其辭上為改定數字仲通以金填之冬十月上幸華清宫楊國忠與虢國夫人居第相鄰晝夜往來無復期度或竝轡走馬入朝不施鄣幕道路為之掩目三夫人將從車駕幸華清宫㑹於國忠第車馬僕從充溢數坊錦繡珠玉鮮華奪目國忠謂客曰吾本寒家一旦緣椒房至此未知税駕之所然念終不能致令名不若且極樂耳楊氏五家隊各為一色衣以相别五家合隊粲若雲錦國忠仍以劍南旌節引於其前國忠子暄舉明經學業荒陋不及格禮部侍郎達奚珣畏國忠權勢遣其子昭應尉撫先白之撫伺國忠入朝上馬趨至馬下國忠意其子必中選有喜色撫曰大人白相公郎君所試不中程式然亦未敢落也國忠怒曰我子何患不富貴乃令鼠輩相賣䇿馬不顧而去撫惶遽書白其父曰彼恃挾貴勢令人慘嗟安可復與論曲直遂置暄上等及暄為户部侍郎珣始自禮部遷吏部暄與所親言猶歎已之淹囘珣之迅疾國忠既居要地中外餉遺輻凑積縑至三千萬匹十三載春二月丁丑楊國忠進位司空甲申臨軒冊命自去嵗水旱相繼闗中大饑楊國忠惡京兆尹李峴出入禁中因請為貴妃兒上與貴妃共坐祿山先拜貴妃上問何故對曰胡人先母而後父上悦李林甫以王忠嗣功名日盛恐其入相忌之安祿山潛蓄異志託以禦寇築雄武城大貯兵器請忠嗣助役因欲留其兵忠嗣先期而往不見祿山而還數上言祿山必反林甫益惡之唐興以來邊帥皆用忠厚名臣不久任不遙領不兼統功名著者往往入為宰相其四夷之將雖才略如阿史那社爾契苾何力猶不專大將之任皆以大臣為使以制之及開元中天子有吞四夷之志為邊將者十餘年不易始久任矣皇子則慶忠諸王宰相則蕭嵩牛仙客始遥領矣蓋嘉運王忠嗣專制數道始兼統矣李林甫欲杜邊帥入相之路以胡人不知書乃奏言文臣為將怯當矢石不若用寒族胡人胡人則勇決習戰寒族則孤立無黨陛下誠以恩洽其心彼必能為朝廷盡死上悦其言始用安祿山至是諸道節度使盡用胡人精兵咸戍北邊天下之勢偏重卒使祿山傾覆天下臣討契丹至北平郡夢先朝名將李靖李勣從臣求食遂命立廟又奏薦奠之日廟梁產芝六載春正月戊寅以范陽平盧節度使安祿山兼御史大夫祿山體充肥腹垂過膝嘗自稱重三百斤外若癡直内實狡黠常令其將劉駱谷留京師詷朝廷指趣動靜皆報之或應有牋表者駱谷即為代作通之歲獻俘虜雜畜竒禽異獸珍玩之物不絶於路郡縣疲於遞運祿山在上前應對敏給雜以詼諧上嘗戲指其腹曰此胡腹中何所有其大乃爾對曰更無餘物止有赤心耳上悦又嘗命見太子祿山不拜左右趣之拜祿山拱立曰臣胡人不習朝儀不知太子者何官上曰此儲君也朕千秋萬嵗後代朕君汝者也祿山曰臣愚曏者惟知有陛下一人不知乃更有儲君不得已然後拜上以為信然益愛之上嘗宴勤政樓百官列坐樓下獨為祿山於御座東間設金雞障置榻使坐其前仍命捲簾以示滎寵命楊銛楊錡貴妃三姊皆與祿山叙兄弟祿山得上左右至平盧祿山皆厚賂之由是上益以為賢御史中丞張利貞為河北采訪使至平盧祿山曲事利貞乃至左右皆有賂利貞入奏盛稱祿山之美八月乙未以祿山為營州都督充平盧軍使兩蕃勃海黑水四府經畧使天寶元年分平盧别為節度以安祿山為節度使二年春正月安祿山入朝上寵待甚厚謁見無時祿山奏言去秋營州蟲食苖臣焚香祝天云臣若操心不正事君不忠願使蟲食臣心若不負神祗願使蟲散即有羣烏從北來食蟲立盡請宣付史官從之三載春三月己巳以平盧節度使安祿山兼范陽節度使以范陽節度使裴寛為户部尚書禮部尚書席建侯為河北黜陟使稱祿山公直李林甫裴寛皆順㫖稱其美三人皆上所信任由是祿山之寵益固不揺矣四載秋九月安祿山欲以邊功市寵數侵掠奚契丹奚契丹各殺公主以叛祿山討破之冬十月安禄山奏安氏名祿山又有史窣干者與祿山同里閈先後一日生及長相親愛皆為互市牙郎以驍勇聞張守珪以祿山為捉生將祿山每與數騎出輙擒契丹數十人而返狡黠善揣人情守珪愛之養以為子窣干嘗負官債亡入奚中為奚遊奕所得欲殺之窣干紿曰我唐之和親使也汝殺我禍且及汝國遊奕信之送詣牙帳窣干見奚王長揖不拜奚王雖怒而畏唐不敢殺以客禮館之使百餘人隨窣干入朝窣干謂奚王曰王所遣人雖多觀其才皆不足以見天子聞王有良將瑣高者何不使之入朝奚王即命瑣高與牙下三百人隨窣干入朝窣干將至平盧先使人謂軍使裴休子曰奚使瑣高與精鋭俱來聲云入朝實欲襲軍城宜謹為之備先事圖之休子乃具軍容出迎至館悉阬殺其從兵執瑣高送幽州張守珪以窣干為有功奏為果毅累遷將軍後入奏事上與語悦之賜名思明二十九年平盧兵馬使安祿山傾巧善事人人多譽之㑹吐蕃使者二十餘人遮國忠馬訴以無食國忠未及對軍士追殺之幷殺其子暄及韓國秦國夫人上命高力士縊貴妃於佛堂國忠妻裴柔與其幼子晞及虢國夫人夫人子裴徽走至陳倉吏士追捕誅之事見安史之亂安史之亂唐𤣥宗開元二十四年春三月張守珪使平盧討擊使左驍衛將軍安祿山討奚契丹叛者祿山恃勇輕進為虜所敗夏四月辛亥守珪奏請斬之祿山臨刑呼曰大夫不欲滅奚契丹邪奈何殺祿山守珪亦惜其驍勇欲活之乃更執送京師張九齡批曰昔穰苴誅莊賈孫武斬宫嬪守珪軍令若行祿山不宜免死上惜其才敇令免官以白衣將領九齡固爭曰祿山失律喪師於法不可不誅且臣觀其貌有反相不殺必為後患上曰卿勿以王夷甫識石勒枉害忠良竟赦之安祿山者本營州雜胡初名阿犖山其母巫也父死母攜之再適突厥安延偃㑹其部落破散與延偃兄子思順俱逃來故冒姓不附已以災沴歸咎於峴九月貶長沙太守峴褘之子也上憂雨傷稼國忠取禾之善者獻之曰雨雖多不害稼也上以為然扶風太守房琯言所部水災國忠使御史推之是嵗天下無敢言災者高力士侍側上曰淫雨不已卿可盡言對曰自陛下以權假宰相賞罰無章隂陽失度臣何敢言上黙然十四載安祿山反冬十二月上議親征辛丑制太子監國謂宰相曰朕在位埀五十載倦於憂勤去秋己欲傳位太子值水旱相仍不欲以餘災遺子孫淹留俟稍豐不意逆胡橫發朕當親征且使之監國事平之日朕將高枕無為矣楊國忠大懼退謂韓虢秦三夫人曰太子素惡吾家專橫久矣若一旦得天下吾與姊妹倂命在旦暮矣相與聚哭使三夫人説貴妃銜土請命於上事遂寢肅宗至徳元載楊國忠勸上幸蜀上至馬嵬驛將士飢疲皆憤怒龍武大將軍陳𤣥禮以禍由楊國忠欲誅之皆出於林甫專寵固位之謀也七載夏六月庚子賜安祿山鐵券九載夏五月乙卯賜安祿山爵東平郡王唐將帥封王自此始秋八月丁巳以安祿山兼河北道采訪處置使安祿山屢誘奚契丹為設㑹飲以莨菪酒醉而阬之動數千人函其酋長之首以獻前後數四至是請入朝上命有司先為起第於昭應祿山至戲水楊釗兄弟姊妹皆往迎之冠蓋蔽野上自幸望春宫以待之冬十月辛未祿山獻奚俘八千人上命考課之日書上上考前此聽祿山於山谷鑄錢五壚祿山乃獻錢様千緡十載春正月上命有司為安祿山起第於親仁坊敇令但窮壯麗不限財力既成具幄帟器皿充牣其中有帖白檀牀二皆長丈濶六尺銀平脱屛風帳一方一丈八尺於厨廏之物皆飾以金銀金飯甖二銀淘盆二皆受五斗織銀絲筐及笊篱各一他物稱是雖禁中服御之物殆不及也上毎令中使為祿山護役築第及造儲偫賜物常戒之曰胡眼大勿令笑我祿山入新第置酒乞降墨敇請宰相至第是日上欲於樓下擊毬遽為罷戲命宰相赴之日遣諸楊與之選勝遊宴侑以梨園教坊樂上毎食一物稍美或後苑校獵獲鮮禽輙遣中使走馬賜之絡繹於路甲辰祿山生日上及貴妃賜衣服寶器酒饌甚厚後三日召祿山入禁中貴妃以錦繡為大襁褓裹祿山使宫人以綵輿舁之上聞後宫喧笑問其故左右以貴妃三日洗祿山兒對上自往觀之喜賜貴妃洗兒金銀錢復厚賜祿山盡歡而罷自是祿山出入宫掖不禁或與貴妃對食或通宵不出頗有醜聲於外上亦不疑也安祿山求兼河東節度使二月丙辰以河東節度使韓休珉為左羽林將軍以祿山代之户部郎中吉溫見祿山有寵又附之約為兄弟説祿山曰李右丞相雖以時事親三兄必不肯以兄為相温雖䝉驅使終不得超擢兄若薦溫於上溫即奏兄堪大任共排林甫出之為相必矣祿山悦其言數稱溫才於上上亦忘曩日之言㑹祿山領河東因奏溫為節度副使知留後以大理司直張通儒為留後判官河東事悉以委之是時楊國忠為御史中丞方承恩用事祿山登降殿階國忠常扶掖之祿山見王鉷俱為大夫鉷權任亞於李林甫祿山見林甫禮貌頗倨林甫陽以他事召王大夫鉷至趨拜甚謹祿山不覺自失容貌益恭林甫與祿山語毎揣知其情先言之祿山驚服祿山於公卿皆慢侮之獨憚林甫毎見雖盛冬常汗沾衣林甫乃引與坐於中書㕔撫以温言自解披袍以覆之祿山忻荷言無不盡謂林甫為十郎既歸范陽劉駱谷毎自長安來必問十郎何言得美言則喜或但云語安大夫須好檢校輒反手據牀曰噫嘻我死矣祿山既兼領三鎮賞刑已出日益驕恣自以曩時不拜太子見上春秋高頗内懼又見武備墮弛有輕中國之心孔目官嚴莊掌書記高尚因為之解圖䜟勸之作亂祿山養同羅奚契丹降者八千餘人謂之曳落河曳落河者胡言壯士也及家僮百餘人皆驍勇善戰一可當百又畜戰馬數萬匹多聚兵仗分遣商胡詣諸道販鬻嵗輸珍貨數百萬私作緋紫袍魚袋以百萬計以高尚嚴莊張通儒及將軍孫孝哲為腹心史思明安守忠李歸仁蔡希徳牛廷玠向潤容李庭望崔乾祐尹子竒何千年武令珣能元皓田承嗣田乾真阿史那承慶為爪牙尚雍奴人本名不危頗有辭學薄遊河朔貧困不得志常歎曰高不危當舉大事而死豈能齧草根求活耶祿山引置幕府出入臥内尚典牋奏莊治簿書通儒萬歲之子孝哲契丹也承嗣世為盧龍小校祿山以為前鋒兵馬使治軍嚴整嘗大雪祿山按行諸營至承嗣營寂若無人入閲士卒無一人不在者祿山以是重之十一載冬十二月甲申以平盧兵馬使史思明兼北平太守充盧龍軍使哥舒翰素與安祿山安思順不恊上常和解之使為兄弟是冬三人俱入朝上使高力士宴之於城東祿山謂翰曰我父胡母突厥公父突厥母胡族類頗同何得不相親翰曰古人云狐向窟嘷不祥為其忘本故也兄茍見親翰敢不盡心祿山以為譏其胡也大怒罵翰曰突厥敢爾翰欲應之力士目翰翰乃止陽醉而散自是為怨愈深十二載夏五月阿布思為囘紇所破安祿山誘其部落而降之由是祿山精兵天下莫及安祿山以李林甫狡猾踰已故畏服之及楊國忠為相祿山視之蔑如也由是有隙國忠屢言祿山有反狀上不聽楊國忠欲厚結翰與共排安祿山奏以翰兼河西節度使秋八月戊戌賜翰爵西平郡王十三載春正月己亥祿山入朝是時楊國忠言祿山必反且曰陛下試召之必不來上使召之祿山聞命即至庚子見上於華清宫泣曰臣本胡人陛下寵擢至此為國忠所疾臣死無日矣上憐之賞賜巨萬由是益親信祿山國忠之言不能入矣太子亦知祿山必反言於上上不聽上欲加安祿山同平章事己令張垍草制楊國忠諫曰祿山雖有軍功目不知書豈可為宰相制書若下恐四夷輕唐上乃止己巳加祿山左僕射賜一子三品一子四品官安祿山求兼領閑廏羣牧庚申以祿山為閑廏隴右羣牧等使祿山又求兼揔監壬戌兼知揔監事祿山奏以御史中丞吉溫為武部侍郎充閑廏副使楊國忠由是惡溫祿山密遣親信選健馬堪戰者數千匹别飼之二月己丑安祿山奏臣所部將士討奚契丹九姓同羅等勲效甚多乞不拘常格超資加賞仍好寫告身付臣軍授之於是除將軍者五百餘人中郎將者二千餘人祿山欲反故先以此收衆心也三月丁酉朔祿山辭歸范陽上解御衣以賜之祿山受之驚喜恐楊國忠奏留之疾驅出關乘船渡河而下令船夫執繩板立於岸側十五里一更晝夜兼行數百里過郡縣不下船自是有言祿山反者上皆縛送之由是人皆知其將反無敢言者祿山之發長安也上命高力士餞之長樂坂及還上問祿山慰意乎對曰觀其意怏怏必知欲命為相而中止故也上以告國忠曰此議他人不知必張垍兄弟告之也上怒貶張均為建安太守垍為盧溪司馬弟給事中埱為宜春司馬十四載春二月辛亥安祿山使副將何千年入奏請以蕃將三十二人代漢將上命立進畫給告身韋見素謂楊國忠曰祿山久有異志今又有此請其反明矣明日見素當極言上未允公其繼之國忠許諾壬子國忠見素入見上迎謂曰卿等有疑祿山之意耶見素因極言祿山反已有迹所請不可許上不悦國忠逡巡不敢言上竟從祿山之請他日國忠見素言於上曰臣有策可坐消祿山之謀今若除祿山平章事召詣闕以賈循為范陽節度使吕知誨為平盧節度使楊光翽為河東節度使則勢自分矣上從之已草制上留不發更遣中使輔璆琳以珍果賜祿山潛察其變璆琳受祿山厚賂還盛言祿山竭忠奉國無有二心上謂國忠等曰祿山朕推心待之必無異志東北二虜藉其鎮遏朕自保之卿等勿憂也事遂寢安祿山歸至范陽朝廷毎遣使者至皆稱疾不出迎盛陳武備然後見之裴士淹至范陽二十餘日乃得見無復人臣禮楊國忠日夜求祿山反狀使京兆尹圍其第捕祿山客李超等送御史臺獄潛殺之祿山子慶宗尚宗女榮義郡主供奉在京師密報祿山祿山愈懼六月上以其子成婚手詔召祿山觀禮祿山辭疾不至秋七月祿山表獻馬三千匹毎匹執鞚夫二人遣蕃將二十二人部送河南尹達奚珣疑有變奏請諭祿山以進車馬宜俟至冬官自給夫無煩本軍於是上稍寤始有疑祿山之意㑹輔璆琳受賂事亦泄上託以他事樸殺之上遣中使馮神威齎手詔諭祿山如珣策且曰朕新為卿作一湯十月於華清宫待卿神威至范陽宣㫖祿山踞牀微起亦不拜曰聖人安穩又曰馬不獻亦可十月灼然詣京師卽令左右引神威置館舍不復見數日遣還亦無表神威還見上泣曰臣幾不得見大家安祿山專制三道陰蓄異志殆將十年以上待之厚欲俟上晏駕然後作亂㑹楊國忠與祿山不相悦屢言祿山且反上不聽國忠數以事激之欲其速反以取信於上祿山由是決意遽反獨與孔目官太僕丞嚴莊掌書記屯田員外郎高尚將軍阿史那承慶密謀自餘將佐皆莫之知但怪其自八月以來屢饗士卒秣馬厲兵而已㑹有奏事官自京師還祿山詐為敇書悉召諸將示之曰有密㫖令祿山將兵入朝討楊國忠諸君宜卽從軍衆愕然相顧莫敢異言十一月甲子祿山發所部兵及同羅奚契丹室韋凡十五萬衆號二十萬反於范陽命范陽節度副使賈循守范陽平盧節度副使吕知誨守平盧别將高秀巖守大同諸將皆引兵夜發詰朝祿山出薊城南大閲誓衆以討楊國忠為名牓軍中曰有異議扇動軍人者斬及三族於是引兵而南祿山乘鐵轝步騎精鋭烟塵千里鼔譟震地時海内久承平百姓累世不識兵革猝聞范陽兵起逺近震駭河北皆祿山統内所過州縣望風瓦解守令或開門出迎或棄城竄匿或為所擒戮無敢拒之者祿山先遣將軍何千年高邈將奚騎二十聲言獻射生手乘驛詣太原乙丑北京副留守楊光翽出迎因劫之以去太原具言其狀東受降城亦奏祿山反上猶以為惡祿山者詐為之未之信也庚午上聞祿山定反乃召宰相謀之楊國忠揚揚有得色曰今反者獨祿山耳將士皆不欲也不過旬日必傳首詣行在上以為然大臣相顧失色上遣特進畢思琛詣東京金吾將軍程千里詣河東各簡募數萬人隨便團結以拒之辛未安西節度使封常清入朝上問以討賊方畧常清大言曰今太平積久故人望風憚賊然事有逆順勢有竒變臣請走馬詣東京開府庫募驍勇挑馬箠渡河計日取逆胡之首獻闕下上悦壬申以常清為范陽平盧節度使常清卽日乘驛詣東京募兵旬日得六萬人乃斷河陽橋為守禦之備甲戌安祿山至博陵南何千年等執楊光翽見祿山責光翽以附楊國忠斬之以徇祿山使其將安忠志將精兵軍土門忠志奚人祿山養為假子又以張獻誠攝博陵太守獻誠守珪之子也祿山至藁城常山太守顏杲卿力不能拒與長史袁履謙往迎之祿山輒賜杲卿金紫質其子弟使仍守常山又使其將李欽凑將兵數千人守井陘口以備西來諸軍杲卿歸途中指其衣謂履謙曰何為著此履謙悟其意乃陰與杲卿謀起兵討祿山杲卿思魯之𤣥孫也丙子斬太僕卿安慶宗賜榮義郡主自盡以朔方節度使安思順為户部尚書思順弟元貞為太僕卿以朔方右廂兵馬使九原太守郭子儀為朔方節度使右羽林大將軍王承業為太原尹置河南節度使領陳留等十三郡以衛尉卿猗氏張介然為之以程千里為潞州長史諸郡當賊衝者始置防禦使丁丑以榮王琬為元帥右金吾大將軍高仙芝副之統諸軍東征出内府錢帛於京師募兵十一萬號曰天武軍旬日而集皆市井子弟也十二月丙戌高仙芝將飛騎彍騎及新募兵邊兵在京師者合五萬人發長安上遣宦者監門將軍邊令誠監其軍屯於陜丁亥安祿山自靈昌渡河以絙約敗船及草木横絶河流一夕冰合如浮梁遂陷靈昌郡祿山步騎散漫人莫知其數所過殘滅張介然至陳留纔數日祿山至授兵乘城衆忷懼不能守庚寅太守郭納以城降祿山入北郭聞安慶宗死慟哭曰我何罪而殺我子時陳留將士降者夾道近萬人祿山皆殺之以快其忿斬張介然於軍門以其將李庭望為節度使守陳留壬辰上下制欲親征其朔方河西隴右兵留守城堡之外皆赴行營令節度使自將之期二十日畢集初平原太守顏真卿知祿山且反因霖雨完城浚壕料丁壯實倉廩祿山以其書生易之及祿山反牒真卿以平原博平兵七千人防河津真卿遣平原司兵李平間道奏之上始聞祿山反河北郡縣皆風靡歎曰二十四郡曽無一人義士邪及平至大喜曰朕不識顏真卿作何狀乃能如是真卿使親客密懷購賊牒詣諸郡由是諸郡多應者真卿杲卿之從弟也安祿山引兵向榮陽太守崔無詖拒之士卒乘城者聞鼓角聲自墜如雨癸巳祿山陷榮陽殺無詖以其將武令珣守之祿山聲勢益張以其將田承嗣安忠志張孝忠為前鋒封常清所募兵皆白徒未更訓練屯武牢以拒賊賊以鐵騎蹂之官軍大敗常清收餘衆戰於蔡園又敗戰上東門内又敗丁酉祿山陷東京賊鼓譟自四門入縱兵殺掠常清戰於都亭驛乂敗退守宣仁門又敗乃自苑西壞牆西走河南尹達奚珣降於祿山留守李憕謂御史中丞盧奕曰吾曹荷國重任雖知力不敵必死之奕許諾憕收殘兵數百欲戰皆棄憕潰去憕獨坐府中奕先遣妻子懷印間道走長安朝服坐臺中左右皆散祿山屯於閑廏使人執憕奕及采訪判官蔣清皆殺之奕罵祿山數其罪顧賊黨曰凡為人當知逆順我死不失節夫復何恨憕文水人奕懷慎之子清欽緒之子也祿山以其黨張萬頃為河南尹封常清帥餘衆至陜陜郡太守竇廷芝已犇河東吏民皆散常清謂高仙芝曰常清連日血戰賊鋒不可當且潼關無兵若賊豕突入關則長安危矣陜不可守不如引兵先據潼關以拒之仙芝乃帥見兵西趣潼關賊尋至官軍狼狽走無復部伍士馬相騰踐死者甚衆至潼關修完守備賊至不得入而去祿山使其將崔乾祐屯陜臨汝𢎞農濟陰濮陽雲中郡皆降於祿山是時朝廷徵兵諸道皆未至闗中忷懼㑹祿山方謀稱帝留東京不進故朝廷得為之備兵亦稍集祿山以張通儒之弟通晤為睢陽太守與陳留長史楊朝宗將胡騎千餘東略地郡縣官多望風降走惟東平太守嗣呉王祗濟南太守李隨起兵拒之祗禕之弟也郡縣之不從賊者皆倚呉王為名單父尉賈賁帥吏民南擊睢陽斬張通晤李庭望引兵欲東徇地聞之不敢進而還上議親征太子監國楊國忠使貴妃請命事遂寢事見楊氏之寵顏真卿召募勇士旬日至萬餘人諭以舉兵討安祿山繼以涕泣士皆感憤祿山使其黨叚子光齎李憕盧奕蔣清首徇河北諸郡至平原壬寅真卿執子光腰斬以徇取三人首續以蒲身棺斂葬之祭哭受弔祿山以海運使劉道𤣥攝景城太守清池尉賈載鹽山尉河内穆寧共斬道𤣥得其甲仗五十餘船􅂝道𤣥首謁長史李暐暐收嚴莊宗族悉誅之是日送道𤣥首至平原真卿召載寧及清河尉張澹詣平原計事饒陽太守盧全誠據城不受代河間司法李奐殺祿山所署長史王懷忠李隨遣遊弈將訾嗣賢濟河殺祿山所署博平太守馬冀各有衆數千或萬人共推真卿為盟主軍事皆禀焉祿山使張獻誠將上谷博陵常山趙郡文安五郡團結兵萬人圍饒陽高仙芝之東征也監軍邊令誠數以事干之仙芝多不從令誠入奏事具言仙芝常清撓敗之狀且云常清以賊搖衆而仙芝棄陜地數百里又盜減軍士糧賜上大怒癸卯遣令誠齎敇即軍中斬仙芝及常清初常清既敗三遣使奉表陳賊形勢上皆不之見常清乃自馳詣闕至渭南敇削其官爵令還仙芝軍白衣自効常清草遺表曰臣死之後望陛下不輕此賊無忘臣言時朝議皆以為祿山狂悖不日授首故常清云然令誠至潼關先引常清宣敇示之常清以表附令誠上之常清既死陳尸蘧除仙芝還至聽事令誠索陌刀手百餘人自隨乃謂仙芝曰大夫亦有恩命仙芝遽下令誠宣敇仙芝曰我遇敵而退死則宜矣今上戴天下履地謂我盜減糧賜則誣也時士卒在前皆大呼稱枉其聲振地遂斬之以將軍李承光攝領其衆河西隴右節度使哥舒翰病廢在家上藉其威名且素與祿山不協召見拜兵馬副元帥將兵八萬以討祿山仍敇天下四面進兵㑹攻洛陽翰以疾固辭上不許以田良丘為御史中丞充行軍司馬起居郎蕭昕為判官蕃將火拔歸仁等各將部落以從並仙芝舊卒號二十萬軍于潼關翰病不能治事悉以軍政委田良丘良丘復不敢專決使王思禮主騎李承光主步二人爭長無所統壹翰用法嚴而不恤士卒皆解弛無鬭志安祿山大同軍使高秀巖寇振武軍朔方節度使郭子儀擊敗之顏杲卿將起兵參軍馮䖍前真定令賈深藁城尉崔安石郡人翟萬徳内丘丞張通幽皆預其謀又遣人語太原尹王承業密與相應㑹顏真卿自平原遣杲卿甥盧逖潛告杲卿欲連兵斷祿山歸路以緩其西入之謀時祿山遣其金吾將軍高邈詣幽州徵兵未還杲卿以祿山命召李欽湊使帥衆詣郡受犒賚丙午薄暮欽湊至杲卿使袁履謙馮䖍等攜酒食妓樂往勞之並其黨皆大醉乃斷欽湊首收其甲兵盡縛其黨明日斬之悉散井陘之衆有頃高邈自幽州還且至藁城杲卿使馮䖍往擒之南境又白何千年自東京來崔安石與翟萬徳馳詣醴泉驛迎千年又擒之同日致於郡下千年謂杲卿曰今太守欲輸力王室既善其始當慎其終此郡應募烏合難以臨敵宜深溝高壘勿與爭鋒俟朔方軍至併力齊進傳檄趙魏斷燕薊要膂彼則成擒矣今且宜聲云李光弼引步騎一萬出井陘因使人説張獻誠云足下所將多團練之人無堅甲利兵難以當山西勁兵獻誠必解圍遁去此亦一竒也杲卿悦用其策獻誠果遁去其團練兵皆潰杲卿乃使人入饒陽城慰勞將士命崔安石等徇諸郡云大軍已下井陘朝夕當至先平河北諸郡先下者賞後至者誅於是河北諸郡響應凡十七郡皆歸朝廷兵合二十餘萬兵附祿山者唯范陽盧龍密雲漁陽汲鄴六郡而已杲卿又密使人入漁陽招賈循郟城人馬燧説循曰祿山負恩悖逆雖得洛陽終歸夷滅公若誅諸將之不從命者以范陽歸國傾其根柢此不世之功也循然之猶豫不時發别將牛潤容知之以告祿山祿山使其黨韓朝陽召循朝陽至漁陽引循屛語使壯士縊殺之滅其族以别將牛廷玠知范陽軍事史思明李立節將蕃漢步騎萬人擊博陵常山馬燧亡入西山隱者徐遇匿之得免初祿山自將欲攻潼關至新安聞河北有變而還蔡希徳將兵萬人自河内北擊常山通鑑紀事本末卷三十一上欽定四庫全書通鑑紀事本末卷三十一中宋袁樞撰安史之亂二肅宗至徳元載春正月乙卯朔祿山自稱大燕皇帝改元聖武以達奚珣為侍中張通儒為中書令高尚嚴莊為中書侍郎李隨至睢陽有衆數萬丙辰以隨為河南節度使以前高要尉許逺為睢陽太守兼防禦使濮陽客尚衡起兵討祿山以郡人王栖曜為衙前揔管攻拔濟陰殺祿山將邢超然顏杲卿使其子泉明賈深翟萬徳獻李欽湊首及何千年高邈於京師張通幽泣請曰通幽兄陷賊乞與泉明偕行以救宗族杲卿哀而許之至太原通幽欲自託於王承業乃教之留泉明等更其表多自為功毁短杲卿别遣使獻之杲卿起兵纔八日守備未完史思明蔡希徳引兵皆至城下杲卿告急於承業承業既竊其功利於城陷遂擁兵不救杲卿晝夜拒戰糧盡矢竭壬戌城陷賊縱兵殺萬餘人執杲卿及袁履謙等送洛陽王承業使者至京師𤣥宗大喜拜承業羽林大將軍麾下受官爵者以百數徵顏杲卿為衛尉卿朝命未至常山已陷杲卿至洛陽祿山數之曰汝自范陽功曹我奏汝為判官不數年超至太守何負於汝而反邪杲卿瞑目罵曰汝本營州牧羊羯奴天子擢汝為三道節度使恩幸無比何負於汝而反我世為唐臣祿位皆唐有雖為汝所奏豈從汝反邪我為國討賊恨不斬汝何謂反也臊羯狗何不速殺我祿山大怒並袁履謙等縛於中橋之柱而咼之杲卿履謙比死罵不虚口顏氏一門死於刀鋸者三十餘人史思明李立節蔡希徳既克常山引兵擊諸郡之不從者所過殘滅於是鄴廣平鉅鹿趙上谷博陵文安魏信都等郡復為賊守饒陽太守盧全誠獨不從思明等圍之河間司法李奐將七千人景城長史李暐遣其子祀將八千人救之皆為思明所敗上命郭子儀罷圍雲中還朔方益發兵進取東京選良將一人分兵先出井陘走河北子儀薦李光弼癸亥以光弼為河東節度使分朔方兵萬人與之甲子加哥舒翰左僕射同平章事乙丑安祿山遣其子慶緒寇潼關哥舒翰擊却之己巳加顏真卿户部侍郎兼本郡防禦使真卿以李暐為副二月丙戌加李光弼魏郡太守河北道采訪使史思明等圍饒陽二十九日不下李光弼將蕃漢步騎萬餘人太原弩手三千人出井陘己亥至常山常山團練兵三千人殺胡兵執安思義出降光弼謂思義曰汝自知當死否思義不應光弼曰汝久更陳行視吾此衆可敵思明否今為我計當如何汝策可取當不殺汝思義曰大夫士馬逺來疲弊猝遇大敵恐未易當不如移軍入城早為備禦先料勝負然後出兵胡騎雖鋭不能持重茍不獲利氣沮心離於時乃可圖矣思明今在饒陽去此不二百里昨暮羽書已去計其先鋒來晨必至而大軍繼之不可不留意也光弼悦釋其縛即移軍入城史思明聞常山不守立解饒陽之圍明日未旦先鋒已至思明等繼之合二萬餘騎直抵城下光弼遣步卒五千自東門出戰賊守門不退光弼命五百弩於城上齊發射之賊稍却乃出弩手千人分為四隊使其矢發相繼賊不能當斂軍道北光弼出兵五千為槍城於道南夾呼沱水而陳賊數以騎兵搏戰光弼之兵射之人馬中矢者大半乃退小憩以俟步兵有村民告賊步兵五千自饒陽來晝夜行百七十里歴九門南逢壁度憩息光弼遣步騎各二千匿旗鼓竝水潛行至逢壁賊方飯縱兵掩擊殺之無遺思明聞之失勢退入九門時常山九縣七附官軍惟九門藁城為賊所據光弼遣禆將張奉璋以兵五百戍石邑餘皆三百人戍之上以呉王祗為靈昌太守河南都知兵馬使賈賁前至雍丘有衆二千先是譙郡太守楊萬石以郡降安祿山逼真源令河東張巡使為長史西迎賊巡至真源帥吏民哭於𤣥元皇帝廟起兵討賊吏民樂從者數千人巡選精兵千人西至雍丘與賈賁合初雍丘令令狐潮以縣降賊賊以為將使東擊淮陽救兵於襄邑破之俘百餘人拘於雍丘將殺之往見李庭望淮陽兵遂殺守者潮棄妻子走故賈賁得以其間入雍丘庚子潮引賊精兵攻雍丘賁出戰敗死張巡力戰却賊因兼領賁衆自稱呉王先鋒使三月乙卯潮復與賊將李懷仙楊朝宗謝元同等四萬餘衆奄至城下衆懼莫有固志巡曰賊兵精鋭有輕我心今出其不意擊之彼必驚潰賊勢小折然後城可守也乃使千人乘城自帥千人分數隊開門突出巡身先士卒直衝賊陳人馬辟易賊遂退明日復進攻城設百礮環城樓堞皆盡巡於城上立木柵以拒之賊蟻附而登巡束蒿灌脂焚而投之賊不得上時伺賊隙出兵擊之或夜縋斫營積六十餘日大小三百餘戰帶甲而食裹瘡復戰賊遂敗走巡乘勝追之獲胡兵二千人而還軍聲大振初户部尚書安思順知祿山反謀因入朝奏之及祿山反上以思順先奏不之罪也哥舒翰素與之有隙使人詐為祿山遺思順書於關門擒之以獻且數思順七罪請誅之丙辰思順及弟太僕卿元貞皆坐死家屬徙嶺外楊國忠不能救由是始畏翰郭子儀至朔方益選精兵戊午進軍於代戊辰呉王祗擊謝元同走之拜陳留太守河南節度使壬午以河東節度使李光弼為范陽長史河北節度使加顔真卿河北采訪使真卿以張澹為支使先是清河客李萼年二十餘為郡人乞師於真卿曰公首唱大義河北諸郡恃公以為長城今清河公之西鄰國家平日聚江淮河南錢帛於彼以贍北軍謂之天下北庫今有布三百餘萬匹帛八十餘萬匹錢三十餘萬緡糧三十餘萬斛昔討黙啜甲兵皆貯清河庫今有五十餘萬事户七萬口十餘萬竊計財足以三平原之富兵足以倍平原之彊公誠資以士卒撫而有之以二郡為腹心則餘郡如四支無不隨所使矣真卿曰平原兵新集尚未訓練自保恐不足何暇及鄰雖然借若諾子之請則將何如乎萼曰清河遣僕銜命於公者非力不足而借公之師以當寇也亦欲觀大賢之明義耳今仰瞻高意未有決辭定色僕何敢遽言所為哉真卿竒之欲與之兵衆以為萼年少輕慮徒分兵力必無所成真卿不得已辭之萼就館復為書説真卿以為清河去逆效順奉粟帛器械以資軍公乃不納而疑之僕回轅之後清河不能孤立必有所繫託將為公西面之彊敵公能無悔乎真卿大驚遽詣其館以兵六千借之送至境執手别真卿問曰兵已行矣可以言子之所為乎萼曰聞朝廷遣程千里將精兵十萬出崞口討賊賊據險拒之不得前今當引兵先擊魏郡執祿山所署太守袁知泰納舊太守司馬垂使為西南主人分兵開崞口出千里之師因討汲鄴以北至於幽陵郡縣之未下者平原清河帥諸同盟合兵十萬南臨孟津分兵循河據守要害制其北走之路計官軍東討者不下二十萬河南義兵西向者亦不減十萬公但當表朝廷堅壁勿戰不過月餘賊必有内潰相圖之變矣真卿曰善命錄事參軍李擇交及平原令范冬馥將其兵㑹清河兵四千及博平兵千人軍千堂邑西南袁知泰遣其將白嗣恭等將二萬餘人來逆戰三郡兵力戰盡日魏兵大敗斬首萬餘級捕虜千餘人得馬千匹軍資甚衆知泰犇汲郡遂克魏郡軍聲大振時北海太守賀蘭進明亦起兵真卿以書召之幷力進明將步騎五千度河真卿陳兵逆之相揖哭於馬上哀動行伍進明屯平原城南休養士馬真卿毎事咨之由是軍權稍移於進明矣真卿不以為嫌真卿以堂邑之功讓進明進明奏其狀取捨任意敇加進明河北招討使擇交冬馥微進資級清河博平有功者皆不錄進明攻信都郡久之不克錄事參軍長安第五琦勸進明厚以金帛募勇士遂克之李光弼與史思明相守四十餘日思明絶常山糧道城中乏草馬食薦藉光弼以車五百乘之石邑取草將車者皆衣甲弩手千人衛之為方陳而行賊不能奪蔡希徳引兵攻石邑張奉璋拒却之光弼遣使告急於郭子儀子儀引兵自井陘出夏四月壬辰至常山與光弼合蕃漢步騎共十餘萬甲午子儀光弼與史思明等戰於九門城南思明大敗中郎將渾瑊射李立節殺之瑊釋之之子也思明收餘衆犇趙郡蔡希徳犇鉅鹿思明自趙郡如博陵時博陵已降官軍思明盡殺郡官河朔之民苦賊殘暴所在屯結多至二萬人少者萬人各為營以拒賊及郭李軍至爭出自效庚子攻趙郡一日城降士卒多虜掠光弼坐城門收所獲悉歸之民大悦子儀生擒四千人皆捨之斬祿山太守郭獻璆光弼進圍博陵十日不拔引兵還恒陽就食安祿山使平盧節度使吕知誨誘安東副大都護馬靈詧殺之平盧遊奕使武陟劉客奴先鋒使董秦及安東將王𤣥志同謀討誅知誨遣使踰海與顏真卿相聞請取范陽以自效真卿遣判官賈載齎糧及戰士衣助之真卿時惟一子頗纔十餘嵗使詣客奴為質朝廷聞之以客奴為平盧節度使賜名正臣𤣥志為安東副大都護董秦為平盧兵馬使南陽節度使魯炅立栅於滍水之南安祿山將武安珣畢思琛攻之五月丁巳炅衆潰走保南陽賊就圍之太常卿張垍薦夷陵太守虢王巨有勇畧上徵呉王祗為太僕卿以巨為陳留譙郡太守河南節度使兼統嶺南節度使何履光黔中節度使趙國珍南陽節度使魯炅國珍本䍧柯夷也戊辰巨引兵自藍田出趣南陽賊聞之解圍走令狐潮復引兵攻雍丘潮與張巡有舊於城下相勞苦如平生潮因説巡曰天下事去矣足下堅守危城欲誰為乎巡曰足下生平以忠義自許今日之舉忠義何在潮慙而退郭子儀李光弼還常山史思明收散卒數萬踵其後子儀選驍騎更挑戰三日至行唐賊疲乃退子儀乘之又敗之於沙河蔡希徳至洛陽安祿山復使將步騎二萬人北就思明又使牛廷玠發范陽等郡兵萬餘人助思明合五萬餘人而同羅曳落河居五分之一子儀至恒陽思明隨至子儀深溝高壘以待之賊來則守去則追之晝則耀兵夜斫其營賊不得休息數日子儀光弼議曰賊倦矣可以出戰壬午戰于嘉山大破之斬首四萬級捕虜千餘人思明墜馬露髻跣足步走至暮杖折鎗歸營犇於博陵光弼就圍之軍聲大振於是河北十餘郡皆殺賊守將而降漁陽路再絶賊往來者皆輕騎竊過多為官軍所獲將士家在漁陽者無不揺心祿山大懼召高尚嚴莊詬之曰汝數年教我反以為萬全今守潼闗數月不能進北路已絶諸軍四合吾所有者止汴鄭數州而已萬全何在汝自今勿來見我尚莊懼數日不敢見田乾真自闗下來為尚莊説祿山曰自古帝王經營大業皆有勝敗豈能一舉而成今四方軍壘雖多皆新募烏合之衆未更行陳豈能敵我薊北勁鋭之兵何足深憂尚莊皆佐命元勲陛下一旦絶之使諸將聞之誰不内懼若上下離心臣竊為陛下危之祿山喜曰阿浩汝能豁我心事即召尚莊置酒酣晏自為之歌以侑酒待之如初阿浩乾真小字也祿山議棄洛陽走歸范陽計未決是時天下以楊國忠驕縱召亂莫不切齒又祿山起兵以誅國忠為名王思禮密説哥舒翰使抗表請誅國忠翰不應思禮又請以三十騎劫取以來至潼闗殺之翰曰如此乃翰反非祿山也或説國忠今朝廷重兵盡在翰手翰若援旗西指於公豈不危哉國忠大懼乃奏潼闗大軍雖盛而後無繼萬一失利京師可憂請選監牧小兒三千於苑中訓練上許之使劍南軍將李福徳等領之又募萬人屯灞上令所親杜乾運將之名為禦賊實備翰也翰聞之亦恐為國忠所圖乃表請灞上軍隸潼闗六月癸未召杜乾運詣闗白事斬之國忠益懼㑹有告崔乾祐在陜兵不滿四千皆羸弱無備上遣使趣哥舒翰進兵復陜洛翰奏曰祿山久習用兵今始為逆豈肯無備是必羸師以誘我若往正墮其計中且賊逺來利在速戰官軍據險以扼之利在堅守況賊殘虐失衆兵勢日蹙將有内變因而乘之可不戰擒也要在成功何必務速今諸道徵兵尚多未集請且待之郭子儀李光弼亦上言請引兵北取范陽覆其巢穴質賊黨妻子以招之賊必内潰潼闗大軍惟應固守以弊之不可輕出國忠疑翰謀已言於上以賊方無備而翰逗留將失機㑹上以為然續遣中使趣之項背相望翰不得已撫膺慟哭丙戌引兵出闗己丑遇崔乾祐之軍於靈寶西原乾祐據險以待之南薄山北阻河隘道七十里庚寅官軍與乾祐㑹戰乾祐伏兵於險翰與田良丘浮舟中流以觀軍勢見乾祐兵少趣諸軍使進王思禮等將精兵五萬居前龎忠等將餘兵十萬繼之翰以兵三萬登河北阜望之鳴鼓以助其勢乾祐所出兵不過萬人什什伍伍散如列星或疎或宻或前或却官軍望而笑之乾祐嚴精兵陳於其後兵既交賊偃旗如欲遁者官軍懈不為備須臾伏兵發賊乘高下木石擊殺士卒甚衆道隘士卒如束槍槊不得用翰以氊車駕馬為前驅欲以衝賊日過中東風暴急乾祐以草車數十乘塞氊車之前縱火焚之煙焰所被官軍不能開目妄自相殺謂賊在煙中聚弓弩而射之日暮矢盡乃知無賊乾祐遣同羅精騎自南山過出官軍之後擊之官軍首尾駭亂不知所備於是大敗或棄甲竄匿山谷或相擠排入河溺死囂聲振天地賊乘勝蹙之後軍見前軍敗皆自潰河北軍望之亦潰瞬息間兩岸皆空翰獨與麾下百餘騎走自首陽山西度河入闗闗外先為三塹皆廣二丈深丈人馬墜其中湏臾而滿餘衆踐之以度士卒得入闗者纔八千餘人辛卯乾祐進攻潼闗克之翰至闗西驛揭牓收散卒欲復守潼闗蕃將火拔歸仁等以百餘騎圍驛入謂翰曰賊至矣請公上馬翰上馬出驛歸仁帥衆叩頭曰公以二十萬衆一戰棄之何面目復見天子且公不見高仙芝封常清乎請公東行翰不可欲下馬歸仁以毛縶其足於馬腹及諸將不從者皆執之以東㑹賊將田乾真已至遂降之俱送洛陽安祿山問翰曰汝常輕我今定何如翰伏地對曰臣肉眼不識聖人今天下未平李光弼在常山李祗在東平魯炅在南陽陛下留臣使以尺書招之不日皆下矣祿山大喜以翰為司空同平章事謂火拔歸仁曰汝叛主不忠不義執而斬之翰以書招諸將皆復書責之祿山知無效乃囚諸苑中潼闗既敗於是河東華陰馮翊上谷防禦使皆棄郡走所在守兵皆散是日翰麾下來告急上不時召見但遣李福徳等將監牧兵赴潼闗及暮平安火不至上始懼壬辰召宰相謀之楊國忠自以身領劒南聞安祿山反即令副使崔圓陰具儲偫以備有急投之至是首唱幸蜀之策上然之癸巳國忠集百官於朝堂惶據流涕問以策畧皆唯唯不對國忠曰人告祿山反狀已十年上不之信今日之事非宰相之過仗下士民驚擾犇走不知所之市里蕭條國忠使韓虢入宫勸上入蜀甲午百官朝者什無一二上御勤政樓下制云欲親征聞者皆莫之信以京兆尹魏方進為御史大夫兼置頓使京兆少尹靈昌崔光逺為京兆尹充西京留守將軍邊令誠掌宫闈管鑰託以劒南節度大使潁王璬將赴鎮令本道設儲偫是日上移仗北内既夕命龍武大將軍陳𤣥禮整比六軍厚賜錢帛選閑廏馬九百餘匹外人皆莫之知乙未黎明上獨與貴妃姊妹皇子妃主皇孫楊國忠韋見素魏方進陳𤣥禮及親近宦官宫人出延秋門妃主皇孫之在外者皆委之而去上過左藏楊國忠請焚之曰無為賊守上愀然曰賊來不得必更斂於百姓不如與之無重困吾赤子是日百官猶有入朝者至宫門猶聞漏聲三衛立仗儼然門既啟則宫人亂出中外擾攘不知上所之於是王公士民四出逃竄山谷細民爭入宫禁及王公第舍盜取金寶或乘驢上殿又焚左藏大盈庫崔光逺邊令誠帥人救火又募人攝府縣官分守之殺十餘人乃稍定光逺遣其子東見祿山令誠亦以管籥獻之上過便橋楊國忠使人焚橋上曰士庶各避賊求生奈何絶其路留内侍監高力士使撲滅乃來上遣宦者王洛卿前行告諭郡縣置頓食時至咸陽望賢宫洛卿與縣令俱逃中使徵召吏民莫有應者日向中上猶未食楊國忠自市胡餠以獻於是民爭獻糲飯雜以麥豆皇孫輩爭以手匊食之須臾而盡猶未能飽上皆酬其直慰勞之衆皆哭上亦掩泣有父老郭從謹進言曰祿山包藏禍心固非一日亦有詣闕告其謀者陛下往往誅之使得逞其姦逆致陛下播越是以先王務延訪忠良以廣聰明蓋為此也臣猶記宋璟為相數進直言天下賴以安平自頃以來在廷之臣以言為諱惟阿謏取容是以闕門之外陛下皆不得而知草野之臣必知有今日久矣但九重嚴邃區區之心無路上達事不至此臣何由得睹陛下之面而訴之乎上曰此朕之不明悔無所及慰諭而遣之俄而尚食舉御膳以至上命先賜從官然後食之命軍士散詣村落求食期未時皆集而行夜將半乃至金城縣令亦逃縣民皆脱身走飲食器皿具在士卒得以自給時從者多逃内侍監袁思藝亦亡去驛中無燈人相枕藉而寢貴賤無以復辨王思禮自潼闗至始知哥舒翰被擒以思禮為河西隴右節度使即令赴鎮收合散卒以俟東討丙申至馬嵬驛將士飢疲皆憤怒陳𤣥禮以禍由楊國忠欲誅之因東宫宦者李輔國以告太子太子未決㑹吐蕃使者二十餘人遮國忠馬訴以無食國忠未及對軍士呼曰國忠與胡虜謀反或射之中鞍國忠走至西門内軍士追殺之屠割肢體以槍揭其首於驛門外並殺其子户部侍郎暄及韓國秦國夫人御史大夫魏方進曰汝曹何敢害宰相衆又殺之韋見素聞亂而出為亂兵所撾腦血流地衆曰勿傷韋相公救之得免軍士圍驛上聞諠譁問外何事左右以國忠反對上杖屨出驛門慰勞軍士令收隊軍士不應上使高力士問之𤣥禮對曰國忠謀反貴妃不宜供奉願陛下割恩正法上曰朕當自處之入門倚杖頫首而立久之京兆司錄韋諤前言曰今衆怒難犯安危在晷刻願陛下速決因叩頭流血上曰貴妃常居深宫安知國忠反謀高力士曰貴妃誠無罪然將士已殺國忠而貴妃在陛下左右豈敢自安願陛下審思之將士安則陛下安矣上乃命高力士引貴妃於佛堂縊殺之輿尸寘驛庭召𤣥禮等視之𤣥禮等乃免胄釋甲頓首謝罪上慰勞之令曉諭軍士𤣥禮等皆呼萬嵗再拜而出於是始整部伍為行計韋諤見素之子也國忠妻裴柔與其幼子晞及虢國夫人夫人子裴徽皆走至陳倉縣令薛景仙帥吏士追捕誅之丁酉上將發馬嵬朝臣惟韋見素一人乃以韋諤為御史中丞充置頓使將士皆曰國忠謀反其將吏皆在蜀不可往或請之河隴或請之靈武或請之太原或請還京師上意在入蜀慮違衆心竟不言所向韋諤曰還京當有禦賊之備今兵少未易東向不如且至扶風徐圖去就上詢於衆衆以為然乃從之及行父老皆遮道請留曰宫闕陛下家居陵寢陛下墳墓今捨此欲何之上為之按轡久之乃命太子於後宣慰父老父老因曰至尊既不肯留某等願帥子弟從殿下東破賊取長安若殿下與至尊皆入蜀使中原百姓誰為之主須臾聚至數千人太子不可曰至尊逺冒險阻吾豈忍朝夕離左右且吾尚未面辭當還白至尊更稟進止涕泣跋馬欲西建寧王倓與李輔國執鞚諫曰逆胡犯闕四海分崩不因人情何以興復今殿下從至尊入蜀若賊兵燒絶棧道則中原之地拱手授賊矣人情既離不可復合雖欲復至此其可得乎不如收西北守邊之兵召郭李於河北與之倂力東討逆賊克復二京削平四海使社稷危而復安宗廟毁而更存掃除宫禁以迎至尊豈非孝之大者乎何必區區温凊為兒女之戀乎廣平王俶亦勸太子留父老共擁太子馬不得行太子乃使俶馳白上上摠轡侍太子久不至使人偵之還白狀上曰天也乃命分後軍二千人及飛龍廏馬從太子且諭將士曰太子仁孝可奉宗廟汝曹善輔佐之又諭太子曰汝勉之勿以吾為念西北諸胡吾撫之素厚汝必得其用太子南向號泣而已又使送東宫内人於太子且宣㫖欲傳位太子不受俶倓皆太子之子也己亥上至岐山或言賊前鋒且至上遽過宿扶風郡士卒潛懷去就往往流言不遜陳𤣥禮不能制上患之㑹成都貢春綵十餘萬匹至扶風上命悉陳之於庭召將士入臨軒諭之曰朕比來衰耄託任失人致逆胡亂常須逺避其鋒知卿等皆倉猝從朕不得别父母妻子跋涉至此勞苦至矣朕甚愧之蜀路阻長郡縣褊小人馬衆多或不能供今聴卿等各還家朕獨與子孫中官前行入蜀亦足自達今日與卿等訣别可共分此綵以備資糧若歸見父母及長安父老為朕致意各好自愛也因泣下沾襟衆皆哭曰臣等死生從陛下不敢有貳上良久曰去留聴卿自是流言始息太子既留未知所適廣平王俶曰日漸晏此不可駐衆欲何之皆莫對建寧王倓曰殿下昔嘗為朔方節度大使將吏嵗時致啓倓畧識其姓名今河西隴右之衆皆散降賊父兄子弟多在賊中或生異圖朔方道近士馬全盛裴冕衣冠名族必無貳心賊入長安方虜掠未暇徇地乘此速往就之徐圖大舉此上策也衆皆曰善至渭濱遇潼闗敗卒誤與之戰死傷甚衆已乃收餘卒擇渭水淺處乘馬涉度無馬者涕泣而返太子自奉天北上比至新平通夜馳三百餘里士卒器械失亡過半所存之衆不過數百新平太守薛羽棄郡走太子斬之是日至安定太守徐㲄亦走又斬之辛丑上發扶風宿陳倉太子至烏氏彭原太守李遵出迎獻衣及糗糧至彭原募士得數百人是日至平涼閲監牧馬得數萬匹又募士得五百餘人軍勢稍振壬寅上至散闗分扈從將士為六軍使潁王璬先行詣劒南壽王瑁等分將六軍以次之丙午上至河池郡崔圓奉表迎車駕具陳蜀土豐稔甲兵全盛上大悦即日以圓為中書侍郎同平章事蜀郡長史如故以隴西公瑀為漢中王梁州都督山南西道采訪防禦使瑀璡之弟也王思禮至平涼聞河西諸胡亂還詣行在初河西諸胡部落聞其都護皆從哥舒翰没於潼闗故爭自立相攻擊而都護寔從翰在北岸不死又不與火拔歸仁俱降賊上乃以河西兵馬使周泌為河西節度使隴右兵馬使彭元耀為隴右節度使與都護思結進明等俱之鎮招其部落以思禮為行在都知兵馬使戊申扶風民康景龍等自相帥擊賊所署宣慰使薛摠斬首二百餘級庚戌陳倉令薛景仙殺賊守將克扶風而守之安祿山不意上遽西幸遣使止崔乾祐兵留潼闗凡十日乃遣孫孝哲將兵入長安以張通儒為西京留守崔光逺為京兆尹使安忠順將兵屯苑中以鎮闗中孝哲為祿山所寵任尤用事常與嚴莊爭權祿山使監闗中諸將張通儒等皆受制於孝哲孝哲豪侈果於殺戮賊黨畏之祿山命搜捕百官宦者宫女等毎獲數百人輙以兵衞送洛陽王侯將相扈從車駕家留長安者誅及嬰孩陳希烈以晩節失㤙怨上與張均張垍等皆䧏於賊祿山以希烈垍為相自餘朝士皆授以官於是賊勢大熾西脅汧隴南侵江漢北割河東之半然賊將皆粗猛無逺略既克長安自以為得志日夜縱酒專以聲色寶賄為事無復西出之意故上得安行入蜀太子北行亦無追迫之患李光弼圍博陵未下聞潼闗不守解圍而南史思明踵其後光弼擊却之與郭子儀皆引兵入井陘留常山太守王俌將景城河間團練兵守常山平盧節度使劉正臣將襲范陽未至史思明引兵逆擊之正臣大敗棄妻子走士卒死者七千餘人初真卿聞河北節度使李光弼出井陘即斂軍還平原以待光弼之命聞郭李西入井陘真卿始復區處河北軍事太子至平涼數日朔方留後杜鴻漸六城水陸運使魏少遊節度判官崔漪支度判官盧簡金鹽池判官李涵相與謀曰平涼散地非屯兵之所靈武兵食完富若迎太子至此北收諸城兵西發河隴勁騎南向以定中原此萬世一時也乃使涵奉牋於太子且籍朔方士馬甲兵穀帛軍須之數以獻之涵至平涼太子大悦㑹河西司馬裴冕入為御史中丞至平涼見太子亦勸太子之朔方太子從之鴻漸暹之族子涵道之曽孫也鴻漸漪使少遊居後葺次舍庀資儲自迎太子於平涼北境説太子曰朔方天下勁兵處也今吐蕃請和回紇内附四方郡縣大抵堅守拒賊以俟興復殿下今理兵靈武按轡長驅移檄四方收攬忠義則逆賊不足屠也少遊盛治宫室帷帳皆倣禁中飲膳備水陸秋七月辛酉太子至靈武悉命撤之甲子上至普安憲部侍郎房琯來謁見上之發長安也羣臣多不知至咸陽謂高力士曰朝臣誰當來誰不來對曰張均張垍父子受陛下恩最深且連戚里是必先來時論皆謂房琯宜為相而陛下不用又祿山嘗薦之恐或不來上曰事未可知及琯至上問均兄弟對曰臣帥與偕來逗遛不進觀其意似有所蓄而不能言也上顧力士曰朕固知之矣即日以琯為文部侍郎同平章事裴冕杜鴻漸等上太子牋請遵馬嵬之命卽皇帝位太子不許冕等言曰將士皆闗中人日夜思歸所以﨑嶇從殿下逺涉沙塞者冀尺寸之功若一朝離散不可復集願殿下勉徇衆心為社稷計牋五上太子乃許之是日肅宗即位於靈武城南樓羣臣舞蹈上流涕歔欷尊𤣥宗曰上皇天帝赦天下改元以杜鴻漸崔漪竝知中書舍人事裴冕為中書侍郎同平章事改闗内采訪使為節度使徙治安化以前蒲闗防禦使吕崇賁為之以陳倉令薛景仙為扶風太守兼防禦使隴右節度使郭英乂為天水太守兼防禦使時塞上精兵皆選入討賊惟餘老弱守邊文武官不滿三十人披草萊立朝廷制度草創武人驕慢大將管崇嗣在朝堂背闕而坐言笑自若監察御史李勉奏彈之繫於有司上特原之歎曰吾有李勉朝廷始尊勉元懿之曽孫也旬日間歸附者漸衆丁卯上皇制以太子亨充天下兵馬元帥領朔方河東河北平盧節度都使南取長安洛陽以御史中丞裴冕兼左庶子隴西郡司馬劉秩試守右庶子永王璘充山南東道嶺南黔中江南西道節度都使以少府監竇紹為之傅長沙太守李峴為都副大使盛王琦充廣陵大都督領江南東路及淮南河南等路節度都使以前江陵都督府長史劉彚為之傅廣陵郡長史李成式為都副大使豐王珙充武威都督仍領河西隴右安西北庭等路節度都使以隴西太守濟陰鄧景山為之傅充都副大使應須士馬甲仗糧賜等竝於當路自供其諸路本節度使虢王巨等竝依前充使其署置官屬及本路郡縣官竝任自簡擇署訖聞奏時琦珙皆不出閤惟璘赴鎮置山南東道節度領襄陽等九郡升五府經畧使為領南節度領南海等二十二郡升五溪經畧使為黔中節度領黔中等諸郡分江南為東西二道東道領餘杭西道領豫章等諸郡先是四方聞潼闗失守莫知上所之及是制下始知乘輿所在彚秩之弟也安祿山使孫孝哲殺霍國長公主及王妃駙馬等於崇仁坊刳其心以祭安慶宗凡楊國忠高力士之黨及祿山素所惡者皆殺之凡八十三人或以鐵棓揭其腦蓋流血滿街己巳又殺皇孫及郡縣主二十餘人庚午上皇至巴西太守崔渙迎謁上皇與語悦之房琯復薦之卽日拜門下侍郎同平章事以韋見素為左相渙𤣥暐之孫也初京兆李泌幼以才敏著聞𤣥宗使與忠王遊忠王為太子泌已長上書言事𤣥宗欲官之不可使與太子為布衣交太子常謂之先生楊國忠惡之奏徙蘄春後得歸隱居潁陽上自馬嵬北行遣使召之謁見於靈武上大喜出則聫轡寢則對榻如為太子時事無大小皆咨之言無不從至於進退將相亦與之議上欲以泌為右相泌固辭曰陛下待以賓友則貴於宰相矣何必屈其志乃止同羅突厥從安祿山反者屯長安苑中甲戌其酋長阿史那從禮帥五千騎竊廏馬二千匹逃歸朔方謀邀結諸胡盜據邊地上遣使宣慰之降者甚衆賊遣兵寇扶風薛景仙擊却之安祿山遣其將高嵩以敇書繒綵誘河隴將士大震闗使郭英乂擒斬之同羅突厥之逃歸也長安大擾官吏竄匿獄囚自出京兆尹崔光逺以為賊且遁矣遣吏卒守孫孝哲宅孝哲以狀白祿山光逺乃與長安令蘇震帥府縣官千餘人來犇己卯至靈武上以光逺為御史大夫兼京兆尹使之渭北招集吏民以震為中丞震瓌之孫也祿山以田乾真為京兆尹侍御史吕諲右拾遺楊綰奉天令安平崔器相繼詣靈武以諲器為御史中丞綰為起居舍人知制誥上命河西節度副使李嗣業將兵五千赴行在嗣業與節度使梁宰謀且緩師以觀變綏徳府折衝叚秀實讓嗣業曰豈有君父告急而臣子晏然不赴者乎特進常自謂大丈夫今日視之乃兒女子耳嗣業大慙卽白宰如數發兵以秀實自副將之詣行在上又徵兵於安西行軍司馬李栖筠發精兵七千人勵以忠義而遣之敇改扶風為鳯翔郡庚辰上皇至成都從官及六軍至者千三百人而已令狐潮圍張巡於雍丘相守四十餘日朝廷聲問不通潮聞𤣥宗已幸蜀復以書招巡有大將六人官皆開府特進白巡以兵勢不敵且上存亡不可知不如降賊巡陽許諾明日堂上設天子畫像帥將士朝之人人皆泣巡引六將於前責以大義斬之士心益勸城中矢盡巡縛藁為人千餘被以黑衣夜縋城下潮兵爭射之久乃知其藁人得矢數十萬其後復夜縋人賊笑不設備乃以死士五百斫潮營潮軍大亂焚壘而遁追犇十餘里潮慙益兵圍之巡使郎將雷萬春於城上與潮相聞語未絶賊弩射之面中六矢而不動潮疑其木人使諜問之乃大驚遙謂巡曰向見雷將軍方知足下軍令矣然其如天道何巡謂之曰君未識人倫焉知天道未幾出戰擒賊將十四人斬首百餘級賊乃夜遁收兵入陳留不敢復出頃之賊步騎七千餘衆屯白沙渦巡夜襲擊大破之還至桃陵遇賊救兵四百餘人悉擒之分别其衆媯檀及胡兵悉斬之榮陽陳留脅從兵皆散令歸業旬日間民去賊來歸者萬餘户河北諸郡猶為唐守常山大守王俌欲降賊諸將怒因擊毬縱馬踐殺之時信都太守烏承恩麾下有朔方兵三千人諸將遣使者宗仙運帥父老詣信都迎承恩鎮常山承恩辭以無詔命仙運説承恩曰常山地控燕薊路通河洛有井陘之險足以扼其咽喉頃屬車駕南遷李大夫收軍退守晉陽王太守權統後軍欲舉城降賊衆心不從身首異處大將軍兵精氣肅逺近莫敵若以家國為念移據常山與大夫首尾相應則洪勲盛烈孰與為比若疑而不行又不設備常山既陷信都豈能獨全承恩不從仙運又曰將軍不納鄙夫之言必懼兵少故也今人不聊生咸思報國競相結聚屯據鄉村若懸賞招之不旬日十萬可致與朔方甲士三千餘人相參用之足成王事若捨要害以授人居四通而自安譬如倒持劒㦸取敗之道也承恩竟疑不決承恩承玼之族兄也是月史思明蔡希徳將兵萬人南攻九門旬日九門偽降伏甲於城上思明登城伏兵攻之思明墜城鹿角傷其左脅夜犇博陵顏真卿以蠟丸達表於靈武以真卿為工部尚書兼御史大夫依前河北招討采訪處置使並致赦書亦以蠟丸達之真卿頒下河北諸郡又遣人頒於河南江淮由是諸道始知上即位於靈武徇國之心益堅矣郭子儀等將兵五萬自河北至靈武靈武軍威始盛人有興復之望矣八月壬午朔以子儀為武部尚書靈武長史以李光弼為户部尚書北都留守竝同平章事餘如故光弼以景城河間兵五千赴太原先是河東節度使王承業軍政不修朝廷遣侍御史崔衆交其兵尋遣中使誅之衆侮易承業光弼素不平至是敇交兵於光弼衆見光弼不為禮又不時交兵光弼怒收斬之軍中股栗史思明再攻九門辛卯克之所殺數千人引兵東圍藁城李庭望將蕃漢二萬餘人東襲寧陵襄邑夜去雍丘城三十里置營張巡帥短兵三千掩襲大破之殺獲大半庭望收軍夜遁癸巳靈武使者至蜀上皇喜曰吾兒應天順人吾復何憂丁酉制自今改制敇為誥表䟽稱太上皇四海軍國事皆先取皇帝進止仍奏朕知俟克復上京朕不復預事己亥上皇臨軒命韋見素房琯崔渙奉傳國寶玉冊詣靈武傳位辛丑史思明陷藁城初上皇毎酺宴先設大常雅樂坐部立部繼以鼓吹胡樂教坊府縣散樂雜戲又以山車陸船載樂往來又出宫人舞霓裳羽衣又教舞馬百匹銜杯上壽又引犀象入場或拜或舞安祿山見而悦之既克長安命搜捕樂工運載樂器舞衣驅舞馬犀象皆詣洛陽臣光曰聖人以道徳為麗仁義為樂故雖茅茨土堦惡衣菲食不恥其陋惟恐奉養之過以勞民費財明皇恃其承平不思後患彈耳目之玩窮聲妓之巧自謂帝王富貴皆不我如欲使前莫能及後無以踰非徒娯已亦以誇人豈知大盜在旁已有窺窬之心卒致鑾輿播越生民塗炭乃知人君崇華靡以示也禄山晏其羣臣於凝碧池盛奏衆樂黎園弟子往往歔欷泣下賊皆露刃睨之樂工雷海清不勝悲憤擲樂器於地西向慟哭祿山怒縛於試馬殿前支解之祿山聞嚮日百姓乘亂多盜庫物既得長安命大索三日並其私財盡掠之又令府縣推按銖兩之物無不窮治連引搜捕支蔓無窮民間騷然益思唐室自上離馬嵬北行民間相傳太子北收兵來取長安長安民日夜望之或時相驚曰太子大軍至矣則皆走市里為空賊望見北方塵起輒驚欲走京畿豪傑往往殺賊官吏遥應官軍誅而復起相繼不絶賊不能制其始自京畿鄜坊至於岐隴皆附之至是西門之外率為敵壘賊兵力所及者南不出武闗北不過雲陽西不過武功江淮奏請貢獻之蜀之靈武者皆自襄陽取上津路抵扶風道路無壅皆薛景仙之功也九月壬子史思明圍趙郡丙辰拔之又圍常山旬日城陷殺數千人建寧王倓性英果有才畧從上自馬嵬北行兵衆寡弱屢逢寇盜倓自選驍勇居上前後血戰以衛上上或過時未食倓悲泣不自勝軍中皆屬目向之上欲以倓為天下兵馬元帥使統諸將東征李泌曰建寧誠元帥才然廣平兄也若建寧功成豈可使廣平為呉太伯乎上曰廣平冢嗣也何必以元帥為重泌曰廣平未正位東宫今天下艱難衆心所屬在於元帥若建寧大功既成陛下雖欲不以為儲副同立功者其肯已乎大宗上皇即其事也上乃以廣平王俶為天下兵馬元帥諸將皆以屬焉倓聞之謝泌曰此固倓之心也上與泌出行軍軍士指之竊言曰衣黃者聖人也衣白者山人也上聞之以告泌曰艱難之際不敢相屈以官且衣紫袍以絶羣疑泌不得已受之服之入謝上笑曰旣服此豈可無名稱出懷中敇以泌為侍謀軍國元帥府行軍長史泌固辭上曰朕非敢相臣以濟艱難耳俟賊平任行高志泌乃受之置元帥府於禁中俶入則泌在府泌入俶亦如之泌又言於上曰諸將畏憚天威在陛下前敷陳軍事或不能盡所懷萬一小差為害甚大乞先令與臣及廣平熟議臣與廣平從容奏聞可者行之不可者已之上許之時軍旅務繁四方奏報自昏至曉無虚刻上悉使送府泌先開視有急切者及烽火重封隔門通進餘則待明禁門鑰契悉委俶與泌掌之上欲借兵於外夷以張軍勢以豳王守禮之子承宷為敦煌王與僕固懷恩使於回紇以請兵又發拔汗那兵且使轉諭城郭諸國許以厚賞使從安西兵入援李泌勸上且幸彭原俟西北兵將至進幸扶風以應之於時庸調亦集可以贍軍上從之戊辰發靈武内侍邊令誠復自賊中逃歸上斬之丙子上至順化韋見素等至自成都奉上寶冊上不肯受曰比以中原未靖權摠百官豈敢乘危遽為傳襲羣臣固請上不許寘寳冊於别殿朝夕事之如定省之禮上以韋見素本附楊國忠意薄之素聞房琯名虚心待之琯見上言時事辭情慷慨上為之改容由是軍國事多謀於琯琯亦以天下為己任知無不為專決於胷臆諸相拱手避之上甞從容與泌語及李林甫欲敇諸將克長安發其塚焚骨揚灰泌曰陛下方定天下奈何讎死者彼枯骨何知徒示聖徳之不𢎞耳且方今從賊者皆陛下之讎也若聞此舉恐阻其自新之心上不悦曰此賊昔日百方危朕當是時朕不保朝夕朕之全特天幸耳林甫亦惡卿但未及害卿而死耳奈何矜之對曰臣豈不知所以言者上皇有天下向五十年太平娛樂一朝失意逺處巴蜀南方地惡上皇春秋高聞陛下此敇意必以為用韋妃之故内慙不懌萬一感憤成疾是陛下以天下之大不能安君親言未畢上流涕被面降階仰天拜曰朕不及此是天使先生言之也遂抱泌頸泣不已冬十月上發順化癸未至彭原第五琦見上於彭原請以江淮租庸市輕貨泝江漢而上至洋川令漢中王瑀陸運至扶風以助軍上從之尋加琦山南等五道度支使琦作𣙜鹽法用以饒房琯上疏請自將兵復兩京上許之加持節招討西京兼防禦蒲潼兩闗兵馬節度等使琯請自選參佐以御史中丞鄧景山為副户部侍郎李揖為行軍司馬給事中劉秩為參謀旣行又令兵部尚書王思禮副之琯悉以戎務委李揖劉秩二人皆書生不閑軍旅琯謂人曰賊曳落河雖多安能敵我劉秩琯分為三軍使禆將楊希文將南軍自宜壽入劉貴哲將中軍自武功入李光進將北軍自奉天入光進光弼之弟也甲申令狐潮王福徳復將步騎萬餘攻雍丘張巡出擊大破之斬首數千級賊遁去房琯以中軍北軍為前鋒庚子至便橋辛丑二軍遇賊將安守忠於咸陽之陳濤斜琯效古法用車戰以牛車二千乘馬步夾之賊順風鼓譟牛皆震駭賊縱火焚之人畜大亂官軍死傷者四萬餘人存者數千而已癸卯琯自以南軍戰又敗楊希文劉貴哲皆降於賊上聞琯敗大怒李泌為之營救上乃宥之待琯如初敦煌王承寀至回紇牙帳回紇可汗以女妻之遣其貴臣與承寀僕固懷恩偕來見上於彭原上厚禮其使者而歸之尹子竒圍河間四十餘日不下史思明引兵㑹之顏真卿遣其將和琳將萬一千人救河間思明逆擊擒之遂陷河間執李奐送洛陽殺之又陷景城太守李暐赴湛水死思明使兩騎齎尺書以招樂安即時舉郡降又使其將康沒野波將先鋒攻平原兵未至顏真卿知力不敵壬寅棄郡度河南走思明即以平原兵攻清河博平皆䧟之思明引兵圍烏承恩於信都承恩以城降親導思明入城交兵馬倉庫馬三千匹兵五萬人思明送承恩詣洛陽祿山復其官爵饒陽禆將束鹿張興力舉千鈞性復明辨賊攻饒陽彌年不能下及諸郡皆陷思明幷力圍之外救俱絶太守李系窘廹赴火死城遂陷思明擒興立於馬前謂曰將軍真壯士能與我共富貴乎興曰興唐之忠臣固無降理今數刻之人耳願一言而死思明曰試言之興曰主上待祿山恩如父子羣臣莫及不知報徳乃興兵指闕塗炭生人大丈夫不能翦除凶逆乃北面為之臣乎僕有短策足下能聽之乎足下所以從賊求富貴耳譬如鷰巢於幕豈能久安何如乘間取賊轉禍為福長享富貴不亦美乎思明怒命張於木上鋸殺之詈不絶口以至於死賊毎破一城城中人衣服財賄婦人皆為所掠男子壯者使之負擔羸病老幼皆以刀槊戲殺之祿山初以卒三千人授思明使定河北至是河北皆下之郡置防兵三千雜以胡兵鎮之思明還博陵尹子竒將五千騎度河畧北海欲南取江淮㑹回紇可汗遣其臣葛邏支將兵入援先以二千騎奄至范陽城下子竒聞之遽引兵歸十一月令狐潮帥衆萬餘營雍丘城北張巡邀擊大破之賊遂走十二月安祿山遣兵攻穎川城中兵少無蓄積太守薛愿長史龐堅悉力拒守繞城百里廬舍林木皆盡期年救兵不至祿山使阿史那承慶益兵攻之晝夜死鬭十五日城陷執愿堅送洛陽祿山縛於洛濱木上凍殺之上問李泌今敵彊如此何時可定對曰臣觀賊所獲子女金帛皆輸之范陽此豈有雄據四海之志邪今獨虜將或為之用中國之人惟高尚等數人自餘皆脅從耳以臣料之不過二年天下無寇矣上曰何故對曰賊之驍將不過史思明安守忠田乾真張忠志阿史那承慶等數人而已今若令李光弼自太原出井陘郭子儀自馮翊入河東則思明忠志不敢離范陽常山守忠乾真不敢離長安是以兩軍縶其四將也從祿山者獨承慶耳願敇子儀勿取華陰使兩京之道常通陛下以所徵之兵軍於扶風與子儀光弼互出擊之彼救首則擊其尾救尾則擊其首使賊往來數千里疲於奔命我常以逸待勞賊至則避其鋒去則乘其弊不攻城不遏路來春復命建寧為范陽節度大使竝塞北出與光弼南北掎角以取范陽覆其巢穴賊退則無所歸留則不獲安然後大軍四合而攻之必成擒矣上悦令狐潮李庭望攻雍丘數月不下乃置把州築城於雍丘之北以絶其糧援賊常數萬人而張巡衆才千餘毎戰輒克河南節度使虢王巨屯彭城假巡先鋒使是月魯東平濟陰陷於賊賊將楊朝宗帥馬步二萬將襲寧陵斷巡後巡遂拔雍丘東守寧陵以拒之始與睢陽太守許逺相見是日楊朝宗至寧陵城西北巡逺與戰晝夜數十合大破之斬首萬餘級流尸塞汴而下賊收兵夜遁敇以巡為河南節度副使巡以將士有功遣使詣虢王巨請空名告身及賜物巨唯與折衝果毅告身三十通不與賜物巡移書責巨巨竟不應二載春正月安祿山自起兵以來目漸昏至是不復覩物又病疽性益躁暴左右使令小不如意動加箠撻或時殺之既稱帝深居禁中大將希得見其面皆因嚴莊白事莊雖貴用事亦不免箠撻閹豎李豬兒被撻尤多左右人不自保祿山嬖妾叚氏生子慶恩欲以代慶緒為後慶緒常懼死不知所出莊謂慶緒曰事有不得已者時不可失慶緒曰兄有所為敢不敬從又謂豬兒曰汝前後受撻寧有數乎不行大事死無日矣豬兒亦許諾莊與慶緒夜持兵立帳外豬兒執刀直入帳中斫祿山腹左右懼不敢動祿山捫枕旁刀不獲撼帳竿曰必家賊也腸已流出數斗遂死掘牀下深數尺以氊裹其尸埋之誡宫中不得泄乙夘旦莊宣言於外云祿山疾亟立晉王慶緒為太子尋即帝位尊祿山為太上皇然後發喪慶緒性昏懦言辭無序莊恐衆不服不令見人慶緒日縱酒為樂兄事莊以為御史大夫馮翊王事無大小皆取決焉厚加諸將官爵以悦其心史思明自博陵蔡希徳自太行高秀巖自大同牛延玠自范陽引兵共十萬寇太原李光弼麾下精兵皆赴朔方餘團練烏合之衆不滿萬人思明以為太原指掌可取既得之當遂長驅取朔方河隴太原諸將皆懼議修城以待之光弼曰太原城周四十里賊垂至而興役是未見敵先自困也乃帥士卒及民於城外鑿壕以自固作塹數十萬衆莫知所用及賊攻城於外光弼用之増壘於内壞輒補之思明使人取攻具於山東以胡兵三千衞送之至廣陽别將慕容溢張奉璋邀擊盡殺之思明圍太原月餘不下乃選驍鋭為遊兵戒之曰我攻其北則汝潛趣其南攻東則趣西有隙則乗之而光弼軍令嚴整雖冦所不至警邏未嘗少懈賊不得入光弼購募軍中茍有小技皆取之隨能使之人盡其用得安邊軍錢工三善穿地道賊於城下仰而侮詈光弼遣人從地道中曳其足而入臨城斬之自是賊行皆視地賊為梯衝土山以攻城光弼為地道以迎之近城者陷賊初逼城急光弼作大礮飛巨石一發輒斃二十餘人賊死者什二三乃退營於數十步外圍守益固光弼遣人詐與賊約刻日出降賊喜不為備光弼使穿地道周賊營中榰之以木至期光弼勒兵在城上遣禆將將數千人出如降狀賊皆屬目俄而營中地陷死者千餘人賊衆驚亂官軍鼓譟乘之俘斬萬計㑹安祿山死慶緒使思明歸守范陽留蔡希徳等圍太原安慶緒以尹子竒為汴州刺史河南節度使甲戌子竒以歸檀及同羅奚兵十三萬趣睢陽許逺告急於張巡巡自寧陵引兵入睢陽巡有兵三千人與逺共合六千八百人賊悉衆逼城巡督勵將士晝夜苦戰或一日至二十合凡十六日擒賊將六十餘人殺士卒二萬餘衆氣自倍逺謂巡曰逺懦不習兵公智勇兼濟逺請為公守請公為逺戰自是之後逺但調軍糧修戰具居中應接而已戰鬭籌畫一出於巡賊遂夜遁郭子儀以河東居兩京之間扼賊要衝得河東則兩京可圖時賊將崔乾祐守河東丁丑子儀潛遣人入河東與唐官陷賊者謀俟官軍至為内應二月戊子上至鳯翔郭子儀自洛交引兵趣河東分兵取馮翊己丑夜河東司户韓旻等飜河東城迎官軍殺賊近千人崔乾祐踰城得免發城北兵攻城且拒官軍子儀擊破之乾祐走子儀追擊之斬首四千級捕虜五千人乾祐至安邑安邑人開門納之半入閉門擊之盡殪乾祐未入自白逕嶺亡去遂平河東上至鳯翔旬日隴右河西安西西域之兵皆㑹江淮庸調亦至洋川漢中上自散闗通表成都信使駱驛長安人聞車駕至從賊中自拔而來者日夜不絶西師憩息既定李泌請遣安西及西域之衆如前策竝塞東北自歸檀南取范陽上曰今大衆已集庸調亦至當乘兵鋒擣其腹心而更引兵東北數千里先取范陽不亦迂乎對曰今以此衆直取兩京必得之然賊必再彊我必又困非久安之策上曰何也對曰今所恃者皆西北守塞及諸胡之兵性耐寒而畏暑若乘其新至之鋭攻祿山已老之師其勢必克兩京春氣已深賊收其餘衆遁歸巢穴闗東地熱官軍必困而思歸不可留也賊休兵秣馬伺官軍之去必復南來然則征戰之勢未有涯也不若先用之於寒鄉除其巢穴則賊無所歸根本永絶矣上曰朕切於晨昏之戀不能待此決矣闗内節度使王思禮軍武功兵馬使郭英乂軍東原王難得軍西原丁酉安守忠等寇武功郭英乂戰不利矢貫其頥而走王難得望之不救亦走思禮退軍扶風賊遊兵至大和闗去鳯翔五十里鳯翔大駭戒嚴李光弼將敢死士出擊蔡希徳大破之斬首七萬餘級希徳遁去安慶緒以史思明為范陽節度使兼領恒陽軍事封媯川王以牛廷玠領安陽軍事張忠志為常山太守兼團練使鎮井陘口餘各令歸舊任募兵以禦官軍先是安祿山得兩京珍貨悉輸范陽思明擁彊兵據富資益驕橫浸不用慶緒之命慶緒不能制庚子郭子儀遣其子旰及兵馬使李韶光大將軍王祚濟河擊潼闗破之斬首五百級安慶緒遣兵救潼闗郭旰等大敗死者萬餘人李韶光王祚戰死僕固懷恩抱馬首浮渡渭水退保河東上皇思張九齡之先見為之流涕遣中使至曲江祭之厚恤其家尹子竒復引大兵攻睢陽張巡謂將士曰吾受國恩所守正死耳但念諸君捐軀命膏草野而賞不酬勲以此痛心耳將士皆激勵請奮巡遂椎牛大饗士卒盡軍出戰賊望見兵少笑之巡執旗帥諸將直衝賊陳賊乃大潰斬將三十餘人殺士卒三千餘人逐之數十里明日賊又合軍至城下巡出戰晝夜數十合屢摧其鋒而賊攻圍不輟辛未安守忠將騎二萬寇河東郭子儀擊走之斬首八千級捕虜五千人夏四月上以郭子儀為司空天下兵馬副元帥使將兵赴鳯翔庚寅李歸仁以鐵騎五千邀之於三原北子儀使其將僕固懷恩王仲昇渾釋之李若幽等伏兵擊之於白渠留運橋殺傷略盡歸仁游水而逸若幽神通之𤣥孫也子儀與王思禮軍合於西渭橋進屯潏西安守忠李歸仁軍於京城西清渠相守七日官軍不進五月癸丑守忠偽遁子儀悉師逐之賊以驍騎九千為長蛇陳官軍擊之首尾為兩翼夾擊官軍官軍大潰判官韓液監軍孫知古皆為賊所擒軍資器械盡棄之子儀退保武功中外戒嚴是時府庫無蓄積朝廷專以官爵賞功諸將出征皆給空名告身自開府特進列卿大將軍下至中郎郎將聽臨事注名其後又聽以信牒授人官爵有至異姓王者諸軍但以職任相統攝不復計官爵高下及清渠之敗復以官爵收散卒由是官爵輕而貨重大將軍告身一通纔易一醉凡應募入軍者一切衣金紫至有朝士童僕衣金紫稱大官而執賤役者名器之濫至是而極焉山南東道節度使魯炅守南陽賊將武令珣田承嗣相繼攻之城中食盡一鼠值錢數百餓死者相枕藉上遣宦官將軍曹日昇往慰圍急不得入日昇請單騎入致命襄陽太守魏仲犀不許㑹顏真卿自河北至曰曹將軍不顧萬死以致帝命何為沮之借使不達不過亡一使者達則一城之心固矣日昇與十騎偕往賊畏其鋭不敢逼城中自謂望絶及見日昇大喜日昇復為之至襄陽取糧以千人運糧而入賊不能遏炅在圍中凡周嵗晝夜苦戰力竭不能支壬戌夜開城帥餘兵數千突圍而出犇襄陽承嗣追之轉戰二日不能克而還時賊欲南浸江漢賴炅拒其衝要南夏得全司空郭子儀詣闕請自貶甲子以郭子儀為左僕射尹子竒益兵圍雎陽益急張巡於城中夜鳴鼓嚴隊若將出擊者賊聞之達旦儆備既明巡乃寢兵絶鼓賊以飛樓瞰城中無所見遂解甲休息巡與將軍南霽雲郎將雷萬春等十餘將各將五十騎開門突出直衝賊營至子竒麾下營中大亂斬賊將五十餘人殺士卒五千餘人巡欲射子竒而不識乃剡蒿為矢中者喜謂巡矢盡走白子竒乃得其狀使霽雲射之喪其左目幾獲之子竒乃收軍退還六月癸未田乾真圍安邑㑹陜郡賊將楊務欽密謀歸國河東太守馬承光以兵應之務欽殺城中諸將不同己者翻城來降乾真解安邑遁去秋七月河南節度使賀蘭進明克高密琅邪殺賊二萬餘人壬子尹子竒復徵兵數萬攻睢陽先是許逺於城中積糧至六萬石虢王巨以其半給濮陽濟陰二郡逺固爭之不能得旣而濟陰得糧遂以城叛而睢陽城至是食盡將士人廩米日一合雜以茶紙樹皮為食而賊糧運通兵敗復徵睢陽將士死不加益諸軍饋救不至士卒消耗至一千六百人皆飢病不堪鬭遂為賊所圍張巡乃修守具以拒之賊為雲梯勢如半虹置精卒二百於其上推之臨城欲令騰入巡預於城潛鑿三穴候梯將至於一穴中出大木末置鐵鉤鉤之使不得退一穴中出一木拄之使不得進一穴中出一木木末置鐵籠盛火焚之其梯中折梯上卒盡燒死賊又以鉤車鉤城上棚閣鉤之所及莫不崩陊巡以大木末置連鏁鏁末置大鐶搨其鉤頭以革車拔之入城截其鉤頭而縱車令去賊又造木驢攻城巡鎔金汁灌之應投銷鑠賊又於城西北隅以土囊積柴為磴道欲登城巡不與爭利每夜潛以松明乾蒿投之於中積十餘日賊不之覺因出軍大戰使人順風持火焚之賊不能救經二十餘日火方滅巡之所為皆應機立辦賊服其智不敢復攻遂於城外穿三重壕立木柵以守巡巡亦於其内作壕以拒之丁巳賊將安武臣攻陜郡楊務欽戰死賊遂屠陜以張鎬兼河南節度采訪等使代賀蘭進明八月靈昌太守許叔冀為賊所圍救兵不至拔衆犇彭城睢陽士卒死傷之餘纔六百人張巡許逺分城而守之巡守東北逺守西南與士卒同食茶紙不復下城賊士攻城者巡以逆順説之往往棄賊來降為巡死戰前後二百餘人是時許叔冀在譙郡尚衡在彭城賀蘭進明在臨淮皆擁兵不救城中日蹙巡乃令南霽雲將三十騎犯圍而出告急於臨淮霽雲出城賊衆數萬遮之霽雲直衝其衆左右馳射賊衆披靡止亡兩騎既至臨淮見進明進明曰今日睢陽不知存亡兵去何益霽雲曰睢陽若陷霽雲請以死謝大夫且睢陽既拔即及臨淮譬如皮毛相依安得不救進明愛霽雲勇壯不聽其語彊留之具食與樂延霽雲坐霽雲慷慨泣且語曰霽雲來時睢陽之人不食月餘矣霽雲雖欲獨食且不下咽大夫坐擁彊兵觀睢陽陷沒曾無分災救患之意豈忠臣義士之所為乎因齧落一指以示進明曰霽雲既不能達主將之意請留一指以示信歸報座中往往為泣下霽雲察進明終無出師意遂去至寧陵與城使亷垣同將步騎三千人閏月戊申夜冒圍且戰且行至城下大戰壞賊營死傷之外僅得千人入城城中將吏知無救皆慟哭賊知援絶圍之益急初房琯為相惡賀蘭進明以為河南節度使以許叔冀為進明都知兵馬使俱兼御史大夫叔冀自恃麾下精鋭且官與進明等不受其節制故進明不敢分兵非惟疾巡逺功名亦懼為叔冀所襲也戊辰上勞饗諸將遣攻長安謂郭子儀曰事之濟否在此行也對曰此行不捷臣必死之辛未御史大夫崔光逺破賊於駱谷光逺行軍司馬王伯倫判官李椿將二千人攻中渭橋殺賊守橋者千人乘勝至苑門賊有先屯武功者聞之犇歸遇於苑北合戰殺伯倫擒椿送洛陽然自是賊不復屯武功矣賊屢攻上黨常為節度使程千里所敗蔡希徳復引兵圍上黨九月丁丑希徳以輕騎至城下挑戰千里帥百騎開門突出欲擒之㑹救至千里收騎退還橋壞墜塹中反為希徳所擒仰謂從騎曰吾不幸至此天也歸語諸將善為守備寧失帥不可失城希徳攻城竟不克送千里於洛陽安慶緒以為特進囚之客省郭子儀以囘紇兵精勸上益徵其兵以擊賊懷仁可汗遣其子葉護及將軍帝徳等將精兵四千餘人來至鳯翔上引見葉護宴勞賜賚惟其所欲丁亥元帥廣平王俶將朔方等軍及囘紇西域之衆十五萬號二十萬發鳯翔俶見葉護約為兄弟葉護大喜謂俶為兄囘紇至扶風郭子儀留晏三日葉護曰國家有急逺來相助何以食為宴畢卽行日給其軍羊二百口牛二十頭米四十斛庚子諸軍俱發壬寅至長安城西陳於香積寺北灃水之東李嗣業為前軍郭子儀為中軍王思禮為後軍賊衆十萬陳於其北李歸仁出挑戰官軍逐之逼於其陳賊軍齊進官軍却為賊所乘軍中驚亂賊爭趣輜重李嗣業曰今日不以身餌賊軍無孑遺矣乃肉􅃝執長刀立於陳前大呼奮擊當其刀者人馬俱碎殺數十人陳乃稍定於是嗣業帥前軍各執長刀如牆而進身先士卒所向摧靡都知兵馬使王難得救其禆將賊射之中眉皮垂鄣目難得自拔箭掣去其皮血流被面前戰不已賊伏精騎於陳東欲襲官軍之後偵者知之朔方左廂兵馬使僕固懷恩引囘紇救擊之翦滅殆盡賊由是氣索李嗣業又與囘紇出賊陳後與大軍夾擊自午及酉斬首六萬級填溝塹死者甚衆賊遂大潰餘衆走入城迨夜囂聲不止僕固懷恩言於廣平王俶曰賊棄城走矣請以二百騎追之縛取安守忠李歸仁等俶曰將軍戰亦疲矣且休息俟明旦圖之懷恩曰歸仁守忠賊之驍將驟勝而敗此天賜我也奈何縱之使復得衆還為我患悔之無及戰尚神速何明旦也俶固止之使還營懷恩固請往而復返一夕四五起遲明諜至守忠歸仁與張通儒田乾真等皆已遁矣癸卯大軍入西京初上欲速得京師與囘紇約曰克城之日土地士庶歸唐金帛子女皆歸囘紇至是葉護欲如約廣平王俶拜於葉護馬前曰今始得西京若遽俘掠則東京之人皆為賊固守不可復取矣願至東京乃如約葉護驚躍下馬答拜跪捧王足曰當為殿下徑往東京卽與僕固懷恩引囘紇西域之兵自城南過營於滻水之東百姓軍士胡虜見俶拜者皆泣曰廣平王真華夷之主上聞之喜曰朕不及也俶整衆入城百姓老幼夾道歡呼悲泣俶留長安鎮撫三日引大軍東出以太子少傅虢王巨為西京留守甲辰捷書至鳯翔百寮入賀上涕泗交頥卽日遣中使啖庭瑶入蜀奏上皇命左僕射裴冕入京師告郊廟及宣慰百姓上以駿馬召李泌於長安既至上曰朕已表請上皇東歸朕當還東宫復修人子之職泌曰表可追乎上曰已逺矣泌曰上皇不來矣上驚問故泌曰理勢自然上曰為之奈何泌曰今請更為羣臣賀表言自馬嵬請留靈武勸進及今成功聖上思戀晨昏請速還京以就孝養之意則可矣上即使泌草表上讀之泣曰朕始以至誠願歸萬機今聞先生之言乃寤其失立命中使奉表入蜀郭子儀引蕃漢兵追賊至潼闗斬首五千級克華陰𢎞農二郡闗東獻俘百餘人敇皆斬之監察御史李勉言於上曰今元惡未除為賊所汚者半天下聞陛下龍興咸思洗心以承聖化今悉誅之是驅之使從賊也上遽使赦之冬十月丁未啖庭瑶至蜀壬子興平軍奏破賊於武闗克上洛郡尹子竒久圍睢陽城中食盡議棄城東走張巡許逺謀以為睢陽江淮之保障若棄之去賊必乘勝長驅是無江淮也且我衆饑羸走必不逺古者戰國諸侯尚相救恤况密邇羣帥乎不如堅守以待之茶紙既盡遂食馬馬盡羅雀掘鼠雀鼠又盡巡出愛妾殺以食士逺亦殺其奴然後括城中婦人食之既盡繼以男子老弱人知必死莫有叛者所餘纔四百人癸丑賊登城將士病不能戰巡西向再拜曰臣力竭矣不能全城生既無以報陛下死當為厲鬼以殺賊城遂陷巡逺俱被執尹子竒謂巡曰聞君毎戰眥裂齒碎何也巡曰吾志吞逆賊但力不能耳子竒以刀抉其口視之所餘纔三四子竒義其所為欲活之其徒曰彼守節者也終不為吾用且得士心存之將為後患乃並南霽雲雷萬春等三十六人皆斬之巡且死顏色不亂揚揚如常生致許逺於洛陽巡初守睢陽時卒僅萬人城中居人亦且數萬巡一見問姓名其後無不識者前後大小戰幾四百餘殺賊卒十二萬人巡行兵不依古法教戰陳令本將各以其意教之人或問其故巡曰今與胡虜戰雲合鳥散變態不恒數步之間勢有同異臨機應猝在於呼吸之間而動詢大將事不相及非知兵之變者也故吾使兵識將意將識士情投之而往如手之使指兵將相習人自為戰不亦可乎自興兵器械甲仗皆取之於敵未甞自修每戰將士或退散巡立於戰所謂將士曰我不離此汝為我還決之將士莫敢不還死戰卒破敵又推誠待人無所疑隱臨敵應變出竒無窮號令明賞罰信與衆共甘苦寒暑故下爭致死力張鎬聞睢陽圍急倍道亟進檄浙東浙西淮南北海諸節度及譙郡太守閭丘曉使共救之曉素傲狠不受鎬命比鎬至睢陽城已陷三日鎬召曉杖殺之張通儒等收餘衆走保陜安慶緒悉發洛陽兵使其御史大夫嚴莊將之就通儒以拒官軍並舊兵步騎猶有十五萬己未廣平王俶至曲沃囘紇葉護使其將軍鼻施吐撥裴羅等引軍旁南山捜伏因駐軍嶺北郭子儀等與賊遇於新店賊依山而陳子儀等初與之戰不利賊逐之下山囘紇自南山襲其背於黃埃中發十餘矢賊驚顧曰囘紇至矣遂潰官軍與囘紇夾擊之賊大敗僵尸蔽野嚴莊張通儒等棄陜東走廣平王俶郭子儀入陜城僕固懷恩等分道追之嚴莊先入洛陽告安慶緒庚申夜慶緖帥其黨自苑門出走河北殺所獲唐將哥舒翰程千里等三十餘人而去許逺死於偃師壬戌廣平王俶入東京囘紇意猶未厭俶患之父老請率羅錦萬匹以賂囘紇囘紇乃止成都使還上皇誥曰當與我劒南一道自奉不復來矣上憂懼不知所為數日後使者至言上皇初得上請歸東宫表彷徨不能食欲不歸及羣臣表至乃大喜命食作樂下誥定行日上召李泌告之曰皆卿力也癸亥上發鳯翔遣太子太師韋見素入蜀奉迎上皇乙丑郭子儀遣左兵馬使張用濟右武鋒使渾釋之將兵取河陽及河内嚴莊來降陳留人殺尹子竒舉郡降田承嗣圍來填於潁川亦遣使來降郭子儀應之緩承嗣復叛與武令珣皆走河北制以填為淮南節度使丙寅上至望賢宫得東京捷奏丁卯上入西京百姓出國門奉迎二十里不絶舞躍呼萬嵗有泣者上入居大明宫御史中丞崔器令百官受賊官爵者皆脱巾徒跣立於含元殿前博膺頓首請罪環之以兵使百官臨視之太廟為賊所焚上素服向廟哭三日是日上皇發蜀郡安慶緒走保鄴郡改鄴郡為安成府改元天成從騎不過三百步卒不過千人諸將阿史那承慶等散投常山趙郡范陽旬日間蔡希徳自上黨田承嗣自潁川武令珣自南陽各帥所部兵歸之又召募河北諸郡人衆至六萬軍聲復振廣平王俶之入東京也百官受安祿山父子官者陳希烈等三百餘人皆素服悲泣請罪俶以上㫖釋之㝷勒赴西京己巳崔器令詣朝堂請罪如西京百官之儀然後收繫大理京兆獄其府縣所由祇承人等受賊驅使追捕者皆繫之初汲郡甄濟有操行隱居青巖山安祿山為采訪使奏掌書記濟察祿山有異志詐得風疾舁歸家祿山反使蔡希徳引行刑者二人封刀召之濟引首待刀希徳以實病白祿山後安慶緒亦使人彊舁至東京月餘㑹廣平王俶平東京濟起詣軍門上謁俶遣詣京師上命館之於三司令受賊官爵者列拜以媿其心以濟為祕書郎國子司業蘇源明稱病不受祿山官上擢為考功郎中知制誥壬申上御丹鳯樓下制士庶受賊官祿為賊用者令三司條件聞奏其因戰被虜或所居密近因與賊往來者皆聽自首除罪其子女為賊所汚者勿問癸酉囘紇葉護自東京還上命百官迎之於長樂驛上與宴於宣政殿葉護奏以軍中馬少請留其兵於沙苑自歸取馬還為陛下掃除范陽餘孽上賜而遣之十一月廣平王俶郭子儀來自東京上勞子儀曰吾之家國由卿再造張鎬帥魯炅來填呉王祇李嗣業李奐五節度徇河南河東郡縣皆下之惟能元皓據北海高秀巖據大同未下己丑以囘紇葉護為司空忠義王嵗遺囘紇絹二萬匹使就朔方軍受之上之在彭原也更以栗為九廟主庚寅朝享於長樂殿丙申上皇至鳯翔從兵六百餘人上皇命悉以甲兵輸郡庫上發精騎三千奉迎十二月丙午上皇至咸陽上備法駕迎於望賢宫上皇在宫南樓上釋黃袍著紫袍望樓下馬趨進拜舞於樓下上皇降樓撫上而泣上捧上皇足嗚咽不自勝上皇索黃袍自為上著之上伏地頓首固辭上皇曰天數人心皆歸於汝使朕得保養餘齒汝之孝也上不得已受之父老在仗外歡呼且拜上令開仗縱千餘人入謁上皇曰臣等今日復睹二聖相見死無恨矣上皇不肯居正殿曰此天子之位也上固請自扶上皇登殿尚食進食上品嘗而薦之丁未將發行宫上親為上皇習馬而進之上皇上馬上親執鞚行數步上皇止之上乘馬前引不敢當馳道上皇謂左右曰吾為天子五十年未為貴今為天子父乃貴耳左右皆呼萬歳上皇自開逺門入大明宫御含元殿慰撫百官乃詣長樂殿謝九廟主慟哭久之即日幸興慶宫遂居之上累表請避位還東宫上皇不許戊午上御丹鳯樓赦天下惟與安祿山同反及李林甫王鉷楊國忠子孫不在免例立廣平王俶為楚王加郭子儀司徒李光弼司空自餘蜀郡靈武扈從立功之臣皆進階爵加食邑有差李憕盧奕顏杲卿袁履謙許逺張巡張介然蔣清龐堅等皆加追贈官其子孫戰亡之家給復二載郡縣來載租庸三分蠲一近所改郡名官名一依故事以蜀郡為南京鳯翔為西京西京為中京以張良娣為淑妃立皇子南陽王係為趙王新城王僅為彭王潁川王僴為兖王東陽王侹為涇王僙為襄王倕為把王偲為召王佋為興王侗為定王議者或罪張巡以守睢陽不去與其食人曷若全人其友人李翰為之作傳表上之以為巡以寡擊衆以弱制彊保江淮以待陛下之師師至而巡死巡之功大矣而議者或罪巡以食人愚巡以守死善遏惡揚錄瑕棄功臣竊痛之巡所以固守者以待諸軍之救不至而食盡食既盡而及人乖其素志設使巡守城之初已有食人之計損數百之衆以全天下臣猶曰功過相掩况非其素志乎今巡死大難不睹休明唯其令名是有榮祿若不時紀錄恐逺而不傳使巡生死不遇誠可悲焉臣敬撰傳一卷獻上乞編列史官衆議由是始息是後赦令無不及李憕等而程千里獨以生執賊庭不沾褒贈甲子上皇御宣政殿以傳國寳授上上始涕泣而受之安慶緒之北走也其大將北平王李歸仁及精兵曳落河同羅六州胡數萬人皆潰歸范陽所過俘掠人物無遺史思明厚為之備且遣使逆招之范陽境曳落河六州胡皆降同羅不從思明縱兵擊之同羅大敗悉奪其所掠餘衆走歸其國慶緒忌思明之彊遣阿史那承慶安守忠往徵兵因密圖之判官耿仁智説思明曰大夫崇重人莫敢言仁智願一言而死思明曰何也仁智曰大夫所以盡力於安氏者迫於凶威耳今唐室中興天子仁聖大夫誠帥所部歸之此轉禍為福之計也禆將烏承玭亦説思明曰今唐室再造慶緒葉上露耳大夫奈何與之俱亡若歸款朝廷以自湔洗易於反掌耳思明以為然承慶守忠以五千勁騎自隨至范陽思明悉衆數萬迎之相距一里所使人謂承慶等曰相公及王逺至將士不勝其喜然邊兵怯懦懼相公之衆不敢進願弛弓以安之承慶等從之思明引承慶等入内㕔樂飲别遣人收其甲兵諸郡兵皆給糧縱遣之願留者厚賜分隸諸營明日囚承慶等遣其將竇子昻奉表以所部十三郡及兵八萬來降並帥其河東節度使高秀巖亦以所部來降乙丑子昻至京師上大喜以思明為歸義王范陽節度使子七人皆除顯官遣内侍李思敬與烏承恩往宣慰使將所部兵討慶緒先是慶緒以張忠志為常山太守思明召忠志還范陽以其將薛萼攝恒州刺史開井陘路招趙郡太守陸濟降之命其子朝義將兵五千人攝冀州刺史以其將令狐彰為博州刺史烏承恩所至宣布詔㫖滄瀛安深徳棣等州皆降雖相州未下河北率為唐有矣郭子儀還東都經營河北崔器吕諲上言諸陷賊官背國從偽準律皆應處死上欲從之李峴以為賊陷兩京天子南巡人自逃生此屬皆陛下親戚或勲舊子孫今一㮣以叛法處死恐乖仁恕之道且河北未平羣臣陷賊者尚多若寬之足開自新之路若盡誅之是堅其附賊之心也書曰殱厥渠魁脅從罔理諲器守文不達大體惟陛下圖之爭之累日上從峴議以六等定罪重者刑之於市次賜自盡次重杖一百次三等流貶壬申斬達奚珣等十八人於城西南獨柳樹下陳希烈等七人賜自盡於大理寺應受杖者於京兆府門上欲免張均張垍死上皇曰均垍事賊皆任權要均仍為賊毁吾家事罪不可赦上叩頭再拜曰臣非張説父子無有今日臣不能活均垍使死者有知何面目見説於九原因俯伏流涕上皇命左右扶上起曰張垍為汝長流嶺表張均必不可活汝更勿救上泣而從命安祿山所署河南尹張萬頃獨以在賊中能保庇百姓不坐頃之有自賊中來降者言唐羣臣從安慶緒在鄴者聞廣平王赦陳希烈等皆自悼恨失身賊庭及聞希烈等誅乃止上甚悔之臣光曰為人臣者策名委質有死無貳希烈等或貴為卿相或親連肺腑於承平之日無一言以規人主之失救社稷之危迎合取容以竊富貴及四海橫潰乘輿播越偷生茍免顧戀妻子媚賊稱臣為之陳力此乃屠酤之所羞犬馬之不如儻更全其首領復其官爵是諂諛之臣無往而不得計也彼顏杲卿張巡之徒世治則擯斥外方沈抑下僚世亂則委棄孤城齏粉寇手何為善者之不幸而為惡者之幸朝廷待忠義之薄而保姦邪之厚邪至於微賤之臣巡徼之隸謀議不預號令不及朝聞親征之詔夕失警蹕之所乃復責其不能扈從不亦難哉六等議刑斯亦可矣又何悔焉通鑑紀事本末卷三十一中欽定四庫全書通鑑紀事本末卷三十一下宋袁樞撰安史之亂三乾元元年官軍既克京城宗廟之器及府庫資財多散在民間遣使檢括頗有煩擾正月乙酉敇盡停之乃命京兆尹李峴安撫坊市二月丁未上御明鳯門赦天下改元盡免百姓今載租庸復以載為年安慶緒所署北海節度使能元皓舉所部來降以為鴻臚卿充河北招討使庚午以安東副大都護王𤣥志為營州刺史充平盧節度使安慶緒之北走也其平原太守王暕清河太守宇文寬皆殺其使者來降慶緒使其將蔡希徳安太清攻拔之生擒以歸咼於鄴市凡有謀歸者皆誅及種族乃至部曲州縣官屬連坐死者甚衆又與其羣臣㰱血盟於鄴南而人心益離慶緖聞李嗣業在河内夏四月與蔡希徳崔乾祐將步騎二萬涉沁水攻之不勝而還辛卯新主入太廟上享太廟張鎬性簡澹不事中要聞史思明請降上言思明凶險因亂竊位力彊則衆附勢奪則人離彼雖人面心如野獸難以徳懷願勿假以威權又言滑州防禦使許叔冀狡猾多詐臨難必變請徵入宿衛時上已寵納思明㑹中使自范陽及白馬來皆言思明叔冀忠懇可信上以鎬為不切事機五月罷為荆州防禦使以禮部尚書崔光逺為河南節度使贈故常山太守顏杲卿太子太保諡曰忠節以其子威明為太僕丞杲卿之死也楊國忠用張通幽之譖竟無褒贈上在鳯翔顏真卿為御史大夫泣訴於上上乃出通幽為普安太守具奏其狀於上皇上皇杖殺通幽杲卿子泉明為王承業所留因寓居壽陽為史思明所虜裹以牛革送於范陽㑹安慶緒初立有赦得免思明降乃得歸求其父尸於東京得之遂并袁履謙尸棺斂以歸杲卿姊妹女及泉明之子皆流落河北真卿時為蒲州刺史使泉明往求之泉明號泣求訪哀感路人久乃得之泉明詣親故乞索隨所得多少贖之先姑姊妹而後其子姑女為賊所掠泉明有錢二百緍欲贖己女閔其姑愁悴先贖姑女比更得錢求其女已失所在遇羣從姊妹及父時將吏袁履謙等妻子流落者皆與之歸凡五十餘家三百餘口均减資糧一如親戚至蒲州真卿悉加贍給久之隨其所適而資送之袁履謙妻疑履謙衣衾儉薄發棺視之與杲卿無異乃始慙服六月戊午敇兩京陷賊官三司推究未畢者皆釋之已貶降者續處分初史思明以列將事平盧軍使烏知義知義善待之知義子承恩為信都太守以郡降思明思明思舊恩而全之及安慶緒敗承恩説思明降唐李光弼以思明終當叛亂而承恩為思明所親信陰使圖之又勸上以承恩為范陽節度副使賜阿史那承慶鐵券令共圖思明上從之承恩多以私財募部曲又數衣婦人服詣諸將營説誘之諸將以白思明思明疑未察㑹承恩入京師上使内侍李思敬與之俱至范陽宣慰承恩既宣㫖思明留承恩館於府中帷其牀伏二人於牀下承恩少子在范陽思明使省其父夜中承恩密謂其子曰吾受命除此逆胡當以吾為節度使二人於牀下大呼而出思明乃執承恩索其裝囊得鐵券及光弼牒牒云承慶事成則付鐵券不然不可付也又得簿書數百紙皆先從思明反者將士名思明責之曰我何負於汝而為此承恩謝曰死罪此皆李光弼之謀也思明乃集將佐吏民西向大哭曰臣以十三萬衆降朝廷何負陛下而欲殺臣遂榜殺承恩父子連坐死者二百餘人承恩弟承玼走免思明囚思敬表上其狀上遣中使慰諭思明曰此非朝廷與光弼之意皆承恩所為殺之甚善㑹三司議陷賊官罪狀至范陽思明謂諸將曰陳希烈輩皆朝廷大臣上皇自棄之幸蜀今猶不免於死况吾屬本從安祿山反乎諸將請思明表求誅光弼思明從之命判官耿仁智與其僚張不矜為表云陛下不為臣誅光弼臣當自引兵就太原誅之不矜草表以示思明及將入函仁智悉削去之寫表者以白思明思明命執二人斬之仁智事思明久思明憐欲活之復召入謂曰我任使汝垂三十年今日非我負汝仁智大呼曰人生㑹有一死得盡忠義死之善者也今從大夫反不過延嵗月豈若速死之愈乎思明怒亂捶腦流於地烏承玼犇太原李光弼表為昌化郡王充石嶺軍使秋七月丁亥冊命回紇可汗曰英武威逺毗伽闕可汗乙未郭子儀入朝八月庚戌李光弼入朝丙辰以郭子儀為中書令光弼為侍中丁巳子儀詣行營囘紇遣其臣骨啜特勒及帝徳將驍騎三千助討安慶緒上命朔方左武鋒使僕固懷恩領之安慶緒之初至鄴也雖枝黨離析猶據七郡六十餘城甲兵資糧豐備慶緒不親政事專以繕臺沼樓船酣飲為事其大臣高尚張通儒等爭權不叶無復綱紀蔡希徳有才畧部兵精鋭而性剛好直言通儒譖而殺之麾下數千人皆逃散諸將怨怒不為用以崔乾祐為天下兵馬使摠中外兵乾祐愎戾好殺士卒不附九月庚寅命朔方郭子儀淮西魯炅興平李奐滑濮許叔冀鎮西北庭李嗣業鄭蔡季廣琛河南崔光逺七節度使及平盧兵馬使董秦將步騎二十萬討慶緒又命河東李光弼闗内澤潞王思禮二節度使將所部兵助之上以子儀光弼皆元勲難相統屬故不置元帥但以宦官開府儀同三司魚朝恩為觀軍容宣慰處置使觀軍容之名自此始冬十月郭子儀引兵自杏園濟河東至獲嘉破安太清斬首四千級捕虜五百人太清走保衛州子儀進圍之丙午遣使告捷魯炅自陽武濟季廣琛崔光逺自酸棗濟與李嗣業兵皆㑹子儀於衛州慶緒悉舉鄴中之衆七萬救衛州分三軍以崔乾祐將上軍田承嗣將下軍慶緒自將中軍子儀使善射者三千人伏於壘垣之内令曰我退賊必逐我汝乃登壘鼓譟而射之既而與慶緒戰偽退賊逐之至壘下伏兵起射之矢如雨注賊還走子儀復引兵逐之慶緒大敗獲其弟慶和殺之遂拔衛州慶緒走子儀等追之至鄴許叔冀董秦王思禮及河東兵馬使薛兼訓皆引兵繼至慶緒收餘衆拒戰於愁思岡又敗前後斬首三萬級捕虜千人慶緒乃入城固守子儀等圍之李光弼引兵繼至慶緒窘急遣薛嵩求救於史思明且請以位讓之思明發范陽兵十三萬欲救鄴觀望未敢進先遣李歸仁將步騎一萬軍於滏陽遙為慶緒聲勢十一月崔光逺拔魏州丙戌以前兵部侍郎蕭華為魏州防禦使㑹史思明分軍為三一出邢洺一出冀貝一自洹水趣魏州郭子儀奏以崔光逺代華十二月癸卯敇以光逺領魏州刺史史思明乘崔光逺初至引兵大下光逺使將軍李處崟拒之賊勢盛處崟連戰不利還趣城賊追至城下揚言曰處崟召我來何為不出光逺信之腰斬處崟處崟驍將衆所恃也既死衆無鬭志光逺脱身走還汴州丁卯思明陷魏州所殺三萬人二年春正月己巳朔史思明築壇於魏州城北自稱大聖燕王以周摰為行軍司馬李光弼曰思明得魏州而按兵不進此欲使我懈惰而精鋭掩吾不備也請與朔方軍同逼魏城求與之戰彼懲嘉山之敗必不敢輕出得曠日引久則鄴城必拔矣慶緒已死彼則無辭以用其衆也魚朝恩以為不可乃止鎮西節度使李嗣業攻鄴城為流矢所中丙申薨兵馬使荔非元禮代將其衆初嗣業表叚秀實為懷州長史知留後事時諸軍屯戍日久財竭糧盡秀實獨運芻粟募兵市馬以奉鎮西行營相繼於道二月郭子儀等九節度使圍鄴城築壘再重穿塹三重壅漳水灌之城中井泉皆溢構棧而居自冬涉春安慶緒堅守以待史思明食盡一鼠直錢四千淘牆䴰及馬尿以食焉人皆以為克在朝夕而諸軍既無統帥進退無所稟城中人欲降者礙水深不得出城久不下上下解體思明乃自魏州引兵趣鄴使諸將去城各五十里為營每營擊鼓三百而遙脅之又毎營選精騎五百日於城下抄掠官軍出即散歸其營諸軍人馬牛車日有所失樵采甚艱晝備之則夜至夜備之則晝至時天下饑饉轉餉者南自江淮西自并汾舟車相繼思明多遣壯士竊官軍裝號督趣運者責其稽緩妄殺戮人運者駭懼舟車所聚則密縱火焚之往復聚散自相辨識而官軍邏捕不能察也由是諸軍乏食人思自潰思明乃引大軍直抵城下官軍與之刻日決戰三月壬申官軍步騎六十萬陳於安陽河北思明自將精兵五萬敵之諸軍望之以為遊軍未介意思明直前奮擊李光弼王思禮許叔冀魯炅先與之戰殺傷相半魯炅中流矢郭子儀承其後未及布陳大風忽起吹沙拔木天地晝晦咫尺不相辨兩軍大驚官軍潰而南賊潰而北棄甲仗輜重委積於路子儀以朔方軍斷河陽橋保東京戰馬萬匹惟存三千甲仗十萬遺棄殆盡東京士民驚駭散奔山谷留守崔圓河南尹蘇震等官吏南奔襄鄧諸節度各潰歸本鎮士卒所過剽掠吏不能止旬日方定惟李光弼王思禮整勒部伍全軍以歸子儀至河陽將謀城守師人相驚又犇缺門諸將繼至衆及數萬議捐東京退保蒲陜都虞候張用濟曰蒲陜薦饑不如守河陽賊至倂力拒之子儀從之使都遊奕使靈武韓遊瓌將五百騎前趣河陽用濟以步卒五千繼之周摰引兵争河陽後至不得入而去用濟役所部兵築南北兩城而守之叚秀實帥將士妻子及公私輜重自野戍度河待命於河清之南岸荔非元禮至而軍焉諸將各上表請罪上皆不問惟削崔圓階封貶蘇震為濟王府長史削銀青階史思明審知官軍潰去自沙河收整士衆還屯鄴城南安慶緒收子儀等營中糧得六七萬石與孫孝哲崔乾祐謀閉門更拒思明諸將曰今日豈可復背史王乎思明不與慶緒相聞又不南追官軍但日於軍中饗士張通儒高尚等言於慶緒曰史王逺來臣等皆應迎謝慶緒曰任公蹔往思明見之涕泣厚禮而歸之經三日慶緒不至思明密召安太清令誘之慶緒窘蹙不知所為乃遣太清上表稱臣於思明請待解甲入城奉上璽綬思明省表曰何至如此因出表徧示將士咸稱萬歲乃手疏唁慶緒而不稱臣且曰願為兄弟之國更作藩籬之援鼎足而立猶或庶幾北面之禮固不敢受並封表還之慶緒大悦因請㰱血同盟思明許之慶緒以三百騎詣思明營思明令軍士擐甲執兵以待之引慶緒及諸弟入至庭下慶緒再拜稽首曰臣不克荷負棄失兩都久陷重圍不意大王以太上皇之故逺垂救援使臣應死復生摩頂至踵無以報徳思明忽震怒曰棄失兩都亦何足言爾為人子殺父奪其位天地所不容吾為太上皇討賊豈受爾佞媚乎即命左右牽出幷其四弟及高尚孫孝哲崔乾祐皆殺之張通儒李庭望等悉授以官思明勒兵入鄴城收其士馬以府庫賞將士慶緒先所有州縣及兵皆歸於思明遣安太清將兵五千取懷州因留鎮之思明欲遂西畧慮根本未固乃留其子朝義守相州引兵還范陽辛卯以荔非元禮為懷州刺史權知鎮西北庭行營節度使元禮復以叚秀實為節度判官丙申以郭子儀為東畿山東河東諸道元帥權知東京留守以河西節度使來填行陜州刺史充陜虢華州節度使夏四月庚子澤潞節度使王思禮破史思明將楊旻於潞城東九節度之潰於相州也魯炅所部兵剽掠尤甚聞郭子儀退屯河上李光弼還太原炅慙懼飲藥而死史思明自稱大燕皇帝改元順天立其妻辛氏為皇后子朝義為懷王以周摰為相李歸仁為將改范陽為燕京諸州為郡戊申以鴻臚卿李抱玉為鄭陳潁亳節度使觀軍容使魚朝恩惡郭子儀因其敗短之於上秋七月上召子儀還京師以李光弼為朔方節度使兵馬元帥光弼治軍嚴整始至號令一施士卒壁壘旌旗精彩皆變八月壬戌以李光弼為幽州長史河北節度等使九月史思明使其子朝清守范陽命諸郡太守各將兵三千從已向河南分為四道使其將令狐彰將兵五千自黎陽濟河取滑州思明自濮陽史朝義自白臯周摰自胡良濟河㑹於汴州李光弼方巡河上諸營聞之還入汴州謂汴滑節度使許叔冀曰大夫能守汴州十五日我則將兵來救叔冀許諾光弼還東京思明至汴州叔冀與戰不勝遂與濮州刺史董秦及其將梁浦劉從諫田神功等降之思明以叔冀為中書令與其將李詳守汴州厚待董秦收其妻子置長蘆為質使其將南徳信與梁浦劉從諫田神功等數十人徇江淮神功南宫人也思明以為平盧兵馬使頃之神功襲徳信斬之從諫脱身走神功將其衆來降思明乘勝西攻鄭州光弼整衆徐行至洛陽謂留守韋陟曰賊乘勝而來利在按兵不利速戰洛城不可守於公計何如陟請留兵於陜退守潼闗據險以挫其鋭光弼曰兩敵相當貴進忌退今無故棄五百里地則賊勢益張矣不若移軍河陽北連澤潞利則進取不利則退守表裏相應使賊不敢西侵此猿臂之勢也夫辨朝廷之禮光弼不如公論軍旅之事公不如光弼陟無以應判官韋損曰東京帝宅侍中奈何不守光弼曰守之則汜水崿嶺龍門皆應置兵子為兵馬判官能守之乎遂移牒留守韋陟使帥東京官屬西入闗牒河南尹李若幽使帥吏民出城避賊空其城光弼帥軍士運油鐵諸物詣河陽為守備光弼以五百騎殿時思明遊兵已至石橋諸將請曰今自洛城而北乎當石橋而進乎光弼曰當石橋而進及日暮光弼秉炬徐行部曲堅重賊引兵躡之不敢逼光弼夜至河陽有兵二萬糧纔支十日光弼按閲守備部分士卒無不嚴辦庚寅思明入洛陽城空無所得畏光弼掎其後不敢入宫退屯白馬寺南築月城於河陽南以拒光弼於是鄭滑等州相繼陷沒韋陟李若幽皆寓治於陜冬十月丁酉下制親征史思明羣臣上表諫乃止史思明引兵攻河陽使驍將劉龍仙詣城下挑戰龍仙恃勇舉右足加馬鬛上慢罵光弼光弼顧諸將曰誰能取彼者僕固懐恩請行光弼曰此非大將所為左右言禆將白孝徳可往光弼召問之孝徳請行光弼問須幾何兵對曰請挺身取之光弼壯其志然固問所須對曰願選五十騎出壘門為後繼兼請大軍助鼓譟以増氣光弼撫其背而遣之孝徳挾二矛策馬亂流而進半涉懷恩賀曰克矣光弼曰鋒未交何以知之懷恩曰觀其攬轡安閑知其萬全龍仙見其獨來甚易之稍近將動孝徳揺手示之若非來為敵者龍仙不測而止去之十步乃與之言龍仙慢罵如初孝徳息馬良久因瞋目謂曰賊識我乎龍仙曰誰也曰我白孝徳也龍仙曰是何狗彘孝徳大呼運矛躍馬搏之城上鼓譟五十騎繼進龍仙矢不及發環走堤上孝徳追及斬首􅂝之以歸賊衆大駭孝徳本安西胡人也思明有良馬千餘匹每日出於河南渚浴之循環不休以示多光弼命索軍中牝馬得五百匹縶其駒於城内俟思明馬至水際盡出之馬嘶不已思明馬悉浮渡河一時驅之入城思明怒列戰船數百艘泛火船於前而隨之欲乘流燒浮橋光弼先貯百尺長竿數百枚以巨木承其根氊裹鐵义置其首以迎火船而义之船不得進須臾自焚盡又以义拒戰船於橋上發礮石擊之中者皆沈沒賊不勝而去思明屯兵於河清欲絶光弼糧道光弼軍於野水度以備之既夕還河陽留兵千人使部將雍希顥守其柵曰賊將高庭暉李日越喻文景皆萬人敵也思明必使一人來劫我我且去之汝待於此若賊至勿與之戰降則與之俱來諸將莫諭其意皆竊笑之既而思明果謂李日越曰李光弼長於憑城今出在野此成擒矣汝以鐵騎宵濟為我取之不得則勿返日越將五百騎晨至柵下希顥阻壕休卒吟嘯相視日越怪之問曰司空在乎曰夜去矣兵幾何曰千人將誰曰雍希顥日越黙計久之謂其下曰今失李光弼得希顥而歸吾死必矣不如降也遂請降希顥與之俱見光弼光弼厚待之任以心腹高庭暉聞之亦降或問光弼降二將何易也光弼曰此人情耳思明常恨不得野戰聞我在外以為必可取日越不獲我勢不敢歸庭暉才勇過於日越聞日越被寵任必思奪之矣庭暉時為五臺府果毅己亥以庭暉為右武衛大將軍思明復攻河陽光弼謂鄭陳節度使李抱玉曰將軍能為我守南城二日乎抱玉曰過期何如光弼曰過期救不至任棄之抱玉許諾勒兵拒守城且陷抱玉給之曰吾糧盡明旦當降賊喜斂軍以待之抱玉繕完成備明日復請戰賊怒急攻之抱玉出竒兵表裏夾擊殺傷甚衆董秦從思明寇河陽夜帥其衆五百拔栅突圍降於光弼時光弼自將屯中潬城外置柵柵外穿塹深廣二丈乙巳賊將周摰捨南城倂力攻中潬光弼命荔非元禮出勁卒於羊馬城以拒賊光弼自於城東北隅建小朱旗以望賊賊恃其衆直進逼城以車載攻具自隨督衆填塹三面各八道以過兵又開柵為門光弼望賊逼城使問元禮曰中丞視賊填塹開柵過兵晏然不動何也元禮曰司空欲守乎戰乎光弼曰欲戰元禮曰欲戰則賊為吾填塹何為禁之光弼曰善吾所不及勉之元禮俟柵開帥敢死士突出擊賊却走數百步元禮度賊陳堅未易摧陷乃復引退須其怠而擊之光弼望見元禮退怒遣左右召欲斬之元禮曰戰正急召何為乃退入柵中賊亦不敢逼良久鼓譟出柵門奮擊破之周摰復收兵趣北城光弼遽帥衆入北城登城望賊曰賊兵雖多囂而不整不足畏也不過日中保為諸君破之乃命諸將出戰及期不決召諸將問曰向來賊陳何方最堅曰西北隅光弼命其將郝廷玉當之廷玉請騎兵五百與之三百又問其次堅者曰東南隅光弼命其將論惟貞當之惟貞請騎三百與之二百光弼令諸將曰爾軰望吾旗而戰吾颭旗緩任爾擇利而戰吾急颭旗三至地則萬衆齊入死生決之少退者斬又以短刀置鞾中曰戰危事吾國之三公不可死賊手萬一戰不利諸君前死於敵我自剄於此不令諸君獨死也諸將出戰頃之廷玉奔還光弼望之驚曰廷玉退吾事危矣命左右取廷玉首廷玉曰馬中箭非敢退也使者馳報光弼令易馬遣之僕固懷恩及其子開府儀同三司㻛戰小却光弼又命取其首懷恩父子顧見使者提刀馳來更前決戰光弼連颭其旗諸將齊進致死呼聲動天地賊衆大潰斬首千餘級捕虜五百人溺死者千餘人周摰以數騎遁去擒其大將徐璜玉李泰授其河南節度使安太清走保懷州思明不知摰敗尚攻南城光弼驅俘囚臨河示之乃遁丁巳以李日越為右金吾大將軍十一月甲子以殿中監董秦為陜西神策兩軍兵馬使賜姓名李忠臣發安西北庭兵屯陜以備史思明十一月史思明遣其將李歸仁將鐵騎五千寇陜州神策兵馬使衛伯玉以數百騎擊破之於礓子坂得馬六百匹歸仁走以伯玉為鎮西四鎮行營節度使李忠臣與歸仁等戰於永寧莎柵之間屢破之上元元年春正月辛巳以李光弼為太尉兼中書令餘如故二月李光弼攻懷州史思明救之癸卯光弼逆戰於沁水之上破之斬首三千餘級三月庚寅李光弼破安太清於懷州城下夏四月壬辰破史思明於河陽西渚斬首千五百餘級閏月丁卯加河東節度使王思禮為司空己卯史思明入東京六月平盧兵馬使田神功奏破史思明之兵於鄭州冬十一月李光弼攻懷州百餘日乃拔之生擒安太清史思明遣其將田承嗣將兵五千徇淮西王同芝將兵三千人徇陳許敬江將二千人徇兖鄆薛鄂將五千人徇曹州十二月兖鄆節度使能元皓擊史思明兵破之二年春正月癸卯史思明改元應天或言洛中將士皆燕人久戍思歸上下離心急擊之可破也陜州觀軍容使魚朝恩以為信然屢言於上上敇李光弼等進取東京光弼奏稱賊鋒尚鋭未可輕進朔方節度使僕固懷恩勇而愎麾下皆蕃漢勁卒恃功多不法郭子儀寬厚曲容之毎用兵臨敵倚以集事李光弼性嚴一裁之以法無所假貸懷恩憚光弼而心惡之乃附朝恩言東都可取由是中使相繼督光弼使出師光弼不得已使鄭陳節度使李抱玉守河陽與懷恩將兵㑹朝恩及神策節度使衛伯玉攻洛陽戊寅陳於邙山光弼命依險而陳懷恩陳於平原光弼曰依險則可以進可以退若平原戰而不利則盡矣思明不可忽也命移於險懷恩復止之史思明乘其陳未定進兵薄之官軍大敗死者數千人軍資器械盡棄之光弼懷恩度河走保聞喜朝恩伯玉奔還陜抱玉亦棄河陽走河陽懷州皆沒於賊朝廷聞之大懼益兵屯陜史思明猜忌好殺羣下小不如意動至族誅人不自保朝義其長子也常從思明將兵頗謙謹愛士卒將士多附之無寵於思明思明愛少子朝清使守范陽常欲殺朝義立朝清為太子左右頗泄其謀思明旣破李光弼欲乘勝西入關使朝義將兵為前鋒自北道襲陜城思明自南道將大軍繼之三月甲午朝義兵至礓子嶺衛伯玉逆撃破之朝義數進兵皆為陜兵所敗思明退屯永寧以朝義為怯曰終不足成吾事欲按軍法斬朝義及諸將戊戌命朝義築三隅城欲貯軍糧期一日畢朝義築畢未泥思明至詬怒之令左右立馬監泥斯須而畢思明又曰俟克陜州終斬此賊朝義憂懼不知所為思明在鹿橋驛令腹心曹將軍將兵宿衛朝義宿於逆旅其部將駱悦蔡文景説朝義曰悦等與王死無日矣自古有廢立請召曹將軍謀之朝義俛首不應悦等曰王茍不許悦等今歸李氏王亦不全矣朝義泣曰諸君善為之勿驚聖人悦等乃令許叔冀之子季常召曹將軍至則以其謀告之曹將軍知諸將盡怨恐禍及己不敢違是夕悦等以朝義部兵三百被甲詣驛宿衛兵怪之畏曹將軍不敢動悦等引兵入至思明寢所值思明如厠問左右未及對已殺數人左右指示之思明聞有變踰垣至廏中自鞴馬乘之悦傔人周子俊射之中臂墜馬遂擒之思明曰亂者為誰悦曰奉懷王命思明曰我朝來語失宜其及此然殺我太早何不待我克長安今事不成矣悦等送思明於栁泉驛囚之還報朝義曰事成矣朝義曰不驚聖人乎悦曰無時周摰許叔冀將後軍在福昌悦等使許季常往告之摰驚倒於地朝義引軍還摰叔冀來迎悦等勸朝義執摰殺之軍至桞泉悦等恐衆心未壹遂縊殺思明以氊裹其尸橐駝負歸洛陽朝義即帝位改元顯聖密使人至范陽敇散騎常侍張通儒等殺朝清及朝清母辛氏並不附己者數十人其黨自相攻擊戰城中數月死者數千人范陽乃定朝義以其將栁城李懷仙為范陽尹燕京留守時洛陽四面數百里州縣皆為丘墟而朝義所部節度使皆安祿山舊將與思明等夷朝義召之多不至畧相羈縻而已不能得其用李光弼上表固求自貶制以開府儀同三司侍中領河中節度使夏四月乙亥青密節度使向衡破史朝義兵斬首五千餘級丁丑兖鄆節度使能元皓破朝義兵五月己丑李光弼自河中入朝初史思明以其博州刺史令狐彰為滑鄭汴節度使將數千兵戍滑臺彰密因中使楊萬定通表請降徙屯杏園度思明疑之遣其將薛岌圍之彰與岌戰大破之因隨萬定入朝甲午以彰為滑衛等六州節度使戊戌平盧節度使侯希逸擊史朝義范陽兵破之復以李光弼為河南副元帥太尉兼侍中都統河南淮南東西山南東荆南江南西浙江東西八道行營節度出鎮臨淮六月甲寅青密節度使能元皓敗史朝義將李元遇秋八月己巳李光弼赴河南行營建子月神策節度使衛伯玉攻史朝義拔永寧破澠池福昌長水等縣建丑月平盧節度使侯希逸與范陽相攻連年救援既絶又為奚所侵乃悉舉其軍二萬餘人襲李懷仙破之因引兵而南寶應元年建寅月李光弼拔許州擒史朝義所署潁川太守李春朝義將史參救之丙午戰於城下又破之戊申平盧節度使侯希逸於青州北度河而㑹田神功能元皓於兖州建卯月戊辰淮西節度使王仲昇與史朝義將謝欽讓戰於申州城下為賊所虜淮西震駭㑹侯希逸田神功能元皓攻汴州朝義召欽讓兵救之史朝義圍李抱玉於澤州建巳月庚戌李抱玉破史朝義兵於城下甲寅上皇崩史朝義自圍宋州數月城中食盡將陷刺史李岑不知所為遂城果毅開封劉昌曰倉中猶有麯數千斤請屑食之不過二十日李太尉必救我城東南隅最危昌請守之李光弼至臨淮諸將以朝義兵尚彊請南保揚州光弼曰朝廷倚我以為安危我復退縮朝廷何望且吾出其不意賊安知吾之衆寡遂徑取徐州使兖鄆節度使田神功進擊朝義大破之秋九月上遣中使劉清潭使於回紇修舊好且徵兵討史朝義清潭至其廷回紇登里可汗已為朝義所誘云唐室繼有大喪今中原無主可汗宜速來共收其府庫可汗信之清潭致敇書曰先帝雖棄天下今上繼統乃昔日廣平王與葉護共收兩京者也回紇業已起兵至三城見州縣皆為丘墟有輕唐之心乃困辱清潭清潭遣使言狀且曰回紇舉國十萬衆至矣京師大駭上遣殿中監藥子昻往勞之於忻州南可汗請與僕固懷恩相見懷恩時在汾州上令往見之懷恩為可汗言唐家恩信不可負可汗悦遣使上表請助國討朝義可汗欲自蒲關入由沙苑出潼關東向藥子昻説之曰關中數遭兵荒州縣蕭條無以供擬恐可汗失望賊兵盡在洛陽請自土門略邢洺懷衛而南得其資財以充軍裝可汗不從又請自太行南下據河陰扼賊咽喉亦不從又請自陜州大陽津渡河食太原倉粟與諸道俱進乃從之冬十月以雍王适為天下兵馬元帥辛酉辭行以兼御史中丞藥子昻魏琚為左右廂兵馬使以中書舍人韋少華為判官給事中李進為行軍司馬㑹諸道節度使及回紇於陜州進討史朝義上欲以郭子儀為适副程元振魚朝恩等沮之而止加朔方節度使僕固懷恩同平章事兼絳州刺史領諸軍節度行營以副适戊辰諸軍發陜州僕固懷恩與囘紇左殺為前鋒陜西節度使郭英乂神策觀軍容使魚朝恩為殿自澠池入澤潞節度使李抱玉自河陽入河南等道副元帥李光弼自陳留入雍王留陜州辛未懷恩等軍於同軌史朝義聞官軍將至謀於諸將阿史那承慶曰唐若獨與漢兵來宜悉衆與戰若與囘紇俱來其鋒不可當宜退守河陽以避之朝義不從壬申官軍至洛陽北郊分兵取懷州癸酉拔之乙亥官軍陳於橫水賊衆數萬立柵自固懷恩陳於西原以當之遣驍騎及囘紇竝南山出柵東北表裏合擊大破之朝義悉其精兵十萬救之陳於昭覺寺官軍驟擊之殺傷甚衆而賊陳不動魚朝恩遣射生五百人力戰賊雖多死者陳亦如初鎮西節度使馬璘曰事急矣遂單騎奮擊奪賊两牌突入萬衆中賊左右披靡大軍乘之而入賊衆大敗轉戰於石榴園老君廟賊又敗人馬相蹂踐填尚書谷斬首六萬級捕虜二萬人朝義將輕騎數百東走懷恩進克東京及河陽城獲其中書令許叔冀王伷等承制釋之懷恩留囘紇可汗營於河陽使其子右廂兵馬使㻛及朔方兵馬使高輔成帥步騎萬餘乘勝逐朝義至鄭州再戰皆捷朝義至汴州其陳留節度使張獻誠閉門拒之朝義奔濮州獻誠開門出降囘紇入東京肆行殺掠死者萬計火累旬不滅朔方神策軍亦以東京鄭汴汝州皆為賊境所過虜掠三月乃已比屋蕩盡士民皆衣紙囘紇悉置所掠寶貨於河陽留其將安恪守之十一月丁丑露布至京師朝義自濮州北度河懷恩進攻滑州拔之追敗朝義於衛州朝義睢陽節度使田承嗣等將兵四萬餘人與朝義合復來拒戰僕固㻛擊破之長驅至昌樂東朝義帥魏州兵來戰又敗走於是鄴郡節度使薛嵩以相衛洺邢四州降於陳鄭澤潞節度使李抱玉恒陽節度使張忠志以恒趙深定易五州降於河東節度使辛雲京嵩楚玉之子也抱玉等已進軍入其營按其部伍嵩等皆受代居無何僕固懷恩皆令復位由是抱玉雲京疑懷恩有貳心各表言之朝廷密為之備懷恩亦上疏自理上慰勉之辛巳制東京及河南北受偽官者一切不問丁酉以張忠志為成徳軍節度使統恒趙深定易五州賜姓李名寶臣初辛雲京引兵將出井陘常山禆將王武俊説寶臣曰今河東兵精鋭出境逺鬭不可敵也且吾以寡當衆以曲遇直戰則必離守則必潰公其圖之寶臣乃撤守備舉五州來降及復為節度使以武俊之策為善擢為先鋒兵馬使武俊本契丹也初名沒諾干郭子儀以僕固懷恩有平河朔功請以副元帥讓之己亥以懷恩為河北副元帥加左僕射兼中書令單于鎮北大都護朔方節度使史朝義走至貝州與其大將薛忠義等兩節度合僕固㻛追之至臨清朝義自衡水引兵三萬還攻之㻛設伏擊走之囘紇又至官軍益振遂逐之大戰於下博東南賊大敗積尸擁流而下朝義奔莫州懷恩都知兵馬使薛兼訓兵馬使郝庭玉與田神功辛雲京㑹於下博進圍朝義於莫州青淄節度使侯希逸繼至代宗廣徳元年史朝義屢出戰皆敗田承嗣説朝義令親往幽州發兵還救莫州承嗣自請留守莫州朝義從之選精騎五千自北門犯圍而出朝義既去承嗣卽以城降送朝義母妻子於官軍於是僕固㻛侯希逸薛兼訓等帥衆三萬追之及於歸義與戰朝義敗走時朝義范陽節度使李懷仙已因中使駱奉仙請降遣兵馬使李抱忠將兵三千鎮范陽縣朝義至范陽不得入官軍將至朝義遣人諭抱忠以大軍留莫州輕騎來發兵救援之意因責以君臣之義抱忠對曰天不祚燕唐室復興今既歸唐矣豈可更為反覆獨不愧三軍邪大丈夫恥以詭計相圖願早擇去就以謀自全且田承嗣必已叛矣不然官軍何以得至此朝義大懼曰吾朝來未食獨不能以一餐相餉乎抱忠乃令人設食於城東於是范陽人在朝義麾下者竝拜辭而去朝義涕泣而已獨與胡騎數百旣食而去東奔廣陽廣陽不受欲北入奚契丹至溫泉柵李懷仙遣兵追之朝義窮蹙縊於林中懷仙取其首以獻僕固懷恩與諸軍皆還甲辰朝義首至京師秋七月壬寅羣臣上尊號曰寶應元聖文武孝皇帝壬子赦天下改元諸將討史朝義者進官階加爵邑有差冊囘紇可汗為頡咄登甯施合俱錄英義建功毗伽可汗可敦為婆墨光親麗華毗伽可敦左右殺以下皆封賞通鑑紀事本末卷三十一下
