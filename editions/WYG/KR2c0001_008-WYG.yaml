body:
  text: 通鑑紀事本末卷八上宋袁樞撰宦官亡漢黨銅之禍董卓之亂漢和帝永元四年竇憲兄弟專權帝以朝臣上下莫不附憲獨中常侍鈎盾令鄭衆不事豪黨遂與定議誅憲事見竇氏專恣鄭衆遷大長秋帝策勲班賞衆每辭多受少帝由是賢之常與之議論政事宦官用權自此始矣十四年初封大長秋鄭衆為鄛鄉侯安帝永初元年秋九月庚午太尉徐防以災異冦賊䇿免辛未司空尹勤以水雨漂流䇿免仲長統昌言曰光武皇帝愠數世之失權忿彊臣之竊命矯枉過直政不任下雖置三公事歸臺閣自此以来三公之職備員而已然政有不治猶加譴責而權移外蹙之家寵被近習之豎親其黨類用其私人内充京師外布列郡顛倒賢愚貿易選舉疲駑守境貪殘牧民撓擾百姓忿怒四夷招致乖叛亂離斯瘼怨氣並作隂陽失和三光虧缺乖異數至蟲螟食稼水旱為灾此皆戚宦之臣所致然也反以䇿讓三公至於死免乃足為呌呼蒼天號咷泣血者矣昔文帝之扵鄧通可謂至愛而猶展申屠嘉之志夫見任如此則何患於左右小臣哉至如近世外戚宦豎請託不行意氣不滿立能陷人扵不測之禍惡可得彈正者哉大長秋鄭衆中常侍蔡倫等皆秉勢豫政周章數進直言太后不能用建光元年帝以江京嘗迎帝於邸封為都鄉侯李閏為雍鄉侯閏京與中常侍樊豐黄門令劉安鈎盾令陳達等扇動内外競為侈虐司徒楊震上疏不省延光二年中常侍樊豐等更相扇動傾揺朝廷楊震上疏不聽三年樊豐等見楊震連諫不從無所顧忌震復上疏豐等惶怖遂共譛震收震太尉印綬遣歸本郡震飲酖而卒秋八月江京樊豐等廢太子保為濟陰王四年北鄉侯即位有司奏樊豐等互作威福皆下獄死冬十月中常侍孫程等迎濟陰王即皇帝位五事並見佞倖廢立順帝陽嘉二年夏六月丁丑洛陽宣徳亭地拆長八十五文帝引公卿所舉敦樸之士使之對䇿及特問以當世之敝為政所宜李固對曰詔書所以禁侍中尚書中臣子弟不得為吏察孝亷者以其秉威權容請託故也而中常侍在日月之側聲勢振天下子弟祿任曾無限極雖外託謙黙不干州郡而謟偽之徒望風進舉今可為設常禁同之中臣昔館陶公主為子求郎明帝不許賜錢千萬所以輕厚賜重薄位者為官人失才害及百姓也竊聞長水司馬武宣開陽城門候羊廸等無它功徳初拜便真此雖小失而漸壞舊章先聖法度所宜堅守故政教一跌百年不復詩云上帝板板下民卒癉刺周王變祖法度故使下民將盡病也今陛下之有尚書猶天之有北斗也斗為天喉舌尚書亦為陛下喉舌斗斟酌元氣運乎四時尚書出納王命賦政四海權尊勢重責之所歸若不平心灾𤯝必至誠宜審擇其人以毗聖政今與陛下共天下者外則公卿尚書内則常侍黄門辟猶一門之内一家之事安則共其福慶危則通其禍敗刺史二千石外統職事内受法則夫表曲者景必邪源清者流必潔猶叩樹本百枝皆動也由此言之本朝號令豈可蹉跌天下之紀綱當今之急務也夫人君之有政猶水之有隄防隄防完全雖遭雨水霖潦不能為變政教一立蹔遭凶年不足為憂誠令隄防穿漏萬夫同力不能復救政教一壊賢智馳騖不能復還今隄防雖堅漸有孔穴譬之一人之身本朝者心腹也州郡者四支也心腹痛則四支不舉故臣之所憂在心腹之疾非四支之患也茍堅隄防務政教先安心腹整理本朝雖有冦賊水旱之變不足介意也誠令隄防壞漏心腹有疾雖無水旱之灾天下固可以憂矣又宜罷退宦官去其權重裁置常侍二人方直有徳者省事左右小黄門五人才智閒雅者給事殿中如此則論者厭塞升平可致也上覽衆對以李固為第一諸常侍叩頭謝罪朝廷肅然以固為議郎宦者疾之詐為飛章以陷其罪事從中下大司農南郡黄尚等請之於梁商僕射黄瓊復救明其事久乃得釋出為洛令固棄官歸漢中四年春二月初聽中官得以養子襲爵初帝之復位宦官之力也由是有寵參與政事御史張綱上書曰竊尋文明二帝徳化尤盛中官常侍不過兩人近倖賞賜裁滿數金惜費重民故家給人足而頃者以来無功小人皆有官爵非愛民重器承天順道者也書奏不省永和元年十二月以前司空王龔為太尉龔疾宦官專權上書極言其狀諸黄門使客誣奏龔罪上命龔亟自實李固奏記於梁商曰王公以堅貞之操横為讒佞所誣衆人聞知莫不歎慄夫三公尊重無詰理訴寃之義纎微感㮣輒引分决是以舊典不有大罪不至重問王公卒有它變則朝廷獲害賢之名羣臣無救䕶之節矣語曰善人在患饑不及餐斯其時也商即言之於帝事乃得釋二年冬十月丁卯京師地震太尉王龔以中常侍張昉等專弄國權欲奏誅之宗親有以楊震行事諫之者龔乃止三年梁商以曹節等用事遣子冀不疑與交友桓帝建和元年秋七月詔封中常侍劉廣等皆為列侯杜喬諫之書奏不省宦者唐衡左悺等共譖杜喬與李固以帝不堪奉漢祀帝怨之後梁冀誣李固杜喬與妖賊劉文等交通皆收繫死獄中三事並見梁氏之變永興元年秋七月郡國三十二蝗河水溢百姓饑窮流亡者數十萬户冀州尤甚詔以侍御史朱穆為冀州刺史冀部令長聞穆濟河解印綬去者四十餘人及到奏劾諸郡貪汚者有至自殺或死獄中宦者趙忠䘮父歸𦵏安平僭為玉匣穆下郡案驗吏畏其嚴遂發墓剖棺陳尸出之帝聞大怒徵穆詣廷尉輸作左校大學書生潁川劉陶等數千人詣闕上書訟穆曰伏見弛刑徒朱穆處公憂國拜州之日志清姦惡誠以常侍貴寵父兄子弟布在州郡競為虎狼噬食小民故穆張理天綱補綴漏目羅取殘禍以塞天意由是内官咸共恚疾謗讟煩興讒隙仍作極其刑讁輸作左校天下有識皆以穆同勤禹稷而被共鯀之戾若死者有知則唐帝怒於崇山重華忿於蒼墓矣當今中官近習竊持國柄手握王爵口含天憲運賞則使餓𨽻富於季孫呼噏則令伊顔化為桀跖而穆獨亢然不顧身害非惡榮而好辱惡生而好死也徒感王綱之不攝懼天綱之久失故竭心懷憂為上深計臣願黥首擊趾代穆校作帝覽其奏乃赦之永夀元年春二月司𨽻冀州饑人相食太學生劉陶上疏陳事曰夫天之與帝帝之與民猶頭之與足相須而行也陛下目不視鳴條之事耳不聞檀車之聲天灾不有痛於肌膚震食不即損於聖體故蔑三光之謬輕上天之怒伏念髙祖之起始自布衣合散扶傷克成帝業勤亦至矣流福遺祚至於陛下陛下既不能增明烈考之軌而忽髙祖之勤妄假利器委授國柄使羣醜刑𨽻芟刈小民虎豹窟於麑場豺狼乳於春囿貨殖者為窮寃之魂貧餒者作饑寒之鬼死者悲於窀穸生者戚於朝野是愚臣所為咨嗟長懐歎息者也且秦之將亡正諫者誅諛進者賞嘉言結於忠舌國命出於讒口擅閻樂於咸陽授趙高以車府權去已而不知威離身而不顧古今一揆成敗同勢願陛下逺覽彊秦之傾近察哀平之變得失昭然禍福可見臣又聞危非仁不扶亂非智不救竊見故冀州刺史南陽朱穆前烏桓校尉臣同郡李膺皆履正清平貞高絶俗斯實中興之良佐國家之柱臣也宜還本朝夾輔王室臣敢吐不時之義於諱言之朝猶冰霜見日必至消滅臣始悲天下之可悲今天下亦悲臣之愚惑也書奏不省延熹二年秋七月帝召小黄門史唐衡中常侍單超小黄門史左悺中常侍徐璜黄門令具瑗等五人共定議誅梁冀事見梁氏之變八月詔賞誅梁冀之功封單超徐璜具瑗左悺唐衡皆為縣侯超食二萬户璜等各萬餘户世謂之五侯仍以悺衡為中常侍又封尚書令尹勲等七人皆為亭侯帝既誅梁冀故舊恩私多受封爵追贈皇后父鄧香為車騎將軍封安陽侯更封后母宣為昆陽君兄子康秉皆為列侯宗族皆列校郎將賞賜以巨萬計中常侍侯覽上縑五千匹帝賜爵關内侯又託以與議誅冀進封高鄉侯又封小黄門劉普趙忠等八人為鄉侯自是權埶專歸宦官矣五侯尤貪縱傾動内外時灾異數見白馬令甘陵李雲露布上書移副三府曰梁冀雖恃權専擅虐流天下今以罪行誅猶召家臣搤殺之耳而猥封謀臣萬户以上高祖聞之得無見非西北列將得無解體孔子曰帝者諦也今官位錯亂小人謟進財貨公行政化日損尺一拜用不經御省是帝欲不諦乎帝得奏震恐下有司逮雲詔尚書都䕶劔㦸送黄門北寺獄使中常侍管霸與御史廷尉雜考之時𢎞農五官掾杜衆傷雲以忠諫獲罪上書願與雲同日死帝愈怒遂并下廷尉大鴻臚陳蕃上疏曰李雲所言雖不識禁忌干上逆㫖其意歸於忠國而已昔高祖忍周昌不諱之諫成帝赦朱雲腰領之誅今日殺雲臣恐剖心之譏復議於世矣太常楊秉雒陽市長沐茂郎中上官資並上䟽請雲帝恚甚有司奏以為大不敬詔切責蕃秉免歸田里茂資貶秩二等時帝在濯龍池管霸奏雲等事霸跪言曰李雲野澤愚儒杜衆郡中小吏出於狂戇不足加罪常謂霸曰帝欲不諦是何等語而常侍欲原之邪顧使小黄門可其奏雲衆皆死獄中於是嬖寵益横太尉瓊自度力不能制乃稱疾不起上疏曰陛下即位以来未有勝政諸梁秉權豎宦充朝李固杜喬既以忠言横見殘滅而李雲杜衆復以直道繼踵受誅海内傷懼益以怨結朝野之人以忠為諱尚書周永素事梁冀假其威勢見冀將衰乃陽毁示忠遂因姦計亦取封侯又黄門挾邪羣輩相黨自冀興盛腹背相親朝夕圖謀共構姦軌臨冀黨誅無可設巧復記其惡以要爵賞陛下不加清徵審别真偽復與忠臣並時顯封使朱紫共色粉墨雜揉所謂抵金玉於沙礫碎珪璧於泥塗四方聞之莫不憤歎臣世荷國恩身輕位重敢以垂絶之日陳不諱之言書奏不納冬十月中常侍單超疾病壬寅以超為車騎將軍是時封賞踰制内寵猥盛陳蕃上疏曰夫諸侯上象四七藩屏上國高祖之約非功臣不侯而聞追録河南尹鄧萬世父遵之微功更爵尚書令黄雋先人之絶封近習以非義授邑左右以無功傳賞至乃一門之内侯者數人故緯象失度陰陽謬序臣知封事已行言之無及誠欲陛下從是而止又采女數千食肉衣綺脂油粉黛不可貲計鄙諺言盗不過五女門以女貧家也今後宫之女豈不貧國乎帝頗采其言為出官女五百餘人但賜雋爵關内侯而封萬世南鄉侯帝從容問侍中陳留爰延朕何如主也對曰陛下為漢中主帝曰何以言之對曰尚書令陳蕃任事則治中常侍黄門與政則亂是以知陛下可與為善可與為非帝曰昔朱雲廷折欄檻今侍中面稱朕違敬聞闕矣拜五官中郎將三年春正月丙午新豐侯單超卒賜東園袐器棺中玉具及𦵏發五營騎士將作大匠起冢塋其後四侯轉横天下為之語曰左回天具獨坐徐卧虎唐雨墮皆競起第宅以華侈相尚其僕從皆乘牛車而從列騎兄弟姻戚宰州臨郡辜較百姓與盗無異虐徧天下民不堪命故多為盗賊焉中常侍侯覽小黄門段珪皆有田業近濟北界僕從賓客劫掠行旅濟北相滕延一切收捕殺數十人陳尸路衢覽珪以事訴帝延坐徵詣廷尉免左悺兄勝為河東太守皮氏長京兆趙岐恥之即日棄官西歸唐衡兄玹為京兆尹素與岐有隙收岐家屬宗親陷以重灋盡殺之岐逃難四方靡所不歴自匿姓名賣餅北海市中安丘孫嵩見而異之載與俱歸藏於複壁中及諸唐死遇赦乃敢出六年十二月以衛尉周景為司空景榮之孫也時宦官方熾景與太尉楊秉上言内外吏職多非其人舊典中臣子弟不得居位秉埶而今枝葉賓客布列職署或年少庸人典據守宰上下忿患四方愁毒可遵用舊章退貪殘塞灾謗請下司𨽻校尉中二千石城門五營校尉北軍中候各實覈所部應當斥罷自以狀言三府兼察有遺漏續上帝從之於是秉條奏牧守青州刺史羊亮等五十餘人或死或免天下莫不肅然尚書朱穆疾宦官恣横上疏曰按漢故事中常侍參選士人建武以後乃悉用宦者自延平以来浸益貴盛假貂璫之飾處常伯之任天朝政事一更其手權傾海内寵貴無極子弟親戚並荷榮任放濫驕溢莫能禁禦窮破天下空竭小民愚臣以為可悉罷省遵復往初更選海内清淳之士明達國體者以補其處即兆庶黎萌䝉被聖化矣帝不納後穆因進見復口陳曰臣聞漢家舊典置侍中中常侍各一人省尚書事黄門侍郎一人傳發書奏皆用姓族自和熹太后以女主稱制不接公卿乃以閹人為常侍小黄門通命兩宫自此以來權傾人主窮困天下宜皆罷遣博選耆儒宿徳與參政事帝怒不應穆伏不肯起左右傳出良久乃趨而去自此中官數因事稱詔詆毁之穆素剛不得意居無幾憤懣發疽卒七年十二月中常侍汝陽侯唐衡武原侯徐璜皆卒八年春中常侍侯覽兄參為益州刺史殘暴貪婪累臧億計太尉楊秉奏檻車徵參參於道自殺閲其車重三百餘兩皆金銀錦帛秉因奏曰臣案舊典宦官本在給使省闥司昬守夜而今猥受過寵執政操權附㑹者因公褒舉違忤者求事中傷居法王公富擬國家飲食極肴膳僕妾盈紈素中常侍侯覽弟參貪殘元惡自取禍滅覽顧知釁重必有自疑之意臣愚以為不宜復見親近昔懿公刑邴􅧬之父奪閻職之妻而使二人參乘卒有竹中之難覽宜急屏斥投畀有虎若斯之人非恩所宥請免官送歸本郡書奏尚書召對秉掾屬詰之曰設官分職各有司存三公統外御史察内今越奏近官經典漢制何所依據其開公具對秉使對曰春秋傳曰除君之惡惟力是視鄧通懈慢申屠嘉召通詰責文帝從而請之漢世故事三公之職無所不統尚書不能詰帝不得已竟免覽官司𨽻校尉韓縯因奏左悺罪惡及其兄太僕南鄉侯稱請託州郡聚斂為姦賓客放縱侵犯吏民悺稱皆自殺縯又奏中常侍具瑗兄沛相恭臧罪徵詣廷尉瑗詣獄謝上還東武侯印綬詔貶為都鄉侯超及璜衡襲封者並降為鄉侯子弟分封者悉奪爵土劉普等貶為關内侯尹勲等亦皆奪爵三月宛陵大姓羊元羣罷北海郡臧汙狼藉郡舍溷軒有竒巧亦載之以歸河南尹李膺表按其罪元羣行賂宦官膺竟反坐單超弟遷為山陽太守以罪繫獄廷尉馮緄考致其死中官相黨共飛章誣緄以罪中常侍蘇康管霸固天下良田美業州郡不敢詰大司農劉祐移書所在依科品没入之帝大怒與膺緄俱輸作左校夏五月丙戌太尉楊秉薨秉為人清白寡欲嘗稱我有三不惑酒色財也秉既没所舉賢良廣陵劉瑜乃至京師上書言中官不當比肩裂土競立𦙍嗣繼體傳爵又嬖女充積冗食空宫傷生費國又第舍增多窮極竒巧掘山攻石促以嚴刑州郡官府各自考事姦情賕賂皆為吏餌民愁鬰結起入賊黨官輒興兵誅討其罪貧困之民或有賣其首級以要酬賞父兄相代殘身妻孥相視分裂又陛下好微行近習之家私幸宦者之舍賓客市買熏灼道路因此暴縱無所不容惟陛下開廣諫道博觀前古逺佞邪之人放鄭衛之聲則政致和平徳感祥風矣詔特召瑜問灾咎之徵執政者欲令瑜依違其辭乃更䇿以他事瑜復悉心對八千餘言有切於前拜為議郎十一月太尉陳蕃言李膺馮緄劉祐之枉請加原宥升之爵任言及覆誠辭懇切以至流涕帝不聽應奉上疏曰夫忠賢武將國之心膂竊見左校弛刑徒馮緄劉祐李膺等誅舉邪臣肆之以灋陛下既不聽察而猥受譖訴遂令忠臣同愆元惡自春迄冬不䝉降恕遐邇觀聽為之歎息夫立政之要記功忘失是以武帝捨安國於徒中宣帝徵張敞於亡命緄前討蠻荆均吉甫之功祐數臨督司有不吐茹之節膺著威幽并遺愛度遼今三埀蠢動王旅未振乞原膺等以備不虞書奏乃悉免其刑久之李膺復拜司𨽻校尉時小黄門張讓弟朔為野王令貪殘無道畏膺威嚴逃還京師匿於兄家合柱中膺知其狀率吏卒破柱取朔付雒陽獄受辭畢即殺之讓訴寃於帝帝召膺詰以不先請便加誅之意對曰昔仲尼為魯司冦七日而誅少正卯今臣到官已積一旬私懼以稽留為愆不意獲速疾之罪誠自知釁責死不旋踵特乞留五日剋殄元惡退就鼎鑊始生之願也帝無復言顧謂讓曰此汝弟之罪司𨽻何愆乃遣出自此諸黄門常侍皆鞠躬屏氣休沐不敢出宫省帝怪問其故並叩頭泣曰畏李校尉時朝廷日亂綱紀頺弛而膺獨持風裁以聲名自高士有被其容接者名為登龍門云九年初帝為蠡吾侯受學於甘陵周福及即位擢福為尚書時同郡河南尹房植有名當朝鄉人為之謡曰天下䂓矩房伯武因師獲印周仲進二家賓客互相譏揣遂各樹朋徒漸成尤隙由是甘陵有南北部黨人之議自此始矣汝南太守宗資以范滂為功曹南陽太守成瑨以岑晊為功曹皆委心聽任使之襃善糾違肅清朝府滂尤剛勁疾惡如讎滂甥李頌素無行中常侍唐衡以屬資資用為吏滂寢而不召資遷怒捶書佐朱零零仰曰范滂清裁今日寧受笞而死滂不可違資乃止郡中中人以下莫不怨之於是二郡為謡曰汝南太守范孟博南陽宗資主畫諾南陽太守岑公孝𢎞農成瑨但坐嘯太學諸生三萬餘人郭泰及頴川賈彪為其冠與李膺陳蕃王暢更相襃重學中語曰天下模楷李元禮不畏彊禦陳仲舉天下俊秀王叔茂於是中外承風競以臧否相尚自公卿以下莫不畏其貶議屣履到門宛有富賈張汎者與後宫有親又善雕鏤玩好之物頗以賂遺中官以此得顯位用埶縱横岑晊與賊曹史張牧勸成瑨收捕汎等既而遇赦瑨竟誅之并收其宗族賓客殺二百餘人後乃奏聞小黄門晉陽趙津貪横放恣為一縣巨患太原太守平原劉瓆使郡吏王允討捕亦於赦後殺之於是中常侍侯覽使張汎妻上書訟寃宦官因縁譖訴瑨瓆帝大怒徵瑨瓆皆下獄有司承㫖奏瑨瓆罪當棄市山陽太守翟超以郡人張儉為東都督郵侯覽家在防東殘暴百姓覽䘮母還家大起塋冢儉舉奏覽罪而覽伺候遮􅎒章竟不上儉遂破覽冢宅籍没資財具奏其狀復不得御徐璜兄子宣為下邳令暴虐尤甚嘗求故汝南太守李暠女不能得遂將吏卒至暠家載其女歸戯射殺之東海相汝南黄浮聞之收宣家屬無少長悉考之掾史以下固争之浮曰徐宣國賊今日殺之明日坐死足以瞑目矣即案宣罪棄市暴其尸於是宦官訴寃於帝帝大怒超浮並坐髠鉗輸作右校太尉陳蕃司空劉茂共諫請瑨瓆超浮等罪帝不悦有司劾奏之茂不敢復言蕃乃獨上疏曰今冦賊在外四支之疾内政不理心腹之患臣寢不能寐食不能飽實憂左右日親忠言日疎内患漸積外難方深陛下超從列侯繼承天位小家畜産百萬之資子孫尚恥愧失其先業况乃産兼天下受之先帝而欲懈怠以自輕忽乎誠不愛己不當念先帝得之勤苦耶前梁氏五侯毒徧海内天啓聖意收而戮之天下之議冀當小平明鑒未逺覆車如昨而近習之權復相扇結小黄門趙津大猾張汎等肆行貪虐姦媚左右前太原太守劉瓆南陽太守成瑨糾而戮之雖言赦後不當誅殺原其誠心在乎去惡至於陛下有何悁悁而小人道長熒惑聖聽遂使天威為之發怒必加刑讁已為過甚况乃重罰令伏歐刀乎又前山陽太守翟超東海相黄浮奉公不撓疾惡如讎超没侯覽財物浮誅徐宣之罪並蒙刑坐不逢赦恕覽之從横没財已幸宣犯釁過死有餘辜昔丞相申屠嘉召責鄧通雒陽令董宣折辱公主而文帝從而請之光武加以重賞未聞二臣有専命之誅而今左右羣豎惡傷黨類妄相交構致此刑譴聞臣是言當復嗁訴陛下深宜割塞近習與政之源引納尚書朝省之士簡練清高斥黜佞邪如是天和於上地洽於下休徴符瑞豈逺乎哉帝不納宦官由此疾蕃彌甚選舉奏議輒以中詔譴郤長史已下多至抵罪猶以蕃名臣不敢加害平原襄楷詣闕上疏曰臣聞皇天不言以文象設教臣竊見太微天廷五帝之坐而金火罰星揚光其中於占天子凶又俱入房心法無繼嗣前年冬大寒殺鳥獸魚鼈城傍竹栢之葉有傷枯者臣聞於師曰栢傷竹枯不出三年天子當之今自春夏以来連有霜雹及大雨靁電臣作威作福刑罰急刻之所感也太原太守劉瓆南陽太守成瑨志除姦邪其所誅剪皆合人望而陛下受閹豎之譖乃逺加考逮三公上書乞哀瓆等不見採察而嚴被譴讓憂國之任將遂杜口矣臣聞殺無罪誅賢者禍及三世自陛下即位以来頻行誅罰梁冦孫鄧並見族滅其從坐者又非其數李雲上書明主所不當諱杜衆乞死諒以感悟聖朝曽無赦宥而并被殘戮天下之人咸知其寃漢興以来未有拒諫誅賢用刑太深如今者也昔文王一妻誕至十子今宫女數千未聞慶育宜修徳省刑以廣螽斯之祚案春秋以来及古帝王未有河清臣以為河者諸侯位也清者屬陽濁者屬陰河當濁而反清者陰欲為陽諸侯欲為帝也京房易傳曰河水清天下平今天垂異地吐妖人癘疫三者並時而有河清猶春秋麟不當見而見孔子書之以為異也願賜清閒極盡所言書奏不省十餘日復上書曰臣聞殷紂好色妲己是出葉公好龍真龍游廷今黄門常侍天刑之人陛下愛待兼倍常寵係嗣未兆豈不為此書上即召入詔尚書問狀楷言古者本無宦官武帝末數游後宫始置之耳尚書承㫖奏楷不正辭理而違背經藝借假星宿造合私意誣上罔事請下司𨽻正楷罪法收送雒陽獄帝以楷言雖激切然皆天文恒象之數故不誅猶司冦論刑符節令汝南蔡衍議郎劉瑜表救成瑨劉瓆言甚切厲亦坐免官瑨瓆竟死獄中瑨瓆素剛直有經術知名當時故天下惜之岑晊張牧逃竄獲免晊之亡也親友競匿之賈彪獨閉門不納時人望之彪曰傳言相時而動無累後人公孝以要君致釁自遺其咎吾已不能奮戈相待反可容隠之乎於是咸服其裁正河南張成善風角推占當赦教子殺人司𨽻李膺督促收捕既而逢宥獲免膺愈懷憤疾竟案殺之成素以方伎交通宦官帝亦頗訊其占宦官敎成弟子牢修上書告膺等養太學遊士交結諸郡生徒更相驅馳共為部黨誹訕朝廷疑亂風俗於是天子震怒班下郡國逮捕黨人布告天下使同忿疾案經三府太尉陳蕃卻之曰今所案者皆海内人譽憂國忠公之臣此等猶將十世宥也豈有罪名不章而致收掠者乎不肯平署帝愈怒遂下膺等於黄門北寺獄其辭所連及太僕潁川杜宻御史中丞陳翔及陳寔范滂之徒二百餘人或逃遁不獲皆懸金購募使者四出相望陳寔曰吾不就獄衆無所恃乃自往請囚范滂至獄吏謂曰凡坐繫者皆祭臯陶滂曰臯陶古之直臣知滂無罪將理之於帝如其有罪祭之何益衆人由此亦止陳蕃復上書極諌帝諱其言切託以蕃辟召非其人䇿免之時黨人獄所染逮者皆天下名賢度遼將軍皇甫規自以西州豪桀恥不得與乃自上言臣前薦故大司農張奐是附黨也又臣昔論輸左校時太學生張鳳等上書訟臣是為黨人所附也臣宜坐之朝廷知而不問張鳳等上書事見諸羌叛服下永康元年五月陳蕃既免朝臣震栗莫敢復為黨人言者賈彪曰吾不西行大禍不解乃入雒陽説城門校尉竇武尚書魏郡霍諝等使訟之武上疏曰陛下即位以来未聞善政常侍黄門競行譎詐妄爵非人伏尋西京佞臣執政終䘮天下今不慮前事之失復循覆車之軌臣恐二世之難必將復及趙高之變不朝則夕近者姦臣牢修造設黨議遂收前司𨽻校尉李膺等逮考連及數百人曠年拘録事無效驗臣惟膺等建忠抗節志經王室此誠陛下稷卨伊吕之佐而虚為姦臣賊子之所誣枉天下寒心海内失望惟陛下留神澄省時見理出以厭人鬼喁喁之心今臺閣近臣尚書朱㝢荀緄劉祐魏朗劉矩尹勲等皆國之真士朝之良佐尚書郎張陵媯皓苑康楊喬邉韶戴恢等文質彬彬明達國典内外之職羣才並列而陛下委任近習専樹饕餮外典州郡内幹心膂宜以次貶黜案罪糾罰信任忠良平决臧否使邪正毁譽各得其所寶愛天官唯善是授如此咎徵可消天應可待間者有嘉禾芝草黄龍之見夫瑞生必扵嘉士福至實由善人在徳為瑞無徳為灾陛下所行不合天意不宜稱慶書奏因以病上還城門校尉槐里侯印綬霍諝亦為表請帝意稍解使中常侍王甫就獄訊黨人范滂等皆三木囊頭暴於階下甫以次辨詰曰卿等更相拔舉迭為脣齒其意如何滂曰仲尼之言見善如不及見惡如探湯滂欲使善善同其清惡惡同其汙謂王政之所願聞不悟更以為黨古之修善自求多福今之修善身陷大戮身死之日願埋滂於首陽山側上不負皇天下不愧夷齊甫愍然為之改容乃得並解桎梏李膺等又多引宦官子弟宦官懼請帝以天時宜赦六月庚申赦天下改元黨人二百餘人皆歸田里書名三府禁錮終身范滂往候霍諝而不謝或讓之滂曰昔叔向不見祁奚吾何謝焉滂南歸汝南南陽士大夫迎之者車數千兩鄉人殷陶黄穆侍衛於旁應對賓客滂謂陶等曰今子相隨是重吾禍也遂遁還鄉里初詔書下舉鉤黨郡國所奏相連者多至百數唯平原相史弼獨無所上詔書前後迫切州郡髠笞掾史從事坐傳舎責曰詔書疾惡黨人㫖意懇惻青州六郡其五有黨平原何治而得獨無弼曰先王疆理天下畫界分境水土異齊風俗不同它郡自有平原自無胡可相比若承望上司誣陷良善滛刑濫罰以逞非理則平原之人户可為黨相有死而已所不能也從事大怒即收郡僚職送獄遂舉奏弼會黨禁中解弼以俸贖罪所脱者甚衆竇武所薦朱㝢沛人苑康勃海人楊喬㑹稽人邉韶陳留人喬容儀偉麗數上言政事帝愛其才貌欲妻以公主喬固辭不聽遂閉口不食七日而死十二月丁丑帝崩于徳陽前殿城門校尉竇武議立嗣召侍御史河間劉鯈問以國中宗室之賢者鯈稱解凟亭侯宏宏者河間孝王之曾孫也祖淑父萇世封解凟亭侯武乃入白太后定䇿禁中以鯈守光祿大夫與中常侍曹節並持節將中黄門虎賁羽林千人奉迎宏時年十二靈帝建寧元年春正月壬午以城門校尉竇武為大將軍前太尉陳蕃為太傅與武及司徒胡廣參録尚書事時新遭大䘮國嗣未立諸尚書畏懼多託病不朝陳蕃移書責之曰古人立節事亡如存今帝祚未立政事日蹙諸君奈何委荼蓼之苦息偃在牀於義安乎諸尚書惶怖皆起視事己亥解凟亭侯至夏門亭使竇武持節以王青葢車迎入殿中庚子即皇帝位六月癸巳録定䇿功封竇武為聞喜侯武子機為渭陽侯兄子紹為鄠侯靖為西鄉侯中常侍曹節為長安鄉侯侯者凡十一人涿郡盧植上書説武曰足下之於漢朝猶旦奭之在周室建立聖主四海有繫論者以為吾子之功於斯為重今同宗相後披圗案牒以次建之亦何勲之有豈可横叨天功以為己力乎宜辭大賞以全身名武不能用植身長八尺二寸音聲如鐘性剛毅有大節少事馬融融性豪侈多列女倡歌舞於前植侍講積年未嘗轉盼融以是敬之太后以陳蕃舊徳特封高陽鄉侯蕃上疏讓曰臣聞割地之封功徳是為臣雖無素潔之行竊慕君子不以其道得之不居也若夫受爵不讓掩面就之使皇天振怒灾流下民於臣之身亦何所寄太后不許蕃固讓章前後十上竟不受封初竇太后之立也陳蕃有力焉及臨朝政無大小皆委於蕃蕃與竇武同心戮心以奬王室徵天下名賢李膺杜宻尹勲劉瑜等皆列於朝廷與共參政事於是天下之士莫不延頸想望太平而帝乳母趙嬈及諸女尚書旦夕在太后側中常侍曹節王甫等共相朋結諂事太后太后信之數出詔命有所封拜蕃武疾之嘗共㑹朝堂蕃私謂武曰曹節王甫等自先帝時操弄國權濁亂海内今不誅之後必難圖武深然之蕃大喜以手推席而起武於是引同志尚書令尹勲等共定計䇿㑹有日食之變蕃謂武曰昔蕭望之困一石顯况今石顯數十輩乎蕃以八十之年欲為將軍除害今可因日食斥罷宦官以塞天變武乃白太后曰故事黄門常侍但當給事省内門户主近署財物耳今乃使與政事任重權子弟布列専為貪暴天下匈匈正以此故宜悉誅廢以清朝廷太后曰漢元以來故事世有宦官但當誅其有罪者豈可盡廢邪時中常侍管霸頗有才略専制省内武先白收霸及中常侍蘇康等皆坐死武復數白誅曹節等太后猶豫未忍故事久不發蕃上疏曰今京師囂囂道路諠譁言侯覽曹節公乘昕王甫鄭颯等與趙夫人諸尚書並亂天下附従者升進忤逆者中傷一朝羣臣如河中木耳汎汎東西耽祿畏害陛下今不急誅此曹必生變亂傾危社稷其禍難量願出臣章宣示左右并令天下諸姦知臣疾之太后不納是月太白犯房之上將入太微侍中劉瑜素善天官惡之上書皇太后曰案占書宫門當閉將相不利姦人在主傍願急防之又與武蕃書以星辰錯繆不利大臣宜速斷大計於是武蕃以朱㝢為司𨽻校尉劉祐為河南尹虞祁為雒陽令武奏免黄門令魏彪以所親小黄門山冰代之使冰奏收長樂尚書鄭颯送北寺獄蕃謂武曰此曹子便當收殺何復考為武不從令冰與尹勲侍御史祝瑨雜考颯辭連及曹節王甫勲氷即奏收節等使劉瑜内奏九月辛亥武出宿歸府典中書者先以告長樂五官史朱瑀瑀盜發武奏罵曰中官放縱者自可誅耳我曹何罪而當盡見族滅因大呼曰陳蕃竇武奏白太后廢帝為大逆乃夜召素所親壯健者長樂從官史共普張亮等十七人喢血共盟謀誅武等曹節白帝曰外間切切請出御徳陽前殿令帝拔劍踊躍使乳母趙嬈等擁衛左右取棨信閉諸禁門召尚書官屬脅以白刄使作詔板拜王甫為黄門令持節至北寺獄收尹勲山冰冰疑不受詔甫格殺之并殺勲出鄭颯還兵劫太后奪璽綬令中謁者守南宫閉門絶複道使鄭颯等持節及侍御史謁者捕收武等武不受詔馳入步兵營與其兄子步兵校尉紹共射殺使者召㑹北軍五校士數千人屯都亭下令軍士曰黄門常侍反盡力者封侯重賞陳蕃聞難將官屬諸生八十餘人並拔刀突入承明門到尚書門攘臂呼曰大將軍忠以衛國黄門反逆何云竇氏不道邪王甫時出與蕃相遇適聞其言而讓蕃曰先帝新棄天下山陵未成武有何功兄弟父子並封三侯又設樂飲讌多取掖庭宫人旬日之間貲財巨萬大臣若此為是道邪公為宰輔茍相阿黨復何求賊使劍士收蕃蕃拔劍叱甫辭色逾厲遂執蕃送北寺獄黄門從官騶蹋踧蕃曰死老魅復能損我曹員數奪我曹禀假不即日殺之時䕶匈奴中郎將張奐徵還京師曹節等以奐新至不知本謀矯制以少府周靖行車騎將軍加節與奐率五營士討武夜漏盡王甫將虎賁羽林等合千餘人出屯朱雀掖門與奐等合已而悉軍闕下與武對陳甫兵漸盛使其士大呼武軍曰竇武反汝皆禁兵當宿衛官省何故隨反者乎先降有賞營府素畏服中官於是武軍稍稍歸甫自旦至食時兵降略盡武紹走諸軍追圍之皆自殺梟首雒陽都亭收捕宗親賓客姻屬悉誅之及侍中劉瑜屯騎校尉馮述皆夷其族宦官又譖虎賁中郎將河間劉淑故尚書㑹稽魏朗云與武等通謀皆自殺遷皇太后於南宫徙武家屬於日南自公卿以下嘗為蕃武所舉者及門生故吏皆免官禁錮議郎勃海巴肅始與武等同謀曹節不知但坐禁錮後乃知而收之肅自載詣縣縣令見肅入閤解印綬欲與俱去肅曰為人臣者有謀不敢隠有罪不逃刑既不隠其謀矣又敢逃其刑乎遂被誅曹節遷長樂衛尉封育陽侯王甫遷中常侍黄門令如故朱瑀共普張亮等六人皆為列侯十一人為關内侯於是羣小得志士大夫皆䘮氣蕃友人陳留朱震收𦵏蕃尸匿其子逸事覺繫獄合門桎梏震受考掠誓死不言逸由是得免武府掾桂陽胡騰殯斂武尸行䘮坐以禁錮武孫輔年二嵗騰詐以為己子與令史南陽張敞共匿之於零陵界中亦得免張奐遷大司農以功封侯奐深病為曹節等所賣固辭不受二年夏四月壬辰有青蛇見於御坐上癸巳大風雨雹霹靂拔大木百餘詔公卿以下各上封事大司農張奐上疏曰昔周公𦵏不如禮天乃動威今竇武陳蕃忠貞未被明宥妖𤯝之来皆為此也宜急為改𦵏徙還家屬其從坐禁錮一切蠲除又皇太后雖居南宫而恩禮不接朝臣莫言逺近失望宜思大義顧復之報上深嘉奐言以問諸常侍左右皆惡之帝不得自從奐又與尚書劉猛等共薦王暢李膺可參三公之選曹節等彌疾其言遂下詔切責之奐等皆自囚廷尉數日乃得出並以三月俸贖罪郎中東郡謝弼上封事曰臣聞惟虺惟蛇女子之祥伏惟皇太后定䇿宫闥援立聖明書云父子兄弟罪不相及竇氏之誅豈宜咎延太后幽隔空宫愁感天心如有霧露之疾陛下當何面目以見天下孝和皇帝不絶竇氏之恩前世以為美談禮為人後者為之子今以桓帝為父豈得不以太后為母哉願陛下仰慕有虞蒸蒸之化俯思凱風慰母之念臣又聞開國承家小人勿用今功臣久外未䝉爵秩阿母寵私乃享大封大風雨雹亦由於兹又故太傅陳蕃勤身王室而見陷羣邪一旦誅滅其為酷濫駭動天下而門生故吏並離徙錮蕃身已往人百何贖宜還其家屬解除禁網夫台宰重器國命所繫今之四公惟司空劉寵斷斷守善餘皆素餐致冦之人必有折足覆餗之凶可因灾異並加罷黜徵故司空王暢長樂少府李膺並居政事庶灾變可消國祚惟永左右惡其言出為廣陵府丞去官歸家曹節從子紹為東郡太守以它罪收弼掠死於獄帝以蛇妖問光禄勲楊賜賜上封事曰夫善不妄来灾不空發王者心有所想雖未形顔色而五星以之推移陰陽為其變度夫皇極不建則有龍蛇之孽詩云惟虺惟蛇女子之祥惟陛下思乾剛之道别内外之宜抑皇甫之權割艷妻之愛則蛇變可消福祥立應賜秉之子也初李膺等雖廢錮天下士大夫皆高尚其道而汙穢朝廷希之者惟恐不及更共相標榜為之稱號以竇武陳蕃劉淑為三君君者言一世之所宗也李膺荀翌杜宻王暢劉祐魏朗趙典朱㝢為八俊俊者言人之英也郭泰范滂尹勲巴肅及南陽宗慈陳留夏馥汝南蔡衍泰山羊陟為八顧顧者言能以徳行引人者也張儉翟超岑晊苑康及山陽劉表汝南陳翔魯國孔昱山陽檀敷為八及及者言其能導人追宗者也度尚及東平張邈王孝東郡劉儒泰山胡母班陳留秦周魯國蕃嚮東莱王章為八厨厨者言能以財救人者也及陳竇用事復舉㧞膺等陳竇誅膺等復廢宦官疾惡膺等每下詔書輒申黨人之禁侯覽怨張儉尤甚覽鄉人朱並素佞邪為儉所棄承覽意指上書告儉與同鄉二十四人别相署號共為部黨圖危社稷而儉為之魁詔刋章捕儉等冬十月大長秋曹節因此諷有司奏諸鉤黨者故司空虞放及李膺杜宻朱㝢荀翌翟超劉儒范滂等請下州郡考治是時上年十四問節等曰何以為鉤黨對曰鉤黨者即黨人也上曰黨人何用為惡而欲誅之邪對曰皆相舉羣輩欲為不軌上曰不軌欲如何對曰欲圖社稷上乃可其奏或謂李膺曰可去矣對曰事不辭難罪不逃刑臣之節也吾年已六十死生有命去將安之乃詣詔獄考死門生故吏並被禁錮侍御史蜀郡景毅子顧為膺門徒未有録牒不及於譴毅然然曰本謂膺賢遣子師之豈可以漏脱名籍茍安而已遂自表免歸汝南督郵吳導受詔捕范滂至征羌抱詔書閉傳舍伏牀而泣一縣不知所為滂聞之曰必為我也即自詣獄縣令郭揖大驚出解印綬引與俱亡曰天下大矣子何為在此滂曰滂死則禍塞何敢以罪累君又令老母流離乎其母就與之訣滂白母曰仲博孝敬足以供養滂從龍舒君歸黄泉存亡各得其所惟大人割不可忍之恩勿增感戚仲博者滂弟也龍舒君者滂父龍舒侯相顯也母曰汝今得與李杜齊名死亦何恨既有令名復求夀考可兼得乎滂跪受教再拜而辭顧其子曰吾欲使汝為惡惡不可為使汝為善則我不為惡行路聞之莫不流涕凡黨人死者百餘人妻子皆徙邊天下豪傑及儒學有行義者宦官一切指為黨人有怨隙者因相陷害睚眦之忿濫入黨中州郡承㫖或有未嘗交關亦離禍毒其死徙廢禁者又六七百人郭泰聞黨人之死私為之慟曰詩云人之云亡邦國殄瘁漢室滅矣但未知瞻烏爰止于誰之屋耳泰雖好臧否人倫而不為危言覈論故能處濁世而怨禍不及焉張儉亡命困迫望門投止莫不重其名行破家相容後流轉東萊止李篤家外黄令毛欽操兵到門篤引欽就席曰張儉負罪亡命篤豈得藏之若審在此此人名士明廷寧宜執之乎欽因起撫篤曰蘧伯玉恥獨為君子足下如何専取仁義篤曰今欲分之明廷載半去矣欽歎息而去篤導儉經北戲子然家遂入漁陽出塞其所經歴伏重誅者以十數連引收考者布徧天下宗親並皆殄滅郡縣為之殘破儉與魯國孔襃有舊亡抵襃不遇襃弟融年十六匿之後事泄儉得亡走國相收襃融送獄未知所坐融曰保納舍藏者融也當坐襃曰彼來求我非弟之過吏問其母母曰家事任長妾當其辜一門争死郡縣疑不能决乃上讞之詔書竟坐襃及黨禁解儉乃還鄉里後為衛尉卒年八十四夏馥聞張儉亡命歎曰孽自已作空汙良善一人逃死禍及萬家何以生為乃自剪鬚變形入林慮山中隠姓名為冶家傭親突煙炭形貌毁瘁積二三年人無知者馥弟静載縑泉追求餉之馥不受曰弟柰何載禍相餉乎黨禁未解而卒初中常侍張讓父死歸𦵏潁川雖一郡畢至而名士無徃者讓甚恥之陳寔獨弔焉及誅黨人讓以寔故多所全宥南陽何顒素與陳蕃李膺善亦被收捕乃變名姓匿汝南間與袁紹為奔走之交常私入雒陽從紹計議為諸名士罹黨事者求救援設權計使得逃隠所全免甚衆初太尉袁湯三子成逢隗成生紹逢生術逢隗皆有名稱少歴顯官時中常侍袁赦以逢隗宰相家與之同姓推崇以為外援故袁氏貴寵於世富奢甚不與它公族同紹壯健有威容愛士養名賓客輻輳歸之輜軿柴轂填接街陌術亦以俠氣聞逢從兄子閎少有操行以耕學為業逢隗數饋之無所受閎見時方險亂而家門富盛常對兄弟歎曰吾先公福祚後世不能以徳守之而競為驕奢與亂世争權此即晉之三郤矣及黨事起閎欲投迹深林以母老不宜逺遁乃築土室四周於庭不為户自牗納飲食母思閎時往就視母去便自掩閉兄弟妻子莫得見也濳身十八年卒於土室初范滂等非訐朝政自公卿以下皆折節下之太學生争慕其風以為文學將興處士復用申屠蟠獨歎曰昔戰國之世處士横議列國之王至為擁篲先驅卒有坑儒燒書之禍今之謂矣乃絶迹於梁碭之間因樹為屋自同傭人居二年滂等果罹黨錮之禍唯蟠超然免於評論臣光曰天下有道君子揚于王庭以正小人之罪而莫敢不服天下無道君子囊括不言以避小人之禍而猶或不免黨人生昏亂之世不在其位四海横流而欲以口舌救之臧否人物激濁揚清撩虺蛇之頭踐虎狼之尾以至身被滛刑禍及朋友士類殱滅而國隨以亡不亦悲乎夫唯郭泰既明且哲以保其身申屠蟠見幾而作不俟終日卓乎其不可及已十一月長樂太僕曹節病困詔拜車騎將軍有頃疾瘳上印綬復為中常侍位特進秩中二千石四年春正月甲子帝加元服赦天下惟黨人不赦帝以竇太后有援立之功冬十月戊子朔率羣臣朝太后於南宫親饋上夀黄門令董萌因此數為太后訴寃帝深納之供養資奉有加於前曹節王甫疾之誣萌以謗訕永樂宫下獄死熹平元年五月長樂太僕侯覽坐専權驕奢䇿收印綬自殺六月竇太后母卒於比景太后憂思感疾癸巳崩於雲臺宦者積怨竇氏以衣車載太后尸置城南市舍數日曹節王甫欲用貴人禮殯帝曰太后親立朕躬統承大業豈宜以貴人終乎於是發䘮成禮節等欲别𦵏太后而以馮貴人配祔詔公卿大㑹朝堂令中常侍趙忠監議太尉李咸時病扶輿而起𢷬椒自隨謂妻子曰若皇太后不得配食桓帝吾不生還矣既議坐者數百人各瞻望良久莫肯先言趙忠曰議當時定廷尉陳球曰皇太后以盛徳良家母臨天下宜配先帝是無所疑忠笑而言曰陳廷尉宜便操筆球即下議曰皇太后自在椒房有聪眀母儀之徳遭時不造援立聖明承繼宗廟功烈至重先帝晏駕因遇大獄遷居空宫不幸早世家雖獲罪事非太后今若别𦵏誠失天下之望且馮貴人冢嘗被發掘骸骨暴露與賊併尸魂靈汙染且無功於國何宜上配至尊忠省球議作色俛仰蚩球曰陳廷尉建此議甚健球曰陳竇既寃皇太后無故幽閉臣常痛心天下憤歎今日言之退而受罪宿昔之願也李咸曰臣本謂宜爾誠與意合於是公卿以下皆從球議曹節王甫猶争以為梁后家犯惡逆别𦵏懿陵武帝黜廢衛后而以李夫人配食今竇氏罪深豈得合𦵏先帝李咸復上疏曰臣伏惟章徳竇后虐害恭懐安思閻后家犯惡逆而和帝無異𦵏之議順朝無貶降之文至於衛后孝武皇帝身所廢棄不可以為比今長樂太后尊號在身親嘗稱制且援立聖明光隆皇祚太后以陛下為子陛下豈得不以太后為母子無黜母臣無貶君宜合𦵏宣陵一如舊制帝省奏從之秋七月甲寅𦵏桓思皇后于宣陵有人書朱雀闕言天下大亂曹節王甫幽殺太后公卿皆尸祿無忠言者詔司𨽻校尉劉猛逐捕十日一㑹猛以誹書言直不肯急捕月餘主名不立猛坐左轉諫議大夫以御史中丞段熲代之熲乃四出逐捕及太學游生繫者千餘人節等又使熲以它事奏猛論輸左校初司𨽻校尉王寓依倚宦官求薦於太常張奐奐拒之寓遂陷奐以黨罪禁錮渤海王悝之貶廮陶也因中常侍王甫求復國許謝錢五千萬既而桓帝遺詔復悝國悝知非甫功不肯還謝錢中常侍鄭颯中黄門董騰數與悝交通甫宻司察以告段熲冬十月收颯送北寺獄使尚書令亷忠誣奏颯等謀迎立悝大逆不道遂詔冀州刺史收悝考實追責悝令自殺妃妾十一人子女七十人伎女二十四人皆死獄中傅相以下悉伏誅甫等十二人皆以功封列侯五年閠五月永昌太守曹鸞上書曰夫黨人者或耆年淵徳或衣冠英賢皆宜股肱王室左右大猷者也而久被禁錮辱在塗泥謀反大逆尚䝉赦宥黨人何罪獨不開恕乎所以灾異屢見水旱荐臻皆由於斯宜加沛然以副天心帝省奏大怒即詔司𨽻益州檻車收鸞送槐里獄掠殺之於是詔州郡更考黨人門生故吏父子兄弟在位者悉免官禁錮爰及五屬光和元年六月丁丑有黒氣墮帝所御温徳殿東庭中長十餘丈似龍秋七月壬子青虹見玉堂後殿庭中詔召光禄大夫楊賜等詣金商門問以灾異及消後之術賜對曰春秋䜟曰天投蜺天下怨海内亂加四百之期亦復垂及今妾媵閹尹之徒共専國朝欺罔日月幸賴皇天垂象譴告周書曰天子見怪則修徳諸侯見怪則修政卿大夫見怪則修職士庶人見怪則修身唯陛下斥逺佞巧之臣速徵鶴鳴之士斷絶尺一抑止槃游冀上天還威衆變可弭議郎蔡邕對曰臣伏思諸異皆亡國之怪也天於大漢殷勤不已故屢出祅變以當譴責欲令人君感悟改危即安今蜺墮雞化皆婦人干政之所致也前者乳母趙嬈貴重天下讒諛驕溢續以永樂門史霍玉依阻城社又為姦邪今道路紛紛復云有程大人者察其風聲將為國患宜高為隄防明設禁令深惟趙霍以為至戒今太尉張顥為玉所進光祿勲偉璋有名貪濁又長水校尉趙玹屯騎校尉葢升並叨時幸榮富優足宜念小人在位之咎退思引身避賢之福伏見廷尉郭禧純厚老成光祿大夫橋𤣥聰達方直故太尉劉寵忠實守正並宜為謀主數見訪問夫宰相大臣君之四體委任責成優劣已分不宜聽納小吏雕琢大臣也又尚方工技之作鴻都篇賦之文可且消息以示惟憂宰府孝亷士之高選近者以辟召不慎切責三公而今並以小文超取選舉開請託之門違明王之典衆心不厭莫之敢言臣願陛下忍而絶之思惟萬機以答天望聖朝既自約厲左右近臣亦宜從化人自抑損以塞咎戒則大道虧滿鬼神福謙矣夫君臣不宻上有漏言之戒下有失身之禍願寢臣表無使盡忠之吏受怨姦仇章奏帝覽而歎息因起更衣曹節於後竊視之悉宣語左右事遂漏露其為邕所裁黜者側目思報初邕與大鴻臚劉郃素不相平叔父衛尉質又與將作大匠陽球有隙球即中常侍程璜女夫也璜遂使人飛章言邕質數以私事請託於郃郃不聽邕含隠切志欲相中於是詔下尚書召邕詰状邕上書曰臣實愚戇不顧後害陛下不念忠臣直言宜加掩蔽誹謗卒至便用疑怪臣年四十有六孤特一身得託名忠臣死有餘榮恐陛下於此不復聞至言矣於是下邕質於雒陽獄劾以仇怨奉公議害大臣大不敬棄市事奏中常侍河南吕彊愍邕無罪力為伸請帝亦更思其章有詔减死一等與家屬髠鉗徙朔方不得以赦令除陽球使客追路刺邕客感其議皆莫為用球又賂其部主使加毒害所賂者反以其情戒邕由是得免宋皇后無寵後宫幸姬衆共譖毁渤海王悝妃宋氏即后之姑也中常侍王甫恐后怨之因譖后挾左道祝詛帝信之遂䇿收璽綬后自致暴室以憂死父不其鄉侯酆及兄弟並被誅丙子晦日有食之尚書盧植上言凡諸黨錮多非其罪可加赦恕申宥回枉又宋后家屬並以無辜委骸横尸不得斂𦵏宜敕收拾以安遊魂帝不省二年王甫曹節等姦虐弄權扇動内外太尉段熲阿附之節甫父兄子弟為卿校牧守令長者布滿天下所在貪暴甫養子吉為沛相尤殘酷凡殺人皆磔尸車上隨其罪目宣示屬縣夏月腐爛則以䋲連其骨周徧一郡乃止見者駭懼視事五年凡殺萬餘人尚書令陽球常拊髀發憤曰若陽球作司𨽻此曹子安得容乎既而球果遷司𨽻甫使門生於京兆界辜𣙜官財物七千餘萬京兆尹楊彪發其姦言之司𨽻彪賜之子也時甫休沐里舎熲以日食自劾球詣闕謝恩因奏甫熲及中常侍淳于登袁赦封􅛑等罪辛巳悉收甫熲等送洛陽獄及甫子永樂少府萌沛相吉球自臨考甫等五毒備極萌先嘗為司𨽻乃謂球曰父子既當伏誅亦以先後之義少以楚毒假借老父球曰爾罪惡無狀死不滅責乃欲論先後求假借邪萌乃罵曰爾前奉事吾父子如奴奴敢反汝主乎今日臨阬相擠行自及也球使以土窒萌口箠扑交至父子悉死杖下熲亦自殺乃僵磔甫屍於夏城門大署牓曰賊臣王甫盡没入其財産妻子皆徙比景球既誅甫欲以次表曹節等乃敕中都官從事曰且先去權貴大猾乃議其餘耳公卿豪右若袁氏兒輩從事自辦之何須校尉邪權門聞之莫不屏氣曹節等皆不敢出沐㑹順帝虞貴人𦵏百官㑹䘮還曹節見磔甫尸道次慨然抆淚曰我曹可自相食何宜使犬䑛其汁乎語諸常侍今且俱入勿過里舍也節直入省白帝曰陽球故酷暴吏前二府奏當免官以九江微功復見擢用愆過之人好為妄作不宜使在司隸以騁毒虐帝乃徙球為衛尉時球出謁陵節敕尚書令召拜不得稽留尺一球被召急因求見帝叩頭曰臣無清高之行横蒙膺犬之任前雖誅王甫段熲葢狐狸小醜未足宣示天下願假臣一月必令豺狼䲭梟各服其辜叩頭流血殿上呵叱曰衛尉扞詔邪至於再三乃受拜於是曹節朱瑀等權埶復盛節領尚書令郎中梁人審忠上書曰陛下即位之初未能萬㡬皇太后念在撫育權時攝政故中常侍蘇康管霸應時誅殄太傅陳蕃大將軍竇武考其黨與志清朝政華容侯朱瑀知事覺露禍及其身遂興造逆謀作亂王室撞蹋省闥執奪璽綬迫脅陛下聚㑹羣臣離間骨肉母子之恩遂誅蕃武及尹勲等因共割裂城社自相封賞父子兄弟被䝉尊榮素所親厚布在州郡或登九列或據三司不惟祿重位尊之責而茍營私門多蓄財貨繕修第舍連里竟巷盜取御水以作漁鈎車馬服玩擬於天家羣公卿士杜口吞聲莫敢有言州牧郡守承順風㫖辟召選舉釋賢取愚故蟲蝗為之生夷冦為之起天意憤盈積十餘年故頻嵗日食於上地震於下所以譴戒人主欲令覺悟誅鉏無狀昔高宗以雉雊之變故獲中興之功近者神祗啟悟陛下發赫斯之怒故王甫父子應時馘截路人士女莫不稱善若除父母之讎誠怪陛下復忍孽臣之類不悉殄滅昔秦信趙高以危其國吳使刑人身冓其禍今以不忍之恩赦夷族之罪姦謀一成悔亦何及臣為郎十五年皆耳目聞見瑀之所為誠皇天所不復赦願陛下留漏刻之聽裁省臣表埽滅醜類以答天怒與瑀考驗有不如言願受湯鑊之誅妻子并徙以絶妄言之路章寢不報中常侍呂彊清忠奉公帝以衆例封為都鄉侯彊固辭不受因上疏陳事曰臣聞高祖重約非功臣不侯所以重天爵明勸戒也中常侍曹節等宦官祐薄品卑人賤讒諂媚主佞邪徼寵有趙高之禍未被轘裂之誅陛下不悟妄授茅土開國承家小人是用又并及家人重金兼紫交結邪黨下比羣佞隂陽乖刺稼穡荒蕪人用不康㒺不由兹臣誠知封事已行言之無逮所以冒死干觸陳愚忠者實願陛下損改既謬從此一止臣又聞後宫采女數千餘人衣食之費日數百金比糓雖賤而户有飢色案灋當貴而今更賤者由賦發繁數以解縣官寒不敢衣饑不敢食民有斯戹而莫之䘏宫女無用填積後庭天下雖復盡力耕桑猶不能供又前召議郎蔡邕對問於金商門邕不敢懐道迷國而切言極對毁刺貴臣譏呵宦官陛下不宻其言至令宣露羣邪項領膏唇拭舌競欲咀嚼造作飛條陛下回受誹謗致邕刑罪室家徙放老幼流離豈不負忠臣哉今羣臣皆以邕為戒上畏不測之難下懼劍客之害臣知朝廷不復得聞忠言矣故太尉段熲武勇冠世習於邉事垂髮服戎功成皓首歴事二主勲烈獨昭陛下既已式序位登台司而為司𨽻校尉陽球所見誣脅一身既斃妻子逺播天下惆悵功臣失望宜徵邕更加授任反熲家屬則忠貞路開衆怨以弭矣帝知其忠而不能用上祿長和海上言禮從祖兄弟别居異財恩義已輕服屬疏末而今黨人錮及五族既乖典訓之文有謬經常之法帝覽之而悟於是黨錮自從祖以下皆得解釋初司徒劉郃兄侍中儵與竇武同謀俱死永樂少府陳球説郃曰公出自宗室位登台鼎天下瞻望社稷鎮衛豈得雷同容容無違而已今曹節等放縱為害而久在左右又公兄侍中受害節等今可表徙衛尉陽球為司𨽻校尉以次收節等誅之政出聖主天下太平可翹足而待也郃曰凶豎多耳目恐事未㑹先受其禍尚書劉納曰為國棟梁傾危不持焉用彼相邪郃許諾亦與陽球結謀球小妻程璜之女由是節等頗得聞知乃重賂璜且脅之璜懼迫以球謀告節節因共白帝曰郃與劉納陳球陽球交通書疏謀議不軌帝大怒冬十月甲申劉郃陳球劉納陽球皆下獄死四年大長秋華容侯曹節卒中常侍趙忠領大長秋六年春三月鉅鹿張角反以中常侍封諝徐奉等為内應事見黄巾之亂中平元年張角之亂帝召羣臣㑹議北地太守皇甫嵩以為宜解黨禁益出中藏錢西園廐馬以班軍士嵩䂓之兄子也上問計於中常侍吕彊對曰黨錮久積人情怨憤若不赦宥輕與張角合謀為變滋大悔之無救今請先誅左右貪濁者大赦黨人料簡刺史二千石能否則盜無不平矣帝懼而從之壬子赦天下黨人還諸徙者唯張角不赦是時中常侍趙忠張讓夏惲郭勝段珪宋典等皆封侯貴寵上常言張常侍是我公趙常侍是我母由是宦官無所憚畏並起第宅擬則宫室上嘗欲登永安候臺宦官恐望見其居處乃使中大人尚但諌曰天子不當登高登高則百姓虛散上自是不敢復升臺榭及封諝徐奉事發上詰責諸常侍曰汝曹常言黨人欲為不軌皆令禁錮㦯有伏誅者今黨人更為國用汝曹反與張角通為可斬未皆叩頭曰此王甫侯覽所為也於是諸常侍人人求退各自徵還宗親子弟在州郡者趙忠夏惲等遂共譖品彊云與黨人共議朝廷數讀霍光傳彊兄弟所在並皆貪穢帝使中黄門持兵召彊彊聞帝召怒曰吾死亂起矣丈夫欲盡忠國家豈能對獄吏乎遂自殺忠惲復譖曰彊見召未知所問而就外自屏有姦明審遂收捕其宗親没入財産侍中河内向栩上便宜譏刺左右張讓誣栩與張角同心欲為内應收送黄門北寺獄殺之郎中中山張鈞上書曰竊惟張角所以能興兵作亂萬民所以樂附之者其源皆由十常侍多放父兄子弟婚親賓客典據州郡辜權財利侵掠百姓百姓之寃無所告訴故謀議不軌聚為盗賊宜斬十常侍懸頭南郊以謝百姓遣使者布告天下可不須師旅而大冦自消帝以鈞章示諸常侍皆免冠徒跣頓首乞自致雒陽詔獄並出家財以助軍費有詔皆冠履視事如故帝怒鈞曰此真狂子也十常侍固當有一人善者不御史承㫖遂誣奏鈞學黄巾道收掠死獄中朱雋之擊黄巾也其䕶軍司馬北地傅爕上疏曰臣聞天下之禍不由於外皆興於内是故虞舜先除四凶然後用十六相明惡人不去則善人無由進也今張角起於趙魏黄巾亂於六州此皆釁發蕭牆而禍延四海者也臣受戎任奉辭伐罪始到潁川戰無不尅黄巾雖盛不足為廟堂憂也臣之所懼在於治水不自其源末流彌增其廣耳陛下仁徳寛容多所不忍故閹豎弄權忠臣不進誠使張角梟夷黄巾變服臣之所憂甫益深耳何者夫邪正之人不宜共國亦猶冰炭不可同器彼知正人之功顯而危亡之兆見皆將巧辭飾説共長虚偽夫孝子疑於屢至市虎成於三夫若不詳察真偽忠臣將復有杜郵之戮矣陛下宜思虞舜四罪之舉速行讒佞之誅則善人思進姦凶自息趙忠見其疏而惡之爕擊黄巾功多當封忠譖訴之帝識爕言得不加罪竟亦不封二年春二月己酉南宫雲臺災庚戌樂城門灾中常侍張讓趙忠説帝斂天下田畮十錢以修宫室鑄銅人樂安太守陸康上疏諌曰昔魯宣税畮而蝝灾自生哀公增賦而孔子非之豈有聚奪民物以營無用之銅人捐捨聖戒自蹈亡王之灋哉内倖譖康援引亡國以譬聖明大不敬檻車徵詣廷尉侍御史劉岱表陳解釋得免歸田里康續之孫也又詔發州郡材木文石部送京師黄門常侍輒令譴呵不中者因彊折賤買僅得本賈十分之一因復貨之宦官復不為即受材木遂至腐積宫室連年不成刺史太守復增私調百姓呼嗟又令西園騶分道督趣恐動州郡多受賕賂刺史二千石及茂才孝亷遷除皆責助軍修宫錢大郡至二三千萬餘各有差當之官者皆先至西園諧價然後得去其守清者乞不之官皆迫遣之時鉅鹿太守河内司馬直新除以有清名減責三百萬直被詔悵然曰為民父母而反割剥百姓以稱時求吾不忍也辭疾不聽行至孟津上書極陳當世之失即吞藥自殺書奏帝為暫絶修宫錢六月以討張角功封中常侍張讓等十二人為列侯秋七月皇甫嵩之討張角也過鄴見中常侍趙忠舎宅踰制奏没入之又中常侍張讓私求錢五千萬嵩不與二人由是奏嵩連戰無功所費者多徵嵩還收左車騎將軍印綬削户六千冬十月諌議大夫劉陶上言天下前遇張角之亂後遭邉章之冦令西羌逆類已攻河東恐遂轉盛豕突上京民有百先退死之心而無一前鬬生之計西冦浸前車騎孤危假令失利其敗不救臣自知言數見厭而言不自裁者以為國安則臣䝉其慶國危則臣亦先亡也謹復陳當今要急八事大較言天下大亂皆由宦官宦官共讒陶曰前張角事發詔書示以威恩自此以来各各改悔今者四方安静而陶疾害聖政専言妖孽州郡不上陶何縁知疑陶與賊通情於是収陶下黄門北寺獄掠按日急陶謂使者曰臣恨不與伊吕同疇而以三仁為輩今上殺忠謇之臣下有憔悴之民亦在不久後悔何及遂閉氣而死前司徒陳耽為人忠正宦官怨之亦誣陷死獄中是嵗帝造萬金堂於西園引司農金錢繒帛牣積堂中復藏寄小黄門常侍家錢各數千萬又於河間買田宅起第觀三年春二月以中常侍趙忠為車騎將軍帝使忠論討黄巾之功執金吾甄舉謂忠曰傅南容前在東軍有功不侯天下失望今將軍親當重任宜進賢理屈以副衆心忠納其言遣弟城門校尉延致殷勤於傅爕延謂爕曰南容少答我常侍萬户侯不足得也爕正色拒之曰有功不論命也傅爕豈求私賞哉忠愈懐恨然憚其名不敢害出為漢陽太守五年夏五月故太傅陳蕃子逸與術士襄楷㑹於冀州刺史王芬坐楷曰天文不利宦者黄門常侍真族滅矣逸喜芬曰若然者芬願驅除因與豪傑轉相招合上書言黑山賊攻劫郡縣欲因以起兵㑹帝欲北巡河間舊宅芬等謀以兵徼劫誅諸常侍黄門因廢帝立合肥侯以其謀告議郎曹操操曰夫廢立之事天下之至不祥也古人有權成敗計輕重而行之者伊霍是也伊霍皆懐至忠之誠據宰輔之埶因秉政之重同衆人之欲故能計從事立今諸君徒見曩者之易未覩當今之難而造作非常欲望必克不亦危乎芬又呼平原華歆陶丘洪共定計洪欲行歆止之曰夫廢立大事伊霍之所難芬性疎而不武此必無成洪乃止㑹北方夜半有赤氣東西竟天大史上言北方有陰謀不宜北行帝乃止敕芬罷兵俄而徵之芬懼解印綬亡走至平原自殺八月初置西園八校尉以小黄門蹇碩為上軍校尉虎賁中郎將袁紹為中軍校尉屯騎校尉鮑鴻為下軍校尉議郎曹操為典軍校尉趙融為助軍左校尉馮芳為助軍右校尉諫議大夫夏牟為左校尉淳于瓊為右校尉皆統於蹇碩帝自黄巾之起留心戎事碩壯健有武略帝親任之雖大將軍亦領屬焉冬十月望氣者以為京師當有大兵兩宮流血帝欲厭之乃大發四方兵講武於平樂觀下起大壇上建十二重華葢高十丈壇東北為小壇復建九重華葢高九丈列步騎數萬人結營為陳甲子帝親出臨軍駐大華葢下大將軍進駐小華葢下帝躬擐甲介馬稱無上將軍行陳三匝而還以兵授進帝問討虜校尉葢勲曰吾講武如是何如對曰臣聞先王曜徳不觀兵今冦在逺而設近陳不足昭果毅秪黷武耳帝曰善恨見君晚羣臣初無是言也勲謂袁紹曰上甚聰明但蔽於左右耳與紹謀共誅嬖倖蹇碩懼出勲為京兆尹六年夏四月蹇碩忌大將軍進與諸常侍共説帝遣進西擊韓遂帝從之進陰知其謀奏遣袁紹收徐兖二州兵須紹還而西以稽行期初帝數失皇子何皇后生子辯養於道人史子眇家號曰史侯王美人生子協董太后自養之號曰董侯羣臣請立太子帝以辯輕佻無威儀欲立協猶豫未决會疾篤屬協於蹇碩丙辰帝崩於嘉徳殿碩時在内欲先誅何進而立協使人迎進欲與計事進即駕往碩司馬潘隠與進早舊迎而目之進驚馳從儳道歸營引兵入屯百郡邸因稱疾不入戊午皇子辯即皇帝位年十四尊皇后曰皇太后太后臨朝赦天下改元為光熹封皇弟協為渤海王協年九嵗以後將軍袁隗為太傅與大將軍何進參録尚書事進既秉朝政忿蹇碩圖已陰規誅之袁紹因進親客張津勸進悉誅諸宦官進以袁氏累世貴寵而紹與從弟虎賁中郎將術皆為豪傑所歸信而用之復博徵智謀之士何顒荀攸及河南鄭泰等二十餘人以顒為北軍中候攸為黄門侍郎泰為尚書與同腹心攸爽之從孫也蹇碩疑不自安與中常侍趙忠宋典等書曰大將軍兄弟秉國専朝今與天下黨人謀誅先帝左右掃滅我曹但以碩典禁兵故且沈吟今宜共閉上閤急捕誅之中常侍郭勝進同郡人也太后及進之貴幸勝有力焉故親信何氏與趙忠等議不從碩計而以其書示進庚午進使黄門令收碩誅之因悉領其屯兵票騎將軍董重與何進權埶相害中官挾重以為黨助董太后每欲參干政事何太后輒相禁塞董后忿恚詈曰汝今輈張怙汝兄耶吾敕票騎斷何進頭如反手耳何太后聞之以告進五月進與三公共奏孝仁皇后使故中常侍夏惲等交通州郡辜較財利悉入西省故事蕃后不得留京師請遷宫本國奏可辛巳進舉兵圍票騎府收董重免官自殺六月辛亥董后憂怖暴崩民間由是不附何氏秋七月袁紹復説何進曰前竇武欲誅内寵而反為所害者但坐言語漏泄五營兵士皆服畏中人而竇氏反用之自取禍滅今將軍兄弟並領勁兵部曲將吏皆英俊名士樂盡力命事在掌握此天贊之時也將軍宜一為天下除患以垂名後世不可失也進乃白太后請盡罷中常侍以下以三署郎補其處太后不聽曰中官統領禁省自古及今漢家故事不可廢也且先帝新棄天下我奈何楚楚與士人共對事乎進難違太后意且欲誅其放縱者紹以為中官親近至尊出納號令今不悉廢後必為患而太后母舞陽君及何苗數受諸宦官賂遺知進欲誅之數白太后為其障蔽又言大將軍専殺左右擅權以弱社稷太后疑以為然進新貴素敬憚中官雖外慕大名而内不能斷故事久不决紹等又為畫䇿多召四方猛將及諸豪傑使並引兵向京城以脅太后進然之主簿廣陵陳琳諫曰諺稱掩目捕雀夫微物尚不可欺以得志况國之大事其可以詐立乎今將軍總皇威握兵要龍驤虎步高下在心此猶鼓洪爐燎毛髦耳但當速發雷霆行權立斷則天人順之而反委釋利器更徵外助大兵聚㑹彊者為雄所謂倒持干戈授人以柄功必不成秪為亂階耳進不聽典軍校尉曹操聞而笑曰宦者之官古今宜有但世主不當假之權寵使至於此既治其罪當誅元惡一獄吏足矣何至紛紛召外兵乎欲盡誅之事必宣露吾見其敗也初靈帝徵董卓為少府卓上書言所將湟中義從及秦胡兵皆詣臣言牢直不畢禀賜斷絶妻子饑凍牽挽臣車使不得行羌人憋膓狗態臣不能禁止輒將順安慰増異復上朝廷不能制及帝寢疾璽書拜卓并州牧令以兵屬皇甫嵩卓復上書言臣誤蒙天恩掌戎十年士卒大小相狎彌久戀臣畜養之恩為臣奮一旦之命乞將之北州效力邉垂嵩從子酈説嵩曰天下兵柄在大人與董卓耳今怨隙已結埶不俱存卓被詔委兵而上書自請此逆命也彼度京師政亂故敢躊躇不進此懐姦也二者刑所不赦且其凶戾無親將士不附大人今為元帥杖國威以討之上顯忠義下除凶害無不濟也嵩曰違命雖罪専誅亦有責也不如顯奏其事使朝廷裁之乃上書以聞帝以讓卓卓亦不奉詔駐兵河東以觀時變何進召卓使將兵詣京師侍御史鄭泰諫曰董卓彊忍寡義志欲無猒若借之朝政授以兵柄將恣凶欲必危朝廷明公以親徳之重據阿衡之權秉意獨斷誅除有罪誠不宜假卓以為資援也且事留變生殷鑒不逺宜在速决尚書盧植亦言不宜召卓進皆不從泰乃棄官去謂荀攸曰何公未易輔也進府掾王匡騎都尉鮑信皆泰山人進使還鄉里募兵并召東郡太守橋瑁屯成臯使武猛都尉丁原將數千人冦河内燒孟津火照城中皆以誅宦官為言董卓聞召即時就道并上書曰中常侍張讓等竊倖承寵濁亂海内臣聞揚湯止沸莫若去薪潰癰雖痛勝於内食昔趙鞅興晉陽之甲以逐君側之惡今臣輒鳴鐘鼓如雒陽請收讓等以清姦穢太后猶不從何苗謂進曰始共從南陽来俱以貧賤依省内以致富貴國家之事亦何容易覆水不收宜深思之且與省内和也卓至渑池而進更狐疑使諌議大夫种邵宣詔止之卓不受詔遂前至河南邵迎勞之因譬令還軍卓疑有變使其軍士以兵脅邵邵怒稱詔叱之軍士皆披遂前質責卓卓辭屈乃還軍夕陽亭邵暠之孫也袁紹懼進變計因脅之曰交構已成形埶已露將軍復欲何待而不早决之乎事久變生復為竇氏矣進於是以紹為司𨽻校尉假節専命擊斷從事中郎王允為河南尹紹使雒陽方略武吏司察宦者而促董卓等使馳驛上奏欲進兵平樂觀太后乃恐悉罷中常侍小黄門使還里舍唯留進素所私人以守省中諸常侍小黄門皆詣進謝罪唯所措置進謂曰天下匈匈正患諸君耳今董卓垂至諸君何不早各就國袁紹勸進便於此决之至於再三進不許紹又為書告諸州郡詐宣進意使捕案中官親屬進謀積日頗泄中官懼而思變張讓子婦太后之妹也讓向子婦叩頭曰老臣得罪當與新婦俱歸私門唯受恩累世今當逺離宫殿情懐戀戀願復一入直得暫奉望太后陛下顔色然後退就溝壑死不恨矣子婦言於舞陽君入白太后乃詔諸常侍皆復入直八月戊辰進入長樂宫白太后請盡誅諸常侍中常侍張讓段珪相謂曰大將軍稱疾不臨䘮不送𦵏今欻入省此意何為竇氏事竟復起邪使濳聽具聞其語乃率其黨數十人持兵竊自側闥入伏省户下進出因詐以太后詔召進入坐省閤讓等詰進曰天下情憒亦非獨我曹罪也先帝嘗與太后不快㡬至成敗我曹涕泣救解各出家財千萬為禮和悦上意但欲託卿門户耳今乃欲滅我曹種族不亦太甚乎於是尚方監渠穆拔劍斬進於嘉徳殿前讓珪等為詔以故太尉樊陵為司𨽻校尉少府許相為河南尹尚書得詔板疑之曰請大將軍出共議中黄門以進頭擲與尚書曰何進謀反已伏誅矣進部曲將呉匡張璋在外聞進被害欲引兵入宫宫門閉虎賁中郎將袁術與匡共斫攻之中黄門持兵守閤㑹日暮術因燒南宫青瑣門欲以脅出讓等讓等入白太后言大將軍兵反燒宫攻尚書闥因將太后少帝及陳留王劫省内官屬從複道走北宫尚書盧植執戈於閤道窗下仰數段珪珪懼乃釋太后太后投閤得免袁紹與叔父隗矯詔召樊陵許相斬之紹及何苗引兵屯朱雀闕下捕得趙忠等斬之呉匡等素怨苗不與進同心而又疑其與宦官通謀乃令軍中曰殺大將軍者即車騎也吏士能為報讎乎皆流涕曰願致死匡遂引兵與董卓弟奉車都尉旻攻殺苗棄其尸於苑中紹遂閉北宫門勒兵捕諸宦者無少長皆殺之凡二千餘人或有無須而誤死者紹因進兵排宫或上端門屋以攻省内庚午張讓段珪等困迫遂將帝與陳留王數十人步出糓門夜至小平津六璽不自隨公卿無得從者惟尚書盧植河南中部掾閔貢夜至河上貢厲聲質責讓等且曰今不速死吾將殺汝因手劍斬數人讓等惶怖义手再拜叩頭向帝辭曰臣等死陛下自愛遂投河而死貢扶帝與陳留王夜步逐螢光南行欲還宫行數里得民家露車共乗之至雒舍止辛未帝獨乘一馬陳留王與貢共乘一馬從雒舍南行公卿稍有至者董卓至顯陽苑逺見火起知有變引兵急進未明到城西聞帝在北因與公卿往奉迎於北芒阪下帝見卓將兵卒至恐怖涕泣羣公謂卓曰有詔却兵卓曰公諸人為國大臣不能匡正王室至使國家播蕩何却兵之有卓與帝語語不可了乃更與陳留王語問禍亂由起王答自初至終無所遺失卓大喜以王為賢且為董太后所養卓自以與太后同族遂有廢立之意是日帝還宫赦天下改光熹為昭寧失傳國璽餘璽皆得之以丁原為執金吾騎都尉鮑信自泰山募兵適至説袁紹曰董卓擁彊兵將有異志今不早圖必為所制及其新至疲勞襲之可禽也紹畏卓不敢發信乃引兵還泰山董卓之入也步騎不過二千自嫌兵少恐不為逺近所服率四五日輒夜濳出軍近營明旦乃大陳旌鼔而還以為西兵復至雒中無知者俄而進及弟苗部曲皆歸於卓卓又陰使丁原部曲司馬五原吕布殺原而并其衆卓兵於是大盛乃諷朝廷以久雨䇿免司空劉𢎞而代之初蔡邕徙朔方㑹赦得還五原太守王智甫之弟也奏邕謗訕朝廷邕遂亡命江海積十二年董卓聞其名而辟之稱疾不就卓怒罵曰我能族人邕懼而應命到署祭酒甚見敬重舉高第三日之間周歴三臺遷為侍中董卓謂袁紹曰天下之主宜得賢明每念靈帝令人憤毒董侯似可今欲立之為能勝史侯否人有小智大癡亦知復何如為當且爾劉氏種不足復遺紹曰漢家君天下四百許年恩澤深渥兆民戴之今上富於春秋未有不善宣於天下公欲廢嫡立庶恐衆不從公議也卓按劍叱紹曰豎子敢然天下之事豈不在我我欲為之誰敢不從爾謂董卓刀為不利乎紹勃然曰天下健者豈惟董公引佩刀横揖徑出卓以新至見紹大家故不敢害紹懸節於上東門逃犇冀州九月癸酉卓大㑹百寮奮首而言曰皇帝闇弱不可以奉宗廟為天下主今欲依伊尹霍光故事更立陳留王何如公卿以下皆惶恐莫敢對卓又抗言曰昔霍光定䇿延年按劍有敢沮大議皆以軍法從事坐者震動尚書盧植獨曰昔太甲既立不明昌邑罪過千餘故有廢立之事今上富於春秋行無失徳非前事之比也卓大怒罷坐將殺植蔡邕為之請議郎彭伯亦諫卓曰盧尚書海内大儒人之望也今先害之天下震怖卓乃止但免植官植遂逃隠於上谷卓以廢立議示太傅袁隗隗報如議甲戍卓復集羣僚於崇徳前殿遂脅太后䇿廢小帝曰皇帝在䘮無人子之心威儀不類人君今廢為𢎞農王立陳留王協為帝袁隗解帝璽綬以奉陳留王扶𢎞農王下殿北面稱臣太后鯁涕羣臣含悲莫敢言者卓又議太后踧迫永樂宫至令憂死逆婦姑之禮乃遷太后於永安宫赦天下改昭寧為永漢丙子卓酖殺何太后公卿以下不布服㑹𦵏素衣而已卓又發何苗棺出其尸支解節斷棄於道邉殺苗母舞陽君棄尸於苑枳落中詔除公卿以下子弟為郎以補宦官之職侍於殿上董卓自為太尉領前將軍事加節傳斧鉞虎賁更封郿侯董卓率諸公上書追理陳蕃竇武及諸黨人悉復其爵位遣使弔祠擢用其子孫十一月以董卓為相國贊拜不名入朝不趨劍履上殿十二月戊戌以司徒黄琬為太尉司空楊彪為司徒光祿勲荀爽為司空初尚書武威周毖城門校尉汝南伍瓊説董卓矯桓靈之政擢用天下名士以收衆望卓從之命毖瓊與尚書鄭泰長史何顒等沙汰穢惡顯拔幽滯於是徵處士荀爽陳紀韓融申屠蟠復就拜爽平原相行至宛陵遷光祿勲視事三日進拜司空自被徵命及登台司凡九十三日又以紀為五官中郎將融為太鴻臚紀寔之子融韶之子也爽等皆畏卓之暴無敢不至獨申屠蟠得徵書人勸之行蟠笑而不答卓終不能屈年七十餘以夀終卓又以尚書韓馥為冀州牧侍中劉岱為兖州刺史陳留孔伷為豫州刺史東平張邈為陳留太守潁州張咨為南陽大守卓所親愛並不處顯職但將校而已董卓性殘忍一旦専政據有國家甲兵珍寳威震天下所願無極語賓客曰我相貴無上也侍御史擾龍宗詣卓白事不解劍立撾殺之是時洛中貴戚室第相望金帛財産家家充積卓縱放兵士突其廬舍剽虜資物妻略婦女不避貴賤人情崩恐不保朝夕卓購求袁紹急周毖伍瓊説卓曰夫廢立大事非常人所及袁紹不達大體恐懼出犇非有它志今急購之埶必為變袁氏樹恩四世門生故吏徧於天下若收豪傑以聚徒衆英雄因之而起則山東非公之有也不如赦之拜一郡守紹喜於免罪必無患矣卓以為然乃即拜紹勃海太守封邟鄉侯义以袁術為後將軍曹操為驍騎校尉術畏卓出犇南陽是時豪傑多欲起兵討卓者袁紹在勃海冀州牧韓馥遣數部從事守之不得動揺東郡太守橋瑁詐作京師三公移書與州郡陳卓罪惡云見逼迫無以自救企望義兵解國患難馥得移請諸從事問曰今當助袁氏耶助董氏耶治中從事劉子惠曰今興兵為國何謂袁董馥有慙色子惠復言兵者凶事不可為首今宜往視他州有發動者然後和之冀州於他州不為弱也他人功未有在冀州之右者也馥然之馥乃作書與紹道卓之惡聽其舉兵通鑑紀事本末卷八上欽定四庫全書通鑑紀事本末卷八中宋袁樞撰宦官亡漢二獻帝初平元年春正月關東州郡皆起兵以討董卓衆各數萬事見曹氏代漢癸酉董卓使郎中令李儒酖殺𢎞農王辯卓議大發兵以討山東尚書鄭泰曰夫政不徳不在衆也卓不悦曰如卿此言兵為無用邪泰曰非謂其然也以為山東不足加大兵耳明公出自西州少為將帥閑習軍事袁本初公卿子弟生處京師張孟卓東平長者坐不闚堂孔公緒清談高論嘘枯吹生並無軍旅之才臨鋒法敵非公之儔也况王爵不加尊卑無序若恃衆怙力將各棊峙以觀成敗不肯同心共膽與齊進退也且山東承平日久民不習戰關西頃遭羌冦婦女皆能挾弓而鬬天下所畏者無若并涼之人與羌胡義從而明公擁之以為爪牙譬猶驅虎兕以赴大羊鼓烈風以掃枯葉誰敢禦之無事徵兵以驚天下使患役之民相聚為非棄徳恃衆自虧威重也卓乃悦董卓以山東兵盛欲遷都以避之公卿皆不欲而莫敢言卓表河南尹朱雋為太僕以為己副使者召拜雋辭不肯受因曰國家西遷必孤天下之望以成山東之釁臣不知其可也使者曰召君受拜而君拒之不問徙事而君陳之何也雋曰副相國非臣所堪也遷都非計事所急也辭所不堪言其所急臣之宜也由是止不為副卓大㑹公卿議曰高祖都關中十有一世光武官雒陽於今亦十一世矣案石包䜟宜徙都長安以應天人之意百官皆黙然司徒楊彪曰移都改制天下大事故盤庚遷亳殷民胥怨昔關中遭王莽殘破故光武更都雒邑歴年已久百姓安樂今無故捐宗廟棄園陵百姓驚動必有糜沸之亂石包䜟妖邪之書豈可信用卓曰關中肥饒故秦得并吞六國且隴右材木自出杜陵有武帝陶竈并功營之可使一朝而辦百姓何足與議若有前却我以大兵驅之可令詣滄海彪曰天下動之至易安之甚難惟明公慮焉卓作色曰公欲沮國計邪太尉黄琬曰此國之大事楊公之言得無可思卓不答司空荀爽見卓意壯恐害彪等因從容言曰相國豈樂此邪山東兵起非一日可禁故當遷以圖之此秦漢之埶也卓意小解琬退又為駮議二月乙亥卓以灾異奏免琬彪等以光祿勲趙謙為太尉太僕王允為司徒城門校尉伍瓊督軍校尉周毖固諫遷都卓大怒曰卓初入朝二君勸用善士故卓相從而諸君到官舉兵相圖此二君賣卓卓何用相負庚辰收瓊毖斬之楊彪黄琬恐懼詣卓謝卓亦悔殺瓊毖乃復表彪琬為光祿大夫卓徵京兆尹葢勲為議郎時左將軍皇甫嵩將兵三萬屯扶風勲宻與嵩謀討卓㑹卓亦徵嵩為城門校尉嵩長史梁衍説嵩曰董卓冦掠京邑廢立從意今徵將軍大則危禍小則困辱今及卓在雒陽天子来西以將軍之衆迎接至尊奉令討逆徵兵羣帥袁氏逼其東將軍迫其西此成禽也嵩不從遂就徵勲以衆弱不能獨立亦還京師卓以勲為越騎校尉河南尹朱雋為卓陳軍事卓折雋曰我百戰百勝決之於心卿勿妄説且汙我刀葢勲曰昔武丁之明猶求箴諌况如卿者而欲杜人之口乎卓乃謝之卓遣軍至陽城值民㑹於社下悉就斬之駕其車重載其婦女以頭擊車轅歌呼還雒云攻賊大獲卓焚燒其頭以婦女與甲兵為婢妾丁亥車駕西遷董卓收諸富室以罪惡誅之没入其財物死者不可勝計悉驅徙其餘民數百萬口於長安步騎驅蹙更相蹈藉飢餓冦掠積尸盈路卓自留屯畢圭苑中悉燒宫廟官府居家二百里内室屋蕩盡無復雞犬又使吕布發諸帝陵及公卿以下冢墓收其珍寶卓獲山東兵以猪膏塗布十餘匹用纒其身然後燒之先從足起三月乙巳車駕入長安居京兆府舍後乃稍葺宫室而居之時董卓未至朝政大小皆委之王允允外相彌縫内謀王室甚有大臣之度自天子及朝中皆倚允允屈意承卓卓亦雅信焉州郡舉兵討董卓長沙太守孫堅亦起兵前至南陽衆已數萬人南陽太守張咨不肯給軍糧堅誘而斬之郡中震慄無求不獲前到魯陽與袁術合兵術由是得據南陽表堅行破虜將軍領豫州刺史六月董卓遣大鴻臚韓融少府隂修執金吾胡母班將作大匠呉修越騎校尉王瓌安集關東解譬袁紹等胡母班吳修王瓌至河内袁紹使王匡悉收擊殺之袁術亦殺陰修惟韓融以名徳免冬王匡屯河陽津董卓襲擊大破之二年春正月關東諸將議立宗室劉虞為主韓馥袁紹以書與袁術曰帝非孝靈子欲依絳灌誅廢少主迎立代王故事奉大司馬虞為帝術陰有不臣之心不利國家有長君乃外托公義以拒之紹復與術書曰今西名有幼君無血脉之屬公卿以下皆媚事卓安可復信但當使兵往屯關要皆自蹙死東立聖君太平可冀如何有疑又室家見戮不念子胥可復北面乎術答曰聖主聰叡有周成之質賊卓因危亂之際威服百寮此乃漢家小厄之㑹乃云今主無血脉之屬豈不誣乎又曰室家見戮可復北面此卓所為豈國家哉慺慺赤心志在滅卓不識其他馥紹竟遣故樂浪太守張岐等齎議上虞尊號虞見岐等厲色叱之曰今天下崩亂主上䝉塵吾被重恩未能清雪國恥諸君各據州郡宜共戮力盡心王室而反造逆謀以相垢汙邪固拒之馥等又請虞領尚書事承制封拜復不聽欲犇匈奴以自絶紹等乃止二月丁丑以董卓為太師位在諸侯王上孫堅移屯梁東為卓將徐榮所敗復收散卒進屯陽人卓遣東郡太守胡軫督步騎五千擊之以吕布為騎督軫與布不相得堅出擊大破之梟其都督華雄或謂袁術曰堅若得雒不可復制此為除狼而得虎也術疑之不運軍糧堅夜馳見術畫地計校曰所以出身不顧者上為國家討賊下慰將軍家門之私讎堅與卓非有骨肉之怨也而將軍受浸潤之言還相嫌疑何也術踧踖即調發軍糧堅還屯卓遣將軍李催説堅欲與和親令堅疏子弟任刺史郡守者許表用之堅曰卓逆天無道今不夷汝三族縣示四海則吾死不瞑目豈將與乃和親邪復進軍大谷距雒九十里卓自出與堅戰於諸陵間卓敗走却屯澠池聚兵於陜堅進至雒陽擊吕布復破走堅乃掃除宗廟祠以太牢得傳國璽於城南甄官井中分兵出新安澠池間以邀卓卓使東中郎將董越屯澠池中郎將段煨屯華隂中郎將牛輔屯安邑其餘諸將布在諸縣以禦山東輔卓之壻也卓引還長安孫堅修塞諸陵引軍還魯陽夏四月董卓至長安公卿皆迎拜車下卓抵手謂御史中丞皇甫嵩曰義真怖未乎嵩曰明公以徳輔朝廷大慶方至何怖之有若淫刑以逞將天下皆懼豈獨嵩乎卓黨欲尊卓比太公稱尚父卓以問蔡邕邕曰明公威徳誠為巍巍然比之太公愚意以為未可宜須關東平定車駕還反舊京然後議之卓乃止卓使司隸校尉劉囂籍吏民有為子不孝為臣不忠為吏不清為弟不順者皆身誅財物没官於是更相誣引寃死者以千數百姓囂囂道路以目初董卓入關留朱雋守雒陽而雋潛與山東諸將通謀懼為卓所襲出犇荆州卓以𢎞農楊懿為河南尹雋復引兵還雒擊懿走之雋以河南殘破無所資乃東屯中牟移書州郡請師討卓徐州刺史陶謙上雋行車騎將軍遣精兵三千助之餘州郡亦有所給三年春正月董卓遣牛輔將兵屯陜輔分遣校尉北地李傕張掖郭汜武威張濟將步騎數萬擊破朱雋於中牟因掠陳留潁川諸縣所過殺虜無遺董卓以其弟旻為左將軍兄子璜為中軍校尉皆典兵事宗族内外並列朝廷卓侍妾懷抱中子皆封侯弄以金紫卓車服僭擬天子召呼三臺尚書以下皆自詣卓府啟事又築塢於郿高厚皆七丈積穀為三十年儲自云事成雄據天下不成守此足以畢老卓忍於誅殺諸將言語有蹉跌者便戮於前人不聊生司徒王允與司𨽻校尉黄琬僕射士孫瑞尚書楊瓚宻謀誅卓中郎將吕布便弓馬膂力過人卓自以遇人無禮行止常以布自衛甚愛信之誓為父子然卓性剛褊嘗小失卓意卓拔手㦸擲布布拳捷避之而改容顧謝卓意亦解布由是隂怨於卓卓又使布守中閣而私於傅婢益不自安王允素善待布布見允自陳卓㡬見殺之狀允因以誅卓之謀告布使為内應布曰如父子何曰君自姓吕本非骨肉今憂死不暇何謂父子擲㦸之時豈有父子情邪布遂許之夏四月丁巳帝有疾新愈大㑹未央殿卓朝服乘車而入陳兵夾道自營至宫左步右騎屯衛周帀令吕布等扞衛前後王允使士孫瑞自書詔以授布布令同郡騎都尉李肅與勇士秦誼陳衛等十餘人偽著衛士服守北掖門内以待卓卓入門肅以㦸刺之卓衷甲不入傷臂墮車顧大呼曰吕布何在布曰有詔討賊臣卓大罵曰庸狗敢如是邪布應聲持矛刺卓趣兵斬之主簿田儀及卓倉頭前赴其尸布又殺之凡所殺三人布即出懷中詔版以令吏士曰詔討卓耳餘皆不問吏士皆正立不動大稱萬嵗百姓歌舞於道長安中士女賣其珠玉衣裝市酒肉相慶者填滿街肆弟旻璜等及宗族老弱在郿皆為其羣下所斫射死暴卓尸於市天時始熱卓素充肥脂流於地守尸吏為大炷置卓臍中然之光明達曙如是積日諸袁門生聚董氏之尸焚灰揚之於路塢中有金二三萬斤銀八九萬斤錦綺竒玩積如丘山以王允録尚書事吕布為奮威將軍假節儀比三司封温侯共秉朝政卓之死也左中郎將高陽侯蔡邕在王允坐聞之驚歎允勃然叱之曰董卓國之大賊幾亡漢室君為王臣所宜同族而懷其私遇反相傷痛豈不共為逆哉即收付廷尉邕謝曰身雖不忠古今大義耳所厭聞口所常玩豈當背國而嚮卓也願黥首刖足繼成漢史士大夫多矜救之不能得大尉馬日磾謂允曰伯喈曠世逸才多識漢事當續成後史為一代大典而所坐至微誅之無乃失人望乎允曰昔武帝不殺司馬遷使作謗書流於後世方今國祚中衰戎馬在郊不可令佞臣執筆在幼主左右既無益聖徳復使吾黨蒙其訕議日磾退而告人曰王公其無後乎善人國之紀也滅紀廢典其能久乎邕遂死獄中初吕布勸王允盡殺董卓部曲允曰此輩無罪不可布欲以卓財物班賜公卿將校允又不從允素以劍客遇布布負其功勞多自誇伐既失意望漸不相平允性剛稜疾惡初懼董卓故折節下之卓既殱滅自謂無復患難頗自驕傲以是羣下不甚附之允始與士孫瑞議特下詔赦卓部曲既而疑曰部曲從其主耳今若名之惡逆而赦之恐適使深自疑非所以安之也乃止又議悉罷其軍或説允曰涼州人素憚袁氏而畏關東今若一旦解兵開關必人人自危可以皇甫義真為將軍就領其衆因使留陕以安撫之允曰不然關東舉義兵者皆吾徒也今若距險屯陜雖安涼州而疑關東之心不可也時百姓訛言當悉誅涼州人卓故將校遂轉相恐動皆擁兵自守更相謂曰蔡伯喈但以董公親厚尚從坐今既不赦我曹而欲使解兵今日解兵明日當復為魚肉矣吕布使李肅至陜以詔命誅牛輔輔等逆與肅戰肅敗走𢎞農布誅殺之輔恇怯失守㑹營中無故自驚輔欲走為左右所殺李傕等還輔已死傕等無所依遣使詣長安求赦王允曰一嵗不可再赦不許傕等益懼不知所為欲各解散間行歸鄉里討虜校尉武威賈詡曰諸君若棄軍單行則一亭長能束君矣不如相率而西以攻長安為董公報仇事濟奉國家以正天下若其不合走未後也傕等然之乃相與結盟率軍數千晨夜西行王允以胡文才楊整修皆涼州大人召使東解釋之不假借以温顔謂曰關東䑕子欲何為邪卿往呼之於是二人徃實召兵而還傕隨道收兵比至長安已十餘萬與卓故部曲樊稠李䝉等合圍長安城城峻不可攻守之八日吕布軍有叟兵内反六月戊午引傕衆入城放兵虜掠布與戰城中不勝將數百騎以卓頭繫馬鞍出走駐馬青瑣門外招王允同去允曰若䝉社稷之靈上安國家吾之願也如其不獲則奉身以死之朝廷幼少恃我而已臨難茍免吾不忍也努力謝關東諸公勤以國家為念太常种拂曰為國大臣不能禁暴禦侮使白刃向宫去將安之遂戰而死傕汜屯南宫掖門殺太僕魯馗大鴻臚周奐城門校尉崔烈越騎校尉王頎吏民死者萬餘人狼籍滿道王允扶帝上宣平門避兵傕等於城門下伏地叩頭帝謂傕等曰卿等放兵縱横欲何為乎傕等曰董卓忠於陛下而無故為吕布所殺臣等為卓報讎非敢為逆也請事畢詣廷尉受罪傕等圍門樓共表請司徒王允出問太師何罪允窮蹙乃下見之己未赦天下以李傕為揚武將軍郭汜為揚烈將軍樊稠等皆為中郎傕等收司𨽻校尉黄琬下獄殺之初王允以同郡宋翼為左馮翊王宏為右扶風傕等欲殺允恐二郡為患乃先徵翼宏宏遣使謂翼曰郭汜李傕以我二人在外故未危王公今日就徵明日俱族計將安出翼曰雖禍福難量然王命所不得避也宏曰關東義兵鼎沸欲誅董卓今卓已死其黨易制耳若舉兵討傕等與山東相應此轉禍為福之計也翼不從宏不能獨立遂俱就徵甲子傕收允及翼宏并殺之允妻子皆死宏臨命詬曰宋翼豎儒不足議大計傕尸王允於市莫敢收者故吏平陵令京兆趙戩棄官收而𦵏之始允自専討卓之功士孫瑞歸功不侯故得免於難九月以李傕為車騎將軍領司𨽻校尉假節郭汜為後將軍樊稠為右將軍張濟為驃騎將軍皆封侯傕汜稠筦朝政濟出屯𢎞農初董卓入關説韓遂馬騰與共圖山東遂騰率衆詣長安㑹卓死李傕等以遂為鎮西將軍遣還金城騰為征西將軍遣屯郿興平元年春正月甲子帝加元服二月馬騰私有求於李傕不獲而怒欲舉兵相攻帝遣使者和解之不從韓遂率衆来和騰傕既而復與騰合諫議大夫种邵侍中馬宇左中郎將劉範謀使騰襲長安己為内應以誅傕等壬申騰遂勒兵屯長平觀邵等謀泄出犇槐里傕使樊稠郭汜及兄子利擊之騰遂敗走還涼州又攻槐里邵等皆死庚申詔赦騰等夏四月以騰為安狄將軍遂為安降將軍五月以揚武將軍郭汜為後將軍安集將軍樊稠為右將軍並開府如三公合為六府二年董卓初死三輔民尚數十萬户李傕等放兵劫略加以饑饉二年間民相食略盡李傕郭汜樊稠各相與矜功争權欲鬬者數矣賈詡每以大體責之雖内不能善外相含容樊稠之擊馬騰韓遂也李利戰不甚力稠叱之曰人欲截汝父頭何敢如此我不能斬卿邪及騰遂敗走稠追至陳倉遂語稠曰本所争者非私怨王家事耳與足下州里人欲相與善語而别乃俱却騎前接馬交臂相加共語良久而别軍還李利告傕韓樊交馬語不知所道意愛甚宻傕亦以稠勇而得衆忌之稠欲將兵東出關從傕索益兵二月傕請稠㑹議便於坐殺稠由是諸將轉相疑貳傕數設酒請郭汜或留汜止宿汜妻恐汜愛傕婢妾思有以間之㑹傕送饋妻以豉為藥擿以示汜曰一栖不兩雄我固疑將軍信李公也他日傕復請汜飲大醉汜疑其有毒絞糞汁飲之於是各治兵相攻矣帝使侍中尚書和傕汜傕汜不從汜謀迎帝幸其營夜有亡者告傕三月丙寅傕使兄子暹將數千兵圍宫以車三乘迎帝太尉楊彪曰自古帝王無在人家者諸君舉事奈何如是暹曰將軍計定矣於是羣臣步從乘輿以出兵即入殿中掠宫人御物帝至傕營又徙御府金帛置其營遂放火燒宫殿官府居民悉盡帝復使公卿和傕汜汜留楊彪及司空張喜尚書王隆光祿勲劉淵衛尉士孫瑞太僕韓融廷尉宣璠大鴻臚榮郃大司農朱雋將作大匠梁邵屯騎校尉姜宣等於其營以為質朱雋憤懣發病死夏四月郭汜饗公卿議攻李傕楊彪曰羣臣共鬭一人劫天子一人質公卿可行乎汜怒欲手刃之彪曰卿尚不奉國家吾豈求生邪中郎將楊宻固諌汜乃止傕召羌胡數千人先以御物繒綵與之許以宫人婦女欲令攻郭汜汜隂與傕黨中郎將張苞等謀攻傕丙申汜將兵夜攻傕門矢及帝簾帷中又貫傕左耳苞等燒屋火不然楊奉於外拒汜汜兵退苞等因將所領兵歸汜是日傕復移乘輿幸北塢使校尉監塢門内外隔絶侍臣皆有飢色帝求米五斗牛骨五具以賜左右傕曰朝晡上飰何用米為乃以臭牛骨與之帝大怒欲詰責之侍中楊琦諫曰傕自知所犯悖逆欲轉車駕幸池陽黄白城臣願陛下忍之帝乃止司徒趙温與傕書曰公前屠陷王城殺戮大臣今争睢眥之隙以成千鈞之讎朝廷欲令和解詔命不行而復欲轉乘輿於黄白城此誠老夫所不解也於易一為過再為涉三而弗改滅其頂凶不如早共和解傕大怒欲殺温其弟應諫之數日乃止傕信巫覡厭勝之術常以三牲祠董卓於省門外每對帝或言明陛下或言明帝為帝説郭汜無狀帝亦随其意應答之傕喜自謂良得天子歡心也閏月己卯帝使謁者僕射皇甫酈和傕汜酈先詣汜汜從命又詣傕傕不肯曰郭多盜馬虜耳何敢欲與言等邪必誅之君觀吾方畧士衆足辦郭多否邪多又劾質公卿所為如是而君茍欲左右之邪酈曰近者董公之彊將軍所知也吕布受恩而反圖之斯須之間身首異處此有勇而無謀也今將軍身為上將荷國寵榮汜質公卿而將軍脅主誰輕重乎張濟與汜有謀楊奉白波賊帥耳猶知將軍所為非是將軍雖寵之猶不為用也傕呵之令出酈出詣省門白傕不肯奉詔辭語不順帝恐傕聞之亟令酈去傕遣虎賁王昌呼欲殺之昌知酈忠直縱令去還答傕言追之不及辛巳以車騎將軍李傕為大司馬在三公之右李傕郭汜相攻連月死者以萬數六月傕將楊奉謀殺傕事泄遂將兵叛傕傕衆稍衰庚午鎮東將軍張濟自陜至欲和傕汜遷乘輿權幸𢎞農帝亦思舊京遣使宣諭十反汜傕許和欲質其愛子傕妻愛其男和計未定而羌胡數来闚省門曰天子在此中耶李將軍許我宫人今皆何在帝患之使侍中劉艾謂宣義將軍賈詡曰卿前奉職公忠故仍升榮寵今羌胡滿路宜思方畧詡乃召羌胡大帥飲食之許以封賞羌胡皆引去傕由此單弱於是復有言和解之計者傕乃從之各以女為質秋七月甲子車駕出宣平門當度橋汜兵數百人遮橋曰此天子非也車不得前傕兵數百人皆持大㦸在乘輿車前兵欲交侍中劉艾大呼曰是天子也使侍中楊琦高舉車帷帝曰諸君何敢迫近至尊耶汜兵乃却既度橋士卒皆稱萬嵗夜到霸陵從者皆飢張濟賦給各有差傕出屯池陽丙寅以張濟為票騎將軍開府如三公郭汜為車騎將軍楊定為後將軍楊奉為興義將軍皆封列侯又以故牛輔部曲董承為安集將軍郭汜欲令車駕幸高陵公卿及濟以為宜幸𢎞農大㑹議之不決帝遣使諭汜曰𢎞農近郊廟勿有疑也汜不從帝遂終日不食汜聞之曰可且幸近縣八月甲辰車駕幸新豐丙子郭汜復謀脅帝還都郿侍中种輯知之宻告楊定董承楊奉令㑹新豐郭汜自知謀泄乃棄軍入南山冬十月郭汜黨夏育高碩等謀脅乘輿西行侍中劉艾見火起不止請帝出幸一營以避火楊定董承將兵迎天子幸楊奉營夏育等勒兵欲止乘輿楊定楊奉力戰破之乃得出壬寅行幸華陰寧輯將軍段煨具服御及公卿已下資儲欲上幸其營煨與楊定有隙定黨种輯左靈言煨欲反太尉楊彪司徒趙温侍中劉艾尚書梁紹皆曰段煨不反臣等敢以死保董承楊定脅𢎞農督郵令言郭汜來在煨營帝疑之乃露次於道南丁未楊奉董承楊定將攻煨使种輯左靈請帝為詔帝曰煨罪未著奉等攻之而欲令朕有詔耶輯固請至夜半猶弗聽奉等乃輒攻煨營十餘日不下煨供給御膳禀贍百官無有二意詔使侍中尚書告喻定等令與煨和解定等奉詔還營李傕郭汜悔令車駕東聞定攻煨相招共救之因欲劫帝而西楊定聞傕汜至欲還藍田為汜所遮單騎亡走荆州張濟與楊奉董承不相平乃復與催汜合十二月帝幸𢎞農張濟李傕郭汜共追乘輿大戰於𢎞農東澗承奉軍敗百官士卒死者不可勝數棄御物符䇿典籍略無所遺射聲校尉沮雋被創墜馬傕謂左右曰尚可活否雋罵之曰汝等凶逆逼劫天子使公卿被害宫人流離亂臣賊子未有如此也傕乃殺之壬申帝露次曹陽承奉乃譎傕等與連和而宻遣間使至河東招故白波帥李樂韓暹胡才及南匈奴右賢王去卑並率其衆數千騎来與承奉共擊傕等大破之斬首數千級於是董承等以新破傕等可復東引庚申東駕發東董承李樂衛乘輿胡才楊奉韓暹匈奴右賢王於後為拒傕等復来戰奉等大敗死者甚於東澗光祿勲鄧淵廷尉宣璠少府田芬大司農張義皆死司徒趙温太常王絳衛尉周忠司𨽻校尉管郃為傕所遮欲殺之賈詡曰此皆大臣卿奈何害之乃止李樂曰事急矣陛下宜御馬上曰不可舍百官而去此何辜哉兵相連綴四十里方得至陜乃結營自守時殘破之餘虎賁羽林不滿百人傕汜兵繞營呌呼吏士失色各有分散之意李樂懼欲令車駕御船過砥柱出孟津楊彪以為河道險難非萬乘所宜乘乃使李樂夜渡濳具船舉火為應上與公卿步出營皇后兄伏徳扶后一手挾絹十匹董承使符節令孫徽從人間斫之殺旁侍者血濺后衣河岸高十餘丈不得下乃以絹為輦使人居前負帝餘皆匍匐而下或從上自投冠幘皆壞既至河邉士卒争赴舟董承李樂以戈擊之手指於舟中可掬帝乃御船同濟者皇后及楊彪以下纔數十人其宫女及吏民不得渡者皆為兵所掠奪衣服俱盡髪亦被截凍死者不可勝計衛尉士孫瑞為傕所殺傕見河北有火遣騎候之適見上渡河呼曰汝等將天子去邪董承懼射之以被為幔既到大陽幸李樂營河内太守張楊使數千人負米来貢餉乙亥帝御牛車幸安邑河東太守王邑奉獻綿帛悉賦公卿以下封邑為列侯拜胡才為征東將軍張楊為安國將軍皆假節開府其壘壁羣帥競求拜職刻印不給至乃以錐畫之乘輿居棘籬中門户無關閉天子與羣臣㑹兵士伏籬上觀互相鎮壓以為笑帝又遣太僕韓融至𢎞農與傕汜等連和傕乃放遣公卿百官頗歸所掠宫人及乘輿器服已而糧榖盡官人皆食菜果乙卯張楊自野王来朝謀以乘輿還雒陽諸將不聽楊復還野王是時長安城空四十餘日彊者四散羸者相食二三年間關中無復人跡沮授説袁紹曰將軍累葉台輔世濟忠義今朝廷播越宗廟殘毁觀諸州郡雖外舉義兵内實相圖未有憂存社稷恤民之意今州郡粗定兵彊士附西迎大駕即宫鄴都挾天子而令諸侯畜士馬以討不庭誰能禦之潁川郭圖淳于瓊曰漢室陵遲為日久矣今欲興之不亦難乎且英雄並起各據州郡連徒聚衆動有萬計所謂秦失其鹿先得者王今迎天子自近動輒表聞從之則權輕違之則拒命非計之善者也授曰今迎朝廷於義為得於時為宜若不早定必有先之者矣紹不從建安元年春正月董承張楊欲以天子還雒陽楊奉李樂不欲由是諸將更相疑貳二月韓暹攻董承承犇野王韓暹屯聞喜胡才楊奉之塢鄉胡才欲攻韓暹上使人諭止之張楊使董承先繕修雒陽宫太僕趙岐為承説劉表使遣兵詣雒陽助修宫室軍資委輸前後不絶夏五月丙寅帝遣使至楊奉李樂韓暹營求送至雒陽奉等從詔六月乙未車駕幸聞喜庚子楊奉韓暹奉帝東還張楊以糧迎道路秋七月甲子車駕至雒陽幸故中常侍趙忠宅丁丑大赦八月辛丑幸南宫楊安殿張楊以為己功故名其殿曰楊安楊謂諸將曰天子當與天下共之朝廷自有公卿大臣楊當出扞外難遂還野王楊奉亦出屯梁韓暹董承並留宿衛癸卯以安國將軍張楊為大司馬楊奉為車騎將軍韓暹為大將軍領司𨽻校尉皆假節鉞是時宫室燒盡百官披荆棘依牆壁間州郡各擁彊兵委輸不至羣僚飢乏尚書郎以下自出採稆或飢死牆壁間或為兵士所殺八月曹操迎車駕都許事見曹操代漢十九年帝自都許以来守位而已左右侍衛莫非曹氏之人者議郎趙彦嘗為帝陳言時䇿魏公操惡而殺之操後以事入見殿中帝不任其懼因曰君若能相輔則厚不爾幸垂恩相捨操失色俛仰求出舊儀三公領兵朝見令虎賁執刃挾之操出顧左右汗流浹背自後不復朝請董承女為貴人操誅承求貴人殺之帝以貴人有􅗖累為請不能得伏皇后由是懷懼乃與父完書言曹操殘逼之狀令宻圖之完不敢發至是事乃泄操大怒十一月使御史大夫郗慮持節䇿收皇后璽綬以尚書令華歆為副勒兵入宫收后后閉户藏壁中歆壊户發壁就牽后出時帝在外殿引慮於坐后被髮徒跣行泣過訣曰不能復相活邪帝曰我亦不知命在何時顧謂慮曰郄公天下寧有是邪遂將后下㬥室以幽死所生二皇子皆酖殺之兄弟及宗族死者百餘人魏文帝黄初元年春正月庚子魏王操薨太子即王位冬十月乙卯漢帝禪位於魏王通鑑紀事本末卷八中欽定四庫全書通鑑紀事本末卷八下宋袁樞撰黄巾之亂漢靈帝光和六年初鉅鹿張角奉事黄老以妖術教授號太平道呪符水以療病令病者跪拜首過或時病愈衆共神而信之角分遣弟子周遊四方轉相誑誘十餘年間徒衆數十萬自青徐幽冀荆揚兖豫八州之人莫不畢應或棄賣財産流移奔赴填塞道路未至病死者亦以萬數郡縣不解其意反言角以善道教化為民所歸太尉楊賜時為司徒上書言角誑燿百姓遭赦不悔稍益滋蔓今若下州郡捕討恐更騷擾速成其患宜切敕刺史二千石簡别流民各䕶歸本部以孤弱其黨然後誅其渠帥可不勞而定㑹賜去位事遂留中司徒掾劉陶復上疏申賜前議言角等隂謀益甚四方私言云角等竊入京師覘視朝政鳥聲獸心私共鳴呼州郡忌諱不欲聞之但更相告語莫肯公文宜下明詔重募角等賞以國土有敢囘避與之同罪帝殊不為意方詔陶次第春秋條例角遂置三十六方方猶將軍也大方萬餘人小方六七千各立渠帥訛言蒼天已死黄天當立嵗在甲子天下大吉以白土書京城寺門及州郡官府皆作甲子字大方馬元義等先收荆揚數萬人期㑹發於鄴元義數往来京師以中常侍封諝徐奉等為内應約以三月五日内外俱起中平元年春角弟子濟南唐周上書告之於是收馬元義車裂於雒陽詔三公司𨽻案驗宫省直衛及百姓有事角道者誅殺千餘人下冀州逐捕角等角等知事已露晨夜馳敕諸方一時俱起皆著黄巾以為標幟故時人謂之黄巾賊二月角自稱天公將軍角弟寶稱地公將軍寶弟梁稱人公將軍所在燔燒官府劫略聚邑州郡失據長吏多逃亡旬月之間天下響應京師震動安平甘陵人各執其王應賊三月戊申以河南尹何進為大將軍封慎侯率左右羽林五營營士屯都亭修理器械以鎮京師置函谷太谷廣成伊闕轘轅旋門孟津小平津八關都尉發天下精兵遣北中郎將盧植討張角左中郎將皇甫嵩右中郎將朱雋討潁川黄巾庚子南陽黄巾張曼成攻殺太守褚貢帝問太尉楊賜以黄巾事賜所對切直帝不悦夏四月賜坐冦賊免以太僕𢎞農鄧盛為太尉已而帝閲録故事得賜與劉陶所上張角奏乃封賜為臨晉侯陶為中陵鄉侯皇甫嵩朱雋合將四萬餘人共討潁川嵩雋各統一軍雋與賊波才戰敗嵩進保長社汝南黄巾敗太守趙謙於邵陵廣陽黄巾殺幽州刺史郭勲及太守劉衛波才圍皇甫嵩於長社嵩兵少軍中皆恐賊依草結營㑹大風嵩約敕軍士皆束苣乘城使鋭士間出圍外縱火大呼城上舉燎應之嵩從城中鼓譟而出犇擊賊陳賊驚亂奔走㑹騎都尉沛國曹操將兵適至五月嵩操與朱雋合軍更與賊戰大破之斬首數萬級封嵩都鄉侯張曼成屯宛下百餘日六月南陽太守秦頡擊曼成斬之皇甫嵩朱雋乘勝進討汝南陳國黄巾追波才於陽翟擊彭脱於西華並破之餘賊降散三郡悉平嵩乃上言其狀以功歸雋於是進封雋西鄉侯遷鎮賊中郎將詔嵩討東郡雋討南陽北中郎將盧植連戰破張角斬獲萬餘人角等走保廣宗植築圍鑿塹造作雲梯垂當拔之帝遣小黄門左豐視軍或勸植以賂送豐植不肯豐還言於帝曰廣宗賊易破耳盧中郎固壘息軍以待天誅帝怒檻車徵植減死一等遣東中郎將隴西董卓代之秋八月皇甫嵩與黄巾戰於蒼亭獲其帥卜已董卓攻張角無功抵罪乙巳詔嵩討角冬十月皇甫嵩與張角弟梁戰於廣宗梁衆精勇嵩不能剋明日乃閉營休士以觀其變知賊意稍懈乃濳夜勒兵雞鳴馳赴其陳戰至晡時大破之斬梁獲首三萬級赴河死者五萬許人角先已病死剖棺戮屍傳首京師十一月嵩復攻角弟寶於下曲陽斬之斬獲十餘萬人即拜嵩為左車騎將軍領冀州牧封槐里侯嵩能温䘏士卒每軍行頓止須營幔修立然後就舍軍士皆食爾乃嘗飯故所嚮有功張曼成餘黨更以趙𢎞為帥衆復盛至十餘萬據宛城朱雋與荆州刺史徐璆等合兵圍之自六月至八月不抜有司奏徵雋司空張温上疏曰昔秦用白起燕任樂毅曠年歴載乃能克敵雋討潁川已有功效引師南指方畧已設臨軍易將兵家所忌宜假日月責其成功帝乃止雋擊𢎞斬之賊帥韓忠復據宛拒雋雋鳴鼓攻其西南賊悉衆赴之雋自將精卒掩其東北乘城而入忠乃退保小城惶懼乞降諸將皆欲聽之雋曰兵固有形同而異勢者昔秦項之際民無定主故賞附以勸来耳今海内一統唯黄巾造逆納降無以勸善討之足以懲惡今若受之更開逆意賊利則進戰鈍則乞降縱敵長冦非良討也因急攻連戰不剋雋登土山望之顧謂司馬張超曰吾知之矣賊今外圍周固内營逼急乞降不受欲出不得所以死戰也萬人一心猶不可當况十萬乎不如徹圍并兵入城忠見圍解勢必自出自出則意散易破之道也既而解圍忠果出戰雋因擊大破之斬首萬餘級南陽太守秦頡殺忠餘衆復奉孫夏為帥還屯宛雋急攻之司馬孫堅率衆先登癸巳拔宛城孫夏走雋追至西鄂精山復破之斬萬餘級於是黄巾破散其餘州郡所誅一郡數十人二年自張角之亂所在盜賊並起博陵張牛角常山褚飛燕及黄龍左校于氐根白騎劉石左髭丈八平漢大計司𨽻縁城雷公浮雲白雀楊鳳于毒五鹿李大目白繞眭固苦蝤之徒不可勝數大者二三萬小者六七千人張牛角禇飛燕合軍攻癭陶牛角中流矢且死令其衆奉飛燕為帥改姓張飛燕名燕輕勇矯捷故軍中號飛燕山谷寇賊多附之部衆浸廣殆至百萬號黒山賊河北諸郡縣並被其害朝廷不能討燕乃遣使至京師奏書乞降遂拜燕平難中郎將使領河北諸山谷事五年二月黄巾餘賊郭大等起於西河白波谷冦太原河東冬十月青徐黄巾復起冦郡縣六年冬十月白波賊冦河東董卓遣其將牛輔擊之南單于於扶羅與白波賊合兵冦郡縣獻帝初平元年青州刺史焦和起兵討董卓務及諸將西行不為民人保障兵始濟河黄巾已入其境青州素殷實甲兵甚盛和每望冦犇北未嘗接風塵交旗鼓二年冬十月青州黄巾冦勃海衆三十萬欲與黑山合公孫瓚率步騎二萬人逆擊於東光南大破之斬首三萬餘級賊棄其輜重犇走渡河瓉因其半濟薄之賊復大破死者數萬流血丹水收得生口七萬餘人車甲財物不可勝算威名大震初陶謙丹陽人朝廷以黄巾冦亂徐州用謙為刺史謙至擊黄巾大破走之州境晏然三年春正月曹操軍頓丘于毒等攻東武陽操引兵西入山攻毒等本屯諸將皆請救武陽操曰使賊聞我西而還武陽自解也不還我能敗其本屯虜不能拔武陽必矣遂行毒聞之棄武陽還操遂擊眭固及匈奴於扶羅於内黄皆大破之四月青州黄巾冦兖州劉岱欲擊之濟北相鮑信諌曰今賊衆百萬百姓皆震恐士卒無鬭志不可敵也然賊軍無輜重唯以鈔略為資今不若畜士衆之力先為固守彼欲戰不得攻又不能其埶必離散然後選精鋭據要害擊之可破也岱不從遂與戰果為所殺十二月曹操追黄巾至濟北悉降之得戎卒三十餘萬男女百餘萬口四年春正月袁術屯封丘黒山别部及匈奴於扶羅皆附之曹操擊破術軍三月袁紹在薄落津魏郡兵反與黑山賊于毒數萬人共復鄴城殺其太守六月袁紹出軍入朝歌鹿腸山北行擊諸賊左髭丈八等皆斬之又擊劉石青牛角黄龍左校郭大賢李大目于氐根等復斬數萬級皆屠其屯壁遂與黑山賊張燕及四營屠各鴈門烏栢戰於常山燕精兵數萬騎數千匹紹與吕布共擊燕連戰十餘日燕兵死傷雖多紹軍亦疲遂俱退建安元年春二月汝南潁川黄巾何儀等擁衆附袁術曹操擊破之三年袁紹攻公孫瓚瓚遣子續請救於黑山諸帥四年黒山帥張燕率兵救之事見袁紹討公孫瓚五年秋七月汝南黄巾劉辟等叛曹操應袁紹紹遣劉備將兵助辟郡縣多應之十年夏四月黑山賊帥張燕率衆十餘萬降封安國亭侯韓馬之叛漢靈帝中平元年冬十一月北地先零羌及枹罕河關羣盜反共立湟中義從胡北宮伯玉李文侯為將軍殺䕶羌校尉冷徵金城人邉章韓遂素著名西州羣盜誘而刼之使専任軍政殺金城太守陳懿攻燒州郡二年春三月北宫伯玉等㓂三輔詔左車騎将軍皇甫嵩鎮長安以討之秋八月以司空張温為車騎将軍執金吾袁滂為副以討北宫伯玉拜中郎將董卓為破虜將軍與盪冦將軍周慎並統於温九月張温將諸郡兵步騎十餘萬屯美陽邊章韓遂亦進兵美陽温與戰輒不利十一月董卓與右扶風鮑鴻等并兵攻章遂大破之章遂走榆中温遣周慎將三萬人追之參軍事孫堅説慎曰賊城中無榖當外轉糧食堅願得萬人斷其運道將軍以大兵繼後賊必困乏而不敢戰走入羌中并力討之則凉州可定也慎不從引軍圍榆中城而章遂分屯葵園峽反斷慎運道慎懼棄車重而退温又使董卓將兵三萬討先零羌羌胡圍卓於望垣北糧食乏絶乃於所度水中偽立􅋣以捕魚而濳從􅋣下過軍比賊追之決水已深不得度遂還屯扶風張温以詔書召卓卓良久乃詣温温責讓卓卓應對不順孫堅前耳語謂温曰卓不怖罪而鴟張大語宜以召不時至陳軍法斬之温曰卓素著威名於河隴之間今日殺之西行無依堅曰明公親率王師威震天下何頼於卓觀卓所言不假明公輕上無禮一罪也章遂跋扈經年當以時進討而卓云未可沮軍疑衆二罪也卓受任無功應召稽留而軒昂自髙三罪也古之名將仗鉞臨衆未有不斷斬以成功者也今明公埀意於卓不即加誅虧損威刑於是在矣温不忍發乃曰君且還卓將疑人堅遂出四年春三月韓遂殺邉章及北宫伯玉李文侯擁兵十餘萬進圍隴西太守李相如叛與遂連和涼州刺史耿鄙率六郡兵討遂鄙任治中程球球通姦利士民怨之漢陽太守傅燮謂鄙曰使君統政日淺民未知教賊聞大軍將至必萬人一心邊兵多勇其鋒難當而新合之衆上下未和萬一内燮雖悔無及不若息軍養徳明賞必罰賊得寛挺必謂我怯羣惡争勢其離可必然後率已教之民討成離之賊其功可坐而待也鄙不從夏四月鄙行至狄道州别駕反應賊先殺程球次害鄙賊遂進圍漢陽城中兵少糧盡爕猶固守時北地胡騎數千隨賊功郡皆夙懷燮恩共於城外叩頭求送燮歸鄉里爕子幹年十三言於燮曰國家昬亂遂令大人不容於朝今兵不足以自守宜聽羌胡之請還鄉里徐俟有道而輔之言未終爕慨然歎曰汝知吾必死邪聖逹節次守節殷討暴虐伯夷不食周粟而死吾遭世亂不能養浩然之志食祿又欲避其難乎吾行何之必死於此汝有才智勉之勉之主簿楊㑹吾之程嬰也狄道人王國使故酒泉太守黄衍説爕曰天下已非復漢有府君寧有意為吾屬帥乎爕按劍叱衍曰若剖符之臣反為賊説邪遂麾左右進兵臨陳戰殁耿鄙司馬扶風馬騰亦擁兵反與韓遂合共推王國為主冦掠三輔五年冬十一月王國圍陳倉詔復拜皇輔嵩為左將軍督前將軍董卓合兵四萬人以拒之董卓謂皇甫嵩曰陳倉危急請速救之嵩曰不然百戰百勝不如不戰而屈人兵陳倉雖小城守固備未易可拔王國雖彊攻陳倉不下其衆必疲疲而擊之全勝之道也將何救焉國攻陳倉八十餘日不拔六年春二月國衆疲敝解圍去皇甫嵩進兵擊之董卓曰不可兵法窮冦勿迫歸衆勿追嵩曰不然前吾不擊避其鋭也今而擊之待其衰也所擊疲師非歸衆也國衆且走莫有鬭志以整擊亂非窮冦也遂獨進擊之使卓為後拒連戰大破之斬首萬餘級卓大慙恨由是與嵩有隙韓遂等共廢王國而劫故信都令漢陽閻忠使督統諸部忠病死遂等稍争權利更相殺害由是寖衰獻帝初平三年韓遂馬騰率衆詣長安以遂為鎮西將軍騰為征西將軍馬騰攻李傕不克走還涼州事並見宦官亡漢建安十三年初前將軍馬騰與鎮西將軍韓遂結為異姓兄弟後以部曲相侵更為讐敵朝廷使司隸校尉鍾繇涼州刺史韋端和解之徵騰入屯槐里曹操將征荆州使張既説騰令釋部曲還朝騰許之已而更猶豫既恐其為變乃移諸縣促儲偫二千石郊迎騰不得已發東操表騰為衛尉以其子超為偏將軍統其衆悉徙其家屬詣鄴十六年春三月曹操遣司𨽻校尉鍾繇討張魯使征西䕶軍夏侯淵等將兵出河東與繇㑹倉曹屬高柔諌曰大兵西出韓遂馬超疑為襲已必相扇動宜先招集三輔三輔茍平漢中可傳檄而定也操不從關中諸將果疑之馬超韓遂侯選程銀楊秋李堪張横梁興成宜馬玩等十部皆反其衆十萬屯據潼關操遣安西將軍曹仁督諸將拒之敕令堅壁勿與戰命五官將丕留守鄴以奮武將軍程昱參丕軍事門下督廣陵徐宣為在䕶軍留統諸軍樂安國淵為居府長史統留事秋七月操自將擊超等議者多言關西貫習長矛非精選前鋒不可當也操曰戰在我非在賊也賊雖習長矛將使不得以刺諸君但觀之八月操至潼關與超等夾關而軍操急持之而濳遣徐晃朱靈以步騎四千人渡蒲阪津據河西為營閏月操自潼關北渡河兵衆先渡操獨與虎士百餘人留南岸斷後馬超將步騎萬餘人攻之矢下如雨操猶據胡床不動許褚扶操上船船工中流矢死褚左手舉馬鞌以蔽操右手刺船校尉丁斐放牛馬以餌賊賊亂取牛馬操乃得渡遂自蒲阪渡西河循河為甬道而南超等退拒渭口操乃多設疑兵潛以舟載兵入渭為浮橋夜分兵結營於渭南超等夜攻營伏兵擊破之超等屯渭南遣使求割河以西請和操不許九月操進軍悉渡渭超等數挑戰又不許固請割地求送任子賈詡以為可偽許之操復問計䇿詡曰離之而已操曰解韓遂請與操相見操與遂有舊於是交馬語移時不及軍事但説京都舊故拊手歡笑時秦胡觀者前後重沓操笑謂之曰爾欲觀曹公邪亦猶人也非有四目兩口但多智耳既罷超等問遂公何言遂曰無所言也超等疑之他日操又與遂書多所㸃竄如遂改定者超等愈疑遂操乃與克日㑹戰先以輕兵挑之戰良久乃縱虎騎夾擊大破之斬成宜李堪等遂超犇涼州十七年秋七月馬超等餘衆屯藍田夏侯淵擊平之十八年初魏公操追馬超至安定聞田銀蘇伯反引軍還參涼州軍事楊阜言於操曰超有信布之勇甚得羌胡心若大軍還不設備隴上諸郡非國家之有也操還超果率羌胡擊隴上諸郡縣郡縣皆應之惟冀城奉州郡以固守超盡兼隴右之衆張魯復遣大將楊昂助之凡萬餘人攻冀城自正月至八月救兵不至刺史韋康遣别駕閻温出告急於夏侯淵外圍數重温夜水中濳出明日超兵見其迹遣追獲之超載温詣城下使告城中云東方無救温向城大呼曰大軍不過三日至勉之城中皆泣稱萬嵗超雖怒猶以攻城久不下徐徐更誘温冀其改意温曰事君有死無二而卿乃欲令長者出不義之言乎超遂殺之已而外救不至韋康及太守欲降楊阜號哭諫曰阜等率父兄子弟以義相勵有死無二以為使君守此城今奈何棄垂成之功陷不義之名乎刺史太守不聽開城門迎超超入遂殺刺史太守自稱征西將軍領并州牧督涼州軍事魏公操使夏侯淵救冀未至而冀敗淵去冀二百餘里超来逆戰淵軍不利氐王千萬反應超屯興國淵引軍還㑹楊阜喪妻就超求假以𦵏之阜外兄天水姜叙為撫夷將軍擁兵屯歴城阜見叙及其母歔欷悲甚叙曰何為乃爾阜曰守城不能完君亡不能死亦何面目以視息於天下馬超背父叛君虐殺州將豈獨阜之憂責一州士大夫皆蒙其恥君擁兵專制而無討賊心此趙盾所以書弑君也超彊而無義多釁易圖耳叙母慨然曰咄伯奕韋使君遇難亦汝之負豈獨義山哉人誰不死死於忠義得其所也但當速發勿復顧我我自為汝當之不以餘年累汝也叙乃與同郡趙昂尹奉武都李俊等合謀討超又使人至冀結安定梁寛南安趙衢使為内應超取趙昂子月為質昂謂妻異曰吾謀如是事必萬全當奈月何異厲聲應曰雪君父之大恥䘮元不足為重况一子哉九月阜與叙進兵入鹵城昂奉據祁山以討超超聞之大怒趙衢因譎説超使自出擊之超出衢與梁寛閉冀城門盡殺超妻子超進退失據乃襲厯城得叙母叙母罵之曰汝背父之逆子殺君之桀賊天地豈久容汝而不早死敢以面目視人乎超殺之又殺趙昂之子月楊阜與超戰身被五創超兵敗遂南奔張魯魯以超為都講祭酒欲妻之以女或謂魯曰有人若此不愛其親焉能愛人魯乃止操封討超之功侯者十一人賜楊阜爵關内侯十九年春馬超從張魯求兵北取涼州魯遣超還圍祁山姜叙等告急於夏侯淵諸將議欲須魏公操節度淵曰公在鄴反覆四千里比報叙等必敗非救急也遂行使張郃督步騎五千為前軍超敗走韓遂在顯親淵欲襲取之遂走淵追至畧陽城去遂三十餘里諸將欲攻之或言當攻興國氐淵以為遂兵精興國城固攻不可卒拔不如擊長離諸羌長離諸羌多在遂軍必歸救其家若捨羌獨守則孤救長離則官兵得與野戰必可虜也淵乃留督將守輜重自將輕兵到長離攻燒羌屯遂果救長離諸將見遂兵衆欲結營作塹乃與戰淵曰我轉鬭千里今復作營塹則士衆罷敝不可復用賊雖衆易與耳乃鼓之大破遂軍進圍興國氐王千萬奔馬超餘衆悉降轉擊高平屠各皆破之夏四月劉備圍成都馬超知張魯不足與計事又魯將楊昂等數害其能超内懷於邑備使建寧督郵李恢往説之超遂從武都逃入氐中宻書請降於備備使人止超而濳以兵資之超到令引軍屯城北城中震怖劉璋出降備領益州牧以偏將軍馬超為平西將軍軍議校尉二十年春三月魏公操自將擊張魯將由武都入氐氐人塞道遣張郃朱靈等攻破之夏四月操自陳倉出散關至河池氐王竇茂衆萬人恃險不服五月攻屠之西平金城諸將麴演蔣石等共斬送韓遂首袁紹討公孫瓚漢靈帝中平四年初張温發幽州烏桓突騎三千以討涼州故中山相漁陽張純請將之温不聽而使涿令遼西公孫瓚將之軍到薊中烏桓以牢禀逋縣多叛還本國張純忿不得將乃與同郡故泰山太守張舉及烏桓大人丘力居等連盟劫畧薊中殺䕶烏桓校尉公綦稠右北平太守劉政遼東太守陽終等衆至十餘萬屯肥如舉稱天子純稱彌天將軍安定王移書州郡云舉當代漢告天子避位敕公卿奉迎五年春三月太常江夏劉焉建議以為四方兵冦由刺史威輕既不能禁且用非其人以致離叛宜改置牧伯選清名重臣以居其任朝廷從焉議以宗正劉虞為幽州牧虞東海恭王之五世孫也詔發南匈奴兵配劉虞討張純冬十一月張純與丘力居鈔畧青徐幽冀四州詔騎都尉公孫瓚討之瓚與戰於屬國石門純等大敗棄妻子踰塞走悉得所畧男女瓚深入無繼反為丘力居等所圍於遼西管子城二百餘日糧盡衆潰士卒死者什五六六年春二月幽州牧劉虞到部遣使至鮮卑中告以利害責使送張舉張純首厚加購賞丘力居等聞虞至喜各遣譯自歸舉純走出塞餘皆降散虞上罷諸屯兵但留降虜校尉公孫瓚將步騎萬人屯右北平三月張純客王政殺純送首詣虞公孫瓚志欲掃滅烏桓而虞欲以恩信招降由是與瓚有隙獻帝初平元年二月丁亥車駕西遷二年冬十月劉虞子和為侍中帝思東歸使和偽逃董卓濳出武關詣虞令將兵来迎和至南陽袁術利虞為援留和不遣許兵至俱西令和為書與虞虞得書遣數千騎詣和公孫瓚知術有異志止之虞不聽瓚恐術聞而怨之亦遣其從弟越將千騎詣術而陰教術執和奪其兵由是虞瓚有隙和逃術来北復為袁紹所留是時關東州郡務相兼并以自彊大袁紹袁術亦自相離貳術遣孫堅擊董卓未返紹以會稽周昂為豫州刺史襲奪堅陽城堅歎曰同舉義兵將救社稷逆賊垂破而各若此吾當誰與戮力乎引兵擊昂走之袁術遣公孫越助堅攻昂越為流矢所中死公孫瓚怒曰余弟死禍起於紹遂出軍屯磐河上疏數紹罪惡進兵攻紹冀州諸城多畔紹從瓚紹懼以所佩勃海太守印綬授瓚從弟範遣之郡而範遂背紹領勃海兵以助瓚瓚乃自署其將帥嚴綱為冀州刺史田楷為青州刺史單經為兖州刺史又悉改置郡縣守令三年春正月袁紹自出拒公孫瓚與瓚戰於界橋南二十里瓚兵三萬其鋒甚鋭紹令麴義領精兵八百先登彊弩千張夾承之瓚輕其兵少縱騎騰之義兵伏楯下不動未至十數步一時同發讙呼動地瓚軍大敗斬其所置冀州刺史嚴綱獲甲首千餘級追至界橋瓚斂兵還戰義復破之遂到瓚營拔其牙門餘衆皆走初兖州刺史劉岱與紹瓚連和紹令妻子居岱所瓚亦遣從事范方將騎助岱及瓚擊破紹軍語岱令遣紹妻子别敕范方若岱不遣紹家將騎還吾定紹將加兵於岱岱與官屬議連日不決聞東郡程昱有智謀召而問之昱曰若棄紹近援而求瓚逺助此假人於越以救溺子之説也夫公孫瓚非袁紹之敵也今雖壊紹軍然終為紹所禽岱從之范方將其騎歸未至而瓚敗十二月公孫瓚復遣兵擊袁紹至龍凑紹擊破之瓚遂還幽州不敢復出四年春正月袁紹與公孫瓚所置青州刺史田楷連戰二年士卒疲困糧食並盡互掠百姓野無青草紹以其子譚為青州刺史楷與戰不勝㑹趙岐來和解關東瓚乃乃與紹和親各引兵去冬十月劉虞與公孫瓚積不相能瓚數與袁紹相攻虞禁之不可而稍節其禀假瓚怒屢違節度又復侵犯百姓虞不能制乃遣驛使奉章陳其暴掠之罪瓚亦上虞禀糧不周二奏交馳互相非毁朝廷依違而已瓚乃築小城於薊城東南以居之虞數請㑹瓚輒稱病不應虞恐其終為亂乃率所部兵合十萬人以討之時瓚部曲放散在外倉卒掘東城欲走虞兵無部伍不習戰又愛民廬舍敕不聽焚燒戒軍士曰無傷餘人殺一伯珪而已攻圍不下瓚乃簡募鋭士數百人因風縱火直衝突之虞衆大潰虞與官屬北犇居庸瓚追攻之三日城陷執虞并妻子還薊猶使領州文書㑹詔遣使者段訓增虞封邑督六州事拜瓚前將軍封易侯瓚乃誣虞前與袁紹等謀稱尊號脅訓斬虞及妻子於薊市故常山相孫瑾掾張逸張瓉等相與就虞罵瓚極口然後同死瓚傳虞首於京師故吏尾敦於路劫虞首歸𦵏之虞以恩厚得衆心北州百姓流舊莫不痛惜興平二年公孫瓚既殺劉虞盡有幽州之地志氣益盛恃其才力不恤百姓記過忘善睚眦必報衣冠善士名在其右者必以灋害之有材秀者必抑困使在窮苦之地或問其故瓚曰衣冠皆自以職分當貴不謝人惠故所寵愛類多商販庸兒與為兄弟或結婚姻所在侵暴百姓怨之劉虞從事漁陽鮮于輔等合率州兵欲共報仇以燕國閻柔素有恩信推為烏桓司馬柔招誘胡漢數萬人與瓚所置漁陽太守鄒丹戰於潞北斬丹等四千餘級烏桓峭王亦率種人及鮮卑七千餘騎隨輔南迎虞子和與袁紹將麴義合兵十萬共攻瓉破瓉于鮑丘斬首二萬餘級於是代郡廣陽上谷右北平各殺瓚所置長吏復與鮮于輔劉和兵合瓚軍屢敗先是有童謡曰燕南垂趙北際中央不合大如礪唯有此中可避世瓉自謂易地當之遂徙鎮易為圍塹十重塹裏築京皆高五六丈為樓其上中塹為京特高十丈自居焉以鐵為門斥去左右男人七嵗以上不得入門専與姬妾居其文簿書記皆汲而上之令婦人習為大聲使聞數百步以傳宣教令踈逺賓客無所親信謀臣猛將稍稍乖散自此之後希復攻戰或問其故瓚曰我昔驅畔胡於塞表掃黄巾于孟津當此之時謂天下指麾可定至于今日兵革方始觀此非我所決不如休兵力耕以救凶年兵灋百樓不攻今吾諸營樓樐數十重積穀三百萬斛食盡此穀足以待天下之事矣建安三年冬十二月袁紹連年攻公孫瓚不能克以書諭之欲相與釋憾連和瓚不答而増修守備謂長史太原關靖曰當今四方虎争無有能坐吾城下相守經年者明矣袁本初其若我何紹於是大興兵以攻瓉先是瓉别將有為敵所圍者瓉不救曰救一人使後將恃救不肯力戰及紹来攻瓚南界别營自度守則不能自固又知必不見救或降或潰紹軍徑至其門瓉遣子續請救於黒山諸師而欲自將突騎出傍西山擁黒山之衆侵掠冀州横斷紹後關靖諌曰今將軍將士莫不懷瓦解之心所以猶能相守者顧戀其居處老小而恃將軍為主故耳堅守曠日或可使紹自退若舍之而出後無鎮重易京之危可立待也瓉乃止紹漸相攻逼瓉衆日䠞四年春二月黑山帥張燕與公孫續率兵十萬三道救之未至瓉宻使行人齎書告續使引五千鐵騎於北隰之中起火為應瓉欲自内出戰紹候得其書如期舉火瓚以為救至遂出戰紹設伏擊之瓚大敗復還自守紹為地道穿其樓下施木柱之度足逹半便燒之樓輒傾倒稍至京中瓚自計必無全乃悉縊其姊妹妻子然後引火自焚紹趣兵登臺斬之田楷戰死關靖歎曰前若不止將軍自行未必不濟吾聞君子陷人危必同其難豈可以獨生乎䇿馬赴紹軍而死續為屠各所殺通鑑紀事本末卷八下
