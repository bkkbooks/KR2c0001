body:
  text: 通鑑紀事本末卷二十五上宋袁樞撰周滅齊陳文帝天嘉三年齊主之為長廣王也清都和士開以善握槊彈琵琶有寵辟為開府行參軍及即位累遷給事黄門侍郎四年齊侍中開府儀同三司和士開有寵於齊主齊主外朝視事或在内宴賞湏㬰之間不得不與士開相見或累日不歸一日數入或放還之後俄傾即追未至之間連騎督趣姦謟百端寵愛日隆前後賞賜不可勝紀每侍左右言辭容止極諸鄙䙝以夜繼晝無復君臣之禮常謂帝曰自古帝王盡為灰土堯舜桀紂竟復何異陛下宜及少壯極意為樂縱横行之一日取快可敵千年國事盡付大臣何慮不辦無為自勤約也帝大悦於是委趙彦深掌官爵元文遥掌財用唐邕掌外騎兵信都馮子琮胡長粲掌東宫帝三四日一視朝書數字而已略無所言須㬰罷入長粲僧敬之子也帝使士開與胡后握槊河南康獻王孝瑜諫曰皇后天下之母豈可與臣下接手孝瑜又言趙郡王叡其父死扵非命不可親近由是叡及士開共譖之士開言孝瑜奢僭叡言山東唯聞河南王不聞有陛下帝由是忌之孝瑜竊與爾朱御女言帝聞之大怒夏六月庚申頓飲孝瑜酒三十七盃孝瑜體肥大腰帶十圍帝使左右婁子彦載以出酖之扵車至西華門煩躁投水而絶贈太尉録尚書事諸侯在宫中者莫敢舉聲唯河間王孝琬大哭而出六年齊著作郎祖珽有文學多技藝而疎率無行嘗為髙祖中外府功曹因宴失金叵羅於珽髻上得之又坐詐盜官粟三千石鞭二百配甲坊顯祖時珽為秘書丞盜華林遍略及有它􅂍當絞除名為民顯祖雖憎其數犯法而愛其才技令直中書省世祖為長廣王珽為胡桃油獻之因言殿下有非常骨法孝徵夢殿下乗龍上天王曰若然當使兄大富貴及即位擢拜中書侍郎遷散騎常侍與和士開共為姦謟珽私說士開曰君之寵幸振古無比宫車一日晚駕欲何以克終士開因從問計珽曰宜說主上云文襄文宣孝昭之子俱不得立今宜令皇太子早踐大位以定君臣之分若事成中宫少主必皆徳君此萬全計也請君微說主上令粗解珽當自外上表論之士開許諾㑹有彗星見太史奏云彗除舊布新之象當有易主珽於是上書言陛下雖為天子未為極貴宜傳位東宫且以上應天道并上魏顯祖禪子故事齊主從之丙子使太宰叚韶持節奉皇帝璽綬傳位於太子緯太子即皇帝位於晉陽宫大赦改元天統又詔以太子妃斛律氏為皇后於是羣公上世祖尊號為太上皇帝軍國大事咸以聞使黄門侍郎馮子琮尚書左丞胡長粲輔導少主出入禁中専典敷奏子琮胡后之妺夫也祖珽拜祕書監加儀同三司大被親寵見重二宫齊世祖之為長廣王也數為顯祖所捶心常銜之顯祖毎見祖珽常呼為賊故珽亦怨之且欲求媚於世祖乃說世祖曰文宣狂暴何得稱文既非創業何得稱祖若文宣為祖陛下萬歲後當何所稱帝從之己丑改諡太祖獻武皇帝為神武皇帝廟號髙祖獻明皇后為武明皇后令有司更議文宣諡號十二月庚午齊改諡文宣皇帝為景烈皇帝廟號威宗天康元年冬十二月齊河間王孝琬怨執政為草人而射之和士開祖珽譖之於上皇曰草人以擬聖躬也又前突厥至并州孝琬脱兠鍪抵地云我豈老嫗須著此物此言屬大家也又魏世謡言河南種榖河北生白楊樹端金雞鳴河南北者河間也孝琬將建金雞大赦耳上皇頗惑之㑹孝琬得佛牙置第内夜有光上皇聞之使捜之得填庫矟幡數百上皇以為反具収訊諸姫有陳氏者無寵誣孝琬云孝琬常畫陛下像而哭之其實世宗像也上皇怒使武衛赫連輔𤣥倒鞭撾之孝琬呼叔上皇曰何敢呼我為叔孝琬曰臣神武皇帝嫡孫文襄皇帝嫡子魏孝靜皇帝之甥何為不得呼叔上皇愈怒折其兩脛而死安徳王延宗哭之淚赤又為草人鞭而訊之曰何故殺我兄奴告之上皇覆延宗於地馬鞭鞭之二百㡬死臨海王光大元年齊秘書監祖珽與黄門侍郎劉逖友善珽欲求宰相乃疏趙彦深元文遥和士開罪狀令逖奏之逖不敢通彦深等聞之先詣上皇自陳上皇大怒執珽詰之珽固陳士開文遥彦深等朋黨弄權賣官鬻獄事上皇曰爾乃誹謗我珽曰臣不敢誹謗陛下取人女上皇曰我以其飢饉収飬之耳珽曰何不開倉振給乃買入後宫乎上皇益怒以刀鐶築其口鞭杖亂下將撲殺之珽呼曰陛下勿殺臣臣為陛下合金丹遂得少寛珽曰陛下有一范増不能用上皇又怒曰爾自比范増以我為項羽邪珽曰項羽布衣帥烏合之衆五年而成覇業陛下藉父兄之資纔得至此臣以為項羽未易可輕上皇愈怒令以土塞其口珽且吐且言乃鞭二百配甲坊尋徙光州敕令牢掌别駕張奉福曰牢者地牢也乃置地牢中桎梏不離身夜以蕪菁子為燭眼為所熏由是失明二年齊尚書左僕射徐之才善醫上皇有疾之才療之既愈中書監和士開欲得次遷乃出之才為兖州刺史夏五月癸夘以尚書右僕射胡長仁為左僕射和士開為右僕射長仁太上皇后之兄也冬十月辛巳齊以和士開為左僕射中書監唐邕為右僕射十一月齊上皇疾作驛追徐之才未至辛未疾亟以後事屬和士開握其手曰勿負我也遂殂於士開之手明日之才至復遣還州士開祕喪三日不發黄門侍郎馮子琮問其故士開曰神武文襄之喪皆祕不發今至尊年少恐王公有貳心者意欲盡追集於凉風堂然後與公議之士開素忌太尉録尚書事趙郡王叡及領軍婁定逺子琮恐其矯遺詔出叡於外奪定逺禁兵乃說之曰大行先已傳位於今上羣臣富貴者皆至尊父子之恩但令在内貴臣一無改易王公必無異志世異事殊豈得與覇朝相比且公不出宫門已數日升遐之事行路皆傳久而不舉恐有佗變士開乃發喪丙子大赦戊寅尊太上皇后為皇太后侍中尚書左僕射元文遥以馮子琮胡太后之妺夫恐其賛太后干預朝政與趙郡王叡和士開謀出子琮為鄭州刺史宣帝太建元年春二月齊以司空徐顯秀為太尉并省尚書令婁定逺為司空初侍中尚書右僕射和士開為世祖所親狎出入卧内無復期度遂得幸於胡后及世祖殂齊主以士開受顧托深委任之威權益盛與婁定逺及録尚書事趙彦深侍中尚書左僕射元文遥開府儀同三司唐邕領軍綦連猛高阿那肱度支尚書胡長粲俱用事時號八貴太尉趙郡王叡大司馬馮翊王潤安徳王延宗與婁定逺元文遥皆言於齊主請出士開為外任㑹胡太后觴朝貴於前殿叡面陳士開罪失云士開先帝弄臣城狐社鼠受納貨賂穢亂宫掖臣等義無杜口冒死陳之太后曰先帝在時王等何不言今日欲欺孤寡邪且飲酒勿多言叡等詞色愈厲儀同三司安吐根曰臣本商胡得在諸貴行末既受厚恩豈敢惜死不出士開朝野不定太后曰異日論之王等且散叡等或投冠扵地或拂衣而起明日叡等復詣雲龍門令文遥入奏之三返太后不聼左丞相叚韶使胡長粲傳太后言曰梓宫在殯事太怱怱欲王等更思之叡等遂皆拜謝長粲復命太后曰成妺母子家者兄之力也厚賜叡等罷之太后及齊主召問士開對曰先帝於羣臣之中待臣最厚陛下諒闇始爾大臣皆有覬覦今若出臣正是翦陛下羽翼宜謂叡等云文遥與臣並為先帝任用豈可一去一留並可用為州且出納如舊待過山陵然後遣之叡等謂臣真出心必喜之帝及太后然之告叡等如其言乃以士開為兖州刺史文遥為西兖州刺史葬畢叡等促士開就路太后欲留士開過百日叡不許數日之内太后數以為言有中人知太后宻㫖者謂叡曰太后意既如此殿下何宜苦違叡曰吾受委不輕今嗣主㓜冲豈可使邪臣在側不守之以死何靣戴天遂更見太后苦言之太后令酌酒賜叡叡正色曰今論國家大事非為巵酒言訖遽出士開載美女珠簾詣婁定逺謝曰諸貴欲殺士開蒙王力特全其命用為方伯今當奉别謹上二女子一珠簾定逺喜謂士開曰欲還入不士開曰在内久不自安今得出實遂本志不願更入但乞王保䕶長為大州刺史足矣定逺信之送至門士開曰今當逺出願得一辭覲二宫定逺許之士開由是得見太后及帝進説曰先帝一旦登遐臣愧不能自死觀朝貴意勢欲以陛下為乾明臣出之後必有大變臣何面目見先帝於地下因慟哭帝太后皆泣問計安出士開曰臣已得入復何所慮正須數行詔書耳於是詔出定逺為青州刺史責趙郡王叡以不臣之罪旦日叡將復入諌妻子咸止之叡曰社稷事重吾寧死事先皇不忍見朝廷顛沛至殿門又有人謂曰殿下勿入恐有變叡曰吾上不負天死亦無恨入見太后太后復以為言叡執之彌固出至永巷遇兵執送華林園雀離佛院令劉桃枝拉殺之叡乆典朝政清正自守朝野寃惜之復以士開為侍中尚書左僕射定逺歸士開所遺加以餘珍賂之齊主年少多嬖寵武衛將軍髙阿那肱素以謟佞為世祖及和士開所厚世祖多令在東宫侍齊主由是有寵累遷并省尚書令封淮隂王世祖簡都督二十人使侍衛東宫昌黎韓長鸞預焉齊主獨親愛長鸞長鸞名鳳以字行累遷侍中領軍總知内省機密宫婢陸令萱者其夫漢陽駱超坐謀叛誅令萱配掖庭子提婆亦沒為奴齊主之在襁褓令萱保飬之令萱巧黠善取媚有寵於胡太后宫掖之中獨擅威福封為郡君和士開髙阿那肱皆為之養子齊主以令萱為女侍中令萱引提婆入侍齊主朝夕戱狎累遷至開府儀同三司武衛大將軍宫人穆舍利者斛律后之從婢也有寵於齊主令萱欲附之乃為之養母薦為𢎞徳夫人因令提婆冒姓穆氏然和士開用事最久諸幸臣皆依附之以固其寵齊王思祖珽就囚流中除海州刺史珽乃遺陸媪弟儀同三司悉逹書曰趙彦深心腹隂沈欲行伊霍事儀同姊弟豈得平安何不早用智士邪和士開亦以珽有膽略欲引為謀主乃棄舊怨虚心待之與陸媪言扵帝曰襄宣昭三帝之子皆不得立今至尊獨在帝位者祖孝徵之力也人有功不可不報孝徵心行雖薄竒略出人緩急可使且其人已盲必無反心請呼取問以籌䇿齊主從之召入為祕書監加開府儀同三司士開譖尚書令隴東王胡長仁驕恣出為齊州刺史長仁怨憤謀遣刺客殺士開事覺士開與珽謀之珽引漢文帝誅薄昭故事遂遣使就州賜死二年秋七月甲寅齊以中領軍和士開為尚書令賜爵淮陽王士開威權日盛朝士不知廉耻者或為之假子與富商大賈同在伯仲之列三年春二月壬寅齊以蘭陵王長恭為太尉趙彦深為司空和士開錄尚書事徐之才為尚書令唐邕為左僕射吏部尚書馮子琮為右僕射仍攝選子琮素謟附士開至是自以太后親屬且典選頗擅引用人不復啟禀由是與士開有隙夏四月壬午齊以琅邪王儼為太保琅邪王儼以和士開穆提婆等專横奢縦意甚不平二人相謂曰琅邪王眼光奕奕數歩射人向者暫對不覺汗出吾輩見天子奏事尚不然由是忌之乃出儼居北宫五日一朝不得無時見太后儼之除太保也餘官悉解猶帶中丞及京畿士開等以北城有武庫欲移儼於外然後奪其兵權治書侍御史王子宜與儼所親開府儀同三司髙舍洛中常侍劉辟彊說儼曰殿下被䟽正由士開間構何可出北宫入民間也儼謂侍中馮子琮曰士開罪重兒欲殺之何如子琮心欲廢帝而立儼因勸成之儼令子宜表彈士開罪請禁推子琮雜佗文書奏之齊主不審省而可之儼誑領軍庫狄伏連曰奉敕令領軍収士開伏連以告子琮且請覆奏子琮曰琅邪受敕何必更奏伏連信之發京畿軍士伏於神虎門外并戒門者不聽士開入秋七月庚午旦士開依常早參伏連前執士開手曰今有一大好事王子宜授以一函云有敕令王向臺因遣軍士護送儼遣都督馮永洛就臺斬之儼本意唯殺士開其黨因逼儼曰事既然不可中止儼遂帥京畿軍士三千餘人屯千秋門帝使劉桃枝將禁兵八十人召儼桃枝遥拜儼命反縳將斬之禁兵散走帝又使馮子琮召儼儼辭曰士開昔來寔合萬死謀廢至尊剃家家髮為尼臣為是矯詔誅之尊兄若欲殺臣不敢逃罪若赦臣願遣姊姊來迎臣即入見姊姊謂陸令萱也儼欲誘出殺之令萱執刀在帝後聞之戰栗帝又使韓長鸞召儼儼將入劉辟彊牽衣諌曰若不斬穆提婆母子殿下無由得入廣寧王孝珩安徳王延宗自西來曰何不入辟彊曰兵少延宗顧衆而言曰孝昭帝殺楊遵彦止八十人今有數千何謂少帝泣啟太后曰有緣復見家家無縁永别乃急召斛律光儼亦召之光聞儼殺士開撫掌大笑曰龍子所為固自不似凡人入見帝扵永巷帝帥宿衛者歩騎四百授甲將出戰光曰小兒輩弄兵與交手即亂鄙諺云奴見大家心死至尊宜自至千秋門琅邪必不敢動帝從之光歩道使人走出曰大家來儼徒駭散帝駐馬橋上遥呼之儼猶立不進光就謂曰天子弟殺一夫何所苦執其手强引以前請於帝曰琅邪王年少腸肥腦滿輕為舉措稍長自不復然願寛其罪帝拔儼所帶刀鐶亂築辮頭良久乃釋之收庫狄伏連髙舍洛王子宜劉辟彊都督翟顯貴於後園支解暴之都街帝欲盡殺儼府文武職吏光曰此皆勳貴子弟誅之恐人心不安趙彦深亦曰春秋責帥於是罪之各有差太后責問儼儼曰馮子琮教兒太后怒遣使就内省以弓絃絞殺子琮使内參以庫車載尸歸其家自是太后常置儼於宫中毎食必自嘗之九月齊祖珽說陸令萱出趙彦深為兖州刺史齊主以珽為侍中陸令萱說帝曰人稱琅邪王聰明雄勇當今無敵觀其相表殆非人臣自專殺以來常懐恐懼宜早為之計幸臣何洪珍等亦請殺之帝未決以食轝密迎珽問之珽稱周公誅管叔季友酖慶父帝乃攜儼之晉陽使右衛大將軍趙元侃誘儼執之元侃曰臣昔事先帝見先帝愛王今寧就死不忍行此帝出元侃為豫州刺史庚午帝啟太后曰明旦欲與仁威早出獵夜四鼓帝召儼儼疑之陸令萱曰兄呼兒何為不去儼出至永巷劉桃枝反接其手儼呼曰乞見家家尊兄桃枝以袖塞其口反袍䝉頭負出至大明宫鼻血滿面拉殺之時年十四裹之以席埋於室内帝使啟太后太后臨哭十餘聲即擁入殿遺腹四男皆幽死冬十月罷京畿府入領軍齊胡太后出入不節與沙門統曇獻通諸僧至有戯呼曇獻為太上皇者齊主聞太后不謹而未之信後朝太后見二尼恱而召之乃男子也於是曇獻事亦發皆伏誅己亥帝自晉陽奉太后還鄴至紫陌遇大風舍人魏僧伽習風角奏言即時當有暴逆事帝詐云鄴中有變彎弓纒弰馳入南城遣宦者鄧長顒幽太后於北宫仍敕内外諸親皆不得與胡太后相見太后或為帝設食帝亦不敢嘗四年春二月庚寅齊以侍中祖珽為左僕射初胡太后既幽於北宫珽欲以陸令萱為太后為令萱言魏保太后故事且謂人曰陸雖婦人然實雄傑自女媧以來未之有也令萱亦謂珽為國師國寶由是得僕射齊尚書左僕射祖珽勢傾朝野左丞相咸陽王斛律光惡之遥見輙罵曰多事乞索小人欲行何計又嘗謂諸將曰邊境消息兵馬處分趙令恒與吾輩參論盲人掌機密以來全不與吾輩語正恐誤國家事耳光嘗在朝堂垂簾坐珽不知乗馬過其前光怒曰小人乃敢爾後珽在内省言聲髙慢光適過聞之又怒珽覺之私賂光從奴問之奴曰自公用事相王毎夜抱膝歎曰盲人入國必破矣穆提婆求娶光庶女不許齊主賜提婆晉陽田光言於朝曰此田神武帝以來常種禾飼馬數千匹以擬㓂敵今賜提婆無乃闕軍務也由是祖穆皆怨之斛律后無寵珽因而間之光弟羡為都督幽州刺史行臺尚書令亦善治兵士馬精彊鄣候嚴整突厥畏之謂之南可汗光長子武都為開府儀同三司梁兖二州刺史光雖貴極人臣性節儉不好聲色罕接賓客杜絶饋餉不貪權勢毎朝廷㑹議常獨後言言輒合理或有表䟽令人執筆口占之務從省實行兵倣其父金之法營舍未定終不入幕或竟日不坐身不脱介胄常為士卒先士卒有罪惟大杖撾背未嘗妄殺衆皆爭為之死自結髮從軍未嘗敗北深為鄰敵所憚周勲州刺史韋孝寛密為謡言曰百升飛上天明月照長安又曰髙山不推自崩槲木不扶自舉令諜人傳之扵鄴鄴中小兒歌之於路珽因續之曰盲老公背受大斧饒舌老母不得語使其妻兄鄭道蓋奏之帝以問珽珽與陸令萱皆曰實聞有之珽因解之曰百升者斛也盲老公謂臣也與國同憂饒舌老母似謂女侍中陸氏也且斛律累世大將明月聲震闗西豊樂威行突厥女為皇后男尚公主謡言甚可畏也帝以問韓長鸞長鸞以為不可事遂􅃦珽又見帝請間唯何洪珍在側帝曰前得公啟即欲施行長鸞以為無此理珽未對洪珍進曰若本無意則可既有此意而不決行萬一泄露如何帝曰洪珍言是也然猶未決㑹丞相府佐封士讓密啟云光前西討還敕令散兵光引兵逼帝城將行不軌事不果而止家藏弩甲僮奴千數毎遣使往豐樂武都所隂謀往來若不早圖恐事不可測帝遂信之謂何洪珍曰人心亦大靈我前疑其欲反果然帝性怯恐即有變令洪珍馳召祖珽告之欲召光恐其不從命珽請遣使賜以駿馬語云明日將逰東山王可乗此同行光必入謝因而執之帝如其言六月戊辰光入至涼風堂劉桃枝自後撲之不仆顧曰桃枝常為如此事我不負國家桃枝與三力士以弓絃罥其頸拉而殺之血流於地剗之迹終不滅於是下詔稱其謀反并殺其子開府儀同三司世雄儀同三司恒伽祖珽使二千石郎刑祖信簿録光家珽於都省問所得物祖信曰得弓十五宴射箭百刀七賜矟二珽厲聲曰更得何物曰得棗杖二十束擬奴僕與人鬭者不問曲直即杖之一百珽大慙乃下聲曰朝廷已加重刑郎中何宜為雪及出人尤其抗直祖信慨然曰賢宰相尚死我何惜餘生齊主遣使就州斬斛律武都又遣中領軍賀拔伏恩乗驛捕斛律羡仍以洛州行臺僕射中山獨孤永業代羡與大將軍鮮于桃枝發定州騎卒續進伏恩等至幽州門者曰使人衷甲馬有汗宜閉城門羡曰敕使豈可疑拒出見之伏恩執而殺之初羡常以盛滿為懼表解所職不許臨刑嘆曰富貴如此女為皇后公主滿家常使三百兵何得不敗及其五子伏護世逹世遷世辦世酋皆死周主聞光死為之大赦祖珽與侍中髙元海共執齊政元海妻陸令萱之甥也元海數以令萱密語告珽珽求為領軍齊主許之元海密言扵帝曰孝徵漢人兩目又盲豈可為領軍因言珽與廣寧王孝珩交結由是中止珽求見自辨且言臣與元海素嫌必元海譖臣帝弱顔不能諱以實告之珽因言元海與司農卿尹子華等結為朋黨又以元海所泄密語告令萱令萱怒出元海為鄭州刺史子華等皆被黜珽自是専主機衡總知騎兵外兵事内外親戚皆得顯位帝常令中要人扶侍出入直至永巷毎同御榻論決政事委任之重羣臣莫比秋八月庚午齊廢皇后斛律氏為庶人初齊胡太后自愧失徳欲求說於齊主乃飾其兄長仁之女置宫中令帝見之帝果悦納為昭儀及斛律后廢陸令萱欲立穆夫人太后欲立胡昭儀力不能遂乃卑辭厚禮以求令萱結為姊妹令萱亦以胡昭儀寵幸方隆不得已與祖珽白帝立之戊子立皇后胡氏冬十月齊陸令萱欲立穆昭儀為皇后毎私謂齊主曰豈有男為皇太子而身為婢妾者乎胡后有寵於帝不可離間令萱乃使人行厭蠱之術旬朔之間胡后精神恍惚言笑無恒帝漸畏而惡之令萱一旦忽以皇后服御衣被穆昭儀又别造寶帳爰及枕席器玩莫非珍竒坐昭儀扵帳中謂帝曰有一聖女出將大家㸔之及見昭儀令萱乃曰如此人不作皇后遣何物人作帝納其言甲午立穆氏為右皇后以胡氏為左皇后十二月齊胡后之立非陸令萱意令萱一旦於太后前作色而言曰何物親姪作如此語太后問其故令萱曰不可道固問之乃曰語大家云太后行多非法不可以訓太后大怒呼后出立剃其髮送還家辛丑廢胡后為庶人然齊主猶思之毎致物以通意自是令萱與其子侍中穆提婆勢傾内外賣官鬻獄聚歛無厭毎一賜與動傾府藏令萱則自太后以下皆受其指麾提婆則唐邕之徒皆重迹屏氣殺生與奪唯意所欲五年春正月戊寅齊以并省尚書令髙阿那肱録尚書事總知外兵及内省機密與侍中城陽王穆提婆領軍大將軍昌黎王韓長鸞共處衡軸號曰三貴蠧國害民日月滋甚長鸞弟萬歲子寶行寶信並開府儀同三司萬歲仍兼侍中寶行寶信皆尚公主毎羣臣旦參帝常先引長鸞顧訪出後方引奏事官若不視事内省有急事皆附長鸞奏聞軍國要密無不經手尤疾士人朝夕宴私唯事譖訴常帶刀走馬未嘗安行瞋目張拳有噉人之勢朝士咨事莫敢仰視動致呵叱毎罵云漢狗大不可耐唯須殺之齊自和士開用事以來政體隳紊及祖珽執政頗收舉才望内外稱美珽復欲増損政務沙汰人物官號服章並依故事又欲黜諸閹豎及羣小輩為致治之方陸令萱穆提婆議頗同異珽乃諷御史中丞麗伯律令劾主書王子沖納賂知其事連提婆欲使贓罪相及望因此并坐及令萱猶恐齊主溺扵近習欲引后黨為援乃請以胡后兄君瑜為侍中中領軍又徵君瑜兄梁州刺史君璧欲以為御史中丞令萱聞而懐怒百方排毁出君瑜為金紫光禄大夫解中領軍君璧還鎮梁州胡后之廢頗亦由此釋王子沖不問珽日以益踈諸宦者更共譖之帝以問陸令萱令萱憫嘿不對三問乃下牀拜曰老婢應死老婢始聞和士開言孝徵多才慱學意謂善人故舉之比來觀之大是奸臣人寔難知老婢應死帝令韓長鸞撿案長鸞素惡珽得其詐出敕受賜等十餘事帝以嘗與之重誓故不殺解珽侍中僕射出為北徐州刺史珽求見帝長鸞不許遣人推出栢閣珽坐不肯行長鸞令牽曵而出癸巳齊以領軍穆提婆為尚書左僕射侍中中書監叚孝言為右僕射孝言韶之弟也初祖珽執政引孝言為助除吏部尚書孝言凡所進擢非賄則舊求仕者或於廣㑹膝行跪伏公自陳請孝言氣色揚揚以為己任隨事酬許將作丞崔成忽扵衆中抗言曰尚書天下尚書豈獨叚家尚書也孝言無辭以應惟厲色遣下而已既而與韓長鸞等共構祖珽逐而代之冬十月齊國子祭酒張雕以經授齊主為侍讀帝甚重之雕與寵胡何洪珍相結穆提婆韓長鸞等惡之洪珍薦雕為侍中加開府儀同三司奏度支事大為帝所委信常呼博士雕自以出扵㣲賤致位大臣欲立效以報恩論議抑揚無所囬避省宫掖不急之費禁約左右驕縱之臣數譏切寵要獻替帷幄帝亦深倚仗之雕遂以澄清為己任意氣甚髙貴倖皆側目隂謀䧟之尚書左丞封孝琰隆之之弟子也與侍中崔季舒皆為祖珽所厚孝琰嘗謂珽曰公是衣冠宰相異於餘人近習聞之大以為恨㑹齊主將如晉陽季舒與張雕議以為壽陽被圍大軍出拒之信使往還須禀節度且道路小人或相驚恐以為大駕向并州畏避南冦若不啟諌恐人情駭動遂與從駕文官連名進諌時貴臣趙彦深唐邕叚孝言等意有異同季舒與爭未決長鸞遽言於帝曰諸漢官連名總署聲云諌幸并州其實未必不反宜加誅戮辛丑齊主悉召已署名者集含章殿斬季舒雕孝琰及散騎常侍劉逖黄門侍郎裴澤郭遵於殿庭家屬皆徙北邊婦女配奚官㓜男下蠶室沒入貲産癸夘遂如晉陽六年春正月齊主還鄴秋八月齊主如晉陽七年春正月齊主還鄴二月齊主言語澁呐不喜見朝士自非寵私昵狎未嘗交語性懦不堪人視雖三公令録奏事莫得仰視皆略陳大指驚走而出承世祖奢㤗之餘以為帝王當然後宫皆寶衣玉食一裙之費至直萬匹競為新巧朝衣夕弊盛修宫苑窮極壯麗所好不常數毁又復百工土木無時休息夜則然火照作寒則以湯為泥鑿晉陽西山為大像一夜然油萬盆光照宫中毎有災異冦盜不自貶損惟多設齋以為修徳好自彈琵琶為無愁之曲近侍和之者以百數民間謂之無愁天子於華林園立貧兒村帝自衣藍縷之服行乞其間以為樂又寫築西鄙諸城使人衣黒衣攻之帝自帥内參拒鬭寵任陸令萱穆提婆髙阿那肱韓長鸞等宰制朝政宦官鄧長顒陳徳信胡兒何洪珍等并參預機權各引親黨超居顯位官由財進獄以賄成競為姦謟蠧政害民舊蒼頭劉桃枝等皆開府封王其餘宦官胡兒歌舞人見鬼人官奴婢等濫得富貴者殆將萬數庶姓封王者以百數開府千餘人儀同無數領軍一時至二十人侍中中常侍數十人乃至狗馬及鷹亦有儀同郡君之號有鬭雞號開府皆食其幹禄諸嬖幸朝夕娯侍左右一戱之賞動踰巨萬既而府藏空竭乃賜二三郡或六七縣使之賣官取直由是為守令者率皆富商大賈競為貪縱賦繁役重民不聊生周髙祖謀伐齊命邊鎮益儲偫加戍卒齊人聞之亦増修守禦柱國于翼諫曰彊場相侵互有勝負徒損兵儲無益大計不如解嚴繼好使彼懈而無備然後乗間出其不意一舉可取也周主從之韋孝寛上䟽陳三䇿其一曰臣在邊積年頗見間隙不因際㑹難以成功是以往歳出軍徒有勞費功績不立由失機㑹何者長淮之南舊為沃土陳氏以破亡餘燼猶能一舉平之齊人厯年赴救喪敗而返内離外叛計盡力窮讎敵有釁不可失也今大軍若出軹關方軌而進兼與陳氏共為掎角并令廣州義旅出自三鵶又募山南驍銳㳂河而下復遣北山稽胡絶其并晉之路凡此諸軍仍令各募關河之外勁勇之士厚其爵賞使為前驅岳動川移雷駭電激百道俱進並趨虜庭必當望旗奔潰所向摧殄一戎大定實在此機其二曰若國家更為後圖未即大舉宜與陳人分其兵勢三鵶以北萬春以南廣事屯田預為積貯募其驍悍直為部伍彼既東南有敵戎馬相持我出竒兵破其彊場彼若興師赴援我則堅壁清野待其去逺還復出師常以邊外之軍引其腹心之衆我無宿舂之費彼有奔命之勞一二年中必自離叛且齊氏昏暴政出多門鬻獄賣官惟利是視荒滛酒色忌害忠良闔境嗷然不勝其弊以此而觀覆亡可待然後乗間電掃事等摧枯其三曰昔勾踐亡吳尚期十載武王取紂猶煩再舉今若更存遵養且復相時臣謂宜還崇鄰好申其盟約安民和衆通商惠工蓄銳養威觀釁而動斯乃長䇿逺馭坐自兼并也書奏周主引開府儀同三司伊婁謙入内殿從容謂曰朕欲用兵何者為先對曰齊氏沈溺倡優耽昏麴蘖其折衝之將斛律明月已斃於讒口上下離心道路以目此易取也帝大笑三月丙辰使謙與小司冦元衞聘於齊以觀釁先是周主獨與齊王憲及内史王誼謀伐齊又遣納言盧韞乗驛三日詣安州總管于翼問䇿餘人皆莫之知秋七月丙子始召大將軍以上於大徳殿告之丁丑下詔伐齊以柱國陳王純榮陽公司馬消難鄭公逹奚震為前三軍總管趙王盛周昌公侯莫陳瓊趙王招為後三軍總管齊王憲帥衆二萬趨黎陽隨公楊堅廣寧公薛迴將舟師三萬自渭入河梁公侯莫陳芮帥衆二萬守太行道申公李穆帥衆三萬守河陽道常山公于翼帥衆二萬出陳汝誼盟之兄孫震武之子也周主將出河陽内史上士宇文㢸曰齊氏建國於今累世雖曰無道藩鎮之位尚有其人今之出師要須擇地河陽衝要精兵所聚盡力攻圍恐難得志如臣所見出於汾曲戌小山平攻之易拔用武之地莫過於此民部中大夫天水趙煚曰河南洛陽四面受敵縱得之不可以守請從河北直指太原傾其巢穴可一舉而定遂伯下大夫鮑宏曰我彊齊弱我治齊亂何憂不克但先帝往日屢出洛陽彼既有備毎用不捷如臣計者進兵汾潞直掩晉陽出其不虞似為上䇿周主皆不從宏泉之弟也壬午周主帥衆六萬直指河隂楊素請帥其父麾下先驅周主許之八月周師入齊境禁伐樹踐稼犯者皆斬丁未周主攻河隂大城拔之齊王憲㧞武濟進圍洛口拔東西二城縱火焚浮橋橋絶齊永橋大都督太安傅伏自永橋夜入中潬城周人既克南城圍中潬二旬不下洛州刺史獨孤永業守金墉周主自攻之不克永業通夜辦馬槽二千周人聞之以為大軍且至而憚之九月齊右丞相髙阿那肱自晉陽將兵拒周師至河陽㑹周主有疾辛酉夜引兵還水軍焚其舟艦傅伏謂行臺乞伏貴和曰周師疲弊願得精騎二千追擊之可破也貴和不許齊王憲于翼李穆所向克捷降拔三十餘城皆棄而不守惟以王藥城要害令儀同三司韓正守之正尋以城降齊庚午周主還長安八年秋九月周主謂羣臣曰朕去歲屬有疾疹遂不得克平逋冦前入齊境備見其情彼之行師殆同兒戲况其朝廷昏亂政由羣小百姓嗷然朝不謀夕天與不取恐貽後悔前出河外直為拊背未扼其喉晉州本髙歡所起之地鎮攝要重今往攻之彼必來援吾嚴軍以待擊之必克然後乗破竹之勢鼓行而東足以窮其巢穴混同文軌諸將多不願行帝曰機不可失有阻吾軍者當以軍法裁之冬十月己酉周主自將伐齊以越王盛杞公亮隨公楊堅為右三軍譙王儉大將軍竇㤗廣化公丘崇為左三軍齊王憲陳王純為前軍亮導之子也丙辰齊主獵扵祁連池癸亥還晉陽先是晉州行臺左丞張廷雋公直勤敏儲偫有備百姓安業彊場無虞諸嬖倖惡而代之由是公私煩擾周主至晉州軍于汾曲遣齊王憲將精騎二萬守雀鼠谷陳王純歩騎二萬守千里徑鄭公逹奚震歩騎一萬守統軍川大將軍韓明歩騎五千守齊子嶺焉氏公尹升歩騎五千守鼓鍾鎮涼城公辛韶歩騎五千守蒲津闗趙王招歩騎一萬自華谷攻齊汾州諸城柱國宇文盛歩騎一萬守汾水闗遣内史王誼監諸軍攻平陽城齊行臺僕射海昌王尉相貴嬰城拒守相貴相願之兄也甲子齊集兵晉祠庚午齊主自晉陽帥諸軍趣晉州周主日自汾曲至城下督戰城中窘急庚午行臺左丞侯子欽出降扵周壬申晉州刺史崔景嵩守北城夜遣使請降於周王軌帥衆應之未明周將北海叚文振杖槊與數十人先登與景嵩同至尉相貴所抜佩刀刧之城上鼓譟齊兵大潰遂克晉州虜相貴及甲士八千人齊主方與馮淑妃獵於天池晉州告急者自旦至午驛馬三至右丞相髙阿那肱曰大家正為樂邊鄙小小交兵乃是常事何急奏聞至暮使更至云平陽已䧟乃奏之齊主將還淑妃請更殺一圍齊主從之周齊王憲攻拔洪洞永安二城更圖進取齊人焚橋守險軍不得進乃屯永安使永昌公椿屯雞栖原伐栢為菴以立營椿廣之弟也癸酉齊王分軍萬人向千里徑又分軍出汾水關自帥大軍上雞栖原宇文盛遣人告急齊王憲自救之齊師退盛追擊破之俄而椿告齊師稍逼憲復還救之與齊對陳至夜不戰㑹周主召憲還憲引兵夜去齊人見柏菴在不之覺明日始知之齊主使高阿那肱將前軍先進仍節度諸軍甲戍周以上開府儀同大將軍安定梁士彦為晉州刺史留精兵一萬鎮之十一月己夘齊主至平陽周主以齊兵新集聲勢甚盛且欲西還以避其鋒開府儀同大將軍宇文忻諫曰以陛下之聖武乗敵人之荒縱何患不克若使齊得令主君臣協力雖湯武之勢未易平也今主暗臣愚士無鬭志雖有百萬之衆實為陛下奉耳軍正京兆王韶曰齊失紀綱於兹累世天奬周室一戰而扼其喉取亂侮亡正在今日釋之而去臣所未喻周主雖善其言竟引軍還忻貴之子也周主留齊王憲為後拒齊師追之憲與宇文忻各將百騎與戰斬其驍將賀蘭豹子等齊師乃退憲引軍度汾追及周主於玉壁齊師遂圍平陽晝夜攻之城中危急樓堞皆盡所存之城尋仞而已或短兵相接或交馬出入外援不至衆皆震懼梁士彦忼慨自若謂將士曰死在今日吾為爾先於是勇烈齊奮呼聲動地無不一當百齊師少却乃令妻妾軍民婦女晝夜修城三日而就周主使齊王憲將兵六萬屯涑川遥為平陽聲援齊人作地道攻平陽城䧟十餘歩將士乘勢欲入齊主敕且止召馮淑妃觀之淑妃粧㸃不時至周人以木拒塞之城遂不下舊俗相傳晉州城西石上有聖人跡淑妃欲往觀之齊主恐弩矢及橋乃抽攻城木造逺橋齊主與淑妃度橋橋壊至夜乃還癸巳周主還長安甲午復下詔以齊人圍晉州更帥諸軍擊之丙申縱齊降人使還丁酉周主發長安壬寅濟河與諸軍合十二月丁未周主至髙顯遣齊王憲帥所部先向平陽戊申周主至平陽庚戌諸軍揔集凡八萬人稍進逼城置陳東西二十餘里先是齊人恐周師猝至於城南穿塹自喬山屬於汾水齊主大出兵陳於塹北周主命齊王憲馳往觀之憲復命曰易與耳請破之而後食周主悅曰如汝言吾無憂矣周主乘常御馬從數人巡陳所至輒呼主帥姓名慰勉之將士喜於見知咸思自奮將戰有司請換馬周主曰朕獨乘良馬欲何之周主欲薄齊師礙塹而止自旦至中相持不決齊主謂髙阿那肱曰戰是邪不戰是邪阿那肱曰吾兵雖多堪戰者不過十萬病傷及繞城樵㸑者復三分居一昔攻玉壁援軍來即退今日將士豈勝神武時邪不如勿戰却守髙梁橋安吐根曰一撮許賊馬上刺取擲著汾水中耳齊主意未決諸内參曰彼亦天子我亦天子彼尚能逺來我何為守塹示弱齊主曰此言是也於是填塹南引周主大喜勒諸軍擊之兵纔合齊主與馮淑妃並騎觀戰東偏小却淑妃怖曰軍敗矣録尚書事城陽王穆提婆曰大家去大家去齊主即以淑妃奔髙梁橋開府儀同三司奚長諫曰半進半退戰之常體今兵衆全整未有虧傷陛下捨此安之馬足一動人情駭亂不可復振願速還安慰之武衛張常山自後至亦曰軍尋收訖甚完整圍城兵亦不動至尊宜回不信臣言乞將内參往視齊主將從之穆提婆引齊主肘曰此言難信齊主遂以淑妃北走齊師大潰死者萬餘人軍資器械數百里間委棄山積安徳王延宗獨全軍而還齊主至洪洞淑妃方以粉鏡自玩後聲亂唱賊至於是復走先是齊主以淑妃為有功勲將立為左皇后遣内參詣晉陽取皇后服御褘翟等至是遇於中塗齊主為按轡命淑妃著之然後去辛亥周主入平陽梁士彦見周主持周主須而泣曰臣幾不見陛下周主亦為之流涕周主以將士疲弊欲引還士彦叩馬諫曰今齊師遁散衆心皆動因其懼而攻之其勢必舉周主從之執其手曰余得晉州為平齊之基若不固守則大事不成朕無前憂惟慮後變汝善為我守之遂帥諸將追齊師諸將固請西還周主曰縱敵患生卿等若疑朕將獨往諸將乃不敢言癸丑至汾水闗齊主入晉陽憂懼不知所之甲寅齊大赦齊主問計於朝臣皆曰宜省賦息役以慰民心收遺兵背城死戰以安社稷齊主欲留安徳王延宗廣寧王孝珩守晉陽自向北朔州若晉陽不守則奔突厥羣臣皆以為不可帝不從開府儀同三司賀拔伏恩等宿衛近臣三十餘人西奔周軍周主封賞各有差髙阿那肱所部兵尚一萬守髙壁餘衆保洛女砦周主引軍向髙壁阿那肱望風退走齊王憲攻洛女砦拔之有軍士告稱阿那肱遣臣招引西軍齊主令侍中斛律孝卿檢校孝卿以為妄還至晉陽阿那肱腹心復告阿那肱謀反又以為妄斬之乙夘齊王詔安徳王延宗廣寧王孝珩募兵延宗入見齊主告以欲向北朔州延宗泣諌不從密遣左右先送皇太后太子於北朔州丙辰周主與齊王憲㑹於介休齊開府儀同三司韓建業舉城降以為上柱國封郇公是夜齊主欲遁去諸將不從丁巳周師至晉陽齊主復大赦改元隆化以安徳王延宗為相國并州刺史總山西兵謂曰并州兄自取之兒今去矣延宗曰陛下為社稷勿動臣為陛下出死力戰必能破之穆提婆曰至尊計已成王不得輙沮齊主乃夜斬五龍門而出欲奔突厥從官多散領軍梅勝郎叩馬諫乃回向鄴時惟髙阿那肱等十餘騎從廣寧王孝珩襄城王彦道繼至得數十人與俱穆提婆西奔周軍陸令萱自殺家屬皆誅没周主以提婆為柱國宜州刺史下詔諭齊羣臣曰若妙盡人謀深逹天命官榮爵賞各有加隆或我之將卒逃逸彼朝無問貴賤皆從蕩滌自是齊臣降者相繼初齊髙祖為魏丞相以唐邕典外兵曹太原白建典騎兵曹皆以善書計工簿帳受委任及齊受禪諸司咸歸尚書惟二曹不廢更名二省邕官至録尚書事建官至中書令常典二省世稱唐白邕兼領度支與髙阿那肱有隙阿那肱譛之齊主敕侍中斛律孝卿總知騎兵度支孝卿事多専决不復詢禀邕自以宿舊習事為孝卿所輕意甚欝欝及齊主還鄴邕遂留晉陽并州將帥請於安徳王延宗曰王不為天子諸人實不能為王出死力延宗不得已戊午即皇帝位下詔曰武平孱弱政由宦豎斬關夜遁莫知所之王公卿士猥見推逼今祇承寶位大赦改元徳昌以晉昌王唐邕為宰相齊昌王莫多婁敬顯沐陽王和阿于子右衛大將軍段暢開府儀同三司韓骨胡等為將帥敬顯貸文之子也衆聞之不召而至者前後相屬延宗發府藏及後宫羙女以賜將士籍没内參十餘家齊主聞之謂近臣曰我寧使周得并州不欲安徳得之左右曰理然延宗見士卒皆親執手稱名流涕嗚咽衆爭為死童兒女子亦乗屋攘袂投甎石以禦敵己未周主至晉陽庚申齊主入鄴周軍圍晉陽四合如黒雲安徳王延宗命莫多婁敬顯韓骨胡拒城南和阿于子叚暢拒城東自帥衆拒齊王憲於城北延宗素肥前如偃後如伏人常笑之至是奮大矟往來督戰勁捷若飛所向無前和阿于子叚暢以千騎奔周軍周主攻東門際昏遂入之進焚佛寺延宗敬顯自門入夾擊之周師大亂爭門相填壓塞路不得進齊人從後斫刺死者二千餘人周主左右畧盡自拔無路承御上士張壽牽馬首賀拔伏恩以鞭拂其後﨑嶇得出齊人奮擊幾中之城東道阨曲伏恩及降者皮子信導之僅得免時已四更延宗謂周主為亂兵所殺使於積尸中求長鬛者不得時齊人既捷入坊飲酒盡醉臥延宗不復能整周主出城飢甚欲遁去諸將亦多勸之還宇文忻勃然進曰陛下自克晉州乘勝至此今偽主奔波關東響振自古行兵未有若斯之盛昨日破城將士輕敵微有不利何足為懐丈夫當死中求生敗中取勝今破竹之勢已成奈何棄之而去齊王憲柱國王誼亦以為去必不免段暢等又盛言城内空虚周主乃駐馬鳴角收兵俄頃復振辛酉旦還攻東門克之延宗戰力屈走至城北周人擒之周主下馬執其手延宗辭曰死人手何敢廹至尊周主曰兩國天子非有怨惡直為百姓來耳終不相害勿怖也使復衣㡌而禮之唐邕等皆降於周獨莫多婁敬顯奔鄴齊主以為司徒延宗初稱尊號遣使修啟於瀛州刺史任城王湝曰至尊出奔宗廟事重羣公勸廹權主號令事寧終歸叔父湝曰我人臣何容受此啟執使者送鄴壬戌周主大赦削除齊制收禮文武之士初伊婁謙聘於齊其參軍髙遵以情輸於齊齊人拘之於晉陽周主既克晉陽召謙勞之執遵付謙任其報復謙頓首請赦之周主曰卿可聚衆唾面使其知愧謙曰以遵之罪又非唾面可責帝善其言而止謙待遵如初臣光曰賞有功誅有罪此人君之任也髙遵奉使異國漏泄大謀斯叛臣也周髙祖不自行戮乃以賜謙使之復怨失政刑矣孔子謂以徳報怨者何以報徳為謙者宜辭而不受歸諸有司以正典刑乃請而赦之以成其私名羙則羙矣亦非公義也齊主命立重賞以募戰士而竟不出物廣寜王孝珩請使任城王湝將幽州道兵入土門揚聲趣并州獨孤永業將洛州道兵入潼闗揚聲趣長安臣請將京畿兵出􅇭口鼓行逆戰敵聞南北有兵自然逃潰又請出宫人珍寶賞將士齊主不恱斛律孝卿請齊主親勞將士為之撰辭且曰宜忼慨流涕以感激人心齊主既出臨衆將令之不復記所受言遂大笑左右亦笑將士怒曰身尚如此吾輩何急皆無戰心於是自大丞相已下太宰三師大司馬大將軍三公等官並增貟而授或三或四不可勝數朔州行臺僕射髙勱將兵侍衞太后太子自土門道還鄴時宦官儀同三司苟子溢猶恃寵縱暴民間鷄彘縱鷹犬摶噬取之勱執以狥將斬之太后救之得免或謂勱曰子溢之徒言成禍福獨不慮後患邪勱攘袂曰今西冦已據并州達官率皆委叛正坐此輩濁亂朝廷若得今日斬之明日受誅亦無所恨勱岳之子也甲子齊太后至鄴丙寅周主出齊宫中珍寶服玩及宫女二千人班賜將士加立功者官爵各有差周主問髙延宗以取鄴之䇿辭曰此非亡國之臣所及强問之乃曰若任城王據鄴臣不能知若今主自守陛下兵不血刄癸酉周師趣鄴命齊王憲先驅以上柱國陳王純為并州總管齊主引諸貴臣入朱雀門賜酒食問以禦周之䇿人人異議齊主不知所從是時人情忷懼莫有鬭心朝士出降晝夜相屬髙勱曰今之叛者多是貴人至於卒伍猶未離心請追五品以上家屬置之三臺因脅之以戰若不捷則焚臺此曹顧惜妻子必當死戰且王師頻北賊徒輕我今背城一决理必破之齊主不能用望氣者言當有革易齊主引尚書令髙元海等議依天統故事禪位皇太子九年春正月乙亥朔齊太子恒即皇帝位生八年矣改元承光大赦尊齊主為太上皇帝皇太后為太皇太后皇后為太上皇后以廣寧王孝珩為太宰司徒莫多婁敬顯領軍大將軍尉相願謀伏兵千秋門斬髙阿那肱立廣寧王孝珩㑹阿那肱自它路入朝不果孝珩求拒周師謂阿那肱等曰朝廷不賜遣擊賊豈不畏孝珩反邪孝珩若破宇文邕遂至長安反亦何預國家事以今日之急猶如此猜忌耶髙韓恐其為變出孝珩為滄州刺史相願拔佩刀斫柱歎曰大事去矣知復何言齊主使長樂王尉世辯帥千餘騎覘周師出滏口登髙阜西望遥見羣烏飛起謂是西軍旗幟即馳還比至紫陌橋不敢囬顧於是黄門侍郎顔之推中書侍郎蘇道衡侍中陳徳信等勸上皇往河外募兵更為經畧若不濟南投陳國從之丁丑太皇太后太上皇后自鄴先趣濟州癸未㓜主亦自鄴東行己丑周師至紫陌橋壬辰周師至鄴城下癸巳圍之燒城西門齊人出戰周師奮擊大破之齊上皇從百騎東走使武衞大將軍慕容三藏守鄴宫周師入鄴齊王公以下皆降三藏猶拒戰周主引見禮之拜儀同大將軍三藏紹宗之子也領軍大將軍漁陽鮮于世榮齊髙祖舊將也周主先以馬腦酒鍾遺之世榮得即碎之周師入鄴世榮在三臺前鳴鼓不輟周人執之世榮不屈乃殺之周主執莫多婁敬顯數之曰汝有死罪三前自晉陽走鄴􅂝妾棄母不孝也外為偽朝戮力内實通啟於朕不忠也送欵之後猶持兩端不信也用心如此不死何待遂斬之使將軍尉遲勤追齊主甲午周主入鄴齊國子博士張樂熊安生慱通五經聞周主入鄴遽令掃門家人怪而問之安生曰周帝重道尊儒必將見我俄而周主幸其家不聽拜親執其手引與同坐賞賜甚厚給安車駟馬以自隨又遣小司馬唐道和就中書侍郎李徳林宅宣㫖慰諭曰平齊之利惟在於爾引入宫使内史宇文昂訪問齊朝風俗政教人物善惡即留内省三宿乃歸乙未齊上皇度河入濟州是日㓜主禪位於大丞相任城王湝又為湝詔尊上皇為無上皇㓜主為守國天王令侍中斛律孝卿送禪文及璽紱於瀛州孝卿即詣鄴周主詔去年大赦所未及之處皆從赦例齊洛州刺史獨孤永業有甲士三萬聞晉州敗請出兵擊周奏寢不報永業憤慨又聞并州䧟乃遣子須達請降於周周以永業為上柱國封應公丙申周以越王盛為相州總管齊上皇留胡太后於濟州使髙阿那肱守濟州闗覘候周師自與穆后馮淑妃㓜主韓長鸞鄧長顒等數十人奔青州使内參田鵬鸞西出參伺動静周師獲之問齊主何在紿云已去計當出境周人疑其不信捶之毎折一支辭色愈厲竟折四支而死上皇至青州即欲入陳而髙阿那肱密召周師約生致齊主屢啟云周師尚逺已令燒斷橋路上皇由是淹留自寛周師至闗阿那肱即降之周師奄至青州上皇嚢金繫於鞍後與后妃㓜主等十餘騎南走己亥至南鄧村尉遲勤追及盡擒之并胡太后送鄴庚子周主詔故斛律光崔季舒等宜追加贈諡并為改葬子孫各隨䕃叙録家口田宅沒官者並還之周主指斛律光名曰此人在朕安得至鄴辛丑詔齊之東山南園三臺并可毁撤瓦木諸物可用者悉以賜民山園之田各還其主二月丙午周主宴從官將士於齊太極殿頒賞有差丁未髙緯至鄴周主降階以賔禮見之齊廣寧王孝珩至滄州以五千人㑹任城王湝於信都共謀匡復召募得四萬餘人周主使齊王憲柱國楊堅擊之令髙緯為手書招湝湝不從憲軍至趙州湝遣二諜覘之候騎執以白憲憲集齊舊將遍示之謂曰吾所爭者大不在汝曹今縱汝還仍充吾使乃與湝書曰足下諜者為候騎所拘軍中情實具諸執事戰非上計無待􅁲疑守乃下䇿或未相許已勒諸軍分道並進相望非逺凴軾有期不俟終日所望知機也憲至信都湝陳於城南以拒之湝所署領軍尉相願詐出畧陳遂以衆降相願湝心腹也衆皆駭懼湝殺相願妻子明日復戰憲擊破之俘斬三萬人執湝及廣寧王孝珩憲謂湝曰任城王何苦至此湝曰下官神武皇帝之子兄弟十五人幸而獨存逢宗社顛覆今日得死無愧墳陵憲壯之命歸其妻子又親為孝珩洗瘡傅藥禮遇甚厚孝珩歎曰自神武皇帝以外吾諸父兄弟無一人至四十者命也嗣君無獨見之明宰相非柱石之寄恨不得握兵符受斧鉞展我心力耳齊王憲善用兵多謀畧得將士心齊人憚其威聲皆望風沮潰芻牧不擾軍無私焉周主以齊降將封輔相為北朔州總管北朔州齊之重鎮士卒驍勇前長史趙穆等謀執輔相迎任城王湝於瀛洲不果乃迎定州刺史范陽王紹義紹義至馬邑自肆州以北二百八十餘城皆應之紹義與靈州刺史袁洪猛引兵南出欲取并州至新興而肆州已為周守前隊二儀同以所部降周周兵擊顯州執刺史陸瓊復攻拔諸城紹義還保北朔州周東平公神舉將兵逼馬邑紹義戰敗北奔突厥猶有衆三千人紹義令曰欲還者從其意於是辭去者大半突厥佗鉢可汗常謂齊顯祖為英雄天子以紹義重踝似之甚見愛重凡齊人在北者悉以𨽻之於是齊之行臺州鎮惟東雍州行臺傅伏營州刺史高寶寧不下其餘皆入於周凡得州五十郡一百六十二縣三百八十户三百三萬二千五百髙寶寧者齊之踈屬有勇略乆鎮和龍甚得夷夏之心周主於河陽幽青南兖豫徐北朔定置總管府相并二州各置宫及六府官乙夘周主自鄴西還周主之擒尉相貴也招齊東雍州刺史傅伏伏不從齊人以伏為行臺右僕射周主既克并州復遣韋孝寛招之令其子以上大將軍武鄉公告身及金馬腦二酒鍾賜伏為信伏不受謂孝寛曰事君有死無貳此兒為臣不能竭忠為子不能盡孝人所讎疾願速斬之以令天下周主自鄴還至晉州遣髙阿那肱等百餘人臨汾水召伏伏出軍隔水見之問至尊今何在阿那肱曰已被擒矣伏仰天大哭帥衆入城於聴事前北面哀號良久然後降周主見之曰何不早下伏流涕對曰臣三世為齊臣食齊禄不能自死羞見天地周主執其手曰為臣當如是乃以所食羊肋骨賜伏曰骨親肉疎所以相付遂引使宿衞授上儀同大將軍敕之曰若亟與公髙官恐歸附者心動努力事朕勿憂富貴佗日又問前救河隂得何賞對曰蒙一轉授特進永昌郡公周主謂髙緯曰朕三年教戰決取河隂政為傅伏善守城不可動遂歛軍而退公當時賞功何其薄也夏四月乙巳周主至長安置高緯於前列其王公等於後車輿旗幟器物以次陳之備大駕布六軍奏凱樂獻俘於太廟觀者皆稱萬歲戊申封髙緯為温公齊之諸王三十餘人皆受封爵周主與齊君臣飲酒令温公起舞髙延宗悲不自持屢欲仰藥其侍婢禁止之周主以李徳林為内史上士自是詔誥格式及用山東人物並以委之帝從容謂羣臣曰我常日惟聞李徳林名復見其為齊朝作詔書移檄正謂是天上人豈言今日得其驅使神武公紇豆陵毅對曰臣聞麒麟鳯皇為王者瑞可以徳感不可力致麒麟鳯皇得之無用豈如徳林為瑞且有用哉帝大笑曰誠如公言五月己丑周主祭方丘詔以路寢㑹義崇信含仁雲和思齊諸殿皆晉公護専政時所為事窮壯麗有踰清廟悉可毁撤彫斵之物並賜貧民繕造之宜務從卑朴戊戍又詔并鄴諸堂壯麗者凖此臣光曰周髙祖可謂善處勝矣佗人勝則益奢髙祖勝而愈儉十月周人誣溫公髙緯與宜州刺史穆提婆謀反并其宗族皆賜死衆人多自陳無之髙延宗獨攘袂泣而不言以椒塞口而死惟緯弟仁英以清狂仁雅以瘖疾得免徙於蜀其餘親屬不殺者散配西土皆死於邊裔周主以髙湝妻盧氏賜其將斛斯徵盧氏蓬首垢面長齋不言笑徵放之乃為尼齊后妃貧者至以賣燭為業十二月髙寶寜自黄龍上表勸進於髙紹義紹義遂稱皇帝改元武平以寶寧為丞相突厥佗鉢可汗舉兵助之十年夏六月周髙祖殂閏月齊范陽王紹義聞周髙祖殂以為天助幽州人盧昌期起兵據范陽迎紹義紹義引突厥兵赴之周遣柱國東平公神舉將兵討昌期紹義聞幽州總管出兵在外欲乘虚襲薊神舉遣大將軍宇文恩將四千人救之半為紹義所殺㑹神舉克范陽擒昌期紹義聞之素衣舉哀還入突厥髙寶寜帥夷夏數萬騎救范陽至潞水聞昌期死還據和龍十一年春二月突厥佗鉢可汗請和於周周主以趙王招女為千金公主妻之且命執送髙紹義佗鉢不從十二年夏六月周遣建威侯賀若誼賂佗鉢可汗且說之以求髙紹義佗鉢偽與紹義獵於南境使誼執之誼敦之弟也秋七月甲申紹義至長安徙之蜀久之病死於蜀楊堅篡周陳臨海王光大二年秋七月壬寅周隨桓公楊忠卒子堅襲爵堅為開府儀同三司小宫伯宣帝大建四年夏四月癸巳周立皇子魯公贇為太子大赦五年秋九月壬午周太子贇納妃楊氏妃大將軍隋公堅之女也太子好昵近小人左宫正宇文孝伯言於周主曰皇太子四海所屬而徳聲未聞臣忝宫官實當其責且春秋尚少志業未成請妙選正人為其師友調護聖質猶望日就月將如或不然悔無及矣帝歛容曰卿世載鯁直竭誠所事觀卿此言有家風矣孝伯拜謝曰非言之難受之難也帝曰正人豈復過卿於是以尉遲運為右宫正運迥之弟子也帝嘗問萬年縣丞南陽樂運曰卿言太子何如人對曰中人帝顧謂齊公憲曰百官佞我皆稱太子聰明睿智惟運所言忠直耳因問運中人之狀對曰如齊桓公是也管仲相之則覇豎貂輔之則亂可與為善可與為惡帝曰我知之矣乃妙選宫官以輔之仍擢運為京兆丞太子聞之意甚不悦七年大將軍楊堅姿相竒偉畿伯下大夫長安來和嘗謂堅曰公眼如曙星無所不照當王有天下願忍誅殺周主待堅素厚齊王憲言於帝曰普六茹堅相貎非常臣毎見之不覺自失恐非人下請早除之帝亦疑之以問來和和詭對曰隨公止是守節人可鎮一方若為將領陳無不破八年秋八月周太子伐吐谷渾至伏俟城而還官尹鄭譯王端等皆有寵於太子太子在軍中多失徳譯等皆預焉軍還王軌等言之於周主周主怒杖太子及譯等仍除譯等名宫臣親幸者咸被譴太子復召譯戯狎如初譯因曰殿下何時可得據天下太子悦益昵之譯儼之兄孫也周主遇太子甚嚴毎朝見進止與羣臣無異雖隆寒盛暑不得休息以其嗜酒禁酒不得至東宫有過輙加捶撻嘗謂之曰古來太子被廢者㡬人餘兒豈不堪立邪乃敕東宫官屬録太子言語動作每月奏聞太子畏帝威嚴矯情修飾由是過惡不上聞王軌嘗與小内史賀若弼言太子必不克負荷弼深以為然勸軌陳之軌後因侍坐言於帝曰皇太子仁孝無聞恐不了陛下家事愚臣短暗不足可信陛下恒以賀若弼有文武竒才亦常以此為憂帝以問弼對曰皇太子養徳春宫未聞有過既退軌讓弼曰平生言論無所不道今者對揚何得乃爾反覆弼曰此公之過也太子國之儲副豈易發言事有蹉跌便至滅族本謂公宻陳臧否何得遂至昌言軌黙然久之乃曰吾専心國家遂不存私計向者對衆良實非宜後軌因内宴上壽捋帝須曰可愛好老公但恨後嗣弱耳先是帝問右宫伯宇文孝伯曰吾兒比來何如對曰太子比懼天威更無過失罷酒帝責孝伯曰公常語我云太子無過今軌有此言公為誑矣孝伯再拜曰臣聞父子之際人所難言臣知陛下不能割慈忍愛遂爾結舌帝知其意黙然久之乃曰朕已委公矣公其勉之王軌驟言於帝曰皇太子非社稷主普六茹堅貎有反相帝不悦曰必天命有在將若之何楊堅聞之甚懼深自晦匿帝深以軌等言為然但漢王賛次長又不才餘子皆㓜故得不廢十年夏五月癸巳帝不豫六月丁酉朔帝疾甚還長安是夕殂年三十六戊戍太子即位尊皇后阿史那氏為皇太后宣帝始立即逞奢欲大行在殯曽無戚容捫其杖痕大罵曰死晚矣閱視髙祖宫人逼為滛欲超拜吏部下大夫鄭譯為開府儀同大將軍内史中大夫委以朝政己未葬武皇帝於孝陵廟號髙祖既葬詔内外公除帝及六宫皆議即吉京兆郡丞樂運上疏以為葬期既促事訖即除太為汲汲帝不從帝以齊煬王憲屬尊望重忌之謂宇文孝伯曰公能為朕圖齊王當以其官相授孝伯叩頭曰先帝遺詔不許濫誅骨肉齊王陛下之叔父功髙徳茂社稷重臣陛下若無故害之臣又順㫖曲從則臣為不忠之臣陛下為不孝之子矣帝不懌由是疎之乃與開府儀同大將軍于智鄭譯等密謀之使智就宅候憲因告憲有異謀甲子帝遣宇文孝伯語憲欲以憲為太師憲辭讓又使孝伯召憲曰晚與諸王俱入既至殿門憲獨被引進帝先伏壯士於别室至即執之憲自辯理帝使于智證憲憲目光如炬與智相質或謂憲曰以王今日事勢何用多言憲曰死生有命寜復圖存但老母在堂恐留兹恨耳因擲笏於地遂縊之帝召憲僚屬使證成憲罪參軍渤海李綱誓之以死終無撓辭有司以露車載憲尸而出故吏皆散惟李綱撫棺號慟躬自瘞之哭拜而去又殺上大將軍王興上開府儀同大將軍獨孤熊開府儀同大將軍豆盧紹皆素與憲親善者也帝既誅憲而無名乃云與興等謀反時人謂之伴死以于智為柱國封齊公以賞之閏月乙亥周主立妃楊氏為皇后秋七月壬戍以亳州總管楊堅為上柱國大司馬十一年春正月癸巳周主受朝於露門始與羣臣服漢魏衣冠大赦改元大成置四輔官以大冡宰越王盛為大前疑相州總管蜀公尉遲迥為大右弼申公李穆為大左輔大司馬隨公楊堅為大後丞周主之初立也以髙祖刑書要制為太重而除之又數行赦宥京兆郡丞樂運上疏以為虞書所稱𤯝災肆赦謂過誤為害當緩赦之吕刑云五刑之疑有赦謂刑疑從罰罰疑從免也謹尋經典未有罪無輕重溥天大赦之文大尊豈可數施非常之恵以肆姦宄之惡乎帝不納既而民輕犯法又自以奢滛多過失惡人規諫欲為威虐以懾羣下乃更為刑經聖制用法益深大醮於正武殿告天而行之密令左右伺察羣臣小有過失輒行誅譴又居䘮纔踰年即恣聲樂魚龍百戯常陳殿前累日繼夜不知休息多聚羙女以實後宫増置位號不可詳録遊宴沈湎或旬日不出羣臣請事者皆因宦者奏之於是樂運輿櫬詣朝堂陳帝八失其一以為大尊比來事多獨斷不參諸宰輔與衆共之其二搜美女以實後宫儀同以上女不許輒嫁貴賤同怨其三大尊一入後宫數日不出所須聞奏多附宦者其四下詔寛刑未及半年更嚴前制其五髙祖斵雕為朴崩未踰年而遽窮奢麗其六徭賦下民以奉俳優角抵其七上書字誤者即治其罪杜獻書之路其八𤣥象垂誡不能諮諏善道脩布徳政若不革兹八事臣見周廟不血食矣帝大怒將殺之朝臣恐懼莫有救者内史中大夫洛陽元巖歎曰臧洪同死人猶願之况比干乎若樂運不免吾將與之俱斃乃詣閤請見曰樂運不顧其死欲以求名陛下不如勞而遣之以廣聖度帝頗感悟明日召運謂曰朕昨夜思卿所奏實為忠臣賜御食而罷之癸夘周立皇子闡為魯王戊午周主至洛陽立魯王闡為皇太子二月周徐州總管王軌聞鄭譯用事自知及禍謂所親曰吾昔在先朝實申社稷至計今日之事斷可知矣此州控帶淮南鄰接彊冦欲為身計易如反掌但忠義之節不可虧違况荷先帝厚恩豈可以獲罪於嗣主遽忘之耶止可於此待死冀千載之後知吾此心耳周主從容問譯曰我脚杖痕誰所為也對曰事由烏桓軌宇文孝伯因言軌捋須事帝使内史杜慶信就州殺軌元巖不肯署詔御正中大夫顔之儀切諌帝不聴巖進繼之脫巾頓顙三拜三進帝曰汝欲黨烏丸軌邪巖曰臣非黨軌正恐濫誅失天下之望帝怒使閹豎搏其靣軌遂死巖亦廢於家逺近知與不知皆為軌流涕之儀之推之弟也周主之為太子也上柱國尉遲運為宫正數進諌不用又與王軌宇文孝伯宇文神舉皆為髙祖所親待太子疑其同毁已及軌死運懼私謂孝伯曰吾徒必不免禍為之奈何孝伯曰今堂上有老母地下有武帝為臣為子知欲何之且委質事人本徇名義諫而不入死焉可逃足下若為身計宜且逺之於是運求出為秦州總管它日帝託以齊王憲事讓孝伯曰公知齊王謀反何以不言對曰臣知齊王忠於社稷為羣小所譖言必不用所以不言且先帝付囑微臣惟令輔導陛下今諫而不從寔負顧托以此為罪是所甘心帝大慙俛首不語命將出賜死于家時宇文神舉為并州刺史帝遣使就州酖殺之尉遲運至秦州亦以憂死辛巳周宣帝傳位於太子闡大赦改元大象自稱天元皇帝所居稱天臺冕二十四旒車服旂皷皆倍於前王之數皇帝稱正陽宫置納言御正諸位等官皆準天臺尊皇太后為天元皇太后天元既傳位驕侈彌甚務自尊大無所顧憚國之儀典率情變更毎對臣下自稱為天用樽彞珪瓚以飲食令羣臣朝天臺者致齋三日清身一日既自比上帝不欲羣臣同己常自帶綬及冠通天冠加金附蟬顧見侍臣弁上有金蟬及王公有綬者並令去之不聽人有天髙上大之稱官名有犯皆改之改姓髙者為姜九族稱髙祖者為長祖又令天下車皆以渾木為輪禁天下婦人不得施粉黛自非宫人皆黄眉墨粧毎召侍臣論議惟欲興造變革未嘗言及政事㳺戲無常出入不節羽儀仗衞晨出夜還陪侍之官皆不堪命自公卿以下常被楚撻毎捶人皆以百二十為度謂之天杖其後又加至二百四十宫人内職亦如之后妃嬪御雖被寵幸亦多杖背於是内外恐怖人不自安皆求苟免莫有固志重足累息以逮於終夏五月辛亥以襄國郡為趙國濟南郡為陳國武當安富二郡為越國上黨郡為代國新野郡為滕國邑各萬户令趙王招陳王純越王盛代王達滕王逌並之國隨公楊堅私謂大將軍汝南公慶曰天元實無積徳視其相貎壽亦不長又諸藩微弱各令就國曾無深根固本之計羽翮既翦何能及逺哉秋七月庚寅周以楊堅為大前疑己酉周尊天元帝太后李氏為天皇太后壬子改天元皇后朱氏為天皇后立妃元氏為天右皇后陳氏為天左皇后凡四后云十二年春二月乙丑周天元改制為天制敕為天敕壬午尊天元皇太后為天元上皇太后天皇太后為天元聖皇太后癸未詔楊后與三后皆稱太皇后司馬后直稱皇后行軍總管把公亮天元之從祖兄也其子西陽公溫妻尉遲氏蜀公迥之孫有美色以宗婦入朝天元飲之酒逼而滛之亮聞之懼三日軍還至豫州密謀襲韋孝寛并其衆推諸父為主鼓行而西亮國官茹寛知其謀先告孝寛孝寛潜設備亮夜將數百騎襲孝寛營不克而走戊子孝寛追斬之温亦坐誅天元即召其妻入宫拜長貴妃時周師冦淮南韋孝寛為行軍元帥周天元如同州増候正前驅戒道為三百六十重自應門至於赤岸澤數十里間幡旗相蔽音樂俱作又令虎賁持鈒馬上稱警蹕乙未改同州宫為天成宫庚子還長安詔天臺侍衛之官皆著五色及紅紫緑衣以雜色為緣名曰品色衣有大事與公服間服之壬寅詔内外命婦皆執笏其拜宗廟及天臺皆俛伏如男子天元將立五皇后以問小宗伯狄道辛彦之對曰皇后與天子敵體不宜有五太學博士西城何妥曰昔帝嚳四妃虞舜二妃先代之數何常之有帝大悅免彦之官甲辰詔曰坤儀比徳土數惟五四太皇后外可増置天中太皇后一人於是以陳氏為天中太皇后尉遲妃為天左太皇后又造下帳五使五后各居其一實宗廟祭器於前自讀祝版而祭之又以五輅載婦人自帥左右步從又好倒懸雞及碎瓦扵車上觀其號呼以為樂夏五月周楊后性柔婉不妬忌四皇后及嬪御等咸愛而仰之天元昏暴滋甚喜怒乖度嘗譴后欲加之罪后進止詳閑辭色不撓天元大怒遂賜后死逼令引訣后母獨孤氏詣閤陳謝叩頭流血然後得免后父大前疑堅位望隆重天元忌之嘗因忿謂后曰必族滅爾家因召堅謂左右曰色動即殺之堅至神色自若乃止内史上大夫鄭譯與堅少同學竒堅相表傾心相結堅既為帝所忌情不自安嘗在永巷私於譯曰乆願出藩公所悉也願少留意譯曰以公徳望天下歸心欲求多福豈敢忘也謹即言之天元將遣譯入冦譯請元帥天元曰卿意如何對曰若定江東自非懿戚重臣無以鎮撫可令隨公行且為壽陽總管以督軍事天元從之己丑以堅為揚州總管使譯發兵㑹壽陽將行㑹堅暴有足疾不果行甲午夜天元備灋駕幸天興宫乙未不豫而還小御正博陵劉昉素以狡謟得幸扵天元與御正中大夫顔之儀並見親信天元召昉之儀入卧内欲屬以後事天元瘖不復能言昉見靜帝㓜冲以楊堅后父有重名遂與領内史鄭譯御飾大夫柳裘内史大夫杜陵韋謩御正下士朝那皇甫績謀引堅輔政堅固辭不敢當昉曰公若為速為之不為昉自為也堅乃從之稱受詔居中侍疾裘惔之孫也是日帝殂祕不發喪昉譯矯詔以堅摠知中外兵馬事顔之儀知非帝㫖拒而不從昉等草詔署訖逼之儀連署之儀厲聲曰主上升遐嗣子冲㓜阿衡之任宜在宗英方今趙王最長以親以徳合膺重寄公等備受朝恩當思盡忠報國奈何一旦欲以神器假人之儀有死而已不能誣罔先帝昉等知不可屈乃代之儀署而行之諸衛既受敕並受堅節度堅恐諸王在外生變以千金公主將適突厥為辭徵趙陳越代滕五王入朝堅索符璽顔之儀正色曰此天子之物自有主者宰相何故索之堅大怒命引出將殺之以其民望出為西邊郡守丁未發喪靜帝入居天臺廢正陽宫大赦停洛陽宫作庚戌尊阿史那太后為太皇太后李太后為太帝大后楊后為皇太后朱后為帝太后其陳后元后尉遲后並為尼以漢王贊為上柱國右大丞相尊以虚名實無所綜理以楊堅為假黄鉞左大丞相秦王贄為上柱國百官總已以聽於左丞相堅初受顧命使䢴國公楊惠謂御正下大夫李徳林曰朝廷賜令總文武事經國任重今欲與公共事必不得辭徳林曰願以死奉公堅大喜始劉昉鄭譯議以堅為大冡宰譯自攝大司馬昉又求小冡宰堅私問徳林曰欲何以見處徳林曰宜作大丞相假黄鉞都督中外諸軍事不爾無以壓衆心及發䘮即依此行之以正陽宫為丞相府時衆情未壹堅引司武上士盧賁置左右將之東宫百官皆不知所從堅濳令賁部伍仗衞因召公卿謂曰欲求富貴者宜相隨往往偶語欲有去就賁嚴兵而至衆莫敢動出崇陽門至東宫門者拒不納賁諭之不去瞋目叱之門者遂却堅入賁遂典丞相府宿衞賁辯之弟子也以鄭譯為丞相府長史劉昉為司馬李徳林為府屬二人由是怨徳林内史下大夫勃海髙熲明敏有器局習兵事多計略堅欲引之入府遣楊惠諭意熲承㫖欣然曰願受驅馳縱令公事不成熲亦不辭滅族乃以為相府司錄時漢王贊居禁中毎與静帝同帳而坐劉昉飾羙妓進贊贊甚悅之昉因說贊曰大王先帝之弟時望所歸孺子㓜冲豈堪大事今先帝初崩羣情尚擾王且歸第待事寧後入為天子此萬全計也贊年少性識庸下以為信然遂從之堅革宣帝苛酷之政更為寛大刪略舊律作刑書要制奏而行之躬履節儉中外悦之堅夜召太史中大夫庾季才問曰吾以庸虛受兹顧命天時人事卿以為何如季才曰天道精微難可意察竊以人事􅁲之符兆已定季才縱言不可公豈復得為箕潁之事乎堅黙然乆之曰誠如君言獨孤夫人亦謂堅曰大事已然騎虎之勢必不得下勉之堅以相州總管尉遲迥位望素重恐有異圖使迥子魏安公惇奉詔書召之㑹葬壬子以上柱國韋孝寛為相州總管又以小司徒叱列長乂為相州刺史先令赴鄴孝寛續進陳王純時鎮齊州堅使門正上士崔彭徵之彭以兩騎往止傳舍遣人召純純至彭請屏左右密有所道遂執而鎻之因大言曰陳王有罪詔徵入朝左右不得輒動其從者愕然而去彭楷之孫也六月五王皆至長安周尉遲迥知丞相堅將不利於帝室謀舉兵討之韋孝寛至朝歌迥遣其大都督賀蘭貴齎書候韋孝寛孝寛留貴與語以審之疑其有變遂稱疾徐行又使人至相州求醫藥密以伺之孝寛兄子藝為魏郡守迥遣藝迎孝寛孝寛問迥所為藝黨於迥不以實對孝寛怒將斬之藝懼悉以迥謀語孝寛孝寛攜藝西走每至亭驛盡驅傳馬而去謂驛司曰蜀公將至宜速具酒食迥尋遣儀同大將軍梁子康將數百騎追孝寛追者至驛輒逢盛饌又無馬遂遲留不進孝寛與藝由是得免堅又令候正破六韓裒詣迥諭㫖密與總管府長史晉昶等書令為之備迥聞之殺昶及裒集文武士民登城北樓令之曰楊堅藉后父之勢挾㓜主以作威福不臣之迹暴扵行路吾與國舅甥任兼將相先帝處吾如此本欲寄以安危今欲與卿等糾合義勇以匡國庇民何如衆咸從命迥乃自稱大總管承制置官司時越王招入朝留少子在國迥奉以號令甲子堅發闗中兵以韋孝寛為行軍元帥郕公梁士彦樂安公元諧化政公宇文忻濮陽公武川宇文述武鄉公崔宏度清河公楊素隴西公李詢等皆為行軍總管以討迥宏度楷之孫詢穆之兄子也初宣帝使計部中大夫楊尚希撫慰山東至相州聞宣帝殂與尉遲迥發䘮尚希出謂左右曰蜀公哭不哀而視不安將有佗計吾不去懼及於難遂夜從捷徑而遁遲明迥覺追之不及遂歸長安堅遣尚希督宗兵三千人鎮潼闗雍州牧畢刺王賢與五王謀殺堅事洩堅殺賢并其三子掩五王之謀不問以秦王贄為大冡宰把公椿為大司徒庚子以柱國梁睿為益州總管周青州總管尉遲勤迥之弟子也初得迥書表送之尋亦從迥迥所統相衞黎洛貝趙冀瀛滄勤所統青齊膠光莒等州皆從之衆數十萬榮州刺史邵公胄申州刺史李惠東楚州刺史費也利進潼州刺史曹孝逺各據本州徐州總管司録席毗羅據兖州前東平郡守畢義緒據蘭陵皆應迥懐縣永橋鎮將紇豆陵惠以城降迥迥使其所署大將軍石遜攻建州建州刺史宇文弁以州降之又遣西道行臺韓長業攻拔潞州執刺史趙威署城人郭子勝為刺史紇豆陵惠襲䧟鉅鹿遂圍恒州上大將軍宇文威攻汴州莒州刺史烏丸尼等帥青齊之衆圍沂州大將軍檀讓攻拔曹亳二州屯兵梁郡席毗羅衆號八萬軍於蕃城攻䧟昌慮下邑李惠自申州攻永州拔之迥遣使招大左輔并州刺史李穆穆鎻其使封上其書穆子士榮以穆所居天下精兵處隂勸穆從迥穆深拒之堅使内史大夫柳裘詣穆為陳利害又使穆子左侍上士渾往布腹心穆使渾奉尉斗於堅曰願執威柄以尉安天下又以十三鐶金帶遺堅十三鐶金帶者天子之服也堅大恱遣渾詣韋孝寛述穆意穆兄子崇為懐州刺史初欲應迥後知穆附堅慨然太息曰闔家富貴者數十人值國有難竟不能扶傾繼絶復何靣目處天地間乎不得已亦附扵堅迥子誼為朔州刺史穆執送長安又遣兵討郭子勝擒之迥招徐州總管源雄東郡守于仲文皆不從雄賀之曾孫仲文謹之孫也迥遣宇文胄自石濟宇文威自白馬濟河二道攻仲文仲文棄郡走還長安迥殺其妻子迥遣檀讓狥地河南丞相堅以仲文為河南道行軍總管使詣洛陽發兵討讓命楊素討宇文胄丁未周以丞相堅都督中外諸軍事鄖州總管司馬消難亦舉兵應迥己酉周以柱國王誼為行軍元帥以討消難廣州刺史于顗仲文之兄也與總管趙文表不恊詐得心疾誘文表手殺之因唱言文表與尉遲迥通謀堅以迥未平因勞勉之即拜吳州總管趙僣王招謀殺堅邀堅過其第堅齎酒殽就之招引入寢室招子員貫及妃弟魯封等皆在左右佩刀而立又藏刄於帷席之間伏壯士於室後堅左右皆不得從惟從祖弟開府儀同大將軍𢎞大將軍元胄坐於户側胄順之孫也𢎞胄皆有勇力為堅心腹酒酣招以佩刀刺瓜連㗖堅欲因而刺之元胄進曰相府有事不可久留招訶之曰我與丞相言汝何為者叱之使却胄瞋目憤氣扣刀入衛招賜之酒曰吾豈有不善之意邪卿何猜警如是招偽吐將入後閤胄恐其為變扶令上坐如此再三招稱喉乾命胄就厨取飲胄不動㑹滕王逌後至堅降階迎之胄耳語曰事勢大異可速去堅曰彼無兵馬何能為胄曰兵馬皆彼物彼若先發大事去矣胄不辭死恐死無益堅復入坐胄聞室後有被甲聲遽請曰相府事殷公何得如此因扶堅下牀趨去招將追之胄以身蔽户招不得出堅及門胄自後至招恨不時發彈指出血壬子堅誣招與越野王盛謀反皆殺之及其諸子賞賜元胄不可勝計周室諸王數欲伺隙殺堅都督臨涇李圓通常保䕶之由是得免周韋孝寛軍至永橋城諸將請先攻之孝寛曰城小而固若攻而不拔損我兵威今破其大軍此何能為於是引軍壁於武陟尉遲迥遣其子魏安公惇帥衆十萬入武徳軍於沁東㑹沁水漲孝寛與迥隔水相持不進孝寛長史李詢密啟丞相堅云梁士彦宇文忻崔𢎞度並受尉遲迥饟金軍中慅慅人情大異堅深以為憂與内史上大夫鄭譯謀代此三人者李徳林曰公與諸將皆國家貴臣未相服從今正以挾令之威控御之耳前所遣者疑其乖異後所遣者安知其能盡腹心邪又取金之事虚實難明今一旦代之或懼罪逃逸若加縻縶則自鄖公以下莫不驚疑且臨敵易將此燕趙之所以敗也如愚所見但遣公一腹心明於智略素為諸將所信服者速至軍所使觀其情偽縱有異意必不敢動動亦能制之矣堅大悟曰公不發此言幾敗大事乃命少内史崔仲方往監諸軍為之節度仲方猷之子也辭以父在山東又命劉昉鄭譯昉辭以未嘗為將譯辭以母老堅不恱府司録髙熲請行堅喜遣之熲受命亟發遣人辭母而已自是堅措置軍事皆與李徳林謀之時軍書日以百數徳林口授數人文意百端不加治㸃司馬消難以鄖隨温應土順沔儇岳九州及魯山等八鎮來降遣其子永為質以求援八月己未詔以消難為大都督總督九州八鎮諸軍事司空賜爵隨公庚申詔鎮西將軍樊毅進督沔漢諸軍事南豫州刺史任忠帥衆趣厯陽超武將軍陳慧紀為前軍都督趣南兖州周益州總管王謙亦不附丞相堅起巴蜀之兵以攻始州梁睿至漢川不得進堅即以睿為行軍元帥以討謙梁世宗使中書舍人柳莊奉書入周丞相堅執莊手曰孤昔以開府從役江陵深蒙梁主殊眷今主㓜時難猥蒙顧託梁主弈葉委誠朝廷當相與共保歲寒時諸將競勸梁主舉兵與尉遲迥連謀以為進可以盡節周氏退可以席卷山南梁主疑未決㑹莊至具道堅語且曰昔袁紹劉表王凌諸葛誕皆一時雄傑據要地擁彊兵然功業莫就禍不旋踵者良由魏晉挾天子保京都仗大順以為名故也今尉遲迥雖曰舊將昏耄已甚司馬消難王謙常人之下者非有匡合之才周朝將相多為身計競効節於楊氏以臣料之迥等終當覆滅隨公必移周祚未若保境息民以觀其變梁主深然之衆議遂止髙熲至軍為橋於沁水尉遲惇於上流縱火栰熲豫為土狗以禦之惇布陳二十餘里麾兵少却欲待孝寛軍半度而擊之孝寛因其却鳴鼔齊進軍既度熲命焚橋以絶士卒反顧之心惇兵大敗單騎走孝寛乗勝進追至鄴庚午迥與惇及惇弟西都公祐悉將其卒十三萬陳於城南迥别統萬人皆綠巾錦襖號曰黄龍兵迥弟勤帥衆五萬自青州赴迥以三千騎先至迥素習軍旅老猶被甲臨陳其麾下兵皆關中人為之力戰孝寛等軍不利而却鄴中士民觀戰者數萬人行軍總管宇文忻曰事急矣吾當以詭道破之乃先射觀者觀者皆走轉相騰籍聲如雷霆忻乃傳呼曰賊敗矣衆復振因其擾而乘之迥軍大敗走保鄴城孝寛縱兵圍之李詢及思安伯代人賀婁子幹先豋崔𢎞度妺先適迥子為妻及鄴城破迥窘迫升樓𢎞度直上龍尾追之迥彎弓將射𢎞度𢎞度脱兠鍪謂迥曰頗相識不今日各圖國事不得顧私以親戚之情謹遏亂兵不許侵辱事勢如此早為身計何所待也迥擲弓於地罵左丞相極口而自殺𢎞度顧其弟𢎞升曰汝可取迥頭𢎞升斬之軍士在小城中者孝寛盡阬之勤惇祐東走青州未至開府儀同大將軍郭衍追獲之丞相堅以勤初有誠欵特不之罪李惠先自縳歸罪堅復其官爵迥末年衰耄及起兵以小御正崔達拏為長史逹拏暹之子也文士無籌略舉措多失凡六十八日而敗于仲文軍至蓼隄去梁郡七里檀讓擁衆數萬仲文以羸師桃戰而偽北讓不設備仲文還擊大破之生獲五千餘人斬首七百級進攻梁郡迥守將劉子寛棄城走仲文進擊曹州獲迥所署刺史李仲康檀讓以餘衆屯成武仲文襲擊破之遂拔成武迥將席毗羅衆十萬屯沛縣將攻徐州其妻子在金鄉仲文遣人詐為毗羅使者謂金鄉城主徐善淨曰檀讓明日午時至金鄉宣蜀公令賞賜將士金鄉人皆喜仲文簡精兵偽建迥旗幟倍道而進善淨望見以為檀讓出迎謁仲文執之遂取金鄉諸將多勸屠其城仲文曰此城乃毗羅起兵之所當寛其妻子其兵自歸如即屠之彼望絶矣衆皆稱善於是毗羅恃衆來薄官軍仲文設伏擊之毗羅軍大潰争投洙水死水為之不流獲檀讓檻送京師斬毗羅傳首韋孝寛分兵討闗東叛者悉平之堅徙相州於安陽毁鄴城及邑居分相州置毛州魏州梁主聞迥敗謂桞莊曰若從衆人之言社稷已不守矣丞相堅之初得政也待黄公劉昉沛公鄭譯甚厚賞賜不可勝計委以心膂言無不從朝野傾屬稱為黄沛二人皆恃功驕恣溺於財利不親職務及辭監軍堅始踈之恩禮漸薄髙熲自軍所還寵遇日隆時王謙司馬消難未平堅憂之忘寢與食而昉逸逰縦酒相府事多遺落堅乃以髙熲代昉為司馬不忍廢譯隂敕官屬不得白事於譯譯猶坐聽事無所闗預惶懼頓首求解職堅猶以恩禮慰勉之周王誼帥四總管至鄖州司馬消難擁其衆以魯山甑山二鎮來奔九月庚戌以隋世子勇為洛州總管東京小冡宰總統舊齊之地壬子以左丞相堅為大丞相罷左右丞相之官冬十月周丞相堅殺陳惑王純及其子周梁睿將歩騎二十萬討王謙謙分命諸將據險拒守睿奮擊屢破之蜀人大駭謙遣其將逹奚惎髙阿那肱乙弗䖍等帥衆十萬攻利州堰江水以灌之城中戰士不過二千總管昌黎豆盧勣晝夜拒守凡四旬時出竒兵擊惎等破之㑹梁睿至惎等遁去睿自劒閣入進逼成都謙令逹奚惎乙弗䖍城守親帥精兵五萬背城結陳睿擊之謙戰敗將入城惎䖍以城降謙將麾下三十騎走新都新都令王寶執之戊寅睿斬謙及髙阿那肱劒南平十二月甲子周以大丞相堅為相國總百揆去都督内外大冡宰之號進爵為王以安陸等二十郡為隋國賛拜不名備九錫之禮堅受王爵十郡而已十三年春二月甲寅隋王始受相國百揆九錫之命建臺置官丙辰詔進王妃獨孤氏為王后世子勇為太子開府儀同大將軍庚季才勸隋王宜以今月甲子應天受命太傅李穆開府儀同大將軍盧賁亦勸之於是周主下詔遜居别宫甲子命兼太傅把公椿奉册大宗伯趙煚奉皇帝璽紱禪位于隋隋王冠逺逰冠受冊璽改服紗㡌黄袍入御臨光殿服衮冕如元㑹之儀大赦改元開皇命有司奉冊祠于南郊遣少冡宰元孝矩代太子勇鎮洛陽孝矩名矩以字行天賜之孫也女為太子妃少内史崔仲方勸隋主除周六官依漢魏之舊從之置三師三公及尚書門下内史秘書内侍五省御史都水二臺太常等十一寺左右衛等十二府以分司統職又置上柱國至都督十一等勲官以酬勤勞特進至朝散大夫七等散官以加文武官之有徳聲者改侍中為納言以相國司馬髙熲為尚書左僕射兼納言相國司錄京兆虞慶則為内史監兼吏部尚書相國内郎李徳林為内史令乙丑追尊皇考為武元皇帝廟號太祖皇妣吕氏為元明皇后丙寅脩廟社立王后獨孤氏為皇后王太子勇為皇太子丁夘以大將軍趙煚為尚書右僕射己巳封周靜帝為介公周氏諸王皆降爵為公初劉鄭矯詔以隋主輔政楊后雖不預謀然以嗣主㓜冲恐權在佗族聞之甚喜後知其父有異圖意頗不平形於言色及禪位憤惋逾甚隋主内甚愧之改封樂平公主乆之欲奪其志公主誓不許乃止隋主與周載下大夫北平榮建緒有舊隋主將受禪建緒為息州刺史將之官隋主謂曰且躊躇當共取富貴建緒正色曰明公此㫖非僕所聞及即位來朝帝謂之曰卿亦悔不建緒稽首曰臣位非徐廣情類楊彪帝笑曰朕雖不曉書語亦知卿此言不遜上柱國竇毅之女聞隋受禪自投堂下撫膺太息曰恨我不為男子救舅氏之患毅及襄陽公主掩其口曰汝勿妄言滅吾族毅由是竒之及長以適唐公李淵淵昞之子也虞慶則勸隋主盡滅宇文氏髙熲楊惠亦依違從之李徳林固爭以為不可隋主作色曰君書生不足與議此於是周太祖孫譙公乾憚冀公絢閔帝子紀公湜明帝子鄷公真宋公實髙祖子漢公贊秦公贄曹公允道公充蔡公兊荆公元宣帝子萊公衍郢公述皆死徳林由是品位不進五月隋主濳害周靜帝葬于㳟陵以其族人洛為嗣始興王謀逆陳宣帝大建十三年冬十二月始興王叔陵太子之次弟也與太子異母母曰彭貴人叔陵為江州刺史性苛刻狡險新安王伯固以善諧謔有寵於上及太子叔陵疾之隂求其過失欲中之以法叔陵入為楊州刺史事務多關渉省閤執事承意順㫖即諷上進用之㣲致違忤必抵以大罪重者至殊死伯固憚之乃謟求其意叔陵好發古冢伯固好射雉常相從郊野大相欵狎因密圖不軌伯固為侍中毎得密語必告叔陵十四年春正月己酉上不豫太子與始興王叔陵長沙王叔堅並入侍疾叔陵隂有異志命典藥吏曰切藥刀甚鈍可礪之甲寅上殂倉猝之際叔陵命左右於外取劔左右弗悟取朝服木劔以進叔陵怒叔堅在側聞之疑有變伺其所為乙夘小歛太子哀哭俯伏叔陵抽剉藥刀斫太子中項太子悶絶于地母柳皇后走來救之又斫后數下乳媪吳氏自後掣其肘太子乃得起叔陵持太子衣太子自奮得免叔堅手搤叔陵奪去其刀仍牽就柱以其褶袖縳之時吳媪已扶太子避賊叔堅求太子所在欲受生殺之命叔陵多力奮袖得脱突走出雲龍門馳車還東府召左右斷青溪道赦東城囚以充戰士散金帛賞賜又遣人往新林追其所部兵仍自被甲著白布㡌登城西門招募百姓又召諸王將帥莫有至者惟新安王伯固單馬赴之助叔陵指揮叔陵兵可千人欲據城自守時衆軍並縁江防守臺内空虛叔堅白柳后使太子舍人河内司馬申以太子命召右衛將軍蕭摩訶入見受敕帥馬歩數百趣東府屯城西門叔陵惶恐遣記室韋諒送其鼓吹與摩訶謂之曰事捷必以公為台鼎摩訶紿報之曰須王心膂節將自來方敢從命叔陵遣其所親戴温譚騏驎詣摩訶摩訶執以送臺斬其首徇東城叔陵自知不濟入内沈其妃張氏及寵妾十人于井帥步騎數百自小航度欲趣新林乗舟奔隋行至白楊路為臺軍所邀伯固見兵至旋避入巷叔陵馳騎拔刄追之伯固復還叔陵部下多棄甲潰去摩訶馬容陳智深迎刺叔陵僵仆陳仲華就斬其首伯固為亂兵所殺自寅至己乃定叔陵諸子並賜死伯固諸子宥為庶人韋諒及前衡陽内史彭暠諮議參軍兼記室鄭信典籖俞公喜並伏誅暠叔陵舅也信諒有寵於叔陵常參謀議諒粲之子也丁巳太子即皇帝位大赦癸亥以長沙王叔堅為驃騎將軍開府儀同三司楊州刺史蕭摩訶為車騎將軍南徐州刺史封綏逺公始興王叔陵家金帛累巨萬悉以賜之以司馬申為中書通事舍人乙丑尊皇后為皇太后時帝病創卧承香殿不能聽政太后居柏梁殿百司衆務皆決於太后帝創愈乃歸政焉丁夘封皇弟叔重為始興王奉昭烈王祀秋九月丙午以長沙王叔堅為司空將軍刺史如故長城公至徳元年初上病創不能視事政無大小皆決於長沙王叔堅權傾朝廷叔堅頗驕縱上由是忌之都官尚書山隂孔範中書舍人施文慶皆惡叔堅而有寵於上日夕求其短構之於上上乃即叔堅驃騎將軍本號用三司之議出為江州刺史以祠部尚書江總為吏部尚書秋八月長沙王叔堅未之江州復留為司空實奪之權冬十二月丙辰司空長沙王叔堅免叔堅既失恩心不自安乃為厭媚醮日月以求福或上書告其事帝召叔堅囚于西省將殺之令近侍宣敕數之叔堅對曰臣之本心非有佗故但欲求親媚耳臣既犯天憲罪當萬死臣死之日必見叔陵願宣明詔責之於九泉之下帝乃赦之免官而已通鑑紀事本末卷二十五上欽定四庫全書通鑑紀事本末卷二十五下宋袁樞撰隋滅陳陳宣帝太建十三年春隋主既受周禪三月戊子以上開府儀同三司賀若弼為呉州總管鎮廣陵和州刺史河南韓擒虎為廬州總管鎮廬江隋主有并吞江南之志問將帥於髙熲熲薦弼與擒虎故置於南邊使潛為經畧長城公至徳二年上於光昭殿前起臨春結綺望仙三閣各髙數十丈連延數十間其牎牖壁帶縣楣欄檻皆以沉檀為之飾以金玉間以珠翠外施珠簾内有寶牀寶帳其服玩瑰麗近古所未有毎微風暫至香聞數里其下積石為山引水為池雜植竒花異卉上自居臨春閣張貴妃居結綺閣龔孔二貴嬪居望仙閣並複道交相往來又有王李二美人張薛二淑媛袁昭儀何婕妤江脩容並有寵迭逰其上以宫人有文學者袁大捨等為女學士僕射江總雖為宰輔不親政務日與都官尚書孔範散騎常侍王瑳等文士十餘人侍上遊宴後庭無復尊卑之序謂之狎客上毎飲酒使諸妃嬪及女學士與狎客共賦詩互相贈答采其尤艶麗者被以新聲選宫女千餘人習而歌之分部迭進其曲有玉樹後庭花臨春樂等大抵皆羙諸妃嬪之容色君臣酣歌自夕達旦以此為常張貴妃名麗華本兵家女為龔貴嬪侍兒上見而說之得幸生太子深貴妃髮長七尺其光可鑑性敏慧有神彩進止閒華毎瞻視眄睞光采溢目照映左右善候人主顔色引薦諸宫女後宫咸徳之競言其善又有厭魅之術常置滛祀於宫中聚女巫鼓舞上怠於政事百司啟奏並因宦者蔡脱兒李善度進請上倚隠囊置張貴妃於膝上共決之李蔡所不能記者貴妃並為條䟽無所遺脱因參訪外事人間有一言一事貴妃必先知白之由是益加寵異冠絶後宫宦官近習内外連結援引宗戚縱横不法賣官鬻獄貨賂公行賞罰之命不出於外大臣有不從者因而譖之於是孔張之權熏灼四方大臣執政皆從風謟附孔範與孔貴嬪結為兄妺上惡聞過失毎有惡事孔範必曲為文飾稱揚贊羙由是寵遇優渥言聽計從羣臣有諌者輙以罪斥之中書舍人施文慶頗涉書史嘗事上於東宫聰敏彊記明閑吏職心筭口占應時條理由是大被親幸又薦所善吳興沈客卿陽惠朗徐哲暨慧景等云有吏能上皆擢用之以客卿為中書舍人客卿有口辯頗知朝廷典故兼掌金帛局舊制軍人士人並無闗市之稅上盛脩宫室窮極耳目府庫虛空有所興造恒苦不給客卿奏請不問士庶並責關市之征而又増重其舊於是以陽惠朗為太市令暨慧景為尚書金倉都令史二人家本小吏考校簿領毫釐不差然皆不達大體督責苛碎聚歛無厭士民嗟怨客卿總督之毎歲所入過於常格數十倍上大悦益以施文慶為知人尤加親重小大衆事無不委任轉相汲引珥貂蟬者五十人孔範自謂文武才能舉朝莫及從容白上曰外間諸將起自行伍匹夫敵耳深見逺慮豈其所知上以問施文慶文慶畏範亦以為然司馬申復贊之自是將帥㣲有過失即奪其兵分配文吏奪任忠部曲以配範及蔡徵由是文武解體以至覆滅三年初北地傅縡以庻子事上於東宫及即位遷祕書監右衛將軍兼中書通事舍人負才使氣人多怨之施文慶沈客卿共譖縡受髙麗使金上收縡下獄縡於獄中上書曰夫君人者恭事上帝子愛下民省嗜欲逺謟佞未明求衣日旰忘食是以澤被區宇慶流子孫陛下頃來酒色過度不䖍郊廟大神専媚滛昏之鬼小人在側宦豎弄權惡忠直若仇讎視生民如草芥後宫曳綺繡廐馬餘菽粟百姓流離殭尸蔽野貨賄公行帑藏損耗神怒民怨衆叛親離臣恐東南王氣自斯而盡書奏上大怒頃之意稍解遣使謂縡曰我欲赦卿卿能改過不對曰臣心如面臣面可改則臣心可改上益怒令宦者李善慶窮治其事遂賜死獄中上毎當郊祀常稱疾不行故縡言及之禎明元年初隋主受禪以來與陳鄰好甚篤毎獲陳諜皆給衣馬禮遣之而髙宗猶不禁侵掠故太建之末隋師入冦㑹髙宗殂隋主即命班師遣使赴弔書稱姓名頓首帝答之益驕書末云想彼統内如此宜宇宙清㤗隋主不恱以示朝臣上柱國楊素以為主辱臣死再拜請罪隋主問取陳之䇿於髙熲對曰江北地寒田收差晩江南水田早熟量彼收穫之際㣲徵士馬聲言掩襲彼必屯兵守禦足得廢其農時彼既聚兵我便解甲再三若此彼以為常後更集兵彼必不信猶豫之頃我乃濟師豋陸而戰兵氣益倍又江南土薄舍多茅竹所有儲積皆非地窖密遣行人因風縱火待彼脩立復更燒之不出數年自可財力俱盡隋主用其䇿陳人始困於是楊素賀若弼及光州刺史髙勱虢州刺史崔仲方等爭獻平江南之䇿仲方上書曰今惟須武昌以下蘄和滁方呉海等州更帖精兵密營度計益信襄荆基郢等州速造舟楫多張形勢為水戰之具蜀漢二江是其上流水路衝要必爭之所賊雖於流頭荆門延州公安巴陵隱磯夏首蘄口湓城置船然終聚漢口峽口以水戰大決若賊必以上流有軍令精兵赴援者下流諸將即須擇使横度如擁衆自衛上江諸軍鼓行以前彼雖恃九江五湖之險非徳無以為固徒有三吳百越之兵無恩不能自立矣隋主以仲方為基州刺史及受蕭巖等降隋主益忿謂髙熲曰我為民父母豈可限一衣帶水不拯之乎命大作戰船人請密之隋主曰吾將顯行天誅何密之有使投其柹於江曰若彼懼而能改吾復何求楊素在永安造大艦名曰五牙上起樓五層髙百餘尺左右前後置六拍竿並髙五十尺容戰士八百人次曰黄龍置兵百人自餘平乗舴艋各有等差晉州刺史皇甫續將之官稽首言陳有三可滅帝問其狀對曰大吞小一也以有道伐無道二也納叛臣蕭巖於我有詞三也陛下若命將出師臣願展絲髮之効隋主勞而遣之時江南妖異特衆臨平湖草乆塞忽然自開帝惡之乃自賣於佛寺為奴以厭之又於建康造大皇寺起七級浮圖未畢火從中起而焚之呉興章華好學善屬文朝臣以華素無伐閱競排詆之除大市令華鬱鬱不得志上書極諫畧曰昔髙祖南平百越北誅逆虜世祖東定吴㑹西破王琳髙宗克復淮南辟地千里三祖之功勤亦至矣陛下即位于今五年不思先帝之艱難不知天命之可畏溺於嬖寵惑於酒色祀七廟而不出拜三妃而臨軒老臣宿將棄之草莽謟諛讒邪升之朝廷今疆場日蹙隋軍壓境陛下如不改絃易張臣見麋鹿復遊於姑蘇矣帝大怒即日斬之先是隋徵梁主入朝梁叔父安平王巖弟義興王瓛來犇二年春正月遣散騎常侍袁雅等聘于隋又遣散騎常侍九江周羅㬋將兵屯峽口侵隋峽州三月甲戍隋遣兼散騎常侍程尚賢等來聘戊寅隋主下詔曰陳叔寶據手掌之地恣溪壑之險刼奪閭閻資産俱竭驅逼内外勞役弗已窮奢極侈俾晝作夜斬直言之客滅無罪之家欺天造惡祭鬼求恩盛粉黛而執干戈曳羅綺而呼警蹕自古昏亂罕或能比君子濳逃小人得志天災地孽物怪人妖衣冠鉗口道路以目重以背徳違言揺蕩疆場晝伏夜逰䑕竊狗盜天之所覆無非朕臣每關聽覽有懐傷惻可出師授律應機誅殄在斯一舉永清呉越又送璽書暴帝二十惡仍散冩詔書三十萬紙遍諭江外冬十月己未隋置淮南行省於壽春以晉王廣為尚書令帝遣兼散騎常侍王琬兼通直散騎常侍許善心聘於隋隋人留於客館琬等屢請還不聽甲子隋以出師有事於太廟命晉王廣秦王俊清河公楊素皆為行軍元帥廣出六合俊出襄陽素出永安荆州刺史劉仁恩出江陵蘄州刺史王世積出蘄春廬州總管韓擒虎出廬江吳州總管賀若弼出廣陵青州總管𢎞農燕榮出東海凢總管九十兵五十一萬八千皆受晉王節度東接滄海西距巴蜀旌旗舟楫横亘數千里以左僕射髙熲為晉王元帥長史右僕射王韶為司馬軍中事皆取決焉區處支度無所凝滯十一月丁夘隋主親餞將士乙亥至定城陳師誓衆十二月隋軍臨江髙熲謂行臺吏部郎中薛道衡曰今茲大舉江東必可克乎道衡曰克之嘗聞郭璞有言江東分王三百年復與中國合今此數將周一也主上恭儉勤勞叔寶荒滛驕侈二也國之安危在所寄任彼以江總為相惟事詩酒拔小人施文慶委以政事蕭摩訶任蠻奴為大將皆一夫之用耳三也我有道而大彼無徳而小量其甲士不過十萬西自巫峽東至滄海分之則勢懸而力弱聚之則守此而失彼四也席卷之勢事在不疑熲忻然曰得君言成敗之理令人豁然本以才學相期不意籌略乃爾秦王俊督諸軍屯漢口為上流節度詔以散騎常侍周羅㬋都督巴峽縁江諸軍事以拒之楊素引舟師下三峽軍至流頭灘將軍戚昕以青龍百餘艘兵數千人守狼尾灘地勢險峭隋人患之素曰勝負大計在此一舉若晝日下船彼見我虚實灘流迅激制不由人則吾失其便不如以夜掩之素親帥黄龍數千艘銜枚而下遣開府儀同三司王長襲引歩卒自南岸擊昕别柵大將軍劉仁恩帥甲騎自北岸趣白沙遲明而至擊之昕敗走悉俘其衆勞而遣之秋毫不犯素帥水軍東下舟艫被江旌甲曜日素坐平乗大船容貎雄偉陳人望之皆懼曰清河公即江神也江濵鎮戍聞隋軍將至相繼奏聞施文慶沈客卿並抑而不言初上以蕭巖蕭瓛梁之宗室擁衆來奔心忌之故逺散其衆以巖為東揚州刺史瓛為吳州刺史使領軍任忠出守吳興郡以襟帶二州使南平王嶷鎮江州永嘉王彦鎮南徐州尋召二王赴明年元㑹命縁江諸防船艦悉從二王還都為威勢以示梁人之來者由是江中無一鬭船上流諸州兵皆阻楊素軍不得至湘州刺史晉熈王叔文在職既久大得人和上以其據有上流隂忌之自度素與羣臣少恩恐不為用無可任者乃擢施文慶為都督湘州刺史配以精兵二千欲令西上仍徵叔文還朝文慶深喜其事然懼出外之後執事者持己短長因進其黨沈客卿以自代未發間二人共掌機密護軍將軍樊毅言於僕射袁憲曰京口采石俱是要地各須銳兵五千并出金翅二百縁江上下以為防備憲及驃騎將軍蕭摩訶皆以為然乃與文武羣臣共議請如毅䇿施文慶恐無兵從已廢其述職而客卿又利文慶之任已得專權俱言於朝曰必有議論不假面陳但作文啟即為通奏憲等以為然二人齎啟入白帝曰此是常事邊城將帥足以當之若出人船必恐驚擾及隋軍臨江間諜驟至憲等殷勤奏請至於再三文慶曰元㑹將逼南郊之日太子多從今若出兵事便廢闕帝曰今且出兵若北邊無事因以水軍從郊何為不可又曰如此則聲聞鄰境便謂國弱後又以貨動江總總内為之逰說帝重違其意而迫羣官之請乃令付外詳議總又抑憲等由是議久不決帝從容謂侍臣曰王氣在此齊兵三來周師再來無不摧敗彼何為者邪都官尚書孔範曰長江天塹古以為限隔南北今日隋軍豈能飛度邪邊將欲作功勞妄言事急臣毎患官卑虜若度江臣定作太尉公矣或妄言北軍馬死範曰此是我馬何為而死帝笑以為然故不為深備奏伎縱酒賦詩不輟隋文帝開皇九年春正月乙丑朔陳主朝㑹羣臣大霧四塞入人鼻皆辛酸陳主昬睡至哺時乃寤是日賀若弼自廣陵引兵濟江先是弼以老馬多買陳船而匿之買弊船五六十艘置於瀆内陳人覘之以為内國無船弼又請縁江防人毎交代之際必集廣陵於是大列旗幟營幕被野陳人以為隋兵大至急發兵為備既知防人交代其衆復散後以為常不復設備又使兵縁江時獵人馬喧譟故弼之濟江陳人不覺韓擒虎將五百人自横江宵濟采石守者皆醉遂克之晉王廣帥大軍屯六合鎮桃葉山丙寅采石戌主徐子建馳啟告變丁邜召公卿入議軍旅戊辰陳主下詔曰犬羊陵縱侵竊郊畿蜂蠆有毒宜時掃定朕當親御六師廓清八表内外並可戒嚴以驃騎將軍蕭摩訶護軍將軍樊毅中領軍魯廣逹並為都督司空司馬消難湘州刺史施文慶並為大監軍遣南豫州刺史樊猛帥舟師出白下散騎常侍臯文奏將兵鎮南豫州重立賞格僧尼道士盡令執役庚午賀若弼攻拔京口執南徐州刺史黄恪弼軍令嚴肅秋毫不犯有軍士於民間酤酒者弼立斬之所俘獲六千餘人弼皆釋之給糧勞遣付以勑書令分道宣諭於是所至風靡樊猛在建康其子廵攝行南豫州事辛未韓擒虎進攻姑孰半日拔之執廵及其家口臯文奏敗還江南父老素聞擒虎威信來謁軍門者晝夜不絶魯廣達之子世貞在新蔡與其弟世雄及所部降於擒虎遣使致書招廣達廣達時屯建康自劾詣廷尉請罪陳主慰勞之加賜黄金遣還營樊猛與左衛將軍蔣元遜將青龍八十艘於白下逰奕以禦六合兵陳主以猛妻子在隋軍懼有異志欲使鎮東大將軍任忠代之令蕭摩訶徐諭猛猛不恱陳主重傷其意而止於是賀若弼自北道韓擒虎自南道並進縁江諸戌望風盡走弼分兵斷曲阿之衝而入陳主命司徒豫章王叔英屯朝堂蕭摩訶屯樂逰苑樊毅屯耆闍寺魯廣達屯白土岡忠武將軍孔範屯寶田寺己夘任忠自吳興入赴仍屯朱雀門辛未賀若弼進據鍾山頓白土岡之東晉王廣遣總管杜彦與韓擒虎合軍步騎二萬屯于新林蘄州總管王世積以舟師出九江破陳將紀頊於蘄口陳人大駭降者相繼晉王廣上狀帝大悅宴賜羣臣時建康甲士尚十餘萬人陳主素怯懦不達軍事惟晝夜啼泣臺内處分一以委施文慶文慶既知諸將疾已恐其有功乃奏曰此等怏怏素不伏官迫此事機那可専信由是諸將凢有啟請率皆不行賀若弼之攻京口也蕭摩訶請將兵逆戰陳主不許及弼至鍾山摩訶又曰弼懸軍深入壘塹未堅出兵掩襲可以必克又不許陳主召摩訶任忠等於内殿議軍事忠曰兵法客貴速戰主貴持重今國家足食足兵宜固守臺城縁淮立柵北軍雖來勿與交戰分兵斷江路無令彼信得通給臣精兵一萬金翅三百艘下江徑掩六合彼大軍必謂其度江將士已被俘獲自然挫氣淮南土人與臣舊相知悉今聞臣往必皆景從臣復揚聲欲往徐州斷彼歸路則諸軍不擊自去待春水既漲上江周羅㬋等衆軍必沿流赴援此良䇿也陳主不能從明日欻然曰兵久不決令人腹煩可呼蕭郎一出擊之任忠叩頭苦請勿戰孔範又奏請作一决當為官勒石燕然陳主從之謂摩訶曰公可為我一決摩訶曰從來行陣為國為身今日之事兼為妻子陳主多出金帛賦諸軍以充賞甲申使魯廣達陳於白土岡居諸軍之南任忠次之樊毅孔範又次之蕭摩訶軍最在北諸軍南北亘二十里首尾進退不相知賀若弼將輕騎登山望見衆軍因馳下與所部七總管楊牙員明等甲士凡八千勒陳以待之陳主通於蕭摩訶之妻故摩訶初無戰意惟魯廣達以其徒力戰與弼相當隋師退走者數四弼麾下死者二百七十二人弼縱烟以自隱窘而復振陳兵得人頭皆走獻陳主求賞弼知其驕惰更引兵趣孔範範兵暫交即走陳諸軍顧之騎卒亂潰不可復止死者五千人貟明擒蕭摩訶送於弼弼命牽斬之摩訶顔色自若乃釋而禮之任忠馳入臺見陳主言敗狀曰官好住臣無所用力矣陳主與之金兩縢使募人出戰忠曰陛下惟當具舟楫就上流衆軍臣以死奉衛陳主信之敕忠出部分令宫人装束以待之怪其久不至時韓擒虎自新林進軍忠已帥數騎迎降於石子岡領軍蔡徵守朱雀航聞擒虎將至衆懼而潰忠引擒虎軍直入朱雀門陳人欲戰忠揮之曰老夫尚降諸軍何事衆皆散走於是城内文武百司皆遁出惟尚書僕射袁憲在殿中尚書令江總等數人居省中陳主謂袁憲曰我從來接遇卿不勝餘人今日但以追愧非惟朕無徳亦是江東衣冠道盡陳主遑遽將避匿憲正色曰北兵之入必無所犯大事如此陛下去欲安之臣願陛下正衣冠御正殿依梁武帝見侯景故事陳主不從下榻馳去曰鋒刃之下未可交當吾自有計從宫人十餘出後堂景陽殿將自投於井憲苦諫不從後閤舍人夏侯公韻以身蔽井陳主與爭久之乃得入既而軍人窺井呼之不應欲下石乃聞呌聲以繩引之驚其太重及出乃與張貴妃孔貴嬪同束而上沈后居處如常太子深年十五閉閤而坐舍人孔伯魚侍側軍士叩閤而入深安坐勞之曰戎旅在塗不至勞也軍士咸致敬焉時陳人宗室王侯在建康者百餘人陳主恐其為變皆召入令屯朝堂使豫章王叔英總督之又隂為之備及臺城失守相帥出降賀若弼乘勝至樂逰苑魯廣達猶督餘兵苦戰不息所殺獲數百人㑹日暮乃解甲面臺再拜慟哭謂衆曰我身不能救國負罪深矣士卒皆涕泣歔欷遂就擒諸門衛皆走弼夜燒北掖門入聞韓擒虎已得陳叔寶呼視之叔寶惶懼流汗股慄向弼再拜弼謂之曰小國之君當大國之卿拜乃禮也入朝不失作歸命侯無勞恐懼既而耻功在韓擒虎後與擒虎相訽挺刄而出欲令蔡徵為叔寶作降箋命乘騾車歸已事不果弼置叔寶於徳教殿以兵衛守髙熲先入建康熲子徳𢎞為晉王廣記室廣使徳𢎞馳詣熲所令留張麗華熲曰昔太公蒙面以斬妲己今豈可留麗華乃斬之於青溪徳𢎞還報廣變色曰昔人云無徳不報我必有以報髙公矣由是恨熲丙戌晉王廣入建康以施文慶受委不忠曲為謟佞以蔽耳目沈客卿重賦厚歛以悦其上與太市令陽慧朗刑法監徐析尚書都令史暨慧皆為民害斬於石關下以謝三吳使髙熲與元帥府記室裴矩收圖籍封府庫資財一無所取天下皆稱廣以為賢矩讓之之弟子也廣以賀若弼先期決戰違軍令收以屬吏上驛召之詔廣曰平定江表弼與韓擒虎之力也賜物萬叚又賜弼與擒虎詔羙其功開府儀同三司王頒僧辯之子也夜發陳髙祖陵焚骨取灰投水而飲之既而自縛歸罪於晉王廣廣以聞上命赦之詔陳髙祖世祖髙宗陵總給五户分守之上遣使以陳亡告許善心善心衰服號哭於西階之下籍草東向坐三日敕書唁焉明日有詔就館拜通直散騎常侍賜衣一襲善心哭盡哀入房改服復出北面立垂泣再拜受詔明日乃朝伏泣於殿下悲不能興上顧左右曰我平陳國惟獲此人既能懐其舊君即我之誠臣也敕以本官直門下省陳水軍都督周羅㬋與郢州刺史荀法尚守江夏秦王俊督三十六總管水陸十餘萬屯漢口不得進相持踰月陳荆州刺史陳慧紀遣南康内史吕忠肅屯岐亭據巫峽於北岸鑿巖綴鐵鎖三條横截上流以遏隋船忠肅竭其私財以充軍用楊素劉仁恩奮兵擊之四十餘戰忠肅守險力爭隋兵死者五千餘人陳人盡取其鼻以求功賞既而隋師屢捷獲陳之士卒三縱之忠肅棄柵而遁素徐去其鎻忠肅復據荆門之延洲素遣巴蜑千人乘五牙四艘以拍竿碎其十餘艦遂大破之俘甲士三千餘人忠肅僅以身免陳信州刺史顧覺屯安蜀城棄城走陳慧紀屯公安悉燒其儲蓄引兵東下於是巴陵以東無復城守者陳慧紀帥將士三萬人樓船千餘艘㳂江而下欲入援建康為秦王俊軍所拒不得前是時陳晉熈王叔文罷湘州還至巴州慧紀推叔文為盟主而叔文已帥巴州刺史畢寶等致書請降於俊俊遣使迎勞之㑹建康平晉王廣命陳叔寶手書招上江諸將使樊毅詣周羅㬋陳慧紀子正業詣慧紀諭指時諸城皆解甲羅㬋乃與諸將大臨三日放兵散然後詣俊降陳慧紀亦降上江皆平楊素下至漢口與俊㑹王世積在蘄口聞陳已亡移書告諭江南諸郡於是江州司馬黄偲棄城走豫章等諸郡太守皆詣世積降癸巳詔遣使者巡撫陳州郡二月乙未廢淮南行臺省陳呉州刺史蕭瓛能得物情陳亡吳人推瓛為主右衛大將軍武川宇文述帥行軍總管元契張黙言等討之落叢公燕榮以舟師自東海至亦受述節度陳永新侯陳君範自晉陵奔瓛并軍拒述述軍且至瓛立陣於晉陵城東留兵拒述遣其將王褒守吳州自義興入太湖欲掩述後述進破其柵廻兵擊瓛大破之又遣兵别道襲吳州王褒衣道士服棄城走瓛以餘衆保包山燕榮擊破之瓛將左右數人匿民家為人所執述進至奉公埭陳東揚州刺史蕭巖以㑹稽降與瓛皆送長安斬之楊素之下荆門也遣别將龎暉將兵畧地南至湘州城中將士莫有固志刻日請降刺史岳陽王叔慎年十八置酒㑹文武僚吏酒酣叔慎歎曰君臣之義盡於此乎長史謝基伏而流涕湘州助防遂興侯正理在坐乃起曰主辱臣死諸軍獨非陳國之臣乎今天下有難實致命之秋也縱其無成猶見臣節青臣之外有死不能今日之機不可猶豫後應者斬衆咸許諾乃刑牲結盟仍遣人詐奉降書於龎暉暉信之克期而入叔慎伏甲待之暉至執之以狥并其衆皆斬之叔慎坐于射堂招合士衆數日之内得五千人衡陽太守樊通武州刺史鄔居業皆請舉兵助之隋所除湘州刺史薛胄將兵適至與行軍總管劉仁恩共擊之叔慎遣其將陳正理與樊通拒戰兵敗胄乘勝入城擒叔慎仁恩破鄔居業於横橋亦擒之俱送秦王俊斬於漢口嶺南未有所附數郡共奉髙凉郡太夫人洗氏為主號聖母保境拒守詔遣柱國韋洸等安撫嶺外陳豫章太守徐璒據南康拒之洸等不得進晉王廣遣陳叔寶遺夫人書諭以國亡使之歸隋夫人集首領數千人盡日慟哭遣其孫馮魂帥衆迎洸洸擊斬徐璒入至廣州說諭嶺南諸州皆定表馮魂為儀同三司冊洗氏為宋康郡夫人洸夐之子也衡州司馬任瓌勸都督王勇據嶺南求陳氏子孫立以為帝勇不能用以所部來降瓌棄官去瓌忠之弟子也於是陳國皆平得州三十郡一百縣四百詔建康城邑宫室並平蕩耕墾更於石頭城置蔣州晉王廣班師留王韶鎮石頭委以後事三月己巳陳叔寶與其王公百司發建康詣長安大小在路五百里纍纍不絶帝命權分長安士民宅以俟之内外脩整遣使迎勞陳人至者如歸夏四月辛亥帝幸驪山親勞旋師乙巳諸軍凱入獻俘於太廟陳叔寶及諸王侯將相并乗輿服御天文圖籍等以次行列仍以鐵騎圍之從晉王廣秦王俊入列于殿庭拜廣為太尉賜輅車乗馬衮冕之服𤣥圭白璧丙午帝坐廣陽門觀引陳叔寶於前及太子諸王二十八人司空司馬消難以下至尚書郎凡二百餘人帝使納言宣詔勞之次使内史令宣詔責以君臣不能相輔乃至滅亡叔寶及其羣臣並愧懼伏地屏息不能對既而宥之初武元帝迎司馬消難與消難結為兄弟情好甚篤帝毎以叔父禮事之及平陳消難至特免死配為樂戸二旬而免猶以舊恩引見尋卒於家魯廣逹追傷本朝淪覆得疾不療憤慨而卒庚戌帝御廣陽門宴將士自門外夾道列布帛之積逹于南郭班賜各有差凡用三百餘萬段故陳之境内給復十年餘州免其年租賦樂安公元諧進曰陛下威徳逺被臣前請以突厥可汗為候正陳叔寶為令史今可用臣言矣帝曰朕平陳國本以除逆非欲誇誕公之所奏殊非朕心突厥不知山川何能警候叔寶昬醉寧堪驅使諧黙然而退辛酉進楊素爵為越公以其子元感為儀同三司元奬為清河郡公賜物萬段粟萬石命賀若弼登御坐賜物八千段加位上柱國進爵宋公仍各加賜金寶及陳叔寶妹為妾賀若弼韓擒虎爭功於帝前弼曰臣在蔣山死戰破其銳卒擒其驍將震揚威武遂平陳國韓擒虎略不交陳豈臣之比擒虎曰本奉明㫖令臣與弼同時合勢以取偽都弼乃敢先期逢賊遂戰致令將士傷死甚多臣以輕騎五百兵不血刄直取金陵降任蠻奴執陳叔寶據其府庫傾其巢穴弼至夕方扣北掖門臣啟關而納之斯乃救罪不暇安得與臣相比帝曰二將俱為上勲於是進擒虎位上柱國賜物八千叚有司劾擒虎放縱士卒滛汙陳宫坐此不加爵邑加髙熲上柱國進爵齊公賜物九千段帝勞之曰公伐陳後人言公反朕已斬之君臣道合非青蠅所能間也帝從容命熲與賀若弼論平陳事熲曰賀若弼先獻十䇿後於蔣山苦戰破賊臣文吏耳焉敢與大將論功帝大笑嘉其有讓帝之伐陳也使髙熲問方畧於上儀同三司李徳林以授晉王廣至是帝賞其功授柱國封郡公賞物三千段已宣敕訖或說髙熲曰今歸功於李徳林諸將必當憤惋且後世觀公有若虚行熲入言之乃止以秦王後為揚州總管四十四州諸軍事鎮廣陵晉王廣還并州晉王廣之戮陳五佞也未知都官尚書孔範散騎常侍王瑳王儀御史中丞沈瓘之罪故得免及至長安事並露乙未帝暴其過惡投之邊裔以謝吳越之人瑳刻薄貪鄙忌害才能儀傾巧側媚獻二女以求親昵瓘險慘苛酷發言邪謟故同罪焉帝給賜陳叔寶甚厚數得引見班同三品毎預宴恐致傷心為不奏呉音後監守者奏言叔寶云既無秩位毎預朝集願得一官號帝曰叔寶全無心肝監者又言叔寶常醉罕有醒時帝問飲酒㡬何對曰與其子弟日飲一石帝大驚使節其酒既而曰任其性不爾何以過日帝以陳氏子弟既多恐其在京城為非乃分置邊州給田業使為生嵗時賜衣服以安全之詔以陳尚書令江總為上開府儀同三司僕射袁憲驃騎蕭摩訶領軍任忠皆為開府儀同三司吏部尚書呉興姚察為秘書丞上嘉袁憲雅操下詔以為江表稱首授昌州刺史聞陳散騎常侍袁元友數直言於陳叔寶擢拜主爵侍郎謂羣臣曰平陳之初我悔不殺任蠻奴受人榮禄兼當重寄不能横尸狥國乃云無所用力與宏演納肝何其逺也帝見周羅㬋慰諭之許以富貴羅㬋垂泣對曰臣荷陳氏厚遇本朝淪亡無節可紀得免於死陛下之賜也何富貴之敢望賀若弼謂羅㬋曰聞公郢漢捉兵即知揚州可得王師利渉果如所量羅㬋曰若得與公周旋勝負未可知也頃之拜上儀同三司先是陳禆將羊翔來降伐陳之役使為鄉導位至上開府儀同三司班在羅㬋上韓擒虎於朝堂戲之曰不知機變乃立在羊翔之下能無愧乎羅㬋曰昔在江南乆承令問謂公天下節士今日所言殊非所望擒虎有愧色帝之責陳君臣也陳叔文獨欣然有得色既而復上表自陳昔在巴州已先送款乞知此情望異常例帝雖嫌其不忠而欲懐柔江表乃授叔文開府儀同三司拜宜州刺史初陳散騎常侍韋鼎聘於周遇帝而異之謂帝曰公當大貴貴則天下一家歲一周天老夫當委質於公及至徳之初鼎為太府卿盡賣田宅大匠卿毛彪問其故鼎曰江東王氣盡於此矣吾與爾當葬長安及陳平上召鼎為上儀同三司鼎叡之孫也壬戍詔曰今率土大同含生遂性太平之法方可流行凡我臣民澡身浴徳家家自脩人人克念兵可立威不可不戢刑可助化不可專行禁衛九重之餘鎮守四方之外戎旅軍器皆宜停罷世路既夷羣方無事武力之子俱可學經民間甲仗悉皆除毁頒告天下咸悉此意賀若弼撰其所畫䇿上之謂為御授平陳七䇿帝弗省曰公欲發揚我名我不求名公宜自載家傅弼位望隆重兄弟並封郡公為刺史列將家之珍玩不可勝計婢妾曵羅綺者數百時人榮之其後突厥來朝上謂之曰汝聞江南有陳國天子乎對曰聞之上命左右引突厥詣韓擒虎前曰此是執得陳國天子者擒虎厲色顧之突厥惶恐不敢仰視右衛將軍龎晃等短髙熲於上上怒皆黜之親禮逾密因謂熲曰獨孤公猶鏡也毎被磨瑩皎然益明初熲父賔為獨孤信僚佐賜姓獨孤氏故上常呼為獨孤而不名十四年冬閏十月甲寅詔以齊梁陳宗祀廢絶命髙仁英蕭琮陳叔寳以時脩祭所須器物有司給之陳叔寶從帝豋邙山侍飲賦詩曰日月光天徳山河北帝居太平無以報願上東封書拜表請封禪帝優詔答之它日復侍宴及出帝目之曰此敗豈不由酒以作詩之功何如思安時事當賀若弼度京口彼人密啟告急叔寶飲酒遂不之省髙熲至日猶見啟在床下未開封此誠可笑蓋天亡之也昔苻氏征伐所得國皆榮貴其主茍欲求名不知違天命與之官乃違天也仁壽四年冬十一月壬子陳叔寶卒贈大將軍長城縣公諡曰煬隋易太子陳宣帝大建十三年春二月甲子周禪位於隋王隋王以太子勇為皇太子封子鴈門公廣為晉王俊為秦王秀為越王諒為漢王隋文帝開皇二十年初上使太子勇參決軍國政事時有損益上皆納之勇性寛厚率意任情無矯飾之行上性節儉勇嘗文飾蜀鎧上見而不悦戒之曰自古帝王未有好奢侈而能乆長者汝為儲后當以儉約為先乃能奉承宗廟吾昔日衣服各留一物時復觀之以自警戒恐汝以今日皇太子之心亡昔時之事故賜汝以我舊所帶刀子一枚并葅醬一合汝昔作上士時常所食也若存記前事應知我心後遇冬至百官皆詣勇勇張樂受賀上知之問朝臣曰近聞至日内外百官相帥朝東宫此何禮也太常少卿辛亶對曰於東宫乃賀也不得言朝上曰賀者正可三數十人隨情各去何乃有司徵召一時普集太子法服設樂以待之可乎因下詔曰禮有等差君臣不雜皇太子雖居上嗣義兼臣子而諸方岳牧正冬朝賀任土作貢别上東宫事非典則宜悉停斷自是恩寵始衰漸生猜阻勇多内寵昭訓雲氏尤幸其妃元氏無寵遇心疾二日而薨獨孤后意有佗故甚責望勇自是雲昭訓専内政生長寧王儼平原王裕安成王筠髙良娣生安平王嶷襄城王恪王良媛生髙陽王該建安王韶成姬生頴川王煚後宫生孝實孝範后彌不平頗遣人伺察求勇過惡晉王廣知之彌自矯飾惟與蕭妃居處後庭有子皆不育后由是數稱廣賢大臣用事者廣皆傾心與交上及后毎遣左右至廣所無貴賤廣必與蕭妃迎門接引為設羙饌申以厚禮婢僕往來者無不稱其仁孝上與后嘗幸其第廣悉屏匿羙姬於别室惟留老醜者衣以縵綵給事左右屏帳改用縑素故絶樂器之絃不令拂去塵埃上見之以為不好聲色還宫以語侍臣意甚喜侍臣皆稱慶由是愛之特異諸子上宻令善相者來和徧視諸子對曰晉王眉上雙眉隆起貴不可言上又問上儀同三司韋鼎我諸兒誰得嗣位對曰至尊皇后所最愛者當與之非臣敢預知也上笑曰卿不肯顯言邪晉王廣羙姿儀性敏慧沈深嚴重好學善屬文敬接朝士禮極卑屈由是聲名籍甚冠於諸王廣為揚州總管入朝將還鎮入宫辭后伏地流涕后亦泫然泣下廣曰臣性識愚下常守平生昆弟之意不知何罪失愛東宫恒蓄盛怒欲加屠䧟毎恐讒譖生於投杼鴆毒遇於杯勺是用勤憂積念懼履危亡后忿然曰睍地伐漸不可耐我為之娶元氏女竟不以夫婦禮待之專寵阿雲使有如許豚犬前新婦遇毒而夭我亦不能窮治何故復於汝發如此意我在尚爾我死後當魚肉汝乎每思東宫竟無正嫡至尊千秋萬歲之後遣汝等兄弟向阿雲兒前再拜問訊此是幾許苦痛耶廣又拜嗚咽不能止后亦悲不自勝自是后決意欲廢勇立廣矣廣與安相總管宇文述素善欲述近已奏為壽州刺史廣尤親任總管司馬張衡衡為廣畫奪宗之䇿廣問計於述述曰皇太子失愛已乆令徳不聞於天下大王仁孝著稱才能蓋世數經將領頻有大功主上之與内宫咸所鍾愛四海之望實歸大王然廢立者國家大事處人父子骨肉之間誠未易謀也然能移主上意者惟楊素耳素所與謀者惟其弟約述雅知約請朝京師與約相見共圖之廣大恱多齎金寶資述入關約時為大理少卿素凡有所為皆先籌於約而行之述請約盛陳器玩與之酣暢因而共􅀶毎陽不勝所齎金寶盡輸之約約所得既多稍以謝述述因曰此晉王之賜令述與公為歡樂耳約大驚曰何為爾述因通廣意說之曰夫守正履道固人臣之常致反經合義亦逹者之令圖自古賢人君子莫不與時消息以避禍患公之兄弟功名蓋世當塗用事有年矣朝臣為足下家所屈辱者可勝數哉又儲后以所欲不行毎切齒於執政公雖自結於人主而欲危公者固亦多矣主上一旦棄群臣公亦何以取庇今皇太子失愛於皇后主上素有廢黜之心此公所知也今若請立晉王在賢兄之口耳誠能因此時建大功王必永銘骨髓斯則去累卵之危成太山之安也約然之因以白素素聞之大喜撫掌曰吾之智思殊不及此賴汝起予約知其計行復謂素曰今皇后之言上無不用因機㑹早自結託則長保榮禄傳祚子孫兄若遲疑一旦有變令太子用事恐禍至無日矣素從之後數日素入侍宴㣲稱晉王孝悌恭儉有類至尊用此揣后意后泣曰公言是也吾兒大孝愛毎聞至尊及我遣内使到必迎於境首言及違離未嘗不泣又其新婦亦大可憐我使婢去常與之同寢共食豈若睍地伐與阿雲對坐終日酣宴昵近小人疑阻骨肉我所以益憐阿􅐣者常恐其濳殺之素既知后意因盛言太子不才后遂遺素金使贊上廢立勇頗知其謀憂懼計無所出使新豐人王輔賢造諸厭勝又於後園作庶人村室屋卑陋勇時於中寢息布衣草褥冀以當之上知勇不自安在仁壽宫使楊素觀勇所為素至東宫偃息未入勇束帶待之素故乆不進以激怒勇勇銜之形於言色素還言勇怨望恐有佗變願深防察上聞素譖毁甚疑之后又遣人伺覘東宫纎介事皆聞奏因加誣飾以成其罪上遂踈忌勇廼於𤣥武門達至徳門量置候人以伺動靜皆隨事奏聞又東宫宿衛之人侍官以上名籍悉令屬諸衛府有勇健者咸屏去之出左衛率蘇孝慈為浙州刺史勇愈不悅太史令袁充言於上曰臣觀天文皇太子當廢上曰𤣥象久見羣臣不敢言耳充君正之子也晉王廣又令督王府軍事姑臧段達私賂東宫幸臣􅁎威令伺太子動靜密告楊素於是内外諠謗過失日聞叚達因脅􅁎威曰東宫過失主上皆知之矣已奉密詔定當廢立君能告之則大富貴威許諾即上書告之秋九月壬子上至自仁壽宫翌日御大興殿謂侍臣曰我新還京師應開懐歡樂不知何意飜邑然愁苦吏部尚書牛宏對曰臣等不稱職故至尊憂勞上既數聞譖毁疑朝臣悉知之故於衆中發問冀聞太子之過宏對既失㫖上因作色謂東宫官屬曰仁壽宫去此不逺而令我毎還京師嚴備仗衛如入敵國我為下利不解衣卧昨夜欲近厠故在後房恐有警急還移就前殿豈非爾輩欲壊我家國耶於是執太子左庶子唐令則等數人付所司訊鞠命楊素陳東宫事狀以告近臣素乃顯言之曰臣奉敕向京令皇太子檢校劉居士餘黨太子奉詔作色奮厲骨肉飛騰語臣云居士黨盡伏法遣我何處窮討爾作右僕射委寄不輕自檢校之何關我事又云若大事不遂我先被誅今作天子竟乃令我不如諸弟一事以上不得自遂因長歎回視云我大覺身妨上曰此兒不堪承嗣乆矣皇后恒勸我廢之我以布衣時所生地復居長望其漸改隠忍至今勇嘗指皇后侍兒謂人曰是皆我物此言幾許異事其婦初亡我深疑其遇毒嘗責之勇即懟曰㑹殺元孝矩此欲害我而遷怒耳長寜初生朕與皇后共抱養之自懐彼此連遣來索且雲定興女在外私合而生想此由來何必是其體𦙍昔晉太子取屠家女其兒即好屠割今儻非類便亂宗祏我雖徳慙堯舜終不以萬姓付不肖子我恒畏其加害如防大敵今欲廢之以安天下左衛大將軍五原公元旻諫曰廢立大事詔㫖若行後悔無及讒言罔極惟陛下察之上不應命姬威悉陳太子罪惡威對曰太子由來與臣語惟意在驕奢且云若有諌者正當斬之不過殺百許人自然永息營起臺殿四時不輟前蘇孝慈解左衛率太子奮髯揚肘曰大丈夫㑹當有一日終不忘之決當快意又宫内所須尚書多執法不與輒怒曰僕射以下吾㑹戮一二人使知慢我之禍毎云至尊惡我多側庶髙緯陳叔寶豈孽子乎常令師姥卜吉凶語臣云至尊忌在十八年此期促矣上泫然曰誰非父母生乃至於此朕近覽齊書見高歡縱其兒子不勝忿憤安可效尤邪於是禁勇及諸子部分收其黨與楊素舞文巧詆鍜鍊以成其獄居數日有司承素意奏元旻嘗曲事於勇情存附託在仁壽宫勇使所親裴宏以書與旻題云勿令人見上曰朕在仁壽宫有纎介事東宫必知疾於驛馬怪之甚乆豈非此徒邪遣武士執旻於仗右衛大將軍元胄時當下直不去因奏曰臣向不下直者為防元旻耳上以旻及裴宏付獄先是勇見老枯槐問此堪何用或對曰古槐尤宜取火時衛士皆佩火燧勇命工造數千枝欲以分賜左右至是獲於庫又藥藏局貯艾數斛索得之大以為怪以問姬威威曰太子此意别有所在至尊在仁壽宫太子常飼馬千匹云徑往守城門自然餓死素以威言詰勇勇不服曰竊聞公家馬數萬匹勇忝備太子馬千匹乃是反乎素又發東宫服翫似加琱飾者悉陳之於庭以示文武羣臣為太子之罪上及皇后迭遣使責問勇勇不服冬十月乙丑上使人召勇勇見使者警曰得無殺我邪上戎服陳兵御武徳殿集百官立於東面諸親立於西面引勇及諸子列於殿庭命内史侍即薛道衡宣詔廢勇及其男女為王公主者竝為庶人勇再拜言曰臣當伏尸都市為將來鑒戒幸䝉哀憐得全性命言畢泣下流襟既而舞蹈而去左右莫不閔黙長寧王儼上表乞宿衛辭情哀切上覽之閔然楊素進曰伏願聖心同於螫手不宜復留意己巳詔元旻唐令則及太子家令鄒文騰左衛率司馬夏侯福典膳監元淹前吏部侍郎蕭子寶前主璽下士何竦並處斬妻妾子孫皆沒官車騎將軍榆林閻毗東郡公崔君綽游騎尉沈福寶瀛州術士章仇太翼特免死各杖一百身及妻子資財田宅皆没官副將作大匠髙龍乂率更令晉文建通直散騎侍郎元衡皆處盡於是集羣官于廣陽門外宣詔戮之乃移勇於内史省給五品料食賜楊素物三千叚元胄楊約並千段賞鞠勇之功也文林郎楊孝政上書諫曰皇太子為小人所誤宜加訓誨不宜廢黜上怒撻其胷初雲昭訓父定興出入東宫無節數進其竒服異器以求恱媚左庶子裴政屢諫勇不聽政謂定興曰公所為不合法度又元妃暴薨道路籍籍此於太子非令名也公宜自引退不然將及禍定興以告勇勇益踈政由是出為襄州總管唐令則為勇所昵狎毎令以絃歌教内人右庶子劉行本責之曰庶子當輔太子以正道何有取媚於房帷之間哉令則甚慙而不能改時沛國劉臻平原明克讓魏郡陸爽並以文學為勇所親行本怒其不能調護毎謂三人曰卿等止解讀書耳夏侯福嘗於閤内與勇戯福大笑聲聞於外行本聞之待其出數之曰殿下寛容賜汝顔色汝何物小人敢為䙝慢因付執法者治之數日勇為福致請乃釋之勇嘗得良馬欲令行本乗而觀之行本正色曰至尊置臣於庶子欲令輔導殿下非為殿下作弄臣也勇慙而止及勇敗二人已卒上歎曰向使裴政劉行本在勇不至此勇甞宴宫臣唐令則自彈琵琶歌娬媚娘洗馬李綱起白勇曰令則身為宫卿職當調護乃於廣座自比倡優進滛聲穢視聽事若上聞令則罪在不測豈不為殿下之累邪臣請速治其罪勇曰我欲為樂耳君勿多事綱遂趨出及勇廢上召東宫官屬切責之皆惶懼無敢對者綱獨曰廢立大事今文武大臣皆知其不可而莫肯發言臣何敢畏死不一為陛下别白言之乎太子性本中人可與為善可與為惡曏使陛下擇正人輔之足以嗣守鴻基今乃以唐令則為左庶子鄒文騰為家令二人惟知以絃歌鷹犬娛悅太子安得不至於是邪此乃陛下之過非太子之罪也因伏地流涕嗚咽上慘然良久曰李綱責我非為無理然徒知其一未知其二我擇汝為宫臣而勇不親任雖更得正人何益哉對曰臣之所以不被親任者良由姦臣在側故也陛下但斬令則文騰更選賢才以輔太子安知臣之終見踈棄也自古國家廢立冡嫡鮮不傾危願陛下深留聖思無貽後悔上不悅罷朝左右皆為之股栗㑹尚書右丞缺有司請人上指綱曰此佳右丞也即用之十一月戊子立晉王廣為皇太子天下地震太子請降章服宫官不稱臣十二月戊午詔從之以宇文述為左衛率始太子之謀奪宗也洪州總管郭衍預焉由是徵衍為左監門率帝囚故太子勇於東宫付太子廣掌之勇自以廢非其罪頻請見上申寃而廣遏之不得聞勇於是升樹大呌聲聞帝所冀得引見楊素因言勇情志昏亂為癲鬼所著不可復收帝以為然卒不得見初帝之克陳也天下皆以為將太平監察御史房彦謙私謂所親曰主上忌刻而苛酷太子卑弱諸王擅權天下雖安方憂危亂其子元齡亦密言於彦謙曰主上本無功徳以詐取天下諸子皆驕奢不仁必自相誅夷今雖承平其亡可翹足待仁壽二年益州總管蜀王秀容貎瓌偉有膽氣好武藝帝毎謂獨孤后曰秀必以惡終我在當無慮至兄弟必反矣大將軍劉噲之討西爨也帝令上開府儀同三司楊武通將兵繼進秀以嬖人萬智光為武通行軍司馬帝以秀任非其人譴責之因謂羣臣曰壊我法者子孫也譬如猛虎物不能害反為毛間蠱所損食耳遂分秀所統自長史元巖卒後秀漸奢僭造渾天儀多捕山獠充宦者車馬被服擬於乗輿及太子勇以讒廢晉王廣為太子秀意甚不平太子恐秀終為後患隂令楊素求其罪而譖之上遂徵秀秀猶豫欲謝病不行總管司馬源師諫秀作色曰此自我家事何豫卿也師垂涕對曰師忝參府幕敢不盡忠聖上有敕追王已淹時月今乃遷延未去百姓不識王心儻生異議内外疑駭發雷霆之詔降一介之使王何以自明願王熟計之朝廷恐秀生變戊子以原州總管獨孤楷為益州總管馳傳代之楷至秀猶未肯行楷諷諭乆之乃就路楷察秀有悔色因勒兵為備秀行四十餘里將還襲楷覘知有備乃止八月甲子皇后獨孤氏崩太子對上及宫人哀慟絶氣若不勝喪者其處私室飲食言笑如平常又毎朝令進二鎰米而私令外取肥肉脯鮓置竹筩中以蠟閉口衣襆裹而納之冬閏十月蜀王秀至長安上見之不與語明日使使切讓之秀謝罪太子諸王流涕庭謝上曰頃者秦王糜費財物我以父道訓之今秀蠧害生民當以君道䋲之於是付執法者開府儀同三司慶整諫曰庶人勇既廢秦王已薨陛下見子無多何至如是蜀王性甚耿介今被重責恐不自全上大怒欲斷其舌因謂羣臣曰當斬秀於市以謝百姓乃令楊素等推治之太子隂作偶人縛手釘心枷鎻杻械書上及漢王姓名仍云請西岳慈父聖母神兵收楊堅楊諒神魂如此形狀勿令散蕩宻埋之華山下楊素發之又云秀妄述圖䜟稱京師妖異造蜀地徵祥并作檄文云指期問罪置秀集中俱以聞奏上曰天下寜有是邪十二月癸巳廢秀為庶人幽之内侍省不聽與妻子相見惟給獠婢二人驅使連坐者百餘人秀上表摧謝且曰伏願慈恩賜垂矜愍殘息未盡之間希與𤓰子相見請賜一穴令骸骨有所𤓰子其愛子也上因下詔數其十罪且曰我今不知楊堅楊諒是汝何親後乃聽與其子同處初楊素嘗以少譴敕送南臺命治書侍御史桞彧治之素恃貴坐彧牀彧從外來見之於階下端笏整容謂素曰奉敕治公之罪素遽下彧據案而坐立素於庭辯詰事狀素由是銜之蜀王秀嘗從彧求李文博所撰治道集彧與之秀遺彧奴婢十口及秀得罪素奏彧以内臣交通諸侯除名為民配戍懐逺鎮帝使司農卿趙仲卿往益州窮案秀事秀之賔客經過之處仲卿必深文致法州縣長吏坐者太半上以為能賞賜甚厚久之貝州長史裴肅遣使上書稱髙熲以天挺良才元勲佐命為衆所疾以至廢棄願陛下録其大功忘其小過又二庶人得罪已久寜無革心願陛下宏君父之慈顧天性之義各封小國觀其所為若能遷善漸更増益如或不悛貶削非晚今者自新之路永絶愧悔之心莫見豈不哀哉書奏上謂楊素曰裴肅憂我家事此亦至誠也於是徵肅入朝太子聞之謂左庶子張衡曰使勇自新欲何為也衡曰觀肅之意欲令如吳太伯漢東海王耳肅至上面諭以勇不可復收之意而罷遣之肅俠之子也楊素弟約及從父文思文紀族父忌並為尚書列卿諸子無汗馬之勞位至柱國刺史廣營資産自京師及諸方都㑹邸店碾磑便利田宅不可勝數家僮千數後庭妓妾曳綺羅者以千數第宅華侈制擬宫禁親故吏布列清顯既廢一太子及一王威權愈盛朝臣有違忤者或至誅夷有附㑹及親戚雖無才用必加進擢朝廷靡然莫不畏附敢與素抗而不撓者獨栁彧及尚書右丞李綱大理卿梁毗而已毗見楊素專權恐為國患乃上封事曰臣聞臣無有作威作福其害于而家凶于而國竊見左僕射越國公素幸遇愈重權勢日隆搢紳之徒屬其視聽忤意者嚴霜夏零阿㫖者膏雨冬㴻榮枯由其唇吻廢興候其指麾所私皆非忠讜所進咸是親戚子弟布列兼州連縣天下無事容息異圖四海有虞必為禍始夫姦臣擅命有漸而來王莾資之於積年桓元基之於易世而卒殄漢祀終傾晉祚陛下若以素為阿衡臣恐其心未必伊尹也伏願揆鑒古今量為處置俾鴻基永固率土幸甚書奏上大怒收毗繫獄親詰之毗極言素擅寵弄權將領之處殺戮無道又太子及蜀王罪廢之日百僚無不震悚惟素揚眉奮肘喜見容色利國家有事以為身幸上無以屈乃釋之其後上亦寖踈忌素乃下敕曰僕射國之宰輔不可躬親細務但三五日一向省評論大事外示優崇實奪之權也素由是終仁壽之末不復通判省事出楊約為伊州刺史素既被踈吏部尚書柳述益用事攝兵部尚書參掌機宻素由是惡之四年春正月甲子帝幸仁壽宫乙丑詔賞賜支度事無巨細並付皇太子夏四月乙卯上不豫六月庚申赦天下秋七月甲辰上疾甚卧與百僚辭訣並握手歔欷丁未崩于大寶殿初文獻皇后既崩宣華夫人陳氏容華夫人蔡氏皆有寵陳氏陳髙宗之女蔡氏丹陽人也上寢疾於仁壽宫尚書左僕射楊素兵部尚書柳述黄門侍郎元巖皆入閤侍疾召皇太子入居大寶殿太子慮上有不諱須預防擬手自為書封出問素素條錄事狀以報太子宫人誤送上所上覽而大恚陳夫人平旦出更衣為太子所逼夫人拒之得免歸於上所上怪其神色有異問其故夫人泫然曰太子無禮上恚抵牀曰畜生何足付大事獨孤誤我乃呼柳述元巖曰召我兒述等將呼太子上曰勇也述巖出閤為敕書楊素聞之以白太子矯詔執述巖繫大理獄追東宫兵士帖上臺宿衛門禁出入並取宇文述郭衍節度令右庶子張衡入寢殿侍疾盡遣後宫出就别室俄而上崩故中外頗有異論陳夫人與後宫聞變相顧戰栗失色晡後太子遣使者齎小金合帖紙於際親署封字以賜夫人夫人見之惶懼以為鴆毒不敢發使者促之乃發合中有同心結數枚宫人咸悅相謂曰得免死矣陳氏恚而却坐不肯致謝諸宫人共逼之乃拜使者其夜太子蒸焉乙卯發喪太子即皇帝位㑹伊州刺史楊約來朝太子遣約入長安易留守者矯稱髙祖之詔賜故太子勇死縊殺之然後陳兵集衆發髙祖㓙問煬帝聞之曰令兄之弟果堪大任追封勇為房陵王不為置嗣漢王諒有寵於髙祖為幷州總管自山以東至於滄海南距黄河五十二州皆𨽻焉特許以便宜從事不拘律令諒自以所居天下精兵處見太子勇以讒廢居常怏怏及蜀王秀得罪尤不自安隂蓄異圖言於髙祖以突厥方彊宜脩武備於是大發工役繕治器械招集亡命左右私人殆將數萬突厥嘗冦邊髙祖使諒禦之為突厥所敗其所領將帥坐除解者八十餘人皆配防嶺表諒以其宿舊奏請留之髙祖怒曰爾為藩王惟當敬依朝命何得私論宿舊廢國家憲法邪嗟呼小子爾一旦無我或欲妄動彼取爾如籠内鷄鶵耳何用腹心為王頍者僧辯之子倜儻好竒略為諒諮議參軍蕭摩訶陳氏舊將二人俱不得志毎鬱鬱思亂皆為諒所親善贊成其隂謀㑹熒惑守東井儀曹鄴人傅弈曉星厯諒問之曰是何祥也對曰天上東井黄道所經熒惑過之乃其常理若入地上井則可怪耳諒不恱及髙祖崩煬帝遣車騎將軍屈突通以髙祖璽書徵之先是髙祖與諒宻約若璽書召汝敕字傍别加一㸃又與玉麟符合者當就徵及發書無騐諒知有變詰通通占對不屈乃遣歸長安諒遂發兵反總管司馬安定皇甫誕切諫諒不納誕流涕曰竊料大王兵資非京師之敵加以君臣位定逆順勢殊士馬雖精難以取勝一旦䧟於叛逆絓於刑書雖欲為布衣不可得也諒怒囚之嵐州刺史喬鍾葵將赴諒其司馬京兆陶模拒之曰漢王所圖不軌公荷國厚恩位為方伯當竭誠效命豈得身為厲階乎鍾葵失色曰司馬反邪臨之以兵辭氣不撓鍾葵義而釋之軍吏曰若不斬模無以壓衆心乃囚之於是從諒反者凡十九州王頍說諒曰王所部將吏家屬盡在關西若用此等則宜長驅深入直據京都所謂疾雷不及掩耳若但欲割據舊齊之地宜任東人諒不能決乃兼用二䇿唱言楊素反將誅之總管府兵曹聞喜裴文安說諒曰井陘以西在王掌握之内山東士馬亦為我有宜悉發之分遣羸兵屯守要害仍令隨方略地帥其精銳直入蒲津文安請為前鋒王以大軍繼後風行雷擊頓於覇上咸陽以東可指麾而定京師震擾兵不暇集上下相疑羣情離駭我陳兵號令誰敢不從旬日之間事可定矣諒大恱於是遣所署大將軍余公理出大谷趣河陽大將軍綦良出􅇭口趣黎陽大將軍劉建出井陘略燕趙柱國喬鍾葵出鴈門署文安為柱國與柱國紇單貴王􅅨等直指京師帝以右武衛將軍洛陽丘和為蒲州刺史鎮蒲津諒簡精銳數百騎戴羃䍦詐稱諒宫人還長安門司弗覺徑入蒲州城中豪傑亦有應之者丘和覺其變踰城逃歸長安蒲州長史勃海髙義明司馬北平榮毗皆為反者所執裴文安等未至蒲津百餘里諒忽改圖令紇單貴斷河橋守蒲州而召文安還文安至謂諒曰兵機詭速本欲出其不意王既不行文安又返使彼計成大事去矣諒不對以王聃為蒲州刺史裴文安為晉州刺史薛粹為絳州刺史梁菩薩為潞州刺史韋道正為韓州刺史張伯英為澤州刺史代州總管天水李景發兵拒諒諒遣其將劉暠襲景景擊斬之諒復遣喬鍾葵帥勁勇三萬攻之景戰士不過數千加以城池不固為鍾葵所攻崩毁相繼景且戰且築士卒皆殊死鬭鍾葵屢敗司馬馮孝慈司法吕玉竝驍勇善戰儀同三司侯莫陳乂多謀畫工拒守之術景知三人可用推誠任之已無所關預惟在閤持重時撫循而已楊素將輕騎五千襲王聃紇單貴於蒲州夜至河際收商賈船得數百艘船内多置草踐之無聲遂銜枚而濟遲明擊之紇單貴敗走聃懼以城降有詔徵素還初素將行計日破賊皆如所量於是以素為并州道行軍總管河北道安撫大使帥衆數萬以討諒諒之初起兵也妃兄豆盧毓為府主簿苦諫不從私謂其弟懿曰吾匹馬歸朝自得免禍此乃身計非為國也不若且偽從之徐伺其便毓勣之子也毓兄顯州刺史賢言於帝曰臣弟毓素懐志節必不從亂但逼兇威不能自遂臣請從軍與毓為表裏諒不足圖也帝許之賢密遣家人齎敕書至毓所與之計議諒出城將往介州令毓與總管屬朱濤留守毓謂濤曰漢王構逆敗不旋踵吾屬豈可坐受夷滅孤負家國邪當與卿出兵拒之濤驚曰王以大事相付何得有是語因拂衣而去毓追斬之出皇甫誕於獄與之恊計及開府儀同三司宿勤武等閉城拒諒部分未定有人告諒諒襲擊之毓見諒至紿其衆曰此賊軍也諒攻城南門稽胡守南城不識諒射之矢下如雨諒移攻西門守兵識諒即開門納之毓誕皆死綦良攻慈州刺史上官政不克引兵攻行相州事薛胄又不克遂自滏口攻黎州塞白馬津余公理自大行下河内帝以右衛將軍史祥為行軍總管軍於河隂祥謂軍吏曰余公理輕而無謀恃衆而驕不足破也公理屯河陽祥具舟南岸公理聚兵當之詳簡精銳於下流濳濟公理聞之引兵拒之戰於須水公理未成列祥擊之公理大敗祥東趣黎陽綦良軍不戰而潰祥寧之子也帝將發幽州兵疑幽州總管竇抗有貳心問可使取抗者於楊素素薦前江州刺史勃海李子雄授上大將軍拜廣州刺史又以左領軍將軍長孫晟為相州刺史發山東兵與李子雄共經畧之晟辭以男行布在諒所部帝曰公體國之深終不以兒害義朕今相委公其勿辭李子雄馳至幽州止傳舍召募得千餘人抗來詣子雄子雄伏甲擒之抗榮定之子也子雄遂發幽州兵歩騎三萬自井陘西擊諒時劉建圍戍將京兆張祥於井陘子雄破建於抱犢山下建遁去李景被圍月餘詔朔州刺史代人楊義臣救之義臣帥馬歩二萬夜出西陘喬鍾葵悉衆拒之義臣自以兵少悉取軍中牛驢得數千頭復令兵數百人人持一鼓濳驅之匿於澗谷間晡後義臣復與鍾葵戰兵初合命驅牛驢者疾進一時鳴鼔塵埃漲天鍾葵軍不知以為伏兵發因而奔潰義臣縱擊大破之晉絳吕三州皆為諒城守楊素各以二千人縻之而去諒遣其將趙子開擁衆十餘萬柵絶徑路屯據髙壁布陳五十里素令諸將以兵臨之自引竒兵濳入霍山縁崖谷而進素營於谷口自坐營外使軍司入營簡留三百人守營軍士憚北軍之彊不欲出戰多願守營因爾致遲素責所由軍司具對素即召所留三百人出營悉斬之更令簡留人皆無願留者素乃引軍馳進出北軍之北直指其營鳴鼓縱火北軍不知所為自相蹂踐殺傷數萬諒所署介州刺史梁脩羅屯介休聞素至棄城走諒聞趙子開敗大懼自將衆且十萬拒素於蒿澤㑹天大雨諒欲引軍還王頍諫曰楊素懸軍深入士馬疲弊王以銳卒自將擊之其勢必克今望敵而退示人以怯沮戰士之心益西軍之氣願王勿還諒不從退守清源王頍謂其子曰氣候殊不佳兵必敗汝可隨我楊素進擊諒大破之擒蕭摩訶諒退保晉陽素進兵圍之諒窮蹙請降餘黨悉平帝遣楊約齎手詔勞素王頍將奔突厥至山中徑路斷絶知必不免謂其子曰吾之計數不減楊素但坐言不見從遂至於此不能坐受擒獲以成豎子名吾死之後汝慎勿過親故於是自殺瘞之石窟中其子數日不得食遂過其故人竟為所擒并獲頍尸梟於晉陽群臣奏漢王諒當死帝不許除名為民絶其屬籍竟以幽死諒所部吏民坐諒死徙者二十餘萬家初髙祖與獨孤后甚相愛重誓無異生之子嘗謂羣臣曰前世天子溺於嬖幸嫡庶分爭遂有廢立或至亡國朕旁無姬侍五子同母可謂真兄弟也豈有此憂耶帝又懲周室諸王微弱故使諸子分據大鎮専制方靣權侔帝室及其晚節父子兄弟迭相猜忌五子皆不以壽終臣光曰昔辛伯諗周桓公曰内寵竝后外寵貳政嬖子配嫡大都偶國亂之本也人主誠能慎此四者亂何自生哉隋髙祖徒知嫡庶之多爭孤弱之易揺曽不知勢鈞位逼雖同産至親不能無相傾奪考諸辛伯之言得其一而失其三乎通鑑紀事本末卷二十五下
