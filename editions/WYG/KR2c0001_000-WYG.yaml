body:
  text: 通鑑紀事本末紀事本末類提要臣等謹案通鑑紀事本末四十二卷宋袁樞撰樞字機仲建安人孝宗初試禮部詞賦第一歴官至工部侍郎以右文殿修撰知江陵府尋提舉太平興國宫事蹟具宋史本傳案唐劉知幾作史通叙述史例首列六家總歸二體自漢以來不過紀傳編年兩法乗除互用然紀傳之法或一事而複見數篇賔主莫辨編年之法或一事而隔越數卷首尾難稽樞乃自出新意因司馬光資治通鑑區别門目以類排纂毎事各詳起訖自為標題毎篇各編年月自為首尾始於三家之分晉終於周世宗之征淮南包括數千年事迹經緯明晰節目詳具前後始末一覽了然遂於史家二體之外别為一體實前古之所未有也王應麟玉海稱淳熙三年十一月恭政龔茂良言樞所編紀事有益見聞詔嚴州摹印十部仍先以繕本上之宋史樞本傳又稱孝宗讀而嘉嘆以賜東宫及分賜江上諸帥曰治道盡在是矣朱子亦稱其書部居門目始終離合之間皆曲有微意於以錯綜温公之書乃國語之流蓋樞所綴集雖不出通鑑原文而去取剪裁其義例極為精密非通鑑總類諸書割裂撦撏者可比其後如陳邦瞻谷應泰等遞有沿仿而大指之簡當則皆出是書下焉乾隆四十六年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:b789bcc96a3beb17b4f77f10ecd5f2d258f3499c647b57cba5edfd0a9a098318
