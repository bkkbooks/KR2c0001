front:
  text: 御製題宋版通鑑紀事本末洓水編年著通鑑建安紀事别成書興亡本末為金鏡條理因依若輔車雖有増前斯數典袁樞為是書依司馬光通鑑為起訖其前編則明沈朝陽所編焦竑校正之便稱續後此開初續編宋紀為明馮琦編元紀為陳邦瞻編皆張溥論正明紀則本朝谷應泰所編也淳熙紙墨香天禄玩味孜孜日警予御製通鑑紀事本末題辭資治開宗司馬傳分門紀事尚書沿沈袁題要臚從古馮谷研精輯續編監夏監殷吁凛若亦文亦質洵彬然百王後是誰承者師保如臨切惕乾宻言造膝有誰知屋漏分明顯在兹盤古前文尚疏畧三皇後事大昭垂宅心敬肆惟幾爾享世短長率繋之給札西清供乙覽要於法戒勵孜孜欽定四庫全書史部三
  hash: sha256:f2070ec8a5b4cde7249709b820ac89e5da3b38d4a1d3daf63a5ebfa4697bff8b
