body:
  text: 通鑑紀事本末卷七上宋袁樞撰兩匈奴叛服漢光武建武二十三年初匈奴單于輿弟右谷蠡王知牙師以次當為左賢王左賢王次即當為單于單于欲傳其子遂殺知牙師烏珠留單于有子曰比為右薁鞬日逐王領南邊八部比見知牙師死出怨言曰以兄弟言之右谷蠡王次當立以子言之我單于長子我當立遂内懐猜懼庭㑹稀濶單于疑之乃遣兩骨都侯監領比所部兵及單于蒲奴立比益恨望宻遣漢人郭衡奉匈奴地圖詣西河太守求内附兩骨都侯頗覺其意㑹五月龍祠勸單于誅比比弟漸將王在單于帳下聞之馳以報比比遂聚八部兵四五萬人待兩骨都侯還欲殺之骨都侯且到知其謀亡去單于遣萬騎擊之見比衆盛不敢進而還二十四年春正月匈奴八部人人共識立日逐王比為呼韓邪單于欵五原塞願永為藩蔽扞禦北敵事下公卿議者皆以為天下初定中國空虚夷狄情偽難知不可許五官中郎將耿國獨以為宜如孝宣故事受之令東扞鮮卑北拒匈奴率厲四夷完復邊郡帝從之冬十月匈奴日逐王比自立為南單于遣使詣闕奉藩稱臣上以問朗陵侯臧宫宫曰匈奴飢疫分爭臣願得五千騎以立功帝笑曰常勝之家難與慮敵吾方自思之二十五年春正月南單于遣其弟左賢王莫將兵萬餘人擊北單于弟薁鞬左賢王生獲之北單于震怖却地千餘里北部薁鞬骨都侯與右骨都侯率衆三萬餘人歸南單于三月南單于復遣使詣闕貢獻求使者監䕶遣侍子修舊約二十六年春正月詔遣中郎將段郴副校尉王郁使南匈奴立其庭去五原西部塞八十里使者令單于伏拜受詔單于顧望有頃乃伏稱臣拜訖令譯曉使者曰單于新立誠慙於左右願使者衆中無相屈折也詔聽南單于入居雲中始置使匈奴中郎將將兵衞䕶之夏南單于所獲北敵薁鞬左賢王將其衆及南部五骨都侯合三萬餘人畔歸去北庭三百餘里自立為單于月餘日更相攻擊五骨都侯皆死左賢王自殺諸骨都侯子各擁兵自守秋南單于遣子入侍詔賜單于冠帶璽綬車馬金帛甲兵什器又轉河東米糒二萬五千斛牛羊三萬六千頭以贍給之令中郎將將㢮刑五千人隨單于所處參辭訟察動靜單于處盡輒遣奉奏送侍子入朝漢遣謁者送前侍子至單于庭賜單于及閼氏左右賢王以下繒綵各萬匹嵗以為常於是雲中五原朔方北地定襄鴈門上谷代八郡民歸於本土遣謁者分將㢮刑修治城郭發遣邊民在中國者布還諸縣皆賜以裝錢轉給糧食時城郭邱墟掃地更為上乃悔前徙之冬南匈奴五骨都侯子復將其衆三千人歸南部北單于使騎追擊悉獲其衆南單于遣兵拒之逆戰不利於是復詔單于徙居西河美稷因使段郴王郁留西河擁䕶之令西河長史嵗將騎二千㢮刑五百人助中郎將衛䕶單于冬屯夏罷自後以為常南單于既居西河亦列置諸部王助漢扞戍北地朔方五原雲中定襄鴈門代郡皆領部衆為郡縣偵邏耳目北單于惶恐頗還所畧漢民以示善意鈔兵毎到南部下還過亭候輒謝曰自擊二虜薁鞬日逐耳非敢犯漢民也二十七年五月北匈奴遣使諸武威求和親帝召公卿廷議不決皇太子言曰南單于新附北敵懼于見伐故傾耳而聽爭欲歸義耳今未能出兵而反交通北敵臣恐南單于將有二心北敵降者且不復來矣帝然之告武威太守勿受其使朗陵侯臧宫揚虚侯馬武上書曰匈奴貪利無有禮信窮則稽首安則侵盜敵今人畜疫死旱蝗赤地疲困之力不當中國一郡萬里死命縣在陛下福不再來時或易失豈宜固守文德而墮武事乎今命將臨塞厚縣購賞喻告髙句驪烏桓鮮卑攻其左發河西四郡天水隴西羌胡擊其右如此北敵之滅不過數年臣恐陛下仁恩不忍謀臣狐疑令萬世刻石之功不立于聖世詔報曰黄石公記曰柔能制剛弱能制彊舎近謀逺者勞而無功舍逺謀近者逸而有終故曰務廣地者荒務廣德者彊有其有者安貪人有者殘殘滅之政雖成必敗今國無善政災變不息百姓驚惶人不自保而復欲逺事邊外乎孔子曰吾恐季孫之憂不在顓臾且北狄尚彊而屯田警備傳聞之事恒多失實誠能舉天下之半以滅大冦豈非至願茍非其時不如息民自是諸將莫敢復言兵事者二十八年秋八月北匈奴遣使貢馬及裘更乞和親并請音樂又求率西域諸國胡客俱獻見帝下三府議酬荅之宜司徒掾班彪曰臣聞孝宣皇帝敕邊守尉曰匈奴大國多變詐交接得其情則却敵折衝應對失其數則反為輕欺今北匈奴見南單于來附懼謀其國故數乞和親又逺驅牛馬與漢合市重遣名王多所貢獻斯皆外示富彊以相欺誕也臣見其獻益重知其國益虚歸親愈數為懼愈多然今既未獲助南則亦不宜絶北羈縻之義禮無不荅謂可頗加賞賜略與所獻相當報荅之辭令必有適今立槀草幷上曰單于不忘漢恩追念先祖舊約欲修和親以輔身安國計議甚髙為單于嘉之往者匈奴數有乖亂呼韓邪郅支自相讐隙並䝉孝宣皇帝垂恩救䕶故各遣侍子稱藩保塞其後郅支忿戾自絶皇澤而呼韓附親忠孝彌著及漢滅郅支遂保國傳嗣子孫相繼今南單于擕衆向南欵塞歸命自以呼韓嫡長次第當立而侵奪失職猜疑相背數請兵將歸掃北庭䇿謀紛紜無所不至惟念斯言不可獨聽又以北單于比年貢獻欲修和親故拒而未許將以成單于忠孝之義漢秉威信總率萬國日月所照皆為臣妾殊俗百蠻義無親踈服順者褒賞畔逆者誅罰善惡之效呼韓郅支是也今單于欲修和親欵誠已達何嫌而欲率西域諸國俱來獻見西域國屬匈奴與屬漢何異單于數連兵亂國内虚耗貢物裁以通禮何必獻馬裘今齎雜繒五百匹弓鞮韥丸一矢四發遺單于又賜獻馬左骨都侯右谷蠡王雜繒各四百匹斬馬劍各一單于前言先帝時所賜呼韓邪竽瑟空侯皆敗願復裁賜念單于國尚未安方厲武節以戰攻為務竽瑟之用不如良弓利劒故未以齎朕不愛小物於單于便宜所欲邊驛以聞帝悉納從之中元元年十一月南單于比死弟左賢王莫立為邱浮尤鞮單于帝遣使齎璽書拜授璽綬賜以衣冠及繒綵是後遂以為常二年南單于莫死弟汗立為伊伐於慮鞮單于明帝永平二年南單于汗死單于比之子適立為醯僮尸逐侯鞮單于五年十一月北匈奴冦五原十二月冦雲中南單于擊却之六年南單于適死單于莫之子蘇立為邱除車林鞮單于數月復死單于適之弟長立為湖邪尸逐侯鞮單于七年北匈奴猶盛數侵邊遣使求合市上冀其交通不復為侵許之八年三月越騎司馬鄭衆使北匈奴單于欲令衆拜衆不為屈單于圍守閉之不與水火衆拔刀自誓單于恐而止乃更發使隨衆還京師初大司農耿國上言宜置度遼將軍屯五原以防南匈奴逃亡朝廷不從南匈奴湏卜骨都侯等知漢與北敵交使内懐嫌怨欲畔宻使人詣北敵令遣兵迎之鄭衆出塞疑有異伺候果得湏卜使人乃上言宜速置大將以防二敵交通由是始置度遼營以中郎將呉棠行度遼將軍事將黎陽虎牙營士屯五原曼柏北匈奴雖遣使入貢而冦鈔不息邊城晝閉帝議遣使報其使者鄭衆上疏諫曰臣聞北單于所以要致漢使者欲以離南單于之衆堅三十六國之心也又當揚漢和親誇示鄰敵令西域欲歸化者局足狐疑懷土之人絶望中國耳漢使既到便偃蹇自信若復遣之敵必自謂得謀其群臣駮議者不敢復言如是南庭動揺烏桓有離心矣南單于久居漢地具知形勢萬分離析旋為邊害今幸有度遼之衆揚威北垂雖勿報荅不敢為患帝不從復遣衆往衆因上言臣前奉使不為匈奴拜單于恚恨遣兵圍臣今復銜命必見陵折臣誠不忍持大漢節對氈裘獨拜如令匈奴遂能服臣將有損大漢之彊帝不聽衆不得已既行在路連上書固爭之詔切責衆追還繫廷尉㑹赦歸家其後帝見匈奴來者聞衆與單于爭禮之狀乃復召衆為軍司馬十五年夏四月謁者僕射耿秉數上言請擊匈奴上以顯親侯竇固嘗從其世父融在河西明習邊事乃使秉固與太僕祭肜虎賁中郎將馬廖下博侯劉張好畤侯耿忠等共議之耿秉曰昔者匈奴援引弓之類幷左袵之屬故不可得而制孝武既得河西四郡及居延朔方敵失其肥饒畜兵之地羌胡分離唯有西域俄復内屬故呼韓邪單于請事欵塞其勢易乗也今有南單于形勢相似然西域尚未内屬北敵未有舋作臣愚以為當先擊白山得伊吾破車師通使烏孫諸國以斷其右臂伊吾亦有匈奴南呼衍一部破此復為折其左角然後匈奴可擊也上善其言議者或以為今兵出白山匈奴必幷兵相助又當分其東以離其衆上從之十二月以秉為駙馬都尉固為奉車都尉以騎都尉秦彭為秉副耿忠為固副皆置從事司馬出屯涼州秉國之子忠弇之子廖援之子也十六年春二月遣肜與度遼將軍呉棠將河東西河羌胡及南單于兵萬一千騎出髙闕塞竇固耿忠率酒泉敦煌張掖甲卒及盧水羌胡萬二千騎出酒泉塞耿秉秦彭率武威隴西天水募士及羌胡萬騎出張掖居延塞騎都尉來苗䕶烏桓校尉文穆將太原鴈門代郡上谷漁陽右北平定襄郡兵及烏桓鮮卑萬一千騎出平城塞伐北匈奴竇固耿忠至天山擊呼衍王斬首千餘級追至蒲類海取伊吾盧地置宜禾都尉留吏士屯田伊吾盧城耿秉彭秦擊匈林王絶幕六百餘里至三水樓山而還來苗文穆至匈河水上敵皆犇走無所獲祭肜與南匈奴左賢王信不相得出髙闕塞九百餘里得小山信妄言以為涿邪山不見虜而還肜與呉棠坐逗留畏懦下獄免肜自恨無功出獄數日歐血死臨終謂其子曰吾蒙國厚恩奉使不稱身死誠慚恨義不可以無功受賞死後若悉簿上所得物身自詣兵屯效死前行以副吾心既卒其子逢上疏具陳遺言帝雅重肜方更任用聞之大驚嗟嘆良久是嵗北匈奴大入雲中雲中太守㢘范拒之吏以衆少欲移書傍郡求救范不許㑹日暮范令軍士各交縛兩炬三頭爇火營中星列敵謂漢兵救至大驚待旦將退范令軍中蓐食晨往赴之斬首數百級敵自相轔藉死者千餘人由此不敢復向雲中十七年冬十一月奉車都尉竇固定車師而還奏復置西域都䕶及戊巳校尉以陳睦為都䕶司馬耿恭為戊校尉屯後王部金蒲城謁者闗寵為已校尉屯前王部栁中城屯各置數百人十八年春二月北單于遣左鹿蠡王率二萬騎擊車師耿恭遣司馬將兵三百人救之皆為所没匈奴遂破殺車師後王安得而攻金蒲城恭以毒藥傅矢語匈奴曰漢家箭神其中瘡者必有異敵中矢者視創皆沸大驚㑹天暴風雨隨雨擊之殺傷甚衆匈奴震怖相謂曰漢兵神真可畏也遂觧去十一月北匈奴圍闗寵於栁中城㑹中國有大䘮救兵不至車師復叛與匈奴共攻耿恭恭率厲士衆禦之數月食盡窮困乃煮鎧弩食其筋革恭與士卒推誠同死生故皆無二心而稍稍死亡餘數十人單于知恭已困欲必降之遣使招恭曰若降者當封為白屋王妻以女子恭誘其使上城手擊殺之炙諸城上單于大怒更益兵圍恭不能下闗寵上書求救詔公卿㑹議司空倫以為不宜救司徒鮑昱曰今使人於危難之地急而棄之外則縱蠻夷之暴内則傷死難之臣誠令權時後無邊事可也匈奴如復犯塞為冦陛下將何以使將又三部兵人裁各數十匈奴圍之歴旬不下是其寡弱力盡之效也可令敦煌酒泉太守各將精騎二千多其幡幟倍道兼行以赴其急匈奴疲極之兵必不敢當四十日間足還入塞帝然之乃遣征西將軍耿秉屯酒泉行太守事遣酒泉太守段彭與謁者王䝉皇甫援發張掖酒泉敦煌三郡及鄯善兵合七千餘人以救之章帝建初元年春正月詔兖豫徐三州禀贍饑民上問何以消復旱災校書郎楊終上疏曰間者北征匈奴西開三十六國百姓頻年服役轉輸煩費愁困之民足以感動天地陛下宜留念省察帝下其章第五倫亦同終議牟融鮑昱皆以為孝子無改父之道征伐匈奴屯戍西域先帝所建不宜回異終復上書曰秦築長城功役繁興胡亥不革卒亡四海故孝元弃珠厓之郡光武絶西域之國不以介鱗易我衣裳魯文公毁泉臺春秋譏之曰先祖為之而已毁之不如勿居而已以其無妨害於民也襄公作三軍昭公舍之君子大其復古以為不舍則有害於民也今伊吾之役樓蘭之屯兵久而未還非天意也帝從之酒泉太守段彭等兵㑹桞中擊車師攻交河城斬首三千八百級獲生口三千餘人北匈奴驚走車師復降㑹闗寵已殁謁者王䝉等欲引兵還耿恭軍吏范羌時在軍中固請迎恭諸將不敢前乃分兵二千人與羌從山北迎恭遇大雪丈餘軍僅能至城中夜聞兵馬聲以為虜來大驚羌遙呼曰我范羌也漢遣軍迎校尉耳城中皆稱萬嵗開門共相持涕泣明日遂相隨俱歸敵兵追之且戰且行吏士素飢困發疏勒時尚有二十六人隨路死沒三月至玉門唯餘十三人衣屨穿決形容枯槁中郎將鄭衆為恭已下洗沐易衣冠上䟽奏恭以單兵守孤城當匈奴數萬之衆連月踰年心力困盡鑿山為井煮弩為糧前後殺傷醜敵數百千計卒全忠勇不為大漢耻直䝉顯爵以厲將帥恭至雒陽拜騎都尉冬十一月北匈奴皋林温禺犢王將衆還居涿邪山南單于與邊郡及烏桓共擊破之是嵗南部大饑詔禀給之二年春三月甲辰罷伊吾盧屯兵匈奴復遣兵守其地八年夏六月北匈奴三木樓訾大人稽留斯等率三萬餘人欵五原塞降元和元年十二月武威太守孟雲上言北匈奴復願與吏民合市詔許之北匈奴大且渠伊莫訾王等驅牛馬萬餘頭來與漢交易南單于遣輕騎出上郡鈔之大獲而還二年春正月北匈奴大人車利涿兵等亡來入塞凡七十三輩時北敵衰耗黨衆離畔南部攻其前丁零冦其後鮮卑擊其左西域侵其右不復自立乃逺引而去南單于長死單于汗之子宣立為伊屠於閭鞮單于冬南單于遣兵與北敵温禺犢王戰於涿邪山斬獲而還武威太守孟雲上言北敵以前既和親而南部復往抄掠北單于謂漢欺之謀欲犯塞謂宜還南所掠生口以慰安其意詔百官議於朝堂太尉鄭宏司空第五倫等以為不可許司徒桓虞及太僕袁安等以為當與之宏因大言激厲虞曰諸言當還生口者皆為不忠虞廷叱之倫及大鴻臚韋彪各作色變容司𨽻校尉舉奏宏等宏等皆上印綬謝詔報曰久議沉滯各有所志盖事以議從䇿由衆定誾誾衎衎得禮之容寢嘿抑心更非朝廷之福君何尤而深謝其各冠履帝乃下詔曰江海所以能長百川者以其下之也少加屈下尚何足病況今與匈奴君臣分定辭順約明貢獻累至豈宜違信自受其曲其敕度遼及領中郎將龎奮倍雇南部所得生口以還北敵其南部斬首獲生計功受賞如常科章和元年冬十月北匈奴大亂屈蘭儲等五十八部口三十八萬詣雲中五原朔方北地降二年三月南單于宣死單于長之弟屯屠何立為休蘭尸逐侯鞮單于五月北匈奴饑亂降南部者嵗數千人秋七月南單于上言宜及北敵分爭出兵討伐破北成南幷為一國令漢家長無北念臣等生長漢地開口仰食嵗時賞賜動輒億萬雖垂拱安枕慙無報效之義願發國中及諸部故胡新降精兵分道並出期十二月同㑹敵地臣兵衆單少不足以防内外願遣執金吾耿秉度遼將軍鄧鴻及西河雲中五原朔方上郡太守并力而北冀因聖帝威神一舉平定臣國成敗要在今年已敕諸部嚴兵馬唯裁哀省察太后以示耿秉秉上言昔武帝殫極天下欲臣服匈奴未遇天時事遂無成今幸遭天授北敵分爭以夷伐夷國家之利宜可聽許秉因自陳受恩分當出命效用太后議欲從之尚書宋意上書曰夫戎狄簡賤禮義無有上下彊者為雄弱即屈服自漢興以來征伐數矣其所克獲曽不補害光武皇帝躬服金革之難探昭天地之明故因其來降羈縻畜養邊民得生勞役休息於兹四十餘年矣今鮮卑奉順斬獲萬數中國坐享大功而百姓不知其勞漢興功烈於斯為盛所以然者夷狄相攻無損漢兵者也臣察鮮卑侵伐匈奴正是利其抄掠及歸功聖朝實由貪得重賞今若聽南部還都北庭則不得不禁制鮮卑鮮卑外失暴掠之願内無功勞之賞豺狼貪婪必為邊患今北敵西遁請求和親宜因其歸附以為外扞巍巍之業無以過此若引兵費賦以順南敵則坐失上略去安即危矣誠不可許㑹竇憲遣客刺殺齊殤王子都侯暢太后怒憲懼誅自求擊匈奴以贖死事見竇氏専恣冬十月乙亥以憲為車騎將軍伐北匈奴以執金吾耿秉為副發北軍五校黎陽雍營縁邊十二郡騎士及羌胡兵出塞和帝永元元年春竇憲將征匈奴三公九卿詣朝堂上書諫以為匈奴不犯邊塞而無故勞師逺涉損費國用徼功萬里非社稷之計書連上輒寝宋由懼遂不敢復署議而諸卿稍自引止唯袁安任隗守正不移至免冠朝堂固爭前後且十上衆皆為之危懼安隗正色自若侍御史魯恭上疏曰國家新遭大憂陛下方在諒隂百姓闕然三時不聞警蹕之音莫不懷思皇皇若有求而不得今乃以盛春之月興發軍役擾動天下以事戎夷誠非所以垂恩中國改元正時由内及外也萬民者天之所生天愛其所生猶父母愛其子一物有不得其所者則天氣為之舛錯況於人乎故愛民者必有天報夫戎狄者四方之異氣也與鳥獸無别若雜居中國則錯亂天氣汙辱善人是以聖王之制羈縻不絶而已今匈奴為鮮卑所破逺藏於史侯河西去塞數千里而欲乗其虚耗利其微弱是非義之所出也今始徵發而大司農調度不足上下相迫民間之急亦已甚矣羣僚百姓咸曰不可陛下獨奈何以一人之計棄萬人之命不䘏其言乎上觀天心下察人志足以知事之得失臣恐中國不為中國豈徒匈奴而已哉尚書令韓稜騎都尉朱暉議郎京兆樂恢皆上䟽諫太后不聽又詔使者為憲弟篤景並起邸第勞役百姓侍御史何敞上疏曰臣聞匈奴之為桀逆久矣平城之圍嫚書之恥此二辱者臣子所謂捐軀而必死髙祖吕后忍怒含忿舍而不誅今匈奴無逆節之暴漢朝無可慙之恥而盛春東作興動大役元元怨恨咸懷不悦又猥復為衞尉篤奉車都尉景繕修館第彌街絶里篤景親近貴臣當為百僚表儀今衆軍在道朝廷焦脣百姓愁苦縣官無用而遽起大第崇飾玩好非所以垂令德示無窮也宜且罷工匠專憂北邊恤民之困書奏不省夏六月竇憲耿秉出朔方雞鹿塞南單于出滿夷谷度遼將軍鄧鴻出稒陽塞皆㑹涿山憲分遣副校尉閻盤司馬耿䕫耿譚將南匈奴精騎萬餘與北單于戰於稽落山大破之單于遁走追擊諸部遂臨私渠比鞮海斬名王已下萬三千級獲生口甚衆雜畜百餘萬頭諸禆小王率衆降者前後八十一部一十餘萬人憲秉出塞三千餘里登燕然山命中䕶軍班固刻石勒功紀漢威德而還遣軍司馬呉氾梁諷奉金帛遺北單于時敵中乖亂汜諷及單于於西海上宣國威信以詔致賜單于稽首拜受諷因説令修呼韓邪故事單于喜悦即將其衆與諷同還到私渠海聞漢軍已入塞乃遣弟右温禺鞮王奉貢入侍隨諷詣闕憲以單于不自身到奏還其侍弟二年夏五月竇憲遣副校尉閻礱將二千餘騎掩擊北匈奴之守伊吾者復取其地秋七月北單于以漢還其侍弟九月復遣使欵塞稱臣欲入朝見冬十月竇憲遣班固梁諷迎之㑹南單于復上書求滅北庭於是遣左谷蠡王師子等將左右部八千騎出鷄鹿塞中郎將耿譚遣從事將䕶之襲擊北單于夜至圍之北單于被創僅而得免獲閼氏及男女五人斬首八千級生虜數千口班固至私渠海而還是時南部黨衆益盛領户三萬四千勝兵五萬三年春正月竇憲以北匈奴微弱欲遂滅之二月遣左校尉耿䕫司馬任尚出居延塞圍北單于於金微山大破之獲其母閼氏名王已下五千餘級北單于逃走不知所在出塞五千餘里而還自漢出師所未嘗至也封䕫為粟邑侯初北單于既亡其弟右谷蠡王於除鞬自立為單于將衆數千人止蒲類海遣使欵塞竇憲請遣使立於除鞬為單于置中郎將領䕶如南單于故事事下公卿議宋由等以為可許袁安任隗奏以為光武招懷南部非謂可永安内地正以權時之算可得扞禦北狄故也今朔漠既定宜令南單于反其北庭并領降衆無縁復更立於除鞬以增國費事奏未以時定安懼憲計遂行乃獨上封事曰南單于屯先父舉衆歸德自䝉恩以來四十餘年三帝積累以遺陛下陛下深宜遵述先志成就其業況屯首唱大謀空盡北庭輟而弗圖更立新降以一朝之計違三世之規失信於所養建立於無功論語曰言忠信行篤敬雖蠻貊行焉今若失信於一屯則百蠻不敢復保誓矣又烏桓鮮卑新殺北單于凡人之情咸畏仇讐今立其弟則二敵懷怨且漢故事供給南單于費直嵗一億九十餘萬西域嵗七千四百八十萬今北庭彌逺其費過倍是乃空盡天下而非建䇿之要也詔下其議安又與憲更相難折憲險急負勢言辭驕訐至詆毁安稱光武誅韓歆戴涉故事安終不移然上竟從憲策四年春正月遣大將軍左校尉耿䕫授於除鞬印綬使中郎將任尚持節衛䕶屯伊吾如南單于故事五年初竇憲既立於除鞬為北單于欲輔歸北庭㑹憲誅而止於除鞬自畔還北詔遣將兵長史王輔以千餘騎與任尚共追討斬之破滅其衆十一月單于屯屠何死單于宣弟安國立安國初為左賢王無稱譽及為單于單于適之子左谷蠡王師子以次轉為左賢王師子素勇㸃多知前單于宣及屯屠何皆愛其氣決數遣將兵出塞掩擊北庭還受賞賜天子亦加殊異由是國中盡敬師子而不附安國安國欲殺之諸新降胡初在塞外數為師子所驅掠多怨之安國因是委計降者與同謀議師子覺其謀乃别居五原界毎龍庭㑹議師子輒稱病不往度遼將軍皇甫稜知之亦擁䕶不遣單于懷憤益甚六年春正月皇甫稜免以執金吾朱徽行度遼將軍時單于與中郎將杜崇不相平乃上書告崇崇諷西河太守令斷單于章單于無由自聞崇因與朱徽上言南單于安國疎逺故胡親近新降欲殺左賢王師子及左臺且渠劉利等又右部降者謀共迫脅安國起兵背畔請西河上郡安定為之儆備帝下公卿議皆以為蠻夷反覆雖難測知然大兵聚㑹必未敢動搖今宜遣有方畧使者之單于庭與杜崇朱徽及西河太守并力觀其動靜如無它變可令崇等就安國㑹其左右大臣責其部衆横暴為邊害者共平罪誅若不從命令為權時方略事畢之後裁行賞賜亦足以威示百蠻帝從之於是徽崇遂發兵造其庭安國夜聞漢軍至大驚棄帳而去因舉兵欲誅師子師子先知乃悉將廬落入曼柏城安國追到城下門閉不得入朱徽遣吏曉譬和之安國不聽城既不下乃引兵屯五原崇徽因發諸郡騎追赴之急衆皆大恐安國舅骨都侯喜為等慮并被誅乃格殺安國立師子為亭獨尸逐侯鞮單于夏五月南單于師子立降胡五六百人夜襲師子安集掾王恬將衛䕶士與戰破之於是降胡遂相驚動十五部二十餘萬人皆反脅立前單于屯屠何子薁鞮日逐王逢侯為單于遂殺略吏民燔燒郵亭廬帳將車重向朔方欲度幕北九月癸丑以光禄勲鄧鴻行車騎將軍事與越騎校尉馮柱行度遼將軍朱徽將左右羽林北軍五校士及郡國迹射縁邊兵烏桓校尉任尚將烏桓鮮卑合四萬人討之時南單于及中郎將杜崇屯牧師城逢侯將萬餘騎攻圍之冬十一月鄧鴻等至美稷逢侯乃解圍去向滿夷谷南單于遣子將萬騎及杜崇所領四千騎與鄧鴻等追擊逢侯於大城塞斬首四千餘級任尚率鮮卑烏桓要擊逢侯於滿夷谷復大破之前後凡斬萬七千餘級逢侯遂率衆出塞漢兵不能追而還八年五月南匈奴右温禺犢王烏居戰畔出塞秋七月度遼將軍龎奮越騎校尉馮柱追擊破之徙其餘衆及諸降胡二萬餘人於安定北地十年南單于師子死單于長之子檀立為萬氏尸逐鞮單于十六年十一月北匈奴遣使稱臣貢獻願和親修呼韓邪故約帝以其舊禮不備未許而厚加賞賜不荅其使元興元年冬十二月北匈奴重遣使詣敦煌貢獻辭以國貧未能備禮願請大使當遣子入侍太后亦不荅其使加賜而已安帝永初三年六月漢人韓琮隨匈奴南單于入朝既還説南單于云關東水潦人民飢餓死盡可擊也單于信其言遂反九月南單于圍中郎將耿种於美稷冬十一月以大司農陳國何熈行車騎將軍事中郎將龎雄為副將五營及邊郡兵二萬餘人又詔遼東太守耿䕫率鮮卑及諸郡兵共擊之以梁慬行度遼將軍事雄䕫擊南匈奴薁鞬日逐王破之四年春正月南單于圍耿种數月梁慬耿䕫擊斬其别將於屬國故城單于自將迎戰慬等復破之單于遂引還虎澤二月南匈奴冦常山三月何熙軍到五原曼柏暴疾不能進遣龎雄與梁慬耿种將步騎萬六千人攻虎澤連營稍前單于見諸軍並進大恐怖顧讓韓琮曰汝言漢人死盡今是何等人也乃遣使乞降許之單于脱㡌徒跣對龎雄等拜陳道死罪於是赦之遇待如初乃還所鈔漢民男女及羌所略轉賣入匈奴中者合萬餘人㑹熙卒即拜梁慬度遼將軍龎雄還為大鴻臚延光二年鮮卑其至鞬自將萬餘騎攻南匈奴於曼柏薁鞬日逐王戰死殺千餘人三年夏四月南單于檀死弟拔立為烏稽侯尸逐鞮單于順帝永建元年朔方以西障塞多壞鮮卑因此數侵南匈奴單于憂恐上書乞修復障塞庚寅詔黎陽營兵出屯中山北界令緣邊郡增置步兵列屯塞下教習戰射三年冬十二月南單于拔死弟休利立為去特若尸逐就單于永和五年春二月南匈奴句龍王吾斯車紐等反冦西河招誘右賢王合兵圍美稷殺朔方代郡長吏夏五月度遼將軍馬續與中郎將梁並等發邊兵及羌胡合二萬餘人掩擊破之吾斯等復更屯聚攻没城邑天子遣使責讓單于單于本不預謀乃脱㡌避帳詣並謝罪並以病徴五原太守陳龜代為中郎將龜以單于不能制下逼迫單于及其弟左賢王皆令自殺龜又欲徙單于近親于内郡而降者遂更狐疑龜坐下獄免大將軍商上表曰匈奴冦畔自知罪極窮鳥困獸皆知救死況種類繁熾不可单盡今轉運日増三軍疲苦虚内給外非中國之利度遼將軍馬續素有謀謨且典邊日久深曉兵要毎得續書與臣策合宜令續深溝髙壁以恩信招降宣示購賞明為期約如此則醜類可服國家無事矣帝從之乃詔續招降畔敵商又移書續等曰中國安寧忘戰日久良騎野合交鋒接矢決勝當時戎狄之所長而中國之所短也彊弩乗城堅營固守以待其衰中國之所長而戎狄之所短也宜務先所長以觀其變設購開賞宣示反悔勿貪小功以亂大謀於是右賢王部抑鞮等萬三千口皆詣續降九月匈奴句龍王吾斯等立車紐為單于東引烏桓西收羌胡等數萬人攻破京兆虎牙營殺上郡都尉及軍司馬遂侵掠并涼幽冀四州乃徙西河治離石上郡治夏陽朔方治五原十二月遣使匈奴中郎將張耽將幽州烏桓諸郡營兵擊車紐等戰於馬邑斬首三千級獲生口甚衆車紐乞降而吾斯猶率其部曲與烏桓侵鈔漢安元年秋八月南匈奴句龍吾斯與薁鞬臺耆等復反侵掠并部二年六月丙寅立南匈奴守義王兠樓儲為呼蘭若尸逐就單于時兠樓儲在京師上親臨軒授璽綬引上殿賜車馬器服金帛甚厚詔太常大鴻臚與諸國侍子於廣陽城門外祖㑹饗賜作樂角抵百戲十一月使匈奴中郎將扶風馬寔遣人刺殺句龍吾斯建康元年夏四月使匈奴中郎將馬寔擊南匈奴左部破之桓帝建和元年南單于兠樓儲死伊陵尸逐就單于車兒立元嘉元年夏四月北匈奴呼衍王侵伊吾敗伊吾司馬毛愷攻伊吾屯城詔敦煌太守馬達將兵救之至蒲類海呼衍王引去永夀元年秋南匈奴左薁鞬臺耆且渠伯德等反侵美稷東羌復舉種應之安定屬國都尉敦煌張奐初到職壁中唯有二百許人聞之即勒兵而出軍吏以為力不敵叩頭爭止之奐不聽遂進屯長城收集兵士遣將王衞招誘東羌因據龜兹縣使南匈奴不得交通東羗諸豪遂相率與奐共擊薁鞮等破之伯德惶恐將其衆降郡界以寧延熹元年十二月南匈奴諸部並叛與烏桓鮮卑侵縁邊九郡帝以京兆尹陳龜為度遼將軍龜臨行上疏曰臣聞三辰不軌擢士為相蠻夷不恭拔卒為將臣無文武之才而忝鷹揚之任雖殁軀體無所云補今西州邊鄙土地塉埆民數更敵兵室家殘破雖含生氣實同枯朽往嵗并州水雨災螟互生稼穡荒耗租更空闕陛下以百姓為子焉可不垂撫循之㤙哉古公西伯天下歸仁豈復輿金輦寳以為民患乎陛下繼中興之統承光武之業臨朝聴政而未留聖意且牧守不良或出中官懼逆上㫖取過目前呼嗟之聲招致災害胡人凶悍因衰縁隙而令倉庫單於豺狼之口功業無銖兩之效皆由將帥不忠聚姦所致前涼州刺史祝良初除到州多所糾罰太守令長貶黜將半政未踰時功效卓然實應賞異以勸功能改任牧守去斥姦殘又宜更選匈奴烏桓護羌中郎將校尉簡練文武授之法令除并涼二州今年租更寛赦罪𨽻掃除更始則善吏知奉公之祐惡者覺營私之禍胡馬可不窺長城塞下無候望之患矣帝乃更選幽并刺史自營郡太守都尉以下多所革易下詔為陳將軍除并涼一年租賦以賜吏民龜到職州郡重足震栗省息經用嵗以億計詔拜安定屬國都尉張奐為北中郎將以討匈奴烏桓等匈奴烏桓燒度遼將軍門引屯赤阬煙火相望兵衆大恐各欲亡去奐安坐帷中與弟子講誦自若軍士稍安乃潜誘烏桓隂與和通遂使斬匈奴屠各渠帥襲破其衆諸胡悉降奐以南單于車兒不能統理國事乃拘之奏立左谷蠡王為單于詔曰春秋大居正車兒一心向化何罪而黜其遣還庭諸羌叛服漢光武建武九年諸羌自王莽末入居塞内金城屬縣多為所有隗囂不能討因就慰納發其衆與漢相拒司徒掾班彪上言今涼州部皆有降羌羌胡披髪左衽而與漢人雜處習俗既異言語不通數為小吏黠人所見侵奪窮恚無聊故致反叛夫蠻夷冦亂皆為此也舊制益州部置蠻夷騎都尉幽州部置領烏桓校尉涼州置䕶羌校尉皆持節領䕶治其怨結嵗時廵行問所疾苦又數遣使譯通導動静使塞外羌夷為吏耳目州郡因此可得警備今宜復如舊以明威防帝從之以牛邯為䕶羌校尉十年冬十月先零羌與諸種冦金城隴西來歙率蓋延等進擊大破之斬首虜數千人於是開倉廩以賑飢乏隴右遂安而涼州流通焉十一年夏先零羌冦臨洮來歙薦馬援為隴西太守擊先零大破之冬十月先零諸種羌數萬人屯聚冦鈔拒浩亹隘馬援深入討擊大破之徙降羌置天水隴西扶風是時朝臣以金城破羗之西塗逺多冦議欲棄之馬援上言破羌以西城多完牢易可依固其田土肥壤灌溉流通如令羌有隍中則為害不休不可棄也帝從之民歸者三千餘口援為置長吏繕城郭起塢候開溝洫勸以耕牧郡中樂業又招撫塞外氐羌皆來降附援奏復其侯王君長帝悉從之十二年參狼羌與諸種冦武都隴西太守馬援擊破之降者萬餘人於是隴右清静中元二年初燒當羌豪滇良擊破先零奪居其地滇良卒子滇吾立附落轉盛秋滇吾與弟滇岸率衆冦隴西敗太守劉盱於允街於是守塞諸羌皆叛詔謁者張鴻領諸郡兵擊之戰於允吾鴻軍敗没冬十一月復遣中郎將竇固監捕虜將軍馬武等二將軍四萬人討之明帝永平元年秋七月馬武等擊燒當羌大破之餘皆降散孝章帝建初二年初安夷縣吏略妻卑湳種羌人婦吏為其夫所殺安夷長宗延追之出塞種人恐見誅遂共殺延而與勒姐吾良二種相結為冦於是燒當羌豪滇吾之子迷吾率諸種俱反敗金城太守郝崇詔以武威太守北地傅育為護羌校尉自安夷徙居臨羌迷吾又與封養種豪布橋等五萬餘人共冦隴西漢陽秋八月遣行車騎將軍馬防長水校尉耿恭將北軍五校兵及諸郡射士三萬人擊之馬防等軍到冀布橋等圍南部都尉於臨洮防進擊破之斬首虜四千餘人遂解臨洮圍其衆皆降唯布橋等二萬餘人屯望曲谷不下三年春正月馬防擊布橋大破之布橋將種人萬餘降詔徵防還留耿恭擊諸未服者斬首虜千餘人勒姐燒何等十三種數萬人皆詣恭降恭嘗以言事忤馬防監營謁者承㫖奏恭不憂軍事坐徵下獄免官元和三年秋八月燒當羌迷吾復與弟號吾及諸種反號吾先輕入冦隴西界督烽掾李章追之生得號吾將詣郡號吾曰獨殺我無損於羌誠得生歸必悉罷兵不復犯塞隴西太守張紆放遣之羌即為解散各歸故地迷吾退居河北歸義城章和元年春正月護羌校尉傅育欲伐燒當羌為其新降不欲出兵乃募人鬬諸羌胡羌胡不肯遂復叛出塞更依迷吾育請發諸郡兵數萬人共擊羌未及㑹三月育獨進軍迷吾聞之徙廬落去育遣精騎三千窮追之夜至三兠谷不設備迷吾襲擊大破之殺育及吏士八百八十人及諸郡兵到羌遂引去詔以隴西太守張紆為校尉將萬人屯臨羌秋七月羌豪迷吾復與諸種冦金城塞張紆遣從事河内司馬防與戰於木乗谷迷吾兵敗走因譯使欲降紆納之迷吾將人衆詣臨羌紆設兵大㑹施毒酒中伏兵殺其酋豪八百餘人斬迷吾頭以祭傅育冢復放兵擊其餘衆斬獲數千人迷吾子迷唐與諸種解仇結婚交質據大小榆谷以叛種衆熾盛張紆不能制二年冬十月公卿舉故張掖太守鄧訓代張紆為護羌校尉迷唐率兵萬騎來至塞下未敢攻訓先欲脅小月氏胡訓擁衞小月氏胡令不得戰議者咸以羌胡相攻縣官之利不宜禁護訓曰張紆失信衆羌大動涼州吏民命縣絲髪原諸胡所以難得意者皆恩信不厚耳今因其迫急以德懷之庶能有用遂令開城及所居園門悉驅羣胡妻子内之嚴兵守衛羌掠無所得又不敢逼諸胡因即解去由是湟中諸胡皆言漢家嘗欲鬭我曹今鄧使君待我以恩信開門内我妻子乃是得父母也咸歡喜叩頭曰唯使君所命訓遂撫養教諭小大莫不感悦於是賞賂諸羌種使相招誘迷唐叔父號吾將其種人八百戶來降訓因發湟中秦胡羌兵四千人出塞掩擊迷唐於冩谷破之迷唐乃去大小榆居頗巖谷衆悉離散和帝永元元年春迷唐欲復歸故地鄧訓發湟中六千人令長史任尚將之縫革為船置於箄上以度河掩擊迷唐大破之斬首前後一千八百餘級獲生口二千人馬牛羊三萬餘頭一種殆盡迷唐收其餘衆西徙千餘里諸附落小種皆畔之燒當豪帥東號稽顙歸死餘皆欵塞納質於是訓綏接歸附威信大行遂罷屯兵各令歸郡唯置㢮刑徒二千餘人分以屯田修理塢壁而已四年冬十月護羌校尉鄧訓卒吏民羌胡旦夕臨者日數千人羌胡或以刀自割又刺殺其犬馬牛羊曰鄧使君已死我曹亦俱死耳前烏桓吏士皆犇走道路至空城郭吏執不聽以狀白校尉徐傿傿歎息曰此為義也乃釋之遂家家為訓立祠毎有疾病輒請禱求福蜀郡太守聶尚代訓為䕶羌校尉欲以恩懷諸羌乃遣譯使招呼迷唐使還居大小榆谷迷唐既還遣祖母卑缺詣尚尚自送至塞下為設祖道令譯田汜等五人護送至廬落迷唐遂反與諸種共生屠裂汜等以血盟詛復冦金城塞尚坐免五年十一月護羌校尉貫友遣譯使搆離諸羌誘以財貨由是解散乃遣兵出塞攻迷唐於大小榆谷獲首虜八百餘人收麥數萬斛遂夾逢留大河築城塢作大航造河橋欲度兵擊迷唐迷唐率部落逺徙依賜支河曲八年十二月護羌校尉貫友卒以漢陽太守史充代充至遂發湟中羌胡出塞擊迷唐迷唐迎敗充兵殺數百人充坐徵以代郡太守呉祉代之九年閏八月燒當羌迷唐率衆八千人冦隴西脅塞内諸種羌合步騎三萬人擊破隴西兵殺大夏使詔遣行征西將軍劉尚越騎校尉趙世副之將漢兵羌胡共三萬人討之尚屯狄道世屯枹罕尚遣司馬冦盱監諸郡兵四面並㑹迷唐懼棄老弱奔入臨洮南尚等追至髙山大破之斬虜千餘人迷唐引去漢兵死傷亦多不能復追乃還十年冬十月行征西將軍劉尚越騎校尉趙世坐懦徴下獄免謁者王信領尚營屯枹罕謁者耿疆領世營屯白石譚乃設購賞諸種頗來内附迷唐恐乃請降信譚遂受降罷兵十二月迷唐等率種人詣闕貢獻十二年秋九月燒當羌豪迷唐既入朝其餘種人不滿二千飢窘不立入居金城帝令迷唐將其種人還大小榆谷迷唐以漢作河橋兵來無常故地不可復居辭以種人飢餓不肯逺出護羌校尉呉祉等多賜迷唐金帛令糴穀市畜促使出塞種人更懷猜驚是嵗迷唐復叛脅將湟中諸胡冦鈔而去王信耿譚呉祉皆坐徴十三年秋八月迷唐復還賜支河曲將兵向塞護羌校尉周鮪與金城太守侯霸及諸郡兵屬國羌胡合三萬人出塞至允川侯霸擊破迷唐種人瓦解降者六千餘口分徙漢陽安定隴西迷唐遂弱逺踰賜支河首依發羌居久之病死其子來降戸不滿數十十四年春安定降羌燒何種反郡兵擊滅之時西海及大小榆谷左右無復羌冦隃糜相曹鳳上言自建武以來西羌犯法者常從燒當種起所以然者以其居大小榆谷土地肥美有西海魚鹽之利阻大河以為固又近塞内諸種易以為非難以攻伐故能彊大常雄諸種恃其拳勇招誘羌胡今者衰困黨援壞沮亡逃棲竄逺依發羌臣愚以為宜及此時建復西海郡縣規固二榆廣設屯田隔塞羌胡交關之路遏絶狂狡窺欲之源又殖穀富邊省委輸之役國家可以無西方之憂上從之繕修故西海郡徙金城西部都尉以戍之拜鳳為金城西部都尉屯龍耆後增廣屯田列屯夾河合三十四部其功垂立㑹永初中諸羌叛乃罷安帝永初元年初燒當羌豪東號之子麻奴隨父來降居于安定時諸降羌布在郡縣皆為吏民豪右所徭役積以愁怨及騎都尉王宏西迎西域都護段禧發金城隴西漢陽羌數百千騎與俱郡縣迫促發遣羣羌懼逺屯不還行到酒泉多有散叛諸郡各發兵邀遮或覆其廬落於是勒姐當煎大豪東岸等愈驚遂同時犇潰麻奴兄弟因此與種人俱西出塞先零别種滇零與鍾羌諸種大為冦掠斷隴道時羌歸附既久無復器甲或持竹竿木枝以代戈矛或負板案以為楯或執銅鏡以象兵郡縣畏懦不能制丁卯赦除諸羌相連結謀叛逆者罪十二月詔車騎將軍鄧騭征西校尉任尚將五營及諸郡兵五萬人屯漢陽以備羌二年春正月鄧騭至漢陽諸郡兵未至鍾羌數千人擊敗騭軍於冀西殺千餘人梁慬還至敦煌逆詔慬留為諸軍援慬至張掖破諸羌萬餘人其能脱者十二三進至姑臧羌大豪三百餘人詣慬降並慰譬遣還故地冬鄧騭使任尚及從事中郎河内司馬鈞率諸郡兵與滇零等數萬人戰於平襄尚軍大敗死者八千餘人羌衆遂大盛朝廷不能制湟中諸縣粟石萬錢百姓死亡不可勝數而轉運難劇故左校令河南龎參先坐法輸作若盧使其子俊上書曰方今西州流民擾動而徴發不絶水潦不休地力不復重之以大軍疲之以逺戍農功消於轉運資財竭於徴發田疇不得墾闢禾稼不得收入摶手困窮無望來秋百姓力屈不復堪命臣愚以爲萬里運糧逺就羌戎不若總兵養衆以待其疲車騎將軍騭宜且振旅留征西校尉任尚使督涼州士民轉居三輔休徭役以助其時止煩賦以益其財令男得耕種女得織絍然後畜精鋭乗懈沮出其不意攻其不備則邊民之仇報犇北之恥雪矣書奏㑹樊準上䟽薦參太后即擢參於徙中召拜謁者使西督三輔諸軍屯十一月辛酉詔鄧騭還師留任尚屯漢陽為諸軍節度遣使迎拜騭為大將軍滇零自稱天子於北地招集武都參狼上郡西河諸雜種羌斷隴道冦鈔三輔南入益州殺漢中太守董炳梁慬受詔當屯金城聞羌冦三輔即引兵赴擊轉戰武功美陽間連破走之羌稍退散十二月廣漢塞外參狼羌降三年春正月遣騎都尉任仁督諸郡屯兵救三輔仁戰數不利當煎勒姐羌攻没破羌縣鍾羌攻没臨洮縣執隴西南部都尉四年二月滇零遣兵冦褒中漢中太守鄭勤移屯褒中任尚軍久出無功民廢農桑乃詔尚將吏民還屯長安罷遣南陽潁川汝南吏士乙丑初置京兆虎牙都尉於長安扶風都尉於雍如西京三輔都尉故事謁者龎參説鄧騭徙邊郡不能自存者入居三輔騭然之欲棄涼州并力北邊乃㑹公卿集議騭曰譬若衣敗壞一以相補猶有所完若不如此將兩無所保公卿皆以為然郎中陳國虞詡言於太尉張禹曰若大將軍之䇿不可者三先帝開拓土宇劬勞後定而今憚小費舉而棄之此不可一也涼州既棄即以三輔為塞則園陵單外此不可二也喭曰關西出將關東出相烈士武臣多出涼州土風壯猛便習兵事今羌胡所不敢入據三輔為心腹之害者以涼州在後故也涼州士民所以推鋒執鋭蒙矢石於行陳父死於前子戰於後無反顧之心者為臣屬於漢故也今推而捐之割而棄之民庶安土重遷必引領而怨曰中國棄我於夷狄雖赴義從善之人不能無恨如卒然起謀因天下之饑敝乗海内之虚弱豪雄相聚量材立帥驅氐羌以為前鋒席卷而東雖賁育為卒太公為將猶恐不足當禦如此則函谷以西園陵舊京非復漢有此不可三也議者喻以補衣猶有所完詡恐其疽食侵淫而無限極也禹曰吾意不及此微子之言幾敗國事詡因説禹收羅涼土雄傑引其牧守子弟於朝令諸府各辟數人外以勸厲答其功勤内以拘致防其邪計禹善其言更集四府皆從詡議於是辟西州豪傑為掾屬拜牧守長吏子弟為郎以安慰之三月先零羌復攻褒中鄭勤欲擊之主簿段崇諫以為虜乗勝鋒不可當宜堅守待之勤不從出戰大敗死者三千餘人段崇及門下史王宗原展以身扞刃與勤俱死秋七月騎都尉任仁與羌戰累敗而兵士放縱檻車徴詣廷尉死䕶羌校尉段禧卒復以前校尉侯覇代之移居張掖五年春正月先零羌寇河東至河内百姓相驚多南犇渡河使北軍中候朱寵將五營士屯孟津詔魏郡趙國常山中山繕作塢候六百一十六所羌既轉盛而縁邊二千石令長多内郡人並無守戰意皆爭上徙郡縣以避寇難三月詔隴西徙襄武安定徙美陽北地徙池陽上郡徙衙百姓戀土不樂去舊遂乃刈其禾稼發徹室屋夷營壁破積聚時連旱蝗饑荒而驅䠞劫掠流離分散隨道死亡或棄捐老弱或為人僕妾䘮其大半復以任尚為侍御史擊羌於上黨羊頭山破之乃罷孟津屯秋九月漢陽人杜𤦺及弟季貢同郡王信等與羌通謀聚衆據上邽城六年六月侍御史唐喜討漢陽賊王信破斬之杜季貢亡從滇零是嵗滇零死子零昌立年尚少同種狼莫為其計策以季貢為將軍别居丁奚城七年秋䕶羌校尉侯霸騎都尉馬賢擊先零别部牢羌於安定獲首虜千人元初元年三月詔遣兵屯河内通谷衝要三十三所皆作塢壁設鳴鼓以備羌寇五月先零羌寇雍城九月羌豪號多與諸種鈔掠武都漢中巴郡板楯蠻救之漢中五官掾程信率郡兵與蠻共擊破之號多走還斷隴道與零昌合侯霸馬賢與戰於枹罕破之冬十月涼州刺史皮楊擊羌於狄道大敗死者八百餘人二年春䕶羌校尉龎參以恩信招誘諸羌號多等率衆降參遣詣闕賜號多侯印遣之參始還治令居通河西道零昌分兵冦益州遣中郎將尹就討之秋九月尹就擊羌黨吕叔都等蜀人陳省羅横應募刺殺叔都皆封侯賜錢詔屯騎校尉班雄屯三輔雄超之子也以左馮翊司馬鈞行征西將軍督關中諸郡兵八千餘人龎參將羌胡兵七千餘人與鈞分道並擊零昌參兵至勇士東為杜季貢所敗引退鈞等獨進攻拔丁奚城杜季貢率衆偽逃鈞令右扶風仲光等收羌禾稼光等違鈞節度散兵深入羌乃設伏要擊之鈞在城中怒而不救冬十月乙未光等兵敗並没死者三千餘人鈞乃遁還龎參既失期稱病引還皆坐徴下獄鈞自殺時度遼將軍梁慬亦坐事抵罪校書郎中扶風馬融上書稱參慬智能宜宥過責效詔赦參等以馬賢代參領護羌校尉復以任尚為中郎將代班雄屯三輔懷令虞詡説尚曰兵法弱不攻彊走不逐飛自然之勢也今虜皆馬騎日行數百里來如風雨去如絶弦以步追之勢不相及所以雖屯兵二十餘萬曠日而無功也為使君計莫如罷諸郡兵各令出錢數千二十人共市一馬以萬騎之衆逐數千之虜追尾掩截其道自窮便民利事大功立矣尚即上言用其計遣輕騎擊杜季貢於丁奚城破之太后聞虞詡有將帥之畧以為武都太守羌衆數千遮詡于陳倉崤谷詡即停軍不進而宣言上書請兵須到當發羌聞之乃分鈔傍縣詡因其兵散日夜進道兼行百餘里令吏士各作兩竈日増倍之羌不敢逼或問曰孫臏減竈而君增之兵法日行不過三十里以戒不虞而今日且二百里何也詡曰虜衆多吾兵少徐行則易為所及速進則彼所不測虜見吾竈日増必謂郡兵來迎衆多行速必憚追我孫臏見弱吾今示彊勢有不同故也既到郡兵不滿三千而羌衆萬餘攻圍赤亭數十日詡乃令軍中彊弩勿發而潜發小弩羌以為矢力弱不能至幷兵急攻詡於是使二十彊弩共射一人發無不中羌大震退詡因出城奮擊多所傷殺明日悉陳其兵衆令從東郭門出北郭門入貿易衣服回轉數周羌不知其數更相恐動詡計賊當退乃潜遣五百餘人於淺水設伏候其走路虜果大犇因掩擊大破之斬獲甚衆賊由是敗散詡乃占相地勢築營壁百八十所招還流亡假賑貧民開通水運詡始到郡榖石千鹽石八千見戶萬三千視事三年米石八十鹽石四百民増至四萬餘户人足家給一郡遂安三年夏五月癸酉度遼將軍鄧遵率南單于擊零昌於靈州斬首八百餘級六月中郎將任尚遣兵擊破先零羌於丁奚城九月築馮翊北界候塢五百所以備羌十二月丁巳任尚遣兵擊零昌於北地殺其妻子燒其廬落斬首七百餘級四年春二月任尚遣當闐種羌榆鬼等刺殺杜季貢封榆鬼為破羌侯六月尹就坐不能定益州徴抵罪以益州刺史張喬領其軍屯招誘叛羌稍稍降散九月䕶𦍑校尉任尚復募效功種羌號封刺殺零昌封號封為羌王冬十二月甲子任尚與騎都尉馬賢共擊先零羌狼莫追至北地相持六十餘日戰於富平河上大破之斬首五千級狼莫逃去於是西河䖍人種羌萬人詣鄧遵降隴右平五年冬十月鄧遵募上郡全無種羌雕何刺殺狼莫封雕何為羌侯自羌叛十餘年間軍旅之費凡用二百四十餘億府帑空竭邊民及内郡死者不可勝數并涼二州遂至虚耗及零昌狼莫死諸羌瓦解三輔益州無復冦警詔封鄧遵為武陽侯邑三千户遵以太后從弟故爵封優大永寧元年春三月沈氐羌冦張掖夏六月䕶羌校尉馬賢將萬人討沈氐羌於張掖破之斬首千八百級獲生口千餘人餘虜悉降時當煎種大豪饑五等以賢兵在張掖乃乗虚冦金城賢還軍追之出塞斬首數千級而還燒當燒何種聞賢軍還復冦張掖殺長吏初當煎種饑五同種大豪盧忽忍良等千餘户别留允街而首施兩端建光元年春䕶羌校尉馬賢召盧忽斬之因放兵擊其種人獲首虜二千餘忍良等皆亡出塞秋七月燒當羌忍良等以麻奴兄弟本燒當世嫡而校尉馬賢撫恤不至常有怨心遂相結共脅將諸種冦湟中攻金城諸縣八月賢將先零種擊之戰於牧苑不利麻奴等又敗武威張掖郡兵於令居因脅將先零沈氐諸種四千餘户緣山西走冦武威賢追到鸞鳥招引之諸種降者數千麻奴南還湟中延光元年春三月護羌校尉馬賢追擊麻奴到湟中破之種衆散遁十一月燒當羌麻奴饑困將種衆詣漢陽太守耿种降三年九月燒當羌豪麻奴死弟犀苦立順帝永建元年二月隴西鍾羌反校尉馬賢擊之戰於臨洮斬首千餘級羌衆皆降由是涼州復安六年秋九月護羌校尉韓皓轉湟中屯田置兩河間以逼羣羌皓坐事徴以張掖太守馬續代為校尉兩河間羌以屯田近之恐必見圖乃解仇詛盟各自儆備續上移屯田還湟中羌意乃安陽嘉三年秋七月鍾羌良封等復冦隴西漢陽詔拜前校尉馬賢為謁者鎮撫諸種冬十月護羌校尉馬續遣兵擊良封破之四年二月謁者馬賢擊鍾羌大破之永和三年冬十月燒當羌那離等三千餘騎冦金城校尉馬賢擊破之四年三月燒當羌那離等復反夏四月癸卯護羌都尉馬賢討斬之獲首虜千二百餘級五年初那離等既平朝廷以來機為并州刺史劉秉為涼州刺史機等天性虐刻多所擾發且凍傳難種羌遂反攻金城與雜種羌胡大冦三輔殺害長吏機秉並坐徴於是拜馬賢為征西將軍以騎都尉耿叔為副將左右羽林五校士及諸州郡兵十萬人屯漢陽九月令扶風漢陽築隴道塢三百所置屯兵且凍羌冦武都燒隴關初上命馬賢討西羌大將軍商以為賢老不如太中大夫宋漢帝不從漢由之子也賢到軍稽留不進武都太守馬融上疏曰今雜種諸羌轉相鈔盗賢及其未并亟遣深入破其支黨而馬賢等處處留滯羌胡百里望塵千里聽聲今逃匿避回漏出其後則必侵冦三輔為民大害臣願請賢所不可用關東兵五千裁假部隊之號盡力率厲埋根行首以先吏士三旬之中必克破之臣又聞呉起為將暑不張蓋寒不披裘今賢野次垂幕珍肴雜遝兒子侍妾事與古反臣懼賢等專守一城宜攻於西而羌出於東且其將士將不堪命必有髙克潰叛之變也安定人皇甫規赤見賢不恤軍事審其必敗上書言狀朝廷皆不從六年春正月丙子征西將軍馬賢與且凍羌戰於射姑山賢軍敗賢及二子皆没東西羌遂大合閏月鞏唐羌冦隴西遂及三輔燒園陵殺掠吏民三月武都太守趙沖追擊鞏唐羌斬首四百餘級降二千餘人詔沖督河西四郡兵為節度安定上計掾皇甫規上疏曰臣比年以來數陳便宜羌戎未動策其將反馬賢始出知其必敗誤中之言在可考校臣毎惟賢等擁衆四年未有成功縣師之費且百億計出於平民回入姦吏故江湖之人群為盗賊青徐荒饑襁負流散夫羌戎潰叛不由承平皆因邊將失於綏御乗常守安則加侵暴茍競小利則致大害微勝則虚張首級軍敗則隱匿不言軍士勞怨困於猾吏進不得快戰以徼功退不得温飽以全命餓死溝渠暴骨中原徒見王師之出不聞振旅之聲酋豪泣血驚懼生變是以安不能久叛則經年臣所以搏手叩心而増歎者也願假臣兩營二郡屯列坐食之兵五千出其不意與趙沖共相首尾土地山谷臣所曉習兵勢巧便臣已更知可不煩方寸之印尺帛之賜髙可以滌患下可以納降若謂臣年少官輕不足用者凡諸敗將非官爵之不髙年齒之不邁臣不勝至誠没死自陳帝不能用鞏唐羌冦北地北地太守賈福與趙沖擊之不利秋九月諸羌冦武威冬十月癸丑以羌冦充斥涼部震恐復徙安定居扶風北地居馮翊十一月庚子以執金吾張喬行車騎將軍事將兵萬五千人屯三輔漢安元年冬十月罕羌邑落五千餘户詣趙沖降唯燒何種據參䜌未下甲戌罷張喬軍屯二年夏四月庚戌護羌校尉趙沖與漢陽太守張貢擊燒當羌於參䜌破之冬閏十月趙冲擊燒當羌於阿陽破之建康元年春護羌從事馬𤣥為諸羌所誘將羌衆亡出塞領護羌校尉衛琚追擊𤣥等斬首八百餘級趙沖復追叛羌到建威鸇隂河軍度竟所將降胡六百餘人叛走沖將數百人追之遇羌伏兵與戰而殁沖雖死而前後多所斬獲羌由是衰耗詔封沖子為義陽亭侯沖帝永嘉元年西羌叛亂積年費用八十餘億諸將多斷盗牢稟私自潤入皆以珍寳貨賂左右上下放縱不恤軍事士卒不得其死者白骨相望於野左馮翊梁並以恩信招誘叛羌離湳狐奴等五萬餘户皆詣並降隴右復平桓帝延熹二年十二月燒當燒何當煎勒姐等八種羌冦隴西金城塞護羌校尉段熲擊破之追至羅亭斬其酋豪以下二千級獲生口萬餘人三年閏正月西羌餘衆復與燒何大豪冦張掖晨薄校尉段熲軍熲下馬大戰至日中刀折矢盡虜亦引退熲追之且鬬且行晝夜相攻割肉食雪四十餘日遂至積石山出塞二千餘里斬燒何大帥降其餘衆而還冬十一月勒姐零吾種羌圍允街段熲擊破之四年六月零吾羌與先零諸種反冦三輔冬先零沈氐羌與諸種羌冦并涼二州校尉段熲將湟中義從討之涼州刺史郭閎貪共其功稽固熲軍使不得進義從役久戀鄉舊皆悉叛歸郭閎歸罪於熲熲坐徴下獄輸作左校以濟南相胡閎代為校尉胡閎無威略羌遂陸梁覆没營塢轉相招結唐突諸郡冦患轉盛㤗山太守皇甫規上疏曰今猾賊就滅㤗山略平復聞群羌並皆反逆臣生長邠岐年五十有九昔為郡吏再更叛羌豫籌其事有誤中之言臣素有痼疾恐犬馬齒窮不報大恩願乞冗官備單車一介之使勞來三輔宣國威澤以所習地形兵勢佐助諸軍臣窮居孤危之中坐觀郡將已數十年矣自鳥䑕至于東岱其病一也力求猛敵不如清平勤明孫呉未若奉灋前變未逺臣誠戚之是以越職盡其區區詔以規為中郎將持節監關西兵討零吾等十一月規擊羌破之斬首八百級先零諸種羌慕規威信相勸降者十餘萬五年三月沈氐羌冦張掖酒泉皇甫規發先零諸種羌共討隴右而道路隔絶軍中大疫死者十三四規親入庵廬廵視將士三軍感悦東羌遂遣使乞降涼州復通先是安定太守孫儁受取狼藉屬國都尉李翕督軍御史張禀多殺降羌涼州刺史郭閎漢陽太守趙熹並老弱不任職而皆倚恃權貴不遵灋度規到悉條奏其罪或免或誅羌人聞之翕然反善沈氐大豪滇昌饑括等十餘萬口復詣規降十一月滇那羌冦武威張掖酒泉皇甫規持節為將還督鄉里既無它私惠而多所舉奏又惡絶宦官不與交通於是中外並怨遂共誣規貨賂群羌令其文降帝璽書誚讓相屬規上疏自訟曰四年之秋戎醜蠢戾舊都懼駭朝廷西顧臣振國威靈羌戎稽首所省之費亦億以上以為忠臣之義不敢告勞故恥以片言自及微效然比方先事庶免罪悔前踐州界先奏孫雋李翕張禀旋師南征又上郭閎趙熹陳其過惡執據大辟凡此五臣支黨半國其餘墨綬下至小吏所連及者復有百餘吏託報將之怨子思復父之耻載贄馳車懷糧步走交搆豪門競流謗讟云臣私報諸羌讎以錢貨若臣以私財則家無擔石如物出於官則文簿易考就臣愚惑信如言者前世尚遺匈奴以宫姬鎮烏孫以公主今臣但費千萬以懷叛羌則良臣之才略兵家之所貴將有何罪負義違理乎自永初以來將出不少覆軍有五動資巨億有旋車完封寫之權門而名成功立厚加爵封今臣還督本土糾舉諸郡絶交離親戮辱舊故衆謗隂害固其宜也帝乃徴規還拜議郎論功當封而中常侍徐璜左悺欲從求貨數遣賔客就問功狀規終不荅璜等忿怒䧟以前事下之於吏官屬欲賦斂請謝規誓而不聽遂以餘冦不絶坐繫廷尉論輸左校諸公及太學生張鳯等三百餘人詣闕訟之㑹赦歸家六年十二月詔徴皇甫規為度遼將軍規上書薦張奐才略兼優宜正元帥以從衆望若猶為愚臣宜充舉事者願乞冗官以為奐副朝廷從之以奐代規為度遼將軍以規為使匃奴中郎將西州吏民守闕為前䕶羌校尉段熲訟寃者甚衆㑹滇那等諸羌種益熾涼州幾亡乃復以熲為䕶羌校尉七年冬十月護羌校尉段熲擊當煎羌破之八年春正月護羌校尉段熲擊罕姐羌破之閏五月段熲擊破西羌進兵窮追展轉山谷間自春及秋無日不戰虜遂敗散凡斬首二萬三千級獲生口數萬人降者萬餘落封熲都鄉侯九年秋七月鮮卑誘引東羌與共盟詛於是上郡沈氐安定先零諸種共冦武威張掖縁邊大被其毒詔復以張奐為護匈奴中郎將以九卿秩督幽并涼三州永康元年春正月東羌先零圍祋祤掠雲陽當煎諸種復反段熲擊之於鸞鳥大破之西羌遂定夏四月先零羌寇三輔攻没兩營殺千餘人冬十月先零羌冦三輔張奐遣司馬尹端董卓拒擊大破之斬其酋豪首虜萬餘人三州清定靈帝建寧元年初護羌校尉段熲既定西羌而東羌先零等種猶未服度遼將軍皇甫規中郎將張奐招之連年既降又叛桓帝詔問熲曰先零東羌造惡反逆而皇甫規張奐各擁彊衆不時輯定欲令熲移兵東討未識其宜可參思術畧熲上言曰臣伏見先零東羌雖數叛逆而降於皇甫規者已二萬許落善惡既分餘冦無幾今張奐躊躇久不進者當慮外離内合兵往必驚且自冬踐春屯結不散人畜疲羸有自亡之勢欲更招降坐制彊敵耳臣以為狼子野心難以恩納勢窮雖服兵去復動唯當長矛挾脅白刃加頸耳計東種所餘三萬餘落近居塞内路無險折非有燕齊秦趙縱横之勢而久亂并涼累侵三輔西河上郡已各内徙安定北地復至單危自雲中五原西至漢陽二千餘里匈奴諸羌並擅其地是為癰疽伏疾留滯脅下如不加誅轉就滋大若以騎五千步萬人車三千兩三冬二夏足以破定無慮用費為錢五十四億如此則可令群羌破盡匈奴長服内徙郡縣得反本土伏計永初中諸羌反叛十有四年用二百四十億永和之末復經七年用八十餘億費耗若此猶不誅盡餘孽復起于茲作害今不暫疲民則永寧無期臣庶竭駑劣伏待節度帝許之悉聽如所上熲於是將兵萬餘人齎十五日糧從彭陽直詣髙平與先零諸種戰於逢義山虜兵盛熲衆皆恐熲乃令軍中長鏃利刃三矛三重挾以彊弩列輕騎為左右翼謂將士曰今去家數千里進則事成走必盡死努力共功名因大呼衆皆應聲騰赴馳騎於傍突而擊之虜衆大潰斬首八千餘級太后賜詔書褒美曰須東羌盡定當并録功勤今且賜熲錢二十萬以家一人為郎中敕中藏府調金錢綵物增助軍費拜熲破羌將軍六月段熲將輕兵追羌出橋門晨夜兼行與戰於奢延澤落川今鮮水上連破之又戰於靈武谷羌遂大敗秋七月熲至涇陽餘冦四十落悉散入漢陽山谷間護匈奴中郎將張奐上言東羌雖破餘種難盡段熲性輕果慮負敗難常宜且以恩降可無後悔詔書下熲熲復上言臣本知東羌雖衆而輭弱易制所以比陳愚慮思為永寧之算而中郎將張奐説虜彊難破宜用招降聖朝明鑑信納瞽言故臣謀得行奐計不用事勢相反遂懷猜恨信叛羌之訴飾潤辭意云臣兵累見折衂又言羌一氣所生不可誅盡山谷廣大不可空靜血流汗野傷和致災臣伏念周秦之際戎狄為害中興以來羌冦最盛誅之不盡雖降復叛今先零雜種累以反覆攻没縣邑剽掠人物發冡露尸禍及生死上天震怒假手行誅昔邢為無道衛國伐之師興而雨臣動兵涉夏連獲甘霖嵗時豐稔人無疵疫上占天心不為災傷下察人事衆和師克自橋門以西落川以東故宫縣邑更相通屬非為深險絶域之地車騎安行無應折衂案奐為漢吏身當武職駐車二年不能平冦虚欲修文戢戈招降獷敵誕辭空説僣而無徴何以言之昔先零作冦趙充國徙令居内煎當亂邊馬援遷之三輔始服終叛至今為鯁故逺識之士以為深憂今傍郡户口單少數為羌所創毒而欲令降徒與之雜居是猶種枳棘於良田養虺蛇於室内也故臣奉大漢之威建長久之策欲絶其本根不使能殖本規三嵗之費用五十四億今適朞年所耗未半而餘冦殘燼將向殄滅臣毎奉詔書軍不内御願卒斯言一以任臣臨時量宜不失權便二年五月詔遣謁者馮禪説降漢陽散羌段熲以春農百姓布野羌雖暫降而縣官無廩必當復為盗賊不如乗虚放兵勢必殄滅熲於是自進營去羌所屯凡亭山四五十里遣騎司馬田晏假司馬夏育將五千人先進擊破之羌衆潰東犇復聚射虎谷分兵守谷上下門熲規一舉滅之不欲復令散走秋七月熲遣千人於西縣結木為柵廣二十步長四十里遮之分遣晏育等將七千人啣枚夜上西山結營穿塹去虜一里許又遣司馬張愷等將三千人上東山虜乃覺之熲因與愷等挾東西山縱兵奮擊破之追至谷上下門窮山深谷之中處處破之斬其渠帥以下萬九千級馮禪等所招降四千人分置安定漢陽隴西三郡於是東羌悉平熲凡百八十戰斬三萬八千餘級獲雜畜四十二萬七千餘頭費用四十四億軍士死者四百餘人更封新豐縣侯邑萬戸臣光曰書稱天地萬物父母惟人萬物之靈亶聰明作元后元后作民父母夫蠻夷戎狄氣類雖殊其就利避害樂生惡死亦與人同耳御之得其道則附順服從失其道則離叛侵擾固其宜也是以先王之政叛則討之服則懷之處之四裔不使亂禮義之邦而已若乃視之如草木禽獸不分臧否不辨去來悉艾殺之豈作民父母之意哉且夫羌之所以叛者為郡縣所侵寃故也叛而不即誅者將帥非其人故也茍使良將驅而出之塞外擇良吏而牧之則疆埸之臣也豈得専以多殺為快邪夫御之不得其道雖華夏之民亦將蠭起而為冦又可盡誅邪然則段紀明之為將雖克㨗有功君子所不與也通鑑紀事本末卷七上欽定四庫全書通鑑紀事本末卷七下宋袁樞撰鮮卑㓂邉漢桓帝永夀二年初鮮卑檀石槐勇徤有智略部落畏服乃施法禁平曲直無敢犯者遂推以為大人檀石槐立庭於彈汗山歠仇水上去高栁北三百餘里兵馬甚盛東西部大人皆歸焉因南抄縁邊北拒丁零東郤夫餘西撃烏孫盡據匈奴故地東西萬四千餘里秋七月檀石槐㓂雲中以故烏桓校尉李膺為度遼將軍膺到邊羗胡皆望風畏服先所掠男女悉詣塞下送還之初鮮卑㓂遼東屬國都尉武威叚熲率所領馳赴之既而恐賊驚去乃使驛騎詐齎璽書詔熲熲於道偽退潜於還路設伏虜以為信然乃入追熲熲因大縱兵悉斬獲之延熹二年春二月鮮卑㓂鴈門六月鮮卑㓂遼東六年夏五月鮮卑㓂遼東屬國十二月詔徴皇甫規為度遼將軍規上書薦張奐朝廷從之以奐代規為度遼將軍九年春三月詔徴張奐為大司農復以皇甫規代為度遼將軍五月鮮卑聞張奐去招結南匈奴及烏桓同叛六月南匈奴烏桓鮮卑數道入塞㓂掠縁邊九郡冬十二月匈奴烏桓聞張奐至皆相率還降凡二十萬口奐但誅其首惡餘皆慰納之唯鮮卑出塞去朝廷患檀石槐不能制追使持印綬封為王欲與和親檀石槐不肯受而㓂抄兹甚自分其地為三部從右北平以東至遼東接夫餘濊貊二十餘邑為東部從右北平以西至上谷十餘邑為中部從上谷以西至敦煌烏孫二十餘邑為西部各置大人領之靈帝建寜元年冬十二月鮮卑及濊貊㓂幽并二州二年冬十一月鮮卑㓂并州四年冬十月鮮卑㓂并州熹平元年冬十二月鮮卑㓂并州二年鮮卑㓂幽并二州三年冬十二月鮮卑入北地太守夏育率屠各追擊破之遷育為䕶烏桓校尉鮮卑又㓂并州四年五月鮮卑㓂幽州五年鮮卑㓂幽州六年夏四月鮮卑㓂三邊秋七月䕶烏桓校尉夏育上言鮮卑㓂邊自春以來三十餘發請徴幽州諸郡兵出塞擊之一冬二春必能禽滅先是䕶羗校尉田晏坐事論刑被原欲立功自効乃請中常侍王甫求得為將甫因此議遣兵與育并力討賊帝乃拜晏為破鮮卑中郎將大臣多有不同乃召百官議於朝堂蔡邕議曰征討殊類所由尚矣然而時有同異埶有可否故謀有得失事有成敗不可齊也夫以世宗神武將帥良猛財賦充實所括廣逺數十年間官民俱匱猶有悔焉况今人財竝乏事劣昔時乎自匈奴遁迯鮮卑疆盛據其故地稱兵十萬才力勁徤意智益生加以關塞不嚴禁網多漏精金良鐡皆為賊有漢人逋迯為之謀主兵利馬疾過於匈奴昔叚熲良將習兵善戰有事西羌猶十餘年今育晏才䇿未必過熲鮮卑種衆不弱曩時而虚計二載自許有成若禍結兵連豈得中休當復徴發衆人轉運無已是為耗竭諸夏并力蠻夷夫邊垂之患手足之疥搔中國之困胷背之瘭疽方今郡縣盗賊尚不能禁况此醜虜而可伏乎昔髙祖忍平城之恥吕后棄慢書之詬方之於今何者為甚天設山河秦築長城漢起塞垣所以别内外異殊俗也茍無䠞國内侮之患則可矣豈與蟲螘之虜校徃來之數哉雖或破之豈可殄盡而方令本朝為之旰食乎昔淮南王安諫伐越曰如使越人䝉死以逆執事厮輿之卒有一不備而歸者雖得越王之首猶為大漢羞之而欲以齊民易醜虜皇威辱外夷就如其言猶已危矣况乎得失不可量邪帝不從八月遣夏育出髙桞田晏出雲中匈奴中郎將臧旻率南單于出鴈門各將萬騎三道出塞二千餘里檀石槐命三部大人各帥衆逆戰育等大敗喪其節傳輜重各將數十騎犇還死者十七八三將檻車徴下獄贖為庶人十二月遼西太守甘陵趙苞到官遣使迎母及妻子垂當到郡道經桞城值鮮卑萬餘人入塞宼鈔苞母及妻子遂為所劫質載以擊郡苞率騎二萬與賊對陳賊出母以示苞苞悲號謂母曰為子無狀欲以微禄奉養朝夕不圗為母作禍昔為母子今為王臣義不得顧私㤙毁忠節唯當萬死無以塞罪母謂曰威豪人各有命何得相顧以虧忠義爾其勉之苞即時進戰賊悉摧破其母妻皆為所害苞自上歸葬帝遣使弔慰封鄃侯苞葬訖謂鄉人曰食禄而避難非忠也殺母以全義非孝也如是有何面目立於天下遂歐血而死光和元年十一月鮮卑宼酒泉種衆日多縁邊莫不被毒二年十二月鮮卑宼幽并二州三年冬鮮卑宼幽并二州四年冬十月鮮卑宼幽并二州檀石槐死子和連伐立和連才力不及父而貪滛後出攻北地北地射殺之其子騫曼尚㓜兄子魁頭立後騫曼長大與魁頭爭國衆遂離散嬖倖廢立漢和帝元興元年冬十二月辛未帝崩於章德前殿初帝失皇子前後十數後生者輒隠祕養於民間羣臣無知者及帝崩鄧皇后乃收皇子於民間長子勝有痼疾少子隆生始百餘日迎立以為皇太子是夜即皇帝位尊皇后曰皇太后太后臨朝殤帝延平元年三月丙戌清河王慶濟北王夀河間王開常山王章始就國太后特加慶以殊禮慶子祐年十三太后以帝㓜弱逺慮不虞留祜與嫡母耿姬居清河邸耿姬况之曽孫也祜母犍為左姬也八月辛卯帝崩太后與兄車騎將軍騭虎賁中郎將悝等定䇿禁中其夜使隲持節以王青蓋車迎清河王子祜齋於殿中皇太后御崇德殿百官皆吉服陪位引拜祜為長安侯乃下詔以祜為孝和皇帝嗣又作䇿命有司讀䇿畢太尉奉上璽綬即皇帝位太后猶臨朝十二月甲子清河王慶薨安帝永初元年自和帝之喪鄧隲兄弟常居禁中隲不欲乆在内連求還第太后許之夏四月封太傅張禹太尉徐防司空尹勤車騎將軍鄧隲城門校尉鄧悝虎賁中郎將鄧𢎞黄門郎鄧閶皆為列侯食邑各萬戸隲以定䇿功増三千戸隲及諸弟辭譲不獲遂逃避使者間關詣闕上䟽自陳至於五六乃許之初太后以平原王腞有痼疾而貪殤帝孩抱養為己子故立焉及殤帝崩群臣以腞疾非痼意咸歸之太后以前不立腞恐後為怨乃迎帝而立之周章以衆心不附密謀閉宫門誅鄧隲兄弟及鄭衆蔡倫劫尚書廢太后於南宫封帝為逺國王而立平原王事覺冬十一月丁亥章自殺三年春正月庚子皇帝加元服赦天下元初二年十二月鄧𢎞卒封西平侯詔封𢎞子廣德為西平侯封廣德弟甫徳為都鄉侯五年太后弟悝閶皆卒封悝子廣宗為葉侯閶子忠為西華侯建光元年春二月皇太后寢疾癸亥赦天下三月癸巳皇太后鄧氏崩四月尊帝嫡母耿姬為甘陵大貴人帝少號聦明故鄧太后立之及長多不德稍不可太后意帝乳母王聖知之太后徴濟北河間王子詣京師河間王子翼羙容儀太后竒之以為平原懐王後留京師王聖見太后久不歸政慮有廢置常與中黄門李閠江京候伺左右共毁短太后於帝帝毎懐忿懼及太后崩宫人先有受罰者懐怨恚因誣告太后兄弟悝𢎞閶先從尚書鄧訪取廢帝故事謀立平原王帝聞追怒令有司奏悝等大逆無道遂廢西平侯廣宗葉侯廣德西華侯忠陽安侯珍都鄉侯甫德皆為庶人鄧隲以不與謀但免特進遣就國宗族免官歸故郡没入隲等貲財田宅徙鄧訪及家属於逺郡郡縣逼廹廣宗及忠皆自殺又徙封隲為羅侯五月庚辰隲與子鳯並不食而死隲從弟河南尹豹度遼將軍舞陽侯遵將作大匠暢皆自殺唯廣德兄弟以母與閻后同産得留京師復以耿䕫為度遼將軍徴樂安侯鄧康為太僕丙申貶平原王翼為都郡侯遣歸河間翼謝絶賔客閉門自守由是得免大司農京兆宋寵痛隲無罪遇禍乃肉袒輿櫬上䟽曰伏惟和熹皇后聖善之德為漢文母兄弟忠孝同心憂國宗廟有主王室是頼功成身退譲國遜位厯世外戚無與為比當享積善履謙之祐而横為宫人單辭所陷利口傾險反亂國家罪無申證獄不鞫訊遂令隲等罹此酷濫一門七人並不以命屍骸流離寃魂不反逆天感人率土喪氣宜收還冡次寵樹遺孤奉承血祀以謝亡靈衆庶多為隲稱枉者帝意頗悟乃譴譲州郡還葬隲等於北芒諸從昆弟皆得歸京師帝以耿貴人兄牟平侯寳監羽林左軍車騎封宋楊四子皆為列侯宋氏為卿校侍中大夫謁者郎吏十餘人閻皇后兄弟顯景耀並為卿校典禁兵於是内寵始盛帝以江京嘗迎帝於邸以為京功封都鄉侯封李閠為雍鄉侯閠京並遷中常侍京兼大長秋與中常侍樊豊黄門令劉安鉤盾令陳達及王聖聖女伯榮扇動内外競為侈虐伯榮出入宫掖傳通姦賂司徙楊震上䟽曰臣聞政以得賢為本治以去穢為務是以唐虞俊乂在官四凶流放天下咸服以致雍熈方今九德未事嬖倖充庭阿母王聖出自賤微得遭千載奉養聖躬雖有推燥居濕之勤前後賞惠過報勞苦而無厭之心不知紀極外交屬託擾亂天下損辱清朝塵㸃日月夫女子小人近之喜逺之怨實為難養宜速出阿母令居外舍斷絶伯榮莫使徃來令㤙德兩隆上下俱羙奏御帝以示阿母等内倖皆懐忿恚而伯榮驕滛尤甚通於故朝陽侯劉䕶從兄瓌瓌遂以為妻官至侍中得襲䕶爵震上䟽曰經制父死子繼兄亡弟及以防篡也伏見詔書封故朝陽侯劉䕶再從兄瓌襲護爵為侯護同産弟威今猶見在臣聞天子專封封有功諸侯專爵爵有德今瓌無佗功行但以配阿母女一時之間既位侍中又至封侯不稽舊制不合經義行人諠譁百姓不安陛下宜鑒鏡既徃順帝之則尚書廣陵翟酺上䟽曰昔竇鄧之龍傾動四方兼官重紱盈金積貨至使議弄神器改更社稷豈不以執尊威廣以致斯患乎及其破壊頭顙墮地願為孤豚豈可得哉夫致貴無漸失必暴受爵非道殃必疾今外戚寵幸功均造化漢元以來未有等比陛下誠仁㤙周洽以親九族然禄去公室政移私門覆車重尋寧無摧折此最安危之極戒社稷之深計也昔文帝愛百金於露䑓餙帷帳於皁囊或有譏其儉者上曰朕為天下守財耳豈得妄用之哉今自初政已來日月未乆費用賞賜已不可筭歛天下之財積無功之家帑藏單盡民物彫傷卒有不虞復當重賦百姓怨叛既生危亂可待也願陛下勉求忠貞之臣誅逺佞謟之黨割情欲之歡罷宴私之好心存亡國所以失之鑒觀興王所以得之庶災害可息豐年可招矣書奏皆不省延光元年京師及郡國二十七雨水帝數遣黄門常侍及中使伯榮徃來甘陵尚書僕射陳忠上䟽曰今天心未得隔并屡臻青冀之域滛雨漏河徐岱之濱海水盆溢兖豫蝗蝝滋生荆揚稻收儉薄并凉二州羌戎叛戾加以百姓不足府帑虚匱陛下以不得親奉孝德皇園廟此遣中使致敬甘陵朱軒駢馬相望道路可謂孝至矣然臣竊聞使者所過威權翕赫震動郡縣王侯二千石至為伯榮獨拜車下發民修道繕理亭傳多設儲偫徴役無度老弱相随動有萬計賂遺僕從人數百匹頓踣呼嗟莫不叩心河間託叔父之屬清河有陵廟之尊及剖符大臣皆猥為伯榮屈節車下陛下不問必以為陛下欲其然也伯榮之威重於陛下陛下之柄在於臣妾水災之發必起於此昔韓嫣託副車之乘受馳視之使江都誤為一拜而嫣受歐刀之誅臣願明主嚴天元之尊正乾剛之位不宜復令女使干錯萬機重察左右得無石顕泄漏之姦尚書納言得無趙昌譖崇之詐公卿大臣得無朱慱阿傅之援外屬近戚得無王鳯害商之謀若國政一由帝命王事毎决於己則下不得偪上臣不得干君常雨大水必當霽止四方衆異不能為害書奏不省二年夏四月戊子爵乳母王聖為野王君冬十月甲戍以司徙楊震為太尉光禄勲東萊劉熹為司徒大鴻臚耿寳自候震薦中常侍李閠兄於震曰李常侍國家所重欲令公辟其兄寳唯傳上意耳震曰如朝廷欲令三府辟召故宜有尚書敕寳大恨而去執金吾閻顯亦薦所親於震震又不從司空劉授聞之即辟此二人由是震益見怨時詔遣使者大為王聖脩第中常侍樊豐及侍中周廣謝惲等更相扇動輕揺朝廷震上䟽曰臣伏念方今災害滋甚百姓空虚三邊震擾帑藏匱乏殆非社稷安寜之時詔書為阿母興起第舎合兩為一連里竟街雕修繕餙窮極巧技攻山採石轉相迫促為費巨億周廣謝惲兄弟與國無肺腑枝葉之屬依倚近倖姦佞之人與之分威共權屬託州郡傾動大臣宰司辟召承望㫖意招來海内貪汙之人受其貨賂至有臧錮棄世之徒復得顯用白黒溷淆清濁同源天下讙譁為朝結譏臣聞師言上之所取財盡則怨力盡則叛怨叛之人不可復使惟陛下度之上不聽十二月戊辰京師及郡國三地震三年初樊豐周廣謝惲等見楊震連諫不從無所顧忌遂詐作詔書調發司農錢穀大匠見徙材木各起家舎園池楼觀役費無數震復上䟽曰臣備䑓輔不能調和隂陽去年十二月四日京師地動其日戊辰三者皆土位在中官此中臣近官持權用事之象也臣伏惟陛下以邊境未寧躬自菲薄宫殿垣屋傾倚枝拄而已而親近倖臣未崇斷金驕溢踰灋多請徒士盛修第舎賣弄威福道路讙譁地動之變殆為此發又冬無宿雪春節未雨百僚焦心而繕修不止誠致旱之徴也唯陛下奮乾剛之德棄驕奢之臣以承皇天之戒震前後所言轉切帝既不平之而樊豐等皆側目憤怨以其名儒未敢加害㑹河間男子趙騰上書指陳得失帝發怒遂收考詔獄詰以罔上不道震上䟽救之曰臣聞殷周哲王小人怨詈則還自敬德今趙騰所坐激訐謗語為罪與手刃犯法有差乞為虧除全騰之命以誘芻蕘輿人之言帝不聽騰竟伏尸都市及帝東廵樊豐等因乗輿在外競脩第宅太尉部掾髙舒召大匠令史考校之得豐等所詐下詔書具奏須行還上之豐等惶怖㑹太史言星變逆行遂共譖震云自趙騰死後深用怨懟且鄧氏故吏有恚恨之心壬戌車駕還京師便詣太學夜遣使者䇿收震太尉卬綬震於是柴門絶賔客豐等復惡之令大鴻臚耿寳奏震大臣不服罪懐恚望有詔遣歸本郡震行至城西几陽亭乃慷慨謂其諸子門人曰死者士之常分吾䝉㤙居上司疾姦臣狡猾而不能誅惡嬖女傾亂而不能禁何面目復見日月身死之日以雜木為棺布單被裁足蓋形勿歸冢次勿設祭祀因飲酖而卒𢎞農太守移良承樊豐等㫖遣吏於陜縣留停震喪露棺道側讁震諸子代郵行書道路皆為隕涕太僕征羌侯來厯曰耿寳託元舅之親榮寵過厚不念報國㤙而傾側姦臣傷害忠良其天禍亦將至矣厯歙之曽孫也秋八月辛巳以大鴻臚耿寳為大將軍王聖江京樊豐等譖太子乳母王男厨監邴吉等殺之家属徙比景太子思男吉數為歎息京豐懼有後害乃與閻后造搆讒逆傾覆太子及東宫官屬帝怒召公卿以下議廢太子耿寳等承㫖皆以為當廢太僕來厯與太常桓焉廷尉犍為張皓議曰經說年未滿十五過惡不在其身且男吉之謀皇太子容有不知宜選忠良保傅輔以禮義廢置事重此誠聖㤙所宜宿留帝不從焉郁之子也張皓退復上書曰昔賊妄造虚無搆讒臣江充戾園孝武久乃覺寤雖追前失悔之何及今皇太子方十嵗未習保傅之教可遽責乎書奏不省九月丁酉廢皇太子保為濟隂王居於徳陽殿西鍾下來厯乃要結光禄勲祋諷宗正劉瑋將作大匠薛皓侍中閭丘𢎞陳光趙代施延大中大夫九江朱倀等十餘人俱詣鴻都門證太子無過帝與左右患之乃使中常侍奉詔脅羣臣曰父子一體天性自然以義割恩為天下也厯諷等不識大典而與羣小共為讙譁外見忠直而内希後福飾邪違義豈事君之禮朝廷廣開言事之路故且一切假貸若懐迷不反當顯明刑書諫者莫不失色薛皓先頓首曰固宜如明詔厯怫然廷詰皓曰屬通諫何言而今復背之大臣乗朝車處國事固得輾轉若此乎乃各稍自引起厯獨守闕連日不肯去帝大怒尚書令陳忠與諸尚書遂共劾奏厯等帝乃免厯兄弟官削國租黜厯母武安公主不得㑹見是嵗京師及諸郡國二十三地震三十六大水雨雹四年春二月甲辰車駕南廵三月庚申帝至宛不豫乙丑帝發自宛丁卯至葉崩於乗輿年三十二皇后與閻顯兄弟江京樊豐等謀曰今晏駕道次濟隂王在内邂逅公卿立之還為大害乃偽云帝疾甚徙御卧車所在上食問起居如故驅馳行四日庚午還宫辛未遣司徒劉熹詣郊廟社稷告天請命其夕乃發喪尊皇后曰皇太后太后臨朝以顯為車騎將軍儀同三司太后欲乆專國政貪立㓜年與顯等定䇿禁中迎濟北惠王子地鄉侯懿為嗣濟隂王以廢黜不得上殿親臨梓宫悲號不食内外羣僚莫不哀之乙酉北鄉侯即皇帝位夏四月閻顯忌大將軍耿寳位尊權重威行前朝乃風有司奏寳及其黨與中常侍樊豐虎賁中郎將謝惲侍中周廣野王君王聖聖女永等更相阿黨互作威福皆大不道辛卯豐惲廣皆下獄死家屬徙比景貶寳及弟子林慮侯承皆為亭侯遣就國寳於道自殺王聖母子徙鴈門於是以閻景為衛尉耀為城門校尉晏為執金吾兄弟並處權要威福自由冬十月北郷侯病篤中常侍孫程謂濟隂王謁者長興渠曰王以嫡統本無失德先帝用䜛遂至廢黜若北鄉侯不起相與共㫁江京閻顯事無不成者渠然之又中黄門南陽王康先為太子府史及長樂太官丞京兆王國等並附同於程江京謂閻顯曰北鄉侯病不解國嗣宜以時定何不早徴諸王子簡所置乎􅂋以為然辛亥北鄉侯薨顯白太后秘不發喪而更徴諸王子閉宫門屯兵自守十一月乙卯孫程王康王國與中黄門黄龍彭愷孟叔李建王成張賢史汎馬國王道李元楊佗陳予趙封李剛魏猛苗光等聚謀於西鍾下皆截單衣為誓丁巳京師及郡國十六地震是夜程等共㑹崇德殿上因入章臺門時江京劉安及李閠陳達等俱坐省門下程與王康共就斬京安達以李閏權埶積為省内所服欲引為主因舉刀脅閠曰今當立濟隂王無得揺動閠曰諾於是扶閠起俱於西鍾下迎濟隂王即皇帝位時年十二召尚書令僕射以下從輦幸南宫程等留守省門遮扞内外帝豋雲臺召公卿百僚使虎賁羽林士屯南北宫諸門閻顯時在禁中憂迫不知所為小黄門樊豋勸顯以太后詔召越騎校尉馮詩虎賁中郎將閻崇將兵屯平朔門以禦程等顯誘詩入省謂曰濟隂王立非皇太后意璽綬在此茍盡力効功封侯可得太后使授之卯曰能得濟隂玉者封萬戸侯得李閠者五千戸侯詩等皆許諾辭以卒被召所將衆少顯使與豋迎吏士於左掖門外詩因格殺登歸營屯守顯弟衛尉景遽從省中還外府收兵至盛德門孫程傳召諸尚書使收景尚書郭鎮時卧病聞之即率直宿羽林出南止車門逢景從吏士㧞白刃呼曰無干兵鎮即下車持節詔之景曰何等詔因斫鎮不中鎮引劒擊景墮車左右以㦸义其胷遂禽之送廷尉獄即夜死戊午遣使者入省奪得璽綬帝乃幸嘉德殿遣侍御史持節收閻顯及其弟城門校尉耀執金吾晏並下獄諸家屬皆徙比景遷太后於離宫己未開門罷屯兵壬戍詔司𨽻校尉惟閻顯江京近親當伏辜誅其餘務崇寛貸封孫程等皆為列侯程食邑萬戸王康王國食九千戸黄龍食五千戸彭愷孟叔李建食四千二百戸王成張賢史汎馬國王道李元楊佗陳予趙封李剛食四千戸魏猛食二千戸苗光食千戸是為十九侯加賜車馬金銀錢帛各有差李閠以先不豫謀故不封擢孫程為騎都尉初程等入章臺門苗光獨不入詔書録功臣令王康䟽名康詐䟽光入章臺門光未受符䇿心不自安詣黄門令自告有司奏康光欺詐主上詔書勿問以將作大匠來厯為衛尉祋諷劉瑋閭邱𢎞等先卒皆拜其子為郎朱倀施延陳光趙代皆見㧞用後至公卿徴王男邴吉家屬還京師厚加賞賜帝之見廢也監太子家小黄門籍建傅髙梵長秋長趙熹丞良賀藥長夏珍皆坐徙朔方帝即位並擢為中常侍初閻顯辟崔駰之子瑗為吏瑗以北鄉侯立不以正知顕將敗欲說令廢立而􅂋日沈醉不能得見乃謂長史陳禪曰中常侍江京等惑蠱先帝廢黜正統扶立踈孽少帝即位發病廟中周勃之徴於斯復見今欲與君共求見說將軍白太后收京等廢少帝引立濟隂王必上當天心下合人望伊霍之功不下席而立則將軍兄弟傳祚於無窮若拒違天意乆曠神器則將以無罪并辜元惡此所謂禍福之㑹分功之時也禪猶豫未敢從㑹顕敗瑗坐被斥門生蘇祗欲上書言狀瑗遽止之時陳禪為司𨽻校尉召瑗謂曰第聽祗上書禪請為之證瑗曰此譬猶兒妾屏語耳願使君勿復出口遂辭歸不復應州郡令十二月楊震門生虞放陳翼詣闕追訟震事詔除震二子為郎贈錢百萬以禮改葬於華隂潼亭逺近畢至有大鳥髙丈餘集震喪前郡以狀上帝感震忠直詔復以中牢具祠之閻議郎陳禪以為門太后與帝無母子㤙冝徙别館絶朝見群臣議者咸以為宜司徒掾汝南周舉謂李郃曰昔瞽瞍常欲殺舜舜事之逾謹鄭武姜謀殺荘公荘公誓之黄泉秦始皇怨母失行乆而隔絶後感頴考叔茅焦之言復脩子道書傳羙之今諸閻新誅太后幽在離宫若悲愁生疾一旦不虞主上將何以令於天下如從禪議後世歸咎明公宜密表朝廷令奉太后率群臣朝覲如舊以厭天心以荅人望郃即上䟽陳之順帝永建元年春正月帝朝太后於東宫辛未皇太后閻氏崩八月浮陽侯孫程等懐表上殿爭功帝怒有司劾奏程等干亂悖逆王國等皆與程黨乆留京都益其驕恣帝乃免程等官悉徙封逺縣因遣十九侯就國敕洛陽令促期發遣司徒掾周舉説朱倀曰朝廷在西鍾下時非孫程等豈立今忘其大德録其小過如道路夭折帝有殺功臣之譏及今未去宜急表之倀曰今詔指方怒吾獨表此必致罪譴舉曰明公年過八十位為台輔不於今時竭忠報國惜身安寵欲以何求禄位雖全必陷佞邪之譏諫而獲罪猶有忠貞之名若舉言不足採請從此辭倀乃表諫帝果從之程徙封宜城侯到國怨恨恚懟封還印綬符䇿亡歸京師徃來山中詔書追求復故爵土賜車馬衣物遣還田三年冬十二月帝悉召孫程等還京師梁氏之變漢章帝建初七年初明徳太后為帝納扶風宋楊二女為貴人大貴人生太子慶梁松弟竦有二女亦為貴人小貴人生皇子肇竇皇后無子養肇為子宋貴人有寵扵馬太后太后崩竇皇后寵盛與母泚陽公主謀陷宋氏外令兄弟求其纎過内使御者偵伺得失宋貴人病思生兎令家求之因誣言欲為厭􅀈之術由是太子出居承禄觀夏六月甲寅詔曰皇太子有失惑無常之性不可以奉宗廟大義滅親况降退乎今廢慶為清河王皇子肇保育皇后承訓懐袵今以肇為皇太子遂出宋貴人姊妹置丙舎使小黄門蔡倫案之二貴人皆飲藥自殺父議郎楊免歸本郡慶時雖㓜亦知避嫌畏禍言不敢及宋氏帝更憐之敕皇后令衣服與太子齊等太子亦親愛慶入則共室出則同輿八年太子肇之立也梁氏私相慶諸竇聞而惡之皇后欲專名外家忌梁貴人姊妹数譖之扵帝漸致踈嫌是歳竇氏作飛書陷梁竦以惡逆竦遂死獄中家屬徙九真貴人姊妹以憂死辭語連及梁松妻舞隂公主坐徙新城和帝永元九年閠八月辛巳皇太后竇氏崩初梁貴人既死宫省事祕莫有知帝為梁氏出者舞隂公主子梁扈遣從兄䄠奏記三府以為漢家舊典崇貴母氏而梁貴人親育聖躬不蒙尊號求得申議太尉張酺言状帝感動良乆曰扵君意若何酺請追上尊號存録諸舅帝從之㑹貴人姊南陽樊調妻嫕上書自訟曰妾父竦寃死牢獄骸骨不掩母氏年踰七十及弟棠等逺在絶域不知死生願乞收竦朽骨使母弟得歸本郡帝引見嫕乃知貴人枉殁之状三公上奏請依光武黜吕太后故事貶竇太后尊號不宜合𦵏先帝百官亦多上言者帝手詔曰竇氏雖不遵法度而太后常自減損朕奉事十年深惟大義禮臣子無貶尊上之文恩不忍離義不忍虧案前世上官太后亦無降黜其勿復議丙申𦵏章德皇后九月甲子追尊梁貴人為皇太后謚曰恭懐追服喪制冬十月乙酉改𦵏梁太后及其姊大貴人於西陵擢樊調為羽林左監追封諡皇太后父竦為褒親愍侯遣使迎其喪𦵏扵恭懐皇后陵傍徴還竦妻子封子棠為樂平侯棠弟雍為乗氏侯雍弟翟為單父侯位皆特進賞賜以巨萬計寵遇光於當世梁氏自此盛矣順帝永建六年秋九月帝欲立皇后而貴人有寵者四人莫知所建議欲探籌以神定選尚書僕射南郡胡廣與尚書馮翊郭䖍史敞上䟽諫曰竊見詔書以立后事大謙不自專欲假之籌䇿决疑靈神篇籍所記祖宗典故未甞有也恃神任筮既不必當賢就值其人猶非徳選夫岐嶷形扵自然俔天必有異表宜參良家簡求有徳徳同以年年鈞以貌稽之典經斷之聖慮帝從之恭懐皇后弟子乗氏侯商之女選入掖庭為貴人常特被引御從容辭曰夫陽以慱施為德隂以不專為義螽斯則百福之所由興也願陛下思雲雨之均澤小妾得免於罪帝由是賢之陽嘉元年春正月乙巳立貴人梁氏為皇后夏四月梁商加位特進頃之拜執金吾二年三月封執金吾梁商子冀為㐮邑侯尚書令左雄諫曰臣聞人君莫不好忠正而惡䜛䛕然而厯世之患莫不以忠正得罪䜛䛕䝉倖者蓋聽忠難從䛕易也夫刑罪人情之所甚惡貴寵人情之所甚欲是以時俗為忠者少而習䛕者多故令人主數聞其羙稀知其過迷而不悟以至扵危亡梁冀之封事非機急宜過災戹之運然後平議可否於是冀父商譲還冀封書十餘上帝乃從之夏六月丁丑帝引公卿所舉敦樸之士問以當世之敝為政所宜李固對曰夫妃后之家所以少完全者豈天性當然但以爵位尊顕顓揔權柄天道惡盈不知自損故至顛仆先帝寵遇閻氏位號太疾故其受禍曽不旋時老子曰其進銳者其退速也今梁氏戚為椒房禮所不臣尊以髙爵尚可然也而子弟群從榮顕兼加永平建初故事殆不如此宜令歩兵校尉冀及諸侍中還居黄門之官使權去外戚政歸國家豈不休乎四年夏四月戊寅以執金吾梁商為大將軍商稱疾不起且一年帝使太常桓焉奉䇿就第即拜商乃詣闕受命商少通經傳謙恭好士辟漢陽巨覽上黨陳龜為掾屬李固為從事中郎楊倫為長史李固以商柔和自守不能有所整裁乃奏記於商曰數年以來災怪屡見孔子曰智者見變思形愚者覩怪諱名天道無親可為祗畏誠令王綱一整道行忠立明公踵伯成之髙全不朽之譽豈與此外戚凡輩耽榮好位者同日而論哉商不能用永和元年以執金吾梁冀為河南尹冀性嗜酒逸遊自恣居職多縱暴非法父商所親客雒陽令吕放以告商商以譲冀冀遣人於道刺殺放而恐商知之乃推疑放之怨仇請以放弟禹為雒陽令使捕之盡滅其宗親賔客百餘人三年十二月大將軍商以小黄門南陽曹節等用事於中遣子冀不疑與為交友而宦官忌其寵反欲䧟之中常侍張逵蘧政楊定等與左右連謀共譖商及中常侍曹騰孟賁云欲徴諸王子圗議廢立請收商等案罪帝曰大將軍父子我所親騰賁我所愛必無是但汝曹共妒之耳逵等知言不用懼迫遂出矯詔收縳騰賁於省中帝聞震怒敕宦者李歙急呼騰賁釋之收逵等下獄四年春正月庚辰逵等伏誅二月帝以商少子虎賁中郎將不疑為歩兵校尉商上書辭曰不疑童孺猥處成人之位昔晏平仲辭鄁殿以守其富公儀休不受魚飱以定其位臣雖不才亦願固福禄於聖世上乃以不疑為侍中奉車都尉六年春三月上已大將軍商大㑹賔客讌於雒水酒闌繼以䪥露之歌從事中郎周舉聞之歎曰此所謂哀樂失時非其所也殃將及乎秋八月乗氏忠侯梁商病篤敕子冀等曰吾生無以輔益朝廷死何可耗費帑藏衣衾飯含玉匣珠貝之屬何益朽骨百僚勞擾分華道路秪増塵垢耳宜皆辭之丙辰薨帝親臨喪諸子欲從其誨朝廷不聽賜以東園祕器銀鏤黄腸玉匣及葬賜輕車介士中宫親送帝幸宣陽亭瞻望車騎壬戍以河南尹乗氏侯梁冀為大將軍冀弟侍中不疑為河南尹臣光曰成帝不能選任賢俊委政舅家可謂闇矣猶知王立之不材棄而不用順帝援大柄授之后族梁冀頑嚚凶暴著於平昔而使之繼父之位終於悖逆蕩覆漢室校於成帝闇又甚焉十一月荆州盜賊起彌年不定以大將軍從事中郎李固為荆州刺史固到遣吏勞問境内赦寇盜前釁與之更始於是賊帥夏密等率其魁黨六百餘人自縛歸首固皆原之遣還使自相招集開示威法半歲間餘類悉降州内清平奏南陽賜等贓穢賜等重賂大將軍梁冀冀為之千里移檄而固持之愈急冀遂徙固為㤗山太守時㤗山盗賊屯聚厯年郡兵常千人追討不能制固到悉罷遣歸農但選留任戰者百餘人以恩信招誘之未滿歳賊皆弭散漢安元年秋八月丁卯遣侍中河内杜喬周舉守光禄大夫周栩馮羡魏邵欒巴張綱郭遵劉班分行州郡表賢良顯忠勤其貪汚有罪者刺史二千石驛馬上之墨綬以下便輒收舉喬等受命之部張綱獨埋其車輪於雒陽都亭曰豺狼當路安問狐狸遂劾奏大將軍冀河南尹不疑以外戚䝉恩居阿衡之任而專肆貪叨縱恣無極多樹謟䛕以害忠良誠天威所不赦大辟所宜加也謹條其無君之心十五事斯皆臣子所切齒者也書御京師震竦時皇后寵方盛諸梁姻族滿朝帝雖知綱言直不能用也杜喬至兖州表奏㤗山太守李固政為天下第一上徴固為將作大匠八使所劾奏多梁冀及宦者親黨互為請救事皆寢遏侍御史河南种暠疾之復行案舉廷尉呉雄將作大匠李固亦上言八使所紏宜急誅罰帝乃更下八使奏章令考正其罪梁冀恨張綱思有以中傷之時廣陵賊張嬰寇亂楊徐閒積十餘年二千石不能制冀乃以綱為廣陵太守前太守率多求兵馬綱獨請單車之職既到徑詣嬰壘門嬰大驚遽走閉壘綱於門外罷遣吏兵獨留所親者十餘人以書喻嬰請與相見嬰見綱至誠乃出拜謁綱延置上坐譬之曰前後二千石多肆貪㬥故致公等懐憤相聚二千石信有罪矣然為之者又非義也今主上仁聖欲以文德服叛故遣大守來思以爵禄相榮不願以刑罰相加今誠轉禍為福之時也若聞義不服天子赫然震怒荆楊兖豫大兵雲合身首横分血嗣俱絶二者利害公其深計之嬰聞泣下曰荒裔愚民不能自通朝廷不堪侵枉遂復相聚偷生若魚逰釡中知其不可乆且以喘息須臾間耳今聞明府之言乃嬰等更生之辰也乃辭還营明日將所部萬餘人與妻子面縳歸降綱單車入嬰壘大㑹置酒為樂散遣部衆任從所之親為卜居宅相田疇子弟欲為吏者皆引召之人情恱服南州晏然朝廷論功當封梁冀遏之在郡一嵗卒建康元年秋八月庚午帝崩於玉堂前殿太子即皇帝位年二嵗尊皇后曰皇太后太后臨朝九月丙午京師及太原鴈門地震庚戌詔舉賢良方正之士䇿問之皇甫規對曰伏惟孝順皇帝初勤王政紀綱四方幾以獲安後遭姦偽威分近習受賂賣爵賔客交錯天下擾擾從亂如歸官民並竭上下窮虚陛下體兼乾坤聦哲純茂攝政之初拔用忠貞其餘維綱多所改正逺近翕然望見太平而災異不息寇賊縱横殆以姦臣權重之所致也其常侍尤無狀者宜亟黜遣披埽凶黨收入財賄以塞痛怨以荅天誡大將軍冀河南尹不疑亦冝増脩謙節輔以儒術省去遊娯不急之務割减廬第無益之飾夫君者舟也民者水也羣臣乗舟者也將軍兄弟操檝者也若能平志畢力以度元元所謂福也如其怠㢮將淪波濤可不慎乎夫德不稱禄猶鑿墉之趾以益其髙豈量力審功安國之道哉凡諸宿猾酒徒戯客皆宜貶斥以懲不軌令冀等深思得賢之福失人之累梁冀忿之以規為下第拜郎中託疾免歸州郡承冀㫖幾䧟死者再三遂沈廢於家積十餘年冲帝永嘉元年春正月戊戍帝崩於玉堂前殿梁太后以楊徐盗賊方盛欲須所徴諸王侯到乃發喪太尉李固曰帝雖㓜少猶天下之父今日崩亡人神感動豈有人子反共掩匿乎昔秦皇沙邱之謀及近日北鄉之事皆祕不發喪此天下大忌不可之甚者也太后從之即暮發喪徴清河王蒜及渤海孝王鴻之子纉皆至京師蒜父曰清河恭王延平延平及鴻皆樂安夷王寵之子十乗貞王伉之孫也清河王為人嚴重動止有法度公卿皆歸心焉李固謂大將軍冀曰今當立帝宜擇長年髙明有德任親政事者願將軍審詳大計察周霍之立文宣戒鄧閻之利㓜弱冀不從與太后定䇿禁中丙辰冀持節以王青蓋車迎讃入南宫丁巳封為建平侯其日即皇帝位年八嵗蒜罷歸國太后委政宰輔李固所言太后多從之黄門宦官為惡者一皆斥遣天下咸望治平而梁冀深忌疾之初順帝時所除官多不以次及固在事奏免百餘人此等既怨又希望冀㫖遂共作飛章誣奏固曰太尉李固由公假私依正行邪離閒近戚自隆支黨大行在殯路人掩涕固獨胡粉飾貌搔頭㺯姿繁旋偃仰從容治歩曽無慘怛傷悴之心山陵未成違矯舊政善則稱已過則歸君斥逐近臣不得侍送作威作福莫固之甚矣夫子罪莫大於累父臣惡莫深於毁君固之過釁事合誅辟書奏冀以白太后使下其書太后不聼冬十一月永昌太守劉君世鑄黄金為文蛇以獻大將軍冀益州刺史种暠紏發逮捕馳傳上言冀由是恨暠㑹巴郡人服直聚黨数百人自稱天王暠與太守應承討捕不克吏民多被傷害冀因此䧟之傳逮暠承李固上䟽曰臣伏聞討捕所傷本非暠承之意實由縣吏懼法畏罪迫逐深苦致此不詳比盗賊群起處處未絶暠承以首舉大姦而相隨受罪臣恐沮傷州縣紏發之意更共飾匿莫復盡心太后省奏乃赦暠承罪免官而已金蛇輸司農冀從大司農杜喬借觀之喬不肯與冀小女死令公卿㑹喪喬獨不徃冀由是衘之質帝本初元年帝少而聦慧甞因朝㑹目梁冀曰此䟦扈將軍也冀聞深惡之閏六月甲申冀使左右置毒於煮餅以進之帝苦煩甚使促召太尉李固固入前問帝得患所由帝尚能言曰食煮餅今腹中悶得水尚可活時冀亦在側曰恐吐不可飲水語未絶而崩固伏尸號哭推舉侍醫冀慮其事泄大惡之將議立嗣固與司徒胡廣司空趙戒先與冀書曰天下不幸頻年之閒國祚三絶今當立帝天下重器誠知太后垂心將軍勞慮詳擇其人務存聖明然愚情眷眷竊獨有懐逺尋先世廢立舊儀近見國家踐阼前事未甞不詢訪公卿廣求群議令上應天心下合衆望傳曰以天下與人易為天下得人難昔昌邑之立昬亂日滋霍光憂愧發憤悔之折骨自非􅀶陸忠勇延年奮發大漢之祀幾將傾矣至憂至重可不熟慮悠悠萬事唯此為大國之興衰在此一舉冀得書乃召三公中二千石列侯大議所立固廣戒及大鴻臚杜喬皆以為清河王蒜明德著聞又屬最尊親宜立為嗣朝臣莫不歸心而中常侍曹騰甞謁蒜蒜不為禮宦者由此惡之初平原王翼既貶歸河間其父請分蠡吾縣以侯之順帝許之翼卒子志嗣梁太后欲以女弟妻志徴到夏門亭㑹帝崩梁冀欲立志衆論既異憤憤不得意而未有以相奪曹騰等聞之夜徃説冀曰將軍累世有椒房之親秉攝萬機賔客縱横多有過差清河王嚴明若果立則將軍受禍不乆矣不如立蠡吾侯富貴可長保也冀然其言明日重㑹公卿冀意氣凶凶言辭激切自胡廣趙戒以下莫不懾憚皆曰惟大將軍令獨李固杜喬堅守本議冀厲聲曰罷㑹固猶望衆心可立復以書勸冀冀愈激怒丁亥冀說太后先䇿免固戍子以司徒胡廣為太尉司空趙戒為司徒與大將軍冀參録尚書事太僕袁湯為司空湯安之孫也庚寅使大將軍冀持節以王青蓋車迎蠡吾侯志入南宫其日即皇帝位時年十五太后猶臨朝政秋七月大將軍掾朱穆奏記勸戒梁冀曰明年丁亥之嵗刑德合於乾位易經龍戰之㑹陽道將􅀈隂道將負願將軍專心公朝割除私欲廣求賢能斥逺佞惡爲皇帝置師傅得小心忠篤敦禮之士將軍與之俱入參勸講授師賢法古此猶倚南山坐平原也誰能傾之議郎大夫之位本以式序儒術髙行之士今多非其人九卿之中亦有乖其任者惟將軍察焉又薦种暠欒巴等冀不能用穆暉之孫也桓帝建和元年六月太尉胡廣罷光禄勲杜喬為太尉自李固之廢内外䘮氣群臣側足而立唯喬臣色無所囬撓由是朝野皆倚望焉秋七月詔以定䇿功益封梁冀萬三千戸封冀弟不疑為頴陽侯蒙為西平侯冀子𦙍爲㐮邑侯胡廣爲安樂侯趙戒為厨亭侯袁湯為安國侯又封中常侍劉廣等皆為列侯杜喬諫曰古之明君皆以用賢賞罰為務失國之主其朝豈無貞幹之臣典誥之篇哉患得賢不用其謀韜書不施其敎聞善不信其義聽䜛不審其理也陛下自藩臣即位天人屬心不急忠賢之禮而先左右之封梁氏一門宦者㣲孽並帶無功之紱裂勞臣之土其為乖濫胡可􅀈言夫有功不賞為善失其望姦回不詰為惡肆其凶故陳資斧而人靡畏班爵位而物無勸茍遂斯道豈伊傷政為亂而已喪身亡國可不慎哉書奏不省八月乙未立皇后梁氏梁冀欲以厚禮迎之杜喬據執舊典不聽冀屬喬舉汜宫為尚書喬以宫為臧罪不用由是日忤於冀九月丁卯京師地震喬以災異䇿免冬十月以司徒趙戒為太尉司空袁湯為司徒前太尉胡廣為司空宦者唐衡左悺等共譛杜喬於帝曰陛下前當即位喬與李固抗議以為不堪奉漢宗祀帝亦怨之十一月清河劉文與南郡妖賊劉鮪交通妄言清河王當統天下欲共立蒜事覺文等遂刼清河相謝暠曰當立王為天子以暠為公暠罵之文刺殺暠於是捕文鮪誅之有司劾奏蒜坐貶爵為尉氏侯徙桂陽自殺梁冀因誣李固杜喬云與文鮪等交通請逮按罪太后素知喬忠不許冀遂收固下獄門生渤海王調貫械上書證固之枉河内趙承等數十人亦要鈇鑕詣闕通訴太后詔赦之及出獄京師市里皆稱萬嵗冀聞之大驚畏固名德終為己害乃更據奏前事大將軍長史呉祐傷固之枉與冀争之冀怒不從從事中郎馬融主為冀作章表融時在坐祐謂融曰李公之罪成於卿手李公若誅卿何面目視天下人冀怒起入室祐亦徑去固遂死於獄中臨命與胡廣趙戒書曰固受國厚㤙是以竭其股肱不顧死亡志欲扶持王室比隆文宣何圗一朝梁氏迷謬公等曲從以吉為凶成事為敗乎漢家衰微從此始矣公等受主厚禄顛而不扶傾覆大事後之良史豈有所私固身已矣於義得矣夫復何言廣戒得書悲慙皆長歎流涕而已冀使人脅杜喬曰早從宜妻子可得全喬不肯明日冀遣騎至其門不聞哭者遂白太后收繫之亦死獄中冀暴固喬尸於城北四衢令有敢臨者加其罪固弟子汝南郭亮尚未冠左提章鉞右秉鈇鑕詣闕上書乞收固尸不報與南陽董班俱徃臨哭守喪不去夏門亭長呵之曰卿曹何等腐生公犯詔書欲干試有司乎亮曰義之所動豈知性命何為以死相懼邪太后聞之皆赦不誅杜喬故掾陳留楊匡號泣星行到雒陽著故赤幘託為夏門亭吏守護尸喪積十二日都官從事執之以聞太后赦之匡因詣闕上書并乞李杜二公骸骨使得歸葬太后許之匡送喬喪還家葬訖行服遂與郭亮董班皆隠匿終身不仕梁冀出呉祐為河間相祐自免歸卒於家冀以劉鮪之亂思朱穆之言於是請种暠為從事中郎薦欒巴為議郎舉穆髙第為侍御之二年春三月戊辰帝從皇太后幸大將軍冀府和平元年春正月乙丑太后詔歸政於帝始罷稱制二月甲寅太后梁氏崩三月甲午葬順烈皇后増封大將軍冀萬戸并前合三萬戸封冀妻孫壽為㐮城君兼食陽翟租嵗入五千萬加賜赤紱比長公主壽善為妖態以蠱惑冀冀甚寵憚之冀愛監奴秦宫官至太倉令得出入壽所威權大震刺史二千石皆謁辭之冀與壽對街為宅殫極土木互相誇競金玉珍怪充積藏室又廣開園圃採土築山十里九阪深林絶澗有若自然竒禽馴獸飛走其間冀壽共乗輦車游觀第内多從倡伎酣驅竟路􅂉連日繼夜以聘娯恣客到門不得通皆請謝門者門者累千金又多拓林苑周徧近縣起兎苑於河南城西經亘數十里移檄所在調發生兎刻其毛以為識人有犯者罪至死刑甞有西域賈胡不知禁忌誤殺一兎轉相告言坐死者十餘人又起别第於城西以納姦亡或取良人悉為奴婢至數千口名曰自賣人冀用壽言多斥奪諸梁在位者外以示謙譲而實崇孫氏孫氏宗親冐名為侍中卿校郡守長吏者十餘人皆貪饕凶滛各遣私客籍屬縣富人被以它罪閉獄掠拷使出錢自贖貲物少者至於死徙扶風人士孫奮居富而性吝冀以馬乗遺之從貸錢五千萬奮以三千萬與之冀大怒乃告郡縣認奮母為其守藏婢云盗白珠十斛紫金千斤以叛遂收考奮兄弟死於獄中悉没貲財億七千餘萬冀又遣客周流四方逺至塞外廣求異物而使人復乗埶横暴妻略婦女敺擊吏卒所在怨毒侍御史朱穆自以冀故吏奏記諫曰明將軍地有申伯之尊位為群公之首一日行善天下歸仁終朝為惡四海傾覆頃者官民俱匱加以水蟲為害京師諸官費用増多詔書發調或至十倍各言官無見財皆當出民搒掠割剥彊令充足公賦既重私歛又深牧守長吏多非德選貪聚無厭遇民如虜或絶命於箠楚之下或自賊於廹切之求又掠奪百姓皆託之尊府遂令將軍結怨天下吏民酸毒道路歎嗟昔永和之末綱紀少㢮頗失人望四五嵗耳而財空户散下有離心馬勉之徒乗敝而起荆陽之間幾成大患幸頼順烈皇后初政清静内外同力僅乃討定今百姓戚戚困於永和内非仁愛之心可得容忍外非守國之計所宜乆安也夫將相大臣均體元首共輿而馳同舟而濟輿傾舟覆患實共之豈可以去明即昧履危自安主孤時困而莫之䘏乎宜時易宰守非其人者減省第宅園池之費拒絶郡國諸所奉送内以自明外觧人惑使挾姦之吏無所依託司察之臣得盡耳目憲度既張逺邇清一則將軍身尊事顕德燿無窮矣冀不納冀雖專朝縱横而猶交結左右宦官任其子弟賔客以為州郡要職欲以自固恩寵穆又奏記極諫冀終不悟報書云如此僕亦無一可邪然素重穆亦不甚罪也冀遣書詣樂安太守陳蕃有所請託不得通使者詐稱他客求謁蕃蕃怒笞殺之坐左轉脩武令時皇子有疾下郡縣市珍藥而冀遣客齎書詣京兆并貨牛黄京兆尹南陽延篤發書收客曰大將軍椒房外家而皇子有疾必應陳進醫方豈當使客千里求利乎遂殺之冀慙而不得言有司承㫖求其事篤以病免元嘉元年春正月朔群臣朝賀大將軍冀帯劒入省尚書蜀郡張陵呵叱令出敕羽林虎賁奪劒冀跪謝陵不應即劾奏冀請廷尉論罪有詔以一嵗俸贖百僚肅然河南尹不疑甞舉陵孝亷乃謂陵曰昔舉君適所以自罰也陵曰明府不以陵不肖誤見擢序今申公憲以報私㤙不疑有愧色梁不疑好經書喜待士梁冀疾之轉不疑為光禄勲以其子𦙍為河南尹𦙍年十六容貌甚陋不勝冠帯道路見者莫不蚩笑不疑自恥兄弟有隙遂譲位歸第與弟䝉閉門自守冀不欲令與賔客交通隂使人變服至門記徃來者南郡太守馬融江夏太守田明初除過謁不疑冀諷有司奏融在郡貪汚及以它事䧟明皆髠笞徙朔方融自刺不殊明遂死於路夏四月己丑上微行幸河南尹梁𦙍府舎是日大風㧞樹晝昬尚書楊秉上䟽曰臣聞天不言語以災異譴告王者至尊出入有常警蹕而行静室而止自非郊廟之事則鑾旗不駕故諸侯入諸臣之家春秋尚列其誡况於以先王法服而私出槃游降亂尊卑等威無序侍衛守空宫璽紱委女妾設有非常之變任章之謀上負先帝下悔靡及帝不納秉震之子也十一月辛巳京師地震詔百官舉獨行之士涿郡舉崔寔詣公車稱病不對䇿退而論世事名曰政論其辭曰凡天下所以不治者常由人主承平日乆俗漸敝而不悟政寖衰而不改習亂安危怢不自覩或荒耽耆欲不恤萬機或耳蔽箴誨厭偽忽眞或猶豫岐路莫適所從或見信之佐括嚢宋禄或踈逺之臣言以賤廢是以王綱縱弛於上智士鬱伊於下悲夫自漢興以來三百五十餘嵗矣政令垢翫上下怠懈百姓囂然咸復思中興之救矣且濟時拯世之術在於補䘺决壊枝拄邪傾隨形裁割要措斯世於安寧之域而已故聖人執權遭時定制歩驟之差各有云設不彊人以不能背急切而慕所聞也蓋孔子對葉公以來逺哀公以臨人景公以節禮非其不同所急異務也俗人拘文牽古不達權制竒偉所聞簡忽所見烏可與論國家之大事哉故言事者雖合聖聽輒見掎奪何者其頑士闇於時權安習所見不知樂成况可慮始茍云率由舊章而已其達者或矜名妒能恥䇿非已舞筆奮辭以破其義寡不勝衆遂見擯弃雖稷契復存猶將困焉斯賢智之論所以常憤鬱而不伸者也凡為天下者自非上德嚴之則治寛之則亂何以明其然也近孝宣皇帝明於君人之道審於為政之理故嚴刑峻法破姦軌之膽海内清肅天下宻如筭計見效優於孝文及元帝即位多行寛政卒以墮損威權始奪遂為漢室基禍之主政道得失於斯可監昔孔子作春秋褒齊桓懿晉文歎管仲之功夫豈不美文武之道哉誠達權救敝之理也故聖人能與世推移而俗士苦不知變以為結繩之約可復治亂秦之緒干戚之舞足以解平城之圍夫熊經鳥伸雖延厯之術非傷寒之理呼吸吐納雖度紀之道非續骨之膏蓋為國之法有似治身平則致養疾則攻焉夫刑罰者治亂之藥石也德教者興平之梁肉也夫以德教除殘是以梁肉治疾也以刑罰治平是以藥石供養也方今承百王之敝值戹運之㑹自數世以來政多㤙貸馭委其轡馬駘其衘四牡横犇皇路險傾方將拑勒鞬輈以救之豈暇鳴和鑾清節奏哉昔文帝雖除肉刑當斬右趾者弃市笞者徃徃至死是文帝以嚴致平非以寛致平也寔瑗之子也山陽仲長統甞見其書歎曰凡為人主宜冩一通置之坐側臣光曰漢家之法已嚴矣而崔寔猶病其寛何哉蓋衰世之居率多柔懦凡愚之佐唯知姑息是以權幸之臣有罪不坐豪猾之民犯法不誅仁㤙所施止於目前姦宄得志紀綱不立故崔寔之論以矯一時之枉非百世之通義也孔子曰政寛則民慢慢則糾之以猛猛則民殘殘則施之以寛寛以濟猛猛以濟寛政是以和斯不易之常道也閏月帝欲褒崇梁冀使中朝二千石以上㑹議其禮特進胡廣太常羊溥司𨽻校尉祝恬太中大夫邊韶等咸稱冀之勲德宜比周公錫之山川土田附庸黄瓊獨曰冀前以親迎之勞増邑萬三千戸又其子𦙍亦加封賞今諸侯以戸邑為制不以里數為限冀可比鄧禹合食四縣朝廷從之於是有司奏冀入朝不趨劒履上殿謁讃不名禮儀比蕭何悉以定陶陽成餘戸増封為四縣比鄧禹賞賜金錢奴婢彩帛車馬衣服甲第比霍光以殊元勲毎朝㑹與三公絶席十日一入平尚書事宣布天下為萬世法冀猶以所奏禮薄意不恱永壽二年冬十二月封梁不疑子馬為潁隂侯梁𦙍子桃為城父侯延熹元年夏五月甲戍晦日有食之太史令陳授因小黄門徐璜陳日食之變咎在大將軍冀冀聞之諷雒陽收考授死於獄帝由是怒冀冬十二月以京兆尹陳龜為度遼將軍大將軍冀與陳龜素有隙譛其沮毁國威挑取功譽不為胡敵所畏坐徴還以种暠為度遼將軍龜遂乞骸骨歸田里復徴為尚書冀暴虐日甚龜上䟽言其罪狀請誅之帝不省龜自知必為冀所害不食七日而死二年六月梁皇后恃姊兄䕃埶恣極奢靡兼倍前世專寵妬忌六宫莫得進見及太后崩㤙寵寖衰后既無子毎宫人孕育鮮得全者帝雖迫畏梁冀不敢譴怒然進御轉稀后益憂恚秋七月丙午皇后梁氏崩乙丑𦵏懿獻皇后於懿陵梁冀一門前後七侯三皇后六貴人二大將軍夫人女食邑稱君者七人尚公主者三人其餘卿將尹校五十七人冀專擅威柄凶恣日積宫衛近侍並樹所親禁省起居纎微必知其四方調發歳時貢獻皆先輸上第於冀乘與乃其次焉吏民齎貨求官請罪者道路相望百官遷召皆先到冀門牋檄謝㤙然後敢詣尚書下邳呉樹為宛令之官辭冀冀賔客布在縣界以情託樹樹曰小人姦蠧比屋可誅明將軍䖏上將之位宜崇賢善以補朝闕自侍坐以來未聞稱一長者而多託非人誠非敢聞冀嘿然不恱樹到縣遂誅殺冀客為人害者數十人樹後為荆州刺史辭冀冀鴆之出死車上遼東太守侯猛初拜不謁冀冀託以它事腰斬之郎中汝南袁著年十九詣闕上書曰夫四時之運功成則退髙爵厚寵鮮不致災今大將軍位極功成可為至戒宜遵縣車之禮髙枕頥神傳曰木實繁者披枝害心若不抑損盛權將無以全其身矣冀聞而密遣掩捕著乃變易姓名託病偽死結蒲為人市棺殯送冀知其詐求得笞殺之太原郝絜胡武好危言髙論與著友善絜武甞連名奏記三府薦海内髙士而不詣冀冀追怒之敕中都官移檄禽捕遂誅武家死者六十餘人絜初逃亡知不得免因輿櫬奏書冀門書入仰藥而死家乃得全安帝嫡母耿貴人薨冀從貴人從子林慮侯承求貴人珍玩不能得冀怒并族其家十餘人涿郡崔𤦺以文章為冀所善琦作外戚箴白鵠賦以風冀怒琦曰昔管仲相齊樂聞譏諫之言蕭何佐漢乃設書過之吏今將軍累世台輔任齊伊周而德政未聞黎元塗炭不能結納貞良以救禍敗反欲鉗塞士口杜蔽主聽將使𤣥黄改色馬鹿易形乎冀無以對因遣琦歸𤦺懼而亡匿冀捕得殺之冀秉政幾二十年威行内外天子拱手不得有所親與帝既不平之及陳授死帝愈怒和熹皇后從兄子郎中鄧香妻宣生女猛香卒宣更適梁紀紀孫夀之舅也壽以猛色美引入掖庭為貴人冀欲認猛為其女易猛姓為梁冀恐猛姊壻議郎邴尊沮敗宣意遣客刺殺之又欲殺宣宣家與中常侍袁赦相比冀客豋赦屋欲入宣家赦覺之鳴鼓㑹衆以告宣宣馳入白帝帝大怒因如厠獨呼小黄門史唐衡門左右與外舎不相得者誰乎衡對中常侍單超小黄門史左悺與梁不疑有隙中常侍徐璜黄門令具瑗常私忿疾外舎放横口不敢道於是帝呼超悺入室謂曰梁將軍兄弟專朝迫脅外内公卿以下從其風㫖今欲誅之於常侍意如何超等對曰誠國姦賊當誅日乆臣等弱劣未知聖意何如耳帝曰審然者常侍密圗之對曰圗之不難但恐陛下腹中狐疑帝曰姦臣脅國當伏其罪何疑乎於是更召璜瑗等五人共定其議帝齧超臂出血為盟超等曰陛下今計已决勿復更言恐為人所疑冀心疑超等八月丁丑使中黄門張惲入省宿以防其變具瑗敕吏收惲以輒從外入欲圗不軌帝御前殿召諸尚書入發其事使尚書令尹勲持節勒丞郎以下皆操兵守省閤歛諸符節送省中使具瑗將左右廐騶虎賁羽林都候劒㦸士合千餘人與司𨽻校尉張彪共圍冀第使光禄勲袁旰持節收冀大將軍印綬徙封比景都郷侯冀及妻夀即日皆自殺不疑蒙先卒悉收梁氏孫氏中外宗親送詔獄無長少皆棄市它所連及公卿列校刺史二千石死者數十人太尉胡廣司徒韓縯司空孫朗皆坐阿附梁冀不衛宫止長壽亭減死一等免為庶人故吏賔客免黜者三百餘人朝廷為空是時事猝從中發使者交馳公卿失其度官府市里鼎沸數日乃定百姓莫不稱慶收冀財貨縣官斥賣合二十餘萬萬以充王府用減天下税租之半散其苑囿以業窮民通鑑紀事本末卷七下
