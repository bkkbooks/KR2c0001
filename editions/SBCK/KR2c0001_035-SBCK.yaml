body:
  text: 南詔歸附唐􅀇宗開元二十六年秋九月戊午冊南詔蒙歸義為雲南王歸義之先本哀牢夷地居姚州之西東南接交趾西北接吐蕃蠻語謂王曰詔先有六詔曰蒙舍曰蒙越曰越折曰浪穹曰様備曰越澹兵力相埒莫能相壹厯代因之以分其勢蒙舍最在南故謂之南詔高宗時䝉舍細奴邏初入朝細奴邏生邏盛邏盛生盛邏皮盛邏皮生皮邏閤皮邏閤浸彊大而五詔微弱㑹有破渳河蠻之功乃賂王昱求合六詔為一昱為之奏請朝廷許之仍賜名歸義於是以兵威脅服羣蠻不從者滅之遂擊破吐蕃徙居大和城其後卒爲邊患天寳七載雲南王歸義卒子閤羅鳳嗣以其子鳳迦異爲陽􅀲州刺史九載楊國忠德鮮于仲通薦爲劔南節度使仲通性􅄶急失蠻夷心故事南詔常與妻子俱謁都督過雲南雲南太守張䖍陀皆私之又多所徵求南詔王閤羅鳳不應䖍陀遣人詈辱之仍密奏其罪閤羅鳳忿怨是歲發兵反攻陷雲南殺䖍陀取夷州三十二十載夏四月壬午劒南節度使鮮于仲通討南詔蠻大敗於瀘南時仲通將兵八萬分二道出戎嶲州至曲州靖州南詔王閤羅鳳遣使謝罪請還所俘掠城雲南而去且曰今吐蕃大兵壓境若不許我我將歸命吐蕃雲南非唐有也仲通不許囚其使進軍至西洱河與閤羅鳳戰軍大敗士卒死者六萬人仲通僅以身免楊國忠掩其敗狀仍叙其戰功閤羅鳳斂戰尸築為京觀遂北臣於吐蕃蠻語謂弟為鐘吐蕃命閤羅鳳為賛普鐘號曰東帝給以金印閤羅鳳刻碑於國門言己不得已而叛唐且曰我世世事唐受其封賞後世容復歸唐當指碑以示唐使者知吾之叛非本心也制大募兩京及河南北兵以擊南詔人聞雲南多瘴癘未戰士卒死者什八九莫肯應募楊國忠遣御史分道捕人連枷送詣軍所舊制百姓有勲者免征役時調兵既多國忠奏先取高勲於是行者愁怨父母妻子送之所在哭聲振野十一載夏六月甲子楊國忠奏吐蕃兵六十萬救南詔劒南兵擊破之於雲南克故隰州等三城捕虜六千三百以道遠簡壯者千餘人及酋長降者獻之十三載夏六月侍御史劒南留後李宓將兵七萬擊南詔閤羅鳯誘之深入至太和城閉壁不戰宓糧盡士卒罹瘴疫及飢死十七八乃引還蠻追擊之宓被擒全軍皆没楊國忠隠其敗更以㨗聞益發中國兵討之前後死者幾二十萬人無敢言者上甞謂高力士曰朕今老矣朝事付之宰相邊事付之諸將夫復何憂力士對曰臣聞雲南數喪師又邊將擁兵太盛陛下將何以制之臣恐一旦禍發不可復救何謂無憂也上曰卿勿言朕徐思之肅宗至徳元載南詔乗亂陷越嶲㑹同軍據清溪闗尋傳驃國皆降之代宗大曆十四年秋九月南詔王閤羅鳳卒子鳳迦異前死孫異牟尋立冬十月丁酉朔吐蕃與南詔合兵十萬三道入寇一出茂州一出扶文一出黎雅曰吾欲取蜀以為東府西川節度使崔寧在京師所留諸將不能禦虜連陷州縣刺史棄城走士民竄匿山谷上憂之趣寧歸鎮寧已辭楊炎言於上曰蜀地富饒寧據有之朝廷失其外府十四年矣寧雖入朝全師尚守其後貢賦不入與無蜀同且寧本與諸將等夷因亂得位威令不行今雖遣之必恐無功若其有功則義不可奪是蜀地敗固失之勝亦不得也願陛下熟察上曰然則奈何對曰請留寧發朱泚所領范陽戍兵數千人雜禁兵徃擊之何憂不克因而得内親兵於其腹中蜀將必不敢動然後更授它帥使千里沃壤復為國有是因小害而收大利也上曰善遂留寧初馬璘忌涇原都知兵馬使李晟功名遣入宿衛為右神䇿都將上發禁兵四千人使晟將之發邠隴范陽兵五千使金吾大將軍安邑曲環將之以救蜀東川出軍自江油趣白垻與山南兵合撃吐蕃南詔破之范陽兵追及於七盤又破之遂克維茂二州李晟追擊於大度河外又破之吐蕃南詔飢寒隕於崖谷死者八九萬人吐蕃悔怒殺誘導使之來者異牟尋懼築苴咩城延袤十五里徙居之吐蕃封之為日東主德宗貞元三年初雲南王閤羅鳳陷嶲州獲西瀘令鄭回回相州人通經術閤羅鳳愛重之其子鳳迦異及孫異牟尋曽孫尋夢湊皆師事之每授學回得撻之及異牟尋為王以回為清平官清平官者蠻相也凡有六人而國事專決於回五人者事回甚卑謹有過則回撻之雲南有衆數十萬吐蕃每入寇常以雲南為前鋒賦歛重數又奪其險要地立城堡歲徴兵助防雲南苦之回因説異牟尋復自歸於唐曰中國尚禮義有惠澤無賦役異牟尋以為然而無路自致凡十餘年及西川節度使韋皋至鎮招撫境上羣蠻異牟尋潛遣人因諸蠻求内附皋奏今吐蕃棄好暴亂鹽夏宜因雲南及八國生羌有歸化之心招納之以離吐蕃之黨分其勢上命臯先作邊將書以諭之微觀其趣閏五月己未韋臯復與東蠻和義王苴那時書使詗伺導達雲南六月韋臯以雲南頗知書壬辰自以書招諭之令趣遣使入見四年夏四月雲南王異牟尋欲内附未敢自遣使先遣其東蠻鬼主驃旁苴夢衝苴烏星入見五月乙卯宴之於麟德殿賜賚甚厚封王給印而遣之冬十月吐蕃發兵十萬將冦西川亦發雲南兵雲南内雖附唐外未敢叛吐蕃亦發兵數萬屯於瀘北韋臯知雲南計方猶豫乃為書遺雲南王叙其叛吐蕃歸化之誠貯以銀函使東蠻轉致吐蕃吐蕃始疑雲南遣兵二萬屯㑹川以塞雲南趣蜀之路雲南怒引兵歸國由是雲南與吐蕃大相猜阻歸唐之志益堅吐蕃失雲南之助兵勢始弱矣然吐蕃業已入寇遂分兵四萬攻兩林驃旁三萬攻東蠻七千寇清溪關五千寇銅山臯遣黎州刺史韋晉等與東蠻連兵禦之破吐蕃於清溪闗外十一月吐蕃屢遣人誘脅雲南五年春二月丁亥韋臯遺異牟尋書稱回鶻屢請佐天子共滅吐蕃王不早定計一旦為回鶻所先則王累代功名虚棄矣且雲南久為吐蕃屈辱今不乗此時依大國之勢以復怨雪恥後悔無及矣雲南雖貳於吐蕃亦未敢顯與之絶冬十二月壬辰韋臯復以書招諭之七年韋臯比年致書招雲南王異牟尋終未獲報然吐蕃屢發雲南兵雲南與之益少臯知異牟尋心附於唐討擊副使段忠義本閤羅鳳使者也六月丙申臯遣忠義還雲南并致書敦諭之冬十二月吐蕃知韋臯使者在雲南遣使讓之雲南王異牟尋紿之曰唐使本蠻也臯聽其歸耳無它謀也因執以送吐蕃多取其大臣之子為質雲南愈怨勿鄧酋長苴夢衝潜通吐蕃扇誘羣蠻隔絶雲南使者韋臯遣三部落揔管蘇危將兵至琵琶川八年春二月壬寅執夢衝數其罪而斬之雲南之路始通冬十一月吐蕃雲南日益相猜每雲南兵至境上吐蕃輙亦發兵聲言相應實為之備辛酉韋臯復遺雲南王書欲與共襲吐蕃驅之雲嶺之外悉平吐蕃城堡獨與雲南築大城於境上置戍相保永同一家九年夏五月雲南王異牟尋遣使者三輩一出戎州一出黔州一出安南各齎生金丹砂詣韋臯金以示堅丹砂以示赤心三分臯所與書為信皆達成都異牟尋上表請棄吐蕃歸唐并遺臯帛書自稱唐故雲南王孫吐蕃賛普義弟日東王臯遣其使者詣長安并上表賀上賜異牟尋詔書令臯遣使慰撫之冬十月甲子韋臯遣其節度巡官崔佐時齎詔書詣雲南并自為帛書答之十年春正月崔佐時至雲南所都羊苴咩城吐蕃使者數百人先在其國雲南王異牟尋尚不欲吐蕃知之令佐時衣牂柯服而入佐時不可曰我大唐使者豈得衣小夷之服異牟尋不得已夜迎之佐時大宣詔書異牟尋恐懼顧左右失色業已歸唐乃歔欷流涕俯伏受詔鄭回密見佐時教之故佐時盡得其情因勸異牟尋悉斬吐蕃使者去吐蕃所立之號獻其金印復南詔舊名異牟尋皆從之仍刻金契以獻異牟尋帥其子尋夢湊等與佐時盟於㸃蒼山神祠先是吐蕃與回鶻爭北庭大戰死傷頗衆徵兵萬人於雲南異牟尋辭以國小請發三千人吐蕃少之益至五千乃許之異牟尋遣五千人前行自將數萬人踵其後晝夜兼行襲擊吐蕃戰於神川大破之取鐵橋等十六城虜其五王降其衆十餘萬戊戌遣使來獻㨗夏六月雲南王異牟尋遣其弟湊羅棟獻地圖土貢及吐蕃所給金印請復號南詔癸丑以祠部郎中袁滋為冊南詔使賜銀窠金印文曰貞元冊南詔印滋至其國異牟尋北面跪受冊印稽首再拜因與使者宴出􅀇宗所賜銀平脫馬頭盤二以示滋又指老笛工歌女曰皇帝所賜􅀛兹樂惟二人在耳滋曰南詔當深思祖考子子孫孫盡忠於唐異牟尋拜曰敢不謹承使者之命十一年秋九月丁巳加韋臯雲南安撫使南詔攻吐蕃昆明城取之又虜施順二蠻王十五年夏四月南詔異牟尋遣使與韋臯約共撃吐蕃臯以兵糧未集請俟它年冬十二月吐蕃衆五萬分擊南詔及嶲州異牟尋與韋臯各發兵禦之吐蕃無功而還憲宗元和三年冬十二月南詔異牟尋卒子尋閤勸立四年雲南王尋閤勸卒子勸龍晟立十一年春二月南詔勸龍晟􅁋虐不道上下怨疾弄棟節度王嵯巔弑之立其弟勸利勸利德嵯巔賜姓蒙氏謂之大容容蠻言兄也穆宗長慶三年秋七月南詔勸利卒國人請立其弟豐祐豐祐勇敢善用其衆始慕中國不與父連名文宗大和三年冬十一月丙申西川節度使杜元頴奏南詔入寇元頴以舊相文雅自高不曉軍事專務蓄積減削士卒衣糧西南戍邊之卒衣食不足皆入蠻境鈔盗以自給蠻人反以衣食資之由是蜀中虚實動静蠻皆知之南詔自嵯巔謀大舉入寇邊州屢以告元頴不之信嵯巔兵至邊城一無備禦蠻以蜀卒為鄉導襲陷嶲戎二州甲辰元頴遣兵與戰於卭州南蜀兵大敗蠻遂陷卭州詔發東川興元荆南兵以救西川十二月丁未朔又發鄂岳襄鄧陳許等兵繼之已酉以東川節度使郭釗為西川節度使兼權東川節度事嵯巔自卭州引兵徑抵成都庚戌陷其外郭杜元頴帥衆保牙城以拒之欲遁去者數四壬子貶元穎為邵州刺史己未以右領軍大將軍董重質為神䇿諸道西川行營節度使又發太原鳳翔兵赴西川南詔寇東川入梓州西郭釗兵寡弱不能戰以書責嵯巔嵯巔復書曰杜元頴侵擾我故興兵報之耳與釗修好而退蠻留成都西郭十日其始慰撫蜀人市肆安堵將行乃大掠子女百工數萬人及珍貨而去蜀人恐懼徃徃赴江流尸塞江而下嵯巔自為軍殿及大度水嵯巔謂蜀人曰此南吾境也聽汝哭别鄉國衆皆慟哭赴水死者以千計自是南詔工巧埒於蜀中嵯巔遣使上表稱蠻比修職貢豈敢犯邊正以杜元頴不恤軍士怨苦元頴競為鄉導祈我此行以誅虐帥誅之不遂無以慰蜀士之心願陛下誅之丁卯再貶元頴循州司馬詔董重質及諸道兵皆引還郭釗至成都與南詔立約不相侵擾詔遣中使以國信賜嵯巔四年秋九月西川節度使郭釗以疾求代冬十月戊申以義成節度使李德􅁉為西川節度使蜀自南詔入寇一方殘􅁦郭釗多病未暇完補德􅁉至鎮作籌邊樓圖蜀地形南入南詔西達吐蕃日召老於軍旅習邊事者雖走卒蠻夷無所閒訪以山川城邑道路險易廣狹遠近未踰月皆若身甞涉歴上命德􅁉修塞清溪關以斷南詔入寇之路或無土則以石壘之德􅁉上言通蠻細路至多不可塞惟重兵鎮守可保無虞但黎雅以來得萬人成都得二萬人精加訓練則蠻不敢動矣邊兵又不宜多須力可臨制崔旰之殺郭英乂張朏之逐張延賞皆鎮兵也時北兵皆歸本道惟河中陳許三千人在成都有詔來年三月亦歸蜀人忷懼德􅁉奏乞鄭滑五百人陳許千人以鎮蜀且言蜀兵脆弱新為蠻寇所困皆破膽不堪征戍若北兵盡歸則與杜元頴時無異蜀不可保恐議者云蜀經蠻寇以來已自増兵曏者蠻寇已逼元頴始捕市人為兵得三千餘人徒有其數實不可用郭釗募北兵僅得百餘人臣復召募得二百餘人此外皆元頴舊兵也恐議者又聞一夫當關之説以為清溪可塞臣訪之蜀中老將清溪之旁大路有三自餘小徑無數皆東蠻臨時為之開通若言可塞則是欺罔朝廷要須大度水北更築一城迤邐接黎州以大兵守之方可况聞南詔以所掠蜀人二千及金帛賂遺吐蕃若使二虜知蜀虚實連兵入寇誠可深憂其朝臣建言者蓋由禍不在身望人責一狀留入堂案它日敗事不可令臣獨當國憲朝廷皆從其請德􅁉乃練士卒葺堡鄣積糧儲以備邊蜀人粗安五年夏五月丙辰西川節度使李德􅁉奏遣使詣南詔索所掠百姓得四千人而還宦官弑逆甘露之變附唐憲宗元和十三年淮西既平上浸驕侈户部侍郎判度支皇甫鎛衛尉卿鹽鐵轉運使程异曉其意數進羡餘以供其費由是有寵鎛又以厚賂結吐突承璀甲辰鎛以本官异以工部侍郎並同平章事判使如故制下朝野駭愕至於市道負販者亦嗤之裴度崔羣極陳其不可上不聽度恥與小人同列表求自退不許度復上疏以為鎛异皆錢糓吏佞巧小人陛下一旦寘之相位中外無不駭笑况鎛在度支專以豐取刻與為務凡中外仰給度支之人無不思食其肉比者裁損淮西糧料軍士怨怒㑹臣至行營曉諭慰勉僅無潰亂令舊將舊兵悉向淄青聞鎛入相必盡驚憂知無可訴之地矣程异雖人品庸下然心事和平可處煩劇不宜為相至如鎛資性狡詐天下共知唯能上惑聖聰足見姦邪之極臣若不退天下謂臣不知亷恥臣若不言天下謂臣有負恩寵今退既不許言又不聽臣如烈火燒心衆鏑叢體所可惜者淮西盪定河北底寧承宗歛手削地韓􅀪輿疾討賊豈朝廷之力能制其命哉直以處置得宜能服其心耳陛下建升平之業十已八九何忍還自墮壊使四方解體乎上以度為朋黨不之省鎛自知不為衆所與益為巧謟以自固奏減内外官俸以助國用給事中崔植封還敕書極論之乃止植祐甫之弟子也上晚節好神仙詔天下求方士宗正卿李道古先為鄂岳觀察使以貪暴聞恐終獲罪思所以自媚於上乃因皇甫鎛薦山人柳泌云能合長生藥甲戌詔泌居興唐觀煉藥十一月柳泌言於上曰天台山神仙所聚多靈草臣雖知之力不能致誠得爲彼長吏庶幾可求上信之丁亥以泌權知台州刺史仍賜服金紫諌官争論奏以爲人主喜方士未有使之臨民賦政者上曰煩一州之力而能爲人主致長生臣子亦何愛焉由是羣臣莫敢言十四年冬十月柳泌至台州驅吏民采藥歳餘無所得而懼舉家逃入山中浙東觀察使捕送京師皇甫鎛李道古保爲之上復使待詔翰林服其藥日加躁渴起居舍人裴潾上言以為除天下之害者受天下之利同天下之樂者饗天下之福自黄帝至於文武享國壽考皆用此道也自去歲以來所在多薦方士轉相汲引其數浸繁借令天下眞有神仙彼必深潜巖壑惟畏人知凡候伺權貴之門以大言自􅃷竒伎驚衆者皆不軌徇利之人豈可信其説而餌其藥邪夫藥以愈疾非朝夕常餌之物况金石酷烈有毒又益以火氣殆非人五藏所能勝也古者君飲藥臣先甞之乞令獻藥者先自餌一年則眞僞自可辯矣上怒十一月己亥貶潾江陵令十五年初左軍中尉吐突承璀謀立澧王煇爲太子上不許及上寢疾承璀謀尚未息太子聞而憂之密遣人問計於司農卿郭釗釗曰殿下但盡孝謹以俟之勿恤其它釗太子之舅也上服金丹多躁怒左右宦官徃徃獲罪有死者人人自危庚子暴崩於中和殿時人皆言内常侍陳􅀪志弑逆其黨類諱之不敢討賊但云藥發外人莫能明也中尉梁守謙與諸宦宫馬進潭劉承偕韋元素王守澄等共立太子殺吐突承璀及澧王惲賜左右神䇿軍士錢人五十緡六軍威遠人三十緡左右金吾人十五緡閏月丙午穆宗即位于太極殿東序丁未輟西宫朝臨集羣臣於月華門外貶皇甫鎛為崖州司户市井皆相賀壬子杖殺柳泌及僧大通自餘方士皆流嶺表貶左金吾將軍李道古循州司馬二月丁丑上御丹鳳門樓赦天下事畢盛陳倡優雜戲於門内而觀之丁亥上幸左神䇿軍觀手搏雜戲庚寅監察御史楊虞卿上疏以為陛下宜延對羣臣周徧顧問惠以氣色使進忠若趨利論政若訴寃如此而不致升平者未之有也衡山人趙知微亦上疏諌上遊畋無節上雖不能用亦不罪也秋八月上甫過公除即事遊畋聲色賜與無節九月欲以重陽大宴拾遺李珏帥其同僚上疏曰伏以元朔未改園陵尚新雖陛下就易月之期俯從人欲而禮經著三年之制猶服心喪遵同軌之㑹始離京告遠夷之使未復命遏密弛禁盖為齊人合讌内庭事將未可上不聽冬十月壬午羣臣入閤退諫議大夫鄭覃崔郾等五人進言陛下宴樂過多畋遊無度今胡冦壓境忽有急奏不知乗輿所在又晨夕與近習倡優狎暱賜與過厚夫金帛皆百姓膏血非有功不可與雖内藏有餘願陛下愛之萬一四方有事不復使有司重歛百姓時久無閤中論事者上始甚訝之謂宰相曰此輩何人對曰諌官上乃使人慰勞之曰當依卿言宰相皆賀然實不能用也覃珣瑜之子也上甞謂給事中丁公著曰聞外閒人多宴樂此乃時和人安足用為慰公著對曰此非佳事恐漸勞聖慮上曰何故對曰自天寳以來公卿大夫競為遊宴沈酣晝夜優雜子女不愧左右如此不已則百職皆廢陛下能無獨憂勞乎願少加禁止乃天下之福也十一月上將幸華清宫戊午宰相帥兩省供奉官詣延英門三上表切諌且言如此臣輩當扈從求面對皆不聽諌官伏門下至暮乃退己未未明上自􅃨道出城幸華清宮獨公主駙馬中尉神䇿六軍使帥禁兵千餘人扈從晡時還宫穆宗長慶二年冬十一月庚辰上與宦官擊毬於禁中有宦者墜馬上驚因得風疾不能履地自是人不聞上起居宰相屢乞入見不報裴度三上疏請立太子且請入見十二月辛卯上見羣臣於紫震殿御大繩牀悉去左右衛官獨宦者十餘人侍側人情稍安李逢吉進言景王已長請立為太子裴度請速下詔副天下望上無言既而兩省官亦繼有請立太子者癸巳詔立景王湛為皇太子上疾浸瘳三年春正月癸未賜兩軍中尉以下錢二月辛卯賜統軍軍使等錦綵銀器各有差初翼城人鄭注眇小目下視而巧譎傾謟善揣人意以醫遊四方羇貧甚甞以藥術干徐州牙將牙將悦之薦於節度使李愬愬餌其藥頗驗遂有寵署為牙推浸預軍政妄作威福軍府患之監軍王守澄以衆惰白愬請去之愬曰注雖如是然竒才也將軍試與之語茍無可取去之未晚乃使注徃謁守澄守澄初有難色不得已見之坐語未久守澄大喜延之中堂促膝笑語恨相見之晚明日謂愬曰鄭生誠如公言自是又有寵於守澄權勢益張愬署為巡官列於賓席注既用事恐牙將薦已者泄其本末密以它罪譖之於愬愬殺之及守澄入知樞密挈注以西為立居宅贍給之遂薦於上上亦厚遇之自上有疾守澄專制國事勢傾中外注日夜出入其家與之謀議語必通夕關通賂遺人莫能窺其迹始則有微賤巧宦之士或因以求進數年之後達官車馬滿其門矣四年初柳泌等既誅方士稍復因左右以進上餌其金石之藥有處士張臯者上疏以為神慮澹則血氣和嗜欲勝則疾疹作藥以攻疾無疾不可餌也昔孫思邈有言藥勢有所偏助令人藏氣不平借使有疾用藥猶須重慎庶人尚爾况於天子先帝信方士妄言餌藥致疾此陛下所詳知也豈得復循其覆轍乎今朝野之人紛紜竊議但畏忤㫖莫敢進言臣生長蓬艾麋鹿與遊無所邀求但粗知忠義欲禆萬一耳上甚善其言使求之不獲庚午上疾復作壬申大漸命太子監國宦官欲請郭太后臨朝稱制太后曰昔武后稱制幾傾社稷我家世守忠義非武氏之比也太子雖少但得賢宰相輔之卿輩勿預朝政何患國家不安自古豈有女子為天下主而能致唐虞之理乎取制書手裂之太后兄太常卿釗聞有是議密上牋曰若果徇其請臣請先帥諸子納官爵歸田里太后泣曰祖考之慶鍾於吾兄是夕上崩于寢殿癸酉以李逢吉攝冢宰丙子敬宗即位于太極東序自戊寅至庚辰上賜宦官服色及錦綵金銀甚衆或今日賜緑明日賜緋二月丁未上幸中和殿撃毬自是數遊宴擊毬奏樂賞賜宦官樂人不可悉紀三月上視朝每晏戊辰日絶高尚未坐百官班於紫宸門外老病者幾至僵踣諌議大夫李渤白宰相曰昨日疏論坐晚今晨愈甚請出閤待罪於金吾仗既坐班退左拾遺劉栖楚獨留進言曰憲宗及先帝皆長君四方猶多叛亂陛下富於春秋嗣位之初當宵衣求理而嗜寢樂色日晏方起梓宫在殯鼔吹日喧令聞未彰惡聲遐布臣恐福祚之不長請碎首玉階以謝諌職之曠遂以額叩龍墀見血不已響聞閤外李逢吉宣曰劉栖楚休叩頭俟進止栖楚捧首而起更論宦官事上連揮令出栖楚曰不用臣言請繼以死牛僧孺宣曰所奏知門外俟進止栖楚乃出待罪金吾仗於是宰相賛成其言上命中使就仗并李渤宣慰令歸尋擢栖楚爲起居舍人仍賜緋栖楚辭疾不拜歸東都夏四月卜者蘇􅀇明與染坊供人張韶善􅀇明謂韶曰我爲子卜當升殿坐與我共食今主上晝夜毬獵多不在宫中大事可圖也韶以爲然乃與􅀇明謀結染工無頼者百餘人丙申匿兵於紫草車載以入銀臺門伺夜作亂未達所詣有疑其重載而詰之者韶急即殺詰者與其徒易服揮兵大呼趣禁庭上時在清思殿擊毬諸宦者見之驚駭急入閉門走白上盗尋斬關而入先是右神䇿中尉梁守謙有寵於上每兩軍角伎藝上常佑右軍至是上狼狽欲幸右軍左右曰右軍遠恐遇盗不若幸左軍近上從之左神䇿中尉河中馬存亮聞上至走出迎捧上足涕泣自負上入軍中遣大將康藝金將騎卒入宫討賊上憂二太后隔絶存亮復以五百騎迎二太后至軍張韶升清思殿坐御榻與蘇􅀇明同食曰果如子言􅀇明驚曰事止此邪韶懼而走㑹康藝金與右軍兵馬使尚國忠引兵至合擊之殺韶􅀇明及其黨死者狼籍逮夜始定餘黨猶散匿禁苑中明日悉擒獲之時宫門皆閉上宿於左軍中外不知上所在人情恇駭丁酉上還宫宰相帥百官詣延英門賀來者不過數十人盗所厯諸門監門宦者三十五人灋當死己亥詔並杖之仍不改職任壬寅厚賞兩軍立功將士冬十月戊戌翰林學士韋處厚諌上宴遊曰先帝以酒色致疾損壽臣是時不死諌者以陛下年已十五故也今皇子纔一歳臣安敢畏死而不諌乎上感其言賜錦綵百匹銀器四敬宗寳曆元年上遊幸無常昵比羣小視朝月不再三大臣罕得進見二月壬午浙西觀察使李德􅁉獻丹扆六箴一曰宵衣以諷視朝稀晚二曰正服以諷服御乖異三曰罷獻以諷徵求玩好四曰納誨以諷侮棄讜言五曰辨邪以諷信任羣小六曰防微以諷輕出遊幸其納誨箴畧曰漢驁流湎舉白浮鍾魏叡侈汰陵霄作宫忠雖不忤善亦不從以規為瑱是謂塞聰防微箴畧曰亂臣猖蹶非可遽數􅀇服莫辨觸瑟始仆柏谷微行犲豕塞路覩貎獻餐斯可戒懼上優詔答之冬十月上欲幸驪山温湯左僕射李絳諌議大夫張仲方等屢諌不聽拾遺張權輿伏紫宸殿下叩頭諌曰昔周幽王幸驪山為犬戎所殺秦始皇葬驪山國亡􅀇宗宫驪山而禄山亂先帝幸驪山而享年不長上曰驪山若此之凶邪我宜一徃以驗彼言十一月庚寅幸温湯即日還宫謂左右曰彼叩頭者之言安足信哉二年夏六月甲子上御三殿令左右軍教坊内園為擊毬手搏雜戲戲酣有断臂碎首者夜漏數刻乃罷壬辰宣索左藏見在銀十萬兩金七千兩悉貯内藏以便賜與道士趙歸真説上以神仙僧惟貞齊賢正簡説上以禱祠求福皆出入宫禁上信用其言山人杜景先請徧厯江嶺求訪異人有潤州人周息元自言壽數百歲上遣中使迎之八月乙巳息元至京師上館之禁中山亭上遊戯無度狎暱羣小善擊毬好手搏禁軍及諸道争獻力士又以錢萬緡付内園令召募力士晝夜不離側又好深夜自捕狐狸性復􅄶急力士咸恃恩不遜輙配流籍沒宦官小過動遭捶撻皆怨且懼十二月辛丑上夜獵還宫與宦官劉克明田務澄許文端及擊毬軍將蘇佐明王嘉憲石從寛閻惟直等二十八人飲酒上酒酣入室更衣殿上燭忽滅蘇佐明等弑上於室内劉克明等矯稱上旨命翰林學士路隋草遺制以絳王悟權好當軍國事壬寅宣遺制絳王見宰相百官於紫宸外廡克明等欲易置内侍之執權者於是樞密使王守澄楊承和中尉魏從簡梁守謙定議以衛兵迎江王涵入宮發左右神䇿飛龍兵進討賊黨盡斬之克明赴井出而斬之絳王為亂兵所害時事起蒼猝守澄等以翰林學士韋處厚博通古今一夕處置皆與之共議守澄等欲號令中外而疑所以為辭處厚曰正名討罪於義何嫌安可依違有所諱避又問江王當如何踐阼處厚曰詰朝當以王教布告中外以已平内難然後羣臣三表勸進以太皇太后令冊命即皇帝位當時皆從其言時不暇復問有司凡百儀灋皆出於處厚無不叶宜癸卯以裴度攝冡宰百官謁見江王於紫宸外廡王素服涕泣甲辰見諸軍使於少陽院趙歸真等諸術士及敬宗時佞幸者皆流嶺南或邊地乙巳文宗即位上自為諸王深知兩朝之弊及即位勵精求治去奢從儉詔宫女非有職掌者皆出之出三千餘人五坊鷹犬凖元和故事量留校獵外悉放之有司供宫禁年支物並凖貞元故事省教坊翰林揔監宂食千二百餘員停諸司新加衣糧御馬坊場及近歳别貯錢糓所占陂田悉歸之有司先宣索組繡彫縷之物悉罷之敬宗之世毎月視朝不過一二上始復舊制毎竒日未甞不視朝對宰相羣臣延訪政事久之方罷待制官舊雖設之未甞召對至是屢䝉延問其輟朝放朝皆用偶日中外翕然相賀以為太平可冀文宗大和二年自元和之末宦官益横建置天子在其掌握威權出人主之右人莫敢言辛巳上親䇿制舉人賢良方正昌平劉蕡對䇿極言其禍其略曰陛下宜先憂者宫闈將變社稷將危天下將傾海内將亂又曰陛下將杜篡弑之漸則居正位而近正人遠刀鋸之賤親骨鯁之直輔相得以專其任庶職得以守其官奈何以褻近五六人揔天下大政禍稔蕭牆姦生帷幄臣恐曹節侯覽復生於今日又曰忠賢無腹心之寄閽寺恃廢立之權陷先君不得正其終致陛下不得正其始又曰威柄陵夷藩臣跋扈或有不達人臣之節首亂者以安君爲名不究春秋之微稱兵者以逐惡爲義則政刑不由乎天子征伐必自於諸侯又曰陛下何不塞隂邪之路屛褻狎之臣制侵陵迫脅之心復門户掃除之役戒其所宜戒憂其所宜憂既不能治於前當治於後既不能正其始當正其終則可以䖍奉典謨克承丕構矣昔秦之亡也失於彊暴漢之亡也失於微弱彊暴則賊臣畏死而害上微弱則姦臣竊權而震主伏見敬宗皇帝不虞亡秦之禍不翦其萌伏惟陛下深軫亡漢之憂以杜其漸則祖宗之鴻業可紹三五之遐軌可追矣又曰臣聞昔漢元帝即位之初更制七十餘事其心甚誠其稱甚美然而紀綱日紊國祚日衰姦宄日彊黎元日困者以其不能擇賢明而任之失其操柄也又曰陛下誠能揭國權以歸相持兵柄以歸將則心無不達行無不孚矣又曰灋宜畫一官宜正名今分外官中官之員立南司北司之局或犯禁于南則亡命于北或正刑于外則破律於中灋出多門人無所措實由兵農勢異而中外灋殊也又曰今夏官不知兵籍止於奉朝請六軍不主兵事止於養勲階軍容合中官之政戎律附内臣之職首一戴武弁疾文吏如仇讎足一蹈軍門視農夫如草芥謀不足以翦除兇逆而詐足以抑揚威福勇不足以鎮衛社稷而暴足以侵軼里閭羈絏藩臣干陵宰輔隳裂王度汨亂朝經張武夫之威上以制君父假天子之命下以御英豪有藏姦觀釁之心無仗節死難之義豈先王經文緯武之旨邪又曰臣非不知言發而禍應計行而身戮盖痛社稷之危哀生人之困豈忍姑息時忌竊陛下一命之寵哉甲午賢良方正裴休李郃李甘杜牧馬植崔璵王式崔慎由等二十二人中第皆除官考官左散騎常侍馮宿等見劉蕡䇿皆歎服而畏宦官不敢取詔下物論囂然稱屈諌官御史欲論奏執政抑之李郃曰劉蕡下第我輩登科能無厚顔乃上疏以為蕡所對策漢魏以來無與為比今有司以蕡指切左右不敢以聞恐忠良道窮綱紀遂絶况臣所對不及蕡遠甚乞回臣所授以旌蕡直不報蕡由是不得仕於朝終於使府御史牧佑之孫植勛之子式起之子慎由融之􅀇孫也四年上患宦官彊盛憲宗敬宗弑逆之黨猶有在左右者中尉王守澄尤專横招權納賄上不能制甞密與翰林學士宋申錫言之申錫請漸除其偪上以申錫沈厚忠謹可倚以事擢為尚書右丞秋七月癸未以申錫同平章事五年春二月上與宋申錫謀誅宦官申錫引吏部侍郎王璠為京兆尹以密旨諭之璠泄其謀鄭注王守澄知之隂為之備上弟漳王湊賢有人望注令神䇿都虞􅀱豆盧著誣告申錫謀立漳王戊戌守澄奏之上以為信然甚怒守澄欲即遣二百騎屠申錫家飛龍使馬存亮固争曰如此則京城自亂矣宜召它相與議其事守澄乃止是日旬休遣中使悉召宰相至中書東門中使曰所召無宋公名申錫知獲罪望延英以笏叩額而退宰相至延英上示以守澄所奏相顧愕眙上命守澄捕豆盧著所告十六宅宫市品官晏敬則及申錫親事王師文等於禁中鞫之師文亡命三月庚子申錫罷為右庶子自宰相大臣無敢顯言其寃者獨京兆尹崔琯大理卿王正雅連上疏請出内獄付外庭覈實由是獄稍緩正雅翃之子也晏敬則等自誣服稱申錫遣王師文達意於王豫結異日之知獄成壬寅上悉召師保以下及臺省府寺大臣面詢之午際左常侍崔􅀇亮給事中李固言諌議大夫王質補闕盧鈞舒元襃蔣係裴休韋温等復請對於延英乞以獄事付外覆按上曰吾已與大臣議之矣屢遣之出不退􅀇亮叩頭流涕曰殺一匹夫猶不可不重慎况宰相乎上意稍解曰當更與宰相議之乃復召宰相入牛僧孺曰人臣不過宰相今申錫已為宰相假使如所謀復欲何求申錫殆不至此鄭注恐覆桉詐覺乃勸守澄請止行貶黜癸卯貶漳王湊為巢縣公宋申錫為開州司馬存亮即日請致仕􅀇亮磁州人質通五世孫係乂之子元襃江州人也晏敬則等坐死及流竄者數十百人申錫竟卒於貶所七年前邠寧行軍司馬鄭注依倚王守澄權勢燻灼上深惡之九月丙寅侍御史李款閤内奏彈注内通敕使外連朝士兩地徃來卜射財賄晝伏夜動干竊化權人不敢言道路以目請付灋司旬日之閒章數十上守澄匿注於右軍左軍中尉韋元素樞密使楊承和王踐言皆惡注左軍將李􅀪楚説元素曰鄭注姦猾無雙卵􅑹不除使成羽翼必為國患今因御史所劾匿軍中􅀪楚請以中尉意詐為有疾召使治之來則中尉延與坐􅀪楚侍側伺中尉舉目擒出杖殺之中尉因見上叩頭請罪具言其姦楊王必助中尉進言况中尉有翼戴之功豈以除姧而獲罪乎元素以為然召之注至蠖屈䑕伏佞辭泉涌元素不覺執手􅅃曲諦聽忘倦􅀪楚詗伺徃復再三元素不以金帛厚遺注而遣之􅀪楚怒曰中尉失今日之斷必不免它日之禍矣因解軍職去頃之疽發背卒王涯之爲相注有力焉且畏王守澄遂寢李􅅃之奏守澄言注於上而釋之尋奏爲侍御史充右神䇿判官朝野駭歎冬十二月庚子上始得風疾不能言於是王守澄薦昭義行軍司馬鄭注善醫上徵注至京師飲其藥頗有驗遂有寵八年夏六月上以久旱詔求致雨之方司門員外郎李中敏上表以爲仍歳大旱非聖德不至直以宋申錫之寃濫鄭注之姦邪今致雨之方莫若斬注而雪申錫表留中中敏謝病歸東都李仲言遇赦還東都鄭注引仲言見王守澄守澄薦於上以仲言為四門助教給事中黨之禍事見朋秋九月辛亥徴昭義節度副使鄭注至京師冬十月庚寅以李仲言為翰林侍講學士十一月丙子李仲言請改名訓十二月己卯以昭義節度副使鄭注為大僕卿郭承嘏累上疏言其不可上不聽於是注詐上表固辭上遣中使再以告身賜之不受初宋申錫與御史中丞宇文鼎受密詔誅鄭注使京兆尹王璠掩捕之璠密以堂帖示王守澄注由是得免深德璠璠又與李訓善於是訓注共薦之自浙西觀察使徵為尚書左丞九年夏四月癸巳以鄭注守太僕卿兼御史大夫注始受之仍舉倉部員外郎李􅅃自代曰加臣之罪雖於理而無辜在􅅃之誠乃事君而盡節時人皆哂之初宋申錫獲罪宦官益横上外雖包容内不能堪李訓鄭注既得幸揣知上意訓因進講數以微言動上上見其才辯意訓可與謀大事且以訓注皆因王守澄以進冀宦官不之疑遂密以誠告之訓注遂以誅宦官為己任二人相挾朝夕計議所言於上無不從聲勢烜赫注多在禁中或時休沐賓客填門賂遺山積外人但知訓注倚宦官擅作威福不知其與上有密謀也上之立也右領軍將軍興寜仇士良有功王守澄抑之由是有隙訓注為上謀進擢士良以分守澄之權五月乙丑以士良為左神䇿中尉守澄不悦李訓鄭注為上畫太平之䇿以為當先除宦官次復河湟次清河北開陳方略如指諸掌上以為信然寵任日隆時人皆言鄭注朝夕且為相侍御史李甘揚言於朝曰白麻出我必壞之於庭癸亥貶甘封州司馬然李訓亦忌注不欲使為相事竟寢甲子以國子博士李訓為兵部郎中知制誥依前侍講學士八月丁丑以太僕卿鄭注為工部尚書充翰林侍講學士注好服鹿裘以隐淪自處上以師友待之注之初得幸上甞問翰林學士户部侍郎李珏曰卿知有鄭注乎亦甞與之言乎對曰臣豈特知其姓名兼深知其為人其人姦邪陛下寵之恐無益聖德臣忝在近密安敢與此人交通戊寅貶珏江州刺史憲宗之崩也人皆言宦官陳􅀪志所為時􅀪志為山南東道監軍李訓為上謀召之至青泥驛癸亥封杖殺之鄭注求為鳳翔節度使門下侍郎同平章事李固言不可丁卯以固言為山南西道節度使注為鳳翔節度使李訓雖因注得進及勢位俱盛心頗忌注謀欲中外協勢以誅宦官故出注於鳯翔其實俟既誅宦官并圖注也注欲取名家才望之士為參佐請禮部員外郎韋温為副使温不可或曰拒之必為患温曰擇禍莫若輕拒之止於遠貶從之有不測之禍卒辭之戊辰以右神䇿中尉行右衛上將軍知内侍省事王守澄為左右神䇿觀軍容使兼十二衛統軍李訓鄭注為上謀以虚名尊守澄實奪之權也己巳以御史中丞兼刑部侍郎舒元輿為刑部侍郎兵部郎中知制誥充翰林侍講學士李訓為禮部侍郎並同平章事仍命訓三二日一入翰林講易元輿為中丞凡訓注所惡者則為之彈擊由是得為相又上懲李宗閔李德􅁉多朋黨以賈餘及元輿皆孤寒新進故擢為相庶其無黨耳訓起流人期年致位宰相天子傾意任之訓或在中書或在翰林天下事皆決於訓王涯輩承順其風指惟恐不逮自中尉樞密禁衛諸將見訓皆震慴迎拜叩首壬申以刑部郎中兼御史知雜李孝本權知御史中丞孝本宗室之子依訓注得進冬十月李訓鄭注密言於上請除王守澄辛巳遣中使李好古就第賜酖殺之贈楊州大都督訓注本因守澄進卒謀而殺之人皆快守澄之受佞而疾訓注之隂狡於是元和之逆黨略盡矣乙酉鄭注赴鎮庚子以東都留守司徒兼侍中裴度兼中書令餘如故李訓所奬㧞率皆狂險之士然亦時取天下重望以順人心如裴度令狐楚鄭覃皆累朝􅂄俊久為當路所軋置之散地訓皆引居崇秩由是士大夫亦有望其眞能致太平者不惟天子惑之也然識者見其横甚知將敗矣十一月丙午以大理卿郭行餘為邠寧節度使癸丑以河東節度使同平章事李載義兼侍中丁巳以户部尚書判度支王璠為河東節度使戊午以京兆尹李石為户部侍郎判度支以京兆少尹羅立言權知府事石神符之五世孫也己未以太府卿韓約爲左金吾衛大將軍始鄭注與李訓謀至鎮選壯士數百皆持白棓懐其斧以爲親兵是月戊辰王守澄葬於滻水注奏請入護葬事因以親兵自隨仍奏令内臣中尉以下盡集滻水送塟注因闔門令親兵斧之使無遺類約既定訓與其黨謀如此事成則注專有其功不若使行餘璠以赴鎮爲名多募壯士爲部曲并用金吾臺府吏卒先期誅宦官者已而并注去之行餘璠立言約及中丞李孝本皆訓素所厚也故列置要地獨與是數人及舒元輿謀之它人皆莫之知也壬戌上御紫宸殿百官班定韓約不報平安奏稱左金吾聽事後石榴夜有甘露臣遞門奏訖因蹈舞再拜宰相亦帥百官稱賀訓元輿勸上親徃觀之以承天貺上許之百官退班於含元殿日加辰上乗軟輿出紫宸門升含元殿先命宰相及兩省官詣左仗視之良久而還訓奏臣與衆人驗之殆非真甘露未可遽宣布恐天下稱賀上曰豈有是邪顧左右中尉仇士良魚志􅀪帥諸宦者徃視之宦者既去訓遽召郭行餘王璠曰來受敕旨璠股栗不敢前獨行餘拜殿下時二人部曲數百皆執兵立丹鳳門外訓已先使人召之令入受敕獨東兵入邠寧兵竟不至仇士良等至左仗視甘露韓約變色流汗士良怪之曰將軍何為如是俄風吹幕起見執兵者甚衆又聞兵仗聲士良等驚駭走出門者欲閉之士良叱之關不得上士良等犇詣上告變訓見之遽呼金吾衛士曰來上殿衛乗輿者人賞錢百緡宦者曰事急矣請陛下還宫即舉軟輿迎上扶升輿決殿後罘罳疾趨北出訓攀輿呼曰臣奏事未竟陛下不可入宫金吾兵已登殿羅立言帥京兆邏卒三百餘自東來李孝本帥御史臺從人二百餘自西來皆登殿縱擊宦官流血呼寃死傷者十餘人乗輿迤邐入宣政門訓攀輿呼益急上叱之宦官郗志榮奮拳敺其胷偃於地乗輿既入門隨闔宦者皆呼萬歲百官駭愕散出訓知事不濟脱從吏緑衫衣之走馬而出揚言於道曰我何罪而竄謫人不之疑王涯賈餗舒元輿還中書相謂曰上且開延英召吾屬議之兩省官詣宰相請其故皆曰不知何事諸公各自便士良等知上豫其謀怨憤出不遜語上慙懼不復言士良等命左右神策副使劉泰倫魏仲卿等各帥禁兵五百人露刃出閤門討賊王涯等將㑹食吏白有兵自内出逢人輙殺涯等狼狽步走兩省及金吾吏卒千餘人填門争出門尋闔其不得出者六百餘人皆死士良等分兵閉宫門索諸司討賊黨諸司吏卒及民酤販在中者皆死死者又千餘人横尸流血狼籍塗地諸司印及圖籍帷幕噐皿俱盡又遣騎各千餘出城追亡者又遣兵大索城中舒元輿易服單騎出安化門禁兵追擒之王涯徒步至永昌里茶肆禁兵擒入左軍涯時年七十餘被以桎梏掠治不勝苦自誣服稱與李訓謀行大逆尊立鄭注王璠歸長興坊私第閉門以其兵自防神䇿將至門呼曰王涯等謀反欲起尚書爲相魚護軍令致意璠喜出見之將趨賀再三璠知見紿涕泣而行至左軍見王涯曰二十兄自反胡爲見引涯曰五弟昔爲京兆尹不漏言於王守澄豈有今日邪璠俛首不言又收羅立言於太平里及涯等親屬奴婢皆入兩軍繫之户部員外郎李元臯訓之再從弟也訓實與之無恩亦執而殺之故嶺南節度使胡証家鉅富禁兵利其財託以搜賈餗入其家執其子溵殺之又入左常侍羅讓詹事渾鐬翰林學士黎埴等家掠其貨財掃地無遺鐬瑊之子也坊市惡少年因之報私仇殺人剽掠百貨互相攻劫塵埃蔽天癸亥百官入朝日出始開建福門惟聽以從者一人自隨禁兵露刃夾道至宣政門尚未開時無宰相御史知班百官無復班列上御紫宸殿問宰相何為不來仇士良曰王涯等謀反繫獄因以涯手狀呈上召左僕射令狐楚右僕射鄭覃等升殿示之上悲憤不自勝謂楚等曰是涯手書乎對曰是也誠如此罪不容誅因命楚覃留宿中書參決機務使楚草制宣告中外楚叙王涯賈餗反事浮汎仇士良等不悦由是不得為相時坊市剽掠者猶未止命左右神策將楊鎮靳遂良等各將五百人分屯通衢擊鼓以警之斬十餘人然後定賈餗變服潜民間經宿自知無所逃素服乗驢詣興安門自言我宰相賈餗也為姧人所汚可送我詣兩軍門者執送西軍李孝本改衣緑猶服金帶以㡌鄣面單騎犇鳳翔至咸陽西追擒之甲子以右僕射鄭覃同平章事李訓素與終南僧宗密善徃投之宗密欲剃其髪而匿之其徒不可訓出山將犇鳳翔為盩厔鎮遏使宋楚所擒械送京師至昆明池訓恐至軍中更受酷辱謂送者曰得我者則富貴矣聞禁兵所在搜捕汝必為所奪不若取我首送之送者從之斬其首以來乙丑以户部侍郎判度支李石同平章事仍判度支前河東節度使李載義復舊任左神䇿出兵三百人以李訓首引王涯王璠羅立言郭行餘右神䇿出兵三百人擁賈餗舒元輿李孝本獻于廟社徇于兩市命百官臨視腰斬于獨柳之下梟其首於興安門外親屬無問親疎皆死孩穉無遺妻女不死者没為官婢百姓觀者怨王涯榷茶或詬詈或投瓦礫擊之臣光曰論者皆謂涯餗有文學名聲初不知訓注之謀横罹覆族之禍憤歎其寃臣獨以為不然夫顛危不扶焉用彼相涯餗安高位飽重禄訓注小人窮姧究險力取將相涯餗與之比肩不以為耻國家危殆不以為憂偷合茍容日復一日自謂得保身之良䇿莫我如也若使人人如此而無禍則姧臣孰不願之哉一旦禍生不虞足折刑剭蓋天誅之也士良安能族之哉王涯有再從弟沭家於江南老且貧聞涯為相跨驢詣之欲求一簿尉留長安二歲餘始得一見涯待之殊落莫久之沭因嬖奴以道所欲涯許以微官自是旦夕造涯之門以俟命及涯家被收沭適在其第與涯俱腰斬舒元輿有族子守謙愿而敏元輿愛之從元輿者十年一旦忽以非罪怒之日加譴責奴婢輩亦薄之守謙不自安求歸江南元輿亦不留守謙悲歎而去夕至昭應聞元輿收族守謙獨免是日以令狐楚為鹽鐵轉運使左散騎常侍張仲方權知京兆尹時數日之間殺生除拜皆決於兩中尉上不豫知初王守澄惡宦者田全操劉行深周元稹薛士幹似先義逸劉英詡等李訓鄭注因之遣分詣鹽州靈武涇原夏州振武鳳翔廵邊命翰林學士顧師邕為詔書賜六道使殺之㑹訓敗六道得詔皆廢不行丙寅以師邕為矯詔下御史獄先是鄭注將親兵五百已發鳳翔至扶風扶風令韓遼知其謀不供具􅂝印及吏卒犇武功注知訓已敗復還鳳翔仇士良等使人齎密敕授鳳翔監軍張仲清令取注仲清徨惑不知所為押牙李叔和説仲清曰叔和為公以好召注屏其從兵於坐取之事立定矣仲清從之伏甲以待注注恃其兵衛遂詣仲清叔和稍引其從兵享之於外注獨與數人入既啜茶叔和抽刀斬注因閉外門悉誅其親兵乃出密敕宣示將士遂滅注家并殺副使錢可復節度判官盧簡能觀察判官蕭傑掌書記盧􅀪茂等及其支黨死者千餘人可復徽之子簡能綸之子傑俛之弟也朝廷未知注死丁夘詔削奪注官爵令鄰道按兵觀變以左神䇿大將軍陳君奕為鳳翔節度使戊辰夜張仲清遣李叔和等以注首入獻梟於興安門人情稍安京師諸軍始各還營詔將士討賊有功及娖隊者官爵賜賚各有差右神䇿軍獲韓約於崇義坊己巳斬之仇士良等各進階遷官有差自是天下事皆決於北司宰相行文書而已宦官氣益盛迫脅天子下視宰相陵暴朝士如草芥毎延英議事士良等動引訓注折宰相鄭覃李石曰訓注誠爲亂首但不知訓注始因何人得進宦者稍屈搢紳頼之時中書惟有空垣破屋百物皆闕江西湖南獻衣糧百二十分充宰相召募從人辛未李石上言宰相若忠正無邪神靈所祐縱遇盗賊亦不能傷若内懐姧罔雖兵衛甚設鬼得而誅之臣願竭赤心以報國止循故事以金吾卒導從足矣其兩道所獻衣糧並乞停寢從之十二月壬申朔顧師邕流儋州至商山賜死度支奏籍鄭注家貲得絹百餘萬匹它物稱是庚辰上問宰相坊市安未李石對曰漸安然比日寒冽特甚蓋刑殺太過所致鄭覃曰罪人周親前已皆死其餘殆不足問時宦者深怨李訓等凡與之有􅀲葛親或蹔䝉奬引者誅貶不已故二相言之李訓鄭注既誅召六道巡邊使田全操等怨訓注之謀在道揚言我入城凡儒服者無貴賤當盡殺之癸未全操等乗驛疾驅入金光門京城訛言有寇至士民驚譟縱横走塵埃四起兩省諸司官聞之皆犇散有不及束帶韈而乗馬者鄭覃李石在中書顧吏卒稍稍逃去覃謂石曰耳目頗異宜且出避之石曰宰相位尊望重人心所屬不可輕也今事虚實未可知堅坐鎮之庶幾可定若宰相亦走則中外亂矣且果有禍亂避亦不免覃然之石坐視文案沛然自若敕使相繼傳呼閉皇城諸司門左金吾大將軍陳君賞帥其衆立望仙門下謂敕使曰賊至閉門未晚請徐觀其變不宜示弱至晡後乃定是日坊市惡少年皆衣緋皁執弓刀北望見皇城閉即欲剽掠非石與君賞鎮之京城幾再亂矣時兩省官應入直者皆與其家人辭訣丁亥詔逆人親黨自非前己就戮及指名收捕者餘一切不問諸司官吏雖為所脅從涉於詿誤皆赦之它人毋得妄相告言及相恐喝見亡匿者勿復追捕三日内各聽自歸本司時禁軍暴横京兆尹張仲方不敢詰宰相以其不勝任出為華州刺史以司農卿薛元賞代之元賞嘗詣李石第聞石方坐聽事與一人争辨甚喧元賞使覘之云有神䇿軍將訴事元賞趨入責石曰相公輔佐天子紀綱四海今近不能制一軍將使無禮如此何以鎮服四夷即趨出上馬命左右擒軍將俟於下馬橋元賞至則已解衣跽之矣其黨訴於仇士良士良遣宦者召之曰中尉屈大尹元賞曰屬有公事行當繼至遂杖殺之乃白服見士良士良曰癡書生何敢杖殺禁軍大將元賞曰中尉大臣也宰相亦大臣也宰相之人若無禮於中尉如之何中尉之人無禮於宰相庸可恕乎中尉與國同體當為國惜灋元賞已囚服而來惟中尉死生之士良知軍將已死無可如何乃呼酒與元賞歡飲而罷開成元年春正月辛丑朔上御宣政殿赦天下改元仇士良請以神䇿仗衛殿門諌議大夫馮定言其不可乃止定宿之弟也二月昭義節度使劉從諫上表請王涯等罪名且言涯等儒生荷國榮寵咸欲保身全族安肯構逆訓等實欲討除内臣兩中尉自為救死之謀遂致相殺誣以反逆誠恐非辜設若宰相實有異圖當委之有司正其刑典豈有内臣擅領甲兵恣行剽刼延及士庶横被殺傷流血千門僵尸萬計搜羅枝蔓中外恫疑臣欲身詣闕廷面陳臧否恐并陷孥戮事亦無成謹當修飾封疆訓練士卒内為陛下心腹外為陛下藩垣如姧臣難制誓以死清君側丙申加從諌檢校司徒三月左僕射令孤楚從容奏王涯等既伏辜其家夷滅遺骸棄捐請官為收瘞以順陽和之氣上慘然久之命京兆収塟涯等十一人於城西各賜衣一襲仇士良潜使人發之棄骨於渭水丁未皇城留守郭皎奏諸司儀仗有鋒刃者請皆輸軍器使遇立杖别給儀刀從之劉從諌復遣牙將焦楚長上表讓官稱臣之所陳繫國大體可聽則涯等宜䝉湔洗不可聽則賞典不宜妄加安有死寃不申而生者荷禄因暴揚仇士良等罪惡辛酉上召見楚長慰諭遣之時士良等恣横朝臣日憂破家及從諌表至士良等憚之由是鄭覃李石粗能秉政天子倚之亦差以自彊夏四月己酉上御紫宸殿宰相因奏事拜謝外間因訛言天子欲令宰相掌禁兵已拜恩矣由是中外復有猜阻人情忷忷士民不敢解衣寢者數日乙丑李石奏請召仇士良等面釋其疑上為召士良等出上及石等共諭釋之使毋疑懼然後事解秋九月丁丑李石為上言宋申錫忠直為讒人所誣竄死遐荒未䝉昭雪上俛首久之既而流涕􅊄然曰兹事朕久知其誤姧人逼我以社稷大計兄弟幾不能保况申錫僅全腰領耳非獨内臣外廷亦有助之者皆由朕之不明曏使遇漢昭帝必無此寃矣鄭覃李固言亦共言其寃上深痛恨有慙色庚辰詔悉復申錫官爵以其子慎微為成固尉上自甘露之變意忽忽不樂兩軍毬鞠之㑹什減六七雖宴享音伎雜遝盈庭未甞解顔閑居或徘徊眺望或獨語歎息壬午上於延英謂宰相曰朕毎與卿等論天下事則不免愁對曰為理者不可以速成上曰朕毎讀書恥為凡主李石曰方今内外之臣其間小人尚多疑阻願陛下更以寛御之彼有公清奉灋如劉弘逸薛季稜者陛下亦宜褒賞以勸爲善甲申上復謂宰相曰我與卿等論天下事有勢未得行者退飲醇酒求醉耳對曰此皆臣等之罪也三年春正月甲子李石入朝中途有盗射之微傷左右犇散石馬驚馳歸第又有盗邀擊於坊門斷其馬尾僅而得免上聞之大驚命神策六軍遣兵防衛敕中外捕盗甚急竟無所獲乙丑百官入朝者九人而已京城數日方安中書侍郎同平章事李石承甘露之亂人情危懼宦官恣横忘身徇國故紀綱粗立仇士良深惡之潜遣盗殺之不果石懼累表稱疾辭位上深知其故而無如之何丙子以石同平章事充荆南節度使太子永之母王德妃無寵為楊賢妃所譛而死太子頗好遊宴昵近小人賢妃日夜毁之九月壬戌上開延英召宰相及兩省御史郎官疏太子過惡議廢之曰是宜為天子乎羣臣皆言太子年少容有改過國本至重豈可輕動御史中丞狄兼謩論之尤切至於涕泣給事中韋温曰陛下惟一子不教陷之至是豈獨太子之過乎癸亥翰林學士六人神䇿六軍軍使十六人復上表論之上意稍解是夕太子始得歸少陽院如京使王少華等及宦官宫人坐流死者數十人冬十月太子永猶不悛庚子暴薨謚曰莊恪四年冬十月楊妃請立皇弟安王溶為嗣上謀於宰相李珏非之丙寅立敬宗少子陳王成美為皇太子丁卯上幸㑹寧殿作樂有童子縁橦一夫來徃走其下如狂上怪之左右曰其父也上􅊄然流涕曰朕貴為天子不能全一子召教坊劉楚材等四人宫人張十十等責之曰構害太子皆爾曹也今更立太子復欲爾邪執以付吏己巳皆殺之上因是感傷舊疾遂増十一月乙亥上疾少閒坐思政殿召當直學士周墀賜之酒因問曰朕可方前代何主對曰陛下堯舜之主也上曰朕豈敢比堯舜所以問卿者何如周赧漢獻耳墀驚曰彼亡國之主豈可比聖德上曰赧獻受制於彊諸侯今朕受制於家奴以此言之朕殆不如因泣下霑襟墀伏地流涕自是不復視朝五年春正月己卯詔立穎王瀍為皇太弟應軍國事權令句當且言太子成美年尚沖㓜未漸師資可復封陳王時上疾甚命知樞密劉􅀪逸薛季稜引楊嗣復李珏至禁中欲奉太子監國中尉仇士良魚􅀪志以太子之立功不在己乃言太子㓜且有疾更議所立李珏曰太子位已定豈得中變士良􅀪志遂矯詔立瀍為太弟是日士良􅀪志將兵詣十六宅迎頴王至少陽院百官謁見於思賢殿瀍沈毅有斷喜愠不形於色與安王溶皆素為上所厚異於諸王辛巳上崩於太和殿以楊嗣復攝冢宰癸未仇士良説太弟賜楊賢妃安王溶陳王成美死敕大行以十四日殯成服諌議大夫裴夷直上言期日太遠不聽時仇士良等追怨文宗凡樂工及内侍得幸於文宗者誅貶相繼夷直復上言陛下自藩維繼綂是直儼然在疚以哀慕為心速行喪禮早議大政以慰天下而未及數日屢誅戮先帝近臣驚率土之視聽傷先帝之神靈人情何瞻國體至重若使此輩無罪固不可刑若其有罪彼己在天網之内無所逃伏旬日之外行之何晚不聽辛卯文宗始大斂武宗即位冬十一月開府儀同三司左衛上將軍兼内謁者監仇士良請以開府䕃其子為千牛給事中李中敏判云開府階誠宜䕃子謁者監何由有兒士良慙恚武宗㑹昌元年初知樞密劉􅀪逸薛季稜有寵於文宗仇士良惡之上之立非二人及宰相意故楊嗣復出為湖南觀察使李珏出為桂管觀察使士良屢譛􅀪逸等於上勸上除之乙未賜􅀪逸季稜死遣中使就潭桂州誅嗣復及珏户部尚書杜悰犇馬見李德􅁉曰天子年少新即位兹事不宜手滑丙申德􅁉與崔珙崔鄲陳夷行三上奏又邀樞密使至中書使入奏以為德宗疑劉晏動揺東宫而殺之中外咸以為寃兩河不臣者由兹恐懼得以為辭德宗後悔録其子孫文宗疑宋申錫交通藩邸竄謫至死既而追悔為之出涕嗣復珏等若有罪惡乞更加重貶必不可容亦當先行訊鞫俟罪狀著白誅之未晚今不謀於臣等遽遣使誅之人情莫不震駭願開延英賜對至晡時開延英召德􅁉等入德􅁉等泣涕極言陛下宜重慎此舉毋致後悔上曰朕不悔三命之坐德􅁉等曰臣等願陛下免二人於死勿使既死而衆以為寃今未奉聖旨臣等不敢坐久之上乃曰特為卿等釋之德􅁉等躍下階舞蹈上召升坐歎曰朕嗣位之際宰相何甞比數李珏季稜志在陳王嗣復􅀪逸志在安王陳王猶是文宗遺意安王則專附楊妃嗣復仍與妃書云姑何不效則天臨朝曏使安王得志朕那復有今日德􅁉等曰兹事曖昧虚實難知上曰楊妃甞有疾文宗聴其弟􅀇思入侍月餘以此得通意指朕細詢内人情狀皎然非虚也遂追還二使更貶嗣復為潮州刺史李珏為昭州刺史裴夷直為驩州司户秋八月加仇士良觀軍容使二年夏四月上信任李德􅁉觀軍容使仇士良惡之㑹上將受尊號御丹鳳樓宣赦或告士良宰相與度支議草制減禁軍衣糧及馬芻粟士良揚言於衆曰如此至日軍士必於樓前諠譁德􅁉聞之乙酉乞開延英自訴上怒遽遣中使宣諭兩軍赦書初無此事且赦書皆出朕意非由宰相爾安得此言士良乃惶愧稱謝三年夏四月上雖外尊寵仇士良内實忌惡之士良頗覺之遂以老病求散秩詔以左衛上將軍兼内侍監知省事六月癸酉仇士良以左衛上將軍内侍監致仕其黨送歸私第士良教以固權寵之術曰天子不可令閑常宜以奢靡娛其耳目使日新月盛無暇更及它事然後吾輩可以得志慎勿使之讀書親近儒生彼見前代興亡心知憂懼則吾輩疎斥矣其黨拜謝而去四年宦官發仇士良宿惡於其家得兵仗數千詔削其官爵籍沒家貲宣宗大中八年上自即位以來治弑憲宗之黨誅竄甚衆慮人情不安詔長慶之初亂臣賊子頃流竄已盡其餘族從疎遠者一切不問十月上以甘露之變惟李訓鄭注當死自餘王涯賈餗等無罪詔皆雪其寃朋黨之禍唐穆宗長慶元年翰林學士李德􅁉吉甫之子也以中書舎人李宗閔甞對䇿譏切其父恨之宗閔又與翰林學士元稹争進取有隙右補闕楊汝士與禮部侍郎錢徽掌貢舉西川節度使段文昌翰林學士李紳各以書屬所善進士於徽及榜出文昌紳所屬皆不預焉及第者鄭㓪覃之弟裴譔度之子蘇巢宗閔之壻楊殷士汝士之弟也文昌言於上曰今歲禮部殊不公所取進士皆子弟無藝以關節得之上以問諸學士德􅁉稹紳皆曰誠如文昌言上乃命中書舍人王起等覆試夏四月丁丑詔黜㓪等十人貶徽江州刺史宗閔劒州刺史汝士開江令或勸徽奏文昌紳屬書上必寤徽曰苟無愧心得喪一致奈何奏人私書豈士君子所爲邪取而焚之時人多之紳敬􅀇之曽孫起播之弟也自是德􅁉宗閔各分朋黨更相傾軋垂四十年二年夏六月甲子裴度元稹皆罷相以兵部尚書李逢吉爲門下侍郎同平章事三年户部侍郎牛僧孺素爲上所厚初韓弘之子右驍衛將軍公武為其父謀以財結中外及公武卒􅀪繼薨穉孫紹宗嗣主藏奴與吏訟於御史府上憐之盡取􅀪財簿自閲視凡中外主權多納􅀪貨獨朱句細字曰某年月日送户部牛侍郎錢千萬不納上大喜以示左右曰果然吾不繆知人三月壬戌以僧孺為中書侍郎同平章事時僧孺與李德􅁉皆有入相之望德􅁉出為浙西觀察使八年不遷以為李逢吉排己引僧孺為相由是牛李之怨愈深李逢吉為相内結知樞密王守澄勢傾朝野惟翰林學士李紳每承顧問常排抑之擬狀至内庭紳多所臧否逢吉患之而上待遇方厚不能遠也㑹御史中丞缺逢吉薦紳清直宜居風憲之地上以中丞亦次對官不疑而可之㑹紳與京兆尹兼御史大夫韓愈争臺參及它職事文移徃來辭語不遜逢吉奏二人不恊冬十月丙戌以愈為兵部侍郎紳為江西觀察使韓愈李紳入謝上各令自叙其事乃深寤壬辰復以愈為吏部侍郎紳為户部侍郎四年初穆宗既留李紳李逢吉愈忌之紳族子虞頗以文學知名自言不樂仕進隱居華陽川及從父􅂄為左拾遺虞與􅂄書求薦誤達於紳紳以書誚之且以語於衆人虞深怨之乃詣逢吉悉以紳平日密論逢吉之語告之逢吉益怒使虞與補闕張又新及從子前河陽掌書記仲言等伺求紳短揚之於士大夫間且言紳潛察士大夫有羣居議論者輙指為朋黨白之於上由是士大夫多忌之及敬宗即位逢吉與其黨快紳失勢又恐上復用之日夜謀議思所以害紳者楚州刺史蘇遇謂逢吉之黨曰主上初聽政必開延英有次對官惟此可防其黨以為然亟白逢吉曰事迫矣若俟聴政悔不可追逢吉乃令王守澄言於上曰陛下所以為儲貳臣備知之皆逢吉之力也如杜元頴李紳輩皆欲立深王度支員外郎李續之等繼上章言之上時年十六疑未信㑹逢吉亦有奏言紳謀不利於上加貶謫上猶再三覆問然後從之二月癸未貶紳為端州司馬逢吉仍帥百官表賀既退百官復詣中書賀逢吉方與張又新語門者弗内良久又新揮汗而出旅揖百官曰端溪之事又新不敢多讓衆駭愣辟易憚之右拾遺内供奉吳思獨不賀逢吉怒以思為吐蕃告哀使丙戌貶翰林學士龎嚴為信州刺史蔣防為汀州刺史嚴壽州人與防皆紳所引也給事中于敖素與嚴善封還敕書人為之懼曰于給事為龎蔣直寃犯宰相怒誠所難也及奏下乃言貶之太輕逢吉由是奬之張又新等猶忌紳日上書言貶紳太輕上許為殺之朝臣莫敢言獨翰林侍讀學士韋處厚上疏指述紳為逢吉之黨所讒人情歎駭紳䝉先朝奬用借使有罪猶宜容假以成三年無改之孝况無罪乎於是上稍開寤㑹閲禁中文書有穆宗所封一篋發之得裴度杜元頴李紳疏請立上為太子上乃嗟歎悉焚人所上譖紳書雖未即召還後有言者不復聴矣夏四月乙未以布衣姜洽為補闕試大理評事陸洿布衣李虞劉堅為拾遺時李逢吉用事所親厚者張又新李仲言李續之李虞劉栖楚姜洽及拾遺張權輿程昔範又有從而附麗之者時人惡逢吉者目之為八關十六子敬宗寳曆元年春正月中書侍郎同平章事牛僧孺以上荒􅁋嬖幸用事又畏罪不敢言但累表求出乙卯升鄂岳為武昌軍以僧孺同平章事充武昌節度使夏四月癸巳羣臣上尊號曰文武大聖廣孝皇帝赦天下赦文但云左降官已經量移者宜與量移不言未量移者翰林學士韋處厚上言逢吉恐李紳量移故有此處置如此則應近年流貶官因李紳一人皆不得量移也上即追赦文改之紳由是得移江州長史冬十月前河陽掌書記李仲言坐陳留武昭之獄流象州十二月言事者多稱裴度賢不宜棄之藩鎮上數遣使至興元勞問度密示以還期度因求入朝逢吉之黨大懼二年春正月壬辰裴度自興元入朝李逢吉之黨百計毁之先是民間謡云緋衣小兒坦其腹天上有口被驅逐又長安城中有横亘六岡如乾象度宅偶居第五岡張權輿上言度名應圖䜟宅占岡原不召而來其旨可見上雖年少悉察其誣謗待度益厚冬十二月甲申以門下侍郎同平章事李逢吉同平章事充山南東道節度使文宗大和三年秋八月徵浙西觀察使李德􅁉為兵部侍郎裴度薦以為相㑹吏部侍郎李宗閔有宦官之助甲戌以宗閔同平章事壬辰以李德􅁉為義成節度使李宗閔惡其逼已故出之四年春正月辛巳武昌節度使牛僧孺入朝李宗閔引薦牛僧孺辛卯以僧孺為兵部尚書同平章事於是二人相與排擯李德􅁉之黨稍稍逐之裴度以高年多疾懇辭機政六月丁未以度為司徒平章軍國重事俟疾損三五日一入中書初裴度征淮西奏李宗閔為觀察判官由是漸獲進用至是怨度薦李德􅁉因其謝病九月壬午以度兼侍中充山南東道節度使冬十月戊申以義成節度使李德􅁉爲西川節度使五年秋九月吐蕃維州副使悉怛謀請降李德􅁉遣行維州刺史虞藏儉將兵入據其城具奏其狀牛僧孺曰吐蕃之境四靣各萬里失一維州未能損其勢徒棄誠信有害無益上以爲然詔德􅁉以城歸吐蕃執悉怛謀歸之吐蕃誅之於境上德􅁉由是怨僧孺益深蕃叛盟事見吐六年冬十一月乙卯以荆南節度使叚文昌爲西川節度使西川監軍王踐言入知樞密數爲上言縳送悉怛謀以快虜心絶後來降者非計也上亦悔之尤中書侍郎同平章事牛僧孺失䇿附李德􅁉者因言僧孺與德􅁉有隙害其功上益疎之僧孺内不自安㑹上御延英謂宰相曰天下何時當太平卿等亦有意於此乎僧孺對曰太平無象今四夷不至交侵百姓不至流散雖非至理亦謂小康陛下若别求太平非臣等所及退謂同列曰主上責望如此吾曹豈得久居此地乎因累表請罷十二月乙丑以僧孺同平章事淮南節度使臣光曰君明臣忠上令下從俊良在位佞邪黜遠禮修樂舉刑清政平姧宄消伏兵革偃戢諸侯順附四夷懐服時和年豐家給人足此太平之象也于斯之時閽寺專權脅君於内弗能遠也藩鎮阻兵陵慢於外弗能制也士卒殺逐主帥拒命自立弗能詰也軍旅歳興賦歛日急骨血縱横於原野杼軸空竭於里閭而僧孺謂之太平不亦誣乎當文宗求治之時僧孺任居承弼進則偷安取容以竊位退則欺君誣世以盜名罪孰大焉丁未以前西川節度使李德􅁉為兵部尚書初李宗閔與德􅁉有隙及德􅁉還自西川上注意甚厚朝夕且為相宗閔百方沮之不能京兆尹杜悰宗閔黨也甞詣宗閔見其有憂色曰得非以大戎乎宗閔曰然何以相救悰曰悰有一䇿可平宿憾恐公不能用宗閔曰何如悰曰德􅁉有文學而不由科第常用此為慊慊若使之知舉必喜矣宗閔黙然有閒曰更思其次悰曰不則用為御史大夫宗閔曰此則可矣悰再三與約乃詣德􅁉德􅁉迎揖曰公何為訪此寂寥悰曰靖安相公令悰達意即以大夫之命告之德􅁉驚喜泣下曰此大門官小子何足以當之寄謝重㳫宗閔復與給事中楊虞卿謀之事遂中止虞卿汝士之從弟也七年春二月丙戌以兵部尚書李德􅁉同平章事德􅁉入謝上與之論朋黨事對曰方今朝士三分之一為朋黨時給事中楊虞卿與從兄中書舍人汝士弟户部郎中漢公中書舍人張元夫給事中蕭澣等善交結依附權要上干執政下撓有司為士人求官及科第無不如志上聞而惡之故與德􅁉言首及之德􅁉因得以排其所不悦者初左散騎常侍張仲方甞駮李吉甫謚及德􅁉為相仲方稱疾不出三月壬辰以仲方為賓客分司庚戌以楊虞卿為常州刺史張元夫為汝州刺史它日上復言及朋黨李宗閔曰臣素知之故虞卿輩臣皆不與美官李德􅁉曰給舍非美官而何宗閔失色丁巳以蕭澣為鄭州刺史夏六月壬申以工部尚書鄭覃為御史大夫初李宗閔惡覃在禁中數言事奏罷其侍講上從容謂宰相曰殷侑經術頗似鄭覃宗閔對曰覃侑經術誠可尚然議論不足聼李德􅁉曰覃侑議論它人不欲聞惟陛下欲聞之後旬日宣出除覃御史大夫宗閔謂樞密使崔潭峻曰事一切宣出安用中書潭峻曰八年天子聼其自行事亦可矣宗閔愀然而止乙亥以中書侍郎同平章事李宗閔同平章事充山南西道節度使八年初李仲言流象州遇赦還東都㑹留守弟逢吉思復入相仲言自言與鄭注善逢吉使仲言厚賂之注引仲言見王守澄守澄薦於上云仲言善易上召見之時仲言有母服難入禁中乃使衣民服號王山人仲言儀狀秀偉倜儻尚氣頗工文辭有口辯多權數上見之大悦以為竒士待遇日隆仲言既除服秋八月辛卯上欲以仲言為諌官寘之翰林李德􅁉曰仲言曏所為計陛下必盡知之豈宜寘之近侍上曰然豈不容其改過對曰臣聞惟顔回能不貳過彼聖賢之過但思慮不至或失中道耳至於仲言之惡著於心本安能悛改邪上曰李逢吉薦之朕不欲食言對曰逢吉身為宰相乃薦姧邪以誤國亦罪人也上曰然則别除一官對曰亦不可上顧王涯涯對曰可德􅁉揮手止之上回顧適見色殊不懌而罷始涯聞上欲用仲言草諌疏極憤激既而見上意堅且畏其黨盛遂中變尋以仲言為四門助教給事中鄭肅韓佽封還敕書德􅁉將出中書謂涯曰且喜給事中封敕涯即召肅佽謂曰李公適留語令二閣老不用封敕二人即行下明日以白德􅁉德􅁉驚曰德􅁉不欲封還當面聞何必使人傳言且有司封駮豈復禀宰相意邪二人悵恨而去九月辛亥徵昭義節度副使鄭注至京師王守澄李仲言鄭注皆惡李德􅁉以山南西道節度使李宗閔與德􅁉不相悦引宗閔以敵之壬戌詔徵宗閔於興元冬十月庚寅以李宗閔為中書侍郎同平章事甲午以中書侍郎同平章事李德􅁉同平章事充山南西道節度使是日以李仲言為翰林侍讀學士給事中高銖鄭肅韓佽諌議大夫郭承嘏中書舍人權璩等争之不能得承嘏晞之孫璩德輿之子也李德􅁉見上自陳請留京師丙午以德􅁉為兵部尚書十一月李宗閔言李德􅁉制命已行不宜自便乙亥復以德􅁉為鎮海節度使不復兼平章事時德􅁉宗閔各有朋黨互相擠援上患之毎歎曰去河北賊易去朝中朋黨難臣光曰夫君子小人之不相容猶氷炭之不可同噐而處也故君子得位則斥小人小人得勢則排君子此自然之理也然君子進賢退不肖其處心也公其指事也實小人譽其所好毁其所惡其處心也私其指事也誣公且實者謂之正直私且誣者謂之朋黨在人主所以辨之耳是以明主在上度德而叙位量能而授官有功者賞有罪者刑姧不能惑佞不能移夫如是則朋黨何自而生哉彼昬主則不然明不能燭彊不能斷邪正並進毁譽交至取捨不在於己威福潜移於人於是讒慝得志而朋黨之議興矣夫木腐而蠹生醯酸而蜹集故朝廷有朋黨則人主當自咎而不當以咎羣臣也文宗茍患羣臣之朋黨何不察其所毁譽者為實爲誣所進退者爲賢爲不肖其心為公爲私其人爲君子爲小人茍實也賢也公也君子也匪徒用其言又當進之誣也不肖也私也小人也匪徒棄其言又當刑之如是雖使之爲朋黨孰敢哉釋是不爲乃怨羣臣之難治是猶不種不芸而怨田之蕪也朝中之黨且不能去况河北賊乎九年初李德􅁉爲浙西觀察使漳王􅀓母杜仲陽坐宋申錫事放歸金陵詔德􅁉存處之㑹德􅁉已離浙西牒留後李蟾使如詔旨至是左丞王璠户部侍郎李漢奏德􅁉厚賂仲陽隂結漳王圖爲不􅁤上怒甚召宰相及璠漢鄭注等面質之璠漢等極口誣之路隋曰德􅁉不至此果如所言臣亦應得罪言者稍息夏四月以德􅁉為賓客分司丙申以門下侍郎同平章事路隋同平章事充鎮海節度使趣之赴鎮不得面辭坐救李德􅁉故也初京兆尹河南賈餗性􅄶躁輕率與李德􅁉有隙而善於李宗閔鄭注上已賜百官宴於曲江故事尹於外門下馬揖御史餗恃其貴勢乗馬直入殿中侍御史楊儉蘇特與之争餗罵曰黄面兒敢爾坐罰俸餗恥之求出詔以為浙西觀察使尚未行戊戌以餗為中書侍郎同平章事庚子制以曏日上初得疾王涯呼李德􅁉犇問起居德􅁉竟不至又在西蜀徵逋懸錢三十萬緡百姓愁困貶德􅁉袁州長史京城訛言鄭注為上合金丹須小兒心肝民間驚懼上聞而惡之鄭注素恨京兆尹楊虞卿與李訓共構之云此語出於虞卿家人上怒六月下虞卿御史獄注求為兩省官中書侍郎同平章事李宗閔不許注毁之於上㑹宗閔救楊虞卿上怒叱出之壬寅貶明州刺史左神䇿中尉韋元素樞密使楊承和王踐言久居中用事與王守澄争權不叶李訓鄭注因之出承和於西川元素於淮南踐言於河東皆為監軍秋七月甲辰朔貶楊虞卿䖍州司馬初李宗閔為吏部侍郎因駙馬都尉沈􅔲結女學士宋若憲知樞密楊承和得為相及貶明州鄭注發其事壬子再貶處州長史著作郎分司舒元輿與李訓善訓用事召為右司郎中兼侍御史知雜鞫楊虞卿獄癸丑擢為御史中丞元輿元襃之兄也貶吏部侍郎李漢為汾州刺史刑部侍郎蕭澣為遂州刺史皆坐李宗閔之黨是時李訓鄭注連逐三相威震天下於是平生絲恩髪怨無不報者又貶左金吾大將軍沈􅔲為邵州刺史八月丙子又貶李宗閔潮州司户賜宋若憲死戊寅再貶沈􅔲柳州司户丙申詔以楊承和庇護宋申錫韋元素王踐言與李宗閔李德􅁉中外連結受其賂遺承和可驩州安置元素可象州安置踐言可恩州安置令所在錮送楊虞卿李漢蕭澣為朋黨之首貶虞卿䖍州司户漢汾州司馬澣遂州司馬尋遣使追賜承和元素踐言死時崔潭峻已卒亦剖棺鞭尸己亥以前廬州刺史羅立言為司農少卿立言贓吏以賂結鄭注而得之鄭注之入翰林也中書舍人高元􅁉草制言以醫藥奉君親注銜之奏元􅁉甞出郊送李宗閔壬寅貶元􅁉閬州刺史元􅁉士亷之六世孫也時注與李訓所惡朝士皆指目為二李之黨貶逐無虚日班列殆空廷中忷忷上亦知之訓注恐為人所搖九月癸卯朔勸上下詔應與德􅁉宗閔親舊及門生故吏今日以前貶黜之外餘皆不問人情稍安冬十一月李訓等謀誅宦官敗死官弒逆事見宦開成元年春三月壬寅以袁州長史李德􅁉為滁州刺史夏四月乙卯以潮州司户李宗閔為衡州司馬凡李訓所指為李德􅁉宗閔黨者稍稍收復之三年春正月楊嗣復欲援進李宗閔恐為鄭覃所沮乃先令宦官諷上上臨朝為宰相曰宗閔積年在外宜與一官鄭覃曰陛下若憐宗閔之遠止可移近北數百里不宜再用用之臣請先避位陳夷行曰宗閔曏以朋黨亂政陛下何愛此纎人楊嗣復曰事貴得中不可但徇愛憎上曰可與一州覃曰與州太優止可洪州司馬耳因與嗣復互相詆訐以為黨上曰與一州無傷覃等退上謂起居郎周敬復舍人魏謩曰宰相諠争如此可乎對曰誠為不可然覃等盡忠憤激不自覺耳丁酉以衡州司馬李宗閔為杭州刺史李固言與楊嗣復李珏善故引居大政以排鄭覃陳夷行毎議政之際是非鋒起上不能決也五年春正月文宗崩武宗即位夏五月己卯門下侍郎同平章事楊嗣復罷為吏部尚書秋八月庚午門下侍郎同平章事李珏罷為太常卿初上之立非宰相意故楊嗣復李珏相繼罷去召淮南節度使李德􅁉入朝九月甲戌朔至京師丁丑以德􅁉為門下侍郎同平章事庚辰德􅁉入謝言於上曰致理之要在於辨羣臣之邪正夫邪正二者勢不相容正人指邪人為邪邪人亦指正人為邪人主辨之甚難臣以為正人如松柏特立不倚邪人如藤蘿非附它物不能自起故正人一心事君而邪人競為朋黨先帝深知朋黨之患然所用卒皆朋黨之人良由執心不定故姧邪得乗間而入也夫宰相不能人人忠良或為欺罔主心始疑於是旁詢小臣以察執政如德宗末年所聴任者惟裴延齡輩宰相署敕而已此政事所以日亂也陛下誠能慎擇賢才以為宰相有姧罔者立黜去之常令政事皆出中書推心委任堅定不移則天下何憂不理哉又曰先帝於大臣好為形迹小過皆含容不言日累月積以致禍敗兹事大誤願陛下以為戒臣等有罪陛下當面詰之事茍無實得以辨明若其有實辭理自窮小過則容其悛改大罪則加之誅譴如此君臣之際無疑閒矣上嘉納之初德􅁉在淮南敕召監軍楊欽義人皆言必知樞密德􅁉待之無加禮欽義心銜之一旦獨延欽義置酒中堂情禮極厚陳珍玩數牀罷酒皆以贈之欽義大喜過望行至汴州敕復還淮南欽義盡以所餉歸之德􅁉曰此何直卒以與之其後欽義竟知樞密德􅁉柄用欽義頗有力焉武宗㑹昌元年秋八月以前山南東道節度使同平章事牛僧孺為太子太師先是漢水溢壞襄州民居故李德􅁉以為僧孺罪而廢之二年春二月淮南節度使李紳入朝丁丑以紳為中書侍郎同平章事三年夏五月李德􅁉言太子賓客分司李宗閔與劉從諌交通不宜寘之東都戊戌以宗閔為湖州刺史四年秋閏七月壬戌以中書侍郎李紳同平章事充淮南節度使九月李德􅁉怨太子太傅東都留守牛僧孺湖州刺史李宗閔言於上曰劉從諌據上黨十年大和中入朝僧孺宗閔執政不留之加宰相縱去以成今日之患竭天下力乃能取之皆二人之罪也德􅁉又使人於潞州求僧孺宗閔與從諌交通書疏無所得乃令孔目官鄭慶言從諌毎得僧孺宗閔書疏皆自焚毁詔追慶下御史臺按問中丞李回知雜鄭亞以為信然河南少尹呂述與德􅁉書言稹破報至僧孺出聲歎恨德􅁉奏述書上大怒以僧孺為太子少保分司宗閔為漳州刺史戊子再貶僧孺汀州刺史宗閔漳州長史冬十一月復貶牛僧孺循州長史李宗閔長流封州五年春正月淮南節度使李紳按江都令吳湘盗用程糧錢强娶所部百姓顔悦女估其資裝為贓罪當死湘武陵之兄子也李德􅁉素惡武陵議者多言其寃諌官請覆桉詔遣監察御史崔元藻李稠覆之還言湘盗程糧錢有實顔悦本衢州人甞為青州牙推妻亦士族與前獄異德􅁉以為無與奪二月貶元藻端州司户稠汀州司户不復更推亦不付灋司詳斷即如紳奏處湘死諌議大夫柳仲郢敬晦皆上疏争之不納稠晉江人晦昕之弟也李德􅁉以柳仲郢爲京兆尹素與牛僧孺善謝德􅁉曰不意太尉恩奬及此仰報厚德敢不如竒章公門舘徳􅁉不以為嫌冬十月李德􅁉秉政日久好徇愛憎人多怨之自杜悰崔鉉罷相宦者左右言其太專上亦不悦給事中韋弘質上疏言宰相權重不應更領三司錢穀德􅁉奏稱制置職業人主之柄弘質受人教導所謂賤人圖柄臣非所宜言十二月弘質坐貶官由是衆怒愈甚六年春三月甲子上崩以李德􅁉攝冢宰丁卯宣宗即位宣宗素惡德􅁉之專即位之日德􅁉奉冊既罷謂左右曰適近我者非太尉邪毎顧我使我毛髪洒浙夏四月辛未朔上始聴政壬申以門下侍郎同平章事李德􅁉同平章事充荆南節度使德􅁉秉權日久位重有功衆不謂其遽罷聞之莫不驚駭甲戌貶工部尚書判鹽鐵轉運使薛元賞為忠州刺史弟京兆少尹權知府事元龜為崖州司戸皆徳􅁉之黨也秋七月壬寅淮南節度使李紳薨八月以循州司馬牛僧孺為衡州長史封州流人李宗閔為郴州司馬宗閔未離封州而卒九月以荆南節度使李徳􅁉為東都留守解平章事宣宗大中元年初李德􅁉執政引白敏中為翰林學士及武宗崩德􅁉失勢敏中乗上下之怒竭力排之使其黨李咸訟德􅁉罪德􅁉由是自東都留守以太子少保分司秋九月乙酉前永寜尉吳汝納訟其弟湘罪不至死李紳李德􅁉相表裏欺罔武宗枉殺臣弟乞召江州司户崔元藻等對辯丁亥敕御史臺鞫實以聞冬十二月庚戌御史臺奏據崔元藻所列吳湘寃狀如吳汝納之言戊午貶太子少保分司李德􅁉為潮州司馬二年秋九月甲子再貶潮州司馬李德􅁉為崖州司户三年閏冬十一月己未崖州司户李德􅁉卒武宗平澤潞穆宗長慶二年春二月昭義監軍劉承偕恃恩陵轢節度使劉悟數衆辱之又縱其下亂灋隂與磁州刺史張汶謀縛悟送闕下以汶代之悟知之諷其軍士作亂殺汶圍承偕欲殺之幕僚賈直言入責悟曰公所為如是欲效李司空邪此軍中安知無如公者使李司空有知得無笑公於地下乎悟遂謝直言救免承偕囚之府舍三月上詔劉悟送劉承偕詣京師悟託以軍情不時奉詔上問裴度宜如何處置度對曰承偕在昭義驕縱不灋臣盡知之悟在行營與臣書具論其事時有中使趙􅀪亮在臣軍中持悟書去云欲自奏之不知甞奏不上曰朕殊不知也且悟大臣何不自奏對曰悟武臣不知事體然今事狀籍籍如此臣等面論陛下猶不能決况悟當日單辭豈能動聖聴哉上曰前事勿論直言此時如何處置對曰陛下必欲收天下心止應下半紙詔書具陳承偕驕縱之罪令悟集將士斬之則藩鎮之臣孰不思為陛下效死非獨悟也上俛首良久曰朕不惜承偕然太后以為養子今兹囚縶太后尚未知之况殺之乎卿更思其次度乃與王璠等奏請流承偕於遠州必得出上從之後月餘悟乃釋承偕加劉悟檢校司徒餘如故自是悟浸驕欲效河北三鎮招聚不逞章表多不遜敬宗寳曆元年昭義節度使劉悟之去鄆州也以鄆兵二千自隨為親兵八月庚戌悟暴疾薨子將作監主簿從諌匿其喪與大將劉武德及親兵謀以悟遺表求知留後司馬賈直言入責從諌曰爾父提十二州地歸朝廷其功非細秪以張汶之故自謂不潔淋頭竟至羞死爾孺子何敢如此父死不哭何以為人從諌恐悚不能對乃發喪冬十一月朝廷得劉悟遺表議者多言上黨内鎮與河朔異不可許左僕射李絳上疏以為兵機尚速威斷貴定人情未一乃可伐謀劉悟死已數月朝廷尚未處分中外人意共惜事機今昭義兵衆必不盡與從諌同謀縱使其半叶同尚有其半效順從諌未甞久典兵馬威惠未加於人又此道素貧非時必無優賞今朝廷但速除近澤潞一將充昭義節度使令兼程赴鎮從諌未及布置新使已至潞州所謂先人奪人之心也新使既至軍心自有所繫從諌無位何名主張設使謀撓朝命其將士必不肯從今朝廷久無處分彼軍不曉朝廷之意欲效順則恐忽授從諌欲同惡則恐别更除人猶豫之間若有姦人為之畫䇿虚張賞設錢數軍士覬望尤難指揮伏望速賜裁斷仍先下明敕宣示軍衆奬其從来忠節賜新使繒五十萬匹使之賞設續除劉從諌一刺史從諌既粗有所得必且擇利而行萬無違拒設不從命臣亦以為不假攻討何則臣聞從諌已禁山東三州軍士不許自畜兵刀足明羣心殊未得一帳下之事亦在不疑熟計利害決無即授從諌之理時李逢吉王守澄計議已定竟不用絳等謀十二月辛丑以從諌為昭義留後劉悟煩苛從諌濟以寛厚衆頗附之二年夏四月戊申以昭義留後劉從諌為節度使文宗大和六年冬十一月乙亥昭義節度使劉從諌入朝七年春正月甲午加昭義節度使劉從諌同平章事遣歸鎮初從諌以忠義自任入朝欲請它鎮既至見朝廷事柄不一又士大夫多請託心輕朝廷故歸而益驕開成元年春二月昭義節度使劉從諌上表請王涯等罪名官弒逆語見宦丙申加從諌檢校司徒三月劉從諌復遣衙將焦楚長上表讓官因暴揚仇士良等罪惡官弒逆語見宦武宗㑹昌三年初昭義節度使劉從諌累表言仇士良罪惡士良亦言從諌窺伺朝廷及上即位從諌有馬高九尺獻之上不受從諌以爲士良所爲怒殺其馬由是與朝廷相猜恨遂招納亡命繕完兵械鄰境皆潜爲之備從諌􅅦馬牧及商旅歳入錢五萬緡又賣鐵煮鹽亦數萬緡大商皆假以牙職使通好諸道因爲販易商人倚從諌勢所至多陵轢將吏諸道皆惡之從諌疾病謂妻裴氏曰吾以忠直事朝廷而朝廷不明我志諸道皆不我與我死它人立此軍則吾家無炊火矣乃與幕客張谷陳揚庭謀效河北諸鎮以弟右驍衛將軍從素之子稹為牙内都知兵馬使從子匡周為中軍兵馬使孔目官王協為押牙親事兵馬使以奴李士貴為使宅十將兵馬使劉守義劉守忠董可武崔􅀇度分將牙兵谷鄆州人揚庭洪州人也從諌尋薨稹秘不發喪王協為稹謀曰正當如寳曆年様為之不出百日旌節自至但嚴奉監軍厚遺敕使四境勿出兵城中暗為備而已使押牙姜崟奏求國醫上遣中使解朝政以醫徃問疾稹又逼監軍崔士康奏稱從諌疾病請命其子稹為留後上遣供奉官薛士幹徃諭指云恐從諌疾未平宜且就東都療之俟稍瘳别有任使仍遣稹入朝必厚加官爵上以澤潞事謀於宰相宰相多以為回鶻餘燼未滅邊鄙猶須警僃復討澤潞國力不支請以劉稹權知軍事諌官及羣臣上言者亦然李德􅁉獨曰澤潞事體與河朔三鎭不同河朔習亂已久人心難化是故累朝以來置之度外澤潞近處腹心一軍素稱忠義甞破走朱滔擒盧從史頃時多用儒臣爲帥如李抱眞成立此軍德宗猶不許承襲使李緘護喪歸東都敬宗不恤國務宰相又無遠略劉悟之死因循以授從諌從諌䟦扈難制累上表迫脅朝廷今垂死之際復以兵權擅付豎子朝廷若又因而授之則四方諸鎮誰不思效其所為天子威令不復行矣上曰卿以何術制之果可克否對曰稹所恃者河朔三鎮但得鎮魏不與之同則稹無能為也若遣重臣徃諭王元逵何􅀪敬以河朔自艱難以來列聖許其傳襲已成故事與澤潞不同今朝廷將加兵澤潞不欲更出禁軍至山東其山東三州􅀠昭義者委兩鎮攻之兼令徧諭將士以賊平之日厚加官賞苟兩鎮聽命不從旁沮橈官軍則稹必成擒矣上喜曰吾與德􅁉同之保無後悔遂決意討稹羣臣言者不復入矣上命德􅁉草詔賜成德節度使王元逵魏博節度使何􅀪敬其略曰澤潞一鎮與卿事體不同勿爲子孫之謀欲存輔車之勢但能顯立功效自然福及後昆丁丑上臨朝稱其語要切曰當如此直告之是也又賜張仲武詔以回鶻餘燼未滅塞上多虞專委卿禦侮元逵􅀪敬得詔悚息聽命解朝政至上黨劉稹見朝政曰相公危困不任拜詔朝政欲突入兵馬使劉武德董可武躡􅄕而立朝政恐有它變遽走出稹贈賮直數千緡復遣牙將梁叔文入謝薛士幹入境俱不問從諌之疾直爲己知其死之意都押牙郭誼等乃大出軍至龍泉驛迎候敕使請用河朔事體又見監軍言之崔士康懦怯不敢違於是將吏扶稹出見士衆發喪士幹竟不得入牙門稹亦不受敕命誼兖州人也解朝政復命上怒杖之配恭陵囚姜崟梁叔文辛巳始為從諌輟朝贈太傅詔劉稹護喪歸東都又召見劉從素令以書諭稹稹不從丁亥以忠武節度使王茂元為河陽節度使邠寧節度使王宰為忠武節度使茂元栖曜之子宰智興之子也黄州刺史杜牧上李德􅁉書自言甞問淮西將董重質以三州之衆四歳不破之由重質以為由朝廷徵兵太雜客軍數少既不能自成一軍事須帖付地主勢羸力弱心志不一多致敗亡故初戰二年以來戰則必勝是多殺客軍及二年已後客軍殫少止與陳許河陽全軍相援縱使唐州兵不能因雪取城蔡州事力亦不支矣其時朝廷若使鄂州壽州唐州只保境不用進戰但用陳許鄭滑兩道全軍帖以宣潤弩手令其守隘即不出一歲無蔡州矣今者上黨之叛復與淮西不同淮西為寇僅五十歲其人味為寇之腴見為寇之利風俗益固氣燄已成自以為天下之兵莫我與敵根深源闊取之固難夫上黨則不然自安史南下不甚附􅀠建中之後每奮忠義是以郳公抱真能窘田悦走朱滔常以孤窮寒苦之軍横折河朔彊梁之衆以此證驗人心忠赤習尚專一可以盡見劉悟卒從諌求繼與扶同者只鄆州隨來中軍二千耳值寳曆多故因以授之今纔二十餘歲風俗未改故老尚存雖欲劫之必不用命今成德魏博雖盡節效順亦不過圍一城攻一堡係纍穉老而已若使河陽萬人為壘窒天井之口高壁深塹勿與之戰只以忠武武寧兩軍帖以青州五千精甲宣潤二千弩手徑擣上黨不過數月必覆其巢穴矣時德􅁉制置澤潞亦頗采牧言李德􅁉言於上曰議者皆云劉悟有功稹未可亟誅宜全恩禮請下百官議以盡人情上曰悟亦何功當時迫於救死耳非素心徇國也藉使有功父子為將相二十餘年國家報之足矣稹何得復自立朕以為凡有功當顯賞有罪亦不可茍免也德􅁉曰陛下之言誠得理國之要夏五月河陽節度使王茂元以步騎三千守萬善河東節度使劉沔步騎二千守芒車關步兵一千五百軍榆社成德節度使王元逵以步騎三千守臨洺掠堯山河中節度使陳夷行以步騎一千守翼城步兵五百益兾氏辛丑制削奪劉從諌及子稹官爵以元逵為澤潞北面招討使何􅀪敬為南面招討使與夷行劉沔茂元合力攻討先是河北諸鎮有自立者朝廷必先有弔祭使次冊贈使宣慰使繼徃商度軍情必不可與節則别除一官俟軍中不聽出然後始用兵故常及半歲軍中得繕完為備至是宰相亦欲且遣使開諭上即命下詔討之王元逵受詔之日出師屯趙州六月王茂元遣兵馬使馬繼等將步騎二千軍於天井關南科斗店劉稹遣衙内十將薛茂卿將親軍二千拒之丙子詔王元逵李彦佐劉沔王茂元何􅀪敬以七月中旬五道齊進劉稹求降皆不得受又詔劉沔自將兵取仰車關路以臨賊境􅊨􅊨秋七月上遣刑部侍郎兼御史中丞李回宣慰河北三鎮令幽州乗秋早平回鶻鎮魏早平澤潞回太祖之八世孫也甲辰李德􅁉言於上曰臣見曏日河朔用兵諸道利於出境仰給度支或隂與賊通借一縣一柵據之自以為功坐食轉輸延引歲時今請賜諸軍詔指令王元逵取邢州何􅀪敬取洺州王茂元取澤州李彦佐劉沔取潞州毋得取縣上從之晉絳行營節度使李彦佐自發徐州行甚緩又請休兵於絳州兼請益兵李德􅁉言於上曰彦佐逗遛顧望殊無討賊之意所請皆不可許宜賜詔切責令進軍翼城上從之德􅁉因請以天德防禦使石雄為彦佐之副俟至軍中令代之乙巳以雄為晉絳行營節度副使仍詔彦佐進屯翼城劉稹上表自陳亡父從諌為李訓雪寃言仇士良罪惡由此為權倖所疾謂臣父潜懐異志臣所以不敢舉族歸朝乞陛下稍垂寛察活臣一方何􅀪敬亦為之奏雪皆不報李回至河朔何􅀪敬王元逵張仲武皆具櫜鞬郊迎立於道左不敢令人控馬讓制使先行自兵興以來未之有也回明辯有膽氣三鎮無不奉詔王元逵奏㧞宣務柵擊堯山劉稹遣兵救堯山元逵擊敗之詔切責李彦佐劉沔王茂元使速進兵逼賊境且稱元逵之功以激厲之加元逵同平章事八月乙丑昭義大將李丕來降議者或謂賊故遣丕降欲以疑誤官軍李德􅁉言於上曰自用兵半年未有降者今安問誠之與詐且須厚賞以勸將來但不可置之要地耳王元逵前鋒入邢州境已踰月何􅀪敬猶未出師元逵屢有密表稱􅀪敬懐兩端丁卯李德􅁉上言忠武累戰有功軍聲頗振王宰年力方壯謀略可稱請賜􅀪敬詔以河陽河東皆閡山險未能進軍賊屢出兵焚掠晉絳今遣王宰將忠武全軍徑魏博直扺磁州以分賊勢􅀪敬必懼此攻心伐謀之術也從之詔宰悉選步騎精兵自相魏趣磁州甲戌薛茂卿破科斗寨擒河陽大將馬繼等焚掠小寨一十七距懐州纔十餘里茂卿以無劉稹之命故不敢入時議者鼎沸以爲劉悟有功不可絶其嗣又從諌養精兵十萬糧支十年如何可取上亦疑之以問李德􅁉對曰小小進退兵家之常願陛下勿聽外議則成功必矣上乃謂宰相曰爲我語朝士有上䟽沮議者我必於賊境上斬之議者乃止何弘敬聞王宰將至恐忠武兵入魏境軍中有變蒼黄出師丙子弘敬奏巳自將全軍度漳水趣磁州庚辰李德􅁉上言河陽兵力寡弱自科斗店之敗賊勢愈熾王茂元復有疾人情危怯欲退保懐州臣竊見元和以來諸賊常視官軍寡弱之處併力攻之一軍不支然後更攻它處今魏博未與賊戰西軍閡險不進故賊得併力南下若河陽退縮不惟虧沮軍聲兼恐震驚洛師望詔王宰更不之磁州亟以忠武軍應援河陽不惟扞蔽東都兼可臨制魏博若慮全軍供餉難給且令發先鋒五千人赴河陽亦足張聲勢甲申又奏請敕王宰以全軍繼進仍急以噐械繒帛助河陽窘乏上皆從之王茂元軍萬善劉稹遣牙將張巨劉公直等㑹薛茂卿共攻之期以九月朔圍萬善乙酉公直等潜師先過萬善南五里焚雍店巨引兵繼之過萬善覘知城中守備單弱欲專有功遂攻之日昊城且㧞乃使人告公直等時義成軍適至茂元困急欲帥衆棄城走都虞候孟章遮馬諌曰賊衆自有前却半在雍店半在此乃亂兵耳今義成軍纔至尚未食聞僕射走則自潰矣願且彊留茂元乃止㑹日暮公直等不至巨引兵退始登山微雨晦黒自相驚曰追兵近矣皆走人馬相踐墜崖谷死者甚衆上以王茂元王宰兩節度使共處河陽非宜庚寅李德􅁉等奏茂元習吏事而非將才請以宰為河陽行營攻討使茂元病愈止令鎮河陽病困亦免它虞九月辛卯以宰兼河陽行營攻討使何􅀪敬奏拔肥鄉平恩殺傷甚衆得劉稹牓帖皆謂官軍為賊云遇之即須痛殺癸巳上謂宰相何􅀪敬已克兩縣可釋前疑既有殺傷雖欲持兩端不可得已乃加􅀪敬檢校左僕射丙午河陽奏王茂元薨李德􅁉奏王宰止可令以忠武節度使將萬善營兵不可使兼領河陽恐其不愛河陽州縣恣為侵擾又河陽節度先領懐州刺史常以判官攝事割河南五縣租賦隸河陽不若遂以五縣置孟州其懷州别置刺史俟昭義平日仍割澤州􅀠河陽節度則太行之險不在昭義而河陽遂為重鎮東都無復憂矣上采其言戊申以河南尹敬昕為河陽節度懐孟觀察使王宰將行營以扞敵昕供饋餉而已庚戌以石雄代李彦佐為晉絳行營節度使令自冀氏取潞州仍分兵屯翼城以備侵軼石雄代李彦佐之明日即引兵踰烏嶺破五寨殺獲千計時王宰軍萬善劉沔軍石㑹皆顧望未進上得雄㨗書喜甚冬十月庚申臨朝謂宰相曰雄真良將李德􅁉因言比年前潞州市有男子磬折唱曰石雄七千人至矣劉從諌以為妖言斬之破潞州者必雄也詔賜雄帛為優賞雄悉置軍門自依士卒例先取一匹餘悉分將士故士卒樂為之致死初劉沔破回鶻得太和公主張仲武疾之由是有隙上使李回至幽州和解之仲武意終不平朝廷恐其以私憾敗事辛未徙沔為義成節度使以前荆南節度使李石為河東節度使忠武軍素號精勇王宰治軍嚴整昭義人甚憚之薛茂卿以科斗寨之功意望超遷或謂劉稹曰留後所求者節耳茂卿太深入多殺官軍激怒朝廷此節所以來益遲也由是無賞茂卿愠懟密與王宰通謀十一月丁巳宰引兵攻天井關茂卿小戰遽引兵走宰遂克天井關守之關東西寨聞茂卿不守皆退走宰遂焚大小箕村茂卿入澤州密使諜召宰進攻澤州當為内應宰疑不敢進失期不至茂卿拊膺頓足而已稹知之誘茂卿至潞州殺之并其族以兵馬使劉公直代茂卿安全慶守烏嶺李佐堯守雕黄嶺郭僚守石㑹康良佺守武郷僚誼之姪也戊辰王宰進攻澤州與劉公直戰不利公直乗勝復天井關甲戌宰進擊公直大破之遂圍陵川克之河東奏克石㑹關洺州刺史李恬石之從兄也石至太原劉稹遣軍將賈羣詣石以恬書與石云稹願舉族歸命相公奉從諌喪歸葬東都石囚羣以其書聞李德􅁉上言今官軍四合㨗書日至賊勢窮蹙故偽輸誠欵冀以緩師稍得自完復坐侵軼望詔石荅恬書云前書未敢聞奏若郎君誠能悔過舉族面縛待罪境上則石當親徃受降護送歸闕若虚為誠欵先求解兵次望洗雪則石必不敢以百口保人仍望詔諸道乗其上下離心速進兵攻討不過旬朔必内自生變上從之右拾遺崔碣上疏請受其降上怒貶碣鄧城令初劉沔破回鶻留兵三千戍横水柵河東行營都知兵馬使王逢奏乞益榆社兵詔河東以兵二千赴之時河東無兵守倉庫者及工匠皆出從軍李石召横水戍卒千五百人使都將楊弁將之詣逢壬午戍卒至太原先是軍士出征人給絹二匹劉沔之去竭武庫自隨石初至軍用乏以已絹益之人纔得一匹時已歲盡軍士求過正旦而行監軍吕義忠累牒趣之楊弁因衆心之怒又知城中空虚遂作亂四年春正月乙酉朔楊弁帥其衆剽掠城市殺都頭梁季叶李石犇汾州弁據軍府釋賈羣之囚使其姪與之俱詣劉稹約為兄弟稹大喜石㑹關守將楊珍聞太原亂復以關降於稹戊子吕義忠遣使言狀朝議喧然或言兩地皆應罷兵王宰又上言遊奕將得劉稹表臣近遣人至澤潞賊有意歸附若許招納乞降詔命李德􅁉上言宰擅受稹表遣人入賊中曽不聞奏觀宰意似欲擅招撫之功昔韓信破田榮李靖擒頡利皆因其請降潜兵掩襲止可令王宰失信豈得損朝廷威命建立竒功實在今日必不可以太原小擾失此事機望即遣供奉官至行營督其進兵掩其無僃必須劉稹與諸將皆舉族靣縛方可受納兼遣供奉官至晉絳行營密諭石雄以王宰若納劉稹則雄無功可紀雄於垂成之際須自取竒功勿失此便又爲相府與宰書言昔王承宗雖逆命猶遣弟承恭奉表詣張相祈哀又遣其子知感知信入朝憲宗猶未之許今劉稹不詣尚書靣縛又不遣血屬祈哀置章表於衢路之間遊奕將不即毁除實恐非是況稹與楊弁通姦逆狀如此而將帥大臣容受其詐是私惠歸於臣下不赦在於朝廷事體之閒交恐不可自今更有章表宜即所在焚之惟面縛而來始可容受德􅁉又上言太原人心從來忠順止是貧虚賞犒不足况千五百人何能為事必不可姑息寛縱且用兵未罷深慮所在動心頃張延賞為張朏所逐逃犇漢州還入成都望詔李石義忠還赴太原行營召旁近之兵討除亂者上皆從之是時李石已至晉州詔復還太原辛卯詔王逢悉留太原兵守榆社以易定千騎宣武兖海歩兵二千討楊弁又詔王元逵以歩騎五千自土門入應接逢軍忻州刺史李丕奏揚弁遣人來為遊説臣已斬之兼斷其北出之路發兵討之辛丑上與宰相議太原事李德􅁉曰今太原兵皆在外為亂者止千餘人諸州鎮必無應者計不日誅翦惟應速詔王逢進軍至城下必自有變上曰仲武見鎮魏討澤潞有功必有慕羡之心使之討太原何如德􅁉對曰鎮州趣太原路最便近仲武去年討回鶻與太原争功恐其不戢士卒平人受害乃止上遣中使馬元實至太原曉諭亂兵且覘其彊弱楊弁與之酣飲三日且賂之戊申元實自太原還上遣詣宰相議之元實於衆中大言相公須早與之節李德􅁉曰何故元實曰自牙門至柳子列十五里曵地光明甲若之何取之德􅁉曰李相正以太原無兵故發横水兵赴榆社庫中之甲盡在行營弁何能遽致如此之衆乎元實曰太原人勁悍皆可為兵弁召募所致耳德􅁉曰召募須有貨財李相止以欠軍士絹一匹無從可得故致此亂弁何從得之元實辝屈德􅁉曰從其有十五里光明甲必須殺此賊因奏稱楊弁微賊決不可恕如國力不及寧捨劉稹河東兵戍榆社者聞朝廷令客軍取太原恐妻孥為所屠滅乃擁監軍吕義忠自取太原壬子克之生擒楊弁盡誅亂卒三月乙卯吕義忠奏克太原丙辰李德􅁉言於上曰王宰久應取澤州今已遷延兩月蓋宰與石雄素不叶今得澤州距上黨猶二百里而石雄所屯距上黨纔百五十里宰恐攻澤州綴昭義六軍而雄得乗虚入上黨獨有其功耳又宰生子晏實其父智興愛而子之晏實今為磁州刺史為劉稹所質宰之顧望不敢進或為此也上命德􅁉草詔賜宰督其進兵且曰朕顧兹小冦終不貸刑亦知晏實是卿愛弟將申大義在抑私懷丁巳以李石為太子少傅分司以河中節度使崔元式為河東節度使石雄為河中節度使己未石雄拔良馬等三寨一堡辛酉太原獻楊弁及其黨五十四人皆斬於狗脊嶺壬申李德􅁉言於上曰事固有激發而成功者陛下命王宰趣磁州而何􅀪敬出師遣客軍討太原而戍兵先取楊弁今王宰久不進軍請徙劉沔鎮河陽仍令以義成精兵二千直抵萬善處宰肘腋之下若宰識朝廷此意必不敢淹留若宰進軍沔以重兵在南聲勢亦壯上曰善戊寅以義成節度使劉沔為河陽節度使王逢擊昭義將康良佺敗之良佺棄石㑹闗退屯鼓腰嶺夏四月王宰進攻澤州秋七月辛卯上與李徳􅁉議以王逢將兵屯翼城上曰聞逢用法太嚴有諸對曰臣亦甞以此語之逢言前有白刄法不嚴其誰肯進上曰言亦有理卿更召而戒之德􅁉因言劉稹不可赦上曰固然德􅁉曰昔李懷光未平京師蝗旱米斗千錢太倉米供天子及六宫無數旬之儲德宗集百官遣中使馬欽緒詢之左散騎常侍李泌取桐葉摶破以授欽緒獻之德宗召問其故對曰陛下與懷光君臣之分如此葉不可復合矣由是德宗意定既破懐光遂用為相獨任數年上曰亦大是奇士閏月李德􅁉奏鎮州奏事官高迪密陳意見二事其一以為賊中好為偷兵術潜抽諸處兵聚於一壘官軍多就迫逐以致失利經一兩月又偷兵詣它處官軍須知此情自非來攻城柵慎勿與戰彼淹留不過三日須散歸舊屯如此數四空歸自然喪氣官軍密遣諜者詗其抽兵之處乗虚襲之無不㨗矣其二鎮魏屯兵雖多終不能分賊勢何則下營不離故處毎三兩月一深入燒掠而去賊但固守城柵城外百姓賊亦不惜宜令進營據其要害以漸逼之若止如今日賊中殊不以為懼望詔諸將各使知之劉稹腹心將高文端降言賊中乏食令婦人挼穗舂之以給軍德􅁉訪文端破賊之䇿文端以為官軍今直攻澤州恐多殺士卒城未易得澤州兵約萬五千人賊常分兵太半潜伏山谷伺官軍攻城疲弊則四集救之官軍必失利今請令陳許軍過乾河立寨目寨城連延築為夾城環繞澤州日遣大軍布陳於外以扞救兵賊見圍城將合必出大戰待其敗北然後乗勢可取德􅁉奏請詔示王宰文端又言固鎮寨四崖懸絶勢不可攻然寨中無水皆飲澗水在寨東南約一里許宜令王逢進兵逼之絶其水道不過三日賊必棄寨遁去官軍即可追躡前十五里至青龍寨亦四崖懸絶水在寨外可以前法取也其東十五里則沁州城德􅁉奏請詔示王逢文端又言都頭王釗將萬兵戍洺州劉稹既族薛茂卿又誅邢洺救援兵馬使談朝議兄弟三人釗自是疑懼稹遣使召之釗不肯入士卒皆譁譟釗必不為稹用但釗及士卒家屬皆在潞州又士卒恐己降為官軍所殺招之必不肯來惟有諭意於釗使引兵入潞州取稹事成之日許除别道節度使仍厚有賜與庻幾肯從德􅁉奏請詔何􅀪敬潜遣人諭以此意劉稹年少懦弱押牙王協宅内兵馬使李士貴用事專聚貨財府庫充溢而將士有功無賞由是人心離怨劉從諌妻裴氏冕之支孫也憂稹將敗其弟問典兵在山東欲召之使掌軍政士貴恐問至奪已權且泄其姧狀乃曰山東之事仰成於五舅若召之是無三州也乃止王協薦王釗為洺州都知兵馬使釗得衆心而多不遵使府約束同列高元武安玉言其有貳心稹召之釗辭以到洺州未立少功實所慙恨乞留數月然後詣府許之王協請税商人毎州遣軍將一人主之名爲税商實籍編户家貲至於什噐無所遺皆估爲絹匹十分取其二率高其估民竭浮財及糗糧輸之不能充皆忷忷不安軍將劉溪尤貪殘劉從諌棄不用溪厚賂王協協以邢州富商最多命溪主之裴問所將兵號夜飛多富商子弟溪至悉拘其父兄軍士訴於問問爲之請溪不許以不遜語荅之問怒密與麾下謀殺溪歸國并告刺史崔嘏嘏從之丙子嘏問閉城斬城中大將四人請降於王元逵時高元武在党山聞之亦降先是使府賜洺州軍士布人一端尋有帖以折冬賜㑹税商軍將至洺州王釗因人不安謂軍士曰留後年少政非已出今倉庫充實足支十年豈可不少散之以慰勞苦之士使帖不可用也乃擅開倉庫給士卒人絹一匹穀十二石士卒大喜釗遂閉城請降於何􅀪敬安玉在磁州聞二州降亦降於􅀪敬堯山都知兵馬使魏元談等降於王元逵元逵以其久不下皆殺之八月辛卯鎮魏奏邢洺滋三州降宰相入賀李德􅁉曰昭義根本盡在山東三州降則上黨不日有變矣上曰郭誼必梟劉稹以自贖德􅁉曰誠如聖料上曰於今所宜先處者何事德􅁉請以給事中盧􅀪正為三州留後曰萬一鎮魏請占三州朝廷難於可否上從之詔山南東道兼昭義節度使盧鈞乗驛赴鎮潞人聞三州降大懼郭誼王協謀殺劉稹以自贖稹再從兄中軍使匡周兼押牙誼患之言於稹曰十三郎在牙院諸將皆莫敢言事恐為十三郎所疑而獲罪以此失山東今誠得十三郎不入則諸將始敢盡言采於衆人必獲長䇿稹召匡周諭之使稱疾不入匡周怒曰我在院中故諸將不敢有異圖我出院家必滅矣稹固請之匡周不得已彈指而出誼令稹所親董可武説稹曰山東之叛事由五舅城中人人誰敢相保留後今欲何如稹曰今城中尚有五萬人且當閉門自守耳可武曰非良䇿也留後不若束身歸朝如張元益不失作刺史且以郭誼為留後俟得節之日徐奉太夫人及室家金帛歸之東都不亦善乎稹曰誼安肯如是可武曰可武已與之重誓必不負也乃引誼入稹與之密約既定乃白其母母曰歸朝誠為佳事但恨已晚吾有弟不能保安能保郭誼汝自圖之稹乃素服出門以母命署誼都知兵馬使王協已戒諸將列於外㕔誼拜謝稹已出見諸將稹治裝於内㕔李士貴聞之帥後院兵數千攻誼誼叱之曰何不自取賞物乃欲與李士貴同死乎軍士乃退共殺士貴誼易置將吏部署軍士一夕俱定明日使董可武入謁稹曰請議公事稹曰何不言之可武曰恐驚太夫人乃引稹歩出牙門至北宅置酒作樂酒酣乃言今日之事欲全太尉一家須留後自圖去就則朝廷必垂矜閔稹曰如所言稹之心也可武遂前執其手崔􅀇度自後斬之因收稹宗族匡周以下至襁褓中子盡殺之又殺劉從諌父子所厚善者張合陳揚庭李仲京郭台王羽韓茂章茂實王渥賈庠等凡十二家并其子姪甥壻無遺仲京訓之兄台行餘之子羽涯之從孫茂章茂實約之子渥璠之子庠餗之子也甘露之亂仲京等亡歸從諌從諌撫養之凡軍中有小嫌者誼日有所誅流血成泥乃函稹首遣使奉表及書降於王宰首過澤州劉公直舉營慟哭亦降於宰乙未宰以狀聞丙申宰相入賀李德􅁉奏今不須復置邢洺磁留後但遣盧􅀪正宣慰三州及成德魏博兩道上曰郭誼宜如何處之德􅁉對曰劉稹騃孺子耳阻兵拒命皆誼為之謀主及勢孤力屈又賣稹以求賞此而不誅何以懲惡宜及諸軍在境并誼等誅之上曰朕意亦以為然乃詔石雄將七千人入潞州以應謠言杜悰以饋運不給謂誼等可赦上熟視不應德􅁉曰今春澤潞未平太原復擾自非聖斷堅定二寇何由可平外議以為若在先朝赦之久矣上曰卿不知文宗心地不與卿合安能議乎罷盧鈞山南東道專為昭義節度使戊戌劉稹傳首至京師詔昭義五州給復一年軍行所過州縣免今年秋税昭義自劉從諌以來横増賦歛悉從蠲免所籍土團並縱遣歸農諸道將士有功者等級加賞郭誼既殺劉稹日望旌節既久不聞問乃曰必移它鎮於是閲鞍馬治行裝及聞石雄將至懼失色雄至誼等參賀畢敕使張仲清曰郭都知告身來日當至諸高班告身在此晚牙來受之乃以河中兵環毬場晩牙誼等至唱名引入凡諸將桀黠拒官軍者悉執送京師加何􅀪敬同平章事丁未詔發劉從諌尸暴於潞州市三日石雄取其尸置毬場斬剉之戊申加李德􅁉太尉趙國公德􅁉固辭上曰恨無官賞卿耳卿若不應得朕必不與卿初李德􅁉以韓全義以來將帥出征屢敗其弊有三一者詔令下軍前者日有三四宰相多不預聞二者監軍各以意見指揮軍事將帥不得專進退三者毎軍各有宦者為監使悉選軍中驍勇數百為牙隊其在陳戰鬬者皆怯弱之士毎戰監使自有信旗乗高立馬以牙隊自衛視軍勢小却輙引旗先走陳從而潰德􅁉乃與樞密使楊欽義劉行深議約敕監軍不得預軍政毎兵千人聽監使取十人自衛有功隨例霑賞二樞密皆以為然白上行之自禦回鶻至澤潞罷兵皆守此制自非中書進詔意更無它詔自中出者號令既簡將帥得以施其謀略故所向有功自用兵以來河北三鎮毎遣使者至京師李德􅁉常面諭之曰河朔兵力雖彊不能自立須藉朝廷官爵威命以安軍情歸語汝使與其使大將邀宣慰敕使以求官爵何如自奮忠義立功立事結知明主使恩出朝廷不亦榮乎且以耳目所及者言之李載義在幽州為國家盡忠平滄景及為軍中所逐不失作節度使後鎮太原位至宰相楊志誠遣大將遮敕使馬求官及為軍中所逐朝廷竟不赦其罪此二人禍福足以觀矣德􅁉復以其言白上上曰要當如此明吿之由是三鎮不敢有異志九月詔以澤州􅀠河陽節度丁巳盧鈞入潞州鈞素寛厚愛人劉稹未平鈞已領昭義節度襄州士卒在行營者與潞人戰常對陳揚鈞之美及赴鎮入天井關昭義散卒歸之者鈞皆厚撫之人情大洽昭義遂安劉稹將郭誼王協劉公直安全慶李道德李佐堯劉武德董可武等至京師皆斬之臣光曰董重質之在淮西郭誼之在昭義吳元濟劉稹如木偶人在伎兒之手耳彼二人者始則勸人為亂終則賣主規利其死固有餘罪然憲宗用之於前武宗誅之於後臣愚以為皆失之何則賞姧非義也殺降非信也失義與信何以為國昔漢光武待王郎劉盆子止於不死知其非力竭則不降故也樊崇徐宣王元牛邯之徒豈非助亂之人乎而光武弗殺蓋以既受其降則不可復誅故也若既赦而復逃亡叛亂則其死固無辭矣如誼等免死流之逺方没齒不還可矣殺之非也王羽賈庠等已為誼所殺李德􅁉復下詔稱逆賊王涯賈餗等已就昭義誅其子孫宣告中外識者非之劉從諌妻裴氏亦賜死又令昭義降將李丕高文端王釗等疏昭義將士與劉稹同惡者悉誅之死者甚衆盧鈞疑其枉濫奏請寛之不從昭義屬城有甞無禮於王元逵者元逵推求得二十餘人斬之餘衆懼復閉城自守戊辰李德􅁉等奏冦孽既平盡為國家城鎮豈可令元逵窮兵攻討望遣中使賜城内將士敕招安之仍詔元逵引兵歸鎮并詔盧鈞自遣使安撫從之裘甫寇浙東唐宣宗大中十三年冬十二月浙東賊帥裘甫攻陷象山官軍屢敗明州城門晝閉進逼剡縣有衆百人浙東騷動觀察使鄭祗德遣討擊副使劉勍副將范居植將兵三百合台州軍共討之懿宗咸通元年春正月乙卯浙東軍與裘甫戰於桐柏觀前范居植死劉勍僅以身免乙丑甫帥其徒千餘人陷剡縣開府庫募壯士衆至數千人越州大恐時二浙久安人不習戰甲兵朽鈍見卒不滿三百鄭祗德更募新卒以益之軍吏受賂率皆得孱弱者祗德遣正將沈君縱副將張公署望海鎮將李珪將新卒五百擊裘甫二月辛卯與甫戰於剡西賊設伏於三溪之南而陳於三溪之北壅溪上流使可涉既戰陽敗走官軍追之半涉決壅水大至官軍大敗三將皆死官軍旣盡於是山海諸盜及它道無頼亡命之徒四靣雲集衆至三萬分爲三十二隊其小帥有謀略者推劉􅙬勇力推劉慶劉從簡羣盗皆遙通書幣求屬麾下甫自稱天下都知兵馬使改元羅平鑄印曰天平大聚資糧購良工治噐械聲震中原鄭祗德累表告急且求救於鄰道浙西遣牙將凌茂貞將四百人宣歙遣牙將白琮將三百人赴之祗德始令屯郭門及東小江尋復召還府中以自衛祗德饋之比度支常饋多十三倍而宣潤將士猶以為不足宣潤將士請土軍為導以與賊戰諸將或稱病或陽墜馬其肯行者必先邀職級竟不果遣賊遊騎至平水東小江城中士民儲舟裹糧夜坐待旦各謀逃潰朝廷知祗德懦怯議選武將代之夏侯孜曰浙東山海幽阻可以計取難以力攻西班中無可語者前安南都護王式雖儒家子在安南威服華夷名聞遠近可任也諸將皆以為然遂以式為浙東觀察使徵祗德為賓客三月辛亥朔式入對上問以討賊方畧對曰但得兵賊必可破有宦者侍側曰發兵所費甚大式曰臣為國家惜費則不然兵多賊速破其費省矣若兵少不能勝賊延引歳月賊勢益張則江淮羣盗將蜂起應之國家用度盡仰江淮若阻絶不通則上自九廟下及十軍皆無以供給其費豈可勝計哉上顧宦官曰當與之兵乃詔發忠武義成淮南等諸道兵授之裘甫分兵掠衢婺州婺州押牙房郅散將樓曽衢州十將方景深將兵拒險賊不得入又分兵掠明州明州之民相與謀曰賊若入城妻子皆為葅醢况貨財能保之乎乃自相帥出財募勇士治噐械樹柵浚溝斷橋為固守之備賊又遣兵掠台州破唐興己巳甫自將萬餘人掠上虞焚之癸酉入餘姚殺丞尉東破慈溪入奉化抵寧海殺其令而據之分兵圍象山所過俘其少壯餘老弱者蹂踐殺之及王式除書下浙東人心稍安裘甫方與其徒飲酒聞之不樂劉􅙬歎曰有如此之衆而䇿畫未定良可惜也今朝廷遣王中丞將兵來聞其人智勇無敵不四十日必至兵馬使宜急引兵取越州憑城郭據府庫遣兵五千守西陵循浙江築壘以拒之大集舟艦得閒則長驅進取浙西過大江掠楊州貨財以自實還修石頭城而守之宣歙江西必有響應者遣劉從簡以萬人循海而南襲取福建如此則國家貢賦之地盡入於我矣但恐子孫不能守耳終吾身保無憂也甫曰醉矣明日議之􅙬以甫不用其言怒陽醉而出有進士王輅在賊中賊客之輅説甫曰如劉副使之謀乃孫權所為也彼乗天下大亂故能據有江東今中國無事此功未易成也不如擁衆據險自守陸耕海漁急則逃入海島此萬全䇿也甫畏式猶豫未決夏四月式行至柿口義成軍不整式欲斬其將久乃釋之自是軍所過若無人至西陵裘甫遣使請降式曰是必無降心直欲窺吾所為且欲使吾驕怠耳乃謂使者曰甫面縛以來當免而死乙未式入越州既交政為鄭祗德置酒曰式主軍政不可以飲監軍但與衆賓盡醉迨夜繼以燭曰式在此賊安能妨人樂飲丙申餞祗德于遠郊復樂飲而歸於是始修軍令告饋餉不足者息矣稱疾卧家者起矣先求遷職者黙矣賊别帥洪師簡許㑹能帥所部降式曰汝降是也當立效以自異使帥其徒為前鋒與賊戰有功乃奏以官先是賊諜入越州軍吏匿而飲食之文武將吏徃徃潛與賊通求城破之日免死及全妻子或詐引賊將來降實窺虚實城中密謀屏語賊皆知之式隂察之悉捕索斬之刑將吏尤横猾者嚴門禁無驗者不得出入警夜周密賊始不知我所為矣式命諸縣開倉廪以賑貧乏或曰賊未滅軍食方急不可散也式曰非汝所知官軍少騎卒式曰吐蕃回鶻比配江淮者其人習險阻便鞍馬可用也舉籍府中得驍健者百餘人虜久羇旅所部遇之無狀困餒甚式既犒飲又賙其父母妻子皆泣拜讙呼願效死悉以為騎卒使騎將石宗本將之凡在管内者皆視此籍之又奏得龍陂監馬二百匹於是騎兵足矣或請為烽燧以詗賊逺近衆寡式笑而不應選懦卒使乗健馬少給之兵以為候騎衆怪之不敢問於是閲諸營見卒及土團子弟得四千人使導軍分路討賊府下無守兵更籍土團千人以補之乃命宣歙將白琮浙西將凌茂貞帥本軍北來將韓宗政等帥土團合千人石宗本帥騎兵為前鋒自上虞趨奉化解象山之圍號東路軍又以義成將白宗建忠將游君楚淮南將萬璘帥本軍與台州唐興軍合號南路軍令之曰毋争險易毋焚廬舍毋殺平民以増首級平民脅從者募降之得賊金帛官無所問俘獲者皆越人也釋之癸卯南路軍拔賊沃洲寨甲辰㧞新昌寨破賊將毛應天進抵唐興五月辛亥浙東東路軍破賊將孫馬騎於寧海戊午南路軍大破賊將劉􅙬毛應天於唐興南谷斬應天先是王式以兵少奏更發忠武義成軍及請昭義軍詔從之三道軍至越州式命忠武將張茵將三百人屯唐興斷賊南出之道義成將高羅鋭將三百人益以台州土軍徑趨寧海攻賊巢穴昭義將􅎤跌戣將四百人益東路軍斷賊入湖州之道庚申南路軍大破賊於海游鎮賊入甬溪洞戊辰官軍屯於洞口賊出洞戰又破之己巳高羅鋭襲賊别帥劉平天寨破之自是諸軍與賊十九戰賊連敗劉􅙬謂裘甫曰曏從吾謀入越州寧有此困邪王輅等進士數人在賊中皆衣緑􅙬悉收斬之曰亂我謀者此青蟲也高羅銳克寧海收其逃散之民得七千餘人王式曰賊窘且飢必逃入海入海則歳月間未可擒也命羅鋭軍海口以拒之又命望海鎮將雲思益浙西將王克容將水軍巡海澨思益等遇賊將劉簡於寧海東賊不虞水軍遽至皆棄船走山谷得其船十七盡焚之式曰賊無所逃矣惟黄罕嶺可入剡恨無兵以守之雖然亦成擒矣裘甫既失寧海乃帥其徒屯南陳館下衆尚萬餘人辛未東路軍破賊將孫馬騎於上疁村賊將王臯懼請降戊寅浙東東路軍大破裘甫於南陳館斬首數千級賊委棄繒帛盈路以緩追者􅎤跌戣令士卒敢顧者斬毋敢犯者賊果自黄罕嶺遁去六月甲申復入剡諸軍失甫不知所在義成將張茵在唐興獲俘將苦之俘曰賊入剡矣苟捨我我請為軍導從之茵後甫一日至剡壁其東南府中聞甫入剡復大恐王式曰賊來就擒耳命趣東南兩路軍㑹於剡辛卯圍之賊城守甚堅攻之不能㧞諸將議絶溪水以渴之賊知之乃出戰三日凡八十三戰賊雖敗官軍亦疲賊請降諸將以白式式曰賊欲少休耳益謹備之功垂成矣賊果復出又三戰庚子夜裘甫劉􅙬劉慶從百餘人出降遙與諸將語離城數十歩官軍疾趨斷其後遂擒之壬寅甫等至越州式腰斬􅙬慶等二十餘人械甫送京師剡城猶未下諸將已擒甫不復設備劉從簡帥壯士五百突圍走諸將追至大蘭山從簡據險自守秋七月丁巳諸將共攻克之台州刺史李師望募賊相捕斬之以自贖所降數百人得從簡首獻之諸將還越式大置酒諸將乃請曰某等生長軍中久更行陣今年得從公破賊然私有所不喻者敢問公之始至軍食方急而遽散以賑貧乏何也式曰此易知耳賊聚榖以誘飢人吾給之食則彼不為盗矣且諸縣無守兵賊至則倉榖適足資之耳又問不置烽燧何也式曰烽燧所以趣救兵也兵盡行城中無兵以繼之徒驚士民使自潰亂耳又問使懦卒為候騎而少給兵何也式曰彼勇卒操利兵遇敵且不量力而鬬鬬死則賊至不知矣皆拜曰非所及也八月裘甫至京師斬于東市加王式檢校右散騎常侍諸將官賞各有差先是上毎以越盗為憂夏侯孜曰王式才有餘不日告㨗矣孜與式書曰公專以執裘甫為事軍須細大此期悉力故式所奏求無不從由是能成其功通鑑紀事本末巻第三十五
