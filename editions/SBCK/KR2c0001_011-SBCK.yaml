body:
  text: 魏滅蜀魏邵陵厲公嘉平五年漢衛將軍姜維自以練西方風俗兼負其才武欲誘諸羌胡以為羽翼謂自隴以西可斷而有每欲興軍大舉大將軍費禕常裁制不從與其兵不過萬人曰吾等不如丞相亦已逺矣丞相猶不能定中夏况吾等乎不如且保國治民謹守社稷如其功業以俟能者無為希冀徼倖决成敗於一舉若不如志悔之無及及禕死維得行其志乃將數萬人出石營圍狄道髙貴鄉公正元元年夏四月狄道長李簡密書請降於漢六月姜維冦隴西冬十月漢姜維自狄道進抜河間臨洮將軍徐質與戰殺其盪冦將軍張嶷漢兵乃還二年秋七月姜維復議出軍征西大將軍張翼廷争以爲國小民勞不宜黷武維不聼率車騎將軍夏侯霸及翼同進八月維將數萬人至抱䍐趨狄道征西將軍陳泰敕雍州刺史王經進屯狄道須泰軍到東西合埶乃進泰軍陳倉經所統諸軍於故闗與漢人戰不利經輒渡洮水泰以經不堅據狄道必有他變率諸軍以繼之經已與維戰於洮西大敗以萬餘人還保狄道城餘皆犇散死者萬計張翼謂維曰可以止矣不宜復進進或毁此大功為蛇畫足維大怒遂進圍狄道辛未詔長水校尉鄧艾行安西將軍與陳泰并力拒維戊辰復以大尉孚為後繼泰進軍隴西諸將皆曰王經新敗蜀衆大盛將軍以烏合之卒繼敗軍之後當乘勝之鋒殆必不可古人有言蝮蛇螫手壯士解腕孫子曰兵有所不擊地有所不守蓋小有所失而大有所全故也不如據險自保觀釁待敝然後進救此計之得者也泰曰姜維提輕兵深入正欲與我争鋒原野求一戰之利王經當髙壁深壘挫其銳氣今乃與戰使賊得計經既破走維若以戰克之威進兵東向據櫟陽積榖之實放兵收降招納羌胡東争闗隴傳檄四郡此我之所惡也而乃以乗勝之兵挫峻城之下銳氣之卒屈力致命攻守埶殊客主不同兵書云脩櫓轒輼三月乃成拒堙三月而後已誠非輕軍逺入之利也今維孤軍逺僑糧榖不繼是我速進破賊之時所謂疾雷不及掩耳自然之埶也洮水帶其表維等在其内今乘髙據埶臨其項領不戰必走寇不可縱圍不可久君等何言如是遂進軍度髙城嶺潜行夜至狄道東南髙山上多舉烽火鳴鼓角狄道城中將士見救至皆憤踴維不意救兵卒至縁山急來攻之泰與交戰維退泰引兵揚言欲向其還路維懼九月甲辰維遁走城中將士乃得出王經歎曰糧不至旬向非救兵速至舉城屠裂覆䘮一州矣泰慰勞將士前後遣還更差軍守并治城壘還屯上邽泰毎以一方有事輒以虚聲擾動天下故希簡上事驛書不過六百里大將軍昭曰陳征西沈勇能斷荷方伯之重救將陷之城而不求益兵又希簡上事必能辦賊故也都督大將不當爾邪姜維退駐鍾提甘露元年春正月姜維進位大將軍夏六月姜維在鍾提議者多以為維力已竭未能更出安西將軍鄧艾曰洮西之敗非小失也士卒彫殘倉廪空虚百姓流離今以䇿言之彼有乘勝之埶我有虚弱之實一也彼上下相習五兵犀利我將易兵新器仗未復二也彼以船行吾以陸軍勞逸不同三也狄道隴西南安祁山各當有守彼専為一我分為四四也從南安隴西因食羌榖若趣祁山熟麥千頃為之外倉五也賊有黠計其來必矣秋七月姜維復率衆出祁山聞鄧艾已有備乃回從董亭趣南安艾據武城山以拒之維與艾争險不克其夜渡渭東行縁山趣上邽艾與戰於段谷大破之以艾為鎮西將軍都督隴右諸軍事維與其鎮西大將軍胡濟期㑹上邽濟失期不至故敗士卒星散死者甚衆蜀人由是怨維維上書謝求自貶黜乃以衛將軍行大將軍事二年冬十二月姜維聞魏分闗中兵以赴淮南欲乘虚向秦川率數萬人出駱谷至沈嶺時長城積榖甚多而守兵少征西將軍都督雍凉諸軍事司馬望及安西將軍鄧艾進兵據之以拒維維壁於芒水數挑戰望艾不應是時維數出兵蜀人愁苦中散大夫譙周作仇國論以諷之曰或問往古能以弱勝疆者其術何如曰吾聞之處大無患者常多慢處小有憂者常思善多慢則生亂思善則生治理之常也故周文飬民以少取多句踐䘏衆以弱斃疆此其術也或曰曩者項疆漢弱相與戰爭項羽與漢約分鴻溝各歸息民張良以為民志既定則難動也率兵追羽終斃項氏豈必由文王之事乎曰當商周之際王侯世尊君臣久固民習所専深根者難抜據固者難遷當此之時雖漢祖安能仗劒鞭馬取天下乎及秦罷侯置守之後民疲秦役天下土崩或嵗改主或月易公鳥驚獸駭莫知所從於是豪疆並争虎裂狼分疾搏者獲多遲後者見吞今我與彼皆傳國易世矣既非秦末鼎沸之時實有六國並據之埶故可為文王難為漢祖夫民之疲勞則騷擾之兆生上慢下暴則瓦解之形起諺曰射幸數跌不如審發是故智者不為小利移目不為意似改歩時可而後動數合而後舉故湯武之師不再戰而克誠重民勞而度時審也如遂極武黷征土崩埶生不幸遇難雖有智者將不能謀之矣三年春二月姜維退還成都復拜大將軍初漢昭烈留魏延鎮漢中皆實兵諸圍以禦外敵敵若來攻使不得入及興埶之役王平捍拒曹爽皆承此制及姜維用事建議以為錯守諸圍適可禦敵不獲大利不若使聞敵至諸圍皆歛兵聚榖退就漢樂二城聽敵入平重闗頭鎮守以捍之令游軍旁出以伺其虚敵攻闗不克野無散榖千里運糧自然疲乏引退之日然後諸城並出與游軍并力搏之此殄敵之術也於是漢主令督漢中胡濟却住漢夀監軍王含守樂城護軍蔣斌守漢城四年尚書令陳祗以巧佞有寵於漢主姜維雖位在祗上而多率衆在外希親朝政權任不及祗秋八月丙子祗卒漢主以僕射義陽董厥為尚書令尚書諸葛瞻為僕射元皇帝景元二年冬十月漢主以董厥為輔國大將軍諸葛瞻為都護衛將軍共平尚書事以侍中樊建為尚書令時中常侍黄皓用事厥瞻皆不能矯正士大夫多附之唯建不與皓往來袐書令郤正乆在内職與皓比屋周旋三十餘年澹然自守以書自娱既不為皓所愛亦不為皓所憎故官不過六百石而亦不罹其禍漢主弟甘陵王永憎皓皓譖之使十年不得朝見吴主使五官中郎將薛珝聘于漢及還吴主問漢政得失對曰主闇而不知其過臣下容身以求免罪入其朝不聞直言經其野民皆菜色臣聞燕雀處堂子母相樂自以為至安也突決棟焚而燕雀怡然不知禍之将及其是之謂乎珝綜之子也三年秋八月大將軍姜維將出軍右車騎將軍廖化曰兵不戢必自焚伯約之謂也智不出敵而力少於冦用之無厭將何以存冬十月維入冦洮陽鄧艾與戰於侯和破之維退住沓中初維以羈旅依漢身受重任興兵累年功績不立黄皓用事於中與右大將軍閻宇親善隂欲廢維樹宇維知之言於漢主曰皓姦巧専恣將敗國家請殺之漢主曰皓趨走小臣耳往董允毎切齒吾常恨之君何足介意維見皓枝附葉連懼於失言遜辭而出漢主敕皓詣維陳謝維由是自疑懼返自洮陽因求種麥沓中不敢歸成都司馬昭患姜維數為冦官騎路遺求為刺客入蜀從事中郎荀朂曰明公為天下宰宜仗正義以伐違貳而以刺客除賊非所以刑于四海也昭善之朂爽之曽孫也昭欲大舉伐漢朝臣多以為不可獨司􅀠校尉鍾㑹勸之昭諭衆曰自定夀春以來息役六年治兵繕甲以擬二虜今吴地廣大而下濕攻之用功差難不如先定巴蜀三年之後因順流之埶水陸並進此滅虢取虞之勢也計蜀戰士九萬居守成都及備他境不下四萬然則餘衆不過五萬今絆姜維於沓中使不得東顧直指駱谷出其空虚之地以襲漢中以劉禪之闇而邊城外破士女内震其亡可知也乃以鍾㑹為鎮西將軍都督闗中征西將軍鄧艾以為蜀未有釁屢陳異議昭使主簿師纂為艾司馬以諭之艾乃奉命姜維表漢主聞鍾㑹治兵闗中欲規進取宜並遣左右車騎張翼廖化督諸軍分護陽安闗口及隂平之橋頭以防未然黄皓信巫􅀑謂敵終不自致啟漢主寢其事羣臣莫知四年夏五月詔諸軍大舉伐漢遣征西將軍鄧艾督三萬餘人自狄道趣甘松沓中以連綴姜維雍州刺史諸葛緒督三萬餘人自祁山趣武街橋頭絶維歸路鍾㑹統十餘萬衆分從斜谷駱谷子午谷趣漢中以廷尉衛瓘持節監艾㑹軍事行鎮西軍司瓘覬之子也㑹過幽州刺史王雄之孫戎問計將安出戎曰道家有言為而不恃非成功難保之難也或以問參相國軍事平原劉寔曰鍾鄧其平蜀乎寔曰破蜀必矣而皆不還客問其故寔笑而不荅秋八月軍發洛陽大賚將士陳師誓衆將軍鄧敦謂蜀未可討司馬昭斬以徇漢人聞魏兵且至乃遣廖化將兵詣沓中為姜維繼援張翼董厥等詣陽安闗口為諸圍外助大赦改元炎興敕諸圍皆不得戰退保漢樂二城城中各有兵五千人翼厥比至隂平聞諸葛緒將向建威留住月餘待之鍾㑹率諸軍平行至漢中九月鍾㑹使前將軍李輔統萬人圍王含於樂城護軍荀愷圍蔣斌於漢城㑹徑過西趣陽安口遣人祭諸葛亮墓初漢武興督蔣舒在事無稱漢朝令人代之使助將軍傅僉守闗口舒由是恨鍾㑹使護軍胡烈為前鋒攻闗口舒詭謂僉曰今賊至不擊而閉城自守非良圗也僉曰受命保城惟全為功今違命出戰若喪師負國死無益矣舒曰子以保城獲全為功我以出戰克敵為功請各行其志遂率其衆出僉謂其戰也不設備舒率其衆迎降胡烈烈乘虚襲城僉格鬬而死僉彤之子也鍾㑹聞闗口已下長驅而前大得庫藏積榖鄧艾遣天水太守王頎直攻姜維營隴西太守牽􅀪邀其前金城太守楊欣趣甘松維聞鍾㑹諸軍已入漢中引兵還欣等追躡於彊川口大戰維敗走聞諸葛緒已塞道屯橋頭乃從孔函谷入北道欲出緒後緒聞之却還三十里維入北道三十餘里聞緒軍却尋還從橋頭過緒趣截維較一日不及維遂還至隂平合集士衆欲赴闗城未到聞其已破退趣白水遇廖化張翼董厥等合兵守劒閣以拒㑹冬十月鄧艾進至隂平簡選精銳欲與諸葛緒自江油趣成都緒以本受節度邀姜維西行非本詔遂引軍向白水與鍾㑹合㑹欲専軍埶宻白緒畏懦不進檻車徴還軍悉屬㑹姜維列營守險㑹攻之不能克糧道險逺軍食乏欲引還鄧艾上言賊已摧折宜遂乘之若從隂平由邪徑經漢徳陽亭趣涪出劒閣西百里去成都三百餘里竒兵衝其腹心出其不意劒閣之守必還赴涪則㑹方軌而進劒閣之軍不還則應涪之兵寡矣遂自隂平行無人之地七百餘里鑿山通道造作橋閣山髙谷深至為艱險又糧運將匱瀕於危殆艾以氊自裹推轉而下將士皆攀木縁崖魚貫而進先登至江油蜀守將馬邈降諸葛瞻督諸軍拒艾至涪停住不進尚書郎黄崇權之子也屢勸瞻宜速行據險無令敵得入平地瞻猶豫未納崇再三言之至于流涕瞻不能從艾遂長驅而前擊破瞻前鋒瞻退住緜竹艾以書誘瞻曰若降者必表為琅邪王瞻怒斬艾使列陳以待艾艾遣子惠唐亭侯忠等出其右司馬師纂等出其左忠纂戰不利並引還曰賊未可擊艾怒曰存亡之分在此一舉何不可之有叱忠纂等將斬之忠纂馳還更戰大破斬瞻及黄崇瞻子尚歎曰父子荷國重恩不早斬黄皓使敗國殄民用生何為䇿馬冒陳而死漢人不意魏兵卒至不為城守調度聞艾已入平土百姓擾擾皆迸山野不可禁制漢主使羣臣㑹議或以為蜀之與吴本為盟國宜可犇吴或以為南中七郡阻險斗絶易以自守宜可犇南光禄大夫譙周以為自古以來無寄他國為天子者今若入吴國亦當臣服且治政不殊則大能吞小此數之自然也由此言之則魏能并吴吴不能并魏明矣等為稱臣為小孰與為大再辱之恥何與一辱且若欲犇南則當早為之計然後可徃今大敵已近禍敗將及羣小之心無一可保恐發足之日其變不測何至南之有乎或曰今艾已不逺恐不受降如之何周曰方今東吴未賔事埶不得不受受之不得不禮若陛下降魏魏不裂土以封陛下者周請身詣京都以古義争之衆人皆從周議漢主猶欲入南狐疑未決周上䟽曰南方逺夷之地平常無所供為猶數反叛自丞相亮以兵威偪之窮乃率從今若至南外當拒敵内供服御費用張廣他無所取耗損諸夷其叛必矣漢主乃遣侍中張紹等奉璽綬以降於艾北地王諶怒曰若理窮力屈禍敗將及便當父子君臣背城一戰同死社稷以見先帝可也奈何降乎漢主不聽是日諶哭於昭烈之廟先殺妻子而後自殺張紹等見鄧艾於雒艾大喜報書襃納漢主遣太僕蔣顯别敕姜維使降鍾㑹又遣尚書郎李虎送士民簿於艾户二十八萬口九十四萬甲士十萬二千吏四萬人艾至成都城北漢主率太子諸王及羣臣六十餘人面縛輿櫬詣軍門艾持節解縛焚櫬延請相見檢御將士無得虜略綏納降附使復舊業輒依鄧禹故事承制拜漢主禪行驃騎將軍太子奉車諸王駙馬都尉漢羣司各隨髙下拜為王官或領艾官屬以師纂領益州刺史隴西太守牽􅀪等領蜀中諸郡艾聞黄皓姦險收閉將殺之皓賂艾左右卒以得免姜維等聞諸葛瞻敗未知漢主所嚮乃引軍東入于巴鍾㑹進軍至涪遣胡烈等追維維至郪得漢主敕命乃令兵悉放仗送節傳於胡烈自從東道與廖化張翼董厥等同詣㑹降將士咸怒拔刀斫石於是諸郡縣圍守皆被漢主敕罷兵降鍾㑹厚待姜維等皆權還其印綬節蓋魏之伐蜀也吴人或謂襄陽張悌曰司馬氏得政以來大難屢作百姓未服今又勞力逺征敗於不暇何以能克悌曰不然曹操雖功蓋中夏民畏其威而不懐其徳也丕叡承之刑繁役重東西驅馳無有寧歳司馬懿父子累有大功除其煩苛而布其平惠為之謀主而救其疾苦民心歸之亦已久矣故淮南三叛而腹心不擾曹髦之死四方不動任賢使能各盡其心其本根固矣姦計立矣今蜀閹宦専朝國無政令而玩戎黷武民勞卒敝競於外利不脩守備彼彊弱不同智筭亦勝因危而伐殆無不克噫彼之得志我之憂也吴人笑其言至是乃服十二月乙夘以鄧艾為太尉鍾㑹為司徒鄧艾在成都頗自矜伐謂蜀士大夫曰諸君賴遭艾故得有今日耳如遇吴漢之徒已殄滅矣艾以書言於晋公昭曰兵有先聲而後實者今因平蜀之勢以乗吴吴人震恐席卷之時也然大舉之後將士疲勞不可便用且徐緩之留隴右兵二萬人蜀兵二萬人煑鹽興冶為軍農要用並作舟船豫為順流之事然後發使告以利害吴必歸化可不征而定也今宜厚劉禪以致孫休封禪為扶風王錫其資財供其左右郡有董卓塢為之宫舍爵其子為公侯食郡内縣以顯歸命之寵開廣陵城陽以待吴人則畏威懐徳望風而從矣昭使監軍衛瓘喻艾事當湏報不宜輒行艾重言曰銜命征行奉指授之䇿元惡既服至於承制拜假以安初附謂合權宜今蜀舉衆歸命地盡南海東接吴㑹宜早鎮定若待國命往復道途延引日月春秋之義大夫出疆有可以安社稷利國家専之可也今吴未賔埶與蜀連不可拘常以失事機兵法進不求名退不避罪艾雖無古人之節終不自嫌以損國家計也鍾㑹内有異志姜維知之欲構成擾亂乃說㑹曰聞君自淮南已來筭無遺䇿晉道克昌皆君之力今復定蜀威徳振世民髙其功主畏其謀欲以此安歸乎何不灋陶朱公泛舟絶迹全功保身邪㑹曰君言逺矣我不能行且為今之道或未盡於此也維曰其佗則君智力之所能無煩於老夫矣由是情好歡甚出則同轝坐則同席㑹因鄧艾承制専事乃與衛瓘宻白艾有反狀㑹善效人書於劒閣要艾章表白事皆易其言令辭指悖傲多自矜伐又毁晉公昭報書手作以疑之咸熙元年春正月壬辰詔以檻車徴鄧艾晉公昭恐艾不從命敕鍾㑹進軍成都又遣賈充將兵入斜谷昭自將大軍從帝幸長安以諸王公皆在鄴乃以山濤為行軍司馬鎮鄴初鍾㑹以才能見任昭夫人王氏言於昭曰㑹見利㤀義好為事端寵過必亂不可大任及㑹將發漢西曹屬邵悌言於晉公曰今遣鍾㑹率十萬餘衆伐蜀愚謂㑹單身無任不若使餘人行也晉公笑曰我寧不知此邪蜀數為邊冦師老民疲我今伐之如指掌耳而衆言蜀不可伐夫人心豫怯則智勇並竭智勇並竭而彊使之適所以為敵禽耳惟鍾㑹與人意同今遣㑹伐蜀蜀必可滅滅蜀之後就如卿慮何憂其不能辦邪夫蜀已破亡遺民震恐不足與共圗事中國將士各自思歸不肯與同也㑹若作惡秖自滅族耳卿不須憂此慎勿使人聞也及晉公將之長安悌復曰鍾㑹所統兵五六倍於鄧艾但可敕㑹取艾不須自行晉公曰卿忘前言邪而云不須行乎雖然所言不可宣也我要自當以信意待人但人不當負我耳我豈可先人生心哉近日賈護軍問我頗疑鍾㑹不我荅言如今遣卿行寧可復疑卿邪賈亦無以易我語也我到長安則自了矣鍾㑹遣衛瓘先至成都收鄧艾㑹以瓘兵少欲令艾殺瓘因以為艾罪瓘知其意然不可得距乃夜至成都檄艾所統諸將稱奉詔收艾其餘一無所問若來赴官軍爵賞如先敢有不出誅及三族比至鷄鳴悉來赴瓘唯艾帳内在焉平旦開門瓘乘使者車徑入至艾所居艾尚卧未起遂執艾父子置艾於檻車諸將圗欲劫艾整仗趣瓘營瓘輕出迎之偽作表草將申明艾事諸將信之而止丙子㑹至成都送艾赴京師㑹所憚惟艾艾父子既禽㑹獨統大衆威震西土遂決意謀反㑹欲使姜維將五萬人出斜谷為前驅㑹自將大衆隨其後既至長安令騎士從陸道歩兵從水道順流浮渭入河以為五日可到孟津與騎兵㑹洛陽一旦天下可定也㑹得晋公書云恐鄧艾或不就徴今遣中護軍賈充將歩騎萬人徑入斜谷屯樂城吾自將十萬屯長安相見在近㑹得書驚呼所親語之曰但取鄧艾相國知我獨辦之今來大重必覺我異矣便當速發事成可得天下不成退保蜀漢不失作劉備也丁丑㑹悉請護軍郡守牙門騎督以上及蜀之故官為太后發哀於蜀朝堂矯太后遺詔使㑹起兵廢司馬昭皆班示坐上人使下議訖書版署置更使所親信代領諸軍所請羣官悉閉著益州諸曹屋中城門宫門皆閉嚴兵圍守衛瓘詐稱疾篤出就外廨㑹信之無所復憚姜維欲使㑹盡殺北來諸將已因殺㑹盡坑魏兵復立漢主密書與劉禪曰願陛下忍數日之辱臣欲使社稷危而復安日月幽而復明㑹欲從維言誅諸將猶豫未決㑹帳下督丘建本屬胡烈㑹愛信之建恐烈獨坐啟㑹使聽内一親兵出取飲食諸牙門隨例各内一人烈給語親兵及䟽與其子淵曰丘建密説消息㑹已作大坑白棓數千欲悉呼外兵入人賜白幍拜散將以次棓殺内坑中諸牙門親兵亦咸説此語一夜轉相告皆徧己夘日中胡淵率其父兵雷鼓出門諸軍不期皆鼓譟而出曽無督促之者而争先赴城時㑹方給姜維鎧杖白外有匈匈聲似失火者有頃白兵走向城㑹驚謂維曰兵來似欲作惡當云何維曰但當撃之耳㑹遣兵悉殺所閉諸牙門郡守内人共舉机以拄門兵斫門不能破斯須城外倚梯登城或燒城屋蟻附亂進矢下如雨牙門郡守各縁屋出與其軍士相得姜維率㑹左右戰手殺五六人衆格斬維爭前殺㑹㑹將士死者數百人殺漢太子璿及姜維妻子軍衆鈔略死喪狼籍衛瓘部分諸將數日乃定鄧艾本營將士追出艾於檻車迎還衛瓘自以與㑹共陷艾恐其為變乃遣護軍田續等將兵襲艾遇於緜竹西斬艾父子艾之入江油也田續不進艾欲斬續既而捨之及瓘遣續謂曰可以報江油之辱矣鎮西長史杜預言於衆曰伯玉其不免乎身為名士位望已髙既無徳音又不御下以正將何以堪其責乎瓘聞之不􅀱駕而謝預預恕之子也鄧艾餘子在洛陽者悉伏誅徙其妻及孫於西城鍾會兄毓嘗宻言於晉公曰㑹挾術難保不可專任及㑹反毓已卒晉公思鍾繇之勲與毓之賢特原毓子峻辿官爵如故㑹功曹向雄收葬㑹尸晉公召而責之曰往者王經之死卿哭於東市而我不問鍾㑹躬為叛逆又輙收葬若復相容其如王法何雄曰昔先王掩骼埋胔仁流朽骨當時豈先卜其功罪而後收葬哉今王誅既加於法已備雄感義收葬教亦無闕法立於上教􅀪於下以此訓物不亦可乎何必使雄背死違生以立於世明公讎對枯骨捐之中野豈仁賢之度哉晉公恱與宴談而遣之三月劉禪舉家東遷洛陽時擾攘倉卒禪之大臣無從行者惟祕書令郤正及殿中督汝南張通捨妻子單身隨禪禪賴正相導宜適舉動無闕乃慨然歎息恨知正之晚初漢建寧太守霍弋都督南中聞魏兵至欲赴成都劉禪以備敵既定不聼成都不守弋素服大臨三日諸將咸勸弋宜速降弋曰今道路隔塞未詳主之安危去就大故不可茍也若魏以禮遇主上則保境而降不晚也若萬一危辱吾將以死拒之何論遲速邪得禪東遷之問始率六郡將守上表曰臣聞人生於三事之如一惟難所在則致其命今臣國敗主附守死無所是以委質不敢有貳晉王善之拜南中都尉委以本任丁亥封劉禪為安樂公子孫及羣臣封侯者五十餘人晉王與禪宴為之作故蜀技旁人皆為之感愴而禪喜笑自若王謂賈充曰人之無情乃至於是雖使諸葛亮在不能輔之乆全況姜維邪佗日王問禪曰頗思蜀否禪曰此間樂不思蜀也郤正聞之謂禪曰若王後問宜泣而荅曰先人墳墓逺在岷蜀乃心西悲無日不思因閉其目㑹王復問禪對如前王曰何乃似郤正語邪禪驚視曰誠如尊命左右皆笑初鍾㑹之伐漢也辛憲英謂其夫之從子羊祜曰㑹在事縱恣非持乆處下之道吾畏其有他志也㑹請其子郎中琇為參軍憲英憂曰他日吾為國憂今日難至吾家矣琇固請於晉王王不聼憲英謂琇曰行矣戒之軍旅之間可以濟者其惟仁恕乎琇竟以全歸癸巳詔以琇嘗諌㑹反賜爵闗内侯晉武帝泰始五年春二月濟隂太守巴西文立上言故蜀之名臣子孫流徙中國者宜量才叙用以慰巴蜀之心傾吴人之望帝從之己未詔曰諸葛亮在蜀盡其心力其子瞻臨難而死義其孫京宜隨才署吏又詔曰蜀將傅僉父子死於其主天下之善一也豈由彼此以為異哉僉息著募沒入奚官宜免為庶人七年安樂思公劉禪卒九年初鄧艾之死人皆寃之而朝廷無為之辨者及帝即位議郎敦煌段灼上䟽曰鄧艾心懐至忠而荷反逆之名平定巴蜀而受三族之誅艾性剛急矜功伐善不能協同朋類故莫肯理之臣竊以為艾本屯田掌犢人寵位已極功名已成七十老公復何所求正以劉禪初降逺郡未附矯令承制權安社稷鍾㑹有悖逆之心畏艾威名因其疑似御名太上成其事艾被詔書即遣彊兵束身就縳不敢顧望誠自知奉見先帝必無當死之理也㑹受誅之後艾官屬將吏愚戇相聚自共追艾破壊檻車解其囚執艾在困地狼狽失據未嘗與腹心之人有平素之謀獨受腹背之誅豈不哀哉陛下龍興闡􅀪大度謂可聼艾歸葬舊墓還其田宅以平蜀之功繼封其後使艾闔棺定諡死無所恨則天下徇名之士思立功之臣必投湯火樂為陛下死矣帝善其言而未能從㑹帝問給事中樊建以諸葛亮之治蜀曰吾獨不得如亮者而臣之乎建稽首曰陛下知鄧艾之寃而不能直雖得亮得無如馮唐之言乎帝笑曰卿言起我意乃以艾孫朗為郎中淮南三叛文欽母丘儉諸葛誕魏髙貴鄉公正元元年初揚州刺史文欽驍果絶人曹爽以鄉里故愛之欽恃爽埶多所陵傲及爽誅欽已内懼又好増虜級以邀功賞司馬師常抑之由是怨望鎮東將軍母丘儉素與夏侯􅀇李豐善􅀇等死儉亦不自安乃以計厚待欽儉子治書侍御史甸謂儉曰大人居方嶽重任國家傾覆而晏然自守將受四海之責矣儉然之二年春正月儉欽矯太后詔起兵於夀春移檄州郡以討司馬師又表言相國懿忠正有大勲於社稷宜宥及後世請廢師以侯就第以弟昭代之太尉孚忠孝小心護軍望忠公親事皆宜親寵授以要任望孚之子也儉又遣使邀鎮南將軍諸葛誕誕斬其使儉欽將五六萬衆渡淮西至項儉堅守使欽在外爲游兵司馬師問計於河南尹王肅肅曰昔闗羽虜于禁於漢濵有北向爭天下之志後孫權襲取其將士家屬羽士衆一旦瓦解今淮南將士父母妻子皆在内州但急往禦衛使不得前必有闗羽土崩之勢矣時師新割目瘤創甚或以為大將軍不宜自行不如遣太尉孚拒之唯王肅與尚書傅嘏中書侍郎鍾㑹勸師自行師疑未决嘏曰淮楚兵勁而儉等負力逺鬭其鋒未易當也若諸將戰有利鈍大勢一失則公事敗矣師蹶然起曰我請輿疾而東戊午師率中外諸軍以討儉欽以弟昭兼中領軍留鎮洛陽召三方兵㑹于陳許師問計於光禄勲鄭袤袤曰母丘儉好謀而不達事情文欽勇而無筭今大軍出其不意江淮之卒銳而不能固宜深溝髙壘以挫其氣此亞夫之長䇿也師稱善師以荆州刺史王基為行監軍假節統許昌軍基言於師曰淮南之逆非吏民思亂也儉等誑誘廹脅畏目下之戮是以尚屯聚耳若大兵一臨必土崩瓦解儉欽之首不終朝而致於軍門矣師從之以基為前軍既而復敕基停駐基以為儉等舉軍足以深入而久不進者是其詐偽已露衆心疑沮也今不張示威形以副民望而停軍髙壘有似畏懦非用兵之埶也若儉欽虜略人民以自益又州郡兵家為賊所得者更懐離心儉等所廹脅者自顧罪重不敢復還此為錯兵無用之地而成姦宄之源吴冦因之則淮南非國家國有譙沛汝豫危而不安此計之大失也軍宜連進據南頓南頓有大邸閣計足軍人四十日糧保堅城因積榖先人有奪人之心此平賊之要也基屢請乃聼進據㶏水閏月甲申師次于㶏橋儉將吏招李續相次來降王基復言於師曰兵聞拙速未覩巧之久也方今外有彊冦内有叛臣若不時決則事之深淺未可測也議者多言將軍持重將軍持重是也停軍不進非也持重非不行之謂也進而不可犯耳今保壁壘以積實資虜而逺運軍糧甚非計也師猶未許基曰將在軍君令有所不受彼得則利我得亦利是謂爭地南頓是也遂輒進據南頓儉等從項亦欲往争發十餘里聞基先到乃復還保項吴丞相峻率票騎將軍吕據左將軍㑹稽留贊襲夀春司馬師命諸軍皆深壁髙壘以待東軍之集諸將請進軍攻項師曰諸軍得其一未知其二淮南將士本無反志儉欽說誘與之舉事謂逺近必應而事起之日淮北不從史招李續前後瓦解内乖外叛自知必敗困獸思鬭速戰更合其志雖云必克傷人亦多且儉等欺誑將士詭變萬端小與持乆詐情自露此不戰而克之術也乃遣諸葛誕督豫州諸軍自安風向夀春征東將軍胡遵督青徐諸軍出譙宋之間絶其歸路師屯汝陽母丘儉文欽進不得鬭退恐夀春見襲計窮不知所為淮南將士家皆在北衆心沮散降者相屬惟淮南新附農民為之用儉之初起遣健歩齎書至兖州兖州刺史鄧艾斬之將兵萬餘人兼道前進先趨樂嘉城作浮橋以待師儉使文欽將兵襲之師自汝陽潛兵就艾於樂嘉欽猝見大軍驚愕未知所為欽子鴦年十八勇力絶人謂欽曰及其未定擊之可破也於是分為二隊夜夾攻軍鴦率壯士先至皷譟軍中震擾師驚駭所病目突出恐衆知之囓被皆破欽失期不應㑹明鴦見兵盛乃引還師謂諸將曰賊走矣可追之諸將曰欽父子驍猛未有所屈何苦而走師曰夫一鼓作氣再而衰鴦鼓譟失應其埶已屈不走何待欽將引而東鴦曰不先折其埶不得去也乃與驍騎十餘摧鋒陷陳所向皆披靡遂引去師使左長史司馬班率驍騎八千翼而追之鴦以疋馬入數千騎中輒殺傷百餘人乃出如此者六七追騎莫敢逼殿中人尹大目小為曹氏家奴常在天子左右師將與俱行大目知師一目已出啟云文欽本是明公腹心但為人所誤耳又天子鄉里素與大目相信乞為公追解語之令還與公復好師許之大目單身乗大馬被鎧胄追欽遥相與語大目心實欲為曹氏謬言君侯何苦不可復忍數日中也欲使欽解其㫖欽殊不悟乃更厲聲罵大目曰汝先帝家人不念報恩而反與司馬師作逆不顧上天天不祐汝張弓傅矢欲射大目大目涕泣曰世事敗矣善自努力是日母丘儉聞欽退恐懼夜走衆遂大潰欽還至項以孤軍無繼不能自立欲還夀春夀春已潰遂犇吴吴孫峻至東興聞儉等敗壬寅進至橐臯文欽父子詣軍降母丘儉走比至慎縣左右人兵稍棄儉去儉藏水邊草中甲辰安風津民張屬就殺儉傳首京師封屬為侯諸葛誕至夀春夀春城中十餘萬口懼誅或流迸山澤或散走入吴詔以誕為鎮東大將軍儀同三司都督揚州諸軍事夷毌丘儉三族儉黨七百餘人繫獄侍御史杜友治之惟誅首事者十人餘皆奏免之吴孫峻聞諸葛誕已據夀春乃引兵還以文欽為都護鎮北大將軍幽州牧甘露元年秋九月吴孫峻卒孫綝輔政甘露二年夏四月征東大將軍諸葛誕素與夏侯􅀇鄧颺等友善􅀇等死王凌母丘儉相繼誅滅誕内不自安乃傾帑藏振施曲赦有罪以收衆心畜飬揚州輕俠數千人以為死士因吴人欲向徐堨請十萬衆以守夀春又求臨淮築城以備吴冦司馬昭初秉政長史賈充請遣參佐慰勞四征且觀其志昭遣充至淮南充見誕論説時事因曰洛中諸賢皆願禪代君以為如何誕厲聲曰卿非賈豫州子乎世受魏恩豈可欲以社稷輸人乎若洛中有難吾當死之充黙然還言於昭曰諸葛誕再在揚州得士衆心今召之必不來然反疾而禍小不召則反遲而禍大不如召之昭從之甲子詔以誕為司空召赴京師誕得詔書愈恐疑揚州刺史樂綝間已遂殺綝歛淮南及淮北郡縣屯田口十餘萬官兵楊州新附勝兵者四五萬人聚榖足一年食為閉門自守之計遣長史吴綱將少子靚至吴稱臣請救并請以牙門子弟為質司馬昭奉帝及太后討諸葛誕吴綱至吴吴人大喜使將軍全懌全端唐咨王祚將三萬衆與文欽同救誕以誕為左都護假節大司徒票騎將軍青州牧封夀春侯懌琮之子端其從子也六月甲子車駕次項司馬昭督諸軍二十六萬進屯丘頭以鎮南將軍王基行鎮東將軍都督楊豫諸軍事與安東將軍陳騫等圍夀春基始至圍城未合文欽全懌等從城東北因山乘險得將其衆突入城昭敕基歛軍堅壁基累求進討㑹吴朱異率三萬人進屯安豐為文欽外埶詔基引諸軍轉據北山基謂諸將曰今圍壘轉固兵馬向集但當精脩守備以待越逸而更移兵守險使得放縱雖有智者不能善其後矣遂守便宜上䟽曰今與賊家對敵當不動如山若遷移依險人心揺蕩於埶大損諸軍並據深溝髙壘衆心皆定不可傾動此御兵之要也書奏報聽於是基等四面合圍表裏再重塹壘甚峻文欽等數出犯圍逆擊走之司馬昭又使奮武將軍監青州諸軍事石苞督兖州刺史州泰徐州刺史胡質等簡銳卒為游軍以備外冦泰擊破朱異於陽淵異走㤗追之殺傷二千人秋七月吴大將軍琳大發卒出屯鑊里復遣朱異帥將軍丁奉黎斐等五人前解夀春之圍異留輜重於都陸進屯黎漿石苞州泰又擊破之泰山太守胡烈以竒兵五千襲都陸盡焚異資糧異將餘兵食葛葉走歸孫綝綝使異更死戰異以士卒乏食不從綝命綝怒九月己巳綝斬異於鑊里辛未引兵還建業綝既不能抜出諸葛誕而䘮敗士衆自戮名將由是吴人莫不怨之司馬昭曰異不得至夀春非其罪也而吴人殺之欲以謝夀春而堅誕意使其猶望救耳今當堅圍備其越逸而多方以誤之乃縱反間揚言吴救方至大軍乏食分遣羸疾就穀淮北勢不能乆誕等益寛恣食俄而城中乏糧外救不至將軍蔣班焦􅂜皆誕腹心謀主也言於誕曰朱異等以大衆來而不能進孫綝殺異而歸江東外以發兵為名内實坐湏成敗今宜及衆心尚固士卒思用并力决死攻其一面雖不能盡克猶有可全者空坐守死無為也文欽曰公今舉十餘萬之衆歸命於吴而欽與全端等皆同居死地父兄子弟盡在江表就孫綝不欲來主上及其親戚豈肯聽乎且中國無歳無事軍民並疲今守我一年内變將起奈何捨此欲乘危徼幸乎班彞固勸之欽怒誕欲殺班彞二人懼十一月棄誕踰城來降全懌兄子輝儀在建業與其家内争訟擕其母將部曲數十家來犇於是懌與兄子靖及全端弟翩緝皆將兵在夀春城中司馬昭用黄門侍郎鍾㑹䇿宻為輝儀作書使輝儀所親信齎入城告懌等説吳中怒懌等不能㧞夀春欲盡誅諸將家故逃來歸命十二月懌等率其衆數千人開門出降城中震懼不知所為詔拜懌平東將軍封臨湘侯端等封拜各有差三年春正月文欽謂諸葛誕曰蔣班焦􅂜謂我不能出而走全端全懌又率衆逆降此敵無備之時也可以戰矣誕及唐咨等皆以為然遂大為攻具晝夜五六日攻南圍欲决圍而出圍上諸軍臨髙發石車火箭逆燒破其攻具矢石雨下死傷蔽地血流盈壍復還城城内食轉竭出降者數萬口欽欲盡出北方人省食與吴人堅守誕不聼由是争恨欽素與誕有隙徒以計合事急愈相疑欽見誕計事誕遂殺欽欽子鴦虎將兵在小城中聞欽死勒兵赴之衆不為用遂單走踰城出自歸於司馬昭軍吏請誅之昭曰欽之罪不容誅其子固應就戮然鴦虎以窮歸命且城未拔殺之是堅其心也乃赦鴦虎使將數百騎廵城呼曰文欽之子猶不見殺其餘何懼又表鴦虎皆為將軍賜爵闗内侯城内皆喜且日益飢困司馬昭身自臨圍見城上持弓者不發曰可攻矣乃四靣進軍同時鼓譟登城二月乙酉克之誕窘急單馬將其麾下突小城欲出司馬胡奮部兵擊斬之夷其三族誕麾下數百人皆拱手為列不降毎斬一人輒降之卒不變以至於盡吴將于詮曰大丈夫受命其主以兵救人既不能克又束手於敵吾弗取也乃免胄冒陳而死唐咨王祚等皆降吴兵萬衆器仗山積司馬昭初圍夀春王基石苞等皆欲急攻之昭以為夀春城固而衆多攻之必力屈若有外冦表裏受敵此危道也今三叛相聚於孤城之中天其或者使同就戮吾當以全䇿縻之但堅守三靣若吴賊陸道而來軍糧必少吾以游兵輕騎絶其轉輸可不戰而破也吴賊破欽等必成擒矣乃命諸軍按甲以守之卒不煩攻而破議者又以為淮南仍為叛逆吴兵室家在江南不可縱宜悉坑之昭曰古之用兵全國為上戮其元惡而已吴兵就得亡還適可以示中國之大度耳一無所殺分布三河近郡以安處之拜唐咨安逺將軍其餘禆將咸假位號衆皆恱服其淮南將士吏民為誕所脅略者皆赦之聽文鴦兄弟收歛父䘮給其車牛致葬舊墓昭遺王基書曰初議者云云求移者甚衆時未臨履亦謂宜然將軍深筭利害獨秉固志上違詔命下拒衆議終至制敵禽賊雖古人所述不是過也昭欲遣諸軍輕兵深入招迎唐咨等子弟因釁有滅吴之埶王基諌曰昔諸葛恪乗東闗之勝竭江表之兵以圍新城城既不拔而衆死者太半姜維因洮西之利輕兵深入糧餉不繼軍覆上邽夫大捷之後上下輕敵輕敵則慮難不深今賊新敗於外又内患未弭是其脩備設慮之時也且兵出踰年人有歸志今俘馘十萬罪人斯得自厯代征伐未有全兵獨克如今之盛者也武皇帝克袁紹於官渡自以所獲已多不復追犇懼挫威也昭乃止以基為征東將軍都督揚州諸軍事進封東武侯習鑿齒曰君子謂司馬大將軍於是役也可謂能以徳攻矣夫建業者異道各有所尚而不能兼并也故窮武之雄斃於不仁存義之國喪於懦退今一征而禽三叛大虜吴衆席卷淮浦俘馘十萬可謂壯矣而未及安坐賞王基之功種惠吴人結異類之情寵鴦葬欽忘疇昔之隙不咎誕衆使揚土懐愧功髙而人樂其成業廣而敵懐其徳武昭既敷文筭又洽推此道也天下其孰能當之哉司馬氏篡魏魏髙貴鄉公正元元年春二月殺中書令李豐初豐年十七八已有清名海内翕然稱之其父太僕恢不願其然敕使閉門斷客曹爽専政司馬懿稱疾不出豐為尚書僕射依違二公間故不與爽同誅豐子韜以選尚齊長公主司馬師秉政以豐為中書令是時太常夏侯􅀇有天下重名以曹爽親故不得在埶任居常怏怏張緝以后父去郡家居亦不得意豐皆與之親善師雖擢用豐豐私心常在􅀇豐在中書二歳帝數獨召豐與語不知所說師知其議已請豐相見以詰豐豐不以實告師怒以刀鐶築殺之送尸付廷尉遂收豐子韜及夏侯􅀇張緝等皆下廷尉鍾毓案治云豐與黄門監蘇鑠永寧署令樂敦宂從僕射劉賢等謀曰拜貴人日諸營兵皆屯門陛下臨軒因此同奉陛下將羣僚人兵就誅大將軍陛下儻不從人便當劫將去耳又云謀以􅀇爲大將軍緝爲票騎將軍􅀇緝皆知其謀庚戌誅韜􅀇緝鑠敦賢皆夷三族帝以李豐之死意殊不平安東將軍司馬昭鎮許昌詔召之使撃姜維九月昭領兵入見帝幸平樂觀以臨軍過左右勸帝因昭辭殺之勒兵以退大將軍已書詔於前帝懼不敢發昭引兵入城大將軍師乃謀廢帝甲戌師以皇太后令召羣臣㑹議以帝荒滛無度䙝近倡優不可以承天緒羣臣皆莫敢違乃奏收帝璽綬歸藩于齊使郭芝入白太后太后方與帝對坐芝謂帝曰大將軍欲廢陛下立彭城王據帝乃起去太后不恱芝曰太后有子不能教今大將軍意已成又勒兵于外以備非常但當順㫖將復何言太后曰我欲見大將軍口有所説芝曰何可見邪但當速取璽綬太后意折乃遣傍侍御取璽綬著坐側芝出報師師甚喜又遣使者授帝齊王印綬使出就西宫帝與太后垂涕而别遂乗王車從太極殿南出羣臣送者數十人司馬孚悲不自勝餘多流涕師又使使者請璽綬於太后太后曰彭城王我之季叔也今來立我當何之且明皇帝當永絶嗣乎髙貴鄉公文皇帝之長孫明皇帝之弟子於禮小宗有後大宗之義其詳議之丁丑師更召羣臣以太后令示之乃定迎髙貴鄉公髦於元城髦者東海定王霖之子也時年十四使太常王肅持節迎之師又使請璽綬太后曰我見髙貴鄉公小時識之我自欲以璽綬手授之冬十月己丑髙貴鄉公至􅀇武館羣臣奏請舍前殿公以先帝舊處避止西廂羣臣又請以法駕迎公不聽庚寅公入于洛陽羣臣迎拜西掖門南公下輿荅拜儐者請曰儀不拜公曰吾人臣也遂荅拜至止車門下輿左右曰舊乘輿入公曰吾被皇太后徴未知所為遂歩至太極東堂見太后其日即皇帝位於太極前殿百僚陪位者皆欣欣焉大赦改元為齊王築宫于河内二年春文欽母丘儉起兵夀春司馬師率中外諸軍討之南三叛事見淮舞陽忠武侯司馬師疾篤還許昌衛將軍昭自洛陽往省師師令昭揔統諸軍辛亥師卒于許昌二月丁巳詔以司馬昭為大將軍録尚書事甘露元年夏四月庚戌賜大將軍昭衮冕之服赤舄副焉秋八月庚午詔司馬昭加號大都督奏事不名假黄􅃏二年司馬昭奉帝討諸葛誕南三叛事見淮三年夏五月詔以司馬昭為相國封晉公食邑八郡加九錫昭前後九讓乃止四年春正月黄龍二見寧陵井中先是頓丘冠軍陽夏井中屢有龍見羣臣以爲吉祥帝曰龍者君徳也上不在天下不在田而數屈於井非嘉兆也作潜龍詩以自諷司馬昭見而惡之元皇帝景元元年夏四月詔有司率遵前命復進大將軍昭位相國封晉公加九錫帝見威權日去不勝其忿五月己丑召侍中王沈尚書王經散騎常侍王業謂曰司馬昭之心路人所知也吾不能坐受廢辱今日當與鄉自出討之王經曰昔魯昭公不忍季氏敗走失國爲天下笑今權在其門為日乆矣朝廷四方皆為之致死不顧逆順之理非一日也且宿衛空闕兵甲寡弱陛下何所資用而一旦如此無乃欲除疾而更深之邪禍殆不測宜見重詳帝乃出懐中黄素詔投地曰行之决矣正使死何懼况不必死邪於是入白太后沈業犇走告昭呼經欲與俱經不從帝遂拔劒升輦率殿中宿衛蒼頭官僮鼓譟而出昭弟屯騎校尉伷遇帝於東止車門左右呵之伷衆犇走中護軍賈充自外入逆與帝戰於南闕下帝自用劒衆欲退騎督成倅弟太子舍人濟問充曰事急矣當云何充曰司馬公畜飬汝等正為今日今日之事無所問也濟即抽戈前刺帝殞于車下昭聞之大驚自投於地太傅孚犇往枕帝股而哭甚哀曰殺陛下者臣之罪也昭入殿中召羣臣㑹議尚書左僕射陳泰不至昭使其舅尚書荀顗召之泰曰世之論者以泰方於舅今舅不如泰也子弟内外咸共逼之乃入見昭悲慟昭亦對之泣曰􅀇伯卿何以處我泰曰獨有斬賈充少可以謝天下耳昭久之曰卿更思其次泰曰泰言惟有進於此不知其次昭乃不復更言顗彧之子也太后下令罪狀髙貴鄉公廢為庶人葬以民禮收王經及其家屬付廷尉經謝其母母顏色不變笑而應曰人誰不死正恐不得其所以此并命何恨之有及就誅故吏向雄哭之哀動一市王沈以功封安平侯庚寅太傅孚等上言請以王禮葬髙貴鄉公太后許之使中護軍司馬炎迎燕王宇之子常道鄉公璜於鄴以為明帝嗣炎昭之子也癸卯司馬昭固讓相國晉公九錫之命太后詔許之戊申昭上言成濟兄弟大逆不道夷其族六月癸丑太后詔常道鄉公更名奐甲寅常道鄉公入洛陽是日即皇帝位年十五大赦改元丙辰詔進司馬昭爵位九錫如前昭固讓乃止二年秋八月甲寅復命司馬昭進爵位如前不受四年春二月復命司馬昭進爵位如前又辭不受冬十月復命大將軍昭進位爵賜一如前詔昭乃受命昭辟任城魏舒為相國参軍咸熙元年春三月己卯進晉公爵為王増封十郡王祥何曽荀顗共詣晉王顗謂祥曰相王增重何侯與一朝之臣皆已盡敬今日便當相率而拜無所疑也祥曰相國雖尊要是魏之宰相吾等魏之三公王公相去一階而已安有天子三公可輒拜人者損魏朝之望虧晉王之徳君子愛人以禮我不為也及入顗遂拜而祥獨長揖王謂祥曰今日然後知君見顧之重也夏五月癸未追命舞陽文宣侯懿為晉宣王忠武侯師為景王秋八月庚寅命中撫軍司馬炎副貳相國事九月戊午以司馬炎為撫軍大將軍冬十月丙午立炎為世子晉武帝泰始元年夏五月魏帝加文王殊禮進王妃曰后世子曰太子秋八月辛卯文王卒太子嗣為相國晉王戊子以魏司徒何曽為晉丞相癸亥以票騎將軍司馬望為司徒冬十二月壬戌魏帝禪位于晋甲子出舍于金墉城太傅司馬孚拜辭執帝手流涕歔欷不自勝曰臣死之日固大魏之純臣也丙寅王即皇帝位大赦改元丁卯奉魏帝為陳留王即宫于鄴優崇之禮皆倣魏初故事魏氏諸王皆降為侯追尊宣王為宣皇帝景王為景皇帝文王為文皇帝尊王太后曰皇太后以石苞為大司馬鄭沖為太傅王祥為太保何曽為太尉賈充為車騎將軍王沈為票騎將軍其餘文武増位進爵有差詔除魏宗室禁錮初置諌官以散騎常侍傅􅀇皇甫陶為之􅀇幹之子也􅀇以魏末士風頽敝上䟽曰臣聞先王之御天下教化隆於上清議行於下近者魏武好灋術而天下貴刑名魏文慕通達而天下賤守節其後綱維不攝放誕盈朝遂使天下無復清議陛下龍興受禪􅀪堯舜之化惟未舉清逺有禮之臣以敦風節未退虚鄙之士以懲不恪臣是以猶敢有言上嘉納其言使􅀇草詔進之然亦不能革也二年春正月丁亥即用魏廟祭征西府君以下并景帝凡七室秋九月戊戌有司奏大晉受禪於魏宜一用前代正朔服色如虞遵唐故事從之八年春二月壬辰安平獻王孚卒年九十三孚性忠慎宣帝執政孚常自退損後逢廢立之際未嘗預謀景文二帝以孚屬尊亦不敢逼及帝即位恩禮尤重元㑹詔孚乗輿上殿帝於阼階迎拜既坐親奉觴上夀如家人禮帝毎拜孚跪而止之孚雖見尊寵不以爲榮常有憂色臨終遺令曰有魏貞士河内司馬孚字叔達不伊不周不夷不惠立身行道終始若一當衣以時服歛以素棺詔賜東園温明祕器諸所施行皆依漢東平獻王故事其家遵孚遺㫖所給器物一不施用十年邵陵厲公曹芳卒初芳之廢遷金墉也太宰中郎陳留范粲素服拜送哀動左右遂稱疾不出陽狂不言寢所乗車足不履地子孫有婚宦大事輒宻諮焉合者則色無變不合則眠寢不安妻子以此知其㫖子喬等三人竝棄學業絶人事侍疾家庭足不出邑里及帝即位詔以二千石禄飬病加賜帛百匹喬以父疾篤辭不敢受粲不言凡三十六年年八十四終於所寢之車惠帝太安元年陳留王薨諡曰魏元皇帝晉滅呉魏元帝景元三年冬十月呉主以濮陽興為丞相廷尉丁宻光禄勲孟宗為左右御史大夫初興為㑹稽太守呉主在㑹稽興遇之厚左將軍張布嘗為㑹稽王左右督將故呉主即位二人皆貴寵用事布典宫省興闗軍國以佞巧更相表裏呉人失望咸熙元年秋七月吴主寢疾口不能言乃手書呼丞相濮陽興入令子􅓣出拜之休把興臂指􅓣以托之癸未呉主殂諡曰景帝羣臣尊朱后為皇太后呉人以蜀初亡交趾攜叛國内恐懼欲得長君左典軍萬彧嘗為烏程令與烏程侯皓相善稱皓才識明斷長沙桓王之疇也又加之好學奉遵法度屢言之於丞相興左將軍布興布說朱太后欲以皓為嗣朱后曰我寡婦人安知社稷之慮苟呉國無隕宗廟有賴可矣於是遂迎立皓改元元興大赦冬十月丁亥詔以夀春所獲呉相國参軍事徐紹為散騎常侍水曹掾孫彧為給事黄門侍郎以使於呉其家人在此者悉聼自隨不必使還以開廣大信晉王因致書吴主諭以禍福初吴主之立發優詔恤士民開倉廪振貧乏科出宫女以配無妻者禽獸飬於苑中者皆放之當時翕然稱為明主及既得志麤暴驕盈多忌諱好酒色大小失望濮陽興張布竊悔之或譛諸吴主十一月朔興布入朝吴主執之徙於廣州道殺之夷三族晉武帝泰始元年春三月吴主使光禄大夫紀陟五官中郎將洪璆與徐紹孫彧偕來報聘紹行至濡須有言紹譽中國之美者吴主怒追還殺之冬吴西陵督歩闡表請吴主徙都武昌吴主從之使御史大夫丁固右將軍諸葛靚守建業二年春三月吴主大㑹羣臣廬江王蕃沈醉頓伏吴主疑其詐轝蕃出外頃之召還蕃行止自若吴主大怒斬之五官中郎將丁忠說吴主曰北方無守戰之備弋陽可襲而取吴主以問羣臣鎮西大將軍陸凱曰北方新并巴蜀遣使求和非求援於我也欲蓄力以俟時耳敵埶方彊而欲徼幸求勝未見其利也吴主雖不出兵然遂與晉絶秋八月吴主以陸凱為左丞相萬彧為右丞相吴主惡人視已羣臣侍見莫敢舉目陸凱曰君臣無不相識之道若猝有不虞不知所赴吴主乃聼凱自視而它人如故吴主居武昌揚州之民泝流供給甚苦之又奢侈無度公私窮匱凱上䟽曰今四邊無事當務飬民豐財而更窮奢極欲無災而民命盡無為而國財空臣竊痛之昔漢室既衰三家鼎立今曹劉失道皆為晉有此目前之明驗也臣愚但為陛下惜國家耳武昌土地危險塉确非王者之都且童謠曰寧飲建業水不食武昌魚寧還建業死不止武昌居以此觀之足明民心與天意矣今國無一年之蓄民有離散之怨國有露根之漸而官吏務為苛急莫之或恤大帝時後宫列女及諸織絡數不滿百景帝以來乃有千數此耗財之甚者也又左右之臣率非其人羣黨相扶害忠隠賢此皆蠧政病民者也臣願陛下省息百役罷去苛擾科出宫女清選百官則天悦民附國家永安矣吴主雖不悦以其宿望特優容之冬十二月吴主使黄門徧行州郡科取將吏家女其二千石大臣子女皆歳歳言名年十五六一簡閲簡閲不中乃得出嫁後宫以千數而採擇無已三年夏六月吴主作昭明宫二千石以下皆自入山督伐木大開苑囿起土山樓觀窮極伎巧功役之費以億萬計陸凱諌不聽中書丞華覈上䟽曰漢文之世九州晏然賈誼獨以為如抱火厝於積薪之下而寢其上今大敵據九州之地有太半之衆欲與國家為相吞之計非徒漢之淮南濟北而已也比於賈誼之世孰為緩急今倉庫空匱編户失業而北方積榖飬民專心東向又交趾淪没嶺表動搖胷背有嫌首尾多難乃國朝之厄㑹也若舍此急務盡力功作卒有風塵不虞之變當委版築而應烽燧驅怨民而赴白刃此乃大敵所因以為資者也時吴俗奢侈覈又上䟽曰今事多而役繁民貧而俗奢百工作無用之器婦人為綺靡之飾轉相倣效恥獨無有兵民之家猶復逐俗内無甔石之儲而出有綾綺之服上無尊卑等級之差下有耗財費力之損求其富給庸可得乎吴主皆不聼五年春二月帝有滅吴之志壬寅以尚書左僕射羊祜都督荆州諸軍事鎮襄陽征東大將軍衛瓘都督青州諸軍事鎮臨淄鎮東大將軍東莞王伷都督徐州諸軍事鎮下邳祜綏懐逺近甚得江漢之心與吴人開布大信降者欲去皆之減戍邏之卒以墾田八百餘頃其始至也軍無百日之糧及其季年乃有十年之積祜在軍常輕裘緩帶身不被甲鈴閤之下侍衛不過十數人初汝南何定嘗為吴大帝給使及吴主即位自表先帝舊人求還内侍吴主以為樓下都尉典知酤糴事遂專為威福吴主信任之委以衆事左丞相陸凱面責定曰卿見前後事主不忠傾亂國政寧有得以夀終者邪何以專為姦邪塵穢天聽宜自改厲不然方見卿有不測之禍定大恨之凱竭心公家忠懇内發表䟽皆指事不飾及疾病吴主遣中書令董朝問所欲言凱陳何定不可信用宜授以外任奚熙小吏建起浦里田亦不可聼姚信樓􅀇賀邵張悌郭連薛瑩滕脩及族弟喜抗或清白忠勤或資才卓茂皆社稷之良輔願陛下重留神思訪以時務使各盡其忠拾遺萬一邵齊之孫瑩綜之子􅀇沛人脩南陽人也凱尋卒吴主素銜其切直且日聞何定之譛乆之竟徙凱家於建安六年夏四月吴左大司馬施績卒以鎮軍大將軍陸抗都督信陵西陵夷道樂鄉公安諸軍事治樂郷抗以吴主政事多闕上疏曰臣聞徳均則衆者勝寡力侔則安者制危此六國所以并於秦西楚所以屈於漢也今敵之所據非特闗右之地鴻溝以西而國家外無連衡之援内非西楚之彊庶政陵遲黎民未乂議者所恃徒以長江峻山限帶封域此乃守國之末事非智者之所先也臣毎念及此中夜撫枕臨餐忘食夫事君之義犯而勿欺謹陳時宜十七條以聞吴主不納吴主遣監軍李朂督軍徐存從建安海道擊交阯朂以建安道不利殺導將馮斐引軍還初何定嘗為子求婚於朂朂不計乃白朂枉殺馮斐擅徹軍還誅朂及徐存并其家屬仍焚朂尸定又使諸將各上御犬一犬至直縑數十匹纓紲直錢一萬以捕􅈷供􅌮吴人皆歸罪於定而吴主以為忠勤賜爵列侯陸抗上䟽曰小人不明理道所見既淺雖使竭情盡節猶不足任況其姦心素篤而憎愛移易哉吴主不從冬十一月吴主從弟前將軍秀為夏口督吴主惡之民間皆言秀當見圗㑹吴主遣何定將兵五千人獵夏口秀驚夜將妻子親兵數百人來犇十二月拜秀票騎將軍開府儀同三司封㑹稽公七年春正月吴人刁􅀇詐増䜟文云黄旗紫蓋見於東南終有天下者荆揚之君吴主信之是月晦大舉兵出華里載太后皇后及後宫數千人從牛渚西上東觀令華覈等固諌不聼行遇大雪道塗陷壊兵士被甲持仗百人共引一車寒涷殆死皆曰若遇敵便當倒戈吴主聞之乃還帝遣義陽王望統中軍二萬騎三千屯夀春以備之聞吴師退乃罷八年初廣漢太守􅀪農王濬為羊祜参軍祜深知之祜兄子暨白濬為人志大奢侈不可專任宜有以裁之祜曰濬有大才將以濟其所欲必可用也更轉為車騎從事中郎濬在益州明立威信蠻夷多歸附之俄遷大司農時帝與羊祜隂謀伐吴祜以為伐吴宜藉上流之埶宻表留王濬復為益州刺史使治水軍尋加龍驤將軍監益梁諸軍事詔濬罷屯田兵大作舟艦别駕何攀以為屯田兵不過五六百人作船不能猝辦後者未成前者已腐宜召諸郡兵合萬餘人造之歳終可成濬欲先上須報攀曰朝廷猝聞召萬兵必不聽不如輒召設當見却功夫已成埶不得止濬從之令攀典造船艦器仗於是作大艦長百二十歩受二千餘人以木為城起樓櫓開四出門其上皆得馳馬往來時作舩木柹蔽江而下吴建平大守吴郡吾彦取流柹以白吴主曰晉必有攻吴之計宜増建平兵以塞其衝要吴主不從彦乃為鐵鎻横㫁江路秋八月吴主徴昭武將軍西陵督歩闡闡世在西陵猝被徴自以失職且懼有䜛九月據城來降冬十月吴陸抗聞歩闡叛亟遣將軍左奕吾彦等討之帝遣荆州刺史楊肇迎闡於西陵車騎將軍羊祜帥歩軍出江陵巴東監軍徐胤帥水軍擊建平以救闡陸抗敕西陵諸軍築嚴圍自赤谿至于故市内以圍闡外以禦晉兵晝夜催切如敵已至衆甚苦之諸將諌曰今宜及三軍之銳急攻闡比晉救至必可抜也何事於圍以敝士民之力抗曰此城處勢既固糧榖又足且凡備禦之具皆抗所宿規今反攻之不可猝抜北兵至而無備表裏受難何以禦之諸將皆欲攻闡抗欲服衆心聽令一攻果無利圍備始合而羊祜兵五萬至江陵諸將咸以抗不宜上抗曰江陵城固兵足無可憂者假令敵得江陵必不能守所損者小若晉據西陵則南山羣夷皆當擾動其患不可量也乃自帥衆赴西陵初抗以江陵之北道路平易敕江陵督張咸作大堰遏水漸漬平土以絶冦叛羊祜欲因所遏水以船運糧揚聲將破堰以通歩軍抗聞之使咸亟破之諸將皆惑屢諌不聼祜至當陽聞堰敗乃改船以車運糧大費功力十一月楊肇至西陵陸抗令公安督孫遵循南岸禦羊祜水軍督留慮拒徐胤抗自將大軍憑圍對肇將軍朱喬營都督俞賛亡詣肇抗曰賛軍中舊吏知吾虚實吾常慮夷兵素不簡練若敵攻圍必先此處即夜易夷兵皆以精兵守之明日肇果攻故夷兵處抗命擊之矢石􅀨下肇衆傷死者相屬十二月肇計屈夜遁抗欲追之而慮歩闡畜力伺間兵不足分於是但鳴鼓戒衆若將追者肇衆匈懼悉解甲挺走抗使輕兵躡之肇兵大敗祜等皆引軍還抗遂㧞西陵誅闡及同謀將吏數十人皆夷三族自餘所請赦者數萬口東還樂鄉貎無矜色謙沖如常吴主加抗都護羊祜坐貶平南將軍楊肇免為庻人吴主既克西陵自謂得天助志益張大使術士尚廣筮取天下對曰吉庚子歳青蓋當入洛陽吴主喜不脩徳政專為兼并之計吴主之游華里也右丞相萬彧與右大司馬丁奉左將軍留平宻謀曰若至華里不歸社稷事重不得不自還吴主頗聞之以彧等舊臣隠忍不發是歳吴主因㑹以毒酒飲彧傳酒人私減之又飲留平平覺之服他藥以解得不死彧自殺平憂懣月餘亦死徙彧子弟於廬陵􅀄彧請選忠清之士以補近職吴主以大司農樓􅀇為宫下鎮主殿中事􅀇正身帥衆奉灋而行應對切直吴主浸不悦中書令領太子太傅賀邵上䟽諌曰自頃年以來朝列紛錯眞偽相貿忠良排墜信臣被害是以正士摧方而庸臣茍媚先意承指各希時趣人執反理之評士吐詭道之論遂使清流變濁忠臣結舌陛下處九天之上隱百里之室言出風靡令行景從親洽寵媚之臣日聞順意之辭將謂此輩實賢而天下已平也臣聞興國之君樂聞其過􅂽亂之主樂聞其譽聞其過者過日消而福臻聞其譽者譽日損而禍至陛下嚴刑灋以禁直辭黜善士以逆諌口杯酒造次死生不保仕者以退為幸居者以出為福誠非所以保光洪緒熙隆道化也何定本僕􅀠小人身無行能而陛下愛其佞媚假以威福夫小人求入必進姦利定間者妄興事役發江邊戍兵以驅麋鹿老弱飢凍大小怨歎傳曰國之興也視民如赤子其亡也以民為草芥今灋禁轉苛賦調益繁中官近臣所在興事而長吏畏罪苦民求辦是以人力不堪家户離散呼嗟之聲感傷和氣今國無一年之儲家無經月之畜而後宫之中坐食者萬有餘人又北敵注目伺國盛衰長江之限不可乆恃苟我不能守一葦可杭也願陛下豐基彊本割情從道則成康之治興聖祖之祚隆矣吴主深恨之於是左右共誣樓􅀇賀邵相逢駐共耳語大笑謗訕政事俱被詰責羊祜歸自江陵務修徳信以懐吴人毎交兵刻日方戰不為掩襲之計將帥有欲進譎計者輒飲以醇酒使不得言祜出軍行吴境刈榖為糧皆計所侵送絹償之毎會衆江􅃆遊獵常止晉地若禽獸先為吴人所傷而為晉兵所得者皆送還之於是吴邊人皆悦服祜與陸抗對境使命常通抗遺祜酒祜飲之不疑抗疾求藥於祜祜以成藥與之抗即服之人多諫抗抗曰豈有酖人羊叔子哉抗告其邊戍曰彼專爲徳我專爲􅍊是不戰而自服也各保分界而已無求細利吴主聞二境交和以詰抗抗曰一邑一鄉不可以無信義况大國乎臣不如此正是彰其徳於祜無傷也吴主用諸將之謀數侵盜晉邉陸抗上䟽曰昔有夏多罪而殷湯用師紂作淫虐而周武授􅃏苟無其時雖復大聖亦宜飬威自保不可輕動也今不務力農富國審官任能明黜陟慎刑賞訓諸司以徳撫百姓以仁而聽諸將徇名窮兵黷武動費萬計士卒彫瘁寇不為衰而我已大病矣今争帝王之資而昧十百之利此人臣之姦便非國家之良䇿也昔齊魯三戰魯人再克而亡不旋踵何則大小之埶異也況今師所克獲不􅀘所喪哉吴主不從九年春三月吴以陸抗為大司馬荆州牧十年秋七月吴大司馬陸抗疾病上䟽曰西陵建平國之蕃表既處上流受敵二境若敵汎舟順流星犇電邁非可恃援他部以救倒縣也此乃社稷安危之機非徒封疆侵陵小害也臣父遜昔在西垂上言西陵國之西門雖云易守亦復易失若有不守非但失一郡荆州非吴有也如其有虞當傾國争之臣前乞屯精兵三萬而主者循常未肯差赴自歩闡以後益更損耗今臣所統千里外禦彊對内懐百蠻而上下見兵財有數萬羸敝日乆難以待變臣愚以為諸王㓜沖無用兵馬以妨要務又黄門宦官開立占募兵民避役逋逃入占乞特詔簡閲一切科出以􅀘疆􅂣受敵常處使臣所部足滿八萬省息衆務并力備禦庶幾無虞若其不然深可憂也臣死之後乞以西方為屬及卒吴使其子晏景􅀇機雲分將其兵咸寧二年秋七月吴人或言於吴主曰臨平湖自漢末薉塞長老言此湖塞天下亂此湖開天下平近無故忽更開通此天下當太平青蓋入洛之祥也吴主以問奉禁都尉厯陽陳訓對曰臣止能望氣不能達湖之開塞退而告其友曰青蓋入洛者將有御璧之事非吉祥也冬十月以羊祜為征南大將軍祜上䟽請伐吴曰先帝西平巴蜀南和吴㑹庶幾海内得以休息而吴復背信使邊事更興夫期運雖天所授而功業必因人而成不一大舉掃滅則兵役無時得息也蜀平之時天下皆謂吴當并亡自是以來十有三年矣夫謀之雖多決之欲獨凡以險阻得全者謂其埶均力敵耳若輕重不齊彊弱異埶雖有險阻不可保也蜀之為國非不險也皆云一夫荷㦸千人莫當及進兵之日曽無藩籬之限乘勝席卷徑至成都漢中諸城皆烏栖而不敢出非無戰心誠力不足以相抗也及劉禪請降諸營堡索然俱散今江淮之險不如劒閣孫皓之㬥過於劉禪吴人之困甚於巴蜀而大晉兵力盛於往時不於此際平壹四海而更阻兵相守使天下困於征戍經厯盛衰不可長乆也今若引梁益之兵水陸俱下荆楚之衆進臨江陵平南豫州直指夏口徐揚青兖並㑹秣陵以一隅之吴當天下之衆埶分形散所備皆急巴漢竒兵出其空虚一處傾壊則上下震蕩雖有智者不能為吴謀矣吴縁江為國東西數千里所敵者大無有寧息孫皓恣情任意與下多忌將疑於朝士困於野無有保世之計一定之心平常之日猶懐去就兵臨之際必有應者終不能齊力致死已可知也其俗急速不能持乆弓弩㦸楯不如中國唯有水戰是其所便一入其境則長江非復所保還趣城池去長入短非吾敵也官軍縣進人有致死之志吴人内顧各有離散之心如此軍不踰時克可必矣帝深納之而朝議方以秦凉為憂祜復表曰吴平則胡自定但當速濟大功耳議者多有不同賈充荀朂馮紞尤以伐吴為不可祜難曰天下不如意事十常居七八天與不取豈非更事者恨於後時哉唯度支尚書杜預中書令張華與帝意合賛成其計三年夏五月吴將邵顗夏祥帥衆七千餘人來降冬十二月吴夏口督孫慎入江夏汝南略千餘家而去詔遣侍臣詰羊祜不追討之意并欲移荆州祜曰江夏去襄陽八百里比知賊問賊已去經日歩軍安能追之勞師以免責非臣志也昔魏武帝置都督類皆與州相近以兵埶好合惡離故也疆埸之間一彼一此慎守而已若輒徙州賊出無常亦未知州之所宜據也四年夏六月羊祜以病求入朝既至帝命乘輦入殿不拜而坐祜面陳伐吴之計帝善之以祜病不宜數入更遣張華就問籌䇿祜曰孫皓􅍊虐已甚於今可不戰而克若皓不幸而没吴人更立令主雖有百萬之衆長江未可窺也將為後患矣華深然之祜曰成吾志者子也帝欲使祜臥護諸將祜曰取吴不必臣行但既平之後當勞聖慮耳功名之際臣不敢居若事了當有所付授願審擇其人也冬十月吴人大佃皖城欲謀入寇都督揚州諸軍事王渾遣揚州刺史應綽攻破之斬首五千級焚其積榖百八十餘萬斛踐稻苗四千餘頃毁船六百餘艘十一月羊祜疾篤舉杜預自代辛卯以預為鎮南大將軍都督荆州諸軍事祜卒帝哭之甚哀南州民聞祜卒為之罷市巷哭聲相接吴守邊將士亦為之泣祜好逰峴山襄陽人建碑立廟於其地歳時祭祀望其碑者無不流涕因謂之墮涙碑杜預至鎮簡精鋭襲吴西陵督張政大破之政吴之名將也恥以無備取敗不以實告吴主預欲間之乃表還其所獲吴主果召政還遣武昌監留憲代之五年吴主毎宴羣臣咸令沈醉又置黄門郎十人為司過宴罷之後各奏具闕失迕視謬言罔有不舉大者即加刑戮小者記録為罪或剝人面或鑿人眼由是上下離心莫為盡力益州刺史王濬上䟽曰孫皓荒淫凶逆宜速征伐若一旦皓死更立賢主則彊敵也臣作船七年日有朽敗臣年七十死亡無日三者一乖則難圗也誠願陛下無失事機帝於是決意伐吴㑹安東將軍王渾表孫皓欲北上邉戍皆戒嚴朝廷乃更議明年出師王濬參軍何攀奉使在洛上䟽稱皓必不敢出宜因戒嚴掩取甚易杜預上表曰自閏月以來賊但敕嚴下無兵上以理埶推之賊之窮計力不兩完必保夏口以東以延視息無縁多兵西上空其國都而陛下過聼便用委棄大計縱敵患生誠可惜也嚮使舉而有敗勿舉可也今事為之制務從完牢若或有成則開太平之基不成不過費損日月之間何惜而不一試之若當須後年天時人事不得如常臣恐其更難也今有萬安之舉無傾敗之慮臣心實了不敢以曖昧之見自取後累惟陛下察之旬月未報預復上表曰羊祜不先博謀於朝臣而宻與陛下共施此計故益令朝臣多異同之議凡事當以利害相校今此舉之利十有八九而其害一二止於無功耳必使朝臣言破敗之形亦不可得直是計不出己功不在身各恥其前言之失而固守之也自頃朝廷事無大小異意鋒起雖人心不同亦由恃恩不慮後患故輕相同異也自秋已來討賊之形頗露今若中止孫皓或怖而生計徙都武昌更完脩江南諸城逺其居民城不可攻野無所掠則明年之計或無所及矣帝方與張華圍碁預表適至華推枰斂手曰陛下聖武國富兵彊吴主淫虐誅殺賢能當今討之可不勞而定願勿以為疑帝乃許之以華為度支尚書量計運漕賈充荀朂馮紞固争之帝大怒充免冠謝罪僕射山濤退而告人曰自非聖人外寧必有内憂今釋吴為外懼豈非筭乎冬十一月大舉伐吴遣鎮軍將軍琅邪王伷出涂中安東將軍王渾出江西建威將軍王戎出武昌平南將軍胡奮出夏口鎮南大將軍杜預出江陵龍驤將軍王濬巴東監軍魯國唐彬下巴蜀東西凡二十餘萬命賈充為使持節假黄􅃏大都督以冠軍將軍楊濟副之充固陳伐吴不利且自言衰老不堪元帥之任詔曰君若不行吾便自出充不得已乃受節鉞將中軍南屯襄陽為諸軍節度太康元年春正月杜預向江陵王渾出横江攻吴鎮戍所向皆克二月戊午王濬唐彬擊破丹􅀭監盛紀吴人於江磧要害之處並以鐵鎻横截之又作鐵錐長丈餘暗置江中以逆拒舟艦濬作大筏數十方百餘歩縛草為人被甲持仗令善水者以筏先行遇鐵錐錐輒著筏而去又作大炬長十餘丈大數十圍灌以麻油在船前遇鎻然炬燒之須臾融液斷絶於是船無所礙庚申濬克西陵殺吴都督留憲等壬戌克荆門夷道二城殺夷道監陸晏杜預遣牙門周㫖等帥竒兵八百泛舟夜渡江襲樂鄉多張旗幟起火巴山吴都督孫歆懼與江陵督伍延書曰北來諸軍乃飛渡江也㫖等伏兵樂鄉城外歆遣軍出拒王濬大敗而還㫖等發伏兵隨歆軍而入歆不覺直至帳下虜歆而還乙丑王濬擊殺吴水軍都督陸景杜預進攻江陵甲戌克之斬伍延於是沅湘以南接于交廣州郡皆望風送印綬預仗節稱詔而綏撫之凡所斬獲吴都督監軍十四牙門郡守百二十餘人胡奮克江安乙亥詔王濬唐彬既定巴丘與胡奮王戎共平夏口武昌順流長騖直造秣陵杜預當鎮静零桂懐輯衡陽大兵既過荆州南境固當傳檄而定預等各分兵以益濬彬太尉充移屯項王戎遣參軍襄陽羅尚南陽劉喬將兵與王濬合攻武昌吴江夏太守劉朗督武昌諸軍虞昺皆降昺翻之子也杜預與衆軍㑹議或曰百年之寇未可盡克方春水生難於久駐宜俟來冬更為大舉預曰昔樂毅藉濟西一戰以并彊齊今兵威已振譬如破竹數節之後皆迎刃而解無復著手處也遂指授羣帥方略徑造建業吴主聞王渾南下使丞相悌督丹陽太守沈瑩護軍孫震副軍師諸葛靚帥衆三萬渡江逆戰至牛渚沈瑩曰晉治水軍於蜀乆矣上流諸軍素無戒備名將皆死㓜小當任恐不能禦也晉之水軍必至於此宜蓄衆力以待其來與之一戰若幸而勝之江西自清今渡江與晉大軍戰不幸而敗則大事去矣悌曰吴之將亡賢愚所知非今日也吾恐蜀兵至此衆心駭懼不可復整及今渡江猶可决戰若其敗喪同死社稷無所復恨若其克㨗北敵犇走兵埶萬倍便當乘勝南上逆之中道不憂不破也若如子計恐士衆散盡坐待敵到君臣俱降無復一人死難者不亦辱乎三月悌等濟江圍渾部將城陽都尉張喬於楊荷喬衆纔七千閉柵請降諸葛靚欲屠之悌曰彊敵在前不宜先事其小且殺降不祥靚曰此屬以救兵未至力少不敵故且偽降以緩我非真伏也若捨之而前必為後患悌不從撫之而進悌與楊州刺史汝南周浚結陳相對沈瑩帥丹陽鋭卒刀楯五千三衝晉兵不動瑩引退其衆亂將軍薛勝蔣班因其亂而乘之吴兵以次犇潰將帥不能止張喬自後擊之大敗吴兵于版橋諸葛靚帥數百人遁去使過迎張悌悌不肯去靚自往牽之曰存亡自有大數非卿一人所支奈何故自取死悌垂涕曰仲思今日是我死日也且我為兒童時便為卿家丞相所識抜常恐不得其死負名賢知顧今以身徇社稷復何道邪靚再三牽之不動乃流淚放去行百餘歩顧之已為晉兵所殺并斬孫震沈瑩等七千八百級吴人大震初詔書使王濬下建平受杜預節度至建業受王渾節度預至江陵謂諸將曰若濬得建平則順流長驅威名已著不宜令受制於我若不能克則無縁得施節度濬至西陵預與之書曰足下既摧其西藩便當徑取建業討累世之逋冦釋吴人於塗炭振旅還都亦曠世一事也濬大悅表呈預書及張悌敗死揚州别駕何惲謂周浚曰張悌舉全吴精兵殄滅於此吴之朝野莫不震懾今王龍驤既破武昌乘勝東下所向輒克土崩之埶見矣謂宜速引兵渡江直指建業大軍猝至奪其膽氣可不戰禽也浚善其謀使白王渾惲曰渾闇於事機而欲慎已免咎必不我從浚固使白之渾果曰受詔但令屯江北以抗吴軍不使輕進貴州雖武豈能獨平江東乎今者違命勝不足多若其不勝為罪已重且詔令龍驤受我節度但當具君舟檝一時俱濟耳惲曰龍驤克萬里之冦以既成之功來受節度未之聞也且明公為上將見可而進豈得一一須詔令乎今乘此渡江十全必克何疑何慮而淹留不進此鄙州上下所以恨恨也渾不聼王濬自武昌順流徑趣建業吴主遣游擊將軍張象帥舟師萬人禦之象衆望旗而降濬兵甲滿江旌旗燭天威埶甚盛吴人大懼吴主之嬖臣岑昏以傾險諛佞致位九列好興功役為衆患苦及晉兵將至殿中親近數百人叩頭請於吴主曰北軍日近而兵不舉刃陛下將如之何吴主曰何故對曰正坐岑昏耳吴主獨言若爾當以奴謝百姓衆因曰唯遂並起收昏吳主絡驛追止已屠之矣陶濬將討郭馬至武昌聞晉兵大入引兵東還至建業吴主引見問水軍消息對曰蜀船皆小今得二萬兵乘大船以戰自足破之於是合衆授濬節鉞明日當發其夜衆悉逃潰時王渾王濬及琅邪王伷皆臨近境吴司徒何植建威將軍孫晏悉送印節詣渾降吴主用光禄勲薛瑩中書令胡冲等計分遣使者奉書於渾濬伷以請降又遺其羣臣書深自咎責且曰今大晉平治四海是英俊展節之秋勿以移朝改朔用損厥志使者先送璽綬於琅邪王伷壬寅王濬舟師過三山王渾遣信要濬蹔過論事濬舉帆直指建業報曰風利不得泊也是日濬戎卒八萬方舟百里鼓譟入于石頭吴主皓面縳輿櫬詣軍門降濬解縛焚櫬延請相見收其圗籍克州四郡四十三户五十二萬三千兵二十三萬朝廷聞吴已平羣臣皆賀上夀帝執爵流涕曰此羊太傅之功也票騎將軍孫秀不賀南向流涕曰昔討逆弱冠以一校尉創業今後主舉江南而棄之宗廟山陵於此為墟悠悠蒼天此何人哉吴之未下也大臣皆以為未可輕進獨張華堅執以為必克賈充上表稱吴地未可悉定方夏江淮下濕疾疫必起宜召諸軍還以為後圗雖腰斬張華不足以謝天下帝曰此是吾意華但與吾同耳荀朂復奏宜如充表帝不從杜預聞充奏乞罷兵馳表固爭使至轘轅而吴已降充慙懼詣闕請罪帝撫而不問夏四月甲申詔賜孫皓爵歸命侯乙酉大赦改元大酺五日遣使者分詣荆揚撫慰吴牧守已下皆不更易除其苛政悉從簡易吴人大悦滕脩討郭馬未克聞晉伐吴帥衆赴難至巴丘聞吴亡縞素流涕還與廣州刺史閭豐蒼捂太守王毅各送印綬請降孫皓遣陶璜之子融持手書諭璜璜流涕數日亦送印綬降帝皆復其本職王濬之東下也吴城戍皆望風降附獨建平太守吾彦嬰城不下聞吴亡乃降帝以彦為金城太守初朝廷尊寵孫秀孫楷欲以招來吴人及吴亡降秀為伏波將軍楷為度遼將軍琅邪王伷遣使送孫皓及其宗族詣洛陽五月丁亥朔皓至與其太子瑾等泥頭靣縛詣東陽門詔遣謁者解其縳賜衣服車乘田三十頃歳給錢榖綿絹甚厚拜瑾為中郎諸子為王者皆為郎中吴之舊望隨才擢叙孫氏將吏渡江者復十年百姓復二十年庚寅帝臨軒大㑹文武有位及四方使者國子學生皆預焉引見歸命侯皓及吴降人皓登殿稽顙帝謂皓曰朕設此座以待卿乆矣皓曰臣於南方亦設此座以待陛下賈充謂皓曰聞君在南方鑿人目剥人面皮此何等刑也皓曰人臣有弑其君及姦回不忠者則加此刑耳充黙然甚愧而皓顔色無怍帝從容問散騎常侍薛瑩孫皓所以亡對曰皓昵近小人刑罰放濫大臣諸將人不自保此其所以亡也它日又問吾彦對曰吴主英俊宰輔賢明帝笑曰若是何故亡彦曰天禄永終厯數有屬故為陛下禽耳帝善之王濬之入建業也其明日王渾乃濟江以濬不待已至先受孫皓降意甚愧忿將攻濬何攀勸濬送皓與渾由是事得解何惲以渾與濬争功與周浚牋曰書貴充讓易大謙光前破張悌吴人失氣龍驤因之䧟其區宇論其前後我實緩師既失機㑹不及於事而今方競其功彼既不吞聲將虧雍穆之􅀪興矜争之鄙斯愚情之所不取也浚得牋即諌止渾渾不納表濬違詔不受節度誣以罪狀渾子濟尚常山公主宗黨彊盛有司奏請檻車徵濬帝弗許但以詔書責讓濬以不從渾命違制昧利濬上書自理曰前被詔書令臣直造秣陵又令受太尉充節度臣以十五日至三山見渾軍在北岸遣書邀臣臣水軍風發乘埶徑造賊城無縁廻船過渾臣以日中至秣陵暮乃被渾所下當受節度之符欲令臣明十六日悉將所領還圍石頭又索蜀兵及鎮南諸軍人名定見臣以為皓已來降無縁空圍石頭又兵人定見不可倉猝得就皆非當今之急不可承用非敢忽棄明制也皓衆叛親離匹夫獨坐雀䑕貪生茍乞一活耳而江北諸軍不知虚實不早縛取自為小誤臣至便得更見怨恚並云守賊百日而令他人得之臣愚以為事君之道茍利社稷死生以之若其顧嫌疑以避咎責此是人臣不忠之利實非明主社稷之福也渾又騰周浚書云濬軍得吴寳物又云濬牙門將李髙放火燒皓偽宫濬復表曰臣孤根獨立結恨彊宗夫犯上干主其罪可救乖忤貴臣禍在不測偽中郎將孔攄説去二月武昌失守水軍行至皓案行石頭還左右人皆跳刀大呼云要當為陛下一死戰決之皓意大喜謂必能然便盡出金寳以賜與之小人無狀得便持走皓懼乃圖降首降使適去左右劫奪財物略取妻妾放火燒宫皓逃身竄首恐不脫死臣至遣參軍主者救斷其火耳周浚先入皓宫渾又先登皓舟臣之入觀皆在其後皓宫之中乃無席可坐若有遺寳則浚與渾先得之矣浚等云臣屯聚蜀人不時送皓欲有反狀又恐動吴人言臣皆當誅殺取其妻子冀其作亂得騁私忿謀反大逆尚以見加其餘謗􅊱故其宜耳今年平吴誠為大慶於臣之身更受咎累濬至京師有司奏濬違詔大不敬請付廷尉科罪詔不許又奏濬赦後燒賊船百三十五艘輒敕付廷尉禁推詔勿推渾濬爭功不已帝命守廷尉廣陵劉頌校其事以渾為上功濬爲中功帝以頌折灋失理左遷京兆太守庚辰増賈充邑八千户以王濬爲輔國大將軍封襄陽縣侯杜預為當陽縣侯王戎爲安豐縣侯封琅邪王伷二子為亭侯増京陵侯王渾邑八千户進爵為公尚書闗内侯張華進封廣武縣侯増邑萬户荀朂以専典詔命功封一子為亭侯其餘諸將及公卿以下賞賜各有差帝以平吴䇿告羊祜廟乃封其夫人夏侯氏為萬歳鄉君食邑五千户王濬自以功大而為渾父子及黨與所挫抑每進見陳其攻伐之勞及見枉之狀或不勝忿憤徑出不辭帝每容恕之益州護軍范通謂濬曰卿功則羙矣然恨所以居羙者未盡善也卿旋斾之日角巾私第口不言平吴之事若有問者輒曰聖主之徳羣帥之力老夫何力之有此藺生所以屈廉頗也王渾能無愧乎濬曰吾始懲鄧艾之事懼禍及身不得無言其終不能遣諸胷中是吾􅄶也時人咸以濬功重報輕為之憤邑博士秦秀等並上表訟濬之屈帝乃遷濬鎮軍大將軍王渾嘗詣濬濬嚴設備衛然後見之杜預還襄陽以為天下雖安忘戰必危乃勤於講武申嚴戍守又引滍淯水以浸田萬餘頃開揚口通零桂之漕公私賴之預身不跨馬射不穿札而用兵制勝諸將莫及預在鎮數餉遺洛中貴要或問其故預曰吾但恐為害不求益也王渾遷征東大將軍復鎮夀陽諸葛靚逃竄不出帝與靚有舊靚姊為琅邪王妃帝知靚在姊間因就見焉靚逃于厠帝又逼見之謂曰不謂今日復得相見靚流涕曰臣不能􅃮身皮面復覩聖顔誠為慙恨詔以為侍中固辭不拜歸于鄉里終身不向朝廷而坐羌胡之叛齊萬年樹機能晉武帝泰始五年春二月分雍涼梁州置秦州以胡烈為刺史先是鄧艾納鮮卑降者數萬置於雍凉之間與民雜居朝廷恐其乆而為患以烈素著名於西方故使鎮撫之六年夏六月戊午胡烈討鮮卑秃髪樹機能於萬斛堆兵敗被殺都督雍凉州諸軍事扶風王亮遣將軍劉旂救之旂觀望不進亮坐貶為平西將軍旂當斬亮上言節度之咎由亮而出乞丏旂死詔曰若罪不在旂當有所在乃免亮官遣尚書樂陵石鑒行安西將軍都督秦州諸軍事討樹機能樹機能兵盛鑒使秦州刺史杜預出兵撃之預以虜乘勝馬肥而官軍縣乏宜并力大運芻糧湏春進討鑑奏預稽乏軍興檻車徴詣廷尉以贖論既而鑒討樹機能卒不能克七年夏四月北地胡冦金城凉州刺史牽􅀪討之衆胡皆内叛與樹機能共圍􅀪於青山􅀪軍敗而死初大司馬陳騫言於帝曰胡烈牽􅀪皆勇而無謀彊於自用非綏邊之材也將為國恥時􅀪為揚州刺史多不承順騫命帝以為騫與􅀪不協而毁之於是徴􅀪既至尋復以為涼州刺史騫􅀼歎息以為必敗二人果失羌戎之和兵敗身沒征討連年僅而能定帝乃悔之咸寧三年春三月平虜護軍文鴦督涼秦雍州諸軍討樹機能破之諸胡二十萬口來降四年春正月司馬督東平馬隆上言涼州刺史楊欣失羌戎之和必敗夏六月欣與樹機能之黨若羅拔能等戰于武威敗死冬十二月鮮卑樹機能乆為邉患僕射李憙請發兵討之朝議皆以為出兵重事虜不足憂五年春正月樹機能攻䧟涼州帝甚悔之臨朝而歎曰誰能為我討此虜者司馬督馬隆進曰陛下能任臣臣能平之帝曰必能平賊何為不任顧方略何如耳隆曰臣願募勇士三千人無問所從來帥之以西虜不足平也帝許之乙丑以隆為討虜護軍武威太守公卿皆曰見兵已多不宜横設賞募隆小將妄言不足信也帝不聼隆募能引弓四鈞挽弩九石者取之立標簡試自旦至日中得三千五百人隆曰足矣又請自至武庫選仗武庫令與隆忿争御史中丞劾奏隆隆曰臣當畢命戰場武庫令乃給以魏時朽仗非陛下所以使臣之意也帝命惟隆所取仍給三年軍資而遣之十一月馬隆西度温水樹機能等以衆數萬據險拒之隆以山路陿隘乃作扁箱車為木屋施於車上轉戰而前行千餘里殺傷甚衆自隆之西音問㫁絶朝廷憂之或謂已沒後隆使夜到帝撫掌歡笑詰朝召羣臣謂曰若從諸卿言無涼州矣乃詔假隆節拜宣威將軍隆至武威鮮卑大人猝跋韓且萬能等帥萬餘落來降十二月隆與樹機能大戰斬之涼州遂平太康元年漢魏以來羌胡鮮卑降者多處之塞内諸郡其後數因忿恨殺害長吏漸為民患侍御史西河郭欽上䟽曰戎狄彊獷厯古爲患魏初民少西北諸郡皆為戎居内及京兆魏郡􅀪農往往有之今雖服從若百年之後有風塵之警胡騎自平陽上黨不三日而至孟津北地西河太原馮翊安定上郡盡為狄庭矣宜及平吴之威謀臣猛將之略漸徙内郡雜胡於邊地峻四夷出入之防明先王荒服之制此萬世之長䇿也帝不聼惠帝元康四年夏五月匈奴郝散反攻上黨殺長吏秋八月郝散帥衆降馮翊都尉殺之六年夏郝散弟度元與馮翊北地馬蘭羌盧水胡俱反殺北地太守張損敗馮翊太守歐陽建征西大將軍趙王倫與雍州刺史濟南解系争軍事更相表奏朝廷以梁王肜為征西大將軍都督雍涼二州諸軍事秋八月解系為郝度元所敗秦雍氐羌悉反立氐帥齊萬年為帝圍涇陽御史中丞周處彈劾不避權戚梁王彤嘗違灋處按劾之冬十一月詔以處為建威將軍與振威將軍盧播俱􅀠安西將軍夏侯駿以討齊萬年中書令陳凖言於朝曰駿及梁王皆貴戚非將帥之才進不求名退不畏罪周處吴人忠直勇果有仇無援宜詔積弩將軍孟觀以精兵萬人為處前鋒必能殄冦不然梁王當使處先驅而不救以䧟之其敗必也朝廷不從齊萬年聞處來曰周府君嘗為新平太守有文武才若專斷而來不可當也或受制於乆此成禽耳七年春正月齊萬年屯梁山有衆七萬梁王彤夏侯駿使周處以五千兵擊之處曰軍無後繼必敗不徒亡身爲國取恥彤駿不聼逼遣之癸丑處與盧播解系攻萬年於六陌處軍士未食肜促令速進自旦戰至暮斬獲甚衆􅁌絶矢盡救兵不至左右勸處退處按劒曰是吾効節致命之日也遂力戰而死朝廷雖以尤肜而亦不能罪也八年秋九月張華陳凖以趙王梁王相繼在闗中皆雍容驕貴師老無功乃薦孟觀沈毅有文武材用使討齊萬年觀身當矢石大戰十數皆破之九年春正月孟觀大破氐衆於中亭獲齊萬年太子洗馬陳留江統以為戎狄亂華宜早絶其原乃作徙戎論以警朝廷曰夫夷蠻戎狄地在要荒禹平九土而西戎即叙其性氣貪婪凶悍不仁四夷之中戎狄為甚弱則畏服彊則侵叛當其彊也以漢之髙祖困於白登孝文軍於霸上及其弱也以元成之微而單于入朝此其已然之效也是以有道之君牧夷狄也惟以待之有備禦之有常雖稽顙執贄而邊城不弛固守彊㬥為冦而兵甲不加逺征期令境内獲安疆場不侵而已及至周室失統諸侯專征封疆不固而利害異心戎狄乗間得入中國或招誘安撫以為已用自是四夷交侵與中國錯居及秦始皇并天下兵威旁達攘胡走越當是時中國無復四夷也漢建武中馬援領隴西太守討叛羌徙其餘種於闗中居馮翊河東空地數歳之後族類蕃息既恃其􅏂彊且苦漢人侵之永初之元羣羌叛亂覆沒將守屠破城邑鄧隲敗北侵及河内十年之中夷夏俱敝任尚馬賢僅乃克之自此之後餘燼不盡小有際㑹輒復侵叛中世之冦惟此為大魏興之初與蜀分隔疆􅂣之戎一彼一此武帝徙武都氐於秦川欲以弱冦彊國扞禦蜀虜此蓋權宜之計非萬世之利也今者當之已受其敝矣夫闗中土沃物豐帝王所居未聞戎狄宜在此土也非我族類其心必異而因其衰敝遷之畿服士庶翫習侮其輕弱使其怨恨之氣毒於骨髓至於蕃育衆盛則坐生其心以貪悍之性挾憤怒之情􅀱隙乘便輒為横逆而居封域之内無障塞之隔掩不備之人收散野之積故能為禍滋蔓㬥害不測此必然之埶已驗之事也當今之宜宜及兵威方盛衆事未罷徙馮翊北地新平安定界内諸羌著先零罕开析支之地徙扶風始平京兆之氐出還隴右著隂平武都之界廪其道路之糧令足自致各附本種反其舊土使屬國撫夷就安集之戎晉不雜並得其所縱有猾夏之心風塵之警則絶逺中國隔閡山河雖爲冦㬥所害不廣矣難者曰氐冦新平闗中饑疫百姓愁苦咸望寧息而欲使疲悴之衆徙自猜之冦恐埶盡力屈緒業不卒前害未及弭而後變復横出矣荅曰子以今者羣氏爲尚挾餘資悔惡反善懐我徳惠而來柔附乎將埶窮道盡智力俱困懼我兵誅以至於此乎曰無有餘力埶窮道盡故也然則我能制其短長之命而令其進退由已矣夫樂其業者不易事安其居者無遷志方其自疑危懼畏怖促遽故可制以兵威使之左右無違也迨其死亡散流離逷未鳩與闗中之人户皆為讎故可遐遷逺處令其心不懐土也夫聖賢之謀事也為之於未有治之於未亂道不著而平德不顯而成其次則能轉禍為福因敗為功值困必濟遇否能通今子遭敝事之終而不圗更制之始愛易轍之勤而遵覆車之軌何哉且闗中之人百餘萬口率其少多戎狄居半處之與遷必須口實若有窮之糝粒不繼者故當傾闗中之榖以全其生生之計必無擠於溝壑而不為侵掠之害也今我遷之傳食而至附其種族自使相贍而秦地之人得其半榖此爲濟行者以廪糧遺居者以積倉寛闗中之逼去盜賊之原除旦夕之損建終年之益若憚蹔舉之小勞而忘永逸之􅀪䇿惜日月之煩苦而遺累世之冦敵非所謂能創業垂統謀及子孫者也并州之胡本實匈奴桀惡之冦也建安中使右賢王去卑誘質呼􅌮泉聼其部落散居六郡咸熙之際以一部太彊分為三率泰始之初又増為四於是劉猛内叛連結外虜近者郝散之變發於榖逺今五部之衆户至數萬人口之盛過於西戎其天性驍勇弓馬便利倍於氐羌若有不虞風塵之慮則并州之域可為寒心正始中母丘儉討句驪徙其餘種於滎陽始徙之時户落百數子孫孳息今以千計數世之後必至殷熾今百姓失職猶或亡叛犬馬肥充則有噬齧況於夷狄能不為變但顧其微弱執力不逮耳夫為邦者憂不在寡而在不安以四海之廣士民之富豈須夷虜在内然後取足哉此等皆可申諭發遣還其本域慰彼覊旅懐土之思釋我華夏􅊏介之憂惠此中國以綏四方徳施永世於計為長也朝廷不能用陳敏之叛晉惠帝太安二年新野莊王歆為政嚴急失蠻夷心義陽蠻張昌聚黨數千人欲為亂荆州以壬午詔書發武勇赴益州討李流號壬午兵民憚逺征皆不欲行詔書督遣嚴急所經之界停留五日者二千石免官由是郡縣官長皆親出驅逐展轉不逺輒復屯聚為羣盜時江夏大稔民就食者數千口張昌因之誑惑百姓更姓名曰李辰募衆於安陸石巖山諸流民及避戍役者多往從之太守弓欽遣兵討之不勝昌遂攻郡欽兵敗與部將朱伺犇武昌歆遣騎督靳滿討之滿復敗走昌遂據江夏造妖言云當有聖人出為民主得山都縣吏丘沈更其姓名曰劉尼詐云漢後奉以為天子曰此聖人也昌自為相國詐作鳯皇玉璽之瑞建元神鳯郊祀服色悉依漢故事有不應募者族誅之士民莫敢不從又流言云江淮已南皆反官軍大起當悉誅之互相扇動人情惶懼江沔間所在起兵以應昌旬月間衆至三萬皆著絳帽以馬尾作髯詔遣監軍華宏討之敗于障山歆上言妖賊犬羊萬計絳頭毛面挑刀走㦸其鋒不可當請臺敕諸軍三道救助朝廷以屯騎校尉劉喬為豫州刺史寧朔將軍沛國劉􅀪為荆州刺史又詔河間王顒遣雍州刺史劉沈將州兵萬人并征西府五千人出藍田闗以討昌顒不奉詔沈自領州兵至藍田顒又逼奪其衆於是劉喬屯汝南劉􅀪及前將軍趙驤平南將軍羊伊屯宛昌遣其將黄林帥二萬人向豫州劉喬擊却之昌至樊城歆出拒之衆潰為昌所殺詔以劉􅀪代歆為鎮南將軍都督荆州諸軍事秋七月張昌黨石冰冦揚州敗刺史陳徽諸郡盡沒又攻破江州别將陳貞等攻武陵零陵豫章武昌長沙皆䧟之臨淮人封雲起兵冦徐州以應冰於是荆江揚豫徐五州之境多為昌所據昌更置牧守皆桀盜小人專以劫掠為務劉􅀪遣陶侃等攻昌於竟陵劉喬遣其將李楊等向江夏侃等屢與昌戰大破之前後斬首數萬級昌逃于下儁山其衆悉降冬十二月議郎周玘前南平内史長沙王矩起兵江東以討石冰推前吴興太守吳郡顧祕都督揚州九郡諸軍事傳檄州郡殺冰所署將吏於是前侍御史賀循起兵於㑹稽廬江内史廣陵華譚及丹陽葛洪甘卓皆起兵以應祕玘處之子循邵之子卓寧之曽孫也冰遣其將羌毒帥兵數萬拒玘玘擊斬之冰自臨淮退趨夀春征東將軍劉凖聞冰至惶懼不知所為廣陵度支廬江陳敏統衆在夀春謂凖曰此等本不樂逺戍逼廹成賊烏合之衆其埶易離敏請督帥運兵為公破之凖乃益敏兵使擊之永興元年二月陳敏與石冰戰數十合冰衆十倍於敏敏擊之所嚮皆㨗遂與周玘合攻氷於建康三月氷北走投封雲雲司馬張統斬氷及雲以降揚徐二州平周玘賀循皆散衆還家不言功賞朝廷以陳敏爲廣陵相秋八月荆州兵擒斬張昌同黨皆夷三族二年初陳敏既克石氷自謂勇略無敵有割據江東之志其父怒曰滅我門者必此兒也遂以憂卒敏以喪去職司空越起敏爲右將軍前鋒都督越爲劉祐所敗敏請東歸收兵遂據厯陽叛吴王常侍甘卓棄官東歸至厯陽敏爲子景娶卓女使卓假稱皇太弟令拜敏揚州刺史敏使弟恢及别將錢端等南略江州弟斌東略諸郡江州刺史應邈揚州刺史劉機丹陽太守王曠皆棄官走敏遂據有江東以顧榮為右將軍賀循為丹揚内史周玘為安豐太守凡江東豪桀名士咸加收禮為將軍郡守者四十餘人或有老疾就加秩命循詐為狂疾得免乃以榮領丹陽内史玘亦稱疾不之郡敏疑諸名士終不為己用欲盡誅之榮説敏曰中國䘮亂胡夷内侮觀今日之埶不能復振百姓將無遺種江南雖經石氷之亂人物尚全榮常憂無孫劉之主有以存之今將軍神武不世勲效已著帶甲數萬舳艫山積若能委信君子使各得盡懐散蔕芥之嫌塞䜛謟之口則上方數州可傳檄而定不然終不濟也敏乃止敏命僚佐推己為都督江東諸軍事大司馬楚公加九錫列上尚書稱被中詔自江入沔漢奉迎鑾駕太宰顒以張光為順陽太守帥歩騎五千詣荆州討敏劉􅀪遣江夏太守陶侃武陵太守苖光屯夏口又遣南平太守汝南應詹督水軍以繼之侃與敏同郡又同歳舉吏隨郡内史扈懐言於􅀪曰侃居大郡統彊兵脫有異志則荆州無東門矣􅀪曰侃之忠能吾得之已乆必無是也侃聞之遣子洪及兄子臻詣􅀪以自固􅀪引為參軍資而遣之曰賢叔征行君祖母年髙便可歸也匹夫之交尚不負心況大丈夫乎敏以陳恢為荆州刺史冦武昌􅀪加侃前鋒督護以禦之侃以運船為戰艦或以為不可侃曰用官船擊官賊何為不可侃與恢戰屢破之又與皮初張光苖光共破錢端於長岐南陽太守衛展說􅀪曰張光太宰腹心公既與東海宜斬光以明向背􅀪曰宰輔得失豈張光之罪危人自安君子弗為也乃表光殊勲乞加遷擢懐帝永嘉元年陳敏刑政無章不為英俊所附子弟凶㬥所在為患顧榮周玘等憂之廬江内史華譚遺榮等書曰陳敏盜據吴㑹命危朝露諸君或剖符名郡或列為近臣而更辱身姦人之朝降節叛逆之黨不亦羞乎吴武烈父子皆以英傑之才繼承大業今以陳敏凶狡七弟頑宂欲躡桓王之髙蹤蹈大皇之絶軌逺度諸賢猶當未許也皇輿東返俊彦盈朝將舉六師以清建業諸賢何顔復見中州之士邪榮等素有圗敏之心及得書甚慙宻遣使報征東大將軍劉凖使發兵臨江己為内應剪髪為信準遣揚州刺史劉機等出厯陽討敏敏使其弟廣武將軍昶將兵數萬屯烏江厯陽太守宏屯牛渚敏弟處知顧榮等有貳心勸敏殺之敏不從昶司馬錢廣周玘同郡人也玘宻使廣殺昶因宣言州下已殺敏敢動者誅三族廣勒兵朱雀橋南敏遣甘卓討廣堅甲精兵盡委之顧榮慮敏疑之故往就敏敏曰卿當四出鎮衛豈得就我邪榮乃出與周玘共説甘卓曰若江東之事可濟當共成之然卿觀兹事埶當有濟理不敏既常才政令反覆計無所定其子弟各已驕矜其敗必矣而吾等安然受其官禄事敗之日使江西諸軍函首送洛題曰逆賊顧榮甘卓之首此萬世之辱也卓遂詐稱疾迎女斷橋收船南岸與玘榮及前松滋侯相丹陽紀瞻共攻敏敏自帥萬餘人討卓軍人隔水語敏衆曰本所以戮力陳公者正以顧丹楊周安豐耳今皆異矣汝等何為敏衆狐疑未決榮以白羽扇麾之衆皆潰去敏單騎北走追獲之於江乘歎曰諸人誤我以至今日謂弟處曰我負卿卿不負我遂斬敏於建業夷三族於是㑹稽等郡盡殺敏諸弟時平東將軍周馥代劉準鎮夀春三月己未朔馥傳敏首至京師詔徴顧榮為侍中紀瞻為尚書郎太傅越辟周玘為參軍陸玩為掾玩機之從弟也榮等至徐州聞北方愈亂疑不進越與徐州刺史裴盾書曰若榮等顧望以軍禮發遣榮等懼逃歸盾楷之兄子越妃兄也通鑑紀事本末卷第十一
