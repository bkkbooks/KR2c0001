body:
  text: 鄴都之變後唐莊宗同光元年冬十月帝遣使以滅梁告吳蜀二國皆懼吳􅀭州司馬嚴可求笑曰聞唐主始得中原志氣驕滿御下無法不出數年將有内變吾但當卑辭厚禮保境安民以待之耳滑州留後李紹欽因伶人景進納貨於宫掖除泰寧節度使帝㓜善音律故伶人多有寵常侍左右帝或時自傅粉墨與優人共戲於庭以恱劉夫人優名謂之李天下嘗因為優自呼曰李天下李天下優人敬新磨遽前批其頰帝失色羣優亦駭愕新磨徐曰理天下者只有一人尚誰呼邪帝恱厚賜之諸伶出入宫掖侮弄搢紳羣臣憤嫉莫敢出氣亦有反相附託以希恩澤者四方藩鎮爭以貨賂結之其尤蠧政害人者景進爲之首進好采閭閻鄙細事聞於上上亦欲知外間事遂委進以耳目進每奏事常屏左右問之由是進得施其讒慝干豫政事自將相大臣皆憚之荆南節度使髙季興在洛陽帝左右伶官求貨無厭季興忿之歸謂將佐曰新朝百戰方得河南乃對功臣舉手云吾於十指上得天下矜伐如此則它人無功矣其誰不解體又荒於禽色何能長久吾無憂矣二年春正月敕内官不應居外應前朝内官及諸道監軍并私家先所畜者不以貴賤並遣詣闕時在上左右者已五百人至是殆及千人皆給贍優厚委之事任以為腹心内諸司使自天祐以来以士人代之至是復用宦者浸干政事既而復置諸道監軍節度使出征或留闕下軍府之政皆監軍决之陵忽主帥怙勢爭權由是藩鎮皆憤怒二月己巳朔上祀南郊大赦租庸副使孔謙欲聚歛以求媚凡赦文所蠲者謙復徵之自是每有詔令人皆不信百姓愁怨郭崇韜初至汴洛頗受藩鎮饋遺所親或諌之崇韜曰吾位兼將相禄賜巨萬豈籍外財但以偽梁之季賄賂成風今河南藩鎮皆梁之舊臣主上之仇讎也若拒其意能無懼乎吾特為國家藏之私室耳及將祀南郊崇韜首獻勞軍錢十萬緍先是宦官勸帝分天下財賦為内外府州縣上供者入外府充經費方鎮貢獻者入内府充宴遊及給賜左右於是外府常虚竭無餘而内府山積及有司辦郊祀乏勞軍錢崇韜言於上曰臣已傾家所有以助大禮願陛下亦出内府之財以賜有司上黙然久之曰吾晉陽自有儲積可令租庸輦取以相助於是取李繼韜私第金帛數十萬以益之軍士皆不滿望始怨恨有離心矣郭崇韜位兼將相復領節旄以天下為己任權侔人主旦夕車馬填門性剛急遇事輙發嬖倖僥求多所摧抑宦官疾之朝夕短之於上崇韜扼腕欲制之不能豆盧革韋説嘗問之曰汾陽王本太原人徙華隂公世家鴈門豈其枝􅂀邪崇韜因曰遭亂亡失譜牒嘗聞先人言上距汾陽四世耳革曰然則固從祖也崇韜由是以膏梁自處多甄别流品引拔浮華鄙棄勲舊有求官者崇韜曰深知公功能然門地寒素不敢相用恐為名流所嗤由是嬖倖疾之於内勲舊怨之於外崇韜屢請以樞密使讓李紹宏上不許又請分樞密院事歸内諸司以輕其權而宦官謗之不已崇韜鬱鬱不得志與所親謀赴本鎮以避之其人曰不可蛟龍失水螻蟻足以制之先是上欲以劉夫人為皇后而有正妃韓夫人在太后素惡劉夫人崇韜亦屢諫上以是不果於是所親説崇韜曰公若請立劉夫人為皇后上必喜内有皇后之助則伶官輩不能為患矣崇韜從之與宰相帥百官共奏劉夫人宜正位中宫癸未立魏國夫人劉氏為皇后皇后生於寒微既貴專務蓄財其在魏州至於薪蘇果茹皆販鬻之及為后四方貢獻皆分為二一上天子一上中宫以是寳貨山積惟用寫佛經施尼師而已是時皇太后誥皇后教與制勑交行於藩鎮奉之如一勲臣畏伶官之讒皆不自安蕃漢内外馬步副揔管李嗣源求解兵柄帝不許夏四月孔謙貸民錢使以賤估償絲屢檄州縣督之翰林學士承㫖權知汴州盧質上言梁趙巖為租庸使舉貸誅歛結怨于人今陛下革故鼎新為人除害而有司未改其所為是趙巖復生也今春霜害桑繭絲甚薄但輸正稅猶懼流移况益以稱貸人何以堪臣惟事天子不事租庸敕㫖未頒省牒頻下願早降明命帝不報初胡柳之役伶人周匝為梁所得帝每思之入汴之日匝謁見於馬前帝甚喜匝涕泣言曰臣所以得生全者皆梁教坊使陳俊内園栽接使儲德源之力也願就陛下乞二州以報之帝許之郭崇韜諫曰陛下所與共取天下者皆英豪忠勇之士今大功始就封賞未及一人而先以伶人為刺史恐失天下心以是不行踰年伶人屢以為言帝謂崇韜曰吾已許周匝矣使吾慙見此三人公言雖正然當為我屈意行之五月壬寅以俊為景州刺史徳源為憲州刺史時親軍有從帝百戰未得刺史者莫不憤歎乙巳右諫議大夫薛昭文上䟽以為今諸道僭竊者尚多征伐之謀未可遽息又士卒久從征伐賞給未豐貧乏者多宜以四方貢獻及南郊羡餘更加頒賚又河南諸軍皆梁之精鋭恐僭竊之國濳以厚利誘之宜加收撫又戸口流亡者冝寛徭薄賦以安集之又土木不急之役冝加裁省又請擇隙地牧馬勿使踐京畿民田皆不從六月壬辰以天平節度使李嗣源為宣武節度使秋八月癸酉以副使衛尉卿孔謙為租庸使右威衛大將軍孔循為副使循即趙殷衡也梁亡復其姓名謙自是得行其志重歛急徵以充帝欲民不聊生癸未賜謙號豐財贍國功臣三年初李嗣源北征過興唐東京庫有供御細鎧嗣源牒副留守張憲取五百領憲以軍興不暇奏而給之帝怒曰憲不奉詔擅以吾鎧給嗣源何意也罰憲俸一月令自往軍中取之帝以義武節度使王都將入朝欲闢毬場憲曰比以行宫闕廷為毬場前年陛下即位於此其壇不可毁請闢毬場於宫西數日未成帝命毁即位壇憲謂郭崇韜曰此壇主上所以禮上帝始受命之地也若之何毁之崇韜從容言於帝帝立命兩虞候毁之憲私於崇韜曰忘天背本不祥莫大焉春二月庚辰徙李嗣源為成徳節度使帝性剛好勝不欲權在臣下入洛之後信伶宦之讒頗踈忌宿將李嗣源家在太原三月丁酉表衛州刺史李從珂為北京内牙馬步都指揮使以便其家帝怒曰嗣源握兵權居大鎮軍政在手安得為其子奏請乃黜從珂為突騎指揮使帥數百人戍石門鎮嗣源憂恐上章申理久之方解辛丑嗣源乞至東京朝覲不許郭崇韜以嗣源功髙位重亦忌之私謂人曰揔管令公非久為人下者皇家子弟皆不及也密勸帝召之宿衛罷其兵權又勸帝除之帝皆不從洛陽宫殿宏邃宦者欲上增廣嬪御詐言宫中夜見鬼物上欲使符呪者攘之宦者曰臣昔逮事咸通乾符天子當是時六宫貴賤不減萬人今掖庭太半空虚故鬼物遊之耳上乃命宦者王允平伶人景進采擇民間女子逺至太原幽鎮以充後庭不啻三千人不問所從来上還自興唐載以牛車纍纍盈路張憲奏諸營婦女亡逸者千餘人慮扈從諸軍挾匿以行其實皆入宫矣庚辰帝至洛陽辛酉詔復以洛陽為東都興唐府為鄴都夏六月帝苦溽暑於禁中擇髙凉之所皆不稱㫖宦者因言臣見長安全盛時大明興慶宫樓觀以百數今日宅家曾無避暑之所宫殿之盛曾不及當時公卿第舍耳帝乃命宫苑使王允平别建一樓以清暑宦者曰郭崇韜常不伸眉為孔謙論用度不足恐陛下雖欲營繕終不可得帝曰吾自用内府錢無關經費然猶慮崇韜諫遣中使語之曰今歲盛暑異常朕昔在河上與梁人相拒行營卑濕被甲乗馬親當矢石猶無此暑今居深宫之中而暑不可度柰何對曰陛下昔在河上勍敵未滅深念讎恥雖有盛暑不介聖懐今外患已除海内賔服故雖珍臺閑舘猶覺鬱蒸也陛下儻不忘艱難之時則暑氣自消矣帝黙然宦者曰崇韜之第無異皇居宜其不知至尊之熱也帝卒命允平營樓日役萬人所費巨萬崇韜諌曰今兩河水旱軍食不充願且息役以俟豐年帝不聽秋七月甲午成徳節度使李嗣源表求入朝帝不許九月乙未立皇子繼岌為魏王丁酉帝與宰相議伐蜀以魏王繼岌充西川四靣行營都統郭崇韜充東北靣行營都招討制置等使軍事悉以委之郭崇韜以北都留守孟知祥有薦引舊恩將行言於上曰孟知祥信厚有謀若得西川而求帥無踰此人者又薦鄴都副留守張憲謹重有識可為相戊申大軍西行冬十一月乙卯大軍至成都蜀王出降宗㓕蜀事見莊平蜀之功李紹琛為多位在董璋上而璋素與郭崇韜善崇韜數召璋與議軍事紹琛心不平謂璋曰吾有平蜀之功公等樸樕相從反呫囁於郭公之門謀相傾害吾為都將獨不能以軍法斬公邪璋訴于崇韜十二月崇韜表璋為東府節度使解其軍職紹琛愈怒曰吾冐白刃陵險阻定兩川璋乃坐有之邪乃見崇韜言東川重地任尚書有文武才宜表為帥崇韜怒曰紹琛反邪何敢違吾節度紹琛懼而退初帝遣宦者李從襲等從魏王繼岌伐蜀繼岌雖為都統軍中制置補署一出郭崇韜崇韜終日决事將吏賔客趨走盈庭而都統府惟大將晨謁外牙門索然從襲等固恥之及破蜀蜀之貴臣大將爭以寳貨妓樂遺崇韜及其子廷誨魏王所得不過匹馬束帛唾壺麈柄而已從襲等益不平王宗弼之自為西川留後也賂崇韜求為節度使崇韜陽許之既而久未得乃帥蜀人列狀見繼岌請留崇韜鎮蜀從襲等因謂繼岌曰郭公父子専横今又使蜀人請己為帥其志難測王不可不為之僃繼岌謂崇韜曰主上倚侍中如山嶽不可離廟堂豈肯棄元老於蠻夷之域乎且此非余之所敢知也請諸人詣闕自陳由是繼岌與崇韜互相疑丙子以知北都留守事孟知祥為西川節度使同平章事促召赴洛陽帝議選北都留守樞密承㫖叚徊等惡鄴都留守張憲不欲其在朝廷皆曰北都非張憲不可憲雖有宰相器今國家新得中原宰相在天子目前事有得失可以改更比之北都獨繫一方安危不為重也乃徙憲為太原尹知北都留守事以戸部尚書王正言為興唐尹知鄴都留守事正言昏耄帝以武徳使史彦瓊為鄴都監軍彦瓊本伶人也有寵於帝魏博等六州軍旅金糓之政皆决於彦瓊威福自恣陵忽將佐自正言以下皆謟事之初帝得魏州銀槍効節都近八千人以為親軍皆勇悍無敵夾河之戰實頼其用屢立殊功常許以滅梁之日大加賞賚既而河南平雖賞賚非一而士卒恃功驕恣無厭更成怨望是嵗大饑民多流亡租賦不充道路塗潦漕輦艱澀東都倉廪空竭無以給軍士租庸使孔謙日於上東門外望諸州漕運至者隨以給之軍士乏食有雇妻鬻子者老弱采蔬於野百十為羣往往餒死流言怨嗟而帝遊畋不息己卯獵於白沙皇后皇子後宫畢從庚辰宿伊闕辛巳宿潭泊壬午宿龕澗癸未還宫時大雪吏卒有僵仆於道路者伊汝間飢尤甚衛兵所過責其供餉不得則壞其什器撤其室廬以為薪甚於冦盜縣吏皆竄匿山谷帝以軍儲不足謀於羣臣豆盧革以下皆莫知為計吏部尚書李琪上䟽以為古者量入以為出計農而發兵故雖有水旱之災而無匱乏之憂近代稅農以養兵未有農冨給而兵不足農􅂢瘠而兵豐飽者也今縱未能蠲省租税苟除折納紐配之法農亦可以小休矣帝即敕有司如琪所言然竟不能行郭崇韜素疾宦者嘗宻謂魏王繼岌曰大王它日得天下騬馬亦不可乗况任宦官冝盡去之專用士人吕知柔竊聽聞之由是宦官皆切齒時成都雖下而蜀中盜賊羣起布滿山林崇韜恐大軍既去更為後患命任圜張筠分道招討以是淹留未還帝遣宦者向延嗣促之崇韜不出郊迎及見禮節又倨延嗣怒李從襲謂延嗣曰魏王太子也主上萬福而郭公専權如是郭廷誨擁徒出入日與軍中驍將蜀土豪傑狎飲指天畫地近聞白其父請表已為蜀帥又言蜀地冨饒大人宜善自為謀今諸軍將校皆郭氏之黨王寄身於虎狼之口一朝有變吾屬不知委骨何地矣因相向垂涕延嗣歸具以語劉后后泣訴於帝請早救繼岌之死前此帝聞蜀人請崇韜為帥已不平至是聞延嗣之言不能無疑帝閲蜀府庫之籍曰人言蜀中珍貨無筭何如是之微也延嗣曰臣聞蜀破其珍貨皆入於崇韜父子崇韜有金萬兩銀四十萬兩錢百萬緍名馬千匹它物稱是廷誨所取復在其外故縣官所得不多耳帝遂怒形於色及孟知祥將行帝語之曰聞郭崇韜有異志卿到為朕誅之知祥曰崇韜國之勲舊不宜有此俟臣至蜀察之茍無佗志則遣還帝許之壬子知祥發洛陽帝尋復遣衣甲庫使馬彦珪馳詣成都觀崇韜去就如奉詔班師則已若有遷延跋扈之狀則與繼岌圖之彦珪見皇后説之曰臣見向延嗣言蜀中事勢憂在朝夕今主上當斷不斷夫成敗之機間不容髮安能緩急禀命於三千里外乎皇后復言於帝帝曰傳聞之言未知虚實豈可遽爾果决皇后不得請退自為教與繼岌令殺崇韜知祥行至石壕彦珪夜叩門宣詔促知祥赴鎮知祥竊歎曰亂將作矣乃晝夜兼行明宗天成元年河中節度使李繼麟恃與帝故舊且有功帝待之厚苦諸伶官求匄無厭遂拒不與大軍之征蜀也繼麟閲兵遣其子令徳將之以從景進與宦官譖之曰繼麟聞大軍起以為討已故驚懼閲兵自衛又曰崇韜所以敢倔彊於蜀者與河中隂謀内外相應故也繼麟聞之懼欲身入朝以自明其所親止之繼麟曰郭侍中功髙於我今事勢將危吾得見主上靣陳至誠則讒人獲罪矣正月癸亥繼麟入朝魏王繼岌將發成都令任圜權知留事以俟孟知祥諸軍部署已定是日馬彦珪至以皇后教示繼岌繼岌曰大軍垂發彼無釁端安可爲此負心事公輩勿復言且主上無敕獨以皇后教殺招討使可乎李從襲等泣曰既有此迹萬一崇韜間之中塗爲變益不可救矣相與巧陳利害繼岌不得已從之甲子旦從襲以繼岌之命召崇韜計事繼岌登樓避之崇韜方升階繼岌從者李環撾碎其首并殺其子廷誨廷信外人猶未之知都統推官饒陽李崧謂繼岌曰今行軍三千里外初無敕㫖擅殺大將大王柰何行此危事獨不能忍之至洛陽邪繼岌曰公言是也悔之無及崧乃召書吏數人登樓去梯矯為敕書用蠟印宣之軍中粗定崇韜左右皆竄匿獨掌書記􅇭陽張礪詣魏王府慟哭久之繼岌命任圜代崇韜揔軍政馬彦珪還洛陽乃下詔暴郭崇韜之罪并殺其子廷説廷讓廷議於是朝野駭惋羣議紛然帝使宦官濳察之保大節度使睦王存乂崇韜之壻也宦官欲盡去崇韜之黨言存乂對諸將攘臂垂泣為崇韜稱寃言辭怨望庚辰幽存乂於第尋殺之景進言河中人有告變言李繼麟與郭崇韜謀反崇韜死又與存乂連謀宦官因共勸帝速除之帝乃徙繼麟為義成節度使是夜遣蕃漢馬步使朱守殷以兵圍其第驅繼麟出徽安門外殺之復其姓名曰朱友謙友謙二子令徳為武信節度使令錫為忠武節度使詔魏王繼岌誅令徳於遂州鄭州刺史王思同誅令錫於許州河陽節度使李紹竒誅其家人於河中紹竒至其家友謙妻張氏帥家人二百餘口見紹竒曰朱氏宗族當死願無濫及平人乃别其婢僕百人以其族百口就刑張氏又取鐵劵以示紹竒曰此皇帝去年所賜也我婦人不識書不知其何等語也紹竒亦為之慙友謙舊將史武等七人時為刺史皆坐族誅時洛中諸軍飢窘妄為謠言伶官采之以聞於帝故郭崇韜朱友謙皆及於禍成徳節度使兼中書令李嗣源亦為謠言所屬帝遣朱守殷察之守殷私謂嗣源曰令公勲業振主冝自圖歸藩以逺禍嗣源曰吾心不負天地禍福之來無所可避皆委之於命耳時伶官用事勲舊人不自保嗣源危殆者數四頼宣徽使李紹宏左右營䕶以是得全魏王繼岌留馬步都指揮使陳留李仁罕馬軍都指揮使東光潘仁嗣左廂都指揮使趙廷隠右廂都指揮使浚儀張業牙内指揮使文水武漳驍鋭指揮使平恩李延厚戍成都甲申繼岌發成都命李紹琛帥萬二千人為後軍行止常差中軍一舍二月魏博指揮使楊仁晸將所部兵戍瓦橋踰年代歸至貝州以鄴都空虚恐兵至為變敕留屯貝州時天下莫知郭崇韜之罪民間訛言云崇韜殺繼岌自王於蜀故族其家朱友謙子建徽為澶州刺史帝密敕鄴都監軍史彦瓊殺之門者白留守王正言曰史武徳夜半馳馬出城不言何往又訛言云皇后以繼岌之死歸咎於帝已弑帝矣故急召彦瓊計事人情愈駭楊仁晸部兵皇甫暉與其徒夜博不勝因人情不安遂作亂劫仁晸曰主上所以有天下者吾魏軍力也魏軍甲不去體馬不解鞍者十餘年今天下已定天子不念舊勞更加猜忌逺戍踰年方喜代歸去家咫尺不使相見今聞皇后弑逆京師已亂將士願與公俱歸仍表聞朝廷若天子萬福興兵致討以吾魏博兵力足以拒之安知不更為富貴之資乎仁晸不從暉殺之又劫小校不從又殺之効節指揮使趙在禮聞亂衣不及帶踰垣而走暉追及曳其足而下之示以二首在禮懼而從之亂兵遂奉以為帥焚掠貝州暉魏州人在禮泳州人也詰旦暉等擁在禮南趣臨清永濟館陶所過剽掠壬辰晚有自貝州来告軍亂將犯鄴都者都巡檢使孫鐸等亟詣史彦瓊請授甲乗城為備彦瓊疑鐸等有異志曰告者云今日賊至臨清計程須六日晚方至為僃未晚孫鐸曰賊既作亂必乗吾未僃晝夜倍道安肯計程而行請僕射帥衆乗城鐸募勁兵千人伏於王莽河逆擊之賊既勢挫必當離散然後可撲滅也必俟其至城下萬一有姦人為内應則事危矣彦瓊曰但嚴兵守城何必逆戰是夜賊前鋒攻北門弓弩亂發時彦瓊將部兵宿北門樓聞賊呼聲即時驚潰彦瓊單騎犇洛陽癸巳賊入鄴都孫鐸等拒戰不勝亡去趙在禮據宫城署皇甫暉及軍校趙進為馬步都指揮使縱兵大掠進定州人也王正言方據按召吏草奏無至者正言怒其家人曰賊已入城殺掠於市吏皆逃散公尚誰呼正言驚曰吾初不知也又索馬不能得乃帥僚佐步出府門謁在禮再拜請罪在禮亦拜曰士卒思歸耳尚書重徳勿自卑屈慰諭遣之衆推在禮為魏博留後具奏其狀北京留守張憲家在鄴都在禮厚撫之遣使以書誘憲憲不發封斬其使以聞丙申史彦瓊至洛陽帝問可為大將者於樞密使李紹宏紹宏復請用李紹欽帝許之令條上方略紹欽所請偏禆皆梁舊將已所善者帝疑之而止皇后曰此小事不足煩大將紹榮可辦也帝乃命歸徳節度使李紹榮將騎三千詣鄴都招撫亦徵諸道兵僃其不服郭崇韜之死也李紹琛謂董璋曰公復欲呫嗶誰門乎璋懼謝罪魏王繼岌軍還至武連遇敕使諭以朱友謙已伏誅令董璋將兵之遂州誅朱令徳時紹琛將後軍在魏城聞之以帝不委已殺令徳而委璋大驚俄而璋過紹琛軍不謁紹琛怒乗酒謂諸將曰國家南取大梁西定巴蜀皆郭公之謀而吾之戰功也至於去逆効順與國家掎角以破梁則朱公也今朱郭皆無罪族滅歸朝之後行及我矣寃哉天乎奈何紹琛所將多河中兵河中將焦武等號哭於軍門曰西平王何罪闔門屠膾我輩歸則與史武等同誅決不復東矣是日魏王繼岌至泥溪紹琛至劔州遣人白繼岌云河中將士號哭不止欲為亂丁酉紹琛自劔州擁兵西還自稱西川節度三川制置等使移檄成都稱奉詔代孟知祥招諭蜀人三日間衆至五萬己亥魏王繼岌至利州李紹琛遣人斷桔柏津繼岌聞之以任圜為副招討使將步騎七千與都指揮使梁漢顒監軍李延安追討之庚子邢州左右步直兵趙太等四百人據城自稱安國留後詔東北靣招討副使李紹真討之辛丑任圜先令别將何建崇擊劒門關下之李紹榮至鄴都攻其南門遣人以敕招諭之趙在禮以羊酒犒師拜於城上曰將士思家擅歸相公誠善為敷奏得免於死敢不自新遂以敕徧諭軍士史彦瓊㦸手大罵曰羣死賊城破萬段皇甫暉謂衆曰觀史武徳之言上不赦我矣因聚譟掠敕書手壞之守陴拒戰紹榮攻之不利以狀聞帝怒曰克城之日勿遺噍類大發諸軍討之壬寅紹榮退屯澶州甲辰夜從馬直軍士王温等五人殺軍使謀作亂擒斬之從馬直指揮使郭從謙本優人也優名郭門髙帝與梁相拒於得勝募勇士挑戰從謙應募俘斬而還由是益有寵帝選諸軍驍勇者為親軍分置四指揮號從馬直從謙自軍使積功至指揮使郭崇韜方用事從謙以叔父事之睦王存乂以從謙為假子及崇韜存乂得罪從謙數以私財饗從馬直諸校對之流涕言崇韜之寃及王温作亂帝戲之曰汝既負我附崇韜存乂又教王温反欲何為也從謙益懼既退隂謂諸校曰主上以王温之故俟鄴都平定盡阬若曹家之所有宜盡市酒肉勿為久計也由是親軍皆不自安丁未李紹榮以諸道兵再次鄴都庚戌禆將楊重覇帥衆數百登城後無繼者重覇等皆死賊知不赦堅守無降意朝廷患之日發中使促魏王繼岌東還繼岌以中軍精兵皆從任圜討李紹琛留利州待之未得還李紹榮討趙在禮久無功趙太邢州未下滄州軍亂小校王景戡討定之因自為留後河朔州縣告亂者相繼帝欲自征鄴都宰相樞密使皆言京師根本車駕不可輕動帝曰諸將無可使者皆曰李嗣源最為勲舊帝心忌嗣源曰吾惜嗣源欲留宿衛皆曰它人無可者忠武節度使張全義亦言河朔多事久則患深宜令揔管進討若倚紹榮輩未見成功之期李紹宏亦屢言之帝以内外所薦久乃許之甲寅命嗣源將親軍討鄴都董璋將兵二萬屯綿州會任圜討李紹琛帝遣中使崔延琛至成都遇紹琛軍紿之曰吾奉詔召孟郎公若緩兵自當得蜀既至成都勸孟知祥為戰守僃知祥浚壕樹柵遣馬步都指揮使李仁罕將四萬人驍銳指揮使李延厚將二千人討紹琛延厚集其衆詢之曰有少壯勇鋭欲立功求冨貴者東衰疾畏懦厭行陳者西得選兵七百人以行是日任圜軍追及紹琛於漢州紹琛出兵逆戰招討掌書記張礪請伏精兵於後以羸兵誘之圜從之使董璋以東川羸兵先戰而却紹琛輕圜書生又見其兵羸極力追之伏兵發大破之斬首數千級自是紹琛入漢州閉城不出三月丁巳朔李紹真奏克邢州擒趙太等庚申紹真引兵至鄴都營於城西北以太等徇於鄴都城下而殺之壬戌李嗣源至鄴都營於城西南甲子嗣源下令軍中詰旦攻城是夜從馬直軍士張破敗作亂帥衆大譟殺都將焚營舍詰旦亂兵逼中軍嗣源帥親軍拒戰不能敵亂兵益熾嗣源叱而問之曰爾曹欲何為對曰將士從主上十年百戰以得天下今主上棄恩任威貝州戍卒思歸主上不赦云克城之後當盡阬魏博之軍近從馬直數卒諠競遽欲盡誅其衆我輩初無叛心但畏死耳今衆議欲與城中合勢擊退諸道之軍請主上帝河南令公帝河北為軍民之主嗣源泣諭之不從嗣源曰爾不用吾言任爾所為我自歸京師亂兵拔白刃環之曰此輩虎狼也不識尊卑令公去欲何之因擁嗣源及李紹真等入城城中不受外兵皇甫暉逆擊張破敗斬之外兵皆潰趙在禮帥諸校迎拜嗣源泣謝曰將士輩負令公敢不惟命是聽嗣源詭説在禮曰凢舉大事須籍兵力今外兵流散無所歸我為公出收之在禮乃聽嗣源紹真俱出城宿魏縣散兵稍有至者漢州無城塹樹木為栅乙丑任圜進攻其栅縱火焚之李紹琛引兵出戰於金鴈橋兵敗與十餘騎犇綿竹追擒之孟知祥自至漢州犒軍與任圜董璋置酒髙會引李紹琛檻車至座中知祥自酌大巵飲之謂曰公已擁節旄又有平蜀之功何患不冨貴而求入此檻車邪紹琛曰郭侍中佐命功第一兵不血刃取兩川一旦無罪族誅如紹琛輩安保首領以此不敢歸朝耳魏王繼岌既獲紹琛乃引兵倍道而東李嗣源之爲亂兵所逼也李紹榮有衆萬人營於城南嗣源遣牙將張䖍釗髙行周等七人相繼召之欲與共誅亂者紹榮疑嗣源之詐留使者閉壁不應及嗣源入鄴都遂引兵去嗣源在魏縣衆不滿百又無兵仗李紹眞所將鎭兵五千聞嗣源得出相帥歸之由是嗣源兵稍振嗣源泣謂諸將曰吾明日當歸藩上章待罪聽主上所裁李紹真及中門使安重誨曰此䇿非冝公為元帥不幸為凶人所劫李紹榮不戰而退歸朝必以公藉口公若歸藩則為據地邀君適足以實讒慝之言耳不若星行詣闕靣見天子庶可自明嗣源曰善丁卯自魏縣南趣相州遇馬坊使康福得馬數千匹始能成軍福蔚州人也平盧節度使苻習將本軍攻鄴都聞李嗣源軍潰引兵歸至淄州監軍使楊希望遣兵逆擊之習懼復引兵而西青州指揮使王公儼攻希望殺之因據其城時近侍為諸道監軍者皆恃恩與節度使爭權及鄴都軍變所在多殺之安義監軍楊繼源謀殺節度使孔勍勍先誘而殺之武寧監軍以李紹真從李嗣源謀殺其元從據城拒之權知留後淳于晏帥諸將先殺之晏登州人也戊辰以軍食不足敕河南尹豫借夏秋稅民不聊生忠武節度使尚書令齊王張全義聞李嗣源入鄴都憂懼不食辛未卒於洛陽租庸使以倉儲不足頗朘刻軍糧軍士流言益甚宰相懼帥百官上表言今租庸已竭内庫有餘諸軍室家不能相保儻不賑救懼有離心俟過凶年其財復集上即欲從之劉后曰吾夫婦君臨萬國雖藉武功亦由天命命既在天人如我何宰相又於便殿論之后屬耳於屏風後須㬰出䊋具及三銀盆皇㓜子三人於外曰人言宫中蓄積多四方貢獻隨以給賜所餘止此耳請鬻以贍軍宰相惶懼而退李紹榮自鄴都退保衛州奏李嗣源已叛與賊合嗣源遣使上章自理一日數輩嗣源長子從審為金槍指揮使帝謂從審曰吾深知爾父忠厚爾往諭朕意勿使自疑從審至衛州紹榮囚欲殺之從審曰公等既不亮吾父吾亦不能至父所請復還宿衛乃釋之帝憐從審賜名繼璟待之如子是後嗣源所奏皆為紹榮所遏不得通嗣源由是疑懼石敬瑭曰夫事成於果决而敗於猶豫安有上將與叛卒入賊城而它日得保無恙乎大梁天下之要㑹也願假三百騎先往取之若幸而得之公冝引大軍亟進如此始可自全突騎都指揮使康義誠曰主上無道軍民怨怒公從衆則生守節必死嗣源乃令安重誨移檄㑹兵義誠代北胡人也時齊州防禦使李紹䖍泰寧節度使李紹欽貝州刺史李紹英屯瓦橋北京右廂馬軍都指揮使安審通屯奉化軍嗣源皆遣使召之紹英瑕丘人本姓房名知温審通金全之姪也嗣源家在真定虞􅀱將王建立先殺其監軍由是獲全建立遼州人也李從珂自横水將所部兵由盂縣趣鎮州與王建立軍合倍道從嗣源嗣源以李紹榮在衛州謀自白臯濟河分三百騎使石敬瑭將之前驅李從珂為殿於是軍勢大盛嗣源從子從璋自鎮州引軍而南過邢州邢人奉為留後癸酉詔懐逺指揮使白從暉將騎兵扼河陽橋帝乃出金帛給賜諸軍樞密宣徽使及供奉内使景進等皆獻金帛以助給賜軍士負物而詬曰吾妻子已殍死得此何為甲戌李紹榮自衛州至洛陽帝如鷂店勞之紹榮曰鄴都亂兵已遣其黨翟建白據博州欲濟河襲鄆汴願陛下幸關東招撫之帝從之乙亥帝􅀤洛陽丁丑次汜水戊寅遣李紹榮將騎兵循河而東李嗣源親黨從帝者多亡去或勸李繼璟冝早自脱繼璟終無行意帝屢遣繼璟詣嗣源繼璟固辭願死於帝前以明赤誠帝聞嗣源在黎陽彊遣繼璟渡河召之道遇李紹榮紹榮殺之庚辰帝發汜水辛巳李嗣源至白臯遇山東上供絹數船取以賞軍安重誨從者爭舟行營馬步使陶玘斬以徇由是軍中肅然玘許州人也嗣源濟河至滑州遣人招苻習習與嗣源會於胙城安審通亦引兵来會知汴州孔循遣使奉表西迎帝亦遣使北輸密􅅃於嗣源曰先至者得之先是帝遣騎將滿城西方鄴守汴州石敬瑭使禆將李瓊以勁兵突入封丘門敬瑭踵其後自西門入遂據其城西方鄴請降敬瑭使人趣嗣源壬午嗣源入大梁是日帝至滎澤東命龍驤指揮使姚彦温將三千騎為前軍曰汝曹汴人也吾入汝境不欲使它軍前驅恐擾汝室家厚賜而遣之彦温即以其衆叛歸嗣源謂嗣源曰京師危迫主上為元行欽所惑事勢已離不可復事矣嗣源曰汝自不忠何言之悖也即奪其兵指揮使潘環守王村寨有芻粟數萬帝遣騎視之環亦犇大梁帝至萬勝鎮聞嗣源已據大梁諸軍離叛神色沮䘮登髙歎曰吾不濟矣即命旋師是夜復至汜水帝之出闗也扈從兵二萬五千及還已失萬餘人乃留泰州都指揮使張唐以步騎三千守闗癸未帝還過罌子谷道狭每遇衛士執兵仗者輙以善言撫之曰適報魏王又進西川金銀五十萬到京當盡給爾曹對曰陛下賜已晚矣人亦不感聖恩帝流涕而已又索袍帶賜從官内庫使張容哥稱頒給已盡衛士叱容哥曰致吾君失社稷皆此閹䜿輩也抽刀逐之或救之獲免容哥謂同類曰皇后吝財致此今乃歸咎於吾輩事若不測吾輩萬段吾不忍待也因赴河死甲申帝至石橋西置酒悲涕謂李紹榮等諸將曰卿輩事吾以來急難富貴靡不同之今致吾至此皆無一策以相救乎諸將百餘人皆截髪置地誓以死報因相與號泣是日晚入洛城李嗣源命石敬瑭將前軍趣汜水收撫散兵嗣源繼之李紹䖍李紹英引兵来㑹丙戌宰相樞密使共奏魏王西軍將至車駕宜且控汜水收撫散兵以俟之帝從之自出上東門閲騎兵戒以詰旦東行夏四月丁亥朔嚴辦將􅀤騎兵陳於宣仁門外步兵陳於五鳯門外從馬直指揮使郭從謙不知睦王存乂已死欲奉之以作亂帥所部兵自營中露刃大呼與黄甲兩軍攻興教門帝方食聞變帥諸王及近衛騎兵擊之逐亂兵出門時蕃漢馬步使朱守殷將騎兵在外帝遣中使急召之欲與同擊賊守殷不至引兵憩於北邙茂林之下亂兵焚興教門縁城而入近臣宿將皆釋甲潜遁獨散貟都指揮使李彦卿及宿衛軍校何福進王全斌等十餘人力戰俄而帝為流矢所中鷹坊人善友扶帝自門樓下至綘霄殿廡下抽矢渇懣求水皇后不自省視遣宦者進酪湏􅁷帝殂李彦卿等慟哭而去左右皆散善友斂廡下樂器覆帝尸而焚之彦卿存審之子福進全斌皆太原人也劉后囊金寳繫馬鞍與申王存渥及李紹榮引七百騎焚嘉慶殿自師子門出走通王存確雅王存紀犇南山宫人多逃散朱守殷入宫選宫人三十餘人各令自取樂器珍玩内於其家於是諸軍大掠都城是日李嗣源至罌子谷聞之慟哭謂諸將曰主上素得士心正為羣小蔽惑致此今吾將安歸乎戊子朱守殷遣使馳白嗣源以京城大亂諸軍焚掠不已願亟来救之己丑嗣源入洛陽止于私第禁焚掠拾莊宗骨於灰燼之中而殯之嗣源之入鄴都也前直指揮使平遥侯益脱身歸洛陽莊宗撫之流涕至是益自􅅞請罪嗣源曰爾為臣盡節又何罪也使復其職嗣源謂朱守殷曰公善巡徼以待魏王淑妃徳妃在宫供給尤冝豐僃吾俟山陵畢社稷有奉則歸藩為國家扞禦北方耳是日豆盧革帥百官上牋勸進嗣源面諭之曰吾奉詔討賊不幸部曲叛散欲入朝自訴又為紹榮所隔披猖至此吾本無它心諸君遽爾見推殊非相悉願勿言也革等固請嗣源不許李紹榮欲犇河中就永王存覇從兵稍散庚寅至平陸止餘數騎為人所執折足送洛陽存霸亦帥衆千人棄鎮犇晉陽辛卯魏王繼岌至興平聞洛陽亂復引兵而西謀保據鳯翔向延嗣至鳯翔以莊宗之命誅李紹琛初莊宗命吕鄭二内養在晉陽一監兵一監倉庫自留守張憲以下皆承應不暇及鄴都有變又命汾州刺史李彦超為北都巡檢彦超彦卿之兄也莊宗既殂推官河間張昭逺勸張憲奉表勸進憲曰吾一書生自布衣至服金紫皆出先帝之恩豈可偷生而不自愧乎昭逺泣曰此古人所行公能行之忠義不朽矣有李存沼者莊宗之近屬自洛陽犇晉陽矯傳莊宗之命隂與二内養謀殺憲及彦超據晉陽拒守彦超知之密告憲欲先圖之憲曰僕受先帝厚恩不忍為此徇義而不免於禍乃天也彦超謀未决壬辰夜軍士共殺二内養及存沼於牙城因大掠逹旦憲聞變出犇忻州會嗣源移書至彦超號令士卒城中始安遂權知太原軍府百官上牋請嗣源監國嗣源乃許之甲午入居興聖宫始受百官班見下令稱教百官稱之曰殿下莊宗後宫存者猶千餘人宣徽使選其美小者數百獻於監國監國曰奚用此為對曰宫中職掌不可闕也監國曰宫中職掌宜諳故事此輩安知之乃悉用老舊之人補之其少年者皆出歸其親戚無親戚者任其所適蜀中所送宫人亦準此監國令所在訪求諸王通王存確雅王存紀匿民間或密告樞密使安重誨與李紹真謀曰今殿下既監國典䘮諸王宜早為之所以壹人心殿下性慈不可以聞乃密遣人就田舍殺之後月餘監國乃聞之切責重誨傷惜久之劉皇后與申王存渥犇晉陽在道與存渥私通存渥至晉陽李彦超不納走至風谷為其下所殺明日永王存霸亦至晉陽從兵逃散俱盡存霸削髮僧服謁李彦超願為山僧幸垂庇䕶軍士爭欲殺之彦超曰六相公來當奏取進止軍士不聽殺之於府門之碑下劉皇后為尼於晉陽監國使人就殺之薛王存禮及莊宗㓜子繼嵩繼潼繼蟾繼嶤遭亂皆不知其所終惟邕王存美以病風偏枯得免居干晉陽戊戌李紹榮至洛陽監國責之曰吾何負於爾而殺吾兒紹榮瞋目直視曰先帝何負於爾遂斬之復其姓名曰元行欽監國恐征蜀軍還為變以石敬瑭為陕州留後己亥以李從珂為河中留後監國下教數租庸使孔謙姧佞侵刻窮困軍民之罪而斬之凢謙所立苛歛之法皆罷之因廢租庸使及内句司依舊為鹽鐵戶部度支三司委宰相一人專判又罷諸道監軍使以莊宗由宦官亡國命諸道盡殺之魏王繼岌自興平退至武功宦者李從襲曰禍福未可知退不如進請王亟東行以救内難繼岌從之還至渭水權西都留守張籛已斷浮梁循水浮渡是日至渭南腹心吕知柔等皆已􅇡匿從襲謂繼岌曰時事已去王宜自圖繼岌徘徊流涕乃自伏於床命僕夫李環縊殺之任圜代將其衆而東監國命石敬瑭慰撫之軍士皆無異言先是監國命所親李冲為華州都監應接西師沖擅逼華州節度使史彦鎔入朝同州節度使李存敬過華州沖殺之并屠其家又殺西川行營部監李從襲彦鎔泣訴於安重誨重誨遣彦鎔還鎮召沖歸朝自監國入洛内外機事皆決於李紹真紹真擅收威勝節度使李紹欽太子少保李紹沖下獄欲殺之安重誨謂紹真曰温段罪惡皆在梁朝今殿下新平内難冀安萬國豈專為公報仇邪紹真由是稍沮辛丑監國教李紹冲紹欽復姓名為温韜段凝並放歸田里壬寅以孔循爲樞密使有司議即位禮李紹眞孔循以爲唐運已盡宜自建國號監國問左右何謂國號對曰先帝賜姓於唐爲唐復讎繼昭宗後故稱唐今梁朝之人不欲殿下稱唐耳監國曰吾年十三事獻祖獻祖以吾宗屬視吾猶子又事武皇垂三十年先帝垂二十年經綸攻戰未嘗不預武皇之基業則吾之基業也先帝之天下則吾之天下也安有同家而異國乎令執政更議吏部尚書李琪曰若改國號則先帝遂爲路人梓宫安所託乎不惟殿下不忘三世舊君吾曹爲人臣者能自安乎前代以旁支入繼多矣宜用嗣子柩前即位之禮衆從之丙午監國自興聖宫赴西宫服斬衰於柩前即皇帝位百官縞素既而御衮冕受冊百官吉服稱賀有司劾奏太原尹張憲委城之罪庚戌賜憲死任圜將征蜀兵二萬六千人至洛陽明宗慰撫之各令退營甲寅大赦改元量留後宫百人宦官三十人教坊百人鷹坊二十人御厨五十人自餘任從所適諸司使務有名無實者皆廢之分遣諸軍就食近畿以省饋運除夏秋稅省耗節度防禦等使正至端午降誕四節聽貢奉毋得歛百姓刺史以下不得貢奉選人先遭塗毁文書者令三銓止除詐偽餘復舊規宦官數百人竄匿山林或落髪為僧至晉陽者七十餘人三月詔北都指揮使李從温悉誅之從温帝之姪也丙子聽郭崇韜歸葬復朱友謙官爵兩家貨財田宅前籍没者皆歸之秋七月丙子葬光聖神閔孝皇帝于雍陵廟號莊宗二年春二月丙申以從馬直指揮使郭從謙為景州刺史既至遣使族誅之安重誨專權後唐明宗天成元年夏四月乙未以中門使安重誨為樞密使鎮州别駕張延朗為副使延朗開封人也仕梁為租庸吏徃􅊏巧善事權要以女妻重誨之子故重誨引之五月丙辰朔以太子賔客鄭珏工部尚書任圜並為中書侍郎同平章事圜仍判三司圜憂公如家簡拔賢俊杜絶僥倖期年之間府庫充實軍民皆足朝綱粗立圜每以天下為己任由是安重誨忌之帝目不知書四方奏事皆令安重誨讀之重誨亦不能盡通乃奏稱臣徒以忠實之心事陛下得典樞機今事粗能曉知至於古事非臣所及願倣前朝侍講侍讀近代直崇政樞密院選文學之臣與之共事以僃應對乃置端明殿學士乙亥以翰林學士馮道趙鳯為之戊寅以安重誨領山南東道節度使重誨以襄陽要地不可乏帥無宜兼領固辭許之六月安重誨恃恩驕横殿直馬延誤衝前導斬之於馬前御史大夫李琪以聞秋七月重誨白帝下詔稱延陵突重臣戒諭中外二年春正月安重誨以孔循少侍宫禁謂其諳練故事知朝士行能多聽其言朝廷議置相循意不欲用河北人先已薦鄭珏又薦太常卿崔恊任圜欲用御史大夫李琪鄭珏素惡琪故循力沮之謂重誨曰李琪非無文學但不亷耳宰相但得端重有器度者足以儀刑多士矣它日議於上前上問誰可相者重誨以恊對圜曰重誨未悉朝中人物為人所賣恊雖名家識字甚少臣既以不學忝相位柰何更益以恊為天下笑乎上曰宰相重任卿輩更審議之吾在河東時見馮書記多才博學與物無競此可相矣既退孔循不揖拂衣徑去曰天下事一則任圜二則任圜圜何者使崔恊暴死則已不死會須相之因稱疾不朝者數日上使重誨諭之方入重誨私謂圜曰今方乏人恊且僃貟可乎圜曰明公捨李琪而相崔恊是猶棄蘇合之丸取蛣蜣之轉也循與重誨共事日短琪而譽恊癸亥竟以端明殿學士馮道及崔恊並為中書侍郎同平章事恊邠之曾孫也己卯加樞宻使安重誨兼侍中孔循同平章事任圜性剛急且恃與帝有舊勇於敢為權倖多疾之舊制館劵出於戸部夏五月安重誨請從内出與圜爭於上前徃復數四聲色俱厲上退朝宫人問上適與重誨論事為誰上曰宰相宫人曰妾在長安宫中未嘗見宰相樞宻奏事敢如是者蓋輕大家耳上愈不悦卒從重誨議圜因求罷三司詔以樞宻承㫖孟鵠充三司副使權判鵠魏州人也六月丙戌門下侍郎同平章事任圜罷守太子少保秋七月任圜請致仕居磁州許之九月丙寅以樞􅁡使孔循兼東都留守冬十月或謂安重誨曰失職任外之人乗賊未破或能為患不如除之重誨以為然奏遣使賜任圜死端明殿學士趙鳯哭謂重誨曰任圜義士安肯為逆公濫刑如此何以賛國使者至磁州圜聚其族酣飲然後死神情不撓三年樞宻使同平章事孔循性狡佞安重誨親信之帝欲為皇子娶重誨女循謂重誨曰公職居近宻不冝復與皇子為昬重誨辭之久之或謂重誨曰循善離間人不可置之宻地循知之隂遣人結王徳妃求納其女徳妃請娶循女為從厚婦帝許之重誨大怒二月乙未以循同平章事充忠武節度使兼東都留守重誨性彊愎秦州節度使華温琪入朝請留闕下帝嘉之除左驍衛上將軍月别賜錢􅂖歲餘帝謂重誨曰温琪舊人宜擇一重鎮處之重誨對以無闕它日帝屢言之重誨愠曰臣累奏無闕惟樞密使可代耳帝曰亦可重誨無以對温琪聞之懼數月不出重誨惡成徳節度使同平章事王建立奏建立與王都交結有異志建立亦奏重誨專權求入朝面言其狀帝召之既至言重誨與宣徽使判三司張延朗結昬相表裏弄威福三月辛亥帝見重誨氣色甚怒謂曰今與卿一鎭自休息以王建立代卿張延朗亦除外官重誨曰臣披荆棘事陛下數十年值陛下龍飛承乏機宻數年間天下幸無事今一旦棄之外鎭臣願聞其罪帝不懌而起以語宣徽使朱弘昭弘昭曰陛下平日待重誨如左右手奈何以小忿棄之願垂三思帝尋召重誨慰撫之明日建立辭歸歸帝曰卿比奏欲入分朕憂今復去何之㑹門下侍郎兼刑部尚書同平章事鄭珏請致仕己未以珏爲左僕射致仕癸亥以建立爲右僕射兼中書侍郎同平章事判三司冬十一月庚寅皇子從厚納孔循女爲妃循因之得之大梁厚結王徳妃之黨乞留安重誨具奏其事力排之禮畢促令歸鎭四年皇子右衛將軍從璨性剛安重誨用事從璨不為之屈帝東廵以從璨為皇城使從璨與客宴於會節園酒酣戲登御榻重誨奏請誅之三月丙戌賜從璨死初朔方節度使韓洙卒弟澄為留後未幾定逺軍使李厈賔聚黨據保靜鎭作亂朔方不安冬十月丁酉韓澄遣使賫絹表乞朝廷命帥前磁州刺史康福善胡語上退朝多召入便殿訪以時事福以胡語對安重誨惡之常戒之曰康福汝但妄奏事會當斬汝福懼求外補重誨以靈州深入胡境為帥者多遇害戊戌以福為朔方河西節度使福見上涕泣辭之上命重誨為福更它鎮重誨曰福自刺史無功建節尚復何求且成命已行難以復改上不得已謂福曰重誨不肯非朕意也福辭行上遣將軍牛知柔河中都指揮使衛審等將兵萬人衛送之審徐州人也長興元年初王徳妃因安重誨得進常徳之帝性儉約及在位久宫中用度稍侈重誨每規諫妃取外庫錦造地衣重誨切諫引劉后為戒妃由是怨之宣武節度使苻習自恃宿將論議多抗安重誨重誨求其過失奏之夏四月丁酉詔習以太子太師致仕初帝在真定李從珂與安重誨飲酒爭言從珂毆重誨重誨走免既醒悔謝重誨終銜之至是重誨用事自皇子從榮從厚皆敬事不暇時從珂為河中節度使同平章事重誨屢短之於帝帝不聽重誨乃矯以帝命諭河東牙内指揮使楊彦温使逐之是日從珂出城閲馬彦温勒兵閉門拒之從珂使人扣門詰之曰吾待汝厚何為如是對曰彦温非敢負恩受樞宻院宣耳請公入朝從珂止于虞鄉遣使以狀聞使者至壬寅帝問重誨曰彦温安得此言對曰此姦人妄言耳宜速討之帝疑之欲誘致彦温訊其事除彦温綘州刺史重誨固請發兵擊之乃命西都留守索自通步軍都指揮使藥彦稠將兵討之帝令彦稠必生致彦温吾欲靣訊之召從珂詣洛陽從珂知為重誨所􅌟馳入自明加安重誨兼中書令李從珂至洛陽上責之使歸第絶朝請辛亥索自通等拔河中斬楊彦温癸丑傳首来獻上怒藥彦稠不生致深責之安重誨諷馮道趙鳯奏從珂失守冝加罪上曰吾兒為姦黨所傾未明曲直公輩何為發此言意不欲置之人間邪此皆非公輩意也二人惶恐而退它日趙鳯又言之上不應明日重誨自言之上曰朕昔為小校家貧賴此小兒拾馬糞自贍以至今日為天子曾不能庇之邪卿欲如何處之於卿為便重誨曰陛下父子之間臣何敢言惟陛下裁之上曰使閑居私第亦可矣何用復言丙辰以索自通為河中節度使自通至鎮承重誨㫖籍軍府甲仗數上之以為從珂私造頼王徳妃居中保䕶從珂由是得免士大夫不敢與從珂徃来惟禮部郎中史館修撰吕琦居相近時徃見之從珂毎有奏請皆咨􅄾而後行安重誨言昭義節度使王建立過魏州有揺衆之語五月丙寅制以太傅致仕秋八月乙未捧聖軍使李行德十將張儉引告密人邊彦温告安重誨發兵云欲自討淮南又引占相者問命帝以問侍衛都指揮使安從進藥彦稠二人曰此姦人欲離間陛下勳舊耳重誨事陛下三十年幸而冨貴何苦謀反臣等請以宗族保之帝乃斬彦温召重誨慰撫之君臣相泣壬寅趙鳯奏竊聞近有姦人誣䧟大臣揺國柱石行之未盡帝乃收李行徳張儉皆族之安重誨久專大權中外惡之者衆王徳妃及武徳使孟漢瓊浸用事數短重誨於上九月重誨内憂懼表解機務上曰朕無間於卿誣罔者朕既誅之矣卿何為爾甲戌重誨復靣奏曰臣以寒賤致位至此忽為人誣以反非陛下至明臣無種矣由臣才薄任重恐終不能鎮浮言願賜一鎮以全餘生上不許重誨求之不已上怒曰聽卿去朕不患無人前成徳節度使范延光勸上留重誨且曰重誨去誰能代之上曰卿豈不可延光曰臣受驅策日淺且才不逮重誨何敢當此上遣孟漢瓊詣中書議重誨事馮道曰諸公果愛安令宜解其樞務爲便趙鳯曰公失言乃奏大臣不可輕動甲申以范延光爲樞密使安重誨如故十二月天雄節度使石敬瑭征蜀安重誨請自督戰既行石敬瑭累表奏論蜀不可伐上頗然之二年初鳯翔節度使朱􅀪昭謟事安重誨連得大鎮重誨過鳯翔􅀪昭迎拜馬首館於府舍延入􅃦室妻子羅拜奉進酒食禮甚謹重誨為􅀪昭泣言讒人交搆幾不免頼主上明察得保宗族重誨既去􅀪昭即奏重誨怨望有惡言不可令至行營恐奪石敬瑭兵柄又遺敬瑭書言重誨舉措孟浪若至軍前恐將士疑駭不戰自潰宜逆止之敬瑭大懼即上言重誨至恐人情有變宜急徵還宣徽使孟漢瓊自西方還亦言重誨過惡有詔召重誨還春二月安重誨至三泉得詔亟歸過鳯翔朱􅀪昭不内重誨懼馳騎而東辛丑以樞宻使兼中書令安重誨為䕶國節度使趙鳯言於上曰重誨陛下家臣其心終不叛主但以不能周防為人所讒陛下不察其心重誨死無日矣上以為朋黨不恱三月帝既解安重誨樞務乃召李從珂泣謂曰如重誨意汝安得復見吾丙寅以從珂為左衛大將軍䕶國節度使兼中書令安重誨内不自安表請致仕閏五月庚寅制以太子太師致仕是日其子崇賛崇緒逃犇河中壬辰以保義節度使李從璋為䕶國節度使甲午遣步軍指揮使藥彦稠將兵趣河中安崇贊等至河中重誨驚曰汝安得來既而曰吾知之矣此非渠意為人所使耳若以死徇國夫復何言乃執二子表送詣闕明日有中使至見重誨慟哭久之重誨問其故中使曰人言令公有異志朝廷已遣藥彦稠將兵至矣重誨曰吾受國恩死不足報敢有異志更煩國家發兵貽主上之憂罪益重矣崇賛等至陕有詔繫獄皇城使翟光鄴素惡重誨帝遣詣河中察之曰重誨果有異志則誅之光鄴至河中李從璋以甲士圍其第自入見重誨拜于庭下重誨驚降階答拜從璋奮檛擊其首妻張氏驚救亦檛殺之奏至己亥下詔以重誨離間孟知祥董璋錢鏐為重誨罪又誣其欲自擊淮安以圖兵柄遣元隨竊二子歸本道并二子誅之六月乙丑復以李從珂同平章事充西都留守秦王之亂兩王篡弒附後唐明宗天成元年冬十二月庚子以皇子從榮為天雄節度使同平章事二年春正月癸酉以皇子從厚同平章事充河南尹判六軍諸衛事從厚從榮之母弟也從榮聞之不恱秋九月帝謂樞密使安重誨曰從榮左右有矯宣朕㫖令勿接儒生恐弱人志氣者朕以從榮年少臨大藩故擇名儒使輔導之今姧人所言乃如此欲斬之重誨請嚴戒而已三年夏四月以鄴都留守從榮為河東節度使北都留守以客省使太原馮贇爲副留守夾馬都指揮使新平楊思權爲步軍都指揮使以佐之丙戌以樞密使安重誨兼河南尹以河南尹從厚爲宣武節度使仍判六軍諸衛事冬十二月河東節度使北都留守從榮年少驕很不親政務帝遣左右素與從榮善者往與之處使從容諷導之其人私謂從榮曰河南相公恭謹好善親禮端士有老成之風相公齒長宜自策勵勿令聲問丗河南之下從榮不恱退告步軍都指揮使楊思權曰朝廷之人皆推從厚而短我我其廢乎思權曰相公手握彊兵且有思權在何憂因勸從榮多募部曲繕甲兵隂為自固之僃又謂帝左右曰君每譽弟而抑其兄我輩豈不能助之邪其人懼以告副留守馮贇贇詣密奏之帝召思權詣闕以從榮故亦弗之罪也四年春正月馮贇入為宣徽使謂執政曰從榮剛僻而輕易宜選重徳輔之夏四月壬子以皇子從榮為河南尹判六軍諸衛事從厚為河東節度使北都留守長興元年秋八月立皇子從榮為秦王丙辰立從厚為宋王三年秦王從榮喜為詩聚浮華之士髙輦等於幕府與相唱和頗自矜伐每置酒輙令僚屬賦詩有不如意者面毁裂抵棄冬十月壬子從榮入謁帝語之曰吾雖不知書然喜聞儒生講經義開益人智思吾見莊宗好為詩將家子文非素習徒取人竊笑汝勿效也秦王從榮為人鷹視輕佻峻急既判六軍諸衛事復參朝政多驕縱不法初安重誨為樞密使上專屬任之從榮及宋王從厚自襁褓與之親狎雖典兵常為重誨所制畏事之重誨死王淑妃與宣徽使孟漢瓊宣傳帝命范延光趙延夀為樞密使從榮皆輕侮之河陽節度使同平章事石敬瑭兼六軍諸衛副使其妻永寧公主與從榮異母素相憎疾從榮以從厚聲名出已右尤忌之從厚善以卑弱奉之故嫌隙不外見石敬瑭不欲與從榮共事常思外補以避之范延光趙延夀亦慮及禍屢辭機要請與舊臣迭為之上不許會契丹欲入冦上命擇帥臣鎮河東延光延夀皆曰當今帥臣可徃者獨石敬瑭康義誠耳敬瑭亦願行上即命除之既受詔不落六軍副使敬瑭復辭上乃以宣徽使朱􅀪昭知山南東道代義誠詣闕四年春正月戊子加秦王從榮守尚書令兼侍中夏四月言事者請為親王置師傅宰相畏秦王從榮不敢除人請令王自擇秦王府判官太子詹事王居敏薦兵部侍郎劉瓉於從榮從榮表請之癸丑以瓉為祕書監秦王傅前襄州支使山陽魚崇逺為記室瓉自以左遷泣訴不得免王府參佐皆新進少年輕鋭謟䛕瓉獨從容規諷從榮不恱瓉雖為傅從榮一槩以僚屬待之瓉有難色從榮覺之自是戒門者勿為通月聽一至府或竟日不召亦不得食五月戊寅立皇子從珂為潞王秋八月太僕少卿致仕何澤見上寢疾秦王從榮權勢方盛冀已復進用表請立從榮為太子上覽表泣下私謂左右曰羣臣請立太子朕當歸老太原舊第耳不得已丙戌詔宰相樞密使議之丁卯從榮見上言曰竊聞有姦人請立臣為太子臣㓜少且願學治軍民不願當此名上曰羣臣所欲也從榮退見范延光趙延夀曰執政欲以吾為太子是欲奪我兵柄幽之東宫耳延光等知上意且懼從榮之言即具以白上辛未制以從榮為天下兵馬大元帥九月秦王從榮請嚴衛捧聖步騎兩指揮為牙兵毎入朝從數百騎張弓挾矢馳騁衢路令文士試草檄淮南書陳已將廓清海内之意從榮不快於執政私謂所親曰吾一旦南面必族之范延光趙延夀懼屢求外補以避之上以為見已病而求去甚怒曰欲去自去奚用表為齊國公主復為延夀言於禁中云延夀實有疾不堪機務丙申二人復言於上曰臣等非敢憚勞願與勲舊迭為之亦不敢俱去願聽一人先出若新人不稱職復召臣臣即至矣上乃許之戊戌以延夀為宣武節度使以山南東道節度使朱􅀪昭為樞宻使同平章事制下􅀪昭復辭上叱之曰汝輩皆不欲在吾側蓄養汝輩何為􅀪昭乃不敢言辛丑詔大元帥從榮位在宰相上冬十月范延光屢因孟漢瓊王淑妃以求出庚申以延光為成徳節度使以馮贇為樞宻使帝以親軍都指揮使河陽節度使同平章事康義誠為朴忠親任之時要近之官多求出以避秦王之禍義誠度不能自脫乃令其子事秦王務以恭順持兩端冀得自全十一月甲戌上餞范延光酒罷上曰卿今逺去事冝盡言對曰朝廷大事願陛下與内外輔臣參决勿聽羣小之言遂相泣而别時孟漢瓊用事附之者共為朋黨以蔽惑上聽故延光言及之戊子帝疾復作己丑大漸秦王從榮入問疾帝俛首不能舉王淑妃曰從榮在此帝不應從榮出聞宫中皆哭從榮意帝已殂明旦稱疾不入是夕帝實小愈而從榮不知從榮自知不為時論所與恐不得為嗣與其黨謀欲以兵入侍先制權臣辛卯從榮遣都押牙馬處鈞謂朱􅀪昭馮贇曰吾欲帥牙兵入宫中侍疾且備非常當止於何所二人曰王自擇之既而私於處鈞曰主上萬福王宜竭心忠孝不可妄信人浮言從榮怒復遣處鈞謂二人曰公輩殊不愛家族邪何敢拒我二人患之入告王淑妃及宣徽使孟漢瓊咸曰兹事不得康義誠不可濟乃召義誠謀之義誠竟無言但曰義誠將校耳不敢預議惟相公所使􅀪昭疑義誠不欲衆中言之夜邀至私第問之其對如初壬辰從榮自河南府常服將步騎千人陳於天津橋是日黎明從榮遣馬處鈞至馮贇第語之曰吾今日決入且居興聖宫公輩各有宗族處事亦宜詳允禍福在須􅁷耳又遣處鈞詣康義誠義誠曰王來則奉迎贇馳入右掖門見􅀪昭義誠漢瓊及三司使孫岳方聚謀於中興殿門外贇具道處鈞之言因讓義誠曰秦王言禍福在須􅁷其事可知公勿以兒在秦府左右顧望主上㧞擢吾輩自布衣至將相苟使秦王兵得入此門置主上何地吾輩尚有遺種乎義誠未及對監門白秦王已將兵至端門外漢瓊拂衣起曰今日之事危及君父公猶顧望澤利邪吾何愛餘生當自帥兵拒之耳即入殿門􅀪昭贇隨之義誠不得已亦隨之入漢瓊見帝曰從榮反兵已攻端門須􅁷入宫則大亂矣宫中相顧號哭帝曰從榮何苦乃爾問􅀪昭等有諸對曰有之適已令門者闔門矣帝指天泣下謂義誠曰卿自處置勿驚百姓控鶴指揮使李重吉從珂之子也時侍側帝曰吾與爾父冒矢石定天下數脱吾於厄從榮輩得何力今乃為人所教為此悖逆我固知此曹不足付大事當呼爾父授以兵柄耳汝為我部閉諸門重吉即帥控鶴兵守宫門孟漢瓊被甲乗馬召馬軍都指揮使朱洪實使將五百騎討從榮從榮方據胡床坐橋上遣左右召康義誠端門已閉叩左掖門從門隙中窺之見朱洪實引騎兵北來走白從榮從榮大驚命取鐵掩心擐之坐調弓矢俄而騎兵大至從榮走歸府僚佐皆䑕匿牙兵掠嘉善坊潰去從榮與妃劉氏匿牀下皇城使安從益就斬之并殺其子以其首獻初孫岳頗得預内廷密謀馮朱患從榮狼伉岳嘗為之極言禍福之歸康義誠恨之至是乗亂宻遣騎士射殺之帝聞從榮死悲駭幾落御榻絶而復蘇者再由是疾復劇從榮一子尚㓜養宫中諸將請除之帝泣曰此何罪不得已竟與之癸巳馮道帥羣臣入見帝於雍和殿帝兩泣嗚咽曰吾家事至此慙見卿等時宋王從厚為天雄節度使甲午遣孟漢瓊徵從厚且權知天雄軍府事丙申追廢從榮為庶人執政共議從榮官屬之罪馮道曰從榮所親者髙輦劉陟王説而已任賛到官纔半月王居敏司徒詡在病告巳半年豈豫其謀居敏尤為從榮所惡昨舉兵向闕之際與輦陟並轡而行指日景曰來日及今已誅王詹事矣自非與之同謀者豈得一切誅之乎朱􅀪昭曰使從榮得入光政門賛等當如何任使而吾輩猶有種乎且首從差一等耳今首已孥戮而從皆不問主上能不以吾輩為庇姦人乎馮贇力事之始議流貶時諮議髙輦已伏誅丁酉元帥府判官兵部侍郎任賛祕書監兼王傅劉瓉友蘇瓉記室魚崇逺河南少尹劉陟判官司徒詡推官王説等八人並長流河南巡宫李澣江文蔚等六人勒歸田里六軍判官太子詹事王居敏推官郭晙並貶官澣回之族曾孫詡貝州人文蔚建安人也文蔚犇吳徐知誥厚禮之初從榮失道六軍判官司諫郎中趙逺諫曰大王地居上嗣當勤修令徳柰何所為如是勿謂父子至親為可恃獨不見恭世子戾太子乎從榮怒出為涇州判官及從榮敗逺以是知名逺字上交幽州人也戊戌帝殂帝性不猜忌與物無競登極之年已踰六十每夕於宫中焚香祝天曰某胡人因亂為衆所推願天早生聖人為生民主在位年糓屢豐兵革罕用校於五代粗為小康辛丑宋王至洛陽十二月癸卯朔始發明宗䘮宋王即皇帝位秦王從榮既死朱洪實妻入宫司衣王氏與之語及秦王王氏曰秦王為人子不在左右侍疾致人歸禍是其罪也若云大逆則厚誣矣朱司徒最受王恩當時不為之辨惜哉洪實聞之大懼與康義誠以其語白閔帝且言王氏私於從榮為之詗宫中事辛亥賜王氏死事連王淑妃淑妃素厚於從榮帝由是疑之潞王清泰元年春正月戊寅閔帝大赦改元應順壬午加河陽節度使兼侍衛都指揮使康義誠兼侍中判六軍諸衛事朱􅀪昭馮贇忌侍衛馬軍都指揮使寧國節度使安彦威侍衛步軍都指揮使忠正節度使張從賔甲申出彦威䕶國節度使以捧聖馬軍都指揮使朱洪實代之出從賔為彰義節度使以嚴衛步軍都指揮使皇甫遇代之彦威崞人遇真定人也戊子樞密使同平章事朱􅀪昭同中書門下二品馮贇河東節度使兼侍中石敬瑭並兼中書令贇以超遷太過堅辭不受己丑改兼侍中鳯翔節度使兼侍中潞王從珂與石敬瑭少從明帝征伐有功名得衆心朱􅀪昭馮贇位望素出二人下逺甚一旦執朝政皆忌之明宗有疾潞王屢遣其夫人入省侍及明宗殂潞王辭疾不來使臣至鳯翔者或自言伺得潞王隂事時潞王長子重吉爲控鶴都指揮使朱馮不欲其典禁兵己亥出爲亳州團練使潞王有女惠明爲尼在洛陽亦召入禁中潞王由是疑懼閏月丙午尊皇后爲皇太后甲寅以王淑妃爲太妃二月朱􅀪昭馮贇不欲石敬瑭久在太原且欲召孟漢瓊己卯徙成徳節度使范延光爲天雄節度使代漢瓊徙潞王從珂爲河東節度使兼北都留守徙石敬瑭爲成徳節度使皆不降制書但各遣使臣持宣監送赴鎮潞王既與朝廷猜阻朝廷又命洋王從璋權知鳯翔從璋性麤率樂禍前代安重誨鎮河中手殺之潞王聞其來尤惡之欲拒命則兵弱糧少不知所為謀於將佐皆曰主上富於春秋政事出於朱馮大王功名震主離鎮必無全理不可受也王問觀察判官滴河馬􅅌孫曰今道過京師當何向為便對曰君命召不俟駕臨䘮赴鎮又何疑焉諸人凶謀不可從也衆哂之王乃移檄鄰道言朱􅀪昭等乗先帝疾亟殺長立少專制朝權别踈骨肉動揺藩垣懼傾覆社稷今從珂將入朝以清君側之惡而力不能獨辦願乞靈鄰藩以濟之潞王以西都留守王思同當東出之道尤欲與之相結遣推官郝詡押牙朱廷乂等相繼詣長安説以利害餌以美妓不從則令就圖之思同謂將吏曰吾受明宗大恩今與鳯翔同反借使事成而榮猶為一時之叛臣况事敗而辱流千古之醜跡乎遂執詡等以狀聞時潞王使者多為鄰道所執不則依阿操兩端惟隴州防禦使相里金傾心附之遣判官薛文遇往来計事金并州人也朝廷議討鳯翔康義誠不欲出外恐失軍權請以王思同為統帥以羽林都指揮使侯益為行營馬步都虞候益知軍情將變辭疾不行執政怒之出為商州刺史辛卯以王思同為西面行營馬步軍都部署前靜難節度使藥彦稠副之前絳州刺史萇從簡為馬步都虞候嚴衛步軍左廂指揮使尹暉羽林指揮使楊思權等皆為偏禆暉魏州人也丁酉加王思同同平章事知鳯翔行府以䕶國節度使安彦威為西面行營都監思同雖有忠義之志而御軍無法潞王老於行陳將士徼幸富貴者心皆向之詔遣殿直楚匡祚執亳州團練使李重吉幽於宋州洋王從璋行至關西聞鳯翔拒命而還三月安彦威與山南西道張䖍釗武定孫漢韶彰義張從賔靜難康福等五節度使奏合兵討鳯翔漢韶李存進之子也乙卯諸道兵大集於鳯翔城下攻之克東西闗城城中死者甚衆丙辰復進攻城期於必取鳯翔城塹卑淺守備俱之衆心危急潞王登城泣謂外軍曰吾未冠從先帝百戰出入生死金創滿身以立今日之社稷汝曹從我目睹其事今朝廷信任讒臣猜忌骨肉我何罪而受誅乎因慟哭聞者哀之張䖍釗性褊急主攻城西南以白刃驅士卒登城士卒怒大詬反攻之䖍釗躍馬走免楊思權因大呼曰大相公吾主也遂帥諸軍解甲投兵請降於潞王自西門入以幅紙進潞王曰願王克京城日以臣為節度使勿以為防團潞王即書思權可邠寧節度使授之王思同猶未之知趣士卒登城尹暉大呼曰城西軍已入城受賞矣衆集棄甲投兵而降其聲震地日中亂兵悉入外軍亦潰思同等六節度使皆遁去潞王悉歛城中將吏士民之財以犒軍至於鼎釡皆估直以給之丁巳王思同藥彦稠等走至長安西京副留守劉遂雍閉門不内乃趣潼闗遂雍鄩之子也潞王建大將旗鼓整衆而東以孔目官虞城劉延朗為腹心潞王始憂王思同等併力據長安拒守至岐山聞劉遂雍不内思同甚喜遣使慰撫之遂雍悉出府庫之財於外軍士前至者即給賞令過比潞王至前軍賞遍皆不入城庚申潞王至長安遂雍迎謁率民財以充賞是日西面步軍都監王景從等自軍前犇還中外大駭帝不知所為謂康義誠等曰先帝棄萬國朕外守藩方當是之時為嗣者在諸公所取耳朕實無心與人爭國既承大業年在㓜冲國事皆委諸公朕於兄弟間不至榛梗諸公以社稷大計見告朕何敢違軍興之初皆自夸大以為冦不足平今事至於此何方可以轉禍朕欲自迎潞王以大位讓之若不免於罪亦所甘心朱􅀪昭馮贇大懼不敢對義誠欲悉以宿衛兵迎降為已功乃曰西師驚潰蓋主將失䇿耳今侍衛諸軍尚多臣請自往扼其衡要招集離散以圖後效幸陛下勿為過憂帝遣使召石敬瑭欲令將兵拒之義誠固請自行帝乃召將士慰諭空府庫以勞之許以平鳯翔人更賞二百緡府庫不足當以宫中服玩繼之軍士益驕無所畏忌負賜物揚言於路曰至鳯翔更請一分遣楚匡祚殺李重吉於宋州匡祚榜捶重吉責其家財又殺尼惠明初馬軍都指揮使朱洪實為秦王從榮所厚及朱􅀪昭為樞密使洪實以宗兄事之從榮勒兵天津橋洪實首為孟漢瓊擊從榮康義誠由是恨之辛酉帝親至左藏給將士金帛義誠洪實共論用兵利害洪實欲以禁軍固守洛陽曰如此冦亦未敢徑前然後徐圖進取可以萬全義誠怒曰洪實為此言欲反邪洪實曰公自欲反乃謂誰反其聲漸厲帝聞召而訊之二人訟於帝前帝不能辨其是非遂斬洪實軍士益憤怒壬戌潞王至昭應聞前軍獲王思同王曰思同雖失計然盡心所奉亦可嘉也癸亥至靈口前軍執思同以至王責讓之對曰思同起行間先帝擢之位至節將常愧無功以報大恩非不知附大王立得冨貴助朝廷自取禍殃但恐死之日無面目見先帝於泉下耳敗而釁鼓固其所也請早就死王為之改容曰公且休矣王欲宥之而楊思權之徒恥見其靣王之過長安尹暉盡取思同家資及妓妾屢言於劉延朗曰若留思同慮失士心屬王醉不待報擅殺思同及其妻子王醒怒延朗嗟惜者累日癸亥制以康義誠為鳯翔行營都招討使以王思同副之甲子潞王至華州獲藥彦稠囚之乙丑至閿鄉朝廷前後所發諸軍遇西軍皆迎降無一人戰者丙寅康義誠引侍衛兵發洛陽詔以侍衛馬軍指揮使安從進為京城巡檢從進已受潞王書濳布腹心矣是日潞王至靈寳䕶國節度使安彦威匡國節度使安重霸皆降惟保義節度使康思立謀固守陜城以俟康義誠先是捧聖五百騎戍陜西為潞王前鋒至城下呼城上人曰禁軍十萬已奉新帝爾輩數人奚為徒累一城人塗地耳於是捧聖卒爭出迎思立不能禁不得已亦出迎丁卯潞王至陜僚佐説王曰今大王將及京畿傳聞乗輿已播遷大王冝少留於此先移書慰安京城士庶王從之移書諭洛陽文武士庶惟朱􅀪昭馮贇兩族不赦外自餘勿有憂疑康義誠軍至新安所部將士自相結百什為羣棄甲兵爭先詣陜降纍纍不絶義誠至乾壕麾下纔餘數十人遇潞王候騎十餘人義誠解所佩弓劔為信因候騎請降於潞王戊辰閔帝聞潞王至陜義誠軍潰憂駭不知所為急遣中使召朱􅀪昭謀所向􅀪昭曰急召我欲罪之也赴井死安從進聞􅀪昭死殺馮贇於弟滅其族傳􅀪昭贇首於潞王帝欲犇魏州召孟漢瓊使詣魏州為先置漢瓊不應召單騎犇陜初帝在藩鎮愛信牙將慕容遷及即位以為控鶴指揮使帝將北度河密與之謀使帥部兵守􅀇武門是夕帝以五十騎出􅀇武門謂遷曰朕且幸魏州徐圖興復汝帥有馬控鶴從我遷曰生死從大家乃陽為團結帝既出即闔門不行己巳馮道等入朝及端門聞朱馮死帝已北走道及劉眗欲歸李愚曰天子之出吾輩不預謀今太后在宫吾輩當至中書遣小黄門取太后進止然後歸第人臣之義也道曰主上失守社稷人臣惟君是奉無君而入宫城恐非所冝潞王已處處張牓不若歸俟教令乃歸至天宫寺安從進遣人語之曰潞王倍道而来且至矣相公宜帥百官至榖水奉迎乃止於侍中召百官中書舍人盧導至馮道曰俟舍人久矣所急者勸進文書冝速具草導曰潞王入朝百官班迎可也設有廢立當俟太后教令豈可遽議勸進乎道曰事當務實導曰安有天子在外人臣遽以大位勸人者邪若潞王守節北靣以大義見責將何辭以對公不如帥百官詣宫門進名問安取太后進止則去就善矣道未及對從進屢遣人趣之曰潞王至矣太后太妃已遣中使迎勞矣安得百官無班道等即紛然而去既而潞王未至三相息於上陽門外盧導過於前道復召而語之導對如初李愚曰舍人之言是也吾輩之罪擢髮不足數康義誠至陜待罪潞王責之曰先帝晏駕立嗣在諸公今上亮隂政事出諸公何為不能終始䧟吾弟至此乎義誠大懼叩頭請死王素惡其為人未欲遽誅且宥之馬步都虞候萇從簡左龍武統軍王景戡皆為部下所執降於潞王東軍盡降潞王上牋於太后取進止遂自陜而東夏四月庚午朔未明閔帝至衛州東數里遇石敬瑭帝大喜問以社稷大計敬瑭曰聞康義誠西討何如陛下何為至此帝曰義誠亦叛去矣敬瑭俛首長歎數四曰衛州刺史王􅀪贄宿將習事請與圖之乃徃見􅀪贄問之􅀪贄曰前代天子播遷多矣然皆有將相侍衛府庫法物使羣下有所瞻仰今皆無之獨以五十騎自隨雖有忠義之心將若之何敬瑭還見帝於衛州驛以􅀪贄之言告弓箭庫使沙守榮犇洪進前責敬瑭曰公明宗愛壻冨貴共之共之憂患亦冝相恤今天子播越委計於公兾皆興復乃以此四者爲辭是直欲附賊賣天子耳守榮抽佩刀欲刺之敬瑭親將陳暉救之守榮與暉􅃲死洪進亦自刎敬瑭牙内指揮使劉知逺引兵入盡殺帝左右及從騎獨置帝而去敬瑭遂趣洛陽是日太后令内諸司至乾壕迎潞王王亟遣還洛陽初潞王罷河中歸私第王淑妃數遣孟漢瓊存撫之漢瓊自謂於王有舊恩至渑池西見王大哭欲有所陳王曰諸事不言可知仍自預從臣之列王即命斬於路隅壬申潞王至蔣橋百官班迎於路傳教以未拜梓宫未可相見馮道等皆上牋勸進王入謁太后太妃詣西宫伏梓宫慟哭自陳詣闕之由馮道帥百官班見拜王答拜道等復上牋勸進王立謂道等曰予之此行事非獲已俟皇帝歸闕園􅃦禮終當還守藩服群公遽言及此甚無謂也癸酉太后下令廢少帝為鄂王以潞王知軍國事權以書詔印施行百官詣至徳宫門待罪王命各復其位甲戌太后令潞王宜即皇帝位乙亥即位於柩前帝之發鳯翔也許軍士以入洛人賞錢百緡既至問三司使王玫以府庫之實對有數百萬在既而閲實金帛不過三萬兩匹而賞軍之費計應用五十萬緡帝怒玫請率京城民財以足數日僅得數萬緡帝謂執政曰軍不可不賞人不可不恤今將柰何執政請據屋為率無問士庶自居及僦者預借五月僦直從之王􅀪贄遷閔帝於州廨帝遣􅀪贄之子殿直巒徃酖之戊寅巒至衛州謁見閔帝問來故不對􅀪贄數進酒閔帝知其有毒不飲巒縊殺之閔帝性仁厚於兄弟敦睦雖遭秦王忌疾閔帝坦懐待之卒免於患及嗣位於潞王亦無嫌而朱􅀪昭孟漢瓊之徒横生猜間閔帝不能違以至禍敗焉孔妃尚在宫中王巒既還潞王使人謂之曰重吉輩何在遂殺妃并其四子閔帝之在衛州也惟磁州刺史宋令詢遣使問起居聞其遇害慟哭半日自經死己卯石敬瑭入朝乙酉改元大赦戊子斬河陽節度使判六軍諸衛兼侍中康義誠滅其族己丑誅藥彦稠庚寅釋王景戡萇從簡有司百方歛民財為得六萬帝怒下軍巡使獄晝夜督責囚繫滿獄貧者至自經赴井而軍士遊市肆皆有驕色市人聚詬之曰汝曹為王力戰立功良苦反使我輩鞭胷杖背出財為賞汝曹猶􅀭􅀭自得不愧天地乎是時竭左藏舊物及諸道貢獻乃至太后太妃器服簪珥皆出之纔及二十萬緡帝患之李專美夜直帝讓之曰卿名有才不能為我謀此留才安所施乎専美謝曰臣駑劣陛下擢任過分然軍賞不給非臣之責也竊思自長興之季賞賚亟行卒以是驕繼以山陵及出師帑藏遂涸雖有無窮之財終不能滿驕卒之心故陛下拱手於危困之中而得天下夫國之存亡不專繫於厚賞亦在修法度立紀綱陛下苟不改覆車之轍臣恐徒困百姓存亡未可知也今財力盡於此矣冝據所有均給之何必踐初言乎帝以為然壬辰詔禁軍在鳯翔歸命者自楊思權尹暉等各賜二馬一駝錢七十緡下至軍人錢二十緡其在京者各十緡軍士無厭猶怨望為謡言曰除去菩薩扶立生鐵以閔帝仁弱帝剛嚴有悔心故也丙申􅁙聖徳和武欽孝皇帝于徽陵廟號明宗帝衰絰䕶從至陵所宿焉契丹入冦後梁太祖開平元年夏五月契丹遣其臣袍笏梅老來通好帝遣太府少卿髙頎報之初契丹有八部部各有大人相與約推一人為王建旗鼓以號令諸部每三年則以次相代咸通末有習爾者為王土宇始大其後欽徳為王乗中原多故時入盗邊及阿保機為王尤雄勇五姓奚及七姓室韋逹靼咸役屬之阿保機姓邪律氏恃其疆不肯受代久之阿保機擊黄頭室韋還七部刼之於境上求如約阿保機不得已傳旗鼓且曰我為王九年得漢人多請帥種落居古漢城與漢人守之别自為一部七部許之漢城者故後魏滑鹽縣也地宜五榖有鹽池之利其後阿保機稍以兵擊滅七部復併為一國又北侵室韋女眞西取突厥故地擊奚滅之復立奚王而使契丹監其兵東北諸夷皆畏服之是歳阿保機帥衆三十萬寇雲州晉王與之連和面會東城約為兄弟延之帳中縱酒握手盡歡約以今冬共擊梁或勸晉王因其來可擒也王曰讎敵未滅而失信夷狄自亡之道也阿保機留旬日乃去晉王贈以金繒數萬阿保機留馬三千匹雜畜萬計以酬之阿保機既歸而背盟更附于梁晉王由是恨之二年夏五月己丑契丹王阿保機遣使隨髙頎入貢且求册命帝復遣司農卿渾特賜以手詔約共滅沙陁乃行封册均王貞明二年初燕人苦劉守光殘虐軍士多亡歸契丹及守光被圍於幽州其北邊士民多為契丹所掠契丹日益彊大契丹王阿保機自稱皇帝國人謂之天皇王以妻述律氏為皇后置百官至是改元神册述律后勇决多權變阿保機行兵御衆述律后常預其謀阿保機嘗度磧撃党項留述律后守其帳黄頭臭泊二室韋乗虚合兵掠之述律后知之勒兵以待其至奮擊大破之由是名震諸夷述律后有母有姑皆踞榻受其拜曰吾惟拜天不拜人也晉王方經營河北欲結契丹為援常以叔父事阿保機以叔母事述律后劉守光末年衰困遣參軍韓延徽求援於契丹契丹主怒其不拜留之使牧馬於野延徽幽州人有智略頗知屬文述律后言於契丹主曰延徽能守節不屈此今之賢者柰何辱以牧圉宜禮而用之契丹主召延徽與語恱之遂以為謀主舉動訪焉延徽始教契丹建牙開府築城郭立市里以處漢人使各有配偶墾蓺荒田由是漢人各安生業逃亡者益少契丹威服諸國延徽有助焉頃之延徽逃犇晉陽晉王欲置之幕府掌書記王緘疾之延徽不自安求東歸省母過真定止於鄉人王徳明家徳明問所之延徽曰今河北皆為晉有當復詣契丹耳徳明曰叛而復往得無取死乎延徽曰彼自吾來如䘮手目今往詣之彼手目復完安肯害我既省母遂復入契丹契丹主聞其至大喜如自天而下拊其背曰曏者何往延徽曰思母欲告歸恐不聽故私歸耳契丹主待之益厚及稱帝以延徽為相累遷至中書令晉王遣使至契丹延徽寓書於晉王叙所以北去之意且曰非不戀英主非不思故鄉所以不留正懼王緘之讒耳因以老母為託且曰延徽在此契丹必不南牧故終同光之世契丹不深入為㓂延徽之力也三年晉王使其弟威塞軍防禦使存矩募兵存矩得五百騎自部送之以青州盧文進為裨將兵叛殺存矩文進帥其衆奔契丹初幽州北七百里有渝闗下有渝水通海自關東北循海有道道狭處纔數尺旁皆亂山髙峻不可越比至進牛口舊置八防禦軍募土兵守之田租皆供軍食不入於葪幽州歳致繒纊以供戰士衣每歲早穫清野堅壁以待契丹契丹至則閉壁不戰俟其去選驍勇據隘邀之契丹常失利走土兵皆自為田園力戰有功則賜勲加賞由是契丹不敢輕入冦及周徳威為盧龍節度使恃勇不修邊備遂失渝闗之險契丹每芻牧於營平之間徳威又忌幽州舊将有名者往往殺之吳王遣使遺契丹主以猛火油曰攻城以此油然火焚樓櫓敵以水沃之火愈熾契丹主大喜即選騎三萬欲攻幽州述律后哂之曰豈有試油而攻一國乎因指帳前樹謂契丹主曰此樹無皮可以生乎契丹主曰不可述律后曰幽州城亦猶是矣吾但以三千騎伏其旁掠其四野使城中無食不過數年城自困矣何必如此躁動輕舉萬一不勝為中國笑吾部落亦解體矣契丹主乃止三月盧文進引契丹兵急攻新州刺史安金全不能守棄城走文進以其部將劉殷為刺史使守之晉王使周徳威合河東鎮定之兵攻之旬日不克契丹主帥衆三十萬救之徳威衆寡不敵大為契丹所敗犇歸契丹乗勝進圍幽州聲言有衆百萬氊車毳幕彌漫山澤盧文進教之攻城為地道晝夜四面俱進城中宂地然膏以邀之又為土山以臨城城中鎔銅以灑之日殺千計而攻之不止周徳威遣間使詣晉王吿急王方與梁相持河上欲分兵則兵少欲勿救恐失之憂形於色謀於諸將獨李嗣源李存審閻寳勸王救之王喜曰昔太宗得一李靖猶擒頡利今吾有猛將三人復何憂哉存審寳以為虜無輜重勢不能久俟其野無所掠食盡自還然後踵以擊之李嗣源曰周徳威社稷之臣今幽州朝夕不保恐變生於中何暇待虜之衰臣請身為前鋒以赴之王曰公言是也即日命治兵夏四月晉王命嗣源將兵先進軍于淶水閻寳以鎮定之兵繼之秋七月晉王以李嗣源閻寳兵少未足以敵契丹辛未更命李存審將兵益之八月契丹圍幽州且二百日城中危困李嗣源閻寳李存審歩騎七萬會于易州存審曰虜衆吾寡虜多騎吾多步若平原相遇虜以萬騎蹂吾陳吾無遺類矣嗣源曰虜無輜重吾行必載糧食自隨若平原相遇虜抄吾糧吾不戰自潰矣不若自山中潛行趣幽州與城中合勢若中道遇虜則據險拒之甲午自易州北行庚子踰大房嶺循澗而東嗣源與養子從珂將三千騎為前鋒距幽州六十里與契丹遇契丹驚却晉兵翼而隨之契丹行山上晉兵行澗下每至谷口契丹輙邀之嗣源父子力戰乃得進至山口契丹以萬餘騎遮其前將士失色嗣源以百餘騎先進免胄揚鞭胡語謂契丹曰汝無故犯我疆埸晉王命我將百萬衆直抵西樓滅汝種族因躍馬奮檛三入其陳斬契丹酋長一人後軍齊進契丹兵却晉兵始得出李存審命步兵伐木為鹿角人持一枝止則成寨契丹騎環寨而過寨中發萬弩射之流矢蔽日契丹人馬死傷塞路將至幽州契丹列陳待之存審命步兵陳於其後戒勿動先令羸兵曳柴然草而進煙塵蔽天契丹莫測其多少因鼓譟合戰存審乃趣後陳起乗之契丹大敗席卷其衆自北山去委棄車帳鎧仗羊馬滿野晉兵追之俘斬萬計辛丑嗣源等入幽州周徳威見之握手流涕契丹以盧文進為幽州留後其後又以為盧龍節度使文進常居平州帥奚騎歳入北邊殺掠吏民晉人自瓦橋運糧輸薊城雖以兵援之不免抄掠契丹每入冦則文進帥漢卒為鄉導盧龍巡屬諸州為之殘􅁦四年初契丹主之弟撒刺阿撥號北大王謀作亂於其國事覺契丹主數之曰汝與吾如手足而汝興此心我若殺汝則與汝何異乃囚之朞年而釋之撒剌阿撥帥其衆犇晉晉王厚遇之養為假子任為刺史胡柳之戰以其妻子来犇龍徳元年趙王鎔養子張文禮既殺趙王遣間使因盧文進求援於契丹唐㓕梁事見後契丹主既許盧文進出兵王郁又説之曰鎮州美女如雲金帛如山天皇王速往則皆已物也不然為晉王所有矣契丹主以為然悉發所有之衆而南述律后諫曰吾有西樓羊馬之富其樂不可勝窮也何必勞師逺出以乗危徼利乎吾聞晉王用兵天下莫敵脱有危敗悔之何及契丹主不聽十二月辛未攻幽州李紹宏嬰城自守契丹長驅而南圍涿州旬日拔之擒刺史李嗣弼進冦定州王都告急于晉晉王自鎭州將親軍五千救之遣神武都指揮使王思同將兵戍狼山之南以拒之二年春正月甲午晉王至新城南􅃸騎白契丹前鋒宿新樂涉沙河而南將士皆失色士卒有亡去者主將斬之不能止諸將皆曰虜傾國而來吾衆寡不敵又聞梁冦内侵冝且還師魏州以救根本或請釋鎮州之圍西入井陘避之晉王猶豫未决中門使郭崇韜曰契丹為王郁所誘本利貨財而來非能救鎮州之急難也王新破梁兵威振夷夏契丹聞王至心沮氣索茍挫其前鋒遁走必矣李嗣昭自潞州至亦曰今彊敵在前吾有進無退不可輕動以揺人心晉王曰帝王之興自有天命契丹其如我何吾以數萬之衆平定山東今遇此小虜而避之何面目以臨四海乃自帥鐵騎五千先進至新城北半出桑林契丹萬餘騎見之驚走晉王分軍爲二逐之行數十里獲契丹主之子時沙河橋狭冰薄契丹䧟溺死者甚衆是夕晉王宿新樂契丹主車帳在定州城下敗兵至契丹舉衆退保望都晉王至定州王都迎謁於馬前宴於府第請以愛女妻王子繼岌戊戌晉王引兵趣望都契丹逆戰晉王以親軍千騎先進遇奚酋秃餒五千騎爲其所圍晉王力戰出入數四自午至申不解李嗣昭聞之引三百騎横擊之虜退王乃得出因縱兵奮擊契丹大敗逐北至易州會大雪彌旬平地數尺契丹人馬無食死者相屬於道契丹主舉手指天謂盧文進曰天未令我至此乃北歸晉王引兵躡之隨其行止見其野宿之所布藁於地回環方正皆如編翦雖去無一枝亂者歎曰虜用法嚴乃能如是中國所不及也晉王至幽州使二百騎躡契丹之後曰虜出境即還騎恃勇追擊之悉為所擒惟兩騎自它道走免契丹主責王郁縶之以歸自是不聽其謀晉代州刺史李嗣肱將兵定媯儒武等州授山北都團練使是歲契丹改元天贊後唐莊宗同光元年春三月契丹冦幽州晉王問帥於郭崇韜崇韜薦横海節度使李存審時存審卧病己卯徙存審為盧龍節度使輿疾赴鎮以蕃漢馬步副緫管李嗣源領横海節度使夏閏四月甲午契丹侵幽州至易定而還二年春正月甲辰幽州奏契丹入寇至瓦橋以天平軍節度使李嗣源為北面行營都招討使陜州留後霍彦威副之宣徽使李紹宏為監軍將兵救幽州契丹出塞召李嗣源旋師命泰寧節度使李紹欽澤州刺史董璋戍瓦橋李存審奏契丹去復得新州三月乙巳鎮州言契丹將犯塞詔横海節度使李紹斌北京左廂馬軍指揮使李從珂帥騎兵分道備之天平節度使李嗣源屯邢州紹斌本姓趙名行實幽州人也庚戌幽州奏契丹冦新城夏五月幽州言契丹將入冦甲寅以横海節度使李紹斌充東北面行營招討使將大軍度河而北契丹屯幽州東南城門之外虜騎充斥饋運多為所掠秋七月契丹恃其彊盛遣使就帝求幽州以處盧文進時東北諸夷皆役屬契丹惟勃海未服契丹主謀入冦恐勃海掎其後乃先舉兵擊勃海之遼東遣其將秃餒及盧文進據營平等州以擾燕地九月契丹攻勃海無功而還丁巳幽州言契丹入冦冬十月易定言契丹入冦十二月己巳命宣武節度使李嗣源將宿衛兵三萬七千人赴汴州遂如幽州禦契丹三年春正月契丹冦幽州二月上以契丹爲憂與郭崇韜謀以威名宿將零落殆盡李紹斌位望素輕欲徙李嗣源鎮真定爲紹斌聲援崇韜深以爲便明宗天成元年春正月契丹主擊女真及勃海恐唐乗虚襲之戊寅遣梅老鞋里来修好秋七月契丹主攻勃海拔其夫餘城更命曰東丹國命其長子突欲鎮東丹號人皇王以次子徳光守西樓號元帥太子帝遣供奉官姚坤告哀於契丹契丹主聞莊宗為亂兵所害慟哭曰我朝定兒也吾方欲救之以勃海未下不果徃致吾兒及此哭不已虜言朝定猶華言朋友也又謂坤曰今天子聞洛陽有急何不救對曰地逺不能及曰何故自立坤為言帝所以即位之由契丹主曰漢兒喜飾説毋多談突欲侍側曰牽牛以蹊人之田而奪之牛可乎坤曰中國無主唐天子不得已而立亦猶天皇王初有國豈彊取之乎契丹主曰理當然又聞吾兒專好聲色遊畋不恤軍民宜其及此我自聞之舉家不飲酒散遣伶人解縱鷹犬若亦效吾兒所為行自亡矣又曰吾兒與我雖世舊然屢與我戰爭於今天子則無怨足以修好若與我大河之北吾不復南侵矣坤曰此非使臣之所得專也契丹主怒囚之旬餘復召之曰河北恐難得得鎮定幽州亦可也給紙筆趣令為狀坤不可欲殺之韓延徽諌乃復囚之辛巳契丹主阿保機卒於夫餘城述律后召諸將及酋長難制者之妻謂曰我今寡居汝不可不効我又集其夫泣問曰汝思先帝乎對曰受先帝恩豈得不思曰果思之冝徃見之遂殺之八月丁亥契丹述律后使少子安端少君守東丹與長子突欲奉契丹主之喪將其衆發夫餘城庚子幽州言契丹冦邊命齊州防禦使安審通將兵禦之九月契丹述律后愛中子徳光欲立之至西樓命與突欲俱乗馬立帳前謂諸酋長曰二子吾皆愛之莫知所立汝曹擇可立者執其轡酋長知其意爭執徳光轡讙躍曰願事元帥太子后曰衆之所欲吾安敢違遂立之為天皇王突欲愠帥數百騎欲犇唐為邏者所遏述律后不罪遣歸東丹天皇王尊述律后為太后國事皆决焉太后復納其姪為天皇王后天皇王性孝謹母病不食亦不食侍於母前應對或不稱㫖母􅀭眉視之輙懼而趨避非復召不敢見也以韓延徽為政事令聽姚坤歸復命遣其臣阿思没骨餒来告哀冬十月庚子幽州奏契丹盧龍節度使盧文進來犇初文進爲契丹守平州帝即位遣閒使說之以易代之後無復嫌怨文進所部皆華人思歸乃殺契丹戍平州者帥其衆十餘萬車帳八千乗来犇十二月癸巳以盧文進爲義成節度使同平章事二年秋九月壬申契丹來請修好遣使報之三年春正月契丹䧟平州初義武節度使兼中書令王都鎮易定十餘年自除刺史以下官租賦皆贍本軍及安重誨用事稍以法制裁之帝亦以都簒父位惡之時契丹數犯塞朝廷多屯兵於幽易間大將徃來都隂為之備浸成猜阻都恐朝廷移之它鎮腹心和昭訓勸都為自全之計都乃求昏於盧龍節度使趙徳鈞又知成徳節度使王建立與安重誨有隙遣使結為兄弟隂與之謀復河北故事建立陽許而宻奏之都又以蠟書遺青徐潞益梓五帥離間之又遣人説北面副招討使歸徳節度使王晏球晏球不從乃以金遺晏球帳下使圖之不克四月癸巳晏球以都反狀聞詔宣徽使張延朗與北面諸將議討之庚子詔削奪王都官爵壬寅以王晏球為北面招討使權知定州行州事以横海節度使安審通為副招討使以鄭州防禦使張䖍釗為都監發諸道兵會討定州是日晏球攻定州拔其北闗城都以重賂求救於奚酋秃餒五月秃餒以萬騎突入定州晏球退保曲陽都與秃餒就攻之晏球與戰於嘉山下大破之秃餒以二千騎犇還定州晏球追至城門因進攻之得其西關城定州城堅不可攻晏球增修西闗城以為行府使三州民輸稅供軍食而守之王晏球聞契丹發兵救定州將大軍趣望都遣張延朗分兵退保新樂延朗遂之真定留趙州刺史朱建豐將兵修新樂城契丹已自它道入定州與王都夜襲新樂破之殺建豐乙丑王晏球張延朗會於行唐丙寅至曲陽王都乗勝悉其衆與契丹五千騎合萬餘人邀晏球等於曲陽丁卯戰于城南晏球集諸將校令之曰王都輕而驕可一戰擒也今日諸君報國之時也悉去弓矢以短兵擊之囬顧者斬於是騎兵先進奮撾揮劒直衝其陳大破之僵尸蔽野契丹死者過半餘衆北走都與秃餒得數騎僅免盧龍節度使趙徳鈞邀撃契丹北走者殆無孑遺秋七月壬戌契丹復遣其酋長惕隱將七千騎救定州王晏球逆戰於唐河北大破之甲子追至易州時久雨水漲契丹為唐所俘斬及䧟溺死者不可勝數契丹北走道路泥濘人馬飢疲入幽州境八月甲戌趙徳鈞遣牙將武從諫將精騎邀擊之分兵扼險要生擒惕隱等數百人餘衆散投村落村民以白挺擊之其得脱歸國者不過數十人自是契丹沮氣不敢輕犯塞初莊宗徇地河北獲小兒畜之宫中及長賜姓名曰李繼陶帝即位縱遣之王都得之使衣黄袍坐堞間謂王晏球曰此莊宗皇子也已即帝位公受先朝厚恩曾不念乎晏球曰公作此小數竟何益吾今教公二䇿不悉衆决戰則束手岀降耳自餘無以求生也閏月戊申趙徳鈞獻契丹俘惕隱等諸將皆請誅之帝曰此曹皆虜中驍將殺之則虜絶望不若存之以紓邊患乃赦惕隱等酋長五十人置之親衛餘六百人悉斬之契丹遣梅老季素等入貢􅊨初盧文進來降契丹以蕃漢都提舉使張希崇代之為盧龍節度使守平州遣親將以三百騎監之希崇本書生為幽州牙將没於契丹性和易契丹將稍親信之因與其部曲謀南歸部曲泣曰歸固寢食所不忘也然虜衆我寡柰何希崇曰吾誘其將殺之兵必潰去此去虜帳千餘里比其知而徵兵吾屬去逺矣衆曰善乃先為穽實以石灰明日召虜將飲醉并從者殺之投諸穽中其營在城北亟發兵攻之契丹衆皆潰去希崇悉舉其所部二萬餘口來犇詔以為汝州刺史冬十月王都據定州守備固伺察嚴諸將屢有謀翻城應官軍者皆不果帝遣使者促王晏球攻城晏球與使者聮騎巡城指之曰城髙峻如此借使主人聽外兵登城亦非梯衝所及徒多殺精兵無損於賊如此何為不若食三州之租愛民養兵以俟之彼必内潰帝從之四年春正月王都秃餒欲突圍走不得出二月癸丑定州都指揮使馬讓能開門納官軍都舉族自焚擒秃餒及契丹二千人辛亥以王晏球為天平節度使與趙徳鈞並加兼侍中秃餒至大梁斬於市夏四月契丹冦雲州五月契丹冦雲州長興元年冬十一月契丹東丹王突欲自以失職帥部曲四十人越海自登州來犇二年春三月辛酉賜契丹東丹王突欲姓東丹名慕華以為懐化節度使瑞慎等州觀察使其部曲及先所俘契丹將惕隱等皆賜姓名惕隱姓狄名懐惠秋九月己亥更賜東丹慕華姓名曰李賛華三年初契丹舎利萴剌與惕隱皆為趙徳鈞所擒契丹屢遣使請之上謀於羣臣徳鈞等皆曰契丹所以數年不犯邊數求和者以此輩在南故也縱之則邊患復生上以問冀州刺史楊檀對曰萴剌契丹之驍將曏助王都謀危社稷幸而擒之陛下免其死爲賜已多契丹失之如喪手足彼在朝廷數年知中國虚實若得歸爲患必深彼纔出塞則南向發矢矣恐悔之無及上乃止檀沙陀人也上欲授李賛華以河南藩鎮羣臣皆以爲不可上曰吾與其父約爲昆弟故賛華歸我吾老矣後世繼體之君雖欲招之其可致乎夏四月癸亥以賛華爲義成節度使爲選朝士爲僚屬輔之賛華但優遊自奉不豫政事上嘉之雖時有不法亦不問以莊宗後宫夏氏妻之贊華好飲人血姬妾多刺臂以吮之婢僕小過或扶目或刀刲火灼夏氏不忍其殘奏離昬為尼五月契丹使者迭羅卿辭歸國上曰朕志在安邊不可不少副其求乃遣萴骨舎利與之俱歸契丹以不得萴剌自是數冦雲州及振武初契丹既彊冦抄盧龍諸州皆徧幽州城門之外虜騎充斥每自涿州運糧入幽州契虜多兵於閻溝掠取之及趙徳鈞為節度使城閻溝而戍之為良鄉縣糧道稍通幽州東十里之外人不敢樵牧徳鈞於州東五十里城潞縣而戍之近州之民始得稼穡至是又於州東北百餘里城三河縣以通薊州運路虜騎来爭徳鈞擊却之九月庚辰朔奏城三河畢邊人頼之孟知祥據蜀後唐明宗天成元年秋七月孟知祥隂有據蜀之志閱庫中得鎧甲二十萬置左右牙等兵十六營凢萬六千人營於牙城内外初郭崇韜以蜀騎兵分左右驍銳等六營凢三千人步兵分左右寧逺等二十營凢二萬四千人八月孟知祥增置左右衝山等六營凡六千人營於羅城内外又置義寧等二十營凢萬六千人分戍管内州縣就食又置左右牢城四營凢四千人分戍成都境内秋九月壬戌孟知祥置左右飛棹兵六營凢六千人分戍濵江諸州習水戰以備䕫峽初魏王繼岌郭崇韜率蜀中冨民輸犒賞錢五百萬緡聽以金銀繒帛充晝夜督責有自殺者給軍之餘猶二百萬緡至是任圜判三司知成都冨饒遣鹽鐵判官太僕卿趙季良為孟知祥官告國信兼三川都制置轉運使冬十月季良至成都蜀人欲皆不與知祥曰府庫它人所聚輸之可也州縣租稅以贍鎮兵十萬决不可得季良但發庫物不敢復言制置轉運職事矣安重誨以知祥及東川節度使董璋皆據險要擁彊兵恐久而難制又知祥乃莊宗近姻隂欲圖之客省使泗州防禦使李嚴自請為西川監軍必能制知祥己酉以嚴為西川都監文思使太原朱􅀪昭為東川副使李嚴母賢明謂嚴曰汝前啟滅蜀之謀今日再往必以死報蜀人矣二年春正月孟知祥聞李嚴來監其軍惡之或請奏止之知祥曰何必然吾有以待之遣吏至綿劒迎候會武信節度使李紹文卒知祥自言嘗宻詔許便冝從事壬戌以西川節度副使内外馬步都指揮使李敬周為遂川留後促之上道然後表聞嚴先遣使至成都知祥自以於嚴有舊恩冀其懼而自回乃盛陳甲兵以示之嚴不以為意孟知祥禮遇李嚴甚厚一日謁知祥知祥謂曰公前奉使王衍歸而請兵伐蜀莊宗用公言遂致兩國俱亡今公復來蜀人懼矣且天下皆廢監軍公獨來監吾軍何也嚴惶怖求哀知祥曰衆怒不可遏也遂揖下斬之又召左廂馬步都虞候丁知俊知俊大懼知祥指嚴尸謂曰昔嚴奉使汝為之副然則故人也為我瘞之因誣奏嚴詐宣口敕云代臣赴闕又擅許將士優賞臣輙已誅之内八作使楊令芝以事入蜀至鹿頭闗聞嚴死犇還朱􅀪昭在東川聞之亦懼謀歸洛會有軍事董璋使之入奏􅀪昭偽辭然後行由是得免三月帝遣客省使李仁矩如西川傳詔安諭孟知祥及吏民甲戌至成都先是孟知祥遣牙内指揮使文水武漳迎其妻瓊華長公主及子仁贊於晉陽及鳯翔李從曮聞知祥殺李嚴止之以聞帝聽其歸蜀丙申至成都鹽鐵判官趙季良與孟知祥有舊知祥奏留季良為副使朝廷不得已四月以季良為西川節度副使李昊歸蜀知祥以為觀察推官三年春三月孟知祥屢與董璋爭鹽利璋誘商旅販東川鹽入西川知祥患之乃於漢州置三塲重征之歲得錢七萬緡商旅不復之東川先是詔發西川兵戍䕫州孟知祥遣左肅邊指揮使毛重威將三千人往頃之知祥奏䕫忠萬三州已平請召戍兵還以省饋運帝不許知祥隂使人誘之重威帥其衆鼓譟逃歸帝命按其罪知祥請而免之四年夏五月帝將祀南郊遣客省使李仁矩以詔諭兩川令西川獻錢一百萬緡皆辭以軍用不足西川獻五十萬緡東川獻十萬緡仁矩帝在藩鎭時客將也爲安重誨所厚恃恩驕慢至梓州董璋置宴召之日中不往方擁妓酣飲璋怒從卒徒執兵入驛立仁矩於階下而詬之曰公但聞西川斬李客省謂我獨不能邪仁矩流涕拜請僅而得免既而厚賂仁矩以謝之仁矩還言璋不法未幾帝復遣通事舍人李彦珣詣東川入境失小禮璋拘其從者彦珣犇還秋九月鄜州兵戍東川者歸本道董璋擅留其壯者選羸老歸之仍收其甲兵冬十月辛亥割閬果二州置保寧軍壬子以内客省使李仁矩為節度使先是西川常發芻糧饋峽路孟知祥辭以本道兵自多難以奉它鎮詔不許屢督之甲寅知祥奏稱財力乏不奉詔十二月安重誨既以李仁矩鎮閬州使與綿州刺史武䖍裕皆將兵赴治䖍裕帝之故吏重誨之外兄也重誨使仁矩詗董璋反狀仁矩增飾而奏之朝廷又使武信節度使夏魯竒治遂州城隍繕甲兵益兵戍之璋大懼時道路傳言又將割緜龍為節鎮孟知祥亦懼璋素與知祥有隙未嘗通問至是璋遣使詣成都請為其子娶知祥女知祥許之謀併力以拒朝廷長興元年春正月董璋遣兵築七寨於劔門辛巳孟知祥遣趙季良如梓州修好二月乙未朔趙季良還成都謂孟知祥曰董公貪殘好勝志大謀短終為西川之患都指揮使李仁罕張業欲置宴召知祥先二日有尼告二將謀以宴日害知祥知祥詰之無狀丁酉推始言者軍校都延昌王行本腰斬之戊戌就宴盡去左右獨詣仁罕第仁罕叩頭流涕曰老兵惟盡死以報徳由是諸將皆親附而服之壬子孟知祥董璋同上表言兩川聞朝廷於閬中建節綿遂益兵無不憂恐上以詔書慰諭之董璋恐綿州刺史武䖍裕窺其所為夏四月甲午朔表兼行軍司馬囚之府廷戊戌加孟知祥兼中書令五月董璋閲集民兵皆翦髮黥面復於劔門北置永定關布列烽火孟知祥累表請割雲安等十三鹽監􅀠西川以鹽直贍寧江屯兵辛卯許之董璋遣兵掠遂閬鎮戍秋七月戊辰兩川以朝廷繼遣兵屯遂閬復有論奏自是東北商旅少敢入蜀董璋之子光業為宫苑使在洛陽璋與書曰朝廷割吾支郡為節鎭屯兵三千是殺我必矣汝見樞要為吾言如朝廷更發一騎入斜谷吾必反與汝訣矣光業以書示樞宻承㫖李䖍徽未幾朝廷又遣别將荀咸又將兵戍閬州光業謂䖍徽曰此兵未至吾父必反吾不敢自愛恐煩朝廷調發願止此兵吾父保無它䖍徽以告安重誨重誨不從璋聞之遂反利閬遂三鎭以聞且言已聚兵將攻三鎭重誨曰臣久知其如此陛下含容不討耳帝曰我不負人人負我則討之九月癸亥西川進奏官蘇愿白孟知祥云朝廷欲大發兵討兩川知祥謀於副使趙季良季良請以東川先取遂䦘然後併兵守劒門則大軍雖来吾無内顧之憂矣知祥從之遣使約董璋同舉兵璋移檄利閬遂三鎮數其離間朝廷引兵擊閬州庚午知祥以都指揮使李仁罕為行營都部署漢州刺史趙廷隠副之簡州刺史張業為先鋒都揮使將兵三萬攻遂州别將牙内都指揮使侯􅀪實先登指揮使孟思恭將兵四千會璋攻閬州東川兵至閬州諸將皆曰董璋久蓄反謀以金帛㗖其士卒銳氣不可當冝深溝髙壘以挫之不過旬日大軍至賊自走矣李仁矩曰蜀兵懦弱安能當我精卒遂出戰兵未交而潰歸董璋晝夜攻之庚辰城䧟殺仁矩㓕其族初璋為梁將指揮使姚洪嘗􅀠麾下至是將兵千人戍閬州璋密以書誘之洪投諸厠城䧟璋執洪而讓之曰吾自行間奬拔汝今日何相負洪曰老賊汝昔為李氏奴掃馬糞得臠炙感恩無窮今天子用汝為節度使何負於汝而反邪汝猶負天子吾受汝何恩而云相負哉汝奴材固無取吾義士豈忍為汝所為乎吾寧為天子死不能與人奴並生璋怒然鑊於前令壯士十人刲其肉自㗖之洪至死罵不絶聲帝置洪二子於近衛厚給其家丙戌下制削董璋官爵興兵討之丁亥以孟知祥兼西南面供饋使以天雄節度使石敬瑭為東川行營都招討使以夏魯竒為之副璋使孟思恭分兵攻集州思恭輕進敗歸璋怒遣還成都知祥免其官戊子以石敬瑭權知東川事庚寅以右武衛上將軍王思同為西都留守兼行營馬步都虞􅀱為伐蜀前鋒冬十月癸巳李仁罕圍遂州夏魯竒嬰城固守孟知祥命都押牙髙敬柔帥資州義軍二萬人築長城環之魯竒遣馬軍都指揮使康文通出戰文通聞閬州䧟遂以其衆降於仁罕戊戌董璋引兵趣利州遇雨糧運不繼還閬州知祥聞之驚曰比破閬中正欲徑取利州其帥不武必望風遁去吾獲其倉廪據漫天之險北軍終不能西救武信今董公僻處閬州逺棄劔閣非計也欲遣兵三千助守劒門璋固辭曰此已有備丁未族誅董光業孟知祥以故蜀鎮江節度使張武為峽路行營招收討伐使將水軍趣䕫州以左飛棹指揮使􅀽彦超副之癸丑東川兵䧟徴合巴蓬果五州十一月戊辰張武至渝州刺史張環降之遂取瀘州遣先鋒將朱偓分兵趣黔涪石敬瑭入散闗階州刺史王􅀪贄温州刺史馮暉與前鋒馬步都虞候王思同步軍都指揮使趙在禮引兵出人頭山後過劒門之南還襲劒門壬申克之殺東川兵三千人獲都指揮使齊彦温據而守之暉魏州人也甲戌􅀪贄等破劒州而大軍不繼乃焚其廬舍取其資糧還保劒門乙亥詔削孟知祥官爵己卯董璋遣使至成都告急知祥聞劒門失守大懼曰董公果誤我庚辰遣牙内都指揮使李肇將兵五千赴之戒之曰爾倍道兼行先據劒州北軍無能為也又遣使詣遂州令趙廷隠將萬人會屯劒州又遣故蜀永平節度使李筠將兵四千趣龍州守要害時天寒士卒恐懼觀望不進廷隠流涕諭之曰今北軍勢盛汝曹不力戰却敵則妻子皆為人有矣衆心乃奮董璋自閬州將兩川兵屯木馬寨先是西川牙内指揮使太谷龎福誠昭信指揮使謝鍠屯來蘇村聞劒門失守相謂曰使北軍更得劒州則二蜀勢危矣遽引部兵千餘人間道趣劒州始至官軍萬餘人自北山大下會日暮二人謀曰衆寡不敵逮明則吾屬無遺矣福誠夜引兵數百升北山大譟於官軍營後鍠帥餘衆操短兵自其前急擊之官軍大驚空營遁去復保劒門十餘日不出孟知祥聞之喜曰吾始謂􅀪贄等克劒門徑據劒州堅守其城或引兵直趣梓州董公必棄閬州犇還我軍失援亦須解遂州之圍如此則内外受敵兩川震動勢可憂危今迺焚毁劒州運糧東歸劒門頓兵不進吾事濟矣官軍分道趣文州將襲龍州爲西川定逺指揮使潘福超義勝都頭太原沙延祚所敗甲申張武卒於渝州知祥命􅀽彦超代將其兵朱偓將至涪州武泰節度使楊漢賔棄黔南犇忠州偓追至豐都還取涪州知祥以成都支使崔善權武泰留後董璋遣前陵州刺史王暉將兵三千會李肇等分屯劒州南山十二月壬辰石敬瑭至劒門乙未進屯劒州北山趙廷隱陳于牙城後山李肇王暉陳于河橋敬瑭引步兵進擊廷隱廷隱擇善射者五百人伏敬瑭歸路按甲待之矛矟欲相及乃􅀭旗鼓譟擊之北軍退走顛墜下山俘斬百餘人敬瑭又使騎兵衝河橋李肇以彊弩射之騎兵不能進薄暮敬瑭引去廷隠引兵躡之與伏兵合擊敗之敬瑭還屯劒門石敬瑭征蜀未有功使者自軍前來多言道險狭進兵甚難闗右之人疲於轉餉往往竄匿山谷聚為盗賊上憂之壬子謂近臣曰誰能辦吾事者吾當自行耳安重誨曰臣職忝機密軍威不振臣之罪也臣請自往督戰上許之重誨即拜辭癸丑遂行日馳數百里西方藩鎮聞之無不惶駭錢帛芻糧晝夜輦運赴利州人畜斃踣於山谷者不可勝紀時上已踈重誨石敬瑭本不欲西征及重誨離上側乃敢累表奏論以為蜀不可伐上頗然之西川兵先戌䕫州者千五百上悉縱歸二年春正月壬戌孟知祥奉表謝庚午李仁罕䧟遂州夏魯竒自殺癸酉石敬瑭復引兵至劒州屯于北山孟知祥梟夏魯竒首以示之魯竒二子從敬瑭在軍中泣請往取其首葬之敬瑭曰知祥長者必葬而父豈不愈於身首異處乎既而知祥果收葬之敬瑭與趙廷隠戰不利復還劒門鳯翔節度使朱􅀪昭奏安重誨怨望不可令至行營又遺石敬瑭書使逆止之敬瑭上言重誨至恐人情有變宣徽使孟漢瓊亦言重誨過惡有詔召還誨專政事見安重二月己丑朔石敬瑭以遂閬既䧟糧運不繼燒營北歸軍前以告孟知祥知祥匿其書謂趙季良曰北軍漸進柰何季良曰不過綿州必遁知祥問其故曰我逸彼勞彼懸軍千里糧盡能無遁乎知祥大笑以書示之兩川兵追石敬瑭至利州壬辰昭武節度使李彦琦棄城走甲午兩川兵入利州孟知祥以趙廷隠為昭武留後廷隠遣使密言於知祥曰董璋多詐可與同憂不可與同樂佗日必為公患因其至劒州勞軍請圖之并兩川之衆可以得志於天下知祥不許璋入廷隠營留宿而去廷隠歎曰不從吾謀禍難未已庚子孟知祥以武信留後李仁罕為峽路行營詔討使使將水軍東略地乙巳趙廷隠李肇自劒州引還留兵五千戍利州丙午董璋弈還東川留兵三千戍果閬丁巳李仁罕䧟忠州三月己未朔李仁罕䧟萬州庚申䧟雲安監李仁罕至䕫州寧江節度使安崇阮棄鎮與楊漢賔自均房逃歸壬戌仁罕䧟䕫州夏四月己酉以天雄節度使同平章事石敬瑭兼六軍諸衛副使五月己亥下詔以重誨離間孟知祥董璋錢鏐為重誨罪丙午帝遣西川進奏官蘇愿東川軍將劉澄各還本道諭以安重誨專命興兵致討今已伏辜冬十一月癸巳蘇愿至成都孟知祥聞甥妷在朝廷者皆無恙遣使告董璋欲與之俱上表謝罪璋怒曰孟公親戚皆完固冝歸附璋已族滅尚何謝為詔書皆在蘇愿腹中劉澄安得豫聞璋豈不知邪由是復為怨敵乙未李仁罕自䕫州引兵還成都十二月昭武留後趙廷隠白孟知祥以利州城塹已完頃在劒州與牙内都指揮使李肇同功願以昭武讓肇知祥襃諭不許廷隠三讓癸酉知祥召廷隠還成都以肇代之三年春正月孟知祥以朝廷恩意優厚而董璋塞綿州路不聽遣使入謝與節度副使趙季良等謀欲發使自峽江上表掌書記李昊曰公不與東川謀而獨遣使則異日負約之責在我矣乃復遣使語之璋不從二月趙季良與諸將議遣昭武都監太原髙彦儔將兵攻取壁州以絶山南兵轉入山後諸州者孟知祥謀於僚佐李昊曰朝廷遣蘇愿等西歸未嘗報謝今遣兵侵軼公若不顧墳墓甥妷則不若傳檄舉兵直取梁洋安用壁州乎知祥乃止季良由是惡昊孟知祥三遣使説董璋以主上加禮於兩川苟不奉表謝罪恐復致討璋不從三月辛丑遣李昊詣梓州極論利害璋見昊詬怒不許昊還言於知祥曰璋不通謀議且有窺西川之志公宜備之夏四月東川節度使董璋會議將謀襲成都皆曰必克前陵州刺史王暉曰劒南萬里成都為大時方盛夏師出無名必無成功璋不從孟知祥聞之遣馬軍都指揮使潘仁嗣將三千人詣漢州詗之璋入境破白楊林鎮執戍將武􅀪禮聲勢甚盛知祥憂之趙季良曰璋為人勇而無恩士卒不附城守則難克野戰則成擒矣今不守巢穴公之利也璋用兵精鋭皆在前鋒公宜以羸兵誘之以勁兵待之始雖小衂後必大捷璋素有威名今舉兵暴至人心危懼公當自出禦之以彊衆心趙廷隠以季良言為然曰璋輕而無謀舉兵必敗當為公擒之辛巳以廷隠為行營馬步軍都部署將三萬人拒之五月壬午朔廷隠入辭董璋檄書至又有遺季良廷隠及李肇書誣之云季良廷隠與已通謀召已令來知祥以書授廷隠廷隠不視投之於地曰不過為反間欲令公殺副使與廷隠耳再拜而行知祥曰事必濟矣肇素不知書視之曰璋教我反耳囚其使者然亦擁衆為自全計璋兵至漢州潘仁嗣與戰于赤水大敗為璋所擒璋遂克漢州癸未知祥留趙季良髙敬柔守成都自將兵八千趣漢州至彌牟鎮趙廷隠陳於鎮北甲申遲明廷隠陳於雞蹤橋義勝定逺都知兵馬使張公鐸陳於其後俄而璋望西川兵盛退陳於武侯廟下璋帳下驍卒大譟曰日中曝我輩何為何不速戰璋乃上馬前鋒始交東川右廂馬步都指揮使張守進降於知祥言璋兵盡此無復後繼當急擊之知祥登髙冢督戰左明義指揮使毛重威左衝山指揮使李瑭守雞蹤橋皆為東川兵所殺趙廷隠三戰不利牙内都指揮副使侯􅀪實兵亦却知祥懼以馬箠指後陳張公鐸帥衆大呼而進東川兵大敗死者數千人擒東川中都指揮使元璝牙内副指揮使董光演等八十餘人璋拊膺曰親兵皆盡吾何依乎與數騎遁去餘衆七千人降復得潘仁嗣知祥引兵追璋至五侯津東川馬步都指揮使元瓌降西川兵入漢州府第求璋不得士卒爭璋軍資故璋走得免趙廷隠追至赤水又降其卒三千人是夕知祥宿雒縣命李昊草牓諭東川吏民及草書勞問璋且言將如梓州詢負約之由請見伐之罪乙酉知祥會廷隠于赤水遂西還命廷隠將兵攻梓州璋至梓州肩輿而入王暉迎問曰太尉全軍出征今還者無十人何也璋涕泣不能對至府第方食暉與璋從子牙内都虞􅃸延浩帥兵三百大譟而入璋引妻子登城子光嗣自殺璋至北門樓呼指揮使潘稠使討亂兵稠引十卒登城斬璋首及取光嗣首以授王暉暉舉城迎降趙廷隠入梓州封府庫以待知祥李肇聞璋敗始斬其使以聞丙戌知祥入成都丁亥復將兵八千如梓州至新都趙廷隠獻董璋首己丑發􅀇武趙廷隠帥東川將吏来迎壬辰孟知祥有疾癸巳疾甚中門副使王處回侍左右庖人進食必空器而出以安衆心李仁罕自遂州來趙廷隠迎于板橋仁罕不稱東川之功侵侮廷隠廷隠大怒乙未知祥疾瘳丁酉入梓州戊戌犒賞將士既罷知祥謂李仁罕趙廷隠曰二將誰當鎮此仁罕曰令公再與蜀州亦行耳廷隠不對知祥愕然退命李昊草牒俟二將有所推則命一人爲留後昊曰昔梁祖莊宗皆兼領四鎭今二將不讓惟公自領之爲便耳公冝亟還府更與趙僕射議之孟知祥命李仁罕歸遂州留趙廷隠東川巡檢以李昊行梓州軍府事昊曰二虎方爭僕不敢受命願從公還乃以都押牙王彦銖爲東川監押癸卯知祥至成都趙廷隠尋亦引兵西還知祥謂李昊曰吾得東川爲患益深昊請其故知祥曰自吾發梓州得仁罕七狀皆云公冝自領東川不然諸將不服廷隠言本不敢當東川因仁罕不讓遂有爭心耳君為我曉廷隠復以閬州為保寧軍益以果蓬渠開四州徃鎮之吾自領東川以絶仁罕之望廷隠猶不平請與仁罕鬬勝者為東川昊深解之乃受命六月以廷隠為保寧留後戊午趙季良帥將吏請知祥兼鎮東川許之季良等又請知祥稱王權行制書賞功臣不許董璋之起兵攻知祥也山南西道節度使王思同以聞范延光言於上曰若兩川併於一賊撫衆守險則取之益難冝及其交爭早圖之上命思同以興元之兵密規進取未幾聞璋敗死延光曰知祥雖據全蜀然士卒皆東方人知祥恐其思歸為變亦欲倚朝廷之重以威其衆陛下不屈意撫之彼則無從自新上曰知祥吾故人為人離間至此何屈意之有乃遣供奉官李存瓌賜知祥詔曰董璋狐狼自貽族滅卿丘園親戚皆保安全所宜成家世之美名守君臣之大節存瓌克寧之子知祥之甥也秋七月庚寅李存瓌至成都孟知祥拜泣受詔乙未孟知祥遣李存瓌還上表謝罪且告福慶公主之喪自是復稱藩然益驕倨矣八月甲子孟知祥令李昊為武泰趙季良等五留後草表請以知祥為蜀王行墨制仍自求旌節昊曰比者諸將攻取方鎮即有其地今又自求朝廷節鉞及明公封爵然則輕重之權皆在群下矣借使明公自請豈不可邪知祥大悟更令昊為已草表請行墨制補兩川刺史已下又表請以季良等五留後為節度使初安重誨欲圖兩川自知祥殺李嚴每除刺史皆以東兵衛送之小州不減五百人夏魯竒李仁矩武䖍裕各數千人皆以牙隊為名及知祥克遂閬利䕫黔梓六鎮得東兵無慮三萬人恐朝廷徵還表請其妻子九月孟知祥命其子仁賛攝行軍司馬兼都緫轄兩川牙内馬步都軍事冬十月己酉朔帝復遣李存瓌如成都凡劒南自節度使刺史以下官聽知祥差署訖奏聞朝廷更不除人唯不遣戍兵妻子然其兵亦不復徵也四年春二月孟知祥墨制以趙季良等為五鎮節度使癸亥以孟知祥為東西川節度使蜀王秋七月以盧文紀吕琦為蜀王冊禮使并賜蜀王一品朝服知祥自作九旒冕九章衣車服旌旗皆擬王者八月乙巳朔文紀等至成都戊申知祥服衮冕備儀衛詣驛降階北面受册升玉輅至府門乗步輦而歸文紀簡求之孫也冬十二月孟知祥聞明宗殂謂僚佐曰宋王弱為政者皆胥吏小人其亂可坐俟也潞王清泰元年閏正月蜀將吏勸蜀王知祥稱帝己巳知祥即皇帝位于成都二月癸酉蜀主以武泰節度使趙季良為司空兼門下侍郎同平章事領節度使如故蜀主以中門使王處回為樞密使秋七月蜀主得風疾踰年至是增劇甲子立子東川節度使同平章事親衛馬步都指揮使仁賛為太子仍監國召司空同平章事趙季良武信節度使李仁罕保寧節度使趙廷隠樞宻使王處回捧聖控鶴都指揮使張公鐸奉鑾肅衛指揮副使侯􅀪實受遺詔輔政是夕殂祕不發喪王處回夜啓義興門告趙季良處回泣不已季良正色曰今疆將握兵専伺時變冝速立嗣君以絶覬覦豈可但相泣邪處回收淚謝之季良教回見李仁罕審其詞㫖然後生之處回至仁罕第仁罕設備而出遂不以實告丙寅宣遺制命太子仁賛更名昶丁卯即皇帝位冬十二月甲申蜀葬文武聖徳英烈明孝皇帝于和陵廟號髙祖二年春二月戊寅蜀主尊母李氏為皇太后太后太原人本莊宗後宫也以賜蜀髙祖石晉簒唐後唐潞王清泰元年帝與石敬瑭皆以勇力善聞事明宗為左右然心競素不相恱帝即位敬瑭不得已入朝山陵既畢不敢言歸時敬瑭久病羸瘠太后及魏國公主屢為之言而鳯翔舊將佐多勸帝留之惟韓昭􅅌李專美以為趙延夀在汴不冝猜忌敬瑭帝亦見其骨立不以為虞乃曰石郎不惟密親兼自少與吾同艱難今我為天子非石郎尚誰託哉乃復以為河東節度使二年夏六月河東節度使北面緫管石敬瑭既還鎮隂為自全之計帝好咨訪外事常命端明殿學士李專美翰林學士李崧知制誥吕􅄾薛文遇翰林天文趙延乂等更直於中興殿庭與語或至夜分時敬瑭二子為内使曹太后則晉國長公主之母也敬瑭賂太后左右令伺帝之密謀事無巨細皆知之敬瑭多於賔客前自稱羸瘠不堪為帥冀朝廷不之忌時契丹屢冦北邊禁軍多在幽并敬瑭與趙徳鈞求益兵運糧朝夕相繼甲申詔借河東人有蓄積者菽粟乙酉詔鎮州輸絹五萬匹於緫管府糴軍糧率鎮冀人車千五百乗運糧於代州又詔魏博市糴時水旱民饑敬瑭遣使督趣嚴急山東之民流散亂始兆矣敬瑭將大軍屯忻州朝廷遣使賜軍士夏衣傳詔撫諭軍士呼萬歲者數四敬瑭懼幕僚河内段希堯請誅其唱首者敬瑭命都押衙劉知逺斬挟馬都將李暉等三十六人以徇希堯懐州人也帝聞之益疑敬瑭秋七月乙巳以武寧節度使張敬逹為北面行營副緫管將兵屯代州以分石敬瑭之權後晉髙祖天福元年春正月癸丑唐主以千春節置酒晉國長公主上夀畢辭歸晉陽帝醉曰何不且留遽歸欲與石郎反邪石敬瑭聞之益懼三月石敬瑭盡收其貨之在洛陽及諸道者歸晉陽託言以助軍費人皆知其有異志唐主夜與近臣從容語曰石郎於朕至親無可疑者但流言不息萬一失歡何以解之皆不對端明殿學士給事中李崧退謂同僚吕􅄾曰吾輩受恩深厚豈得自同衆人一槩觀望邪計將安出琦曰河東若有異謀必結契丹為援契丹母以贊華在中國屢求和親但求萴剌等未獲故和未成耳今誠歸萴剌等與之和歲以禮幣約置十餘萬緡遺之彼必驩然承命如此則河東雖欲陸梁無能為矣崧曰此吾志也然錢榖皆出三司冝更與張相謀之遂告張延朗延朗曰如學士計不惟可以制河東亦省邊費之什九計無便於此者若主上聽從但責辦於老夫請於庫財之外捃拾以供之它夕二人密言於帝帝大喜稱其忠二人私草遺契丹書以俟命久之帝以其謀告樞密直學士薛文遇文遇對曰以天子之尊屈身奉夷狄不亦辱乎又虜若循故事求尚公主何以拒之因誦戎昱昭君詩曰安危託婦人帝意遂變一日急召崧􅄾至後樓盛怒責之曰卿輩皆知古今欲佐人主致太平今乃爲謀如是朕一女尚乳臭卿欲棄之沙漠邪且欲以養士之財輸之虜庭其意安在二人懼汗流浹背曰臣等志在竭愚以報國非爲虜計也願陛下察之拜謝無數帝詬責不已吕􅄾氣竭拜少止帝曰吕琦強項肯視朕爲人主耶􅄾曰臣等爲謀不臧願陛下治其罪多拜何爲帝怒稍解止其拜各賜巵酒罷之自是羣臣不敢復言和親之䇿丁巳以􅄾爲御史中丞蓋疎之也初石敬瑭欲甞唐王之意累表自陳羸疾乞解兵柄移它鎮帝與執政議從其請移鎮鄆州房暠李崧吕􅄾等皆力諌以為不可帝猶豫久之五月庚寅夜李崧請急在外薛文遇獨直帝與之議河東事文遇曰諺有之當道築室三年不成兹事斷自聖志羣臣各為身謀安肯盡言以臣觀之河東移亦反不移亦反在旦暮耳不若先事圖之先是術者言國家今年應得賢佐出竒謀定天下帝意文遇當之聞其言大喜曰卿言殊豁吾意成敗吾决行之即為除目付學士院使草制辛卯以敬瑭為天平節度使以馬軍都指揮使河陽節度使宋審䖍為河東節度使制出兩班聞呼敬瑭名相顧失色甲午以建雄節度使張敬逹為西北蕃漢馬步都部署趣敬瑭之鄆州敬瑭疑懼謀於將佐曰吾之再来河東時主上面許終身不除代今忽有是命得非如今年千春節與公主所言乎我不興亂朝廷發之安能束手死於道路乎今且發表稱疾以觀其意若其寛我我當事之若加於我我則改圖耳幕僚段希堯極言拒之敬瑭以其朴直不責也節度判官華隂趙瑩勸敬瑭赴鄆州觀察判官平遥薛融曰融書生不習軍旅都押牙劉知逺曰明公久將兵得士卒心今據形勝之地士馬精彊若稱兵傳檄帝業可成柰何以一紙制書自投虎口乎掌書記洛陽桑維翰曰主上初即位明公入朝主上豈不知蛟龍不可縱之深淵邪然卒以河東復授公此乃天意假公以利器也明宗遺愛在人主上以庶孽代之羣情不附公明宗之愛壻今主上以反逆見待此非首謝可免但力為自全之計契丹主素與明宗約為兄弟今部落近在雲應公誠能推心屈節事之萬一有急朝呼夕至何患無成敬瑭意遂決先是朝廷疑敬瑭以羽林將軍寳鼎楊彦詢為北京副留守敬瑭將舉事亦以情告之彦詢曰不知河東兵糧幾何能敵朝廷乎左右請殺彦珣敬瑭曰惟副使一人我自保之汝輩勿言也戊戌昭義節度使皇甫立奏敬瑭反敬瑭表帝養子不應承祀請傳位許王帝手裂其表抵地以詔荅之曰卿於鄂王固非踈逺衛州之事天下皆知許王之言何人肯信壬寅制削奪敬瑭官爵乙巳以張敬逹兼太原四面排陳使河陽節度使張彦琪為馬步軍都指揮使以安國節度使安審􅄾為馬軍都指揮使以保義節度使相里金為步軍都指揮使以右監門上將軍武廷翰為壕寨使丙午以張敬逹為太原四面兵馬都部署以義武節度使楊光逺為副部署丁未又以張敬逹知太原行府事以前彰武節度使髙行周為太原四面招撫排陳等使光逺既行定州軍亂牙將千乗方太討平之張敬逹將兵三萬營於晉安鄉戊申敬逹奏西北先鋒馬軍都指揮使安審信叛奔晉陽審信金全之弟子也敬瑭與之有舊先是雄義都指揮使馬邑安元信將所部六百餘人戍代州代州刺史張朗善遇之元信宻説朗曰吾觀石令公長者舉事必成公何不潜遣人通意可以自全朗不從由是互相猜忌元信謀殺朗不克帥其衆犇審信審信遂帥麾下數百騎與元信掠百井犇晉陽敬瑭謂元信曰汝見何利害捨強而歸弱對曰元信非知星識氣顧以人事决之耳大帝王所以御天下莫重於信今主上失大信於令公親而貴者且不自保况踈賤乎其亡可翹足而待何彊之有敬瑭恱委以軍事振武西北巡檢使安重榮戍代北帥步騎五百奔晉陽重榮朔州人也以宋審䖍為寧國軍節度使充侍衛馬軍都指揮使六月石敬瑭之子右衛上將軍重殷皇城副使重裔聞敬瑭舉兵匿於民間井中弟沂州都指揮使敬徳殺其妻女而逃尋捕得死獄中從弟彰聖都指揮使敬威自殺秋七月戊子獲重殷重裔誅之并族所匿之家張敬逹發懐州彰聖軍戍虎北口其指揮使張萬迪將五百騎奔河東丙辰詔盡誅其家石敬瑭遣間使求救於契丹令桑維翰草表稱臣於契丹主且請以父禮事之約事捷之日割盧龍一道及鴈門闗以北諸州與之劉知逺諫曰稱臣可矣以父事之太過厚以金帛賂之自足致其兵不必許以土田恐異日大為中國之患悔之無及敬瑭不從表至契丹契丹主大喜白其母曰兒比夢石郎遣使来今果然此天意也乃為復書許俟仲秋傾國赴援八月己未以范延光為天雄節度使李周為宣武節度使同平章事癸亥應州言契丹三千騎攻城張敬逹築長圍以攻晉陽石敬瑭以劉知逺為馬步軍指揮使安重榮張萬迪降兵皆􅀠焉知逺用法無私撫之如一由是人無貳心敬瑭親乗城坐卧矢石下知逺曰觀敬逹輩髙壘深壍欲為持久之計無他竒䇿不足慮也願明公四出間使經略外事守城至易知逺獨能辦之敬瑭執知逺手撫背而賞之唐主使端明殿學士吕􅄾至河東行營犒軍楊光逺謂􅄾曰願附奏陛下幸寛宵旰賊若無援旦夕當平若引契丹當縱之令入可一戰破也帝甚恱帝聞契丹許石敬瑭以仲秋赴援屢督張敬逹急攻晉陽不能下每有營御名之多值風雨長圍復為水潦所壞竟不能合晉陽城中日窘糧儲浸乏九月契丹主將五萬騎號三十萬自􅀭武谷而南旌旗不絶五十餘里代州刺史張朗忻州刺史丁審􅄾嬰城自守虜騎過城下亦不誘脅審􅄾洺州人也辛丑契丹主至晉陽陳於汾北之虎北口先遣人謂敬瑭曰吾欲今日即破賊可乎敬瑭遣人馳告南軍甚厚不可輕請俟明日議戰未晚也使者未至契丹已與唐騎將髙行周苻彦卿合戰敬瑭乃遣劉知逺出兵助之張敬逹楊光逺安審􅄾以步兵陳於城西北山下契丹遣輕騎三千不被甲直犯其陳唐兵見其羸爭逐之至汾曲契丹涉水而去唐兵循岸而進契丹伏兵自東北起衝唐兵斷而為二步兵在北者多為契丹所殺騎兵在南者引歸晉安寨契丹縱兵乗之唐兵大敗步兵死者近萬人騎兵獨全敬逹等收餘衆保晉安契丹亦引兵歸虎北口敬瑭得唐降兵千餘人劉知逺勸敬瑭盡殺之是夕敬瑭出北門見契丹主契丹主執敬瑭手恨相見之晚敬瑭問曰皇帝逺來士馬疲倦遽與唐戰而大勝何也契丹主曰始吾自北来謂唐必斷鴈門諸路伏兵險要則吾不可得進矣使人偵視皆無之吾是以長驅深入知大事必濟也兵既相接我氣方鋭彼氣方沮若不乗此急擊之曠日持久則勝負未可知矣此吾所以亟戰而勝不可以勞逸常理論也敬瑭甚歎伏壬寅敬瑭引兵會契丹圍晉安寨置營於晉安之南長百餘里厚五十里多設鈴索吠犬人跬步不能過敬逹等士卒猶五萬人馬萬匹四顧無所之甲辰敬逹遣使告敗於唐自是聲問不復通唐主大懼遣彰聖都指揮使苻彦饒將洛陽步騎兵屯河陽詔天雄節度使兼中書令范延光將魏州兵二萬由青山趣榆次盧龍節度使東北面招討使兼中書令北平王趙徳鈞將幽州兵由飛狐出契丹軍後耀州防禦使潘環糺合西路戍兵由晉綘兩乳嶺出慈隰共救晉安寨契丹主移帳於柳林遊騎過石會闗不見唐兵丁未唐主下詔親征雍王重美曰陛下目疾未平不可逺涉風沙臣雖童稚願代陛下北行帝意本不欲行聞之頗恱張延㓪劉延皓及宣徽南院使劉延㓪皆勸帝行帝不得已戊申發洛陽謂盧文紀曰朕雅聞卿有相業故排衆議首用卿今禍難如此卿嘉謀皆安在乎文紀但拜謝不能對己酉遣劉延朗監侍衛步軍都指揮使苻彦饒軍赴潞州爲大軍後援諸軍自鳯翔推戴以来驕悍不爲用彦饒恐其爲亂不敢束之以法帝至河陽心憚北行召宰相樞密使議進取方略盧文紀希帝㫖言國家根本大半在河南胡兵倐來忽至不能久留晉安大寨甚固况已發三道兵救之河陽天下津要車駕冝留此鎮撫南北且遣近臣徃督戰苟不能解圍進亦未晚張延㓪欲因事令趙延夀得解樞務因曰文紀言是也帝訪於餘人無敢異者澤州刺史劉遂凝鄩之子也潜自通於石敬瑭表稱車駕不可踰太行帝議近臣可使北行者張延㓪與翰林學士須昌和凝等皆曰趙延夀父徳鈞以盧龍兵來赴難冝遣延夀會之庚戌遣樞密使忠武節度使隨駕諸軍都部署兼侍中趙延夀將兵二萬如潞州辛亥帝如懐州以右神武統軍康思立為北面行營馬軍都指揮使帥扈從騎兵赴團柏谷思立陽胡人也帝以晉安為憂問䇿於羣臣吏部侍郎永清龍敏請立李賛華為契丹主令天雄盧龍二鎮分兵送之自幽州趣西樓朝廷露檄言之契丹主必有内顧之憂然後選募軍中精鋭以擊之此亦解圍之一䇿也帝深以為然而執政恐其無成議竟不决帝憂沮形於色但日夕酣飲悲歌羣臣或勸其北行則曰卿勿言石郎使我心膽墯地冬十月壬戌詔大括天下將吏及民間馬又發民為兵每七戸出征夫一人自僃鎧仗謂之義軍期以十一月俱集命陳州刺史郎萬金教以戰陳用張延㓪之謀也凡得馬二千餘匹征夫五千人實無益於用而民間大擾初趙徳鈞隂蓄異志欲因亂取中原自請救晉安寨唐主命自飛狐踵契丹後鈔其部落徳鈞請將銀鞍契丹直三千騎由土門路西入帝許之趙州刺史北面行營都指揮使劉在明先將兵戍易州徳鈞過易州命在明以其衆自隨在明幽州人也徳鈞至鎮州以成徳節度使董温琪領招討副使邀與偕行又表稱兵少須合澤潞兵乃自吳兒谷趣潞州癸酉至亂柳時范延光受詔將部兵二萬屯遼州徳鈞又請與魏博軍合延光知徳鈞合諸軍志趣難測表稱魏博兵已入賊境無容南行數百里與德鈞合乃止冬十一月戊子以趙徳鈞為諸道行營都統依前東北面行營招討使以趙延夀為河東道南面行營招討使以翰林學士張礪為判官庚寅以范延光為河東道東南面行營招討使以宣武節度使同平章事李周副之辛卯以劉延㓪為河東道南面行營招討副使趙延夀遇趙徳鈞於西湯悉以兵屬徳鈞唐主遣吕􅄾賜徳鈞敕告且犒軍徳鈞志在併范延光軍逗留不進詔書屢趣之徳鈞乃引兵北屯團栢谷口契丹主謂石敬瑭曰吾三千里來赴難必有成功觀汝氣貌識量真中原之主也吾欲立汝為天子敬瑭辭讓數四將吏復勸進乃許之契丹主作册書命敬瑭為大晉皇帝自解衣冠授之築壇於柳林是日即皇帝位割幽薊瀛莫涿檀順新媯儒武雲應寰朔蔚十六州以與契丹仍許歲輸帛三十萬匹己亥制改長興七年為天福元年大赦勑命法制皆遵明宗之舊以節度判官趙瑩為翰林學士承㫖戸部侍郎知河東府事掌書記桑維翰為翰林學士禮部侍郎權知樞密使事觀察判官薛融為侍御史知雜事節度推官白水竇貞固爲翰林學士軍城都巡檢使劉知逺爲侍衛馬軍都指揮使客將景延廣爲步軍都指揮使延廣陜州人也立晉國長公主爲皇后契丹主雖軍柳林其輜重老弱皆在虎北口每日暝輙結束以僃倉猝遁逃而趙徳鈞欲倚契丹取中國至團柏踰月按兵不戰去晉安纔百里聲問不能相通徳鈞累表爲延夀求成徳節度使曰臣今逺征幽州勢孤欲使延夀在鎮州左右便於應接唐主曰延夀方擊賊何暇徃鎮州俟賊平當如所請徳鈞求之不已唐主怒曰趙氏父子堅欲得鎮州何意也苟能却胡冦雖欲代吾位吾亦甘心若玩冦邀君但恐犬兎俱斃耳徳鈞聞之不恱閏月趙延夀獻契丹主所賜詔及甲馬弓劒詐云徳鈞遣使致書於契丹主為唐結好説令引兵歸國其實别為密書厚以金帛賂契丹主云若立已為帝請即以見兵南平洛陽與契丹為兄弟之國仍許石氏常鎮河東契丹主自以深入敵境晉安未下徳鈞兵尚彊范延光在其東又恐山北諸州邀其歸路欲許徳鈞之請帝聞之大懼亟使桑維翰見契丹主説之曰大國舉義兵以救孤危一戰而唐兵瓦解退守一柵食盡力窮趙北平父子不忠不信畏大國之彊且素蓄異志按兵觀變非以死徇國之人何足可畏而信其誕妄之辭貪豪末之利棄垂成之功乎且使晉得天下將竭中國之財以奉大國豈此小利之比乎契丹主曰爾見捕鼠者乎不備之猶或齧傷其手况大敵乎對曰今大國已扼其喉安能齧人乎契丹主曰吾非有渝前約也但兵家權謀不得不爾對曰皇帝以信義救人之急四海之人俱屬耳目柰何一旦二三其命使大義不終臣竊為皇帝不取也跪於帳前自旦至暮涕泣爭之契丹主乃從之指帳前石謂徳鈞使者曰我已許石郎此石爛可改矣龍敏謂前鄭州防禦使李懿曰君國之近親今社稷之危翹足可待君獨無憂乎懿爲言趙徳鈞必能破敵之狀敏曰我燕人也知徳鈞之爲人怯而無謀但於守城差長耳况今内蓄姦謀豈可恃乎僕有狂䇿但恐朝廷不肯爲耳今從駕兵尚萬餘人馬近五千匹若選精騎一千使僕與郎萬金將之自介休山路夜冒虜騎入晉安寨但使其半得入則事濟矣張敬逹䧟於重圍不知朝廷聲問若知大軍在近團柏雖有鐵障可衝䧟况虜騎乎懿以白唐主唐主曰龍敏之志極壯用之晚矣晉安寨被圍數月髙行周苻彦卿數引騎兵出戰衆寡不敵皆無功芻糧俱竭削柹淘糞以飼馬馬相㗖尾鬛皆秃死則將士分食之援兵竟不至張敬逹性剛時謂之張生鐵楊光逺安審琦勸敬逹降於契丹敬逹曰吾受明宗及今上厚恩爲元帥而敗軍其罪已大况降敵乎今援兵旦暮至且當俟之必若力盡勢窮則諸軍斬我首􅂝之出降自求多福未爲晚也光逺目審􅄾欲殺敬逹審􅄾未忍髙行周知光逺欲圖敬逹常引壯騎尾而衛之敬逹不知其故謂人曰行周每踵余後何意也行周乃不敢隨之諸將每旦集於招討使營甲子髙行周苻彦卿未至光逺乗其無僃斬敬逹首帥諸將上表降於契丹契丹主素聞諸將名皆慰勞賜以裘㡌因戯之曰汝輩亦大惡漢不用鹽酪㗖戰馬萬匹光逺等大慙契丹主嘉敬逹之忠命收􅁙而祭之謂其下及晉諸將曰汝曹為人臣當效敬逹也時晉安寨馬猶近五千鎧仗五萬契丹悉取以歸其國悉以唐之將卒授帝語之曰勉事而主馬軍都指揮使康思立憤惋而死帝以晉安已降遣使諭諸州代州刺史張㓪斬其使吕琦奉唐主詔勞北軍至忻州遇晉使亦斬之謂刺史丁審􅄾曰虜過城下而不顧其心可見還日必無全理不若早帥兵民自五臺犇鎮州將行審􅄾悔之閉牙城不從州兵欲攻之􅄾曰國家如此何為復相屠滅乃帥州兵趣鎮州審􅄾遂降契丹契丹主謂帝曰桑維翰盡忠於汝冝以為相丙寅以趙瑩為門下侍郎桑維翰為中書侍郎並同平章事維翰仍權知樞宻使事以楊光逺為侍衛馬步軍都指揮使以劉知逺為保義節度使侍衛馬步軍都虞􅀱帝與契丹主將引兵而南欲留一子守河東咨於契丹主契丹主令帝盡出諸子自擇之帝兄子重貴父敬儒早卒帝養以為子貌類帝而短小契丹主指之曰此大目者可也乃以重貴為北京留守太原尹河東節度使契丹以其將髙謨翰為前鋒與降卒偕進丁卯至團柏與唐兵戰趙徳鈞趙延夀先遁苻彦饒張彦􅄾劉延㓪劉在明繼之士卒大潰相騰踐死者萬計己巳延㓪在明至懐州唐主始知帝即位楊光逺降衆議以天雄軍府尚完契丹必憚山東未敢南下車駕冝幸魏州唐主以李崧素與范延光善召崧謀之薛文遇不知而繼至唐主怒變色崧躡文遇足文遇乃去唐主曰我見此物肉顫適幾欲抽佩刀刺之崧曰文遇小人淺謀誤國刺之益醜崧因勸唐主南還唐主從之洛陽聞北軍敗衆心大震居人四出逃竄山谷門者請禁之河南尹雍王重美曰國家多難未能為百姓主又禁其求生徒増惡名耳不若聽其自便事寧自還乃出令任從所適衆心差安壬申唐主還至河陽命諸將分守南北城張延㓪請幸滑州庶與魏博聲勢相接唐主不能决趙徳鈞趙延夀南犇潞州唐敗兵稍稍從之其將時賽帥盧龍輕騎東還漁陽帝先遣昭義節度使髙行周還具食至城下見徳鈞父子在城上行周曰僕與大王鄉曲敢不忠告城中無斗粟可守不若速迎車駕甲戌帝與契丹主至潞州徳鈞父子迎謁於髙河契丹主慰諭之父子拜帝於馬首進曰别後安否帝不顧亦不與之言契丹主問徳鈞曰汝在幽州所置銀鞍契丹直何在徳鈞指示之契丹主命盡殺之於西郊凢三千人遂鎖徳鈞延夀送歸其國徳鈞見述律太后悉以所齎寳貨并籍其田宅獻之太后問曰汝近者何為往太原徳鈞曰奉唐主之命太后指天曰汝從吾兒求為天子何妄語邪又自指其心曰此不可欺也又曰吾兒將行吾戒之云趙大王若引兵北向渝關亟須引歸太原不可救也汝欲為夫子何不先擊退吾兒徐圖亦未晩汝為人臣負其主不能擊敵又欲乗亂邀利所為如此何面目復求生乎徳鈞俛首不能對又問器玩在此田宅何在徳鈞曰在幽州太后曰幽州今屬誰徳鈞曰屬太后太后曰然則又何獻焉徳鈞益慙自是鬱鬱不多食踰年而卒張礪與延夀俱入契丹契丹主復以為翰林學士帝將發上黨契丹主舉酒屬帝曰余逺来徇義今大事已成我若南向河南之人必大驚駭汝冝自引漢兵南下人必不甚懼我令太詳相將五千騎衛送汝至河梁欲與之度河者多少隨意余且留此俟汝音聞有急則下山救汝若洛陽既定吾即北返矣與帝執手相泣久之不能别解白貂裘以衣帝贈帝良馬二十匹戰馬千二百匹曰世世子孫勿相忘又曰劉知逺趙瑩桑維翰皆創業功臣無大故勿棄也初張敬逹既出師唐主遣左金吾大將軍歷山髙漢筠守晉州敬逹死建雄節度副使田承肇帥衆攻漢筠於府署漢筠開門延承肇入從容謂曰僕與公俱受朝寄何相迫如此承肇曰欲舉公為節度使漢筠曰僕老矣義不為亂首死生惟公所處承肇目左右欲殺之軍士投刃於地曰髙金吾累朝宿徳柰何害之承肇乃謝曰與公戲耳聽漢筠歸洛陽帝遇諸塗曰朕憂卿為亂兵所傷今見卿甚喜苻彦饒張彦琪至河陽密言於唐主曰今胡兵大下河水復淺人心已離此不可守丁丑唐主命河陽節度使萇從簡與趙州刺史劉在明守河陽南城遂斷浮梁歸洛陽遣宦者秦繼旻皇城使李彦紳殺昭信節度使李賛華於其第己卯帝至河陽萇從簡迎降舟楫已具彰聖軍執劉在明以降帝釋之使復其所唐主命馬軍都指揮使宋審䖍步軍都指揮使苻彦饒河陽節度使張彦琪宣徽南院使劉延朗將千餘騎至白馬阪行戰地有五十餘騎度河犇于北軍諸將謂審䖍曰何地不可戰誰肯立於此乃還庚辰唐主又與四將議復向河陽而將校皆已飛狀迎帝帝慮唐主西犇遣契丹千騎扼澠池辛巳唐主與曹太后劉皇后雍王重美及宋審䖍等􅂝傳國寳登􅀇武樓自焚皇后積薪欲燒宫室重美諌曰新天子至必不露居它日重勞民力死而遺怨將安用之乃止王淑妃謂太后曰事急矣冝且避匿以俟姑夫太后曰吾子孫婦女一朝至此何忍獨生妹自勉之淑妃乃與許王從益匿於毬􅂣獲免是日晚帝入洛陽止于舊第唐兵皆解甲待罪慰而釋之帝命劉知逺部署京城知逺分漢軍使還營館契丹於天宫寺城中肅然無敢犯令士民避亂竄匿者數日皆還復業初帝在河東為唐朝所忌中書侍郎同平章事判三司張延㓪不欲河東多蓄積凡財賦應留使之外盡收取之帝以是恨壬午百官入見獨收延㓪付御史臺餘皆謝恩甲申車駕入宫大赦應中外官吏一切不問惟賊臣張延㓪劉延皓劉延㓪姦邪貪猥罪難容貸中書侍郎平章事馬胤孫樞密使房暠宣徽使李專美河中節度使韓昭胤等雖居重位不務詭隨並釋罪除名中外臣僚先歸順者委中書門下别加任使劉延皓匿於龍門數日自經死劉延㓪將犇南山捕得殺之斬張延㓪既而選三司使難其人帝甚悔之十二月乙酉朔帝如河陽餞太相温及契丹兵歸國追廢唐主爲庶人丁亥以馮道兼門下侍郎同平章事詔贈李賛華燕王遣使送其喪歸國庚子以唐中書侍郎同平章事盧文紀爲吏部尚書以皇城使晉陽周瓌為大將軍充三司使瓌辭曰臣自知才不稱職寧以避事見棄猶勝冒寵獲辜帝許之改興唐府曰廣晉府二年春正月李崧吕􅄾逃匿於伊闕民間帝以始鎮河東崧有力焉徳之亦不責􅄾乙丑以􅄾為祕書監三月以崧為兵部侍郎判戸部或得唐潞王膂及髀骨獻之三月庚申詔以王禮葬於徽陵南六月左拾遺張誼上言北狄有援立之功冝外敦信好内謹邊僃不可自逸以啓戎心帝深然之三年秋八月帝上尊號於契丹主及太后戊寅以馮道為太后册禮使左僕射劉煦為契丹主册禮使僃鹵簿儀仗車輅詣契丹行禮契丹主大恱帝事契丹甚謹奉表稱臣謂契丹主為父皇帝每契丹使至帝於别殿拜受詔勑歲輸金帛三十萬之外吉凶慶弔歲時贈遺玩好珍異相繼於道乃至應天太后元帥太子偉王南北二王韓延徽趙延夀等諸大臣皆有賂遺小不如意輙来責讓帝常卑辭謝之晉使者至契丹契丹驕倨多不遜語使者還以聞朝野咸以為恥而帝事之曾無倦意以是終帝之世與契丹無隙然所輸金帛不過數縣租賦徃徃託以民困不能滿數其後契丹主屢止帝上表稱臣但令為書稱兒皇帝如家人禮契丹遣使如洛陽取趙延夀妻唐燕國長公主以歸冬十月戊寅契丹遣使奉寶冊加帝號曰英武明義皇帝帝以大梁舟車所會便於漕運丙辰建東京於汴州為開封府以東都為西京以西都為晉昌軍節度帝遣兵部尚書王權使契丹謝尊號權自以累世將相耻之謂人曰吾老矣安能向穹廬屈膝乃辭以老疾帝怒戊子權坐停官范楊之叛范延光楊光逺後晉髙祖天福元年初成徳節度使董温琪貪暴積貨巨萬以牙内都虞候平山祕瓊為腹心温琪與趙徳鈞俱没於契丹瓊盡殺其家人瘞於一坎而取其貨自稱留後表稱軍亂二年春正月詔以祕瓊為齊州防禦使初天雄節度使兼中書令范延光微時有術士張生語之云必為將相延光既貴信重之延光嘗夢蛇入腹以問張生張生曰蛇者龍也帝王之兆延光由是有非望之志唐潞王素與延光厚及趙徳鈞敗延光自遼州引兵還魏州雖奉表請降内不自安以書潜結祕瓊欲與之為亂瓊受其書不報延光恨之瓊將之齊過魏境延光欲滅口且利其貨遣兵邀之於夏津殺之丁卯延光奏稱夏津捕盜兵誤殺瓊帝不問三月范延光聚卒繕兵悉召巡内刺史集魏州將作亂會帝謀徙都大梁兼樞密使桑維翰曰大梁北控燕趙南通江淮水陸都會資用冨饒今延光反形已露大梁距魏不過十驛彼若有變大軍尋至所謂疾雷不及掩耳也丙寅下詔託以洛陽漕運有闕東巡汴州庚辰帝發洛陽留前朔方節度使張從賔為東都巡檢使夏四月丙戌帝至汴州丁亥大赦五月壬申進范延光爵臨清郡王以安其意范延光素以軍府之政委元隨左都押牙孫鋭鋭恃恩專横符奏有不如意者對延光手裂之㑹延光病經旬鋭密召澶州刺史馮暉與之合謀逼延光反延光亦思張生之言遂從之六月六宅使張言奉使魏州還言延光反狀義成節度使苻彦饒奏延光遣兵渡河焚草市詔侍衛馬軍都指揮使昭信節度使白奉進將千五百騎屯白馬津以僃之奉進雲州人也丁酉以東都巡檢使張從賔為魏府西南都部署戊戌遣侍衞都軍使楊光逺將步騎一萬屯滑州己亥遣䕶聖都指揮使杜重威將兵屯衛州重威朔州人也尚帝妹樂平長公主范延光以馮暉為都部署孫鋭為兵馬都監將步騎二萬循河西抵黎陽口辛丑楊光逺奏引兵踰胡梁渡丁未以侍衛使楊光逺為魏府四面都部署張從賔為副部署兼諸軍都虞候昭義節度使髙行周將本軍屯相州為魏府西向都部署軍士郭威舊􅀠劉知逺當從楊光逺北征白知逺乞留人問其故威曰楊公有姦詐之才無英雄之氣得我何用能用我者其劉公乎詔張從賔發河南兵數千人擊范延光延光使人誘從賔從賔遂與之同反殺皇子河陽節度使重信使上將軍張繼祚知河陽留後繼祚全義之子也從賔又引兵入洛陽殺皇子權東都留守重乂以東都副留守都巡檢使張延播知河南府事從賔取内庫錢帛以賞部兵留守判官李遐不與兵衆殺之從賔引兵東扼汜水關將逼汴州詔奉國都指揮使侯益帥禁兵五千會杜重威討張從賔又詔宣徽使劉處讓自黎陽分兵討之時羽檄縱横從官在大梁者無不忷懼獨桑維翰從容指畫軍事神色自若接對賔客不改常度衆心差安秋七月張從賔攻汜水殺巡檢使宋廷皓帝戎服嚴輕騎將奔晉陽以避之桑維翰叩頭苦諫曰賊鋒雖盛勢不能久請少待之不可輕動帝乃止范延光遣使以蠟丸招誘失職者右武衛上將軍婁繼英右衛大將軍尹暉在大梁温韜之子延濬延沼延衮居許州皆應之延光令延濬兄弟取許州聚徒已及千人繼英暉事泄皆出走壬子敕以延光姦謀誣汙忠良自今獲延光諜人賞獲者殺諜人焚蠟書勿以聞暉將犇吳為人所殺繼英犇許州依温氏忠武節度使萇從簡盛為之僃延濬等不得發欲殺繼英以自明延沼止之遂同犇張從賔繼英知其謀勸從賔執三温皆斬之白奉進在滑州軍士有夜掠者捕之獲五人其三􅀠奉進其二􅀠苻彦饒奉進皆斬之彦饒以其不先白己甚怒明日奉進從數騎詣彦饒謝彦饒曰軍中各有部分奈何取滑州軍士并斬之殊無客主之義乎奉進曰軍士犯法何有彼我僕已引咎謝公而公怒不解豈非欲與延光同反邪拂衣而起彦饒不留帳下甲士大譟擒奉進殺之從騎走出大呼於外諸軍爭擐甲操兵諠譟不可禁止奉國左廂都指揮使馬萬惶惑不知所爲帥兵欲從亂遇右廂都指揮使盧順宻帥部兵出營厲聲謂萬曰苻公擅殺白公必與魏城通謀此去行營纔二百里吾輩及軍士家屬皆在大梁柰何不思報國乃欲助亂自求滅族今日當共擒苻公送天子立大功軍士從命者賞違命者誅勿復疑也萬部兵尚有呼躍者順密殺數人衆莫敢動萬不得已從之與奉國都虞候方太等共攻牙城執彦饒令太部送大梁甲寅敕斬彦饒於班荆館其兄弟皆不問楊光逺自白臯引兵趣滑州士卒聞滑州亂欲推光逺為主光逺曰天子豈汝輩販弄之物晉陽之䧏出於窮迫今若改圖真反賊也其下乃不敢言時魏孟滑三鎮繼叛人情大震帝問計於劉知逺對曰帝者之興自有天命陛下昔在晉陽糧不支五日俄成大業今天下已定内有勁兵北結彊虜鼠輩何能為乎願陛下撫將相以恩臣請戢士卒以威恩威兼著京邑自安本根深固則枝葉不傷矣知逺乃嚴設科禁宿衛諸軍無敢犯者有軍士盜紙錢一幞主者擒之左右請釋之知逺曰吾誅其情不計其直竟殺之由是衆皆畏服乙卯以楊光逺為魏府行營都招討使兼知行府事以昭義節度使髙行周為河南尹東京留守以杜重威為昭義節度使充侍衛馬軍都指揮使以侯益為河陽節度使帝以滑州奏事皆馬萬為首擢萬為義成節度使丙辰以盧順密為果州團練使方太為趙州刺史既而知皆順密之功也更以順密為昭義留後馮暉孫鋭引兵至六明鎮光逺引之度河半度而擊之暉鋭衆大敗多溺死斬首三千級暉鋭走還魏杜重威侯益引兵至汜水遇張從賔衆萬餘人與戰俘斬殆盡遂克汜水從賔走乗馬度河溺死獲其黨張延播繼祚婁繼英送大梁斬之滅其族史館修撰李濤上言張全義有再造洛邑之功乞免其族乃止誅繼祚妻子濤回之族曾孫也楊光逺奏知博州張暉舉城降安州威和指揮使王暉聞范延光作亂殺安逺節度使周環自領軍府欲俟延光勝則附之敗則度江犇吳帝遣右領軍上將軍李金全將千騎如安州巡檢許赦王暉以為唐州刺史范延光知事不濟歸罪於孫鋭而族之遣使奉表待罪戊寅楊光逺以聞帝不許山南東道節度使安從進恐王暉犇吳遣行軍司馬張朏將兵會復州兵於要路邀之暉大掠安州將奔吳部將胡進殺之八月癸巳以狀聞李金全至安州將士之預於亂者數百人金全説諭悉遣詣闕既而聞指揮使武彦和等數十人挾賄甚多伏兵于野執而斬之彦和且死呼曰王暉首惡天子猶赦之我輩脅從何罪乎帝雖知金全之情掩而不問乙巳赦張從賓苻彦饒王暉之黨未伏誅者皆不問甲寅以李金全為安逺節度使三年夏五月楊光逺自恃擁重兵頗干預朝政屢有抗奏帝常曲意從之庚申以其子承祚為左威衛將軍尚帝女長安公主次子承信亦拜美官寵冠當時秋八月壬午楊光逺奏前澶州刺史馮暉自廣晉城中出戰因来降言范延光食盡窮困己丑以暉為義成節度使楊光逺攻廣晉歲餘不下帝以師老民疲遣内職朱憲入城諭延光許移大藩曰若降而殺汝白日在上無以享國延光謂節度副使李式曰主上重信云不死則不死矣乃撤守僃然猶遷延未决宣徽南院使劉處讓復入諭之延光意乃决九月乙巳朔楊光逺送延光二子守圖守英詣大梁己酉延光遣牙將奉表待罪壬子詔書至廣晉延光帥其衆素服於牙門使者宣詔釋之朱憲汴州人也庚午楊光逺表乞入朝命劉䖏讓權知天雄軍府事己巳制以范延光為天平節度使仍賜鐵劵應廣晉城中將吏軍民今日以前罪皆釋不問其張從賓苻彦饒餘黨及自官軍逃叛入城者亦釋之延光腹心將佐李式孫漢威薛覇皆除防禦團練使刺史牙兵皆升為侍衛親軍初河陽行軍司馬李彦珣邢州人也父母在鄉里未嘗供饋後與張從賓同反從賓敗犇廣晉范延光以為步軍都監使登城拒守楊光逺訪獲其母置城下以招之彦珣引弓射殺其母延光既降帝以彦珣為坊州刺史近臣言彦珣殺母惡逆不可赦帝曰赦令已行不可改也乃遣之官臣光曰治國者固不可無信然彦珣之惡三靈所不容晉髙祖赦其叛君之愆治其殺母之罪何損於信哉辛未以楊光逺為天雄節度使初郭崇韜既死宰相罕有兼樞密使者帝即位桑維翰李崧兼之宣徽使劉處讓及宦官皆不悦楊光逺圍廣晉處讓數以軍事銜命往来光逺奏請多踰分帝常依違維翰獨以法裁折之光逺對處讓有不平語處讓曰是皆執政之意光逺由是怨執政范延光降光逺密表論執政過失帝知其故而不得已加維翰兵部尚書崧工部尚書皆罷其樞密使以處讓為樞密使十一月范延光自鄆州入朝帝患天雄節度使楊光逺䟦扈難制桑維翰請分天雄之衆加光逺太尉西京留守兼河陽節度使光逺由是怨望密以賂自訴於契丹養部曲千餘人常蓄異志范延光屢請致仕甲寅詔以太子太師致仕居于大梁每遇宴會與羣臣無異延光之反也相州刺史掖人王景拒境不從戊午以景為耀州團練使四年秋七月西京留守楊光逺䟽中書侍郎同平章事桑維翰遷除不公及營邸肆於兩都與民爭利帝不得已閏月壬申出維翰彰德節度使兼侍中五年秋八月太子太師致仕范延光請歸河陽私第帝許之延光重載而行西京留守楊光逺兼領河陽利其貨且慮為子孫之患奏延光叛臣不家洛汴而就外藩恐其逃逸入敵國冝早除之帝不許光逺請就延光居西京從之光逺使其子承貴以甲士圍其第逼令自殺延光曰天子在上賜我鐵劵許以不死爾父子何得如此己未承貴以白刃驅延光上馬至浮梁擠于河光逺奏云自赴水死帝知其故憚光逺之強不敢詰為延光輟朝贈太師九月楊光逺入朝帝欲徙之它鎮謂光逺曰圍魏之役卿左右皆有功尚未之賞今當各除一州以榮之因以其將校數人為刺史甲申徙光逺為平盧節度使進爵東平王齊王天福八年初髙祖以馬三百借平盧節度使楊光逺同平章事景延廣以詔命取之光逺怒曰是疑我也密召其子單州刺史承祚十一月戊戌承祚稱母病夜開門犇青州庚子以左飛龍使金城何超權知單州遣内班賜光逺玉帶御馬金帛以安其意壬寅遣侍衛步軍都指揮使郭謹將兵戍鄆州十二月乙巳朔遣左領軍衛將軍蔡行遇將兵戍鄆州楊光逺遣騎兵入淄州刼刺史翟進宗歸于青州甲寅徙楊承祚為登州刺史以從其便光逺益驕密告契丹取晉開運元年春正月成徳節度使杜威遣幕僚曹光裔詣楊光逺為陳禍福光逺遣光裔入奏稱承祚逃歸母病故爾既䝉恩宥闔族荷恩朝廷信其言遣使與光裔復徃慰諭之愽州刺史周儒以城降契丹又與楊光逺通使徃還二月甲辰周儒引契丹將麻荅攻鄆州以應楊光逺辛亥楊光逺將青州兵西會契丹戊午詔前保義節度使石贇分兵屯鄆州以備之三事並見契丹滅晉壬戌楊光逺圍棣州刺史李瓊出兵擊敗之光逺燒營走還青州癸亥以前威勝節度使何重建為東面馬步都部署將兵屯鄆州夏四月戊寅命侍衛馬步都虞􅀱泰寧節度使李守貞將步騎二萬討楊光逺於青州契丹救之齊州防禦使堂陽薛可言邀擊敗之冬十二月李守貞圍青州經時城中食盡餓死者大半契丹援兵不至楊光逺遥稽首於契丹曰皇帝皇帝誤光逺矣其子承勲承祚承信勸光逺降冀全其族光逺不許曰吾昔在代北嘗以紙錢祭天池而沈人皆言當為天子姑待之丁巳承勲斬勸光逺反者節度判官丘濤等送其首於守貞縱火大譟刼其父出居私弟上表待罪開城納官軍朝廷以楊光逺罪大而諸子歸命難於顯誅命李守貞以便冝從事閏月癸酉守貞入青州遣人拉殺光逺於别第以病鬼聞丙戌起復楊承勲除滋州防禦使通鑑紀事本末卷第四十一
