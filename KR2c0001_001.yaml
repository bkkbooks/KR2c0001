body:
  text: 三家分晉周威烈王二十三年初命晉大夫魏斯趙籍韓虔為諸侯臣光曰臣聞天子之職莫大於禮禮莫大於分分莫大於名何謂禮紀綱是也何謂分君臣是也何謂名公侯卿大夫是也夫以四海之廣兆民之衆受制於一人雖有絶倫之力髙世之智莫敢不奔走而服役者豈非以禮為之綱紀哉是故天子統三公三公率諸侯諸侯制卿大夫卿大夫治士庶人貴以臨賤賤以承貴上之使下猶心腹之運手足根本之制支葉下之事上猶手足之衛心腹支葉之庇本根然後能上下相保而國家治安故曰天子之職莫大於禮也文王序易以乾坤為首孔子繫之曰天尊地卑乾坤定矣卑髙以陳貴賤位矣言君臣之位猶天地之不可易也春秋抑諸侯尊周室王人雖微序於諸侯之上以是見聖人於君臣之際未嘗不惓惓也非有桀紂之暴湯武之仁人歸之天命之君臣之分當守節伏死而已矣是故以微子而代紂則成湯配天矣以季札而君吳則太伯血食矣然二子寧亡國而不為者誠以禮之大節不可亂也故曰禮莫大於分也夫禮辨貴賤序親疏裁羣物制庶事非名不著非器不形名以命之器以别之然後上下粲然有倫此禮之大經也名器既亡則禮安得獨存哉昔仲叔于奚有功於衛辭邑而請繁纓孔子以為不如多與之邑惟器與名不可以假人君之所司也政亡則國家從之衛君待孔子而為政孔子欲先正名以為名不正則民無所措手足夫繁纓小物也而孔子惜之正名細務也而孔子先之誠以名器既亂則上下無以相有故也夫事未有不生於微而成於著聖人之慮逺故能謹其微而治之衆人之識近故必待其著而後救之治其微則用力寡而功多救其著則竭力而不能及也易曰履霜堅冰至書曰一日二日萬幾謂此類也故曰分莫大於名也烏呼幽厲失德周道日衰綱紀散壞下陵上替諸侯專征大夫擅政禮之大體什喪七八矣然文武之祀猶綿綿相屬者蓋以周之子孫尚能守其名分故也何以言之昔晉文公有大功於王室請隧於襄王襄王不許曰王章也未有代德而有二王亦叔父之所惡也不然叔父有地而隧又何請焉文公於是乎懼而不敢違是故以周之地則不大於曹滕以周之民則不衆於邾莒然歷數百年宗主天下雖以晉楚齊秦之強不敢加者何哉徒以名分尚存故也至於季氏之於魯田常之於齊白公之於楚智伯之於晉其勢皆足以逐君而自為然而卒不敢者豈其力不足而心不忍哉乃畏姦名犯分而天下共誅之也今晉大夫暴蔑其君剖分晉國天子既不能討又寵秩之使列於諸侯是區區之名分復不能守而并棄之也先王之禮於斯盡矣或者以為當是之時周室微弱三晉強盛雖欲勿許其可得乎是大不然夫三晉雖強茍不顧天下之誅而犯義侵禮則不請於天子而自立矣不請於天子而自立則為悖逆之臣天下茍有桓文之君必奉禮義而征之今請於天子而天子許之是受天子之命而為諸侯也誰得而討之故三晉之列於諸侯非三晉之壞禮乃天子自壞之也烏呼君臣之禮既壞矣則天下以智力相雄長遂使聖賢之後為諸侯者社稷無不泯絶生民之類糜滅幾盡豈不哀哉初智宣子將以瑶為後智果曰不如宵也瑶之賢於人者五其不逮者一也美鬚長大則賢射御足力則賢伎藝畢給則賢巧文辨慧則賢強毅果敢則賢如是而甚不仁夫以其五賢陵人而以不仁行之其誰能待之若果立瑶也智宗必滅弗聽智果别族於太史為輔氏趙簡子之子長曰伯魯幼曰無恤將置後不知所立乃書訓戒之辭於二簡以授二子曰謹識之三年而問之伯魯不能舉其辭求其簡已失之矣問無恤誦其辭甚習求其簡出諸袖中而奏之於是簡子以無恤為賢立以為後簡子使尹鐸為晉陽請曰以為繭絲乎抑為保障乎簡子曰保障哉尹鐸損其户數簡子謂無恤曰晉國有難而無以尹鐸為少無以晉陽為逵必以為歸及智宣子卒智襄子為政與韓康子魏桓子宴於藍臺智伯戲康子而侮假規智國聞之諌曰主不備難必至矣智伯曰難將由我我不為難誰敢興之對曰不然夏書有之曰一人三失怨豈在明不見是圗夫君子能勤小物故無大患今主一宴而耻人之君相又弗備曰不敢興難無乃不可乎蚋蟻蜂蠆皆能害人况君相乎弗聽智伯請地於韓康子康子欲弗與假規曰智伯好利而愎不與將伐我不如與之彼狃於得地必請於他人他人不與必嚮之以兵然則我得免於患而待事之變矣康子曰善使使者致萬家之邑於智伯智伯恱又求地於魏桓子桓子欲弗與任章曰何故弗與桓子曰無故索地故弗與任章曰無故索地諸大夫必懼吾與之地智伯必驕彼驕而輕敵此懼而相親以相親之兵待輕敵之人智氏之命必不長矣周書曰將欲敗之必姑輔之將欲取之必姑與之主不如與之以驕智伯然後可以擇交而圖智氏矣奈何獨以吾為智氏質乎桓子曰善復與之萬家之邑一智伯又求蔡臯狼之地於趙襄子襄子弗與智伯怒帥韓魏之甲以攻趙氏襄子將出曰吾何走乎從者曰長子近且城厚完襄子曰民罷力以完之又斃死以守之其誰與我從者曰邯鄲之倉庫實襄子曰浚民之膏澤以實之又因而殺之其誰與我其晉陽乎先主之所屬也尹鐸之所寬也民必和矣乃走晉陽三家以國人圍而灌之城不浸者三版沈竈産蛙民無叛意智伯行水魏桓子御韓康子驂乘智伯曰吾乃今知水可以亡人國也桓子肘康子康子履桓子之跗以汾水可以灌安邑絳水可以灌平陽也絺疵謂智伯曰韓魏必反矣智伯曰子何以知之絺疵曰以人事知之夫從韓魏之兵而攻趙趙亡難必及韓魏矣今約勝趙而三分其地城不沒者三版人馬相食城降有日而二子無喜志有憂色是非反而何明日智伯以絺疵之言告二子二子曰此夫讒臣欲為趙氏遊説使主疑於二家而懈於攻趙氏也不然夫二家豈不利朝夕分趙氏之田而欲為危難不可成之事乎二子出絺疵入曰主何以臣之言告二子也智伯曰子何以知之對曰臣見其視臣端而趨疾知臣得其情故也智伯不悛絺疵請使於齊趙襄子使張孟談潛出見二子曰臣聞脣亡則齒寒今智伯帥韓魏而攻趙趙亡則韓魏為之次矣二子曰我心知其然也恐事未遂而謀泄則禍立至矣張孟談曰謀出二主之口入臣之耳何傷也二子乃隂與張孟談約為之期日而遣之襄子夜使人殺守隄之吏而決水灌智伯軍智伯軍救水而亂韓魏翼而擊之襄子將卒犯其前大敗智伯之衆遂殺智伯盡滅智氏之族唯輔果在臣光曰智伯之亡也才勝德也夫才與德異而世俗莫之能辨通謂之賢此其所以失人也夫聰察強毅之謂才正直中和之謂德才者德之資也德者才之帥也雲夢之竹天下之徑也然而不矯揉不羽括則不能以入堅棠溪之金天下之利也然而不鎔範不砥礪則不能以擊強是故才德全盡謂之聖人才德兼亡謂之愚人德勝才謂之君子才勝德謂之小人凡取人之術茍不得聖人君子而與之與其得小人不若得愚人何則君子挾才以為善小人挾才以為惡挾才以為善者善無不至矣挾才以為惡者惡亦無不至矣愚者雖欲為不善智不能周力不能勝譬之乳狗搏人人得而制之小人智足以遂其姦勇足以決其暴是虎而翼者也其為害豈不多哉夫德者人之所嚴而才者人之所愛愛者易親嚴者易踈是以察者多蔽於才而遺於德自古昔以來國之亂臣家之敗子才有餘而德不足以至於顛覆者多矣豈特智伯哉故為國為家者茍能審於才德之分而知所先後又何失人之足患哉三家分智氏之田趙襄子漆智伯之頭以為飲器智伯之臣豫讓欲為之報仇乃詐為刑人挾匕首入襄子宫中塗厠襄子如厠心動索之獲豫讓左右欲殺之襄子曰智伯死無後而此人欲為報仇真義士也吾謹避之耳乃舍之豫讓又漆身為癩吞炭為啞行乞於市其妻不識也行見其友其友識之為之泣曰以子之才臣事趙孟必得近幸子乃為所欲為顧不易邪何乃自苦如此求以報仇不亦難乎豫讓曰不可既已委質為臣而又求殺之是二心也凡吾所為者極難耳然所以為此者將以愧天下後世之為人臣懷二心者也襄子出豫讓伏於橋下襄子至橋馬驚索之得豫讓遂殺之襄子為伯魯之不立也有子五人不肯置後封伯魯之子於代曰代成君早卒立其子浣為趙氏後襄子卒弟桓子逐浣而自立一年卒趙氏之人曰桓子立非襄主意乃共殺其子復迎浣而立之是為獻子獻子生籍是為烈侯魏斯者桓子之孫也是為文侯韓康子生武子武子生虔是為景侯韓借師於魏以伐趙文侯曰寡人與趙兄弟也不敢聞命趙借師於魏以伐韓文侯應之亦然二國皆怒而去已而知文侯以講於已也皆朝于魏魏由是始大於三晉諸侯莫能與之爭秦并六國周顯王七年秦獻公薨子孝公立孝公生二十一年矣是時河山以東強國六淮泗之間小國十餘楚魏與秦接界魏築長城自鄭濵洛以北有上郡楚自漢中南有巴黔中皆以夷翟遇秦擯斥之不得與中國之會盟於是孝公發憤布德修政欲以強秦八年孝公令國中曰昔我穆公自岐雍之間修德行武東平晉亂以河為界西霸戎翟廣地千里天子致伯諸侯畢賀為後世開業甚光美會往者厲躁簡公出子之不寧國家內憂未遑外事三晉攻奪我先君河西地醜莫大焉獻公即位鎮撫邊境徙治櫟陽且欲東伐復穆公之故地修穆公之政令寡人思念先君之意常痛於心賔客羣臣有能出竒計強秦者吾且尊官與之分土於是衛公孫鞅聞是令下乃西入秦公孫鞅者衛之庶孫也好刑名之學事魏相公孫痤痤知其賢未及進會病魏惠王往問之曰公叔病有如不可諱將奈社稷何公叔曰痤之中庶子衛鞅年雖少有竒才願君舉國而聽之王默然公叔曰君即不聽用鞅必殺之無令出境王許諾而去公叔召鞅謝曰吾先君而後臣故先為君謀後以告子子必速行矣鞅曰君不能用子之言任臣又安能用子之言殺臣乎卒不去王出謂左右曰公叔病甚悲乎欲令寡人以國聽衛鞅也既又勸寡人殺之豈不悖哉衛鞅既至秦因嬖臣景監以求見孝公説以富國強兵之術公大恱與議國事十年衛鞅欲變法秦人不恱衛鞅言於秦孝公曰夫民不可與慮始可與樂成論至德者不和於俗成大功者不謀於衆是以聖人茍可以強國不法其故甘龍曰不然緣法而治者吏習而民安之衛鞅曰常人安於故俗學者溺於所聞以此兩者居官守法可也非所與論於法之外也智者作法愚者制焉賢者更禮不肖者拘焉公曰善以衛鞅為左庶長卒定變法之令令民為什伍而相收司連坐告姦者與斬敵首同賞不告姦者與降敵同罰有軍功者各以率受上爵為私鬭者各以輕重被刑大小僇力本業耕織致粟帛多者復其身事末利及怠而貧者舉以為收孥宗室非有軍功論不得屬籍明尊卑爵秩等級各以差次名田宅臣妾衣服有功者顯榮無功者雖富無所芬華令既具未布恐民之不信乃立三丈之木於國都市南門募民有能徙置北門者豫十金民怪之莫敢徙復曰能徙者豫五十金有一人徙之輒豫五十金乃下令令行期年秦民之國都言新令之不便者以千數於是太子犯法衛鞅曰法之不行自上犯之太子君嗣也不可施刑刑其傅公子虔黥其師公孫賈明日秦人皆趨令行之十年秦國道不拾遺山無盜賊民勇於公戰怯於私鄉邑大治秦民初言令不便者有來言令便者衛鞅曰此皆亂法之民也盡遷之於邊其後民莫敢議令臣光曰夫信者人君之大寶也國保於民民保於信非信無以使民非民無以守國是故古之王者不欺四海霸者不欺四鄰善為國者不欺其民善為家者不欺其親不善者反之欺其鄰國欺其百姓甚者欺其兄弟欺其父子上不信下下不信上上下離心以至於敗所利不能藥其所傷所獲不能輔其所亡豈不哀哉昔齊桓公不背曹沫之盟晉文公不貪伐原之利魏文侯不棄虞人之期秦孝公不廢徙木之賞此四君者道非粹白而商君尤稱刻薄又處戰攻之丗天下趨於詐力猶且不敢忘信以畜其民況為四海治平之政者哉侯薨韓懿侯立子昭十一年秦敗韓師于西山十四年秦孝公魏惠王會于杜平十五年秦敗魏師于元里斬首七千級取少梁十七年秦大良造衛鞅伐魏十八年秦衛鞅圍魏固陽降之十九年秦商鞅築冀闕宫庭於咸陽徙都之令民父子兄弟同室內息者為禁并諸小鄉聚集為一縣縣置令丞凡三十一縣廢井田開阡陌平斗桶權衡丈尺子肅侯立趙成侯薨太二十一年秦商鞅更為賦稅法行之二十六年王致伯于秦諸侯皆賀秦秦孝公使公子少官帥師會諸侯于逢澤以朝王二十九年衛鞅言於秦孝公曰秦之與魏譬若人之有腹心之疾非魏并秦秦即并魏何者魏居嶺厄之西都安邑與秦界河而獨擅山東之利利則西侵秦病則東收地今以君之賢聖國賴以盛而魏往年大破於齊諸侯畔之可因此時伐魏魏不支秦必東徙然後秦據河山之固東鄉以制諸侯此帝王之業也公從之使衛鞅將兵伐魏魏使公子卬將而禦之軍既相距衛鞅遺公子卬書曰吾始與公子歡今俱為兩國將不忍相攻可與公子面相見盟樂飲而罷兵以安秦魏之民公子卬以為然乃相與會盟已飲而衛鞅伏甲士襲虜公子卬因攻魏師大破之魏惠王恐使使獻河西之地於秦以和因去安邑徙都大梁乃嘆曰吾恨不用公叔之言秦封衛鞅商於十五邑號曰商君王薨楚宣商立子成王三十一年秦孝公薨子惠文王立公子虔之徒告商君欲反發吏捕之商君亡之魏魏人不受復納之秦商君乃與其徒之商於發兵北擊鄭秦人攻商君殺之車裂以徇盡滅其家三十四年秦伐韓拔宜陽三十六年初洛陽人蘇秦説秦王以兼天下之術秦王不用其言蘇秦乃去説燕文公曰燕之所以不犯寇被甲兵者以趙之為蔽其南也且秦之攻燕也戰於千里之外趙之攻燕也戰於百里之內夫不憂百里之患而重千里之外計無過於此者願大王與趙從親天下為一則燕國必無患矣文公從之資蘇秦車馬以説趙肅侯曰當今之時山東之建國莫強於趙秦之所害亦莫如趙然而秦不敢舉兵伐趙者畏韓魏之議其後也秦之攻韓魏也無有名山大川之限稍蠶食之傅國都而止韓魏不能支秦必入臣於秦秦無韓魏之規則禍中於趙矣臣以天下之圖案之諸侯之地五倍於秦料度諸侯之卒十倍於秦六國為一并力西鄉而攻秦秦必破矣夫衡人者皆欲割諸侯之地以與秦秦成則其身富榮國被秦患而不與其憂是故衡人日夜務以秦權恐愒諸侯以求割地故願大王熟計之也竊為大王計莫如一韓魏齊楚燕趙為從親以畔秦令天下之將相會於洹水之上通質結盟約曰秦攻一國五國各出鋭師或撓秦或救之有不如約者五國共伐之諸侯從親以擯秦秦甲必不敢出於函谷以害山東矣肅侯大説厚待蘇秦尊寵賜賚之以約於諸侯會秦使犀首伐魏大敗其師四萬餘人禽將龍賈取雕隂且欲東兵蘇秦恐秦兵至趙而敗從約念莫可使用於秦者乃激怒張儀入之於秦張儀者魏人與蘇秦俱事鬼谷先生學縱橫之術蘇秦自以為不及也儀遊諸侯無所遇困於楚蘇秦故召而辱之儀怒念諸侯獨秦能苦趙遂入秦蘇秦隂遣其舍人齎金幣資儀儀得見秦王秦王説之以為客卿舍人辭去曰蘇君憂秦伐趙敗從約以為非君莫能得秦柄故激怒君使臣隂奉給君資盡蘇君之計謀也張儀曰嗟乎此在吾術中而不悟吾不及蘇君明矣為吾謝蘇君蘇君之時儀何敢言於是蘇秦説韓宣惠王曰韓地方九百餘里帶甲數十萬天下之強弓徑弩利劒皆從韓出韓卒超足而射百發不暇止以韓卒之勇被堅甲跖徑弩帶利劒一人當百不足言也大王事秦秦必求宜陽成臯今兹效之明年又復求割地與則無地以給之不與則棄前功受後禍且大王之地有盡而秦之求無已以有盡之地逆無已之求此所謂市怨結禍者也不戰而地已削矣鄙諺曰寧為雞口無為牛後夫以大王之賢挾強韓之兵而有牛後之名臣竊謂大王羞之韓王從其言蘇秦説魏王曰大王之地方千里地名雖小然而田舍廬廡之數曽無所芻牧人民之衆車馬之多日夜行不絶輷輷殷殷若有三軍之衆臣竊量大王之國不下楚今竊聞大王之卒武士二十萬蒼頭二十萬奮擊二十萬厮徒十萬車六百乘騎五千匹乃聽於羣臣之説而欲臣事秦願大王熟察之故敝邑趙王使臣效愚計奉明約在大王之詔詔之魏王聽之蘇秦説齊王曰齊四塞之國地方二千餘里帶甲數十萬粟如丘山三軍之良五家之兵進如鋒矢戰如雷霆解如風雨即有軍役未嘗倍泰山絶清河涉渤海也臨災之中七萬户臣竊度之不下户三男子不待發於逺縣而臨災之卒固已二十一萬矣臨災甚冨而實其民無不鬬雞走狗六博闒鞠臨災之塗車轂擊人肩摩連祍成帷揮汗成雨夫韓魏之所以重畏秦者為與秦接境壤也兵出而相當不十日而戰勝存亡之機決矣韓魏戰而勝秦則兵半折四境不守戰而不勝則國已危亡隨其後是故韓魏之所以重與秦戰而輕為之臣也今秦之攻齊則不然倍韓魏之地過衛陽晉之道經乎亢父之險車不得方軌騎不得比行百人守險千人不敢過也秦雖欲深入則狼顧恐韓魏之議其後也是故恫疑虛喝驕矜而不敢進則秦之不能害齊亦明矣夫不深料秦之無奈齊何而欲西面而事之是羣臣之計過也今無臣事秦之名而有強國之實臣是故願大王少留意計之齊王許之乃西南説楚威王曰楚天下之強國也地方六千餘里帶甲百萬車千乘騎萬匹粟支十年此霸王之資也秦之所害莫如楚楚強則秦弱秦強則楚弱其勢不兩立故為大王計莫如從親以孤秦臣請令山東之國奉四時之獻以承大王之明詔委社稷奉宗廟練士厲兵在大王之所用之故從親則諸侯割地以事楚衡合則楚割地以事秦此兩䇿者相去逺矣大王何居焉楚王亦許之於是蘇秦為從約長并相六國北報趙車騎輜重擬於王者薨子宣惠王立韓髙門成昭侯宣王辟強立齊威王薨子子易王立燕文公薨三十七年秦惠王使犀首欺齊魏與共伐趙以敗從約趙肅侯讓蘇秦蘇秦恐請使燕必報齊蘇秦去趙而從約皆解趙人決河水以灌齊魏之師乃去魏以隂晉為和於秦實華隂三十九年秦伐魏圍焦曲沃魏入少梁河西地于秦四十年秦伐魏度河取汾隂皮氏拔焦薨子懷楚威王立王槐四十一年秦公子華張儀帥師圍魏蒲陽取之張儀言於秦王請以蒲陽復與魏而使公子繇質於魏儀因説魏王曰秦之遇魏甚厚魏不可以無禮於秦魏因盡入上郡十五縣以謝焉儀歸而相秦四十二年秦歸焦曲沃於魏薨子武靈王立四十三年趙肅侯四十四年夏四月戊午秦初稱王四十五年秦張儀帥師伐魏取陜四十六年秦張儀及齊楚之相會齧桑四十七年秦張儀自齧桑還而免相相魏欲令魏先事秦而諸侯效之魏王不聽秦王伐魏取曲沃平周復隂厚張儀益甚四十八年王崩子慎靚王定立子噲立燕易王薨周慎靚王二年秦伐韓取鄢子襄王立魏惠王薨三年楚趙魏韓燕同伐秦攻函谷關秦人出兵逆之五國之師皆敗走四年秦敗韓師于修魚斬首八萬級虜其將䱸申差于濁澤諸侯振恐齊大夫與蘇秦爭寵使人剌秦殺之張儀説魏襄王曰梁地方不至千里卒不過三十萬地四平無名山大川之限卒戍楚韓齊趙之境守亭障者不下十萬梁之地勢固戰場也夫諸侯之約從盟洹水之上結為兄弟以相堅也今親兄弟同父母尚有爭錢財相殺傷而欲恃反覆蘇秦之餘謀其不可成亦明矣大王不事秦秦下兵攻河外據卷衍酸棗劫衛取陽晉則趙不南趙不南而梁不北梁不北則從道絶從道絶則大王之國欲毋危不可得也故願大王審定計議且賜骸骨魏王乃倍從約而因儀以請成于秦張儀歸復相秦五年巴蜀相攻擊俱告急於秦秦惠王欲伐蜀以為道險狹難至而韓又來侵猶豫未能決司馬錯請伐蜀張儀曰不如伐韓王曰請聞其説儀曰親魏善楚下兵三川攻新城宜陽以臨二周之郊據九鼎按圗籍挾天子以令於天下天下莫敢不聽此王業也臣聞爭名者於朝爭利者於市今三川周室天下之朝市也而王不爭焉顧爭於戎翟去王業逺矣司馬錯曰不然臣聞之欲富國者務廣其地欲強兵者務富其民欲王者務博其德三資者備而王隨之矣今王地小民貧故臣願先從事於易夫蜀西僻之國而戎翟之長也有桀紂之亂以秦攻之譬如使豺狼逐羣羊得其地足以廣國取其財足以富民繕兵不傷衆而彼已服焉拔一國而天下不以為暴利盡西海而天下不以為貪是我一舉而名實附也而又有禁暴止亂之名今攻韓劫天子惡名也而未必利也又有不義之名而攻天下所不欲危矣臣請論其故周天下之宗室也齊韓之與國也周自知失九鼎韓自知亡三川將二國并力合謀以因乎齊趙而求解乎楚魏以鼎與楚以地與魏王弗能止也此臣之所謂危也不如伐蜀完王從錯計起兵伐蜀十月取之貶蜀王更號為侯而使陳莊相蜀蜀既屬秦秦以益強富厚輕諸侯讓其相子之燕王噲以國年王崩子赧王延立周赧王元年魏人叛秦秦人伐魏取曲沃而歸其人又敗韓於岸門韓太子倉入質于秦以和之遂殺王噲齊伐燕取子之醢湣王地立齊宣王薨子二年秦右更疾伐趙拔藺虜其將莊豹秦王欲伐齊患齊楚之從親乃使張儀至楚説楚王曰大王誠能聽臣閉關絶約於齊臣請獻商於之地六百里使秦女得為大王箕帚之妾秦楚娶婦嫁女長為兄弟之國楚王説而許之羣臣皆賀陳軫獨弔王怒曰寡人不興師而得六百里地何弔也對曰不然以臣觀之商於之地不可得而齊秦合齊秦合則患必至矣王曰有説乎對曰夫秦之所以重楚者以其有齊也今閉關絶約於齊則楚孤秦奚貪夫孤國而與之商於之地六百里張儀至秦必負王是王北絶齊交西生患於秦也兩國之兵必俱至為王計者不若隂合而陽絶於齊使人隨張儀茍與吾地絶齊未晚也王曰願陳子閉口毋復言以待寡人得地乃以相印授張儀厚賜之遂閉關絶約於齊使一將軍隨張儀至秦張儀徉墮車不朝三月楚王聞之曰儀以寡人絶齊未甚邪乃使勇士宋遺借宋之符北罵齊王齊王大怒折節而事秦齊秦之交合張儀乃朝見楚使者曰子何不受地從某至某廣袤六里使者怒還報楚王楚王大怒欲發兵而攻秦陳軫曰軫可發口言乎攻之不如因賂以一名都與之并兵而攻齊是我亡地於秦取償於齊也今王已絶於齊而責欺於秦是吾合秦齊之交而來天下之兵也國必大傷矣楚王不聽使屈丐帥師伐秦秦亦發兵使庶長章擊之三年春秦師及楚戰于丹陽楚師大敗斬甲士八萬虜屈丐及列侯執圭七十餘人遂取漢中郡楚王悉發國內兵以復襲秦戰於藍田楚師大敗韓魏聞楚之困南襲楚至鄧楚人聞之乃引兵歸割兩城以請平于秦平是為昭王燕人共立太子惠王韓宣王倉立薨子襄四年秦惠王使人告楚懷王請以武關之外易黔中地楚王曰不願易地願得張儀而獻黔中地張儀聞之請行王曰楚將甘心於子奈何行張儀曰秦強楚弱大王在楚不宜敢取臣且臣善其嬖臣靳尚靳尚得事幸姬鄭袖袖之言王無不聽者遂往楚王囚將殺之靳尚謂鄭袖曰秦王甚愛張儀將以上庸六縣及美女贖之王重地尊秦秦女必貴而夫人斥矣於是鄭袖日夜泣於楚王曰臣各為其主耳今殺張儀秦必大怒妾請子母俱遷江南毋為秦所魚肉也王乃赦張儀而厚禮之張儀因説楚王曰夫為從者無以異於驅羣羊而攻猛虎不格明矣今王不事秦秦劫韓驅梁而攻楚則楚危矣秦西有巴蜀治船積粟浮岷江而下一日行三百餘里不至十日而距扞關扞關驚則從境以東盡城守矣黔中巫郡非王之有秦舉甲出武關則北地絶秦兵之攻楚也危難在三月之內而楚待諸侯之救在半嵗之外夫待弱國之救忘強秦之禍此臣所為大王患也大王誠能聽臣請令秦楚長為兄弟之國無相攻伐楚王已得張儀而重出黔中地乃許之張儀遂之韓説韓王曰韓地險惡山居五榖所生非菽而麥國無二嵗之食見卒不過二十萬秦被甲百餘萬山東之士被甲蒙胄而會戰秦人捐甲徒裼以趨敵左挈人頭右挾生虜夫戰孟賁烏獲之士以攻不服之弱國無異垂千鈞之重於鳥卵之上必無幸矣大王不事秦秦下甲據宜陽塞成臯則王之國分矣鴻臺之宫桑林之苑非王之有也為大王計莫如事秦而攻楚以轉禍而恱秦計無便於此者韓王許之張儀歸報秦王封以六邑號武信君復使東説齊王曰從人説大王者必曰齊蔽於三晉地廣民衆兵強士勇雖有百秦將無奈齊何大王賢其説而不計其實今秦楚嫁女娶婦為昆弟之國韓獻宜陽梁效河外趙王入朝割河間以事秦大王不事秦秦驅韓梁攻齊之南地悉趙兵渡清河指博關臨災即墨非王之有也國一日見攻雖欲事秦不可得也齊王許張儀張儀去西説趙王曰大王收率天下以擯秦秦兵不敢出函谷關十五年大王之威行於山東敝邑恐懼繕甲厲兵力田積粟愁居懾處不敢動搖唯大王有意督過之也今以大王之力舉巴蜀并漢中包兩周守白馬之津秦雖僻逺然而心忿含怒之日久矣今秦有敝甲凋兵軍於澠池願渡河踰漳據畨吾會邯鄲之下願以甲子合戰正殷紂之事謹使使臣先聞左右今楚與秦為昆弟之國而韓梁稱東藩之臣齊獻魚鹽之地此斷趙之右肩也夫斷右肩而與人鬭失其黨而孤居求欲毋危得乎今秦發三將軍其一軍塞午道告齊使渡清河軍於邯鄲之東一軍軍成臯驅韓梁軍於河外一軍軍於澠池約四國為一以攻趙趙服必四分其地臣竊為大王計莫如與秦王面相約而口相結常為兄弟之國也趙王許之張儀乃北之燕説燕王曰今趙王已入朝效河間以事秦大王不事秦秦下甲雲中九原驅趙而攻燕則易水長城非大王之有也且今時齊趙之於秦猶郡縣也不敢妄舉師以攻伐今王事秦長無齊趙之患矣燕王請獻常山之尾五城以和張儀歸報未至咸陽秦惠王薨子武王立武王自為太子時不説張儀及即位羣臣多毁短之諸侯聞儀與秦王有隙皆畔衡復合從五年張儀説秦武王曰為王計者東方有變然後王可以多割得地也臣聞齊王甚憎臣臣之所在必伐之臣願乞其不肖之身以之梁齊必伐梁齊梁交兵而不能相去王以其間伐韓入三川挾天子案圗籍此王業也王許之齊王果伐梁梁王恐張儀曰王勿患也請令齊罷兵乃使其舍人之楚借使謂齊王曰甚矣王之託儀於秦也齊王曰何故楚使者曰張儀之去秦也固與秦王謀矣欲齊梁相攻而令秦取三川也今王果伐梁是王內罷國而外伐與國以信儀於秦王也齊王乃解兵還張儀相魏一嵗卒儀與蘇秦皆以縱橫之術遊諸侯致位富貴天下爭慕效之又有魏人公孫衍者號曰犀首亦以談説顯名其餘蘇代蘇厲周最樓緩之徒紛紛遍於天下務以辨詐相髙不可勝紀而儀秦衍最著秦王魏王會于臨晉六年秦初置丞相以樗里疾為右丞相七年秦魏會于應秦王使甘茂約魏以伐韓而令向壽輔行甘茂至魏令向壽還謂王曰魏聽臣矣然願王勿伐王迎甘茂於息壤而問其故對曰宜陽大縣其實郡也今王倍數險行千里攻之難魯人有與曾參同姓名者殺人人告其母其母織自若也及三人告之其母投杼下機踰牆而走臣之賢不若曾參王之信臣又不如其母疑臣者非特三人臣恐大王之投杼也魏文侯令樂羊將而攻中山三年而拔之反而論功文侯示之謗書一篋樂羊再拜稽首曰此非臣之功君之力也今臣羇旅之臣也樗里子公孫奭挾韓而議之王必聽之是王欺魏王而臣受公仲侈之怨也王曰寡人弗聽也請與子盟乃盟於息壤秋甘茂庶長封帥師伐宜陽八年甘茂攻宜陽五月而不拔樗里子公孫奭果爭之秦王召甘茂欲罷兵甘茂曰息壤在彼王曰有之因大悉起兵以佐甘茂斬首六萬遂拔宜陽韓公仲侈入謝於秦以請平秦武王好以力戲力士任鄙烏獲孟説皆至大官八月王與孟説舉鼎絶脈而薨族孟説武王無子異母弟稷為質於燕國人逆而立之是為昭襄王九年秦昭王使向壽平宜陽而使樗里子甘茂伐魏甘茂言於王以武遂復歸之韓向壽公孫奭爭之不能得由此怨讒甘茂茂懼輟伐魏蒲阪亡去樗里子與魏講而罷兵甘茂奔齊趙王使樓緩之秦楚王與齊韓合從十年秦宣太后異父弟曰穰侯魏冉同父弟曰垂陽君芉戎王之同母弟曰髙陵君涇陽君魏冉最賢自惠王武王時任職用事武王薨諸弟爭立唯魏冉力能立昭王昭王即位以冉為將軍衛咸陽是嵗庶長壯及大臣諸公子謀作亂魏冉誅之及惠文后皆不得良死悼武王后出歸于魏王兄弟不善者魏冉皆滅之王少宣太后自治事任魏冉為政威震秦國十一年秦王楚王盟于黃棘秦復與楚上庸十二年秦取魏蒲阪晉陽封陵又取韓武遂齊韓魏以楚負其從親合兵伐楚楚王使太子橫為質於秦而請救秦客卿通將兵救楚三國引兵去十三年秦王魏王韓太子嬰會于臨晉韓太子至咸陽而歸秦復與魏蒲阪秦大夫有私與楚太子鬭者太子殺之亡歸十四年秦人取韓穰秦庶長奐會韓魏齊兵伐楚敗其師於重丘殺其將唐昧遂取重丘十五年秦涇陽君為質於齊秦華陽君伐楚大破楚師斬首三萬殺其將景缺取楚襄城楚王恐使太子為質於齊以請平秦樗里疾卒以趙人樓緩為丞相十六年五月趙武靈王傳國於少子何自號主父主父欲使子治國身胡服將士大夫西北略胡地將自雲中九原南襲咸陽於是詐自為使者入秦欲以觀秦地形及秦王之為人秦王不知已而怪其狀甚偉非人臣之度使人逐之主父行已脫關矣審問之乃主父也秦人大驚齊王魏王會于韓秦人伐楚取八城秦王遺楚王書曰始寡人與王約為弟兄盟於黃棘太子入質至歡也太子陵殺寡人之重臣不謝而亡去寡人誠不勝怒使兵侵君王之邊今聞君王乃令太子質於齊以求平寡人與楚接境婚姻相親而今秦楚不歡則無以令諸侯寡人願與君王會武關靣相約結盟而去寡人之願也楚王患之欲往恐見欺欲不往恐秦益怒昭睢曰毋行而發兵自守耳秦虎狼也有并諸侯之心不可信也懷王之子子蘭勸王行王乃入秦秦王令一將軍詐為王伏兵武關楚王至則閉關劫之與西至咸陽朝章臺如藩臣禮要以割巫黔中郡楚王欲盟秦王欲先得地楚王怒曰秦詐我而又強要我以地因不復許秦人留之楚大臣患之乃相與謀曰吾王在秦不得還要以割地而太子為質於齊齊秦合謀則楚無國矣欲立王子之在國者昭睢曰王與太子俱困於諸侯而今又倍王命而立其庶子不宜乃詐赴於齊齊湣王召羣臣謀之或曰不若留太子以求楚之淮北齊相曰不可郢中立王是吾抱空質而行不義於天下也其人曰不然郢中立王因與其新王市曰豫我下東國吾為王殺太子不然將與三國共立之齊王卒用其相計而歸楚太子楚人立之秦王聞孟嘗君之賢使涇陽君為質於齊以請孟嘗君來入秦秦王以為丞相十七年或謂秦王曰孟嘗君相秦必先齊而後秦秦其危哉秦王乃以樓緩為相囚孟嘗君欲殺之孟嘗君使人求解於秦王幸姬姬曰願得君狐白裘孟嘗君有狐白裘已獻之秦王無以應姬求客有善為狗盜者入秦藏中盜狐白裘以獻姬姬乃為之言於王而遣之王後悔使追之孟嘗君至關關法雞鳴而出客時尚蚤追者將至客有善為雞鳴者野雞聞之皆鳴孟嘗君乃得脫歸楚人告于秦曰賴社稷神靈國有王矣秦王怒發兵出武關擊楚斬首五萬取十六城十八年楚懷王亡歸秦人覺之遮楚道懷王從間道走趙趙主父在代趙人不敢受懷王將走魏秦人追及之以歸十九年楚懷王發病薨於秦秦人歸其喪楚人皆憐之如悲親戚諸侯由是不直秦齊韓魏趙宋同擊秦至鹽氏而還秦與韓武遂與魏封陵以和子昭王立魏襄王薨釐王咎立韓襄王薨子二十年秦尉錯伐魏襄城秦樓緩免相魏冉代之二十一年秦敗魏師于解二十二年韓公孫喜魏人伐秦穰侯薦左更白起於秦王以代向壽將兵敗魏師韓師於伊闕斬首二十四萬級虜公孫喜拔五城秦王以白起為國尉秦王遺楚王書曰楚倍秦秦且率諸侯伐楚願王之飭士卒得一樂戰楚王患之乃復與秦和親二十三年楚襄王迎婦于秦臣光曰甚哉秦之無道也殺其父而劫其子楚之不競也忍其父而婚其讎烏呼楚之君誠得其道臣誠得其人秦雖強烏得陵之哉善乎荀卿論之曰夫道善用之則百里之地可以獨立不善用之則楚六千里而為讎人役故人主不務得道而廣有其勢是其所以危也秦魏冉謝病免以客卿燭壽為丞相二十四年秦伐韓拔宛秦燭壽免魏冉復為丞相封於穰與陶謂之穰侯二十五年魏入河東地四百里韓入武遂地二百里于秦二十六年秦大良造白起客卿錯伐魏至軹取城大小六十一二十七年冬十月秦王稱西帝遣使立齊王為東帝欲約與共伐趙蘇代自燕來齊王曰秦使魏冉致帝子以為何如對曰願王受之而勿稱也秦稱之天下安之王乃稱之無後也秦稱之天下惡之王因勿稱以收天下此大資也且伐趙孰與伐桀宋利今王不如釋帝以收天下之望發兵以伐桀宋宋舉則楚趙梁衛皆懼矣是我以名尊秦而令天下憎之所謂以卑為尊也齊王從之稱帝二日而復歸之十二月呂禮自齊入秦秦王亦去帝復稱王秦攻趙拔杜陽二十八年秦攻魏拔新垣曲陽二十九年秦司馬錯擊魏河內魏獻安巴以和秦出其人歸之魏秦敗韓師于夏山三十年秦王會楚王于宛會趙王于中陽秦蒙武擊齊拔九城燕昭王與樂毅謀伐齊樂毅曰齊霸國之餘業也地大人衆未易獨攻也王必欲伐之莫如約趙及楚魏於是使樂毅約趙别使使者連楚魏且令趙嚪秦以伐齊之利諸侯害齊王之驕暴皆爭合謀與燕伐齊三十一年燕王悉起兵以樂毅為上將軍秦尉斯離帥師與三晉之師會之趙王以相國印授樂毅樂毅并將秦魏韓趙之兵以伐齊齊湣王悉國中之衆以拒之戰于濟西齊師大敗楚齒執之齊湣王出走鼓里弒王於秦王魏王韓王會于京師三十二年秦趙會于穰秦拔魏安城兵至大梁而還趙王得楚和氏璧秦昭王欲之請易以十五城趙王欲勿與畏秦強欲與之恐見欺以問藺相如對曰秦以城求璧而王不許曲在我矣我與之璧而秦不與我城則曲在秦均之二䇿寧許以負秦臣願奉璧而往使秦城不入臣請完璧而歸之趙王遣之相如至秦秦王無意償趙城相如乃以詐紿秦王復取璧遣從者懷之間行歸趙而以身待命於秦秦王以為賢而弗誅禮而歸之趙王以相如為上大夫臣相與求之立以為齊王齊王子法章亡在莒齊亡三十三年秦伐趙拔兩城三十四年秦伐趙拔石城秦穰侯復為丞相楚欲與齊韓共伐秦因欲圗周王使東周武公謂楚令尹昭子曰周不可圗也昭子曰乃圗周則無之雖然何不可圗武公曰西周之地絶長輔短不過百里名為天下共主裂其地不足以肥國得其衆不足以徑兵雖然攻之者名為弒君然而猶有欲攻之者見祭器在焉故也夫虎肉臊而兵利身人猶攻之若使澤中之麋蒙虎之皮人之攻之也必萬倍矣裂楚之地足以肥國詘楚之名足以尊王今子欲誅殘天下之共主居三代之傳器器南則兵至矣於是楚計輟不行三十五年秦白起敗趙軍斬首二萬取代光狼城又使司馬錯發隴西兵因蜀攻楚黔中拔之楚獻漢北及上庸地三十六年秦白起伐楚取鄢鄧西陵秦王使使者告趙王願為好會於河外澠池趙王欲毋行亷頗藺相如計曰王不行示趙弱且怯也趙王遂行相如從亷頗送至境與王訣曰王行度道里會遇之禮畢還不過三十日三十日不還則請立太子以絶秦望王許之會于澠池王與趙王飲酒酣秦王請趙王鼓瑟趙王鼓之藺相如復請秦王擊缶秦王不肯相如曰五步之內臣請得以頸血濺大王矣左右欲刃相如相如張目叱之左右皆靡王不懌為一擊缶罷酒秦終不能有加於趙趙人亦盛為之備秦不敢動趙王歸國以藺相如為上卿子惠王立燕昭王薨太三十七年秦大良造白起伐楚拔郢燒夷陵楚襄王兵散遂不復戰東北徙都於陳秦以郢置南郡封白起為武安君三十八年秦武安君定巫黔中初置黔中郡安釐王立魏昭王薨子三十九年秦武安君伐魏拔兩城四十年秦相國穰侯伐魏韓暴鳶救魏穰侯大破之斬首四萬暴鳶走開封魏納八城以和穰侯復伐魏走芒卯入北宅遂圍大梁魏人割溫以和四十一年魏復與齊合從秦穰侯伐魏拔四城斬首四萬四十二年趙人魏人伐韓華陽韓人告急於秦秦王弗救韓相國謂陳筮曰事急矣願公雖病為一宿之行陳筮如秦見穰侯穰侯曰事急乎故使公來陳筮曰未急也穰侯怒曰何也陳筮曰彼韓急則將變而他從以未急故復來耳穰侯曰請發兵矣乃與武安君及客卿胡陽救韓八日而至敗魏軍於華陽之下走芒卯虜三將斬首十三萬武安君又與趙將賈偃戰沉其卒二萬人於河魏假干子請割南陽豫秦以和蘇代謂魏王曰欲璽者假干子也欲地者秦也今王使欲地者制璽欲璽者制地魏地盡矣夫以地事秦猶抱薪救火薪不盡火不滅王曰是則然也雖然事始已行不可更矣對曰夫博之所以貴梟者便則食不便則止今何王之用智不如用梟也魏王不聽卒以南陽為和實修武韓魏既服於秦秦王將使武安君與韓魏伐楚未行而楚使者黃歇至聞之畏秦乘勝一舉而滅楚也乃上書曰臣聞物至則反冬夏是也致至則危纍棊是也今大國之地遍天下有其二垂此從生民已來萬乘之地未嘗有也先王三世不忘接地於齊以絶從親之要今王使盛橋守事於韓盛橋以其地入秦是王不用甲不信威而得百里之地王可謂能矣王又舉甲而攻魏杜大梁之門舉河內拔燕酸棗虛挑入邢魏之兵雲翔而不敢救王之功亦多矣王休甲息衆二年而後復之又兵蒲衍首垣以臨仁平丘黃濟陽嬰城而魏氏服王又割濮磨之北注齊秦之要絶楚趙之脊天下五合六聚而不敢救王之威亦單矣王若能保功守威絀攻取之心而肥仁義之地使無後患三王不足四五伯不足六也王若負人徒之衆仗兵革之強乘毁魏之威而欲以力臣天下之主臣恐其有後患也詩曰靡不有初鮮克有終易曰狐涉水濡其尾此言始之易終之難也昔吳之信越也從而伐齊既勝齊人於艾陵還為越王禽三江之浦智氏之信韓魏也從而伐趙攻晉陽城勝有日矣韓魏叛之殺智伯瑤於鑿臺之下今王妬楚之不毁而忘毁楚之強韓魏也臣為王慮而不取也夫楚國援也鄰國敵也今王信韓魏之善王此正吳之信越也臣恐韓魏卑辭除患而實欲欺大國也何則王無重丗之德於韓魏而有纍世之怨焉夫韓魏父子兄弟接踵而死於秦者將十丗矣故韓魏之不亡秦社稷之憂也今王資之與攻楚不亦過乎且攻楚將惡出兵王將借路於仇讎之韓魏乎兵出之日而王憂其不反也王若不借路於仇讎之韓魏必攻隨水右壤此皆廣川大水山林溪谷不食之地是王有毁楚之名而無得地之實也且王攻楚之日四國必悉起兵以應王秦楚之兵御名太上而不離魏氏將出而攻留方與銍湖陵碭蕭相故宋必盡齊人南面攻楚泗上必舉此皆平原四達膏腴之地如此則天下之國莫強於齊魏矣臣為王慮莫若善楚秦楚合而為一以臨韓韓必斂手而朝王施以東山之險帶以曲河之利韓必為關內之侯若是而王以十萬戍鄭梁氏寒心許鄢陵嬰城而上蔡召陵不往來也如此而魏亦關內侯矣王一善楚而關內兩萬乘之主注地於齊齊右壤可拱手而取也王之地一經兩海要約天下是燕趙無齊楚齊楚無燕趙也然後危動燕趙直搖齊楚此四國者不待痛而服矣王從之止武安君而謝韓魏使黃歇歸約親於楚王薨韓釐王立子桓惠四十三年楚以左徒黃歇侍太子完為質於秦秦置南陽郡秦魏楚共伐燕武成主立燕惠王薨子四十五年秦伐趙圍閼與趙王召亷頗樂乘而問之曰可救否皆曰道逺險狹難救問趙奢趙奢對曰道逺險狹譬猶兩鼠鬬於穴中將勇者勝王乃令趙奢將兵救之去邯鄲三十里而止令軍中曰有以軍事諌者死秦師軍武安西鼓譟勒兵武安屋瓦盡振趙軍中候有一人言急救武安趙奢立斬之堅壁留二十八日不行復益增壘秦間入趙軍趙奢善食而遣之問以報秦將秦將大喜曰夫去國三十里而軍不行乃增壘閼與非趙地也趙奢既已遣間卷甲而趨一日一夜而至去閼與五十里而軍軍壘成秦師聞之悉甲而往趙軍士許歷請以軍事諫趙奢進之許歷曰秦人不意趙至此其來氣盛將軍必厚集其陳以待之不然必敗趙奢曰請受教許歷請刑趙奢曰胥後令邯鄲許歷復請諫曰先據北山上者勝後至者敗趙奢許諾即發萬人趨之秦師後至爭山不得上趙奢縱兵擊秦師秦師大敗解閼與而還趙王封奢為馬服君穰侯言客卿竈於秦王使伐齊取剛壽以廣其陶邑初魏人范睢從中大夫須賈使於齊齊襄王聞其辨口私賜之金及牛酒須賈以為睢以國隂事告齊也歸而告其相魏齊魏齊怒笞擊范睢折脅摺齒睢佯死卷以簀置厠中使客醉者更溺之以懲後令無妄言者范睢謂守者曰能出我我必有厚謝守者乃請棄簀中死人魏齊醉曰可矣范睢得出魏齊悔復召求之魏人鄭安平遂操范睢亡匿更名姓曰張祿秦謁者王稽使於魏范睢夜見王稽稽潛載與俱歸薦之於王王見之於離宫睢佯為不知永巷而入其中王來而宦者怒逐之曰王至范睢謬曰秦安得王秦獨有太后穰侯耳王微聞其言乃屏左右跽而請曰先生何以幸教寡人對曰唯唯如是者三王曰先生卒不幸教寡人邪范睢曰非敢然也臣羇旅之臣也交踈於王而所願陳者皆匡君之事處人骨肉之間願效愚忠而未知王之心也此所以王三問而不敢對者也臣知今日言之於前明日伏誅於後然臣不敢避也且死者人之所必不免也茍可以少有補於秦而死此臣之所大願也獨恐臣死之後天下杜口裹足莫肯鄉秦耳王跽曰先生是何言也今者寡人得見先生是天以寡人溷先生而存先王之宗廟也事無大小上及太后下至大臣願先生悉以教寡人無疑寡人也范睢拜王亦拜范睢曰以秦國之大士卒之勇以治諸侯譬若走韓盧而搏蹇兔也而閉關十五年不敢窺兵於山東者是穰侯為秦謀不忠而大王之計亦有所失也王跽曰寡人願聞失計然左右多竊聽者范睢未敢言內先言外事以觀王之俯仰因進曰夫穰侯越韓魏而攻齊剛壽非計也齊湣王南攻楚破軍殺將再辟地千里而齊尺寸之地無得焉者豈不欲得地哉形勢不能有也諸侯見齊之罷敝起兵而伐齊大破之齊幾於亡以其伐楚而肥韓魏也今王不如逺交而近攻得寸則王之寸也得尺則王之尺也今夫韓魏中國之處而天下之樞也王若欲霸必親中國以為天下樞以威楚趙楚強則附趙趙強則附楚楚趙皆附齊必懼矣齊附則韓魏因可虜也王曰善乃以范睢為客卿與謀兵事四十六年秦中更胡傷攻趙閼與不拔四十七年秦王用范睢之謀使五大夫綰伐魏拔懷四十八年秦悼太子質於魏而卒四十九年秦拔魏邢丘范睢日益親用事因承間説王曰臣居山東時聞齊之有孟嘗君不聞有王聞秦有太后穰侯不聞有王夫擅國之謂王能利害之謂王制殺生之謂王今太后擅行不欲穰侯出使不報華陽涇陽等擊斷無諱髙陵進退不請四貴備而國不危者未之有也為此四貴者下乃所謂無王也穰侯使者操王之重決制於諸侯剖符於天下征敵伐國莫敢不聽戰勝攻取則利歸於陶戰敗則結怨於百姓而禍歸於社稷臣又聞之木實繁者披其枝披其枝者傷其心大其都者危其國尊其臣者卑其主淖齒管齊射王股擢王筋懸之於廟梁宿昔而死李兌管趙囚主父於沙丘百日而餓死今臣觀四貴之用事此亦淖齒李兌之類也且夫三代之所以亡國者君専授政於臣縱酒弋獵其所授者妬賢嫉能御下蔽上以成其私不為主計而主不覺悟故失其國今自有秩以上至諸大吏下及王左右無非相國之人者見王獨立於朝臣竊為王恐萬世之後有秦國者非王子孫也王以為然於是廢太后逐穰侯髙陵華陽涇陽君於關外以范睢為丞相封為應侯魏王使須賈聘於秦應侯敝衣間步而往見之須賈驚曰范叔固無恙乎留坐飲食取一綈𫀆贈之遂為須賈御而至相府曰我為君先入通於相君須賈怪其久不出問於門下門下曰無范叔鄉者吾相張君也須賈知見欺乃膝行入謝罪應侯坐責讓之且曰爾所以得不死者以綈袍戀戀尚有故人之意耳乃大供具請諸侯賔客坐須賈於堂下置莝豆其前而馬食之使歸告魏王曰速斬魏齊頭來不然且屠大梁須賈還以告魏齊魏齊奔趙匿於平原君家孝成王丹立趙惠文王薨子五十年秦宣太后薨九月穰侯出之陶臣光曰穰侯援立昭王除其災害薦白起為將南取鄢郢東屬地於齊使天下諸侯稽首而事秦秦益強大者穰侯之功也雖其専恣驕貪足以賈禍亦未至盡如范睢之言若睢者亦非能為秦忠謀直欲得穰侯之處故扼其吭而奪之耳遂使秦王絶母子之義失舅甥之恩要之睢真傾危之士哉秦王以子安國君為太子秦伐趙取三城趙王新立太后用事求救於齊齊人曰必以長安君為質太后不可齊師不出大臣強諌太后明謂左右曰復言長安君為質者老婦必唾其面左師觸龍願見太后太后盛氣而胥之入左師公徐趨而坐自謝曰老臣病足不得見久矣竊自恕而恐太后體之有所苦也故願望見太后太后曰老婦恃輦而行曰食得母衰乎曰恃粥耳太后不和之色稍解左師公曰老臣賤息舒祺最少不肖而臣衰竊憐愛之願得輔黑衣之缺以衛王宫昧死以聞太后曰諾年幾何矣對曰十五嵗矣雖少願及未填溝壑而託之太后曰丈夫亦愛少子乎對曰甚於婦人太后笑曰婦人異甚對曰老臣竊以為媪之愛燕后賢於長安君太后曰君過矣不若長安君之甚左師公曰父母愛其子則為之計深逺媪之送燕后也持其踵而泣念其逺也亦哀之矣已行非不思也祭祀則祝之曰必勿使反豈非為之計長久為子孫相繼為王也哉太后曰然左師公曰今三世以前至於趙王之子孫為侯者其繼有在者乎曰無有曰此其近者禍及其身逺者及其子孫豈人主之子侯則不善哉位尊而無功奉厚而無勞而挾重器多也今媪尊長安君之位而封之以膏腴之地多與之重器而不及今令有功於國一旦山陵崩長安君何以自託於趙哉太后曰諾恣君之所使之於是為長安君約車百乘質於齊齊師乃出秦師退子建立齊襄王薨五十一年秦武安君伐韓拔九城斬首五萬五十二年秦武安君伐韓取南陽攻太行道絶之楚頃襄王疾病黃歇言於應侯曰今楚王疾恐不起秦不如歸其太子太子得立其事秦必重而德相國無窮是親與國而得儲萬乘也不歸則咸陽布衣耳楚更立君必不事秦是失與國而絶萬乘之和非計也應侯以告王王曰令太子之傅先往問疾反而後圗之黃歇與太子謀曰秦之留太子欲以求利也今太子力未能有以利秦也而陽文君子二人在中王若卒大命太子不在陽文君子必立為後太子不得奉宗廟矣不如亡秦與使者俱出臣請止以死當之太子因變服為楚使者御以出關而黃歇守舍常為太子謝病度太子已逺乃自言於王曰楚太子已歸出逺矣歇願賜死王怒欲聽之應侯曰歇為人臣出身以徇其主太子立必用歇不如無罪而歸之以親楚王從之黃歇至楚三月秋楚頃襄王薨考烈王即位以黃歇為相封以淮北地號曰春申君五十三年楚人納州于秦以平武安君伐韓拔野王上黨路絶上黨守馮亭與其民謀曰鄭道已絶秦兵日進韓不能應不如以上黨歸趙趙受我秦必攻之趙被秦兵必親韓韓趙為一則可以當其矣乃遣使者告於趙曰韓不能守上黨入之秦其吏民皆安為趙不樂為秦有城市邑十七願再拜獻之大王趙王以告平陽君豹對曰聖人甚禍無故之利王曰人樂吾德何謂無故對曰秦蠶食韓地中絶不令相通固自以為坐而受上黨也韓氏所以不入於秦者欲嫁其禍於趙也秦服其勞而趙受其利雖強大不能得之於弱小弱小固能得之於強大乎豈得謂之非無故哉不如勿受王以告平原君平原君請受之王乃使平原君往受地以萬户都三封其太守為華陽君以千户都三封其縣令為侯吏民皆益爵三級馮亭垂涕不見使者曰吾不忍賣主地而食之也五十五年秦左庶長王齕攻上黨拔之上黨民走趙趙廉頗軍於長平以按據上黨民王齕因伐趙趙軍戰數不勝亡一禆將四尉趙王與樓昌虞卿謀樓昌請發重使為媾虞卿曰今制媾者在秦秦必欲破王之軍矣雖往請媾秦將不聽不如發使以重寶附楚魏楚魏受之則秦疑天下之合從媾乃可成也王不聽使鄭朱媾於秦秦受之王謂虞卿曰秦內鄭朱矣對曰王必不得媾而軍破矣何則天下之賀戰勝者皆在秦矣夫鄭朱貴人也秦王應侯必顯重之以示天下天下見王之媾於秦必不救王秦知天下之不救王則媾不可得成矣既而秦果顯鄭朱而不與趙媾秦數敗趙兵廉頗堅壁不出趙王以頗失亡多而更怯不戰怒數讓之應侯又使人行千金於趙為反間曰秦之所畏獨畏馬服君之子趙括為將耳廉頗易與且降矣趙王遂以趙括代頗將藺相如曰王以名使括若膠柱鼓瑟耳括徒能讀其父書傳不知合變也王不聽初趙括自少時學兵法以天下莫能當嘗與其父奢言兵事奢不能難然不謂善括母問其故奢曰兵死地也而括易言之使趙不將括則已若必將之破趙軍者必括也及括將行其母上書言括不可使王曰何以對曰始妾事其父時為將身所奉飯而進食者以十數所友者以百數王及宗室所賞賜者盡以與軍吏士大夫受命之日不問家事今括一旦為將東鄉而朝軍吏無敢仰視之者王所賜金帛歸藏於家而日視便利田宅可買者買之王以為如其父父子異心願王勿遣王曰毋置之吾已決矣母因曰即如有不稱妾請無隨坐趙王許之秦王聞括已為趙將乃隂使武安君為上將軍而王齕為禆將令軍中有敢泄武安君將者斬趙括至軍悉更約束易置軍吏出兵擊秦師武安君佯敗而走張二竒兵以劫之趙括乘勝追造秦壁壁堅拒不得入竒兵二萬五千人絶趙軍之後又五千騎絶趙壁間趙軍分而為二糧道絶武安君出輕兵擊之趙戰不利因築壁堅守以待救至秦王聞趙食道絶自如河內發民年十五以上悉詣長平遮絶趙救兵及糧食齊人楚人救趙趙人乏食請粟於齊齊王弗許周子曰夫趙之於齊楚扞蔽也猶齒之有脣也脣亡則齒寒今日亡趙明日患及齊楚矣救趙之務冝若奉漏甕沃焦釡然且救趙髙義也却秦師顯名也義救亡國威却強秦不務為此而愛粟為國計者過矣齊王弗聽九月趙軍食絶四十六日皆內隂相殺食急來攻秦壘欲出為四隊四五復之不能出趙括自出鋭卒搏戰秦人射殺之趙師大敗卒四十萬人皆降武安君曰秦已拔上黨上黨民不樂為秦而歸趙趙卒反覆非盡殺之恐為亂乃挾詐而盡坑殺之遺其小者二百四十人歸趙前後斬首虜四十五萬人趙人大震五十六年十月武安君分軍為三王齕攻趙武安皮牢拔之司馬梗北定太原盡有上黨地韓魏恐使蘇代厚幣説應侯曰武安君即圍邯鄲乎曰然蘇代曰趙亡則秦王王矣武安君為三公君能為之下乎雖無欲為之下固不得已矣秦嘗攻韓圍邢丘困上黨上黨之民皆反為趙天下不樂為秦民之日久矣今亡趙北地入燕東地入齊南地入韓魏則君之所得民無幾何人矣不如因而割之無以為武安君功也應侯言於秦王曰秦兵勞請許韓趙之割地以和且休士卒王聽之割韓垣雍趙六城以和正月皆罷兵武安君由是與應侯有隙趙王將使趙郝約事於秦割六縣虞卿謂趙王曰秦之攻王也倦而歸乎王以其力尚能進愛王而弗攻乎王曰秦不遺餘力矣必以倦而歸也虞卿曰秦以其力攻其所不能取倦而歸王又以其力之所不能取以送之是助秦自攻也來年秦攻王王無救矣趙王計未定樓緩至趙趙王與之計之樓緩曰虞卿得其一不得其二秦趙御名太上難而天下皆説何也曰吾且因強而乘弱矣今趙不如亟割地為和以疑天下慰秦之心不然天下將因秦之怒乘趙之敝瓜分之趙且亡何秦之圗乎虞卿聞之復見曰危哉樓子之計是愈疑天下而何慰秦之心哉獨不言其示天下弱乎且臣言勿與者非固勿與而已也秦索六城於王而王以六城賂齊齊秦之深讎也其聽王不待辭之畢也則是王失之於齊而取償於秦而示天下有能為也王以此發聲兵未窺於境臣見秦之重賂至趙而反媾於王也從秦為媾韓魏聞之必盡重王是王一舉而結三國之親而與秦易道也趙王曰善使虞卿東見齊王與之謀秦虞卿未返秦使者巳在趙矣樓緩聞之亡去趙王封虞卿以一城秦之始伐趙也魏王問於諸大夫皆以為秦伐趙於魏便孔斌曰何謂也曰勝趙則吾因而服焉不勝趙則可承敝而擊之子順曰不然秦自孝公已來戰未嘗屈今又屬其良將何敝之承大夫曰縱其勝趙於我何損鄰之羞國之福也子順曰秦貪暴之國也勝趙必復他求吾恐於時魏受其師也先人有言燕雀處屋子母相哺詬詬焉相樂也自以為安矣竈突炎上棟宇將焚燕雀顔不變不知禍之將及巳也今子不悟趙破患將及已可以人而同於燕雀乎子順者孔子六世孫也子順相魏凡九月陳大計輒不用退而以病致仕人謂子順曰王不用子子其行乎答曰行將何之山東之國將并於秦秦為不義義所不入遂寢於家新垣固請子順曰賢者所在必興化致治今子相魏未聞異政而即自退意者志不得乎何去之速也子順曰以無異政所以自退也且死病無良醫今秦有吞食天下之心以義事之固不獲安救亡不暇何化之興昔伊摯在夏吕望在商而二國不治豈伊吕之不欲哉勢不可也當今山東之國敝而不振三晉割地以求安二周折而入秦燕齊楚巳屈服矣以此觀之不出二十年天下其盡為秦乎秦王欲為應侯必報其仇聞魏齊在平原君所乃為好言誘平原君至秦而執之遣使謂趙王曰不得齊首吾不出王弟於關魏齊窮抵虞卿虞卿棄相印與魏齊偕亡至魏欲因信陵君以走楚信陵君意難見之魏齊怒自殺趙王卒取其首以與秦秦乃歸平原君九月五大夫王陵將兵復伐趙武安君病不任行五十七年正月王陵攻邯鄲少利益發卒佐陵陵亡五校武安君病愈王欲使代之武安君曰邯鄲實未易攻也且諸侯之救日至彼諸侯怨秦之日久矣秦雖勝於長平士卒死者過半國內空逺絶河山而爭人國都趙應其內諸侯攻其外破秦軍必矣王自命不行乃使應侯請之武安君終辭疾不肯行乃以王齕代王陵趙王使平原君求救於楚平原君約其門下食客文武備具者二十人與之俱得十九人餘無可取者毛遂自薦於平原君平原君曰夫賢士之處世也譬若錐之處囊中其末立見今先生處勝之門下三年於此矣左右未有所稱誦勝未有所聞是先生無所有也先生不能先生留毛遂曰臣乃今日請處囊中耳使遂蚤得處囊中乃頴脫而出非特其末見而已平原君乃與之俱十九人相與目笑之平原君至楚與楚王言合從之利害日出而言之日中不決毛遂按劔歷階而上謂平原君曰從之利害兩言而決耳今日出而言日中不決何也楚王怒叱曰胡不下吾乃與而君言汝何為者也毛遂按劔而前曰王之所以叱遂者以楚國之衆也今十步之內王不得恃楚國之衆也王之命懸於遂手吾君在前叱者何也且遂聞湯以七十里之地王天下文王以百里之壤而臣諸侯豈其士卒衆多哉誠能據其勢而奮其威也今楚地方五千里持戟百萬此霸王之資也以楚之強天下弗能當白起小豎子耳率數萬之衆興師以與楚戰一戰而舉鄢郢再戰而燒夷陵三戰而辱王之先人此百世之怨而趙之所羞而王弗知惡焉合從者為楚非為趙也吾君在前叱者何也楚王曰唯唯誠若先生之言謹奉社稷以從毛遂曰從定乎楚王曰定矣毛遂謂楚王之左右曰取雞狗馬之血來毛遂奉銅盤而跪進之楚王曰王當歃血以定從次者吾君次者遂遂定從於殿上毛遂左手持盤血而右手招十九人曰公相與歃此血於堂下公等録録所謂因人成事者也平原君已定從而歸至於趙曰勝不敢復相天下士矣遂以毛遂為上客於是楚王使春申君將兵救趙魏王亦使將軍晉鄙將兵十萬救趙秦王使謂魏王曰吾攻趙旦暮且下諸侯敢救之者吾已拔趙必移兵先擊之魏王恐遣人止晉鄙留兵壁鄴名為救趙實挾兩端又使將軍新垣衍間入邯鄲因平原君説趙王欲共尊秦為帝以却其兵齊人魯仲連在邯鄲聞之往見新垣衍曰彼秦者棄禮義而上首功之國也彼即肆然而為帝於天下則連有蹈東海而死耳不願為之民也且梁未睹秦稱帝之害故耳吾將使秦王烹醢梁王新垣衍怏然不恱曰先生惡能使秦王烹醢梁王魯仲連曰固也吾將言之昔者九侯鄂侯文王紂之三公也九侯有子而好獻之於紂紂以為惡醢九侯鄂侯爭之強辨之疾故脯鄂侯文王聞之喟然而嘆故拘之牖里之庫百日欲令之死今秦萬乘之國也梁亦萬乘之國也俱據萬乘之國各有稱王之名奈何睹其一戰而勝欲從而帝之卒就脯醢之地乎且秦無已而帝則將行其天子之禮以號令於天下則且變易諸侯之大臣彼將奪其所不肖而與其所賢奪其所憎而與其所愛彼又將使其子女讒妾為諸侯妃姬處梁之宫梁王安得晏然而已乎而將軍又何以得故寵乎新垣衍起再拜曰吾乃今知先生天下之士也吾請出不敢復言帝秦矣初魏公子無忌仁而下士致食客三千人魏有隱士曰侯嬴年七十家貧為大梁夷門監者公子置酒大會賔客坐定公子從車騎虛左自迎侯生侯生攝敝衣冠直上載公子上坐不讓公子執轡愈恭侯生又謂公子曰臣有客在市屠中願柱車騎過之公子引車入市侯生下見其客朱亥睥睨故久立與其客語微察公子公子色愈和乃謝客就車至公子家公子引侯生坐上坐遍贊賔客賔客皆驚及秦圍趙趙平原君之夫人公子無忌之姊也平原君使者冠蓋相屬於魏讓公子曰勝所以自附於婚姻者以公子之髙義能急人之困也今邯鄲旦暮降秦而魏救不至縱公子輕勝棄之獨不憐公子姊邪公子患之數請魏王敕晉鄙令救趙及賔客辨士遊説萬端王終不聽公子乃屬賔客約車騎百餘乘欲赴鬬以死於趙過夷門見侯生侯生曰公子勉之矣老臣不能從公子去行數里心不快復還見侯生侯生笑曰臣固知公子之還也今公子無他端而欲赴秦軍譬如以肉投餒虎何功之有公子再拜問計侯嬴屏人曰吾聞晉鄙兵符在王卧內而如姬最幸力能竊之嘗聞公子為如姬報其父仇如姬欲為公子死無所辭公子誠一開口則得虎符奪晉鄙之兵北救趙西却秦此五伯之功也公子如其言果得兵符公子行侯生曰將在外君令有所不受有如晉鄙合符而不授兵復請之則事危矣臣客朱亥其人力士可與俱晉鄙若聽大善不聽可使擊之於是公子請朱亥與俱至鄴晉鄙合符疑之舉手視公子曰吾擁十萬之衆屯於境上國之重任今單車來代之何如哉朱亥袖四十斤鐡椎椎殺晉鄙公子遂勒兵下令軍中曰父子俱在軍中者父歸兄弟俱在軍中者兄歸獨子無兄弟者歸養得選兵八萬人將之而進王齕久圍邯鄲不拔諸侯來救戰數不利武安君聞之曰王不聽吾計今何如矣王聞之怒強起武安君武安君稱病篤不肯起子孝王立􅊨燕武成王薨五十八年十月免武安君為士伍遷之隂密十二月益發卒軍汾城旁武安君病未行諸侯攻王齕齕數却使者日至王乃使人遣武安君不得留咸陽中武安君出咸陽西門十里至杜郵王與應侯羣臣謀曰白起之遷意尚怏怏有餘言王乃使使者賜之劔武安君遂自殺秦人憐之鄉邑皆祭祀焉魏公子無忌大破秦師於邯鄲下王齕解邯鄲圍走鄭安平為趙所困將二萬人降趙應侯由是得罪五十九年秦將軍摎伐韓取陽城負黍斬首四萬伐趙取二十餘縣斬首虜九萬赧王恐倍秦與諸侯約從將天下鋭師出伊闕攻秦令無得通陽城秦王使將軍摎攻西周赧王入秦頓首受罪盡獻其邑三十六口三萬秦受其獻歸赧王於周是嵗赧王崩秦昭襄王五十二年河東守王稽坐與諸侯通棄市應侯日以不懌王臨朝而歎應侯請其故王曰今武安君死而鄭安平王稽等皆畔內無良將而外多敵國吾是以憂應侯懼不知所出燕客蔡澤聞之西入秦先使人宣言於應侯曰蔡澤天下雄辨之士彼見王必困君而奪君之位應侯怒使人召之蔡澤見應侯禮又倨應侯不快因讓之曰子宣言欲代我相請聞其説蔡澤曰吁君何見之晚也夫四時之序成功者去君獨不見夫秦之商君楚之吳起越之大夫種何足願與應侯謬曰何為不可此三子者義之至也忠之盡也君子有殺身以成名死無所恨蔡澤曰夫人立功豈不期於成全邪身名俱全者上也名可法而身死者次也名僇辱而身全者下也夫商君吳起大夫種其為人臣盡忠致功則可願矣閎夭周公豈不亦忠且聖乎三子之可願孰與閎夭周公哉應侯曰善蔡澤曰然則君之主惇厚舊故不倍功臣孰與孝公楚王越王曰未知何如蔡澤曰君之功能孰與三子曰不若蔡澤曰然則君身不退患恐甚於三子矣語曰日中則移月滿則虧進退嬴縮與時變化聖人之道也今君之怨已讎而德已報意欲至矣而無變計竊為君危之應侯遂延以為上客因薦於王王召見與語大恱拜為客卿應侯因謝病免王新恱蔡澤計畫遂以為相國澤為相數月免周民東亡秦人取其寶器遷西周公於􅓆狐之聚子喜立燕孝王薨五十三年摎伐魏取吳城韓王入朝魏舉國聽令五十六年秋王薨孝文王立以子楚為太子孝文王元年冬十月己亥王即位三日薨子楚立是為莊襄王莊襄王元年吕不韋為相國東周君與諸侯謀伐秦王使相國帥師討滅之遷東周君於陽人聚周既不祀周比亡凡有七邑河南洛陽榖城平隂偃師鞏緱氏以河南洛陽十萬户封相國不韋為文信侯蒙驁伐韓取成臯滎陽初置三川郡二年蒙驁伐趙定太原取榆次狼孟等三十七城三年王齕攻上黨諸城悉拔之初置太原郡蒙驁帥師伐魏取髙都汲魏師數敗魏王患之乃使人請信陵君於趙信陵君畏得罪不肯還誡門下曰有敢為魏使通者死賓客莫敢諌毛公薛公見信陵君曰公子所以重於諸侯者徒以有魏也今魏急而公子不恤一旦秦人克大梁夷先王之宗廟公子當何面目立天下乎語未卒信陵君色變趣駕還魏魏王持信陵君而泣以為上將軍信陵君使人求援於諸侯諸侯聞信陵君復為魏將皆遣兵救魏信陵君率五國之師敗蒙驁於河外蒙驁遁走信陵君追至函谷關抑之而還安陵人縮髙之子仕於秦秦使之守管信陵君攻之不下使人謂安陵君曰君其遣縮髙吾將仕之以五大夫使為執節尉安陵君曰安陵小國也不能必使其民使者自往請之使吏導使者至縮髙之所使者致信陵君之命縮髙曰君之幸髙也將使髙攻管也夫父攻子守人之笑也見臣而下是倍主也父教子倍亦非君之所喜敢再拜辭使者以報信陵君信陵君大怒遣使之安陵君所曰安陵之地亦猶魏也今吾攻管而不下則秦兵及我社稷必危矣願君生束縮髙而致之若君弗致無忌將發十萬之師以造安陵之城下安陵君曰吾先君成侯受詔襄王以守此城也手受太府之憲憲之上篇曰子弒父臣弒君有常不赦國雖大赦降城亡子不得與焉今縮髙辭大位以全父子之義而君曰必生致之是使我負襄王之詔而廢太府之憲也雖死終不敢行縮髙聞之曰信陵君為人悍猛而自用此辭反必為國禍吾已全已無違人臣之義矣豈可使吾君有魏患乎乃之使者之舍刎頸而死五月丙午王薨太子政立生十三年矣國事皆委於文信侯號稱仲父始皇帝元年韓欲疲秦人使無東伐乃使水工鄭國為間於秦鑿涇水自仲山為渠並北山東注洛中作而覺秦人欲殺之鄭國曰臣為韓延數年之品然渠成亦秦萬世之利也乃使卒為之注填閼之水溉舄鹵之地四萬餘頃收皆畝一鍾關中由是益富饒薨子悼襄王立二年趙孝成王三年蒙驁伐韓取十二城四年春蒙驁伐魏取畼有詭三月軍罷秦質子歸自趙趙太子出歸國子景湣王立魏安釐王薨五年蒙驁伐魏取酸棗燕虛長平雍丘山陽等二十城初置東郡六年楚趙魏韓衛合從以伐秦楚王為從長春申君用事取壽陵至函谷秦師出五國之師皆敗走楚王以咎春申君春申君以此益踈觀津人朱英謂春申君曰人皆以楚為強君用之而弱其於英不然先君時秦善楚二十年而不攻楚何也秦踰黽厄之塞而攻楚不便假道於兩周背韓魏而攻楚不可今則不然魏旦暮亡不能愛許鄢陵魏割以與秦秦兵去陳百六十里臣之所觀者見秦楚之日鬬也楚於是去陳徙壽春命曰郢春申君就封於吳行相事秦拔魏朝歌及衛濮陽衛元君率其支屬徙居野王阻其山以保魏之河內七年伐魏取汲蒙驁卒王薨子安立八年韓桓惠九年伐魏取垣蒲楊端和伐魏取衍氏十年文信侯免相出就國宗室大臣議曰諸侯人來仕者皆為其主遊間耳請一切逐之於是大索逐客客卿楚人李斯亦在逐中行且上書曰昔穆公求士西取由余於戎東得百里奚於宛迎蹇叔於宋求丕豹公孫支於晉并國二十遂霸西戎孝公用商鞅之法諸侯親服至今治強惠王用張儀之計散六國之從使之事秦昭王得范睢強公室杜私門此四君者皆以客之功由此觀之客何負於秦哉夫色樂珠玉不産於秦而王服御者衆取人則不然不問可否不論曲直非秦者去為客者逐是所重者在乎色樂珠玉而所輕者在乎人民也臣聞太山不辭土壤故能成其大河海不擇細流故能就其深王者不却衆庶故能明其德此五帝三王之所以無敵也今乃棄黔首以資敵國却賔客以業諸侯所謂藉冦兵而齎盜糧者也王乃召李斯復其官除逐客之令李斯至驪邑而還王卒用李斯之謀隂遣辨士齎金玉遊説諸侯諸侯名士可下以財者厚遺結之不肯者利劔剌之離其君臣之計然後使良將隨其後數年之中卒兼天下十一年趙人伐燕取貍陽兵未罷將軍王翦桓齮楊端和伐趙攻鄴取九城王翦攻閼與撩陽桓齮取鄴安陽幽繆王遷立趙悼襄王薨子十二年發四郡兵助魏伐楚十三年桓齮伐趙敗趙將扈輒於平陽斬首十萬殺扈輒趙王以李牧為大將軍復戰於宜安肥下秦師敗績桓齮奔還十四年桓齮伐趙取宜安平陽武城韓王納地效璽請為藩臣使韓非來聘非因上書説王曰今秦地方數千里師名百萬號令賞罰天下不如臣昧死願望見大王言所以破天下從之計大王誠聽臣説一舉而天下之從不破趙不舉韓不亡荆魏不臣齊燕不親霸王之名不成四鄰諸侯不朝大王斬臣以徇國以戒為王謀不忠者也王恱之未任用李斯嫉之曰韓非韓之諸公子也今欲并諸侯非終為韓不為秦此人情也今王不用久留而歸之此自遺患也不如以法誅之王以為然下吏治非李斯使人遺非藥令早自殺韓非欲自陳不得見王後悔使赦之非已死矣臣光曰臣聞君子親其親以及人之親愛其國以及人之國是以功大名美而享有百福也今非為秦畫謀而首欲覆其宗國以售其言罪固不容死矣十五年王大興師伐趙一軍抵大原取狼孟畨吾遇李牧而還初燕太子丹嘗質於趙與王善王即位丹為質於秦王不禮焉丹怒亡歸十六年韓獻南陽地九月發卒受地於韓魏人獻地十七年內史勝滅韓虜韓王安以其地置頴川郡十八年王翦將上地兵下井陘端和將河內兵共伐趙趙李牧司馬尚禦之秦人多與趙王嬖臣郭開金使毁牧及尚言其欲反趙王使趙蔥及齊將顔聚代之李牧不受命趙人捕而殺之廢司馬尚十九年王翦擊趙軍大破之殺趙蔥顔聚亡遂克邯鄲虜趙王遷王如邯鄲故與母家有仇怨者皆殺之還從太原上郡歸王翦屯中山以臨燕趙公子嘉帥其宗數百人奔代自立為代王趙之亡大夫稍稍歸之與燕合兵軍上谷燕太子丹怨王欲報之以問其傅鞠武鞠武請西約三晉南連齊楚北媾胸奴以圗秦太子曰太傅之計曠日彌久令人心惛然恐不能須也頃之將軍樊於期得罪亡之燕太子受而舍之鞠武諌曰夫以秦王之暴而積怒於燕足為寒心又況聞樊將軍之所在乎是謂委肉當餓虎之蹊也願太子疾遣樊將軍入胸奴太子曰樊將軍窮困於天下歸身於丹是固丹命卒之時也願更慮之鞠武曰夫行危以求安造禍以為福計淺而怨深連結一人之後交不顧國家之大害所謂資怨而助禍矣太子不聽太子聞衛人荆軻之賢卑辭厚禮而請見之謂軻曰今秦已虜韓王又舉兵南伐楚北臨趙趙不能支秦則禍必至於燕燕小弱數困於兵何足以當秦諸侯服秦莫敢合從丹之私計愚以為誠得天下之勇士使於秦劫秦王使悉反諸侯侵地若曹沫之與齊桓公則大善矣即不可因而剌殺之彼大將擅兵於外而內有亂則君臣相疑以其間諸侯得合從其破秦必矣唯荆卿留意焉荆軻許之於是舍荆卿於上舍太子日造門下所以奉養荆軻無所不至及王翦滅趙太子聞之懼欲遣荆軻行荆軻曰今行而無信則秦未可親也誠得樊將軍首與燕督亢之地圗奉獻秦王秦王必説見臣臣乃有以報太子曰樊將軍窮困來歸丹丹不忍也荆軻乃私見樊於期曰秦之遇將軍可謂深矣父母宗族皆為戮沒今聞購將軍首金千斤邑萬家將奈何於期太息流涕曰計將安出荆卿曰願得將軍之首以獻秦王秦王必喜而見臣臣左手把其袖右手揕其胸則將軍之仇報而燕見陵之愧除矣樊於期曰此臣之日夜切齒腐心也遂自刎太子聞之奔往伏哭然已無奈何遂以函盛其首太子豫求天下之利匕首使工以藥焠之以試人血濡縷人無不立死者乃裝為遣荆軻以燕勇士秦舞陽為之副使入秦郝三月郝庶兄負芻殺楚幽王薨國人立其弟立之自薨子假立魏景湣王二十年荆軻至咸陽因王寵臣蒙嘉卑辭以求見王大喜朝服設九賔而見之荆軻奉圗以進於王圗窮而匕首見因把王袖而揕之未至身王驚起袖絶荆軻逐王王環柱而走羣臣皆愕卒起不意盡失其度而秦法羣臣侍殿上者不得操尺寸之兵左右以手共搏之且曰王負劒負劒王遂拔以擊荆軻斷其左股荆軻廢乃引匕首擲王中銅柱自知事不就罵曰事所以不成者以欲生劫之必得約契以報太子也遂體解荆軻以徇王於是大怒益發兵詣趙就王翦以伐燕與燕師戰於易水之西大破之二十一年冬十月王翦拔薊燕王及太子率其精兵東保遼東李信急追之代王嘉遺燕王書令殺太子丹以獻丹匿衍水中燕王使使斬丹欲以獻王王復進兵攻之王賁伐楚取十餘城王問於將軍李信曰吾欲取荆於將軍度用幾何人而足李信曰不過用二十萬王以問王翦王翦曰非六十萬人不可王曰王將軍老矣何怯也遂使李信蒙恬將二十萬人伐楚王翦因謝病歸頻陽二十二年王賁伐魏引河溝以灌大梁三月城壞魏王假降殺之遂滅魏王使人謂安陵君曰寡人欲以五百里地易安陵安陵君曰大王加惠以大易小甚幸雖然臣受地於魏之先王願終守之弗敢易王義而許之李信攻平輿蒙恬攻寢大破楚軍信又攻鄢郢破之於是引兵而西與蒙恬會城父楚人因隨之三日三夜不頓舍大敗李信入兩壁殺七都尉李信奔還王聞之大怒自至頻陽謝王翦曰寡人不用將軍謀李信果辱秦軍將軍雖病獨忍棄寡人乎王翦謝病不能將王曰已矣勿復言王翦曰必不得已用臣非六十萬人不可王曰為聽將軍計耳於是王翦將六十萬人伐楚王送至霸上二十三年王翦取陳以南至平輿楚人聞王翦益軍而來乃悉國中兵以禦之王翦堅壁不與戰楚人數挑戰終不出王翦日休士洗沐而善飲食撫循之親與士卒同食久之王翦使人問軍中戲乎對曰方投石超距王翦曰可用矣楚既不得戰乃引而東王翦追之令壯士擊大破楚師至蘄南殺其將軍項燕楚師遂敗走王翦因乘勝略定城邑二十四年王翦蒙武虜楚王負芻以其地置楚郡二十五年大興兵使王賁攻遼東虜燕王喜臣光曰燕丹不勝一朝之忿以犯虎狼之秦輕慮淺謀挑怨速禍使召公之廟不祀忽諸罪孰大焉而論者或謂之賢豈不過哉夫為國家者任官以才立政以禮懷民以仁交鄰以信是以官得其人政得其節百姓懷其德四鄰親其義夫如是則國家安如磐石熾如焱火觸之者碎犯之者焦雖有強暴之國尚何足畏哉丹釋此不為顧以萬乘之國決匹夫之怒逞盜賊之謀功隳身僇社稷為墟不亦悲哉夫其膝行蒲伏非恭也復言重諾非信也糜金散玉非惠也刎首決腹非勇也要之謀不逺而動不義其楚白公勝之流乎荆軻懷其豢養之私不顧七族欲以尺八匕首強燕而弱秦不亦愚乎故楊子論之以要離為蛛蝥之靡聶政為壯士之靡荆軻為剌客之靡皆不可謂之義又曰荆軻君子盜諸善哉王賁攻代虜代王嘉王翦悉定荆江南地降百越之君置會稽郡初齊君王后賢事秦謹與諸侯信齊亦東邊海上秦日夜攻三晉燕楚五國各自救以故齊王建立四十餘年不受兵及君王后且死戒王建曰羣臣之可用者某王曰請書之君王后曰善王取筆牘受言君王后曰老婦已忘矣君王后死后勝相齊多受秦間金賔客入秦秦又多與金客皆為反間勸王朝秦不修攻戰之備不助五國攻秦秦以故得滅五國齊王將入朝雍門司馬前曰所為立王者為社稷耶為王耶王曰為社稷司馬曰為社稷立王王何以去社稷而入秦齊王還車而反即墨大夫聞之見齊王曰齊地方數千里帶甲數百萬夫三晉大夫皆不便秦而在阿甄之間者百數王收而與之百萬人之衆使收三晉之故地即臨晉之關可以入矣鄢郢大夫不欲為秦而在城南下者百數王收而與之百萬之師使收楚故地即武關可以入矣如此則齊威可立秦國可亡豈特保其國家而已哉齊王不聽二十六年王賁自燕南攻齊猝入臨淄民莫敢格者秦使人誘齊王約封以五百里之地齊王遂降秦遷之共處之松柏之間餓而死齊人怨王建不早與諸侯合從聽姦人賔客以亡其國歌之曰松耶柏耶住建其者客耶疾建用客之不詳也臣光曰從衡之説雖反覆百端然大要合從者六國之利也昔先王建萬國親諸侯使之朝聘以相交饗宴以相樂會盟以相結者無它欲其同心戮力以保家國也嚮使六國能以信義相親則秦雖強暴安得而亡之哉夫三晉者齊楚之藩蔽齊楚者三晉之根柢形勢相資表裏相依故以三晉而攻齊楚自絶其根柢也以齊楚而攻三晉自撤其藩蔽也安有撤其藩蔽以媚盜曰盜將愛我而不攻豈不悖哉豪桀亡秦秦始皇帝二十六年王初并天下自以為德兼三皇功過五帝乃更號曰皇帝命為制令為詔自稱曰朕追尊莊襄王為太上皇制曰死而以行為諡則是子議父臣議君也甚無謂自今以來除諡法朕為始皇帝後世以計數二丗三丗至于萬丗傳之無窮二十七年始皇巡隴西北地至雞頭山過回中焉作信宫渭南已更命曰極廟自極廟道通驪山作甘泉前殿築甬道自咸陽屬之治馳道於天下二十八年始皇東行郡縣上鄒嶧山立石頌功業於是召集魯儒生七十人至泰山下議封禪諸儒或曰古者封禪為蒲車惡傷山之土石草木掃地而祭席因葅秸議各乖異始皇以其難施用由此絀儒生而遂除車道上自太山陽至顛立石頌德從隂道下禪於梁父其禮頗采太祝之祀雍上帝所用而封藏皆祕之世不得而記也於是始皇遂東遊海上行禮祠名山大川及八神始皇南登琅邪大樂之留三月作琅邪臺立石頌德明得意初燕人宋無忌羡門子髙之徒稱有仙道形解銷化之術燕齊迃怪之士皆爭傳習之自齊威王宣王燕昭王皆信其言使人入海求蓬萊方丈瀛洲云此三神山在勃海中去人不逺患且至則風引船去嘗有至者諸仙人及不死之藥皆在焉及始皇至海上諸方士齊人徐市等爭上書言之請得齊戒與童男女求之於是遣徐市發童男女數千人入海求之船交海中皆以風為解曰未能至望見之焉始皇還過彭城齊戒禱祠欲出周鼎泗水使千人沒水求之弗得乃西南渡淮水之衡山南郡浮江至湘山祠逢大風幾不能渡上問博士曰湘君何神對曰聞之堯女舜之妻葬此始皇大怒使刑徒三千人皆伐湘山樹赭其山遂自南郡由武關歸初韓人張良其父祖以上五世相韓及韓亡良散千金之産欲為韓報仇二十九年始皇東遊至陽武博浪沙中張良令力士操鐡椎狙擊始皇誤中副車始皇驚求弗得令天下大索十日始皇遂登之罘刻石旋之琅邪道上黨入三十二年始皇之碣石使燕人盧生求羡門刻碣石門壞城郭決通堤坊始皇巡北邊從上郡入盧生使入海還因奏録圗書曰亡秦者胡也始皇乃遣將軍蒙恬發兵三十萬人北伐胸奴三十三年發諸嘗逋亡人贅壻賈人為兵略取南越陸梁地置桂林南海象郡以謫徙民五十萬人戍五嶺與越雜處蒙恬斥逐胸奴收河南地為四十四縣築長城因地形用制險塞起臨洮至遼東延袤萬餘里於是渡河據陽山逶迤而北暴師於外十餘年三十四年丞相李斯上書曰異時諸侯並爭厚招遊學今天下已定法令出一百姓當家則力農工士則學習法令今諸生不師今而學古以非當世惑亂黔首相與非法教人聞令下則各以其學議之入則心非出則巷議誇主以為名異趣以為髙率羣下以造謗如此弗禁則主勢降乎上黨與成乎下禁之便臣請史官非秦記皆燒之非博士官所職天下有藏詩書百家語者皆詣守尉雜燒之有敢偶語詩書棄市以古非今者族吏見知不舉與同罪令下三十日不燒黥為城旦所不去者醫藥卜筮種樹之書若欲有學法令以吏為師制曰可三十五年使蒙恬除直道道九原抵雲陽塹山堙谷千八百里數年不就始皇以為咸陽人多先王之宫廷小乃營作朝宫渭南上林苑中先作前殿阿房東西五百步南北五十丈上可以坐萬人下可以建五丈旗周馳為閣道自殿下直抵南山表南山之顛以為闕為復道自阿房渡渭屬之咸陽以象天極閣道絶漢抵營室也隱宫徒刑者七十餘萬人乃分作阿房宫或作驪山發北山石椁寫蜀荆地材皆至關中計宫三百關外四百余於是立石東海上胊界中以為秦東門因徙三萬家驪邑五萬家雲陽皆復不事十嵗盧生説始皇曰方中人主時為微行以辟惡鬼惡鬼辟真人至願上所居宮毋令人知然後不死之藥殆可得也始皇曰吾慕真人自謂真人不稱朕乃令咸陽之旁二百里內宫觀二百七十復道甬道相連帷帳鐘鼓美人充之各案署不移徙行所幸有言其處者罪死始皇幸梁山宫從山上見丞相車騎衆弗善也中人以告丞相丞相後損車騎始皇怒曰此中人泄吾語案問莫服捕時在旁者盡殺之自是後莫知行之所在羣臣受決事者悉於咸陽宫侯生盧生相與譏議始皇因亡去始皇聞之大怒曰盧生等吾尊賜之甚厚今乃誹謗我諸生在咸陽者吾使人廉問或為妖言以亂黔首於是使御史悉案問諸生諸生傳相告引乃自除犯禁者四百六十餘人皆坑之咸陽使天下知之以懲後益發謫徙邊始皇長子扶蘇諌曰諸生皆誦法孔子今上皆重法繩之臣恐天下不安始皇怒使扶蘇北監蒙恬軍於上郡三十六年有隕石于東郡或刻其石曰始皇死而地分始皇使御史逐問莫服盡取石旁居人誅之燔其石三十七年冬十月癸丑始皇出遊左丞相斯從右丞相去疾守始皇二十餘子少子胡亥最愛請從上許之始皇西至平原津而病乃令中車府令行符璽事趙髙為書賜扶蘇曰與喪會咸陽而葬書已封在趙髙所未付使者秋七月丙寅始皇崩於沙丘平臺丞相斯為上崩在外恐諸公子及天下有變乃祕之不發喪棺載輼涼車中故幸宦者驂乘所至上食百官奏事如故宦者輒從車中可其奏事獨胡亥趙髙及幸宦者五六人知之初始皇尊寵蒙氏信任之蒙恬任外將蒙毅常居中參謀議名為忠信故雖諸將相莫敢與之爭趙髙者生而隱宫始皇聞其強力通於獄法舉以為中車府令使教胡亥決獄胡亥幸之趙髙有罪始皇使蒙毅治之毅當髙法應死始皇以髙敏於事赦之復其官趙髙既雅得幸於胡亥又怨蒙氏乃説胡亥請詐以始皇命誅扶蘇而立胡亥為太子胡亥然其計趙髙曰不與丞相謀恐事不能成乃見丞相斯曰上賜長子書及符璽皆在胡亥所定太子在君侯與髙之口耳事將何如斯曰安得亡國之言此非人臣所當議也髙曰君侯材能謀慮功髙無怨長子信之此五者皆孰與蒙恬斯曰不及也髙曰然則長子即位必用蒙恬為丞相君侯終不懷通侯之印歸鄉里明矣胡亥慈仁篤厚可以為嗣願君審計而定之丞相斯以為然乃相與謀詐為受始皇詔立胡亥為太子更為書賜扶蘇數以不能闢地立功士卒多耗反數上書直言誹謗日夜怨望不得罷歸為太子將軍恬不矯正知其謀皆賜死以兵屬禆將王離扶蘇發書泣入內舍欲自殺蒙恬曰陛下居外未立太子使臣將三十萬衆守邊公子為監此天下重任也今一使者來即自殺安知其非詐復請而後死未暮也使者數趣之扶蘇謂蒙恬曰父賜子死尚安復請即自殺蒙恬不肯死使者以屬吏繫諸陽周更置李斯舍人為護軍還報胡亥已聞扶蘇死即欲釋蒙恬會蒙毅為始皇出禱山川還至趙髙言於胡亥曰先帝欲舉賢立太子久矣而毅諫以為不可不若誅之乃繫諸代遂從井陘抵九原會暑輼車臭乃詔從官令車載一石鮑魚以亂之從直道至咸陽發喪太子胡亥襲位二丗欲誅蒙恬兄弟二丗兄子子嬰諫曰趙王遷殺李牧而用顔聚齊王建殺其故丗忠臣而用后勝卒皆亡國蒙氏秦之大臣謀士也而陛下欲一旦棄去之誅殺忠臣而立無節行之人是內使羣臣不相信而外使鬬士之意離也二丗弗聽遂殺蒙毅及內史恬恬曰自吾先人及至子孫積功信於秦三丗矣今臣將兵三十餘萬身雖囚繫其勢足以倍畔然自知必死而守義者不敢辱先人之教以不忘先帝也乃吞藥自殺二丗元年春二丗東行郡縣李斯從到碣石並海南至會稽而盡刻始皇所立刻石旁著大臣從者名以章先帝成功盛德而還夏四月二丗至咸陽謂趙髙曰夫人生居世間也譬猶騁六驥過決隙也吾既已臨天下矣欲悉耳目之所好窮心志之所樂以終吾年壽可乎髙曰此賢主之所能行而昏亂主之所禁也雖然有所未可臣請言之夫沙丘之謀諸公子及大臣皆疑焉而諸公子盡帝兄大臣又先帝之所置也今陛下初立此其屬意怏怏皆不服恐為變臣戰戰栗栗唯恐不終陛下安得為此樂乎二丗曰為之奈何趙髙曰陛下嚴法而刻刑令有罪者相坐誅滅大臣及宗室然後收舉遺民貧者富之賤者貴之盡除去先帝之故臣更置陛下之所親信者此則隂德歸陛下害除而姦謀塞羣臣莫不被潤澤蒙厚德陛下則髙枕肆志寵樂矣計莫出於此二丗然之乃更為法律務益刻深大臣諸公子有罪輒下髙令鞠治之於是公子十二人僇死咸陽市十公主矺死於杜財物入於縣官相連逮者不可勝數公子將閭昆弟三人囚於內宫議其罪獨後二世使使令將閭曰公子不臣罪當死吏致法焉將閭曰闕廷之禮吾未嘗敢不從賔贊也廊廟之位吾未嘗敢失節也受命應對吾未嘗敢失辭也何謂不臣願聞罪而死使者曰臣不得與謀奉書從事將閭乃仰天大呼天者三曰吾無罪昆弟三人皆流涕拔劒自殺宗室振恐公子髙欲奔恐收族乃上書曰先帝無恙時臣入則賜食出則乘輿御府之衣臣得賜之中廄之寶馬臣得賜之臣當從死而不能為人子不孝為人臣不忠不孝不忠者無名以立於丗臣請從死願葬驪山之足唯上幸哀憐之書上二丗大説召趙髙而示之曰此可謂急乎趙髙曰人臣當憂死而不暇何變之得謀二丗可其書賜錢十萬以葬復作阿房宫盡徵材士五萬人為屯衛咸陽令教射狗馬禽獸當食者多度不足下調郡縣轉輸菽粟芻稿皆令自齎糧食咸陽三百里內不得食其榖秋七月陽城人陳勝陽夏人吳廣起兵於蘄是時發閭左戍漁陽九百人屯大澤鄉陳勝吳廣皆為屯長會天大雨道不通度已失期失期法皆斬陳勝吳廣因天下之愁怨乃殺將尉召令徒屬曰公等皆失期當斬假令毋斬而戍死者固什六七且壯士不死則已死則舉大名耳王侯將相寧有種乎衆皆從之乃詐稱公子扶蘇項燕為壇而盟稱大楚陳勝自立為將軍吳廣為都尉攻大澤鄉拔之收而攻蘄蘄下乃令符離人葛嬰將兵徇蘄以東攻銍鄼苦柘譙皆下之行收兵比至陳車六七百乘騎千餘卒數萬人攻陳乃入據陳初大梁人張耳陳餘相與為刎頸交秦滅魏聞二人魏之名士重賞購求之張耳陳餘乃變名姓俱之陳陳涉既入陳張耳陳餘詣門上謁陳涉素聞其賢大喜陳中豪桀父老請立涉為楚王涉以問張耳陳餘耳餘對曰秦為無道滅人社稷暴虐百姓將軍出萬死之計為天下除殘也今始至陳而王之示天下私願將軍毋王急引兵而西遣人立六國後自為樹黨為秦益敵敵多則力分與衆則兵強如此野無交兵縣無守城誅暴秦據咸陽以令諸侯諸侯亡而得立以德服之如此則帝業成矣今獨王陳恐天下懈也陳涉不聽遂自立為王號張楚當是時諸郡縣若秦法爭殺長吏以應涉謁者使從東方來以反者聞二丗怒下之吏後使者至上問之對曰羣盜鼠竊狗偷郡守尉方逐捕今盡得不足憂也上恱陳王以吳叔為假王監諸將以西擊滎陽張耳陳餘復説陳王請竒兵北略趙地於是陳王以故所善陳人武臣為將軍邵騷為護軍以張耳陳餘為左右校尉豫卒三千人徇趙陳王又令汝隂人鄧宗徇九江郡當此時楚兵數千人為聚者不可勝數葛嬰至東城立襄強為楚王聞陳王已立因殺襄強還報陳王誅殺葛嬰陳王令魏人周市北徇魏地以上蔡人房君蔡賜為上柱國陳王聞周文陳之賢人也習兵乃與之將軍印使西擊秦武臣等從白馬度河至諸縣説其豪桀豪桀皆應之乃行收兵得數萬人號武臣為武信君下趙十餘城餘皆城守乃引兵東北擊范陽范陽蒯徹説武信君曰足下必將戰勝而后略地攻得然後下城臣竊以為過矣誠聽臣之計可不攻而降城不戰而略地傳檄而千里定可乎武信君曰何謂也徹曰范陽令徐公畏死而貪欲先天下降君若以為秦所置吏誅殺如前十城則邊地之城皆為金城湯池不可攻也君若齎臣侯印以授范陽令使乘朱輪華轂驅馳燕趙之郊即燕趙城可毋戰而降矣武信君曰善以車百乘騎二百侯印迎徐公燕趙聞之不戰以城下者三十餘城陳王既遣周章以秦政之亂有輕秦之意不復設備博士孔鮒諌曰臣聞兵法不恃敵之不我攻恃吾不可攻今王恃敵而不自恃若跌而不振悔之無及也陳王曰寡人之軍先生無纍焉周文行收兵至關車千乘卒數十萬至戲軍焉二丗乃大驚與羣臣謀曰奈何少府章邯曰盜已至衆強今發近縣不及矣驪山徒多請赦之授兵以擊之二丗乃大赦天下使章邯免驪山徒人奴産子悉發以擊楚軍大敗之周文走張耳陳餘至邯鄲聞周章却又聞諸將為陳王徇地還者多以讒毁得罪誅乃説武信君令自王八月武信君自立為趙王以陳餘為大將軍張耳為右丞相邵騷為左丞相使人報陳王陳王大怒欲盡族武信君等家而發兵擊趙柱國房君諌曰秦未亡而誅武信君等家此生一秦也不如因而賀之使急引兵西擊秦陳王然之從其計徙繫武信君等家宫中封張耳子敖為成都君使使者賀趙令趣發兵西入關張耳陳餘説趙王曰王王趙非楚意特以計賀王楚已滅秦必加兵於趙願王毋西兵北徇燕代南收河內以自廣趙南據大河北有燕代楚雖勝秦必不敢制趙不勝秦必重趙趙乘秦楚之敝可以得志於天下趙王以為然因不西兵而使韓廣略燕李良略常山張黶略上黨九月沛人劉邦起兵於沛下相人項梁起兵於吳狄人田儋起兵於齊劉邦字季初為泗上亭長為縣送徒驪山徒多道亡自度比至皆亡之到豐西澤中亭止飲夜乃解縱所送徒曰公等皆去吾亦從此逝矣徒中壯士願從者十餘人劉季亡匿於芒碭山澤巖石之間數有竒怪沛中子弟聞之多欲附者及陳涉起沛令欲以沛應之掾主吏蕭何曹參曰君為秦吏今欲背之率沛子弟恐不聽願君召諸亡在外者可得數百人因劫衆衆不敢不聽乃令樊噲召劉季劉季之衆已數十百人矣沛令後悔恐其有變乃閉城城守欲誅蕭曹蕭曹恐踰城保劉季劉季乃書帛射城上遺沛父老為陳利害父老乃率子弟共殺沛令開門迎劉季立以為沛公蕭曹等為收沛子弟得二三千人以應諸侯項梁者楚將項燕子也嘗殺人與兄子籍避仇吳中吳中賢士大夫皆出其下會稽守殷通聞陳涉起欲發兵以應涉使項梁及桓楚將是時桓楚亡在澤中梁曰桓楚亡人莫知其處獨籍知之耳梁乃出誡籍持劔居外梁復入與守坐曰請召籍使受命召桓楚守曰諾梁召籍入須臾梁眗籍曰可行矣於是籍遂拔劔斬守頭項梁持守頭佩其印綬門下大驚擾亂籍所擊殺數十百人一府中皆懾伏莫敢起梁乃召故所知豪吏諭以所為起大事遂舉吳中兵使人收下縣得精兵八千人梁為會稽守籍為禆將徇下縣籍是時年二十四田儋者故齊王族也儋從弟榮榮弟橫皆豪健宗強能得人周市徇地至狄狄城守田儋徉為縳其奴從少年之廷欲謁殺奴見狄令因擊殺令而召豪吏子弟曰諸侯皆反秦自立齊古之建國也儋田氏當王遂自立為齊王發兵以擊周市周市軍還去田儋率兵東略定齊地韓廣將兵北徇燕燕地豪桀欲共立廣為燕王韓廣乃自立為燕王周市自狄還至魏地欲立故魏公子寧陵君咎為王咎在陳不得之魏魏地已定諸侯皆欲立周市為魏王市曰天下昏亂忠臣乃見今天下共畔秦其義必立魏王後乃可諸侯固請立市市終辭不受迎魏咎於陳五反陳王乃遣之立咎為魏王市為魏相二年冬十月泗川監平將兵圍沛公於豐沛公出與戰破之令雍齒守豐十一月沛公引兵之薛泗川守壯兵敗於薛走至戚沛公左司馬得殺之周章出關止屯曹陽二月餘章邯追敗之復走澠池十餘日章邯擊大破之周文自刎軍遂不戰吳叔圍滎陽李由為三川守守滎陽叔弗能下楚將軍田臧等相與謀曰周章軍已破矣秦兵旦暮至我圍滎陽城弗能下秦兵至必大敗不如少遺兵守滎陽悉精兵迎秦軍今假王驕不知兵權不足與計事恐敗因相與矯王令以誅吳叔獻其首於陳王陳王使使賜田臧楚令尹印使為上將田臧乃使諸將李歸等守滎陽自以精兵西迎秦軍於敖倉與戰田臧死軍破章邯進兵擊李歸等滎陽下破之李歸等死陽城人鄧説將兵居郯章邯别將擊破之銍人伍逢將兵居許章邯擊破之兩軍皆散走陳陳王誅鄧説二丗數誚讓李斯居三公位如何令盜如此李斯恐懼重爵祿不知所出乃阿二丗意以書對曰夫賢主者必能行督責之術者也故申子曰有天下而不恣睢命之曰以天下為桎梏者無他焉不能督責而顧以其身勞於天下之民若堯禹然故謂之桎梏也夫不能修甲韓之明術行督責之道專以天下自適也而徒務苦形勞神以身徇百姓則是黔首之役非畜天下者也何足貴哉故明主能行督責之術以獨斷於上則權不在臣下然後能滅仁義之塗絶諫説之辨犖然行恣睢之心而莫之敢逆如此羣臣百姓救過不給何變之敢圗二丗説於是行督責益嚴稅民深者為明吏殺人衆者為忠臣刑者相半於道而死人日成積於市秦民益駭懼思亂趙李良已定常山還報趙王趙王復使良略太原至石邑秦兵塞井陘未能前秦將詐為二丗書以招良良得書未信還之邯鄲益請兵未至道逢趙王姊出飲從百餘騎良望見以為王伏謁道旁王姊醉不知其將使騎謝李良李良素貴起慙其從官從官有一人曰天下畔秦能者先立且趙王素出將軍下今女兒乃不為將軍下車請追殺之李良已得秦書固欲反趙未決因此怒遣人追殺王姊因將其兵襲邯鄲邯鄲不知竟殺趙王邵騷趙人多為張耳陳餘耳目者以故二人獨得脫陳人秦嘉符離人朱雞石等起兵圍東海守於郯二丗益遣長史司馬欣董翳佐章邯擊盜章邯已破伍逢擊陳柱國房君殺之又進擊陳西張賀軍陳王出監戰張賀死臘月陳王之汝隂還至下城父其御莊賈殺陳王以降趙張耳陳餘收其散兵得數萬人擊李良良敗走歸章邯客有説耳餘曰兩君羇旅而欲附趙難可獨立立趙後輔以誼可就功乃求得趙歇春正月耳餘立歇為趙王居信都東陽寧君秦嘉聞陳王軍敗乃立景駒為楚王黥布者六人也姓英氏坐法黥以刑徒論輸驪山驪山之徒數十萬人布皆與其徒長豪桀交通乃率其曹耦亡之江中為羣盜番陽令吳芮甚得江湖間心號曰番君布往見之其衆已數千人番君乃以女妻之使將其兵擊秦楚王景駒在留沛公往從之張良亦聚少年百餘人欲往從景駒道遇沛公遂屬焉沛公拜良為廄將良數以太公兵法説沛公沛公善之常用其策良為他人言皆不省良曰沛公殆天授故遂從不去沛公與良俱見景駒欲請兵以攻豐時章邯司馬􅊂將兵北定楚地屠相至碭東陽寧君沛公引兵西與戰蕭西不利還收兵聚留二月攻碭三日拔之收碭兵得六千人與故合九千人三月攻下邑拔之還擊豐不下廣陵人召平為陳王徇廣陵未下聞陳王敗走章邯且至乃渡江矯陳王令拜項梁為楚上柱國曰江東已定急引兵西擊秦梁乃以八千人渡江而西聞陳嬰已下東陽使使欲與連和俱西陳嬰者故東陽令史居縣中素信謹稱為長者東陽少年殺其令相聚得二萬人欲立嬰為王嬰母謂嬰曰自我為汝家婦未嘗聞汝先丗之有貴者今暴得大名不祥不如有所屬事成猶得封侯事敗易以亡非丗所指名也嬰乃不敢為王謂其軍吏曰項氏丗丗將家有名於楚今欲舉大事將非其人不可我倚名族亡秦必矣其衆從之乃以其兵屬梁英布既破秦軍引兵而東聞項梁西度淮布與蒲將軍皆以其兵屬焉項梁衆凡六七萬人軍下邳景駒秦嘉軍彭城東欲以距梁梁謂軍吏曰陳王先首事戰不利未聞所在今秦嘉倍陳王而立景駒逆無道乃進兵擊秦嘉秦嘉軍敗走追之至胡陵嘉還戰一日嘉死軍降景駒走死梁地梁已并秦嘉軍軍胡陵將引軍而西章邯軍至栗項梁使别將朱雞石餘樊君與戰餘樊君死朱雞石軍敗亡走胡陵梁乃引兵入薛誅朱雞石沛公從騎百餘往見梁梁與沛公卒五千人五大夫將十人沛公還引兵攻豐拔之雍齒奔魏項梁使項羽别攻襄城襄城堅守不下已拔皆坑之還報梁聞陳王定死召諸別將會薛計事沛公亦往焉居鄛人范增年七十素居家好竒計往説項梁曰陳勝敗固當夫秦滅六國楚最無罪自懷王入秦不反楚人憐之至今故楚南公曰楚雖三户亡秦必楚今陳勝首事不立楚後而自立其勢不長今君起江東楚蜂起之將皆爭附君者以君丗丗楚將為能復立楚之後也於是項梁然其言乃求得楚懷王孫心於民間為人牧羊夏六月以立為楚懷王從民望也陳嬰為上柱國封五縣與懷王都盱眙項梁自號為武信君張良説項梁曰君已立楚後而韓諸公子橫陽君成最賢可立為王益樹黨項梁使良求韓成立以為韓王以良為司徒與韓王將千餘人西略韓地得數城秦輒復取之往來為遊兵潁川章邯已破陳王乃進兵擊魏王於臨濟魏王使周市出請救於齊楚齊王儋及楚將項它皆將兵隨市救魏章邯夜銜枚擊大破齊楚軍於臨濟下殺齊王及周市魏王咎為其民約降約定自燒殺其弟豹亡走楚楚懷王豫魏豹數千人復徇魏地齊田榮收其兄儋餘兵東走東阿章邯追圍之齊人聞齊王儋死乃立故齊王建之弟假為王田角為相角弟間為將以距諸侯秋七月大霖雨武信君引兵攻亢父聞田榮之急乃引兵擊破章邯軍東阿下章邯走而西田榮引兵東歸齊武信君獨追北使項羽沛公別攻城陽屠之楚軍軍濮陽東復與章邯戰又破之章邯復振守濮陽環水沛公項羽去攻定陶八月田榮擊逐齊王假假亡走楚田角亡走趙田間前救趙因留不敢歸田榮乃立儋子市為齊王榮相之田橫為將平齊地章邯兵益盛項梁數使使告齊趙發兵共擊章邯田榮曰楚殺田假趙殺角間乃出兵楚趙不許田榮怒終不肯出兵郎中令趙髙恃恩専恣以私怨誅殺人衆多恐大臣入朝奏事言之乃説二丗曰天子所以貴者但以聞聲羣臣莫得見其面故也且陛下富於春秋未必盡通諸事今坐朝廷譴舉有不當者則見短於大臣非所以示神明於天下也陛下不如深拱禁中與臣及侍中習法者待事事來有以揆之如此則大臣不敢奏疑事天下稱聖主矣二丗用其計乃不坐朝廷見大臣常居禁中趙髙侍中用事事皆決於趙髙髙聞李斯以為言乃見丞相曰關東羣盜多今上急益發繇治阿房宫聚狗馬無用之物臣欲諌為位賤此真君矦之事君何不諌李斯曰固也吾欲言之久矣今時上不坐朝廷常居深宫吾所言者不可傳也欲見無間趙髙曰君誠能諌請為君候上間語君於是趙髙待二丗方燕樂婦女居前使人告丞相上方間可奏事丞相至宫門上謁如此者三二丗怒曰吾常多間日丞相不來吾方燕私丞相輒來請事丞相豈少我哉且固我哉趙髙因曰夫沙丘之謀丞相與焉今陛下已立為帝而丞相貴不益此其意亦望裂地而王矣且陛下不問臣臣不敢言丞相長男李由為三川守楚盜陳勝等皆丞相傍縣之子以故楚盜公行過三川城守不肯擊髙聞其文書相往來未得其審故未敢以聞且丞相居外權重於陛下二丗以為然欲案丞相恐其不審乃先使人按驗三川守與盜通狀李斯聞之因上書言趙髙之短曰髙擅利擅害與陛下無異昔田常相齊簡公竊其恩威下得百姓上得羣臣卒弒簡公而取齊國此天下所明知也今髙有邪佚之志危反之行私家之富若田氏之於齊矣而有貪欲無厭求利不止列勢次主其欲無窮劫陛下之威信其志若韓玘為韓安相也陛下不圗臣恐其必為變也二丗曰何哉夫髙故宦人也然不為安肆志不以危易心潔行修善自使至此以忠得進以信守位朕實賢之而君疑之何也且朕非屬趙君當誰任哉且趙君為人精廉強力下知人情上能適朕君其勿疑二丗雅愛信髙恐李斯殺之乃私告趙髙髙曰丞相所患者獨髙髙已死丞相即欲為田常所為是時盜賊益多而關中卒發東擊盜者無已右丞相馮去疾左丞相李斯將軍馮劫進諌曰關東羣盜並起秦發兵誅擊所殺亡甚衆然猶不止盜多皆以戍漕轉作事苦賦稅大也請且止阿房宫作者減省四邊戍轉二丗曰凡所為貴有天下者得肆意極欲主重明法下不敢為非以制御海內矣夫虞夏之主貴為天子親處窮苦之實以徇百姓尚何於法且先帝起諸矦兼天下天下已定外攘四夷以安邊境作宫室以章得意而君觀先帝功業有緒今朕即位二年之間羣盜並起君不能禁又欲罷先帝之所為是上無以報先帝次不為朕盡忠力何以在位下去疾斯劫吏案責他罪去疾劫自殺獨李斯就獄二丗以屬趙髙治之責斯與子由謀反狀皆收捕宗族賔客趙髙治斯搒掠千餘不勝痛自誣服斯所以不死者自負其辨有功實無反心欲上書自陳幸二丗寤而赦之乃從獄中上書曰臣為丞相治民三十餘年矣逮秦地之狹隘不過千里兵數十萬臣盡薄材隂行謀臣資之金玉使遊説諸矦隂修甲兵飭政教官鬬士尊功臣故終以脅韓弱魏破燕趙夷齊楚卒兼六國虜其王立秦為天子又北逐胡貉南定百越以見秦之強更剋畫平斗斛度量文章布之天下以樹秦之名此皆臣之罪也臣當死久矣上幸盡其能力乃得至今願陛下察之書上趙髙使吏棄去不奏曰囚安得上書趙髙使其客十餘輩詐為御史謁者侍中更往覆訊斯斯更以其實對輒使人復搒之後二世使人驗斯斯以為如前終不敢更言辭服奏當上二丗喜曰微趙君幾為丞相所賣及二丗所使案三川守由者至則楚兵已擊殺之使者來會丞相下吏髙皆妄為反辭以相傅會遂具斯五刑論腰斬咸陽市斯出獄與其中子俱執顧謂其中子曰吾欲與若復牽黃犬俱出上蔡東門逐狡兔豈可得乎遂父子相哭而夷三族二丗乃以趙髙為丞相事無大小皆決焉項梁已破章邯於東阿引兵西北至定陶再破秦軍項羽沛公又與秦軍戰於雍丘大破之斬李由項梁益輕秦有驕色宋義諫曰戰勝而將驕卒惰者敗今卒少惰矣秦兵日益臣為君畏之項梁弗聽乃使宋義使於齊道遇齊使者髙陵君顯曰公將見武信君乎曰然曰臣論武信君軍必敗公徐行即免死疾行則及禍二丗悉起兵益章邯擊楚軍大破之定陶項梁死項羽沛公攻外黃未下去攻陳留聞武信君死士卒恐乃與將軍吕臣引兵而東徙懷王自盱眙都彭城吕臣軍彭城東項羽軍彭城西沛公軍碭魏豹下魏二十餘城楚懷王立豹為魏王章邯已破項梁以為楚地兵不足憂乃度河北擊趙大破之引兵至邯戰皆徙其民河內夷其城郭張耳與趙王歇走入巨鹿城王離圍之陳餘北收常山兵得數萬人軍巨鹿北章邯軍巨鹿南棘原趙數請救於楚髙陵君顯在楚見楚王曰宋義論武信君之軍必敗居數日軍果敗兵未戰而先見敗徵此可謂知兵矣王召宋義與計事而大説之因置以為上將軍項羽為次將范增為末將以救趙諸别將皆屬宋義號為卿子冠軍懷王遣沛公西入關三年冬十月宋義行至安陽留四十六日不進項羽曰秦圍趙急冝疾引兵渡河楚擊其外趙應其內破秦軍必矣宋義曰不然夫搏牛之虻不可以破蟣蝨今秦攻趙戰勝則兵罷我承其敝不勝則我引兵鼓行而西必舉秦矣故不如先鬭秦趙夫被堅執鋭義不如公坐運籌䇿公不如義因下令軍中曰有猛如虎很如羊貪如狼強不可使者皆斬之乃遣其子宋襄相齊身送之至無鹽飲酒髙會天寒大雨士卒凍飢項羽曰將戮力而攻秦久留不行今嵗飢民貧士卒食半菽軍無見糧乃飲酒髙會不引兵渡河因趙食與趙并力攻秦乃曰承其敝夫以秦之強攻新造之趙其勢必舉趙趙舉秦強何敝之承且國兵新破王坐不安席掃境內而専屬於將軍國家安危在此一舉今不恤士卒而徇其私非社稷之臣也十一月項羽晨朝上將軍宋義即其帳中斬宋義頭出令軍中曰宋義與齊謀反楚楚王隂令籍誅之當是時諸將皆懾服莫敢枝梧皆曰首立楚者將軍家也今將軍誅亂乃相與共立羽為假上將軍使人追宋義子及之齊殺之使桓楚報命於懷王懷王因使羽為上將軍十二月沛公引兵至栗遇剛武矦奪其軍四千餘人并之與魏將皇欣武滿軍合攻秦軍破之章邯築甬道屬河餉王離王離兵食多急攻巨鹿巨鹿城中食盡兵少張耳數使人召前陳餘陳餘度兵少不敵秦不敢前數月張耳大怒怨陳餘使張黶陳澤往讓陳餘曰始吾與公為刎頸交今王與耳旦暮且死而公擁兵數萬不肯相救安在其相為死茍必信胡不赴秦軍俱死且有十一二相全陳餘曰吾度前終不能救趙徒盡亡軍且餘所以不俱死欲為趙王張君報秦今必俱死如以肉委餓虎何益張黶陳澤要以俱死餘乃使黶澤將五千人先嘗秦軍至皆沒當是時齊師燕師皆來救趙張敖亦北收代兵得萬餘人來皆壁餘旁未敢擊秦項羽已殺卿子冠軍威震楚國乃遣當陽君蒲將軍將卒二萬渡河救巨鹿戰少利絶章邯甬道王離軍乏食陳餘復請兵項羽乃悉引兵渡河皆沈船破釡甑燒廬舍持三日糧以示士卒必死無一還心於是至則圍王離與秦軍遇九戰大破之章邯引兵却諸侯兵乃敢進擊秦軍遂殺蘇角虜王離涉間不降自燒殺當是時楚兵冠諸侯軍救巨鹿者十餘壁莫敢縱兵及楚擊秦諸侯將皆從壁上觀楚戰士無不一當十呼聲動天地諸侯軍無不人人惴恐於是已破秦軍項羽召見諸侯將諸侯將入轅門無不膝行而前莫敢仰視項羽由是始為諸侯上將軍諸侯皆屬焉於是趙王歇及張耳乃得出巨鹿城謝諸侯張耳與陳餘相見責讓陳餘以不肯救趙及問張黶陳澤所在疑陳餘殺之數以問餘餘怒曰不意君之望臣深也豈以臣為重去將印哉乃脫解印綬推豫張耳張耳亦愕不受陳餘起如厠客有説張耳曰臣聞天與不取反受其咎今陳將軍與君印君不受反天不祥急取之張耳乃佩其印收其麾下而陳餘還亦望張耳不讓遂趨出獨與麾下所善數百人之河上澤中漁獵趙王歇還信都春二月沛公北擊昌邑過彭越越以其兵從沛公越昌邑人常漁巨野澤中為羣盜陳勝項梁之起澤間少年相聚百餘人往從彭越曰請仲為長越謝曰臣不願也諸少年強請乃許與期旦日日出會後期者斬旦日日出十餘人後後者至日中於是越謝曰臣老諸君強以為長今期而多後不可盡誅誅最後者一人令校長斬之皆笑曰何至是請後不敢於是越引一人斬之設壇祭令徒屬皆大驚莫敢仰視乃略地收諸侯散卒得千餘人遂助沛公攻昌邑昌邑未下沛公引兵西過髙陽髙陽人酈食其家貧落魄為里監門沛公麾下騎士適食其里中人食其見謂曰諸侯將過髙陽者數十人吾問其將皆握齪好苛禮自用不能聽大度之言吾聞沛公慢而易人多大略此真吾所願從遊莫為我先若見沛公謂曰臣里中有酈生年六十餘長八尺人皆謂之狂生生自謂我非狂生騎士曰沛公不好儒諸客冠儒冠來者沛公輒解其冠溲溺其中與人言常大罵未可以儒生説也酈生曰弟言之騎士從容言如酈生所誡者沛公至髙陽傳舍使人召酈生酈生至入謁沛公方倨牀使兩女子洗足而見酈生酈生入則長揖不拜曰足下欲助秦攻諸侯乎且欲率諸侯破秦也沛公罵曰豎儒天下同苦秦久矣故諸侯相率而攻秦何謂助秦攻諸侯乎酈生曰必聚徒合義兵誅無道秦不冝倨見長者於是沛公輟洗起攝衣延酈生上坐謝之酈生因言六國從橫時沛公喜賜酈生食問曰計將安出酈生曰足下起糾合之衆收散亂之兵不滿萬人欲以徑入強秦此所謂探虎口者也夫陳留天下之衝四通五逹之郊也今其城中又多積粟臣善其令請得使之令下足下即不聽足下舉兵攻之臣為內應於是遣酈生行沛公引兵隨之遂下陳留號酈食其為廣野君酈生言其弟商時商聚少年得四千人來屬沛公沛公以為將將陳留兵以從酈生常為説客使諸侯三月沛公攻開封未拔西與秦將楊熊會戰白馬又戰曲遇東大破之楊熊走之滎陽二丗使使者斬之以徇夏四月沛公南攻潁川屠之張良遂略韓地時趙别將司馬卬方欲度河入關沛公乃北攻平隂絶河津南戰洛陽東軍不利南出轘轅張良引兵從沛公沛公令韓王成留守陽翟與良俱南六月與南陽守齮戰犨東破之略南陽郡南陽守走保城守宛沛公引兵過宛西張良諌曰沛公雖欲急入關秦兵尚衆距險今不下宛宛從後擊強秦在前此危道也於是沛公乃夜引軍從地道還偃旗幟遲明圍宛城三匝南陽守欲自剄其舍人陳恢曰死未晚也乃踰城見沛公曰臣聞足下約先入咸降者王之今足下留守宛宛郡縣連城數十其吏民自以為降必死故皆堅守乘城今足下盡日止攻士死傷者必多引兵去宛宛必隨足下後足下前則失咸陽之約後有強宛之患為足下計莫若約降封其守因使止守引其甲卒與之西諸城未下者聞聲爭開門而待足下足下通行無所纍沛公曰善秋七月南陽守齮降封為殷侯封陳恢千户引兵西無不下者至丹水髙武侯鰓襄侯王陵降還攻胡陽遇番君别將梅鋗與借攻析酈皆降所過亡得鹵掠秦民皆喜王離軍既沒章邯軍棘原項羽軍漳南相持未戰秦軍數却二丗使人讓章邯章邯恐使長史欣請事至咸陽留司馬門三日趙髙不見有不信之心長史欣恐還走其軍不敢出故道趙髙果使人追之不及欣至軍報曰趙髙用事於中下無可為者今戰能勝髙必疾妬吾功不能勝不免於死願將軍孰計之陳餘亦遺章邯書曰白起為秦將南征鄢郢北坑馬服攻城略地不可勝計而竟賜死蒙恬為秦將北逐戎人開榆中地數千里竟斬陽周何者功多秦不能盡封因以法誅之今將軍為秦將三嵗矣所亡失以十萬數而諸侯並起滋益多彼趙髙素諛日久今事急亦恐二丗誅之故欲以法誅將軍以塞責使人更代將軍以脫其禍夫將軍居外久多內郤有功亦誅無功亦誅且天之亡秦無愚智皆知之今將軍內不能直諫外為亡國將孤特獨立而欲常存豈不哀哉將軍何不還兵與諸侯為從約共攻秦分王其地南面稱孤此孰與身伏鈇質妻子為戮乎章邯狐疑隂使候始成使項羽欲約約未成項羽使蒲將軍日夜引兵度三户軍漳南與秦軍戰再破之項羽悉引兵擊秦軍汙水上大破之章邯使人見項羽欲約項羽召軍吏謀曰糧少欲聽其約軍吏皆曰善項羽乃與期洹水南殷虛上已盟章邯見項羽而流涕為言趙髙項羽乃立章邯為雍王置楚軍中使長史欣為上將軍將秦軍為前行初中丞相趙髙欲専秦權恐羣臣不聽乃先設驗持鹿獻於二丗曰馬也二丗笑曰丞相誤邪謂鹿為馬問左右左右或默或言馬以阿順趙髙或言鹿者髙因隂中諸言鹿者以法後羣臣皆畏髙莫敢言其過髙前數言關東盜無能為也及項羽虜王離等而章邯等軍數敗上書請益助自關以東大抵盡畔秦吏應諸侯諸侯咸率其衆西鄉八月沛公將數萬人攻武關屠之髙恐二世怒誅及其身乃謝病不朝見使使責讓髙以盜賊事髙懼乃隂與其壻咸陽令閻樂及弟趙成謀曰上不聽諫今事急欲歸禍於吾欲易置上更立子嬰子嬰仁儉百姓皆載其言乃使郎中令為內應詐為有大賊令樂召吏發卒迫劫樂毋置髙舍遣樂將吏卒千餘人至望夷宫殿門縳衛令僕射曰賊入此何不止衛令曰周廬設卒甚謹安得賊敢入宫樂遂斬衛令直將吏入行射郎宦者郎宦者大驚或走或格格者輒死死者數十人郎中令與樂俱入射上幄二世怒召左右左右皆惶擾不鬭旁有宦者一人侍不敢去二世入內謂曰公何不早告我乃至於此宦者曰臣不敢言故得全使臣早言皆已誅安得至今閻樂前即二世數曰足下驕恣誅殺無道天下兵畔足下足下其自為計二世曰丞相可得見否樂曰不可二世曰吾願得一郡為王弗許又曰願為萬户侯弗許曰願與妻子為黔首比諸公子閻樂曰臣受命於丞相為天下誅足下足下雖多言臣不敢報麾其兵進二世自殺閻樂歸報趙髙趙髙乃悉召諸大臣公子告以誅二世之狀曰秦故王國始皇君天下故稱帝今六國復自立秦地益小乃以空名為帝不可宜為王如故便乃立子嬰為秦王以黔首葬二丗杜南宜春苑中九月趙髙令子嬰齋當廟見受玉璽齋五日子嬰與其子二人謀曰丞相髙殺二丗望夷宫恐羣臣誅之乃徉以義立我我聞趙髙乃與楚約滅秦宗室而分王關中今使我齋見廟此𣣔因廟中殺我我稱病不行丞相必自來則殺之髙使人請子嬰數輩子嬰不行髙果自往曰宗廟重事王奈何不行子嬰遂剌殺髙於齋宫三族髙家以徇遣將將兵距嶢關沛公欲擊之張良曰秦兵尚強未可輕願先遣人益張旗幟於山上為疑兵使酈食其陸賈往説秦將啖以利秦將果欲連和沛公欲許之張良曰此獨其將欲叛恐其士卒不從不如因其懈怠擊之沛公引兵繞嶢關踰蕢山擊秦軍大破之藍田南遂至藍田又戰其北秦兵大敗漢髙祖元年冬十月沛公至霸上秦王子嬰素車白馬係頸以組封皇帝璽符節降軹道旁諸將或言誅秦王沛公曰始懷王遣我固以能寬容且人已降殺之不祥乃以屬吏賈誼論曰秦以區區之地致萬乘之權招八州而朝同列百有餘年然后以六合為家殽函為宫一夫作難而七廟墮身死人手為天下笑者何也仁誼不施而攻守之勢異也通鑑紀事本末卷第一
