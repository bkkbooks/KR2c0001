front:
  text: 通鑑紀事本末叙初予與子袁子同爲太學官子袁子録也子博士也志同志行同行言同言也後一年子袁子分教嚴陵後一年子岀守臨漳相見於嚴陵相勞苦相樂且相楙以學子袁子因岀書一編蓋通鑑之本末也予讀之大抵搴事之成以後於其萌提事之微以先於其明其情匿而泄其故悉而約其作窕而槬其䆒遐而邇其於治亂存亡蓋病之源醫之方也予每讀通鑑之書見事之肇於斯則惜其事之不竟於斯蓋事以年隔年以事析遭其𥘉莫繹其終攬其終莫志其𥘉如山之峩如海之茫蓋編年繫日其體然也今讀子袁子此書如生乎其時親見乎其事使人喜使人悲使人鼔舞未旣而繼之以歎且泣也嗟乎由周秦以來曰諸侯曰大盗曰女主曰外戚曰宦官曰權臣曰夷狄曰藩鎭國之病亦不一矣而其源不一哉蓋安史之亂則林甫之爲也藩鎭之亂則令孜之爲也其源不一哉得其病之之源則得其醫之方矣此書是也有國者不可以無此書前有姦而不察後有邪而不悟學者不可以無此書之有行而無徵退有蓄而無宗此書也其入通鑑之户歟雖然覿人之病戚人之病理人之病得人之病至於身之病不懵焉不諱焉不醫之距焉不醫而繆其醫焉古亦稀矣彼闇而此昭冝也切於人紓於身可哀也夫淳熈元年三月戊子廬陵楊萬里叙通鑑一書於治道最切實諸史之精華百代之龜鏡古未有也神宗皇帝深所愛重錫資治之嘉名且命經筵進讀歴朝寳之永以為訓近丗建安袁公復作紀事夲末區别條流各從其類豈求加扵通鑑之外哉盖通鑑以編年為宗本末以比事為體編年則雖一事而歳月遼隔比事則雖累載而脉絡貫聮故讀通鑑者如登髙山泛巨海未易遽覩其津厓得本末而閱之則根榦枝葉繩繩相生不待反覆它卷而瞭然在目中矣故本末者通鑑之户牖也袁公之為是書其殆司馬文正之䟽附先後也歟與籌淳祐壬子退而里居四年之間熟得繙閱每見丗道開泰君明臣良百度修舉四裔賔服使人忻恱愛慕至若叔丗末造賢愚倒植綱頽紐觧外阻内訌使人感憤歎息要其指歸治未始不由於任君子亂未始不由於親小人安未始不由扵固民心危未始不由扵困民力忠實事上者未有不昌姦䛕欺君者未有不亡公廉宏濟者奕丗流芳貪刻暴殄者子孫貽殃天道人事其應靡􅑯㕘稽源委可以昭勸戒於方来是書之關於丗教亦大矣嚴陵奮夲字小且訛乃易為大書精加讎校以私錢重刋之非特便老眼訓子弟庶與四方朋友共通鑑紀事本末揔目
