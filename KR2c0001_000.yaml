body:
  text: 建安袁樞編第一卷三家分晉秦并六國豪桀亡秦第二卷髙帝滅楚諸將之叛匈奴和親諸吕之變南粤稱藩七國之叛梁孝王驕恣第三卷漢通西南夷淮南謀反漢通西域武帝伐匈奴武帝平兩越武帝擊朝鮮武帝惑神怪巫蠱之禍燕蓋謀逆第四卷霍光廢立趙充國破羗匈奴歸漢恭顯用事成帝淫荒河決之患第五卷丁傅用事董賢嬖倖王莾篡漢光武中興第六卷光武平赤眉光武平漁陽光武平齊光武平隴蜀楚王英之獄馬后抑外家竇氏專恣西域歸附第七卷兩匈奴叛服諸羗叛服鮮卑宼邊嬖倖廢立梁氏之變第八卷宦官亡漢黨錮之禍董卓之亂黃巾之亂韓馬之叛袁紹討公孫瓉第九卷曹氏篡漢孫氏據江東劉備據蜀第十卷呉蜀通好諸葛亮岀師平南中附吳侵淮南魏平遼東明帝奢靡司馬懿誅曹爽呉易太子諸葛悋宼淮南孫琳逆節附第十一卷魏滅蜀淮南三叛司馬氏篡魏晉滅呉羌胡之叛樹機能齊萬年陳敏之叛第十二卷西晉之亂江左中興附賈氏諸王胡羯第十三卷劉淵據平陽殺太弟义附慕容據鄴成李據蜀張氏據涼王敦平湘漢石勒宼河朔前趙平秦隴石勒滅前趙氐據仇池第十四卷祖逖北伐王敦之亂蘇峻之亂燕討叚遼討字文附趙魏亂中原冉閔滅石氏第十五卷江左經略中原亘温伐燕亘温滅蜀亘温廢立符氏據長安符堅篡立符秦滅涼符秦滅燕第十六卷慕容叛秦復燕嘉容滅西燕肥水之役姚萇滅秦丁零叛燕拓䟦興魏魏伐後燕慕容德據廣固附第十七卷僞楚之亂盧循之亂譙縱之亂吕光據姑臧乞伏據金城秃髮據廣武蒙遜據張掖秦滅後涼第十八卷馮䟦滅後燕蒙遜伐西涼乞伏滅西涼蒙遜伐西秦劉𥙿滅南燕劉𥙿滅後秦赫連據朔方魏滅北燕魏滅夏魏滅北涼魏平仇池第十九卷劉𥙿篡晉元魏宼宋徐傳廢立彭城王專政宋文圖恢復宗愛弑逆太子劭弑逆南郡王之叛竟陵王之叛第二十卷廢帝之亂宋明帝北伐蕭道成篡宋魏遷洛陽蕭鸞篡弑第二十一卷元魏宼齊蕭衍篡齊南北交兵魏伐柔然第二十二卷肇忠用事邢巒㓂巴西梁魏爭淮堰元义幽后六鎭之叛元顥入洛元魏之亂第二十三卷魏分東西髙氏篡東魏北齊宇文篡西魏後周侯景之亂第二十四卷梁氏亂亡陳覇先篡梁附西魏取蜀蕭勃㩀嶺南王琳犇齊陳伐齊附齊顯柤狂暴常山王篡立附安成王篡立周陳之叛宇文護逆莭周伐齊周齊爭宜陽附吐谷渾盛衰第二十五卷周滅齊楊堅篡周始興王謀逆隋滅陳隋易太子第二十六卷突厥朝隋隋討髙麗焬帝亡隋髙祖興唐第二十七卷唐平東都李宻王丗充唐平河朔竇建德唐平隴右薛舉唐平河西李軌唐平河東劉武周唐平江陵蕭銑唐平江淮輔公祐社伏威李子通沈灋興唐平山東劉黑閥第二十八卷太宗平内難太宗易太子太宗平突厥唐平鐵勒唐平西突厥太宗討龜兹太宗平髙昌太宗平吐谷渾第二十九卷正觀君臣論治唐平遼東吐蕃請和突厥叛唐唐平奚契丹第三十卷武韋之禍太平公主謀逆第三十一卷李林甫專政姦臣聚歛王鉷宇文融楊釗楊慎矜韋堅楊氏之寵安史之亂第三十二卷劉展之叛李輔國用事張后程元振附僕固懷恩之叛周智光附元載尃政吐蕃入㓂代宗幸陜兩稅之弊裴延齡姦蠧吐蕃叛盟第三十三卷藩鎭連兵涇原之變李懷光之叛附第三十四卷伾文用事憲宗平蜀劉闢憲宗平呉李錡魏博歸朝田洪正憲宗討成徳王承宗憲宗平淮蔡呉元濟徳宗討呉少誠附憲宗討淄青李師道河朔再叛第三十五卷南詔歸附宦官弑逆甘露之變附朋黨之禍武宗平澤潞劉稙裘甫㓂浙東第三十六卷龐勛之亂回鶻叛服吐蕃衰亂唐復河湟附蠻導南詔入宼李克用歸唐第三十七卷黃巢之亂藩鎭之亂楊行宻據淮南王建據蜀徐氏篡呉第四十卷馬氏據湖南晉王滅燕後唐滅涼莊宗滅蜀第四十一卷鄴都之變李紹之叛安重誨專權秦王之亂潞王篡弑附契丹入宼孟知祥據蜀石晉篡後唐范楊之叛范延光楊光逺第四十二卷契丹滅晉劉知逺復汴京三叛連兵郭威篡漢劉旻據河東丗宗征淮南通鑑紀事本末揔目終
