body:
  text: 僞楚之亂晉武帝太元十四年初帝既親政事威權已出有人主之量己而溺於酒色委事於琅邪王道子道子亦嗜酒日夕與帝以酣歌為事又崇尚浮屠窮奢極費所親暱者皆姏姆僧尼左右近習爭弄權柄交通請託賄賂公行官賞濫雜刑獄謬亂尚書令陸納望宫闕歎曰好家居纎兒欲撞壊之邪左衛領營将軍㑹稽許營上疏曰今臺府局吏直衛武官及僕隷婢兒取母之姓者本無鄉邑品第皆得為郡守縣令或帶職在内及僧尼乳母競進親黨又受貨賂輒臨官領衆政教不均㬥濫無罪禁令不眀劫盜公行昔年下書敕羣下盡規而衆議兼集無所採用臣聞佛者清逺玄虚之神今僧尼往往依傍灋服五誡麤灋尚不能遵况精妙乎而流惑之徒競加敬事又侵漁百姓取財爲恵亦未合布施之道也疏奏不省道子埶傾内外逺近犇凑帝漸不平然猶外加優崇侍中王國寳以讒佞有寵於道子扇動朝衆諷八座啟道子宜進位丞相揚州牧假黄鉞加殊禮䕶軍将軍南平車胤曰此乃成王所以尊周公也今主上當陽非成王之比相王在位豈得爲周公乎乃稱疾不署疏奏帝大怒而嘉胤有守中書侍郎范寗徐邈為帝所親信數進忠言𥙷正闕失指斥姦黨王國寶寗之甥也寗尤疾其阿䛕勸帝黜之陳郡袁恱之有寵於道子國寶使恱之因尼支妙音致書於太子母陳淑媛云國寳忠謹宜見親信帝知之發怒託以他事斬恱之國寶大懼與道子共譖范寗出為豫章太守寗臨發上疏言今邊烽不舉而倉庫空匱古者使民嵗不過三日今之勞擾殆無三日之休至有生兒不復舉飬鰥寡不敢嫁娶臣恐社稷之憂厝火積薪不足喻也十五年琅邪王道子恃寵驕恣侍宴酣醉或虧禮敬帝浸不能平欲選時望為藩鎮以潜制道子問於太子左衛率王雅曰吾欲用王恭殷仲堪何如雅曰王恭風神簡貴志氣方嚴仲堪謹於細行以文義著稱然皆峻狹自是且幹略不長若委以方面天下無事足以守職若其有事必為亂階矣帝不從恭藴之子仲堪融之孫也二月以中書令王恭為都督青兖幽并冀五州諸軍事兖青二州刺史鎮京口九月以侍中王國寶為中書令俄兼中領軍十六年秋九月癸未以尚書右僕射王珣為左僕射珣桓温之故吏也十七年冬十一月癸酉以黄門郎殷仲堪為都督荆益寧三州諸軍事荆州刺史鎮江陵仲堪雖有英譽資望猶淺議者不以為允到官好行小恵綱目不舉南郡公桓玄負其才地以雄豪自處朝廷疑而不用年二十三始拜太子洗馬玄嘗詣琅邪王道子值其酣醉張目與衆客曰桓温晚塗欲作賊云何玄伏地流汗不能起由是益不自安常切齒於道子後出補義興太守鬱鬱不得志歎曰父為九州伯兒為五湖長遂棄官歸國上疏自訟曰先臣勤王匡復之勲朝廷遺之臣不復計至於先帝龍飛陛下繼眀請問談者誰之由邪疏寝不報玄在江陵仲堪甚敬憚之桓氏累世臨荆州玄復豪横士民畏之過於仲堪嘗於仲堪㕔事前戲馬以矟擬仲堪仲堪中兵參軍彭城劉邁謂玄曰馬矟有餘精理不足玄不恱仲堪為之失色玄出仲堪謂邁曰卿狂人也玄夜遣殺卿我豈能相救邪使邁下都避之玄使人追之邁僅而獲免征虜參軍豫章胡藩過江陵見仲堪說之曰桓玄志趣不常每怏怏於失職節下崇待太過恐非將來之計也仲堪不恱藩内弟同郡羅企生為仲堪功曹藩退謂企生曰殷侯倒戈以授人必及於祸君不早圖去就後悔無及矣庚寅立皇子徳文為琅邪王徙琅邪王道子為㑹稽王二十年春三月皇太子出就東宫以丹陽尹王雅領少傅時㑹稽王道子專權奢縱嬖人趙牙本出倡優茹千秋本錢塘捕賊吏皆以諂賂得進道子以牙為魏郡太守千秋為驃騎諮議參軍牙為道子開東第築山穿池功用鉅萬帝甞幸其第謂道子曰府内乃有山甚善然修飾太過道子無以對帝去道子謂牙曰上若知山是人力所為爾必死矣牙曰公在牙何敢死營作彌甚千秋賣官招權聚貨累億博平令呉興聞人奭上疏言之帝益惡道子而逼於太后不忍廢黜乃擢時望及所親幸王㳟郗恢殷仲堪王珣王雅等使居内外要任以防道子道子亦引王國寶及國寶從弟琅邪内史緒以為腹心由是朋黨競起無復曏時友愛之驩矣太后每和解之中書侍郎徐邈從容言於帝曰漢文眀主猶悔淮南世祖聰達負愧齊王兄弟之際實為深慎㑹稽王雖有酣媟之累宜加弘貸消散羣議外為國家之計内慰太后之心帝納之復委任道子如故二十一年帝嗜酒流連内殿醒治既少外人罕得進見張貴人寵冠後宫後宫皆畏之秋九月庚申帝與後宫宴妓樂盡侍時貴人年近三十帝戯之曰汝以年亦當廢矣吾意更屬少者貴人潜怒向夕帝醉寢於清暑殿貴人徧飲宦者酒散遣之使婢以被䝉帝面弑之重賂左右云因魘㬥崩時太子闇弱㑹稽王道子昏荒遂不復推問王國寶夜叩禁門欲入為遺詔侍中王爽拒之曰大行晏駕皇太子未至敢入者斬國寶乃止爽恭之弟也辛酉太子即皇帝位大赦癸亥有司奏㑹稽王道子宜進位太傅揚州牧假黄鉞詔内外衆事動靜咨之安帝幼而不慧口不能言至於寒暑飢飽亦不能辨飲食寝興皆非已出母弟琅邪王徳文性恭謹常侍左右為之節適始得其宜初王國寶黨附㑹稽王道子驕縱不法屢為御史中丞禇粲所紏國寶起齋侔清暑殿孝武帝甚惡之國寶懼遂更求媚於帝而疎道子帝復寵昵之道子大怒嘗於内省面責國寶以劒擲之舊好盡失及帝崩國寶復事道子與王緒共為邪謟道子更惑之倚為心腹遂參管朝權威震内外並為時之所疾王恭入赴山陵每正色直言道子深憚之恭罷朝歎曰榱棟雖新便有黍離之歎緒說國寶因恭入朝勸相王伏兵殺之國寶不許道子欲輯和内外乃深布腹心於恭兾除舊惡而恭每言及時政輒厲聲色道子知恭不可和協遂有相圖之志或勸恭因入朝以兵誅國寶恭以豫州刺史庾楷士馬甚盛黨於國寶憚之不敢發王珣謂恭曰國寶雖終為禍亂要之罪逆未彰今遽先事而發必大失朝野之望况擁彊兵竊發於京輦誰謂非逆國寶若遂不改惡布天下然後順衆心以除之亦無憂不濟也恭乃止既而謂珣曰比來視君一似胡廣珣曰王陵廷爭陳平慎黙但問嵗晏何如耳冬十月甲申葬孝武帝于隆平陵王恭還鎮将行謂道子曰主上諒闇冡宰之任伊周所難願大王親萬機納直言放鄭聲逺佞人國寳等愈懼安帝隆安元年春正月己亥朔帝加元服改元以左僕射王珣為尚書令領軍将軍王國寶為左僕射領選仍加後将軍丹陽尹㑹稽王道子悉以東宫兵配國寶使領之夏四月僕射王國寳建威将軍王緒依附㑹稽王道子納賄窮奢不知紀極惡王恭殷仲堪勸道子裁損其兵權中外恟恟不安恭等各繕甲勒兵表請北伐道子疑之詔以盛夏妨農悉使解嚴恭遣使與仲堪謀討國寳等桓玄以仕不得志欲假仲堪兵埶以作亂乃說仲堪曰國寶與君諸人素已為對唯患相斃之不速耳今既執大權與王緒相表裏其所廻易無不如志孝伯居元舅之地必未敢害之君為先帝所拔超居方任人情皆以君為雖有思致非方伯才彼若發詔徴君為中書令用殷覬為荆州君何以處之仲堪曰憂之久矣計将安出玄曰孝伯疾惡深至君宜潜與之約興晉陽之甲以除君側之惡東西齊舉玄雖不肖願帥荆楚豪桀荷戈先驅此桓文之勲也仲堪心然之乃外結雍州刺史郗恢内與從兄南蠻校尉覬南郡相陳留江績謀之覬曰人臣當各守職分朝廷是非豈藩屏之所制也晉陽之事不敢預聞仲堪固邀之顗怒曰吾進不敢同退不敢異績亦極言其不可顗恐績及禍於坐和解之績曰大丈夫何至以死相脅邪江仲元行年六十但未獲死所耳仲堪憚其堅正以楊佺期代之朝廷聞之徴績為御史中丞覬遂稱散發辭位仲堪往省之謂覬曰兄病殊為可憂覬曰我病不過身死汝病乃當滅門宜深自愛勿以我為念郗恢亦不肯從仲堪疑未决㑹王恭使至仲堪許之恭大喜甲戍恭上表罪状國寶舉兵討之初孝武帝倚任王珣及帝㬥崩不及受顧命珣一旦失埶循黙而已丁丑王恭表至内外戒嚴道子問珣曰二藩作逆卿知之乎珣曰朝政得失珣弗之預王殷作難何由可知王國寶惶懼不知所為遣數百人戍竹里夜遇風雨各散歸王緒說國寶矯相王之命召王珣車胤殺之以除時望因挾君相發兵以討二藩國寶許之珣胤至國寶不敢害更問計於珣珣曰王殷與卿素無深怨所競不過埶利之間耳國寶曰将曹爽我乎珣曰是何言歟卿寧有爽之罪王孝伯豈宣帝之儔邪又問計於胤胤曰昔桓公圍夀陽彌時乃克今朝廷遣軍恭必城守若京口未拔而上流奄至君将何以待之國寶尤懼遂上疏解職詣闕待罪既而悔之詐稱詔復其本官道子闇懦欲求姑息乃委罪國寶遣驃騎諮議參軍譙王尚之收國寶付廷尉尚之恬之子也甲申賜國寶死斬緒於市遣使詣恭深謝愆失恭乃罷兵還京口國寶兄侍中愷驃騎司馬愉並請解職道子以愷愉與國寶異母又素不協皆釋不問戊子大赦殷仲堪雖許王恭猶豫不敢下聞國寶等死乃始抗表舉兵遣楊佺期屯巴陵道子以書止之仲堪乃還㑹稽世子元顯年十六有雋才為侍中說道子以王殷終必為患請潜為之備道子乃拜元顯征虜将軍以其衛府及徐州文武悉配之司徒左長史王廞導之孫也以母䘮居呉王恭之討王國寶也版廞行呉國内史使起兵於東方廞使前呉國内史虞嘯父等入呉興義興召募兵衆赴者以萬計未幾國寶死恭罷兵符廞去職反䘮服廞以起兵之際誅異已者頗多勢不得止遂大怒不承恭命使其子泰将兵伐恭牋於㑹稽王道子稱恭罪惡道子以其牋送恭五月恭遣司馬劉宇之帥五千人撃泰斬之又與廞戰於曲阿衆潰廞單騎走不知所在收虞嘯父下廷尉以其祖潭有功免為庻人二年㑹稽王道子忌王殷之逼以譙王尚之及弟休之有才略引為腹心尚之說道子曰今方鎮彊盛宰相權輕宜宻樹腹心於外以自藩衛道子從之以其司馬王愉為江州刺史都督江州及豫州之四郡軍事用為形援日夜與尚之謀議以伺四方之隙秋七月桓玄求為廣州㑹稽王道子忌玄不欲使居荆州因其所欲以玄為督交廣二州軍事廣州刺史玄受命而不行豫州刺史庾楷以道子割其四郡使王愉督之上疏言江州内地而西府北帶㓂戎不應使愉分督朝廷不許楷怒遣其子鴻說王恭曰尚之兄弟復秉機權過於國寶欲假朝威削弱方鎮懲艾前事為禍不測今及其謀議未成宜早圖之恭以為然以告殷仲堪桓玄仲堪玄許之推恭為盟主刻期同趣京師時内外疑阻津邏嚴急仲堪以斜絹為書内箭簳中合鏑漆之因庾楷以送恭恭發書絹文角戾不復能辨仲堪手書疑楷詐為之且謂仲堪去年已違期不赴今必不動乃先期舉兵司馬劉牢之諫曰将軍國之元舅㑹稽王天子叔父也㑹稽王又當國秉政曏為将軍戮其所愛王國寶王緒又送王廞書其深伏将軍已多矣頃所授任雖未允惬亦非大失割庾楷四郡以配王愉於将軍何損晉陽之甲豈可數興乎恭不從上表請討王愉司馬尚之兄弟道子使人說楷曰昔我與卿恩如骨肉帳中之飲結帶之言可謂親矣卿今棄舊交結新援忘王恭疇昔陵侮之恥乎若欲委體而臣之使恭得志必以卿為反覆之人安肯深相親信身首且不可保况富貴乎楷怒曰王恭昔赴山陵相王憂懼無計我知事急尋勒兵而至恭不敢發去年之事我亦俟命而動我事相王無相負者相王不能拒恭反殺國寶及緒自爾以來誰敢復為相王盡力者庾楷實不能以百口助人屠滅時楷已應恭檄正徴士馬信返朝廷憂懼内外戒嚴㑹稽世子元顯言於道子曰前不討王恭故有今日之難今若復從其欲則太宰之祸至矣道子不知所為悉以事委元顯日飲醇酒而已元顯聰警頗渉文義志氣果銳以安危為己任附㑹之者謂元顯神武有眀帝之風殷仲堪聞恭舉兵自以去嵗後期乃勒兵趣發仲堪素不習為将悉以軍事委南郡相楊佺期兄弟使佺期帥舟師五千為前鋒桓玄次之仲堪帥兵二萬相繼而下佺期自以其先漢太尉震至父亮九世皆以才徳著名矜其門地謂江左莫及有以比王珣者佺期猶恚恨而時流以其晚過江婚宦失類佺期及兄廣弟思平從弟孜敬皆麤獷每排抑之佺期常慷慨切齒欲因事際以逞其志故亦贊成仲堪之謀八月佺期玄奄至湓口王愉無僃惶遽奔臨川玄遣偏将軍追獲之秋九月辛卯加㑹稽王道子黄鉞以世子元顯為征討都督遣衛将軍王珣右将軍謝琰将兵討王恭譙王尚之将兵討庾楷己亥譙王尚之大破庾楷於牛渚楷單騎奔桓玄㑹稽王道子以尚之為豫州刺史弟恢之為驃騎司馬丹楊尹允之為呉國内史休之為襄城太守各擁兵馬以為已援乙巳桓玄大破官軍於白石玄與楊佺期進至横江尚之退走恢之所領水軍皆沒丙午道子屯中堂元顯守石頭己酉王珣守北郊謝琰屯宣陽門以僃之王恭素以才地陵物既殺王國寶自謂威無不行仗劉牢之為爪牙而但以部曲将遇之牢之負其才深懐恥恨元顯知之遣廬江太守高素說牢之使叛恭許事成即以恭位號授之又以道子書遺牢之為陳禍福牢之謂其子敬宣曰王恭昔受先帝大恩今為帝舅不能翼戴王室數舉兵向京師吾不能審恭之志事捷之日必能為天子相王之下乎吾欲奉國威靈以順討逆何如敬宣曰朝廷雖無成康之美亦無幽厲之惡而恭恃其兵威㬥蔑王室大人親非骨肉義非君臣雖共事少時意好不恊今日討之於情義何有恭參軍何澹之知其謀以告恭恭以澹之素與牢之有隙不信乃置酒請牢之於衆中拜之為兄精兵堅甲悉以配之使帥帳下督顔延為前鋒牢之至竹里斬延以降遣敬宣及其壻東莞太守髙雅之還襲恭恭方出城曜兵敬宣縱騎横撃之恭兵皆潰恭将入城雅之已閉城門恭單騎奔曲阿素不習馬髀中生瘡曲阿人殷確恭故吏也以船載㳟将奔桓玄至長塘湖為人所告獲之送京師斬於倪塘恭臨刑猶理鬚鬢神色自若謂監刑者曰我闇於信人所以至此原其本心豈不忠於社稷邪但令百世之下知有王恭耳并其子弟黨與皆死以劉牢之為都督兖青冀幽并徐揚州晉陵諸軍事以代恭俄而楊佺期桓玄至石頭殷仲堪至蕪湖元顯自竹里馳還京師遣丹楊尹王愷等發京邑士民數萬人據石頭以拒之佺期玄等上表理王恭求誅劉牢之牢之帥北府之衆馳赴京師軍于新亭佺期玄見之失色回軍蔡洲朝廷未知西軍虗實仲堪等擁衆數萬充斥郊畿内外憂逼左衛将軍桓修沖之子也言於道子曰西軍可說而解也修知其情矣殷桓之下專恃王恭恭既破滅西軍沮恐今若以重利㗖玄及佺期二人必内喜玄能制仲堪佺期可使倒戈取仲堪矣道子納之以玄為江州刺史召郗恢為尚書以佺期代恢為都督梁雍秦三州諸軍事雍州刺史以修為荆州刺史權領左衛文武之鎮又令劉牢之以千人送之黜仲堪為廣州刺史遣仲堪叔父太常茂宣詔敕仲堪回軍冬十月殷仲堪得詔書大怒趣桓玄楊佺期進軍玄等喜於朝命欲受之猶豫未决仲堪聞之遽自蕪湖南歸遣使告諭蔡洲軍士曰汝輩不各自散歸吾至江陵盡誅汝餘口佺期部将劉系帥二千人先歸玄等大懼狼狽西還追仲堪至尋陽及之仲堪既失職倚玄等為援玄等亦資仲堪兵雖内相疑阻埶不得不合乃以子弟交質壬午盟于尋陽俱不受朝命連名上疏申理王恭求誅劉牢之及譙王尚之并訴仲堪無罪獨被降黜朝廷深憚之内外騷然乃復罷桓修以荆州還仲堪優詔慰諭以求和解仲堪等乃受詔御史中丞江績劾奏桓修專為身計疑誤朝廷詔免修官初桓玄在荆州所為豪縱仲堪親黨皆勸仲堪殺之仲堪不聴及在尋陽資其聲地推玄為盟主玄愈自矜倨楊佺期為人驕悍玄每以寒士裁之佺期甚恨宻說仲堪以玄終為患請於壇所襲之仲堪忌佺期兄弟勇健恐既殺玄不可復制苦禁之於是各還所鎮玄亦知佺期之謀隂有取佺期之志乃屯於夏口引始安太守濟隂卞範之為長史以為謀主是時詔書獨不赦庾楷玄以楷為武昌太守三年夏四月以世子元顯為揚州刺史元顯以廬江太守張灋順為謀主冬十二月殷仲堪恐桓玄跋扈乃與楊佺期結婚為援佺期屢欲攻玄仲堪毎抑止之玄恐終為殷楊所滅乃告執政求廣其所統執政亦欲交構使之乖離乃加玄都督荆州四郡軍事又以玄兄偉代佺期兄廣為南蠻校尉佺期忿懼楊廣欲拒桓偉仲堪不聴出廣為宜都建平二郡太守楊孜敬先為江夏相玄以兵襲而劫之以為諮議參軍佺期勒兵建牙聲云援洛欲與仲堪共襲玄仲堪雖外結佺期而内疑其心苦止之猶慮弗能禁遣從弟遹屯于北境以遏佺期佺期既不能獨舉又不測仲堪本意乃解兵仲堪多疑少决諮議參軍羅企生謂其弟遵生曰殷侯仁而無斷必及於難吾䝉知遇義不可去必将死之是嵗荆州大水平地三丈仲堪竭倉廩以賑饑民桓玄欲乗其虚而伐之乃發兵西上亦聲言救洛與仲堪書曰佺期受國恩而棄山陵宜共罪之今當入沔討除佺期已頓兵江口若見與無貳可收楊廣殺之如其不爾便當帥兵入江時巴陵有積糓玄先遣兵襲取之梁州刺史郭銓當之官路經夏口玄詐稱朝廷遣銓為已前鋒乃授以江夏之衆使督諸軍並進宻報兄偉令為内應偉遑遽不知所為自齎疏示仲堪仲堪執偉為質令與玄書辭甚苦至玄曰仲堪為人無决常懐成敗之計為兒子作慮我兄必無憂也仲堪遣殷遹帥水軍七千至西江口玄使郭銓符宏擊之遹等敗走玄頓巴陵食其糓仲堪遣楊廣及弟子道䕶等拒之皆為玄所敗江陵震駭城中乏食以胡麻廪軍士玄乗勝至零口去江陵二十里仲堪急召楊佺期以自救佺期曰江陵無食何以待敵可來見就共守襄陽仲堪志在全軍保境不欲棄州逆走乃紿之曰比來收集已有儲矣佺期信之帥歩騎八千精甲耀日至江陵仲堪唯以飯餉其軍佺期大怒曰今兹敗矣不見仲堪與其兄廣共擊玄玄畏其銳退軍馬頭明日佺期引兵急撃郭銓幾獲之㑹玄兵至佺期大敗單騎奔襄陽仲堪出奔鄼城玄遣将軍馮該追佺期及廣皆獲而殺之傳首建康佺期弟思平從弟尚保孜敬逃入蠻中仲堪聞佺期死将數百人将奔長安至冠軍城該追獲之還至祚溪逼令自殺并殺殷道護仲堪奉天師道禱請鬼神不吝財賄而嗇於周急好為小惠以恱人病者自為胗脉分藥用計倚伏煩宻而短於鑒略故至於敗仲堪之走也文武無送者惟羅企生從之路經家門弟遵生曰作如此分離何可不一執手企生旋馬授手遵生有力因牽下之曰家有老母去将何之企生揮淚曰今日之事我必死之汝等奉養不失子道一門之中有忠與孝亦復何恨遵生抱之愈急仲堪於路待之見企生無脫理䇿馬而去及玄至荆州人士無不詣玄者企生獨不往而營理仲堪家事或曰如此禍必至矣企生曰殷侯遇我以國士為弟所制不得隨之共殄醜逆復何靣目就桓求生乎玄聞之怒然待企生素厚先遣人謂曰若謝我當釋汝企生曰吾為殷荆州吏荆州敗不能救尚何謝為玄乃收之復遣人問企生欲何言企生曰文帝殺嵇康嵇紹為晉忠臣從公乞一弟以養老母玄乃殺企生而赦其弟四年春三月桓玄既克荆雍表求領荆江二州詔以玄為都督荆司雍秦梁益寧七州諸軍事荆州刺史以中䕶軍桓修為江州刺史玄上疏固求江州於是進玄督八州及揚豫八部諸軍事復領江州刺史玄輒以兄偉為雍州刺史朝廷不能違又以從子振為淮南太守五年冬十二月桓玄表其兄偉為江州刺史鎮夏口司馬刁暢為輔國将軍督八郡軍事鎮襄陽遣其将皇甫敷馮該戍湓口移沮漳蠻二千户于江南立武寧郡更招集流民立綏安郡詔徴廣州刺史刁逵豫章太守郭昶之玄皆留不遣玄自謂有晉國三分之二數使人上已符瑞欲以惑衆又致牋於㑹稽王道子曰賊造近郊以風不得進以雨不致火食盡故去耳非力屈也昔國寶死後王恭不乗此威入統朝政足見其心非侮於眀公也而謂之不忠今之貴要腹心有時流清望者誰乎豈可云無佳勝直是不能信之耳爾來一朝一夕遂成今日之禍在朝君子皆畏禍不言玄忝任在逺是以披寫事實元顯見之大懼張法順謂元顯曰桓玄承藉世資素有豪氣既并殷楊專有荆楚第下之所控引止三吴耳豫恩為亂東土塗地公私困竭玄必乗此縱其姦兇竊用憂之元顯曰為之奈何灋順曰玄始得荆州人情未附方務綏撫未暇佗圖若乗此際使劉牢之為前鋒而第下以大軍繼進玄可取也元顯以為然㑹武昌太守庾揩以玄與朝廷構怨恐事不成禍及於已宻使人自結於元顯云玄大失人情衆不為用若朝廷遣軍己當為内應元顯大喜遣張灋順至京口謀於劉牢之牢之以為難灋順還謂元顯曰觀牢之言色必貳於我不如召入殺之不爾敗人大事元顯不從於是大治水軍徴兵装艦以謀討玄元興元年春正月庚午朔下詔罪状桓玄以尚書令元顯為驃騎大将軍征討大都督都督十八州諸軍事加黄鉞又以鎮北将軍劉牢之為前鋒都督前将軍譙王尚之為後部因大赦改元内外戒嚴加㑹稽王道子太傅元顯欲盡誅諸桓中䕶軍桓修驃騎長史王誕之甥也誕有寵於元顯固陳修等與玄志趣不同元顯乃止誕導之曽孫也張灋順言於元顯曰桓謙兄弟每為上流耳目宜斬之以杜姦謀且事之濟不繫在前軍而牢之反覆萬一有變則禍敗立至可令牢之殺謙兄弟以示無貳心若不受命當逆為其所元顯曰今非牢之無以敵玄且始事而誅大将人情不安再三不可又以桓氏世為荆土所附桓沖特有遺惠而謙沖之子也乃自驃騎司馬除都督荆益寕梁四州諸軍事荆州刺史欲以結西人之心東土遭孫恩之亂因以饑饉漕運不繼桓玄禁斷江路商旅俱絶公私匱乏以粰橡給士卒玄謂朝廷方多憂虞必未暇討已可以蓄力觀釁及大軍将發從兄太傅長史石生宻以書報之玄大驚欲完聚保江陵長史卞範之曰眀公英威振於逺近元顯口尚乳臭劉牢之大失物情若兵臨近畿示以禍福土崩之埶可翹足而待何有延敵入境自取窮蹙者乎玄從之留桓偉守江陵抗表傳檄罪状元顯舉兵東下檄至元顯大懼二月丙子帝餞元顯于西池元顯下船而不發桓玄發江陵慮事不捷常為西還之計及過尋陽不見官軍意甚喜将士之氣亦振庾楷謀泄玄囚之丁巳詔遣齊王柔之以騶虞幡宣告荆江二州使罷兵玄前鋒殺之柔之宗之子也丁卯玄至姑孰使其将馮該等攻歴陽襄城太守司馬休之嬰城固守玄軍斷洞浦焚豫州舟艦豫州刺史譙王尚之帥歩卒九千陣於浦上遣武都太守楊秋屯横江秋降于玄軍尚之衆潰逃于涂中玄捕獲之司馬休之出戰而敗棄城走劉牢之素惡驃騎大将軍元顯恐桓玄既滅元顯益驕恣又恐己功名愈盛不為元顯所容且自恃材武擁彊兵欲假玄以除執政復伺玄之隙而自取之故不肯討玄元顯日夜昏酣以牢之為前鋒牢之驟詣門不得見及帝出餞元顯遇之公坐而已牢之軍溧州參軍劉裕請擊玄牢之不許玄使牢之族舅何穆說牢之曰自古戴震主之威挾不賞之功而能自全者誰邪越之文種秦之白起漢之韓信皆事眀主為之盡力功成之日猶不免誅夷况為凶愚者之用乎君如今日戰勝則傾宗戰敗則覆族欲以此安歸乎不若翻然改圖則可以長保富貴矣古人射鉤斬祛猶不害為輔佐况玄與君無宿昔之怨乎時譙王尚之已敗人情愈恐牢之頗納穆言與玄交通東海中尉東海何無忌牢之之甥也與劉裕極諫不聽其子驃騎從事中郎敬宣諫曰今國家衰危天下之重在大人與玄玄藉父叔之資據有全楚割晉國三分之二一朝縱之使陵朝廷玄威望既成恐難圖也董卓之變将在今矣牢之怒曰吾豈不知今日取玄如反覆手耳但平玄之後令我奈驃騎何三月乙巳朔牢之遣敬宣詣玄請降玄隂欲誅牢之乃與敬宣宴飲陳名書畫共觀之以安恱其意敬宣不知覺玄佐吏莫不相視而笑玄板敬宣為諮議參軍元顯将發聞玄已至新亭棄船退屯國子學辛未陳於宣陽門外軍中相驚言玄已至南桁元顯引兵欲還宫玄遣人拔刀隨後大呼曰放仗軍人皆崩潰元顯乗馬走入東府唯張灋順一騎隨之元顯問計於道子道子但對之涕泣玄遣太傅從事中郎毛泰收元顯送新亭縳於舫前而數之元顯曰為王誕張灋順所誤耳壬申復隆安年號帝遣侍中勞玄於安樂渚玄入京師稱詔解嚴以玄揔百揆都督中外諸軍事丞相録尚書事楊州牧領徐荆江三州刺史假黄鉞玄以桓偉為荆州刺史桓謙為尚書左僕射桓修為徐兖二州刺史桓石生為江州刺史卞範之為丹楊尹初玄之舉兵侍中王謐奉詔詣玄玄親禮之及玄輔政以謐為中書令謐導之孫也新安太守殷仲文覬之弟也玄姊為仲文妻仲文聞玄克京師棄郡投玄玄以為諮議參軍劉邁往見玄玄曰汝不畏死而敢來邪邁曰射鉤斬祛并邁為三玄恱以為參軍癸酉有司奏㑹稽王道子酣縱不孝當棄市詔徙安成郡斬元顯及東海王彦璋譙王尚之庾楷張灋順毛泰等於建康市桓修為王誕固請得流嶺南玄以劉牢之為㑹稽内史牢之曰始爾便奪我兵禍其至矣劉敬宣請歸諭牢之使受命玄遣之敬宣勸牢之襲玄牢之猶豫不决移屯班瀆私告劉裕曰今當北就髙雅之於廣陵舉兵以匡社稷卿能從吾去乎裕曰将軍以勁卒數萬望風䧏服彼新得志威震天下朝野人情皆已去矣廣陵豈可得至邪裕當反服還京口耳何無忌謂裕曰我将何之裕曰吾觀鎮北必不免卿可隨我還京口桓玄若守臣節當與卿事之不然當與卿圖之於是牢之大集僚佐議據江北以討玄參軍劉襲曰事之不可者莫大於反将軍往年反王兖州近日反司馬郎君今復反桓公一人三反何以自立語畢趨出佐吏多散走牢之懼使敬宣之京口迎家失期不至牢之以為事已泄為玄所殺乃帥部曲北走至新洲縊而死敬宣至不暇哭即渡江奔廣陵将吏共殯斂牢之以其䘮歸丹徒玄令斵棺斬首㬥尸於市桓玄讓丞相荆江徐三州改授太尉都督中外諸軍事揚州牧領豫州刺史揔百揆司馬休之劉敬宣髙雅之俱犇洛陽求救於秦夏四月太尉玄出屯姑孰辭録尚書事詔許之而大政皆就諮焉小事則决於尚書令桓謙及卞範之自隆安以來中外之人厭於禍亂及玄初至黜姦佞擢雋賢京師欣然冀得少安既而玄奢豪縱逸政令無常朋黨互起陵侮朝廷裁損乗輿供奉之具帝幾不免飢寒由是衆心失望三吴大飢户口減半㑹稽減什三四臨海永嘉殆盡富室皆衣羅紈懐金玉閉門相守餓死秋八月太尉玄諷朝廷以玄平元顯功封豫章公平殷楊功封桂陽公并本封南郡如故玄以豫章封其子昇桂陽封其兄子俊冬十月太尉玄殺呉興太守髙素将軍竺謙之及謙之從兄朗之劉襲并襲弟季武皆劉牢之北府舊将也襲兄冀州刺史軌邀司馬休之劉敬宣髙雅之等共據山陽欲起兵攻玄不克而走將軍袁䖍之劉夀髙長慶郭恭等皆往從之将奔魏至陳留南分為二輩軌休之敬宣奔南燕䖍之夀長慶恭奔秦冬十二月太尉玄使御史杜林防衛㑹稽文孝王道子至安成林承玄㫖酖道子殺之袁䖍之等至長安秦王興問曰桓玄才略何如其父卒能成功乎䖍之曰玄乗晉室衰亂盜據宰衡猜忌安忍刑賞不公以臣觀之不如其父逺矣玄今已執大柄其埶必將篡逆正可為它人驅除耳興善之以䖍之為廣州刺史二年二月乙卯以太尉玄為大將軍丁巳玄殺冀州刺史孫無終玄上表請帥諸軍掃平關洛既而諷朝廷下詔不許乃云奉詔故止玄初欲飭裝先命作輕舸載服玩書畫或問其故玄曰兵凶戰危脫有意外當使輕而易運衆皆笑之秋八月荆州刺史桓偉卒大将軍玄以桓脩代之從事中郎曹靖之說玄曰謙脩兄弟專據内外權埶大重玄乃以南郡相桓石康為荆州刺史石康豁之子也九月侍中殷仲文散騎常侍卞範之勸大将軍玄早受禪隂撰九錫文及册命以桓謙為侍中開府錄尚書事王謐為中書監領司徒桓胤為中書令加桓脩撫軍大将軍胤沖之孫也丙子冊命玄為相國揔百揆封十郡為楚王加九錫楚國置丞相以下官桓謙私問彭城内史劉裕曰楚王勲徳隆重朝廷之情咸謂宜有揖讓卿以為何如裕曰楚王宣武之子勲徳蓋世晉室微弱民望久移乗運禪代有何不可謙喜曰卿謂之可即可耳新野人庾庂殷仲堪之黨也聞桓偉死石康未至乃起兵襲雍州刺史馮該於襄陽走之庂有衆七千設壇祭七廟云欲討桓玄江陵震動石康至州發兵攻襄陽庂敗犇秦冬十月楚王玄上表請歸藩使帝作手詔固留之又詐言錢塘臨平湖開江州甘露降使百僚集賀用為已受命之符又以前世皆有隠士恥於己時獨無求得西朝隠士安定皇甫謐六世孫希之給其資用使隠居山林徵為著作郎使希之固辭不受然後下詔旌禮號曰高士時人謂之充隠又欲廢錢用糓帛及復肉刑制作紛紜志無一定變更回復卒無所施行性復貪鄙人士有灋書好畫及佳園宅必假蒲博而取之尤愛珠玉未嘗離手十一月詔楚王玄行天子禮樂妃為王后世子為太子丁丑卞範之為禪詔使臨川王寶逼帝書之寶晞之曽孫也庚辰帝臨軒遣兼太保領司徒王謐奉璽綬禪位于楚壬午帝出居永安宫癸未遷太廟神主于琅邪國穆章何皇后及琅邪王徳文皆徙居司徒府百官詣姑孰勸進十二月庚寅朔玄築壇於九井山北壬辰即皇帝位册文多非薄晉室或諫之玄曰揖讓之文正可陳之於下民耳豈可欺上帝乎大赦改元永始以南康之平固縣封帝為平固王降何后為零陵縣君琅邪王徳文為石陽縣公武陵王遵為彭澤縣侯追尊父温為宣武皇帝廟號太祖南康公主為宣皇后封子昇為豫章王以㑹稽内史王愉為尚書僕射愉子相國左長史綏為中書令綏桓氏之甥也戊戌玄入建康宫登御坐而床忽䧟羣下失色殷仲文曰将由聖徳深厚地不能載玄大恱梁王珍之國臣孔樸奉珍之犇夀陽珍之晞之曽孫也辛亥桓玄遷帝於尋陽癸丑納桓温神主于太廟桓玄臨聴訟觀閱囚徒罪無輕重多得原放有干輿乞者時或䘏之其好行小恵如此三年春正月桓玄立其妻劉氏為皇后劉氏喬之曽孫也玄以其祖彛以上名位不顯不復追尊立廟散騎常侍徐廣曰敬其父則子恱請依故事立七廟玄曰禮大祖東向左昭右穆晉立七廟宣帝不得正東向之位何足灋也祕書監卞承之謂廣曰若宗廟之祭果不及祖有以知楚徳之不長矣廣邈之弟也玄自即位心常不自安二月己丑朔夜濤水入石頭流殺人甚多讙譁震天玄聞之懼曰奴輩作矣玄性苛細好自矜伐主者奏事或一字不體或片辭之謬必加紏擿以示聰眀尚書荅詔誤書春蒐為春莵自左丞王納之以下凡所闗署皆被降黜或手注直官或自用令史詔令紛紜有司奉荅不暇而綱紀不治奏案停積不能知也又性好遊畋或一日數出遷居東宫更繕宫室土木並興督廹嚴促朝野騷然思亂者衆玄遣使加益州刺史毛璩散騎常侍左将軍璩執留玄使不受其命璩寶之孫也玄以桓希為梁州刺史分命諸将戍三巴以僃之璩傳檄逺近列玄罪状遣巴東太守栁約之建平太守羅述征虜司馬甄季之擊破希等仍帥衆進屯白帝玄以桓弘為青州刺史鎮廣陵刁逵為豫州刺史鎮歴陽弘修之弟逵彞之子也初太原王元徳及弟仲徳為符氏起兵攻燕主垂不克來犇朝廷以元徳為弘農太守仲徳見桓玄稱帝謂人曰自古革命誠非一族然今之起者恐不足以成大事平昌孟昶為青州主簿桓弘使昶至建康玄見而恱之謂劉邁曰素士中得一尚書郎卿與共州里寧相識否邁素與昶不善對曰臣在京口不聞昶有異能唯聞父子紛紛更相贈詩耳玄笑而止昶聞而恨之既還京口裕謂昶曰草間當有英雄起卿頗聞乎昶曰今日英雄有誰正當是卿耳於是裕毅無忌元徳仲徳昶及裕弟道規任城魏詠之髙平檀慿之琅邪諸葛長民河内太守隴西辛扈興振威将軍東莞童厚之相與合謀起兵道規為桓弘中兵參軍裕使毅就道規及昶於江北共殺弘據廣陵長民為刁逵參軍使長民殺逵據歴陽元徳扈興厚之在建康使之聚衆攻玄為内應刻期齊發孟昶妻周氏富於財昶謂之曰劉邁毁我於桓公使我一生淪䧟我决當作賊卿幸早離絶脫得富貴相迎不晚也周氏曰君父母在堂欲建非常之謀豈婦人所能諫事之不成當於奚宫中奉養大家義無歸志也昶愴然久之而起周氏追昶坐曰觀君舉措非謀及婦人者不過欲得財物耳因指懐中兒示之曰此而可賣亦當不惜遂傾貲以給之昶弟顗妻周氏之從妹也周氏紿之曰昨夜夢殊不祥門内絳色物宜悉取以為厭勝妹信而與之遂盡縫以為軍士袍何無忌夜於屏風裏草檄文其母劉牢之姊也登橙宻窺之泣曰吾不及東海吕母明矣汝能如此吾復何恨問所與同謀者曰劉裕母尤喜因為言玄必敗舉事必成之理以勸之乙卯裕託以遊獵與無忌收合徒衆得百餘人丙辰詰旦京口城開無忌著傳詔服稱敕使居前徒衆隨之齊入即斬桓修以徇修司馬刁弘帥文武佐吏來赴裕登城謂之曰郭江州已奉乗輿返正於尋陽我等並被宻詔誅除逆黨今日賊玄之首已當梟於大航矣諸君非大晉之臣乎今來欲何為弘等信之收衆而退裕問無忌曰今急須一府主簿何由得之無忌曰無過劉道民道民者東莞劉穆之也𥙿曰吾亦識之即馳信召焉時穆之聞京口讙譟聲晨起出陌頭屬與信㑹穆之直視不言者久之既而返室壊布裳為袴往見裕裕曰始舉大義方造艱難須一軍吏甚急卿謂誰堪其選穆之曰貴府始建軍吏實須其才倉卒之際略當無見踰者裕笑曰卿能自屈吾事濟矣即於坐署主簿孟昶勸桓弘其日出獵天未明開門出獵人昶與劉毅劉道規帥壮士數十人直入弘方噉粥即斬之因收衆濟江裕使毅誅刁弘先是裕遣同謀周安穆入建康報劉邁邁雖酬許意甚惶懼安穆慮事泄乃馳歸玄以邁為竟陵太守邁欲亟之郡是夜玄與邁書曰北府人情云何卿近見劉裕何所道邁謂玄已知其謀晨起白之玄大驚封邁為重安侯既而嫌邁不執安穆使得逃去乃殺之悉誅元徳扈興厚之等衆推劉裕為盟主揔督徐州事以孟昶為長史守京口檀慿之為司馬彭城人應募者裕悉使郡主簿劉鍾統之丁巳裕帥二州之衆千七百人軍于竹里移檄逺近聲言益州刺史毛璩已定荆楚江州刺史郭昶之奉迎主上返正於尋陽鎮北參軍王元徳等並帥部曲保據石頭揚武将軍諸葛長民已據歴陽玄移還上宫召侍官皆入止省中加楊州刺史新安王桓謙征討都督以殷仲文代桓脩為徐兖二州刺史謙等請亟遣兵撃裕玄曰彼兵銳甚計出萬死若有蹉跌則彼氣成而吾事去矣不如屯大衆於覆舟山以待之彼空行二百里無所得銳氣已挫忽見大軍必驚愕我案兵堅陣勿與交鋒彼求戰不得自然散走此䇿之上也謙等固請撃之乃遣頓丘太守吴甫之右衛将軍皇甫敷相繼北上玄憂懼特甚或曰裕等烏合微弱勢必無成陛下何慮之深玄曰劉裕足為一世之雄劉毅家無擔石之儲樗蒲一擲百萬何無忌酷似其舅共舉大事何謂無成初袁真殺朱憲憲弟綽逃犇桓温温克夀陽綽輒發真棺戮其尸温怒将殺之桓沖請而免之綽事沖如父沖薨綽嘔血而卒劉裕克京口以綽子齡石為建武參軍三月戊午朔裕軍與呉甫之遇於江乗将戰齡石言於裕曰齡石世受桓氏厚恩不欲以兵刃相向乞在軍後裕義而許之甫之玄驍将也其兵甚銳𥙿手執長刀大呼以衝之衆皆披靡即斬甫之進至羅落橋皇甫敷帥數千人逆戰寕逺将軍檀憑之敗死裕進戰彌厲敷圍之數重裕倚大樹挺戰敷曰汝欲作何死拔㦸将刺之裕瞋目叱之敷辟易裕黨俄至射敷中額而踣裕援刀直進敷曰君有天命以子孫為託裕斬之厚撫其孤裕以檀憑之所領兵配參軍檀祗祗憑之之從子也玄聞二将死大懼召諸道術人推筭及為猒勝問羣臣曰朕其敗乎吏部郎曹靖之對曰民怨神怒臣實懼焉玄曰民或可怨神何爲怒對曰晉氏宗廟飄泊江濱大楚之祭上不及祖此其所以怒也玄曰卿何不諌對曰輦上君子皆以為堯舜之世臣何敢言玄黙然使桓謙及遊撃将軍何澹之屯東陵侍中後将軍卞範之屯覆舟山西衆合二萬己未裕軍食畢悉棄其餘糧進至覆舟山東使羸弱登山張旗幟爲疑兵數道並前布滿山谷玄偵候者還云裕軍四塞不知多少玄益憂恐遣武衛将軍庾賾之帥精卒副援諸軍謙等士卒多北府人素畏伏裕莫有鬬志裕與劉毅等分爲數隊進突謙陳裕以身先之將士皆殊死戰無不一當百呼聲動天地時東北風急因縱火焚之煙炎熛天鼓噪之音震動京邑謙等諸軍大潰玄時雖遣軍拒裕而走意已决潜使領軍将軍殷仲文具舟於石頭聞謙等敗帥親信數千人聲言赴戰遂将其子昇兄子濬出南掖門遇前相國參軍胡藩執馬鞚諫曰今羽林射手猶有八百皆是義故西人受累世之恩不驅令一戰一旦捨此欲安之乎玄不對但舉䇿指天因鞭馬而走西趨石頭與仲文等浮江南走經日不食左右進粗飯玄咽不能下昇抱其胷而撫之玄悲不自勝裕入建康王仲徳抱元徳子方回出候裕裕於馬上抱方囘與仲徳對哭追贈元徳給事中以仲徳為中兵參軍裕止桓謙故營遣劉鍾據東府庚申裕屯石頭城立留臺百官焚桓温神主於宣陽門外造晉新主納于太廟遣諸将追玄尚書王嘏帥百官奉迎乗輿誅玄宗族在建康者裕使臧熹入宫收圖書器物封閉府庫有金飾樂器裕問熹卿得無欲此乎熹正色曰皇上幽逼播越非所将軍首建大義劬勞王家雖復不肖實無情於樂裕笑曰聊以戲卿耳熹燾之弟也壬戌玄司徒王謐與衆議推裕領楊州裕固辭乃以謐為侍中領司徒楊州刺史録尚書事謐推裕為使持節都督揚徐兖豫青冀幽并八州諸軍事徐州刺史劉毅為青州刺史何無忌為琅邪内史孟昶為丹陽尹劉道規為義昌太守裕始至建康諸大處分皆委於劉穆之倉猝立定無不允愜裕遂託以腹心動止諮焉穆之亦竭節盡誠無所遺隠時晉政寛弛綱紀不立豪族陵縱小民窮蹙重以司馬元顯政令違舛桓玄雖欲釐整而科條繁密衆莫之從穆之斟酌時宜隨方矯正裕以身範物先以威禁内外百官皆肅然奉職不盈旬日風俗頓改初諸葛長民至豫州失期不得發刁逵執長民檻車送桓玄至當利而玄敗送人共破檻出長民還趣歴陽逵棄城走為其下所執斬於石頭子姪無少長皆死唯赦其季弟給事中聘逵故吏匿其弟子雍送洛陽秦王興以為太子中庶子裕以魏詠之為豫州刺史鎮歴陽諸葛長民爲宣城内史初裕名微位薄輕狡無行盛流皆不與相知惟王謐獨竒貴之謂裕曰卿當爲一代英雄裕嘗與刁逵樗蒲不時輸直逵縳之馬栁謐見之責逵而釋之代之還直由是裕深憾逵而徳謐蕭方等曰夫蛟龍潜伏魚蝦䙝之是以漢髙赦雍齒魏武免梁鵠安可以布衣之嫌而成萬乗之隙也今王謐爲公刁逵亡族醻恩報怨何其狹哉丁卯劉裕遷鎮東府桓玄至尋陽郭昶之給其器用兵力辛未玄逼帝西上劉毅帥何無忌劉道規等諸軍追之玄留龍驤将軍何澹之前将軍郭銓與郭昶之守湓口丙戍劉裕稱受帝宻詔以武陵王遵承制揔百官行事因大赦惟桓玄一族不宥劉敬宣髙雅之謀殺南燕主僃徳推司馬休之為主雅之邀劉軌同謀軌不從謀頗泄敬宣等南走南燕人收軌殺之追及雅之又殺之敬宣休之至淮泗間聞桓玄敗遂來歸劉裕以敬宣為晉陵太守夏四月己丑武陵王遵入居東宫内外畢敬遷除百官稱制書敎稱令書以司馬休之監荆益梁寧秦雍六州諸軍事領荆州刺史庚寅桓玄挾帝至江陵桓石康納之玄更署置百官以卞範之為尚書僕射自以犇敗之後恐威令不行乃更増峻刑罰衆益離怨殷仲文諌玄怒曰今以諸将失律天文不利故還都舊楚而羣小紛紛妄興異議方當紏之以猛未可施之以寛也荆江諸郡聞玄播越有上表犇問起居者玄皆不受更令所在賀遷新都初王謐為玄佐命元臣玄之受禪謐手解帝璽綬及玄敗衆謂謐宜誅劉裕特保全之劉毅嘗因朝㑹問謐璽綬所在謐内不自安逃犇曲阿裕牋白武陵王迎還復位桓玄兄子歆引氐帥楊秋㓂歴陽魏詠之帥諸葛長民劉敬宣劉鍾共擊破之斬楊秋於練固玄使武衛将軍庾雅祖江夏太守桓道恭帥數千人就何澹之等共守湓口何無忌劉道規至桑落洲庚戌澹之等引舟師逆戰澹之常所乗舫羽儀旗幟甚盛無忌曰賊帥必不居此欲詐我耳宜亟攻之衆曰澹之不在其中得之無益無忌曰今衆寡不敵戰無全勝澹之既不居此舫戰士必弱我以勁兵攻之必得之得之則彼勢沮而我氣倍因而薄之破賊必矣道規曰善遂往攻而得之因傳呼曰已得何澹之矣澹之軍中驚擾無忌之衆亦以為然乗勝進攻澹之等大破之無忌等克湓口進據尋陽遣使奉送宗廟主祏還京師加劉裕都督江州諸軍事桑落之戰胡藩所乗艦為官軍所燒藩全鎧入水潜行三十許歩乃得登岸時江陵路已絶乃還豫章劉裕素聞藩為人忠直引參領諸軍事桓玄收集荆州兵曽未三旬有衆二萬樓船器械甚盛甲寅玄復帥諸軍挾帝東下以符宏領梁州刺史為前鋒又使散騎常侍徐放先行說劉裕等曰若能旋軍散甲當與之更始各授位任令不失分劉裕以諸葛長民都督淮北諸軍事鎮山陽以劉敬宣為江州刺史劉毅何無忌劉道規下邳太守平昌孟懐玉帥衆自尋陽西上五月癸酉與桓玄遇於崢嶸洲毅等兵不滿萬人而玄戰士數萬衆憚之欲退還尋陽道規曰不可彼衆我寡彊弱異埶今若畏懦不進必為所乗雖至尋陽豈能自固玄雖竊名雄豪内實恇怯加之已經犇敗衆無固心决機兩陣将雄者克不在衆也因麾衆先進毅等從之玄常漾舸於舫側以備敗走由是衆莫有鬬心毅等乗風縱火盡銳爭先玄衆大潰燒輜重夜遁郭銓詣毅降玄故将劉統馮稚等聚黨四百人襲破尋陽城毅遣建威将軍劉懐肅討平之懐肅懐敬之弟也玄挾帝單舸西走留永安何皇后及王皇后於巴陵殷仲文時在玄艦求出别船收集散卒因叛玄奉二后犇夏口遂還建康己卯玄與帝入江陵馮該勸使更下戰玄不從欲犇漢中就桓希而人情乖沮號令不行庚辰夜中處分欲發城内已亂乃與親近腹心百餘人乗馬出城西走至城門左右於闇中斫玄不中其徒更相殺害前後交横玄僅得至船左右分散惟卞範之在側辛巳荆州别駕王康産奉帝入南郡府舍太守王騰之帥文武為侍衛玄将之漢中屯騎校尉毛修之璩之弟子也誘玄入蜀玄從之寧州刺史毛璠璩之弟也卒於官璩使其兒孫祐之及參軍費恬帥數百人送璠䘮歸江陵壬午遇玄於枚回洲祐之恬迎擊玄矢下如雨玄嬖人丁僊期萬蓋等以身蔽玄皆死益州督䕶漢嘉馮遷抽刀前欲擊玄玄拔頭上玉導與之曰汝何人敢殺天子遷曰我殺天子之賊耳遂斬之又斬桓石康桓濬庾頥之執桓昇送江陵斬於市乗輿反正於江陵以毛修之為驍騎将軍甲申大赦諸以畏逼從逆者一無所問戊寅奉神主于大廟劉毅等傳送玄首梟于大桁毅等既戰勝以為大事已定不急追躡又遇風船未能進玄死幾一旬諸軍猶未至時桓謙匿於沮中揚武将軍桓振匿於華容浦玄故将王稚徽戍巴陵遣人報振云桓歆已克京邑馮稚復克尋陽劉毅諸軍並中路敗退振大喜聚黨得二百人襲江陵桓謙亦聚衆應之閏月己丑復䧟江陵殺王康産王騰之振見帝於行宫躍馬奮戈直至階下問桓昇所在聞其已死瞋目謂帝曰臣門户何負國家而屠滅若是琅邪王徳文下牀謂曰此豈我兄弟意邪振欲殺帝謙苦禁之乃下馬斂容致拜而出壬辰振爲玄舉哀立䘮庭謚曰武悼皇帝癸巳謙等帥羣臣奉璽綬於帝曰主上灋堯禪舜今楚祚不終百姓之心復歸於晉矣以琅邪王徳文領徐州刺史振爲都督八州諸軍事荆州刺史謙復爲侍中衛将軍加江豫二州刺史帝侍御左右皆振之腹心振少薄行玄不以子妷齒之至是歎曰公昔不早用我遂致此敗若使公在我爲前鋒天下不足定也今獨作此安歸乎遂縱意酒色肆行誅殺謙勸振引兵下戰已守江陵振素輕謙不從其言劉毅至巴陵誅王稚徽何無忌劉道規進攻桓謙於馬頭桓蔚於龍泉皆破之蔚祕之子也無忌欲乗勝直趣江陵道規曰兵灋屈伸有時不可茍進諸桓世居西楚羣小皆為竭力振勇冠三軍難與爭鋒且可息兵養銳徐以計䇿縻之不憂不克無忌不從振逆戰於靈溪馮該以兵㑹之無忌等大敗死者千餘人退還尋陽與劉毅等上牋請罪劉裕以毅節度諸軍免其青州刺史桓振以桓蔚為雍州刺史鎮襄陽栁約之羅述甄季之聞桓玄死自白帝進軍至枝江聞何無忌等敗於靈溪亦引兵退俄而述季之皆病約之詣桓振偽降欲謀襲振事泄振殺之約之司馬時延祖涪陵太守文處茂收其餘衆保涪陵六月毛璩遣将攻漢中斬桓希璩自領梁州劉敬宣在尋陽聚糧繕船未嘗無僃故何無忌等雖敗退賴以復振桓玄兄子亮自稱江州刺史㓂豫章敬宣撃破之劉毅何無忌劉道規復自尋陽西上至夏口桓振遣鎮東将軍馮該守東岸揚武将軍孟山圖據魯山城輔國将軍桓僊客守偃月壘衆合萬人水陸相援毅攻魯山城道規攻偃月壘無忌遏中流自辰至午二城俱潰生擒山圖僊客該走石城冬十二月劉毅等進克巴陵毅號令嚴整所過百姓安恱劉裕復以毅為兖州刺史桓振以桓放之為益州刺史屯西陵文處茂撃破之放之走還江陵是嵗晉民避亂襁負之淮北者道路相屬義熈元年春正月南陽太守扶風魯宗之起兵襲襄陽相蔚走江陵己丑劉毅等諸軍至馬頭桓振挾帝出屯江津遣使求割江荆二州奉送天子毅等不許辛夘宗之擊破振将温楷于柞溪進屯紀南振留桓謙馮該守江陵引兵與宗之戰大破之劉毅等擊破馮該於豫章口桓謙棄城走毅等入江陵執卞範之等斬之桓振還望見火起知城已䧟其衆已潰振逃于溳川乙未詔大處分悉委冠軍将軍劉毅戊戍大赦改元惟桓氏不原以桓沖忠於王室特宥其孫胤以魯宗之為雍州刺史毛璩為征西将軍都督益梁秦凉寧五州諸軍事璩弟瑾為梁秦二州刺史瑗為寧州刺史劉懐肅追斬馮該於石城桓謙桓怡桓蔚桓謐何澹之温楷皆犇秦怡弘之弟也二月丁巳留臺僃灋駕迎帝於江陵劉毅劉道規留屯夏口何無忌奉帝東還三月桓振自鄖城襲江陵荆州刺史司馬休之戰敗犇襄陽振自稱荆州刺史建威将軍劉懐肅自雲杜引兵馳赴與振戰於沙橋劉毅遣廣武将軍唐興助之臨陣斬振復取江陵甲午帝至建康乙未百官詣闕請罪詔令復職尚書殷仲文以朝廷音樂未僃言於劉裕請治之裕曰今日不暇給且性所不解仲文曰好之自解裕曰正以解則好之故不習耳庚子以琅邪王徳文為大司馬武陵王遵為太保劉裕為侍中車騎将軍都督中外諸軍事徐青二州刺史如故劉毅為左将軍何無忌為右将軍督豫州楊州五郡軍事豫州刺史劉道規為輔國将軍督淮北諸軍事并州刺史魏詠之為征虜将軍呉國内史裕固讓不受加録尚書事又不受屢請歸藩詔百僚敦勸帝親幸其第裕惶懼復詣闕陳請乃聴歸藩以魏詠之為荆州刺史代司馬休之初劉毅嘗為劉敬宣寧朔參軍時人或以雄傑許之敬宣曰夫非常之才自有調度豈得便謂此君為人豪邪此君之性外寛而内忌自伐而尚人若一旦遭遇亦當以陵上取禍耳毅聞而恨之及敬宣為江州辭以無功不宜授任先於毅等裕不許毅使人言於裕曰劉敬宣不豫建義猛将勞臣方須叙報如敬宣之比宜令在後若使君不忘平生正可為貟外常侍耳聞已授郡實為過優尋復為江州尤用駭惋敬宣愈不自安自表解職乃召還為宣城内史桓玄餘黨桓亮符宏等擁衆㓂亂郡縣者以十數劉毅劉道規檀祗等分兵討滅之荆湘江豫皆平詔以毅為都督淮南等五郡軍事豫州刺史何無忌為都督江東五郡軍事㑹稽内史二年冬十月尚書論建義功奏封劉裕豫章郡公劉毅南平郡公何無忌安城郡公自餘封賞有差盧循之亂晉安帝隆安二年初琅邪人孫泰學妖術於錢唐杜子恭士民多奉之王珣惡之流泰於廣州王雅薦泰於孝武帝云知飬性之方召還累官至新安太守泰知晉祚将終因王恭之亂以討恭為名收合兵衆聚貨鉅億三吴之人多從之識者皆憂其為亂以中領軍元顯與之善無敢言者㑹稽内史謝輶發其謀己酉㑹稽王道子使元顯誘而斬之并其六子兄子恩逃入海愚民猶以為泰蟬蛻不死就海中資給恩恩乃聚合亡命得百餘人以謀復讎三年㑹稽世子元顯性苛刻生殺任意發東土諸郡免奴為客者號曰樂屬移置京師以充兵役東土嚻然苦之孫恩因民心騷動自海島帥其黨殺上虞令遂攻㑹稽㑹稽内史王凝之羲之之子也世奉天師道不出兵亦不設僃日於道室稽顙跪呪官屬請出兵討恩凝之曰我已請大道借鬼兵守諸津要各數萬賊不足憂也及恩漸近乃聴出兵恩已至郡下甲寅恩䧟㑹稽凝之出走恩執而殺之并其諸子凝之妻謝道藴奕之女也聞㓂至舉措自若命婢肩輿抽刀出門手殺數人乃被執呉國内史桓謙臨海太守新秦王崇義興太守魏隠皆棄郡走於是㑹稽謝鍼呉郡陸瓌呉興丘尫義興許允之臨海周胄永嘉張永等及東陽新安凡八郡人一時起兵殺長吏以應恩旬日之中衆數十萬呉興太守謝邈永嘉太守司馬逸嘉興公顧胤南康公謝眀慧黄門郎謝沖張琨中書郎孔道等皆為恩黨所殺邈沖皆安之弟子也時三呉承平日久民不習戰故郡縣兵皆望風奔潰恩據㑹稽自稱征東将軍逼人士為官屬號其黨曰長生人民有不與之同者戮及嬰孩死者什七八醢諸縣令以食其妻子不肯食者輒支解之所過掠財物燒邑屋焚倉廪刋木堙井相帥聚於㑹稽婦人有嬰兒不能去者投於水中曰賀汝先登僊堂我當尋後就汝恩表㑹稽王道子及世子元顯之罪請誅之自帝即位以來内外乖異石頭以南皆為荆江所據以西皆豫州所專京口及江北皆劉牢之及廣陵相髙雅之所制朝政所行惟三呉而已及孫恩作亂八郡皆為恩有畿内諸縣盜賊處處蠭起恩黨亦有潜伏在建康者人情危懼常慮竊發於是内外戒嚴加道子黄鉞元顯領中軍将軍命徐州刺史謝琰兼督呉興義興軍事以討恩劉牢之亦發兵討恩拜表輒行冬十二月謝琰撃斬許允之迎魏隠還郡進撃丘尫破之與劉牢之轉鬬而前所向輒克琰留屯烏程遣司馬髙素助牢之進臨浙江詔以牢之都督呉都諸軍事牢之引劉裕為參軍事使将數十人覘賊遇賊數千人即迎擊之從者皆死裕墜岸下賊臨岸欲下裕奮長刀仰斫殺數人乃得登岸仍大呼逐之賊皆走裕所殺傷甚衆劉敬宣怪裕久不返引兵尋之見裕獨驅數千人咸共歎息因進擊賊大破之斬獲千餘人初恩聞八郡響應謂其屬曰天下無復事矣當與諸君朝服至建康既而聞牢之臨江曰吾割浙江以東不失作句踐戊申牢之引兵濟江恩聞之曰孤不羞走遂驅男女二十餘萬户東走多棄寶物子女於道官軍競取之恩由是得脫復逃入海島髙素破恩黨於山隂斬恩所署呉郡太守陸瓌吴興太守丘尫餘姚令吴興沈穆夫東土遭亂企望官軍之至既而牢之等縱軍士暴掠士民失望郡縣城中無復人跡月餘乃稍有還者朝廷憂恩復至以謝琰為㑹稽太守都督五郡軍事帥徐州文武戍海浦四年夏五月謝琰以資望鎮㑹稽不能綏懐又不為武僃諸将咸諌曰賊近在海浦伺人形便宜開其自新之路琰不從曰符堅之衆百萬尚送死淮南孫恩小賊敗死入海何能復出若其果出是天欲殺之也既而恩㓂浹口入餘姚破上虞進及邢浦琰遣參軍劉宣之擊破之恩退走少日復㓂邢浦官軍失利恩乗勝徑進己夘至㑹稽琰尚未食曰要當先滅此賊而後食因跨馬出戰兵敗為帳下都督張猛所殺吴興太守庾桓恐郡民復應恩殺男女數千人恩轉㓂臨海朝廷大震遣冠軍将軍桓不才輔國将軍孫無終寧朔将軍髙雅之拒之冬十一月髙雅之與孫恩戰於餘姚雅之敗走山隂死者什七八詔以劉牢之都督㑹稽等五郡帥衆撃恩恩走入海牢之東屯上虞使劉裕戍句章呉國内史袁崧築滬瀆壘以僃恩五年春二月丙子孫恩出浹口攻句章不能拔劉牢之擊之恩復走入海三月孫恩北趣海鹽劉裕隨而拒之築城於海鹽故治恩日來攻城裕屢擊破之斬其将姚盛城中兵少不敵裕夜偃旗匿衆眀晨開門使羸疾數人登城賊遥問劉裕所在曰夜已走矣賊信之爭入城裕奮擊大破之恩知城不可拔乃進向滬瀆裕復棄城追之海鹽令鮑陋遣子嗣之帥呉兵一千請為前驅裕曰賊兵甚精吴人不習戰若前驅失利必敗我軍可在後為聲埶嗣之不從裕乃多伏旗鼓前驅既交諸伏皆出裕舉旗鳴鼓賊以為四面有軍乃退嗣之追之戰沒裕且戰且退所領死傷且盡至向戰處令左右脫取死人衣以示閑暇賊疑之不敢逼裕大呼更戰賊懼而退裕乃引歸夏五月孫恩䧟滬瀆殺呉國内史袁崧死者四千人六月甲戌孫恩浮海奄至丹徒戰士十餘萬樓船千餘艘建康震駭乙亥内外戒嚴百官入居省内冠軍将軍髙素等守石頭輔國将軍劉襲柵斷淮口丹陽尹司馬恢之戍南岸冠軍将軍桓謙等僃白石左衛将軍王嘏等屯中堂徴豫州刺史譙王尚之入衛京師劉牢之自山隂引兵邀撃恩未至而恩已過乃使劉裕自海鹽入援裕兵不滿千人倍道兼行與恩俱至丹徒裕衆既少加以渉逺疲勞而丹徒守軍莫有鬬志恩帥衆鼔譟登蒜山居民皆荷擔而立裕帥所領奔擊大破之投崖赴水死者甚衆恩狼狽僅得還船然恩猶恃其衆尋復整兵徑向京師後將軍元顯帥兵拒戰頻不利㑹稽王道子無佗謀略唯日禱蒋侯廟恩來漸近百姓忷懼譙王尚之帥精銳馳至徑屯積弩堂恩樓船髙大泝風不得疾行數日乃至白石恩本以諸軍分散欲掩不僃既而知尚之在建康復聞劉牢之已還至新洲不敢進而去浮海北走郁洲恩别将攻䧟廣陵殺三千人寧朔将軍髙雅之擊恩於郁洲為恩所執秋八月詔以劉裕為下邳太守討孫恩於郁洲累戰大破之恩由是衰弱復縁海南走裕亦隨而邀擊之冬十一月劉裕追孫恩至滬瀆海鹽又破之俘斬以萬數恩遂自浹口逺竄入海元興元年春三月孫恩㓂臨海臨海太守辛景擊破之恩所虜三吴男女死亡殆盡恩恐為官軍所獲乃赴海死其黨及妓妾從死者以百數謂之水僊餘衆數千人復推恩妹夫盧循為主循諶之曽孫也神采清秀雅有材藝少時沙門惠逺嘗謂之曰君雖體渉風素而志存不軌如何太尉玄欲撫安東土乃以循為永嘉太守循雖受命而宼㬥不已夏五月盧循自臨海入東陽太尉桓玄遣撫軍中兵參軍劉裕将兵擊之循敗走永嘉二年春正月盧循使司馬徐道覆㓂東陽二月辛丑建武将軍劉裕擊破之道覆循之姊夫也秋八月劉裕破盧循於永嘉追至晉安屢破之循浮海南走三年盧循宼南海攻番禺廣州刺史濮陽吴隠之拒守百餘日冬十月壬戍循夜襲城而䧟之燒府舍民室俱盡執吴隠之循自稱平南将軍攝廣州事聚燒骨為共冡葬於洲上得髑髏三萬餘枚又使徐道覆攻始興執始興相阮腆之義熈元年盧循遣使貢獻時朝廷新定未暇征討夏四月壬申以循為廣州刺史徐道覆為始興相循遺劉裕益智粽裕報以續命湯循以前琅邪内史王誕為平南長史誕說循曰誕本非戎旅在此無用素為劉鎮軍所厚若得北歸必䝉寄任公私際㑹仰荅厚恩循甚然之劉裕與循書令遣呉隠之還循不從誕復說循曰将軍今留呉公公私非計孫伯符豈不欲留華子魚邪但以一境不容二君耳於是循遣隠之與誕俱還六年初徐道覆聞劉裕北伐勸盧循乗虚襲建康循不從道覆自至番禺說循曰本住嶺外豈以理極於此傳之子孫邪正以劉裕難與為敵故也今裕頓兵堅城之下未有還期我以此思歸死士掩擊何劉之徒如反掌耳不乗此機而茍求一日之安朝廷常以君為腹心之疾若裕平齊之後息甲歲餘以璽書徴君裕自将屯豫章遣諸将帥銳師過嶺雖復以将軍之神武恐必不能當也今日之機萬不可失若先克建康傾其根蔕裕雖南還無能為也君若不同便當帥始興之衆直指尋陽循甚不樂此舉而無以奪其計乃從之初道覆使人伐船材於南康山至始興賤賣之居人爭市之船材大積而人不疑至是悉取以裝艦旬日而辦循自始興㓂長沙道覆㓂南康廬陵豫章諸守相皆委任奔走道覆順流而下舟檝甚盛時克燕之問未至朝廷急徴劉裕裕方議留鎮下邳經營司雍㑹得詔書乃以韓範為都督八郡軍事燕郡太守封融為勃海太守檀韶為琅邪太守戊申引兵還韶祗之兄也久之劉穆之稱範融謀反皆殺之安成忠肅公何無忌自尋陽引兵拒盧循長史鄧潜之諫曰國家安危在此一舉聞循兵艦大盛埶居上流宜决南塘守城以待之彼必不敢捨我逺下蓄力養銳俟其疲老然後擊之此萬全之䇿也今决成敗於一戰萬一失利悔将無及參軍殷闡曰循所将之衆皆三吴舊賊百戰餘勇始興溪子拳㨗善鬬未易輕也将軍宜留屯豫章徴兵屬城兵至合戰未為晚也若以此衆輕進殆必有悔無忌不聴三月壬申與徐道覆遇於豫章賊令彊弩數百登西岸小山邀射之㑹西風㬥急飄無忌所乗小艦向東岸賊乗風以大艦逼之衆遂奔潰無忌厲聲曰取我蘇武節來節至執以督戰賊衆雲集無忌辭色無撓握節而死於是中外震駭朝議欲奉乗輿北走就劉裕既而知賊未至乃止劉裕至下邳以船載輜重自帥精銳歩歸至山陽聞何無忌敗死慮京邑失守卷甲兼行與數十人至淮上問行人以朝廷消息行人曰賊尚未至劉公若還便無所憂裕大喜将濟江風急衆咸難之裕曰若天命助國風當自息若其不然覆溺何害即命登舟舟移而風止過江至京口衆乃大安夏四月癸未裕至建康以江州覆沒表送章綬詔不許青州刺史諸葛長民兖州刺史劉藩并州刺史劉道憐各将兵入衛建康藩豫州刺史毅之從弟也毅聞盧循入宼将拒之而疾作既瘳将行劉裕遺毅書曰吾往習擊妖賊曉其變態賊新獲姦利其鋒不可輕今脩船垂畢當與弟同舉克平之日上流之任皆以相委又遣劉藩往諭止之毅怒謂藩曰往以一時之功相推耳汝便謂我真不及劉裕邪投書於地帥舟師二萬發姑孰循之初入㓂也使徐道覆向尋陽循自将攻湘中諸郡荆州刺史劉道規遣軍逆戰敗於長沙循進至巴陵将向江陵徐道覆聞毅将至馳使報循曰毅兵甚盛成敗之事係之於此宜并力摧之若此克㨗江陵不足憂也循即日發巴陵與道覆合兵而下五月戊午毅與循戰于桑落洲毅兵大敗棄船以數百人歩走餘衆皆為循所虜所棄輜重山積初循至尋陽聞裕已還猶不信既破毅乃得審問與其黨相視失色循欲退還尋陽攻取江陵據二州以抗朝廷道復謂宜乗勝徑進固爭之循猶豫累日乃從之己未大赦裕募人為兵賞之同京口赴義之科發民治石頭城議者謂宜分兵守諸津要裕曰賊衆我寡若分兵屯守則測人虗實且一處失利則沮三軍之心今聚衆石頭隨宜應赴既令彼無以測多少又於衆力不分若徒旅轉集徐更論之耳朝廷聞劉毅敗人情恟懼時北師始還将士多創病建康戰士不盈數千循既克二鎮戰士十餘萬舟車百里不絶樓船髙十二丈敗還者爭言其彊盛孟昶諸葛長民欲奉乗輿過江裕不聽初何無忌劉毅之南討也昶䇿其必敗已而果然至是又謂裕必不能抗循衆頗信之惟龍驤将軍東海虞丘進廷折昶等以為不然中兵參軍王仲徳言於裕曰眀公命世作輔新建大功威震六合妖賊乗虚入㓂既聞凱還自當奔潰若先自遁逃則埶同匹夫號令何以威物此謀若立請從此辭裕甚恱昶固請不已裕曰今重鎮外傾彊㓂内逼人情危駭莫有固志若一旦遷動便自土崩瓦解江北亦豈可得至設令得至不過延日月耳今兵士雖少自足一戰若其克濟則臣主同休茍厄運必至我當横尸廟門遂其由來以身許國之志不能竄伏草間茍求存活也我計决矣卿勿復言昶恚其言不行且以為必敗因請死裕怒曰卿且申一戰死復何晚昶知裕終不用其言乃抗表自陳曰臣裕北討衆並不同唯臣贊裕行計致使彊賊乗間社稷危逼臣之罪也謹引咎以謝天下封表畢仰藥而死乙丑盧循至淮口中外戒嚴琅邪王徳文都督宫城諸軍事屯中堂皇劉裕屯石頭諸将各有屯守裕子義隆始四嵗裕使諮議參軍劉粹輔之鎮京口粹毅之族弟也裕見民臨水望賊怪之以問參軍張劭劭曰若節鉞未反民奔散之不暇亦何能觀望今當無復恐耳裕謂将佐曰賊若於新亭直進其鋒不可當宜且迴避勝負之事未可量也若迴泊西岸此成禽耳徐道覆請於新亭至白石焚舟而上數道攻裕循欲以萬全為計謂道覆曰大軍未至孟昶便望風自裁以大埶言之自當計日潰亂今决勝負於一朝乾沒求利既非必克之道且殺傷士卒不如案兵待之道覆以循多疑少決乃歎曰我終為盧公所誤事必無成使我得為英雄驅馳天下不足定也裕登石頭城望循軍初見引向新亭顧左右失色既而迴泊蔡洲乃恱於是衆軍轉集裕恐循侵軼用虞丘進計伐樹栅石頭淮口修治越城築查浦藥園廷尉三壘皆以兵守之劉毅經渉蠻晉僅能自免從者饑疲死亡什七八丙寅至建康待罪裕慰勉之使知中外留事毅乞自貶詔降為後将軍盧循伏兵南岸使老弱乗舟向白石聲言悉衆自白石歩上劉裕留參軍沈林子徐赤特戍南岸斷查浦戒令堅守勿動裕及劉毅諸葛長民北出拒之林子曰妖賊此言未必有實宜深為之防裕曰石頭城險且淮栅甚固留卿在後足以守之林子穆夫之子也庚辰盧循焚查浦進至張侯橋徐赤特将擊之林子曰賊聲往白石而屢來挑戰其情可知吾衆寡不敵不如守險以待大軍赤特不從遂出戰伏兵發赤特大敗單舸奔淮北林子及将軍劉鍾據栅力戰朱齡石救之賊乃退循引精兵大上至丹陽郡裕帥諸軍馳還石頭斬徐赤特解甲久之乃出陳於南塘盧循㓂掠諸縣無所得謂徐道覆曰師老矣不如還尋陽并力取荆州據天下三分之二徐更與建康爭衡耳秋七月庚申循自蔡洲南還尋陽留其黨范崇民将五千人據南陵甲子裕使輔國将軍王仲徳廣川太守劉鍾河間内史蘭陵蒯思中軍諮議參軍孟懐玉等帥衆追循八月劉裕還東府大治水軍遣建威将軍㑹稽孫處振武将軍沈田子帥衆三千自海道襲畨禺田子林子之兄也衆皆以為海道艱逺必至為難且分撤見力非目前之急裕不從敕處曰大軍十二月之交必破妖虜卿至時先傾其巢窟使彼走無所歸也江州刺史庾恱以鄱陽太守虞丘進為前驅屢破盧循兵進據豫章絶循糧道九月劉毅固求追討盧循長史王誕宻言於劉裕曰毅既䘮敗不宜復使立功裕從之冬十月裕帥兖州刺史劉藩寧朔将軍檀韶冠軍将軍劉敬宣等南擊盧循以劉毅監太尉留府後事皆委焉癸巳裕發建康徐道覆帥衆三萬趣江陵奄至破冡時魯宗之已還襄陽追召不及人情大震或傳循已平京邑遣道覆來為刺史江漢士民感劉道規焚書之恩無復貳志道規使劉遵别為遊軍自拒道覆於豫章口前驅失利遵自外横擊大破之斬首萬餘級赴水死者殆盡道覆單舸走還湓口初道規使遵為遊軍衆咸以為彊敵在前唯患衆少不應分割見力置無用之地及破道覆卒得遊軍之力衆心乃服王仲德等聞劉裕大軍且至進攻范崇民於南陵崇民戰艦夾屯兩岸十一月劉鍾自行覘賊大霧賊鉤得其舸鍾因帥左右攻艦户賊遽閉户拒之鍾乃徐還與仲德共攻崇民崇民走盧循兵守廣州者不以海道為虞庚戌孫處乗海奄至㑹大霧四靣攻之即日拔其城處撫其舊民戮循親黨勒兵謹守分遣沈田子等擊嶺表諸郡劉裕軍雷池盧循揚聲不攻雷池當乗流徑下裕知其欲戰十二月己夘進軍大雷庚辰盧循徐道覆帥衆數萬塞江而下前後莫見舳艫之際裕悉出輕艦帥衆軍齊力擊之又分歩騎屯於西岸先僃火具裕以勁弩射循軍因風水之埶以蹙之循艦悉泊西岸岸上軍投火焚之烟炎張天循兵大敗走還尋陽将趣豫章乃悉力柵斷左里丙申裕軍至左里不得進裕麾兵将戰所執麾竿折幡沈于水衆並怪懼裕笑曰往年覆舟之戰幡竿亦折今者復然賊必破矣即攻柵而進循兵雖殊死戰弗能禁循單舸走所殺及投水死者凡萬餘人納其降附宥其逼略遣劉藩孟懐玉輕軍追之循收散卒尚有數千人徑還畨禺道覆走保始興裕板建威将軍禇裕之行廣州刺史裕之裒之曽孫也裕還建康劉毅惡劉穆之每從容與裕言穆之權太重裕益親任之七年春正月劉藩帥孟懐玉等諸将追盧循至嶺表二月壬午懐玉克始興斬徐道覆三月盧循行收兵至番禺遂圍之孫處拒守二十餘日沈田子言於劉藩曰畨禺城雖險固本賊之巢穴今循圍之或有内變且孫季髙衆力寡弱不能持久若使賊還據廣州凶埶復振矣夏四月田子引兵救畨禺擊循破之所殺萬餘人循走田子與處共追之又破循於蒼梧鬱林寧浦㑹處病不能進循奔交州初九真太守李遜作亂交州刺史交趾杜瑗討斬之瑗卒朝廷以其子慧度為交州刺史詔書未至循襲破合浦徑向交州慧度帥州府文武拒循於石碕破之循餘衆猶三千人李遜餘黨李脫等結集俚獠三千餘人以應循庚子循晨至龍編南津慧度悉散家財以賞軍士與循合戰擲雉尾炬焚其艦以歩兵夾岸射之循衆艦俱然兵衆大潰循知不免先鴆妻子召妓妾問曰誰能從我死者多云雀䑕貪生就死實難或云官尚當死某豈願生乃悉殺諸辭死者因自投于水慧度取其尸斬之并其父子及李脫等函七首送建康譙縱之亂晉安帝義熈元年初毛璩聞桓振䧟江陵帥衆三萬順流東下将討之使其弟西夷校尉瑾蜀郡太守瑗出外水參軍巴西譙縱侯暉出涪水蜀人不樂逺征暉至五城水口與巴西陽昧謀作亂縱為人和謹蜀人愛之暉昧共逼縱為主縱不可走投于水引出以兵逼縱登輿縱又投地叩頭固辭暉縳縱於輿還襲毛瑾於涪城殺之推縱為梁秦二州刺史璩至略城聞變犇還成都遣參軍王瓊将兵討之為縱弟眀子所敗死者什八九益州營户李騰開城納縱兵殺璩及弟瑗滅其家縱稱成都王以從弟洪為益州刺史以眀子為巴州刺史屯白帝於是蜀大亂漢中空虚氐王楊盛遣其兄子平南将軍撫據之二年春正月益州刺史司馬榮期擊譙眀子于白帝破之秋九月劉裕聞譙縱反遣龍驤将軍毛脩之将兵與司馬榮期文處茂時延祖共討之脩之至宕渠榮期為其參軍楊承祖所殺承祖自稱巴州刺史脩之退還白帝三年秋八月毛脩之與漢嘉太守馮遷合兵擊楊承祖斬之脩之欲進討譙縱益州刺史鮑陋不可脩之上表言人之所以重生實有生理可保臣之情地生塗已竭所以借命朝露者庻憑大威誅夷讎逆今屢有可乗之機而陋每違期不赴臣雖効死㓂庭而救援理絶将何以濟劉裕乃表襄城太守劉敬宣帥衆五千伐蜀以劉道規為征蜀都督九月譙縱稱藩于秦四年夏五月譙縱遣使稱藩於秦又與盧循潜通縱上表請桓謙於秦欲與之共擊劉裕秦王興以問謙謙曰臣之累世著恩荆楚若得因巴蜀之資順流東下士民必翕然響應興曰小水不容巨魚若縱之才力自足辦事亦不假君以為鱗翼宜自求多福遂遣之謙至成都虛懐引士縱疑之置於龍格使人守之謙泣謂諸弟曰姚主之言神矣秋七月劉敬宣既入峽遣巴東太守温祚以二千人出外水自帥益州刺史鮑陋輔國将軍文處茂龍驤将軍時延祖由墊江轉戰而前譙縱求救於秦秦王興遣平西将軍姚賞南梁州刺史王敏将兵二萬赴之敬宣軍至黄虎去成都五百里縱輔國将軍譙道福悉衆拒嶮相持六十餘日敬宣不得進食盡軍中疾疫死者太半乃引軍還敬宣坐免官削封三分之一荆州刺史劉道規以督統降號建威将軍九月劉裕以敬宣失利請遜位詔降為中軍将軍開府如故劉毅欲以重灋繩敬宣裕保䕶之何無忌謂毅曰奈何以私憾傷至公毅乃止五年春正月秦王興遣使冊拜譙縱為大都督相國蜀王加九錫承制封拜悉如王者之儀六年秋八月譙縱遣侍中譙良等入見於秦請兵以伐晉縱以桓謙為荆州刺史譙道福為梁州刺史帥衆二萬㓂荆州秦王興遣前将軍茍林帥騎兵㑹之江陵自盧循東下不得建康之問羣盜互起荆州刺史劉道規遣司馬王鎮之帥天門太守檀道濟廣武将軍彭城到彦之入援建康道濟祗之弟也鎮之至尋陽為茍林所破盧循聞之以林為南蠻校尉分兵配之使乗勝伐江陵聲言徐道覆已克建康桓謙於道召募義舊民投之者二萬人謙屯枝江林屯江津二㓂交逼江陵士民多懐異心道規乃㑹将士告之曰桓謙今在近道聞諸長者頗有去就之計吾東來文武足以濟事若欲去者本不相禁因夜開城門達曉不閉衆咸憚服莫有去者雍州刺史魯宗之帥衆數千自襄陽赴江陵或謂宗之情未可測道規單馬迎之宗之感恱道規使宗之居守委以腹心自帥諸軍攻謙諸将佐皆曰今逺出討謙其勝難必茍林近在江津伺人動靜若來攻城宗之未必能固脫有蹉跌大事去矣道規曰茍林愚懦無他竒計以吾去未逺必不敢向城吾今取謙往至便克沈疑之間已自還返謙敗則林破膽豈暇得來且宗之獨守何為不支數日乃馳往攻謙水陸齊進謙等大陳舟師兼以歩騎戰於枝江檀道濟先進䧟陳謙等大敗謙單舸奔茍林道規追斬之還至浦口討林林走道規遣諮議參軍臨淮劉遵帥衆追之初謙至枝江江陵士民皆與謙書言城内虚實欲為内應至是檢得之道規悉焚不視衆於是大安九月劉遵斬茍林于巴陵冬十一月癸丑益州刺史鮑陋卒譙道福䧟巴東殺守将温祚時延祖八年冬十一月太尉裕謀伐蜀擇元帥而難其人以西陽太守朱齡石既有武幹又練吏職欲用之衆皆以為齡石資名尚輕難當重任裕不從十二月以齡石為益州刺史帥寧朔将軍臧熹河間太守蒯恩下邳太守劉鍾等伐蜀分大軍之半二萬人以配之熹裕之妻弟位居齡石之右亦隷焉裕與齡石宻謀進取曰劉敬宣往年出黄虎無功而退賊謂我今應從外水往而料我當出其不意猶從内水來也如此必以重兵守涪城以僃内道若向黄虎正墯其計今以大衆自外水取成都疑兵出内水此制敵之竒也而慮此聲先馳賊審虚實别有凾書封付齡石署凾邉曰至白帝乃開諸軍雖進未知處分所由毛脩之固請行裕恐脩之至蜀必多所誅殺土人與毛氏有嫌亦當以死自固不許九年夏六月朱齡石等至白帝發凾書曰衆軍悉從外水取成都臧熹從中水取廣漢老弱乗髙艦十餘從内水向黄虎於是諸軍倍道兼行譙縱果命譙道福将重兵鎮涪城以僃内水齡石至平模去成都二百里縱遣秦州刺史侯暉尚書僕射譙詵帥衆萬餘屯平模夾岸築城以拒之齡石謂劉鍾曰今天時盛熱而賊嚴兵固險攻之未必可拔祗増疲困且欲養銳息兵以伺其隙何如鍾曰不然前揚聲言大衆向内水譙道福不敢捨涪城今重軍猝至出其不意侯暉之徒已破膽矣賊阻兵守險者是其懼不敢戰也因其兇懼盡銳攻之其勢必克克平模之後自可鼓行而進成都必不能守矣若緩兵相守彼将知人虚實涪軍忽來并力拒我人情既安良将又集此求戰不獲軍食無資二萬餘人悉為蜀子虜矣齡石從之諸将以水北城地險兵多欲先攻其南城齡石曰今屠南城不足以破北若盡銳以拔北城則南城不麾自散矣秋七月齡石帥諸軍急攻北城克之斬侯暉譙詵引兵迴趣南城南城自潰齡石捨船歩進譙縱大将譙撫之屯牛脾譙小茍塞打鼻臧熹擊撫之斬之小茍聞之亦潰於是縱諸營屯望風相次奔潰戊辰縱棄成都出走尚書令馬耽封府庫以待晉師壬申齡石入成都誅縱同祖之親餘皆按堵使復其業縱出成都先辭墓其女曰走必不免祗取辱焉等死死於先人之墓可也縱不從譙道福聞平模不守自涪引兵入赴縱往投之道福見縱怒曰大丈夫有如此功業而棄之将安歸乎人誰不死何怯之甚也因投縱以劒中其馬鞍縱乃去自縊死巴西人王志斬其首以送齡石道福謂其衆曰蜀之存亡實係於我不在譙王今我在猶足一戰衆皆許諾道福盡散金帛以賜衆衆受之而走道福逃於獠中巴民杜瑾執送之斬于軍門齡石徙馬耽於越嶲耽謂其徒曰朱侯不送我京師欲滅口也吾必不免乃盥洗而卧引繩而死須㬰齡石使至戮其尸詔以齡石進監梁秦州六郡諸軍事賜爵豐城縣侯吕光據姑臧晉武帝太元七年秋九月車師前部王彌寘鄯善王休宻䭾入朝于秦請為鄉導以伐西域之不服者因如漢灋置都䕶以統理之秦王堅以驍騎将軍吕光為使持節都督西域征討諸軍事與淩江将軍姜飛輕車将軍彭晃将軍杜進康盛等揔兵十萬鐡騎五千以伐西域光略陽羌酉婆樓之子也陽平公融諫曰西域荒逺得其民不可使得其地不可食漢武征之得不補失今勞師萬里之外以踵漢氏之過舉臣竊惜之不聽八年春正月秦吕光發長安以鄯善王休宻䭾車師前部王彌寘為鄉導冬十二月秦吕光行越流沙三百餘里焉耆等諸國皆降惟龜兹王帛純拒之嬰城固守光進軍攻之九年秋七月龜兹王帛純窘急重賂獪胡以求救獪胡王遣其弟呐龍侯将馗帥騎二十餘萬并引温宿尉頭等諸國兵合七十餘萬以救龜兹秦吕光與戰于城西大破之帛純出走王侯降者三十餘國光入其城城如長安市邑宫室甚盛光撫寧西域威恩甚著逺方諸國前世所不能服者皆來歸附上漢所賜節傳光皆表而易之立帛純弟震為龜兹王八月秦王堅聞吕光平西域以光為都督玉門以西諸軍事西域校尉道絶不通十年春三月吕光以龜兹饒樂欲留居之天笁沙門鳩摩羅什謂光曰此凶亡之地不足留也将軍但東歸中道自有福地可居光乃大饗将士議進止衆皆欲還乃以駝二萬餘頭載外國珍寶竒玩驅駿馬萬餘匹而還秋九月吕光自龜兹還至宜禾秦凉州刺史梁熈謀閉境拒之髙昌太守楊翰言於熈曰吕光新破西域兵彊氣銳聞中原䘮亂必有異圖河西地方萬里帶甲十萬足以自保若光出流沙其勢難敵髙梧谷口險阻之要宜先守之而奪其水彼既窮渇可以坐制如以為逺伊吾闗亦可拒也度此二阨雖有子房之䇿無所施矣熈弗聴羙水令犍為張統謂熈曰今闗中大亂京師存亡不可知吕光之來其志難測将軍何以抗之熈曰憂之未知所出統曰光智略過人今擁思歸之士乗戰勝之氣其鋒未易當也将軍世受大恩忠誠夙著立勲王室宜在今日行唐公洛上之從弟勇冠一時爲將軍計豈若奉為盟主以收衆望推忠義以帥羣豪則光雖至不敢有異心也資其精銳東兼毛興連王統楊壁合四州之衆掃兇逆寧帝室此桓文之舉也熈又弗聴殺洛于西海光聞楊翰之謀懼不敢進杜進曰梁熈文雅有餘機鑒不足終不能用翰之謀不足憂也宜及其上下離心速進以取之光從之進至髙昌楊翰以郡迎降至玉門熈移檄責光擅命還師以子胤為鷹揚将軍與振威将軍南安姚皓别駕衛翰帥衆五萬拒光于酒泉敦煌太守姚靜晉昌太守李純以郡降光光報檄凉州責熈無赴難之志而遏國家之衆遣彭晃杜進姜飛為前鋒與胤戰于安彌大破禽之於是四山胡夷皆附於光武威太守彭濟執熈以降光殺之光入姑臧自領凉州刺史表杜進為武威太守自餘将佐各受職位凉州郡縣皆降於光獨酒泉太守宋皓西郡太守索泮城守不下光攻而執之讓泮曰吾受詔平西域而梁熈絶我歸路此朝廷之罪人卿何為附之泮曰将軍受詔平西域不受詔亂凉州梁公何罪而将軍殺之泮但苦力不足不能報君父之讎耳豈肯如逆氐彭濟之所為乎主滅臣死固其常也光殺泮及皓主簿尉祐姦佞傾險與彭濟同執梁熈光寵信之祐譛殺名士姚皓等十餘人凉州人由是不恱光以祐為金城太守祐至允吾襲據其城以叛姜飛擊破之祐奔據興城十一年初張天錫之南奔也秦長水校尉王穆匿其世子大豫與俱奔河西依秃髪思復鞬思復鞬送於魏安魏安人焦松齊肅張濟等聚兵數千人迎大豫為主攻吕光昌松郡拔之執太守王世强光使輔國将軍杜進擊之進兵敗大豫進逼姑臧王穆諫曰光糧豐城固甲兵精銳逼之非利不如席卷嶺西礪兵積粟然後東向與之爭不及朞年光可取也大豫不從自號撫軍将軍凉州牧改元鳳凰以王穆為長史傳檄郡縣使穆說諭嶺西諸郡建康太守李隰祁連都尉嚴純皆起兵應之有衆三萬保據楊塢夏四月張大豫自楊塢進屯姑臧城西王穆及秃髪思復鞬子奚于帥衆三萬屯于城南吕光出擊大破之斬奚于等二萬餘級秋九月吕光得秦王堅凶問舉軍縞素謚曰文昭皇帝冬十月大赦改元太安十一月張大豫自西郡入臨洮掠民五千餘户保據俱城十二月呂光自稱使持節侍中中外大都督督隴右河西諸軍事大将軍凉州牧酒泉公十二年秋七月吕光将彭晃徐炅攻張大豫于臨洮破之大豫犇廣武王穆犇建康八月廣武人執大豫送姑臧斬之穆襲據酒泉自稱大将軍凉州牧冬十二月吕光西平太守康寧自稱匈奴王殺河湟太守强禧以叛張掖太守彭晃亦叛東結康寧西通王穆光欲自擊晃諸将皆曰今康寕在南伺釁而動若晃穆未誅康寧復至進退狼狽勢必大危光曰實如卿言然我今不往是坐待其來也若三㓂連兵東西交至則城外皆非吾有大事去矣今晃初叛與寧穆情契未宻出其倉猝取之差易耳乃自帥騎三萬倍道兼行既至攻之二旬拔其城誅晃初王穆起兵遣使招敦煌處士郭瑀瑀歎曰今民将左祍吾忍不救之邪乃與同郡索嘏起兵應穆運粟三萬石以餉之穆以瑀為太府左長史軍師将軍嘏為敦煌太守既而穆聴讒言引兵攻嘏瑀諫不聴出城大哭舉手謝城曰吾不復見汝矣還而引被覆面不與人言不食而卒吕光聞之曰二虜相攻此成擒也不可以憚屢戰之勞而失永逸之機也遂帥歩騎二萬攻酒泉克之進屯凉興穆引兵東還未至衆潰穆單騎走騂馬令郭文斬其首送之十三年吕光之定凉州也杜進功居多光以為武威太守貴寵用事羣僚莫及光甥石聦自闗中來光問之曰中州人言我為政何如聦曰但聞有杜進耳不聞有舅光由是忌進而殺之光與羣僚宴語及政事參軍京兆段業曰眀公用灋大峻光曰吴起無恩而楚彊商鞅嚴刑而秦興業曰起喪其身鞅亡其家皆殘酷之致也明公方開建大業景行堯舜猶懼不濟乃慕起鞅之為治豈此州士女所望哉光改容謝之十四年春二月吕光自稱三河王大赦改元麟嘉置百官光妻石氏子紹弟徳世自仇池來至姑臧光立石氏為妃紹為世子十九年秋七月三河王光以子覆爲都督玊門以西諸軍事西域大都䕶鎮髙昌命大臣子弟隨之二十一年夏六月三河王吕光即天王位國號大凉大赦改元龍飛僃置百官以世子紹爲太子封子弟爲公侯者二十人以中書令王詳爲尚書左僕射著作郎段業等五人爲尚書乞伏據金城晉成帝咸和四年初隴西鮮卑乞伏述延居于苑川侵并鄰部士馬彊盛及趙亡述延懼遷于麥田述延卒子傉大寒立傉大寒卒子司繁立簡文帝咸安元年秦益州刺史王統攻隴西鮮卑乞伏司繁於度堅山司繁帥騎三萬拒統于苑川統潜襲度堅山司繁部落五萬餘皆降於統其衆聞妻子已降秦不戰而潰司繁無所歸亦詣統降秦王堅以司繁為南單于留之長安以司繁從叔吐雷為勇士䕶軍撫其部衆武帝寧康元年鮮卑勃寒寇掠隴右秦王堅使乞伏司繁討之勃寒請降遂使司繁鎮勇士川太元元年乞伏司繁卒子國仁立八年秦王堅之入寇也以乞伏國仁為前将軍領先鋒騎㑹國仁叔父歩頽反於隴西堅遣國仁還討之歩頽聞之大喜迎國仁於路國仁置酒大言曰符氏疲民逞兵殆将亡矣吾當與諸君共建一方之業及堅敗國仁遂迫脅諸部有不從者擊而併之衆至十餘萬十年秋九月乞伏國仁自稱大都督大将軍單于領秦河二州牧改元建義以乙旃童渥為左相屋引出支為右相獨孤匹蹄為左輔武羣勇士為右輔弟乾歸為上将軍分其地置武城等十二郡築勇士城而都之十一年春正月南安祕宜帥羌胡五萬餘人攻乞伏國仁國仁将兵五千逆擊大破之宜奔還南安秋七月祕宜與莫侯悌眷帥其衆三萬餘户降于乞伏國仁國仁拜宜東秦州刺史悌眷梁州刺史十二年春三月秦主登以乞伏國仁為大将軍大單于苑川王夏六月苑川王國仁帥騎三萬襲鮮卑大人宻貴裕茍提倫三部于六泉秋七月與沒奕干金熈戰于渇渾川沒奕干金熈大敗三部皆降十三年夏四月苑川王國仁破鮮卑越質叱黎於平襄獲其子詰歸六月苑川王乞伏國仁卒謚曰宣烈廟號烈祖其子公府尚幼羣下推國仁弟乾歸為大都督大将軍大單于河南王大赦改元太初秋七月河南王乾歸立其妻邉氏爲王后置百官倣漢制以南川侯出連乞都爲丞相梁州刺史悌眷爲御史大夫金城邉芮爲左長史東秦州刺史祕宜爲右長史武始翟勍爲左司馬略陽王松夀爲主簿從弟軻彈爲梁州牧弟益州爲秦州牧屈眷爲河州牧九月河南王遷都金城十四年春正月秦主登以河南王乾歸爲大将軍大單于金城王夏五月金城王乾歸撃侯年部大破之於是秦凉鮮卑羌胡多附乾歸冬十一月抱罕羌彭奚念附於乾歸以奚念爲北河州刺史十五年冬十二月越質詰歸據平襄叛金城王乾歸十六年春正月金城王乾歸撃越質詰歸詰歸降乾歸以宗女妻之十八年金城王乾歸立其子熾磐為太子熾磐勇略眀决過於其父十九年春正月秦主登遣使拜金城王乾歸為左丞相河南王領秦梁益凉沙五州牧加九錫夏六月秦主登進封乾歸梁王納其妹為梁王后冬十月秦主崇為梁王乾歸所逐犇隴西王楊定定與崇共攻乾歸乾歸遣凉州牧軻彈秦州牧益州立義将軍詰歸帥騎三萬拒之大敗定兵殺定及崇斬首萬七千級乾歸於是盡有隴西之地十一月梁王乾歸自稱秦王大赦二十年春正月西秦王乾歸以太子熾磐領尚書令左長史邉芮為左僕射右長史祕宜為右僕射置官皆如魏武晉文故事然猶稱大單于大将軍邉芮等領府佐如故夏六月西秦王乾歸遷于西城二十一年越質詰歸帥户二萬叛西秦降于秦安帝隆安元年春正月凉王光以西秦王乾歸數反覆舉兵伐之乾歸羣下請東犇成紀以避之乾歸曰軍之勝敗在於巧拙不在衆寡光兵雖衆而無法其弟延勇而無謀不足憚也且其精兵盡在延所延敗光自走矣光軍于長最遣太原公纂等帥歩騎三萬攻金城乾歸帥衆二萬救之未至纂等拔金城光又遣其将梁恭等以甲卒萬餘出陽武下峽與秦州刺史沒奕干攻其東天水公延以枹罕之衆攻臨洮武始河闗皆克之乾歸使人紿延云乾歸衆潰犇成紀延欲引輕騎追之司馬耿稚諫延不從進與乾歸遇延戰死稚與将軍姜顯收散卒還屯枹罕光亦引兵還姑臧夏六月西秦王乾歸徴北河州刺史彭奚念為鎮衛将軍以鎮西将軍屋弘破光為河州牧定州刺史翟瑥為晉興太守鎮枹罕三年西秦丞相出連乞都卒冬十月以金城太守辛靜為右丞相四年春正月西秦王乾歸遷都苑川夏五月秦征西大将軍隴西公碩徳将兵五千伐西秦入自南安峽西秦王乾歸帥諸将拒之軍于隴西秋七月西秦王乾歸使武衛将軍慕兀等屯守秦軍樵采路絶秦王興潜引兵救之乾歸聞之使慕兀帥中軍二萬屯柏楊鎮軍将軍羅敦帥外軍四萬屯侯辰谷乾歸自将輕騎數千前候秦兵㑹大風昏霧與中軍相失為追騎所逼入於外軍旦與秦戰大敗走歸苑川其部衆三萬六千皆降於秦興進軍枹罕乾歸奔金城謂諸豪帥曰吾不才叨竊名號已踰一紀今敗散如此無以待敵欲西保允吾若舉國而去必不得免卿等留此各以其衆降秦以全宗族勿吾隨也皆曰死生願從陛下乾歸曰吾今将寄食於人若天未亡我庶幾異日克復舊業復與卿等相見今相隨而死無益也乃大哭而别乾歸獨引數百騎奔允吾乞降於武威王利鹿孤利鹿孤遣廣武公傉檀迎之寘於晉興待以上賓之禮鎮北将軍秃髪俱延言於利鹿孤曰乾歸本吾之屬國因亂自尊今埶窮歸命非其誠欵若逃歸姚氏必為國患不如徙置乙弗之間使不得去利鹿孤曰彼窮來歸我而逆疑其心何以勸來者俱延利鹿孤之弟也秦兵既退南羌梁戈等宻招乾歸乾歸将應之其臣屋引阿落以告晉興太守隂暢暢馳白利鹿孤利鹿孤遣其弟吐雷帥騎三千屯捫天嶺乾歸懼為利鹿孤所殺謂其太子熾磐曰吾父子居此必不為利鹿孤所容今姚氏方彊吾将歸之若盡室俱行必為追騎所及吾以汝兄弟及汝母為質彼必不疑吾在長安彼終不敢害汝也乃送熾磐等於西平八月乾歸南奔枹罕遂降於秦冬十一月乞伏乾歸至長安秦王興以為都督河南諸軍事河州刺史歸義侯久之乞伏熾磐欲逃詣乾歸武威王利鹿孤追獲之利鹿孤将殺熾磐廣武公傉檀曰子而歸父無足深責宜宥之以示大度利鹿孤從之五年春二月秦王興使乞伏乾歸還鎮苑川盡以其故部衆配之夏四月乞伏乾歸至苑川以邉芮為長史王松夀為司馬公卿将帥皆降為僚佐偏禆元興元年夏四月乞伏熾磐自西平逃歸苑川南凉王傉檀歸其妻子乞伏乾歸使熾磐入朝于秦秦主興以熾磐爲興晉太守義熈二年十一月乞伏乾歸入朝于秦三年春正月秦主興以乞伏乾歸寖彊難制留爲主客尚書以其世子熾磐行西夷校尉監其部衆四年乞伏熾磐以秦政寖衰且畏秦之攻襲冬十月招結諸部二萬餘人築城于嵻㟍山而據之冬十二月乞伏熾磐攻彭奚念於枹罕爲奚念所敗而還五年春二月乞伏熾磐入見秦太原公懿於上邽彭奚念乗虗伐之熾磐聞之怒不告懿而歸撃奚念破之遂圍枹罕乞伏乾歸從秦王興如平涼熾磐克枹罕遣人告乾歸乾歸逃還苑川夏四月乞伏乾歸如枹罕留世子熾磐鎮之收其衆得二萬徙都度堅山秋七月乞伏乾歸復即秦王位大赦改元更始公卿以下皆復本位冬十月西秦王乾歸立夫人邉氏為王后世子熾磐為太子仍命熾磐都督中外諸軍録尚書事以屋引破光為河州刺史鎮枹罕以南安焦遺為太子太師與參軍國大謀六年春三月西秦王乾歸攻秦金城郡拔之秋七月乙丑西秦王乾歸討越質屈機等十餘部降其衆二萬五千徙於苑川八月乾歸復都苑川九月西秦王乾歸攻秦略陽南安隴西諸郡皆克之徙民二萬五千戸於苑川及枹罕七年春正月秦王興以太常索稜招撫西秦西秦王乾歸遣使送所掠守宰謝罪請降興遣鴻臚拜乾歸都督隴西嶺北匈奴雜胡諸軍事征西大将軍河州牧單于河南王太子熾磐為鎮西将軍左賢王平昌公二月河南王乾歸徙鮮卑僕渾部于度堅城以子敕㪍為秦興太守以鎮之夏四月河南王乾歸徙羌句豈等部衆于疊蘭城以兄子阿柴為興國太守以鎮之五月復以子木奕干為武威太守鎮嵻㟍城秋八月河南王乾歸攻秦略陽太守姚龍於栢陽堡克之冬十一月進攻南平太守王憬於水洛城又克之徙民三千餘户於譚郊遣乞伏審䖍帥衆二萬城譚郊十二月西羌彭利髪襲據枹罕乾歸討之不克八年春正月河南王乾歸復討彭利髪利髪南走追斬之以乞伏審䖍為河州刺史鎮枹罕而還二月乾歸徙都譚郊命平昌公熾磐鎮苑川夏六月乞伏公府弑河南王乾歸并殺其諸子十餘人走保大夏平昌公熾磐遣其弟廣武将軍智達揚武将軍木奕干帥騎三千討之以其弟曇達為鎮京将軍鎮譚郊驍騎将軍婁機鎮苑川熾磐帥文武及民二萬餘户遷于枹罕秋七月乞伏智達等撃破乞伏公府於大夏公府奔疊蘭城就其弟阿柴智達等攻拔之斬阿柴父子五人公府奔嵻㟍南山追獲之并其四子轘之於譚郊八月乞伏熾磐自稱大将軍河南王大赦改元永康葬乾歸於枹罕謚曰武元王廟號髙祖九月河南王熾磐以尚書令武始翟勍為相國侍中太子詹事趙景為御史大夫罷尚書令僕射尚書六卿侍中等官十年冬十月河南王熾磐復稱秦王置百官秃髪據廣武晉安帝興寧三年冬十月鮮卑秃髪椎斤卒年一百一十子思復鞬代統其衆椎斤樹機能從弟務丸之孫也武帝太元十九年初秃髮思復鞬卒子烏孤立烏孤雄勇有大志與大将紛陁謀取凉州紛陁曰公必欲得凉州宜先務農講武禮俊賢修政刑然後可也烏孤從之三河王光遣使拜烏孤冠軍大将軍河西鮮卑大都統烏孤與其羣下謀之曰可受乎皆曰吾士馬衆多何爲屬人石真若留不對烏孤曰卿畏吕光邪石真若留曰吾本根未固小大非敵若光致死於我何以待之不如受以驕之俟釁而動蔑不克矣烏孤乃受之二十年秋七月秃髪烏孤撃乙弗折掘等諸部皆破降之築廉川堡而都之廣武趙振少好竒略聞烏孤在廉川棄家從之烏孤喜曰吾得趙生大事濟矣拜左司馬三河王光封烏孤為廣武郡公二十一年夏六月三河王吕光遣使拜秃髮烏孤為征南大将軍益州牧左賢王烏孤謂使者曰吕王諸子貪淫三甥㬥虐逺近愁怨吾安可違百姓之心受不義之爵乎吾當為帝王之事耳乃留其鼓吹羽儀謝而遣之安帝隆安元年春正月秃髪烏孤自稱大都督大将軍大單于西平王大赦改元太初治兵廣武攻凉金城克之凉王光遣将軍竇茍伐之戰于街亭凉兵大敗凉散騎常侍太常西平郭黁善天文數術國人信重之㑹熒惑守東井黁謂僕射王詳曰凉之分野将有大兵主上老病太子闇弱太原公凶悍一旦不諱禍亂必起吾二人久居内要彼常切齒将為誅首矣田胡王乞基部落最彊二苑之人多其舊衆吾欲與公舉大事推乞基為主匚苑之衆盡我有也得城之後徐更議之詳從之黁夜以二苑之衆燒洪範門使詳為内應事泄詳被誅黁遂據東苑以叛民間皆言聖人起兵事無不成從之者甚衆凉王光召太原公纂使討黁纂司馬楊統謂其從兄桓曰郭黁舉事必不虚發吾欲殺纂推兄為主西襲吕弘據張掖號令諸郡此千載一時也桓怒曰吾為吕氏臣安享其禄危不能救豈可復増其難乎吕氏若亡吾為弘演矣統至畨禾遂叛歸黁弘纂之弟也纂與西安太守石元良共撃黁大破之黁得光孫八人於東苑及敗而恚悉投於鋒上枝分節解飲其血以盟衆衆皆掩目凉人張捷宋生等招集戎夏三千人反於休屠城與黁共推凉後将軍楊軌為盟主軌略陽氐也将軍程肇諫曰卿棄龍頭而從蛇尾非計也軌不從自稱大将軍涼州牧西平公纂撃破黁将王斐于城西黁兵勢漸衰遣使請救于秃髪烏孤九月烏孤使其弟驃騎将軍利鹿孤帥騎五千赴之二年春正月楊軌以其司馬郭緯為平西相帥歩騎二萬北赴郭黁秃髪烏孤遣其弟車騎将軍傉檀帥騎一萬助軌軌至姑臧營于城北夏四月涼太原公纂將兵撃楊軌郭黁救之纂敗還六月楊軌自恃其衆欲與涼王光决戰郭黁毎以天道抑止之涼常山公弘鎮張掖叚業使沮渠男成及王徳攻之光使太原公纂将兵迎之楊軌曰吕弘精兵一萬若與光合則姑臧益彊不可取矣乃與秃髪利鹿孤共邀撃纂纂與戰大破之軌奔王乞基黁性𥚹急殘忍不為士民所附聞軌敗走降西秦西秦王乾歸以為建忠将軍散騎常侍弘引兵棄張掖東走秋九月楊軌屯廉川收集夷夏衆至萬餘王乞基謂軌曰秃髪氏才髙而兵盛且乞基之主也不如歸之軌乃遣使降於西平王烏孤軌尋為羌酋梁飢所敗西奔僊海襲乙弗鮮卑而據其地烏孤謂羣臣曰楊軌王乞基歸誠於我卿等不速救使為羌人所覆孤甚愧之平西将軍渾屯曰梁飢無經逺大略可一戰禽也飢進攻西平西平人田玄明執太守郭倖而代之以拒飢遣子為質於烏孤烏孤欲救之羣臣憚飢兵彊多以為疑左司馬趙振曰楊軌新敗吕氏方彊洪池以北未可冀也嶺南五郡庻幾可取大王若無開拓之志振不敢言若欲經營四方此機不可失也使羌得西平華夷震動非我之利也烏孤喜曰吾亦欲乗時立功安能坐守窮谷乎乃謂羣臣曰梁飢若得西平保據山河不可復制飢雖驍猛軍令不整易破也遂進撃飢大破之飢退屯龍支堡烏孤進攻拔之飢單騎奔澆河俘斬數萬以田玄眀為西平内史樂都太守田瑶湟河太守張禂澆河太守王稚皆以郡降嶺南羌胡數萬落皆附於烏孤冬十一月楊軌王乞基帥户數千自歸於西平王烏孤十二月西平王秃髪烏孤更稱武威王三年春正月武威王烏孤徙治樂都以其弟西平公利鹿孤鎮安夷廣武公傉檀鎮西平叔父素渥鎮湟河若留鎮澆河從弟替引鎮嶺南洛回鎮廉川從叔吐若留鎮浩舋夷夏俊傑隨才授任内居顯位外典郡縣咸得其宜烏孤謂羣臣曰隴右河西本數郡之地遭亂分裂至十餘國吕氏乞伏氏段氏最彊今欲取之三者何先楊統曰乞伏氏本吾之部落終當服從段氏書生無能為患且結好於我攻之不義吕光衰髦嗣子微弱纂弘雖有才而内相猜忌若使浩舋廉川乗虛迭出彼必疲於奔命不過二年兵勞民困則姑臧可圖也姑臧舉則二㓂不待攻而服矣烏孤曰善夏六月烏孤以利鹿孤為涼州牧鎮西平召車騎大将軍傉檀入錄府國事秋八月武威王秃髪烏孤醉走馬傷脅而卒遺令立長君國人立其弟利鹿孤謚烏孤曰武王廟號烈祖利鹿孤大赦徙治西平四年春正月秃髪利鹿孤大赦改元建和夏五月楊軌田玄眀謀殺武威王利鹿孤利鹿孤殺之五年春正月武威王利鹿孤欲稱帝羣臣皆勸之安國将軍鍮勿崙曰吾國自上世以來𬒳髮左祍無冠帶之飾逐水草遷徙無城郭室廬故能雄視沙漠抗衡中夏今舉大號誠順民心然建都立邑難以避患儲畜倉庫啓敵人心不如處晉民於城郭勸課農桑以供資儲帥國人以習戰射鄰國弱則乗之彊則避之此久長之良策也且虛名無實徒足為世之質的将安用之利鹿孤曰安國之言是也乃更稱河西王以廣武公傉檀為都督中外諸軍事涼州牧録尚書事夏六月河西王利鹿孤命羣臣極言得失西曹從事史暠曰陛下命将出征往無不捷然不以綏寧爲先唯以徙民為務民安土重遷故多離叛此所以斬将拔城而地不加廣也利鹿孤善之元興元年春三月河西王秃髪利鹿孤寝疾遺令以國事授弟傉檀初秃髪思復鞬愛重傉檀謂諸子曰傉檀器識非汝曹所及也故諸兄不以傳子而傳於弟利鹿孤在位垂拱而已軍國大事皆委於傉檀利鹿孤卒傉檀襲位更稱涼王改元弘昌遷于樂都諡利鹿孤曰康王是歲秦王興遣使拜秃髪傉檀為車騎将軍廣武公三年春二月南涼王傉檀畏秦之彊乃去年號罷尚書丞郎官遣參軍關尚使于秦秦主興曰車騎獻款稱藩而擅興兵造大城豈為臣之道乎尚曰王公設險以守其國先王之制也車騎僻在遐藩宻邇勍㓂葢為國家重門之防不圖陛下忽以為嫌興善之傉檀求領涼州興不許義熈二年夏六月秃髪傉檀伐沮渠蒙遜蒙遜嬰城固守傉檀至赤泉而還獻馬三千匹羊三萬口于秦秦王興以為忠以傉檀為都督河右諸軍事車騎大将軍涼州刺史鎮姑臧徴王尚還長安涼州人申屠英等遣主簿胡威詣長安請留尚興弗許威見興流涕言曰臣州奉戴王化於兹五年土宇僻逺威靈不接士民甞膽抆血共守孤城仰恃陛下聖徳俯仗良牧仁政克自保全以至今日陛下奈何乃以臣等貿馬三千匹羊三萬口賤人貴畜無乃不可若軍國須馬直煩尚書一符臣州三千餘户各輸一馬朝下夕辦何難之有昔漢武傾天下之資力開拓河西以斷匈奴右臂今陛下無故棄五郡之地忠良華族以資㬥虜豈惟臣州士民墜於塗炭恐方為聖朝旰食之憂興悔之使西平人車普馳止王尚又遣使諭傉檀㑹傉檀已帥歩騎三萬軍于五澗普先以状告之傉檀遽逼遣王尚尚出自清陽門傉檀入自涼風門别駕宗敞送尚還長安傉檀謂敞曰吾得涼州二千餘家情之所寄唯卿一人奈何捨我去乎敞曰今送舊君所以忠於殿下也傉檀曰吾新牧貴州懐逺安邇之略如何敞曰涼土雖弊形勝之地殿下恵撫其民收其賢俊以建功名其何求不獲因薦本州文武名士十餘人傉檀嘉納之王尚至長安興以為尚書傉檀燕羣僚於宣徳堂仰視歎曰古人有言作者不居居者不作信矣武威孟禕曰昔張文王始為此堂於今百年十有二主矣惟履信思順者可以久處傉檀善之秋八月秃髪傉檀以興城侯文支鎮姑臧自還樂都雖受秦爵命然其車服禮儀皆如王者冬十一月秃髪傉檀遷于姑臧三年秋七月秃髪傉檀復貳於秦遣使邀乞伏熾磐熾磐斬其使送長安九月秃髪傉檀将五萬餘人伐沮渠蒙遜䝉遜與戰於均石大破之十一月夏王勃勃帥騎二萬撃傉檀于文陽殺傷萬餘人而還傉檀帥衆追之勃勃逆撃於武陽下大破之殺傷萬計勃勃積尸而封之號曰髑髏臺四年夏五月秦王興以秃髪傉檀外内多難欲因而取之使尚書郎韋宗住覘之傉檀與宗論當世大略縱横無窮宗退歎曰竒才英噐不必華夏眀智敏識不必讀書吾乃今知九州之外五經之表復自有人也歸言於興曰涼州雖弊傉檀權譎過人未可圖也興曰劉勃勃以烏合之衆猶能破之况我舉天下之兵以加之乎宗曰不然形移埶變返覆萬端陵人者易敗戒懼者難攻傉檀之所以敗於勃勃者輕之也今我以大軍臨之彼必懼而求全臣竊觀羣臣才略無傉檀之比者雖以天威臨之亦未敢保其必勝也興不聴使其子中軍将軍廣平公弼後軍将軍歛成鎮逺将軍乞伏乾歸帥歩騎三萬襲傉檀左僕射齊難帥騎二萬討勃勃吏部尚書尹昭諫曰傉檀恃其險逺故敢違慢不若詔沮渠䝉遜及李暠討之使自相困斃不必煩中國之兵也亦不聴興遺傉檀書曰今遣齊難討勃勃恐其西逸故令弼等於河西邀之傉檀以為然遂不設僃弼濟自金城姜紀言於弼曰今王帥聲言討勃勃傉檀猶豫守僃未嚴願給輕騎五千掩其城門則山澤之民皆為吾有孤城無援可坐克也弼不從進至漠口昌松太守蘇霸閉城拒之弼遣人諭之使降霸曰汝棄信誓而伐與國吾有死而已何降之有弼進攻斬之長驅至姑臧傉檀嬰城固守出竒兵撃弼破之弼退據西苑城中人王鍾等謀為内應事泄傉檀欲追首謀者而赦其餘前軍将軍伊力延侯曰今彊㓂在外而姦人竊發於内危孰甚焉不悉阬之何以懲後傉檀從之殺五千餘人命郡縣悉散牛羊於野斂成縱兵鈔掠傉檀遣鎮北大将軍俱延鎮軍将軍敬歸等擊之秦兵大敗斬首七千餘級姚弼固壘不出傉檀攻之未克秋七月興遣衛大将軍常山公顯帥騎二萬為諸軍後繼至髙平聞弼敗倍道赴之顯遣善射者孟欽等五人挑戰於涼風門弦未及發傉檀材官将軍宋益等迎撃斬之顯乃委罪斂成遣使謝傉檀慰撫河外引兵還傉檀遣使者徐宿詣秦謝罪冬十一月秃髪傉檀復稱涼王大赦改元嘉平置百官立夫人折掘氏為皇后世子武臺為太子録尚書事左長史趙鼂右長史郭倖為尚書左右僕射昌松侯俱延為太尉蒙遜據張掖晉安帝隆安元年初張掖盧水胡沮渠羅仇匈奴沮渠王之後也世為部帥涼王光以羅仇為尚書從光伐西秦及吕延敗死羅仇弟三河太守麴粥謂羅仇曰主上荒耄信讒今軍敗将死正其猜忌智勇之時也吾兄弟必不見容與其死之無名不若勒兵向西平出苕藋奮臂一呼涼州不足定也羅仇曰誠如汝言然吾家世以忠孝著於西土寧使人負我我不忍負人也光果聴讒以敗軍之罪殺羅仇及麴粥羅仇弟子蒙遜雄傑有䇿略渉獵書史以羅仇麴粥之䘮歸葬諸部多其族姻㑹葬者凡萬餘人蒙遜哭謂衆曰吕王昏荒無道多殺不辜吾之上世虎視河西今欲與諸部雪二父之恥復上世之業何如衆咸稱萬嵗遂結盟起兵攻涼臨松郡拔之屯據金山夏五月涼王光遣太原公纂将兵撃沮渠䝉遜於忽谷破之䝉遜逃入山中蒙遜從兄男成為涼将軍聞䝉遜起兵亦合衆數千屯樂涫酒泉太守壘澄討男成兵敗澄死男成進攻建康遣使說建康太守段業曰吕氏政衰權臣擅命刑殺無常人無容處一州之地叛者相望瓦解之形昭然在目百姓嗷然無所依附府君奈何以蓋世之才欲立忠於垂亡之國男成等既唱大義欲屈府君撫臨鄙州使塗炭之餘䝉來蘇之惠何如業不從相持二旬外救不至郡人髙逵史惠等勸業從男成之請業素與凉侍中房晷僕射王詳不平懼不自安乃許之男成等推業為大都督龍驤大将軍凉州牧建康公改元神璽以男成為輔國将軍委以軍國之任䝉遜帥衆歸業業以䝉遜為鎮西将軍光命太原公纂将兵討業不克二年夏四月段業使沮渠䝉遜攻西郡執太守吕純以歸純光之弟子也於是晉昌太守王徳敦煌太守趙郡孟敏皆以郡降業業封䝉遜為臨池侯以徳為酒泉太守敏為沙州刺史六月涼常山公弘鎮張掖段業使沮渠男成及王徳攻之光使太原公纂将兵迎之弘引兵棄張掖東走段業徙治張掖将追撃弘沮渠䝉遜諫曰歸師勿遏窮㓂勿追此兵家之戒也業不從大敗而還頼蒙遜以免業城安西以其将臧莫孩為太守蒙遜曰莫孩勇而無謀知進不知退此乃為之築冡非築城也業不從莫孩尋為吕纂所破三年春二月段業即涼王位改元天璽以沮渠蒙遜為尚書左丞梁中庸為右丞五年夏四月北涼王業憚沮渠蒙遜勇略欲逺之蒙遜亦深自晦匿業以門下侍郎馬權代蒙遜為張掖太守權素豪雋為業所親重常輕侮蒙遜蒙遜譖之於業曰天下不足慮惟當憂馬權耳業遂殺權蒙遜謂沮渠男成曰段公無鑒斷之才非撥亂之主曏所憚者惟索嗣馬權今皆已死蒙遜欲除之以奉兄何如男成曰業本孤客為吾家所立恃吾兄弟猶魚之有水夫人親信我而圖之不祥䝉遜乃求為西安太守業喜其出外許之蒙遜與男成約同祭蘭門山而隂使司馬許咸告業曰男成欲以取假日為亂若求祭蘭門山臣言驗矣至期果然業收男成賜死男成曰䝉遜先與臣謀反臣以兄弟之故隠而不言今以臣在恐部衆不從故約臣祭山而返誣臣其意欲王之殺臣也乞詐言臣死㬥臣罪惡䝉遜必反臣然後奉王命而討之無不克矣業不聴殺之蒙遜泣告衆曰男成忠於段王而段王無故枉殺之諸君能為報仇乎且始者共立段王欲以安衆耳今州土紛亂非段王所能濟也男成素得衆心衆皆憤泣爭奮比至氐池衆逾一萬鎮軍将軍臧莫孩帥所部降之羌胡多起兵應䝉遜者䝉遜進壁侯塢業先疑右将軍田昻囚之至是召昻謝而赦之使與武衛将軍梁中庸共討䝉遜别将王豐孫言於業曰西平諸田世有反者昻貎恭而心險不可信也業曰吾疑之久矣但非昻無可以討䝉遜者昻至侯塢帥騎五百降於蒙遜業軍遂潰中庸亦詣䝉遜降五月蒙遜至張掖田昻兄子承愛斬關内之業左右皆散䝉遜至業謂䝉遜曰孤孑然一已為君家所推願匄餘命使得東還與妻子相見蒙遜斬之業儒素長者無他權略威禁不行羣下擅命尤信卜筮巫覡故至於敗沮渠男成之弟富占将軍俱傫帥户五百降于河西王利鹿孤傫石子之子也夏六月梁中庸等共推沮渠蒙遜為大都督大将軍涼州牧張掖公赦其境内改元永安蒙遜署從兄伏奴為張掖太守和平侯弟挐為建忠将軍都谷侯田昻為西郡太守臧莫孩為輔國将軍房晷梁中庸為左右長史張隲謝正禮為左右司馬擢任賢才文武咸恱秋九月沮渠䝉遜所部酒泉涼寧二郡叛降於西涼又聞吕隆降秦大懼遣其弟建忠將軍拏牧府長史張潜見秦隴西公碩徳於姑臧請帥其衆東遷碩徳喜拜潜張掖太守挐建康太守潜勸䝉遜東遷挐私謂䝉遜曰姑臧未拔吕氏猶存碩徳糧盡将還不能久也何為自棄土宇受制於人乎臧莫孩亦以為然䝉遜遣子奚念為質於河西王利鹿孤利鹿孤不受曰奚念年小可遣挐也冬十月䝉遜復遣使上疏於利鹿孤曰臣前遣奚念具披誠款而聖㫖未昭復徴弟挐臣竊以為茍有誠信則子不為輕若其不信則弟不為重今㓂難未夷不獲奉詔願陛下亮之利鹿孤怒遣張松侯俱延興城侯文支将騎一萬襲蒙遜至萬歲臨松執䝉遜從弟鄯善茍子虜其民六千餘户䝉遜從叔孔遮入朝于利鹿孤許以挐為質利鹿孤乃歸其所掠召俱延等還文支利鹿孤之弟也元興元年秦王興遣使拜沮渠蒙遜為鎮西将軍沙州刺史西海侯二年秋八月秦遣使者梁構至張掖䝉遜問曰秃髪傉檀為公而身為侯何也構曰傉檀凶狡欵誠未著故朝廷以重爵虛名覊縻之将軍忠貫白日當入贊帝室豈可以不信相待也聖朝爵必稱功如尹緯姚晃佐命之臣齊難徐洛一時猛将爵皆不過侯伯将軍何以先之乎昔竇融殷勤固讓不欲居舊臣之右不意将軍忽有此問蒙遜曰朝廷何不即封張掖而更逺封西海邪構曰張掖将軍已自有之所以逺授西海者欲廣大将軍之國耳䝉遜恱乃受命義熈八年冬十月沮渠䝉遜遷于姑臧十一月沮渠蒙遜即河西王位大赦改元玄始置百官如涼王光為三河王故事河西王䝉遜奉表稱藩拜涼州刺史秦滅後涼晉安帝隆安三年冬十二月涼王光疾甚立太子紹為天王自號太上皇帝以太原公纂為太尉常山公弘為司徒謂紹曰今國家多難三鄰伺隙吾没之後使纂統六軍弘管朝政汝恭已無為委重二兄庻幾可濟若内相猜忌則蕭牆之變旦夕至矣又謂纂弘曰永業才非撥亂直以立嫡有常偶居元首今外有彊㓂人心未寧汝兄弟輯睦則祚流萬世若内自相圖則禍不旋踵矣纂弘泣曰不敢又執纂手戒之曰汝性麤㬥深為吾憂善輔永業勿聴讒言是日光卒紹秘不發䘮纂排閤入哭盡哀而出紹懼以位讓之曰兄功高年長宜承大統纂曰陛下國之冡嫡臣敢奸之紹固讓纂不許驃騎将軍吕超謂紹曰纂為将積年威震内外臨䘮不哀歩高視逺必有異志宜早除之紹曰先帝言猶在耳奈何棄之吾以弱年負荷大任方頼二兄以寧家國縱其圖我我視死如歸終不忍有此意也卿勿復言纂見紹於湛露堂超執刀侍側目纂請收之紹弗許超光弟寶之子也弘密遣尚書姜紀謂纂曰主上闇弱未堪多難兄威恩素著宜為社稷計不可徇小節也纂於是夜帥壯士數百踰北城攻廣夏門弘帥東苑之衆斧洪範門左衛将軍齊從守融眀觀逆問之曰誰也衆曰太原公從曰國有大故主上新立太原公行不由道夜入禁城将為亂邪因抽劒直前斫纂中額纂左右禽之纂曰義士也勿殺紹遣虎賁中郎将吕開帥禁兵拒戰於端門吕超帥卒二千赴之衆素憚纂皆不戰而潰纂入自青角門升謙光殿紹登紫閤自殺吕超奔廣武纂憚弘兵彊以位讓弘弘曰弘以紹弟也而承大統衆心不服是以違先帝遺命而廢之慙負黄泉今復踰兄而立豈弘之本志乎纂乃使弘出告衆曰先帝臨終受詔如此羣臣皆曰茍社稷有主誰敢違者纂遂即天王位大赦改元咸寧諡光曰懿武皇帝廟號太祖諡紹曰隠王以弘為大都督督中外諸軍事大司馬車騎大将軍司隷校尉錄尚書事改封畨禾郡公纂謂齊從曰卿前斫我一何甚也從泣曰隠王先帝所立陛下雖應天順人而微心未達唯恐陛下不死何謂甚也纂賞其忠善遇之纂叔父征東将軍方鎮廣武纂遣使謂方曰超實忠臣義勇可嘉但不識國家大體權變之宜方賴其用以濟世難可以此意諭之超上疏陳謝纂復其爵位四年春三月涼王纂以大司馬弘功高地逼忌之弘亦自疑遂以東苑之兵作亂攻纂纂遣其将焦辨撃之弘衆潰出走纂縱兵大掠悉以東苑婦女賞軍弘之妻子亦在中纂笑謂羣臣曰今日之戰何如侍中房晷對曰天禍涼室憂患仍臻先帝始崩隠王廢黜山陵甫訖大司馬稱兵京師流血昆弟接刄雖弘自取夷滅亦由陛下無棠棣之恩當省已責躬以謝百姓乃更縱兵大掠囚辱士女釁自弘起百姓何罪且弘妻陛下之弟婦弘女陛下之姪也奈何使無賴小人辱為婢妾天地神眀豈忍見此遂歔欷流涕纂改容謝之召弘妻子寘於東宫厚撫之弘将奔秃髪利鹿孤道過廣武詣吕方方見之大哭曰天下甚寛汝何為至此乃執弘送獄纂遣力士康龍就拉殺之纂立妃楊氏為后以后父桓為尚書左僕射涼都尹五年涼王纂嗜酒好獵太常楊頴諫曰陛下應天受命當以道守之今疆宇日蹙﨑嶇二嶺之間陛下不兢兢夕惕以恢弘先業而沈湎遊畋不以國家為事臣竊危之纂遜辭謝之然猶不悛畨禾太守吕超擅撃鮮卑思盤思盤遣其弟乞珍訴於纂纂命超及思盤皆入朝超懼至姑臧深自結於殿中監杜尚纂見超責之曰卿恃兄弟桓桓乃敢欺吾要當斬卿天下乃定超頓首謝纂本以恐愒超實無意殺之因引超思盤及羣臣同宴於内殿超兄中領軍隆數勸纂酒纂醉乗歩輓車将超等游禁中至琨華堂東閤車不得過纂親将竇川駱騰倚劒於壁推車過閤超取劒撃纂纂下車禽超超刺纂洞胷川騰與超格戰超殺之纂后楊氏命禁兵討超杜尚止之皆捨仗不戰将軍魏益多入取纂首楊氏曰人已死如土石無所復知何忍復殘其形骸乎益多罵之遂取纂首以徇曰纂違先帝之命殺太子而自立荒淫㬥虐畨禾太守超順人心而除之以安宗廟凡我士庻同兹休慶纂叔父巴西公佗弟隴西公緯皆在北城或說緯曰超為逆亂公以介弟之親仗大義而討之姜紀焦辨在南城楊桓田誠在東苑皆吾黨也何患不濟緯嚴兵欲與佗共撃超佗妻梁氏止之曰緯超俱兄弟之子何為舍超助緯自為禍首乎佗乃謂緯曰超舉事已成據武庫擁精兵圖之甚難且吾老矣無能為也超弟邈有寵於緯說緯曰纂賊殺兄弟隆超順人心而討之正欲尊立明公耳方今明公先帝之長子當主社稷人無異望夫復何疑緯信之乃與隆超結盟單馬入城超執而殺之讓位於隆隆有難色超曰今如乗龍上天豈可中下隆遂即天王位大赦改元神鼎尊母衛氏為太后妻楊氏為后以超為都督中外諸軍事輔國大将軍錄尚書事封安定公諡纂曰靈帝纂后楊氏将出宫超恐其挾珍寶命索之楊氏曰爾兄弟不義手刃相屠我旦夕死人安用寶為超又問玉璽所在楊氏曰已毁之矣后有美色超将納之謂其父右僕射桓曰后若自殺禍及卿宗桓以告楊氏楊氏曰大人賣女與氐以圖富貴一之謂甚其可再乎遂自殺諡曰穆后桓奔河西王利鹿孤利鹿孤以為左司馬夏五月凉王隆多殺豪望以立威名内外嚻然人不自保魏安人焦朗遣使說秦隴西公碩徳曰吕氏自武皇棄世兄弟相攻政綱不立競為威虐百姓饑饉死者過半今乗其篡奪之際取之易於反掌不可失也碩徳言於秦王興帥歩騎六萬伐涼乞伏乾歸帥騎七千從之秋七月秦隴西公碩徳自金城濟河直趣廣武河西王利鹿孤攝廣武守軍以避之秦軍至姑臧涼王隆遣輔國大将軍超龍驤将軍邈等逆戰碩徳大破之生擒邈俘斬萬計隆嬰城固守巴西公佗帥東苑之衆二萬五千降於秦西涼公暠河西王利鹿孤沮渠䝉遜各遣使奉表入貢於秦初涼将姜紀降於河西王利鹿孤廣武公傉檀與論兵略甚愛重之坐則連席出則同車毎談論以夜繼晝利鹿孤謂傉檀曰姜紀信有羙才然視候非常必不久留於此不如殺之紀若入秦必為人患傉檀曰臣以布衣之交待紀紀必不相負也八月紀将數十騎奔秦軍說碩徳曰吕隆孤城無援明公以大軍臨之其勢必請降然彼徒文降而已未肯遂服也請給紀歩騎三千與王松忽因焦朗華純之衆伺其釁隙隆不足取也不然今秃髪在南兵彊國富若兼姑臧而據之威埶益盛沮渠䝉遜李暠不能抗也必将歸之如此則為國家之大敵矣碩徳乃表紀為武威太守配兵二千屯據晏然秦王興聞楊桓之賢而徴之利鹿孤不敢留閏月秦隴西公碩徳圍姑臧累月東方之人在城中者多謀外叛魏益多復誘扇之欲殺凉王隆及安定公超事發坐死者三百餘家碩徳撫納夷夏分置守宰節食聚粟為持久之計涼之羣臣請與秦連和隆不許安定公超曰今資儲内竭上下嗷嗷雖使張陳復生亦無以為䇿陛下當思權變屈伸何愛尺書單使為卑辭以退敵敵去之後修徳政以息民若卜世未窮何憂舊業之不復若天命去矣亦可以保全宗族不然坐守窮困終将何如隆乃從之九月遣使請降於秦碩徳表隆為鎮西大将軍涼州刺史建康公隆遣子弟及文武舊臣慕容筑楊頴等五十餘家入質于長安碩徳軍令嚴整秋毫不犯祭先賢禮名士西土恱之冬十二月吕超攻姜紀不克遂攻焦朗朗遣其弟子嵩為質於河西王利鹿孤以請迎利鹿孤遣車騎将軍傉檀赴之比至超已退朗閉門拒之傉檀怒将攻之鎮北将軍俱延諫曰安土重遷人之常情朗孤城無食今年不降後年自服何必多殺士卒以攻之若其不捷彼必去從他國棄州境士民以資鄰敵非計也不如以善言諭之傉檀乃與朗連和遂曜兵姑臧壁于胡阮傉檀知吕超必來斫營畜火以待之超夜遣中壘将軍王集帥精兵二千斫傉檀營傉檀徐嚴不起集入壘中内外皆舉火光照如晝縱兵擊之斬集及甲首三百餘級吕隆懼偽與傉檀通好請於苑内結盟傉檀遣俱延入盟俱延疑其有伏毁苑牆而入超伏兵撃之俱延失馬歩走淩江将軍郭祖力戰拒之俱延乃得免傉檀怒攻其昌松太守孟禕於顯美隆遣廣武将軍荀安國寧逺将軍石可帥騎五百救之安國等憚傉檀之彊遁還元興元年春正月秃髪傉檀克顯美執孟禕而責之以其不早降禕曰禕受吕氏厚恩分符守土若眀公大軍甫至望旗歸附恐獲罪於執事矣傉檀釋而禮之徙二千餘户而歸以禕為左司馬禕辭曰吕氏将亡聖朝必取河右人無愚智皆知之但禕為人守城不能全復忝顯任於心竊所未安若蒙明公之惠使得就戮姑臧死且不朽傉檀義而歸之姑臧大饑米斗直錢五千人相食饑死者十餘萬口城門晝閉樵采路絶民請出城為胡虜奴婢者日有數百吕隆惡其沮動衆心盡阬之積尸盈路沮渠䝉遜引兵攻姑臧隆遣使求救於河西王利鹿孤利鹿孤遣廣武公傉檀帥騎一萬救之未至隆擊破蒙遜軍䝉遜請與隆盟留糓萬餘斛遺之而還傉檀至昌松聞䝉遜已退乃徙涼澤段冡民五百餘户而還中散騎常侍張融言於利鹿孤曰焦朗兄弟據魏安潜通姚氏數為反覆今不取後必為朝廷憂利鹿孤遣傉檀討之朗面縳出降傉檀送于西平徙其民于樂都冬十月南涼王傉檀攻吕隆於姑臧二年秋七月南涼王傉檀及沮渠蒙遜互出兵攻吕隆隆患之秦之謀臣言於秦王興曰隆藉先世之資專制河外今雖饑窘尚能自支若將來豐贍終不為吾有涼州險絶土田饒沃不如因其危而取之興乃遣使徴吕超入侍隆念姑臧終無以自存乃因超請迎于秦興遣尚書左僕射齊難鎮西将軍姚詰左賢王乞伏乾歸鎮逺将軍趙曜帥歩騎四萬迎隆于河西南涼王傉檀攝昌松魏安二戍以避之八月齊難等至姑臧隆素車白馬迎于道旁隆勸難擊沮渠䝉遜䝉遜使臧莫孩拒之敗其前軍難乃與䝉遜結盟蒙遜遣弟挐入貢于秦難以司馬王尚行涼州刺史配兵三千鎮姑臧以将軍閻松為倉松太守郭將為畨禾太守分戍二城徙隆宗族僚屬及民萬户于長安興以隆為散騎常侍超為安定太守自餘文武隨才擢叙初郭黁常言代吕者王故其起兵先推王詳後推王乞基及隆東遷王尚卒代之黁從乞伏乾歸降秦以為滅秦者晉也遂來犇秦人追得殺之通鑑紀事本末卷第十七
