body:
  text: 契丹滅晉劉知逺復汁京附後晉高祖天福四年成德節度使安重榮出於行伍性粗率恃勇驕暴毎謂人曰今世天子兵彊馬壯則爲之耳府廨有幡竿高數十尺甞挾弓矢謂左右曰我能中竿上龍首者必有天命一發中之以是益自負帝之遣重榮代祕瓊也戒之瓊不受代當别除汝一鎭勿以力取恐爲患滋深重榮由是以帝爲怯謂人曰祕瓊匹夫耳天子尚畏之況我以將相之重士馬之衆乎毎所奏請多踰分爲執政所可否意憤憤不決乃聚亡命市戰馬有飛揚之志帝知之義武節度使皇甫遇與重榮姻家七月徙遇爲昭義節度使五年𥘉帝割鴈門之北以賂契丹由是吐谷渾皆屬契丹苦其貪虐思歸中國成德節度使安重榮復誘之於是吐谷渾帥部落千餘帳自五臺來犇契丹大怒遣使讓帝以招納叛人六年春正月丙寅帝遣供奉官張澄將兵二千索吐谷渾在并鎭忻代四州山谷者逐之使還故土成德節度使安重榮取臣契丹見契丹使者必箕踞慢罵使過其境或潛遣人殺之契丹以讓帝帝爲之遜謝六月戊午重榮執契丹使栧剌遣輕騎掠幽州南境軍於博野上表稱吐谷渾兩突厥渾契苾沙陁各帥部衆歸附党項等亦遣使納契丹告身職牒言爲虜所陵暴又言自二月以來令各具精甲壯馬將以上秋南宼恐天命不佑與之俱滅願自備十萬衆與晉共擊契丹又朔州節度副使趙崇已逐契丹節度使劉山求歸命朝廷臣相繼以聞陛下屢敇臣承奉契丹勿自起舋端其如天道人心難以違拒機不可失時不再來諸節度使没於虜庭者皆延頸企踵以待王師良可哀閔願早決計表數千言大抵斥帝父事契丹竭中國以媚無厭之虜又以此意爲書遺朝貴及移藩鎭云已勒兵必與契丹決戰帝以重榮方握彊兵不能制甚患之時鄴都留守侍衞馬歩都指揮使劉知逺在大梁㤗寧節度使桑維翰知重榮巳蓄姦謀又慮朝廷重違其意宻上䟽曰陛下免於晉陽之難而有天下皆契丹之功也不可負之今重榮恃勇輕敵吐渾假手報仇皆非國家之利不可聽也臣竊觀契丹數年以來士馬精彊吞噬四鄰戰必勝攻必取割中國之土地収中國之器械其君智勇過人其臣上下輯睦牛馬蕃息國無天災此未可與爲敵也且中國新敗士氣彫沮以當契丹乗勝之威其勢相去甚逺又和親旣絶則當發兵守塞兵少則不足以待宼兵多則饋運無以繼之我出則彼歸我歸則彼至臣恐禁衞之士疲於犇命鎭定之地無復遺民今天下粗安瘡痍未復府庫虚竭蒸民困弊静而守之猶懼不濟其可妄動乎契丹與國家恩義非輕信誓甚著彼無間隙而自啓舋端就使克之後患愈重萬一不克大事去矣議者以歳輸繒帛謂之耗蠧有所卑遜謂之屈辱殊不知兵連而不休禍結而不解財力將匱耗蠧孰甚焉用兵則武吏功臣過求姑息邊藩逺郡得以驕矜下陵上替屈辱孰大焉臣願陛下訓農習戰養兵息民俟國無内憂民有餘力然後觀舋而動則動必有成矣又鄴都冨盛國家藩屏今主帥赴闕軍府無人臣竊思慢藏誨盜之言勇夫重閉之義乞陛下略加廵幸以杜姦謀帝謂使者曰朕比日以來煩懣不決今見卿奏如醉醒矣卿勿以爲憂秋七月帝憂安重榮跋扈己巳以劉知逺爲北京留守河東節度使八月帝以詔諭安重榮曰爾身爲大臣家有老母忿不思難棄彦與親吾因契丹得天下爾因吾致冨貴吾不敢忘德爾乃忘之何邪今吾以天下臣之爾欲以一鎭抗之不亦難乎宜審思之無取後悔重榮得詔愈驕聞山南東道節度使安從進有異志隂遣使與之通謀九月帝以安重榮殺契丹使者恐其犯塞乙亥遣安國節度使楊彦珣使于契丹彦珣至其帳契丹主責以使者死狀彦珣曰譬如人家有惡子父母所不能制將如之何契丹主意乃解劉知逺遣親將郭成以詔旨說吐谷渾酋長曰承福令去安重榮歸朝廷許以節鉞威還謂知逺曰虜惟利是嗜安鐵胡止以𫀆袴賂之今欲其來莫若重賂乃可致耳知逺從之且使謂承福曰朝廷巳割爾曹隷契丹爾曹當自安部落今乃南來助安重榮爲逆重榮巳爲天下所棄朝夕敗亡爾曹宜早從化勿俟臨之以兵南北無歸悔無及矣承福懼冬十月帥其衆歸于知逺知逺處之太原東山及嵐石之間表承福領大同節度使收其精騎以隷麾下始安重榮移檄諸道云與吐谷渾韃靼契苾同起兵旣而承福降知逺逹靼契苾亦莫之赴重榮勢大沮冬十二月安重榮聞安從進舉兵反謀遂決大集境内飢民衆至數萬南向鄴都聲言入朝𥘉重榮與深州人趙彦之俱爲散指揮使相得歡甚重榮鎭成德彦之自關西歸之重榮待遇甚厚使彦之招募黨衆然心實忌之及舉兵止用爲排陣使彦之恨之帝聞重榮反壬辰遣護聖等馬歩三十九指揮擊之以天平節度使杜重威爲招討使安國節度使馬全節副之前永清節度使王周爲馬歩都虞候戊戍杜重威與安重榮遇於宗城西南重榮爲偃月陣官軍再擊之不動重威懼欲退指揮使宛丘王重胤曰兵家忌退鎭之精兵盡在中軍請公分銳士擊其左右翼重胤爲公以契丹直衝其中軍彼必狼狽重威從之鎭人陣稍却趙彦之卷旗䇿馬來降彦之以銀飾鎧胄及鞍勒官軍殺而分之重榮聞彦之叛大懼退匿於輜重中官軍從而乗之鎭人大潰斬首萬五千級重榮收餘衆走保宗城官軍進攻夜分拔之重榮以十餘騎走還鎭州嬰城自守㑹天寒鎭人戰及凍死者二萬餘人契丹聞重榮反乃聽楊彦珣還七年春正月丁巳鎭州牙將自西郭水碾門導官軍入城殺守陴民二萬人執安重榮斬之杜重威殺導者自以爲功庚申重榮首至鄴都帝命漆之函送契丹夏四月契丹以晉招納吐谷渾遣使來讓帝憂悒不知爲計五月己亥始有疾帝寢疾一旦馮道獨對帝命㓜子重睿出拜之又令宦者抱重睿置道懷中其意葢欲道輔立之六月乙丑帝殂道與天平節度使侍衞馬歩都虞候景延廣議以國家多難宜立長君乃奏廣晉尹齊王重貴爲嗣是日齊王即皇帝位延廣以爲已功始用事禁都下人毋得偶語𥘉高祖疾亟有旨召河東節度使劉知逺入輔政齊王寢之知逺由是恐齊王秋七月癸卯加景延廣同平章事兼侍衞馬歩都指揮使冬十一月庚寅葬聖文章武明德孝皇帝于顯陵廟號高祖帝之𥘉即位也大臣議奉表稱臣告哀於契丹景延廣請致書稱孫而不稱臣李崧曰屈身以爲社稷何恥之有陛下如此它日必躬擐甲胄與契丹戰於時悔無益矣延廣固爭馮道依違其間帝卒從延廣議契丹大怒遣使來責讓且言何得不先承稟遽即帝位延廣復以不遜語荅之契丹盧龍節度使趙延夀欲代晉帝中國屢說契丹擊晉契丹主頗然之齊王天福八年帝聞契丹將入宼二月已未發鄴都乙丑至東京然猶與契丹問遺相往來無虚月𥘉河陽牙將喬榮從趙延夀入契丹契丹以爲囘圖使往來販易於晉置邸大梁及契丹與晉有隙景延廣說帝囚榮於獄悉取邸中之貨凡契丹之人販易在晉境者皆殺之奪其貨大臣皆言契丹有大功於晉不可負戊子釋榮慰賜而歸之榮辭延廣延廣大言曰歸語而主先帝爲北朝所立故稱臣奉表今上乃中國所立所以降志於北朝者正以不敢忘先帝盟約故耳爲鄰稱孫足矣無稱臣之理北朝皇帝勿信趙延夀誑誘輕侮中國中國士馬爾所目覩翁怒則來戰孫有十萬横磨劒足以相待它日爲孫所敗取笑天下毋悔也榮自以亡失貨財恐歸獲罪且欲爲異時據驗乃曰公所言頗多懼有遺忘願記之紙墨延廣命吏書其語以授之榮具以白契丹主契丹主大怒入宼之志始決晉使如契丹者皆縶之幽州不得見桑維翰屢請遜辭以謝契丹毎爲延廣所沮帝以延廣爲有定䇿功故寵冠羣臣又緫宿衞兵故大臣莫能與之爭河東節度使劉知逺知延廣必致宼而畏其方用事不敢言但益募兵奏置興捷武節等十餘軍以僃契丹楊光逺之叛也密告契丹以晉主負德違盟境内大饑公私困竭乗此際攻之一舉可取趙延夀亦勸之契丹主乃集山後及盧龍兵合五萬人使延夀將之委延夀經略中國曰若得之當立汝爲帝又常指延夀謂晉人曰此汝主也延夀信之由是爲契丹盡力畫取中國之䇿朝廷頗聞其謀丙辰遣使城南樂及德清軍徴近道兵以僃之開運元年春正月乙亥邊藩馳告契丹前鋒將趙延夀趙延照將兵五萬入宼逼貝州延照思温之子也先是朝廷以貝州水陸要衝多聚芻粟爲大軍數年之儲以僃契丹軍校邵珂性凶悖永清節度使王令温黜之珂怨望宻遣人亡入契丹言貝州粟多而兵弱易取也㑹令温入朝執政以前復州防禦使吳巒權知州事巒旣至推誠撫士㑹契丹入宼巒書生無爪牙珂自請願效死巒使將兵守南門巒自守東門契丹主自攻貝州巒悉力拒之燒其攻具殆盡己卯契丹復攻城珂引契丹自南門入巒赴井死契丹遂䧟貝州所殺且萬人庚辰以歸德節度使高行周爲北面行營都部署以河陽節度使苻彦卿爲馬軍左廂排陣使以右神武統軍皇甫遇爲馬軍右廂排陳使以陜府節度使王周爲歩軍左廂排陳使以左羽林將軍潘環爲歩軍右廂排陳使太原奏契丹入鴈門關恒邢滄皆奏契丹入宼成德節度使杜威遣幕僚曹光裔往說楊光逺光逺遣光裔入奏朝廷遣使與光裔往復慰諭之陽之叛事見范帝遣使持書遺契丹契丹巳屯鄴都不得通而返壬午以侍衞馬歩都指揮使景延廣爲御營使前靜難節度使李周爲東京留守是日高行周以前軍先發時用兵方略號令皆出延廣宰相以下皆無所預延廣乗勢使氣陵侮諸將雖天子亦不能制乙酉帝發東京丁亥滑州奏契丹至黎陽戊子帝至澶州契丹主屯元城趙延夀屯南樂以延夀爲魏博節度使封魏王契丹宼太原劉知逺與白承福合兵二萬擊之甲午以知逺爲幽州道行營招討使杜威爲副使馬全節爲都虞候丙申遣右武衞上將軍張彦澤等將兵拒契丹於黎陽帝復遣譯者孟守忠致書於契丹求修舊好契丹主復書曰巳成之勢不可攺也辛丑太原奏破契丹偉王於秀容斬首三千級契丹自鴉鳴谷遁去天平節度副使知鄆州顔衎遣觀察判官竇儀奏博州刺史周儒以城降契丹又與楊光逺通使往還引契丹自馬家口濟河擒左武衞將軍蔡行遇儀謂景延廣曰虜若濟河與光逺合則河南危矣延廣然之儀薊州人也二月甲辰朔命前保義節度使石贇守麻家口前威勝節度使何重建守楊劉鎭護聖都指揮使白再榮守馬家口西京留守安彦威守河陽未幾周儒引契丹將麻荅自馬家口濟河營於東岸攻鄆州北津以應楊光逺麻荅契丹主之從弟也乙巳遣侍衞馬軍都指揮使義成節度使李守貞神武統軍皇甫遇陳州防禦使梁漢璋懷州刺史薛懷讓將兵萬人縁河水陸俱進守貞河陽漢瑋應州懷讓太原人也丙午契丹圍高行周苻彦卿及先鋒指揮使石公霸於戚城先是景延廣令諸將分地而守無得相救行周等告急延廣徐白帝帝自將救之契丹解去三將泣訴救兵之緩幾不免戊申李守貞等至馬家口契丹遣歩卒萬人築壘散騎兵於其外餘兵數萬屯河西船數十艘度兵未巳晉兵薄之契丹騎兵退走晉兵進攻其壘拔之契丹大敗乗馬赴河溺死者數千人俘斬亦數千人河西之兵慟哭而去由是不敢復東辛亥定難節度使李彛殷奏將兵四萬自麟州濟河侵契丹之境壬子以彛殷爲契丹西南靣招討使𥘉契丹主得貝州博州皆撫慰其人或拜官賜服章及敗於戚城及馬家口忿恚所得民皆殺之得軍士燔炙之由是晉人憤怒戮力爭奮楊光逺將青州兵欲西㑹契丹戊午詔石贇分兵屯鄆州以僃之詔劉知逺將部兵自土門出恒州擊契丹又詔㑹杜威馬全節於邢州知逺引兵屯樂平不進契丹僞棄元城去伏精騎於古頓丘城以俟晉軍與恒定之兵合而擊之鄴都留守張從恩屢奏虜巳遁亡大軍欲進追之㑹霖雨而止契丹設伏旬日人馬飢疲趙延壽曰晉軍悉在河上畏我鋒銳必不敢前不如即其城下四合攻之奪其浮梁則天下定矣契丹主從之三月癸酉朔自將兵十餘萬陳於澶州城北東西橫掩城之兩隅登城望之不見其際高行周前軍在戚城之南與契丹戰自午及晡互有勝負契丹主以精兵當中軍而來帝亦出陳以待之契丹主望見晉軍之盛謂左右曰楊光逺言晉兵半巳餒死今何多也以精騎左右略陳晉軍不動萬弩齊發飛矢蔽地契丹稍却又攻晉陳之東偏不克苦戰至暮兩軍死者不可勝數昏後契丹引去營於三十里之外乙亥契丹主帳中小校竊其馬亡來云契丹主巳傳木書收軍北去景延廣疑其詐閉壁不敢追契丹主自澶州北分爲兩軍一岀滄德一岀深冀而歸所過焚掠方廣千里民物殆盡留趙延照爲貝州留後麻荅䧟德州擒刺史尹居璠丁亥詔太原恒定兵各還本鎭辛卯馬全節攻契丹㤗州拔之敇天下籍郷兵毎七户共岀兵械資一卒夏四月丁未縁河廵檢使梁進以郷社兵復取德州己酉命歸德節度使高行周保義節度使王周留鎭澶州庚戍帝發澶州甲寅至大梁侍衛馬歩都指揮使天平節度使同平章事景延廣旣爲上下所惡帝亦憚其不遜難制桑維翰引其不救戚城之罪辛酉加延廣兼侍中岀爲西京留守以歸德節度使兼侍中高行周爲侍衞馬歩都指揮使延廣鬱鬱不得志見契丹彊盛始憂國破身危遂日夜縱酒朝廷因契丹入宼國用愈竭復遣使者三十六人分道括率民財各封劒以授之使者多從吏卒攜鎻械刀杖入民家小大驚懼求死無地州縣吏復因縁爲姦河南府出緡錢二十萬景延廣率三十七萬留守判官河南盧億言於延廣曰公位兼將相富貴極矣今國家不幸府庫空竭不得已取於民公何忍復因而求利爲子孫之累乎延廣慙而止先是詔以楊光逺叛命兖州修守僃泰寧節度使安審信以治樓堞爲名率民財以實私藏大理卿張仁愿爲括率使至兖州賦緡錢十萬值審信不在拘其守藏吏指取錢一囷巳滿其數丙戍詔諸州所籍郷兵號武定軍凡得七萬餘人時兵荒之餘復有此擾民不聊生丁亥鄴都留守張從恩上言趙延照雖據貝州麾下兵皆乆客思歸宜速進軍攻之詔以從恩爲貝州行營都部署督諸將擊之辛卯從恩奏趙延照縱火大掠棄城而遁屯於瀛莫阻水自固六月或謂帝曰陛下欲禦北狄安天下非桑維翰不可丙午復置樞密院以維翰爲中書令兼樞密使事無大小悉以委之數月之間朝廷差治𥘉高祖割北邊之地以賂契丹由是府州刺史折從逺亦比屬契丹欲盡徙河西之民以實遼東州人大恐從逺因保險拒之及帝與契丹絶遣使諭從逺使攻契丹從逺引兵深入拔十餘寨戊午以從逺爲府州團練使從逺雲州人也秋八月辛丑朔以河東節度使劉知逺爲北靣行營都統順國節度使杜威爲都招討使督十三節度以僃契丹桑維翰兩秉朝政岀楊光逺景延廣於外至是一制指揮節度使十五人無敢違者時人服其膽略契丹之入宼也帝再命劉知逺㑹兵山東皆後期不至帝疑之謂所親曰太原殊不助朕必有異圖果有分何不速爲之至是雖爲都統而實無臨制之權密謀大計皆不得預知逺亦知見踈但愼事自守而巳郭威見知逺有憂色謂知逺曰河東山河險固風俗尚武土多戰馬靜則勤稼穡動則習軍旅此霸王之資也何憂乎十二月契丹復大舉入宼盧龍節度使趙延夀引兵先進契丹前鋒至邢州順國節度使杜威遣使間道吿急帝欲自將拒之㑹有疾命天平節度使張從恩鄴都留守馬全節護國節度使安審琦㑹諸道兵屯邢州武寧節度使趙在禮屯鄴都契丹主以大兵繼至建牙於元氏朝廷憚契丹之威詔從恩等引兵稍却於是諸軍忷懼無復部伍委棄器甲所過焚掠比至相州不復能整二年春正月詔趙在禮還屯澶州馬全節還鄴都又遣右神武統軍張彦澤屯黎陽西京留守景延廣自滑州引兵守胡梁渡庚子張從恩奏契丹逼邢州詔滑州鄴都復進軍拒之義成節度使皇甫遇將兵趣邢州契丹宼邢洺磁三州殺掠殆盡入鄴都境壬子張從恩馬全節安審琦悉以行營兵數萬陳於相州安陽水之南皇甫遇與濮州刺史慕容彦超將數千騎前覘契丹至鄴縣將度漳水遇契丹數萬遇等且戰且却至榆林店契丹大至二將謀曰吾屬今走死無遺矣乃止布陳自午至未力戰百餘合相殺傷甚衆遇馬斃因歩戰其僕杜知敏以所乗馬授之遇乗馬復戰乆之稍解顧知敏已爲契丹所擒遇曰知敏義士不可棄也與彦超躍馬入契丹陳取知敏而還俄而契丹繼出新兵來戰二將曰吾屬勢不可走以死報國耳日且暮安陽諸將怪覘兵不還安審琦曰皇甫太師寂無聲問必爲虜所困語未卒有一騎白遇等爲虜數萬所圍審琦即引騎兵岀將救之張從恩曰此言未足信必若虜衆猥至盡吾軍恐未足以當之公往何益審琦曰成敗天也萬一不濟當共受之借使虜不南來坐失皇甫太師吾屬何顔以見天子遂踰水而進契丹望見塵起即解去遇等乃得還與諸將俱歸相州軍中皆服二將之勇彦超本吐谷渾也與劉知逺同母契丹亦引軍退其衆自相驚曰晉軍悉至矣時契丹主在邯鄲聞之即時北遁不再宿至鼔城是夕張從恩等議曰契丹傾國而來吾兵不多城中糧不支一旬萬一有姦人往告吾虚實虜悉衆圍我死無日矣不若引軍就黎陽倉南倚大河以拒之可以萬全議未決從恩引兵先發諸軍繼之擾亂失亡復如發邢州城時從恩等留歩兵五百守安陽橋夜四鼔知相州事苻彦倫謂將佐曰此夕紛紜人無固志五百弊卒安能守橋即召入棄城爲僃至曙望之契丹數萬騎巳陳於安陽水北彦倫命城上揚旌鼓譟約束契丹不測日加辰趙延壽與契丹惕隠帥衆踰水環相州而南詔右神武統軍張彦澤將兵趣相州延壽等至湯隂聞之甲寅引還馬全節等擁大軍在黎陽不敢追延壽悉陳甲騎於相州城下若將攻城狀苻彦倫曰此虜將走耳出甲卒五百陳於城北以待之契丹果引去以天平節度使張從恩權東京留守庚申振武節度使折從逺擊契丹圍勝州遂攻朔州帝疾小愈河北相繼告急帝曰此非安寢之時乃部分諸將爲行計北面副招討使馬全節等奏據降者言虜衆不多宜乗其散歸種落大舉徑襲幽州帝以爲然徴兵諸道壬戍下詔親征乙丑帝發大梁二月壬辰朔帝至滑州壬申命安審琦屯鄴都甲戍帝發滑州乙亥至潼州巳卯馬全節等諸軍以次北上劉知逺聞之曰中國疲弊自守恐不足乃横挑彊胡勝之猶有後患況不勝乎契丹自恒州還以羸兵驅牛羊過祁州城下刺史下邳沈斌出兵擊之契丹以精騎奪其門州兵不得還趙延壽知城中無餘兵引契丹急攻之斌在上延壽語曰沈使君吾之故人擇禍莫若輕何不早降斌曰侍中父子失計䧟身虜庭忍帥犬羊以殘父母之邦不自愧恥更有驕色何哉沈斌弓折矢盡寧爲國家死耳終不效公所爲明日城䧟斌自殺丙戍詔北靣行營都招討使杜威以本道兵㑹馬全節等進軍端明殿學士户部侍郎馮玉宣徽北院使權侍衞馬歩都虞候太原李彦韜皆挾恩用事惡中書令桑維翰數毀之帝欲罷維翰政事李崧劉昫固諫而止維翰請以玉爲樞密副使玉殊不平丙申中旨以玉爲户部尚書樞密使以分維翰之權彦韜少事閻寳爲僕夫後隷高祖帳下高祖自太原南下留彦韜侍帝爲腹心由是有寵性纎巧與嬖幸相結以蔽帝耳目帝委信之至於升黜將相亦得預議常謂人曰吾不知朝廷設文官何所用且欲澄汰徐當盡去之𥘉高祖置徳清徳於故澶州城及契丹入宼澶州鄴都之間城戍俱䧟議者以澶州鄴都相去百五十里宜於中塗築城以應接南北從之三月戊戍更築徳清軍城合德清南樂之民以實之乙巳杜威等諸軍㑹于定州以供奉官蕭處鈞權知祁州事庚戍諸軍攻契丹泰州刺史晉廷謙舉州降甲寅取蒲城獲契丹酋長没剌及其兵二千人乙卯取遂城趙延壽部曲有降者言契丹主還至虎北口聞晉取泰州復擁衆南向約八萬餘騎計來夕當至宜速爲僃杜威等懼丙辰退保泰州戊午契丹至泰州巳未晉軍南行契丹踵之晉軍至陽城庚申契丹大至晉軍與戰逐北十餘里契丹踰白溝而去壬戍晉軍結陳而南胡騎四合如山諸軍力戰拒之是日纔行十餘里人馬飢乏癸亥晉軍至白團衞村埋鹿角爲行寨契丹圍之數重竒兵岀寨後斷糧道是日東北風大起破屋折樹營中堀井方及水輒崩士卒取其泥帛絞而飲之人馬俱渴至曙風尤甚契丹主坐奚車中令其衆曰晉軍止此耳當盡擒之然後南取大梁命鐵鷂四靣下馬拔鹿角而入奮短兵以擊晉軍又順風縱火揚塵以助其勢軍士皆憤怒大呼曰都招討使何不用兵令士卒徒死諸將請出戰杜威曰俟風稍緩徐觀可否馬歩都監李守貞曰彼衆我寡風沙之内莫測多少惟力鬪者勝此風乃助我也若俟風止吾屬無類矣即呼曰諸軍齊擊賊又謂威曰令公善守禦守貞以中軍決死矣馬軍左廂都排陳使張彦澤召諸將問計皆曰虜得風勢宜俟風回與戰彦澤亦以爲然諸將退馬軍右廂副排陳使太原藥元福獨留謂彦澤曰今軍中飢渴已甚若俟風回吾屬巳爲虜矣敵爲我不能逆風以戰而出其不意爭擊之此兵之詭道也馬歩左右廂都排陳使苻彦卿曰與其束手就擒曷若以身徇國乃與彦澤元福及左廂都排陳使皇甫遇引精騎出西門擊之諸將繼至契丹却數百歩彦卿等謂守貞曰且曵隊往來乎直前奮擊以勝爲度乎守貞曰事勢如此安可回鞚宜長驅取勝耳彦卿等躍馬而去風勢益甚昏晦如夜彦卿等擁萬餘騎横擊契丹呼聲動天地契丹大敗而走勢如崩山李守貞亦令歩兵盡拔鹿角出鬪歩騎俱進逐北二十餘里鐡鷂旣下馬蒼黃不能復上皆委棄馬及鎧仗蔽地契丹散卒至陽城東南水上稍復布列杜威曰賊巳破膽不宜更令成列遣精騎擊之皆度水去契丹主乗奚車走十餘里追兵急獲一槖駝乗之而走諸將請急追之杜威揚言曰逢賊幸不死更索衣囊邪李守貞曰兩日人馬汗甚今得水飲皆足重難以追宼不若全軍而還乃退保定州契丹主至幽州散兵稍集以軍失利杖其酋長各數百唯趙延壽得免乙丑諸軍自定州引歸詔以泰州隷定州夏四月辛已帝發澶州甲申還大梁順國節度使杜威乆鎭恒州性貪殘自恃貴戚多不法毎以僃邊為名歛吏民錢帛以充私藏富室有珍貨或名姝駿馬皆奪取之或誣以罪殺之籍没其家又畏懦過甚毎契丹數十騎入境威巳閉門登陴或數騎驅所掠華人千百過城下威但瞋目延頸望之無意邀取由是虜無所忌憚屬城多爲所屠威竟不出一卒救之千里之間暴骨如莽村落殆盡威見所部殘弊爲衆所怨又畏契丹之彊累表請入朝帝不許威不俟報遽委鎭入朝朝廷聞之驚駭桑維翰言於帝曰威固違朝命擅離邊鎭居常慿恃勲親邀求姑息及疆塲多事曽無守禦之意宜因此時廢之庶無後患帝不悅維翰曰陛下不忍廢之宜授以近京小鎭勿復委以雄藩帝曰威朕之密親必無異志但宋國長公主切欲相見耳公勿以爲疑維翰自是不敢復言國事以足疾辭位五月丙辰威至大梁巳未杜威獻部曲歩騎合四千人并鎧仗庚申又獻粟十萬斛芻二十萬束云皆在本道帝以其所獻騎兵隷扈聖歩兵隷護國威復請以爲牙隊而禀賜皆仰縣官威又令公主白帝求天雄節鉞帝許之六月癸酉以杜威為天雄節度使契丹連歳入宼中國疲於奔命邉民塗地契丹人畜亦多死國人厭苦之述律太后謂契丹主曰使漢人爲胡主可乎曰不可太后曰然則汝何故欲爲漢主曰石氏負恩不可容太后曰汝今雖得漢地不能居也萬一蹉跌悔何所及又謂其羣下曰漢兒何得一向眠自古但聞漢和蕃不聞蕃和漢漢兒果能回意我亦何惜與和桑維翰屢勸帝復請和於契丹以紓國患帝假開封軍將張暉供奉官使奉表稱臣詣契丹卑辭謝過契丹主曰使景延廣桑維翰自來仍割鎭定兩道隷我則可和朝廷以契丹語忿謂其無和意乃止及契丹主入大梁謂李崧等曰曏使晉使再來則南北不戰矣秋八月丙寅右僕射兼中書侍郎同平章事和凝罷守本官加樞密使户部尚書馮玉中書侍郎同平章事事無大小悉以委之帝自陽城之捷謂天下無虞驕侈益甚四方貢獻珍竒皆歸内府多造器玩廣宫室崇飾後庭近朝莫之及作織錦樓以織地衣用織工數百期年乃成又賞賜優伶無度桑維翰諫曰曏者陛下親禦胡宼戰士重傷者賞不過帛數端今優人一談一笑稱旨往往賜束帛萬錢錦𫀆銀帶彼戰士見之能不觖望曰我曹冒白刃絶筋折骨曽不如一談一笑之功乎如此則士卒解體陛下誰與衞社稷乎帝不聽馮玉毎善承迎帝意由是益有寵甞有疾在家帝謂諸宰相曰自刺史以上俟馮玉出乃得除其倚任如此玉乗勢弄權四方賂遺輻湊其門由是朝政益壞九月戊申置威信軍於曹州遣侍衞馬歩都指揮使李守貞戍澶州乙卯遣彰徳節度使張彦澤戍恒州𥘉帝疾未平㑹正旦樞密使中書令桑維翰遣女僕入宫起居太后因問皇弟睿近讀書否帝聞之以告馮玉玉因譛維翰有廢立之志帝疑之李守貞素惡維翰馮玉李彦韜與守貞合謀排之以中書令行開封尹趙瑩柔而易制共薦以代維翰十二月罷維翰政事爲開封尹以瑩爲中書令李崧爲樞密使守侍中維翰遂稱足疾希復朝謁杜絶賓客或謂馮玉曰桑維翰元老今旣解其樞務縱不留之相位猶當優以大藩柰何使之尹京親猥細之務乎玉曰恐其反耳曰儒生安能反玉曰縱不自反恐其教人耳三年定州西北二百里有狼山土人築堡於山上以避胡宼堡中有佛舎尼孫深意居之以妖術惑衆言事頗驗逺近信奉之中山人孫方簡及弟行友自言深意之姪不飲酒食肉事深意甚謹深意卒方簡嗣行其術稱深意坐化嚴飾事之如生其徒日滋㑹晉與契丹絶好北邊賦役繁重宼盜充斥民不安其業方簡行友因帥郷里豪健者據寺爲寨以自保契丹入宼方簡帥衆邀擊頗獲其甲兵牛馬軍資人挈家往依之者益衆乆之至千餘家遂爲羣盗懼爲吏所討乃歸欵朝廷朝廷亦資其禦宼署東北招收指揮使方簡時入契丹境鈔掠多所殺獲旣而邀求不巳朝廷小不副其意則舉寨降於契丹請爲郷道以入宼時河北大饑民餓死者所在以萬數兖鄆滄貝之閒盜賊蠭起吏不能禁天雄節度使杜威遣元隨軍將劉延翰市馬於邊方簡執之獻於契丹延翰逃歸六月壬戍至大梁言方簡欲乗中國凶饑引契丹入宼宜爲之僃乙丑定州言契丹勒兵壓境詔以天平節度使侍衞馬歩都指揮使李守貞爲北靣行營都部署義成節度使皇甫遇副之彰德節度使張彦澤充馬軍都指揮使兼都虞候義武節度使薊人李殷充歩軍都指揮使兼都排陳使遣護聖指揮使臨清王彦超太原白延遇以部兵十營詣邢州時馬軍都指揮使鎭安節度使李彦韜方用事視守貞蔑如也守貞在外所爲事無大小彦韜必知之守貞外雖敬奉而内恨之秋七月有自幽州來者言趙延壽有意歸國樞密使李崧馮玉信之命天雄節度使杜威致書於延壽具述朝旨啖以厚利洺州軍將趙行實甞事延壽遣齎書潜往遺之延壽復書言乆處異域思歸中國乞發大軍應接拔身南去辭旨懇密朝廷欣然復遣行實詣延壽與爲期約八月李守貞言與契丹千餘騎遇於長城北轉鬪四十里斬其酋帥解里擁餘衆入水溺死者甚衆丁卯詔李守貞還屯澶州帝旣與契丹絶好數召吐谷渾酋長白承福入朝宴賜甚厚承福從帝與契丹戰澶州又與張從恩戍滑州屬歳大熱遣其部落還太原畜牧於嵐石之境部落多犯法劉知逺無所縱捨部落知朝廷微弱且畏知逺之嚴謀相與遁歸故地有白可乆者位亞承福帥所部先亡歸契丹契丹用爲雲州觀察使以誘承福知逺與郭威謀曰今天下多事置此屬於太原乃腹心之疾也不如去之承福家甚富飼馬用銀槽威勸知逺誅之收其貨以贍軍知逺密表吐谷渾反覆難保請遷於内地帝遣使發其部落千九百人分置河陽及諸州知逺遣威誘承福等入居太原城中因誣承福等五族謀叛以兵圍而殺之合四百口籍没其家貲詔襃賞之吐谷渾由是遂微九月契丹三萬宼河東壬辰劉知逺敗之於楊武谷斬首七千級張彦澤奏敗契丹於定州北又敗之於泰州斬首二千級契丹使瀛州刺史劉延祚遺樂壽監軍王巒書請舉城内附且云城中契丹兵不滿千人乞朝廷發輕兵襲之已爲内應又今秋多雨自瓦橋以北積水無際契丹主巳歸牙帳雖聞關南有變地逺阻水不能救也巒與天雄節度使兼中書令杜威屢奏瀛莫乗此可取深州刺史慕容遷獻瀛莫圖馮玉李崧信以爲然欲發大兵迎趙延壽及延祚先是侍衞馬歩都指揮使天平節度使李守貞數將兵過廣晉杜威厚待之贈金帛甲兵動以萬計守貞由是與威親善守貞入朝帝勞之曰聞卿爲將常費私財以賞戰士對曰此皆杜威盡忠於國以金帛資臣臣安敢掠有其美因言陛下若它日用兵臣願與威戮力以清沙漠帝由是亦賢之及將北征帝與馮玉李崧議以威爲元帥守貞副之趙瑩私謂馮李曰杜令國戚貴爲將相而所欲未厭心常慊慊豈可復假以兵權必若有事北方不若止任守貞爲愈也不從冬十月辛未以威爲北靣行營都招討使以守貞爲兵馬都監泰寧節度使安審琦爲左右廂都指揮使武寧節度使苻彦卿爲馬軍左廂都指揮使義成節度使皇甫遇爲馬軍右廂都指揮使永清節度使梁漢璋爲馬軍都排陳使前威勝節度使宋彦筠爲歩軍左廂都指揮使奉國左廂都指揮使王饒爲歩軍右廂都指揮使洺州團練使薛懷讓爲先鋒都指揮使仍下敇牓曰專發大軍往平黠虜先收瀛莫安定關南次復幽燕盪平塞北又曰有能擒獲虜主者除上鎭節度使賞錢萬緡絹萬匹銀萬兩時自六月積雨至是未止軍行及饋運者甚艱苦杜威李守貞㑹兵於廣晉而北行威屢使公主入奏請益兵曰今深入虜境必資衆力由是禁軍皆在其麾下而宿衞空虚十一月丁酉以李守貞權知幽州行府事已亥杜威等至瀛州城門洞啓寂若無人威等不敢進聞契丹將髙謨幹先已引兵潜岀威遣梁漢璋將二千騎追之漢璋遇契丹於南陽務敗死威等聞之引兵而南時束城等數縣請降威等焚其廬舎掠其婦女而還契丹主大舉入宼自易定趣恒州杜威等至武彊聞之將自冀貝而南彰德節度使張彦澤時在恒州引兵㑹之言契丹可破之狀威等乃復趣恒州以彦澤爲前鋒甲寅威等至中度橋契丹巳據橋彦澤帥騎爭之契丹焚橋而退晉兵與契丹夾滹沱而軍始契丹見晉軍大至又爭橋不勝恐晉軍急度滹沱與恒州合勢擊之議引兵還及聞晉軍築壘爲持乆之計遂不去杜威雖以貴戚爲上將性懦怯偏禆皆節度使但日相承迎置酒作樂罕議軍事磁州刺史兼北靣轉運使李榖說威及李守貞曰今大軍去恒州咫尺煙火相望若多以三股木置水中積薪布土其上橋可立成密約城中舉火相應夜募壯士斫虜營而入表裏合勢虜必遁逃諸將皆以爲然獨杜威不可遣榖南至懐孟督軍糧契丹以大兵當晉軍之前潜遣其將蕭翰通事劉重進將百騎及羸卒並西山出晉軍之後斷晉糧道及歸路樵采者遇之盡爲所掠有逸歸者皆稱虜衆之盛軍中忷懼翰等至欒城城中戍兵千餘人不覺其至狼狽降之契丹獲晉民黥其靣曰奉敇不殺縱之南走運夫在道遇之皆棄車驚潰翰契丹之舅也十二月丁巳朔李榖自書密奏具言大軍危急之勢請車駕幸滑州遣高行周苻彦卿扈從及發兵守澶州河陽以僃虜之犇衝遣軍將關勲走馬上之已未帝始聞大軍屯中度是夕關勲至庚申杜威奏請益兵詔悉發守宫禁者得數百人赴之又詔發河北及滑孟澤潞芻糧五十萬詣軍前督迫嚴急所在鼎沸辛酉威又遣從者張祚等來告急祚等還爲契丹所獲自是朝廷與軍前聲問兩不相通時宿衞兵皆在行營人心懔懔莫知爲計開封尹桑維翰以國家危在旦夕求見帝言事帝方在苑中調鷹辭不見又詣執政言之執政不以爲然退謂所親曰晉氏不血食矣帝欲自將北征李彦韜諫而止時苻彦卿雖任行營職事帝留之使戍荆州口壬戍詔以歸德節度使高行周爲北靣都部署以彦卿副之共戍澶州以西京留守景延廣戍河陽且張形勢奉國都指揮使王清言於杜威曰今大軍去恒州五里守此何爲營孤食盡勢將自潰請以歩卒二千爲前鋒奪橋開道公帥諸軍繼之得入恒州則無憂矣威許諾遣清與宋彦筠俱進清戰甚鋭契丹不能支勢小却諸將請以大軍繼之威不許彦筠爲契丹所敗浮水抵岸得免因退走清獨帥麾下陳於水北力戰互有殺傷屢請救於威威竟不遣一騎助之清謂其衆曰上將握兵坐觀吾輩困急而不救此有異志吾輩當以死報國耳衆感其言莫有退者至暮戰不息契丹以新兵繼之清及士衆盡死由是諸軍皆奪氣清洛州人也甲子契丹遥以兵環晉營内外斷絶軍中食且盡杜威與李守貞宋彦筠謀降契丹威潛遣腹心詣契丹牙帳邀求重賞契丹主紿之曰趙延夀威望素淺恐不能帝中國汝果降者當以汝爲之威喜遂定降計丙寅伏甲召諸將岀降表示之使署名諸將駭愕莫敢言者但唯唯聽命威遣閤門使高勲齎詣契丹契丹主賜詔慰納之是日威悉命軍士出陳於外軍士皆踊躍以爲且戰威親諭之曰今食盡塗窮當與汝曹共求生計因命釋甲軍士皆慟哭聲振原野威守貞仍於衆中揚言主上失德信任姧邪猜忌於己聞者無不切齒契丹主遣趙延壽衣赭𫀆至晉營慰撫士卒曰彼皆汝物也杜威巳下皆迎謁於馬前亦以赭袍衣威以示晉軍其實皆戲之耳以威爲太傅李守貞爲司徒威引契丹主至恒州城下諭順國節度使王周以已降之狀周亦岀降戊辰契丹主入恒州遣兵襲代州刺史王暉以城降之先是契丹屢攻易州刺史郭璘固守拒之契丹主毎過城下指而歎曰吾能吞併天下而爲此人所扼及杜威旣降契丹主遣通事耿崇美至易州誘諭其衆衆皆降璘不能制遂爲崇美所殺璘邢州人也義武節度使李殷安國留後方太皆降於契丹契丹主以孫方簡爲義武節度使麻荅爲安國節度使以客省副使馬崇柞權知恒州事契丹翰林承旨吏部尚書張礪言於契丹主曰今大遼巳得天下中國將相宜用中國人爲之不冝用北人及左右近習苟政令乖失則人心不服雖得之猶將失之契丹主不從引兵自邢相而南杜威將降兵以從遣張彦澤將二千騎先取大梁且撫安吏民以通事傅住兒爲都監杜威之降也皇甫遇𥘉不預謀契丹主欲遣遇先將兵入大梁遇辭退謂所親曰吾位爲將相敗不能死忍復圖其主乎至平棘謂從者曰吾不食累日矣何靣目復南行遂扼阬而死張彦澤倍道疾驅夜度白馬津壬申帝始聞杜威等降是夕又聞彦澤至滑州召李崧馮玉李彦韜入禁中計事欲詔劉知逺發兵入援癸酉未明彦澤自封邱門斬關而入李彦韜帥禁兵五百赴之不能遏彦澤頓兵明德門外城中大擾帝於宫中起火自携劒驅後宫十餘人將赴火爲親軍將薛超所持俄而彦澤自寛仁門傳契丹主與太后書慰撫之且召桑維翰景延廣帝乃命滅火悉開宫城門帝坐苑中與后妃相聚而泣召翰林學士范質草降表自稱孫男臣重貴禍至神惑運盡天亡今與太后及妻馮氏舉族於郊野靣縛待罪次遣男鎭寧節度使延煦威信節度使延寶奉國寳一金印三出迎太后亦上表稱新婦李氏妾傅住兒入宣契丹主命帝脱黄袍服素衫再拜受宣左右皆掩泣帝使召張彦澤欲與計事彦澤曰臣無靣目見陛下帝復召之彦澤微笑不應或勸桑維翰逃去維翰曰吾大臣逃將安之坐而俟命彦澤以帝命召維翰維翰至天街遇李崧駐馬語未畢有軍吏於馬前揖維翰赴侍衞司維翰知不免顧謂崧曰侍中當國今日國亡反令維翰死之何也崧有愧色彦澤倨坐見維翰維翰責之曰去年拔公於罪人之中復領大鎭授以兵權何乃負恩至此彦澤無以應遣兵守之宣徽使孟承誨素以佞巧有寵於帝至是帝召承誨欲與之謀承誨伏匿不至張彦澤捕而殺之彦澤縱兵大掠貧民乗之亦爭入富室殺人取其貨二日方止都城爲之一空彦澤所居寳貨山積自謂有功於契丹晝夜以酒樂自娛岀入騎從常數百人其旗幟皆題赤心爲主見者笑之軍士擒罪人至前彦澤不問所犯但瞋目竪三指即驅出斷其腰領彦澤素與閤門使高勲不恊乗醉至其家殺其叔父及弟尸諸門首士民不寒而慄中書舎人李濤謂人曰吾與其逃於溝瀆而不免不若往見之乃投刺謁彦澤曰上䟽請殺太尉人李濤謹來請死彦澤欣然接之謂濤曰舎人今日懼乎濤曰濤今日之懼亦猶足下昔年之懼也曏使高祖用濤言事安至此彦澤大笑命酒飲之濤引滿而去旁若無人年張彦天福七王周奏之帝釋而不問李濤伏閤極論其罪澤獲亡將楊洪斷其手足斬之朝義節度使甲戍張彦澤遷帝於開封府頃刻不得留宫中慟哭帝與太后皇后乗肩輿宫人宦者十餘人歩從見者流涕帝悉以内庫金珠自隨彦澤使人諷之曰契丹主至此物不可匿也帝悉歸之亦分以遺彦澤彦澤擇取其竒貨而封其餘以待契丹彦澤遣控鶴指揮使李筠以兵守帝内外不通帝姑烏氏公主賂守門者入與帝訣相持而泣歸第自經死帝與太后所上契丹主表章皆先示彦澤然後敢發帝使取内庫帛數叚主者不與曰此非帝物也又求酒於李崧崧亦辭以它故不進又欲見李彦韜彦韜亦辭不往帝惆悵乆之馮玉佞張彦澤求自送傳國寶冀契丹復任用楚國夫人丁氏延煦之母也有美色彦澤使人取之太后遲迴未與彦澤詬詈立載之去是夕彦澤殺桑維翰以帶加頸白契丹主云其自經契丹主曰吾無意殺維翰何爲如是命厚撫其家高行周苻彦卿皆詣契丹牙帳降契丹主以陽城之戰爲彦卿所敗詰之彦卿曰臣當時惟知爲晉主竭力今日死生惟命契丹主笑而釋之己卯延煦延寳自牙帳還契丹主賜帝手詔且遣解里謂帝曰孫勿憂必使汝有噉飯之所帝心稍安士衆謝恩契丹以所獻傳國寳追琢非工又不與前史相應疑其非眞以詔書詰帝使獻眞者帝奏頃王從珂自焚舊傳國寳不知所在必與之俱燼此寳先帝所爲羣臣備知臣今日焉敢匿寳乃止帝聞契丹主將度河欲與太后於前塗奉迎張彦澤先奏之契丹主不許有司又欲使帝衘璧牽羊大臣輿櫬迎於郊外先具儀注白契丹主契丹主曰吾遣竒兵直取大梁非受降也亦不許又詔晉文武羣官一切如故朝廷制度並用漢禮有司欲僃法駕迎契丹主報曰吾方擐甲揔戎太常儀衞未暇施也皆却之先是契丹主至相州即遣兵趣河陽捕景延廣延廣蒼猝無所逃伏往見契丹主於封丘契丹主詰之曰致兩主失歡皆汝所爲也十萬横磨劒安在召喬榮使相辨證事凡十條延廣𥘉不服榮以紙所記語示之乃服毎服一事輒授一籌至八籌延廣但以靣伏地請死乃鎻之丙戍晦百官宿於封禪寺後漢高祖天福十二年春正月丁亥朔百官遥辭晉主於城北乃易素服紗㡌迎契丹主伏路側請罪契丹主貂帽貂裘衷甲駐馬高阜命起攺服撫慰之左衞上將軍安叔千獨出班胡語契丹主曰汝安没字邪汝昔鎭邢州巳累表輸誠我不忘也叔千拜謝呼躍而退晉主與太后巳下迎於封丘門外契丹主辭不見契丹主入門民皆驚呼而走契丹主登城樓遣通事諭之曰我亦人也汝曹勿懼㑹當使汝曹蘇息我無心南來漢兵引我至此耳至明德門下馬拜而後入宫以其樞密副使劉密權開封尹事日暮契丹主復岀屯於赤岡高勲訴張彦澤殺其家人於契丹主契丹主亦怒彦澤剽掠京城并傅住兒鎻之以彦澤之罪宣示百官問應死否皆言應死百姓亦投牒爭䟽彦澤罪己丑斬彦澤住兒於北市仍命高勲監刑彦澤前所殺士大夫子孫皆絰杖號哭隨而詬詈以杖扑之勲命斷腕出鎻剖其心以祭死者市人爭破其腦取髓臠其肉而食之契丹送景延廣歸其國庚寅宿陳橋夜伺守者稍怠扼吭而死辛卯契丹以晉主爲負義侯置於黄龍府黃龍府即慕容氏和龍城也契丹主使謂李太后曰聞重貴不用母命以至於此可求自便勿與俱行太后曰重貴事妾甚謹所以失者違先君之志失兩國之歡耳今幸蒙大恩全生保家母不隨子欲何所歸癸巳契丹遷晉主及其家人於封禪寺遣大同節度使兼侍中河内崔廷勲以兵守之契丹主數遣使存問晉主毎聞使至舉家憂恐時雨雪連旬外無供億上下凍餒太后使人謂寺僧曰吾甞於此飯僧數萬今日獨無一人相念邪僧辭以虜意難測不敢獻食晉主隂祈守者乃稍得食是日契丹主自赤岡引兵入宫都城諸門及宫禁門皆以契丹守衛晝夜不釋兵仗磔犬於門以竿懸羊皮於庭爲厭勝契丹主謂晉羣臣曰自今不修甲兵不市戰馬輕賦省役天下太平矣廢東京降開封府爲汴州尹爲防禦使乙未契丹主攺服中國衣冠百官起居皆如舊制趙延夀張礪共薦李崧之才㑹威勝節度使馮道自鄧州入朝契丹主素聞二人名皆禮重之未幾以崧爲太子太師充樞密使道守太傅於樞密院祇候以僃顧問契丹主分遣使者以詔書賜晉之藩鎭晉之藩鎭爭上表稱臣𬒳召者無不犇馳而至惟彰義節度使史匡威據涇州不受命匡威建瑭之子也雄武節度使何重建斬契丹使者以秦成階三州降蜀𥘉杜重威旣以晉軍降契丹契丹主悉收其鎧仗數百萬貯恒州驅馬數萬歸其國遣重威將其衆從巳而南及河契丹主以晉兵之衆恐其爲變欲悉以胡騎擁而納之河流或諫曰晉兵在它所者尚多彼聞降者盡死必皆拒命爲患不若且撫之徐思其䇿契丹主乃使重威以其衆屯陳橋㑹乆雪官無所給士卒凍餒咸怨重威相聚而泣重威毎岀道旁人皆罵之契丹主猶欲誅晉兵趙延壽言於契丹主曰皇帝親冒矢石以取晉國欲自有之乎將爲它人取之乎契丹主變色曰朕舉國南征五年不解甲僅能得之豈爲它人乎延壽曰晉國南有唐西有蜀常爲仇敵皇帝亦知之乎曰知之延壽曰晉國東自沂密西及秦鳯延袤數千里邊於吳蜀常以兵戍之南方暑濕上國之人不能居也它日車駕北歸以晉國如此之大無兵守之吳蜀必相與乗虚入宼如此豈非爲它人取之乎契丹主曰我不知也然則柰何延壽曰陳橋降卒可分以戍南邊則吳蜀不能爲患矣契丹主曰吾昔在上黨失於斷割悉以唐兵授晉旣而返爲仇讎北向與吾戰辛勤累年僅能勝之今幸入吾手不因此時悉除之豈可復留以爲後患乎延壽曰曏留晉兵於河南不質其妻子故有此憂今若悉徙其家於恒定雲朔之間毎歳分畨使戍南邊何憂其爲變哉此上䇿也契丹主悅曰善惟大王所以處之由是陳橋兵始得免分遣還營癸卯晉主與李太后安太妃馮后及弟睿子延煦延寳俱北遷後宫左右從者百餘人契丹遣三百騎援送之又遣晉中書令趙瑩樞宻使馮玉馬軍都指揮使李彦韜與之俱晉主在塗供饋不繼或時與太后俱絶食舊臣無敢進謁者獨磁州刺史李榖迎謁於路相對泣下榖曰臣無狀負陛下因傾貲以獻晉主至中度橋見杜重威寨歎曰天乎我家何負爲此賊所破慟哭而去契丹主以前燕京留守劉晞爲西京留守永康王兀欲之弟留珪爲義成節度使族人郎伍爲鎭寧節度使兀欲姊壻潘聿撚爲横海節度使趙延夀之子匡賛爲護國節度使漢將張彦超爲雄武節度使史佺爲彰義節度使客省副使劉晏僧爲忠武節度使前護國節度使侯益爲鳯翔節度使權知鳯翔府事焦繼勲爲保大節度使晞涿州人也旣而何重建附蜀史匡威不受代契丹勢稍沮晉主之絶契丹也匡國節度使劉繼勲爲宣徽北院使頗預其謀契丹主入汴繼勲入朝契丹主責之時馮道在殿上繼勲急指道曰馮道爲首相與景延廣實爲此謀臣位卑安敢發言契丹主曰此叟非多事者勿妄引之命鎻繼勲將送黃龍府趙在禮至洛陽謂人曰契丹主甞言莊宗之亂由我所致我此行良可憂契丹遣契丹將述軋奚王拽剌勃海將高謨翰戍洛陽在禮入謁拜於庭下拽剌等皆踞坐受之乙卯在禮至鄭州聞繼勲𬒳鎻大驚夜自經於馬櫪間契丹主聞在禮死乃釋繼勲繼勲憂憤而卒劉晞在契丹甞爲樞密使同平章事至洛陽詬奚王曰趙在禮漢家大臣爾北方一酋長耳安得慢之如此立於庭下以挫之由是洛人稍安契丹主廣受四方貢獻大縱酒作樂毎謂晉臣曰中國事我皆知之吾國事汝曹弗知也趙延壽請給上國兵廩食契丹主曰吾國無此法乃縱胡騎四岀以收馬爲名分畨剽掠謂之打草榖丁壯斃於鋒刃老弱委以溝壑自東西兩畿及鄭滑曹濮數百里間財畜殆盡契丹主謂判三司劉昫曰契丹兵三十萬旣平晉國應有優賜速宜營辦時府庫空竭昫不知所岀請括借都城士民錢帛自將相以下皆不免又分遣使者數十人詣諸州括借皆迫以嚴誅人不聊生其實無所頒給皆蓄之内庫欲輦歸其國於是内外怨憤始患苦契丹皆思逐之矣𥘉晉主與河東節度使中書令北平王劉知逺相猜忌雖以爲北靣行營都統徒尊以虚名而諸軍進止實不得預聞知逺因之廣募士卒陽城之戰諸軍散卒歸之者數千人又得吐谷渾財畜由是河東富彊冠諸鎭歩騎至五萬人晉主與契丹結怨知逺知其必危而未甞論諫契丹屢深入知逺𥘉無邀遮入援之志及聞契丹入汴知逺分兵守四境以防侵軼遣客將安陽王峻奉三表詣契丹主一賀入汴二以太原夷夏雜居戍兵所聚未敢離鎭三以應有貢物值契丹將劉九一軍自土門西入屯於南川城中憂懼俟召還此軍道路始通可以入貢契丹主賜詔襃美及進畫親加兒字於知逺姓名之上仍賜以木柺胡法優禮大臣則賜之如漢賜几杖之比惟偉王以叔父之尊得之知逺又遣北都副留守太原白文珂入獻竒繒名馬契丹主知知逺觀望不至及文珂還使謂知逺曰汝不事南朝又不事北朝意欲何所俟邪蕃漢孔目官郭威言於知逺曰虜恨我深矣王峻言契丹貪殘失人心必不能乆有中國或勸知逺舉兵進取知逺曰用兵有緩有急當隨時制宜今契丹新降晉軍十萬虎據京邑未有它變豈可輕動哉且觀其所利止於貨財貨財旣足必將北去況冰雪巳消勢難乆留宜待其去然後取之可以萬全昭義節度使張從恩以地迫懐洛欲入朝於契丹遣使謀於知逺知逺曰我以一隅之地安敢抗天下之大君宜先行我當繼往從恩以爲然判官高防諫曰公晉室懿親不可輕變臣節從恩不從左驍衞大將軍王守恩與從恩姻家時在上黨從恩以副使趙行遷知留後牒守恩權巡檢使與高防佐之遂行守恩建立之子也契丹主召晉百官悉集於庭問曰吾國廣大方數萬里有君長二十七人今中國之俗異於吾國吾欲擇一人君之如何皆曰天無二日夷夏之心皆願推戴皇帝如是者再契丹主乃曰汝曹旣欲君我今兹所行何事爲先對曰王者𥘉有天下應大赦三月丁巳朔契丹主服通天冠絳紗𫀆登正殿設樂懸儀衛於庭百官朝賀華人皆法服胡人仍胡服立於文武班中間下制稱大遼㑹同十年大赦仍云自今節度使刺史毋得置牙兵市戰馬趙延壽以契丹主負約心怏怏令李崧言於契丹主曰漢天子所不敢望乞爲皇太子崧不得已爲言之契丹主曰我於燕王雖割吾肉有用於燕王吾無所愛然吾聞皇太子當以天子兒爲之豈燕王所可爲也因令爲燕王遷官時契丹以恒州爲中京翰林承旨張礪奏擬燕王中京留守大丞相録尚書事都督中外諸軍事樞密使如故契丹主取筆塗去録尚書事都督中外諸軍事而行之劉知逺聞何重建降蜀歎曰戎狄慿陵中原無主令藩鎭外附吾爲方伯良可愧也於是將佐勸知逺稱尊號以號令四方觀諸侯去就知逺不許聞晉主北遷聲言欲出兵井陘迎歸晉陽丁卯命武節都指揮使榮澤史弘肇集諸軍於毬場告以出師之期軍士皆曰今契丹䧟京城執天子天下無主主天下者非我王而誰宜先正位號然後出師爭呼萬歳不巳知逺曰虜勢尚彊吾軍威未振當且建功業士卒何知命左右遏止之己巳行軍司馬潞城張彦威等三上牋勸進知逺疑未決郭威與都押牙冠氏楊邠入說知逺曰今逺近之心不謀而同此天意也王不乗此際取之謙讓不居恐人心且移移則反受其咎知逺從之契丹以其將劉愿爲保義節度副使陜人苦其暴虐奉國都頭王晏與指揮使趙暉都頭侯章謀曰今胡虜亂華乃吾屬奮發之秋河東劉公威德逺著吾輩若殺愿舉陜城歸之爲天下唱取富貴如反掌耳暉等然之晏與壯士數人夜踰牙城入府出庫兵以給衆庚午旦斬愿首懸諸府門又殺契丹監軍奉暉爲留後晏徐州暉澶州章太原人也辛未劉知逺即皇帝位自言未忍攺晉國又惡開運之名乃更稱天福十二年壬申詔諸道爲契丹括率錢帛者皆罷之其晉臣𬒳迫脅爲使者勿問令詣行在自餘契丹所在誅之甲戍帝自將東迎晉主及太后至壽陽聞巳過恒州數日乃留兵戍承天軍而還晉主旣出塞契丹無復供給從官宫女皆自采木實草葉而食之至錦州契丹令晉主及后妃拜契丹主阿保機墓晉主不勝屈辱泣曰薛超誤我馮后隂令左右求毒藥欲與晉主俱自殺不果契丹王聞帝即位以通事耿崇美爲昭義節度使高唐英爲彰德節度使崔廷勲爲河陽節度使以控扼要害𥘉晉置郷兵號天威軍教習嵗餘村民不閑軍旅竟不可用悉罷之但令七戸輸錢十千其鎧仗悉輸官而無頼子弟不復肯復農業山林之盜自是而䌓及契丹入汴縱胡騎打草穀又多以其子弟及親信左右爲節度使刺史不通政事華人之狡獪者多往依其麾下教之妄作威福掊歛貨財民不堪命於是所在相聚爲盜多者數萬人少者不減千百攻䧟州縣殺掠吏民釡陽賊帥梁暉有衆數百送欵晉陽求效用帝許之磁州刺史李穀密通表於帝令暉襲相州暉偵知高唐英未至相州積兵器無守僃丁丑夜遣壯士踰城入啓關納其衆殺契丹數百其守將突圍走暉據州自稱留後表言其狀戊寅帝還至晉陽議率民財以賞將士夫人李氏諫曰陛下因河東創大業未有以惠澤其民而先奪其生生之資殆非新天子所以救民之意也今宫中所有請悉出之以勞軍雖復不厚人無怨言帝曰善即罷率民傾内府蓄積以賜將士中外聞之大悅李氏晉陽人也建雄留後劉在明朝于契丹以節度副使駱從朗知州事帝遣使者張晏洪等如晉州諭以巳即帝位從朗皆囚之大將藥可儔殺從朗推晏洪權留後庚辰遣使以聞契丹主遣右諫議大夫趙熈使晉州括率錢帛徴督甚急從朗旣死民相帥兵殺熈契丹主賜趙暉詔即以爲保義留後暉斬契丹使者焚其詔遣支使河間趙矩奉表詣晉陽契丹遣其將高模翰攻暉不克帝見矩甚喜曰子挈咽喉之地以歸我天下不足定也矩因勸帝早引兵南向以副天下之望帝善之辛巳以暉爲保義節度使侯章爲鎭國節度使保義軍馬歩都指揮使王晏爲絳州防禦使保義軍馬歩副都指揮使鎭寧節度使邪律郎伍性殘虐澶州人苦之賊帥王瓊帥其徒千餘人夜襲據南城北度浮航縱兵大掠圍郎伍於牙城契丹主聞之甚懼始遣天平節度使李守貞天雄節度使杜重威還鎭由是無乆留河南之意遣兵救澶州瓊退屯近郊遣其弟超奉表來求救癸未帝厚賜超遣還瓊兵败爲契丹所殺契丹述律太后遣使以其國中酒饌脯果賜契丹主賀平晉國契丹主與羣臣宴於永福殿東方羣盜大起䧟宋亳密三州契丹主謂左右曰我不知中國之人難制如此亟遣泰寧節度使安審琦武寧節度使苻彦卿等歸鎭仍以契丹兵送之彦卿至埇橋賊帥李仁恕帥衆數萬急攻徐州彦卿與數十騎至城下揚鞭欲招諭之仁恕控彦卿馬請從相公入城彦卿子昭序自城中遣軍校陳守習縋而出呼於賊中曰相公巳䧟虎口聽相公助賊攻城城不可得也賊知不可劫乃相帥羅拜於彦卿馬前乞赦其罪彦卿與之誓乃解去三月丙戍朔契丹主服赭袍坐崇元殿百官行入閤禮戊子帝遣使以詔書安集農民保聚山谷避契丹之患者契丹主復召晉百官諭之曰天時向暑吾難乆留欲暫至上國省太后當留親信一人於此爲節度使百官請迎太后契丹主曰太后族大如古栢根不可移也契丹主欲盡以晉之百官自隨或曰舉國北遷恐摇人心不如稍稍遷之乃詔有職事者從行餘留大梁復以汴州爲宣武軍以蕭翰爲節度使翰述律太后之兄子其妺復爲契丹主后翰始以蕭爲姓自是契丹后族皆稱蕭氏壬寅契丹主發大梁晉文武諸司從者數千人諸軍吏卒又數千人宫女宦官數百人盡載府庫之寳以行所留樂器儀仗而巳夕宿赤岡契丹主見村落皆空命有司發牓數百通所在招撫百姓然竟不禁胡騎剽掠丙午契丹自白馬渡河謂宣徽使高勲曰吾在上國以射獵爲樂至此令人悒悒今得歸死無恨矣庚戍以皇弟北京馬歩都指揮使崇行太原尹辛亥契丹主將攻相州梁暉請降契丹主赦之許以爲防禦使暉疑其詐復乗城拒守夏四月已未未明契丹主命蕃漢諸軍急攻相州食時克之悉殺城中男子驅其婦女而北胡人擲嬰孩於空中舉刃接之以爲樂留高唐英守相州唐英閱城中遺民男女得七百餘人其後節度使王繼弘歛城中髑髏瘞之凡得十餘萬或告磁州刺史李穀謀舉州應漢契丹主執而詰之穀不服契丹主引手於車中若取所獲文書者穀知其詐因請曰必有其驗乞顯示之凡六詰穀辭氣不屈乃釋之帝以從弟北京馬軍都指揮使信領義成節度使充侍衛馬軍都指揮使武節都指揮使史弘肇領忠武節度使充歩軍都指揮使右都押牙楊邠權樞密使蕃漢兵馬都孔目官郭威權副樞密使兩使都孔目官南樂王章權三司使契丹主見所過城邑丘墟謂蕃漢羣臣曰致中國如此皆燕王之罪也顧張礪曰爾亦有力焉契丹昭義節度使耿崇美屯澤州將攻潞州乙丑詔史弘肇將歩騎萬人救之帝聞契丹北歸欲經略河南故以弘肇爲前驅又遣謙萬進出北方以分契丹兵勢萬進并州人也契丹主以船數十艘載晉鎧仗將自汴泝河歸其國命寧國都虞候榆次武行德將士卒千餘人部送之至河隂行德與將士謀曰今爲虜所制將逺去郷里人生㑹有死安能爲異域之鬼乎虜勢不能乆留中國不若共逐其黨堅守河陽以俟天命之所歸者而臣之豈非長䇿乎衆以爲然行德即以鎧仗授之相與殺契丹監軍使㑹契丹河陽節度使崔廷勲以兵送耿崇美之潞州行德遂乗虚入據河陽衆推行德爲河陽都部署行德遣弟行友奉蠟表間道詣晉陽契丹遣武定節度使方太詣洛陽廵檢至鄭州州有戍兵共迫太爲鄭王梁嗣密王朱乙逃禍爲僧嵩山賊帥張遇得之立以爲天子取嵩岳神衮冕以衣之帥衆萬餘襲鄭州太擊走之太以契丹尚彊恐事不濟說諭戍兵欲與之俱西衆不從太自西門逃犇洛陽戍兵旣失太反譖太於契丹云脅我爲亂太遣子師朗自訴於契丹契丹將麻荅殺之太無以自明㑹羣盜攻洛陽契丹留守劉晞棄城奔許州太乃入府行留守事與廵檢使潘環擊羣盜却之張遇殺朱乙請降伊闕賊帥自稱天子誓衆於南郊壇將入洛陽太逆擊走之太欲自歸於晉陽武行德使人誘太曰我禆校也公舊鎭此地今虚位相待太信之至河陽爲行德所殺蕭翰遣高謨翰援送劉晞自許還洛陽晞疑潘環構其衆逐巳使謨翰殺之戊辰武行友至晉陽庚午史弘肇奏遣先鋒將馬誨擊契丹斬首千餘級時耿崇美崔廷勲至澤州聞弘肇兵巳入潞州不敢進引兵而南弘肇遣誨追擊破之崇美廷勲與奚王拽剌退保懷州辛未以武行德爲河陽節度使契丹主聞河陽亂嘆曰我有三失宜天下之叛我也諸道括錢一失也令上國人打草穀二失也不早遣諸節度使還鎭三失也契丹主至臨城得疾及欒城病甚苦熱聚冰於胷腹手足且啖之丙子至殺胡林而卒國人剖其腹實鹽數斗載之北去晉人謂之帝羓趙延壽恨契丹主負約謂人曰我不復入龍沙矣即日先引兵入恒州契丹永康王兀欲及南北二王各以所部兵相繼而入延壽欲拒之恐失大援乃納之時契丹諸將巳密議奉兀欲爲主兀欲登鼓角樓受叔兄拜而延壽不之知自稱受契丹皇帝遺詔權知南朝軍國事仍下教布告諸道所以供給兀欲與諸將同兀欲衘之恒州諸門管鑰及倉庫出納兀欲皆自主之延壽使人請之不與契丹主喪至國述律太后不哭曰待諸部寧壹如故則葬汝矣帝之自壽陽還也留兵千人戍承天軍戍兵聞契丹北還不爲僃契丹襲擊之戍兵驚潰契丹焚其市邑一日狼煙百餘舉帝曰此虜將遁張虚勢也遣親將葉仁魯將歩騎三千赴之㑹契丹出剽掠仁魯乗虚大破之丁丑復取承天軍或說趙延壽曰契丹諸大人數日聚謀此必有變今漢兵不減萬人不若先事圖之延壽猶豫不決壬午延壽下令以來月朔日於待賢館上事受文武官賀其儀宰相樞密使拜於階上節度使以下拜於階下李崧以虜意不同事理難測固請趙延壽未行此禮乃止五月乙酉朔永康王兀欲召延壽及張礪和凝李崧馮道於所館飲酒兀欲妻素以兄事延壽兀欲從容謂延壽曰妺自上國來寧欲見之乎延壽欣然與之俱入良乆兀欲出謂礪等曰燕王謀反適已鎻之矣又曰先帝在汴時遺我一籌許我知南朝軍國近者臨崩别無遺詔而燕王擅自知南朝軍國豈理邪下令延壽親黨皆釋不問間一日兀欲至待賢館受蕃漢官謁賀笑謂張礪等曰燕王果於此禮上吾以鐵騎圍之諸公亦不免矣後數日集蕃漢之臣於府署宣契丹主遺制其略曰永康王大聖皇帝之嫡孫太皇王之長子太后鍾愛羣情允歸可於中京即皇帝位於是始舉哀成服帝集羣臣庭議進取諸將咸請出師井陘次取鎭魏先定河北則河南拱手自服帝欲自石㑹趨上黨郭威曰虜主雖死黨衆猶盛各據堅城我出河北兵少路迂傍無應援若羣虜合勢共擊我軍進則遮前退則邀後糧餉路絶此危道也上黨山路險澁粟少民殘無以供億亦不可由近者陜晉二鎭相繼欵附引兵從之萬無一失不出兩旬洛汴定矣帝曰卿言是也蘇逢吉等曰史弘肇大軍巳屯上黨羣敵繼遁不若出天井抵孟津爲便司天奏太歳在午不利南行宜由晉絳抵陜帝從之辛卯詔以十二日發北京告諭諸道甲午以太原尹崇爲北京留守以趙州刺史李存瓌爲副留守河東幕僚真定李驤爲少尹牙將太原蔚進爲馬歩指揮使以佐之存瓌唐莊宗之從弟也丙申帝發太原自隂地關出晉絳丁酉史弘肇奏克澤州始弘肇攻澤州刺史翟令竒固守不下帝以弘肇兵少欲召還蘇逢吉楊邠曰今陜晉河陽皆巳向化崔廷勲耿崇美朝夕遁去若召弘肇還則河南人心動揺虜勢復壯矣帝未決使人諭指於弘肇曰兵巳及此勢如破竹可進不可退與逢吉等議合帝乃從之弘肇遣部將李萬超說令竒令竒乃降弘肇以萬超權知澤州崔廷勲耿崇美奚王拽剌合兵逼河陽張遇帥衆數千救之戰於南阪敗死武行徳出戰亦敗閉城自守拽剌欲攻之廷勲曰今北軍巳去得此何用且殺一夫猶可惜況一城乎聞弘肇巳得澤州乃釋河陽還保懷州弘肇將至廷勲等擁衆北遁過衛州大掠而去契丹在河南者相繼北去弘肇引兵與武行德合弘肇爲人沈毅寡言御衆嚴整將校小不從命立檛殺之士卒所過犯民田及繫馬於樹者皆斬之軍中惕息莫敢犯令故所向必克帝自晉陽安行入洛及汴兵不血刃皆弘肇之力也帝由是倚愛之辛丑帝至霍邑甲辰帝至晉州帝之即位也絳州刺史李從朗與契丹將成霸卿等拒命帝遣西南靣招討使護國節度使白文珂攻之未下帝至城下命諸軍四布而勿攻以利害諭之戊申從㓪舉城降帝命親將分護諸門士卒一人毋得入以偏將薛瓊爲防禦使辛亥帝至陜州趙暉自御帝馬而入壬子至石壕汴人有來迎者六月乙卯帝至新安西京留司官悉來迎丙辰帝至洛陽入居宫中汴州百官奉表來迎詔諭以受契丹𥙷署者皆勿自疑聚其告牒而焚之趙逺更名上交命鄭州防禦使郭從義先入大梁清宫密令殺李從益及王淑妃淑妃且死曰吾兒爲契丹所立何罪而死何不留之使毎歳寒食以一盂麥飯洒明宗陵乎聞者泣下戊午帝發洛陽辛酉汴州百官竇貞固等迎於滎陽甲子帝至大梁晉之藩鎭相繼來降戊辰帝下詔大赦凡契丹所除節度使下至將吏各安職任不復變更復以汴州爲東京改國號曰漢仍稱天福年曰余未忍忘晉也復青襄汝三節度秋閏七月庚辰制建宗廟太祖高皇帝世祖光武皇帝皆百世不遷又立四親廟追尊諡號凡六廟三叛連兵後漢高祖天福十二年夏五月乙酉朔契丹永康王兀欲囚趙延壽於恒州辛丑帝遣使諭河中節度使趙匡賛仍以契丹囚其父延壽告之秋七月或傳趙延壽巳死郭威言於帝曰趙匡􅐌契丹所署今猶在河中宜遣使弔祭因起復移鎮彼既家國無歸必感恩承命從之㑹鄴都留守天雄節度使兼中書令杜重威天平節度使兼侍中李守貞皆奉表歸命重威仍請移它鎭歸德節度使兼中書令高行周入朝丙申徙重威爲歸德節度使以行周代之守貞爲護國節度使加兼中書令徙護國節度使趙匡􅐌爲晉昌節度使後二年延壽始卒於契丹杜重威自以附契丹負中國内常疑懼及移鎭制下復拒而不受遣其子弘璲質於麻荅以求援趙延壽有幽州親兵二千在恒州指揮使張璉將之重威請以守魏麻荅遣其將楊衮將契丹千五百人及幽州兵赴之閏月庚午詔削奪重威官爵以高行周爲招討使鎭寧節度使慕容彦超副之以討重威慕容彦超欲急攻城行周欲緩之由是二將不恊帝恐生它變欲自將擊重威九月戊寅詔幸澶魏勞軍庚辰帝發大梁晉昌節度使趙匡􅐌恐終不爲朝廷所容冬十月遣使降蜀請自東南路出兵應援帝至鄴都遣給事中陳觀往諭指重威復閉門拒之城中食浸竭將士多出降者慕容彦超固請攻城帝從之丙午親督諸將攻城自寅至辰士卒傷者萬餘人死者千餘人不克而止彦超乃不敢復言𥘉契丹留幽州兵千五百人戍大梁帝入大梁或告幽州兵將爲變帝盡殺之於繁臺之下及圍鄴都張璉將幽州兵二千助重威拒守帝屢遣人招諭許以不死璉曰繁臺之卒何罪而戮今守此以死爲期耳由是城乆不下十一月丙辰内殿直韓訓獻攻城之具帝曰城之所恃者衆心耳衆心苟離城無所保用此何爲杜重威之叛也觀察判官金郷王敏屢泣諫不聽及食竭力盡甲戍遣敏奉表出降乙亥重威子弘璉來見丙子妻石氏來見石氏即晉之宋國長公主也帝復遣入城丁丑重威開門出降城中餒死者什七八存者皆尫瘠無人狀張璉先邀朝廷信誓詔許以歸郷里及出降殺璉等將校數十人縱其士卒北歸將出境大掠而去郭威請殺重威牙將百餘人并重威家皆籍之以賞戰士從之以重威爲太傅兼中書令楚國公重威毎出入路人往往擲瓦礫詬之臣光曰漢髙祖殺幽州無辜千五百人非仁也誘張璉而誅之非信也杜重威罪大而赦之非刑也仁以合衆信以行令刑以懲姦失此三者何以守國其祚運之不延也宜哉十二月丙戍帝發鄴都蜀主遣雄武都押牙吳崇惲以樞密使王處回書招鳯翔節度使侯益庚寅以山南西道節度使兼中書令張䖍釗爲北靣行營招討安撫使雄武節度使何重建副之宣徽使韓保貞爲都虞候共將兵五萬䖍釗出散關重建出隴州以擊鳯翔奉鑾肅衛都虞候李廷珪將兵二萬出子午谷以㧞長安諸軍發成都旌旗數十里癸巳帝至大梁侯益請降於蜀使吳崇惲持兵籍糧帳西還與趙匡􅐌同上表請出兵平定關中乾祐元年春正月帝以趙匡􅐌侯益與蜀兵共爲宼患之㑹回鶻入貢訴稱爲党項所阻乞兵應接詔右衛大將軍王景崇將軍齊藏珍將禁軍數千赴之因使之經略關西晉昌節度判官李恕乆在趙延夀幕下延壽使之佐匡􅐌匡􅐌將入蜀恕諫曰燕王入朝豈所願哉今漢家新得天下方務招懷若謝罪歸朝必保富貴入蜀非全計也蹄涔不容尺鯉公必悔之匡􅐌乃遣恕奉表請入朝景崇等未行而恕至帝問恕匡􅐌何爲附蜀對曰匡􅐌自以身受虜官父在虜廷恐陛下未之察故附蜀求苟免耳臣以爲國家必應存撫故遣臣來祈哀帝曰匡􅐌父子本吾人也不幸䧟虜今延壽方墜檻穽吾何忍更害匡􅐌乎即聽其入朝侯益亦請赴二月四日聖壽節上壽景崇等將行帝召入臥内敇之曰匡􅐌益之心皆未可知汝至彼彼巳入朝則勿問若尚遷延顧望當以便宜從事趙匡賛不俟李恕返命巳離長安丙子入見王景崇等至長安聞蜀兵已入秦州以兵少發本道及趙匡賛牙兵千餘人同拒之景崇恐匡􅐌牙兵亡逸欲文其面㣲露風旨軍校趙思綰首請自文其靣以帥下景崇悅齊藏珍竊言曰思綰凶暴難制不如殺之景崇不聽思綰魏州人也蜀李廷珪將至長安聞趙匡贊巳入朝欲引歸王景崇邀之敗廷珪於子午谷張䖍釗至寳鷄諸將議不恊按兵未進侯益聞廷珪西還因閉璧拒蜀兵䖍釗勢孤引兵夜遁景崇帥鳯翔隴邠涇鄜坊之兵追敗蜀兵於散關俘將卒四百人丁丑帝殂袐不發喪庚辰下詔稱重威父子因朕小疾謗議揺衆并其子弘璋弘聽弘琛皆斬之二月辛巳發喪宣遺制皇子承祐即皇帝位詔以王景崇兼鳯翔廵檢使景崇引兵至鳯翔侯益尚未行景崇以禁兵分守諸門或勸景崇殺益景崇以受先朝密旨嗣主未之知或疑於專殺猶豫未決益聞之不告景崇而去景崇悔自詬戊戍益入朝隱帝問何故召蜀軍對曰臣欲誘致而殺之帝哂之三月侯益家富於財厚賂執政由是大臣爭譽之丙寅以益兼中書令行開封尹侯益盛毀王景崇於朝言其恣横景崇聞益尹開封知事巳變内不自安且怨朝廷㑹詔遣供奉官王益如鳯翔徵趙匡􅐌牙兵詣闕趙思綰等甚懼景崇因以言激之思綰途中謂其黨常彦卿曰小太尉巳落其手吾屬至京師并死矣柰何彦卿曰臨機制變子勿復言癸酉至長安永興節度副使安友規廵檢喬守温出迎王益置酒於客亭思綰前白曰壕寨使巳定舎館於城東今將士家屬皆在城中欲各入城挈家詣城東宿友規等然之時思綰等皆無鎧仗旣入西門有州校坐門側思綰遽奪其劒斬之其徒因大譟持白挺殺守門者十餘人分遣其黨守諸門思綰入府開庫取鎧仗給之友規等皆逃去思綰遂據城集城中少年得四千餘人繕城隍葺樓堞旬日間戰守之具皆僃王景崇諷鳯翔吏民表景崇知軍府事朝廷患之甲戍徙靜難節度使王守恩爲永興節度使徙保義節度使趙暉爲鳯翔節度使竝同平章事以景崇爲邠州留後令便道之官虢州伶人靖邊庭殺團練使田令方驅掠州民犇趙思綰至潼關潼關守將出擊之其衆皆潰丁丑邠涇同華四鎭俱上言護國節度使兼中書令李守貞與永興鳯翔同反始守貞聞杜重威死而懼隂有異志自以晉世嘗爲上將有戰功素好施得士卒心漢室新造天子年少𥘉立執政皆後進有輕朝廷之志乃招納亡命養死士治城塹繕甲兵晝夜不息遣人間道齎蠟丸結契丹屢爲邉庭所獲浚儀人趙修巳素善術數自守貞鎭滑州署司户參軍累從移鎭爲守貞言時命不可勿妄動前後切諫非一守貞不聽乃稱疾歸郷里僧揔倫以術媚守貞言其必爲天子守貞信之又甞㑹將佐置酒引弓指䑛掌虎圖曰吾有非常之福當中其舌一發中之左右皆賀守貞益自負㑹趙思綰據長安奉表獻御衣於守貞守貞自謂天人恊契乃自稱秦王遣其驍將平陸王繼勲將兵據潼關以思綰爲晉昌節度使同州距河中最近匡國節度使張彦威常詗守貞所爲奏請先爲之僃詔滑州馬軍都指揮使羅金山將部兵戍同州故守貞起兵同州不爲所併金山雲州人也夏四月以鎮寧節度使郭從義充永興行營都部署將侍衛兵討趙思綰戊子以保義節度使白文珂爲河中行營都部署内客省使王浚爲都監辛卯削奪李守貞官爵命文珂等㑹兵討之乙未以寧江節度使侍衛歩軍都指揮使尚洪遷爲西靣行營都虞侯王景崇遷延不之邠州閱集鳯翔丁壯詐言討趙思綰仍牒邠州㑹兵王景崇遺蜀鳯州刺史徐彦書求通互市壬戍蜀主使彦復書招之六月乙酉王景崇遣使請降于蜀亦受李守貞官爵西靣行營都虞候尚洪遷攻長安重傷而卒秋七月鳯翔節度使趙暉至長安乙亥表王景崇反狀益明請進兵擊之自河中永興鳯翔三鎮拒命以來朝廷繼遣諸將討之昭義節度使常思屯潼關白從珂屯同州趙暉屯咸陽惟郭從義王峻置柵近長安而二人相惡如水火自春徂秋皆相仗莫肻攻戰帝患之欲遣重臣臨督八月壬午以郭威為西面軍前招諭安撫使諸軍皆受威節度威将行問䇿於太師馮道道曰守貞自謂舊将為士卒所附願公勿愛官物以賜士卒則奪其所恃矣威從之由是衆心始附於威詔白文珂趣河中趙暉趣鳯翔戊子蜀攺鳯翔曰岐陽軍已丑以王景崇為岐陽節度使同平章事郭威與諸将議攻討諸将欲先取長安鳯翔鎮國節度使扈彦珂曰今三叛連衡推守貞為主守貞亡則兩鎮自破矣若捨近而攻逺萬一王趙拒吾前守貞掎吾後此危道也威善之於是威自陜州白文珂及寧江節度使侍衛歩軍都指揮使劉詞自同州常思自潼關三道攻河中威撫養士卒與同苦樂小有功輙厚賞之微有傷常親視之士無賢不肖有所陳啔皆温辭色而受之違忤不怒小過不責由是将卒咸歸心於威始李守貞以禁軍皆嘗在麾下受其恩施又士卒素驕苦漢法之嚴謂其至則叩城奉迎可坐而待之既而士卒新受賜於郭威皆忘守貞舊恩已亥至城下揚旗伐鼓踊躍詬譟守貞視之失色白文珂克西關城柵於河西常思柵於城南威柵於城西未㡬威以常思無将領才先遣歸鎮諸将欲急攻城威曰守貞前朝宿将健鬪好施屢立戰功況城臨大河樓堞完固未易輕也且彼馮城而鬪吾仰而攻之何異帥士卒投湯火乎夫勇有盛衰攻有緩急時有可否事有後先不若且設長圍而守之使飛走路絶吾洗兵牧馬坐食轉輸温飽有餘俟城中無食公帑家財皆竭然後進梯衝以逼之飛書檄以招之彼之将士脫身逃死父子且不相保況烏合之衆乎思綰景崇但分兵縻之不足慮也乃發諸州民夫二萬餘人使白文珂等帥之刳長壕築連城列隊伍而圍之威又謂諸将曰守貞郷畏高祖不敢鴟張以我輩崛起太原事功未著有輕我心故敢反耳正宜静以制之乃偃旗臥鼓但循河設火鋪連延數十里畨歩卒以守之遣水軍艤舟於岸㓂有潜徃来者無不擒之於是守貞如坐網中矣九月蜀兵援王景崇軍于散關趙暉遣都監李彦從襲擊破之蜀兵遁去王景崇盡殺侯益家屬七十餘人益子前天平行軍司馬仁矩先在外得免庚申以仁矩爲隰州刺史仁矩子延廣尚在襁褓乳母劉氏以己子易之抱延廣而逃乞食至于大梁歸于益家李守貞屢出兵欲突長圍皆敗而返遣人齎蠟九求救於唐蜀契丹皆爲邏者所獲城中食且盡殍死者日衆守貞憂形於色召揔倫詰之揔倫曰大王當爲天子人不能奪但此分野有災待磨滅將盡只餘一人一騎乃大王鵲起之時也守貞猶以爲然冬十月王景崇遣其子徳讓趙思綰遣其子懷乂見蜀主于成都戊寅景崇遣兵出西門趙暉擊破之遂取西關城景崇退守大城暉塹而圍之數挑戰不出暉潛遣千餘人擐甲執兵效蜀旗幟循南山而下令諸軍聲言蜀兵至矣景崇果遣兵數千出迎之暉設伏掩擊盡殪之自是景崇不復敢出蜀主遣山南西道節度使安思謙將兵救鳯翔左僕射兼門下侍郎同平章事毋昭裔上䟽諌曰臣竊見莊宗皇帝志貪西顧前蜀主意欲北行凡在庭臣皆貢諫䟽殊無聽納有何所成只此兩朝可爲鑒誡不聽又遣雄武節度使韓保貞引兵出汧陽以分漢兵之勢王景崇遣前義成節度使酸棗李彦舜等逆蜀兵丙申安思謙屯右界漢兵屯寳雞思謙遣眉州刺史申貴府兵二千趣模壁設伏於竹林丁酉旦貴以兵數百壓寳雞而陳漢兵遂之遇伏而敗蜀兵遂北破寳雞寨蜀兵去漢兵復入寳雞已亥思謙進屯渭水漢益兵五千戌寳雞思謙畏之謂衆曰糧少敵强宜更為後圖辛丑退屯鳯州㝷歸興元貴潞州人也彰武節度使高允權與定難節度使李彛殷有隙李守貞宻求援於彛殷發兵屯延丹境上聞官軍圍河中乃退甲辰允權以其狀聞彛殷亦自訴朝廷和解之𥘉沈丘人舒元嵩山道士楊訥俱以遊客干李守貞守貞為漢所攻遣元更姓朱訥更姓李名平間道奉表求救於唐唐諌議大夫查文徽兵部侍郎魏岑請出兵應之唐主命北面行營招討使李金全将兵救河中以清淮節度使劉彦貞副之文徽為監軍使岑為㳂淮廵檢使軍于沂州之境金全與諸将方㑹食候騎白有漢軍數百在澗北皆羸弱請掩之金全令曰敢言過澗者斬及暮伏兵四起金鼓聞十餘里金全曰曏可與之戰乎時唐士卒厭兵莫有鬪志又河中道逺埶不相及十一月丙寅唐兵退保海州唐主遺帝書謝請復通商旅且請赦守貞朝廷不報王景崇累表告急於蜀蜀主命安思謙再出兵救之十二月壬午思謙自興元引兵屯鳯州請先運糧四十萬斛乃可出境蜀主曰觀思謙之意安肯爲朕進取然亦發興州興元米數萬斛以饋之戊子思謙進屯散關遣馬歩使高彦儔眉州刺史申貴擊漢箭䇢安都寨破之庚寅思謙敗漢兵於玉女潭漢兵退屯寳雞思謙進屯模壁韓保貞出新關壬辰軍于隴州神前漢兵不出保貞亦不敢進趙暉告急於郭威威自往赴之時李守貞遣副使周光遜禆將王繼勲聶知遇守城西威戒白文珂劉詞曰賊苟不能突圍終爲我擒萬一得出則吾不得復留於此成敗之機於是乎在賊之驍銳盡在城西我去必來突圍爾曹謹僃之威至華州聞蜀兵食盡引去威乃還韓保貞聞安思謙去亦退保弓川寨隱帝乾祐二年春正月郭威將至河中白文珂岀迎之戊申夜李守貞遣王繼勲等引精兵千餘人循河而南襲漢柵坎岸而登遂入之縱火大譟軍中狼狽不知所爲劉詞神色自若下令曰小盜不足驚也帥衆擊之客省使閻晉卿曰賊甲皆黄𥿄爲火所照易辨耳柰衆無鬪志何禆將李韜曰安有無事食君禄有急不死鬪者邪援矟先進衆從之河中兵退走死者七百人繼勲重傷僅以身免己酉郭威至劉詞迎馬首請罪威厚賞之曰吾所憂正在於此微兄健鬪幾爲虜嗤然虜技殫於此矣晉卿忻州人也守貞之欲攻河西柵也先遣人出酤酒於村墅或貰與不責其直邏騎多醉由是河中兵得潜行入寨幾至不守郭威乃下令將士非犒宴無得私飲愛將李審晨飲少酒威怒曰汝爲吾帳下首違軍令何以齊衆立斬以恂詔以靜州隸定難軍二月辛未李彛殷上表謝彛殷以中原多故有輕傲之志毎藩鎭有叛者常隂助之邀其重賂朝廷知其事亦以恩澤羈縻之夏四月河中城中食且盡民餓死者什五六癸卯李守貞出兵五千餘人齎梯橋分五道以攻長圍之西北隅郭威遣都監吳䖍𥙿引兵横擊之河中兵敗走殺傷大半奪其攻具五月丙午守貞復出兵又敗之擒其將魏延朗鄭賔壬子周光遜王繼勲聶知遇帥其衆千餘人來降守貞將士降者相繼威乗其離散庚申督諸軍百道攻之趙思綰好食人肝甞靣剖而膾之膾盡人猶未死又好以酒吞人膽謂人曰吞此千枚則膽無敵矣及長安城中食盡取婦女幼稚爲軍糧日計數而給之毎犒軍輒屠數百人如羊豕法思綰計窮不知所出郭從義使人誘之𥘉思綰少時求爲左驍衛上將軍致仕李肅僕肅不納曰是人目亂而語誕它日必爲叛臣肅妻張氏全義之女也曰君今拒之後且爲患乃厚以金帛遺之及思綰據長安肅閑居在城中思綰數就見之拜伏如故禮肅曰是子亟來且汙我欲自殺妻曰曷若勸之歸國㑹思綰問自全之計肅乃與判官程讓能說思綰曰公本與國家無嫌但懼罪耳今國家三道用兵俱未有功若以此時飜然攺圖朝廷必喜自可不失富貴孰與坐而待斃乎思綰從之遣使詣闕請降乙丑以思綰爲華州留後都指揮使常彦卿爲虢州刺史令便道之官秋七月甲辰趙思綰釋甲出城受詔郭從義以兵守其南門復遣還城思綰求其牙兵及鎧仗從義亦給之思綰遷延收斂財賄三攺行期從義等疑之密白郭威請圖之威許之壬子從義與都監南院宣徽使王峻按轡入城處于府舎召思綰酌别因執之并常彦卿及其父兄部曲三百人皆斬於市甲寅郭威攻河中克其外郭李守貞收餘衆退保子城諸將請急攻之威曰夫鳥窮則啄況一軍乎涸水取魚安用急爲壬戍李守貞與妻及子崇勲等自焚威入城獲其子崇玉等及所署宰相靖蜍孫愿樞宻使劉芮國師揔倫等送大梁磔於市徴趙修已爲翰林天文威閱守貞文書得朝廷權臣及藩鎭與守貞交通書詞意悖逆欲奏之袐書郎榆次王溥諌曰魑魅乗夜爭出見日自消願一切焚之以安反仄威從之戊辰加永興節度使郭從義同平章事徙鎭國節度使扈彦珂爲護國節度使以河中行營馬歩都虞候劉詞爲鎭國節度使八月戊戍郭威至大梁入見帝勞之賜金帛衣服玉帶鞍馬辭曰臣受命期年僅克一城何功之有且臣將兵在外凡鎭安京師供億所須使兵食不乏皆諸大臣居中者之力也臣安敢獨膺此賜請徧賞之又議加領方鎭辭曰楊邠位在臣上未有茅土且帷幄之臣不可以弘肇爲比九月壬寅徧賜宰相樞密宣徽三司侍衞使九人與威如一帝欲特賞威辭曰運籌建畫出於廟堂發兵饋糧資於藩鎭暴露戰鬭在於將士而功獨歸臣臣何以堪之乙巳加威兼侍中史弘肇兼中書令辛亥加竇貞固司徒蘇逢吉司空蘇禹珪左僕射楊邠右僕射諸大臣議以朝廷執政溥加恩恐藩鎭觖望乙卯加天雄節度使高行周守太師山南東道節度使安審琦守太傅泰寧節度使苻彦卿守太保河東節度使劉崇兼中書令己未加忠武節度使劉信天平節度使慕容彦超平盧節度使劉銖竝兼侍中辛酉加朔方節度使馮暉定難節度使李彛殷兼中書令冬十月壬申加義武節度使孫方簡武寧節度使劉贇同平章事壬午加呉越王弘俶尚書令楚王希廣太尉丙戍加荆南節度使高保融兼侍中議者以郭威不專有其功推以分人信爲美矣而國家爵位以一人立功而覃及天下不亦濫乎𥘉邢州人周璨爲諸衛將軍罷秩無依從王景崇西征景崇叛遂爲謀主趙暉急攻鳯翔周璨謂王景崇曰公曏與蒲雍相表裏今二鎭巳平蜀兒不足恃不如降也景崇曰善吾更思之後數日外攻轉急景崇謂其黨曰事窮矣吾欲爲急計乃謂其將公孫輦張思練曰趙暉精兵多在城北來日五鼓前爾二人燒城東門詐降勿令㓂入吾與周璨以牙兵出北門突暉軍縱無成而死猶勝束手皆曰善癸巳未明輦思練燒東門請降府牙火亦發二將遣人詗之景崇巳與家人自焚矣璨亦降郭威篡漢劉旻據河東附後漢高祖乾祐元年帝自魏王承訓卒悲痛過甚春正月甲子始不豫丁丑帝大漸召蘇逢吉楊邠史弘肇郭威入受顧命曰承祐幼弱後事託在卿輩是曰帝殂二月辛巳朔立皇子左衛大將軍大内都㸃檢承祐爲周王同平章事丁亥尊皇后曰皇太后宣遺制令周王即皇帝位蘇逢吉等爲相多遷𥙷官吏楊邠以爲虚費國用所奏多抑之逢吉等不悅三月中書侍郎兼戸部尚書同平章事李濤上䟽言今關西紛擾外禦爲急二樞密皆佐命功臣官雖貴而家未富宜授以要害大鎭樞機之務在陛下目前易以裁決逢吉禹珪自先帝時任事皆可委也楊邠郭威聞之見太后泣訴稱臣等從先帝起艱難中今天子取人言欲棄之於外況關西方有事臣等何忍自取安逸不顧社稷若臣等必不任職乞留過山陵太后怒以讓帝曰國家勤舊之臣柰何聽人言而逐之帝曰此宰相所言也因詰責宰相濤曰此䟽臣獨爲之它人無預丁丑罷濤政事勒歸私第夏四月帝與左右謀以太后怒李濤離間欲更進用二樞密以明非帝意左右亦疾二蘇之専欲奪其權共勸之壬午制以樞密使楊邠爲中書侍郎兼吏部尚書同平章事樞密使如故以副樞密使郭威爲樞密使又加三司使王章同平章事凡中書除官諸司奏事帝皆委邠斟酌自是三相拱手政事盡決於邠事有未更邠所可否者莫敢施行遂成凝滯三相毎進擬用人苟不出邠意雖簿尉亦不之與邠素不喜書生常言國家府廩實甲兵彊乃爲急務至於文章禮樂何足介意旣恨二蘇排已以其除官太濫爲衆所非欲矯其弊由是艱於除拜士大夫往往有自漢興至亡不霑一命者凡門䕃及百司入仕悉罷之雖由邠之愚蔽時人亦咎二蘇之不公所致云秋七月庚申加樞密使郭威同平章事隱帝乾祐二年三叛旣平帝浸驕縱與左右狎暱飛龍使瑕丘後匡􅐌茶酒使太原郭允明以謟媚得幸帝好與之爲廋辭醜語太后屢戒之帝不以爲意七月太常卿張昭上言宜親近儒臣講習經訓不聽昭即昭逺避高祖諱攺之三年夏四月楊邠求解樞密使帝遣中使諭止之宣徽北院使呉䖍𥙿在旁曰樞密重地難以乆居當使後來者迭爲之相公辭之是也帝聞之不悅辛巳以䖍裕爲鄭州防禦使朝廷以契丹近入寇横行河北諸藩鎭各自守無扞禦之者議以郭威鎭鄴都使督諸將以僃契丹史弘肇欲威仍領樞密使蘇逢吉以爲故事無之弘肇曰領樞密使則可以便宜從事諸軍畏服號令行矣帝卒從弘肇議弘肇怨逢吉異議逢吉曰以内制外順也今反以外制内其可乎壬午制以威爲鄴都留守天雄節度使樞密使如故仍詔河北兵甲錢穀但見郭威文書立皆禀應明日朝貴㑹飲於竇貞固之第弘肇舉大觴屬威厲聲曰昨日廷議一何同異今日爲弟飲之逢吉與楊邠亦舉觴曰是國家之事何是介意弘肇又厲聲曰安定國家在長槍大劒安用毛錐王章曰無毛錐則財賦何從可出自是將相始有隙壬辰以左監門衛將軍郭榮爲貴州剌史天雄牙内都指揮使榮本姓柴父守禮郭威之妻兄也威未有子時養以爲子五月庚子郭威辭行言於帝曰太后從先帝乆多歴天下事陛下冨於春秋有事冝禀其教而行之親近忠直放逺讒邪善惡之閒所冝明審蘇逢吉楊邠史弘肇皆先帝舊臣盡忠徇國願陛下推心任之必無敗失至於疆埸之事臣願竭其愚駑庻不負驅䇿帝歛容謝之癸丑王章置酒㑹諸朝貴酒酣爲酒勢令史弘肇不閑其事客省使閻晉卿坐次弘肇屢教之蘇逢吉戲之曰旁有姓閻人何憂罰爵弘肇妻閻氏本酒家倡也意逢吉譏之大怒以醜語詬逢吉逢吉不應弘肇欲歐之逢吉起去弘肇索劒欲追之楊邠泣止之曰蘇公宰相公若殺之置天子何地願孰思之弘肇即上馬去邠與之聮鐮送至其第而還於是將相如水火矣帝使宣徽使王峻置酒和解之不能得逢吉欲求出鎭以避之旣而中止曰吾去朝廷止煩史公一䖏分吾虀粉矣王章亦忽忽不樂欲求外官楊史固止之帝自即位以來樞密使右僕射同平章事楊邠緫機政樞密使兼侍中郭威主征伐歸徳節度使侍衛親軍都指揮使兼中書令史弘肇典宿衛三司使同平章事王章掌財賦邠頗公忠退朝門無私謁雖不却四方饋遺有餘輒獻之弘肇督察京城道不拾遺是時承契丹蕩覆之餘公私困竭章捃摭遺利吝於出納以實府庫屬三叛連衡宿兵累年而供饋不乏及事平賜予之外尚有餘積以是國家粗安章聚歛刻急舊制田稅毎斛更輸二升謂之雀鼠耗章始令更輸二升謂之省耗舊錢出入皆以八十爲陌章始令入者八十出者七十七謂之省陌有犯鹽礬酒麴之禁者錙銖㳙滴罪皆死由是百姓愁怨章尤不喜文臣嘗曰此輩授之握筭不知縱横何益於用俸禄皆以不堪資軍者給之吏巳高其估章更増之帝左右嬖佞浸用事太后親戚亦干預朝政邠等屢裁抑之太后有故人子求𥙷軍職弘肇怒而斬之武德使李業太后之弟也高祖使掌内帑帝即位尤蒙寵任㑹宣徽使闕業意欲之帝及太后亦諷執政邠弘肇以爲内使遷𥙷有次不可以外戚超居乃止内客省使閻晉卿次當爲宣徽使乆而不𥙷樞密承旨聶文進飛龍使後匡􅐌翰林茶酒使郭允明皆有寵於帝乆不遷官共怨執政文進并州人也平盧節度使劉銖罷青州歸乆奉朝請未除官常㦸手於執政帝𥘉除三年喪聽樂賜伶人錦𫀆玉帶伶人詣弘肇謝弘肇怒曰士卒守邊苦戰猶未有以賜之汝曹何功而得此皆奪以還官帝欲立所幸耿夫人爲后邠以爲太速夫人卒常欲以后禮葬之邠復以爲不可帝年益壯厭爲大臣所制邠弘肇嘗議事於帝前帝曰審圖之勿令人有言邠曰陛下但禁聲有臣等在帝積不能平左右因乗間譛之於帝云邠等專恣終當爲亂帝信之當夜聞作坊鍜聲疑有急兵逹旦不寐司空同平章事蘇逢吉旣與弘肇有隙知李業等怨弘肇屢以言激之帝遂與業文進匡􅐌允明謀誅邠等議既定入白太后太后曰兹事何可輕發更宜與宰相議之業時在旁曰先帝嘗言朝廷大事不可謀及書生懦怯誤人太后復以爲言帝忿曰國家之事非閨閤所知拂衣而出十一月乙亥業等以其謀告閻晉卿晉卿恐事不成詣弘肇第欲告之弘肇以它故辭不見丙子旦邠等入朝有甲士數十自廣政殿岀殺邠弘肇章於東廡下文進亟召宰相朝臣班於崇元殿宣云邠等謀反巳伏誅與卿等同慶又召諸軍將校至萬歳殿庭帝親諭之且曰邠等以穉子視朕朕今始得爲汝主汝等免横憂矣皆拜謝而退又召前節度使刺史等升殿諭之分遣使者帥騎收捕邠等親戚黨與傔從盡殺之弘肇待侍衛歩軍都指揮使王殷尤厚邠等死帝遣供奉官孟業齎密詔詣澶州及鄴都令鎭寧節度使李洪義殺殷又令鄴都行營馬軍都指揮使郭崇威歩軍都指揮使眞定曹威殺郭威及監軍宣徽使王峻洪義太后之弟也又急詔徴天平軍節度使高行周平盧節度使苻彦卿永興節度使郭崇義泰寧節度使慕容彦超匡國節度使薛懷讓鄭州防禦使呉䖍𥙿陳州敕史李穀入朝以蘇逢吉權知樞密院事前平盧節度使劉銖權知開封府侍衛馬歩都指揮使李洪建權判侍衛司事内侍省使閻晉卿權侍衛馬軍都指揮使洪建業之兄也時中外人情憂駭蘇逢吉雖惡弘肇而不預李業等謀聞變驚愕私謂人曰事太怱怱主上儻以一言見問不至於此業等命劉銖誅郭威王峻之家銖極其慘毒嬰孺無免者命李洪建誅王殷之家洪建但使人守視仍飲食之丁丑使者至澶州李洪義畏懦慮王殷巳知其事不敢發乃引孟業見殷殷囚業遣副使陳光穗以宻詔示郭威威召樞宻吏魏仁浦示以詔書曰柰何仁浦曰公國之大臣功名素著加之握彊兵據重鎭一旦爲群小所構禍出非意此非辭說所能解時事如此不可坐而待死威乃召郭崇威曹威及諸將告以楊邠等寃死及有密詔之狀且曰吾與諸公拔荆棘從先帝取天下受託孤之任竭力以衞國家今諸公已死吾何心獨生君輩當奉行詔書取吾首以報天子庶不相累郭崇威等皆泣曰天子幼冲此必左右羣小所爲若使此輩得志國家其得安乎崇威願從公入朝自訴盪滌鼠輩以清朝廷不可爲單使所殺受千載惡名翰林天文趙脩已謂郭威曰公徒死何益不若順衆心擁兵而南此天啓也郭威乃留其養子榮鎭鄴都命郭崇威將騎兵前驅戊寅自將大兵繼之慕容彦超方食得詔捨匕筯入朝帝悉以軍事委之已卯呉䖍𥙿入朝帝聞郭威舉兵南向議發兵拒之前開封尹侯益曰鄴都戍兵家屬皆在京師官軍不可輕出不若閉城以挫其鋒使其母妻登城招之可不戰而下也慕容彦超曰侯益衰老爲懦夫計耳帝乃遣益及閻晉卿呉䖍裕前保大節度使張彦超將禁軍趣澶州是日郭威已至澶州李洪義納之王殷迎謁慟哭以所部兵從郭威涉河帝遣内養鸗脫覘郭威威獲之以表置鸗脫衣領中使歸自帝曰臣昨得詔書延頸俟死郭崇威等不忍殺臣云此皆陛下左右貪權無厭者譛臣耳逼臣南行詣關請罪臣求死不獲力不䏻制臣數日當至闕廷陛下若以臣爲有罪安敢逃刑若實有譛臣者願執付軍前以快衆心臣敢不撫諭諸軍退歸鄴都庚辰郭威趣滑州辛巳義成節度使宋延渥迎降延渥洛陽人其妻高祖女永寧公主也郭威取滑州庫物以勞将士且諭之曰聞侯令公已督諸軍自南來今遇之交戰則非入朝之義不戰則爲其所屠吾欲全汝曹功名不若奉行前詔吾死不恨皆曰國家負公公不負國所以萬人争奮如報私讎侯益輩何能爲乎王峻狥於衆曰我得公處分俟克京城聽旬日剽掠衆皆踊躍辛巳鸗脫至大梁前此帝議自往澶州聞郭威已至河上而止帝甚有悔懼之色私謂竇貞固曰屬者亦太草草李業等請傾府庫以賜諸軍蘇禹珪以爲未可業拜禹珪於帝前曰相公且爲天子勿惜府庫乃賜禁軍人二十緍下軍半之將士在北者給其家仍使通家信以誘之壬午郭威軍至封丘人情忷懼太后泣曰不用李濤之言宜其亡也慕容彦超恃其驍勇言於帝曰臣視北軍猶蠛蠓耳當爲陛下生致其魁退見聶文進問北來兵數及將校姓名頗懼曰是亦劇賊未易輕也帝復遣左神武統軍袁㠖前威勝節度使劉重進等帥禁軍與候益等㑹屯赤岡㠖象先之子也彦超以大軍屯七里店癸未東北軍遇於劉子陂帝欲自出勞軍太后曰郭威吾家勤舊非死亡切身何至此但按兵守城飛詔諭之觀其志趣必有辭理則君臣之禮尚全慎勿輕出帝不從時扈從軍甚盛太后遣使戒聶文進曰大須在意對曰有臣在雖郭威百人可擒也至暮兩軍不戰帝還宫慕容彦超大言曰陛下來日宫中無事幸再出觀臣破賊臣不必與之戰但叱散使歸營耳甲申帝欲再出太后力止之不可旣陳郭威戒其衆曰吾來誅羣小非敢敵天子也愼勿先動久之慕容彦超引輕騎直前奮擊郭崇威與前博州剌史李榮帥騎兵拒之彦超馬倒㡬獲之彦超引兵退麾下死者百餘人於是諸軍奪氣稍稍降於北軍侯益呉䖍𥙿張彦超袁㠖劉重進皆潜往見郭威威各遣還營又謂宋延渥曰天子方危公近親宜以牙兵往衛乗輿且附奏陛下願乗間早幸臣營延渥未至御營亂兵雲擾不敢進而還比暮南軍多歸於北慕容彦超與麾下十餘騎犇還兖州是夕帝獨與三相及從官數十人宿於七里寨餘皆逃潰乙酉旦郭威望見天子旌旗在高板上下馬免胄往從之至則帝巳去矣帝䇿馬將還宫至玄化門劉銖在門上問帝左右兵馬何在因射左右帝回轡西北至趙村追兵巳至帝下馬入民家爲亂兵所殺蘇逢吉閻晉卿郭允明皆自殺聶文進挺身走軍士追斬之李業奔陜州後匡贊犇兖州郭威聞帝遇弑號慟曰老夫之罪也威至玄化門劉銖雨射城外威自迎春門入歸私第遣前曹州防御史何福進將兵守明德門諸軍大掠通夕煙火四發軍士入前義成節度使白再榮之第執再榮盡掠其財旣而進曰某等昔嘗趨走麾下一旦無禮至此何靣目復見公遂刎其首而去吏部侍郎張允家貲以萬計而性吝雖妻亦不之委常自繫衆鑰於衣下行如環珮是夕匿於佛殿藻井之上登者浸多板壞而墜軍士掠其衣遂以凍卒𥘉作坊使賈延徽有寵於帝與魏仁浦爲鄰欲併仁浦所居以自廣屢譛仁浦於帝㡬至不測至是有擒延徽以授仁浦者仁浦謝曰因亂而報怨吾所不爲也郭威聞之待仁浦益厚右千牛衛大將軍棗疆趙鳯曰郭侍中舉兵欲誅君側之惡以安國家耳而鼠輩敢爾乃賊也豈侍中意耶執弓矢踞胡床坐於巷首掠者至輒射殺之里中皆頼以全丙戍獲劉銖李洪建囚之銖謂其妻曰我死汝且爲人婢乎妻曰以公所爲雅當然耳王殷郭崇威言於郭威曰不止剽掠今夕止有空城耳威乃命諸將分部禁止掠者不從則斬之至晡乃定竇貞固蘇禹珪自七里寨逃歸郭威使人訪求得之㝷復其位貞固爲相值楊史弄權李業等作亂但以凝重處其間自全而巳郭威命有司遷隱帝梓宫於西宫或請如魏高貴郷公故事葬以公禮威不許曰倉猝之際吾不能保衛乗輿罪巳大矣況敢貶君乎太師馮道帥百官謁見郭威威見猶拜之道受拜如平時徐曰侍中此行不易丁亥郭威帥百官詣明徳門起居太后且奏稱軍國事殷請早立嗣君太后誥稱郭允明弑逆神器不可無主河東節度使崇忠武節度使信皆高祖之弟武寧節度使贇開封尹勲高祖之子其令百官議擇所宜贇崇之子也高祖愛之養視如子郭威王峻入見太后於萬歲宫請以勲爲嗣太后曰勲乆羸疾不能起威出諭諸將諸將請見之太后令左右以卧榻舉之示諸將諸將乃信之於是郭威與峻議立贇巳丑郭威帥百官表請以贇承大統太后誥所司擇日備灋駕迎贇即皇帝位郭威奏遣太師馮道及樞宻直學士王度祕書監趙上交詣徐州奉迎郭威之討三叛也毎見朝廷詔書處分軍事皆合機宜問使者誰爲此詔使者以翰林學士范質對威曰宰相噐也入城訪求得之甚喜時大雪威解所服紫袍衣之令草太后誥令迎新君儀注蒼黃之中討論撰定皆得其宜𥘉隱帝遣供奉官押班陽曲張永德賜昭義節度使常思生辰物永德郭威之壻也㑹楊邠等誅宻誅思殺永德思素聞郭威多竒異囚永德以觀變及威克大梁思乃釋永德而謝之庚寅郭威帥羣臣上言比皇帝到闕動渉浹旬請太后臨朝聽政壬辰太后始臨朝以王峻爲樞密使袁義爲宣徽南院使王殷爲侍衛馬歩軍都指揮使郭崇威為侍衛馬軍都指揮使曹威爲侍衛歩軍都指揮使陳州剌史李穀權判三司劉銖李洪建及其黨皆梟首於市而赦其家郭威謂公卿曰劉銖屠吾家吾復屠其家怨讎反覆庸有極乎由是數家獲免王殷屢爲洪建請免死郭威不許後匡贊至兖州慕容彦超執而獻之李業至陜州其兄保義節度使洪倍不敢匿於家業懷金將奔晉陽至絳州盗殺之而取其金鎭將邢州奏契丹主將數萬騎入宼攻内丘五日不克死傷甚衆有戍兵五百叛應契丹引契丹入城屠之又䧟饒陽太后敇郭威將大軍擊之國事權委竇貞固蘇禹珪王峻軍事委王殷十二月甲午朔郭威發大梁丁酉以翰林學士户部侍郎范質爲樞宻副使武寧節度使贇留右都押牙鞏廷美元從教練使楊温守徐州與馮道等西來在道仗衛皆如王者左右呼萬歳郭威至滑州留數日贇遣使慰勞諸將受命之際相顧不拜私相謂曰我輩屠䧟京師其罪大矣若劉氏復立我輩尚有種乎己酉威聞之即引兵趣澶州辛亥遣蘇禹珪如宋州迎嗣君壬子郭威度河館于澶州癸丑旦將發將士數千人忽大譟威命閉門將士踰垣登屋而入曰天子須侍中自爲之將士巳與劉氏爲仇不可立也或裂黄旗以被威體共扶抱之呼萬歳震地因擁威南行威乃上太后牋請奉漢宗廟事太后爲母丙辰至韋城下書撫諭大梁士民以昨離河上在道秋毫不犯勿有憂疑戊午威至七里店竇貞固帥百官出迎拜謁因勸進威營於臯門村武寧節度使贇巳至宋州王峻王殷聞澶州軍變遣侍衛馬軍都指揮使郭崇威將七百騎往拒之又遣前申州刺史馬鐸將兵詣許州廵檢崇威忽至宋州陳於府門外贇大驚闔門登樓詰之對曰澶州軍變郭公慮陛下未察故遣崇威來宿衛無它也贇召崇威崇威不敢進馮道出與崇威語崇威乃登樓贇執崇威手而泣崇威以郭威意安諭之少頃崇威岀時護聖指揮使張令超帥部兵爲贇宿衛徐州判官董裔說贇曰觀崇威視瞻舉措必有異謀道路皆言郭威巳爲帝而陛下深入不止禍其至哉請急召張令超諭以禍福使夜以兵刼崇威奪其兵明日掠睢陽金帛募士卒北走晉陽彼新定京邑未暇追我此䇿之上也贇猶豫未決是夕崇威密誘令超令超帥衆歸之贇大懼郭威遺贇書云爲諸軍所迫召馮道先歸留趙上交王度奉侍道辭行贇曰寡人此來所恃者以公三十年舊相故無疑耳今崇威奪吾衞兵事危矣公何以爲計道黙然客將賈貞數目道欲殺之贇曰汝輩勿草草此無預馮公事崇威遷贇於外館殺其腹心董裔賈貞等數人己未太后誥廢贇爲湘隂公馬鐸引兵入許州劉信惶惑自殺庚申太后誥以侍中監國百官藩鎭相繼上表勸進壬戍夜監國營有歩軍將校醉揚言曏者澶州騎兵扶立今歩兵亦欲扶立監國斬之後周太祖廣順元年春正月丁卯漢太后下誥授監國符寳即皇帝位監國自臯門入宫即位於崇元殿制曰朕周室之裔虢叔之後國號宜曰周攺元大赦楊邠史弘肇王章等皆贈官官爲斂葬仍訪其子孫叙用之凡倉場庫務掌納官吏無得收斗餘稱耗舊所進羡餘物悉罷之犯竊盜及姦者竝依晉天福元年以前刑名罪人非反逆無得誅及親族籍没家貲唐莊宗明宗晉高祖各置守陵十戸漢高祖陵職貟官人時月薦享及守陵户竝如故𥘉唐衰多盜不用律文更定峻灋竊盜贓三匹者死晉天福中加至五匹姦有夫婦人無問彊和男女竝死漢灋竊盜一錢以上皆死又罪非反逆往往族誅籍没故帝即位首革其弊𥘉楊邠以功臣國戚爲方鎭者多不閑吏事乃以三司軍將𥙷都押牙孔目官内知客其人自恃敇𥙷多専横節度使不能制至是悉罷之戊辰以前復州防禦使王彦超權武寧節度使漢李太后遷居西宫巳已上尊號曰昭聖皇太后癸酉加王峻同平章事以衛尉卿劉皥主漢隱帝之喪𥘉河東節度使兼中書令劉崇聞隱帝遇害欲起兵南向聞迎立湘隂公乃止曰吾兒爲帝吾又何求太原少尹李驤隂說崇曰觀郭公之心終欲自取公不如疾引兵逾太行據孟津俟徐州相公即位然後還鎭則郭公不敢動矣不然且爲所賣崇怒曰腐儒欲離閒吾父子命左右曵岀斬之驤呼曰吾負經濟之才而爲愚人謀事死固甘心家有老妻願與之同死崇并其妻殺之且奏於朝廷示無二心及贇廢崇乃遣使請贇歸晉陽詔報以湘隂公比在宋州今方取歸京師必令得所公勿爲憂公能同力相輔當加王爵永鎭河東鞏廷美楊温聞湘隂公贇失位奉贇妃董氏據徐州拒守以俟河東援兵帝使贇以書諭之廷美温欲降而懼死帝復遺贇書曰爰念斯人盡心於主足以賞其忠義何由責以悔尤俟新節度使入城當各除刺史公可更以委曲示之丙子帝帥百官詣西宫爲漢隱帝舉哀成服皆如天子禮慕容彦超遣使入貢帝慮其疑懼賜詔慰安之曰今兄事巳至此言不欲䌓望弟扶持同安億兆戊寅殺湘隂公於宋州是日劉崇即皇帝位於晉陽仍用乾祐年號所有者并汾忻代嵐憲隆蔚沁遼麟石十二州之地以節度判官鄭珙爲中書侍郎觀察判官滎陽趙華爲户部侍郎並同平章事以次子承鈞爲侍衛親軍都指揮使太原尹以節度副使李存環爲城州防禦使禆將武安張元徽爲馬歩軍都指揮使陳光𥙿爲宣徽使北漢主謂李存瓌張元徽曰朕以高祖之業一朝墜地今日位號不得巳而稱之顧我何是天子汝曹是何節度使邪由是不建宗廟祭祀如家人宰相俸錢月止百緍節度使止二十緡自餘薄有資給而已故其國中少廉吏客省使河南李光美甞爲直省頗諳故事北漢朝廷制度皆出於光美北漢主聞湘隂公死哭曰吾不用忠臣之言以至於此爲李驤立祠歳時祭之已卯以太師馮道爲中書令加竇貞固侍中蘇禹珪司空𥘉北漢主立契丹主使聿撚遺劉承鈞書北漢主使承鈞復書稱本朝淪亡紹襲帝位欲循晉室故事求援北朝契丹主大喜北漢主發兵屯隂地黃澤團栢丁亥以承鈞爲招討使與副招討使白從暉都監李存瓌將歩騎萬人宼晉州從暉吐谷渾人也郭崇威更名崇曹威更名英二月丁酉以皇子天雄牙内都指揮使榮爲鎭寧節度使選朝士爲之僚佐以侍御史王敏爲節度判官右𥙷闕崔頌爲觀察判官校書郎王朴爲掌書記頌恊之子朴東平人也戊戍北漢兵五道攻晉州節度使王晏閉城不出劉承鈞以爲怯蟻附登城晏伏兵奮擊北漢兵死傷者千餘人承鈞遣副兵馬使安元寳焚晉州西城元寳來降承鈞乃移軍攻隰州癸卯隰州刺史許遷遣歩軍都指揮使孫繼業迎擊北漢兵於長壽材執其將程筠等殺之未幾北漢兵攻州城數日不克死傷甚衆乃引兵去遷鄆州人也丁未契丹主遣其臣臬骨支與朱憲偕來賀即位丁巳遣尚書右丞田敏使契丹北漢主遣通事舎人李𧦬使于契丹乞兵爲援詔加奉寧節度使慕容彦超中書令遣翰林學士魚崇諒詣兖州諭指崇諒即崇逺也彦超上表謝三月壬戍詔報之曰向以前朝失德少主用讒倉猝之間召卿赴闕卿即奔馳應命信宿至京救國難而不顧身聞君召而不俟駕以至天亡漢祚兵散梁郊降將敗軍相繼而至卿即便回馬首徑返龜隂爲主爲時有終有始所謂危亂見忠臣之節疾風知勁草之心若使爲臣者皆能如兹則有國者誰不欲用所言朕潛龍河朔之際平難浚郊之時縁不奉示諭之言亦不得差人至行闕且事主之道何必如斯若或二三於漢朝又安肯忠信於周室以此爲懼不亦過乎卿但悉力推心安民體國事朕之節如事故君不惟黎庶獲安抑亦社稷是頼但堅表率未議替移由衷之誠言盡於此王彦超奏克徐州殺鞏廷美北漢李𧦬至契丹契丹主使拽剌梅里報之夏四月契丹主遣使如北漢告以周使田敏來約歳輸錢十萬緍北漢主使鄭攻以厚賂謝契丹自稱姪皇帝致書於叔天授皇帝請行冊禮五月巳巳遣左金吾將軍姚漢英等使于契丹契丹留之辛未北漢禮部侍郎同平章事鄭珙卒于契丹六月辛亥以樞密使同平章事王峻爲左僕射兼門下侍郎樞密副使兵部侍郎范質戸部侍郎判三司李穀爲中書侍郎竝同平章事穀仍判三司司徒兼侍中竇貞固司空兼中書侍郎同平章事蘇禹珪竝罷守本官癸丑范質參知樞宻院事丁巳以宣徽北院使翟光鄴兼樞密副使𥘉帝討河中巳爲人望所屬李穀時爲轉運使帝數以微言諷之穀但以人臣盡節爲對帝以是賢之即位首用爲相時國家新造四方多故王峻夙夜盡心知無不爲軍旅之謀多所禆益范質明敏彊記謹守灋度李穀沈毅有器略在帝前論議辭氣忼慨善譬諭以開主意契丹遣燕王述軋等冊命北漢主爲大漢神武皇帝妃爲皇后北漢主更名旻秋七月北漢主遣翰林學士博興衛融等詣契丹謝冊禮且請兵八月壬戍葬漢隱帝于潁陵九月北漢主遣招討使李存瓌將兵自團栢入宼契丹欲引兵㑹之與酋長議於九十九泉諸部皆不欲南宼契丹主彊之癸亥行至新州之西火神淀燕王述軋及偉王之子太寧王漚僧作亂弑契丹主而立述軋契丹主德光之子齊王述律逃入南山諸部奉述律以攻述軋漚僧殺之并其族黨立述律爲帝攺元應曆自火神淀入幽州遣使告干北漢北漢主遣樞密直學士上黨王得中如契丹賀即位復以叔父事之請兵以擊晉州契丹主年少好遊戲不親國事毎夜酣飲逹旦乃寐日中方起國人謂之睡王後更名明冬十月辛卯潞州廵檢陳思讓敗北漢兵於虒亭契丹遣彰國節度使蕭禹厥將奚契丹五萬㑹北漢兵入宼北漢主自將兵二萬自隂地關宼晉州丁未軍于城北三靣置寨晝夜攻之遊兵至絳州時王晏巳離鎭王彦超未至巡檢使王萬敢權知晉州與龍捷都指揮使史彦超虎捷指揮使何徽共拒之史彦超雲州人也十一月帝以北漢契丹之兵猶在晉州甲子以王峻爲行營都部署將兵救之詔諸軍皆受峻節度聽以便宜從事得自選擇將吏乙丑峻行帝自至城西餞之王峻留陜州旬日帝以北漢攻晉州急憂其不守議自將由澤州路與峻㑹兵救之且遺使諭峻十二月戊子朔下詔以三日西征使者至陜峻因使者言於帝曰晉州城堅未易可拔劉崇兵鋒方銳不可力爭所以駐兵待其氣衰耳非臣怯也陛下新即位不宜輕動若車馬出汜水則慕容彦超引兵入汴大事去矣帝聞之自以手提耳曰幾敗吾事庚寅敇罷親征𥘉泰寧節度使兼中書令慕容彦超聞徐州平疑懼愈甚乃招納亡命畜聚薪糧潜以書結北漢吏獲其書以聞又遣人詐爲商人求援於唐帝遣通事舎人鄭好謙就申慰諭與之爲誓彦超益不自安屢遣都押牙鄭麟詣闕偽輸情欵實覘機事又獻天平節度使高行周書其言皆謗毀朝廷與彦超相結之意帝笑曰此彦超之詐也以書示行周行周上表謝恩旣而彦超反跡益露丙申遣閤門使張凝將兵赴鄆州廵檢以備之庚子王峻至絳州乙已引兵趣晉州晉州南有蒙阬最爲險要峻憂北漢兵據之是日聞前鋒已度蒙阬喜曰吾事濟矣慕容彦超奏請入朝帝知其詐即許之旣而復稱境内多盗未敢離鎭北漢主攻晉州乆不克㑹大雪民相聚保山寨野無所掠軍乏食契丹思歸聞王峻至蒙阬燒營夜遁峻入晉州諸將請亟追之峻猶豫未決明日乃遣行營馬軍都指揮使仇弘超都排陳使藥元福左廂排陳使陳思讓康延沼將騎兵追之及於霍邑縱兵奮擊北漢兵墜崖谷死者甚衆霍邑道隘延沼畏懦不急追由是北漢兵得度藥元福曰劉崇悉發其衆挾胡騎而來志吞晉絳今氣衰力憊狼狽而遁不乗此翦撲必爲後患諸將不欲進王峻復遣使止之遂還契丹比至晉陽士馬什喪三四蕭禹厥耻無功釘大酋長一人於市旬日而斬之北漢主始息意於進取北漢土瘠民貧内供軍國外奉契丹賦繁役重民不聊生逃入周境者甚衆二年正月慕容彦超發郷兵入城引泗水注壕中爲戰守之僃又多以旗幟授諸鎭將令募羣盜剽掠鄰境所在奉其反狀甲子敕沂密二州不復隷泰寧軍以侍衛歩軍都指揮使昭武節度使曹英爲都部署討彦超齊州防禦使史延超爲副部署皇城使河内向訓爲都監陳州防禦使藥元福爲行營馬歩都虞候帝以元福宿將命英訓無得以軍禮見之二人皆父事之唐主發兵五千軍于下邳以援彦超聞周兵將至退屯沭陽徐州廵檢使張令彬擊之大破唐兵殺溺死者千餘人獲其將燕敬權𥘉彦超以周室新造謂其易揺故北召北漢及契丹南誘唐人使侵邊鄙冀朝廷犇命不暇然後乗間而動及北漢契丹自晉州北走唐兵敗於沭陽彦超之勢遂沮壬申王峻自晉州還入見曹英等至兖州設長圍慕容彦超屢岀戰藥元福皆擊敗之彦超不敢岀十餘日長圍合遂進攻之𥘉彦超將反判官崔周度諫曰魯詩書之國自伯禽以來不能霸諸侯然以禮義守之可以長世公於國家非有私憾胡爲自疑況主上開諭勤至苟撤僃歸誠則坐享泰山之安矣獨不見杜中令安襄陽李河中竟何所成乎彦超怒以周度阿庇司馬閻弘等斬於市夏四月帝以曹英等攻兖州乆未克乙卯下詔親征以李穀權東京留守兼判開封府鄭仁誨權大内都㸃檢又以侍衛馬軍都指揮使郭崇充在京都廵檢五月庚申帝發大梁戊辰至兖州已巳帝使人招諭慕容彦超城上人語不遜庚午命諸軍進攻先是術者紿彦超云鎭星行至角亢角亢兖州之分其下有福彦超乃立祠而禱之令民家皆立黃幡彦超性貪吝官軍攻城急猶瘞藏珍寳由是人無鬪志將卒相繼有岀降者乙亥官軍克城彦超方禱鎭星祠帥衆力戰不勝乃焚鎭星祠與妻赴井死子繼勲出走追獲殺之官軍大掠城中死者近萬人丁丑以端明殿學士顔衎權知兖州事癸未降泰寧軍爲防禦州顯徳元年春正月壬辰帝殂晉王榮即帝位北漢主聞太祖晏駕甚喜謀大舉入宼遣使請兵于契丹二月契丹遣其武定節度使政事令楊衮將萬餘騎如晉陽北漢主自將兵三萬以義兵節度使白從暉爲行軍都部署武寧節度使張元徽爲前鋒都指揮使與契丹自團栢南趣潞州北漢兵屯梁侯驛昭義節度使李筠遣其將穆令均將歩騎二千逆戰筠自將大軍壁於太平驛張元徽與令均戢陽不勝而北令均逐之伏發殺令均俘斬士卒千餘人筠遁歸上黨嬰城自守筠即李勞也避上名攺焉世宗聞北漢主入宼欲自將兵禦之羣臣皆曰劉崇自平陽遁走以來勢蹙氣沮必不敢自来陛下新即位山陵有日人心易揺不宜軽動宜命將禦之帝曰崇幸我大喪輕朕年少新立有吞天下之心此必自來朕不可不往馮道固争之帝曰昔唐太宗定天下未甞不自行朕何敢偷安道曰未審陛下能爲唐太宗否帝曰以吾兵力之彊破劉崇如山壓卵耳道曰未審陛下能爲山否帝不悅惟王溥勸行帝從之三月北漢乗勝進逼潞州丁丑詔天雄節度使苻彦卿引兵自磁州固鎭岀北漢軍後以鎭寧節度使郭崇副之又詔河中節度使王彦超引兵自晉州東出邀北漢軍以保義節度使韓通副之又命馬軍都指揮使寧江節度使樊愛能歩軍都指揮使清淮節度使何徽義成節度使白重􅐌鄭州防禦使史彦超前耀州團練使苻彦能將兵先趣澤州宣徽使何訓監之重􅐌憲州人也癸未帝命馮道秦梓宫赴山陵以鄭仁誨爲東京留守乙酉帝發大梁庚寅至懷州帝欲兼行速進控鶴都指揮使眞定趙晁私謂通事舎人鄭好謙曰賊勢方盛宜持重以挫之好謙言於帝帝怒曰汝安得此言必爲人所使言其人則生不然必死好謙以實對帝命并晁械於州獄壬辰帝過澤州宿於州東北北漢主不知帝至過潞州不攻引兵而南是夕軍於高平之南癸巳前鋒與北漢兵遇擊之北漢兵却帝慮其遁去趣諸軍亟進北漢主以中軍陳於巴公原張元徽軍其東楊衮軍其西衆頗嚴整時河陽節度使劉詞將後軍未至衆心危懼而帝志氣益銳命曰重􅐌與侍衞馬歩都虞候李重進將左軍居西樊愛能何徽將右軍居東向訓史彦超將精騎居中央殿前都指揮使張永德將禁兵衛帝帝介馬自臨陣督戰北漢主見周軍少悔召契丹謂諸將曰吾自用漢軍可破也何必契丹今日不帷克周亦可使契丹心服諸將皆以爲然楊衮䇿馬前望周軍退謂北漢主曰勍敵也未可輕進北漢主奮髯曰時不可失請公勿言試觀我戰衮黙然不恱時東北風方盛俄而忽轉南風北漢副樞密使王延嗣使司天監李義白北漢主云時可戰矣北漢主從之樞密直學士王得中扣馬諫曰義可斬也風勢如此豈助我者邪北漢主曰吾計巳決者書生勿妄言且斬汝麾東軍先進張元徽將千騎擊周右軍合戰未幾樊愛能何徽引騎兵先遁右軍潰歩兵千餘人解甲呼萬歲降于北漢帝見軍勢危自引親兵犯矢石督戰太祖皇帝時爲宿衛將謂同列曰主危如此吾屬何得不致死又謂張永德曰賊氣驕力戰可破也公麾下多能左射者請引兵乗高西出爲左翼我引兵爲右翼以擊之國家安危在此一舉永德從之各將二千人進戰太祖皇帝身先士卒馳犯其鋒士卒死戰無不一當百北漢兵披靡内殿直夏津馬仁瑀謂衆曰使乗輿受敵安用我輩躍馬引弓大呼連斃數十人士氣益振殿前右畨行首馬全又言於帝曰賊勢極矣將爲我擒願陛下按轡勿動徐觀諸將破之即引數百騎進䧟陳北漢主知帝自臨陳襃賞張元徽趣使乗勝進兵元徽前略陳馬倒爲周兵所殺元徽北漢之驍將也北軍由是奪氣時南風益盛周兵爭奮北漢兵大敗北漢主自舉赤幟收兵不能止楊衮畏周兵之彊不敢救且恨北漢主之語全軍而退樊愛能何徽引數千騎南走控弦露刃剽掠輜重役徒驚走失亡甚多帝遣近臣及親軍校追諭止之契肯奉詔使者或爲軍士所殺揚言契丹大至官軍敗績餘衆巳降虜矣劉詞遇愛能等於塗愛能等止之詞不從引兵而北時北漢主尚有餘衆萬餘人阻澗而陳薄暮詞至復與諸軍擊之北漢兵又敗殺王延嗣追至高平僵尸滿山谷委棄御物及輜重器械雜畜不可勝紀是日帝宿於野次得歩兵之降敵者皆殺之樊愛能等聞周兵大捷與士卒稍稍復還有逹曙不至者甲午休兵干高平選北漢降卒數千人爲效順指揮命前武勝行軍司馬唐景思將之使戍淮上餘二千餘人賜貲裝縱遣之李穀爲亂兵所迫潜竄山谷數日乃出丁酉帝至潞州北漢主自高平𬒳褐戴笠乗契丹所贈黃騮帥百餘騎由雕窠嶺遁歸宵迷倩村民爲導誤之晉州行百餘里乃覺之殺導者晝夜北走所至得食未舉筯或傳周兵至輒蒼黃而去北漢主衰老力憊伏於馬上晝夜馳驟殆不能支僅得入晉陽帝欲誅樊愛能等以肅軍政猶豫未決己亥晝臥行宫帳中張辰徳侍側帝以其事訪之對曰愛能等素無大功忝冐節鐡望敵先逃死未塞責且陛下方欲削平四海茍軍灋不立雖有熊羆之士百萬之衆安得而用之帝擲枕於地大呼稱善即收愛能徽及所部軍使以上七十餘人責之曰汝輩皆累朝宿將非不能戰今望風奔遁者無它正欲以朕爲竒貨賣與劉崇耳悉斬之帝以何徽先守晉州有功欲免之旣而以灋不可廢遂并誅之而給槥車歸葬自是驕將惰卒始知所懼不行姑息之政矣庚子賞高平之功以李重進兼忠武節度使向訓兼義成節度使張永德兼武信節度使史彦超爲鎭國節度使張永德盛稱太祖皇帝之智勇帝擢太祖皇帝爲殿前都虞候領嚴州剌史以馬仁瑀爲控鶴弓箭直指揮使馬全乂爲散䏍指揮使自餘將校遷拜者凡數十人士卒有自行間擢主軍廂者釋趙晁之囚北漢主收散卒繕甲兵完城塹以僃周楊衮將其衆北屯代州北漢主遣王得中送衮因求救於契丹契丹主遣得中還報許發兵救晉陽壬寅以苻彦卿爲河東行營都部署兼知太原行府事以郭崇副之向訓爲都監李重進爲馬歩都虞候史彦超爲先鋒都指揮使將歩騎二萬發潞州仍詔王彦超韓通自隂地關入與彦卿合軍而進又以劉詞爲隨駕部署保大節度使白重賛副之夏四月北漢盂縣降苻彦卿軍晉陽城下王彦超攻汾州北漢防禦使董希顔降帝遣萊州防禦使康延沼攻遼州宻州防禦使田瓊攻沁州皆不可供僃庫副使太原李謙溥單騎說遼州刺史張漢超漢超即降乙卯葬聖神恭肅文武孝皇帝于嵩陵廟號太祖𥘉帝遣苻彦卿等北征但欲耀兵於晉陽城下未議攻取旣入北漢境其民爭以食物迎周師泣訴劉氏賦役之重願供軍須助攻晉陽北漢州縣繼有降者帝聞之始有兼并之志遣使往與諸將議之諸將皆言芻糧不足請且班師以俟再舉帝不聽旣而諸軍數十萬聚於太原城下軍士不免剽掠北漢民失望稍稍保山谷自固帝聞之馳詔禁止剽掠安撫農民止徴今歳租稅及募民入粟拜官有差仍發澤潞晉綘慈隰及山東近便諸州民運糧以饋軍巳未遣李穀詣太原計度芻糧庚申太師中書令瀛文懿王馮道卒道少以孝謹知名唐莊宗世始貴顯自是累朝不離將相三公三師之位爲人情儉寛弘人莫測其喜愠滑稽多智浮沈取容嘗著長樂老叙自述累朝榮遇之狀時人往往以徳量推之歐陽脩論曰禮義廉恥國之四維四維不張國乃滅亡禮義治人之大灋廉恥立人之大節況爲大臣而無廉恥天下其有不亂國家其有不亡者乎予讀馮道長樂老叙見其自述以爲榮其可謂無廉恥者矣則天下國家可從而知也予於五代得全節之士三死事之臣十有五皆武夫戰卒豈於儒者果無其人哉得非高節之士惡時之亂薄其世而不肯岀歟抑君天下者不足顧而莫能致之歟予甞聞五代時有王凝者家青齊之間爲虢州司戸參軍以疾卒于官凝家素貧一子尚㓜妻李氏携其子負其遺骸以歸東過開封府正於旅舎主人不納李氏顧天巳暮不肯去主人牽其臂而出之李氏仰天慟哭曰我爲婦人不能守節而此手爲人所執邪即引斧自斷其臂見者爲之嗟泣開封尹聞之白其事於朝厚䘏李氏而笞其主人嗚呼士不自愛其身而忍恥以偷生者聞季氏之風宜少知愧哉臣光曰天地設位聖人則之以制禮立法内有夫婦外有君臣婦之從夫終身不攺臣之事君有死無貳此人道之大倫也苟或廢之亂莫大焉范質稱馮道厚德稽古宏才偉量雖朝代遷貿人無問言屹若巨山不可轉也臣愚以爲正女不從二夫忠臣不事二君爲女不正雖復華色之美織紝之巧不足賢矣爲臣不忠雖復材智之多治行之優不足貴矣何則大節巳虧故也道之爲相歷五朝八姓若逆旅之視過客朝爲仇敵暮爲君臣易靣變辭曽無愧怍大節如此雖有小善庸足稱乎或以爲自唐室之亡羣雄力爭帝王興廢逺者十餘年近者三四年雖有忠智將若之何當是之時失臣節者非道一人豈得獨罪道哉臣愚以爲忠臣憂公如家見危致命君有過則彊諌力爭國敗亡則竭節致死智士邦有道則見邦無道則隱或滅迹山林或優遊下僚今道尊寵則冠三師權任則首諸相國存則依違拱嘿竊位素餐國亡則圖全苟免迎謁勸進君則興亡接踵道則冨貴自如兹乃姧臣之尤安得與它人爲比哉或謂道能全身逺害於亂世斯亦賢巳臣謂君子有殺身成仁無求生害仁豈專以全身逺害爲賢哉然則盜跖病終而子路醢果誰賢乎抑此非特道之愆也時君亦有責焉何則不正之女中士羞以爲家不忠之人中君羞以爲臣彼相前朝語其忠則反君事讎語其智則社稷爲墟後來之君不誅不棄乃復用以爲相彼又安肯忠於我而能獲其用乎故曰非特道之愆亦時君之責也辛酉苻彦卿奏北漢憲州剌史太原韓光愿嵐州剌史郭言皆舉城䧏王彦超韓通攻石州克之執刺史安彦追癸亥沁州剌史李廷誨降庚午帝發潞州趣晉陽癸酉北漢忻州監軍李勍殺剌史趙臯及契丹通事楊耨姑舉城降以勍爲忻州剌史五月丙子帝至晉州城下旗幟環城四十里楊衮疑北漢代州防禦使鄭處謙貳于周召與計事欲圖之處謙知之不往衮使胡騎數十守其城門處謙殺之因閉門拒衮衮奔歸契丹契丹主怒其無功囚之處謙與城來降丁丑置靜塞軍於代州以鄭處謙爲節度使契丹數千騎屯忻代之間爲北漢之援庚辰遣苻彦卿等將歩騎萬餘擊之彦卿入忻州契丹退保忻口丁亥置寧化軍於汾州以石沁二州隷之代州將桑珪解文遇殺鄭處謙誣奏云潜通契丹苻彦卿南請益兵癸巳遣李筠張永德將兵三千赴之契丹游騎時至忻州城下丙申彦卿與諸將陳以待之史彦超將二千騎爲鋒遇契丹與戰李筠引兵繼之殺契丹二千人彦超恃勇輕進去大軍浸逺衆寡不敵爲契丹所殺筠僅以身免周兵死傷甚衆彦卿退保忻州㝷引兵還晉陽府州防禦使折德扆將州兵來朝辛丑復置永安軍於府州以德扆爲節度使時大發兵夫東自懷孟西及蒲陜以攻晉陽不克㑹乆雨士卒疲病及史彦超死乃議引還𥘉王得中返自契丹值周兵圍晉陽留止代州及桑珪殺鄭處謙囚得中送于周軍帝釋之賜以帝馬問虜兵何時當至得中曰臣受命送楊衮它無所求或謂得中曰契丹許公發兵公不以實告契丹兵即至公得無危乎得中太息曰吾食劉氏禄有老母在圍中若以實告周人必發兵據險而拒之如此家國兩亡吾獨生何益不若殺身以全家國所得多矣甲辰帝以得中欺罔縊殺之乙巳帝發晉陽匡國節度使藥元福言於帝曰進軍易退軍難帝曰朕一以委卿元福乃勒兵成列而殿北漢果出兵追躡元福擊走之然軍還忽遽芻糧數十萬在城下者悉焚棄之軍中訛言相驚或相剽掠軍須失亡不可勝計所得北漢州縣周所置剌史等皆棄城走惟代州桑珪旣叛北漢又不敢歸周嬰城自守北漢遣兵攻抜之乙酉帝至潞州甲子至鄭州丙辰謁嵩陵庚午至大梁帝違衆議破北漢自是政事無大小皆親決百官受成於上而巳河南府推官高錫上書諫以爲四海之廣萬機之衆雖堯舜不能獨治必擇人而任之今陛下一以身親之天下不謂陛下聦明睿智足以兼百官之任皆言陛下𥚹迫疑忌舉不信羣臣也不若選能知人公正者以爲宰相能愛民聽訟者以爲守令能豐財足食者使掌金穀能原情守法者使掌刑獄陛下但垂拱明堂視其功過而賞罰之天下何憂不治何必降君尊而代臣職屈貴位而親賤事無乃失爲政之本乎帝不從錫河中人也北漢主憂憤成疾悉以國事委其子侍衛都指揮使承鈞𥘉帝與北漢主相拒於高平命前澤州刺史李彦崇將兵守江猪嶺遏北漢主歸路彦崇聞樊愛能等南遁引兵退北漢主果自其路遁去八月已酉貶彦崇率府副率冬十一月北漢主疾病命其子承鈞監國㝷殂遣使告哀于契丹契丹遣驃騎大將軍知内侍省事劉承訓冊命承鈞爲帝更名鈞北漢孝和帝性孝謹旣嗣位勤於爲政愛民禮士境内粗安毎上表於契丹主稱男契丹主賜之詔謂之兒皇帝三年夏四月北漢葬神武帝於交城北山廟號世祖世宗征淮南後周世宗顯德二年春三月上謂宰相曰朕毎思致治之方未得其要寢食不忘又自唐晉以來呉蜀幽并皆阻聲教未能混一宜命近臣著爲君難爲臣不易論及開邊䇿一篇朕將覽焉比部郎中王朴獻䇿以爲中國之失呉蜀幽并皆由失道今必先觀所以失之之原然後知所以取之之術其始失之也莫不以君暗臣邪兵驕民困姦黨内熾武夫外横因小致大積微成著今欲取之莫若返其所爲而巳夫進賢退不肖所以收其才也恩隱誠信所以結其心也賞功罰罪所以盡其力也去奢節用所以豐其財也時使薄歛所以阜其民也俟群才旣集政事旣治財用旣充士民旣附然後舉而用之功無不成矣彼之人觀我有必取之勢則知其情狀者願爲間諜知其山川者願爲郷導民心旣歸天意必從矣凡攻取之道必先其易者唐與吾接境幾二千里其勢易擾也擾之當以無僃之處爲始僃東則擾西僃西則擾東彼必奔走而救之奔走之間可以知其虚實彊弱然後避實擊虚避彊擊弱未須大舉且以輕兵擾之南人懦怯聞小有警必悉師以救之師數動則民疲而財竭不悉師則我可以乗虚取之如此江北諸州將悉爲我有旣得江北則用彼之民行我之法江南亦易取也得江南則嶺南巴蜀可傳檄而定南方旣定則燕地必望風内附若其不至移兵攻之庶幾可平矣惟河東必死之宼不可以恩信誘必當以彊兵制之然彼自高平之敗力竭氣沮必未能爲邊患宜且以爲後圖俟天下旣平然後伺間一舉可擒也今士卒精練甲兵有僃羣下畏法諸將效力期年之後可以岀師宜自夏秋蓄積實邊矣上欣然納之時羣臣多守常偷安所對少有可取者惟朴神峻氣勁有謀能斷凡所規畫皆稱上意上田是重其器識未幾遷左諫議大夫知開封府事唐主性和柔好文華而喜人順已由是謟䛕之臣多進用政事日亂旣克建州破湖南益驕有吞天下之志李守貞慕容彦超之叛皆爲之出師遥爲聲援又遣使自海道通契丹及北漢約共圖中國值中國多事未暇與之校先是毎冬淮水淺涸唐人常發兵戍守謂之把淺壽州監軍呉廷紹以爲疆場無事坐費資糧悉罷之清淮節度使劉仁贍上表固爭不能得十一月乙未朔帝以李穀爲淮南道前軍行營都部署兼知廬壽等行府事以忠武節度使王彦超副之督侍衛馬軍都指揮使韓令坤等十二將以伐唐令坤磁州武安人也汴水自唐末潰決自埇橋東南悉爲汚澤上謀擊唐先命武寧節度使武行德發民夫因故堤䟽導之東至泗上議者皆以爲難成上曰數年之後必獲其利唐人聞周兵將至而懼劉仁瞻神氣自若部分守禦無異平日衆情稍安唐主以神武統軍劉彦貞爲北靣行營都部署將兵二萬趣壽州舉化節度使同平章事皇甫暉爲應援使常州團練使姚鳯爲應援都監將兵三萬屯定逺召鎮南節度使宋齊丘還金陵謀國難以翰林承旨戸部尚書殷崇義爲吏部尚書知樞宻院事李穀等爲浮梁自正陽濟淮十二月甲戍穀奏王彦超敗唐兵二千餘人於壽州城下已卯又奏先鋒都指揮使白延遇敗唐兵千餘人於山口鎭帝詔呉越王弘俶使岀兵擊唐三年春正月丁酉李穀奏敗唐兵千餘人於上窑戊戌發開封府曹滑鄭州之民十餘萬築大梁外城庚子帝下詔親征淮南以宣徽南院使鎭安節度使向訓權東京留守端明殿學士王朴副之彰信節度使韓通權㸃檢侍衛司及在京内外都巡檢命侍衛都指揮使歸德節度使李重進將兵先赴正陽河陽節度使白重賛將親兵三千屯頴上壬寅帝發大梁李穀攻壽州乆不克唐劉彦貞引兵救之至來逺鎭拒壽州二百里又以戰艦數百艘趣正陽爲攻浮梁之勢李穀畏之召將佐謀曰我軍不能水戰若賊斷浮梁則腹背受敵皆不歸矣不如退守浮梁以待車駕上至圉鎭聞其謀亟遣中使乗驛止之比至巳焚芻糧退保正陽丁未帝至陳州亟遣李重進引兵趣淮上辛亥李穀奏賊艦中淮而進弩礮所不能及若浮梁不守則衆心動揺須至退軍今賊艦日進淮水日漲若車駕親臨萬一糧道阻絶其危不測願陛下且駐驛陳頴俟李重進至臣與之共度賊艦可禦浮梁可完立具奏聞但若厲兵秣馬春去冬來足使賊中疲弊取之未晚帝覽奏不恱劉彦貞素驕貴無才略不習兵所歷藩鎮專爲貪暴積財巨億以賂權要由是魏岑等爭譽之以爲治民如龔黄用兵如韓彭故周師至唐主首用之其禆將咸師㓪等皆勇而無謀聞李穀退喜引兵直抵正陽旌旗輜重數百里劉仁贍及池州剌史張全約固止之仁贍曰公軍未至而敵人先遁是畏公之威聲也安用速戰萬一失利則大事去矣彦貞不從旣行仁贍曰果遇必敗乃益兵乗城爲僃李重進度淮逆戰於正陽東大破之斬彦貞生擒咸師㓪等斬首萬餘級伏尸三十里收軍資器械三十餘萬是時江淮乆安民不習戰彦貞旣敗唐人大恐張全約收餘衆犇壽州劉仁贍表全約爲馬歩左廂都指揮使皇甫暉姚鳯退保清流關滁州剌史王紹顔委城走壬子帝至永寧鎭謂侍臣曰聞壽州圍解農民多歸村落今聞大軍至必復入城憐其聚爲餓殍宜先遣使存撫各令安業甲寅帝至正陽以李重進代李穀爲淮南道行營都招討使以穀判壽州行府事丙辰帝至壽州城下營於淝水之陽命諸軍圍壽州徙正陽浮梁於下蔡鎭丁巳徴宋亳陳潁徐宿許蔡等州丁夫數十萬以攻城晝夜不息唐兵萬餘人維舟於淮營於塗山之下庚申帝命太祖皇帝擊之太祖皇帝遣百餘騎薄其營而僞遁伏兵邀之大敗唐兵於渦口斬其都監何延錫等奪戰艦五十餘艘詔以武平節度使兼中書令王逵爲南面行營都統使攻唐之鄂州唐主聞湖南兵將至命武昌節度使何敬洙徙民入城爲固守之計敬洙不從使除地爲戰場曰敵至則與兵民俱死於此耳唐主善之二月丙寅下蔡浮梁成上自往視之戊辰廬壽光黃廵檢使元城司超奏敗唐兵三千餘人於盛唐擒都監高弼等獲戰艦四十餘艘上命太祖皇帝倍道襲清流關皇甫暉等陳於山下方與前鋒戰太祖皇帝引兵出山後暉等大驚走入滁州欲斷橋自守太祖皇帝躍馬麾兵渉水直抵城下暉曰人各爲其主願容成列而戰太祖皇帝笑而許之暉整衆而出太祖皇帝擁馬頸突陳而入大呼曰吾止取皇甫暉它人非吾敵也手劒擊暉中腦生擒之并擒姚鳯遂克滁州後數日宣祖皇帝爲馬軍副都指揮使引兵夜半至滁州城下傳呼開門太祖皇帝曰父子雖至親城門王事也不敢奉命明旦乃得入上遣翰林學士竇儀籍滁州帑藏太祖皇帝遣親吏取藏中絹儀曰公𥘉克城時雖傾藏取之無傷也今旣籍爲官物非有詔書不可得也太祖皇帝由是重儀詔左金吾衛將軍馬崇祚知滁州𥘉永興節度使劉詞遺表薦其幕僚薊人趙普有才可用㑹滁州平范質薦普爲滁州軍事判官太祖皇帝與語恱之時獲盜百餘人皆應死普請先訊鞫然後決所活什七八太祖皇帝益竒之太祖皇帝威名日盛毎臨陳必以繁纓飾馬鎧仗鮮明或曰如此爲敵所識太祖皇帝曰吾固欲其識之耳唐主遣泗州牙將王知㓪齎書抵徐州稱唐皇帝奉書大周皇帝請息兵修好願以兄事帝歳輸貨財以助軍費甲戍徐州以聞帝不荅戊寅命前武勝節度使候章等攻壽州水塞決其壕之西北隅導壕水入于淝太祖皇帝遣使獻皇甫暉等暉傷甚見上卧而言曰臣非不忠於所事但士卒勇怯不同耳臣曏日屢與契丹戰未甞見兵精如此因盛稱太祖皇帝之勇上釋之後數日卒帝詗知揚州無僃己卯命韓令坤等將兵襲之戒以母得殘民其李氏陵寢遣人與李氏人共守護之唐主兵屢敗懼亡乃遣翰林學士户部侍郎鍾謨工部侍郎文理院學士李德明奉表稱臣來請平獻御服茶藥及金器千兩銀器五千兩繒錦二千匹犒軍牛五百頭酒二千斛壬午至壽州城下謨德明素辯口上知其欲遊說盛陳甲兵而見之曰爾主自謂唐室苖裔宜知禮義異於它國與朕止隔一水未嘗遣一介修好惟泛海通契丹捨華事夷禮義安在且汝欲說我令罷兵邪我非六國愚主豈汝口舌所能移邪可歸語汝主亟來見朕再拜謝過則無事矣不然朕欲往觀金陵城借府庫以勞軍汝君臣得無悔乎謨德明戰栗不敢言呉越王弘俶遣兵屯境上以俟周命乙酉韓令坤奄至揚州平旦先遣白延遇以數百騎馳入城城中不之覺令坤繼至唐東都營屯使賈崇焚官府民舎棄城南走副留守工部侍郎馮延魯髠髪𬒳僧服匿於佛寺軍士執之令坤慰撫其民使皆安堵庚寅王逵奏拔鄂州長山寨執其將陳澤等獻之辛卯太祖皇帝奏唐天長制置使耿謙降獲芻糧二十餘萬韓令坤攻唐泰州拔之剌史方訥奔金陵唐主遣人以蠟丸求救於契丹壬辰靜安軍使何繼筠獲而獻之以給事中高防權知泰州月甲午朔上行視水寨至淝橋自取一石馬上持之至寨以供礮從官過橋者人齎一石太祖皇帝乗皮船入壽春壕中城上發連努射之矢大如屋椽牙將舘陶張瓊遽以身蔽之矢中瓊髀死而復蘇鏃着骨不可出瓊飲酒一大巵令人破骨出之流血數斗神色自若唐主復以右僕射孫晟爲司空遣與禮部尚書王崇質奉表入見稱自天祐以來海内分崩或跨據一方或遷革異代臣紹襲先業奄有江表顧以瞻烏未定附鳯何從今天命有歸聲教逺𬒳願比兩浙湖南仰奉正朔謹守土疆乞收薄伐之威赦其後服之罪首於下國俾作外臣則柔逺之德云誰不服又獻金千兩銀十萬兩羅綺二千匹晟謂馮延已曰此行當在左相晟若辭之則負先帝旣行知不免中夜歎息謂崇質曰君家百口宜自爲謀吾思之熟矣終不負永陵一培土餘無所知充舒黄招安巡檢使行光州剌史何超以安隨申蔡四州兵數萬攻光州丙申超奏唐光州剌史張紹棄城走都監張承翰以城降丁酉行舒州剌史郭令圖抜舒州唐蘄州將李福殺其知州王承㑺舉州來降遣六宅使齊藏珍攻黃州秦鳯之平也上赦所俘蜀兵以隷軍籍從征淮南復亡降于唐癸卯唐主表獻百五十人上悉命斬之丙午孫晟等至上所庚戍上遣中使以孫晟詣壽春城下示劉仁贍且招諭之仁贍見晟戎服拜於城上晟謂仁贍曰君受國厚恩不可開門納宼上聞之甚怒晟曰臣爲唐宰相豈可教節度使外叛邪上乃釋之唐王使李德明孫晟言於上請去帝號割壽濠泗楚光海六州之地仍歳輸金帛百萬以求罷兵上以淮南之地已半爲周有諸將捷奏日至欲盡得江北之地不許德明見周兵日進奏稱唐主不知陛下兵力如此之盛願寛臣五日之誅得歸白唐主盡獻江北之地上乃許之晟因奏遣王崇質與德明俱歸上遣供奉官安弘道送德明等歸金陵賜唐主詔書其略曰但存帝號何爽歳寒儻堅事大之心終不迫人于險又曰俟諸郡之悉來即大軍之立罷言盡於此更不煩云苟曰未然請從兹絶又賜其將相書使熟議而來唐主復上表謝李德明盛稱上威德及甲兵之彊勸唐主割江北之地唐主不恱宋齊丘以割地爲無益德明輕佻言多過實國人亦不之信樞密使陳覺副使李徴古素惡德明及孫晟使王崇質異其言因譛德明於唐主曰德明賣國求利唐主大怒斬德明於市唐主命諸道兵馬元帥齊王景逹將兵拒周以陳覺爲監軍使前武安節度使邊鎬爲應援都軍使中書舎人韓熈載上書曰信莫信於親王重莫重於元帥安用監軍使爲唐主不從遣鴻臚卿潘承祐詣泉建召募驍勇承祐薦前永安節度使許文稹靜江指揮使陳德誠建州人鄭彦華林仁肇唐主以文稹爲西靣行營應援使彦華仁肇皆爲將仁肇仁翰之弟也夏四月甲子以侍衛親軍都指揮使歸徳節度使李重進爲廬壽等州招討使以武徳節度使武行德爲濠州城下都部署唐右衞將軍陸孟俊自常州將兵萬餘人趣泰州周兵遁去孟俊復取之遣陳德誠戍泰州孟俊進攻揚州屯于蜀岡韓令坤棄揚州走帝遣張永徳將兵救之令坤復入楊州帝又遣太祖皇帝將兵屯六合太祖皇帝令曰楊州兵有過六合者折其足令坤始有固守之志帝自至壽春以來命諸軍晝夜攻城乆不克㑹大雨營中水深數尺攻具及士卒失亡頗多糧運不繼李德明失期不至乃議旋師或勸帝東幸濠州聲言壽州巳破從之已巳帝自壽春循淮而東乙亥至濠州韓令坤敗唐兵於城東擒陸孟俊唐齊王景逹將兵二萬自瓜歩濟江距六合二十餘里設柵不進諸將欲擊之太祖皇帝曰彼設柵自固懼我也今吾衆不滿二千若往擊之則彼見吾衆寡矣不如俟其來而擊之破之必矣居數日唐出兵趣六合太祖皇帝奮擊大破之殺獲近五千人餘衆尚萬餘走度江爭舟溺死者甚衆於是唐之精卒盡矣是戰也士卒有不致力者太祖皇帝陽爲督戰以劔斫其皮笠明日徧閱其笠有劒跡者數十人皆斬之由是部兵莫敢不盡死先是唐主聞揚州失守命四旁發兵取之巳卯韓令坤奏敗楚州兵萬餘人於灣頭堰獲漣州剌史秦進崇張永德奏敗泗州兵萬餘人於曲溪堰丙戍以宣徽南院使向訓爲淮南節度使兼㳂江招討使渦口奏新作浮梁成丁亥帝自濠州如渦口帝銳於進取欲自至楊州范質等以兵疲食少泣諫而止帝嘗怒翰林學士竇儀欲殺之范質入救之帝望見知其意即起避之質趨前伏地叩頭諌曰儀罪不至死臣爲宰相致陛下枉殺近臣罪皆在臣繼之以泣帝意解乃釋之五月壬辰朔以渦口爲鎭淮軍戊戍帝留侍衛親軍都指揮使李重進等圍壽州自渦口北歸乙卯至大梁六月壬申赦淮南諸州繫囚除李氏非理賦役事有不便於民者委長吏以聞侍衛歩軍都指揮使彰信節度使李繼勲營於壽州城南唐劉仁贍伺繼勲無僃出兵擊之殺士卒數百人焚其攻具唐駕部貟外郎朱元因奏事論用兵方略唐主以爲能命將兵復江北諸州秋七月唐將朱元取舒州剌史郭令圖棄城走李平取蘄州唐主以元爲舒州團練使平爲蘄州剌史元又取和州初唐人以茶鹽彊民而徴其粟帛謂之博徴又興營田於淮南民甚苦之及周師至爭奉牛酒迎勞而將帥不之恤專事俘掠視民如土芥民皆失望相聚山澤立堡壁自固操農器爲兵積紙爲甲時人謂之白甲軍周兵討之屢爲所敗先所得唐諸州多復爲唐有唐之援兵營於紫金山與壽州城中燃火相應淮南節度使向訓奏請以廣陵之兵併力攻壽春俟克城更圖進取詔許之訓封府庫以授楊州主者命楊州牙將分部按行城中秋毫不犯楊州民感悅軍還或負糗糒以送之滁州守將亦乗城去皆引兵趣夀春唐諸將請據險以邀周師宋齊丘曰如此則怨益深不如縱之以德於敵則兵易解也乃命諸將各自守毋得擅出擊周兵由是壽春之圍益急齊王景逹軍于濠州遥爲夀州聲援軍政皆出於陳覺景逹署紙尾而已擁兵五萬無決戰意將吏畏覺無敢言者八月殿前都指揮使義成節度使張永德屯下蔡唐將林仁肇等以水陸軍援壽春永德與之戰仁肇以船實薪芻因風縱火欲焚下蔡浮梁俄而風回唐兵敗退永德爲鐵綆千餘尺距浮梁十餘歩横絶淮流繫以巨木由是唐兵不能近冬十月癸酉李重進奏唐人宼盛唐鐵騎都指揮使王彦昇等擊之斬首三千餘級彦昇蜀人也壬午張永德奏敗唐兵於下蔡是時唐復以水軍攻永德永德夜令善游者没其船下縻以鐵鏁縱兵擊之船不得進退溺死者甚衆永德解金帶以賞善游者甲申以太祖皇帝爲定國節度使兼殿前都指揮使張永德與李重進不相悅永德密表重進有二心帝不之信時二將各擁重兵衆心憂恐重進一日單騎詣永德營從容宴飲謂永德曰吾與公幸以肺腑旣爲將帥奚相疑若此之深邪永德意乃解衆心亦安唐主聞之以蠟書遺重進誘以厚利其書皆謗毀及反間之語重進奏之初唐使者孫晟鍾謨從帝至大梁帝待之甚厚毎朝㑹班之於中書省官之後時召見飲以醇酒問以唐事晟但言唐主畏陛下神武事陛下無二心及得唐蠟書帝大怒召晟責以所對不實晟正色抗辭請死而巳問以唐虚實黙然不對十一月乙巳帝命都承旨曹翰送晟於右軍廵院更以帝意問之翰與之飲酒數行從容問之晟終不言翰乃謂曰有敇賜相公死晟神色怡然索靴笏整衣冠南向拜曰臣謹以死報國乃就刑并從者百餘人皆殺之貶鍾謨耀州司馬旣而帝憐晟忠節悔殺之召謨拜衞尉少卿十二月壬申以張永德爲殿前都㸃檢分命中使發陳蔡宋亳穎兖曹單等州丁夫數萬城下蔡是歳唐主詔淮南營田害民尤甚者罷之遣兵部郎中陳處堯持重幣浮海如契丹乞兵契丹不能爲之出兵而留處堯不遣處堯剛直有口辯乆之忿懟數面責契丹主契丹主亦不之罪也四年春正月周兵圍壽春連年未下城中食盡齊王景逹自濛州遣應援使永安節度使許文稹都軍使邊鎬北面招討使朱元將兵數萬泝淮救之軍於紫金山列十餘寨如連珠與城中烽火晨夕相應又築甬道抵壽春欲運糧以饋之綿亘數十里將及壽春李重進邀擊大破之死者五千人奪其二寨丁未重進以聞戊申詔以來月幸淮上劉仁贍請以邊鎬守城自帥衆決戰齊王景逹不許仁贍憤悒成疾其㓜子崇諫夜泛舟度淮北爲小校所執仁贍命腰斬之左右莫敢救監軍使周廷搆噐於中門以救之仁贍不許廷構復使求救於夫人夫人曰妾於崇諫非不愛也然軍法不可私名節不可虧若貸之則劉氏爲不忠之門妾與公何面目見將士乎趣命斬之然後成喪將士皆感泣議者以唐援兵尚彊多請罷兵帝疑之李穀寢疾在第二月丙寅帝使范質王溥就與之謀穀上䟽以爲壽春危困破在旦夕若鑾駕親征則將士爭奮援兵震恐城中知亡必可下矣上恱甲戍以王朴權東京留守兼判開封府事以三司使張美爲大内都廵檢以侍衛都虞候韓通爲京城内外都巡檢乙亥帝發大梁先是周與唐戰唐水軍鋭敏周人無以敵之帝毎以爲恨返自壽春於大梁城西汴水側造戰艦數百艘命唐降卒教北人水戰數月之後縱横出没殆勝唐兵至是命右驍衛大將軍王環將水軍數千自閔河㳂潁入淮唐人見之大驚乙酉帝至下蔡三月已丑夜帝度淮抵夀春城下庚寅旦躬擐甲胄軍於紫金山南命太祖皇帝擊唐先鋒寨及山北一寨皆破之斬獲三千餘級斷其甬道由是唐兵首尾不能相救至暮帝分兵守諸寨還下蔡唐朱元恃功頗違元帥節度陳覺與元有隙屢表元反覆不可將兵唐主以武昌節度使楊守忠代之守忠至濠州覺以齊王景逹之命召元詣濠州計事將奪其兵元聞之憤怒欲自殺門下客宋垍說元曰大丈夫何往不富貴何必爲妻子死乎辛卯夜元與先鋒壕寨使朱仁𥙿等舉寨萬餘人降禆將時厚卿不從元殺之帝慮其餘衆㳂流東潰遽命虎捷左廂都指揮使趙晁將水軍數千㳂淮而下壬辰旦帝軍于趙歩諸將擊唐紫金山寨大破之殺獲萬餘人擒許文稹邊鎬楊守忠餘衆果㳂淮東走帝自趙歩將騎數百循北岸追之諸將以歩騎循南岸追之水軍自中流而下唐兵戰溺死及降者殆四萬人獲船艦糧仗以十萬數晡時帝馳至荆山洪距趙歩二百餘里是夜宿鎭淮軍癸酉從官始至劉仁贍聞援兵敗扼吭歎息甲午發近縣丁夫數千城鎭淮軍爲二城夾淮水徙下蔡浮梁於其間扼濠壽應援之路㑹淮水漲唐濠州都監彭城郭廷謂以水軍沂淮欲掩不僃焚浮梁右龍武統軍趙匡􅐌覘知之㐲兵邀擊破之唐齊王景逹及陳覺皆自濠州犇歸金陵惟靜江指揮使陳德誠全軍而還戊戍以淮南節度使向訓爲武寧節度使淮南道行營都監將兵戍鎭淮軍已亥上自鎭淮軍復如下蔡庚子賜劉仁贍詔使自擇禍福唐主議自督諸將拒周中書舎人喬匡舜上䟽切諌唐主以爲沮衆流撫州唐主問神衛統軍朱匡業劉存忠以守禦方略匡業誦羅隱詩曰時來天地皆同力運去英雄不自由存忠以匡業言爲然唐主怒貶匡業撫州副使流存忠於饒州旣而竟不敢自出甲辰帝耀兵于壽春城北唐清淮節度使兼侍中劉仁贍病甚不知人丙午監軍使周廷􅌟營田副使孫羽等作仁贍表遣使奉之來降丁未帝賜仁贍詔遣閤門使萬年張保續入城宣諭仁贍子崇讓復出謝罪戊申帝大陳甲兵受降於壽春城北廷􅌟等舁仁贍出城仁贍卧不能起帝慰勞賜賚復令入城養疾庚戍徙壽州治下蔡赦州境死罪以下州民受唐文書聚山林者竝召令復業勿問罪有嘗爲其殺傷者毋得讎訟曏日政令有不便於民者令夲州條奏辛亥劉仁贍爲天平節度度兼中書令制辭略曰盡忠所事抗節無虧前代名臣幾人堪比朕之伐叛得爾爲多是日卒追賜爵彭城郡王唐主聞之亦贈太師帝復以清淮軍爲忠正軍以旌仁贍之節以右羽林統軍楊信爲忠正節度使同平章事詔開壽州倉賑飢民丙辰帝北還夏四月已巳至大梁甲申分江南降卒爲六軍三十指揮號懷德軍五月丁酉以太祖皇帝領義成節度使唐郭廷謂將水軍斷渦口浮梁又襲敗武寧節度使武行德于定逺行德僅以身免唐主以廷謂爲滁州團練使充上淮水陸應援使秋七月丁亥上治定逺軍及壽春城南之敗以武寧節度使兼中書令武行德爲左衛上將軍河陽節度使李繼勲爲右衛大將軍冬十月壬申帝發大梁十一月丙戍至鎭淮軍是夜五鼔濟淮丁亥至濠州城西濠州東北十八里有灘唐人柵其上環水自固謂周兵必不能渉戊子帝自攻之命内殿直康保裔帥甲士數百乗橐駝渉水太祖皇帝帥騎兵繼之遂拔之李重進破濠州南關城癸巳帝自攻濠州王審琦拔其水寨唐人屯戰船數百於城北植巨木於淮水以限周兵帝命水軍攻抜其木焚戰船七十餘艘斬首二千餘級又攻抜其羊馬城城中震恐丙申夜唐濠州團練使郭廷謂上表言臣家在江南今若遽降恐爲唐所種族請先遣使詣金陵禀命然後出降帝許之辛丑帝聞唐有戰船數百艘在渙水東欲救濠州自將兵夜發水陸擊之癸卯大破唐兵於洞口斬首五千餘級降卒二千餘人因鼔行而東所至皆下乙巳至泗州城下太祖皇帝先攻其南因焚城門破水寨及月城帝居于月城樓督將士攻城十二月乙卯唐泗州守將范再遇舉城降以再遇爲宿州團練使上自至泗州城下禁軍中芻蕘者毋得犯民田民皆感恱爭獻芻粟旣克泗州無一卒敢擅入城者帝聞唐戰船數百艘泊洞口遣騎詗之唐兵退保清口戊午旦上自將親軍自淮北進命太祖皇帝將歩騎自淮南進諸將以水軍自中流進共追唐兵時淮濱乆無行人葭葦如織多泥淖溝塹士卒乗勝氣苃渉爭進皆忘其勞庚申追及唐兵且戰且行金鼔聲聞數十里辛酉至楚州西北大破之唐兵有㳂淮東下者帝自追之太祖皇帝爲前鋒行六十里擒其保義節度使濠泗楚海都應援使陳承昭以歸所獲戰船燒沈之餘得三百餘艘士卒殺溺之餘得七千餘人唐之戰船在淮上者於是盡矣郭廷謂使者自金陵還知唐不能救命録事參軍鄱陽李延鄒草降表延鄒責以忠義廷謂以兵臨之延鄒擲筆曰大丈夫終不負國爲叛臣作降表廷謂斬之舉濠州降得兵萬人糧數萬斛唐主賞李延鄒之子以官壬戍帝濟淮至楚州營于城西北乙丑唐雄武軍使知漣水縣事崔萬迪降丙寅以郭廷謂爲亳州防禦使戊辰帝攻楚州克其月城庚午郭廷謂見於行宫帝曰朕南征以來江南諸將敗亡相繼獨卿能斷渦口浮梁破定逺寨所以報國足矣濠州小城使李璟自守能守之乎使將濠州兵攻天長帝遣鐵騎左廂都指揮使武守琦將騎數百趣楊州至高郵唐人悉焚楊州官府民居驅其人南度江後數日周兵至城中餘癃病十餘人而巳癸酉守琦以聞帝聞泰州無僃遣兵襲之丁丑拔泰州五年春正月丁亥右龍武將軍王漢璋奏克海州己丑以侍衛馬軍都指揮使韓令坤權楊州軍府事上欲引戰艦自淮入江阻北神堰不得度欲鑿楚州西北鸛水以通其道遣使行視還言地形不便計功甚多上自往視之授以規畫發楚州民夫浚之旬日而成用功甚省巨艦數百艘皆逹于江唐人大驚以爲神壬辰拔靜海軍始通呉越之路先是帝遣左諌議大夫長安尹日就等使呉越語之曰卿今去雖汎海比還淮南巳平當陸歸耳巳而果然周兵攻楚州踰四旬唐楚州防禦使張彦卿固守不下乙巳帝自督諸將攻之宿於城下丁未克之彦卿與都監鄭昭業猶帥衆拒戰矢刃皆盡彦卿舉繩床以鬪而死所部千餘人至死無一人降者荆南節度使髙保融遣指揮使魏璘將戰船百艘東下㑹伐唐至于鄂州唐以天長爲雄州以建武軍使易文贇爲剌史二月甲寅文贇舉城降戊午帝發楚州丁卯至楊州命韓令坤發丁夫萬餘築故城之東南隅爲小城以治之乙亥黃州剌史司超奏與控鶴右廂都指揮使王審琦攻唐舒州擒其剌史施仁望三月壬午朔帝如泰州唐太弟景遂前後凡十表辭位且言今國危不能扶請出就藩鎭燕王弘冀嫡長有軍功宜爲嗣謹奉上太弟寳冊齊王景逹亦以敗軍辭元帥唐主立景遂爲晉王加天䇿上將軍江南西道兵馬元帥洪州大都督太尉尚書令以景逹爲浙西道元帥潤州大都督景逹以浙西方用兵固辭攺撫州大都督立弘冀爲皇太子參決庶政辛卯上如迎鑾鎭屢至江口遣水軍擊唐兵破之上聞唐戰艦數百艘泊東㳍州將趣海口扼蘇杭路遣殿前都虞候慕容廷釗將歩騎右神武統軍宋延渥將水軍循江而下甲午延釗奏大破唐兵於東㳍州上遣李重進將兵趣廬州唐主聞上在江上恐遂南度又恥降號稱藩乃遣兵部侍郎陳覺奉表請傳位於太子弘冀使聽命於中國時淮南惟廬州舒蘄黃未下丙申覺至迎鑾見周兵之盛白上請遣人度江取表獻四州之地畫江爲境以求息兵辭指甚哀上曰朕本興師止取江北今爾主能舉國内附朕復何求覺拜謝而退丁酉覺請遣其屬閤門承旨劉承遇如金陵上賜唐主書稱皇帝恭問江南國主慰納之戊戍呉越奏遣上直都指揮使處州剌史邵可遷秀州剌史路彦銖以戰艦四百艘士卒萬七千人屯通州南岸唐主復遣劉承遇奉表稱唐國主請獻江北四州歳輸貢物數十萬於是江北悉平得州十四縣六十庚子上賜唐主書諭以縁江諸軍及兩浙湖南荆南兵竝當罷歸其廬蘄黃三道亦令斂兵近外俟彼將士及家屬皆就道可遣人召將校以城邑付之江中舟艦有須往來者竝令就北岸引之辛丑陳覺辭行又賜唐主書諭以不必傳位於子壬寅上自迎鑾復如楊州癸卯詔呉越荆南軍各歸本道賜錢弘俶犒軍帛三萬匹高保融一萬匹甲辰置保信軍於盧州以右龍武統軍趙匡賛爲節度使丙午唐主遣馮延已獻銀錢絹茶穀共百萬以犒軍已酉命宋延渥將水軍三千泝江廵警庚戍敕故淮南節度使揚行密故昇府節度使徐温等墓竝量給守戸其江南羣臣墓在江北者亦委長吏以時檢校辛亥唐主遣其臨汝公徐遼代巳來上壽五月詔賞勞南征士卒及淮南新附之民辛卯以太祖皇帝領忠武節度使唐主避周諱更名景下令去帝號稱國主凡天子儀制皆有降損去年號用周正朔仍告于太廟左僕射同平章事馮延巳罷爲太子太傅門下侍郎同平章事嚴續罷爲少傅樞密使兵部侍郎陳覺罷守本官初馮延已以取中原之䇿說唐主由是有寵延已常笑烈祖戢兵爲齷齪曰安陸所喪纔數千兵爲之輟食咨嗟者旬日此田舎翁識量耳安足與成大事豈如今上暴師數萬於外而擊毬宴樂無異平日眞英主也延已與其黨談論常以天下爲已任更相唱和翰林學士常夢錫屢言延己等浮誕不可信唐王不聽夢錫曰奸言似忠陛下不悟國必亡矣及臣服於周延已之黨相與言有謂周爲大朝者夢錫大笑曰諸分常欲致君堯舜何意今日自爲小朝邪衆黙然自唐主内附帝止因使者賜書未嘗遣使至其國已酉始命大府卿馮延魯衛尉少卿鍾謨使于唐賜以御衣玉帶等及犒軍帛十萬并今年欽天曆劉承遇之還金陵也唐主使陳覺白帝以江南無鹵田願得海陵鹽監南屬以贍軍帝曰海陵在江北難以交居當别有處分至是詔嵗支鹽三十萬斛以給江南所俘獲江南士卒稍稍歸之秋八月辛丑馮延魯鍾謨來自唐唐主手表謝恩其略曰天地之恩厚矣父母之恩深矣子不謝父人何報天惟有赤心可酬大造又乞比藩方賜詔書又稱有情事令鍾謨上奏乞令早還唐主復令謨白帝欲傳位太子九月丁巳以延魯爲刑部侍郎謨爲給事中已未先遣謨還賜書諭以未可傳位之意唐主復遣吏部尚書知樞密院殷崇義來賀天清節冬十一月乙丑唐主復遣禮部侍郎鍾謨入見𥘉唐大傅兼中書令楚國公宋齊丘多樹朋黨欲以專固朝權躁進之士争附之推奬以爲國之元老樞宻使陳覺副使李徴古恃齊丘之勢尤驕慢及許文稹等敗於紫金山覺與齊丘景逹自濠州遁歸國人忷懼唐主嘗歎曰吾國家一朝至此因泣下徴古曰陛下當治兵以扞敵涕泣何爲豈飲酒過量邪將乳毋不至邪唐主色變而徴古舉止自若㑹司天奏天文有變人主宜避位禳災唐主乃曰禍難方殷吾欲釋去萬機棲心沖寂誰可以托國者徴古曰宋公造國手也陛下如厭萬機何不舉國授之覺曰陛下深居禁中國事皆委宋公先行後聞臣等時入侍談釋老而已唐主心愠即命中書舎人豫章陳喬草詔行之喬惶恐請見曰陛下一署此詔臣不復得見矣因極言其不可唐主笑曰爾亦知其非邪乃止由是因晉王出鎭以徴古爲之副覺自周還亦罷近職鍾謨素與李徳明善以徳明之死怨齊丘及奉使歸唐言於唐主曰齊丘乗國之危遽謀篡竊陳覺李徴古爲之羽翼理不可容陳覺之自周還矯以帝命謂唐主曰聞江南連歳拒命皆宰相嚴續之謀當爲我斬之唐主知覺素與續有隙固未之信鍾謨請覆之於周唐主乃因謨復命上言乆拒王師皆臣愚迷非續之罪帝聞之大驚曰審如此則續乃忠臣朕爲天下主豈教人殺忠臣乎謨還以白唐主唐主欲誅齊丘等復遣謨入禀於帝帝以異國之臣無所可否十二月巳亥唐主命知樞密院殷崇義草詔暴齊丘覺徴古罪惡聽齊丘歸九華山舊隱官爵悉如故覺責授國子博士宣州安置徴古削奪官爵賜自盡黨與皆不問遣使告于周六年春正月唐宋齊丘至九華山唐主命鎻其第穴墻給飲食齊丘歎曰吾昔獻謀幽讓皇帝族於㤗州宜其及此乃縊而死諡曰醜繆夏六月唐清源節度使留從效遣使入貢請置進奏院於亰師直隷中朝戊寅詔報以江南近服方務綏懷卿乆奉金陵未可攺圖若置邸上都與彼抗衡受而有之罪在於朕卿逺修職貢足表忠勤勉事舊君且宜如故如此則於卿篤始終之義於朕盡柔逺之宜惟乃通方諒逹予意唐主遣其子紀公從善與鍾謨俱入貢上問謨曰江南亦治兵修守僃乎對曰既臣事大國不敢復爾上曰不然曏時則為仇敵今日則為一家吾與汝國大義巳定保無它虞然人生難期至於後世則事不可知歸語汝主可及吾時完城郭繕甲兵據守要害為子孫計謨歸以告唐主唐主乃城金陵凡諸州城之不完者葺之戌兵少者益之臣光曰或問臣五代帝王唐莊宗周世宗皆稱英武二主孰賢臣應之曰夫天子所以統治萬國討其不服撫其微弱行其號令一其法度敦明信義以兼愛兆民者也莊宗既滅梁海内震動湖南馬氏遣子希範入貢莊宗曰比聞馬氏之業終為髙郁所奪今有兒如此郁豈能得之哉郁馬氏之良佐也希範兄希聲聞莊宗言卒矯其父命而殺之此乃市道商賈之所為豈帝王之體㢤盖莊宗善戰者也故能以弱晉勝强梁既得之曽不數年外内離叛置身無所誠由知用兵之術不知為天下之道故也世宗以信令御羣臣以正義責諸國王環以不降受賞劉仁瞻以堅守蒙襃嚴續以盡忠獲存蜀兵以反覆就誅馮道以失節𬒳棄張羙以私㤙見踈江南未服則親犯矢石期於必克既服則愛之如子推誠盡言為之逺慮其宏䂓大度豈得與莊宗同日語㢤書曰無偏無黨王道蕩蕩又曰大邦畏其力小邦懐其惠世宗近之矣通鑑紀事本末卷第四十二
