body:
  text: 丁傅用事漢成帝元延四年春正月中山王興定陶王欣皆來朝中山王獨從傅定陶王盡從傅相中尉上怪之以問定陶王對曰令諸侯王朝得從其國二千石傅相中尉皆國二千石故盡從之上令誦詩通習能説他日問中山王獨從傅在何法令不能對令誦尚書又廢及賜食於前後飽起下襪係解帝由此以為不能而賢定陶王數稱其材是時諸侯王唯二人於帝為至親定陶王祖母傅太后隨王來朝私賂遺趙皇后昭儀及票騎將軍王根后昭儀根見上無子亦欲豫自結為長久計皆更稱定陶王勸帝以為嗣帝亦自美其材為加元服而遣之時年十七矣綏和元年春正月上召丞相翟方進御史大夫孔光右將軍亷褒後將軍朱博入禁中議中山定陶王誰宜為嗣者方進根褒博皆以為定陶王帝弟之子禮曰昆弟之子猶子也為其後者為之子也定陶王宜為嗣光獨以為禮立嗣以親以尚書盤庚殷之及王為比兄終弟及中山王先帝之子帝親弟宜為嗣上以中山王不材又禮兄弟不得相入廟不從光議二月癸丑詔立定陶王欣為皇太子封中山王舅諫大夫馮參為宜鄉侯益中山國三萬户以慰其意使執金吾任宏守大鴻臚持節徴定陶王定陶王謝曰臣材質不足以假充太子之宫臣願且得留國邸旦夕奉問起居俟有聖嗣歸國守藩書奏天子報聞戊午孔光以議不合意左遷廷尉何武為御史大夫秋八月中山孝王興薨冬十月上以太子既奉太宗後不得顧私親十一月立楚孝王孫景為定陶王以奉恭王後初太子之幼也王祖母傅太后躬自養視及為太子詔傅太后與太子母丁姬自居定陶國邸不得相見頃之王太后欲令傅太后丁姬十日一至太子家帝曰太子承正統當共養陛下不得復顧私親王太后曰太子小而傅太后抱養之今至大子家以乳母恩耳不足有所妨於是令傅太后得至太子家丁姬以不養太子獨不得二年三月丙戌帝崩于未央宫夏四月丙午太子即皇帝位尊皇太后曰太皇太后太皇太后令傅太后丁姬十日一至未央宫有詔問丞相大司空定陶共王太后宜當何居丞相孔光素聞傅太后為人剛暴長於權謀自帝在襁褓而養長教道至於成人帝之立又有力光心恐傅太后與政事不欲與帝旦夕相近即議以為定陶太后宜改築宫大司空何武曰可居北宫上從武言北宫有紫房復道通未央宫傅太后果從復道朝夕至帝所求欲稱尊號貴寵其親屬使上不得由直道行高昌侯董宏希指上書言秦莊襄王母本夏氏而為華陽夫人所子及即位後俱稱太后宜立定陶共王后為帝太后事下有司大司馬王莽左將軍關內侯領尚書事師丹劾奏宏知皇太后至尊之號天下一統而稱引亡秦以為比諭詿誤聖朝非所宜言大不道上新立謙讓納用莽丹言免宏為庶人傅太后大怒要上欲必稱尊號上乃白太皇太后令下詔尊定陶恭王為恭皇五月丙戌立皇后傅氏傅太后從弟晏之子也詔曰春秋母以子貴宜尊定陶太后曰恭皇太后丁姬曰恭皇后各置左右詹事食邑如長信宫中官追尊傅父為崇祖侯丁父為褒德侯封舅丁明為陽安侯舅子滿為平周侯皇后父晏為孔鄉侯皇太后弟侍中光祿大夫趙欽為新城侯傅太后從弟右將軍喜好學問有志行衆庶歸望於喜初上官之爵外親也喜獨執謙稱疾傅太后始與政事數諫之由是傅太后不欲令喜輔政庚午賜喜黃金百斤上右將軍印綬以光祿大夫養病大司空何武尚書令唐林皆上書言喜行義修潔忠誠憂國內輔之臣也今以寢病一旦遣歸衆庶失望皆曰傅氏賢子以論議不合於定陶太后故退百寮莫不為國恨之忠臣社稷之衛魯以季友治亂楚以子玉輕重魏以無忌折衝項以范增存亡百萬之衆不如一賢故秦行千金以間亷頗漢散萬金以疏亞父喜立於朝陛下之光輝傅氏之廢興也上亦自重之故尋復進用焉九月庚申地震自京師到北邊郡國三十餘處壞城郭凡壓殺四百餘人人以災異問待詔李尋對曰夫日者衆陽之長人君之表也君不修道則日失其度暗昧亡光間者日尤不精光明侵奪失色邪氣珥霓數作小臣不知內事竊以日視陛下志操衰於始初多矣唯陛下執乾剛之德強志守度母聽女謁邪臣之態諸保阿乳母甘言悲辭之託斷而勿聽勉強大誼絶小不忍良有不得已可賜以貨財不可私以官位誠皇天之禁也臣聞月者衆隂之長妃后大臣諸侯之象也間者月數為變此為母后與政亂朝隂陽俱傷兩不相便外臣不知朝事竊信天文即如此近臣已不足仗矣唯陛下親求賢士無強所惡以崇社稷尊強本朝臣聞五行以水為本水為凖平王道公正修明則百川理落脈通偏黨失綱則涌溢為敗今汝潁漂涌與雨水並為民害此詩所謂百川沸騰咎在皇甫卿士之屬唯陛下少抑外親大臣臣聞地道柔靜隂之常義也間者關東地數震宜務崇陽抑隂以救其咎固志建威閉絶私路拔進英雋退不任職以強本朝夫本強則精神折衝本弱則招殃致凶為邪謀所陵聞往者淮南王作謀之時其所難者獨有汲黯以為公孫弘等不足言也弘漢之名相於今亡比而尚見輕何况亡弘之屬乎故曰朝廷亡人則為賊亂所輕其道自然也冬十月癸酉以師丹為大司空丹見上多所厈改成帝之政乃上書言古者諒暗不言聽於冡宰三年無改於父之道前大行尸柩在堂而官爵臣等以及親屬赫然皆貴寵封舅為陽安侯皇后尊號未定豫封父為孔鄉侯出侍中王邑射聲校尉王邯等詔書比下變動政事卒暴無漸臣縱不能明陳大義復曽不能牢讓爵位相隨空受封侯增益陛下之過間者郡國多地動水出流殺人民日月不明五星失行此皆舉錯失中號令不定法度失理隂陽溷濁之應也臣伏惟人情無子年雖六七十猶博取而廣求孝成皇帝深見天命燭知至德以壯年克己立陛下為嗣先帝暴棄天下而陛下繼體四海安寧百姓不懼此先帝聖德當合天人之功也臣聞天威不違顔咫尺願陛下深思先帝所以建立陛下之意且克己躬行以觀羣下之從化天下者陛下之家也肺附何患不富貴不宜倉卒若是其不久長矣丹書數十上多切直之言傅太后從弟子遷在左右尤傾邪上惡之免官遣歸故郡傅太后怒上不得已復留遷丞相光與大司空丹奏言詔書前後相反天下疑惑無所取信臣請歸遷故郡以銷姦黨卒不得遣復為侍中其逼於傅太后皆此類也哀帝建平元年正月丁酉光祿大夫傅喜為大司馬封高武侯秋九月郎中令泠褒黃門郎假猶等復奏言定陶共皇太后共皇后皆不宜復引定陶藩國之名以冠大號車馬衣服宜皆稱皇之意置吏二千石以下各供厥職又宜為共皇立廟京師上復下其議羣下多順指言母以子貴宜立尊號以厚孝道唯丞相光大司馬喜大司空丹以為不可丹曰聖王制禮取法於天地尊卑者所以正天地之位不可亂也今定陶共皇太后共皇后以定陶共為號者母從子妻從夫之義也欲立官置吏車服與太皇太后並非所以明尊無二上之議也定陶共皇號諡已前定議不得復改禮父為士子為天子祭以天子其尸服以士服子無爵父之義尊父母也為人後者為之子故為所後服斬衰三年而降其父母期明尊本祖而重正統也孝成皇帝聖恩深逺故為共王立後奉承祭祀令共皇長為一國太祖萬世不毁恩義已備陛下既繼體先帝持重大宗承宗廟天地社稷之祀義不可復奉定陶共皇祭入其廟今欲立廟於京師而使臣下祭之是無主也又親盡當毁空去一國太祖不墮之祀而就無主當毁不正之禮非所以尊厚共皇也丹由是浸不合上意會有上書言古者以龜貝為貨今以錢易之民以故貧宜可改幣上以問丹丹對言可改章下有司議皆以為行錢以來久卒難變易丹老人忘其前語復從公卿議又丹使吏書奏吏私寫其草丁傅子弟聞之使人上書告丹上封事行道人偏持其書上以問將軍中朝臣皆對曰忠臣不顯諫大臣奏事不宜漏泄宜下廷尉治事下廷尉劾丹大不敬事未決給事中博士申咸杜欽上書言丹經行無比自近世大臣能若丹者少發憤悶奏封事不及深思逺慮使主簿書漏泄之過不在丹以此貶黜恐不厭衆心上貶咸欽秩各二等遂䇿免丹曰朕惟君位尊任重懷諼迷國進退違命反覆異言甚為君耻之以君嘗託傳位未忍考于理其上大司空高樂侯印綬罷歸尚書令唐林上疏曰竊見免大司空丹策書泰深痛切君子作文為賢者諱丹經為世儒宗德為國黃耉親傅聖躬位在三公所坐者微海內未見其大過事既以往免爵太重京師識者咸以為宜復丹爵邑使奉朝請唯陛下裁覽衆心有以尉復師傅之臣上從林言下詔賜丹爵關內侯二年丁傅宗族驕奢皆嫉傅喜之恭儉又傅太后欲求稱尊號與成帝母齊尊喜與孔光師丹共執以為不可上重違大臣正議又內迫傅太后依違者連歲傅太后大怒上不得巳先免師丹以感動喜喜終不順朱博與孔鄉侯傅晏連結共謀成尊號事數燕見奏封事毁短喜及孔光丁丑上遂策免喜以侯就第夏四月傅太后又自詔丞相御史大夫曰高武侯喜附下罔上與故大司空丹同心背畔放命圯族不宜奉朝請其遣就國丞相孔光自先帝時議繼嗣有持異之隙又重忤傅太后指由是傅氏在位者與朱博為表裏共毁譖光乙亥䇿免光為庶人以御史大夫朱博為丞相封陽鄉侯朱博既為丞相上遂用其議下詔曰定陶共皇之號不宜復稱定陶尊共皇太后曰帝太太后稱永信宫共皇后曰帝太后稱中安宫為共皇立寢廟於京師比宣帝父悼皇考制度於是四太后各置少府太僕秩皆中二千石傅太后既尊後尤驕與太皇太后語至謂之嫗時丁傅以一二年間暴興尤盛為公卿列侯者甚衆然帝不甚假以權藝不如王氏在成帝世也丞相博御史大夫玄奏言前高昌侯宏首建尊號之議而為關內侯師丹所劾奏免為庶人時天下衰粗委政於丹丹不深惟褒廣尊號之義而妄稱説抑貶尊號虧損孝道不忠莫大焉陛下仁聖昭然定尊號宏以忠孝復封高昌侯丹惡逆暴著雖蒙赦令不宜有爵邑請免為庶人奏可諫大夫楊宣上封事言孝成皇帝深惟宗廟之重稱述陛下至德以承天序聖䇿深逺恩德至厚惟念先帝之意豈不欲以陛下自代奉承東宫哉太皇太后春秋七十數更憂傷敕令親屬引領以避丁傅行道之人為之隕涕况於陛下時登高逺望獨不慙於延陵乎帝深感其言復封成都侯商中子邑為成都侯六月庚申帝太后丁氏崩詔歸葬定陶共皇之園秋七月傅太后怨傅喜不已使孔鄉侯晏風丞相朱博令奏免喜侯博與御史大夫趙玄議之玄言事已前決得無不宜博曰已許孔鄉侯矣匹夫相要尚相得死何况至尊博唯有死耳玄即許可博惡獨斥奏喜以故大司空汜鄉侯何武前亦坐過免就國事與喜相似即并奏喜武前在位皆無益於治雖已退免爵土之封非所當也皆請免為庶人上知傅太后素常怨喜疑博玄承指即召玄詣尚書問狀玄辭服有詔左將軍彭宣與中朝者雜問宣等奏劾博玄晏皆不道不敬請召詣廷尉詔獄上減玄死罪三等削晏户四分之一假謁者節召丞相詣廷尉博自殺國除冬十月上欲令丁傅處爪牙官以光祿勳丁望為左將軍四年春正月上欲封傅太后從父弟侍中光祿大夫商尚書僕射平陵鄭崇諫曰孝成皇帝封親舅五侯天為赤黃晝昏日中有黑氣孔鄉侯皇后父高武侯以三公封尚有因緣今無故欲復封商壞亂制度逆天人之心非傅氏之福也臣願以身命當國咎崇因持詔書案起傅太后大怒曰何有為天子乃反為一臣所顓制邪二月癸卯上遂下詔封商為汝昌侯夏六月尊帝太太后為皇太太后元壽元年春正月辛丑朔詔將軍中二千石舉明習兵法者各一人因就拜孔鄉侯傅晏為大司馬衛將軍陽安侯丁明為大司馬票騎將軍是日日有食之上詔公卿大夫悉心陳過失又令舉賢良方正能直言者各一人前涼州刺史杜鄴以方正對策曰臣聞陽尊隂卑天之道也是以男雖賤各為其家陽女雖貴猶為其國隂故禮明三從之義雖有文母之德必繫於子昔鄭伯隨薑氏之欲終有叔假篡國之禍周襄王內迫惠后之難而遭居鄭之危漢興吕太后權私親屬幾危社稷竊見陛下約儉正身欲與天下更始然嘉瑞未應而日食地震案春秋災異以指象為言語日食明陽為隂所臨坤以法地為土為母以安靜為德震不隂之效也占象甚明臣敢不直言其事昔曾子問從令之義孔子曰是何言與善閔子騫守禮不茍從親所行無非理者故無可間也今諸外家昆弟無賢不肖並侍帷幄布在列位或典兵衛或將軍屯寵意并於一家積貴之藝世所希見所希聞也至乃並置大司馬將軍之官皇甫雖盛三桓雖隆魯為作三軍無以甚此當拜之日暗然日食不在前後臨事而發者明陛下謙遜無專承指非一所言輒聼所欲輒隨有罪惡者不坐辜罰無功能者畢受官爵流漸積猥過在於是欲令昭昭以覺聖朝昔詩人所刺春秋所譏指象如此殆不在它由後視前忿邑非之逮身所行不自鏡見則以為可計之過者願陛下加致精誠思承始初事稽諸古以厭下心則黎庶羣生無不説喜上帝百神收還威怒禎祥福祿何嫌不報丁巳皇太太后傅氏崩合葬渭陵稱孝元傅皇后二年六月戊午帝崩于未央宫大司馬王莽白太皇太后以定陶共王太后與孔鄉侯晏同心合謀背恩忘本專恣不軌徙孝哀皇后退就桂宫傅氏丁氏皆免官爵歸故郡傅晏將妻子徙合浦獨下詔褒揚傅喜曰高武侯喜姿性端慤論議忠直雖與故定陶太后有屬終不順指從邪介然守節以故斥逐就國傳不云乎歲寒然後知松柏之後凋也其還喜長安位特進奉朝請喜雖外見褒賞孤立憂懼後復遣就國以壽終莽又貶傅太后號為定陶共王母丁太后號曰丁姬平帝元始五年莽奏言共王母丁姬前不臣妾冡高與元帝山齊懷帝太后皇太后璽綬以葬請發共王母及丁姬冡取其璽綬徙共王母歸定陶葬共王冡次太后以為既已之事不須復發莽固爭之太后詔因故棺改葬之莽奏共王母及丁姬棺皆名梓宫珠玉之衣非藩妾服請更以木棺代去珠玉衣葬丁姬媵妾之次奏可公卿在位皆阿莽指入錢帛遣子弟及諸生四夷凡十餘萬人操持作具助將作掘平共王母丁姬故冡周棘其處以為丗戒云董賢嬖幸漢哀帝建平四年二月駙馬都尉侍中雲陽董賢得幸於上出則參乘入御左右賞賜纍巨萬貴震朝廷常與上卧起嘗晝寢偏藉上袖上欲起賢未覺不欲動賢乃斷袖而起又詔賢妻得通引籍殿中止賢廬又召賢女弟以為昭儀位次皇后昭儀及賢與妻旦夕上下並侍左右以賢父恭為少府賜爵關內侯詔將作大匠為賢起大第北闕下重殿洞門土木之功窮極技巧賜武庫禁兵上方珍寶其選物上弟盡在董氏而乘輿所服乃其副也及至東園祕器珠𥜗玉柙豫以賜賢無不備具又令將作為賢起冢塋義陵旁內為便房剛柏題湊外為徼道周垣數里門闕罘罳甚盛鄭崇以賢貴寵過度諫上由是重得罪三月上欲侯董賢而未有緣侍中傅嘉勸上定息夫躬孫寵告東平本章去宋弘更言因董賢以聞欲以其功侯之皆先賜爵關內侯頃之上欲封賢等而心憚王嘉乃先使孔鄉侯晏持詔書示丞相御史於是嘉與御史大夫賈延上封事言竊見董賢等三人始賜爵衆庶胸胸咸曰賢貴其餘并蒙恩至今流言未解陛下仁恩於賢等不巳冝暴賢等本奏語言延問公卿大夫博士議郎考合古今明正其義然後乃加爵土不然恐大失衆心海內引領而議暴評其事必有言當封者在陛下所從天下雖不説咎有所分不獨在陛下上不得已且為之止秋八月辛卯上下詔切責公卿曰昔楚有子玉得臣晉文為之側席而坐近事汲黯折淮南之謀今東平王雲等至有圖弒天子逆亂之謀者是公卿股肱莫能悉心務聰明以銷厭未萌故也賴宗廟之靈侍中駙馬都尉賢等發覺以聞咸伏厥辜書不云乎用德章厥善其封賢為高安侯上使中黃門發武庫兵前後十輩送董賢及上乳母王阿舍執金吾毋將隆奏言武庫兵器天下公用國家武備繕治造作皆度大司農錢大司農錢自乘輿不以給共養共養勞賜一出少府蓋不以本臧給末用不以民力共浮費别公私示正路也古者諸侯方伯得專征伐乃賜斧鉞漢家邊吏職任距寇亦賜武庫兵皆任事然後蒙之春秋之誼家不臧甲所以抑臣威損私力也今賢等便僻弄臣私恩微妾而以天下公用給其私門契國威器共其家備民力分於弄臣武兵設於微妾建立非冝以廣驕僭非所以示四方也孔子曰奚取於三家之堂臣請收還武庫上不説諫大夫渤海鮑宣上書曰竊見孝成皇帝時外親持權人人牽引所私以充塞朝廷妨賢人路濁亂天下奢泰亡度窮困百姓是以日食且十彗星四起危亡之徴陛下所親見矣今奈何反覆劇於前乎今民有七亡隂陽不和水旱為災一亡也縣官重責更賦租稅二亡也貪吏並公受取不已三亡也豪強大姓蠶食亡厭四亡也苛吏繇役失農桑時五亡也部落鼓鳴男女遮列六亡也盜賊劫略取民財物七亡也七亡尚可又有七死酷吏毆殺一死也治獄深刻二死也寃陷無辜三死也盜賊橫發四死也怨讎相殘五死也歲惡飢餓六死也時氣疾疫七死也民有七亡而無一得欲望國安誠難民有七死而無一生欲望刑措誠難此非公卿守相貪殘成化之所致邪羣臣幸得居尊官食重祿豈有肯加惻隱於細民助陛下流教化者邪志但在營私家稱賔客為姦利而已以茍容曲從為賢以拱默尸祿為智謂如臣宣等為愚陛下擢臣巖穴誠冀有益毫毛豈徒欲使臣美食大官重高門之地哉天下乃皇天之天下也陛下上為皇天子下為黎庶父母奈何獨私養外親與幸臣董賢多賞賜以大萬數使奴從賔客漿酒藿肉蒼頭廬兒皆用致冨非天意也宣語雖刻切上以宣名儒優容之元壽元年春正月丞相嘉奏封事曰陛下在國之時好詩書尚儉節徴來所過道上稱誦德美此天下所以回心也初即位易帷帳去錦繡乘輿席緣綈繒而已共皇寢廟比當作憂閔元元惟用度不足以義割恩輒且止息今始作治而駙馬都尉董賢亦起官寺上林中又為賢治大第開門鄉北闕引玉渠灌園池使者護作賞賜吏卒甚於治宗廟賢母病長安厨給祠具道中過者皆飲食為賢治器器成奏御乃行或物好特賜其工自貢獻宗廟三宫猶不至此賢家有賔婚及見親諸官並共賜及蒼頭奴婢人十萬錢使者護視發取市物百賈震動道路歡譁羣臣惶惑詔書罷苑而以賜賢二千餘頃均田之制從此墮壞奢僭放縱變亂隂陽災異衆多百姓訛言持籌相驚天惑其意不能自止陛下素仁智慎事今而有此大譏孔子曰危而不持顛而不扶則將安用彼相矣臣嘉幸得備位竊內悲傷不能通愚忠之信身死有益於國不敢自惜唯陛下慎已之所獨鄉察衆人之所共疑往者寵臣鄧通韓嫣驕貴失度逸豫無厭小人不勝情欲卒陷罪辜亂國亡軀不終其祿所謂愛之適足以害之者也宜深覽前世以節賢寵全安其命上由是於嘉浸不説鮑宣上書曰陛下父事天母事地子養黎民即位已來父虧明母震動子訛言相驚恐今日食於三始誠可畏懼小民正朔日尚恐毁敗器物何況於日虧乎陛下深內自責避正殿舉直言求過失罷退外親及旁仄素餐之人徴拜孔光為光祿大夫發覺孫寵息夫躬過惡免官遣就國衆庶歙然莫不説喜天人同心人心説則天意解矣乃二月丙戌白虹干日連隂不雨此天下憂結未解民有怨望未塞者也侍中駙馬都尉董賢本無葭莩之親但以令色諛言自進賞賜無度竭盡府臧并合三第尚以為小復壞暴室賢父子坐使天子使者將作治第行夜吏卒皆得賞賜上冢有會輒太官為供海內貢獻當養一君今反盡之賢家豈天意與民意耶天不可久負厚之如此反所以害之也誠欲哀賢宜為謝過天地解讎海內免遣就國收乘輿器物還之縣官如此可以父子終其性命不者海內之所仇未有得久安者也孫寵息夫躬不宜居國可皆免以視天下復徴何武師丹彭宣傅喜曠然使民易視以應天心建立大政興太平之端上感大異納宣言徴何武彭宣拜鮑宣為司隸上託傅太后遺詔令太皇太后下丞相御史益封董賢二千戶及賜孔鄉侯汝昌侯陽新侯國王嘉封還詔書因奏封事諫曰臣聞爵祿土地天之有也書云天命有德五服五章哉王者代天爵人尤宜慎之裂地而封不得其宜則衆庶不服感動隂陽其害疾自深今聖體久不平此臣嘉所內懼也高安侯賢佞幸之臣陛下傾爵位以貴之單貨財以冨之損至尊以寵之主威已黜府臧已竭唯恐不足財皆民力所為孝文皇帝欲起露臺重百金之費克己不作今賢散公賦以施私惠一家至受千金往古以來貴臣未嘗有此流聞四方皆同怨之里諺曰千人所指無病而死臣常為之寒心今太皇太后以永信太后遺詔詔丞相御史益賢户賜三侯國臣嘉竊惑山崩地動日食於三朝皆隂侵陽之戒也前賢已再封晏商再易邑業緣私橫求恩已過厚求索自恣不知厭足甚傷尊尊之義不可以示天下為害痛矣臣驕侵罔隂陽失節氣感相動害及身體陛下寢疾久不平繼嗣未立冝思正萬事順天人之心以求福祐奈何輕身肆意不念高祖之勤苦垂立制度欲傳之於無窮哉臣謹封上詔書不敢露見非愛死而不自法恐天下聞之故不敢自劾初廷尉梁相治東平王雲獄時冬月未盡二旬而相心疑雲寃獄有飾辭奏欲傳之長安更下公卿覆治尚書令鞫談僕射宗伯鳯以為可許天子以為相等皆見上體不平外內顧望操持兩心幸雲踰冬無討賊疾惡主讎之意免相等皆為庶人後數月大赦嘉薦相等皆有材行聖王有計功除過臣竊為朝廷惜此三人書奏上不能平後二十餘日嘉封還益董賢户事上乃發怒召嘉詣尚書責問以相等前坐不忠罪惡著聞君時輒巳自劾今又稱譽云為朝廷惜之何也嘉免冠謝罪事下將軍朝者光祿大夫孔光等劾嘉迷國罔上不道請謁者召嘉詣廷尉詔獄議郎龔等以為嘉言事前後相違宜奪爵土免為庶人永信少府猛等以為嘉罪名雖應法大臣括髮關械祼躬就笞非所以重國褒宗廟也上不聽三月詔假謁者節召丞相詣廷尉詔獄使者既到府椽史涕泣共和藥進嘉嘉不肯服主簿曰將相不對理陳寃相踵以為故事君侯宜引決使者危坐府門上主簿復前進藥嘉引藥柸以擊地謂官屬曰丞相幸得備位三公奉職負國當伏刑都市以示萬衆丞相豈兒女子邪何謂咀藥而死嘉遂裝出見使者再拜受詔乘吏小車去蓋不冠隨使者詣廷尉廷尉收嘉丞相新甫侯印綬縛嘉載致都船詔獄上聞嘉生自詣吏大怒使將軍以下與五二千石雜治吏詰問嘉對曰案事者思得實竊見相等前治東平王獄不以雲為不當死欲關公卿示重慎誠不見其外內顧望阿附為雲驗復幸得蒙大赦相等皆良善吏臣竊為國惜賢不私此三人獄吏曰茍如此則君何以為罪猶當有以負國不空入獄矣吏稍侵辱嘉嘉喟然仰天歎曰幸得充備宰相不能進賢退不肖以是負國死有餘責吏問賢不肖主名嘉曰賢故丞相孔光故大司空何武不能進惡高安侯董賢父子佞邪亂朝而不能退罪當死死無所恨嘉繫獄二十餘日不食歐血而死十二月庚子以侍中駙馬都尉董賢為大司馬衛將軍册曰建爾于公以為漢輔往悉爾心厈正庶事允執其中是時賢年二十二雖為三公常給事中領尚書百官因賢奏事以父衛尉恭不宜在卿位徙為光祿大夫秩中二千石弟寬信代賢為駙馬都尉董氏親屬皆侍中諸曹奉朝請寵在丁傅之右矣初丞相孔光為御史大夫賢父恭為御史事光及賢為大司馬與光並為三公上故令賢私過光光雅恭謹知上欲尊寵賢及聞賢當來也光警戒衣冠出門待望見賢車乃却入賢至中門光入閣既下車乃出拜謁送迎甚謹不敢以賔客鈞敵之禮上聞之喜立拜光兩兄子為諫大夫常侍賢由是權與人主侔矣是時成帝外家王氏衰廢唯平阿侯談子去疾為侍中弟閎為中常侍閎妻父中郎將蕭咸前將軍望之子也賢父恭慕之欲為子寬信求咸女為婦使閎言之咸惶恐不敢當私謂閎曰董公為大司馬册文言允執其中此乃堯禪舜之文非三公故事長老見者莫不心懼此豈家人子所能堪邪閎性有知略聞咸言心亦悟乃還報恭深逹咸自謙薄之意恭歎曰我家何用負天下而為人所畏如是意不説後上置酒麒麟殿賢父子親屬宴飲侍中中常侍皆在側上在酒所從容視賢笑曰吾欲法堯禪舜何如王閎進曰天下乃高皇帝天下非陛下之有也陛下承宗廟當傳子孫於亡窮統業至重天子亡戲言上默然不説左右皆恐於是遣閎出歸郎署久之太皇太后為閎謝復召閎還閎遂上書諫曰臣聞王者立三公法三光居之者當得賢人易曰鼎折足覆公餗喻三公非其人也昔孝文皇帝幸鄧通不過中大夫武皇帝幸韓嫣賞賜而已皆不在大位今大司馬衛將軍董賢無功於漢朝又無胏腑之連復無名迹高行以矯世升擢數年列備鼎足典衛禁兵無功封爵父子兄弟橫蒙拔擢賞賜空竭帑臧萬民喧譁偶言道路誠不當天心也昔褒神蚖變化為人實生褒姒亂周國恐陛下有過失之譏賢有小人不知進退之禍非所以垂法後世也上雖不從閎言多其年少志強亦不罪也二年春正月胸奴單于及烏孫來朝單于宴見羣臣在前單于怪董賢年少以問譯上令譯報曰大司馬年少以大賢居位單于乃起拜賀漢得賢臣夏五月甲子正三公官分職大司馬衛將軍董賢為大司馬六月戊午帝崩于未央宫太皇太后聞帝崩召大司馬賢引見東箱問以喪事調度賢內憂不能對免冠謝太后曰新都侯莽前以大司馬奉送先帝大行曉習故事吾令莽佐君賢頓首幸甚太后遣使者馳召莽詔尚書諸發兵符節百官奏事中黃門期門兵皆屬莽莽以太后指使尚書劾賢帝病不親醫藥禁止賢不得入宫殿司馬中賢不知所為詣闕免冠徒跣謝己未莽使謁者以太后詔即闕下册賢曰賢年少未更事理為大司馬不合衆心其收大司馬印綬罷歸第即日賢與妻皆自殺家惶恐夜葬莽疑其詐死有司奏請發賢棺至獄診視因埋獄中莽又奏董賢父子驕恣奢僭請收沒入財物縣官諸以賢為官者皆免父恭弟寬信與家屬徙合浦母别歸故郡巨鹿長安中小民歡譁鄉其第哭幾獲盜之縣官斥賣董氏財凡四十三萬萬賢所厚吏沛朱詡自劾去大司馬府買棺衣收賢尸葬之莽聞之以它罪擊殺詡王莽篡漢漢宣帝甘露三年太子所幸司馬良娣死太子悲恚不樂帝乃令皇后擇後宫家人子可以娛侍太子者得元城王政君送太子宫政君故繡衣御史賀之孫女也是歲生成帝於甲館畫堂為世適皇孫帝愛之自名曰驁字大孫元帝初元元年夏四月丁巳立太子驁為皇太子竟寧元年初太子少好經書寬博謹慎其後幸酒樂燕樂上不以為能而山陽王康有材藝母昭儀又愛幸上以故常有意欲以山陽為嗣及上寢疾傅昭儀山陽王康常在左右而皇后太子希得進見上數問尚書以景帝時立膠東王故事是時太子長舅陽平侯鳳為衛尉侍中與皇后太子皆憂不知所出史丹以親密臣得侍疾候上間獨寢時丹直入卧內頓首伏青蒲上涕泣言曰皇太子以適長立積十餘年名號繫於百姓天下莫不歸心今者道路流言為國生意以為太子有動搖之議審若此公卿以下必以死爭不奉詔臣願先賜死以示羣臣上意大感寤太子由是遂定五月壬辰帝崩于未央宫六月己未太子即皇帝位以元舅侍中衛尉陽平侯王鳯為大司馬大將軍領尚書事成帝建始元年春正月壬子封舅諸吏光祿大夫關內侯王崇為安成侯賜舅談商立根逢時爵關內侯夏四月黃霧四塞詔博問公卿大夫無有所諱諫大夫楊興博士駟勝等對皆以為隂盛侵陽之氣也高祖之約非功臣不侯今太后諸弟皆以無功為侯外戚未曽有也故天為見異於是大將軍鳯懼上書乞骸骨辭職上優詔不許三年上專欲委任王鳯八月䇿免車騎將軍許嘉以特進侯就朝位四年夏上悉召前所舉直言之士詣白虎殿對䇿是時上委政王鳯議者多歸咎焉谷永知鳯方見柄用隂欲自託乃曰方今四夷賔服皆為臣妾北無薰粥冒頓之患南無趙他吕嘉之難三垂晏然靡有兵革之警諸侯大者乃食數縣漢吏制其權柄不得有為無吳楚燕梁之藝百官盤互親疏相錯骨肉大臣有申伯之忠洞洞屬屬小心畏忌無重合安陽博陸之亂三者無毛髮之辜竊恐陛下舍昭昭之白過忽天地之明戒聽暗昧之瞽説歸咎乎無辜倚異乎政事重失天心不可之大者也上擢永為光祿大夫河平二年六月上悉封諸舅王談為平阿侯啇為成都侯立為紅陽侯根為曲陽侯逢時為高平侯五人同日封故世謂之五侯三年劉向以王氏權位太盛而上方嚮詩書古文向乃因尚書洪範集合上古以來歷春秋六國至秦漢符瑞災異之記推迹行事連傅禍福著其占驗比類相從各有條目凡十一篇號曰洪範五行傳論奏之天子心知向忠精故為鳯兄弟起此論也然終不能奪王氏權四年三月琅邪太守楊肜與王鳯連昏其郡有災害丞相王商按問之鳯以為請商不聼竟奏免肜奏果寢不下鳯以是怨商隂求其短使頻陽耿定上書言商與父傅婢通及女弟淫亂奴殺其私夫疑商教使天子以為暗昧之過不足以傷大臣鳯固爭下其事司隸太中大夫蜀郡張匡素佞巧復上書極言詆毁商有司奏請召商詣詔獄上素重商知匡言多險制曰勿治鳯固爭之夏四月壬寅詔收商丞相印綬商免相三日發病歐血薨諡曰戾侯而商子弟親屬為駙馬都尉侍中中常侍諸曹大夫郎吏者皆出補吏莫得留給事宿衛者有司奏請除國邑有詔長子安嗣爵為樂昌侯陽朔元年冬京兆尹泰山王章下獄死時大將軍鳯用事上謙讓無所顓左右嘗薦光祿大夫劉向少子歆通逹有異材上召見歆誦讀詩賦甚説之欲以為中常侍召取衣冠臨當拜左右皆曰未曉大將軍上曰此小事何須關大將軍左右叩頭爭之上於是語鳯鳯以為不可乃止王氏子弟皆卿大夫侍中諸曹分據藝官滿朝廷杜欽見鳯專政泰重戒之曰願將軍由周公之謙懼損穰侯之威放武安之欲毋使范睢之徒得間其説鳯不聼時上無繼嗣體常不平定陶共王來朝太后與上承先帝意遇共王甚厚賞賜十倍於它王不以往事為纎介留之京師不遣歸國上謂共王我未有子人命不諱一朝有它且不復相見爾長留侍我矣其後天子疾益有瘳共王因留國邸旦夕侍上上甚親重之大將軍鳯心不便共王在京師會日食鳯因言日食隂盛之象定陶王雖親於禮當奉藩在國今留侍京師詭正非常故天見戒宜遣王之國上不得已於鳯而許之共王辭去上與相對涕泣而決王章素剛直敢言雖為鳳所舉非鳯專權不親附鳯乃奏封事言日食之咎皆鳯專權蔽主之過上召見章延問以事章對曰天道聰明佑善而災惡以瑞異為符效今陛下以未有繼嗣引近定陶王所以承宗廟重社稷上順天心下安百姓此正議善事當有祥瑞何故致災異災異之發為大臣顓政者也今聞大將軍猥歸日食之咎於定陶王建遣之國茍欲使天子孤立於上顓擅朝事以便其私非忠臣也且日食隂侵陽臣顓君之咎今政事大小皆自鳯出天子曾不一舉手鳯不內省責反歸咎善人推逺定陶王且鳯誣罔不忠非一事也前丞相樂昌侯商本以先帝外屬內行篤有威重位歷將相國家柱石臣也其人守正不肯屈節隨鳯委曲卒用閨門之事為鳯所罷身以憂死衆庶愍之又鳯知其小婦弟張美人已嘗適人於禮不宜配御至尊託以為宜子內之後宫苟以私其妻弟聞張美人未嘗任身就館也且羌胡尚殺首子以蕩腸正世况於天子而近已出之女也此三者皆大事陛下所自見足以知其餘及它所不見者鳯不可令久典事宜退使就第選忠賢以代之自鳯之白罷商後遣定陶王也上不能平及聞章言天子感寤納之謂章曰微京兆尹直言吾不聞社稷計且唯賢知賢君試為朕求可以自輔者於是章奏封事薦信都王舅琅邪太守馮野王忠信質直智謀有餘上自為太子時數聞野王名方倚欲以代鳯章每召見上輒辟左右時太后從弟子侍中音獨側聼具知章言以語鳯鳯聞之甚憂懼杜欽令鳯稱病出就第上疏乞骸骨其辭指甚哀太后聞之為垂涕不御食上少而親倚鳯弗忍廢乃優詔報鳯強起之於是鳯起視事上使尚書劾奏章知野王前以王舅出補吏而私薦之欲令在朝阿附諸侯又知張美人體御至尊而妄稱引羌胡殺子蕩腸非所宜言下章吏廷尉致其大逆罪以為比上夷狄欲絶繼嗣之端背畔天子私為定陶王章竟死獄中妻子徙合浦自是公卿見鳳側目而視馮野王懼不自安遂病滿三月賜告與妻子歸杜陵就醫藥大將軍鳳風御史中丞劾奏野王賜告養病而私自便持虎符出界歸家奉詔不敬杜欽奏記於鳯曰二千石病賜告得歸有故事不得去郡亡著令傳曰賞疑從豫所以廣恩勸功也罰疑從去所以慎刑闕難知也今釋令與故事而假不敬之法甚違闕疑從去之意即以二千石守千里之地任兵馬之重不宜去郡將以制刑為後法者則野王之罪在未制令前也刑賞大信不可不慎鳯不聼竟免野王官時衆庶多冤王章譏朝廷者欽欲救其過復説鳯曰京兆尹章所坐事密自京師不曉况於逺方恐天下不知章實有罪而以為坐言事如是塞爭引之原損寬明之德欽愚以為宜因章事舉直言極諫並見郎從官展盡其意加於往前以明示四方使天下咸知主上聖明不以言罪下也若此則流言消釋疑惑著明鳯白行其䇿焉二年夏四月丁卯以侍中太僕王音為御史大夫於是王氏愈盛郡國守相刺史皆出其門下五侯羣弟爭為奢侈賂遺珍寶四面而至皆通敏人事好士飬賢傾財施豫以相高尚賔客滿門競為之聲譽劉向謂陳湯曰今災異如此而外家日盛其漸必危劉氏吾幸得以同姓末屬纍世蒙漢厚恩身為宗室遺老歷事三主上以我先帝舊臣每進見常加優禮吾而不言孰當言者遂上封事極諫曰臣聞人君莫不欲安然而常危莫不欲存然而常亡失御臣之術也夫大臣操權柄持國政未有不為害者也故書曰臣之有作威作福害于而家凶于而國孔子曰祿去公室政建大夫危亡之兆也今王氏一姓乘朱輪華轂者二十三人青紫貂蟬充盈幄內魚鱗左右大將軍秉事用權五侯驕奢僭盛並作威福擊斷自恣行汙而寄治身私而託公依東宫之尊假甥舅之親以為威重尚書九卿州牧郡守皆出其門管執樞機朋黨比周稱譽者登進忤恨者誅傷遊談者助之説執政者為之言排擯宗室孤弱公族其有智能者尤非毁而不進逺絶宗室之任不令得給事朝省恐其與已分權數稱燕王蓋主以疑上心避諱吕霍而弗肯稱內有管蔡之萌外假周公之論兄弟據重宗族盤互歷上古至秦漢外戚僭貴未有如王氏者也物盛必有非常之變先見為其人徴象孝昭帝時冠石立於泰山仆栁起於上林而孝宣帝即位今王氏先祖墳墓在濟南者其梓柱生枝葉扶疏上出屋根臿地中雖立石起栁無以過此之明也事藝不兩大王氏與劉氏亦且不並立如下有泰山之安則上有纍外卯危陛下為人子孫守持宗廟而令國祚移於外親降為皂隸縱不為身奈宗廟何婦人內夫家而外父母家此亦非皇太后之福也孝宣皇帝不與舅平昌侯權所以全安之也夫明者起福於無形銷患於未然宜發明詔吐德音援近宗室親而納信黜逺外戚毋授以政皆罷令就第以則效先帝之所行厚安外戚全其宗族誠東宫之意外家之福也王氏永存保其爵祿劉氏長安不失社稷所以褒睦外內之姓子子孫孫無疆之計也如不行此䇿田氏復見於今六卿必起於漢為後嗣憂昭昭甚明唯陛下深留聖思書奏天子召見向歎息悲傷其意謂曰君且休矣吾將思之然終不能用其言三年秋王鳯疾天子數自臨問親執其手涕泣曰將軍病如有不可言平阿侯談次將軍矣鳯頓首立曰談等雖與臣至親行皆奢僭無以率導百姓不如御史大夫音謹敕臣敢以死保之及鳯且死上疏謝上復固薦音自代言談等五人必不可用天子然之初談倨不肯事鳯而音敬鳯卑恭如子故鳳薦之八月丁巳鳯薨九月甲子以王音為大司馬車騎將軍而王談位特進領城門兵安定太守谷永以談失職勸談辭讓不受城門職由是談音相與不平鴻嘉元年王音既以從舅越親用事小心親職上以音自御史大夫入為將軍不獲宰相之封六月乙巳封音為安陽侯三年王氏五侯爭以奢侈相尚成都侯商嘗病欲避暑從上借明光宫後又穿長安城引內灃水注第中大陂以行船立羽蓋張周帷楫棹越歌上幸商第見穿城引水意恨內銜之未言後微行出過曲陽侯第又見園中土山漸臺象白虎殿於是上怒以讓車騎將軍音商根兄弟欲自黥劓以謝太后上聞之大怒乃使尚書責問司隸校尉京兆尹知成都侯商等奢僭不軌藏匿姦猾皆阿縱不舉奏正法二人頓首省户下又賜車騎將軍音䇿書曰外家何甘樂禍敗而欲自黥劓相戮辱於太后前傷慈母之心以危亂國家外家宗族強上一身寖弱日久今將一施之君其召諸侯令待府舍是日詔尚書奏文帝時誅將軍薄昭故事車騎將軍音籍稿請罪商立根皆負斧質謝良久乃已上特欲恐之實無意誅也四年平阿安侯王談薨上悔廢談使不輔政而薨也乃復成都侯商以特進領城門兵置幕府得舉吏如將軍魏郡杜鄴時為郎素善車騎將軍音見音前與平阿侯有隙即説音曰夫戚而不見殊孰能無怨昔秦伯有千乘之國而不能容其母弟春秋譏焉周召則不然忠以相輔義以相厈同已之親等已之尊不以聖德獨兼國寵又不為長專受榮任分職於陜並為弼疑故內無感恨之隙外無侵侮之羞俱享天祐兩荷高名者蓋以此也竊見成都侯以特進領城門兵復有詔得舉吏如五府此明詔所欲寵也將軍宜承順聖意加異往時每事凡議必與及之發於至誠則孰不説諭音甚嘉其言由是與成都侯商親密二人皆重鄴永始元年初太后兄弟八人獨弟曼早死不侯太后憐之曼寡婦渠供養東宫子莽幼孤不及等比其羣兄弟皆將軍五侯子乘時侈靡以輿馬聲色佚遊相高莽因折節為恭儉勤身博學被服如儒生事母及寡嫂養孤兄子行甚敕備又外交英俊內事諸父曲有禮意大將軍鳯病莽侍疾親嘗藥亂首垢靣不解衣帶連月鳯且死以託太后及帝拜為黃門郎遷射聲校尉久之叔父成都侯商上書願分戶邑以封莽長樂少府戴崇侍中金涉中郎陳湯等皆當丗名士咸為莽言上由是賢莽太后又數以為言五月乙未封莽為新都侯遷騎都尉光祿大夫侍中宿衛謹敕爵位益尊節操愈謙散輿馬衣裘振施賔客家無所餘收贍名士交結將相卿大夫甚衆故在位更推薦之遊者為之談説虛譽隆洽傾其諸父矣敢為激發之行處之不慙恧嘗私買侍婢昆弟或頗聞知莽因曰後將軍朱子元無子莽聞此兒種宜子為買之即日以婢奉朱博其匿情求名如此二年春正月己丑安陽敬侯王音薨王氏唯音為修整數諫正有忠直節三月丁酉以成都侯王商為大司馬衛將軍紅陽侯王立位特進領城門兵冬十一月衛將軍王商惡陳湯奏湯妄言昌陵且復發徙又言黑龍冬出微行數出之應廷尉奏湯非所宜言大不敬詔以湯有功免為庶人徙邊初少府陳咸衛尉逢信官簿皆在翟方進之右方進晚進為京兆尹與咸厚善及御史大夫缺三人皆名卿俱在選中而方進得之會丞相薛宣得罪與方進相連上使五二千石雜問丞相御史咸詰責方進冀得其處方進心恨陳湯素以材能得幸於王鳳及王音咸信皆與湯善湯數稱之於鳯音所以此得為九卿及王商黜逐湯方進因奏咸信附會湯以求薦舉苟得無耻皆免官三年十二月故南昌尉九江梅福上書曰昔高祖納善若不及從諫若轉圜聼言不求其能舉功不考其素陳平起於亡命而為謀主韓信拔於行陳而建上將故天下之士雲合歸漢爭進竒異知者竭其䇿愚者盡其慮勇士極其節怯夫勉其死合天下之知并天下之威是以舉秦如鴻毛取楚若拾遺此高祖所以無敵於天下也孝武皇帝好忠諫説至言出爵不待廉茂慶賜不須顯功是以天下布衣各厲志竭精以赴闕廷自衒鬻者不可勝數漢家得賢於此為盛使孝武皇帝聼用其計升平可致於是積尸暴骨快心胡越故淮南王安緣間而起所以計慮不成而謀議泄者以衆賢聚於本朝故其大臣藝陵不敢和從也方今布衣乃窺國家之隙見間而起者蜀郡是也及山陽亡徒蘇令之羣蹈藉名都大郡求黨與索隨和而亡逃匿之意此皆輕量大臣無所畏忌國家之權輕故匹夫欲與上爭衡也士者國之重器得士則重失士則輕詩云濟濟多士文王以寧廟堂之議非草茅所言也臣誠恐身塗野草尸并卒伍故數上書求見輒報罷臣聞齊桓之時有以九九見者桓公不逆欲以致大也今臣所言非特九九也陛下距臣者三矣此天下士所以不至也昔秦武王好力任鄙叩關自鬻繆公行伯由余歸德今欲致天下之士民有上書求見者輒使詣尚書問其所言言可采取者秩以升斗之祿賜以一束之帛若此則天下之士發憤悶吐忠言嘉謀日聞於上天下條貫國家表裏爛然可睹矣夫以四海之廣士民之數能言之類至衆多也然其俊桀指世陳政言成文章質之先聖而不繆施之當世合時務若此者亦無幾人故爵祿束帛者天下之砥石高祖所以厲丗摩鈍也孔子曰工欲善其事必先利其器至秦則不然張誹謗之罔以為漢􅛷除倒持泰阿授楚其柄故誠能勿失其柄天下雖有不順莫敢觸其鋒此孝武皇帝所以辟地建功為漢世宗也今陛下既不納天下之言又加戮焉夫鳶鵲遭害則仁鳥增逝愚者蒙戮則智士深退間者愚民上疏多觸不急之法或下廷尉而死者衆自陽朔以來天下以言為諱朝廷尤甚羣臣皆承順上指莫有執正何以明其然也取民所上書陛下之所善試下之廷尉廷尉必曰非所宜言大不敬以此卜之一矣故京兆尹王章資質忠直敢靣引廷爭孝元皇帝擢之以厲具臣而矯曲朝及至陛下戮及妻子且惡惡止其身王章非有反畔之辜而殃及室家折直士之節結諫臣之舌羣臣皆知其非然不敢爭天下以言為戒最國家之大患也陛下循高祖之軌杜亡秦之路除不急之法下無諱之詔博覽兼聼謀及疏賤令深者不隱逺者不塞所謂辟四門明四目也往者不可及來者猶可追方今君命犯而主威奪外戚之權日以益隆陛下不見其形願察其景建始以來日食地震以率言之三倍春秋水災亡與比數隂盛陽微金鐵為飛此何景也漢興以來社稷三危吕霍上官皆母后之家也親親之道全之為右當與之賢師良傅教以忠孝之道今乃尊寵其位授以魁柄使之驕逆至於夷滅此失親親之大者也自霍光之賢不能為子孫慮故權臣易世則危書曰毋若火始庸庸藝陵於君權隆於主然後防之亦無及已上不納四年冬十一月庚申衛將軍王商病免元延元年春正月壬戌王商復為大司馬衛將軍紅陽侯立舉陳咸方正對䇿拜為光祿大夫給事中丞相方進復奏咸前為九卿坐為貪邪免不當蒙方正舉備內朝臣並劾紅陽侯立選舉故不以實有詔免咸勿劾立十二月乙未王商為大將軍辛亥商薨其弟紅陽侯立次當輔政先是立使客因南郡太守李尚占墾草田數百頃上書以入縣官貴取其直一萬萬以上丞相司直孫寶發之上由是廢立而用其弟光祿勳曲陽侯根庚申以根為大司馬驃騎將軍特進安昌侯張禹請平陵肥牛亭地曲陽侯根爭以為此地當平陵寢廟衣冠所出遊道宜更賜禹它地上不從卒以賜禹根由是害禹寵數毁惡之天子愈益敬厚禹每病輒以起居聞車駕自臨問之上親拜禹牀下禹頓首謝恩禹小子未有官禹數視其小子上即禹牀下拜為黃門郎給事中禹雖家居以特進為天子師國家每有大政必與定議時吏民多上書言災異之應譏切王氏專政所致上意頗然之未有以明見乃車駕至禹第辟左右親問禹以天變因用吏民所言王氏事示禹禹自見年老子孫弱又與曲陽侯不平恐為所怨則謂上曰春秋日食地震或為諸侯相殺夷狄侵中國災變之意深逺難見故聖人罕言命不語怪神性與天道自子貢之屬不得聞何况淺見鄙儒之所言陛下宜修政事以善應之與下同其福喜此經義意也新學小生亂道誤人宜無信用以經術斷之上雅信愛禹由此不疑王氏後曲陽侯根及諸王子弟聞知禹言皆喜説遂親就禹故槐里令朱雲上書求見公卿在前雲曰今朝廷大臣上不能匡主下無以益民皆尸位素餐孔子所謂鄙夫不可與事君茍患失之亡所不至者也臣願賜尚方斬馬劒斷佞臣一人頭以厲其餘上問誰也對曰安昌侯張禹上大怒曰小臣居下訕下廷辱師傅罪死不赦御史將雲下雲攀殿檻檻折雲呼曰臣得下從龍逢比干逰於地下足矣未知聖朝何如耳御史遂將雲去於是左將軍辛慶忌免冠解印綬叩頭殿下曰此臣素著狂直於世使其言是不可誅其言非固當容之臣敢以死爭慶忌叩頭流血上意解然後得已及後當治檻上曰勿易因而輯之以旌直臣三年春正月丙寅蜀郡岷山崩壅江三日江水竭劉向大惡之曰昔周岐山崩三川竭而幽王亡岐山者周所興也漢家本起於蜀漢今所起之地山崩川竭星孛又及攝提大角從參至辰殆必亡矣綏和元年冬十月甲寅王根病免十一月衛尉侍中淳于長有寵於上大見信用貴傾公卿外交諸侯牧守賂遺賞賜纍巨萬淫於聲色許后姊孊為龍雒思侯夫人寡居長與孊私通因取為小妻許后時居長定宫因孊賂遺長欲求復為婕妤長受許后金錢乘輿服御物前後千餘萬詐許為白上立以為左皇后孊每入長定宫輒與孊書戲侮許后嫚易無不言交通書記賂遺連年時曲陽侯根輔政久病數乞骸骨長以外親居九卿位次第當代根侍中騎都尉光祿大夫王莽心害長寵私聞其事莽侍曲陽侯病因言長見將軍久病意喜自以當代輔政至對衣冠議語署置具言其罪過根怒曰即如是何不白也莽曰未知將軍意故未敢言根曰趣白東宫莽求見太后具言長驕佚欲代曲陽侯私與長定貴人姊通受取其衣物太后亦怒曰兒至如此往白之帝莽白上上以太后故免長官勿治罪遣就國初紅陽侯立不得輔政疑為長毁譖常怨毒長上知之及長當就國立嗣子融從長請車騎長以珍寶因融重遺立立因上封事為長求留曰陛下既託文以皇太后故誠不可更有它計於是天子疑焉下有司按驗吏捕融立令融自殺以滅口上愈疑其有大姦遂逮長繫洛陽詔獄窮治長具服戲侮長定宫謀立左皇后罪至大逆死獄中妻子當坐者徙合浦母若歸故郡上使廷尉孔光持節賜廢后藥自殺上以王莽首發大姦稱其忠直王根因薦莽自代丙寅以莽為大司馬時年三十八莽既拔出同列繼四父而輔政欲令名譽過前人遂克己不倦聘諸賢良以為掾史賞賜邑錢悉以享士愈為儉約母病公卿列侯遣夫人問疾莽妻迎之衣不曵地布蔽膝見之者以為僮使問知其夫人皆驚其飾名如此二年三月丙戌帝崩于未央宫夏四月丙午哀帝即位五月太皇太后詔大司馬莽就第避帝外家莽上疏乞骸骨帝遣尚書令詔起莽又遣丞相孔光大司空何武左將軍師丹衛尉傅喜白太皇太后曰皇帝聞太后詔甚悲大司馬即不起皇帝即不敢聽政太后乃復令莽視事六月上置酒未央宫內者令為傅太后張幄坐於太皇太后坐旁大司馬莽按行責內者令曰定陶太后藩妾何以得與至尊並徹去更設坐傅太后聞之大怒莽復乞骸骨秋七月丁卯上賜莽黃金五百斤安車駟馬罷就第公卿大夫多稱之者上乃加恩寵置中黃門為莽家給使十日一賜餐又下詔益封莽邑户以為特進給事中朝朔望見禮如三公哀帝建平二年丞相博御史大夫玄奏言新都侯王莽前為大司馬不廣尊尊之義抑貶尊號虧損孝道當伏顯戮幸蒙赦令不宜有爵土請免為庶人上曰以莽與太皇太后有屬勿免遣就國天下多寃王氏者傅用事事見丁元夀元年初王莽既就國杜門自守其中子獲殺奴莽切責獲令自殺在國三歲吏民上書寃訟莽者百數至是賢良周護宋崇等對䇿復深訟莽功德上於是徴莽及平阿侯仁還京師侍太后二年六月戊午帝崩太皇太后聞帝崩即日駕之未央宫收取璽綬太皇太后詔公卿舉可大司馬者莽故大司馬辭位避丁傅衆庶稱以為賢又太皇太后近親自大司徒孔光以下舉朝皆舉莽獨前將軍何武左將軍公孫祿二人相與謀以為往時惠昭之丗外戚吕霍上官持權幾危社稷今孝成孝哀比丗無嗣方當選立近親幼主不宜令外戚大臣持權親疏相錯為國計便於是武舉公孫祿可大司馬而祿亦舉武庚申太皇太后自用莽為大司馬領尚書事秋七月莽以大司徒孔光名儒相三主太后所敬天下信之於是盛尊事光引光女壻甄邯為侍中奉車都尉諸素所不説者莽皆傅致其罪為請奏草令邯持與光以太后指風光光素畏慎不敢不上之莽白太后輒可其奏於是劾奏何武公孫祿互相稱舉皆免官武就國又奏董宏子高昌侯武父為佞邪奪爵又奏南郡太守毋將隆前為冀州牧治中山馮太后獄寃陷無辜關內侯張由誣告骨肉中太僕史立泰山太守丁玄陷人入大辟河內太守趙昌譖害鄭崇幸逢赦令皆不宜處位在中土免為庶人徙合浦中山之獄本立玄自典考之但與隆連名奏事莽少時慕與隆交隆不甚附故因事擠之紅陽侯立太后親弟雖不居位莽以諸父內敬憚之畏立從容言太后令已不得肆意復令光奏立罪惡前知定陵侯淳于長犯大逆罪多受其賂為言誤朝後白以官婢楊寄私子為皇子衆言曰吕氏少帝復出紛紛為天下所疑難以示來世成襁褓之功請遣立就國太后不聼莽曰今漢家衰比世無嗣太后獨代幼主統政誠可畏懼力用公正先天下尚恐不從今以私恩逆大臣議如此羣下傾邪亂從此起宜可且遣就國安後復徴召之太后不得已遣立就國莽之所以脅持上下皆此類也於是附順莽者拔擢忤恨者誅滅以王舜王邑為腹心甄豐甄邯主擊斷平晏領機事劉秀典文章孫建為爪牙豐子尋秀子棻涿郡崔發南陽陳崇皆以材能幸於莽莽色厲而言方欲有所為微見風采黨與承其指意而顯奏之莽稽首涕泣固推讓上以惑太后下用示信於衆庶焉八月莽復白太皇太后廢孝成皇后孝哀皇后為庶人就其園是日皆自殺大司空彭宣以王莽專權乃上書言三公鼎足承君一足不任則覆亂美實臣資性淺薄年齒老眊數伏疾病昏亂遺忘願上大司空長平侯印綬乞骸骨歸鄉里俟置溝壑莽白太后䇿免宣使就國莽恨宣求退故不賜黃金安車駟馬宣居國數年薨九月辛酉中山王即皇帝位大赦天下平帝年九歲太皇太后臨朝大司馬莽秉政百官總已以聼於莽莽權日盛孔光憂懼不知所出上書乞骸骨莽白太后帝幼少宜置師傅徙光為帝太傅位四輔給事中領宿衛供養行內署門戶省服御食物平帝元始元年春正月王莽風益州令塞外蠻夷自稱越裳氏重譯獻白雉一黑雉二莽白太后下詔以白雉薦宗廟於是羣臣盛陳莽功德致周成白雉之瑞周公及身在而託號於周莽冝賜號曰安漢公益戶疇爵邑太后詔尚書具其事莽上書言臣與孔光王舜甄豐甄邯共定䇿今願獨條光等功賞寢置臣莽勿隨輩列甄邯白太后下詔曰無偏無黨王道蕩蕩君有安宗廟之功不可以骨肉故蔽隱不揚君其勿辭莽復上書固讓數四稱疾不起左右白太后冝勿奪莽意但條孔光等莽乃肯起二月丙辰太后下詔以太傅博山侯光為太師車騎將軍安陽侯舜為太保皆益封萬戶左將軍光祿勳豐為少傅封廣陽侯皆授四輔之職侍中奉車都尉邯封承陽侯四人既受賞莽尚未起羣臣復上言莽雖克讓朝所宜章以時加賞明重元功無使百僚元元失望太后乃下詔以大司馬新都侯莽為太傅幹四輔之事號曰安漢公益封二萬八千戶於是莽為惶恐不得已而起受太傅安漢公號讓還益封事云願須百姓家給然後加賞羣臣復爭太后詔曰公自期百姓家給是以聽之其令公俸賜皆倍故百姓家給人足大司徒大司空以聞莽復讓不受而建言褒賞宗室羣臣立故東平王雲太子開明為王又以故東平思王孫成都為中山王奉孝王後封宣帝耳孫信等三十六人皆為列侯太僕王惲等二十五人皆賜爵關內侯又令諸侯王公列侯關內侯無子而有孫若同産子者皆得以為嗣宗室屬未盡而以罪絶者復其屬天下吏比二千石以上年老致仕者參分故祿以一與之終其身下及庶民鰥寡恩澤之政無所不施莽既媚説吏民又欲專斷知太后老厭政乃風公卿奏言往者吏以功次遷至二千石及州郡所舉茂材異等吏率多不稱冝皆見安漢公又太后春秋高不宜親省小事令太后下詔曰自今以來唯封爵乃以聞他事安漢公四輔平決州牧二千石及茂材吏初除奏事者輒引入至近署對安漢公考故官問新職以知其稱否於是莽人人延問密致恩意厚加贈送其不合指顯奏免之權與人主侔矣王莽恐帝外家衛氏奪其權白太后前哀帝立背恩義自貴外家丁傅橈亂國家幾危社稷今帝以幼年復奉大宗為成帝後宜明一統之義以戒前事為後代法六月遣甄豐奉璽綬即拜帝母衛姬為中山孝王后賜帝舅衛寶寶弟玄爵關內侯賜帝女弟三人號曰君皆留中山不得至京師扶風功曹申屠剛以直言對䇿曰臣聞成王幼少周公攝政聼言下賢均權布寵動順天地舉措不失然近則召公不恱逺則四國流言今聖主始免襁褓即位以來至親分離外戚杜隔思不得通且漢家之制雖任英賢猶援姻戚親踈相錯杜塞間隙誠所以安宗廟重社稷也宜亟遣使者徴中山太后置之别宫令時朝見又召馮衛二族裁與冗職使得執戟親奉宿衛以抑患禍之端上安社稷下全保傅莽令太后下詔曰剛所言僻經妄説違背大義罷歸田里二年春黃支國獻犀牛黃支在南海中去京師三萬里王莽欲耀威德故厚遺其王令遣使貢獻越嶲郡上黃龍遊江中太師光大司徒宫等咸稱莽功德比周公宜告祠宗廟大司農孫寶曰周公上聖召公大賢尚猶有不相説著於經典兩不相損今風雨未時百姓不足每有一事羣臣同聲得無非其美者時大臣皆失色甄邯即時承制罷議者會寶遣吏迎母母道病留弟家獨遣妻子司直陳崇劾奏寶事下三公即訊寶對曰年七十悖眊恩衰共養營妻子如章寶坐免終於家三月癸酉大司空王崇謝病免以避王莽夏四月丁酉左將軍甄豐為大司空右將軍孫建為左將軍光祿勳甄邯為右將軍郡國大旱蝗青州尤甚民流亡王莽白太后宜衣繒練頗損膳以示天下莽因上書願出錢百萬獻田三十頃付大司農助給貧民於是公卿皆慕效焉凡獻田宅者二百三十人以口賦貧民又起五里於長安城中宅二百區以居貧民莽帥羣臣奏太后言幸賴陛下德澤間者風雨時甘露降神芝生蓂莢朱草嘉禾休徴同時並至願陛下遵帝王之常服復太官之法膳使臣子各得盡歡心備供養莽又令太后下詔不許每有水旱莽輒素食左右以白太后太后遣使者詔莽曰聞公菜食憂民深矣今秋幸孰公以時食肉愛身為國六月光祿大夫楚國龔勝太中大夫琅琊邴漢以王莽專政皆乞骸骨莽令太后䇿詔之曰朕愍以官職之事煩大夫大夫其修身守道以終高年皆加優禮而遣之梅福知王莽必篡漢祚一朝棄妻子去不知所之其後人有見福於會稽者變名姓為吳市門卒云秋九月王莽欲恱太后以威德至盛異於前乃風單于令遣王昭君女須卜居次云入侍太后所以賞賜之甚厚莽奏令中國不得有二名因使使者以風單于宜上書慕化為一名漢必加厚賞單于從之上書言幸得備藩臣竊樂太平聖制臣故名囊知牙斯今謹更名曰知莽大説白太后遣使者答諭厚賞賜焉莽欲以女配帝為皇后以固其權奏言皇帝即位三年長秋宫未建掖廷媵未充乃者國家之難本從無嗣配取不正請考論五經定取后禮正十二女之義以廣繼嗣博采二王後及周公孔子世列侯在長安者適子女事下有司上衆女名王氏女多在選中者莽恐其與己女爭即上言身無德子材下不宜與衆女並采太后以為至誠乃下詔曰王氏女朕之外家其勿采庶民諸生郎吏以上守闕上書者日千餘人公卿大夫或詣廷中或伏省户下咸言安漢公盛勳堂堂若此今當立后獨奈何廢公女天下安所歸命願得公女為天下母莽遣長史以下分部曉止公卿及諸生而上書者愈甚太后不得已聼公卿采莽女莽復自白宜博選衆女公卿爭曰不宜采諸女以二正統莽乃白願見女三年春太后遣長樂少府夏侯藩宗正劉宏尚書令平晏納采見女還奏言公女漸漬德化有窈窕之容宜承天序奉祭祀太師光大司徒宫大司空豐左將軍孫建執金吾尹賞行太常事太中大夫劉秀及太卜太史令服皮辨素積以禮雜卜筮皆曰兆遇金水王相卦遇父母得位所謂康強之占逢吉之符也又以太牢䇿告宗廟有司奏故事聘皇后黃金二萬斤為錢二萬萬莽深辭讓受六千三百萬而以其四千三百萬分豫十一媵家及九族貧者夏大司徒司直陳崇使張敞孫竦草奏盛稱安漢公功德以為宜恢公國令如周公建立公子令如伯禽所賜之品亦皆如之諸子之封皆如六子太后以示羣公羣公方議其事會吕寬事起初莽長子宇非莽隔絶衛氏恐久後受禍即私與衛寶通書教衛后上書謝恩因陳丁傅舊惡冀得至京師莽白太皇太后詔有司褒賞中山孝王后益湯沭邑七千戶衛后日夜啼泣思見帝靣而但益戶邑宇復教令上書求至京師莽不聼宇與師吳章及婦兄吕寬議其故章以為莽不可諫而好鬼神可為變怪以驚懼之章因推類説令歸政衛氏宇即使寬夜持血灑莽第門吏發覺之莽執宇送獄飲藥死宇妻焉懷子繫獄須産子已殺之甄邯等白太后下詔曰公居周公之位輔成王之主而行管蔡之誅不以親親害尊尊朕甚嘉之莽盡滅衛氏支屬唯衛后在吳章要斬磔尸東市門初章為當世名儒教授尤盛弟子千餘人莽以為惡人黨皆當禁錮不得仕官門人盡更名他師平陵云敞時為大司徒掾自劾吳章弟子收抱章尸歸棺斂葬之京師稱焉莽於是因吕寬之獄遂窮治黨與連引素所惡者悉誅之元帝女弟敬武長公主素附丁傅及莽專政復非議莽紅陽侯王立莽之尊屬平阿侯王仁素剛直莽皆以太皇太后詔遣使者迫守令自殺莽白太后主暴病薨太后欲臨其喪莽固爭而止甄豐遣使者乘傳案治衛氏黨與郡國豪傑及漢忠直臣不附莽者皆誣以罪法而殺之何武鮑宣及王啇子樂昌侯安辛慶忌三子護羌校尉通函谷都尉遵水衡都尉茂南郡太守辛伯等皆坐死凡死者數百人海內震焉北海逢萌謂友人曰三綱絶矣不去禍將及人即解冠挂東都城門歸將家屬浮海客於遼東莽召明禮少府宗伯鳯入説為人後之誼白令公卿將軍侍中朝臣並聼欲以內厲天子而外塞百姓之議四年二月丁未遣大司徒宫大司空豐等奉乘輿法駕迎皇后於安漢公第授皇后璽紱入未央宫大赦天下夏太保舜等及吏民上書者八千餘人咸請如陳崇言加賞於安漢公章下有司有司請益封公以新息召陵二縣及黃郵聚新野田采伊尹周公稱號加公為宰衡位上公三公言事稱敢言之賜公太夫人號曰功顯君封公子男二人安為褒新侯臨為賞都侯加后聘三千七百萬合為一萬萬以明大禮太后臨前殿親封拜安漢公拜前二子拜後如周公故事莽稽首辭讓出奏封事願獨受母號還安臨印韍及號位戶邑事下太師光等皆曰賞未足以直功謙約退讓公之常節終不可聼忠臣之節亦宜自屈而伸主上之義宜遣大司徒大司空持節承制詔公亟入視事詔尚書勿復受公之讓奏奏可莽乃起視事止減召陵黃郵新野之田而已莽復以所益納徴錢千萬遺太后左右奉共養者莽雖專權然所以誑耀媚事太后下至旁側長御方故萬端賂遺以千萬數白尊太后姊妹號皆為君食湯沭邑以故左右日夜共譽莽莽又知太后婦人厭居深宫中莽欲虞樂以市其權乃令太后四時車駕巡狩四郊存見孤寡貞婦所至屬縣輒施恩惠賜民錢帛牛酒嵗以為常太后旁弄兒病在外舍莽自親候之其欲得太后意如此太保舜奏言天下聞公不受千乘之土辭萬金之幣莫不鄉化蜀郡男子路建等輟訟慚怍而退雖文王郤虞芮何以加宜報告天下奏可羣臣奏言昔周公攝政七年制度乃定今安漢公輔政四年營作二旬大功畢成宜升宰衡位在諸侯王上詔曰可仍令議九錫之法莽自以北化丐奴東致海外南懷黃支唯西方未有加乃遣中郎將平憲等多持金幣誘塞外羌使獻地願內屬憲等奏言羌豪良願等種可萬二千人願為內臣獻鮮水海允谷鹽池平地美草皆豫漢民自居險阻處為藩蔽問良願降意對曰太皇太后聖明安漢公至仁天下太平五榖成熟或禾長丈餘或一粟三米或不種自生或繭不蠶自成甘露從天下醴泉自地出鳯皇來儀神爵降集從四歲以來羌人無所疾苦故思樂內屬宜以時處業置屬國領護事下莽莽復奏今已有東海南海北海郡請受良願等所獻地為西海郡分天下為十二州應古制奏可冬置西海郡又增法五十條犯者徙之西海徙者以千萬數民始怨矣分京師置前輝光後丞烈二郡更公卿大夫八十一元士官名位次及十二州名分界郡國所屬罷置改易天下多事吏不能紀矣五年夏四月吏民以莽不受新野田而上書者前後四十八萬七千五百七十二人及諸侯王公列侯宗室見者皆叩頭言宜亟加賞於安漢公於是莽上書言諸臣民所上章下議者願皆寢勿上使臣莽得盡力畢制禮作樂事事成願賜骸骨歸家避賢者路甄邯等白太后詔曰公每見輒流涕叩頭言願不受賞賞即加不敢當位方制作未定事須公而決故且聽公制作畢成羣公以聞究于前議其九錫禮儀亟奏五月䇿命安漢公莽以九錫莽稽首再拜受緑韍衮冕衣裳㻛琫㻛珌句履鸞路乘馬龍旗九旒皮辨素積戎路乘馬彤弓矢盧弓矢左建朱鉞右建金戚甲胄一具秬鬯二卣圭瓚二九命青玉圭二朱戶納陛署宗官祝官卜官史官虎賁三百人莽以皇后有子孫瑞通子午道從杜陵直絶南山徑漢中泉陵侯劉慶上書言周成王幼少稱孺子周公居攝今帝冨於春秋宜令安漢公行天子事如周公羣臣皆曰宜如慶言時帝春秋益壯以衛后故怨不恱冬十二月莽因臘日上椒酒置毒酒中帝有疾莽作䇿請命於泰畤願以身代藏䇿金縢置于前殿敕諸公勿敢言丙午帝崩于未央宫大赦天下莽令天下吏六百石以上皆服喪三年奏尊孝成廟曰統宗孝平廟曰元宗斂孝平加元服葬康陵班固贊曰孝平之世政自莽出褒善顯功以自尊盛觀其文辭方外百蠻無思不服休徴嘉應頌聲並作至乎變異見於上民怨於下莽亦不能文也太后與羣臣議立嗣時元帝世絶而宣帝曾孫有見王五人列侯四十八人莽惡其長大曰兄弟不得相為後乃悉徴宣帝玄孫選立之是月前輝光謝嚻奏武功長孟通浚井得白石上圓下方有丹書著石文曰告安漢公莽為皇帝符命之起自此始矣莽使羣公以白太后太后曰此誣罔天下不可施行太保舜謂太后事已如此無可奈何沮之力不能止又莽非敢有它但欲稱攝以重其權填服天下耳太后心不以為可然力不能制乃聼許舜等即共令太后下詔曰孝平皇帝短命而崩已使有司徴孝宣皇帝玄孫二十三人差度宜者以嗣孝平皇帝之後玄孫年在襁褓不得至德君子孰能安之安漢公莽輔政三世與周公異丗同符今前輝光嚻武功長通上言丹石之符朕深思厥意云為皇帝者乃攝行皇帝之事也其令安漢公居攝踐祚如周公故事具禮儀奏於是羣臣奏言太后聖德昭然深見天意詔令安漢公居攝臣請安漢公踐祚服天子韍冕背斧依于户牗之間南面朝羣臣聼政事車服出入警蹕民臣稱臣妾皆如天子之制郊祀天地宗祀明堂共祀宗廟享祭羣神贊曰假皇帝民臣謂之攝皇帝自稱曰豫平決朝事常以皇帝之詔稱制以奉順皇天之心輔翼漢室保安孝平皇帝之幼嗣遂寄託之義隆治平之化其朝見太皇太后帝皇后皆復臣節自施政教於其宫家國采如諸侯禮儀故事太后詔曰可王莽居攝元年春正月王莽祀上帝於南郊又行迎春大射養老之禮三月己丑立宣帝玄孫嬰為皇太子號曰孺子嬰廣戚侯顯之子也年二歲託以為卜相最吉立之尊皇后曰皇太后以王舜為太傅左輔甄豐為太阿右拂甄邯為太保後承又置四少秩皆二千石四月安衆侯劉崇與相張紹謀曰安漢公莽必危劉氏天下非之莫敢先舉此乃宗室之耻也吾帥宗族為先海內必和紹等從者百餘人遂進攻宛不得入而敗紹從弟竦與崇族父嘉詣闕自歸莽赦弗罪竦因為嘉作奏稱莽德美罪狀劉崇願為宗室倡始父子兄弟負籠荷鍤馳之南陽豬崇宫室令如古制及崇社宜如亳社以賜諸侯用永監戒於是莽大説封嘉為率禮侯嘉子七人皆賜爵關內侯後又封竦為淑德侯長安為之語曰欲求封過張伯松力戰鬭不如巧為奏自後謀反者皆汙池云羣臣復白劉崇等謀逆者以莽權輕也宜尊重以填海內五月甲辰太后詔莽朝見太后稱假皇帝十二月羣臣奏請以安漢公廬為攝省府為攝殿第為攝宫奏可二年五月東郡太守翟義方進之子也與姊子上蔡陳豐謀曰新都侯攝天子位號令天下故擇宗室幼稚者以為孺子依託周公輔成王之義且以觀望必代漢家其漸可見方今宗室衰弱外無強藩天下傾首服從莫能亢扞國難吾幸得備宰相子身守大郡父子受漢厚恩義當為國討賊以安社稷欲舉兵西誅不當攝者選宗室子孫輔而立之設令時命不成死國埋名猶可以不慙於先帝今欲發之汝肯從我乎豐年十八勇壯許諾義遂與東郡都尉劉宇嚴鄉侯劉信信弟武平矦劉璜結謀以九月都試日斬觀令因勒其車騎材官士募郡中勇敢部署將帥信子厈時為東平王乃并東平兵立信為天子義自號大司馬柱天大將軍移檄郡國言莽鴆殺孝平皇帝攝天子位欲絶漢室今天子已立共行天罰郡國皆震比至山陽衆十餘萬莽聞之惶懼不能食太皇太后謂左右曰人心不相逺也我雖婦人亦知莽必以是自危莽乃拜其黨親輕車將軍成武侯孫建為奮武將軍光祿勳成都侯王邑為虎牙將軍明義侯王駿為強弩將軍春王城門校尉王况為震威將軍宗伯忠孝侯劉宏為奮衝將軍中少府建威侯王昌為中堅將軍中郎將震羌侯竇况為奮威將軍凡七人自擇除關西人為校尉軍吏將關東甲卒發奔命以擊義焉復以太僕武讓為積弩將軍屯函谷關將作大匠蒙鄉侯逯並為橫壄將軍屯武關羲和紅休侯劉秀為揚武將軍屯宛三輔聞翟義起自茂陵以西至汧二十三縣盜賊並發槐里男子趙朋霍鴻等自稱將軍攻燒官寺殺右輔都尉及斄令相與謀曰諸將精兵悉東京師空可攻長安衆稍多至十餘萬火見未央宫前殿莽復拜衛尉王級為虎賁將軍大鴻臚望鄉侯閻遷為折衝將軍西擊朋等以常鄉侯王惲為車騎將軍屯平樂館騎都尉王晏為建威將軍屯城北城門校尉趙恢為城門將軍皆勒兵自備以太保後承承陽侯甄邯為大將軍受鉞高廟領天下兵左仗節右把鉞屯城外王舜甄豐晝夜循行殿中莽日抱孺子禱郊廟會群臣而稱曰昔成王幼周公攝政而管蔡挾祿父以畔今翟義亦挾劉信而作亂自古大聖猶懼此况臣莽之斗筲羣臣皆曰不遭此變不章聖德冬十月甲子莽依周書作大誥曰粵其聞日宗室之俊有四百人民獻儀九萬夫豫敬以終於此謀繼嗣圖功遣大夫桓談等班行諭告天下以當反位孺子之意諸將東至陳留災與翟義會戰破之斬劉璜首莽大喜復下詔先封車騎都尉孫賢等五十五人皆為列侯即軍中拜授因大赦天下於是吏士精鋭遂攻圍義於圉城十二月大破之義與劉信棄軍亡至固始界中捕得義尸磔陳都市卒不得信初始元年春王邑等還京師西與王級等合擊趙朋霍鴻二月朋等殄滅諸縣悉平還師振旅莽乃置酒白虎殿勞饗將帥詔陳崇治校軍功第其高下依周制爵五等以封功臣為侯伯子男凡三百九十五人曰皆以奮怒東指西擊羌寇蠻盜反虜逆賊不得旋踵應時殄滅天下咸服之功封云其當賜爵關內侯者更名曰附城又數百人莽發翟義父方進及先祖冡在汝南者燒其棺柩夷滅三族誅及種嗣至皆同坑以棘五毒并葬之又取義及趙朋霍鴻黨衆之尸聚之通路之旁濮陽無鹽圉槐里盩厔凡五所建表木於其上書曰反虜逆賊鯨鯢義等既敗莽於是自謂威德日盛大獲天人之助遂謀即真之事矣羣臣復奏進攝皇帝子安臨爵為公封兄子光為衍功侯是時莽還歸新都國羣臣復白以封莽孫宗為新都侯九月莽毋功顯君死莽自以居攝踐祚奉漢大宗之後為功顯君緦縗辨而加麻環絰如天子弔諸侯服凡一弔再會而令新都侯宗為主服喪三年云司威陳崇奏莽兄子衍功侯光私報執金吾竇况令殺人况為收繫致其法莽大怒切責光光母曰汝自視孰與長孫中孫長孫中孫者宇及獲之字也遂母子自殺及况皆死初莽以事母養嫂撫兄子為名及後悖虐復以示公義焉令光子嘉嗣爵為侯是歲廣饒侯劉京言齊郡新井車騎將軍千人扈雲言巴郡石牛太保屬臧鴻言扶風雍石莽皆迎受十一月甲子莽奏太后曰陛下遇漢十二世三七之厄承天威命詔臣莽居攝廣饒侯劉京上書言七月中齊郡臨淄縣昌興亭長辛當一暮數夢曰吾天公使也天公使我告亭長曰攝皇帝當為真即不信我此亭中當有新井亭長晨起視亭中誠有新井入地且百尺十一月壬子直建冬至巴郡石牛戊午雍石文皆到于未央宫之前殿臣與太保安陽侯舜等視天風起塵冥風止得銅符帛圖於石前文曰天告帝符獻者封侯騎都尉崔發等視説孔子曰畏天命畏大人畏聖人之言臣莽敢不承用臣請共事神祗宗廟奏言太皇太后孝平皇后皆稱假皇帝其號令天下天下奏言事毋言攝以居攝三年為始初元年漏刻以百二十為度用應天命臣莽夙夜養育隆就孺子令與周之成王比德宣明太皇太后威德於萬方期於富而教之孺子加元服復子明辟如周公故事奏可衆庶知其奉符命指意羣臣博議别奏以示即真之漸矣期門郎張充等六人謀共劫莽立楚王發覺誅死梓潼人哀章學問長安素無行好為大言見莽居攝即作銅匱為兩檢署其一曰天帝行璽金匱圖其一署曰赤帝璽某傳豫皇帝金䇿書某者高皇帝名也書言王莽為真天子皇太后如天命圖書皆書莽大臣八人又取令名王興王盛章因自竄姓名凡十一人皆署官爵為輔佐章聞齊井石牛事下即日昏時衣黃衣持匱至高廟以付僕射僕射以聞戊辰莽至高廟拜受金匱神禪御王冠謁太后還坐未央宫前殿下書曰豫以不德託于皇初祖考黃帝之後皇始祖考虞帝之苖裔而太皇太后之末屬皇天上帝隆顯大佑成命統序符契圖文金匱䇿書神明詔告屬豫以天下兆民赤帝漢氏高皇帝之靈承天命傳國金䇿之書豫甚祗畏敢不欽受以戊辰直定御王冠即真天子位定有天下之號曰新其改正朔易服色變犧牲殊徽幟異器制以十二月朔癸酉為始建國元年正月之朔以雞鳴為時服色配德上黃犧牲應正用白使節之旄幡皆純黃其署曰新使五威節以承皇天上帝威命也莽將即真先奉諸符瑞以白太后太后大驚是時以孺子未立璽臧長樂宫及莽即位請璽太后不肯授莽莽使安陽侯舜諭指舜素謹敕太后雅愛信之舜既見太后太后知其為莽求璽怒罵之曰而屬父子宗族蒙漢家力冨貴纍世既無以報受人孤寄乘便利時奪取其國不復顧恩義人如此者狗豬不食其餘天下豈有而兄弟邪且若自以金匱符命為新皇帝變更正朔服制亦當自更作璽傳之萬世何用此亡國不祥璽為而欲求之我漢家老寡婦旦暮且死欲與此璽俱葬終不可得太后因涕泣而言旁側長御以下皆垂涕舜亦悲不能自止良久乃仰謂太后臣等已無可言者莽必欲得傳國璽太后寧能終不與邪太后聞舜語切恐莽欲脅之乃出漢傳國璽投之地以授舜曰我老已死知而兄弟今族滅也舜既得傳國璽奏之莽大説乃為太皇置酒未央宫漸臺大縱衆樂莽又欲改太后漢家舊號易其璽綬恐不見聼而莽疏屬王諫欲諂莽上書言皇天廢去漢而命立新室太皇太后不宜稱尊號當隨漢廢以奉天命莽以其書白太后太后曰此言是也莽因曰此悖德之臣也罪當誅於是冠軍張永獻符命銅璧文言太皇太后當為新室文母太皇太后莽乃下詔從之於是鴆殺王諫而封張永為貢符子班彪贊曰三代以來王公失世稀不以女寵及王莽之興由孝元后歷漢四世為天下母饗國六十餘載羣弟世權更持國柄五將十侯卒成新都位號已移於天下而元后卷卷猶握一璽不欲以授莽婦人之仁悲夫始建國元年春正月朔莽帥公侯卿士奉皇太后璽韍上太皇太后順符命去漢號焉初莽娶故丞相王欣孫宜春侯咸女為妻立以為皇后生四男宇獲前誅死安頗荒忽乃以臨為皇太子安為新嘉辟封宇子六人皆為公大赦天下莽乃䇿命孺子為定安公封以萬戶地方百里立漢祖宗之廟於其國與周後並行其正朔服色以孝平皇后為定安太后讀䇿畢莽親執孺子手流涕歔欷曰昔周公攝位終得復子明辟今豫獨迫皇天威命不得如意哀嘆良久中傅將孺子下殿北面而稱臣百僚陪位莫不感動又按金匱封拜輔臣以太傅左輔王舜為太師封安新公大司徒平晏為太傅就新公少阿羲和劉秀為國師嘉新公廣漢梓潼哀章為國將美新公是為四輔位上公太保後承甄邯為大司馬承新公丕進侯王尋為大司徒章新公步兵將軍王邑為大司空隆新公是為三公太阿右拂大司空甄豐為更始將軍廣新公京兆王興為衛將軍奉新公輕車將軍孫建為立國將軍成新公京兆王盛為前將軍崇新公是為四將凡十一公王興者故城門令史王盛者賣餅莽按符命求得此姓名十餘人兩人容貌應卜相徑從布衣登用以示神焉是日封拜卿大夫侍中尚書官凡數百人諸劉為郡守者皆徙為諫大夫攺明光宫為定安館定安太后居之以大鴻臚府為定安公第皆置門衛使者監領敕阿乳母不得與嬰語常在四壁中至於長大不能名六畜後莽以女孫宇子妻之莽䇿命羣司各以其職如典誥之文置大司馬司允大司徒司直大司空司若位皆孤卿更名大司農曰羲和後更為納言大理曰作士太常曰秩宗大鴻臚曰典樂少府曰共工水衡都尉曰豫虞與三公司卿分屬三公置二十七大夫八十一元士分主中都官諸職又更光祿勳等名為六監皆上卿改郡太守曰大尹都尉曰大尉縣令長曰宰長樂宫曰常樂室長安曰常安其餘百官宫室郡縣盡易其名不可勝紀封王氏齊縗之屬為侯大功為伯小功為子緦麻為男其女皆為任男以睦女以隆為號焉又曰漢氏諸侯或稱王至於四夷亦如之違於古典繆於一統其定諸侯王之號皆稱公及四夷僭號稱王者皆更為侯於是漢諸侯王二十二人皆降為公王子侯者百八十一人皆降為子其後皆奪爵焉莽因漢承平之業府庫百官之冨百蠻賔服天下晏然莽一朝有之其心意未滿狹小漢家制度欲更為疏闊乃自謂黃帝虞舜之後至齊王建孫濟北王安失國齊人謂之王家因以為氏故以黃帝為初祖虞帝為始祖追尊陳胡公曰陳胡王田敬仲曰齊敬王濟北王安曰濟北愍王立祖廟五親廟四天下姚媯陳田王五姓皆為宗室丗世復無有所與封陳崇田豐為侯以奉胡王敬王後天下牧守皆以前有翟義趙朋等作亂領州郡懷忠孝封牧為男守為附城以漢高廟為文祖廟漢氏園寢廟在京師者勿罷祠薦如故諸劉勿解其復各終厥身州牧數存問勿令有侵寃莽以劉之為字卯金刀也詔正月剛卯金刀之利皆不得行乃罷錯刀契刀及五銖錢秋遣五威將王竒等十二人班符命四十二篇於天下德祥五事符命二十五福應十二五威將奉符命齎印綬王侯以下及吏官名更者外及丐奴西域徼外蠻夷皆即授新室印綬因收故漢印綬大赦天下改漢印文去璽曰章二年春二月五威將帥七十二人還奏事漢諸侯王為公者悉上璽綬為民無違命者獨故廣陽王嘉以獻符命魯王閔以獻神書中山王成都以獻書言莽德皆封列侯班固論曰昔周封國八百同姓五十有餘所以親親賢賢關諸盛衰深根固本為不可拔者也故盛則周召相其治致刑錯衰則五伯扶其弱與共守天下謂之共主強大弗之敢傾歷載八百餘年數極德盡降為庶人用天年終秦訕笑三代竊自號為皇帝而子弟為匹夫內無骨肉本根之輔外無尺土藩翼之衛陳吳奮其白挺劉項隨而斃之故曰周過其歷秦不及期國執然也漢興之初懲戒亡秦孤立之敗於是尊王子弟大啓九國自鴈門以東盡遼陽為燕代常山以南太行左轉度河濟漸于海為齊趙榖泗以往奄有龜蒙為梁楚東帶江湖薄會稽為荆吳北界淮瀕略廬衡為淮南湘漢之陽亘九嶷為長沙諸侯比境周匝三垂外接胡越天子自有三河東郡潁川南陽自江陵以西至巴蜀北自雲中至隴西與京師內史凡十五郡公主列侯頗邑其中而藩國大者夸州兼郡連城數十宫室百官同制京師可謂矯枉過其正矣雖然高祖創業日不暇給孝惠享國又淺高后女主攝位而海內晏如亡狂狡之憂卒折諸吕之難成太宗之業者亦賴之於諸侯也然諸侯原本以大末流濫以致溢小者淫荒越法大者睽孤橫逆以害身喪國故文帝分齊趙景帝削吳楚武帝下推恩之令而藩國自析自此而來齊分為七趙分為六梁分為五淮南分為三皇子始立者大國不過十餘城長沙燕代雖有舊名皆亡南北邊矣景遭七國之難抑損諸侯減黜其官武有衡山淮南之謀作左官之律設附益之法諸侯惟得衣食租稅不與政事至於哀平之際皆繼體苖裔親屬疏逺生於帷牆之中不為士民所尊藝與冨室亡異而本朝短世國統三絶是故王莽知漢中外殫微本末俱弱無所忌憚生其姦心因母后之權假伊周之稱顓作威福廟堂之上不降階序而運天下詐謀既成遂據南面之尊分遣五威之吏馳傳天下班行符命漢諸侯王厥角稽首奉上璽韍惟恐在後或乃稱美頌德以求容媚豈不哀哉冬十一月立國將軍孫建奏九月辛巳陳良終帶自稱廢漢大將軍亡入胸奴又今月癸酉不知何一男子遮臣建車前自稱漢氏劉子輿成帝下妻子也劉氏當復趣空宫收繫男子即常安姓武字仲皆逆天違命大逆無道漢氏宗廟不當在常安城中及諸劉當與漢俱廢陛下至仁久未定前故安衆侯劉祟等更聚衆謀反今狂狡之虜復依託亡漢至犯夷滅連未止者此聖恩不蚤絶其萌牙故也臣請漢氏諸廟在京師者皆罷諸劉為吏者皆罷待除於家莽曰可嘉新公國師以符命為豫四輔明德侯劉龔率禮侯劉嘉等凡三十二人皆知天命或獻天符或貢昌言或捕告反虜厥功茂焉諸劉與三十二人同宗共祖者勿罷賜姓曰王唯國師以女配莽子故不賜姓定安公太后自劉氏之廢常稱疾不朝會時年未二十莽敬憚傷哀欲嫁之乃更號為黃皇室主欲絶之於漢令孫建世子盛飾將醫往問疾后大怒笞鞭其傍侍御因發病不肯起莽遂不復強也莽之謀篡也吏民爭為符命皆得封侯其不為者相戲曰獨無天帝除書乎司命陳崇白莽曰此開姦臣作福之路而亂天命宜絶其原莽亦厭之遂使尚書大夫趙並驗治非五威將率所班皆下獄初甄豐劉秀王舜為莽腹心唱導在位褒揚功德安漢宰衡之號及封莽母兩子兄子皆豐等所共謀而豐舜秀亦受其賜並冨貴矣非復欲令莽居攝也居攝之萌出於泉陵侯劉慶前輝光謝嚻長安令田終術莽羽翼已成意欲稱攝豐等承順其意莽輒復封舜秀豐等子孫以報之豐等爵位已盛心意既滿又實畏漢宗室天下豪傑而疏逺欲進者並作符命莽遂據以即真舜秀內懼而已豐素剛強莽覺其不説故託符命文徙豐為更始將軍與賣餅兒王盛同列豐父子默默時子尋為侍中京兆大尹茂德侯即作符命新室當分陜立二伯以豐為右伯太傅平晏為左伯如周召故事莽即從之拜豐為右伯當述職西出未行尋復作符命言故漢氏平帝后黃皇室主為尋之妻莽以詐立心疑大臣怨謗欲震威以懼下因是發怒曰黃皇室主天下母此何謂也收捕尋尋亡豐自殺尋隨方士入華山歲餘捕得辭連國師公秀子侍中隆威侯棻棻弟右曹長水校尉伐虜侯泳大司空邑弟左關將軍掌威侯竒及秀門人侍中騎都尉丁隆等牽引公卿黨親列侯以下死者數百人乃流棻于幽州放尋于三危殛隆于羽山皆驛車載其尸傳致云三年莽為太子置師友各四人秩以大夫以故大司徒馬宫等為師疑傅丞阿輔保拂是為四師故尚書令唐林等為胥附奔走先後禦侮是為四友又置師友侍中諫議六經祭酒各一人凡九祭酒秩皆上卿遣使者奉璽書印綬安車駟馬迎龔勝即拜為師友祭酒使者與郡太守縣長吏三老官屬行義諸生千人以上入勝里致詔使者欲令勝起迎久立門外勝稱病篤為牀室中户西南牖下東首加朝服拖紳使者付璽書奉印綬內安車駟馬進謂勝曰聖朝未嘗忘君制作未定待君為政思聞所欲施行以安海內勝對曰素愚加以年老被病命在朝夕隨使君上道必死道路無益萬分使者要説至以印綬就加勝身勝輒推不受使者即上言方盛夏暑熱勝病少氣可須秋涼乃發有詔許之使者五日一與太守俱問起居為勝兩子及門人高暉等言朝廷虛心待君以茅土之封雖疾病宜動移至傳舍示有行意必為子孫遺大業暉等白使者語勝自知不見聼即謂暉等吾受漢家厚恩無以報今年老矣旦暮入地誼豈以一身事二姓下見故主哉勝因敕以棺斂喪事衣周於身棺周於衣勿隨俗動吾冡種柏作祠堂語畢遂不復開口飲食積十四日死死時七十九矣是時清名之士又有琅邪紀逡齊薛方太原郇越郇相沛唐林唐尊皆以明經飭行顯名於世紀逡兩唐皆仕莽封侯貴重歷公卿位唐林數上疏諫正有忠直節唐尊衣敝履空被虛偽名郇相為莽太子四友病死莽太子遣使祱以衣衾其子攀棺不聼曰死父遺言師友之送勿有所受今於皇太子得託友官故不受也京師稱之莽以安車迎薛方方因使者辭謝曰堯舜在上下有巢由今明主方隆唐虞之德小臣欲守箕山之節使者以聞莽説其言不強致初隃糜郭欽為南郡太守杜陵蔣詡為兖州刺史亦以廉直為名莽居攝欽詡皆以病免官歸鄉里卧不出戶卒於家哀平之際沛國陳咸以律令為尚書莽輔政多改漢制咸心非之及何武鮑宣死咸歎曰易稱見幾而作不俟終日吾可以逝矣即乞骸骨去職及莽篡位召咸為掌寇大夫咸謝病不肯應時三子參豐欽皆在位咸悉令解官歸鄉里閉門不出入猶用漢家祖臘人問其故咸曰我先人豈知王氏臘乎悉收斂其家律令書文壁藏之又齊栗融北海禽慶蘇章山陽曹竟皆儒生去官不仕於莽班固贊曰春秋列國卿大夫及至漢興將相名臣懷祿耽寵以失其世者多矣是故清節之士於是為貴然大率多能自治而不能治人王貢之材優於龔鮑守死善道勝實蹈焉貞而不諒薛方近之郭欽蔣詡好遁不汙絶紀唐矣四年初莽為安漢公時欲諂太皇太后以斬郅支功奏尊元帝廟為高宗太后晏駕後當以禮配食云及莽改號太后為新室文母絶之於漢不令得體元帝墮壞孝元廟更為文母太后起廟獨置孝元廟故殿以為文母纂食堂既成名曰長壽宫以太后在故未謂之廟莽置酒長壽宫請太后既至見孝元廟廢徹塗地太后驚泣曰此漢家宗廟皆有神靈與何治而壞之且使鬼神無知又何用廟為如令有知我乃人之妃妾豈宜辱帝之堂以陳饋食哉私謂左右曰此人慢神多矣能久得祐乎飲酒不樂而罷自莽篡位後知太后怨恨求所以媚太后無不為然愈不説莽更漢家黑貂著黃貂又改漢正朔伏臘日太后令其官屬黑貂至漢家正臘日獨與其左右相對飲食五年春二月文母皇太后崩年八十四葬渭陵與元帝合而溝絶之新室世世獻祭其廟元帝配食坐於牀下莽為太后服喪三年天鳯二年春二月民訛言黃龍墯死黃山宫中百姓奔走往觀者有萬數莽惡之捕繫問語所從起不能得莽意以為制定則天下自平故鋭思於地理制禮作樂講合六經之説公卿旦入暮出論議連年不決不暇省獄訟寃結民之急務縣宰缺者數年守兼一切貪殘日甚中郎將繡衣執法在郡國者並乘權藝傳相舉奏又十一公士分布勸農桑班時令按諸章冠蓋相望交錯道路召會吏民逮捕證左郡縣賦斂遞相賕賂白黑紛然守闕告訴者多莽自見前顓權以得漢政故務自覽衆事有司受成苟免諸寶物名帑藏錢榖官皆宦者領之吏民上封事宦官左右開發尚書不得知其畏備臣下如此又好變攺制度政令煩多當奉行者輒質問乃以從事前後相乘憒眊不泄莽常御燈火至明猶不能勝尚書因是為姦寢事上書待報者連年不得去拘繫郡縣者逢赦而後出衛卒不交代者至三歲榖糴常貴邊兵二十餘萬人仰衣食縣官五原代郡尤被其毒起為盜賊數千人為輩轉入旁郡莽遣捕盜將軍孔仁將兵與郡縣合擊歲餘乃定四年秋八月臨淮瓜田儀等依阻會稽長州琅邪吕母聚黨數千人殺海曲宰入海中為盜其衆浸多至萬數荆州飢饉民衆入野澤掘鳬茈而食之更相侵奪新市人王匡王鳯爭平理諍訟遂推為渠帥衆數百人於是諸亡命者南陽馬武頴川王常成丹等皆往從之共攻離鄉聚臧於緑林山中數月間至七八千人又有南郡張霸江夏羊牧等與王厈俱起衆皆萬人莽遣使者即赦盜賊還言盜賊解輒復合問其故皆曰愁法禁煩苛不得舉手力作所得不足以給貢稅閉門自守五年春正月以大司馬司允費興為荆州牧見問到部方略興對曰荆揚之民率依阻山澤以漁采為業間者國張六管稅山澤妨奪民之利連年久旱百姓飢窮故為盜賊興到部欲令明曉告盜賊歸田里假貸犁牛種食闊其租賦冀可以解釋安集莽怒免興官琅邪樊崇起兵於莒平赤眉事見光武六年春莽見盜賊多乃令太史推三萬六千歲歷紀六嵗一改元布天下下書自言已當如黃帝仙升天欲以誑耀百姓銷解盜賊衆皆笑之地皇元年春正月莽見四方盜賊多復欲厭之又下書曰子之皇初祖考黃帝定天下將兵為上將軍內設大將外置大司馬五人大將軍至士吏凡七十五萬八千九百人士千三百五十萬人豫受符命之文稽前人將條備焉於是置前後左右中大司馬之位賜諸州牧至縣宰皆有大將軍偏調校尉之號焉乘傳使者經歷郡國日且十輩倉無見榖以給傳車馬不能足賦取道中車馬取辦於民秋七月巨鹿男子馬適求等謀舉燕趙兵以誅莽大司空士王丹發覺以聞莽遣三公大夫逮治黨與連及郡國豪傑數千人皆誅死封丹為輔國侯汝南郅惲明天文歷數以為漢必再受命上書説莽曰上天垂戒欲悟陛下令就臣位取之以天還之以天可謂知命矣莽大怒繫惲詔獄踰冬會赦得出二年春正月卜者王况謂魏成大尹李焉曰漢家當復興李氏為輔因為焉作讖書合十餘萬言事發莽皆殺之是歲南郡秦豐聚衆且萬人平原女子遲昭平亦聚數千人在河阻中莽召問羣臣禽賊方略皆曰此天囚行尸命在刻漏故左將軍公孫祿徴來與議祿曰太史令宗宣典星歷候氣變以凶為吉亂天文誤朝廷太傅平化侯尊飾虛偽以偷名位賊夫人之子國師嘉信公秀顛倒五經毁師法令學士疑惑明學男張邯地理侯孫陽造井田使民棄土業羲和魯厈設六管以窮工商説符侯崔發阿諛取容令下情不上通宜誅此數子以慰天下初四方皆以飢寒窮愁起為盜賊稍稍羣聚常思歲熟得歸鄉里衆雖萬數不敢略有城邑轉掠求食日闋而已諸長吏牧守皆自亂鬭中兵而死賊非敢欲殺之也而莽終不諭其故是歲荆州牧發奔命二萬人討緑林賊賊帥王匡等相率迎擊於雲社大破牧軍殺數千人盡獲輜重牧欲北歸賊馬武等復遮擊之鉤牧車屏泥刺殺其驂乘然終不敢殺牧賊遂攻拔竟陵轉擊雲杜安陸多略婦女還入緑林中至有五萬餘口州郡不能制翼平連帥田况上言盜賊始發其原甚微部吏伍人所能禽也咎在長吏不為意縣欺其郡郡欺朝廷實百言十實千言百朝廷忽略不輒督責遂至延蔓連州乃遣將帥多發使者傳相監趣郡縣力事上官應塞詰對共酒食且資用以救斷斬不暇復憂盜賊治官事將帥又不能躬率吏士戰則為賊所破吏氣寖傷徒費百姓前幸蒙赦令賊欲解散或反遮擊恐入山谷轉相告語故郡縣降賊皆更驚駭恐見詐滅因飢饉易動旬日之間更十餘萬人此盜賊所以多之故也今洛陽以東米石二千竊見詔書欲遣太師更始將軍二人爪牙重臣多從人衆道上空竭少則無以威示逺方宜急選牧尹以下明其賞罰收合離鄉小國無城郭者徙其老弱置大城中積臧榖食并力固守賊來攻城則不能下所過無食藝不得羣聚如此招之必降擊之則滅今空復多出將帥郡縣苦之反甚於賊宜盡徴還乘傳諸使者以休息郡縣委任臣况以二州盜賊必平定之三年夏四月遣更始將軍廉丹等東討衆賊光武事見眉平赤莽又多遣大夫謁者分教民煮草木為酪酪不可食重為煩費緑林賊遇疫疾死者且半乃各分散引去王常成丹西入南郡號下江兵王厈王鳯馬武及其支黨朱鮪張邛等北入南陽號新市兵皆自稱將軍莽遣司命大將軍孔仁部豫州納言大將軍嚴尤秩宗大將軍陳茂擊荆州各從吏士百餘人乘傳到部募士尤謂茂曰遣將不與兵符必先請而後動是猶紲韓廬而責之獲也流民入關者數十萬人乃置養贍官稟食之使者監領與小吏共盜其稟飢死者什七八先是莽使中黃門王業領長安市買賤取於民民甚患之業以省費為功賜爵附城莽聞城中飢饉以問業業曰皆流民也乃市所賣梁飯肉羮持入示莽曰居民食咸如此莽信之秋七月新市賊王厈等進攻隨平林人陳牧廖湛復聚衆千餘人號平林兵以應之莽以詔書讓廉丹曰倉廩盡矣府庫空矣可以怒矣可以戰矣將軍受國重任不捐身於中野無以報恩塞責丹惶恐夜召其掾馮衍以書示之衍因説丹曰張良以五世相韓椎秦始皇博浪之中將軍之先為漢信臣新室之興英俊不附今海內潰亂人懷漢德甚於詩人思召公也人所歌舞天必從之今方為將軍計莫若屯據大郡鎮撫吏士砥厲其節納雄桀之士詢忠智之謀興社稷之利除萬人之害則福祿流於無窮功烈著於不滅何與軍覆於中原身膏於草野功敗名喪耻及先祖哉丹不聼衍左將軍奉世曾孫也冬無鹽索盧恢等舉兵反城附賊廉丹王匡攻拔之斬首萬餘級莽遣中郎將奉璽書勞丹匡進爵為公封吏士有功者十餘人赤眉别校董憲等衆數萬人在梁郡王匡欲進擊之廉丹以為新拔城罷勞當且休士養威匡不聼引兵獨進丹隨之合戰成昌兵敗匡走丹使吏持其印韍節付匡曰小兒可走吾不可遂止戰死校尉汝雲王隆等二十餘人别鬬聞之皆曰廉公已死吾誰為生馳奔賊皆戰死國將哀章自請願平山東莽遣章馳東與太師匡并力又遣大將軍陽浚守敖倉司徒王尋將十餘萬屯洛陽鎮南宫大司馬董忠養士習射中軍北壘大司空王邑兼三公之職漢宗室劉秀等起南陽與新市平林下江兵合武中興事見光淮陽王更始元年春二月王莽欲外示自安乃染其須髮立杜陵史諶女為皇后置後宫位號視公卿大夫元士者凡百二十人莽赦天下詔王厈哀章等討青徐盜賊嚴尤陳茂等討前隊醜虜明告以生活丹青之信復迷惑不解散將遣大司空隆新公將百萬之師劋絶之矣王莽遣司空王邑司徒王尋發兵四十二萬圍昆陽劉秀發諸營兵三千人大破之武中興事見光莽聞漢兵言莽鴆殺孝平皇帝乃會公卿於王路堂開所為平帝請命金縢之䇿泣以示羣臣夏六月道士西門君惠謂王莽衛將軍王涉曰讖文劉氏當復興國師公姓名是也涉遂與國師公劉秀大司馬董忠司中大贅孫伋謀以所部兵劫莽降漢以全宗族秋七月伋以其謀告莽莽召忠詰責因格殺之使虎賁以斬馬劒銼忠收其宗族以醇醯毒藥白刃叢棘并一坎而埋之秀涉皆自殺莽以其骨肉舊臣惡其內潰故隱其誅莽以軍師外破大臣內畔左右亡所信不能復逺念郡國乃召王邑還為大司馬以大長秋張邯為大司徒崔發為大司空司中壽容苖欣為國師莽憂悶不能食但飲酒啖鰒魚讀軍書倦因馮几寐不復就枕矣八月王莽使太師王匡國將哀章守洛陽更始遣定國上公王匡攻洛陽西屏大將軍申屠建丞相司直李松攻武關三輔震動析人鄧曄于匡起兵南鄉以應漢攻武關都尉朱萌萌降進攻右隊大夫宋綱殺之西拔湖莽愈憂不知所出崔發言古者國有大災則哭以猒之宜告天以求救莽乃率羣臣至南郊陳其符命本末仰天大哭氣盡伏而叩頭諸生小民旦夕會哭為設飱粥甚悲哀者除以為郎郎至五千餘人莽拜將軍九人皆以虎為號將北軍精兵數萬人以東內其妻子宫中以為質時省中黃金尚六十餘萬斤它財物稱是莽愈愛之賜九虎士人四千錢衆重怨無鬭意九虎至華隂回溪距隘自守于匡鄧曄擊之六虎敗走二虎詣闕歸死莽使使責死者安在皆自殺其四虎亡三虎收散卒保渭口京師倉鄧曄開武關迎漢兵李松將三千餘人至湖與曄等共攻京師倉未下曄以弘農掾王憲為校尉將數百人北度渭入左馮翊界李松遣偏將軍韓臣等徑西至新豐擊破莽波水將軍追奔至長門宫王憲北至頻陽所過迎降諸縣大姓各起兵稱漢將率衆隨憲李松鄧曄引軍至華隂而長安旁兵四會城下又聞天水隗氏方到皆爭欲先入城貪立大功鹵掠之利莽赦城中囚徒皆授兵殺豨飲其血與誓曰有不為新室者社鬼記之使更始將軍史諶將之度渭橋皆散走諶空還衆兵發掘莽妻子父祖冢燒其棺椁及九廟明堂辟雍火照城中九月戊申朔兵從宣平城門入張邯逢兵見殺王邑王林王巡勞惲等分將兵距擊北闕下會日暮官府邸第盡奔亡己酉城中少年朱弟張魚等恐見鹵掠趨歡並和燒作室門斧敬法闥呼曰反虜王莽何不出降火及掖庭承明黃皇室主所居黃皇室主曰何靣目以見漢家自投火中而死莽避火宣室前殿火輒隨之莽紺礿服持虞帝匕首天文郎按式於前莽旋席隨斗柄而坐曰天生德於豫漢兵其如豫何庚戌旦明羣臣扶掖莽自前殿之漸臺欲阻池水公卿從官尚千餘人隨之王邑晝夜戰罷極士死傷略盡馳入宫間關至漸臺見其子侍中睦解衣冠欲逃邑叱之令還父子共守莽軍人入殿中聞莽在漸臺衆共圍之數百重臺上猶與相射矢盡短兵接王邑父子惲王巡戰死莽入室下餔時衆兵上臺苖欣唐尊王盛等皆死商人杜吳殺莽校尉東海公賔就斬莽首軍人分莽身節解臠分爭相殺者數十人公賔就持莽首詣王憲憲自稱漢大將軍城中兵數十萬皆屬焉舍東宫妻莽後宫乘其車服癸丑李松鄧曄入長安將軍趙萌申屠建亦至以王憲得璽綬不上多挾宫女建天子鼓旗收斬之傳莽首詣宛縣於市百姓共提繫之或切食其舌班固贊曰王莽始起外戚折節力行以要名譽及居位輔政勤勞國家直道而行豈所謂色取仁而行違者邪莽既不仁而有佞邪之材又乘四父歷世之權遭漢中微國統三絶而太后壽考為之宗主故得肆其姦慝以成篡盜之禍推是言之亦天時非人力之致矣及其竊位南面顛覆之藝險於桀紂而莽晏然自以黃虞復出也乃始恣睢奮其威詐毒流諸夏亂延蠻貉猶未足逞其欲焉是以四海之內囂然喪其樂生之心中外憤怨逺近俱發城池不守支體分裂遂令天下城邑為虛害遍生民自書傳所載亂臣賊子考其禍敗未有如莽之甚者也昔秦燔詩書以立私議莽誦六藝以文姦言同歸殊塗俱用滅亡皆聖王之驅除云爾光武中興王莽地皇三年初長沙定王發生舂陵節侯買買生戴侯熊渠熊渠生考侯仁仁以南方卑濕徙封南陽之白水鄉與宗族往家焉仁卒子敞嗣值莽篡位國除節侯少子外為鬱林太守外生巨鹿都尉回回生南頓令欽欽娶湖陽樊重女生三男縯仲秀兄弟早孤養於叔父良縯性剛毅慷慨有讖文事與相約結定謀議通欲以立秋材官都試騎士日劫前隊大夫甄阜及屬正梁丘賜因以號令大衆使軼與秀歸舂陵舉兵以相應於是縯召諸豪傑計議曰王莽暴虐百姓分崩今枯旱連年兵革並起此亦天亡之時復高祖之業定萬世之秋也衆皆然之於是分遣親客於諸縣起兵縯自發舂陵子弟諸家子弟恐懼皆亡匿曰伯升殺我及見秀綘衣大冠皆驚曰謹厚者亦復為之乃稍自安凡得子弟七八千人部署賔客自稱柱天都部秀時年二十八李通未發事覺亡走父守及家屬坐死者六十四人縯使族人嘉招説新市平林兵與其帥王鳯陳牧西擊長聚進屠唐子鄉又殺湖陽尉軍中分財物不均衆恚恨欲反攻諸劉秀斂宗人所得物悉以與之衆乃悅進拔棘陽李軼鄧晨皆將賔客來會十一月劉縯欲進攻宛至小長安聚與甄阜梁丘賜戰時天密霧漢軍大敗秀單馬走遇女弟伯姬與共騎而奔前行復見姊元趣令上馬元以手揮曰行矣不能相救無為兩沒也會追兵至元及三女皆死縯弟仲及宗從死者數十人縯復收會兵衆還保棘陽阜賜乘勝留輜重於藍鄉引精兵十萬南度潢淳臨沘水阻兩川間為營絶後橋示無還心新市平林見漢兵數敗阜賜軍大至各欲解去縯甚患之會下江兵五千餘人至宜秋縯即與秀及李通俱造其壁曰願見下江一賢將議大事衆推王常縯見常説以合從之利常大悟曰王莽殘虐百姓思漢今劉氏復興即真主也誠思出身為用輔成大功縯曰如事成豈敢獨饗之哉遂與常深相結而去常還具為餘將成丹張卬言之丹卬負其衆曰大丈夫既起當各自為主何故受人制乎常乃徐曉説其將帥曰王莽苛酷積失百姓之心民之謳吟思漢非一日也故使吾屬因此得起夫民所怨者天所去也民所思者天所與也舉大事必當下順民心上合天意功乃可成若負強恃勇觸情恣欲雖得天下必復失之以秦項之藝尚至夷覆况今布衣相聚草澤以此行之滅亡之道也今南陽諸劉舉宗起兵觀其來議者皆有深計大慮王公之才與之並合必成大功此天所以祐吾屬也下江諸將雖屈強少識然素敬常乃皆謝曰無王將軍吾屬幾陷於不義即引兵與漢軍及新市平林合於是諸部齊心同力鋭氣益壯縯大饗軍士設盟約休卒三日分為六部十二月晦潛師夜起襲取藍鄉盡獲其輜重淮陽王更始元年春正月甲子朔漢兵與下江兵共攻甄阜梁丘賜斬之殺士卒二萬餘人王莽納言將軍嚴尤秩宗將軍陳茂引兵欲據宛劉縯與戰於淯陽下大破之遂圍宛先是青徐賊衆雖數十萬人訖無文書號令旌旗部曲及漢兵起皆稱將軍攻城略地移書稱説莽聞之始懼舂陵戴侯曾孫玄在平林兵中號更始將軍時漢兵已十餘萬諸將議以兵多而無所統一欲立劉氏以從人望南陽豪桀及王常等皆欲立劉縯而新市平林將帥樂放縱憚縯威明貪玄懦弱先共定䇿立之然後召縯示其議縯曰諸將軍幸欲尊立宗室甚厚然今赤眉起青徐衆數十萬聞南陽立宗室恐赤眉復有所立王莽未滅而宗室相攻是疑天下而自損權非所以破莽也舂陵去宛三百里耳遽自尊立為天下準的使後人得承吾敝非計之善者也不如且稱王以號令王勢亦足以斬諸將若赤眉所立者賢相率而往從之必不奪吾爵位若無所立破莽降赤眉然後舉尊號亦未晚也諸將多曰善張卬拔劒擊地曰疑事無功今日之議不得有二衆皆從之二月辛巳朔設壇場於淯水上沙中玄即皇帝位南面立朝羣臣羞愧流汗舉手不能言於是大赦攺元以族父良為國三老王匡為定國上公王鳳為成國上公朱鮪為大司馬劉縯為大司徒陳牧為大司空餘皆九卿將軍由是豪桀失望多不服三月王鳯與太常偏將軍劉秀等徇昆陽定陵郾皆下之王莽聞嚴尤陳茂敗乃遣司空王邑馳傳與司徒王尋發兵平定山東徴諸明兵法六十三家以備軍吏以長人巨母霸為壘尉又驅諸猛獸虎豹犀象之屬以助威武邑至洛陽州郡各選精兵牧守自將定會者四十二萬人號百萬餘在道者旌旗輜重千里不絶夏五月尋邑南出潁川與嚴尤陳茂合諸將見尋邑兵盛皆反走入昆陽惶怖憂念妻孥欲散歸諸城劉秀曰今兵榖既少而外寇強大并力禦之功庶可立如欲分散藝無俱全且宛城未拔不能相救昆陽即拔一日之間諸部亦滅矣今不同心膽共舉功名反欲守妻子財物邪諸將怒曰劉將軍何敢如是秀笑而起會候騎還言大兵且至城北軍陳數百里不見其後諸將素輕秀及迫急乃相謂曰更請劉將軍計之秀復為圖畫成敗諸將皆曰諾時城中唯有八九千人秀使王鳳與廷尉大將軍王常守昆陽夜與五威將軍李軼等十三騎出城南門於外收兵時莽兵到城下者且十萬秀等幾不得出尋邑縱兵圍昆陽嚴尤説邑曰昆陽城小而堅今假號者在宛亟進大兵彼必奔走宛敗昆陽自服邑曰吾昔圍翟義坐不生得以見責讓今將百萬之衆遇城而不能下非所以示威也當先屠此城蹀血而進前歌後舞顧不快邪遂圍之城十重列營百數鉦鼓之聲聞數十里或為地道衝輣撞城積弩亂發矢下如雨城中負户而汲王鳯等乞降不許尋邑自以功在漏刻不以軍事為憂嚴尤曰兵法圍城為之闕宜使得逸出以怖宛下邑又不聼棘陽守長岑彭與前隊二嚴説共守宛城漢兵攻之數月城中人相食乃舉城降更始入都之諸將欲殺彭劉縯曰彭郡之大吏執心堅守是其節也今舉大事當表義士不如封之更始乃封彭為歸德侯劉秀至郾定陵悉發諸營兵諸將貪惜財物欲分兵守之秀曰今若破敵珍寶萬倍大功可成如為所敗首領無餘何財物之有乃悉發之六月己卯朔秀與諸營俱進自將步騎千餘為前鋒去大軍四五里而陳尋邑亦遣兵數千合戰秀奔之斬首數十級諸將喜曰劉將軍平生見小敵怯今見大敵勇甚可怪也且復居前請助將軍秀復進尋邑兵却諸部共乘之斬首數百千級連勝遂前諸將膽氣益壯無不一當百秀乃與敢死者三千人從城西水上衝其中堅尋邑易之自將萬餘人行陳敕諸營皆按部毋得動獨迎與漢兵戰不利大軍不敢擅相救尋邑陳亂漢兵乘鋭崩之遂殺王尋城中亦鼓譟而出中外合藝震呼動天地莽兵大潰走者相騰踐伏尸百餘里會大雷風屋瓦皆飛雨下如注滍川盛溢虎豹皆股戰士卒赴水溺死者以萬數水為不流王邑嚴尤陳茂輕騎乘死人度水逃去盡獲其軍實輜重不可勝算舉之連月不盡或燔燒其餘士卒奔走各還其郡王邑獨與所將長安勇敢數千人還洛陽關中聞之震恐於是海內豪桀翕然響應皆殺其牧守自稱將軍用漢年號以待詔命旬月之間遍於天下劉秀復徇潁川攻父城不下屯兵巾車鄉潁川郡掾馮異監五縣為漢兵所獲異曰異有老母在父城願歸據五城以效功報德秀許之異歸謂父城長苖萌曰諸將多暴橫獨劉將軍所到不虜略觀其言語舉止非庸人也遂與萌率五縣以降新市平林諸將以劉縯兄弟威名益盛隂勸更始除之秀謂縯曰事欲不善縯笑曰常如是耳更始大會諸將取縯寶劔視之繡衣御史申徒建隨獻玉玦更始不敢發縯舅樊宏謂縯曰建得無有范曾之意乎縯不應李軼初與縯兄弟善後更諂事新貴秀戒縯曰此人不可復信縯不從縯部將劉稷勇冠三軍聞更始立怒曰本起兵圖大事者伯升兄弟也今更始何為者邪更始以稷為抗威將軍稷不肯拜更始乃與諸將陳兵數千人先收稷將誅之縯固爭李軼朱鮪因勸更始并執縯即日殺之以族兄光祿勳賜為大司徒秀聞之自父城馳詣宛謝司徒官屬迎弔秀秀不與交私語惟深引過而已未嘗自伐昆陽之功又不敢為縯服喪飲食言笑如平常更始以是慙拜秀為破虜大將軍封武信侯更始遣王匡攻洛陽申屠建李松攻武關京兆諸縣及城中共起兵殺王莽莽篡漢事見王王匡拔洛陽生縛莽太師王匡哀章皆斬之更始將都洛陽以劉秀行司隸校尉使前整修宫府秀乃置僚屬作文移從事司察一如舊章時三輔吏士東迎更始見諸將過皆冠幘而服婦人衣莫不笑之及見司隸僚屬皆歡喜不自勝老吏或垂涕曰不圖今日復見漢官威儀由是識者皆屬心焉更始北都洛陽分遣使者徇郡國曰先降者復爵位使者至上谷上谷太守扶風耿況迎上印綬使者納之一宿無還意功曹寇恂勒兵入見使者請之使者不與曰天王使者功曹欲脅之邪恂曰非敢脅使君竊傷計之不詳也今天下初定使君建節銜命郡國莫不延頸傾耳今始至上谷而先墮大信將復何以號令他郡乎使者不應恂叱左右以使者命召況況至恂進取印綬帶況使者不得已乃承制詔之況受而歸更始欲令親近大將徇河北大司徒賜言諸家子獨有文叔可用朱鮪等以為不可更始狐疑賜深勸之更始乃以劉秀行大司馬事持節北度河鎮慰州郡以大司徒賜為丞相令先入關修宗廟宫室大司馬秀至河北所過郡縣考察官吏黜陟能否平遣囚徒除王莽苛政復漢官名吏民喜恱爭持牛酒迎勞秀皆不受南陽鄧禹杖䇿追秀及於鄴秀曰我得專封拜生逺來寧欲仕乎禹曰不願也秀曰即如是何欲為禹曰但願明公威德加於四海禹得效其尺寸垂功名於竹帛耳秀笑因留宿間語禹進説曰今山東未安赤眉青犢之屬動以萬數更始既是常才而不自聼斷諸將皆庸人屈起志在財幣爭用威力朝夕自快而已非有忠良明智深慮逺圖欲尊主安民者也歷觀往古聖人之興二科而已天時與人事也今以天時觀之更始既立而災變方興以人事觀之帝王大業非凡夫所任分崩離析形藝可見明公雖建藩輔之功猶恐無所成立也況明公素有盛德大功為天下所嚮服軍政齊肅賞罰明信為今之計莫如延攬英雄務恱民心立高祖之業救萬民之命以公而慮天下不足定也秀大恱因令禹常宿止於中與定計議每任使諸將多訪於禹皆當其才秀自兄縯之死每獨居輒不御酒肉枕席有涕泣處主簿馮異獨叩頭寬譬秀止之曰卿勿妄言異因進説曰更始政亂百姓無所依戴夫人久飢渴易為充飽今公專命方面冝分遣官屬徇行郡縣宣布惠澤秀納之騎都尉宋子耿純謁秀於邯鄲退見官屬將兵法度不與它將同遂自結納王莽時長安中有自稱成帝子子輿者莽殺之邯鄲卜者王郎緣是詐稱真子輿立為天子移檄州郡趙國以北遼東以西皆望風響應二年春正月大司馬秀以王郎新盛乃北徇薊申屠建李松自長安迎更始遷都二月更始發洛陽初三輔豪桀假號誅莽者人人皆望封侯申屠建既斬王憲又揚言三輔兒大黠共殺其主吏民惶恐屬縣屯聚建等不能下更始至長安乃下詔大赦非王莽子他皆除其罪於是三輔悉平時長安唯未央宫被焚其餘宫室供帳倉庫官府皆案堵如故市里不改於舊更始居長樂宫升前殿郎吏以次列庭中更始羞怍俯首刮席不敢視諸將後至者更始問虜掠得幾何左右侍官皆宫省久吏驚愕相視李松與棘陽趙萌説更始宜悉王諸功臣朱鮪爭之以為高祖約非劉氏不王更始乃先封諸宗室祉為定陶王慶為燕王歙為元氏王嘉為漢中王賜為宛王信為汝隂王然後立王匡為沘陽王王鳳為宜城王朱鮪為膠東王王常為鄧王申屠建為平氏王陳牧為隂平王衛尉大將軍張卬為淮陽王執金吾大將軍廖湛為穰王尚書胡殷為隨王柱天大將軍李通為西平王五威中郎將李軼為舞隂王水衡大將軍成丹為襄邑王驃騎大將軍宗佻為潁隂王尹尊為郾王唯朱鮪辭不受乃以鮪為左大司馬宛王賜為前大司馬使與李軼等鎮撫關東又使李通鎮荆州王常行南陽太守事以李松為丞相趙萌為右大司馬共秉內任更始納趙萌女為夫人故委政於萌日夜飲宴後庭羣臣欲言事輒醉不能見時不得已乃令侍中坐帷內與語韓夫人尤嗜酒每侍飲見常侍奏事輒怒曰帝方對我飲正用此時持事來邪起抵破書案趙萌專權生殺自恣郎吏有説萌放縱者更始怒拔劒擊之自是無敢復言以至羣小膳夫皆濫授官爵長安為之語曰竈下養中郎將爛羊胃騎都尉爛羊頭關內侯軍師將軍李淑上書諫曰陛下定業雖因下江平林之藝斯蓋臨時濟用不可施之既安唯名與器聖人所重今加非其人望其禆益萬分猶緣木求魚升山采珠海內望此有以窺度漢祚更始怒囚之諸將在外者皆專行誅賞各置牧守州郡交錯不知所從由是關中離心四海怨叛耿况遣其子弇奉奏詣長安弇時年二十一行至宋子會王郎起弇從吏孫倉衛包曰劉子輿成帝正統捨此不歸逺行安之弇按劒曰子輿弊賊卒為降虜耳我至長安與國家陳漁陽上谷兵馬歸發突騎以轔烏合之衆如摧枯折腐耳觀公等不識去就族滅不久也倉包遂亡降王郎弇聞大司馬秀在盧奴乃馳北上謁秀留署長史與俱北至薊王郎移檄購秀十萬户秀令功曹令史潁川王霸至市中募人擊王郎市人皆大笑舉手邪揄之霸慙懅而反秀將南歸耿弇曰今兵從南方來不可南行漁陽太守彭寵公之邑人上谷太守即弇父也發此兩郡控弦萬騎邯鄲不足慮也秀官屬腹心皆不肯曰死尚南首奈何北行入囊中秀指弇曰是我北道主人也會故廣陽王子接起兵薊中以應郎城內擾亂言邯鄲使者方到二千石以下皆出迎於是秀趣駕而出至南城門門已閉攻之得出遂晨夜南馳不敢入城邑舍食道傍至蕪蔞亭時天寒烈馮異上豆粥至饒陽官屬皆乏食秀乃自稱邯鄲使者入傳舍傳吏方進食從者飢爭奪之傳吏疑其偽乃椎鼓數十通紿言邯鄲將軍至官屬皆失色秀升車欲馳既而懼不免徐還坐曰請邯鄲將軍入久乃駕去晨夜兼行蒙犯霜雪靣皆破裂至下曲陽傳聞王郎兵在後從者皆恐至滹沱河候吏還白河水流澌無船不可濟秀使王霸往視之霸恐驚衆欲且前阻水還即詭曰冰堅可度官屬皆喜秀笑曰候吏果妄語也遂前比至河河冰亦合乃令王霸護度未畢數騎而冰解至南宫遇大風雨秀引車入道傍空舍馮異抱薪鄧禹爇火秀對竈燎衣馮異復進麥飯進至下博城西惶惑不知所之有白衣老父在道旁指曰努力信都郡為長安城守去此八十里秀即馳赴之是時郡國皆已降王郎獨信都太守南陽任光和戎太守信都邳肜不肯從光自以孤城獨守恐不能全聞秀至大喜吏民皆稱萬嵗邳肜亦自和戎來會議者多言可因信都兵自送西還長安邳肜曰吏民歌吟思漢久矣故更始舉尊號而天下嚮應三輔清宫除道以迎之今卜者王郎假名因藝驅集烏合之衆遂振燕趙之地無有根本之固明公奮二郡之兵以討之何患不克今釋此而歸豈徒空失河北必更驚動三輔墮損威重非計之得者也若明公無復征伐之意則雖信都之兵猶難會也何者明公既西則邯鄲勢成民不肯捐父母背成主而千里送公其離散亡逃可必也秀乃止秀以二郡兵弱欲入城頭子路刁子都軍中任光以為不可乃發傍縣得精兵四千人拜任光為左大將軍信都都尉李忠為右大將軍邳肜為後大將軍和戎太守如故信都令萬修為偏將軍皆封列侯留南陽宗廣領信都太守事使任光李忠萬修將兵以從邳肜將兵居前任光乃多作檄文曰大司馬劉公將城頭子路刁子都兵百萬衆從東方來擊諸反虜遣騎馳至巨鹿界中吏民得檄傳相告語秀投暮入堂陽界多張騎火彌滿澤中堂陽即降又擊貰縣降之城頭子路者東平爰曾也冦掠河濟間有衆二十餘萬刁子都有衆六七萬故秀欲依之昌城人劉植聚兵數千人據昌城迎秀秀以植為驍騎將軍耿純率宗族賓客二千餘人老病者皆載木自隨迎秀於育拜純為前將軍進攻下曲陽降之衆稍合至數萬人復北擊中山耿純恐宗家懷異心乃使從弟欣宿歸燒廬舍以絶其反顧之望秀進拔盧奴所過發奔命兵移檄邊郡共擊邯鄲郡縣還復響應時真定王楊起兵附王郎衆十餘萬秀遣劉植説楊楊乃降秀因留真定納楊甥郭氏為夫人以結之進擊元氏防子皆下之至鄗擊斬王郎將李惲至柏人復破郎將李育育還保城攻之不下南鄭人延岑起兵據漢中漢中王嘉擊降之有衆數十萬校尉南陽賈復見更始政亂乃説嘉曰今天下未定而大王安守所保所保得無不可保乎嘉曰卿言大非吾任也大司馬在河北必能相用乃為書薦復及長史南陽陳俊於劉秀復等見秀於柏人秀以復為破虜將軍俊為安集掾秀舍中兒犯法軍市令潁川祭遵格殺之秀怒命收遵主簿陳副諫曰明公常欲衆軍整齊今遵奉法不避是教令所行也乃貰之以為剌姦將軍謂諸將曰當備祭遵吾舍中兒犯法尚殺之必不私諸卿也或説大司馬秀以守柏人不如定巨鹿秀乃引兵東北拔廣阿秀披輿地圖指示鄧禹曰天下郡國如是今始乃得其一子前言以吾慮天下不足定何也禹曰方今海內殽亂人思明君猶赤子之慕慈母古之興者在德薄厚不以大小也薊中之亂耿弇與劉秀相失北走昌平就其父況因説況擊邯鄲時王郎遣將徇漁陽上谷急發其兵北州疑惑多欲從之上谷功曹冦恂門下椽閔業説況曰邯鄲拔起難可信向大司馬劉伯升母弟尊賢下士可以歸之況曰邯鄲方盛力不能獨拒如何對曰今上谷完實控弦萬騎可以詳擇去就恂請東約漁陽齊心合衆邯鄲不足圖也況然之遣恂東約彭寵欲各發突騎二千匹步兵千人詣大司馬秀安樂令吳漢護軍蓋延孤奴令王梁亦勸寵從秀寵以為然而官屬皆欲附王郎寵不能奪漢出止外亭遇一儒生召而食之問以所聞生言大司馬劉公所過為郡縣所稱邯鄲舉尊號者實非劉氏漢大喜即詐為秀書移檄漁陽使生齎以詣寵令具以所聞説之會冦恂至寵乃發步騎三千人以吳漢行長史與蓋延王梁將之南攻薊殺王郎大將趙閎冦恂還遂與上谷長史景丹及耿弇將兵俱南與漁陽軍合所過擊斬王郎大將九卿校尉以下凡斬首三萬級定涿郡中山巨鹿清河河間凡二十二縣前及廣阿聞城中車騎甚衆丹等勒兵問曰此何兵曰大司馬劉公也諸將喜即進至城下城中初傳言二郡兵為邯鄲來衆皆恐劉秀自登西城樓勒兵問之耿弇拜於城下即召入具言發兵狀秀乃悉召景丹等入笑曰邯鄲將帥數言我發漁陽上谷兵吾聊應言我亦發之何意二郡良為吾來方與士大夫共此功名耳乃以景丹冦恂耿弇蓋延吳漢王梁皆為偏將軍使還領其兵加耿況彭寵大將軍封況寵丹延皆為列侯吳漢為人質厚少文造次不能以辭自達然沈勇有智略鄧禹數薦之於秀秀漸親重之更始遣尚書令謝躬率六將軍討王郎不能下秀至與之合軍東圍巨鹿月餘未下王郎遣將攻信都大姓馬寵等開城內之更始遣兵攻破信都秀使李忠還行太守事王郎遣將倪宏劉奉率數萬人救巨鹿秀逆戰於南􅒋不利景丹等縱突騎擊之宏等大敗秀曰吾聞突騎天下精兵今見其戰樂可言邪耿純言於秀曰久守巨鹿士衆疲弊不如及大兵精鋭進攻邯鄲若王郎已誅巨鹿不戰自服矣秀從之夏四月留將軍鄧滿守巨鹿進軍邯鄲連戰破之郎乃使其諫大夫杜威請降威雅稱郎實成帝遺體秀曰設使成帝復生天下不可得況詐子輿者乎威請求萬戶侯秀曰顧得全身可矣威怒而去秀急攻之二十餘日五月甲辰郎少傅李立開門內漢兵遂拔邯鄲郎夜亡走王霸追斬之秀收郎文書得吏民與郎交關謗毁者數千章秀不省會諸將軍燒之曰令反側子自安秀部分吏卒各隸諸軍士皆言願屬大樹將軍大樹將軍者偏將軍馮異也為人謙退不伐敕吏士非交戰受敵常行諸營之後每所止舍諸將並坐論功異常獨屏樹下故軍中號曰大樹將軍護軍宛人朱祜從容言於秀曰長安政亂公有日角之相此天命也秀曰召刺姦收護軍祜乃不敢復言更始遣使立秀為蕭王悉令罷兵與諸將有功者詣行在所遣苖曽為幽州牧韋順為上谷太守蔡充為漁陽太守並北之部蕭王居邯鄲宫晝卧溫明殿耿弇入造牀下請間因説曰吏士死傷者多請歸上谷益兵蕭王曰王郎已破河北略平復用兵何為弇曰王郎雖破天下兵革乃始耳今使者從西方來欲罷兵不可聼也銅馬赤眉之屬數十輩輩數十百萬人所向無前聖公不能辦也敗必不久蕭王起坐曰卿失言我斬卿弇曰大王哀厚弇如父子故敢披赤心蕭王曰我戲卿耳何以言之弇曰百姓患苦王莽復思劉氏聞漢兵起莫不歡喜如去虎口得歸慈母今更始為天子而諸將擅命於山東貴戚縱橫於都內虜掠自恣元元叩心更思莽朝是以知其必敗也公功名已著以義征伐天下可傳檄而定也天下至重公可自取毋令他姓得之蕭王乃辭以河北未平不就徴始二於更始是時諸賊銅馬大彤髙湖重連鐵脛大槍尤來上江青犢五校五幡五樓冨平獲索等各領部曲衆合數百萬人所在冦掠蕭王欲擊之乃拜吳漢耿弇俱為大將軍持節北發幽州十郡突騎苖曽聞之隂敕諸部不得應調吳漢將二十騎先馳至無終曽出迎於路漢即收曽斬之耿弇到上谷亦收韋順蔡充斬之北州震駭於是悉發其兵秋蕭王擊銅馬於鄡吳漢將突騎來會清陽士馬甚盛漢悉上兵簿於莫府請所付與不敢自私王益重之王以偏將軍沛國朱浮為大將軍幽州牧使治薊城銅馬食盡夜遁蕭王追擊於館陶大破之受降未盡而髙湖重連從東南來與銅馬餘衆合蕭王復與大戰於蒲陽悉破降之封其渠帥為列侯諸將未能信賊降者亦不自安王知其意敕令降者各歸營勒兵自乘輕騎按行部陳降者更相語曰蕭王推赤心置人腹中安得不投死乎由是皆服悉以降人分配諸將衆遂數十萬赤眉别帥與青犢上江大肜鐵脛五幡十餘萬衆在射犬蕭王引兵進擊大破之南徇河內河內太守韓歆降冬蕭王將北徇燕趙度赤眉必破長安又欲乘釁并關中而未知所寄乃拜鄧禹為前將軍中分麾下精兵二萬人遣西入關令自選偏裨以下可與俱者時朱鮪李軼田立陳僑將兵號三十萬與河南太守武勃共守洛陽鮑永田邑在并州蕭王以河內險要冨實欲擇諸將守河內者而難其人問於鄧禹禹曰冦恂文武備足有牧民御衆之才非此子莫可使也乃拜恂河內太守行大將軍事蕭王謂恂曰昔高祖留蕭何關中吾今委公以河內當給足軍糧率厲士馬防遏它兵勿令北度而已拜馮異為孟津將軍統魏郡河內兵於河上以拒洛陽蕭王親送鄧禹至野王禹既西蕭王乃復引兵而北冦恂調糇糧治器械以供軍軍雖逺征未嘗乏絶漢光武建武元年春正月鄧禹至箕關擊破河東都尉進圍安邑夏四月蕭王北擊尤來大槍五幡於元氏追至北平連破之又戰於順水北乘勝輕進反為所敗王自投高崖遇突騎王豐下馬授王王僅而得免散兵歸保范陽軍中不見王或云已歿諸將不知所為吳漢曰卿曹努力王兄子在南陽何憂無主衆恐懼數日乃定賊雖戰勝而憚王威名夜遂引去大軍復追至安次連戰破之賊退入漁陽所過虜掠強弩將軍陳俊言於王曰戰無輜重宜令輕騎出賊前使百姓各自堅壁以絶其食可不戰而殄也王然之遣俊將輕騎馳出賊前視人保壁堅完者敕令固守放散在野者因掠取之賊至無所得遂散敗王謂俊曰困此虜者將軍䇿也馮異遺李軼書為陳禍福勸令歸附蕭王軼知長安已危而以伯升之死心不自安乃報書曰軼本與蕭王首謀造漢今軼守洛陽將軍鎮孟津俱據機軸千載一會思成斷金唯深達蕭王願進愚䇿以佐國安民軼自通書之後不復與異爭鋒故異得北攻天井關拔上黨兩城又南下河南成臯已東十三縣降者十餘萬武勃將萬餘人攻諸畔者異與戰於士鄉下大破斬勃軼閉門不救異見其信效具以白王王報異曰季文多詐人不能得其要領今移其書告守尉當警備者衆皆怪王宣露軼書朱鮪聞之使人刺殺軼由是城中乖離多有降者朱鮪聞王北征而河內孤乃遣其將蘇茂賈強將兵三萬餘人度鞏河攻溫鮪自將數萬人攻平隂以綴異檄書至河內冦恂即勒軍馳出並移告屬縣發兵會溫下軍吏皆諫曰今洛陽兵度河前後不絶宜待衆軍畢集乃可出也恂曰溫郡之藩蔽失溫則郡不可守遂馳赴之旦日合戰而馮異遣救及諸縣兵適至恂令士卒乘城鼓譟大呼言曰劉公兵到蘇茂軍聞之陳動恂因奔擊大破之馮異亦度河擊朱鮪鮪走異與恂追至洛陽環城一匝而歸自是洛陽震恐城門晝閉異恂移檄上狀諸將入賀因上尊號將軍南陽馬武先進曰大王雖執謙退奈宗廟社稷何宜先即尊位乃議征伐今此誰賊而馳騖擊之乎王驚曰何將軍出此言可斬也乃引軍還薊復遣吳漢率耿弇景丹等十三將軍追尤來等斬首萬三千餘級遂窮追至浚靡而還賊散入遼西遼東為烏桓貊人所鈔擊略盡都護將軍賈復與五校戰於真定復傷瘡甚王大驚曰我所以不令賈復别將者為其輕敵也果然失吾名將聞其婦有孕生女邪我子娶之生男邪我女嫁之不令其憂妻子也復病尋愈追及王於薊相見甚歡還至中山諸將復上尊號王又不聽行到南平棘諸將復固諸之王不許諸將且出耿純進曰天下士大夫捐親戚棄土壤從大王於矢石之間者其計固望攀龍鱗附鳯翼以成其所志耳今大王留時逆衆不正號位純恐士大夫望絶計窮則有去歸之思無為久自苦也大衆一散難可復合純言甚誠切王深感曰吾將思之行至鄗召馮異詣鄗問四方動靜異曰更始必敗宗廟之憂在於大王宜從衆議會儒生強華自關中奉赤伏符來詣王曰劉秀發兵捕不道四夷雲集龍鬭野四七之際火為主羣臣因復奏請六月己未王即皇帝位于鄗南改元大赦秋七月己亥帝使吳漢率建義大將軍朱祐等十一將圍朱鮪於洛陽諸將圍洛陽數月朱鮪堅守不下帝以廷尉岑彭嘗為鮪校尉令往説之鮪在城上彭在城下為陳成敗鮪曰大司徒被害時鮪與其謀又諫更始無遣蕭王北伐誠自知罪深不敢降彭還具言於帝帝曰舉大事者不忌小怨鮪今若降官爵可保況誅罰乎河水在此吾不食言彭復往告鮪鮪從城上下索曰必信可乘此上彭趣索欲上鮪見其誠即許降辛卯朱鮪面縳與岑彭俱詣河陽帝解其縛召見之復令彭夜送鮪歸城明旦與蘇茂等悉其衆出降拜鮪為平狄將軍封扶溝侯冬十月癸丑車駕入洛陽幸南宫遂定都焉二年春正月庚辰悉封諸功臣為列侯梁侯鄧禹廣平侯吳漢皆食四縣博士丁恭議曰古者封諸侯不過百里強幹弱枝所以為治也今封四縣不合法制帝曰古之亡國皆以無道未嘗聞功臣地多而滅亡者也起高廟于洛陽四時合祀高祖太宗世宗建社稷于宗廟之右立郊兆于城南
