body:
  text: 錢氏據吳越董昌僣逆附唐僖宗乾符五年王郢之亂臨安人董昌以土團討賊有功補石鏡鎮將是嵗曹師雄冦掠二浙杭州募諸縣鄉兵各千人以討之昌與錢塘劉孟安阮結富陽聞人宇鹽官徐及新城杜稜餘杭凌文舉臨平曹信各為之都將號杭州八都昌為之長其後宇卒錢塘人成及代之臨安人錢鏐以驍勇事昌以功為石鏡都知兵馬使山鎭遏使王郢等乾符二年浙西狼不給衣糧郢等論訴不獲遂劫庫兵作亂六十九人有戰功節度使趙隱賞以職名而六年冬十月黄巢之抵潭州也荆南節度使王鐸留其將守江陵自帥衆趣襄陽鐸既去劉漢宏大掠江陵帥其衆北歸爲羣盜漢宏兖州人也黄巢事見亂之廣明元年夏五月劉漢宏之黨浸盛侵掠宋兖甲子徴東方諸道兵討之六月劉漢宏南掠申州秋七月辛酉劉漢宏請降戊辰以爲宿州刺史冬十一月宿州刺史劉漢宏怨朝廷賞薄甲寅以漢宏爲浙東觀察使中和元年秋九月淮南節度使髙駢召石鏡将董昌至廣陵欲與之俱擊黄巢昌將錢鏐説昌曰觀髙公無討賊心不若以扞禦鄉里爲辭而去之昌從之駢聽昌還㑹杭州刺史路審中將之官行至嘉興昌自石鏡引兵入據杭州審中懼而還昌自稱杭州都押牙知州事遣將吏請於鎮海節度使周寳寳不能制表為杭州刺史二年秋八月浙東觀察使劉漢宏遣弟漢宥及馬步軍都虞候辛約将兵二萬營于西陵謀兼并浙西杭州刺史董昌遣都知兵馬使錢鏐拒之壬子鏐乗霧夜濟江襲其營大破之所殺殆盡漢宥辛約皆走冬十月劉漢宏又遣登髙将王鎮将兵七萬屯西陵錢鏐復夜濟江襲擊大破之斬獲萬計得漢宏補諸將官偽敕二百餘通鎮犇諸暨三年劉漢宏分兵屯黄嶺巖下貞女三鎮錢鏐將八都兵自富春擊之破黄嶺擒巖下鎮將史弁貞女鎮將楊元宗漢宏以精兵屯諸暨鏐又擊破之漢宏走冬十月劉漢宏將十餘萬衆出西陵將擊董昌戊午錢鏐濟江逆戰大破之漢宏易服持鱠刀而遁己未漢宏收餘衆四萬復戰鏐又破之斬其弟漢容及將辛約四年春三月婺州人王鎮執刺史黄碣降于錢鏐劉漢宏遣其将婁賚殺鎮而代之浦陽鎮将蔣瓌召鏐兵共攻婺州擒賚而還碣閩人也光啓二年冬十月董昌謂錢鏐曰汝能取越州吾以杭州授汝鏐曰然不取終為後患遂將兵自諸暨趨平水鑿山開道五百里出曹娥埭浙東将鮑君福帥衆降之鏐與浙東軍戰屢破之進屯豐山十一月丙戌錢鏐克越州劉漢宏犇台州十二月台州刺史杜雄誘劉漢宏執送董昌斬之昌徙鎮越州自稱知浙東軍府事以錢鏐知杭州事三年春正月辛巳以董昌為浙東觀察使錢鏐為杭州刺史三月鎮海節度使周寳募親軍千人號後樓兵稟給倍於鎮海軍鎮海軍皆怨而後樓兵浸驕不可制寳溺於聲色不親政事築羅城二十餘里建東第人苦其役寳與僚屬宴後樓有言鎮海軍怨望者寳曰亂則殺之度支催勘使薛朗以其言告所善鎮海軍将劉浩戒之使戢士卒浩曰惟反可以免死耳是夕寳醉方寢浩帥其黨作亂攻府舍而焚之寳驚起徒跣叩芙蓉門呼後樓兵後樓兵亦反矣寳帥家人步走出青陽門遂犇常州依刺史丁從實浩殺諸僚佐癸巳迎薛朗入府推為留後初周寳聞淮南六合鎮遏使徐約兵精誘之使擊蘇州夏四月甲辰朔約逐蘇州刺史張雄帥其衆逃入海五月錢鏐遣東安都将杜稜浙江都将阮結静江都将成及將兵討薛朗六月杜稜等敗薛朗將李君暀于陽羡冬十月杜稜等㧞常州丁從實犇海陵錢鏐奉周寳歸杭州屬櫜鞬具部将禮郊迎之十二月乙未周寳卒於杭州錢鏐以杜稜為常州制置使命阮結等進攻潤州丙申克之劉浩走擒薛朗以歸文徳元年春正月丙寅錢鏐斬薛朗剖其心以祭周寳以阮結為潤州制置使秋九月錢鏐遣其從弟銶将兵攻徐約于蘇州昭宗龍紀元年春三月丙申錢銶拔蘇州徐約亡入海而死錢鏐以海昌都将沈粲權知蘇州夏五月潤州刺史阮結卒錢鏐成及之行宻爭蘇錢鏐與楊宻據淮南潤事見楊行景福元年夏四月乙酉置武勝軍於杭州以錢鏐為防禦使二年閏五月以武勝軍防禦使錢鏐為蘇杭觀察使秋七月錢鏐發民夫二十萬及十三都軍士築杭州羅城周七十里九月丁卯以錢鏐為鎮海節度使乾寧元年夏五月加鎮海節度使錢鏐同平章事冬十二月義勝節度使董昌為政苛虐於常賦之外加歛數倍以充貢獻及中外饋遺每旬發一綱金萬兩銀五千鋌越綾萬五千匹它物稱是用卒五百人或遇雨雪風水違程則皆死貢奉為天下最由是朝廷以為忠寵命相繼官至司徒同平章事爵隴西郡王昌建生祠於越州制度悉如禹廟命民間禱賽者無得之禹廟皆之生祠昌求為越王朝廷未之許昌不悦曰朝廷欲負我矣我累年貢獻無筭而惜一越王邪有謟之者曰王為越王曷若為越帝於是民間訛言時世将變競相帥填門喧譟請昌為帝昌大喜遣人謝之曰天時未至時至我自為之其僚佐吳瑶都虞候李暢之等皆勸成之吏民獻謠䜟符瑞者不可勝紀其始賞之以錢數百緡既而獻者日多稍减至五百三百而已昌曰䜟云兔子上金牀此謂我也我生太嵗在卯明年復在卯二月卯日卯時吾稱帝之秋也二年春正月董昌将稱帝集將佐議之節度副使黄碣曰今唐室雖微天人未厭齊桓晉文皆翼戴周室以成霸業大王興於畎畒受朝廷厚恩位至将相富貴極矣奈何一旦忽為滅族之計乎碣寧死為忠臣不生為叛逆昌怒以為惑衆斬之投其首於厠中罵之曰奴賊負我好聖明時三公不能待而先求死也并殺其家八十口同坎瘞之又問㑹稽令吳鐐對曰大王不為真諸侯以傳子孫乃欲假天子以取㓕亡邪昌亦族誅之又謂山隂令張遜曰汝有能政吾深知之俟吾為帝命汝知御史臺遜曰大王起石鏡鎮建節浙東榮貴近二十年何苦效李錡劉闢之所為乎浙東僻處海隅巡屬雖有六州大王若稱帝彼必不從徒守孤城為天下笑耳昌又殺之謂人曰無此三人者則人莫我違矣二月辛卯昌被衮冕登子城門樓即皇帝位悉陳瑞物於庭以示衆先是咸通末吳越間訛言山中有大鳥四目三足聲云羅平天冊見者有殃民間多畫像以祀之及昌将僭號曰此吾鸑鷟也乃自稱大越羅平國改元順天署城樓曰天冊之樓羣下謂已曰聖人以前杭州刺史李邈前婺州刺史蒋瓌兩浙鹽鐵副使杜逞前屯田郎中李瑜為相又以吳瑶等皆為翰林學士李暢之等皆為大將軍昌移書錢鏐告以權即羅平國位以鏐為兩浙都指揮使鏐遺昌書曰與其閉門作天子與九族百姓俱陷塗炭豈若開門作節度使終身富貴邪及今悛悔尚可及也昌不聽鏐乃将兵三萬詣越州城下至迎恩門見昌再拜言曰大王位兼將相奈何捨安就危鏐将兵此來以俟大王改過耳若天子命将出師縱大王不自惜鄉里士民何罪隨大王㓕族乎昌懼致犒軍錢二百萬執首謀者吳瑶及巫覡數人送於鏐且請待罪天子鏐引兵還以狀聞夏四月朝廷以董昌有貢輸之勤今日所為類得心疾詔釋其罪縱歸田里錢鏐表董昌僭逆不可赦請以本道兵討之楊行宻遣使詣錢鏐言董昌已改過宜釋之亦遣使詣昌使趣朝貢五月詔削董昌官爵委錢鏐討之六月庚寅以錢鏐為浙東招討使鏐復發兵擊董昌秋九月董昌求救於楊行密行密遣泗州防禦使臺濛攻蘇州以救之且表昌引咎願修職貢請復官爵又遺錢鏐書稱昌狂疾自立已畏兵諌執送同惡不當復伐之冬十月楊行宻遣寧國節度使田頵潤州團練使安仁義攻杭州鎮戌以救董昌昌使湖州將徐淑㑹淮南将魏約共圍嘉興錢鏐遣武勇都指揮使顧全武救嘉興破烏墩光福二寨淮南将柯厚破蘇州水柵全武餘姚人也十二月加鎮海節度使錢鏐兼侍中三年春正月辛未安仁義以舟師至湖州欲度江應董昌錢鏐遣武勇都指揮使顧全武都知兵馬使許再思守西陵仁義不能度昌遣其将湯臼守石城袁邠守餘姚二月戊辰顧全武許再思敗湯臼於石城上用楊行宻之請赦董昌復其官爵錢鏐不從三月己酉顧全武等攻餘姚明州刺史黄晟遣兵助之董昌遣其将徐章救餘姚全武擊擒之夏四月淮南兵與鎮海兵戰于黄天蕩鎮海兵不利楊行宻遂圍蘇州董昌使人覘錢鏐兵有言其彊盛者輙怒斬之言兵疲食盡則賞之戊寅袁邠以餘姚降於鏐顧全武許再思進兵至越州城下五月昌出戰而敗嬰城自守全武等圍之昌始懼去帝號復稱節度使癸未蘇州常熟鎮使陸郢以州城應楊行宻虜刺史成及錢鏐聞蘇州陷急召顧全武使趨西陵備行宻全武曰越州賊之根本奈何垂克而棄之請先取越州後復蘇州鏐從之甲午夜顧全武急攻越州乙未旦克其外郭董昌猶據牙城拒之戊戌鏐遣昌故将駱團紿云奉詔令大王致仕歸臨安昌乃送牌印出居清道坊己亥全武遣武勇都監使吳璋以舟載昌如杭州至小江南斬之并其家三百餘人宰相李邈蔣瓌以下百餘人昌在圍城中貪吝益甚口率民間錢帛减戰士糧及城破庫有金帛雜貨五百間倉有糧三百萬斛錢鏐傳昌首於京師散金帛以賞将士開倉以賑貧乏八月加錢鏐兼中書令甲寅以門下侍郎王摶充威勝節度使冬十月錢鏐令兩浙吏民上表請以鏐兼領浙東朝廷不得已復以王摶為吏部尚書同平章事以鏐為鎮海威勝兩軍節度使丙子更名威勝曰鎮東軍十一月淮南將安仁義攻婺州四年春正月錢鏐使行軍司馬杜稜救婺州安仁義移兵攻睦州不克而還夏四月辛亥錢鏐遣顧全武等將兵三千自海道救嘉興己未至城下擊淮南兵大破之癸亥兩浙将顧全武等破淮南十八營虜淮南將士魏約等三千人淮南將田頵屯驛亭埭兩浙兵乗勝逐之甲戌頵自湖州犇還兩浙兵追敗之頵衆死者千餘人六月己酉錢鏐如越州受鎮東節鉞秋七月庚戌錢鏐還杭州遣顧全武取蘇州乙未拔松江戊戌拔無錫辛丑拔常熟華亭九月湖州刺史李彦徽欲以州附於楊行密其衆不從彦徽犇廣陵都指揮使沈攸以州歸錢鏐光化元年春正月錢鏐請徙鎮海軍於杭州從之三月淮南將周本救蘇州兩浙將顧全武擊破之淮南將秦裴以兵三千人拔崑山而戍之秋九月顧全武攻蘇州城中及援兵食皆盡甲申淮南所署蘇州刺史臺濛棄城走援兵亦遁全武克蘇州追敗周本等于望亭獨秦裴守崑山不下全武帥萬餘人攻之裴屢出戰使病者被甲執矛壯者彀弓弩全武每為之却全武檄裴令降全武嘗為僧裴封函納款全武喜召諸將發函乃佛經一卷全武大慙曰裴不憂死何暇戯予益兵攻城引水灌之城壊食盡裴乃降錢鏐設千人饌以待之乃出羸兵不滿百人鏐怒曰單弱如此何敢乆為旅拒對曰裴義不負楊公今力屈而降耳非心降也鏐善其言顧全武亦勸鏐宥之鏐從之時人稱全武長者冬閏十月錢鏐以其将曹圭為蘇州制置使遣王球攻婺州十一月衢州刺史陳岌請降于楊行宻錢鏐使顧全武討之十二月楊行宻遣成及等歸兩浙以易魏約等錢鏐許之二年春三月婺州刺史王壇為兩浙所圍求救於宣歙觀察使田頵夏四月頵遣行營都指揮使康儒等救之五月庚戌康儒等敗兩浙兵於龍丘擒其將王球遂取婺州三年春正月宣州將康儒攻睦州錢鏐使其從弟銶拒之秋八月宣州將康儒食盡自清溪遁歸天復元年夏五月己酉加鎮海鎮東節度使錢鏐守侍中秋八月或告楊行宻云錢鏐為盜所殺行宻遣步軍都指揮使李神福等将兵取杭州兩浙將顧全武等列八寨以拒之李神福與顧全武相拒乆之神福獲杭俘使出入卧内神福謂諸將曰杭兵尚彊我師且當夜還杭俘走告全武神福命勿追暮遣羸兵先行神福為殿使行營都將吕師造伏兵青山下全武素輕神福岀兵追之神福師造夾擊大破之斬首五千級生擒全武錢鏐聞之驚泣曰喪我良将神福進攻臨安兩浙將秦昶帥衆三千降之十二月李神福知錢鏐定不死而臨安城堅久攻不拔欲歸恐為鏐所邀乃遣人守衛鏐祖考丘壠禁樵采又使顧全武通家信鏐遣使謝之神福於要路多張旗幟為虚寨鏐以為淮南兵大至遂請和神福受其犒賂而還二年夏四月楊行宻遣顧全武歸杭州以易秦裴錢鏐大喜遣還五月鎮海鎮東節度使彭城王錢鏐進爵越王初孫儒死其士卒多犇浙西錢鏐愛其驍悍以為中軍號武勇都行軍司馬杜稜諫曰狼子野心它日必為深患請以土人代之不從鏐如衣錦軍命武勇右都指揮使徐綰帥衆治溝洫鎮海節度副使成及聞士卒怨言白鏐請罷役不從丙戌鏐臨饗諸將綰謀殺鏐於座不果稱疾先出鏐怪之丁亥命綰將所部先還杭州及外城縱兵焚掠武勇左都指揮使許再思以迎候兵與之合進逼牙城鏐子傳瑛與三城都指揮使馬綽等閉門拒之牙將潘長擊綰綰退屯龍興寺鏐還及龍泉聞變疾驅至城北使成及建鏐旗鼓與綰戰鏐微服乗小舟夜扺牙城東北隅踰城而入直更卒憑鼓而寐鏐親斬之城中始知鏐至武安都指揮使杜建徽自新城入援徐綰聚木将焚北門建徽悉焚之建徽稜之子也湖州刺史髙彦聞難遣其子渭将兵入援至靈隠山綰伏兵擊殺之初鏐築杭州羅城謂僚佐曰十步一樓可以為固矣掌書記餘杭羅隠曰樓不若皆内向至是人以隠言為驗九月或勸錢鏐度江東保越州以避徐許之難杜建徽按劒叱之曰事或不濟同死於此豈可復東度乎鏐恐徐綰等據越州遣大將顧全武将兵戍之全武曰越州不足徃不若之廣陵鏐曰何故對曰聞綰等謀召田頵田頵至淮南助之不可敵也建徽曰孫儒之難王嘗有徳於楊公今徃告之宜有以相報鏐命全武告急於楊行宻全武曰徒徃無益請得王子為質鏐命其子傳璙微服為全武僕與偕之廣陵且求昏於行宻過潤州團練使安仁義愛傳璙清麗将以十僕易之全武夜半賂閽者逃去綰等果召田頵頵引兵赴之先遣親吏何饒謂鏐曰請大王東如越州空府廨以相待無為殺士卒鏐報曰軍中叛亂何方無之公為節帥乃助賊為逆戰則亟戰又何大言頵築壘絶徃來之道鏐患之募能奪其地者賞以州衢州制置使陳璋將卒三百出城奮擊遂奪其地鏐即以為衢州刺史顧全武至廣陵説楊行宻曰使田頵得志必為王患王召頵還錢王請以其子傳璙為質且求昏行宻許之以女妻傳璙冬十一月田頵急攻杭州仍具舟將自西陵度江錢鏐遣其將盛造朱郁拒破之十二月楊行宻使人召田頵曰不還吾且使人代鎮宣州庚辰頵將還徴犒軍錢二十萬緡於錢鏐且求鏐子為質將妻以女鏐謂諸子孰能為田氏壻者莫對鏐欲遣㓜子傳球傳球不可鏐怒將殺之次子傳瓘請行吳夫人泣曰奈何寘兒虎口傳瓘曰紓國家之難安敢愛身再拜而出鏐泣送之傳瓘從數人縋北門而下頵與徐綰許再思同歸宣州鏐奪傳球内牙兵印越州客軍指揮使張洪以徐綰之黨自疑帥步兵三百犇衢州刺史陳璋納之温州將丁章逐刺史朱敖敖犇福州章據温州田頵遣使招之道出衢州陳璋聽其徃還錢鏐由是恨璋三年秋七月睦州刺史陳詢叛錢鏐舉兵攻蘭溪鏐遣指揮使方永珍擊之武安都指揮使杜建徽與詢連姻鏐疑之建徽不言㑹詢親吏來犇得建徽與詢書皆勸戒之辭鏐乃悦建徽從兄建思譛建徽私蓄兵仗謀作亂鏐使人索之建徽方食使者直入卧内建徽不顧鏐以是益親重之冬十月田頵叛楊行宻行宻求兵於錢鏐鏐遣方永珍屯潤州從弟鎰屯宣州又遣指揮使楊習攻睦州楊行密據淮南田頵之叛事見十一月田頵敗錢傳瓘歸杭州天祐元年春三月楊行宻遣錢傳璙及其婦并顧全武歸錢塘夏四月鎮海鎮東節度使越王錢鏐求封吳越王朝廷不許朱全忠為之言於執政乃更封吳王冬十一月錢鏐潜遣衢州羅城使葉讓殺刺史陳璋事泄十二月璋斬讓而叛降于楊行宻昭宣帝天祐二年春正月兩浙兵圍陳詢于睦州楊行宻遣西南招討使陶雅將兵救之軍中夜驚士卒多踰壘亡去左右及禆將韓球犇告之雅安卧不應須臾自定亡者皆還錢鏐遣其從弟鎰及指揮使顧全武王球禦之為雅所敗虜鎰及球以歸夏四月淮南將陶雅㑹衢睦兵攻婺州錢鏐遣其弟鏢將兵救之秋八月錢鏐遣方永珍救婺州九月淮南將陶雅陳璋拔婺州執刺史沈夏以歸楊行宻以雅為江南都招討使歙婺衢睦觀察使以璋為衢婺副招討使璋攻暨陽兩浙將方習敗之習進攻婺州十二月陳詢不能守睦州犇于廣陵淮南招討使陶雅入據其城三年春正月陶雅引兵還歙州錢鏐復取睦州庚辰錢鏐如睦州陳璋聞陶雅歸歙自婺州退保衢州兩浙將方永珍等取婺州進攻衢州秋八月兩浙圍衢州衢州刺史陳璋告急於淮南楊渥遣左廂馬步都虞候周本将兵迎璋本至衢州浙人解圍陳於城下璋帥衆歸于本兩浙兵取衢州吕師造曰浙人近我而不動輕我也請擊之本曰吾受命迎陳使君今至矣何爲復戰彼必有以待我也遂引兵還本爲之殿淅人躡之本中道設伏大破之冬十二月乙酉錢鏐表薦行軍司馬王景仁詔以景仁領寧國節度使渥怒宣州是歳呉楊茂章奔兩浙更名景仁觀察使王茂章以兵襲之後梁武帝開平元年春三月鎮海鎮東節度使吳王錢鏐遣其子傳璙傳瓘討盧佶於温州夏四月盧佶聞錢傳璙等將至將水軍拒之於青澳錢傳瓘曰佶之精兵盡在於此不可與戰乃自安固捨舟間道襲温州戊午温州潰擒佶斬之吳王鏐以都監使吳璋爲温州制置使命傳璙等移兵討盧約於處州鎮海節度判官羅隠説吳王鏐舉兵討梁曰縱無成功猶可退保杭越自為東帝奈何交臂事賊為終古之羞乎鏐始以隠為不遇於唐必有怨心及聞其言雖不能用心甚義之五月己卯以吳王錢鏐為吳越王盧約以處州降吳越秋八月辛亥以吳越王鏐兼淮南節度使充本道招討制置使二年秋八月吳越王錢鏐遣寧國節度使王景仁奉表詣大梁陳取淮南之䇿淮南遣周本吕師造擊吳越九月圍蘇州吳越將張仁保攻常州之東洲拔之淮南陳璋帥柴再用等復取東洲三年夏四月淮南兵圍蘇州推洞屋攻城吳越將臨海孫琰置輪於竿首垂絙投錐以掲之攻者盡露礮至則張網以拒之淮南人不能克吳越王鏐遣牙内指揮使錢鏢行軍副使杜建徽等將兵救之蘇州有水通城中淮南張網綴鈴懸水中魚鼈過皆知之吳越遊弈都虞候司馬福欲潜行入城故以竿觸網敵聞鈴聲舉網福因得過凡居水中三日乃得入城由是城中號令與援兵相應敵以為神吳越王鏐嘗遊府園見園卒陸仁章樹蓺有智而志之及蘇州被圍使仁章通信入城果得報而返鏐以諸孫畜之累遷兩府軍糧都監使卒獲其用仁章睦州人也辛亥吳越兵内外合擊淮南兵大破之擒其將何朗等三十餘人奪戰艦二百艘周本夜遁又追敗之於皇天蕩鍾泰章將精兵二百為殿多樹旗幟於菰蔣中追兵不敢進而還冬十月湖州刺史髙澧叛附淮南舉兵焚義和臨平鎮吳越王鏐命指揮使錢鏢討之四年春二月髙澧求救於吳吳常州刺史李簡等將兵應之湖州將盛師友沈行思閉城不内澧帥麾下五千人犇吳三月癸巳吳越王鏐巡湖州以錢鏢為刺史秋八月吳越王鏐築捍海石塘廣杭州城大修臺館由是錢塘富庶盛於東南乾化元年湖州刺史錢鏢酗酒殺人恐吳越王鏐罪之冬十月辛亥朔殺都監潘長推官鍾安徳犇于吳二年秋七月甲寅加吳越王鏐尚父均王乾化三年春三月吳行營招討使李濤帥衆二萬出千秋嶺攻吳越衣錦軍吳越王鏐以其子湖州刺史傳瓘為北面應援都指揮使以救之睦州刺史傳璙為招討收復都指揮使將水軍攻吳東洲以分其兵勢夏四月千秋嶺道險狹錢傳瓘使人伐木以斷吳軍之後而擊之吳軍大敗虜李濤及士卒三千餘人以歸五月吳遣宣州副指揮使花䖍将兵㑹廣徳鎮遏使渦信屯廣徳将復冦衣錦軍吳越錢傳瓘就攻之六月吳越錢傳瓘拔廣徳虜花䖍渦信以歸九月吳越王鏐遣其子傳瓘傳璙及大同節度使傳瑛攻吳常州營於潘葑徐温曰浙人輕而怯帥諸將倍道赴之至無錫黒雲都将陳祐言於温曰彼謂吾逺來罷倦未能戰請以所部乗其無備擊之乃自它道出敵後温以大軍當其前夾攻之吳越大敗斬獲甚衆貞明二年夏五月吳越王鏐遣浙西安撫判官皮光業自建汀䖍郴潭岳荆南道入貢秋七月上嘉吳越王鏐貢獻之勤壬戌加鏐諸道兵馬元帥朝議多言鏐之入貢利於市易不宜過以名器假之翰林學士竇夢徴執麻以泣坐貶蓬萊尉三年冬十月己亥加吳越王鏐天下兵馬元帥四年春三月吳越王鏐初立元帥府置官屬五年春三月詔吳越王鏐大舉討淮南鏐以節度副大使傳瓘為諸軍都指揮使帥戰艦五百艘自東洲擊吳吳遣舒州刺史彭彦章及禆將陳汾拒之四月錢傳瓘與彭彦章遇傳瓘命每船皆載灰豆及沙乙巳戰于浪山江吳船乗風而進傳瓘引舟避之既過自後隨之吳回船與戰傳瓘使順風揚灰吳人不能開目及船舷相接傳瓘使散沙於已船而散豆於吳船豆為戰血所漬吳人踐之皆僵仆傳瓘因縱火焚吳船吳兵大敗彦章戰甚力兵盡繼之以木身被數十創陳汾按兵不救彦章知不免遂自殺傳瓘俘吳禆將七十人斬首千餘級焚戰艦四百艘吳人誅汾籍沒家貲以其半賜彦章家禀其妻子終身秋七月吳越王鏐遣錢傳瓘将兵三萬攻吳常州吳都招討使徐温帥諸將拒之右雄武統軍陳璋以水軍下海門出其後壬申戰于無錫㑹温病熱不能治軍吳越攻中軍飛矢雨集鎮海節度判官陳彦謙遷中軍旗鼓于左取貎類温者擐甲胄號令軍事温得少息俄頃疾稍間出拒之時乆旱草枯吳人乗風縱火吳越兵亂遂大敗殺其將何逢吳建斬首萬級傳瓘遁去追至山南復敗之陳璋敗吳越于香灣温募生獲叛將陳紹者賞錢百萬指揮使崔彦章獲之紹勇而多謀温復使之典兵初錦衣之役吳馬軍指揮曹筠叛犇吴越徐温赦其妻子厚遇之遣間使告之曰使汝不得志而去吾之過也汝無以妻子爲念及是役筠復犇吳温自數昔日不用筠言者三而不問筠去來之罪歸其田宅復其軍職筠内愧而卒知誥請帥步卒二千易吳越旗幟鎧仗躡敗卒而東襲取蘇州温曰爾䇿固善然吾且求息兵未暇如汝言也諸将皆以為吳越所恃者舟楫今大旱水道涸此天亡之時也宜盡步騎之勢一舉滅之温歎曰天下離亂久矣民困已甚錢公亦未易可輕若連兵不解方為諸君之憂今戰勝以懼之戢兵以懐之使兩地之民各安其業君臣髙枕豈不樂哉多殺何為遂引還吳越王鏐見何逢馬悲不自勝故將士心附之寵姬鄭氏父犯法當死左右為之請鏐曰豈可以一婦人亂我法出其女而斬之鏐自少在軍中夜未常寐倦極則就圓木小枕或枕大鈴寐熟輒欹而寤名曰警枕置粉盤于卧内有所記則書盤中比老不倦或寢方酣外有白事者今侍女振紙即寤時彈銅丸于樓牆之外以警直更者嘗微行夜叩北城門吏不肯啓關曰雖大王來亦不可啓乃自佗門入明日召北門吏厚賜之秋八月吳徐温遣使以吳王書解歸無錫之俘於吳越吳越王鏐亦遣使請和於吳自是吳國休兵息民三十餘州民樂業者二十餘年吳王及徐温屢遺吳越王鏐書勸鏐自王其國鏐不從龍徳元年春三月吳人歸吳越王鏐從弟龍武統軍鎰于錢塘鏐亦歸吳將李濤于廣陵徐温以濤為右雄武統軍鏐以鎰為鎮海節度副使後唐莊宗同光元年春二月梁主遣兵部侍郎崔協等冊命吳越王鏐為吳越國王丁卯鏐始建國儀衛名稱多如天子之制謂所居曰宫殿府署曰朝廷教令下統内曰制敕將吏皆稱臣惟不改元表疏首稱吳越國而不言軍以清海節度使兼侍中傳瓘為鎮海鎮東留後總軍府事置百官有丞相侍郎郎中員外郎客省等使冬十二月吳越王鏐以行軍司馬杜建徽為左丞相二年冬十月吳越王鏐復修本朝職貢壬午帝因梁官爵而命之鏐厚貢獻并賂權要求金印玉冊賜詔不名稱國王有司言故事惟天子用玉冊王公皆用竹冊又非四夷無封國王者帝皆曲從鏐意三年秋八月丁亥遣吏部侍郎李徳休等賜吳越國王玉冊金印紅袍御衣閏十二月吳越王鏐遣使者沈瑫致書以受玉冊封吳越國王告於吳吳人以其國名與已同不受書遣瑫還仍戒境上無得通吳越使者及商旅明宗天成元年春三月吳越王鏐有疾如衣錦軍命鎮海鎮東節度使留後傳瓘監國吳徐温遣使來問疾左右勸鏐勿見鏐曰温隂狡此名問疾實使之覘我也彊出見之温果聚兵欲襲吳越聞鏐疾瘳而止鏐尋還錢塘是嵗吳越王鏐以中國喪亂朝命不通改元寳正其後復通中國乃諱而不稱三年秋八月吳越王鏐欲立中子傳瓘為嗣謂諸子曰各言汝功吾擇多者而立之傳瓘兄傳璹傳璙傳璟皆推傳瓘乃奏請以兩鎮授傳瓘閏月丁未詔以傳瓘為鎮海鎮東節度使四年吳越王鏐居其國好自大朝廷使者曲意奉之則贈遺豐厚不然則禮遇踈薄嘗遺安重誨書辭禮頗倨帝遣供奉官烏昭遇韓玫使吳越昭遇與玫有隙使還玫奏昭遇見鏐稱臣拜舞謂鏐為殿下及私以國事告鏐安重誨奏賜昭遇死癸巳制鏐以太師致仕自餘官爵皆削之凡吳越進奏官使者綱吏令所在繫治之鏐令子傳瓘等上表訟冤皆不省長興元年冬十月錢鏐因朝廷冊閩王使者裴羽還附表引咎其子傳瓘及將佐屢為鏐上表自訴癸卯敕聽兩浙綱吏自便二年春三月乙酉復以錢鏐為天下兵馬都元帥尚父吳越國王遣監門上將軍張籛徃諭㫖以曏日致仕安重誨矯制也三年春三月吳越武肅王錢鏐寢疾謂將吏曰吾疾必不起諸兒愚懦誰可為帥者衆泣曰兩鎮令公仁孝有功孰不愛戴鏐乃悉出印鑰授傳瓘曰將吏推爾宜善守之又曰子孫善事中國勿以易姓廢事大之禮庚戌卒年八十一傳瓘與兄弟同幄行䘮内牙指揮使陸仁章曰令公嗣先王霸業將吏旦暮趨謁當與諸公子異處乃命主者更設一幄扶傳瓘居之告將吏曰自今惟謁令公禁諸公子從者無得妄入晝夜警衛未嘗休息鏐末年左右皆附傳瓘獨仁章數以事犯之至是傳瓘勞之仁章曰先王在位仁章不知事令公今日盡節猶事先王也傳瓘嘉歎乆之傳瓘既襲位更名元瓘兄弟名傳者皆更為元以遺命去國儀用藩鎮法除民田荒絶者租稅命處州刺史曹仲達權知政事置擇能院掌選舉殿最以浙西營田副使沈崧領之内牙指揮使富陽劉仁𣏌及陸仁章乆用事仁章性剛仁𣏌好毁短人皆為衆所惡一日諸將共詣府門請誅之元瓘使從子仁俊諭之曰二將事先王乆吾方圖其功汝曹乃欲逞私憾而殺之可乎吾為汝主汝當禀吾命不然吾當歸臨安以避賢路衆懼而退乃以仁章為衢州刺史仁𣏌為湖州刺史中外有上書告訐者元瓘皆置不問由是將吏輯秋七月己丑加鎮海鎮東節度使錢元瓘守中書令四年秋七月丁亥賜錢元瓘爵吳王元瓘於兄弟甚厚其兄中吳建武節度使元璙自蘇州入見元瓘以家人禮事之奉觴為壽曰此兄之位也而小子居之兄之賜也元璙曰先王擇賢而立之君臣位定元璙知忠順而已因相與對泣潞王清泰元年春正月甲午以鎮海鎮東節度使吳王元瓘為吳越王後晉髙祖天福二年春二月吳越王元瓘之弟順化節度使同平章事元珦獲罪於元瓘廢為庶人初吴越王鏐少子元㺷數有軍功鏐賜之兵仗及吳越王元瓘立元㺷為土客馬步軍都指揮使靜江節度使兼中書令恃恩驕横増置兵仗至數千國人多附之元瓘忌之使人諷元㺷請輸兵仗出判温州元㺷不從銅官廟吏告元㺷遣親信禱神求主吳越江山又為蠟丸從水竇出入與兄元珦謀議三月戊午元瓘遣使者召元㺷宴宫中既至左右稱元㺷有刃墜於懐袖即格殺之并殺元珦元瓘欲按諸將吏與元珦元㺷交通者其子仁俊諫曰昔光武克王郎曹公破袁紹皆焚其書疏以安反側今宜效之元瓘從之夏四月吳越王元瓘復建國如同光故事丙申赦境内立其子弘僔爲世子以曹仲達沈崧皮光業爲丞相鎮海節度判官休鼎掌教令十一月戊辰詔加吳越王元瓘天下兵馬副元帥進封吳越國王四年秋八月己酉以吳越王元瓘爲天下兵馬元帥冬十月吳越恭穆夫人馬氏卒夫人雄武軍節度使綽之女也初武肅王鏐禁中外畜聲妓文穆王元瓘年三十餘無子夫人爲之請於鏐鏐喜曰吾家祭祀汝實主之乃聽元瓘納妾鹿氏生弘僔弘倧許氏生弘佐吳氏生弘俶衆妾生弘偡弘億弘儀弘偓弘仰弘信夫人撫視慈愛如一常置銀鹿於帳前坐諸兒於上而弄之五年夏四月甲子吳越孝獻世子弘僔卒冬十月丁酉加吳越王元瓘天下兵馬都元帥尚書令六年秋七月吳越府署火宫室府庫幾盡吳越王元瓘驚懼發狂八月吳越文穆王元瓘寢疾察内都監使章徳安忠厚能斷大事欲屬以後事語之曰弘佐尚少當擇宗人長者立之徳安曰弘佐雖少羣下伏其英敏願王勿以為念王曰汝善輔之吾無憂矣徳安處州人也辛亥元瓘卒初内牙指揮使戴惲為元瓘所親任悉以軍事委之瓘養子弘侑乳母惲妻之親也或告惲謀立弘侑徳安秘不發喪與諸將謀伏甲士於幕下壬子惲入府執而殺之廢弘侑為庶人復姓孫幽之明州是日將吏以元瓘遺命承制以鎮海鎮東節度副大使弘佐為節度使時年十四九月庚申弘佐即王位命丞相曹仲達攝政軍中言賜與不均舉仗不受諸將不能制仲達親諭之皆釋仗而拜弘佐温恭好書禮士躬勤政務發摘姦伏人不能欺民有獻嘉禾者弘佐問倉吏今蓄積幾何對曰十年王曰然則軍食足矣可以寛吾民乃命復其境内稅三年齊王開運二年冬十一月乙卯吳越王弘佐誅内都監使杜昭達己未誅内牙上統軍使明州刺史闞璠昭達建徽之孫也與璠皆好貨錢塘富人程昭恱以貨結二人得侍弘佐左右昭悦為人狡佞王悦之寵待踰於舊將璠不能平昭恱知之詣璠頓首謝罪璠責讓乆之乃曰吾始者决欲殺汝今既悔過吾亦釋然昭恱懼謀去璠璠專而愎國人惡之者衆王亦惡之昭恱欲出璠於外恐璠覺之私謂右統軍使胡進思曰今欲除公及璠各為本州使璠不疑可乎進思許之乃以璠為明州刺史進思為湖州刺史璠怒曰出我於外是棄我也進思曰老兵得大州幸矣不行何為璠乃受命既而復以它故留進思内外馬步都統軍使錢仁俊母杜昭達之姑也昭恱因譖璠昭達謀奉仁俊作亂下獄鍛鍊成之璠昭達既誅奪仁俊官幽于東府於是昭恱治闞杜之黨凡權位與已侔意所忌者誅放百餘人國人畏之側目胡進思重厚寡言昭恱以為戇故獨存之昭恱收仁俊故吏慎温其使證仁俊之罪拷掠備至温其堅守不屈弘佐嘉之擢為國官温其衢州人也十二月加弘佐東南面兵馬都元帥後漢髙祖天福十二年吳越内都監程昭恱多聚賔客畜兵器二月吳越王弘佐斬之釋錢仁俊之囚夏六月忠獻王弘佐卒遺令以弘倧為鎮東節度使丙寅弘倧襲位秋七月吳越王弘倧以其弟弘俶同參相府事八月制以錢弘倧為鎮海鎮東節度使兼中書令吳越王十一月吳越王弘倧大閲水軍賞賜倍於舊胡進思固諫弘倧怒投筆水中曰吾之財與士卒共之奚多少之限邪吳越王弘倧性剛嚴憤忠獻王弘佐時容養諸將政非已出及襲位誅杭越侮法吏三人内牙統軍使胡進思恃迎立功干預政事弘倧惡之欲授以一州進思不可進思有所謀議弘倧數面折之進思還家設忠獻王位被髮慟哭民有殺牛者吏按之引人所市肉近千斤弘倧問進思牛大者肉幾何對曰不過三百斤弘倧曰然則吏妄也命按其罪進思拜賀其明弘倧曰公何能知其詳進思踧踖對曰臣昔未從軍亦嘗從事於此進思以弘倧為知其素業故辱之益恨怒進思建議遣李孺贇歸福州及孺贇叛弘倧責之進思愈不自安弘倧與内牙指揮使何承訓謀逐進思又謀於内都監使水丘昭劵昭劵以為進思黨盛難制不如容之弘倧猶豫未决承訓恐事洩反以謀告進思十二月庚戌晦弘倧夜宴將吏進思疑其圖已與其黨謀作亂帥親兵百人戎服執兵入見於天䇿堂曰老奴無罪王何故圖之弘倧叱之不退左右持兵者皆憤怒弘倧猝愕不暇發言趨入義和院進思鎻其門矯稱王命告中外云猝得風疾傳位於同參相府事弘俶進思因帥諸將迎弘俶于私第且召丞相元徳昭徳昭至立於簾外不拜曰俟見新君進思亟出褰簾徳昭乃拜進思稱弘倧之命承制授弘俶鎮海鎮東節度使兼侍中弘俶曰能全吾兄乃敢承命不然當避賢路進思許之弘俶始視事進思殺水丘昭劵及進侍鹿光鉉光鉉弘倧之舅也進思之妻曰它人猶可殺昭劵君子也奈何害之乾祐元年春正月壬戌吳越王弘俶遷故王弘倧於衣錦軍私第遣匡武都頭薛温將親兵衛之潜戒之曰若有非常處分皆非吾意當以死拒之二月吳越内牙指揮使何承訓復請誅胡進思及其黨吳越王弘俶惡其反覆且懼召禍乙未執承訓斬之進思屢請殺廢王弘倧以絶後患弘俶不許進思詐以王命宻令薛温害之温曰僕受命之日不聞此言不敢妄發進思乃夜遣其黨方安等二人踰垣而入弘倧闔戸拒之大呼求救温聞之率衆而入斃安等于庭中入告弘俶弘俶大驚曰全吾兄汝之力也弘俶畏忌進思曲意下之進思亦内憂懼未幾疽發背卒弘倧由是獲全八月乙未以錢弘俶為吳越國王隠帝乾祐二年夏五月吳越内牙都指揮使鈄淊胡進思之黨也或告其謀叛辭連丞相弘億吳越王弘俶不欲窮治貶淊于處州秋七月吳越王弘俶以丞相弘億判明州冬十月壬午加吳越王弘俶尚書令吳越王弘俶募民能墾荒田者勿收其稅由是境内無棄田或請糾民遺丁以増賦仍自掌其事弘俶杖之國門國人皆悦三年冬十月丁未以吳越王弘俶為諸道兵馬元帥後周太祖廣順元年夏四月吳越王弘俶徙廢王弘倧居東府為築宫室治園圃娛恱之嵗時供饋甚厚顯徳元年秋七月丁丑加吳越王錢弘俶天下兵馬都元帥世宗顯徳二年十二月吳越王弘俶遣元帥府判官陳彦禧入貢帝以詔諭弘俶使出兵擊唐三年春二月吳越王弘俶遣兵屯境上以俟周命蘇州營田指揮使陳滿言於丞相吳程曰周師南征唐舉國驚擾常州無備易取也㑹唐主有詔撫安江隂吏民滿告程云周詔書已至程爲之言於弘俶請亟發兵從其䇿丞相元徳昭曰唐大國未可輕也若我入唐境而周師不至誰與并力能無危乎請姑俟之程固争以爲時不可失弘俶卒從程議癸未遣程督衢州刺史鮑修讓中直都指揮使羅晟趣常州程謂將士曰元丞相不欲出師將士怒流言欲擊徳昭弘俶匿徳昭於府中令捕言者歎曰方出師而士卒欲擊丞相不祥甚哉癸巳吳越王弘俶遣上直都指揮使路彦銖攻宣州羅晟帥戰艦屯江隂唐靜海制置使姚彦洪帥兵民萬人犇吳越王氏據閩中唐僖宗中和元年秋八月壽州屠者王緒與妹夫劉行全聚衆五百盜據本州月餘復陷光州自稱將軍有衆萬餘人蔡州節度使秦宗權表爲光州刺史固始縣佐王潮及弟審邽審知皆以材氣知名緒以潮爲軍正使典資糧閲士卒信用之四年初黄巢轉掠福建建州人陳巖聚衆數千保鄉里號九龍軍福建觀察使鄭鎰奏爲團鍊副使泉州刺史左廂都虞候李連有罪亡入溪洞合衆攻福州巖擊敗之鎰畏巖之逼表巖自代壬寅以巖爲福建觀察使巖爲治有威恵閩人安之光啓元年春正月秦宗權責租賦於光州刺史王緒緒不能給宗權怒發兵擊之緒懼悉舉光壽二州兵五千人驅吏民渡江以劉行全為前鋒轉掠江洪䖍州是月陷汀漳二州然皆不能守也秋八月王緒至漳州以道險糧少令軍中無得以老弱自隨犯者斬唯王潮兄弟扶其母董氏﨑嶇從軍緒召潮等責之曰軍皆有法未有無法之軍汝違吾令而不誅是無法也三子曰人皆有母未有無母之人將軍奈何使人棄其母緒怒命斬其母三子曰潮等事母如事將軍既殺其母安用其子請先母死將士皆為之請乃捨之有望氣者謂緒曰軍中有王者氣於是緒見將卒有勇略踰已及氣質魁岸皆殺之劉行全亦死衆皆自危曰行全親也且軍鋒之冠猶不免况吾屬乎行至南安王潮説其前鋒將曰吾屬違墳墓捐妻子羈旅外鄉為羣盜豈所欲哉乃為緒所迫脅故也今緒猜刻不仁妄殺無辜軍中孑孑者受誅且盡子須眉若神騎射絶倫又為前鋒吾竊為子危之前鋒將執潮手泣問計安出潮為之謀伏壯士數十人於篁竹中伺緒至挺劒大呼躍出就馬上擒之反縛以徇軍中皆呼萬嵗潮推前鋒將為主前鋒將曰吾屬今日不為魚肉皆王君力也天以王君為主誰敢先之相推讓數四卒奉潮為將軍緒歎曰此子在吾網中不能殺豈非天哉潮引兵將還光州約其屬所過秋豪無犯行及沙縣泉州人張延魯等以刺史廖彦若貪暴帥耆老奉牛酒遮道請潮留為州將潮乃引兵圍泉州二年秋八月王潮拔泉州殺廖彦若潮聞福建觀察使陳巖威名不敢犯福州境遣使降之巖表潮為泉州刺史潮沈勇有智略既得泉州招懐離散均賦繕兵吏民悦服幽王緒於别館緒慙自殺昭宗大順二年福建觀察使陳巖疾病遣使以書召泉州刺史王潮欲授以軍政未至而巖卒巖妻弟都將范暉諷將士推已爲留後發兵拒潮景福元年范暉驕侈失衆心王潮以從弟彦復爲都統弟審知爲都監將兵攻福州民自請輸米餉軍平湖洞及濵海蠻夷皆以兵船助之二年王彦復王審知攻福州乆不下范暉求救於威勝節度董昌昌與陳巖昏姻發温台婺州兵五千救之彦復審知以城堅援兵且至士卒死傷多白王潮欲罷兵更圖後舉潮不許請潮自臨行營潮報曰兵盡添兵將盡添將兵將俱盡吾當自來彦復審知懼親犯矢石急攻之五月城中食盡暉知不能守夜以印授監軍棄城走援兵亦還庚子彦復等入城辛丑暉亡抵沿海都為將士所殺潮入福州自稱留後素服塟陳巖以女妻其子延晦厚撫其家汀建二州降嶺海間羣盜二十餘輩皆降潰冬十月戊戌以泉州刺史王潮為福建觀察使乾寜三年秋九月庚辰升福州為威武軍以觀察使王潮為節度使四年冬十一月威武節度使王潮弟審知為觀察副使有過潮猶加捶撻審知無怨色潮寢疾捨其子延興延虹延豐延休命審知知軍府事十二月丁未潮薨審知以讓其兄泉州刺史審邽審邽以審知有功辭不受審知自稱福建留後表于朝廷光化元年春三月己丑以王審知充威武留後冬十月癸卯以威武留後王審知為節度使三年春二月壬申加威武節度使王審知同平章事後梁太祖開平元年夏五月己卯以王審知兼侍中三年夏四月庚子以王審知為閩王均王貞明六年初閩王審知承制加其從子泉州刺史延彬領平盧節度使延彬治泉州十七年吏民安之㑹得白鹿及紫芝僧浩源以為王者之符延彬由是驕縦密遣使浮海入貢求為泉州節度使事覺審知誅浩源及其黨黜延彬歸私第後唐莊宗同光三年夏五月閩王審知寢疾命其子節度副使延翰權知軍府事冬十二月辛未閩忠懿王審知卒子延翰自稱威武留後汀州民陳本聚衆三萬圍汀州延翰遣右軍都監栁邕等將兵二萬討之明宗天成元年春正月閩人破陳本斬之三月辛酉以威武節度副使王延翰為威武節度使夏五月甲戌加王延翰同平章事冬十月昭武節度使同平章事王延翰驕滛殘暴己丑自稱大閩國王立宫殿置百官威儀文物皆倣天子之制羣下稱之曰殿下赦境内追尊其父審知曰昭武王閩王延翰蔑棄兄弟襲位纔踰月出其弟延鈞為泉州刺史延翰多取民女以充後庭采擇不已延鈞上書極諫延翰怒由是有隙父審知養子延稟為建州刺史延翰與書使之采擇延稟復書不遜亦有隙十二月延稟延鈞合兵襲福州延稟順流先至福州指揮使陳陶帥衆拒之兵敗陶自殺是夜延稟帥壯士百餘人趨西門梯城而入執守門者發庫取兵仗及寢門延翰驚匿别室辛卯旦延稟執之暴其罪惡且稱延翰與妻崔氏共弑先王告諭吏民斬于紫宸門外是日延鈞至城南延稟開門納之推延鈞為威武留後二年春正月戊辰王延稟還建州王延鈞送之將别謂延鈞曰善守先人基業勿煩老兄再下延鈞遜謝甚恭而色變夏五月癸丑以威武留後王延鈞為本道節度使守中書令琅邪王三年秋七月戊辰以威武節度使王延鈞為閩王冬十二月閩王延鈞度民二萬為僧由是閩中多僧四年冬十二月奉國節度使知建州王延稟稱疾退居里第請以建州授其子繼雄庚子詔以繼雄爲建州刺史長興二年夏四月閩奉國節度使兼中書令王延稟聞閩王延鈞有疾以次子繼昇知建州留後帥建州刺史繼雄將水軍襲福州癸卯延稟攻西門繼雄攻東門延鈞遣樓船指揮使王仁達將水軍拒之仁達伏甲舟中僞立白幟請降繼雄喜屏左右登仁達舟慰撫之仁達斬繼雄梟首於西門延稟方縱火攻城見之慟哭仁達因縱兵擊之衆潰左右以斛舁延稟而走甲辰追擒之延鈞見之曰果煩老兄再下延稟慙不能對延鈞囚于别室遣使者如建州招撫其黨其黨殺使者奉繼昇及弟繼倫犇吳越仁達延鈞従子也五月閩王延鈞斬王延稟於市復其姓名曰周彦琛遣其弟都教練使延政如建州撫慰吏民六月閩王延鈞好神仙之術道士陳守元巫者徐彦林興盛韜共誘之作寳皇宫極土木之盛以守元為宫主冬十二月閩陳守元等稱寳皇之命謂閩王延鈞曰茍能避位受道當為天子六十年延鈞信之丙子命其子節度副使繼鵬權軍府事延鈞避位受籙道名玄錫三年春三月甲辰閩王延鈞復位夏六月閩王延鈞謂陳守元曰為我問寳皇既為六十年天子後當何如明日守元入白昨夕奏章得寳皇㫖當爲大羅仙主徐彦等亦曰北廟崇順王嘗見寳皇其言與守元同延鈞益自負始謀稱帝表朝廷云錢鏐卒請以臣爲吳越王馬殷卒請以臣爲尚書令朝廷不報自是職貢遂絶四年春正月閩人有言真封宅龍見者閩王延鈞更命其宅曰龍躍宫遂詣寳皇宫受冊備儀衛入府即皇帝位國號大閩大赦改元龍啓更名璘追尊父祖立五廟以其僚屬李敏爲左僕射門下侍郎其子節度副使繼鵬爲右僕射中書侍郎竝同平章事以親吏吳勗爲樞宻使唐冊禮使裴傑程侃適至海門閩主以傑為如京使侃固求北還不許閩主自以國小地僻常謹事四鄰由是境内差安夏四月閩主璘立子繼鵬為福王充寳皇宫使五月閩地震閩主璘避位脩道命福王繼鵬權總萬機初閩王審知性節儉府舍皆庳陋至是大作宫殿極土木之盛秋七月戊子閩主璘復位初福建中軍使薛文傑性巧佞璘喜奢侈文傑以聚歛求媚璘以為國計使親任之之文傑隂求富氏之罪籍沒其財被榜捶者胷背分受仍以銅斗火熨之建州土豪吳光入朝文傑利其財求其罪將治之光怨怒帥其衆且萬人叛奔吳九月閩内樞密使薛文傑説閩主抑挫諸宗室從子繼圖不勝忿謀反坐誅連坐者千餘人閩主好鬼神巫盛韜等皆有寵薛文傑言於閩主曰陛下左右多姦臣非質諸鬼神不能知也盛韜善視鬼宜使察之閩主從之文傑惡樞宻吳勗勗有疾文傑省之曰主上以公乆疾欲罷公近密僕言公但小苦頭痛耳將愈矣主上或遣使來問慎勿以它疾對也勗許諾明日文傑使韜言於閩主曰適見北廟崇順王訊吳勗謀反以銅釘釘其腦金椎擊之閩主以告文傑文傑曰未可信也宜遣使問之果以頭痛對即收下獄遣文傑及獄吏雜治之勗自誣服并其妻子誅之由是國人益怒吳光請兵於吳吳信州刺史蔣延徽不俟朝命引兵㑹光攻建州閩主遣使求救於吳越十一月閩主尊魯夫人黄氏為皇太后十二月閩主改福州為長樂府親從都指揮使王仁達有擒王延稟之功性慷慨言事無所避閩主惡之嘗私謂左右曰仁達智有餘吾猶能御之非少主臣也至是竟誣叛族誅之潞王清泰元年春正月吳蔣延徽敗閩兵於浦城遂圍建州閩主璘遣上軍使張彦柔驃騎大將軍王延宗將兵萬人救建州延宗軍及中塗士卒不進曰不得薛文傑不能討賊延宗馳使以聞國人震恐太后及福王繼鵬泣謂璘曰文傑盜弄國權枉害無辜上下怨怒乆矣今吳兵深入士卒不進社稷一旦傾覆留文傑何益文傑亦在側互陳利害璘曰吾無如卿何卿自為謀文傑出繼鵬伺之於啓聖門外以笏擊之仆地檻車送軍前市人爭持瓦礫擊之文傑善術數自云過三日則無患部送者聞之倍道兼行二日而至士卒見之踴躍臠食之閩主亟遣赦之不及初文傑以古制檻車疎闊更為之形如木匱攢以鐵鋩内向動輙觸之車成文傑首自入焉并誅盛韜蔣延徽攻建州垂克徐知誥以延徽吳太祖之壻與臨川王濛素善恐其克建州奉濛以圖興復遣使召之延徽亦聞閩兵及吳越兵將至引兵歸閩人追擊敗之士卒死亡甚衆歸罪於都虞候張重進斬之知誥貶延徽為右威衛將軍遣使求好于閩二年春正月閩主立淑妃陳氏為皇后初閩主兩娶劉氏皆士族美而無寵陳后本閩太祖侍婢金鳳也陋而滛閩主嬖之以其族人守恩匡勝為殿使夏六月閩福王繼鵬私於宫人李春鷰繼鵬請之於陳后后白閩主而賜之初閩主有幸臣曰歸守明出入卧内閩主晚年得風疾陳后與守明及百工院使李可殷私通國人皆惡之莫敢言可殷嘗譖皇城使李倣於閩主后族陳匡勝無禮於福王繼鵬倣及繼鵬皆恨之閩主疾甚繼鵬有喜色倣以閩主為必不起冬十月己卯使壯士數人持白挺擊李可殷殺之中外震驚庚辰閩主疾少間陳后訴之閩主力疾視朝詰可殷死狀倣懼而出俄頃引部兵鼓譟入宫閩主聞變匿於九龍帳下亂兵刺之而出閩主宛轉未絶宫人不忍其苦為絶之倣與繼鵬殺陳后陳守恩陳匡勝歸守明及繼鵬弟繼韜繼韜素與繼鵬相惡故也辛巳繼鵬稱皇太后令監國是日即皇帝位更名昶諡其父曰齊肅明孝皇帝廟號恵宗既而自稱權知福建節度事遣使奉表於唐大赦境内立李春鷰為賢妃初閩恵宗娶漢主女清逺公主使宦者閩清林延遇置邸於畨禺專掌國信漢主賜以大第稟賜甚厚數問以閩事延遇不對退謂人曰去閩語閩去越語越處人宫禁可如是乎漢主聞而賢之以為内常侍使鉤校諸司事延遇聞恵宗遇弑求歸不許素服向其國三日哭閩皇城使判六軍諸衛李倣專制朝政隂養死士閩主昶與拱宸指揮使林延皓等圖之延皓等詐親附倣倣待之不疑十一月壬子倣入朝延皓等伏衛士數百於内殿執斬之梟首朝門倣部兵千餘持白挺攻應天門不克焚啓聖門奪倣首犇吳越詔暴倣弑君及殺繼韜等罪告諭中外以建王繼嚴權判六軍諸衛以六軍判官永泰葉翹爲内宣徽使㕘政事翹博學質直閩恵宗擢爲福王友昶以師傅禮待之多所禆益宫中謂之國翁昶既嗣位驕縱不與翹議國事一旦昶方視事翹衣道士服過庭中趨出昶召還拜之曰軍國事殷乆不接對孤之過也翹頓首曰老臣輔導無狀致陛下即位以來無一善可稱願乞骸骨昶曰先帝以孤屬公政令不善公當極言柰何棄孤去厚賜金帛慰諭令復位昶元妃梁國夫人李氏同平章事敏之女昶嬖李春鷰待夫人甚薄翹諫曰夫人先帝之甥聘之以禮奈何以新愛而棄之昶不従由是疎之未幾復上書言事昶批其紙尾曰一葉隨風落御溝遂放歸永泰以壽終十二月閩主賜洞真先生陳守元號天師信重之乃至更易將相刑罰選舉皆與之議守元受賂請託言無不從其門如市後晉髙祖天福元年春三月閩主昶改元通文立賢妃李氏為皇后尊皇太后曰太皇太后二年夏四月閩王作紫微宫飾以水晶土木之盛倍於寳皇宫又遣使散詣諸州伺人隠慝夏六月方士言於閩主云有白龍夜見螺峯閩主作白龍寺時百役繁興用度不足閩主謂吏部侍郎判三司候官蔡守䝉曰聞有司除官皆受賂有諸對曰浮言無足信也閩主曰朕知之乆矣今以委卿擇賢而授不肖及罔冒者勿拒第令納賂籍而獻之守䝉素亷以為不可閩主怒守䝉懼而從之自是除官但以貨多寡為差閩主又以空名堂牒使醫工陳究賣官於外専務聚歛無有盈厭又詔民有隠年者杖背隠口者死逃亡者族果菜雞豚皆重征之冬十月閩主命其弟威武節度使繼恭上表告嗣位于晉且請置邸于都下三年冬十一月丙午以閩主昶為閩國王以左散騎常侍盧損為冊禮使賜昶赭袍戊申以威武節度使王繼恭為臨海郡王閩主聞之遣進奏官林恩白執政以既襲帝號辭冊命及使者閩諫議大夫黄諷以閩主淫暴與妻子辭訣入諫閩主欲杖之諷曰臣若迷國不忠死亦無怨直諫被杖臣不受也閩主怒黜為民四年春二月盧損至福州閩主稱疾不見命弟繼恭主之遣其禮部員外郎鄭元弼奉繼恭表隨損入貢閩主不禮於損有士人林省鄒私謂損曰吾主不事其君不愛其親不恤其民不敬其神不睦其鄰不禮其賔其能乆乎余將僧服而北逃㑹當相見上國耳閩主忌其叔父前建州刺史延武戸部尚書延望才名巫者林興與延武有怨託鬼神語云延武延望將為變閩主不復詰使興帥壯士就第殺之并其五子閩主用陳守元言作三清殿於禁中以黄金數千斤鑄寳皇大帝天尊老君像晝夜作樂焚香禱祀求神丹政無大小皆林興傳寳皇命决之閩判六軍諸衛建王繼嚴得士心閩主忌之六月罷其兵柄更名繼裕以弟繼鏞判六軍去諸衛字林興詐覺流泉州望氣者言宫中有災乙未閩主徙居長春宫初閩惠宗以太祖元從為拱宸控鶴都及康宗立更募壯士二千人為腹心號宸衛都禄賜皆厚於二都或言二都怨望將作亂閩主欲分隷漳泉二州二都益怒閩主為長夜之飲彊羣臣酒醉則令左右伺其過失從弟繼隆醉失禮斬之屢以猜怒誅宗室叔父左僕射同平章事延羲陽為狂愚以避禍閩主賜以道士服置武夷山中尋復召還幽扵私第閩主數侮拱宸控鶴軍使永泰朱文進光山連重遇二人怨之㑹北宫火求賊不獲閩主命重遇將内外營兵掃除餘燼日役萬人士卒甚苦之又疑重遇知縱火之謀欲誅之内學士陳郯私告重遇辛巳夜重遇入直帥二都兵焚長春宫以攻閩主使人迎延義於瓦礫中呼萬嵗復召外營兵共攻閩主獨宸衛都拒戰閩主乃與李后如宸衛都比明亂兵焚宸衛都宸衛都戰敗餘衆千餘人奉閩主及李后出北關至梧桐嶺衆稍逃散延羲使兄子前汀州刺史繼業將兵追之及扵村舍閩主素善射引弓殺數人俄而追兵雲集閩主知不免投弓謂繼業曰卿臣節安在繼業曰君無君徳臣安得有臣節新君叔父也舊君昆弟也孰親孰疎閩主不復言繼業與之俱還至陁莊飲以酒醉而縊之并李后及諸子王繼恭皆死宸衛餘衆犇吳越延義自稱威武節度使閩國王更名曦改元永隆赦繫囚頒賚中外以宸衛弑閩主赴於鄰國諡閩主曰聖神英睿文明廣武應道大弘孝皇帝廟號康宗遣商人間道奉表稱藩于晉然其在國置百官皆如天子之制以太子太傅致仕李真為司空兼中書侍郎同平章事連重遇之攻康宗也陳守元在宫中易服色將逃兵人殺之重遇執蔡守䝉數以賣官之罪而斬之閩主㬢既立遣使誅林興於泉州冬十月庚戌閩主康宗所遣使者鄭元弼至大梁康宗遺執政書曰閩國一從興運乆歷年華見北辰之帝座頻移致東海之風帆多阻又求用敵國禮致書徃來帝怒其不遜壬子詔却其貢物及福建諸州綱運竝令元弼及進奏官林恩部送速歸兵部貟外郎李知損上言王昶僭慢宜執留使者籍沒其貨乃下元弼恩獄十二月閩主作新宫徙居之五年春正月帝引見閩使鄭元弼等元弼曰王昶蠻夷之君不知禮義陛下得其善言不足喜惡言不足怒臣將命無狀願伏鈇鑕以贖昶罪帝憐之辛未詔釋元弼等閩王曦既立驕滛苛虐猜忌宗族多尋舊怨其弟建州刺史延政數以書諫之曦怒復書罵之遣親吏葉翹監建州軍教練使杜漢崇監南鎮軍二人爭捃延政隂事告於曦由是兄弟積相猜恨一日翹與延政議事不叶翹訶之曰公反邪延政怒欲斬翹翹犇南鎮延政發兵就攻之敗其戍兵翹漢崇犇福州西鄙戍兵皆潰二月曦遣統軍使潘師逵吳行真將兵四萬擊延政師逵軍於建州城西行真軍於城南皆阻水置營焚城外廬舍延政求救於吳越壬戌吳越王元瓘遣寧國節度使同平章事仰仁詮内都監使薛萬忠將兵四萬救之丞相林鼎諫不聽三月戊辰師逵分兵三千遣都軍使蔡弘裔將之出戰延政遣其將林漢徹等敗之於茶山斬首千餘級丁丑王延政募敢死士千餘人夜渉水潜入潘師逵壘因風縱火城上鼓譟以應之戰棹都頭建安陳誨殺師逵其衆皆潰戊寅引兵欲攻吳行眞寨建人未渉水行眞及將士棄營走死者萬人延政乗勝取永平順昌二城自是建州之兵始盛夏四月吳越仰仁詮等兵至建州王延政以福州兵已敗去奉牛酒犒之請班師仁詮等不從營于城之西北延政懼復遣使乞師於閩王閩王以泉州刺史王繼業爲行營都統將兵二萬救之且移書責吳越遣輕兵絶吳越糧道㑹乆雨吳越軍食盡五月延政遣兵出擊大破之俘斬以萬計癸未仁銓等夜遁唐主遣客省使尚全恭如閩和閩王曦及王延政六月延政遣牙將及女奴持誓書及香爐至福州與曦盟于宣陵然兄弟相猜恨猶如故閩主曦因商人奉表自理十一月甲申以曦為威武節度使兼中書令封閩國王六年春正月王延政城建州周二十里請於閩王曦欲以建州為威武軍自為節度使曦以威武軍福州也乃以建州為鎮安軍以延政為節度使封富沙王延政改鎮安曰鎮武而稱之夏四月閩主曦以其子亞澄同平章事判六軍諸衛曦疑其弟汀州刺史延喜與延政通謀遣將軍許仁欽以兵三千如汀州執延喜以歸夏六月閩王曦聞王延政以書招泉州刺史王繼業還賜死於郊外殺其子於泉州初繼業為汀州刺史司徒兼門下侍郎同平章事楊沂豐為士曹㕘軍與之親善或告沂豐與繼業通謀沂豐以侍宴即收下獄明日斬之夷其族沂豐渉之從弟也時年八十餘國人哀之自是宗族勲舊相繼被誅人不自保諫議大夫黄峻舁櫬詣朝堂極諫曦曰老物狂發矣貶漳州司戸曦滛侈無度資用不給謀於國計使南安陳匡範匡範請日進萬金曦悦加匡範禮部侍郎匡範増筭商賈數倍曦宴羣臣舉酒屬匡範曰明珠美玉求之可得如匡範人中之寳不可得也未幾商賈之筭不能足日進貸諸省務錢以足之恐事覺憂悸而卒曦祭贈甚厚諸省務以匡範貸帖聞曦大怒斵棺斷其尸棄水中以連江人黄紹頗代為國計使紹頗請令欲仕者自非䕃補皆聽輸錢即授之以資望髙下及州縣戸口多寡定其直自百緡至千緡從之秋七月閩王曦自稱大閩皇領威武節度使與王延政治兵相攻互有勝負福建之間暴骨如莽鎮武節度判官晉江潘承祐屢請息兵修好延政不從閩主使者至延政大陳甲卒以示之對使者語甚悖慢承祐長跪切諫延政怒顧左右曰判官之肉可食乎承祐不顧聲色愈厲閩主曦惡泉州刺史王繼嚴得衆心罷歸酖殺之九月閩王曦以其子琅邪王亞澄為威武節度使兼中書令改號長樂王冬十月閩主曦即皇帝位王延政自稱兵馬元帥閩同平章事李敏卒七年春正月閩主曦立皇后李氏同平章事真之女也嗜酒剛愎曦寵而憚之三月閩主曦立長樂王亞澄為閩王夏六月閩富沙王延政圍汀州閩主曦發漳泉兵五千救之又遣其將林守亮入尤溪大明宫使黄敬忠屯尤口欲乗虚襲建州國計使黄紹頗將步卒八千為二軍聲援秋七月閩富沙王延政攻汀州四十二戰不克而歸其將包洪實陳望將水軍以禦福州之師丁酉遇於尤口黄敬忠將戰占者言時刻未利按兵不動洪實等引兵登岸水陸夾攻之殺敬忠俘斬二千級林守亮黄紹頗皆遁歸八月閩主曦遣使以手詔及金器九百錢萬緡將吏敕告六百四十通求和於富沙王延政延政不受丙寅閩主曦宴羣臣於九龍殿從子繼柔不能飲彊之繼柔私减其酒曦怒并客將斬之閩主曦以同平章事候官余廷英為泉州刺史廷英貪穢掠人女子詐稱受詔采擇以備後宫事覺曦遣御史按之廷英懼詣福州自歸曦詰責將以屬吏廷英退獻買宴錢萬緡曦悦明日召見謂曰宴已買矣皇后貢物安在廷英復獻錢於李后乃遣歸泉州自是諸州皆别貢皇后物未幾復召廷英為相閩鹽鐵使右僕射李仁遇敏之子閩主曦之甥也年少美姿容得幸於曦十二月以仁遇為左僕射兼中書侍郎翰林學士吏部侍郎李光凖為中書侍郎兼户部尚書並同平章事曦荒滛無度嘗夜宴光凖醉忤㫖命執送都市斬之吏不敢殺繫獄中明日視朝召復其位是夕又宴收翰林學士周維岳下獄吏拂榻待之曰相公昨夜宿此尚書勿憂醒而釋之它日又宴侍臣皆以醉去獨維岳在曦曰維岳身甚小何飲酒之多左右或曰酒有别腸不必長大曦欣然命捽維岳下殿欲剖視其酒腸或曰殺維岳無人復能侍陛下劇飲者乃捨之齊王天福八年春二月閩富沙王延政稱帝於建州國號大殷大赦改元天徳以將樂縣為鏞州延平鎮為鐔州立皇后張氏以節度判官潘承祐為吏部尚書節度巡官建陽楊思恭為兵部尚書未幾以承祐同平章事思恭遷僕射録軍國事延政服赭袍視事然牙參及接鄰國使者猶如藩鎮禮殷國小民貧軍旅不息楊思恭以善聚歛得幸増田畒山澤之稅至於魚鹽蔬果無不倍征國人謂之楊剥皮三月閩主曦納金吾使尚保殷之女立為賢妃妃有殊色曦嬖之醉中妃所欲殺則殺之所欲宥則宥之殷將陳望等攻閩福州入其西郛既而敗歸夏五月殷吏部尚書同平章事潘承祐上書陳十事大指言兄弟相攻逆傷天理一也賦歛煩重力役無節二也發民為兵羈旅愁怨三也楊思恭奪人衣食使歸怨於上羣臣莫敢言四也疆土狹隘多置州縣増吏困民五也除道裹糧將攻臨汀曽不憂金陵錢塘承虚相襲六也括髙貲戸財多者補官逋負者被刑七也延平諸津征菜魚米獲利至㣲歛怨甚大八也與唐吳越為鄰即位以來未嘗通使九也宫室臺榭崇飾無度十也殷王延政大怒削承祐官爵勒歸私第初閩主㬢侍康宗宴㑹新羅獻寳劒康宗舉以示同平章事王倓曰此何所施倓對曰斬爲臣不忠者時㬢已蓄異志凛然變色至是宴羣臣復有獻劒者㬢命發倓冡斬其尸校書郎陳光逸謂其友曰主上失徳亡無日矣吾欲死諫其友止之不從上書陳㬢大惡五十事㬢怒命衛士鞭之數百不死以繩繫其頸懸諸庭樹乆之乃絶閩主曦嫁其女取班簿閱視之朝士有不賀者十二人皆杖之於朝堂以御史中丞劉贊不舉劾亦將杖之贊義不受辱欲自殺諫議大夫鄭元弼諫曰古者刑不上大夫中丞儀刑百僚豈宜加之箠楚曦正色曰卿欲效魏徴邪元弼曰臣以陛下為唐太宗故敢效魏徴曦怒稍解乃釋贊贊竟以憂卒開運元年春正月唐主遣使遺閩主曦及殷王延政書責以兄弟尋戈曦復書引周公誅管蔡唐太宗誅建成元吉延政復書斥唐王奪楊氏國唐主怒遂與殷絶閩拱宸都指揮使朱文進閤門使連重遇既弑康宗常懼國人之討相與結昏以自固閩主曦果於誅殺嘗遊西園因醉殺控鶴指揮使魏從朗從朗朱連之黨也又嘗酒酣誦白居易詩惟有人心相對間咫尺之情不能料因舉酒屬二人二人起流涕再拜曰臣子事君父安有它志曦不應二人大懼李后妬尚賢妃之寵欲殺曦而立其子亞澄使人告二人曰主上殊不平於二公奈何㑹后父李真有疾乙酉曦如真第問疾文進重遇使拱宸馬步使錢達弑曦於馬上召百官集朝堂告之曰太祖昭武皇帝光啓閩國今子孫淫虐荒墜厥緒天厭王氏宜更擇有徳者立之衆莫敢言重遇乃推文進升殿被衮冕帥羣臣北面再拜稱臣文進自稱閩主悉收王氏宗族延喜以下少長五十餘人皆殺之葬閩主曦謚曰睿文廣武明聖元徳隆道大孝皇帝廟號景宗以重遇緫六軍禮部尚書判三司鄭元弼抗辭不屈黜歸田里將犇建州文進殺之文進下令出宫人罷營造以反曦之政殷主延政統軍使吳成義將兵討文進不克文進加樞密使鮑思潤同平章事以羽林統軍使黄紹頗爲泉州刺史左軍使程文緯爲漳州刺史汀州刺史同安許文稹舉郡降之夏四月朱文進遣使如唐唐主囚其使將伐之㑹天暑疾疫而止秋八月朱文進自稱威武留後權知閩國事遣使奉表稱藩于晉癸丑以文進為威武節度使知閩國事冬十月殷主延政遣其將陳敬佺以兵三千屯尤溪及古田盧進以兵二千屯長溪泉州散員指揮使姚林留從效謂同列王忠順董思安張漢思曰朱文進屠㓕王氏遣腹心分據諸州吾屬世受王氏恩而交臂事賊一旦富沙王克福州吾屬死有餘愧衆以為然十一月從效等各引軍中所善壯士夜飲於從效之家從效紿之曰富沙王已平福州宻㫖令吾屬討黄紹頗吾觀諸君狀貌皆非乆處貧賤者從吾言富貴可圖不然禍且至矣衆皆踊躍操白挺踰垣而入執紹頗斬之從效持州印詣王繼勲第請主軍府從效自稱平賊統軍使函紹頗首遣副兵馬使臨淮陳洪進齎詣建州洪進至尤溪福州戍兵數千遮道洪進紿之曰義師已誅朱福州吾倍道逆嗣君於建州爾輩尚守此何為乎以紹頗首示之衆遂潰大將數人從洪進詣建州延政以繼勲為侍中泉州刺史從效忠順思安洪進皆為都指揮使漳州將程謨聞之亡殺刺史程文緯立王繼成權州事繼勲繼成皆延政從子也朱文進之㓕王氏二人以疎逺獲全汀州刺史許文稹奉表請降於殷十二月癸丑加朱文進同平章事封閩國王朱文進聞黄紹頗死大懼以重賞募兵二萬遣統軍使林守諒内客省使李廷鍔將之攻泉州鉦鼓相聞五百里殷主延政遣大將軍杜進將兵二萬救泉州留從效開門與福州兵戰大破之斬守諒執廷鍔延政遣統軍使吳成義帥戰艦千艘攻福州朱文進遣子弟為質於吳越以求救初唐翰林待詔臧循與樞宻副使查文徽同鄉里循常為賈人習福建山川為文徽畫取建州之䇿文徽表請用兵擊王延政國人多以為不可唐主以文徽為江西安撫使循行境上覘其可否文徽至信州奏言攻之必克唐主以洪州營屯都虞候邊鎬為行營招討諸軍都虞候將兵從文徽伐殷文徽自建陽進屯蓋竹聞泉漳汀三州皆降于殷殷將張漢真自鏞州將兵八千將至文徽懼退保建陽臧循屯邵武邵武民導殷兵襲破循軍執循送建州斬之閏月殷吳成義聞有唐兵詐使人告福州吏民曰唐助我討賊臣大兵今至矣福人益懼乙未朱文進遣同平章事李光凖等奉國寳于殷丁酉福州南廊承㫖林仁翰謂其徒曰吾曹世事王氏今受制賊臣富沙王至何面見之帥其徒三十人被甲趣連重遇第重遇方嚴兵自衛三十人者望之稍稍遁去仁翰執槊直前刺重遇殺之斬其首以示衆曰富沙王且至汝輩族矣今重遇已死何不亟取文進以贖罪衆踊躍從之遂斬文進迎吳成義入城函二首送建州二年春正月閩之故臣共迎殷主延政請歸福州改國號曰閩延政以方有唐兵未暇徙都以從子門下侍郎同平章事繼昌都督南都内外諸軍事鎮福州以飛捷指揮使黄仁諷為鎮遏使將兵衛之林仁翰至福州閩主賞之甚薄仁翰未嘗自言其功發南都侍衛及兩軍甲士萬五千人詣建州以拒唐二月唐查文徽表求益兵唐主以天威都虞候何敬洙為建州行營招討馬歩都指揮使將軍祖全恩為應援使姚鳳為都監將兵數千㑹攻建州自崇安進屯赤嶺閩主延政遣僕射楊思恭統軍使陳望將兵萬人拒之列柵水南旬餘不戰唐人不敢逼思恭以延政之命督望戰望曰江淮兵精其將習武事國之安危繫此一舉不可不萬全而後動思恭怒曰唐兵深侵陛下寢不交睫委之將軍今唐兵不出數千將軍擁衆萬餘不乗其未定而擊之有如唐兵懼而自退將軍何面目見陛下乎望不得已引兵渉水與唐戰全恩等以大軍當其前使竒兵出其後大破之望死思恭僅以身免延政大懼嬰城自守召董思安王忠順使將泉州兵五千詣建州分守要害初光州人李仁達仕閩為元從指揮使十五年不遷職閩主曦之世叛犇建州閩主延政以為將及朱文進弑曦復叛犇福州陳取建州之䇿文進惡其反覆黜居福清浦城人陳繼珣亦叛閩主延政犇福州為曦畫䇿取建州曦以為著作郎及延政得福州二人皆不自安王繼昌暗弱嗜酒不恤將士將士多怨仁達潜入福州與繼珣説黄仁諷曰今唐兵乗勝建州孤危富沙王不能保建州安能保福州昔王潮兄弟光山布衣耳取福建如反掌况吾輩乗此機㑹自圖富貴何患不如彼乎仁諷然之是夕仁達等引甲士突入府舍殺繼昌及吳成義仁逹欲自立恐衆心未服以雪峯寺僧卓巖明素為衆所重乃言此僧目重瞳子手垂過膝真天子也相與迎之三月己亥立以為帝解去衲衣被以衮冕帥將吏北面拜之然猶稱天福十年遣使奉表稱藩于晉延政聞之族黄仁諷家命統軍使張漢真將水軍五千㑹漳泉兵討巖明夏四月閩張漢真至福州攻其東關黄仁諷聞其家夷滅開門力戰大破閩兵執漢真入城斬之卓巖明無它方略但於殿上噀水散豆作諸法事而已又遣使迎其父扵莆田尊為太上皇李仁達既立巖明自判六軍諸衛事使黄仁諷屯西門陳繼珣屯北門仁諷從容謂繼珣曰人之所以為人以有忠信仁義也吾頃嘗有功於富沙中間叛之非忠也人以從子託我而與人殺之非信也屬者與建兵戰所殺皆鄉曲故人非仁也棄妻子使人魚肉之非義也此身十沈九浮死有餘愧因拊膺慟哭繼珣曰大丈夫徇功名何顧妻子宜置此事勿以取禍仁達聞之使人告仁諷繼珣謀反皆殺之由是兵權盡歸仁五月丁巳李仁達大閲戰士請卓巖明臨視仁達隂教軍士突前登階刺殺巖明仁達陽驚狼狽而走軍士共執仁達使居巖明之坐仁達乃自稱威武留後用保大年號奏表稱藩于唐亦遣使入貢于晉并殺巖明之父唐以仁達為威武節度使同平章事賜名弘義編之屬籍弘義又遣使修好於吳越唐兵圍建州屢破泉州兵許文稹敗唐兵于汀州執其將時厚卿秋七月閩人或告福州援兵謀叛閩主延政收其鎧仗遣還伏兵於隘盡殺之死者八千餘人脯其肉以歸為食唐邊鎬㧞鐔州查文徽之黨魏岑馮延已延魯以師出有功皆踊躍贊成之徴求供億府庫為之耗竭洪饒撫信之民尤苦之延政遣使奉表稱臣於吳越請為附庸以求救八月唐兵圍建州既乆建人離心或謂董思安盍早擇去就思安曰吾世事王氏危而叛之天下其誰容我衆感其言無叛者丁亥唐先鋒橋道使上元王建封先登遂克建州閩主延政降王忠順戰死董思安整衆犇泉州初唐兵之來建人苦王氏之亂與楊思恭之重歛爭伐木開道以迎之及破建州縱兵大掠焚宫室廬舍俱盡是夕寒雨凍死者相枕建人失望唐主以其有功皆不問九月許文稹以汀州王繼勲以泉州王繼成以漳州皆降於唐唐置永安軍於建州冬十月王延政至金陵唐主以爲羽林大將軍斬楊思恭以謝建人以百勝節度使王崇文為永安節度使崇文治以寛簡建人遂安三年春三月唐泉州刺史王繼勲致書修好於威武節度使李弘義弘義以泉州故隷威武軍怒其抗禮夏四月遣弟弘通將兵萬人伐之泉州郡指揮使留從效謂刺史王繼勲曰李弘通兵勢甚盛士卒以使君賞罰不當莫肯力戰使君宜避位自省乃廢繼勲歸私第代領軍府事勒兵擊李弘通大破之表聞于唐唐主以從效為泉州刺史召繼勲還金陵遣將將兵戍泉州徙漳州刺史王繼成為和州刺史汀州刺史許文稹為蘄州刺史初唐人既克建州欲乗勝取福州唐主不許樞宻使陳覺請自徃説李弘義必令入朝宋齊丘薦覺才辯可不煩寸刃坐致弘義唐主乃拜弘義母妻皆為國夫人四弟皆遷官以覺為福州宣諭使厚賜弘義金帛弘義知其謀見覺辭色甚倨待之疎薄覺不敢言入朝事而還秋八月唐陳覺自福州還至劒州恥無功矯詔使侍衛官顧忠召弘義入朝自稱權福州軍府事擅發汀建撫信州兵及戍卒命建州監軍使馮延魯將之趣福州迎弘義延魯先遺弘義書諭以禍福弘義復書請戰遣樓船指揮使楊崇保將州師拒之覺以劒州刺史陳誨為縁江戰棹指揮使表福州孤危旦夕可克唐主以覺専命甚怒羣臣多言兵已傅城下不可中止當發兵助之丁丑覺延魯敗楊崇保於候官戊寅乗勝進攻福州西關弘義出擊大破之執唐左神威指揮使楊匡鄴唐主以永安節度使王崇文為東南面都招討使以漳泉安撫使諫議大夫魏岑為東面監軍使延魯為南面監軍使㑹兵攻福州克其外郭弘義固守第二城九月李弘義自稱威武留後權知閩國事更名弘達奉表請命于晉甲午以弘達為威武節度使同平章事知閩國辛丑福州排陣使馬捷引唐兵自馬牧山㧞寨而入至善化門橋都指揮使丁彦貞以兵百人拒之弘義退保善化門外城再重皆爲唐兵所據弘達更名達遣使奉表稱臣乞師於吳越冬十月唐漳州將林贊堯作亂殺監軍使周承義劒州刺史陳誨泉州刺史留從效舉兵逐贊堯以泉州禆將董思安權知漳州唐主以思安為漳州刺史思安辭以父名章唐主改漳州為南州命思安及留從效將州兵㑹攻福州庚辰圍之福州使者至錢塘吳越王弘佐召諸將謀之皆曰道險逺難救惟内都監使臨安水丘昭劵以為當救弘佐曰唇亡齒寒吾為天下元帥曽不能救鄰道將安用之諸君但樂飽食安坐邪壬午遣統軍使張筠趙承泰将兵三萬水陸救福州先是募兵久無應者弘佐命糾之曰糾而為兵者糧賜減半明日應募者雲集弘佐命昭劵専掌用兵昭劵憚程昭恱以用兵事讓之弘佐命昭恱掌應援饋運事而以軍謀委元徳昭徳昭元仔倡之子也弘佐議鑄鐵錢以益將士禄賜其弟牙内都虞候弘億諫曰鑄鐵錢有八害新錢既行舊錢皆流入鄰國一也可用於吾國而不可用於它國則商賈不行百貨不通二也銅禁至嚴民猶盜鑄况家有鐺釜野有鏵犂犯法必多三也閩人鑄鐵錢而亂亡不足為法四也國用幸豐而自示空乏五也禄賜有常而無故益之以啓無厭之心六也法變而弊不可遽復七也錢者國姓易之不祥八也弘佐乃止十一月己酉吳越兵至福州自􅊻浦南潜入州城唐兵進據東武門李達與吳越兵共禦之不利自是内外斷絶城中益危唐主遣信州刺史王建封助攻福州時王崇文雖為元帥而陳覺馮延魯魏岑爭用事留從效王建封倔彊不用命各爭功進退不相應由是將士皆解體故攻城不克唐主以江州觀察使杜昌業為吏部尚書判省事先是昌業自兵部尚書判省事出江州及還閲簿籍撫案歎曰未數年而府庫所耗者半其能久乎後漢髙祖天福十二年春三月吳越復發水軍遣其將余安將之自海道救福州己亥至白蝦浦海岸泥淖須布竹簀乃可行唐之諸軍在城南者聚而射之簀不得施馮延魯曰城所以不降恃此救也今相持不戰徒老我師不若縱其登岸盡殺之則城不攻自降矣禆將孟堅曰浙兵至此已乆不能進退求一戰而死不可得若聽其登岸彼必致死於我其鋒不可當安能盡殺乎延魯不聽曰吾自擊之吳越兵既登岸大呼奮擊延魯不能禦棄衆而走孟堅戰死吳越兵乗勝而進城中兵亦出夾擊唐兵大破之唐城南諸軍皆遁吳越兵追之王崇文以牙兵三百拒之諸軍陳於崇文之後追者乃還或言浙兵欲棄福州拔李達之衆歸錢唐東南守將劉洪進等白王建封請縱其盡出而取其城留從效不欲福州之平建封亦忿陳覺等専横乃曰吾軍敗矣安能與人爭城是夕燒營而遁城北諸軍亦相顧而潰馮延魯引佩刀自刺親吏救之不死唐兵死者二萬餘人委棄軍資器械數十萬府庫為之耗竭余安引兵入福州李達舉所部授之留從效引兵還泉州謂唐戍將曰泉州與福州世為仇敵南接嶺海瘴癘之鄉地險土瘠比年軍旅屢興農桑廢業冬徴夏歛僅能自贍豈勞大軍乆戍於此置酒餞之戍將不得已引兵歸唐主不能制加從效檢校太傅張筠余安皆還錢唐吳越王弘佐遣東南安撫使鮑修讓將兵戍福州唐主以矯詔敗軍皆陳覺馮延魯之罪夏四月壬申詔赦諸將議斬二人以謝中外御史中丞江文蔚對仗彈馮延已魏岑曰陛下踐阼以來所信任者延已延魯岑覺四人而已皆隂狡弄權壅蔽聰明排斥忠良引用羣小諫争者逐竊議者刑上下相䝉道路以目今覺延魯雖伏辜而延已岑猶在本根未殄枝幹復生同罪異誅人心疑惑又曰上之視聽惟在數人雖日接羣臣終成孤立又曰在外者握兵居中者當國又曰岑覺延魯更相違戾彼前則我却彼東則我西天生五材國之利器一旦為小人忿爭妄動之具又曰征討之柄在岑折簡帑藏取與繫岑一言唐主以文蔚所言為太過怒貶江州司士㕘軍械送覺延魯至金陵宋齊丘以嘗薦覺使福州上表待罪詔流覺於蘄州延魯於舒州知制誥㑹稽徐鉉史館修撰韓熈載土疏曰覺延魯罪不容誅但齊丘延已為之陳請故陛下赦之擅興者不罪則疆埸有生事者矣喪師者獲存則行陳無效死者矣請行顯戮以重軍威不從中書侍郎同平章事馮延已罷為太弟少保貶魏岑為太子洗馬韓熈載屢言宋齊丘黨與必為禍亂齊丘奏熈載嗜酒猖狂貶和州司士㕘軍秋七月李達以其弟通知福州留後自詣錢唐見吳越王弘倧弘倧承制加達兼侍中更其名曰孺贇既而孺贇悔懼以金筍二十株及雜寳賂内牙統軍使胡進思求歸福州進思為之請弘倧從之冬十二月威武節度使李孺贇與吳越戍將鮑脩讓不協謀襲殺脩讓復以福州降唐脩讓覺之引兵攻府第是日殺孺贇夷其族己酉鮑脩讓傳李孺贇首至錢塘吳越王弘倧以丞相山隂吳程知威武節度事是嵗唐主以羽林大將軍王延政為安化節度使鄱陽王鎮饒州劉氏據廣州唐昭宗乾寧元年冬十二月封州刺史劉謙卒子隠居喪於賀江土民百餘人謀亂隠一夕盡誅之嶺南節度使劉崇龜召補右都押牙兼賀水鎮使未幾表為封州刺史二年秋七月以薛王知柔為清海軍節度使三年冬十二月清海節度使薛王知柔行至湖南廣州牙將盧琚譚弘玘據境拒之使弘玘守端州弘玘結封州刺史劉隠許妻以女隠偽許之託言親迎伏甲舟中夜入端州斬弘玘遂襲廣州斬琚具軍容迎知柔入視事知柔表隱為行軍司馬光化元年冬十二月韶州刺史曽衮舉兵攻廣州州將王瓌帥戰艦應之清海行軍司馬劉隠一戰破之韶州將劉潼復據湞浛隠討斬之五年秋九月以太保門下侍郎徐彦若充清海軍節度使代薛王知柔天復元年冬十二月清海節度使徐彦若薨遺表薦行軍司馬劉隠權留後二年䖍州刺史盧光稠攻嶺南陷韶州使其子延昌守之進圍潮州清海留後劉隠發兵擊走之乗勝進攻韶州隠弟陟以爲延昌有䖍州之援未可據取隠不從遂圍韶州㑹江漲餽運不繼光稠自䖍州引兵救之其將譚全播伏精兵萬人於山谷以羸弱挑戰大破隠于城南隠犇還全播悉以功讓諸將光稠益賢之天祐元年初清海節度使徐彦若遺表薦副使劉隠權留後朝廷以兵部尚書崔逺為清海節度使逺至江陵聞嶺南多盜且畏隠不受代不敢前朝廷召逺還隠遣使以重賂結朱全忠乃奏以隠爲清海節度使昭宣帝天祐二年春三月加清海節度使劉隠同平章事後梁太祖開平元年夏五月己卯加劉隠兼侍中仍以隠為大彭王二年冬十月辛酉以劉隠為清海靜海節度使以膳部郎中趙光裔右補闕李殷衡充官告使隠皆留之光裔光逢之弟殷衡徳裕之孫也三年夏四月庚子以劉隠為南平王乾化元年春三月清海靜海節度使兼中書令南平襄王劉隠病亟表其弟節度副使巖權知留後丁亥卒巖襲位夏四月甲辰以清海留後劉巖為節度使巖多延中國士人置於幕府出為刺史刺史無武人冬十二月癸亥以靜江行軍司馬姚彦章為寧逺節度副使權知容州從楚王殷之請也劉巖遣兵攻容州殷遣都指揮使許徳勲以桂州兵救之彦章不能守乃遷容州士民及其府藏犇長沙巖遂取容管及髙州均王乾化三年冬十月嶺南節度使劉巖求昏于楚楚王許以女妻之貞明元年秋八月劉巖逆婦于楚楚王殷遣永順節度使存逆之是嵗清海建武節度使兼中書令劉巖以吳越主鏐為國王而已獨為南平王表求封南越王及加都統帝不許巖謂僚屬曰今中國紛紛孰為天子安能梯航萬里逺事偽庭乎由是貢使遂絶三年秋八月癸巳清海建武節度使劉巖即皇帝位於畨禺國號大越大赦改元乾亨以梁使趙光裔為兵部尚書節度副使楊洞濳為兵部侍郎節度判官李殷衡為禮部侍郎竝同平章事建三廟追尊祖安仁曰太祖文皇帝父謙曰代祖聖武皇帝兄隠曰烈宗襄皇帝以廣州為興王府冬十月越主巖遣客省使劉瑭使於吳告即位且勸吳王稱帝四年冬十一月越主巖祀南郊大赦改國號曰漢五年春正月漢主巖立越國夫人馬氏爲皇后殷之女也秋九月丙寅詔削劉巖官爵命吳越王鏐討之鏐雖受命竟不行六年冬十二月漢主巖遣使通好于蜀後唐莊宗同光三年漢主聞帝滅梁而懼遣宫苑使何詞入貢且覘中國彊弱二月甲申詞至魏及還言帝驕淫無政不足畏也漢主大悦自是不復通中國冬十二月有白龍見於漢宫漢主改元白龍更名曰龔明宗天成三年春三月楚大舉水軍擊漢圍封州漢主以周易筮之遇大有於是大赦改元大有命左右街使蘇章將神弩三千戰艦百艘救封州章至賀江沈鐵絙於水兩岸作巨輪挽絙築長堤以隠之伏壯士於堤中章以輕舟逆戰陽不利楚人逐之入堤中挽輪舉絙楚艦不能進退以彊弩夾水射之楚兵大敗解圍遁去漢主以章為封州團練使長興元年秋九月漢主遣其將梁克貞李守鄘攻交州拔之執靜海節度使曲承美以歸以其將李進守交州二年愛州將楊廷藝養假子三千人圖復交州漢交州守將李進知之受其賂不以聞是嵗廷藝舉兵圍交州漢主遣承㫖程寳將兵救之未至城陷進逃歸漢主殺之寳圍交州建藝出戰寳敗死三年漢主立其子耀樞為雍王龜圖為康王弘度為賔王弘熈為晉王弘昌為越王弘弼為齊王弘雅為韶王弘澤為鎮王弘操為萬王弘杲為循王弘暐為思王弘邈為髙王弘簡為同王弘建為益王弘濟為辯王弘道為貴王弘照為宜王弘政為通王弘益為定王未幾徙弘度為秦王潞王清泰元年漢主命判六軍秦王弘度募宿衛兵千人皆市井無賴子弟弘度昵之同平章事楊洞潜諫曰秦王國之冢嫡宜親端士使之治軍已過矣况昵羣小乎漢主曰小兒教以戎事過煩公憂終不戒弘度洞潜出見衛士掠商人金帛商人不敢訴歎曰政亂如此安用宰相因謝病歸第乆之不召遂卒後晉髙祖天福二年春三月漢主以疾愈大赦四年漢門下侍郎同平章事趙光裔言於漢主曰自馬后崩未嘗通使於楚親鄰舊好不可忘也因薦諫議大夫李紓可以將命漢主從之楚亦遣使報聘光裔相漢二十餘年府庫完實邊境無虞及卒漢主復以其子翰林學士承㫖尚書左丞損為門下侍郎同平章事五年漢門下侍郎同平章事趙損卒以寧逺節度使南昌王定保爲中書侍郎同平章事不踰年亦卒六年冬十二月漢主寢疾有胡僧謂漢主名龔不利漢主自造龑字名之義取飛龍在天讀若儼七年春三月漢髙祖寢疾以其子秦王弘度晉王弘熈皆驕恣少子越王弘昌孝謹有智識與右僕射兼西御院使王翷謀出弘度鎮邕州弘熈鎮容州而立弘昌制命將行㑹崇文使蕭益入問疾以其事訪之益曰立嫡以長違之必亂乃止丁丑髙祖殂髙祖爲人辨察多權數好自矜大常謂中國天子為洛州刺史嶺南珍異所聚每窮奢極麗宫殿悉以金玉珠翠為飾用刑慘酷有灌鼻割舌支解刳剔炮炙烹蒸之法或聚毒蛇水中以罪人投之謂之水獄同平章事楊洞潜諫不聴末年尤猜忌以士人多為子孫計故專任宦者由是其國中宦者大盛秦王弘度即皇帝位更名玢以弘熈輔政改元光天尊母趙昭儀曰皇太妃秋八月漢塟天皇大帝于康陵廟號髙祖齊王天福八年漢殤帝驕奢不親政事髙祖在殯作樂酣飲夜與倡婦㣲行倮男女而觀之左右忤意輒死無敢諫者惟越王弘昌及内常侍畨禺吳懐恩屢諫不聽常猜忌諸弟每宴集令宦者守門羣臣宗室皆露索然後入晉王弘熈欲圖之乃盛飾聲伎娛悦其意以成其惡漢主好手搏弘熈令指揮使陳道庠引力士劉思潮譚令禋林少彊林少良何昌廷等五人習手搏於晉府漢主聞而悦之丙戌與諸王宴于長春宫觀手搏至夕罷宴漢主大醉弘熈使道庠思潮等掖漢主因拉殺之盡殺其左右明旦百官諸王莫敢入宫越王弘昌帥諸弟臨於寢殿迎弘熈即皇帝位更名晟改元應乾以弘昌爲太尉兼中書令諸道兵馬都元帥知政事循王弘杲爲副元帥參預政事陳道庠及劉思潮等皆受賞賜甚厚漢中宗既立國中議論詾詾循王弘杲請斬劉思潮等以謝中外漢主不從思潮等聞之譛弘杲謀反漢主令思潮等伺之弘杲方宴客思潮與譚令禋帥衛兵突入斬弘杲於是漢主謀盡誅諸弟以越王弘昌賢而得衆尤忌之雄武節度使齊王弘弼自以居大鎮懼禍求入朝許之冬十月漢王命韶王弘雅致仕十一月丁亥漢主祀南郊大赦改元乾和開運元年春三月漢主命中書令都元帥越王弘昌謁烈宗陵於海曲至昌華宫使盜殺之漢以戸部侍郎陳偓同平章事夏六月乙巳漢主幽齊王弘弼于私第冬十月丙午漢主毒殺鎮王弘澤于邕州二年秋八月漢主殺韶王弘雅九月漢主殺劉思潮林少彊林少良何昌延以左僕射王翷嘗與髙祖謀立弘昌出為英州刺史未至賜死内外皆懼不自保三年漢劉思潮等既死陳道庠内不自安秋九月特進鄧伸遺之漢紀道庠問其故伸曰憨獠此書有誅韓信醢彭越事宜審讀之漢主聞之族道庠及伸後漢髙祖天福十二年南漢主恐諸弟與其子爭國殺齊王弘弼貴王弘道定王弘益辨王弘濟同王弘簡益王弘建恩王弘暐宜王弘照盡殺其男納其女充後宫作離宫千餘間飾以珠寳設鑊湯鐵牀刳剔等刑號生地獄嘗醉戯以瓜置樂工之頸試劒遂斷其頭乾祐元年秋八月南漢主遣知制誥宣化鍾允章求昏於楚楚王希廣不許南漢主怒問允章馬公復能經略南土乎對曰馬氏兄弟方爭亡於不暇安能害我南漢主曰然希廣懦而吝嗇其士卒忘戰日乆此乃吾進取之秋也冬十二月辛巳南漢主以内常侍吳懐恩為開府儀同三司西北面招討使將兵擊楚攻賀州楚王希廣遣決勝指揮使徐知新等將兵五千救之未至南漢人已㧞賀州鑿大穽於城外覆以竹箔加土下施機軸自塹中穿穴通穽中知新等至引兵攻城南漢遣人自穴中發機楚兵悉陷南漢出兵從而擊之楚兵死者以千數知新等遁歸希廣斬之南漢兵復陷昭州隠帝乾祐三年南漢主以宫人盧瓊仙黄瓊芝為女侍中朝服冠帶參決政事宗室勲舊誅戮殆盡惟宦官林延遇等用事後周太祖廣順元年冬十二月南漢主遣内侍省丞潘崇徹將軍謝貫將兵攻郴州唐邊鎬發兵救之崇徹敗唐兵於義章遂取郴州三年秋九月南漢主立其子繼興為衛王璇興為桂王慶興為荆王保興為楨王崇興為梅王南漢大赦顯徳元年夏四月南漢主以髙王弘邈為雄武節度使鎮邕州弘邈以齊鎮二王相繼死於邕州固辭求宿衛不許至鎮委政僚佐日飲酒禱鬼神或上書誣弘邈謀作亂戊午南漢主遣甘泉宫使林延遇賜酖殺之世宗顯徳二年夏六月戊午南漢主殺禎州節度使通王弘政於是髙祖之諸子盡矣三年春三月南漢甘泉宫使林延遇隂險多計䇿南漢主倚信之誅滅諸弟皆延遇之謀也乙未卒國人相賀延遇病甚薦内給事龔澄樞自代南漢主即日擢澄樞知承宣院及内侍省澄樞畨禺人也四年南漢主聞唐屢敗憂形於色遣使入貢于周爲湖南所閉乃治戰艦修武備既而縱酒酣飲曰吾身得免幸矣何暇慮後世哉取淮南時世宗五年秋八月辛巳南漢中宗殂長子衛王繼興即帝位更名鋹改元大寳鋹年十六國事皆決於宦官玉清宫使龔澄樞及女侍中盧瓊仙等臺省官備位而已冬十一月南漢塟文武光明孝皇帝于昭陵廟號中宗六年冬十月南漢主以中書舍人鍾允章藩府舊僚擢為尚書右丞參政事甚委任之允章請誅亂法者數人以正綱紀南漢主不能從宦官聞而惡之南漢主將祀圜丘前三日允章帥禮官登壇四顧指揮設神位内侍監許彦真望之曰此謀反也即帶劒登壇允章叱之彦真馳入宫告允章欲於郊祀日作亂南漢主曰朕待允章厚豈有此邪玉清宫使龔澄樞内侍監李托等共證之以彦真言為然乃收允章繫含章樓下命宦者與禮部尚書薛用丕雜治之用丕素與允章善告以必不免允章執用丕手泣曰老夫今日猶机上肉耳分為仇人所烹但恨邕昌幼不知吾冤及其長也公為我語之彦真聞之罵曰反賊欲使其子報仇邪復白南漢主允章與二子共登壇濳有所禱俱斬之自是宦官益横李托封州人也辛亥南漢主祀圎丘大赦未幾以龔澄樞為左龍虎觀軍容使内太師軍國之事皆取决焉凡羣臣有才能及進士狀頭或僧道可與談者皆先下蠶室然後得進亦有自宫以求進者亦有免死而官者由是宦者近二萬人貴顯用事之人大抵皆宦者也謂士人為門外人不得預事卒以此亡國髙氏據荆南唐昭宗天復二年秋九月朱全忠表親從指揮使髙季昌為宋州團練使季昌硤石人本朱友恭之僕夫也天祐三年冬十月武貞節度使雷彦恭屢冦荆南留後賀瓌閉城自守朱全忠以為怯以頴州防禦使髙季昌代之又遣駕前指揮使倪可福將兵五千戍荆南以備吳蜀朗兵引去後梁太祖開平元年夏五月癸未以權荆南留後髙季昌爲節度使荆南舊統八州乾符以來冦亂相繼諸州皆爲鄰道所據獨餘江陵季昌到官城邑殘毁戸口彫耗季昌安集流散民皆復業六月武貞節度使雷彦恭㑹楚兵攻江陵氏據湖事見馬南二年夏四月淮南遣其將李厚將水軍萬五千趣荆南髙季昌逆戰敗之於馬頭冬十月依政進士梁震唐末登第至是歸蜀過江陵髙季昌愛其才識留之欲奏爲判官震恥之欲去恐及禍乃曰震素不慕榮宦明公不以震爲愚必欲使之參謀議但以白衣侍樽爼可也何必在幕府季昌許之震終身止稱前進士不受髙氏辟署季昌甚重之以為謀主呼曰先輩乾化二年髙季昌濳有據荆南之志乃奏築江陵外郭増廣是嵗髙季昌出兵聲言助梁伐晉進攻襄州山南東道節度使孔勍擊敗之自是朝貢路絶勍兖州人也均王乾化三年秋八月賜髙季昌爵勃海王九月髙季昌造戰艦五百艘治城塹繕器械為攻守之具招聚亡命交通吳蜀朝廷浸不能制四年春正月髙季昌以蜀䕫萬忠涪四州舊隷荆南興兵取之先以水軍攻䕫州時鎮江節度使兼侍中嘉王宗壽鎮忠州䕫州刺史王成先請甲宗壽但以白布袍給之成先帥之逆戰季昌縱火船焚蜀浮橋招討副使張武舉鐵絙拒之船不得進㑹風反荆南兵焚溺死者甚衆季昌乗戰艦䝉以牛革飛石中之折其尾季昌易小舟以遁荆南兵大敗俘斬五千級成先宻遣人奏宗壽不給甲之狀宗壽獲之召成先斬之貞明三年髙季昌與孔勍修好復通貢獻五年夏五月楚人攻荆南髙季昌求救于吳吳命鎮南節度使劉信等帥洪吉撫信步兵自瀏陽趣渾州武昌節度使李簡等帥水軍攻復州信等至潭州東境楚兵釋荆南引歸簡等入復州執其知州鮑唐龍徳元年冬十二月髙季昌遣都指揮使倪可福以卒萬人修江陵外郭季昌行視責功程之慢杖之季昌女為可福子知進婦季昌謂其女曰歸語汝舅吾欲威衆辦事耳以白金數百兩遺之後唐莊宗同光元年荆南節度使髙季昌聞帝滅梁避唐廟諱更名季興欲自入朝梁震曰唐有吞天下之志嚴兵守險猶恐不自保况數千里入朝乎且公朱氏舊將安知彼不以仇敵相遇乎季興不從十一月己未加髙季興守中書令時髙季興入朝上待之甚厚髙季興在洛陽帝左右伶官求貨無厭季興忿之帝欲留季興郭崇韜諫曰陛下新得天下諸侯不過遣子弟將佐入貢惟髙季興身自入朝當襃賞以勸來者乃羈留不遣棄信虧義沮四海之心非計也乃遣之季興倍道而去至許州謂左右曰此行有二失來朝一失縱我去一失過襄州節度使孔勍留宴中夜斬關而去十二月丁酉至江陵握梁震手曰不用君言幾不免虎口二年春三月丙午加髙季興兼尚書令進封南平王三年冬十月髙季興常欲取三峽畏蜀峽路招討使張武威名不敢進至是乗唐兵勢使其子行軍司馬從誨權軍府事自將水軍上峽取施州張武以鐵鏁斷江路季興遣勇士乗舟斫之㑹風大起舟絓於鏁不能進退矢石交下壊其戰艦季興輕舟遁去既而聞北路陷敗䕫忠萬三州遣使詣魏王降宗滅蜀是歳莊明宗天成元年夏四月梁震薦前陵州判官貴平孫光憲於季興使掌書記季興大治戰艦欲攻楚光憲諫曰荆南亂離之後賴公休息士民始有生意若又與楚國交惡它國乗吾之弊良可憂也季興乃止六月髙季興表求䕫忠萬三州為屬郡詔許之二年春二月髙季興既得三州請朝廷不除刺史自以子弟為之不許及䕫州刺史潘炕罷官季興輙遣兵突入州城殺戍兵而據之朝廷除奉聖指揮使西方鄴為刺史不受又遣兵襲涪州不克魏王繼岌遣押牙韓珙等部送蜀珍貨金帛四十萬浮江而下季興殺珙等於峽口盡掠取之朝廷詰之對曰珙等舟行下峽涉數千里欲知覆溺之故自宜按問水神帝怒壬寅制削奪季興官爵以山南東道節度使劉訓為南面招討使知荆南行府事忠武節度使夏魯竒為副招討使將步騎四萬討之東川節度使董璋充東南面招討使新䕫州刺史西方鄴副之將蜀兵下峽仍㑹湖南軍三面進攻三月劉訓兵至荆南楚王殷遣都指揮使許徳勲等將水軍屯岳州髙季興堅壁不戰求救於吳吳人遣水軍援之江陵卑濕復值久雨糧道不繼將士疾疫劉訓亦寢疾四月癸卯帝遣樞宻使孔循往視之且審攻戰之宜五月孔循至江陵攻之不克遣人入城説髙季興季興不遜丙寅遣使賜湖南行營夏衣萬襲丁卯又遣使賜楚王殷鞍馬玉帶督饋糧於行營竟不能得庚午詔劉訓等引兵還楚王殷遣中軍使史光憲入貢帝賜之駿馬十美女二過江陵髙季興執光憲而奪之且請舉鎮自附於吳徐温曰為國者當務實效而去虚名髙氏事唐乆矣洛陽去江陵不逺唐人步騎襲之甚易我以舟師泝流救之甚難夫臣人而弗能救使之危亡能無愧乎乃受其貢物辭其稱臣聽其自附於唐六月西方鄴敗荆南水軍於峽中復取䕫忠萬三州秋七月丙寅升䕫州為寧江軍以西方鄴為節度使癸酉以與髙季興䕫忠萬三州為豆盧革韋説之罪皆賜死三年春三月楚王殷如岳州遣六軍使袁詮副使王環監軍馬希贍將水軍擊荆南髙季興以水軍逆戰至劉郎洑希瞻夜匿戰艦數十艘於港中詰旦兩軍合戰希瞻出戰艦横擊之季興大敗俘斬以千數進逼江陵季興請和歸史光憲于楚軍還楚王殷讓環不遂取荆南環曰江陵在中朝及吳蜀之間四戰之地也宜存之以為吾扞蔽殷悦夏六月辛巳髙季興復請稱藩于吳吳進季興爵秦王帝詔楚王殷討之殷遣許徳勲將兵攻荆南以其子希範為監軍次沙頭季興從子雲猛指揮使從嗣單騎造楚壁請與希範挑戰決勝副指揮使廖匡齊出與之鬪拉殺之季興懼明日請和徳勲還匡齊贛人也秋九月辛巳荆南敗楚兵于白田執楚岳州刺史李廷規歸于吳己亥以武寧節度使房知温兼荆南行營招討使知荆南行府事分遣中使發諸道兵赴襄陽以討髙季興冬十二月荆南節度使髙季興寢疾命其子行軍司馬忠義節度使同平章事從誨權知軍府事丙辰季興卒吳主以從誨為荆南節度使兼侍中四年夏四月丙午楚六軍副使王環敗荆南兵于石首髙季興之叛也其子從誨切諫不聽從誨既襲位謂僚佐曰唐近而吳逺捨近臣逺非計也乃因楚主殷以謝罪於唐又遺山南東道節度使安元信書求保奏復修職貢丙申元信以從誨書聞帝許之六月庚申髙從誨自稱前荆南行軍司馬歸州刺史上表求内附秋七月甲申以從誨為荆南節度使兼侍中己丑罷荆南招討使長興元年春三月髙從誨遣使奉表詣吳告以墳墓在中國恐為唐所討吳兵援之不及謝絶之吳遣兵擊之不克三年春二月賜髙從誨爵渤海王潞王清泰元年春正月壬辰以荆南節度使髙從誨為南平王二年荆南節度使髙從誨性明逺親禮賢士委任梁震以兄事之震常謂從誨為郎君楚王希範好奢靡㳺談者共誇其盛從誨謂僚佐曰如馬王可謂大丈夫矣孫光憲對曰天子諸侯禮有等差彼乳臭子驕侈僭汰取快一時不爲逺慮危亡無日又足慕乎從誨乆而悟曰公言是也它日謂梁震曰吾自念平生奉養固已過矣乃捐去玩好以經史自娛省刑薄賦境内以安梁震曰先王待我如布衣交以嗣王屬我今嗣王能自立不墜其業吾老矣不復事人矣遂固請退居從誨不能留乃爲之築室於土洲震披鶴氅自稱荆臺隠士每詣府跨黄牛至聽事從誨時過其家四時賜與甚厚自是悉以政事屬孫光憲臣光曰孫光憲見微而能諫髙從誨聞善而能徙梁震成功而能退自古有國家者能如是夫何亡國敗家喪身之有後晉髙祖天福六年山南東道節度使安從進謀反求援於荆南髙從誨遺從進書諭以禍福從進怒反誣奏從誨荆南行軍司馬王保義勸從誨具奏其狀且請發兵助朝廷討之從誨從之後漢髙祖天福十二年春正月荆南節度使髙從誨遣使入貢於契丹契丹遣使以馬賜之從誨亦遣使詣河東勸進夏六月帝遣使告諭荆南髙從誨上表賀且求郢州帝不許及加恩使至拒而不受秋九月髙從誨聞杜重威叛發水軍數千襲襄州山南東道節度使安審琦擊却之又冦郢州刺史尹實大破之乃絶漢附于唐蜀初荆南介居湖南嶺南福建之間地狹兵弱自武信王季興時諸道入貢過其境者多掠奪其貨幣及諸道移書詰讓或加以兵不得已復歸之曽不為愧及從誨立唐晉契丹漢更據中原南漢閩吳蜀皆稱帝從誨利其賜予所向稱臣諸國賤之謂之髙無賴乾祐元年夏六月髙從誨既與漢絶北方商旅不至境内貧乏乃遣使上表謝罪乞修職貢詔遣使慰撫之冬十一月荆南節度使兼中書令南平文獻王髙從誨寢疾以其子節度副使髙保融判内外兵馬事癸卯從誨卒保融知留後十二月丁丑以髙保融為荆南節度使同平章事隠帝乾祐二年冬十月丙戌加荆南節度使髙保融兼侍中徐氏簒吳唐昭宗乾寧二年楊行宻之拔濠州也軍士掠得徐州人李氏之子生八年矣行宻養以為子行宻長子渥憎之行宻謂其將徐温曰此兒質狀性識頗異於人吾度渥必不能容今賜汝為子温名之曰知誥知誥事温勤孝過於諸子嘗得罪於温温笞而逐之及歸知誥迎拜於門温問何故猶在此知誥泣對曰人子捨父母將何之父怒而歸母人情之常也温以是益愛之使掌家事家人無違言及長喜書善射識度英偉行宻常謂温曰知誥俊傑諸將子皆不及也天祐元年楊行宻以其子牙内諸軍使渥為宣州觀察使右牙都指揮使徐温謂渥曰王寢疾而嫡嗣出藩此必姦臣之謀佗日相召非温使者及王令書慎無亟來渥泣謝而行昭宣帝天祐二年楊行宻長子宣州觀察使渥素無令譽軍府輕之行宻寢疾命節度判官周隠召渥隠性惷直對曰宣州司徒輕易信讒喜擊毬飲酒非保家之王餘子皆幼未能駕馭諸將廬州刺史劉威從王起細微必不負王不若使之權領軍府俟諸子長以授之行宻不應左右牙指揮使徐温張顥言於行宻曰王平生出萬死冒矢石為子孫立基業安可使它人有之行宻曰吾死瞑目矣隠舒州人也它日將佐問疾行宻目留幕僚嚴可求衆出可求曰王若不諱如軍府何行宻曰吾命周隠召渥今忍死待之可求與徐温詣隠隠未出見牒猶在案上可求即與温取牒遣使者如宣州召之可求同州人也冬十月楊渥至廣陵辛丑楊行宻承制以渥為淮南留後十一月庚辰吳武忠王楊行宻薨將佐共請宣諭使李儼承制授楊渥淮南節度使東南諸道行營都統兼侍中弘農郡王三年夏四月鎮南節度使鍾傳以養子延規為江州刺史傳薨軍中立其子匡時為留後延規恨不得立遣使降淮南楊渥以昇州刺史秦裴為西南行營都招討使將兵擊鍾匡時於江西秋七月秦裴至洪州軍于蓼州諸將請阻水立寨裴不從鍾匡時果遣其將劉楚據之諸將以咎裴裴曰匡時驍將獨楚一人耳若帥衆守城不可猝拔吾故以要害誘致之耳未幾裴破寨執楚遂圍洪州饒州刺史唐寶請降九月秦裴拔洪州虜鍾匡時等五千人以歸楊渥自兼鎮南節度使以裴為洪州制置使後梁太祖開平元年春正月淮南節度使兼侍中東面諸道行營都統弘農王楊渥既得江西驕侈益甚謂節度判官周隠曰君賣人國家何面復相見遂殺之由是將佐皆不自安黒雲都指揮使吕師周與副指揮使綦章將兵屯上髙師周與湖南戰屢有功渥忌之師周懼謀於綦章曰馬公寛厚吾欲逃死焉可乎章曰兹事君自圖之吾舌可斷不敢泄師周遂犇湖南章縱其孥使逸去師周揚州人也渥居䘮晝夜酣飲作樂然十圍之燭以擊毬一燭費錢數萬或單騎出遊從者犇走道路不知所之左右牙指揮使張顥徐温泣諫渥怒曰汝謂我不才何不殺我自爲之二人懼渥選壯士號東院馬軍廣署親信爲將吏所署者恃勢驕横陵蔑勲舊顥温濳謀作亂渥父行宻之世有親軍數千營於牙城之内渥遷出於外以其地爲射場顥温由是無所憚渥之鎮宣州也命指揮使朱思勍范思從陳璠將親兵三千及嗣位召歸廣陵顥温使三將從秦裴擊江西因戍洪州誣以謀叛命别將陳祐往誅之祐間道兼行六日至洪州微服懐短兵徑入秦裴帳中裴大驚祐告之故乃召思勍等飲酒祐數思勍等罪執而斬之渥聞三將死益忌顥温欲誅之丙戌渥晨視事顥温帥牙兵二百露刃直入庭中渥曰爾果欲殺我邪對曰非敢然也欲誅王左右亂政者耳因數渥所親信十餘人之罪曳下以鐵撾擊殺之謂之兵諫諸將不與之同者顥温稍以法誅之於是軍政悉歸二人渥不能制二年夏五月淮南左牙指揮使張顥右牙指揮使徐温專制軍政弘農威王心不能平欲去之而未能二人不自安共謀弑王分其地以臣於梁戊寅顥遣其黨紀祥等弑王於寢室詐云暴薨己卯顥集將吏於府廷夾道及庭中堂上皆列白刃令諸將悉去衛從然後入顥厲聲問曰嗣王已薨軍府誰當主之三問莫應顥氣色益怒幕僚嚴可求前宻啓曰軍府至大四境多虞非公主之不可然今日則恐太速顥曰何謂速也可求曰劉威陶雅李遇李簡皆先王之等夷公今自立此曹肯為公下乎不若立幼主輔之諸將孰敢不從顥黙然乆之可求因屏左右急書一紙置袖中麾同列詣使宅賀衆莫測其所為既至可求跪讀之乃太夫人史氏教也大要言先王創業艱難嗣王不幸早世隆演次當立諸將宜無負楊氏善輔導之辭㫖明切顥氣色皆沮以其義正不敢奪遂奉威王弟隆演稱淮南留後東面諸道行營都統既罷副都統朱瑾詣可求所居曰瑾年十六七即横戈躍馬衝犯大敵未嘗畏懾今日對顥不覺流汗公面折之如無人乃知瑾匹夫之勇不及公逺矣因以兄事之張顥以徐温為浙西觀察使鎮潤州嚴可求説温曰公捨牙兵而出外藩顥必以弑君之罪歸公温驚曰然則奈何可求曰顥剛愎而暗於事公能見聽請為公圖之時副使李承嗣參預軍府之政可求又説承嗣曰顥凶威如此今出徐於外意不徒然恐亦非公之利承嗣深然之可求往見顥曰公出徐公於外人皆言公欲奪其兵權而殺之多言亦可畏也顥曰右牙欲之非吾意也業已行矣奈何可求曰止之易耳明日可求邀顥及承嗣俱詣温可求瞋目責温曰古人不忘一飯之恩况公楊氏宿將今幼嗣初立多事之時乃求自安於外可乎温謝曰茍諸公見容温何敢自專由是不行顥知可求隂附温夜遣盜刺之可求知不免請為書辭府主盜執刀臨之可求操筆無懼色盜能辨字見其辭㫖忠壯曰公長者吾不忍殺掠其財以復命曰捕之不獲顥怒曰吾欲得可求首何用財為温與可求謀誅顥可求曰非鍾泰章不可泰章者合肥人時為左監門衛將軍温使親將彭城翟䖍告之泰章聞之喜宻結壯士三十人夜刺血相飲為誓丁亥旦直入斬顥於牙堂并其親近温始暴顥弑君之罪轘紀祥等於市詣西宫白太夫人太夫人恐懼大泣曰吾兒沖幼禍難如此願保百口歸廬州公之恵也温曰張顥弑逆不可不誅夫人宜自安初顥與温謀弑威王温曰參用左右牙兵必不一不若獨用吾兵顥不可温曰然則獨用公兵顥從之至是窮治逆黨皆左牙兵也由是人以温為實不知謀也隆演以温為左右牙都指揮使軍府事咸取決焉以嚴可求為揚州司馬温性沈毅自奉簡儉雖不知書使人讀獄訟之辭而決之皆中情理先是張顥用事刑戮酷濫縱親兵剽奪市里温謂嚴可求曰大事已定吾與公輩當力行善政使人解衣而寢耳乃立法度禁彊暴政舉大綱軍民安之温以軍旅委可求以財賦委支計官駱知祥皆稱其職淮南謂之嚴駱秋七月壬申淮南將吏請於李儼承制授楊隆演淮南節度使東面諸道行營都統同平章事弘農王鍾泰章賞薄泰章未嘗自言後踰年因醉與諸將爭言而及之或告徐温以泰章怨望請誅之温曰是吾過也擢為滁州刺是嵗弘農遣軍將萬全感齎書間道詣晉及岐告以嗣位三年春二月徐温以金陵形勝戰艦所聚乃自以淮南行軍副使領昇州刺史留廣陵以其假子元從指揮使知誥為昇州防遏兼樓舩副使往治之四年春二月萬全感自岐歸廣陵岐王承制加弘農王兼中書令嗣吳王乾化二年春三月吳鎮南節度使劉威歙州觀察使陶雅宣州觀察使李遇常州刺史李簡皆武忠王舊將有大功以徐温自牙將秉政内不能平李遇尤甚常言徐温何人吾未嘗識面一旦乃當國邪館驛使徐玠使於吳越道過宣州温使玠説遇入見新王遇初許之玠曰公不爾人謂公反遇怒曰君言遇反殺侍中者非反邪侍中謂威王也温怒以淮南節度副使王檀為宣州制置使數遇不入朝之罪遣都指揮使柴再用帥昇潤池歙兵納檀于宣州昇州副使徐知誥為之副遇不受代再用攻宣州踰月不克夏五月李遇少子為淮南牙將遇最愛之徐温執之至宣州城下示之其子啼號求生遇由是不忍戰温使典客何蕘入城以吳王命説之曰公本志果反請斬蕘以徇不然隨蕘納款遇乃開門請降温使柴再用斬之夷其族於是諸將始畏温莫敢違其命徐知誥以功遷昇州刺史知誥事温甚謹安於勞辱或通夕不解帶温以是特愛之每謂諸子曰汝輩事我能如知誥乎時諸州長吏多武夫專以軍旅為務不恤民事知誥在昇州獨選用亷吏修明政教招延四方士大夫傾家貲無所愛洪州進士宋齊丘好縱横之術謁知誥知誥竒之辟為推官與判官王令謀參軍王翃專主謀議以牙吏馬仁裕周宗曹悰爲腹心仁裕彭城人宗漣水人也吳武忠王之疾病也周隠請召劉威威由是爲帥府所忌或譖之於徐温温將討之威幕客黄訥説威曰公受謗雖深反本無狀若輕舟入覲則嫌疑皆亡矣威從之陶雅聞李遇敗亦懼與威偕詣廣陵温待之甚恭如事武忠王之禮優加官爵雅等悦服由是人皆重温訥蘇州人也温與威雅帥將吏請於李儼承制加嗣吳王隆演太師吳王以温領鎮海節度使同平章事淮南行軍司馬如故温遣威雅還鎮均王貞明元年夏四月吳徐温以其子牙内都指揮使知訓為淮南行軍副使内外馬步諸軍副使秋八月庚戌吳以鎮海節度使徐温為管内水陸馬步諸軍都指揮使兩浙都招討使守侍中齊國公鎮潤州以昇潤常宣歙池六州為巡屬軍國庶務參決如故留徐知訓居廣陵秉政四年夏六月吳内外馬步都軍使昌化節度使同平章事徐知訓驕倨淫暴威武節度使知撫州李徳誠有家妓數十知訓求之徳誠遣使謝曰家之所有皆長年或有子不足以侍貴人當更為公求少而美者知訓怒謂使者曰㑹當殺徳誠并其妻取之知訓狎侮吳王無復君臣之禮嘗與王為優自為參軍使王為蒼鶻總角弊衣執帽以從又嘗泛舟濁河王先起知訓以彈彈之又嘗賞花於禪智寺知訓使酒悖慢王懼而泣四座股栗左右扶王登舟知訓乗輕舟逐之不及以鐵檛殺王親吏將佐無敢言者父温皆不之知知訓及弟知詢皆不禮於徐知誥獨季弟知諫以兄事禮之知訓嘗召兄弟飲知誥不至知訓怒曰乞子不欲酒欲劒乎又嘗與知誥飲伏甲欲殺之知諫躡知誥足知誥陽起如厠遁去知訓以劒授左右刁彦能使追殺之彦能馳騎及於中塗舉劒示知誥而還以不及告平盧節度使同平章事諸道副都統朱瑾遣家妓通候問於知訓知訓彊欲私之瑾已不平知訓惡瑾位加已上置靜淮軍於泗州出瑾為静淮節度使瑾益恨之然外事知訓愈謹瑾有所愛馬冬貯於幄夏貯於幬寵妓有絶色知訓過别瑾瑾置酒自捧觴出寵妓使歌以所愛馬為壽知訓大喜瑾因延之中堂伏壯士於户内出妻陶氏拜之知訓答拜瑾以笏自後撃之踣地呼壯士出斬之瑾先繫二悍馬於廡下將圖知訓宻令人解縱之馬相蹄齧聲甚厲以是外人莫之聞瑾提知訓首出知訓從者數百人皆散走瑾馳入府以首示吳王曰僕已為大王除害王懼以衣鄣面走入内曰舅自為之我不敢知瑾曰婢子不足與成大事以知訓首撃柱挺劒將出子城使翟䖍等已闔府門勒兵討之乃自後踰城墜而折足顧追者曰吾為萬人除害以一身任患遂自剄徐知誥在潤州聞難用宋齊丘䇿即日引兵濟江瑾已死因撫定軍府時徐温諸子皆弱温乃以知誥代知訓執吳政沈朱瑾尸於雷塘而滅其族瑾之殺知訓也表寧節度使米志誠從十餘騎問瑾所向聞其已死乃歸宣諭使李儼貧困寓居海陵温疑其與瑾通謀皆殺之嚴可求恐志誠不受命詐稱袁州大破楚兵將吏皆入賀伏壯士於㦸門擒志誠斬之并其諸子秋七月吳徐温入朝于廣陵疑諸將皆預朱瑾之謀欲大行誅戮徐知誥嚴可求具陳徐知訓過惡所以致禍之由温怒稍解乃命網瑾骨於雷塘而塟之責知訓將佐不能匡救皆抵罪獨刁彦能屢有諫書温賞之戊戌以知誥為淮南節度行軍副使内外馬步都軍副使通判府事兼江州團練使以徐知諫權潤州團練事温還鎮金陵揔吳朝大綱自餘庶政皆決於知誥知誥悉反知訓所為事吳王盡恭接士大夫以謙御衆以寛約身以儉以吳王之命悉蠲天祐十三年以前逋税餘俟豐年乃輸之求賢才納規諫除姧猾杜請託於是士民翕然歸心雖宿將悍夫無不悦服以宋齊丘為謀主先是吳有丁口錢又計畒輸錢錢重物輕民甚苦之齊丘説知誥以為錢非耕桑所得今使民輸錢是教民棄本逐末也請蠲丁口錢自餘稅悉輸穀帛紬絹匹直千錢者當稅三千或曰如此縣官嵗失錢億萬計齊丘曰安有民富而國家貧者邪知誥從之由是江淮間曠土盡闢桑柘滿野國以富彊知誥欲進用齊丘而徐温惡之以為殿直軍判官知誥每夜引齊丘於水亭屏語常至夜分或居髙堂悉去屏障獨置大爐相向坐不言以鐵筯畫灰為字隨以匙滅去之故其所謀人莫得而知也初吳徐温自以權重而位卑説吳王曰今大王與諸將皆為節度使雖有都統之名不足相臨制請建吳國稱帝而治王不許嚴可求屢勸温以次子知詢代徐知誥知吳政知誥與駱知祥謀出可求為楚州刺史可求既受命至金陵見温説之曰吾奉唐正朔常以興復為辭今朱李方爭朱氏日衰李氏日熾一旦李氏有天下吾能北面為之臣乎不若先建吳國以繫民望温大恱復留可求參總庶政使草具禮儀知誥知可求不可去乃以女妻其子續五年吳徐温帥將吏藩鎮請吳王稱帝吳王不許夏四月戊戌朔即吳國王位大赦改元武義建宗廟社稷置百官宫殿文物皆用天子禮以金繼土臘用丑改諡武忠王曰孝武王廟號太祖威王曰景王尊母為太妃以徐温為大丞相都督中外諸軍事諸道都統鎮海寧國節度使守太尉兼中書令東海郡王以徐知誥為左僕射參政事兼知内外諸軍事仍領江州團練使以揚府左司馬王令謀為内樞使營田副使嚴可求為門下侍郎鹽鐵判官駱知祥為中書侍郎前中書舍人盧擇為吏部尚書兼太常卿掌書記殷文圭為翰林學士舘驛巡官㳺恭為知制誥前駕部貟外郎楊迢為給事中擇醴泉人迢敬之之孫也秋七月丙戌吳王立其弟濛為廬江郡公溥為丹陽郡公潯為新安郡公澈為鄱陽郡公子繼明為廬陵郡公吳廬江公濛有材氣常嘆曰我國家而為他人所有可乎徐温聞而惡之冬十月出濛為楚州團練使六年夏四月吳宣王重厚恭恪徐温父子專政王未嘗有不平之意形於言色温以是安之及建國稱制尤非所樂多沈飲鮮食遂成寢疾五月温自金陵入朝議當為嗣者或希温意言曰蜀先主謂武侯嗣子不才君宜自取温正色曰吾果有意取之當在誅張顥之初豈至今日邪使楊氏無男有女亦當立之敢妄言者斬乃以王命迎丹楊公溥監國徙溥兄濛為舒州團練使己丑宣王殂六月戊申溥即吳王位尊母王氏曰太妃龍徳元年冬十月吳徐温勸吳王祀南郊或曰禮樂未備且唐祀南郊其費巨萬今未能辦也温曰安有王者而不事天乎吾聞事天貴誠多費何為唐每郊祀啓南門灌其樞用脂百斛此乃季世奢泰之弊又安足法乎甲子吳王祀南郊配以太祖秋七月乙丑大赦加徐知誥同平章事領江州觀察使尋以江州為奉化軍以知誥領節度使徐温聞壽州團練使崔太初苛察失民心欲徴之徐知誥曰壽州邊隅大鎮徴之恐為變不若使其入朝因留之温怒曰一崔太初不能制如它人何徴為右雄武大將軍後唐莊宗同光二年冬十月吳王如白沙觀樓船更命白沙曰迎鑾鎮徐温自金陵來朝先是温以親吏翟䖍為閤門宫城武備等使使察王起居䖍防制王甚急至是王對温名雨為水温請其故王曰翟䖍父名吾諱之熟矣因謂温曰公之忠誠我所知也然翟䖍無禮宫中及宗室所須多不獲温頓首謝罪請斬之王曰斬則太過逺徙可也乃徙撫州三年夏六月吳鎭海節度判官楚州團練使陳彦謙有疾徐知誥恐其遺言及繼嗣事遺之醫藥金帛相屬於道彦謙臨終宻留書遺徐温請以所生子爲嗣明宗天成元年春三月吳以左僕射同平章事徐知誥爲侍中右僕射嚴可求兼門下侍郎同平章事二年冬十月辛丑吳大丞相都督中外諸軍事諸道都統鎮海寧國節度使兼中書令東海王徐温卒初温子行軍司馬忠義節度使同平章事知詢以其兄知誥非徐氏子數請代之執吳政温曰汝曹皆不如也嚴可求及行軍副使徐玠屢勸温以知詢代知誥温以知誥孝謹不忍也陳夫人曰知誥自我家貧賤時養之奈何富貴而棄之可求等言之不已温欲帥諸藩鎮入朝勸吳王稱帝將行有疾乃遣知詢奉表勸進因留代知誥執政知誥草表欲求洪州節度使俟旦上之是夕温凶問至乃止知詢亟歸金陵吳王贈温齊王諡曰忠武十一月庚戌吳王即皇帝位追尊孝武王曰武皇帝景王曰景皇帝宣王曰宣皇丙子吳主尊太妃王氏曰皇太后以徐知詢為諸道副都統鎮海寧國節度使兼侍中加徐知誥都督中外諸軍事十二月吳主立兄廬江公濛為常山王弟鄱陽公澈為平原王兄子南昌公珙為建安王三年春正月吳王立子璉為江都王璘為江夏王璆為宜春王宣帝子廬陵公玢為南陽王夏四月戊戌吳徙常山王濛為臨川王四年秋八月吳武昌節度使兼侍中李簡以疾求還江都癸丑卒于采石徐知詢簡壻也擅留簡親兵二千人于金陵表薦簡子彦忠代父鎮鄂州徐知誥以龍武統軍柴再用為武昌節度使知詢怒曰劉崇俊兄之親三世為濠州彦忠吾妻族獨不得邪冬十月吳諸道副都統鎮海寧國節度使兼侍中徐知詢自以握兵據上流意輕徐知誥數與知誥爭權内相猜忌知誥患之内樞宻使王令謀曰公輔政日乆挾天子以令境内誰敢不從知詢年少恩信未洽扵人無能為也知詢待諸弟薄諸弟皆怨之徐玠知知詢不可輔反持其短以附知誥吳越王鏐遺知詢金玉鞍勒器並皆飾以龍鳳知詢不以為嫌乗用之知詢典客周廷望説知詢曰公誠能捐寳貨以結朝中勲舊使皆歸心於公則彼誰與處知詢從之使廷望如江都諭意廷望與知誥親吏周宗善宻輸欵於知誥亦以知誥隂謀告知詢知詢召知誥詣金陵除父温喪知誥稱吳主之命不許周宗謂廷望曰人言侍中有不臣七事宜亟入謝廷望還以告知詢十一月知詢入朝知誥留知詢為統軍領鎮海節度使遣右雄武都指揮使柯厚徴金陵兵還江都知誥自是始專吳政知詢責知誥曰先王違世兄為人子初不臨喪可乎知誥曰爾挺劒待我我何敢往爾為人臣畜乗輿物亦可乎知詢又以廷望所言詰知誥知誥曰以爾所為告我者亦廷望也遂斬廷望壬辰吳主加尊號曰睿聖文明光孝皇帝大赦改元大和十二月吳加徐知誥兼中書令領寧國節度使知誥召知詢飲以金鍾酌酒賜之曰願弟壽千嵗知詢疑有毒引它器均之跽獻知誥曰願與兄各享五百嵗知誥變色左右顧不肯受知詢捧酒不退左右莫知所為伶人申漸髙徑前為詼諧語掠二酒合飲之懐金鍾趨出知誥宻遣人以良藥解之已腦潰而卒長興元年春三月吳主立江都王璉為太子冬十月丙辰吳左僕射同平章事嚴可求卒徐知誥以其長子大將軍景通為兵部尚書參政事知誥將出鎮金陵故也二年春二月吳徐知誥欲以中書侍郎内樞使宋齊丘為相齊丘自以資望素淺欲以退讓為髙謁歸洪州葬父因入九華山止于應天寺啓求隠居吳主下詔徵之知誥亦以書招之皆不至知誥遣其子景通自入山敦諭齊丘始還朝除右僕射致仕更命應天寺曰徴賢寺秋九月吳鎮南節度使同平章事徐知諫卒以諸道副都統鎮海節度使守中書令徐知詢代之賜爵東海郡王徐知誥之召知詢入朝也知諌豫其謀知詢遇其喪扵塗撫棺泣曰弟用心如此我亦無憾然何面見先王於地下乎十一月吳中書令徐知誥表稱輔政嵗乆請歸老金陵乃以知誥為鎮海寧國節度使鎮金陵餘官如故總録朝政如徐温故事以其子兵部尚書參政事景通為司徒同平章事知中外左右諸軍事留江都輔政以内樞使同平章事王令謀為左僕射兼門下侍郎以宋齊丘為右僕射兼中書侍郎竝同平章事兼内樞使以佐景通十二月癸亥徐知誥至金陵三年春二月吳徐知誥作禮賢院於府舍聚圖書延士大夫與孫晟及海陵陳覺談議時事秋八月吳徐知誥廣金陵城周圍二十里冬十一月吳以諸道都統徐知誥為大丞相太師加領得勝節度使知誥辭丞相太師四年夏五月吳宋齊丘勸徐知誥徙吳主都金陵知誥乃營宫城於金陵潞王清泰元年春正月吳徐知誥别治私第於金陵乙未遷居私第虚府舍以待吳吳人多不欲遷都者都押牙周宗言於徐知誥曰主上西遷公復須東行不惟勞費甚大且違衆心二月丙子吳主遣宋齊丘如金陵諭知誥罷遷都先是知誥乆有傳禪之志以吳主無失徳恐衆心不悦欲待嗣君宋齊丘亦以為然一旦知誥臨鏡鑷白髭歎曰國家安而吾老矣奈何周宗知其意請如江都微以傳禪諷吳主且告齊丘齊丘以宗先己心疾之遣使馳詣金陵手書切諌以爲天時人事未可知誥愕然後數日齊丘至請斬宗以謝吳主乃黜宗為池州副使久之節度副使李建勲行軍司馬徐玠等屢陳知誥功業宜早從民望召宗復爲都押牙知誥由是疎齊丘吳主詔徐知誥還府舍甲申金陵大火乙酉又火知誥疑有變勒兵自衛己丑復入府舍東海康王徐知詢卒夏六月吳徐知誥將受禪忌昭武節度使兼中書令臨川王濛遣人告濛藏匿亡命擅造兵器丙子降封歴陽公幽于和州命控鶴軍使王宏將兵二百衛之秋七月吳徐知誥召右僕射兼中書侍郎同平章事宋齊丘還金陵以為諸道都統判官加司空於事皆無所關預齊丘屢請退居知誥以南園給之冬十月吳主加徐知誥大丞相尚父嗣齊王九錫辭不受十一月徐知誥召其子司徒同平章事景通還金陵為鎮海寧國節度副大使諸道副都統判中外諸軍事以次子牙内馬步都指揮使海州團練使景遷為左右軍都軍使左僕射參政事留江都輔政二年春三月吳加徐景遷同平章事知左右軍事徐知誥令尚書郎陳覺輔之謂覺曰吾少時與宋子嵩論議好相詰難或吾捨子嵩還家或子嵩拂衣而起子嵩携衣笥望秦淮門欲去者數矣吾常戒門者止之吾今老矣猶未徧達時事況景遷年少當國故屈吾子以誨之耳秋七月吳潤州團練使徐知諤狎昵小人游燕廢務作列肆於牙城西躬自貿易徐知誥聞之怒召知諤左右詰責知諤懼或謂知誥曰忠武王最愛知諤而以後事傳於公往年知詢失守論議至今未息借使知諤治有能名訓兵養民於公何利知誥感悟待之加厚冬十月吳加中書令徐知誥尚父太師大丞相大元帥進封齊王備殊禮以昇潤宣池歙常江饒信海十州為齊國知誥辭尚父丞相殊禮不受後晉髙祖天福元年春正月吳徐知誥始建大元帥府以幕職分判吏戸禮兵刑工部及鹽鐵三月吳徐知誥以其子副都景通為太尉副元帥都統判官宋齊丘行軍司馬徐玠為元帥府左右司馬夏四月髙從誨遣使奉牋於徐知誥勸即帝位冬十一月癸巳吳主詔齊王徐知誥置百官以金陵府為西都十二月徐知誥以鎮南節度使太尉兼中書令李徳誠徳勝節度使兼中書令周本位望隆重欲使之帥衆推戴本曰我受先王大恩自徐温父子用事恨不能救楊氏之危又使我爲此可乎其子弘祚彊之不得已與徳誠帥諸將詣江都表吳主陳知誥功徳請行冊命又詣金陵勸進宋齊丘謂徳誠之子建勲曰尊公太祖元勲今日掃地矣於是吳宫多妖吳主曰吳祚其終乎左右曰此乃天意非人事也二年春正月吳太子璉納齊王知誥女爲妃知誥始建太廟社稷改金陵爲江寧府牙城曰宫城㕔堂曰殿以左右司馬宋齊丘徐玠爲左右丞相馬步判官周宗内樞判官黟人周廷玉爲内樞使自餘百官皆如吳朝之制置騎兵八軍步兵九軍二月戊子吳主使宜陽王璪如西都冊命齊王王受冊赦境内冊王妃曰王后三月吳徐知誥立子景通為王太子固辭不受追尊考忠武王温曰太祖武王妣明徳太妃李氏曰王太后壬申更名誥夏六月吳諸道副都統徐景遷卒秋七月吳同平章事王令謀如金陵勸徐誥受禪誥讓不受八月吳歷陽公濛知吳將亡甲午殺守衛軍使王宏宏子勒兵攻濛濛射殺之以徳勝節度使周本吳之勲舊引二騎詣廬州欲依之本聞濛至將見之其子弘祚固諫本怒曰我家郎君來何為不使我見弘祚合扉不聽本出使人執濛于外送江都徐誥遣使稱詔殺濛於采石追廢為悖逆庶人絶屬籍侍衛軍使郭悰殺濛妻子於和州誥歸罪於悰貶池州吳司徒門下侍郎同平章事内樞使忠武節度使王令謀老病無齒或勸之致仕令謀曰齊王大事未畢吾何敢自安疾亟力勸徐誥受禪是月吳主下詔禪位于齊李徳誠等復詣金陵帥百官勸進宋齊丘不署表九月癸丑令謀卒丙寅吳主命江夏王璘奉璽綬于齊冬十月甲申齊王誥即皇帝位于金陵大赦改元昇元國號唐追尊太祖武王曰武皇帝乙酉遣右丞相玠奉冊詣吳主稱受禪老臣誥謹拜稽首上皇帝尊號曰髙尚思玄弘古讓皇宫室乗輿服御皆如故宗廟正朔徽章服色悉從吳制丁亥立徐知證為江王徐知諤為饒王以吳太子璉領平盧節度使兼中書令封弘農公唐主宴羣臣於天泉閣李徳誠曰陛下應天順人惟宋齊丘不樂因出齊丘止徳誠勸進書唐主執書不視曰子嵩三十年舊交必不相負齊丘頓首謝己丑唐主表讓皇改東都宫殿名皆取於仙經讓皇常服羽衣習辟穀術辛卯吳宗室建安王珙等十二人皆降爵為公而加官増邑丙申以吳同平章事張延翰及門下侍郎張居詠中書侍郎李建勲竝同平章事讓皇以唐主上表致書辭之唐主表謝而不改丁酉加宋齊丘大司徒齊丘雖爲左丞相不預政事心愠懟聞制詞云布衣之交抗聲曰臣爲布衣時陛下爲刺史今日爲天子可不用老臣矣還家請罪唐主手詔謝之亦不改命乆之齊丘不知所出乃更上書請遷讓皇於它州及斥逺吳太子璉絶其昏唐主不從乙巳立王后宋氏爲皇后戊申以諸道都統判元帥府事景通爲諸道副元帥判六軍諸衛事太尉尚書令吳王十一月乙卯唐吳王景通更名璟唐主賜楊璉妃號永興公主妃聞人呼公主則流涕而辭戊午唐主立其子景遂爲吉王景達爲壽陽公以景遂爲侍中東都留守江都尹帥留司百官赴東都三年春正月唐徳勝節度使兼中書令西平恭烈王周本以不能存吳愧恨而卒丙寅唐以侍中吉王景遂參判尚書都省夏四月甲申唐宋齊丘自陳丞相不應不豫政事唐主答以省署未備吳讓皇固辭舊宫屢請徙居李徳誠等亦亟以為言五月戊午唐主改潤州牙城為丹楊宫以李建勲為迎奉讓皇使壬戌唐主以左宣威副統軍王輿為鎮海留後客省使公孫圭為監軍使親吏馬思讓為丹楊宫使徙讓皇居丹楊宫宋齊丘復自陳為左右所間唐主大怒齊丘歸第白衣待罪或曰齊丘舊臣不宜以小過棄之唐主曰齊丘有才不識大體乃命吳王璟持手詔召之六月壬午或獻毒酒方於唐主唐主曰犯吾法者自有常刑安用此為羣臣爭請改府寺州縣名有吳及楊者留守判官楊嗣請更姓羊徐玠曰陛下自應天順人事非逆取而諂邪之人專事改更咸非急務不可從也唐主然之冬十一月辛丑吳讓皇卒唐主廢朝二十七日追諡曰睿皇帝是嵗唐主徙吳王璟為齊王四年春正月唐羣臣江王知證等累表請唐主復姓李立唐宗廟乙丑唐主許之羣臣又請上尊號唐主曰尊號虚美且非古遂不受其後子孫皆踵其法不受尊號又不以外戚輔政官者不得預事皆它國所不及也二月乙亥改太祖廟號曰義祖己卯唐主為李氏考妣發哀與皇后斬衰居廬如初喪禮朝夕臨凡五十四日江王知證饒王知諤請亦服斬衰不許李建勲之妻廣徳長公主假衰絰入哭盡哀如父母之喪辛巳詔國事委齊王璟詳決惟軍旅以聞庚寅唐主更名昇詔百官議二祚合享禮辛卯宋齊丘等議以義祖居七室之東唐主命居髙祖於西室太宗次之義祖又次之皆為不祧之主羣臣言義祖諸侯不宜與髙祖太宗同享請於太廟正殿後别建廟祀之帝曰吾自幼託身義祖曏非義祖有功於呉朕安能啓此中興之業羣臣乃不敢言唐主欲祖吳王恪或曰恪誅死不若祖鄭王元懿唐主命有司考二王苗裔以吳王孫禕有功禕子峴為宰相遂祖吳王云自峴五世至父榮其名率皆有司所撰唐主又以歷十九帝三百年疑十世太少有司曰三十年為世陛下生於文徳巳五十年矣遂從之三月庚戌唐主追尊吳王恪為定宗孝靜皇帝自曽祖以下皆追廟號及諡夏四月辛巳唐主祀南郊癸未大赦通鑑紀事本末卷第三十九
