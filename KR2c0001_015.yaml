body:
  text: 江左經略中原晉成帝咸康五年春三月征西將軍庾亮欲開復中原表桓宣為都督沔北前鋒諸軍事司州刺史鎮襄陽又表其弟臨川太守懌為監梁雍二州諸軍事梁州刺史鎮魏興西陽太守翼為南蠻校尉領南郡太守鎮江陵皆假節又請解豫州以授征虜將軍毛寶詔以寶監揚州及江西諸軍事豫州刺史與西陽太守樊峻帥精兵萬人戍邾城以建威將軍陶稱為南中郎將江夏相入沔中稱將二百人下見亮亮素惡稱輕狡數稱前後罪惡收而斬之後以魏興險逺命庾懌徙屯半洲更以武昌太守陳嚻為梁州刺史趣漢中遣參軍李松攻漢巴郡江陽夏四月執漢荆州刺史李閎巴郡太守黃植送建康漢主夀以李奕為鎮東將軍代閎守巴郡庾亮上疏言蜀甚弱而胡尚強欲帥大衆十萬移鎮石城遣諸軍羅布江沔為伐趙之規帝下其議丞相導請許之太尉鑒議以為資用未備不可大舉太常蔡謨議以為時有否泰道有屈伸茍不計強弱而輕動則亡不終日何功之有為今之計莫若養威以俟時時之可否繫胡之強弱胡之強弱繫石虎之能否自石勒舉事虎常為瓜牙百戰百勝遂定中原所據之地同於魏世勒死之後虎挾嗣君誅將相內難既平翦削外寇一舉而拔金墉再戰而禽石生誅石聰如拾遺取郭權如振稿四境之內不失尺土以是觀之虎為能乎將不能也論者以胡前攻襄陽不能拔謂之無能為夫百戰百勝之強而以不拔一城為劣譬諸射者百發百中而一失可以謂之拙乎且石遇偏師也桓平北邊將也所爭者疆場之土利則進否則退非所急也今征西以重鎮名賢自將大軍欲席卷河南虎必自帥一國之衆來決勝負豈得以襄陽為比哉今征西欲與之戰何如石生若欲城守何如金墉欲阻沔水何如大江欲拒石虎何如蘇峻凡此數者宜詳校之石生猛將關中精兵征西之戰殆不能勝也金墉險固劉曜十萬衆不能拔征西之守殆不能勝也又當是時洛陽關中皆舉兵擊虎今此三鎮反為其用方之於前倍半之藝也石生不能敵其半而征西欲當莫倍愚所疑也蘇峻之疆不及石虎沔水之險不及大江大江不能禦蘇峻而欲以沔水禦石虎又所疑也昔祖士稚在譙佃於城北界胡來攻豫置軍屯以禦其外榖將熟胡果至丁夫戰於外老弱穫於內多持炬火急則燒榖而走如此數年竟不得其利當是時胡唯據河北方之於今四分之一耳士稚不能捍其一而征西欲以禦其四又所疑也然此但論征西既至之後耳尚未論道路之慮也自沔以西水急岸髙魚貫泝流首尾百里若胡無宋襄之義及我未陳而擊之將如之何今王土與胡水陸異藝便習不同胡若送死則敵之有餘若棄江逺進以我所短擊彼所長懼非廟勝之算也朝議多與謨同乃詔亮不聽移鎮秋八月南昌文成公郤鑒疾篤以府事付長史劉遐上疏乞骸骨且曰臣所統錯雜率多北人或逼遷徙或是新附百姓懷土皆有歸本之心臣宣國恩示以好惡處與田宅漸得少安聞臣疾篤衆情駭動若當北渡必啓寇心太常臣謨平簡貞正素望所歸謂可以為都督徐州刺史詔以蔡謨為太尉軍司加侍中辛酉鑒薨即以謨為征北將軍都督徐兖青三州諸軍事領徐州刺史假節時左衛將軍陳光請伐趙詔遣光攻夀陽謨上疏曰夀陽城小而固自夀陽至琅邪城壁相望一城見攻衆城必救又王師在路五十餘日前驅未至聲息久聞賊之郵驛一日千里河北之騎足以來赴夫以白起韓信項籍之勇猶發梁焚舟背水而陳今欲停船水渚引兵造城前對堅敵顧臨歸路此兵法之所誡若進攻未拔胡騎猝至懼桓子不知所為而舟中之指可掬也今光所將皆殿中精兵宜令所向有征無戰而頓之堅城之下以國之爪士擊寇之下邑得之則利薄而不足損敵失之則害重而足以益寇懼非策之長者也乃止初陶侃在武昌議者以江北有邾城宜分兵戍之侃每不答而言者不已侃乃渡水獵引將佐語之曰我所以設險而禦寇者正以長江耳邾城隔在江北內無所倚外接羣夷夷中利深晉人貪利夷不堪命必引虜入寇此乃致禍之由非禦寇也且吳時戍此城用三萬兵今縱有兵守之亦無益於江南若羯虜有可乘之會此又非所資也及庾亮鎮武昌卒使毛寶樊峻戍邾城趙王虎惡之以夔安為大都督帥石鑒石閔李農張貉李菟等五將軍兵五萬人寇荆揚北鄙二萬騎攻邾城毛寶求救於庾亮亮以城固不時遣兵九月石閔敗晉兵於沔隂殺將軍蔡懷夔安李農陷沔南朱保敗晉兵於白石殺鄭豹等五將軍張貉陷邾城死者六千人毛寶樊峻突圍出走赴江溺死夔安進據胡亭寇江夏義陽將軍黃沖義陽太守鄭進皆降於趙安進圍石城竟陵太守李陽拒戰破之斬首五千餘級安乃退遂掠漢東擁七千餘戶遷于幽冀是時庾亮猶上疏欲遷鎮石城聞邾城陷乃止上表陳謝自貶三等行安西將軍有詔復位以輔國將軍庾懌為豫州刺史監宣城廬江歷陽安豐四郡諸軍事假節鎮蕪湖六年春正月庚子朔都亭文康侯庾亮薨以護軍將軍録尚書何充為中書令庚戌以南郡太守庾翼為都督江荆司雍梁益六州諸軍事安西將軍荆州刺史假節代亮鎮武昌時人疑翼年少不能繼其兄翼悉心為治戎政嚴明數年之間公私充實人皆稱其才八年庾翼在武昌數有妖怪欲移鎮樂鄉征虜長史王述與庾冰箋曰樂鄉去武昌千有餘里數萬之衆一旦移徙興立城壁公私勞擾又江州當泝流數千里供給軍府力役增倍且武昌實江東鎮戍之中非但扞禦上流而已緩急赴告駿奔不難若移樂鄉逺在西陲一朝江渚有虞不相接救方嶽重將固當居要害之地為內外形藝使窺𨵦之心不知所向昔秦忌亡胡之讖卒為劉項之資周惡檿弧之謠而成褒姒之亂是以達人君子直道而行禳避之道皆所不取正當擇人事之勝理思社稷之長計耳朝議亦以為然翼乃止秋七月已未以何充為驃騎將軍都督徐州揚州之晉陵諸軍事領徐州刺史鎮京口避諸庾也康帝建元元年庾翼為人慷慨喜功名不尚浮華琅邪內史桓溫彞之子也尚南康公主豪爽有風槩翼與之友善相期以寧濟海內翼嘗薦溫於成帝曰桓溫有英雄之才願陛下勿以常人遇之常壻畜之宜委以方邵之任必有弘濟艱難之勳時杜乂殷浩並才名冠世翼獨弗之重也曰此輩宜束之髙閣俟天下太平然後徐議其任耳浩纍辭徴辟屏居墓所幾將七年時人擬之管葛江夏相謝尚長山令王濛常伺其出處以卜江左興亡嘗相與省之知浩有確然之志既返相謂曰深源不起當如蒼生何尚鯤之子也翼請浩為司馬詔除侍中安西軍司浩不應翼遺浩書曰王夷甫立名非真雖云談道實長華競明德君子遇會處際寧可然乎浩猶不起殷羡為長沙相在郡貪殘庾冰與翼書屬之翼報曰殷君驕豪亦似由有佳兒弟故小令物情容之大較江東之政以嫗喣豪強常為民蠹時有行法輒施之寒劣如往年偷石頭倉米一百萬斛皆是豪將輩而直殺倉督監以塞責山遐為餘姚長為官出豪強所藏二千戶而衆共驅之令遐不得安席雖皆前宰之惛謬江東事去實此之由兄弟不幸橫陷此中自不能拔足於風塵之外當共明目而治之荆州所統二十餘郡唯長沙最惡惡而不黜與殺督監者復何異邪遐簡之子也翼以滅胡取蜀為己任遣使東約燕王皓西約張駿刻期大舉朝議多以為難唯庾冰意與之同而桓溫譙王無忌皆贊成之無忌氶之子也秋七月趙汝南太守戴開帥數千人詣翼降丁巳下詔議經略中原翼欲悉所部之衆北伐表桓宣為都督同雍梁三州荆州之四郡諸軍事梁州刺史前趣丹水桓溫為前鋒小督假節帥衆入臨淮並發所統六州奴及車牛驢馬百姓嗟怨八月庾翼欲移鎮襄陽恐朝廷不許乃奏云移鎮安陸帝及朝士皆遣使譬止翼翼遂違詔北行至夏口復上表請鎮襄陽翼時有衆四萬詔加翼都督征討諸軍事先是車騎將軍楊州刺史庾冰屢求出外辛巳以冰都督荆江寧益梁交廣七州豫州之四郡諸軍事領江州刺史假節鎮武昌以為翼繼援徵徐州刺史何充為都督揚豫徐州之琅邪諸軍事領揚州刺史録尚書事輔政以琅邪內史桓溫為都督青徐兖三州諸軍事徐州刺史徴江州刺史楮裒為衛將軍領中書令二年夏四月征西將軍庾翼使梁州刺史桓宣擊趙將李羆於丹水為羆所敗翼貶宣為建威將軍宣慙憤成疾秋八月庚辰卒翼以長子方之為義城太守代領宣衆又以司馬應誕為襄陽太守參軍司馬勳為梁州刺史戍西城中書令禇裒固辭樞要閏月丁巳以裒為左將軍都督兖州徐州之琅邪諸軍事兖州刺史鎮金城秋九月帝崩穆帝即位以裒為侍中衛將軍録尚書事持節督刺史如故裒以近戚懼獲譏嫌上疏固請居藩改授都督徐兖青三州楊州之二郡諸軍事衛將軍徐兖二州刺史鎮京口冬十月江州刺史庾冰有疾太后徴冰輔政冰辭十一月庚辰卒庾翼以家國情事留子方之為建武將軍戍襄陽方之年少以參軍毛穆之為建武司馬以輔之穆之寶之子也翼還鎮夏口詔翼復督江州又領豫州刺史翼辭豫州復欲移鎮樂鄉詔不許翼仍繕修軍器大佃積榖以圖後舉穆帝永和元年春正月詔徴衛將軍禇裒欲以為楊州刺史録尚書事吏部尚書劉遐長史王胡之説裒曰會稽王令德雅望國之周公也足下宜以大政授之裒乃固辭歸藩壬戌以會稽王昱為撫軍大將軍録尚書六條事都亭肅侯庾翼疽發于背表子爰之行輔國將軍荆州刺史委以後任司馬義陽朱燾為南蠻校尉以千人守巴陵秋七月庚午卒庾翼既卒朝議皆以諸庾世在西藩人情所安宜依翼所請以庾爰之代其任何充曰荆楚國之西門戶口百萬北帶強胡西鄰徑蜀地藝險阻周旋萬里得人則中原可定失人則社稷可憂陸抗所謂存則吳存亡則吳亡者也豈可以白靣少年當之哉桓溫英略過人有文武器幹西夏之任無出溫者議者又曰庾爰之肯避溫乎如令阻兵恥懼不淺充曰溫足以制之諸君勿憂丹楊尹劉惔每竒溫才然知其有不臣之志謂會稽王昱曰溫不可使居形勝之地其位號常宜抑之勸昱自鎮上流以己為軍司昱不聽又請自行亦不聽庚辰以徐州刺史桓溫為安西將軍持節都督荆司雍益梁寧六州諸軍事領護南蠻校尉荆州刺史爰之果不敢爭又以劉惔監沔中諸軍事領義成太守代庾方之徙方之爰之于豫章桓溫嘗乘雪欲獵先過劉惔惔見其裝束甚嚴謂之曰老賊欲持此何為溫笑曰我不為此卿安得坐談乎二年春二月禇裒薦前光祿大夫顧和前司徒左長史殷浩三月丙子以和為尚書令浩為建武將軍楊州刺史和有母喪固辭不起謂所親曰古人有釋衰絰從王事者以其才足幹時故也如和者正足以虧孝道傷風俗耳識者美之浩亦固辭會稽王昱與浩書曰屬當厄運危弊理極足下沈識淹長足以經濟若復深存挹退茍遂本懷吾恐天下之事於此去矣足下去就即時之廢興則家國不異足下宜深思之浩乃就職四年夏四月會稽王昱以楊州刺史殷浩有盛名朝野推服乃引為心膂與參綜朝權欲以抗溫由是與溫寖相疑二浩以征北長史荀羡前江州刺史王羲之夙有令名擢羡為吳國內史羲之為護軍將軍以為羽翼羡㽔弟之羲之導之從子也羲之以為內外協和然後國家可安勸浩及羡不宜與溫􅌟隙浩不從五年夏六月桓溫聞趙亂出屯安陸遣諸將經營北方趙楊州刺史王浹舉夀春降西中郎將陳逵進據夀春征北大將軍禇裒上表請伐趙即日戒嚴直指泗口朝議以裒事任貴重不宜深入宜先遣偏師裒奏言前已遣前鋒督護王頥之等徑造彭城後遣督護麋嶷進據下邳今宜速發以成聲藝秋七月加裒征討大都督督徐兖青楊豫五州諸軍事裒帥衆三萬徑赴彭城北方士民降附者日以千計朝野皆以為中原指期可復光祿大夫蔡謨獨謂所親曰胡滅誠為大慶然恐更貽朝廷之憂其人曰何謂也謨曰夫能順天乘時濟羣生於艱難者非上聖與英雄不能為也自餘則莫若度德量力觀今日之事殆非時賢所及必將經營分表疲民以逞既而材略踈短不能副心財殫力竭智勇俱困安得不憂及朝廷乎魯郡民五百餘家相與起兵附晉求援於禇裒裒遣部將王龕李邁將鋭卒三千迎之趙南討大都督李農帥騎二萬與龕等戰於代陂龕等大敗皆沒於趙八月裒退屯廣陵陳逵聞之焚夀春積聚毁城遁還裒上疏乞自貶詔不許命裒還鎮京口解征討都督時河北大亂遺民二十餘萬口渡河欲來歸附會裒已還威藝不接皆不能自拔死亡略盡冬十一月都鄉元穆侯禇裒還至京口聞哭聲甚多以問左右對曰皆代陂死者之家也裒慙憤發疾十二月己酉卒以吳國內史荀羡為使持節監徐兖二州楊州之晉陵諸軍事徐州刺史時年二十八中興方伯未有如羡之少者六年春正月朝廷聞中原大亂復謀進取己丑以楊州刺史殷浩為中軍將軍假節都督楊豫徐兖青五州諸軍事以蒲洪為氐王使持節征北大將軍都督河北諸軍事冀州刺史廣川郡公蒲健為假節右將軍監河北征討前鋒諸軍事襄國公七年初桓溫聞石氏亂上疏請出師經略中原事久不報溫知朝廷杖殷浩以抗已甚忿之然素知浩之為人亦不之憚也以國無他釁遂得相持彌年雖有君臣之迹羈縻而已八州士衆資調殆不為國家用屢求北伐詔書不聽十二月辛未溫拜表輒行帥衆四五萬順流而下軍于武昌朝廷大懼殷浩欲去位以避溫又欲以騶虞幡駐溫軍吏部尚書王彪之言於會稽王昱曰此屬皆自為計非能保社稷為殿下計也若殷浩去職人情離駭天子獨坐當此之際必有任其責者非殿下而誰乎又謂浩曰彼若抗表問罪卿為之首事任如此猜釁已成欲作匹夫豈有全地邪且當靜以待之令相王與手書示以款誠為陳成敗彼必旋師若不從則遣中詔又不從乃當以正義相裁奈何無故忩忩先自猖獗乎浩曰決大事正自難頃日來欲使人悶聞卿此謀意始得了彪之彬之子也撫軍司馬髙嵩言於昱曰王宜致書諭以禍福自當返斾如其不爾便六軍整駕逆順於兹判矣乃於坐為昱草書曰寇難宜平時會宜接此實為國逺圖經略大算能弘斯會非足下而誰但以比興師動衆要當以資實為本運轉之艱古人所難不可易之於始而不熟慮頃所以深用為疑惟在此耳然異常之舉衆之所駭遊聲噂􅊱想足下亦少聞之茍患失之無所不至或能望風振擾一時崩散如此則望實並喪社稷之事去矣皆由吾暗弱德信不著不能鎮靜羣庶保固維城所以內愧于心外慙良友吾與足下雖職有內外安社稷保家國其致一也天下安危繫之明德當先思寧國而後圖其外使王基克隆大義弘著所望於足下區區誠懷豈可復顧嫌而不盡哉溫即上疏惶恐致謝回軍還鎮八年春正月尚書左丞孔嚴言於殷浩曰比來衆情良可寒心不知使君當何以鎮之愚謂宜明受任之方韓彭專征伐蕭曹守管籥內外之任各有攸司深思廉藺屈身之義平勃交歡之謀令穆然無間然後可以保大定功也觀頃日降附之徒皆人靣獸心貪而無親恐難以義感也浩不從嚴愈之從子也浩上疏請北出許洛詔許之以安西將軍謝尚北中郎將荀羡為督統進屯夀春謝尚不能撫慰張遇遇怒據許昌叛使其將上官恩據洛陽樂弘攻督護戴施於倉垣浩軍不能進三月命荀羡鎮淮隂尋加監青州諸軍事又領兖州刺史鎮下邳姚弋仲卒子襄帥衆歸晉襄單騎渡淮見謝尚于夀春尚聞其名命去仗衛幅巾待之歡若平生襄慱學善談論江東人士皆重之夏四月秦以張遇為征東大將軍豫州牧六月謝尚姚襄共攻張遇于許昌秦主健遣丞相東海王雄衛大將軍平昌王菁略地關東帥步騎二萬救之丁亥戰于潁水之誡橋尚等大敗死者萬五千人尚奔還淮南襄棄輜重送尚于芍陂尚悉以後事付襄殷浩聞尚敗退屯夀春秋七月秦丞相雄徙張遇及陳潁許洛之民五萬餘戶於關中以右衛將軍楊羣為豫州刺史鎮許昌謝尚降號建威將軍殷浩之北伐也中軍將軍王羲之以書止之不聽既而無功復謀再舉羲之遺浩書曰今以區區江左天下寒心固巳久矣力爭武功非所當作自頃處內外之任者未有深謀逺慮而疲竭根本各從所志竟無一功可論遂令天下將有土崩之藝任其事者豈得辭四海之責哉今軍破於外資竭於內保淮之志非所復及莫若還保長江督將各復舊鎮自長江以外羈縻而已引咎責躬更為善治省其賦役與民更始庶可以救倒懸之急也使君起於布衣任天下之重當董統之任而敗喪至此恐闔朝羣賢未有與人分其謗者若猶以前事為未工故復求之於分外宇宙雖廣自容何所此愚智所不解也又與會稽王昱箋曰為人臣者誰不願尊其主比隆前世況遇難得之運哉顧力有所不及豈可不權輕重而處之也今雖有可喜之會內求諸已而所憂乃重於所喜功未可期遺黎殱盡勞役無時徴求日重以區區吳越經緯天下十分之九不亡何待而不度德量力不弊不已此封內所痛心歎悼而莫敢吐誠者也往者不可諌來者猶可追願殿下更垂三思先為不可勝之基須根立藝舉謀之未晚若不行恐麋鹿之遊將不止林數而已願殿下暫廢虛逺之懷以救倒懸之急可謂以亡為存轉禍為福也不從九月浩屯泗口遣河南太守戴施據石門滎陽太守劉遁戍倉垣浩以軍興罷遣太學生徒學校由此遂廢冬十月謝尚遣冠軍將軍王俠攻許昌克之秦豫州刺史楊羣退屯弘農徴尚為給事中戍石頭九年秋七月張遇叛秦伏誅九月姚襄屯歷陽以燕秦方強未有北伐之志乃夾淮廣興屯田訓厲將士殷浩在夀春惡其強盛囚襄諸弟屢遣刺客刺之刺客皆以情告襄安北將軍魏統卒弟憬代領部曲浩潛遣憬帥衆五千襲之襄斬憬并其衆浩愈惡之使龍驤將軍劉啓守譙遷襄于梁國蠡臺表授梁國內史魏憬子弟數往來夀春襄益疑懼遣參軍權翼使於浩浩曰身與姚平北共為王臣休戚同之平北每舉動自專甚失輔車之理豈所望也翼曰平北英姿絶世擁兵數萬而逺歸晉室者以朝廷有道宰輔明哲故也今將軍輕信讒慝之言與平北有隙愚謂猜嫌之端在此不在彼也浩曰平北姿性豪邁生殺自由又縱小人掠奪吾馬王臣之體固若是乎翼曰平北歸命聖朝豈肯妄殺無辜姦宄之人亦王法所不容也殺之何害浩曰然則掠馬何也翼曰將軍謂平北雄武難制終將討之故取馬欲以自衛耳浩笑曰何至是也初浩隂遣人誘秦梁安雷弱兒使殺秦主健許以關右之任弱兒等偽許之且請兵應接浩聞張遇作亂健兄子輔國將軍黃眉自洛陽西奔以為安等事已成冬十月浩自夀春帥衆七萬北伐欲進據洛陽修復園陵吏部尚書王彪之上會稽王昱箋以為弱兒等容有詐偽浩未應輕進不從浩以姚襄為前驅襄引兵北行度浩將至詐令部衆夜遁隂伏甲以邀之浩聞而追襄至山桑襄縱兵擊之浩大敗棄輜重走保譙城襄俘斬萬餘悉收其資仗使兄益守山桑襄復如淮南會稽王昱謂王彪之曰君言無不中張陳無以過也冬十一月殷浩使部將劉啓王彬之攻姚益于山桑姚襄自淮南擊之啓彬之皆敗死襄進據芍陂十二月姚襄濟淮屯盱眙招掠流民衆至七萬分置守宰勸課農桑遣使詣建康罪狀殷浩并自陳謝詔以謝尚都督江西淮南諸軍事豫州刺史鎮歷陽十年故魏降將周成反自宛襲洛陽殷浩連年北伐師徒屢敗糧械都盡征西將軍桓溫因朝野之怨上疏數浩之罪請廢之朝廷不得已免浩為庶人徙東陽之信安自此內外大權一歸於溫矣春二月乙丑桓溫統步騎四萬發江陵水軍自襄陽入均口至南鄉步兵自浙川趣武關命司馬勳出子午道以伐秦姚襄遣使降燕三月桓溫别將攻上洛獲秦荆二州刺史郭敬進擊青泥破之司馬勳掠秦西鄙涼秦州刺史王擢攻陳倉以應溫秦主健遣太子萇丞相雄淮南王生平昌王菁北平王碩帥衆五萬軍于嶢柳以拒溫夏四月己亥溫與秦兵戰于藍田秦淮南王生單騎突陳出入以十數殺傷晉將士甚衆溫督衆力戰秦兵大敗將軍桓沖又敗秦丞相雄于白鹿原沖溫之弟也溫轉戰而前壬寅進至灞上秦太子萇等退屯城南秦主健與老弱六千固守長安小城悉發精兵三萬遣大司馬雷弱兒等與萇合兵以拒溫三輔郡縣皆來降溫撫諭居民使安堵復業民爭持牛酒迎勞男女夾路觀之耆老有垂泣者曰不圖今日復覩官軍夏五月北海王猛少好學倜儻有大志不屑細務人皆輕之猛悠然自得隱居華隂聞桓溫入關披褐詣之捫虱而談當世之務旁若無人溫異之問曰吾奉天子之命將鋭兵十萬為百姓除殘賊而三秦豪傑未有至者何也猛曰公不逺數千里深入敵境今長安咫尺而不度灞水百姓未知公心所以不至溫默然無以應徐曰江東無卿比也乃署猛軍謀祭酒溫與秦丞相雄等戰于白鹿原溫兵不利死者萬餘人初溫指秦麥以為糧既而秦人悉芟麥清野以待之溫軍乏食六月丁丑徙關中三千餘戶而歸以王猛為髙官督護欲與俱還猛辭不就呼延毒帥衆一萬從溫還秦太子萇等隨溫擊之比至潼關溫軍屢敗失亡以萬數溫之屯灞上也順陽太守薛珍勸溫徑進逼長安溫弗從珍以偏師獨濟頗有所獲及溫退乃還顯言於衆自矜其勇而咎溫之持重溫殺之秋九月桓溫還自伐秦帝遣侍中黃門勞溫于襄陽十一年夏四月姚襄所部多勸襄北還襄從之五月襄攻冠軍將軍髙季於外黃會季卒襄進據許昌冬十月以豫州刺史謝尚督并冀幽三州鎮夀春十二年春二月桓溫請移都洛陽修復園陵章十餘上不許拜征討大都督督司冀二州諸軍事以討姚襄夏四月姚襄自許昌攻周成于洛陽秋七月姚襄攻洛陽踰月不克長史王亮諌曰明公英名蓋世兵強民附今頓兵堅城之下力屈威挫或為它寇所乘此危亡之道也襄不從桓溫自江陵北伐遣督護髙武據魯陽輔國將軍戴施屯河上自帥大兵繼進與寮屬登平乘樓望中原歎曰遂使神州陸沈百年丘墟王夷甫諸人不得不任其責記室陳郡袁宏曰運有興廢豈必諸人之過溫作色曰昔劉景升有千斤大牛噉芻豆十倍於常牛負重致逺曾不若一羸牸魏武入荆州殺以享軍八月己亥溫至伊水姚襄撤圍拒之匿精鋭於水北林中遣使謂溫曰承親帥王師以來襄今奉身歸命願敕三軍小却當拜伏路左溫曰我自開復中原展敬山陵無預君事欲來者便前相見在近何煩使人襄拒水而戰溫結陳而前親𬒳甲督戰襄衆大敗死者數千人襄帥麾下數千騎奔于洛陽北山其夜民棄妻子隨襄者五千餘人襄勇而愛人雖戰屢敗民知襄所在輒扶老擕幼奔馳而赴之溫軍中傳言襄病創已死許洛士女為溫所得者無不北望而泣襄西走溫追之不及弘農楊亮自襄所來奔溫問襄之為人亮曰襄神明器宇孫䇿之儔而雄武過之周成帥衆出降溫屯故太極殿前既而徙屯金墉城己丑謁諸陵有毁壞者修復之各置陵令表鎮西將軍謝尚都督司州諸軍事鎮洛陽以尚未至留潁川太守毛穆之督護陳午河南太守戴施以二千人戍洛陽衛山陵徙降民三千餘家於江漢之間執周成以歸姚襄奔平陽秦并州刺史尹赤復以衆降襄襄遂據襄陵秦大將軍張平擊之襄為平所敗乃與平約為兄弟各罷兵冬十一月詔遣兼司空散騎常侍車灌等持節如洛陽修五陵十二月庚戌帝及羣臣皆服緦臨於太極殿三日司州都督謝尚以疾不行以丹楊尹王胡之代之未行而卒胡之廙之子也桓溫伐燕晉穆帝升平二年趙之亡也其將髙昌遣使降燕已而降晉又降秦各受爵位欲中立以自固燕主俊使司空陽騖討昌於東燕三年夏六月髙昌不能拒燕秋七月自白馬奔滎陽五年春二月髙昌卒燕河內太守吕護并其衆遣使來降拜護冀州刺史護欲引晉兵以襲鄴三月燕太宰恪將兵五萬冠軍將軍皇甫真將兵萬人共討之燕兵至野王護嬰城自守護軍將軍傅顔請急攻之以省大費恪曰老賊輕變多矣觀其守僃未易猝攻頃攻黎陽多殺精鋭卒不能拔自取困辱護內無蓄積外無救援我深溝髙壘坐而守之休兵養士離間其黨於我不勞而賊勢日蹙不過十旬取之必矣何為多殺士卒以求旦夕之功乎乃築長圍守之夏四月桓溫以其弟黃門郎豁督沔中七郡諸軍事兼新野義城二郡太守將兵取許昌破燕將慕容塵燕人圍野王數月吕護遣其將張興出戰傅顔擊斬之城中日蹙皇甫真戒部將曰護勢窮奔突必擇虛隙而投之吾所部士卒多羸器甲不精宜深為之僃乃多課櫓楯親察行夜者護食盡果夜悉精鋭趨真所部突圍不得出太宰恪引兵擊之護衆死傷殆盡棄妻子奔滎陽恪存撫降民給其廩食徙士人將帥於鄴自餘各隨所樂以護參軍廣平梁琛為中書著作郎冬十月吕護復叛奔燕燕人赦之以為廣州刺史哀帝隆和元年春正月燕豫州刺史孫興請攻洛陽曰晉將陳祐弊卒千餘介守孤城不足取也燕人從其言遣寧南將軍吕護屯河隂二月辛未以吳國內史庾希為北中郎將徐兖二州刺史鎮下邳龍驤將軍袁真為西中郎將監護豫司并冀四州諸軍事豫州刺史鎮汝南並假節希冰之子也燕吕護攻洛陽三月乙酉河南太守戴施奔宛陳祐告急五月丁巳桓溫遣庾希及竟陵太守鄧遐帥舟師三千人助祐守洛陽遐嶽之子也溫上疏請遷都洛陽自永嘉之亂播流江表者請一切北徙以實河南朝廷畏溫不敢為異而北土蕭條人情疑懼雖並知不可莫敢先諫散騎常侍領著作郎孫綽上疏曰昔中宗龍飛非惟信順協於天人實賴萬里長江畫而守之耳今自喪亂已來六十餘年河洛丘墟函夏蕭條士民播流江表已經數世存者老子長孫亡者丘隴成行雖北風之思感其素心目前之哀實為交切若遷都旋軫之日中興五陵即復𬗟成遐域泰山之安既難以理保蒸蒸之思豈不纒於聖心哉溫今此舉誠欲大覽始終為國逺圖而百姓震駭同懷危懼豈不以反舊之樂賖而趨死之憂促哉何者植根江外數十年矣一朝頓欲拔之驅踧於空荒之地提挈萬里踰險浮深離墳墓棄生業田宅不可復售舟車無從而得捨安樂之國適習亂之鄉將頓仆道塗飄溺江川僅有逹者此仁者所宜哀矜國家所宜深慮也臣之愚計以為且宜遣將帥有威名資實者先鎮洛陽掃平梁許清一河南運漕之路既通開墾之積已豐豺狼逺竄中夏小康然後可徐議遷徙耳奈何捨百勝之長理舉天下而一擲哉綽楚之孫也少慕髙尚嘗著遂初賦以見志溫見綽表不恱曰致意興公何不尋君遂初賦而知人家國事邪時朝廷憂懼將遣侍中止溫揚州刺史王述曰溫欲以虛聲威朝廷耳非事實也但從之自無所至乃詔溫曰在昔喪亂忽涉五紀戎狄肆暴繼襲凶迹眷言西顧慨歎盈懷知欲躬帥三軍蕩滌氛穢廓清中畿光復舊京非夫外身徇國孰能若此諸所處分委之髙算但河洛丘墟所營者廣經始之勤政勞懷也事果不行溫又議移洛陽鍾虡述曰永嘉不競暫都江左方當蕩平區宇旋軫舊京若其不爾宜改遷園陵不應先事鍾虡溫乃止朝廷以交廣遼逺改授溫都督并司冀三州溫表辭不受秋七月吕護退守小平津中流矢而卒燕將假崇收軍北渡屯于野王鄧遐進屯新城八月西中郎將袁真進屯汝南運衆五萬斛以饋洛陽冬十二月庾希自下邳退屯山陽袁真自汝南退屯夀陽興寧元年夏四月燕寧東將軍慕容忠攻滎陽太守劉逺逺奔魯陽五月以西中郎將袁真都督司冀并三州諸軍事北中郎將庾希都督青州諸軍事癸卯燕人拔密城劉逺奔江陵冬十月燕鎮南將軍慕容塵攻陳留太守袁披于長平汝南太守朱斌乘虛襲許昌克之二年春二月燕太傅評龍驤將軍李洪略地河南夏四月甲辰燕李洪攻許昌汝南敗晉兵於懸瓠潁川太守李福戰死汝南太守朱斌奔夀春陳郡太守朱輔退保彭城大司馬溫遣西中郎將袁真等禦之溫帥舟師屯合肥燕人遂拔許昌汝南陳郡徙萬餘戶于幽冀二州遣鎮南將軍慕容塵屯許昌秋八月燕太宰恪將取洛陽先遣人招納士民逺近諸塢皆歸之乃使司馬恱希軍于盟津豫州刺史孫興軍于成臯初沈充之子徑以其父死於逆亂志欲立功以雪舊恥年三十餘以刑家不得仕吳興太守王胡之為司州刺史上疏稱徑才行請解禁錮參其府事朝廷許之會胡之以病不行及燕人逼洛陽冠軍將軍陳祐守之衆不過二千徑自表求配祐效力詔以徑補冠軍長史令自募壯士得千餘人以行徑屢以少擊燕衆摧破之而洛陽糧盡援絶祐自度不能守乃以救許昌為名九月留徑以五百人守洛陽祐帥衆而東徑喜曰吾志欲致命今得之矣祐聞許昌已沒遂奔新城燕恱希引兵略河南諸城盡取之三年春正月大司馬溫移鎮姑孰二月乙未以其弟右將軍豁監荆州楊州之義城雍州之京兆諸軍事領荆州刺史加江州刺史桓沖監江州及荆豫八郡諸軍事並假節司徒昱聞陳祐棄洛陽會大司馬溫于洌洲共議征討丙申帝崩于西堂事遂寢燕太宰恪吳王垂共攻洛陽恪謂諸將曰卿等常患吾不攻今洛陽城髙而兵弱易克也勿更畏懦而怠惰遂攻之三月克之執揚武將軍沈徑徑神氣自若恪將宥之中軍將軍慕輿虔曰徑雖竒士觀其志度終不為人用今赦之必為後患遂殺之恪略地至崤澠關中大震秦王堅自將屯陜城以備之燕人以左中郎將慕容築為洛州刺史鎮金墉吳王垂為都督荆楊洛徐兖豫雍益涼秦十州諸軍事征南大將軍荆州牧配兵一萬鎮魯陽海西公太和元年冬十月燕撫軍將軍下邳王厲冦兖州拔魯髙平數郡置守宰而還十二月南陽督護趙億據宛城降燕太守桓淡走保新野燕人遣南中郎將趙盤自魯陽戍宛二年夏四月燕慕容塵冦竟陵太守羅崇擊破之荆州刺史桓豁竟陵太守羅崇攻宛拔之趙億走趙盤退歸魯陽豁追擊盤於雉城擒之留兵戍宛而還秋九月以會稽內史郗愔為都督徐兖青幽楊州之晉陵諸軍事徐兖二州刺史鎮京口四年春三月大司馬溫請與徐兖二州刺史郗愔江州刺史桓沖豫州刺史袁真等伐燕初愔在北府溫常云京口酒可飲兵可用深不欲愔居之而愔暗於事機乃遣溫箋欲共奬王室請督所部出河上愔子超為溫參軍取視寸寸毁裂乃更作愔箋自陳非將帥才不堪軍旅老病乞間地自養勸溫并領已所統溫得箋大喜即轉愔冠軍將軍會稽內史溫自領徐兖二州刺史夏四月庚戌溫帥步騎五萬發姑熟大司馬溫自兖州伐燕郗超曰道逺汴水又淺恐漕運難通溫不從六月辛丑溫至金鄉天旱水道絶溫使冠軍將軍毛虎生鑿巨野三百里引汶水會于清水虎生寶之子也溫引舟自清水入河舳艫數百里郗超曰清水入河難以通運若冦不戰運道又絶因敵為資復無所得此危道也不若盡舉見衆直趨鄴城彼畏公威名必望風逃潰北歸遼碣若能出戰則事可立決若欲城鄴而守之則當此盛夏難為功力百姓布野盡為官有易水以南必交臂請命矣但恐明公以此計輕鋭勝負難必欲務持重則莫若頓兵河濟控引漕運俟資儲充備至來夏乃進兵雖如賖遲然期於成功而已捨此二䇿而連軍北上進不速決退必愆乏賊因此勢以日月相引漸及秋冬水更澀滯且北土早寒三軍裘褐者少恐於時所憂非獨無食而已溫又不從溫遣建威將軍檀玄攻胡陸拔之獲燕寧東將軍慕容忠燕主暐以下邳王厲為征討大都督帥步騎二萬逆戰于黃墟厲兵大敗單馬奔還髙平太守徐翻舉郡來降前鋒鄧遐朱序敗燕將傅顔於林渚暐復遣樂安王臧統諸軍拒溫臧不能抗乃遣散騎常侍李鳯求救于秦秋七月溫屯武陽燕故兖州刺史孫元帥其族黨起兵應溫溫至枋頭暐及太傅評大懼謀奔和龍吳王垂曰臣請擊之若其不捷走未晚也暐乃以垂代樂安王臧為使持節南討大都督帥征南將軍范陽王德等衆五萬以拒溫垂表司徒左長史申㣧黃門侍郎封孚尚書郎悉羅騰皆從軍㣧鍾之子孚放之子也暐又遣散騎侍郎樂嵩請救于秦許賂以虎牢以西之地秦王堅引羣臣議于東堂皆曰昔桓溫伐我至灞上燕不我救今溫伐燕我何救焉且燕不稱藩於我我何為救之王猛密言於堅曰燕雖強大慕容評非溫敵也若溫舉山東進屯洛邑收幽冀之兵引并豫之粟觀兵崤澠則陛下大事去矣今不如與燕合兵以退溫溫退燕亦病矣然後我承其弊而取之不亦善乎堅從之八月遣將軍茍池洛州刺史鄧羌帥步騎二萬以救燕出自洛陽軍至潁川又遣散騎侍郎薑撫報使于燕以王猛為尚書令太子太傅封孚問於申㣧曰溫衆強士整乘流直進今大軍徒逡巡髙岸兵不接刃未見克殄之理事將何如㣧曰以溫今日聲勢似能有為然在吾觀之必無成功何則晉室衰弱溫專制其國晉之朝臣未必皆與之同心故溫之得志衆所不願也必將乖阻以敗其事又溫驕而恃衆怯於應變大衆深入值可乘之會反更逍遙中流不出赴利欲望持久坐取全勝若糧廩愆懸情見勢屈必不戰自敗此自然之數也溫以燕降人假思為鄉導悉羅騰與溫戰生擒思溫使故趙將李述徇趙魏騰又與虎賁中郎將染干津共擊斬之溫軍奪氣初溫使豫州刺史袁真攻譙梁開石門以通水運真克譙梁而不能開石門水運路塞九月燕范陽王德帥騎一萬蘭臺治書侍御史劉當帥騎五千屯石門豫州刺史李邽帥州兵五千斷溫糧道當佩之子也德使將軍慕容宙帥騎一千為前鋒與晉兵遇宙曰晉人輕剽怯於陷敵勇於乘退宜設餌以釣之乃使二百騎挑戰分餘騎為三伏挑戰者兵未交而走晉兵追之宙帥伏以擊之晉兵死者甚衆溫戰數不利糧儲復竭又聞秦兵將至丙申焚舟棄輜重鎧仗自陸道奔還以毛虎生督東燕等四郡諸軍事領東燕太守溫自東燕出倉垣鑿井而飲行七百餘里燕之諸將爭欲追之吳王垂曰不可溫初退惶恐以嚴設警備簡精鋭為後拒擊之未必得志不如緩之彼幸吾未至必晝夜疾趨俟其士衆力盡氣衰然後擊之無不克矣乃帥八千騎徐行躡其後溫果兼道而進數日垂告諸將曰溫可擊矣乃急追之及溫於襄邑范陽王德先帥徑騎四千伏於襄邑東澗中與垂夾擊溫大破之斬首三萬級秦茍池邀擊溫於譙又破之死者復以萬計孫元遂據武陽以拒燕燕左衛將軍孟髙討擒之冬十月己巳大司馬溫收散卒屯于山陽溫深恥喪敗乃歸罪於袁真奏免真為庶人又免冠軍將軍鄧遐官真以溫誣已不服表溫罪狀朝廷不報真遂據夀春叛降燕且請救亦遣使如秦溫以毛虎生領淮南太守守歷陽燕主暐遣大鴻臚溫統拜袁真使持節都督淮南諸軍事征南大將軍楊州刺史封宜城公統未踰淮而卒冬十一月辛丑丞相昱與大司馬溫會塗中以謀後舉以溫世子熙為豫州刺史假節十二月大司馬溫發徐兖州民築廣陵城徙鎮之時征役既頻加之疫癘死者什四五百姓嗟怨祕書監太原孫盛作晉春秋直書時事大司馬溫見之怒謂盛子曰枋頭誠為失利何至乃如尊君所言若此史遂行自是關君門户事其子遽拜謝請改之時盛年老家居性方嚴有軌度子孫雖班白待之愈峻至是諸子乃共號泣稽顙請為百口切計盛大怒不許諸子遂私改之盛先已寫别本傳之外國及孝武帝購求異書得之於遼東人與見本不同遂兩存之五年春二月癸酉袁真卒陳郡太守朱輔立真子瑾為建威將軍豫州刺史以保壽春遣其子乾之及司馬爨亮如鄴請命燕人以瑾為揚州刺史輔為荆州刺史夏四月燕秦皆遣兵助袁瑾大司馬溫遣督護笁瑶等禦之燕兵先至瑶等與戰於武丘破之南頓太守桓石虔克南城石虔溫之弟子也秋七月大司馬溫自廣陵帥衆二萬討袁瑾以襄城太守劉波為淮南內史將五千人鎮石頭波隗之孫也癸丑溫敗瑾于壽春遂圍之燕左衛將軍孟髙將騎兵救瑾至淮北未渡會秦伐燕燕召髙還簡文帝咸安元年春正月袁瑾朱輔求救於秦秦王堅以瑾為楊州刺史輔為交州刺史遣武衛將軍武都王鑒前將軍張蚝帥步騎二萬救之大司馬溫遣淮南太守桓伊南頓太守桓石虔等擊鑒蚝於石橋大破之秦兵退屯愼城伊宣之子也丁亥溫拔壽春擒瑾及輔并其宗族送建康斬之亘溫滅蜀晉明帝大寧二年成主雄后任氏無子有妾子十餘人雄立其兄蕩之子班為太子使任后母之羣臣請立諸子雄曰吾兄先帝之嫡統有竒材大功事垂克而早世朕常悼之且班仁孝好學必能負荷先烈太傅驤司徒王達諫曰先王立嗣必子者所以明定分而防篡奪也宋宣公吳餘祭足以觀矣雄不聽驤退而流涕曰亂自此始矣班為人謙恭下士動遵禮法雄每有大議輒令豫之成帝咸和九年夏六月成主雄生瘍於頭身素多金創及病舊痕皆膿潰諸子皆惡而逺之獨太子班晝夜侍側不脫衣冠親為吮膿雄召大將軍建寧王夀受遺詔輔政丁卯雄卒太子班即位以建寧王夀録尚書事政事皆委於夀及司徒何點尚書令王瓌班居中行喪禮一無所預秋九月成主雄之子車騎將軍越屯江陽奔喪至成都以太子班非雄所生意不服與其弟安東將軍期謀作亂班弟玝勸班遣越還江陽以期為梁州刺史鎮葭萌班以未葬不忍遣推心待之無所疑間遣玝出屯於涪冬十月癸亥朔越因班夜哭弒之於殯宫并殺班兄領軍將軍都矯太后任氏令罪狀班而廢之初期母冉氏賤任氏母養之期多才藝有令名及班死衆欲立越越奉期而立之甲子期即皇帝位諡班曰戾太子以越為相國封建寧玉加大將軍夀大都督徙封漢王皆録尚書事以兄霸為中領軍鎮南大將軍弟保為鎮西大將軍汶山太守從兄始為征東大將軍代越鎮江陽丙寅葬雄於安都陵諡曰武皇帝廟號太宗始欲與夀共攻期夀不敢發始怒反譛夀於期請殺之期欲藉夀以討李玝故不許遣夀將兵向涪壽先遣使告玝以去就利害開其去路玝遂來奔詔以玝為巴郡太守期以夀為梁州刺史屯涪咸康元年秋九月成太子班之舅羅演與漢王相天水上官淡謀殺成主期立班子事覺期殺演淡及班母羅氏期自以得志輕諸舊臣信任尚書令景騫尚書姚華田褒中常侍許涪等刑賞大政皆決於數人希復關公卿褒無它才嘗勸成主雄立期為太子故有寵由是紀綱隳紊雄業始衰四年成主期驕虐日甚多所誅殺而籍沒其資財婦女由是大臣多不自安漢王壽素貴重有威名期及建寧王越等皆忌之壽懼不免每當入朝常詐為邉書辭以警急初巴西處士龔壯父叔皆為李特所殺壯欲報仇積年不除喪壽數以禮辟之壯不應而往見夀夀密問壯以自安之䇿壯曰巴蜀之民本皆晉臣節下若能發兵西取成都稱藩於晉誰不爭為節下奮臂前驅者如此則福流子孫名垂不朽豈徒脫今日之禍而已夀然之隂與長史略陽羅恆巴西解思明謀攻成都期頗聞之數遣許涪至夀所伺其動靜又鴆殺夀養弟安北將軍攸夀乃詐為妹夫任調書云期當取夀其衆信之遂帥步騎萬餘人自涪襲成都許賞以城中財物以其將李奕為前鋒期不意其至初不設備夀世子勢為翊軍校尉開門納之遂克成都屯兵宫門期遣侍中勞夀夀奏建寧王越景騫田褒姚華許涪及征西將軍李遐將軍李西等懷姦亂政皆收殺之縱兵大掠數日乃定夀矯以太后任氏令廢期為卭都縣公幽之别宫追諡戾太子曰哀皇帝羅恆解思明李奕等勸夀稱鎮西將軍益州牧成都王稱藩於晉送卭都公於建康任調及司馬蔡興侍中李豔等勸夀自稱帝夀命筮之占者曰可數年天子調喜曰一日尚足況數年乎思明曰數年天子孰與百世諸侯夀曰朝聞道夕死可矣遂即皇帝位改國號曰漢大赦改元漢興以安車束帛徴龔壯為太師壯誓不仕夀所贈遺一無所受夀改立宗廟追尊父驤曰獻皇帝母咱氏為皇太后立妃閻氏為皇后世子勢為皇太子更以舊廟為大成廟凡諸制度多所改易以董皎為相國羅恆為尚書令解思明為廣漢太守任調為鎮北將軍梁州刺史李奕為西夷校尉從子權為寧州刺史公卿州郡悉用其遼佐代之成氏舊臣近親及六郡士人皆見踈斥卭都縣公期歎曰天下主乃為小縣公不如死五月縊而卒夀諡曰幽公葬以王禮夏六月漢李奕從兄廣漢太守乾告大臣謀廢立秋七月漢主夀使其子廣與大臣盟于前殿徙乾為漢嘉太守以李閎為荆州刺史鎮巴郡八月蜀中久雨百姓飢疫夀命羣臣極言得失龔壯上封事稱陛下起兵之初上指星辰昭告天地歃血盟衆舉國稱藩天應人恱大功克集而論者未諭權宜稱制今淫雨百日飢疫並臻天其或者將以監示陛下故也愚謂宜遵前盟推奉建康彼必不愛髙爵重位以報大功雖降階一等而子孫無窮永保福祚不亦休哉論者或言二州附晉則榮六郡人事之不便昔公孫述在蜀羈客用事劉備在蜀楚士多貴及吳鄧西伐舉國屠滅寧分客主論者不達安固之基茍惜名位以為劉氏守令方仕州郡曽不知彼乃國亡主易豈同今日義舉主榮臣顯哉論者又謂臣當為法正臣蒙陛下大恩恣臣所安至於榮祿無問漢晉臣皆不處復何為效法正乎壽省書內慙祕而不宣九月漢僕射任顔謀反誅顔任太后之弟也漢主夀因盡誅成主雄諸子五年秋九月漢主夀疾病羅恆解思明復議奉晉夀不從李演復上書言之夀怒殺演夀常慕漢武魏明之為人恥聞父兄時事上書者不得言先世政教自以為勝之也舍人杜襲作詩十篇託言應璩以諷諫夀報曰省詩知意若今人所作乃賢哲之話言若古人所作則死鬼之常辭耳七年冬十二月漢主夀以其太子勢領大將軍録尚書事初成主雄以儉約寬惠得蜀人心及李閎王嘏還自鄴盛稱鄴中繁庶宫殿壯麗且言趙王虎以刑殺御下故能控制境內夀慕之徙旁郡民三丁以上者以實成都大修宫室治器玩人有小過輒殺以立威左僕射蔡興右僕射李嶷皆坐直諫死民疲於賦役吁嗟滿道思亂者衆矣康帝建元元年秋八月漢主壽卒諡曰昭文廟號中宗太子勢即位大赦二年夏四月漢太史令韓皓上言熒惑守心乃宗廟不修之譴漢主勢命羣臣議之相國董皎侍中王嘏以為景武創業獻文承基至親不逺無宜踈絶勢乃更命祀成始祖太宗皆謂之漢穆帝永和元年秋八月漢主勢之弟大將軍廣以勢無子求為太弟勢不許馬當解思明諫曰陛下兄弟不多若復有所廢將益孤危固請許之勢疑其與廣有謀收當思明斬之夷其三族遣太保李奕襲廣於涪城貶廣為臨卭侯廣自殺思明被收歎曰國之不亡以我數人在也今其殆矣言笑自若而死思明有智略敢諌諍馬當素得人心及其死士民無不哀之二年冬漢太保李奕自晉壽舉兵反蜀人多從之衆至數萬漢主勢登城拒戰奕單騎突門門者射而殺之其衆皆潰勢大赦境內改年嘉寧勢驕淫不恤國事多居禁中罕接公卿踈忌舊臣信任左右讒諂並進刑罰苛濫由是中外離心蜀土先無獠至是始從山出自巴西至犍為梓潼布滿山谷十餘萬落不可禁制大為民患加以飢饉四境之內遂至蕭條安西將軍桓溫將伐漢將佐皆以為不可江夏相袁喬勸之曰夫經略大事固非常情所及智者了於胸中不必待衆言皆合也今為天下之患者胡蜀二寇而已蜀雖險固比胡為弱將欲除之宜先其易者李勢無道臣民不附且恃其險逺不修戰備宜以精卒萬人輕齎疾趨比其覺之我已出其險要可一戰擒也蜀地富饒戶口繁庶諸葛武侯用之抗衡中夏若得而有之國家之大利也論者恐大軍既西胡必窺覦此似是而非胡聞我萬里逺征以為內有重備必不敢動縱有侵軼緣江諸軍足以拒守必無憂也溫從之喬瓌之子也十一月辛未溫帥益州刺史周撫南郡太守譙王無忌伐漢拜表即行委安西長史范汪以留事加撫督梁州之四郡諸軍事使袁喬帥二千人為前鋒三年春二月桓溫軍至青衣漢主勢大發兵遣叔父右衛將軍福從兄鎮南將軍權前將軍咱堅等將之自山陽趣合水諸將欲設伏於江南以待晉兵咱堅不從引兵自江北鴛鴦崎渡向犍為三月溫至彭模議者欲分為兩軍異道俱進以分漢兵之勢袁喬曰今懸軍深入萬里之外勝則大功可立不勝則噍類無遺當合勢齊力以取一戰之捷若分兩軍則衆心不一萬一偏敗大事去矣不如全軍而進棄去釡甑齎三日糧以示無還心勝可必也溫從之留參軍孫盛周楚將羸兵守輜重溫自將步卒直指成都楚撫之子也李福進攻彭模孫盛等奮擊走之溫進遇李權三戰三捷漢兵散走歸成都鎮東將軍李位都迎詣溫降咱堅至犍為乃知與溫異道還自沙頭津濟比至溫已軍於成都之十里陌堅衆自潰勢悉衆出戰于笮橋溫前鋒不利參軍龔護戰死矢及溫馬首衆懼欲退而鼓吏誤鳴進鼓袁喬拔劒督士卒力戰遂大破之溫乘勝長驅至成都縱火燒其城門漢人惶懼無復鬪志勢夜開東門走至葭萌使散騎常侍王幼送降文於溫自稱略陽李勢叩頭死罪尋輿櫬靣縛詣軍門溫解縛焚櫬送勢及宗室十餘人於建康引漢司空譙獻之等以為參佐舉賢旌善蜀人恱之漢故尚書僕射王誓鎮東將軍鄧定平南將軍王潤將軍隗文等皆舉兵反衆各萬餘桓溫自擊定使袁喬擊文皆破之溫命益州刺史周撫鎮彭模斬王誓王潤溫留成都三十日振旅還江陵李勢至建康封歸義侯夏四月丁巳鄧定隗文等入據成都隗文鄧定等立故國師范長生之子賁為帝而奉之以妖異惑衆蜀人多歸之五年夏四月益州刺史周撫龍驤將軍朱燾擊范賁斬之益州平桓溫廢立晉穆帝永和二年冬十一月安西將軍桓溫伐漢朝廷以蜀道險逺溫衆少而深入皆以為憂惟劉惔以為必克或問其故惔曰以博知之溫善博者也不必得則不為但恐克蜀之後溫終專制朝廷耳三年漢主勢降於溫溫滅蜀事見桓四年秋八月朝廷論平蜀之功欲以豫章郡封桓溫尚書左丞荀㽔曰溫若復平河洛將何以賞之乃加溫征西大將軍開府儀同三司封臨賀郡公加譙王無忌前將軍袁喬龍驤將軍封湘西伯㽔嵩之子也溫既滅蜀威名大振朝廷憚之升平四年冬十一月封桓溫為南郡公溫弟沖為豐城縣公子濟為臨賀縣公哀帝興寧元年夏五月加征西大將軍桓溫侍中大司馬都督中外諸軍領尚書事假黃鉞溫以撫軍司馬王坦之為長史坦之述之子也又以征西掾郗超為參軍王珣為主簿每事必與二人謀之府中為之語曰髯參軍短主簿能令公喜能令公怒溫氣槩髙邁罕有所推與超言常自謂不能測傾身待之超亦深自結納珣導之孫也與謝玄皆為溫掾溫俱重之曰謝掾年四十必擁旄杖節王掾當作黑頭公皆未易才也玄奕之子也二年夏五月戊辰加大司馬溫楊州牧録尚書事壬申使侍中召溫入參朝政溫辭不至秋七月丁卯詔復徴大司馬溫入朝八月溫至赭圻詔尚書車灌止之溫遂城赭圻居之固讓內録遙領楊州牧三年大司馬溫移鎮姑孰二月丙申帝崩于西堂帝無嗣皇太后詔以琅邪王奕承大統百官奉迎于琅邪第是日即皇帝位大赦海西公太和三年冬十二月加大司馬溫殊禮位在諸侯王上簡文帝咸安元年大司馬溫恃其材略位望隂蓄不臣之志嘗撫枕歎曰男子不能流芳百世亦當遺臭萬年術士杜炅能知人貴賤溫問炅以己祿位所至炅曰明公勳格宇宙位極人臣溫不恱溫欲先立功河朔以收時望還受九錫及枋頭之敗威名頓挫既克夀春謂參軍郗超曰足以雪枋頭之恥乎超曰未也久之超就溫宿中夜謂溫曰明公都無所慮乎溫曰卿欲有言邪超曰明公當天下重任今以六十之年敗於大舉不建不世之勳不足以鎮愜民望溫曰然則奈何超曰明公不為伊霍之舉者無以立大威權鎮壓四海溫素有心深以為然遂與之定議以帝素謹無過而床第易誣乃言帝早有痿疾嬖人相龍計好朱靈寶等參侍內寢二美人田氏孟氏生三男將建儲立王傾移皇基密播此言於民間時人莫能審其虛實十一月癸卯溫自廣陵將還姑孰屯于白石丁未詣建康諷禇太后請廢帝立丞相會稽王昱并作令草呈之太后方在佛屋燒香內侍啓云外有急奏太后出倚户視奏數行乃曰我本自疑此至半便止索筆益之曰未亡人不幸罹此百憂感念存沒心焉如割己酉溫集百官於朝堂廢立既曠代所無莫有識其故典者百官震栗溫亦色動不知所為尚書僕射王彪之知事不可止乃謂溫曰公阿衡皇家當倚傍先代乃命取霍光傳禮度儀制定於須臾彪之朝服當階神彩毅然曽無懼容文武儀準莫不取定朝廷以此服之於是宣太后令廢帝為東海王以丞相録尚書事會稽王昱統承皇極百官入太極前殿溫使督護笁瑶散騎侍郎劉亨收帝璽綬帝著白帢單衣步下西堂乘犢車出神虎門羣臣拜辭莫不歔欷侍御史殿中監將兵百人衛送東海第溫帥百官具乘輿法駕迎會稽王于會稽邸王於朝堂變服著平巾幘單衣東向流涕拜受璽綬是日即皇帝位改元溫出次中堂分兵屯衛溫有足疾詔乘輿入殿溫撰辭欲陳述廢立本意帝引見便泣下數十行溫兢懼竟不能一言而出太宰武陵王晞好習武事為溫所忌欲廢之以事示王彪之彪之曰武陵親尊未有顯罪不可以猜嫌之間便相廢徙公建立聖明當崇奬王室與伊周同美此大事宜更深詳溫曰此已成事卿勿復言乙卯溫表晞聚納輕剽息綜矜忍袁真叛逆事相連染頃日猜懼將成亂階請免晞官以王歸蕃從之并免其世子綜梁王㻱等官溫使魏郡太守毛安之帥所領宿衛殿中安之虎生之弟也庚戍尊褚太后曰崇德太后初殷浩卒大司馬溫使人齎書弔之浩子涓不答亦不詣溫而與武陵王晞遊廣州刺史庾藴希之弟也素與溫有隙溫惡殷庾宗強欲去之辛亥使其弟祕逼新蔡王晃詣西堂叩頭自列稱與晞及子綜著作郎殷涓太宰長史庾倩掾曹秀舍人劉強散騎常侍庾柔等謀反帝對之流涕溫皆收付廷尉倩柔皆藴之弟也癸丑溫殺東海王三子及其母甲寅御史中丞譙王恬承溫旨請依律誅武陵王晞詔曰悲惋惶怛非所忍聞況言之哉其更詳議恬承之孫也乙卯溫重表固請誅晞詞甚酷切帝乃賜溫手詔曰若晉祚靈長公便宜奉行前詔如其大運去矣請避賢路溫覽之流汗變色乃奏廢晞及三子家屬皆徙新安郡丙辰免新蔡王晃為庶人徙衡陽殷涓庾倩曹秀劉強庾柔皆族誅庾藴飲鴆死藴兄東陽太守友子婦桓豁之女也故溫特赦之庾希聞難與弟會稽王參軍邈及子攸之逃于海陵陂澤中溫既誅殷庾威勢翕赫侍中謝安見溫遙拜溫驚曰安石卿何事乃爾安曰未有君拜於前臣揖於後戊午大赦璔文武位二等已未溫如白石上書求歸姑孰庚申詔進溫丞相大司馬如故留京師輔政溫固辭仍請還鎮辛酉溫自白石還姑孰秦王堅聞溫廢立謂羣臣曰溫前敗灞上後敗枋頭不能思愆自貶以謝百姓方更廢君以自説六十之叟舉動如此將何以自容於四海乎諺曰怒其室而作色於父其桓溫之謂矣十二月大司馬溫奏廢放之人屏之以逺不可以臨黎元東海王宜依昌邑故事築第吳郡太后詔曰使為庶人情有不忍可特封王溫又奏可封海西縣侯庚寅封海西縣公溫威振內外帝雖處尊位拱默而已常懼廢黜先是熒惑守太微端門踰月而海西廢辛卯熒惑逆行入太微帝甚惡之中書侍郎郗超在直帝謂超曰命之修短本所不計故當無復近日事邪超曰大司馬臣溫方內固社稷外恢經略非常之事臣以百口保之及超請急省其父帝曰致意尊公家國之事遂至於此由吾不能以道匡衛愧歎之深言何能諭因詠庾闡詩云志士痛朝危忠臣哀主辱遂泣下霑襟帝美風儀善容止留心典籍凝塵滿席湛如也雖神識恬暢然無濟世大略謝安以為惠帝之流但清談差勝耳郤超以溫故朝中皆畏事之謝安嘗與左衛將軍王坦之共詣超日旰未得前坦之欲去安曰獨不能為性命忍須臾邪二年春三月戊午遣侍中王坦之徵大司馬溫入輔溫復辭夏四月徙海西公於吳縣西柴里敇吳國內史刁彛防衛又遣御史顧允監察之彛協之子也六月庾希庾邈與故青州刺史武沈之子遵聚衆夜入京口城晉陵太守卞踰城奔曲阿希詐稱受海西公密旨誅大司馬溫建康震擾內外戒嚴卞發諸縣兵二千人擊希希敗閉城自守溫遣東海內史周少孫討之秋七月壬辰拔其城擒希邈及其親黨皆斬之壺之子也甲寅帝不豫急召大司馬溫入輔一日一夜發四詔溫辭不至初帝為會稽王娶王述從妹為妃生世子道生及弟俞生道生踈躁無行母子皆以幽廢死餘三子郁朱生天流皆早夭諸姬絶孕將十年王使善相者視之皆曰非其人又使視諸婢媵有李陵容者在織坊中黑而長宮人謂之崑崙相者驚曰此其人也王召之侍寢生子昌明及道子已未昌明為皇太子生十年矣以道子為琅邪王領會稽國以奉帝母鄭太妃之祀遺詔大司馬溫依周公居攝故事又曰少子可輔者輔之如不可君自取之侍中王坦之自持詔入於帝前毁之帝曰天下儻來之運卿何所嫌坦之曰天下宣元之天下陛下何得專之帝乃使坦之改詔曰家國事一稟大司馬如諸葛武侯王丞相故事是日帝崩羣臣疑惑未敢立嗣或曰當須大司馬處分尚書僕射王彪之正色曰天子崩太子代立大司馬何容得異若先靣咨必反為所責朝議乃定太子即皇帝位大赦崇德太后令以帝沖幼加在諒暗令溫依周公居攝故事事已施行王彪之曰此異常大事大司馬必當固讓使萬機停滯稽廢山陵未敢奉令謹具封還事遂不行溫望簡文臨終禪位於己不爾便當居攝既不副所望甚憤怨與弟沖書曰遺詔使吾依武侯王公故事耳溫疑王坦之謝安所為心銜之詔謝安徵溫入輔溫又辭冬十月彭城妖人盧悚自稱大道祭酒事之者八百餘家十一月遣弟子許龍如吳晨到海西公門稱太后密詔奉迎興復公初欲從之納保母諫而止龍曰大事垂捷焉用兒女子言乎公曰我得罪於此幸蒙寬宥豈敢妄動且太后有詔便應官屬來何獨使汝也汝必為亂因叱左右縛之龍懼而走甲午悚帥衆三百人晨攻廣莫門詐稱海西公還由雲龍門突入殿庭略取武庫甲仗門下吏士駭愕不知所為遊擊將軍毛安之聞難帥衆直入雲龍門手自奮擊左衛將軍殷康中領軍桓祕入止車門與安之并力討誅之并黨與死者數百人海西公深慮橫禍專飲酒恣聲色有子不育時人憐之朝廷以其安於屈辱故不復為虞武帝寧康元年春二月大司馬溫來朝辛巳詔吏部尚書謝安侍中王坦之迎于新亭是時都下人情恟恟或云欲誅王謝因移晉室坦之甚懼安神色不變曰晉祚存亡決於此行溫既至百官拜於道側溫大陳兵衛延見朝士有位望者皆戰懾失色坦之流汗沾衣倒執手板安從容就席坐定謂溫曰安聞諸侯有道守在四鄰明公何須壁後置人邪溫笑曰正自不能不然爾遂命左右撤之與安笑語移日郗超常為溫謀主安與坦之見溫溫使超卧帳中聽其言風動帳開安笑曰郤生可謂入幕之賓矣時天子幼弱外有強臣安與坦之盡忠輔衛卒安晉室三月溫有疾停建康十四日甲午還姑孰秋七月己亥南郡宣武公桓溫薨初桓溫疾篤諷朝廷求九錫屢使人趣之謝安王坦之故緩其事使袁宏具草宏以示王彪之彪之歎其文辭之美因曰卿固大才安可以此示人謝安見其草輒改之由是歷旬不就宏密謀於彪之彪之曰聞彼病日增亦當不復支久自可更小遲回宏從之溫弟江州刺史沖問溫以謝安王坦之所任溫曰渠等不為汝所處分其意以為已存彼必不敢立異死則非沖所制若害之無益於沖更失時望故也溫以世子熙才弱使沖領其衆於是桓祕與熙弟濟謀共殺沖沖密知之不敢入俄頃溫薨沖先遣力士拘録熙濟而後臨喪祕遂被廢棄熙濟俱徙長沙詔葬溫依漢霍光及安平獻王故事沖稱溫遺命以少子玄為嗣時方五嵗襲封南郡公庚戌加右將軍荆州刺史桓豁征西將軍督荆楊雍交廣五州諸軍事以江州刺史桓沖為中軍將軍都督楊豫江三州諸軍事楊豫二州刺史鎮姑孰竟陵太守桓石秀為寧逺將軍江州刺史鎮尋陽石秀豁之子也沖既代溫居任盡忠王室或勸沖誅除時望專執時權沖不從始溫在鎮死罪皆專決不請沖以為生殺之重當歸朝廷凡大辟皆先上須報然後行之謝安以天子幼沖新喪元輔欲請崇德太后臨朝王彪之曰前世人主幼在襁褓母子一體故可臨朝太后亦不能決事要須顧問大臣今上年出十歲垂及冠婚反令從嫂臨朝示人君幼弱豈所以光揚聖德乎諸公必欲行此豈僕所制所惜者大體耳安不欲委任桓沖故使太后臨朝已得以專獻替裁決遂不從彪之之言八月壬子太后復臨朝攝政太元二年冬十二月臨海太守郗超卒初超黨於桓氏以父愔忠於王室不令知之及病甚出一箱書授門生曰公年尊我死之後若以哀惋害寢食者可呈此箱不爾即焚之既而愔果哀惋成疾門生呈箱皆與桓溫往返密計愔大怒曰小子死已晚矣遂不復哭十一年冬十月甲申海西公奕薨於吳苻氏據長安苻堅篡立晉懷帝永嘉四年略陽臨渭氐酋蒲洪驍勇多權略羣氐畏服之漢主聰遣使拜洪平逺將軍洪不受自稱護氐校尉秦州刺史略陽公元帝大興二年蒲洪降趙趙王曜以洪為率義侯成帝咸和四年秋八月後趙中山公虎攻集木且羌于河西克之氐王蒲洪羌酋姚弋仲俱降于虎虎表洪監六夷軍事八年冬十月氐帥蒲洪自稱雍州刺史西附張駿丞相虎分命諸將屯汧隴遣將軍麻秋討蒲洪洪帥户二萬降於虎虎迎拜洪光烈將軍護氐校尉洪至長安説虎徙關中豪桀及氐羌以實東方曰諸氐皆洪家部曲洪帥以從誰敢違者虎從之徙秦雍及氐羌十餘萬户于關東以洪為龍驤將軍流民都督使居枋頭咸康四年趙王虎之攻燕蒲洪以功拜使持節都督六夷諸軍事冠軍大將軍封西平郡公石閔言於虎曰蒲洪雄俊得將士死力諸子皆有非常之才且握強兵五萬屯據近畿宜密除之以安社稷虎曰吾方倚其父子以取吳蜀奈何殺之待之愈厚穆帝永和五年髙力督定陽梁犢作亂趙王虎以車騎將軍蒲洪討滅進封蒲洪為侍中車騎大將軍開府儀同三司都督雍秦州諸軍事雍州刺史進封略陽郡公夏四月趙王虎病卒太子世即位以彭城王遵為丞相遵殺世自立武興公閔言於遵曰蒲洪人傑也今以洪鎮關中臣恐秦雍之地非復國家之有此雖先帝臨終之命然陛下踐祚自宜改圖遵從之罷洪都督餘如前制洪怒歸枋頭冬十一月秦雍流民相帥西歸路由枋頭共推蒲洪為主衆至十餘萬洪子健在鄴斬關出奔枋頭侍中王鑒懼洪之通欲以計遣之乃以洪為都督關中諸軍事征西大將軍雍州牧領秦州刺史洪會官屬議應受與不主簿程朴請且與趙連和如列國分境而治洪怒曰吾不堪為天子邪而云列國乎引朴斬之六年春正月姚弋仲蒲洪各有據關右之志弋仲遣其子襄帥衆五萬擊洪洪迎擊破之斬獲三萬餘級洪自稱大都督大將軍大單于三秦王改姓苻氏以南安雷弱兒為輔國將軍安定梁楞為前將軍領左長史馮翊魚遵為後將軍領右長史京兆假陵為左將軍領左司馬王墮為右將軍領右司馬天水趙俱隴西牛夷北地辛牢皆為從事中郎氐酋毛貴為單于輔相三月麻秋説苻洪曰再閔石祇方相持中原之亂未可平也不如先取關中基業己固然後東爭天下誰能敵之洪深然之既而秋因宴鴆洪欲并其衆世子健收秋斬之洪謂健曰吾所以未入關者以為中州可定今不幸為豎子所困中州非汝兄弟所能辦我死汝急入關言終而卒健代統其衆乃去大都督大將軍三秦王之號稱晉官爵遣其叔父安來告喪且請朝命秋八月京兆杜洪據長安自稱晉征北將軍雍州刺史以馮翊張琚為司馬關西夷夏皆應之苻健欲取之恐洪知之乃受趙官爵以趙俱為河內太守戍溫牛夷為綏集將軍戍懷治宫室於枋頭課民種麥示無西意有知而不種者健殺之以徇既而自稱晉征西大將軍都督關中諸軍事雍州刺史以武威賈玄碩為左長史略陽梁安為右長史假純為左司馬辛牢為右司馬京兆王魚安定程肱胡文等為軍咨祭酒悉衆而西以魚遵為先鋒行至盟津為浮梁以濟遣弟輔國將軍雄帥衆五千自潼關入兄子揚武將軍菁帥衆七千自軹關入臨别執菁手曰若事不捷汝死河北我死河南不復相見既濟焚橋自帥大衆隨雄而進杜洪聞之與健書侮嫚之以張琚弟先為征虜將軍帥衆萬三千逆戰于潼關之北先兵大敗走還長安洪悉召關中之衆以拒健洪弟郁勸洪迎健洪不從郁帥所部降於健健遣苻雄徇渭北氐酋毛受屯髙陵徐磋屯好畤羌酋白犢屯黃白衆各數萬皆斬洪使遣子降於健苻菁魚遵所過城邑無不降附洪懼固守長安九月苻菁與張先戰於渭北擒之三輔郡縣堡壁皆降冬十月苻健長驅至長安杜洪張琚奔司竹十一月甲午苻健入長安以民心思晉乃遣參軍杜山伯詣建康獻捷并修好於桓溫於是秦雍夷夏皆附之趙涼州刺史石寧獨據上邽不下十二月苻雄擊斬之七年春正月苻健左長史賈玄碩等請依劉僃稱漢中王故事表健為都督關中諸軍事大將軍大單于秦王健怒曰吾豈堪為秦王邪且晉使未返我之官爵非汝曹所知也既而密使梁安諷玄碩等上尊號健辭讓再三然後許之丙辰健即天王大單于位國號大秦大赦改元皇始追尊父洪為武惠皇帝廟號太祖立妻強氏為天王后子萇為太子靚為平原公生為淮南公覿為長樂公方為髙陽公碩為北平公騰為淮陽公栁為晉公桐為汝南公庾為魏公武為燕公幼為趙公以苻雄為都督中外諸軍事丞相領車騎大將軍雍州牧東海公苻菁為衛大將軍平昌公宿衛二宫雷弱兒為太尉毛貴為司空略陽薑伯周為尚書令梁楞為左僕射王墮為右僕射魚遵為太子太師強平為太傅假純為太保吕婆樓為散騎常侍伯周健之舅平王后之弟婆樓本略陽氐酋也三月秦王健分遣使者問民疾苦搜羅俊異寬重斂之稅弛離宫之禁罷無用之器去侈靡之服凡趙之苛政不便於民者皆除之杜洪張琚遣使召梁州刺史司馬勳夏四月勳帥步騎三萬赴之秦王健禦之於五丈原勳屢戰皆敗退歸南鄭健以中書令賈玄碩始者不上尊號銜之使人告玄碩與司馬勳通并其諸子皆殺之八年春正月秦丞相雄等請秦王健正尊號依漢晉之舊不必效石氏之𥘉健從之即皇帝位大赦諸公皆進爵為王且言單于所以統一百蠻非天子所宜領以授太子萇司馬勳既還漢中杜洪張琚屯宜秋洪自以右族輕琚琚遂殺洪自立為秦王改元建昌夏五月秦主健攻張琚於宜秋斬之十年夏六月丙申秦東海敬武王雄卒秦王健哭之嘔血曰天不欲吾平四海邪何奪吾元才之速也贈魏王雄以佐命元勳位兼將相權侔人主而謙恭泛愛遵奉法度故健重之常曰元才吾之周公也子堅襲爵堅性至孝幼有志度博學多能交結英豪吕婆樓強汪及略陽梁平老皆與之善十一年秦淮南王符生幼無一目性粗暴其祖父洪嘗戲之曰吾聞瞎兒一淚信乎生怒引佩刀自刺出血曰此亦一淚也洪大驚鞭之生曰性耐刀槊不堪鞭捶洪謂其父健曰此兒狂悖宜早除之不然必破人家健將殺之健弟雄止之曰兒長自應改何可遽爾及長力舉千鈞手格猛獸走及奔馬擊刺騎射冠絶一時獻哀太子卒強后欲立少子晉王柳秦主健以讖文有三羊五眼乃立生為太子以司空平昌王菁為太尉尚書令王墮為司空司隸校尉梁楞為尚書令夏六月丙子秦主健寢疾庚辰平昌王菁勒兵入東宫將殺太子生而自立時生侍疾西宫菁以為健已卒攻東掖門健聞變登端門陳兵自衛衆見健惶懼皆捨仗逃散健執菁數而殺之餘無所問壬午以大司馬武都王安都督中外諸軍事甲申健引太師魚遵丞相雷弱兒太傅毛貴司空王墮尚書令梁楞左僕射梁安右僕射假純吏部尚書辛牢等受遺詔輔政健謂太子生曰六夷酋帥及大臣執權者若不從汝命宜漸除之臣光曰顧命大臣所以輔導嗣子為之羽翼也為之羽翼而教使翦之能無斃乎知其不忠則勿任而已矣任以大柄又從而猜之鮮有不召亂者也乙酉健卒諡曰景明皇帝廟號髙祖丙戌太子生即位大赦改元壽光羣臣奏曰未踰年而改元非禮也生怒窮推議主得右僕射假純殺之秋七月秦主生尊母強氏曰皇太后立妃梁氏為皇后梁氏安之女也以其嬖臣太子門大夫南安趙韶為右僕射太子舍人趙誨為中護軍著作郎董榮為尚書八月秦主生封衛大將軍黃眉為廣平王前將軍飛為新興王皆素所善也徵大司馬武都王安領太尉以晉王栁為征東大將軍并州牧鎮蒲坂魏王廋為鎮東大將軍豫州牧鎮陜城中書監胡文中書令王魚言於生曰比有星孛干大角熒惑入東井大角帝座東井秦分於占不出三年國有大喪大臣戮死願陛下修德以禳之生曰皇后與朕對臨天下可以應大喪矣毛太傅梁車騎梁僕射受遺輔政可以應大臣矣九月生殺梁后及毛貴梁楞梁安貴后之舅也右僕射趙韶中護軍趙誨皆洛州刺史俱之從弟也有寵於生乃以俱為尚書令俱固辭以疾謂韶誨曰汝等不復顧祖宗欲為滅門之事毛梁何罪而誅之吾何功而代之汝等可自為吾其死矣遂以憂卒冬十一月秦以辛牢守尚書令趙韶為左僕射尚書董榮為右僕射中護軍趙誨為司隸校尉十二月秦丞相雷弱兒性剛直以趙韶董榮亂政每公言於朝見之常切齒韶榮譛之於秦主生生殺弱兒及其九子二十七孫於是諸羌皆有離心生雖在諒隂遊飲自若彎弓露刃以見朝臣錘鉗鋸鑿可以害人之具備置左右即位未幾后妃公卿已下至于僕隸凡殺五百餘人截脛拉脅鋸項刳胎者比比有之十二月秦司空王墮性剛峻右僕射董榮侍中強國皆以佞幸進墮疾之如讎每朝見榮未嘗與之言或謂墮曰董君貴幸無比公宜小降意接之墮曰董龍是何雞狗而令國士與之言乎會有天變榮與強國言於秦主生曰今天譴甚重宜以貴臣應之生曰貴臣唯有大司馬及司空耳榮國曰大司馬國之懿親不可殺也乃殺王墮將刑榮謂之曰今日復敢比董龍於雞狗乎墮瞋目叱之洛州刺史杜郁墮之甥也左僕射趙韶惡之譛於生以為二於晉而殺之壬戍生宴羣臣於太極殿以尚書令辛牢為酒監酒酣生怒曰何不強人酒而猶有坐者引弓射牢殺之羣臣懼莫敢不醉偃仆失冠生乃恱春三月秦主生發三輔民治渭橋金紫光祿大夫程肱諫以為妨農生殺之夏四月長安大風發屋拔木秦宫中驚擾或稱賊至宫門晝閉五日乃止秦主生推告賊者刳出其心左光祿大夫強平諫曰天降災異陛下當愛民事神緩刑崇德以應之乃可弭也生怒鑿其頂而殺之衛將軍廣平王黃眉前將軍新興王飛建節將軍鄧羌以平太后之弟叩頭固諫生弗聽出黃眉為左馮翊飛為右扶風羌行咸陽太守猶惜其驍勇故皆弗殺五月太后強氏以憂恨卒諡曰明德六月秦主生下詔曰朕受皇天之命君臨萬邦嗣統已來有何不善而謗讟之音扇滿天下殺不過千而謂之殘虐行者比肩未足為希方當峻刑極罰復如朕何自去春以來潼關之西至于長安虎狼為暴晝則繼道夜則發屋不食六畜專務食人凡殺七百餘人民廢耕桑相聚邑居而為害不息秋七月秦羣臣奏請禳災生曰野獸飢則食人飽當自止何禳之有且天豈不愛民哉正以犯罪者多故助朕殺之耳冬十月秦主生夜食棗多旦而有疾召太醫令程延使診之延曰陛下無它疾食棗多耳生怒曰汝非聖人安知吾食棗遂斬之升平元年春二月太白入東井秦有司奏太白罰星東井秦分必有暴兵起京師秦主生曰太白入井自為渴耳何所怪乎夏五月秦主生夢大魚食蒲又長安謡曰東海大魚化為龍男皆為王女為公生乃誅太師録尚書事廣寧公魚遵并其七子十孫金紫光祿大夫牛夷懼禍求為荆州生不許以為中軍將軍引見調之曰牛性遲重善持轅軛雖無驥足動負百石夷曰雖服大車未經峻壁願試重載乃知勳績生笑曰何其快也公嫌所載輕乎朕將以魚公爵位處公夷懼歸而自殺生飲酒無晝夜或連月不出奏事不省往往寢落或醉中決事左右因以為姦賞罰無凖或至申酉乃出視朝乘醉多所殺戮自以眇目諱言殘缺偏隻少無不具之類誤犯而死者不可勝數好生剝牛羊驢馬燖雞豚鵝鴨縱之殿前數十為羣或剝人靣皮使之歌舞臨觀以為樂嘗問左右曰自吾臨天下汝外間何所聞或對曰聖明宰世賞罰明當天下唯歌太平怒曰汝媚我也引而斬之它日又問或對曰陛下刑罰微過又怒曰汝謗我也亦斬之勳舊親戚誅之殆盡羣臣得保一日如度十年東海王堅素有時譽與故姚襄參軍薛讃權翼善讃翼密説堅曰主上猜忍暴虐中外離心方今宜主秦祀者非殿下而誰願早為計勿使它姓得之堅以問尚書吕婆樓婆樓曰僕刀鐶上人耳不足以辦大事僕里舍有王猛者其人謀略不世出殿下宜請而咨之堅因婆樓以招猛一見如舊友語及時事堅大恱自謂如劉玄德之遇諸葛孔明也六月太史令康權言於秦主生曰昨夜三月並出孛星入太微連東井自去月上旬沈隂不雨以至于今將有下人謀上之禍生怒以為妖言撲殺之特進領御史中丞梁平老等謂堅曰主上失德上下嗷嗷人懷異志燕晉二方伺隙而動恐禍發之日家國俱亡此殿下之事也宜早圖之堅心然之畏生趫勇未敢發生夜對侍婢言曰阿法兄弟亦不可信明當除之婢以告堅及堅兄清河王法法與梁平老及特進光祿大夫強汪帥壯士數百潛入雲龍門堅與吕婆樓帥麾下三百人鼓譟繼進宿衛將士皆舍仗歸堅生猶醉寐堅兵至生驚問左右曰此輩何人左右曰賊也生曰何不拜之堅兵皆笑生又大言何不速拜不拜者斬之堅兵引生置别室廢為越王尋殺之諡曰厲王堅以位讓法法曰汝嫡嗣且賢宜立堅曰兄年長宜立堅母茍氏泣謂羣臣曰社稷重事小兒自知不能它日有悔失在諸君羣臣皆頓首請立堅堅乃去皇帝之號稱大秦天王即位於太極殿誅生幸臣中書監董榮左僕射趙韶等二十餘人大赦改元永興追尊父雄為文桓皇帝母茍氏為皇太后妃茍氏為皇后世子宏為皇太子以清河王法為都督中外諸軍事丞相録尚書事東海公諸王皆降爵為公以從祖右光祿大夫永安公侯為太尉晉公栁為車騎大將軍尚書令封弟融為陽平公雙為河南公子丕為長樂公暉為平原公熙為廣平公睿為巨鹿公以漢陽李威為左僕射梁平老為右僕射強汪為領軍將軍吕婆樓為司隸校尉王猛為中書侍郎融好文學明辨過人耳聞則誦過目不忘力敵百夫善騎射擊刺少有令譽堅愛重之常與共議國事融經綜內外刑政修明薦才揚滯補益弘多丕亦有文武才幹治民斷獄皆亞於融威茍太后之姑子也素與魏王雄友善生屢欲殺堅賴威營救得免威得幸於茍太后堅事之如父威知王猛之賢常勸堅以國事任之堅謂猛曰李公知君猶鮑叔牙之知管仲也猛以兄事之秋八月秦王堅以權翼為給事黃門侍郎薛讃為中書侍郎與王猛並掌機密九月追復太師魚遵等官以禮改葬子孫存者皆隨才擢敘冬十一月秦太后茍氏遊宣明臺見東海公法之第門車馬輻湊恐終不利於秦王堅乃與李威謀賜法死堅與法訣於東堂慟哭歐血諡曰獻哀公封其子陽為東海公敷為清河公十二月秦王堅行至尚書以文案不治免左丞程卓官以王猛代之堅舉異才修廢職課農桑恤困窮禮百神立學校旌節義繼絶世秦民大恱苻秦滅涼晉穆帝永和九年冬十月西平敬烈公張重華有疾子矅靈才十嵗立為世子赦其境內重華庶兄長寧侯祚有勇力吏幹而傾巧善事內外與重華嬖臣趙長尉緝等結異姓兄弟都尉常據請出之重華曰吾方以祚為周公使輔幼子君是何言也謝艾以枹罕之功有寵於重華左右疾之譛艾出為酒泉太守艾上疏言權幸用事公室將危乞聽臣入侍且言長寧侯祚及趙長等將為亂宜盡逐之十一月己未重華疾甚手令徵艾為衛將軍監中外諸軍事輔政祚長等匿而不宣丁卯重華卒世子曜靈立稱大司馬涼州刺史西平公趙長等矯重華遺令以長寧侯祚為都督中外諸軍事撫軍大將軍輔政冬十二月涼右長史趙長等建議以為時難未夷宜立長君矅靈沖幼請立長寧侯祚張祚先得幸於重華之母馬氏馬氏許之乃廢張曜靈為涼寧侯立祚為大都督大將軍涼州牧涼公祚既得志恣為淫虐殺重華妃裴氏及謝艾十年春正月張祚自稱涼王改建興四十二年為和平元年立妻辛氏為王后子太和為太子封弟天鍚為長寧侯子庭堅為建康侯矅靈弟玄靚為涼武侯置百官郊祀天地用天子禮樂尚書馬岌切諌坐免官郎中丁琪復諫曰我自武公以來世守臣節抱忠履謙五十餘年故能以一州之衆抗舉世之虜師徒歲起民不告疲殿下勳德未髙於先公而亟謀革命臣未見其可也彼士民所以用命四逺所以歸嚮者以吾能奉晉室故也今而自尊則中外離心安能以一隅之地拒天下之強敵乎祚大怒斬之於闕下十一年秋七月涼王祚淫虐無道上下怨憤祚惡河州刺史張瓘之強遣張掖太守索孚代瓘守枹罕使瓘討叛胡又遣其將易揣張玲帥步騎萬三千以襲瓘張掖人王鸞知術數言於祚曰此軍出必不還涼國將危并陳祚三不道祚大怒以鸞為訞言斬以徇鸞臨刑曰我死軍敗於外王死於內必矣祚族滅之瓘聞之斬孚起兵擊祚傳檄州郡廢祚以侯還第復立涼寧侯矅靈易揣張玲軍始濟河瓘擊破之揣等單騎奔還瓘軍躡之姑臧振恐驍騎將軍敦煌宋混兄修與祚有隙懼禍八月混與弟澄西走合衆萬餘人以應瓘還向姑臧祚遣揚秋胡將曜靈於東苑拉其腰而殺之埋於沙坑諡曰哀公九月涼宋混軍于武始大澤為曜靈發哀閏月混軍至姑臧涼王祚收張瓘弟琚及子嵩將殺之琚嵩聞之募市人數百揚言張祚無道我兄大軍已至城東敢舉手者誅三族遂開西門納混兵領軍將軍趙長等懼罪入閣呼張重華母馬氏出殿立涼武侯玄靚為主易揣等引兵入殿收長等殺之祚案劔殿上大呼叱左右力戰祚素失衆心莫肯為之鬪者遂為兵人所殺混等梟其首宣示內外暴尸道左城內咸稱萬嵗以庶人禮葬之并殺其二子混琚上玄靚為大將軍涼州牧西平公赦境內復稱建興四十三年時玄靚始七嵗張瓘至姑臧推玄靚為涼王自為使持節都督中外諸軍事尚書令涼州牧張掖郡公以宋混為尚書僕射隴西人李儼據郡不受瓘命用江東年號衆多歸之瓘遣其將牛霸討之未至西平人衛綝亦據郡叛霸兵潰奔還瓘遣弟琚擊綝敗之酒泉太守馬基起兵以應綝瓘遣司馬張姚王國擊斬之十二年春正月秦征東大將軍晉王柳遣參軍閻負梁殊使於涼以書説涼王玄靚負殊至姑臧張瓘見之曰我晉臣也臣無境外之交二君何以來辱負殊曰晉王與君鄰藩雖山河阻絶風通道會故來修好君何怪焉瓘曰吾盡忠事晉於今六世矣若與苻征東通使是上違先君之志下隳士民之節其可乎負殊曰晉室衰微墜失天命固已久矣是以涼之先王北靣二趙唯知機也今大秦威德方盛涼王若欲自帝河右則非秦之敵欲以小事大則曷若捨晉事秦長保福祿乎瓘曰中州好食言嚮者石氏使車適返而戎騎已至吾不敢信也負殊曰自古帝王居中州者政化各殊趙為姦詐秦敦信義豈得一槩待之乎張先楊初皆阻兵不服先帝討而擒之赦其罪戾寵以爵秩固非石氏之比也瓘曰必如君言秦之威德無敵何不先取江南則天下盡為秦有征東何辱命焉負殊曰江南文身之俗道汚先叛化隆後服主上以為江南必須兵服河右可以義懷故遣行人先申大好若君不逹天命則江南得延數年之命而河右恐非君之土也瓘曰我跨據三州帶甲十萬西苞蔥嶺東距大河伐人有餘況於自守何畏於秦負殊曰貴州山河之固孰若崤函民物之饒孰若秦雍杜洪張琚因趙氏成資兵強財富有囊括關中席卷四海之志先帝戎旗西指冰消雲散旬月之間不覺易主主上若以貴州不服赫然奮怒控弦百萬鼓行而西未知貴州將何以待之瓘笑曰兹事當決之於王非身所了負殊曰涼王雖英睿夙成然年在幼沖君居伊霍之任國家安危繫君一舉耳瓘懼乃以玄靚之命遣使稱藩於秦秦因玄靚所稱官爵而授之升平三年涼州牧張瓘猜忌苛虐專以愛憎為賞罰郎中殷郇諫之瓘曰虎生三日自能食肉不須人教也由是人情不附輔國將軍宋混性忠鯁瓘憚之欲殺混及弟澄因廢涼王玄靚而代之徴兵數萬集姑臧混知之與澄帥壯士楊和等四十餘騎奄入南城宣告諸營曰張瓘謀逆被太后令誅之俄而衆至二千瓘帥衆出戰混擊破之瓘麾下玄臚刺混不能穿甲混擒之瓘衆悉降瓘與弟琚皆自殺混夷其家族玄靚以混為使持節都督中外諸軍事驃騎大將軍酒泉郡侯代瓘輔政混乃請玄靚去涼王之號復稱涼州牧混謂玄臚曰卿刺我幸而不傷今我輔政卿其懼乎臚曰臚受瓘恩唯恨刺節下不深耳竊無所懼混義之任為心膂五年夏四月涼驃騎大將軍宋混疾甚張玄靚及其祖母馬氏往省之曰將軍萬一不幸寡婦孤兒將何所託欲以林宗繼將軍可乎混曰臣子林宗幼弱不堪大任殿下儻未棄臣門臣弟澄政事愈於臣但恐其儒緩機事不稱耳殿下䇿勵而使之可也混戒澄及諸子曰吾家受國大恩當以死報無恃勢位以驕人又見朝臣皆戒之以忠貞及卒行路為之揮涕玄靚以澄為領軍將軍輔政秋九月涼右司馬張雍惡宋澄專政起兵攻澄殺之并滅其族張玄靚以雍為中護軍叔父天錫為中領軍同輔政涼張雍驕矜淫縱樹黨專權多所刑殺國人患之張天錫所親敦煌劉肅謂天鍚曰國家事欲未靜天錫曰何謂也肅曰今護軍出入有似長寧天錫驚曰我固疑之未敢出口計將安出肅曰正當速除之耳天鍚曰安得其人肅曰肅即其人也肅時年未二十天錫曰汝年少更求其助肅曰趙白駒與肅二人足矣十一月天錫與雍俱入朝肅與白駒從天錫值雍於門下肅斫之不中白駒繼之又不克二人與天鍚俱入宫中雍得逸走帥甲士三百餘人攻宫門天錫登屋大呼曰張雍凶逆無道既滅宋氏又欲傾覆我家汝將士世為涼臣何忍以兵相向邪今所取者止張雍耳它無所問於是雍兵悉散走雍自刎死盡滅其族黨玄靚以天錫為使持節冠軍大將軍都督中外諸軍事輔政十二月始改建興四十九年奉升平年號詔以玄靚為大都督督隴右諸軍事涼州刺史護羌校尉西平公哀帝興寧元年秋八月張玄靚祖母馬氏卒尊庶母郭氏為太妃郭氏以張天錫專政與大臣張欽等謀誅之事泄欽等皆死玄靚懼以位讓天錫天錫不受右將軍劉肅等勸天錫自立閏月天錫使肅等夜帥兵入宫弒玄靚宣言暴卒諡曰沖公天錫自稱使持節大都督大將軍涼州牧西平公時年十八尊母劉美人曰太妃遣司馬綸騫奉章詣建康請命并送御史俞歸東還二年夏六月秦王堅遣大鴻臚拜張天錫為大將軍涼州牧西平公海西公太和元年冬十月張天錫遣使至秦境上告絶於秦簡文帝咸安元年秦王堅命王猛為書諭天錫曰昔貴先公稱藩劉石者惟審於強弱也今論涼土之力則損於往時語大秦之德則非二趙之匹而將軍翻然自絶無乃非宗廟之福也歟以秦之威旁振無外可以回弱水使東流返江河使西注關東既平將移兵河右恐非六郡士民所能抗也劉表謂漢南可保將軍謂西河可全吉凶在身元龜不逺宜深算妙慮以求多福無使六世之業一旦而墜地也天錫大懼遣使謝罪稱藩堅拜天錫使持節都督河右諸軍事驃騎大將軍開府儀同三司涼州刺史西平公冬十二月秦以河州刺史李辨領興晉太守還鎮枹罕徙涼州治金城張天錫聞秦有兼并之志大懼立壇於姑臧南刑三牲帥其官屬遙與晉三公盟遣從事中郎韓博奉表送盟文并獻書於大司馬溫期以明年夏同大舉會于上邽武帝太元元年初張天錫之殺張雍也劉肅及安定梁景皆有功二人由是有寵賜姓張氏以為已子使預政事天錫荒于酒色不親庶務黜世子大懷而立嬖妾焦氏之子大豫以焦氏為左夫人人情憤怨從弟從事中郎憲輿櫬切諫不聽秦王堅下詔曰張天錫雖稱藩受位然臣道未純可遣使持節武衛將軍武都茍萇左將軍毛盛中書令梁熙步兵校尉姚萇等將兵臨西河尚書郎閻負梁殊奉詔徵天錫入朝若有違王命即進師撲討是時秦步騎十三萬軍司假鏗謂周虓曰以此衆戰誰能敵之虓曰戎狄以來未之有也堅又命秦州刺史茍池河州刺史李辨涼州刺史王統帥三州之衆為茍萇後繼秋七月閻負梁殊至姑臧張天錫會官屬謀之曰今入朝必不返如其不從秦兵必至將若之何禁中録事席仂曰以愛子為質賂以重寶以退其師然後徐為之計此屈伸之術也衆皆怒曰吾世事晉朝忠節著於海內今一旦委身賊庭辱及祖宗醜莫大焉且河西天險百年無虞若悉境內精兵右招西域北引胸奴以拒之何遽知其不捷也天錫攘袂大言曰孤計決矣言降者斬使謂閻負梁殊曰君欲生歸乎死歸乎殊等辭氣不屈天錫怒縛之軍門命軍士交射之曰射而不中不與我同心者也其母嚴氏泣曰秦主以一州之地橫制天下東平鮮卑南取巴蜀兵不留行所向無敵汝若降之猶可延數年之命今以蕞爾一隅抗衡大國又殺其使者亡無日矣天錫使龍驤將軍馬建帥衆二萬拒秦秦人聞天錫殺閻負梁殊八月梁熙姚萇王統李辨濟自清石津攻涼驍烈將軍梁濟於河會城降之甲申茍萇濟自石城津與梁熙等會攻纒縮城拔之馬建懼自楊非退屯清塞天錫又遣征東將軍掌據帥衆三萬軍于洪池天錫自將餘衆五萬軍于金昌城安西將軍敦煌宋皓言於天錫曰臣晝察人事夜觀天文秦兵不可敵也不如降之天錫怒貶皓為宣威護軍廣武太守辛章曰馬建出於行陳必不為國家用茍萇使姚萇帥甲士三千為前驅庚寅馬建帥萬人迎降餘兵皆散走辛卯茍萇及掌據戰于洪池據兵敗馬為亂兵所殺其屬董儒授之以馬據曰吾三督諸軍再秉節鉞八將禁旅十揔外兵寵任極矣今卒困於此此吾之死地也尚安之乎乃就帳免胄西向稽首伏劒而死秦兵殺軍司席仂癸已秦兵入清塞天錫遣兵司趙充哲帥衆拒之秦兵與充哲戰于赤岸大破之俘斬三萬八千級充哲死天錫出城自戰城內又叛天錫與數千騎奔還姑臧甲午秦兵至姑臧天錫素車白馬靣縛輿櫬降于軍門茍萇釋縛焚櫬送于長安涼州郡縣悉降於秦九月秦王堅以梁熙為涼州刺史鎮姑臧徙豪右七千餘户于關中餘皆按堵如故封天錫為歸義侯拜北部尚書初秦兵之出也先為天錫築第於長安至則居之以天錫晉興太守隴西彭和正為黃門侍郎治中從事武興蘇膺敦煌太守張烈為尚書郎西平太守金城趙凝為金城太守髙昌楊幹為髙昌太守餘皆隨才擢敘符秦滅燕晉穆帝永和九年春二月庚子燕王俊立其妃可足渾氏為皇后世子曄為皇太子皆自龍城遷于薊宫十年夏四月戊申燕主俊命冀州刺史吳王霸徙治信都初燕王皓竒霸之才故名之曰霸將以為世子羣臣諫而止然寵遇猶踰於世子由是俊惡之以其嘗墜馬折齒更名曰缺尋以其應讖文更名曰垂遷侍中録留臺事徙鎮龍城垂大得東北之和俊愈惡之復召還十二年秋七月丙子燕獻太子曄卒升平元年春二月癸丑燕主俊立其子中山王暐為太子二年燕吳王垂娶假末柸女生子令寶假氏才髙性烈自以貴姓不尊事可足渾后可足渾氏銜之燕主俊素不快於垂中常侍涅皓因希旨告假氏及吳國典書令遼東髙弼為巫蠱欲以連汙垂俊收假氏及弼下大長秋廷尉考驗假氏及弼志氣確然終無橈辭掠治日急垂愍之私使人謂假氏曰人生會當一死何堪楚毒如此不若引服假氏歎曰吾豈愛死者邪若自誣以惡逆上辱祖宗下纍於王固不為也辨答益明故垂得免禍而假氏竟死於獄中出垂為平州刺史鎮遼東垂以假氏女弟為繼室可足渾氏黜之以其妹長安君妻垂垂不恱由是益惡之三年春二月燕主俊宴羣臣于蒲池語及周太子晉潸然流涕曰才子難得自景先之亡吾鬢髮中白卿等謂景先何如司徒左長史李績對曰獻懷太子之在東官臣為中庶子太子志業敢不知之太子大德有八至孝一也聰敏二也沈毅三也疾諛喜直四也好學五也多藝六也謙恭七也好施八也俊曰卿譽之雖過然此兒在吾死無憂矣景茂何如時太子暐侍側績曰皇太子天資岐嶷雖八德已聞然二闕未補好遊畋而樂絲竹此其所以為損也俊顧謂暐曰伯陽之言藥石之惠也汝宜誡之暐甚不平俊夢趙主虎齧其臂乃發虎墓求尸不獲購以百金鄴女子李莬知而告之得尸於東明觀下僵而不腐俊踏而罵之曰死胡何敢怖生天子數其殘暴之罪而鞭之投於漳水尸倚橋柱不流及秦滅燕王猛為之誅李莬收而葬之冬十二月辛酉燕主俊寢疾謂大司馬太原王恪曰吾病必不濟今二方未平景茂沖幼國家多難吾欲效宋宣公以社稷屬汝何如恪曰太子雖幼勝殘致治之主也臣實何人敢干王統俊怒曰兄弟之間豈虛飾邪恪曰陛下若以臣能荷天下之任者豈不能輔少主乎俊喜曰汝能為周公吾復何憂李績清方忠亮汝善遇之召吳王垂還鄴四年春正月癸巳燕主俊疾篤召大司馬恪等受遺詔輔政甲午卒戊子太子暐即位年十一大赦改元建熙二月燕人尊可足渾氏為皇太后以太原王恪為太宰專録朝政上庸王評為太傅陽騖為太保慕輿根為太師參輔朝政根性木強自恃先朝勳舊心不服恪舉動倨傲時太后可足渾氏頗預外事根欲為亂乃言於恪曰今主上幼沖母后干政殿下宜防意外之變思有以自全且定天下者殿下之功也兄亡弟及古今成法俟畢山陵宜廢主上為王殿下自踐尊位以為大燕無窮之福恪曰公醉邪何言之悖也吾與公受先帝遺詔云何而遽有此議根愧謝而退恪以告吳王垂垂勸恪誅之恪曰今新遭大喪二鄰觀釁而宰輔自相誅夷恐乖逺近之望且可忍之祕書監皇甫真言於恪曰根本庸豎過蒙先帝厚恩引參顧命而小人無識自國哀已來驕很日甚將成禍亂明公今日居周公之地當為社稷深謀早為之所恪不聽根又言於可足渾氏及燕主暐曰太宰太傅將謀不軌臣請帥禁兵以誅之可足渾氏將從之暐曰二國公之親賢先帝選之託以孤嫠必不肯爾安知非太師欲為亂也乃止根又思戀東土言於可足渾氏及暐曰今天下蕭條外寇非一國大憂深不如還東恪聞之乃與太傅評謀密奏根罪狀使右衛將軍傅顔就內省誅根并其妻子黨與不赦哀帝興寧二年燕侍中慕輿龍詣龍城徙宗廟及所留百官皆詣鄴海西公太和二年夏四月燕太原桓王恪言於燕主暐曰吳王垂將相之才十倍於臣先帝以長幼之次臣得先之臣死之後願陛下舉國以聽吳王五月壬辰恪疾病暐親視之問以後事恪曰臣聞報恩莫大於薦賢賢者雖在板築猶可為相況至親乎吳王文武兼資管蕭之亞陛下若任以大政國家可安不然秦晉必有窺窬之計言終而卒秦王堅聞恪卒隂有圖燕之計欲覘其可否命胸奴曹轂發使如燕朝貢以西戎主簿馮翊郭辨為之副燕司空皇甫真兄腆及從子奮覆皆仕秦腆為散騎常侍辨至燕歷造公卿謂真曰僕本秦人家為秦所誅故寄命曹王貴兄常侍及奮覆兄弟並相知有素真怒曰臣無境外之交此言何以及我君似姧人得無因緣假託乎白暐請窮治之太傅評不許辨還為堅言燕朝政無綱紀實可圖也鑒機識變唯皇甫真耳堅曰以六州之衆豈不得使有智士一人哉曹轂尋卒秦分其部落為二使其二子分統之號東西曹三年初燕太宰恪有疾以燕主暐幼弱政不在已太傅評多猜忌恐大司馬之任不當其人謂暐兄樂安王臧曰今南有遺晉西有強秦二國常蓄進取之志顧我未有隙耳夫國之興衰繫於輔相大司馬總統六軍不可任非其人我死之後以親踈言之當在汝及沖汝曹雖才識明敏然年少未堪多難吳王天資英傑智略超世汝曹若能推大司馬以授之必能混一四海況外寇不足憚也慎無冒利而忘害不以國家為意也又以語太傅評及恪卒評不能用其言三月以車騎將軍中山王沖為大司馬沖暐之弟也以荆州刺史吳王垂為侍中車騎大將軍儀同三司秦鎮東將軍洛州刺史魏公庾據陜城舉兵反以陜城降燕請兵應接秦人大懼盛兵守華隂燕魏尹范陽王德上疏以為先帝應天受命志平六合陛下纂統當繼而成之今苻氏骨肉乖離國分為五投誠請援前後相尋是天以秦賜燕也天與不取反受其殃吳越之事足以觀矣宜命皇甫真引并冀之衆徑趨蒲陜吳王垂引許洛之兵馳解廋圍太傅揔京師虎旅為二軍後繼傳檄三輔示以禍福明立購賞彼必望風嚮應混一之期於此乎在矣時燕人多請救陜因圖關中者太傅評曰秦大國也今雖有難未易可圖朝廷雖明未如先帝吾等智略又非太宰之比但能閉關保境足矣平秦非吾事也魏公廋遣吳王垂及皇甫真箋曰符堅王猛皆人傑也謀為燕患久矣今不乘機取之恐異日燕之君臣將有甬東之悔矣垂謂真曰方今為人患者必在於秦主上富於春秋觀太傅識度豈能敵符堅王猛乎真曰然吾雖知之如言不用何四年晉大司馬溫伐燕下邳王厲與溫戰敗於黃墟燕又使樂安王臧拒溫臧不能抗溫至枋頭暐與太傅評謀奔龍城吳王垂自請擊之又使樂嵩請救于秦許賂以虎牢以西之地秦遣茍池鄧羌帥步騎救燕范陽王德李邽斷溫糧道溫數戰不利糧儲復竭聞秦兵將至棄輜重鎧仗奔還吳王垂追及溫於襄邑大破之溫伐燕事見桓燕秦既結好使者數往來燕散騎侍郎太原郝晷給事黃門侍郎梁琛相繼如秦晷與王猛有舊猛接以平生問晷東方之事晷見燕政不修而秦大治知燕將亡隂欲自託於猛頗泄其實琛至長安秦王堅方畋於萬年欲引見琛琛曰秦使至燕燕之君臣朝服備禮灑掃宫庭然後敢見今秦主欲野見之使臣不敢聞命尚書郎辛徑謂琛曰賔客入境惟主人所以處之君焉得專制其禮且天子稱乘輿所至曰行在所何常居之有又春秋亦有遇禮何為不可乎琛曰晉室不綱靈祚歸德二方承運俱受明命而桓溫猖狂窺我王略燕危秦孤勢不獨立是以秦主同恤時患要結好援東朝君臣引領西望愧其不競以為鄰憂西使之辱敬待有加今強冦既退交聘方始謂宜崇禮篤義以固二國之歡若忽慢使臣是卑燕也豈修好之義乎夫天子以四海為家故行曰乘輿止曰行在今海縣瓜裂天光分曜安得以乘輿行在為言哉禮不期而見曰遇蓋因事權行其禮簡略豈平居容與之所為哉客使單行誠藝屈於主人然茍不以禮亦不敢從也堅乃為之設行官百僚陪位然後延客如燕朝之儀事畢堅與之私宴問東朝名臣為誰琛曰太傅上庸王評明德茂親光輔王室車騎大將軍吳王垂雄略冠世折衝禦侮其餘或以文進或以武用官皆稱職野無遺賢琛從兄奕為秦尚書郎堅使典客館琛於奕舍琛曰昔諸葛瑾為吳聘蜀與諸葛亮惟公朝相見退無私靣余竊慕之今使之即安私室所不敢也乃不果館奕數來就邸舍與琛卧起間問琛東國事琛曰今二方分據兄弟並蒙榮寵論其本心各有所在琛欲言東國之美恐非西國之所欲聞欲言其惡又非使臣之所得論也兄何用問為堅使太子延琛相見秦人欲使琛拜太子先諷之曰鄰國之君猶其君也鄰國之儲君亦何以異乎琛曰天子之子視元士欲其由賤以登貴也尚不敢臣其父之臣况它國之臣乎茍無純敬則禮有往來情豈忘恭但恐降屈為煩耳乃不果拜王猛勸堅留琛堅不許吳王垂自襄邑還鄴威名益振太傅評愈忌之垂奏所募將士忘身立效將軍孫蓋等推鋒陷陳應蒙殊賞評皆抑而不行垂數以為言與評廷爭怨隙愈深太后可足渾氏素惡垂毁其戰功與評密謀誅之太宰恪之子楷及垂舅蘭建知之以告垂曰先發制人但除評及樂安王臧餘無能為矣垂曰骨肉相殘而首亂於國吾有死而已不忍為也頃之二人又以告曰內意已決不可不早發垂曰必不可彌縫吾寧避之於外餘非所議垂內以為憂而未敢告諸子世子令請曰尊比者如有憂色豈非以主上幼沖太傅疾賢功髙望重愈見猜邪垂曰然吾竭力致命以破強寇本欲保全家國豈知成功之後返令身無所容汝既知吾心何以為吾謀令曰主上暗弱委任太傅一旦禍發疾於駭機今欲保族全身不失大義莫若逃之龍城遜辭謝罪以待主上之察若周公之居東庶幾可以感寤而淂還此幸之大者也如其不然則內撫燕代外懷羣夷守肥如之險以自保亦其次也垂曰善十一月辛亥朔垂請畋于大陸因微服出鄴將趨龍城至邯鄲少子辭素不為垂所愛逃還告狀垂左右多亡叛太傅評白燕王暐遣西平公強帥精騎追之及於范陽世子令斷後強不敢逼會日暮令謂垂曰本欲保東都以自全今事已泄謀不及設秦主方招延英傑不如往歸之垂曰今日之計舍此安之乃散騎滅迹傍南山復還鄴隱于趙之顯原陵俄有獵者數百騎四靣而來抗之則不能敵逃之則無路不知所為會獵者鷹皆飛揚衆騎散去垂乃殺白馬以祭天且盟從者世子令言於垂曰太傅忌賢疾能􅌟事以來人尤忿恨今鄴城之中莫知尊處如嬰兒之思母夷夏同之若順衆心襲其無僃取之如指掌耳事定之後革弊簡能大匡朝政以輔主上安國存家功之大者也今日之便誠不可失願給騎數人足以辦之垂曰如汝之謀事成誠為大福不成悔之何及不如西奔可以萬全子馬奴潛謀逃歸殺之而行至河陽為津吏所禁斬之而濟遂自洛陽與假夫人世子令令弟寶農隆兄子楷舅蘭建郎中令髙弼俱奔秦留妃可足渾氏於鄴乙泉戍主吳歸追及於閺鄉世子令擊之而退初秦王堅隂有圖燕之志憚吳王垂不敢發及聞垂至大喜郊迎執手與語乃以垂為冠軍將軍封賔徒侯楷為積弩將軍叛秦復燕事見慕容秦留梁琛月餘乃遣歸琛兼程而進比至鄴吳王垂已奔秦琛言於太傅評曰秦人日閲軍旅多聚糧於陜東以琛觀之為和必不能久今吳王又往歸之秦必有窺燕之謀宜早為之備評曰秦豈肯受叛臣而敗和好哉琛曰今二國分據中原常有相吞之志桓溫之入寇彼以計相救非愛燕也若燕有釁彼豈忘其本志哉評曰秦主何如人琛曰明而善斷問王猛曰名不虛得評皆不以為然琛又以告燕主暐暐亦不然之以告皇甫真真深憂之上疏言苻堅雖聘問相尋然實有窺上國之心非能慕樂德義不忘久要也前出兵洛川及使者繼至國之險易虛實彼皆得之矣今吳王垂又往從之為其謀主伍員之禍不可不僃洛陽太原壺關皆宜選將益兵以防未然暐召太傅評謀之評曰秦國小力弱恃我為援且苻堅庶幾善道終不肯納叛臣之言絶二國之好不宜輕自驚擾以啓冦心卒不為僃秦遣黃門郎石越聘於燕太傅評示之以奢欲以誇燕之富盛髙泰及太傅參軍河間劉靖言於評曰越言誕而視逺非求好也乃觀釁也宜耀兵以示之用折其謀今乃示之以奢益為其所輕矣評不從泰遂謝病歸是時太后可足渾氏侵撓國政太傅評貪昧無厭貨賂上流官非才舉羣下怨憤尚書左丞申紹上疏以為守宰者致治之本今之守宰率非其人或武人出於行伍或貴戚生長綺紈既非鄉曲之選又不更朝廷之職加之黜陟無法貪惰者無刑罰之懼清修者無旌賞之勸是以百姓困弊寇盜充斥綱頽紀紊莫相紏攝又官吏猥多踰於前世公私紛然不勝煩擾大燕戶口數兼二寇弓馬之徑四方莫及而比者戰則屢北皆由守宰賦調不平侵漁無已行留俱窘莫肯致命故也後宫之女四千餘人僮侍厮役尚在其外一日之費厥直萬金士民承風競為奢靡彼秦吳僣僻猶能條治所部有兼并之心而我上下因循日失其序我之不修彼之願也謂宜精擇守宰併官省職存恤兵家使公私兩遂節抑浮靡愛惜用度賞必當功罰必當罪如此則溫猛可梟二方可取豈特保境安民而已哉又索頭什翼犍疲病昏悖雖乏貢御無能為患而勞兵逺戍有損無益不若移於并土控制西河南堅壺關北重晉陽西寇來則拒守過則斷後猶愈於戍孤城守無用之地也疏奏不省初燕人許割虎牢以西賂秦晉兵既退燕人悔之謂秦人曰行人失辭有國有家者分災救患理之常也秦王堅大怒遣輔國將軍王猛建威將軍梁成洛州刺史鄧羌帥步騎三萬伐燕十二月進攻洛陽五年春正月秦王猛遺燕荆州刺史武威王築書曰國家今已塞成臯之險杜盟津之路大駕虎旅百萬自軹關取鄴都金墉窮戍外無救援城下之師將軍所監豈三百弊卒所能支也築懼以洛陽降猛陳師受之燕衛大將軍樂安王臧城新樂破秦兵于石門執秦將楊猛王猛之發長安也請慕容令參其軍事以為鄉導將行造慕容垂飲酒從容謂垂曰今當逺别卿何以贈我使我覩物思人垂脫佩刀贈之猛至洛陽賂垂所親金熙使詐為垂使者謂令曰吾父子來此以逃死也今王猛疾人如讎讒毁日深秦主雖外相厚善其心難知丈夫逃死而卒不免將為天下笑吾聞東朝比來始更悔寤主后相尤吾今還東故遣告汝吾已行矣便可速發令疑之躊躇終日又不可審覆乃將舊騎詐為出獵遂奔樂安王臧於石門猛表令叛狀垂懼而出走及藍田為追騎所獲秦王堅引見東堂勞之曰卿家國失和委身投朕賢子心不忘本猶懷首丘亦各其志不足深咎然燕之將亡非令所能存惜其徒入虎口耳且父子兄弟罪不相及卿何為過懼而狼狽如是乎待之如舊燕人以令叛而復還其父為秦所厚疑令為反間徙之沙城在龍都東北六百里臣光曰昔周得微子而革商命秦得由余而霸西戎吳得伍員而克強楚漢得陳平而誅項籍魏得許攸而破袁紹彼敵國之材臣來為己用進取之良資也王猛知慕容垂之心久而難信獨不念燕尚未滅垂以材髙功盛無罪見疑窮困歸秦未有異心遽以猜忌殺之是助燕為無道而塞來者之門也如何其可哉故秦王堅禮之以收燕望親之以盡燕情寵之以傾燕衆信之以結燕心未為過矣猛何汲汲於殺垂至乃為市井鬻賣之行有如嫉其寵而讒之者豈雅德君子所宜為哉樂安王臧進屯滎陽王猛遣建威將軍梁成洛州刺史鄧羌擊走之留羌鎮金墉以輔國司馬桓寅為弘農太守代羌戍陜城而還秦王堅以王猛為司徒録尚書事封平陽郡侯猛固辭曰今燕吳未平戎車方駕而始得一城即受三事之賞若克殄二寇將何以加之堅曰茍不暫抑朕心何以顯卿謙光之美已詔有司權聽所守封爵酬庸其勉從朕命秦王堅復遣王猛督鎮南將軍楊安等十將步騎六萬以伐燕夏六月乙卯秦王堅送王猛於灞上曰今委卿以關東之任當先破壺關平上黨長驅取鄴所謂疾雷不及掩耳吾當親督萬衆繼卿星發舟車糧運水陸俱進卿勿以為後慮也猛曰臣仗威靈奉成算蕩平殘胡如風掃葉願不煩鑾輿親犯塵霧但願速敕所司部置鮮卑之所堅大恱秋七月秦王猛攻壷關楊安攻晉陽八月燕主暐命太傅上庸王評將中外精兵三十萬以拒秦暐以秦冦為憂召散騎侍郎李鳯黃門侍郎梁琛中書侍郎樂嵩問曰秦兵衆寡何如今大軍既出秦能戰乎鳯曰秦國小兵弱非王師之敵景略常才又非太傅之比不足憂也琛嵩曰勝敗在謀不在衆寡秦逺來為寇安肯不戰且吾當用謀以求勝豈可冀其不戰而已乎暐不恱王猛克壺關執上黨太守南安王越所過郡縣皆望風降附燕人大震秦楊安攻晉陽晉陽兵多糧足久之未下王猛留屯騎校尉茍長戍壺關引兵助安攻晉陽為地道使虎牙將軍張蚝帥壯士數百潛入城中大呼斬關納秦兵辛巳猛安入晉陽執燕并州刺史東海王莊太傳評畏猛不敢進屯於潞川冬十月辛亥猛留將軍武都毛當戍晉陽進兵潞川與慕容評相持壬戍猛遣將軍徐成覘燕軍形要期以日中及昏而返猛怒將斬之鄧羌請之曰今賊衆我寡詰朝將戰成大將也宜且宥之猛曰若不殺成軍法不立羌固請曰成羌之郡將也雖違期應斬羌願與成效戰以贖之猛弗聽羌怒還營嚴鼓勒兵將攻猛猛問其故羌曰受詔討逺賊今有近賊自相殺欲先除之猛謂羌義而有勇使語之曰將軍止吾今赦之成既免羌詣猛謝猛執其手曰吾試將軍耳將軍於部將尚爾況國家乎吾不復憂賊矣太傅評以猛懸軍深入欲以持久制之評為人貪鄙鄣固山泉鬻樵及水積財帛如丘陵士卒怨憤莫有鬭志猛聞之笑曰慕容評真奴才雖億兆之衆不足畏況數十萬乎吾今兹破之必矣乃遣遊擊將軍郭慶帥騎五千夜從間道出評營後燒評輜重火見鄴中燕主暐懼遣侍中蘭伊讓評曰王髙祖之子也當以宗廟社稷為憂奈何不撫戰士而榷賣樵水專以殖貨為心乎府庫之積朕與王共之何憂於貧若賊兵遂進家國喪亡王持錢帛欲安所置之乃命悉以其錢帛散之軍士且趨使戰評大懼遣使請戰於猛甲子猛陳於渭源而誓之曰王景略受國厚恩任兼內外今與諸君深入賊地當竭力致死有進無退共立大功以報國家受爵明君之朝稱觴父母之室不亦美乎衆皆踊躍破釡棄糧大呼競進猛望燕兵之衆謂鄧羌曰今日之事非將軍不能破勍敵成敗之機在兹一舉將軍勉之羌曰若能以司隸見與者公勿以為憂猛曰此非吾所及也必以安定太守萬户侯相處羌不恱而退俄而兵交猛召羌羌寢弗應猛馳就許之羌乃大飲帳中與張蚝徐成等跨馬運矛馳赴燕陳出入數四旁若無人所殺傷數百及日中燕兵大敗俘斬五萬餘人乘勝追擊所殺及降者又十萬餘人評單騎走還鄴崔鴻曰鄧羌請郡將以橈法徇私也勒兵欲攻王猛無上也臨戰豫求司隸邀君也有此三者罪孰大焉猛能容其所短收其所長若馴猛虎馭悍馬以成大功詩云采葑采菲無以下體猛之謂矣秦兵長驅而東丁卯圍鄴猛上疏稱臣以甲子之日大殱醜類順陛下仁愛之志使六州士庶不覺易主自非守迷違命一無所害秦王堅報之曰將軍役不踰時而元惡克舉勳髙前古朕今親帥六軍星言電赴將軍其休養將士以待朕至然後取之猛之未至也鄴旁剽劫公行及猛至逺近帖然號令嚴明軍無私犯法簡政寬燕民各安其業更相謂曰不圖今日復見太原王猛聞之歎曰慕容玄恭信竒士也可謂古之遺愛矣設太牢以祭之十一月秦王堅留李威輔太子守長安陽平公融鎮洛陽自帥精鋭十萬赴鄴七日而至安陽宴祖父時故老猛潛如安陽謁堅堅曰昔周亞夫不迎漢文帝今將軍臨敵而棄軍何也猛曰亞夫前却人主以求名臣竊少之且臣奉陛下威靈擊垂亡之虜譬如釡中之魚何足慮也監國沖幼鑾駕逺臨脫有不虞悔之何及陛下忘臣灞上之言邪初燕冝都王桓帥衆萬餘屯沙亭為太傅評後繼聞評敗引兵屯內黃堅使鄧羌攻信都丁丑桓帥鮮卑五千奔龍城戊寅燕散騎侍郎餘蔚帥扶餘髙句麗及上黨質子五百餘人夜開鄴北門納秦兵燕主暐與上庸王評樂安王臧定襄王淵左衛將軍孟髙殿中將軍艾朗等奔龍城辛巳秦王堅入鄴宫燕主暐之出鄴也衛士猶千餘騎既出城皆散惟十餘騎從行秦王堅使遊擊將軍郭慶追之時道路艱難孟髙扶侍暐經護二王極其勒瘁又所在遇盜轉鬪而前數日行至福祿依冢解息盜二十餘人猝至皆挾弓矢髙持刀與戰殺傷數人髙力極自度必死乃直前抱一賊頓擊於地大呼曰男兒窮矣餘賊從旁射髙殺之艾朗見髙獨戰亦還趨賊并死暐失馬步走郭慶追及於髙陽部將巨武將縳之暐曰汝何小人敢縳天子武曰我受詔追賊何謂天子執以詣秦王堅堅詰其不降而走之狀對曰狐死首丘欲歸死於先人墳墓耳堅哀而釋之令還宫帥文武出降暐稱孟髙艾朗之忠於堅堅命厚加斂葬拜其子為郎中郭慶進至龍城太傅評奔髙句麗髙句麗執評送於秦冝都王桓殺鎮東將軍渤海王亮并其衆奔遼東遼東太守韓稠先已降秦桓至不得入攻之不克郭慶遣將軍朱嶷擊之桓棄衆單走嶷獲而殺之諸州牧守及六夷渠帥盡降於秦凡得郡百五十七户二百四十六萬口九百九十九萬以燕宫人珍寶分賜將士下詔大赦曰朕以寡薄猥承休命不能懷逺以德柔服四維至使戎車屢駕有害斯民雖百姓之過然亦朕之罪也其大赦天下與之更始初梁琛之使秦也以侍輦茍純為副琛每應對不先告純純恨之歸言於燕主暐曰琛在長安與王猛甚親善疑有異謀琛又數稱秦王堅及王猛之美且言秦將興師冝為之備已而秦果伐燕皆如琛言暐乃疑琛知其情及慕容評敗遂收琛繫獄秦王堅入鄴而釋之除中書著作郎引見謂之曰卿昔言上庸王吳王皆將相竒材何為不能謀畫自使亡國對曰天命廢興豈二人所能移也堅曰卿不能見幾而作虛稱燕美忠不自防返為身禍可謂智乎對曰臣聞幾者動之微吉凶之先見者也如臣愚暗實所不及然為臣莫如忠為子莫如孝自非有一至之心者莫能保忠孝之始終是以古之烈士臨危不改見死不避以徇君親彼知幾者心逹安危身擇去就不顧家國臣就使知之尚不忍為況非所及邪堅聞恱綰之忠恨不及見拜其子為郎中堅以王猛為使持節都督關東六州諸軍事車騎大將軍開府儀同三司冀州牧鎮鄴進爵清河郡侯悉以慕容評第中之物賜之賜楊安爵博平縣侯以鄧羌為持節征虜將軍安定太守賜爵真定郡侯郭慶為持節都督幽州諸軍事幽州刺史鎮薊賜爵襄城矦其餘將士封賞各有差堅以京兆韋鍾為魏郡太守彭豹為陽平太守其餘州縣牧守令長皆因舊而授之以燕常山太守申紹為散騎侍郎使與散騎侍郎京兆韋儒俱為繡衣使者循行關東州郡觀省風俗勸課農桑振恤窮困收葬死亡旌顯節行燕政有不便於民者皆變除之十二月秦王堅遷慕容暐及燕后妃王公百官并鮮卑四萬餘户于長安王猛表留梁琛為主簿領記室督它日猛與僚屬宴語及燕朝使者猛曰人心不同昔梁君至長安專美本朝樂君但言桓溫軍盛郝君微説國弊參軍馮誕曰今三子皆為國臣敢問取臣之道何先猛曰郝君知幾為先誕曰然則明公賞丁公而誅季市也猛大笑秦王堅自鄴如枋頭宴父老改枋頭為永昌復之終世甲寅至長安封慕容暐為新興侯以燕故臣慕容評為給事中皇甫真為奉車都尉李洪為駙馬都尉皆奉朝請李邽為尚書封衡為尚書郎慕容德為張掖太守燕國平睿為宣威將軍悉羅騰為三署郎其餘封授各有差衡裕之子也簡文帝咸安二年春二月冠軍將軍慕容垂言於秦王堅曰臣叔父評燕之惡來革也不宜復汚聖朝願陛下為燕戮之堅乃出評為范陽太守燕之諸王悉補邊郡臣光曰古之人滅人之國而人恱何哉為人除害故也彼慕容評者蔽君專政忌賢疾功愚暗貪虐以喪其國國亡不死逃遁見擒秦王堅不以為誅首又從而寵秩之是愛一人而不愛一國之人也其失人心多矣是以施恩於人而人莫之恩盡誠於人而人莫之誠卒於功名不遂容身無所由不得其道故也通鑑紀事本末卷第十五
