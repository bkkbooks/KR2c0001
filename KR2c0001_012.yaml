body:
  text: 西晉之亂江左中興附賈氏諸王胡羯魏元帝咸熙元年初晉王娶王肅之女生炎及攸以攸繼景王後攸性孝友多材藝清和平允名聞過於炎晉王愛之常曰天下者景王之天下也吾攝居相位百年之後大業宜歸攸炎立髮委地手垂過膝嘗從容問裴秀曰人有相否因以異相示之秀由是歸心羊琇與炎善為炎畫䇿察時政所宜損益皆令炎豫記之以備晉王訪問晉王欲以攸為世子山濤曰廢長立少違禮不祥賈充曰中撫軍有君人之德不可易也何曽裴秀曰中撫軍聰明神武有超世之才人望既茂天表如此固非人臣之相也晉王由是意定丙午立炎為世子晉武帝泰始元年五月魏帝加文王殊禮進王妃曰后世子曰太子秋八月辛卯文王卒太子嗣為晉王冬十二月壬戌魏帝禪位于晉丙寅王即皇帝位丁卯封皇叔祖父孚為安平王叔父幹為平原王亮為扶風王胄為東莞王駿為汝隂王肜為梁王倫為琅邪王弟攸為齊王鑒為樂安王機為燕王又封羣從司徒望等十七人皆為王帝懲魏氏孤立之敝故大封宗室授以職任又詔諸王皆得自選國中長吏衛將軍齊王攸獨不敢皆令上請三年春正月丁卯立子衷為皇太子七年侍中尚書令車騎將軍賈充自文帝時寵任用事帝之為太子充頗有力故益有寵於帝充為人巧諂與太尉行太子太傅荀顗侍中中書監荀勗越騎校尉安平馮紞相為黨友朝野惡之帝問侍中裴楷以方今得失對曰陛下受命四海承風所以未比德於堯舜者但以賈充之徒尚在朝耳宜引天下賢人與弘政道不宜示人以私侍中樂安任愷河南尹潁川庾純皆與充不協充欲解其近職乃薦愷忠貞宜在東宫帝以愷為太子少傅而侍中如故會樹機能亂秦雍帝以為憂愷曰宜得威望重臣有智略者以鎮撫之帝曰誰可者愷因薦充純亦稱之秋七月癸酉以充為都督秦涼二州諸軍事侍中車騎將軍如故充患之冬十一月賈充將之鎮公卿餞於夕陽亭充私問計於荀勗勗曰公為宰相乃為一夫所制不亦鄙乎然是行也辭之實難獨有結婚太子可不辭而自留矣充曰然孰可寄懷勗曰勗請言之因謂馮紞曰賈公遠出吾等失藝太子婚尚未定何不勸帝納賈公之女乎紞亦然之初帝將納衛瓘女為太子妃充妻郭槐賂楊后左右使后説帝求納其女帝曰衛公女有五可賈公女有五不可衛氏種賢而多子美而長白賈氏種妬而少子醜而短黑后固以為請荀顗荀勗馮紞皆稱充女絶美且有才德帝遂從之留充復居舊任八年春二月辛卯皇太子納賈妃妃年十五長於太子二歲妬忌多權詐太子嬖而畏之秋七月以賈充為司空侍中尚書令領兵如故十年秋七月丙寅皇后楊氏殂初帝以太子不慧恐不堪為嗣常密以訪后后曰立子以長不以賢豈可動也鎮軍大將軍胡奮女為貴嬪有寵於帝后疾篤恐帝立貴嬪為后致太子不安枕帝膝泣曰叔父駿女芷有德色願陛下以備六宫帝流涕許之咸寧二年初齊王攸有寵於文帝每見攸輒撫牀呼其小字曰此桃符座也幾為太子者數矣臨終為帝敘漢淮南王魏陳思王事而泣執攸手以授帝太后臨終亦流涕謂帝曰桃符性急而汝為兄不慈我若不起必恐汝不能相容以是屬汝勿忘我言及帝疾甚朝野皆屬意於攸攸妃賈充之長女也河南尹夏侯和謂充曰卿二壻親踈等耳立人當立德充不答攸素惡荀勗及左衛將軍馮紞傾諂勗乃使紞説帝曰陛下前日疾若不愈齊王為公卿百姓所歸太子雖欲髙讓其得免乎宜遣還藩以安社稷帝隂納之乃徙和為光祿勳奪充兵權而位遇無替冬十月丁卯立皇后楊氏大赦后元皇后之從妹也美而有婦德帝初聘后后叔父珧上表曰自古一門二后未有能全其宗者乞藏此表於宗廟異日如臣之言得以免禍帝許之十二月以后父鎮軍將軍駿為車騎將軍封臨晉侯尚書禇䂮郭奕皆表駿小器不可任社稷之重帝不從駿驕傲自得胡奮謂駿曰卿恃女更益豪邪歷觀前世與天家婚未有不滅門者但早晚事耳駿曰卿女不在天家乎奮曰我女與卿女作婢耳何能為損益乎三年秋七月衛將軍楊珧等建議以為古者封建諸侯所以藩衛王室今諸王公皆在京師非扞城之義又異姓諸將居邊宜參以親戚帝乃詔諸王各以户邑多少為三等大國置三軍五千人次國二軍三千人小國一軍一千一百人諸王為都督者各徙其國使相近八月癸亥徙扶風王亮為汝南王出為鎮南大將軍都督豫州諸軍事琅邪王倫為趙王督鄴城守事勃海王輔為太原王監并州諸軍事以東莞王胄在徐州徙封琅邪王汝隂王駿在關中徙封扶風王又徙太原王顒為河間王汝南王東為南陽王輔孚之子顒孚之孫也其無官者皆遣就國諸王公戀京師皆涕泣而去又封皇子瑋為始平王允為濮陽王該為新都王遐為清河王其異姓之臣有大功者皆封郡公郡侯四年冬十月徴征北大將軍衛瓘為尚書令是時朝野咸知太子昏愚不堪為嗣瓘每欲陳啓而未敢發會侍宴陵雲臺瓘陽醉跪帝牀前曰臣欲有所啓帝曰公所言何邪瓘欲言而止者三因以手撫牀曰此座可惜帝意悟因謬曰公真大醉邪瓘於此不復有言帝悉召東宫官屬為設宴會而密封尚書疑事令太子決之賈妃大懼倩外人代對多引古義給使張泓曰太子不學陛下所知而答詔多引古義必責作草主更益譴負不如直以意對妃大喜謂泓曰便為我好答冨貴與汝共之泓即具草令太子自寫帝省之甚悅先以示瓘瓘大踧踖衆人乃知瓘嘗有言也賈充密遣人語妃云衛瓘老奴幾破汝家太康元年侍御史郭欽上疏請徙內郡羌胡鮮卑於邊地帝不聽胡之叛事見羌二年帝既平吳頗事遊宴怠於政事掖庭殆將萬人后父楊駿及弟珧濟始用事交通請謁藝傾內外時人謂之三楊舊臣多被踈退山濤數有規諷帝雖知而不能改三年春正月帝喟然問司隸校尉劉毅曰朕可方漢之何帝對曰桓靈帝曰何至於此對曰桓靈賣官錢入官庫陛下賣官錢入私門以此言之殆不如也帝大笑曰桓靈之世不聞此言今朕有直臣固為勝之尚書張華以文學才識名重一時論者皆謂華宜為三公中書監荀朂侍中馮紞以伐吳之謀深疾之會帝問華誰可託後事者華對以明德至親莫如齊王由是忤旨朂因而譛之甲午以華都督幽州諸軍事齊王攸德望日隆荀朂馮紞楊珧皆惡之紞言於帝曰陛下詔諸侯之國宜從親者始親者莫如齊王今獨留京師可乎勗曰百僚內外皆歸心齊王陛下萬歲後太子不得立矣陛下試詔齊王之國必舉朝以為不可則臣言驗矣帝以為然冬十二月甲申詔曰古者九命作伯或入毗朝政或出御方嶽其揆一也侍中司空齊王攸佐命立勳劬勞王室其以為大司馬都督青州諸軍事侍中如故仍加崇典禮主者詳案舊制施行以汝南王亮為太尉録尚書事領太子太傅光祿大夫山濤為司徒尚書令衛瓘為司空征東大將軍王渾上書以為攸至親盛德侔於周公宜贊皇朝與聞政事今出攸之國假以都督虛號而無典戎幹方之實虧友于欵篤之義懼非陛下追述先帝文明太后待攸之宿意也若以同姓寵之太厚則有吳楚逆亂之謀漢之吕霍王氏皆何人也歷觀古今茍事之輕重所在無不為害唯當任正道而求忠良耳若以智計猜物雖親見疑至於踈者庸可保乎愚以為太子太保缺宜留攸居之與汝南王亮楊珧共幹朝事三人齊位足相持正既無偏重相傾之藝又不失親親仁覆之恩計之盡善者也於是扶風王駿光祿大夫李喜中護軍羊琇侍中王濟甄德皆切諫帝並不從濟使其妻常山公主及德妻長廣公主俱入稽顙涕泣請帝留攸帝怒謂侍中王戎曰兄弟至親今出齊王自是朕家事而甄德王濟連遣婦來生哭人邪乃出濟為國子祭酒德為大鴻臚羊琇與北軍中候成粲謀見楊珧手刃殺之珧知之辭疾不出諷有司奏琇左遷太僕琇憤怨發病卒李喜亦以年老遜位卒於家四年春正月帝命太常議崇錫齊王之物博士庾敷太叔廣劉暾繆蔚郭頥秦秀傅珍上表曰昔周選建明德以左右王室周公康叔聃季皆入為三公明股肱之任重守地之位輕也漢諸王侯位在丞相三公上其入讚朝政者乃有兼官其出之國亦不復假台司虛名為隆寵也今使齊王賢邪則不宜以母弟之親尊居魯衛之常職不賢邪不宜大啓土宇表建東海也古禮三公無職坐而論道不聞以方任嬰之惟宣王救急朝夕然後命召穆公征淮夷故其詩曰徐方不回王曰旋歸宰相不得久在外也今天下已定六合為家將數延三事與論太平之基而更出之去王城二千里違舊章矣敷純之子暾毅之子也敷既具草先以呈純純不禁事過太常鄭默博士祭酒曹志志愴然歎曰安有如此之才如此之親不得樹本助化而遠出海隅晉室之隆其殆矣乎乃奏議曰古之夾輔王室同姓則周公異姓則太公皆身居朝廷五世反葬及其衰也雖有五霸代興豈與周召之治同日而論哉自羲皇以來豈一姓所能獨有當推至公之心與天下共其利害乃能享國久長是以秦魏欲獨擅其權而才得沒身周漢能分其利而親踈為用此前事之明驗也志以為當如博士等議帝覽之大怒曰曹志尚不明吾心況四海乎且謂博士不答所問而答所不問橫造異論下有司䇿免鄭默於是尚書朱整禇䂮等奏志等侵官離局迷罔朝廷崇飾惡言假託無諱請收志等付廷尉科罪詔免志官以公還第其餘皆付廷尉科罪庾純詣廷尉自首敷以議草見示愚淺聽之詔免純罪廷尉劉頌奏敷等大不敬當棄市尚書奏請報聽廷尉行刑尚書夏侯駿曰官立八座正為此時乃獨為駮議左僕射下邳王晃亦從駿議奏留中七日乃詔曰敷是議主應為戮首但敷家人自首宜并廣等七人皆丏其死命並除名二月詔以濟南郡益齊國己丑立齊王攸子長樂亭侯實為北海王命攸備物典䇿設軒轅之樂六佾之舞黃鉞朝車乘輿之副從焉三月齊獻王攸憤怨發病乞守先后陵帝不許遣御醫診視諸醫希旨皆言無疾河南尹向雄諌曰陛下子弟雖多然有德望者少齊王卧居京邑所益實深不可不思也帝不納雄憤恚而卒攸疾轉篤帝猶催上道攸自強入辭素持容儀疾雖困尚自整厲舉止如常帝益疑其無疾辭出數日歐血而薨帝往臨喪攸子囧號踴訴父病為醫所誣詔即誅醫以冏為嗣初帝愛攸甚篤為荀勗馮紞等所構欲為身後之慮故出之及薨帝哀慟不已馮紞侍側曰齊王名過其實天下歸之今自薨殞社稷之福也陛下何哀之過帝收淚而止詔攸喪禮依安平獻王故事攸舉動以禮鮮有過事雖帝亦敬憚之每引之同處必擇言而後發十年帝極意聲色遂至成疾楊駿忌汝南王亮排出之冬十一月甲申以亮為侍中大司馬假黃鉞大都督督豫州諸軍事鎮許昌徙南陽王柬為秦王都督關中諸軍事始平王瑋為楚王都督荆州諸軍事濮陽王允為淮南王都督楊江二州諸軍事並假節之國立皇子乂為長沙王潁為成都王晏為吳王熾為豫章王演為代王皇孫遹為廣陵王又封淮南王子迪為漢王楚王子儀為毗陵王徙扶風王暢為順陽王暢弟歆為新野公暢駿之子也琅邪王覲弟淡為東武公繇為東安公覲胄之子也初帝以才人謝玖賜太子生皇孫遹宫中嘗夜失火帝登樓望之遹年五歲牽帝𥚑入暗中曰暮夜倉猝宜備非常不可令照見人主帝由是竒之嘗對羣臣稱遹似宣帝故天下咸歸仰之帝知太子不才然恃遹明慧故無廢立之心復用王佑之謀以太子母弟柬瑋允分鎮要害又恐楊氏之逼復以佑為北軍中候典禁兵帝為皇孫遹髙選僚佐以散騎常侍劉實志行清素命為廣陵王傳惠帝永熙元年春三月帝疾篤未有顧命勳舊之臣多已物故侍中車騎將軍楊駿獨侍疾禁中大臣皆不得在左右駿因輒以私意改易要近樹其心腹會帝小間見其新所用者正色謂駿曰何得便爾時汝南王亮尚未發乃令中書作詔以亮與駿同輔政又欲擇朝士有聞望者數人佐之駿從中書借詔觀之得便藏去中書監華廙恐懼自往索之終不與會帝復迷亂皇后奏以駿輔政帝頷之夏四月辛丑皇后召華廙及中書令何劭口宣帝旨作詔以駿為太尉太子太傅都督中外諸軍事侍中録尚書事詔成后對廙劭以呈帝帝視而無言廙歆之孫劭曽之子也遂趨汝南王亮赴鎮帝尋小間問汝南王來未左右言未至帝遂困篤己酉崩于含章殿帝宇量弘厚明達好謀容納直言未嘗失色於人太子即皇帝位大赦改元尊皇后曰皇太后立妃賈氏為皇后楊駿入居太極殿梓宫將殯六宫出辭而駿不下殿以虎賁百人自衛詔石鑒與中護軍張劭監作山陵汝南王亮畏駿不敢臨喪哭於大司馬門外出營城外表求過葬而行或告亮欲舉兵討駿者駿大懼白太后令帝為手詔與石鑒張劭使帥陵兵討亮劭駿甥也即帥所領趨鑒速發鑒以為不然保持之亮問計於廷尉何勗勗曰今朝野皆歸心於公公不討人而畏人討邪亮不敢發夜馳赴許昌乃得免駿弟濟及甥河南尹李斌皆勸駿留亮駿不從濟謂尚書左丞傅咸曰家兄若徴大司馬退身避之門户庶幾可全咸曰宗室外戚相恃為安但召大司馬還共崇至公以輔政無為避也濟又使侍中石崇見駿言之駿不從五月辛未葬武帝于峻陽陵楊駿自知素無美望欲依魏明帝即位故事普進封爵以求媚於衆左軍將軍傅祗與駿書曰未有帝王始崩臣下論功者也駿不從祗嘏之子也丙子詔中外羣臣皆增位一等預喪事者增二等二千石已上皆封關中侯復租調一年散騎常侍石崇散騎侍郎何攀共上奏以為帝正位東宫二十餘年今承大業而班賞行爵優於泰始革命之初及諸將平吳之功輕重不稱且大晉卜世無窮今之開制當垂于後若有爵必進則數世之後莫非公侯矣不從詔以太尉駿為太傅大都督假黃鉞録朝政百官總己以聽傅咸謂駿曰諒暗不行久矣今聖上謙沖委政於公而天下不以為善懼明公未易當也周公大聖猶致流言況聖上春秋非成王之年乎竊謂山陵既畢明公當審思進退之宜茍有以察其忠款言豈在多駿不從咸數諫駿駿漸不平欲出咸為郡守李斌曰斥逐正人將失人望乃止楊濟遺咸書曰諺云生子癡了官事官事未易了也想慮破頭故具有白咸復書曰衛公有言酒色殺人甚於作直坐酒色死人不為悔而逆畏以直致禍此由心不能正欲以苟且為明哲耳自古以直致禍者當由矯柱過正或不忠篤欲以亢厲為聲故致忿耳安有悾悾忠益而返見怨疾乎楊駿以賈后險悍多權略忌之故以其甥假廣為散騎常侍管機密張劭為中護軍典禁兵凡有詔命帝省訖入呈太后然後行之駿為政嚴碎專愎中外多惡之馮翊太守孫楚謂駿曰公以外戚居伊霍之任當以至公誠信謙順處之今宗室強盛而公不與共參萬機內懷猜忌外樹私昵禍至無日矣駿不從楚資之孫也弘訓少府蒯欽駿之姑子也數以直言犯駿它人皆為之懼欽曰楊文長雖暗猶知人之無罪不可妄殺不過踈我我得踈乃可以免不然與之俱族矣駿辟胸奴東部人王彰為司馬彰逃避不受其友新興張宣子怪而問之彰曰自古一姓二后未有不敗況楊太傅昵近小人踈逺君子專權自恣敗無日矣吾踰海出塞以避之猶恐及禍奈何應其辟乎且武帝不惟社稷大計嗣子既不克負荷受遺者復非其人天下之亂可立待也秋八月壬午立廣陵王遹為皇太子以中書監何劭為太子太師衛尉裴楷為少師吏部尚書王戎為太傅前太常張華為少傅衛將軍楊濟為太保尚書和嶠為少保拜太子母謝氏為淑媛賈后常置謝氏於别室不聽與太子相見初和嶠嘗從容言於武帝曰皇太子有淳古之風而末世多偽恐不了陛下家事武帝默然後與荀勗等同侍武帝武帝曰太子近入朝差長進卿可俱詣之粗及世事既還勗等並稱太子明識雅度誠如明詔嶠曰聖質如初武帝不恱而起及帝即位嶠從太子遹入朝賈后使帝問曰卿昔謂我不了家事今日定如何嶠曰臣昔事先帝曽有斯言言之不效國之福也元康元年初賈后之為太子妃也嘗以妬手殺數人又以戟擲孕妾子隨刃墯武帝大怒修金墉城將廢之荀勗馮紞楊珧及充華趙粲共營救之曰賈妃年少妬者婦人常情長自當差楊后曰賈公閭有大勳於社稷妃親其女正復妬忌豈可遽忘其先德邪妃由是得不廢后數誡厲妃妃不知后之助已返以后為􅌟已於武帝更恨之及帝即位賈后不肯以婦道事太后又欲干預政事而為太傅駿所抑殿中中郎渤海孟觀李肇皆駿所不禮也隂􅌟駿云將危社稷黃門董猛素給事東宫為寺人監賈后密使猛與觀肇謀誅駿廢太后又使肇報汝南王亮使舉兵討駿亮不可肇報都督荆州諸軍事楚王瑋瑋欣然許之乃求入朝駿素憚瑋勇鋭欲召之而未敢因其來朝遂聽之二月癸酉瑋及都督楊州諸軍事淮南王允來朝三月辛卯孟觀李肇啓帝夜作詔誣駿謀反中外戒嚴遣使奉詔廢駿以侯就第命東安公繇帥殿中四百人討駿楚王瑋屯司馬門以淮南相劉頌為三公尚書屯衛殿中假廣跪言於帝曰楊駿孤公無子豈有反理願陛下審之帝不答時駿居曹爽故府在武庫南聞內有變召衆官議之太傅主簿朱振説駿曰今內有變其趣可知必是閹豎為賈后設謀不利於公宜燒雲龍門以脅之索造事者首開萬春門引東宫及外營兵擁皇太子入宫取姦人殿內振懼必斬送之不然無以免難駿素怯懦不決乃曰雲龍門魏明帝所造功費甚大奈何燒之侍中傅祗白駿請與尚書武茂入宫觀察事藝因謂羣僚曰宫中不宜空遂揖而下階衆皆走茂猶坐祗顧曰君非天子臣邪今內外隔絶不知國家所在何得安坐茂乃驚起駿黨左軍將軍劉豫陳兵在門遇右軍將軍裴頠問太傅所在頠紿之曰向於西掖門遇公乘素車從二人西出矣豫曰吾何之頠曰宜至廷尉豫從頠言遂委而去尋詔頠代豫領左軍將軍屯萬春門頠秀之子也皇太后題帛為書射之城外曰救太傳者有賞賈后因宣言太后同反尋而殿中兵出燒駿府又令弩士於閣上臨駿府而射之駿兵皆不得出駿逃于馬廄就殺之孟觀等遂收駿弟珧濟張劭李斌假廣劉豫武茂及散騎常侍楊邈中書令蔣駿東夷校尉文鴦皆夷三族死者數千人珧臨刑告東安公繇曰表在石函可問張華衆謂宜依鍾育例為之申理繇不聽而賈氏族黨趣使行刑珧號叫不已刑者以刀破其頭繇諸葛誕之外孫也故忌文鴦誣以為駿黨而誅之是夜誅賞皆自繇出威振內外王戎謂繇曰大事之後宜深逺權藝繇不從壬辰赦天下改元賈后矯詔使後軍將軍荀悝送太后于永寧宫特全太后母髙都君龐氏之命聽就太后居尋復諷羣公有司奏曰皇太后隂漸姦謀圖危社稷飛箭繫書要募將士同惡相濟自絶于天魯侯絶文薑春秋所許蓋奉祖宗任至公於天下陛下雖懷無已之情臣下不敢奉詔詔曰此大事更詳之有司又奏宜廢皇太后為峻陽庶人中書監張華議皇太后非得罪於先帝今黨其所親為不母於聖世宜依漢廢趙太后為孝成后故事貶皇太后之號還稱武皇后居異宫以全始終之恩左僕射荀愷與太子少師下邳王晃等議曰皇太后謀危社稷不可復配先帝宜貶尊號廢詣金墉城於是有司奏請從晃等議廢太后為庶人詔可又奏楊駿造亂家屬應誅詔原其妻龐命以尉太后之心今太后廢為庶人請以龐付廷尉行刑詔不許有司復固請乃從之龐臨刑太后抱持號叫截髮稽顙上表詣賈后稱妾請全母命不見省董養遊太學升堂歎曰朝廷建斯堂將以何為乎每覽國家赦書謀反大逆皆赦至於殺祖父母父母不赦者以為王法所不容故也奈何公卿處議文飾禮典乃至此乎天人之理既滅大亂將作矣有司收駿官屬欲悉誅之侍中傅祗啓曰昔魯芝為曹爽司馬斬關赴爽宣帝用為青州刺史駿之僚佐不可悉加罪詔赦之壬寅徴汝南王亮為太宰與太保衛瓘皆録尚書事輔政以秦王柬為大將軍東平王楙為撫軍大將軍楚王瑋為衛將軍領北軍中候下邳王晃為尚書令東安公繇為尚書左僕射進爵為王懋望之子也封董猛為武安侯三兄皆為亭侯亮欲取悅衆心論誅揚駿之功督將侯者千八十一人御史中丞傅咸遺亮書曰今封賞熏赫震動天地自古以來未之有也無功而獲厚賞則人莫不樂國之有禍是禍原無窮也凡作此者由東安公人謂殿下既至當有以正之正之以道衆亦何怒衆之所怒者在於不平耳而今皆更倍論莫不失望亮頗專權藝咸復諌曰楊駿有震主之威委任親戚此天下所以喧譁今之處重宜反此失靜默頤神有大得失乃維持之自非大事一皆抑遣比過尊門冠蓋車馬填塞街衢此之翕習既宜弭息又夏侯長容無功而暴擢為少府論者謂長容公之姻家故至於此流聞四方非所以為益也亮皆不從賈后族兄車騎司馬模從舅右衛將軍郭彰女弟之子賈謐與楚王瑋東安王繇並預國政賈后暴戾日甚繇密謀廢后賈氏憚之繇兄東武公淡素惡繇屢譖之於太宰亮曰繇專行誅賞欲擅朝政庚戌詔免繇官又坐有悖言廢徙帶方於是賈謐郭彰權藝愈盛賔客盈門謐雖驕奢而好學喜延士大夫郭彰石崇陸機機弟雲和郁及滎陽潘嶽清河崔基勃海歐陽建蘭陵繆徴京兆杜斌摰虞琅邪諸葛詮弘農王粹襄城杜育南陽鄒捷齊國左思沛國劉瓌周恢安平牽秀潁川陳聄髙陽許猛彭城劉訥中山劉輿輿弟琨皆附於謐號曰二十四友郁嶠之弟也崇與嶽尤諂事謐每候謐及廣城君郭槐出皆降車路左望塵而拜太宰亮太保瓘以楚王瑋剛愎好殺惡之欲奪其兵權以臨海侯裴楷代瑋為北軍中候瑋怒楷聞之不敢拜亮復與瓘謀遣瑋與諸王之國瑋益忿怨瑋長史公孫宏舍人歧盛皆有寵於瑋勸瑋自昵於賈后后留瑋領太子少傳盛素善於楊駿衛瓘惡其反覆將收之盛乃與宏謀因積弩將軍李肇矯稱瑋命譖亮瓘於賈后云將謀廢立后素怨瓘且患二公執政已不得專恣夏六月后使帝作手詔賜瑋曰太宰太保欲為伊霍之事王宜宣詔令淮南長沙成都王屯諸宫門免亮及瓘官夜使黃門齎以授瑋瑋欲覆奏黃門曰事恐漏泄非密詔本意也瑋亦欲因此復私怨遂勒本軍復矯詔召三十六軍告以二公濳圖不軌吾今受詔都督中外諸軍諸在直衛者皆嚴加警備其在外營便相帥徑詣行府助順討逆又矯詔亮瓘官屬一無所問皆罷遣之若不奉詔便軍法從事遣公孫宏李肇以兵圍亮府侍中清河王遐收瓘亮帳下督李龍白外有變請拒之亮不聽俄而兵登牆大呼亮驚曰吾無二心何故至此詔書其可見乎宏等不許趣兵攻之長史劉準謂亮曰觀此必是姦謀府中俊乂如林猶可力戰又不聽遂為肇所執歎曰我之赤心可破示天下也與世子矩俱死衛瓘左右亦疑遐矯詔請拒之須自表得報就戮未晚瓘不聽初瓘為司空帳下督榮晦有罪斥遣之至是晦從遐收瓘輒殺瓘及子孫共九人遐不能禁歧盛説瑋宜因兵藝遂誅賈郭以正王室安天下瑋猶豫未決會天明太子少傅張華使董猛説賈后曰楚王既誅二公則天下威權盡歸之矣人主何以自安宜以瑋專殺之罪誅之賈后亦欲因此除瑋深然之是時內外擾亂朝廷恟懼不知所出張華白帝遣殿中將軍王宫齎騶虞幡出麾衆曰楚王矯詔勿聽也衆皆釋仗而走瑋左右無復一人窘迫不知所為遂執之下廷尉乙丑斬之瑋出懷中青紙詔流涕以示監刑尚書劉頌曰幸託體先帝而受枉乃如此乎公孫宏歧盛並夷三族瑋之起兵也隴西王泰嚴兵將助瑋祭酒丁綏諌曰公為宰相不可輕動且夜中倉猝宜遣人參審定問泰乃止衛瓘女與國臣書曰先公名諡未顯每怪一國蔑然無言春秋之失其咎安在於是太保主簿劉繇等執黃幡撾登聞鼓上言曰初矯詔者至公即奉送章綬單車從命如矯詔之文唯免公官而故給使榮晦輒收公父子及孫一時斬戮乞驗盡情偽加以明刑乃詔族誅榮晦追復亮爵位諡曰文成封瓘蘭陵郡公諡曰成於是賈后專朝委任親黨以賈模為散騎常侍加侍中賈謐與后謀以張華庶姓無逼上之嫌而儒雅有籌略為衆望所依欲委以朝政疑未決以問裴頠頠贊成之乃以華為侍中中書監頠為侍中又以安南將軍裴楷為中書令加侍中與右僕射王戎並管機要華盡忠帝室彌縫遺闕賈后雖凶險猶知敬重華賈模與華頠同心輔政故數年之間雖暗主在上而朝野安靜華等之功也二年春二月己酉故楊太后卒于金墉城是時太后尚有侍御十餘人賈后悉奪之絶膳八日而卒賈后恐太后有靈或訴寃於先帝乃覆而殯之仍施諸厭劾符書藥物等六年夏趙王倫信用嬖人琅邪孫秀與雍州刺史濟南解系爭軍事更相表奏歐陽建亦表倫罪惡朝廷以倫撓亂關右徴倫為車騎將軍倫至洛陽用秀計深交賈郭賈后大愛信之倫因求録尚書事又求尚書令張華裴頠固執以為不可倫秀由是怨之七年王衍為尚書令南陽樂廣為河南尹皆善清談宅心事外名重當世朝野之人爭慕效之衍與弟澄好題品人物舉世以為儀準衍神情明秀少時山濤見之嗟歎良久曰何物老嫗生寧馨兒然誤天下蒼生者未必非此人也九年春正月太子洗馬江統以為戎狄亂華宜早絶其原作徙戎論以警朝廷胡之叛語在羌夏六月賈后淫虐日甚私於太醫令程據等又以簏箱載道上年少入宫復恐其漏泄往往殺之賈模恐禍及已甚憂之裴頠與模及張華議廢后更立謝淑妃模華皆曰主上自無廢黜之意而吾等專行之儻上心不以為然將若之何且諸王方強朋黨各異恐一旦禍起身死國危無益社稷頠曰誠如公言然中宫逞其昏虐亂可立待也華曰卿二人於中宫皆親戚言或見信宜數為陳禍福之戒庶無大悖則天下尚未至於亂吾曹得以優遊卒嵗而已頠旦夕説其從母廣城君令戒諭賈后以親厚太子賈模亦數為后言禍福后不能用反以模為毁已而踈之模不得志憂憤而卒秋八月以裴頠為尚書僕射頠雖賈后親屬然雅望素隆四海唯恐其不居權位尋詔頠專任門下事頠上表固辭以賈模適亡復以臣代之崇外戚之望彰偏私之舉為聖朝纍不聽或謂頠曰君可以言當盡言於中宫言而不從當逺引而去儻二者不立雖有十表難以免矣頠慨然久之竟不能從帝為人戇騃嘗在華林園聞蝦蟆謂左右曰此鳴者為官乎為私乎時天下荒饉百姓餓死帝聞之曰何不食肉糜由是權在羣下政出多門藝位之家更相薦託有如互市賈郭恣橫貨賂公行南陽魯褒作錢神論以譏之曰錢之為體有乾坤之象親之如兄字曰孔方無德而尊無藝而熱排金門入紫闥危可使安死可使活貴可使賤生可使殺是故忿爭非錢不勝幽滯非錢不拔怨讎非錢不解令聞非錢不發洛中朱衣當塗之士愛我家兄皆無巳巳執我之手抱我終始凡今之人惟錢而已裴頠薦平陽韋忠於張華華辟之忠辭疾不起人問其故忠曰張茂先華而不實裴逸民欲而無厭棄典禮而附賊后此豈大丈夫之所為哉逸民每有心託我我常恐其溺於深淵而餘波及我況可褰裳而就之哉關內侯敦煌索靖知天下將亂指洛陽宫門銅駝歎曰會見汝在荆棘中耳初廣城君郭槐以賈后無子常勸后使慈愛太子賈謐驕縱數無禮於太子廣城君恆切責之廣城君欲以韓壽女為太子妃太子亦欲婚韓氏以自固壽妻賈午及后皆不聽而為太子聘王衍少女太子聞衍長女美而后為賈謐聘之心不能平頗以為言及廣城君病臨終執后手令盡心於太子言甚切至又曰趙粲賈午必亂汝家事我死後勿復聽入深記吾言后不從更與粲午謀害太子太子幼有令名及長不好學惟與左右嬉戲賈后復使黃門輩誘之為奢靡威虐由是名譽浸減驕慢益彰或廢朝侍而縱遊逸於宫中為市使人屠酤手揣斤兩輕重不差其母本屠家女也故太子好之東宫月俸錢五十萬太子常探取二月用之猶不足又令西園賣葵菜藍子雞麵等物而收其利又好隂陽小數多所拘忌洗馬江統上書陳五事一曰雖有微苦宜力疾朝侍二曰宜勤見保傅咨詢善道三曰畫室之功可且減省後園刻鏤雜作一皆罷遣四曰西園賣葵藍之屬虧敗國體貶損令聞五曰繕牆正瓦不必拘攣小忌太子皆不從中舍人杜錫恐太子不得安其位每盡忠諌勸太子修德業保令名言辭懇切太子患之置針著錫常所坐氊中剌之流血錫預之子也太子性剛知賈謐恃中宫驕貴不能假借之謐時為侍中至東宫或捨之於後庭遊戲詹事裴權諌曰謐后所親昵一旦交􅌟則事危矣不從謐譛太子於后曰太子多畜私財以結小人者為賈氏故也若宫車晏駕彼居大位依楊氏故事誅臣等廢后於金墉如反手耳不如早圖之更立慈順者可以自安后納其言乃宣揚太子之短布於逺近又詐為有娠內藁物産具取妹夫韓壽子慰祖養之欲以代太子于時朝野咸知賈后有害太子之意中護軍趙俊請太子廢后太子不聽左衛率東平劉卞以賈后之謀問張華華曰不聞卞曰卞自須昌小吏受公成拔以至今日士感知己是以盡言而公更有疑於卞邪華曰假令有此君欲如何卞曰東宫俊乂如林四率精兵萬人公居阿衡之任若得公命皇太子因朝入録尚書事廢賈后於金墉城兩黃門力耳華曰今天子當陽太子人子也吾又不受阿衡之命忽相與行此是無君父而以不孝示天下也雖能有成猶不免罪況權戚滿朝威柄不一成可必乎賈后常使親黨微服聽察於外頗聞卞言乃遷卞為雍州剌史卞知言泄飲藥而死十二月太子長子虨病太子為虨求王爵不許虨病篤太子為之禱祀求福賈后聞之乃詐稱帝不豫召太子入朝既至后不見置于别室遣婢陳舞以帝命賜太子酒三升使盡飲之太子辭以不能飲三升舞逼之曰不孝邪天賜汝酒而不飲酒中有惡物邪太子不得已強飲至盡遂大醉后使黃門侍郎潘嶽作書草令小婢承福以紙筆及草因太子醉稱詔使書之文曰陛下宜自了不自了吾當入了之中宫又宜速自了不自了吾當手了之并與謝妃共要刻期兩發勿疑猶豫以致後患茹毛飲血於三辰之下皇天許當掃除患害立道文為王蔣氏為內主願成當三牲祠北君太子醉迷不覺遂依而寫之其字半不成后補成之以呈帝壬戌帝幸式乾殿召公卿入使黃門令董猛以太子書及青紙詔示之曰遹書如此今賜死遍示諸公王莫有言者張華曰此國之大禍自古以來常因廢黜正嫡以致喪亂且國家有天下日淺願陛下詳之裴頠以為宜先檢校傳書者又請比校太子手書不然恐有詐妄賈后乃出太子啓事十餘紙衆人比視亦無敢言非者賈后使董猛矯以長廣公主辭白帝曰事宜速決而羣臣各不同其不從詔者宜以軍法從事議至日西不決后見華等意堅懼事變乃表免太子為庶人詔許之於是使尚書和郁等持節詣東宫廢太子為庶人太子改服出再拜受詔步出承華門乘粗犢車東武公淡以兵仗送太子及妃王氏三子虨臧尚同幽于金墉城王衍自表離婚許之妃慟哭而歸殺太子母謝淑媛及虨母保林蔣俊永康元年春正月西戎校尉司馬閻纘輿棺詣闕上書以為漢戾太子稱兵拒命言者猶曰罪當笞耳今遹受罪之日不敢失道猶為輕於戾太子宜重選師傳先加嚴誨若不悛改棄之未晚也書奏不省纘圃之孫也賈后使黃門自首欲與太子為逆詔以黃門首辭班示公卿遣東武公淡以千兵防衛太子幽于許昌宫令治書御史劉振持節守之詔宫臣不得辭送洗馬江統潘滔舍人王敦杜蕤魯瑶等冒禁至伊水拜辭涕泣司隸校尉滿奮收縛統等送獄其繫河南獄者樂廣悉解遣之繫洛陽縣獄者猶未釋都官從事孫琰説賈謐曰所以廢徙太子以其為惡故耳今宫臣冒罪拜辭而加以重辟流聞四方乃更彰太子之德也不如釋之謐乃語洛陽令曹攄使釋之廣亦不坐敦覽之孫攄肇之孫也太子至許遺王妃書自陳誣枉父衍不敢以聞三月尉氏雨血妖星見南方太白晝見中台星拆張華少子韙勸華遜位華不從曰天道幽逺不如靜以待之太子既廢衆情憤怒有衛督司馬雅常從督許超皆嘗給事東宫與殿中郎士猗等謀廢賈后復太子以張華裴頠安常保位難與行權右軍將軍趙王倫執兵柄性貪冒可假以濟事乃説孫秀曰中宫凶妬無道與賈謐等共誣廢太子今國無嫡嗣社稷將危大臣將起大事而公名奉事中宫與賈郭親善太子之廢皆云豫知一朝事起禍必相及何不先謀之乎秀許諾言於倫倫納焉遂告通事令史張林及省事張衡等使為內應事將起孫秀言於倫曰太子聰明剛猛若還東宫必不受制於人明公素黨於賈后道路皆知之今雖建大功於太子太子謂公特逼於百姓之望翻覆以免罪耳雖含忍宿忿必不能深德明公若有瑕釁猶不免誅不若遷延緩期賈后必害太子然後廢賈后為太子報讎豈徒免禍而已乃更可以得志倫然之秀因使人行反間言殿中人欲廢皇后迎太子賈后數遣宫婢微服於民間聽察聞之甚懼倫秀因勸謐等早除太子以絶衆望癸未賈后使太醫令程據和毒藥矯詔使黃門孫慮至許昌毒太子太子自廢黜恐被毒常自煮食於前慮以告劉振振乃徙太子於小坊中絶其食宫人猶竊於牆上過食與之慮逼太子以藥太子不肯服慮以藥杵椎殺之有司請以庶人禮葬賈后表請以廣陵王禮葬之夏四月趙王倫孫秀將討賈后告右衛佽飛督閭和和從之期以癸巳丙夜一籌以鼓聲為應癸巳秀使司馬雅告張華曰趙王欲與公共匡社稷為天下除害使雅以告華拒之雅怒曰刃將加頸猶為是言邪不顧而出及期倫矯詔敕三部司馬曰中宫與賈謐等殺吾太子今使車騎入廢中宫汝等皆當從命事畢賜爵關中侯不從者誅三族衆皆從之又矯詔開門夜入陳兵道南遣翊軍校尉齊王囧將百人排閣而入華林令駱休為內應迎帝幸東堂以詔召賈謐於殿前將誅之謐走入西鍾下呼曰阿后救我就斬之賈后見齊王囧驚曰卿何為來囧曰有詔收后后曰詔當從我出何詔也后至上閣遙呼帝曰陛下有婦使人廢之亦行自廢矣是時梁王肜亦預其謀后問囧曰起事者誰囧曰梁趙后曰繫狗當繫頸反繫其尾何得不然遂廢后為庶人幽之於建始殿收趙粲賈午等付暴室考竟詔尚書收捕賈氏親黨召中書監侍中黃門侍郎八坐皆夜入殿尚書始疑詔有詐郎師景露版奏請手詔倫等斬之以徇倫隂與秀謀篡位欲先除朝望且報宿怨乃執張華裴頠解系解結等於殿前華謂張林曰卿欲害忠臣邪林稱詔詰之曰卿為宰相太子之廢不能死節何也華曰式乾之議臣諌事具存可覆桉也林曰諌而不從何不去位華無以對遂皆斬之仍夷三族解結女適裴氏明日當嫁而禍起裴氏欲認活之女曰家既若此我何以活為亦坐死朝廷由是議革舊制女不從死甲午倫坐端門遣尚書和郁持節送賈庶人于金墉誅劉振董猛孫慮程據等司徒王戎及內外官坐張裴親黨黜免者甚衆閻纘撫張華尸慟哭曰早語君遜位而不肯今果不免命也於是趙王倫稱詔赦天下自為使持節都督中外諸軍事相國侍中一依宣文輔魏故事置府兵萬人以其世子散騎常侍荂領冗從僕射子馥為前將軍封濟陽王虔為黃門郎封汝隂王詡為散騎侍郎封霸城侯孫秀等皆封大郡並據兵權文武官封侯者數千人百官總已以聽於倫倫素庸愚復受制於孫秀秀為中書令威權振朝廷天下皆事秀而無求於倫詔追復故太子遹位號使尚書和郁帥東宫官屬迎太子喪於許昌追封遹子虨為南陽王封虨弟臧為臨淮王尚為襄陽王有司奏尚書令王衍備位大臣太子被誣志在苟免請禁錮終身從之相國倫欲收人望選用海內名德之士以前平陽太守李重滎陽太守荀組為左右長史東平王堪沛國劉謨為左右司馬尚書郎陽平束晳為記室淮南王文學荀嵩殿中郎陸機為參軍組勗之子嵩彧之玄孫也李重知倫有異志辭疾不就倫逼之不已憂憤成疾扶曵受拜數日而卒太子遹之廢也將立淮南王允為太弟議者不合會趙王倫廢賈后乃以允為驃騎將軍開府儀同三司領中護軍己亥相國倫矯詔遣尚書劉弘齎金屑酒賜賈后死于金墉城五月己巳詔立臨淮王臧為皇太孫還妃王氏以母之太子官屬即轉為太孫官屬相國倫行太孫太傅己卯諡故太子曰愍懷六月壬寅葬于顯平陵中護軍淮南王允性沈毅宿衛將士皆畏服之允知相國倫及孫秀有異志隂養死士謀討之倫秀深憚之秋八月轉允為太尉外示優崇實奪其兵權允稱疾不拜秀遣御史劉機逼允收其官屬以下劾以拒詔大逆不敬允視詔乃秀手書也大怒收御史將斬之御史走免斬其令史二人厲色謂左右曰趙王欲破我家遂帥國兵及帳下七百人直出大呼曰趙王反我將討之從我者左袒於是歸之者甚衆允將赴宫尚書左丞王輿閉掖門允不得入遂圍相府允所將兵皆精鋭倫與戰屢敗死者千餘人太子左率陳徽勒東宫兵鼓譟於內以應允允結陳於承華門前弓弩齊發射倫飛矢雨下主書司馬眭祕以身蔽倫箭中其背而死倫官屬皆隱樹而立每樹輒中數百箭自辰至未中書令陳淮徽之兄也欲應允言於帝曰宜遣白虎幡以解鬪乃使司馬督護伏胤將騎四百持幡從宫中出侍中汝隂王虔在門下省隂與胤誓曰富貴當與卿共之胤乃懷空板出詐言有詔助淮南王允不之覺開陳內之下車受詔胤因殺之并殺允子秦王郁漢王迪坐允夷滅者數千人曲赦洛陽初孫秀嘗為小吏事黃門郎潘嶽嶽屢撻之衛尉石崇之甥歐陽建素與相國倫有隙崇有愛妾曰緑珠孫秀使求之崇不與及淮南王允敗秀因稱石崇潘嶽歐陽建奉允為亂收之崇歎曰奴輩利吾財耳收者曰知財為禍何不早散之崇不能答初潘嶽母常誚責嶽曰汝當知足而乾沒不已乎及敗嶽謝母曰負阿母遂與崇建皆族誅籍沒崇家相國倫收淮南王母弟吳王晏欲殺之光祿大夫傅祗爭之於朝堂衆皆諌止倫倫乃貶晏為賔徒縣王齊王囧以功遷遊擊將軍囧意不滿有恨色孫秀覺之且憚其在內乃出為平東將軍鎮許昌孫秀議加相國倫九錫百官莫敢異議吏部尚書劉頌曰昔漢之錫魏魏之錫晉皆一時之用非可通行周勃霍光其功至大皆不聞有九錫之命也張林積忿不已以頌為張華之黨將殺之孫秀曰殺張裴已傷時望不可復殺頌林乃止以頌為光祿大夫遂下詔加倫九錫復加其子荂撫軍將軍虔中軍將軍詡為侍中又加孫秀侍中輔國將軍相國司馬右率如故張林等並居顯要增相府兵為二萬人與宿衛同并所隱匿之兵數踰三萬九月改司徒為丞相以梁王肜為之肜固辭不受倫及諸子皆頑鄙無識秀狡黠貪淫所與共事者皆邪佞之士惟競榮利無深謀逺略志趣乖異互相憎疾秀子會為射聲校尉形貌短陋如奴僕之下者秀使尚帝女河東公主冬十一月甲子立皇后羊氏赦天下后尚書郎泰山羊玄之之女也外祖平南將軍樂安孫旗與孫秀善故秀立之拜玄之光祿大夫特進散騎常侍封興晉侯永寧元年春正月相國倫與孫秀使牙門趙奉詐傳宣帝神語云倫宜早入西宫散騎常侍義陽王威望之孫也素諂事倫倫以威兼侍中使威逼奪帝璽綬作禪詔又使尚書令滿奮持節奉璽綬禪位於倫左衛將軍王輿前軍將軍司馬雅等帥甲士入殿曉諭三部司馬示以威賞無敢違者張林等屯守諸門乙丑倫僃法駕入宫即帝位赦天下改元建始帝自華林西門出居金墉城倫使張衡將兵守之丙寅尊帝為太上皇改金墉曰永昌宫廢皇太孫為濮陽王立世子荂為皇太子封子馥為京兆王虔為廣平王詡為霸城王皆侍中將兵以梁王肜為宰衡何劭為太宰孫秀為侍中中書監票騎將軍儀同三司義陽王威為中書令張林為衛將軍其餘黨與皆為卿將超階越次不可勝紀下至奴卒亦加爵位每朝會貂蟬盈坐時人為之諺曰貂不足狗尾續初平南將軍孫旗之子弼弟子髦輔琰皆附會孫秀與之合族旬月間致位通顯及倫稱帝四子皆為將軍封郡侯以旗為車騎將軍開府旗以弼等受倫官爵過差必為家禍遣幼子回責之弼等不從旗不能制慟哭而已癸酉殺濮陽哀王臧孫秀專執朝政倫所出詔令秀輒改更與奪自書青紙為詔或朝行夕改百官轉易如流張林素與秀不相能且怨不得開府濳與太子荂箋言秀專權不合衆心而功臣皆小人撓亂朝廷可悉誅之荂以書白倫倫以示秀秀勸倫收林殺之夷其三族秀以齊王囧成都王穎河間主顒各擁強兵據方面惡之乃盡用其親黨為三王參佐加囧鎮東大將軍穎征北大將軍皆開府儀同三司以寵安之三月齊王囧謀討趙王倫遣使告成都王穎河間王顒常山王乂及南中郎將新野公歆移檄征鎮州郡縣國稱逆臣孫秀迷誤趙王當共誅討有不從命者誅及三族使者至鄴成都王穎召鄴令盧志謀之志曰趙王篡逆人神共憤殿下收英俊以從人望杖大順以討之百姓必不召自至攘臂爭進蔑不克矣穎從之以志為咨議參軍仍補左長史志育之孫也穎以兖州刺史王彥冀州刺史李毅督護趙驤石超等為前鋒逺近響應至朝歌衆二十餘萬超苞之孫也常山王乂在其國與太原內史劉暾各帥衆為穎後繼新野公歆得囧檄未知所從嬖人王綏曰趙親而強齊踈而弱公宜從趙參軍孫洵大言於衆曰趙王凶逆天下當共誅之何親踈強弱之有歆乃從囧前安西參軍夏侯奭在始平合衆數千人以應囧遣使邀河間王顒顒用長史隴西李含謀遣振武將軍河間張方討擒奭及其黨腰斬之囧檄至顒執囧使送於倫遣張方將兵助倫方至華隂顒聞二王兵盛復召方還更附二王囧檄至楊州州人皆欲應囧剌史郗隆慮之玄孫也以兄子鑒及諸子悉在洛陽疑未決悉召僚吏謀之主簿淮南趙誘前秀才虞潭皆曰趙王篡逆海內所疾今義兵四起其敗必矣為明使君計莫若自將精兵徑赴許昌上䇿也遣將將兵會之中䇿也量遣小軍隨形助勝下䇿也隆退密與别駕顧彥謀之彥曰誘等下䇿乃上計也治中留寶主簿張褒西曹留承聞之請見曰不審明使君今當何施隆曰我俱受二帝恩無所偏助欲守州而已承曰天下者世祖之天下也太上承代已久今上取之不平齊王順時舉事成敗可見使君不早發兵應之狐疑遷延變難將生此州豈可保也隆不應潭翻之孫也隆停檄六日不下將士憤怒參軍王邃鎮石頭將士爭往歸之隆遣從事於牛渚禁之不能止將士遂奉邃攻隆隆父子及顧彥皆死傳首於囧安南將軍監沔北諸軍事孟觀以為紫宫帝坐無他變倫必不敗乃為之固守倫秀聞三王兵起大懼詐為囧表曰不知何賊猝見攻圍臣儒弱不能自固乞中軍見救庶得歸死以其表宣示內外遣上軍將軍孫輔折衝將軍李嚴帥兵七千自延壽關出征虜將軍張泓左軍將軍蔡璜前軍將軍閭和帥兵九千自堮阪關出鎮軍將軍司馬雅揚威將軍莫原帥兵八千自成臯關出以拒囧遣孫秀子會督將軍士猗許超帥宿衛兵三萬以拒穎召東平王楙為衛將軍都督諸軍又遣京兆王馥廣平王虔帥兵八千為三軍繼援倫秀日夜禱祈厭勝以求福使巫覡選戰日又使人於嵩山著羽衣詐稱仙人王喬作書述倫祚長久欲以惑衆閏月張泓等進據陽翟與齊王囧戰屢破之囧軍穎隂夏四月泓乘勝逼之囧遣兵逆戰諸軍不動而孫輔徐建軍夜亂徑歸洛自首曰齊王兵盛不可當泓等已沒矣趙王倫大恐祕之而召其子虔及許超還會泓破囧露布至倫乃復遣之泓等悉帥諸軍濟穎攻囧營囧出兵擊其别將孫髦司馬談等破之泓等乃退孫秀詐稱已破囧營擒得囧令百官皆賀成都王穎前鋒至黃橋為孫會士猗許超所敗殺傷萬餘人士衆震駭欲退保朝歌盧志王彥曰今我軍失利敵新得志有輕我之心我若退縮士氣沮衄不可復用且戰何能無勝負不若更選精兵星行倍道出敵不意此用兵之竒也穎從之倫賞黃橋之功士猗許超與孫會皆持節由是各不相從軍政不一且恃勝輕穎而不設備穎帥諸軍擊之大戰于溴水會等大敗棄軍南走穎乘勝長驅濟河自囧等起兵百官將士皆欲誅倫秀秀懼不敢出中書省及聞河北軍敗憂悶不知所為孫會許超士猗等至與秀謀或欲收餘卒出戰或欲焚宫室誅不附已者挾倫南就孫旗孟觀或欲乘船東走入海計未決辛酉左衛將軍王輿與尚書廣陵公漼帥營兵七百餘人自南掖門入宫三部司馬為應於內攻孫秀許超士猗於中書省皆斬之遂殺孫竒孫弼及前將軍謝惔等漼胄之子也王輿屯雲龍門召八坐皆入殿中使倫為詔曰吾為孫秀所誤以怒三王今已誅秀其迎太上皇復位吾歸老于農畒傳詔以騶虞幡敕將士解兵黃門將倫自華林東門出及太子荂皆還汶陽里第遣甲士數千迎帝于金墉城百姓咸稱萬歲帝自端門入升殿羣臣頓首謝罪詔送倫荂等付金墉城廣平王虔自河北還至九曲聞變棄軍將數十人歸里第癸亥赦天下改元大酺五日分遣使者慰勞三王梁王肜等表趙王倫父子凶逆宜伏誅丁卯遣尚書袁敞持節賜倫死收其子荂馥虔詡皆誅之凡百官為倫所用者皆斥免臺省府衛僅有存者是日成都王穎至己巳河間王顒至穎使趙􅋮石超助齊王討張泓等於陽翟泓等皆降自兵興六十餘日戰鬪死者近十萬人斬張衡閭和孫髦于東市蔡璜自殺五月誅義陽王威襄陽太守宗岱承囧檄斬孫旗永饒冶令空桐機斬孟觀皆傳首洛陽夷三族六月乙卯齊王囧帥衆入洛陽頓軍通章署甲士數十萬威震京師甲戌詔以齊王囧為大司馬加九錫備物典䇿如宣景文武輔魏故事成都王穎為大將軍都督中外諸軍事假黃鉞録尚書事加九錫入朝不趨劒履上殿河間王顒為侍中太尉加三錫之禮常山王乂為撫軍大將軍領左軍進廣陵公漼爵為王領尚書加侍中進新野公歆爵為王都督荆州諸軍事加鎮南大將軍齊成都河間三府各置掾屬四十人武號森列文官備員而已識者知兵之未戢也己卯以梁王肜為太宰領司徒光祿大夫劉蕃女為趙世子荂妻故蕃及二子散騎侍郎輿冠軍將軍琨皆為趙王倫所委任大司馬囧以琨父子有才望特宥之以輿為中書郎琨為尚書左丞又以前司徒王戎為尚書令劉暾為御史中丞王衍為河南尹新野王歆將之鎮與囧同乘謁陵因説囧曰成都王至親同建大勳今宜留之與輔政若不能爾當奪其兵權常山王乂與成都王穎俱拜陵乂謂穎曰天下者先帝之業王宜維正之聞其言者莫不憂懼盧志謂穎曰齊王衆號百萬與張泓等相持不能決大王徑前濟河功無與二然今齊王欲與大王共輔朝政志聞兩雄不俱立宜因太妃微疾求還定省委重齊王以收四海之心此計之上也穎從之帝見穎於東堂慰勞之穎拜謝曰此大司馬囧之勳臣無豫焉因表稱囧功德宜委以萬機自陳母疾請歸藩即辭出不復還營便謁大廟出自東陽城門遂歸鄴遣信與囧别囧大驚馳出送穎至七里澗及之穎住車言别流涕滂沱惟以太妃疾苦為憂不及時事由是士民之譽皆歸穎囧辟新興劉殷為軍咨祭酒洛陽令曹攄為記室督尚書郎江統陽平太守河內苟晞參軍事吳國張翰為東曹掾孫惠為户曹掾前廷尉正顧榮及順陽王豹為主簿惠賁之曽孫榮雍之孫也囧以何勗為中領軍董艾典樞機又封其將佐有功者葛旟路秀衛毅劉真韓泰皆為縣公委以心膂號曰五公成都王穎至鄴詔遣使者就申前命穎受大將軍讓九錫殊禮表論興義功臣皆封公侯又表稱大司馬前在陽翟與賊相持既久百姓困敝乞運河北邸閣米十五萬斛以振陽翟飢民造棺八千餘枚以成都國秩為衣服斂祭黃橋戰士旌顯其家加常戰亡二等又命溫縣瘞趙王倫戰士萬四千餘人皆盧志之謀也穎形美而神昏不知書然氣性敦厚委事於志故得成其美焉詔復遣使諭穎入輔并使受九錫穎嬖人孟玖不欲還洛又程太妃愛戀鄴都故穎終辭不拜初大司馬囧疑中書郎陸機為趙王倫撰禪詔收欲殺之大將軍穎為之辨理得免死因表為平原內史以其弟雲為清河內史機友人顧榮及廣陵戴淵以中國多難勸機還吳機以受穎全濟之恩且謂穎有時望可與立功遂留不去秋七月復封常山王乂為長沙王冬十二月封大司馬囧子冰為樂安王英為濟陽王超為淮南王太安元年大司馬囧欲久專大政以帝子孫俱盡大將軍穎有次立之勢清河王覃遐之子也方八歲乃上表請立之夏五月癸卯立覃為皇太子以囧為太子太師東海王越為司空領中書監齊武閔王囧既得志頗驕奢擅權大起府第壞公私廬舍以百數制與西宫等中外失望侍中嵇紹上疏曰存不忘亡易之善戒也臣願陛下無忘金墉大司馬無忘頴上大將軍無忘黃橋則禍亂之萌無由可兆矣又與囧書以為唐虞茅茨夏禹卑宫今大興第舍及為三王立宅豈今日之所急邪囧遜辭謝之然不能從囧耽於宴樂不入朝見坐拜百官符敕三臺選舉不均嬖寵用事殿中御史桓豹奏事不先經囧府即加考竟南陽處士鄭方上書諫囧曰今大王安不慮危燕樂過度一失也宗室骨肉當無纎介今則不然二失也蠻夷不靜大王謂功業已隆不以為念三失也兵革之後百姓窮困不聞振救四失也大王與義兵盟約事定之後賞不踰時而今猶有有功未論者五失也囧謝曰非子孤不聞過孫惠上書曰天下有五難四不可而明公皆居之冒犯鋒刃一難也聚致英豪二難也與將士均勞苦三難也以弱勝強四難也興復皇業五難也大名不可久荷大功不可久任大權不可久執大威不可久居大王行其難而不以為難處其不可而謂之可惠竊所不安也明公冝思功成身退之道崇親推近委重長沙成都二王長揖歸藩則太伯子臧不專美於前矣今乃忘髙亢之可危貪權執以受疑雖遨遊髙臺之上逍遙重墉之內愚竊謂危亡之憂過於在頴翟之時也囧不能用惠辭疾去囧謂曹攄曰或勸吾委權還國何如攄曰物禁太盛大王誠能居髙慮危褰裳去之斯善之善者也囧不聽張翰顧榮皆慮及禍翰因秋風起思菰菜蓴羮鱸魚鱠歎曰人生貴適志耳富貴何為即引去榮故酣飲不省府事長史葛旟以其廢職白囧徙榮為中書侍郎頴川處士庾衮聞囧期年不朝歎曰晉室卑矣禍亂將興帥妻子逃於林慮山中王豹致箋於囧曰伏思元康已來宰相在位未有一人獲終者乃事藝使然非皆為不善也今公克平禍亂安國定家乃復尋覆車之軌欲冀長存不亦難乎今河間樹根於關右成都盤桓於舊魏新野大封於江漢三王各以方剛強盛之年並典戎馬處要害之地而明公以難賞之功挾震主之威獨據京都專執大權進則亢龍有悔退則據于蒺藜冀此求安未見其福也因請悉遣王侯之國依周召之法以成都王為北州伯治鄴囧自為南州伯治宛分河為界各統王侯以夾輔天子囧優令答之長沙王又見豹箋謂囧曰小子離間骨肉何不銅駝下打殺囧乃奏豹讒內間外坐生猜嫌不忠不義鞭殺之豹將死曰縣吾頭大司馬門見兵之攻齊也囧以河間王顒本附趙王倫心常恨之梁州刺史安定皇甫啇與顒長史李含不平含被徴為翊軍校尉時啇參囧軍事夏侯奭兄亦在囧府含心不自安又與囧右司馬趙驤有隙遂單馬奔顒詐稱受密詔使顒誅囧因説顒曰成都王至親有大功推讓還藩甚得衆心齊王越親而專政朝廷側目今檄長沙王使討齊齊王必誅長沙吾因以為齊罪而討之必可禽也去齊立成都除逼建親以安社稷大勳也顒從之是時武帝族弟范陽王虓都督豫州諸軍事顒上表陳囧罪狀且言勒兵十萬欲與成都王頴新野王歆范陽王虓共會洛陽請長沙王乂廢囧還第以頴代囧輔政顒遂舉兵以李含為都督帥張方等趨洛陽復遣使邀頴頴將應之盧志諌不聽十二月丁卯顒表至囧大懼會百官議之曰孤首唱義兵臣子之節信著神明今二王信讒作難將若之何尚書令王成曰公勳業誠大然賞不及勞故人懷二心今二王兵盛不可當也若以王就第委權崇讓庶可求安囧從事中郎葛旟怒曰三臺納言不恤王事賞報稽緩責不在府讒言逆亂當共誅討奈何虛承偽書遽令公就第乎漢魏以來王侯就第寧有得保妻子者邪議者可斬百官震悚夫色戎偽藥發墯厠得免李含屯隂盤張方帥兵二萬軍新安檄長沙王乂使討囧囧遣董艾襲乂乂將左右百餘人馳入宫閉諸門奉天子攻大司馬府董乂陳兵宫西縱火燒千秋神武門囧使人執騶虞幡唱云長沙王矯詔乂又稱大司馬謀反是夕城內大戰飛矢雨集火光屬天帝幸上東門矢集御前羣臣死者相枕連戰三日囧衆大敗大司馬長史趙淵殺何朂因執囧以降囧至殿前帝惻然欲活之乂叱左右趣牽出斬於閶闔門外徇首六軍同黨皆夷三族死者二千餘人囚囧子超冰英於金墉城廢囧弟北海王實赦天下改元李含等聞囧死引兵還長安長沙王乂雖在朝廷事無巨細皆就鄴咨大將軍頴頴以孫惠為參軍陸雲為右司馬二年初李含以長沙王乂微弱必為齊王囧所殺因欲以為囧罪而討之遂廢帝立大將軍頴以河間王顒為宰相已得用事既而囧為乂所殺頴顒猶守藩不如所謀頴恃功驕奢百度弛廢甚於囧時猶嫌乂在內不得逞其欲欲去之時皇甫商復為乂參軍商兄重為秦州剌史含説顒曰商為乂所任重終不為人用宜早除之可表遷重為內職因其過長安執之重知之露檄上尚書發隴上兵以討含乂以兵方少息遣使詔重罷兵徴含為河南尹含就徴而重不奉詔顒遣金城太守遊楷隴西太守韓稚等合四郡兵攻之顒密使含與侍中馮蓀中書令卞粹謀殺乂皇甫商以告乂收含蓀粹殺之驃騎從事琅邪諸葛玫前司徒長史武邑牽秀皆出奔鄴河間王顒聞李含等死即起兵討長沙王乂大將軍穎上表請討張昌許之聞昌已平因欲與顒共攻乂盧志諌曰公前有大功而委權辭寵時望美矣今宜頓軍關外文服入朝此霸主之事也參軍魏郡邵續曰人之有兄弟如左右手明公欲當天下之敵而先去其一手可乎穎皆不從八月顒穎共表乂論功不平與右僕射羊玄之左將軍皇甫商專擅朝政殺害忠良請誅玄之商遣乂還國詔曰顒敢舉大兵內向京輦吾當親帥六軍以誅姦逆其以乂為太尉都督中外諸軍事以禦之顒以張方為都督將精兵七萬自函谷東趨洛陽穎引兵屯朝歌以平原內史陸機為前將軍前鋒都督督北中郎將王粹冠軍將軍牽秀中護軍石超等軍二十餘萬南向洛陽機以羇旅事穎一旦頓居諸將之右王粹等心皆不服白沙督孫惠與機親厚勸機讓都督於粹機曰彼將謂吾首鼠兩端適所以速禍也遂行穎列軍自朝歌至河橋鼓聲聞數百里乙丑帝如十三里橋太尉乂使皇甫商將萬餘人拒張方於宜陽己巳帝還軍宣武場庚午舍于石樓九月丁丑屯于河橋壬子張方襲皇甫商敗之甲申帝軍于芒山丁亥幸偃師辛卯舍于豆田大將軍穎進屯河南阻清水為壘癸巳羊玄之憂懼而卒帝旋軍城東丙申幸緱氏擊牽秀走之大赦張方入京城大掠死者萬計石超進逼緱氏冬十月壬寅帝還宫丁未敗牽秀于東陽門外大將軍穎遣將軍馬咸助陸機戊申太尉乂奉帝與機戰于建春門乂司馬王瑚使數千騎繫戟於馬以突咸陳咸軍亂執而斬之機軍大敗赴七里澗死者如積水為之不流斬其大將賈崇等十六人石超遁去初宦人孟玖有寵於大將軍穎玖欲用其父為邯鄲令左長史盧志等皆不敢違右司馬陸雲固執不許曰此縣公府掾資豈有黃門父居之邪玖深怨之玖弟超領萬人為小督未戰縱兵大掠陸機録其主者超將鐵騎百餘人直入機麾下奪之顧謂機曰貉奴能作督不機司馬吳郡孫拯勸機殺之機不能用超宣言於衆曰陸機將反又還書與玖言機持兩端故軍不速決及戰超不受機節度輕兵獨進敗沒玖疑機殺之譛之於頴曰機有二心於長沙牽秀素諂事玖將軍王闡郝昌帳下督陽平公師藩皆玖所引用相與共證之穎大怒使秀將兵收機參軍事王彰諌曰今日之舉強弱異勢庸人猶知必克況機之明達乎但機吳人殿下用之太過北土舊將皆疾之耳穎不從機聞秀至釋戎服著白帢與秀相見為箋辭穎既而歎曰華亭鶴唳可復聞乎秀遂殺之穎又收機弟清河內史雲平東祭酒耽及孫拯皆下獄記室江統陳留蔡克潁川棗嵩等上疏以為陸機淺謀致敗殺之可也至於反逆則衆共知其不然宜先檢校機反狀若有徴驗誅雲等未晚也統等懇請不已穎遲回者三日蔡克入至穎前叩頭流血曰雲為孟玖所怨逺近莫不聞今果見殺竊為明公惜之僚屬隨克入者數十人流涕固請穎惻然有宥雲之色孟玖扶穎入催令殺雲耽夷機三族獄吏考掠孫拯數百兩踝骨見終言機寃吏知拯義烈謂拯曰二陸之枉誰不知之君可不愛身乎拯仰天歎曰陸君兄弟世之奇士吾蒙知愛今既不能救其死忍復從而誣之乎玖等知拯不可屈乃令獄吏詐為拯辭穎既殺機意常悔之及見拯辭大喜謂玖等曰非卿之忠不能窮此姦遂夷拯三族拯門人費慈宰意二人詣獄明拯寃拯譬遣之曰吾義不負二陸死自吾分卿何為爾邪曰君既不負二陸僕又安可負君固言拯寃玖又殺之太尉乂奉帝攻張方方兵望見乘輿皆退走方遂大敗死者五千餘人方退屯十三里橋衆懼欲夜遁方曰勝負兵家之常善用兵者能因敗為成今我更前作壘出其不意此竒䇿也乃夜潛進逼洛城七里築壘數重外引廩穀以足軍食乂既戰勝以為方不足憂聞方壘成十一月引兵攻之不利朝議以乂頴兄弟可辭説而釋乃使中書令王衍等往説穎令與乂分陜而居穎不從乂因致書於穎為陳利害欲與之和解穎復書請斬皇甫商等首則引兵還鄴乂不可穎進兵逼京師張方決千金堨水碓皆涸乃發王公奴婢手舂給兵一品已下不從征者男子十三已上皆從役又發奴助兵公私窮踧米石萬錢詔命所行一城而已驃騎主簿范陽祖逖言於乂曰劉沈忠義果毅雍州兵力足制河間宜啓上為詔與沈使發兵襲顒顒窘急必召張方以自救此良䇿也乂從之沈奉詔馳檄四境諸郡多起兵應之沈合七郡之衆凡萬餘人趣長安乂又使皇甫商間行齎帝手詔命遊楷等罷兵敕皇甫重進軍討顒商行至新平遇其從甥從甥素憎商以告顒顒捕商殺之永興元年春正月長沙厲王乂屢與大將軍穎戰破之前後斬獲六七萬人而乂未嘗虧奉上之禮城中糧食日窘而士卒無離心張方以為洛陽未可克欲還長安而東海王越慮事不濟癸亥潛與殿中諸將夜收乂送别省甲子越啓帝下詔免乂官置金墉城大赦改元城既開殿中將士見外兵不盛悔之更謀劫出乂以拒穎越懼欲殺乂以絶衆心黃門侍郎潘滔曰不可將自有靜之者乃遣人密告張方丙寅方取乂於金墉城至營炙而殺之方軍士亦為之流涕公卿皆詣鄴謝罪大將軍穎入京師復還鎮于鄴詔以穎為丞相加東海王越守尚書令穎遣奮武將軍石超等帥兵五萬屯十二城門殿中宿所忌者穎皆殺之悉代去宿衛兵表盧志為中書監留鄴參署丞相府事河間王顒頓軍於鄭為東軍聲援聞劉沈兵起還鎮渭城遣督護虞夔逆戰於好畤夔兵敗顒懼退入長安急召張方方掠洛中官私奴婢萬餘人而西軍中乏食殺人雜牛馬肉食之劉沈渡渭而軍與顒戰顒屢敗沈使安定太守衛博功曹皇甫淡以精甲五千襲長安入其門力戰至顒帳下沈兵來遲馮翊太守張輔見其無繼引兵橫擊之殺博及淡沈兵遂敗收餘卒而退張方遣其將敦偉夜擊之沈軍驚潰沈與麾下南走追獲之沈謂顒曰知己之惠輕君臣之義重沈不可以違天子之詔量強弱以苟全投袂之日期之必死葅醢之戮其甘如薺顒怒鞭之而後腰斬新平太守江夏張光數為沈畫計顒執而詰之光曰劉雍州不用鄙計故令大王得有今日顒壯之引與歡宴表為右衛司馬二月乙酉丞相穎表廢皇后羊氏幽于金墉城廢皇太子覃為清河王三月河間王顒表請立丞相頴為太弟戊申詔以頴為皇太弟都督中外諸軍事丞相如故大赦乘輿服御皆遷于鄴制度一如魏武帝故事以顒為太宰大都督雍州牧前太傅劉實為太尉實以老固讓不拜太弟穎僭侈日甚嬖幸用事大失衆望司空東海王越與右衛將軍陳聄及長沙王故將上官已等謀討之秋七月丙申朔陳聄勒兵入雲龍門以詔召三公百僚入殿中戒嚴討穎石超奔鄴戊戌大赦復皇后羊氏及太子覃己亥越奉帝北征以越為大都督徴前侍中嵇紹詣行在侍中秦準謂紹曰今往安危難測卿有佳馬乎紹正色曰臣子扈衛乘輿死生以之佳馬何為越檄召四方兵赴者雲集比至安陽衆十餘萬鄴中震恐穎會羣僚問計東安王繇曰天子親征宜釋甲縞素出迎請罪穎不從遣石超帥衆五萬拒戰折衝將軍喬智明勸穎奉迎乘輿穎怒曰卿名曉事投身事孤今主上為羣小所逼卿奈何欲使孤束手就刑邪陳聄二弟匡規自鄴赴行在云鄴中皆已離散由是不甚設備己未石超軍奄至乘輿敗績於蕩隂帝傷頰中三矢百官侍御皆散嵇紹朝服下馬登輦以身衛帝兵人引紹於轅中斫之帝曰忠臣也勿殺對曰奉太弟令惟不犯陛下一人耳遂殺紹血濺帝衣帝墯於草中亡六璽石超奉帝幸其營帝餒甚超進水左右奉秋桃穎遣盧志迎帝庚申入鄴大赦改元曰建武左右欲浣帝衣帝曰嵇侍中血勿浣也陳聄上官已等奉太子覃守洛陽司空越奔下邳徐州都督東平王楙不納越徑還東海太弟穎以越兄弟宗室之望下令招之越不應命前奮威將軍孫惠上書勸越邀結藩方同奬王室越以惠為記室參軍與參謀議北軍中候苟晞奔范陽王虓虓承制以睎行兖州剌史初三王之起兵討趙王倫也安北將軍王浚擁衆挾兩端禁所部士民不得赴三王召募太弟穎欲討之而未能浚心亦欲圖穎穎以右司馬和演為幽州剌史密使殺浚演與烏桓單于審登謀與浚遊薊城南清泉因而圖之會天暴雨兵器霑濕不果而還審登以為浚得天助乃以演謀告浚浚與審登密嚴兵約并州剌史東嬴公騰共圍演殺之自領幽州營兵騰越之弟也太弟穎稱詔徴浚浚與鮮卑假務勿塵烏桓羯朱及東嬴公騰同起兵討穎穎遣北中郎將王斌及石超擊之太弟穎怨東安王繇前議八月戊辰收繇殺之初繇兄琅邪恭王覲薨子睿嗣睿沈敏有度量為左將軍與東海參軍王導善導敦之從父弟也識量清逺以朝廷多故每勸睿之國及繇死睿從帝在鄴恐及禍將逃歸穎先敕諸關津無得出貴人睿至河陽為津吏所止從者宋典自後來以鞭拂睿而笑曰舍長官禁貴人汝亦被拘邪吏乃聽過至洛陽迎太妃夏侯氏俱歸國丞相從事中郎王澄發孟玖姦利事勸太弟穎誅之穎從之司空越之討太弟穎也太宰顒遣右將軍馮翊太守張方將兵二萬救之聞帝已入鄴因命方鎮洛陽上官已與别將苖願拒之大敗而還太子覃夜襲已願已願出走方入洛陽覃於廣陽門迎方而拜方下車扶止之復廢覃及羊后初太弟穎表胸奴左賢王劉淵為冠軍將軍使將兵在鄴以淵子聰為積弩將軍右賢王宣等謀共立淵為大單于淵僣漢事見劉王浚東嬴公騰起兵淵説頴曰今二鎮跋扈衆十餘萬恐非宿衛及近郡士衆所能禦也請為殿下還説五部以赴國難穎曰五部之衆果可發否就能發之鮮卑烏桓未易當也吾欲奉乘輿還洛陽以避其鋒徐傳檄天下以逆順制之君意何如淵曰殿下武皇帝之子有大勳於王室威恩逺著四海之內孰不願為殿下盡死力者何難發之有王浚豎子東嬴踈屬豈能與殿下爭衡邪殿下一發鄴宫示弱於人洛陽不可得至雖至洛陽威權不復在殿下也願殿下撫勉士衆靖以鎮之淵請為殿下以二部摧東嬴三部梟王浚二豎之首可指日而懸也穎恱拜淵為北單于參丞相軍事淵至左國城劉宣等上大單于之號二旬之間有衆五萬都於離石以聰為鹿蠡王遣左於陸王宏帥精騎五千會穎將王粹拒東嬴公騰粹已為騰所敗宏無及而歸王浚東嬴公騰合兵擊王斌大破之浚以主簿祁弘為前鋒敗石超於平棘乘勝進軍候騎至鄴鄴中大震百僚奔走士卒分散盧志勸穎奉帝還洛陽時甲士尚有萬五千人志夜部分至曉將發而程太妃戀鄴不欲去穎狐疑未決俄而衆潰穎遂將帳下數十騎與志奉帝御犢車南奔洛陽倉猝上下無齎中黃門被囊中齎私錢三千詔貸之於道中買飯夜則御中黃門布被食以瓦盆至溫將謁陵帝喪履納從者之履下拜流涕及濟河張方自洛陽遣其子羆帥騎三千以所乘車奉迎帝至芒山下方自帥萬餘騎迎帝方將拜謁帝下車自止之帝還宫奔散者稍還百官粗備辛巳大赦王浚入鄴士衆暴掠死者甚衆使烏桓羯朱追太弟穎至朝歌不及浚還葪以鮮卑多掠人婦女命有敢挾藏者斬於是沈於易水者八千人劉淵聞太弟穎去鄴歎曰不用吾言逆自奔潰真奴才也然吾與之有言矣不可以不救將發兵擊鮮卑烏桓劉宣等諌曰晉人奴隸御我今其骨肉相殘是天棄彼而使我復呼韓邪之業也鮮卑烏桓我之氣類可以為援奈何擊之淵曰善大丈夫當為漢髙魏武呼韓邪何足效哉宣等稽首曰非所及也冬十月帝既還洛陽張方擁兵專制朝政太弟穎不得復預事豫州都督范陽王虓徐州都督東平王楙等上言穎弗克負荷宜降封一邑特全其命太宰宜委以關右之任自州郡以下選舉授任一皆仰成朝之大事廢興損益每輒疇咨張方為國效節而不逹變通未即西還宜遣還郡所加方官請悉如舊司徒戎司空越並忠國小心宜幹機事委以朝政王浚有定社稷之勳宜特崇重遂撫幽朔長為北藩臣等竭力扞城藩屏皇家則陛下垂拱四海自正矣張方在洛既久兵士剽掠殆竭衆情喧喧無復留意議欲奉帝遷都長安恐帝及公卿不從欲須帝出而劫之乃請帝謁廟帝不許十一月乙未方引兵入殿以所乘車迎帝帝馳避後園竹中軍人引帝出逼使上車帝垂泣從之方於馬上稽首曰今冦賊縱橫宿衛單少願陛下幸臣壘臣盡死力以備不虞時羣臣皆逃匿唯中書監盧志侍側曰陛下今日之事當一從右將軍帝遂幸方壘令方具車載宫人寶物軍人因妻略後宫分爭府藏割流蘇武帳為馬帴魏晉以來蓄積掃地無遺方將焚宗廟宫室以絶人返顧之心盧志曰昔董卓無道焚燒洛陽怨毒之聲百年猶存何為襲之乃止帝停方壘三日方擁帝及太弟穎豫章王熾等趨長安王戎出奔郟太宰顒帥官屬步騎三萬迎于霸上顒前拜謁帝下車止之帝入長安以征西府為宫唯尚書僕射荀藩司隸劉暾河南尹周馥等在洛陽為留臺承制行事號東西臺藩勗之子也丙午留臺大赦改元復為永安辛丑復皇后羊氏十二月丁亥詔太弟穎以成都王還第更立豫章王熾為皇太弟帝兄弟二十五人時存者惟穎熾及吳王晏晏材質庸下熾沖素好學故太宰顒立之詔以司空越為太傅與顒夾輔帝室王戎參録朝政又以光祿大夫王衍為尚書左僕射髙密王略為鎮南將軍領司隸校尉權鎮洛陽東中郎將模為寧北將軍都督冀州諸軍事鎮鄴百官各還本職令州郡蠲除苛政愛民務本清通之後當還東京大赦改元略模皆越之弟也王浚既去鄴越使模鎮之顒以四方乖離禍難不已故下此詔和解之冀獲少安越辭太傅不受又詔以太宰顒都督中外諸軍事張方為中領軍録尚書事領京兆太守二年夏四月張方廢羊后遊楷等攻皇甫重纍年不能克重遣其養子昌求救於外昌詣司空越越以太宰顒新與山東連和不肯出兵昌乃與故殿中人楊篇詐稱越命迎羊后於金墉城入宫以后令發兵討張方奉迎大駕事起倉猝百官初皆從之俄知其詐相與誅昌顒請遣御史宣詔喻重令降重不奉詔先是城中不知長沙厲王及皇甫商已死重獲御史騶人問曰我弟將兵來欲至未騶人曰已為河間王所害重失色立殺騶人於是城中知無外救共殺重以降顒以馮翊太守張輔為秦州刺史東海中尉劉洽以張方劫遷車駕勸司空越起兵討之秋七月越傳檄山東征鎮州郡云欲糾帥義旅奉迎天子還復舊都東平王楙聞之懼長史王修説楙曰東海宗室重望今興義兵公宜舉徐州以授之則免於難且有克讓之美矣楙從之越乃以司空領徐州都督楙自為兖州刺史詔即遣使者劉虔授之是時越兄弟並據方任於是范陽王虓及王浚等共推越為盟主越輒選置刺史以下朝士多赴之成都王穎既廢河北人多憐之頴故將公師藩等自稱將軍起兵於趙魏衆至數萬初上黨武鄉羯人石勒有膽力善騎射并州大飢建威將軍閻粹説東嬴公騰執諸胡於山東賣充軍實勒亦被掠賣為茌平人師歡奴歡竒其狀貌而免之歡家鄰於馬牧勒乃與牧帥汲桑結壯士為羣盜及公師藩起桑與勒帥數百騎赴之桑始命勒以石為姓勒為名藩攻陷郡縣殺二千石長史轉前攻鄴平昌公模甚懼范陽王虓遣其將苟晞救鄴與廣平太守譙國丁紹共擊藩走之八月司空越以琅琊王睿為平東將軍監徐州諸軍事留守下邳睿請王導為司馬委以軍事越帥甲卒三萬西屯蕭縣范陽王虓自許屯于滎陽越承制以豫州刺史劉喬為冀州刺史以范陽王虓領豫州刺史喬以虓非天子命發兵拒之虓以劉琨為司馬越以劉藩為淮北護軍劉輿為潁川太守喬上尚書列輿兄弟罪惡因引兵攻許遣其長子祐將兵拒越於蕭縣之靈壁越兵不能進東平王楙在兖州徴求不已郡縣不堪命范陽王虓遣茍晞還兖州徙楙都督青州楙不受命背山東諸侯與劉喬合太宰顒聞山東兵起甚懼以公師藩為成都王穎起兵壬午表穎為鎮軍大將軍都督河北諸軍事給兵千人以盧志為魏郡太守隨穎鎮鄴欲以撫安之又遣建武將軍呂朗屯洛陽顒發詔令東海王越等各就國越等不從會得劉喬上事冬十月丙子下詔稱劉輿迫脅范陽王虓造構凶逆其令鎮南大將軍劉弘平南將軍彭城王釋征東大將軍劉凖各勒所統與劉喬并力以張方為大都督統精卒十萬與呂朗共會許昌誅輿兄弟釋宣帝弟子穆王權之孫也丁丑顒使成都王穎領將軍樓褒等前車騎將軍石超領北中郎將王闡等據河橋為劉喬繼援進喬鎮東將軍假節劉弘遺喬及司空越書欲使之解怨釋兵同奬王室皆不聽弘又上表曰自頃兵戈紛亂猜禍鋒生疑隙􅌟於羣王災難延于宗子今夕為忠明旦為逆翩其反而互為戎首載籍以來骨肉之禍未有如今者也臣竊悲之今邉陲無備豫之儲中華有杼軸之困而股肱之臣不惟國體職競尋常自相楚剝萬一四夷乘虛為變此亦猛虎交鬪自效於卞莊者矣臣以為宜速發明詔詔越等令兩釋猜嫌各保分局自今以後其有不被詔書擅兵馬者天下共伐之時太宰顆方拒關東倚喬為助不納其言喬乘虛襲許破之劉琨將兵救許不及遂與兄輿及范陽王虓俱奔河北琨父母為喬所執劉弘以張方殘暴知顒必敗乃遣參軍劉盤為督護帥諸軍受司空越節度一月立節將軍周權詐被檄自稱平西將軍復立羊后洛陽令何喬攻權殺之復廢羊后太宰顒矯詔以羊后屢為姦人所立遣尚書田淑敕留臺賜后死詔書纍至司隸校尉劉暾等上奏固執以為羊庶人門户殘破廢放空宫門禁峻密無緣得與姦人􅌟亂衆無愚智皆謂其寃今殺一枯窮之人而令天下傷慘何益於治顒怒遣吕朗收暾暾奔青州依髙密王略然羊后亦以是得免十二月吕朗等東屯滎陽成都王穎進據洛陽劉琨説冀州刺史太原溫羡使讓位於范陽王虓虓領冀州遣琨詣幽州乞師於王浚浚以突騎資之擊王闡於河上殺之琨遂與虓引兵濟河斬石超於滎陽劉喬自考城引退虓遣琨及督護田徽東擊東平王楙於廪丘楙走還國琨徽引兵東迎越擊劉祐於譙祐敗死喬衆遂潰喬奔平氏司空越進屯陽武王浚遣其將祁弘帥突騎鮮卑烏桓為越先驅光熙元年初太弟中庶子蘭陵繆播有寵於司空越播從弟右衛率胤太宰顒前妃之弟也越之起兵遣播胤詣長安説顒令奉帝還洛約與顒分陜為伯顒素信重播兄弟即欲從之張方自以罪重恐為誅首謂顒曰今據形勝之地國冨兵強奉天子以號令誰敢不從奈何拱手受制於人顒乃止及劉喬敗顒懼欲罷兵與山東和解恐張方不從猶豫未決方素與長安冨人郅輔親善以為帳下督顒參軍河間畢垣嘗為方所侮因説顒曰張方久屯霸上聞山東兵盛盤桓不進冝防其未萌其親信郅輔具知其謀繆播繆胤復説顒冝急斬方以謝山東可不勞而定顒使人召輔垣迎説輔曰張方欲反人謂卿知之王若問卿何辭以對輔驚曰實不聞方反為之奈何垣曰王若問卿但言爾爾不然必不免禍輔入顒問之曰張方反卿知之乎輔曰爾顒曰遣卿取之可乎又曰爾顒於是使輔送書於方因殺之輔既昵於方持刀而入守閣者不疑方火下發函輔斬其頭還報顒以輔為定安太守送方頭於司空越以請和越不許宋胄襲河橋樓褒西走平昌公模遣前鋒督護馮嵩會宋胄逼洛陽成都王穎西奔長安至華隂聞顒已與山東和親留不敢進吕朗屯滎陽劉琨以張方首示之遂降甲子司空越遣祁弘宋胄司馬纂帥鮮卑西迎車駕以周馥為司隸校尉假節都督諸軍屯澠池夏四月己巳司空越引兵屯溫初太宰顒以為張方死東方兵必可解既而東方兵聞方死爭入關顒悔之乃斬郅輔遣弘農太守彭隨北地太守刁默將兵拒祁弘等於湖五月壬辰弘等擊隨默大破之遂西入關又敗顒將馬瞻郭偉於霸水顒單馬逃入太白山弘等入長安所部鮮卑大掠殺二萬餘人百官奔散入山中拾橡實食之己亥弘等奉帝乘牛車東還以太弟太保梁柳為鎮西將軍守關中六月丙辰朔帝至洛陽復羊后辛未大赦改元馬瞻等入長安殺梁柳與始平太守梁邁共迎太宰顒於南山弘農太守裴廙秦國內史賈龕安定太守賈匹等起兵擊顒斬馬瞻梁邁匹詡之曽孫也司空越遣督護麋晃將兵擊顒至鄭顒使平北將軍牽秀屯馮翊顒長史楊騰詐稱顒命使秀罷兵騰遂殺秀關中皆服於越顒保城而已八月以司空越為太傅録尚書事范陽王虓為司空鎮鄴平昌公模為鎮東大將軍鎮許昌王浚為驃騎大將軍都督東夷河北諸軍事領幽州剌史越以吏部郎頴川庾敳為軍咨祭酒前太弟中庶子胡母輔之為從事中郎黃門侍郎河南郭象為主簿鴻臚丞阮修為行參軍謝鯤為掾輔之薦樂安光逸於越越亦辟之敳等皆尚虛玄不以世務嬰心縱酒放誕敳殖貨無厭象薄行好招權越皆以其名重於世故辟之祁弘之入關也成都王穎自武關奔新野會新城元公劉弘卒司馬郭勱作亂欲迎穎為主治中順陽郭舒奉弘子璠以討勱斬之詔南中郎將劉陶收穎穎北渡河奔朝歌收故將士得數百人欲赴公師藩九月頓丘太守馮嵩執之送鄴范陽王虓不忍殺而幽之公師藩自白馬南渡河兖州刺史苟睎討斬之進東嬴公騰爵為東燕王平昌公模為南陽王冬十月范陽王虓薨長史劉輿以成都王穎素為鄴人所附祕不發喪偽令人為臺使稱詔夜賜穎死并殺其二子穎官屬先皆逃散惟盧志隨從至死不怠收而殯之太傅越召志為軍咨祭酒越將召劉輿或曰輿猶膩也近則汚人及至越踈之輿密視天下兵簿及倉庫牛馬器械水陸之形皆默識之時軍國多事每會議自長史潘滔以下莫知所對輿應機辨畫越傾膝酬接以為左長史軍國之務悉以委之輿説越遣其弟琨鎮并州以為北面之重越表琨為并州剌史以東燕王騰為車騎將軍都督鄴城諸軍事鎮鄴十一月己巳夜帝食餅中毒庚午崩于顯陽殿羊后自以於太弟熾為嫂恐不得為太后將立清河王覃侍中華混諌曰太弟在東宫已久民望素定今日寧可易乎即露板馳告太傅越召太弟入宫后已召覃至尚書閣疑變託疾而返癸酉太弟即皇帝位大赦尊皇后曰惠皇后居弘訓宫追尊母王才人曰皇太后立妃梁氏為皇后懷帝始遵舊制於東堂聽政每至宴會輒與羣官論衆務考經籍黃門侍郎傅宣歎曰今日復見武帝之世矣十二月太傅越以詔書徴河間王顒為司徒顒乃就徴南陽王模遣其將梁臣邀之於新安車上扼殺之并殺其三子劉琨至上黨東燕王騰即自井陘東下時并州飢饉數為胡寇所掠郡縣莫能自保州將田甄甄弟蘭任祉祁濟李惲薄盛等及吏民萬餘人悉隨騰就榖冀州號為乞活所餘之户不滿二萬寇賊縱橫道路斷塞琨募兵上黨得五百人轉鬭而前至晉陽府寺焚毁邑野蕭條琨撫循勞徠流民稍集懷帝永嘉元年二月東萊王彌寇青徐二州自稱征東大將軍攻殺二千石太傅越以公車令東萊鞠羡為本郡太守以討彌彌擊殺之三月詔追復楊太后尊號丁卯改葬之諡曰武悼庚午立清河王覃弟豫章王詮為皇太子辛未大赦帝親覽大政留心庶事太傅越不悅固求出藩庚辰越出鎮許昌以髙密王略為征南大將軍都督荆州諸軍事鎮襄陽南陽王模為征西大將軍都督秦雍梁益四州諸軍事鎮長安東燕王騰為新蔡王都督司冀二州諸軍事仍鎮鄴公師藩既死汲桑逃還苑中更聚衆劫掠郡縣自稱大將軍聲言為成都王報仇以石勒為前驅所嚮輒克署勒掃虜將軍遂進攻鄴時鄴中府庫空竭而新蔡武哀王騰資用甚饒騰性吝嗇無所振惠臨急乃賜將士米各數升帛各丈尺以是人不為用夏五月桑大破魏郡太守馮嵩長驅入鄴騰輕騎出奔為桑將李豐所殺桑出成都王穎棺載之車中每事啓而後行遂燒鄴宫火旬日不滅殺士民萬餘人大掠而去濟自延津南擊兖州太傅越大懼使苟晞及將軍王讃等討之石勒與苟晞等相持於平原陽平間數月大小三十餘戰互有勝負秋七月己酉朔太傅越屯官渡為晞聲援己未以琅邪王睿為安東將軍都督楊州江南諸軍事假節鎮建業八月己卯朔苟晞擊汲桑於東武陽大破之桑退保清淵九月戊申琅邪王睿至建業睿以安東司馬王導為謀主推心親信每事咨焉睿名論素輕吳人不附居久之士大夫莫有至者導患之會睿出觀禊導使睿乘肩輿具威儀導與諸名勝皆騎從紀瞻顧榮等見之驚異相帥拜於道左導因説睿曰顧榮賀循此土之望宜引之以結人心二子既至則無不來矣睿乃使導躬造循榮二人皆應命而至以循為吳國內史榮為軍司加散騎常侍凡軍府政事皆與之謀議又以紀瞻為軍祭酒卞壷為從事中郎周玘為倉曹屬琅邪劉超為舍人張闓及魯國孔衍為參軍壷粹之子闓昭之曽孫也王導説睿謙以接士儉以足用以清靜為政撫綏新舊故江東歸心焉睿初至頗以酒廢事導以為言睿命酌引觴覆之於此遂絶苟晞追擊汲桑破其八壘死者萬餘人桑與石勒收餘衆將奔漢冀州剌史丁紹邀之於赤橋又破之桑奔馬牧勒奔樂平太傅越還許昌加苟晞撫軍將軍都督青兖諸軍事丁紹寧北將軍監冀州諸軍事皆假節胡部大張㔨督馮莫突等擁衆數千壁于上黨石勒往從之因説㔨督等曰劉單于舉兵擊晉部大拒而不從自度終能獨立乎曰不能勒曰然則安可不早有所屬今部落皆已受單于賞募往往聚議欲叛部大而歸單于矣㔨督等以為然冬十月㔨督等隨勒單騎歸漢漢王淵署㔨督為親漢王莫突為都督部大以勒為輔漢將軍平晉王以統之烏桓張伏利度有衆二千壁于樂平淵屢招不能致勒偽獲罪於淵往奔伏利度伏利度喜結為兄弟使勒帥諸胡冦掠所向無前諸胡畏服勒知衆心之附已乃因會執伏利度謂諸胡曰今起大事我與伏利度誰堪為主諸胡咸推勒勒於是釋伏利度帥其衆歸漢淵加勒督山東征討諸軍事以伏利度之衆配之十一月甲寅以尚書右僕射和郁為征北將軍鎮鄴乙亥以王衍為司徒十二月戊寅乞活田甄田蘭薄盛等起兵為新蔡王騰復讎斬汲桑于樂陵棄成都王穎棺於故井中穎故臣收葬之前北軍中侯吕雍度支校尉陳顔等謀立清河王覃為太子事覺太傅越矯詔囚覃於金墉城初太傅越與苟晞親善引升堂結為兄弟司馬潘淹説越曰兖州衝要魏武以之創業苟晞有大志非純臣也久令處之則患生心腹矣若遷于青州厚其名號晞必悅公自牧兖州經緯諸夏藩衛本朝此所謂為之於未亂者也越以為然癸卯越自為丞相領兖州牧都督兖豫司冀幽并諸軍事以晞為征東大將軍開府儀同三司加侍中假節都督青州諸軍事領青州刺史封東平郡公越晞由是有隙初陽平劉靈少貧賤力制奔牛走及奔馬時人雖異之莫能舉也靈撫膺歎曰天乎何當亂也及公師藩起靈自稱將軍冦掠趙魏會王彌為苟純所敗靈亦為王讃所敗遂俱遣使降漢漢拜彌鎮東大將軍青徐二州牧都督緣海諸軍事封東萊公以靈為平北將軍純睎之弟也二年春正月漢王淵遣撫軍將軍聰等十將南據太行輔漢將軍石勒等十將東下趙魏二月辛卯太傅越殺清河王覃三月太傅越自許昌徙鎮甄城王彌收集亡散兵復大振分遣諸將攻掠青徐兖豫四州所過攻陷郡縣多殺守令有衆數萬苟晞與之連戰不能克夏四月丁亥彌入許昌太傅越遣司馬王斌帥甲士五千人衛京師涼州刺史張軌亦遣督護北宫純將兵衛京師五月彌入自轘轅敗官軍于伊北京師大震官城門晝閉壬戌彌至洛陽屯于津陽門詔以王衍都督征討諸軍事甲子衍與王斌等出戰北宫純募勇士百餘人突陳彌兵大敗乙丑彌燒建春門而東衍遣左衛將軍王秉追之戰于七里澗又敗之彌走渡河與王桑自軹關如平陽漢王淵遣侍中兼御史大夫郊迎令曰孤親行將軍之館拂席洗爵敬待將軍及至拜司隸校尉加侍中特進以桑為散騎侍郎北宫純等與漢劉聰戰於河東敗之秋七月甲辰漢王淵冦平陽太守宋抽棄郡走河東太守路述戰死淵徙都蒲子上郡鮮卑陸逐延氐酋單徴並降於漢八月丁亥太傅越自鄄城徙屯濮陽未幾又徙屯滎陽九月漢王彌石勒冦鄴和郁棄城走詔豫州刺史裴憲屯白馬以拒彌車騎將軍王堪屯東燕以拒勒平北將軍曹武屯大陽以備蒲子憲楷之子也石勒劉靈帥衆三萬冦魏郡汲郡頓丘百姓望風降附者五十餘壘皆假壘主將軍都尉印綬簡其強壯五萬為軍士老弱安堵如故己酉勒執魏郡太守王粹于三臺殺之三年春正月辛丑朔熒惑犯紫微漢太史令宣于修之言於漢主淵曰不出三年必克洛陽蒲子﨑嶇難以久安平陽氣象方昌請徙都之淵從之三月丁巳太傅越自滎陽入京師中書監王敦謂所親曰太傳專執威權而選用表請尚書猶以舊制裁之今日之來必有所誅帝之為太弟也與中庶子繆播親善及即位以播為中書監繆胤為太僕卿委以心膂帝舅散騎常侍王延尚書何綏太史令髙堂沖並參機密越疑朝臣二於己劉輿潘滔勸越悉誅播等越乃誣播等欲為亂乙丑遣平東將軍王秉帥甲士三千入宫執播等十餘人於帝側付廷尉殺之帝歎息流涕而已綏曽之孫也初何曽侍武帝宴退謂諸子曰主上開創大業吾每宴見未嘗聞經國逺圖惟説平生常事非貽厥孫謀之道也及身而已後嗣其殆乎汝輩猶可以免指諸孫曰此屬必及於難及綏死兄嵩哭之曰我祖其殆聖乎臣光曰何曽譏武帝偷惰取過目前不為逺慮知天下將亂子孫必與其憂何其明也然身為僭侈使子孫承流卒以驕奢亡族其明安在哉且身為宰相知其君之過不以告而私語於家非忠臣也丁卯詔以王衍為太尉太傅越解兖州牧領司徒越以頃來興事多由殿省乃奏宿衛有侯爵者皆罷之時殿中武官並封侯由是出者略盡皆泣涕而去更使右衛將軍何倫左衛將軍王秉領東海國兵數百人宿衛左積弩將軍朱誕奔漢具陳洛陽孤弱勸漢主淵攻之淵以誕為前鋒都督以滅晉大將軍劉景為大都督將兵攻黎陽克之又敗王堪於延津沈男女三萬餘人於河淵聞之怒曰景何面復見朕且天道豈能容之吾所欲除者司馬氏耳細民何罪黜景為平虜將軍夏漢安東大將軍石勒冦巨鹿常山衆至十餘萬集衣冠人物别為君子營以趙郡張賔為謀主刁膺為股肱夔安孔萇支雄桃豹逯明為爪牙并州諸胡羯多從之初張賔好讀書闊達有大志常自比張子房及石勒徇山東賔謂所親曰吾歷觀諸將無如此胡將軍者可與共成大業乃提劒詣軍門大呼請見勒亦未之竒也賔數以策于勒已而皆如所言勒由是竒之署為軍功曹動靜咨之漢主淵以王彌為侍中都督青徐兖豫荆楊六州諸軍事征東大將軍青州牧與楚王聰共攻壷關以石勒為前鋒都督劉琨遣護軍黃肅韓述救之聰敗述於西澗勒敗肅於封田皆殺之太傅越遣淮南內史王曠將軍施融曹超將兵拒聰等曠濟河欲長驅而前融曰彼乘險間出我雖有數萬之衆猶是一軍獨受敵也且當阻水為固以量形勢然後圖之曠怒曰君欲沮衆邪融退曰彼善用兵曠暗於事勢吾屬今必死矣曠等踰太行與聰遇戰於長平之間曠兵大敗融超皆死聰遂破屯留長子凡斬獲萬九千級上黨太守龐淳以壷關降漢劉琨以都尉張倚領上黨太守據襄垣秋八月漢主淵命楚王聰等進攻洛陽詔平北將軍曹武等拒之皆為聰所敗聰長驅至冝陽自恃驟勝怠不設備九月弘農太守垣延詐降夜襲聰軍聰大敗而還冬十月漢主淵復遣楚王聰王彌始安王曜汝隂王景帥精騎五萬冦洛陽大司空鴈門剛穆公呼延翼帥步卒繼之丙辰聰等至冝陽朝廷以漢兵新敗不意其復至大懼辛酉聰屯西明門北宫純等夜帥勇士千餘人出攻漢壁斬其征虜將軍呼延皓壬戌聰南屯洛水乙丑呼延翼為其下所殺其衆自大陽潰歸淵敕聰等還師聰表稱晉兵微弱不可以翼皓死故還師固請留攻洛陽淵許之太傅越嬰城自守戊寅聰親祈嵩山留平晉將軍安陽哀王厲冠軍將軍呼延朗督攝留軍太傅參軍孫詢説越乘虛出擊朗斬之厲赴水死王彌謂聰曰今軍既失利洛陽守備猶固運車在陜糧食不支數日殿下不如與龍驤還平陽裹糧發卒更為後舉下官亦收兵穀待命於兖豫不亦可乎聰自以請留未敢還宣于修之言於淵曰嵗在辛未乃得洛陽今晉氣猶盛大軍不歸必敗淵乃召聰等還十一月甲申漢楚王聰始安王曜歸于平陽王彌南出轘轅流民之在潁川襄城汝南南陽河南者數萬家素為居民所苦皆燒城邑殺二千石長吏以應彌石勒冦信都殺冀州刺史王斌王浚自領冀州詔車騎將軍王堪北中郎將裴憲將兵討勒勒引兵還拒之魏郡太守劉矩以郡降勒勒至黎陽裴憲棄軍奔淮南王堪退保倉垣十二月漢王彌表左長史曹嶷行安東將軍東徇青州四年春正月漢鎮東大將軍石勒濟河拔白馬王彌以三萬衆會之共冦徐豫兖州二月勒襲鄄城殺兖州刺史袁孚遂拔倉垣殺王堪復北濟河攻冀州諸郡民從之者九萬餘口秋七月漢楚王聰始安王曜石勒及安北大將軍趙國圍河內太守裴整于懷詔征虜將軍宋抽救懷勒與平北大將軍王桑逆擊抽殺之河內人執整以降漢主淵以整為尚書左丞河內督將郭默收整餘衆自為塢主劉琨以默為河內太守己卯漢主淵卒九月雍州流民多在南陽詔書遣還鄉里流民以關中荒殘皆不願歸征南將軍山簡南中郎將杜蕤各遣兵送之促期令發京兆王如遂潛結壯士夜襲二軍破之於是馮翊嚴嶷京兆侯脫各聚衆攻城鎮殺令長以應之未幾衆至四五萬自號大將軍領司雍二州牧稱藩于漢冬十月漢河內王粲始安王曜及王彌帥衆四萬冦洛陽石勒帥騎二萬會粲于大陽敗監軍裴邈于澠池遂長驅入洛川粲出轘轅掠梁陳汝潁間勒出成臯關壬寅圍陳留太守王讚於倉垣為讚所敗退屯文石津京師飢困日甚太傅越遣使以羽檄徴天下兵使入援京師帝謂使者曰為我語諸征鎮今日尚可救後則無及矣既而卒無至者征南將軍山簡遣督護王萬將兵入援軍于涅陽為王如所敗如遂大掠沔漢進逼襄陽簡嬰城自守荆州刺史王澄自將欲援京師至沶口聞簡敗衆散而還朝議多欲遷都以避難王衍以為不可賣車牛以安衆心山簡為嚴嶷所逼自襄陽徙屯夏口石勒引兵濟河將趣南陽王如侯脫嚴嶷等聞之遣衆一萬屯襄城以拒勒勒擊之盡俘其衆進屯宛北是時侯脫據宛王如據穰如素與脫不協遣使重賂勒結為兄弟説勒使攻脫勒攻宛克之嚴嶷引兵救宛不及而降勒斬脫囚嶷送于平陽盡并其衆遂南冦襄陽攻拔江西壘壁三十餘所還趣襄城王如遣弟璃襲勒勒迎擊滅之復屯江西太傳越既殺王延等大失衆望又以胡冦益盛內不自安乃戎服入見請討石勒且鎮集兖豫帝曰今胡虜侵逼郊畿人無固志朝廷社稷倚賴於公豈可逺出以孤根本對曰臣出幸而破賊則國威可振猶愈於坐待困窮也十一月甲戌越帥甲士四萬向許昌留妃裴氏世子毗及龍驤將軍李惲右衛將軍何倫守衛京師防察宫省以潘滔為河南尹揔留事越表以行臺自隨用太尉衍為軍司朝賢素望悉為佐吏名將徑卒咸入其府於是宫省無復守衛荒饉日甚殿內死人交橫盜賊公行府寺營署並掘塹自守越東屯項以馮嵩為左司馬自領豫州牧竟陵王楙白帝遣兵襲何倫不克帝委罪於楙楙逃竄得免楊州都督周馥以洛陽孤危上書請遷都壽春太傅越以馥不先白已而直上書大怒召馥及淮南太守裴碩馥不肯行令碩帥兵先進碩詐稱受越密旨襲馥為馥所敗退保東城初帝以王彌石勒侵逼京畿詔苟晞督帥州郡討之會曹嶷破琅邪北收齊地兵勢甚盛苟純閉城自守睎還救青州與嶷連戰破之五年春正月苟晞為曹嶷所敗棄城奔髙平裴碩求救於琅邪王睿睿渡沔冦江夏拔之使揚威將軍甘卓等攻周馥於壽春馥衆潰奔項新蔡王確執之馥憂憤而卒確騰之子二月石勒攻新蔡殺新蔡莊王確於南頓進拔許昌殺平東將軍王康東海孝獻王越既與苟晞有隙河南尹潘滔尚書劉望等復從而譛之晞怒表求滔等首陽言司馬元超為宰相不平使天下淆亂苟道將豈可以不義使之乃移檄諸州自稱功伐陳越罪狀帝亦惡越專權多違詔命所留將士何倫等抄掠公卿逼辱公主密賜晞手詔使討之晞數與帝文書往來越疑之使遊騎於成臯間伺之果獲晞使及詔書乃下檄罪狀晞以從事中郎楊瑁為兖州刺史使與徐州刺史裴盾共討晞晞遣騎收潘滔滔夜遁得免執尚書劉曽侍中程延斬之越憂憤成疾以後事付王衍三月丙子薨于項祕不發喪衆共推衍為元帥衍不敢當以讓襄陽王範範亦不受範瑋之子也於是衍等相與奉越喪還葬東海何倫李惲等聞越薨奉裴妃及世子毗自洛陽東走城中士民爭隨之帝追貶越為縣王以苟晞為大將軍大都督督青徐兖豫荆揚六州諸軍事夏四月石勒帥輕騎追太傅越之喪及於苦縣寧平城大敗晉兵縱騎圍而射之將士十餘萬人相踐如山無一人得免者執太尉衍襄陽王範任城王濟武陵莊王淡西河王喜梁懷王禧齊王超吏部尚書劉望廷尉諸葛銓豫州刺史劉喬太傅長史庾敳等坐之幕下問以晉故衍具陳禍敗之由云計不在已且自言少無宦情不豫世事因勸勒稱尊號冀以自免勒曰君少壯登朝名蓋四海身居重任何得言無宦情邪破壞天下非君而誰命左右扶出衆人畏死多自陳述獨襄陽王範神色儼然顧呵之曰今日之事何復紛紜勒謂孔萇曰吾行天下多矣未嘗見此輩人當可存乎萇曰彼皆晉之王公終不為吾用勒曰雖然要不可加以鋒刃夜使人排牆殺之濟宣帝弟子景王陵之子禧淡之子也剖越柩焚其尸曰亂天下者此人也吾為天下報之故焚其骨以告天地何倫等至洧倉遇勒戰敗東海世子毗及宗室四十八王皆沒於勒何倫奔下邳李惲奔廣宗裴妃為人所掠賣久之渡江初琅邪王睿之鎮建業裴妃意也故睿德之厚加存撫以其子沖繼越後五月以太子太傅傅祗為司徒尚書令荀藩為司空加王浚大司馬侍中大都督督幽冀諸軍事南陽王模為太尉大都督張軌為車騎大將軍琅邪王睿為鎮東大將軍兼督楊江湘交廣五州諸軍事茍晞表請遷都倉垣使從事中郎劉會將船數十艘宿衛五百人穀千斛迎帝帝將從之公卿猶豫左右戀資財遂不果行既而洛陽飢困人相食百官流亡者什八九帝召公卿議將行而衛從不備帝撫手歎曰如何曽無車輿乃使傅祗出詣河隂治舟楫朝士數十人導從帝步出西掖門至銅駝街為盜所掠不得進而還度支校尉東郡魏浚帥流民數百家保河隂之硤石時劫掠得榖麥獻之帝以為揚威將軍平陽太守度支如故漢主聰使前軍大將軍呼延晏將兵二萬七千冦洛陽比及河南晉兵前後十二敗死者三萬餘人始安王曜王彌石勒皆引兵會之未至晏留輜重於張方故壘癸未先至洛陽甲申攻平昌門丙戌克之遂焚東陽門及諸府寺六月丁亥朔晏以外繼不至俘掠而去帝具舟於洛水將東走晏盡焚之庚寅荀藩及弟光祿大夫組奔轘轅辛卯王彌至宣陽門壬辰始安王曜至西明門丁酉王彌呼延晏克宣陽門入南宫升太極前殿縱兵大掠悉收宫人珍寶帝出華林園門欲奔長安漢兵追執之幽於端門曜自西明門入屯武庫戊戌曜殺太子詮吳孝王晏竟陵王楙右僕射曹馥尚書閭丘沖河南尹劉默等士民死者三萬餘人遂發掘諸陵焚宫廟官府皆盡曜納惠帝羊皇后遷帝及六璽於平陽石勒引兵出轘轅屯許昌光祿大夫劉蕃尚書盧志奔并州丁未漢主聰大赦改元嘉平以帝為特進左光祿大夫封平阿公以侍中庾珉王俊為光祿大夫岷敳之兄也初始安王曜以王彌不待已至先入洛陽怨之彌説曜曰洛陽天下之中山河四塞城池宫室不假修營宜白主上自平陽徙都之曜以天下未定洛陽四面受敵不可守不用彌䇿而焚之彌罵曰屠各子豈有帝王之意邪遂與曜有隙引兵東屯項關前司隸校尉劉暾説彌曰今九州糜沸群雄競逐將軍於漢建不世之功又與始安王相失將何以自容不如東據本州徐觀天下之勢上可以混一四海下不失鼎峙之業䇿之上者也彌心然之司徒傅祗建行臺於河隂司空荀藩在陽城河南尹華薈在成臯汝隂太守平陽李矩為之立屋輸榖以給之薈歆之曽孫也藩與弟組族子中護軍嵩薈與弟中領軍恆建行臺於密傳檄四方推琅邪王睿為盟主藩承制以嵩為襄城太守矩為滎陽太守前冠軍將軍河南禇翜為梁國內史揚威將軍魏浚屯洛北石梁塢劉琨承制假浚河南尹浚詣荀藩咨謀軍事藩邀李矩同會矩夜赴之矩官屬皆曰浚不可信不宜夜往矩曰忠臣同心何所疑乎遂往相與結歡而去浚族子該聚衆據一泉塢藩以為武威將軍豫章王端太子詮之弟也東奔倉垣苟晞帥群官奉以為皇太子置行臺端承制以晞領太子太傅都督中外諸軍録尚書事自倉垣徙屯蒙城撫軍將軍秦王業吳孝王之子荀藩之甥也年十二南奔密藩等奉之南趣許昌前豫州刺史天水閻鼎聚西州流民數千人於密欲還鄉里荀藩以鼎有才而擁衆用鼎為豫州刺史以中書令李絙司徒左長史彭城劉疇鎮軍長史周顗司馬李述等為之參佐顗浚之子也時海內大亂獨江東差安中國士民避亂者多南渡江鎮東司馬王導説琅邪王睿收其賢俊與之共事睿從之辟掾屬百餘人時人謂之百六掾以前潁川太守勃海刁協為軍咨祭酒前東海太守王承廣陵相卞壼為從事中郎江寧令諸葛恢歷陽參軍陳國陳頵為行參軍前太傅掾庾亮為西曹掾南陽王模使牙門趙染戍蒲坂染帥衆降漢漢兵圍長安模戰敗遂降於漢九月河內王粲殺模關西飢饉白骨蔽野士民存者百無一二聰以始安王曜為車騎大將軍雍州牧更封中山王鎮長安以王彌為大將軍封齊茍晞驕奢苛暴衆心離怨加以疾疫飢饉石勒攻王讃於陽夏擒之遂襲蒙城執晞及豫章王端鎖晞頸以為左司馬漢主聰拜勒幽州牧王彌與勒外相親而內相忌彌聞勒擒茍晞心惡之以書賀勒曰公獲苟晞而用之何其神也使晞為公左彌為公右天下不足定也勒謂張賔曰王公位重而言卑其圖我必矣賔因勸勒乘彌小衰誘而取之冬十月勒請彌燕于己吾酒酣勒手斬彌而并其衆表漢主聰稱彌叛逆聰大怒遣使讓勒專害公輔有無君之心然猶加勒鎮東大將軍督并幽二州諸軍事領并州刺史以慰其心苟晞王讃潛謀叛勒勒殺之并晞弟純勒引兵掠豫州諸郡臨江而還屯于葛陂初南陽王模以從事中郎索綝為馮翊太守綝靖之子也模死綝與安夷護軍金城麴允頻陽令梁肅俱奔安定時安定太守賈匹與諸氐羌皆送任子於漢綝等遇之於隂密擁還臨涇與匹謀興復晉室匹從之乃共推匹為平西將軍帥衆五萬向長安雍州刺史麴特新平太守竺恢皆不降於漢聞匹起兵與扶風太守梁綜帥衆十萬會之綜肅之兄也漢河內王粲在新豐使其將劉雅趙染攻新平不克索綝救新平大小百戰雅等敗退中山王曜與匹等戰於黃丘曜衆大敗匹遂襲漢梁州刺史彭蕩仲殺之麴特等擊破粲於新豐粲還平陽於是匹等兵勢大振關西胡晉翕然響應閻鼎欲奉秦王業入關據長安以號令四方河隂令傅暢祗之子也亦以書勸之鼎遂行荀藩劉疇周顗李述等皆山東人不欲西行中塗逃散鼎遣兵追之不及殺李絙等鼎與業自宛趣武關遇盜於上洛士卒敗散收其餘衆進至藍田使人告賈匹匹遣兵迎之十二月入于雍城使梁綜將兵衛之周顗奔琅邪王睿睿以顗為軍咨祭酒前騎都尉譙國桓彞亦避亂過江見睿微弱謂顗曰我以中州多故來此求全而單弱如此將何以濟既而見王導共論世事退謂顗曰向見管夷吾無復憂矣諸名士相與登新亭遊宴周顗中坐歎曰風景不殊舉目有江河之異因相視流涕王導愀然變色曰當共戮力王室克復神州何至作楚囚對泣邪衆皆收淚謝之陳頵遺王導書曰中華所以傾弊者正以取才失所先白望而後實事浮競驅馳互相貢薦言重者先顯言輕者後敘遂相波扇乃至陵遲加有莊老之俗傾惑朝廷飬望者為弘雅政事者為俗人王職不恤法物墜喪夫欲制逺先由近始今宜改張明賞信罰拔卓茂於密縣顯朱邑於桐鄉然後大業可舉中興可冀耳導不能從六年春正月漢鎮北將軍靳沖平北將軍卜珝冦并州辛未圍晉陽二月石勒築壘於葛陂課農造舟將攻建業琅邪王睿大集江南之衆於壽春以鎮東長史紀瞻為揚威將軍都督諸軍以討之會大雨三月不止勒軍中飢疫死者太半聞晉軍將至集將佐議之右長史刁膺請先送𣢾於睿求掃平河朔以自贖俟其軍退徐更圖之勒愀然長嘯中堅將軍夔安請就髙避水勒曰將軍何怯邪孔萇等三十餘將請各將兵分道夜攻壽春斬吳將頭據其城食其粟要以今年破丹陽定江南勒笑曰是勇將之計也各賜鎧馬一匹顧謂張賔曰於君意何如賔曰將軍攻陷京師囚執天子殺害王公妻略妃主擢將軍之髮不足以數將軍之罪奈何復相臣奉乎去年既殺王彌不當來此今天降霖雨於數百里中示將軍不應留此也鄴有三臺之固西接平陽山河四塞宜北徙據之以經營河北河北既定天下無處將軍之右者矣晉之保壽春畏將軍往攻之耳彼聞吾去喜於自全何暇追襲吾後為吾不利邪將軍宜使輜重從北道先發將軍引大兵向壽春輜重既逺大兵徐還何憂進退無地乎勒攘袂鼓髯曰張君計是也責刁膺曰君既相輔佐當共成大功奈何遽勸孤降此䇿應斬然素知君怯特相宥耳於是黜膺為將軍擢賔為右長史號曰右侯勒引兵發葛陂遣石虎帥騎二千向壽春遇晉運船虎將士爭取之為紀瞻所敗瞻追奔百里前及勒軍勒結陳待之瞻不敢擊退還夀春漢主聰封帝為會稽郡公加儀同三司聰從容謂帝曰卿昔為豫章王朕與王武子造卿武子稱朕於卿卿言聞其名久矣贈朕柘弓銀研卿頗記否帝曰臣安敢忘之但恨爾日不早識龍顔聰曰卿家骨肉何相殘如此帝曰大漢將應天受命故為陛下自相驅除此殆天意非人事也且臣家若能奉武皇帝之業九族敦睦陛下何由得之聰喜以小劉貴人妻帝曰此名公之孫也卿善遇之代公猗盧遣兵救晉陽三月乙未漢兵敗走卜珝之卒先奔靳沖擅收珝斬之聰大怒遣使持節斬沖賈匹等圍長安數月漢中山王曜連戰皆敗驅掠士女八萬餘口奔于平陽秦王業自雍入于長安五月漢主聰貶曜為龍驤大將軍行大司馬聰使河內王粲攻傅祗於三渚右將軍劉參攻郭默於懷會祗病薨城陷粲遷祗子孫并其士民二萬餘户于平陽石勒自葛陂北行所過皆堅壁清野虜掠無所獲軍中飢甚士卒相食至東燕聞汲郡向冰聚衆數千壁枋頭勒將濟河恐冰邀之張賔曰聞冰船盡在瀆中未上宜遣輕兵間道襲取以濟大軍大軍既濟冰必可擒也秋七月勒使支雄孔萇自文石津縛筏潛渡取其船勒引兵自棘津濟河擊冰大破之盡得其資儲軍勢復振遂長驅至鄴劉演保三臺以自固臨深牟穆等復帥其衆降於勒諸將欲攻三臺張賔曰演雖弱衆猶數千三臺險固攻之未易猝拔捨而去之彼將自潰方今王彭祖劉越石公之大敵也宜先取之演不足顧也且天下飢亂明公雖擁大兵遊行羇旅人無定志非所以保萬全制四方也不若擇便地而據之廣聚糧儲西稟平陽以圖幽并此霸王之業也邯鄲襄國形勝之地請擇一而都之勒曰右侯之計是也遂進據襄國賔復言於勒曰今吾居此彭祖越石所深忌也恐城塹未固資儲未廣二冦交至宜亟收野榖且遣使至平陽具陳鎮此之意勒從之分命諸將攻冀州郡縣壁壘多降運其榖以輸襄國且表於漢主聰聰以勒為都督冀幽并營四州諸軍事冀州牧進封上黨公劉琨移檄州郡期以十月會平陽擊漢琨素奢豪喜聲色河南徐潤以音律得辛於琨琨以為晉陽令潤驕恣干預政事護軍令狐盛數以為言且勸琨殺之琨不從潤譖盛於琨琨收盛殺之琨母曰汝不能駕御豪傑以恢逺略而專除勝已禍必及我盛子泥奔漢具言虛實漢主聰大喜遣河內王粲中山王曜將兵冦并州以令狐泥為鄉導琨聞之東出收兵於常山及中山使其將郝詵張喬將兵拒粲且遣使求救於代公猗盧詵喬俱敗死粲曜乘虛襲晉陽太原太守髙喬并州别駕郝聿以晉陽降漢八月庚戌琨還救晉陽不及帥左右數十騎奔常山辛亥粲曜入晉陽壬子令狐泥殺琨父母粲曜送尚書盧志侍中許遐太子右衛率崔瑋于平陽聰復以曜為車騎大將軍以前將軍劉豐為并州刺史鎮晉陽九月聰以盧志為太弟太師崔瑋為太傅許遐為太保髙喬令狐泥皆為武衛將軍辛巳賈匹等奉秦王業為皇太子建行臺於長安登壇告類建宗廟社稷大赦以閻鼎為太子詹事揔攝百揆加賈匹征西大將軍以秦州刺史南陽王保為大司馬命司空荀藩督攝逺近光祿大夫荀組領司隸校尉行豫州刺史與藩共保開封冬十月代公猗盧遣其子六修及兄子普根將軍衛雄范班箕淡帥衆數萬為前鋒以攻晉陽猗盧自帥衆二十萬繼之劉琨收散卒數千為之鄉導六修與漢中山王曜戰於汾東曜兵敗墜馬中七創討虜將軍傅虎以馬授曜曜不受曰卿當乘以自免吾創已重自分死此虎泣曰虎蒙大王識拔至此常思效命今其時矣且漢室初基天下可無虎不可無大王也乃扶曜上馬驅令渡汾自還戰死曜入晉陽夜與大將軍粲鎮北大將軍豐掠晉陽之民踰蒙山而歸十一月猗盧追之戰於藍谷漢兵大敗擒劉豐斬邢延等三千餘級伏尸數百里猗盧因大獵夀陽山陳閲皮肉山為之赤劉琨自營門步入拜謝固請進軍猗盧曰吾不早來致卿父母見害誠以相愧今卿已復州境吾逺來士馬疲弊且待後舉劉聰未可滅也遺琨馬牛羊各千餘匹車百乘而還留其將箕淡假繁等戍晉陽琨徙居陽曲招集亡散盧諶為劉粲參軍亡歸琨漢人殺其父志及弟謐詵贈傅虎幽州剌史十二月彭天護攻賈匹殺之閻鼎殺梁綜麴允索綝等攻鼎鼎奔雍為氐所殺愍帝建興元年春正月丁丑朔漢主聰宴群臣於光極殿使懷帝著青衣行酒庾珉王俊等不勝悲憤因號哭聰惡之有告珉等謀以平陽應劉琨者二月丁未聰殺珉俊等故晉臣十餘人懷帝亦遇害荀嵩曰懷帝天姿清劭少著英猷若遇承平足為守文佳主而繼惠帝擾亂之後東海專政故無幽厲之釁而有流亡之禍矣夏四月丙午懷帝凶問至長安皇太子舉哀因加元服壬申即皇帝位大赦改元以衛將軍梁芬為司徒雍州剌史麴允為尚書左僕射録尚書事京兆太守索綝為尚書右僕射領吏部京兆尹是時長安城中户不盈百蒿棘成林公私有車四乘百官無章服印綬唯桑版署號而已尋以索綝為衛將軍領太尉軍國之事悉以委之漢中山王曜司隸校尉喬智明冦長安平西將軍趙染帥衆赴之詔麴允屯黃白城以拒之石勒使石虎攻鄴鄴潰劉演奔廩丘三臺流民皆降於勒勒以桃豹為魏郡太守以撫之久之以石虎代豹鎮鄴五月壬辰以琅邪王睿為左丞相大都督督陜東諸軍事南陽王保為右丞相大都督督陜西諸軍事詔曰今當掃除鯨鯢奉迎梓宫令幽并兩州勒卒三十萬直造平陽右丞相宜帥秦涼梁雍之師三十萬徑詣長安左丞相帥所領精兵二十萬徑造洛陽同赴大期克成元勳漢中山王曜屯蒲坂六月劉琨與代公猗盧會于陘北謀擊漢秋七月琨進據藍谷猗盧遣拓跋普根屯于北屈琨遣監軍韓據自西河而南將攻西平漢主聰遣大將軍粲等拒琨驃騎將軍易等拒普根蕩晉將軍蘭陽等助守西平琨等聞之引兵還聰使諸軍仍屯所在為進取之計帝遣殿中都尉劉蜀詔左丞相睿以時進軍與乘輿會除中原八月癸亥蜀至建康睿辭以方平定江東未暇北伐以鎮東長史刁協為丞相左長史從事中郎彭城劉隗為司直邵陵內史廣陵戴邈為軍咨祭酒參軍丹楊張闓為從事中郎尚書郎潁川鍾雅為記室參軍譙國桓宣為舍人豫章熊逺為主簿會稽孔愈為掾劉隗雅習文史善伺候睿意故睿特親愛之九月漢中山王曜趙染攻麴允于黃白城允纍戰皆敗詔以索綝為征東大將軍將兵助允冬十月漢趙染謂中山王曜曰麴允帥大衆在外長安空虛可襲也曜使染帥精騎五千襲長安庚寅夜入外城帝奔射鴈樓染焚龍尾及諸營殺掠千餘人辛卯旦退屯逍遙園壬辰將軍麴鑒自阿城帥衆五千救長安癸巳染引還鑒追之與曜遇於零武鑒兵大敗漢中山王曜恃勝而不設備十一月麴允引兵襲之漢兵大敗殺其冠軍將軍喬智明曜引歸平陽二年夏五月漢中山王曜趙染冦長安六月曜屯渭汭染屯新豐索綝將兵出拒之染有輕綝之色長史魯徽曰晉之君臣自知強弱不敵將致死於我不可輕也染曰以司馬模之強吾取之如拉朽索綝小豎豈能汙吾馬蹄刀刃邪晨帥輕騎數百逆之曰要當獲綝而後食綝與戰于城西染兵敗而歸悔曰吾不用魯徽之言以至此何面目見之先命斬徽徽曰將軍愚愎以取敗乃復忌前害勝誅忠良以逞忿猶有天地將軍其得死於枕席乎詔加索綝驃騎大將軍尚書左僕射録尚書承制行事曜染復與將軍殷凱帥衆數萬向長安麴允逆戰於馮翊允敗收兵夜襲凱營凱敗死曜乃還攻河內太守郭默于懷列三屯圍之默食盡送妻子為質請糴於曜糴畢復嬰城固守曜怒沈默妻子于河而攻之默欲投李矩於新鄭矩使其甥郭誦迎之兵少不敢進會劉琨遣參軍張肇帥鮮卑五百餘騎詣長安道阻不通還過矩營矩説肇使擊漢兵漢兵望見鮮卑不戰而走默遂帥衆歸矩漢主聰召曜還屯蒲阪秋趙染攻北地麴允拒之染中弩而死三年春二月丙子以琅邪王睿為丞相大都督督中外諸軍事南陽王保為相國荀組為太尉領豫州牧劉琨為司空都督并冀幽三州諸軍事琨辭司空不受夏六月漢大司馬曜攻上黨秋八月癸亥敗劉琨之衆於襄垣曜欲進攻陽曲漢主聰遣使謂之曰長安未平宜以為先曜乃還屯蒲阪九月漢大司馬曜冦北地詔以麴允為大都督驃騎將軍以禦之冬十月以索綝為尚書僕射都督宫城諸軍事曜進拔馮翊太守梁肅奔萬年曜轉冦上郡麴允去黃白城軍于靈武以兵弱不敢進帝屢徴兵於丞相保保左右皆曰蝮蛇螫手壯士斷腕今胡冦方盛且宜斷隴道以觀其變從事中郎裴詵曰今蛇已螫頭頭可斷乎保乃以鎮軍將軍胡嵩行前鋒都督須諸軍集乃發麴允欲奉帝往就保索綝曰保得天子必逞其私志乃止於是自長安以西不復貢奉朝廷百官飢乏採稆以自存四年秋七月漢大司馬曜圍北地太守麴昌大都督麴允將步騎三萬救之曜繞城縱火煙起蔽天使反間紿允曰郡城已陷往無及也衆懼而潰曜追敗允於磻石谷允奔還靈武曜遂取北地允性仁厚無威斷喜以爵位恱人新平太守竺恢始平太守楊像扶風太守竺爽安定太守焦嵩皆領征鎮杖節加侍中常侍村塢主帥小者猶假銀青將軍之號然恩不及下故諸將驕恣士卒離怨關中危亂允告急於焦嵩嵩素侮允曰須允困當救之曜進至涇陽渭北諸城悉潰八月漢大司馬曜逼長安九月焦嵩竺恢宋哲皆引兵救長安散騎常侍華輯監京兆馮翊弘農上洛四郡兵屯霸上皆畏漢兵強不敢進相國保遣胡嵩將兵入援擊漢大司馬曜於靈臺破之嵩恐國威復振則麴索藝盛乃帥城西諸郡兵屯渭北不進遂還槐里曜攻陷長安外城麴允索綝退守小城以自固內外斷絶城中飢甚米斗直金二兩人相食死者太半亡逃不可制唯涼州義衆千人守死不移太倉有麴數十餅麴允屑之為粥以供帝既而亦盡冬十一月帝泣謂允曰今窮厄如此外無救援當忍耻出降以活士民因歎曰誤我事者麴索二公也使侍中宗敞送降箋於曜索綝潛留敞使其子説曜曰今城中食猶足支一年未易克也若許綝以車騎儀同萬户郡公者請以城降曜斬而送之曰帝王之師以義行也孤將兵十五年未嘗以詭計敗人必窮兵極藝然後取之今索綝所言如此天下之惡一也輒相為戮之若兵食審未盡者便可勉強固守如其糧竭兵微亦宜早寤天命甲午宗敞至曜營乙未帝乘羊車肉袒䘖璧輿襯出東門降羣臣號泣攀車執帝手帝亦悲不自勝御史中丞馮翊吉朗歎曰吾智不能謀勇不能死何忍君臣相隨北面事賊虜乎乃自殺曜焚襯受璧使宗敞奉帝還宫丁酉遷帝及公卿以下於其營辛丑送至平陽壬寅漢主聰臨光極殿帝稽首於前麴允伏地慟哭扶不能起聰怒囚之允自殺聰以帝為光祿大夫封懷安侯以大司馬曜為假黃鉞大都督督陜西諸軍事太宰封秦王大赦改元麟嘉以麴允忠烈贈車騎將軍諡節愍侯以索綝不忠斬于都市尚書梁允侍中梁濬等及諸郡守皆為曜所殺華輯奔南山于寶論曰昔髙祖宣皇帝以雄才碩量應時而起性深阻有若城府而能寬綽以容納行數術以御物而知人善采拔於是百姓與能大象始􅌟世宗承基太祖繼業咸黜異圖用融前烈至于世祖遂享皇極仁以厚下儉以足用和而不弛寬而能斷掩唐虞之舊域班正朔於八荒于時有天下無窮人之諺雖太平未洽亦足以明民樂其生矣武皇既崩山陵未乾而變難繼起宗子無維城之助師尹無具瞻之貴朝為伊周夕成桀跖國政迭移於亂人禁兵外散於四方方嶽無鈞石之鎮關門無結草之固戎羯稱制二帝失尊何哉樹立失權託付非才四維不張而茍且之政多也夫基廣則難傾根深則難拔理節則不亂膠結則不遷昔之有天下者所以能長久用此道也周自后稷愛民十六王而武始君之其積基樹本如此其固今晉之興也其創基立本固異於先代矣加以朝寡純德之人鄉乏不二之老風俗淫僻耻尚失所學者以莊老為宗而黜六經談者以虛蕩為辨而賤名檢行身者以放濁為通而狹節信進仕者以茍得為貴而鄙居正當官者以望空為髙而笑勤恪是以劉頌屢言治道傅咸每糾邪正皆謂之俗吏其倚杖虛曠依阿無心者皆名重海內若夫文王日昊不暇食仲山甫夙夜匪懈者蓋共嗤點以為灰塵矣由是毁譽亂於善惡之實情慝奔於貨欲之塗選者為人擇官官者為身擇利世族貴戚之子弟陵邁超越不拘資次悠悠風塵皆奔競之士列官千百無讓賢之舉子真著崇讓而莫之省子雅制九班而不得用其婦女不知女工任情而動有逆于舅姑有殺戮妾媵父兄弗之罪也天下莫之非也禮法刑政於此大壞國之將亡本必先顛其此之謂乎故觀阮籍之行而覺禮教崩弛之所由察庾純賈充之爭而見師尹之多僻考平吳之功而知將帥之不讓思郭欽之謀而寤戎狄之有釁覽傅玄劉毅之言而得百官之邪核傅咸之奏錢神之論而覩寵賂之彰民風國藝既已如此雖以中庸之才守文之主治之猶懼致亂況我惠帝以放蕩之德臨之哉懷帝承亂得位羈以強臣愍帝奔播之後徒守虛名天下之藝既去非命世之雄才不能復取之矣十二月丞相睿聞長安不守出師露次躬擐甲胄移檄四方刻日北征以漕運稽期丙寅斬督運令史淳于伯刑者以刀拭柱血逆流上至柱末二丈餘而下觀者咸以為寃丞相司直劉隗上言伯罪不至死請免從事中郎周筵等官於是右將軍王導等上疏引咎請解職睿曰政刑失中皆吾暗塞所致一無所問元帝建武元年春正月宋哲奔江東二月辛巳宋哲至建康稱受愍帝詔令丞相琅邪王睿統攝萬機三月琅邪王素服出次舉哀三日於是西陽王羕及官屬等共上尊號王不許羕等固請不已王慨然流涕曰孤罪人也諸賢見逼不已當歸琅邪耳呼私奴命駕將歸國羕等乃請依魏晉故事稱晉王許之辛卯即晉王位大赦改元始備百官立宗廟建社稷有司請立太子王愛次子宣城公裒欲立之謂王導曰立子當以德導曰世子宣城俱有朗俊之美而世子年長王從之丙辰立世子紹為王太子封裒為琅邪王奉恭王後仍以裒都督青徐兖三州諸軍事鎮廣陵以西陽王羕為太保封譙剛王遜之子氶為譙王遜宣帝之弟子也又以征南大將軍王敦為大將軍江州牧楊州刺史王導為驃騎將軍都督中外諸軍事領中書監録尚書事丞相左長史刁協為尚書左僕射右長史周顗為吏部尚書軍咨祭酒賀循為中書令右司馬戴淵王邃為尚書司直劉隗為御史中丞行參軍劉超為中書舍人參軍事孔愈長兼中書郎自餘參軍悉拜奉車都尉掾屬拜駙馬都尉行參軍舍人拜騎都尉王敦辭州牧王導以敦統六州辭中外都督賀循以老病辭中書令王皆許之以循為太常是時承喪亂之後江東草創刁協久宦中朝諳練舊事賀循為世儒宗明習禮學凡有疑議皆取決焉夏六月丙寅溫嶠等至建康王導周顗庾亮等皆愛嶠才爭與之交是時太尉豫州牧荀組冀州刺史邵續青州刺史曹嶷寧州刺史王遜東夷校尉崔毖等皆上表勸進王不許冬十一月漢主聰出畋以愍帝行車騎將軍戎服執戟前導見者指之曰此故長安天子也聚而觀之故老有泣者太子粲言於聰曰昔周武王豈樂殺紂乎正恐同惡相求為患故也今興兵聚衆者皆以子業為名不如早除之聰曰吾前殺庾珉輩而民心猶如是吾未忍復殺也且小觀之十二月聰饗羣臣于光極殿使愍帝行酒洗爵已而更衣又使之執蓋晉臣多涕泣有失聲者尚書郎隴西辛賔起抱帝大哭聰命引出斬之趙固與河內太守郭默侵漢河東至絳右司隸部民奔之者三萬餘人騎兵將軍劉勳追擊之殺萬餘人固默引歸太子粲帥將軍劉雅生等步騎十萬屯小平津固揚言曰要當生縛劉粲以贖天子粲表於聰曰子業若死民無所望則不為李矩趙固之用不攻而自滅矣戊戌愍帝遇害於平陽粲遣雅生攻洛陽固奔陽城山大興元年春三月癸丑愍帝凶問至建康王斬縗居廬百官請上尊號王不許紀瞻曰晉氏統絶於今二年陛下當承大業顧望宗室誰復與讓若光踐大位則神民有所憑依茍為逆天時違人事大藝一去不可復還今兩都燔蕩宗廟無主劉聰竊號於西北而陛下方髙讓於東南此所謂揖讓而救火也王猶不許使殿中將軍韓績徹去御坐瞻叱績曰帝坐上應列星敢動者斬王為之改容泰朝請周嵩上疏曰古之王者義全而後取讓成而後得是以享世長久重光萬載也今梓宫未返舊兵未清義夫泣血士女遑遑宜開延嘉謀訓卒厲京先雪社稷大耻副四海之心則神器將安適哉由是忤旨出為新安太守又坐怨望抵罪嵩顗之弟也丙辰王即皇帝位百官皆陪列帝命王導升御牀共坐導固辭曰若太陽下同萬物蒼生何由仰照帝乃止大赦改元文武增位二等通鑑紀事本末卷第十二
