body:
  text: 太宗平內難唐髙祖武德五年上之起兵晉陽也皆秦王世民之謀上謂世民曰若事成則天下皆汝所致當以汝為太子世民拜且辭及為唐王將佐亦請以世民為世子上將立之世民固辭而止太子建成性寬簡喜酒色游畋齊王元吉多過失皆無寵於上世民功名日盛上常有意以代建成建成內不自安乃與元吉協謀共傾世民各引樹黨友上晚年多內寵小王且二十人其母競交結諸長子以自固建成與元吉曲意事諸妃嬪諂諛賂遺無所不至以求媚於上或言蒸於張婕妤尹德妃宫禁深祕莫能明也是時東宫諸王公妃主之家及後宫親戚橫長安中奪人田宅恣為非法有司不敢詰世民居承乾殿元吉居武德殿後院與上臺東宫晝夜通行無復禁限太子二王出入上臺皆乘馬攜弓刀雜物相遇如家人禮太子令秦齊王教與詔敕並行有司莫知所從唯據得之先後為定世民獨不奉事諸妃嬪諸妃嬪爭譽建成元吉而短世民世民平洛陽上使貴妃等數人詣洛陽選閲隋宫人及收府庫珍物貴妃等私從世民求寶貨及為其親屬求官世民曰寶貨皆已籍奏官當授賢才有功者皆不許由是益怨世民以淮安王神通有功給田數十頃張婕妤之父因婕妤求之於上上手敕賜之神通以教給在先不與婕妤訴於上曰敕賜妾父田秦王奪之以與神通上遂發怒責世民曰我手敕不如汝教邪它日謂左僕射裴寂曰此兒久典兵在外為書生所教非昔日子也尹德妃父阿鼠驕橫秦王府屬杜如晦過其門阿鼠家僮數人曵如晦墜馬驅之折一指曰汝何人敢過我門而不下馬阿鼠恐世民訴於上先使德妃奏云秦王左右陵暴妾家上復怒責世民曰我妃嬪家猶為汝左右所陵况小民乎世民深自辨析上終不信世民每侍宴宫中對諸妃嬪思太穆皇后早終不得見上有天下或歔欷流涕上顧之不樂諸妃嬪因密共譛世民曰海內幸無事陛下春秋髙唯宜相娛樂而秦王每獨涕泣正是憎疾妾等陛下萬嵗後妾母子必不為秦王所容無孑遺矣因相與泣且曰皇太子仁孝陛下以妾母子屬之必能保全上為之愴然由是無易太子意待世民浸踈而建成元吉日親矣太子中允王圭洗馬魏徴說太子曰秦王功蓋天下中外歸心殿下但以年長位居東宫無大功以鎮服海內今劉黑闥散亡之餘衆不滿萬資糧匱乏以大軍臨之勢如拉朽殿下宜自擊之以取功名因結納山東豪傑庶可自安太子乃請行於上上許之圭頍之兄子也七年初齊王元吉勸太子建成除秦王世民曰當為兄手刃之世民從上幸元吉第元吉伏護軍宇文寶於寢內欲刺世民建成性頗仁厚遽止之元吉愠曰為兄計耳於我何有建成擅募長安及四方驍勇二千餘人為東宫衛士分屯左右長林號長林兵又密使右虞候率可達志從燕王李藝發幽州突騎三百置宮東諸坊欲以補東宫長上為人所告上召建成責之流可達志於嶲州慶州都督楊文幹嘗宿衛東宫建成與之親厚私使募壯士送長安上將幸仁智宫命建成居守世民元吉皆從建成使元吉就圖世民曰安危之計决在今嵗又將郎將爾朱煥校尉橋公山以甲遺文幹二人至豳州上變告太子使文幹舉兵欲表裏相應又有寧州人杜鳯舉亦詣宫言狀上怒託他事手詔召建成令詣行在建成懼不敢赴太子舍人徐師謨勸之據城舉兵詹事主簿趙弘智勸之貶損車服屏從者詣上謝罪建成乃詣仁智宫未至六十里悉留官屬於毛鴻賔堡以十餘騎往見上叩頭謝罪奮身自擲幾至於絶上怒不解是夜置之幕下飼以麥飯使殿中監陳福防守遣司農卿宇文頴馳召文幹頴至慶州以情告之文幹遂舉兵反上遣左武衛將軍錢九隴與靈州都督楊師道擊之夏六月甲子上召秦王世民謀之世民曰文幹豎子敢為狂逆計府僚已應擒戮若不爾正應遣一將討之耳上曰不然文幹事連建成恐應之者衆汝宜自行還立汝為太子吾不能效隋文帝自誅其子當封建成為蜀王蜀兵脆弱它日苟能事汝汝宜全之不能事汝汝取之易耳上以仁智宫在山中恐盜兵猝發夜帥宿衛南出山外行數十里東宫官屬將卒繼至者皆令三十人為隊分兵圍守之明日復還仁智宫世民既行元吉與妃嬪更迭為建成請封德彛復為之營解於外上意遂變復遣建成還京師居守惟責以兄弟不睦歸罪於太子中允王圭左衛率韋挺天䇿兵曹參軍杜淹並流於嶲州挺沖之子也初洛陽既平杜淹久不得調欲求事建成房玄齡以淹多狡數恐其教導建成益為世民不利乃言於世民引入天䇿府秋七月楊文幹襲陷寧州驅掠吏民出據百家堡秦王世民軍至寧州其黨皆潰癸酉文幹為其麾下所殺傳首京師獲宇文頴誅之上欲徙都以避突厥秦王世民諫止之建成與妃嬪因共譛世民曰突厥雖屢為邊患得賂則退秦王外託禦寇之名內欲總兵權成其篡奪之謀耳上校獵城南太子秦齊王皆從上命三子馳射角勝建成有胡馬肥壯而喜蹶以授世民曰此馬甚駿能超數丈澗弟善騎試乘之世民乘以逐鹿馬蹶世民躍立於數步之外馬起復乘之如是者三顧謂宇文士及曰彼欲以此見殺死生有命庸何傷乎建成聞之因令妃嬪譛之於上曰秦王自言我有天命方為天下主豈有浪死上大怒先召建成元吉然後召世民入責之曰天子自有天命非智力可求汝求之何急邪世民免冠頓首請下法司案驗上怒不解㑹有司奏突厥入寇上乃改容勞勉世民命之冠帶與謀突厥閏月己未詔世民元吉將兵出幽州以禦突厥上餞之於蘭池上每有寇盜輒命世民討之事平之後猜嫌益甚九年夏六月丁巳太白經天秦王世民既與太子建成齊王元吉有隙以洛陽形勝之地恐一朝有變欲出保之乃以行臺工部尚書溫大雅鎮洛陽遣秦府車騎將軍滎陽張亮將左右王保等千餘人之洛陽陰結納山東豪傑以俟變多出金帛恣其所用元吉告亮謀不軌下吏考驗亮終無言乃釋之使還洛陽建成夜召世民飲酒而鴆之世民暴心痛吐血數升淮安王神通扶之還西宫上幸西宫問世民疾敕建成曰秦王素不能飲自今無得復夜飲因謂世民曰首建大謀削平海內皆汝之功吾欲立汝為嗣汝固辭且建成年長為嗣日久吾不忍奪也觀汝兄弟似不相容同處京邑必有紛競當遣汝還行臺居洛陽自陜以東皆主之仍命汝建天子旌旗如漢梁孝王故事世民涕泣辭以不欲逺離膝下上曰天下一家東西兩都道路甚邇吾思汝即往毋煩悲也將行建成元吉相與謀曰秦王若至洛陽有土地甲兵不可復制不如留之長安則一匹夫耳取之易矣乃密令數人上封事言秦王左右聞往洛陽無不喜躍觀其志趣恐不復來又遣近幸之臣以利害說上上意遂移事復中止建成元吉與後宫日夜譛訴世民於上上信之將罪世民陳叔達諌曰秦王有大功於天下不可黜也且性剛烈若加挫抑恐不勝憂憤或有不測之疾陛下悔之何及上乃止元吉密請殺秦王上曰彼有定天下之功罪狀未著何以為辭元吉曰秦王初平東都顧望不還散錢帛以樹私恩又違敕命非反而何但應速殺何患無辭上不應秦府僚屬皆憂懼不知所出行臺考功郎中房玄齡謂比部郎中長孫無忌曰今嫌隙已成一旦禍機竊發豈惟府朝塗地乃實社稷之憂莫若勸王行周公之事以安家國存亡之機間不容髮正在今日無忌曰吾懷此久矣不敢發口今吾子所言正合吾心謹當白之乃入言丗民丗民召玄齡謀之玄齡曰大王功蓋天地當承大業今日憂危乃天贊也願大王勿疑乃與府屬杜如晦共勸丗民誅建成元吉建成元吉以秦府多驍將欲誘之使為已用密以金銀器一車贈左二副護軍尉遲敬德并以書招之曰願迃長者之眷以敦布衣之交敬德辭曰敬德蓬戶甕牖之人遭隋末亂離久淪逆地罪不容誅秦王賜以更生之恩今又䇿名藩邸唯當殺身以為報於殿下無功不敢謬當重賜若私交殿下乃是二心徇利忘忠殿下亦何所用建成怒遂與之絶敬德以告世民世民曰公心如山嶽雖積金至斗知公不移相遺但受何所嫌也且得以知其隂計豈非良䇿不然禍將及公既而元吉使壯士夜刺敬德敬德知之洞開重門安卧不動刺客屢至其庭終不敢入元吉乃譛敬德於上下詔獄訊治將殺之世民固請得免又譛左一馬軍總管程知節出為康州刺史知節謂世民曰大王股肱羽翼盡矣身何能久知節以死不去願早决計又以金帛誘右二護軍段志玄志玄不從建成謂元吉曰秦府智略之士可憚者獨房玄齡杜如晦耳皆譛之於上而逐之世民腹心唯長孫無忌尚在府中與其舅雍州治中髙士廉左候車騎將軍三水侯君集及尉遲敬德等日夜勸世民誅建成元吉世民猶豫未决問於靈州大都督李靖靖辭問於行軍總管李世績世績辭世民由是重二人㑹突厥郁射設將數萬騎屯河南入塞圍烏城建成薦元吉代世民督諸軍北征上從之命元吉督右武衛大將軍李藝天紀將軍張瑾等救烏城元吉請尉遲敬德程知節段志玄及秦府右三統軍秦叔寶等與之偕行簡閲秦王帳下精鋭之士以益元吉軍率更丞王晊密告世民曰太子語齊王今汝得秦王驍將精兵擁數萬之衆吾與秦王餞汝於昆明池使壯士拉殺之於幕下奏云暴卒主上宜無不信吾當使人進說令授吾國事敬德等既入汝手宜悉坑之孰敢不服世民以晊言告長孫無忌等無忌等勸世民先事圖之世民歎曰骨肉相殘古今大惡吾誠知禍在朝夕欲俟其發然後以義討之不亦可乎敬德曰人情誰不愛其死今衆人以死奉王乃天授也禍機垂發而王猶晏然不以為憂大王縱自輕如社稷宗廟何大王不用敬德之言敬德將竄身草澤不能留居大王左右交手受戮也無忌曰不從敬德之言事今敗矣敬德等必不為王有無忌亦當相隨而去不能復事大王矣世民曰吾所言亦未可全棄公更圖之敬德曰王今處事有疑非智也臨難不决非勇也且大王素所畜養勇士八百餘人在外者今已入宫擐甲執兵事勢已成大王安得已乎世民訪之府僚皆曰齊王凶戾終不肯事其兄比聞護軍薛實嘗謂齊王曰大王之名合之成唐字大王終主唐祀齊王喜曰但除秦王取東宫如反掌耳彼與太子謀亂未成已有取太子之心亂心無厭何所不為若使二人得志恐天下非復唐有以大王之賢取二人如拾地芥耳奈何徇匹夫之節忘社稷之計乎世民猶未决衆曰大王以舜為何如人曰聖人也衆曰使舜浚井不出則為井中之泥塗廩不下則為廪上之灰安能澤被天下法施後世乎是以小杖則受大杖則走蓋所存者大故也世民命卜之幕僚張公謹自外來見之取龜投地曰卜以决疑今事在不疑尚何卜乎卜而不吉庸得已乎於是定計世民令無忌密召房玄齡等曰敕㫖不聽復事王今若私謁必坐死不敢奉教世民怒謂敬德曰玄齡如晦豈叛我邪取所佩刀授敬德曰公往觀之若無來心可斷其首以來敬德往與無忌共諭之曰王已决計公宜速入共謀之吾屬四人不可羣行道中乃令玄齡如晦著道士服與無忌俱入敬德自它道亦至己未太白復經天傅奕密奏太白見秦分秦王當有天下上以其狀授世民於是世民密奏建成元吉淫亂後宫且曰臣於兄弟無絲毫負今欲殺臣似為世充建德報讎臣今枉死永違君親魂歸地下實恥見諸賊上省之愕然報曰明當鞫問汝宜早參庚申世民帥長孫無忌等入伏兵於玄武門張婕妤竊知世民表意馳語建成建成召元吉謀之元吉曰宜勒宫府兵託疾不朝以觀形勢建成曰兵備已嚴當與弟入參自問消息乃俱入趣玄武門上時已召裴寂蕭瑀陳叔達等欲按其事建成元吉至臨湖殿覺變即跋馬東歸宫府世民從而呼之元吉張弓射世民再三不彀世民射建成殺之尉遲敬德將七十騎繼至左右射元吉墜馬世民馬逸入林下為木枝所絓墜不能起元吉遽至奪弓將扼之敬德躍馬叱之元吉步欲趣武德殿敬德追射殺之翊衛車騎將軍馮翊馮立聞建成死歎曰豈有生受其恩而死逃其難乎乃與副護軍薛萬徹屈嘻直府左車騎萬年謝叔方帥東宫齊府精兵二千馳趣玄武門張公謹多力獨閉關以拒之不得入雲麾將軍敬君弘掌宿衛兵屯玄武門挺身出戰所親止之曰事未可知且徐觀變俟兵集成列而戰未晚也君弘不從與中郎將吕世衡大呼而進皆死之君弘顯俊之曽孫也守門兵與萬徹等力戰良久萬徹鼓譟欲攻秦府府士大懼尉遲敬德持建成元吉首示之宫府兵遂潰萬徹與數十騎亡入終南山馮立既殺敬君弘謂其徒曰亦足以少報太子矣遂解兵逃於野上方泛舟海池世民使尉遲敬德入宿衛敬德擐甲持矛直至上所上大驚問曰今日亂者誰邪卿來此何為對曰秦王以太子齊王作亂舉兵誅之恐驚動陛下遣臣宿衛上謂裴寂等曰不圖今日乃見此事當如之何蕭瑀陳叔達曰建成元吉本不豫義謀又無功於天下疾秦王功髙望重共為姦謀今秦王已討而誅之秦王功蓋宇宙率土歸心陛下若處以元良委之國務無復事矣上曰善此吾之夙心也時宿衛及秦府兵與二宫左右戰猶未已敬德請降手敕令諸軍並受秦王處分上從之天䇿府司馬宇文士及自東上閣門出宣敕衆然後定上又使黃門侍郎裴矩至東宫曉諭諸將卒皆罷散上乃召世民撫之曰近日以來幾有投杼之惑世民跪而吮上乳號慟久之建成子安陸王承道河東王承德武安王承訓汝南王承明巨鹿王承義元吉子梁郡王承業漁陽王承鸞普安王承奬江夏王承裕義陽王承度皆坐誅仍絶屬籍初建成許元吉以正位之後立為太弟故元吉為之盡死諸將欲盡誅建成元吉左右百餘人籍沒其家尉遲敬德固爭曰罪在二凶既伏其誅若及支黨非所以求安也乃止是日下詔赦天下凶逆之罪止於建成元吉自餘黨與一無所問其僧尼道士女冠竝宜依舊國家庶事皆取秦王處分辛酉馮立謝叔方皆自出薛萬徹亡匿世民屢使諭之乃出世民曰此皆忠於所事義士也釋之癸亥立世民為皇太子又詔自今軍國庶事無大小悉委太子處決然後聞奏臣光曰立嫡以長禮之正也然髙祖所以有天下皆太宗之功隱太子以庸劣居其右地嫌勢逼必不相容嚮使髙祖有文王之明隱太子有泰伯之賢太宗有子臧之節則亂何自而生矣既不皆然太宗始欲俟其先發然後應之如此則事非獲已猶為愈也既而為羣下所迫遂至蹀血禁門推刃同氣貽譏千古惜哉夫創業垂統之君子孫之所儀刑也彼中明肅代之傳繼得非有所指擬以為口實乎太宗易太子唐髙祖武德九年秋八月太宗即皇帝位冬十月癸亥立皇子中山王承乾為太子生八年矣太宗貞觀七年帝謂左庶子于志寧右庶子杜正倫曰朕年十八猶在民間民之疾苦情僞無不知之及居大位區處丗務猶有差失况太子生長深宫百姓艱難耳目所未涉能無驕逸乎卿等不可不極諫太子好嬉戲頗虧禮法志寧與右庶子孔頴逹數直諫上聞而嘉之各賜金一斤帛五百匹十三年太子承乾頗以遊畋廢學右庶子張玄素諫不聽十四年上聞右庶子張玄素在東宫數諌爭擢為銀青光祿大夫行左庶子太子嘗於禁中擊鼓玄素叩閣切諌太子出其鼓對玄素毁之太子久不出見官屬玄素諌曰朝廷選俊賢以輔至德今動經時月不見宮臣將何以裨益萬一且宫中唯有婦人不知有能如樊姬者乎太子不聽十五年太子詹事于志寧遭母喪尋起復就職太子治宫室妨農功又好鄭衛之樂志寧諌不聽又寵昵宦官常在左右志寧上書以為自易牙以來宦官覆亡國家者非一今殿下親寵此屬使陵易衣冠不可長也太子役使司馭等半嵗不許分畨又私引突厥達哥友入宫志寧上書切諌太子大怒遣刺客張師政紇于承基殺之二人入其第見志寧寢處苫塊竟不忍殺而止十六年春正月乙丑魏王泰上拓地志泰好學司馬蘇朂說泰以古之賢王皆招士著書故泰奏請修之於是大開館舍廣延時俊人物輻湊門庭如市泰月給踰於太子諌議大夫禇遂良上疏以為聖人制禮尊嫡卑庶世子用物不㑹與王者共之庶子雖愛不得踰嫡所以塞嫌疑之漸除禍亂之源也若當親者踈當尊者卑則佞巧之姦乘機而動矣昔漢竇太后寵梁孝王卒以憂死宣帝寵淮陽憲王亦幾至於敗今魏王新出閣冝示以禮則訓以謙儉乃為良器此所謂聖人之教不肅而成者也上從之上又令泰徙居武德殿魏徴上疏以為陛下愛魏王常欲使之安全冝每抑其驕奢不處嫌疑之地今移居此殿乃在東宫之西海陵昔嘗居之時人不以為可雖時異事異然亦恐魏王之心不敢安息也上曰幾致此誤遽遣泰歸第夏六月甲辰詔自今皇太子出用庫物所司勿為限制於是太子發取無度左庶子張玄素上書以為周武帝平定山東隋文帝混一江南勤儉愛民皆為令主有子不肖卒亡宗祀聖上以殿下親則父子事兼家國所應用物不為節限恩㫖未踰六旬用物已過七萬驕奢之極孰云過此况宫臣正士未嘗在側羣邪淫巧昵近深宫在外瞻仰已有此失居中隱密寧可勝計苦藥利病苦言利行伏惟居安思危日慎一日太子惡其書令戶奴伺玄素早朝密以大馬箠擊之幾斃秋八月丁酉上曰當今國家何事為急諌議大夫禇遂良曰今四方無虞唯太子諸王宜有定分最急上曰此言是也時太子承乾失德魏王泰有寵羣臣日有疑議上聞而惡之謂侍臣曰方今羣臣忠直無踰魏徴我遣傅太子用絶天下之疑九月丁巳以魏徴為太子太師徴疾小愈詣朝堂表辭上手詔諭以周幽晉獻廢嫡立庶危國亡家漢髙祖幾廢太子賴四皓然後安我今賴公即其義也知公疾病可卧護之徴乃受詔十七年春正月丙寅上謂羣臣曰聞外間士民以太子有足疾魏王頴悟多從遊幸遽生異議徼幸之徒已有附㑹者太子雖病足不廢步履且禮嫡子死立嫡孫太子男已五嵗朕終不以孽代宗啓窺窬之源也初太子承乾喜聲色畋獵所為奢靡畏上知之對宫臣常論忠孝或至於涕泣退歸宫中則與羣小相䙝狎宫臣有欲諌者太子先揣知其意輒迎拜斂容危坐引咎自責言辭辨給宫臣拜答不暇宫省祕密外人莫知故時論初皆稱賢太子作八尺銅爐六隔大鼎募亡奴盜民間馬牛親臨烹煮與所幸厮役共食之又好效突厥語及其服飾選左右貌類突厥者五人為一落辮髮羊裘而牧羊作五狼頭纛及幡旗設穹廬太子自處其中斂羊而烹之抽佩刀割肉相啖又嘗謂左右曰我試作可汗死汝曹效其喪儀因僵卧於地衆悉號哭跨馬環走臨其身嫠靣良久太子歘起曰一朝有天下當帥數萬騎獵於金城西然後解髮為突厥委身思摩若當一設不居人後矣左庶子于志寧右庶子孔頴達數諫太子上嘉之賜二人金帛以風勵太子仍遷志寧為詹事志寧與左庶子張玄素數上書切諫太子隂使人殺之不果漢王元昌所為多不法上數譴責之由是怨望太子與之親善朝夕同遊戲分左右為二隊太子與元昌各統其一被氊甲操竹矟布陳大呼交戰擊刺流血以為娛樂有不用命者披樹撾之至有死者且曰使我今日作天子明日於苑中置萬人營與漢王分將觀其戰鬪豈不樂哉又曰我為天子極情縱欲有諫者輒殺之不過殺數百人衆自定矣魏王泰多藝能有寵於上見太子有足疾潜有奪嫡之志折節下士以求聲譽上命黃門侍郎韋挺攝泰府事後命工部尚書杜楚客代之二人俱為泰要結朝士楚客或懷金以賂權貴因說以魏王聰明宜為上嗣文武之士各有附託潜為朋黨太子畏其逼遣人詐為泰府典籖上封事其中皆言泰罪惡敕捕之不獲太子私幸太常樂童稱心與同卧起道士秦英韋靈符挾左道得幸太子上聞之大怒悉收稱心等殺之連坐死者數人誚讓太子甚至太子意泰告之怨怒愈甚思念稱心不已於宫中構室立其像朝夕奠祭徘徊流涕又於苑中作冡私贈官樹碑上意浸不懌太子亦知之稱疾不朝謁者動涉數月陰養刺客紇于承基等及壯士百餘人謀殺魏王泰吏部尚書侯君集之壻賀蘭楚石為東宫千牛太子知君集怨望數令楚石引君集入東宫問以自安之術君集以太子暗劣欲乘舋圖之因勸之反舉手謂太子曰此好手當為殿下用之又曰魏王為上所愛恐殿下有庶人勇之禍若有敕召宜密為之僃太子大然之厚賂君集及左屯衛中郎將頓丘李安儼使詗上意動靜相語安儼先事隱太子隱太子敗安儼為之力戰上以為忠故親任之使典宿衛安儼深自託於太子漢王元昌亦勸太子反且曰比見上側有美人善彈琵琶事成願以垂賜太子許之洋州刺史開化公趙節慈景之子也母曰長廣公主駙馬都尉杜荷如晦之子也尚城陽公主皆為太子所親昵預其反謀凡同謀者皆割臂以帛拭血燒灰和酒飲之誓同生死潜謀引兵入西宫杜荷謂太子曰天文有變當速發以應之殿下但稱暴疾危篤主上必親臨視因兹可以得志太子聞齊王祐反於齊州謂紇于承基等曰我宫西牆去大內正可二十步耳與卿為大事豈比齊王乎㑹治祐反事連承基承基坐繫大理獄當死夏四月庚辰朔承基上變告太子謀反敕長孫無忌房玄齡蕭瑀李世績與大理中書門下參鞠之反形已具上謂侍臣將何以處承乾羣臣莫敢對通事舍人來濟進曰陛下不失為慈父太子得盡天年則善矣上從之濟護兒之子也乙酉詔廢太子承乾為庶人幽於右領軍府上欲免漢王元昌死羣臣固爭乃賜自盡於家而宥其母妻子侯君集李安儼趙節杜荷等皆伏誅左庶子張玄素右庶子趙弘智令狐德棻等以不能諫爭皆坐免為庶人餘當連坐者悉赦之詹事于志寧以數諫獨䝉勞勉以紇于承基為祐川府折衝都尉爵平棘縣公侯君集被收賀蘭楚石復詣闕告其事上引君集謂曰朕不欲令刀筆吏辱公故自鞫公耳君集初不承引楚石具陳始末又以所與承乾往來啓示之君集辭窮乃服上謂侍臣曰君集有功欲乞其生可乎羣臣以為不可上乃謂君集曰與公長訣矣因泣下君集亦自投于地遂斬之於市君集臨刑謂監刑將軍曰君集蹉跌至此然事陛下於藩邸擊取二國乞全一子以奉祭祀上乃原其妻及子徙嶺南籍沒其家得二美人自幼飲人乳而不食初上使李靖教君集兵法君集言於上曰李靖將反矣上問其故對曰靖獨教臣以粗而匿其精以是知之上以問靖靖對曰此乃君集欲反耳今諸夏已定臣之所教足以制四夷而君集固求盡臣之術非反而何江夏王道宗嘗從容言於上曰君集志大而智小自負微功恥在房玄齡李靖之下雖為吏部尚書未滿其志以臣觀之必將為亂上曰君集材器亦何施不可朕豈惜重位但次第未至耳豈可億度妄生猜二耶及君集反誅上乃謝道宗曰果如卿言李安儼父年九十餘上愍之賜奴婢以養之太子承乾既獲罪魏王泰自入侍奉上靣許立為太子岑文本劉洎亦勸之長孫無忌固請立晉王治上謂侍臣曰昨青雀投我懷云臣今日始得為陛下子乃更生之日也臣有一子臣死之日當為陛下殺之傳位晉王人誰不愛其子朕見如此甚憐之諫議大夫禇遂良曰陛下言大失願審思勿誤也安有陛下萬歲後魏王據天下肯殺其愛子傳位晉王者乎陛下日者既立承乾為太子復寵魏王禮秩過於承乾以成今日之禍前事不逺足以為鑒陛下今立魏王願先措置晉王始得安全耳上流涕曰我不能爾因起入宫魏王泰恐上立晉王治謂之曰汝與元昌善元昌今敗得無憂乎治由是憂形於色上怪屢問其故治乃以狀告上憮然始悔立泰之言矣上靣責承乾承乾曰臣為太子復何所求但為泰所圖時與朝臣謀自安之術不逞之人遂教臣為不軌耳今若泰為太子所謂落其度內承乾既廢上御兩儀殿羣臣俱出獨留長孫無忌房玄齡李世績禇遂良謂曰我三子一弟所為如是我心誠無聊賴因自投于牀無忌等爭前扶抱上又抽佩刀欲自刺遂良奪刀以授晉王治無忌等請上所欲上曰我欲立晉王無忌曰謹奉詔有異議者臣請斬之上謂治曰汝舅許汝矣宜拜謝治因拜之上謂無忌等曰公等已同我意未知外議如何對曰晉王仁孝天下屬心久矣乞陛下試召問百官有不同者臣負陛下萬死上乃御太極殿召文武六品以上謂曰承乾悖逆泰亦凶險皆不可立朕欲選諸子為嗣誰可者卿輩明言之衆皆歡呼曰晉王仁孝當為嗣上恱是日泰從百餘騎至永安門敕門司盡辟其騎引泰入肅章門幽於北苑丙戍詔立晉王治為皇太子御承天門樓赦天下酺三日上謂侍臣曰我若立泰則是太子之位可經營而得自今太子失道藩王窺伺者兩皆棄之傳諸子孫永為後法且泰立則承乾與治皆不全治立則承乾與泰皆無恙矣臣光曰唐太宗不以天下大器私其所愛以杜禍亂之原可謂能逺謀矣太宗平突厥隋煬帝大業十一年秋八月帝巡北塞初裴矩以突厥始畢可汗部衆漸盛獻䇿分其勢欲以宗女嫁其弟叱吉設拜為南面可汗叱吉不敢受始畢聞而漸怨突厥之臣史蜀胡悉多謀略為始畢所寵任矩詐與為互市誘至馬邑下殺之遣使詔始畢曰史蜀胡悉叛可汗來降我已相為斬之始畢知其狀由是不朝戊辰始畢帥騎數十萬謀襲乘輿義成公主先遣使者告變壬申車駕馳入鴈門齊王暕以後軍保崞縣癸酉突厥圍鴈門上下惶怖撤民屋以為守禦之具城中兵民十五萬口食僅可支二旬鴈門四十一城突厥克其三十九唯鴈門崞不下突厥急攻鴈門矢及御前上大懼抱趙王杲而泣目盡腫左衛大將軍宇文述勸帝簡精鋭數千騎潰圍而出納言蘇威曰城守則我有餘力輕騎乃彼之所長陛下萬乘之主豈宜輕動民部尚書樊子蓋曰陛下乘危徼幸一朝狼狽悔之何及不若據堅城以挫其鋭坐徴四方兵使入援陛下親撫循士卒諭以不復征遼厚為勳格必人人自奮何憂不濟內史侍郎蕭瑀以為突厥之俗可賀敦預知軍謀且義成公主以帝女嫁外夷必恃大國之援若使一介告之借使無益庸有何損又將士之意恐陛下既免突厥之患還事髙麗若發明詔諭以赦髙麗専討突厥則衆心皆安人自為戰矣瑀皇后之弟也虞世墓亦勸帝重為賞格下詔停遼東之役帝從之帝親巡將士謂之曰努力擊賊苟能保全凡在行陳勿憂富貴必不使有司弄刀筆破汝勳勞乃下令守城有功者無官直除六品賜物百段有司以次增益使者慰勞相望於道於是衆皆踊躍晝夜拒戰死傷甚衆甲申詔天下募兵守令競來赴難李淵之子世民年十六應募隸屯衛將軍雲定興說定興多齎旗鼓為疑兵曰始畢敢舉兵圍天子必謂我倉猝不能赴援故也宜晝則引旌旗令數十里不絶夜則鉦鼓相應虜必謂救兵大至望風遁去不然彼衆我寡若悉軍來戰必不能支定興從之帝遣間使求救於義成公主公主遣使告始畢云北邊有急東都及諸郡援兵亦至欣口九月甲辰始畢解圍去帝使人出偵山谷皆空無胡馬乃遣二千騎追躡至馬邑得突厥老弱二千餘人而還十二年突厥數冦北邊詔晉陽留守李淵帥太原道兵與馬邑太守王仁恭擊之時突厥方彊兩軍衆不滿五千仁恭患之淵選善騎射者二千人使之飲食舍止一如突厥或與突厥遇則伺便擊之前後屢捷突厥頗憚之恭帝義寧元年夏五月突厥數萬衆寇晉陽唐公李淵舉兵劉文靜說淵結突厥為援告突厥以尊立代王之意突厥使康鞘利送馬千匹為互市劉文靜使突厥請兵秋八月劉文靜以突厥兵五百馬二千匹來至祖興唐事並見髙唐髙祖武德元年初五原通守櫟陽張長遜以中原大亂舉郡附突厥突厥以為割利特勒郝瑗說薛舉與梁師都及突厥連兵以取長安舉從之時啓民可汗之子咄苾號莫賀咄設建牙直五原之北舉遣使與莫賀咄設謀入寇莫賀咄設許之唐主使都水監宇文歆賂莫賀咄設且為陳利害止其出兵又說莫賀咄設遣張長遜入朝以五原之地歸之中國莫賀咄設並從之夏四月己卯武都宕渠五原等郡皆降王即以長遜為五原太守長遜又詐為詔書與莫賀咄設示知其謀莫賀咄設乃拒舉師都等不納其使五月辛未突厥始畢可汗遣骨咄祿特勒來宴之於太極殿奏九部樂時中國人避亂者多入突厥突厥彊盛東自契丹室韋西盡吐谷渾髙昌諸國皆臣之控弦百餘萬帝以初起資其兵馬前後餉遺不可勝紀突厥恃功驕倨每遣使者至長安多暴橫帝優容之秋九月上遣從子襄武公琛太常卿鄭元璹以女妓遺突厥始畢可汗壬戍始畢復遣骨咄祿特勒來冬十月戊寅宴突厥骨咄祿引骨咄祿升御坐以寵之二年閏二月突厥始畢可汗將其衆度河至夏州梁師都發兵㑹之以五百騎授劉武周欲自句注入寇太原㑹始畢卒子什鉢苾幼未可立立其弟俟利弗設為處羅可汗處羅以什鉢苾為尼步設使居東偏直幽州之北先是上遣右武候將軍髙靜奉幣使於始畢至豐州聞始畢卒敕納於所在之庫突厥聞之怒欲入冦豐州總管張長遜遣髙靜以幣出塞為朝廷致賻突厥乃還夏六月己酉突厥遣使來告始畢可汗之喪上舉哀于長樂門廢朝三日詔百官就館弔其使者又遣內史舍人鄭德挺弔處羅可汗賻帛三萬假秋八月梁師都與突厥合數千騎寇延州行軍總管假德操兵少不敵閉壁不戰伺師都稍怠九月丙寅遣副總管梁禮將兵擊之師都與禮戰方酣德操以輕騎多張旗幟掩擊其後師都軍潰逐北二百餘里破其魏州虜男女二千餘口德操孝先之子也三年秋七月梁師都引突厥稽胡兵入寇行軍總管段德操擊破之斬首千餘級九月突厥莫賀咄設寇涼州總管楊恭仁擊之為所敗掠男女數千人而去冬十一月梁師都遣其尚書陸季覽說突厥處羅可汗曰比者中原喪亂分為數國勢均力弱故皆北面歸附突厥今定楊可汗既亡天下將悉為唐有師都不辭灰滅亦恐次及可汗不若及其未定南取中原如魏道武所為師都請為鄉導處羅從之謀使莫賀咄設入自原州泥步設與師都入自延州處羅入自并州突厥利可汗與奚霫契丹靺鞨入自幽州㑹竇建德之師自滏口西入㑹于晉絳莫賀咄者處羅之弟咄苾也突厥利者始畢之子什鉢苾也處羅又欲取并州以居楊政道其羣臣多諫處羅曰我父失國賴隋得立此恩不可忘將出師而卒義成公主以其子奧射設醜弱廢之更立莫賀咄設號頡利可汗乙酉頡利遣使告處羅之喪上禮之如始畢之喪十二月突厥倫特勒在并州大為民患并州總管劉世讓設䇿擒之上聞之甚喜四年春三月庚申以靺鞨渠帥突地稽為燕州總管突厥頡利可汗承父兄之資士馬雄盛有憑陵中國之志妻隋義成公主公主從弟善經避亂在突厥與王世充使者王文素共說頡利曰昔啓民為兄弟所逼脫身奔隋賴文皇帝之力有此土宇子孫享之今唐天子非文皇帝子孫可汗宜奉楊政道以伐之以報文皇帝之德頡利然之上以中國未寧待突厥甚厚而頡利求請無厭言辭驕慢甲戌突厥冦汾隂壬午突厥寇石州刺史王集擊却之夏四月己亥突厥頡利可汗寇鴈門李大恩擊走之戊申突厥寇并州初處羅可汗與劉武周相表裏寇并州上遣太常卿鄭元璹往諭以禍福處羅不從未幾處羅遇疾卒國人疑元璹毒之留不遣上又遣漢陽公瓌賂頡利可汗以金帛頡利欲令瓌拜瓌不從亦留之又留左驍衛大將軍長孫順德上怒亦留其使者瓌孝恭之弟也五月突厥寇邊長平靖王叔良督五將擊之叔良中流矢師旋六月戊子卒於道秋八月癸卯突厥寇代州總管李大恩遣行軍總管王孝基拒之舉軍皆沒甲辰進圍崞縣乙巳王孝基自突厥逃歸李大恩衆少據城自守突厥不敢逼月餘引去九月突厥寇并州遣左屯衛大將軍竇琮等擊之戊午突厥寇原州遣行軍總管尉遲敬德等擊之甲申靈州總管楊師道擊突厥破之師道恭仁之弟也髙開道與突厥連兵數入為寇恆定幽易咸被其患五年春二月上遣使賂突厥頡利可汗且許結昏頡利乃遣漢陽公瓌鄭元璹長孫順德等還庚子復遣使來修好上亦遣其使者特勒熱寒阿史那德等還并州總管劉世讓屯鴈門頡利與髙開道苑君璋合衆攻之不克月餘乃還夏四月壬申代州總管定襄王李大恩為突厥所殺先是大恩奏稱突厥饑饉馬邑可取詔殿內少監獨孤晟將兵與大恩共擊苑君璋期以二月㑹馬邑失期不至大恩不能獨進頓兵新城頡利可汗遣數萬騎與劉黑闥共圍大恩上遣右驍衛大將軍李髙遷救之未至大恩糧盡夜遁突厥邀之衆潰而死上惜之獨孤晟坐减死徙邉五月突厥寇欣州李髙遷擊破之秋八月乙卯突厥頡利可汗寇邊遣左武衛將軍段德操雲州總管李子和將兵拒之丙辰頡利十五萬騎入鴈門己未寇并州别遣兵寇原州庚申命太子出幽州道秦王世民出秦州道以禦之李子和趨雲中掩擊可汗段德操趨夏州邀其歸路辛酉上謂群臣曰突厥入寇而復求和和與戰孰利太常卿鄭元璹曰戰則怨深不如和利中書令封德彞曰突厥恃犬羊之衆有輕中國之意若不戰而和示之以弱明年將復來臣愚以為不如擊之既勝而後與和則恩威兼著矣上從之己巳并州大總管襄邑王神符破突厥於汾東汾州刺史蕭顗破突厥斬首五千餘級丙子突厥寇廉州戊寅陷大震關上遣鄭元璹詣頡利是時突利精騎數十萬自介休至晉州數百里間填溢山谷元璹見頡利責以負約與相辨詰頡利頗慙元璹因說頡利曰唐與突厥風俗不同突厥雖得唐地不能居也今虜掠所得皆入國人於可汗何有不如旋師復修和親可無跋涉之勞坐受金幣又皆入可汗府庫孰與棄昆弟積年之歡而結子孫無窮之怨乎頡利恱引兵還元璹自義寧以來五使突厥幾死者數焉九月癸巳交州刺史權士通弘州總管宇文歆靈州總管楊師道擊突厥於三觀山破之乙未太子班師丙申宇文歆邀突厥於崇岡鎮大破之斬首千餘級壬寅定州總管雙士洛等擊突厥於恆山之南丙午領軍將軍安興貴擊突厥於甘州皆破之冬十一月乙酉封略陽公道宗為郡王道宗為靈州總管梁師都遣弟洛兒引突厥數萬圍之道宗乘間出擊大破之突厥與師都連結遣其郁射設入居故五原道宗逐出之斥地千餘里六年夏五月丙申梁師都將卒獠兒引突厥寇林川戊戍苑君璋將髙滿政寇代州驃騎將軍李寶言擊走之癸卯髙開道引突厥寇幽州突地稽將兵邀擊破之六月戊午髙滿政以馬邑來降先是前并州總管劉世讓除廣州總管將之官上問以備邉之䇿世讓對曰突厥比數為寇良以馬邑為之中頓故也請以勇將戍崞城多貯金帛募有降者厚賞之數出騎兵掠其城下蹂其禾稼敗其生業不出嵗餘彼無所食必降矣上然其計曰非公誰為勇將即命世讓戍崞城馬邑病之是時馬邑人多不願屬突厥上復遣人招諭苑君璋髙滿政說君璋盡殺突厥戍兵降唐君璋不從滿政因衆心所欲夜襲君璋君璋覺之亡奔突厥滿政殺君璋之子及突厥戍兵二百人而降壬戌梁師都以突厥寇匡州丁卯苑君璋與突厥吐屯設寇馬邑髙滿政與戰破之以滿政為朔州總管封滎國公秋七月丙子苑君璋以突厥寇馬邑右武侯大將軍李髙遷及髙滿政禦之戰於臘河谷破之癸未突厥寇原州乙酉寇朔州李髙遷為虜所敗行軍總管尉遲敬德將兵救之己亥遣太子將兵屯北邊秦王世民屯并州以僃突厥八月甲辰突厥寇真州又寇馬邑己未突厥寇原州辛未突厥陷原州之善和鎮癸酉又寇渭州九月庚寅突厥寇幽州壬寅髙開道引突厥二萬騎寇幽州突厥惡弘農公劉世讓為己患遣其臣曹般陀來言世讓與可汗通謀欲為亂上信之冬十月丙午殺世讓籍沒其家秦王世民猶在并州己未詔世民引軍還初上遣右武候大將軍李髙遷助朔州總管髙滿政守馬邑苑君璋引突厥萬餘騎至城下滿政擊破之頡利可汗怒大發兵攻馬邑髙遷懼帥所部二千人斬關宵遁虜邀之失亡者半頡利自帥衆攻城滿政出兵禦之或一日戰十餘合上命行軍總管劉世讓救之至松子嶺不敢進還保崞城㑹頡利遣使求婚上曰釋馬邑之圍乃可議婚頡利欲解兵義成公主固請攻之頡利以髙開道善為攻具召開道與之攻馬邑甚急頡利誘滿政使降滿政罵之糧且盡救兵未至滿政欲潰圍走朔州右虞候杜士逺以虜兵盛恐不免壬戌殺滿政降於突厥苑君璋復殺城中豪傑與滿政同謀者三十餘人上以滿政子玄積為上柱國襲爵丁卯突厥復請和親以馬邑歸唐上以將軍秦武通為朔州總管突厥數為邊患并州大總管府長史竇靜表請於太原置屯田以省餽運議者以為煩擾不許靜切論不已敕徴靜入朝使與裴寂蕭瑀封德彛相論難於上前寂等不能屈乃從靜議歲收榖數千斛上善之命檢校并州大總管靜抗之子也十一月辛巳秦王世民復請增置屯田於并州之境從之十二月己巳突厥冦定州州兵擊走之七年春三月丁酉突厥冦原州夏五月辛未冦朔州六月突厥冦代州之武周城州兵擊破之秋七月己巳苑君璋以突厥冦朔州總管秦武通擊却之戊寅突厥冦原州遣寧州刺史鹿大師救之又遣楊師道趨大木根山邀其歸路庚辰突厥冦隴州遣護軍尉遲敬德擊之癸未突厥冦隂盤己丑突厥吐利設與苑君璋冦并州或說上曰突厥所以屢冦關中者以子女玉帛皆在長安故也若焚長安而不都則胡冦自息矣上以為然遣中書侍郎宇文士及踰南山至樊鄧行可居之地將徙都之太子建成齊王元吉裴寂皆贊成其䇿蕭瑀等雖知其不可而不敢諫秦王世民諫曰戎狄為患自古有之陛下以聖武龍興光宅中夏兵百萬所征無敵奈何以胡冦擾邊遽遷都以避之貽四海之羞為百世之笑乎彼霍去病漢廷一將猶志滅胸奴况臣忝備藩維願假數年之期請係頡利之頸致之闕下若其不效遷都未晚上曰善建成曰昔樊噲欲以十萬衆橫行胸奴中秦王之言得無似之世民曰形勢各異用兵不同樊噲小豎何足道乎不出十年必定漠北非敢虛言也閏月己未詔世民元吉將兵出豳州以禦突厥上餞之於蘭池苑君璋引突厥冦朔州八月戊辰突厥冦原州壬申突厥冦欣州丙子冦并州京師戒嚴戊寅冦綏州刺史劉大俱擊却之是時頡利突利二可汗舉國入冦連營南上秦王世民引兵拒之㑹關中久雨糧運阻絶士卒疲於征役器械頓弊朝廷及軍中咸以為憂世民與虜遇於豳州勒兵將戰己卯可汗帥萬餘騎奄至城西陳於五隴阪將士震恐世民謂元吉曰今虜騎慿陵不可示之以怯當與之一戰汝能與我俱乎元吉懼曰虜形勢如此奈何輕出萬一失利悔可及乎世民曰汝不敢出吾當獨往汝留此觀之世民乃帥騎馳詣虜陳告之曰國家與可汗和親何為負約深入我地我秦王也可汗能鬪獨出與我鬪若以衆來我直以此百騎相當耳頡利不之測笑而不應世民又前遣騎告突利曰爾往與我盟有急相救今乃引兵相攻何無香火之情也突利亦不應世民又前將度溝水頡利見世民輕出又聞香火之言疑突利與世民有謀乃遣止世民曰王不須度我無它意更欲與王申固盟約耳乃引兵稍却是後霖雨益甚世民謂諸將曰虜所恃者弓矢耳今積雨彌時筋膠俱解弓不可用彼如飛鳥之折翼吾屋居火食刀槊犀利以逸制勞此而不乘將何復待乃潜師夜出冒雨而進突厥大驚世民又遣說突利以利害突利恱聽命頡利欲戰突利不可乃遣突利與其夾畢特勒阿史那思摩來見世民請和親世民許之思摩頡利之從叔也突利因自託於世民請結為兄弟世民亦以恩意撫之與盟而去庚寅岐州刺史柴紹破突厥於杜陽壬申突厥阿史那思摩入見上引升御榻慰勞之思摩貌類胡不類突厥故處羅疑其非阿史那種歷處羅頡利世常為夾畢特勤終不得典兵為設既入朝賜爵和順王丁酉遣左僕射裴寂使於突厥九月癸卯突厥冦綏州都督劉大俱擊破之獲特勒三人冬十月己巳突厥冦甘州八年初上以天下大定罷十二軍既而突厥為冦不巳辛亥復置十二軍以太常卿竇誕等為將軍簡練士馬議大舉擊突厥甲寅凉州胡睦伽陀引突厥襲都督府入子城長史劉君傑擊破之夏六月丙子遣燕郡王李藝屯華亭縣及彈箏硤水部郎中姜行本斷石嶺道以備突厥丙戍頡利可汗冦靈州丁亥以右衛大將軍張瑾為行軍總管以禦之以中書侍郎溫彥博為長史先是上與突厥書用敵國禮秋七月甲辰上謂侍臣曰突厥貪婪無厭朕將征之自今勿復為書皆用詔敕己酉突厥頡利可汗冦相州丙辰代州都督藺謨與突厥戰於新城不利復命行軍總管張瑾屯石嶺李髙遷趨大谷以禦之丁巳命秦王屯蒲州以備突厥八月壬戍突厥踰石嶺寇弃州癸亥寇靈州丁卯寇潞沁韓三州詔安州大都督李靖出潞州道行軍總管任瓌屯太行以禦突厥頡利可汗將兵十餘萬大掠朔州壬申并州道行軍總管張瑾與突厥戰於大谷全軍皆沒瑾脫身奔李靖行軍長史溫彥博為虜所執虜以彥博職在機近問以國家兵糧虛實彥博不對虜遷之隂山庚辰突厥寇靈州甲申靈州都督任城王道宗擊破之丙戌突厥寇綏州丁亥頡利可汗遣使請和而退九月癸巳突厥沒賀咄設陷并州一縣丙申代州都督藺謨擊破之丙午右領軍將軍王君廓破突厥於幽州俘斬二千餘人突厥冦藺州冬十月突厥寇鄯州遣霍公柴紹救之十一月戊戌突厥寇彭州九年春二月丁亥突厥寇原州遣折威將軍楊毛擊之三月辛亥突厥寇靈州癸丑南海公歐陽胤奉使在突厥帥其徒五十人謀掩襲可汗牙帳事泄突厥囚之丁巳突厥冦涼州都督長樂王幼良擊走之夏四月丁卯突厥寇朔州庚午寇原州癸酉寇涇州戊寅安州大都督李靖與突厥頡利可汗戰於靈州之硤石自旦至申突厥乃退癸未突厥冦西㑹州五月戊戌突厥寇秦州突厥寇蘭州六月突厥寇隴州辛未冦渭州遣右衛大將軍柴紹擊之秋七月己丑柴紹破突厥於秦州斬特勒一人士卒首千餘級八月丙辰突厥遣使請和癸亥詔傳位於太子甲子太宗即皇帝位於東宫顯德殿初稽胡酋長劉仚成帥衆降梁師都師都信讒殺之由是所部猜懼多來降者師都浸衰弱乃朝于突厥為之畫䇿勸令入寇於是頡利突利二可汗合兵十餘萬騎寇涇州進至武功京師戒嚴己卯突厥進寇髙陵辛巳涇州道行軍總管尉遲敬德與突厥戰於涇陽大破之獲其俟斤阿史德烏沒啜斬首千餘級癸未頡利可汗進至渭水便橋之北遣其腹心執失思力入見以觀虛實思力盛稱頡利突利二可汗將兵百萬今至矣上讓之曰吾與汝可汗靣結和親贈遺金帛前後無算汝可汗自負盟約引兵深入於我無愧汝雖戎狄亦有人心何得全忘大恩自誇彊盛我今先斬汝矣思力懼而請命蕭瑀封德彛請禮遣之上曰我今遣還虜謂我畏之愈肆慿陵乃囚思力於門下省上自出玄武門與髙士廉房玄齡等六騎徑詣渭水上與頡利隔水而語責以負約突厥大驚皆下馬羅拜俄而諸軍繼至旌甲蔽野頡利見執失思力不返而上挺身輕出軍容甚盛有懼色上麾諸軍使却而布陳獨留與頡利語蕭瑀以上輕敵叩馬固諌上曰吾籌之己孰非卿所知突厥所以敢傾國而來直抵郊甸者以我國內有難朕新即位謂我不能抗禦故也我若示之以弱閉門拒守虜必放兵大掠不可復制故朕輕騎獨出示若輕之又震曜軍容使知必戰出虜不意使之失圖虜入我地既深必有懼心故與戰則克與和則固矣制服突厥在此一舉卿第觀之是日頡利來請和詔許之上即日還宫乙酉又幸城西斬白馬與頡利盟于便橋之上突厥引兵退蕭瑀請於上曰突厥未和之時諸軍爭戰陛下不許臣等亦以為疑既而虜自退其䇿安在上曰吾觀突厥之衆雖多而不整君臣之志唯賄是求當其請和之時可汗獨在水西逹官皆來謁我我若醉而縛之因襲擊共衆勢如拉朽又命長孫無忌李靖伏兵於幽州以待之虜若奔歸伏兵邀其前大軍竊其後覆之如反掌耳所以不戰者吾即位日淺國家未安百姓未富且當靜以撫之一與虜戰所損甚多虜結怨既深懼而修備則吾未可以得志矣故卷甲韜戈啖以金帛彼既得所欲固當自退志意驕墮不復設備然後養威俟舋一舉可滅也將欲取之必固與之此之謂矣卿知之乎瑀再拜曰非所及也九年突厥頡利獻馬三千匹羊萬口上不受但詔歸所掠中國戶口徴溫彥博還朝丁未上引諸衛將卒習射於顯德殿庭諭之曰戎狄侵盜自古有之患在邊境小安則人主逸遊忘戰是以冦來莫之能禦今朕不使汝曹穿池築苑專習弓矢居間無事則為汝師突厥入寇則為汝將庶幾中國之民可以少安乎於是日引數百人教射於殿庭上親臨試中多者賞以弓刀帛其將帥亦加上考太宗貞觀元年夏五月苑君璋帥衆來降初君璋引突厥陷馬邑殺髙滿政退保恆安其衆皆中國人多棄君璋來降君璋懼亦降請捍北邊以贖罪上皇許之君璋請約契上皇遣鴈門人元普賜之金劵頡利可汗復遣人招之君璋猶豫未决恆安人郭子威說君璋以恆安地險城堅突厥方彊且當倚之以觀變未可束手於人君璋乃執元普送突厥復與之合數與突厥入冦至是見頡利政亂知其不足恃遂帥衆來降上以君璋為隰州都督芮國公𥘉突厥性淳厚政令質略頡利可汗得華人趙德言委用之德言專其威福多變更舊俗政令煩苛國人始不恱頡利又好信任諸胡而踈突厥胡人貪冒多反覆兵革歲動㑹大雪深數尺雜畜多死連年饑饉民皆凍餒頡利用度不給重斂諸部由是內外離怨諸部多叛兵浸弱言事者多請擊之上以問蕭瑀長孫無忌曰頡利君臣昏虐危亡可必今擊之則新與之盟不擊恐失機㑹如何而可瑀請擊之無忌對曰虜不犯塞而棄信勞民非王者之師也上乃止𥘉西突厥曷薩那可汗方彊敕敕諸部皆臣之曷薩那徴稅無度敕勒相帥叛之附干頡利頡利政亂薛延陀與回紇拔野古等叛之頡利不能制平鐵勒事見唐頡利益衰國人離散㑹大雪平地數尺羊馬多死民大飢頡利恐唐乘其弊引兵入朔州境上揚言㑹獵實設備焉鴻臚卿鄭元璹使突厥還言於上曰戎狄興衰專以羊馬為候今突厥民飢畜瘦此將亡之兆也不過三年上然之羣臣多勸上乘間擊突厥上曰新與人盟而背之不信利人之災不仁乘人之危以取勝不武縱使其種落盡叛六畜無餘朕終不擊必待有罪然後討之二年𥘉突厥突利可汗建牙直幽州之北主東偏奚霫等數十部多叛突厥來降頡利可汗以其失衆責之及薛延陀回紇等敗欲谷設頡利遣突利討之突利兵又敗輕騎奔還頡利怒拘之十餘日而撻之突利由是怨隂欲叛頡利頡利數徴兵於突利突利不與表請入朝上謂侍臣曰嚮者突厥之彊控弦百萬慿陵中夏用是驕恣以失其民今自請入朝非困窮肯如是乎朕聞之且喜且懼何則突厥衰則邊境安矣故喜然朕或失道它日亦將如突厥能無懼乎卿曹宜不惜苦諌以輔朕之不逮也頡利發兵攻突利夏四月丁亥突利遣使來求救上謀於大臣曰朕與突利為兄弟有急不可不救然頡利亦與之有盟奈何兵部尚書杜如晦曰戎狄無信終當負約今不因其亂而取之後悔無及夫取亂侮亡古之道也丙申契丹酋長帥其部落來降頡利遣使請以梁師都易契丹上謂使者曰契丹與突厥異類今來歸附何故索之師都中國之人盜我土地暴我百姓突厥受而庇之我興兵致討轉來救之彼如魚游釡中何患不為我有借使不得亦終不以降附之民易之也先是上知突厥政亂不能庇梁師都以書諭之師都不從上遣夏州都督長史劉旻司馬劉蘭成圖之旻等數遣輕騎踐其禾稼多縱反間離其君臣其國漸虛降者相屬其名將李正寶等謀執師都事泄來奔由是上下益相疑旻等知可取上表請兵上遣右衛大將軍柴紹殿中少監薛萬均擊之又遣旻等據朔方東城以逼之師都引突厥兵至城下劉蘭成偃旗卧鼓不出師都宵遁蘭成追擊破之突厥大發兵救師都柴紹等未至朔方數十里與突厥遇奮擊大破之遂圍朔方突厥不敢救城中食盡壬寅師都從父弟洛仁殺師都以城降以其地為夏州秋九月己未突厥寇邊朝臣或請修古長城發民乘堡鄣上曰突厥災異相仍頡利不懼而修德暴虐滋甚骨肉相攻亡在朝夕朕方為公掃清沙漠安用勞民逺修鄣塞乎三年秋八月丙子薛延陀毗伽可汗遣其弟統特勒入貢上賜以寶刀及寶鞭謂曰卿所部有大罪者斬之小罪者鞭之夷男甚喜突厥頡利可汗大懼始遣使稱臣請尚公主修壻禮代州都督張公謹上言突厥可取之狀以為頡利縱欲逞暴誅忠良昵姦佞一也薛延陀等諸部皆叛二也突利拓設欲谷設皆得罪無所自容三也塞北霜早糇糧乏絶四也頡利踈其俗類親委諸胡胡人反覆大軍一臨必生內變五也華人入北其衆甚多比聞所在嘯聚保據山險大軍出塞自然響應六也上以頡利可汗既請和親復援梁師都丁亥命兵部尚書李靖為行軍總管討之以張公謹為副九月丙午突厥俟斤九人帥三千騎來降戊午拔野古僕骨同羅奚酋長並帥衆來降冬十一月辛丑突厥寇河西肅州刺史公孫武逹甘州刺史成仁重與戰破之捕虜千餘口庚申以行并州都督李世績為通漢道行軍總管兵部尚書李靖為定襄道行軍總管華州刺史柴紹為金河道行軍總管靈州大都督薛萬徹為暢武道行軍總管衆合十餘萬皆受李靖節度分道出擊突厥乙丑任城王道宗擊突厥於靈州破之十二月戊辰突利可汗入朝上謂侍臣曰往者太上皇以百姓之故稱臣於突厥朕常痛心今單于稽顙庶幾可雪前恥壬午靺羯遣使入貢上曰靺羯逺來蓋突厥已服之故也昔人謂禦戎無上䇿朕今治安中國而四夷自服豈非上䇿乎庚寅突厥都射設帥所部來降四年春正月李靖帥驍騎三千自馬邑進屯惡陽嶺夜襲定襄破之突厥頡利可汗不意靖猝至大驚曰唐不傾國而來靖何敢孤軍至此其衆一日數驚乃徙牙於磧口靖復遣諜離其心腹頡利所親康蘇密以隋蕭后及煬帝之孫政道來降乙亥至京師先是有降胡言中國人或潜通書啓於蕭后者至是中書舍人楊文瓘請鞫之上曰天下未定突厥方彊愚民無知或有斯事今天下已安既往之事何須問也李世績出雲中與突厥戰於白道大破之二月甲辰李靖破突厥頡利可汗於隂山先是頡利既敗竄于鐵山餘衆尚數萬遣執失思力入見謝罪請舉國內附身自入朝上遣鴻臚卿唐儉等慰撫之又詔李靖將兵迎頡利頡利外為卑辭內實猶豫欲俟草青馬肥亡入漠北靖引兵與李世績㑹白道相與謀曰頡利雖敗其衆猶盛若走度磧北保依九姓道阻且逺追之難及今詔使至彼虜必見寬若選精騎一萬齎二十日糧往襲之不戰可擒矣以其謀告張公謹公謹曰詔書已許其降使者在彼奈何擊之靖曰此韓信所以破齊也唐儉輩何足惜遂勒兵夜發丗績繼之軍至隂山遇突厥千餘帳俘以隨軍頡利見使者大喜意自安靖使武邑蘇定方帥二百騎為前鋒乘霧而行去牙帳七里虜乃覺之頡利乘千里馬先走靖軍至虜衆遂潰唐儉脫身得歸靖斬首萬餘級俘男女十餘萬獲雜畜數十萬殺隋義成公主擒其子疊羅施頡利帥萬餘人欲度磧李世績軍於磧口頡利至不得度其大酋長皆帥衆降世績虜五萬餘口而還斥地自隂山北至大漠露布以聞甲寅以克突厥赦天下三月戊辰以突厥夾畢特勒阿史那思摩為右武候大將軍庚午突厥思結俟斤帥衆四萬來降丙子以突利可汗為右衛大將軍北平郡王𥘉始畢可汗以啓民母弟蘇尼失為沙鉢羅設督部落五萬家牙直靈州西北及頡利政亂蘇尼失所部獨不携二突利之來奔也頡利立之為小可汗及頡利敗走往依之將奔吐谷渾大同道行軍總管任城王道宗引兵逼之使蘇尼失執送頡利頡利以數騎夜走匿于荒谷蘇尼失懼馳追獲之庚辰行軍副總管張寶相帥衆奄至沙鉢羅營俘頡利送京師蘇尼失舉衆來降漠南之地遂空突厥頡利可汗至長安夏四月戊戌上御順天樓盛陳文物引見頡利數之曰汝藉父兄之業縱淫虐以取亡罪一也數與我盟而背之二也恃彊好戰暴骨如莽三也蹂我稼穡掠我子女四也我宥汝罪存汝社稷而遷延不來五也然自便橋以來不復大入為寇以是得不死耳頡利哭謝而退詔館於太僕厚廪食之上皇聞擒頡利歎曰漢髙祖困白登不能報今我子能滅突厥吾託付得人復何憂哉上皇召上與貴臣十餘人及諸王妃主置酒凌煙閣酒酣上皇自彈琵琶上起舞公卿迭起為夀逮夜而罷突厥既亡其部落或北附薛延陀或西奔西域其降唐者尚十萬口詔羣臣議區處之宜朝士多言北狄自古為中國患今幸而破亡宜悉徙之河南兖豫之間分其種落散居州縣教之耕織可以化胡虜為農民永空塞北之地中書侍郎顔師古以為突厥鐵勒皆上古所不能臣陛下既得而臣之請皆置之河北分立酋長領其部落則永永無患矣禮部侍郎李百藥以為突厥雖云一國然其種類區分各有酋帥今宜因其離散各即本部署為君長不相臣屬縱欲存立阿史那氏唯可使臣其本族而已國分則弱而易制勢敵則難相吞滅各自保全必不能抗衡中國仍請於定襄置都護府為其節度此安邊之長䇿也夏州都督竇靜以為戎狄之性有如禽獸不可以刑法威不可以仁義教况彼首丘之情未易忘也置之中國有損無益恐一旦變生犯我王略莫若因其破亡之餘施以望外之恩假之王矦之號妻以宗室之女分其土地析其部落使其權弱勢分易為羈制可使常為藩臣永保邊塞溫彥博以為徙於兖豫之間則乖違物性非所以存養之也請準漢建武故事置降胸奴於塞下全其部落順其土俗以實空虛之地使為中國扞蔽䇿之善者也魏徴以為突厥世為冦盜百姓之讎也今幸而破亡陛下以其降附不忍盡殺宜縱之使還故土不可留之中國夫戎狄人靣獸心弱則請服彊則叛亂固其常性今降者衆近十萬數年之後蕃息倍多必為腹心之疾不可悔也晉𥘉諸胡與民雜居中國郭欽江統皆勸武帝驅出塞外以絶亂階武帝不從後二十餘年伊洛之間遂為氊裘之域此前事之明鑑也彥博曰王者之於萬物天覆地載靡有所遺今突厥窮來歸我奈何棄之而不受乎孔子曰有教無類若救其死亡授以生業教之禮義數年之後悉為吾民選其酋長使入宿衛畏威懷德何後患之有上卒用彥博䇿處突厥降衆東自幽州西至靈州分突利故所統之地置順祐北長四州都督府又分頡利之地為六州左置定襄都督府右置雲中都督府以統其衆五月辛未以突利為順州都督使帥其部落之官上戒之曰爾祖啓民挺身奔隋隋立以為大可汗奄有北荒爾父始畢反為隋患天道不容故使爾今日亂亡如此我所以不立爾為可汗者懲啓民前事故也今命爾為都督爾宜善守國法勿相侵掠非徒欲中國久安亦使爾宗族永全也壬申以阿史那蘇尼失為懷德郡王阿史那思摩為懷化郡王頡利之亡也諸部落酋長皆棄頡利來降獨思摩隨之竟與頡利俱擒上嘉其忠拜右武候大將軍尋以為北開州都督使統頡利舊衆丁丑以右武衛大將軍史大奈為豐州都督其餘酋長至者皆拜將軍中郎將布列朝廷五品已上百餘人殆與朝士相半因而入居長安者近萬家六月丁酉以阿史那蘇尼失為北寧州都督以中郎將史善應為北撫州都督壬寅以右驍衛將軍康蘇為北安州都督秋八月戊午突厥欲谷設來降欲谷設突利之弟也頡利敗欲谷設奔髙昌聞突利為唐所禮遂來降九月戊辰伊吾城主入朝隋末伊吾內屬置伊吾郡隋亂臣於突厥頡利既滅舉其屬七城來降因以其地置伊西州五年隋末中國人多沒於突厥及突厥降上遣使以金帛贖之五月乙丑有司奏凡得男女八萬口六年突厥頡利可汗鬱鬱不得意數與家人相對悲泣容貌羸憊上見而憐之以虢州地多麋鹿可以遊獵乃以頡利為虢州刺史頡利辭不願往冬十月癸未復以為右衛大將軍七年冬十二月帝從上皇置酒故漢未央宫上皇命突厥頡利可汗起舞又命南蠻酋長馮智戴詠詠詩既而笑曰胡越一家自古未有也帝奉觴上壽曰今四夷入臣皆陛下教誨非臣智力所及昔漢髙祖亦從太上皇置酒此宫妄自矜大臣所不取也上皇大恱殿上皆呼萬嵗八年春正月癸未突厥頡利可汗卒命國人從其俗焚尸葬之十年春正月辛丑以突厥拓設阿史那社爾為左驍衛大將軍社爾處羅可汗之子也年十一以智略聞可汗以為拓設建牙於磧北與欲谷設分統敕勒諸部居官十年未嘗有所賦斂諸設或鄙其不能為富貴社爾曰部落苟豐於我足矣諸設慙服及薛延陀叛攻破欲谷設社爾兵亦敗將其餘衆走保西陲頡利可汗既亡西突厥亦亂咄陸可汗兄弟爭國社爾詐往降之引兵襲破西突厥取其地幾半有衆十餘萬自稱答布可汗社爾乃謂諸部曰首為亂破我國者薛延陀也我當為先可汗報仇擊滅之諸部皆諌曰新得西方宜且留鎮撫今遽捨之逺去西突厥必來取其故地社爾不從擊薛延陀於磧北連兵百餘日㑹嘻利失可汗立社爾之衆苦於久役多棄社爾逃歸薛延陀縱兵擊之社爾大敗走保髙昌其舊兵在者才萬餘家又畏西突厥之逼遂帥衆來降敕處其部落於靈州之北留社爾於長安尚皇妹南陽長公主典屯兵於苑內十三年四月上幸九成宫𥘉突厥突利可汗之弟結社率從突利入朝歷位中郎將居家無賴怨突利斥之乃誣告其謀反上由是薄之久不進秩結社率隂結故部落得四十餘人謀因晉王治四鼓出宫開門辟仗馳入宫門直指御帳可有大功四月甲申擁突利之子賀邏鶻夜伏於宫外㑹大風晉王未出結社率恐曉遂犯行宫踰四重幕弓矢亂發衛士死者數十人折衝孫武開等帥衆奮擊久之乃退馳入御廄盜馬二十餘匹北走度渭欲奔其部落追獲斬之原賀邏鶻投于嶺表自結社率之反言事者多云突厥留河南不便秋七月庚戍詔右武候大將軍化州都督懷化郡王李思摩為乙彌泥孰俟利苾可汗賜之鼓纛突厥及胡在諸州安置者並令度河還其舊部俾丗作藩屏長保邊塞突厥咸憚薛延陀不肯出塞上遣司農卿郭嗣本賜薛延陀璽書薛延陀奉詔於是遣思摩帥所部建牙於河北上御齊政殿餞之思摩涕泣奉觴上夀曰奴等破亡之餘分為灰壤陛下存其骸骨復立可汗願萬世子孫恆事陛下又遣禮部尚書趙郡王孝恭等齎冊書就其種落築壇於河上而立之上謂侍臣曰中國根幹也四夷枝葉也割根幹以奉枝葉木安得滋榮朕不用魏徴言幾致狼狽又以左屯衛將軍阿史那忠為左賢王左武衛將軍阿史那泥熟為右賢王忠蘇尼失之子也上遇之甚厚妻以宗女及出塞懷慕中國見使者必泣涕請入侍詔許之十四年春三月丙辰置寧朔大使以護突厥十五月春正月乙亥突厥俟利苾可汗始帥部落濟河建牙於故定襄城有戶三萬勝兵四萬馬九萬匹仍奏言臣非分蒙恩為部落之長願子子孫孫為國家一犬守吠北門若薛延陀侵逼請徙家屬入長城詔許之冬十月并州大都督長史李世績在州十六年令行禁止民夷懷服上曰隋焬帝勞百姓築長城以備突厥卒無所益朕唯置李世績於晉陽而邊塵不驚其為長城豈不壯哉十一月庚申以丗績為兵部尚書薛延陀合兵二十萬擊突厥俟利苾可汗不能禦帥部落入長城保朔州遣使告急上命發兵與李思摩共為掎角唐兵縱擊薛延陀追至漠北平鐵勒事見唐十八年𥘉上遣突厥候利苾北度河有衆十萬勝兵四萬人候利苾不能撫御衆不愜服十一月戊午悉棄候利苾南渡河請處於勝夏之間上許之羣臣皆以為陛下方逺征遼左而置突厥於河南距京師不逺豈得不為後慮願留鎮洛陽遣諸將東征上曰夷狄亦人耳其情與中夏不殊人主患德澤不加不必猜忌異類蓋德澤洽則四夷可使如一家猜忌多則骨肉不免為讎敵煬帝無道失人已久遼東之役人皆斷手足以避征役玄感以運卒反於黎陽非戎狄為患也朕今征髙麗皆取願行者募十得百募百得千其不得從軍者皆憤歎鬱邑豈比隋之行怨民哉突厥貧弱吾收而養之計其感恩入於骨髓豈肯為患且彼與薛延陀嗜欲略同彼不北走薛延陀而南歸我其情可見矣顧謂禇遂良曰爾知起居為我志之自今十五年保無突厥之患侯利苾既失衆輕騎入朝上以為右武衛將軍二十一年冬十一月突厥車鼻可汗遣使入貢車鼻名斛勃本突厥同族丗為小可汗頡利之敗突厥餘衆欲奉以為大可汗時薛延陀方彊車鼻不敢當帥其衆歸之或說薛延陀車鼻貴種有勇略為衆所附恐為後患不如殺之車鼻知之逃去薛延陀遣數千騎追之車鼻勒兵與戰大破之乃建牙於金山之北自稱乙注車鼻可汗突厥餘衆稍稍歸之數年間勝兵三萬人時出抄掠薛延陀及薛延陀敗車鼻藝益張遣其子沙鉢羅特勒入見又請身自入朝詔遣將軍郭廣敬徴之車鼻特為好言𥘉無來意竟不至二十三年上以突厥車鼻可汗不入朝遣右驍衛郎將髙侃發回紇僕骨等兵襲擊之兵入其境諸部落相繼來降拔悉密吐屯肥羅察降以其地置新黎州冬十月以突厥諸部置舍利等五州隸雲中都督府蘇農等六州隸定襄都督府髙宗永徽元年夏六月髙侃擊突厥至阿息山車鼻可汗召諸部兵皆不赴與數百騎遁去侃帥精騎追至金山擒之以歸其衆皆降秋九月庚子髙侃執車鼻可汗至京師釋之拜左武衛將軍處其餘衆於鬱督軍山置狼山都督府以統之以髙侃為衛將軍於是突厥盡為封內之臣分置單于瀚海二都護府單于領狼山雲中桑乾三都督蘇農等一十四州瀚海領瀚海金徽新梨等七都督仙蕚等八州各以其酋長為都督刺史唐平鐵勒唐太宗貞觀元年𥘉突厥既彊敕勒諸部分散有薛延陀回紇都播骨利幹多濫葛同羅僕固拔野古思結渾斛薛結阿跌契苾白霫等十五部皆居磧北風俗大抵與突厥同薛延陀於諸部為最彊西突厥曷薩那可汗方彊敕勒諸部皆臣之曷薩那徴稅無度諸部皆怨曷薩那誅其渠帥百餘人敕勒相帥叛之共推契苾哥楞為易勿真莫賀可汗居貪于山北又以薛延陀乙失鉢為也嘻小可汗居燕末山北及射匱可汗兵復振薛延陀契苾二部並去可汗之號以臣之回紇等六部在鬱督軍山者東屬始畢可汗統葉護可汗勢衰乙失鉢之孫夷男帥其部落七萬餘家附于頡利可汗頡利政亂薛延陀與回紇拔野古等相帥叛之頡利遣其兄子欲谷設將十萬騎討之回紇酋長菩薩將五千騎與戰於馬鬛山大破之欲谷設走菩薩追至天山部衆多為所虜回紇由是大振薛延陀又破其四設頡利不能制二年突厥北邊諸姓多叛頡利可汗歸薛延陀共推其俟斤夷男為可汗夷男不敢當上方圖頡利遣游擊將軍喬師望間道齎册書拜夷男為真珠毗伽可汗賜以鼓纛夷男大喜遣使入貢建牙於大漠之鬱督軍山東至靺鞨西至西突厥南接沙磧北至俱倫水回紇拔野古阿跌同羅僕骨霫諸部落皆屬焉三年秋八月丙子薛延陀遣其弟特勒入貢平突厥事見唐十二年𥘉突厥頡利既亡北方空虛薛延陀真珠可汗帥其部落建庭於都尉揵山北獨邏水南勝兵二十萬立其二子拔酌頡利苾主南北部上以其彊盛恐後難制秋九月癸亥拜其二子皆為小可汗各賜鼓纛外示優崇實分其勢十三年秋七月詔李思摩為乙彌泥孰俟利苾可汗賜之鼓纛突厥及胡在諸州安置者並令度河還其舊部突厥憚薛延陀不肯出塞上遣大農卿郭嗣夲賜薛延陀璽書言頡利既敗其部落咸來歸化我略其舊過嘉其後善待其達官皆如吾百寮部落皆如吾百姓中國貴尚禮義不滅人國前破突厥止為頡利一人為百姓害實不貪其土地利其人畜恆欲更立可汗故置所降部落於河南任其畜牧今戶口蕃滋吾心甚喜既許立之不可失信秋中將遣突厥度河復其故國爾薛延陀受册在前突厥受册在後後者為小前者為大爾在磧北突厥在磧南各守土疆鎮撫部落其踰分故相抄掠我則發兵各問其罪薛延陀奉詔於是遣思摩帥所部建牙於河北十五年薛延陀真珠可汗聞上將東封謂其下曰天子封泰山士馬皆從邊境必虛我以此時取思摩如拉朽耳乃命其子大度設發同羅僕骨回紇靺鞨霫等兵合三十萬度漠南屯白道川據善陽嶺以擊突厥候利苾可汗不能禦帥部落入長城保朔州遣使告急十一月癸酉上命營州都督張儉帥所部精兵及奚霫契丹壓其東境以兵部尚書李世績為朔州道行軍總管將兵六萬騎千二百屯朔方右衛大將軍李大亮為靈州道行軍總管將兵四萬騎五千屯靈武右屯衛大將軍張士貴將兵一萬七千為慶州道行軍總管出雲中涼州都督李襲譽為涼州道行軍總管出其西諸將辭行上戒之曰薛延陀負其彊盛踰漠而南行數千里馬已疲瘦凡用兵之道見利速進不利速退薛延陀不能掩思摩不備急擊之思摩入長城又不速退吾已敕思摩燒剃秋草彼糧糗日盡野無所獲頃偵者來去其馬齧林木枝皮略盡卿等當與思摩共為掎角不須速戰俟其將退一時奮擊破之必矣十二月己亥薛延陀遣使久見請與突厥和親甲辰李世績敗薛延陀於諾真水初薛延陀擊西突厥沙鉢羅及阿史那社爾皆以步戰取勝及將入寇乃大教步戰使五人為伍一人執馬四人前戰戰勝則授以馬追奔於是大度設將三萬騎逼長城欲擊突厥而思摩已走知不可得遣人登城罵之㑹李世績引唐兵至塵埃漲天大度設懼將其衆自赤柯濼北走世績選麾下及突厥精騎六千自直道邀之踰白道川追及於青山大度設走纍日至諾真水勒兵還戰陳亘十里突厥先與之戰不勝還走大度設乘勝追之遇唐兵薛延陀萬矢俱發唐馬多死世績命士卒皆下馬執長矟直前衝之薛延陀衆潰副總管薛萬徹以數千騎收其執馬者薛延陀失馬不知所為唐兵縱擊斬首二千餘級捕虜五萬餘人大度設脫身走萬徹追之不及其衆至漠北值大雪人畜凍死者什八九李丗績還軍定襄突厥思結部居五臺者叛走州兵追之㑹世績軍還夾擊悉誅之丙子薛延陀使者辭還上謂之曰吾約汝與突厥以大漠為界有相侵者我則討之汝自恃其彊踰漠攻突厥李丗績所將才數千騎耳汝已狼狽如此歸語可汗凡舉措利害可善擇其宜十六年秋九月癸亥薛延陀真珠可汗遣其叔父沙鉢羅泥熟俟斤來請昏獻馬三千貂皮三萬八千馬腦鏡一冬十月上謂侍臣曰薛延陀屈彊漠北今御之止有二䇿苟非發兵殄滅之則與之婚姻以撫之耳二者何從房玄齡對曰中國新定兵凶戰危臣以為和親便上曰然朕為民父母苟可利之何愛一女先是左領軍將軍契苾何力母姑臧夫人及弟賀蘭州都督沙門皆在涼州上遣何力歸覲且撫其部落時薛延陀方彊契苾部落皆欲歸之何力大驚曰主上厚恩如是奈何遽為叛逆其徒曰夫人都督先已詣彼若之何不往何力曰沙門孝於親我忠於君必不汝從其徒執之詣薛延陀置真珠牙帳前何力箕踞拔佩刀東向大呼曰豈有唐烈士而受屈虜庭天地日月願知我心因割左耳以誓真珠欲殺之其妻諌而止上聞契苾叛曰必非何力之意左右曰戎狄氣類相親何力入薛延陀猶魚趨水耳上曰不然何力心如鐵石必不叛我㑹有使者自薛延陀來具言其狀上為之下泣謂左右曰何力果如何即命兵部侍郎崔敦禮持節薛延陀以新興公主妻之以求何力何力由是得還拜右驍衛大將軍十七年閏六月薛延陀真珠可汗使其姪突利設來納幣獻馬五萬匹牛橐駝萬頭羊十萬口庚申突利設獻饌上御相思殿大饗羣臣設十部樂突利設再拜上夀賜賚甚厚契苾何力上言薛延陀不可與昏上曰吾已許之矣豈可為天子而食言乎何力對曰臣非欲陛下遽絶之也願且遷延其事臣聞古有親迎之禮若敕夷男使親迎雖不至京師亦應至靈州彼必不敢來則絶之有名矣夷男性剛戾既不成昏其下復攜二不過一二年必病死兩子爭立則可以坐制之矣上從之乃徴真珠可汗使親迎仍發詔將幸靈州與之㑹真珠大喜欲詣靈州其臣諌曰脫為所留悔之無及真珠曰吾聞唐天子有聖德我得身往見之死無所恨且漠北必當有主我行决矣勿復多言上發使三道受其所獻雜畜薛延陀先無庫廄真珠調斂諸部往返萬里道涉沙磧無水草耗死將半失期不至議者或以為聘財未備而與為昏將使戎狄輕中國上乃下詔絶其昏停幸靈州追還三使禇遂良上疏以為薛延陀本一俟斤陛下蕩平沙塞萬里蕭條餘寇奔波須有酋長璽書鼓纛立為可汗比者復降鴻私許其婚媾西告吐蕃北諭思摩中國童幼靡不知之御幸北門受其獻食羣臣四夷宴樂終日咸言陛下欲安百姓不愛一女凡在含生孰不懷德今一朝生進退之意有改悔之心臣為國家惜兹聲聽所顧甚少所失殊多嫌隙既生必構邊患彼國蓄見欺之怒此民懷負約之慙恐非所以服逺人訓戎士也陛下君臨天下十有七載以仁恩結庶類以信義撫戎夷莫不欣然負之無力何惜不使有始有卒乎夫龍沙以北部落無算中國誅之終不能盡當懷之以德使為惡者在夷不在華失信者在彼不在此則堯舜禹湯不及陛下逺矣上不聽是時羣臣多言國家既許其昏受其聘幣不可失信戎狄更生邊患上曰卿曹皆知古而不知今昔漢初胸奴彊中國弱故飾子女捐金絮以餌之得事之宜今中國彊戎狄弱以我徒兵一千可擊胡騎數萬薛延陀所以匍匐稽顙惟我所欲不敢驕慢者以新為君長雜姓非其種族欲假中國之勢以威服之耳彼同羅僕骨回紇等十餘部兵各數萬併力攻之立可破滅所以不敢發者畏中國所立故也今以女妻之彼自恃大國之壻雜姓誰敢不服戎狄人靣獸心一旦微不得意必反噬為害今吾絶其昏殺其禮雜姓知我棄之不日將瓜剖之矣卿曹第志之臣光曰孔子稱去食去兵不可去信唐太宗審知薛延陀不可妻則𥘉勿許其昏可也既許之矣乃復恃彊棄信而絶之雖滅薛延陀猶可羞也王者發言出令可不愼哉十八年𥘉上遣突厥候利苾可汗北度河薛延陀真珠可汗恐其部落翻動意甚惡之豫蓄輕騎於漠北欲擊之上遣使戒敕無得相攻真珠可汗對曰至尊有命安敢不從然突厥翻覆難期當其未破之時歲犯中國殺人以千萬計臣以為至尊克之當翦為奴婢以賜中國之人乃反養之如子其恩德至矣而結社率竟反此屬獸心安可以人理待也臣荷恩深厚請為至尊誅之自是數相攻十九年上之將伐髙麗也薛延陀遣使入貢上謂之曰語爾可汗今我父子東征髙麗汝能為寇宜亟來真珠可汗惶恐遣使致謝且請發兵助軍上不許及髙麗敗於駐蹕山莫離支使靺鞨說真珠啖以厚利真珠懾服不敢動九月壬申真珠卒上為之發哀𥘉真珠請以其庶長子曳莽為突利失可汗居東方統雜種嫡子拔灼為肆葉護可汗居西方統薛延陀詔許之皆以禮冊命曵莽性躁擾輕用兵與拔灼不協真珠卒來㑹喪既葬曵莽恐拔灼圖已先還所部拔灼追襲殺之自立為頡利俱利薛沙多彌可汗上之征髙麗也使右領軍大將軍執失思力將突厥屯夏州之北以僃薛延陀薛延陀多彌可汗既立以上出征未還引兵寇河南上遣左武候中郎將長安田仁㑹與思力合兵擊之思力羸形僞退誘之深入及夏州之境整陳以待之薛延陀大敗追奔六百餘里耀威磧北而還多彌復發兵冦夏州十二月己未敕禮部尚書江夏王道宗發朔并汾箕嵐代欣蔚雲九州兵鎮朔州右衛大將軍代州都督薛萬徹左驍衛大將軍阿史那社爾發勝夏銀綏丹延鄜坊石隰十州兵鎮勝州勝州都督宋君明左武候將軍薛孤吳發靈原寧鹽慶五州兵鎮靈州又令執失思力發靈勝二州突厥兵與道宗等相應薛延陀至塞下知有僃不敢進二十年春正月辛未夏州都督喬師望右領軍大將軍執失思力等擊薛延陀大破之虜獲二千餘人多彌可汗輕騎遁走部曲騷然矣薛延陀多彌可汗性𥚹急猜忌無恩廢棄父時貴臣專用已所親昵國人不附多彌多所誅殺人不自安回紇酋長吐迷度與僕骨同羅共擊之多彌大敗夏六月乙亥詔以江夏王道宗左衛大將軍阿史那社爾為瀚海安撫大使又遣右領衛大將軍執失思力將突厥兵右驍衛大將軍契苾何力將涼州及胡兵代州都督薛萬徹營州都督張儉各將所部兵分道並進以擊薛延陀上遣校尉宇文法詣烏羅護靺鞨遇薛延陀阿波設之兵於東境法帥靺鞨擊破之薛延陀國中驚擾曰唐兵至矣諸部大亂多彌引數千騎奔阿史德時健部落回紇攻而殺之并其宗族殆盡遂據其地諸俟斤互相攻擊爭遣使來歸命薛延陀餘衆西走猶七萬餘口共立真珠可汗兄子咄摩支為伊特勿失可汗歸其故地尋去可汗之號遣使奉表請居鬱督軍山之北使兵部尚書崔敦禮就安集之敕勒九姓酋長以其部落素服薛延陀種聞咄摩支來皆恐懼朝議恐其為磧北之患乃更遣李丗績與九姓敕勒共圖之上戒丗績曰降則撫之叛則討之己丑上手詔以薛延陀破滅其敕勒諸部或來降附或未歸服今不乘機恐貽後悔朕當自詣靈州招撫其去歲征遼東兵皆不調發李丗績至鬱督軍山其酋長梯真逹官帥衆來降薛延陀咄摩支南奔荒谷丗績遣通事舍人蕭嗣業往招慰咄摩支詣嗣業降其部落猶持兩端丗績縱兵追擊前後斬五千餘級虜男女三萬餘人秋七月咄摩支至京師拜右武衛大將軍八月己巳上行幸靈州江夏王道宗兵既度磧遇薛延陀阿波逹官衆數萬拒戰道宗擊破之斬首千餘級追奔二百里道宗與薛萬徹各遣使招諭敕勒諸部其酋長皆喜頓首請入朝庚午車駕至浮陽回紇拔野古同羅僕骨多濫葛思結阿跌契苾跌結渾斛薛等十一姓各遣使入貢稱薛延陀不事大國暴虐無道不能與奴等為主自取敗死部落鳥散不知所之奴等各有分地不從薛延陀去歸命天子願賜哀憐乞置官司養育奴等上大喜辛未詔回紇等使者宴樂頒賚拜官賜其酋長璽書遣右領軍中郎將安永夀報使壬申上幸漢故甘泉宫詔以戎狄與天地俱生上皇並列流殃構禍乃自運𥘉朕聊命偏師遂擒頡利始弘廟略已滅延陀鐵勒百餘萬户散處北溟逺遣使人委身內屬請同編列並同州郡混元以降殊未前聞冝僃禮告廟仍頒示普天九月上至靈州敕勒諸俟斤遣使相繼詣靈州者數千人咸云願得天至尊為奴等為可汗子子孫孫常為天至尊奴死無所恨甲辰上為詩序其事曰雪恥酬百王除凶報千古公卿請勒石於靈州從之冬十二月戊寅回紇俟利發吐迷度僕骨俟利發歌濫拔延多濫葛俟斤末拔野古俟利發屈利失同羅俟利發時健啜思結酋長烏碎及渾斛薛奚結阿跌契苾白霫酋長皆來朝庚辰上賜宴於芳蘭殿命有司厚加給待每五日一㑹二十一年春正月丙申詔以回紇部為瀚海府僕骨為金微府多濫葛為燕然府拔野古為幽陵府同羅為龜林府思結為盧山府渾為臯蘭州斛薛為高闕州奚結為雞鹿州阿跌為雞田州契苾為榆溪州思結别部為蹛林州白霫為置顔州各以其酋長為都督刺史各賜金銀繒帛及錦𫀆敕勒大喜捧戴歡呼拜舞宛轉塵中及還上御天成殿宴設十部樂而遣之諸酋長奏稱臣等既為唐民往來天至尊所如詣父母請於回紇以南突厥以北開一道謂之參天可汗道置六十八驛各有馬及酒肉以供過使歲貢貂皮以充租賦仍請能屬文人使為表疏上皆許之於是北荒悉平然回紇吐迷度已私自稱可汗官號皆如突厥故事夏四月丙寅置燕然都護府統瀚海等六都督臯蘭等七州以揚州都督府司馬李素立為之素立撫以恩信夷落懷之共率馬牛為獻素立唯受其酒一杯餘悉還之六月丁丑詔以隋末喪亂邊民為戎狄所掠今鐵勒歸化宜遣使詣燕然等州與都督相知訪求沒落之人贖以貨財給糧遞還本貫其室韋烏羅護靺鞨三部人為薛延陀所掠者亦令贖還二十二年秋八月辛未遣左領軍大將軍執失思力出金山道擊薛延陀餘寇回紇吐迷度兄子烏紇蒸其叔母烏紇與俱陸莫賀逹官俱羅勃皆突厥車鼻可汗之壻也相與謀殺吐迷度以歸車鼻烏紇夜引十餘騎襲吐迷度殺之燕然副都護元禮臣使人誘烏紇許奏以為瀚海都督烏紇輕騎詣禮臣謝禮臣執而斬之以聞上恐回紇部落離散遣兵部尚書崔敦禮往安撫之久之俱羅勃入見上留之不遣冬十月甲戌以回紇吐迷度子前左屯衛大將軍婆閏為左驍衛大將軍大俟利發瀚海都督高宗龍朔元年冬十月回紇酋長婆閏卒姪比粟毒代領其衆與同羅僕同犯邊詔左武衛大將軍鄭仁泰為鐵勒道行軍大總管燕然都護劉審禮左武衛將軍薛仁貴為副鴻臚卿蕭嗣業為仙蕚道行軍總管右屯衛將軍孫仁師為副將兵討之審禮德威之子也二年春三月鄭仁泰等敗鐵勒於天山鐵勒九姓聞唐兵將至合衆十餘萬以拒之選驍健者數十人挑戰薛仁貴發三矢殺三人餘皆下馬請降仁貴悉坑之度磧北擊其餘衆獲葉護兄弟三人而還軍中歌之曰將軍三箭定天山戰士長歌入漢關思結多濫葛等部落先保天山聞仁泰等將至皆迎降仁泰等縱兵擊之掠其家以賞軍士虜相帥逺遁將軍楊志追之為虜所敗候騎告仁泰虜輜重在近往可取也仁泰將輕騎萬四千倍道赴之遂踰大磧至仙蕚河不見虜糧盡而還值大雪士卒飢凍棄捐甲兵殺馬食之馬盡人自相食比入塞餘兵才八百人軍還司憲大夫楊德裔劾奏仁泰等誅殺已降使虜逃散不撫士卒不計資糧遂使骸骨蔽野棄甲資寇自聖朝開創以來未有如今日之喪敗者仁貴於所監臨貪淫自恣雖矜所得不補所喪並請付法司推科詔以功贖罪皆釋之以右驍衛大將軍契苾何力為鐵勒道安撫使左衛將軍姜恪副之以安輯其餘衆何力簡精騎五百馳入九姓中虜大驚何力乃謂曰國家知汝皆脅從赦汝之罪罪在酋長得之則已其部落大喜共執其葉護及誤特勒等二百餘人以授何力何力數其罪而斬之九姓遂定三年春正月左武衛將軍鄭仁泰討鐵勒叛者餘種悉平之二月徙燕然都護府於回紇更名瀚海都護徙故瀚海都護於雲中古城更名雲中都護以磧為境磧北州府皆隸瀚海磧南隸雲中總章二年秋八月甲戌改瀚海都護府為安北都護府唐平西突厥隋焬帝大業元年𥘉西突厥阿波可汗為葉護可汗所虜國人立鞅素特勒之子是為泥利可汗泥利卒子逹漫立號處羅可汗其母向氏本中國人更嫁泥利之弟婆實特勒開皇末婆實與向氏入朝遇逹頭之亂遂留長安舍於鴻臚寺處羅多烏孫故地撫御失道國人多叛復為鐵勒所困鐵勒者胸奴之遺種族類最多有僕骨同羅契苾薛延陀等部其酋長皆號俟斤族姓雖殊通謂之鐵勒大抵與突厥同俗以寇抄為生無大君長分屬東西兩突厥是嵗處羅引兵擊鐵勒諸部厚稅其物又猜忌薛延陀恐其為變集其酋長數百人盡殺之於是鐵勒皆叛立俟利發俟斤契苾歌楞為莫何可汗又立薛延陀俟斤字也嘻為小可汗與處羅戰屢破之莫何勇毅絶倫甚得衆心為鄰國所憚伊吾髙昌焉耆皆附之三年冬十月鐵勒寇邊帝遣將軍馮孝慈出燉煌擊之不利鐵勒尋遣使謝罪請降帝使裴矩慰撫之四年春正月裴矩聞西突厥處羅可汗思其母請遣使招懷之二月己卯帝遣司朝謁者崔君肅齎詔書慰諭之處羅見君肅甚踞受詔不肯起君肅謂之曰突厥本一國中分為二每歲交兵積數十歲而莫能相滅者明知其勢敵耳然啓民舉其部落百萬之衆卑躬折節入臣天子者其故何也正以切恨可汗不能獨制欲借兵於大國共滅可汗耳羣臣咸欲從啓民之請天子既許之師出有日矣顧可汗母向夫人懼西國之滅旦夕守闕哭泣哀祈匍匐謝罪請發使召可汗令入內屬天子憐之故復遣使至此今可汗乃踞慢如是則向夫人為誑天子必伏尸都市傳首虜庭發大隋之兵資東國之衆左提右擊以擊可汗亡無日矣奈何愛兩拜之禮絶慈母之命惜一語稱臣使社稷為墟乎處羅矍然而起流涕再拜跪受詔書因遣使者隨君肅貢汗血馬七年𥘉帝西巡遣侍御史韋節召西突厥處羅可汗令與車駕會大斗拔谷國人不從處羅謝使者辭以他故帝大怒無如之何會其酋長射匱遣使來求婚裴矩因奏曰處羅不朝恃彊大耳臣請以計弱之分裂其國即易制也射匱者都六之子達頭之孫世為可汗君臨西靣今聞其失職附屬處羅故遣使來以結援耳願厚禮其使拜為大可汗則突厥勢分兩從我矣帝曰公言是也因遣矩朝夕至館微諷諭之帝於仁風殿召其使者言處羅不順之狀稱射匱向善吾將立為大可汗令發兵誅處羅然後為婚帝取桃竹白羽箭一枚以賜射匱因謂之曰此事宜速使疾如箭也使者返路經處羅處羅愛箭將留之使者譎而得免射匱聞而大喜興兵襲處羅處羅大敗棄妻子將左右數千騎東走緣道被劫寓於高昌東保時羅漫山高昌王麴伯雅上狀帝遣裴矩與向氏親要左右馳至玉門關晉昌城曉諭處羅使入朝十二月己未處羅來朝於臨朔宫帝大恱接以殊禮帝與處羅宴處羅稽首謝入見之晚帝以溫言慰勞之僃設天下珍膳盛陳女樂羅綺絲竹眩曜耳目然處羅終有怏怏之色八年春正月帝分西突厥處羅可汗之衆為三使其弟闕達度設將羸弱萬餘口居于㑹寧又使特勒大奈别將餘衆居于樓煩命處羅將五百騎常從車駕巡幸賜號曷娑那可汗賞賜甚厚唐髙祖武德元年冬十二月癸酉西突厥曷娑那可汗自宇文化及所來降以西突厥曷娑那可汗為歸義王曷娑那獻大珠上曰珠誠至寶然朕寶王赤心珠無所用竟還之二年秋七月乙酉西突厥統葉護可汗遣使入貢初西突厥曷娑那可汗入朝于隋隋人留之國人立其叔父號射匱可汗射匱者達頭可汗之孫也既立拓地東至金山西至海遂與北突厥為敵建庭於龜兹北三彌山射匱卒弟統葉護可汗立統葉護勇而有謀北并鐡勒控弦數十萬據烏孫故地又移庭於石國北千泉西域諸國皆臣之葉護各遣吐屯監之督其征賦九月西突厥曷娑那可汗與北突厥有怨曷娑那在長安北突厥遣使請殺之上不許羣臣皆曰保一人而失一國後必為患秦王丗民曰人窮來歸我殺之不義上遲回久之不得已丙戌引曷娑那於內殿宴飲既而送中書省縱北突厥使者使殺之八年夏四月西突厥統葉護可汗遣使請昏上謂裴矩曰西突厥道逺緩急不能相助今求昏何如對曰今北寇方彊為國家今日計且當逺交而近攻臣謂宜許其昏以威頡利俟數年之後中國完實足抗北夷然後徐思其宜上從之遣髙平王道立至其國統葉護大喜道立上之從子也太宗貞觀元年西突厥統葉護可汗遣真珠統俟斤與髙平王道立來獻萬釘寶細金帶馬五千匹以迎公主頡利不欲中國與之和親數遣兵入寇又遣人謂統葉護曰汝迎唐公主要須經我國中過統葉護患之未成昏二年冬十二月西突厥統葉護可汗為其伯父所殺伯父自立是為莫賀咄侯屈利俟毗可汗國人不服弩矢畢部推泥孰莫賀設為可汗泥孰不可統葉護之子嘻力特勒避莫賀咄之禍亡在康居泥孰迎而立之是為乙毗鉢羅肆葉護可汗與莫賀咄相攻連兵不息俱遣使來請昏上不許曰汝國方亂君臣未定何得言昏且諭以各守部分勿復相攻於是西城諸國及敕勒先沒屬西突厥者皆叛之四年西突厥種落散在伊吾詔以涼州都督李大亮為西北道安撫大使於磧口貯糧來者賑給使者招慰相望於道大亮上言欲懷逺者必先安近中國如本根四夷如枝葉疲中國以奉四夷猶拔本根以益枝葉也臣逺考秦漢近觀隋室外事戎狄皆致疲弊今招致西突厥但見勞費未見其益况河西州縣蕭條突厥微弱以來始得耕穫今又供億此役民將不堪不若且罷招慰為便伊吾之地率皆沙磧其人或自立君長求稱臣內屬者羈縻受之使居塞外為中國藩蔽此乃施虛惠而收實利也上從之􅊨西突厥肆葉護可汗既先可汗之子為衆所附莫賀咄可汗所部酋長多歸之肆葉護引兵擊莫賀咄莫賀咄兵敗逃於金山為泥孰設所殺諸部兵推肆葉護為大可汗六年秋七月西突厥肆葉護可汗發兵擊薛延陀為薛延陀所敗肆葉護性猜很信讒有乙利可汗功最多肆葉護以非其族類誅滅之由是諸部皆不自保肆葉護又忌莫賀設之子泥孰隂欲圖之泥孰奔焉耆設卑逹官與弩失畢二部攻之肆葉護輕騎奔康居尋卒國人迎泥孰於焉耆而立之是為咄陸可汗遣使內附丁酉遣鴻臚少卿劉善因立咄陸為奚利邲咄陸可汗八年西突厥咄陸可汗卒其弟同娥設立是為沙鉢羅嘻利失可汗九年冬十月乙亥處月𥘉遣使入貢處月處密皆西突厥之别部也十二年𥘉西突厥嘻利失可汗分其國為十部每部有酋長一人仍各賜一箭謂之十箭又分左右廂左廂號五咄陸置五大啜居碎葉以東右廂號五弩失畢置五大俟斤居碎葉以西通謂之十姓嘻利失失衆心為其臣統吐屯所襲嘻利失兵敗與其弟步利設走保焉耆統吐屯等將立欲谷設為大可汗會統吐屯為人所殺欲谷設兵亦敗嘻利失復得故地至是西部竟立欲谷設為乙毗咄陸可汗乙毗咄陸既立與嘻利失大戰殺傷其衆因中分其地自伊列水以西屬乙毗咄陸以東屬嘻利失十三年西突厥嘻利失可汗之臣俟利發與乙毗咄陸可汗通謀作亂嘻利失窮蹙逃奔鏺汗而死弩失畢部落迎其弟子薄布特勒立之是為乙毗沙鉢羅葉護可汗沙鉢羅葉護既立建庭於雖合水北謂之南庭自龜兹鄯善且末吐火羅焉耆石史何穆康等國皆附之咄陸建庭於鏃曷山西謂之北庭自厥越失拔悉彌駁馬結骨火燖觸水昆等國皆附之以伊列水為境十四年侯君集之討髙昌也西突厥可汗遣其葉護屯可汗浮圖城為髙昌王文泰聲援及君集至可汗懼而西走千餘里葉護以城降十五年西突厥沙鉢羅葉護可汗數遣使入貢秋七月甲戌命左領軍將軍張大師持節即其所號立為可汗賜以鼓纛上又命使者多齎金帛歷諸國市良馬魏徴諌曰可汗位未定而先市馬彼必以為陛下志在市馬以立可汗為名耳使可汗得立荷德必淺若不得立為怨實深諸國聞之亦輕中國市或不得得亦非美茍能使彼安寧則諸國之馬不求自至矣上欣然止之乙毗咄陸可汗與沙鉢羅葉護互相攻乙毗咄陸浸彊大西域諸國多附之未幾乙毗咄陸使石國吐屯擊沙鉢羅葉護擒之以歸殺之十六年西突厥乙毗咄陸可汗既殺沙鉢羅葉護并其衆又擊吐火羅滅之自恃彊大遂驕倨拘留唐使者侵暴西域遣兵寇伊州郭孝恪將輕騎二千自烏骨邀擊敗之乙毗咄陸又遣處月處密二部圍天山孝恪擊走之乘勝進拔處月俟斤所居城追奔至遏索山降處密之衆而歸𥘉髙昌既平嵗發兵千餘人戍守其地禇遂良上疏以為聖王為治先華夏而後夷狄陛下興兵取髙昌數郡蕭然纍年不復嵗調千餘人屯戍逺去鄉里破産辦裝又謫徙罪人皆無賴子弟適足騷擾邊鄙豈能有益行陳所遣多復逃亡徙煩追捕加以道塗所經沙磧千里冬風如割夏風如焚行人往來遇之多死設使張掖酒泉有烽燧之警陛下豈得髙昌一夫斗粟之用終當發隴右諸州兵食以赴之耳然則河西者中國之心腹髙昌者它人之手足奈何糜弊本根以事無用之土乎且陛下得突厥吐谷渾皆不有其地為之立君長以撫之髙昌獨不得與為此乎叛而執之服而封之刑莫威焉德莫厚馬願更擇髙昌子弟可立者使君其國子子孫孫負荷大恩永為唐室藩輔內安外寧不亦善乎上不聽及西突厥入寇上悔之曰魏徴禇遂良勸我復立髙昌吾不用其言今方自咎耳乙毗咄陸西擊康居道過來國破之虜獲甚多不分與其下其將泥孰啜輒奪取之乙毗咄陸怒斬泥孰啜以徇衆皆憤怒泥孰啜部將胡祿屋襲擊之乙毗咄陸衆散走保白水胡城於是弩失畢諸部及乙毗咄陸所部屋利啜等遣使詣闕請廢乙毗咄陸更立可汗上遣使齎璽書立莫賀咄之子為乙毗射匱可汗乙毗射匱既立悉禮遣乙毗咄陸所留唐使者帥諸部擊乙毗咄陸於白水胡城乙毗咄陸出兵擊之乙毗射匱大敗乙毗咄陸遣使招其故部落故部落皆曰使我千人戰死一人獨存亦不汝從乙毗咄陸自知不為衆所附乃西奔吐火羅二十年夏六月丁卯西突厥乙毗射匱可汗遣使入貢且請昏上許之且使割龜兹于闐踈勒朱俱波葱嶺五國以為聘禮二十二年𥘉西突厥乙毗咄陸可汗以阿史那賀魯為葉護居多邏斯水在西州北千五百里統處月處密始蘇歌邏祿失畢五姓之衆乙毗咄陸奔吐火羅乙毗射匱可汗遣兵迫逐之部落亡散夏四月乙亥賀魯帥其餘衆數千帳內屬詔處之於庭州莫賀城拜左驍衛將軍賀魯聞唐兵討龜兹請為鄉導仍從數十騎入朝上以為崑丘道行軍總管厚宴賜而遣之冬十二月戊寅以崑丘道行軍總管左驍衛將軍阿史那賀魯為泥伏沙鉢羅葉護賜以鼓纛使招討西突厥之未服者二十三年春二月丙戌置瑶池都督府隸安西都護戊子以左衛將軍阿史那賀魯為瑶池都督髙宗永徽二年左驍衛將軍瑤池都督阿史那賀魯招集離散廬帳漸盛聞太宗崩謀襲取西庭二州庭州刺史駱弘義知其謀表言之上遣通事舍人橋寶明馳往慰撫寶明說賀魯令長子嘻運入宿衛授右驍衛中郎將尋復遣歸嘻運乃說其父擁衆西走擊破乙毗射匱可汗併其衆建牙于雙河及千泉自號沙鉢羅可汗咄陸五啜弩失畢五俟斤皆歸之勝兵數十萬與乙毗咄陸可汗連兵處月處密及西域諸國多附之以嘻運為莫賀咄葉護焉耆王婆伽利卒國人表請復立故王突騎支夏四月詔加突騎支右武衛將軍遣還國秋七月西突厥沙鉢羅可汗寇庭州攻陷金嶺城及蒲類縣殺略數千人詔左武候大將軍梁建方右驍衛大將軍契苾何力為弓月道行軍總管右驍衛將軍髙德逸右武候將軍薛孤吳仁為副發泰成𡵨雍府兵三萬人及回紇五萬騎以討之冬十二月壬子處月朱邪孤注殺招撫使單道惠與突厥賀魯相結三年春正月癸亥梁建方契苾何力等大破處月朱邪孤注於牢山孤注夜遁建方使副總管髙德逸輕騎追之行五百餘里生擒孤注斬首九千級四年西突厥乙毗咄陸可汗卒其子頡苾逹度設號真珠葉護始與沙鉢羅可汗有隙與五弩失畢共擊沙鉢羅破之斬首千餘級五年閏四月丙子以處月部置金滿州六月夏六月癸未以左屯衛大將軍程知節為葱山道行軍大總管以討西突厥沙鉢羅可汗西突厥頡苾逹度設數遣使請兵討沙鉢羅可汗冬十一月甲戌遣豐州都督元禮臣册拜頡苾逹度設為可汗禮臣至碎葉城沙鉢羅發兵拒之不得前頡苾逹度設部落多為沙鉢羅所併餘衆寡弱不為諸姓所附禮臣竟不冊拜而歸顯慶元年秋八月辛丑葱山道行軍總管程知節擊西突厥與歌邏祿處月二部戰於榆慕谷大破之斬首千餘級副總管周智度攻突騎施處木昆等部於咽城拔之斬首三萬級冬十二月程知節引軍至鷹娑川遇西突厥二萬騎别部鼠尼施等二萬餘騎繼至前軍總管蘇定方帥五百騎馳往擊之西突厥大敗追奔二十里殺獲千五百餘人獲馬及器械綿亘山野不可勝計副大總管王文度害其功言於知節曰今兹雖云破賊官軍亦有死傷乘危輕脫乃成敗之法耳何急而為此自今常結方陳置輜重在內遇賊則戰此萬全䇿也又矯稱别得旨以知節恃勇輕敵委文度為之節制遂收軍不許深入士卒終日跨馬𬒳甲結陳不勝疲頓馬多瘦死定方言於知節曰出師欲以討賊今乃自守坐自困敝若遇賊必敗懦怯如此何以立功且主上以公為大將豈可更遣軍副專其號令事必不然請因文度飛表以聞知節不從至恆篤城有羣胡歸附文度曰此屬伺我旋師還復為賊不如盡殺之取其資財定方曰如此乃自為賊耳何名伐叛文度竟殺之分其財獨定方不受師旋文度坐矯詔當死特除名知節亦坐逗遛追賊不及减死免官二年春閏正月庚戌以右屯衛將軍蘇定方為伊麗道行軍總管帥燕然都護渭南任雅相副都護蕭嗣業發回紇等兵自北道討西突厥沙鉢羅可汗嗣業巨之子也𥘉右衛大將軍阿史那彌射及族兄左屯衛大將軍步真皆西突厥酋長太宗之丗帥衆來降至是詔以彌射步真為流沙安撫大使自南道招集舊衆冬十二月蘇定方擊西突厥沙鉢羅可汗至金山北先擊處木昆部大破之其俟斤懶獨祿等帥萬餘帳來降定方撫之發其千騎與俱右領軍郎將薛仁貴上言泥孰部素不伏賀魯為賀魯所破虜其妻子今唐兵有破賀魯諸部得泥孰妻子者冝歸之仍加賜賚使彼明知賀魯為賊而大唐為之父母則人致其死不遺力矣上從之泥孰喜請從軍共擊賀魯定方至曵嘻河西沙鉢羅帥十姓兵且十萬來拒戰定方將唐兵及回紇萬餘人擊之沙鉢羅輕定方兵少直進圍之定方令步兵據南原攢矟外向日將騎兵陳於北原沙鉢羅先攻步軍三衝不動定方引騎兵擊之沙鉢羅大敗追奔三十里斬獲數萬人明日勒兵復進於是胡祿屋等五弩失畢悉衆來降沙鉢羅獨與處木昆屈律啜數百騎西走時阿史那步真出南道五咄陸部落聞沙鉢羅敗皆詣步真降定方乃命蕭嗣業回紇婆閏將胡兵趨邪羅斯川追沙鉢羅定方與任雅相將新附之衆繼之㑹大雪平地二尺軍中咸請俟晴而行定方曰虜恃雪深謂我不能進必休息士馬亟追之可及若緩之彼遁逃浸逺不可復追省日兼功在此時矣乃踏雪晝夜兼行所過收其部衆至雙河與彌射步真兵合去沙鉢羅所居二百里布陳長驅徑至其牙帳沙鉢羅與其徒將獵定方掩其不僃縱兵擊之斬獲數萬人得其鼓纛沙鉢羅與其子嘻運壻閻啜等脫走趣石國定方於是息兵諸部各歸所居通道路置郵驛掩骸骨問疾苦畫疆場復生業凡為沙鉢羅所掠者悉括還之十姓安堵如故乃命蕭嗣業將兵追沙鉢羅定方引軍還沙鉢羅至石國西北蘇咄城人馬飢乏遣人齎珍寶入城市馬城主伊沮逹官詐以酒食出迎誘之入閉門執之送于石國蕭嗣業至石國石國人以沙鉢羅授之乙五分西突厥地置濛池崑陵二都護府以阿史那彌射為左衛大將軍崑陵都護興昔亡可汗押五咄陸部落阿史那步真為左衛大將軍濛池都護繼往絶可汗押五弩失畢部落遣光祿卿盧承慶持節冊命仍命彌射步真與承慶據諸姓降者準其部落大小位望髙下授刺史以下官三年阿史那賀魯既𬒳擒謂蕭嗣業曰我本亡虜為先帝所存先帝遇我厚而我負之今日之敗天所怒也吾聞中國刑人必於市願刑我於昭陵之前以謝先帝上聞而憐之賀魯至京師冬十一月甲午獻于昭陵敕免其死分其種落為六都督府其所役屬諸國皆置州府西盡波斯並隸安西都護府賀魯尋死葬於頡利墓側四年春三月壬午西突厥興昔亡可汗與真珠護葉戰雙雙河斬真珠護葉龍朔二年冬十二月䫻海道總管蘇海政受詔討龜兹敕興昔亡繼往絶二可汗發兵與之俱至興昔亡之境繼往絶素與興昔亡有怨密謂海政曰彌射謀反請誅之時海政兵才數千集軍吏謀曰彌射若反我輩無噍類不如先事誅之乃矯稱敕令大總管齎帛數萬假賜可汗及諸酋長興昔亡帥其徒受賜海政悉收斬之其鼠尼施拔塞幹兩部亡走海政與繼往絶追討平之軍還至踈勒南弓月部復引吐蕃之衆來欲與唐兵戰海政以師老不敢戰以軍資賂吐蕃約和而還由是諸部落皆以興昔亡為冤各有離心繼往絶尋卒十姓無主有阿史那都支及李遮匐收其餘衆附於吐蕃咸亨二年夏四月甲申以西突厥阿史那都支為左驍衛大將軍兼匐延都督以安集五咄陸之衆四年冬十二月丙午弓月踈勒二王來降西突厥興昔亡可汗之丗諸部離散弓月及阿悉吉皆叛蘇定方之西討也擒阿悉吉以歸弓月南結吐蕃北招咽麵共攻踈勒降之上遣鴻臚卿蕭嗣業發兵討之嗣業兵未至弓月懼與踈勒皆入朝上赦其罪遣歸國調露元年𥘉西突厥十姓可汗阿史那都支及其别帥李遮匐與吐蕃連和侵逼安西朝議欲發兵討之吏部侍郎裴行儉曰吐蕃為寇審禮覆沒干戈未息豈可復出師西方今波斯王卒其子泥洹師為質在京師宜遣使者送歸國道過二虜以便宜取之可不血刃而擒也上從之命行儉冊立波斯王仍為安撫大食使行儉奏肅州刺史王方翼以為己副仍令檢校安西都護永淳元年春二月西突厥阿史那車薄帥十姓反三月以裴行儉帥右金吾將軍閻懷旦等三總管分道討西突厥師未行行儉薨夏四月阿史那車薄圍弓月城安西都護王方翼引軍救之破虜衆於伊麗水斬首千餘級俄而三姓咽麵與車薄合兵拒方翼方翼與戰於熱海流矢貫方翼臂方翼以佩刀截之左右不知所將胡兵謀執方翼以應車薄方翼知之悉召㑹議陽出軍資賜之以次引出斬之㑹大風方翼振金鼓以亂其聲誅七十餘人其徒莫之覺既而分遣禆將襲車薄咽麵大破之擒其酋長三百人西突厥遂平閻懷旦等竟不行方翼尋遷夏州都督徴入議邊事上見方翼衣有血漬問之方翼具對熱海苦戰之狀上視瘡歎息竟以廢后近屬不得用而歸則天皇后垂拱元年𥘉西突厥興昔亡繼往絶可汗既死十姓無主部落多散亡太后乃擢興昔亡之子左豹韜衛翊府中郎將元慶為左玉鈐衛將軍兼崑陵都護襲興昔亡可汗押五咄陸部落二年秋九月丁未以西突厥繼往絶可汗之子斛瑟羅為右玉鈐衛將軍襲繼往絶可汗押五弩失畢部落天授元年西突厥十姓自垂拱以來為東突厥所侵掠散亡略盡濛池都護繼往絶可汗斛瑟羅收其餘衆六七萬人入居內地拜左衛大將軍改號竭忠事主可汗聖曆二年秋八月癸巳突騎施烏質勒遣其子遮弩入見遣侍御史元城解琬安撫烏質勒及十姓部落久視元年以西突厥竭忠事主可汗斛瑟羅為平西軍大總管鎮碎葉長安三年西突厥可汗斛瑟羅用刑殘酷諸部不服烏質勒本隸斛瑟羅號莫賀逹干能撫其衆諸部歸之斛瑟羅不能制烏質勒置都督二十貟各將兵七千人屯碎葉西北後攻陷碎葉徙其牙帳居之斛瑟羅部衆離散因入朝不敢復還烏質勒悉併其地四年春正月冊拜阿史那懷道為西突厥十姓可汗羅子也懷道斛瑟中宗神龍二年閏正月甲戌以突騎酋長烏質勒為懷德郡王冬十二月安西大都護郭元振詣突騎施烏質勒牙帳議軍事天大風雪元振立於帳前與烏質勒語久之雪深元振不移足烏質勒老不勝寒㑹罷而卒其子娑葛勒兵將攻元振副使御史中丞解琬知之勸元振夜逃去元振曰吾以誠心待人何所疑懼且深在冦庭逃將安適安卧不動明旦入哭甚哀婆葛感其義待元振如𥘉戊戌以婆葛襲嗢鹿州都督懷德王景龍二年冬十一月庚申突騎施酋長婆葛自立為可汗殺唐使者御史中丞馮嘉賔遣其弟遮弩等帥衆犯塞𥘉娑葛既代烏質勒統衆父時故將闕啜忠節不服數相攻擊忠節衆弱不能支金山道行軍總管郭元振奏追忠節入朝宿衛忠節行至播仙城經略使右威衛將軍周以悌說之曰國家不愛髙官顯爵以待君者以君有部落之衆故也今脫身入朝一老胡耳豈惟不保寵祿死生亦制於人手方今宰相宗楚客紀處納用事不若厚賂二公請留不行發安西兵及引吐蕃以擊娑葛求阿史那獻為可汗以招十姓使郭䖍瓘發拔汗那兵以自助既不失部落又得報仇比於入朝豈可同日語哉郭䖍瓘者歷城人時為西邊將忠節然其言遣間使賂楚客處訥請如以悌之䇿元振聞其謀上疏以為往歲吐蕃所以犯邊正為求十姓四鎮之地不獲故耳比者息兵請和非能慕悅中國之禮義也直以國多內難人畜疫癘恐中國乘其弊故且屈志求自昵使其國小安豈能忘取十姓四鎮之地哉今忠節不論國家大計直欲為吐蕃鄉導恐四鎮危機將從此始頃緣默啜慿陵所應者多兼四鎮兵疲弊勢未能為忠節經略非憐突騎施也忠節不體國家中外之意而更求吐蕃吐蕃得志則忠節在其掌握豈得復事唐也往年吐蕃無恩於中國猶欲求十姓四鎮之地今若破娑葛有功請分于闐踈勒不知以何理抑之又其所部諸蠻及娑羅門等方不服若借唐兵助討之亦不知以何詞拒之是以古之智者皆不願受夷狄之惠蓋豫憂其求請無厭終為後患故也又彼請阿史那獻者豈非以獻為可汗子孫欲依之以招懷十姓乎按獻父元慶叔父僕羅兄俀子及斛瑟羅懷道等皆可汗子孫也往者唐及吐蕃遍曽立之以為可汗欲以招撫十姓皆不能致尋自破滅何則此屬非有過人之才恩威不足以動衆雖復可汗舊種衆心終不親附况獻又踈逺於其父兄乎若使忠節兵力自能誘脅十姓則不必求立可汗子孫也又欲令郭䖍瓘入拔汗那發其兵䖍瓘前此已嘗與忠節擅入拔汗那發兵不能得其片甲匹馬而拔汗那不勝侵擾南引吐蕃奉俀子還侵四鎮時拔汗那四旁無彊寇為援䖍瓘等恣為侵掠如獨行無人之境猶引俀子為患今北有娑葛急則與之并力內則諸胡堅壁拒守外則突厥伺隙邀遮臣料䖍瓘等此行必不能如往年之得志內外受敵自啖危亡徒與虜結隙令四鎮不安以臣愚揣之實為非計楚客等不從建議遣馮嘉賔持節安撫忠節侍御史呂守素處置四鎮以將軍牛師奬為安西副都護發甘凉以西兵兼徴吐蕃以討娑葛娑葛遣使娑臘獻馬在京師聞其謀馳還報婆葛於是娑葛發五千騎出安西五千騎出撥换五千騎出焉耆五千騎出踈勒入寇元振在踈勒柵於河口不敢出忠節逆嘉賓於計舒河口娑葛遣兵襲之生擒忠節殺嘉賔擒吕守素於僻城縳於驛柱冎而殺之癸未牛師奬與突騎施娑葛戰于火燒城師奬兵敗沒娑葛遂陷安西斷四鎮路遣使上表求宗楚客頭楚客又奏以周以悌代郭元振統衆徴元振入朝以阿史那獻為十姓可汗置軍焉耆以討娑葛娑葛遺元振書稱我與唐𥘉無惡但讎闕啜宗尚書受闕啜金欲枉破奴部落馮中丞牛都護相繼而來奴豈得坐而待死又聞史獻欲來徒擾軍州恐未有寧日乞大使商量處置元振奏娑葛書楚客怒奏言元振有異圖召將罪之元振使其子鴻間道具奏其狀乞留定西土不敢歸周以悌竟坐流白州復以元振代以悌赦娑葛罪冊為十四姓可汗三年秋七月突騎施娑葛遣使請降庚辰拜欽化可汗賜各守忠睿宗景雲二年冬十二月癸卯以興昔亡可汗阿史那獻為招慰十姓使玄宗開元二年西突厥十姓酋長都擔叛三月己亥磧西節度使阿史那獻克碎葉等鎮擒都擔降其部落二萬餘帳突騎施可汗守忠之弟遮弩恨所分部落少於其兄遂叛入突厥請為鄉道以伐守忠默啜遣兵二萬擊守忠虜之而還謂遮弩曰汝叛其兄何有於我遂并殺之三年突騎施守忠既死默啜兵還守忠部將蘇祿鳩集餘衆為之酋長蘇祿頗善綏撫十姓部落稍稍歸之有衆二十萬遂據有西方尋遣使入見是歲以蘇祿為左羽林大將軍金方道經略大使四年突騎施蘇祿復自立為可汗五年突騎施酋長左羽林大將軍蘇祿部衆浸博雖職貢不乏隂有窺邊之志五月十姓可汗阿史那獻欲發葛邏祿兵擊之上不許秋七月安西副大都護湯嘉惠奏突騎施引大食吐蕃謀取四鎮圍鉢換及大石城已發三姓葛邏祿兵與阿史那獻擊之六年夏五月辛亥以突騎施都督蘇祿為左羽林大將軍順國公充金方道經略大使七年冬十月壬子冊拜突騎施蘇祿為忠順可汗十年冬十二月庚子以十姓可汗阿史那懷道女為交河公主嫁突騎施可汗蘇祿十四年杜暹為安西都護突騎施交河公主遣牙官以馬千匹詣安西玄市使者宣公主教暹怒曰阿史那女何得宣教於我杖其使者留不遣馬經雪死盡突騎施可汗蘇祿大怒發兵寇四鎮㑹暹入朝趙頥貞代為安西都護嬰城自守四鎮人畜儲積皆為蘇祿所掠安西僅存既而蘇祿聞暹入相稍引退尋遣使入貢十八年突騎施遣使入貢上宴之於丹鳯樓突厥使者豫焉二使爭長突厥曰突騎施小國本突厥之臣不可居我上突騎施曰今日之宴為我設也我不可以居其下上乃命設東西幕突厥在東突騎施在西二十三年冬十月戊申突騎施寇北庭及安西撥换城二十四年春正月北庭都護蓋嘉運擊突騎施大破之秋八月甲寅突騎施遣其大臣胡祿逹干求請降許之二十六年突騎施可汗蘇祿素廉儉每攻戰所得輒與諸部分之不留私蓄由是衆樂為用既尚唐公主又潜通突厥及吐蕃突厥吐蕃各以女妻之蘇祿以三國女為可敦又立數子為葉䭦用度浸廣由是攻戰所得不復更分晚年病風一手攣縮諸部離心酋長莫賀達干都摩度兩部最彊其部落又分為黃姓黑姓互相乖阻於是莫賀逹干勒兵夜襲蘇祿殺之都摩度𥘉與莫賀逹干連謀既而復與之異立蘇祿之子骨啜為吐火仙可汗以收其餘衆與莫賀逹干相攻莫賀逹干遣使告磧西節度使蓋嘉運上命嘉運招集突騎施拔汗那以西諸國吐火仙與都摩度據碎葉城黑姓可汗爾微特勒據怛邏斯城相與連兵以拒唐二十七年秋八月乙亥磧西節度使蓋嘉運擒突騎施可汗吐火仙嘉運攻碎葉城吐火仙出戰敗走擒之於賀邏嶺分遣踈勒鎮守使夫蒙靈察與拔汗那王阿悉爛逹干潜引兵突入怛邏斯城擒黑姓可汗爾微遂入曵建城取交河公主悉收散髮之民數萬以與拔汗那王威震西陲九月戊午處木昆鼠尼施弓月等諸部先隸突騎施者皆帥衆內附仍請徙居安西管內二十八年春三月甲寅蓋嘉運入獻捷上赦吐火仙罪以為左金吾大將軍嘉運請立阿史那懷道之子昕為十姓可汗從之夏四月辛未以昕妻李氏為交河公主冬十一月突騎施莫賀逹干聞阿史那昕為可汗怒曰首誅蘇祿我之謀也今立史昕何以賞我遂帥諸部叛上乃立莫賀逹干為可汗使統突騎施之衆命蓋嘉運招諭之十二月乙卯莫賀逹干降天寶元年夏四月上發兵納十姓可汗阿史那昕於突騎施至俱蘭城為莫賀逹干所殺突騎施大纛官都摩度來降六月乙未冊都摩度為三姓葉護三載夏五月河西節度使夫蒙靈察討突騎施莫賀逹干斬之更請立黑姓伊里底蜜施骨咄祿毗伽六月甲辰冊拜骨咄祿毗伽為十姓可汗八載秋七月冊突騎施移撥為十姓可汗十二載秋九月甲辰以突騎施黑姓可汗登里伊羅密施為突騎施可汗太宗討龜兹唐太宗貞觀二十一年冬十二月龜兹王伐疊卒弟訶黎布失畢立浸失臣禮侵漁鄰國上怒戌寅詔使持節崑兵道行軍大總管左驍衛大將軍阿史那社爾副大總管左驍衛大將軍契苾何力安西都護郭孝恪等將兵擊之仍命鐡勒十三州突厥吐蕃吐谷渾連兵進討二十二年春三月甲午上謂侍臣曰朕少長兵閒頗能料敵今崑丘行師處月處密二部及龜兹用事者羯獵顚那科每懷首鼠必先授首弩失畢其次也秋七月庚寅西突厥相屈利啜請帥所部從討龜兹阿史那社爾引兵自焉耆之西趨龜兹北境分兵為五道出其不意焉耆王薛婆阿那支棄城奔龜兹保其東境社爾遣兵追擊擒而斬之立其從父弟先那準為焉耆王使修職貢龜兹大震守將多棄城走社爾進屯磧口去其都城三百里遣伊州刺史韓威帥千餘騎為前鋒左衛將軍曹繼叔次之至多褐城龜兹王訶利布失畢其相那利羯獵顛師衆五萬拒戰鋒刃甫接威引兵僞遁龜兹悉衆追之行三十里與繼叔軍合龜兹懼將却繼叔乘之龜兹大敗逐北八十里龜兹王布失畢既敗走保都城河史那社爾進軍逼之布失畢輕騎西走社爾拔其城使安西都護郭孝恪守之沙州刺史蘇海政尚輦奉御薛萬備帥精騎追布失畢行六百里布失畢窘急保撥换城社爾進軍攻之四旬閏月丁丑拔之擒布失畢及羯獵顚那利脫身走潜引西突厥之衆并其國兵萬餘人襲擊孝恪孝恪營於城外龜兹人或告之孝恪不以為意那利奄至孝恪帥所部千餘人將入城那利之衆已登城矣城中降胡與之相應兵擊孝恪矢刃如雨孝恪不能敵將復出死于西門城中大擾倉部郎中崔義超召募得二百人衛軍資財物與龜兹戰於城中曹繼叔韓威亦營於城外自城西北隅擊之那利經宿乃退斬首三千餘級城中始定後旬餘日那利復引山北龜兹萬餘人趣都城繼叔逆擊大破之斬首八千級那利單騎走龜兹人執之以詣軍門阿史那社爾前後破其大城五遣左衛郎將權祗甫詣城開示禍福皆相帥請降凡得七百餘城虜男女數萬口社爾乃召其父老宣國威靈諭以伐罪之意立其王之弟葉護為主龜兹人大喜西域震駭西突厥于闐安國爭饋駝馬軍糧社爾勒石紀功而還二十三年春正月辛亥龜兹王布失畢及其相那利等至京師上責讓而釋之以布失畢為左武衛中郎將髙宗永徽元年𥘉阿史那社爾虜龜兹王布失畢立其弟為王唐兵既還其酋長爭立更相攻擊秋八月壬午詔復以布失畢為龜兹王遣歸國撫其衆顯慶元年秋八月乙巳龜兹王布失畢入朝三年𥘉龜兹王布失畢妻阿史那氏與其相那利私通布失畢不能禁由是君臣猜阻各有黨與互來告難上兩召之既至囚那利遣左領軍郎將雷文成送布失畢歸國至龜兹東境泥師城龜兹大將羯獵顚發衆拒之仍遣使降於西突厥沙鉢羅可汗布失畢據城自守不敢進詔左屯衛大將軍楊胄發兵討之會布失畢病卒胄與羯獵顚戰大破之擒羯獵顚及其黨盡誅之乃以其地為龜兹都督府春正月戊申立布失畢之子素稽為龜兹王兼都督夏五月癸未徙安西都護府於龜兹以舊安西復為西州都督府鎮髙昌故地太宗平髙昌唐髙祖武德二年髙昌王麴伯雅遣使入貢六年麴伯雅卒子文泰立太宗貞觀四年冬十二月甲寅髙昌王麴文泰入朝西域諸國咸欲因文泰遣使入貢上遣文泰之臣厭怛紇干往迎之魏徴諌曰昔光武不聽西域送侍子置都護以為不以蠻夷勞中國今天下𥘉定前者文泰之來所過勞費已甚今借使十國入貢其徒旅不减千人邊民荒耗將不勝其弊若聽其商賈往來與邊民交市則可矣儻以賔客遇之非中國之利也時厭怛紇干已行上遽令止之五年春正月癸酉上大獵於昆明池四夷君長咸從甲戌宴髙昌王文泰及羣臣丙子還宫親獻禽於大安宫六年秋七月丙辰焉耆王突騎支遣使入貢𥘉焉耆入中國由磧路隋末閉寒道由髙昌突騎支請復開磧路以便往來上許之由是髙昌恨之遣兵襲焉耆大掠而去十三年髙昌王麴文泰多遏絶西域朝貢伊吾先臣西突厥既而內屬文泰與西突厥共擊之上下書切責徴其大臣阿史那矩欲與議事文泰不遣遣其長史麴雍來謝罪頡利之亡也中國人在突厥者或奔髙昌詔文泰歸之文泰蔽匿不遣又與西突厥共擊破焉耆焉耆訴之上遣虞部郎中李道𥙿往問狀且謂其使者曰髙昌數年以來朝貢脫略無藩臣禮所置官號皆凖天朝築城掘溝預僃攻討我使者至彼文泰語之云鷹飛于天雉伏于蒿猫遊于堂鼠噍于穴各得其所豈不能自生邪又遣使謂薛延陀云既為可汗則與天子匹敵何為拜其使者事人無禮又間鄰國為惡不誅善何以勸明年當發兵擊汝三月薛延陀可汗遣使上言奴受恩思報請發所部為軍導以擊髙昌上遣民部尚書唐儉右領軍大將軍執失思力齎繒帛賜薛延陀與謀進取上猶冀髙昌王文泰悔過復下璽書示以禍福徴之入朝文泰竟稱疾不至十二月壬申遣交河行軍大總管吏部尚書侯君集副總管兼左屯衛大將軍薛萬均等將兵擊之十四年髙昌王文泰聞唐兵起謂其國人曰唐去我七千里沙磧居其二千里地無水草寒風如刀熱風如燒安能致大軍乎往吾入朝見秦隴之北城邑蕭條非復有隋之比今來伐我發兵則糧運不給三萬已下吾力能制之當以逸待勞坐收其弊若頓兵城下不過二十日食盡必走然後從而虜之何足憂也及聞唐兵臨磧口憂懼不知所為發疾卒子智盛立軍至栁谷詗者言文泰刻日將葬國人咸集於彼諸將請襲之侯君集曰不可天子以髙昌無禮故使吾討之今襲人於墟墓之間非問罪之師也於是鼓行而進至田城諭之不下詰朝攻之及午而克虜男女七千餘口以中郎將辛獠兒為前鋒夜趨其都城髙昌逆戰而敗大軍繼至抵其城下智盛致書於君集曰得罪於天子者先王也天罰所加身已物故智盛襲位未幾惟尚書憐察君集報曰苟能悔過當束手軍門智盛猶不出君集命填塹攻之飛石雨下城中人皆室處又為巢車髙十丈俯瞰城中有行人及飛石所中皆唱言之先是文泰與西突厥可汗相結約有急相助可汗遣其葉護屯可汗浮圖城為文泰聲援及君集至可汗懼而西走千餘里葉護以城降智盛窮蹙秋八月癸酉開門出降君集分兵略地下其二十二城戶八千四十六口一萬七千七百地東西八百里南北五百里上欲以髙昌為州縣魏徴諌曰陛下𥘉即位文泰夫婦首朝其後稍驕倨故王誅加之罪止文泰可矣宜撫其百姓存其社稷復立其子則威德𬒳於遐荒四夷皆恱服矣今若利其土地以為州縣則常須千餘人鎮守數年一易往來死者什有三四供辦衣資違離親戚十年之後隴右虛耗矣陛下終不得髙昌撮粟尺帛以佐中國所謂散有用以事無用臣未見其可上不從九月以其地為西州以可汗浮圖城為庭州各置屬縣乙卯置安西都護府於交河城留兵鎮之君集虜髙昌王智盛及其羣臣豪傑而還於是唐地東極于海西至焉耆南盡林邑北抵大漠皆為州縣凡東西九千五百一十里南北一萬九百一十八里矦君集之討髙昌也遣使約焉耆與之合勢焉耆喜聽命及髙昌王破焉耆王詣軍門謁見君集且言焉耆三城先為髙昌所奪君集奏并髙昌所掠焉耆民悉歸之冬十二月丁酉矦君集獻俘于觀德殿行飲至禮大酺三日尋以智盛為左武衛將軍金城郡公上得髙昌樂工以付太常增九部樂為十部君集之破髙昌也私取其珍寶將士知之競為盜竊君集不能禁為有司所劾詔丁君集獄中書侍郎岑文本上疏以為髙昌昏迷陛下命君集等討而克之不踰旬日並付大理雖君集等自挂網羅恐海內之人疑陛下唯録其過而遺其功也臣聞命將出師主於克敵苟能克敵雖貪可賞若其敗績雖廉可誅是以漢之李廣利陳湯晉之王濬隋之韓擒虎皆負罪譴人主以其有功咸受封賞由是觀之將帥之臣廉愼者寡貪求者衆是以黃石公軍勢曰使智使勇使貪使愚故智者樂立其功勇者好行其志貪者急趨其利愚者不計其死伏願録其微勞忘其大過使君集重升朝列復備驅馳雖非清貞乏臣猶得貪愚之將斯則陛下雖屈法而德彌顯君集等雖䝉宥而過更彰矣上乃釋之又有告薛萬均私通髙昌婦女者萬均不服內出髙昌婦女付大理與萬均對辨魏徵諫曰臣聞君使臣以禮臣事君以忠今遣大將軍與亡國婦女對辨帷箔之私實則所得者輕虛則所失者重昔秦穆飲盜馬之士楚莊赦絶纓之罪况陛下道髙堯舜而曽二君之不逮乎上遽釋之侯君集馬病蚛顙行軍總管趙元楷親以指霑其膿而嗅之御史劾奏其諂左遷括州刺史髙昌之平也諸將皆即受賞行軍總管阿史那社爾以無敕㫖獨不受及别敕既下乃受之所取唯老弱救弊而已上嘉其廉愼以髙昌所得寶刀及雜綵千段賜之太宗平吐谷渾唐髙祖武德二年𥘉隋煬帝自征吐谷渾吐谷渾可汗伏允以數千騎奔党項煬帝立其質子順為主使統餘衆不果入而還會中國喪亂伏允復還收其故地上受禪順自江都還長安上遣使與伏允連和使擊李軌以順還之伏允喜起兵擊軌數遣使入請順上遣之太宗貞觀八年𥘉吐谷渾可汗伏允遣使入貢未返大掠鄯州而去上遣使讓之徴伏允入朝稱疾不至仍為其子尊王求昏上許之令其親迎尊王又不至乃絶昏伏允復遣兵寇蘭廓二州伏允年老信其臣天柱王之謀數犯邊又執唐使者趙德楷上遣使諭之十返又引其使者臨軒親諭以禍福伏允終無悛心六月遣左驍衛大將軍段志玄為西海道行軍總管左驍衛將軍樊興為赤水道行軍總管將邊兵及契苾党項之衆以擊之冬十月辛丑段志玄擊吐谷渾破之追奔八百餘里去青海三十餘里吐谷渾驅牧馬而遁十一月丁亥吐谷渾寇涼州己丑下詔大舉討吐谷渾上欲得李靖為將為其老重勞之靖聞之請行上大恱十二月辛丑以靖為西海道行軍大總管節度諸軍兵部尚書侯君集為磧石道刑部尚書任城王道宗為鄯善道凉州都督李大亮為且末道岷州都督李道彥為赤水道利州刺史髙甑生為鹽澤道行軍總管并突厥契苾之衆擊吐谷渾九年春正月党項先內屬者皆叛歸吐谷渾三月庚辰洮州羌叛入吐谷渾殺刺史孔長秀夏閏四月癸酉任城王道宗敗吐谷渾於庫山吐谷渾可汗伏允悉燒野草輕兵走入磧諸將以為馬無草疲瘦未可深入侯君集曰不然嚮者段志玄軍還才及鄯州虜已至其城下蓋虜猶完實衆為之用故也今一敗之後鼠逃鳥散斥候亦絶君臣攜離父子相失取之易於拾芥此而不乘後必悔之李靖從之中分其軍為兩道靖與薛萬均李大亮由北道君集與任城王道宗由南道戊子靖部將薛孤兒敗吐谷渾於曼頭山斬其名王大獲雜畜以充軍食癸巳靖等敗吐谷渾於牛心堆又敗諸赤水原侯君集任城王道宗引兵行無人之境二千餘里盛夏降霜經破邏真谷其地無水人齕氷馬噉雪五月追及伏允於烏海與戰大破之獲其名王薛萬均薛萬徹又敗天柱王於赤海赤水之戰薛萬均薛萬徹輕騎先進為吐谷渾所圍兄弟皆中槍失馬步鬪從騎死者什六七左領軍將軍契苾何力將數百騎救之竭力奮擊所向披靡萬均萬徹由是得免李大亮敗吐谷渾於蜀渾山獲其名王二十人將軍執失思力敗吐谷渾於合茹川李靖督諸軍經積石山河源至且末窮其西境聞伏允在突倫川將奔于闐契苾何力欲追襲之薛萬均懲其前敗固言不可何力曰虜非有城郭隨水草遷徙若不因其聚居襲取之一朝雲散豈得復傾其巢穴邪自選驍騎千餘直趣突倫川萬均乃引兵從之磧中乏水將士刺馬血飲之襲破伏允牙帳斬首數千級獲雜畜二十餘萬伏允脫身走俘其妻子侯君集等進逾星宿川至柏海還與李靖軍合大寧王順隋氏之甥伏允之嫡子也為侍子於隋久不得歸伏允立它子為太子及歸意常怏怏會李靖破其國國人窮蹙怨天柱王順因衆心斬天柱王舉國請降伏允帥千餘騎逃磧中十餘日衆散稍盡為左右所殺國人立順為可汗壬子李靖奏平吐谷渾乙卯詔復其國以慕容順為西平郡王趉故吕烏甘豆可汗上慮順未能服其衆仍命李大亮將精兵數千為其聲援吐谷渾甘豆可汗久質中國國人不附竟為其下所殺子燕王諾曷鉢立諾曷鉢幼大臣爭權國中大亂十二月詔兵部尚書侯君集等將兵援之先遣使者諭解有不奉詔者隨宜討之十年春三月丁酉吐谷渾王諾曷鉢遣使請頒曆行年號遣子弟入侍並從之丁未以諾曷鉢為河源郡王烏地也拔勒豆可汗十三年冬十二月己丑吐谷渾王諾曷鉢來朝以宗女為弘化公主妻之十五年夏四月丁巳果毅都尉席君買帥精兵百二十襲擊吐谷渾丞相宣王破之斬其兄弟三人𥘉丞相宣王專國政隂謀襲弘化公主劫其王諾曷鉢奔吐蕃諾曷鉢聞之輕騎奔鄯善城其臣威信王以兵逆之故君買為之討誅宣王國人猶驚擾遣戶部尚書唐儉等慰撫之通鑑紀事本末卷第二十八
