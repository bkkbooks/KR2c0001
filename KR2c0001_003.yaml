body:
  text: 漢通西南夷漢武帝元光五年初王恢之討東越也使番陽令唐蒙風曉南越南越食蒙以蜀枸醬蒙問所從來曰道西北牂柯江牂柯江廣數里出番禺城下蒙歸至長安問蜀賈人賈人曰獨蜀出枸醬多持竊出市夜郎夜郎者臨牂柯江江廣百餘步足以行船南越以財物役屬夜郎西至桐師然亦不能臣使也蒙乃上書説上曰南越王黃屋左纛地東西萬餘里名為外臣實一州主也今以長沙豫章往水道多絶難行竊聞夜郎所有精兵可得十餘萬浮船牂柯江出其不意此制越一竒也誠以漢之強巴蜀之饒通夜郎道為置吏甚易上許之乃拜蒙為中郎將將千人食重萬餘人從巴蜀筰關入遂見夜郎侯多同蒙厚賜喻以威德約為置吏使其子為令夜郎旁小邑皆貪漢繒帛以為漢道險終不能有也乃且聼蒙約還報上以為犍為郡發巴蜀卒治道自僰道指牂柯江作者數萬人士卒多物故有逃亡者用軍興法誅其渠率巴蜀民大驚恐上聞之使司馬相如責唐蒙等因諭告巴蜀民以非上意相如還報是時邛筰之君長聞南夷與漢通得賞賜多多欲願為內臣妾請吏比南夷天子問相如相如曰邛筰冉駹者近蜀道亦易通秦時嘗通為郡縣至漢興而罷今誠復通為置郡縣愈於南夷天子以為然乃拜相如為中郎將建節往使及副使王然于等乘傳因巴蜀吏幣物以賂西夷邛筰冉駹斯榆之君皆請為內臣除邊關關益斥西至沫若水南至牂柯為徼通零關道橋孫水以通邛都為置一都尉十餘縣屬蜀天子大説是時巴蜀四郡鑿山通西南夷道千餘里戍轉相餉數嵗道不通士罷餓離暑濕死者甚衆西南夷又數反發兵興擊費以巨萬計而無功上患之詔使公孫弘視焉還奏事盛毁西南夷無所用上不聼元朔三年冬以公孫弘為御史大夫是時方通西南夷東置蒼海北築朔方之郡公孫弘數諌以為罷敝中國以奉無用之地願罷之天子使朱買臣等難以置朔方之便發十策弘不得一弘乃謝曰山東鄙人不知其便若是願罷西南夷蒼海而專奉朔方上乃許之春罷蒼海郡秋罷西夷獨置南夷夜郎兩縣一都尉稍令犍為自葆就專力城朔方元狩元年初張騫自月氏還為天子言身毒國去蜀不逺天子欣然令騫因蜀犍為發間使王然于等四道並出出駹出冉出徙出卭僰指求身毒國各行一二千里其北方閉氏筰南方閉嶲昆明昆明之屬無君長善寇盜輒殺略漢使終莫得通於是漢以求身毒道始通滇國滇王當羌謂漢使者曰漢孰與我大及夜郎侯亦然以道不通故各自以為一州主不知漢廣大使者還因盛言滇大國足事親附天子注意焉乃復事西南夷三年秋上將討昆明以昆明有滇池方三百里乃作昆明池以習水戰是時法既益嚴吏多廢免兵革數動民多買復及五大夫徴發之士益鮮於是除千夫五大夫為吏不欲者出馬以故吏弄法皆謫令伐棘上林穿昆明池元鼎六年冬馳義侯發南夷兵欲以擊南越且蘭君恐逺行旁國虜其老弱乃與其衆反殺使者及犍為太守漢乃發巴蜀罪人當擊南越者八校尉遣中郎將郭昌衛廣將而擊之誅且蘭及邛君筰侯遂平南夷為牂柯郡夜郎侯始倚南越南越已滅夜郎遂入朝上以為夜郎王冉駹皆振恐請臣置吏乃以邛都為越嶲郡筰都為沈黎郡冉駹為汶山郡廣漢西白馬為武都郡元封二年初上使王然于以越破及誅南夷兵威風喻滇王入朝滇王者其衆數萬人其旁東北有勞深靡莫皆同姓相仗未肯聼勞深靡莫數侵犯使者吏卒於是上遣將軍郭昌中郎將衛廣發巴蜀兵擊滅勞深靡莫以兵臨滇滇王舉國降請置吏入朝於是以為益州郡賜滇王王印復長其民是時漢滅兩越平西南夷置初郡十七且以其故俗治母賦稅南陽漢中以往郡各以地比給初郡吏卒奉食幣物傳車馬被具而初郡時時小反殺吏漢發南方吏卒往誅之間嵗萬餘人費皆仰給大農大農以均輸調鹽鐡助賦故能贍之然兵所過縣為以訾給毋乏而已不敢言擅賦法矣六年漢既通西南夷開五郡欲地接以前通大夏嵗遣使十餘輩出此初郡皆閉昆明為所殺奪幣物於是天子赦京師亡命令從軍遣拔胡將軍郭昌將以擊之斬首數十萬後復遣使竟不得通昭帝始元元年夏益州夷二十四邑三萬餘人皆反遣水衡都尉吕破胡募吏民及發犍為蜀郡奔命往擊大破之四年西南夷姑繒葉榆復反遣水衡都尉吕辟胡將益州兵擊之辟胡不進蠻夷遂殺益州太守乘勝與辟胡戰士戰及溺死者四千餘人冬遣大鴻臚田廣明擊之六年詔以鉤町侯母波率其邑君長人民擊反者有功立以為鉤町王賜田廣明爵關內侯淮南謀反漢文帝前三年初趙王敖獻美人於髙祖得幸有娠及貫高事發美人以坐繫河內美人母弟趙兼因辟陽侯審食其言吕后吕后妬弗肯白美人已生子恚即自殺吏奉其子詣上上悔名之曰長令吕后母之而葬其母真定後封長為淮南王淮南王蚤失母常附吕后故孝惠吕后時無患而常心怨辟陽侯以為不強爭之於吕后使其母恨而死也及帝即位淮南王自以最親驕蹇數不奉法上常寬假之是歲入朝從上入苑囿獵與上同車常謂上大兄王有材力能扛鼎乃往見辟陽侯自袖鐡椎椎辟陽侯令從者魏敬剄之馳走闕下肉袒謝罪帝傷其志為親故赦弗治當是時薄太后及太子諸大臣皆憚淮南王淮南王以此歸國益驕恣出入稱警蹕稱制擬於天子袁盎諌曰諸侯太驕必生患上不聼六年淮南王長自作法令行於其國逐漢所置吏請自置相二千石帝曲意從之又擅刑殺不辜及爵人至關內侯數上書不遜順帝重自切責之乃令薄昭與書風諭之引管蔡及代頃王濟北王興居以為警戒王不説令大夫但士伍開章等七十人與棘蒲侯柴武太子竒謀以輦車四十乘反谷口令人使閩越胸奴事覺有司治之使使召淮南王王至長安丞相張蒼典客馮敬行御史大夫事與宗正廷尉奏長罪當棄市制曰其赦長死罪廢勿王徙處蜀郡嚴道邛郵盡誅所與謀者載長以輜車令縣以次傳之袁盎諫曰上素驕淮南王弗為置嚴傳相以故至此淮南王為人剛今暴摧折之臣恐卒逢霧露病死陛下有殺弟之名奈何上曰吾特苦之耳令復之淮南王果憤恚不食死縣傳至雍雍令發封以死聞上哭甚悲謂袁盎曰吾不聼公言卒亡淮南王今為奈何盎曰獨斬丞相御史以謝天下乃可上即令丞相御史逮考諸縣傳送淮南王不發封餽侍者皆棄市以列侯葬淮南王於雍置守冡三十戶七年民有歌淮南王曰一尺布尚可縫一斗粟尚可舂兄弟二人不相容帝聞而病之八年夏封淮南厲王子安等四人為列侯賈誼知上必將復王之也上疏諫曰淮南王之悖逆無道天下孰不知其罪陛下幸而赦遷之自疾而死天下孰以王死之不當今奉尊罪人之子適足以負謗於天下耳此人少壯豈能忘其父哉白公勝所為父報仇者大父與叔父也白公為亂非欲取國代主發忿快志剡手以衝仇人之胸固為俱靡而已淮南雖小黥布嘗用之矣漢存特幸耳夫擅仇人足以危漢之資於策不便豫之衆積之財此非有子胥白公報於廣都之中即疑有剸諸荆軻起於兩柱之間所謂假賊兵為虎翼者也願陛下少留計上弗聼十一年夏六月徙城陽王喜為淮南王十六年夏四月徙淮南王喜復為城陽王立淮南厲王子阜陵侯安為淮南王景帝前四年初七國反淮南王欲發兵應之其相將兵城守不聼王而為漢淮南以故得完叛之武帝建元二年冬十月淮南王安來朝上以安屬為諸父而材高甚尊重之每宴見談語昏暮然後罷安雅善武安侯田蚡其入朝武安侯迎之霸上與語曰上無太子王親高皇帝孫行仁義天下莫不聞宫車一日宴駕非王尚誰立者安大喜厚遺蚡金錢財物元朔二年冬賜淮南王几杖毋朝五年初淮南王安好讀書屬文喜立名譽招致賔客方術之士數千人其羣臣賔客多江淮間輕薄士常以厲王遷死感激安建元六年彗星見或説王曰先吳軍時彗星出長數尺然尚流血千里今彗星竟天天下兵當大起王心以為然乃益治攻戰具積金錢郎中雷被獲罪於太子遷時有詔欲從軍者輒詣長安被即願奮擊胸奴太子惡被於王斥免之欲以禁後是嵗被亡之長安上書自明事下廷尉治蹤迹連王公卿請逮捕治王太子遷謀令人衣衛士衣持戟居王旁漢使有非是者即刺殺之因發兵反天子使中尉宏即訊王王視中尉顔色和遂不發公卿奏安壅閼奮擊胸奴者格明詔當棄市詔削二縣既而安自傷曰吾行仁義反見削地恥之於是為反謀益甚安與衡山王賜相責望禮節間不相能衡山王聞淮南王有反謀恐為所并亦結賔客為反具以為淮南已西欲發兵定江淮之間而有之衡山王后徐來讃太子爽於王欲廢之而立其弟孝王囚太子而佩孝以王印令招致賔客賔客來者微知淮南衡山有逆計日夜從容勸之王乃使孝客江都人枚赫陳喜作輣車煆矢刻天子璽將相軍吏印秋衡山王當入朝過淮南淮南王乃昆弟語除前隙約束反具衡山王即上書謝病上賜書不朝元狩元年淮南王安與賔客左吳等日夜為反謀案輿地圖部署兵所從入諸使者道長安來為妄言言上無男漢不治即喜即言漢廷治有男王怒以為妄言非也王召中郎伍被與謀反事被曰王安得此亡國之語乎臣見宫中生荆棘露霑衣也王怒繫伍被父母囚之三月復召問之被曰昔秦為無道窮奢極虐百姓思亂者十家而六七高皇帝起於行陳之中立為天子此所謂蹈瑕候間因秦之亡而動者也今大王見高皇帝得天下之易也獨不觀近世之吳楚乎夫吳王王四郡國富民衆計定謀成舉兵而西然破於大梁奔走而東身死祀絶者何誠逆天道而不知時也方今大王之兵衆不能十分吳楚之一天下安寧萬倍吳楚之時大王不從臣之計今見大王棄千乘之君賜絶命之書為羣臣先死於東宫也王涕泣而起王有孽子不害最長王弗愛王后太子皆不以為子兄數不害有子建材高有氣常怨望太子隂使人告太子謀殺漢中尉事下廷尉治王患之欲發復問伍被曰公以為吳興兵是邪非邪被曰非也臣聞吳王悔之甚願王無為吳王之所悔王曰吳何知反漢將一日過成臯者四十餘人今我絶成臯之口據三川之險招山東之兵舉事如此左吳趙賢朱驕如皆以為什事九成公獨以為有禍無福何也必如公言不可徼幸邪被曰必不得已被有愚計當今諸侯無異心百姓無怨氣可偽為丞相御史請書徙郡國豪桀高資於朔方益發甲卒急其會日又偽為詔獄書逮諸侯太子幸臣如此則民怨諸侯懼即使辨士隨而説之儻可徼幸什得一乎王曰此可也雖然吾以為不至若此於是王乃作皇帝璽丞相御史大夫將軍軍吏中二千石及旁近郡太守都尉印漢使節欲使人偽得罪而西事大將軍一日發兵即刺殺大將軍且曰漢廷大臣獨汲黯好直諫守節死義難惑以非至如説丞相弘等如發蒙振落耳王欲發國中兵恐其相二千石不聼王乃與伍被謀先殺相二千石又欲令人衣求盜衣持羽檄從東方來呼曰南越兵入界欲因以發兵會廷尉逮捕淮南太子淮南王聞之與太子謀召相二千石欲殺而發兵召相相至內史中尉皆不至王念獨殺相無益也即罷相王猶預計未決太子即自剄不殊伍被自詣吏告與淮南王謀反蹤迹如此吏因捕太子王后圍王宫盡求捕王所與謀反賔客在國中者索得反具以聞上下公卿治其黨與使宗正以符節治王未至十一月淮南王安自剄殺王后荼太子遷諸所與謀反者皆族天子以伍被雅辭多引漢之美欲勿誅廷尉湯曰被首為王畫反計罪不可赦乃誅被侍中莊助素與淮南王相結交私論議王厚賂遺助上薄其罪欲勿誅張湯爭以為助出入禁門腹心之臣而外與諸侯交私如此不誅後不可治助竟棄市衡山王上書請廢太子爽立其弟孝為太子爽聞即遣所善白嬴之長安上書言孝作輣車煆矢與王御者姦欲以敗孝會有司捕所與淮南謀反者得陳喜於衡山王子孝家吏劾孝首匿喜孝聞律先自告除其罪即先自告所與謀反者枚赫陳喜等公卿請逮捕衡山王治之王自剄死王后徐來太子爽及孝皆棄市所與謀反者皆族凡淮南衡山二獄所連引列侯二千石豪桀等死者數萬人漢通西域漢武帝元朔三年初胸奴降者言月氏故居敦煌祁連間為強國胸奴冒頃攻破之老上單于殺月氏王以其頭為飲器餘衆遁逃逺去怨胸奴無與共擊之上募能通使月氏者漢中張騫以郎應募出隴西徑胸奴中單于得之留騫十餘歲騫得間亡鄉月氏西走數十日至大宛大宛聞漢之饒財欲通不得見騫喜為發導譯抵康居傳致大月氏大月氏太子為王既擊大夏分其城而居之地肥饒少寇殊無報胡之心騫留歲餘竟不能得月氏要領乃還並南山欲從羌中歸復為胸奴所得留歲餘會伊稚斜逐於單胸奴國內亂騫乃與堂邑氏奴甘父逃歸上拜騫為太中大夫甘父為秦使君騫初行時百餘人去十三歲唯二人得還元狩元年初張騫自月氏還具為天子言西域諸國風俗大宛在漢正西可萬里其俗土著耕田多善馬馬汗血有城郭室屋如中國其東北則烏孫東則于置于置之西則水皆西流注西海其東水東流注鹽澤鹽澤潛行地下其南則河源出焉鹽澤去長安可五千里胸奴右方居鹽澤以東至隴西長城南接羌鬲漢道焉烏孫康居奄蔡大月氏皆行國隨畜牧與胸奴同俗大夏在大宛西南與大宛同俗臣在大夏時見邛竹杖蜀布問曰安得此大夏國人曰吾賈人往市之身毒身毒在大夏東南可數千里其俗土著與大夏同以騫度之大夏去漢萬二千里居漢西南今身毒國又居大夏東南數千里有蜀物此其去蜀不逺矣今使大夏從羌中險羌人惡之少北則為胸奴所得從蜀宜徑又無寇天子既聞大宛及大夏安息之屬皆大國多竒物土著頗與中國同業而兵弱貴漢財物其北有大月氏康居之屬兵強可以賂遺設利朝也誠得而以義屬之則廣地萬里重九譯致殊俗威德遍於四海欣然以騫言為然元鼎二年渾邪王既降漢漢兵擊逐胸奴於幕北自鹽澤以東空無胸奴西域道可通於是張騫建言烏孫王昆莫本為胸奴臣後兵稍強不肯復朝事胸奴胸奴攻不勝而逺之今單于新困於漢而故渾邪地空無人蠻夷俗戀故地又貪漢財物今誠以此時厚幣賂烏孫招以益東居故渾邪之地與漢結昆弟其藝宜聽聽則是斷胸奴右臂也既連烏孫自其西大夏之屬皆可招來而為外臣天子以為然拜騫為中郎將將三百人馬各二匹牛羊以萬數齎金幣帛直數千巨萬多持節副使道可便遣之他旁國騫既至烏孫昆莫見騫禮節甚倨騫諭指曰烏孫能東居故地則漢遣公主為夫人結為兄弟共距胸奴胸奴不足破也烏孫自以逺漢未知其大小素服屬胸奴日久且又近之其大臣皆畏胸奴不欲移徙騫留久之不能得其要領因分遣副使使大宛康居大月氏大夏安息身毒于闐及諸旁國烏孫發譯道送騫還使數十人馬數十匹隨騫報謝因令窺漢大小是歲騫還到拜為大行後歲餘騫所遣使通大夏之屬者皆頗與其人俱來於是西域始通於漢矣西域凡三十六國南北有大山中央有河東西六千餘里南北千餘里東則接漢玉門陽關西則限以蔥嶺河有兩源一出蔥嶺一出于闐合流東注鹽澤鹽澤去玉門陽關三百餘里自玉門陽關出西域有兩道從鄯善傍南山北循河西行至莎車為南道南道西踰蔥嶺則出大月氏安息自車師前王庭隨北山循河西行至疏勒為北道北道西踰蔥嶺則出大宛康居奄蔡焉故皆役屬胸奴胸奴西邊日逐王置僮僕都尉使領西域常居焉耆危須尉犂間賦稅諸國取富給焉烏孫王既不肯東還漢乃於渾邪王故地置酒泉郡稍發徙民以充實之後又分置武威郡以絶胸奴與羌通之道天子得宛汗血馬愛之名曰天馬使者相望於道以求之諸使外國一輩大者數百小者百餘人人所齎操大放博望侯時其後益習而衰少焉漢率一歲中使多者十餘少者五六輩逺者八九歲近者數歲而反六年博望侯既以通西域尊貴其吏士爭上書言外國竒怪利害求使天子為其絶逺非人所樂往聽其言豫節募吏民毋問所從來為具備人衆遣之以廣其道來還不能毋侵盜幣物及使失指天子為其習之輒覆按致重罪以激怒令贖復求使使端無窮而輕犯法其吏卒亦輒復盛推外國所有言大者豫節言小者為副故妄言無行之徒皆爭效之其使皆貧人子私縣官齋物欲賤市以私其利外國亦厭漢使人人有言輕重度漢兵逺不能至而禁其食物以苦漢使漢使乏絶積怨至相攻擊而樓蘭車師小國當空道攻漢使王恢等尤甚而胸奴竒兵又時遮擊之使者爭言西域皆有城邑兵弱易擊於是天子遣浮沮將軍公孫賀將萬五千騎出九原二千餘里至浮沮井而還胸河將軍趙破奴將萬餘騎出令居數千里至胸河水而還以斥逐胸奴不使遮漢使皆不見胸奴一人乃分武威酒泉地置張掖敦煌郡徙民以實之元封三年冬十二月上遣將軍趙破奴擊車師破奴與輕騎七百餘先至虜樓蘭王遂破車師因舉兵威以困烏孫大宛之屬春正月甲申封破奴為浞野侯王恢佐破奴擊樓蘭封恢為浩侯於是酒泉列亭障至玉門矣六年烏孫使者見漢廣大歸報其國其國乃益重漢胸奴聞烏孫與漢通怒欲擊之又其旁大宛月氏之屬皆事漢烏孫於是恐使使願得尚漢公主為昆弟天子與羣臣議許之烏孫以千匹馬聘漢女漢以江都王建女細君為公主往妻烏孫贈送甚盛烏孫王昆莫以為右夫人胸奴亦遣女妻昆莫以為左夫人公主自治宫室居歲時一再與昆莫會置酒飲食昆莫年老言語不通公主悲愁思歸天子聞而憐之間歲遣使者以帷帳錦繡給遺焉昆莫曰我老欲使其孫岑娶尚公主公主不聼上書言狀天子報曰從其國俗欲與烏孫共滅胡岑娶遂妻公主昆莫死岑娶代立為昆彌是時漢使西踰蔥嶺抵安息安息發使以大鳥卵及黎軒善眩人獻于漢及諸小國歡潛大益車師扞罙蘇薤之屬皆隨漢使獻見天子天子大悅西國使更來更去天子每巡狩海上悉從外國客大都多人則過之散財帛以賞賜厚具以饒給之以覽示漢富厚焉大角抵出竒戲諸怪物多聚觀者行賞賜酒池肉林令外國客遍觀名倉庫府藏之積見漢之廣大傾駭之大宛左右多蒲萄可以為酒多苜蓿天馬嗜之漢使采其實以來天子種之於離宫别觀旁極望然西域以近胸奴常畏胸奴使待之過於漢使焉太初元年漢使入西域者言宛有善馬在二師城匿不肯與漢使天子使壯士車令等持千金及金馬以請之宛王與其羣臣謀曰漢去我逺而鹽水中數敗出其北有胡寇出其南乏水草又且往往而絶邑乏食者多漢使數百人為輩來而常乏食死者過半是安能致大軍乎無奈我何二師馬宛寶馬也遂不肯豫漢使漢使怒妄言椎金馬而去宛貴人怒曰漢使至輕我遣漢使去令其東邊郁成王遮攻殺漢使取其財物於是天子大怒諸嘗使宛姚定漢等言宛兵弱誠以漢兵不過三千人疆弩射之可盡虜矣天子嘗使浞野侯以七百騎虜樓蘭王以定漢等言為然而欲侯寵姬李氏乃拜李夫人兄廣利為二師將軍發屬國六千騎及郡國惡少年數萬人以往伐宛期至二師城取善馬故號二師將軍趙始成為軍正故浩侯王恢使導軍而李哆為校尉制軍事二年二師將軍之西也既過鹽水當道小國各城守不肯給食攻之不能下下者得食不下者數日則去比至郁成士至者不過數千皆飢罷攻郁成郁成大破之所殺傷甚衆二師將軍與李哆趙始成等計至郁成尚不能舉况至其王都乎引兵而還至燉煌士不過什一二使使上書言道逺多乏食且士卒不患戰而患飢人少不足以拔宛願且罷兵益發而復往天子聞之太怒使使遮玉門曰軍有敢入者輒斬之二師恐因留燉煌三年公卿議者皆願罷宛軍專力攻胡天子業出兵誅宛宛小國而不能下則大夏之屬漸輕漢而宛善馬絶不來烏孫輪臺易苦漢使為外國笑乃案言伐宛尤不便者鄧光等赦囚徒發惡少年及邉騎歲餘而出燉煌者六萬人負私從者不與牛十萬馬三萬匹驢橐他以萬數齎糧兵弩甚設天下騷動轉相奉伐宛五十餘校尉宛城中無井汲城外流水於是遣水工徙其城下水空以冗其城益發戍甲卒十八萬酒泉張掖北置居延休屠屯兵以衛酒泉而發天下吏有罪者亡命者及贅壻賈人故有市籍父母大父母有市籍者凡七科適為兵及載糒給二師轉車人徒相連屬而拜習馬者二人為執驅馬校尉備破宛擇取其善馬云於是二師後復行兵多所至小國莫不迎出食給軍至輪臺輪臺不下攻數日屠之自此而西平行至宛城兵到者三萬宛兵迎擊漢兵漢兵射敗之宛兵走入保其城二師欲攻郁成城恐留行而令宛益生詐乃先至宛決其水原移之則宛固己憂困圍其城攻之四十餘日宛貴人謀曰王母寡匿善馬殺漢使今殺王而出善馬漢兵宜解即不解乃力戰而死未晚也宛貴人皆以為然共殺王其外城壞虜宛貴人勇將煎靡宛大恐走入城中持王母寡頭遣人使二師約曰漢無攻我我盡出善馬恣所取而給漢軍食即不聼我我盡殺善馬康居之救又且至至我居內康居居外與漢軍戰孰計之何從是時康居候視漢兵尚盛不敢進二師聞宛城中新得漢人知穿井而其內食尚多計以為來誅首惡者母寡母寡頭已至如此不許則堅守而康居候漢兵罷來救宛破漢軍必矣乃許宛之約宛乃出其馬令漢自擇之而多出食食漢軍漢軍取其善馬數十匹中馬以下牝牡三千餘匹而立宛貴人之故時遇漢善者名昧蔡為宛王與盟而罷兵初二師起燉煌西分為數軍從南北道校尉王申生將千餘人别至郁成郁成王擊滅之數人脫亡走二師二師令搜粟都尉上官桀往攻破郁成郁成王亡走康居桀追至康居康居聞漢已破宛出郁成王與桀桀令四騎士縳守詣二師上邽騎士趙弟恐失郁成王拔劒擊斬其首追及二師四年春二師將軍來至京師二師所過小國聞宛破皆使其子弟從入貢獻見天子因為質焉軍還入馬千餘匹後行軍非乏食戰死不甚多而將吏貪不愛卒侵牟之以此物故者衆天子為萬里而伐不録其過乃下詔封李廣利為海西侯封趙弟為新畤侯以上官桀為少府軍官吏為九卿者三人諸侯相郡守二千石百餘人千石以下千餘人奮行者官過其望以謫過行皆黜其勞士卒賜直四萬錢胸奴聞二師征大宛欲遮之二師兵盛不敢當即遣騎因樓蘭候漢使後過者欲絶勿通時漢軍正任文將兵玉門關捕得生口知狀以聞上詔文便道引兵捕樓蘭王將詣闕簿責王對曰小國在大國間不兩屬無以自安願徙國入居漢地上直其言遣歸國亦因使候伺胸奴胸奴自是不甚親信樓蘭自大宛破後西域震懼漢使入西域者益得職於是自燉煌西至鹽澤往往起亭而輪臺渠犂皆有田卒數百人置使者校尉領護以給使外國者後嵗餘宛貴人以為昧蔡善諛使我國遇屠乃相與殺昧蔡立母寡昆弟蟬封為宛王而遣其子入質於漢漢因使使賂賜以鎮撫之蟬封與漢約嵗獻天馬二匹昭帝元鳯四年初扞罙遣太子賴丹為質於龜兹二師擊大宛還將賴丹入至京師霍光用桑弘羊前議以賴丹為校尉將軍田輪臺龜兹貴人姑翼謂其王曰賴丹本臣屬吾國今佩漢印綬來迫吾國而田必為害王即殺賴丹而上書謝漢樓蘭王死胸奴先聞之遣其質子安歸歸得立為王漢遣使詔新王令入朝王辭不至樓蘭國最在東垂近漢當白龍堆乏水草常主發導負水擔糧送迎漢使又數為吏卒所寇懲艾不便與漢通後復為胸奴反間數遮殺漢使其弟尉屠耆降漢具言狀駿馬監北地傅介子使大宛詔因令責樓蘭龜兹介子至樓蘭龜兹責其王皆謝服介子從大宛還到龜兹會胸奴使從烏孫還在龜兹介子因率其史士共誅斬胸奴使者還奏事詔拜介子為中郎遷平樂監介子謂大將軍霍光曰樓蘭龜兹數反覆而不誅無所懲艾介子過龜兹時其王近就人易得也願往刺之以威示諸國大將軍曰龜兹道逺且驗之於樓蘭於是白遣之介子與士卒俱齎金幣揚言以賜外國為名至樓蘭樓蘭王意不親介子介子陽引去至其西界使譯謂曰漢使者持黃金錦繡行賜諸國王不來受我去之西國矣即出金幣以示譯譯還報王王貪漢物來見使者介子與坐飲陳物示之飲酒皆醉介子謂王曰天子使我私報王王起隨介子入帳中屏語壯士二人從後刺之刃交胸立死其貴人左右皆散走介子告諭以王負漢罪天子遣我誅王當更立王弟尉屠耆在漢者漢兵方至毋敢動自令滅國矣介子遂斬王安歸首馳傳詣闕縣首北闕下乃立尉屠耆為王更名其國為鄯善為刻印章賜以宮女為夫人備車騎輜重丞相率百官送至橫門外祖而遣之王自請天子曰身在漢久今歸單弱而前王有子在恐為所殺國中有伊循城其城肥美願漢遣一將屯田積穀令臣得依其威重於是漢遣司馬一人吏士四十人田伊循以填撫之秋七月乙巳封范明友為平陵侯傅介子為義陽侯臣光曰王者之於戎狄叛則討之服則舍之今樓蘭王既服其罪又從而誅之後有叛者不可得而懷矣必以為有罪而討之則宜陳師鞠旅明致其罰今乃遣使者誘以金幣而殺之後有奉使諸國者復可信乎且以大漢之強而為盜賊之謀於蠻夷不亦可羞哉論者或美介子以為竒功過矣宣帝本始二年初烏孫公主死漢復以楚王戊之孫解憂為公主妻岑娶岑娶胡婦子泥靡尚小岑娶且死以國與季父大祿子翁歸靡曰泥靡大以國歸之翁歸靡既立號肥王復尚楚主生三男兩女長男曰元貴靡次曰萬年次曰大樂上遣光祿大夫常惠持節護烏孫兵共擊胸奴奴歸漢事見胸三年上復遣常惠持金幣還賜烏孫貴人有功者惠因奏請龜兹國嘗殺校尉賴丹未伏誅請便道擊之帝不許大將軍霍光風惠以便宜從事惠與吏士五百人俱至烏孫還過發西國兵二萬人令副使發龜兹東國二萬人烏孫兵七千人從三靣攻龜兹兵未合先遣人責其王以前殺漢使狀王謝曰乃我先王時為貴人姑翼所誤耳我無罪惠曰即如此縛姑翼來吾置王王執姑翼詣惠惠斬之而還元康元年初烏孫公主少子萬年有寵於莎車王莎車王死而無子時萬年在漢莎車國人計欲自託於漢又欲得烏孫心上書請萬年為莎車王漢許之遣使者奚充國送萬年萬年初立暴惡國人不説上令羣臣舉可使西域者前將軍韓增舉上黨馮奉世以衛侯使持節送大宛諸國客至伊循城會故莎車王弟呼屠徴與旁國共殺其王萬年及漢使者奚充國自立為王神爵二年烏孫昆彌翁歸靡因長羅侯常惠上書願以漢外孫元貴靡為嗣得令復尚漢公主結婚重親畔絶胸奴詔下公卿議大鴻臚蕭望之以為烏孫絶域變故難保不可許上美烏孫新立大功又重絶故業乃以烏孫主解憂弟相夫為公主盛為資送而遣之使常惠送之至燉煌未出塞聞翁歸靡死烏孫貴人共從本約立岑娶子泥靡為昆彌號狂王常惠上書願留少主燉煌惠馳至烏孫責讓不立元貴靡為昆彌還迎少主事下公卿望之復以為烏孫持兩端難約結今少主以元貴靡不立而還信無負於夷狄中國之福也少主不止繇役將興天子從之徵還少主甘露元年夏四月烏孫狂王復尚楚主解憂生一男鴟靡不與主和又暴惡失衆漢使衛司馬魏和意副候任昌至烏孫公主言狂王為烏孫所患苦易誅也遂謀置酒使士拔劒擊之劒旁下狂王傷上馬馳去其子細沈瘦會兵圍和意昌及公主於赤谷城數月都護鄭吉發諸國兵救之乃解去漢遣中郎將張遵持醫藥治狂王賜金帛因收和意昌係瑣從尉犂檻車至長安斬之初肥王翁歸靡胡婦子烏就屠狂王傷時驚與諸翖侯俱去居北山中揚言毋家胸奴兵來故衆歸之後遂襲殺狂王自立為昆彌是嵗漢遣破羌將軍辛武賢將兵萬五千人至燉煌通渠積榖欲以討之初楚主侍者馮嫽能史書習事嘗持漢節為公主使城郭諸國敬信之號曰馮夫人為烏孫右大將妻右大將與烏就屠相愛都護鄭吉使馮夫人説烏就屠以漢兵方出必見滅不如降烏就屠恐曰願得小號以自處帝徴馮夫人自問狀遣謁者竺次期門甘延夀為副送馮夫人馮夫人錦車持節詔烏就屠詣長羅侯赤谷城立元貴靡為大昆彌烏就屠為小昆彌皆賜印綬破羌將軍不出塞還後烏就屠不盡歸諸翖侯民衆漢復遣長羅侯惠將三校屯赤谷因為分别其人民地界大昆彌戶六萬餘小昆彌户四萬餘然衆心皆附小昆彌三年五月烏孫大昆彌元貴靡及鴟靡皆病死公主上書言年老土思願得歸骸骨葬漢地天子閔而迎之冬至京師待之一如公主之制後二歲卒元貴靡子星靡代為大昆彌弱馮夫人上書願使烏孫鎮撫星靡漢遣之都護韓宣奏烏孫大吏大祿大監皆可賜以金印紫綬以尊輔大昆彌漢許之其後假會宗為都護乃招還亡叛安定之星靡死子雌栗靡代立成帝建始四年西域都護假會宗為烏孫兵所圍驛騎上書願發城郭燉煌兵以自救丞相商大將軍鳯及百寮議數日不決鳯言陳湯多籌策習外國事可問上召湯見宣室湯擊郅支時中寒病兩臂不屈申湯入見有詔毋拜示以會宗奏湯對曰臣以為此必無可憂也上曰何以言之湯曰夫胡兵五而當漢兵一何者兵刃朴鈍弓弩不利今聞頗得漢巧然猶三而當一又兵法曰客倍而主人半然後敵今圍會宗者人衆不足以勝會宗唯陛下勿憂且兵輕行五十里重行三十里今會宗欲發城郭燉煌厯時乃至所謂報讎之兵非救急之用也上曰奈何其解可必乎度何時解湯知烏孫瓦合不能久攻故事不過數日因對曰已解矣屈指計其日曰不出五日當有吉語聞居四日軍書到言已解陽朔四年閏九月烏孫小昆彌烏就屠死子拊離代立為弟日二所殺漢遣使者立拊離子安日為小昆彌日二亡阻康居安日使貴人姑莫匿等三人詐亡從日二刺殺之於是西域諸國上書願復得前都護假會宗上從之城郭諸國聞之皆翕然親附元延二年初烏孫小昆彌安日為降民所殺諸翖侯大亂詔徴故金城太守假會宗為左曹中郎將光祿大夫使安輯烏孫立安日弟末振將為小昆彌定其國而還時大昆彌雌栗靡勇健末振將恐為所并使貴人烏日領詐降刺殺雌栗靡漢欲以兵討之而未能遣中郎將假會宗立公主孫伊秩靡為大昆彌久之大昆彌翖侯難栖殺末振將安日子安犂靡代為小昆彌漢恨不自誅末振將復遣假會宗發戊巳校尉諸國兵即誅末振將太子番丘會宗恐大兵入烏孫驚番丘亡逃不可得即留所發兵墊婁地選精兵三十弩徑至昆彌所在召番丘責以末振將之罪即手劒擊殺番丘官屬以下驚恐馳歸小昆彌安犂靡勒兵數千騎圍會宗會宗為言來誅之意今圍守殺我如取漢牛一毛耳宛王郅支頭縣稿街烏孫所知也昆彌以下服曰末振將負漢誅其子可也獨不可告我令飲食之邪會宗曰豫告昆彌逃匿之為大罪即飲食以付我傷骨肉恩故不先告昆彌以下號泣罷去會宗還奏事天子賜會宗爵關內侯黃金百斤會宗以難栖殺末振將奏以為堅守都尉責大祿大監以雌栗靡見殺狀奪金印紫綬更與銅墨云末振將弟卑爰疐本共謀殺大昆彌將衆八萬餘口北附康居謀欲借兵兼并兩昆彌漢復遣會宗與都護孫建并力以備之自烏孫分立兩昆彌漢用憂勞且無寧歲時康居復遣子侍漢貢獻都護郭舜上言本胸奴盛時非以兼有烏孫康居故也及其稱臣妾非以失二國也漢雖皆受其質子然三國內相輸遺交通如故亦相候伺見便則發合不能相親信離不能相臣役以今言之結配烏孫竟未有益反為中國生事然烏孫既結在前今與胸奴俱稱臣義不可距而康居驕黠訖不肯拜使者都護吏至其國坐之烏孫諸使下王及貴人先飲食已乃飲啖都護吏故為無所省以夸旁國以此度之何故遣子入侍其欲賈市為好辭之詐也胸奴百蠻大國今事漢甚備聞康居不拜且使單于有悔自卑之意宜歸其侍子絶勿復使以章漢家不通無禮之國漢為其新通重致逺人終羈縻不絶武帝伐胸奴漢武帝元光二年鴈門馬邑豪聶一因大行王恢言胸奴初和親親信邉可誘以利致之伏兵襲擊必破之道也上召問公卿王恢曰臣聞全代之時北有強胡之敵內連中國之兵然尚得飬老長幼種樹以時倉廩常實胸奴不輕侵也今以陛下之威海內為一然胸奴侵盜不已者無它以不恐之故耳臣竊以為擊之便韓安國曰臣聞髙皇帝嘗圍於平城七日不食及解圍反位而無忿怒之心夫聖人以天下為度者也不以己私怒傷天下之功故遣劉敬結和親至今為五世利臣竊以為勿擊便恢曰不然髙帝身被堅執鋭行幾十年所以不報平城之怨者非力不能所以休天下之心也今邉境數驚士卒傷死中國槥車相望此仁人之所隱也故曰擊之便安國曰不然臣聞用兵者以飽待飢正治以待其亂定舍以待其勞故接兵覆衆伐國墮城常坐而役敵國此聖人之兵也今將卷甲輕舉深入長驅難以為功從行則迫脅衡行則中絶疾則糧乏徐則後利不至千里人馬乏食兵法曰遺人獲也臣故曰勿擊便恢曰不然臣今言擊之者固非發而深入也將順因單于之欲誘而致之邊吾選梟騎壯士隂伏而處以為之備審遮險阻以為其戒吾藝已定或營其左或營其右或當其前或絶其後單于可擒百全必取上從恢議夏六月以御史大夫韓安國為護軍將軍衛尉李廣為驍騎將軍太僕公孫賀為輕車將軍大行王恢為將屯將軍太中大夫李息為材官將軍將車騎材官三十餘萬匿馬邑旁谷中約單于入馬邑縱兵隂使聶一為間亡入胸奴謂單于曰吾能斬馬邑令丞以城降財物可盡得單于愛信以為然而許之聶一乃詐斬死罪囚縣其頭馬邑城下示單于使者為信曰馬邑長吏已死可急來於是單于穿塞將十萬騎入武州塞未至馬邑百餘里見畜布野而無人牧者怪之乃攻亭得鴈門尉史欲殺之尉史乃告單于漢兵所居單于大驚曰吾固疑之乃引兵還出曰吾得尉史天也以尉史為天王塞下傳言單于已去漢兵追至塞度弗及乃皆罷兵王恢主别從代出擊胡輜重聞單于還兵多亦不敢出上怒恢恢曰始約為入馬邑城兵與單于接而臣擊其輜重可得利今單于不至而還臣以三萬人衆不敵祗取辱固知還而斬然完陛下士三萬人於是下恢廷尉廷尉當恢逗橈當斬恢行千金丞相蚡蚡不敢言上而言於太后曰王恢首為馬邑事今不成而誅恢是為胸奴報仇也上朝太后太后以蚡言告上上曰首為馬邑事者恢故發天下兵數十萬從其言為此且縱單于不可得恢所部擊其輜重猶頗可得以慰士大夫心今不誅恢無以謝天下於是恢聞乃自殺自是之後胸奴絶和親攻當路塞往往入盜於漢邊不可勝數然尚貪樂關市嗜漢財物漢亦關市不絶以中其意六年冬胸奴入上谷殺略吏民遣車騎將軍衛青出上谷騎將軍公孫敖出代輕車將軍公孫賀出雲中驍騎將軍李廣出鴈門各萬騎擊胡關市下衛青至龍城得胡首虜七百人公孫賀無所得公孫敖為胡所敗亡七千騎李廣亦為胡所敗胡生得廣置兩馬間絡而盛卧行十餘里廣佯死暫騰而上胡兒馬上奪其弓鞭馬南馳遂得脫歸漢下敖廣吏當斬贖為庶人唯青賜爵關內侯秋胸奴數盜邊漁陽尤甚以衛尉韓安國為材官將軍屯漁陽元朔元年秋胸奴二萬騎入漢殺遼西太守略二千餘人圍韓安國壁又入漁陽鴈門各殺略千餘人安國益東徙屯北平數月病死天子乃復召李廣拜為右北平太守胸奴號曰漢之飛將軍避之數歲不敢入右北平車騎將軍衛青將三萬騎出鴈門將軍李息出代青斬首虜數千人臨災人主父偃嚴安上書言九事其八事為律令一事諌伐胸奴其辭曰司馬法曰國雖大好戰必亡天下雖平忘戰必危夫怒者逆德也兵者凶器也爭者末節也夫務戰勝窮武事者未有不悔者也昔秦皇帝并吞戰國務勝不休欲攻胸奴李斯諫曰不可夫胸奴無城郭之居委積之守遷徙鳥舉難得而制也輕兵深入糧食必絶踵糧以行重不及事得其地不足以為利也得其民不可調而守也勝必殺之非民父母也靡敝中國快心胸奴非長策也秦皇帝不聼遂使蒙恬將兵攻胡辟地千里以河為境地固沮澤鹹鹵不生五榖然後發天下丁男以守北河暴兵露師十有餘年死者不可勝數終不能踰河而北是豈人衆不足兵革不備哉其勢不可也又使天下蜚芻挽粟起於黃腄琅邪負海之郡轉輸北河率三十鍾而致一石男子疾耕不足於糧餉女子紡績不足於帷幕百姓靡敝孤寡老弱不能相飬道路死者相望蓋天下始畔秦也及至高皇帝定天下略地於邊聞胸奴聚於代谷之外而欲擊之御史成進諫曰不可夫胸奴之性獸聚而鳥散從之如搏影今以陛下盛德攻胸奴臣竊危之髙帝不聼遂北至於代谷果有平城之圍髙皇帝蓋悔之甚乃使劉敬往結和親之約然後天下忘干戈之事夫胸奴難得而制非一世也行盜侵驅所以為業也天性固然上及虞夏殷周固弗程督禽獸畜之不屬為人夫上不觀虞夏殷周之統而下循近世之失此臣之所大憂百姓之所疾苦也嚴安上書曰昔秦王意廣心逸欲威海外使蒙恬將兵以北攻胡又使尉屠睢將樓船之士以攻越當是時秦禍北御名髙宗於胡南挂於越宿兵於無用之地進而不得退行十餘年丁男被甲丁女轉輸苦不聊生自經於道樹死者相望及秦皇帝崩而天下大畔滅世絶祀窮兵之禍也故周失之弱秦失之強不變之患也今徇南夷朝夜郎降羌僰略薉州建城邑深入胸奴燔其龍城議者美之比人臣之利非天下之長策也書奏天子召見謂曰公等皆安在何相見之晚也皆拜為郎中二年冬胸奴入上谷漁陽殺略吏民千餘人遣衛青李息出雲中以西至隴西擊胡之樓煩白羊王於河南得胡首虜數千牛羊百餘萬走白羊樓煩王遂取河南地詔封青為長平侯青校尉蘇建張次公皆有功封建為平陵侯次公為岸頭侯主父偃言河南地肥饒外阻河蒙恬城之以逐胸奴內省轉輸戍漕廣中國滅胡之本也上下公卿議皆言不便上竟用偃計立朔方郡使蘇建興十餘萬人築朔方城復繕故秦時蒙恬所為塞因河為固轉漕甚逺自山東咸被其勞費數十百巨萬府庫並虛漢亦棄上谷之斗辟縣造陽地以豫胡夏募民徙朔方十萬口三年冬胸奴軍臣單于死其弟左谷蠡王伊稚斜自立為單于攻破軍臣單于太子於單於單亡降漢夏四月丙子封胸奴太子於單為涉安侯數月而卒胸奴數萬騎入塞殺代郡太守恭及略千餘人秋胸奴又入鴈門殺略千餘人四年夏胸奴入代郡定襄上郡各三萬騎殺略數千人五年胸奴右賢王數侵擾朔方天子令車騎將軍青將三萬騎出髙闕衛尉蘇建為遊擊將軍左內史李沮為強弩將軍太僕公孫賀為騎將軍代相李蔡為輕車將軍皆領屬車騎將軍俱出朔方大行李息岸頭侯張次公為將軍俱出右北平凡十餘萬人擊胸奴右賢王以為漢兵逺不能至飲酒醉衛青等兵出塞六七百里夜至圍右賢王右賢王驚夜逃獨與壯騎數百馳潰圍北去得右賢禆王十餘人衆男女萬五千餘人畜數十百萬於是引兵而還至塞天子使使者持大將軍印即軍中拜衛青為大將軍諸將皆屬焉夏四月乙未復益封青八千七百户封青三子伉不疑登皆為列侯秋胸奴萬騎入代殺都尉朱英略千餘人六年春二月大將軍青出定襄擊胸奴以合騎侯公孫敖為中將軍太僕公孫賀為左將軍翕侯趙信為前將軍衛尉蘇建為右將軍郎中令李廣為後將軍左內史李沮為強弩將軍咸屬大將軍斬首數千級而還休士馬于定襄雲中鴈門夏四月衛青復將六將軍出定襄擊胸奴斬首虜萬餘人右將軍建前將軍信并軍三千餘騎獨逢單于兵與戰一日餘漢兵且盡信故胡小王降漢漢封信翕侯及敗胸奴誘之遂將其餘騎可八百降胸奴建盡亡其軍脫身亡自歸大將軍議郎周霸曰自大將軍出未嘗斬禆將今建棄軍可斬以明將軍之威軍正閎長史安曰不然兵法小敵之堅大敵之禽也今建以數千當單于數萬力戰一日餘士盡不敢有二心自歸而斬之是示後無反意也不當斬大將軍曰青幸得以肺腑待罪行間不患無威而霸説我以明威甚失臣意且使臣職雖當斬將以臣之尊寵而不敢自擅誅於境外而具歸天子天子自裁之於以見為人臣不敢專權不亦可乎軍吏皆曰善遂囚建詣行在所初平陽縣吏霍仲孺給事平陽侯家與青姊衛少兒私通生霍去病去病年十八為侍中善騎射再從大將軍擊胸奴為票姚校尉與輕勇騎八百直棄大軍數百里赴利斬捕首虜過當於是天子曰票姚校尉去病斬首虜二千餘級得相國當户斬單于大父行藉若侯産生捕季父羅姑比再冠軍封去病為冠軍侯上谷太守郝賢四從大將軍捕斬首虜二千餘級封賢為衆利侯是嵗失兩將軍亡翕侯軍功不多故大將軍不益封止賜千金右將軍建至天子不誅贖為庶人單于既得翕侯以為自次王用其姊妻之與謀漢信教單于益北絶幕以誘罷漢兵徼極而取之無近塞單于從其計是時漢比歲發十餘萬衆擊胡斬捕首虜之士受賜黃金二十餘萬斤而漢軍士馬死者十餘萬兵甲轉漕之費不與焉於是大司農經用竭不足以奉戰士六月詔令民得買爵及贖禁錮免臧罪置賞官名曰武功爵級十七萬凡直三十餘萬金諸買武功爵至千夫者得先除為吏吏道雜而多端官職耗廢矣元狩元年夏五月胸奴萬人入上谷殺數百人二年三月霍去病為票騎將軍將萬騎出隴西擊胸奴歷五王國轉戰六日過焉支山千餘里殺折蘭王斬盧侯王執渾邪王子及相國都尉獲首虜八千九百餘級收休屠王祭天金人詔益封去病二千戶夏去病復與合騎侯公孫敖將數萬騎俱出北地異道衛尉張騫郎中令李廣俱出右北平異道廣將四千騎先行可數百里騫將萬騎在後胸奴左賢王將四萬騎圍廣廣軍士皆恐廣乃使其子敢獨與數十騎馳貫胡騎出其左右而還告廣曰胡虜易與耳軍士乃安廣為圜陳外嚮胡急擊之矢下如雨漢兵死者過半漢矢且盡廣乃令士持滿毋發而廣身自以大黃射其禆將殺數人胡虜益解會日暮吏士皆無人色而廣意氣自如益治軍軍中皆服其勇明日復力戰死者過半所殺亦過當會博望侯軍亦至胸奴軍乃解去漢軍罷弗能追罷歸漢法博望侯留遲後期當死贖為庶人廣軍功自如無賞而票騎將軍去病深入二千餘里與合騎侯失不相得票騎將軍踰居延過小月氏至祁連山得單御諱欽宗酋塗王及相國都尉以衆降者二千五百人斬首虜三萬二百級獲禆小王七十餘人天子益封去病五千戶封其禆將有功者鷹擊司馬趙破奴為從票侯校尉髙不識為宜冠侯校尉僕多為輝渠侯合騎侯敖坐行留不與票騎會當斬贖為庶人是時諸宿將所將士馬兵皆不如票騎票騎所將常選然亦敢深入常與壯騎先其大軍軍亦有天幸未嘗困絶也而諸宿將常留落不偶由此票騎日以親貴比大將軍矣胸奴入代鴈門殺略數百人秋胸奴渾邪王降是時單于怒渾邪王休屠王居西方為漢所殺虜數萬人欲召誅之渾邪王與休屠王恐謀降漢先遣使向邊境要遮漢人令報天子是時大行李息將城河上得渾邪王使即馳傳以聞天子聞之恐其以詐降而襲邊乃令票騎將軍將兵往迎之休屠王後悔渾邪王殺之并其衆票騎既渡河與渾邪王衆相望渾邪王禆將見漢軍而多不欲降者頗遁去票騎乃馳入得與渾邪王相見斬其欲亡者八千人遂獨遣渾邪王乘傳先詣行在所盡將其衆渡河降者四萬餘人號稱十萬既至長安天子所以賞賜者數十巨萬封渾邪王萬戶為漯隂侯封其禆王呼毒尼等四人皆為列侯益封票騎千七百戶渾邪之降也漢發車二萬乘以迎之縣官無錢從民貰馬民或匿馬馬不具上怒欲斬長安令右內史汲黯曰長安令無罪獨斬臣黯民乃肯出馬且胸奴畔其主而降漢漢徐以縣次傳之何至令天下騷動罷敝中國而以事夷狄之人乎上默然及渾邪至賈人與市者坐當死五百餘人黯請間見髙門曰夫胸奴攻當路塞絶和親中國興兵誅之死傷者不可勝計而費以巨萬百數臣愚以為陛下得胡人皆以為奴婢以賜從軍死事者家所鹵獲因豫之以謝天下之苦塞百姓之心今縱不能渾邪率數萬之衆來降虛府庫賞賜發良民侍飬譬若奉驕子愚民安知市買長安中物而文吏繩以為闌出財物于邊關乎陛下縱不能得胸奴之資以謝天下又以微文殺無知者五百餘人是所謂庇其葉而傷其枝者也臣竊為陛下不取也上默然不許曰吾久不聞汲黯之言今又復妄發矣居頃之乃分徙降者邊五郡故塞外而皆在河南因其故俗為五屬國而金城河西西並南山至鹽澤空無胸奴胸奴時有候者到而希矣三年秋胸奴入右北平定襄各數萬騎殺略千餘人漢既得渾邪王地隴西北地上郡益少胡寇詔減三郡戍卒之半以寬天下之繇四年上與諸將議曰翕侯趙信為單于畫計常以為漢兵不能度幕輕留今大發士卒其勢必得所欲乃粟馬十萬令大將軍青票騎將軍去病各將五萬騎私負從馬復四萬匹步兵轉者踵軍後又數十萬人而敢力戰深入之士皆屬票騎票騎始為出定襄當單于捕虜言單于東乃更令票騎出代郡令大將軍出定襄郎中令李廣數自請行天子以為老弗許良久乃許之以為前將軍太僕公孫賀為左將軍主爵都尉趙食其為右將軍平陽侯曹襄為後將軍皆屬大將軍趙信為單于謀曰漢兵既度幕人馬罷胸奴可坐收虜耳乃悉逺北其輜重以精兵待幕北大將軍青既出塞捕虜知單于所居乃自以精兵走之而令前將軍廣并於右將軍軍出東道東道回逺而水草少廣自請曰臣部為前將軍今大將軍乃徙令臣出東道且臣結髮而與胸奴戰今乃一得當單于臣願居前先死單于大將軍亦隂受上誡以為李廣老數竒毋令當單于恐不得所欲而公孫敖新失侯大將軍亦欲使敖與俱當單于故徙前將軍廣廣知之因自辭於大將軍大將軍不聽廣不謝而起行意甚愠怒大將軍出塞千餘里度幕見單于兵陳而待於是大將軍令武剛車自環為營而縱五千騎往當胸奴胸奴亦縱可萬騎會日且入大風起砂礫擊面兩軍不相見漢益縱左右翼繞單于單于視漢兵多而士馬尚強自度戰不能如漢兵單于遂乘六騾壯騎可數百直冒漢圍西北馳去時已昏漢胸奴相紛拏殺傷大當漢軍左校捕虜言單于未昏而去漢軍發輕騎夜追之大將軍軍因隨其後胸奴兵亦散走遲明行二百餘里不得單于捕斬首虜萬九千級遂至填顔山趙信城得胸奴積粟食軍留一日悉燒其城餘粟而歸前將軍廣與右將軍食其軍無導惑失道後大將軍不及單于戰大將軍引還過幕南乃遇二將軍大將軍使長吏責問廣食其失道狀急責廣之幕府對簿廣曰諸校尉無罪乃我自失道吾今自上簿至幕府廣謂其麾下曰廣結髮與胸奴大小七十餘戰今幸從大將軍出接單于兵而大將軍徙廣部行回逺而又迷失道豈非天哉且廣年六十餘矣終不能復對刀筆之吏遂引刀自剄廣為人亷得賞賜輒分其麾下飲食與士共之為二千石四十餘年家無餘財猿臂善射度不中不發將兵乏絶之處見水士卒不盡飲廣不近水士卒不盡食廣不嘗食士以此愛樂為用及死一軍皆哭百姓聞之知與不知無老壯皆為垂涕而右將軍獨下吏當死贖為庶人單于之遁走其兵往往與漢兵相亂而隨單于單于久不與其大衆相得其右谷蠡王以為單于死乃自立為單于十餘日真單于復得其衆而右谷蠡王乃去其單于號票騎將軍騎兵車重與大將軍軍等而無禆將悉以李敢等為大校當禆將出代右北平二千餘里絶大幕直左方兵獲屯頭王韓王等三人將軍相國當戶都尉八十三人封狼居胥山禪於姑衍登臨翰海鹵獲七萬四百四十三級天子以五千八百户益封票騎將軍又封其所部右北平太守路博德等四人為列侯從票侯破奴等二人益封校尉敢為關內侯食邑軍吏卒為官賞賜甚多而大將軍不得益封軍吏卒皆無封侯者兩軍之出塞塞閲官及私馬凡十四萬匹而復入塞者不滿三萬匹乃益置大司馬位大將軍票騎將軍皆為大司馬定令令票騎將軍秩祿與大將軍等自是之後大將軍青日退而票騎日益貴大將軍故人門下士多去事票騎輒得官爵唯任安不肯票騎將軍為人少言不泄有氣敢往天子嘗欲教之孫吳兵法對曰顧方略何如耳不至學古兵法天子為治第令票騎視之對曰胸奴未滅無以家為也由此上益重愛之然少貴不省士其從軍天子為遣太官齎數十乘既還重車餘棄粱肉而士有飢者其在塞外卒乏糧或不能自振而票騎尚穿域踏鞠事多此類大將軍為人仁喜士退讓以和柔自媚於上兩人志操如此是時漢所殺虜胸奴合八九萬而漢士卒物故亦數萬是後胸奴逺遁而幕南無王庭漢度河自朔方以西至令居往往通渠置田官吏卒五六萬人稍蠶食胸奴以北然亦以馬少不復大出擊胸奴矣胸奴用趙信計遣使於漢好辭請和親天子下其議或言和親或言遂臣之丞相長史任敞曰胸奴新破困宜可使為外臣朝請於邊漢使任敞於單于單于大怒留之不遣是時博士狄山議以為和親便上以問張湯湯曰此愚儒無知狄山曰臣固愚愚忠若御史大夫湯乃詐忠於是上作色曰吾使生居一郡能無使虜入盜乎曰不能曰居一縣對曰不能復曰居一障間山自度辨窮且下吏曰能於是上遣山乘障至月餘胸奴斬山頭而去自是以後羣臣震懾無敢忤湯者六年秋九月冠軍景桓侯霍去病薨天子甚悼之為冢像祁連山元鼎三年胸奴伊稚斜單于死子烏維單于立元封元年冬十月下詔曰南越東甌咸伏其辜西蠻北夷頗未輯睦朕將巡邊垂躬秉武節置十二部將軍親帥師焉乃行自雲陽北厯上郡西河五原出長城北登單于臺至朔方臨北河勒兵十八萬騎旌旗徑千餘里以見武節威胸奴遣使者郭吉告單于曰南越王頭已縣於漢北闕今單于能戰天子自將待邊不能即南面而臣於漢何徒逺走亡匿於幕北寒苦無水草之地毋為也語卒而單于大怒立斬主客見者而留郭吉遷之北海上然胸奴亦讋終不敢出上乃還四年胸奴自衛霍度幕以來希復為寇逺徙北方休飬士馬習射獵數使使於漢好辭甘言求請和親漢使北地人王烏等窺胸奴烏從其俗去節入穹廬單于愛之佯許甘言為遣其太子入漢為質漢使楊信於胸奴信不肯從其俗單于曰故約漢嘗遣翁主結繒絮食物有品以和親而胸奴亦不擾邊今乃欲反古令吾太子為質無幾矣信既歸漢又使王烏往而單于復讇以甘言欲多得漢財物紿謂王烏曰吾欲入漢見天子面相約為兄弟王烏歸報漢漢為單于築邸于長安胸奴曰非得漢貴人使吾不與誠語胸奴使其貴人至漢病漢子藥欲愈之不幸而死漢使路充國佩二千石印綬往使因送其喪厚直數千金曰此漢貴人也單于以為漢殺吾貴使者乃留路充國不歸諸所言者單于特空紿王烏殊無意入漢及遣太子於是胸奴數使竒兵侵犯漢邊乃拜郭昌為拔胡將軍及浞野侯屯朔方以東備胡六年胸奴烏維單于死子烏師廬立年少號兒單于自此之後單于益西北徙左方丘直雲中右方直酒泉燉煌郡太初元年胸奴兒單于好殺伐國人不安又有天災畜多死左大都尉使人間告漢曰我欲殺單于降漢漢逺即兵來迎我我即發上乃遣因杅將軍公孫敖築塞外受降城以應之二年上猶以受降城去胸奴逺遣浚稽將軍趙破奴將二萬餘騎出朔方西北二千餘里期至浚稽山而還浞野侯既至期左大都尉欲發而覺單于誅之發左方兵擊浞野侯浞野侯行捕首虜得數千人還未至受降城四百里胸奴兵八萬騎圍之浞野侯夜自出求水胸奴間捕生得浞野侯因急擊其軍軍吏畏亡將而誅莫相勸歸者軍遂沒於胸奴兒單于大喜因遣竒兵攻受降城不能下乃寇入邊而去三年春正月胸奴兒單于死子年少胸奴立其季父右賢王詬犂湖為單于上遣光祿勳徐自為出五原塞數百里逺者千餘里築城障列亭西北至廬朐而使遊擊將軍韓説長平侯衛伉屯其旁使強弩都尉路博德築居延澤上秋胸奴大入定襄雲中殺略數千人敗數二千石而去行破壞光祿所築城列亭障又使右賢王入酒泉張掖略數千人會軍正任文擊救盡復失所得而去四年冬胸奴詬犂湖單于死胸奴立其弟左大都尉且鞮侯為單于天子欲因伐宛之威遂困胡乃下詔曰髙皇帝遺朕平城之憂髙后時單于書絶悖逆昔齊襄公復九世之讎春秋大之且鞮侯單于初立恐漢襲之乃曰我兒子安敢望漢天子漢天子我丈人行也因盡歸漢使之不降者路充國等使使來獻天漢元年三月上嘉胸奴單于之義遣中郎將蘇武送胸奴使留在漢者因厚賂單于答其善意武與副中郎將張勝及假吏常惠等俱既至胸奴置幣遺單于單于益驕非漢所望也會緱王與長水虞常等及衛律所將降者陰相與謀劫單于母閼氏歸漢衛律者父故長水胡人律善協律都尉李延年延年薦言律使於胸奴使還聞延年家收遂亡降胸奴單于愛之與謀國事立為丁靈王虞常在漢時素與副張勝相知私候勝曰聞漢天子甚怨衛律常能為漢伏弩射殺之吾母弟在漢幸蒙其賞賜張勝許之以貨物與常後月餘單于出獵獨閼氏子弟在虞常等七十餘人欲發其一人夜亡告之單于子弟發兵與戰緱王等皆死虞常生得單于使衛律治其事張勝聞之恐前語發以狀語武武曰事如此此必及我見犯乃死重負國欲自殺勝惠共止之虞常果引張勝單于怒召諸貴人議欲殺漢使者左伊秋訾曰即謀單于何以復加宜皆降之單于使衛律召武受辭武謂惠等屈節辱命雖生何面目以歸漢引佩刀自刺衛律驚自抱持武馳召醫鑿地為坎置煴火覆武其上蹈其背以出血武氣絶半日復息惠等哭輿歸營單于壯其節朝夕遣人候問武而收繫張勝武益愈單于使使曉武欲降之會論虞常欲因此時降武劒斬虞常已律曰漢使張勝謀殺單于近臣當死單于募降者赦罪舉劒欲擊之勝請降律謂武曰副有罪當相坐武曰本無謀又非親屬何謂相坐復舉劒擬之武不動律曰蘇君律前負漢歸胸奴幸蒙大恩賜號稱王擁衆數萬馬畜彌山富貴如此蘇君今日降明日復然空以身膏草野誰復知之武不應律曰君因我降與君為兄弟今不聽吾計後雖欲復見我尚可得乎武罵律曰汝為人臣子不顧恩義畔主背親為降虜於蠻夷何以汝為見且單于信汝使決人死生不平心持正反欲鬬兩主觀禍敗南越殺漢使者屠為九郡宛王殺漢使者頭縣北闕朝鮮殺漢使者即時誅滅獨胸奴未耳若知我不降明欲令兩國相攻胸奴之禍從我始矣律知武終不可脅白單于單于愈益欲降之乃幽武置大窖中絶不飲食天雨雪武卧齧雪與旃毛并咽之數日不死胸奴以為神乃徙武北海上無人處使牧羝曰羝乳乃得歸别其官屬常惠等各置他所浞野侯趙破奴自胸奴亡歸二年夏五月遣二師將軍廣利以三萬騎出酒泉擊右賢王於天山得冦首虜萬餘級而還胸奴大圍二師將軍漢軍乏食數日死傷者多假司馬隴西趙充國與壯士百餘人潰圍陷陳二師引兵隨之遂得解漢兵物故什六七充國身被二十餘創二師奏狀詔徴充國詣行在所帝親見視其創嗟歎之拜為中郎漢復使因杅將軍敖出西河與強弩都尉路博德會涿塗山無所得初李廣有孫陵為侍中善騎射愛人下士帝以為有廣之風拜騎都尉使將丹陽楚人五千人教射酒泉張掖以備胡及二師擊胸奴上詔陵欲使為二師將輜重陵叩頭自請曰臣所將屯邊者皆荆楚勇士竒材劒客也力扼虎射命中願得自當一隊到蘭于山南以分單于兵毋令專鄉二師軍上曰將惡相屬邪吾發軍多無騎豫女陵對無所事騎臣願以少擊衆步兵五千人涉單于庭上壯而許之因詔路博德將兵半道迎陵軍博德亦羞為陵後距奏言方秋胸奴馬肥未可與戰願留陵至春俱出上怒疑陵悔不欲出而教博德上書乃詔博德引兵擊胸奴於西河詔陵以九月發出遮虜障至東浚稽山南龍勒水上徘徊觀虜即亡所見還抵受降城休士陵於是將其步卒五千人出居延北行三十日至浚稽山止營舉圖所過山川地形使麾下騎陳步樂還以聞步樂召見道陵將率得士死力上甚悅拜步樂為郎陵至浚稽山與單于相值騎可三萬圍陵軍軍居兩山間以大車為營陵引士出營外為陳前行持戟盾後行持弓弩虜見漢軍少直前就營陵摶戰攻之千弩俱發應弦而倒虜還走上山漢軍追擊殺數千人單于大驚召左右地兵八萬餘騎攻陵陵且戰且引南行數日抵山谷中連戰士卒中矢傷三創者載輦兩創者將車一創者持兵戰復斬首三千餘級引兵東南循故龍城道行四五日抵大澤葭葦中虜從上風縱火陵亦令軍中縱火以自救南行至山下單于在南山上使其子將騎擊陵陵軍步鬬樹木間復殺數千人因發連弩射單于單于下走是日捕得虜言單于曰此漢精兵擊之不能下日夜引吾南近塞得無有伏兵乎諸當戶君長皆言單于自將數萬騎擊漢數千人不能滅後無以復使邊臣令漢益輕胸奴復力戰山谷間尚四五十里得平地不能破乃還是時陵軍益急胸奴騎多戰一日數十合復傷殺虜二千餘人虜不利欲去會陵軍候管敢為校尉所辱亡降胸奴具言陵軍無後救射矢且盡獨將軍麾下及校尉成安侯韓延年各八百人為前行以黃與白為幟當使精騎射之即破矣單于得敢大喜使騎並攻漢軍疾呼曰李陵韓延年趣降遂遮道急攻陵陵居谷中虜在山上四面射矢如雨下漢軍南行未至鞮汗山一日五十萬矢皆盡即棄車去士尚三千餘人徒斬車輻而持之軍吏持尺刀抵山入狹谷單于遮其後乘隅下壘石士卒多死不得行昏後陵便衣獨步出營止左右毋隨我丈夫一取單于耳良久陵還太息曰兵敗死矣於是盡斬旌旗及珍寶埋地中陵歎曰復得數十矢足以脫矣今無兵復戰天明坐受縳矣各鳥獸散猶有得脫歸報天子者令軍士人持二升糒一片氷期至遮虜障者相待夜半時擊鼓起士鼓不鳴陵與韓延年俱上馬壯士從者十餘人虜騎數千追之韓延年戰死陵曰無靣目報陛下遂降軍人分散脫至塞者四百餘人陵敗處去塞百餘里邊塞以聞上欲陵死戰後聞陵降上怒甚責問陳步樂步樂自殺羣臣皆罪陵上以問太史令司馬遷遷盛言陵事親孝與士信常奮不顧身以徇國家之急其素所畜積也有國士之風今舉事一不幸全軀保妻子之臣隨而媒糵其短誠可痛也且陵提步卒不滿五千深蹂戎馬之地抑數萬之師虜救死扶傷不暇悉舉引弓之民共攻圍之轉鬬千里矢盡道窮士張空弮冒白刃北首爭死敵得人之死力雖古名將不過也身雖陷敗然其所摧敗亦足暴於天下彼之不死宜欲得當以報漢也上以遷為誣罔欲沮二師為陵遊説下遷腐刑久之上悔陵無救曰陵當發出塞乃詔強弩都尉令迎軍坐預詔之得令老將生姦詐乃遣使勞賜陵餘軍得脫者三年秋胸奴入鴈門太守坐畏愞棄市四年春正月發天下七科謫及勇敢士遣二師將軍李廣利將騎六萬步兵七萬出朔方強弩都尉路博德將萬餘人與二師會遊擊將軍韓説將步兵三萬人出五原因杅將軍公孫敖將騎萬步兵三萬人出鴈門胸奴聞之悉逺其纍重於余吾水北而單于以兵十萬待水南與二師接戰二師解而引歸與單于連鬬十餘日遊擊無所得因杅與左賢王戰不利引歸時上遣敖深入胸奴迎李陵敖軍無功還因曰捕得生口言李陵教單于為兵以備漢軍故臣無所得上於是族陵家既而聞之乃漢將降胸奴者李緒非陵也陵使人刺殺緒大閼氏欲殺陵單于匿之北方大閼氏死乃還單于以女妻陵立為右校王與衛律皆貴用事衛律常在單于左右陵居外有大事乃入議太始元年胸奴且鞮侯單于死有兩子長為左賢王次為左大將左賢王未至貴人以為有病更立左大將為單于左賢王聞之不敢進左大將使人召左賢王而讓位焉左賢王辭以病左大將不聼謂曰即不幸死傳之於我左賢王許之遂立為狐鹿姑單于以左大將為左賢王數年病死其子先賢撣不得代更以為日逐王單于自以其子為左賢王征和二年九月胸奴入上谷五原殺掠吏民三年春正月胸奴入五原酒泉殺兩都尉三月遣李廣利將七萬人出五原商丘成將二萬人出西河馬通將四萬騎出酒泉擊胸奴夏五月胸奴單于聞漢兵大出悉徙其輜重北邸郅居水左賢王驅其人民度余吾水六七百里居兜銜山單于自將精兵度姑且水商丘成軍至追邪徑無所見還胸奴使大將與李陵將三萬餘騎追漢軍轉戰九日至蒲奴水虜不利還去馬通軍至天山胸奴使大將偃渠將二萬餘騎要漢兵見漢兵強引去通無所得失是時漢恐車師兵遮馬通軍遣開陵侯成娩將樓蘭尉犂危須等六國兵共圍車師盡得其王民衆而還二師將軍出塞胸奴使右大都尉與衛律將五千騎要擊漢軍於夫羊句山狹二師擊破之乘勝追北至范夫人城胸奴奔走莫敢距敵初二師之出也丞相劉屈氂為祖道送至渭橋廣利曰願君侯早請昌邑王為太子如立為帝君侯長何憂乎屈氂許諾昌邑王者二師將軍女弟李夫人子也二師女為屈氂子妻故共欲立焉會內者令郭穰告丞相夫人祝詛上及與二師共禱祠欲令昌邑王為帝按驗罪至大逆不道六月詔載屈氂厨車以徇要斬東市妻子梟首華陽街二師妻子亦收二師聞之憂懼其掾胡亞夫亦避罪從軍説二師曰夫人室家皆在吏若還不稱意適與獄會郅居以北可復得見乎二師由是狐疑深入要功遂北至郅居水上虜已去二師遣護軍將二萬騎度郅居之水逢左賢王左大將將二萬騎與漢軍合戰一日漢軍殺左大將虜死傷甚衆軍長史與決眭都尉輝渠侯謀曰將軍懷異心欲危衆求功恐必敗謀共執二師二師聞之斬長史引兵還至燕然山單于知漢軍勞倦自將五萬騎遮擊二師相殺傷甚衆夜塹漢軍前深數尺從後急擊之軍大亂敗二師遂降單于素知其漢大將以女妻之尊寵在衛律上宗族遂滅四年春三月丁巳以大鴻臚田千秋為丞相封冨民侯千秋無它材能術學又無伐閲功勞特以一言寤意數月取宰相封侯世未嘗有也然為人敦厚有智居位自稱踰於前後數公先是搜粟都尉桑弘羊與丞相御史奏言輪臺東有溉田五千頃以上可遣屯田卒置校尉三人分護益種五穀張掖酒泉遣騎假司馬為斥候募民壯健敢徙者詣田所益墾溉田稍築列亭連城而西以威西國輔烏孫上乃下詔深陳既往之悔曰前有司奏欲益民賦三十助邊用是重困老弱孤獨也而今又請遣卒田輪臺輪臺西於車師千餘里前開陵侯擊車師時雖勝降其王以遼逺乏食道死者尚數千人況益西乎曩者朕之不明以軍候弘上書言胸奴縛馬前後足置城下馳言秦人我丐若馬又漢使者久留不還故興遣二師將軍欲以為使者威重也古者卿大夫與謀參以蓍龜不吉不行乃者以縛馬書遍視丞相御史二千石諸大夫郎為文學者乃至郡屬國都尉等皆以虜自縛其馬不祥甚哉或以為欲以見強夫不足者視人有餘公車方士太史治星望氣及太卜龜蓍皆以為吉胸奴必破時不可再得也又曰北伐行將於釜山必克封諸將二師最吉故朕親發二師下釜山詔之必母深入今計謀卦兆皆反繆重合侯得虜候者乃言縳馬者胸奴詛軍事也胸奴常言漢極大然不耐飢渴失一狼走千羊乃者二師敗軍士死略離散悲痛常在朕心今又請逺田輪臺欲起亭隧是擾勞天下非所以優民也朕不忍聞大鴻臚等又議欲募囚徒送胸奴使者明封侯之賞以報忿此五伯所弗為也且胸奴得漢降者常提掖搜索問以所聞豈得行其計乎當今務在禁苛暴止擅賦力本農修馬復令補缺毋乏武備而已郡國二千石各上進畜馬方略補邊狀與計對由是不復出軍而封田千秋為富民侯以明休息思富飬民也武帝平兩越漢武帝建元六年秋八月閩越王郢興兵擊南越邊邑南越王守天子約不敢擅興兵使人上書告天子於是天子多南越義大為發兵遣大行王恢出豫章大農令韓安國出會稽擊閩越淮南王安上書諫曰陛下臨天下布德施惠天下攝然人安其生自以沒身不見兵革今聞有司舉兵將以誅越臣安竊為陛下重之越方外之地翦髮文身之民也不可以冠帶之國法度理也自三代之盛胡越不與受正朔非強弗能服威弗能制也以為不居之地不牧之民不足以煩中國也自漢初定已來七十二年越人相攻擊者不可勝數然天子未嘗舉兵而入其地也臣聞越非有城郭邑里也處溪谷之間篁竹之中習於水鬭便於用舟地深昧而多水險中國之人不知其藝阻而入其地雖百不當其一得其地不可郡縣也攻之不可暴取也以地圖察其山川要塞相去不過寸數而間獨數百千里阻險林叢弗能盡著視之若易行之甚難天下賴宗廟之靈方內大寧戴白之老不見兵革民得夫婦相守父子相保陛下之德也越人名為藩臣貢酎之奉不輸大內一卒之用不給上事自相攻擊而陛下發兵救之是反以中國而勞蠻夷也且越人愚戅輕薄負約反覆其不用天子之法度非一日之積也一不奉詔舉兵誅之臣恐後兵革無時得息也間者數年嵗比不登民待賣爵贅子以接衣食賴陛下德澤振救之得毋轉死溝壑四年不登五年復蝗民生未復今發兵行數千里資衣糧入越地輿轎而隃領拖舟而入水行數百千里夾以深林叢竹水道上下擊石林中多蝮蛇猛獸夏月暑時歐泄霍亂之病相隨屬也曽未施兵接刃死傷者必衆矣前時南海王反陛下先臣使將軍蕑忌將兵擊之以其軍降處之上淦後復反會天暑多雨樓船卒水居擊棹未戰而疾死者過半親老涕泣孤子啼號破家散業迎尸千里之外裹骸骨而歸悲哀之氣數年不息長老至今以為記曽未入其地而禍已至此矣陛下德配天地明象日月恩至禽獸澤及草木一人有飢寒不終其天年而死者為之悽愴於心今方內無狗吠之警而使陛下甲卒死亡暴露中原霑漬山谷邊境之民為之早閉晏開朝不及夕臣安竊為陛下重之不習南方地形者多以越為人衆兵強能難邊城淮南全國之時多為邊吏臣竊聞之與中國異限以高山人迹絶車道不通天地所以隔外內也其入中國必下領水領水之山峭峻漂石破舟不可以大船載食糧下也越人欲為變必先田餘干界中積食糧乃入伐材治船邊城守候誠謹越人有入伐材者輒收捕焚其積聚雖百越奈邊城何且越人綿力薄材不能陸戰又無車騎弓弩之用然而不可入者以保地險而中國之人不耐其水土也臣聞越甲卒不下數十萬所以入之五倍乃足挽車奉餉者不在其中南方暑濕近夏疸熱暴露水居蝮蛇蠚生疾疢多作兵未血刃而病死者什二三雖舉越國而虜之不足以償所亡臣聞道路言閩越王弟甲弒而殺之甲以誅死其民未有所屬陛下若欲來內處之中國使重臣臨存施德垂賞以招致之此必攜幼扶老以歸聖德若陛下無所用之則繼其絶世存其亡國建其王侯以為畜越此必委質為藩臣世共貢職陛下以方寸之印丈二之組填撫方外不勞一卒不頓一戟而威德並行今以兵入其地此必震恐以有司為欲屠滅之也必雉兔逃入山林險阻背而去之則復相羣聚留而守之厯歲經年則士卒罷倦食糧乏絶民苦兵事盜賊必起臣聞長老言秦之時嘗使尉屠睢擊越又使監祿鑿渠通道越人逃入深山林叢不可得攻留軍屯守空地曠日引久士卒勞倦越出擊之秦兵大破乃發適戍以備之當此之時外內騷動皆不聊生亡逃相從羣為盜賊於是山東之難始興兵者凶事一方有急四面皆聳臣恐變故之生姦邪之作由此始也臣聞天子之兵有征而無戰言莫敢校也如使越人蒙徼幸以逆執事之顔行厮輿之卒有一不備而歸者雖得越王之首臣猶竊為大漢羞之陛下以四海為境生民之屬皆為臣妾垂德惠以覆露之使安生樂業則澤被萬世傳之子孫施之無窮天下之安猶泰山而四維之也夷狄之地何足以為一日之間而煩汗馬之勞乎詩云王猶允塞徐方既來言王道甚大而逺方懷之也臣安竊恐將吏之以十萬之師為一使之任也是時漢兵遂出未隃領閩越王郢發兵距險其弟餘善乃與相宗族謀曰王以擅發兵擊南越不請故天子兵來誅漢兵衆強即幸勝之後來益多終滅國而止今殺王以謝天子天子聼罷兵固國完不聼乃力戰不勝即亡入海皆曰善即鏦殺王使使奉其頭致大行大行曰所為來者誅王今王頭至謝罪不戰而殞利莫大焉乃以便宜案兵告大農軍而使使奉王頭馳報天子詔罷兩將兵曰郢等首惡獨無諸孫繇君丑不與謀焉乃使中郎將立丑為越繇王奉閩越先祭祀餘善已殺郢威行於國國民多屬竊自立為王繇王不能制上聞之為餘善不足復興師曰餘善數與郢謀亂而後首誅郢師得不勞因立餘善為東越王與繇王並處上使莊助諭意南粵南粵王胡頓首曰天子乃為臣興兵討閩越死無以報德遣太子嬰齊入宿衛謂助曰國新被寇使者行矣胡方日夜裝入見天子助還過淮南上又使助諭淮南王安以討越事嘉答其意安謝不及助既去南越南越大臣皆諌其王曰漢興兵誅郢亦行以驚動南越且先王昔言事天子期無失禮要之不可以説好語入見則不得復歸亡國之勢也於是胡稱病竟不入見元鼎四年初南越文王遣其子嬰齊入宿衛在長安取邯鄲樛氏女生子興文王薨嬰齊立乃藏其先武帝璽上書請立樛氏女為后興為嗣漢數使使者風諭嬰齊入朝嬰齊尚樂擅殺生自恣懼入見要用漢法比內諸侯固稱病遂不見嬰齊薨諡曰明王太子興代立其母為太后太后自未為嬰齊姬時嘗與霸陵人安國少季通是嵗上使安國少季往諭王王太后以入朝比內諸侯令辨士諫大夫終軍等宣其辭勇士魏臣等輔其決衛尉路博德將兵屯桂陽待使者南越王年少太后中國人安國少季往復與私通國人頗知之多不附太后太后恐亂起亦欲倚漢威數勸王及羣臣求內屬即因使者上書請比內諸侯三嵗一朝除邊關於是天子許之賜其丞相吕嘉銀印及內史中尉太傅印餘得自置除其故黥劓刑用漢法比內諸侯使者皆留填撫之五年十一月南越王王太后飭治行裝重齎為入朝具其相吕嘉年長矣相三王宗族仕宦為長吏者七十餘人男盡尚王女女盡嫁王子弟宗室及蒼梧秦王有連其居國中甚重得衆心愈於王王之上書數諫止王王弗聼有畔心數稱病不見漢使者使者皆注意嘉勢未能誅王王太后亦恐嘉等先事發欲介漢使者權謀誅嘉等乃置酒請使者大臣皆侍坐飲嘉弟為將將卒居宫外酒行太后謂嘉曰南越內屬國之利也而相君苦不便者何也以激怒使者使者狐疑相杖遂莫敢發嘉見耳目非是即起而出太后怒欲鏦嘉以矛王止太后嘉遂出介其弟兵就舍稱病不肯見王及使者隂與大臣謀作亂王素無意誅嘉嘉知之以故數月不發天子聞嘉不聼命王王太后孤弱不能制使者怯無決又以為王王太后已附漢獨吕嘉為亂不足以興兵欲使莊參以二千人往使參曰以好往數人足矣以武往二千人無足以為也辭不可天子罷參郟壯士故濟北相韓千秋奮曰以區區之越又有王王太后應獨相吕嘉為害願得勇士三百人必斬嘉以報於是天子遣千秋與王太后弟樛樂將二千人往入越境吕嘉等乃遂反下令國中曰王年少太后中國人也又與使者亂専欲內屬盡持先王寶器入獻天子以自媚多從人行至長安虜賣以為僮僕取自脫一時之利無顧趙氏社稷為萬世慮計之意乃與其弟將卒攻殺王王太后及漢使者遣人告蒼梧秦王及其諸郡縣立明王長男越妻子術陽侯建德為王而韓千秋兵入破數小邑其後越直開道給食未至番禺四十里越以兵擊千秋等遂滅之使人函封漢使者節置塞上好為謾辭謝罪發兵守要害處春三月壬午天子聞南越反曰韓千秋雖無功亦軍鋒之冠封其子延年為成侯樛樂姊為王太后首願屬漢封其子廣德為龍亢侯秋遣伏波將軍路博德出桂陽下湟水樓船將軍楊僕出豫章下湞水歸義越侯嚴為戈船將軍出零陵下離水甲為下瀨將軍下蒼梧皆將罪人江淮以南樓船十萬人越馳義侯遣别將巴蜀罪人發夜郎兵下牂柯江咸會番禺齊相卜式上書請父子與齊習船者往死南越天子下詔褒美式賜爵關內侯金六十斤田十頃布告天下天下莫應是時列侯以百數皆莫求從軍擊越會九月嘗酎祭宗廟列侯以令獻金助祭少府省金金有輕及色惡者上皆令劾以不敬奪爵者百六人六年冬樓船將軍楊僕入越地先陷尋狹破石門挫越鋒以數萬人待伏波將軍路博德至俱進樓船居前至番禺南越王建德相吕嘉城守樓船居東南面伏波居西北面會暮樓船攻敗越人縱火燒城伏波為營遣使者招降者賜印綬復縱令相招樓船力攻燒敵驅而入伏波營中黎旦城中皆降建德嘉已夜亡入海伏波遣人追之校尉司馬蘇弘得建德越郎都稽得嘉戈船下瀨將軍兵及馳義侯所發夜郎兵未下南越已平矣遂以其地為南海蒼梧鬱林合浦交趾九真日南珠崖儋耳九郡師還上益封伏波封樓船為將梁侯蘇弘為海常侯都稽為臨蔡侯及越降將蒼梧王趙光等四人皆為侯初東越王餘善上書請以卒八千人從樓船擊吕嘉兵至揭陽以海風波為解不行持兩端隂使南越及漢破番禺不至楊僕上書願便引兵擊東越上以士卒勞倦不許令諸校屯豫章梅嶺以待命餘善聞樓船請誅之漢兵臨境乃遂反發兵距漢道號將軍騶力等為吞漢將軍入白沙武林梅嶺殺漢三校尉是時漢使大農張成故山州侯齒將屯弗敢擊却就便處皆坐畏懦誅餘善自稱武帝上欲復使楊僕將為其伐前勞以書敕責之曰將軍之功獨有先破石門尋狹非有斬將搴旗之實也烏足以驕人哉前破番禺捕降者以為虜掘死人以為獲是一過也使建德吕嘉得以東越為援是二過也士卒暴露連嵗將軍不念其勤勞而請乘傳行塞因用歸家懷銀黃垂三組夸鄉里是三過也失期內顧以道惡為解是四過也問君蜀刀價而陽不知挾偽干君是五過也受詔不至蘭池明日又不對假令將軍之吏問之不對令之不從其罪何如推此心在外江海之間可得信乎今東越深入將軍能率衆以掩過不僕惶恐對曰願盡死贖罪上乃遣橫海將軍韓説出句章浮海從東方往樓船將軍楊僕出武林中尉王溫舒出梅嶺以越侯為戈船下瀨將軍出若邪白沙以擊東越元封元年冬十月漢兵入東越境東越素發兵距險使徇北將軍守武林樓船將軍率錢塘轅終古斬徇北將軍故越衍侯吳陽以其邑七百人反攻越軍於漢陽越建成侯敖與繇王居股殺餘善以其衆降上封終古為禦兒侯陽為卯石侯居股為東成侯敖為開陵侯又封橫海將軍説為按道侯橫海校尉福為繚嫈侯東越降將多軍為無錫侯上以閩地險阻數反覆終為後世患乃詔諸將悉徙其民於江淮之間遂虛其地武帝擊朝鮮漢武帝元封二年初全燕之世嘗略屬真番朝鮮為置吏築障塞秦滅燕屬遼東外徼漢興為其逺難守復修遼東故塞至浿水為界屬燕燕王盧綰反入胸奴燕人衛滿亡命聚黨千餘人椎髻蠻夷服而東走出塞渡浿水居秦故空地上下障稍役屬真番朝鮮蠻夷及燕亡命者王之都王險會孝惠髙后時天下初定遼東太守即約滿為外臣保塞外蠻夷無使盜邊諸蠻夷君欲入見天子勿得禁止以故滿得以兵威財物侵降其旁小邑真番臨屯皆來服屬方數千里傳子至孫右渠所誘漢亡人滋多又未嘗入見辰國欲上書見天子又雍閼不通是歲漢使涉何誘諭右渠終不肯奉詔何去至界上臨浿水使御刺殺送何者朝鮮禆王長即渡馳入塞遂歸報天子曰殺朝鮮將上為其名美即不詰拜何為遼東東部都尉朝鮮怨何發兵襲攻殺何秋上募天下死罪為兵遣樓船將軍楊僕從齊浮渤海左將軍荀彘出遼東以討朝鮮三年漢兵入朝鮮境朝鮮王右渠發兵距險樓船將軍將齊兵七千人先至王險右渠城守窺知樓船軍少即出城擊樓船樓船軍敗散遁山中十餘日稍求退散卒復聚左將軍擊朝鮮浿水西軍未能破天子為兩將未有利乃使衛山因兵威往諭右渠右渠見使者頓首謝願降恐兩將詐殺臣今見信節請復降遣太子入謝獻馬五千匹及饋軍糧人衆萬餘持兵方渡浿水使者及左將軍疑其為變謂太子已服降宜令人毋持兵太子亦疑使者左將軍詐殺之遂不渡浿水復引歸山還報天子天子誅山左將軍破浿水上軍乃前至城下圍其西北樓船亦往會居城南右渠遂堅守城數月未能下左將軍所將燕代卒多徑悍樓船將齊卒已嘗敗亡困辱卒皆恐將心慙其圍右渠常持和節左將軍急擊之朝鮮大臣乃隂間使人私約降樓船往來言尚未肯決左將軍數與樓船期戰樓船欲就其約不會左將軍亦使人求間隙降下朝鮮朝鮮不肯心附樓船以故兩將不相能左將軍心意樓船前有失軍罪今與朝鮮私善而又不降疑其有反計未敢發天子以兩將圍城乖異兵久不決使濟南太守公孫遂往正之有便宜得以從事遂至左將軍曰朝鮮當下久之不下者樓船數期不會具以素所意告曰今如此不取恐為大害遂亦以為然乃以節召樓船將軍入左將軍營計事即命左將軍麾下執樓船將軍并其軍以報天子天子誅遂左將軍已并兩軍即急擊朝鮮朝鮮相路人相韓隂尼溪相參將軍王硤相與謀曰始欲降樓船樓船今執獨左將軍并將戰益急恐不能與戰王又不肯降隂硤路人皆亡降漢路人道死夏尼溪參使人殺朝鮮王右渠來降王險城未下故右渠之大臣成已又反復攻吏左將軍使右渠子長降相路人之子最告諭其民誅成已以故遂定朝鮮為樂浪臨屯玄菟真番四郡封參為澅清侯隂為萩苴侯硤為平州侯長為幾侯最以父死頗有功為涅陽侯左將軍徴至坐爭功相嫉乖計棄市樓船將軍亦坐兵至列口當待左將軍擅先縱失亡多當誅贖為庶人班固曰玄菟樂浪本箕子所封昔箕子居朝鮮教其民以禮義田蠶織作為民設禁八條相殺以當時償殺相傷以榖償相盜者男沒入為其家奴女為婢欲自贖者人五十萬雖免為民俗猶羞之嫁娶無所售是以其民終不相盜無門戶之閉婦人貞信不淫辟其田野飲食以籩豆都邑頗放效吏往往以柸器食郡初取吏於遼東吏見民無閉臧及賈人往者夜則為盜俗稍益薄今於犯禁寖多至六十餘條可貴哉仁賢之化也然東夷天性柔順異於三方之外故孔子悼道不行設浮桴於海欲居九夷有以也夫武帝惑神怪漢武帝元光二年冬十月李少君以祠竈却老方見上上尊之少君者故深澤侯舍人匿其年及其生長其遊以方遍諸侯無妻子人聞其能使物及不死更饋遺之常餘金錢衣食人皆以為不治生業而饒給又不知其何所人愈信爭事之少君善為巧發竒中嘗從武安侯飲坐中有九十餘老人少君乃言與其大父遊射處老人為兒時從其大父識其處一坐盡驚少君言上曰祠竈則致物致物而丹沙可化為黃金壽可益蓬萊仙者可見見之以封禪則不死黃帝是也臣嘗遊海上見安期生食臣棗大如瓜安期生仙者通蓬萊中合則見人不合則隱於是天子始親祠竈遣方士入海求蓬萊安期生之屬而事化丹沙諸藥齊為黃金矣居久之李少君病死天子以為化去不死而海上燕齊怪迂之方士多更來言神事矣亳人謬忌奏祠太一方曰天神貴者太一太一佐曰五帝於是天子立其祠長安東南郊元狩四年齊人少翁以鬼神方見上上有所幸王夫人卒少翁以方夜致鬼如王夫人之貌天子自帷中望見焉於是乃拜少翁為文成將軍賞賜甚多以客禮禮之文成又勸上作甘泉宫中為臺室畫天地太一諸鬼神而置祭具以致天神居嵗餘其方益衰神不至乃為帛書以飯牛佯不知言曰此牛腹中有竒殺視得書書言甚怪天子識其手書問其人果是偽書於是誅文成將軍而隱之五年夏四月天子病鼎湖甚巫醫無所不致不愈遊水發根言上郡有巫病而鬼神下之上召置祠之甘泉及病使人問神君神君言曰天子無憂病病少愈強與我會甘泉於是病愈遂起幸甘泉病良已置酒壽宫神君非可得見聞其言言與人音等時去時來來則風肅然居室帷中神君所言上使人受書其言命之曰畫法其所語世俗之所知也無絶殊者而天子心獨喜其事祕世莫知也元鼎四年春二月樂成侯丁義薦方士欒大云與文成將軍同師上方悔誅文成得欒大大説大先事膠東康王為人長美言多方略而敢為大言處之不疑大言曰臣常往來海中見安期羡門之屬顧以臣為賤不信臣又以為康王諸侯耳不足與方臣之師曰黃金可成而河決可塞不死之藥可得仙人可致也然臣恐效文成則方士皆掩口惡敢言方哉上曰文成食馬肝死耳子誠能修其方我何愛乎大曰臣師非有求人人者求之陛下必欲致之則貴其使者令為親屬以客禮待之乃可使通言於神人於是上使驗小方鬭棊自相觸擊是時上方憂河決而黃金不就乃拜大為五利將軍又拜為天士將軍地士將軍大通將軍夏四月乙巳封大為樂通侯食邑二十戶賜甲第僮千人乘輿斥車馬帷帳器物以充其家又以衛長公主妻之齎金十萬斤天子親如五利之第使者存問供給相屬於道自大主將相以下皆置酒其家獻遺之天子又刻玉印曰天道將軍使使衣羽衣夜立白茅上五利將軍亦衣羽衣立白茅上受印以示不臣大見數月佩六印貴震天下於是海上燕齊之間莫不扼腕自言有禁方能神仙矣六月汾隂巫錦得大鼎於魏脽后土營旁河東太守以聞天子使驗問巫得鼎無姦詐乃以禮祠迎鼎至甘泉從上行薦之宗廟及上帝藏於甘泉宫羣臣皆上壽賀秋上行幸雍且郊或曰五帝泰一之佐也宜立泰一而上親郊上疑未定齊人公孫卿曰今年得寶鼎其冬辛巳朔旦冬至與黃帝時等卿有札書曰黃帝得寶鼎是嵗己酉朔旦冬至凡三百八十年黃帝仙登于天因嬖人奏之上大悅召問卿對曰受此書申公申公曰漢興復當黃帝之時漢之聖者在髙祖之孫且曽孫也寶鼎出而與神通黃帝接萬靈明庭明庭者甘泉也黃帝采首山銅鑄鼎於荆山下鼎既成有龍垂胡髯下迎黃帝黃帝上騎龍與羣臣後宫七十餘人俱登天於是天子曰嗟乎誠得如黃帝吾視去妻子如脫屣耳拜卿為郎使東候神於太室五年五利將軍裝治行東入海求其師既而不敢入海之太山祠上使人隨驗實無所見五利妄言見其師其方盡多不售坐誣罔腰斬樂成侯亦棄市六年冬公孫卿侯神河南言見仙人迹緱氏城上春天子親幸緱氏城視迹問卿得毋效文成五利乎卿曰仙者非有求人主人主者求之其道非寬假神不來言神事如迂誕積以歲月乃可致也上信之於是郡國各除道繕治宫觀名山神祠以望幸焉初司馬相如病且死有遺書頌功德言符瑞勸上封泰山上感其言會得寶鼎上乃與公卿諸生議封禪封禪用希曠絶莫知其儀而諸方士又言封禪者合不死之名也黃帝以上封禪皆致怪物與神通秦皇帝不得上封陛下必欲上稍上即無風雨遂上封矣上於是乃令諸儒采尚書周官王制之文草封禪儀數年不成上以問左內史兒寬寬曰封泰山禪梁父昭姓考瑞帝王之盛節也然享薦之義不著于經臣以為封禪告成合祛於天地神祗唯聖王所由制定其當非羣臣之所能列今將舉大事優遊數年使羣臣得人人自盡終莫能成唯天子建中和之極兼總條貫金聲而玉振之以順成天慶垂萬世之基上乃自制儀頗采儒術以文之上為封禪祠器以示羣儒或曰不與古同於是盡罷諸儒不用上又以古者先振兵釋旅然后封禪元封元年冬十月行自雲陽北歷上郡西河五原出長城北登單于臺至朔方臨北河還祭黃帝冢橋山釋兵須如上曰吾聞黃帝不死今有冢何也公孫卿曰黃帝已仙上天羣臣思慕葬其衣冠上歎曰吾後升天羣臣亦當葬吾衣冠於東陵乎乃還甘泉類祠太一春正月上行幸緱氏禮祭中嶽太室從官在山下聞若有言萬歲者三詔祠官加增太室祠禁無伐其草木以山下戶三百為之奉邑上遂東巡海上行禮祠八神齊人之上疏言神怪竒方者以萬數乃益發船令言海中神山者數千人求蓬萊神人公孫卿持節常先行候名山至東萊言夜見大人長數丈就之則不見其迹甚大類禽獸云羣臣有言見一老父牽狗言吾欲見巨公已忽不見上既見大迹未信及羣臣又言老父則大以為仙人也宿留海上與方士傳車及間使求神仙人以千數夏四月還至奉髙禮祠地主於梁父乙卯令侍中儒者皮辨搢紳射牛行事封泰山下東方如郊祠泰一之禮封廣丈二尺髙九尺其下則有玉牒書書祕禮畢天子獨與侍中奉車都尉霍子侯上泰山亦有封其事皆禁明日下隂道丙辰禪泰山下址東北肅然山如祭后土禮天子皆親拜見衣上黃而盡用樂焉江淮間茅三脊為神藉五色土益雜封其封禪祠夜若有光晝有白雲出封中天子從禪還坐明堂羣臣更上壽頌功德詔曰朕以眇身承至尊兢兢焉惟德菲薄不明于禮樂故用事八神遭天地況施著見景象屑然如有聞震于怪物欲止不敢遂登封泰山至于梁父然後升禪肅然自新嘉與士大夫更始其以十月為元封元年行所巡至博奉髙蛇丘歷城梁父民田租逋賦皆貸除之無出今年算賜天下民爵一級又以五載一巡狩用事泰山令諸侯各治邸泰山下天子既以封泰山無風雨而方士更言蓬萊諸神若將可得於是上欣然庶幾遇之復東至海上望焉上欲自浮海求蓬萊羣臣諫莫能止東方朔曰夫仙者得之自然不必躁求若其有道不憂不得若其無道雖至蓬萊見仙人亦無益也臣願陛下第還宫靜處以須之仙人將自至上乃止會奉車霍子侯暴病一日死子侯去病子也上甚悼之乃遂去並海上北至碣石巡自遼西厯北邊至九原五月乃至甘泉凡周行萬八千里云二年春正月公孫卿言見神人東萊山若云欲見天子天子於是幸緱氏城拜卿為中大夫遂至東萊宿留之數日無所見見大人迹云復遣方士求神怪采芝藥以千數時歲旱天子既出無名乃禱萬里沙夏四月還過祠泰山公孫卿言仙人好樓居於是上令長安作蜚亷桂觀甘泉作益壽延壽觀使卿持節設具而候神人又作通天莖臺置祠具其下更置甘泉前殿益廣諸宫室太初元年冬十月上行幸泰山十一月甲子朔旦冬至祠上帝于明堂東至海上考入海及方士求神者莫驗然益遣冀遇之十二月甲午朔上親禪髙里祠后土臨渤海將以望祀蓬萊之屬冀至殊廷焉春上還以柏梁災故朝諸侯受計于甘泉甘泉作諸侯邸越人勇之曰越俗有火災復起屋必以大用勝服之於是作建章宫度為千門萬戶其東則鳯闕髙二十餘丈其西則唐中數十里虎圈其北治大池漸臺髙二十餘丈命曰太液池中有蓬萊方丈瀛洲壷梁象海中神山龜魚之屬其南有玉堂璧門大鳥之屬立神明臺井幹樓度五十丈輦道相屬焉三年春正月上東巡海上考神仙之屬皆無驗令祠官禮東泰山夏四月還修封泰山禪石閭天漢三年春三月上行幸泰山修封祀明堂因受計還祠常山瘞玄玉方士之候祠神人入海求蓬萊者終無有驗而公孫卿猶以大人迹為解天子益怠厭方士之怪迂語矣然猶羈縻不絶冀遇其真自此之後方士言神祠者彌衆然其效可睹矣征和四年春正月上行幸東萊臨大海欲浮海見神山羣臣諌上弗聼而大風晦冥海水沸湧上留十餘日不得御樓船乃還三月上耕于巨定還幸泰山修封庚寅祀于明堂癸巳禪石閭見羣臣上乃言曰朕即位以來所為狂悖使天下愁苦不可追悔自今事有傷害百姓糜費天下者悉罷之田千秋曰方士言神仙者甚衆而無顯功臣請皆罷斥遣之上曰大鴻臚言是也於是悉罷諸方士候神人者是後上每對羣臣自歎嚮時愚惑為方士所欺天下豈有仙人盡妖妄耳節食服藥差可少病而已夏六月還幸甘泉後元二年春正月上朝諸侯王于甘泉宫二月行幸盩厔五柞宫丁卯帝崩于五柞宫臣光曰孝武窮奢極欲繁刑重斂內侈宫室外事四夷信惑神怪巡遊無度使百姓疲敝起為盜賊其所以異於秦始皇者無幾矣然秦以之亡漢以之興者孝武能尊先王之道知所統守受忠直之言惡人欺蔽好賢不倦誅賞嚴明晚而改過顧託得人此其所以有亡秦之失而免亡秦之禍乎巫蠱之禍漢武帝太始三年皇子弗陵生弗陵母曰河間趙倢妤居鉤弋宫任身十四月而生上曰聞昔堯十四月而生今鉤弋亦然乃命其所生門曰堯母門臣光曰為人君者動靜舉措不可不慎發於中必形於外天下無不知之當是時也皇后太子皆無恙而命鉤弋之門曰堯母非名也是以姦臣逆探上意知其竒愛少子欲以為嗣遂有危皇后太子之心卒成巫蠱之禍悲夫趙人江充為水衡都尉初充為趙敬肅王客得罪於太子丹亡逃詣闕告趙太子隂事太子坐廢上召充入見充容貌魁岸被服輕靡上竒之與語政事大悅由是有寵拜為直指繡衣使者使督察貴戚近臣踰侈者充舉劾無所避上以為忠直所言皆中意嘗從上甘泉逢太子家使乘車馬行馳道中充以屬吏太子聞之使人謝充曰非愛車馬誠不欲令上聞之以教敇亡素者唯江君寬之充不聼遂白奏上曰人臣當如是矣大見信用威震京師征和元年夏上居建章宫見一男子帶劒入中龍華門疑其異人命收之男子捐劒走逐之弗獲上怒斬門候冬十一月發三輔騎士大搜上林閉長安城門索十一日乃解巫蠱始起丞相公孫賀夫人君孺衛皇后姊也賀由是有寵賀子敬聲代父為太僕驕奢不奉法擅用北軍錢千九百萬發覺下獄是時詔捕陽陵大俠朱安世甚急賀自請逐捕安世以贖敬聲罪上許之後果得安世安世笑曰丞相禍及宗矣遂從獄中上書告敬聲與陽石公主私通且上甘泉使巫當馳道埋偶人祝詛上有惡言二年春正月下賀獄案驗父子死獄中家族閏四月諸邑公主陽石公主及皇后弟子長平侯伉皆坐巫蠱誅初上年二十九乃生戾太子甚愛之及長性仁恕溫謹上嫌其材能少不類已而所幸王夫人生子閎李姬生子旦胥李夫人生子髆皇后太子寵寖衰常有不自安之意上覺之謂大將軍青曰漢家庶事草創加四夷侵陵中國朕不變更制度後世無法不出師征伐天下不安為此者不得不勞民若後世又如朕所為是襲亡秦之迹也太子敦重好靜必能安天下不使朕憂欲求守文之主安有賢於太子者乎聞皇后與太子有不安之意豈有之邪可以意曉之大將軍頓首謝皇后聞之脫簮請罪太子每諫征伐四夷上笑曰吾當其勞以逸遺汝不亦可乎上每行幸常以後事付太子宫內付皇后有所平決還白其最上亦無異有時不省也上用法嚴多任深刻吏太子寬厚多所平反雖得百姓心而用法大臣皆不悅皇后恐久獲罪每戒太子宜留取上意不應擅有所縱捨上聞之是太子而非皇后羣臣寬厚長者皆附太子而深酷用法者皆毁之邪臣多黨與故太子譽少而毁多衛青薨後臣下無復外家為據競欲御名太上太子上與諸子疏皇后希得見太子嘗謁皇后移日乃出黃門蘇文告上曰太子與宫人戲上益太子宫人滿二百人太子後知之心銜文文與小黃門常融王弼等常微伺太子過輒增加白之皇后切齒使太子白誅文等太子曰第勿為過何畏文等上聰明不信邪侫不足憂也上嘗小不平使常融召太子融言太子有喜色上默然及太子至上察其貌有涕泣處而佯語笑上怪之更微問知其情乃誅融皇后亦善自防間避嫌疑雖久無寵尚被禮遇是時方士及諸神巫多聚京師率皆左道惑衆變幻無所不為女巫往來宫中教美人度厄每屋輒埋木人祭祀之因妬忌恚詈更相告訐以為祝詛上無道上怒所殺後宫延及大臣死者數百人上心既以為疑嘗晝寢夢木人數千持杖欲擊上上驚寤因是體不平遂苦忽忽善忘江充自以與太子及衛氏有隙見上年老恐晏駕後為太子所誅因是為姦言上疾祟在巫蠱於是上以充為使者治巫蠱獄充將胡巫掘地求偶人捕蠱及夜祠視鬼染汙令有處輒收捕驗治燒鐵鉗灼強服之民轉相誣以巫蠱吏輒劾以大逆無道自京師三輔連及郡國坐而死者前後數萬人是時上春秋髙疑左右皆為蠱祝詛有與無莫敢訟其寃者充既知上意因胡巫檀何言宫中有蠱氣不除之上終不差上乃使充入宫中省中壞御座掘地求蠱又使按道侯韓説御史章贛黃門蘇文等助充充先治後宫希幸夫人以次及皇后太子宫掘地縱橫太子皇后無復施床處充云於太子宫得木人尤多又有帛書所言不道當奏聞太子懼問少傅石德德懼為師傅并誅因謂太子曰前丞相父子兩公主及衛氏皆坐此今巫與使者掘地得徴驗不知巫置之邪將實有也無以自明可矯以節收捕充等繫獄窮治其姦詐且上疾在甘泉皇后及家吏請問皆不報上存亡未可知而姦臣如此太子將不念秦扶蘇事邪太子曰吾人子安得擅誅不如歸謝幸得無罪太子將往之甘泉而江充持太子甚急太子計不知所出遂從石德計秋七月壬午太子使客詐為使者收捕充等按道侯説疑使者有詐不肯受詔客格殺説太子自臨斬充罵曰趙虜前亂乃國王父子不足邪乃復亂吾父子也又炙胡巫上林中太子使舍人無且持節夜入未央宫殿長秋門因長御倚華具白皇后發中廏車載射士出武庫兵發長樂宫衛卒長安擾亂言太子反蘇文迸走得亡歸甘泉説太子無狀上曰太子必懼又忿充等故有此變乃使使召太子使者不敢進歸報云太子反已成欲斬臣臣逃歸上大怒丞相屈氂聞變挺身逃亡其印綬使長史乘疾置以聞上問丞相何為對曰丞相祕之未敢發兵上怒曰事籍籍如此何謂祕也丞相無周公之風矣周公不誅管蔡乎乃賜丞相璽書曰捕斬反者自有賞罰以牛車為櫓毋接短兵多殺傷士衆堅閉城門毋令反者得出太子宣言告令百官云帝在甘泉病困疑有變姦臣欲作亂上於是從甘泉來幸城西建章宫詔發三輔近縣兵部中二千石以下丞相兼將之太子亦遣使者矯制赦長安中都官囚徒命少傅石德及賔客張光等分將使長安囚如侯持節發長水及宣曲胡騎皆以裝會侍郎馬通使長安因追捕如侯告胡人曰節有詐勿聽也遂斬如侯引騎入長安又發楫棹士以豫大鴻臚商丘成初漢節純赤以太子持赤節故更為黃旄加上以相别太子立車北軍南門外召護北軍使者任安與節令發兵安拜受節入閉門不出太子引兵去毆四市人凡數萬衆至長樂西闕下逢丞相軍合戰三日死者數萬人血流入溝中民間皆云太子反以故衆不附太子丞相附兵寖多庚寅太子兵敗南奔覆盎城門司直田仁部閉城門以為太子父子之親不欲急之太子由是得出亡丞相欲斬仁御史大夫暴勝之謂丞相曰司直吏二千石當先請奈何擅斬之丞相釋仁上聞而大怒下吏責問御史大夫曰司直縱反者丞相斬之法也大夫何以擅止之勝之惶恐自殺詔遣宗正劉長執金吾劉敢奉策收皇后璽綬后自殺上以為任安老吏見兵事起欲坐觀成敗見勝者合從之有兩心與田仁皆要斬上以馬通獲如侯長安男子景建從通獲石德商丘成力戰獲張光封通為重合侯建為德侯成為秺侯諸太子賓客嘗出入宫門皆坐誅其隨太子發兵以反法族吏士劫略者皆徙燉煌郡以太子在外始置屯兵長安諸城門上怒甚羣下憂懼不知所出壺關三老茂上書曰臣聞父者猶天母者猶地子猶萬物也故天平地安物乃茂成父慈母愛子乃孝順今皇太子為漢適嗣承萬世之業體祖宗之重親則皇帝之宗子也江充布衣之人閭閻之隸臣耳陛下顯而用之銜至尊之命以迫蹴皇太子造飾姦詐羣邪錯謬是以親戚之路鬲塞而不通太子進則不得見上退則困於亂臣獨寃結而無告不忍忿忿之心起而殺充恐懼逋逃子盜父兵以救難自免耳臣竊以為無邪心詩曰營營青蠅止于藩愷悌君子無信讒言讒言罔極交亂四國往者江充讒殺趙太子天下莫不聞陛下不省察深過太子發盛怒舉大兵而求之三公自將智者不敢言辨士不敢説臣竊痛之唯陛下寬心慰意少察所親毋患太子之非亟罷甲兵無令太子久亡臣不勝惓惓出一旦之命待罪建章宫下書奏天子感寤然尚未顯言赦之也太子亡東至湖藏匿泉鳩里主人家貧常賣屨以給太子太子有故人在湖聞其冨贍使人呼之而發覺八月辛亥吏圍捕太子太子自度不得脫即入室距戶自經山陽男子張富昌為卒足踏開戶新安令史李壽趨抱解太子主人公遂格鬭死皇孫二人皆并遇害上既傷太子乃封李夀為邘侯張冨昌為題侯初上為太子立博望苑使通賔客從其所好故賔客多以異端進者臣光曰古之明王教養太子為之擇方正敦良之士以為保傅師友使朝夕與之遊處左右前後無非正人出入起居無非正道然猶有淫放邪僻而陷於禍敗者焉今乃使太子自通賓客從其所好夫正直難親諂諛易合此固中人之常情宜太子之不終也三年九月吏民以巫蠱相告言者案驗多不實上頗知太子惶恐無它意會髙寢郎田千秋上急變訟太子寃曰子弄父兵罪當笞天子之子過誤殺人當何罪哉臣嘗夢見一白頭翁教臣言上乃大感寤召見千秋謂曰父子之間人所難言也公獨明其不然此髙廟神靈使公教我公當遂為吾輔佐立拜千秋為大鴻臚而族滅江充家焚蘇文於橫橋上及泉鳩里加兵刃於太子者初為北地太守後族上憐太子無辜乃作思子宫為歸來望思之臺於湖天下聞而悲之昭帝始元五年春正月有男子乘黃犢車詣北闕自謂衛太子公車以聞詔使公卿將軍中二千石雜識視長安中吏民聚觀者數萬人右將軍勒兵闕下以備非常丞相御史中二千石至者立莫敢發言京兆尹不疑後到叱從吏收縛或曰是非未可知且安之不疑曰諸君何患於衛太子昔蒯聵違命出奔輒距而不納春秋是之衛太子得罪先帝亡不即死今來自詣此罪人也遂送詔獄天子與大將軍霍光聞而嘉之曰公卿大臣當用有經術明於大誼者繇是不疑名聲重於朝廷在位者皆自以不及也廷尉驗治何人竟得姦詐本夏陽人姓成名方遂居湖以卜筮為事有故太子舍人嘗從方遂卜謂曰子狀貌甚似衛太子方遂心利其言冀得以富貴坐誣罔不道要斬燕蓋謀逆漢武帝後元元年燕王旦自以次第當為太子上書求入宿衛上怒斬其使於北闕又坐藏匿亡命削良鄉安次文安三縣上由是惡旦旦辨慧博學其弟廣陵王胥有勇力而皆動作無法度多過失故上皆不立二年春正月上病篤乙丑詔立弗陵為皇太子丁卯帝崩于五柞宫昭帝始元元年初武帝崩賜諸侯王璽書燕王旦得書不肯哭曰璽書封小京師疑有變遣幸臣壽西長孫縱之王孺等之長安以問禮儀為名隂刺候朝廷事及有詔褒賜旦錢三十萬益封萬三千戶旦怒曰我當為帝何賜也遂與宗室中山哀王子長齊孝王孫澤等結謀詐言以武帝時受詔得職吏事修武備備非常郎中成軫謂旦曰太王失職獨可起而索不可坐而得也大王一起國中雖女子皆奮臂隨大王旦即與澤謀為姦書言少帝非武帝子大臣所共立天下宜共伐之使人傳行郡國以搖動百姓澤謀歸發兵臨災殺青州刺史雋不疑旦招來郡國姦人賦斂銅鐵作甲兵數閲其車騎材官卒發民大獵以講士馬須期日郎中韓義等數諌旦旦殺義等凡十五人會瓶侯成知澤等謀以告雋不疑八月不疑收捕澤等以聞天子遣大鴻臚丞治連引燕王有詔以燕王至親勿治而澤等皆伏誅二年春正月封大將軍光為博陸侯左將軍桀為安陽侯三年初霍光與上官桀相親善光每休沐出桀常代光入決事光女為桀子安妻生女年甫五嵗安欲因光內之宫中光以為尚幼不聽蓋長公主私近子客河間丁外人安素與外人善説外人曰安子容貌端正誠因長主時得入為后以臣父子在朝而有椒房之重成之在於足下漢家故事常以列侯尚主足下何憂不封侯乎外人喜言於長主長主以為然詔召安女入為倢妤安為騎都尉四年春三月甲寅立皇后上官氏赦天下是嵗上官安為車騎將軍五年夏六月封上官安為桑樂侯安日以驕淫受賜殿中對賔客言與我壻飲大樂見其服飾使人歸欲自燒物子病死仰而罵天其頑悖如此元鳳元年上官桀父子既尊盛德長公主欲為丁外人求封侯霍光不許又為外人求光祿大夫欲令得召見又不許長主大以是怨光而桀安數為外人求官爵弗能得亦慙又桀妻父所幸充國為大醫監闌入殿中下獄當死冬月且盡蓋主為充國入馬二十匹贖罪乃得減死論於是桀安父子深怨光而重德蓋主自先帝時桀已為九卿位在光右及父子並為將軍皇后親安女光乃其外祖而顧專制朝事由是與光爭權燕王旦自以帝兄不得立常懷怨望及御史大夫桑弘羊建造酒榷鹽鐵為國興利伐其功欲為子弟得官亦怨恨光於是蓋主桀安弘羊皆與旦通謀旦遣孫縱之等前後十餘輩多齎金寶走馬賂遺蓋主桀弘羊等桀等又詐令人為燕王上書言光出都肄郎羽林道上稱蹕太官先置又引蘇武使胸奴二十年不降乃為典屬國大將軍長史敞無功為搜粟都尉又擅調益莫府校尉光專權自恣疑有非常臣旦願歸符璽入宿衛察姦臣變候司光出沐日奏之桀欲從中下其事弘羊當與諸大臣共執退光書奏帝不肯下明旦光聞之止畫室中不入上問大將軍安在左將軍桀對曰以燕王告其罪故不敢入有詔召大將軍光入免冠頓首謝上曰將軍冠朕知是書詐也將軍無罪光曰陛下何以知之上曰將軍之廣明都郎近耳調校尉以來未能十日燕王何以得知之且將軍為非不須校尉是時帝年十四尚書左右皆驚而上書者果亡捕之甚急桀等懼白上小事不足遂上不聽後桀黨與有譖光者上輒怒曰大將軍忠臣先帝所屬以輔朕身敢有毁者坐之自是桀等不敢復言李德𥙿論曰人君之德莫大於至明明以照姦則百邪不能蔽矣漢昭帝是也周成王有慙德矣髙祖文景俱不如也成王聞管蔡流言遂使周公狼跋而東漢髙聞陳平去魏背楚欲捨腹心臣漢文惑季布使酒難近罷歸股肱郡疑賈生擅權紛亂復踈賢士景帝信誅朝錯兵解遂戮三公所謂執狐疑之心來讒賊之口使昭帝得伊吕之佐則成康不足侔矣桀等謀令長公主置酒請光伏兵格殺之因廢帝迎立燕王為天子旦置驛書往來相報許立桀為王外連郡國豪傑以千數旦以語相平平曰大王前與劉澤結謀事未成而發覺者以劉澤素夸好侵陵也平聞左將軍素輕昜車騎將軍少而驕臣恐其如劉澤時不能成又恐既成反大王也旦曰前日一男子詣闕自謂故太子長安中民趣鄉之正歡不可止大將軍恐出兵陳之以自備耳我帝長子天下所信何憂見反後謂羣臣蓋主報言獨患大將軍與右將軍王莽今右將軍物故丞相病幸事必成徴不久令羣臣皆裝安又謀誘燕王至而誅之因廢帝而立桀或曰當如皇后何安曰逐麋之狗當顧菟邪且用皇后為尊一旦人主意有所移雖欲為家人亦不可得此百世之一時也會蓋主舍人父稻田使者燕倉知其謀以告大司農楊敞敞素謹畏事不敢言乃移病卧以告諌大夫杜延年延年以聞九月詔丞相部中二千石逐捕孫縱之及桀安弘羊外人等并宗族悉誅之蓋主自殺燕王旦聞之夻相平曰事敗遂發兵乎平曰左將軍巳死百姓皆知之不可發也王憂悶置酒與羣臣妃妾别會天子以璽書讓旦旦以綬自絞死后夫人隨旦自殺者二十餘人天子加恩赦王太子建為庶人賜旦諡曰剌王皇后以年少不與謀亦霍光外孫故得不廢通鑑紀事本末卷第三
