  text: 通鑑紀事本末卷第十三
  hash: sha256:499e0c7ea73e447f714e24186a5eaf4f909e24928cf523052e63ca0052553871
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0001_SBCK_013-1a}
body:
  text: 劉淵據平陽殺太弟義附漢靈帝中平五年春三月詔發南胸奴兵配劉虞討張純單于羌渠遣左賢王將騎詣幽州國人恐發兵無巳於是右部醯落反與屠各胡合凡十餘萬人攻殺羌渠國人立其子右賢王於扶羅為持至尸逐侯單于六年初南單于於扶羅既立國人殺其父者遂叛兵立須卜骨都侯為單于於扶羅詣闕自訟會靈帝崩天下大亂於扶羅將數千騎與白波賊合兵寇郡縣時民皆保聚鈔掠無利而兵遂挫傷復欲歸國國人不受乃止河東平陽須卜骨都侯為單于一年而死南庭遂虛其位以老王行國事獻帝興平二年冬十二月南單于於扶羅死弟呼廚泉立居于平陽建安二十一年秋七月南單于呼廚泉入朝于魏魏王操因留之於鄴使右賢王去卑監其國單于嵗給綿絹錢穀如列侯子孫傳襲其號分其衆為五部各立其貴人為帥選漢人為司馬以監督之魏邵陵厲公嘉平三年初南胸奴自謂其先本漢室之甥因冒姓劉氏太祖留單于呼厨泉於鄴分其衆為五部居并州境內左賢王豹單于於扶羅之子也為左部帥部族最強城陽太守鄧艾上言單于在內羌夷失統合散無主今單于之尊日疏而外土之威日重則胡虜不可不深備也聞劉豹部有叛胡可因叛割為二國以分其藝去卑功顯前朝而子不繼業宜加其子顯號使居鴈門離國弱冦追録舊勳此御邊長計也又陳羌胡與民同處者宜以漸出之使居民表以崇亷恥之教塞姦宄之路司馬師皆從之晉武帝泰始六年初魏人居南胸奴五部於并州諸郡與中國民雜居自謂其先漢氏外孫因改姓劉氏咸寧五年初南單于呼廚泉以兄於扶羅子豹為左賢王及魏武帝分胸奴為五部以豹為左部帥豹子淵幼而俊異師事上黨崔遊博習經史嘗謂同門生上黨朱紀鴈門范隆曰吾常恥隨陸無武絳灌無文隨陸遇髙帝而不能建封侯之業絳灌遇文帝而不能興庠序之教豈不惜哉於是兼學武事及長猿臂善射膂力過人姿貌魁偉為任子在洛陽王渾及子濟皆重之屢薦於帝帝召與語恱之濟曰淵有文武長才陛下任以東南之事吳不足平也孔恂楊珧曰非我族類其心必異淵才器誠少比然不可重任也及涼州覆沒帝問將於李喜對曰陛下誠能發胸奴五部之衆假劉淵一將軍之號使將之而西樹機能之首可指日而梟也孔恂曰淵果梟樹機能則涼州之患方更深耳帝乃止東萊王彌家丗二千石彌有學術勇略善騎射青州人謂之飛豹然喜任俠處士陳留董養見而謂之曰君好亂樂禍若天下有事不作士大夫矣淵與彌友善謂彌曰王李以鄉曲見知每相稱薦適足為吾患耳因歔欷流涕齊王攸聞之言於帝曰陛下不除劉淵臣恐并州不得久安王渾曰大晉方以信懷殊俗奈何以無形之疑殺人侍子乎何德度之不弘也帝曰渾言是也會豹卒以淵代為左部帥太康十年冬十一月詔以劉淵為胸奴北部都尉淵輕財好施傾心接物五部豪傑幽冀名儒多往歸之惠帝永熙元年冬十月以劉淵為建威將軍胸奴五部大都督永興元年初太弟頴表胸奴左賢王劉淵為冠軍將軍監五部軍事使將兵在鄴淵子聰驍勇絶人博涉經史善屬文彎弓三百斤弱冠遊京師名士莫不與交頴以聰為積弩將軍淵從祖右賢王宣謂其族人曰自漢亡以來我單于徒有虛號無復尺土自餘王侯降同編户今吾衆雖衰猶不減二萬奈何斂手受役奄過百年左賢王英武超世天茍不欲興胸奴必不虛生此人也今司馬氏骨肉相殘四海鼎沸復呼韓邪之業此其時矣乃相與謀推淵為大單于使其黨呼延攸詣鄴告之淵白頴請歸會葬頴弗許淵令攸先歸告宣等使招集五部及雜胡聲言助頴實欲叛之王浚東嬴公騰攻頴淵請歸發五部兵以擊浚騰頴許之淵至左國城宣等上大單于號二旬之間有衆五萬都于離石淵聞頴去鄴命劉景等將兵擊鮮卑劉宣等諌而止晉之亂事並見西冬十月劉淵遷都左國城胡晉歸之者愈衆淵謂羣臣曰昔漢有天下久長恩結於民吾漢氏之甥約為兄弟兄亡弟紹不亦可乎乃建國號曰漢劉宣等請上尊號淵曰今四方未定且可依髙祖稱漢王於是即漢王位大赦改元曰元熙追尊安樂公禪為孝懷皇帝作漢三祖五宗神主而祭之立其妻呼延氏為王后以右賢王宣為丞相崔遊為御史大夫左於陸王宏為太尉范隆為大鴻臚朱紀為太常上黨崔懿之後部人陳元達皆為黃門郎族子曜為建武將軍遊固辭不就元達少有志操淵嘗招之元達不答及淵為漢王或謂元達曰君其懼乎元達笑曰吾知其人久矣彼亦亮吾之心但恐不過三二日驛書必至其暮淵果徵元達元達事淵屢進忠言退而削草雖子弟莫得知也曜生而眉白目有赤光幼聰慧有膽量早孤養於淵及長儀觀魁偉性拓落髙亮與衆不羣好讀書善屬文鐡厚一寸射而洞之常自比樂毅及蕭曹時人莫之許也惟劉聰重之曰永明漢世祖魏武之流數公何足道哉懷帝永嘉二年冬十月甲戌漢王淵即皇帝位大赦改元永鳯十一月以其子和為大將軍聰為車騎大將軍族子曜為龍驤大將軍十二月乙亥漢主淵以大將軍和為大司馬封梁王尚書令歡樂為大司徒封陳留王后父御史大夫呼延翼為大司空封鴈門郡公宗室以親疏悉封郡縣王異姓以功伐悉封郡縣公侯三年春正月徙都平陽大赦改元河瑞五月漢主淵封子裕為齊王隆為魯王漢主淵遣楚王聰等寇洛陽軍失利淵召聰等還晉之亂事見西十二月漢主淵以陳留王歡樂為太傅楚王聰為大司徒江都王延年為大司空遣都護大將軍曲陽王賢與征北大將軍劉靈安北將軍趙固平北將軍王桑東屯內黃王彌表左長史曹嶷行安東將軍東徇青州且迎其家淵許之四年春正月漢王淵立單徵女為皇后梁王和為皇太子大赦封子義為北海王以長樂王洋為大司馬秋七月庚午漢主淵寢疾辛未以陳留王歡樂為太宰長樂王洋為太傅江都王延年為太保楚王聰為大司馬大單于並録尚書事置單于臺於平陽西以齊王裕為大司徒魯王隆為尚書令北海王義為撫軍大將軍領司隸校尉始安王曜為征討大都督領單于左輔廷尉喬智明為冠軍大將軍領單于右輔光祿大夫劉殷為左僕射王育為右僕射任顗為吏部尚書朱紀為中書監護軍馬景領左衛將軍永安王安國領右衛將軍安昌王盛安邑王欽西陽王璿皆領武衛將軍分典禁兵丁丑淵召太宰歡樂等入禁中受遺詔輔政己卯淵卒太子和即位和性猜忌無恩宗正呼延攸翼之子也淵以其無才行終身不遷官侍中劉乘素惡楚王聰衛尉西昌王鋭恥不預顧命乃相與謀説和曰先帝不惟輕重之藝使三王揔強兵於內大司馬擁十萬衆屯於近郊陛下便為寄坐耳宜早為之計和攸之甥也深信之幸巳夜召安昌王盛安邑王欽等告之盛曰先帝梓宫在殯四王未有逆節一旦自相魚肉天下謂陛下何且大業甫爾陛下勿信讒夫之言以疑兄弟兄弟尚不可信他人誰足信哉攸鋭怒之曰今日之議理無有二領軍是何言乎命左右刃之盛既死欽懼曰惟陛下命壬午鋭帥馬景攻楚王聰于單于臺攸帥永安王安國攻齊王裕于司徒府乘帥安邑王欽攻魯王隆使尚書田密武衛將軍劉璿攻北海王義密璿挾義斬關歸于聰聰命貫甲以待之鋭知聰有備馳還與攸乘共攻隆裕攸乘疑安國欽有異志殺之是日斬裕癸未斬隆甲申聰攻西明門克之鋭等走入南宫前鋒隨之乙酉殺和於光極西室收鋭攸乘梟首通衢羣臣請聰即帝位聰以北海王義單后之子也以位讓之義涕泣固請聰久而許之曰義及羣公正以禍難尚殷貪孤年長故耳此家國之事孤何敢辭俟義年長當以大業歸之遂即位大赦改元光興尊單氏曰皇太后其母張氏曰帝太后以義為皇太弟領大單于大司徒立其妻呼延氏為皇后呼延氏淵后之從父妹也封其子粲為河內王易為河間王翼為彭城王悝為髙平王仍以粲為撫軍大將軍都督中外諸軍事以石勒為并州刺史封汲郡公九月辛未葬漢主淵于永光陵諡曰光文皇帝廟號髙祖漢主聰自以越次而立忌其嫡兄恭因恭寢穴其壁間刺而殺之漢太后單氏卒漢主聰尊母張氏為皇太后單氏年少美色聰蒸焉太弟義屢以為言單氏慙恚而死義寵由是漸衰然以單氏故尚未之廢也呼延后言於聰曰父死子繼古今常道陛下承髙祖之業太弟何為者哉陛下百年後粲兄弟必無種矣聰曰然吾當徐思之呼延氏曰事留變生太弟見粲兄弟浸長必有不安之志萬一有小人交構其間未必不禍發于今日也聰心然之義舅光祿大夫單沖泣謂義曰踈不間親主上有意於河內王矣殿下何不避之義曰河瑞之末王上自惟嫡庶之分以大位讓義義以主上齒長故相推奉天下者髙祖之天下兄終弟及何為不可粲兄弟既壯猶今日也且子弟之間親踈詎幾主上寧可有此意乎愍帝建興二年春正月聰置丞相等七公又置輔漢等十六大將軍各配兵二千以諸子為之又置左右司隸各領户二十餘萬萬户置一內史單于左右輔各主六夷十萬落萬落置一都尉左右選曹尚書並典選舉自司隸以下六官皆位亞僕射以其子粲為丞相領大將軍録尚書事進封晉王江都王延年録尚書六條事汝隂王景為太師王育為太傅任顗為太保馬景為大司徒朱紀為大司空中山王曜為大司馬十一月漢主聰以晉王粲為相國大單于揔百揆粲少有俊才自為宰相驕奢専恣逺賢親佞嚴刻愎諌國人始惡之三年三月雨血於漢東宫延明殿太弟義惡之以問太傳崔瑋太保許遐瑋遐説義曰主上往日以殿下為太弟者欲以安衆心耳其志在晉王久矣王公已下莫不希旨附之今復以晉王為相國羽儀威重踰於東宫萬機之事無不由之諸王皆置營兵以為羽翼事藝已去殿下非徒不得立也朝夕且有不測之危不如早為之計今四衛精兵不減五千相國輕佻正煩一刺客耳大將軍無日不出其營可襲而取餘王並幼固易奪也苟殿下有意二萬精兵指顧可得鼓行入雲龍門宿衛之士孰不倒戈以迎殿下者大司馬不慮其為異也義弗從東宫舍人荀裕告瑋遐勸義謀反漢主聰收瑋遐於詔獄假以他事殺之使冠威將軍卜抽將兵監守東宫禁義不聽朝會義憂懼不知所為上表乞為庶人并除諸子之封褒美晉王請以為嗣抽抑而弗通四年漢中常侍王沈宣懷中宫僕射郭猗等皆寵幸用事漢主聰遊宴後宫或三日不醒或百日不出自去冬不視朝政事一委相國粲唯殺生除拜乃使沈等入白之沈等多不白而自以其私意決之故勳舊或不敘而姦佞小人有數日至二千石者軍旅嵗起將士無錢帛之賞而後宫之家賜及僮僕動至數千萬沈等車服第舍踰於諸王子弟中表為守令者三十餘人皆貪殘為民害靳凖闔宗諂事之郭猗與凖皆有怨於太弟義猗謂相國粲曰殿下光文帝之世孫主上之嫡子四海莫不屬心奈何欲以天下與太弟乎且臣聞太弟與大將軍謀因三月上已大宴作亂事成許以主上為太上皇大將軍為皇太子又許衛將軍為大單于二王處不疑之地並握重兵以此舉事無不成者然二王有一時之利不顧父兄事成之後主上豈有全理殿下兄弟固不待言東宫相國單于當在武陵兄弟何肯與人也今禍期甚迫宜早圗之臣屢言於主上主上篤於友愛以臣刀鋸之餘終不之信願殿下勿泄密表其狀殿下儻不信臣言可召大將軍從事中郎王皮衛軍司馬劉悙假之恩意許其歸首以問之必可知也粲許之猗密謂皮悙曰二王逆狀主上及相國具知之矣卿同之乎二人驚曰無之猗曰兹事已決吾憐卿親舊并見族耳因歔欷流涕二人大懼叩頭求哀猗曰吾為卿計卿能用之乎相國問卿卿但云有之若責卿不先啓卿即云臣誠負死罪然仰惟主上寬仁殿下敦睦苟言不見信則陷於誣譛不測之誅故不敢言也皮悙許諾粲召問之二人至不同時而其辭若一粲以為信然靳凖復説粲曰殿下宜自居東宫以領相國使天下早有所繫今道路之言皆云大將軍衛將軍欲奉太弟為變期以季春若使太弟得天下殿下無容足之地矣粲曰為之奈何準曰人告太弟為變主上必不信宜緩東宫之禁使賔客得往來太弟雅好待士必不以此為嫌輕薄小人不能無迎合太弟之意為之謀者然後下官為殿下露表其罪殿下收其賔客與太弟交通者考問之獄辭既具則主上無不信之理也粲乃命卜抽引兵去東宫少府陳休左衛將軍卜崇為人清直素惡沈等雖在公座未嘗與語沈等深疾之侍中卜幹謂休崇曰王沈等藝力足以回天地卿輩自料親賢孰與竇武陳蕃休崇曰吾輩年踰五十職位已崇唯欠一死耳死於忠義乃為得所安能俯首低眉以事閹豎乎去矣卜公勿復有言二月漢主聰出臨上秋閣命收陳休卜崇及特進綦母達太中大夫公師彧尚書王琰田歆大司農朱諧並誅之皆宦官所惡也卜幹泣諌曰陛下方側席求賢而一旦戮卿大夫七人皆國之忠良無乃不可乎藉使休等有罪陛下不下之有司暴明其狀天下何從知之詔尚在臣所未敢宣露願陛下熟思之因叩頭流血王沈叱幹曰卜侍中欲拒詔乎聰拂衣而入免幹為庶人太宰河間王易大將軍勃海王敷御史大夫陳元達金紫光祿大夫西河王延等皆詣闕表諌曰王沈等矯弄詔旨欺誣日月內諂陛下外佞相國威權之重侔於人主多樹姦黨毒流海內知休等忠臣為國盡節恐發其姦狀故巧為誣陷陛下不察遽加極刑痛徹天地賢愚傷懼今遺晉未殄巴蜀不賔石勒謀據趙魏曹嶷欲王全齊陛下心腹四支何處無患乃復以沈等助亂誅巫咸戮扁鵲臣恐遂成膏肓之疾後雖救之不可及已請免沈等官付有司治罪聰以表示沈等笑曰羣兒為元逹所引遂成癡也沈等頓首泣曰臣等小人過蒙陛下識拔得灑掃閨閣而王公朝士疾臣等如讎又深恨陛下願以臣等膏鼎鑊則朝廷自然雍穆矣聰曰此等狂言常然卿何足恨乎聰問沈等於相國粲粲盛稱沈等忠清聰恱封沈等為列侯太宰易又詣闕上疏極諌聰大怒手壞其疏三月易忿恚而卒易素忠直陳元達倚之為援得盡諌爭及卒元達哭之慟曰人之云亡邦國殄瘁吾既不復能言安用默默苟生乎歸而自殺九月漢主宴羣臣於光極殿引見太弟義義容貌憔悴鬢髮蒼然涕泣陳謝聰亦為之慟哭乃縱酒極歡待之如初元帝建武元年春三月漢相國粲使其黨王平謂太弟義曰適奉中詔云京師將有變宜衷甲以備非常義信之命宫臣皆衷甲以居粲馳遣告靳準王沈準以白漢主聰曰太弟將為亂已衷甲矣聰大驚曰寧有是邪王沈等皆曰臣等聞之久矣屢言之而陛下不之信也聰使粲以兵圍東宫粲使準沈收氏羌酋長十餘人窮問之皆懸首髙格燒鐡灼目酋長自誣與義謀反聰謂沈等曰吾今而後知卿等之忠也當念知無不言勿恨往日言而不用也於是誅東宫官屬及義素所親厚準沈等素所憎怨者大臣數十人坑士卒萬五千餘人夏四月廢義為北部王粲尋使準賊殺之義形神秀爽寬仁有器度故士心多附之聰聞其死哭之慟曰吾兄弟止餘二人而不相容安得使天下知吾心邪秋七月漢主聰立晉王粲為皇太子領相國大單于揔攝朝政如故大赦大興元年夏四月漢中常侍王沈養女有美色漢主聰立以為左皇后尚書令王鑒中書監崔懿之中書令曹恂諌曰臣聞王者立后比德乾坤生承宗廟沒配后土必擇世德名宗幽間令淑乃副四海之望稱神祇之心孝成帝以趙飛燕為后使繼嗣絶滅社稷為墟此前鑑也自麟嘉以來中宫之位不以德舉借使沈之弟女刑餘小醜猶不可以塵汙椒房况其家婢邪六宫妃嬪皆公子公孫奈何一旦以婢主之臣恐非國家之福也聰大怒使中常侍宣懷謂太子粲曰鑒等小子狂言侮慢無復君臣上下之禮其速考實於是收鑒等送市皆斬之金紫光祿大夫王延馳將入諌門者弗通鑒等臨刑王沈以杖叩之曰庸奴復能為惡乎乃公何與汝事鑒瞋目叱之曰豎子滅大漢者正坐汝鼠輩與靳準耳要當訴汝於先帝取汝於地下治之準謂鑒曰吾受詔收君有何不善君言漢滅由吾也鑒曰汝殺皇太弟使主上獲不友之名國家畜養汝輩何得不滅懿之謂準曰汝心如梟鏡必為國患汝既食人人亦當食汝慕容據鄴晉武帝太康二年初鮮卑莫護跋始自塞外入居遼西棘城之北號曰慕容部莫護跋生木延木延生涉歸遷於遼東之北世附中國數從征討有功拜大單于冬十月涉歸始寇昌黎三年三月安北將軍嚴詢敗慕容涉歸於昌黎斬獲萬計四年鮮卑慕容涉歸卒弟刪篡立將殺涉歸子廆廆亡匿於遼東徐郁家六年慕容刪為其下所殺部衆復迎涉歸子廆而立之涉歸與宇文部素有隙廆請討之朝廷弗許廆怒入寇遼西殺略甚衆帝遣幽州軍討廆戰于肥如廆衆大敗自是每嵗犯邊又東擊扶餘扶餘王依慮自殺子弟走保沃沮廆夷其國城驅萬餘人而歸七年夏慕容廆寇遼東故扶餘王依慮子依羅求帥見人還復舊國請援於東夷校尉何龕龕遣督護賈沈將兵送之廆遣其將孫丁帥騎邀之於路沈力戰斬丁遂復扶餘十年夏四月慕容廆遣使請降五月詔拜廆鮮卑都督廆謁見何龕以士大夫禮巾衣詣門龕嚴兵以見之廆乃改服戎衣而入人問其故廆曰主人不以禮待客客何為哉龕聞之甚慙深敬異之時鮮卑宇文氏假氏方強數侵掠廆廆卑辭厚幣以事之假國單于階以女妻廆生皓仁昭廆以遼東僻逺徙居徒河之青山惠帝元康四年慕容廆徙居大棘城太安元年鮮卑宇文單于莫圭部衆強盛遣其弟屈雲攻慕容廆廆擊其别帥素怒延破之素怒延恥之復發兵十萬圍廆於棘城廆衆皆懼廆曰素怒延兵雖多而無法制已在吾算中矣諸君但為力戰無所憂也遂出擊大破之追奔百里俘斬萬計遼東孟暉先沒於宇文部帥其衆數千家降於廆廆以為建威將軍廆以其臣慕輿句勤恪亷靖使掌府庫句心計默識不案簿書始終無漏以慕輿河明敏精審使典獄訟覆訊清允懷帝永嘉元年冬十二月慕容廆自稱鮮卑大單于拓跋猗盧與廆通好三年初遼東太守龎本襲殺東夷校尉李臻詔以勃海封釋代之釋收斬本五年初東夷校尉李臻之死也遼東附塞鮮卑素喜連木丸津託為臻報仇攻陷諸縣殺掠士民屢敗郡兵連年為寇東夷校尉封釋不能討請與連和連津不從民失業歸慕容廆者甚衆廆廩給遣還願留者即撫存之廆少子鷹揚將軍翰言於廆曰自古有為之君莫不尊天子以從民望成大業今連津外以龎本為名內實幸災為亂封使君已誅本請和而寇暴不已中原離亂州師不振遼東荒散莫之救恤單于不若數其罪而討之上則興復遼東下則并吞二部忠義彰於本朝私利歸於我國此霸王之基也廆笑曰孺子乃能及此乎遂帥衆東擊連津以翰為前鋒破斬之盡併二部之衆得所掠民三千餘家及前歸廆者悉以付郡遼東賴以復存封釋疾病屬其孫奕於廆釋卒廆召奕與語説之曰竒士也補小都督釋子冀州王簿悛幽州參軍抽來奔喪廆見之曰此家抎抎千斤犍也以道不通喪不得還皆留仕廆廆以抽為長史悛為參軍王浚以妻舅崔毖為東夷校尉愍帝建興元年初中國士民避亂者多北依王浚浚不能存撫又政法不立士民往往復去之段氏兄弟專尚武勇不禮士大夫唯慕容廆政事修明愛重人物故士民多歸之廆舉其英俊隨才授任以河東裴嶷北平陽耽廬江黃泓代郡魯昌為謀主廣平遊邃北海逢羡北平西方虔西河宋奭及封抽裴開為股肱平原宋該安定皇甫岌岌弟真蘭陵繆愷昌黎劉斌及封奕封裕典機要裕抽之子也裴嶷清方有幹略為昌黎太守兄武為玄菟太守武卒嶷與武子開以其喪歸過廆廆敬禮之及去厚加資送行及遼西道不通嶷欲還就廆開曰鄉里在南奈何北行且等為流寓假氏強慕容氏弱何必去此而就彼也嶷曰中國喪亂今往就之是相帥而入虎口也且道逺何由可達若俟其清通又非嵗月可冀今欲求託足之地豈可不慎擇其人汝觀諸假豈有逺略且能待國士乎慕容公修仁行義有霸王之志加以國豐民安今往從之髙可以立功名下可以庇宗族汝何疑焉開乃從之既至廆大喜陽耽清直沈敏為遼西太守慕容翰破假氏於陽樂獲之廆禮而用之遊邃逄羡宋奭皆嘗為昌黎太守與黃泓俱避地於薊後歸廆王浚屢以手書召邃兄暢暢欲赴之邃曰彭祖刑政不修華戎離叛以邃度之必不能久兄且磐桓以俟之暢曰彭祖忍而多疑頃者流民北來命所在追殺之今手書殷勤我稽留不往將纍及卿且亂世宗族宜分以冀遺種遂從之卒與浚俱沒宋該與平原杜羣劉翔先依王浚又依假氏皆以為不足託帥諸流寓同歸於廆東夷校尉崔毖請皇甫岌為長史卑辭説諭終莫能致廆招之岌與弟真即時俱至遼東張統據樂浪帶方二郡與髙句麗王乙弗利相攻連年不解樂浪王遵説統帥其民千餘家歸廆廆為之置樂浪郡以統為太守遵參軍事元帝建武元年三月晉王以鮮卑大都督慕容廆為都督遼左雜夷流民諸軍事龍驤將軍大單于昌黎公廆不受征虜將軍魯昌説廆曰今兩亰覆沒天子蒙塵琅邪王承制江東為四海所係屬明公雖雄據一方而諸部猶阻兵未服者蓋以官非王命故也謂宜通使琅邪勸承大統然後奉詔令以伐有罪誰敢不從處士遼東髙詡曰霸王之資非義不濟今晉室雖微人心猶附之宜遣使江東示有所尊然後杖大義以征諸部不患無辭矣廆從之遣長史王濟浮海詣建康勸進大興元年三月帝復遣使授慕容廆龍驤將軍大單于昌黎公廆辭公爵不受廆以遊邃為龍驤長史劉翔為主簿命邃創定府朝儀法裴嶷言於廆曰晉室衰微介居江表威德不能及逺中原之亂非明公不能拯也今諸部雖各擁兵然皆頑愚相聚宜以漸并取以為西討之資廆曰君言大非孤所及也然君中朝名德不以孤僻陋而教誨之是天以君賜孤而祐其國也乃以嶷為長史委以軍國之謀諸部弱小者稍稍擊取之二年平州刺史崔毖自以中州人望鎮遼東而士民多歸慕容廆心不平數遣使招之皆不至意廆拘留之乃隂説髙句麗假氏宇文氏使共攻之約滅廆分其地毖所親勃海髙瞻力諫毖不從三國合兵伐廆諸將請擊之廆曰彼為崔毖所誘欲邀一切之利軍藝初合其鋒甚鋭不可與戰當固守以挫之彼烏合而來既無統一莫相歸服久必攜二一則疑吾與毖詐而覆之二則三國自相猜忌待其人情離二然後擊之破之必矣三國進攻棘城廆閉門自守遣使獨以牛酒犒宇文氏二國疑宇文氏與廆有謀各引兵歸宇文大人悉獨官曰二國雖歸吾當獨取之宇文氏士卒數十萬連營四十里廆使召其子翰於徒河翰遣使白廆曰悉獨官舉國為寇彼衆我寡易以計破難以力勝今城中之衆足以禦寇翰請為竒兵於外伺其間而擊之內外俱奮使彼震駭不知所備破之必矣今并兵為一彼得專意攻城無復它虞非䇿之得者也且示衆以怯恐士氣不戰先沮矣廆猶疑之遼東韓夀言於廆曰悉獨官有慿陵之志將驕卒惰軍不堅密若竒兵卒起掎其無備必破之䇿也廆乃聽翰留徒河悉獨官聞之曰翰素名驍果今不入城或能為患當先取之城不足憂乃分遣數千騎襲翰翰知之詐為假氏使者逆於道曰慕容翰久為吾患聞當擊之吾已嚴兵相待宜速進也使者既去翰即出城設伏以待之宇文氏之騎見使者大喜馳行不復設備進入伏中翰奮擊盡獲之乘勝徑進遣間使語廆出兵大戰廆使其子皓與長史裴嶷將精鋭為前鋒自將大兵繼之悉獨官初不設備聞廆至驚悉衆出戰前鋒始交翰將千騎從旁直入其營縱火焚之衆皆惶擾不知所為遂大敗悉獨官僅以身免廆盡俘其衆獲皇帝玉璽三紐崔毖聞之懼使其兄子燾詣棘城偽賀會三國使者亦至請和曰非我本意崔平州教我耳廆以示燾臨之以兵燾懼首服廆乃遣燾歸謂毖曰降者上策走者下策也引兵隨之毖與數十騎棄家奔髙句麗其衆悉降於廆廆以其子仁為征虜將軍鎮遼東官府市里案堵如故髙句麗將如奴子據于河城廆遣將軍張統掩擊擒之俘其衆千餘家以崔燾髙瞻韓恆石琮歸于棘城待以客禮恆安平人琮鑒之孫也廆以髙瞻為將軍瞻稱疾不就廆數臨候之撫其心曰君之疾在此不在它也今晉室喪亂孤欲與諸君共清世難翼戴帝室君中州望族宜同斯願奈何以華夷之異介然踈之哉夫立功立事惟問志略何如耳華夷何足問乎瞻猶不起廆頗不平龍驤主簿宋該與瞻有隙勸廆除之廆不從瞻以憂卒宋該勸廆獻捷江東廆使該為表裴嶷奉之並所得三璽詣建康獻之三年三月裴嶷至建康盛稱慕容廆之威德賢俊皆為之用朝廷始重之帝謂嶷曰卿中朝名臣當留江東朕别詔龍驤送卿家屬嶷曰臣少蒙國恩出入省闥若得復奉輦轂臣之至榮但以舊京淪沒山陵穿毁雖名臣宿將莫能雪恥獨慕容龍驤竭忠王室志除凶逆故使臣萬里歸誠今臣來而不返必謂朝廷以其僻陋而棄之孤其嚮義之心使懈體於討賊此臣之所甚惜是以不敢徇私而忘公也帝曰卿言是也乃遣使隨嶷拜廆安北將軍平州刺史四年十二月以慕容廆為都督幽平二州東夷諸軍事車騎將軍平州牧封遼東公單于如故遣謁者即授印綬聽承制置官司守宰廆於是備置僚屬以裴嶷遊邃為長史裴開為司馬韓夀為别駕陽耽為軍咨祭酒崔燾為主簿黃泓鄭林參軍事廆立子皓為世子作東橫以平原劉讃為祭酒使皓與諸生同受業廆得暇亦親臨聽之皓雄毅多權略喜經術國人稱之廆徙慕容翰鎮遼東慕容仁鎮平郭翰撫安民夷甚有威惠仁亦次之成帝咸和六年冬慕容廆遣使與太尉陶侃箋勸以興兵北伐共清中原僚屬宋該等共議以廆立功一隅位卑任重等差無别不足以鎮華夷宜表請進廆官爵參軍韓恆駮曰夫立功者患信義不著不患名位不髙桓文有匡復之功不先求禮命以令諸侯宜繕甲兵除羣凶功成之後九錫自至比於邀君以求寵不亦榮乎廆不悅出恆為新昌令於是東夷校尉封抽等疏上侃府請封廆為燕王行大將軍事侃復書曰夫功成進爵古之成制也車騎雖未能為官摧勒然忠義竭誠今騰箋上聽可不遲速當在天臺也八年夏五月甲寅遼東武宣公慕容廆卒六月世子皓以平北將軍行平州刺史督攝部內赦繫囚以長史裴開為軍咨祭酒郎中令髙詡為玄菟太守皓以帶方太守王誕為左長史誕以遼東太守陽騖為才而讓之皓從之以誕為右長史秋七月慕容皓遣長史勃海王濟等來告喪九年秋八月王濟還遼東詔遣侍御史王齊祭遼東公廆又遣謁者徐孟策拜慕容皓鎮軍大將軍平州刺史大單于遼東公持節都督承制封拜一如廆故事咸康元年秋七月慕容皓立子俊為世子冬十月王齊南還十二月慕容皓始受朝命二年秋九月慕容皓遣長史劉斌兼郎中令遼東陽景送徐孟等還建康三年秋九月鎮軍左長史封奕等勸慕容皓稱燕王皓從之於是備置羣司以封奕為國相韓夀為司馬裴開為奉常陽騖為司隸王宇為太僕李洪為大理杜羣為納言令宋該劉睦石琮為常伯皇甫真陽協為冗騎常侍宋晃平熙張泓為將軍封裕為記室監洪臻之孫晃奭之子也冬十月丁卯皓即燕王位大赦十一月甲寅追尊武宣公曰武宣王夫人假氏曰武宣后立夫人假氏為王后世子俊為王太子如魏武晉文輔政故事四年十二月燕王皓討假遼討假遼事見燕五年燕王皓自以稱王未受晉命冬遣長史劉翔參軍鞠運來獻捷論功且言權假之意并請刻期大舉共平中原七年春正月燕王皓使唐國內史陽裕等築城於桞城之北龍山之西立宗廟宫闕命曰龍城二月劉翔至建康帝引見問慕容鎮軍平安對曰臣受遣之日朝服拜章翔為燕王皓求大將軍燕王章璽朝議以為故事大將軍不處邊自漢魏以來不封異姓為王所求不可許翔曰自劉石􅌟亂長江以北翦為戎藪未聞中華公卿之胄有一人能攘臂揮戈摧破凶逆者也獨慕容鎮軍父子竭力心存本朝以寡擊衆屢殄強敵使石虎畏懼悉徙邊陲之民散居三魏蹙國千里以薊城為北境功烈如此而惜海北之地不以為封邑何哉昔漢髙祖不愛王爵於韓彭故能成其帝業項羽玩印不忍授卒用危亡吾之至心非苟欲尊其所事竊惜聖朝踈忠義之國使四海無所勸慕耳尚書諸葛恢翔之姊夫也獨主異議以為夷狄相攻中國之利惟器與名不可輕許乃謂翔曰借使慕容鎮軍能除石虎乃是復得一石虎也朝廷何賴焉翔曰嫠婦猶知恤宗周之隕今晉室阽危君位侔元凱曾無憂國之心邪嚮使靡鬲之功不立則少康何以祀夏桓文之戰不捷則周人皆為左祍矣慕容鎮軍枕戈待旦志殄凶逆而君更唱邪惑之言忌間忠臣四海所以未一良由君輩耳翔留建康嵗餘衆議終不決翔乃説中常侍彧弘曰石虎苞八州之地帶甲百萬志吞江漢自索頭宇文暨諸小國無不臣服惟慕容鎮軍翼戴天子精貫白日而更不獲殊禮之命竊恐天下移心解體無復南向者矣公孫淵無尺寸之益於吳吳主封為燕王加以九錫今慕容鎮軍屢摧賊鋒威振秦隴虎比遣重使甘言厚幣欲授以曜威大將軍遼西王慕容鎮軍惡其非正却而不受今朝廷乃矜惜虛名沮抑忠順豈社稷之長計乎後雖悔之恐無及已弘為之入言於帝帝意亦欲許之會皓上表稱庾氏兄弟擅權召亂宜加斥退以安社稷又與庾冰書責其當國秉權不能為國雪恥冰甚懼以其絶逺非所能制乃與何充奏從其請乙卯以慕容皓為使持節大將軍都督河北諸軍事幽州牧大單于燕王備物典策皆從殊禮又以其世子俊為假節安北將軍東夷校尉左賢王賜軍資器械以千萬計又封諸功臣百餘人以劉翔為代郡太守封臨泉鄉侯加貟外散騎常侍翔固辭不受翔疾江南士大夫以驕奢酣縱相尚嘗因朝貴宴集謂何充等曰四海板蕩奄踰三紀宗社為墟黎民塗炭斯乃廟堂焦慮之時忠臣畢命之秋也而諸君宴安江沱肆情縱欲以奢靡為榮以傲誕為賢謇諤之言不聞征伐之功不立將何以尊主濟民乎充等甚慙詔遣兼大鴻臚郭悕持節詣棘城册命燕王與翔等偕北公卿餞于江上翔謂諸公曰昔少康資一旅以滅有窮句踐慿會稽以報強吳蔓草猶宜早除況寇讎乎今石虎李夀志相吞噬王師縱未能澄清北方且當從事巴蜀一旦石虎先人舉事併夀而有之據形便之地以臨東南雖有智者不能善其後矣中護軍謝廣曰是吾心也秋七月郭悕劉翔等至燕燕王皓以翔為東夷護軍領大將軍長史以唐國內史陽裕為左司馬典書令李洪為右司馬中尉鄭林為軍咨祭酒八年冬十月燕王皓遷都龍城赦其境內成李據蜀晉惠帝元康八年初張魯在漢中賨人李氏自巴西宕渠往依之魏武帝克漢中李氏將五百餘家歸之拜為將軍遷于略陽北土號曰巴氐其孫特庠流皆有材武善騎射性任俠州黨多附之及齊萬年反關中荐飢略陽天水等六郡民流移就榖入漢川者數萬家道路有疾病窮乏者特兄弟常營護振救之由是得衆心流民至漢中上書求寄食巴蜀朝議不許遣侍御史李苾持節慰勞且監察之不令入劔閣苾至漢中受流民賂表言流民十萬餘口非漢中一郡所能振贍蜀有倉儲人復豐稔宜令就食朝廷從之由是散在梁益不可禁止李特至劔閣太息曰劉禪有如此地面縛於人豈非庸才邪聞者異之永康元年冬十一月詔徵益州刺史趙廞為大長秋以成都內史中山耿滕為益州刺史廞賈后之姻親也聞徵甚懼且以晉室衰亂隂有據蜀之志乃傾倉廩賑流民以收衆心以李特兄弟材武其黨類皆巴西人與廞同郡厚遇之以為爪牙特等慿恃廞藝專聚衆為盜蜀人患之滕數密表流民剛剽蜀人愞弱主不能制客必為亂階宜使還本居若留之險地恐秦雍之禍更移於梁益矣廞聞而惡之州被詔書遣文武千餘人迎滕是時成都治少城益州治太城廞猶在太城未去滕欲入州功曹陳恂諫曰今州郡􅌟怨日深入城必有大禍不如留少城以觀其變檄諸縣合村保以備秦氐陳西夷行至且當待之不然退保犍為西渡江源以防非常滕不從是月帥衆入州廞遣兵逆之戰于西門滕敗死郡吏皆竄走惟陳恂面縛詣廞請滕喪廞義而許之廞又遣兵逆西夷校尉陳揔揔至江陽聞廞有異志主簿蜀郡趙模曰今州郡不協必生大變當速行赴之府是兵要助順討逆誰敢動者揔更緣道停留比至南安魚涪津已遇廞軍模白揔散財募士以拒戰若克州軍則州可得不克順流而退必無害也揔曰趙益州忿耿侯故殺之與吾無嫌何為如此模曰今州起事必當殺君以立威雖不戰無益也言至垂涕揔不聽衆遂自潰揔逃草中模著揔服格戰廞兵殺模見其非是更搜求得揔殺之廞自稱大都督大將軍益州牧署置僚屬改易守令王官被召無敢不往李庠帥妹壻李含天水任回上官晶扶風李攀始平費他氐符成隗伯等四千騎歸廞廞以庠為威寇將軍封陽泉亭侯委以心膂使招合六郡壯勇至萬餘人以斷北道永寧元年春正月李庠驍勇得衆心趙廞浸忌之而未言長史蜀郡杜淑張粲説廞曰將軍起兵始爾而遽遣李庠握強兵於外非我族類其心必異此倒戈授人也宜早圗之會庠勸廞稱尊號淑粲因白廞以庠大逆不道引斬之并其子姪十餘人時李特李流皆將兵在外廞遣人慰撫之曰庠非所宜言罪應死兄弟罪不相及復以特流為督將特流怨廞引兵歸綿竹廞牙門將涪陵許弇求為巴東監軍杜淑張粲固執不許弇怒手殺淑粲於廞閣下淑粲左右復殺弇三人皆廞之腹心也廞由是遂衰廞遣長史犍為費逺蜀郡太守李苾督護常俊督萬餘人斷北道屯綿竹之石亭李特密收兵得七千餘人夜襲逺等軍燒之死者什八九遂進攻成都費逺李苾及軍祭酒張微夜斬關走文武盡散廞獨與妻子乘小船走至廣都為從者所殺特入成都縱兵大掠遣使詣洛陽陳廞罪狀初梁州刺史羅尚聞趙廞反表廞素非雄才蜀人不附敗亡可計日而待詔拜尚平西將軍益州刺史督牙門將王敦蜀郡太守徐儉廣漢太守辛冉等七千餘人入蜀特等聞尚來甚懼使其弟驤於道奉迎并獻珍玩尚恱以驤為騎督特流復以牛酒勞尚於綿竹王敦辛冉説尚曰特等專為盜賊宜因會斬之不然必為後患尚不從冉與特有舊謂特曰故人相逢不吉當凶矣特深自猜懼三月尚至成都初朝廷符下秦雍州使召還流民入蜀者又遣御史馮該張昌督之李特兄輔自略陽至蜀言中國方亂不足復還特然之纍遣天水閻式詣羅尚求權停至秋又納賂於尚及馮該尚該許之朝廷論討趙廞功拜特宣威將軍弟流奮威將軍皆封侯璽書下益州條列六郡流民與特同討廞者將加封賞廣漢太守辛冉欲以滅廞為已功寢朝命不以實上衆咸怨之羅尚遣從事督遣流民限七月上道時流民布在梁益為人傭力聞州郡逼遣人人愁怨不知所為且水潦方盛年榖未登無以為行資特復遣閻式詣尚求停至冬辛冉及犍為太守李苾以為不可尚舉别駕蜀郡杜韜秀才式為韜説逼移利害韜亦欲寬流民一年尚用冉苾之謀不從韜乃致秀才板出還家冉性貪暴欲殺流民首領取其資貨乃與苾白尚言流民前因趙廞之亂多所剽掠宜因移設關以奪取之尚移書令梓潼太守張演於諸要施關搜索寶貨特數為流民請留流民皆感而恃之多相帥歸特特乃結大營於綿竹以處流民移辛冉求自寬冉大怒遣人分榜通衢購募特兄弟許以重賞特見之悉取以歸與弟驤改其購云能送六郡之豪李任閻趙楊上官及氐叟侯王一首賞百匹於是流民大懼歸特者愈衆旬月間過二萬人流亦聚衆數千人特又遣閻式詣羅尚求申期式見營柵衝要謀掩流民歎曰民心方危今而速之亂將作矣又知辛冉李苾意不可回乃辭尚還綿竹尚謂式曰子且以吾意告諸流民今聽寬矣式曰明公惑於姦説恐無寬理弱而不可輕者民也今趣之不以理衆怒難犯恐為禍不淺尚曰然吾不欺子子其行矣式至綿竹言於特曰尚雖云爾然未可信也何者尚威刑不立冉等各擁強兵一旦為變亦非尚所能制深宜為備特從之冬十月特分為二營特居北營流居東營繕甲厲兵戒嚴以待之冉苾相與謀曰羅侯貪而無斷日復一日令流民得展姦計李特兄弟並有雄才吾屬將為所虜矣宜為決計羅侯不足復問也乃遣廣漢都尉曽元牙門張顯劉並等潛帥步騎三萬襲特營羅尚聞之亦遣督護田佐助元元等至特安卧不動待其衆半入發伏擊之死者甚衆殺田佐曽元張顯傳首以示尚冉尚謂將佐曰此虜成去矣而廣漢不用吾言以張賊藝今若之何於是六郡流民李含等共推特行鎮北大將軍承制封拜以其弟流行鎮東大將軍號東督護以相鎮統又以兄輔為票騎將軍弟驤為驍騎將軍進兵攻冉於廣漢尚遣李苾費逺帥衆救冉畏特不敢進冉出戰屢敗潰圍奔德陽特入據廣漢以李超為太守進兵攻尚於成都尚以書諭閻式式復書曰辛冉傾巧曾元小豎李叔平非將帥之材式前為節下及杜景文論留徙之宜人懷桑梓孰不願之但往日初至隨穀庸賃一室五分復值秋潦乞須冬熟而終不見聽繩之太過窮鹿抵虎流民不肯延頸受刀以致為變即聽式言寬使治嚴不過去九月盡集十月進道今達鄉里何有如此也特以兄輔弟驤子始蕩雄及李含含子國離任回李攀攀弟恭上官晶任臧楊褒上官悙等為將帥閻式李逺等為僚佐羅尚素貪殘為百姓患特與蜀民約法三章施捨振貸禮賢拔滯軍政肅然蜀民大悅尚頻為特所敗乃阻長圍緣郫水作營連延七百里與特相拒求救於梁州及南夷校尉太安元年夏五月河間王顒遣督護衙博討李特軍于梓潼朝廷復以張微為廣漢太守軍于德陽羅尚遣督護張龜軍于繁城特使其子鎮軍將軍蕩等襲博而自將擊龜破之蕩敗博兵於陽沔梓潼太守張演委城走巴西丞毛植以郡降蕩進攻博於葭萌博走其衆盡降河間王顒更以許雄為梁州刺史特自稱大將軍益州牧都督梁益二州諸軍事秋八月李特攻張微微擊破之遂進攻特營李蕩引兵救之山道險狹蕩力戰而前遂破微兵特欲還涪蕩及司馬王幸諫曰微軍已敗智勇俱竭宜乘鋭氣遂禽之特復進攻微殺之生禽微子存以微喪還之特以其將寋碩守德陽李驤軍毗橋羅尚遣軍擊之屢為驤所敗驤遂進攻成都燒其門李流軍成都之北尚遣精勇萬人攻驤驤與流合擊大破之還者什一二許雄數遣軍攻特不勝特藝益盛建寧大姓李睿毛詵逐太守杜俊朱提大姓李猛逐太守雍約以應特衆各數萬南夷校尉李毅討破之斬詵李猛奉箋降而辭意不遜毅誘而殺之二年春正月李特潛渡江擊羅尚水上軍皆散走蜀郡太守徐儉以少城降特入據之惟取馬以供軍餘無侵掠赦其境內改元建初羅尚保太城遣使求和於特蜀民相聚為塢者皆送款於特特遣使就撫之以軍中糧少乃分六郡流民於諸塢就食李流言於特曰諸塢新附人心未固宜質其大姓子弟聚兵自守以備不虞又與特司馬上官悙書曰納降如待敵不可易也前將軍雄亦以為言特怒曰大事已定但當安民何為更逆加疑忌使之離叛乎朝廷遣荆州刺史宗岱建平太守孫阜帥水軍三萬以救羅尚岱以阜為前鋒進逼德陽特遣李蕩及蜀郡太守李璜就德陽太守任臧共拒之岱阜軍藝甚盛諸塢皆有二志益州兵曹從事蜀郡任睿言於羅尚曰李特散衆就食驕怠無備此天亡之時也宜密約諸塢刻期同發內外擊之破之必矣尚使睿夜縋出城宣旨於諸塢期以二月十日同擊特睿因詣特詐降特問城中虛實睿曰糧儲將盡但餘貨帛耳睿求出省家特許之遂還報尚二月尚遣兵掩襲特營諸塢皆應之特兵大敗斬特及李輔李逺皆焚尸傳首洛陽流民大懼李流李蕩李雄收餘衆還保赤祖流自稱大將軍大都督益州牧保東營蕩雄保北營孫阜破德陽獲寋碩任臧退屯涪陵三月羅尚遣督護何沖常深等攻李流涪陵民藥紳等亦起兵攻流流與李驤拒深使李蕩李雄拒紳何沖乘虛攻北營氐符成隗伯在營中叛應之蕩母羅氏擐甲拒戰伯手刃傷其目羅氏氣益壯營垂破會流等破深紳引兵還與沖等戰大破之成伯帥其黨突出詣尚流等乘勝進抵成都尚復閉城自守蕩馳馬逐北中矛而死朝廷遣侍中燕國劉沈假節統羅尚許雄等軍討李流行至長安河間王顒留沈為軍師遣席薳代之李流以李特李蕩繼死宗岱孫阜將至甚懼李含勸流降流從之李驤李雄迭諌不納夏五月流遣其子世及含子胡為質於阜軍胡兄離為梓潼太守聞之自郡馳還欲諌不及退與雄謀襲阜軍雄曰為今計當如是而二翁不從奈何離曰當劫之耳雄大喜乃共説流民曰吾屬前已殘暴蜀民今一旦束手便為魚肉惟有同心襲阜以取富貴耳衆皆從之雄遂與離襲擊阜軍大破之會宗岱卒於墊江荆州軍遂退流甚慙由是竒雄才軍事悉以任之六月李雄攻殺汶山太守陳圗遂取郫城秋七月李流徙屯郫蜀民皆保險結塢或南入寧州或東下荆州城邑皆空野無煙火流虜掠無所得士衆飢乏唯涪陵千餘家依青城山處士范長生平西參軍涪陵徐輿説羅尚求為汶山太守邀結長生與共討流尚不許輿怒出降於流流以輿為安西將軍輿説長生使資給流軍糧長生從之流軍由是復振九月李流疾篤謂諸將曰驍騎仁明固足以濟大事然前軍英武殆天所相可共受事於前軍流卒衆推李雄為大都督大將軍益州牧治郫城雄使武都朴泰紿羅尚使襲郫城云已為內應尚使隗伯將兵攻郫泰約舉火為應李驤伏兵於道泰出長梯於外隗伯兵見火起爭緣梯上驤縱兵擊大破之追奔夜至城下詐稱萬嵗曰已得郫城矣入少城尚乃覺之退保太城隗伯創甚雄生獲之赦不殺李驤攻犍為斷尚運道獲太守龔恢殺之閏十二月李雄急攻羅尚尚軍無食留牙門張羅守城夜由牛鞞水東走羅開門降雄入成都軍士飢甚乃帥衆就榖於郪掘野芋而食之許雄坐討賊不進徵即罪永興元年春正月羅尚逃至江陽遣使表狀詔尚權統巴東巴郡涪陵以供軍賦尚遣别駕李興詣鎮南將軍劉弘求糧弘綱紀以運道阻逺且荆州自空乏欲以零陵米五千斛與尚弘曰天下一家彼此無異吾今給之則無西顧之憂矣遂以三萬斛給之尚賴以自存李雄以范長生有名德為蜀人所重欲迎以為君而臣之長生不可諸將固請雄即尊位冬十月雄即成都王位大赦改元曰建興除晉法約法七章以其叔父驤為太傳兄始為太保李離為太尉李雲為司徒李璜為司空李國為太宰閻式為尚書令楊褒為僕射尊母羅氏為王太后追尊父特為成都景王雄以李國李離有智謀凡事必咨而後行然國離事雄彌謹十一月羅尚移屯巴郡遣兵掠蜀中獲李驤妻咱氏及子夀光熙元年春三月范長生詣成都成都王雄門迎執板拜為丞相尊之曰范賢夏六月成都王雄即皇帝位大赦改元曰晏平國號大成追尊父特曰景皇帝廟號始祖尊王太后曰皇太后以范長生為天地太師復其部曲皆不豫征稅諸將恃恩互爭班位尚書令閻式上疏請考漢晉故事立百官制度從之張氏據涼晉惠帝永寧元年春正月以散騎常侍安定張軌為涼州刺史軌以時方多難隂有保據河西之志故求為涼州時州境盜賊縱橫鮮卑為寇軌至以宋配汜瑗為謀主悉討破之威著西土懷帝永嘉二年春二月涼州刺史張軌病風口不能言使其子茂攝州事隴西內史晉昌張越涼州大族欲逐軌而代之與其兄酒泉太守鎮及西平太守曹祛謀遣使詣長安告南陽王模稱軌廢疾請以秦州刺史賈龕代之龕將受之其兄讓龕曰張涼州一時名士威著西州汝何德以代之龕乃止鎮祛上疏更請刺史未報遂移檄廢軌以軍司杜耽攝州事使耽表越為刺史軌下教欲避位歸老宜陽長史王融參軍孟暢踏折鎮檄排閣入言曰晉室多故明公撫寧西夏張鎮兄弟敢肆凶逆當鳴鼓誅之遂出戒嚴會軌長子實自京師還乃以實為中督護將兵討鎮遣鎮甥太府主簿令狐亞先往説鎮為陳利害鎮流涕曰人誤我乃詣實歸罪實南擊曹祛走之朝廷得鎮祛疏以侍中袁瑜為涼州刺史治中楊淡馳詣長安割耳盤上訴軌之被誣南陽王模表請停瑜武威太守張琠亦上表留軌詔依模所表且命誅曹袪軌於是命實帥步騎三萬討袪斬之張越奔鄴涼州乃定五月詔封張軌西平郡公軌辭不受時州郡之使莫有至者軌獨遣使貢獻嵗時不絶四年十一月詔加張軌鎮西將軍都督隴右諸軍事光祿大夫傅祗太常摯虞遺軌書告以京師飢匱軌遣參軍杜勳獻馬五百匹毯布三萬匹六年春三月涼州主簿馬魴説張軌宜命將出師翼戴帝室軌從之馳檄關中共尊輔秦王且言今遣前鋒督護宋配帥步騎二萬徑趨長安西中郎將實帥中軍三萬武威太守張璵帥胡騎二萬絡繹繼發秋九月秦州刺史裴苞據險以拒涼州兵張實宋配等擊破之苞奔柔凶塢愍帝建興二年二月壬寅以張軌為太尉涼州牧封西平郡公朝廷以張軌老病拜其子實為副刺史夏五月西平武穆公張軌寢疾遺令文武將佐務安百姓上思報國下以寧家己丑軌薨長史張璽等表世子實攝父位冬十月以張實為都督涼州諸軍事涼州刺史西平公三年冬十月涼州軍士張冰得璽文曰皇帝行璽獻於張實僚屬皆賀實曰是非人臣所得留遣使歸於長安四年夏四月張實下令所部吏民有能舉其過者賞以布帛羊米賊曹佐髙昌隗瑾曰今明公為政事無巨細皆自決之或興師發令府朝不知萬一違失謗無所分羣下畏威受成而已如此雖賞之千金終不敢言也謂宜少損聰明凡百政事皆延訪羣下使各盡所懷然後采而行之則嘉言自至何必賞也實悅從之增瑾位三等實遣將軍王該帥步騎五千入援長安且送諸郡貢計詔拜實都督陜西諸軍事以實弟茂為秦州刺史元帝建武元年春正月黃門郎史淑侍御史王沖自長安奔涼州稱愍帝出降前一日使淑等齎詔賜張實拜實大都督涼州牧侍中司空承制行事且曰朕已詔琅邪王時攝大位君其協贊琅邪共濟多難淑等至姑臧實大臨三日辭官不受初實叔父肅為西海太守聞長安危逼請為先鋒入援實以其老弗許及聞長安不守肅悲憤而卒實遣太府司馬韓璞撫戎將軍張閬等帥步騎一萬東擊漢命討虜將軍陳安故太守賈騫隴西太守吳紹各統郡兵為前驅又遺相國保書曰王室有事不忘投軀前遣賈騫瞻公舉動中被符命敕騫還軍俄聞寇逼長安胡嵩不進麴允持金五百請救於嵩遂決遣騫等進軍度嶺會聞朝廷傾覆為忠不遂憤痛之深死有餘責今更遣璞等唯公命是從璞等卒不能進而還至南安諸羌斷路相持百餘日糧竭矢盡璞殺車中牛以饗士泣謂之曰汝曹念父母乎曰念念妻子乎曰念欲生還乎曰欲從我令乎曰諾乃鼓譟進戰會張閬帥金城兵繼至夾擊大破之斬首數千級先是長安謡曰秦川中血沒腕唯有涼州倚柱觀及漢兵覆關中氐羌掠隴右雍秦之民死者什八九獨涼州安全大興元年春三月實遣牙門蔡忠奉表詣建康比至帝已即位實不用江東年號猶稱建興三年夏六月京兆人劉弘客居涼州天梯山以妖術惑衆從受道者千餘人西平元公張實左右皆事之帳下閻涉牙門趙卬皆弘鄉人弘謂之曰天與我神璽應王涼州涉卬信之密與實左右十餘人謀殺實奉弘為主實弟茂知其謀請誅弘實令牙門將史初收之未至涉等懷刃而入殺實於外寢弘見史初至謂曰使君已死殺我何為初怒截其舌而囚之轘於姑臧市誅其黨與數百人左司馬隂元等以實子駿尚幼推張茂為涼州刺史西平公赦其境內以駿為撫軍將軍秋八月西平公張茂立兄子駿為世子四年春二月張茂築靈鈞臺基髙九仭武陵閻曾夜叩府門呼曰武公遣我來言何故勞民築臺有司以為妖請殺之茂曰吾信勞民曾稱先君之命以規我何謂妖乎乃為之罷役永昌元年冬十二月張茂使將軍韓璞帥衆取隴西南安之地置秦州明帝太寧元年八月趙主曜自隴上西擊涼州遣其將劉咸攻韓璞於冀城呼延晏攻寧羌護軍隂鑒於桑壁曜自將戎卒二十八萬軍于河上列營百餘里金鼓之聲動地河水為沸張茂臨河諸戍皆望風奔潰曜揚聲欲百道俱濟直抵姑臧涼州大震參軍馬岌勸茂親出拒戰長史汜褘怒請斬之岌曰汜公糟粕書生刺舉小才不思家國大計明公父子欲為朝廷誅劉曜有年矣今曜自至逺近之情共觀明公此舉當立信勇之驗以副秦隴之望力雖不敵藝不可以不出茂曰善乃出屯石頭茂謂參軍陳珍曰劉曜舉三秦之衆乘勝席卷而來將若之何珍曰曜兵雖多精卒至少大抵皆氐羌烏合之衆恩信未洽且有山東之虞安能捨其腹心之疾曠日持久與我爭河西之地邪若二旬不退珍請得弊卒數千為明公擒之茂喜使珍將兵救韓璞趙諸將爭欲濟河趙主曜曰吾軍藝雖盛然畏威而來者三分有二中軍疲困其實難用今但案甲勿動以吾威聲震之若出中旬張茂之表不至者吾為負卿矣茂尋遣使稱藩獻馬牛羊珍寶不可勝紀曜拜茂侍中都督涼南北秦梁益巴漢隴右西域雜夷胸奴諸軍事太師涼州牧封涼王加九錫張茂大城姑臧修靈鈞臺别駕吳紹諫曰明公所以修城築臺者蓋懲既往之患耳愚以為苟恩未洽於人心雖處層臺亦無所益適足以疑羣下忠信之志失士民繫託之望示怯弱之形啓鄰敵之謀將何以佐天子霸諸侯乎願亟罷兹役以息勞費茂曰亡兄一旦失身於物豈無忠臣義士欲盡節者哉顧禍生不意雖有智勇無所施耳王公設險勇夫重閉古之道也今國家未靖不可以太平之理責人於屯邅之世也卒為之二年夏五月甲申張荗疾病執世子駿手泣曰吾家世以孝友忠順著稱今雖天下大亂汝奉承之不可失也且下令曰吾官非王命苟以集事豈敢榮之死之日當以白帢入棺勿以朝服斂是日薨愍帝使者史淑在姑臧左長史汜褘右長史馬謨等使淑拜駿大將軍涼州牧西平公赦其境內前趙主曜遣使贈茂太宰謐曰成烈王拜駿上大將軍涼州牧涼王冬十二月涼州將辛晏據抱罕不服張駿將討之從事劉慶諌曰霸王之師必須天時人事相得然後乃起辛晏凶狂安忍其亡可必奈何以飢年大舉盛寒攻城乎駿乃止駿遣參軍王隲聘於趙趙主曜謂之曰貴州欵誠和好卿能保之乎隲曰不能侍中徐邈曰君來結好而云不能保何也隲曰齊桓貫澤之盟憂心兢兢諸侯不召自至葵丘之會振而矜之叛者九國趙國之化常如今日可也若政教陵遲尚未能察邇者之變况鄙州乎曜曰此涼州之君子也擇使可謂得人矣厚禮而遣之三年春二月張駿承元帝凶問大臨三日會黃龍見嘉泉汜禕等請改年以章休祥駿不許辛晏以枹罕降駿復收河南之地成帝咸和元年張駿畏趙人之逼是嵗徙隴西南安民二千餘家于姑臧又遣使修好於成以書勸成主雄去尊號稱藩於晉雄復書曰吾過為士大夫所推然本無心於帝王思為晉室元功之臣掃除氛埃而晉室陵遲德聲不振引領東望有年月矣會獲來貺情在暗至有何己巳自是聘使相繼二年夏五月張駿聞趙兵為後趙所敗乃去趙官爵復稱晉大將軍涼州牧遣武威太守竇濤金城太守張閬武興太守辛巖楊烈將軍宋輯等帥衆數萬東會韓璞攻掠趙秦州諸郡趙南陽王胤將兵擊之屯狄道枹罕護軍辛晏告急秋駿使韓璞辛巖救之璞進度沃干嶺巖欲速戰璞曰夏末以來日星數有變不可輕動且曜與石勒相攻胤必不能久與我相守也與胤夾洮相持七十餘日冬十月璞遣辛巖督運於金城胤聞之曰韓璞之衆十倍於吾吾糧不多難以持久今虜分兵運糧天授我也若敗辛巖璞等自潰乃帥騎三千襲巖于沃干嶺敗之遂前逼璞營璞衆大潰胤乘勝追奔濟河攻拔令居斬首二萬級進據振武河西大駭張閬辛晏帥其衆數萬降趙駿遂失河南之地三年張駿治兵欲乘虛襲長安理曹郎中索詢諌曰劉曜雖東征其子胤守長安未易輕也借使小有所獲彼若釋東方之圖還與我校禍難之期未可量也駿乃止五年夏五月張駿因前趙之亡復收河南地至于狄道置五屯護軍與趙分境六月趙遣鴻臚孟毅拜駿征西大將軍涼州牧加九錫駿恥為之臣不受留毅不遣七年涼州僚屬勸張駿稱涼王領秦涼二州牧置公卿百官如魏武晉文故事駿曰此非人臣所宜言也敢言此者罪不赦然境內皆稱之為王駿立次子重華為世子八年初張駿欲假道於成以通表建康成主雄不許駿乃遣治中從事張淳稱藩於成以假道雄偽許之將使盜覆諸東峽蜀人橋贊密以告淳淳謂雄曰寡君使小臣行無迹之地萬里通誠於建康者以陛下嘉尚忠義能成人之美故也若欲殺臣者當斬之都市宣示衆目曰涼州不忘舊德通使琅邪主聖臣明發覺殺之如此則義聲逺播天下畏威今使盜殺之江中威刑不顯何足以示天下乎雄大驚曰安有此邪司隸校尉景騫言於雄曰張淳壯士請留之雄曰壯士安肯留且試以卿意觀之騫謂淳曰卿體豐大天熱可且遣下吏小住須涼淳曰寡君以皇輿播越梓宫未返生民塗炭莫之振救故遣淳通誠上都所論事重非下吏所能傳使下吏可了則淳亦不來矣雖火山湯海猶將赴之豈寒暑之足憚哉雄謂淳曰貴主英名蓋世土險兵強何不亦稱帝自娛一方淳曰寡君祖考以來世篤忠貞以讎恥未雪枕戈待旦何自娛之有雄甚慙曰我之祖考本亦晉臣遭天下大亂與六郡之民避難此州為衆所推遂有今日琅邪若能中興大晉於中國者亦當帥衆輔之厚為淳禮而遣之淳卒致命於建康長安之失守也敦煌計吏耿訪自漢中入江東屢上書請遣大使慰撫涼州朝廷以訪守持書御史拜張駿鎮西大將軍選隴西賈陵等十二人配之訪至梁州道不通以詔書付賈陵詐為賈客以達之是嵗陵始至涼州駿遣部曲督王豐等報謝九年春二月丁卯詔遣耿訪王豐齎印綬授張駿大將軍都督陜西雍秦涼州諸軍事自是每嵗使者不絶咸康元年初張軌及二子實茂雖保據河右而軍旅之事無歲無之及張駿嗣位境內漸平駿勤修庶政揔御文武咸得其用民富兵強逺近稱之以為賢君駿遣將楊宣伐龜兹鄯善於是西域諸國焉耆于填之屬皆詣姑臧朝貢駿於姑臧南作五殿官屬皆稱臣駿有兼秦雍之志遣參軍麴護上疏以為勒雄既死虎期繼逆兆庶離主漸冉經世先老消落後生不識慕戀之心日逺日忘乞敕司空鑒征西亮等泛舟江沔首尾齊舉五年九月張駿立辟雍明堂以行禮十一月以世子重華行涼州事六年春三月張駿遣别駕馬詵入貢于趙表辭蹇傲趙王虎怒欲斬詵侍中石璞諫曰今國家所當先除者遺晉也河西僻陋不足為意今斬馬詵必征張駿則兵力分而為二建康復延數年之命矣乃止璞苞之曾孫也穆帝永和元年十二月張駿伐焉耆降之是嵗駿分武威等十一郡為涼州以世子重華為刺史分興晉等八郡為河州以寧戎校尉張瓘為刺史分敦煌等三郡及西域都護等三營為沙州以西胡校尉楊宣為刺史駿自稱大都督大將軍假涼王督攝三州始置祭酒郎中大夫舍人謁者等官官號皆倣天朝而微變其名車服旌旗擬於王者二年夏五月丙戍西平忠成公張駿薨官屬上世子重華為使持節大都督太尉護羌校尉涼州牧西平公假涼王赦其境內尊嫡母嚴氏為大王太后母馬氏為王太后趙將軍王擢擊張重華襲武街執護軍曹權胡宣徙七千餘户干雍州涼州刺史麻秋將軍孫伏都攻金城太守張沖請降涼州震動重華悉發境內兵使征南將軍裴恆將之以禦趙恆壁於廣武久而不戰涼州司馬張耽言於重華曰國之存亡在兵兵之勝敗在將今議者舉將多推宿舊夫韓信之舉非舊德也蓋明主之舉用無常人才之所堪則授以大事今強寇在境諸將不進人情危懼主簿謝艾兼資文武可用以禦趙重華召艾問以方略艾願請兵七千人必破趙以報重華拜艾中堅將軍給步騎五千使擊秋艾引兵出振武夜有二梟鳴于牙中艾曰六博得梟者勝今梟鳴牙中克敵之兆也進與趙戰大破之斬首五千級重華封艾為福祿伯三年夏四月趙涼州剌史麻秋攻枹罕晉昌太守郎坦以城大難守欲棄外城武成太守張悛曰棄外城則動衆心大事去矣寧戎校尉張璩從悛言固守大城秋帥衆八萬圍塹數重雲梯地突百道皆進城中禦之秋衆死傷數萬趙王虎復遣其將劉渾等帥步騎二萬會之郎坦恨言不用教軍士李嘉潛引趙兵千餘人登城璩督諸將力戰殺二百餘人趙兵乃退璩燒其攻具秋退保大夏虎以中書監石寧為征西將軍帥并司州兵二萬餘人為秋等後繼張重華將宋秦等帥戶二萬降于趙重華以謝艾為使持節軍師將軍帥步騎三萬進軍臨河艾乘軺車戴白幍鳴鼓而行秋望見怒曰艾年少書生冠服如此輕我也命黑矟龍驤三千人馳擊之艾左右大擾或勸艾宜乘馬艾不從下車踞胡牀指麾處分趙人以為有伏兵懼不敢進别將張瑁自間道引兵截趙軍後趙軍退艾乘藝進擊大破之斬其將杜勳汲魚獲首虜一萬三千級秋單馬奔大夏五月秋與石寧復帥衆十二萬進屯河南劉寧王擢略地晉興廣武武街至于曲栁張重華使將軍牛旋禦之退守枹罕姑臧大震重華欲親出拒之謝艾固諌别駕從事索遐曰君者一國之鎮不可輕動乃以艾為使持節都督征討諸軍事行衛將軍遐為軍正將軍帥步騎二萬拒之别將楊康敗劉寧于沙阜寧退屯金城秋七月趙王虎復遣征西將軍孫伏都將軍劉渾帥步騎二萬會麻秋軍長驅濟河擊張重華遂城長最謝艾建牙誓衆有風吹旌旗東南指索遐曰風為號令今旌旗指敵天所贊也艾軍于神鳥王擢與艾前鋒戰敗走還河南八月戊午艾進擊秋大破之秋遁歸金城虎聞之歎曰吾以偏師定九州今以九州之力困於枹罕彼有人焉未可圖也艾還討叛虜斯骨真等萬餘落皆破平之九月趙麻秋又襲張重華將張瑁敗之斬首三千餘級枹罕護軍李逵帥衆七千降于趙自河以南氐羌皆附於趙冬十月乙丑遣侍御史俞歸至涼州授張重華侍中大都督督隴右關中諸軍事大將軍涼州剌史西平公歸至姑臧重華欲稱涼王未肯受詔使所親沈猛私謂歸曰主公奕丗為晉忠臣今曾不如鮮卑何也朝廷封慕容皓為燕王而主公才為大將何以表勸忠賢乎明臺宜移河右共勸州主為涼王人臣出使苟利社稷專之可也歸曰吾子失言昔三代之王也爵之貴者莫若上公及周之衰吳楚始僣號稱王而諸侯亦不之非蓋以蠻夷畜之也借使齊魯稱王諸侯豈不四靣攻之乎漢髙祖封韓彭為王尋皆誅滅蓋權時之宜非厚之也聖上以貴公忠賢故爵以上公任以方伯寵榮極矣豈鮮卑夷狄所可比哉且吾聞之功有大小賞有重輕今貴公始繼丗而為王若帥河右之衆東平胡羯修復陵廟迎天子返洛陽將何以加之乎重華乃止五年秋九月涼州官屬共上張重華為丞相涼王雍秦涼三州牧重華屢以錢帛賜左右寵臣又喜博奕頗廢政事徵事索振諌曰先王夙夜勤儉以實府庫正以讎耻未雪志平海內故也殿下嗣位之𥘉強寇侵逼賴重餌之故得戰士死力僅保社稷今蓄積已虛而寇讎尚在豈可輕有耗散以與無功之人乎昔漢光武躬親萬機章奏詣闕報不終日故能隆中興之業今章奏停滯動經時月下情不得上通沈冤困於囹圄殆非明主之事也重華謝之王敦平湘漢晉懷帝永嘉五年巴蜀流民布在荆湘間數為土民所侵苦蜀人李驤聚衆據樂鄉反南平太守應詹與醴陵令杜韜共擊破之荆州剌史王澄使成都內史王機討驤驤請降澄偽許而襲殺之以其妻子為賞沈八千餘人於江流民益怨忿蜀人杜疇等復反湘州參軍馮素與蜀人汝班有隙言於剌史荀眺曰巴蜀流民皆欲反眺信之欲盡誅流民流民大懼四五萬家一時俱反以杜韜州里重望共推為主韜自稱梁益二州牧領湘州剌史王敦為楊州剌史尋加都督征討諸軍事夏四月杜韜攻長沙五月荀眺棄城奔廣州韜追擒之於是韜南破零桂東掠武昌殺二千石長吏甚衆六年故新野王歆牙門將胡亢聚衆於竟陵自號楚公寇掠荆土以歆南蠻司馬新野杜曾為竟陵太守曾勇冠三軍能𬒳甲遊於水中王澄在荆州恱成都內史王機謂為已亞使之內綜心膂外為爪牙澄屢為杜韜所敗望實俱損猶傲然自得無憂懼之意但與機日夜縱酒博奕由是上下離心南平太守應詹屢諫不聽澄自出軍擊杜韜軍于作塘故山簡參軍王沖擁衆迎應詹為剌史詹以沖無賴棄之還南平沖乃自稱剌史澄懼使其將杜㽔守江陵徙治孱陵尋又奔沓中别駕郭舒諫曰使君臨州雖無異政然一州人心所繫今西收華容之兵足以擒此小醜奈何自棄遽為奔亡乎澄不從欲將舒東下舒曰舒為萬里紀綱不能厈正令使君奔亡誠不忍渡江乃留屯沔口琅邪王睿聞之召澄為軍咨祭酒以軍咨祭酒周顗代之澄乃赴召顗始至州建平流民傅密等叛迎杜韜韜别將王真襲沔陽顗狼狽失據征討都督王敦遣武昌太守陶侃尋陽太守周訪歷陽內史甘卓共擊韜敦進屯豫章為諸軍繼援王澄過詣敦自以名聲素出敦右猶以舊意侮敦敦怒誣其與杜韜通信遣壯士扼殺之王機聞澄死懼禍以其父毅兄矩皆嘗為廣州剌史就敦求廣州敦不許會廣州將溫邵等叛剌史郭訥迎機為剌史機遂將奴客門生千餘人入廣州訥遣兵拒之將士皆機父兄時部曲不戰迎降訥乃避位以州授之愍帝建興元年胡亢性猜忌殺其驍將數人杜曾懼潛引王沖之兵使攻亢亢悉精兵出拒之城中空虛曾因殺亢而并其衆周顗屯潯水城為杜韜所困陶侃使明威將軍朱伺救之韜退保泠口侃曰韜必步向武昌乃自徑道還郡以待之韜果來攻侃使朱伺逆擊大破之韜遁歸長沙周顗出潯水投王敦於豫章敦留之陶侃使參軍王貢告捷於敦敦曰若無陶侯便失荆州矣乃表侃為荆州剌史屯沔江左丞相睿召周顗復以為軍咨祭酒王貢自王敦所還至竟陵矯陶侃之命以杜曾為前鋒大都督擊王沖斬之悉降其衆侃召曾曾不至貢恐以矯命獲罪遂與曾反擊侃冬十月侃兵大敗僅以身免敦表侃以白衣領職侃復帥周訪等進擊杜韜大破之敦乃奏復侃官二年春三月杜韜將王真襲陶侃於休障侃奔灄中周訪救侃擊韜兵破之三年春二月王敦遣陶侃甘卓等討杜韜前後數十戰韜將士多死乃請降於丞相睿睿不許韜遺南平太守應詹書自陳昔與詹共討樂鄉本同休戚後在湘中懼死求生遂相結聚儻以舊交之情為明枉直使得輸誠盟府厠列義徒或北清中原或西取李雄以贖前愆雖死之日猶生之年也詹為啓呈其書且言韜益州秀才素有清望為鄉人所逼今悔惡歸善宜命使撫納以息江湘之民睿乃使前南海太守王運受韜降赦其反逆之罪以韜為巴東監軍韜既受命諸將猶攻之不已韜不勝憤怒遂殺運復反遣其將杜弘張彥殺臨川內史謝摛遂陷豫章三月周訪擊彥斬之弘奔臨賀秋八月陶侃與杜韜相攻韜使王貢出挑戰侃遙謂之曰杜韜為益州小吏盜用庫錢父死不奔喪卿本佳人何為隨之天下寧有白頭賊邪貢𥘉橫腳馬上聞侃言斂容下腳侃知可動復遣使諭之截髮為信貢遂降於侃韜衆潰遁走道死侃與南平太守應詹進克長沙湘州悉平丞相睿承制赦其所部進王敦鎮東大將軍加都督江楊荆湘交廣六州諸軍事江州剌史敦始自選置剌史以下寖益驕橫𥘉朝廷聞張光死以侍中第五猗為安南將軍監荆梁益寧四州諸軍事荆州剌史自武關出杜曾迎猗於襄陽為兄子娶猗女遂聚兵萬人與猗分據漢沔陶侃既破杜韜乘勝進擊曾有輕曾之志司馬魯恬諫曰凡戰當先料其將今使君諸將無及曾者未易可逼也侃不從進圍曾於石城曾軍多騎兵密開門突侃陳出其後反擊之侃兵死者數百人曾將趨順陽下馬拜侃告辭而去時荀嵩都督荆州江北諸軍事屯宛曾引兵圍之嵩兵少食盡欲求救於故吏襄陽太守石覽嵩小女灌年十三帥勇士數十人踰城突圍夜出且戰且前遂逹覽所又為嵩書求救於南中郎將周訪訪遣子撫帥兵三千與覽共救嵩曾乃遁去曾復致箋於嵩求討丹水賊以自效嵩許之陶侃遺嵩書曰杜曾凶狡所謂鴟梟食母之物此人不死州土未寧足下當識吾言嵩以宛中兵少藉曾為外援不從曾復帥流亡二千餘人圍襄陽數日不克而還王敦嬖人吳興錢鳯疾陶侃之功屢毀之侃將還江陵欲詣敦自陳朱伺及安定皇甫方回諫曰公入必不出侃不從既至敦留侃不遣左轉廣州剌史以其從弟丞相軍咨祭酒廙為荆州剌史荆州將吏鄭攀馬俊等詣敦上書留侃敦怒不許攀等以侃始滅大賊而更𬒳黜衆情憤惋又以廙忌戾難事遂帥其徒三千人屯溳口西迎杜曾廙為攀等所襲奔于江安杜曾與攀等北迎第五猗以拒廙廙督諸軍討曾復為曾所敗敦意攀承侃風旨𬒳甲持矛將殺侃出而復還者數四侃正色曰使君雄斷當裁天下何此不決乎因起如厠咨議參軍梅陶長史陳頒言於敦曰周訪與侃親姻如左右手安有斷人左手而右手不應者乎敦意解乃設盛饌以餞之侃便夜發敦引其子瞻為參軍𥘉交州剌史顧祕卒州人以祕子壽領州事帳下督梁碩起兵攻壽殺之碩遂專制交州王機自以盜據廣州恐王敦討之更求交州會杜弘詣機降敦欲因機以討碩乃以降杜弘為機功轉交州剌史機至鬱林碩迎前剌史修則子湛行州事以拒之機不得進乃更與杜弘及廣州將溫邵交州秀才劉沈謀復還據廣州陶侃至始興州人皆言宜觀察形藝不可輕進侃不聽直至廣州諸郡縣皆已迎機矣杜弘遣使偽降侃知其謀進擊弘破之遂執劉沈於小桂遣督護許高討王機走之機病死于道髙掘其尸斬之諸將皆請乘勝擊溫邵侃笑曰吾威名已著何事遣兵但一函紙自定耳乃下書諭之邵懼而走追獲於始興杜弘詣王敦降廣州遂平敦以杜弘為將寵任之元帝建武元年鄭攀等相與拒王廙衆心不一散還橫桑口欲入杜曾王敦遣武昌太守趙誘襄陽太守朱軌擊之攀等懼請降杜曾亦請擊第五猗於襄陽以自贖廙將赴荆州留長史劉浚鎮揚口壘竟陵內史朱伺謂廙曰曾猾賊也外示屈服欲誘官軍使西然後兼道襲揚口耳宜大部分未可便西廙性矜厲自用以伺為老怯遂西行曾等果還趨揚口廙乃遣伺歸裁至壘即為曾所圍劉浚自守北門使伺守南門馬俊從曾來攻壘俊妻子先在壘中或欲皮其靣以示之伺曰殺其妻子未能解圍但益其怒耳乃止曾攻陷北門伺𬒳傷退入船開船底以出沈行五十步乃得免曾遣人説伺曰馬俊德卿全其妻子今盡以卿家內外百口付俊俊已盡心收視卿可來也伺報曰吾年六十餘不能復與卿作賊吾死亦當南歸妻子付汝裁之乃就王廙於甑山病創而卒戊寅趙誘朱軌及陵江將軍黃峻與曾戰於女觀湖誘等皆敗死曾乘勝徑造沔口威震江沔王使豫章太守周訪擊之訪有衆八千進至沌陽曾鋭氣甚盛訪使將軍李恆督左甄許朝督右甄訪自領中軍曾先攻左右甄訪於陳後射雉以安衆心令其衆曰一甄敗鳴三鼓兩甄敗鳴六鼓趙誘子㣧將父餘兵屬左甄力戰敗而復合馳馬告訪訪怒叱令更進㣧號哭還戰自旦至申兩甄皆敗訪選精鋭八百人自行酒飲之敕不得妄動聞鼓音乃進曾兵未至三十步訪親鳴鼓將士皆騰躍奔赴曾遂大潰殺千餘人訪夜追之諸將請待明日訪曰曾驍勇能戰向者彼勞我逸故克之宜及其衰乘之可滅也乃鼓行而進遂定漢沔曾走保武當王廙始得至荆州訪以功遷梁州剌史屯襄陽大興元年冬十一月詔以王敦為荆州牧加陶侃都督交州諸軍事敦固辭州牧乃聽為剌史二年夏四月周訪擊杜曾大破之馬俊等執曾以降訪斬之并獲第五猗送於武昌訪以猗本中朝所署加有時望白王敦不宜殺敦不聽而斬之石勒寇河朔晉惠帝太安二年安北將軍都督幽州諸軍事王浚以天下方亂欲結援夷狄乃以一女妻鮮卑假務勿塵又表以遼西郡封務勿塵為遼西公懷帝永嘉四年冬十月壬子以劉琨為平北大將軍王浚為司空進鮮卑假務勿塵為大單于五年秋七月王浚設壇告類立皇太子布告天下稱受中詔承制封拜備置百官列署征鎮以荀藩為太尉琅邪王睿為大將軍浚自領尚書令以裴憲及其壻棗嵩為尚書以田徽為兖州剌史李惲為青州剌史劉琨長於招懷而短於撫御一日之中雖歸者數千而去者亦相繼琨遣子遵請兵於代公猗盧又遣族人髙陽內史希合衆於中山幽州所統代郡上谷廣寧之民多歸之衆至三萬王浚怒遣燕相胡矩督諸軍與遼西公假疾陸眷共攻希殺之驅略三郡士女而去疾陸眷務勿塵之子也六年冬十二月廣平遊綸張豺擁衆數萬據苑鄉受王浚假署石勒遣夔安支雄等七將攻之破其外壘浚遣督護王昌帥諸軍及遼西公假疾陸眷疾陸眷弟匹磾文鴦從弟末柸部衆五萬攻勒於襄國疾陸眷屯于渚陽勒遣諸將出戰皆為疾陸眷所敗疾陸眷大造攻具將攻城勒衆甚懼勒召將佐謀之曰今城塹未固糧儲不多彼衆我寡外無救援吾欲悉衆與之決戰何如諸將皆曰不如堅守以疲敵待其退而擊之張賔孔萇曰鮮卑之種假氏最為勇悍而末柸尤甚其鋭卒皆在末柸所今聞疾陸眷刻曰攻北城其大衆逺來戰鬬連日謂我孤弱不敢出戰意必懈惰宜且勿出示之以怯鑿北城為突門二十餘道俟其來至列守未定出其不意直衝末柸帳彼必震駭不暇為計破之必矣末柸敗則其餘不攻而潰矣勒從之密為突門既而疾陸眷攻北城勒登城望之見其將士或釋仗而寢乃命孔萇督鋭卒自突門出擊之城上鼓譟以助其藝萇攻末柸帳不能克而退末柸逐之入其壘門為勒衆所獲疾陸眷等軍皆退走萇乘勝追擊枕尸三十餘里獲鎧馬五千匹疾陸眷收其餘衆還屯渚陽勒質末柸遣使求和於疾陸眷疾陸眷許之文鴦諫曰今以末柸一人之故而縱垂亡之虜得無為王彭祖所怨招後患乎疾陸眷不從復以鎧馬金銀賂勒且以末柸三弟為質而請末柸諸將皆勸勒殺末柸勒曰遼西鮮卑健國也與我素無仇讎為王浚所使耳今殺一人而結一國之怨非計也歸之必深德我不復為浚用矣乃厚以金帛報之遣石虎與疾陸眷盟于渚陽結為兄弟疾陸眷引歸王昌等不能獨留亦引兵還薊勒召末柸與之燕飲誓為父子遣還遼西末柸在塗日南嚮而拜者三由是假氏專心附勒王浚之藝遂衰遊綸張豺請降於勒勒攻信都殺冀州剌史王象浚復以邵舉行冀州剌史保信都愍帝建興元年夏四月石勒使石虎攻鄴鄴潰劉演奔廪丘劉琨復以劉演為兖州剌史鎮廩丘石勒攻李惲於上白斬之王浚復以薄盛為青州剌史王浚使棗嵩督諸軍屯易水召假疾陸眷欲與之共擊石勒疾陸眷不至浚怒以重幣賂拓跋猗盧并檄慕容廆等共討疾陸眷猗盧遣有賞王六修將兵會之為疾陸眷所敗五月石勒使孔萇擊定陵殺田徽薄盛帥所部降勒山東郡縣相繼為勒所取漢主聰以勒為侍中征東大將軍烏桓亦叛王浚潛附於勒冬十一月王浚以其父字處道自謂應當塗髙之讖謀稱尊號前勃海太守劉亮北海太守王搏司空掾髙柔切諫浚皆殺之燕國霍原志節清髙屢辭徴辟浚以尊號事問之原不答浚誣原與羣盜通殺而梟其首於是士民駭怨而浚矜豪日甚不親政事所任皆苛刻小人棗嵩朱碩貪橫尤甚北州謡曰府中赫赫朱丘伯十囊五囊入棗郎調發殷煩下不堪命多叛入鮮卑從事韓咸監護桞城盛稱慕容廆能接納士民欲以諷浚浚怒殺之浚始者唯恃鮮卑烏桓以為強既而皆叛之加以蝗旱連年兵藝益弱石勒欲襲之未知虛實將遣使覘之參佐請用羊祜陸抗故事致書於浚勒以問張賔賔曰浚名為晉臣實欲廢晉自立但患四海英雄莫之從耳其欲得將軍猶項羽之欲得韓信也將軍威振天下今卑辭厚禮折節事之猶懼不信況為羊陸之亢敵乎夫謀人而使人覺其情難以得志矣勒曰善十二月勒遣舍人王子春董肇多齎珍寶奉表於浚曰勒本小胡遭丗飢亂流離屯厄竄命冀州竊相保聚以救性命今晉祚淪夷中原無主殿下州鄉貴望四海所宗為帝王者非公復誰勒所以捐軀起兵誅討暴亂者正為殿下驅除爾伏願殿下應天順人早登皇祚勒奉戴殿下如天地父母殿下察勒微心亦當視之如子也又遺棗嵩書厚賂之浚以假疾陸眷新叛士民多棄已去聞勒欲附之甚喜謂子春曰石公一時英傑據有趙魏乃欲稱藩於孤其可信乎子春曰石將軍才力強盛誠如聖旨但以殿下中州貴望威行夷夏自古胡人為輔佐名臣則有矣未有為帝王者也石將軍非惡帝王不為而讓於殿下顧以帝王自有歷數非智力之所取雖強取之必不為天人之所與故也項羽雖強終為漢有石將軍之比殿下猶隂精之與太陽是以逺鑒前事歸身殿下此乃石將軍之明識所以逺過於人也殿下又何怪乎浚大恱封子春肇皆為列侯遣使報聘以厚幣酬之遊綸兄統為浚司馬鎮范陽遣使私附於勒勒斬其使以送浚浚雖不罪統益信勒為忠誠無復疑矣二年春正月壬辰王子春等及王浚使者至襄國石勒匿其徑卒精甲羸師虛府以示之北靣拜使者而受書浚遺勒麈尾勒陽不敢執懸之於壁朝夕拜之曰我不得見王公見其所賜如見公也復遣董肇奉表于浚期以三月中旬親詣幽州奉上尊號亦修箋于棗嵩求并刑牧廣平公勒問浚之故事於王子春子春曰幽州去歲大水人不粒食浚積粟百萬不能賑贍刑政苛酷賦役殷煩忠賢內離夷狄外叛人皆知其將亡而浚意氣自若曽無懼心方更置立臺閣布列百官自謂漢髙魏武不足比也勒撫几笑曰王彭祖真可擒也浚使者還薊具言石勒形藝寡弱𣢾誠無二浚大恱益驕怠不復設備二月石勒纂嚴將襲王浚而猶豫未發張賔曰夫襲人者當出其不意今軍嚴經日而不行豈非畏劉琨及鮮卑烏桓為吾後患乎勒曰然為之奈何賔曰彼三方智勇無及將軍者將軍雖逺出彼必不敢動且彼未謂將軍便能懸軍千里取幽州也輕軍往返不出二旬藉使彼雖有心比其謀議出師吾已還矣且劉琨王浚雖同名晉臣實為仇敵若修箋于琨送質請和琨必喜我之服而快浚之亡終不救浚而襲我也用兵貴神速勿後時也勒曰吾所未了右侯已了之吾復何疑遂以火宵行至柏人殺主簿遊綸以其兄統在范陽恐泄軍謀故也遣使奉箋送質于劉琨自陳罪惡請討浚以自效琨大喜移檄州郡稱已與猗盧方議討勒勒走伏無地求拔幽都以贖罪今便當遣六修南襲平陽除僣偽之逆類降知死之逋羯順天副民翼奉皇家斯乃曩年積誠靈祐之所致也三月勒軍逹易水王浚督護孫緯馳遣白浚將勒兵拒之遊統禁之浚將佐皆曰胡貪而無信必有詭計請擊之浚怒曰石公來正欲奉戴我耳敢言擊者斬衆不敢復言浚設饗以待之壬申勒晨至薊叱門者開門猶疑有伏兵先驅牛羊數千頭聲言上禮實欲塞諸街巷浚始懼或坐或起勒既入城縱兵大掠浚左右請禦之浚猶不許勒升其聽事浚乃走出堂皇勒衆執之勒召浚妻與之並坐執浚立於前浚罵曰胡奴調乃公何凶逆如此勒曰公位冠元台手握強兵坐觀本朝傾覆曽不救援乃欲自尊為天子非凶逆乎又委任姦貪殘虐百姓賊害忠良毒遍燕土此誰之罪也使其將王洛生以五百騎先送浚于襄國浚自投于水束而出之斬于襄國市勒殺浚麾下精兵萬人浚將佐等爭詣軍門謝罪饋賂交錯前尚書裴憲從事中郎荀綽獨不至勒召而讓之曰王浚暴虐孤討而誅之諸人皆來慶謝二君獨與之同惡將何以逃其戮乎對曰憲等丗仕晉朝荷其榮祿浚雖凶粗猶是晉之藩臣故憲等從之不敢有二明公苟不修德義專事威刑則憲等死自其分又何逃乎請就死不拜而出勒召而謝之待以客禮綽朂之孫也勒數朱碩棗嵩等以納賄亂政為幽州患責遊統以不忠所事皆斬之籍浚將佐親戚家資皆至巨萬惟裴憲荀綽止有書百餘帙鹽米各十餘斛而已勒曰吾不喜得幽州喜得二子以憲為從事中郎綽為參軍分遣流民各還鄉里勒停薊二日焚浚宫殿以故尚書燕國劉翰行幽州剌史戍薊置守宰而還孫緯遮擊之勒僅而得免勒至襄國遣使奉王浚首獻捷于漢漢以勒為大都督督陜東諸軍事驃騎大將軍東單于增封十二郡勒固辭受二郡而已𥘉王浚以邵續為樂陵太守屯厭次浚敗續附於石勒勒以續子乂為督謢浚所署勃海太守東萊劉㣧棄郡依續謂續曰凡立大功必仗大義君晉之忠臣奈何從賊以自汙乎會假匹磾以書邀續同歸左丞相睿續從之其人皆曰今棄勒歸匹磾其如乂何續泣曰我豈得顧子而為叛臣哉殺異議者數人勒聞之殺乂續遣劉㣧使江東睿以㣧為參軍以續為平原太守石勒遣兵圍續匹磾使其弟文鴦救之勒引去四年夏四月石勒使石虎攻劉演于廩丘幽州剌史假匹磾使其弟文鴦救之虎拔廩丘演奔文鴦軍虎獲演弟啓以歸冬十一月石勒圍樂平太守韓據于坫城據請救於劉琨琨新得拓跋倚盧之衆欲因其鋭氣以討勒箕淡衛雄諌曰此雖晉民久淪異域未習明公之恩信恐其難用不若且內收鮮卑之餘榖外抄胡賊之牛羊閉關守險務農息兵待其服化感義然後用之則功無不濟矣琨不從悉發其衆命淡帥步騎二萬為前驅琨屯廣牧為之聲援石勒聞淡至將逆擊之或曰淡士馬精強其鋒不可當不若且引兵避之深溝髙壘以挫其鋭必獲萬全勒曰淡兵雖衆逺來疲弊號令不齊何精強之有今寇敵垂至何可捨去大軍一動豈易中還若淡乘我之退而逼之顧逃潰不暇焉得深溝髙壘乎此自亡之道也立斬言者以孔萇為前鋒都督令三軍後出者斬勒據險要設疑兵於山上前設二伏出輕騎與淡戰陽為不勝而走淡縱兵追之入伏中勒前後夾擊大破之獲鎧馬萬計淡雄帥騎千餘奔代郡韓據棄城走并土震駭十二月司空長史李弘以并州降石勒劉琨進退失據不知所為假匹磾遣信邀之己未琨帥衆從飛狐奔薊匹磾見琨甚相親重與之結婚約為兄弟勒分徙陽曲樂平民于襄國置守宰而還元帝建武元年春三月劉琨假匹磾相與歃血同盟期以翼戴晉室辛丑琨檄告華夷遣兼左長史右司馬溫嶠匹磾遣左長史榮邵奉表及盟文詣建康勸進秋七月假匹磾推劉琨為大都督檄其兄遼西公疾陸眷及叔父涉復辰弟末柸等會于固安共討石勒末柸説疾陸眷涉復辰曰以父兄而從子弟恥也且幸而有功匹磾獨收之吾屬何有哉各引兵還琨匹磾不能獨留亦還薊大興元年春正月遼西公疾陸眷卒其子幼叔父涉復辰自立假匹磾自薊往奔喪假末柸宣言匹磾之來欲為篡也匹磾至右北平涉復辰發兵拒之末柸乘虛襲涉復辰殺之并其子弟黨與自稱單于迎擊匹磾敗之匹磾走還薊假匹磾之奔疾陸眷喪也劉琨使其丗子羣送之匹磾敗羣為假末柸所得末柸厚禮之許以琨為幽州剌史欲與之襲匹磾密遣使齎羣書請琨為內應為匹磾邏騎所得時琨别屯征北小城不知也來見匹磾匹磾以羣書示琨曰意亦不疑公是以白公耳琨曰與公同盟庶雪國家之恥若兒書密逹亦終不以一子之故負公而忘義也匹磾雅重琨𥘉無害琨意將聽還屯其弟叔軍謂匹磾曰我胡夷耳所以能服晉人者畏吾衆也今我骨肉乖離是其良圖之日若有奉琨以起吾族盡矣匹磾遂留琨琨之庶長子遵懼誅與琨左長史楊橋等閉門自守匹磾攻拔之代郡太守辟閭嵩後將軍韓據復潛謀襲匹磾事泄匹磾執嵩據及其徒黨悉誅之五月癸丑匹磾稱詔收琨縊殺之并殺其子姪四人琨從事中郎盧諶崔恱等帥琨餘衆奔遼西依段末柸奉劉羣為主將佐多奔石勒恱林之曽孫也朝廷以匹磾尚強冀其能平河朔乃不為琨舉哀溫嶠表琨盡忠帝室家破身亡宜在褒恤盧諶崔恱因末柸使者亦上表為琨訟冤後數歲乃贈琨太尉侍中諡曰愍於是夷晉以琨死故皆不附匹磾末柸遣其弟攻匹磾匹磾帥其衆數千將奔邵續勒將石越邀之於鹽山大敗之匹磾復還保薊末柸自稱幽州剌史二年夏四月石勒遣石虎擊鮮卑日六延於朔方大破之斬首二萬餘級俘虜三萬餘人孔萇攻幽州諸郡悉取之假匹磾士卒飢散欲移保上谷代王鬱律勒兵將擊之匹磾棄妻子奔樂陵依邵續三年春正月假末柸攻假匹磾破之匹磾謂邵續曰吾本夷狄以慕義破家君不忘久要請相與共擊末柸續許之遂相與追擊末柸大破之匹磾與弟文鴦攻薊後趙王勒知續藝孤遣中山公虎將兵圍猒次孔萇攻續别營十一皆下之二月續自出擊虎虎伏騎斷其後遂執續使降其城續呼兄子笁等謂曰吾志欲報國不幸至此汝等努力奉匹磾為主勿有二心匹磾自薊還未至猒次聞續已沒衆懼而散復為虎所遮文鴦以親兵數百力戰始得入城與續子緝兄子存笁等嬰城固守虎送續於襄國勒以為忠釋而禮之以為從事中郎因下令自今克敵獲士人母得擅殺必生致之吏部郎劉㣧聞續𬒳攻言於帝曰北方藩鎮盡矣惟餘邵續而已如使復為石虎所滅孤義士之心阻歸本之路愚謂宜發兵救之帝不能從聞續已沒乃下詔以續位任授其子緝六月後趙孔萇攻假匹磾恃勝而不設備假文鴦襲擊大破之四年春三月後趙中山公虎攻幽州剌史假匹磾於厭次孔萇攻其統內諸城悉拔之假文鴦言於匹磾曰我以勇聞故為民所倚望今視民𬒳掠而不救是怯也民失所望誰復為我致死遂帥壯士數十騎出戰殺後趙兵甚衆馬乏伏不能起虎呼之曰兄與我俱夷狄久欲與兄同為一家今天不違願於此得相見何為復戰請釋仗文鴦罵曰汝為寇賊當死日久吾兄不用吾䇿故令汝得至此我寧鬪死不為汝屈遂下馬苦戰槊折執刀戰不已自辰至申後趙兵四靣解馬羅披自鄣前執文鴦文鴦力竭𬒳執城內奪氣匹磾欲單騎歸朝邵續之弟樂安內史洎勒兵不聽洎復欲執臺使王英送於虎匹磾正色責之曰卿不能遵兄之志逼吾不得歸朝亦已甚矣復欲執天子使者我雖夷狄所未聞也洎與兄子緝笁等輿襯出降匹磾見虎曰我受晉恩志在滅汝不幸至此不能為汝敬也後趙王勒及虎素與匹磾結為兄弟虎即起拜之勒以匹磾為冠軍將軍文鴦為左中郎將散諸流民三萬餘戶復其本業置守宰以撫之於是幽冀并三州皆入於後趙匹磾不為勒禮常著朝服持晉節久之與文鴦邵續皆為後趙所殺前趙平秦隴晉懷帝永嘉元年春三月以南陽王模為征西大將軍都督秦雍梁益四州諸軍事鎮長安五年𥘉太傅越以南陽王模不能綏撫關中表徴為司空將軍淳于定説模使不就徴模從之表遣丗子保為平西中郎將鎮上邽秦州剌史裴苞拒之模使帳下都尉陳安攻苞苞奔安定太守賈匹納之秋七月南陽王模使牙門趙染戌蒲坂染求馮翊太守不得而怒帥衆降漢漢主聰以染為平西將軍八月聰遣染與安西將軍劉雅帥騎二萬攻模于長安河內王粲始安王曜帥大衆繼之染敗模兵於潼關長驅至下邽涼州將北宫純自長安帥其衆降漢漢兵圍長安模遣淳于定出戰而敗模倉庫虛竭士卒離散遂降於漢趙染送模於河內王粲九月粲殺模愍帝建興三年春二月丙子以南陽王保為相國南陽王模之敗也都尉陳安往歸丗子保於秦州保命安將千餘人討叛羌寵待甚厚保將張春疾之譛安云有異志請除之保不許春輒伏剌客以剌安安𬒳創馳還隴城遣使詣保貢獻不絶元帝大興元年春三月焦嵩陳安舉兵逼上邽相國保遣使告急於張實實遣金城太守竇濤督步騎二萬赴之軍至新陽聞愍帝崩保謀稱尊號破羌都尉張詵言於實曰南陽王國之疏屬忘其大恥而亟欲自尊必不能成功晉王近親且有名德當帥天下以奉之實從之遣牙門蔡忠奉表詣建康比至帝已即位實不用江東年號猶稱建興二年夏四月南陽王保自稱晉王攺元建康置百官以張實為征西大將軍開府儀同三司陳安自稱秦州剌史降于漢又降于成上邽大飢士衆困迫張春奉保之南安祁山實遣韓璞帥步騎五千救之陳安退保綿諸保歸上邽未幾保復為安所逼實遣其將宋毅救之安乃退冬十二月屠各路松多起兵於新平扶風以附晉王保保使其將楊曼王連據陳倉張顗周庸據隂密松多據草壁秦隴氐羌多應之趙主曜遣諸將攻之不克曜自將擊之三年春正月曜攻陳倉王連戰死楊曼奔南氏曜進拔草壁路松多奔隴城又拔隂密晉王保懼遷于桑城曜還長安以劉雅為大司徒張春謀奉晉王保奔涼州張實遣其將隂監將兵迎之聲言翼衛其實拒之閏三月晉王保將張春楊次與别將楊韜不協勸保誅之且請擊陳安保皆不從夏五月春次幽保殺之保體肥大重八百斤喜睡好讀書而暗弱無斷故及於難保無子張春立宗室子瞻為丗子稱大將軍保衆散奔涼州者萬餘人陳安表於趙主曜請討瞻等曜以安為大將軍擊瞻殺之張春奔枹罕安執楊次於保柩前斬之因以祭保安以天子禮葬保於上邽諡曰元王永昌元年春二月秦州剌史陳安求朝於曜曜辭以疾安怒以為曜已卒大掠而歸曜疾甚乘馬輿而還使其將呼延實監輜重於後安邀擊獲之謂實曰劉曜已死子尚誰佐吾當與子共定大業實叱之曰汝受人寵祿而叛之自視智能何如主上吾見汝不日梟首於上邽市何謂大業宜速殺我安怒殺之以實長史魯慿為參軍安遣其弟集帥騎三萬追曜衛將軍呼延瑜逆擊斬之安乃還上邽遣將襲汧城拔之隴上氐羌皆附於安有衆十餘萬自稱大都督假黃鉞大將軍雍涼秦梁四州牧涼王以趙募為相國魯慿對安大哭曰吾不忍見陳安之死也安怒命斬之慿曰死自吾分縣吾頭於上邽市觀趙之斬陳安也遂殺之曜聞之慟哭曰賢人民之望也陳安於求賢之秋而多殺賢者吾知其無能為也休屠王石武以桑城降趙趙以武為秦州剌史封酒泉王明帝大寧元年夏六月陳安圍趙征西將軍劉貢于南安休屠王石武自桑城引兵趣上邽以救之與貢合擊安大破之安收餘騎八千走保隴城秋七月趙主曜自將圍隴城别遣兵圍上邽安頻出戰輒敗右軍將軍劉幹攻平襄克之隴上諸縣悉降安留其將楊伯支薑沖兒守隴城自帥精騎突圍出奔陜中曜遣將軍平先等追之安左揮七尺大刀右運丈八蛇矛近則刀矛俱發輒殪五六人逺則左右馳射而走先亦勇捷如飛與安搏戰三交遂奪其蛇矛會日暮雨甚安棄馬與左右匿於山中趙兵索之不知所在明日安遣其將石容覘趙兵趙輔威將軍呼延青人獲之栲問安所在容卒不肯言青人殺之雨霽青人尋其迹獲安於澗曲斬之安善撫將士與同甘苦及死隴上人思之為作壯士之歌楊伯支斬薑沖兒以隴城降别將宋亭斬趙募以上邽降曜徙秦州大姓楊薑諸族二千餘戶于長安氐羌皆送任請降以赤亭羌酋姚弋仲為平西將軍封平襄公石勒滅前趙晉元帝太興元年夏六月漢主聰寢疾徴大司馬曜為丞相石勒為大將軍皆録尚書事受遺詔輔政曜勒固辭乃以曜為丞相領雍州牧勒為大將軍領幽冀二州牧勒辭不受以上洛王景為太宰濟南王驥為大司馬昌國公顗為太師朱紀為太傳呼延晏為太保並録尚書事范隆守尚書令儀同三司靳準為大司空領司隸校尉皆迭決尚書奏事癸亥聰卒甲子太子粲即位尊皇后靳氏為皇太后樊氏號弘道皇后武氏號弘德皇后王氏號弘孝皇后立其妻靳氏為皇后子元公為太子大赦攺元漢昌葬聰於宣光陵諡曰昭武皇帝廟號烈宗靳太后等皆年未盈二十粲多行無禮無復哀戚靳準隂有異志私謂粲曰如聞諸公欲行伊霍之事先誅太保及臣以大司馬統萬機陛下宜早圖之粲不從準懼復使二靳氏言之粲乃從之收其太宰景大司馬驥驥母弟車騎大將軍吳王逞太師顗大司徒齊王勱皆殺之朱紀范隆奔長安八月粲治兵於上林謀討石勒以丞相曜為相國都督中外諸軍事仍鎮長安靳準為大將軍録尚書事粲常遊宴後宫軍國之事一決於準準矯詔以從弟明為車騎將軍康為衛將軍準將作亂謀於王延延弗從馳將告之遇靳康劫延以歸準遂勒光升光極殿使甲士執粲數而殺之諡曰隱帝劉氏男女無少長皆斬東市發永光宣光二陵斬聰尸焚其宗廟準自號大將軍漢天王稱制置百官謂安定胡嵩曰自古無胡人為天子者今以傳國璽付汝還如晉家嵩不敢受凖怒殺之遺使告司州剌史李矩曰劉淵屠各小醜因晉之亂矯稱天命使二帝幽沒輒帥衆扶侍梓宫請以上聞矩馳表于帝帝遣太常韓㣧等奉迎梓宫漢尚書北宫純等招集晉人堡於東宫靳康攻滅之準欲以王延為左光祿大夫延罵曰屠各逆奴何不速殺我以吾左目置西陽門觀相國之入也右目置建春門觀大將軍之入也準殺之相國曜聞亂自長安赴之石勒帥精鋭五萬以討準據襄陵北原準數挑戰勒堅壁以挫之冬十月曜至赤壁太保呼延晏等自平陽歸之與太傅朱紀等兵上尊號曜即皇帝位大赦惟靳準一門不在赦例攺元光𥘉以朱紀領司徒呼延晏領司空太尉范隆以下悉復本位以石勒為大司馬大將軍加九錫增封十郡進爵為趙公勒進攻準於平陽巴及羌羯降者十餘萬落勒皆徙之於所部郡縣漢主曜使征北將軍劉雅鎮北將軍劉䇿屯汾隂與勒共討準十一月靳準使侍中卜泰送乘輿服御請和於石勒勒囚泰送於漢主曜曜謂泰曰先帝末年實亂大倫司空行伊霍之權使朕及此其功大矣若早迎大駕者當悉以政事相委況免死乎卿為朕入城具宣此意泰還平陽準自以殺曜母兄沈吟未從十二月左右車騎將軍喬泰王騰衛將軍靳康等相與殺準推尚書令靳明為主遺卜泰奉傳國六璽降漢石勒大怒進軍攻明明出戰大敗乃嬰城固守石虎帥幽冀之兵會石勒攻平陽靳明屢敗遣使求救於漢漢主曜使劉雅劉䇿迎之明帥平陽士女萬五千人奔漢曜西屯粟邑收靳氏男女無少長皆斬之曜迎其母胡氏之喪於平陽葬于粟邑號曰陽陵諡曰宣明皇太后石勒焚平陽宫室使裴憲石會修永光宣光二陵收漢主粲已下百餘口葬之置戍而歸二年春二月石勒遣左長史王修獻捷於漢漢主曜遣兼司徒郭汜授勒太宰領大將軍進爵趙王加殊禮出警入蹕如曹公輔漢故事拜王修及其副劉茂皆為將軍封烈侯修舍人曹平樂從修至粟邑因留仕漢言於曜曰大司馬遣修等來外表至誠內覘大駕強弱俟其復命將襲乘輿時漢兵實疲弊曜信之乃追汜還斬修於市三月勒還至襄國劉茂逃歸言修死狀勒大怒曰孤事劉氏於人臣之職有加矣彼之基業皆孤所為今既得志還欲相圖趙王趙帝孤自為之何待於彼邪乃誅曹平樂三族漢主曜還都長安夏六月漢主曜立宗廟社稷南北郊於長安詔曰吾之先興於北方光文立漢宗廟以從民望今宜攺國號以單于為祖亟議以聞羣臣奏光文始封盧奴伯陛下又王中山中山趙分也請攺國號為趙從之以冒頓配天光文配上帝冬石勒左右長史張敬張賔左右司馬張屈六程遐等勸勒稱尊號勒不許十一月將佐等復請勒稱大將軍大單于領冀州牧趙王依漢昭烈在蜀魏武在鄴故事以河內等二十四郡為趙國太守皆為內史準禹貢復冀州之境以大單于鎮撫百蠻罷并朔司三州通置部司以監之勒許之戊寅即趙王位大赦依春秋時列國稱元年𥘉勒以丗亂律令煩多命法曹令史貫志采集其要作辛亥制五千文施行十餘年仍用律令以理曹參軍上黨續咸為律學祭酒咸用法詳平國人稱之以中壘將軍支雄遊擊將軍王陽領門臣祭酒專主胡人辭訟重禁胡人不得陵侮衣冠華族號胡為國人遣使循行州郡勸課農桑朝會始用天子禮樂衣冠儀物從容可觀矣加張賔大執法專總朝政以石虎為單于元輔都督禁衛諸軍事尋加驃騎將軍侍中開府賜爵中山公自餘羣臣授位進爵各有差三年春二月趙將尹安宋始宋恕趙愼四軍屯洛陽叛降後趙後趙將石生引兵赴之安等復叛降司州剌史李矩矩使潁川太守郭默將兵入洛石生虜宋始一軍北渡河於是河南之民皆相帥歸矩洛陽遂空明帝太寧二年春正月後趙將兵都尉石瞻寇下邳彭城取東莞東海劉遐退保泗口司州剌史石生擊趙河南太守尹平于新安斬之掠五千餘户而歸自是二趙􅌟隙日相攻掠河東洪農之間民不聊生矣石生寇許潁俘獲萬計攻郭誦于陽翟誦與戰大破之生退守康城後趙汲郡內史石聰聞生敗馳救之進攻司州剌史李矩潁川太守郭默皆破之三年春三月北羌王盆句除附於趙後趙將石他自鴈門出上郡襲之俘三千餘落獲牛馬羊百餘萬而歸趙主曜遣中山王嶽追之曜屯于富平為嶽聲援嶽與石他戰於河濵斬之後趙兵死者六千餘人嶽悉收所虜而歸夏五月後趙將石生屯洛陽寇掠河南司州剌史李矩潁川太守郭默軍數敗又乏食乃遣使附於趙趙主曜使中山王嶽將兵萬五千人趣孟津鎮東將軍呼延謨帥荆司之衆自崤澠而東欲會矩默共攻石生嶽克孟津石梁二戍斬獲五千餘級進圍石生於金墉後趙中山公虎帥步騎四萬入自成臯關與嶽戰于洛西嶽兵敗中流矢退保石梁虎作塹柵環之遏絶內外嶽衆飢甚殺馬食之虎又擊呼延謨斬之曜自將兵救嶽虎帥騎三萬逆戰趙前軍將軍劉黑擊虎將石聰於八特阪大破之曜屯于金谷夜軍中無故大驚士卒奔潰乃退屯澠池夜又驚潰遂歸長安六月虎拔石梁禽嶽及其將佐八十餘人氐羌三千餘人皆送襄國坑其士卒九千人遂攻王騰於并州執騰殺之坑其士卒七千餘人曜還長安素服郊次哭七日乃入城因憤恚成疾郭默復為石聰所敗棄妻子南奔建康李矩將士隂謀叛降後趙矩不能討亦帥衆南歸衆皆道亡惟郭誦等百餘人隨之卒於魯陽矩長史崔宣帥其餘衆二千降于後趙於是司豫徐兖之地率皆入於後趙以淮為境矣成帝咸和三年秋七月後趙中山公虎帥衆四萬自軹關西入擊趙河東應之者五十餘縣遂進攻蒲阪趙主曜遣河間王述發氐羌之衆屯秦州以備張駿楊難敵自將中外精鋭水陸諸軍以救蒲阪自衛關北濟虎懼引退曜追之八月及於髙候與虎戰大破之斬石瞻枕尸二百餘里收其資仗億計虎奔朝歌曜濟自大陽攻石生于金墉決千金堨以灌之分遣諸將攻汲郡河內後趙滎陽太守尹矩野王太守張進等皆降之襄國大震冬十一月後趙王勒欲自將救洛陽僚佐程遐等固諫曰劉曜懸軍千里勢不支久大王不宜親動動無萬全勒大怒按劔叱遐等出乃赦徐光召而謂之曰劉曜乘一戰之勝圍守洛陽庸人之情皆謂其鋒不可當曜帶甲十萬攻一城而百日不克師老卒怠以我𥘉鋭擊之可一戰而禽也若洛陽不守曜必送死冀州自河已北席卷而來吾事去矣程遐等不欲吾行卿以為何如對曰劉曜乘髙候之藝不能進臨襄國更守金墉此其無能為可知也以大王威略臨之彼必望旗奔敗平定天下在今一舉不可失也勒笑曰光言是也乃使內外戒嚴有諫者斬命石堪石聰及豫州剌史桃豹等各統見衆會滎陽中山公虎進據石門勒自統步騎四萬趣金墉濟自大堨勒謂徐光曰曜盛兵成臯關上䇿也沮洛水其次也坐守洛陽此成擒耳十二月乙亥後趙諸軍集于成臯步卒六萬騎二萬七千勒見趙無守兵大喜舉手指天復加額曰天也卷甲銜枚詭道兼行出于鞏訾之間趙主曜專與嬖臣飲博不撫士卒左右或諫曜怒以為妖言斬之聞勒已濟河始議增滎陽戍杜黃馬關俄而洛水候者與後趙前鋒交戰擒羯送之曜問大胡自來邪其衆幾何羯曰王自來軍藝甚盛曜色變使攝金墉之圍陳于洛西衆十餘萬南北十餘里勒望見益喜謂左右曰可以賀我矣勒帥步騎四萬入洛陽城己卯中山公虎引步卒三萬自城北而西攻趙中軍石堪石聰等各以精騎八千自城西而北擊趙前鋒大戰于西陽門勒躬貫甲胄出自閶闔門夾擊之曜少而嗜酒末年尤甚將戰飲酒數斗常乘赤馬無故局頓乃乘小馬北出復飲酒斗餘至西陽門揮陳就平石堪因而乘之趙兵大潰曜昏醉退走馬陷石渠墜于冰上𬒳瘡十餘通中者三為堪所執勒遂大破趙兵斬首五萬餘級下令曰所欲擒者一人耳今已獲之其敕將士抑鋒止鋭縱其歸命之路曜見勒曰石王頗憶重門之盟否勒使徐光謂之曰今日之事天使其然復云何邪乙酉勒班師使征東將軍石邃將兵衛送曜邃虎之子也曜瘡甚載以馬輿使醫李永與同載己亥至襄國舍曜於永豐小城給其妓妾嚴兵圍守遣劉嶽劉震等從男女盛服以見之曜曰吾謂卿等久為灰土石王仁厚乃全宥至今邪我殺石他愧之多矣今日之禍自其分耳留宴終日而去勒使曜與其太子熙書諭令速降曜但敕熙與諸大臣匡維社稷勿以吾易意也勒見而惡之久之乃殺曜四年春正月趙太子熙聞趙主曜𬒳擒大懼與南陽王㣧謀西保秦州尚書胡勳曰今雖喪君境土尚完將士不叛且當併力拒之力不能拒走未晚也㣧怒以為沮衆斬之遂帥百官奔上邽諸征鎮亦皆棄所守從之關中大亂將軍蔣英辛恕擁衆數十萬據長安遣使降于後趙後趙遣石生帥洛陽之衆赴之秋八月趙南陽王㣧帥衆數萬自上邽趨長安隴東武都安定新平北地扶風始平諸郡戎夏皆起兵應之㣧軍于仲橋石生嬰城自守後趙中山公虎帥騎二萬救之九月虎大破趙兵於義渠㣧奔還上邽虎乘勝追擊之枕尸千里上邽潰虎執趙太子熙南陽王㣧及其將王公卿校以下三千餘人皆殺之徙其臺省文武關東流民秦雍大族九千餘人于襄國又坑五郡屠各五十餘人于洛陽五年春二月後趙羣臣請後趙王勒即皇帝位勒乃稱大趙天王行皇帝事立妃劉氏為王后丗子弘為太子以其子宏為驃騎大將軍都督中外諸軍事大單于封秦王斌為左衛將軍封太原王恢為輔國將軍封南陽王以中山公虎為太尉尚書令進爵為王虎子邃為冀州剌史封齊王宣為左將軍挺為侍中封梁王又封石生為河東王石堪為彭城王以左長史郭敖為尚書左僕射右長史程遐為右僕射領吏部尚書左司馬夔安右司馬郭殷從事中郎李鳯前中郎令裴憲皆為尚書參軍事徐光為中書令領祕書監自餘文武封拜各有差趙羣臣固請正尊號秋九月趙王勒即皇帝位大赦攺元建平文武封進各有差立其妻劉氏為皇后太子弘為皇太子七年春正月趙主勒大饗羣臣謂徐光曰朕可方自古何等主對曰陛下神武謀略過於漢髙後丗無可比者勒笑曰人豈不自知卿言太過朕若遇漢髙祖當北靣事之與韓彭比肩若遇光武當並驅中原未知鹿死誰手大丈夫行事宜礌礌落落如日月皎然終不效曹孟德司馬仲逹欺人孤兒寡婦狐媚以取天下也羣臣皆頓首稱萬歲勒雖不學好使諸生讀書而聽之時以其意論今古得失聞者莫不恱服嘗使人讀漢書聞酈食其勸立六國後驚曰此法當失何以遂得天下及聞留侯諫乃曰賴有此耳氐據仇池晉惠帝元康六年𥘉略陽清水氐楊駒始居仇池仇池方百頃其旁平地二十餘里四靣斗絶而髙為羊腸蟠道三十六回而上至其孫千萬附魏封為百頃王千萬孫飛龍浸強盛徙居略陽飛龍以其甥令狐茂搜為子茂搜避齊萬年之亂十二月自略陽帥部落四千家還保仇池自號輔國將軍右賢王關中人士避亂者多依之茂搜迎接撫納欲去者衛護資送之愍帝建興元年𥘉氐王楊茂搜之子難敵遣養子販易於梁州私賣良人子一人梁州剌史張光鞭殺之難敵怨曰使君𥘉來大荒之後兵民之命仰我氐活氐有小罪不能貰也及光與楊虎相攻各求救於茂搜茂搜遣難敵救光難敵求貨於光光不與楊虎厚賂難敵且曰流民珍貨悉在光所今伐我不如伐光難敵大喜光與虎戰使張孟萇居前難敵繼後難敵與虎夾擊孟萇大破之孟萇及其弟援皆死光嬰城自守九月光憤激成疾僚屬勸光退據魏興光按劔曰吾受國重任不能討賊今得死如登仙何謂退也聲絶而卒州人推其少子邁領州事又與氐戰沒衆推始平太守胡子序領梁州冬十月楊虎楊難敵急攻梁州胡子序棄城走難敵自稱剌史二年春正月楊虎掠漢中吏民以奔成梁州人張咸等起兵遂楊難敵難敵去咸以其地歸成於是漢嘉涪陵漢中之地皆為成有元帝建武元年氐王楊茂搜卒長子難敵立與少子堅頭分領部曲難敵號左賢王屯下辨堅頭號右賢王屯河池永昌元年春二月趙主曜自將擊楊難敵難敵逆戰不勝退保仇池仇池諸氐羌及故晉王保將楊韜隴西太守梁勛皆降於曜曜遷隴西萬餘户於長安進攻仇池會軍中大疫曜亦得疾將引兵還恐難敵躡其後乃遣光國中郎將王獷説難敵諭以禍福難敵遣使稱藩曜以難敵為假黃鉞都督益寧南秦涼梁巴六州隴上西域諸軍事上大將軍益寧南秦三州牧武都王明帝大寧元年楊難敵聞陳安死大懼與弟堅頭南奔漢中趙鎮西將軍劉厚追擊之大獲而還趙主曜以大鴻臚田嵩為鎮南大將軍益州剌史鎮仇池難敵送任請降於成成安北將軍李稚受難敵賂不送難敵於成都趙兵退即遣還武都難敵遂據險不服稚自悔失計亟請討之雄遣稚兄侍中中領軍琀與稚出白水征東將軍李壽及琀弟玝出隂平以擊難敵羣臣諫不聽難敵遣兵拒之壽玝不得進而琀稚長驅至下辨難敵遣兵斷其歸路四靣攻之琀稚深入無繼皆為難敵所殺死者數千人三年春三月楊難敵襲仇池克之執田嵩立之於前左右令嵩拜嵩瞋目叱之曰氐狗安有天子牧伯而向賊拜乎難敵字謂之曰子岱吾當與子共定大業子忠於劉氏豈不能忠於我乎嵩厲色大言曰賊氐汝本奴才何謂大業我寧為趙鬼不為汝臣顧排一人奪其劔前剌難敵不中難敵殺之成帝咸和二年夏五月趙武衛將軍劉㓪帥騎三萬襲楊難敵于仇池弗克掠三千餘戶而歸六年秋七月成大將軍壽攻隂平武都楊難敵降之九年春正月仇池王楊難敵卒子毅立自稱龍驤將軍左賢王下辨公以叔父堅頭之子盤為冠軍將軍右賢王河池公遣使來稱藩咸康三年仇池氐王楊毅族兄𥘉襲殺毅并有其衆自立為仇池公稱臣於趙穆帝永和三年冬十月武都氐王楊𥘉遣使來稱藩詔以𥘉為使持節征南將軍雍州剌史仇池公十一年春正月故仇池公楊毅弟宋奴使其姑子梁式王剌殺楊𥘉𥘉子國誅式王及宋奴自立為仇池公桓溫表國為鎮北將軍秦州剌史十二年仇池公楊國從父俊殺國自立以俊為仇池公國子安奔秦升平四年春正月仇池公楊俊卒子丗立海西公太和三年以仇池公楊丗為秦州剌史丗弟統為武都太守丗亦稱臣於秦秦以丗為南秦州剌史五年仇池公楊丗卒子纂立始與秦絶叔父武都太守統與之爭國起兵相攻簡文帝咸安元年春三月秦西縣侯雅楊安王統徐成及羽林左監朱肜揚武將軍姚萇帥步騎七萬伐仇池公楊纂夏四月秦兵至鷲峽楊纂帥衆五萬拒之梁州剌史弘農楊亮遣督護郭寶卜靖帥千餘騎助纂與秦兵戰于峽中纂兵大敗死者什三四寶等亦沒纂收散兵遁還西縣侯雅進攻仇池楊統帥武都之衆降秦纂懼靣縛出降雅送纂于長安以統為南秦州剌史加楊安都督南秦州諸軍事鎮仇池武帝寧康元年秋八月梁州剌史楊亮遣其子廣襲仇池與秦梁州剌史楊安戰廣兵敗沮水諸戍皆委城奔潰亮懼退守磬險九月安進攻漢川冬秦王堅使益州剌史王統祕書監朱肜帥卒二萬出漢川前禁將軍毛當鷹揚將軍徐成帥卒三萬出劔門入寇梁益梁州剌史楊亮帥巴獠萬餘拒之戰于青谷亮兵敗奔固西城肜遂拔漢中徐成攻劔門克之楊安進攻梓潼梓潼太守周虓固守涪城遣步騎數千送母妻自漢水趣江陵朱肜邀而獲之虓遂降於安十一月安克梓潼荆州剌史桓豁遣江夏相笁瑶救梁益瑶聞廣漢太守趙長戰死引兵退益州剌史周仲孫勒兵拒朱肜于綿竹聞毛當將至成都仲孫帥騎五千奔于南中秦遂取梁益二州卭莋夜郎皆附於秦秦王堅以楊安為益州牧鎮成都毛當為梁州剌史鎮漢中姚萇為寧州剌史屯墊江王統為南秦州剌史鎮仇池通鑑紀事本末卷第十三
