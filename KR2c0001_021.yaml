body:
  text: 元魏寇齊齊明帝建武元年魏主以上廢海陵王自立謀大舉入寇會邉將言雍州刺史下邳曹虎遣使請降於魏十二月辛丑朔魏遣行征南將軍薛真度督四將向襄陽大將軍劉昶平南將軍王肅向義陽徐州刺史拓跋衍向鍾離平南將軍廣平劉藻向南鄭真度安都從祖弟也以尚書盧淵為安南將軍督襄陽前鋒諸軍淵辭以不習軍旅不許淵曰但恐曺虎為周魴耳魏主欲自將入寇癸卯中外戒嚴戊申詔代民遷洛者復租賦三年相州刺史髙閭上表稱洛陽草創曺虎既不遣質任必非誠心無宜輕舉魏主不從久之虎使竟不再來魏主引公卿議行留之計公卿或以為宜止或以為宜行帝曰衆人紛紜莫知所從必欲盡行留之藝宜有客主共相起發任城鎮南為留議朕為行論諸公坐聽得失長者從之衆皆曰諾鎮南將軍李沖曰臣等正以遷都草創人思少安為內應者未得審諦不宜輕動帝曰彼降欵虛實誠未可知若其虛也朕巡撫淮甸訪民疾苦使彼知君德之所在有北向之心若其實也今不以時應接則失乘時之機孤歸義之誠敗朕大略矣任城王澄曰虎無質任又使不再來其詐可知也今代都新遷之民皆有戀本之心扶老攜幼始就洛邑居無一椽之室食無甔石之儲又冬月垂盡東作將起乃百堵皆興俶載南畝之時而驅之使擐甲執兵泣當白刃殆非歌舞之師也且諸軍已進非無應接若降欵有實待既平樊沔然後鑾輿順動亦何晚之有今率然輕舉上下疲勞若空行空返恐挫損天威更成賊氣非策之得者也司空穆亮以為宜行公卿皆同之澄謂亮曰公輩在外之時見張旗授甲皆有憂色平居論議不願南征何得對上即為此語靣背不同事涉欺佞豈大臣之義國士之體乎萬一傾危皆公輩所為也沖曰任城王可謂忠於社稷帝曰任城以從朕者為佞不從朕者豈必皆忠夫小忠者大忠之賊無乃似諸澄曰臣愚暗雖涉小忠要是竭誠謀國不知大忠者竟何所據帝不從辛亥發洛陽以北海王詳為尚書僕射統留臺事李沖兼僕射同守洛陽給事黃門侍郎崔休為左丞趙郡王幹都督中外諸軍事始平王協將宗子軍宿衛左右休逞之玄孫也戊辰魏主至懸瓠己巳詔夀陽鍾離馬頭之師所獲男女皆放還南曹虎果不降魏主命盧淵攻南陽淵以軍中乏糧請先攻赭陽以取葉倉魏主許之乃與征南大將軍城陽王鸞安南將軍李佐荆州刺史韋珍兵攻赭陽鸞長夀之子佐寶之子也北襄城太守成公期閉城拒守薛真度軍於沙堨南陽太守房伯玉新野太守劉思忌拒之二年春正月壬申遣鎮南將軍王廣之督司州右衛將軍蕭坦之督徐州尚書右僕射沈文季督豫州諸軍以拒魏癸酉魏詔淮北之人不得侵掠犯者以大辟論乙未拓跋衍攻鍾離徐州刺史蕭惠休乘城拒守間出襲擊魏兵破之惠休惠明之弟也劉昶王肅攻義陽司州刺史蕭誕拒之肅屢破誕兵招降萬餘人魏以肅為豫州刺史劉昶性𥚹躁御軍嚴暴人莫敢言法曺行參軍北平陽固苦諌昶怒欲斬之使當攻道固志意間雅臨敵勇決昶始竒之丁酉中外纂嚴以太尉陳顯達為使持節都督西北討諸軍事往來新亭白下以張聲藝己亥魏主濟淮二月至夀陽衆號三十萬鐵騎彌野甲辰魏主登八公山賦詩道遇甚雨命去蓋見軍士病者親撫慰之魏主遣使呼城中人豐城公遙昌使參軍崔慶逺出應之慶逺問師故魏主曰固當有故卿欲我斥言之乎欲我含垢依違乎慶逺曰未承來命無所含垢魏主曰齊主何故廢立慶逺曰廢昏立明古今非一未審何疑魏主曰武王子孫今皆安在廢逺曰七王同惡已伏管蔡之誅其餘二十餘王或內列清要或外典方牧魏主曰卿主若不忘忠義何以不立近親如周公之輔成王而自取之乎慶逺曰成王有亞聖之德故周公得而相之今近親皆非成王之比故不可立且霍光亦捨武帝近親而立宣帝唯其賢也魏主曰霍光何以不自立慶逺曰非其類也主上正可比宣帝安得比霍光若爾武王伐紂不立微子而輔之亦為苟貪天下乎魏主大笑曰朕來問罪如卿之言便可釋然慶逺曰見可而進知難而退聖人之師也魏主曰卿欲吾和親為不欲乎慶逺曰和親則二國交歡生民蒙福否則二國交惡生民塗炭和親與否裁自聖衷魏主賜慶逺酒殽衣服而遣之戊申魏主循淮而東民皆安堵租運屬路丙辰至鍾離上遣左衛將軍崔慧景寧朔將軍裴叔業救鍾離劉昶王肅衆號二十萬塹柵三重并力攻義陽城中負楯而立王廣之引兵救義陽去城百餘里畏魏強不敢進城中益急黃門侍郎蕭衍請先進廣之分麾下精兵配之衍間道夜發與太子右率蕭誄等徑上賢首山去魏軍數里魏人出不意未測多少不敢逼黎明城中望見援軍至蕭誕遣長史王伯瑜出攻魏柵因風縱火衍等衆軍自外擊之魏不能支解圍去己未誕等追擊破之誄諶之弟也先是上以義陽危急詔都督青冀二州諸軍事張沖出軍攻魏以分其兵藝沖遣軍主桑係祖攻魏建陵驛馬厚丘三城又遣軍主杜僧護攻魏虎坑馮時即丘三城皆拔之青冀二州刺史王洪範遣軍主崔延襲魏紀城據之魏主欲南臨江水辛酉發鍾離司徒長樂元懿公馮誕病不能從魏主與之泣訣行五十里聞誕卒時崔慧景等軍去魏主營不過百里魏主輕將數千人夜還鍾離拊尸而哭達旦聲淚不絶壬戌敕諸軍罷臨江之行葬誕依晉齊獻王故事誕與帝同年幼同硯席尚帝妹樂安長公主雖無學術而資性淳篤故特有寵丁卯魏主遣使臨江數上罪惡魏久攻鍾離不克士卒多死三月戊寅魏主如邵陽築城於洲上柵斷水路夾築二城蕭坦之遣軍主裴叔業攻二城拔之魏主欲築城置戍於淮南以撫新附之民賜相州刺史髙閭璽書具論其狀閭上表以為兵法十則圍之五則攻之嚮者國家止為受降之計發兵不多東西遼濶難以成功今又欲置戍淮南招撫新附昔世祖以回山倒海之威步騎數十萬南臨瓜步諸郡盡降而盱眙小城攻之不克班師之日兵不戍一城土不闢一㕓夫豈無人以為大鎮未平不可守小故也夫壅水者先塞其原伐木者先斷其本本原尚在而攻其末流終無益也夀陽盱眙淮隂淮南之本原也三鎮不克其一而留守孤城其不能自全明矣敵之大鎮逼其外長淮隔其內少置兵則不足以自固多置兵則糧運難通大軍既還士心孤怯夏水盛漲救援甚難以新擊舊以勞禦逸若果如此必為敵擒雖忠勇奮發終何益哉且安土戀本人之常情昔彭城之役既克大鎮城戍已定而不服思叛者猶踰數萬角城蕞爾處在淮北去淮陽十八里五固之役攻圍歷時卒不能克以今準昔事兼數倍天時向熱雨水方降願陛下踵世祖之成規旋轅返斾經營洛邑蓄力觀舋布德行化中國既和逺人自服矣尚書令陸睿上表以為長江浩蕩彼之巨防又南土昏霧暑氣鬱蒸師人經夏必多疾病而遷鼎草創庶事甫爾臺省無論政之館府寺靡聽治之所百僚居止事等行路沈雨炎陽自成癘疫且兵徭並舉聖王所難今介胄之士外攻寇讎羸弱之夫內勤土木運給之費日損千金驅罷弊之兵討堅城之虜將何以取勝乎陛下去冬之舉正欲曜武江漢耳今自春幾夏理宜釋甲願旦還洛邑使根本深固聖懷無內顧之憂兆民休斤板之役然後命將出師何憂不服魏主納其言崔慧景以魏人城邵陽患之張欣泰曰彼有去志所以築城者外自誇大懼我躡其後耳今若説之以兩願罷兵彼無不聽矣慧景從之使欣泰詣城下語魏人魏主乃還濟淮餘五將未濟齊人據渚邀斷津路魏主募能破中渚兵者以為直閣將軍軍主代人奚康生應募縛筏積柴因風縱火燒齊船艦依煙直進飛刀亂斫中渚兵遂潰魏主假康生直閣將軍魏主使前將軍楊播將步卒三千騎五百為殿時春水方長齊兵大至戰艦塞川播結陳於南岸以禦之諸軍盡濟齊兵四集圍播播為圓陳以禦之身自搏戰所殺甚衆相拒再宿軍中食盡圍兵愈急魏主在北岸望之以水盛不能救既而水稍減播引精騎三百歷齊艦大呼曰我今欲度能戰者來遂擁衆而濟播椿之兄也魏軍既退邵陽洲上餘兵萬人求輸馬五百匹假道以歸崔慧景欲斷路攻之張欣泰曰歸師勿遏古人畏之兵在死地不可輕也今勝之不足為武不勝徒喪前功不如許之慧景從之蕭坦之還言於上曰邵陽洲有死賊萬人慧景欣泰縱而不取由是皆不加賞甲申解嚴初上聞魏主欲飲馬於江懼敕廣陵太守行南兖州事蕭頴胄移居民入城民驚恐欲席卷南渡頴胄以魏寇尚逺不即施行魏兵竟不至頴胄太祖之從子也上遣尚書右僕射沈文季助豐城公遙昌守夀陽文季入城止遊兵不聽出洞開城門嚴加守備魏兵尋退魏之入寇也盧昶等猶在建康齊人恨之飼以蒸豆昶怖懼食之淚汗交橫謁者張思寧辭氣不屈死於館下及還魏主讓昶曰人誰不死何至自同牛馬屈身辱國縱不逺慙蘇武獨不近愧思寧乎乃黜為民魏主之在鍾離也仇池鎮都大將梁州刺史拓拔英請以州兵會劉藻擊漢中魏主許之梁州刺史蕭懿遣部將尹紹祖梁季羣等將兵二萬據險立五柵以拒之英曰彼帥賤莫相統一我選精卒并攻一營彼必不相救若克一營四營皆走矣乃引兵急攻一營拔之四營俱潰生擒梁季羣斬三千餘級俘七百餘人乘勝長驅進逼南鄭懿又遣其將薑修擊英英掩擊盡獲之將還懿别軍繼至將士皆已疲不意其至大懼欲走英故緩轡徐行神色自若登髙望敵東西指麾狀若處分然後整列而前懿軍疑有伏兵遷延引退英追擊破之遂圍南鄭禁將士毋得侵暴逺近恱附爭供租運懿嬰城自守軍主范潔先將三千餘人在外還救南鄭英掩擊盡獲之圍城數十日城中恟懼録事參軍新野庾域封題空倉數十指示將士曰此中粟皆滿足支二年但努力堅守衆心乃安會魏主召英還英使老弱先行自將精兵為後拒遣使與懿告别懿以為詐英去一日猶不開門二日乃遣將追之英與士卒下馬交戰懿兵不敢逼行四日四夜懿兵乃返英入斜谷會天大雨士卒截竹貯米執炬火於馬上炊之先是懿遣人誘説仇池諸氐使起兵斷英運道及歸路英勒兵奮擊且戰且前矢中英頰卒全軍還仇池討叛氐平之英楨之子懿衍之兄也英之攻南鄭也魏主詔雍涇岐三州發兵六千人戍南鄭俟克城則遣之侍中兼左僕射李沖表諌曰秦川險厄地接羌夷自西出師後餉援連續加氐胡叛逆所在奔命運糧擐甲迄茲未已今復豫差戍卒懸擬山外雖加優復恐猶驚駭脫終攻不克徒動民情連胡結夷事或難測輒依旨密下刺史待軍克鄭城然後差遣如臣愚見猶謂未足何者西道險厄單徑千里今欲深戍絶界之外孤據羣賊之中敵攻不可猝援食盡不可運糧古人有言雖鞭之長不及馬腹南鄭於國實為馬腹也且魏境所掩九州過八民人所臣十分而九所未民者唯漠北之與江外耳羈之在近豈汲汲於今日也宜待疆宇既廣糧食既足然後置邦樹將為吞并之舉今鍾離夀陽密邇未拔赭城新野跬步弗降東道既未可以近力守西藩寧可以逺兵固若果欲置者臣恐終以資敵也又建都土中地接寇壤方須大收死士平蕩江會若輕遣單寡棄令陷沒恐後舉之日衆以留守致懼求其死效未易可獲推此而論不戍為上魏主從之魏城陽王鸞等攻赭陽諸將不相統一圍守百餘日諸將欲案甲不戰以疲之李佐獨晝夜攻擊士卒死者甚衆帝遣太子右衛率垣歷生救之諸將以衆寡不敵欲退佐獨帥騎二千逆戰而敗盧淵等引去歷生追擊大破之歷生榮祖之從弟也南陽太守房伯玉等又敗薛真度於沙堨鸞等見魏主於瑕丘魏主責之曰卿等沮辱威靈罪當大辟朕以新遷洛邑特從寬典五月己巳降封鸞為定襄縣王削户五百盧淵李佐韋珍皆削官爵為民佐仍徙瀛州以薛真度與其從兄安都有開徐方之功聽存其爵及荆州刺史餘皆削奪曰進足明功退足彰罪矣癸未魏主還洛陽告于太廟甲申減冗官之祿以助軍國之用乙酉行飲至之禮班賞有差三年冬閏十月魏主謀入寇引見公卿於清徽堂曰朕卜宅土中綱條粗舉唯南寇未平安能效近世天子下帷於深宫之中乎朕今南征決矣但未知早晚之期比來術者皆云今往必克此國之大事宜君臣各盡所見勿以朕先言而依違於前同異於後也李沖對曰凡用兵之法宜先論人事後察天道今卜筮雖吉而人事未備遷都尚新秋榖不稔未可以興師旅如臣所見宜俟來秋帝曰去十七年朕擁兵二十萬此人事之盛也而天時不利今天時既從復云人事未備如僕射之言是終無征伐之期也寇戎咫尺異日將為社稷之憂朕何敢自安若秋行不捷諸君當盡付司寇不可不盡懷也四年六月壬戌魏發冀定瀛相濟五州兵二十萬將入冦八月丙辰魏詔中外戒嚴甲戌魏講武於華林園庚辰軍發洛陽使吏部尚書任城王澄居守以御史中尉李彪兼度支尚書與僕射李沖參治留臺事假彭城王協中軍大將軍協辭曰親踈並用古之道也臣獨何人頻煩寵授昔陳思求而不允愚臣不請而得何否泰之相逺也魏主大笑執協手曰二曹以才名相忌吾與汝以道德相親上遣軍主直閣將軍胡松助北襄城太守成公期戍赭陽軍主鮑舉助西汝南北義陽二郡太守黃瑶起戍舞隂初魏遷洛陽荆州刺史薛真度勸魏主先取樊鄧真度引兵寇南陽太守房伯玉擊敗之魏主怒以南陽小郡志必滅之遂引兵向襄陽彭城王協等三十六軍前後相繼衆號百萬吹脣沸地九月辛丑魏主留諸將攻赭陽自引兵南下癸卯至宛夜襲其郛克之房伯玉嬰內城拒守魏主遣中書舍人孫延景謂伯玉曰我今蕩一六合非如嚮時冬來春去不有所克終不還北卿此城當我六龍之首無容不先攻取逺期一年近止一月封侯梟首事在俯仰宜善圖之且卿有三罪今令卿知卿先事武帝蒙殊常之寵不能建忠致命而盡節於其讎罪一也頃年薛真度來卿傷我偏師罪二也今鸞輅親臨不靣縛麾下罪三也伯玉遣軍副樂稚柔對曰承欲攻圍期於必克卑微常人得抗大威真可謂獲其死所外臣蒙武帝採拔豈敢忘恩但嗣君失德主上光紹大宗非唯副億兆之深望抑亦兼武帝之遺敕是以區區盡節不敢失墜往者北師深入寇擾邉民輒厲將士以修職業返已而言不應垂責宛城東南隅溝上有橋魏主引兵過之伯玉使勇士數人衣斑衣戴虎頭帽伏於竇下突出擊之魏主人馬俱驚召善射者原靈度射之應弦而斃乃得免丁未魏主發南陽留太尉咸陽王禧等攻之己酉魏主至新野新野太守劉思忌拒守冬十月丁巳魏軍攻之不克築長圍守之遣人謂城中曰房伯玉已降汝何為獨取糜碎思忌遣人對曰城中兵食猶多未暇從汝小虜語也魏右軍府長史韓顯宗將别軍屯赭陽成公期遣胡松引蠻兵攻其營顯宗力戰破之斬其禆將髙法援顯宗至新野魏主謂曰卿破賊斬將殊益軍藝朕方攻堅城何為不作露布對曰頃聞鎮南將軍王肅獲賊二三人驢馬數匹皆為露布臣在東觀私常哂之近雖仰憑威靈得摧醜虜兵寡力弱擒斬不多脫復髙曵長縑虛張功烈尤而效之其罪彌大臣所以不敢為之解上而已魏主益賢之上詔徐州刺史裴叔業引兵救雍州叔業啓稱北人不樂逺行唯樂鈔掠若侵虜境則司雍之寇自然分矣上從之叔業引兵攻虹城獲男女四千餘人甲戌遣太子中庶子蕭衍右軍司馬張稷救雍州十一月甲午前軍將軍韓秀方等十五將降於魏丁酉魏敗齊兵於沔北將軍王伏保等為魏所獲新野人張䐗帥萬餘家據柵拒魏十二月庚申魏人攻拔雍州刺史曹虎與房伯玉不協故緩救之頓軍樊城丁丑詔遣度支尚書崔慧景救雍州假慧景節帥衆二萬騎千匹向襄陽雍州衆軍並受節度庚午魏主南臨沔水戊寅還新野將軍王曇紛以萬餘人攻魏南青州黃郭戍魏戍主崔僧淵破之舉軍皆沒將軍魯康祚趙公政將兵萬人侵魏太倉口魏豫州刺史王肅使長史清河傅永將甲士三千擊之康祚等軍於淮南永軍於淮北相去十餘里永曰南人好夜斫營必於渡淮之所置火以記淺處乃夜分兵為二部伏於營外又以瓠貯火密使人過淮南岸於深處置之戒曰見火起則亦然之是夜康祚等果引兵斫永營伏兵夾擊之康祚等走趣淮水火既競起不知所從溺死及斬首數千級生擒公政獲康祚之尸以歸豫州刺史裴叔業侵魏楚王戍肅復令永擊之永將心腹一人馳詣楚王戍令填外塹夜伏戰士千人於城外曉而叔業等至城東部分將置長圍永伏兵擊其後軍破之叔業留將佐守營自將精兵數千救之永登門樓望叔業南行數里即開門奮擊大破之獲叔業傘扇鼓幕甲伏萬餘叔業進退失據遂走左右欲追之永曰吾弱率不滿三千彼精甲猶盛非力屈而敗自墮吾計中耳既不測我之虛實足使喪膽俘此足矣何更追之魏主遣謁者就拜永安逺將軍汝南太守封貝丘縣男永有勇力好學能文魏主常歎曰上馬能擊賊下馬作露板唯傅修期耳永泰元年春正月魏統軍李佐攻新野丁亥拔之縛劉思忌問之曰今欲降未思忌曰寧為南鬼不為北臣乃殺之於是沔北大震戊子湖陽戍主蔡道福辛卯都陽戍主成公期壬辰舞隂戍主黃瑶起南鄉太守席謙相繼南遁瑶起為魏所獲魏主以賜王肅肅臠而食之乙巳命太尉陳顯達救雍州庚戌魏主如南陽二月癸丑詔左衛將軍蕭惠休救夀陽甲子魏人拔宛北城房伯玉靣縛出降伯玉從父弟思安為魏中統軍數為伯玉泣請魏主乃赦之庚午魏主如新野辛巳以彭城王協為使持節都督南征諸軍事中軍大將軍開府儀同三司三月壬午朔崔慧景蕭衍大敗於鄧城時慧景至襄陽五郡已沒慧景與衍及軍主劉山陽傅法憲等帥五千餘人進行鄧城魏數萬騎奄至諸軍登城拒守時將士蓐食輕行皆有飢懼之色衍欲出戰慧景曰虜不夜圍人城待日暮自當去既而魏衆轉至慧景於南門拔軍去諸軍不相知相繼皆遁魏兵自北門入劉山陽與部曲數百人斷後死戰且戰且却行慧景過閙溝軍人相蹈藉橋皆斷壞魏兵夾路射之殺傅法憲士卒赴溝死者相枕山陽取襖仗填溝乘之得免魏主將大兵追之晡時至沔山陽據城苦戰至暮魏兵乃退諸軍恐懼是夕皆下船還襄陽庚寅魏兵將十萬衆羽儀華蓋以圍樊城曹虎閉門自守魏主臨沔水望襄陽岸乃去如湖陽辛亥如懸瓠魏鎮南將軍王肅攻義陽裴叔業將兵五萬圍渦陽以救義陽魏南兖州刺史濟北孟表守渦陽糧盡食草木皮葉叔業積所殺魏人髙五丈以示城內别遣軍主蕭璝等攻龍亢魏廣陵王羽救之叔業引兵擊羽大破之追獲其節魏主使安逺將軍傅永征虜將軍劉藻假輔國將軍髙聰等救渦陽並受王肅節度叔業進擊大破之聰奔懸瓠永收散卒徐還叔業再戰凡斬首萬級俘二千餘人獲器械雜畜財物以千萬計魏主命鎖三將詣懸瓠劉藻髙聰免死徙平州傅永奪官爵黜王肅為平南將軍肅表請更遣軍救渦陽魏主報曰觀卿意必以藻等新敗故難於更往朕今少分兵則不足制敵多分兵則禁旅有闕卿審圖之義陽當止則止當下則下若失渦陽卿之過也肅乃解義陽之圍與統軍楊大眼奚康生等步騎十餘萬救渦陽叔業見魏兵盛夜引兵退明日士衆奔潰魏人追之殺傷不可勝數叔業還保義陽夏四月庚午魏發州郡二十萬人期八月中旬集懸瓠秋七月己酉上殂于正福殿太子即位九月己亥魏主聞髙宗殂下詔稱禮不伐喪引兵還魏主得疾甚篤丙午發懸瓠舍于汝濵冬十一月辛巳魏主如鄴東昏侯永元元年春正月太尉陳顯達督平北將軍崔慧景等軍四萬擊魏欲復雍州諸郡癸未魏遣前將軍元英拒之乙酉魏主發鄴二月陳顯達與魏元英戰屢破之攻馬圈城四十日城中食盡噉死人肉及樹皮癸酉魏人突圍走斬獲千計顯達入城將士競取城中絹遂不窮追顯達又遣軍主莊丘黑進擊南鄉拔之魏主謂任城王澄曰顯達侵擾朕不親行無以制之三月庚辰魏主發洛陽命于烈居守以右衛將軍宋辨兼祠部尚書攝七兵事以佐之辨精勤吏治恩遇亞於李沖癸未魏主至梁城崔慧景攻魏順陽順陽太守清河張烈固守甲申魏主遣振威將軍慕容平城將騎五千救之丁酉魏主至馬圈命荆州刺史廣陽王嘉斷均口邀齊兵歸路嘉建之子也陳顯達引兵度水西據鷹子山築城人情沮恐與魏戰屢敗魏武衛將軍元嵩免胄陷陳將士隨之齊兵大敗嵩澄之弟也戊戌夜軍主崔恭祖胡松以烏布幔盛顯逹數人簷之間道自分磧山出均水口南走己亥魏收顯達軍資億計班賜將士追奔至漢水而還左軍將軍張千戰死士卒死者三萬餘人顯達之北伐軍入汮均口廣平馮道根説顯達曰汮均水迅急易進難退魏若守隘則首尾俱急不如悉棄船於鄼城陸道步進列營相次鼓行而前破之必矣顯達不從道根以私屬從軍及顯達夜走軍人不知山路道根每及險要輒停馬指示之衆賴以全詔以道根為汮均口戍副顯達素有威名至是大損御史中丞范岫奏免顯達官顯達亦自表解職皆不許更以顯達為江州刺史崔慧景亦棄順陽走還庚子魏主疾甚北還夏四月丙午殂于榖塘原彭城王協與任城王澄謀以陳顯達去尚未逺恐其覆相掩逼乃祕不發喪徙御卧輿唯二王與左右數人知之協出入神色無異奉膳進藥可決外奏一如平日數日至宛城夜進卧輿於郡聽事得加棺斂還載卧輿內外莫有知者遣中書舍人張儒奉詔徴太子密以凶問告留守于烈烈處分行留舉止無變太子至魯陽遇梓宫乃發喪蕭衍篡齊齊明帝永泰元年春正月上有疾以近親寡弱忌髙武子孫時髙武子孫猶有十王每朔望入朝上還後宫輒歎息曰我及司徒諸子皆不長髙武子孫日益長大上欲盡除髙武之族以微言問陳顯達對曰此等豈足介慮以問楊州刺史始安王遙光遙光以為當以次施行遙光有足疾上常令乘輿自望賢門入每與上屏人久語畢上索香火嗚咽流涕明日必有所誅會上疾暴甚絶而復蘇遙光遂行其策丁未殺河東王鉉臨賀王子嶽西陽王子文永陽王子峻南康王子琳衡陽王子珉湘東王子建南郡王子夏桂陽王昭粲巴陵王昭秀於是太祖世祖及世宗諸子皆盡矣鉉等已死乃使公卿奏其罪狀請誅之下詔不許再奏然後許之南康侍讀濟陽江泌哭子琳淚盡繼之以血親視殯葬畢乃去大司馬會稽太守王敬則自以髙武舊將心不自安上雖外禮甚厚而內相疑備數訪問敬則飲食體幹堪宜聞其衰老且以居內地故得少寬上疾屢危乃以光祿大夫張瓌為平東將軍吳郡太守置兵佐以密防敬則中外傳言當有異處分敬則聞之竊曰東今有誰只是欲平我耳東亦何易可平吾終不受金罌金罌謂鴆也丁卯敬則舉兵反前吳郡太守南康侯子恪嶷之子也敬則起兵以奉子恪為名子恪亡走未知所在始安王遙光勸上盡誅髙武子孫於是悉召諸王侯入宫晉安王寶義江陵公寶覽等處中書省髙武諸孫處西省敕人各從左右兩人過此依軍法孩幼者與乳母俱入其夜令太醫煮椒二斛都水辦棺材數千具須三更當盡殺之子恪徒跣自歸二更達建陽門刺啓時刻已至而上眠不起中書舍人沈徽孚與上所親左右單景俊共謀少留其事須臾上覺景俊啓子恪已至上驚問曰未邪未邪景俊具以事對上撫牀曰遙光幾誤人事乃賜王侯供饌明日悉遣還第以子恪為太子中庶子寶覽𬗟之子也敬則帥實甲萬人過浙江百姓簷篙荷插隨之者十餘萬衆五月壬午詔前軍司馬左興盛後軍將軍崔恭祖輔國將軍劉山陽龍驤將軍馬軍主胡松築壘於曲阿長岡右僕射沈文季為持節都督屯湖頭備京口路恭祖慧景之族也敬則急攻興盛山陽二壘臺軍不能敵欲退而圍不開各死戰胡松引騎兵突其後白丁無器仗皆驚散敬則軍大敗索馬再上不能得崔恭祖刺之仆地興盛軍客袁文曠斬之乙酉傳首建康是時上疾已篤秋七月己酉上殂于正福殿遺詔沈文季可左僕射江祏可右僕射江祀可侍中劉暄可衛尉軍政事委陳太尉內外衆事無大小委徐孝嗣遙光坦之江祏其大事與沈文季江祀劉暄參懷心膂之任可委劉悛蕭惠休崔慧景太子即位八月葬明皇帝於興安陵廟號髙宗東昏侯惡靈在太極殿欲速葬徐孝嗣固爭得踰月帝每當哭輒云喉痛太中大夫羊闡入臨無髮號慟俯仰幘遂脫地帝輟哭大笑謂左右曰秃鶖啼來乎東昏侯永元元年亡帝自在東宫不好學唯嬉戲無度性重澀少言及即位不與朝士相接專親信宦官及左右御刀應敕等是時楊州刺史始安王遙光尚書令徐孝嗣右僕射江祏右將軍蕭坦之侍中江祀衛尉劉暄更直內省分日帖敕雍州刺史蕭衍聞之謂從舅録事參軍范陽張弘䇿曰一國三公猶不堪况六貴同朝藝必相圖亂將作矣避禍圖福無如此州但諸弟在都恐罹世患當更與益州圖之耳乃密與弘策修武備它人皆不得預謀招聚驍勇以萬數多伐材竹沈之檀溪積茅如岡阜皆不之用中兵參軍東平吕僧珍覺其意亦私具櫓數百張先是僧珍為羽林監徐孝嗣欲引置其府僧珍知孝嗣不能久固求從衍是時衍兄懿罷益州刺史還仍行郢州事衍使弘策説懿曰今六貴比肩人自畫敕爭權睚眥理相圖滅主上自東宫素無令譽媟近左右慓輕忍虐安肯委政諸公虛坐主諾嫌忌積久必大行誅戮始安欲為趙王倫形迹已見然性猜量狹徒為禍階蕭坦之忌克陵人徐孝嗣聽人穿鼻江祏無斷劉暄暗弱一朝禍發中外土崩吾兄弟幸守外藩宜為身計及今猜防未生當悉召諸弟恐異時拔足無路矣郢州控帶荆湘雍州士馬精強世治則竭誠本朝世亂則足以厈濟與時進退此萬全之策也若不早圖後悔無及弘策又自説懿曰以卿兄弟英武天下無敵據郢雍二州為百姓請命廢昏立明易於反掌此桓文之業也勿為豎子所欺取笑身後雍州揣之已熟願善圖之懿不從衍乃迎其弟驃騎外兵參軍偉及西中郎外兵參軍憺至襄陽初髙宗雖顧命羣公而多寄腹心在江祏兄弟二江更直殿內動止關之帝稍欲行意徐孝嗣不能奪蕭坦之時有異同而祏執制堅確帝深忿之帝左右會稽茹法珍吳興梅蟲兒等為帝所委任祏常裁折之法珍等切齒徐孝嗣謂祏曰主上稍有異同詎可盡相乖反祏曰但以見付必無所憂帝失德寖彰祏議廢帝立江夏王寶玄劉暄嘗為寶玄郢州行事執事過刻有人獻馬寶玄欲觀之暄曰馬何用觀妃索煮肫帳下咨暄暄曰且已煮鵝不煩復此寶玄恚曰舅殊無渭陽情暄由是忌寶玄不同祏議更欲立建安王寶寅祏密謀於始安王遙光遙光自以年長意欲自取以微旨動祏祏弟祀亦以少主難保勸祏立遙光祏意回惑以問蕭坦之坦之時居母喪起復為領軍將軍謂祏曰明帝立已非次天下至今不服若復為此恐四方瓦解我期不敢言耳遂還宅行喪祏祀密謂吏部郎謝朓曰江夏年少脫不堪負荷豈可復行廢立始安年長入纂不乖物望非以此要富貴政是求安國家耳遙光又遣所親丹陽丞南陽劉渢密致意於朓欲引以為黨朓不答頃之遙光以朓兼知衛尉事朓懼即以祏謀告太子右衛率左興盛興盛不敢發朓又説劉暄曰始安一旦南靣則劉渢劉晏居卿今地但以卿為反覆人耳晏者遙光城局參軍也暄陽驚馳告遙光及祏遙光欲出朓為東陽郡朓常輕祏祏固請除之遙光乃收朓付廷尉與孝嗣祏暄等連名啓朓扇動中外妄貶乘輿竊論宫禁間謗親賢輕議朝宰朓遂死獄中暄以遙光若立已失元舅之尊不肯同祏議故祏遲疑久不決遙光大怒遣左右黃曇慶刺暄於青溪橋曇慶見暄部伍多不敢發暄覺之遂發祏謀帝命收祏兄弟時祀直內殿疑有異遣信報祏曰劉暄自有異謀今作何計祏曰政當靜以鎮之俄有詔召祏入見停中書省初袁文曠以斬王敬則功當封祏執不與帝使文曠取祏文曠以刀環築其心曰復能奪我封不并弟祀皆死劉暄聞祏等死眠中大驚投出户外問左右收至未良久意定還坐大悲曰不念江行自痛也帝自是無所忌憚益得自恣日夜與近習於後堂鼓吹戲馬常以五更就寢至晡乃起羣臣節朔朝見晡後方前或際暗遣出臺閣案奏月數十日乃報或不知所在宦者以裹魚肉還家並是五省黃案帝嘗習騎致適顧謂左右曰江祏常禁吾乘馬小子若在吾豈能得此因問祏親戚餘誰對曰江祥今在冶帝於馬上作敕賜祥死始安王遙光素有異志與其弟荆州刺史遙欣密謀舉兵據東府使遙欣自江陵引兵急下刻期將發而遙欣病卒江祏被誅帝召遙光入殿告以祏罪遙光懼還省即陽狂號哭遂稱疾不復入臺先是遙光弟豫州刺史遙昌率其部曲皆歸遙光及遙欣喪還停東府前渚荆州衆力送者甚盛帝既誅二江慮遙光不自安欲遷為司徒使還第召入諭旨遙光恐見殺秋八月乙卯晡時收集二州部曲於東府東門召劉渢劉晏等謀舉兵以討劉暄為名夜遣數百人破東冶出囚於尚方取仗又召驍騎將軍垣歷生歷生隨信而至蕭坦之宅在東府城東遙光遣人掩取之坦之露坦踰墻走向臺道逢逰邏主顔端執之坦之告以遙光反不信自往詗問知實乃以馬與坦之相隨入臺遙光又掩取尚書左僕射沈文季於其宅欲以為都督會文季已入臺垣歷生説遙光帥城內兵夜攻臺輦荻燒城門曰公但乘輿隨後反掌可克遙光狐疑不敢出天稍曉遙光戎服出聽事命上仗登城行賞賜歷生復勸出軍遙光不肯冀臺中自有變及日出臺軍稍至臺中始聞亂衆情惶惑向曉有詔召徐孝嗣孝嗣入人心乃安左將軍沈約聞變馳入西掖門或勸戎服約曰臺中方擾攘見我戎服或者謂同遙光乃朱衣而入丙辰詔曲赦建康中外戒嚴徐孝嗣以下屯衛宫城蕭坦之帥臺軍討遙光孝嗣內自疑懼與沈文季戎服共坐南掖門上欲與之共論世事文季輒引以它辭終不得及蕭坦之屯湘宫寺左興盛屯東籬門鎮軍司馬曺虎屯青溪大橋衆軍圍東城三靣燒司徒府遙光遣垣厯生從西門出戰臺軍屢敗殺軍主桑天愛遙光之起兵也問咨議參軍蕭暢暢正色不從戊午暢與撫軍長史沈昭略潛自南門出詣臺自歸衆情大沮暢衍之弟昭略文季之兄子也己未垣歷生從南門出戰因棄矟降曹虎虎命斬之遙光大怒於牀上自踊使殺歷生子其晚臺軍以火箭燒東北角樓至夜城潰遙光還小齋帳中著衣帷坐秉燭自照令人反拒齋閣皆重關左右並踰屋散出臺軍主劉國寶等先入遙光聞外兵至滅燭扶匐牀下軍人排閣入於暗中牽出斬之臺軍入城焚燒屋室且盡劉渢走還家為人所殺荆州將潘紹聞遙光作亂謀欲應之西中郎司馬夏侯詳呼紹議事因斬之州府以安己巳以徐孝嗣為司空加沈文季鎮軍將軍侍中僕射如故蕭坦之為尚書右僕射丹楊尹右將軍如故劉暄為領軍將軍曹虎為散騎常侍右衛將軍皆賞平始安之功也江祏等既敗帝左右捉刀應敕之徒皆恣橫用事時人謂之刀敕蕭坦之剛狠而專嬖幸畏而憎之遙光死二十餘日帝遣延明王帥黃文濟將兵圍坦之宅殺之并其子祕書郎賞坦之從兄翼宗為海陵太守未發坦之謂文濟曰從兄海陵宅故應無它文濟曰海陵宅在何處坦之以告文濟白帝帝仍遣收之檢其家至貧唯有質錢帖數百還以啓帝原其死繫尚方茹法珍等譛劉暄有異志帝曰暄是我舅豈應有此直閣新蔡徐世標曰明帝乃武帝同堂恩遇如此猶滅武帝之後舅焉可信邪遂殺之曹虎善於誘納日食荒客常數百人晚節吝嗇罷雍州有錢五千萬它物稱是帝疑虎舊將且利其財遂殺之坦之暄虎所新除官皆未及拜而死初髙宗臨殂以隆昌事戒帝曰作事不可在人後故帝數與近習謀誅大臣皆發於倉猝決意無疑於是大臣人人莫能自保枝江文忠公徐孝嗣以文士不顯同異故名位雖重猶得久存虎賁中郎將許準為孝嗣陳説事機勸行廢立孝嗣遲疑久之謂必無用干戈之理須帝出逰閉城門召百僚集議廢之雖有此懷終不能決諸嬖幸亦稍憎之西豐忠憲侯沈文季自託老疾不豫朝權侍中沈昭略謂文季曰叔父行年六十為員外僕射欲求自免豈可得乎文季笑而不應冬十月乙未帝召孝嗣文季昭略入華林省文季登車顧曰此行恐往而不反帝使外監茹法珍賜以藥酒昭略怒罵孝嗣曰廢昏立明古今令典宰相無才致有今日以甌擲其靣曰使作破靣鬼孝嗣飲藥酒至斗餘乃卒孝嗣子演尚武康公主况尚山隂公主皆坐誅昭略弟昭光聞收至家人勸之逃昭光不忍捨其母入執母手悲泣收者殺之昭光兄子曇亮逃已得免聞昭光死歎曰家門屠滅何以生為絶吭而死初太尉陳顯達自以髙武舊將當髙宗之世內懷危懼深自貶損常乘朽弊車道從鹵簿止用羸小者十數人嘗侍宴酒酣啓髙宗借枕髙宗令與之顯達撫枕曰臣年衰老富貴已足唯欠枕枕死特就陛下乞之髙宗失色曰公醉矣顯達以年禮告退髙宗不許及王敬則反時顯達將兵拒魏始安王遙光疑之啓髙宗欲追軍還會敬則平乃止及帝即位顯達彌不樂在建康得江州甚喜嘗有疾不令治既而自愈意甚不恱聞帝屢誅大臣傳云當遣兵襲江州十一月丙辰顯達舉兵於尋陽令長史庾弘逺等與朝貴書數帝罪惡云欲奉建安王為主須京塵一靜西迎大駕乙丑以護軍將軍崔慧景為平南將軍督衆軍擊顯達後軍將軍胡松驍騎將軍李叔獻帥水軍據梁山左衛將軍左興盛督前鋒軍屯杜姥宅十二月陳顯達發尋陽敗胡松於采石建康震恐甲申軍於新林左興盛帥諸軍拒之顯達多置屯火於岸側潛軍夜渡襲宫城乙酉顯達以數千人登落星岡新亭諸軍聞之奔還宫城大駭閉門設守顯達執馬矟從步兵數百於西州前與臺軍戰再合顯達大勝手殺數人矟折臺軍繼至顯達不能抗退走至西州後騎官趙潭注刺顯達墜馬斬之諸子皆伏誅帝既誅顯達益自驕恣漸出逰走又不欲人見之每出先驅斥所過人家唯置空宅尉司擊鼓踏圍鼓聲所聞便應奔走不暇衣履犯禁者應手格殺一月凡二十餘出出輒不言定所東西南北無處不驅常以三四更中鼓聲四出火光照天幡戟橫路士民喧走相隨老小震驚啼號塞道處處禁斷不知所過四民廢業樵蘇路斷吉凶失時乳婦寄産或輿病棄尸不得殯葬巷陌懸幔為髙鄣置仗人防守謂之屏除亦謂之長圍嘗至沈公城有一婦人臨産不去因剖腹視其男女又嘗至定林寺有沙門老病不能去藏草間命左右射之百箭俱發帝有膂力牽弓至三斛五斗又好簷幢白虎幢髙七丈五尺於齒上擔之折齒不倦自制擔幢校具伎衣飾以金玉侍衛滿側逞諸變態曾無愧色學乘馬於東冶營兵俞靈韻常著織成袴褶金薄帽執七寶矟急裝縛袴凌冒雨雪不避坑穽馳騁渴乏輒下馬解取腰邉蠡器酌水飲之復上馬馳去又選無賴小人善走者為逐馬左右五百人常以自隨或於市側過親幸家環回宛轉周遍城邑或出郊射雉置射雉埸二百九十六處奔走往來略不暇息二年豫州刺史裴叔業聞帝數誅大臣心不自安及除南兖州意不樂內徙朝廷疑叔業有異志叔業兄子植等皆為直閣在殿中懼奔夀陽説叔業以朝廷必相掩襲宜早為計叔業遣親人馬文範至襄陽問蕭衍以自安之計曰天下大勢可知恐無復自存之理不若回靣向北不失作河南公衍報曰羣小用事豈能及逺計慮回惑自無所成唯應送家還都以安慰之若意外相逼當勒馬步二萬直出橫江以斷其後則天下之事一舉可定若欲北向彼必遣人相伐以河北一州相處河南公寧可復得邪如此則南歸之望絶矣叔業沈疑未決乃遣其子芬之入建康為質亦遣信詣魏豫州刺史薛真度問以入魏可不之宜真度勸其早降曰若事迫而來則功微賞薄矣數遣密信往來相應和建康人傳叔業叛者不已芬之懼復奔夀陽叔業遂遣芬之及兄女壻杜陵韋伯昕奉表降魏庚午下詔討叔業己亥叔業病卒三月乙卯遣西平將軍崔慧景將水軍討夀陽帝屏除出琅邪城送之帝戎服坐樓上召慧景單騎進圍內無一人自隨者裁數言拜辭而去慧景既得出甚喜崔慧景之發建康也其子覺為直閣將軍密與之約慧景至廣陵覺走從之慧景過廣陵數十里召會諸軍主曰吾荷三帝厚恩當顧託之重幼主昏狂朝廷壞亂危而不扶責在今日欲與諸君共建大功以安社稷何如衆皆響應於是還軍向廣陵司馬崔恭祖守廣陵城開門納之帝聞變壬子假右衛將軍左興盛節督建康水陸諸軍以討之慧景停廣陵二日即收衆濟江初南徐兖二州刺史江夏王寶玄娶徐孝嗣女為妃孝嗣誅詔令離昏寶玄恨望慧景遣使奉寶玄為主寶玄斬其使因發將吏守城帝遣馬軍主戚平外監黃林夫助鎮京口慧景將渡江寶玄密與相應殺司馬孔矜典籖吕承緒及平林夫開門納慧景使長史沈佚之咨議柳憕分部軍衆寶玄乘八掆輿手執絳麾隨慧景向建康臺遣驍騎將軍張佛護直閣將軍徐元稱等六將據竹里為數城以拒之寶玄遣信謂佛護曰身自還朝君何意苦相斷遏佛護對曰小人荷國重恩使於此創立小戍殿下還朝但自直過豈敢斷遏遂射慧景軍因合戰崔覺崔恭祖將前鋒皆荒愴善戰又輕行不㸑食以數舫緣江載酒肉為軍糧每見臺軍城中煙火起輒盡力攻之臺軍不復得食以此飢困元稱等議欲降佛護不可恭祖等進攻城拔之斬佛護徐元稱降餘四軍主皆死乙卯遣中領軍王瑩都督衆軍據湖頭築壘上帶蔣山西巖守甲數萬瑩誕之從曾孫也慧景至查硎竹塘人萬副兒説慧景曰今平路皆為臺軍所斷不可議進唯宜從蔣山龍尾上出其不意耳慧景從之分遣千餘人魚貫緣山自西巖夜下鼓呌臨城中臺軍驚恐即時奔散帝又遣右衛將軍左興盛帥臺內三萬人拒慧景於北籬門興盛望風退走甲子慧景入樂逰苑崔恭祖帥輕騎千餘突入北掖門乃復出宫門皆閉慧景引衆圍之於是東府石頭白下新亭諸城皆潰左興盛走不得入宫逃淮渚荻舫中慧景擒殺之宫中遣兵出蕩不克慧景燒蘭臺府署為戰場守衛尉蕭暢屯南掖門處分城內隨方應拒衆心稍安慧景稱宣德太后令廢帝為吳王陳顯達之反也帝復召諸王侯入宫巴陵王昭胄懲永泰之難與弟永新侯昭潁詐為沙門逃於江西昭胄子良之子也及慧景舉兵昭胄兄弟出赴之慧景意更向昭胄猶豫未知所立竹里之捷崔覺與崔恭祖爭功慧景不能決恭祖勸慧景以火箭燒北掖樓慧景以大事垂定後若更造費用功多不從慧景性好談義兼解物理頓法輪寺對客髙談恭祖深懷怨望時豫州刺史蕭懿將兵在小峴帝遣密使告之懿方食投箸而起帥軍主胡松李居士等數千人自采石濟江頓越城舉火臺城中鼓呌稱慶恭祖先勸慧景遣二千人斷西岸兵令不得度慧景以城旦夕降外救自然應散不從至是恭祖請擊懿軍又不許獨遣崔覺將精卒數千人渡南岸懿軍昧旦進戰數合士皆致死覺大敗赴淮死者二千餘人覺單馬退開桁阻淮恭祖掠得東宫女伎覺逼奪之恭祖積忿恨其夜與慧景驍將劉靈運詣城隆衆心離壞夏四月癸酉慧景將腹心數人潛去欲北渡江城此諸軍不知猶為拒戰城內出蕩殺數百人懿軍渡北岸慧景餘衆皆走慧景圍城凡十二日而敗從者於道稍散單騎至蟹浦為漁人所斬以頭內鰌籃擔送建康恭祖繫尚方少時殺之覺亡命為道人捕獲伏誅寶玄初至建康軍於東城士民多往投集慧景敗收得朝野投寶玄及慧景人名帝令燒之曰江夏尚爾豈可復罪餘人寶玄逃亡數日乃出帝召入後堂以步障裹之令左右數十人鳴鼓角馳繞其外遣人謂寶玄曰汝近圖我亦如此耳五月己酉江夏王寶玄伏誅六月乙丑曲赦建康南徐兖二州先是崔慧景既平詔赦其黨而嬖幸用事不依詔書無罪而家富者皆誣為賊黨殺而籍其資實附賊而貧者皆不問或謂中書舍人王咺之云赦書無信人情大惡咺之曰正當復有赦耳由是再赦既而嬖幸誅縱亦如初是時帝所寵左右凡三十一人黃門十人直閣驍騎將軍徐世􅋆素為帝所委任凡有殺戮皆在其手及陳顯達事起加輔國將軍雖用護軍崔慧景為都督而兵權實在世􅋆世􅋆亦知帝昏縱密謂其黨茹法珍梅蟲兒曰何世天子無要人但儂貨主惡耳法珍等與之爭權以白帝帝稍惡其凶強遣禁兵殺之世􅋆拒戰而死自是法珍蟲兒用事並為外監口稱詔敕王咺之專掌文翰與相脣齒帝呼所幸潘貴妃父寶慶及茹法珍為阿丈梅蟲兒及俞靈韻為阿兄帝與法珍等俱詣寶慶家躬自汲水助厨人作膳寶慶恃勢作姦富人悉誣以罪田宅資財莫不啓乞一家被陷禍及親鄰又慮後患盡殺其男口帝數往諸刀敕家遊宴有吉凶輒往慶弔奄人王寶孫年十三四號為倀子最有寵參豫朝政雖王咺之梅蟲兒之徒亦下之控制大臣移易詔敕乃至騎馬入殿詆訶天子公卿見之莫不懾息焉八月甲辰夜後宫火時帝出未還宫內人不得出外人不敢輒開比及開死者相枕燒三千餘間時嬖幸之徒皆號為鬼有趙鬼者能讀西京賦言於帝曰柏梁既災建章是營帝乃大起芳樂玉夀等諸殿以麝香塗壁刻畫裝飾窮極綺麗役者自夜達曉猶不副速後宫服御極選珍竒府庫舊物不復周用貴市民間金寶價皆數倍建康酒租皆折使輸金猶不能足鑿金為蓮華以帖地令潘妃行其上曰此步步生蓮華也又訂出雉頭鶴氅白鷺縗嬖幸因緣為姦利課一輸十又各就州縣永為人輸準取見直不為輸送守宰皆不敢言重加科斂如此相仍前後不息百姓困盡號泣道路蕭懿之入援也蕭衍馳使所親虞安福説懿曰誅賊之後則有不賞之功當明君賢主尚或難立況於亂朝何以自免若賊滅之後仍勒兵入宫行伊霍故事此萬世一時若不欲爾便放表還歷陽託以外拒為事則威振內外誰敢不從一朝放兵受其厚爵髙而無民必生後悔長史徐曜甫亦苦勸之懿並不從崔慧景死懿為尚書令有弟九人敷衍暢融宏偉秀憺恢懿以元勳居朝右暢為衛尉掌管籥時帝出入無度或勸懿因其出門舉兵廢之懿不聽嬖臣茹法珍王咺之等憚懿威權説帝曰懿將行隆昌故事陛下命在晷刻帝然之徐曜甫知之密具舟江渚勸懿西奔襄陽懿曰自古皆有死豈有叛走尚書令邪懿弟姪咸為之備冬十月己卯帝賜懿藥於省中懿且死曰家弟在雍深為朝廷憂之懿弟姪皆亡匿於里巷無人發之者唯融捕得誅之初帝疑雍州刺史蕭衍有異志直後滎陽鄭植弟紹叔為衍寧蠻長史帝使植以候紹叔為名往刺衍紹叔知之密以白衍衍置酒紹叔家戲植曰朝廷遣卿見圖今日間宴是可取良會也賔主大笑又令植歷觀城隍府庫士馬器械舟艦植退謂紹叔曰雍州實力未易圖也紹叔曰兄還具為天子言之若取雍州紹叔請以此衆一戰送植於南峴相持慟哭而别及懿死衍聞之夜召張弘䇿吕僧珍長史王茂别駕劉慶逺功曹吉士瞻等入宅定議茂天生之子慶逺元景之弟子也十一月乙巳衍集僚佐謂曰昏主暴虐惡踰於紂當與卿等共除之是日建牙集衆得甲士萬餘人馬千餘匹船三千艘出檀溪竹木裝艦葺之以茅事皆立辦諸將爭櫓吕僧珍出先所具者每船付二張爭者乃息是時南康王寶融為荆州刺史西中郎長史蕭頴胄行府州事帝遣輔國將軍巴西梓潼二郡太守劉山陽將兵三千之官就頴胄兵使襲襄陽衍知其謀遣參軍王天虎詣江陵遍與州府書聲云山陽西上并襲荆雍衍因謂諸將佐曰荆州素畏襄陽人皆以脣亡齒寒寧不暗同邪我合荆雍之兵鼓行而東雖使韓白復生不能為建康計況以昏主役刀敕之徒哉頴胄等得書疑未能決山陽至巴陵衍復令天虎齎書與頴胄及其弟南康王友頴達天虎既行衍謂張弘策曰用兵之道攻心為上近遣天虎往荆州人皆有書今假乘驛甚急止有兩函與行事兄弟云天虎口具及問天虎而口無所説天虎是行事心膂彼間必謂行事與天虎共隱其事則人人生疑山陽惑於衆口必相嫌二則行事進退無以自明必入吾謀內是馳兩空函定一州矣山陽至江安遲回十餘日不上頴胄大懼計無所出夜遣呼西中郎城局參軍安定席闡文咨議參軍柳忱閉齋定議闡文曰蕭雍州蓄養士馬非復一日江陵素畏襄陽人又衆寡不敵取之必不可制就能制之歲寒復不為朝廷所容今若殺山陽與雍州舉事立天子以令諸侯則霸業成矣山陽持疑不進是不信我今斬送天虎則彼疑可釋至而圖之罔不濟矣忱曰朝廷狂悖日滋京師貴人莫不重足纍息今幸在逺得暇日自安雍州之事且藉以相斃耳獨不見蕭令君乎以精兵數千破崔氏十萬衆竟為羣邪所陷禍酷相尋前事之不忘後事之師也且雍州士鋭糧多蕭使君雄姿冠世必非山陽所能敵若破山陽荆州復受失律之責進退無所宜深慮之蕭頴達亦勸頴胄從闡文等計詰旦頴胄謂天虎曰卿與劉輔國相識今不得不借卿頭乃斬天虎送示山陽發民車牛聲云起步軍征襄陽山陽大喜甲寅山陽至江津單車白服從左右數十人詣頴胄使前汶陽太守劉孝慶等伏兵城內山陽入門即於車中斬之副軍主李元履收餘衆請降柳忱世隆之子也頴胄慮西中郎司馬夏侯詳不同以告忱忱曰易耳近詳求昏未之許也乃以女嫁詳子夔而告之謀詳從之乙卯以南康王寶融教纂嚴又教赦囚徒施惠澤頒賞格丙辰以蕭衍為使持節都督前鋒諸軍事丁巳以蕭頴胄為都督行留諸軍事頴胄遣使送劉山陽首於蕭衍且言年月未利當須明年二月進兵衍曰舉事之初所藉者一時驍鋭之心事事相接猶恐疑怠若頓兵十旬必生悔吝且坐甲十萬糧用自竭若童子立異則大事不成況處分已定安可中息哉昔武王伐紂行逆太歲豈復待年月乎戊午衍上表勸南康王寶融稱尊號不許十二月頴胄與夏侯詳移檄建康百官及州郡牧守數帝及梅蟲兒茹法珍罪惡頴胄遣冠軍將軍天水楊公則向湘州西中郎參軍南郡鄧元起向夏口乙亥荆州將佐復勸寶融稱尊號不許夏侯詳之子驍騎將軍亶為殿中主帥詳密召之亶自建康亡歸壬辰至江陵稱奉宣德皇太后令南康王宜纂承皇祚方俟清宫未即大號可封十郡為宣城王相國荆州牧加黃鉞選百官西中郎府南康國如故須軍次近路主者備法駕奉迎竟陵太守新野曹景宗遣親人説蕭衍迎南康王都襄陽先正尊號然後進軍衍不從初陳顯崔達慧景之亂人心不安或問時事於上庸太守杜陵韋睿睿曰陳雖舊將非命世才更事懦而不武其赤族宜矣定天下者殆必在將乎乃遣二子自結於蕭衍及衍起兵睿帥郡兵二千倍道赴之華山太守藍田康絢帥郡兵三千赴衍馮道根居母喪聞衍起兵帥鄉人子弟勝兵者悉往赴之梁南秦二州刺史柳惔亦起兵應衍惔忱之兄也帝聞劉山陽死發詔討荆雍戊寅以冠軍長史劉澮為雍州刺史遣驍騎將軍薛元嗣制局監暨榮伯將兵及運糧百四十餘船送郢州刺史張沖使拒西師元嗣等懲劉山陽之死疑沖不敢進停夏口浦聞西師將至乃相帥入郢城前竟陵太守房僧寄將還建康至郢帝敕僧寄留守魯山除驍騎將軍張沖與之結盟遣軍主孫樂祖將數千人助僧寄守魯山蕭頴胄與武寧太守鄧元起大言於衆曰朝廷暴虐誅戮宰輔羣小用事衣冠道盡荆雍二州同舉大事何患不克且我老母在西若事不成正受戮昏朝幸免不孝之罪即日治嚴上道至江陵為西中郎中兵參軍湘州行事張寶積發兵自守未知所附楊公則克巴陵進軍白沙寶積懼請降公則入長沙撫納之和帝中興元年春正月乙巳南康王寶融始稱相國大赦以蕭頴胄為左長史蕭衍為征東將軍楊公則為湘州刺史戊申蕭衍發襄陽留弟偉揔府州事憺守壘城府司馬莊丘黑守樊城衍既行州中兵及儲偫皆虛魏興太守裴師仁齊興太守顔僧都並不受衍命舉兵欲襲襄陽偉憺遣兵邀擊於始平大破之雍州乃安二月壬午東昏侯遣羽林兵擊雍州中外纂嚴甲申蕭衍至竟陵命王茂曹景宗為前軍以中兵參軍張法安守竟陵城茂等至漢口諸將議欲併兵圍郢分兵襲西陽武昌衍曰漢口不闊一里箭道交至房僧寄以重兵固守與郢城為掎角若悉衆前進僧寄必絶我軍後悔無所及不若遣王曹諸軍濟江與荆州軍合以逼郢城吾自圍魯山以通沔漢使鄖城竟陵之粟方舟而下江陵湘中之兵相繼而至兵多食足何憂兩城之不拔天下之事可以卧取之耳乃使茂等帥衆濟江頓九里張沖遣中兵參軍陳光靜開門迎戰茂等擊破之光靜死沖嬰城自守景宗遂據石橋浦連軍相續下至加湖荆州遣冠軍將軍鄧元起軍主王世興田安之將數千人會雍州兵於夏首衍築漢口城以守魯山命水軍王義陽張惠紹等遊遏江中絶郢魯二城信使楊公則舉湘州之衆會于夏口蕭頴胄命荆州諸軍皆受公則節度雖蕭頴達亦隸焉時朝議欲遣人行湘州事而難其人西中郎中兵參軍劉坦謂衆曰湘土人情易擾難信用武士則侵漁百姓用文士則威略不振必欲鎮靜一州軍民足食無踰老夫乃以坦為輔國長史長沙太守行湘州事坦先嘗在湘州多舊恩迎者屬路下車選堪事吏分詣十郡發民運租米三千餘萬斛以助荆雍之軍由是資糧不乏三月蕭衍使鄧元起進據南堂西渚田安之頓城北王世興頓曲水故城丁酉張沖病卒驍騎將軍薛元嗣與沖子孜及征虜長史江夏內史程茂共守郢城乙巳南康王即皇帝位於江陵改元大赦立宗廟南北郊州府城門悉依建康宫置尚書五省以南郡太守為尹以蕭頴胄為尚書令蕭衍為左僕射晉安王寶義為司空廬陵王寶源為車騎將軍開府儀同三司建安王寶寅為徐州刺史散騎常侍夏侯詳為中領軍冠軍將軍蕭偉為雍州刺史丙午詔封庶人寶卷為涪陵王乙酉以尚書令蕭頴胄行荆州刺史加蕭衍征東大將軍都督征討諸軍事假黃鉞時衍次揚口和帝遣御史中丞宗夬勞軍寧朔將軍新野庾域諷夬曰黃鉞未加非所以揔帥侯伯夬返西臺遂有是命薛元嗣遣軍主沈難當帥輕舸數千亂流來戰張惠紹等擊擒之癸丑東昏侯以豫州刺史陳伯之為江州刺史假節都督前鋒諸軍事西擊荆雍夏四月蕭衍出沔命王茂蕭頴達等進軍逼郢城薛元嗣不敢出諸將欲攻之衍不許五月東昏侯遣軍主吳子陽陳虎牙等十三軍救郢州進屯巴口虎牙伯之之子也六月西臺遣衛尉席闡文勞蕭衍軍齎蕭頴胄等議謂衍曰今頓兵兩岸不併軍圍郢定西陽武昌取江州此機已失莫若請救於魏與北連和猶為上䇿衍曰漢口路通荆雍控引秦梁糧運資儲仰此氣息所以兵壓漢口連結數州今若併軍圍郢又分兵前進魯山必阻沔路扼吾咽喉若糧運不通自然離散何謂持久鄧元起近欲以三千兵往取尋陽彼若歡然知機一説士足矣脫距王師固非三千兵所能下也進退無據未見其可西陽武昌取之即得然既得之後即應鎮守欲守兩城不減萬人糧儲稱是卒無所出脫東軍有上者以萬人攻一城兩城藝不得相救若我分軍應援則首尾俱弱如其不遣孤城必陷一城既沒諸城相次土崩天下大事去矣若郢州既拔席卷沿流西陽武昌自然風靡何遽分兵散衆自貽憂患乎且丈夫舉事欲清天步況擁數州之兵以誅羣小懸河注火奚有不滅豈容北靣請救戎狄以示弱於天下彼未必能信徒取醜聲此乃下計何謂上䇿卿為我輩白鎮軍前途攻取但以見付事在目中無患不捷但借鎮軍靖鎮之耳吳子陽等進軍武口衍命軍主梁天惠等屯漁湖城唐修期等屯白陽壘夾岸待之子陽進軍加湖去郢三十里傍山帶水築壘自固子陽舉烽城內亦舉火應之而內外各自保不能相救會房僧寄病卒衆復推助張樂祖代守魯山東昏侯作芳樂苑山石皆塗以五采望民家有好樹美竹則毁牆撤屋而徙之時方盛暑隨即枯萎朝暮相繼又於苑中立市使宫人宦者共為禆販以潘貴妃為市令東昏侯自為市録事小有得失妃則與杖乃敕虎賁不得進大荆實中荻又開渠立埭身自引船或坐而屠肉又好巫覡左右朱光尚詐云見鬼東昏入樂逰苑人馬忽驚以問光尚對曰嚮見先帝大嗔不許數出東昏大怒拔刀與光尚尋之既不見乃縛菰為髙宗形北向斬之縣首苑門崔慧景之敗也巴陵王昭胄永新侯昭頴出投臺軍各以王侯還第心不自安竟陵王子良故防閣桑偃為梅蟲兒軍副與前巴西太守蕭寅謀立昭胄昭胄許事克用寅為尚書左僕射護軍時軍主胡松將兵屯新亭寅遣人説之曰須昏人出寅等將兵奉昭胄入臺閉城號令昏人必還就將軍但閉壘不應則三公不足得也松許諾會東昏新作芳樂苑經月不出逰偃等議募健兒百餘人從萬春門入突取之昭胄以為不可偃同黨王山沙慮事久無成以事告御刀徐僧重寅遣人殺山沙於路吏於麝幐中得其事昭胄兄弟與偃等皆伏誅雍州刺史張欣泰與弟前始安內史欣時密謀結胡松及前南譙太守王靈秀直閣將軍鴻選等誅諸嬖幸廢東昏東昏遣中書舍人馮元嗣監軍救郢秋七月甲午茹法珍梅蟲兒及太子右率李居士制局監楊明泰送之於中興堂欣泰等使人懷刀於座斫元嗣頭墜果柈中又斫明泰破其腹蟲兒傷數瘡手指皆墮居士法珍等散走還臺靈秀詣石頭迎建康王寶寅帥城中將吏見力去車輪載寶寅文武數百唱警蹕向臺城百姓數千人皆空手隨之欣泰聞事作馳馬入宫冀法珍等在外東昏盡以城中處分見委表裏相應既而法珍得返處分閉門上仗不配欣泰兵鴻選在殿內亦不敢發寶寅在杜姥宅日已瞑城門閉城上人射外人外人棄寶寅潰去寶寅亦逃三日乃戎服詣草市尉尉馳以啓東昏東昏召寶寅入宫問之寶寅涕泣稱爾日不知何人逼使上車仍將去制不自由東昏笑復其爵位張欣泰等事覺與胡松皆伏誅蕭衍使征虜將軍王茂軍主曹宗仲等乘水漲以舟師襲加湖鼓譟攻之丁酉加湖潰吳子陽等走免將士殺溺死者萬計俘其餘衆而還於是郢魯二城相視奪氣魯山乏糧軍人於磯頭捕細魚供食密治輕船將奔夏口蕭衍遣偏軍斷其走路丁巳孫樂祖窘迫以城降己未東昏侯以程茂為郢州刺史薛元嗣為雍州刺史是日茂元嗣以郢城降郢城之初圍也士民男女近十萬口閉門二百餘日疾疫流腫死者什七八積尸牀下而寢其上比屋皆滿茂元嗣等議出降使張孜為書與衍張沖故吏青州治中房長瑜謂孜曰前使君忠貫昊天郎君但當坐守畫一以荷析薪若天運不與當幅巾待命下從使君今從諸人之計非唯郢州士女失髙山之望亦恐彼所不取也孜不能用蕭衍以韋睿為江夏太守行郢府事收瘞死者而撫其生者郢人遂安諸將欲頓軍夏口衍以為宜乘勝直指建康車騎咨議參軍張弘䇿寧逺將軍庾域亦以為然衍命衆軍即日上道緣江至建康凡磯浦村落軍行宿次立頓處所弘策逆為圖畫如在目中汝南民胡文超起兵於灄陽以應蕭衍求取義陽安陸等郡以自效衍又遣軍主唐修期攻隨郡皆克之司州刺史王僧景遣子貞孫為質於衍司部悉平初東昏侯遣陳伯之鎮江州以為吳子陽等聲援子陽等既敗蕭衍謂諸將曰用兵未必須實力所聽威聲耳今陳虎牙狼狽奔歸尋陽人情理當恟懼可傳檄而定也乃命搜俘囚得伯之幢主蘇隆之厚加賜與使説伯之許即用為安東將軍江州刺史伯之遣隆之返命雖許歸附而云大軍未須遽下衍曰伯之此言意懷首鼠及其猶豫急往逼之計無所出藝不得不降乃命鄧元起引兵先下楊公則徑掩柴桑衍與諸將以次進路元起將至尋陽伯之收兵退保湖口留陳虎牙守湓城選曹郎吳興沈瑀説伯之迎衍伯之泣曰余子在都不能不愛瑀曰不然人情胸胸皆思改計若不早圖衆散難合八月丙子衍至尋陽伯之束甲請罪初新蔡太守席謙父恭穆為鎮西司馬為魚復侯子響所殺謙從伯之鎮尋陽聞衍東下曰我家世忠貞有殞不二伯之殺之乙卯以伯之為江州刺史虎牙為徐州刺史魯休烈蕭璝破劉孝慶等於峽口任漾之戰死休烈等進至上明江陵大震蕭頴胄恐馳告蕭衍令遣楊公則還援根本衍曰公則今泝流上江陵雖至何能及事休烈等烏合之衆尋自退散政須少時持重耳良須兵力兩弟在雍指遣往徴不為難至頴胄乃遣軍主蔡道恭假節屯上明以拒蕭璝辛巳東昏侯以太子左率李居士㧾督西討諸軍事屯新亭九月乙未詔蕭衍若定京邑得以便宜從事衍留驍騎將軍鄭紹叔守尋陽與陳伯之引兵東下謂紹叔曰卿吾之蕭何寇恂也前塗不捷我當其咎糧運不繼卿任其責紹叔流涕拜辭比克建康紹叔督江湘糧運未嘗乏絶甲申東昏侯以李居士為江州刺史冠軍將軍王珍國為雍州刺史建安王寶寅為荆州刺史輔國將軍申胄監郢州龍驤將軍扶風馬仙琕監豫州驍騎將軍徐元稱監徐州軍事珍國廣之子也是日蕭衍前軍至蕪湖申胄軍二萬人棄姑孰走衍進軍據之戊申東昏侯以後軍參軍蕭璝為司州刺史前輔國將軍魯休烈為益州刺史蕭衍之克江郢也東昏侯逰騁如舊謂茹法珍曰須來至白門前當一決衍至近道乃聚兵為固守之計簡二尚方二冶囚徒以配軍其不可活者於朱雀門內日斬百餘人衍遣曹景宗等進頓江寧丙辰李居士自新亭選精騎一千至江寧景宗始至營壘未立而師行日久器甲穿弊居士望而輕之鼓譟前薄之景宗奮擊破之因乘勝而前徑至皂莢橋於是王茂鄧元超吕僧珍進據赤鼻邏新亭城主江道林引兵出戰衆軍擒之於陳衍至新林命王茂進據越城鄧元起據道士墩陳伯之據籬門吕僧珍據白板橋李居士覘之僧珍衆少帥鋭卒萬人直來薄壘僧珍曰吾衆少不可逆戰可勿遙射須至塹裏當并力破之俄而皆越塹拔柵僧珍分人上城矢石俱發自帥馬步三百人出其後城上人復踰城而下內外奮擊居士敗走獲其器甲不可勝計居士請於東昏侯燒南岸邑屋以開戰場自大航以西新亭以北皆盡衍諸弟皆自建康自拔赴軍冬十月甲戌東昏侯遣征虜將軍王珍國軍主胡虎牙將精兵十萬餘人陳於朱雀航南宦官王寶孫持白虎幡督戰開航背水以絶歸路衍軍小却王茂下馬單刀直前其甥韋欣慶執鐡纒矟以翼之衝擊東軍應時而陷曹景宗縱兵乘之吕僧珍縱火焚其營將士皆殊死戰鼓譟震天地珍國等衆軍不能抗王寶孫切罵諸將帥直閣將軍席豪發憤突陳而死豪驍將也既死士卒土崩赴淮死者無數積尸與航等後至者乘之以濟於是東昏侯諸軍望之皆潰衍軍長驅至宣陽門諸將移營稍前陳伯之屯西明門每城中有降人出伯之輒呼與耳語衍恐其復懷翻覆密語伯之曰聞城中甚忿卿舉江州降欲遣刺客中卿宜以為慮伯之未之信會東昏侯將鄭伯倫來降衍使伯倫過伯之謂曰城中甚忿卿欲遣信誘卿以封賞須卿復降當生割卿手足卿若不降復欲遣刺客殺卿宜深為備伯之懼自是始無異志戊寅東昏寧朔將軍徐元瑜以東府城降青冀二州刺史桓和入援屯東宫己卯和詐東昏云出戰因以其衆來降光祿大夫張瓌棄石頭還宫李居士以新亭降於衍琅邪城主張木亦降壬午衍鎮石頭命諸軍攻六門東昏燒門內營署官府驅逼士民悉入宫城閉門自守衍命諸軍築長圍守之楊公則屯領軍府壘北樓與南掖門相對嘗登樓望戰城中遙見麾蓋以神鋒弩射之矢貫胡牀左右失色公則曰幾中吾腳談笑如初東昏夜選勇士攻公則柵軍中驚擾公則堅卧不起徐命擊之東昏兵乃退公則所領皆湘州人素號怯懦城中輕之每出蕩輒先犯公則壘公則奬厲軍士克獲更多先是東昏遣軍主左僧慶屯京口常僧景屯廣陵李奴獻屯瓜步及申胄自姑孰奔歸使屯破墩以為東北聲援至是衍遣使曉諭皆帥其衆來降衍遣弟輔國將軍秀鎮京口輔國將軍恢鎮破墩從弟寧朔將軍景鎮廣陵巴東獻武公蕭頴胄以蕭璝與蔡道恭相持不決憂憤成疾十一月壬午卒夏侯詳袐之使似其書者假為教命密報蕭衍衍亦祕之詳徴兵雍州蕭偉遣蕭憺將兵赴之璝等聞建康已危衆懼而潰璝及魯休烈皆降乃發頴胄喪贈侍中丞相於是衆望盡歸於衍崔慧景之逼建康也東昏侯拜蔣子文神為假黃鉞使持節相國太宰大將軍録尚書事楊州牧鍾山王及衍至又尊子文為靈帝迎神像入後堂使巫禱祀求福及城閉城中軍事悉委王珍國兖州刺史張稷入衛京師以稷為珍國之副稷瓌之弟也時城中實甲猶七萬人東昏素好軍陳與黃門刀敕及宫人於華光殿前習戰鬬詐作被創勢使人以板掆去用為猒勝常於殿中戎服騎馬出入以金銀為鎧胄具裝飾以孔翠晝眠夜起一如平常聞外鼓呌聲被大紅袍登景陽樓屋上望之弩幾中之始東昏與左右謀以為陳顯達一戰即敗崔慧景圍城尋走謂衍兵亦然敕太官辦樵米為百日調而已及大桁之敗衆情凶懼茹法珍等恐士民逃潰故閉城不復出兵既而長圍已立塹柵嚴固然後出蕩屢戰不捷東昏尤惜金錢不肯賞賜法珍叩頭請之東昏曰賊來獨取我邪何為就我求物後堂儲數百具榜啓為城防東昏欲留作殿竟不與又督御府作三百人精仗待圍解以擬屏除金銀雕鏤雜物倍急於常衆皆怨怠不為致力外圍既久城中皆思早亡莫敢先發茹法珍梅蟲兒説東昏曰大臣不留意使圍不解宜悉誅之王珍國張稷懼禍珍國密遣所親獻明鏡於蕭衍衍斷金以報之兖州中兵參軍馮翊張齊稷之腹心也珍國因齊密與稷謀同弒東昏齊夜引珍國就稷造膝定計齊自執燭又以計告後閣舍人錢強十二月丙寅夜強密令人開雲龍門珍國稷引兵入殿御刀豐勇之為內應東昏在含德殿作笙歌寢未熟聞兵入趨出北户欲還後宫門已閉宦者黃泰平刀傷其膝仆地張齊斬之稷召尚書右僕射王亮等列坐殿前西鍾下令百僚署箋以黃油裹東昏首遣國子博士范雲等送詣石頭右衛將軍王志歎曰冠雖弊何可加足取庭中樹葉挼服之偽悶不署名衍覽箋無志名心嘉之亮瑩之從弟志僧虔之子也衍與范雲有舊即留參帷幄王亮在東昏朝以依違取容蕭衍至新林百僚皆間道送欵亮獨不遣東昏敗亮出見衍衍曰顛而不扶安用彼相亮曰若其可扶明公豈有今日之舉城中出者或𬒳劫剝楊公則親帥麾下陳於東掖門衛送公卿士民故出者多由公則營焉衍使張弘策先入清宫封府庫及圖籍于時城內珍寶委積弘策禁勒部曲秋毫無犯收潘妃及嬖臣茹法珍梅蟲兒王咺之等四十一人皆屬吏初海陵王之廢也王太后出居鄱陽王故第號宣德宫己巳蕭衍以宣德太后令追廢涪陵王為東昏侯禇后及太子誦並為庶人以衍為中書監大司馬録尚書事驃騎大將軍楊州刺史封建安郡公依晉武陵王遵承制故事百僚致敬以王亮為長史壬申更封建安王寶寅為鄱陽王癸酉以司徒楊州刺史晉安王寶義為太尉領司徒己卯衍入屯閲武堂下令大赦又下令凡昏制謬賦淫刑濫役外可詳檢前原悉皆除蕩其主守散失諸所損耗精立科條咸從原例又下令通檢尚書衆曹東昏時諸諍訟失理及主者淹停不時施行者精加訊辨依事議奏又下令收葬義師掩瘞逆徒之死亡者潘妃有國色衍欲留之以問侍中領軍將軍王茂茂曰亡齊者此物留之恐貽外議乃縊殺於獄并誅嬖臣茹法珍等以宫女二千分賚將士乙酉以輔國將軍蕭宏為中護軍衍之東下也豫州刺史馬仙琕擁兵不附衍衍使其故人姚仲寶説之仙琕先為設酒乃斬於軍門以徇衍又遣其族叔懷逺説之仙琕曰大義滅親又欲斬之軍中為請乃得免衍至新林仙琕猶於江西日抄運船衍圍宫城州郡皆遣使請降吳興太守袁昂獨拒境不受命昂覬之子也衍使駕部郎考城江革為書與昂曰根本既傾枝葉安附今竭力昏主未足為忠家門屠滅非所謂孝豈若翻然改圖自招多福昂復書曰三吳內地非用兵之所況以偏隅一郡何能為役自承麾斾屆止莫不膝袒軍門惟僕一人敢後至者政以內揆庸素文武無施雖欲獻心不增大師之勇置其愚默寧沮衆軍之威幸藉將軍含弘之大可得從容以禮竊以一餐微施尚復投殞況食人之祿而頓忘一旦非惟物議不可亦恐明公鄙之所以躊躇未遑薦璧昂問時事於武康令北地傅映映曰昔元嘉之末開闢未有故太尉殺身以明節司徒當寄託之重理無苟全所以不顧夷險以徇名義今嗣主昏虐曾無悛改荆雍協舉乘據上流天人之意可知願明府深慮無取後悔及建康平衍使豫州刺史李元履巡撫東土敕元履曰袁昂道素之門世有忠節天下須共容之勿以兵威陵辱元履至吳興宣衍旨昂亦不請降開門撤備而已仙琕聞臺城不守號泣謂將士曰我受人任寄義不容降君等皆有父母我為忠臣君為孝子不亦可乎乃悉遣城內兵出降餘壯士數十閉門獨守俄而兵入圍之數十重仙琕令士皆持滿兵不敢近日暮仙琕乃投弓曰諸軍但來見取我義不降乃檻送石頭衍釋之使待袁昂至俱入曰令天下見二義士衍謂仙琕曰射鉤斬祛昔人所美卿勿以殺使斷運自嫌仙琕謝曰小人如失主犬後主飼之則復為用矣衍笑皆厚遇之丙戌蕭衍入鎮殿中梁武帝天監元年春正月齊和帝遣兼侍中席闡文等慰勞建康戊戌迎宣德太后入宫臨朝稱制衍解承制壬寅進大司馬衍都督中外諸軍事劒履上殿贊拜不名初大司馬與黃門侍郎范雲南清河太守沈約司徒右長史任昉同在竟陵王西邸意好敦密至是引雲為大司馬咨議參軍領録事約為驃騎司馬昉為記室參軍與參謀議前吳興太守謝朏國子祭酒何㣧先皆棄官家居衍奏徴為軍咨祭酒朏㣧皆不至大司馬內有受禪之志沈約微扣其端大司馬不應它日又進曰今與古異不可以淳風期物士大夫攀龍附鳯者皆望有尺寸之功今童兒牧豎皆知齊祚已終明公當承其運天文讖記又復炳然天心不可違人情不可失苟歷數所在雖欲謙光亦不可得己大司馬曰吾方思之約曰公初建牙樊沔此時應思今王業已成何所復思若不早定大業脫有一人立異即損威德且人非金玉時事難保豈可以建安之封遺之子孫若天子還都公卿在位則君臣分定無復異心君明於上臣忠於下豈復有人方更同公作賊大司馬然之約出大司馬召范雲告之雲對略同約旨大司馬曰智者乃爾暗同卿明早將休文更來雲出語約約曰卿必待我雲許諾而約先期入大司馬命草具其事約乃出懷中詔書并諸選置大司馬初無所改俄而雲自外來至殿門不得入徘徊夀光閣外但云咄咄約出問曰何以見處約舉手向左雲笑曰不乖所望有頃大司馬召雲入嘆約才智縱橫且曰我起兵於今三年矣功臣諸將實有其勞然成帝業者卿二人也甲寅詔進大司馬位相國揔百揆楊州牧封十郡為梁公備九錫之禮置梁百司去録尚書之號驃騎大將軍如故二月辛酉梁公始受命丙寅詔梁國選諸要職悉依天朝之制於是以沈約為吏部尚書兼右僕射范雲為侍中丙戌詔梁公增封十郡進爵為王癸巳受命赦國內及府州所統殊死以下齊和帝東歸至姑孰丙辰下詔禪位于梁夏四月辛酉宣德太后令曰西詔至帝憲章前代敬禪神器于梁明可臨軒遣使恭授璽紱未亡人歸于别宫壬戌發策遣兼太保尚書令亮等奉皇帝璽綬詣梁宫丙寅梁王即皇帝位于南郊大赦改元是日追贈兄懿為丞相封長沙王諡曰宣武葬禮依晉安平獻王故事丁卯奉和帝為巴陵王宫于姑孰優崇之禮皆倣齊初奉宣德太后為齊文帝妃王皇后為巴陵王妃齊世王侯封爵悉從降省唯宋汝隂王不在除例追尊皇考為文皇帝廟號太祖皇妣為獻皇后追諡妃郗氏為德皇后封文武功臣車騎將軍夏侯詳等十五人為公侯立皇弟中護軍宏為臨川王南徐州刺史秀為安成王雍州刺史偉為建安王左衛將軍恢為鄱陽王荆州刺史憺為始興王以宏為楊州刺史戊辰巴陵王卒時上欲以南海郡為巴陵國徙王居之沈約曰古今殊事魏武所云不可慕虛名而受實禍上頷之乃遣所親鄭伯禽詣姑孰以生金進王王曰我死不須金醇酒足矣乃飲沉醉伯禽就摺殺之以謝沐縣公寶義為巴陵王奉齊祀寶義幼有廢疾不能言故獨得全齊南康侯子恪及弟祁陽侯子範嘗因事入見上從客謂曰天下公器非可力取茍無期運雖項籍之力終亦敗亡宋孝武性猜忌兄弟粗有令名者皆鴆之朝臣以疑似枉死者相繼然或疑而不能去或不疑而卒為患如卿祖以材略見疑而無如之何湘東以庸愚不疑而子孫皆死其手我於時已生彼豈知我應有今日固知有天命者非人所害我初平建康人皆勸我除去卿輩以一物心我於時依而行之誰謂不可正以江左以來代謝之際必相屠滅感傷和氣所以國祚不長又齊梁雖云革命事異前世我與卿兄弟雖復絶服宗屬未逺齊業之初亦共甘苦情同一家豈可遽如行路之人卿兄弟果有天命非我所殺若無天命何忽行此適足示無度量耳且建武塗炭卿門我起義兵非惟自雪門恥亦為卿兄弟報仇卿若能在建武永元之世撥亂反正我豈得不釋戈推奉邪我自取天下於明帝家非取之於卿家也昔劉子輿自稱成帝子光武言假使成帝更生天下亦不復可得況子輿乎曹志魏武帝之孫為晉忠臣況卿今日猶是宗室我方坦然相期卿無復懷自外之意小待自當知我寸心子恪兄弟凡十六人皆仕梁子恪子範子質子顯子雲子暉並以才能知名歷官清顯各以夀終南北交兵齊和帝中興元年魏鎮南將軍元英上書曰蕭寶卷驕縱日甚虐害無辜其雍州刺史蕭衍東伐秣陵掃土興兵順流而下唯有孤城更無重衛乃皇天授我之日曠載一逢之秋此而不乘將欲何待臣乞躬帥步騎三萬直指沔隂據襄陽之城斷黑水之路昏虐君臣自相魚肉我居上流威震遐邇長驅南出進拔江陵則三楚之地一朝可收岷蜀之道自成斷絶又命楊徐二州聲言俱舉建業窮蹙魚逰釡中可以齊文軌而大同混天地而為一伏惟陛下獨決聖心無取疑議此期脫爽并吞無日事寢不報車騎大將軍源懷上言蕭衍內侮寶卷孤危廣陵淮隂等戍皆觀望得失斯實天啓之期并吞之會宜東西齊舉以成席卷之勢若使蕭衍克濟上下同心豈惟後圖之難亦恐楊州危逼何則夀春之去建康才七百里山川水陸皆彼所諳彼若內外無虞君臣分定乘舟藉水倐忽而至未易當也今寶卷都邑有土崩之憂邉城無繼援之望廓清江表正在今日魏主乃以任城王澄為都督淮南諸軍事鎮南大將軍開府儀同三司楊州刺史使為經略既而不果懷賀之子也東豫州刺史田益宗上表曰蕭氏亂常君臣交爭江外州鎮中外為兩東西抗峙已淹歲時民庶窮於轉輸甲兵疲於戰鬪事救於目前力盡於麾下無暇外維州鎮綱紀庶方藩城棊立孤存而已不乘機電掃廓彼蠻強恐後之經略未易於此且夀春雖平三靣仍梗鎮守之宜實須豫設義陽差近淮源利涉津要朝廷行師必由此道若江南一平有事淮外須乘夏水泛長列舟長淮師赴夀春須從義陽之北便是居我喉要在慮彌深義陽之滅今實時矣度彼不過須精卒一萬二千然行師之法貴張形執請使兩荆之衆西擬隨雍楊之卒頓于建安得捍三關之援然後二豫之軍直據南關對抗延頭遣一都督揔諸軍節度季冬進師迄于春末不過十旬克之必矣元英又奏稱今寶卷骨肉相殘藩鎮鼎立義陽孤絶密邇王土內無兵儲之固外無糧援之期此乃欲焚之鳥不可去薪授首之寇豈容緩斧若失此不取豈惟後舉難圖亦恐更為深患今豫州刺史司馬恱已戒嚴垂發東豫州刺史田益宗兵守三關請遣軍司為之節度魏主乃遣直寢羊靈引為軍司益宗遂入寇建寧太守黃天賜與益宗戰於赤亭天賜敗績梁武帝天監元年春二月辛丑殺齊邵陵王寶收晉熙王寶嵩桂陽王寶貞梁王將殺齊諸王防守猶未急鄱陽王寶寅家閹人顔文智與左右麻拱等密謀穿牆夜出寶寅具小船於江岸著烏布襦腰繫千許錢潛赴江側躡屩徒步足無完膚防守者至明追之寶寅詐為釣者隨流上下十餘里追者不疑待散乃度西岸投民華文榮家文榮與其族人天龍惠連棄家將寶寅遁匿山澗賃驢乘之晝伏宵行抵夀陽之東城魏戍主杜元倫馳告楊州刺史任城王澄以車馬侍衛迎之寶寅時年十六徒步憔悴見者以為掠至生口澄待以客禮寶寅請喪君斬衰之服澄遣人曉示情禮賫喪兄齊衰之服給之澄帥官僚赴弔寶寅居處有禮一同極哀之節夀陽多其故義皆受慰唁唯不見夏侯一族以夏侯詳從梁王故也澄深器重之三月齊和帝下詔禪位于梁王二年春三月蕭寶寅伏於魏闕之下請兵伐梁雖暴風大雨終不暫移會陳伯之降魏亦請兵自效魏主乃引八坐門下入定議夏四月癸未朔以寶寅為都督東楊等三州諸軍事鎮東將軍楊州刺史丹楊公齊王禮賜甚厚配兵一萬令屯東城以伯之為都督淮南諸軍事平南將軍江州刺史屯陽石俟秋冬大舉寶寅明當拜命其夜慟哭至晨魏人又聽寶寅募四方壯勇得數千人以顔文智華文榮等六人皆為將軍軍主寶寅志性雅重過期猶絶酒肉慘形悴色𬞞食粗衣未嘗嬉笑六月魏楊州刺史任城王澄表稱蕭衍頻斷東關欲令漅湖泛溢以灌淮南諸戍吳楚便水且灌且掠淮南之地將非國有夀陽去江五百餘里衆庶惶惶並懼水害脫乘民之願攻敵之虛豫勒諸州纂集士馬首秋大集應機經略雖混一不能必果江西自是無虞矣丙戌魏發冀定瀛相并濟六州二萬人馬一千五百匹令仲秋之中畢會淮南并夀陽先兵一萬委澄經略蕭寶寅陳伯之皆受澄節度秋八月庚子魏以鎮南將軍元英都督征義陽諸軍事司州刺史蔡道恭聞魏軍將至遣驍騎將軍楊由帥城外居民三千餘家保賢首山為三柵冬十月元英勒諸軍圍賢首柵柵民任馬駒斬由降魏任城王澄命統軍黨法宗傅豎眼太原王神念等分兵寇東關大峴淮陵九山髙祖珍將三千騎為逰軍澄以大軍繼其後豎眼靈越之子也魏人拔關要頴川大峴三城白塔牽城清溪皆潰徐州刺史司馬明素將兵三千救九山徐州長史潘伯鄰據淮陵寧朔將軍王燮保焦城黨法宗等進拔焦城破淮陵十一月壬午擒明素斬伯鄰先是南梁太守馮道根戍阜陵初到修城隍逺斥候如敵將至衆頗笑之道根曰怯防勇戰此之謂也城未畢黨法宗等衆二萬奄至城下衆皆失色道根命大開門緩服登城選精鋭二百人出與魏兵戰破之魏人見其意思間暇戰又不利遂引去道根將百騎擊髙祖珍破之魏諸軍糧運絶引退以道根為豫州刺史乙酉將軍吳子陽與魏元英戰於白沙子陽敗績三年春正月蕭寶寅行及汝隂東城已為梁所取乃屯夀陽棲賢寺二月戊子將軍薑慶真乘魏任城王澄在外襲夀陽據其外郭長史韋纘倉猝失圖任城太妃孟氏勒兵登陴先守要便激厲文武安慰新舊勸以賞罰將士咸有奮志太妃親巡城守不避矢石蕭寶寅引兵至與州軍合擊之自四鼓戰至下晡慶真敗走韋纘坐免官任城王澄攻鍾離上遣冠軍將軍張惠紹等將兵五千送糧詣鍾離澄遣平逺將軍劉思祖等邀之丁酉戰于邵陽大敗梁兵俘惠紹等十將殺虜士卒殆盡思祖芳之從子也尚書論思祖功應封千户侯侍中領右衛將軍元暉求二婢於思祖不得事遂寢暉素之孫也上遣平西將軍曹景宗後軍王僧炳等帥步騎三萬救義陽僧炳將二萬人據鑿峴景宗將萬人為後繼元英遣冠軍將軍元逞等據樊城以拒之三月壬申大破僧炳於樊城俘斬四千餘人魏詔任城王澄以四月淮水將漲舟行無礙南軍得時勿昧利以取後悔會大雨淮水暴漲澄引兵還夀陽魏軍還既狼狽失亡四千餘人中書侍郎齊郡賈思伯為澄軍司居後為殿澄以其儒者謂之必死及至大喜曰仁者必有勇於軍司見之矣思伯託以失道不伐其功有司奏奪澄開府仍降三階上以所獲魏將士請易張惠紹于魏魏人歸之夏五月魏人圍義陽城中兵不滿五千人食才支半嵗魏軍攻之晝夜不息刺史蔡道恭隨方抗禦皆應手摧却相持百餘日前後斬獲不可勝計魏軍憚之將退會道恭疾篤乃呼從弟驍騎將軍靈恩兄子尚書郎僧協及諸將佐謂曰吾受國厚恩不能攘滅寇賊今所苦轉篤藝不支久汝等當以死固節無令吾沒有遺恨衆皆流涕道恭卒靈恩攝行州事代之城守秋七月魏人聞蔡道恭卒攻義陽益急短兵日接曹景宗頓鑿峴不進但耀兵遊獵而已上復遣寧朔將軍馬仙琕救義陽仙琕轉戰而前兵藝甚鋭元英結壘於士雅山分命諸將伏於四山示之以弱仙琕乘勝直抵長圍掩英營英偽北以誘之至平地縱兵擊之統軍傅永擐甲執槊單騎先入唯軍主蔡三虎副之突陳橫過梁兵射永洞其左股永拔箭復入仙琕大敗一子戰死仙琕退走英謂永曰公傷矣且還營永曰昔漢祖捫足不欲人知下官雖微國家一將奈何使賊有傷將之名遂與諸軍追之盡夜而返時年七十餘矣軍中莫不壯之仙琕復帥萬餘人進擊英英又破之殺將軍陳秀之仙琕知義陽危急盡鋭決戰一日三交皆大敗而返蔡靈恩藝窮八月乙酉降於魏三關戍將聞之辛酉亦棄城走英使司馬陸希道為露板嫌其不精命傅永改之永不增文彩直為之陳列軍事處置形要而已英深賞之曰觀此經算雖有金城湯池不能守矣初南安惠王以預穆泰之謀追奪爵邑及英克義陽乃復立英為中山王御史中丞任昉奏彈曹景宗上以其功臣寢而不治衛尉鄭紹叔忠於事上外所聞知纎豪無隱每為上言事善則推功於上不善則引咎歸已上以是親之詔於南義陽置司州移鎮關南以紹叔為刺史紹叔立城隍繕器械廣田積榖招集流散百姓安之魏置郢州於義陽以司馬恱為刺史上遣馬仙琕築竹敦麻陽二城於三關南司馬恱遣兵攻竹敦拔之四年春二月上謀伐魏壬午遣衛尉卿楊公則將宿衛兵塞洛口八月壬寅魏中山王英寇雍州楊公則至洛口與魏豫州長史石榮戰斬之甲寅將軍薑慶真與魏戰於羊石不利公則退屯馬頭九月己巳楊公則等與魏楊州刺史元嵩戰公則敗績冬十月丙午上大舉伐魏以揚州刺史臨川王宏都督北討諸軍事尚書右僕射柳惔為副王公以下各上國租及田榖以助軍宏軍于洛口五年夏四月庚戌魏以中山王英為征南將軍都督楊徐二州諸軍事帥衆十餘萬以拒梁軍指授諸節度所至以便宜從事江州刺史王茂將兵數萬侵魏荆州誘魏邉民及諸蠻更立宛州遣其所署宛州刺史雷豹狼等襲取魏河南城魏遣平南將軍楊大眼都督諸軍擊茂辛酉茂戰敗失亡二千餘人大眼進攻河南城茂逃還大眼追至漢水攻拔五城魏征虜將軍宇文福寇司州俘千餘口而去五月辛未太子右衛率張惠紹等侵魏徐州拔宿預執城主馬成龍乙亥北徐州刺史昌義之拔梁城豫州刺史韋睿遣長史王超等攻小峴未拔睿行圍柵魏出數百人陳於門外睿欲擊之諸將皆曰向者輕來未有戰備徐還授甲乃可進耳睿曰不然魏城中二千餘人足以固守今無故出人於外必其驍勇者也苟能挫之其城自拔衆猶遲疑睿指其節曰朝廷授此非以為飾韋睿法不可犯也遂進擊之士皆殊死戰魏兵敗走因急攻之中宿而拔遂至合肥先是右軍司馬胡略等攻合肥久未下睿按山川夜帥衆堰肥水頃之堰成水通舟艦繼至魏築東西小城夾合肥睿先攻二城魏將楊靈㣧帥衆五萬奄至衆懼不敵請奏益兵睿笑曰賊至城下方求益兵將何所及且吾求益兵彼亦益兵兵貴用竒豈在衆也遂擊靈㣧破之睿使軍主王懷靜築城於岸以守堰魏攻拔之城中千餘人皆沒魏人乘勝至堤下兵勢甚盛諸將欲退還漅湖或欲保三義睿怒曰寧有此邪命取繖扇麾幢樹之堤下示無動志魏人來鑿堤睿親與之爭魏兵却因築壘於堤以自固睿起鬭艦髙與合肥城等四靣臨之城中人皆哭守將杜元倫登城督戰中弩死辛巳城潰俘斬萬餘級獲牛馬以萬數睿體素嬴未嘗跨馬每戰常乘板輿督厲將士勇氣無敵晝接賔旅夜半起算軍書張燈達署撫循其衆常如不及故投募之士爭歸之所至頓舍館宇藩牆皆應凖繩諸軍進至東陵有詔班師去魏城既近諸將恐其追躡睿悉遣輜重居前身乘小輿殿後魏人服睿威名望之不敢逼全軍而還於是遷豫州治合肥壬午魏遣尚書元遙南拒梁兵丁亥廬江太守聞喜裴邃克魏羊石城庚寅又克霍丘城六月庚子青冀二州刺史桓和克朐山城張惠紹與假徐州刺史宋黑水陸俱進趣彭城圍髙冢戍魏武衛將軍奚康生將兵救之丁未惠紹兵不利黑戰死秋七月丙寅桓和擊魏兖州拔固城戊子徐州刺史王伯敖與魏中山王英戰於隂陵伯敖兵敗失亡五千餘人己丑魏發定冀瀛相并肆六州十萬人以益南行之兵上遣將軍角念將兵一萬屯蒙山招納兖州之民降者甚衆是時將軍蕭及屯固城桓和屯孤山魏邢巒遣統軍樊魯攻和别將元恆攻及統軍畢祖朽攻念壬寅魯大破和於孤山恆拔固城祖朽擊念走之己酉魏詔平南將軍安樂王詮督後發諸軍赴淮南詮長樂之子也將軍藍懷恭與魏邢巒戰于睢口懷恭敗績巒進圍宿預懷恭復於清南築城巒與平南將軍楊大眼合攻之九月癸酉拔之斬懷恭殺獲萬計張惠紹棄宿預蕭炳棄淮陽遁還臨川王宏以帝弟將兵器械精新軍容甚盛北人以為百數十年所未之有軍次洛口前軍克梁城諸將欲乘勝深入宏性懦怯部分乖方魏詔邢巒引兵度淮與中山王英合攻梁城宏聞之懼召諸將議旋師吕僧珍曰知難而退不亦善乎宏曰我亦以為然柳惔曰自我大衆所臨何城不服何謂難乎裴邃曰是行也固敵是求何難之避馬仙琕曰王安得亡國之言天子掃境內以屬王有前死一尺無却生一寸昌義之怒須髮盡磔曰吕僧珍可斬也豈有百萬之師出未逢敵望風遽退何靣目得見聖主乎朱僧勇胡辛生拔劒而退曰欲退自退下官當前向取死議者罷出僧珍謝諸將曰殿下昨來風動意不在軍深恐大致沮喪故欲全師而返耳宏不敢遽違羣議停軍不前魏人知其不武遺下巾幗且歌之曰不畏蕭娘與吕姥但畏合肥有韋虎虎謂韋睿也僧珍歎曰使始興吳平為帥而佐之豈有為敵人所侮如是乎欲遣裴邃分軍取夀陽大衆停洛口宏固執不聽令軍中曰人馬有前行者斬於是將士人懷憤怒魏奚康生馳遣楊大眼謂中山王英曰梁人自克梁城已後久不進軍其藝可見必畏我也王若進據洛水彼自奔敗英曰蕭臨川雖騃其下有良將韋裴之屬未可輕也宜且觀形藝勿與交鋒張惠紹號令嚴明所至獨克軍于下邳下邳人多欲降者惠紹諭之曰我若得城諸卿皆是國人若不能克徒使諸卿失鄉里非朝廷弔民之意也今且安堵復業勿妄自辛苦降人咸恱己丑夜洛口暴風雨軍中驚臨川王宏與數騎逃去將士求宏不得皆散歸棄甲投戈填滿水陸捐棄病者及羸老死者近五萬人宏乘小船濟江夜至白石壘叩城門求入臨汝侯淵猷登城謂曰百萬之師一朝鳥散國之存亡未可知也恐姦人乘間為變城不可夜開宏無以對乃縋食饋之淵猷淵藻之弟也時昌義之軍梁城聞洛口敗與張惠紹皆引兵退魏主詔中山王英乘勝平蕩東南逐北至馬頭攻拔之城中糧儲魏悉遷之歸北議者咸曰魏運米北歸當不復南向上曰不然此必欲進兵為詐計耳乃命修鍾離城敇昌義之為戰守之備冬十月英進圍鍾離魏主詔邢巒引兵會之巒上表以為南軍雖野戰非敵而城守有餘今盡鋭攻鍾離得之則所利無幾不得則虧損甚大且介在淮外借使束手歸順猶恐無糧難守况殺士卒以攻之乎又征南士卒從戎二時疲弊死傷不問可知雖有乘勝之資懼無可用之力若臣愚見謂宜修復舊戍撫循諸州以俟後舉江東之舋不患其無詔曰濟淮掎角事如前敇何容猶爾盤桓方有此請可速進軍巒又表以為今中山進軍鍾離實所未解若為得失之計不顧萬全直襲廣陵出其不備或未可知若正欲以八十日糧取鍾離城者臣未之前聞也彼堅城自守不與人戰城塹水深非可填塞空坐至春士卒自弊若遣臣赴彼從何致糧夏來之兵不齎冬服脫遇冰雪何方取濟臣寧荷怯懦不進之責不受敗損空行之罪鍾離天險朝貴所具若有內應則所不知如其無也必無克狀若信臣言願賜臣停若謂臣憚行求還臣所領兵乞盡付中山任其處分臣止以單騎隨之東西臣屢更為將頗知可否臣既謂難何容強遣乃召巒還更命鎮東將軍蕭寶寅與英同圍鍾離侍中盧昶素惡巒與侍中領右衛將軍元暉共譛之使御史中尉崔亮彈巒在漢中掠人為奴婢巒以漢中所得美女賂暉暉言於魏主曰巒新有大功不當以赦前小事案之魏主以為然遂不問丁酉梁兵圍義陽者夜遁魏郢州刺史婁恱追擊破之十一月乙丑大赦詔右衛將軍曹景宗都督諸軍二十萬救鍾離上敇景宗頓道人洲俟衆軍齊集俱進景宗固啓求先據邵陽洲尾上不許景宗欲專其功違詔而進值暴風猝起頗有溺者復還守先頓上聞之曰景宗不進蓋天意也若孤軍獨往城不時立必致狼狽今破賊必矣六年春正月魏中山王英與平東將軍楊大眼等衆數十萬攻鍾離鍾離城北阻淮水魏人於邵陽洲兩岸為橋樹柵數百步跨淮通道英據南岸攻城大眼據北岸立城以通糧運城中衆才三千人昌義之督帥將士隨方抗禦魏人以車載土填塹使其衆負土隨之嚴騎蹙其後人有未及回者因以土迮之俄而塹滿衝車所撞城土輒頽義之用泥補之衝車雖入而不能壞魏人晝夜苦攻分畨相代墜而復升莫有退者一日戰數十合前後殺傷萬計魏人死者與城平二月魏主召英使還英表稱臣志殄逋寇而月初已來霖雨不止若三月晴霽城必可克願少賜寬假魏主復賜詔曰彼土蒸濕無宜久淹藝雖必取乃將軍之深計兵久力殆亦朝廷之所憂也英猶表稱必克魏主遣步兵校尉范紹詣英議攻取形藝紹見鍾離城堅勸英引還英不從上命豫州刺史韋睿將兵救鍾離受曺景宗節度睿自合肥取直道由隂陵大澤行值澗谷輒飛橋以濟師人畏魏兵盛多勸睿緩行睿曰鍾離今鑿穴而處負户而汲車馳卒奔猶恐其後而況緩乎魏人已墮吾腹中卿曹勿憂也旬日至邵陽上豫敕曹景宗曰韋睿卿之鄉望宜善敬之景宗見睿禮甚謹上聞之曰二將和師必濟矣景宗與睿進頓邵陽洲睿於景宗營前二十里夜掘長塹樹鹿角截洲為城去魏城百餘步南梁太守馮道根能走馬步地計馬足以賦功比曉而營立魏中山王英大驚以杖擊地曰是何神也景宗等器甲精新軍容甚盛魏人望之奪氣景宗慮城中危懼募軍士言文達等潛行水底齎敕入城城中始知有外援勇氣百倍楊大眼勇冠軍中將萬餘騎來戰所向皆靡睿結車為陳大眼聚騎圍之睿以強弩二千一時俱發洞甲穿中殺傷甚衆矢貫大眼右臂大眼退走明旦英自帥衆來戰睿乘素木輿執白角如意以麾軍一日數合英乃退魏師復夜來攻城飛矢雨集睿子黯請下城以避箭睿不許軍中驚睿於城上厲聲呵之乃定牧人過淮北伐芻藁者皆為楊大眼所略曹景宗募勇敢七千餘人於大眼城南數里築壘大眼來攻景宗擊却之壘成使别將趙草守之有抄掠者皆為草所獲是後始得縱芻牧上命景宗等豫裝髙艦使與魏橋等為火攻之計令景宗與睿各攻一橋睿攻其南景宗攻其北三月淮水暴漲六七尺睿使馮道根與廬江太守裴邃秦郡太守李文釗等乘鬬艦競發擊魏洲上軍盡殪别以小船載草灌之以膏從而焚其橋風怒火盛煙塵晦冥敢死之士拔柵斫橋水又漂疾倐忽之間橋柵俱盡道根等皆身自搏戰軍人奮勇呼聲動天地無不一當百魏軍大潰英見橋絶脫身棄城走大眼亦燒營去諸壘相次土崩悉棄其器甲爭投水死者十餘萬斬首亦如之睿遣報昌義之義之悲喜不暇答語但呌曰更生更生諸軍逐北至濊水上英單騎入梁城緣淮百餘里尸相枕藉生擒五萬人收其資糧器械山積牛馬驢騾不可勝計義之德景宗及睿請二人共會設錢二十萬官賭之景宗擲得雉睿徐擲得盧遽取一子反之曰異事遂作塞景宗與羣帥爭先告捷睿獨居後世尤以此賢之詔增景宗睿爵邑義之等受賞各有差秋八月魏有司奏中山王英經算失圖齊王蕭寶寅等守橋不固皆處以極法己亥詔英寶寅免死除名為民楊大眼徙營州為兵以中護軍李崇為征南將軍楊州刺史七年秋九月庚子魏郢州司馬彭珍等叛魏潛引梁兵趨義陽三關戍主侯登等以城來降郢州刺史婁恱嬰城自守魏以中山王英都督南征諸軍事將步騎三萬出汝南以救之冬十月魏懸瓠軍主白早生殺豫州刺史司馬恱自號平北將軍求援於司州刺史馬仙琕時荆州刺史安成王秀為都督仙琕籖求應赴參佐咸謂宜待臺報秀曰彼待我以自存援之宜速待敕雖舊非應急也即遣兵赴之上亦詔仙琕救早生仙琕進頓楚王城遣副將齊苟兒以兵二千助守懸瓠詔以早生為司州刺史魏以尚書邢巒行豫州事將兵擊白早生魏主問之曰卿言早生走也守也何時可平對曰早生非有深謀大智正以司馬恱暴虐乘衆怒而作亂民迫於凶威不得已而從之縱使梁兵入城水路不通糧運不繼亦成禽耳早生得梁之援溺於利欲必守而不走若臨以王師士民必翻然歸順不出今年當傳首京師魏主恱命巒先發使中山王英繼之巒帥騎八百倍道兼行五日至鮑口丙子早生遣其大將胡孝智將兵七千離城二百里逆戰巒奮擊大破之乘勝長驅至懸瓠早生出城逆戰又破之因渡汝水圍其城詔加巒都督南討諸軍事丁丑魏鎮東參軍成景雋殺宿預戍主嚴仲賢以城來降時魏郢豫二州自懸瓠以南至于安陸諸城皆沒唯義陽一城為魏堅守巒帥田益宗帥羣蠻以附魏魏以為東豫州刺史上以車騎大將軍開府儀同三司五千户郡公招之益宗不從十一月庚寅魏遣安東將軍楊椿將兵四萬攻宿豫魏主聞邢巒屢捷命中山王英趣義陽英以衆少纍表請兵弗許英至懸瓠輒與巒共攻之十二月己未齊苟兒等開門出降斬白早生及其黨數十人英乃引兵前趨義陽寧朔將軍張道凝先屯楚王城癸亥棄城走英追擊斬之魏義陽太守狄道辛祥與婁恱共守義陽將軍胡武城陶平虜攻之祥夜出襲其營擒平虜斬武城由是州境獲全論功當賞婁恱耻功出其下間之於執政賞遂不行八年春正月魏中山王英至義陽將取三關先策之曰三關相須如左右手若克一關兩關不待攻而破攻難不如攻易宜先攻東關又恐其并力於東乃使長史李華帥五統向西關以分其兵藝自督諸軍向東關先是馬仙琕使雲騎將軍馬廣屯長薄軍主胡文超屯松峴丙申英至長薄戍戍長薄潰馬廣遁入武陽英進圍之上遣冠軍將軍彭甕生驃騎將軍徐元季將兵援武陽英故縱之使入城曰吾觀此城形藝易取甕生等既入英促兵攻之六日而拔虜三將及士卒七千餘人進攻廣峴太子左衛率李元履棄城走又攻西關馬仙琕亦棄城走上使南郡太守韋睿將兵救仙琕睿至安陸增築城二丈餘更開大塹起髙樓衆頗譏其怯睿曰不然為將當有怯時不可專勇中山王英急追馬仙琕將復邵陽之耻聞睿至乃退上亦有詔罷兵初魏主遣中書舍人鮦陽董紹慰勞叛城白早生襲而囚之送於建康魏主既克懸瓠命於齊苟兒等四將之中分遣二人敕楊州為移以易紹及司馬恱首移書未至領軍將軍吕僧珍與紹言愛其文義言於上上遣主書霍靈超謂紹曰今聽卿還令卿通兩家之好彼此息民豈不善也因召見賜衣物令舍人周捨慰勞之且曰戰爭多年民物塗炭吾是以不耻先言與魏朝通好比亦有書全無報者卿宜備申此意今遣傳詔霍靈秀送卿至國遲有嘉問又謂紹曰卿知所以得不死不今者獲卿乃天意也夫立君以為民也凡在民上豈可不思此乎若欲通好今以宿豫還彼彼當以漢中見歸紹還魏言之魏主不從魏伐柔然晉武帝太元十六年初柔然部人世服於代其大人郁久閭地粟袁卒部落分為二長子匹候跋繼父居東邉次子緼紇提别居西邉秦王堅滅代柔然附於劉衛辰及魏王圭即位攻擊髙車等諸部率皆服從獨柔然不事魏戊戌圭引兵擊之柔然舉部遁走圭追奔六百里諸將因張衮言於圭曰賊逺糧盡不如早還圭問諸將若殺副馬為三日食足乎皆曰足乃復倍道追之及於大碩南牀山下大破之虜其半部匹候跋及别部帥屋擊各收餘衆遁走圭遣長孫嵩長孫肥追之圭謂將佐曰卿曹知吾前問三日糧意乎曰不知也圭曰柔然驅畜産奔走數日至水必留我以輕騎追之計其道里不過三日及之矣皆曰非所及也嵩追斬屋擊於平望川肥追匹候跋至涿邪山匹候跋舉衆降獲緼紇提之子曷多汗兄子社崘斛律等宗黨數百人緼紇提將奔劉衛辰圭追及之緼紇提亦降圭悉徙其部衆於雲中十九年冬十月柔然曷多汗棄其父與社崘帥衆西走魏長孫肥追之及於上郡跋那山斬曷多汗社崘收其餘衆數百奔匹候跋匹候跋處之南鄙社崘襲匹候跋殺之匹候跋子啓跋吳頡等皆奔魏社崘掠五原以西諸部走度漠北安帝元興元年春正月戊子魏材官將軍和突攻黜弗素古延等諸部破之初魏主圭遣北部大人賀狄干獻馬千匹求昏於秦秦王興聞圭已立慕容后止狄干而絶其昏沒奕干黜弗素古延皆秦之屬國也而魏攻之由是秦魏有隙庚寅圭大閲士馬命并州諸郡積榖於平陽之乾壁以備秦柔然社崘方睦於秦遣將救黜弗素古延辛卯和突逆擊大破之社崘帥其部落逺遁漠北奪髙車之地而居之斛律部帥倍侯利擊社崘大為所敗倍侯利奔魏社崘於是西北擊胸奴遺種日拔也雞大破之遂吞併諸部士馬繁盛雄於北方其地西至焉耆東接朝鮮南臨大漠旁側小國皆羈屬焉自號豆代可汗始立約束以千人為軍軍有將百人為幢幢有帥攻戰先登者賜以虜獲畏懦者以石擊其首而殺之十二月柔然可汗社崘聞圭伐秦自參合陂侵魏至豺山及善無北澤魏常山王遵以萬騎追之不及而還三年夏四月柔然可汗社崘從弟恱代大郍謀殺社崘不克奔魏義熙二年夏四月柔然社崘侵魏邉五年十二月柔然侵魏六年春正月魏長孫嵩將兵伐柔然夏五月魏長孫嵩至漠北而還柔然追圍之於牛川壬申魏主嗣北擊柔然柔然可汗社崘聞之遁走道死其子度拔尚幼部衆立社崘弟斛律號藹苦蓋可汗嗣引兵還參合陂十年初社崘之徙髙車也髙車人叱洛侯為之鄉導以併諸部社崘德之以為大人步鹿真與社崘之子社拔共至叱洛侯家淫其少妻妻告步鹿真曰叱洛侯欲奉大檀為主大檀者社崘季父僕渾之子也領别部鎮西境素得衆心步鹿真歸而發兵圍叱洛侯叱洛侯自殺遂引兵襲大檀大檀逆擊破之執步鹿真及社拔殺之自立為可汗號牟汗紇升蓋可汗斛律至和龍燕王跋賜斛律爵上谷侯館之遼東待以客禮納其女為昭儀斛律上書請還其國跋曰今棄國萬里又無內應若以重兵相送則饋運難繼兵少則不足成功如何可還斛律固請曰不煩重兵願給三百騎送至敕勒國人必欣然來迎跋乃遣單于前輔萬陵帥騎三百送之陵憚遠役至黑山殺斛律而還大檀亦遣使獻馬三千匹羊萬口于燕十二月丙戌朔柔然可汗大檀侵魏丙申魏主嗣北擊之大檀走遣奚斤等追之遇大雪士卒凍死及墮指者什二三宋營陽王景平元年春正月柔然寇魏邉二月戊辰魏築長城自赤城西至五原延袤二千餘里僃置戍卒以備柔然八月柔然寇河西河西王蒙遜命世子政德擊之政德輕騎進戰為柔然所殺文帝元嘉元年秋八月柔然紇升蓋可汗聞魏太宗殂將六萬騎入雲中殺掠吏民攻拔盛樂宫魏世祖自將輕騎討之三日二夜至雲中紇升蓋引騎圍魏主五十餘重騎逼馬首相次如堵將士大懼魏主顔色自若衆情乃安紇升蓋以弟子於陟斤為大將魏人射殺之紇升蓋懼遁去尚書令劉潔言於魏主曰大檀自恃其衆必將復來請俟收田畢大發兵為二道東西並進以討之魏主然之十二月魏主命安集將軍長孫翰安北將軍尉眷北擊柔然魏主自將屯祚山柔然北遁諸軍追之大獲而還翰肥之子也二年冬十月癸卯魏主大舉伐柔然五道並進長孫翰等從東道出黑漠廷尉卿長孫道生等出白黑二漠之間魏主從中道東平公娥清出栗園奚斤等從西道出爾寒山諸軍至漠南舍輜重輕騎齎十五日糧度漠擊之柔然部落大驚絶迹北走四年夏五月魏主命龍驤將軍代人陸俟督諸軍鎮大磧以備柔然秋七月柔然寇雲中聞魏已克統萬乃遁去五年秋八月魏主如廣寧觀溫泉柔然紇升蓋可汗遣其子將萬餘騎寇魏邉魏主自廣寧還追之不及六年夏四月魏主將擊柔然治兵於南郊先祭天然後部勒行陳內外羣臣皆不欲行保太后固止之獨崔浩勸之尚書令劉潔等共推太史令張淵徐辨使言於魏主曰今茲己巳三隂之歲歲星襲月太白在西方不可舉兵北伐必敗雖克不利於上羣臣因共贊之曰淵等少時嘗諌苻堅南伐堅不從而敗所言無不中不可違也魏主意不快詔浩與淵辨論難於前浩詰淵辨曰陽為德隂為刑故日食修德月食修刑夫王者用刑小則肆諸市朝大則陳諸原野今出兵以討有罪乃所以修刑也臣竊觀天文比年以來月行掩昴至今猶然其占三年天子大破旄頭之國蠕蠕髙車旄頭之衆也願陛下勿疑淵辨復曰蠕蠕荒外無用之物得其地不可耕而食得其民不可臣而使輕疾無常難得而制有何汲汲而勞士馬以伐之浩曰淵辨言天道猶是其職至於人事形執尤非其所知此乃漢世常談施之於今殊不合事宜何則蠕蠕本國家北邉之臣中間叛去今誅其元惡收其良民令復舊役非無用也世人皆謂淵辨通解數術明決成敗臣請試問之屬者統萬未亡之前有無敗徴若其不知是無術也知而不言是不忠也時赫連昌在坐淵等自以未嘗有言慙不能對魏主大恱既罷公卿或尤浩曰今南冦方伺國隙而捨之北伐若蠕蠕逺遁前無所獲後有強冦將何以待之浩曰不然今不先破蠕蠕則無以待南冦南入聞國家克統萬以來內懷恐懼故揚聲動衆以衛淮北比吾破蠕蠕往還之間南冦必不動也且彼步我騎彼能北來我亦南往在彼甚困於我未勞况南北殊俗水陸異宣設使國家與之河南彼亦不能守也何以言之以劉裕之雄傑吞併關中留其愛子輔以良將精兵數萬猶不能守全軍覆沒號哭之聲至今未已况義隆今日君臣非裕時之比主上英武士馬精強彼若果來譬如以虎狼也何懼之有蠕蠕恃其絶逺謂國家力不能制自寬日久故夏則散衆放畜秋肥乃聚背寒向溫南來寇抄今掩其不備必望塵駭散牡馬護牝牝馬戀駒驅馳難制不得水草不過數日必聚而困弊可一舉而滅也暫勞永逸時不可失患在上無此意今上意已決奈何止之寇謙之謂浩曰蠕蠕果可克乎浩曰必克但恐諸將瑣瑣前後顧慮不能乘勝深入使不全舉耳先是帝因魏使者還告魏主曰汝趨歸我河南地不然將盡我將士之力魏主方議伐柔然聞之大笑謂公卿曰龜鱉小豎自救不暇夫何能為就使能來若不先滅蠕蠕乃是坐待寇至腹背受敵非良策也吾行決矣庚寅魏主發平城使北平主長孫嵩廣陵公樓伏連居守魏主自東道向黑山使平陽王長孫翰自西道向大娥山同會柔然之庭五月丁未魏主至漢南捨輜重帥輕騎兼馬襲擊柔然至栗水柔然紇升蓋可汗先不設備民畜滿野驚怖散走莫相收攝紇升蓋燒廬舍絶迹西走莫知所之其弟匹黎先主東部聞有魏寇帥衆欲就其兄遇長孫翰翰邀擊大破之殺其大人數百六月柔然紇升蓋可汗既走部落四散竄伏山谷雜畜布野無人收視魏主循栗水西行至莬園水分軍搜討東西五千里南北三千里俘斬甚衆髙車諸部乘魏兵藝鈔掠柔然柔然種類前後降魏者三十餘萬落獲戎馬百餘萬匹畜産車廬彌漫山澤亡慮數百萬魏主循弱水西行至涿邪山諸將慮深入有伏兵勸魏主留止寇謙之以崔浩之言告魏主魏主不從秋七月引兵東還至黑山以所獲班賜將士有差既而得降人言可汗先被病聞魏兵至不知所為乃焚穹廬以車自載將數百人入南山民畜窘聚方六十里無人統領相去百八十里追兵不至乃徐西遁唯此得免後聞涼州賈胡言若復前行二日則盡滅之矣魏主深悔之紇升蓋可汙憤悒而卒子吳提立號敕連可汗八月魏主至漠南聞髙車東部屯已尼陂人畜甚衆去魏軍千餘里遣左僕射安原等將萬騎擊之髙車諸部迎降者數十萬落獲馬牛千百餘萬冬十月魏主還平城徙柔然髙車降附之民於漠南東至濡源西暨五原隂山三千里中使之耕牧而收其貢賦命長孫翰劉潔安原及侍中代人古弼同鎮撫之自是魏之民間馬牛羊及氊皮為之價賤魏主加崔浩侍中特進撫軍大將軍以賞其謀畫之功八年夏六月魏之邉吏獲柔然邏者二十餘人魏主賜衣服而遣之柔然感恱閏月乙未柔然敕連可汗遣使詣魏魏主厚禮之魏主如漠南十一月丙辰北部敕勒莫弗庫若干帥所部數萬騎驅鹿數百萬頭詣魏主行在魏主大獵以賜從官十二月丁丑還宫十一年春正月魏主以西海公主妻柔然敕連可汗又納其妹為夫人遣潁川王提往逆之丁卯敕連遣其異母兄秃鹿傀送妹并獻馬二千匹魏主以其妹為左昭儀提曜之子也十三年冬十一月柔然與魏絶和親犯魏邉十五年夏五月丙申魏主如五原秋七月自五原北伐柔然命樂平王丕督十五將出東道永昌王健督十五將出西道魏主自出中道至浚稽山復分中道為二陳留王崇從大澤向涿邪山魏主從浚稽北向大山西登白阜不見柔然而還時漠北大旱無水草人馬多死十六年魏王伐河西六月使大將軍長樂王嵇敬輔國大將軍建寧王崇將二萬人屯漠南以僃柔然十九年冬十月甲申柔然遣使詣建康二十年九月辛巳魏主如漠南甲辰捨輜重以輕騎襲柔然分軍為四道樂安王範建寧王崇各統十五將出東道樂平王丕督十五將出西道魏王出中道中山王辰督十五將為後繼魏主至鹿渾谷遇敕連可汗太子晃言於魏主曰賊不意大軍猝至宜掩其不備速進擊之尚書令劉潔固諌以為賊營中塵盛其衆必多出至平地恐為所圍不如須諸軍大集然後擊之晃曰塵之盛者由軍士驚怖擾亂故也何得營上而有此塵乎魏王疑之不急擊柔然遁去追至石水不及而還既而獲柔然候騎曰柔然不覺魏軍至上下惶駭引衆北走經六七日知無追者始乃徐行魏主深恨之自是軍國大事皆與太子謀之司馬楚之别將兵督軍糧鎮北將軍封沓亡降柔然説柔然令擊楚之以絶軍食俄而軍中有告失驢耳者諸將莫曉其故楚之曰此必賊遣姦人入營覘伺割驢耳以為信耳賊至不久宜急為之備乃伐柳為城以水灌之令凍城立而柔然至冰堅滑不可攻乃散走二十一年春二月辛未魏中山王辰內都坐大官薛辨尚書奚眷等八將坐擊柔然後期斬於都南初魏尚書令劉潔久典機要恃寵自專魏主心惡之及將襲柔然潔諌曰蠕蠕遷徙無常前者出師勞而無功不如廣農積榖以待其來崔浩固勸魏主行魏主從之潔耻言之不用欲敗魏師魏主與諸將期會鹿渾谷潔矯詔易其期帝至鹿渾谷欲擊柔然潔諌止之使待諸將帝留鹿渾谷六日諸將不至柔然遂逺遁追之不及軍還經漢中糧盡士卒多死潔隂使人驚魏軍勸帝委軍輕還帝不從潔以軍出無功請治崔浩之罪帝曰諸將失期遇賊不擊浩何罪也浩以潔矯詔事白帝帝至五原收潔囚之帝之北行也潔私謂所親曰若車駕不返吾當立樂平王潔聞尚書右丞張嵩家有圖讖問曰劉氏應王繼國家後吾有姓名否嵩曰有姓無名帝聞之命有司窮治索嵩家得讖書事連南康公狄鄰潔嵩鄰皆夷三族死者百餘人九月丁未魏主如漠南將襲柔然柔然敕連可汗逺遁乃止敕連尋卒子吐賀真立號處羅可汗二十二年秋八月魏主如隂山之北發諸州兵三分之二各於其州戒嚴以須後命徙諸種雜民五千餘家於北邉令就北畜牧以餌柔然二十五年秋八月西域般恱門去平城萬有餘里遣使詣魏請與魏東西合擊柔然魏主許之中外戒嚴十二月魏太子朝于行宫遂從伐柔然至受降城不見柔然因積糧於城內置戍而還二十六年春正月戊辰朔魏主饗羣臣於漠南甲戌復伐柔然髙涼王那出東道略陽王羯兒出西道魏主與太子出涿邪山行數千里柔然處羅可汗恐懼逺遁九月魏主伐柔然髙涼王那出東道略陽王羯兒出中道柔然處羅可汗悉國中精兵圍那數千里那掘塹堅守相持數日處羅數挑戰輒為那所敗以那衆少而堅疑大軍將至解圍夜去那引兵追之九日九夜處羅益懼棄輜重踰穹隆嶺逺遁那收其輜重引軍還與魏主會於廣澤略陽王羯兒收柔然民畜九百餘萬自是柔然衰弱屏迹不敢犯魏塞冬十二月戊申魏主還平城武帝大明二年冬十月甲戌魏主北巡欲伐柔然至隂山會雨雪魏主欲還太尉尉眷曰今動大衆以威北敵去都不逺而車駕遽還虜必疑我有內難將士雖寒不可不進魏主從之辛卯軍于車崙山十一月魏主自將騎十萬車十五萬兩擊柔然度大漠旌旗千里柔然處羅可汗逺遁其别部烏朱駕頽等帥數千落降于魏魏主刻石紀功而還八年秋七月柔然處羅可汗卒子于成立號曰受羅部真可汗改元永康部真帥衆侵魏辛丑魏北鎮逰軍擊破之明帝泰始六年夏六月柔然部真可汗侵魏魏主引羣臣議之尚書右僕射南平公目辰曰若車駕親征京師危懼不如持重固守虜懸軍深入糧運無繼不久自退遣將追擊破之必矣給事中張白澤曰蠢爾荒愚輕犯王略若鑾輿親行必望麾崩敗豈可坐而縱敵以萬乘之尊嬰城自守非所以威服四夷也魏主從之白澤衮之孫也魏主使京兆王子推等督諸軍出西道任城王雲等督諸軍出東道汝隂王賜等督諸軍為前鋒隴西王源賀等督諸軍為後繼鎮西將軍吕羅漢等掌留臺事諸將會魏主於女水之濵與柔然戰柔然大敗乘勝逐北斬首五萬級降者萬餘人獲戎馬器械不可勝計旬有九日往返六千餘里改女水曰武川司徒東安王劉尼坐昏醉軍陳不整免官壬申還至平城冬十月柔然攻于闐于闐遣使者素目伽奉表詣魏求救魏主命公卿議之皆曰于闐去京師幾萬里蠕蠕唯習野掠不能攻城若其可攻尋已亡矣雖欲遣師藝無所及魏主以議示使者使者亦以為然乃詔之曰朕應急敕諸軍以拯汝難但去汝遐阻必不能救當時之急汝宜知之朕今練甲養士一二歲間當躬帥猛將為汝除患汝其謹修警候以待大舉七年冬十月詔太尉源賀都督三道諸軍屯于漠南先是魏每歲秋冬發軍三道並出以備柔然春中乃還賀以為往來疲勞不可支久請募諸州鎮武健者三萬餘人築三城以處之使冬則講武春則耕種不從奉豫元年春二月柔然侵魏上皇遣將擊之柔然走東部敕勒叛奔柔然上皇自將追之至石磧不及而還秋七月柔然部帥無盧真將三萬騎寇魏敦煌鎮將尉多侯擊走之多侯眷之子也又寇晉昌守將薛奴擊走之冬十月柔然侵魏及五原十一月上皇自將討之將度漠柔然北走數千里上皇乃還倉梧王元徽元年十二月壬子柔然侵魏柔玄鎮二部敕勒應之二年夏五月柔然遣使來聘秋七月癸巳柔然寇魏敦煌尉多侯擊破之尚書奏敦煌僻逺介居西北二強寇之間恐不能自固請內徙就涼州羣臣集議皆以為然給事中昌黎韓秀獨以為敦煌之置為日已久雖逼強寇人習戰鬭縱有草竊不為大害循常置戍足以自全而能隔閡西北二虜使不得相通今徙就涼州不唯有蹙國之名且姑臧去敦煌千有餘里防邏甚難二虜必有交通窺𨵦之志若騷動涼州則關中不得安枕又士民或安土重遷招引外寇為國深患不可不慮也乃止齊髙帝建元元年上之輔宋也遣驍騎將軍王洪範使柔然約與共攻魏洪範自蜀出吐谷渾歷西域乃得達至是柔然十餘萬騎寇魏至塞上而還三年秋七月柔然别帥他稽帥衆降魏九月辛未柔然主遣使來聘與上書謂上為足下自稱曰吾遺上師子皮袴褶約共伐魏武帝永明三年冬十二月柔然犯魏塞魏任城王澄帥衆拒之柔然遁去澄雲之子也是歲柔然部真可汗卒子豆崘立號伏名敦可汗改元太平四年春正月壬午柔然寇魏邉二月丙申柔然遣使者牟提如魏時敕勒叛柔然柔然伏名敦可汗自將討之追奔至西漠魏左僕射穆亮等請乘虛擊之中書監髙閭曰秦漢之世海內一統故可逺征胸奴今南有吳寇何可捨之深入虜庭魏主曰兵者凶器聖人不得已而用之先帝屢出征伐者以有未賔之虜故也今朕承太平之業奈何無故動兵革乎厚禮其使者而歸之冬十二月柔然寇魏邉五年秋七月柔然伏名敦可汗殘暴其臣侯醫垔石洛候數諫止之且勸其與魏和親伏名敦怒族誅之由是部衆離心八月柔然寇魏邉魏以尚書陸睿為都督擊柔然大破之睿麗之子也初髙車阿伏至羅有部落十餘萬役屬柔然伏名敦之侵魏也阿伏至羅諌不聽阿伏至羅怒與從弟窮竒帥部落西走至前部西北自立為王國人號曰候婁匐勒夏言天子也號窮竒曰候倍夏言太子也二人甚親睦分部而立阿伏至羅居北窮竒居南伏名敦追擊之屢為阿伏至羅所敗乃引衆東徙六年冬十二月柔然伊吾戍主髙羔子帥衆三千以城附魏七年冬十二月柔然别帥叱吕勒帥衆降魏八年冬十二月髙車阿伏至羅及窮竒遣使如魏請為天子討除蠕蠕魏主賜以繡袴褶及雜綵百匹十年秋八月乙未魏以懷朔鎮將陽平王頥鎮北大將軍陸睿皆為都督督十二將步騎十萬分為三道以擊柔然中道出黑山東道趣士盧河西道趣侯延河軍過大磧大破柔然而還初柔然伏名敦可汗與其叔父那蓋分道擊髙車阿伏至羅伏名敦屢敗那蓋屢勝國人以那蓋為得天助乃殺伏名敦而立那蓋號候其伏代庫者可汗改元大安和帝中興元年秋七月乙巳柔然犯魏邉梁武帝天監三年秋九月柔然侵魏之沃野及懷朔鎮詔車騎大將軍源懷出行北邉指授規略隨須徴發皆以便宜從事懷至雲中柔然遁去懷以為用夏制夷莫如城郭還至恆代案視諸鎮左右要害之地可以築城置戍之處欲東西為九城及儲糧積仗之宜犬牙相救之勢凡五十八條表上之曰今定鼎成周去北遙逺代表諸國頗或外叛仍遭旱飢戎馬甲兵十分闕八謂宜準舊鎮東西相望今形勢相接築城置戍分兵要害勸農積粟警急之日隨便翦討彼逰騎之寇終不敢攻城亦不敢越城南出如此北方無憂矣魏主從之五年冬十月柔然庫者可汗卒子伏圖立號他汗可汗改元始平戊申他汗遣使者紇奚勿六跋如魏請和魏主不報其使謂勿六跋曰蠕蠕逺祖社崘乃魏之叛臣往者包容暫聽通使今蠕蠕衰微不及疇昔大魏之德方隆周漢正以江南未平少寬北略通和之事未容相許若修藩禮欵誠昭著者當不爾孤也七年初顯祖之世柔然萬餘户降魏置之髙平薄骨律二鎮及太和之末叛走略盡唯千餘戶在太中大夫王通請徙置淮北以絶其叛詔太僕卿楊椿持節往徙之椿上言先朝處之邉徼所以招附殊俗且别異華戎也今新附之户甚衆若舊者見徙新者必不自安是驅之使叛也且此屬衣毛食肉樂冬便寒南土濕熱往必殱盡進失歸附之心退無藩衛之益置之中夏或生後患非良䇿也不從遂徙於濟州緣河處之及京兆王愈之亂皆浮河赴愈所在鈔掠如椿之言柔然他汗可汗復遣紇奚勿六跋獻貂裘於魏魏主弗受報之如前初髙車候倍窮竒為嚈噠所殺執其子彌俄突而去其衆分散或奔魏或奔柔然魏主遣羽林監河南孟威撫納降户置於髙平鎮髙車王阿伏至羅殘暴國人殺之立其宗人跋利延嚈噠奉彌俄突以伐髙車國人殺跋利延迎彌俄突而立之彌俄突與他汗可汗戰于蒲類海不勝西走三百餘里他汗軍於伊吾北山會髙昌王麴嘉求內徙於魏時孟威為龍驤將軍魏主遣威發涼州兵三千人迎之至伊吾他汗見威軍怖而遁去彌俄突聞其離駭追擊大破之殺他汗於蒲類海北割其髮送於威且遣使入貢於魏魏主使東城子于亮報之賜遺甚厚髙昌王嘉失期不至威引兵還他汗可汗子醜奴立號豆羅伏跋豆伐可汗改元建昌十五年柔然伏跋可汗壯健善用兵是歲西擊髙車大破之執其王彌俄突繫其足於駑馬頓曵殺之漆其頭為飲器鄰國先羈屬柔然後叛去者伏跋皆擊滅之其國復強十六年冬十二月柔然伏跋可汗遣俟近尉比建等請和於魏用敵國之禮十七年春二月魏主引見柔然使者讓之以藩禮不備議依漢待胸奴故事遣使報之司農少卿張倫上表以為太祖經啓帝圖日有不暇遂令豎子逰魂一方亦由中國多虞急諸華而緩夷狄也髙祖方事南轅未遑北伐世宗述遵遺志虜使之來受而弗答以為大明臨御國富兵強抗敵之禮何憚而為之何求而行之今虜雖慕德而來亦欲觀我強弱若使王人銜命虜庭與為昆弟恐非祖宗之意也苟事不獲巳應為制詔示以上下之儀命宰臣致書諭以歸順之道觀其從違徐以恩威進退之則王者之體正矣豈可以戎狄兼并而遽虧典禮乎不從倫白澤之子也普通元年初柔然他汗可汗納伏名敦之妻候吕陵氏生伏跋可汗及阿那瓌等六子伏跋既立忽亡其幼子祖惠求募不能得有巫地萬言祖惠今在天上我能呼之乃於大澤中施帳幄祀天神祖惠忽在帳中自云恆在天上伏跋大喜號地萬為聖女納為可賀敦地萬既挾左道復有姿色伏跋敬而愛之信用其言干亂國政如是積嵗祖惠浸長語其母曰我常在地萬家未嘗上天上天者地萬教我也其母具以狀告伏跋伏跋曰地萬能前知未然勿為讒也既而地萬懼譛祖惠於伏跋而殺之候吕陵氏遣其大臣具列等絞殺地萬伏跋怒欲誅具列等會阿至羅入寇伏跋擊之軍敗而還候吕陵氏與大臣共殺伏跋立其弟阿那瓌為可汗阿那瓌立十日其族兄示發帥衆數萬擊之阿那瓌戰敗與其弟乙居伐輕騎奔魏示發殺候吕陵氏及阿那瓌二弟柔然可汗阿那瓌將至魏魏主使司空京兆王繼侍中崔光等相次迎之賜勞甚厚魏主引見阿那瓌於顯陽殿因置宴置阿那瓌位於親王之下宴將罷阿那瓌執啓立於座後詔引至御座前阿那瓌再拜言曰臣以家難輕來詣闕本國臣民皆已逃散陛下恩隆天地乞兵送還本國誅翦叛逆收集亡散臣當統帥遺民奉事陛下言不能盡别有啓陳仍以啓授中書舍人常景以聞景爽之孫也十一月己亥魏立阿那瓌為朔方公蠕蠕王賜以衣服軺車祿恤儀衛一如親王時魏方強盛於洛水橋南御道東作四館道西立四里有自江南來降者處之金陵館三年之後賜宅於歸正里自北夷降者處燕然館賜宅於歸德里自東夷降者處扶桑館賜宅於慕化里自西夷降者處崦嵫館賜宅於慕義里及阿那瓌入朝以燕然館處之阿那瓌屢求返國朝議異同不決阿那瓌以金百斤賂元義遂聽北歸十二月壬子魏敕懷朔都督簡鋭騎二千護送阿那瓌達境首觀機招納若彼迎候冝賜繒帛車馬禮餞而返如不容受聽還闕庭其行裝資遣付尚書量給二年春正月魏發近郡兵萬五千人使懷朔鎮將楊鈞將之送柔然可汗阿那瓌返國尚書右丞張普惠上書以為蠕蠕久為邉患今茲天降喪亂荼毒其心蓋欲使之知有道之可樂革靣稽首以奉大魏也陛下宜安民恭己以恱服其心阿那瓌束身歸命撫之可也乃更先自勞擾興師郊甸之內投諸荒裔之外救纍世之勍敵資天亡之醜虜臣愚未見其可也此乃邉將貪竊一時之功不思兵為凶器王者不得已而用之况今旱暵方甚聖慈降膳乃以萬五千人使楊鈞為將而欲定蠕蠕干時而動其可濟乎脫其顚覆之變楊鈞之肉其足食乎宰輔專好小名不圖安危大計此微臣所以寒心者也且阿那瓌之不還負荷信義臣賤不及議文書所過不敢不陳弗聽阿那瓌辭於西堂詔賜以軍器衣被雜采糧畜事事優厚命侍中崔光等勞遣於外郭阿那瓌之南奔也其從父兄婆羅門帥衆數萬入討示發破之示發奔地豆干地豆干殺之國人推婆羅門為彌偶可社句可汗楊鈞表稱柔然已立君長恐未肯以殺兄之人郊迎其弟輕往虛返徒損國威自非廣加兵衆無以送其人北二月魏人使舊嘗奉使柔然者牒云具仁往諭婆羅門使迎阿那瓌夏四月魏牒云具仁至柔然婆羅門殊驕慢無遜避心責具仁禮敬具仁不屈婆羅門乃遣大臣丘升頭等將兵二千隨具仁迎阿那瓌五月具仁還鎮具道其狀阿那瓌懼不敢進上表請還洛陽初髙車王彌俄突死其衆悉歸嚈噠後數年嚈噠遣彌俄突弟伊匐帥餘衆還國伊匐擊柔然可汗婆羅門大破之婆羅門帥十部落詣涼州請降於魏柔然餘衆數萬相帥迎阿那瓌阿那瓌啓稱本國大亂姓姓别居迭相鈔掠當今北人鵠望待拯乞依前恩賜給精兵一萬送臣磧比撫定荒民詔付中書門下博議涼州刺史袁翻以為自國家都洛以來蠕蠕髙車迭相吞噬始則蠕蠕授首既而髙車被擒今髙車自奮於衰微之中克雪讎恥誠由種類繁多終不能相滅自二虜交鬭邉境無塵數十年矣此中國之利也今蠕蠕兩主相繼歸誠雖戎狄禽獸終無純固之節然存亡繼絶帝王本務若棄而不受則虧我大德若納而撫養則損我資儲或全徙內地則非直其情不願亦恐終為後患劉石是也且蠕蠕尚存則髙車猶有內顧之憂未暇窺窬上國若其全滅則髙卑跋扈之勢豈易可知今蠕蠕雖亂而部落猶衆處處棊布以望舊主髙車雖強未能盡服也愚謂蠕蠕二主並宜存之居阿那瓌於東處婆羅門於西分其降民各有攸屬阿那瓌所居非所經見不敢臆度婆羅門請修西海故城以處之西海在酒泉之北去髙車所居金山千餘里實北虜往來之衝要土地沃衍大宜耕稼宜遣一良將配以兵仗監護婆羅門因令屯田以省轉輸之勞其北則臨大磧野獸所聚使蠕蠕射獵彼此相資足以自固外以輔蠕蠕之微弱內亦防髙車之畔渙此安邉保塞之長計也若婆羅門能收離聚散復興其國者漸令北轉徙渡流沙則是我之外藩髙車勍敵西北之虞可以無慮如其姦回返覆不過為逋逃之冦於我何損哉朝議是之九月柔然可汗俟匿伐詣懷朔鎮請兵且迎阿那瓌俟匿伐阿那瓌之兄也冬十月録尚書事髙陽王雍等奏懷朔鎮北吐若奚泉原野平沃請置阿那瓌於吐若奚泉婆羅門於故西海郡各令帥部落收集離散阿那瓌所居既在境外宜少優遣婆羅門不得比之其婆羅門未降以前蠕蠕歸化者宜悉令州鎮部送懷朔鎮以付阿那瓌詔從之三年冬十二月柔然阿那瓌求粟為種魏與之萬石婆羅門帥部落叛魏亡歸嚈噠魏以平西府長史代人費穆兼尚書右丞西北道行臺將兵討之柔然遁去穆謂諸將曰戎狄之性見敵即走乘虛復出若不使之破膽終恐疲於奔命乃簡練精騎伏於山谷以步兵之羸者為外營柔然果至奮擊大破之婆羅門為涼州軍所擒送洛陽四年春二月柔然大飢阿那瓌帥其衆入魏境表求賑給己亥魏以尚書左丞元孚為行臺尚書持節撫諭柔然孚談之孫也將行表陳便宜以為蠕蠕久來強大昔在代京常為重備今天祚大魏使彼自亂亡稽首請服朝廷鳩其散亡禮送令返宜因此時善思逺策昔漢宣之世呼韓欵塞漢遣董忠韓昌領邉郡士馬送出朔方因留衛助又光武時亦使中郎將段彬置安集掾史隨單于所在參察動靜今宜略依舊事借其間地聽其田牧粗置官屬示相慰撫嚴戒邉兵因令防察使親不至矯詐踈不容反叛最策之得者也魏人不從柔然俟匿伐入朝于魏夏四月魏元孚持白虎幡勞阿那瓌於柔玄懷荒二鎮之間阿那瓌衆號三十萬隂有異志遂拘留孚載以輼車每集其衆坐孚東廂稱為行臺甚加禮敬引兵而南所過剽掠至平城乃聽孚還有司奏孚辱命抵罪甲申魏遣尚書令李崇左僕射元纂帥騎十萬擊柔然阿那瓌聞之驅良民二千公私馬牛羊數十萬北遁崇追之三千餘里不及而還纂使鎧曹參軍于謹帥騎二千追柔然至郁對原前後十七戰屢破之謹忠之從曾孫也六年春三月柔然王阿那瓌為魏討破六韓拔陵魏遣牒云具仁齎雜物勞賜之阿那瓌勒衆十萬自武川西向沃野屢破拔陵兵夏四月魏主復遣中書舍人馮俊勞賜阿那瓌阿那瓌部落浸強自稱敕連頭兵豆伐可汗大通元年夏四月己酉柔然頭兵可汗遣使入貢於魏且請討羣賊魏人畏其反覆詔以盛暑且俟後敕二年夏四月柔然頭兵可汗數入貢于魏魏詔頭兵贊拜不名上書不稱臣大同元年冬十二月柔然頭兵可汗求婚於東魏丞相歡以常山王妹蘭陵公主妻之柔然數侵魏魏使中書舍人庫狄峙奉使至柔然與約和親由是柔然不復為寇三年秋九月柔然為魏侵東魏三堆丞相歡擊之柔然退走四年初柔然頭兵可汗始得返國事魏盡禮及永安以後雄據北方禮漸驕倨雖信使不絶不復稱臣頭兵嘗至洛陽心慕中國乃置侍中黃門等官後得魏汝陽王典籖淳于覃親寵任事以為袐書監使典文翰及兩魏分裂頭兵轉不遜數為邉患魏丞相泰以新都關中方有事山東欲結婚以撫之以舍人元翌女為化政公主妻頭兵弟塔寒又言於魏主請廢乙弗后納頭兵之女二月甲辰以乙弗后為尼使扶風王孚迎頭兵女為后頭兵遂留東魏使者元整不報其使三月柔然送悼后於魏車七百乘馬萬匹駝二千頭至黑鹽池遇魏所遣鹵簿儀衛柔然營幕户席皆東向扶風王孚請正南靣后曰我未見魏主固柔然女也魏仗南靣我自東向丙子立皇后郁久閭氏六年魏文后既為尼居别宫悼后猶忌之乃以其子武都王戊為秦州刺史使文后隨之官魏主雖限大計而恩好不忘密令養髮有追還之意會柔然舉國渡河南侵時頗有言柔然以悼后故興師者帝曰豈有興百萬之衆為一女子邪雖然致人此言朕亦何顔以見將帥乃遣中常侍曹寵齎手敕賜文后自盡文后泣謂寵曰願至尊千萬歲天下康寧死無恨也遂自殺鑿麥積崖而葬之號曰寂陵夏丞相泰召諸軍屯沙苑以備柔然右僕射周惠達發士馬守京城塹諸街巷召雍州刺史王羆議之羆不應召謂使者曰若蠕蠕至渭北者王羆自帥鄉里破之不煩國家兵馬何為天子城中作如此驚擾由周家小兒恇怯致此柔然至夏州而退未幾悼后遇疾殂十一年夏六月魏與柔然頭兵可汗謀連兵伐東魏丞相歡患之遣行臺郎中杜弼使於柔然為世子澄求婚頭兵曰髙王自娶則可歡猶豫未決婁妃曰國家大計願勿疑也世子澄尉景亦勸之歡乃遣鎮南將軍慕容儼聘之號曰蠕蠕公主秋八月歡親迎於下館公主至婁妃避正室以處之歡跪而拜謝妃曰彼將覺之願絶勿顧頭兵使其弟秃突佳來送女且報娉仍戒曰待見外孫乃歸公主性嚴毅終身不肯華言歡嘗病不得往秃突佳怨恚歡輿疾就之元帝承聖元年春正月突厥土門襲擊柔然大破之頭兵可汗自殺其太子菴羅辰及阿那瓌從弟登注俟利登注子庫提並帥衆奔齊餘衆復立登注次子鐡伐為主二年春二月齊王送柔然可汗鐡伐之父登注及兄庫提還其國鐡伐尋為契丹所殺國人立登注為可汗登注復為其大人阿富提所殺國人立庫提三月柔然别部又立阿那瓌叔父鄧叔子為可汗突厥乙息記擊破鄧叔子於沃野北木賴山冬十一月己未突厥復攻柔然柔然舉國奔齊三年春三月柔然可汗菴羅辰叛齊齊主自將出擊大破之菴羅辰父子北走夏四月柔然寇齊肆州齊主自晉陽討之至恆州柔然散走帝以二千餘騎為殿宿黃瓜堆柔然别部數萬騎奄至帝安卧平明乃起神色自若指畫形勢縱兵奮擊柔然披靡因潰圍而出柔然走追擊之伏尸二十餘里獲菴羅辰妻子虜三萬餘口令都督善無髙阿那肱帥騎數千塞其走路時柔然軍猶盛阿那肱以兵少請益帝更減其半阿那肱奮擊大破之菴羅辰超越巖谷僅以身免丁未齊主復自擊柔然大破之五月柔然乙旃達宫寇魏廣武柱國李弼追擊破之六月柔然帥餘衆東徙且欲南寇齊主帥輕騎邀之於金川柔然聞之逺遁營州刺史靈丘王峻設伏擊之獲其名王數十人敬帝紹泰元年夏六月丁卯齊主如晉陽壬申自將擊柔然秋七月己卯至白道留輜重帥輕騎五千追柔然壬午及之於懷朔鎮齊主親犯矢石頻戰大破之至于沃野獲其酋長及生口二萬餘牛羊數十萬壬辰還晉陽冬十二月突厥木杆可汗擊柔然主鄧叔子滅之叔子收其餘燼奔魏木杆恃其強請盡誅鄧叔子等於魏使者相繼於道太師泰收叔子以下三千餘人付其使者盡殺之於青門外通鑑紀事本末卷第二十一
