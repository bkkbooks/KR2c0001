body:
  text: 劉展之叛唐肅宗上元元年冬十一月御史中丞李銑宋州刺史劉展皆領淮西節度副使銑貪暴不法展剛彊自用故為其上者多惡之節度使王仲舁先奏銑罪而誅之時有謠言曰手執金刀起東方仲升使監軍使內左常侍邢延恩入奏展倔彊不受命姓名應謠讖請除之延恩因說上曰展與李銑一體之人今銑誅展不自安茍不去之恐其為亂然展方握彊兵宜以計去之請除展江淮都統代李峘俟其釋兵赴鎮中道執之此一夫力耳上從之以展為都統淮南東江南西浙西三道節度使密敇舊都統李峘及淮南東道節度使鄧景山圖之延恩以制書投展展疑之曰展自陳留參軍數年至刺史可謂暴貴矣江淮租賦所出今之重任展無勳勞又非親賢一旦恩命寵擢如此得非有讒人間之乎因泣下延恩懼曰公素有才望主上以江淮為憂故不次用公公反以為疑何哉展曰事茍不欺印節可先得乎延恩曰可乃馳詣廣陵與峘謀解峘印節以授展展得印節乃上表謝恩牒追江淮親舊置之心膂三道官屬遣使迎賀申圖籍相望於道展悉舉宋州兵七千趣廣陵延恩知展已得其情還奔廣陵與李峘鄧景山發兵拒之移檄州縣言展反展亦移檄言峘反州縣莫知所從峘引兵度江與副使潤州刺史韋儇浙西節度使侯令儀屯京口鄧景山將萬人屯徐城展素有威名御軍嚴整江淮人望風畏之展倍道先期至使人問景山曰吾奉詔書赴鎮此何兵也景山不應展使人呼於陳前曰汝曹皆吾民也勿干吾旗鼓使其將孫待封張法雷擊之景山衆潰與延恩奔夀州展引兵入廣陵遣其將屈突孝摽將兵三千徇濠楚王暅將兵四千略淮西李峘闢北固為兵場插木以塞江口展軍於白沙設疑兵於瓜州多張火鼓若將趣北固者如是纍日峘悉鋭兵守京口以待之展乃自上流濟襲下蜀峘軍聞之自潰峘奔宣城甲午展陷潤州升州軍士萬五千人謀應展攻金陵城不克而遁侯令儀懼以後事授兵馬使姜昌羣棄城走昌羣遣其將宗犀詣展降丙申展陷升州以宗犀為潤州司馬丹陽軍使使昌羣領升州以從子伯瑛佐之李峘之去潤州也副使李藏用謂峘曰處人尊位食人重祿臨難而逃之非忠也以數十州之兵食三江五湖之險固不發一矢而棄之非勇也失忠與勇何以事君藏用請收餘兵竭力以拒之峘乃悉以後事授藏用藏用收散卒得七百人東至蘇州募壯士得三千人立柵以拒劉展展遣其將傳子昂宗犀攻宣州宣歙節度使鄭炅之棄城走李峘奔洪州李藏用與展將張景超孫待封戰於郁墅兵敗奔杭州景超遂據蘇州待封進陷湖州展以其將許嶧為潤州刺史李可封為常州刺史楊持璧蘇州刺史待封領湖州事景超進逼杭州藏用使其將溫炅屯餘杭展以李晃為泗州刺史宗犀為宣州刺史傅子昂屯南陵將下江州徇江西於是屈突孝摽陷濠楚州王暅陷舒和滁廬等州所向無不摧靡聚兵萬人騎三千橫行江淮間壽州刺史崔昭發兵拒之由是暅不得西止屯盧州初上命平廬都知兵馬使田神功將所部精兵三千屯任城鄧景山既敗與邢延恩奏乞敇神功救淮南未報景山遣人趣之且許以淮南金帛子女為賂神功及所部皆喜悉衆南下及彭城敇神功討展展聞之始有懼色自廣陵將兵八千拒之選精兵二千度淮擊神功於都梁山展敗走至天長以五百騎據橋拒戰又敗展獨與一騎亡度江神功入廣陵及楚州大掠殺商胡以千數城中地穿掘略遍二年春正月張景超引兵攻杭州敗李藏用將李彊於石夷門孫待封自武康南出將會景超攻杭州溫朝據險擊敗之待封脫身奔烏程李可封以常州降丁未田神功使特進楊惠元等將千五百人西擊王暅辛亥夜神功先遣特進范知新等將四千人自白沙濟西趣下蜀鄧景山等將千人自海陵濟東趣常州神功與邢延恩將三千人軍於瓜州壬子濟江展將步騎萬餘陳於蒜山神功以舟載兵趣金山會大風五舟飄抵金山下展屠其二舟沈其三舟神功不得度還軍瓜州而范知新等兵已至下蜀展擊之不勝弟殷勸展引兵逃入海可延歲月展曰若事不濟何用多殺人父子乎死早晚等耳遂更帥衆力戰將軍賈隱林射展中目而仆遂斬之劉殷許嶧等皆死隱林滑州人也楊惠元等擊破王暅於淮南暅引兵東走至常熟乃降孫待封詣李藏用降張景超聚兵至七千餘人聞展死悉以兵授張法雷使攻杭州景超逃入海法雷至杭州李藏用擊破之餘黨皆平平盧軍大掠十餘日安史之亂亂兵不及江淮至是其民始罹荼毒矣李輔國用事張后程元振附唐肅宗至德元載張良娣性巧慧能得上意從上來朔方時從兵單寡良娣每寢常居上前上曰禦寇非婦人所能良娣曰蒼猝之際妾以身當之殿下可從後逸去至靈武産子三日起縫戰士衣上止之對曰此非妾自養之時上以是益憐之肅宗即位於靈武遣使召李泌於潁陽謁見大喜時事皆咨之上以建寧王倓為天下兵馬元帥李泌勸上用廣平王俶倓聞而謝之史之亂事見安上皇賜張良娣七寶鞍李泌言於上曰今四海分崩當以儉約示人良娣不宜乘此請撤其珠玉付庫吏以俟有戰功者賞之良娣自閣中言曰鄰里之舊何至如是上曰先生為社稷計也遽命撤之建寧王倓泣於廊下聲聞於上上驚召問之對曰臣比憂禍亂未已今陛下從諫如流不日當見陛下迎上皇還長安是以喜極而悲耳良娣由是惡泌及倓上又謂泌曰良娣祖母昭成太后之妹也上皇所念朕欲使正位中宫以慰上皇心何如對曰陛下在靈武以羣臣望尺寸之功故踐大位非私己也至於家事宜待上皇之命不過晚歲月之間耳上從之時張良娣與李輔國相表裏皆惡泌建寧王倓謂泌曰先生舉倓於上得展臣子之效無以報德請為先生除害泌曰何也倓以良娣為言泌曰此非人子所言願王姑置之勿以為先倓不從二載春正月上從容謂李泌曰廣平為元帥踰年今欲命建寧專征又恐勢分立廣平為太子何如對曰臣固嘗言之矣戎事交切須即區處至於家事當俟上皇不然後代何以辨陛下靈武即位之意邪此必有人欲令臣與廣平有隙耳臣請以語廣平廣平亦必未敢當泌出以告廣平王俶俶曰此先生深知其心欲曲成其美也乃入固辭曰陛下猶未奉晨昏臣何心敢當儲副願俟上皇還宫臣之幸也上賞慰之李輔國本飛龍小兒粗間書計給事太子宫上委信之輔國外恭謹寡言而內狡險見張良娣有寵陰附㑹之與相表裏建寧王倓數於上前詆訐二人罪惡二人譖之於上曰倓恨不得為元帥謀害廣平王上怒賜倓死於是廣平王俶及李泌皆內懼俶謀去輔國及良娣泌曰不可王不見建寧之禍乎俶曰竊為先生憂之泌曰泌與主上有約矣俟平京師則去還山庶免於患俶曰先生去則俶益危矣泌曰王但盡人子之孝良娣婦人王委曲順之亦何能為上嘗就泌飲酒同榻而寢而李輔國請取契鑰付泌泌請使輔國掌之上許之泌曰臣今報德足矣復為間人何樂如之上曰朕與先生纍年同憂患今方相同娛樂奈何遽欲去乎泌曰臣有五不可留願陛下聽臣去免臣於死上曰何謂也對曰臣遇陛下太早陛下任臣太重寵臣太深臣功太高迹太竒此其所以不可留也上曰且眠矣異日議之對曰陛下今就臣榻臥猶不得請况異日香桉之前乎陛下不聽臣去是殺臣也上曰不意卿疑朕如此豈有如朕而辦殺卿邪是直以朕為句踐也對曰陛下不辦殺臣故臣求歸若其既辦臣安得復言且殺臣者非陛下也乃五不可也陛下嚮日待臣如此臣於事猶有不敢言者況天下既安臣敢言乎上良久曰卿以朕不從卿北伐之謀乎對曰非也所不敢言者乃建寧耳上曰建寧朕之愛子性英果艱難時有功朕豈不知之但因此為小人所教欲害其兄圖繼嗣朕以社稷大計不得已而除之卿不細知其故邪對曰若有此心廣平當怨之廣平每與臣言其寃輒流涕嗚咽臣今必辭陛下去始敢言之耳上曰渠嘗夜捫廣平意欲加害對曰此皆出讒人之口豈有建寧之孝友聰明肯為此乎且陛下昔欲用建寧為元帥臣請用廣平建寧若有此心當深憾於臣而以臣為忠益相親善陛下以此可察其心矣上乃泣下曰先生言是也既往不咎朕不欲聞之泌曰臣所以言之者非咎既往乃欲陛下慎將來耳昔天后有四子長曰太子弘天后方圖稱制惡其聰明鴆殺之立次子雍王賢賢內憂懼作黃臺瓜辭冀以感悟天后天后不聽賢卒死於黔中其辭曰種瓜黃臺下瓜熟子離離一摘使瓜好再摘使瓜稀三摘猶為可四摘抱蔓歸今陛下已一摘矣慎無再摘上愕然曰安有是哉卿録是辭朕當書紳對曰陛下但識之於心何必形於外也是時廣平王有大功良娣忌之潛􅌟流言故泌言及之泌復固請歸山上曰俟將發此議之冬十月李泌歸衡山乾元元年春二月癸卯朔以殿中監李輔國兼太僕卿輔國依附張淑妃判元帥府行軍司馬勢傾朝野三月戊寅立張淑妃為皇后張后生興王紹才數嵗欲以為嗣上疑未決從容謂考功郎中知制誥李揆曰成王長且有功朕欲立為太子卿意何如揆再拜賀曰此社稷之福臣不勝大慶上喜曰朕意決矣庚寅立成王俶為皇太子揆道玄之玄孫也二年春二月壬子月食既先是百官請加皇后尊號曰輔聖上以問中書舍人李揆對曰自古皇后無尊號惟韋后有之豈足為法上驚曰庸人幾誤我㑹月食事遂寢后與李輔國相表裏橫於禁中干豫政事請託無窮上頗不悅而無如之何太子詹事李輔國自上在靈武判元帥行軍司馬事侍直帷幄宣傳詔命四方文奏寶印符契晨夕軍號一以委之及還京師專掌禁兵常居內宅制敇必經輔國押署然後施行宰相百司非時奏事皆因輔國關白承㫖常於銀臺門決天下事事無大小輔國口為制敇寫付外施行事畢聞奏又置察事數十人潛令於人間聽察細事即行推按有所追索諸司無敢拒者御史臺大理寺重囚或推斷未畢輔國追詣銀臺一時縱之三司府縣鞫獄皆先詣輔國咨稟輕重隨意稱制敇行之莫敢違者宦官不敢斥其官皆謂之五郎李揆山東甲族見輔國執子弟禮謂之五父及李峴為相於上前叩頭論制敇皆應由中書出具陳輔國專權亂政之狀上感寤賞其正直輔國所行事多所變更罷其察事輔國由是讓行軍司馬請歸本官上不許壬寅制比緣軍國務殷或宣口敇處分諸色取索及杖配囚徒自今一切竝停如非正宣竝不得行中外諸務各歸有司英武軍虞候及六軍諸使諸司等比來或因論競懸自追攝自今一切須經臺府如所由處斷不平聽具狀奏聞諸律令除十惡殺人姦盜造僞外餘煩冗一切刪除仍委中書門下與法官詳定聞奏輔國由是忌峴鳯翔馬坊押官為劫天興尉謝夷甫捕殺之其妻訟寃李輔國素出飛龍廏敇監察御史孫鎣鞫之無寃又使御史中丞崔伯陽刑部侍郎李曄大理卿權獻鞫之與鎣同妻猶不服又使侍御史太平毛若虛鞫之若虛傾巧士希輔國意歸罪夷甫伯陽怒召若虛詰責欲劾奏之若虛先自歸於上上匿若虛於簾下伯陽尋至言若虛附㑹中人鞫獄不直上怒叱出之伯陽貶高要尉獻貶桂陽尉曄與鳯翔尹嚴向皆貶嶺下尉鎣除名長流播州吏部尚書同平章事李峴奏伯陽等無罪責之太重上以為朋黨五月辛巳貶峴蜀州刺史右散騎常侍韓擇木入對上謂之曰李峴欲專權今貶蜀州朕自覺用法太寬對曰李峴言直非專權陛下寬之祇益聖德耳若虛尋除御史中丞威振朝廷上元元年夏六月甲申興王紹薨紹張后長子也幼曰定王侗張后以故數欲危太子太子常以恭遜取容㑹紹薨侗尚幼太子位遂定上皇愛興慶宫自蜀歸即居之上時自夾城往起居上皇亦間至大明宫左龍武大將軍陳玄禮內侍監高力士久侍衛上皇上又命玉真公主如仙媛內侍王承恩魏悅及梨園弟子常娛侍左右上皇多御長慶樓父老過者往往瞻拜呼萬歲上皇常於樓下置酒食賜之又嘗召將軍郭英乂等上樓賜宴有劒南奏事官過樓下拜舞上皇命玉真公主如仙媛為之作主人李輔國素微賤雖暴貴用事上皇左右皆輕之輔國意恨且欲立竒功以固其寵乃言於上曰上皇居興慶宫日與外人交通陳玄禮高力士謀不利於陛下今六軍將士盡靈武勳臣皆反仄不安臣曉諭不能解不敢不以聞上泣曰聖皇慈仁豈容有此對曰上皇固無此意其如羣小何陛下為天下主當為社稷大計消亂於未萌豈得徇匹夫之孝且興慶宫與閭閻相參垣墉淺露非至尊所宜居大內深嚴奉迎居之與彼何殊又得杜絶小人熒惑聖聽如此上皇享萬歲之安陛下有三朝之樂庸何傷乎上不聽興慶宫先有馬三百匹輔國矯敇取之才留十匹上皇謂高力士曰吾兒為輔國所惑不得終孝矣輔國又令六軍將士號哭叩頭迎請上皇居西內上泣不應輔國懼㑹上不豫秋七月丁未輔國矯稱上語迎上皇遊西內至睿武門輔國將射生五百騎露刃遮道奏曰皇帝以興慶宫湫隘迎上皇遷居大內上皇驚幾墜高力士曰李輔國何得無禮叱令下馬輔國不得已而下力士因宣上皇誥曰諸將士各好在將士皆納刃再拜萬歲力士又叱輔國與已共執上皇馬鞚侍衛如西內居甘露殿輔國帥衆而退所留侍衛兵才尫老數十人陳玄禮高力士及舊宫人皆不得留左右上皇曰興慶宫吾之王地吾數以讓皇帝皇帝不受今日之徙亦吾志也是日輔國與六軍大將素服見上請罪上又迫於諸將乃勞之曰南宫西內亦復何殊卿等恐小人熒惑防微杜漸以安社稷何所懼也刑部尚書顏真卿首帥百寮上表請問上皇起居輔國惡之奏貶蓬州長史丙辰高力士流巫州王承恩流播州魏悅流溱州陳玄禮勒致仕置如仙媛於歸州玉真公主出居玉真觀上更選後宫百餘人置西內備灑掃令萬安咸宜二公主視服膳四方所獻珍異先薦上皇然上皇日以不懌因不茹葷辟穀浸以成疾上初猶往問安既而上亦有疾但遣人起居其後上稍悔寤惡輔國欲誅之畏其握兵竟猶豫不敢決二年初李輔國與張后同謀遷上皇於西內是日端午山人李唐見上上方抱幼女謂唐曰朕念之卿勿怪也對曰太上皇思見陛下計亦如陛下之念公主也上泫然泣下然畏張后尚不敢詣西內秋八月癸丑朔加開府儀同三司李輔國兵部尚書乙未輔國赴上宰相朝臣皆送之御厨具饌太常設樂輔國驕縱日甚求為宰相上曰以卿之功何官不可為其如朝望未允何輔國乃諷僕射裴冕等使薦已上密謂蕭華曰輔國求為宰相若公卿表來不得不與華出問冕曰初無此事吾臂可斷宰相不可得華入言之上大悅輔國銜之建子月戊戌冬至己亥上朝上皇於寧西內寶應元年建辰月李輔國以求宰相不得怨蕭華庚午以户部侍郎元載為京兆尹載詣輔國固辭輔國識其意壬寅以司農卿陶鋭為京兆尹輔國言蕭華專權請罷其相上不許輔國固請不已乃從之仍引元載代華戊申華罷為禮部尚書以載同平章事領度支轉運使如故建巳月甲寅上皇崩于神龍殿年七十八乙卯遷坐於太極殿上以寢疾發哀於內殿羣臣發哀於太極殿蕃官𠢐面割耳者四百餘人丙辰命苖晉卿攝冢宰上自仲春寢疾聞上皇登遐哀慕疾轉劇乃命太子監國甲子制改元復以建寅為正月月數皆如其舊赦天下初張后與李輔國相表裏專權用事晚年更有隙內射生使三原程元振黨於輔國上疾篤后召太子議曰李輔國久典禁兵制敇皆從之出擅逼遷聖皇其罪甚大所忌者吾與太子今主上彌留輔國隂與程元振謀作亂不可不誅太子泣曰陛下疾甚危二人皆陛下勳舊之臣一旦不告而誅之必致震驚恐不能堪也后曰然則太子姑歸吾更徐思之太子出后召越王係謂曰太子仁弱不能誅賊臣汝能之乎對曰能係乃命內謁者監段恆俊選宦官有勇力者二百餘人授甲於長生殿後乙丑后以上命召太子元振知其謀密告輔國伏兵於陵霄門以俟之太子至以難告太子曰必無是事主上疾亟召我我豈可畏死而不赴乎元振曰社稷事大太子必不可入乃以兵送太子於飛龍廏且以甲兵守之是夜輔國元振勒兵三殿收捕越王係段恆俊及知內侍省事朱光輝等百餘人繫之以太子之命遷后於别殿時上在長生殿使者逼后下殿并左右數十人幽於後宫宦官宫人皆驚駭逃散丁卯上崩輔國等殺后并係及兖王僩是日輔國始引太子素服於九仙門與宰相相見敘上皇晏駕拜哭始行監國之令戊辰發大行皇帝喪於兩儀殿宣遺詔己巳代宗即位高力士遇赦還至朗州聞上皇崩號慟嘔血而卒李輔國恃功益橫明謂上曰大家但居禁中外事聽老奴處分上內不能平以其方握禁兵外尊禮之乙亥號輔國為尚父而不名事無大小皆咨之羣臣出入皆先詣輔國亦晏然處之以內飛龍廏副使程元振為左監門衛將軍知內侍省事朱光輝及內常侍啖庭瑤山人李唐等二十餘人皆流黔中夏五月以李輔國為司空兼中書令壬辰貶禮部尚書蕭華為峽州司馬元載希李輔國意以罪誣之也飛龍副使程元振謀奪李輔國權密言於上請稍加裁制六月己未解輔國行軍司馬及兵部尚書餘如故以元振代判元帥行軍司馬仍遷輔國出居外第於是道路相賀輔國始懼上表遜位辛酉罷輔國兼中書令進爵博陸王輔國入謝憤咽而言曰老奴事郎君不了請歸地下事先帝上猶慰諭而遣之秋九月乙未加程元振驃騎大將軍兼內侍監上在東宫以李輔國專橫心甚不平及嗣位以輔國有殺張后之功不欲顯誅之壬戌夜盜入其第竊輔國之首及一臂而去敇有司捕盜遣中使存問其家為刻木首葬之仍贈太傅代宗廣德元年冬十月驃騎大將軍判元帥行軍司馬程元振專權自恣人畏之甚於李輔國諸將有大功者元振皆疾忌欲害之吐蕃入寇元振不以時奏致上狼狽出幸上發詔徵諸道兵李光弼等皆忌元振居中莫有至者中外咸切齒而莫敢發言太常博士栁伉上疏蕃入冦語見吐上以元振有保護功十一月辛丑削元振官爵放歸田里程元振既得罪歸三原聞上還宫衣婦人服私入長安復規任用京兆府擒之以聞二年春正月壬寅敇稱程元振變服潛行將圖不軌長流溱州上念元振之功復令於江陵安置僕固懷恩之叛周智光附唐肅宗寶應元年初回紇毗伽闕可汗為登里求昏肅宗以僕固懷恩女妻之為登里可敦時徵兵回紇以討史朝義可汗請與懷恩相見上令懷恩往見之懷恩為可汗言唐家恩信不可負可汗悅遣使上表請助國討朝義代宗廣德元年初僕固懷恩受詔與回紇可汗相見於太原河東節度使辛雲京以可汗乃懷恩壻恐其合謀襲軍府閉城自守亦不犒師及史朝義既平詔懷恩送可汗出塞往來過太原雲京亦閉城不與相聞懷恩怒具表其狀不報懷恩將朔方兵數萬屯汾州使其子御史大夫瑒將萬人屯榆次禆將李光逸等屯祁縣李懷光等屯晉州張維嶽等屯沁州懷光本勃海靺鞨也姓茹為朔方將以功賜姓中使駱奉仙至太原雲京厚結之為言懷恩與回紇連謀反狀已露奉仙還過懷恩懷恩與飲於母前母數讓奉仙曰汝與吾兒約為兄弟今又親雲京何兩面也酒酣懷恩起舞奉仙贈以纒頭綵懷恩欲酬之曰來日端午當更樂飲一日奉仙固請行懷恩匿其馬奉仙謂左右曰朝來責我又匿我馬將殺我也夜踰垣而走懷恩驚遽以其馬追還之八月癸未奉仙至長安奏懷恩謀反懷恩亦具奏其狀請誅雲京奉仙上兩無所問優詔和解之懷恩自以兵興以來所在力戰一門死王事者四十六人女嫁絶域說諭回紇再收兩京平定河南北功無與比而為人搆陷憤怨殊深上書自訟以為臣昨奉詔送可汗歸國傾竭家資俾之上道行至山北雲京奉仙閉城不出祇迎仍令潛行竊盜回紇怨怒亟欲縱兵臣力為彌縫方得出塞雲京奉仙恐臣先有奏論遂復妄稱設備與李抱玉共相組織臣靜而思之其罪有六昔同羅叛亂臣為先帝掃清河曲一也臣男玢為同羅所虜得間亡歸臣斬之以令衆士二也臣有二女逺嫁外夷為國和親蕩平寇敵三也臣與男瑒不顧死亡為國效命四也河北新附節度使皆握彊兵臣撫綏以安反側五也臣說諭回紇使赴急難天下既平送之歸國六也臣既負六罪誠合萬誅惟當吞恨九泉銜寃千古復何訴哉臣受恩至重夙夜思奉天顏但以來瑱受誅朝廷不示其罪諸道節度誰不疑懼近聞詔追數人盡皆不至實畏中官讒口虛受陛下誅夷豈唯羣臣不忠正為回邪在側且臣前後所奏駱奉仙詞情非不托實陛下竟無處置寵任彌深皆由同類比周䝉蔽聖聽竊聞四方遣人奏事陛下皆云與驃騎議之曽不委宰相可否或稽留數月不還逺近益加疑阻如臣朔方將士功效最高為先帝中興主人乃陛下蒙塵故吏曽不别加優奬反信讒嫉之詞子儀先已被猜臣今又遭詆毁弓藏鳥盡信匪虛言陛下信其矯誣何殊指鹿為馬儻不納愚懇且貴因循臣實不敢保家陛下豈能安國忠言利行惟陛下圖之臣欲公然入朝恐將士留沮今託巡晉絳於彼遷延乞陛下特遣一介至絳州問臣臣即與之同發九月壬戌上遣裴遵慶詣懷恩諭㫖且察其去就懷恩見遵慶抱其足號泣訴寃遵慶為言聖恩優厚諷令入朝懷恩許諾副將范志誠以為不可曰公信其甘言入則為來瑱不復還矣明日懷恩見遵慶以懼死為辭請令一子入朝志誠又以為不可遵慶乃還御史大夫王翊使回紇還懷恩先與可汗往來恐翊泄其事遂留之二年春正月丙午遣檢校刑部尚書顏真卿宣慰朔方行營上之在陜也真卿請奉詔召僕固懷恩上不許至是上命真卿說諭懷恩入朝對曰陛下在陜臣往以忠義責之使之赴難彼猶有可來之理今陛下還宫彼進不成勤王退不能釋衆召之庸肯至乎且言懷恩反者獨辛雲京駱奉仙李抱玉魚朝恩四人耳自外羣臣皆言其枉陛下不若以郭子儀代懷恩可不戰而服也時汾州别駕李抱真抱玉之從父弟也知懷恩有異志脫身歸京師上方以懷恩為憂召見抱真問計對曰此不足憂也朔方將士思郭子儀如子弟之思父兄懷恩欺其衆云郭子儀已為魚朝恩所殺衆信之故為其用耳陛下誠以子儀領朔方彼皆不召而來耳上然之僕固懷恩既不為朝廷所用遂與河東都將李竭誠潛謀取太原辛雲京覺之殺竭誠乘城設備懷恩使其子瑒將兵攻之雲京出與戰瑒大敗而還遂引兵圍榆次上謂郭子儀曰懷恩父子負朕實深聞朔方將士思公如枯旱之望雨公為朕鎮撫河東汾上之師必不為變戊午以子儀為關內河東副元帥河中節度等使懷恩將士聞之皆曰吾輩從懷恩為不義何面目見汾陽王丁卯以郭子儀為朔方節度大使二月子儀至河中僕固瑒圍榆次旬餘不拔遣使急發祁縣兵李光逸盡與之士卒未食行不能前十將白玉焦暉以鳴鏑射其後者軍士曰將軍何乃射人玉曰今從人反終不免死死一也射之何傷至榆次瑒責其遲胡人曰我乘馬乃漢卒不行耳瑒捶漢卒卒皆怨怒曰節度使黨胡人其夕焦暉白玉帥衆攻瑒殺之僕固懷恩聞之入告其母母曰吾語汝勿反國家待汝不薄今衆心既變禍必及我將如之何懷恩不對再拜而出母提刀逐之曰吾為國家殺此賊取其心以謝三軍懷恩疾走得免遂與麾下三百度河北走時朔方將渾釋之守靈州懷恩檄至云全軍歸鎮釋之曰不然此必衆潰矣將拒之其甥張韶曰彼或翻然改圖以衆歸鎮何可不納也釋之疑未決懷恩行速先候者而至釋之不得已納之張韶以其謀告懷恩懷恩以韶為間殺釋之而收其軍使韶主之既而曰釋之舅也彼尚負之安有忠於我哉他日以事杖之折其脛置於彌峩城而死都虞候張維嶽在沁州聞懷恩去乘傳至汾州撫定其衆殺焦暉白玉而竊其功以告郭子儀子儀使牙官盧諒至汾州維嶽賂諒使實其言子儀奏維嶽殺瑒傳首詣闕羣臣入賀上慘然不悅曰朕信不及人致勳臣顛越深用為愧又何賀焉命輦懷恩母至長安給待優厚月餘以壽終以禮葬之功臣皆感歎戊寅郭子儀如汾州懷恩之衆數萬悉歸之咸鼓舞涕泣喜其來而悲其晚也子儀知盧諒之詐杖殺之上以李抱真言有驗遷殿中少監夏六月僕固懷恩至靈武收合散亡其衆復振上厚撫其家癸未下詔稱其勳勞著於帝室及於天下疑隙之端起自羣小察其深衷本無它志君臣之義情實如初但以河北既平朔方已有所屬宜解河北副元帥朔方節度等使其太保兼中書令大寧郡王如故但當詣闕更勿有疑懷恩竟不從秋八月郭子儀自河中入朝㑹涇原奏僕固懷恩引回紇吐蕃十萬衆將入寇京師震駭詔子儀帥諸將出鎮奉天上召問方略對曰懷恩無能為也上曰何故對曰懷恩勇而少恩士心不附所以能入寇者因思歸之士耳懷恩本臣偏禆其麾下皆臣部曲必不忍以鋒刃相向以此知其無能為也辛巳子儀發赴奉天九月辛亥以郭子儀充北道邠寧涇原河西以來通和吐蕃使僕固懷恩前軍至宜祿郭子儀使右兵馬使李國臣將兵為郭晞後繼邠寧節度使白孝德敗吐蕃于宜祿冬十月懷恩引回紇吐蕃至邠州白孝德郭晞閉城拒守僕固懷恩與回紇吐蕃進逼奉天京師戒嚴諸將請戰郭子儀不許曰虜深入吾地利於速戰吾堅壁以待之彼以吾為怯必不戒乃可破也若遽戰而不利則衆心離矣敢言戰者斬辛未夜子儀出陳於乾陵之南壬申未明虜衆大至虜始以子儀為無備欲襲之忽見大軍驚愕遂不戰而退子儀使禆將李懷光等將五千騎追虜至麻亭而還虜至邠州丁丑攻之不克乙酉虜涉涇而遁懷恩之南寇也河西節度使楊志烈發卒五千謂監軍柏文達曰河西鋭卒盡於此矣君將之以攻靈武則懷恩有返顧之慮此亦救京師之一竒也文達遂將其衆擊摧砂堡靈武縣皆下之進攻靈州懷恩聞之自永壽遽歸使蕃渾二千騎夜襲文達大破之士卒死者殆半文達將餘衆歸涼州哭而入志烈迎之曰此行有安京室之功卒死何傷士卒怨其言未幾吐蕃圍涼州士卒不為用志烈奔甘州為沙陀所殺涼州遂陷永泰元年春三月庚戌吐蕃遣使請和詔元載杜鴻漸與盟於興唐寺上問郭子儀吐蕃請盟何如對曰吐蕃利我不虞若不虞而來國不可守矣乃相繼遣河中兵戍奉天又遣兵巡涇原以覘之僕固懷恩誘回紇吐蕃吐谷渾党項奴刺數十萬衆俱入寇令吐蕃大將尚結悉贊磨馬重英等自北道趣奉天党項帥任敷鄭庭郝德等自東道趣同州吐谷渾奴刺之衆自西道趣盩厔回紇繼吐蕃之後懷恩又以朔方兵繼之郭子儀使行軍司馬趙復入奏曰虜皆騎兵其來如飛不可易也請使諸道節度使鳯翔李抱玉滑濮李光庭邠寧白孝德鎮西馬璘河南郝庭玉淮西李忠臣各出兵以厄其衝要上從之諸道多不時出兵李忠臣方與諸將擊毬得詔亟命治行諸將及監軍皆曰師行必擇日忠臣怒曰父母有急豈可擇日而後救邪即日勒兵就道懷恩中塗遇暴疾而歸丁酉死於鳴沙大將張詔代領其衆别將徐璜玉殺之范志誠又殺璜玉而領其衆懷恩拒命三年再引胡寇為國大患上猶為之隱前後制敇未嘗言其反及聞其死憫然曰懷恩不反為左右所誤耳吐蕃至邠州白孝德嬰城自守甲辰吐蕃十萬衆至奉天京城震恐朔方兵馬使渾瑊討擊使白元光先戍奉天虜始列營瑊帥驍騎二百直衝之身先士卒虜衆披靡瑊挾虜將一人躍馬而還從騎無中鋒鏑者城上士卒望之勇氣始振乙巳吐蕃進攻之虜死傷甚衆數日斂衆還營瑊夜引兵襲之殺千餘人前後與虜戰二百餘合斬首五千級丙午召郭子儀於河中使屯涇陽己酉命李忠臣屯東渭橋李光進屯雲陽馬璘郝庭玉屯便橋李抱玉屯鳯翔內侍駱奉仙將軍李日越屯盩厔同華節度使周智光屯同州鄜坊節度使杜冕屯坊州上自將六軍屯苑中庚戌下制親征辛亥魚朝恩請索城中括士民私馬令城中男子皆衣皂團結為兵城門皆塞二開一士民大駭踰垣鑿竇而逃者甚衆吏不能禁朝恩欲奉上幸河中以避吐蕃恐羣臣論議不一一旦百官入朝立班久之閣門不開朝恩忽從禁軍十餘人操白刃而出宣言吐蕃數犯郊畿車駕欲幸河中何如公卿皆錯愕不知所對有劉給事者獨出班抗聲曰敇使反邪今屯軍如雲不戮力扞寇而遽欲脅天子棄宗廟社稷而去非反而何朝恩驚沮而退事遂寢自丙午至甲寅大雨不止故虜不能進吐蕃移兵攻醴泉党項西掠白水東侵蒲津丁巳吐蕃大掠男女數萬而去所過焚廬舍蹂禾稼殆盡周智光引兵邀擊破之於澄城因逐北至鄜州智光素與杜冕不協遂殺鄜州刺史張麟坑冕家屬八十一人焚坊州廬舍三千餘家冬十月吐蕃退至邠州遇回紇復相與入寇辛酉至奉天癸亥党項焚同州官廨民居而去丙寅回紇吐蕃合兵圍涇陽子儀命諸將嚴設守備而不戰及暮二虜退屯北原丁卯復至城下是時回紇與吐蕃聞僕固懷恩死已爭長不相睦分營而居子儀知之回紇在城西子儀使牙將李光瓚等往說之欲與之共擊吐蕃回紇不信曰郭公固在此乎汝紿我耳若果在此可得見乎光瓚還報子儀曰今衆寡不敵難以力勝昔與回紇契約甚厚不若挺身往說之可不戰而下也諸將請選鐵騎五百為衛從子儀曰此適足為害也郭晞扣馬諫曰彼虎狼也大人國之元帥奈何以身為虜餌子儀曰今戰則父子俱死而國家危往以至誠與之言或幸而見從則四海之福也不然則身沒而家全以鞭擊其手曰去遂與數騎開門而出使人傳呼曰令公來回紇大驚其大帥合胡祿都督藥葛羅可汗之弟也執弓注矢立於陳前子儀免胄釋甲投槍而進回紇諸酋長相顧曰是也皆下馬羅拜子儀亦下馬前執藥葛羅手讓之曰汝回紇有大功於唐唐之報汝亦不薄奈何負約深入吾地侵逼畿縣棄前功結怨仇背恩德而助叛臣何其愚也且懷恩叛君棄母於汝國何有今吾挺身而來聽汝執我殺之我之將士必致死與汝戰矣藥葛羅曰懷恩欺我言天可汗已晏駕令公亦捐館中國無主我是以敢與之來今知天可汗在上都令公復揔兵於此懷恩又為天所殺我曹豈肯與令公戰乎子儀因說之曰吐蕃無道乘我國有亂不顧舅甥之親吞噬我邊鄙焚蕩我畿甸其所掠之財不可勝載馬牛雜畜長數百里彌漫在野此天以賜汝也全師而繼好破敵以取富為汝計孰便於此不可失也藥葛羅曰吾為懷恩所誤負公誠深今請為公盡力擊吐蕃以謝過然懷恩之子可敦兄弟也願捨之勿殺子儀許之回紇觀者左右為兩翼稍前子儀麾下亦進子儀揮手却之因取酒與其酋長共飲藥葛羅使子儀先執酒為誓子儀酹地曰大唐天子萬嵗回紇可汗亦萬嵗兩國將相亦萬嵗有負約者身隕陳前家族滅絶杯至藥葛羅亦酹地曰如令公誓於是諸酋長皆大喜曰嚮以二巫師從軍巫言此行甚安穩不與唐戰見一大人而還今果然矣子儀遺之綵三千匹酋長分以賞巫子儀竟與定約而還吐蕃聞之夜引兵遁去回紇遣其酋長石野那等六人入見天子藥葛羅帥衆追吐蕃子儀使白元光帥精騎與之俱癸酉戰於靈臺西原大破之殺吐蕃萬計得所掠士女四千人丙子又破之於涇州東丁丑僕固懷恩將張休藏等降辛巳詔罷親征京城解嚴初肅宗以陜西節度使郭英乂領神策軍使內侍魚朝恩監其軍英乂入為僕射朝恩專將之及上幸陜朝恩舉在陜兵與神策軍迎扈悉號神策軍天子幸其營及京師平朝恩遂以軍歸禁中自將之然尚未得與北軍齒至是朝恩以神策軍從上屯苑中其勢寖盛分為左右廂居北軍之右矣郭子儀以僕固名臣李建忠等皆懷恩驍將恐逃入外夷請招之名臣懷恩之姪也時在回紇營上敇並舊將有功者皆赦其罪令回紇送之壬午名臣以千餘騎來降子儀使開府儀同三司慕容休真以書諭党項帥鄭庭郝德等皆詣鳯翔降甲申周智光詣闕獻捷再宿歸鎮智光負專殺之罪未治上既遣而悔之乙酉回紇胡祿都督等二百餘人入見前後贈賚繒帛十萬匹府藏空竭稅百官俸以給之大曆元年春正月周智光至華州益驕橫召之不至上命杜冕從張獻誠於山南以避之智光遣兵於商山邀之不獲智光自知罪重乃聚亡命無賴子弟衆至數萬縱其剽掠以悅其心擅留關中所漕米二萬斛藩鎮貢獻往往殺其使者而奪之冬十二月癸卯周智光殺陜州監軍張志斌智光素與陜州刺史皇甫溫不協志斌入奏事智光館之志斌責其部下不肅智光怒曰僕固懷恩不反正由汝輩激之我亦不反今日為汝反矣叱下斬之臠食其肉朝士舉選人畏智光之暴多自同州竊過智光遣將將兵邀之於路死者甚衆戊申詔加智光檢校左僕射遣中使余元仙持告身授之智光慢罵曰智光有大功於天下國家不與平章事而與僕射且同華地狹不足展才若益以陜虢商鄜坊五州庶猶可耳因歷數大臣過失且曰此去長安百八十里智光夜眠不敢舒足恐踏破長安城至於挾天子令諸侯惟周智光能之元仙股栗郭子儀屢請討智光上不許二年春正月丁巳密詔郭子儀討周智光子儀命大將渾瑊李懷光軍于渭上智光麾下聞之皆有離心己未智光大將李漢惠自同州帥所部降於子儀壬戌貶智光澧州刺史甲子華州牙將姚懷李延俊殺智光以其首來獻元載專權唐肅宗上元二年建子月戍子御史中丞元載為户部侍郎充勾當度支鑄錢鹽鐵兼江淮轉運等使載初為度支郎中敏悟善奏對上愛其才委以江淮漕運數月遂代劉晏專掌財利代宗廣德元年秋九月壬辰詔以元載判元帥行軍司馬冬十二月乙未以苖晉卿為太保裴遵慶為太子少傅並罷政事以宗正卿李峴為黃門侍郎同平章事遵慶既去元載權益盛以貨結內侍董秀使主書卓英倩潛與往來上意所屬載必先知之承意探微言無不合上以是愈愛之英倩全州人也永泰元年華原令顧繇上言元載子伯和等招權受賂十二月戊戌繇坐流錦州大曆元年元載專權恐奏事者攻訐其私乃請百官凡論事皆先白長官長官白宰相然後奏聞仍以上㫖諭百官曰比日諸司奏事煩多所言多讒毁故委長官宰相先定其可否刑部尚書顏真卿上疏以為郎官御史陛下之耳目今使論事者先白宰相是自掩其耳目也陛下患羣臣之為讒何不察其言之虛實若所言果虛宜誅之果實宜賞之不務為此而使天下謂陛下厭聽覽之煩託此為辭以塞諫爭之路臣竊為陛下惜之太宗著司門式云其無門籍人有急奏者皆令門司與仗家引奏無得關礙所以防壅蔽也天寶以後李林甫為相深疾言者道路以目上意不下逮下情不上達䝉蔽喑嗚卒成幸蜀之禍陵夷至于今日其所從來者漸矣夫人主大開不諱之路羣臣猶莫敢盡言況令宰相大臣裁而抑之則陛下所聞見者不過三數人耳天下之士從此鉗口結舌陛下見無復言者以為天下無事可論是林甫復起於今日也昔林甫雖擅權羣臣有不咨宰相輒奏事者則託以它事陰中傷之猶不敢明令百司奏事皆先白宰相也陛下儻不早寤漸成孤立後雖悔之亦無及矣載聞而恨之奏真卿誹謗二月乙未貶峽州别駕五年觀軍容宣慰處置使左監門衛大將軍兼神策軍使內侍監魚朝恩專典禁兵寵任無比上常與議軍國事勢傾朝野朝恩好於廣坐恣談時政陵侮宰相元載雖彊辨亦拱默不敢應神策都虞侯劉希暹都知兵馬使王駕鶴皆有寵於朝恩希暹說朝恩於北軍置獄使坊市惡少年羅告富室誣以罪惡捕繫地牢訊掠取服籍沒其家資入軍並分賞告捕者地在禁密人莫敢言朝恩每奏事以必允為期朝廷政事有不豫者輒怒曰天下事有不由我者邪上聞之由是不懌朝恩養子令徽尚幼為內給使衣緑與同列忿爭歸告朝恩朝恩明日見上曰臣子官卑為儕輩所陵乞賜之紫衣上未應有司已執紫衣在前令徽服之拜謝上彊笑曰兒服紫衣宜稱心愈不平元載測知上指乘閒奏朝恩專恣不軌請除之上亦知天下共怨怒遂令載為方略朝恩每入殿常使射生將周皓將百人自衛又使其黨陜州節度使皇甫溫握兵於外以為援載皆以重賂結之故朝恩陰謀密語上一一聞之而朝恩不之覺也辛卯載為上謀徙李抱玉為山南西道節度使以溫為鳯翔節度使外重其權實內溫以自助也載又請割郿虢寶雞鄠盩厔隸抱玉興平武功天興扶風隸神策軍朝恩喜於得地殊不以載為虞驕橫如故劉希暹頗覺上意異以告魚朝恩朝恩始疑懼然上每見之恩禮益隆朝恩亦以此自安皇甫溫至京師元載留之未遣因與溫及周皓密謀誅朝恩既定計載白上上曰善圖之勿反受禍三月癸酉寒食上置酒宴貴近於禁中載守中書省宴罷朝恩將還營上留之議事因責其異圖朝恩自辨語頗悖慢皓與左右擒而縊殺之外無知者上下詔罷朝恩觀軍容等使內侍監如故詐云朝恩受詔乃自縊以尸還其家賜錢六百萬以葬丁丑加劉希暹王駕鶴御史中丞以尉安北軍之心丙戌赦京城繫囚命盡釋朝恩黨與且曰北軍將士皆朕爪牙竝宜仍舊朕今親御禁旅勿有憂懼元載既誅魚朝恩上寵任益厚載遂志氣驕溢每衆中大言自謂有文武才略古今莫及弄權舞智政以賄成僭侈無度吏部侍郎楊綰典選平允性介直不附載嶺南節度使徐浩貪而佞傾南方珍貨以賂載辛卯載以綰為國子祭酒引浩代之浩越州人也載有丈人自宣州來從載求官載度其人不足任事但贈河北一書而遣之丈人不悅行至幽州私發書視之書無一言惟署名而已丈人大怒不得已試謁院僚判官聞有載書大驚立白節度使遣大校以箱受書館之上舍留宴數日辭去贈絹千匹其威權動人如此劉希暹內常自疑有不遜語王駕鶴以聞九月辛未賜希暹死上悉知元載所為以其任政日久欲全始終因獨見深戒之載猶不悛上由是稍惡之載以李泌有寵於上忌之言泌常與親故宴於北軍與魚朝恩親善宜知其謀上曰北軍泌之故吏也故朕使之就見親故朝恩之誅泌亦豫謀卿勿以為疑載與其黨攻之不已㑹江西觀察使魏少遊求參佐上謂泌曰元載不容卿朕今匿卿於魏少遊所俟朕決意除載當有信報卿可束裝來乃以泌為江西判官且屬少遊使善待之六年夏四月成都司録李少良上書言元載姦贓隂事上置少良於客省少良以上語告友人韋頌殿中侍御史陸珽以告載載奏之上怒下少良頌珽御史臺獄御史奏少良頌珽凶險比周離間君臣五月戊申敇付京兆皆杖死上益厭元載所為思得士大夫之不阿附者為腹心漸收載權丙子內出制書以浙西觀察使李栖筠為御史大夫宰相不知載由是稍絀八年春三月吏部侍郎徐浩薛雍皆元載王縉之黨浩妾弟侯莫陳怤為美原尉浩屬京兆尹杜濟虛以知驛奏優又屬雍擬長安尉怤參臺御史大夫李栖筠劾奏其狀敇禮部侍郎萬年子邵等按之邵奏雍罪在赦前應原除上怒夏五月乙酉貶浩明州别駕雍歙州刺史丙戌貶濟杭州刺史邵桂州長史朝廷稍肅十二年中書侍郎同平章事元載專橫黃門侍郎同平章事王縉附之二人俱貪載妻王氏及子伯和仲武縉弟妹及尼出入者爭納賄賂又以政事委羣吏士之求進者不結其子弟及主書卓英倩等無由自達上含容纍年載縉不悛上欲誅之恐左右漏泄無可與言者獨與左金吾大將軍吳湊謀之湊上之舅也㑹有告載縉夜醮圖為不軌者三月庚辰上御延英殿命湊收載縉於政事堂又收仲武及卓英倩等繫獄命吏部尚書劉晏與御史大夫李涵等同鞫之問端皆出禁中仍遣中使詰以陰事載縉皆伏罪是日先杖殺左衛將軍知內省事董秀於禁中乃賜載自盡於萬年縣載請主者願得快死主者曰相公須受少汚辱勿怪乃脫穢襪塞其口而殺之王縉初亦賜自盡劉晏謂李涵等曰故事重刑覆奏況大臣乎且法有首從宜更取進止涵等從之上乃貶縉括州刺史載妻王氏忠嗣之女也及子伯和仲武季能皆伏誅有司籍載家財胡椒至八百石它物稱是夏四月癸未貶吏部侍郎楊炎諫議大夫韓洄包佶起居舍人韓㑹等十餘人皆載黨也炎鳯翔人載常引有文學才望者一人親厚之異日欲以代已故炎及於貶洄滉之弟㑹南陽人也上初欲盡誅炎等吳湊諫救百端始貶官庚午上遣中使發元載祖父墓斫棺棄尸毁其家廟焚其木主戊寅卓英倩等皆杖死英倩之用事也弟英璘橫於鄉里及英倩下獄英璘遂據險作亂上發禁兵討之乙巳金州刺史孫道平擊擒之吐蕃入冦代宗幸陜唐玄宗開元二十五年春二月己亥河西節度使崔希逸襲吐蕃破之於青海西初希逸遣使謂吐蕃邊將乞力徐曰兩國通好今為一家何必更置兵守捉妨人耕牧請皆罷之乞力徐曰常侍忠厚言必不欺然朝廷未必専以邊事相委萬一有姦人交鬭其間掩吾不備悔之何及希逸固請乃刑白狗為盟各去守備於是吐蕃畜牧被野時吐蕃西擊勃律勃律來告急上命吐蕃罷兵吐蕃不奉詔遂破勃律上甚怒㑹希逸傔人孫誨入奏事自欲求功奏稱吐蕃無備請掩擊必大獲上命內給事趙惠琮與誨偕往審察事宜惠琮等至則矯詔令希逸襲之希逸不得已發兵自凉州南入吐蕃境二千餘里至青海西與吐蕃戰大破之斬首二千餘級乞力徐脫身走惠琮誨皆受厚賞自是吐蕃復絶朝貢二十六年春三月吐蕃寇河西節度使崔希逸擊破之鄯州都督知隴右留後杜希望攻吐蕃新城拔之以其地為威戎軍置兵一千戍之夏五月乙酉李林甫兼河西節度使丙申以崔希逸為河南尹希逸自念失信於吐蕃內懷愧恨未幾而卒六月辛丑以岐州刺史蕭炅為河西節度使總留後事鄯州都督杜希望為隴右節度使太僕卿王昱為劒南節度使分道經略吐蕃仍毁所立赤嶺碑吐番請和立碑事見秋七月杜希望將鄯州之衆奪吐蕃河橋築鹽泉城於河左吐蕃發兵三萬逆戰希望衆少不敵將卒皆懼左威衛郎將王忠嗣帥所部先犯其陳所向闢易殺數百人虜陳亂希望縱兵乘之虜遂大敗置鎮西軍於鹽泉忠嗣以功遷左金吾將軍􅊨初儀鳯中吐蕃陷安戎城而據之其地險要唐屢攻之不克劒南節度使王昱築兩城於其側頓軍蒲婆嶺下運資糧以逼之吐蕃大發兵救安戎城昱衆大敗死者數千人昱脫身走糧仗軍資皆棄之貶昱括州刺史再貶高要尉而死二十七年秋八月壬午吐蕃寇白草安人等軍隴右節度使蕭炅擊破之二十八年春三月章仇兼瓊潛與安戎城中吐蕃翟都局及維州别駕董承晏結謀使局開門引內唐兵盡殺吐蕃將卒使監察御史許逺將兵守之逺敬宗之曾孫也夏六月吐蕃圍安戎城冬十月吐蕃寇安戎城及維州發關中彊騎救之吐蕃引去更命安戎城曰平戎十二月金城公主薨吐蕃告喪且請和上不許見吐蕃請和公主嫁吐蕃事二十九年夏六月吐蕃四十萬衆入寇至安仁軍渾崖峯騎將臧希液帥衆五千擊破之冬十二月乙巳吐蕃屠達化縣陷石堡城蓋嘉運不能禦天寶二年夏四月丁亥皇甫惟明引軍出西平擊吐蕃行千餘里攻洪濟城破之四載秋九月隴右節度使皇甫惟明與吐蕃戰於石堡城為虜所敗副將褚誗戰死六載冬十月河西隴右節度使王忠嗣以部將哥舒翰為大將軍副使李光弼為河西兵馬使充赤水軍使翰父祖本突騎施别部酋長光弼契丹王楷洛之子也皆以勇略為忠嗣所重忠嗣使翰擊吐蕃有同列為之副倨慢不為用翰撾殺之軍中股栗纍功至隴右節度副使每嵗積石軍麥熟吐蕃輒來穫之無能禦者邊人謂之吐蕃麥莊翰先伏兵於其側虜至斷其後夾擊之無一人得返者自是不敢復來上欲使王忠嗣攻吐蕃石堡城忠嗣上言石堡險固吐蕃舉國守之今頓兵其下非殺數萬人不能克臣恐所得不如所亡不如且厲兵秣馬俟其有釁然後取之上意不快將軍董延光自請將兵取石堡城上命忠嗣分兵助之忠嗣不得已奉詔而不盡副延光所欲延光怨之李光弼言於忠嗣曰大夫以愛士卒之故不欲成延光之功雖迫於制書實奪其謀也何以知之今以數萬衆授之而不立重賞士卒安肯為之盡力乎然此天子意也彼無功必歸罪於大夫大夫軍府充牣何愛數萬假帛不以杜其讒口乎忠嗣曰今以數萬之衆爭一城得之未足以制敵不得亦無害於國故忠嗣不欲為之忠嗣今受責天子不過以金吾羽林一將軍歸宿衛其次不過黔中上佐忠嗣豈以數萬人之命易一官乎李將軍子誠愛我矣然吾志決矣子勿復言光弼曰嚮者恐為大夫之纍故不敢不言今大夫能行古人之事非先弼所及也遂趨出延光過期不克言忠嗣沮撓軍計上怒李林甫因使濟陽别駕魏林告忠嗣嘗自言我幼養宫中與忠王相愛狎欲擁兵以尊奉太子敇徵忠嗣入朝委三司鞫之上聞哥舒翰名召見華清宫與語悅之十一月辛卯以翰判西平太守充隴右節度使以朔方節度使安思順判武威郡事充河西節度使初將軍高仙芝本高麗人從軍安西仙芝驍勇善騎射節度使夫䝉靈察纍薦至安西副都護都知兵馬使充四鎮節度副使吐蕃以女妻小勃律王及其旁二十餘國皆附吐蕃貢獻不入前後節度使討之皆不能克制以仙芝為行營節度使將萬騎討之自安西行百餘日乃至特勒滿川分軍為三道期以七月十三日㑹吐蕃連雲堡下有兵近萬人不意唐兵猝至大驚依山拒戰炮櫑如雨仙芝以郎將高陵李嗣業為陌刀將令之曰不及日中決須破虜嗣業執一旗引陌刀緣險先登力戰自辰至已大破之斬首五千級捕虜千餘人餘皆逃潰中使邊令誠以入虜境已深懼不敢進仙芝乃使令誠以羸弱三千守其城復進三日至坦駒嶺下峻阪四十餘里前有阿弩越城仙芝恐士卒憚險不肯下先令人胡服詐為阿弩越守者迎降云阿弩越赤心歸唐娑夷水藤橋已斫斷矣娑夷即弱水也其水不能勝草芥藤橋者通吐蕃之路也仙芝陽喜士卒乃下又三日阿弩越城迎者果至明日仙芝入阿弩越城遣將軍席元慶將千騎前行謂曰小勃律聞大軍至其君臣百姓必走山谷第呼出取繒帛稱敇賜之大臣至盡縛之以待我元慶如其言悉縛諸大臣王及吐蕃公主逃入石窟取不可得仙芝至斬其附吐蕃者大臣數人藤橋去城猶六十里仙芝急遣元慶往斫之甫畢吐蕃兵大至已無及矣藤橋濶盡一矢力修之朞年乃成八月仙芝虜小勃律王及吐蕃公主而還九月至連雲堡與邊令誠俱月末至播密川遣使奏狀至河西夫䝉靈察怒仙芝不先言已而遽發奏一不迎勞罵仙芝曰噉狗糞高麗奴汝官皆因誰得而不待我處分擅奏捷書高麗奴汝罪當斬但以汝新有功不忍耳仙芝但謝罪七載冬十二月哥舒翰築神威軍於青海上吐蕃至翰擊破之又築城於青海中龍駒島謂之應龍城吐蕃屏跡不敢近青海八載夏六月上命隴右節度使哥舒翰帥隴右河西及突厥阿布思兵益以朔方河東兵凡六萬三千攻吐蕃石堡城其城三面險絶惟一徑可上吐蕃但以數百人守之多貯糧食積檑木及石唐兵前後屢攻之不能克翰進攻數日不拔召禆將高秀巖張守瑜欲斬之二人請三日期可克如期拔之獲吐蕃鐵刃悉諾羅等四百人唐士卒死者數萬果如王忠嗣之言頃之翰又遣兵於赤嶺西開屯田以謫卒二千戍龍駒島冬冰合吐蕃大集戍者盡沒閏月乙丑以石堡城為神武軍九載冬十二月關西遊奕使王難得擊吐蕃克五橋拔樹敦城以難得為白水軍使十四載春正月蘇毗王子悉諾邏去吐蕃來降夏四月癸巳以蘇毗王子悉諾邏為懷義王賜姓名李忠信吐蕃贊普乞梨蘇籠獵贊卒子娑悉籠獵贊立肅宗至德元載吐蕃陷威戎神威定戎宣威制勝金天天成等軍石堡城百谷城雕窠城二載冬十月吐蕃陷西平乾元元年吐蕃陷河源軍上元元年吐蕃陷廓州寶應元年建寅月甲辰吐蕃遣使請和代宗廣德元年夏四月郭子儀數上言吐蕃党項不可忽宜早為之備辛丑遣兼御史大夫李之芳等使于吐蕃為虜所留二年乃得歸秋七月吐蕃入大震關陷蘭廓河鄯洮岷秦成渭等州盡取河西隴右之地唐自武德以來開拓邊境地連西域皆置都督府州縣開元中置朔方隴右河西安西北庭諸節度使以統之歲發山東丁壯為戍卒繒帛為軍資開屯田供糗糧設監牧畜馬牛軍城戍邏萬里相望及安祿山反邊兵精鋭者皆徵發入援謂之行營所留兵單弱胡虜稍蠶食之數年間西北數十州相繼淪沒自鳯翔以西邠州以北皆為左衽矣吐蕃之初入寇也邊將告急程元振皆不以聞冬十月吐蕃寇涇州刺史高暉以城降之遂為之鄉導引吐蕃深入過邠州上始聞之辛未寇奉天武功京師震駭詔以雍王適為關內元帥郭子儀為副元帥出鎮咸陽以禦之子儀間廢日久部曲離散至是召募得二十騎而行至咸陽吐蕃帥吐谷渾党項氐羌二十餘萬衆彌漫數十里已自司竹園度渭循山而東子儀使判官中書舍人王延昌入奏請益兵程元振遏之竟不召見癸酉渭北行營兵馬使吕月將將精卒二千破吐蕃于盩厔之西乙亥吐蕃寇盩厔月將復與力戰兵盡為虜所擒上方治兵而吐蕃已度便橋倉猝不知所為丙子出幸陜州官吏藏竄六軍逃散郭子儀聞之遽自咸陽歸長安比至車駕已去上才出苑門度滻水射生將王獻忠擁四百騎叛還長安脅豐王珙等十王西迎吐蕃遇子儀於開逺門內子儀叱之獻忠下馬謂子儀曰今主上東遷社稷無主令公身為元帥廢立在一言耳子儀未應珙越次言曰公何不言子儀責讓之以兵援送行在丁丑車駕至華州官吏奔散無復供擬扈從將士不免凍餒㑹觀軍容使魚朝恩將神策軍自陜來迎上乃幸朝恩營豐王珙見上於潼關上不之責退至幕中有不遜語羣臣奏請誅之乃賜死戊寅吐蕃入長安高暉與吐蕃大將馬重英等立故邠王守禮之孫廣武王承宏為帝改元置百官以前翰林學士于可封等為相吐蕃剽掠府庫市里焚閭舍長安中蕭然一空苖晉卿病臥家遣人輿入迫脅之晉卿閉口不言虜不敢殺於是六軍散者所在剽掠士民避亂皆入山谷辛巳上至陜百官稍有至者郭子儀引三十騎自御宿川循山而東謂王延昌曰六軍將士逃潰者多在商州今速往收之並發武關防兵數日間北出藍田以向長安吐蕃必遁過藍田遇元帥都虞侯臧希讓鳯翔節度使高升得兵近千人子儀與延昌謀曰潰兵至商州官吏必逃匿而人亂使延昌自直徑入商州撫諭之諸將方縱兵暴掠聞子儀至皆大喜聽命子儀恐吐蕃逼乘輿留軍七盤三日乃行比至商州行收兵並武關防兵合四千人軍勢稍振子儀乃泣諭將士以共雪國恥取長安皆感激受約束子儀請太子賓客第五琦為糧料使給軍食上賜子儀詔恐吐蕃東出潼關徵子儀詣行在子儀表稱臣不收京城無以見陛下若出兵藍田虜必不敢東向上許之鄜坊節度判官段秀實說節度使白孝德引兵赴難孝德即日大舉南趣京畿與蒲陜商華合勢進擊吐蕃既立廣武王承宏欲掠城中士女百工整衆歸國子儀使左羽林大將軍長孫全緒將二百騎出藍田觀虜勢令第五琦攝京兆尹與之偕行又令寶應軍使張知節將兵繼之全緒至韓公堆晝則擊鼓張旗幟夜則多燃火以疑吐蕃前光祿卿殷仲卿聚衆近千人保藍田與全緒相表裏帥二百餘騎直度滻水吐蕃懼百姓又紿之曰郭令公自商州將大軍不知其數至矣虜以為然稍稍引軍去全緒又使射生將王甫入城陰結少年數百夜擊鼓大呼於朱雀街吐蕃惶駭庚寅悉衆遁去高暉聞之帥麾下三百餘騎東走至潼關守將李日越擒而殺之壬辰詔以元載判元帥行軍司馬以第五琦為京兆癸巳以郭子儀為西京留守甲午子儀發商州己亥以魚朝恩部將皇甫溫為陜州刺史周智光為華州刺史吐蕃入寇驃騎大將軍判元帥行軍司馬程元振不以時奏致上狼狽出幸上發詔徵諸道兵李光弼等皆忌元振居中莫有至者中外咸切齒而莫敢發言太常博士柳伉上疏以為犬戎犯關度隴不血刃而入京師劫宫關焚陵寢武士無一人力戰者此將帥叛陛下也陛下疏元功委近習日引月長以成大禍羣臣在廷無一人犯顏回慮者此公卿叛陛下也陛下始出都百姓填然奪府庫相殺戮此三輔叛陛下也自十月朔召諸道兵盡四十日無隻輪入關此四方叛陛下也內外離叛陛下以今日之勢為安邪危邪若以為危豈得高枕不為天下討罪人乎臣聞良醫療疾當病飲藥藥不當病猶無益也陛下視今日之病何繇至此乎必欲存宗廟社稷獨斬元振首馳告天下悉出內使隸諸州持神策兵付大臣然後削尊號下詔引咎曰天下其許朕自新改過宜即募士西赴朝廷若以朕惡未悛則帝王大器敢妨聖賢其聽天下所往如此而兵不至人不感天下不服臣請闔門寸斬以謝陛下上以元振嘗有保護功十一月辛丑削元振官爵放歸田里吐蕃還至鳯翔節度使孫志直閉城拒守吐蕃圍之數日鎮西節度使馬璘聞車駕幸陜將精騎千餘自河西入赴難轉鬭至鳯翔值吐蕃圍城璘帥衆持滿外向突入城中不解甲背城出戰單騎先士卒奮擊俘斬千計而歸明日虜復逼城請戰璘開懸門以待之虜引退曰此將軍不惜死宜避之遂去居於原㑹成渭之地十二月丁亥車駕發陜州左丞顏真卿請上先謁陵廟然後還宫元載不從真卿怒曰朝廷豈堪相公再壞邪載由是銜之甲午上至長安郭子儀帥城中百官及諸軍迎於滻水東伏地待罪上勞之曰用卿不早故及於此以魚朝恩為天下觀軍容宣慰處置使總禁兵權寵無比築城於鄠縣及中渭橋屯兵以備吐蕃以駱奉仙為鄠縣築城使遂將其兵吐蕃陷松維保三州及雲山新築二城西川節度使高適不能救於是劒南西山諸州亦入於吐蕃矣二年僕固懷恩反秋八月涇原奏懷恩引回紇吐蕃十萬衆入寇京師震駭詔郭子儀帥諸將出鎮奉天辛巳子儀發赴奉天九月辛亥以郭子儀充北道邠寧涇原河西以來通和吐蕃使以陳鄭澤潞節度使李抱玉充南道通和吐蕃使子儀聞吐蕃逼邠州甲寅遣其子朔方兵馬使晞將兵萬人救之己未劒南節度使嚴武破吐蕃七萬衆拔當狗城邠寧節度使白孝德敗吐蕃于宜祿冬十月僕固懷恩引回紇吐蕃至邠州庚午嚴武拔吐蕃鹽川城僕固懷恩與回紇吐蕃逼奉天京師戒嚴永泰元年春三月庚戌吐蕃遣使請和詔元載杜鴻漸與盟於興唐寺秋九月僕固懷恩誘回紇吐蕃數十餘萬衆俱入寇懷恩之叛事見僕固劒南節度使嚴武以將軍崔旰為漢州刺史使將兵擊吐蕃於西山連拔其數城攘地數百里大曆元年春二月己亥命大理少卿楊濟修好於吐蕃二年夏四月庚子命宰相魚朝恩與吐蕃盟于興唐寺九月吐蕃衆數萬圍靈州遊騎至潘原宜祿詔郭子儀自河中帥甲士三萬鎮涇陽京師戒嚴甲子子儀移鎮奉天冬十月戊寅朔方節度使路嗣恭破吐蕃於靈州城下斬首二千餘級吐蕃引去三年八月壬戌吐蕃十萬衆寇靈武丁卯吐蕃尚贊摩二萬衆寇邠州京師戒嚴邠寧節度使馬璘擊破之九月壬申命郭子儀將兵五萬屯奉天以備吐蕃壬午朔方騎將白元光擊吐蕃破之壬辰元光又破吐蕃二萬衆於靈武鳯翔節度使李抱玉使右軍都將臨洮李晟將兵五千擊吐蕃晟曰以力則五千不足用以謀則太多乃將千人兼行出大震關至臨洮屠吐蕃定秦堡焚其積聚虜堡帥慕容谷種而還吐蕃聞之釋靈州之圍而去戊戌京師解嚴冬十一月郭子儀還河中元載以吐蕃連歲入寇馬璘以四鎮兵屯邠寧力不能拒而郭子儀以朔方重兵鎮河中深居腹中無事之地乃與子儀及諸將議徙璘鎮涇州而使子儀以朔方兵鎮邠州曰若以邊土荒殘軍費不給則以內地租稅及運金帛以助之諸將皆以為然十二月己酉徙馬璘為涇原節度使以邠寧慶三州隸朔方璘先往城涇州以都虞侯段秀實知邠州留後初四鎮北庭兵逺赴中原之難久羈旅數遷徙四鎮歷汴虢鳯翔北庭歷懷絳鄜然後至邠頗積勞弊及徙涇州衆皆怨誹刀斧兵馬使王童之謀作亂期以辛酉旦警嚴而發前夕有告之者秀實陽召掌漏者怒之以其失節令每更來白趣延之數刻遂四更而曙童之不果發秀實欲討之而辭迹未露恐軍中疑其寃告者又云今夕欲焚馬坊草因救火謀作亂中夕火果發秀實命軍中行者皆止坐者勿起各整部伍嚴守要害童之白請救火不許及旦捕童之及其黨八人皆斬之下令曰後徙者族流言者刑遂徙于涇癸亥西川破吐蕃萬餘衆四年秋九月吐蕃寇靈州丁丑朔方留後常謙光擊破之冬十月常謙光奏吐蕃寇鳴沙首尾四十里郭子儀遣兵馬使渾瑊將鋭兵五千救靈州子儀自將進至慶州聞吐蕃退乃還五年秋九月吐蕃寇永壽六年夏四月吐蕃請和庚辰遣兼御史大夫吳損使于吐蕃秋九月吐蕃下青石嶺軍于那城郭子儀使人諭之明日引退七年夏四月吐蕃五千騎至靈州尋退八年冬十月靈州破吐蕃萬餘衆吐蕃衆十萬寇涇邠郭子儀遣朔方兵馬使渾瑊將步騎五千拒之庚申戰于宜祿瑊登黃萯原望虜命據險布拒馬以備其馳突宿將史抗溫儒雅等意輕瑊不用其命瑊召使擊虜則已醉矣見拒馬曰野戰烏用此為命撤之叱騎兵衝虜陳不能入而返虜躡而乘之官軍大敗士卒死者什七八居民為吐蕃所掠千餘人甲子馬璘與吐蕃戰于鹽倉又敗璘為虜所隔逮暮未還涇原兵馬使焦令諶等與敗卒爭門而入或勸行軍司馬段秀實乘城拒守秀實曰大帥未知所在當前擊虜豈得茍自全乎召令諶等讓之曰軍法失大將麾下皆死諸君忘其死邪令諶等惶恐拜請命秀實乃發城中兵未戰者悉出陳于東原且收散兵為將力戰狀吐蕃畏之稍却既夜璘乃得還郭子儀召諸將謀曰敗軍之罪在我不在諸將然朔方兵精聞天下今為虜敗何策可以雪恥莫對渾瑊曰敗軍之將不當復預議然願一言今日之事惟理瑊罪不則再見任子儀赦其罪使將兵趣朝那虜既破官軍欲掠汧隴鹽州刺史李國臣曰虜乘勝必犯郊畿我掎其後虜必返顧乃引兵趣秦原鳴鼓而西虜聞之至百城返渾瑊邀之於隘盡復得其所掠馬璘亦出精兵襲虜輜重於潘原殺數千人虜遂遁去初元載嘗為西州刺史知河西隴右山川形勢是時吐蕃數為寇載言於上曰四鎮北庭既治涇州無險要可守隴山高峻南連秦嶺北抵大河今國家西境盡潘原而吐蕃戍摧沙堡原州居其中間當隴山之口其西皆監牧故地草肥水美平涼在其東獨耕一縣可給軍食故壘尚存吐蕃棄而不居每嵗盛夏吐蕃畜牧青海去塞甚逺若乘間築之二旬可畢移京西軍戍原州移郭子儀軍戍涇州為之根本分兵守石門木峽漸開隴右進達安西據吐蕃腹心則朝廷可高枕矣並圖地形獻之密遣人出隴山商度功用㑹汴宋節度使田神功入朝上問之對曰行軍料敵宿將所難陛下奈何用一書生語欲舉國從之乎載尋得罪事遂寢九年春二月諫議大夫吳損使吐蕃留之纍年竟病死虜中兩稅之弊唐高祖武德七年初定均田租庸調法丁中之民給田一頃篤疾減什之六寡妻妾減七皆以什之二為世業八為口分每丁歲入租粟二石調隨土地所宜綾絹絁布歲役二旬不役則收其傭日三尺有事而加役者旬有五日免其調三旬租調俱免水旱蟲霜為災什損四以上免租損六已上免調損七已上課役俱免凡民資業八九等百户為里五里為鄉四家為鄰四鄰為保在城邑者為坊田野者為村食祿之家無得與民爭利工商雜類無預士伍男女始生為黃四歲為小十六為中二十為丁六十為老歲造計帳三年造户籍開元元宗議定賦役事見姦臣聚斂九年詔括天下逃移户口肅宗寶應元年租庸使元載以江淮雖經兵荒其民比諸道猶有資産乃按籍舉八年租調之違負及逋逃者計其大數而徵之擇豪吏為縣令而督之不問負之有無資之高下察民有粟帛者發徒圍之籍其所有而中分之甚者什取八九謂之白著有不服者嚴刑以威之民有蓄榖十斛者則重足以待命或相聚山澤為羣盜州縣不能制代宗大曆十四年舊制天下金帛皆貯於左藏太府四時上其數比部覆其出入及第五琦為度支鹽鐵使時京師多豪將求取無節琦不能制乃奏盡貯於大盈內庫使宦官掌之天子亦以取給為便故久不出由是以天下公賦為人君私藏有司不復得窺其多少校其嬴縮殆二十年宦官領其事者三百餘員皆蠶食其中蟠結根據牢不可動揚炎頓首於上前曰財賦者國之大本生民之命重輕安危靡不由之是以前世皆使重臣掌其事猶或耗亂不集今獨使中人出入盈虛大臣皆不得知政之蠧敝莫甚於此請出之以歸有司度宫中歲用幾何量數奉入不敢有乏如此然後可以為政上即日下詔凡財賦皆歸左藏一用舊式歲於數中擇精好者三五千匹進入大盈炎以片言移人主意議者稱之德宗建中元年春正月始用楊炎議命黜陟使與觀察使刺史約百姓丁産定等級作兩稅法比來新舊徵科色目一切罷之二稅外輒率一錢者以枉法論唐初賦斂之法曰租庸調有田則有租有身則有庸有户則有調玄宗之末版籍浸壞多非其實及至德兵起所在賦斂迫趣取辦無復常準賦斂之司增數而莫相統攝各隨意徵科自立色目新故相仍不知紀極民富者丁多率為官為僧以免課役而貧者丁多無所伏匿故上户優而下户勞吏因緣蠶食民旬輸月送不勝困弊率皆逃徙為浮户其土著百無四五至是炎建議作兩稅法先計州縣每歲所應費用及上供之數而賦於人量出以制入户無土客以見居為簿人無丁中以貧富為差為行商者在所州縣稅三十之一使與居者均無僥利居人之稅秋夏兩徵之其租庸調雜徭悉省皆總統於度支上用其言因赦令行之貞元三年時關東防秋兵大集國用不充李泌奏自變兩稅法以來藩鎮州縣多違法聚斂繼以朱泚之亂爭榷率徵罰以為軍資㸃募自防泚既平自懼違法匿不敢言請遣使以詔㫖赦其罪但令革正自非於法應留使留州之外悉輸京師其官典逋負可徴者徵之難徵者釋之以示寬大敢有隱沒者重設告賞之科而罪之上喜曰卿策甚長然立法太寬恐所得無幾對曰兹事臣固熟思之寬則獲多而速急則獲少而遲蓋以寬則人喜於免罪而樂輸急則競為蔽匿非推鞫不能得其實財不足濟今日之急而皆入於姦吏矣上曰善以度支員外郎元友直為河南江淮南句勘兩稅錢帛使四年春正月庚戌朔赦天下詔兩稅等第自今三年一定二月元友直運淮南錢帛二十萬至長安李泌悉輸之大盈庫然上猶數有宣索仍敇諸道勿令宰相知泌聞之惆悵而不敢言臣光曰王者以天下為家天下之財皆其有也阜天下之財以養天下之民已必豫焉或乃更為私藏此匹夫之鄙志也古人有言曰貧不學儉夫多財者奢欲之所自來也李泌欲弭德宗之欲而豐其私財財豐則欲滋矣財不稱欲能無求乎是猶啓其門而禁其出也雖德宗之多僻亦泌所以相之者非其道故也秋九月元友直句檢諸道稅外物悉輸户部遂為定制嵗於稅外輸百餘萬緡斛民不堪命諸道多自訴於上上意寤詔今年已入在官者輸京師未入者悉以與民明年以後悉免之於是東南之民復安其業九年春正月癸卯初稅茶凡州縣産茶及茶山外要路皆估其直什稅一從鹽鐵使張滂之請也滂奏去歲水災減稅用度不足請稅茶以足之自明年以往稅茶之錢令所在别貯俟有水旱以代民田稅自是歲收茶稅錢四十萬緡未嘗以救水旱也十年夏五月陸贄又奏請均節財賦凡六條其一論兩稅之弊其略曰舊制賦役之法曰租調庸丁男一人受田百畒歲輸粟二石謂之租每户各隨土宜出絹若綾若絁共二丈綿三兩不蠶之土輸布二丈五尺麻三斤謂之調每丁歲役則收其庸日準絹三尺謂之庸天下為家法制均一雖欲轉徙莫容其姦故人無搖心而事有定制乃羯胡亂華兆庶雲擾版圖墮於避地賦法壞於奉軍建中之初再造百度執事者知弊之宜革而所作兼失其原知簡之可從而所操不得其要凡欲拯其弊須窮致弊之由時弊則但理其時法弊則全革其法所為必當其悔乃亡兵興以來供億無度此乃時弊非法弊也而遽更租調庸法分遣使者搜擲郡邑校驗簿書每州取大曆中一年科率最多者以為兩稅定額夫財之所生必因人力故先王之制賦入必以丁夫為本不以務穡增其稅不以輟稼減其租則播種多不以殖産厚其征不以流寓免其調則地著固不以飭勵重其役不以窳怠蠲其庸則功力勤如是故人安其居盡其力矣兩稅之立惟以資産為宗不以丁身為本曾不寤資産之中有藏於襟懷囊篋物雖貴而人莫能窺其積於場圃囷倉直雖輕而衆以為富流通蕃息之貨數雖寡而計日收贏有廬舍器用之資價雖高而終歲無利如此之比其流實繁一槩計估算緍宜其失平長僞由是務輕資而樂轉徙者恆脫於徭稅敦本業而樹居産者每困於徵求此乃誘之為姦驅之避役力用不得不弛賦入不得不闕復以創制之首不務齊平供應有煩簡之殊牧守有能否之異所在徭賦輕重相懸所遣使臣意見各異計奏一定有加無除又大曆中供軍進奉之類既收入兩稅今於兩稅之外復又並存望稍行均減以救雕殘其二請兩稅以布帛為額不計錢數其略曰凡國之賦稅必量人之力任土之宜賦所入者唯布麻繒纊與百穀而已先王懼物之貴賤失平而人之交易難準又定泉布之法以節輕重之宜斂散弛張必由於是蓋御財之大柄為國之利權守之在官不以任下然則穀帛者人之所為也錢貨者官之所為也是以國朝著令租出穀庸出絹調出繒纊布曷常有禁人鑄錢而以錢為賦者也今之兩稅獨異舊章但估資産為差便以錢穀定稅臨時折徵雜物每嵗色目頗殊唯計求得之利宜靡論供辦之難易所徵非所業所業非所徵遂或增價以買其所無減價以賣其所有一增一減耗損已多望勘㑹諸州初納兩稅年絹布定估比類當今時價加賤減貴酌取其中總計合稅之錢折為布帛之數又曰夫地力之生物有大限取之有度用之有節則常足取之無度用之無節則常不足生物之豐敗由天用物之多少由人是以聖王立程量入為出雖遇災難下無困窮理化既衰則乃反是量出為入不恤所無桀用天下而不足湯用七十里而有餘是乃用之盈虛在節與不節耳其三論長吏以增户加稅闢田為課績其略曰長人者罕能推忠恕易地之情體至公徇國之意迭行小惠競誘姦氓以傾奪鄰境為智能以招萃逋逃為理化捨彼適此者既為新收而有復倏往忽來者又以復業而見優唯懷土安居首末不遷者則使之日重斂之日加是令地著之人恆代惰游賦役則何異驅之轉徙教之澆訛此由牧宰不克弘通各私所部之過也又曰立法齊人久無不弊理之者若不知維御損益之宜則巧僞萌生恆因沮勸而滋矣請申命有司詳定考績若當管之內人益阜殷所定稅額有餘任其據户口均減以減數多少為考課等差其當管稅物通比每户十分減三者為上課減二者次焉減一者又次焉如或人多流亡加稅見户比校殿罰法亦如之其四論稅限迫促其略曰建官立國所以養人也賦人取財所以資國也明君不厚其所資而害其所養故必先人事而借其暇力先家給而斂其餘財又曰蠶事方興己輸縑稅農功未艾遽斂穀租上司之繩責既嚴下吏之威暴愈促有者急賣而耗其半直無者求假而費其倍酬望更詳定徵稅期限其五請以稅茶錢置義倉以備水旱其略曰古稱九年六年之蓄者率土臣庶通為之計耳固非獨豐公庾不及編氓也近者有司奏請稅茶歲約得五十萬貫元敇令貯户部用救百姓凶饑今以蓄糧適副前㫖其六論兼并之家私斂重於公稅其略曰今京畿之內每田一畒官稅五升而私家收租殆有畒至一石者是二十倍於官稅也降及中等租猶半之夫土地王者之所有耕稼農夫之所為而兼并之徒居然受利又曰望凡所占田約為條限裁減租價務利貧人法貴必行慎在深刻裕其制以便俗嚴其令以懲違微損有餘稍優不足損不失富優可賑窮此乃古者安富恤窮之善經不可捨也裴延齡姦蠧唐德宗貞元八年秋七月甲寅朔户部尚書判度支班宏薨陸贄請以前湖南觀察使李巽權判度支上許之既而復欲用司農少卿裴延齡贄上言以為今之度支準平萬貨刻吝則生患寬假則容姦延齡誕妄小人用之交駭物聽尸祿之責固宜及於微臣知人之明亦恐傷於聖鑒上不從己未以延齡判度支事九年秋七月癸卯户部侍郎裴延齡奏自判度支以來檢責諸州缺負錢八百餘萬緍收諸州抽貫錢三百萬緍呈樣物三十餘萬緍請别置缺負耗賸季庫以掌之染練物别置月庫以掌之詔從之缺負皆貧人無可償徒存其數者抽貫錢給用旋盡呈樣染練皆左藏正物延齡徒置别庫虛張名數以惑上上信之以為能富國而寵之於實無所增也虛費吏人簿書而已京城西汚濕地生蘆葦數畒延齡奏稱長安咸陽有陂澤數百頃可牧廏馬上使有司閲視無之亦不罪也左補闕權德輿上奏以為延齡取常賦支用未盡者充羡餘以為己功縣官先所市物再給其直用充别貯邊軍自今春以來並不支糧陛下必以延齡孤貞獨立時人醜正流言何不遣信臣覆視究其本末明行賞罰今羣情衆口喧於朝市豈京城士庶皆為朋黨邪陛下亦宜稍回聖慮而察之上不從十年秋九月裴延齡奏稱官吏太多自今缺員請且勿補收其俸以實府庫上欲修神龍寺須五十尺松不可得延齡曰臣近見同州一谷木數千株皆可八十尺上曰開元天寶間求美材於近畿猶不可得今安得有之對曰天生珍材固待聖君乃出開元天寶何從得之延齡奏左藏庫司多有失落近因檢閲使置簿書乃於糞土之中得銀十三萬兩其匹段雜貨百萬有餘此皆已棄之物即是羡餘悉應移入雜庫以供别敇支用太府少卿韋少華不伏抗表稱此皆每月申奏見在之物請加推驗執政請令三司詳覆上不許亦不罪少華延齡每奏對恣為詭譎皆衆所不敢言亦未嘗聞者延齡處之不疑上亦頗知其誕妄但以其好詆毁人冀聞外事故親厚之羣臣畏延齡有寵莫敢言惟鹽鐵轉運使張滂京兆尹李充司農卿李銛以職事相關時證其妄而陸贄獨以身當之日陳其不可用冬十一月壬申贄上書極陳延齡姧詐數其罪惡其略曰延齡以聚斂為長策以詭妄為嘉謀以掊克斂怨為匪躬以靖譖服讒為盡節總典籍之所惡以為智術冒聖哲之所戒以為行能可謂堯代之共工魯邦之少卯也跡其姦蠧日長月滋陰祕者固未盡彰敗露者猶難悉數又曰陛下若意其負謗則誠宜亟為辨明陛下若知其無良又安可曲加容掩又曰陛下姑欲保持曾無詰問延齡謂能蔽惑不復懼思移東就西便為課績取此適彼遂號羡餘愚弄朝廷有同兒戲又曰矯詭之態誣罔之辭遇事輒行應口便發靡日不有靡時不為又難以備陳也又曰昔趙高指鹿為馬臣謂鹿之與馬物類猶同豈若延齡掩有為無指無為有又曰延齡凶妄流布寰區上自公卿近臣下逮輿臺賤品喧喧談議億萬為徒能以上言其人有幾臣以卑鄙任當台衡情激于衷雖欲罷而不能默也書奏上不悅待延齡益厚十二月中書侍郎同平章事陸贄以上知待之厚事有不可常力爭之所親或規其太鋭贄曰吾上不負天子下不負所學它無所恤裴延齡日短贄於上趙憬之入相也贄實引之既而有憾於贄密以贄所譏彈延齡事告延齡故延齡益得以為計上由是信延齡而不直贄贄與憬約至上前極論延齡姦邪上怒形於色憬默而無言壬戌贄罷為太子賓客十一年春二月陸贄既罷相裴延齡因譖京兆尹李充衛尉卿張滂前司農卿李銛黨於贄㑹旱延齡奏言贄等失勢怨望言於衆曰天下旱百姓且流亡度支多缺諸軍芻糧軍中人馬無所食其事奈何以動搖衆心其意非止欲中傷臣而已後數日上獵苑中適有神策軍士訴云度支不給馬芻上意延齡言為信遽還宫夏四月壬戌貶贄為忠州别駕充為涪州長史滂為汀州長史銛為邵州長史初陽城自處士徵為諫議大夫拜官不辭未至京師人皆想望風采曰城必諫諍死職下及至諸諫官紛紛言事細碎天子益厭苦之而城方與二弟及客日夜痛飲人莫能窺其際皆以為虛得名耳前進士河南韓愈作爭臣論以譏之城亦不以屑意有欲造城而問者城揣知其意輒彊與酒客或時先醉仆席上城或時先醉臥客懷中不能聽客語及陸贄等坐貶上怒未解中外惴恐以為罪且不測無敢救者城聞而起曰不可令天子信用姦臣殺無罪人即帥拾遺王仲舒歸登右補闕熊執易崔邠等守延英門上疏論延齡姦佞贄等無罪上大怒欲加城等罪太子為之營救上意乃解令宰相諭遣之於是金吾將軍張萬福聞諫官伏閣諫趨往至延英門大言賀曰朝廷有直臣天下必太平矣遂遍拜城與仲舒等已而連呼太平萬歲太平萬歲萬福武人年八十餘自此名重天下登崇敬之子也時朝夕相延齡陽城曰脫以延齡為相城當取白麻壞之慟哭於廷有李繁者泌之子也城盡疏延齡過惡欲密論之以繁故人子使之繕寫繁徑以告延齡延齡先詣上一一自解疏入上以為妄不之省十二年春三月以户部侍郎裴延齡為户部尚書使職如故秋九月丙午户部尚書判度支裴延齡卒中外相賀上獨悼惜之吐蕃叛盟唐代宗大曆十四年秋八月代宗之世吐蕃數遣使求和而寇盜不息代宗悉留其使者前後八輩有至老死不得歸者俘獲其人皆配江嶺上欲以德懷之乙巳以隨州司馬韋倫為太常少卿使于吐蕃悉集其俘五百人各賜襲衣而遣之德宗建中元年吐蕃始聞韋倫歸其俘不之信及俘入境各還部落稱新天子出宫人放禽獸英威聖德洽於中國吐蕃大悅除道迎倫贊普即發使隨倫入貢且致賻贈癸卯至京師上禮接之既而蜀將上言吐蕃豺狼所獲俘不可歸上曰戎狄犯塞則擊之服則歸之擊以示威歸以示信威信不立何以懷逺悉命歸之五月戊辰以韋倫為太常卿乙酉復遣倫使吐蕃倫請上自為載書與吐蕃盟楊炎以為非敵請與郭子儀輩為載書以聞令上畫可而已從之吐蕃見韋倫再至益喜十二月辛卯朔倫還吐蕃遣其相論欽明思等入貢二年春三月遣殿中少監崔漢衡使于吐蕃崔漢衡至吐蕃贊普以敇書稱貢獻及賜全以臣禮見處又雲州之西當以賀蘭山為境邀漢衡更請之丁未漢衡遣判官與吐蕃使者入奏上為之改敇書境土皆如其請三年夏四月庚申吐蕃歸嚮所俘掠兵民八百人秋九月癸卯殿中少監崔漢衡自吐蕃歸贊普遣其臣區頰贊隨漢衡入見冬十月遣都官員外郎樊澤使于吐蕃告以結盟之期四年春正月丁亥隴右節度使張鎰與吐蕃尚結贊盟于清水二月戊申朔命鴻臚卿崔漢衡送區頰贊還吐蕃夏四月上命宰相尚書與吐蕃區頰贊盟於豐邑里區頰贊以清水之盟疆場未定不果盟己未命崔漢衡入吐蕃決於贊普六月庚午答蕃判官監察御史于頔與吐蕃使者論刺沒藏至自青海言疆場已定請遣區頰贊歸國秋七月甲申以禮部尚書李揆為入蕃㑹盟使壬辰詔諸將相與區頰贊盟於城西李揆有才望盧𣏌惡之故使之入吐蕃揆言於上曰臣不憚逺行恐死於道路不能達詔命上為之惻然謂𣏌曰揆無乃太老對曰使逺夷非諳練朝廷故事者不可且揆行則自今年少於揆者不敢辭逺使矣興元元年春正月吐蕃尚結贊請出兵助唐收京城庚子遣祕書監崔漢衡使吐蕃發其兵夏四月吐蕃遣其將論莽羅依將兵二萬從曹子達擊破韓旻於武川亭五月吐蕃既破韓旻大掠而去上甚憂之以問陸贄贄具言吐蕃形勢事並見兩事連兵藩鎮初上發吐蕃以討朱泚許成功以伊西北庭之地與之及泚誅吐蕃來求地上欲召兩鎮節度使郭昕李元忠還朝以其地與之李泌曰安西北庭人性驍悍控制西域五十七國及十姓突厥又分吐蕃之勢使不得併兵東侵奈何拱手與之且兩鎮之人勢孤地逺盡忠竭力為國家固守近二十年誠可哀憐一且棄之以與戎狄彼其心必深怨中國它日從吐蕃入寇如報私讎矣況日者吐蕃觀望不進隂持兩端大掠武功受賂而去何功之有衆議亦以為然上遂不與貞元二年秋八月丙戌吐蕃尚結贊大舉寇涇隴邠寧掠人畜芟禾稼西鄙騷然州縣各城守詔渾瑊將萬人駱元光將八千人屯咸陽以備之吐蕃遊騎及好畤乙巳京城戒嚴復遣左金吾將軍張獻甫屯咸陽民間傳言上復欲出幸以避吐蕃齊映見上言曰外間皆言陛下已理裝具糗糧人情恟懼夫大福不再陛下奈何不與臣等熟計之因伏地流涕上亦為之動容李晟遣其將王佖將驍勇三千伏於汧城戒之曰虜過城下勿擊其首首雖敗彼全軍而至汝弗能當也不若俟前軍已過見五方旗虎豹衣乃其中軍也出其不意擊之必大捷佖用其言尚結贊敗走軍士不識尚結贊僅而獲免尚結贊謂其徒曰唐之良將李晟馬燧渾瑊而已以計去之入鳯翔境內無所俘掠以兵二萬直抵城下曰李令公召我來何不出犒我經宿乃引退冬十月癸亥李晟遣蕃落使野詩良輔與王佖將步騎五千襲吐蕃摧沙堡壬申遇吐蕃衆二萬與戰破之乘勝逐北至堡下攻拔之斬其將扈屈律悉䝉焚其蓄積而還尚結贊引兵自寧慶北去癸酉軍于合水之北邠寧節度使韓遊瓌遣其將史履程夜襲其營殺數百人吐蕃追之遊瓌陳于平川潛使人鼓於西山虜驚棄所掠而去十一月辛丑吐蕃寇鹽州謂刺史杜彥光曰我欲得城聽爾率人去彥光悉衆奔鄜州吐蕃入據之十二月吐蕃又寇夏州亦令刺史托跋乾暉帥衆去遂據其城又寇銀州州素無城吏民皆潰吐蕃亦棄之又陷麟州韓逰瓌奏請發兵攻鹽州吐蕃救之則使河東襲其背丙寅詔駱元光及陳許兵馬使韓全義將步騎萬二千人㑹邠寧軍趣鹽州又命馬燧以河東軍擊吐蕃燧至石州河曲六胡州皆降遷於雲朔之間工部侍郎張彧李晟之壻也晟在鳯翔以女嫁幕客崔樞禮重樞過於彧彧怒遂附於張延賞給事中鄭雲逵嘗為晟行軍司馬失晟意亦附延賞上亦忌晟功名㑹吐蕃有離間之言延賞等騰謗於朝無所不至晟聞之晝夜泣目為之腫悉遣子弟詣長安表請削髮為僧上慰諭不許辛未入朝見上自陳足疾懇辭才鎮上不許韓滉素與晟善上命滉與劉玄佐諭㫖於晟使與延賞釋怨晟奉詔滉等引延賞詣晟第謝結為兄弟因宴飲盡歡又宴於滉玄佐之第亦如之滉因使晟表薦延賞為相三年春正月壬寅以左僕射張延賞同平章事李晟為其子請昏於延賞延賞不許晟謂人曰武夫性快釋怨於杯酒間則不復貯胸中矣非如文士難犯外雖和解內蓄憾如故吾得無懼哉二月壬戌以檢校左庶子崔瀚充入吐蕃使三月丁酉以左庶子李銛充入吐蕃使初吐蕃尚結贊得鹽夏州各留兵千餘人戍之退屯鳴沙自冬入春羊馬多死糧運不繼又聞李晟克摧沙馬燧渾瑊等各舉兵臨之大懼屢遣使求和上未之許乃遣使卑辭厚禮求和於馬燧且請修清水之盟而歸侵地使者相繼於路燧信其言留屯石州不復濟河為之請於朝李晟曰戎狄無信不如擊之韓遊瓌曰吐蕃弱則求盟彊則入寇今深入塞內而求盟此必詐也韓滉曰今兩河無虞若城原鄯洮渭四州使李晟劉玄佐之徒將十萬衆戍之河湟二十餘州可復也其資糧之費臣請主辦上由是不聽燧計趣使進兵燧請與吐蕃使論頰熱俱入朝論之㑹滉薨燧延賞皆與晟有隙欲反其謀爭言和親便上亦恨回紇欲與吐蕃和共擊之得二人言正㑹已意計遂定延賞數言晟不宜久典兵請以鄭雲逵代之上曰當令自擇代者乃謂晟曰朕以百姓之故與吐蕃和親決矣大臣既與吐蕃有怨不可復之鳯翔宜留朝廷朝夕輔朕自擇一人以代鳯翔者晟薦都虞候邢君牙君牙樂壽人也丙午以君牙為鳯翔尹兼團練使丁未加晟太尉中書令勳封如故餘悉罷之晟在鳯翔嘗謂僚佐曰魏徵好直諫余竊慕之行軍司馬李叔度曰此乃儒者所為非勳德所宜晟斂容曰司馬失言晟任兼將相知朝廷得失不言何以為臣叔度慙而退及在朝廷上有所顧問極言無隱性沈密未嘗泄於人辛亥馬燧入朝燧既來諸軍皆閉壁不戰尚結贊遽自鳴沙引歸其衆乏馬多徒行者崔浣見尚結贊責以負約尚結贊曰吐蕃破朱泚未獲賞是以來而諸州各城守無由自達鹽夏守者以城授我而遁非我取之也今明公來欲踐修舊好固吐蕃之願也今吐蕃將相以下來者二十一人渾侍中嘗與之共事知其忠信靈州節度使杜希全涇原節度使李觀皆信厚聞於異域請使之主盟夏四月丙寅浣至長安辛未以浣為鴻臚卿復使入吐蕃語尚結贊曰希全守靈不可出境李觀已改官今遣渾瑊盟於清水且令先歸鹽夏二州五月甲申渾瑊自咸陽入朝以為清水㑹盟使戊子以兵部尚書崔漢衡為副使司封員外郎鄭叔矩為判官特進宋奉朝為都監己丑瑊將二萬餘人赴盟所乙巳尚結贊遣其屬論泣贊來言清水非吉地請盟於原州之土梨樹既盟而歸鹽夏二州上皆許之神策將馬有麟奏土梨樹多阻險恐吐蕃設伏兵不如平涼川坦夷時論泣贊已還丁未遣使追告之初韓滉薦劉玄佐可使將兵復河湟上以問玄佐玄佐亦贊成之滉薨玄佐奏言吐蕃方彊未可與爭上遣中使勞問玄佐玄佐臥而受命張延賞知玄佐不可用奏以河湟事委李抱真抱真亦固辭皆由延賞罷李晟兵柄故武臣皆憤怒解體不肯為用故也渾瑊之發長安也李晟深戒之以盟所為備不可不嚴張延賞言於上曰晟不欲盟好之成故戒瑊以嚴備我有疑彼之形則彼亦疑我矣盟何由成上乃召瑊切戒以推誠待虜勿自為猜二以阻虜情瑊奏吐蕃決以辛未盟延賞集百官以瑊表稱詔示之曰李太尉謂吐蕃和好必不成此渾侍中表也盟日定矣晟聞之泣謂所親曰吾生長西陲備諳虜情所以論奏但耻朝廷為犬戎所侮耳上始命駱元光屯潘原韓遊瓌屯洛口以為瑊援元光謂瑊曰潘原距盟所且七十里公有急元光何從知之請與公俱瑊以詔指固止之元光不從與瑊連營相次距盟所三十餘里元光壕柵深固瑊壕柵皆可踰也元光伏兵於營西韓遊瓌亦遣五百騎伏於其側曰若有變則汝曹先趣柏泉以分其勢尚結贊與瑊約各以甲士三千人列於壇之東西常服者四百人從至壇下辛未將盟尚結贊又請各遣遊騎數十更相覘索瑊皆許之吐蕃伏精騎數萬於壇西遊騎貫穿唐軍出入無禁唐騎入虜軍悉為所擒瑊等皆不知入幕易禮服虜伐鼓三聲大譟而至殺宋奉朝等於幕中瑊自幕後出偶得它馬乘之伏鬛入其銜馳十餘里銜方及馬口故矢過其背而不傷唐將卒皆東走虜縱兵追擊或殺或擒之死者數百人擒者千餘人崔漢衡為虜騎所擒渾瑊至其營則將卒皆遁去營空矣駱元光發伏兵成陳以待之虜追騎愕眙瑊入元光營追騎顧見邠寧軍西馳乃還元光以輜重資瑊與瑊收散卒勒兵整陳而還是日上視朝謂諸相曰今日和戎息兵社稷之福馬燧曰然栁渾曰戎狄豺狼也非盟誓可結今日之事臣竊憂之李晟曰誠如渾言上變色曰柳渾書生不知邊計大臣亦為此言邪皆伏地頓首謝因罷朝是夕韓遊瓌表言虜劫盟者兵臨近鎮上大驚銜遞其表以示渾明旦謂渾曰卿書生乃能料敵如此其審邪上欲出幸以避吐蕃大臣諫而止李晟大安園多竹復有為飛語者云晟伏兵大安亭謀因倉猝為變晟遂伐其竹癸酉上遣中使王子恆齎詔遺尚結贊至吐蕃境不納而還渾瑊留屯奉天甲戌尚結贊至故原州引見崔漢衡等曰吾飾金械欲械瑊以獻贊普今失瑊虛致公輩又謂馬燧之姪弇曰胡以馬為命吾在河曲春草未生馬不能舉足當是時侍中度河掩之吾全軍覆沒矣所以求和䝉侍中力今全軍得歸奈何拘其子孫命弇與宦官俱文珍渾瑊將馬寧俱歸分囚崔漢衡等於河廓鄯州上聞尚結贊之言由是惡馬燧六月丙戌以馬燧為司徒兼侍中罷其副元帥節度使初吐蕃尚結贊惡李晟馬燧渾瑊曰去三人則唐可圖也於是離間李晟因馬燧以求和欲執渾瑊以賣燧使并獲罪因縱兵直犯長安㑹失渾瑊而止張延賞慙懼謝病不視事吐蕃之戍鹽夏者饋運不繼人多病疫思歸尚結贊遣三千騎逆之悉焚其廬舍毁其城驅其民而去靈鹽節度使杜希全遣兵分守之壬寅李泌與李晟馬燧柳渾俱入見泌謂上曰李晟馬燧有大功於國聞有讒之者雖陛下必不聽然臣今日對二人言之欲其不自疑耳陛下萬一害之則宿衛之士方鎮之臣無不憤惋而反仄恐中外之變不日復生也今晟燧富貴已足茍陛下坦然待之使其自保無虞國家有事則出從征伐無事則入奉朝請何樂如之故臣願陛下勿以二臣功大而忌之二臣勿以位高而自疑則天下永無事矣上曰朕始聞卿言聳然不知所謂及聽卿剖析乃知社稷之至計也朕謹當書紳二大臣亦當共保之晟燧皆起泣謝時關東防秋兵大集國用不充上問李泌以復府兵之策對曰今歲徵關東卒戍京西者十七萬人計歲食粟二百四萬斛今粟斗直錢百五十為錢三百六萬緍國家比遭饑亂經費不充就使有錢亦無粟可糴未暇議復府兵也上曰然將奈何亟減戍卒歸之何如對曰陛下誠能用臣之言可以不減戍卒不擾百姓糧食皆足粟麥日賤府兵亦成上曰果能如是何為不用對曰此須急為之過旬日則不及矣今吐蕃久居原蘭之間以牛運糧糧盡牛無所用請發左藏惡繒染為綵纈因党項以市之每頭不過二三匹計十八萬匹可致六萬餘頭又命諸冶鑄農器糴麥種分賜緣邊軍鎮募戍卒耕荒田而種之約明年麥熟倍償其種其餘據時價五分增一官為糴之來春種禾亦如之關中土沃而久荒所收必厚戍卒獲利耕者浸多邊地居人至少軍七月食官糧粟麥無所售其價必賤名為增價實比今歲所減多矣上曰善即命行之泌又言邊地官多闕請募人入粟以補之可足今嵗之糧上亦從之因問曰卿言府兵亦集如何對曰戍卒因屯田致富則安於其土不復思歸舊制戍卒三年而代及其將滿下令有願留者即以所開田為永業家人願來者本貫給長牒續食而遣之據應募之數移報本道雖河朔諸帥得免更代之煩亦喜聞矣不過數番則戍卒皆土著乃悉以府兵之法理之是變關中之疲弊為富彊也上喜曰如此天下無復事矣泌曰未也臣能不用中國之兵使吐蕃自困上曰計將安出對曰臣未敢言之俟麥禾有效然後可議也上固問不對泌意欲結回紇大食雲南與共圖吐蕃令吐蕃所備多知上素恨回紇恐聞之不悅並屯田之議不行故不肯言既而戍卒應募願耕屯田者什五六左僕射同平章事張延賞薨秋八月吐蕃尚結贊遣五騎送崔漢衡歸且上表求和至潘原李觀語之以有詔不納吐蕃使者受其表而却其人戊申吐蕃帥羌渾之衆寇隴州連營數十里京城震恐九月丁卯遣神策將石季章戍武功決勝軍使唐良臣戍百里城丁巳吐蕃大掠汧陽吳山華亭老弱者殺之或斷手鑿目棄之而去驅丁壯萬餘口悉送安化峽西將分隸羌渾乃告之曰聽爾東向哭辭鄉國衆大哭赴崖谷死傷者千餘人未幾吐蕃之衆復至圍隴州刺史韓清沔與神策副將蘇太平夜出兵擊却之吐蕃寇華亭及連雲堡皆陷之甲戌吐蕃驅二城之民數千人及邠涇人畜萬計而去置之彈箏峽西涇州恃連雲為斥候連雲既陷西門不開門外皆為虜境樵采路絶每收穫必陳兵以扞之多失時得空穗而已由是涇州常苦乏食冬十月甲申吐蕃寇豐義城前鋒至大回原邠寧節度使韓遊瓌擊却之乙酉復寇長武城又城故原州而屯之吐蕃以苦寒不入寇而糧運不繼十一月詔渾瑊歸河中李元諒歸華州劉昌分其衆五千歸汴州自餘防秋兵退屯鳯翔京兆諸縣以就食四年春二月劉昌復築連雲堡夏五月吐蕃三萬餘騎寇涇邠寧慶鄜等州先是吐蕃常以秋冬入寇及春多病疫而退至是得唐人質其妻子遣其將將之盛夏入寇諸州皆城守無敢與戰者吐蕃俘掠人畜萬計而去秋九月庚申吐蕃尚志董星寇寧州張獻甫擊却之吐蕃轉掠鄜坊而去冬十月吐蕃發兵十萬寇西川分兵四萬攻兩林驃旁三萬攻東蠻七千寇清溪關五千寇銅山韋臯遣黎州刺史韋晉等與東蠻連兵禦之破吐蕃於清溪關外十一月吐蕃恥前日之敗復以衆二萬寇清溪關一萬攻東蠻韋臯命韋晉鎮要衝城督諸軍以禦之嶲州經略使劉朝彩等出關連戰自乙卯至癸亥大破之五年冬十月韋臯遣其將王有道將兵與東蠻兩林蠻及吐蕃青海臘城二節度于雋州臺登谷大破之斬首二千級投崖及溺死者不可勝數殺其大兵馬使乞藏遮遮乞藏遮遮虜之驍將也既死臯所攻城柵無不下數年盡復嶲州之境七年秋八月吐蕃攻靈州為回鶻所敗夜遁九月回鶻遣使來獻俘冬十二月甲午又遣使獻所獲吐蕃酋長尚結心八年夏四月壬子吐蕃寇靈州陷水口支渠敗營田詔河東振武救之遣神策六軍二千戍定逺懷逺城吐蕃乃退六月吐蕃千餘騎寇涇州掠田軍千餘人而去秋八月韋臯攻吐蕃維州獲其大將論贊熱九年初鹽州既陷塞外無復保鄣吐蕃常阻絶靈武侵擾鄜坊辛酉詔發兵三萬五千人城鹽州又詔涇原山南劒南各發兵深入吐蕃以分其勢城之二旬而畢命鹽州節度使杜彥光戍之朔方都虞候楊朝晟戍木波堡由是靈武銀夏河西獲安夏五月陸贄上奏論備邊六失以為措置乖方課責虧度財匱於兵衆力分於將多怨生於不均機失於遙制關東戍卒不習土風身苦邊荒心畏戎虜國家資奉若驕子姑息如倩人屈指計歸張頥待哺或利王師之敗乘擾攘而東潰或拔棄城鎮搖逺近之心豈惟無益實亦有損復有犯刑謫徙者既是無良之類且加懷土之情思亂幸災又甚戍卒可謂措置乖方矣自頃權移於下柄失於朝將之號令既鮮克行之於軍國之典常又不能施之於將務相遵養茍度歲時欲賞一有功翻慮無功者反仄欲罰一有罪復慮同惡者憂虞罪以隱忍而不彰功以嫌疑而不賞姑息之道乃至於斯故使忘身效節者獲誚於等夷率衆先登者取怨於士卒僨軍蹙國者不懷於愧畏緩救失期者自以為智能此義士所以痛心勇夫所以解體可謂課責虧度矣虜每入寇將帥遞相推倚無敢誰何虛張賊勢上聞則曰兵少不敵朝廷莫之省察唯務徵發益師無禆備禦之功重增供億之弊閭井日耗徵求日繁以編户傾家破産之資兼有司榷鹽稅酒之利總其所入半以事邊可謂財匱於兵衆矣吐蕃舉國勝兵之徒才當中國十數大郡而已動則中國懼其衆而不敢抗靜則中國憚其彊而不敢侵厥理何哉良以中國之節制多門蕃醜之統帥專一故也夫統帥專一則人心不分號令不二進退可齊疾徐如意機㑹靡愆氣勢自壯斯乃以少為衆以弱為彊者也開元天寶之間控禦西北兩蕃唯朔方河西隴右三節度中興以來未遑外討抗兩蕃者亦朔方涇原隴右河東四節度而已自頃分朔方之地建牙擁節者凡三使焉其餘鎮軍數且四十皆承特詔委寄各降中貴監臨人得抗衡莫相稟屬每俟邊書告急方令計㑹用兵既無軍法下臨唯以客禮相待夫兵以氣勢為用者也氣聚則盛散則消勢合則威析則弱今之邊備勢弱氣消可謂力分於將多矣理戎之要在於練核優劣之科以為衣食等級之制使能者企及否者息心雖有薄厚之殊而無觖望之釁今窮邊之地長鎮之兵皆百戰傷夷之餘終年勤苦之劇然衣糧所給唯止當身例為妻子所分常有凍餒之色而關東戍卒怯於應敵懈於服勞衣糧所頒厚踰數等又有素非禁旅本是邊軍將校詭為媚詞因請遙隸神策不離舊所唯改虛名其於廩賜之饒遂有三倍之益夫事業未異而給養有殊茍未忘懷孰能無慍可謂怨生於不均矣凡欲選任將帥必先考察行能可者遣之不可者退之疑者不使使者不疑故將在軍君命有所不受自頃邊軍去就裁斷多出宸衷選置戎臣先求易制多其部以分其力輕其任以弱其心遂令爽於軍情亦聽命乖於事宜亦聽命戎虜馳突迅如風颷馹書上聞旬日方報守土者以兵寡不敢抗敵分鎮者以無詔不肯出師賊既縱掠退歸此乃陳功告捷其敗喪則減百而為一其捃獲則張百而成千將帥既幸於總制在朝不憂罪纍陛下又以為大權由己不究事情可謂機失於遙制矣臣愚請宜罷諸道將士防秋之制令本道但供衣糧募戍卒願留及蕃漢子弟以給之又多開屯田官為收糴寇至則人自為戰時至則家自力農與夫倏來忽往者豈可同等而論哉又宜擇文武能臣為隴右朔方河東三元帥分統緣邊諸節度使有非要者隨所便近而併之然後減姦濫虛浮之費以豐財定衣糧等級之制以和衆弘委任之道以宣其用懸賞罰之典以考其成如是則戎狄威懷疆場寧謐矣上雖不能盡從心甚重之韋臯遣大將董勔等將兵出西山破吐蕃之衆拔堡栅五十餘十年韋臯奏破吐蕃於峨和城十一年冬十月南詔攻吐蕃昆明城取之又虜施順二蠻王十三年春正月壬寅吐蕃遣使請和親上以吐蕃數負約不許上以方渠合道木波皆吐蕃要路欲城之使問邠寧節度使楊朝晟須幾何兵對曰邠寧兵足以城之不煩它道上復使問之曰嚮城鹽州用兵七萬僅能集事今三城尤逼虜境兵當倍之事更相反何也對曰城鹽州之衆虜皆知之今發本鎮兵不旬日至塞下出其不意而城之虜謂吾衆亦不減七萬其衆未集不敢輕來犯我不過三旬吾城已畢留兵戍之虜雖至無能為也城旁草盡不能久留虜退則運芻糧以實之此萬全之策也若大集諸道兵踰月始至虜亦集衆而來與我爭戰勝負未可知何暇築城哉上從之二月朝晟分軍為三各築一城軍吏曰方渠無井不可屯軍判官孟子周曰方渠承平之時居人成市無井何以聚人乎命浚眢井果得甘泉三月三城成夏四月庚申楊朝晟軍還至馬嶺吐蕃始出兵追之相拒數日而去朝晟遂城馬嶺而還開地三百里皆如其素吐蕃贊普乞立贊卒子足之煎立六月韋臯奏嶲州刺史曹高仕破吐蕃於臺登城下十四年冬十月夏州節度使韓全義奏破吐蕃於鹽州西北十五年夏四月南詔異牟尋遣使與韋臯約共擊吐蕃臯以兵糧未集請俟它年冬十二月吐蕃衆五萬分擊南詔及嶲州異牟尋與韋臯各發兵禦之吐蕃無功而還十六年夏五月靈州破吐蕃於烏蘭橋吐蕃數為韋臯所敗是嵗其曩貢臘城等九節度嬰籠官馬定德帥其部落來降定德有智略吐蕃諸將行兵皆禀其謀策常乘驛計事至是以兵數不利恐獲罪遂來奔十七年秋七月戊寅吐蕃寇鹽州己丑吐蕃陷麟州殺刺史郭鋒夷其城郭掠居人及党項部落而去鋒曜之子也僧延素為虜所得虜將有徐舍人者謂延素曰我英公之五代孫也武后時吾高祖建義不成子孫流播異域雖代居祿位典兵然思本之心不忘顧宗族大無由自拔耳今聽汝歸遂縱之上遣使敇韋臯出兵深入吐蕃以分其勢紓北邊患臯遣將將兵二萬分出九道攻吐蕃維保松州及棲雞老翁城九月韋臯奏大破吐蕃於雅州韋臯屢破吐蕃轉戰千里凡拔城七軍鎮五焚堡百五十斬首萬餘級捕虜六千降户三千遂圍維州及昆明城冬十月庚子加臯檢校司徒兼中書令賜爵南康王南詔王異牟尋虜獲尤多上遣中使慰撫之十八年春正月吐蕃遣其大相兼東鄙五道節度使論莽熱將兵十萬解維州之圍西川兵據險設伏以待之吐蕃至出千人挑戰虜悉衆追之伏發虜衆大敗擒論莽熱士卒死者太半維州昆明竟不下引兵還乙亥臯遣使獻論莽熱上從之十九年夏四月涇原節度使劉昌奏請徙原州治平涼從之乙亥吐蕃遣其臣論頰熱入貢六月壬辰遣右龍武大將軍薛伾使于吐蕃二十年吐蕃贊普死其弟嗣立憲宗元和三年春正月臨涇鎮將郝玭以臨涇地險要水草美吐蕃將入寇必屯其地言於涇原節度使段祐奏而城之自是涇原獲安冬十二月庚戌置行原州於臨涇以鎮將郝玭為刺史四年初平涼之盟副元帥判官路泌㑹盟判官鄭叔矩皆沒於吐蕃其後吐蕃請和泌子隨之詣闕號泣上表乞從其請德宗以吐蕃多詐不許至是吐蕃復請和隨又五上表詣執政泣請裴垍李藩亦言於上請許其和上從之五月命祠部郎中徐復使吐蕃秋九月丙辰振武奏吐蕃五萬餘騎至拂梯泉辛未豐州奏吐蕃萬騎至大石谷掠回鶻入貢還國者五年夏五月庚申吐蕃遣其臣論思邪熱入見且歸路泌鄭叔矩之柩七年吐蕃寇涇州及西門之外驅掠人畜而去上患之李綘上言京西京北皆有神策鎮兵始置之欲以備禦吐蕃使與節度使掎角相應也今則鮮衣美食坐耗縣官每有寇至節度使邀與俱進則云申取中尉處分比其得報虜去逺矣縱有果鋭之將聞命奔赴節度使無刑戮以相制之相視如平交左右前却莫肯用命何所益乎請據所在之地士馬及衣糧器械皆割隸當道節度使使號令齊一如臂之使指則軍威大振虜不敢入寇矣上曰朕不知舊事如此當亟行之既而神策軍驕恣日久不樂隸節度使竟為宦者所沮而止八年初吐蕃欲作烏蘭橋先貯材於河側朔方常潛遣人投之於河終不能成虜知朔方靈鹽節度使王佖貪先厚賂之然後併力成橋仍築月城守之自是朔方禦寇不暇十年冬十一月己丑吐蕃款隴州塞請互市許之十一年春二月西川奏吐蕃贊普卒新贊普可黎可足立十三年冬十一月辛巳朔鹽州奏吐蕃寇河曲夏州靈武奏破吐蕃長樂州克其外城甲午鹽州奏吐蕃引去十四年春正月吐蕃遣使者論短立藏等來修好未返入寇河曲上曰其國失信其使何罪庚寅遣歸國秋八月癸酉吐蕃寇慶州營於方渠冬十月吐蕃節度論三摩等將十五萬衆圍鹽州党項亦發兵助之刺史李文悅竭力拒守凡二十七日吐蕃不能克靈武牙將史奉敬言於朔方節度使杜叔良請兵三千齎三十日糧深入吐蕃以解鹽州之圍叔良以二千五百人與之奉敬行旬餘無聲問朔方人以為俱沒矣無何奉敬自它道出吐蕃背吐蕃大驚潰去奉敬奮擊大破不可勝計奉敬與鳯翔將野詩良輔涇原將郝玭皆以勇著名於邊吐蕃憚之十五年春二月吐蕃寇靈武三月吐蕃寇鹽州冬十月党項引吐蕃寇涇州連營五十里癸未涇州奏吐蕃進營距州三十里告急求救以右軍中尉梁守謙為左右神策京西北行營都監將兵四千人并發八鎮全軍救之賜將士裝錢二萬緍以郯王府長史邵同為太府少卿兼御史中丞充答吐蕃請和好使初祕書少監田洎入吐蕃為弔祭使吐蕃請與唐盟於長武城下洎恐吐蕃留之不得還唯阿而已既而吐蕃為党項所引入寇因以為辭曰田洎許我將兵赴盟於是貶洎彬州司户渭州刺史郝玭數出兵襲吐蕃營所殺甚衆李光顏發邠寧兵救涇州邠寧兵以神策受賞厚皆慍曰人給五十緍而不識戰鬭者彼何人邪常額衣資不得而前冒白刃者此何人邪洶洶不可止光顏親為開陳大義以諭之言與涕俱然後軍士感悅而行將至涇州吐蕃懼而退丙戌罷神策行營西川奏吐蕃寇雅州辛卯鹽州奏吐蕃營於烏白池尋亦皆退十二月己巳朔鹽州奏吐蕃千餘人圍烏白池庚辰西川奏南詔二萬人入界請討吐蕃穆宗長慶元年夏六月辛未吐蕃寇青塞堡鹽州刺史李文悅擊却之秋九月吐蕃遣其禮部尚書論訥羅來求盟庚戌以大理卿劉元鼎為吐蕃㑹盟使冬十月癸酉命宰相及大臣凡十七人與吐蕃論訥羅盟于城西遣劉元鼎與訥羅入吐蕃亦與其宰相以下盟靈武節度使李進誠奏敗吐蕃三千騎於大石山下二年夏六月吐蕃寇靈武壬子吐蕃寇鹽州八月劉元鼎還文宗太和五年秋九月吐蕃維州副使悉怛謀請降盡帥其衆奔成都李德裕遣行維州刺史虞藏儉將兵入據其城庚申具奏其狀且言欲遣生羌三千燒十三橋搗西戎腹心可洗久恥是韋臯沒身恨不能致者也事下尚書省集百官議皆請如德裕䇿牛僧孺曰吐蕃之境四面各萬里失一維州未能損其勢比來修好約罷戍兵中國禦戎守信為上彼若來責曰何事失信養馬蔚茹川上平涼阪萬騎綴回中怒氣直辭不三日至咸陽橋此時西南數千里外得百維州何所用之徒棄誠信有害無利此匹夫所不為況天子乎上以為然詔德裕以其城歸吐蕃執悉怛謀及所與偕來者悉歸之吐蕃盡誅之於境上極其慘酷德裕由是怨僧孺益深武宗㑹昌三年李德裕追論維州悉怛謀事云維州據高山絶頂三面臨江在戎虜平川之衝是漢地入兵之路初河隴盡沒唯此獨存吐蕃潛以婦人嫁此州門者二十年後兩男長成竊開壘門引兵夜入遂為所陷號曰無憂城從此得併力於西邊更無虞於南路憑陵近甸旰食纍朝貞元中韋臯欲經略河湟須此城為始萬旅盡鋭急攻數年雖擒論莽熱而還城堅卒不可克臣初到西蜀外揚國威中緝邊備其維州熟臣信令空壁來歸臣始受其降南蠻震懾山西八國皆願內屬其吐蕃合水棲雞等城既失險厄自須抽歸可減八處鎮兵坐收千餘里舊地且維州未降前一年吐蕃猶圍魯州豈顧盟約臣受降之初指天為誓面許奏聞各加酬賞當時不與臣者望風疾臣詔臣執送悉怛謀等令彼自戮臣寧忍以三百餘人命棄信偷安纍表陳論乞垂矜捨答詔嚴切竟令執還體備三木輿於竹畚及將就路寃叫嗚嗚將吏對臣無不隕涕其部送者更為蕃帥譏誚云既已降彼何須送來復以此降人戮於漢境之上恣行殘忍用固攜離至乃擲其嬰孩承以槍槊絶忠款之路快凶虐之情從古已來未有此事雖時更一紀而運屬千年乞追奬忠魂各加褒贈詔贈悉怛謀右衛將軍臣光曰論者多疑維州之取捨不能決牛李之是非臣以為昔荀吳圍鼓鼓人或請以城叛吳弗許曰或以吾城叛吾所甚惡也人以城來吾獨何好焉吾不可以欲城而邇姦使鼓人殺叛者而繕守備是時唐新與吐蕃修好而納其維州以利言之則維州小而信大以害言之則維州緩而關中急然則為唐計者宜何先乎悉怛謀在唐則為向化在吐蕃不免為叛臣其受誅也又何矜焉且德裕所言者利也僧孺所言者義也匹夫徇利而忘義猶恥之況天子乎譬如鄰人有牛逸而入於家或勸其兄歸之或勸其弟攘之勸歸者曰攘之不義也且致訟勸攘者曰彼嘗攘吾羊矣何義之拘牛大畜也鬻之可以富家以是觀之牛李之是非端可見矣通鑑紀事本末卷第三十二
