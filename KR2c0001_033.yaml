  text: 通鑑紀事本末卷第三十三
  hash: sha256:c98ed51cbbe70a055f6e945c89d1fec716f8f16426e964a199a9328ac6689378
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0001_SBCK_033-1a}
body:
  text: 藩鎮連兵涇原之變李懷光之義附唐肅宗乾元元年冬十二月平盧節度使王玄志薨上遣中使往撫慰將士且就察軍中所欲立者授以旌節髙麗人李懷玉為禆將殺玄志之子推侯希逸為平盧軍使希逸之母懷五姑也故懷玉立之朝廷因以希逸為節度副使節度使由軍士廢立自此始臣光曰夫民生有欲無主則亂是故聖人制禮以治之自天子諸侯至於卿大夫士庶人尊卑有分大小有倫若綱條之相維臂指之相使是以民服事其上而下無覬覦其在周易上天下澤履象曰君子以辨上下定民志此之謂也凡人君所以能有其臣民者以八柄存乎已也茍或捨之則彼此之勢均何以使其下哉肅宗遭唐中衰幸而復國是宜正上下之禮以綱紀四方而偷取一時之安不思永久之患彼命將帥統藩維國之大事也乃委一介之使徇行伍之情無問賢不肖惟其所欲與者則授之自是之後積習為常君臣循守以為得䇿謂之姑息乃至偏禆士卒殺逐主帥亦不治其罪因以其位任授之然則爵祿廢置殺生豫奪皆不出於上而出於下亂之生也庸有極乎且夫有國家者賞善而誅惡故為善者勸為惡者懲彼為人下而殺逐其上惡孰大焉乃使之擁旄秉鉞師長一方是賞之也賞以勸惡惡其何所不至乎書云逺乃猷詩云猷之未逺是用大諫孔子曰人無逺慮必有近憂為天下之政而專事姑息其憂患可勝校乎由是為下者常眄眄焉伺其上茍得間則攻而族之為上者常惴惴焉畏其下茍得間則掩而屠之爭務先發以逞其志非有相保養為俱利久存之計也如是而求天下之安其可得乎迹其厲階肇於此矣蓋古者治軍必本于禮故晉文公城濮之戰見其師少長有禮知其可用今唐治軍而不顧禮使士卒得以陵偏禆偏禆得以陵將帥則將帥之陵天子自然之勢也由是禍亂繼起兵革不息民墜塗炭無所控訴凡二百餘年然後大宋受命太祖始制軍法使以階級相承小有違犯咸伏斧質是以上下有叙令行禁止四征不庭無思不服宇內乂安兆民允殖以迄于今皆由治軍以禮故也豈非詒謀之逺哉寶應元年冬十一月史朝義之敗於衛州也鄴郡節度使薛嵩以相衛洺邢四州降于陳鄭澤潞節度使李抱王恆陽節度使張忠志以恆趙深定易五州降于河東節度使辛雲京丁酉以張忠志為成德軍節度使統恆趙深定易五州賜姓李名寶臣初寶臣禆將王武俊說寶臣來降及復為節度使擢武俊為先鋒兵馬使武俊本契丹也初名沒諾干代宗廣德元年春正月史朝義往幽州發兵其將田承嗣留守莫州以城來降朝義范陽節度使李懷仙亦請降史之亂事見安閏月癸亥以史朝義降將薛嵩為相衛邢洺貝磁六州節度使田承嗣為魏博德滄瀛五州都防禦使李懷仙仍故地為幽州盧龍節度使時河北諸州皆已降嵩等迎僕固懷恩拜於馬首乞行間自效懷恩亦恐賊平寵衰故奏留嵩等及李寶臣分帥河北自為黨援朝廷亦厭苦兵革茍冀無事因而授之初長安人梁崇義以羽林射生從來瑱鎮襄陽纍遷右兵馬使崇義有勇力能卷鐵舒鉤沈毅寡言得衆心瑱之入朝也命諸將分戍諸州瑱死戍者皆奔歸襄陽行軍司馬龎充將兵二千赴河南至汝州聞瑱死引兵還襲襄州左兵馬使李昭拒之充奔房州崇義自鄧州引戍兵歸與昭及副使薛南陽相讓為長久之不決衆皆曰兵非梁卿主之不可遂推崇義為帥崇義尋殺昭及南陽以其狀聞上不能討三月甲辰以崇義為襄州刺史山南東道節度留後夏五月丁卯制分河北諸州以幽莫媯檀平薊為幽州管恆定趙深易為成德軍管相貝邢洺為相州管魏博德為魏州管滄棣冀瀛為青淄管懷衛河陽為澤潞管六月庚寅以魏博都防禦使田承嗣為節度使承嗣舉管內户口壯者皆籍為兵惟使老弱耕稼數年間有衆十萬又選其驍健者萬人自衛謂之牙兵二年春正月魏博節度使田承嗣奏名所管曰天雄軍從之永泰元年夏五月平盧節度使侯希逸鎮淄青好逰畋營塔寺軍州苦之兵馬使李懷玉得衆心希逸忌之因事解其軍職希逸與巫宿於城外軍士閉門不納奉懷玉為帥希逸奔滑州上表待罪詔赦之召還京師秋七月壬辰以鄭王邈為平盧淄青節度大使以懷玉知留後賜名正己時成德節度使李寶臣魏博節度使田承嗣相衛節度使薛嵩盧龍節度使李懷仙收安史餘黨各擁徑卒數萬治兵完城自署文武將吏不供貢賦與山南東道節度使梁崇義及正己皆結為昏姻互相表裏朝廷専事姑息不能復制雖名藩臣羈縻而已大曆三年夏六月壬辰幽州兵馬使朱希彩經略副使昌平朱泚泚弟滔共殺節度使李懷仙希彩自稱留後閏月成德節度使李寶臣遣將將兵討希彩為希彩所敗朝廷不得已宥之庚申以王縉領盧龍節度使丁卯以希彩知幽州留後冬十一月丁亥以幽州留後朱希彩為節度使七年盧龍節度使朱希彩既得位悖慢朝廷殘虐將卒孔目官李懷瑗因衆怒伺間殺之衆未知所從經略副使朱泚營於城北其弟滔將牙內兵潜使百餘人於衆中大言曰節度使非朱副使不可衆皆從之泚遂權知留後遣使言狀冬十月辛未以泚為檢校左常侍幽州盧龍節度使八年春正月昭義節度使相州刺史薛嵩薨子平年十二將士脅以為帥平僞許之既而讓其叔父崿夜奉父喪逃歸鄉里壬午制以崿知留後秋八月辛未幽州節度使朱泚遣弟滔將五千精騎詣涇州防秋自安祿山反幽州兵未嘗為用滔至上大喜勞賜甚厚九月魏博節度使田承嗣為安史父子立祠堂謂之四聖且求為相上令內侍孫知古因奉使諷令毁之冬十月甲辰加承嗣同平章事以褒之九年春三月戊申以皇女永樂公主許妻魏博節度使田承嗣之子華上意欲固結其心而承嗣益驕慢夏六月盧龍節度使朱泚遣弟滔奉表請入朝且請自將步騎五千防秋上許之仍為之先築大第於京師以待之朱泚入朝九月庚子至京師冬十月魏博節度使田承嗣誘昭義將吏使作亂十年春正月丁酉昭義兵馬使裴志清逐留後薛崿帥其衆歸承嗣承嗣聲言救援引兵襲相州取之崿奔洺州上表請入朝許之乙巳朱泚表請留闕下以弟滔知幽州盧龍留後許之昭義禆將薛擇為相州刺史薛雄為衛州刺史薛堅為洺州刺史皆薛嵩之族也戊申上命內侍孫知古如魏州諭田承嗣使各守封疆承嗣不奉詔癸丑遣大將盧子期取洺州楊光朝攻衛州二月乙丑田承嗣誘衛州刺史薛雄雄不從使盜殺之屠其家盡據相衛四州之地自置長吏掠其精兵良馬悉歸魏州逼孫知古與共巡磁相二州使其將士割耳𠢐面請承嗣為帥丙子以華州刺史李承昭知昭義留後三月乙巳薛崿詣闕請罪上釋不問初成德節度使李寶臣淄青節度使李正己皆為田承嗣所輕寶臣弟寶正娶承嗣女在魏州與承嗣子維擊毬馬驚誤觸維死承嗣怒囚寶正以告寶臣寶臣謝教敕不謹封杖授承嗣使撻之承嗣遂杖殺寶正由是兩鎮交惡及承嗣拒命寶臣正己皆上表請討之上亦欲因其隙討承嗣夏四月乙未敕貶承嗣為永州刺史仍命河東成德幽州淄青淮西永平汴宋河陽澤潞諸道發兵前臨魏博若承嗣尚或稽違即令進討罪止承嗣及其姪悅自餘將士弟姪茍能自拔一切不問時朱滔方恭順與寶臣及河東節度使薛兼訓攻其北正己與淮西節度使李忠臣等攻其南五月乙未承嗣將霍榮國以磁州降丁未李正己攻德州拔之李忠臣統永平河陽懷澤步騎四萬進攻衛州六月辛未田承嗣遣其將裴志清等攻冀州志清以其衆降李寶臣甲戌承嗣自將圍冀州寶臣使髙陽軍使張孝忠將精騎四千禦之寶臣大軍繼至承嗣燒輜重而遁孝忠本奚也田承嗣以諸道兵四合部將多叛而懼秋八月遣使奉表請束身歸朝己丑田承嗣遣其將盧子期寇磁州九月李寶臣李正己㑹于棗强進圍貝州田承嗣出兵救之兩軍各饗士卒成德賞厚平盧賞薄既罷平盧士卒有怨言正己恐其為變引兵退寶臣亦退李忠臣聞之釋衛州南度河屯陽武寶臣與朱滔攻滄州承嗣從父弟庭玠守之寶臣不能克冬十月盧子期攻磁州城幾陷李寶臣與昭義留後李承昭共救之大破子期于清水擒子期送京師斬之河南諸將又大破田悅於陳留田承嗣懼初李正己遣使至魏州承嗣囚之至是禮而遣之遣使盡籍境內户口甲兵榖帛之數以與之曰承嗣今年八十有六溘死無日諸子不肖悅亦孱弱凡今日所有為公守耳豈足以辱公之師旅乎立使者於廷南向拜而授書又圖正己之像焚香事之正己悅遂按兵不進於是河南諸道兵皆不敢進承嗣既無南顧之虞得専意北方上嘉李寶臣之功遣中使馬承倩齎詔勞之將還寶臣詣其館遺之百縑承倩詬詈擲出道中寶臣慙其左右兵馬使王武俊說寶臣曰今公在軍中新立功豎子尚爾况寇平之後以一幅詔書召歸闕下一匹夫耳不如釋承嗣以為己資寶臣遂有玩冦之志承嗣知范陽寶臣鄉里心常欲之因刻石作讖云二帝同功勢萬全將田為侣入幽燕密令瘞寶臣境內使望氣者言彼有玉氣寶臣掘而得之又令客說之曰公與朱滔共取滄州得之則地歸國非公所有公能捨承嗣之罪請以滄州歸公仍願從公取范陽以自效公以精騎前驅承嗣以步卒繼之蔑不克矣寶臣喜謂事合符讖遂與承嗣通謀密圖范陽承嗣亦陳兵境上寶臣謂滔使者曰聞朱公儀貌如神願得畫像觀之滔與之寶臣置於射堂命諸將共觀之曰真神人也滔軍於瓦橋寶臣選精騎二千通夜馳三百里襲之戒曰取貌如射堂者時兩軍方睦滔不虞有變狼狽出戰而敗會衣它服得免寶臣欲乘勝取范陽滔使雄武軍使昌平劉怦守留府寶臣知有僃不敢進承嗣聞幽恆兵交即引軍南還使謂寶臣曰河內有警不暇從公石上讖文吾戲為之耳寶臣慙怒而退寶臣既與朱滔有隙以張孝忠為易州刺史使將精騎七千以僃之十一月丁酉田承嗣將吳希光以瀛州降十二月田承嗣請入朝李正己屢為之上表乞許其自新十一年春二月庚辰田承嗣復遣使上表請入朝上乃下詔赦承嗣罪復其官爵聽與家屬入朝其所部拒朝命者一切不問夏五月汴宋留後田神玉卒都虞候李靈曜殺兵馬使濮州刺史孟鑒北結田承嗣為援癸己以永平節度使李勉兼汴宋等八州留後乙未以靈曜為濮州刺史靈曜不受詔六月戊午以靈曜為汴宋留後遣使宣慰秋七月田承嗣遣兵寇滑州敗李勉李靈曜既為留後益驕慢悉以其黨為管內八州刺史縣令欲效河北諸鎮八月甲申詔淮西節度使李忠臣永平節度使李勉河陽三城使馬燧討之淮南節度使陳少逰淄青節度使李正己皆進兵擊靈曜汴宋兵馬使攝節度副使李僧惠靈曜之謀主也宋州牙門將劉昌遣僧神表潜說僧惠僧惠召問計昌為之泣陳逆順僧惠乃與汴宋牙將髙憑石隱金遣神表奉表詣京師請討靈曜九月壬戌以僧惠為宋州刺史憑為曹州刺史隱金為鄆州刺史乙丑李忠臣馬燧軍于鄭州靈曜引兵逆戰兩軍不意其至退軍榮澤淮西軍士潰去者什五六鄭州士民皆驚走入東都忠臣將歸淮西燧固執不可曰以順討逆何憂不克奈何自棄功名堅壁不動忠臣聞之稍收散卒數日皆集軍勢復振戊辰李正己奏克鄆濮二州壬申李僧惠敗靈曜兵於雍丘冬十月李忠臣馬燧進擊靈曜忠臣行汴南燧行汴北屢破靈曜兵壬寅與陳少逰前軍合與靈曜大戰於汴州城西靈曜敗入城固守癸卯忠臣等圍之田承嗣遣田悅將兵救靈曜敗永平淄青兵於匡城乘勝進軍汴州乙巳營於城北數里丙午忠臣遣禆將李重倩將輕騎數百夜入其營縱橫貫穿斬數十人而還營中大駭忠臣燧因以大軍乘之鼓譟而入恱衆不戰而潰悅脫身北走將士死者相枕藉不可勝數靈曜聞之開門夜遁汴州平重倩本奚也丁未靈曜至韋城永平將杜如江擒之燧知忠臣暴戾以己功讓之不入汴城引軍西屯板橋忠臣入城果專其功宋州刺史李僧惠與之爭功忠臣因會擊殺之又欲殺劉昌昌遁逃得免甲寅李勉械送李靈曜至京師斬之十二月丁亥李正己李寶臣並加同平章事戊戌昭義節度使李承昭表稱疾篤以澤潞行軍司馬李抱真兼知磁邢兩州留後庚戌加淮西節度使李忠臣同平章事仍領汴州刺史徙治汴州十二年春三月乙卯兵部尚書同平章事鳳翔懷澤潞秦隴節度使李抱玉薨弟抱真仍領懷澤潞留後田承嗣竟不入朝又助李靈曜上復命討之承嗣乃復上表謝罪上亦無如之何庚午悉復承嗣官爵仍令不必入朝冬十二月丙戌朱泚自涇州還京師庚子以朱泚兼隴右節度使知河西澤潞行營平盧節度使李正己先有淄青齊海登萊沂密德棣十州之地及李靈曜之亂諸道合兵攻之所得之地各為己有正己又得曹濮徐兖鄆五州因自青州徙治鄆州使其子前淄州刺史納守青州癸卯以納為青州刺史正己用刑嚴峻所在不敢偶語然法令齊一賦均而輕擁兵十萬雄據東方鄰藩皆畏之是時田承嗣據魏博相衛洺貝澶七州李寶臣據恆易趙定深冀滄七州各擁衆五萬梁崇義據襄鄧均房復郢六州有衆二萬相與根據蟠結雖奉事朝廷而不用其法令官爵甲兵租賦刑殺皆自専之上寬仁一聽其所為朝廷或完一城增一兵輒有怨言以為猜二常為之罷役而自於境內築壘繕兵無虛日以是雖在中國名藩臣而實如蠻貊異域焉十三年秋八月乙亥成德節度使李寶臣請復姓張許之十四年春二月癸未魏博節度使田承嗣薨有子十一人以其姪中軍兵馬使悅為才使知軍事而諸子佐之甲申以悅為魏博留後淮西節度使李忠臣貪殘好色將吏妻女美者多逼淫之悉以軍政委妹壻節度副使張惠光惠光挾勢暴橫軍州苦之忠臣復以惠光子為牙將暴橫甚於其父左廂都虞候李希烈忠臣之族子也為衆所服希烈因衆心怨怒三月丁未與大將丁皓等殺專光父子而逐忠臣忠臣單騎奔京師上以其有功使以檢校司空同平章事留京師以希烈為蔡州刺史淮西留後以永平節度使李勉兼汴州刺史增領汴潁二州徙鎮汴州成德節度使張寶臣既請復姓又不自安更請賜姓夏四月癸未復賜姓李五月戊子以淮西留後李希烈為節度使辛卯以河陽鎮遏使馬燧為河東節度使六月庚戌以朱泚為鳳翔尹秋九月甲戌改淮西為淮寧德宗建中元年初左僕射劉晏為吏部尚書楊炎為侍郎不相悅元載之死晏有力焉及上即位晏久典利權衆頗疾之多上言轉運使可罷炎乃建言尚書省國政之本比置諸使分奪其權今宜復舊上從之正月甲子詔天下錢榖皆歸金倉部罷晏轉運租庸青苖鹽鐵等使二月丙申朔命黜陟使十一人分巡天下先是魏博節度使田悅事朝廷猶恭順河北黜陟使洪經綸不曉時務聞悅軍十萬人符下罷其四萬令還農悅陽順命如符罷之既而集應罷者激怒之曰汝曹久在軍中有父母妻子今一旦為黜陟使所罷將何資以自衣食乎衆大哭悅乃出家財以賜之使各還部伍於是軍士皆德悅而怨朝廷楊炎奏用元載遺策城原州上遣中使詣涇原節度使假秀實訪以利害秀實以為今邉僃尚虛未宜興事以召寇炎怒以為沮已徴秀實為司農卿丁未邠寧節度使李懷光兼四鎮北庭行營涇原節度使移軍原州以四鎮北庭留後劉文喜為别駕在吐蕃入寇元載遺䇿語上用楊炎之言託以奏事不實己酉貶劉晏為忠州刺史癸丑以澤潞留後李抱真為節度使楊炎欲城原州以復秦原命李懷光居前督作朱泚崔寧各將萬人翼其後詔下涇州為城具涇之將士怒曰吾屬為國家西門之屏十餘年矣始居邠州甫營耕桑有地著之安徙屯涇州披荆榛立軍府坐席未暖又投之塞外吾屬何罪而至此乎李懷光始為邠寧帥即誅溫儒雅等軍令嚴峻及兼涇原諸將皆懼曰彼五將何罪而為戮今又來此吾屬能無憂乎劉文喜因衆心不安據涇州不受詔上疏復求假秀實為帥不則朱泚癸亥以朱泚兼四鎮北庭行軍涇原節度使代懷光劉文喜又不受詔欲自邀旌節夏四月乙未朔據涇州叛遣其子質於吐蕃以求援上命朱泚李懷光討之又命神策軍使張巨濟將禁兵二千助之五月朱泚等圍劉文喜於涇州杜其出入而閉壁不與戰久之不拔天方旱徴發餽運內外騷然朝臣上書請赦文喜以蘇疲人者不可勝紀上皆不聽曰微孽不除何以令天下文喜使其將劉海賔入奏海賔言於上曰臣乃陛下藩邸部曲豈肯附叛人必為陛下梟其首以獻但文喜今所求者節而已願陛下姑與之文喜必怠則臣計得施矣上曰名器不可假人爾能立效固善我節不可得也使海賔歸以告文喜而攻之如初減御膳以給軍士城中將士當受春服者賜豫如故於是衆知上意不可移時吐蕃方睦於唐不為發兵城中勢窮庚寅海賔與諸將共殺文喜傳首而原州竟不果城自上即位李正已內不自安遣參佐入奏事會涇州捷奏至上使觀文喜之首而歸正已益懼六月術士桑道茂上言陛下不出數日暫有離宫之厄臣望奉天有天子氣宜髙大其城以僃非常辛丑命京兆發丁夫數千雜六軍之士築奉天城秋七月荆南節度使庾凖希楊炎指奏忠州刺史劉晏與朱泚書求營救辭多怨望又奏召補州兵欲拒朝命炎證成之上密遣中使就忠州縊殺之己丑乃下詔賜死天下寃之八月丁未加盧龍隴右涇原節度使朱泚兼中書令盧龍隴右節度如故以舒王謨為四鎮北庭行軍涇原節度大使以涇州牙前兵馬使河中姚令言為留後謨邈之子也早孤上子之二年春正月戊辰成德節度使李寶臣薨寶臣欲以軍府傳其子行軍司馬惟嶽以其年少暗弱豫誅諸將之難制者深州刺史張獻誠等至有十餘人同日死者寶臣召易州刺史張孝忠孝忠不往使其弟孝節召之孝忠使孝節謂寶臣曰諸將何罪連頸受戮孝忠懼死不敢往亦不敢叛正如公不入朝之意耳孝節泣曰如此孝節必死孝忠曰往則併命我在此必不敢殺汝遂歸寶臣亦不之罪也兵馬使王武俊位卑而有勇故寶臣特親愛之以女妻其子士真士真復厚結其左右故孝忠武俊獨得全及薨孔目官胡震家僮王它奴勸惟嶽匿喪二十餘日詐為寶臣表求令惟嶽繼襲上不許遣給事中汲人班宏往問寶臣疾且諭之惟嶽厚賂宏宏不受還報惟嶽乃發喪自為留後使將佐共奏求旌節上又不許初寶臣與李正已田承嗣梁崇義相結期以土地傳之子孫故承嗣之死寶臣力為之請於朝使以節授田恱代宗從之恱初襲位事朝廷禮甚恭河東節度使馬燧表其必反請先為僃至是恱屢為惟嶽請繼襲上欲革前弊不許或諫曰惟嶽已據父業不因而命之必為亂上曰賊本無資以為亂皆藉我土地假我位號以聚其衆耳嚮日因其所欲而命之多矣而亂益滋是爵命不足以已亂而適足以長亂也然則惟嶽必為亂命與不命等耳竟不許恱乃與李正己各遣使詣惟嶽潜謀勒兵拒命魏博節度副使田庭玠謂恱曰爾藉伯父遺業但謹事朝廷坐享富貴不亦善乎奈何無故與恆鄆共為叛臣爾觀兵興以來逆亂者誰能保其家乎必欲行爾之志可先殺我無使我見田氏之族滅也因稱病卧家恱自往謝之庭玠閉門不內竟以憂卒成德判官邵真聞李惟嶽之謀泣諫曰先相公受國厚恩大夫衰絰之中遽欲負國此甚不可勸惟嶽執李正己使者送京師且請討之曰如此朝廷嘉大夫之忠則旄鉞庶幾可得惟嶽然之使真草奏長史畢華曰先公與二道結好二十餘年奈何一旦棄之且雖執其使朝廷未必見信正己忽來襲我孤軍無援何以待之惟嶽又從之前定州刺史谷從政惟嶽之舅也有膽略頗讀書王武俊等皆敬憚之為寶臣所忌從政乃稱疾杜門惟嶽亦忌之不與圖事日夜獨與胡震王它奴等計議多散金帛以恱將士從政往見惟嶽曰今海內無事自上國來者皆言天子聰明英武志欲致太平深不欲諸侯子孫専地爾今首違詔命天子必遣諸道致討將士受賞之際皆言為大夫盡死茍一戰不勝各惜其生誰不離心大將有權者乘危伺便咸思取爾以自為功矣且先相公所殺髙班大將殆以百數橈敗之際其子弟欲復仇者庸可數乎又相公與幽州有隙朱滔兄弟常切齒於我今天子必以為將滔與吾擊柝相聞計其聞命疾驅若虎狼之得獸也何以當之昔田承嗣從安史父子同反身經百戰凶悍聞於天下違詔舉兵自謂無敵及盧子期就擒吳希光歸國承嗣指天垂泣身無所措賴先相公按兵不進且為之祈請先帝寬仁赦而不誅不然田氏豈有種乎況爾生長富貴齒髮尚少不更艱危乃信左右之言欲效承嗣所為乎為爾之計不若辭謝將佐使惟誠攝領軍府身自入朝乞留宿衛因言惟誠且令攝事恩命決於聖志上必悅爾忠義縱無大位不失榮祿永無憂矣不然大禍將至悔之何及吾亦知爾素踈忌我顧以舅甥之情事急不得不言耳惟嶽及左右見其言切益惡之從政乃復歸杜門稱疾惟誠者惟嶽之庶兄也謙厚好書得衆心其母妹為李正己子婦是日惟嶽送惟誠於正己正己使復姓張遂仕淄青惟嶽遣王它奴詣從政家察其起居從政飲藥而卒且死曰吾不憚死哀張氏今族滅矣劉文喜之死也李正己田恱等皆不自安劉晏死正己等益懼相謂曰我輩罪惡豈得與劉晏比乎㑹汴州城隘廣之東方人訛言上欲東封故城汴州正己懼發兵萬人屯曹州田恱亦完聚為僃與梁崇義李惟嶽遙相應助河南士民騷然驚駭永平軍舊領汴宋滑亳陳潁泗七州丙子分宋亳潁别為節度使以宋州刺史劉洽為之以泗州隸淮南又以東都留守路嗣恭為懷鄭汝陜四州河陽三城節度使旬日又以永平節度使李勉都統洽嗣恭二道仍割鄭州隸之選嘗為將者為諸州刺史以僃正己等楊炎既殺劉晏朝野側目李正己纍表請晏罪譏斥朝廷炎懼遣腹心分詣諸道以宣慰為名實使之密諭節度使云晏昔附姦邪請立獨孤后上自惡而殺之上聞而惡之由是有誅炎之志隱而未發乙巳遷炎中書侍郎擢盧𣏌為門下侍郎並同平章事不專任炎矣丙午更汴宋軍名曰宣武梁崇義雖與李正己等連結兵勢寡弱禮數最恭或勸其入朝崇義曰來公有大功於國上元中為閹宦所讒遷延稽命及代宗嗣位不俟馬入朝猶不免族誅吾歲久舋積何可往也淮寧節度使李希烈屢請討之崇義懼益修武僃流人郭昔告崇義為變崇義聞之請罪上為之杖昔逺流之使金部員外郎李舟詣襄州諭㫖以安之舟嘗奉使詣劉文喜為陳禍福文喜囚之會帳下殺文喜以降諸道跋扈者聞之謂舟能覆城殺將至襄州崇義惡之舟又勸崇義入朝言頗切直崇義益不恱及遣使宣慰諸道舟復詣襄州崇義拒境不內上言軍中疑懼請易以它使時兩河諸鎮方猜阻上欲示恩信以安之夏四月庚寅加崇義同平章事妻子悉加封賞賜以鐵劵遣御史張著齎手詔徴之仍以其禆將藺杲為鄧州刺史五月田恱卒與李正己李惟嶽定計連兵拒命遣兵馬使孟祐將步騎五千北助惟嶽薛嵩之死也田承嗣盜據洺相二州朝廷獨得邢磁二州及臨洺縣恱欲阻山為境曰邢磁如兩眼在吾腹中不可不取乃遣兵馬使康愔將八千人圍邢州别將楊朝光將五千人柵於邯鄲西北以斷昭義救兵恱自將兵數萬圍臨洺邢州刺史李共臨洺將張伾堅壁拒守貝州刺史邢曹俊田承嗣舊將也老而有謀恱寵信牙官扈㠋而踈之及攻臨洺召曹俊問計曹俊曰兵法十圍五攻尚書以逆犯順勢更不侔今頓兵堅城之下糧竭卒盡自亡之道也不若置萬兵於崞口以遏西師則河北二十四州皆為尚書有矣諸將惡其異已共毁之恱不用其策六月張著至襄陽梁崇義益懼陳兵而見之藺杲得詔不敢發馳見崇義請命崇義對著號泣竟不受詔著復命癸巳進李希烈爵南平郡王加漢南漢北兵馬招討使督諸道兵討之楊炎諫曰希烈為董秦養子親任無比卒逐秦而奪其位為人狼戾無親無功猶屈强不法使平崇義何以制之上不聽炎固爭之上益不平荆南牙門將吳少誠以取梁崇義之策干李希烈希烈以少誠為前鋒少誠幽州潞人也時內自關中西暨蜀漢南盡江淮閩越北至太原所在出兵而李正己遣兵扼徐州甬橋渦口梁崇義阻兵襄陽運路皆絶人心震恐江淮進奉船千餘艘泊渦口不敢進上以和州刺史張萬福為濠州刺史萬福馳至渦口立馬岸上發進奉船淄青將士停岸睥睨不敢動壬子以懷鄭河陽節度副使李芃為河陽懷州節度使割京畿五縣隸焉秋七月李希烈以久雨未進軍上怪之盧杞密言於上曰希烈遷延以楊炎故也陛下何愛炎一日之名而墮大功不若暫免炎相以恱之事平復用無傷也上以為然庚申以炎為左僕射罷政事辛巳以邠寧節度使李懷光兼朔方節度使癸未河東節度使馬燧昭義節度使李抱真神策先鋒都知兵馬使李晟大破田恱於臨洺時恱攻臨洺纍月不拔城中食且盡府庫竭士卒多死傷張伾飾其愛女使出拜將士曰諸君守戰甚苦伾家無它物請鬻此女為將士一日之費衆皆哭曰願盡死力不敢言賞李抱真告急於朝詔馬燧將步騎二萬與抱真討恱又遣李晟將神策兵與之俱又詔幽州留後朱滔討惟嶽燧等軍未出險先遣使持書諭恱為好語恱謂燧畏之不設僃又與抱真合兵八萬東下壷關軍于邯鄲擊恱支軍破之恱方急攻臨洺分李惟嶽兵五千助楊朝光明日燧等進攻朝光柵恱將萬餘人救之燧命大將李自良等禦之於雙岡令之曰恱得過必斬爾自良等力戰恱軍却燧推火車焚朝光柵斬朝光獲首虜五千餘級居五日燧等進軍至臨洺恱悉衆力戰凡百餘合恱兵大敗斬首萬餘級恱引兵夜遁邢州圍亦解時平盧節度使李正己已薨子納袐之擅領軍務恱求救於納及李惟嶽納遣大將衛俊將兵萬人惟嶽遣兵三千人救之恱收合散卒得二萬餘人軍于洹水淄青軍其東成德軍其西首尾相應馬燧帥諸軍進屯鄴奏求河陽兵自助詔河陽節度使李芃將兵會之八月李納始發喪奏請襲父位上不許梁崇義發兵至江陵至四望大敗而歸乃收兵襄鄧李希烈引軍循漢而上與諸道兵會崇義遣其將翟暉杜少誠逆戰於蠻水希烈大破之追至踈口又破之二將請降希烈使將其衆先入襄陽慰諭軍民崇義閉城拒守守者開門爭出不可禁崇義與妻赴井死傳首京師范陽節度使朱滔將討李惟嶽軍于莫州張孝忠將精兵八千守易州滔遣判官蔡雄說孝忠曰惟嶽乳臭兒敢拒朝命今昭義河東軍已破田恱淮寧李僕射克襄陽計河南諸軍朝夕北向恆魏之亡可佇立而須也使君誠能首舉易州以歸朝廷則破惟嶽之功自使君始此轉禍為福之策也孝忠然之遣牙官程華詣滔遣録事參軍董稹奉表詣闕滔又上表薦之上恱九月辛酉以孝忠為成德節度使命惟嶽護喪歸朝惟嶽不從孝忠德滔為子茂和娶滔女深相結壬戌加李希烈同平章事初李希烈請討梁崇義上對朝士亟稱其忠黜陟使李承自淮西還言於上曰希烈必立微功但恐有功之後偃蹇不臣更煩朝廷用兵耳上不以為然希烈既得襄陽遂據之為己有上乃思承言時承為河中尹甲子以承為山南東道節度使上欲以禁兵送上承請單騎赴鎮至襄陽希烈置之外館迫脅萬方承誓死不屈希烈乃大掠闔境所有而去承治之朞年軍府稍完希烈留牙將於襄州守其所掠財由是數有使者往來承亦遣其腹心臧叔雅往來許蔡厚結希烈腹心周曽等與之隂圖希烈冬十月徐州刺史李洧正己之從父兄也李納寇宋州彭城令太原白李庚說洧舉州歸國洧從之遣攝巡官崔程奉表詣闕且使口奏并白宰相以徐州不能獨抗納乞領徐海沂三州觀察使況海沂二州今皆為納有洧與刺史王涉馬萬通素有約茍得朝廷詔書必能成功程自外來以為宰相一也先白張鎰鎰以告盧杞杞怒其不先白已不從其請戊申加洧御史大夫充招諭使十一月辛酉宣武節度使劉洽神策都知兵馬使曲環滑州刺史襄平李澄朔方大將唐朝臣大破淄青魏博之兵於徐州先是李納遣其將王溫會魏博將信都崇慶共攻徐州李洧遣牙官溫人王智興詣闕告急智興善走不五日而至上為之發朔方兵五千人以朝臣將之與洽環澄共救之時朔方軍資裝不至旗服弊惡宣武人嗤之曰乞子能破賊乎朝臣以其言激怒士卒且曰都統有令先破賊營者營中物悉與之士皆憤怒爭奮崇慶溫攻彭城二旬不能下請益兵於納納遣其將石隱金將萬人助之與劉洽等相拒於七里溝日向暮洽引軍稍却朔方馬軍使楊朝晟言於唐朝臣曰公以步兵負山而陳以待兩軍我以騎兵伏於山曲賊見懸軍勢孤必搏之我以伏兵絶其腰必敗之朝臣從之崇慶等果將騎二千踰橋而西追擊官軍伏兵發橫擊之崇慶等兵中斷狼狽而返阻橋以拒官軍其兵有爭橋不得涉水而度者朝晟指之曰彼可涉吾何為不涉遂涉水擊據橋者皆走崇慶等兵大潰洽等乘之斬首八千級溺死過半朔方軍士盡得其輜重旗服鮮華乃謂宣武人曰乞子之功孰與宋多宣武人皆慙官軍乘勝逐之至徐州城下魏博淄青軍解圍走江淮漕運始通己巳詔削李惟嶽官爵募所部降者赦而賞之甲申淮南節度使陳少逰遣兵擊海州其刺史王涉以州降十一月李納宋州刺史馬萬通乞降丁酉以為密州刺史加馬燧魏博招討使三年春正月河陽節度使李芁引兵逼衛州田恱守將任履虛詐降既而復叛馬燧等諸軍屯于漳濵田恱遣其將王光進築月城以守長橋諸軍不得度燧以鐵鎖連車數百乘實以土囊塞其上流水淺諸軍涉度時軍中乏糧恱等深壁不戰燧命諸軍持十日糧進屯倉口與恱夾洹水而軍李抱貞李芁問曰糧少而深入何也燧曰糧少則利速戰今三鎮連兵不戰欲以老我師我若分軍擊其左右恱必救之則我腹背受敵戰必不利故進軍逼恱所謂攻其所必救也彼茍出戰必為諸君破之乃為三橋逾洹水日往挑戰恱不出燧令諸軍夜半起食潜師循洹水直趨魏州令曰賊至則止為陳留百騎擊鼓鳴角於營中仍抱薪持火俟諸軍畢發則止鼓角匿其旁伺恱軍畢度焚其橋軍行十里所恱聞之帥淄青成德步騎四萬踰橋掩其後乘風縱火鼓譟而進燧按兵不動先除其前草莽百步為戰埸繕陳以待之募勇士五千餘人為前列恱軍至火止氣衰燧縱兵擊之恱軍大敗神策昭義河陽軍小却見河東軍捷還鬭又破之追奔至三橋已焚恱軍亂赴水溺死不可勝紀斬首二萬餘級捕虜三千餘人尸相枕藉三十餘里恱收餘兵千餘人走魏州馬燧與李抱真不協頓兵平邑浮圖遷延不進恱夜至南郭大將李長春閉關不內以俟官軍久之天且明長春乃開門納之恱殺長春嬰城拒守城中士卒不滿數千死者親戚號哭滿街恱憂懼乃持佩刀乘馬立府門外悉集軍民流涕言曰恱不肖蒙淄青成德二丈人保薦嗣守伯父業今二丈人即丗其子不得承襲恱不敢忘二丈人大恩不量其力輒拒朝命喪敗至此使士大夫肝腦塗地皆恱之罪也恱有老母不能自殺願諸公以此刀斷恱首提出城降馬僕射自取富貴無為與恱俱死也因從馬上自投地將士爭前抱持恱曰尚書舉兵徇義非私己也一勝一負兵家之常某輩纍丗受恩何忍聞此願奉尚書一戰不勝則以死繼之恱曰諸公不以恱喪敗而棄之恱雖死敢忘厚意於地下乃與諸將各斷髮約為兄弟誓同生死悉出府庫所有及斂富民之財得百餘萬以賞士卒衆心始定復召貝州刺史邢曹俊使之整部伍繕守備軍勢復振李納軍於濮陽為河南軍所逼奔還濮州徴援兵於魏州田恱遣軍使符璘將三百騎送之璘父令竒謂璘曰吾老矣歷觀安史輩叛亂者今皆安在田氏能久乎汝因此棄逆從順是汝揚父名於後丗也齧臂而别璘遂與其副李瑶帥衆降于馬燧恱收族其家令竒慢罵而死瑶父再春以博州降恱從兄昂以洺州降王光進以長橋降恱入城旬餘日馬燧等諸軍始至城下攻之不克丙寅李惟嶽遣兵與孟祐守束鹿朱滔張孝忠攻拔之進圍深州惟嶽憂懼掌書記邵真復說惟嶽密為表先遣弟惟簡入朝然後誅諸將之不從命者身自入朝使妻父冀州刺史鄭詵權知節度事以待朝命惟簡既行孟祐知其謀密遣告田恱恱大怒使衙宫扈岌往見惟嶽讓之曰尚書舉兵正為大夫求旌節耳非為己也今大夫乃信邵真之言遣弟奉表悉以反逆之罪歸尚書自求雪身尚書何負於大夫而至此邪若相為斬邵真則相待如初不然當與大夫絶矣判官畢華言於惟嶽曰田尚書以大夫之故陷身重圍大夫一旦負之不義甚矣且魏博淄青兵彊食富足抗天下事未可知奈何遽為二三之計乎惟嶽素怯不能守前計乃引邵真對扈岌斬之發成德兵萬人與孟祐俱圍束鹿丙寅朱滔張孝忠與戰於束鹿城下惟嶽大敗燒營而遁兵馬使王武俊為左右所構惟嶽疑之惜其才未忍除也束鹿之戰使武俊為前鋒私自謀曰我破朱滔則惟嶽軍勢大振歸殺我必矣故戰不甚力而敗朱滔欲乘勝攻恆州張孝忠引兵西北軍于義豐滔大驚孝忠將佐皆怪之孝忠曰恆州宿將尚多未易可輕迫之則並力死鬬緩之則自相圖諸君第觀之吾軍義豐坐待惟嶽之殄滅耳且朱司徒言大而識淺可與共始難與共終也於是滔亦屯束鹿不敢進惟嶽將康日知以趙州歸國惟嶽益疑王武俊武俊甚懼或謂惟嶽曰先相公委腹心於武俊使之輔佐大夫又有骨肉之親武俊勇冠三軍今危難之際復加猜阻若無武俊欲使誰為大夫却敵乎唯嶽以為然乃使步軍使衛常寧與武俊共擊趙州又使王士真將兵宿府中以自衛淮南節度使陳少逰拔海密二州李納復攻陷之王武俊既出恆州謂衛常寧曰武俊今幸出虎口不復歸矣當北歸張尚書常寧曰大夫暗弱信任左右觀其勢終為朱滔所滅今天子有詔得大夫首者以其官爵與之中丞素為衆所服與其出亡曷若倒戈以取大夫轉禍為福如反掌耳事茍不捷歸張尚書未晚也武俊深以為然會惟嶽使要藉謝遵至趙州城下武俊引遵同謀取惟嶽遵還密告王士真閏月甲辰武俊常寧自趙州引兵還襲惟嶽遵與士真矯惟嶽命啓城門納之黎明武俊帥數百騎突入府門士真應之於內殺十餘人武俊令曰大夫叛逆將士歸順敢違拒者族衆莫敢動遂執惟嶽收鄭詵畢華王它奴等皆殺之武俊以惟嶽舊使之子欲生送之長安常寧曰彼見天子將復以叛逆之謀歸咎於中丞乃縊殺之傳首京師深州刺史楊榮國惟嶽姊夫也降於朱滔滔使復其位二月戊午李惟嶽所署定州刺史楊政義降時河北略定惟魏州未下河南諸軍攻李納於濮州納勢日蹙朝廷謂天下不日可平甲子以張孝忠為易定滄三州節度使王武俊為恆冀都團練觀察使康日知為深趙都團練觀察使以德棣二州隸朱滔令還鎮滔固請深州不許由是怨望留屯深州王武俊素輕張孝忠自以手誅李惟嶽功在康日知上而孝忠為節度已與康日知俱為都團練使又失趙定二州亦不恱又詔以糧三千石給朱滔馬五百匹給馬燧武俊以為朝廷不欲使故人為節度使魏博既下必取恆冀故先分其糧馬以弱之疑未肯奉詔田悅聞之遣判官王侑許士則間道至深州說朱滔曰司徒奉詔討李惟嶽旬朔之間拔束鹿下深州惟嶽勢蹙故王大夫因司徒勝勢得以梟惟嶽之首此皆司徒之功也又天子明下詔書令司徒得惟嶽城邑皆隸本鎮今乃割深州以與日知是自棄其信也且今上志欲掃清河朔不使藩鎮承襲將悉以文臣代武臣魏亡則燕趙為之次矣若魏存則燕趙無患然則司徒果有意矜魏博之危而救之非徒得存亡繼絶之義亦子孫萬丗之利也又許以貝州賂滔滔素有異志聞之大喜即遣王侑歸報魏州使將士知有外援各自堅又遣判官王郅與許士則俱詣恆州說王武俊曰大夫出萬死之計誅逆首拔亂根康日知不出趙州豈得與大夫同日論功而朝廷褒賞略同誰不為大夫憤邑者今又聞有詔支糧馬與鄰道朝廷之意蓋以大夫善戰無敵恐為後患先欲貧弱軍府俟平魏之日使馬僕射北首朱司徒南向共相滅耳朱司徒亦不敢自保使郅等效愚計欲與大夫共救田尚書而存之大夫自留糧馬以供軍朱司徒不欲以深州與康日知願以與大夫請早定刺史以守之三鎮連兵若耳目手足之相救則它日永無患矣武俊亦喜許諾即遣判官王巨源使於滔且令知深州事相與刻日舉兵南向滔又遣人說張孝忠孝忠不從宣武節度使劉洽攻李納于濮州克其外城納於城上涕泣求自新李勉又遣人說之癸卯納遣其判官房說以其母弟經及子成務入見㑹中使宋鳯朝稱納勢窮蹙不可捨上乃囚說等於禁中納遂歸鄆州復與田悅等合朝廷以納勢未衰三月乙未始以徐州刺史李洧兼徐海沂都團練觀察使海沂己為納所據洧竟無所得李納之初反也其所署德州刺史李西華備守甚嚴都虞候李士真密毁西華於納納召西華還府以士真代之士真又以詐召棣州刺史李長卿長卿過德州士真劫之與同歸國夏四月戊午以士真長卿為二州刺史士真求援於朱滔滔已有異志遣大將李濟時將三千人聲言助士真守德州且召士真詣深州議軍事至則留之使濟時領用事上遣中使發盧龍恆冀易定兵萬人詣魏州討田恱王武俊不受詔執使者送朱滔滔言於衆曰將士有功者吾奏求官勳皆不遂今欲與諸君敇裝共趨魏州擊破馬燧以取溫飽何如皆不應三問乃曰幽州之人自安史之反從而南者無一人得還今其遺人痛入骨髓況太尉司徒皆受國寵榮將士亦各蒙官勳誠且願保目前不敢復有僥冀滔默然而罷乃誅大將數十人厚撫循其士卒康日知聞其謀以告馬燧燧以聞上以魏州未下王武俊復叛力未能制滔壬戌賜滔爵通義郡王冀以安之滔反謀益甚分兵營於趙州以逼康日知以深州授王巨源武俊以其子士真為恆冀深三州留後將兵圍趙州涿州刺史劉怦與滔同縣人其母滔之姑也滔使知幽州留後聞滔欲救田恱以書諫之曰今昌平故里朝廷改為太尉鄉司徒里此亦丈夫不朽之名也但以忠順自持則事無不濟竊思近日務大樂戰不顧成敗而家滅身屠者安史是也怦忝密親默而無告是負重知惟司徒圖之無貽後悔滔雖不用其言亦嘉其盡忠卒無疑二滔將起兵恐張孝忠為後患復遣牙官蔡雄往說之孝忠曰昔者司徒發幽州遣人語孝忠曰李惟嶽負恩為逆謂孝忠歸國即為忠臣孝忠性直用司徒之教今既為忠臣矣不復助逆也且孝忠與武俊皆出夷落深知其心最喜翻覆司徒勿忘鄙言它日必相念矣雄復欲以巧辭說之孝忠怒欲執送京師雄懼逃歸滔乃使劉怦將兵屯要害以僃之孝忠完城礪兵獨居彊寇之間莫之能屈滔將步騎二萬五千發深州至束鹿詰旦將行吹角未畢士卒忽大亂喧譟曰天子令司徒歸幽州奈何違敇南救田恱滔大懼走入驛後堂避匿蔡雄與兵馬使宗頊等矯謂士卒曰汝輩勿喧聽司徒傳令衆稍止雄又曰司徒將發范陽恩㫖令得李惟兵州縣即有之司徒以幽州少絲纊故與汝曹竭力血戰以取深州冀得其絲纊以寬汝曹賦率不意國家無信復以深州與康日知又朝廷以汝曹有功賜絹人十匹至魏州西境盡為馬僕射所奪司徒但處范陽富貴足矣今兹南行乃為汝曹非自為也汝曹不欲南行任自歸北何用喧悖乖失軍禮衆聞言不知所為乃曰敇使何得不為軍士守護賞物遂入敕使院擘裂殺之又呼曰雖知司徒此行為士卒終不如且奉詔歸鎮雄曰然則汝曹各還部伍詰朝復往深州休息數日相與歸鎮耳衆然後定滔即引軍還深州密令諸將訪察唱率為亂者得二百餘人悉斬之餘衆股栗乃復舉兵而南衆莫敢前却進取寧晉留屯以待王武俊武俊將步騎萬五千取元氏東趣寧晉武俊之始誅李惟嶽也遣判官孟華入見上問以河朔利害華性忠直有才略應對慷慨上悅以為恆冀團練副使會武俊與朱滔有異謀上遽遣華歸諭㫖華至武俊已出師華諫曰聖意於大夫甚厚茍盡忠義何患官爵之不崇土地之不廣不日天子必移康中丞於它鎮深趙終為大夫之有何苦遽自同於逆亂乎異日無成悔之何及華嚮在李寶臣幕府以直道已為同列所忌至是為副使同列尤疾之言於武俊曰華以軍中隂事奏天子請為內應故得超遷是將覆大夫之軍大夫宜僃之武俊以其舊人不忍殺奪職使歸私第田恱恃援兵將至遣其將康愔將萬餘人出城西與馬燧等戰於御河上大敗而還時兩河用兵月費百餘萬緡府庫不支數月太常博士韋都賔陳京建議以為貨利所聚皆在富商請括富商錢出萬緡者借其餘以供軍計天下不過借一二千商則數年之用足矣上從之甲子詔借商人錢令度支條上判度支杜佑大索長安中商賈所有貨意其不實輒加搒捶人不勝苦有縊死者長安囂然如被寇盜計所得才八十餘萬緡又括僦匱質錢凡蓄積錢帛粟麥者皆借四分之一封其匱窖百姓為之罷市相帥遮宰相馬自訴以千萬數盧杞始慰諭之勢不可遏乃疾驅自他道歸計并借商所得才二百萬緍人已竭矣京叔明之五世孫也甲戌以昭義節度副使磁州刺史盧玄卿為洺州刺史兼魏博招討副使初李抱真為澤潞節度使馬燧領河陽三城抱真欲殺懷州刺史楊鉥鉥奔燧燧納之且奏其無罪抱真怒及同討田恱數以事相恨望二人怨隙遂深不復相見由是諸軍逗撓久無成功上數遣中使和解之及王武俊逼趙州抱真分麾下二千人戍邢州燧大怒曰餘賊未除宜相與勠力乃分兵自守其地我寧得獨戰邪欲引兵歸李晟說燧曰李尚書以邢趙連壤分兵守之誠未有害今公遽自引去衆謂公何燧恱乃單騎造抱真壘相與釋憾結歡㑹洺州刺史田昂請入朝燧奏以洺州隸抱真請玄卿為刺史兼充招討之副李晟軍先隸抱真又請兼隸燧以示協和上皆從之盧龍節度行軍司馬蔡廷玉惡判官鄭雲逵言於朱泚奏貶莫州參軍雲逵妻朱滔之女也滔復奏為掌書記雲逵深構廷玉於滔廷玉又與檢校大理少卿朱體微言於泚曰滔在幽鎮事多專擅其性非長者不可以兵權付之滔知之大怒數與泚書請殺二人者泚不從由是兄弟頗有隙及滔拒命上欲歸罪於廷玉等以恱滔甲子貶廷玉栁州司户體微萬州南浦尉宣武節度使劉洽攻李納之濮陽降其守將髙彥昭朱滔遣人以蠟書置髻中遺朱泚欲與同反馬燧獲之并使者送長安泚不之知上驛召泚於鳯翔至以蠟書并使者示之泚惶恐頓首請罪上曰相去千里初不同謀非卿之罪也因留之長安私第賜名園腴田錦綵金銀甚厚以安其意其幽州盧龍節度太尉中書令並如故上以幽州兵在鳳翔思得重臣代之盧杞忌張鎰忠直為上所重欲出之於外已得専揔朝政乃對曰朱泚名位素崇鳯翔將校班秩已髙非宰相信臣無以鎮撫臣請自行上俯首未言杞又曰陛下必以臣貌寢不為三軍所伏固惟陛下神算上乃顧鎰曰才兼文武望重內外無以易卿鎰知為杞所排而無辭以免因再拜受命戊寅以鎰兼鳯翔尹隴右節度等使朱滔王武俊自寧晉南救魏州辛卯詔朔方節度使李懷光將朔方及神策步騎萬五千人東討田恱且拒滔等滔行至宗城掌書記鄭雲逵參謀田景仙棄滔來降丁酉加河東節度使馬燧同平章事辛亥置義武軍節度於定州以易定滄三州隸之朱滔王武俊軍至魏州田恱具牛酒出迎魏人歡呼動地滔營於愜山是日李懷光軍亦至馬燧等盛軍容迎之滔以為襲已遽出陳懷光勇而無謀欲乘其營壘未就擊之燧請且休將士觀舋而動懷光曰彼營壘既立將為後患此時不可失也遂擊滔於愜山之西殺步卒千餘人滔軍崩沮懷光按轡觀之有喜色士卒爭入滔營取寶貨王武俊引二千騎橫衝懷光軍軍分為二滔引兵繼之官軍大敗蹙入永濟渠溺死者不可勝數人相蹈藉其積如山水為之不流馬燧等各收軍保壘是夕滔等堰永濟渠入王莽故河絶官軍糧道及歸路明日水深三尺餘馬燧懼遣使卑辭謝滔求與諸節度歸本道奏天子請以河北事委五郎處之滔欲許之王武俊以為不可滔不從秋七月燧與諸軍涉水而西退保魏縣以拒滔滔乃謝武俊武俊由是恨滔後數日滔等亦引兵營魏縣東南與官軍隔水相距李納求援於滔等滔遣魏博兵馬使信都承慶將兵助之納攻宋州不克遣兵馬使李克信李欽遙戍濮陽南華以拒劉洽甲辰以淮寧節度使李希烈兼平盧淄青兖鄆登萊齊州節度使討李納又以河東節度使馬燧兼魏博澶相節度使加朔方邠寧節度使李懷光同平章事神策行營招討使李晟請以所將兵北解趙州之圍與張孝忠合勢圖范陽上許之晟自魏州引兵趨趙州王士真解圍去晟留趙州三日與孝忠合兵北略恆州八月辛酉以涇原留後姚令言為節度使盧杞惡太子太師顔真卿欲出之於外真卿謂杞曰先中丞傳首至平原真卿以舌䑛面血今相公忍不相容乎杞矍然起拜然恨之益甚冬十一月己卯朔加淮南節度使陳少逰同平章事田恱德朱滔之救與王武俊議奉滔為主稱臣事之滔不可曰愜山之捷皆大夫二兄之力滔何敢獨居尊位於是幽州判官李子千恆冀判官鄭濡等共議請與鄆州李大夫為四國俱稱王而不改年號如昔諸侯奉周家正朔築壇同盟有不如約者衆共伐之不然豈得常為叛臣茫然無主用兵既無名有功無官爵為賞使將吏何所依歸乎滔等皆以為然滔乃自稱冀王田恱稱魏王王武俊稱趙王仍請李納稱齊王是日滔等築壇於軍中告天而受之滔為􅉀主稱孤武俊恱納稱寡人所居堂曰殿處分曰令羣下上書曰箋妻曰妃長子曰丗子各以其所治州為府置留守兼元帥以軍政委之又置東西曹視門下中書省左右內史視侍中中書令餘官皆倣天朝而易其名武俊以孟華為司禮尚書華竟不受嘔血死以兵馬使衛常寧為內史監委以軍事常寧謀殺武俊武俊腰斬之武俊遣其將張終葵寇趙州康日知擊斬之李希烈帥所部兵三萬徙鎮許州遣所親詣李納與謀共襲汴州遣使告李勉云已兼領淄青欲假道之官勉為之治橋具饌以待之而嚴為之僃希烈竟不至又密與朱滔等交通納亦數遣逰兵度汴以迎希烈由是東南轉輸者皆不敢由汴渠自蔡水而上十二月丁丑李希烈自稱天下都元帥太尉建興王時朱滔等與官軍相拒纍月官軍有度支饋糧諸道益兵而滔與王武俊孤軍深入專仰給於田恱客主日益困弊聞李希烈軍勢甚盛頗怨望乃相與謀遣使詣許州勸希烈稱帝希烈由是自稱天下都元帥四年春正月庚寅李希烈遣其將李克誠襲陷汝州執别駕李元平元平本湖南判官薄有才藝踈傲敢大言好論兵中書侍郎關播竒之薦於上以為將相之器以汝州距許州最近擢元平為汝州别駕知州事元平至州即募工徒治城希烈隂使壯士往應募執役入數百人元平不之覺希烈遣克誠將數百騎突至城下應募者應之於內縛元平馳去元平為人眇小無須見希烈恐懼便液汚地希烈罵之曰盲宰相以汝當我何相輕也以判官周晃為汝州刺史又遣别將董待名等四出抄掠取尉氏圍鄭州官軍數為所敗邏騎四至彭婆東都士民震駭竄匿山谷留守鄭叔則入保西苑上問計於盧杞對曰希烈年少驍將恃功驕慢將佐莫敢諌止誠得儒雅重臣奉宣聖澤為陳逆順禍福希烈必革心悔過可不勞軍旅而服顔真卿三朝舊臣忠直剛決名重海內人所信服真其人也上以為然甲午命真卿詣許州宣慰希烈詔下舉朝失色真卿乘驛至東都鄭叔則曰往必不免宜少留須後命真卿曰君命也將焉避之遂行李勉表言失一元老為國家羞請留之又使人邀真卿於道不及真卿與其子書但敇以奉家廟撫諸孤而已至許州欲宣詔㫖希烈使其養子千餘人環繞慢罵拔刃擬之為將割啖之勢真卿足不移色不變希烈遽以身蔽之麾衆令退館真卿而禮之希烈欲遣真卿還㑹李元平在座真卿責之元平慙而起以密啓白希烈希烈意遂變留真卿不遣朱滔王武俊田恱李納各遣使詣希烈上表稱臣勸進使者拜舞於希烈前說希烈曰朝廷誅滅功臣失信天下都統英武自天功烈蓋丗已為朝廷所猜忌將有韓白之禍願亟稱尊號使四海臣民知有所歸希烈召顔真卿示之曰今四王遣使見推不謀而同太師觀此事勢豈吾獨為朝廷所忌無所自容邪真卿曰此乃四凶何謂四王相公不自保功業為唐忠臣乃與亂臣賊子相從求與之同覆滅邪希烈不恱扶真卿出它日又與四使同宴四使曰久聞太師重望今都統將稱大號而太師適至是天以宰相賜都統也真卿叱之曰何謂宰相汝知有罵安祿山而死者顔杲卿乎乃吾兄也吾年八十知守節而死耳豈受汝曹誘脅乎四使不敢復言希烈乃使甲士十人守真卿於館舍掘坎於庭云欲坑之真卿怡然見希烈曰死生已定何必多端亟以一劔相與豈不快公心事邪希烈乃謝之戊戌以左龍武大將軍哥舒曜為東都汝州節度使將鳯翔邠寧涇原奉天好畤行營兵萬餘人討希烈又詔諸道共討之曜行至郟城遇希烈前鋒將陳利貞擊破之希烈勢小泹曜翰之子也希烈使其將封有麟據鄧州南路遂絶貢獻商旅皆不通壬寅詔治上津山路置郵驛二月丙寅以河陽三城懷衛州為河陽軍丁卯哥舒曜克汝州擒周晃三月戊寅江西節度使曹王臯敗李希烈將韓霜露於黃梅斬之辛卯拔黃州時希烈兵柵蔡山險不可攻臯聲言西取蘄州引舟師泝江而上希烈之將引兵循江隨戰去蔡山三百餘里臯乃復放舟順流而下急攻蔡山拔之希烈兵還救之不及而敗臯遂進拔蘄州表伊慎為蘄州刺史王鍔為江州刺史淮寧都虞候周曽鎮遏兵馬使王玢押牙姚憺韋清密輸欵於李勉李希烈遣曽與十將康秀琳將兵三萬攻哥舒曜至襄城曽等密謀還軍襲希烈奉顔真卿為節度使使玢憺清為內應希烈知之遣别將李克誠將騾軍三千人襲曽等殺之并殺玢憺及其黨甲午詔贈曽等官始韋清與曽等約事泄不相引故獨得免清恐終及禍說希烈請詣朱滔乞師希烈遣之行至襄邑逃奔劉洽希烈聞周曽等有變閉壁數日其黨寇尉氏鄭州者聞之亦遁歸希烈乃上表歸咎於周曽等引兵還蔡州外示悔過從順實待朱滔等之援也置顔真卿於龍興寺丁酉荆南節度使張伯儀與淮寧兵戰於安州官軍大敗伯儀僅以身免亡其所持節希烈使人以其節及俘馘示顔真卿真卿號慟投地絶而復蘇自是不復與人言夏四月上以神策軍使白志貞為京城召募使募禁兵以討李希烈志貞請諸嘗為節度觀察都團練使者不問存沒竝勒其子弟帥奴馬自備資裝從軍授以五品官貧者甚苦之人心始搖庚申加永平宣武河陽都統李勉淮西招討使東都汝州節度使哥舒曜為之副以荆南節度使張伯儀為淮西應援招討使山南東道節度使賈耽江西節度使曹王臯為之副上督哥舒曜進兵曜至潁橋遇大雨還保襄城李希烈遣其將李光輝攻襄城曜擊却之五月乙未以宣武節度使劉洽兼淄青招討使李晟謀取涿莫二州以絶幽魏往來之路與張孝忠之子升雲圍朱滔所署易州刺史鄭景濟於清苑纍月不下滔以其司武尚書馬實為留守將步騎萬餘守魏營自將步騎萬五千救清苑李晟軍大敗退保易州滔還軍瀛州張升雲奔滿城會晟病甚引軍還保定州王武俊以滔既破李晟留屯瀛州未還魏橋遣其給事中宋端趣之端見滔言頗不遜滔怒使謂武俊曰滔以熱疾暫未南還大王二兄遽有云云滔以救魏博之故叛君棄兄如脫屣耳二兄必相疑惟二兄所為端還報武俊自辨於馬實實以狀白滔言趙王知宋端無禮於大王深加責讓實無它志武俊亦遣承令官鄭和隨實使者見滔謝之滔乃恱相待如初然武俊以是益恨滔矣六月李抱真使參謀賈林詣武俊壁詐降武俊見之林曰林來奉詔非降也武俊色動問其故林曰天子知大夫宿著誠效及登壇之日撫膺顧左右曰我本徇忠義天子不察諸將亦嘗共表大夫之志天子語使者曰朕前事誠誤悔之無及朋友失意尚可謝况朕為四海之主乎武俊曰僕胡人也為將尚知愛百姓况天子豈専以殺人為事乎今山東連兵暴骨如莽就使克捷與誰守之僕不憚歸國但已與諸鎮結盟胡人性直不欲使曲在己天子誠能下詔赦諸鎮之罪僕當首唱從化諸鎮有不從者請奉辭伐之如此則上不負天子下不負同列不過五旬河朔定矣使林還報抱真隂相約結庚戌初行稅間架除陌錢法時河東澤潞河陽朔方四軍屯魏縣神策永平宣武淮南浙西荆南江泗沔鄂湖南黔中劔南嶺南諸軍環淮寧之境舊制諸道軍出境則仰給度支上優恤士卒每出境加給酒肉本道糧仍給其家一人兼三人之給故將士利之各出軍才逾境而止月費錢百三十餘萬緡常賦不能供判度支趙贊乃奏行二法所謂稅間架者每屋兩架為間上屋稅錢二千中稅千下稅五百吏執筆操算入人室廬計其數或有宅屋多而無它資者出錢動數百緡敢匿一間杖六十賞告者錢五十緡所謂除陌錢者公私給與及賣買每緡官留五十錢它物及相貿易者約錢為率敢隱錢百杖六十罰錢二千賞告者錢十緍其賞錢皆出坐事之家於是愁怨之聲盈於逺近秋八月丁未李希烈將兵三萬圍哥舒曜於襄城詔李勉及神策將劉德信將兵救之乙卯希烈將曹季昌以隨州降尋復為其將康叔夜所殺初上在東宫聞監察御史嘉興陸贄名即位召為翰林學士數問以得失時兩河用兵久不決賦役日滋贄以兵窮民困恐别生內變乃上奏其略曰克敵之要在乎將得其人馭將之方在乎操得其柄將非其人者兵雖衆不足恃操失其柄者將雖材不為用又曰將不能使兵國不能馭將非止費財玩寇之弊亦有不戢自焚之災又曰今兩河淮西為叛亂之帥者獨四五凶人而已尚恐其中或傍遭詿誤內蓄危疑蒼黃失圖勢不得止況其餘衆蓋並脅從茍知全生豈願為惡又曰無紓目前之虞或興意外之患人者邦之本也財者人之心也其心傷則其本傷其本傷則枝幹顛瘁矣又曰人搖不寧事變難測是以兵貴拙速不尚巧遲若不靖於本而務救於末則救之所為乃禍之所起也又論關中形勢以為王者蓄威以昭德偏廢則危居重以馭輕倒持則悖王畿者四方之本也太宗列置府兵分隸禁衛大凡諸府八百餘所而在關中者殆五百焉舉天下不敵關中則居重馭輕之意明矣承平漸久武僃浸微雖府衛具存而卒乘罕習故祿山竊倒持之柄乘外重之資一舉滔天兩京不守尚賴西邊有兵諸廄有馬每州有糧故肅宗得以中興乾元之後繼有外虞悉師東討邉僃既弛禁戎亦空吐蕃乘虛深入為冦故先皇帝莫與為禦避之東逰是皆失居重馭輕之權忘深根固柢之慮內冦則崤函失險外侵則汧渭為戎于斯之時雖有四方之師寧救一朝之患陛下追想及此豈不為之寒心哉今朔方太原之衆逺在山東神策六軍之兵繼出關外儻有賊臣啖冦黠虜覷邉伺隙乘虛微犯亭障此愚臣所竊憂也未審陛下其何以禦之側聞伐叛之初議者多易其事僉謂有征無戰役不逾時計兵未甚多度費未甚廣於事為無擾於人為不勞曽不料兵連禍拏變故難測日引月長漸乖始圖往歲為天下所患咸謂除之則可致升平者李正己李寶臣梁崇義田恱是也往歲謂國家所信咸謂任之則可除禍亂者朱滔李希烈是也既而正已死李納繼之寶臣死惟嶽繼之崇義卒希烈叛惟嶽戮朱滔攜然則往歲之所患者四去其三矣而患竟不衰往歲之所信者今則自叛矣而餘又難保是知立國之安危在勢任事之濟否在人勢茍安則異類同心也勢茍危則舟中敵國也陛下豈可不追鑒往事惟新令圖修偏廢之柄以靖人復倒持之權以固國而乃孜孜汲汲極思勞神徇無己之求望難必之效乎今關輔之間徴發已甚宫苑之內僃衛不全萬一將帥之中又如朱滔希烈或負固邉壘誘致豺狼或竊發郊畿驚犯城闕此亦愚臣所竊為憂者也未審陛下復何以僃之陛下儻過聽愚計所遣神策六軍李晟等及節將子弟悉可追還明敕涇隴邠寧但令嚴僃封守仍云更不徴發使知各保安居又降德音罷京城及畿縣間架等雜稅則冀已輸者弭怨見處者獲寧人心不搖邦本自固上不能用九月丙戌神策將劉德信宣武將唐漢臣與淮寧將李克誠戰敗於滬澗時李勉遣漢臣將兵萬人救襄城上遣德信帥諸將家應募者三千人助之勉奏李希烈精兵皆在襄城許州空虛若襲許州則襄城圍自解遣二將趣許州未至數十里上遣中使責其違詔二將狼狽而返無復斥候克誠伏兵邀之殺傷太半漢臣奔大梁德信奔汝州希烈逰兵剽掠至伊闕勉復遣其將李堅帥四千人助守東都希烈以兵絶其後堅軍不得還汴軍由是不振襄城益危上以諸軍討淮寧者不相統一庚子以舒王謨為荆襄等道行營都元帥更名誼以户部尚書蕭復為長史右庶子孔巢父為左司馬諫議大夫樊澤為右司馬自餘將佐皆選中外之望未行㑹涇師作亂而止復嵩之孫巢父孔子三十七丗孫也上發涇原等諸道兵救襄城冬十月丙午涇原節度使姚令言將兵五千至京師軍士冒雨寒甚多攜子弟而來冀得厚賜遺其家既至一無所賜丁未發至滻水詔京兆尹王翃犒師惟糲食菜餤衆怒蹴而覆之因揚言曰吾輩將死於敵而食且不飽安能以微命拒白刃邪聞瓊林大盈二庫金帛盈溢不如相與取之乃擐甲張旗鼓譟還趣京城令言入辭尚在禁中聞之馳至長樂阪遇之軍士射令言令言抱馬鬛突入亂兵呼曰諸君失計東征立功何患不富貴乃為族滅之計乎軍士不聽以兵擁令言而西上遽命賜帛人二匹衆益怒射中使又命中使宣慰賊已至通化門外中使出門賊殺之又命出金帛二十車賜之賊已入城喧聲浩浩不復可遏百姓狼狽駭走賊大呼告之曰汝曹勿恐不奪汝商貨僦質矣不稅汝間架陌錢矣上遣普王誼翰林學士姜公輔出慰諭之賊已陳於丹鳳門外小民聚觀者以萬計初神策軍使白志貞掌召募禁兵東征死亡者志貞皆隱不以聞但受市井富兒賂而補之名在軍籍受給賜而身居市㕓為販鬻司農卿假秀實上言禁兵不精其數全少卒有患難將何待之不聽至是上召禁兵以禦賊竟無一人至者賊已斬關而入上乃與王貴妃韋淑妃太子諸王唐安公主自苑北門出王貴妃以傳國寶繫衣中以從後宫諸王公主不及從者什七八初魚朝恩既誅宦官不復典兵有竇文場霍仙鳴者嘗事上於東宫至是帥宦官左右僅百人以從使普王誼前驅太子執兵以殿司農卿郭曙以部曲數十人獵苑中聞蹕謁道左遂以其衆從曙曖之弟也右龍武軍使令狐建方教射於軍中聞之帥麾下四百人從乃使建居後為殿姜公輔叩馬言曰朱泚嘗為涇帥坐弟滔之故廢處京師心嘗怏怏臣嘗謂陛下既不能推心待之則不如殺之毋貽後患今亂兵若奉以為主則難制矣請召使從行上倉猝不暇用其言曰無及矣遂行夜至咸陽飯數匕而過時事出非意羣臣皆不知乘輿所之盧杞關播踰中書垣而出白志貞王翃及御史大夫于頎中丞劉從一户部侍郎趙贊翰林學士陸贄吳通微等追及上於咸陽頎頔之從父兄弟從一齊賢之從孫也賊入宫登含元殿大呼曰天子已出宜人自求富遂歡噪爭入府庫運金帛極力而止小民因之亦入宫盜庫物出而復入通夕不已其不能入者剽奪於路諸坊居民各相帥自守姚令言與亂兵謀曰今衆無主不能持久朱太尉間居私第請相與奉之衆許諾乃遣數百騎迎朱泚於晉昌里第夜半泚按轡列炬傳呼入宫居含元殿設警嚴自稱權知六軍戊申旦泚徙居白華殿出榜於外稱涇原將士久處邉陲不間朝禮輒入宫闕致驚乘輿西出巡幸太尉已權臨六軍應神策等軍士及文武百官凡有祿食者悉詣行在不能往者即詣本司若出三日檢勘彼此無名者皆斬於是百官出見泚或勸迎乘輿泚不悅百官稍稍遁去源休以使回紇還賞薄怨朝廷入見泚屏人密語移時為泚陳成敗引符命勸之僣逆泚喜然猶未決宿衛諸軍舉白幡降者列於闕前甚衆泚夜於苑門出兵旦自通化門入絡驛不絶張弓露刃欲以威衆上思桑道茂之言自咸陽幸奉天縣僚聞車駕猝至欲逃匿山谷主簿蘇棄止之棄良嗣之兄孫也文武之臣稍稍繼至己酉左金吾大將軍渾瑊至奉天瑊素有威望衆心恃之稍安庚戌源休勸朱泚禁十城門毋得出朝士朝士往往易服為傭僕潜出休又為泚說誘文武之士使之附泚檢校司空同平章事李忠臣久失兵柄太僕卿張光晟自負其才皆鬱鬱不得志泚悉起而用之工部侍郎蔣鎮出亡墜馬傷足為泚所得先是休以才能光晟以節義鎮以清素都官員外郎彭偃以文學太常卿敬釭以勇略皆為時人所重至是皆為泚用鳯翔涇原將張廷芝假誠諫將數千人救襄城未出潼關聞朱泚據長安殺其大將隴右兵馬使戴蘭潰歸於泚泚於是自謂衆心所歸反謀遂定以源休為京兆尹判度支李忠臣為皇城使百司供億六軍宿衛咸擬乘輿辛亥以渾瑊為京畿渭北節度使行在都虞候白志貞為都知兵馬使令狐建為中軍鼓角使以神策都虞候侯仲莊為左衛將軍兼奉天防城使朱泚以司農卿假秀實久失兵柄意其必怏怏遣數十騎召之秀實閉門拒之騎士踰垣入劫之以兵秀實自度不免乃謂子弟曰國家有患吾於何避之當以死徇社稷汝曹宜人自求生乃往見泚泚喜曰假公來吾事濟矣延坐問計秀實說之曰公本以忠義著聞天下今涇軍以犒賜不豐遽有披猖使乘輿播越夫犒賜不豐有司之過也天子安得知之公宜以此開諭將士示以禍福奉迎乘輿復歸宫闕此莫大之功也泚默然不悅然以秀實與已皆為朝廷所廢遂推心委之左驍衛將軍劉海賔涇原都虞候何明禮孔目官岐靈嶽皆秀實素所厚也秀實密與之謀誅泚迎乘輿上初至奉天詔徴近道兵入援有上言朱泚為亂兵所立且來攻城宜早修守僃盧杞切齒言曰朱泚忠貞羣臣莫及奈何言其從亂傷大臣心臣請以百口保其不反上亦以為然又聞羣臣勸泚奉迎乃詔諸道援兵至者皆營於三十里外姜公輔諫曰今宿衛單寡防慮不可不深若泚竭忠奉迎何憚於兵多如其不然有僃無患上乃悉召援兵入城盧杞及白志貞言於上曰臣觀朱泚心迹必不至為逆願擇大臣入京城宣慰以察之上以問從臣皆畏憚莫敢行金吾將軍吳溆獨請行上恱溆退而告人曰食其祿而違其難何以為臣吾幸託胏胕非不知往必死但舉朝無蹈難之臣使聖情慊慊耳遂奉詔詣泚泚反謀已決雖陽為受命館溆於客省尋殺之溆湊之兄也泚遣涇原兵馬使韓旻將鋭兵三千聲言迎大駕實襲奉天時奉天守僃單弱假秀實謂岐靈嶽曰事急矣使靈嶽詐為姚令言符令旻且還當與大軍俱發竊令言印未至秀實倒用司農印印符募善走者追之旻至駱驛得符而還秀實謂同謀曰旻來吾屬無類矣我當直搏泚殺之不克則死終不能為之臣也乃令劉海賔何朋禮隂結軍中之士欲使應之於外旻兵至泚令言大驚岐靈嶽獨承其罪而死不以及秀實等是日泚召李忠臣源休姚令言及秀實等議稱帝事秀實勃然起奪休象笏前唾泚面大罵曰狂賊吾恨不斬汝萬假豈從汝反邪因以笏擊泚泚舉手扞之才中其額濺血灑地泚與秀實相搏恟恟左右猝愕不知所為海賔不敢進乘亂而逸忠臣前助泚泚得匍匐脫走秀實知事不成謂泚黨曰我不同汝反何不殺我衆爭前殺之泚一手承血一手止其衆曰義士也勿殺秀實已死泚哭之甚哀以三品禮葬之海賔縗服而逃後二日捕得殺之亦不引何明禮明禮從泚攻奉天復謀殺泚亦死上聞秀實死恨委用不至涕泗久之鳯翔節度使同平章事張鎰性儒緩好修飾邉幅不習軍事聞上在奉天欲迎大駕具服用貨財獻于行在後營將李楚琳為人剽悍軍中畏之嘗事朱泚為泚所厚行軍司馬齊映與同幕齊抗言於鎰曰不去楚琳必為亂首鎰命楚琳出屯隴州楚琳託事不時發鎰方以迎駕為憂謂楚琳已去矣楚琳夜與其黨作亂鎰縋城而走賊追及殺之判官王沼等皆死映自水竇出抗為傭保負荷而逃皆免始上以奉天迫隘欲幸鳯翔户部尚書蕭復聞之遽請見曰陛下大誤鳯翔將卒皆朱泚故部曲其中必有與之同惡者臣尚憂張鎰不能久豈得以鑾輿蹈不測之淵乎上曰吾行計已決試為卿留一日明日聞鳯翔亂乃止齊映齊抗皆詣奉天以映為御史中丞抗為侍御史楚琳自為節度使降于朱泚隴州刺史郝通奔于楚琳朱泚自白華殿入宣政殿自稱大秦皇帝改元應天癸丑泚以姚令言為侍中關內元帥李忠臣為司空兼侍中源休為中書侍郎同平章事判度支蔣鎮為吏部待郎樊系為禮部侍郎彭偃為中書舍人自餘張光晟等各拜官有差立弟滔為皇太弟姚令言與源休共掌朝政凡泚之謀畫遷除軍旅資糧皆禀於休休勸泚誅剪宗室在京城者以絶人望殺郡王王子王孫凡七十七人尋又以蔣鎮為門下侍郎李子平為諫議大夫竝同平章事鎮憂懼每懷刀欲自殺又欲亡竄然性怯竟不果源休勸泚誅朝士之竄匿者以脅其餘鎮力救之賴以全者甚衆樊系為泚撰冊文既成仰藥而死大理卿膠水蔣沇詣行在為賊所得逼以官沇絶食稱病潜竄得免哥舒曜食盡棄襄城奔洛陽李希烈陷襄城右龍武將軍李觀將衛兵千餘人從上於奉天上委之召募數日得五千餘人列之通衢旗鼓嚴整城人為之增氣姚令言之東出也以兵馬使京兆馮河清為涇原留後判官河中姚况知涇州事河清况聞上幸奉天集將士大哭激以忠義發甲兵器械百餘車通夕輸行在城中方苦無甲兵得之士氣大振詔以河清為四鎮北庭行營涇原節度使况為行軍司馬上至奉天數日右僕射同平章事崔寧始至上喜甚撫勞有加寧退謂所親曰主上聰明英武從善如流但為盧𣏌所惑以至於此因澘然出涕杞聞之與王翃謀陷之翃言於上曰臣與寧俱出京城寧數下馬便液久之不至有顧望意會朱泚下詔以左丞栁渾同平章事寧為中書令渾襄陽人也時亡在山谷翃使盩厔尉康湛詐為寧遺朱泚書獻之杞因譛寧與朱泚結盟約為內應故獨後至乙卯上遣中使引寧就幕下云宣密㫖二力士自後縊殺之中外皆稱其寃上聞之乃赦其家朱泚遣使遺朱滔書稱三秦之地指日克平大河之北委卿除殄當與卿會于洛陽滔得書西向舞蹈宣示軍府移牒諸道以自誇大上遣中使告難於魏縣行營諸將相與慟哭李懷光帥衆赴長安馬燧李芁各引兵歸鎮李抱真退屯臨洺朱泚自將逼奉天軍勢甚盛以姚令言為元帥張光晟副之以李忠臣為京兆尹皇城留守仇敬忠為同華等州節度使拓東土以扞關東之師李日月為西道先鋒經略使邠寧留後韓逰瓌慶州刺史論惟明監軍翟文秀受詔將兵三千拒泚於便橋與泚遇於醴泉逰瓌欲還趣奉天文秀曰我向奉天賊亦隨至是引賊以迫天子也不若留壁於此賊必不敢越我向奉天若不顧而過則與奉天夾攻之逰瓌曰賊彊我弱若賊分軍以綴我直趣奉天奉天兵亦弱何夾攻之有我今急趣奉天所以衛天子也且吾士卒飢寒而賊多財彼以利誘吾卒吾不能禁也遂引兵入奉天泚亦隨至官軍出戰不利泚兵爭門欲入渾瑊與逰瓌血戰竟日門內有草車數乘瑊使虞候髙固帥甲士以長刀斫賊皆一當百曳車塞門縱火焚之衆軍乘火擊賊賊乃退會夜泚營於城東三里擊柝張火布滿原野使西明寺僧法堅造攻具毁佛寺以為梯衝韓逰瓌曰寺材皆乾薪但具火以待之固侃之玄孫也泚自是日來攻城瑊逰瓌等晝夜力戰幽州兵救襄城者聞泚反突入潼關歸泚於奉天普潤戍卒亦歸之有衆數萬上與陸贄語及亂故深自克責贄曰致今日之患皆羣臣之罪也上曰此亦天命非由人事贄退上疏以為陛下志一區宇四征不庭凶渠稽誅逆將繼亂兵連禍結行及三年徴師日滋賦斂日重內自京邑外泊邉陲行者有鋒刃之憂居者有誅求之困是以叛亂繼起怨讟並興非常之虞億兆同慮唯陛下穆然凝邃獨不得聞至使凶卒鼓行白晝犯闕豈不以乘我間隙因人攜離哉陛下有股肱之臣有耳目之任有諫諍之列有僃衛之司見危不能竭其誠臨難不能效其死臣所謂致今日之患羣臣之罪者豈徒言歟聖㫖又以國家興衰皆有天命臣聞天所視聽皆因於人故祖伊責紂之辭曰我生不有命在天武王數紂之罪曰乃曰吾有命罔懲其侮此又捨人事而推天命必不可之理也易曰視履考祥又曰吉凶者失得之象此乃天命由人其義明矣然則聖哲之意六經會通皆謂禍福由人不言盛衰有命蓋人事理而天命降亂者未之有也人事亂而天命降康者亦未之有也自頃征討頗頻刑網稍密物力竭耗人心驚疑如居風濤洶洶靡定上自朝列下逹蒸黎日夕族黨聚謀咸憂必有變故旋屬涇原叛卒果如衆庶所虞京師之人動逾億計固非悉知算術皆曉占書則明致寇之由未必盡關天命臣聞理或生亂亂或資理有以無難而失守有因多難而興邦今生亂失守之事則既往不可復追矣其資理興邦之業在陛下克勵而謹修之何憂乎亂人何畏乎厄運勤勵不息足致升平豈止蕩滌祓氛旋復宫闕而已田恱說王武俊使與馬實共擊李抱真於臨洺抱真復遣賈林說武俊曰臨洺兵精而有僃未易輕也今戰勝得地則利歸魏博不勝則恆冀大傷易定滄趙皆大夫之故地也不如先取之武俊乃辭恱與馬實北歸壬戌恱送武俊於館陶執手泣别下至將士贈遺甚厚先是武俊召回紇兵使絶李懷光等糧道懷光等已西去而回紇逹干將回紇千人雜虜二千人適至幽州北境朱滔因說之欲與俱詣河南取東都應接朱泚許以河南子女金帛賂之滔娶回紇女為側室回紇謂之朱郎且利其俘掠許之賈林復說武俊曰自古國家有患未必不因之更興況主上九葉天子聰明英武天下誰肯捨之共事朱泚乎滔自為盟主以來輕蔑同列河朔古無冀國冀乃大夫之封域也今滔稱冀王又西倚其兄北引回紇其志欲盡吞河朔而王之大夫雖欲為之臣不可得矣且大夫雄勇善戰非滔之比又本以忠義手誅叛臣當時宰相處置失宜為滔所誑誘故蹉跌至此不若與昭義併力取滔其勢必獲滔既亡則泚自破矣此不丗之功轉禍為福之道也今諸道輻湊攻泚不日當平天下已定大夫乃悔而歸國則已晚矣時武俊已與滔有隙因攘袂作色曰二百年天子吾不能臣豈能臣此田舍兒乎遂密與抱真及馬燧相結約為兄弟然猶外事滔禮甚謹與田恱各遣使見滔於河間賀朱泚稱尊號且請馬實之兵共攻康日知於趙州汝鄭應援使劉德信將子弟軍在汝州聞難引兵入援與泚衆戰於見子陵破之以東渭橋有轉輸積粟癸亥進屯東渭橋朱泚夜攻奉天東西南三面甲子渾瑊力戰却之左龍武大將軍吕希倩戰死乙丑泚復攻城將軍髙重捷與泚將李日月戰於梁山之隅破之乘勝逐北身先士卒賊伏兵擒之其麾下十餘人奮不顧死追奪之賊不能拒乃斬其首棄其身而去麾下收之入城上親撫而哭之盡哀結蒲為首而葬之贈司空朱泚見其首亦哭之曰忠臣也束蒲為身而葬之李日月泚之驍將也戰死於奉天城下泚歸其尸於長安厚葬之其母竟不哭罵曰奚奴國家何負於汝而反死已晚矣及泚敗賊黨皆族誅獨日月之母不坐己巳加渾瑊京畿渭南北金商節度使壬申王武俊與馬實至趙州城下初朱泚鎮鳳翔遣其將牛雲光將幽州兵五百人戍隴州以隴右營田判官韋臯領隴右留後及郝通奔鳳翔牛雲光詐疾欲俟臯至伏兵執之以應泚事泄帥其衆奔泚至汧陽遇泚遣中使蘇玉齎詔書加臯中丞玉說雲光曰韋臯書生也君不如與我俱之隴州臯幸而受命乃吾人也不受命君以兵誅之如取孤㹠耳雲光從之臯從城上問雲光曰嚮者不告而行今而復來何也雲光曰嚮者未知公心今公有新命故復來願託腹心臯乃先納蘇玉受其詔書謂雲光曰大使茍無異心請悉納甲兵使城中無疑衆乃可入雲光以臯書生易之乃悉以甲兵輸之而入明日臯宴玉雲光及其卒於郡舍伏甲誅之築壇盟將士曰李楚琳賊虐本使既不事上安能恤下宜相與討之遣兄平弇詣奉天復遣使求援於吐蕃十一月乙亥以隴州為奉義軍擢臯為節度使泚又使中使劉海廣許臯鳯翔節度使臯斬之靈武留後杜希全鹽州剌史戴休顔夏州剌史時常春㑹渭北節度使李建徽合兵萬人入援將至奉天上召將相議道所從出關播渾瑊曰漠谷道險狹恐為賊所邀不若自乾陵北過附柏城而行營於城東北雞子堆與城中掎角相應且分賊勢盧杞曰漠谷路近若為賊所邀則城中出兵應接可也儻出乾陵恐驚陵寢瑊曰自泚圍城斬乾陵松柏以夜繼晝其驚多矣今城中危急諸道救兵未至唯希全等來所繫非輕若得營據要地則泚可破也杞曰陛下行師豈比逆賊若令希全等過之是自驚陵寢上乃命希全等自漠谷進丙子希全等軍至漠谷果為賊所邀乘髙以大弩巨石擊之死傷甚衆城中出兵應接為賊所敗是夕四軍潰退保邠州泚閲其輜重於城下從官相視失色休顔夏州人也泚攻城益急穿塹環之泚移帳於乾陵下視城中動靜皆見之時遣使環城招誘士民笑其不識天命神策河北行營節度使李晟疾愈聞上幸奉天帥衆將奔命張孝忠迫於朱滔王武俊倚晟為援不欲晟行數沮止之晟乃留其子憑使娶孝忠女為婦又解玉帶賂孝忠親信使說之孝忠乃聽晟西歸遣大將楊榮國將鋭兵六百與晟俱晟引兵出飛狐道晝夜兼行至代州丁丑加晟神策行營節度使王武俊馬實攻趙州不克辛巳實歸瀛州武俊送之五里犒贈甚厚武俊亦歸恆州朱泚攻圍奉天經月城中資糧俱盡上嘗遣健步出城覘賊其人懇以苦寒為辭跪奏乞一襦袴上為之尋求不獲意憫默而遣之時供御才有糲米二斛每伺賊之休息夜縋人於城外采蕪菁根而進之上召公卿將吏謂曰朕以不德自陷危亡固其宜也公輩無罪宜早降以救室家羣臣皆頓首流涕期盡死力故將士雖困急而鋭氣不衰上之幸奉天也糧料使崔縱勸李懷光令入援懷光從之縱悉斂軍資與懷光偕來懷光晝夜倍道至河中力疲休兵三日河中尹李齊運傾力犒宴軍士尚欲遷延崔縱先輦貨財度河謂衆曰至河西悉以分賜衆利之西屯蒲城有衆五萬齊運惲之孫也李晟行且收兵亦自蒲津濟軍於東渭橋其始有卒四千晟善於撫御與士卒同甘苦人樂從之旬月間至萬餘人神策兵馬使尚可孤討李希烈將三千人在襄陽自武關入援軍于七盤敗泚將仇敬遂取藍田可孤宇文部之别種也鎮國軍副使駱元光其先安息人駱奉先養以為子將兵守潼關近十年為衆所服朱泚遣其將何望之襲華州刺史董晉棄州走行在望之據其城將聚兵以絶東道元光引關下兵襲望之走還長安元光遂軍華州召募士卒數日得萬餘人泚數遣兵攻元光元光皆擊却之賊由是不能東出上即以元光為鎮國軍節度使元光乃將兵二千西屯昭應馬燧遣其行軍司馬王權及其子彚將兵五千人入援屯中渭橋於是泚黨所據惟長安而已援軍逰騎時至望春樓下李忠臣等屢出兵皆敗求救於泚泚恐民間乘弊抄之所遣兵皆晝伏夜行泚內以長安為憂乃急攻奉天使僧法堅造雲梯髙廣各數丈裹以兕革下施巨輪上容壯士五百人城中望之忷懼上以問羣臣渾瑊侯仲莊對曰臣觀雲梯勢甚重重則易陷臣請迎其所來鑿地道積薪蓄火以待之神武軍使韓澄曰雲梯小伎不足上勞聖慮臣請禦之乃度梯之所傃廣城東北隅三十步多儲膏油松脂薪葦於其上丁亥泚盛兵鼓譟攻南城韓逰瓌曰此欲分吾力也乃引兵嚴僃東北戊子北風甚迅泚推雲梯上施濕羶懸水囊載壯士攻城翼以轒輼置人其下抱薪負土填塹而前矢石火炬所不能傷賊併兵攻城東北隅矢石如雨城中死傷者不可勝數賊已有登城者上與渾瑊對泣羣臣惟仰首祝天上以無名告身自御史大夫實食五百户以下千餘通授瑊使募敢死士禦之仍賜御筆使視其功之大小書名給之告身不足則書其身且曰今便與卿别瑊俯伏流涕上拊其背歔欷不自勝時士卒凍餒又乏甲胄瑊撫諭激以忠義皆鼓譟力戰瑊中流矢進戰不輟初不言痛會雲梯輾地道一輪偏陷不能前却火從地中出風勢亦回城上人投葦炬散松脂沃以膏油歡呼震地須臾雲梯及梯上皆為灰燼臭聞數里賊乃引退於是三門皆出兵太子親督戰賊徒大敗死者數千人將士傷者太子親為裹瘡入夜泚復來攻城矢及御前三步而墜上大驚李懷光自蒲城引兵趣涇陽並北山而西先遣兵馬使張韶微服間行詣行在藏表於蠟丸韶至奉天值賊方攻城見韶以為賤人驅之使與民俱填塹韶得間踰塹抵城下呼曰我朔方軍使者也城上人下繩引之比登身中數十矢得表於衣中而進之上大喜舁韶以徇城四隅歡聲如雷癸巳懷光敗泚兵於醴泉泚聞之懼引兵遁歸長安衆以為懷光復三日不至則城不守矣泚既退從臣皆賀汴滑行營兵馬使賈隱林進言曰陛下性太急不能容物若此性未改雖朱泚敗亡憂未艾也上不以為忤甚稱之侍御史万俟著開金商運路重圍既解諸道貢賦繼至用度始振朱泚至長安但為城守之計時遣人自城外來周走呼曰奉天破矣欲以惑衆泚既據府庫之富不愛金帛以恱將士公卿家屬在城者皆給月俸神策及六軍從車駕及哥舒曜李晟者泚皆給其家糧加以繕完器械日費甚廣及長安平府庫尚有餘蓄見者皆追怨有司之暴斂焉或謂泚曰陛下既受命唐之陵廟不宜復存泚曰朕嘗北面事唐豈忍為此又曰百官多缺請以兵脅士人補之泚曰强授之則人懼但欲仕者則與之何必叩户拜官邪泚所用者惟范陽神策團練兵涇原卒驕皆不為用但守其所掠資貨不肯出戰又密謀殺泚不果而止李懷光性粗踈自山東來赴難數與人言盧𣏌趙贊白志貞之姦佞且曰天下之亂皆此曹所為也吾見上當請誅之既解奉天之圍自矜其功謂上必接以殊禮或說王翃趙贊曰懷光緣道憤歎以為宰相謀議乖方度支賦斂煩重京尹犒賜刻薄致乘輿播遷者三臣之罪也今懷光新立大功上必披襟布誠詢訪得失使其言入豈不殆哉翃贊以告盧杞杞懼從容言於上曰懷光勳業社稷是賴賊徒破膽皆無守心若使之乘勝取長安則一舉可以滅賊此破竹之勢也今聽其入朝必當賜宴留連纍日使賊入京城得從容成僃恐難圖矣上以為然詔懷光直引軍屯便橋與李建徽李晟及神策兵馬使楊惠元刻期共取長安懷光自以數千里竭誠赴難破朱泚解重圍而咫尺不得見天子意殊怏怏曰吾今已為姦臣所排事可知矣遂引兵去至魯店留二日乃行淮南節度使陳少逰將兵討李希烈屯盱眙聞朱泚作亂歸廣陵修塹壘繕甲兵浙江東西節度使韓滉閉關梁禁馬牛出境築石頭城穿井近百所繕館第數十修塢壁起建業抵京峴樓堞相屬以僃車駕度江且自固也少逰發兵三千大閲於江北滉亦發舟師三千曜武於京口以應之鹽鐵使包佶有錢帛八百萬將輸京師陳少逰以為賊據長安未期收復欲强取之佶不可少逰欲殺之佶懼匿妻子於案牘中急濟江少逰悉收其錢帛佶有守財卒三千少逰亦奪之佶才與數十人俱至上元復為韓滉所奪時南方藩鎮各閉境自守惟曹王臯數遣使間道貢獻李希烈攻逼汴鄭江淮路絶朝貢皆自宣饒荆襄趣武關臯治郵驛平道路由是往來之使通行無阻上問陸贄以當今切務贄以嚮日致亂由上下之情不通勸上接下從諫乃上疏其略曰臣謂當今急務在於審察羣情若羣情之所甚欲者陛下先行之所甚惡者陛下先去之欲惡與天下同而天下不歸者自古及今未之有也夫理亂之本繫於人心況乎當變故動搖之時在危疑向背之際人之所歸則植人之所去則傾陛下安可不審察羣情同其欲惡使億兆歸趣以靖邦家乎此誠當今之所急也又曰頃者竊聞輿議頗究羣情四方則患於中外意乖百辟又患於君臣道隔郡國之志不逹於朝廷朝廷之誠不升於軒陛上澤闕於下布下情壅於上聞實事不必知知事不必實上下否隔於其際真僞雜糅於其間聚怨囂囂騰謗籍籍欲無疑阻其可得乎又曰揔天下之智以助聰明順天下之心以施教令則君臣同志何有不從逺邇歸心孰與為亂又曰慮有愚而近道事有要而似迃疏奏旬日上無所施行亦不詰問贄又上疏其略曰臣聞立國之本在乎得衆得衆之要在乎見情故仲尼以謂人情者聖王之田言理道所生也又曰易乾下坤上曰泰坤下乾上曰否損上益下曰益損下益上曰損夫天在下而地處上於位乖矣而反謂之泰者上下交故也君在上而臣處下於義順矣而反謂之否者上下不交故也上約已而裕於人人必恱而奉上矣豈不謂之益乎上蔑人而肆諸已人必怨而叛上矣豈不謂之損乎又曰舟即君道水即人情舟順水之道乃浮違則沒君得人之情乃固失則危是以古先聖王之居人上也必以其欲從天下之心而不敢以天下之人從其欲又曰陛下憤習俗以妨理任削平而在躬以明威照臨以嚴法制斷流弊自久浚恆太深逺者驚疑而阻命逃死之亂作近者畏懾而偷容避罪之態生君臣意乖上下情隔君務致理而下防誅夷臣將納忠又上慮欺誕故睿誠不布於羣物物情不逹於睿聰臣於往年曽任御史獲奉朝謁僅欲半年陛下嚴邃髙居未嘗降㫖臨問羣臣局蹐趨退亦不列事奏陳軒墀之間且未相諭宇宙之廣何由自通雖復例對使臣别延宰輔既殊師錫且異公言未行者則戒以樞密勿論己行者又謂之遂事不諫漸生拘礙動涉猜嫌由是人各隱情以言為諱至於變亂將起億兆同憂獨陛下恬然不知方謂太平可致陛下以今日之所覩驗往時之所聞孰真孰虛何得何失則事之通塞僃詳之矣人之情僞盡知之矣上乃遣中使諭之曰朕本性甚好推誠亦能納諫將謂君臣一體全不隄防緣推誠信不疑多被姦人賣弄今所致患害朕思亦無它其失反在推誠又諫官論事少能慎密例自矜衒歸過於朕以自取名朕從即位以來見奏對論事者甚多大抵皆是雷同道聽塗說試加質問遽即辭窮若有竒才異能在朕豈惜拔擢朕見從前巳來事秪如此所以近來不多取次對人亦非倦於接納卿宜深悉此意贄以人君臨下當以誠信為本諫者雖辭情鄙拙亦當優容以開言路若震之以威折之以辨則臣下何敢盡言乃復上疏其略曰天子之道與天同方天不以地有惡木而廢發生天子不以時有小人而廢聽納又曰唯信與誠有失無𥙷一不誠則心莫之保一不信則言莫之行陛下所謂失於誠信以致患害者臣竊以斯言為過矣又曰馭之以智則人詐示之以疑則人偷上行之則下從之上施之則下報之若誠不盡於已而望盡於人衆必怠而不從矣不誠於前而曰誠於後衆必疑而不信矣是知誠信之道不可斯須而去身願陛下慎守而行之有加恐非所以為悔者也又曰臣聞仲虺贊揚成湯不稱其無過而稱其改過吉甫歌誦周宣不美其無闕而美其補闕是則聖賢之意較然著明唯以改過為能不以無過為貴蓋為人之行己必有過差上智下愚俱所不免智者改過而遷善愚者恥過而遂非遷善則其德日新遂非則其惡彌積又曰諫官不密自矜信非忠厚其於聖德固亦無虧陛下若納諫不違則傳之適足增美陛下若違諌不納又安能禁之勿傳又曰侈言無驗不必用質言當理不必違辭拙而效速者不必愚言甘而利重者不必智是皆考之以實慮之以終其用無它唯善所在又曰陛下所謂比見奏對論事皆是雷同道聽塗說者臣竊以衆多之議足見人情必有可行亦有可畏恐不宜一槩輕侮而莫之省納也陛下又謂試加質問即便辭窮者臣但以陛下雖窮其辭而未窮其理能服其口而未服其心又曰為下者莫不願忠為上者莫不求理然而下每苦上之不理上每苦下之不忠若是者何兩情不通故也下之情莫不願逹於上上之情莫不求知於下然而下恆苦上之難逹上恆苦下之難知若是者何九弊不去故也所謂九弊者上有其六而下有其三好勝人恥聞過騁辨給眩聰明厲威嚴恣彊愎此六者君上之弊也諂諛顧望畏愞此三者臣下之弊也上好勝必甘於佞辭上恥過必忌於直諫如是則下之諂諛者順㫖而忠實之語不聞矣上騁辨必勦說而折人以言上眩明必臆度而虞人以詐如是則下之顧望者自便而切磨之辭不盡矣上厲威必不能降情以接物上恣愎必不能引咎以受規如是則下之畏愞者避辜而情理之說不申矣夫以區域之廣大生靈之衆多宫闕之重深髙卑之限隔自黎獻而上獲覩至尊之光景者踰億兆而無一焉就獲覩之中得接言議者又千萬不一幸而得接者猶有九弊居其閒則上下之情所通鮮矣上情不通於下則人惑下情不通於上則君疑疑則不納其誠惑則不從其令誠而不見納則應之以悖令而不見從則加之以刑下悖上刑不敗何待是使亂多理少從古以然又曰昔趙武呐呐而為晉賢臣絳侯木訥而為漢元輔然則口給者事或非信辭屈者理或未窮人之難知堯舜所病胡可以一酬一詰而謂盡其能哉以此察天下之情固多失實以此輕天下之士必有遺才又曰諫者多表我之能好諫者直示我之能賢諫者之狂誣明我之能恕諫者之漏泄彰我之能從有一于斯皆為盛德是則人君之與諫者交相益之道也諫者有爵賞之利君亦有理安之利諫者得獻替之名君亦得采納之名然猶諫者有失中而君無不美唯恐讜言之不切天下之不聞如此則納諫之德光矣上頗采用其言􅊨李懷光頓兵不進數上表暴揚盧杞等罪惡衆論喧騰亦咎杞等上不得已十二月壬戌貶杞為新州司馬白志貞為恩州司馬趙贊為播州司馬宦官翟文秀上所信任也懷光又言其罪上亦為殺之乙丑以翰林學士祠部員外郎陸贄為考功郎中金部員外郎吳通微為職方郎中贄上奏辭以初到奉天扈從將吏例加兩階今翰林獨遷官夫行罰先貴近而後卑逺則令不犯行賞先卑逺而後貴近則功不遺望先録大勞次遍羣品則臣亦不敢獨辭上不許上在奉天使人說田恱王武俊李納赦其罪厚賂以官爵恱等皆密歸欵而猶未敢絶朱滔各稱王如故滔使其虎牙將軍王郅說恱曰日者八郎有急滔與趙王不敢愛其死竭力赴救幸而解圍今太尉三兄受命關中滔欲與回紇共往助之願八郎治兵與滔度河共取大梁恱心不欲行而未忍絶滔乃許之滔復遣其內史舍人李琯見恱審其可否恱猶豫不決密召扈崿等議之司武侍郎許士則曰朱滔昔事李懷仙為牙將與兄泚及朱希彩共殺懷仙而立希彩希彩所以寵信其兄弟至矣滔又與判官李子瑗謀殺希彩而立泚泚既為帥滔乃勸泚入朝而自為留後雖勸以忠義實奪之權也平生與之同謀共功如李子瑗之徒負而殺之者二十餘人今又與泚東西相應使滔得志泚亦不為所容况同盟乎滔為人如此大王何從得其肺腑而信之邪彼引幽陵回紇十萬之兵屯於郊坰大王出迎則成擒矣彼囚大王兼魏國之兵南向度河與關中相應天下其孰能當之大王於時悔之無及為大王計不若陽許偕行而隂為之僃厚加迎勞至則託以它故遣將分兵而隨之如此大王外不失報德之名而內無倉猝之憂矣扈崿等皆以為然王武俊聞李琯適魏遣其司刑員外郎田秀馳見恱曰武俊嚮以宰相處事失宜恐禍及身又八郎困於重圍故與滔合兵救之今天子方在隱憂以德綏我我曹何得不悔過而歸之邪捨九葉天子不事而事泚及滔乎且泚未稱帝之時滔與我曹比肩為王固己輕我曹矣況使之南平汴洛與泚連衡吾屬皆為虜矣八郎慎勿與之俱南但閉城拒守武俊請伺其隙連昭義之兵擊而滅之與八郎再清河朔復為節度使共事天子不亦善乎恱意遂決紿滔云從行必如前約丁卯滔將范陽步騎五萬人私從者復萬餘人回紇三千人發河間而南輜重首尾四十里李希烈攻李勉於汴州驅民運土木築壘道以攻城忿其未就并人填之謂之濕薪勉城守纍月外救不至將其衆萬餘人奔宋州庚午希烈陷大梁滑州刺史李澄以城降希烈希烈以澄為尚書令兼永平節度使勉上表請罪上謂其使者曰朕猶失守宗廟勉宜自安待之如初劉洽遣其將髙翼將精兵五千保襄邑希烈攻拔之翼赴水死希烈乘勝攻寧陵江淮大震陳少逰遣參謀溫述送欵於希烈曰濠夀舒廬己令弛僃韜戈卷甲伏俟指麾又遣巡官趙詵結李納於鄆州以給事中孔巢父為淄青宣慰使國子祭酒董晉為河北宣尉便陸贄言於上曰今盜遍天下輿駕播遷陛下宜痛自引過以感人心昔成湯以罪已勃興楚昭以善言復國陛下誠能不吝改過以言謝天下使書詔無所避忌臣雖愚陋可以仰副聖情庶令反側之徒革心向化上然之故奉天所下書詔雖驕將悍卒聞之無不感激揮涕術者上言國家厄運宜有變更以應時數羣臣請更加尊號一二字上以問陸贄贄上奏以為不可其略曰尊號之興本非古制行於安泰之曰已纍謙沖襲乎喪亂之時尤傷事體又曰嬴秦德衰兼皇與帝始揔稱之流及後代昏僻之君乃有聖劉天元之號是知人主輕重不在名稱損之有謙光稽古之善崇之獲矜能納諂之譏又曰必也俯稽術數須有變更與其增美稱而失人心不若黜舊號以祗天戒上納其言但改年號而已上又以中書所撰赦文示贄贄上言以為動人以言所感已淺言又不切人誰肯懷今兹德音悔過之意不得不深引咎之辭不得不盡洗刷疵垢宣暢鬱堙使人人各得所欲則何有不從者乎應須改革事條謹具别狀同進捨此之外尚有所虞竊以知過非難改過為難言善非難行善為難假使赦文至精止於知過言善猶願聖慮更思所難上然之興元元年春正月癸酉朔赦天下改元制曰致理興化必在推誠忘己濟人不吝改過朕嗣服丕構君臨萬邦失守宗祧越在草莽不念率德誠莫追於既往永言思咎期有復於將來明徴其義以示天下小子懼德不嗣罔敢怠荒然以長于深宫之中暗於經國之務積習易溺居安忘危不知稼穡之艱難不恤征戍之勞苦澤靡下究情未上通事既擁隔人懷疑阻猶昧省已遂用興戎徴師四方轉餉千里賦車籍馬逺近騷然行齎居送衆庶勞止或一日屢交鋒刃或連年不解甲胄祀奠乏主室家靡依死生流離怨氣凝結力役不息田萊多荒暴令峻於誅求疲氓空於杼軸轉死溝壑離去鄉閭邑里丘墟人煙斷絶天譴於上而朕不寤人怨於下而朕不知馴致亂階變興都邑萬品失序九廟震驚上纍于祖宗下負于蒸庶痛心靦貌罪實在豫永言愧悼若墜泉谷自今中外所上書奏不得更言聖神文武之號李希烈田恱王武俊李納等咸以勳舊各守藩維朕撫馭乖方致其疑懼皆由上失其道而下罹其災朕實不君人則何罪宜并所管將吏等一切待之如初朱滔雖緣朱泚連坐路逺必不同謀念其舊勳務在弘貸如能效順亦與惟新朱泚反易天常盜竊名器暴犯陵寢所不忍言獲罪祖宗朕不敢赦其脅從將吏百姓等但官軍未到京城以前去逆效順并散歸本道本軍者並從赦例諸軍諸道應赴奉天及進收京城將士並賜名奉天定難功臣其所加墊陌錢稅間架竹木茶漆榷鐡之類悉宜停罷赦下四方人心大恱及上還長安明年李抱真入朝為上言山東宣布赦書士卒皆感泣臣見人情如此知賊不足平也命兵部員外郎李充為恆冀宣慰使朱泚更國號曰漢自稱漢元天皇改元天皇王武俊田恱李納見赦令皆去王號上表謝罪惟李希烈自恃兵彊財富遂謀稱帝遣人問儀於顔真卿真卿曰老夫嘗為禮官所記惟諸侯朝天子禮耳希烈遂即皇帝位國號大楚改元武成置百官以其黨鄭賁為侍中孫廣為中書令李緩李元平同平章事以汴州為大梁府分其境內為四節度希烈遣其將辛景臻謂顔真卿曰不能屈節當自焚積薪灌油於其庭真卿趨赴火景臻遽止之希烈又遣其將楊峯齎赦賜陳少逰及夀州刺史張建封建封執峯徇於軍腰斬於市少逰聞之駭懼建封具以少逰與希烈交通之狀聞上恱以建封為濠夀廬三州都團練使希烈乃以其將杜少誠為淮南節度使使將步騎萬餘人先取夀州後之江都建封遣其將賀蘭元均邵怡守霍丘秋柵少誠竟不能過遂南寇蘄黃欲斷江路時上命包佶自督江淮財賦泝江詣行在至蘄口遇少誠入寇曺王臯遣蘄州刺史伊慎將兵七千拒之戰於永安戍大破之少誠脫身走斬首萬級包佶乃得前後佶入朝具奏陳少逰奪財賦事少逰懼厚斂所部以償之李希烈以夏口上流要地使其驍將董侍募死士七千人襲鄂州刺史李兼偃旗卧鼓閉門以待之侍撤屋材以焚門兼帥士卒出戰大破之上以兼為鄂嶽沔都團練使於是希烈東畏曹王臯西畏李兼不敢復有窺江淮之志矣朱滔引兵入趙境王武俊大具犒享入魏境田恱供承倍豐使者迎候相望於道丁丑滔至永濟遣王郅見恱約㑹館陶偕行度河恱見郅曰恱固願從五兄南行昨日將出軍將士勒兵不聽恱出曰國兵新破戰守踰年資儲竭矣今將士不免凍餒何以全軍逺征大王日自撫循猶不能安若捨城邑而去朝出暮必有變恱之志非敢有二也如將士何已令孟祐僃步騎五千從五兄供芻牧之役因遣其司禮侍郎裴抗等往謝滔滔聞之大怒曰田恱逆賊嚮在重圍命如絲髮使我叛君棄兄發兵晝夜赴之幸而得存許我貝州我辭不取尊我為天子我辭不受今乃負恩誤我逺來飾辭不出即日遣馬實攻宗城經城楊榮國攻冠氏皆拔之又縱回紇掠館陶頓幄奕器皿車牛以去恱閉城自守壬午滔遣裴抗等還分兵置吏守平恩永濟朱滔引兵北圍貝州引水環之剌史邢曹俊嬰城拒守縱范陽及回紇兵大掠諸縣又拔武城通德棣二州使給軍食遣馬實將步騎五千屯冠氏以逼魏州上於行宫廡下貯諸道貢獻之物榜曰瓊林大盈庫陸贄以為戰守之功賞賚未行而遽私别庫則士卒怨望無復鬬志上疏諫其略曰天子與天同德以四海為家何必撓廢公方崇聚私貨降至尊而代有司之守辱萬乘以效匹夫之藏虧法失人誘姦聚怨以斯制事豈不過哉又曰頃者六師初降百物無儲外扞凶徒內防危堞晝夜不息逮將五旬凍餒交侵死傷相枕畢命同力竟夷大艱良以陛下不厚其身不私其欲絶甘以同卒伍輟食以啖功勞無猛制而人不攜懷所感也無厚賞而人不怨悉所無也今者攻圍已解衣食已豐而謡讟方興軍情稍阻豈不以勇夫恆性嗜利矜功其患難既與之同憂而好樂不與之同利茍異恬默能無怨咨又曰陛下誠能近想重圍之殷憂追戒平居之専欲凡在二庫貨賄盡令出賜有功每獲珍華先給軍賞如此則亂必靖賊必平徐駕六龍旋復都邑天子之貴豈當憂貧是乃散其小儲而成其大儲損其小寶而固其大寶也上即命去其榜蕭復嘗言於上曰宦官自艱難已來多為監軍恃恩縱橫此屬但應掌宫掖之事不宜委以兵權國政上不恱又嘗言陛下踐祚之初聖德光被自用楊炎盧杞黷亂朝政以致今日陛下誠能變更睿志臣敢不竭力儻使臣依阿茍免臣實不能又嘗與盧杞同奏事杞順上㫖復正色曰盧杞言不正上愕然退謂左右曰蕭復輕朕戊子命復充山南東西荆湖淮南江西鄂嶽浙江東西福建嶺南等道宣慰安撫使實踈之也既而劉從一及朝士往往奏留復上謂陸贄曰朕思遷幸以來江淮逺方或傳聞過實欲遣重臣宣慰謀于宰相及朝士僉謂宜然今乃反覆如是朕為之悵恨纍日意復悔行使之論奏邪卿知蕭復如何人其不欲行意趣安在贄上奏以為復痛自修勵慕為清貞用雖不周行則可保至於輕詐如此復必不為借使復欲逗留從一安肯附會今所言矛楯願陛下明加辨詰若蕭復有所請求則從一何容為隱若從一自有回互則蕭復不當受疑陛下何憚而不辨明乃直為此悵恨也夫明則罔惑辨則罔冤惑莫甚於逆詐而不與明冤莫痛於見疑而不與辨是使情僞相揉忠邪靡分兹實居上御下之要樞惟陛下留意上亦竟不復辨也辛卯以王武俊為恆冀深趙節度使壬辰加李抱真張孝忠並同平章事丙申加田恱檢校右僕射以山南東道行軍司馬樊澤為本道節度使前深趙觀察使康日知為同州刺史李納為鄆州剌史平盧節度使戊戌加劉洽汴滑宋亳都統副使知都統事李勉悉以其衆授之二月戊申詔贈假秀實太尉諡曰忠烈厚恤其家時賈隱林已卒贈左僕射賞其能直言也李希烈將兵五萬圍寧陵引水灌之濮州刺史劉昌以三千人守滑州刺史李澄密遣使請降上許以澄為汴滑節度使澄猶外事希烈希烈疑之遣養子六百人戍白馬召澄共攻寧陵澄至石柱使其衆陽驚燒營而遁又諷養子令剽掠澄悉收斬之以白希烈希烈無以罪也劉昌守寧陵凡四十五日不釋甲韓滉遣其將王栖曜將兵助劉洽拒希烈栖曜以彊弩數千遊汴水夜入寧陵城明日從城上射希烈及其坐幄希烈驚曰宣潤弩手至矣遂解圍去朱泚既自奉天敗歸李晟謀取長安劉德信與晟俱屯東渭橋不受晟節制晟因德信至營中數以滬澗之敗及所過剽掠之罪斬之因以數騎馳入德信軍勞其衆無敢動者遂并將之軍勢益振李懷光既脅朝廷逐盧杞等內不自安遂有異志又惡李晟獨當一面恐其成功奏請與晟合軍詔許之晟與懷光會于咸陽西陳濤斜築壘未畢泚衆大至晟謂懷光曰賊若固守宫苑或曠日持久未易攻取今去其巢穴敢出求戰此天以賊賜明公不可失也懷光曰軍適至馬未秣士未飯豈可遽戰邪晟不得已乃就壁晟每與懷光同出軍懷光軍士多掠人牛馬晟軍秋豪不犯懷光軍士惡其異已分所獲與之晟軍終不敢受懷光屯咸陽纍月逗留不進上屢遣中使趣之辭以士卒疲弊且當休息觀釁諸將數勸之攻長安懷光不從密與朱泚通謀事迹頗露李晟屢奏恐其有變為所併請移軍東渭橋上猶冀懷光革心收其力用寢晟奏不下懷光欲緩戰期且激怒諸軍奏言諸軍糧賜薄神策獨厚厚薄不均難以進戰上以財用方窘若糧賜皆比神策則無以給之不然又逆懷光意恐諸軍觖望乃遣陸贄詣懷光營宣慰因召李晟參議其事懷光意欲晟自乞減損使失士心沮敗其功乃曰將士戰鬬同而糧賜異何以使之協力贄未有言數顧晟晟曰公為元帥得專號令晟將一軍受指蹤而已至於增減衣食公當裁之懷光默然又不欲自減之遂止時上遣崔漢衡詣吐蕃發兵吐蕃相尚結贊言蕃法發兵以主兵大臣為信今制書無懷光署名故不敢進上命陸贄諭懷光懷光固執以為不可曰若克京城吐蕃必縱兵焚掠誰能遏之此一害也前有敇㫖募士卒克城者人賞百緡彼發兵五萬若援敕求賞五百萬緡何從可得此二害也虜騎雖來必不先進勒兵自固觀我兵勢勝則從而分功敗則從而圖變譎詐多端不可親信此三害也竟不肯署敕尚結贊亦不進軍陸贄自咸陽還上言賊泚稽誅保聚宫苑勢窮援絶引日偷生懷光揔仗順之師乘制勝之氣鼓行芟翦易若摧枯而乃冦奔不追師老不用諸帥每欲進取懷光輒沮其謀據兹事情殊不可解陛下意在全護委曲聽從觀其所為亦未知感若不别務規略漸思制持唯以姑息求安終恐變故難測此誠事機危迫之秋也固不可以尋常容易處之今李晟奏請移軍適遇臣銜命宣慰懷光偶論此事臣遂泛問所宜懷光乃云李晟既欲别行某亦都不要藉臣猶慮有翻覆因美其軍盛彊懷光大自矜誇轉有輕晟之意臣又從容問云回日或聖㫖顧問事之可否決定何如懷光已肆輕言不可中變遂云恩命許去事亦無妨要約再三非不詳審雖欲追悔固難為辭伏望即以李晟表出付中書敕下依奏别賜懷光手詔示以移軍事由其手詔大意云昨得李晟奏請移軍城東以分賊勢朕本欲委卿商量適會陸贄回奏云見卿語及於此仍言許去事亦無妨遂敕本軍允其所請如此則詞婉而直理順而明雖蓄異端何由起怨上從之晟自咸陽結陳而行歸東渭橋時鄜坊節度使李建徽神策行營節度使楊惠元猶與懷光聮營陸贄復上奏曰懷光當管師徒足以獨制凶寇逗留未進抑有它由所患太彊不資傍助比者又遣李晟李建徽楊惠元三節度之衆附麗其營無益成功秪足生事何則四軍接壘羣帥異心論勢力則懸絶高卑據職名則不相統屬懷光輕晟等兵微位下而忿其制不從心晟等疑懷光養冦蓄姦而怨其事多陵已端居則互防飛謗欲戰則遞恐分功齟齬不和嫌釁遂構俾之同處必不兩全彊者惡積而後亡弱者勢危而先覆覆亡之禍翹足可期舊寇未平新患方起憂難所切實堪疚心太上消慝於未萌其次救失於始兆況乎事情已露禍難垂成委而不謀何以寧亂李晟見機慮變先請移軍就東建徽惠元勢轉孤弱為其吞噬理在必然它日雖有良圖亦恐不能自拔拯其危急唯在此時今因李晟願行便遣合軍同往託言晟兵素少慮為賊泚所邀藉此兩軍迭為掎角仍先諭㫖密使促裝詔書至營即日進路懷光意雖不欲然亦計無所施是謂先人有奪人之心疾雷不及掩耳者也解鬬不可以不離救焚不可以不疾理盡於此惟陛下圖之上曰卿所料極善然李晟移軍懷光不免悵望若更遣建徽惠元就東恐因此生辭轉難調息且更俟旬時辛酉加王武俊同平章事兼幽州盧龍節度使一李晟以為懷光反狀已明緩急宜有僃蜀漢之路不可壅請以禆將趙光銑等為洋利劒三州刺史各將兵五百以防未然上疑未决欲親揔禁兵幸咸陽以慰撫為名趣諸將進討或謂懷光曰此漢祖逰雲夢之策也懷光大懼反謀益甚上垂欲行懷光辭益不遜上猶疑讒人間之甲子加懷光太尉增實食賜鐡劵遣神策右兵馬使李卞等往諭㫖懷光對使者投鐵劵於地曰聖人疑懷光邪人臣反賜鐵劵懷光不反今賜鐵劵是使之反也辭氣甚悖朔方左兵馬使張名振當軍門大呼曰太尉視賊不許擊待天使不敬果欲反邪功高太山一旦棄之自取族滅富貴它人何益哉我今日必以死爭之懷光聞之謂曰我不反以賊方彊故須蓄鋭俟時耳懷光大言天子所居必有城隍乃發卒城咸陽未幾移軍據之張名振曰乃者言不反今日拔軍此來何也何不攻長安殺朱泚取富貴引軍還邠邪懷光曰名振病心矣命左右引去位殺之右武鋒兵馬使石演芬本西域胡人懷光養以為子懷光潜與朱泚通謀演芬遣其客郜成義詣行在告之請罷其都統之權成義至奉天告懷光子璀璀密白其父懷光召演芬責之曰我以爾為子奈何欲破我家今日負我死甘心乎演芬曰天子以太尉為股肱太尉以演芬為心腹太尉既負天子演芬安得不負太尉乎演芬胡人不能異心惟知事一人茍免賊名而死死甘心矣懷光使左右臠食之皆曰義士也可令快死以刀斷其喉而去李卞等還言懷光驕慢之狀於是行在始嚴門禁從臣皆密裝以待乙丑加李晟河中同絳節度使上猶以為薄丙寅又加同平章事上將幸梁州山南節度使鹽亭嚴震聞之遣使詣奉天奉迎又遣大將張用誠將兵五千至盩厔以來迎衛用誠為懷光所誘隂與之通謀上聞而患之㑹震繼遣牙將馬勛奉表上語之故勛請亟詣梁州取嚴震符召用誠還府若不受召臣請殺之上喜曰卿何時復至此勛刻日時而去既得震符請壯士五人與之俱出駱谷用誠不知事泄以數百騎迎之勛與之俱入驛時天寒勛多然藁火於驛外軍士皆往附火勛乃從容出懷中符以示用誠曰大夫召君用誠錯愕起走壯士自後執其手擒之用誠子在勛後斫傷勛首壯士格殺其子仆用誠於地跨其腹以刀擬其喉曰出聲則死勛入其營士卒已擐甲執兵矣勛大言曰汝曹父母妻子皆在漢中一朝棄之與張用誠同反於汝曹何利乎大夫令我取用誠不問汝曹無自取族滅衆皆讋服勛送用誠詣梁州震杖殺之命副將領其衆勛裹其首復命於行在愆期半日李懷光夜遣人襲奪李建徽楊惠元軍建徽走免惠元將奔奉天懷光遣兵追殺之懷光又宣言曰吾今與朱泚連和車駕且當逺避懷光以韓逰瓌朔方將也掌兵在奉天與逰瓌書約使為變逰瓌密奏之明日又以書趣之逰瓌又奏之上稱其忠義因問策安出對曰懷光揔諸道兵故敢恃衆為亂今邠寧有張昕靈武有寧景璿河中有吕鳴嶽振武有杜從政潼關有唐朝臣渭北有竇覦皆守將也陛下各以其衆及地授之尊懷光之官罷其權則行營諸將各受本府指麾矣懷光獨立安能為亂上曰罷懷光兵權若朱泚何對曰陛下既許將士以克城殊賞將士奉天子之命以討賊取富貴誰不願之邠府兵以萬數借使臣得而將之足以誅泚況諸道必有仗義之臣泚不足憂也上然之丁卯懷光遣其將趙升鸞入奉天約其夕使别將逹奚小俊燒乾陵令升鸞為內應以驚脅乘輿升鸞詣渾瑊自言瑊遽以聞且請決幸梁州上命瑊戒嚴瑊出部勒未畢上已出城西命戴休顔守奉天朝臣將士狼狽扈從戴休顔徇於軍中曰懷光已反遂乘城拒守朱泚之稱帝也兵部侍郎劉乃卧病在家泚召之不起使蔣鎮自往說之凡再往知不可誘脅乃歎曰鎮亦忝列曹不能捨生以至於此豈可復以已之腥臊汚漫賢者乎歔欷而返乃聞上幸山南搏膺大呼自投于牀不食數日而卒太子少師喬琳從上至盩厔稱老疾不堪山險削髮為僧匿於仙逰寺泚聞之召至長安以為吏部尚書於是朝士之竄匿者多出仕泚矣懷光遣其將孟保惠靜夀孫福逹將精騎趣南山邀車駕遇諸軍糧料使張增於盩厔三將曰彼使我為不臣我以追不及報之不過不使我將耳因目增曰軍士未朝食如何增紿其衆曰此東數里有佛祠吾貯糧焉三將帥衆而東縱之剽掠由是百官從行者皆得入駱谷以追不及還報懷光皆黜之李晟得除官制拜哭受命謂將佐曰長安宗廟所在天下根本若諸將皆從行誰當滅賊者乃治城隍繕甲兵為復京城之計先是東渭橋有粟十餘萬斛度支給李懷光軍幾盡是時懷光朱泚連兵聲勢甚盛車駕南幸人情擾擾晟以孤軍處二彊寇之閒內無資糧外無救援徒以忠義感激將士故其衆雖單弱而鋭氣不衰又以書遺懷光辭禮卑遜雖示尊崇而諭以禍福勸之立功補過故懷光慙恧未忍擊之晟曰畿內雖兵荒之餘猶可賦斂宿兵養寇患莫大焉乃以判官張彧假京兆尹擇四十餘人假官以督渭北諸縣芻粟不旬日皆充羡乃流涕誓衆決志平賊田恱用兵數敗士卒死者什六七其下皆厭苦之上以給事中孔巢父為魏博宣慰使巢父性辨博至魏州對其衆為陳逆順禍福恱及將士皆喜兵馬使田緒承嗣之子也凶險多過失恱不忍殺杖而拘之恱既歸國內外撤警僃三月壬申朔恱與孔巢父宴飲緒對弟姪有怨言其姪止之緒怒殺姪既而悔之曰僕射必殺我既夕恱醉歸寢緒與左右密穿後垣入殺恱及其母妻等十餘人即帥左右執刀立於中門之內夾道將旦以恱命召行軍司馬扈崿判官許士則都虞候蔡濟議事府署深邃外不知有變士則濟先至召入亂斫殺之緒恐既明事泄乃出門遇恱親將劉忠信方排牙緒疾呼謂衆曰劉忠信與扈崿謀反昨夜剌殺僕射衆大驚喧譁忠信未及自辨衆分裂殺之扈崿來及㦸門遇亂招諭將士將士從之者三分之一緒懼登城而立大呼謂衆曰緒先相公之子諸君受先相公恩若能立緒兵馬使賞緍錢二千大將半之下至士卒人賞百緍竭公私之貨五日取辦於是將士回首殺扈崿皆歸緒軍府乃定因請命於孔巢父巢父命緒權知軍府後數日衆乃知緒殺五兄雖悔怒而緒已立無如之何緒又殺恱親將薛有倫等二十餘人李抱真王武俊引兵將救貝州聞亂不敢進朱滔聞恱死喜曰恱負恩天假手於緒也即遣其執憲大夫鄭景濟等將步騎五千助馬實合兵萬二千攻魏州實軍王莽河縱騎兵及回紇四出剽掠滔别遣人入城說緒許以本道節度使緒方危迫遣隨軍候臧詣貝州送𣢾於滔滔喜遣臧還報使亟定盟約時緒部署城內已定李抱真王武俊又遣使詣緒許以赴援如恱存日之約緒召將佐議之幕僚曽穆盧南史曰用兵雖尚威武亦本仁義然後有功今幽陵之兵恣行殺掠白骨蔽野雖先僕射背德其民何罪今雖盛彊其亡可跂立而待也況昭義恆冀方相與攻之奈何以目前之急欲從人為反逆乎不若歸命朝廷天子方蒙塵於外聞魏博使至必喜官爵旋踵而至矣緒從之遣使奉表詣行在城守以俟命上之發奉天也韓逰瓌帥其麾下八百餘人還邠州李懷光以李晟軍浸盛惡之欲引軍自咸陽襲東渭橋三令其衆衆不應竊相謂曰若與我曹擊朱泚惟力是視若欲反我曹有死不能從也懷光知衆不可彊問計於賔佐節度巡官良鄉李景略曰取長安殺朱泚散軍還諸道單騎詣行在如此臣節亦未虧功名猶可保也頓首懇請至于流涕懷光許之都虞候閻晏等勸懷光東保河中徐圖去就懷光乃說其衆曰今日屯涇陽召妻孥於邠俟至與之俱往河中春裝既辦還攻長安未晚也東方諸縣皆富實軍發之日聽爾曹俘掠衆許之懷光乃謂景略曰嚮者之議軍衆不從子宜速去不且見害遣數騎送之景略出軍門慟哭曰不意此軍一旦陷於不義懷光遣使詣邠州令留後張昕悉發所留兵萬餘人及行營將士家屬會涇陽仍遣其將劉禮等將三千餘騎脅遷之韓逰瓌說昕曰李太尉功高自棄已蹈禍機中丞今日可以自求富貴逰瓌請帥麾下以從昕曰昕微賤賴李太尉得至此不忍負也逰瓌乃謝病不出隂與諸將髙固楊懷賔等相結時崔漢衡以吐蕃兵營于邠南高固曰昕以衆去則邠城空矣乃詐為渾瑊書召吐蕃使稍逼邠城昕等懼竟不敢出昕等謀殺諸將之不從者逰瓌知之先與高固等舉兵殺昕遣楊懷賔奉表以聞且遣人告崔漢衡漢衡矯詔以逰瓌知軍府事軍中大喜懷光子旻在邠逰瓌遣之或曰不殺旻何以自明逰瓌曰殺旻則懷光怒其衆必至不如釋旻以走之時楊懷賔子朝晟在懷光軍中為右廂兵馬使聞之泣白懷光曰父立功於國子當誅夷不可典兵懷光囚之於是逰瓌屯邠寧戴休顔屯奉天駱元光屯昭應尚可孤屯藍田皆受李晟節度晟軍聲大振始懷光方彊朱泚畏之與懷光書以兄事之約分帝關中永為鄰國及懷光決反逼乘輿南幸其下多叛之勢益弱泚乃賜懷光詔書以臣禮待之且徴其兵懷光慙怒內憂麾下為變外恐李晟襲之遂燒營東走掠涇陽等十二縣雞犬無遺及富平大將孟涉假威勇將數千人奔于李晟將士在道散亡相繼至河中或勸河中守將吕鳴嶽焚橋拒之鳴嶽以兵少恐不能支遂納之河中尹李齊運棄城走懷光遣其將趙貴先築壘于同州刺史李紓懼奔行在幕僚裴向攝州事詣貴先責以逆順之理貴先感寤遂請降同州由是獲全向遵慶之子也懷光使其將符嶠襲坊州據之渭北守將竇覦帥獵團七百圍之嶠請降詔以覦為渭北行軍司馬丁亥以李晟兼京畿渭北鄜坊丹延節度使庚寅車駕至城固上在道民有獻瓜果者上欲以散試官授之訪於陸贄贄上奏以為爵位恆宜慎惜不可輕用起端雖微流弊必大獻瓜果者止可賜之錢帛不當酬以官上曰試官虛名無損於事贄又上奏其略曰自兵興以來財賦不足以供賜而職官之賞興焉青朱雜㳫於胥徒金紫普施於輿皂當今所病方在爵輕設法貴之猶恐不重若又自棄將何勸人夫誘人之方惟名與利名近虛而於教為重利近實而於德為輕專實利而不濟之以虛則耗匱而物力不給專虛名而不副之以實則誕謾而人情不趨故國家命秩之制有職事官有散官有勳官有爵號然掌務而授俸者唯繫職事之一官此所謂施實利而寓虛名者也其勳散爵號三者所繫大抵止於服色資䕃而已此所謂假虛名以佐實利者也今之員外試官頗同勳散爵號雖則授無費祿受不占員然而突銛鋒排患難者則以是賞之竭筋力展勤效者又以是酬之若獻瓜果者亦授試官則彼必相謂曰吾以忘軀命而獲官此以進瓜果而獲官是乃國家以吾之軀命同於瓜果矣視人如草木誰復為用哉今陛下既未有實利以敦勸又不重虛名而濫施人無藉焉則後之立功者將曷用為賞哉贄在翰林為上所親信居艱難中雖有宰相大小之事上必與贄謀之故當時謂之內相上行止必與之俱梁洋道險嘗與贄相失經夕不至上驚憂涕泣募得贄者賞千金久之乃至上喜甚太子以下皆賀然贄數直諫忤上意盧杞雖貶官上心庇之贄極言杞姦邪致亂上雖貌從心頗不悅故劉從一姜公輔皆自下陳登用贄恩遇雖隆未得為相壬辰車駕至梁州山南地薄民貧自安史以來盜賊攻剽户口減耗太半雖節制十五州租賦不及中原數縣及大駕駐蹕糧用頗窘上欲西幸成都嚴震言於上曰山南地接京畿李晟方圖收復藉六軍以為聲援若幸西川則晟未有收復之期也衆議未決㑹李晟表至言陛下駐蹕漢中所以繫億兆之心成滅賊之勢若規小捨大遷都岷峨則士庶失望雖有猛將謀臣無所施矣上乃止嚴震百方以聚財賦民不至困窮而供億無乏牙將嚴礪震之從祖弟也震使掌轉餉事甚修辦初奉天圍既解李楚琳遣使入貢上不得已除鳯翔節度使而心惡之議者言楚琳凶逆反覆若不隄防恐生窺伺由是楚琳使者數輩至上皆不引見留之不遣甫至漢中欲以渾瑊代楚琳鎮鳯翔陸贄上奏以為楚琳殺帥助賊其罪固大但以乘輿未復大憝猶存勤王之師悉在畿內急宣速告晷刻是爭商嶺則道迃且遙駱谷復為盜所扼僅通王命唯在褒斜此路若又阻艱南北遂將敻絶以諸鎮危疑之勢居二逆誘脅之中洶洶羣情各懷向背儻或楚琳發憾公肆猖狂南塞要衝東延巨猾則我咽喉梗而心膂分矣今楚琳能兩端顧望乃是天誘其衷故通歸塗將濟大業陛下誠宜深以為念厚加撫循得其持疑便足集事必欲精求素行追抉宿疵則是改過不足以補愆自新不足以贖罪凡今將吏豈得盡無疵瑕人皆省思孰免疑畏又況阻命之輩脅從之流自知負恩安敢歸化斯釁非小所宜速圖伏願陛下思英主大略勿以小不忍虧橈興復之業也上釋然開寤善待楚琳使者優詔存慰之丁酉加宣武節度使劉洽同平章事己亥以行在都知兵馬使渾瑊同平章事兼朔方節度使朔方邠寧振武永平奉天行營兵馬副元帥庚子詔數李懷光罪惡叙朔方將士忠順功名猶以懷光舊勳曲加容貸其副元帥太尉中書令河中尹并朔方等諸道節度觀察等使宜並罷免授太子太保其所管兵馬委本軍自舉一人功高望重者便宜統領速具奏聞當授旌旄以從人欲夏四月壬寅以邠寧兵馬使韓逰瓌為邠寧節度使癸卯以奉天行營兵馬使戴休顔為奉天行營節度使靈武守將寧景璿為李懷光治第别將李如暹曰李太尉逐天子而景璿為之治第是亦反也攻而殺之甲辰加李晟鄜坊京畿渭北商華副元帥晟家百口及神策軍士家屬皆在長安朱泚善遇之軍中有言及家者晟泣曰天子何在敢言家乎泚使晟親近以家書遺晟曰公家無恙晟怒曰爾敢與賊為間立斬之軍士未授春衣盛夏猶衣裘褐終無叛志乙巳以陜虢防遏使唐朝臣為河中同絳節度使前河中尹李齊運為京兆尹供晟軍糧役庚戌以魏博兵馬使田緒為魏博節度使渾瑊帥諸軍出斜谷崔漢衡勸吐蕃出兵助之尚結贊曰邠軍不出將襲我後韓逰瓌聞之遣其將曹子逹將兵三千往會瑊軍吐蕃遣其將論莽羅依將兵二萬從之李楚琳遣其將石鍠將卒七百從瑊拔武功庚戌朱泚遣其將韓旻等攻武功鍠以其衆迎降瑊戰不利收兵登西原會曹子逹以吐蕃至擊旻大破之於武亭川斬首萬餘級旻僅以身免瑊遂引兵屯奉天與李晟東西相應以逼長安朱泚姚令言數遣人誘涇原節度使馮河清河清皆斬其使者大將田希鑒密與泚通殺河清以軍府附於泚泚以希鑒為涇原節度使上問陸贄近有卑官自山北來者率非良士有邢建者論說賊勢語最張皇察其事情頗似窺覘今已於一所安置如此之類更有數人若不追尋恐成姦計卿試思之如何為便贄上奏以為今盜據宫闕有冒涉險逺來赴行在者當量加恩賞豈得復猜慮拘囚其略曰以一人之聽覽而欲窮宇宙之變態以一人之防慮而欲勝億兆之姦欺役智彌精失道彌逺項籍納秦降卒二十萬慮其懷詐復叛一舉而盡坑之其於防虞亦已甚矣漢高豁逹大度天下之士至者納用不疑其於僃慮可謂疏矣然而項氏以滅劉氏以昌蓄疑之與推誠其效固不同也秦皇嚴肅雄猜而荆軻奮其隂計光武寬容博厚而馬援輸其𣢾誠豈不以虛懷待人人亦思附任數御物物終不親情思附則感而恱之雖寇讎化為心膂矣意不親則懼而阻之雖骨肉結為仇慝矣又曰陛下智出庶物有輕待人臣之心思周萬幾有獨馭區㝢之意謀吞衆略有過慎之防明照羣情有先事之察嚴束百辟有任刑致理之規威制四方有以力勝殘之志由是才能者怨於不任忠藎者憂於見疑著勳業者懼於不容懷反側者迫於及討馴致離叛構成禍災天子所作天下式瞻小猶慎之矧又非小願陛下以覆車之轍為戒實宗社無疆之休韓逰瓌引兵㑹渾瑊於奉天丙寅加平盧節度使李納同平章事朱滔攻貝州百餘日馬實攻魏州亦踰四旬皆不能下賈林復為李抱真說王武俊曰朱滔志吞貝魏復值田恱被害儻旬日不救則魏博皆為滔有矣魏博既下則張孝忠必為之臣滔連三道之兵益以回紇進臨常山明公欲保其宗族得乎常山不守則昭義退保西山河朔盡入於滔矣不若乘貝魏未下與昭義合兵救之滔既破亡則關中喪氣朱泚不日梟夷鑾輿反正諸將之功孰有居明公之右者哉武俊恱從之戊辰武俊軍于南宫東南抱真自臨洺引兵會之與武俊營相距十里兩軍尚相疑明日抱真以數騎詣武俊營賔客共諫止之抱真命行軍司馬盧玄卿勒兵以俟曰吾之此舉繫天下安危若其不還領軍事以聽朝命亦惟子勵將士以雪讎恥亦惟子言終遂行武俊嚴備以待之抱真見武俊叙國家禍難天子播遷持武俊哭流涕縱橫武俊亦悲不自勝左右莫能仰視遂與武俊約為兄弟誓同滅賊武俊曰相公十兄名髙四海嚮蒙開諭得棄逆從順免葅醢之罪享王公之榮今又不間胡虜辱為兄弟武俊當何以為報乎滔所恃者回紇耳不足畏也戰日願十兄按轡臨視武俊決為十兄破之抱真退入武俊帳中酣寢久之武俊感激待之益恭指心仰天曰此身已許十兄死矣遂連營而進山南地熱上以軍士未有春服亦自御夾衣五月鹽鐵判官萬年王紹以江淮繒帛來至上命先給將士然後御衫韓滉遣使獻綾羅四十擔詣行在又運米百艘以餉李晟時關中兵荒米斗直錢五百及滉米至減五之四吐蕃既破韓旻等大掠而去朱泚使田希鑒厚以金帛賂之吐蕃受之韓逰瓌以聞渾瑊又奏尚結贊屢遣人約刻日共取長安既而不至聞其衆今春大疫近已引兵去上以李晟渾瑊兵少欲倚吐蕃以復京城聞其去甚憂之以問陸贄贄以為吐蕃貪狡有害無益得其引去實可欣賀乃上奏其略曰吐蕃遷延觀望翻覆多端深入郊畿隂受賊使致令羣帥進退憂虞欲捨之獨前則慮其懷怨乘躡欲待之合勢則苦其失信稽延戎若未歸寇終不滅又曰將帥意陛下不見信任且患蕃戎之奪其功士卒恐陛下不恤舊勞而畏蕃戎之專其利賊黨懼蕃戎之勝不死則悉遺人擒百姓畏蕃戎之來有財必盡為所掠是以順於王化者其心不得不怠陷於寇境者其勢不得不堅又曰今懷光别保蒲絳吐蕃逺避封彊形勢既分腹背無患瑊晟諸帥才力得伸又曰但願陛下慎於撫接勤於砥礪中興大業旬月可期不宜尚眷眷於犬羊之羣以失將士之情也上復使謂贄曰卿言吐蕃形勢甚善然瑊晟諸軍當議規畫令其進取朕欲遣使宣慰卿宜審細條疏以聞贄以為賢君選將委任責成故能有功況今秦梁千里兵勢無常遙為規畫未必合宜彼違命則失君威從命則害軍事進退羈礙難以成功不若假以便宜之權待以殊常之賞則將帥感恱智勇得伸乃上奏其略曰鋒鏑交於原野而决策於九重之中機㑹變於斯須而定計於千里之外用捨相礙否臧皆凶上有掣肘之譏下無死綏之志又曰傳聞與指實不同懸算與臨事有異又曰設使其中或有肆情干命者陛下能於此時戮其違詔之罪乎是則違命者既不果行罰從命者又未必合宜徒費空言秪勞睿慮匪唯無益其損實多又曰君上之權特異臣下惟不自用乃能用人乙亥李抱真王武俊距貝州三十里而軍朱滔聞兩軍將至急召馬實實晝夜兼行赴之或謂滔曰武俊善野戰不可當其鋒宜徙營稍前逼之使回紇絶其糧道我坐食德棣之餫依營而陳利則進攻否則入保待其飢疲然後可制也滔疑未決㑹馬實軍至滔命明日出戰實言軍士冒暑困憊請休息數日乃戰常侍楊布將軍蔡雄引回紇逹干見滔逹干曰回紇在國與鄰國戰常以五百騎破鄰國數千騎如掃葉耳今受大王金帛牛酒前後無算思為大王立效此其時矣明日願大王駐馬髙丘觀回紇為大王翦武俊之騎使匹馬不返布雄曰大王英略蓋丗舉燕薊全軍將掃河南清關中今見小敵猶豫不擊失逺近之望將何以成霸業乎逹干請戰是也滔喜遂決意出戰丙子旦武俊遣其兵馬使趙琳將五百騎伏於桑林抱真列方陳於後武俊引騎兵居前自當回紇回紇縱兵衝之武俊命其騎控馬避之回紇突出其後將還武俊乃縱兵擊之趙琳自林中出橫擊之回紇敗走武俊急追之滔騎兵亦走自踐其步陳步騎皆東奔滔不能制遂走趣其營抱真武俊合兵追擊之時滔引三萬人出戰死者萬餘人逃潰者亦萬餘人滔才與數千人入營堅守㑹日暮昏霧兩軍不能進抱真軍其營之西北武俊軍其東北滔夜焚營引兵出南門趣德州遁去委棄所掠資貨山積兩軍以霧不能追也滔殺楊布蔡雄而歸幽州心既內慙又恐范陽留守劉怦因敗圖已怦悉發留守兵夾道二十里具儀仗迎之入府相對悲喜時人多之初張孝忠以易州歸國詔以孝忠為義武節度使以易定滄三州隸之滄州剌史李固烈李惟嶽之妻兄也請歸恆州孝忠遣押牙安喜程華交其州事固烈悉取軍府綾縑珍貨數十車將行軍士大譟曰刺史掃府庫之實以行將士於後飢寒奈何遂殺固烈屠其家程華聞亂自竇逃出亂兵求得之請知州事華不得已從之孝忠聞之即版華攝滄州剌史華素寬厚推心以待將士將士安之㑹朱滔王武俊叛更遣人招華華皆不從時孝忠在定州自滄如定必過瀛州瀛隸朱滔道路阻澀滄州録事參軍李宇說華表陳利害請别為一軍華從之遣宇奉表詣行在上即以華為滄州剌史橫海軍副大使知節度事賜名日華令日華歲供義武租錢十二萬緡王武俊又使人說誘之時軍中乏馬日華紿使者曰王大夫必欲相屬當以二百騎相助武俊給之日華悉留其馬遣其士歸武俊怒而方與馬燧等相拒不能攻取日華由是獲全及武俊歸國日華乃遣人謝過償其馬價且賂之武俊喜復與交好庚寅李晟大陳兵諭以收復京城先是姚令言等屢遣諜人覘晟進軍之期皆為邏騎所獲晟引示以所陳兵謂曰歸語諸賊努力固守勿不忠於賊也皆飲之酒給錢而縱之遂引兵至通化門外耀武而還賊不敢出晟召諸將問兵所從入皆請先取外城掾坊市然後北攻宫闕晟曰坊市狹隘賊若伏兵格鬬居人驚亂非官軍之利也今賊重兵皆聚苑中不若自苑北攻之潰其腹心賊必奔亡如此則宫闕不殘坊市無擾䇿之上者也諸將皆曰善乃牒渾瑊及鎮國節度使駱元光商州節度使尚可孤刻期集於城下壬辰尚可孤敗泚將仇敬忠於藍田西斬之乙未李晟移軍於光泰門外米倉村丙申晟方自臨築壘泚驍將張庭芝李希倩引兵大至晟謂諸將曰始吾憂賊潜匿不出今來送死此天贊我不可失也命副元帥兵馬使吳詵等縱兵擊之時華州營在北兵少賊併力攻之晟命牙前將李演等帥精兵救之演等力戰賊敗走演等追之乘勝入光泰門再戰又破之會夜晟斂兵還賊餘衆走入白華門夜聞慟哭希倩希烈之弟也丁酉晟復出兵諸將請待西師至夾攻之晟曰賊數敗已破膽不乘勝取之使其成僃非計也賊又出戰官軍屢捷駱元光敗泚衆於滻西戊戌晟陳兵於光泰門外使李演及牙前兵馬使王佖將騎兵牙前將史萬頃將步兵直抵苑牆神䴥村晟先使人夜開苑牆二百餘步比演等至賊已樹柵塞之自柵中刺射官軍官軍不得進晟怒叱諸將曰縱賊如此吾先斬公輩矣萬頃懼帥衆先進拔柵而入佖演引騎兵繼之賊衆大潰諸軍分道並入姚令言等猶力戰晟命決勝軍使唐良臣等步騎蹙之且戰且前凡十餘合賊不能支至白華門有賊數千騎出官軍之背晟帥百餘騎回禦之左右呼曰相公來賊皆驚潰先是泚遣張光晟將兵五千屯九曲去東渭橋十餘里光晟密輸𣢾於晟及泚敗光晟勸泚出亡泚乃與姚令言帥餘衆西走猶近萬人光晟送泚出城還降於晟晟遣兵馬使田子竒以騎兵追泚晟屯含元殿前舍於右金吾仗令諸軍曰晟賴將士之力克清宫禁長安士庶久陷賊庭若小有震驚非弔民伐罪之意晟與公等室家相見非晚五日內無得通家信命京兆尹李齊運等安慰居人晟大將髙明曜取賊妓尚可孤軍士擅取賊馬晟皆斬之軍中股栗公私安堵秋毫無犯遠坊有經宿乃知官軍入城者是日渾瑊戴休顔韓逰瓌亦克咸陽敗賊三千餘衆聞泚西走分兵邀之己亥晟使京西兵馬使孟涉屯白華門尚可孤屯望仙門駱元光屯章敬寺晟以牙前三千人屯安國寺以鎮京城斬泚黨李希倩敬釭彭偃等八人於市王武俊既破朱滔還恆州表讓幽州盧龍節度使上許之六月癸卯李晟遣掌書記吳人于公異作露布上行在曰臣已肅清宫禁祗謁寢園鍾􅙇不移廟貌如故上泣下曰天生李晟以為社稷非為朕也晟在渭橋熒惑守歲久之乃退賔佐皆賀曰熒惑退舍皇家之福也宜速進兵晟曰天子野次臣下知死敵而已天象髙逺誰得知之既克長安乃謂之曰嚮非相拒也吾聞五星贏縮無常萬一復來守歲吾軍不戰自潰矣皆謝曰非所及也朱泚將奔吐蕃其衆隨道散亡比至涇州才百餘騎田希鑒閉城拒之泚謂之曰汝之節吾所授也奈何臨危相負使焚其門希鑒取節投火中曰還汝節泚衆皆哭涇卒遂殺姚令言詣希鑒降泚獨與范陽親兵及宗族賔客北趣驛馬關寧州刺史夏侯英拒之至彭原西城屯其將梁庭芬射泚墜坑中韓旻等斬之詣涇州降源休李子平奔鳯翔李楚琳斬之皆傳首行在上命陸贄草詔賜渾瑊使訪求奉天所失裹頭內人贄上奏以為今巨盜始平疲瘵之民瘡痍之卒尚未循拊而首說婦人非所以副惟新之望也謀始盡善克終已稀始而不謀終則何有所賜瑊詔未敢承㫖上遂不降詔竟遣中使求之乙巳詔吏部侍郎班宏充宣慰使勞問將士撫諭蒸黎丙午李晟斬文武官受朱泚寵任者崔宣洪經綸等十餘人又表守節不屈者劉乃蔣沇等己酉以李晟為司徒中書令駱元光尚可孤各遷官有差以檢校御史中丞田希鑒為涇原節度使詔改梁州為興元府甲寅以渾瑊為侍中韓逰瓌戴休顔各遷官有差朱泚之敗也李忠臣奔樊川擒獲丙辰斬之上問陸贄今至鳯翔有迎駕諸軍形勢甚盛欲因此遣人代李楚琳何如贄上奏以為如此則事同脅執以言乎除亂則不武以言乎務理則不誠用是時巡後將安入議者或謂之權臣竊未諭其理夫權之為義取類權衡今輦路所經首行脅奪易一帥而虧萬乘之義得一方而結四海之疑乃是重其所輕而輕其所重謂之權也不亦反乎以反道為權以任數為智君上行之必失衆臣下用之必陷身歷代之所以多喪亂而長姦邪由此誤也不如俟奠枕京邑徴授一官彼喜於恩宥將奔走不暇安敢輒有旅拒復勞誅鉏哉戊午車駕發漢中李晟綜理長安以僃百司自請至鳯翔迎扈上不許內常侍尹元貞奉使同華輒詣河中招諭李懷光晟奏元貞矯制擅赦元惡請理其罪秋七月丙子車駕至鳯翔斬喬琳蔣鎮張光晟等李晟以光晟雖臣賊而滅賊亦頗有力欲全之上不許副元帥判官髙郢數勸李懷光歸𣢾懷光遣其子璀詣行在謝罪請束身歸朝庚辰詔遣給事中孔巢父齎先除懷光太子太保敕詣河中宣慰朔方將士悉復官爵如故壬午車駕至長安渾瑊韓逰瓌戴休顔以其衆扈從李晟駱元光尚可孤以其衆奉迎步騎十餘萬旌旗數十里晟謁見上於三橋先賀平賊後謝收復之晚伏路左請罪上駐馬慰撫為之掩涕命左右扶上馬至宫每間日輒宴勳臣賞賜豐渥李晟為之首渾瑊次之諸將相又次之曹王臯遣其將伊慎王鍔圍安州李希烈遣其甥劉戒虛將步騎八千救之臯遣别將李伯潜逆擊之於應山斬首千餘級生擒戒虛徇於城下安州遂降以伊慎為安州刺史又擊希烈將康叔夜於厲鄉走之丁亥孔巢父至河中李懷光素服待罪巢父不之止懷光左右多胡人皆歎曰太尉無官矣巢父又宣言於衆曰軍中誰可代太尉領軍事者於是懷光左右發怒喧譟宣詔未畢衆殺巢父及中使啖守盈懷光亦不之止復治兵為拒守之僃初肅宗在靈武上為奉節王學文於李泌代宗之丗泌居蓬萊書院上為太子亦與之逰及上在興元泌為杭州刺史上急詔徴之與睦州刺史杜亞俱詣行在乙未以泌為左散騎常侍亞為刑部侍郎命泌日直西省以候對朝野皆屬目附之上問泌河中密邇京城朔方兵素稱精鋭如逹奚小俊等皆萬人敵朕晝夕憂之奈何對曰天下事甚有可憂者若惟河中不足憂也夫料敵者料將不料兵今懷光將也小俊之徒乃兵耳何足為意懷光既解奉天之圍視朱泚垂亡之虜不能取乃與之連和使李晟得取以為功今陛下已還宫闕懷光不束身歸罪乃虐殺使臣鼠伏河中如夢魘之人耳但恐不日為帳下所梟使諸將無以藉手也李希烈聞李希倩伏誅忿怒八月壬寅遣中使至蔡州殺顔真卿中使曰有敕真卿再拜中使曰今賜卿死真卿曰老臣無狀罪當死不知使者幾日發長安使者曰自大梁來非長安也真卿曰然則賊耳何謂敕邪遂縊殺之李晟以涇州倚邉屢害軍帥常為亂根奏請往理不用命者力田積粟以攘吐蕃癸卯以晟兼鳯翔隴右節度等使及四鎮北庭涇原行營副元帥進爵西平王時李楚琳入朝晟請與俱至鳯翔斬之以懲逆亂上以新復京師務安反仄不許先是上命渾瑊駱元光討李懷光軍于同州懷光遣其將徐庭光以精卒六千軍于長春宫以拒之瑊等數為所敗不能進時度支用度不給議者多請赦懷光上不許李懷光遣其妹壻要廷珍守晉州牙將毛朝敡守隰州鄭抗守慈州馬燧皆遣人說下之上乃加渾瑊河中絳州節度使充河中同華陜虢行營副元帥加馬燧奉誠軍晉慈隰節度使充管內諸軍行營副元帥與鎮國節度使駱元光鄜坊節度使唐朝臣合兵討懷光初王武俊急攻康日知於趙州馬燧奏請詔武俊與李抱真同擊朱滔以深趙隸武俊改日知為晉慈隰節度使上從之日知未至而三州降燧故上使燧兼領之燧表讓三州於日知且言因降而授恐後有功者踵以為常上喜而許之燧遣使迎日知既至籍府庫而歸之甲辰以鳯翔節度使李楚琳為左金吾大將軍丙午加渾瑊朔方行營元帥李晟至鳯翔治殺張鎰之罪斬禆將王斌等十餘人朱滔為王武俊所攻殆不能軍上表待罪癸未馬燧將步騎三萬攻絳州度支以李懷光所部將士數萬與懷光同反不給冬衣上曰朔方軍纍代忠義今為懷光所制耳將士何罪冬十月己亥詔朔方及諸軍在懷光所者冬衣及賞錢皆當别貯俟道路稍通即時給之李勉纍表乞自貶辛丑罷勉都統節度使其檢校司徒同平章事如故丙辰李懷光將閻晏寇同州官軍敗于沙苑詔徴邠州之軍韓逰瓌將甲士六千赴之乙丑馬燧拔絳州分兵取聞喜萬泉虞鄉永樂猗氏閏月丙子以涇原節度使田希鑒為衛尉卿李晟初至鳳翔希鑒遣使參候晟謂使者曰涇州逼近吐蕃萬一入寇州兵能獨禦之乎欲遣兵防援又未知田尚書意使者歸以告希鑒希鑒果請援兵晟遣腹心將彭令英等戍涇州晟尋託巡邉詣涇州希鑒出迎晟與之並轡而入道舊結歡希鑒妻李氏以叔父事晟晟謂之田郎晟命具三日食曰巡撫畢即還鳳翔希鑒不復疑晟置宴希鑒與將佐俱詣晟營晟伏甲於外廡既食而飲彭令英引涇州諸將下堂晟曰我與汝曹久别各宜自言姓名於是得為亂者石竒等三十餘人讓之曰汝曺屢為逆亂殘害忠良固天地所不容悉引出斬之希鑒尚在座晟顧之曰田郎亦不得無過以親知之故當使身首得完希鑒曰唯遂引出縊殺之并其子萼晟入其營諭以誅希鑒之意衆股栗無敢動者李希烈遣其將翟崇暉悉衆圍陳州久之不克李澄知大梁兵少不能制滑州遂焚希烈所授旌節誓衆歸國甲午以澄為汴滑節度使宋亳節度使劉洽遣馬步都虞候劉昌與隴右幽州行營節度使曲環等將兵三萬救陳州十一月癸卯敗翟崇暉於州西斬首三萬五千級擒崇暉以獻乘勝進攻汴州李希烈懼奔歸蔡州李澄引兵趣汴州至城北恇怯不敢進劉洽兵至城東戊午李希烈守將田懷珍開門納之明日澄入舍於浚儀兩軍之士日有忿䦧㑹希烈鄭州守將孫液降於澄澄引兵屯鄭州詔以都統司馬寶鼎薛珏為汴州刺史李勉至長安素服待罪議者多以勉失守大梁不應尚為相李泌言於上曰李勉公忠雅正而用兵非其所長及大梁不守將士棄妻子而從之者殆二萬人足以見其得衆心矣且劉洽出勉麾下勉至睢陽悉舉其衆以授之卒平大梁亦勉之功也上乃命勉復其位議者又言韓滉聞鑾輿在外聚兵修石頭城隂蓄異志上疑之以問李泌對曰滉公忠清儉自車駕在外滉貢獻不絶且鎮撫江東十五州盜賊不起皆滉之力也所以修石頭城者滉見中原版蕩謂陛下將有永嘉之行為迎扈之僃耳此乃人臣忠篤之慮奈何更以為罪乎滉性剛嚴不附權貴故多謗毁願陛下察之臣敢保其無它上曰外議洶洶章奏如麻卿弗聞乎對曰臣固聞之其子臯為考功員外郎今不敢歸省其親正以謗語沸騰故也上曰其子猶懼如此卿奈何保之對曰滉之用心臣知之至熟願上章明其無它乞宣示中書使朝衆皆知之上曰朕方欲用卿人亦何易可保慎勿違衆恐併為卿纍也泌退遂上章請以百口保滉它日上謂泌曰卿竟上章已為卿留中雖知卿與滉親舊豈得不自愛其身乎對曰臣豈肯私於親舊必負陛下顧滉實無異心臣之上章以為朝廷非為身也上曰如何其為朝廷對曰今天下旱蝗關中米斗千錢倉廪耗竭而江東豐稔願陛下早下臣章以解朝衆之惑面諭韓臯使之歸覲令滉感激無自疑之心速運糧儲豈非為朝廷邪上曰善朕深諭之矣即下泌章令韓臯謁告歸覲面賜緋衣諭以卿父比有謗言朕今知其所以釋然不復信矣因言關中乏糧歸語卿父宜速致之臯至潤州滉感恱流涕即日自臨水濵發米百萬斛聽臯留五日即還朝臯别其母啼聲聞於外滉怒召出撻之自送至江上冒風濤而遣之既而陳少逰聞滉貢米亦貢二十萬斛上謂李泌曰韓滉乃能化陳少逰亦貢米矣對曰豈惟少逰諸道將爭入貢矣吏部尚書同平章事蕭復奉使自江淮還與李勉盧翰劉從一俱見上勉等退復獨留言於上曰陳少逰任兼將相首敗臣節韋臯幕府下僚獨建忠義請以臯代少逰鎮淮南使善惡著明上然之尋遣中使馬欽緒揖劉從一附耳語而去諸相還閣從一詣復曰欽緒宣㫖令從一與公議朝來所言事即奏行之勿令李盧知敢問何事也復曰唐虞黜陟嶽牧僉諧爵人於朝與士共之使李盧不堪為相則罷之既在相位朝廷政事安得不與之同議而獨隱此一事乎此最當今之大弊朝來主上亦有斯言復已面陳其不可不謂聖意尚爾復不惜與公奏行之但恐浸以成俗未敢以告竟不以事語從一從一奏之上愈不恱復乃上表辭位乙丑罷為左庶子劉洽克汴州得李希烈起居注云某月日陳少逰上表歸順少逰聞之慙懼發疾十二月乙亥薨贈太尉賻祭如常儀淮南大將王韶欲自為留後令將士推已知軍事且欲大掠韓滉遣使謂之曰汝敢為亂吾即日全軍度江誅汝矣韶等懼而止上聞之喜謂李泌曰滉不惟安江東又能安淮南真大臣之器卿可謂知人庚辰加滉平章事江淮轉運使滉運江淮粟帛入貢府無虛月朝廷賴之使者勞問相繼恩遇始深矣貞元元年春正月癸丑贈顔真卿司徒諡曰文忠新州司馬盧杞遇赦移吉州長史謂人曰吾必再入未幾上果用為饒州刺史給事中袁髙應草制執以白盧翰劉從一曰盧杞作相致鑾輿播遷海內瘡痍奈何遽遷大郡願相公執奏翰等不從更命它舍人草制乙卯制出髙執之不下且奏杞極惡窮凶百辟疾之若讎六軍思食其肉何可復用上不聽補闕陳京趙需等上疏曰杞三年擅權百揆失叙天地神祗所知華夏蠻夷同棄儻加巨姦之寵必失萬姓之心丁巳袁髙復於正牙論奏上曰杞已再更赦高曰赦者止原其罪不可為刺史陳京等亦爭之不已曰杞之執政百官常如兵在其頸今復用之則姦黨皆唾掌而起上大怒左右辟易諫者稍引却京顧曰趙需等勿退此國大事當以死爭之上怒稍解戊午上謂宰相與杞小州刺史可乎李勉曰陛下欲與之雖大州亦可其如天下失望何壬戌以杞為澧州别駕使謂袁髙曰朕徐思卿言誠為至當又謂李泌曰朕已可袁髙所奏泌曰纍日外人竊議比陛下於桓靈今承德音乃堯舜之不逮也上恱杞竟卒於澧州髙恕己之孫也三月李希烈陷鄧州戊午以汴滑節度使李澄為鄭滑節度使以代宗女嘉誠公主妻田緒李懷光都虞候吕鳴嶽密通𣢾於馬燧事泄懷光殺之屠其家事連幕僚髙郢李鄘懷光集將士而責之郢鄘抗言逆順無所慙隱懷光囚之鄘雍之姪孫也馬燧軍于寶鼎敗懷光兵於陶城斬首萬餘級分兵會渾瑊逼河中夏四月丁丑以曹王臯為荆南節度李希烈將李思登以隨州降之壬午馬燧渾瑊破李懷光兵於長春宫南遂掘塹圍官城懷光諸將相繼來降詔以燧瑊為招撫使五月丙申劉洽更名玄佐韓逰瓌請兵於渾瑊共取朝邑李懷光將閻晏欲爭之士卒指邠軍曰彼非吾父兄則吾子弟奈何以白刃相向乎語甚囂晏遽引兵去懷光知衆心不從乃詐稱欲歸國聚貨財飾車馬云俟路通入貢由是得復踰旬月六月辛巳以劉玄佐兼汴州刺史朱滔病死將士奉前涿州刺史劉怦知軍事時連年旱蝗度支資糧匱竭言事者多請赦李懷光李晟上言赦懷光有五不可河中距長安才三百里同州當其衝多兵則未為示信少兵則不足隄防忽驚東偏何以制之一也今赦懷光必以晉絳慈隰還之渾瑊既無所詣康日知又應遷移土宇不安何以奬勵二也陛下連兵一年討除小醜兵力未窮遽赦其反逆之罪今西有吐蕃北有回紇南有淮西皆觀我彊弱不謂陛下施德澤愛黎元乃謂兵屈於人而自罷耳必競起窺覦之心三也懷光既赦則朔方將士皆應叙勳行賞今府庫方虛賞不滿望是愈激之使叛四也既解河中罷諸道兵賞典不舉怨言必起五也今河中斗米五百芻藁且盡牆壁之間餓殍甚衆且其軍中大將殺戮略盡陛下但敇諸道圍守旬時彼必有內潰之變何必養腹心之疾為它日之悔哉又請發兵二萬自僃資糧獨討懷光秋七月甲午朔馬燧自行營入朝奏稱懷光凶逆尤甚赦之無以令天下願更得一月糧必為陛下平之上許之壬子以劉怦為幽州盧龍節度使八月馬燧至行營與諸將謀曰長春宫不下則懷光不可得長春宫守僃甚嚴攻之曠日持久我當身往諭之遂徑造城下呼懷光守將徐庭光庭光帥將士羅拜城上燧知其心屈徐謂之曰我自朝廷來可西向受命庭光等復西向拜燧曰汝曹自祿山已來徇國立功四十餘年何忽為滅族之計從吾言非止免禍富貴可圖也衆不對燧披襟曰汝不信吾言何不射我將士皆伏泣燧曰此皆懷光所為汝曹無罪第堅守勿出皆曰諾壬申燧與渾瑊韓逰瓌進軍逼河中至焦籬堡守將尉圭以七百人降是夕懷光舉火諸營不應駱元光在長春宫下使人招徐庭光庭光素輕元光遣卒罵之又為優胡於城上以侮之且曰我降漢將耳元光使白燧燧還至城下庭光開門降燧以數騎入城慰撫其衆大呼曰吾輩復為王人矣渾瑊謂僚佐曰始吾謂馬公用兵不吾逺也今乃知吾不逮多矣詔以庭光試殿中監兼御史大夫甲戌燧帥諸軍至河西河中軍士自相驚曰西城擐甲矣又曰東城捉隊矣須臾軍士皆易其號為太平字懷光不知所為乃縊而死初懷光之解奉天圍也上以其子璀為監察御史寵待甚厚及懷光屯咸陽不進璀密言於上曰臣父必負陛下願早為之僃臣聞君父一也但今日之勢陛下未能誅臣父而臣父足以危陛下陛下待臣厚臣胡人性直故不忍不言耳上驚曰知卿大臣愛子當為朕委曲彌縫而密奏之對曰臣父非不愛臣臣非不愛其父與宗族也顧臣力竭不能回耳上曰然則卿以何策自免對曰臣之進言非茍求生也臣父敗則臣與之俱死矣復有何策哉使臣賣父求生陛下亦安用之上曰卿勿死為朕更至咸陽諭卿父使君臣父子俱全不亦善乎璀至咸陽而還曰無益也願陛下僃之勿信人言臣今往說諭萬方臣父言汝小子何知主上無信吾非貪富貴也直畏死耳汝豈可陷吾入死地邪及李泌赴陜上謂之曰朕所以再三欲全懷光者誠惜璀也卿至陜試為朕招之對曰陛下未幸梁洋懷光猶可降也今則不然豈有人臣迫逐其君而可復立於其朝乎縱彼顔厚無慙陛下每視朝何心見之臣得入陜借使懷光請降臣不敢受況招之乎李璀固賢者必與父俱死矣若其不死則亦無足貴也及懷光死璀先刃其二弟乃自殺朔方將牛名俊斷懷光首出降河中兵猶萬六千人燧斬其將閻晏等七人餘皆不問燧自辭行至河中平凡二十七日燧出髙郢李鄘於獄皆奏置幕下韓逰瓌之攻懷光也楊懷賔戰甚力上命特原其子朝晟逰瓌遂以朝晟為都虞候上使問陸贄河中既平復有何事所宜區處令悉條奏贄以河中既平慮必有希㫖生事之人以為王師所向無敵請乘勝討淮西者李希烈必誘諭其所部及新附諸帥曰奉天息兵之㫖乃因窘急而言朝廷稍安必復誅伐如此則四方負罪者孰不自疑河朔青齊固當響應兵連禍結賦役繁興建中之憂行將復起乃上奏其略曰福不可以屢徼幸不可以常覬又曰臣姑以生禍為憂而未敢以獲福為賀又曰陛下懷悔過之深誠降非常之大號所在宣敡之際聞者莫不涕流假王叛換之夫削僞號以請罪觀釁首鼠之將一純誠以效勤又曰曩討之而愈叛今釋之而畢來曩以百萬之師而力殫今以咫尺之詔而化洽是則聖王之敷理道服暴人任德而不任兵明矣羣帥之悖臣禮拒天誅圖活而不圖王又明矣是則好生以及物者乃自生之方施安以及物者乃自安之術擠彼於死地而求此之久生也措彼於危地而求此之久安也從古及今未之有焉又曰一夫不率闔境罹殃一境不寧普天致擾又曰億兆汙人四三叛帥感陛下自新之㫖恱陛下盛德之言革面易辭且修臣禮其於深言密議固亦未盡坦然必當聚心而謀傾耳而聽觀陛下所行之事考陛下所誓之言若言與事符則遷善之心漸固儻事與言背則慮禍之態復興又曰朱泚滅而懷光戮懷光戮而希烈征希烈儻平禍將次及則彼之蓄素疑而懷宿負者能不為之動心哉又曰今皇運中興天禍將悔以逆泚之偷居上國以懷光之竊保中畿歲未再周相次梟殄實衆慝驚心之日羣生改觀之時威則已行惠猶未洽誠宜上副天眷下收物情布恤人之惠以濟威乘滅賊之威以行惠又曰臣所未敢保其必從唯希烈一人而已揆其私心非不願從也想其潜慮非不追悔也但以猖狂失計已竊大名雖荷陛下全宥之恩然不能不自􅌤於天地之間耳縱未順命斯為獨夫內則無辭以起兵外則無類以求助其計不過厚撫部曲偷容歲時心雖陸梁勢必不致陛下但敇諸鎮各守封疆彼既氣奪算窮是乃狴牢之類不有人禍則當鬼誅古所謂不戰而屈人之兵者斯之謂歟丁卯詔以李懷光嘗有功宥其一男使續其後賜之田宅歸其首及尸使收葬加馬燧兼侍中渾瑊檢校司空餘將卒賞賚各有差諸道與淮西連接者宜各守封疆非被侵軼不須進討李希烈若降當待以不死自餘將士百姓一無所問駱元光殺徐庭光渾瑊鎮河中盡得李懷光之衆朔方軍自是分矣盧龍節度使劉怦疾病九月己亥詔以其子行軍司馬濟權知節度事怦尋薨二年春正月李希烈將杜文朝寇襄州二月癸亥山南東道節度使樊澤擊擒之三月李希烈别將寇鄭州義成節度使李澄擊破之希烈兵勢日蹙會有疾夏四月丙寅大將陳仙竒使醫陳山甫毒殺之因以兵悉誅其兄弟妻子舉衆來降甲申以仙竒為淮西節度使關中倉廪竭禁軍或自脫巾呼於道曰拘吾於軍而不給糧吾罪人也上憂之甚㑹韓滉運米三萬斛至陜李泌即奏之上喜遽至東宫謂太子曰米已至陜吾父子得生矣時禁中不釀命於坊市取酒為樂又遣中使諭神策六軍軍士皆呼萬歲時比歲饑饉兵民率皆瘦黑至是麥始熟市有醉人當時以為嘉瑞人乍飽食死者復伍之一數月人膚色乃復故初上與常侍李泌議復府兵泌因為上歷叙府兵自西魏以來興廢之由且言府兵平日能安居田畒每府有折衝領之折衝以農隙教習戰陳國家有事徴發則以符契下其州及府參驗發之至所期處將帥按閲有教習不精者罪其折衝甚者罪及刺史軍還則賜勳加賞便道罷之行者近不踰時逺不經歲髙宗以劉仁軌為洮河鎮守使以圖吐蕃於是始有久戍之役武后以來承平日久府兵浸墮為人所賤百姓恥之至蒸尉手足以避其役又牛仙客以積財得宰相邉將效之山東戍卒多齎繒帛自隨邉將誘之寄於府庫晝則苦役夜縶地牢利其死而沒入其財故自天寶以後山東戍卒還者什無二三其殘虐如此然未嘗有外叛內侮殺帥自擅者誠以顧戀田園恐纍宗族故也自開元之末張說始募長征兵謂之彍騎其後益為六軍及李林甫為相奏請軍皆募人為之兵不土著又無宗族不自重惜忘身徇利禍亂遂生至今為梗嚮使府兵之法常存不廢安有如此下陵上替之患哉陛下思復府兵此乃社稷之福太平有日矣上曰俟平河中當與卿議之三年春二月戊寅鎮海節度使韓滉薨夏六月以陜虢觀察使李泌為中書侍郎同平章事四年春二月李泌自陳衰老獨任宰相精力耗竭既未聽其去乞更除一相上曰朕深知卿勞苦但未得其人耳上從容與泌論即位以來宰相曰盧杞忠清彊介人言杞姦邪朕殊不覺其然泌曰人言𣏌姦邪而陛下獨不覺其姦邪此乃𣏌之所以為姦邪也儻陛下覺之豈有建中之亂乎𣏌以私隙殺楊炎擠顔真卿於死地激李懷光使叛賴陛下聖明竄逐之人心頓喜天亦悔禍不然亂何由弭上曰楊炎以童子視朕每論事朕可其奏則恱與之往復問難即怒而辭位觀其意以朕為不足與言故也以是交不可忍非由杞也建中之亂術士豫請城奉天此蓋天命非杞所能致也泌曰天命他人皆可以言之惟君相不可言蓋君相所以造命也若言命則禮樂刑政皆無所用矣紂曰我生不有命在天此商之所以亡也上曰朕好與人較量理體崔祐甫性𥚹躁朕難之則應對失次朕常知其短而護之楊炎論事亦有可采而氣色粗傲難之輒勃然怒無復君臣之禮所以每見令人忿發餘人則不敢復言盧𣏌小心朕所言無不從又無學不能與朕往復故朕所懷常不盡也對曰𣏌言無不從豈忠臣乎夫言而莫豫違此孔子所謂一言喪邦者也上曰惟卿則異彼三人者朕言當卿常有喜色不當常有憂色雖時有逆耳之言如嚮來紂及喪邦之類朕細思之皆卿先事而言如此則理安如彼則危亂言雖深切而氣色和順無楊炎之陵傲朕問難往復卿辭理不屈又無好勝之志直使朕中懷已盡而屈服不能不從此朕所以私喜於得卿也泌曰陛下所用相尚多今皆不論何也上曰彼皆非所謂相也凡相者必委以政事如玄宗時牛仙客陳希烈可以謂之相乎如肅宗代宗之任卿雖不受其名乃真相耳必以官至平章事為相則王武俊之徒皆相也五年初上思李懷光之功欲宥其一子而子孫皆已伏誅戊辰詔以懷光外孫燕八八為懷光後賜姓名李承緒除左衛率胄曹參軍賜錢千緡使養懷光妻王氏及守其墓祀七年春二月癸未易定節度使張孝忠薨八年春三月丁丑山南東道節度使曹成王臯薨宣武節度使劉玄佐有威略其母雖貴日織絹一匹謂玄佐曰汝本寒微天子富貴汝至此必以死報之故玄佐始終不失臣節庚午玄佐薨夏六月癸酉平盧節度使李納薨軍中推其子師古知留後十二年春三月魏博節度使田緒尚嘉誠公主有庶子三人季安最幼公主子之以為副大使夏四月庚午緒暴薨左右匿之使季安領軍事年十五乙亥發喪推季安為留後十七年夏五月丁巳成德節度使王武俊薨秋七月辛巳以成德節度副使王士真為節度使通鑑紀事本末卷第三十三
