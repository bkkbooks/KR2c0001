body:
  text: 正觀君臣論治唐髙祖武德九年秋八月甲子太宗即皇帝位於東宫顯德殿九月己酉上面定勳臣長孫無忌等爵邑命陳叔逹於殿下唱名示之且曰朕敘卿等勳賞或未當冝各自言於是諸將爭功紛紜不已淮安王神通曰臣舉兵關西首應義旗今房玄齡杜如晦等専弄刀筆功居臣上臣竊不服上曰義旗初起叔父雖首唱舉兵蓋亦自營脫禍及竇建德吞噬山東叔父全軍覆沒劉黑闥再合餘燼叔父望風奔北玄齡等運籌帷幄坐安社稷論功行賞固冝居叔父之先叔父國之至親朕誠無所愛但不可以私恩濫與勳臣同賞耳諸將乃相謂曰陛下至公雖淮安王尚無所私吾儕何敢不安其分遂皆悅服房玄齡嘗言秦府舊人未遷官者皆嗟怨曰吾屬奉事左右幾何年矣今除官返出前宫齊府人之後上曰王者至公無私故能服天下之心朕與卿輩日所衣食皆取諸民者也故設官分職以為民也當擇賢才而用之豈以新舊為先後哉必也新而賢舊而不肖安可捨新而取舊乎今不論其賢不肖而直言嗟怨豈為政之體乎冬十月甲申民部尚書裴矩奏民遭突厥暴踐者請戶給絹一匹上曰朕以誠信御下不欲虛有存恤之名而無其實户有大小豈得雷同給賜乎於是計口為率初上皇欲疆宗室以鎮天下故皇再從三從弟及兄弟之子雖童孺皆為王王者數十人上從容問羣臣遍封宗子於天下利乎封德彛對曰前世唯皇子及兄弟乃為王自餘非有大功無為王者上皇敦睦九族大封宗室自兩漢以來未有如今之多者爵命既崇多給力役恐非示天下以至公也上曰然朕為天子所以養百姓也豈可勞百姓以養己之宗族乎十一月庚寅降宗室郡王皆為縣公惟有功者數人不降丙午上與羣臣論止盜或請重法以禁之上哂之曰民之所以為盜者由賦繁役重官吏貪求飢寒切身故不暇顧亷恥耳朕當去奢省費輕徭薄賦選用亷吏使民衣食有餘則自不為盜安用重法邪自是數年之後海內升平路不拾遺外户不閉商旅野宿焉上又嘗謂侍臣曰君依於國國依於民刻民以奉君猶割肉以充腹腹飽而身斃君富而國亡故人君之患不自外來常由身出夫欲盛則費廣費廣則賦重賦重則民愁民愁則國危國危則君喪矣朕常以此思之故不敢縱欲也十二月己巳益州大都督竇軌奏稱獠反請發兵討之上曰獠依阻山林時出鼠竊乃其常俗牧守茍能撫以恩信自然帥服安可輕動干戈漁獵其民比之禽獸豈為民父母之意邪竟不許上謂裴寂曰比多上書言事者朕皆粘之屋壁得出入省覽每思治道或深夜方寢公輩亦當恪勤職業副朕此意上厲精求治數引魏徴入卧內訪以得失徴知無不言上皆欣然嘉納上遣使㸃兵封德彛奏中男雖未十八其軀幹壯大者亦可并㸃上從之敕出魏徴固執以為不可不肯署敕至于數四上怒召而讓之曰中男壯大者乃姦民詐妄以避征役取之何害而卿固執至此對曰夫兵在御之得其道不在衆多陛下取其壯健以道御之足以無敵於天下何必多取細弱以增虛數乎且陛下每云吾以誠信御天下欲使臣民皆無欺詐今即位未幾失信者數矣上愕然曰朕何為失信對曰陛下初即位下詔云逋負官物悉令蠲免有司以為負秦府國司者非官物徴督如故陛下以秦王升為天子國司之物非官物而何又曰關中免二年租調關外給復一年既而繼有敕云已役已輸者以來年為始散還之後方復更徴百姓固已不能無怪今既徴得物復㸃為兵何謂來年為始乎又陛下所與共治天下者在於守宰居常簡閲咸以委之至於㸃兵獨疑其詐豈所謂以誠信為治乎上悅曰嚮者朕以卿固執疑卿不逹政事今卿論國家大體誠盡其精要夫號令不信則民不知所從天下何由而治乎朕過深矣乃不㸃中男賜徴金甕一上聞景州録事參軍張玄素名召見問以政道對曰隋主好自専庶務不任羣臣羣臣恐懼唯知禀受奉行而已莫之敢違以一人之智決天下之務借使得失相半乖謬已多下諛上蔽不亡何待陛下誠能謹擇羣臣而分任以事髙拱穆清而考其成敗以施刑賞何憂不治又臣觀隋末亂離其欲爭天下者不過十餘人而已其餘皆保鄉黨全妻子以待有道而歸之耳乃知百姓好亂者亦鮮但人主不能安之耳上善其言擢為侍御史前幽州記室直中書省張藴古上大寶針其略曰聖人受命拯溺亨屯故以一人治天下不以天下奉一人又曰壯九重於內所居不過容膝彼昏不知瑶其臺而瓊其室羅八珍於前所食不過適口惟狂罔念丘其糟而池其酒又曰勿沒沒而暗勿察察而眀雖冕旒蔽目而視於未形雖黈纊塞耳而聽於無聲上嘉之賜以束帛除大理丞上召傅奕賜之食謂曰汝前所奏幾為吾禍然凡有天變卿宜盡言皆如此勿以前事為懲也上嘗謂奕曰佛之為教玄妙可師卿何獨不悟其理對曰佛乃胡中桀黠誑耀彼土中國邪僻之人取莊老玄談輔以妖幻之語用欺愚俗無益於民有害於國臣非不悟鄙不學也上頗然之上患吏多受賕密使左右試賂之有司門令史受絹一匹上欲殺之民部尚書裴矩諌曰為吏受賂罪誠當死但陛下使人遺之而受乃陷人於法也恐非所謂道之以德齊之以禮上悅召文武五品已上告之曰裴矩能當官力爭不為面從儻每事皆然何憂不治臣光曰古人有言君眀臣直裴矩佞於隋而忠於唐非其性之有變也君惡聞其過則忠化為佞君樂聞直言則佞化為忠是知君者表也臣者景也表動則景隨矣太宗貞觀元年春正月丁亥上宴羣臣奏秦王破陳樂上曰朕昔受委専征民間遂有此曲雖非文德之雍容然功業由茲而成不敢忘本封德彝曰陛下以神武平海內豈文德之足比上曰戡亂以武守成以文文武之用各隨其時卿謂文不及武斯言過矣德彛頓首謝上以兵部郎中戴胄忠清公直擢為大理少卿上以選人多詐冒資䕃敕令自首不首者死未幾有詐冒事覺者上欲殺之胄奏據法應流上怒曰卿欲守法而使朕失信乎對曰敕者出於一時之喜怒法者國家所以布大信於天下也陛下忿選人之多詐故欲殺之而既知其不可復斷之以法此乃忍小忿而存大信也上曰卿能執法朕復何憂胄前後犯顔執法言如涌泉上皆從之天下無寃獄上令封德彛舉賢久無所舉上詰之對曰非不盡心但於今未有竒才耳上曰君子用人如器各取所長古之致治者豈借才於異代乎正患已不能知安可誣一世之人德彛慙而退御史大夫杜淹奏諸司文案恐有稽失請令御史就司檢校上以問封德彛對曰設官分職各有所司果有愆違御史自應糾舉若遍歷諸司搜擲疵纇太為煩碎淹默然上問淹何故不復論執對曰天下之務當盡至公善則從之德彛所言真得大體臣誠心服不敢遂非上悅曰公等各能如是朕復何憂右驍衛大將軍長孫順德受人餽絹事覺上曰順德果能有益國家朕與之共有府庫耳何至貪冒如是乎猶惜其有功不之罪但於殿庭賜絹數十匹大理少卿胡演曰順德枉法受財罪不可赦奈何復賜之絹上曰彼有人性得絹之辱甚於受刑如不知愧一禽獸耳殺之何益閏三月壬申上謂太子少師蕭瑀曰朕少好弓矢得良弓十數自謂無以加近以示弓工乃曰皆非良材朕問其故工曰木心不直則脉理皆邪弓雖徑而發矢不直朕始寤嚮者辨之未精也朕以弓矢定四方識之猶未能盡況天下之務其能遍知乎乃命京官五品以上更宿中書內省數延見問以民間疾苦及政事得失夏五月有上書請去佞臣者上問佞臣為誰對曰臣居草澤不能的知其人願陛下與羣臣言或陽怒以試之彼執理不屈者直臣也畏威順㫖者佞臣也上曰君源也臣流也濁其源而求其流之清不可得矣君自為詐何以責臣下之直乎朕方以至誠治天下見前世帝王好以權譎小數接其臣下者常竊恥之卿䇿雖善朕不取也六月戊申上與侍臣論周秦修短蕭瑀對曰紂為不道武王征之周及六國無罪始皇滅之得天下雖同人心則異上曰公知其一未知其二周得天下增修仁義秦得天下益尚詐力此修短之所以殊也蓋取之或可以逆得而守之不可以不順故也瑀謝不及上問公卿以享國久長之䇿蕭瑀言三代封建而久長秦孤立而速亡上以為然於是始有封建之議秋九月辛酉中書令宇文士及罷為殿中監御史大夫杜淹參豫朝政它官參豫政事自此始淹薦刑部員外郎邸懷道上問其行能對曰煬帝將幸江都召百官問行留之計懷道為吏部主事獨言不可臣親見之上曰卿稱懷道為是何為自不正諌對曰臣爾日不居重任又知諫不從徒死無益上曰卿知煬帝不可諫何為立其朝既立其朝何為不諫卿仕隋容可云位卑後仕王世充尊顯矣何得亦不諌對曰臣於世充非不諌但不從耳上曰世充若賢而納諌不應亡國若暴而拒諌卿何得免禍淹不能對上曰今日可謂尊任矣可以諌未對曰願盡死上笑冬十二月或告右丞魏徴私其親戚上使御史大夫溫彥慱按之無狀彥慱言於上曰徴不存形迹逺避嫌疑心雖無私亦有可責上令彥慱讓徴且曰自今冝存形迹它日徴入見言於上曰臣聞君臣同體冝相與盡誠若上下但存形迹則國之興喪尚未可知臣不敢奉詔上瞿然曰吾已悔之徴再拜曰臣幸得奉事陛下願使臣為良臣勿為忠臣上曰忠良有以異乎對曰稷契臯陶君臣協心俱享尊榮所謂良臣龍逄比干面折廷爭身誅國亡所謂忠臣上悅賜絹五百匹上神采英毅羣臣進見者皆失舉措上知之每見人奏事必假以辭色冀聞規諌嘗謂公卿曰人欲自見其形必資眀鏡君欲自知其過必待忠臣茍其君愎諌自賢其臣阿諛順㫖君既失國臣豈能獨全如虞世基等諂事煬帝以保富貴煬帝既弒世基等亦誅公輩冝用此為戒事有得失無惜盡言或上言秦府舊兵冝盡除武職追入宿衛上謂之曰朕以天下為家惟賢是與豈舊兵之外皆無可信者乎汝之此意非所以廣朕德於天下也上謂公卿曰昔禹鑿山治水而民無謗讟者與人同利故也秦始皇營宫室而民怨叛者病人以利己故也夫靡麗珍竒固人之所欲若縱之不已則危亡立至朕欲營一殿材用已具鑒秦而止三公已下宜體朕此意由是二十年間風俗素朴衣無錦繡公私富給上謂黃門侍郎王圭曰國家本置中書門下以相檢察中書詔敕或有差失則門下當行駮正人心所見互有不同茍論難往來務求至當捨已從人亦復何傷比來或護已之短遂成怨隙或茍避私怨知非不正順一人之顔情為兆民之深患此乃亡國之政也煬帝之世內外庶官務相順從當是之時皆自謂有智禍不及身及天下大亂家國兩亡雖其間萬一有得免者亦為時論所貶終古不磨卿曹各當徇公忘私勿雷同也上謂侍臣曰吾聞西域賈胡得美珠剖身以藏之有諸侍臣曰有之上曰人皆知笑彼之愛珠而不愛其身也吏受賕扺法與帝王徇奢欲而亡國者何以異於彼胡之可笑邪魏徴曰昔魯哀公謂孔子曰人有好忘者徙宅而忘其妻孔子曰又有甚者桀紂乃忘其身亦猶是也上曰然朕與公輩冝戮力相輔庶免為人所笑也鄃令裴仁軌私役門夫上怒欲斬之殿中侍御史長安李乾祐諌曰法者陛下所與天下共也非陛下所獨有也今仁軌坐輕罪而扺極刑臣恐人無所措手足上悅免仁軌死以乾祐為侍御史上嘗語及關中山東人意有同異殿中侍御史義豐張行成跪奏曰天子以四海為家不當有東西之異恐示人以隘上善其言厚賜之自是每有大政常使預議二年春正月上問魏徴曰人主何為而眀何為而暗對曰兼聽則眀偏信則暗昔堯清問下民故有苖之惡得以上聞舜眀四目逹四聰故共鯀鱹兜不能蔽也秦二世偏信趙髙以成望夷之禍梁武帝偏信朱异以取臺城之辱隋煬帝偏信虞世基以致彭城閣之變是故人君兼聽廣納則貴臣不得壅蔽而下情得以上通也上曰善上謂黃門侍郎王圭曰開皇十四年大旱隋文帝不許賑給而令百姓就食山東比至末年天下儲積可供五十年煬帝恃其富饒侈心無厭卒亡天下但使倉庾之積足以備凶年其餘何用哉二月上謂侍臣曰人言天子至尊無所畏憚朕則不然上畏皇天之監臨下憚羣臣之瞻仰兢兢業業猶恐不合天意未副人望魏徴曰此誠致治之要願陛下慎終如始則善矣上謂房玄齡等曰為政莫若至公昔諸葛亮竄廖立李嚴於南夷亮卒而立嚴皆悲泣有死者非至公能如是乎又髙頻為隋相公平識治體隋之興亡繫頻之存沒朕既慕前世之明君卿等不可不法前世之賢相也夏四月太常少卿祖孝孫以為梁陳之音多吳楚周齊之音多胡夷於是斟酌南北考以古聲作唐雅樂凡八十四調三十一曲十二和詔協律郎張文收與孝孫同修定六月乙酉孝孫等奏新樂上曰禮樂者蓋聖人緣物以設教耳治之隆替豈由於此御史大夫杜淹曰齊之將亡作伴侣曲陳之將亡作玉樹後庭花其聲哀思行路聞之皆悲泣何得言治之隆替不在樂也上曰不然夫樂能感人故樂者聞之則喜憂者聞之則悲悲喜在人心非由樂也將亡之政民必愁苦故聞樂而悲耳今二曲俱存朕為公奏之公豈悲乎右丞魏徴曰古人稱禮云禮云玉帛云乎哉樂云樂云鐘鼓云乎哉樂誠在人和不在聲音也臣光曰臣聞垂能目制方圓心度曲直然不能以教人其所以教人者必規矩而已矣聖人不勉而中不思而得然不能以授人其所以授人者必禮樂而已矣禮者聖人之所履也樂者聖人之所樂也聖人履中正而樂和平又思與四海共之百世傳之於是乎作禮樂焉故工人執垂之規矩而施之器是亦垂之功已王者執五帝三王之禮樂而施之世是亦五帝三王之治已五帝三王其違世已久後之人見其禮知其所履聞其樂知其所樂炳然若猶存於世焉此非禮樂之功邪夫禮樂有本有末中和者本也容聲者末也二者不可偏廢先王守禮樂之本未嘗須臾去於心行禮樂之文未嘗須臾逺於身興於閨門著於朝廷被於鄉遂比鄰逹於諸侯流於四海自祭祀軍旅至於飲食起居未嘗不在禮樂之中如此數十百年然後治化周浹鳳凰來儀也茍無其本而徒有其末一日行之而百日捨之求以移風易俗誠亦難矣是以漢武帝置協律歌天瑞非不美也不能免哀痛之詔王莽建羲和考律吕非不精也而不能救漸臺之禍晉武帝制笛尺調金石非不祥也不能弭平陽之災梁武帝立四器調八音非不察也不能免臺城之辱然則雖韶夏濩武之音具存於世茍其餘不足以稱之曾不能化一夫況四海乎是猶執垂之規矩而無工與材坐而待器之成終不可得也況齊陳淫昏之主亡國之音暫奏於庭烏能變一世之哀樂乎而太宗遽云治之隆替不由於樂何發言之易而果於非聖人也如此夫禮非威儀之謂也然無威儀則禮不可得而行矣樂非聲音之謂也然無聲音則樂不可得而見矣譬諸山取其一土一石而謂之山則不可然土石皆去山於何在哉故曰無本不立無文不行奈何以齊陳之音不驗於今世而謂樂無益於治亂何異睹拳石而輕泰山乎必若所言則是五帝三王之作樂皆妄也君子於其所不知蓋闕如也惜哉六月戊子上謂侍臣曰朕觀隋煬帝集文辭奧慱亦知是堯舜而非桀紂然行事何其反也魏徴對曰人君雖聖哲猶當虛己以受人故智者獻其謀勇者竭其力煬帝恃其俊才驕矜自用故口誦堯舜之言而身為桀紂之行曽不自知以至覆亡也上曰前事不逺吾屬之師也畿內有蝗辛卯上入苑中見蝗掇數枚祝之曰民以榖為命而汝食之寧食吾之肺腸舉手欲吞之左右諌曰惡物或成疾上曰朕為民受災何疾之避遂吞之是嵗蝗不為災上曰朕每臨朝欲發一言未嘗不三思恐為民害是以不多言給事中知起居事杜正倫曰臣職在記言陛下之言失臣必書之豈徒有害於今亦恐貽譏於後上悅賜絹二百段上曰梁武帝君臣惟談苦空侯景之亂百官不能乘馬元帝為周師所圍猶講老子百官戎服以聽此深足為戒朕所好者唯堯舜周孔之道以為如鳥有翼如魚有水失之則死不可暫無耳秋七月上謂侍臣曰古語有之赦者小人之幸君子之不幸一嵗再赦善人喑啞夫養稂莠者害嘉榖赦有罪者賊良民故朕即位以來不欲數赦恐小人恃之輕犯憲章故也九月上曰比見羣臣屢上表賀祥瑞夫家給人足而無瑞不害為堯舜百姓愁怨而多瑞不害為桀紂後魏之世吏焚連理木煮白雉而食之豈足為至治乎丁未詔自今大瑞聽表聞自外諸瑞申所司而已嘗有白鵲構巢於寢殿槐上合歡如腰鼓左右稱賀上曰我常笑隋煬帝好祥瑞瑞在得賢此何足賀命毁其巢縱鵲於野外上問王圭曰近世為國者益不及前古何也對曰漢世尚儒術宰相多用經術士故風俗淳厚近世重文輕儒參以法律此治化之所以益衰也上然之冬十二月壬午以黃門侍郎王圭為守侍中上嘗間居與圭語有美人侍側上指示圭曰此廬江王瑗之姬也瑗殺其夫而納之圭避席曰陛下以廬江納之為是邪非邪上曰殺人而取其妻何問是非對曰昔齊桓公知郭公之所以亡由善善而不能用然棄其所言之人管仲以為無異於郭公今此美人尚在左右臣以為聖心是之也上悅即出之還其親族上使太常少卿祖孝孫教宫人音樂不稱㫖上責之溫彥慱王圭諌曰孝孫雅士今乃使之教宫人又從而譴之臣竊以為不可上怒曰朕置卿等於腹心當竭忠直以事我乃附下罔上為孝孫遊說邪彥慱拜謝圭不拜曰陛下責臣以忠直今臣所言豈私曲邪此乃陛下負臣非臣負陛下上默然而罷明日上謂房玄齡曰自古帝王納諌誠難朕昨責溫彥慱王圭至今悔之公等勿為此不盡言也上曰為朕養民者唯在都督刺史朕常疏其名於屏風坐卧觀之得其在官善惡之跡皆注於名下以備黜陟縣令尤為親民不可不擇乃命內外五品已上各舉堪為縣令者以名聞上曰比有奴告其主反者此弊事夫謀反不能獨為必與人共之何患不發何必使奴告邪自今有奴告主者皆勿受仍斬之三年春二月戊寅以房玄齡為左僕射杜如晦為右僕射以尚書右丞魏徴守祕書監參預朝政三月丁巳上謂房玄齡杜如晦曰公為僕射當廣求賢人隨才授任此宰相之職也比聞聽受辭訟日不暇給安能助朕求賢乎因敕尚書細務屬左右丞唯大事應奏者乃關僕射玄齡眀逹吏事輔以文學夙夜盡心恐一物失所用法寬平聞人有善若已有之不以求備取人不以己長格物與如晦引拔士類常如不及至於臺閣規模皆二人所定上每與玄齡謀事必曰非如晦不能決及如晦至卒用玄齡之䇿蓋玄齡善謀如晦能斷故也二人深相得同心徇國故唐世稱賢相者推房杜焉玄齡雖䝉寵待或以事被譴輒纍日詣朝堂稽顙請罪恐懼若無所容玄齡監修國史上語之曰比見漢書載子虛上林賦浮華無用其上書論事詞理切直者朕從與不從皆當載之夏四月乙亥上皇徙居弘義宫更名大安宫甲午上始御太極殿謂侍臣曰中書門下機要之司詔敕有不便者皆應論執比來唯睹順從不聞違異若但行文書則誰不可為何必擇才也房玄齡等皆頓首謝故事凡軍國大事則中書舍人各執所見雜署其名謂之五花判事中書侍郎中書令省審之給事中黃門侍郎駮正之上始申眀舊制由是鮮有敗事冬十二月乙酉上問給事中孔穎逹曰論語以能問於不能以多問於寡有若無實若虛何謂也穎逹具釋其義以對且曰非獨匹夫如是帝王亦然帝王內藴神明外當玄默故易稱以䝉養正以眀夷蒞衆若位居尊極炫耀聰眀以才陵人飾非拒諌則下情不通取亡之道也上深善其言房玄齡王圭掌內外官考治書侍御史萬年權萬紀奏其不平上命侯君集推之魏徴諌曰玄齡圭皆朝廷舊臣素以忠直為陛下所委所考既多其間能無一二人不當察其情終非阿私若推得其事則皆不可信豈得復當重任且萬紀比來恆在考堂曽無駮正及身不得考乃始陳論此正欲激陛下之怒非竭誠徇國也使推之得實未足禆益朝廷若其本虛徒失陛下委任大臣之意臣所愛者治體非敢茍私二臣上乃釋不問四年春二月甲寅以御史大夫溫彥慱為中書令守侍中王圭為侍中守戶部尚書戴胄為户部尚書參預朝政太常少卿蕭瑀為御史大夫與宰臣參議朝政三月甲申蔡成公杜如晦薨夏六月乙邜發卒修洛陽宫以備巡幸給事中張玄素上書諌以為洛陽未有巡幸之期而預修宫室非今日之急務昔漢髙祖納婁敬之說自洛陽遷長安豈非洛陽之地不及關中之形勝邪景帝用朝錯之言而七國構禍陛下今處突厥於中國突厥之親何如七國豈得不先為憂而宫室可遽興乘輿可輕動哉臣見隋氏初營宫室近山無大木皆致之逺方二千人曳一柱以木為輪則戞摩火出乃鑄鐡為轂行一二里鐡轂輒破别使數百人齎鐡轂隨而易之盡日不過行二三十里計一柱之費已用數十萬功則其餘可知矣陛下初平洛陽凡隋氏宫室之宏侈者皆令毁之曽未十年復加營繕何前日惡之而今日效之也且以今日財力何如隋世陛下役瘡痍之人襲亡隋之弊恐又甚於煬帝矣上謂玄素曰卿謂我不如煬帝何如桀紂對曰若此役不息亦同歸于亂耳上歎曰吾思之不熟乃至於是顧謂房玄齡曰朕以洛陽土中朝貢道均意欲便民故使營之今玄素所言誠有理冝即為之罷役後日或以事至洛陽雖露居亦無傷也仍賜玄素綵二百匹秋七月乙丑上問房玄齡蕭瑀曰隋文帝何如主也對曰文帝勤於為治每臨朝或至日昊五品已上引坐論事衛士傳飱而食雖性非仁厚亦勵精之主也上曰公得其一未知其二文帝不眀而喜察不明則照有不通喜察則多疑於物事皆自決不任羣臣天下至廣一日萬幾雖復勞神苦形豈能一一中理羣臣既知主意唯取決受成雖有愆違莫敢諌爭此所以二世而亡也朕則不然擇天下賢才置之百官使思天下之事關由宰相審熟便安然後奏聞有功則賞有罪則刑誰敢不竭心力以修職業何憂天下之不治乎因敕百司自今詔敕行下有未便者皆應執奏毋得阿從不盡己意冬十二月諸宰相侍宴上謂王圭曰卿識鑒精通復善談論玄齡以下卿冝悉加品藻且自謂與數子何如對曰孜孜奉國知無不為臣不如玄齡才兼文武出將入相臣不如李靖敷奏詳明出納惟允臣不如溫彥博處繁治劇衆務畢舉臣不如戴胄恥君不及堯舜以諌爭為己任臣不如魏徴至於激濁掦清嫉惡好善臣於數子亦有微長上深以為然衆亦服其確論上之初即位也嘗與羣臣語及教化上曰今承大亂之後恐斯民未易化也魏徴對曰不然久安之民驕佚驕佚則難教經亂之民愁苦愁苦則易化譬猶飢者易為食渴者易為飲也上深然之封德彛非之曰三代以還人漸澆訛故秦任法律漢雜霸道蓋欲化而不能豈能之而不欲邪魏徴書生未識時務若信其虛論必敗國家徴曰五帝三王不易民而化昔黃帝征蚩尤顓頊誅九黎湯放桀武王伐紂皆能身致太平豈非承大亂之後邪若謂古人淳朴漸致澆訛則至于今日當悉化為鬼魅矣人主安得而治之上卒從徴言元年關中饑米斗直絹一匹二年天下蝗三年大水上勤而撫之民雖東西就食未嘗嗟怨是嵗天下大稔流散者咸歸鄉里米斗不過三四錢終嵗斷死刑才二十九人東至于海南及五嶺皆外户不閉行旅不齎糧取給於道路焉上謂長孫無忌曰貞觀之初上書者皆云人主當獨運威權不可委之臣下又云冝震耀威武征討四夷唯魏徴勸朕偃武修文中國既安四夷自服朕用其言今頡利成擒其酋長並帶刀宿衛部落皆襲衣冠徴之力也但恨不使封德彛見之耳徴再拜謝曰突厥破滅海內康寧皆陛下威德臣何力焉上曰朕能任公公能稱所任則其功豈獨在朕乎房玄齡奏閲府庫甲兵逺勝隋世上曰甲兵武備誠不可闕然煬帝甲兵豈不足邪卒亡天下若公等盡力使百姓乂安此乃朕之甲兵也五年秋九月上修仁壽宫更命曰九成宫又將修洛陽宫民部尚書戴胄表諌以亂離甫爾百姓雕弊帑藏空虛若營造不已公私勞費殆不能堪上嘉之曰戴胄於我非親但以忠直體國知無不言故以官爵酬之耳久之竟命將作大匠竇璡修洛陽宫璡鑿池築山雕飾華靡上怒遽命毁之免璡官初上令羣臣議封建魏徴議以為若封建諸侯則卿大夫咸資俸祿必致厚斂又京畿賦稅不多所資畿外若盡以封國邑經費頓闕又燕秦趙代俱帶外夷若有警急追兵內地難以奔赴禮部侍郎李百藥以為運祚修短定命自天堯舜大聖守之而不能固漢魏微賤拒之而不能却今使勳戚子孫皆有民有社易世之後將驕淫自恣攻戰相殘害民尤深不若守令之迭居也中書侍郎顔師古以為不若分王宗子勿令過大間以州縣雜錯而居互相維持使各守其境協力同心足扶京室為置官寮皆省司選用法令之外不得擅作威刑朝貢禮儀具為條式一定此制萬代無虞十一月丙辰詔皇家宗室及勳賢之臣宜令作鎮藩部貽厥子孫非有大故無或黜免所司眀為條例定等級以聞冬十二月上謂侍臣曰朕以死刑至重故令三覆奏蓋欲思之詳熟故也而有司須臾之間三覆已訖又古刑人君為之徹樂減膳朕庭無常設之樂然常為之不啖酒肉但未有著令又百司斷獄唯據律文雖情在可矜而不敢違法其間豈能盡無寃乎丁亥制決死囚者二日中五覆奏下諸州者三覆奏行刑之日尚食勿進酒肉內教坊及太常不舉樂皆令門下覆視有據法當死而情可矜者録狀以聞由是全活甚衆其五覆奏者以決前一二日至決日又三覆奏惟犯惡逆者一覆奏而已上謂執政曰朕常恐因喜怒妄行賞罰故欲公等極諌公等亦冝受人諌不可以己之所欲惡人違之茍自不能受諌安能諌人康國求內附上曰前代帝王好招求絶域以求服逺之名無益於用而糜弊百姓今康國內附儻有急難於義不得不救師行萬里豈不疲勞勞百姓以取虛名朕不為也遂不受謂侍臣曰治國如治病病雖愈尤冝將護儻遽自放縱病復作則不可救矣今中國幸安四夷俱服誠自古所希然朕日慎一日唯懼不終故欲數聞卿輩諌爭也魏徴曰內外治安臣不以為喜唯喜陛下居安思危耳上嘗與侍臣論獄魏徴曰煬帝時嘗有盜發帝令於士澄捕之少涉疑似皆栲訊取服凡二千餘人帝悉令斬之大理丞張元濟怪其多試尋其狀內五人嘗為盜餘皆平民竟不敢執奏盡殺之上曰此豈唯煬帝無道其臣亦不盡忠君臣如此何得不亡公等宜戒之六年春正月文武官請封禪上曰卿輩皆以封禪為帝王盛事朕意不然若天下乂安家給人足雖不封禪庸何傷乎昔秦始皇封禪而漢文帝不封禪後世豈以文帝之賢不及始皇邪且事天掃地而祭何必登泰山之巔封數尺之土然後可以展其誠敬乎羣臣猶請之不已上亦欲從之魏徴獨以為不可上曰公不欲朕封禪者以功未髙邪曰髙矣德未厚邪曰厚矣中國未安邪曰安矣四夷未服邪曰服矣年榖未豐邪曰豐矣符瑞未至邪曰至矣然則何為不可封禪對曰陛下雖有此六者然承隋末大亂之後户口未復倉廩尚虛而車駕東巡千乘萬騎其供頓勞費未易任也且陛下封禪則萬國咸集逺夷君長皆當扈從今自伊洛以東至于海岱煙火尚希灌莽極目此乃引戎入腹中示之以虛弱也況賞賚不資未厭逺人之望給復連年不償百姓之勞崇虛名而受實害陛下將焉用之㑹河南北數州大水事遂寢三月長樂公主將出降上以公主皇后所生特愛之敕有司資送倍於永嘉長公主魏徴諌曰昔漢明帝欲封皇子曰我子豈得與先帝子比皆令半楚淮陽今資送公主倍於長主得無異於明帝之意乎上然其言入告皇后后歎曰妾亟聞陛下稱重魏徴不知其故今觀其引禮義以抑人主之情乃知真社稷之臣也妾與陛下結髮為夫婦曲承恩禮每言必先候顔色不敢輕犯威嚴況以人臣之踈逺乃能抗言如是陛下不可不從也因請遣中使齎錢四百緡絹四百匹以賜徴且語之曰聞公正直乃今見之故以相賞公冝常秉此心勿轉移也上嘗罷朝怒曰㑹須殺此田舍翁后問為誰上曰魏徴每廷辱我后退具朝服立于庭上驚問其故后曰妾聞主明臣直今魏徴直由陛下之眀故也妾敢不賀上乃悅秋七月辛未宴三品已上於丹霄殿上從容言曰中外乂安皆公卿之力然隋煬帝威加夷夏頡利跨有北荒統葉護雄據西域今皆覆亡此乃朕與公等所親見勿矜彊盛以自滿也閏月乙邜上宴近臣於丹霄殿長孫無忌曰王圭魏徴昔為仇讐不謂今日得同此宴上曰徴圭盡心所事故我用之然徴每諌我不從我與之言輒不應何也魏徴對曰臣以事為不可故諌若陛下不從而臣應之則事遂施行故不敢應上曰且應而復諌庸何傷對曰昔舜戒羣臣爾無面從退有後言臣心知其非而口應陛下乃面從也豈稷契事舜之意邪上大笑曰人言魏徴舉止踈慢我視之更覺嫵媚正為此耳徴起拜謝曰陛下開臣使言故臣得盡其愚若陛下拒而不受臣何敢數犯顔色乎戊辰祕書少監虞世南上聖德論上賜手詔稱卿論太髙朕何敢擬上古但比近丗差勝耳然卿適覩其始未知其終若朕能慎終如始則此論可傳如或不然恐徒使後丗笑卿也冬十二月癸丑帝與侍臣論安危之本中書令溫彥博曰伏願陛下常如貞觀初則善矣帝曰朕比來怠於為政乎魏徴曰貞觀之初陛下志在節儉求諌不倦比來營繕微多諌者頗有忤㫖此其所以異耳帝拊掌大笑曰誠有是事上謂侍臣曰朕比來决事或不能皆如律令公輩以為事小不復執奏夫事無不由小以致大此乃危亡之端也昔關龍逄忠諌而死朕每痛之煬帝驕暴而亡公輩所親見也公輩常冝為朕思煬帝之亡朕常為公輩念關龍逄之死何患君臣不相保乎上謂魏徴曰為官擇人不可造次用一君子則君子皆至用一小人則小人競進矣對曰然天下未定則専取其才不考其行喪亂既平則非才行兼備不可用也七年冬十二月上問魏徴曰羣臣上書可采及召對多失次何也對曰臣觀百司奏常事數日思之及至上前三分不能道一況諌者怫意觸忌非陛下借之辭色豈敢盡其情哉上由是接羣臣辭色愈溫嘗曰煬帝多猜忌臨朝對羣臣多不語朕則不然與羣臣相親如一體耳八年冬十二月中牟丞皇甫德參上言修洛陽宫勞人收地租厚斂俗好髙髻蓋宫中所化上怒謂房玄齡等曰德參欲國家不役一人不收斗租官人皆無髮乃可其意邪欲治其謗訕之罪魏徴諌曰賈誼當漢文帝時上書云可為痛哭者一可為流涕者二自古上書不激切不能動人主之心所謂狂夫之言聖人擇焉唯陛下裁察上曰朕罪斯人則誰復敢言乃賜絹二十匹他日徴奏言陛下近日不好直言雖勉强含容非曩時之豁如上乃更加優賜拜監察御史九年春三月上謂魏徴曰齊後主周天元皆重斂百姓厚自奉養力竭而亡譬如饞人自噉其肉肉盡而斃何其愚也然二主孰為優劣對曰齊後主懦弱政出多門周天元驕暴威福在己雖同為亡國齊王尤劣也十年秋八月丙子上謂羣臣曰朕開直言之路以利國也而比來上封事者多訐人細事自今復有為是者朕當以讒人罪之冬十二月魏王泰有寵於上或言三品以上多輕魏王上怒引三品以上作色讓之曰隋文帝時一品以下皆為諸王所頓躓彼豈非天子兒邪朕但不聽諸子縱橫耳聞三品以上皆輕之我若縱之豈不能折辱公輩乎房玄齡等皆惶懼流汗拜謝魏徴獨正色曰臣竊計當今羣臣必無敢輕魏王者在禮臣子一也春秋王人雖微序於諸侯之上三品以上皆公卿陛下所尊禮若紀綱大壞固所不論聖明在上魏王必無頓辱羣臣之理隋文帝驕其諸子使多行無禮卒皆夷滅又足法乎上悅曰理到之語不得不服朕以私愛忘公義嚮者之忿自謂不疑及聞徴言方知理屈人主發言何得容易乎上曰法令不可數變數變則煩官長不能盡記又前後差違吏得以為姦自今變法皆冝詳慎而行之治書侍御史權萬紀上言宣饒二州銀大發采之嵗可得數百萬緡上曰朕貴為天子所乏者非財也但恨無嘉言可以利民耳與其多得數百萬緡何如得一賢才卿未嘗進一賢退一不肖而専言稅銀之利昔堯舜抵璧於山投珠於谷漢之桓靈乃聚錢為私藏卿欲以桓靈俟我邪是日黜萬紀使還家十一年春正月上作飛山宫庚子特進魏徴上疏以為煬帝恃其富彊不虞後患窮奢極欲使百姓困窮以至身死人手社稷為墟陛下撥亂反正冝思隋之所以失我之所以得撤其峻宇安於卑宫若因基而增廣襲舊而加飾此則以亂易亂殃咎必至難得易失可不念哉上嘗問大理卿劉德威曰近日刑網稍密何也對曰此在主上不在羣臣人主好寬則寬好急則急律文失入減三等失出減五等今失入無辜失出更獲大罪是以吏各自免競就深文非有教使之然畏罪故耳陛下儻一斷以律則此風立變矣上悅從之由是斷獄平允二月上至顯仁宫官吏以闕儲偫有被譴者魏徴諌曰陛下以儲偫譴官吏臣恐承風相扇異日民不聊生殆非行幸之本意也昔煬帝諷郡縣獻食視其豐儉以為賞罰故海內叛之此陛下所親見奈何欲效之乎上驚曰非公不聞此言因謂長孫無忌等曰朕昔過此買飯而食僦舍而宿今供頓如此豈得猶嫌不足乎三月庚子上宴洛陽宫西苑泛積翠池顧謂侍臣曰煬帝作此宫苑結怨於民今悉為我有正由宇文述虞世基裴藴之徒內為諂諛外蔽聰明故也可不戒哉夏四月己邜魏徴上疏以為人主善始者多克終者寡豈取之易而守之難乎蓋以殷憂則竭誠以盡下安逸則驕恣而輕物盡下則胡越同心輕物則六親離德雖震之以威怒亦皆貌從而心不服故也人主誠能見可欲則思知足將興繕則思知止處髙危則思謙降臨滿盈則思挹損遇逸樂則思撙節在宴安則思後患防擁蔽則思延納疾讒邪則思正己行爵賞則思因喜而僣施刑罰則思因怒而濫兼是十思而選賢任能固可以無為而治又何必勞神苦體以代百司之任哉五月壬申魏徴上疏以為陛下欲善之志不及於昔時聞過必改少虧於曩日譴罰積多威怒微厲乃知貴不期驕富不期侈非虛言也且以隋之府庫倉廩户口甲兵之盛考之今日安得擬倫然隋以富彊動之而危我以寡弱靜之而安安危之理皎然在目昔隋之未亂也自謂必無亂其未亡也自謂必無亡故賦役無窮征伐不息以至禍將及身而尚未之寤也夫鑒形莫如止水鑒敗莫如亡國伏願取鑒於隋去奢從約親忠逺佞以當今之無事行疇昔之恭儉則盡善盡美固無得而稱焉夫取之實難守之甚易陛下能得其所難豈不能保其所易乎秋七月魏徴上疏以為文子曰同言而信信在言前同令而行誠在令外自王道休眀十有餘年然而德化未洽者由待下之情未盡誠信故也今立政致治必委之君子事有得失或訪之小人其待君子也敬而踈遇小人也輕而狎狎則言無不盡踈則情不上通夫中智之人豈無小慧然才非經國慮不及逺雖竭力盡誠猶未免有敗況內懷姦宄其禍豈不深乎夫雖君子不能無小過茍不害於正道斯可略矣既謂之君子而復疑其不信何異立直木而疑其影之曲乎陛下誠能慎選君子以禮信用之何憂不治不然危亡之期未可保也土賜手詔褒美曰昔晉武帝平吳之後志意驕怠何曽位極台司不能直諌乃私語子孫自矜明智此不忠之大者也得公之諌朕知過矣當置之几案以比弦韋乙未車駕還洛陽詔洛陽宫為水所毁者少加修繕才令可居自外衆材給城中壞廬舍者令百官各上封事極言朕過壬寅廢明德宫及飛山宫之玄圃院給遭水者八月甲子上謂侍臣曰上封事者皆言朕遊獵太頻今天下無事武備不可忘朕時與左右獵於後苑無一事煩民夫亦何傷魏徴曰先王惟恐不聞其過陛下既使之上封事止得恣其陳述茍其言可取固有益於國若其無取亦無所損上曰公言是也皆勞而遣之侍御史馬周上疏以為三代及漢歷年多者八百少者不減四百良以恩結人心人不能忘故也自是以降多者六十年少者才二十餘年皆無恩於人本根不固故也陛下當隆禹湯文武之業為子孫立萬代之基豈得但持當年而已今之户口不及隋之什一而給役者兄去弟還道路相繼陛下雖加恩詔使之裁損然營繕不休民安得息故有司徒行文書曽無事實昔漢之文景恭儉養民武帝承其豐富之資故能窮奢極欲而不至於亂嚮使髙祖之後即傳武帝漢室安得久存乎又京師及四方所造乘輿器用及諸王妃主服飾議者皆不以為儉夫昧旦丕顯後世猶怠陛下少居民間知民疾苦尚復如此況皇太子生長深宫不更外事萬嵗之後固聖慮所當憂也臣觀自古以來百姓愁怨聚為盜賊其國未有不亡者人主雖欲追改不能復全故當修於可修之時不可悔之於既失之後也蓋幽厲嘗笑桀紂矣煬帝亦笑周齊矣不可使後之笑今如今之笑煬帝也貞觀之初天下饑歉斗米直匹絹而百姓不怨者知陛下憂念不忘故也今比年豐穰匹絹得粟十餘斛而百姓怨咨者知陛下不復念之多營不急之務故也自古以來國之興亡不以畜積多少在於百姓苦樂且以近事驗之隋貯洛口倉而李密因之東都積布帛而世充資之西京府庫亦為國家之用至今未盡夫畜積固不可無要當人有餘力然後收之不可彊斂以資冦敵也夫儉以息人陛下已於貞觀之初親所履行在於今日為之固不難也陛下必欲為久長之謀不必逺求上古但如貞觀之初則天下幸甚陛下寵遇諸王頗有過厚者萬代之後不可不深思也且魏武帝愛陳思王及文帝即位囚禁諸王但無縲絏耳然則武帝愛之適所以苦之也又百姓所以治安唯在刺史縣令茍選用得人則陛下可以端拱無為今朝廷唯重內官而輕州縣之選刺史多用武人或京官不稱職始補外任邉逺之處用人更輕所以百姓未安殆由於此疏奏上稱善久之謂侍臣曰刺史朕當自選縣令冝詔京官五品已上各舉一人冬十月上獵於洛陽苑有羣豕突出林中上引弓四發殪四豕有豕突前及馬鐙民部尚書唐儉投馬摶之上拔劒斬豕顧笑曰天䇿長史不見上將擊賊邪何懼之甚對曰漢祖以馬上得之不以馬上治之陛下以神武定四方豈復逞雄心於一獸上悅為之罷獵尋加光祿大夫十二年春三月辛亥著作佐郎鄧世隆表請集上文章上曰朕之辭令有益於民者史皆書之足為不朽若其無益集之何用梁武帝父子陳後主隋煬帝皆有文集行於世何救於亡為人主患無德政文章何為遂不許丙子以皇孫生宴五品以上於東宫上曰貞觀之前從朕經營天下玄齡之功也貞觀以來繩愆糾繆魏徴之功也皆賜之佩刀上謂徴曰朕政事何如往年對曰威德所加比貞觀之初則逺矣人悅服則不逮也上曰逺方畏威慕德故來服若其不逮何以致之對曰陛下往以未治為憂故德義日新今以既治為安故不逮上曰今所為猶往年也何以異對曰陛下貞觀之初恐人不諌常導之使言中間悅而從之今則不然雖勉從之猶有難色所以異也上曰其事可聞歟對曰陛下昔欲殺元律師孫伏伽以為法不當死陛下賜以蘭陵公主園直百萬或云賞太厚陛下云朕即位以來未有諌者故賞之此導之使言也司户栁雄妄訴隋資陛下欲誅之納戴胄之諌而止是悅而從之也近皇甫德參上書諌修洛陽宫陛下恚之雖以臣言而罷勉從之也上曰非公不能及此人苦不自知耳秋九月甲寅上問侍臣帝王創業與守成孰難房玄齡曰草昧之初與羣雄並起角力而後臣之創業難矣魏徴曰自古帝王莫不得之於艱難失之於安逸守成難矣上曰玄齡與吾共取天下出百死得一生故知創業之難徴與吾共安天下常恐驕奢生於富貴禍亂生於所忽故知守成之難然創業之難既已往矣守成之難方當與諸公慎之玄齡等拜曰陛下及此言四海之福也十三年春二月上既詔宗室羣臣襲封刺史左庶子于志寧以為古今事殊恐非久安之道上疏爭之侍御史馬周亦上疏以為堯舜之父猶有朱均之子儻有孩童嗣職萬一驕愚兆庶被其殃而國家受其敗正欲絶之也則子文之治猶在正欲留之也而欒黶之惡已彰與其毒害於見存之百姓則寧使割恩於己亡之一臣明矣然則向所謂愛之者乃適所以傷之也臣謂宜賦以茅土疇其户邑必有材行隨器授官使其人得奉大恩而子孫終其福祿㑹司空趙州刺史長孫無忌等皆不願之國上表固讓稱承恩以來形影相弔若履春冰宗戚憂虞如置湯火緬惟三代封建蓋由力不能制因而利之禮樂節文多非已出兩漢罷侯置守蠲除曩弊深協事冝今因臣等復有變更恐紊聖朝綱紀且後世愚幼不肖之嗣或扺冒邦憲自取誅夷更因延世之賞致成剿絶之禍良可哀愍願停渙汗之㫖賜其性命之恩無忌又因子婦長樂公主固請於上且言臣披荆棘事陛下今海內寧一奈何棄之外州與遷徙何異上曰割地以封功臣古今通義意欲公之後嗣輔朕子孫共傳永久而公等乃復發言怨望朕豈彊公等以茅土邪庚子詔停世封刺史夏五月旱甲寅詔五品以上上封事魏徴上疏以為陛下志業比貞觀之初漸不克終者凡十條其間一條以為頃年以來輕用民力乃云百姓無事則驕逸勞役則易使自古未有因百姓逸而敗勞而安者也此恐非興邦之至言上深加奬歎云已列諸屏障朝夕瞻仰併録付史官仍賜徴黃金十斤廄馬二匹冬十一月戊辰尚書左丞劉洎為黃門侍郎參知政事十四年冬十二月魏徴上疏以為在朝羣臣當樞機之寄者任之雖重信之未篤是以人或自疑心懷茍且陛下寬於大事急於小罪臨時責怒未免愛憎夫委大臣以大體責小臣以小事為治之道也今委之以職則重大臣而輕小臣至於有事則信小臣而疑大臣信其所輕疑其所重將求致治其可得乎若任以大官求其細過刀筆之吏順㫖承風舞文弄法曲成其罪自陳也則以為心不伏辜不言也則以為所犯皆實進退惟谷莫能自明則茍求免禍矯僞成俗矣上納之上謂侍臣曰朕雖平定天下其守之甚難魏徴對曰臣聞戰勝易守勝難陛下之及此言宗廟社稷之福也右庶子張玄素少為刑部令史上嘗對朝臣問之曰卿在隋何官對曰縣尉又問未為尉時何官對曰流外又問何曹玄素恥之出閣殆不能步色如死灰諌議大夫禇遂良上疏以為君能禮其臣乃能盡其力玄素雖出寒微陛下重其才擢至三品翼贊皇儲豈可復對羣臣窮其門户棄宿昔之恩成一朝之恥使之鬱結於懷何以責其仗節死義乎上曰朕亦悔此問卿疏深㑹我心遂良亮之子也孫伏伽與玄素在隋皆為令史伏伽或於廣坐自陳往事一無所隱言事者多請上親覽表奏以防壅蔽上以問魏徴對曰斯人不知大體必使陛下一一親之豈惟朝堂州縣之事亦當親之矣十五年秋七月丙子上指殿屋謂侍臣曰治天下如建此屋營構既成勿數改移茍易一榱正一瓦踐履動搖必有所損若慕竒功變法度不恆其德勞擾實多冬十二月上問魏徴比來朝臣何殊不論事對曰陛下虛心采納必有言者凡臣徇國者寡愛身者多彼畏罪故不言耳上曰然人臣關說忤㫖動及刑誅與夫蹈湯火冒白刃者亦何異哉是以禹拜昌言良為此也房玄齡髙士廉遇少府少監竇德素於路問北門近何營繕德素奏之上怒讓玄齡等曰君但知南牙政事北門小營繕何預君事玄齡等拜謝魏徴進曰臣不知陛下何以責玄齡等而玄齡等亦何所謝玄齡等為陛下股肱耳目於中外事皆無不應知者使所營為是當助陛下成之為非當請陛下罷之問於有司理則冝然不知何罪而責亦何罪而謝也上甚愧之上嘗臨朝謂侍臣曰朕為人主常兼將相之事給事中張行成退而上書以為禹不矜伐而天下莫與之爭陛下撥亂反正羣臣誠不足望清光然不必臨朝言之以萬乘之尊乃與羣臣校功爭能臣竊為陛下不取上甚善之十六年夏四月壬子上謂諌議大夫禇遂良曰卿猶知起居注所書可得觀乎對曰史官書人君言動備記善惡庶幾人君不敢為非未聞自取而觀之也上曰朕有不善卿亦記之邪對曰臣職當載筆不敢不記黃門侍郎劉洎曰借使遂良不記天下亦皆記之上曰誠然秋七月戊午以長孫無忌為司徒房玄齡為司空特進魏徴有疾上手詔問之且言不見數日朕過多矣今欲自往恐益為勞若有聞見可封狀進來徴上言比者弟子陵師奴婢忽主下多輕上皆有為而然漸不可長又言陛下臨朝嘗以至公為言退而行之未免私僻或畏人知橫加威怒欲蓋彌彰竟有何益徴宅無堂上命輟小殿之材以構之五日而成仍賜以素屏風素褥几杖等以遂其所尚徴上表謝上手詔稱處卿至此蓋為黎元與國家豈為一人何事過謝冬十一月壬申上曰朕為兆民之主皆欲使之富貴若教以禮義使之少敬長婦敬夫則皆貴矣輕徭薄斂使之皆治生業則皆富矣若家給人足朕雖不聽管絃樂在其中矣髙祖之入關也隋武勇郎將馮翊党仁弘將兵二千餘人歸髙祖於蒲坂從平京城尋除陜州總管大軍東討仁弘轉餉不絶歷南寧戎廣州都督仁弘有才略所至著聲迹上甚器之然性貪罷廣州為人所訟贓百餘萬罪當死上謂侍臣曰吾昨見大理五奏誅仁弘哀其白首就戮方晡食遂命撤案然為之求生理終不可得今欲曲法就公等乞之十二月壬午朔上復召五品已上就太極殿前謂曰法者人君所受於天不可以私而失信今朕私党仁弘而欲赦之是亂其法上負於天欲席藁於南郊日一進蔬食以謝罪於天三日房玄齡等皆曰生殺之柄人主所得専也何至自貶責如此上不許羣臣頓首固請於庭自旦至日昊上乃降手詔自稱朕有三罪知人不明一也以私亂法二也善善未賞惡惡未誅三也以公等固諌且依來請於是黜仁弘為庶人徙欽州上問侍臣曰自古或君亂而臣治或君治而臣亂二者孰愈魏徴對曰君治則善惡賞罰當臣安得而亂之茍為不治縱暴愎諌雖有良臣將安所施上曰齊文宣得楊遵彥非君亂而臣治乎對曰彼才能救亡耳烏足為治哉十七年春正月鄭文貞公魏徴薨上思徴之不已謂侍臣曰人以銅為鏡可以正衣冠以古為鏡可以見興㬱以人為鏡可以知得失魏徴沒朕亡一鏡矣二月壬午上問諌議大夫禇遂良曰舜造漆器諌者十餘人此何足諌對曰奢侈者危亡之本漆器不已將以金玉為之忠臣愛君必防其漸若禍亂已成無所復諌矣上曰然朕有過卿亦當諌其漸朕見前世帝王拒諌者多云業已為之或云業已許之終不為改如此欲無危亡得乎時皇子為都督刺史者多幼稚遂良上疏以為漢宣帝云與我共治天下者其惟良二千石乎今皇子幼稚未知從政不若或留京師教以經術俟其長而遣之上以為然丁未上曰人主惟有一心而攻之者甚衆或以勇力或以辨口或以諂諛或以姦詐或以嗜欲輻湊攻之各求自售以取寵祿人主少懈而受其一則危亡隨之此其所以難也初上謂監修國史房玄齡曰前世史官所記皆不令人主見之何也對曰史官不虛美不隱惡若人主見之必怒故不敢獻也上曰朕之為心異於前世帝王欲自觀國史知前日之惡為後來之戒公可撰次以聞諌議大夫朱子奢上言陛下聖德在躬舉無過事史官所述義歸盡善陛下獨覽起居於事無失若以此法傳示子孫竊恐曽玄之後或非上智飾非護短史官必不免刑誅如此則莫不希風順㫖全身逺害悠悠千載何所信乎所以前代不觀蓋謂此也上不從玄齡乃與給事中許敬宗等删為髙祖今上實録癸巳書成上之上見書六月四日事語多微隱謂玄齡曰昔周公誅管蔡以安周季友鴆叔牙以存魯朕之所為亦類是耳史官何諱焉即命削去浮辭直書其事十八年夏四月上謂侍臣曰人臣順㫖者多犯顔則少今朕欲自聞其失諸公其直言無隱長孫無忌等皆曰陛下無失劉洎曰頃有上書不稱㫖者陛下皆面加窮詰無不慙懼而退恐非所以廣言路馬周曰陛下比來賞罰微以喜怒有所髙下此外不見其失上皆納之上好文學而辨敏羣臣言事者上引古今以折之多不能對劉洎上書諌曰帝王之與凡庶聖哲之與庸愚上下相懸擬倫斯絶是知以至愚而對至聖以極卑而對至尊徒思自彊不可得也陛下降恩㫖假慈顔凝旒以聽其言虛襟以納其說猶恐羣下未敢對揚況動神機縱天辨飾辭以折其理引古以排其議欲令凡庶何階應答且多記則損心多語則損氣心氣內損形神外勞初雖不覺後必為纍須為社稷自愛豈為性好自傷乎至如秦政彊辨失人心於自矜魏文宏才虧衆望於虛說此才辨之纍較然可知矣上飛白答之曰非慮無以臨下非言無以述慮比有談論遂致煩多輕物驕人恐由茲道形神心氣非此為勞今聞讜言虛懷以改秋八月壬子上謂司徒無忌等曰人苦不自知其過卿可為朕明言之對曰陛下武功文德臣等將順之不暇又何過之可言上曰朕問公以己過公等乃曲相諛悅朕欲面舉公等得失以相戒而改之何如皆拜謝上曰長孫無忌善避嫌疑應物敏速決斷事理古人不過而總兵攻戰非其所長髙士亷涉獵古今心術明逹臨難不改節當官無朋黨所乏者骨鯁規諌耳唐儉言辭辨捷善和解人事朕三十年遂無言及於獻㬱楊師道性行純和自無愆違而情實怯懦緩急不可得力岑文本性質敦厚文章華贍而持論恆據經逺自當不負於物劉洎性最堅貞有利益然其意尚然諾私於朋友馬周見事敏速性甚貞正論量人物直道而言朕比任使多能稱意禇遂良學問稍長性亦堅正每寫忠誠親附於朕譬如飛鳥依人人自憐之九月以諌議大夫禇遂良為黃門侍郎參預朝政二十年秋九月特進同中書門下三品宋公蕭瑀性狷介與同僚多不合嘗言於上曰房玄齡與中書門下衆臣朋黨不忠執權膠固陛下不詳知但未反耳上曰卿言得無太甚人君選賢才以為股肱心膂當推誠任之人不可以求備必捨其所短取其所長朕雖不能聰明何至頓迷臧否乃至於是瑀內不自得既數忤㫖上亦銜之但以其忠言居多未忍廢也上嘗謂張亮曰卿既事佛何不出家瑀因自請出家上曰亦知公雅好桑門今不違公意瑀須臾復進曰臣適思之不能出家上以瑀對羣臣發言反覆尤不能平㑹稱足疾不朝或至朝堂而不入見上知瑀意終怏怏冬十月手詔數其罪曰朕於佛教非意所遵求其道者未驗福於將來修其教者翻受辜於既往至若梁武窮心於釋氏簡文鋭意於法門傾帑藏以給僧祇殫人力以供塔廟及乎三淮沸浪五嶺騰煙假餘息於熊蹯引殘魂於雀鷇子孫覆亡而不暇社稷俄頃而為墟報施之徴何其謬也瑀踐覆車之餘軌襲亡國之遺風棄公就私未明隱顯之際身俗口道莫辨邪正之心修纍葉之殃源祈一躬之福本上以違忤君主下則扇習浮華自請出家尋復違異一回一惑在於瞬息之間自可自否變於帷扆之所乖棟梁之體豈具瞻之量乎朕隱忍至今瑀全無悛改可商州刺史仍除其封冬十二月房玄齡嘗以微譴歸第禇遂良上疏以為玄齡自義旗之始翼贊聖功武德之季冒死決䇿貞觀之初選賢立政人臣之勤玄齡為最自非有罪在不赦搢紳同尤不可遐棄陛下若以其衰老亦當諷諭使之致仕退之以禮不可以淺鮮之過棄數十年之勳舊上遽召出之頃之玄齡復避位還家久之上幸芙蓉園玄齡敕子弟汛掃門庭曰乘輿且至有頃上果幸其第因載玄齡還宫二十一年夏五月庚辰上御翠微殿問侍臣曰自古帝王雖平定中夏不能服戎狄朕才不逮古人而成功過之自不諭其故諸公各帥意以實言之羣臣皆稱陛下功德如天地萬物不得而名言上曰不然朕所以能及此者止由五事耳自古帝王各疾勝己者朕見人之善若已有之人之行能不能兼備朕常棄其所短取其所長人主往往進賢則欲置諸懷退不肖則欲推諸壑朕見賢者則敬之不肖者則憐之賢不肖各得其所人主多惡正直隂誅顯戮無代無之朕踐祚以來正直之士比肩於朝未嘗黜責一人自古皆貴中華賤夷狄朕獨愛之如一故其種落皆依朕如父母此五者朕所以成今日之功也顧謂禇遂良曰公嘗為史官如朕言得其實乎對曰陛下盛德不可勝載獨以此五者自與蓋謙謙之志耳秋八月己丑齊州人段志冲上封事請上致政於皇太子太子聞之憂形於色發言流涕長孫無忌等請誅志冲上手詔曰五嶽陵霄四海亘地納汙藏疾無損髙深志冲欲以匹夫解位天子朕若有罪是其直也若其無罪是其狂也譬如尺霧障天不虧於大寸雲㸃日何損於明二十二年春正月己丑上作帝範十二篇以賜太子曰君體建親求賢審官納諌去才戒盈崇儉賞罰務農閲武崇文且曰修身治國備在其中一旦不諱更無所言矣又曰汝當更求古之哲王以為師如吾不足法也夫取法於上僅得其中取法於中不免為下吾居位以來不善多矣錦繡珠玉不絶於前宫室臺榭屢有興作犬馬鷹隼無逺不致行遊四方供頓煩勞此皆吾之深過勿以為是而法之顧我弘濟蒼生其益多肇造區夏其功大益多損少故人不怨功大過微故業不墮然比之盡美盡善固多愧矣汝無我之功勤而承我之富貴竭力為善則國家僅安驕惰奢縱則一身不保且成遲敗速者國也失易得難者位也可不惜哉可不慎哉秋七月司空梁文昭公房玄齡留守京師疾篤上徴赴玉華宫肩輿入殿至御座側乃下相對流涕因留宫上聞其小愈則喜形於色加劇則憂悴玄齡謂諸子曰吾受主上厚恩今天下無事惟東征未巳羣臣莫敢諌吾知而不言死有餘責乃上表諌平遼東語見唐玄齡子遺愛尚止女髙陽公主上謂公主曰彼病篤如此尚能憂我國家上自臨視握手與訣悲不自勝癸卯薨桞芳曰玄齡佐太宗定天下及終相位凡三十二年天下號為賢相然無跡可尋德亦至矣故太宗定禍亂而房杜不言功王魏善諌諍而房杜讓其賢英衛善將兵而房杜行其道理致太平善歸人主為唐宗臣冝哉唐平遼東唐髙祖武德四年秋七月乙丑髙句麗王建武遣使入貢建武元之弟也五年上以隋末戰士多沒於髙麗是嵗賜髙麗王建武書使悉遣還亦使州縣索髙麗人在中土者遣歸其國建武奉詔遣還中國民前後以萬數七年春二月丁未髙麗王建武遣使來請班曆遣使冊建武為遼東郡王髙麗王以百濟王夫餘璋為帶方郡王新羅王金真平為樂浪郡王九年新羅百濟髙麗三國有宿仇迭相攻擊上遣國子助教朱子奢往諭指三國皆上表謝罪太宗貞觀五年新羅王真平卒無嗣國人立其女善德為王十五年秋七月上遣職方郎中陳大德使髙麗八月己亥自髙麗還大德初入其境欲知山川風俗所至城邑以綾綺遺其守者曰吾雅好山水此有勝處吾欲觀之守者喜導之遊歷無所不至往往見中國人自云家在某郡隋末從軍沒於髙麗髙麗妻以遊女與髙麗錯居殆將半矣因問親戚存沒大德紿之曰皆無恙咸涕泣相告數日後隋人望之而哭者遍於郊野大德言於上曰其國聞髙昌亡大懼館候之勤加於常數上曰髙麗本四郡地耳吾發卒數萬攻遼東彼必傾國救之别遣舟師出東萊自海道趨平壤水陸合勢取之不難但山東州縣雕瘵未復吾不欲勞之耳十六年冬十一月丁巳營州都督張儉奏髙麗東部大人泉蓋蘇文弒其王武蓋蘇文凶暴多不法其王及大臣議誅之蓋蘇文密知之悉集部兵若校閲者并盛陳酒饌於城南召諸大臣共臨視勒兵盡殺之死者百餘人因馳入宫手弒其王斷為數假棄溝中立王弟子藏為王自為莫離支其官如中國吏部兼兵部尚書也於是號令逺近專制國事蓋蘇文狀貌雄偉意氣豪逸身佩五刀左右莫敢仰視每上下馬常令貴人武將伏地而履之出行必整隊伍前導者長呼則人皆奔迸不避坑谷路絶行者國人甚苦之亳州刺史裴思莊奏請伐髙麗上曰髙麗王武職貢不絶為賊臣所弒朕哀之甚深固不忘也但因喪乘亂而取之雖得之不貴且山東雕弊吾未忍言用兵也十七年夏六月丁亥太常丞鄧素使髙麗還請於懷逺鎮增戍兵以逼髙麗上曰逺人不服則修文德以來之未聞一二百戍兵能威絶域者也上曰蓋蘇文弒其君而專國政誠不可忍以今日兵力取之不難但不欲勞百姓吾欲且使契丹靺鞨擾之何如長孫無忌曰蓋蘇文自知罪大畏大國之討必嚴設守備陛下姑為之隱忍彼得以自安必更驕惰愈肆其惡然後討之未晚也上曰善戊辰詔以髙麗王藏為上柱國遼東郡王髙麗王遣使持節冊命秋九月庚辰新羅遣使言百濟攻取其國四十餘城復與髙麗連兵謀絶新羅入朝之路乞兵救援上命司農丞相里玄奬齎璽書賜髙麗曰新羅委質國家朝貢不乏爾與百濟各宜戢兵若更攻之明年發兵擊爾國矣十八年春正月相里玄奬至平壤莫離支已將兵擊新羅破其兩城髙麗王使召之乃還玄奬諭使勿攻新羅莫離支曰昔隋人入冦新羅乘舋侵我地五百里自非歸我侵地恐兵未能已玄奬曰既往之事焉可追論至於遼東諸城本皆中國郡縣中國尚且不言髙麗豈得必求故地莫離支竟不從二月乙巳朔玄奬還具言其狀上曰蓋蘇文弒其君賊其大臣殘虐其民今又違我詔命侵暴鄰國不可以不討諌議大夫禇遂良曰陛下指麾則中原清晏顧眄則四夷讋服威望大矣今乃渡海逺征小夷若指期克捷猶可也萬一蹉跌傷威損望更興忿兵則安危難測矣李世績曰間者薛延陀入寇陛下欲發兵窮討魏徴諌而止使至今為患嚮用陛下之䇿北鄙安矣上曰然此誠徴之失朕尋悔之而不欲言恐塞良謀故也上欲自征髙麗禇遂良上疏以為天下譬猶一身兩京心腹也州縣四支也四夷身外之物也髙麗罪大誠當致討但命二三猛將將四五萬衆杖陛下威靈取之如反掌耳今太子新立年尚幼稚自餘藩屏陛下所知一旦棄金湯之全踰遼海之險以天下之君輕行逺舉皆愚臣之所甚憂也上不聼時羣臣多諫征髙麗者上曰八堯九舜不能冬種野夫童子春種而生得時故也夫天有其時人有其功蓋蘇文陵上虐下民延頸待救此正髙麗可亡之時也議者紛紜但不見此耳上將征髙麗秋七月辛卯勑將作大匠閻立德等詣洪饒江三州造船四百艘以載軍糧甲午下詔遣營州都督張儉等帥幽營二都督兵及契丹奚靺鞨先擊遼東以觀其勢以太常卿韋挺為饋運使以民部侍郎崔仁師副之自河北諸州皆受挺節度聼以便宜從事又命太僕少卿蕭鋭運河南諸州糧入海鋭瑀之子也九月乙未鴻臚奏髙麗莫離支貢白金禇遂良曰莫離支弒其君九夷所不容今將討之而納其金此郜鼎之類也臣謂不可受上從之上謂髙麗使者曰汝曹皆事髙武有官爵莫離支弒逆汝曹不能復讎今更為之遊說以欺大國罪孰大焉悉以屬大理冬十月甲寅車駕行幸洛陽十一月壬申至洛陽前宜州刺史鄭元璹已致仕上以其常從隋煬帝伐髙麗召詣行在問之對曰遼東道逺糧運艱阻東夷善守城攻之不可猝下上曰今日非隋之比公但聼之張儉等值遼水漲久不得濟上以為畏懦召儉詣洛陽至具陳山川險易水草美惡上悅上聞洺州刺史程名振善用兵召問方略嘉其才敏即日拜右驍衛將軍甲午以刑部尚書張亮為平壤道行軍大總管帥江淮嶺硤兵四萬長安洛陽募士三千戰艦五百艘自萊州泛海趨平壤又以太子詹事左衛率李世績為遼東道行軍大總管帥步騎六萬及蘭河二州降胡趣遼東兩軍合勢並進庚子諸軍大集於幽州遣行軍總管姜行本少府少監丘行淹先督衆工造梯衝於安蘿山時逺近勇士應募及獻攻城器械者不可勝數上皆親加損益取其便易又手詔諭天下以髙麗蓋蘇文弒主虐民情何可忍令欲巡幸幽薊問罪遼碣所過營頓無為勞費且言昔隋煬帝殘暴其下髙麗王仁愛其民以思亂之軍擊安和之衆故不能成功今略言必勝之道有五一曰以大擊小二曰以順討逆三曰以治乘亂四曰以逸敵勞五曰以悅當怨何憂不克布告元元勿為疑懼於是凡頓舍供費之具減者太半十一月辛丑武陽懿公李大亮卒於長安遺表請罷髙麗之師甲寅詔諸軍及新羅百濟奚契丹分道擊髙麗十九年春二月庚戌上自將諸軍發洛陽以特進蕭瑀為洛陽宫留守乙卯詔朕發定州後宜令皇太子監國開府儀同三司致仕尉遲敬德上言陛下親征遼東太子在定州長安洛陽心腹空虛恐有玄感之變且邊隅小夷不足以勤萬乘願遣偏師征之指期可殄上不從以敬德為左一馬軍總管使從行癸亥上至鄴自為文祭魏太祖曰臨危制變料敵設竒一將之智有餘萬乘之才不足是月李丗績軍至幽州三月丁丑車駕至定州丁亥上謂侍臣曰遼東本中國之地隋氏四出師而不能得朕今東征欲為中國報子弟之讎髙麗雪君父之耻耳且方隅大定惟此未平故及朕之未老用士大夫餘力以取之朕自發洛陽惟噉肉飯雖春蔬亦不之進懼其煩擾故也上見病卒召至御榻前存慰付州縣療之士卒莫不感悅有不預征名自願以私裝從軍動以千計皆曰不求縣官勳賞惟願效死遼東上不許上將發太子悲泣數日上曰今留汝鎮守輔以俊賢欲使天下識汝風采夫為國之要在於進賢退不肖賞善罰惡至公無私汝當努力行此悲泣何為命開府儀同三司髙士亷攝太子太傅與劉洎馬周少詹事張行成右庶子髙季輔同掌機務輔太子長孫無忌岑文本與吏部尚書楊師道從行壬辰車駕發定州親佩弓矢手結雨衣於鞍後命長孫無忌攝侍中楊師道攝中書令李世績軍發柳城多張形勢若出懷逺鎮者而濳師北趣甬道出髙麗不意夏四月戊戌朔世績自通定濟遼水至玄莬髙麗大駭城邑皆閉門自守壬寅遼東道副大總管江夏王道宗將兵數千至新城折衝都尉曹三良引十餘騎直壓城門城中驚擾無敢出者營州都督張儉將胡兵為前鋒進渡遼水趨建安城破髙麗兵斬首數千級丁未車駕發幽州上悉以軍中資糧器械簿書委岑文本文本夙夜勤力躬自料配籌筆不去手精神耗竭言辭舉措頗異平日上見而憂之謂左右曰文本與我同行恐不與我同返是日遇暴疾而薨其夕上聞嚴鼓聲曰文本殞沒所不忍聞命撤之時右庶子許敬宗在定州與髙士亷等共知機要文本薨上召敬宗以本官檢校中書侍郎壬子李世績江夏王道宗攻髙麗蓋牟城丁巳車駕至北平癸亥李世績等拔蓋牟城獲二萬餘口糧十餘萬石張亮帥舟師自東萊渡海襲畢沙城其城四靣懸絶惟西門可上程名振引兵夜至副總管王大度先登五月己巳拔之獲男女八千口分遣總管丘孝忠等曜兵於鴨緑水李世績進至遼東城下庚午車駕至遼澤泥淖二百餘里人馬不可通將作大匠閻立德布土作橋軍不留行壬申度澤東乙亥髙麗步騎四萬救遼東江夏王道宗將四千騎逆擊之軍中皆以為衆寡懸絶不若深溝髙壘以俟車駕之至道宗曰賊恃衆有輕我心逺來疲頓擊之必敗且吾屬為前軍當清道以待乘輿乃更以賊遺君父乎李世績以為然果毅都尉馬文舉曰不遇勍敵何以顯壯士䇿馬趨敵所向皆靡衆心稍安既合戰行軍總管張君義退走唐兵不利道宗收散卒登髙而望見髙麗陳亂與驍騎數十衝之左右出入李世績引兵助之髙麗大敗斬首千餘級丁丑車駕度遼水撤橋以堅士卒之心軍於馬首山勞賜江夏王道宗超拜馬文舉中郎將斬張君義上自將數百騎至遼東城下見士卒負土填塹上分其尤重者於馬上持之從官爭負土致城下李世績攻遼東城晝夜不息旬有二日上引精兵㑹之圍其城數百重鼓譟聲震天地甲申南風急上遣鋭卒登衝竿之末爇其西南樓火延燒城中因麾將士登城髙麗力戰不能敵遂克之所殺萬餘人得勝兵萬餘人男女四萬口以其城為遼州乙未進軍白巖城丙申右衛大將軍李思摩中弩矢上親為之吮血將士聞之莫不感動烏骨城遣兵萬餘為白巖聲援將軍契苾何力以徑騎八百擊之何力挺身陷陳槊中其腰尚輦奉御薛萬僃單騎往救之拔何力於萬衆之中而還何力氣益憤束瘡而戰從騎奮擊遂破髙麗兵追奔數十里斬首千餘級㑹暝而罷萬僃萬徹之弟也六月丁酉李世績攻白巖城西南上臨其西北城主孫代音潜遣腹心請降臨城投刀鉞為信且曰奴願降城中有不從者上以唐幟與其使曰必降者宜建之城上代音建幟城中人以為唐兵已登城皆從之上之克遼東也白巖城請降既而中悔上怒其反覆令軍中曰得城當悉以人物賞戰士李世績見上將受其降帥甲士數十人請曰士卒所以爭冒矢石不顧其死者貪虜獲耳今城垂拔奈何更受其降孤戰士之心上下馬謝曰將軍言是也然縱兵殺人而虜其妻孥朕所不忍將軍麾下有功者朕以庫物賞之庶因將軍贖此一城世績乃退得城中男女萬餘口上臨水設幄受其降仍賜之食八十以上賜帛有差它城之兵在白巖者悉慰諭給糧仗任其所之先是遼東城長史為部下所殺其省事奉其妻子奔白巖上憐其有義賜帛五匹為長史造靈輿歸之平壤以白巖城為巖州以孫代音為刺史契苾何力瘡重上自為傳藥推求得刺何力者髙突勃付何力使自殺之何力奏稱彼為其主冒白刃刺臣乃忠勇之士也與之初不相識非有怨讎遂捨之初莫離支遣加尸城七百人戍蓋牟城李世績盡虜之其人請從軍自效上曰汝家皆在加尸汝為我戰莫離支必殺汝妻子得一人之力而滅一家吾不忍也戊戌皆廪賜遣之己亥以蓋牟城為蓋州丁未車駕發遼東丙辰至安市城進兵攻之丁巳髙麗北部耨薩延壽惠真帥髙麗靺羯兵十五萬救安市上謂侍臣曰今為延夀䇿有三引兵直前連安市城為壘據髙山之險食城中之粟縱靺鞨掠吾牛馬攻之不可猝下欲歸則泥潦為阻坐困吾軍上䇿也拔城中之衆與之霄遁中䇿也不度智能來與吾戰下䇿也卿曹觀之彼必出下䇿成擒在吾目中矣髙麗有對盧年老習事謂延夀曰秦王內芟羣雄外服戎狄獨立為帝此命世之材今舉海內之衆而來不可敵也為吾計者莫若頓兵不戰曠日持久分遣竒兵斷其運道糧食既盡求戰不得欲歸無路乃可勝也延夀不從引軍直進去安市城四十里上猶恐其低徊不至命左衛大將軍阿史那社爾將突厥千騎以誘之兵始交而僞走髙麗相謂曰易與耳競進乘之至安市城東南八里依山而陳上悉召諸將問計長孫無忌對曰臣聞臨敵將戰必先觀士卒之情臣適行經諸營見士卒聞髙麗至皆拔刀結斾喜形於色此必勝之兵也陛下未冠身親行陳凡出竒制勝皆上稟聖謀諸將奉成算而已今日之事乞陛下指蹤上笑曰諸公以此見讓朕當為諸公商度乃與無忌等從數百騎乘髙望之觀山川形勢可以伏兵及出入之所髙麗靺鞨合兵為陳長四十里江夏王道宗曰髙麗傾國以拒王師平壤之守必弱願假臣精卒五千覆其本根則數十萬之衆可不戰而降上不應遣使紿延夀曰我以爾國彊臣弒其主故來問罪至於交戰非吾本心入爾境芻粟不給故取爾數城俟爾國修臣禮則所失必復矣延夀信之不復設僃上夜召文武計事命李世績將步騎萬五千陳於西嶺長孫無忌將精兵萬一千為竒兵自山北出於狹谷以衝其後上自將步騎四千挾鼓角偃旗幟登北山上敇諸軍聞鼓角齊出奮擊因命有司張受降幕於朝堂之側戊午延夀等獨見李世績布陳勒兵欲戰上望見無忌軍塵起命作鼓角舉旗幟諸軍鼓譟並進延夀等大懼欲分兵禦之而其陳已亂㑹有雷電龍門人薛仁貴著竒服大呼陷陳所向無敵髙麗兵披靡大軍乘之髙麗兵大潰斬首二萬餘級上望見仁貴召見拜游擊將軍仁貴安都之六世孫名禮以字行延夀等將餘衆依山自固上命諸軍圍之長孫無忌悉撤橋梁斷其歸路己未延夀惠真帥其衆三萬六千八百人請降入軍門膝行而前拜伏請命上語之曰東夷少年跳梁海曲至於摧堅决勝故當不及老人自今復敢與天子戰乎皆伏地不能對上簡耨薩已下酋長三千五百人授以戎秩遷之內地餘皆縱之使還平壤皆雙舉手以顙頓地歡呼聞數十里外收靺鞨三千三百人悉坑之獲馬五萬匹牛五萬頭鐵甲萬領他器械稱是髙麗舉國大駭後黃城銀城皆自拔遁去數百里無復人烟上驛書報太子仍與髙士亷等書曰朕為將如此何如更名所幸山曰駐蹕山秋七月辛未上徙營安市城東嶺己卯詔標識戰死者尸俟軍還與之俱歸戊子以髙延夀為鴻臚卿髙惠真為司農卿張亮軍過建安城下壁壘未固士卒多出樵牧髙麗兵奄至軍中駭擾亮素怯踞胡床直視不言將士見之更以為勇總管張金樹等鳴鼓勒兵擊髙麗破之八月甲辰候騎獲莫離支諜者髙竹離反接詣軍門上召見解縛問曰何瘦之甚對曰竊道間行不食數日矣命賜之食謂曰爾為諜宜速反命為我寄語莫離支欲知軍中消息可遣人徑詣吾所何必間行辛苦也竹離徒跣上賜屩而遣之丙午徙營於安市城南上在遼外凡置營但明斥候不為塹壘雖逼其城髙麗終不敢出為寇抄軍士單行野宿如中國焉上之克白巖也謂李丗績曰吾聞安市城險而兵精其城主材勇莫離支之亂城守不服莫離攴擊之不能下因而與之建安兵弱而糧少若出其不意攻之必克公可先攻建安建安下則安市在吾腹中此兵法所謂城有所不攻者也對曰建安在南安市在北吾軍糧皆在遼東今踰安市而攻建安若賊斷吾運道將若之何不如先攻安市安市下則鼓行而取建安耳上曰以公為將安得不用公䇿勿誤吾事世績遂攻安市安市人望見上旗蓋輒乘城鼓譟上怒世績請克城之日男子皆坑之安市人聞之益堅守攻久不下髙延夀髙惠真請於上曰奴既委身大國不敢不獻其誠欲天子早成大功奴得與妻子相見安市人顧惜其家人自為戰未易猝拔今奴以髙麗十餘萬望旗沮潰國人膽破烏骨城耨薩老耄不能堅守移兵臨之朝至夕克其餘當道小城必望風奔潰然後收其資糧鼓行而前平壤必不守矣羣臣亦言張亮兵在沙城召之信宿可至乘髙麗凶懼併力拔烏骨城度鴨緑水直取平壤在此舉矣上將從之獨長孫無忌以為天子親征異於諸將不可乘危徼幸今建安新城之虜衆猶十萬若向烏骨皆躡吾後不如先破安市取建安然後長驅而進此萬全之䇿也上乃止諸軍急攻安市上聞城中雞彘聲謂李世績曰圍城積久城中煙火日微今雞彘甚喧此必饗士欲夜出襲我宜嚴兵僃之是夜髙麗數百人縋城而下上聞之自至城下召兵急擊斬首數十級髙麗退走江夏王道宗督衆築土山於城東南隅浸逼其城城中亦增髙其城以拒之士卒分畨交戰日六七合衝車炮石壞其樓堞城中隨立木柵以塞其缺道宗傷足上親為之針築山晝夜不息凡六旬用功五十萬山頂去城數丈下臨城中道宗使果毅傅伏愛將兵屯山頂以僃敵山頽壓城城崩㑹伏愛私離所部髙麗數百人從城缺出戰遂奪據土山塹而守之上怒斬伏愛以徇命諸將攻之三日不能克道宗徒跣詣旗下請罪上曰汝罪當死但朕以漢武殺王恢不如秦穆用孟明且有破蓋牟遼東之功故特赦汝耳上以遼左早寒草枯水凍士馬難久留且糧食將盡癸未敕班師先拔遼蓋二州户口渡遼乃耀兵於安市城下而旋城中皆屏跡不出城主登城拜辭上嘉其固守賜縑百匹以勵事君命李世績江夏王道宗將步騎四萬為殿乙酉至遼東丙戌渡遼水遼澤泥潦車馬不通命長孫無忌將萬人翦草填道水深處以車為梁上自繫薪於馬鞘以助役冬十月丙申朔上至蒲溝駐馬督填道諸軍度渤錯水暴風雪士卒沾濕多死者敕然火於道以待之凡征髙麗拔玄莬橫山蓋牟磨米遼東白巖卑沙麥谷銀山後黃十城徙遼蓋巖三州户口入中國者七萬人新城建安駐蹕三大戰斬首四萬餘級戰士死者幾二千人戰馬死者什七八上以不能成功深悔之歎曰魏徵若在不使我有是行也命馳驛祀徴以少牢復立所製碑召其妻子詣行在勞賜之丙午至營州詔遼東戰亡士卒骸骨並集栁城東南命有司設太牢上自作文以祭之臨哭盡哀其父母聞之曰吾兒死而天子哭之死何所恨上謂薛仁貴曰朕諸將皆老思得新進驍勇者將之無如卿者朕不喜得遼東喜得卿也丙辰上聞太子奉迎將至從飛騎三千人馳入臨渝關道逢太子上之發定州也指所御褐袍謂太子曰俟見汝乃易此袍耳在遼左雖盛暑流汗弗之易及秋穿敗左右請易之上曰軍士衣多弊吾獨御新衣可乎至是太子進新衣乃易之諸軍所虜髙麗民萬四千口先集幽州將以賞軍士上愍其父子夫婦離散命有司平其直悉以錢布贖為民歡呼之聲三日不息十一月辛未車駕至幽州髙麗民迎於城東拜舞號呼宛轉於地塵埃彌望丙戌車駕至定州壬辰車駕發定州戊申至并州二十年春二月乙未上發并州三月己巳車駕還京師上謂李靖曰吾以天下之衆困於小夷何也靖曰此道宗所解上顧問江夏王道宗具陳在駐驆時乘虛取平壤之言上悵然曰當時匆匆吾不憶也閏月戊戌罷遼州都督府及巖州夏五月甲寅髙麗王藏及莫離支蓋金遣使謝罪并獻二美女上還之金即蘇文也上自髙麗還蓋蘇文益驕恣雖遣使奉表其言率皆詭誕又待唐使者倨慢常窺伺邊隙屢敕令勿攻新羅而侵陵不止壬申詔勿受其朝貢更議討之丙戌車駕至京師二十一年上將復伐髙麗朝議以為髙麗依山為城攻之不可猝拔前大駕親征國人不得耕種所克之城悉收其穀繼以旱災民太半乏食今若數遣偏師更迭擾其疆場使彼疲於奔命釋耒入堡數年之間千里蕭條則人心自離鴨緑之北可不戰而取矣上從之三月以左武衛大將軍牛進逹為青丘道行軍大總管右武侯將軍李海岸副之發兵萬餘人乘樓船自萊州泛海而入又以太子詹事李世績為遼東道行軍大總管右武衛將軍孫二朗等副之將兵三千人因營州都督府兵自新城道入兩軍皆選習水善戰者配之李世績軍既度遼歷南蘇等數城髙麗多背城拒戰世績擊破其兵焚其羅郭而還秋七月牛進逹海岸入髙麗境凡百餘戰無不捷攻石城拔之進至積利城下髙麗兵萬餘人出戰海岸擊破之斬首二千級八月戊戌敕宋州刺史王波利等發江南十二州工人造大船數百艘欲以征髙麗冬十二月髙麗王使其子莫離支任武入謝罪上許之二十二年春正月新羅王金善德卒以善德妹真德為柱國封樂浪郡王遣使冊命丙午詔以右武衛大將軍薛萬轍為青丘道行軍大總管右衛將軍裴行方副之將兵三萬餘人及樓船戰艦自萊州泛海以擊髙麗三月充容長城徐惠以上東征髙麗西討龜兹上疏諫其略曰以有盡之農功填無窮之巨浪圖未獲之他衆喪已成之我軍昔秦皇并吞六國反速危亡之基晉武奄有三方翻成覆敗之業豈非矜功恃大棄德輕邦圖利忘危肆情縱欲之所致乎是知地廣非常安之術人勞乃易亂之源也上善其言夏四月甲子烏胡鎮將古神感將兵浮海擊髙麗遇髙麗步騎五千戰於易山破之其夜髙麗萬餘人襲神感船神感設伏又破之而還六月上以髙麗困弊議以明年發三十萬衆一舉滅之或以為大軍東征須備經嵗之糧非畜乘所能載宜具舟艦為水運隋末劒南獨無寇盜屬者遼東之役劒南復不預及其百姓富庶宜使之造舟艦上從之秋七月遣右領左右府長史强偉於劒南道伐木造舟艦大者或長百尺其廣半之别遣使行水道自巫峽抵江楊趣萊州司空梁文昭公房玄齡疾篤謂諸子曰吾受主上厚恩今天下無事惟東征未巳羣臣莫敢諫吾知而不言死有餘責乃上表諫以為老子曰知足不辱知止不殆陛下威名功德亦可足矣拓地開疆亦可止矣且陛下每决一重囚必令三覆五奏進素膳止音樂者重人命也今驅無罪之士卒委之鋒刃之下使肝腦塗地獨不足愍乎向使髙麗違失臣節誅之可也侵擾百姓滅之可也它日能為中國患除之可也今無此三條而坐煩中國內為前代雪恥外為新羅報讎豈非所存者小所損者大乎願陛下許髙麗自新焚陵波之船罷應募之衆自然華夷慶賴逺肅邇安臣旦夕入地儻䝉録此哀鳴死且不朽元齡子遺愛尚上女髙陽公主上謂公主曰彼病篤如此尚能憂我國家上自臨視握手與訣悲不自勝癸卯薨八月丁丑敕越州都督府及婺洪等州造海船及雙舫千一百艘九月己丑新羅奏為百濟所攻破其十三城冬十二月癸未新羅相金春秋及其子文王入見春秋真德之弟也上以春秋為特進文王為左武衛將軍春秋請改章服從中國內出冬服賜之二十三年夏五月己巳上崩壬申遺詔太子即位罷遼東之役髙宗永徽二年百濟遣使入貢上戒之使勿與新羅髙麗相攻不然吾將發兵討汝矣三年春正月己未朔吐谷渾新羅髙麗百濟並遣使入貢五年夏閠四月壬辰新羅女王金真德卒詔立其弟春秋為新羅王六年髙麗與百濟靺鞨連兵侵新羅北境取三十三城新羅王春秋遣使求援二月乙丑遣營州都督程名振左衛中郎將蘇定方發兵擊髙麗夏五月壬午名振等度遼水髙麗見其兵少開門度貴端水逆戰名振等奮擊大破之殺獲千餘人焚其外郭及村落而還顯慶三年夏六月營州都督兼東夷都護程名振右領軍中郎將薛仁貴將兵攻髙麗之赤烽鎮拔之斬首四百餘級捕虜百餘人髙麗遣其大將豆方婁帥衆三萬拒之名振以契丹逆擊大破之斬首二千五百級四年冬十一月右領軍中郎將薛仁貴等與髙麗將溫沙門戰於橫山破之五年百濟恃髙麗之援數侵新羅新羅王春秋上表求救辛亥以左武衛大將軍蘇定方為神丘道行軍大總管帥左驍衛將軍劉伯英等水陸十萬以伐百濟以春秋為嵎夷道行軍總管將新羅之衆與之合勢秋八月蘇定方引軍自成山濟海百濟據熊津江口以拒之定方進擊破之百濟死者數千人餘皆潰走定方水陸齊進直趣其都城未至二十餘里百濟傾國來戰大破之殺萬餘人追奔入其郭百濟王義慈及太子隆逃于北境定方進圍其城義慈次子泰自立為王帥衆固守隆子文思曰王與太子皆在而叔遽擁兵自王借使能却唐兵我父子必不全矣遂帥左右踰城來降百姓皆從之泰不能止定方命軍士登城立幟泰窘迫開門請命於是義慈隆及諸城主皆降百濟故有五部分統三十七郡二百城七十六萬户詔以其地置熊津等五都督府以其酋長為都督刺史冬十一月戊戌朔上御則天門樓受百濟俘自其王義慈以下皆釋之十二月壬午以左驍衛大將軍契苾何力為浿江道行軍大總管左武衛大將軍蘇定方為遼東道行軍大總管左驍衛將軍劉伯英為平壤道行軍大總管蒲州刺史程名振為鏤方道總管將兵分道擊髙麗青州刺史劉仁軌坐督海運覆船以白衣從軍自效龍朔元年春正月乙卯募河南北淮南六十七州兵得四萬四千餘人詣平壤鏤方行營戊午以鴻臚卿蕭嗣業為扶餘道行軍總管帥回紇等諸部兵詣平壤三月丙申朔上與羣臣及外夷宴於洛城門觀屯營新教之舞謂之一戎大定樂時上欲親征髙麗以象用武之勢也初蘇定方既平百濟留郎將劉仁願鎮守百濟府城又以左衛中郎將王文度為熊津都督撫其餘衆文度濟海而卒百濟僧道琛故將福信聚衆據周留城迎故王子豐於倭國而立之引兵圍仁願於府城詔起劉仁軌檢校帶方州刺史將王文度之衆便道發新羅兵以救仁願仁軌喜曰天將富貴此翁矣於州司請唐曆及廟諱而行曰吾欲掃平東夷頒大唐正朔於海表仁軌御軍嚴整轉鬪而威所向皆平百濟立兩柵於熊津江口仁軌與新羅兵合擊破之殺溺死者萬餘人道琛等乃釋府城之圍退保任存城新羅糧盡引還道琛自稱領軍將軍福信自稱霜岑將軍招集徒衆其勢益張仁軌衆少與仁願合軍休息士卒上表詔新羅出兵新羅王春秋奉詔遣其將金欽將兵救仁軌等至古泗福信邀擊敗之欽自葛嶺道遁還新羅不敢復出福信尋殺道琛專總國兵夏四月庚辰以任雅相為浿江道行軍總管契苾何力為遼東道行軍總管蘇定方為平壤道行軍總管與蕭嗣業及諸胡兵凡三十五軍水陸分道並進上欲自將大軍繼之癸巳皇后抗表諫親征髙麗詔從之秋七月甲戌蘇定方破髙麗於浿江屢戰皆捷遂圍平壤城九月癸巳朔特進新羅王春秋卒以其子法敏為樂浪郡王新羅王髙麗蓋蘇文遣其子男生以精兵數萬守鴨緑水諸軍不得度契苾何力至值水大合何力引衆乘氷度水鼓譟而進髙麗大潰追奔數十里斬首三萬級餘衆悉降男生僅以身免㑹有詔班師乃還二年春二月甲戌浿江道大總管任雅相薨于軍戊寅左驍衛將軍白州刺史沃沮道總管龎孝泰與髙麗戰於蛇水之上軍敗與其子十二人皆戰死蘇定方圍平壤久不下㑹大雪解圍而還秋七月丁巳熊津都督劉仁願帶方州刺史劉仁軌大破百濟於熊津之東拔真峴城初仁願仁軌等屯熊津城上與之敕書以平壤軍回一城不可獨固宜拔就新羅若金法敏藉卿留鎮宜且停彼若其不須即宜泛海還也將士咸欲西歸仁軌曰人臣狥公家之利有死無二豈得先念其私主上欲滅髙麗故先誅百濟留兵守之制其心腹雖餘寇充斥而守備甚嚴宜礪兵秣馬擊其不意理無不克既捷之後士卒心安然後分兵據險開張形勢飛表以聞更求益兵朝廷知其有成必命將出師聲援才接凶醜自殱非直不棄成功實亦永清海表今平壤之軍既還熊津又拔則百濟餘燼不日更興髙麗逋寇何時可滅且今以一城之地居敵中央茍或動足即為擒虜縱入新羅亦為羇客脫不如意悔不可追况福信凶悖殘虐君臣猜離行相屠戮正宜堅守觀變乘便取之不可動也衆從之時百濟王豐與福信等以仁願等孤城無援遣使謂之曰大使等何時西還當遣相從仁願仁軌知其無備忽出擊之拔其支羅城及尹城大山沙并等柵殺獲甚衆分兵守之福信等以真峴城險要加兵守之仁軌伺其稍懈引新羅兵夜傳城下攀草而上比明入據其城遂通新羅運糧之路仁願乃奏請益兵詔發淄青萊海之兵七千人以赴熊津福信專權與百濟王豐浸相猜忌福信稱疾卧於窟室欲俟豐問疾而殺之豐知之帥親信襲殺福信遣使詣髙麗倭國乞師以拒唐兵三年秋八月戊申上以海東纍嵗用兵百姓困於征調士卒戰溺死者甚衆詔罷三十六州所造船遣司元太常伯竇德玄等分詣十道問人疾苦黜陟官吏德玄毅之曾孫也九月戊午熊津道行軍總管右威衛將軍孫仁師等破百濟餘衆及倭兵於白江拔其周留城初劉仁願劉仁軌既克真峴城詔孫仁師將兵浮海助之百濟王豐南引倭人以拒唐兵仁師與仁願仁軌合軍勢大振諸將以加林城水陸之衝欲先攻之仁軌曰加林險固急攻則傷士卒緩之則曠日持久周留城虜之巢穴羣凶所聚除惡務本宜先攻之若克周留諸城自下於是仁師仁願與新羅王法敏將陸軍以進仁軌與别將杜爽扶餘隆將水軍及糧船自熊津入白江以㑹陸軍同趣周留城遇倭兵於白江口四戰皆捷焚其舟四百艘煙炎灼天海水皆赤百濟王豐脫身奔髙麗王子忠勝忠志等帥衆降百濟盡平唯别帥遲受信據任存城不下初百濟西部人黑齒常之長七尺餘驍勇有謀略仕百濟為逹率兼郡將猶中國刺史也蘇定方克百濟常之帥所部隨衆降定方縶其王及太子縱兵劫掠壯者多死常之懼與左右十餘人遁歸本部收集亡散保任存山結柵以自固旬日間歸附者三萬餘人定方遣兵攻之常之拒戰唐兵不利常之復取二百餘城定方不能克而還常之與别部將沙吒相如各據險以應福信百濟既敗皆帥其衆降劉仁軌使常之相如自將其衆取任存城仍以糧仗助之孫仁師曰此屬獸心何可信也仁軌曰吾觀二人皆忠勇有謀敦信重義但嚮者所託未得其人今正是其感激立效之時不用疑也遂給其糧仗分兵隨之攻拔任存城遲受信棄妻子奔髙麗詔留劉仁軌將兵鎮百濟召孫仁師劉仁願還百濟兵火之餘比屋雕殘僵尸滿野仁軌始命瘞骸骨籍户口理村聚署官長通道途立橋梁補堤堰復陂塘課耕桑賑貧乏養孤老立唐社稷頒正朔及廟諱百濟大悅闔境各安其業然後修屯田儲糗糧訓士卒以圖髙麗劉仁願至京師上問之曰卿在海東前後奏事皆合機宜復有文理卿本武人何能如是仁願曰此皆劉仁軌所為非臣所及也上悅加仁軌六階正除帶方州刺史為築第長安厚賜其妻子遣使齎璽書勞勉之上官儀曰仁軌遭黜削而能盡忠仁願秉節制而能推賢皆可謂君子矣麟德元年冬十月庚辰檢校熊津都督劉仁軌上言臣伏覩所存戍兵疲羸者多勇健者少衣服貧弊唯思西歸無心展效臣問以往在海西見百姓人人應募爭欲從軍或請自辦衣糧謂之義征何為今日士卒如此咸言今日官府與曩時不同人心亦殊曩時東西征役身沒王事並䝉敕使弔祭追贈官爵或以死者官爵回授子弟凡度遼海者皆賜勳一轉自顯慶五年以來征人屢經度海官不記録其死者亦無人誰何州縣每發百姓為兵其壯而富者行錢參逐皆亡匿得免貧者身雖老弱被發即行頃者破百濟及平壤苦戰當是時將帥號令許以勳賞無所不至及達西岸唯聞枷鎖推禁奪賜破勳州縣追呼無以自存公私困弊不可悉言以是昨發海西之日已有逃亡自殘者非獨至海外而然也又本因征役授勳級以為榮寵而比年出征皆使勳官挽引勞苦與白丁無殊百姓不願從軍率皆由此臣又問曩日士卒留鎮五年尚得支濟今爾等始經一年何為如此單露咸言初發家日惟令備一年資裝今已二年未有還期臣檢校軍士所留衣今冬僅可充事來秋以往全無凖擬陛下留兵海外欲殄滅髙麗百濟髙麗舊相黨援倭人雖逺亦共為影響若無鎮兵還成一國今既資戍守又置屯田所藉士卒同心同德而衆有此議何望成功自非有所更張厚加慰勞明賞重罰以起士心若止如今日已前處置恐師衆疲老立效無日逆耳之事或無人為陛下盡言故臣披露肝膽昧死奏陳上深納其言遣右威衛將軍劉仁願將兵度海以代舊鎮之兵仍敕仁軌俱還仁軌謂仁願曰國家懸軍海外欲以經略髙麗其事非易今收穫未畢而軍吏與士卒一時代去軍將又歸夷人新服衆心未安必將生變不如且留舊兵漸令收穫辦具資糧節級遣還軍將且留鎮撫未可還也仁願曰吾前還海西大遭讒謗云吾多留兵衆謀據海東幾不免禍今日惟知凖敕豈敢擅有所為仁軌曰人臣茍利於國知無不為豈恤其私乃上表陳便宜自請留鎮海東上從之仍以扶餘隆為熊津都尉使招輯其餘衆二年秋七月上命熊津都尉扶餘隆與新羅王法敏釋去舊怨八月壬子同盟于熊津城劉仁軌以新羅百濟耽羅倭國使者浮海西還㑹祠泰山髙麗亦遣太子福男來侍祠乾封元年夏五月髙麗王蓋蘇文卒長子男生代為莫離支初知國政出巡諸城使其弟男建男産留知後事或謂二弟曰男生惡二弟之逼意欲除之不如先為計二弟初未之信又有告男生者曰二弟恐兄還奪其權欲拒兄不納男生潛遣所親往平壤伺之二弟收掩得之乃以王命召男生男生懼不敢歸男建自為莫離支發兵討之男生走保别城使其子獻誠詣闕求救六月壬寅以左驍衛大將軍契苾何力為遼東道安撫大使將兵救之以獻誠為右武衛將軍使為鄉導又以左金吾衛將軍龎同善營州都督髙侃為行軍總管同討髙麗秋九月龎同善大破髙麗兵泉男生帥衆與同善合詔以男生為特進遼東大都督兼平壤道安撫大使封玄莬郡公冬十二月己酉以李績為遼東道行軍大總管兼安撫大使以司列少常伯安陸郝處俊副之以擊髙麗龎同善契苾何力並為遼東道行軍副大總管兼安撫大使如故其水陸諸軍總管并運糧使竇義積獨孤卿雲郭待封等並受績處分河北諸州租賦悉詣遼東給軍用二年秋九月辛未李績拔髙麗之新城使契苾何力守之績初度遼謂諸將曰新城髙麗西邊要害不先得之餘城未易取也遂攻之城人師夫仇等縛城主開門降績引兵進擊一十六城皆下之龎同善髙侃尚在新城泉男建遣兵襲其營左武衛將軍薛仁貴擊破之侃進至金山與髙麗戰不利髙麗乘勝逐北仁貴引兵橫擊之大破髙麗斬首五萬餘級拔南蘇木底蒼巖三城與泉男生軍合郭待封以水軍自别道趣平壤績遣别將馮師本載糧仗以資之師本船破失期待封軍中飢窘欲作書與績恐為虜所得知其虛實乃作離合詩以與績績怒曰軍事方急何以詩為必斬之行軍管記通事舍人河南元萬頃為釋其義績乃更遣糧仗赴之萬頃作檄髙麗文曰不知守鴨緑之險泉男建報曰謹聞命矣即移兵據鴨緑津唐兵不得度上聞之流萬頃於嶺南郝處俊在髙麗城下未及成列髙麗奄至軍中大駭處俊據胡床方食乾糒潛簡精鋭擊敗之將士服其膽略總章元年春二月壬午李績等拔髙麗扶餘城薛仁貴既破髙麗於金山乘勝將三千人將攻扶餘城諸將以其兵少止之仁貴曰兵不必多顧用之何如耳遂為前鋒以進與髙麗戰大破之殺獲萬餘人遂拔扶餘城扶餘川中四十餘城皆望風請服侍御史洛陽賈言忠奉使自遼東還上問以軍事言忠對曰髙麗必平上曰卿何以知之對曰隋煬帝東征而不克者人心離怨故也先帝東征而不克者髙麗未有舋也今髙藏微弱權臣擅命蓋蘇文死男建兄弟內相攻奪男生傾心內附為我鄉導彼之情僞靡不知之以陛下明聖國家富强將士盡力以乘髙麗之亂其勢必克不俟再舉矣且髙麗連年饑饉妖異屢降人心危駭其亡可翹足待也上又問遼東諸將孰賢對曰薛仁貴勇冠三軍龎同善雖不善鬬而持軍嚴整髙侃勤儉自處忠果有謀契苾何力沈毅能斷雖頗忌刻而有統御之才然夙夜小心忘身憂國皆莫及李績也上深然其言泉男建復遣兵五萬人救扶餘城與李績等遇於薛賀水合戰大破之斬獲三萬餘人進攻大行城拔之秋九月癸巳李績拔平壤績既克大行城諸軍出它道者皆與績㑹進至鴨緑柵髙麗發兵拒戰績等奮擊大破之追奔二百餘里拔辱夷城諸城遁逃及降者相繼契苾何力先引兵至平壤城下績軍繼之圍平壤月餘髙麗王藏遣泉男産帥首領九十八人持白幡詣績降績以禮接之泉男建猶閉門拒守頻遣兵出戰皆敗男建以軍事委僧信誠信誠密遣人詣績請為內應後五日信誠開門績縱兵登城鼓譟焚城四月男建自刺不死遂擒之髙麗悉平冬十月李績將至上命先以髙藏等獻于昭陵具軍容奏凱歌入京師獻于太廟十二月丁巳上受俘于含元殿以髙藏政非己出赦以為司平太常伯貟外同正以泉男産為司宰少卿僧信誠為銀青光祿大夫泉男生為右衛大將軍李績以下封賞有差泉男建流黔州扶餘豐流嶺南分髙麗五部百七十六城六十九萬餘户為九都督府四十二州百縣置安東都護府於平壤以統之擢其酋帥有功者為都督刺史縣令與華人參理以右威衛大將軍薛仁貴檢校安東都護總兵二萬人以鎮撫之丁卯上祀南郊告平髙麗以李績為亞獻己巳謁太廟二年髙麗之民多離叛者敇徙髙麗戶三萬八千二百於江淮之南及山南京西諸州空曠之地留其貧弱者使守安東咸亨元年夏四月髙麗酋長劒牟岑反立髙藏外孫安舜為主以左監門大將軍髙侃為東州道行軍總管發兵討之安舜殺劒牟岑奔新羅二年秋七月乙未朔髙侃破髙麗餘衆於安市城三年冬十二月髙侃與髙麗餘衆戰于白水山破之新羅遣兵救髙麗侃擊破之四年夏閏五月燕山道總管右領軍大將軍李謹行大破髙麗叛者於瓠蘆河之西俘獲數千人餘衆皆奔新羅時謹行妻劉氏留伐奴城髙麗引靺鞨攻之劉氏擐甲帥衆守城久之虜退上嘉其功封燕國夫人謹行靺鞨人突地稽之子也武力絶人為衆夷所憚上元元年春正月壬午以左庶子同中書門下三品劉仁軌為雞林道大總管衛尉卿李弼右領軍大將軍李謹行副之發兵討新羅時新羅王法敏既納髙麗叛衆又據百濟故地使人守之上大怒詔削法敏官爵其弟右驍衛員外大將軍臨海郡公仁問在京師立以為新羅王使歸國二年春二月劉仁軌大破新羅之衆於七重城又使靺鞨浮海略新羅之南境斬獲甚衆仁軌引兵還詔以李謹行為安東鎮撫大使屯新羅之買肖城以經略之三戰皆捷新羅乃遣使入貢且謝罪上赦之復新羅王法敏官爵金仁問中道而還改封臨海郡公儀鳯元年春二月甲戌徙安東都護府於遼東故城先有華人任安東官者悉罷之徙熊津都督府於建安故城其百濟戶口先徙徐兖等州者皆置於建安二年初劉仁軌引兵自熊津還扶餘隆畏新羅之逼不敢留尋亦還朝二月丁巳以工部尚書髙藏為遼東州都督封朝鮮王遣歸遼東安輯髙麗餘衆髙麗先在諸州者皆遣與藏俱歸又以司農卿扶餘隆為熊津都督封帶方王亦遣歸安輯百濟餘衆仍移安東都護府於新城以統之時百濟荒殘命隆寓居髙麗之境藏至遼東謀叛潛與靺鞨通召還徙卭州而死散徙其人於河南隴右諸州貧者留安東城傍髙麗舊城沒於新羅餘衆散入靺鞨及突厥隆亦竟不敢還故地髙氏扶餘氏遂亡開耀元年冬十月丁亥新羅王法敏卒遣使立其子政明吐蕃請和唐太宗貞觀八年冬十一月甲申吐蕃贊普棄宗弄讃遣使入貢仍請昏吐蕃在吐谷渾西南近世浸彊蠶食它國土宇廣大勝兵數十萬然未嘗通中國其王稱贊普俗不言姓王族皆曰論宦族皆曰尚棄宗弄讃有勇略四鄰畏之上遣使者馮德遐往慰撫之十二年初上遣使者馮德遐撫慰吐蕃吐蕃聞突厥吐谷渾皆尚公主遣使隨德遐入朝多齎金寶奉表求㛰上未之許使者還言於贊普棄宗弄讃曰臣初至唐唐待我甚厚許尚公主㑹吐谷渾王入朝相離間唐禮遂衰亦不許㛰弄讃遂發兵擊吐谷渾吐谷渾不能支遁於青海之北民畜多為吐蕃所掠吐蕃進破党項白蘭諸羌帥衆二十餘萬屯松州西境遣使貢金帛云來迎公主尋進攻松州敗都督韓威羌酋閻州刺史别叢卧施諾州刺史把利步利並以州叛歸之連兵不息其大臣諫不聽而自縊者凡八輩壬寅以吏部尚書矦君集為當彌道行軍大總管甲辰以右領軍大將軍執失思力為白蘭道左武衛將軍牛進達為闊水道左領軍將軍劉簡為洮河道行軍總管督步騎五萬擊之吐蕃攻城十餘日進達為先鋒九月辛亥掩其不備敗吐蕃於松州城下斬首千餘級弄讃懼引兵退遣使謝罪因復請㛰上許之十四年冬閏十月丙辰吐蕃贊普遣其相祿東贊獻金五千兩及珍玩數百以請昏上許以文成公主妻之十五年春正月甲戌以吐蕃祿東贊為右衛大將軍上嘉祿東贊善應對以琅邪公主外孫段氏妻之辭曰臣國中自有婦父母所聘不可棄也且贊普未得謁公主陪臣何敢先娶上益賢之然欲撫以厚恩竟不從其志丁丑命禮部尚書江夏王道宗持節送文成公主于吐蕃贊普大喜見道宗盡子壻禮慕中國衣服儀衛之美為公主别築城郭宫室而處之自服䊵綺以見公主其國人皆以赭塗靣公主惡之贊普下令禁之亦漸革其猜暴之性遣子弟入國學受詩書二十三年土以吐蕃贊普弄讃為駙馬都尉封西海郡王贊普致書于長孫無忌等云天子初即位臣下有不忠者當勒兵赴國討除之髙宗永徽元年夏五月壬戌吐蕃贊普弄讃卒其嫡子早死立其孫為贊普贊普幼弱政事皆決於國相祿東贊祿東贊性明達嚴重行兵有法吐蕃所以彊大威服氐羌皆其謀也顯慶三年冬十月庚申吐蕃贊普來請㛰五年八月吐蕃祿東贊遣其子起政將兵擊吐谷渾以吐谷渾內附故也龍朔三年夏五月吐蕃與吐谷渾互相攻各遣使上表論曲直更來求援上皆不許吐谷渾之臣素和貴有罪逃奔吐蕃具言吐谷渾虛實吐蕃發兵擊吐谷渾大破之吐谷渾可汗曷鉢與弘化公主帥數千帳棄國走依凉州請徙居內地上以凉州都督鄭仁泰為清海道行軍大總管帥右武衛將軍獨孤卿雲辛文陵等分屯凉鄯二州以備吐蕃六月戊申又以左武衛大將軍蘇定方為安集大使節度諸軍為吐谷渾之援吐蕃祿東贊屯清海遣使者論仲琮入見表陳吐谷渾之罪且請和親上不許遣左衛郎將劉文祥使于吐蕃降璽書責讓之麟德二年春二月丁卯吐蕃遣使入見請復與吐谷渾和親仍求赤水地畜牧上不許咸享元年夏四月吐蕃陷西域十八州又與于闐襲龜茲撥換城陷之罷龜兹于闐焉耆踈勒四鎮辛亥以右衛大將軍薛仁貴為邏娑道行軍大總管左衛員外大將軍阿史那道真左衛將軍郭待封副之以討吐蕃且援送吐谷渾還故地秋八月郭待封先與薛仁貴並列及征吐蕃耻居其下仁貴所言待封多違之軍至大非川將趣烏海仁貴曰烏海險逺車行甚難輜重自隨難以趨利宜留二萬人為兩柵於大非嶺上輜重悉置柵內吾屬帥輕鋭倍道兼行掩其未備破之必矣仁貴帥所部前行擊吐蕃於河口大破之斬獲甚衆進屯烏海以俟待封待封不用仁貴策將輜重徐進未至烏海遇吐蕃二十餘萬待封軍大敗還走悉棄輜重仁貴退屯大非川吐蕃相論欽陵將兵四十餘萬就擊之唐兵大敗死傷略盡仁貴待封與阿史那道真並脫身免與欽陵約和而還敇大司憲樂彥瑋即軍中按其敗狀械送京師三人皆免死除名欽陵祿東贊之子也與弟贊婆悉多于勃論皆有才略祿東贊卒欽陵代之秉政三弟將兵居外鄰國畏之閏九月甲寅以左相姜恪為凉州道行軍大總管以禦吐蕃三年夏四月吐蕃遣其大臣仲琮入貢上問以吐蕃風俗對曰吐蕃地薄氣寒風俗朴魯然法令嚴整上下一心議事常自下而起因人所利而行之斯所以能持久也上詰以吞滅吐谷渾敗薛仁貴冦逼凉州事對曰臣受命貢獻而已軍旅之事非所聞也上厚賜而遣之癸未遣都水使者黃仁素使于吐蕃上元二年春正月辛未吐蕃遣其大臣論吐渾彌來請和且請與吐谷渾復修鄰好上不許儀鳳元年春閏三月吐蕃冦鄯廓河芳等州敇左監門衛中郎將令狐智通發興鳳等州兵以禦之己卯詔以吐蕃犯塞停封中獄乙酉以洛州牧周王顯為洮州道行軍元帥將工部尚書劉審禮等十二總管并州大都督相王輪為凉州道行軍元帥將左衛大將軍契苾何力等以討吐蕃二王皆不行秋八月乙未吐蕃冦疊州二年夏五月吐蕃冦扶州之臨河鎮擒鎮將杜孝升令齎書說松州都督武居寂使降孝升固執不從吐蕃軍還捨孝升而去孝升復帥餘衆拒守詔以孝升為遊擊將軍冬十二月乙邜詔大發兵討吐蕃三年秋七月李敬玄奏破吐蕃於龍支九月丙寅李敬玄將兵十八萬與吐蕃將論欽陵戰於青海之上兵敗工部尚書左衛大將軍彭城僖公劉審禮為吐蕃所虜時審禮將前軍深入頓于濠所為虜所攻敬玄懦怯按兵不救聞審禮戰沒狼狽還走頓于承風嶺阻泥溝以自固虜屯兵髙岡以壓之左領軍員外將軍黑齒常之夜帥敢死之士五百人襲擊虜營虜衆潰亂其將跋地設引兵遁去敬玄乃收餘衆還鄯州審禮諸子自縛詣闕請入吐蕃贖其父敇聽次子易從詣吐蕃省之比至審禮已病卒易從晝夜號哭不絶聲吐蕃哀之還其尸易從徒跣負之以歸上嘉黑齒常之之功擢拜左武衛將軍充河源軍副使李敬玄之西征也監察御史原武婁師德應猛士詔從軍及敗敇師德收集散亡軍乃復振因命使于吐蕃吐蕃將論贊婆迎之赤嶺師德宣導上意諭以禍福贊婆甚恱為之數年不犯邊師德遷殿中侍御史充河源軍司馬兼知營田事上以吐蕃為憂悉召侍臣謀之或欲和親以息民或欲嚴設守備俟公私富實而討之或欲亟發兵擊之議竟不决賜食而遣之太學生宋城魏元忠上封事言禦吐蕃之策以為理國之要在文與武今言文者則以辭華為首而不及經綸言武者則以騎射為先而不知方略是皆何益於理亂哉故陸機著辨亡之論無救河梁之敗飬由基射穿七札不濟鄢陵之師此已然之明效也古語有之人無常俗政有理亂兵無彊弱將有巧拙故選將當以智略為本勇力為末今朝廷用人類取將門子弟及死事之家彼皆庸人豈足當閫外之任李左車陳湯吕䝉孟觀皆出貧賤而立殊功未聞其家代為將也夫賞罰者軍國之切務茍有功不賞有罪不誅雖堯舜不能以致理議者皆云近日征伐虗有賞格而無事實蓋由小才之吏不知大體徒惜勳庸恐虛倉庫不知士不用命所損幾何黔首雖微不可欺罔豈得懸不信之令設虛賞之科而望其立功乎自蘇定方征遼東李績破平壤賞絶不行勳仍淹滯不聞斬一臺郎戮一令史以謝勳人大非川之敗薛仁貴郭待封等不即重誅嚮使早誅仁貴等則自餘諸將豈敢失利於後哉臣恐吐蕃之平非旦夕可冀也又出師之要全資馬力臣請開畜馬之禁使百姓皆得畜馬若官軍大舉委州縣長吏以官錢增價市之則皆為官有彼胡虜恃馬力以為彊若聽人間市而畜之乃是損彼之彊為中國之利也先是禁百姓畜馬故元忠言之上善其言召見令直中書省仗內供奉調露元年春二月壬戌吐蕃贊普卒子器弩悉弄立生八年矣時器弩悉弄與其舅麴薩若詣羊同發兵有弟生六年在論欽陵軍中國人畏欽陵之彊欲立之欽陵不可與薩若共立器弩悉弄上聞贊普卒嗣主未定命裴行儉乘間圖之行儉曰欽陵為政大臣輯睦未可圖也乃止冬十月癸亥吐蕃文成公主遣其大臣論塞調傍來告喪并請和親上遣郎將宋令文詣吐蕃㑹贊普之葬永隆元年秋七月吐蕃冦河源左武衛將軍黑齒常之擊却之擢常之為河源軍經略大使常之以河源衝要欲加兵戍之而轉輸險逺乃廣置烽戍七十餘所開屯田五千餘頃嵗收五百餘萬石由是戰守有備焉先是劒南募兵於茂州西南築安戎城以斷吐蕃通蠻之路吐蕃以先羌為鄉導攻陷其城以兵據之由是西洱諸蠻皆降于吐蕃吐蕃盡據羊同党項及諸羌之地東接凉松茂嶲等州南鄰天笁西陷龜茲踈勒等四鎮北抵突厥地方萬餘里諸胡之盛莫與為比冬十月丙午文成公主薨于吐蕃開耀元年夏五月己丑河源道經略大使黑齒常之將兵擊吐蕃論贊婆於艮非川破之收其糧畜而還常之在軍七年吐蕃深畏之不敢犯邊永淳元年秋七月吐蕃將論欽陵冦拓松翼等州詔左驍衛郎將李孝逸右衛郎將衛蒲山發秦渭等州兵分道禦之冬十月吐蕃入冦河源軍軍使婁師德將兵擊之於白水澗八戰八捷上以師德為比部員外郎左驍衛郎將河源軍經略副使曰卿有文武材勿辭也則天皇后垂拱元年冬十一月癸卯命天官尚書韋待價為燕然道行軍大總管以討吐蕃三年冬十一月太后欲遣韋待價將兵擊吐蕃鳳閣侍郎韋方質奏請如舊制遣御史監軍太后曰古者明君遣將閫外之事悉以委之比聞御史監軍軍中事無大小皆須承禀以下制上非令典也且何以責其有功遂罷之永昌元年夏五月丙辰命文昌右相韋待價為安息道行軍大總管擊吐蕃韋待價軍至寅識迦河與吐蕃戰大敗㑹大雪糧運不繼待價既無將領之才狼狽失據士卒凍餒死亡甚衆乃引軍還太后大怒丙子待價除名流繡州斬副大總管安西大都護閻溫古安西副都護唐休璟收其餘衆撫安西土太后以休璟為西州都督天授二年夏五月以岑長倩為武威道行軍大總管擊吐蕃中道召還軍竟不出長夀元年春二月己亥吐蕃党項部落萬餘人內附分置十州夏五月吐蕃酋長曷蘇帥部落請內附以右玉鈐衛將軍張玄遇為安撫使將精卒二萬迎之六月軍至大渡水西曷蘇事泄為國人所擒别部酋長咱捶帥羌蠻八千餘人內附玄遇以其部落置萊川州而還初新豐王孝傑從劉審禮擊吐蕃為副總管與審禮皆沒於吐蕃贊普見孝傑泣曰貌類吾父厚禮之後竟得歸纍遷右鷹揚衛將軍孝傑久在吐蕃知其虛實㑹西州都督唐休璟請復取龜兹于闐踈勒碎葉四鎮敇以孝傑為武威軍總管與左武衛大將軍阿史那忠節將兵擊吐蕃冬十月丙戌大破吐蕃復取四鎮置安西都護於龜茲發兵戍之延載元年春二月武威道總管王孝傑破吐蕃㪍論贊刃突厥可汗俀子等於冷泉及大嶺各三萬餘人碎葉鎮守使韓思忠破泥熟俟斤等萬餘人天冊萬嵗元年秋七月辛酉吐蕃冦臨洮以王孝傑為肅邊道行軍大總管以討之萬嵗通天元年春正月甲寅以婁師德為肅邊道行軍副總管擊吐蕃三月壬寅王孝傑婁師德與吐蕃將論欽陵贊婆戰於素羅汗山唐兵大敗孝傑坐免為庶人師德貶原州員外司馬師德因署移牒驚曰官爵盡無邪既而曰亦善亦善不復介意秋九月吐蕃復遣使請和親太后遣右武衛胄曹參軍貴鄉郭元振往察其宜吐蕃將論欽陵請罷安西四鎮戍兵并求分十姓突厥之地元振曰四鎮十姓與吐蕃種類本殊今請罷唐兵豈非有兼并之志乎欽陵曰吐蕃茍貪土地欲為邊患則東侵甘凉豈肯規利於萬里之外邪乃遣使者隨元振入請之朝廷疑未决元振上疏以為欽陵求罷兵割地此乃利害之機誠不可輕舉措也今若直拒其善意則為邊患必深四鎮之利逺甘凉之害近不可不深圖也宜以計緩之使其和望未絶則善矣彼四鎮十姓吐蕃之所甚欲也而青海吐谷渾亦國家之要地也今報之宜曰四鎮十姓之地本無用於中國所以遣兵戍之欲以鎮撫西域分吐蕃之勢使不得併力東侵也今若果無東侵之志當歸我吐谷渾諸部及青海故地則五俟斤部亦當以歸吐蕃如此則足以塞欽陵之口而亦未與之絶也若欽陵小有乖違則曲在彼矣且四鎮十姓欵附歲久今未察其情之向背事之利害遙割而棄之恐傷諸國之心非所以御四夷也太后從之元振又上言吐蕃百姓疲於徭戍早願和親欽陵利於統兵專制獨不欲歸欵若國家嵗發和親使而欽陵常不從命則彼國之人怨欽陵日深望國恩日甚設欲大舉其徒固亦難矣斯亦離間之漸可使其上下猜阻禍亂內興矣太后深然之元振名震以字行聖曆二年初吐蕃贊普器弩悉弄尚幼論欽陵兄弟用事皆有勇略諸胡畏之欽陵居中秉政諸弟握兵分據方面贊婆常居東邊為中國患者三十餘年器弩悉弄浸長陰與大臣論巖謀誅之㑹欽陵出外贊普詐云出畋集兵執欽陵親黨二千餘人殺之遣使召欽陵兄弟欽陵等舉兵不受命贊普將兵討之欽陵兵潰自殺夏四月贊婆帥所部千餘人來降太后命右武衛鎧曹參軍郭元振與河源軍大使夫䝉令卿將騎迎之以贊婆為將迎歸德王欽陵子弓仁以所統吐谷渾七千帳來降拜左玉鈐衛將軍酒泉郡公冬十月丁亥論贊婆至都太后寵待賞賜甚厚以為右衛大將軍使將其衆守洪源谷久視元年秋閏七月丁酉吐蕃將麴莽布支冦凉州圍昌松隴右諸軍大使唐休璟與戰於洪源谷麴莽布支兵甲鮮華休璟謂諸將曰諸論既死麴莽布支新為將不習軍事諸貴臣子弟皆從之望之雖如精鋭實易與耳請為諸君破之乃被甲先陷陳六戰皆捷吐蕃大奔斬首二千五百級獲二禆將而還庚戌以魏元忠為隴右諸軍大使擊吐蕃長安二年秋九月己卯吐蕃遣其臣論彌薩來求和癸未宴論彌薩於麟德殿時凉州都督唐休璟入朝亦預宴彌薩屢窺之太后問其故對曰洪源之戰此將軍猛厲無敵故欲識之太后擢休璟為右武威金吾二衛大將軍休璟練習邊事自碣石以西踰四鎮綿亘萬里山川要害皆能記之冬十月戊申吐蕃贊普將萬餘人冦茂州都督陳大慈與之四戰皆破之斬首千餘級三年夏四月吐蕃遣使獻馬千匹金二千兩以求昏吐蕃南境諸部皆叛贊普器弩悉弄自將擊之卒於軍中諸子爭立久之國人立其子棄隸蹜贊為贊普生七年矣中宗景龍元年春三月庚子吐蕃遣其大臣悉蕭熱入貢夏四月辛巳以上所養雍王守禮女金城公主妻吐蕃贊普三年冬十一月乙亥吐蕃贊普遣其大臣尚贊咄等千餘人迎金城公主睿宗景雲元年春正月上命紀處訥送金城公主適吐蕃處訥辭又命趙彥昭彥昭亦辭丁丑命左驍衛大將軍楊矩送之己卯上自送公主至始平二月癸未還宫公主至吐蕃贊普為之别築城以居之玄宗開元元年冬十二月甲午吐蕃遣其大臣來求和二年夏五月己酉吐蕃相坌達延遺宰相書請先遣解琬至河源正二國封疆然後結盟琬嘗為朔方大總管故吐蕃請之前此琬以金紫光祿大夫致仕復召拜左散騎常侍而遣之又命宰相復坌達延書招懷之琬上言吐蕃必隂懷叛計請預屯兵十萬於秦渭等州以備之六月丙寅吐蕃使其宰相尚飲藏來獻盟書秋八月乙亥吐蕃將坌達延乞力徐帥衆十萬冦臨洮軍蘭州至于渭源掠取牧馬命薛訥白衣攝左羽林將軍為隴右防禦使以右驍衛將軍常樂郭知運為副使與太僕少卿王晙帥兵擊之辛巳大募勇士詣河隴就訥教習初鄯州都督楊矩以九曲之地與吐蕃其地肥饒吐蕃就之畜牧因以入冦矩悔懼自殺冬十月吐蕃復冦渭原丙辰上下詔欲親征發兵十餘萬人馬四萬匹甲子薛訥與吐蕃戰於武街大破之時太僕少卿隴右羣牧使王晙帥所部二千人與訥㑹擊吐蕃坌達延將吐蕃十萬屯大來谷晙選勇士七百衣胡服夜襲之多置鼓角於其後五里前軍遇敵大呼後人鳴鼓角以應之虜以為大軍至驚懼自相殺傷死者萬計訥時在武街去大來谷二十里虜軍塞其中間晙復夜出兵襲之虜大潰始得與訥軍合同追奔至洮水復戰於長城堡又敗之前後殺獲數萬人豐安軍使王海賓戰死乙丑敇罷親征戊辰姚崇盧懷慎等奏頃者吐蕃以河為境神龍中尚公主遂踰河築城置獨山九曲兩軍去積石三百里又於河上造橋今吐蕃既叛宜毁橋拔城從之以王海賔之子忠嗣為朝散大夫尚輦奉御養之宫中乙酉命左驍衛郎將慰金城公主吐蕃遣其大臣宗俄因矛至洮水請和用敵國禮上不許自是連嵗犯邊四年春二月吐蕃圍松州癸酉松州都督孫仁獻襲擊吐蕃於城下大破之秋七月吐蕃復請和上許之五年秋七月壬寅隴右節度使郭知運大破吐蕃於九曲六年冬十一月戊辰吐蕃奉表請和乞舅甥親署誓文及令彼此宰相皆著名於其上七年夏六月戊辰吐蕃復遣使請上親署誓文上不許曰昔嵗誓約已定茍信不由衷亟誓何益十年秋八月癸未吐蕃圍小勃律王沒謹忙謹忙求救于北庭節度使張嵩曰勃律唐之西門勃律亡則西域皆為吐蕃矣嵩乃遣疏勒副使張思禮將蕃漢步騎四千人救之晝夜倍道與謹忙合擊吐蕃大破之斬獲數萬自是纍嵗吐蕃不敢犯邊十五年春正月辛丑凉州都督王君􅎢破吐蕃於青海之西初吐蕃自恃其彊致書用敵國禮辭指悖慢上意常怒之張說言於上曰吐蕃無禮誠宜誅夷但連兵十餘年甘凉河鄯不勝其弊雖師屢捷所得不償所亡聞其悔過求和願聽其欵服以紓邊人上曰俟吾與王君㚟議之說退謂源乾曜曰君㚟勇而無謀常思僥幸若二國和親何以為功吾言必不用矣及君􅎢入朝果請深入討之去冬吐蕃大將悉諾邏冦大斗谷進攻甘州焚掠而去君􅎢度其兵疲勒兵躡其後㑹大雪虜凍死者甚衆自積石軍西歸君㚟先遣人間道入虜境燒道旁草悉諾邏至大非川欲休士馬而野草皆盡馬死過半君􅎢與泰州都督張景順追之及於青海之西乘冰而度悉諾邏已去破其後軍獲其輜重羊馬萬計而還君㚟以功遷左羽林大將軍拜其父夀為少府監致仕上由是益事邊功秋九月丙子吐蕃大將悉諾邏恭祿及燭龍莽布支攻陷瓜州執刺史田元獻及河西節度使王君􅎢之父進攻玉門軍縱所虜俘使歸凉州謂君􅎢曰將軍常以忠勇許國何不一戰君􅎢登城西望而泣竟不敢出兵莽布支别攻常樂縣縣令賈師順帥衆拒守及瓜州陷悉諾邏悉兵會攻之旬餘日吐蕃力盡不能克使人說降之不從吐蕃曰明府既不降宜斂城中財相贈吾當退師順請脫士卒衣悉諾邏知無財乃引去毁瓜州城師順遽開門收器械修守備虜果復遣精騎還視城中知有備乃去師順岐州人也閏月庚子吐蕃贊普與突騎施蘇祿圍安西城安西副大都護趙頥貞擊破之王君􅎢帥精騎邀吐蕃使者於肅州還至甘州南鞏筆驛回紇司馬護輸伏兵突起殺君􅎢辛巳以左金吾衛大將軍信安王禕為朔方節度等副大使禕恪之孫也以朔方節度使蕭嵩為河西節度等副大使時王君㚟新敗河隴震駭嵩引刑部員外郎裴寬為判官與君􅎢判官牛仙客俱掌軍政人心浸安寬漼之從弟也仙客本鶉觚小吏以才幹軍功纍遷至河西節度判官為君􅎢腹心嵩又奏以建康軍使河北張守圭為瓜州刺史帥餘衆築故城板幹裁立吐蕃猝至城中相顧失色莫有鬭志守圭曰彼衆我寡又瘡痍之餘不可以矢刃相持當以竒計取勝乃於城上置酒作樂虜疑其有備不敢攻而退守圭縱兵擊之虜敗走守圭乃修復城市收合流散皆復舊業朝廷嘉其功以瓜州為都督府以守圭為都督悉諾邏威名甚盛蕭嵩縱反間於吐蕃云與中國通謀贊普召而誅之吐蕃由是少衰冬十二月戊寅制以吐蕃為邊患令隴右道及諸軍團兵五萬六千人河西道及諸軍團兵四萬人又徵關中兵萬人集臨洮朔方兵二萬人集㑹州防秋至冬初無冦而罷伺虜入冦互出兵腹背擊之十六年秋七月吐蕃大將悉末朗冦瓜州都督張守圭擊走之乙巳河西節度使蕭嵩隴右節度使張忠亮大破吐蕃於渴波谷忠亮追之拔其大莫門城擒獲甚衆焚其駱駝橋而還八月辛卯右金吾將軍杜賔客破吐蕃于祁連城下時吐蕃復入冦蕭嵩遣賔客將彊弩四千擊之戰自辰至暮吐蕃大潰獲其大將一人虜散走投山哭聲四合十七年春三月瓜州都督張守圭沙州刺史賈思順擊吐蕃大同軍大破之甲寅朔方節度使信安王禕攻吐蕃石堡城拔之初吐蕃陷石堡城留兵據之侵擾河右上命禕與河西隴右同議攻取諸將咸以為石堡據險而道逺攻之不克將無以自還且宜按兵觀舋禕不聽引兵深入急攻拔之仍分兵據守要害令虜不得前自是可龍諸軍遊奕拓境千餘里上聞大恱更命石堡城曰振武軍十八年夏五月吐蕃遣使致書於境上求和秋九月吐蕃兵數敗而懼乃求和親忠王友皇甫惟明因奏事從容言和親之利上曰贊普嘗遺吾書悖慢此何可捨對曰贊普當開元之初年尚幼稚安能為此書殆邊將詐為之欲以激怒陛下耳夫邊境有事則將吏得以因緣盜匿官物妄述功狀以取勳爵此皆姦臣之利非國家之福也兵連不解日費千金河西隴右由兹困敝陛下誠命一使往視公主因與贊普靣相約結使之稽顙稱臣永息邊患豈非御夷狄之長䇿乎上恱命惟明與內侍張元方使于吐蕃贊普大喜悉出貞觀以來所得敇書以示惟明冬十月遣其大臣論名悉獵隨惟明入貢表稱甥世尚公主義同一家中間張玄表等先興兵寇鈔遂使二境交惡甥深識尊卑安敢失禮正為邉將交構致獲罪於舅屢遣使者入朝皆為邊將所遏今䝉逺降使臣來視公主甥不勝喜荷儻使復修舊好死無所恨自是吐蕃復欵附十九年春正月辛未遣鴻臚卿崔琳使于吐蕃琳神慶之子也吐蕃使者稱公主求毛詩春秋禮記正字于休烈上疏以為東平王漢之懿親求史記諸子漢猶不與况吐蕃國之寇讎今資之以書使知用兵權略愈生變詐非中國之利也事下中書門下議之裴光庭等奏吐蕃聾昧頑嚚久叛新服因其有請賜以詩書庶使之漸陶聲教化流無外休烈徒知書有權略變詐之語不知忠信禮義皆從書出也上曰善遂與之休烈志寧之玄孫也秋九月辛未吐蕃遣其相論尚它硉入見二十一年春二月丁酉金城公主請立碑於赤嶺以分唐與吐蕃之境許之突厥叛唐唐髙宗麟德元年春正月甲子改雲中都護府為單于大都護府以殷王旭輪為單于大都護初李靖破突厥遷三百帳于雲中城阿史德氏為其長至是部落漸衆阿史德氏詣闕請如胡法立親王為可汗以統之上召見謂曰今之可汗古之單于也故更為單于都護府而使殷王遙領之調露元年冬十月單于大都護府突厥阿史德溫傳奉職二部俱反立阿史那泥熟匐為可汗二十四州酋長皆叛應之衆數十萬遣鴻臚卿單于大都護府長史蕭嗣業左領軍衛將軍花大智右千牛衛將軍李景嘉等將兵討之嗣業等先戰屢捷因不設備㑹大雪突厥夜襲其營嗣業狼狽拔營走衆遂大亂為虜所敗死者不可勝數大智景嘉引步兵且行且戰得入單于都護府嗣業減死流桂州大智景嘉並免官突厥冦定州刺史霍王元軌命開門偃旗虜疑有伏懼而宵遁州人李嘉運與虜通謀事泄上令元軌窮其黨與元軌曰彊冦在境人心不安若多所逮繫是驅之使叛也乃獨殺嘉運餘無所問因自劾違制上覽表大喜謂使者曰朕亦悔之向無王失定州矣自是朝廷有大事上多密敕問之壬子遣左金吾衛將軍曹懷舜屯井陘右武衛將軍崔獻屯龍門以備突厥突厥扇誘奚契丹侵掠營州都督周道務遣戶曹始平唐休璟將兵擊破之十一月癸未上宴裴行儉謂之曰卿有文武兼資今授卿二職乃除禮部尚書兼檢校右衛大將軍甲辰以行儉為定襄道行軍大總管將兵十八萬并西軍檢校豐州都督程務挺東軍幽州都督李文暕總三十餘萬以討突厥並受行儉節度務挺名振之子也永隆元年春三月裴行儉大破突厥於黑山擒其酋長奉職可汗泥熟匐為其下所殺以其首來降初行儉行至朔川謂其下曰用兵之道撫士貴誠制敵尚詐前日蕭嗣業糧運為突厥所掠士卒凍餒故敗今突厥必復為此謀宜有以詐之乃詐為糧車三百乘每車伏壯士五人各持陌刀徑弩以羸兵數百為之援且伏精兵於險要以待之虜果至羸兵棄車散走虜驅車就水草解鞍牧馬欲取糧壯士自車中躍出擊之虜驚走復為伏兵所邀殺獲殆盡自是糧運行者虜莫敢近軍至單于府北抵暮下營掘塹已周行儉遽命移就髙岡諸將皆言士卒已安堵不可復動行儉不從趣使移是夜風雨暴至前所營地水深丈餘諸將驚服問其故行儉笑曰自今但從我命不必問其所由知也奉職既就擒餘黨走保狼山詔户部尚書崔知悌馳傳詣定襄宣慰將士且區處餘冦行儉引軍還秋七月突厥餘衆圍雲州代州都督竇懷哲右領軍中郎將程務挺將兵擊破之開耀元年春正月突厥冦原慶等州乙亥遣右衛將軍李知十等將兵屯涇慶二州以備突厥裴行儉軍既還突厥阿史那伏念復自立為可汗與阿史德溫傳連兵為冦癸巳以行儉為定襄道大總管以右武衛將軍曹懷舜幽州都督李文暕為副將兵討之三月曹懷舜與禆將竇義昭將前軍擊突厥或告阿史那伏念與阿史德溫傳在纍沙北左右才二十騎以下可徑往取也懷舜等信之留老弱於瓠盧泊帥輕鋭倍道進至黑沙無所見人馬疲頓乃引兵還㑹薛延陀部落欲西詣伏念遇懷舜軍因請降懷舜等引兵徐還至長城北遇溫傳小戰各引去至橫水遇伏念懷舜義昭與李文暕及禆將劉敬同四軍合為方陳且戰且行經一日伏念乘便風擊之軍中擾亂懷舜等棄軍走軍遂大敗死者不可勝數懷舜等收散卒斂金帛以賂伏念與之約和殺牛為盟伏念北去懷舜等乃得還夏五月丙戌懷舜免死流嶺南秋閏七月裴行儉軍於代州之陘口多縱反間由是阿史那伏念與阿史德溫傳浸相猜二伏念留妻子輜重於金牙山以輕騎襲曹懷舜行儉遣禆將何迦密自通漠道程務挺自石地道掩取之伏念與曹懷舜等約和而還比至金牙山失其妻子輜重士卒多疾疫乃引兵北走保細沙行儉又使副總管劉敬同程務挺等將單于府兵追躡之伏念請執溫傳以自效然尚猶豫又自恃道逺唐兵必不能至不復設備敬同等軍到伏念狼狽不能整其衆遂執溫傳從間道詣行儉降候騎告以煙塵漲天而至將士皆震恐行儉曰此乃伏念執溫傳來降非他盜也然受降如受敵不可無備乃命嚴備遣單于使迎前勞之少選伏念果帥酋長縛溫傳詣軍門請罪行儉盡平突厥餘黨以伏念溫傳歸京師冬十月壬戌裴行儉等獻定襄之俘乙丑改元丙寅斬阿史那伏念阿史德溫傳等五十四人於都市初行儉許伏念以不死故降裴炎疾行儉之功奏言伏念為副將張䖍朂程務挺所逼又回紇等自磧北南向逼之窮窘而降耳遂誅之行儉歎曰渾濬爭功古今所耻但恐殺降無復來者因稱疾不出永淳元年突厥餘黨阿史那骨篤祿阿史德元珍等招集亡散據黑沙城反入冦并州及單于府之北境殺嵐州刺史王德茂右領軍衛將軍檢校代州都督薛仁貴將兵擊元珍於雲州虜問唐大將為誰應之曰薛仁貴虜曰吾聞仁貴流象州死久矣何以紿我仁貴免胄示之面虜相顧失色下馬列拜稍稍引去仁貴因奮擊大破之斬首萬餘級捕虜二萬餘人弘道元年春二月庚午突厥冦定州刺史霍王元軌擊却之乙亥復寇媯州三月庚寅阿史那骨篤祿阿史德元珍圍單于都護府執司馬張行師殺之遣勝州都督王本立夏州都督李崇義將兵分道救之夏五月乙巳突厥阿史那骨篤祿等冦蔚州殺刺史李思儉豐州都督崔智辨將兵邀之於朝那山北兵敗為虜所擒朝議欲廢豐州遷其百姓於靈夏豐州司馬唐休璟上言以為豐州阻河為固居賊衝要自秦漢已來列為郡縣土宜耕牧隋季喪亂遷百姓於寧慶二州致胡虜深侵以靈夏為邊境貞觀之末募人實之西北始安今廢之則河濵之地復為賊有靈夏等州人不安業非國家之利也乃止六月突厥别部寇掠嵐州偏將楊玄基擊走之冬十一月戊戌以右武衛將軍程務挺為單于道安撫大使招討阿史那骨篤祿等則天皇后光宅元年秋七月突厥阿史那骨篤祿等冦朔州九月以左武衛大將軍程務挺為單于道安撫大使以備突厥垂拱元年春二月突厥阿史那骨篤祿等數冦邊以左玉鈐衛中郎將淳于處平為陽曲道行軍總管擊之夏四月癸未突厥冦代州淳于處平引兵救之至欣州為突厥所敗死者五千餘人二年秋九月突厥入冦左鷹揚衛大將軍黑齒常之拒之至兩井遇突厥三千餘人見唐兵皆下馬擐甲常之以二百餘騎衝之皆棄甲走日暮突厥太至常之令營中然火東南又有火起虜疑有兵相應遂夜遁三年春二月丙辰突厥骨篤祿等冦昌平命左鷹揚大將軍黑齒常之帥諸軍討之秋七月突厥骨篤祿元珍冦朔州遣燕然道大總管黑齒常之擊之以右鷹揚大將軍李多祚為之副大破突厥於黃花堆追奔四十餘里突厥皆散走磧北多祚世為靺鞨酋長以軍功得入宿衛黑齒常之每得賞賜皆分將士有善馬為軍士所損官屬請笞之常之曰奈何以私馬笞官兵乎卒不問冬十月庚子右監門衛中郎將㸑寶璧與突厥骨篤祿元珍戰全軍皆沒寶璧輕騎遁歸寶璧見黑齒常之有功表請窮追餘冦詔與常之計議遙為聲援寶璧欲専其功不待常之引精兵萬三千人先行出塞二千餘里掩擊其部落既至又先遣人告之使得嚴備與戰遂敗太后誅寶璧改骨篤祿曰不卒祿永昌元年夏五月己巳以僧懷義為新平軍大總管北討突厥行至紫河不見虜於單于臺刻石紀功而還秋九月壬子以僧懷義為新平道行軍大總管將兵二十萬以討突厥骨篤祿延載元年春正月突厥可汗骨篤祿卒其子幼弟默啜自立為可汗臘月甲戌默啜寇靈州二月庚午以僧懷義為代北道行軍大總管以討默啜三月甲申以鳳閣舍人蘇味道為鳯閣侍郎同平章事李昭德檢校內史更以僧懷義為朔方道行軍大總管以李昭德為長史蘇味道為司馬帥契苾明曹仁師沙吒忠義等十八將軍以討默啜未行虜退而止昭德嘗與懷義議事失其㫖懷義撻之昭德惶懼請罪天冊萬嵗元年正月丙午以王孝傑為朔方道行軍總管擊突厥冬十月突厥默啜遣使請降太后喜冊授左衛大將軍歸國公萬嵗通天元年秋九月丁巳突厥冦凉州執都督許欽明欽明紹之曽孫也時出按部突厥數萬奄至城下欽明拒戰為所虜突厥默啜請為太后子并為其女求昏悉歸河西降戶帥其部衆為國討契丹太后遣豹韜衛大將軍閻知微左衛郎將攝司賓卿田歸道册授默啜左衛大將軍遷善可汗知微立德之孫歸道仁㑹之子也冬十月辛卯契丹李盡忠卒孫萬榮代領其衆突厥默啜乘間襲松漠虜盡忠萬榮妻子而去太后進拜默啜為頡跌利施大單于立功報國可汗神功元年春正月突厥默啜冦靈州以許欽明自隨欽明至城下大呼求美醬梁米及墨意欲城中選良將引精兵夜襲虜營而城中無諭其意者癸亥突厥默啜寇勝州平狄軍副使安道買擊破之三月閻知微田歸道同使突厥冊默啜為可汗知微中道遇默啜使者輒與之緋袍銀帶且上言虜使至都宜大為供張歸道上言突厥背誕積年今方悔過宜待聖恩寬宥今知微擅與之袍帶使朝廷無以復加宜令反初服以俟朝恩又小虜使臣不足大為供張太后然之知微見默啜舞蹈吮其靴鼻歸道長揖不拜默啜囚歸道將殺之歸道辭色不撓責其無厭為陳禍福阿波達于元珍曰大國使者不可殺也默啜怒稍解但拘留不遣初咸亨中突厥有降者皆處之豐勝靈夏朔代六州至是默啜求六州降户及單于都護府之地并榖種繒帛農器鐡太后不許默啜怒言辭悖慢姚璹楊再思以契丹未平請依默啜所求給之麟臺少監知鳳閣侍郎贊皇李嶠曰戎狄貪而無信此所謂借冦兵資盜糧也不如治兵以備之璹再思固請與之乃悉驅六州降戶數千帳以與默啜并給穀種四萬斛雜綵五萬段農器三千事鐡數萬斤并許其昏默啜由是益彊田歸道始得還與閻知微爭論於太后前歸道以為默啜必負約不可恃和親宜為之備知微以為和親必可保冬閏十月甲寅以幽州都督狄仁傑為鸞臺侍郎同平章事仁傑上疏以為天生四夷皆在先王封略之外故東拒滄海西阻流沙北橫大漠南阻五嶺此天所以限夷狄而隔中外也自典籍所記聲教所及三代不能至者國家盡兼之矣詩人矜薄伐於太原美化行於江漢則三代之逺裔皆國家之域中也若乃用武荒外邀功絶域竭府庫之實以爭不毛之地得其人不足增賦獲其土不可耕織茍求冠帶逺夷之稱不務固本安人之術此秦皇漢武之所行非五帝三王之事業也始皇窮兵極武務求廣地死者如麻致天下潰叛漢武征伐四夷百姓困窮盜賊蜂起末年悔悟息征罷役故能為天所祐近者國家頻嵗出師所費滋廣西戍四鎮東戍安東調發日加百姓虛弊今關東飢饉蜀漢逃亡江淮已南徴求不息人不復業相率為盜本根一搖憂患不淺其所以然者皆以爭蠻貊不毛之地乖子養蒼生之道也昔漢元納賈捐之之謀而罷朱崖郡宣帝用魏相之䇿而棄車師之田豈不欲慕尚虛名蓋憚勞人力也近貞觀年中克平九姓立李思摩為可汗使統諸部者蓋以夷狄叛則伐之降則撫之得推亡固存之義無逺戍勞人之役此近日之令典經邉之故事也竊謂宜立阿史那斛瑟羅為可汗委之四鎮繼髙氏絶國使守安東省軍費於逺方并甲兵於塞上使夷狄無侵侮之患則可矣何必窮其窟穴與螻蟻校長短哉但當敕邊兵謹守備逺斥候聚資糧待其自致然後擊之以逸待勞則戰士力倍以主禦客則我得其便堅壁清野則冦無所得自然賊深入則有顚躓之慮淺入必無虜獲之益如此數年可使二虜不擊而服矣事雖不行識者是之聖曆元年夏六月甲午命淮陽王武延秀入突厥納默啜女為妃豹韜衛大將軍閻知微攝春官尚書右武衛郎將楊齊莊攝司賔卿齎金帛巨億以送之延秀承嗣之子也鳳閣舍人襄陽張柬之諌曰自古未有中國親王娶夷狄女者由是忤㫖出為合州刺史秋八月戊子武延秀至黑沙南庭突厥默啜謂閻知微等曰我欲以女嫁李氏安用武氏兒邪此豈天子之子乎我突厥世受李氏恩聞李氏盡滅唯兩兒在我今將兵輔立之乃拘延秀於别所以知微為南面可汗言欲使之主唐民也遂發兵襲靜難平狄清夷等軍靜難軍使慕容玄崱以兵五千降之虜勢大振進冦媯檀等州前從閻知微入突厥者默啜皆賜之五品三品之服太后悉奪之默啜移書數朝廷曰與我蒸榖種種之不生一也金銀器皆行濫非真物二也我與使者緋紫皆奪之三也繒帛皆踈惡四也我可汗女當嫁天子兒武氏小姓門戶不敵罔冒為昏五也我為此起兵欲取河北耳監察御史裴懷古從閻知微入突厥默啜欲官之不受囚將殺之逃歸抵晉陽形容羸瘁突騎譟聚以為間諜欲取其首以求功有果毅嘗為人所枉懷古按直之大呼曰裴御史也救之得全至都引見遷祠部貟外郎時諸州聞突厥入寇方秋爭發民修城衛州刺史太平敬暉謂僚屬曰吾聞金湯非粟不守奈何捨收穫而事城郭乎悉罷之使歸田百姓大恱以司屬卿武重規為天兵中道大總管右武衛將軍沙吒忠義為天兵西道總管幽州都督下邽張仁願為天兵東道總管將兵三十萬以討突厥默啜又以左羽林衛大將軍閻敬容為天兵西道後軍總管將兵十五萬為後援癸丑默啜冦飛狐乙卯陷定州殺刺史孫彥髙及吏民數千人九月改突厥默啜為斬啜默啜使閻知微招諭趙州知微與虜連手踏萬嵗樂於城下將軍陳令英在城上謂曰尚書位任非輕乃為虜踏歌獨無慙乎知微微吟曰不得已萬嵗樂戊辰默啜圍趙州長史唐般若翻城應之刺史髙睿與妻秦氏仰藥詐死虜輿之詣默啜默啜以金師子帶紫袍示之曰降則拜官不降則死睿顧其妻妻曰酬報國恩正在今日遂俱閉目不言經再宿虜知不可屈乃殺之虜退唐般若族誅贈睿冬官尚書諡曰節睿熲之孫也甲戌命太子為河北道元帥以討突厥先是募人月餘不滿千人及聞太子為帥應募者雲集未幾數盈五萬戊寅以狄仁傑為河北道行軍副元帥右丞宋玄爽為長史右臺中丞崔獻為司馬左臺中丞吉頊為監軍使時太子不行命仁傑知元帥事太后親送之癸未突厥默啜盡殺所掠趙定等州男女萬餘人自五回道去所過殺掠不可勝紀沙吒忠義等但引兵躡之不敢逼狄仁傑將兵一萬追之無所及默啜還漠北擁兵四十萬據地萬里西北諸夷皆附之甚有輕中國之心冬十月癸卯以狄仁傑為河北道安撫大使時河北人為突厥所驅逼者虜退懼誅往往亡匿仁傑上疏以為朝廷議者皆罪契丹突厥所脅從之人言其迹雖不同心則無别誠以山東近緣軍機調發傷重家道悉破或至逃亡重以官典侵漁因事而起枷杖之下痛切肌膚事迫情危不循禮義愁苦之地不樂其生有利則歸且圖賖死此乃君子之愧辱小人之常行也又諸城入僞或待天兵將士求功皆云攻得臣憂濫賞亦恐非辜以經與賊同是為惡地至有汚辱妻子劫掠貨財兵士信知不仁簪笏未能以免乃是賊平之後為惡更深且賊務招攜秋毫不犯今之歸正即是平人翻被破傷豈不悲痛夫人猶水也壅之則為泉疏之則為川通塞隨流豈有常性今負罪之伍必不在家露宿草行濳竄山澤赦之則出不赦則狂山東羣盜緣兹聚結臣以邉塵暫起不足為憂中土不安此為大事罪之則衆情恐懼恕之則反側自安伏願曲赦河北諸州一無所問制從之仁傑於是撫慰百姓得突厥所驅掠者悉遞還本貫散糧運以賑貧乏修郵驛以濟旋師恐諸將及使者妄求供頓乃自食疏糲禁其下無得侵擾百姓犯者必斬河北遂安突厥默啜離趙州乃縱閻知微使還太后命磔於天津橋南使百官共射之既乃咼其肉銼其骨夷其三族踈親有先未相識而同死者褒公段瓚志玄之子也先沒於突厥突厥在趙州瓚邀楊齊莊與之俱逃齊莊畏怯不敢發瓚先歸太后賞之齊莊尋至敕河內王武懿宗鞫之懿宗以為齊莊意懷猶豫遂與閻知微同誅既射之如蝟氣殜殜未死乃决其腹割心投於地猶趌趌然躍不止擢田歸道為夏官侍郎甚見親委二年臘月河南北置武騎團以備突厥春二月壬辰以魏元忠檢校并州長史充天兵軍大總管以備突厥是嵗突厥默啜立其弟咄悉匐為左廂察骨篤祿子默矩為右廂察各主兵二萬餘人其子匐俱為小可汗位在兩察上主處木昆等十姓兵四萬餘人又號為拓西可汗久視元年冬十月辛亥以魏元忠為蕭關道大總管以備突厥十二月甲寅突厥掠隴右諸監馬萬餘匹而去長安元年夏五月以魏元忠為靈武道行軍大總管以備突厥秋八月突厥默啜冦邊命安北大都護相王為天兵道元帥統諸軍擊之未行而虜退二年春正月突厥冦鹽夏二州三月庚寅突厥破石嶺冦并州以雍州長史薛季昶攝右臺大夫充山東防禦軍大使滄瀛幽易恆定等州諸軍皆受季昶節度夏四月以幽州刺史張仁願専知幽平媯檀防禦仍與季昶相知以拒突厥秋七月甲午突厥寇代州九月壬申突厥寇欣州三年夏六月辛酉突厥默啜遣其臣莫賀干來請以女妻皇太子之子冬十一月己丑突厥遣使謝許昏丙申宴於宿羽臺太子預焉四年突厥默啜既和親秋八月戊寅始遣淮陽王武延秀還中宗神龍元年夏六月壬子以左驍衛大將軍裴思說充靈武軍大總管以備突厥二年冬十二月己卯突厥默啜冦鳴沙靈武軍大總管沙吒忠義與戰軍敗死者六千餘人丁巳突厥進寇原㑹等州掠隴右牧馬萬餘匹而去免忠義官景龍元年春正月庚戌制以突厥默啜冦邊命內外官各進平突厥之䇿右補闕盧俌上疏以為郤縠恱禮樂敦詩書為晉元帥杜預射不穿札建平吳之勳是知中權制謀不取一夫之勇如沙吒忠義驍將之材本不足以當大任又鳴沙之役主將先逃宜正邦憲賞罰既明敵無不服又邊州刺史宜精擇其人使之搜卒乘積資糧來則禦之去則備之去嵗四方旱災未易興師當理內以及外綏近以來逺俟倉廩實士卒練然後大舉以討之上善之夏五月戊戌以右屯衛大將軍張仁願為朔方道大總管以備突厥冬十月丁丑命左屯衛將軍張仁願充朔方道大總管以擊突厥比至虜已退追擊大破之二年春三月丙辰朔方道大總管張仁願築三受降城於河上初朔方軍與突厥以河為境河北有拂雲祠突厥將入寇必先詣祠祈禱牧馬料兵而後度河時默啜悉衆西擊突騎施仁願請乘虛奪取漠南地於河北築三受降城首尾相應以絶其南寇之路太子少師唐休璟以為兩漢以來皆北阻大河今築城寇境恐勞人費功終為虜有仁願固請不已上竟從之仁願表留嵗滿鎮兵以助其功咸陽兵二百餘人逃歸仁願悉擒之斬於城下軍中股栗六旬而成以拂雲祠為中城距東西兩城各四百餘里皆據津要拓地三百餘里於牛頭朝那山北置𤇺候千八百所以左玉鈴衛將軍論弓仁為朔方軍前鋒遊奕使戍諾真水為邏衛自是突厥不敢度山畋牧朔方無復冦掠減鎮兵數萬人仁願建三城不置壅門及備守之具或問之仁願曰兵貴進取不利退守冦至此當併力出戰回首望城者猶應斬之安用守備生其退恧之心也其後常元楷為朔方軍總管始築壅門人以是重仁願而輕元楷睿宗景雲二年春正月癸丑突厥可汗默啜遣使請和許之三月以宋王成器女為金山公主許嫁突厥默啜御史中丞和逢堯攝鴻臚卿使于突厥說默啜曰處密堅昆聞可汗結昏於唐皆當歸附可汗何不襲唐冠帶使諸胡知之豈不美哉默啜許諾明日朴頭衣紫衫南面再拜稱臣遣其子楊我支及國相隨逄堯入朝十一月戊寅至京師逄堯以奉使功遷水部侍郎玄宗先天元年春正月乙未上御安福門宴突厥楊我支以金山公主示之既而㑹上傳位昏竟不成開元元年秋八月丙辰突厥可汗默啜遣其子揚我支來求昏丁巳許以蜀王女南和縣主妻之二年春二月乙未突厥可汗默啜遣其子同俄特勒及妹夫火拔頡利發石阿失畢將兵圍北庭都護府都護郭䖍瓘擊敗之同俄單騎逼城下䖍瓘伏壯士於道側突起斬之突厥請悉軍中資糧以贖同俄聞其已死慟哭而去閏月突厥石阿失畢既失同俄不敢歸癸未與其妻來奔以為右衛大將軍封燕北郡王命其妻曰金山公主夏四月辛巳突厥可汗默啜復遣使求昏自稱乾和永清太駙馬天上得果報天男突厥聖天骨咄祿可汗突厥可汗默啜衰老昏虐愈甚壬子葛邏祿等部落詣凉州降冬十月己巳突厥可汗默啜又遣使求昏上許以來嵗迎公主突厥十姓胡祿屋等諸部詣北庭請降命都護郭䖍瓘撫存之十一月丙申遣左散騎常侍解琬詣北庭宣慰突厥降者隨便宜區處三年春正月突厥十姓降者前後萬餘帳髙麗莫離支文簡十姓之壻也二月與􅎤跌都督思奉等亦自突厥帥衆來降制皆以河南地處之三月胡祿屋酋長支匐忌等入朝上以十姓降者浸多夏四月庚申以右羽林大將軍薛訥為凉州鎮大總管赤水等軍並受節度居凉州左衛大將軍郭䖍瓘為朔川鎮大總管和戎等軍並受節度居并州勒兵以備默啜默啜發兵擊葛邏祿胡祿屋鼠尼施等屢破之敕北庭都護湯嘉惠左散騎常侍解琬等發兵救之五月壬辰敕嘉惠等與葛邏祿胡祿屋鼠尼施及定邊道大總管阿史那獻互相慶援秋七月壬戌以凉州大總管薛訥為朔方道行軍大總管太僕卿吕延祚靈州刺史杜賔客副之以討突厥四年夏六月癸酉拔曵固斬突厥可汗默啜首來獻時默啜北擊拔曵固大破之於獨樂水恃勝輕歸不復設僃遇拔曵固迸卒頡質略自栁林突出斬之時大武軍子將郝靈荃奉使在突厥頡質略以其首歸之與偕詣闕懸其首於廣街拔曵固回紇同羅霫僕固五部皆來降置於大武軍北默啜之子小可汗立骨咄祿之子闕特勒擊殺之及默啜諸子親信略盡立其兄左賢王默棘連是為毗伽可汗國人謂之小殺毗伽以國固讓闕特勒闕特勒不受乃以為左賢王専典兵馬秋八月突厥默啜既死奚契丹拔曵固等諸部皆內附突騎施蘇祿復自立為可汗突厥部落多離散毗伽可汗患之乃召默啜時牙官暾欲谷以為謀主暾欲谷年七十餘多智略國人信服之突厥降戶處河曲者聞毗伽立多復叛歸之并州長史王晙上言此屬徒以其國喪亂故相帥來降若彼安寧必復叛去今置之河曲此屬桀黠實難制御往往不受軍州約束興兵剽掠聞其逃者已多與虜聲問往來通傳委曲乃是畜養此屬使為間諜日月滋久姦詐逾深窺伺邉隙將成大患虜騎南牧必為內應來逼軍州表裏受敵雖有韓彭不能取勝矣願以秋冬之交大集兵衆諭以利害給其資糧徙之內地二十年外漸變舊俗皆成徑兵雖一時暫勞然永久安靖比者守邉將吏及出境使人多為諛辭皆非事實或云北虜破滅或云降戶妥帖皆欲自衒其功非能盡忠狥國願察斯利口勿忘逺慮議者必曰國家嚮時已嘗置降戶於河曲皆獲安寧今何所疑此則事同時異不可不察嚮者頡利既亡降者無復異心故得久安無變今北虜尚存此屬或畏其威或懷其惠或其親屬豈樂南來校之彼時固不侔矣以臣愚慮徙之內地上也多屯士馬大為之備華夷相參人勞費廣次也正如今日下也願審兹三策擇利而行縱使因徙逃亡得者皆為唐有若留至河氷恐必有變疏奏未報降戶􅎤跌思泰阿悉爛等果叛冬十月甲辰命朔方大總管薛訥發兵追討之王晙引并州兵西濟河晝夜兼行追擊叛者破之斬獲三千級先是單于副都護張知運悉收降戶兵仗令度河而南降戶怨怒御史中丞姜晦為巡邊使降戶訴無弓矢不得射獵晦悉還之降戶得之遂叛張知運不設備與之戰於青剛嶺為虜所擒欲送突厥至綏州境將軍郭知運以朔方兵邀擊之大破其衆於黑山呼延谷虜釋張知運而去上以張知運喪師斬之以狥毗伽可汗既得思泰等欲南入為寇暾欲谷曰唐主英武民和年豐未有間隙不可動也我衆新集力尚疲羸且當息養數年始可觀變而舉毗伽又欲築城并立寺觀暾欲谷曰不可突厥人徒稀少不及唐家百分之一所以能與為敵者正以隨逐水草居處無常射獵為業人皆習武彊則進兵抄掠弱則竄伏山林唐兵雖多無所施用若築城而居變更舊俗一朝失利必為所滅釋老之法教人仁弱非用武事勝之術不可崇也毗伽乃止六年春正月辛丑突厥毗伽可汗來請和許之八年夏六月突厥降戶僕固都督勺磨及􅎤跌部落散居受降城側朔方大使王晙言其隂引突厥謀陷軍城密奏請誅之誘勺磨等宴於受降城伏兵悉殺之河曲降戶殆盡拔曵固同羅諸部在大同橫野軍之側者聞之皆忷懼秋并州長史天兵節度大使張說引二十騎持節即其部落慰撫之因宿其帳下副使李憲以虜情難信馳書止之說復書曰吾肉非黃羊必不畏食血非野馬必不畏刺士見危致命此吾效死之秋也拔曵固同羅由是遂安冬十一月辛未突厥寇甘凉等州敗河西節度使楊敬述掠契苾部落而去先是朔方大總管王晙奏請西發拔悉密東發奚契丹期以今秋掩毗伽牙帳於稽落水上毗伽聞之大懼暾欲谷曰不足畏也拔悉密在北庭與奚契丹相去絶逺勢不相及朔方兵計亦不能來此必若能來俟其垂至徙牙帳北行三日唐兵食盡自去矣且拔悉密輕而好利得王晙之約必喜而先至晙與張嘉貞不相恱奏請多不相應必不敢出兵晙兵不出拔悉密獨至擊而取之勢甚易耳既而拔悉密果發兵逼突厥牙帳而朔方及奚契丹兵不至拔悉密懼引退毗伽欲擊之暾欲谷曰此屬去家千里將死戰未可擊也不如以兵躡之去北庭二百里暾欲谷分兵間道先圍北庭因縱兵擊拔悉密大破之拔悉密衆潰走趨北庭不得入盡為突厥所虜暾欲谷引兵還出赤亭掠凉州羊馬楊敬述遣禆將盧公利判官元澄將兵邀擊之暾欲谷謂其衆曰吾乘勝而來敬述出兵破之必矣公利等至删丹與暾欲谷遇唐兵大敗公利澄脫身走毗伽由是大振盡有默啜之衆九年春二月丙戌突厥毗伽復使來求和上賜書諭以曩昔國家與突厥和親華夷安逸甲兵休息國家買突厥羊馬突厥受國家繒帛彼此豐給自數十年來不復如舊正由默啜無信口和心叛數出盜兵寇抄邉鄙人怨神怒隕身喪元吉凶之驗皆可汗所見今復蹈前迹掩襲甘凉隨遣使人更來求好國家如天之覆如海之容但取來情不追往咎可汗果有誠心則共保遐福不然無煩使者徒爾往來若其侵邊亦有以待可汗其審圖之十二年秋七月突厥可汗遣其臣哥解頡利發來求昏八月丙申突厥哥解頡利發還其國以其使者輕禮數不備未許昏十三年張說以大駕東巡恐突厥乘間入寇議加兵守邊夏四月召兵部郎中裴光庭謀之光庭曰封禪者告成功也今將升中千天而戎狄是懼非所以昭盛德也說曰然則若之何光庭曰四夷之中突厥為大比屢求和親而朝廷羈縻未决許也今遣一使徴其大臣從封泰山彼必欣然承命突厥來則戎狄君長無不皆來可以偃旗卧鼓髙枕有餘矣說曰善說所不及即奏行之光庭行儉之子也上遣中書直省袁振攝鴻臚卿諭㫖於突厥小殺與闕特勒暾谷欲環坐帳中置酒謂振曰吐蕃狗種奚契丹本突厥奴也皆得尚主突厥前後求昏獨不許何也且吾亦知入蕃公主皆非天子女今豈問真僞但屢請不獲愧見諸蕃耳振許為之奏請小殺乃遣其大臣阿史德頡利發入貢因扈從東巡冬十二月突厥頡利發辭歸上厚賜而遣之竟不許昏十四年夏四月辛丑於定恆莫易滄五州置軍以備突厥十五年秋九月丙戌突厥毗伽可汗遣其大臣梅録啜入貢吐蕃之冦瓜州也遺毗伽書欲與之俱入冦毗伽并獻其書上嘉之聽於西受降城為互市每嵗齎縑帛數十萬匹就市戎馬以助軍旅且為監牧之種由是國馬益壯焉十九年春三月突厥左賢王闕特勒卒賜書弔之二十二年冬十二月突厥毗伽可汗為其大臣梅録啜所毒未死討誅梅録啜及其族黨既卒子伊然可汗立尋卒弟登利可汗立庚戌來告喪二十九年秋七月丙寅突厥遣使來告登利可汗之喪初登利從叔二人分典兵馬號左右殺登利患兩殺之專與其母謀誘右殺斬之自將其衆左殺判闕特勒勒兵攻登利殺之立毗伽可汗之子為可汗俄為骨咄葉護所殺更立其弟尋又殺之骨咄葉護自立為可汗上以突厥內亂癸酉命左羽林將軍孫老奴招諭回紇葛邏祿拔悉密等部落天寶元年秋八月突厥拔悉密回紇葛邏祿三部共攻骨咄葉護殺之推拔悉密酋長為頡跌伊施可汗回紇葛邏祿自為左右葉護突厥餘衆共立判闕特勒之子為烏蘇米施可汗以其子葛臘哆為西殺上遣使諭烏蘇令內附烏蘇不從朔方節度使王忠嗣盛兵磧口以威之烏蘇懼請降而遷延不至忠嗣知其詐乃遣使說拔悉密回紇葛邏祿使攻之烏蘇遁去忠嗣因出兵擊之取其右廂以歸丁亥突厥西葉護阿布思及西殺葛臘哆默啜之孫勃德支伊然小妻毗伽登利之女帥部衆千餘帳相次來降突厥遂微九月辛亥上御花蕚樓宴突厥降者賞賜甚厚三載秋八月拔悉密攻斬突厥烏蘇可汗傳首京師國人立其弟鶻隴匐白眉特勒是為白眉可汗於是突厥大亂敕朔方節度使王忠嗣出兵乘之至薩河內山破其左廂阿波連干等十一部右廂未下㑹回紇葛邏祿共攻拔悉密頡跌伊施可汗殺之回紇骨力裴羅自立為骨咄祿毗伽闕可汗遣使言狀上冊拜裴羅為懷仁可汗於是懷仁南據突厥故地立牙帳於烏德犍山舊統藥邏葛等九姓其後又併拔悉密葛邏祿凡十一部各置都督每戰則以二客部為先四載春正月回紇懷仁可汗擊突厥白眉可汗殺之傳首京師突厥毗伽可敦帥衆來降於是北邉晏然烽燧無警矣唐平奚契丹唐太宗貞觀二年夏四月丙申契丹酋長帥其部落來降四年突厥既亡營州都督薛萬淑遣契丹酋長貪沒折說諭東北諸夷奚霫室韋等十餘部皆內附萬淑萬均之兄也二十二年夏四月己未契丹辱紇主曲據帥衆內附以其地置玄州以曲據為刺史隸營州都督府冬十一月庚子契丹帥窋哥奚帥可度者並帥所部內屬以契丹部為松漠府以窋哥為都督又以其别帥達稽等部為峭落等九州各以其辱紇主為刺史以奚部為饒樂府以可度者為都督又以其别帥阿㑹等部為弱水等五州亦各以其辱紇主為刺史辛丑置東夷校尉官於營州髙宗顯慶五年夏四月戊辰以定襄都督阿史德樞賔左武候將軍延陀梯真居延州都督李合珠並為冷岍道行軍總管各將所部兵以討叛奚仍命尚書右丞崔餘慶充使總護三部兵奚尋遣使降更以樞賔等為沙磚道行軍總管以討契丹擒契丹松漠都督河卜固送東都則天皇后萬嵗通天元年夏五月壬子營州契丹松漠都督李盡忠歸誠州刺史孫萬榮舉兵反攻陷營州殺都督趙文翽盡忠萬榮之妹夫也皆居於營州城側文翽剛愎契丹饑不加賑給視酋長如奴僕故二人怒而反乙丑遣左鷹揚衛將軍曹仁師右金吾衛大將軍張玄遇左威衛大將軍李多祚司農少卿麻仁節等二十八將討之秋七月辛亥以春官尚書梁王武三思為榆關道安撫大使姚璹副之以備契丹改李盡忠為李盡滅孫萬榮為孫萬斬盡忠尋自稱無上可汗據營州以萬榮為前鋒略地所向皆下旬日兵至數萬進圍檀州清邉前軍副總軍張九節擊却之八月丁酉曹仁師張玄遇麻仁節與契丹戰于硤石谷唐兵大敗先是契丹破營州獲唐俘數百囚之地牢聞唐兵將至使守牢霫紿之曰吾輩家屬飢寒不能自存唯俟官軍至即降耳既而契丹引出其俘飼以糠粥慰勞之曰吾養汝則無食殺汝又不忍今縱汝去遂釋之俘至幽州具言其狀諸軍聞之爭欲先入至黃麞谷虜又遣老弱迎降故遺老牛瘦馬於道側仁師等三軍棄步卒將騎兵輕進契丹設伏橫擊之飛索以䌈玄遇仁節獲之將卒死者填山谷鮮有脫者契丹得軍印詐為牒令玄遇等署之牒總管燕匪石宗懷昌等云官軍已破賊若至營州軍將皆斬兵不叙勳匪石等得牒晝夜兼行不遑寢食以赴之士馬疲弊契丹伏兵於中道邀之全軍皆沒九月制天下繫囚及士庶家奴驍勇者官償其直發以擊契丹初令山東近邊諸州置武騎團兵以同州刺史建安王武攸冝為右武威衛大將軍充清邉道行軍大總管以討契丹右拾遺陳子昻為攸宜府參謀上疏曰恩制免天下罪人及募諸色奴充兵討擊契丹此乃捷急之計非天子之兵且比來刑獄久清罪人全少奴多怯弱不慣征行縱其募集未足可用况當今天下忠臣勇士萬分未用其一契丹小孽假命待誅何勞免罪賤奴損國大體臣恐此䇿不可威示天下凉州都督許欽明之兄欽寂為龍山軍討擊使與契丹戰于崇州軍敗被擒虜將圍安東令欽寂說其屬城未下者安東都護裴玄圭在城中欽寂謂曰狂賊天殃滅在朝夕公但勵兵謹守以全忠節虜殺之突厥默啜請為太子為國討契丹冊授默啜左衛將軍冬十月辛卯契丹李盡忠卒孫萬榮代領其衆突厥默啜乘間襲松漠虜盡忠萬榮妻子而去萬榮收合餘衆軍勢復振遣别帥駱務整河阿小為前鋒攻陷冀州殺刺史陸寶積屠吏民數千人又攻瀛州河北震動制起彭澤令狄仁傑為魏州刺史前刺史獨孤思莊畏契丹猝至悉驅百姓入城繕修守備仁傑至悉遣還農曰賊猶在逺何煩如是萬一賊來吾自當之百姓大恱時契丹入寇軍書填委夏官郎中硤石姚元崇剖析如流皆有條理太后竒之擢為夏官侍郎神功元年春三月戊申清邉道總管王孝傑蘇宏暉等將兵十七萬與孫萬榮戰于束硤石谷唐兵大敗孝傑死之孝傑遇契丹帥精兵為前鋒力戰契丹引退孝傑追之行背懸崖契丹回兵薄之宏暉先遁孝傑墜崖死將士死亡殆盡管記洛陽張說馳奏其事太后贈孝傑官爵遣使斬宏暉以徇使者未至宏暉以立功得免武攸宜軍漁陽聞孝傑等敗沒軍中震恐不敢進契丹乘勝寇幽州攻陷城邑剽掠吏民攸宜遣將擊之不克夏四月癸未以右金吾衛大將軍武懿宗為神兵道行軍大總管與右豹韜衛將軍何迦密將兵擊契丹五月癸卯又以婁師德為清邉道副大總管右武威衛將軍沙吒忠義為前軍總管將兵二十萬擊契丹六月武懿宗軍至趙州聞契丹將駱務整數千騎將至冀州懿宗懼欲南遁或曰虜無輜重以抄掠為資若按兵拒守勢必離散從而擊之可有大功懿宗不從退據相州委棄軍資器仗甚衆契丹遂屠趙州甲午孫萬榮為奴所殺萬榮之破王孝傑也於柳城西北四百里依險築城留其老弱婦女所獲器仗資財使妹夫乙寃羽守之引精兵寇幽州恐突厥默啜襲其後遣五人至黑沙語默啜曰我已破王孝傑百萬之衆唐人破膽請與可汗乘勝共取幽州三人先至默啜喜賜以緋袍二人後至默啜怒其稽緩將殺之二人曰請一言而死默啜問其故二人以契丹之情告默啜乃殺前三人而賜二人緋使為鄉導發兵取契丹新城殺所獲涼州都督許欽明以祭天圍新城三日克之盡俘以歸使乙冤羽馳報萬榮時萬榮方與唐兵相持軍中聞之忷懼奚人叛萬榮神兵道總管楊玄基擊其前奚兵擊其後獲其將何阿小萬榮軍大潰帥輕騎數千東走前軍總管張九節遣兵邀之於道萬榮窮蹙與其奴逃至潞水東息於林下嘆曰今欲歸唐罪已大歸突厥亦死歸新羅亦死將安之乎奴斬其首以降梟之四方館門其餘衆及奚霫皆降於突厥辛卯制以契丹初平命河內王武懿宗婁師德及魏州刺史狄仁傑分道安撫河北懿宗所至殘酷民有為契丹所脅從復來歸者懿宗皆以為反生刳取其膽先是何阿小嗜殺人河北人為之語曰唯此兩何殺人最多秋七月庚午武攸冝自幽州凱旋武懿宗奏河北百姓從賊者請盡族之左拾遺王求禮庭折之曰此屬素無武備力不勝賊茍從之以求生豈有叛國之心懿宗擁彊兵數十萬望風退走賊徒滋蔓又欲移罪於草野詿誤之人為臣不忠請先斬懿宗以謝河北懿宗不能對司刑卿杜景儉亦奏此皆脅從之人請悉原之太后從之久視元年初契丹將李楷固善用䌈索及騎射舞槊每陷陳如鶻入烏羣所向披靡黃麞之戰張玄遇麻仁節皆為所䌈又有駱務整者亦為契丹將屢敗唐兵及孫萬榮死二人來降有司責其後至奏請族之狄仁傑曰楷固等並驍勇絶倫能盡力於所事必能盡力於我若撫之以德皆為我用矣奏請赦之所親皆止之仁傑曰茍利於國豈為身謀太后用其言赦之又請與之官太后以楷固為左玉鈴衛將軍務整為右武威衛將軍使將兵擊契丹餘黨悉平之秋七月獻俘於含樞殿太后以楷固為左玉鈴衛大將軍燕國公賜姓武氏召公卿合宴舉觴屬仁傑曰公之力也將賞之對曰此乃陛下威靈將帥盡力臣何功之有固辭不受睿宗景雲元年冬十月丁酉以幽州鎮守經略節度大使薛訥為左武衛大將軍兼幽州都督節度使之名自訥始十二月壬辰奚霫犯塞掠漁陽雍奴出盧龍塞而去幽州都督薛訥追擊之弗克玄宗元天元年幽州大都督薛訥鎮幽州二十餘年吏民安之未嘗舉兵出塞虜亦不敢犯與燕州刺史李璡有隙璡毁之於劉幽求幽求薦左羽林將軍孫佺代之三月丁丑以佺為幽州大都督徙訥為并州長史夏六月庚申幽州大都督孫佺與奚酋李大酺戰于冷陘全軍覆沒是時佺帥左驍衛將軍李楷洛左威衛將軍周以悌發兵二萬騎八千分為三軍以襲奚契丹將軍烏可利諫曰道險而天熱懸軍逺襲往必敗佺曰薛訥在邊積年竟不能為國家復營州今乘其無備往必有功使楷洛將騎四千前驅遇奚騎八千楷洛戰不利佺怯懦不敢救引軍欲還虜乘之唐兵大敗佺阻山為方陳以自固大酺使謂佺曰朝廷既與我和親今大軍何為而來佺曰吾奉敕來招慰耳楷洛不稟節度輒與汝戰請斬以謝大酺曰若然國信安在佺悉斂軍中帛得萬餘段并紫袍金帶魚袋以贈之大酺曰請將軍南還勿相驚擾將士懼無復部伍虜追擊之士卒皆潰佺以悌為虜所擒獻於突厥默啜皆殺之楷洛可利脫歸冬十一月乙酉奚契丹二萬騎寇漁陽幽州都督宋璟閉城不出虜大掠而去開元二年初營州都督治栁城以鎮撫奚契丹則天之世都督趙文翽失政奚契丹攻陷之是後寄治於幽州東漁陽城或言靺鞨奚霫大欲降唐正以唐不建營州無所依投為默啜所侵擾故且附之若唐復建營州則相帥歸化矣并州長史和戎大武等軍州節度大使薛訥信之奏請擊契丹復置營州上亦以冷陘之役欲討契丹羣臣姚崇等多諌甲申以訥同紫微黃門三品將兵擊契丹羣臣乃不敢言秋七月薛訥與左監門衛將軍杜賔客定州刺史崔宣道等將兵六萬出檀州擊契丹賔客以為士卒盛夏負戈甲齎資糧深入寇境難以成功訥曰盛夏草肥羔犢孳息因糧於敵正得天時一舉滅虜不可失也行至灤水山峽中契丹伏兵遮其前後從山上擊之唐兵大敗死者什八九訥與數十騎突圍得免虜中嗤之謂之薛婆崔宣道將後軍聞訥敗亦走訥歸罪於宣道及胡將李思敬等八人制悉斬之於幽州庚子敕免訥死削除其官爵獨赦杜賔客之罪四年秋八月辛未契丹李失活奚李大酺帥所部來降制以失活為松漠郡王行左金吾大將軍兼松漠都督因其八部落酋長拜為刺史又以將軍薛泰督軍鎮撫之大酺為饒樂郡王行右金吾大將軍兼饒樂都督失活盡忠之從父弟也突厥默啜既死奚契丹拔曵固等諸部皆內附五年奚契丹既內附貝州刺史宋慶禮建議請復營州三月庚戌制復置營州都督於柳城兼平盧軍使管內州縣鎮戍皆如其舊以太子詹事姜師度為營田支度使與慶禮等築之三旬而畢慶禮清勤嚴肅開屯田八十餘所招安流散數年之間倉廪充實市邑浸繁冬十一月丙申契丹王李失活入朝十二月壬午以東平王外孫楊氏為永樂公主妻之六年夏五月契丹王李失活卒癸巳以其弟婆固代之七年冬十一月壬申契丹王李娑固與公主入朝八年契丹牙官可突干驍勇得衆心李娑固猜畏欲去之是嵗可突干舉兵擊娑固娑固敗奔營州營州都督許欽淡遣安東都護薛泰帥驍勇五百與奚王李大酺奉娑固以討之戰敗娑固李大酺皆為可突干所殺生擒薛泰營州震恐許欽淡移軍入渝關可突干立娑固從父弟鬱干為主遣使請罪上赦可突干之罪以鬱干為松漠都督以李大酺之弟魯蘇為饒樂都督十年夏閏五月壬申張說如朔方巡邊己丑以餘姚縣主女慕容氏為燕郡公主妻契丹王鬱干十二年契丹王李鬱干卒弟吐干襲位十三年先是契丹王李吐干與可突干復相猜忌攜公主來奔不敢復還更封遼陽王留宿衛可突干立李盡忠之弟邵固為主車駕東巡邵固詣行在因從至泰山拜左羽林大將軍靜折軍經略大使十四年春正月癸未更立契丹松漠王李邵固為廣化王奚饒樂王李魯蘇為奉誠王以上從甥陳氏為東華公主妻邵固以成安公主之女韋氏為東光公主妻魯蘇十八年初契丹王李邵固遣可突干入貢同平章事李元紘不禮焉左丞相張說謂人曰奚契丹必叛可突干狡而很専其國政久矣人心附之今失其心必不來矣己酉可突干弒邵固帥其國人并脅奚衆叛降突厥奚王李魯蘇及其妻韋氏邵固妻陳氏皆來奔制幽州長史趙含章討之又命中書舍人裴寬給事中薛侃等於關內河東河南北分道募勇士六月丙子以單于大都護忠王浚領河北道行軍元帥以御史大夫李朝隱京兆尹裴胄先副之帥十八總管以討奚契丹命浚與百官相見於光順門張說退謂學士孫逖韋述曰吾嘗觀太宗畫像雅類忠王此社稷之福也可突干寇平盧先鋒使張掖烏承玼破之於捺祿山二十年春正月乙卯以朔方節度副大使信安王禕為河東河北行軍副大總管將兵擊奚契丹壬申以戶部侍郎裴耀卿為副總管三月信安王禕帥裴耀卿及幽州節度使趙含章分道擊奚契丹含章與虜遇虜望風遁去平盧先鋒將烏承玼言於含章曰二虜劇賊也前日遁去非畏我乃誘我也宜按兵以觀其變含章不從與虜戰於白山果大敗承玼别引兵出其右擊虜破之己巳禕等大破奚契丹俘斬甚衆可突干帥麾下逺遁餘黨潜竄山谷奚酋李詩瑣髙帥五千餘帳來降禕引兵還賜李詩爵歸義王充歸義州都督徙其部落置幽州境內二十一年春閏三月癸酉幽州道副總管郭英傑與契丹戰于都山敗死時節度使薛楚玉遣英傑將精騎一萬及降奚擊契丹屯於榆關之外可突干引突厥之衆來合戰奚持兩端散走保險唐兵不利英傑戰死餘衆六千餘人猶力戰不已虜以英傑首示之竟不降盡為虜所殺楚玉訥之弟也二十二年夏六月壬辰幽州節度使張守圭大破契丹遣使獻捷冬十二月乙巳幽州節度使張守圭斬契丹王屈烈及可突干傳首時可突干連年為邊患趙含章薛楚玉皆不能討守圭到官屢擊破之可突干困迫遣使詐降守圭使管記王悔就撫之悔至其牙帳察契丹上下初無降意但稍徙營帳近西北密遣人引突厥謀殺悔以叛悔知之牙官李過折與可突干分典兵馬爭權不叶悔說過折使圖之過折夜勒兵斬屈烈及可突干盡誅其黨帥餘衆來降守圭出師紫蒙川大閲以鎮撫之梟屈烈可突干首于天津之南二十三年春正月契丹知兵馬中郎李過折來獻捷制以過折為北平王檢校松漠州都督是嵗契丹王過折為其臣涅禮所殺并其諸子一子刺乾奔安東得免涅禮上言過折用刑殘虐衆情不安故殺之上赦其罪因以涅禮為松漠都督且賜書責之曰卿之蕃法多無義於君長自昔如此朕亦知之然過折是卿之王有惡輒殺之為此王者不亦難乎但恐卿今為王後人亦爾常不自保誰願作王亦應防慮後事豈得取快目前突厥尋引兵東侵奚契丹涅禮與奚王李歸國共擊破之二十四年張守圭使平盧討擊使左驍衛將軍安祿山討奚契丹叛者祿山恃勇輕進為虜所敗二十五年春二月乙酉幽州節度使張守圭破契丹於捺祿山二十八年秋八月甲戌幽州奏破奚契丹天寶四載安祿山欲以邊功市寵數侵掠奚契丹奚契丹各殺公主以叛祿山討破之五載夏四月癸未立奚酋娑固為昭信王契丹酋楷洛為恭仁王九載冬十月安祿山屢誘奚契丹為設㑹飲以莨菪酒醉而坑之動數千人函其酋長之首以獻前後數四十載安祿山將三道兵六萬以討契丹以奚騎二千為鄉導過平盧千餘里至土護真水遇雨祿山引兵晝夜兼行三百餘里至契丹牙帳契丹大駭時久雨弓弩筋膠皆弛大將何思德言於祿山曰吾兵雖多逺來疲弊實不可用不如按甲息兵以臨之不過三日虜必降祿山怒欲斬之思德請前驅效死思德貌類祿山虜爭擊殺之以為己得祿山勇氣增倍奚復叛與契丹合夾擊唐兵殺傷殆盡射祿山中鞍折冠簮失屨獨與麾下二千騎走㑹夜追騎解得入師州歸罪於左賢王哥解河東兵馬使魚承仙而斬之平盧兵馬使史思明懼逃入山谷近二旬收散卒得七百人平盧守將史定方將精兵二千救祿山契丹引去祿山乃得免至平盧麾下皆亡不知所出史思明出見祿山祿山喜起執其手曰吾得汝復何憂思明退謂人曰嚮使早出已與哥解並斬矣契丹圍師州祿山使思明擊却之十一載春三月安祿山發蕃漢步騎二十萬擊契丹欲以雪去秋之耻初突厥阿布思來降上厚禮之賜姓名李獻忠纍遷朔方節度副使賜爵奉信王獻忠有才略不為安祿山下祿山恨之至是奏請獻忠帥同羅數萬騎與俱擊契丹獻忠恐為祿山所害白留後張暐請奏留不行暐不許獻忠乃帥所部大掠倉庫叛歸漠北祿山遂頓兵不進十三載夏四月癸巳安祿山奏擊奚破之虜其王李日越十四載夏四月安祿山奏破奚契丹
