  text: 通鑑紀事本末卷第四
  hash: sha256:667710c032914b24ecbf7def56ccfcc67d1d20545ec7941f9bdd5e16e6831a54
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0001_SBCK_004-1a}
body:
  text: 霍光廢立漢武帝後元元年鉤弋夫人之子弗陵年數嵗形體壯大多知上奇愛之心欲立焉以其年稚母少猶與久之欲以大臣輔之察羣臣唯奉車都尉光祿大夫霍光忠厚可任大事上乃使黃門畫周公負成王朝諸侯以賜光後數日帝譴責鉤弋夫人夫人脫簪珥叩頭帝曰引持去送掖庭獄夫人還顧帝曰趣行汝不得活卒賜死頃之帝間居問左右曰外人言云何左右對曰人言且立其子何去其母乎帝曰然是非兒曹愚人之所知也往古國家所以亂由主少母壯也女主獨居驕蹇淫亂自恣莫能禁也汝不聞吕后邪故不得不先去之也二年春二月上病篤霍光涕泣問曰如有不諱誰當嗣者上曰君未諭前畫意邪立少子君行周公之事光頓首讓曰臣不如金日磾日磾亦曰臣外國人不如光且使胸奴輕漢矣乙丑詔立弗陵為皇太子時年八嵗丙寅以光為大司馬大將軍日磾為車騎將軍太僕上官桀為左將軍受遺詔輔少主又以搜粟都尉桑弘羊為御史大夫皆拜臥內牀下丁卯帝崩于五柞宫戊辰太子即皇帝位帝姊鄂邑公主共飬省中霍光金日磾上官桀共領尚書事光輔幼主政自已出天下想聞其風采殿中嘗有怪一夜羣臣相驚光召尚符璽郎欲收取璽郎不肯授光欲奪之郎按劔曰臣頭可得璽不可得也光甚誼之明日詔增此郎秩二等衆庶莫不多光昭帝始元二年春正月封大將軍光為博陸侯或説霍光曰將軍不見諸吕之事乎處伊尹周公之位攝政擅權而背宗室不與共職是以天下不信卒至於滅亡今將軍當盛位帝春秋富宜納宗室又多與大臣共事反諸吕道如是則可以免患光然之元鳳元年冬十月大將軍光以朝無舊臣光祿勳張安世自先帝時為尚書令志行純篤乃白用安世為右將軍兼光祿勳以自副焉安世故御史大夫湯之子也光又以杜延年有忠節擢為太僕右曹給事中三年春正月泰山有大石自起立上林有栁樹枯僵自起生有蟲食其葉成文曰公孫病已立符節令魯國睦弘上書言大石自立僵栁復起當有匹庶為天子者枯樹復生故廢之家公孫氏當復興乎漢家承堯之後有傳國之運當求賢人禪帝位退自封百里以順天命弘坐設妖言惑衆伏誅元平元年夏四月癸未帝崩于未央宫無嗣時武帝子獨有廣陵王胥大將軍光與羣臣議所立咸持廣陵王王本以行失道先帝所不用光內不自安郎有上書言周太王廢太伯立王季文王舍伯邑考立武王唯在所宜雖廢長立少可也廣陵王不可以承宗廟言合光意光以其書示丞相敞等擢郎為九江太守即日承皇后詔遣行大鴻臚事少府樂成宗正德光祿大夫吉中郎將利漢迎昌邑王賀乘七乘傳詣長安邸光又白皇后徙右將軍安世為車騎將軍賀昌邑哀王之子也在國素狂縱動作無節武帝之喪賀遊獵不止嘗遊方與不半日馳二百里中尉琅邪王吉上疏諌曰大王不好書術而樂逸遊馮式撙銜馳騁不止口倦呼叱吒手苦於箠轡身勞呼車輿朝則冒霧露晝則被塵埃夏則為大暑之所暴炙冬則為風寒之所匽薄數以耎脆之玊體犯勤勞之煩毒非所以全壽命之宗也又非所以進仁義之隆也夫廣厦之下細旃之上明師居前勸誦在後上論唐虞之際下及殷周之盛考仁聖之風習治國之道欣欣焉發憤忘食日新厥德其樂豈銜橛之間哉休則俯仰屈伸以利形進退步趨以實下吸新吐故以練臧專意積精以適神於以飬生豈不長哉大王誠留意如此則心有堯舜之志體有喬松之壽美聲廣譽登而上聞則福祿其臻而社稷安矣皇帝仁聖至今思慕未怠於宫館囿池弋獵之樂未有所幸大王宜夙夜念此以承聖意諸侯骨肉莫親大王大王於屬則子也於位則臣也一身而二任之責加焉恩愛行義􅏽介有不具者於以上聞非饗國之福也王乃下令曰寡人造行不能無惰中尉甚忠數輔吾過使謁者千秋賜中尉牛肉五百斤酒五石脯五束其後復放縱自若郎中令山陽龔遂忠厚剛毅有大節內諌爭於王外責傅相引經義陳禍福至於涕泣蹇蹇亡已靣刺王過王至掩耳起走曰郎中令善愧人王嘗久與騶奴宰人遊戲飲食賞賜無度遂入見王涕泣膝行左右侍御皆出涕王曰郎中令何為哭遂曰臣痛社稷危也願賜清問竭愚王辟左右遂曰大王知膠西王所以為無道亡乎王曰不知也曰臣聞膠西王有諛臣侯得王所為擬於桀紂也得以為堯舜也王説其諂諛常與寢處唯得所言以至於是今大王親近羣小漸漬邪惡所習存亡之機不可不慎也臣請選郎通經有行義者與王起居坐則誦詩書立則習禮容宜有益王許之遂乃選郎中張安等十人侍王居數日王皆逐去安等王嘗見大白犬頸以下似人冠方山冠而無尾以問龔遂遂曰此天戒言在側者盡冠狗也去之則存不去則亡矣後又聞人聲曰熊視而見大熊左右莫見以問遂遂曰熊山野之獸而來入宫室王獨見之此天戒大王恐宫室將空危亡象也王仰天嘆曰不祥何為數來遂叩頭曰臣不敢隱忠數言危亡之戒大王不説夫國之存亡豈在臣言哉願王內自揆度大王誦詩三百五篇人事浹王道備王之所行中詩一篇何等也大王位為諸侯王行汙於庶人以存難以亡易宜深察之後又血汙王坐席王問遂遂呌然號曰宫空不久妖祥數至血者隂憂象也宜畏慎自省王終不改節及徵書至夜漏未盡一刻以火發書其日中王發脯時至定陶行百三十五里侍從者馬死相望於道王吉奏書戒王曰臣聞髙宗諒暗三年不言今大王以喪事徵宜日夜哭泣悲哀而已慎毋有所發大將軍仁愛勇智忠信之德天下莫不聞事孝武皇帝二十餘年未嘗有過先帝棄羣臣屬以天下寄幼孤焉大將軍抱持幼君襁褓之中布政施教海內晏然雖周公伊尹無以加也今帝崩無嗣大將軍惟思可以奉宗廟者攀援而立大王其仁厚豈有量哉臣願大王事之敬之政事一聽之大王垂拱南面而已願留意常以為念王至濟陽求長鳴雞道買積竹杖過弘農使大奴善以衣車載女子至湖使者以讓相安樂安樂告龔遂遂入問王王曰無有遂曰即無有何愛一善以毁行義請收屬吏以湔灑大王即捽善屬衛士長行法王到霸上大鴻臚郊迎騶奉乘輿車王使夀成御郎中令遂參乘且至廣明東都門遂曰禮奔喪望見國都哭此長安東郭門也王曰我嗌痛不能哭至城門遂復言王曰城門與郭門等耳且至未央宮東闕遂曰昌邑帳在是闕外馳道北未至帳所有南北行道馬足未至數步大王宜下車鄉闕西面伏哭盡哀止王曰諾到哭如儀六月丙寅王受皇帝璽綬襲尊號尊皇后曰皇太后壬申葬孝昭皇帝于平陵昌邑王既立淫戲無度昌邑官屬皆徵至長安往往超擢拜官相安樂遷長樂衛尉龔遂見安樂流涕謂曰王立為天子日益驕溢諫之不復聽今哀痛未盡日與近臣飲食作樂鬬虎豹召皮軒車九旒驅馳東西所為悖道古制寬大臣有隱退今去不得陽狂恐知身死為世戮奈何君陛下故相宜極諫爭王夢青蠅之矢積西階東可五六石以屋版瓦覆之以問遂遂曰陛下之詩不云乎營營青蠅止于樊愷悌君子毋信讒言陛下左側讒人衆多如是青蠅惡矣宜進先帝大臣子孫親近以為左右如不忍昌邑故人信用讒諛必有凶咎願詭禍為福皆放逐之臣當先逐矣王不聽太僕丞河東張敞上書諫曰孝昭皇帝蚤崩無嗣大臣憂懼選賢聖承宗廟東迎之日唯恐屬車之行遲今天子以盛年初即位天下莫不拭目傾耳觀化聼風國輔大臣未褒而昌邑小輦先遷此過之大者也王不聼大將軍光憂悶獨以問所親故吏大司農田延年延年曰將軍為國柱石審此人不可何不建白太后更選賢而立之光曰今欲如是於古嘗有此不延年曰伊尹相殷廢太甲以安宗廟後世稱其忠將軍若能行此亦漢之伊尹也光乃引延年給事中隂與車騎將軍張安世圖計王出逰光祿大夫魯國夏侯勝當乘輿前諫曰天久隂而不雨臣下有謀上者陛下出欲何之王怒謂勝為祅言縳以屬吏吏白霍光光不舉法光讓安世以為泄語安世實不言乃召問勝勝對言在鴻範傳曰皇之不極厥罰常隂時則下人有伐上者惡察察言故云臣下有謀光安世大驚以此益重經術士侍中傅嘉數進諫王亦縳嘉繫獄光安世既定議乃使田延年報丞相楊敞敞驚懼不知所言汗出洽背徒唯唯而已延年起至更衣敞夫人遽從東廂謂敞曰此國大事今大將軍議已定使九卿來報君侯君侯不疾應與大將軍同心猶與無決先事誅矣延年從更衣還敞夫人與延年參語許諾請奉大將軍教令癸巳光召丞相御史將軍列侯中二千石大夫博士會議未央宫光曰昌邑王行昏亂恐危社稷如何羣臣皆驚鄂失色莫敢發言但唯唯而已田延年前離席按劔曰先帝屬將軍以幼孤寄將軍以天下以將軍忠賢能安劉氏也今羣下鼎沸社稷將傾且漢之傳諡常為孝者以長有天下令宗廟血食也如漢家絶祀將軍雖死何面目見先帝於地下乎今日之議不得旋踵群臣後應者臣請劒斬之光謝曰九卿責光是也天下胸胸不安光當受難於是議者皆叩頭曰萬姓之命在於將軍唯大將軍令光即與羣臣俱見白太后具陳昌邑王不可以承宗廟狀皇太后乃車駕幸未央承明殿詔諸禁門毋內昌邑羣臣王入朝太后還乘輦欲歸溫室中黃門宦者各持門扇王入門閉昌邑羣臣不得入王曰何為大將軍跪曰有皇太后詔毋內昌邑羣臣王曰徐之何乃驚人如是光使盡驅出昌邑羣臣置金馬門外車騎將軍安世將羽林騎收縳二百餘人皆送廷尉詔獄令故昭帝侍中中臣侍守王光勑左右謹宿衛卒有物故自裁令我負天下有殺主名王尚未自知當廢謂左右我故羣臣從官安得罪而大將軍盡繫之乎頃之有太后詔召王王聞召意恐乃曰我安得罪而召我哉太后被珠襦盛服坐武帳中侍御數百人皆持兵期門武士陛戟陳列殿下羣臣以次上殿召昌邑王伏前聼詔光與羣臣連名奏王尚書令讀奏曰丞相臣敞等昧死言皇太后陛下孝昭皇帝早棄天下遣使徵昌邑王典喪服斬衰無悲哀之心廢禮誼居道上不素食使從官略女子載衣車內所居傳舍始至謁見立為皇太子常私買雞豚以食受皇帝信璽行璽大行前就次發璽不封從官更持節引內昌邑從官騶宰官奴二百餘人常與居禁闥內敖戲為書曰皇帝問侍中君卿使中御府令髙昌奉黃金千斤賜君卿取十妻大行在前殿發樂府樂器引內昌邑樂人擊鼓歌吹作俳倡召內泰一宗廟樂人悉奏衆樂駕法駕驅馳北宮桂宮㺯彘鬬虎召皇太后御小馬車使官奴騎乘遊戲掖庭中與孝昭皇帝宮人蒙等淫亂詔掖庭令敢泄言要斬太后曰止為人臣子當悖亂如是邪王離席伏尚書令復讀曰取諸侯王列侯二千石綬及墨綬黃綬以并佩昌邑郎官者免奴發御府金錢刀劒玉器采繒賞賜所與逰戲者與從官官奴夜飲湛沔於酒獨夜設九賔溫室延見姊夫昌邑關內侯祖宗廟祠未舉為璽書使使者持節以三太牢祠昌邑哀王園廟稱嗣子皇帝受璽以來二十七日使者旁午持節詔諸官署徵發凡一千一百二十七事荒淫迷惑失帝王禮誼亂漢制度臣敞等數進諫不變更日以益甚恐危社稷天下不安臣敞等謹與博士議皆曰今陛下嗣孝昭皇帝後行淫辟不軌五辟之屬莫大不孝周襄王不能事母春秋曰天王出居于鄭由不孝出之絶之於天下也宗廟重於君陛下不可以承天序奉祖宗廟子萬姓當廢臣請有司以一太牢具告祠髙廟皇太后詔曰可光令王起拜受詔王曰聞天子有爭臣七人雖亡道不失天下光曰皇太后詔廢安得稱天子乃即持其手解脫其璽組奉上太后扶王下殿出金馬門羣臣隨送王西面拜曰愚戇不任漢事起就乘輿副車大將軍光送至昌邑邸光謝曰王行自絶於天臣寧負王不敢負社稷願王自愛臣長不復左右光涕泣而去羣臣奏言古者廢放之人屏於逺方不及以政請徙王賀漢中房陵縣太后詔歸賀昌邑賜湯沐邑二千户故王家財物皆與賀及哀王女四人各賜湯沐邑千户國除為山陽郡昌邑群臣坐在國時不舉奏王罪過令漢朝不聞知又不能輔道陷王大惡皆下獄誅殺二百餘人唯中尉吉郎中令遂以忠直數諫正得減死髠為城旦師王式繫獄當死治事使者責問曰師何以無諫書式對曰臣以詩三百五篇朝夕授王至於忠臣孝子之篇未嘗不為王反復誦之也至於危亡失道之君未嘗不流涕為王深陳之也臣以三百五篇諫是以無諫書使者以聞亦得減死論霍光以羣臣奏事東宮太后省政宜知經術白令夏侯勝用尚書授太后遷勝長信少府賜爵關內侯初衛太子納魯國史良娣生子進號史皇孫皇孫納涿郡王夫人生子病已號皇曽孫皇曽孫生數月遭巫蠱事太子三男一女及諸妻妾皆遇害獨皇曽孫在亦坐收繫郡邸獄故廷尉監魯國丙吉受詔治巫蠱獄吉心知太子無事實重哀皇曽孫無辜擇謹厚女徒渭城胡組淮陽郭徵卿令乳飬曾孫置間燥處吉日再省視巫蠱事連嵗不決武帝疾往來長楊五柞宮望氣者言長安獄中有天子氣於是武帝遣使者分條中都官詔獄繫者無輕重一切皆殺之內謁者令郭穰夜到郡邸獄吉閉門拒使者不納曰皇曾孫在他人無辜死者猶不可况親曾孫乎相守至天明不得入穰還以聞因劾奏吉武帝亦寤曰天使之也因赦天下郡邸獄繫者獨賴吉得生既而吉謂守丞誰如皇孫不當在官使誰如移書京兆尹遣與胡組俱送京兆尹不受復還及組日滿當去皇孫思慕吉以私錢雇組令留與郭徵卿並飬數月乃遣組去後少內嗇夫白吉曰食皇孫無詔令時吉得食米肉月月以給皇曾孫曾孫病幾不全者數焉吉數敕保養乳母加致醫藥視遇甚有恩惠吉聞史良娣有母貞君及兄恭乃載皇曾孫以付之貞君年老見孫孤甚哀之自飬視焉後有詔掖庭養視上屬籍宗正時掖庭令張賀嘗事戾太子思顧舊恩哀曾孫奉養甚謹以私錢供給教書既壯賀欲以女孫妻之是時昭帝始冠長八尺二寸賀弟安世為右將軍輔政聞賀稱譽皇曽孫欲妻以女怒曰曽孫乃衛太子後也幸得以庶人衣食縣官足矣勿復言豫女事於是賀止時暴室嗇夫許廣漢有女賀乃置酒請廣漢酒酣為言曽孫體近下乃關內侯可妻也廣漢許諾明日嫗聞之怒廣漢重令人為介遂與曾孫賀以家財聘之曾孫因依倚廣漢兄弟及祖母家史氏受詩於東海澓中翁髙材好學然亦喜遊俠鬬雞走馬以是具知閭里姦邪吏治得失數上下諸陵周遍三輔嘗困於蓮勺鹵中尤樂杜鄠之間率常在下杜時會朝請舍長安尚冠里及昌邑王廢霍光與張安世諸大臣議所立未定丙吉奏記光曰將軍事孝武皇帝受襁褓之屬任天下之寄孝昭皇帝早崩亡嗣海內憂懼欲亟聞嗣主發喪之日以大誼立後所立非其人復以大誼廢之天下莫不服焉方今社稷宗廟羣生之命在將軍之一舉竊伏聼於衆庶察其所言諸侯宗室在列位者未有所聞於民間也而遺詔所養武帝曾孫名病已在掖庭外家者吉前使居郡邸時見其幼少至今十八九矣通經術有美材行安而節和願將軍詳大義參以蓍龜豈宜褒顯先使入侍令天下昭然知之然後決定大䇿天下幸甚杜延年亦知曾孫德美勸光安世立焉秋七月光坐庭中會丞相以下議定所立遂復與丞相敞等上奏曰孝武皇帝曾孫病已年十八師受詩論語孝經躬行節儉慈仁愛人可以嗣孝昭皇帝後奉承祖宗廟子萬姓臣昧死以聞皇太后詔曰可光遣宗正德至曾孫家尚冠里洗沐賜御衣太僕以軨獵車迎曾孫就齋宗正府庚申入未央宮見皇太后封為陽武侯已而羣臣奏上璽綬即皇帝位謁髙廟尊皇太后為太皇太后侍御史嚴延年劾奏大將軍光擅廢立主無人臣禮不道奏雖寢然朝廷肅然敬憚之初許廣漢女適皇曾孫一嵗生子奭數月曾孫立為帝許氏為偼妤是時霍將軍有小女與皇太后親公卿議更立皇后皆心擬霍將軍女亦未有言上乃詔求微時故劒大臣知指白立許偼妤為皇后十一月壬子立皇后許氏霍光以后父廣漢刑人不宜君國嵗餘乃封為昌成君宣帝本始元年春詔有司論定䇿安宗廟功大將軍光益封萬七千户與故所食凡二萬戶車騎將軍富平侯安世以下益封者十人封侯者五人賜爵關內侯八人大將軍光稽首歸政上謙遜不受諸事皆先關白光然後奏御自昭帝時光子禹及兄孫雲皆為中郎將雲弟山奉車都尉侍中領胡越兵光兩女壻為東西宮衛尉昆弟諸壻外孫皆奉朝請為諸曹大夫騎都尉給事中黨親連體根據於朝廷及昌邑王廢光權益重每朝見上虛已斂容禮下之已甚三年春正月癸亥恭哀許皇后崩時霍光夫人顯欲貴其小女成君道無從會許后當娠病女醫淳于衍者霍氏所愛嘗入宮侍皇后疾衍夫賞為掖庭戶衛謂衍可過辭霍夫人行為我求安池監衍如言報顯顯因生心辟左右字謂衍曰少夫幸報我以事我亦欲報少夫可乎衍曰夫人所言何等不可者顯曰將軍素愛小女成君欲奇貴之願以纍少夫衍曰何謂邪顯曰婦人免乳大故十死一生今皇后當免身可因投毒藥去也成君即為皇后矣如蒙力事成富貴與少夫共之衍曰藥雜治當先嘗安可顯曰在少夫為之耳將軍領天下誰敢言者緩急相護但恐少夫無意耳衍良久曰願盡力即搗附子齎入長定宮皇后免身後衍取附子并合太醫大丸以飲皇后有傾曰我頭岑岑也藥中得無有毒對曰無有遂加煩悶崩衍出過見顯相勞問亦未敢重謝衍後人有上書告諸醫侍疾無狀者皆收繫詔獄劾不道顯恐急即以狀具語光因曰既失計為之無令吏急衍光大驚欲自發舉不忍猶與會奏上光署衍勿論顯因勸光內其女入宮四年春三月乙卯立霍光女為皇后輿駕侍從益盛賞賜官屬以千萬計與許后時縣絶矣地節二年春霍光病篤車駕自臨問上為之涕泣光上書謝恩願分國邑三千戶以封兄孫奉車都尉山為列侯奉兄去病祀即日拜光子禹為右將軍三月庚午光薨上及皇太后親臨光喪中二千石治冡賜梓宫葬具皆如乘輿制度諡曰宣成侯發三河卒穿復土置園邑三百家長丞奉守下詔復其後世疇其爵邑世世無有所與御史大夫魏相上封事曰國家新失大將軍宜顯明功臣以填藩國毋空大位以塞爭權宜以車騎將軍安世為大將軍毋令領光祿勳事以其子延夀為光祿勳上亦欲用之夏四月戊申以安世為大司馬車騎將軍領尚書事上思報大將軍德乃封光兄孫山為樂平侯使以奉車都尉領尚書事魏相因昌成君許廣漢奏封事言春秋譏世卿惡宋三世為大夫及魯季孫之專權皆危亂國家自後元以來祿去王室政由冡宰今光死子復為右將軍兄子秉樞機昆弟諸壻據權藝在兵官光夫人顯及諸女皆通籍長信宮或夜詔門出入驕奢放縱恐寖不制宜有以損奪其權破散隂謀以固萬世之基全功臣之世又故事諸上書者皆為二封署其一曰副領尚書者先發副封所言不善屏去不奏相復因許伯白去副封以防壅蔽帝善之詔相給事中皆從其議三年夏四月戊申立子奭為皇太子以丙吉為太傅太中大夫疏廣為少傅封太子外祖父許廣漢為平恩侯又封霍光兄孫中郎將雲為冠陽侯霍顯聞立太子怒恚不食歐血曰此乃民間時子安得立即后有子反為王邪復教皇后令毒太子皇后數召太子賜食保阿輒先嘗之后挾毒不得行霍氏驕侈縱橫太夫人顯廣治第室作乘輿輦加畫繡絪馮黃金塗韋絮薦輪侍婢以五采絲挽顯遊戲第中與監奴馮子都亂而禹山亦並繕治第宅走馬馳逐平樂館雲當朝請數稱病私出多從賔客張圍獵黃山苑中使倉頭奴上朝謁莫敢譴者顯及諸女晝夜出入長信宮殿中亡期度帝自在民間聞知霍氏尊盛日久內不能善既躬親朝政御史大夫魏相給事中顯謂禹雲山女曹不務奉大將軍餘業今大夫給事中他人一間女能復自救邪後兩家奴爭道霍氏奴入御史府欲躢大夫門御史為叩頭謝乃去人以謂霍氏顯等始知憂會魏大夫為丞相數燕見言事平恩侯與侍中金安上等徑出入省中時霍山領尚書上令吏民得奏封事不關尚書羣臣進見獨往來於是霍氏甚惡之上頗聞霍氏毒殺許后而未察乃徙光女壻度遼將軍未央衛尉平陵侯范明友為光祿勳出次壻諸吏中郎將羽林監任勝為安定太守數月復出光姊壻給事中光祿大夫張朔為蜀郡太守羣孫壻中郎將王漢為武威太守頃之復徙光長女壻長樂衛尉鄧廣漢為少府戊戌更以張安世為衛將軍兩宮衛尉城門北軍兵屬焉以霍禹為大司馬冠小冠亡印綬罷其屯兵官屬特使禹官名與光俱大司馬者又收范明友度遼將軍印綬但為光祿勳及光中女壻趙平為散騎都尉光祿大夫將屯兵又收平騎都尉印綬諸領胡越騎羽林及兩宮衛將屯兵悉易以所親信許史子弟代之四年霍顯及禹山雲自見日侵削數相對啼泣自怨山曰今丞相用事縣官信之盡變易大將軍時法令發揚大將軍過失又諸儒生多窶人子逺客飢寒喜妄説狂言不避忌諱大將軍常讎之今陛下好與諸儒生語人人自書對事多言我家者嘗有上書言我家昆弟驕恣其言絶痛山屏不奏後上書者益黠盡奏封事輒下中書令出取之不關尚書益不信人又聞民間歡言霍氏毒殺許皇后寧有是邪顯恐急即具以實告禹山雲禹山雲驚曰如是何不早告禹等縣官離散斥逐諸壻用是故也此大事誅罰不小奈何於是始有邪謀矣雲舅李竟所善張赦見雲家卒卒謂竟曰今丞相與平恩侯用事可令太夫人言太后先誅此兩人移徙陛下在太后耳長安男子張章告之事下廷尉執金吾捕張赦等後有詔止勿捕山等愈恐相謂曰此縣官重太后故不竟也然惡端已見久之猶發發即族矣不如先也遂令諸女各歸報其夫皆曰安所相避會李竟坐與諸侯王交通辭語及霍氏有詔雲山不宜宿衛免就第山陽太守張敞上封事曰臣聞公子季友有功於魯趙衰有功於晉田完有功於齊皆疇其庸延及子孫終後田氏篡齊趙氏分晉季氏顓魯故仲尼作春秋迹盛衰譏世卿最甚乃者大將軍決大計安宗廟定天下功亦不細矣夫周公七年耳而大將軍二十嵗海內之命斷於掌握方其隆盛時感動天地侵迫隂陽朝臣宜有明言曰陛下褒寵故大將軍以報功德足矣間者輔臣顓政貴戚大盛君臣之分不明請罷霍氏三侯皆就第及衛將軍張安世宜賜几杖歸休時存問召見以列侯為天子師明詔以恩不聼羣臣以義固爭而後許之天下必以陛下為不忘功德而朝臣為知禮霍氏世世無所患苦今朝廷不聞直聲而令明詔自親其文非䇿之得者也今兩侯巳出人情不相逺以臣心度之大司馬及其枝屬必有畏懼之心夫近臣自危非完計也臣敞願於廣朝白發其端直守逺郡其路無由唯陛下省察上甚善其計然不召也禹山等家數有妖怪舉家憂愁山曰丞相擅減宗廟羔莬蛙可以此罪也謀令太后為博平君置酒召丞相平恩侯以下使范明友鄧廣漢承太后制引斬之因廢天子而立禹約定未發雲拜為玄菟太守太中大夫任宣為代郡太守會事發覺秋七月雲山明友自殺顯禹廣漢等捕得禹要斬顯及諸女昆弟皆棄市與霍氏相連坐誅滅者數十家太僕杜延年以霍氏舊人亦坐免官八月己酉皇后霍氏廢處昭臺宮乙丑詔封告霍氏反謀者男子張章期門董忠左曹楊惲侍中金安上史髙皆為列侯惲丞相敞子安上車騎將軍日磾弟子髙史良娣兄子也初霍氏奢侈茂陵徐生曰霍氏必亡夫奢則不遜不遜必侮上侮上者逆道也在人之右衆必害之霍氏秉權日久害之者多矣天下害之而又行以逆道不亡何待乃上疏言霍氏泰盛陛下即愛厚之宜以時抑制無使至亡書三上輒報聞其後霍氏誅滅而告霍氏者皆封人為徐生上書曰臣聞客有過主人者見其竈直突傍有積薪客謂主人更為曲突逺徙其薪不者且有火患主人默然不應俄而家果失火鄰里共救之幸而得息於是殺牛置酒謝其鄰人灼爛者在於上行餘各以功次坐而不録言曲突者人謂主人曰鄉使聼客之言不費牛酒終亡火患今論功而請賔曲突徙薪無恩澤燋頭爛額為上客邪主人乃寤而請之今茂陵徐福數上書言霍氏且有變宜防絶之鄉使福説得行則國無裂土出爵之費臣無逆亂誅滅之敗往事既已而福獨不蒙其功唯陛下察之貴徙薪曲突之䇿使居焦髮灼爛之右上乃賜福帛十匹後以為郎帝初立謁見髙廟大將軍光驂乘上內嚴憚之若有芒刺在背後車騎將軍張安世代光驂乘天子從容肆體甚安近焉及光身死而宗族竟誅故俗傳霍氏之禍萌於驂乘後十二嵗霍后復徙雲林館乃自殺班固贊曰霍光受襁褓之託任漢室之寄匡國家安社稷擁昭立宣雖周公阿衡何以加此然光不學亡術暗於大理隂妻邪謀立女為后湛溺盈溢之欲以增顛覆之禍死財三年宗族誅夷哀哉臣光曰霍光之輔漢室可謂忠矣然卒不能庇其宗何也夫威福者人君之器也人臣執之久而不歸鮮不及矣以孝昭之明十四而知上官桀之詐固可以親政矣况孝宣十九即位聰明剛毅知民疾苦而光久專大柄不知避去多置親黨充塞朝廷使人主蓄憤於上吏民積怨於下切齒側目待時而發其得免於身幸矣况子孫以驕侈趣之哉雖然嚮使孝宣專以祿秩賞賜富其子孫使之食大縣奉朝請亦足以報盛德矣乃復任之以政授之以兵及事叢釁積更加裁奪遂至怨懼以生邪謀豈徒霍氏之自禍哉亦孝宣醖釀以成之也昔鬬椒作亂於楚莊王滅其族而赦針尹克黃以為子文無後何以勸善夫以顯禹雲山之罪雖應夷滅而光之忠勳不可不祀遂使家無噍類孝宣亦少恩哉趙充國破羌漢宣帝元康四年初武帝開河西四郡隔絶羌與胸奴相通之路斥逐諸羌不使居湟中地及帝即位光祿大夫義渠安國使行諸羌先零豪言願時度湟水北逐民所不田處畜牧安國以聞後將軍趙充國劾安國奉使不敬是後羌人旁緣前言抵冒度湟水郡縣不能禁既而先零與諸羌種豪二百餘人解仇交質盟詛上聞之以問趙充國對曰羌人所以易制者以其種自有豪數相攻擊藝不一也往三十餘歲西羌反時亦先解仇合約攻令居與漢相距五六年乃定胸奴數誘羌人欲與之共擊張掖酒泉地使羌居之間者胸奴困於西方疑其更遣使至羌中與相結臣恐羌變未止此且復結聮他種宜及未然為之備後月餘羌侯狼何果遣使至胸奴藉兵欲擊鄯善燉煌以絶漢道充國以為狼何藝不能獨造此計疑胸奴使已至羌中先零罕开乃解仇作約到秋馬肥變必起矣宜遣使者行邉兵豫為傋敕視諸羌毋令解仇以發覺其謀於是兩府復白遣義渠安國行視諸羌分别善惡神爵元年三月義渠安國至羌中召先零諸豪三十餘人以尤桀黠者皆斬之縱兵擊其種人斬首千餘級於是諸降羌及歸義羌侯楊玉等怨怒無所信鄉遂劫略小種背畔犯塞攻城邑殺長吏安國以騎都尉將騎三千屯備羌至浩亹為虜所擊失亡車重兵器甚衆安國引還至令居以聞時趙充國年七十餘上老之使丙吉問誰可將者充國對曰無踰於老臣者矣上遣問焉曰將軍度羌虜何如當用幾人充國曰百聞不如一見兵難遙度臣願馳至金城圖上方略羌戎小夷逆天背畔滅亡不久願陛下以屬老臣勿以為憂上笑曰諾乃大發兵詣金城夏四月遣充國將之以擊西羌六月趙充國至金城須兵滿萬騎欲度河恐為虜所遮即夜遣三校銜枚先度度輒營陳會明畢遂以次盡度虜數十百騎來出入軍傍充國曰吾士馬新倦不可馳逐此皆驍騎難制又恐其為誘兵也擊虜以殄滅為期小利不足貪令軍勿擊遣騎候四望狹中無虜夜引兵上至落都召諸校司馬謂曰吾知羌虜不能為兵矣使虜發數千人守杜四望狹中兵豈得入哉充國常以逺斥侯為務行必為戰備止必堅營壁尤能持重愛士卒先計而後戰遂西至西部都尉府日饗軍士士皆欲為用虜數挑戰充國堅守捕得生口言羌豪相數責曰語汝無反今天子遣趙將軍來年八九十矣善為兵今請欲一鬬而死可得邪初罕开豪靡當兒使弟雕庫來告都尉曰先零欲反後數日果反雕庫種人頗在先零中都尉即留雕庫為質充國以為無罪乃遣歸告種豪大兵誅有罪者明白自别毋取并滅天子告諸羌人犯法者能相捕斬除罪仍以功大小賜錢有差又以其所捕妻子財物盡與之充國計欲以威信招降罕开及劫略者解散虜謀徼其疲劇乃擊之時上已發內郡兵屯邉者合六萬人矣酒泉太守辛武賢奏言郡兵皆屯備南山北邉空虛勢不可久若至秋冬乃進兵此虜在境外之册今虜朝夕為寇土地寒苦漢馬不耐冬不如以七月上旬齎三十日糧分兵出張掖酒泉合擊罕开在鮮水上者雖不能盡誅但奪其畜産虜其妻子復引兵還冬復擊之大兵仍出虜必震壞天子下其書充國令議之充國以為一馬自負三十日食為米二斛四斗麥八斛又有衣裝兵器難以追逐虜必商軍進退稍引去逐水草入山林隨而深入虜即據前險守後厄以絶糧道必有傷危之憂為夷狄笑千載不可復而武賢以為可奪其畜産虜其妻子此殆空言非至計也先零首為畔逆它種劫略故臣愚册欲捐罕开暗昧之過隱而勿章先行先零之誅以震動之宜悔過反善因赦其罪選擇良吏知其俗者拊循和輯此全師保勝安邉之册天子下其書公卿議者咸以為先零兵盛而負罕开之助不先破罕开則先零未可圖也上乃拜侍中許延夀為強弩將軍即拜酒泉太守武賢為破羌將軍賜璽書嘉納其册以書敕讓充國曰今轉輸並起百姓煩擾將軍將萬餘之衆不早及秋共水草之利爭其畜食欲至冬虜皆當畜食多藏匿山中依險阻將軍士寒手足皸瘃寧有利哉將軍不念中國之費欲以嵗數而勝敵將軍誰不樂此者今詔破羌將軍武賢等將兵以七月擊罕羌將軍其引兵並進勿復有疑充國上書曰陛下前幸賜書欲使人諭罕以大軍當至漢不誅罕以解其謀臣故遣开豪雕庫宣天子至德罕开之屬皆聞知明詔今先零羌楊玉阻石山木候便為寇罕羌未有所犯乃置先零先擊罕釋有罪誅無辜起一難就兩害誠非陛下本計也臣聞兵法攻不足者守有餘又曰善戰者致人不致於人今罕羌欲為敦煌酒泉寇宜飭兵馬練戰士以須其至坐得致敵之術以逸擊勞取勝之道也今恐二郡兵少不足以守而發之行攻釋致虜之術而從為虜所致之道臣愚以為不便先零羌虜欲為背畔故與罕开解仇結約然其私心不能無恐漢兵至而罕开背之也臣愚以為其計常欲先赴罕开之急以堅其約先擊罕羌先零必助之今虜馬肥糧食方饒擊之恐不能傷害適使先零得施德於罕羌堅其約合其黨虜交堅黨合精兵二萬餘人迫脅諸小種附著者稍衆莫須之屬不輕得離也如是虜兵寖多誅之用力數倍臣恐國家憂纍由十年數不二三嵗而已於臣之計先誅先零已則罕开之屬不煩兵而服矣先零已誅而罕开不服涉正月擊之得計之理又其時也以今進兵誠不見其利戊申充國上奏秋七月甲寅璽書報從充國計焉充國乃引兵至先零在所虜久屯聚懈弛望見大軍棄車重欲度湟水道厄狹充國徐行驅之或曰逐利行遲充國曰此窮寇不可迫也緩之則走不顧急之則還致死諸校皆曰善虜赴水溺死者數百降及斬首五百餘人虜馬牛羊十萬餘頭車四千餘兩兵至罕地令軍毋燔聚落芻牧田中罕羌聞之喜曰漢果不擊我矣豪靡忘使人來言願得還復故地充國以聞未報靡忘來自歸充國賜飲食遣還諭種人護軍以下皆爭之曰此反虜不可擅遣充國曰諸君但欲便文自營非為公家忠計也語未卒璽書報令靡忘以贖論後罕竟不煩兵而下上詔破羌強弩將軍詣屯所以十二月與充國合進擊先零時羌降者萬餘人矣充國度其必壞欲罷騎兵屯田以待其敝作奏未上會得進兵璽書充國子中郎將卬懼使客諫充國曰誠令兵出破軍殺將以傾國家將軍守之可也即利與病又何足爭一旦不合上意遣繡衣來責將軍將軍之身不能自保何國家之安充國歎曰是何言之不忠也本用吾言羌虜得至是邪往者舉可先行羌者吾舉辛武賢丞相御史復白遣義渠安國竟沮敗羌金城湟中榖斛八錢吾謂耿中丞糴三百萬斛榖羌人不敢動矣耿中丞請糴百萬斛乃得四十萬斛耳義渠再使且費其半失此二册羌人致敢為逆失之豪釐差以千里是既然矣今兵久不決四夷卒有動搖相因而起雖有知者不能善其後羌獨足憂邪吾固以死守之明主可為忠言遂上屯田奏曰臣所將吏士馬牛食所用糧穀茭藳調度甚廣難久不解徭役不息恐生它變為明主憂誠非素定廟勝之册且羌易以計破難用兵碎也故臣愚心以為擊之不便計度臨羌東至浩亹羌虜故田及公田民所未墾可二千頃以上其間郵亭多壞敗者臣前部士入山伐材木六萬餘枚在水次臣願罷騎兵留步兵萬二百八十一人分屯要害處氷解漕下繕鄉亭浚溝渠治湟狹以西道橋七十所令可至鮮水左右田事出賦人二十畝至四月草生發郡騎及屬國胡騎各千就草為田者遊兵以充入金城郡益積畜省大費今大司農所轉榖至者足支萬人一嵗食謹上田處及器用簿上報曰即如將軍之計虜當何時伏誅兵當何時得決孰計其便復奏充國上狀曰臣聞帝王之兵以全取勝是以貴謀而賤戰百戰而百勝非善之善者也故先為不可勝以待敵之可勝蠻夷習俗雖殊於禮義之國然其欲避害就利愛親戚畏死亡一也今虜亡其美地薦草愁於寄託逺遁骨肉心離人有畔志而明主班師罷兵萬人留田順天時因地利以待可勝之虜雖未即伏辜兵決可期月而望羌虜瓦解前後降者萬七百餘人及受言去者凡七十輩此坐支解羌虜之具也臣謹條不出兵留田便宜十二事步兵九校吏士萬人留屯以為武備因田致穀威德並行一也又因排折羌虜令不得歸肥饒之地貧破其衆以成羌虜相畔之漸二也居民得並田作不失農業三也軍馬一月之食度支田士一嵗罷騎兵以省大費四也至春省甲士卒循河湟漕穀至臨羌以示羌虜揚威武傳世折衝之具五也以間暇時下先所伐材繕治郵亭充入金城六也兵出乘危徼幸不出令反畔之虜竄於風寒之地離霜露疾疫瘃墯之患坐得必勝之道七也無經阻逺追死傷之害八也內不損威武之重外不令虜得乘間之藝九也又亡驚動河南大开使生它變之憂十也治湟狹中道橋令可至鮮水以制西域伸威千里從枕席上過師十一也大費既省繇役豫息以戒不虞十二也留屯田得十二便出兵失十二利唯明詔采擇上復賜報曰兵決可期月而望者謂今冬邪謂何時也將軍獨不計虜聞兵頗罷且丁壯相聚攻擾田者及道上屯兵復殺略人民將何以止之將軍孰計復奏充國奏曰臣聞兵以計為本故多算勝少算先零羌精兵今餘不過七八千人失地逺客分散飢凍畔還者不絶臣愚以為虜破壞可日月冀逺在來春故曰兵決可期月而望竊見北邉自燉煌至遼東萬一千五百餘里乘塞列地有吏卒數千人虜數以大衆攻之而不能害今騎兵雖罷虜見屯田之士精兵萬人從今盡三月虜馬羸瘦必不敢捐其妻子於它種中逺涉河山而來為冦亦不敢將其纍重還歸故地是臣之愚計所以度虜且必瓦解其處不戰而自破之册也至於虜小寇盜時殺人民其原未可卒禁臣聞戰不必勝不苟接刃攻不必取不茍勞衆誠令兵出雖不能滅先零但能令虜絶不為小寇則出兵可也即今同是而釋坐勝之道從乘危之藝往終不見利空內自罷敝貶重而自損非所以示蠻夷也又大兵一出還不可復留湟中亦未可空如是徭役復更發也臣愚以為不便臣竊自惟念奉詔出塞引軍逺擊窮天子之精兵散車甲於山野雖亡尺寸之功偷得避嫌之便而亡後咎餘責此人臣不忠之利非明主社稷之福也充國奏每上輒下公卿議臣初是充國計者什三中什五最後什八有詔詰前言不便者皆頓首服魏相曰臣愚不習兵事利害後將軍數畫軍册其言常是臣任其計可必用也上於是報充國嘉納之亦以破羌強弩將軍數言當擊於是兩從其計詔兩將軍與中郎將卬出擊強弩出降四千餘人破羌斬首二千級中郎將卬斬首降者亦二千餘級而充國所降復得五千餘人詔罷兵獨充國留屯田二年夏五月趙充國奏言羌本可五萬人軍凡斬首七千六百級降者三萬一千二百人溺河湟飢餓死者五六千人定計遺脫與煎鞏黃羝俱亡者不過四千人羌靡忘等自詭必得請罷屯兵奏可充國振旅而還所善浩星賜迎説充國曰衆人皆以破羌疆弩出擊多斬首生降虜以破壞然有識者以為虜藝窮困兵雖不出必自服矣將軍即見宜歸功於二將軍出擊非愚臣所及如此將軍計未失也充國曰吾年老矣爵位已極豈嫌伐一時事以欺明主哉兵藝國之大事當為後法老臣不以餘命一為陛下明言兵之利害卒死誰當復言之者卒以其意對上然其計罷遣辛武賢歸酒泉太守官充國復為後將軍秋羌若零離留且種兒庫共斬先零大豪猶非楊玉首及諸豪弟澤湯雕良兒靡忘皆帥煎鞏黃羝之屬四千餘人降漢封若零弟澤二人為帥衆王餘皆為侯為君初置金城屬國以處降羌詔舉可護羌校尉者時充國病四府舉辛武賢小弟湯充國遽起奏湯使酒不可典蠻夷不如湯兄臨衆時湯已拜受節有詔更用臨衆後臨衆病免五府復舉湯湯數醉酗羌人羌人反畔卒如充國之言辛武賢深恨充國上書告中郎將卬泄省中語下吏自殺胸奴歸漢漢昭帝始元二年初武帝征伐胸奴深入窮追二十餘年胸奴馬畜孕重墯殰罷極苦之常有欲和親意未能得狐鹿孤單于有異母弟為左大都尉賢國人鄉之母閼氏恐單于不立子而立左大都尉也乃私使殺之左大都尉同母兄怨遂不肯復會單于庭是嵗單于病且死謂諸貴人我子少不能治國立弟右谷蠡王及單于死衛律等與顓渠閼氏謀匿其喪矯單于令更立子左谷蠡王為壺衍鞮單于左賢王右谷蠡王怨望率其衆欲南歸漢恐不能自致即脅盧屠王欲與西降烏孫盧屠王告之單于使人驗問右谷蠡王不服反以其罪罪盧屠王國人皆寃之於是二王去居其所不復肯會龍城胸奴始衰六年春二月壺衍鞮單于立母閼氏不正國內乖離常恐漢兵襲之於是衛律為單于謀與漢和親漢使至求蘇武等胸奴詭言武死後漢使復至胸奴常惠私見漢使教使者謂單于言天子射上林中得鴈足有係帛書言武等在某澤中使者大喜如惠語以讓單于單于視左右而驚謝漢使曰武等實在乃歸武及馬宏等馬宏者前副光祿大夫王忠使西國為胸奴所遮忠戰死馬宏生得亦不肯降故胸奴歸此二人欲以通善意武使胸奴事天漢元年蘇伐胸奴見武帝元鳯元年胸奴發左右部二萬騎為四隊並入邉為寇漢兵追之斬首獲虜九千人生得甌脫王漢無所失亡胸奴見甌脫王在漢恐以為道擊之即西北逺去不敢南逐水草發人民屯甌脫二年胸奴復遣九千騎屯受降城以備漢北橋余吾水令可度以備奔走欲求和親而恐漢不聽故不肯先言常使左右風漢使者然其侵盜益希遇漢使愈厚欲以漸致和親漢亦羈縻之三年春正月胸奴單于使犁汙王窺邉言酒泉張掖兵益弱出兵試擊冀可復得其地時漢先得降者聞其計天子詔邉警備後無幾右賢王犁汙王四千騎分三隊入日勒屋蘭番和張掖太守屬國都尉發兵擊大破之得脫者數百人屬國義渠王射殺犁汙王賜黃金二百斤馬二百匹因封為犁汙王自是後胸奴不敢入張掖初冒頓破東胡東胡餘衆散保烏桓及鮮卑山為二族世役屬胸奴武帝擊破胸奴左地因徙烏桓於上谷漁陽右北平遼東塞外為漢偵察胸奴動靜置護烏桓校尉監領之使不得與胸奴交通至是部衆漸強遂反先是胸奴三千餘騎入五原殺略數千人後萬騎南旁塞獵行攻塞外亭障略取吏民去是漢邉郡烽火候望精明胸奴為邉寇者少利希復犯塞漢復得胸奴降者言烏桓嘗發先單于冡胸奴怒之方發二萬騎擊烏桓霍光欲發兵邀擊之以問護軍都尉趙充國充國以為烏桓間數犯塞今胸奴擊之於漢便又胸奴希寇盜北邉幸無事蠻夷自相攻擊而發兵要之招寇生事非計也光更問中郎將范明友明友言可擊於是拜明友為度遼將軍將二萬騎出遼東胸奴聞漢兵至引去初光誡明友兵不空出即後胸奴遂擊烏桓烏桓時新中胸奴兵明友既後胸奴因乘烏桓敝擊之斬首六千餘級獲三王首胸奴由是恐不能復出兵宣帝本始二年昭帝時烏孫公主上書言胸奴與車師共侵烏孫唯天子幸救之漢飬士馬議擊胸奴會昭帝崩上遣光祿大夫常惠使烏孫烏孫公主及昆彌皆遣使上書言胸奴復連發大兵侵擊烏孫使使謂烏孫趣持公主來欲隔絶漢昆彌願發國精兵五萬騎盡力擊胸奴唯天子出兵以救公主昆彌先是胸奴數侵漢邊漢亦欲討之秋大發兵遣御史大夫田廣明為祁連將軍四萬餘騎出西河度遼將軍范明友三萬餘騎出張掖前將軍韓增三萬餘騎出雲中後將軍趙充國為蒲類將軍三萬餘騎出酒泉雲中太守田順為虎牙將軍三萬餘騎出五原期以出塞各二千餘里以常惠為校尉持節護烏孫兵共擊胸奴三年春正月戊辰五將軍發長安胸奴聞漢兵大出老弱奔走歐畜産逺遁逃是以五將少所得夏五月軍罷度遼將軍出塞千二百餘里至蒲離候水斬首捕虜七百餘級前將軍出塞千二百餘里至烏貟斬首捕虜百餘級蒲類將軍出塞千八百餘里西去候山斬首捕虜得單于使者蒲隂王以下三百餘級聞虜已引去皆不至期還天子薄其過寬而不罪祁連將軍出塞千六百里至雞秩山斬首捕虜十九級逢漢使胸奴還者冉弘等言雞秩山西有虜衆祁連即戒弘使言無虜欲還兵御史屬公孫益壽諫以為不可祁連不聽遂引兵還虎牙將軍出塞八百餘里至丹餘吾水上即止兵不進斬首捕虜千九百餘級引兵還上以虎牙將軍不至期詐增鹵獲而祁連知虜在前逗遛不進皆下吏自殺擢公孫益夀為侍御史烏孫昆彌自將五萬騎與校尉常惠從西方入至右谷蠡王庭獲單于父行及嫂居次名王犁汙都尉千長騎將以下四萬級馬牛羊驢槖駝七十餘萬頭烏孫皆自取所虜獲上以五將皆無功獨惠奉使克獲封惠為長羅侯然胸奴民衆傷而去者及畜産逺移死亡不可勝數於是胸奴遂衰耗怨烏孫冬胸奴單于自將數萬騎擊烏孫頗得老弱欲還會天大雨雪一日深丈餘人民畜産凍死還者不能什一於是丁令乘弱攻其北烏桓入其東烏孫擊其西凡三國所殺數萬級馬數萬匹牛羊甚衆又重以餓死人民死者什三畜産什五胸奴大虛弱諸國羈屬者皆瓦解攻盜不能理其後漢出三千餘騎為三道並入胸奴捕虜得數千人還胸奴終不敢取當滋欲鄉和親而邉境少事矣地節二年胸奴壺衍鞮單于死弟左賢王立為虛閭權渠單于以右大將女為大閼氏而黜前單于所幸顓渠閼氏顓渠閼氏父左大且渠怨望是時漢以胸奴不能為邉寇罷塞外諸城以休百姓單于聞之喜召貴人謀欲與漢和親左大且渠心害其事曰前漢使來兵隨其後今亦效漢發兵先使使者入乃自請與呼盧訾王各將萬騎南旁塞獵相逢俱入行未到會三騎亡降漢言胸奴欲為寇於是天子詔發邉騎屯要害處使大將軍軍監治衆等四人將五千騎分三隊出塞各數百里捕得虜各數十人而還時胸奴亡其三騎不敢入即引去是嵗胸奴飢人民畜産死什六七又發兩屯各萬騎以備漢其秋胸奴前所得西嗕居左地者其君長以下數千人皆驅畜産行與甌脫戰所殺傷甚衆遂南降漢三年昭帝時胸奴使四千騎田車師及五將軍擊胸奴車師田者驚去車師復通於漢胸奴怒召其太子軍宿欲以為質軍宿焉耆外孫不欲質胸奴亡走焉耆車師王更立子烏貴為太子及烏貴立為王與胸奴結婚姻教胸奴遮漢道通烏孫者是嵗侍郎會稽鄭吉與校尉司馬喜將免刑罪人田渠犂積榖發城郭諸國兵萬餘人與所將田士千五百人共擊車師破之車師王請降胸奴發兵攻車師吉喜引兵北逢之胸奴不敢前吉喜即留一候與卒二十人留守王吉等引兵歸渠犂車師王恐胸奴兵復至而見殺也乃輕騎奔烏孫吉即迎其妻子傳送長安胸奴更以車師王昆弟兜莫為車師王收其餘民東徙不敢居故地而鄭吉始使吏卒三百人往田車師地以實之元康二年胸奴大臣皆以為車師地肥美近胸奴使漢得之多田積穀必害人國不可不爭由是數遣兵擊車師田者鄭吉將渠犂田卒七千餘人救之為胸奴所圍吉上言車師去渠犂千餘里漢兵在渠犂者少藝不能相救願益田卒上與後將軍趙充國等議欲因胸奴衰弱出兵擊其右地使不敢復擾西域魏相上書諫曰臣聞之救亂誅暴謂之義兵兵義者王敵加於己不得已而起者謂之應兵兵應者勝爭恨小故不忍憤怒者謂之忿兵兵忿者敗利人土地貨寶者謂之貪兵兵貪者破恃國家之大矜民人之衆欲見威於敵者謂之驕兵兵驕者滅此五者非但人事乃天道也間者胸奴嘗有善意所得漢民輒奉歸之未有犯於邉境雖爭屯田車師不足致意中今聞諸將軍欲興兵入其地臣愚不知此兵何名者也今邉郡困乏父子共犬羊之裘食草萊之實常恐不能自存難以動兵軍旅之後必有凶年言民以其愁苦之氣傷隂陽之和也出兵雖勝猶有後憂恐災害之變因此以生今郡國守相多不實選風俗尤薄水旱不時按今年計子弟殺父兄妻殺夫者凡二百二十二人臣愚以為此非小變也今左右不憂此乃欲發兵報纎介之忿於逺夷殆孔子所謂吾恐季孫之憂不在顓臾而在蕭牆之內也上從相言止遣長羅侯常惠將張掖酒泉騎往車師迎鄭吉及其吏士還渠犂召故車師太子軍宿在焉耆者立以為王盡徙車師國民令居渠犂遂以車師故地與胸奴以鄭吉為衛司馬使護鄯善以西南道神爵二年九月胸奴虛閭權渠單于將十餘萬騎旁塞獵欲入邉為寇未至會其民題除渠堂亡降漢言狀漢以為言兵鹿奚盧侯而遣後將軍趙充國將兵四萬餘騎屯緣邉九郡備虜月餘單于病歐血因不敢入還去即罷兵乃使題王都犂胡次等入漢請和親未報會單于死虛閭權渠單于始立而黜顓渠閼氏顓渠閼氏即與右賢王屠耆堂私通右賢王會龍城而去顓渠閼氏語以單于病甚且勿逺後數日單于死用事貴人郝宿王刑未央使人召諸王未至顓渠閼氏與其弟左大且渠都隆竒謀立右賢王為握衍朐鞮單于握衍朐鞮單于者烏維單于耳孫也握衍朐鞮單于立凶惡殺刑未央等而任用都隆奇又盡免虛閭權渠子弟近親而自以其子弟代之虛閭權渠單于子稽侯㹪既不得立亡歸妻父烏禪幕烏禪幕者本烏孫康居間小國數見侵暴率其衆數千人降胸奴狐鹿姑單于以其弟子日逐王姊妻之使長其衆居右地日逐王先賢撣其父左賢王當為單于讓狐鹿姑單于狐鹿姑單于許立之國人以故頗言日逐王當為單于日逐王素與握衍朐鞮單于有隙即率其衆欲降漢使人至渠犂與騎都尉鄭吉相聞吉發渠犂龜兹諸國五萬人迎日逐王口萬二千人小王將十二人隨吉至河曲頗有亡者吉追斬之遂將詣京師漢封日逐王為歸德侯吉既破車師降日逐威震西域遂并護車師以西北道故號都護都護之置自吉始焉上封吉為安逺侯吉於是中西域而立莫府治烏壘城去陽關二千七百餘里胸奴益弱不敢爭西域僮僕都尉由此罷都護督察烏孫康居等三十六國動靜有變以聞可安輯安輯之不可者誅伐之漢之號令班西域矣握衍朐鞮單于更立其從兄薄胥堂為日逐王三年胸奴單于又殺先賢撣兩弟烏禪幕請之不聽心恚其後左奧鞬王死單于自立其小子為奧鞬王留庭奧鞬貴人共立故奧鞬王子為王與俱東徙單于遣右丞相將萬騎往擊之失亡數千人不勝四年五月胸奴單于遣弟呼留若王勝之來朝胸奴握衍朐鞮單于暴虐好殺伐國中不附及太子左賢王數讒左地貴人左地貴人皆怨會烏桓擊胸奴東邊姑夕王頗得人民單于怒姑夕王恐即與烏禪幕及左地貴人共立稽侯㹪為呼韓邪單于發左地兵四五萬人西擊握衍朐鞮單于至姑且水北未戰握衍朐鞮單于兵敗走使人報其弟右賢王曰胸奴共攻我若肯發兵助我乎右賢王曰若不愛人殺昆弟諸貴人各自死若處無來汙我握衍朐鞮單于恚自殺左大且渠都隆奇亡之右賢王所其民衆盡降呼韓邪單于呼韓邪單于歸庭數月罷兵使各歸故地乃收其兄呼屠吾斯在民間者立為左谷蠡王使人告右賢貴人欲令殺右賢王其冬都隆奇與右賢王共立日逐王薄胥堂為屠耆單于發兵數萬人東襲呼韓邪單于呼韓邪單于兵敗走屠耆單于還以其長子都塗吾西為左谷蠡王少子姑瞀樓頭為右谷蠡王留居單于庭五鳳元年秋胸奴屠耆單于使先賢撣兄右奧鞬王與烏藉都尉各二萬騎屯東方以備呼韓邪單于是時西方呼揭王來與唯犂當户謀共讒右賢王言欲自立為單于屠耆單于殺右賢王父子後知其寃復殺唯犂當户於是呼揭王恐遂畔去自立為呼揭單于右奧鞬王聞之即自立為車犂單于烏藉都尉亦自立為烏藉單于凡五單于屠耆單于自將兵東擊車犂單于使都隆奇擊烏藉烏藉車犂皆敗西北走與呼揭單于兵合為四萬人烏藉呼揭皆去單于號共并力尊輔車犂單于屠耆單于聞之使左大將都尉將四萬騎分屯東方以備呼韓邪單于自將四萬騎西擊車犂單于車犂單于敗西北走屠耆單于即引兵西南留闟敦地漢議者多曰胸奴為害日久可因其壞亂舉兵滅之詔問御史大夫蕭望之對曰春秋晉士丐帥師侵齊聞齊侯卒引師而還君子大其不伐喪以為恩足以服孝子誼足以動諸侯前單于慕化鄉善稱弟遣使請求和親海內欣然夷狄莫不聞未終奉約不幸為賤臣所殺今而伐之是乘亂而幸災也彼必奔走逺遁不以義動兵恐勞而無功宜遣使者弔問輔其微弱救其災患四夷聞之咸貴中國之仁義如遂蒙恩得復其位必稱臣服從此德之盛也上從其議二年秋八月胸奴呼韓邪單于遣其弟右谷蠡王等西襲屠耆單于屯兵殺略萬餘人屠耆單于聞之即自將六萬騎擊呼韓邪單于屠耆單于兵敗自殺都隆奇乃與屠耆少子右谷蠡王姑瞀樓頭亡歸漢車犂單于東降呼韓邪單于冬十一月呼韓邪單于左大將烏厲屈與父呼遫纍烏厲溫敦皆見胸奴亂率其衆數萬人降漢封烏厲屈為新城侯烏厲溫敦為義陽侯是時李陵子復立烏藉都尉為單于呼韓邪單于捕斬之遂復都單于庭然衆裁數萬人屠耆單于從弟休旬王自立為閏振單于在西邉呼韓邪單于兄左賢王呼屠吾斯亦自立為郅支骨都侯單于在東邉三年六月置西河北地屬國以處胸奴降者四年春胸奴單于稱臣遣弟谷蠡王入侍以邉塞亡寇減戍卒什二夏四月胸奴閏振單于率其衆東擊郅支單于郅支與戰殺之并其兵遂進攻呼韓邪呼韓邪兵敗走郅支都單于庭甘露元年胸奴呼韓邪單于之敗也左伊秩訾王為呼韓邪計勸令稱臣入朝事漢從漢求助如此胸奴乃定呼韓邪問諸大臣皆曰不可胸奴之俗本上氣力而下服役以馬上戰鬬為國故有威名於百蠻戰死壯士所有也今兄弟爭國不在兄則在弟雖死猶有威名子孫常長諸國漢雖強猶不能兼并胸奴奈何亂先古之制臣事於漢卑辱先單于為諸國所笑雖如是而安何以復長百蠻左伊秩訾曰不然強弱有時今漢方盛烏孫城郭諸國皆為臣妾自且鞮侯單于以來胸奴日削不能取復雖屈強於此未嘗一日安也今事漢則安存不事則危亡計何以過此諸大人相難久之呼韓邪從其計引衆南近塞遣子右賢王銖婁渠堂入侍郅支單于亦遣子右大將駒于利受入侍二年冬十二月胸奴呼韓邪單于𣢾五原塞願奉國珍朝三年正月詔有司議其儀丞相御史曰聖王之制先京師而後諸夏先諸夏而後夷狄胸奴單于朝賀其禮儀宜如諸侯王位次在下太子太傅蕭望之以為單于非正朔所加故稱敵國宜待以不臣之禮位在諸侯王上外夷稽首稱藩中國讓而不臣此則羈縻之誼謙亨之福也書曰戎狄荒服言其來服荒忽亡常如使胸奴後嗣卒有烏竄鼠伏闕於朝享不為畔臣萬世之長䇿也天子采之下詔曰胸奴單于稱北藩朝正朔朕之不德不能弘覆其以客禮待之令單于位在諸侯王上贊謁稱臣而不名荀悅論曰春秋之義王者無外欲一于天下也戎狄道里遼逺人迹介絶故正朔不及禮教不加非尊之也其藝然也詩云自彼氐羌莫敢不來王故要荒之君必奉王貢若不供職則有辭讓號令加焉非敵國之謂也望之欲待以不臣之禮加之王公之上僣度失序以亂天常非禮也若以權時之宜則異論矣詔遣車騎都尉韓昌迎單于發所過七郡二千騎為陳道上三年春正月胸奴呼韓邪單于來朝贊謁稱藩臣而不名賜以冠帶衣裳黃金璽盩綬玉具劒佩刀弓一張矢四發棨戟十安車一乘鞍勒一具馬十五匹黃金二十斤錢二十萬衣被七十七襲錦繡綺縠雜帛八千匹絮六千斤禮畢使使者道單于先行宿長平上自甘泉宿池陽宫上登長平阪詔單于毋謁其左右當户羣臣皆得列觀及諸蠻夷君長王侯數萬咸迎於渭橋下夾道陳上登渭橋咸稱萬嵗單于就邸長安置酒建章宫饗賜單于觀以珍寶二月遣單于歸國單于自請願留居幕南光祿塞下有急保漢受降城漢遣長樂衛尉髙昌侯董忠車騎都尉韓昌將騎萬六千又發邉郡士馬以千數送單于出朔方雞鹿塞詔忠等留衛單于助誅不服又轉邉穀米糒前後三萬四千斛給贍其食先是自烏孫以西至安息諸國近胸奴者皆畏胸奴而輕漢及呼韓邪單于朝漢後咸尊漢矣上以戎狄賔服思股肱之美乃圖畫其人於麒麟閣法其形貌署其官爵姓名唯霍光不名曰大司馬大將軍博陸侯姓霍氏其次張安世韓增趙充國魏相丙吉杜延年劉德梁丘賀蕭望之蘇武凡十一人皆有功德知名當世是以表而揚之明著中興輔佐列於方叔召虎仲山甫焉四年冬十月胸奴呼韓邪郅支兩單于俱遣使朝獻漢待呼韓邪使有加焉黃龍元年春正月胸奴呼韓邪單于來朝二月歸國始郅支單于以為呼韓邪兵弱降漢不能復自還即引其衆西欲攻定右地又屠耆單于小弟本侍呼韓邪亦亡之右地收兩兄餘兵得數千人自立為伊利目單于道逢郅支合戰郅支殺之并其兵五萬餘人郅支聞漢出兵穀助呼韓邪即遂留居右地自度力不能定胸奴乃益西近烏孫欲與并力遣使見小昆彌烏就屠烏就屠殺其使發八千騎迎郅支郅支覺其謀勒兵逢擊烏孫破之因北擊烏揭堅昆丁令并三國數遣兵擊烏孫常勝之堅昆東去單于庭七千里南去車師五千里郅支留都之元帝初元元年秋九月胸奴呼韓邪單于復上書言民衆困乏詔雲中五原郡轉穀二萬斛以給之五年胸奴郅支單于自以道逺又怨漢擁護呼韓邪而不助已困辱漢使者江乃始等遣使奉獻因求侍子漢議遣衛司馬谷吉送之御史大夫貢禹博士東海匡衡以為郅支單于鄉化未醇所在絶逺宜令使者送其子至塞而還吉上書言中國與夷狄有羈縻不絶之義今既飬全其子十年德澤甚厚空絶而不送近從塞還示棄捐不畜使無鄉從之心棄前恩立後怨不便議者見前江乃始無應敵之數智勇俱困以致恥辱即豫為臣憂臣幸得建強漢之節承明聖之詔宣諭厚恩不宜敢桀若懷禽獸心加無道於臣則單于長嬰大罪必遁逃逺舍不敢近邉沒一使以安百姓國之計臣之願也願送至庭上許焉既至郅支單于怒竟殺吉等自知負漢又聞呼韓邪益強恐見襲擊欲逺去會康居王數為烏孫所困與諸翕侯計以為胸奴大國烏孫素服屬之今郅支單于困厄在外可迎置東邉使合兵取烏孫以立之長無胸奴憂矣即使使至堅昆通語郅支郅支素恐又怨烏孫聞康居計大説遂與相結引兵而西郅支人衆中寒道死餘財三千人到康居康居王以女妻郅支郅支亦以女豫康居王康居甚尊敬郅支欲倚其威以脅諸國郅支數借兵擊烏孫深入至赤谷城殺略民人驅畜産去烏孫不敢追西邉空虛不居者五千里永光元年胸奴呼韓邪單于民衆益盛塞下禽獸盡單于足以自衛不畏郅支其大臣多勸單于北歸者久之單于竟北歸庭民衆稍稍歸之其國遂定建詔三年冬使西域都護騎都尉北地甘延夀副校尉山陽陳湯共誅斬胸奴郅支單于於康居始郅支單于自以大國威名尊重又乘勝驕不為康居王禮怒殺康居王女及貴人人民數百或支解投都賴水中發民作城日作五百人二嵗乃已又遣使責闔蘇大宛諸國嵗遺不敢不豫漢遣使三輩至康居求谷吉等死郅支困辱使者不肯奉詔而因都護上書言居困厄願歸計強漢遣子入侍其驕嫚如此湯為人沈勇有大慮多䇿謀喜奇功與延夀謀曰夷狄畏服大種其天性也西域本屬胸奴今郅支單于威名逺聞侵陵烏孫大宛常為康居畫計欲降服之如得此二國數年之間城郭諸國危矣且其人剽悍好戰伐數取勝久畜之必為西域患雖所在絶逺蠻夷無金城強弩之守如發屯田吏士驅從烏孫衆兵直指其城下彼亡則無所之守則不足自保千載之功可一朝而成也延夀亦以為然欲奏請之湯曰國家與公卿議大䇿非凡所見事必不從延夀猶與不聼會其久病湯獨矯制發城郭諸國兵車師戊已校尉屯田吏士延夀聞之驚起欲止焉湯怒按劒叱延夀曰大衆已集會豎子欲沮衆邪延夀遂從之部勒行陳漢兵胡兵合四萬餘人延夀湯上疏自劾奏矯制陳言兵狀即日引軍分行别為六校其三校從南道踰蔥領徑大宛其三校都護自將發溫宿國從北道入赤谷過烏孫涉康居界至闐池西而康居副王抱闐將數千騎寇赤谷城東殺略大昆彌千餘人毆畜産甚多從後與漢軍相及頗寇盜後重湯縱胡兵擊之殺四百六十人得其所略民四百七十人還付大昆彌其馬牛羊以給軍食又捕得抱闐貴人伊奴毒入康居東界令軍不得為寇間呼其貴人屠墨見之諭以威信與飲盟遣去徑引行未至單于城可六十里止營復捕得康居貴人貝色子男開牟以為導貝色于即屠墨母之弟皆怨單于由是具知郅支情明日引行未至城三十里止營單于遣使問漢兵何以來應曰單于上書言居困厄願歸計強漢身入朝見天子哀閔單于棄大國屈意康居故使都護將軍來迎單于妻子恐左右驚動故未敢至城下使數往來相答報延夀湯因讓之我為單于逺來而至今無名王大人見將軍受事者何單于忽大計失客主之禮也兵來道逺人畜罷極食度且盡恐無以自還願單于與大臣審計䇿明日前至郅支城都賴水上離城三里止營傳陳望見單于城上立五采幡幟數百以被甲乘城又出百餘騎往來馳城下步兵百餘人夾門魚鱗陳講習用兵城上人更招漢軍曰鬪來百餘騎馳赴營營皆張弩持滿指之騎引却破遣吏士射城門騎步兵騎步兵皆入延夀湯令軍聞鼓音皆薄城下四面圍城各有所守穿􅢾塞門户鹵楯為前戟弩為後仰射城樓上人樓上人下走土城外有重木城從木城中射頗殺傷外人外人發薪燒木城夜數百騎欲出外迎射殺之初單于聞漢兵至欲去疑康居怨已為漢內應又聞烏孫諸國兵皆發自以無所之郅支已出復還曰不如堅守漢兵逺來不能久攻單于乃被甲在樓上諸閼氏夫人數十皆以弓射外人外人射中單于鼻諸夫人頗死單于乃下夜過半木城穿中人郤入土城乘城呼時康居兵萬餘騎分為十餘處四面環城亦與相應和夜數奔營不利輒郤平明四面火起吏士喜大呼乘之鉦鼓聲動地康居兵引郤漢兵四面推鹵楯並入土城中單于男女百餘人走入大內漢兵縱火吏士爭入單于被創死軍候假丞杜勳斬單于首得漢使節二及谷吉等所齎帛書諸鹵獲以畀得者凡斬閼氏太子名王以下千五百一十八級生虜百四十五人降虜千餘人賦豫城郭諸國所發十五王四年春正月郅支首至京師延夀湯上疏曰臣聞天下之大義當混為一昔有唐虞今有強漢胸奴呼漢邪單于已稱北藩唯郅支單于叛逆未伏其辜大夏之西以為強漢不能臣也郅支單于慘毒行於民大惡通於天臣延夀臣湯將義兵行天誅賴陛下神靈隂陽並應天氣精明陷陳克敵斬郅支首及名王以下宜縣頭稿街蠻夷邸間以示萬里明犯強漢者雖逺必誅丞相匡衡等以為方春掩骼埋胔之時宜勿縣詔縣十日乃埋之仍告祠郊廟赦天下羣臣上夀置酒五年胸奴呼韓邪單于聞郅支既誅且喜且懼上書願入朝見竟寧元年春正月胸奴呼韓邪單于來朝自言願壻漢氏以自親帝以後宫良家子王嬙字昭君賜單于單于歡喜上書願保塞上谷以西至敦煌傳之無窮請罷邉備塞吏卒以休天子人民天子下有司議議者皆以為便郎中侯應習邉事以為不可許上問狀應曰周秦以來胸奴暴桀寇侵邉境漢興尤被其害臣聞北邉塞至遼東外有隂山東西千餘里草木茂盛多禽獸本冒頓單于依阻其中治作弓矢來出為寇是其苑囿也至孝武世出師征伐斥奪此地攘之於幕北建塞徼起亭隧築外城設屯戍以守之然後邉境得用少安幕北地平少草木多大沙胸奴來寇少所蔽隱從塞以南徑深山谷往來差難邉長老言胸奴失隂山之後過之未嘗不哭也如罷備塞戍卒示夷狄之大利不可一也今聖德廣被天覆胸奴胸奴得蒙全活之恩稽首來臣夫夷狄之情困則卑順強則驕逆天性然也前已罷外城省亭隧令裁足以候望通烽火而已古者安不忘危不可復罷二也中國有禮義之教刑罰之誅愚民猶尚犯禁又况單于能必其衆不犯約哉三也自中國尚建關梁以制諸侯所以絶臣下之覬欲也設塞徼置屯戍非獨為胸奴而已亦為諸屬國降民本故胸奴之人恐其思舊逃亡四也近西羌保塞與漢人交通吏民貪利侵盜其畜産妻子以此怨恨起而背畔今罷乘塞則生嫚易分爭之漸五也往者從軍多沒不還者子孫貧困一旦亡出從其親戚六也又邉人奴婢愁苦欲亡者多日聞胸奴中樂無奈候望急何然時有亡出塞者七也盜賊桀黠羣輩犯法如其窘急亡走北出則不可制八也起塞以來百有餘年非皆以土垣也或因山巖木石溪谷水門稍稍平之卒徒築治功費久逺不可勝計臣恐議者不深慮其終始欲以一切省繇戍十年之外百嵗之內卒有它變障塞破壞亭隧滅絶當更發屯繕治纍世之功不可卒復九也如罷戍卒省候望單于自以保塞守禦必深德漢請求無已小失其意則不可測開夷狄之隙虧中國之固十也非所以永持至安威制百蠻之長䇿也對奏天子有詔勿議罷邊塞事使車騎將軍嘉口諭單于曰單于上書願罷北塞吏士屯戍子孫世世保塞單于鄉慕禮義所以為民計者甚厚此長久之䇿也朕甚嘉之中國四方皆有關梁障塞非獨以備塞外也亦以防中國姦邪放縱出為寇害故明法度以專衆心也敬諭單于之意朕無疑焉為單于怪其不罷故使嘉曉單于單于謝曰愚不知大計天子幸使大臣告語甚厚初左伊秩訾為呼韓邪畫計歸漢竟以安定其後或讒伊秩訾自伐其功常鞅鞅呼韓邪疑之伊秩訾懼誅將其衆千餘人降漢漢以為關內侯食邑三百户令佩其王印綬及呼韓邪來朝與伊秩訾相見謝曰王為我計甚厚令胸奴至今安寧王之力也德豈可忘我失王意使王去不復顧留皆我過也今欲白天子請王歸庭伊秩訾曰單于賴天命自歸於漢得以安寧單于神靈天子之祐也我安得力既已降漢又復歸胸奴是兩心也願為單于侍使於漢不敢聽命單于固請不能得而歸單于號王昭君為寧胡閼氏生一男伊屠智牙師為右日逐王初中書令石顯嘗欲以姊妻甘延夀延夀不取及破郅支還丞相御史亦惡其矯制皆不與延夀等陳湯素貪所鹵獲財物入塞多不法司隸校尉移書道上繫吏士桉驗之湯上疏言臣與吏士共誅郅支單于幸得禽滅萬里振旅宜有使者迎勞道路今司隸反逆收繫桉驗是為郅支報讎也上立出吏士令縣道具酒食以過軍既至論功石顯厈衡以為延夀湯擅興師矯制幸得不誅如復加爵土則後奉使者爭欲乘危徼幸生事於蠻夷為國招難帝內嘉延夀湯功而重違衡顯之議久之不決故宗正劉向上疏曰郅支單于囚殺使者吏士以百數事暴揚外國傷威毁重羣臣皆閔焉陛下赫然欲誅之意未嘗有忘西域都護延夀副校尉湯承聖指倚神靈總百蠻之君攬城郭之兵出百死入絶域遂蹈康居屠三重城搴歙侯之旗斬郅支之首縣旌萬里之外揚威昆山之西掃谷吉之恥立昭明之功萬夷懾伏莫不懼震呼韓邪單于見郅支已誅且喜且懼鄉風馳義稽首來賔願守北藩纍世稱臣立千載之功建萬世之安羣臣之勳莫大焉昔周大夫方叔吉甫為宣王誅獫狁而百蠻從其詩曰嘽嘽焞焞如霆如雷顯允方叔征伐獫狁蠻荆來威易曰有嘉折首獲匪其醜言美誅首惡之人而諸不順者皆來從也今延夀湯所誅震雖易之折首詩之雷霆不能及也論大功者不録小過舉大美者不疵細瑕司馬法曰軍賞不踰月欲民速得為善之利也蓋急武功重用人也吉甫之歸周厚賜之其詩曰吉甫宴喜既多受祉來歸自鎬我行永久千里之鎬猶以為逺况萬里之外其勤至矣延夀湯既未獲受祉之報反屈捐命之功久挫於刀筆之前非所以勸有功厲戎士也昔齊桓前有尊周之功後有滅項之罪君子以功覆過而為之諱二師將軍李廣利捐五萬之師靡億萬之費經四年之勞而僅獲駿馬三十匹雖斬宛王母寡之首猶不足以復費其私罪惡甚多孝武以為萬里征伐不録其過遂封拜兩侯三卿二千石百有餘人今康居之國強於大宛郅支之號重於宛王殺使者罪甚於留馬而延夀湯不煩漢士不費斗糧比於二師功德百之且常惠隨欲擊之烏孫鄭吉迎自來之日逐猶皆裂土受爵故言威武勤勞則大於方叔吉甫列功覆過則優於齊桓二師近事之功則髙於安逺長羅而大功未著小惡數布臣竊痛之宜以時解縣通籍除過勿治尊寵爵位以勸有功於是天子下詔赦延夀湯罪勿治令公卿議封焉議者以為宜如軍法捕斬單于令厈衡石顯以為郅支本亡逃失國竊號絶域非真單于帝取安逺侯鄭吉故事封千户衡顯復爭夏四月戊辰封延夀為義成侯賜湯爵關內侯食邑各三百户加賜黃金百斤拜延夀為長水校尉湯為射聲校尉成帝建始二年胸奴呼韓邪單于嬖左伊秩訾兄女二人長女顓渠閼氏生二子長曰且莫車次曰囊知牙斯少女為大閼氏生四子長曰雕陶莫臯次曰且糜胥皆長於且莫車少子咸樂二人皆小於囊知牙斯又它閼氏子十餘人顓渠閼氏貴且莫車愛呼韓邪病且死欲立且莫車顓渠閼氏曰胸奴亂十餘年不絶如髮賴蒙漢力故得復安今平定未久人民創艾戰鬬且莫車年少百姓未附恐復危國我與大閼氏一家共子不如立雕陶莫臯大閼氏曰且莫車雖少大臣共持國事今舍貴立賤後世必亂單于卒從顓渠閼氏計立雕陶莫臯約令傳國與弟呼韓邪死雕陶莫臯立為復株纍若鞮單于復株纍若鞮單于以且麋胥為左賢王且莫車為左谷蠡王囊知牙斯為右賢王復株纍單于復妻王昭君生二女長女云為須卜居次小女為當于居次四年上即位之初丞相匡衡復奏射聲校尉陳湯以吏二千石奉使顓命蠻夷中不正身以先下而盜所收康居財物戒官屬曰絶域事不覆校雖在赦前不宜處位湯坐免後湯上言康居王侍子非王子按驗實王子也湯下獄當死太中大夫谷永上疏訟湯曰臣聞楚有子玉得臣文公為之仄席而坐趙有亷頗馬服強秦不敢窺兵井陘近漢有郅都魏尚胸奴不敢南鄉沙幕由是言之戰克之將國之瓜牙不可不重也蓋君子聞鼓鼙之聲則思將帥之臣竊見關內侯陳湯前斬郅支威震百蠻武暢西海漢元以來征伐方外之將未嘗有也今湯坐言事非是幽囚久繫歷時不決執憲之吏欲致之大辟昔白起為秦將南拔郢都北坑趙括以纎介之過賜死杜郵秦民憐之莫不隕涕今湯親秉鉞席卷喋血萬里之外薦功祖廟告類上帝介胄之士靡不慕義以言事為罪無赫赫之惡周書曰記人之功忘人之過宜為君者也夫犬馬有勞於人尚加帷蓋之報况國之功臣者哉竊恐陛下忽於鼙鼓之聲不察周書之意而忘帷蓋之施庸臣遇湯卒從吏議使百姓介然有秦民之恨非所以厲死難之臣也書奏天子出湯奪爵為士伍河平元年胸奴單于遣右臯林王伊邪莫演等奉獻朝正月二年春伊邪莫演罷歸自言欲降即不受我我自殺終不敢還歸使者以聞下公卿議議者或言宜如故事受其降光祿大夫谷永議郎杜欽以為漢興胸奴數為邉害故設金爵之賞以待降者今單于屈體稱臣列為北藩遣使朝賀無有二心漢家接之宜異於往時今既享單于聘貢之質而更受其逋逃之臣是貪一夫之得而失一國之心擁有罪之臣而絶慕義之君也假令單于初立欲委身中國未知利害私使伊邪莫演詐降以卜吉凶受之虧德沮善令單于自疏不親邉吏或者設為反間欲因而生隙受之適合其䇿使得歸曲而責直此誠邉境安危之原師旅動靜之首不可不詳也不如勿受以昭日月之信抑詐諼之謀懷附親之心便對奏天子從之遣中郎將王舜往問降狀伊邪莫演曰我病狂妄言耳遣去歸到官位如故不肯令見漢使四年春正月胸奴單于來朝元延元年胸奴搜諧單于將入朝未入塞病死弟且莫車立為車牙若鞮單于以囊知牙斯為左賢王綏和元年秋八月胸奴車牙單于死弟囊知牙斯立為烏珠留若鞮單于烏珠留單于立以弟樂為左賢王興為右賢王漢遣中郎將夏侯藩副校尉韓容使胸奴或説王根曰胸奴有斗入漢地直張掖郡生奇材木箭竿鷲羽如得之於邉甚饒國家有廣地之實將軍顯功垂於無窮根為上言其利上直欲從單于求之為有不得傷命損威根即但以上指曉藩令從藩所説而求之藩至胸奴以語次説單于曰竊見胸奴斗入漢地直張掖郡漢三都尉居塞上士卒數百人寒苦候望久勞單于宜上書獻此地直斷割之省兩都尉士卒數百人以復天子厚恩其報必大單于曰此天子詔語邪將從使者所求也藩曰詔指也然藩亦為單于畫善計耳單于曰此溫偶駼王所居地也未曉其形狀所生請遣使問之藩容歸漢後復使胸奴至則求地單于曰父兄傳五世漢不求此地至知獨求何也已問溫偶駼王胸奴西邉諸侯作穹廬及車皆仰此山材木且先父地不敢失也藩還遷為太原太守單于遣使上書以藩求地狀聞詔報單于曰藩擅稱詔從單于求地法當死更大赦二今徙藩為濟南太守不令當胸奴哀帝建平四年秋八月胸奴單于上書願朝五年時帝被疾或言胸奴從上遊來厭人自黃龍竟寧時單于朝中國輒有大故上由是難之以問公卿亦以為虛費府帑可且勿許單于使辭去未發黃門郎楊雄上書諫曰臣聞六經之治貴於未亂兵家之勝貴於未戰二者皆微然而大事之本不可不察也今單于上書求朝國家不許而辭之臣愚以為漢與胸奴從此隙矣胸奴本五帝所不能臣三王所不能制其不可使隙明甚臣不敢逺稱請引秦以來明之以秦始皇之強蒙恬之威然不敢窺西河乃築長城以界之會漢初興以高祖之威靈三十萬衆困於平城時奇譎之士石畫之臣甚衆卒其所以脫者世莫得而言也又髙皇后時胸奴悖慢大臣權書遺之然後得解及孝文時胸奴侵暴北邉候騎至雍甘泉京師大駭發三將軍屯細栁棘門霸上以備之數月乃罷孝武即位設馬邑之權欲誘胸奴徒費財勞師一虜不可得見况單于之面乎其後深惟社稷之計規恢萬載之䇿乃大興師數十萬使衛青霍去病操兵前後十餘年於是浮西河絶大幕破置顔襲王庭窮極其地追奔逐北封狼居胥山禪於姑衍以臨翰海虜名王貴人以百數自是之後胸奴震怖益求和親然而未肯稱臣也且夫前世豈樂傾無量之費役無罪之人快心於狼望之北哉以為不一勞者不久佚不暫費者不永寧是以忍百萬之師以摧餓虎之喙運府庫之財填盧山之壑而不悔也至本始之初胸奴有桀心欲掠烏孫侵公主乃發五將之師十五萬騎以擊之時鮮有所獲徒奮揚威武明漢兵若雷風耳雖空行空反尚誅兩將軍故北狄不服中國未得髙枕安寢也逮至元康神爵之間大化神明鴻恩溥洽而胸奴內亂五單于爭立日逐呼韓邪攜國歸死扶伏稱臣然尚羈縻之計不顓制自此之後欲朝者不距不欲者不強何者外國天性忿鷙形容魁健負力怙氣難化以善易肄以惡其強難詘其和難得故未服之時勞師逺攻傾國殫貨伏尸流血破堅拔敵如彼之難也既服之後慰薦撫循交接賂遺威儀俯仰如此之備也往時嘗屠大宛之城蹈烏桓之壘探姑繒之壁藉蕩妲之場艾朝鮮之旃拔兩越之旗近不過旬月之役逺不離二時之勞固已犂其庭掃其閭郡縣而置之雲徹席卷後無餘災唯北狄為不然真中國之堅敵也三垂比之縣矣前世重之兹甚未易可輕也今單于歸義懷款誠之心欲離其庭陳見於前此乃上世之遺䇿神靈之所想望國家雖費不得已者也奈何距以來厭之辭踈以無日之期消往昔之恩開將來之隙夫疑而隙之使有恨心負前言緣往辭歸怨於漢因以自絶終無北靣之心威之不可諭之不能焉得不為大憂乎夫明者視於無形聰者聽於無聲誠先於未然即兵革不用而憂患不生不然一有隙之後雖智者勞心於內辨者轂擊於外猶不若未然之時也且往者圖西域制車師置城郭都護三十六國費嵗以大萬計者豈為康居烏孫能踰白龍堆而寇西邉哉乃以制胸奴也夫百年勞之一日失之費十而愛一臣竊為國不安也唯陛下少留意於未亂未戰以遏邉萌之禍書奏天子寤焉召還胸奴使者更報單于書而許之賜雄帛五十匹黃金十斤單于未發會病復遣使願朝明年上許之元夀二年春正月胸奴單于來朝自黃龍以來單于每入朝其賞賜錦繡繒絮輒加厚於前以慰接之恭顯用事漢宣帝黃龍元年三月帝寢疾選大臣可屬者引外屬侍中樂陵侯史髙太子太傅蕭望之少傅周堪至禁中拜髙為大司馬車騎將軍望之為前將軍光祿勳堪為光祿大夫皆受遺詔輔政領尚書事冬十二月甲戌帝崩于未央宮癸巳太子即皇帝位元年初元元年三月封外祖父平恩戴侯同産弟子中常侍許嘉為平恩侯二年樂陵侯史髙以外屬領尚書事前將軍蕭望之光祿大夫周堪為之副望之名儒與堪皆以師傅舊恩天子任之數宴見言治亂陳王事望之選白宗室明經有行散騎諫大夫劉更生給事中與侍中金敞並拾遺左右四人同心謀議勸導上以古制多所欲匡正上甚鄉納之史髙充位而已由此與望之有隙中書令弘恭僕射石顯自宣帝時久典樞機明習文法帝即位多疾以顯久典事中人無外黨精專可信任遂委以政事無小大因顯白決貴幸傾朝百僚皆敬事顯顯為人巧慧習事能深得人主微指內深賊持詭辨以中傷人忤恨睚眥輒被以危法亦與車騎將軍髙為表裏論議常獨持故事不從望之等望之等患苦許史放縱又疾恭顯擅權建白以為中書政本國家樞機宜以通明公正處之武帝遊宴後庭故用宦者非古制也宜罷中書宦官應古不近刑人之義由是大與髙恭顯忤上初即位謙讓重改作議久不定出劉更生為宗正望之堪數薦名儒茂材以備諫官會稽鄭朋隂欲附望之上疏言車騎將軍髙遣客為姦利郡國及言許史子弟罪過章視周堪堪白令朋待詔金馬門朋奏記望之曰今將軍規橅云若管晏而休遂行日昊至周召乃留乎若管晏而休則下走將歸延陵之臯沒齒而已矣如將軍興周召之遺業親日升之兼聽則下走其庶幾願竭區區奉萬分之一望之始見朋接待以意後知其傾邪絶不與通朋楚士怨恨更求入許史推所言許史事曰皆周堪劉更生教我我關東人何以知此於是侍中許章白見朋朋出揚言曰我見言前將軍小過五大罪一待詔華龍行汙穢欲入堪等堪等不納亦與朋相結恭顯令二人告望之等謀欲罷車騎將軍疏退許史狀侯望之出休日令朋龍上之事下弘恭問狀望之對曰外戚在位多奢淫欲以匡正國家非為邪也恭顯奏望之堪更生朋黨相稱舉數譖訴大臣毁離親戚欲以專擅權藝為臣不忠誣上不道請謁者召致廷尉時上初即位不省召致廷尉為下獄也可其奏後上召堪更生曰繫獄上大驚曰非但廷尉問邪以責恭顯皆叩頭謝上曰令出視事恭顯因使史髙言上新即位未以德化聞於天下而先驗師傅既下九卿大夫獄宜因決免於是制詔丞相御史前將軍望之傅朕八年無它罪過今事久逺識忘難明其赦望之罪收前將軍光祿勳印綬及堪更生皆免為庶人夏四月詔賜蕭望之爵關內侯給事中朝朔望上復徵周堪劉更生欲以為諫大夫弘恭石顯白皆以為中郎上器重蕭望之不已欲倚以為相恭顯及許史子弟侍中諸曹皆側目於望之等更生乃使其外親上變事言地震殆為恭等不為三獨夫動臣愚以為宜退恭顯以章蔽善之罰進望之等以通賢者之路如此太平之門開災異之原塞矣書奏恭顯疑其更生所為白請考姦詐辭果服遂逮更生繫獄免為庶人會望之子散騎中郎伋亦上書訟望之前事事下有司復奏望之前所坐明白無譖訴者而教子上書稱引亡辜之詩失大臣體不敬請逮捕弘恭石顯等知望之素髙節不詘辱建白望之前幸得不坐復賜爵邑不悔過服罪深懷怨望教子上書歸非於上自以託師傅終必不坐非頗屈望之於牢獄塞其怏怏心則聖朝無以施恩厚上曰蕭太傅素剛安肯就吏顯等曰人命至重望之所坐語言薄罪必無所憂上乃可其奏冬十二月顯等封詔以付謁者敕令召望之手付因令太常急發執金吾車騎馳圍其第使者至召望之望之以問門下生魯國朱雲雲者好節士勸望之自裁於是望之仰天歎曰吾嘗備位將相年踰六十矣老入牢獄茍求生活不亦鄙乎字謂雲曰遊趣和藥來無久留我死竟飲鴆自殺天子聞之驚拊手曰曩固疑其不就牢獄果然殺吾賢傅是時太官方上晝食上乃郤食為之涕泣哀動左右於是召顯等責問以議不詳皆免冠謝良久然後已上追念望之不忘每嵗時遣使者祠祭望之冡終帝之世臣光曰甚矣孝元之為君易欺而難寤也夫恭顯之譖訴望之其邪説詭計誠有所不能辨也至於始疑望之不肯就獄恭顯以為必無憂已而果自殺則恭顯之欺亦明矣在中智之君孰不感動奮發以底邪臣之罰孝元則不然雖涕泣不食以傷望之而終不能誅恭顯才得其免冠謝而已如此則姦臣安所懲乎是使恭顯得肆其邪心而無復忌憚者也是嵗弘恭病死石顯為中書令三年上復擢周堪為光祿勳堪弟子張猛為光祿大夫給事中大見信任永光元年石顯憚周堪張猛等數譖毁之劉更生懼其傾危上書曰臣聞舜命九官濟濟相讓和之至也衆臣和於朝則萬物和於野故簫韶九成而鳯凰來儀至周幽厲之際朝廷不和轉相非怨則日月薄食水泉沸騰山谷易處霜降失節由此觀之和氣致祥乖氣致異祥多者其國安異衆者其國危天地之常經古今之通義也今陛下開三代之業招文學之士優遊寬容使得並進今賢不肖渾殽白黑不分邪正雜揉忠讒並進章交公車人滿北軍朝臣舛午膠戾乖刺更相讒訴轉相是非所以營惑耳目感移心意不可勝載分曹為黨往往羣朋將同心以陷正臣正臣進者治之表也正臣陷者亂之機也乘治亂之機未知孰任而災異數見此臣所以寒心者也初元以來六年矣按春秋六年之中災異未有稠如今者也原其所以然者由讒邪並進也讒邪之所以並進者由上多疑心既已用賢人而行善政如或譖之則賢人退而善政還矣夫藝狐疑之心者來讒賊之口持不斷之意者開羣枉之門讒邪進則衆賢退羣枉盛則正士消故易有否泰小人道長君子道消則政日亂君子道長小人道消則政日治昔者鯀共工歡兜與舜禹雜處堯朝周公與管蔡並居周位當是時迭進相毁流言相謗豈可勝道哉帝堯成王能賢舜禹周公而消共工管蔡故以大治榮華至今孔子與季孟偕仕於魯李斯與叔孫俱宦於秦定公始皇賢季孟李斯而消孔子叔孫故以大亂汙辱至今故治亂榮辱之端在所信任信任既賢在於堅固而不移詩云我心匪石不可轉也言守善篤也易曰渙汗其大號言號令如汗汗出而不反者也今出善令未能踰時而反是反汗也用賢未能三旬而退是轉石也論語曰見不善如探湯今二府奏佞讇不當在位歷年而不去故出令則如反汗用賢則如轉石去佞則如拔山如此望隂陽之調不亦難乎是以羣小窺見間隙緣飾文字巧言醜詆流言飛文譁於民間故詩云憂心悄悄愠于羣小小人成羣誠足愠也昔孔子與顏淵子貢更相稱譽不為朋黨禹稷與臯陶傳相汲引不為比周何則忠於為國無邪心也今佞邪與賢臣並交戟之內合黨共謀違善依惡歙歙訿訿數設危險之言欲以傾移主上如忽然用之此天地之所以先戒災異之所以重至者也自古明聖未有無誅而治者也故舜有四放之罰而孔子有兩觀之誅然後聖化可得而行也今以陛下明知誠深思天地之心覽否泰之卦厯周唐之所進以為法原秦魯之所消以為戒考祥應之福災異之禍以揆當世之變放逺佞邪之黨壞散險詖之聚杜閉羣枉之門廣開衆正之路決斷狐疑分别猶豫使是非炳然可知則百異消滅而衆祥並至太平之基萬世之利也顯見其書愈與許史比而怨更生等是嵗夏寒日青無光顯及許史皆言堪猛用事之咎上內重堪又患衆口之寖潤無所取信時長安令楊興以材能幸常稱譽堪上欲以為助乃見問興朝臣齗齗不可光祿勳何邪興者傾巧士謂上疑堪因順指曰堪非獨不可於朝廷自州里亦不可也臣見衆人聞堪前與劉更生等謀毁骨肉以為當誅故臣前書言堪不可誅傷為國飬恩也上曰然此何罪而誅今宜奈何興曰臣愚以為可賜爵關內侯食邑三百户勿令典事明主不失師傅之恩此最䇿之得也上於是疑之司隸校尉琅邪諸葛豐始以特立剛直著名於朝數侵犯貴戚在位多言其短後坐春夏繫治人徙城門校尉豐於是上書告堪猛罪上不直豐乃制詔御史城門校尉豐前與光祿勳堪光祿大夫猛在朝之時數稱言堪猛之美豐前為司隸校尉不順四時修法度專作苛暴以獲虛威朕不忍下吏以為城門校尉不內省諸已而反怨堪猛以求報舉告按無證之辭暴揚難驗之罪毁譽恣意不顧前言不信之大也朕憐豐之耆老不忍加刑其免為庶人又曰豐言堪猛貞信不立朕閔而不治又惜其材能未有所效其左遷堪為河東太守猛槐里令臣光曰諸葛豐之於堪猛前譽而後毁其志非為朝廷進善而去姦也欲比周求進而已矣斯亦鄭朋楊興之流烏在其為剛直哉人君者察美惡辨是非賞以勸善罰以懲姦所以為治也使豐言得實則豐不當絀若其誣罔則堪猛何辜焉今兩責而俱棄之則美惡是非果何在哉賈捐之與楊興善捐之數短石顯以故不得官稀復進見興新以材能得幸捐之謂興曰京兆尹缺使我得見言君蘭京兆尹可立得興曰君房下筆言語妙天下使君房為尚書令勝五鹿充宗逺甚捐之曰令我得代充宗君蘭為京兆京兆郡國首尚書百官本天下真大治士則不隔矣捐之復短石顯興曰顯方貴上信用之今欲進第從我計且與合意即得入矣捐之即與興共為薦顯奏稱譽其美以為宜賜爵關內侯引其兄弟以為諸曹又共為薦興奏以為可試守京兆尹石顯聞知白之上乃下興捐之獄令顯治之奏興捐之懷詐偽更相薦譽欲得大位罔上不道捐之竟坐棄市興髠鉗為城旦臣光曰君子以正攻邪猶懼不克况捐之以邪攻邪其能免乎四年夏六月戊寅晦日有食之上於是召諸前言日變在周堪張猛者責問皆稽首謝因下詔稱堪之美徵詣行在所拜為光祿大夫秩中二千石領尚書事猛復為太中大夫給事中中書令石顯管尚書尚書五人皆其黨也堪希得見常因顯白事事決顯口會堪疾瘖不能言而卒顯誣譖猛令自殺於公車建昭二年六月東郡京房學易於梁人焦延夀延夀常曰得我道以亡身者京生也其説長於災變分六十卦更直日用事以風雨寒溫為侯各有占驗房用之尤精以孝亷為郎上疏屢言災異有驗天子説之數召見問房對曰古帝王以功舉賢則萬化成瑞應著末世以毁譽取人故功業廢而致災異宜令百官各試其功災異可息詔使房作其事房奏考功課吏法上令公卿朝臣與房會議溫室皆以房言煩碎令上下相司不可許上意鄉之時部刺史奏事京師上召見諸刺史令房曉以課事刺史復以為不可行唯御史大夫鄭弘光祿大夫周堪初言不可後善之是時中書令石顯顓權顯友人五鹿充宗為尚書令二人用事房嘗宴見問上曰幽厲之君何以危所任者何人也上曰君不明而所任者巧佞房曰知其巧佞而用之邪將以為賢也上曰賢之房曰然則今何以知其不賢也上曰以其時亂而君危知之房曰若是任賢必治任不肖必亂必然之道也幽厲何不覺寤而更求賢曷為卒任不肖以至於是上曰臨亂之君各賢其臣令皆覺寤天下安得危亡之君房曰齊桓公秦二世亦嘗聞此君而非笑之然則任豎刁趙髙政治日亂盜賊滿山何不以幽厲卜之而覺寤乎上曰唯有道者能以往知來耳房因免冠頓首曰春秋紀二百四十二年災異以示萬世之君今陛下即位已來日月失明星辰逆行山崩泉涌地震石隕夏霜冬靁春凋秋榮隕霜不殺水旱螟蟲民人飢疫盜賊不禁刑人滿市春秋所記災異盡備陛下視今為治邪亂邪上曰亦極亂耳尚何道房曰今所任用者誰與上曰然幸其愈於彼又以為不在此人也房曰夫前世之君亦皆然矣臣恐後之視今猶今之視前也上良久乃曰今為亂者誰哉房曰明主宜自知之上曰不知也如知何故用之房曰上最所信任與圖事帷幄之中進退天下之士者是矣房指謂石顯上亦知之謂房曰已喻房罷出後上亦不能退顯也臣光曰人君之德不明則臣下雖欲竭忠何自而入乎觀京房之所以曉孝元可謂明白切至矣而終不能寤悲夫詩曰匪面命之言提其耳匪手擕之言示之事又曰誨爾諄諄聽我藐藐孝元之謂矣上令房上弟子曉知考功課吏事者欲試用之房上中郎任良姚平願以為刺史試考功法臣得通籍殿中為奏事以防壅塞石顯五鹿充宗皆疾房欲逺之建言宜試以房為郡守帝於是以房為魏郡太守得以考功法治郡房自請嵗竟乘傳奏事天子許焉房自知數以論議為大臣所非與石顯等有隙不欲逺離左右乃上封事曰臣出之後恐為用事所蔽身死而功不成故願嵗盡乘傳奏事蒙哀見許乃辛巳蒙氣復乘卦太陽侵色此上大夫覆陽而上意疑也己卯庚辰之間必有欲隔絶臣令不得乘傳奏事者房未發上令陽平侯王鳳承制詔房止無乘傳奏事房意愈恐秋房去至新豐因郵上封事曰臣前以六月中言遁卦不效法曰道人始去寒涌水為災至其七月涌水出臣弟子姚平謂臣曰房可謂知道未可謂信道也房言災異未嘗不中涌水已出道人當逐死尚復何言臣曰陛下至仁於臣尤厚雖言而死臣猶言也平又曰房可謂小忠未可謂大忠也昔秦時趙高用事有正先者非刺髙而死髙威自此成故秦之亂正先趣之今臣得出守郡自詭效功恐未效而死惟陛下毋使臣塞涌水之異當正先之死為姚平所笑房至陜復上封事曰臣前白願出任良試考功臣得居內議者知如此於身不利臣不可蔽故云使弟子不若試師臣為刺史又當奏事故復云為刺史恐太守不與同心不若以為太守此其所以隔絶臣也陛下不違其言而遂聼之此乃蒙氣所以不解太陽無色者也臣去稍逺太陽侵色益甚唯陛下毋難還臣而易逆天意邪説雖安于人天氣必變故人可欺天不可欺也願陛下察焉房去月餘竟徵下獄初淮陽憲王舅張博傾巧無行多從王求金錢欲為王求入朝博從京房學以女妻房房每朝見退輒為博道其語博因記房所説密語令房為王作求朝奏草皆持東與王以為信驗石顯知之告房與張博通謀非謗政治歸惡天子詿誤諸侯王皆下獄棄市妻子徙邊鄭弘坐與房善免為庶人御史中丞陳咸數毁石顯久之坐與槐里令朱雲善漏泄省中語石顯微伺知之與雲皆下獄髠為城旦石顯威權日盛公卿以下畏顯重足一迹顯與中書僕射牢梁少府五鹿充宗結為黨友諸附倚者皆得寵位民歌之曰牢邪石邪五鹿客邪印何纍纍綬若若邪顯內自知擅權事柄在掌握恐天子一旦納用左右耳目以間已乃時歸誠取一信以為驗顯嘗使至諸官有所徵發顯先自白恐後漏盡宮門閉請使詔吏開門上許之顯故投夜還稱詔開門入後果有上書告顯顓命矯詔開宮門天子聞之笑以其書示顯顯因泣曰陛下過私小臣屬任以事羣下無不嫉妬欲陷害臣者事類如此非一唯獨明主知之愚臣微賤誠不能以一軀稱快萬衆任天下之怨臣願歸樞機職受後宮掃除之役死無所恨唯陛下哀憐財幸以此全活小臣天子以為然而憐之數勞勉顯加厚賞賜賞賜及賂遺訾一萬萬初顯聞衆人胸胸言已殺前將軍蕭望之恐天下學士訕已以諫大夫貢禹明經著節乃使人致意深自結納因薦禹天子歷位九卿禮事之甚備議者於是或稱顯以為不妬譛望之矣顯之設變詐以自解免取信人主者皆此類也荀悅曰夫侫臣之惑君主也甚矣故孔子曰逺佞人非但不用而已乃逺而絶之隔塞其源戒之極也孔子曰政者正也夫要道之本正己而已矣平直真實者正之主也故德必核其真然後授其位能必核其真然後授其事功必核其真然後授其賞罪必核其真然後授其刑行必核其真然後貴之言必核其真然後信之物必核其真然後用之事必核其真然後修之故衆正積於上萬事實於下先王之道如斯而已矣竟寧元年初石顯見馮奉世父子為公卿著名女又為昭儀在內顯心欲附之薦言昭儀兄謁者逡修敕宜侍幄帷天子召見欲以為侍中逡請間言事上聞逡言顯顓權大怒罷逡歸郎官及御史大夫缺在位多舉逡兄大鴻臚野王上使尚書選第中二千石而野王行能第一上以問顯顯曰九卿無出野王者然野王親昭儀兄臣恐後世必以陛下度越衆賢私後宮親以為三公上曰善吾不見是因謂羣臣曰吾用野王為三公後世必謂我私後宮親屬以野王為比三月丙寅詔曰剛疆堅固確然亡欲大鴻臚野王是也心辨善辭可使四方少府五鹿充宗是也亷潔節儉太子少傅張談是也其以少傅為御史大夫夏五月壬辰帝崩于未央宮六月己未太子即皇帝位成帝建始元年春正月石顯遷長信中太僕秩中二千石顯既失倚離權於是丞相御史條奏顯舊惡及其黨牢梁陳順皆免官顯與妻子徙歸故郡憂悶不食道死諸所交結以顯為官者皆廢罷少府五鹿充宗左遷玄菟太守御史中丞伊嘉為鴈門都尉司隸校尉涿郡王尊劾奏丞相衡御史大夫談知顯等顓權擅藝大作威福為海內患害不以時白奏行罰而阿諛曲從附下罔上懷邪迷國無大臣輔政之義皆不道在赦令前赦後衡談舉奏顯不自陳不忠之罪而反揚著先帝任用傾覆之徒妄言百官畏之甚於主上卑君尊臣非所宜稱失大臣體於是衡慙懼免冠謝罪上丞相侯印綬天子以新即位重傷大臣乃左遷尊為髙陵令然羣下多是尊者衡默默不自安每有水旱連乞骸骨讓位上輒以詔書慰撫不許成帝淫荒元帝竟寧元年六月乙未成帝即皇帝位秋七月丞相衡上疏曰臣聞之師曰妃匹之際生民之始萬福之原婚姻之禮正然後品物遂而天命全孔子論詩以關雎為始此綱紀之首王教之端也自上世已來三代興廢未有不由此也願陛下詳覽得失盛衰之效以定大基采有德戒聲色近嚴敬逺技能臣聞六經者聖人所以統天地之心著善惡之歸明吉凶之分通人道之正使不悖於本性者也及論語孝經聖人言行之要宜究其意成帝建始二年上自為太子時以好色聞及即位皇太后詔采良家女以備後宮大將軍武庫令杜欽説王鳳曰禮一娶九女所以廣嗣重祖也娣姪雖缺不復補所以飬夀塞爭也故后妃有真淑之行則胤嗣有賢聖之君制度有威儀之節則人君有夀考之福廢而不由則女德不厭女德不厭則夀命不究於髙年男子五十好色未衰婦人四十容貌改前以改前之容侍於未衰之年而不以禮為制則其原不可救而後徠異態後徠異態則正后自疑而支庶有間適之心是以晉獻被納讒之謗申生蒙無罪之辜今聖主富於春秋未有適嗣方鄉術入學未親后妃之議將軍輔政宜因始初之隆建九女之制詳擇有行義之家求淑女之質母必有聲色技能為萬世大法夫少戒之在色小辨之作可為寒心唯將軍常以為憂鳳白之太后太后以為故事無有鳳不能自立法度循故事而已鳳素重欽故置之莫府國家政謀常與欽慮之數稱達名士裨正闕失當世善政多出於欽者三年十二月戊申朔日有食之其夜地震未央宮殿中詔舉賢良方正能直言極諫之士杜欽及太常丞谷永上對皆以為後宮女寵太盛嫉妬專上將害繼嗣之咎河平元年夏四月己亥晦日有食之詔公卿百僚陳過失無有所諱大赦天下光祿大夫劉向對曰四月交於五月月同孝惠日同孝昭其占恐害繼嗣是時許皇后專寵後宫希得進見中外皆憂上無繼嗣故杜欽谷永及向所對皆及之上於是減省椒房掖廷用度服御輿駕所發諸官署及所造作遺賜外家羣臣妾皆如竟寧以前故事皇后上疏自陳以為時世異制長短相補不出漢制而已纎微之間未必可同若竟寧前與黃龍前豈相放哉家吏不曉今一受詔如此且使妾搖手不得設妾欲作某屏風張於某所曰故事無有或不能得則必繩妾以詔書矣此誠不可行唯陛下省察故事以特牛祠大父母戴侯敬侯皆得蒙恩以太牢祠今當率如故事唯陛下哀之今吏甫受詔讀記直豫言使后知之非可復若私府有所取也其萌芽所以約制妾者恐失人理唯陛下深察焉上於是采谷永劉向所言災異咎驗皆在後宮之意以報之且曰吏拘於法亦安足過蓋矯枉者過直古今同之且財幣之省特牛之祠其於皇后所以扶助德美為華寵也咎根不除災變相襲祖宗且不血食何戴侯也傳不云乎以約失之者鮮審皇后欲從其奢與朕亦當法孝武皇帝也如此則甘泉建章可復興矣孝文皇帝朕之師也皇太后皇后成法也假使太后在彼時不如職今見親厚又惡可以踰乎皇后其刻心秉德謙約為右垂則列妾使有法焉鴻嘉元年二月上始為微行從期門郎或私奴十餘人或乘小車或皆騎出入市里郊野逺至旁縣甘泉長楊五柞鬬雞走馬常自稱富平侯家人富平侯者張安世四世孫放也放父臨尚敬武公主生放放為侍中中郎將娶許皇后女弟當時寵幸無比故假稱之二年春三月博士行大射禮有飛雉集于庭歷階登堂而雊後雉又集大常宗正丞相御史大夫車騎將軍之府又集未央宮承明殿屋上車騎將軍王音待詔寵等上言天地之氣以類相應譴告人君甚微而著雉者聽察先聞雷聲故月令以紀氣經載髙宗雊雉之異以明轉禍為福之驗今雉以博士行禮之日大衆聚會飛集於庭歷階登堂萬衆睢睢驚怪連日徑歷三公之府太常宗正典宗廟骨肉之官然後入宮其宿留告曉人具備深切雖人道相戒何以過是後帝使中常侍鼂閎詔音曰聞捕得雉毛羽頗摧折類拘執者得無人為之音復對曰陛下安得亡國之語不知誰主為佞讇之計誣亂聖德如此者左右阿諛甚衆不待臣音復讇而足公卿以下保位自守莫有正言如令陛下覺寤懼大禍且至身深責臣下繩以聖法臣音當先誅豈有以自解哉今即位十五年繼嗣不立日日駕車而出失行流聞海內傳之甚於京師外有微行之害內有疾病之憂皇天數見災異欲人變更終已不改天尚不能感動陛下臣子何望獨有極言待死命在朝暮而已如有不然老母安得處所尚何皇太后之有髙祖天下當以誰屬乎宜謀於賢智克己復禮以求天意繼嗣可立災變尚可銷也三年初許皇后與班偼妤皆有寵於上上嘗逰後庭欲與倢妤同輦載偼妤辭曰觀古圖畫賢聖之君皆有名臣在側三代末主乃有嬖妾今欲同輦得無近似之乎上善其言而止太后聞之喜曰古有樊姬今有班偼妤班偼妤進侍者李平得幸亦為偼妤賜姓曰衛其後上微行過陽阿主家恱歌舞者趙飛燕召入宮大幸有女弟復召入姿性尤醲粹左右見之皆嘖嘖嗟賞有宣帝時披香博士淖方成在帝後唾曰此禍水也滅火必矣姊弟俱為偼妤貴傾後宮許皇后班偼妤皆失寵於是趙飛燕譛告許皇后班偼妤挾媚道祝詛後宮詈及主上冬十一月甲寅許后廢處昭臺宮后姊謁等皆誅死親屬歸故郡考問班捷妤偼妤對曰妾聞死生有命富貴在天修正尚未蒙福為邪欲以何望使鬼神有知不受不臣之訴如其無知訴之何益故不為也上善其對赦之賜黃金百斤趙氏姊弟驕妬偼妤恐久見危乃求共養太后於長信宮上許焉永始元年春正月上欲立趙偼妤為皇后皇太后嫌其所出微甚難之太后姊子淳于長為侍中數往來通語東宮歲餘乃得太后指許之夏四月乙亥上先封偼妤父臨為成陽侯諫大夫河間劉輔上書言昔武王周公承順天地以饗魚烏之瑞然猶君臣祗懼動色相戒况於季世不蒙繼嗣之福屢受威怒之異者呼雖夙夜自責改過易行畏天命念祖業妙選有德之世考卜窈窕之女以承宗廟順神祗心塞天下望子孫之祥猶恐晚暮今乃觸情縱欲傾於卑賤之女欲以母天下不畏于天不愧于人惑莫大焉里語曰腐木不可以為柱人婢不可以為主天人之所不豫必有禍而無福市道皆共知之朝廷莫肯一言臣竊傷心不敢不盡死書奏上使侍御史收縳輔繫掖庭祕獄羣臣莫知其故於是左將軍辛慶忌右將軍亷褒光祿勳琅邪師丹太中大夫谷永俱上書曰竊見劉輔前以縣令求見擢為諫大夫此其言必有卓詭切至當聖心者故得拔至於此旬月之間收下祕獄臣等愚以為輔幸得託公族之親在諫臣之列新從下土來未知朝廷體獨觸忌諱不足深過小罪宜隱忍而已如有大惡宜暴治理官與衆共之今天心未豫災異屢降水旱迭臻方當隆寬廣問褒直盡下之時也而行慘急之誅於諫爭之臣震驚群下失忠直心假令輔不坐直言所坐不著天下不可戶曉同姓近臣本以言顯其於治親養忠之義誠不宜幽囚于掖庭獄公卿以下見陛下進用輔亟而折傷之暴人有懼心精鋭銷耎莫敢盡節正言非所以昭有虞之聽廣德美之風臣等竊深傷之唯陛下留神省察上乃徙繫輔共工獄減死罪一等論為鬼薪夏六月丙寅立皇后趙氏大赦天下皇后既立寵少衰而其女弟絶幸為昭儀居昭陽舍其中庭彤朱而殿上髹漆切皆銅沓黃金塗白玉階壁帶往往為黃金釭函藍田璧明珠翠羽飾之自後宮未嘗有焉趙后居别館多通侍郎宮奴多子者昭儀嘗謂帝曰妾姊性剛有如為人構陷則趙氏無種矣因泣下悽惻帝信之有白后姦狀者帝輒殺之由是后公為淫恣無敢言者然卒無子光祿大夫劉向以為王教由內及外自近者始於是採取詩書所載賢妃貞婦興國顯家及孽嬖亂亡者序次為列女傳凡八篇及采傳記行事著新序説苑凡五十篇奏之數上疏言得失陳法戒書數十上以助觀覽補遺闕上雖不能盡用然內嘉其言常嗟歎之二年谷永為涼州刺史奏事京師訖當之部上使尚書問永受所欲言永對曰臣聞王天下有國家者患在上有危亡之事而危亡之言不得上聞如使危亡之言輒上聞則商周不易姓而迭興三正不變改而更用夏商之將亡也行道之人皆知之晏然自以若天有日莫能危是故惡日廣而不自知大命傾而不自寤易曰危者有其安者也亡者保其存者也陛下誠垂寬明之聽無忌諱之誅使芻蕘之臣得盡所聞於前羣臣之上願社稷之長福也元年九月黑龍見其晦日有食之今年二月己未夜星隕乙酉日有食之六月之間大異四發二二而同月三代之末春秋之亂未嘗有也臣聞三代所以隕社稷喪宗廟者皆由婦人與群惡沈湎於酒秦所以二世十六年而亡者養生泰奢奉終泰厚也二者陛下兼而有之臣請略陳其效建始河平之際許班之貴傾動前朝熏灼四方女寵至極不可上矣今之後起什倍于前廢先帝法度聼用其言官秩不當縱釋王誅驕其親屬假之威權從橫亂政刺舉之吏莫敢奉憲又以掖庭獄大為亂阱榜箠慘於炮烙絶滅人命主為趙李報德復怨反除白罪逮治正吏多繫無辜掠立迫恐至為人起責分利受謝生入死出者不可勝數是以日食再既以昭其辜王者必先自絶然後天絶之陛下棄萬乘之至貴樂家人之賤事厭髙美之尊號好匹夫之卑字崇聚僄輕無義小人以為私客數離深宮之固挺身晨夜與羣小相隨烏集雜會醉飽吏民之家亂服共坐流湎媟嫚溷殽無别黽勉遁樂晝夜在路典門户奉宿衛之臣執干戈而守空宮公卿百僚不知陛下所在積數年矣王者以民為基民以財為本財竭則下畔下畔則上亡是以明王愛飬基本不敢窮極使民如承大祭今陛下輕奪民財不愛民力聼邪臣之計去髙敞初陵改作昌陵役百乾溪費擬驪山靡敝天下五年不成而後反故百姓愁恨感天飢饉仍臻流散冗食餧死於道以百萬數公家無一年之畜百姓無旬日之儲上下俱匱無以相救詩云殷監不逺在夏后之世願陛下追觀夏商周秦所以失之以鏡考已行有不合者臣當伏妄言之誅漢興九世百九十餘載繼體之主七皆承天順道遵先祖法度或以中興或以治安至於陛下獨違道縱欲輕身妄行當盛壯之隆無繼嗣之福有危亡之憂積失君道不合天意亦以多矣為人後嗣守人功業如此豈不負哉方今社稷宗廟禍福安危之機在於陛下陛下誠肯昭然逺寤專心反道舊愆畢改新德既章則赫赫大異庶幾可銷天命去就庶幾可復社稷宗廟庶幾可保唯陛下留神反覆熟省臣言帝性寬好文辭而溺於燕樂皆皇太后與諸舅夙夜所常憂至親難數言故推永等使因天變而切諫勸上納用之永自知有內應展意無所依違每言事輒見答禮至上此對上大怒衛將軍商密擲永令發去上使侍御史收永敕過交道廏者勿追御史不及永還上意亦解自悔上嘗與張放及趙李諸侍中共宴飲禁中皆引滿舉白談笑大噱時乘輿幄坐張畫屏風畫紂醉踞妲己作長夜之樂侍中光祿大夫班伯久疾新起上顧指畫而問伯曰紂為無道至於是呼對曰書云乃用婦人之言何有踞肆於朝所謂衆惡歸之不如是之甚者也上曰茍不若此此圖何戒對曰沈湎于酒微子所以告去也式號式呼大雅所以流連也詩書淫亂之戒其原皆在於酒上乃喟然歎曰吾久不見班生今日復聞讜言放等不懌稍自引起更衣因罷出時長信庭林表適使來聞見之後上朝東宮太后泣曰帝間顏色瘦黑班侍中本大將軍所舉宜寵異之益求其比以輔聖德宜遣富平侯且就國上曰諾上諸舅聞之以風丞相御史求放過失於是丞相宣御史大夫方進奏放驕蹇縱恣奢淫不制拒閉使者賊傷無辜從者支屬並乘權藝為暴虐請免放就國上不得已左遷放為北地都尉其後比年數有災變故放久不得還璽書勞問不絶敬武公主有疾詔徵放歸第視母疾數月主有瘳後復出放為河東都尉上雖愛放然上迫太后下用大臣故常涕泣而遣之元延元年秋七月有星孛于東井上以災變博謀羣臣北地太守谷永對曰王者躬行道德承順天地則五徵時序百姓夀考符瑞並降失道妄行逆天暴物則咎徵著郵妖孽並見飢饉荐臻終不改寤惡洽變􅊀不復譴告更命有德此天地之常經百王之所同也加以功德有厚薄期質有修短時世有中季天道有盛衰陛下承八世之功業當陽數之標季涉三七之節紀遭無妄之卦運直百六之災厄三難異科雜焉同會建始元年以來二十載間羣災大異交錯蜂起多於春秋所書內則為深宮後庭將有驕臣悍妾醉酒狂悖卒起之敗北宮苑囿街巷之中臣妾之家幽間之處徵舒崔杼之亂外則為諸夏下土將有樊並蘇令陳勝項梁奮臂之禍安危之分界宗廟之至憂臣永所以破膽寒心豫言之纍年下有其萌然後變見于上可不致慎禍起細微姦生所易願陛下正君臣之義無復與羣小媟黷燕飲勤三綱之嚴修後宮之政抑逺驕妬之寵崇近婉順之行朝覲法駕而後出陳兵清道而後行無復輕身獨出飲食臣妾之家三者既除內亂之路塞矣諸夏舉兵萌在民飢饉而吏不恤興於百姓困而賦斂重發於下怨離而上不知傳曰飢而不損兹謂泰厥咎亡比年郡國傷於水災禾麥不收宜損常稅之時而有司奏請加賦甚繆經義逆於民心市怨趨禍之道也臣願陛下勿許加賦之奏益減奢泰之費流恩廣施振贍困乏敕勸耕桑以慰綏元元之心諸夏之亂庶幾可息中壘校尉劉向上書曰臣聞帝舜戒伯禹母若丹朱傲周公戒成王母若殷王紂聖帝明王當以敗亂自戒不諱廢興故臣敢極陳其愚唯陛下留神察焉謹案春秋二百四十二年日食三十六今連三年比食自建始以來二十嵗間而八食率二歲六月而一發古今罕有異有小大希稠占有舒疾緩急觀秦漢之易世覽惠昭之無後察昌邑之不終視孝宣之紹起皆有變異著於漢紀天之去就豈不昭昭然哉臣幸得託末屬誠見陛下寬明之德冀銷大異而興髙宗成王之聲以崇劉氏故懇懇數姦死亡之誅天文難以相曉臣雖圖上猶須口説然後可知願賜清燕之間指圖陳狀上輒入之然終不能用也十二月北地都尉張放到官數月復徵入侍中太后與上書曰前所道尚未效富平侯反復來其能默呼上謝曰請今奉詔上於是出放為天水屬國都尉引少府許商光祿勳師丹為光祿大夫班伯為水衡都尉並侍中皆秩中二千石每朝東宮常從及大政俱使諭指於公卿上亦稍厭遊宴復修經書之業太后甚悅綏和二年三月丙戌帝崩于未央宫帝素強無疾病是時楚思王衍梁王立來朝明旦當辭去上宿供張白虎殿又欲拜左將軍孔光為丞相已刻侯印書贊昏夜平善鄉晨傅褲襪欲起因失衣不能言晝漏上十刻而崩民間歡譁咸歸罪趙昭儀皇太后詔大司馬莽雜與御史丞相廷尉治問皇帝起居發病狀趙昭儀自殺班彪贊曰臣姑充後宮為婕妤父子昆弟侍帷幄數為臣言成帝善修容儀升車正立不內顧不疾言不親指臨朝淵默尊嚴若神可謂有穆穆天子之容者矣博覽古今容受直辭公卿奏議可述遭世承平上下和睦然湛乎酒色趙氏亂內外家擅權言之可為於邑建始以來王氏始執國命哀平短祚莽遂篡位蓋其威福所由來者漸矣河決之患漢元帝永光五年初武帝既塞宣房後河復北決於館陶分為屯氏河東北入海廣深與大河等故因其自然不隄塞也是歲河決清河靈鳴犢口而屯氏河絶武帝元封二年上使汲仁郭昌發卒數萬人塞瓠子河決築宫其上名曰宣房宫成帝建始四年夏四月大雨水十餘日河決東郡金隄先是清河都尉馮逡奏言郡承河下流土壤輕脆易傷頃所以闊無大害者以屯氏河通兩川分流也今屯氏河塞靈鳴犢口又益不利獨一川兼受數河之任雖髙增隄防終不能泄如有霖雨旬日不霽必盈溢九河故迹今既滅難明屯氏河新絶未久其處易浚又其口所居髙於以分殺水力道里便宜可復浚以助大河泄暴水備非常不豫修治北決病四五郡南決病十餘郡然後憂之晚矣事下丞相御史白遣博士許商行視以為常方用度不足可且勿浚後三嵗河果決於館陶及東郡金隄泛濫兖豫入平原千乘濟南凡灌四郡三十二縣水居地十五萬餘頃深者三丈壞敗官亭室廬且四萬所冬十一月御史大夫尹忠以對方略疏闊上切責其不憂職自殺遣大司農非調調均錢榖河決所灌之郡謁者二人發河南以東船五百艘徙民避水居邱陵九萬七千餘口河平元年春杜欽薦犍為王延世於王鳳使塞決河鳳以延世為河隄使者延世以竹落長四丈大九圍盛以小石兩船夾載而下之三十六日河隄成三月詔以延世為光祿大夫秩中二千石賜爵關內侯黃金百斤二年秋八月河復決平原流入濟南千乘所壞敗者半建始時復遣王延世與丞相史楊焉及將作大匠許商諫大夫乘馬延年同作治六月乃成復賜延世黃金百斤治河卒非受平賈者為著外繇六月鴻嘉四年秋勃海清河信都河水湓溢灌縣邑三十一敗官亭民舍四萬餘所平陵李尋等奏言議者常欲求索九河故迹而穿之今因其自決可且勿塞以觀水藝河欲居之當稍自成川跳出沙土然後順天心而圖之必有成功而用財力寡於是遂止不塞朝臣數言百姓可哀上遣使者處業振贍之綏和二年九月騎都尉平當使領河隄奏九河今皆置滅按經義治水有決河深川而無隄防壅塞之文河從魏郡以東北多溢決水迹難以分明四海之衆不可誣宜博求能浚川疏河者上從之待詔賈讓奏言治河有上中下䇿古者立國居民疆理土地必遺川澤之分度水藝所不及大川無防小水得入陂障卑下以為汙澤使秋水多得其所休息左右遊波寬緩而不迫夫土之有川猶人之有口也治土而防其川猶止兒啼而塞其口豈不遽止然其死可立而待也故曰善為川者決之使道善為民者宣之使言蓋隄防之作近起戰國雍防百川各以自利齊與趙魏以河為竟趙魏瀕山齊地卑下作隄去河二十五里河水東抵齊隄則西泛趙魏趙魏亦為隄去河二十五里雖非其正水尚有所逰蕩時至而去則填淤肥美民耕田之或久無害稍築宮宅遂成聚落大水時至漂沒則更起隄防以自救稍去其城郭排水澤而居之湛溺自其宜也今隄防狹者去水數百步逺者數里於故大隄之內復有數重民居其間此皆前世所排也河從河內黎陽至魏郡昭陽東西互有石隄激水使還百餘里間河再西三東迫厄如此不得安息今行上䇿徙冀州之民當水衝者決黎陽遮害亭放河使北入海河西薄大山東薄金隄執不能逺泛濫期月自定難者將曰若如此敗壞城郭田廬冢墓以萬數百姓怨恨昔大禹治水山陵當路者毁之故鑿龍門辟伊闕析底柱破碣石墮斷天地之性此乃人功所造何足言也今瀕河十郡治隄嵗費且萬萬及其大決所殘無數如出數年治河之費以業所徙之民遵古聖之法定山川之位使神人各處其所而不相姦且以大漢方制萬里豈其與水爭咫尺之地哉此功一立河定民安千載無患故謂之上䇿若乃多穿漕渠於冀州地使民得以溉田分殺水怒雖非聖人法然亦救敗術也可從淇口以東為石隄多張水門恐議者疑河大川難禁制滎陽漕渠足以卜之冀州渠首盡當仰此水門諸渠皆往往股引取之旱則開東方下水門溉冀州水則開西方髙門分河流民田適治河隄亦成此誠富國安民興利除害支數百嵗故謂之中䇿若乃繕完故隄增卑倍薄勞費無已數逢其害此最下䇿也平帝元始四年王莽奏徵能治河者以百數其大略異者長水校尉平陵關並言河決率常於平原東郡左右其地形下而土疏惡聞禹治河時本空此地以為水猥盛則放溢少稍自索雖時易處猶不能離此上古難識近察秦漢以來河決曹衛之域其南北不過百八十里可空此地勿以為官亭民室而已御史臨淮韓牧以為可略於禹貢九河處穿之縱不能為九但為四五宜有益大司空掾王橫言河入勃海地髙於韓牧所欲穿處往者天嘗連雨東北風海水溢西南出寖數百里九河之地已為海所漸矣禹之行河水本隨西山下東北去周譜云定王五年河徙則今所行非禹之所穿也又秦攻魏決河灌其都決處遂大不可復補宜郤徙完平處更開空使緣西山足乘髙地而東北入海乃無水災司空掾沛國桓談典其議為甄豐吉凡此數者必有一是宜詳考驗皆可豫見計定然後舉事費不過數億萬亦可以事諸浮食無産業民空居與行役同當衣食衣食縣官而為之作乃兩便可以上繼禹功下除民疾時莽但崇空語無施行者王莽始建國三年河決魏郡泛清河以東數郡先是莽恐河決為元城冡墓害及決東去元城不憂水故遂不堤塞明帝永平十二年初平帝時河汴決壞久而不修建武十年光武欲修之浚儀令樂俊上言民新被兵革未宜興役乃止其後汴渠東侵日月彌廣兖豫百姓怨歎以為縣官恆興他役不先民急會有薦樂浪王景能治水者夏四月詔發卒數十萬遣景與將作謁者王吳修汴渠隄自滎陽東至千乘海口千餘里十里立一水門令更相洄注無復潰漏之患景雖簡省役費然猶以百億計焉十三年夏四月汴渠成河汴分流復其舊迹通鑑紀事本末卷第四
