  - {type: variant, offset: 13046, length: 0, content: '', WYG: 西朝堂中二重有百二十房皆飾以金玉下重内侍處之皇后乗翔螭舟制度差小而裝飾無異别有浮景九艘三重皆水殿也又有漾彩朱鳥蒼螭白虎𤣥武飛羽青鳬陵波五樓道場𤣥壇樓船板黄蔑等數千艘後官諸王公主百官僧尼道士蕃客乘之及載内外百司供奉之物共用挽船士八萬餘人其挽漾彩以上者九千餘人謂之殿脚皆以錦綵為袍又有平乘青龍艨艟艚􅀈八櫂艇舸等數千艘並十二衛兵乘之并載兵器帳幕兵士自引不給夫舳艫相接二百餘里照曜川陸騎兵翊兩岸而行旌旗蔽野所過州縣五百里内皆}
