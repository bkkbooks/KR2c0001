  - {type: variant, offset: 207, length: 1, content: 袁, SBCK: 􅀽}
  - {type: variant, offset: 208, length: 425, content: 子此書如生乎其時親見乎其事使人喜使人悲使人鼔舞未旣而繼之以歎且泣也嗟乎由周秦以來曰諸侯曰大盗曰女主曰外戚曰宦官曰權臣曰夷狄曰藩鎭國之病亦不一矣而其源不一哉蓋安史之亂則林甫之爲也藩鎭之亂則令孜之爲也其源不一哉得其病之之源則得其醫之方矣此書是也有國者不可以無此書前有姦而不察後有邪而不悟學者不可以無此書之有行而無徵退有蓄而無宗此書也其入通鑑之户歟雖然覿人之病戚人之病理人之病得人之病至於身之病不懵焉不諱焉不醫之距焉不醫而繆其醫焉古亦稀矣彼闇而此昭冝也切於人紓於身可哀也夫淳熈元年三月戊子廬陵楊萬里叙通鑑一書於治道最切實諸史之精華百代之龜鏡古未有也神宗皇帝深所愛重錫資治之嘉名且命經筵進讀歴朝寳之永以為訓近丗建安袁公復作紀事夲末區别條流各從其類豈求加扵通鑑之外哉盖通鑑以編年為宗本末以比事為體編年則雖一事而歳月遼隔比事則雖累載而脉絡貫聮故讀通鑑者如登髙山泛巨海未易遽覩其津厓得本末而閱之則根榦枝葉繩繩相生不待反覆它卷而瞭然在目中矣故本末者通鑑之户牖也袁公之, WYG: 樞}
