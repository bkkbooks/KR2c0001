  text: 通鑑紀事本末卷第二
  hash: sha256:caf0027def0f6377307927350b0ec07124790de136706aae69d295b7d2056ca0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0001_SBCK_002-1a}
body:
  text: 高帝滅楚秦二世二年初楚懷王與諸將約先入定關中者王之當是時秦兵彊常乘勝逐北諸將莫利先入關獨項羽怨秦之殺項梁奮願與沛公西入關懷王諸老將皆曰項羽為人慓悍猾賊嘗攻襄城襄城無遺類皆坑之諸所過無不殘滅且楚數進取前陳王項梁皆敗不如更遣長者扶義而西告諭秦父兄秦父兄苦其主久矣今誠得長者往無侵暴宜可下項羽不可遣獨沛公素寬大長者可遣懷王乃不許項羽而遣沛公西略地收陳王項梁散卒以伐秦漢髙祖元年冬十月沛公西入咸陽諸將皆爭走金帛財物之府分之蕭何獨先入收秦丞相府圖籍藏之以此沛公得具知天下厄塞戶口多少彊弱之處沛公見秦宫室帷帳狗馬重寶婦女以千數意欲留居之樊噲諌曰沛公欲有天下耶將為富家翁耶凡此奢麗之物皆秦所以亡也沛公何用焉願急還霸上無留宫中沛公不聽張良曰秦為無道故沛公得至此夫為天下除殘賊宜縞素為資今始入秦即安其樂此所謂助桀為虐且忠言逆耳利於行毒藥苦口利於病願沛公聽樊噲言沛公乃還軍霸上十一月沛公悉召諸縣父老豪傑謂曰父老苦秦苛法久矣吾與諸侯約先入關者王之吾當王關中與父老約法三章耳殺人者死傷人及盜抵罪餘悉除去秦法諸吏民皆案堵如故凡吾所以來為父老除害非有所侵暴無恐且吾所以還軍霸上待諸侯至而定約束耳乃使人與秦吏行縣鄉邑告諭之秦民大喜爭持牛羊酒食獻饗軍士沛公又讓不受曰倉粟多非乏不欲費民民又益喜唯恐沛公不為秦王項羽既定河北率諸侯兵欲西入關先是諸侯吏卒繇使屯戍過秦中者秦中吏卒遇之多無狀及章邯以秦軍降諸侯諸侯吏卒乘勝多奴虜使之輕折辱秦吏卒秦吏卒多怨竊言曰章將軍等詐吾屬降諸侯今能入關破秦大善即不能諸侯虜吾屬而東秦又盡誅吾父母妻子奈何諸將微聞其計以告項羽項羽召黥布蒲將軍計曰秦吏卒尚衆其心不服至關不聽事必危不如擊殺之而獨與章邯長史欣都尉翳入秦於是楚軍夜擊坑秦卒二十餘萬人新安城南或說沛公曰秦富十倍天下地形彊聞項羽號章邯為雍王王關中今則來沛公恐不得有此可急使兵守函谷關無內諸侯軍稍徴關中兵以自益距之沛公然其計從之已而項羽至關關門閉聞沛公已定關中大怒使黥布等攻破函谷關十二月項羽進至戲沛公左司馬曹無傷使人言項羽曰沛公欲王關中令子嬰為相珍寶盡有之欲以求封項羽大怒饗士卒期旦日擊沛公軍當是時項羽兵四十萬號百萬在新豐鴻門沛公兵十萬號二十萬在霸上范增說項羽曰沛公居山東時貪財好色今入關財物無所取婦女無所幸此其志不在小吾令人望其氣皆為龍虎成五采此天子氣也急擊勿失楚左尹項伯者項羽季父也素善張良乃夜馳之沛公軍私見張良具告以事欲呼與俱去曰毋俱死也張良曰臣為韓王送沛公沛公今有急亡去不義不可不語良乃入具告沛公沛公大驚良曰料公士卒足以當項羽乎沛公默然曰固不如也且為之奈何張良曰請往謂項伯言沛公之不敢叛也沛公曰君為我呼入良出固要項伯項伯即入見沛公沛公奉巵酒為夀約為婚姻曰吾入關秋毫不敢有所近籍吏民封府庫而待將軍所以遣將守關者備他盜之出入與非常也日夜望將軍至豈敢反乎願伯具言臣之不敢倍德也項伯許諾謂沛公曰旦日不可不蚤自來謝沛公曰諾於是項伯復夜去至軍中具以沛公言報項羽因言曰沛公不先破關中公豈敢入乎今人有大功而擊之不義也不如因善遇之項羽許諾沛公旦日從百餘騎來見項羽鴻門謝曰臣與將軍戮力而攻秦將軍戰河北臣戰河南不自意能先入關破秦得復見將軍於此今者有小人之言令將軍與臣有隙項羽曰此沛公左司馬曹無傷言之不然籍何以至此項羽因留沛公與飲范增數目項羽舉所佩玉玦以示之者三項羽默然不應范增起出召項莊謂曰君王為人不忍若入前為夀夀畢請以劒舞因擊沛公於坐殺之不者若屬皆且為所虜莊則入為壽夀畢曰軍中無以為樂請以劒舞項羽曰諾項莊拔劒起舞項伯亦拔劒起舞常以身翼蔽沛公莊不得擊於是張良至軍門見樊噲噲曰今日之事何如良曰今項莊拔劒舞其意常在沛公也噲曰此迫矣臣請入與之同命噲即帶劒擁盾入軍門衛士欲止不內樊噲側其盾以撞衛士仆地遂入披帷立瞋目視項羽頭髮上指目眦盡裂項羽按劒而跽曰客何為者張良曰沛公之參乘樊噲也項羽曰壯士賜之巵酒噲立而飲之項羽曰壯士復能飲乎樊噲曰臣死且不避巵酒安足辭夫秦有虎狼之心殺人如不能舉刑人如恐不勝天下皆叛之懷王與諸將約曰先破秦入咸陽者王之今沛公先破秦入咸陽毫毛不敢有所近還軍霸上以待將軍勞苦而功髙如此未有封爵之賞而聽細人之說欲誅有功之人此亡秦之續耳竊為將軍不取也項羽未有以應曰坐樊噲從良坐坐須臾沛公起如厠因招樊噲出沛公曰今者出未辭也為之奈何樊噲曰如今人方為刀俎我方為魚肉何辭為於是遂去鴻門去霸上四十里沛公則置車騎脫身獨騎樊噲夏侯嬰靳彊紀信等四人持劒盾步走從驪山下道芷陽間行趣霸上留張良使謝項羽以白璧獻羽玉斗與亞父沛公謂良曰從此道至吾軍不過二十里耳度我至軍中公乃入沛公已去間至軍中張良入謝曰沛公不勝杯杓不能辭謹使臣良奉白璧一雙再拜獻將軍足下玉斗一雙再拜奉亞父足下項羽曰沛公安在良曰聞將軍有意督過之脫身獨去已至軍矣項羽則受璧置之坐上亞父受玉斗置之地拔劒撞而破之曰唉豎子不足與謀奪將軍天下者必沛公也吾屬今為之虜矣沛公至軍立誅殺曹無傷居數日項羽引兵西屠咸陽殺秦降王子嬰燒秦宫室火三月不滅收其貨寶婦女而東秦民大失望韓生說項羽曰關中阻山帶河四塞之地地肥饒可都以霸項羽見秦宫室皆已燒殘破又心思東歸曰富貴不歸故鄉如衣繡夜行誰知之者韓生退曰人言楚人沐猴而冠耳果然項羽聞之烹韓生項羽使人致命懷王懷王曰如約項羽怒曰懷王者吾家所立耳非有功伐何以得専主約天下初發難時假立諸侯後以伐秦然身被堅執鋭首事暴露於野三年滅秦定天下者皆將相諸君與籍之力也懷王雖無功固當分其地而王之諸將皆曰善春正月羽陽尊懷王為義帝曰古之帝者地方千里必居上游乃徙義帝於江南都郴二月羽分天下王諸將羽自立為西楚霸王王梁楚地九郡都彭城羽與范增疑沛公而業已講解又惡負約乃隂謀曰巴蜀道險秦之遷人皆居之乃曰巴蜀亦關中地也故立沛公為漢王王巴蜀漢中都南鄭而三分關中王秦降將以距塞漢路章邯為雍王王咸陽以西都廢丘長史欣者故為櫟陽獄掾嘗有德於項梁都尉董翳者本勸章邯降楚故立欣為塞王王咸陽以東至河都櫟陽立翳為翟王王上郡都髙奴項羽欲自取梁地乃徙魏王豹為西魏王王河東都平陽瑕丘申陽者張耳嬖臣也先下河南郡迎楚河上故立申陽為河南王都洛陽韓王成因故都都陽翟趙將司馬卬定河內數有功故立為殷王王河內都朝歌徙趙王歇為代王趙相張耳素賢又從入關故立耳為常山王王趙地治襄國當陽君黥布為楚將常冠軍故立布為九江王都六番君吳芮率百越佐諸侯又從入關故立芮為衡山王都邾義帝柱國共敖將兵擊南郡功多因立敖為臨江王都江陵徙燕王韓廣為遼東王都無終燕將臧荼從楚救趙因從入關故立荼為燕王都薊徙齊王田市為膠東王都即墨齊將田都從楚救趙因從入關故立都為齊王都臨菑項羽方渡河救趙田安下濟北數城引其兵降項羽故立安為濟北王都博陽田榮數負項梁又不肯將兵從楚擊秦以故不封成安君陳餘棄將印去不從入關亦不封客多說項羽曰張耳陳餘一體有功於趙今耳為王餘不可以不封羽不得已聞其在南皮因環封之三縣番君將梅鋗功多封十萬户侯漢王怒欲攻項羽周勃灌嬰樊噲皆勸之蕭何諌曰雖王漢中之惡不猶愈於死乎漢王曰何為乃死也何曰今衆弗如百戰百敗不死何為夫能詘於一人之下而信於萬乘之上者湯武是也臣願大王王漢中養其民以致賢人收用巴蜀還定三秦天下可圖也漢王曰善乃遂就國以何為丞相漢王賜張良金百鎰珠二斗良具以獻項伯漢王亦因令良厚遺項伯使盡請漢中地項王許之夏四月諸侯罷戲下兵各就國項王使卒三萬人從漢王之國楚與諸侯之慕從者數萬人從杜南入蝕中張良送至褒中漢王遣良歸韓良因說漢王燒絶所過棧道以備諸侯盜兵且示項羽無東意六月田榮殺齊王市自立為齊王初淮隂人韓信家貧無行不能推擇為吏及項梁渡淮信杖劒從之居麾下無所知名項梁敗又屬項羽羽以為郎中數以䇿干羽羽不用漢王之入蜀信亡楚歸漢信數與蕭何語何竒之漢王至南鄭諸將及士卒皆歌謳思東歸多道亡者信度何等已數言王王不我用即亡去何聞信亡不及以聞自追之人有言王曰丞相何亡王大怒如失左右手居一二日何來謁王王且怒且喜罵何曰若亡何也何曰臣不敢亡也臣追亡者耳王曰若所追者誰何曰韓信也王復罵曰諸將亡者以十數公無所追追信詐也何曰諸將易得耳至如信者國士無雙王必欲長王漢中無所事信必欲爭天下非信無可與計事者顧王䇿安所決耳王曰吾亦欲東耳安能鬱鬱久居比乎何曰計必欲東能用信信即留不能用信終亡耳王曰吾為公以為將何曰雖為將信不留王曰以為大將何曰幸甚於是王欲召信拜之何曰王素慢無禮今拜大將如呼小兒此乃信所以去也王必欲拜之擇良日齊戒設壇場具禮乃可耳王許之諸將皆喜人人各自以為得大將至拜大將乃韓信也一軍皆驚信拜禮畢上坐王曰丞相數言將軍將軍何以教寡人計䇿信辭謝因問王曰今東鄉爭權天下豈非項王邪漢王曰然曰大王自料勇悍仁彊孰與項王漢王默然良久曰不如也信再拜賀曰惟信亦以為大王不如也然臣嘗事之請言項王之為人也項王喑噁叱咤千人皆廢然不能任屬賢將此特匹夫之勇耳項王見人恭敬慈愛言語嘔嘔人有疾病涕泣分食飲至使人有功當封爵者印刓敝忍不能豫此所謂婦人之仁也項王雖霸天下而臣諸侯不居關中而都彭城背義帝之約而以親愛王諸侯不平逐其故主而王其將相又遷逐義帝置江南所過無不殘滅百姓不親附特劫於威彊耳名雖為霸實失天下心故其彊易弱今大王誠能反其道任天下武勇何所不誅以天下城邑封功臣何所不服以義兵從思東歸之士何所不散且三秦王為秦將將秦子弟數嵗矣所殺亡不可勝計又欺其衆降諸侯至新安項王詐坑秦降卒二十餘萬唯獨邯欣翳得脫秦父兄怨此三人痛入骨髓今楚彊以威王此三人秦民莫愛也大王之入武關秋毫無所害除秦苛法與秦民約法三章秦民無不欲得大王王秦者於諸侯之約大王當王關中關中民咸知之大王失職入漢中秦民無不恨者今大王舉而東三秦可傳檄而定也於是漢王大喜自以為得信晚遂聽信計部署諸將所擊留蕭何收巴蜀租給軍糧食八月漢王引兵從故道出襲雍雍王章邯迎擊漢陳倉雍兵敗還走止戰好畤又敗走廢丘漢王遂定雍地東至咸陽引兵圍雍王於廢丘而遣諸將略地塞王欣翟王翳皆降以其地為渭南河上上郡令將軍薛歐王吸出武關因王陵兵以迎太公吕后項王聞之發兵距之陽夏不得前王陵者沛人也先聚黨數千人居南陽至是始以兵屬漢項王取陵母置軍中陵使至則東鄉坐陵母欲以招陵陵母私送使者泣曰願為老妾語陵善事漢王漢王長者終得天下母以老妾故持二心妾以死送使者遂伏劒而死項王怒烹陵母項王以故吳令鄭昌為韓王以距漢張良遺項王書曰漢王失職欲得關中如約即止不敢東又以齊梁反書遺項王曰齊欲與趙并滅楚項王以此故無西意而北擊齊項王使趣義帝行其羣臣左右稍稍叛之二年冬十月項王密使九江衡山臨江王擊義帝殺之江中陳餘悉三縣兵與齊兵共襲常山常山王張耳敗走漢謁漢王於廢丘漢王厚遇之陳餘迎趙王於代復為趙王趙王德陳餘立以為代王陳餘為趙王弱國初定不之國留傅趙王而使夏說以相國守代張良自韓間行歸漢漢王以為成信侯良多病未嘗特將常為畫䇿臣時時從漢王漢王如陜鎮撫關外父老河南王申陽降置河南郡漢王以韓襄王孫信為韓太尉將兵略韓地信急擊韓王昌於陽城昌降十一月立信為韓王常將韓兵從漢王漢王還都櫟陽諸將拔隴西春正月項王北至城陽齊王榮將兵㑹戰敗走平原平原民殺之項王復立田假為齊王遂北至北海燒夷城郭室屋坑田榮降卒係虜其老弱婦女所過多所殘滅齊民相聚叛之漢將拔北地虜雍王弟平三月漢王自臨晉渡河魏王豹降將兵從下河內虜殷王卬置河內郡初陽武人陳平事魏王咎於臨濟為太僕說魏王不聽人或讒之平亡去後事項羽賜爵為卿殷王反楚項羽使平擊降之還拜為都尉賜金二十鎰居無何漢王攻下殷項王怒將誅定殷將吏平懼乃封其金與印使使歸項王而挺身間行杕劔亡渡河歸漢王於修武因魏無知求見漢王漢王召入賜食遣罷就舍平曰臣為事來所言不可以過今日於是漢王與語而說之問曰子之居楚何官曰為都尉是日即拜平為都尉使為參乘典護軍諸將盡歡曰大王一日得楚之亡卒未知其髙下而即與同載反使監護長者漢王聞之愈益幸平漢王南渡平陰津至洛陽新城三老董公遮說王曰臣聞順德者昌逆德者亡兵出無名事故不成故曰明其為賊敵乃可服項羽為無道放殺其主天下之賊也夫仁不以勇義不以力大王宜率三軍之衆為之素服以告諸侯而伐之則四海之內莫不仰德此三王之舉也於是漢王為義帝發喪袒而大哭哀臨三日發使告諸侯曰天下共立義帝北面事之今項羽放殺義帝江南大逆無道寡人悉發關中兵收三河士南浮江漢以下願從諸侯王擊楚之殺義帝者使者至趙陳餘曰漢殺張耳乃從於是漢王求人類張耳者斬之持其頭遺陳餘餘乃遣兵助漢田榮弟橫收散卒得數萬人起城陽夏四月立榮子廣為齊王以拒楚項王因留連戰未能下雖聞漢東既擊齊欲遂破之而後擊漢漢王以故得率諸侯兵凡五十六萬人伐楚到外黃彭越將其兵三萬餘人歸漢漢王曰彭將軍收魏地得十餘城欲急立魏後今西魏王豹真魏後乃拜彭越為魏相國擅將其兵略定梁地漢王遂入彭城收其貨寶美人日置酒高㑹項王聞之令諸將擊齊而自以精兵三萬人南從魯出胡陵至蕭晨擊漢軍而東至彭城日中大破漢軍漢軍皆走相隨入穀泗水死者十餘萬人漢卒皆南走山楚又追擊至靈璧東睢水上漢軍却為楚所擠卒十餘萬人皆入睢水水為之不流圍漢王三匝㑹大風從西北起折木發屋揚沙石窈冥晝晦逄迎楚軍大亂壞散而漢王乃得與數十騎遁去欲過沛收家室而楚亦使人之沛取漢王家家皆亡不與漢王相見漢王道逢孝惠魯元公主載以行楚騎追之漢王急推墮二子車下滕公為太僕常下收載之如是者三曰今雖急不可以驅奈何棄之故徐行漢王怒欲斬之者十餘滕公卒保護脫二子審食其從太公吕后閒行求漢王不相遇反遇楚軍楚軍與歸項王常置軍中為質是時吕后兄周吕侯為漢將兵居下邑漢王閒往從之稍稍收其士卒諸侯皆背漢復與楚塞王欣翟王翳亡降楚田橫進攻田假假走楚楚殺之橫遂復定三齊之地漢王問羣臣曰吾欲捐關以東等棄之誰可與共功者張良曰九江王布楚梟將與項王有隙彭越與齊反梁地此兩人可急使而漢王之將獨韓信可屬大事當一面即欲捐之捐之此三人則楚可破也初項王擊齊徴兵九江九江王布稱病不往遣將將軍數千人行漢之破楚彭城布又稱病不佐楚楚王由此怨布數使使者誚讓召布布愈恐不敢往項王方北憂齊趙西患漢所與者獨九江王又多布材欲親用之以故未之擊漢王自下邑徙軍碭遂至虞謂左右曰如彼等者無足與計天下事謁者隨何進曰不審陛下所謂漢王曰孰能為我使九江令之發兵倍楚留項王數月我之取天下可以百全隨何曰臣請使之漢王使與二十人俱五月漢王至滎陽諸敗軍皆㑹蕭何亦發關中老弱未傅者悉詣滎陽漢軍復大振楚起於彭城常乘勝逐北與漢戰滎陽南京索閒楚騎來衆漢王擇軍中可為騎將者皆推故秦騎士重泉人李必駱甲漢王欲拜之必甲曰臣故秦民恐軍不信臣願得大王左右善騎者傅之乃拜灌嬰為中大夫令李必駱甲為左右校尉將騎兵擊楚騎於滎陽東大破之楚以故不能過滎陽而西漢王軍滎陽築甬道屬之河以取敖倉粟魏王豹謁歸視親疾至則絶河津反為楚六月漢王還櫟陽漢王引水灌廢丘廢丘降章邯自殺盡定雍地以為中地北地隴西郡秋八月漢王如滎陽命蕭何守關中侍太子為法令約束立宗廟社稷宫室縣邑事有不及奏决者輒以便宜施行上來以聞計關中户口轉漕調兵以給軍未嘗乏絶漢王使酈食其往說魏王豹且召之豹不聽曰漢王慢而侮人罵詈諸侯羣臣如罵奴耳吾不忍復見也於是漢王以韓信為左丞相與灌嬰曹參俱擊魏漢王問食其魏大將誰也對曰柏直王曰是口尚乳臭安能當韓信騎將誰也曰馮敬曰是秦將馮無擇子也雖賢不能當灌嬰步卒將誰也曰項它曰不能當曹參吾無患矣韓信亦問酈生魏得無用周叔為大將乎酈生曰柏直也信曰豎子耳遂進兵魏王盛兵蒲坂以塞臨晉信乃益為疑兵陳船欲渡臨晉而伏兵從夏陽以木罌渡軍襲安邑魏王豹驚引兵迎信九月信擊虜豹傳詣滎陽悉定魏地置河東上黨太原郡漢之敗於彭城而西也陳餘亦覺張耳不死即背漢韓信既定魏使人請兵三萬人願以北舉燕趙東擊齊南絶楚糧道漢王許之乃遣張耳與俱引兵東北擊趙代後九月信破代兵禽夏說於閼與信之下魏破代漢輒使人收其精兵詣滎陽以距楚三年冬十月韓信張耳以兵數萬東擊趙趙王及成安君陳餘聞之聚兵井陘口號二十萬廣武君李左車說成安君曰韓信張耳乘勝而去國逺鬬其鋒不可當臣聞千里餽糧士有飢色樵蘇後爨師不宿飽今井陘之道車不得方軌騎不得成列行數百里其勢糧食必在其後願足下假臣竒兵三萬人從閒路絶其輜重足下深溝髙壘勿與戰彼前不得鬭退不得還野無所掠不至十日而兩將之頭可致於麾下否則必為二子所禽矣成安君嘗自稱義兵不用詐謀竒計曰韓信兵少而疲如此避而不擊則諸侯謂吾怯而輕來伐我矣韓信使人閒視知其不用廣武君䇿則大喜乃敢引兵遂下未至井陘口三十里止舍夜半傳發選輕騎二千人人持一赤幟從閒道萆山而望趙軍誡曰趙見我走必空壁逐我若疾入趙壁拔趙幟立漢赤幟令其禆將傳餐曰今日破趙㑹食諸將皆莫信佯應曰諾信曰趙已先據便地為壁且彼未見吾大將旗鼓未肯擊前行恐吾至阻險而還也乃使萬人先行出背水陳趙軍望見而大笑平旦信建大將旗鼓行出井陘口趙開壁擊之大戰良久於是信與張耳佯棄鼓旗走水上軍水上軍開入之復疾戰趙果空壁爭漢旗鼓逐信耳信耳已入水上軍軍皆殊死戰不可敗信所出竒兵二千騎共候趙空壁逐利則馳入趙壁皆拔趙旗立漢赤幟二千趙軍已不能得信等欲還歸壁壁皆漢赤幟見而大驚以為漢皆已得趙王將矣兵遂亂遁走趙將雖斬之不能禁也於是漢兵夾擊大破趙軍斬成安君泜水上禽趙王歇諸將效首虜畢賀因問信曰兵法右倍山陵前左水澤今者將軍令臣等反背水陳曰破趙㑹食臣等不服然竟以勝此何術也信曰此在兵法顧諸君不察耳兵法不曰陷之死地而後生置之亡地而後存且信非得素拊循士大夫也此所謂驅市人而戰之其勢非置之死地使人人自為戰今豫之生地皆走寧尚可得而用之乎諸將皆服曰善非臣所及也信募生得廣武君者豫千金有縛致麾下者信解其縛東鄉坐師事之問曰僕欲北攻燕東伐齊何若而有功廣武君辭謝曰臣敗亡之虜何足以權大事乎信曰僕聞之百里奚居虞而虞亡在秦而秦霸非愚於虞而智於秦也用與不用聽與不聽也誠令成安君聽足下計若信者亦已為禽矣以不用足下故信得侍耳今僕委心歸計願足下勿辭廣武君曰今將軍涉西河虜魏王禽夏說東下井陘不終朝而破趙二十萬衆誅成安君名聞海內威震天下農夫莫不輟耕釋耒褕衣甘食傾耳以待命者此將軍之所長也然而衆勞卒罷其實難用今將軍欲舉倦敝之兵頓之燕堅城之下欲戰不得攻之不拔情見勢屈曠日持久糧食單竭燕既不服齊必距境以自彊燕齊相持而不下則劉項之權未有所分也此將軍所短也善用兵者不以短擊長而以長擊短韓信曰然則何由廣武君對曰方今為將軍計莫如按甲休兵鎮撫趙民百里之內牛酒日至以饗士大夫北首燕路而後遣辨士奉咫尺之書暴其所長於燕燕必不敢不聽從燕已從而東臨齊雖有智者亦不知為齊計矣如是則天下事皆可圖也兵固有先聲而後實者此之謂也韓信曰善從其䇿發使使燕燕從風而靡遣使報漢且請以張耳王趙漢王許之楚數使竒兵渡河擊趙張耳韓信往來救趙因行定趙城邑發兵詣漢十一月隨何至九江九江太宰主之三日不得見隨何說太宰曰王之不見何必以楚為彊以漢為弱也此臣之所以為使使何得見言之而是大王所欲聞也言之而非使何等二十人伏斧質九江市足以明王倍漢而與楚也太宰乃言之王王見之隨何曰漢王使臣敬進書大王御者竊怪大王與楚何親也九江王曰寡人北鄉而臣事之隨何曰大王與項王俱列為諸侯北鄉而臣事之者必以楚為彊可以託國也項王伐齊身負版築為士卒先大王宜悉九江之衆身自將之為楚前鋒今乃發四千人以助楚夫北面而臣事人者固若是乎漢王入彭城項王未出齊也大王宜悉九江之兵渡淮日夜㑹戰彭城下大王乃撫萬人之衆無一人渡淮者垂拱而觀其孰勝夫託國於人者固若是乎大王提空名以鄉楚而欲厚自託臣竊為大王不取也然而大王不背楚者以漢為弱也夫楚兵雖彊天下負之以不義之名以其背盟約而殺義帝也漢王收諸侯還守成臯滎陽下蜀漢之粟深溝壁壘分卒守徼乘塞楚人深入敵國八九百里老弱轉糧千里之外漢堅守而不動楚進則不得攻退則不能解故曰楚兵不足恃也使楚勝漢則諸侯自危懼而相救夫楚之彊適足以致天下之兵耳故楚不如漢其勢易見也今大王不與萬全之漢而自託於危亡之楚臣竊為大王惑之臣非以九江之兵足以亡楚也大王發兵而倍楚項王必留留數月漢之取天下可以萬全臣請與大王提劒而歸漢漢王必裂地而封大王又况九江必大王有也九江王曰請奉命隂許畔楚與漢未敢泄也楚使者在九江舍傳舍方急責布發兵隨何直入坐楚使者上曰九江王已歸漢楚何以得發兵布愕然楚使者起何因說布曰事已御名太上可遂殺楚使者無使歸而疾走漢并力布曰如使者教於是殺楚使者因起兵而攻楚楚使項聲龍且攻九江數月龍且破九江軍布欲引兵走漢恐楚兵殺之乃間行與何俱歸漢十二月九江王至漢漢王方踞牀洗足召布入見布大怒悔來欲自殺及出就舍帳御飲食從官皆如漢王居布又大喜過望於是乃使人入九江楚已使項伯收九江兵盡殺布妻子布使者頗得故人幸臣將衆數千人歸漢漢益九江王兵與俱屯成臯楚數侵奪漢甬道漢軍乏食漢王與酈食其謀橈楚權食其曰昔湯伐桀封其後於𣏌武王伐紂封其後於宋今秦失德棄義侵伐諸侯滅其社稷使無立錐之地陛下誠能復立六國之後此其君臣百姓必皆戴陛下之德莫不鄉風慕義願為臣妾德義己行陛下南鄉稱霸楚必斂袵而朝漢王曰善趣刻印先生因行佩之矣食其未行張良從外來謁漢王方食曰子房前客有為我計橈楚權者具以酈生語告良曰何如良曰誰為陛下畫此計者陛下事去矣漢王曰何哉對曰臣請借前箸為大王籌之昔湯武封桀紂之後者度能制其死生之命也今陛下能制項籍之死命乎其不可一也武王入殷表啇容之閭釋箕子之囚封比干之墓今陛下能乎其不可二也發巨橋之粟散鹿臺之錢以賜貧窮今陛下能乎其不可三也殷事己畢偃革為軒倒載干戈示天下不復用兵今陛下能乎其不可四也休馬華山之陽示以無為今陛下能乎其不可五也放牛桃林之隂以示不復輸積今陛下能乎其不可六也天下游士離其親戚棄墳墓去故舊從陛下游者徒欲日夜望咫尺之地今復立六國之後天下游士各歸事其主從其親戚反其故舊墳墓陛下與誰取天下乎其不可七也且夫楚唯無彊六國立者復橈而從之陛下焉得而臣之其不可八也誠用客之謀陛下事去矣漢王輟食吐哺罵曰豎儒幾敗而公事令趣銷印荀恱論曰夫立䇿決勝之術其要有三一曰形二曰勢三曰情形者言其大體得失之數也勢者言其臨時之宜進退之機也情者言其心志可否之實也故䇿同事等而功殊者三術不同也初張耳陳餘說陳涉以復六國自為樹黨酈生亦說漢王所以說者同而得失異者陳涉之起天下皆欲亡秦而楚漢之分未有所定今天下未必欲亡項也故立六國於陳涉所謂多己之黨以益秦之敵也且陳涉未能専天下之地也所謂取非其有以與於人行虛惠而獲實福也立六國於漢王所謂割己之有而以資敵設虛名而受實禍也此同事而異形者也及宋義待秦趙之斃與昔卞莊刺虎同說者也施之戰國之時鄰國相攻無臨時之急則可也戰國之立其日久矣一戰勝敗未必以存亡也其勢非能急於亡敵國也進乘利退自保故纍力待時承敵之斃其勢然也今楚趙所起其與秦勢不並立安危之機呼吸成變進則定功退則受禍此同事而異勢者也伐趙之役韓信軍於泜水之上而趙不能敗彭城之難漢王戰于睢水之上士卒皆赴入睢水而楚兵大勝何則趙兵出國迎戰見可而進知難而退懷內顧之心無出死之計韓信軍孤在水上士卒必死無有二心此信之所以勝也漢王深入敵國置酒髙㑹士卒逸豫戰心不固楚以彊大之威而喪其國都士卒皆有憤激之氣救敗赴亡之急以決一旦之命此漢之所以敗也且韓信選精兵以守而趙以內顧之士攻之項羽選精兵以攻而漢以怠惰之卒應之此同事而異情者也故曰權不可預設變不可先圖與時遷移應物變化設䇿之機也漢王謂陳平曰天下紛紛何時定乎陳平曰項王骨鯁之臣亞父鍾離眛龍且周殷之屬不過數人耳大王誠能出捐數萬斤金行反間間其君臣以疑其心項王為人意忌信讒必內相誅漢因舉兵而攻之破楚必矣漢王曰善乃出黃金四萬斤與平恣所為不問其出入平多以金縱反間於楚軍宣言諸將鍾離眛等為項王將功多矣然而終不得裂地而王欲與漢為一以滅項氏而分王其地項羽果意不信鍾離眛等夏四月楚圍漢王於滎陽急漢王請和割滎陽以西者為漢亞父勸羽急攻滎陽漢王患之項王使使至漢陳平使為太牢具舉進見楚使即佯驚曰吾以為亞父使乃項王使復持去更以惡草具進楚使楚使歸具以報項王項王果大疑亞父亞父欲急攻下滎陽城項王不信不肯聽亞父聞項王疑之乃怒曰天下事大定矣君王自為之願請骸骨歸未至彭城疽發背而死五月將軍紀信言於漢王曰事急矣臣請誑楚王可以間出於是陳平夜出女子東門二千餘人楚因四面擊之紀信乃乘王車黃屋左纛曰食盡漢王降楚楚皆呼萬嵗之城東觀以故漢王得與數十騎出西門遁去令韓王信與周苛魏豹樅公守滎陽羽見紀信問漢王安在曰已出去矣羽燒殺信周苛樅公相謂曰反國之王難與守城因殺魏豹漢王出滎陽至成臯入關收兵欲復東轅生說漢王曰漢與楚相距滎陽數嵗漢常困願君王出武關項王必引兵南走王深壁勿戰令滎陽成臯間且得休息使韓信等得安輯河北趙地連燕齊君王乃復走滎陽如此則楚所備者多力分漢得休息復與之戰破之必矣漢王從其計出軍宛葉間與黥布行收兵羽聞漢王在宛果引兵南漢王堅壁不與戰漢王之敗彭城解而西也彭越皆亡其所下城獨將其兵北居河上常往來為漢游兵擊楚絶其後糧是月彭越度睢與項聲薛公戰下邳破殺薛公羽乃使終公守成臯而自東擊彭越漢王引兵北擊破終公復軍成臯六月羽已破走彭越聞漢復軍成臯乃引兵西拔滎陽城生得周苛羽謂苛為我將以公為上將軍封三萬户周苛罵曰若不趨降漢今為虜矣若非漢王敵也羽烹周苛并殺樅公而虜韓王信遂圍成臯漢王逃獨與滕公共車出成臯玉門北渡河宿小修武傳舍晨自稱漢使馳入趙壁張耳韓信未起即其卧內奪其印符以麾召諸將易置之信耳起乃知漢王來大驚漢王既奪兩人軍即令張耳循行備守趙地拜韓信為相國收趙兵未發者擊齊諸將稍稍得出成臯從漢王楚遂拔成臯欲西漢使兵距之鞏令其不得西秋七月漢王得韓信軍復大振八月引兵臨河南卿軍小修武欲復與楚戰郎中鄭忠說止漢王使髙壘深塹勿與戰漢王聽其計使將軍劉賈盧綰將卒二萬人騎數百度白馬津入楚地佐彭越燒楚積聚以破其業無以給項王軍食而已楚兵擊劉賈賈輒堅壁不肯與戰而與彭越相保彭越攻徇梁地下睢陽外黃等十七城九月項王謂大司馬曹咎曰謹守成臯即漢王欲挑戰慎勿與戰勿令得東而已我十五日必定梁地復從將軍羽引兵東行擊陳留外黃睢陽等城皆下之漢王欲捐成臯以東屯鞏洛以距楚酈生曰臣聞知天之天者王事可成王者以民為天而民以食為天夫敖倉天下轉輸久矣臣聞其下乃有藏粟甚多楚人拔滎陽不堅守敖倉乃引而東令適卒分守成臯此乃天所以資漢也方今楚易取而漢反却自奪其便臣竊以為過矣且兩雄不俱立楚漢久相持不決海內搖蕩農夫釋耒工女下機天下之心未有所定也願足下急復進兵收取滎陽據敖倉之粟塞成臯之險杜大行之道距蜚狐之口守白馬之津以示諸侯形制之勢則天下知所歸矣王從之乃復謀取敖倉食其又說王曰方今燕趙已定唯齊未下諸田宗彊負海岱阻河濟南近於楚人多變詐足下雖遣數萬師未可以嵗月破也臣請得奉明詔說齊王使為漢而稱東藩上曰善乃使酈生說齊王曰王知天下之所歸乎王曰不知也天下何所歸酈生曰歸漢曰先生何以言之曰漢王先入咸陽項王負約王之漢中項王遷殺義帝漢王聞之起蜀漢之兵擊三秦出關而責義帝之處收天下之兵立諸侯之後降城即以侯其將得賂即以分其士與天下同其利豪英賢才皆樂為之用項王有倍約之名殺義帝之負於人之功無所記於人之罪無所忘戰勝而不得其賞拔城而不得其封非項氏莫得用事天下畔之賢才怨之而莫為之用故天下之事歸於漢王可坐而䇿也夫漢王發蜀漢定三秦涉西河破北魏出井陘誅成安君此非人之力也天之福也今已據敖倉之粟塞成臯之險守白馬之津杜太行之阪距蜚狐之口天下後服者先亡矣王疾先下漢王齊國可得而保也不然危亡可立而待也先是齊聞韓信且東兵使華無傷田解將重兵屯歷下以距漢及納酈生之言遣使與漢平乃罷歷下守戰備與酈生日納酒為樂韓信引兵東未度平原聞酈食其已說下齊欲止辨士蒯徹說信曰將軍受詔擊齊而漢獨發間使下齊寧有詔止將軍乎何以得毋行也且酈生一士伏軾掉三寸之舌下齊七十餘城將軍以數萬衆嵗餘乃下趙五十餘城為將數嵗反不如一豎儒之功乎於是信然之遂渡河四年冬十月信襲破齊歷下軍遂至臨淄齊王以酈生為賣己乃烹之引兵東走髙密使使之楚請救田橫走博陽守相田光走城陽將軍田既軍於膠東楚大司馬咎守成臯漢數挑戰楚軍不出使人辱之數日咎怒渡兵汜水士卒半渡漢擊之大破楚軍盡得楚國金玉貨賂咎及司馬欣皆自剄汜水上漢王引兵渡河復取成臯軍廣武就敖倉食項羽下梁地十餘城聞成臯破乃引兵還漢軍方圍鍾離眛於滎陽東聞羽至盡走險阻羽亦軍廣武與漢相守數月楚軍食少項王患之乃為髙俎置太公其上告漢王曰今不急下吾烹太公漢王曰吾與羽俱北面受命懷王約為兄弟吾翁即若翁必欲烹而翁幸分我一杯羮項王怒欲殺之項伯曰天下事未可知且為天下者不顧家雖殺之無益祗益禍耳項王從之項王謂漢王曰天下胸胸數嵗者徒以吾兩人耳願與漢王挑戰決雌雄毋徒苦天下之民父子為也漢王笑謝曰吾寧鬭智不能鬭力項王三令壯士出挑戰漢有善騎射者樓煩輒射殺之項王大怒乃自被甲持㦸挑戰樓煩欲射之項王瞋目叱之樓煩目不敢視手不敢發遂走還入壁不敢復出漢王使人間問之乃項王也漢王大驚於是項王乃即漢王相與臨廣武間而語羽欲與漢王獨身挑戰漢王數羽曰羽負約王我於蜀漢罪一矯殺卿子冠軍罪二救趙不還報而擅劫諸侯兵入關罪三燒秦宫室掘始皇帝冡收私其財罪四殺秦降王子嬰罪五詐坑秦子弟新安二十萬罪六王諸將善地而徙逐故主罪七出逐義帝彭城自都之奪韓王地并王梁楚多自與罪八使人隂殺義帝江南罪九為政不平主約不信天下所不容大逆無道罪十也吾以義兵從諸侯誅殘賊使刑餘罪人擊公何苦乃與公挑戰羽大怒伏弩射中漢王漢王傷胸乃捫足曰虜中吾指漢王病創卧張良彊請漢王起行勞軍以安士卒毋令楚乘勝漢王出行軍疾甚因馳入成臯韓信已定臨淄遂東追齊王項王使龍且將兵號二十萬以救齊與齊王合軍髙密客或說龍且曰漢兵逺鬭窮戰其鋒不可當齊楚自居其地兵易敗散不如深壁令齊王使其信臣招所亡城亡城聞王在楚來救必反漢漢兵二千里客居齊地齊城皆反之其勢無所得食可無戰而降也龍且曰吾平生知韓信為人易與耳寄食於漂母無資身之䇿受辱於袴下無兼人之勇不足畏也且夫救齊不戰而降之吾何功今戰而勝之齊之半可得也十一月齊楚與漢夾濰水而陳韓信夜令人為萬餘囊滿盛沙壅水上流引軍半渡擊龍且佯不勝還走龍且果喜曰固知信怯也遂追信信使人決壅囊水大至龍且軍太半不得渡即急擊殺龍且水東軍散走齊王廣亡去信遂追北至城陽虜齊王廣漢將灌嬰追得齊守相田光進至博陽田橫聞齊王死自立為齊王還擊嬰嬰敗橫軍於嬴下田橫亡走梁歸彭越嬰進擊齊將田吸於千乘曹參擊田既於膠東皆殺之盡定齊地立張耳為趙王漢王疾愈西入關至櫟陽梟故塞王欣頭櫟陽市留四日復如軍軍廣武春二月遣張良操印立韓信為齊王徴其兵擊楚項王聞龍且死大懼使盱台人武涉往說齊王信信不忍倍漢遂謝蒯徹將之叛語在諸秋八月漢王下令軍士不幸死者吏為衣衾棺斂轉送其家四方歸心焉項王自知少助食盡韓信又進兵擊楚羽患之漢遣侯公說羽請太公羽乃與漢約中分天下割洪溝以西為漢以東為楚九月楚歸太公呂后引兵解而東歸漢王欲西歸張良陳平說曰漢有天下太半而諸侯皆附楚兵疲食盡此天亡之時也今釋弗擊此謂養虎自遺患也漢王從之五年冬十月漢王追項羽至固陵與齊王信魏相國越期㑹擊楚信越不至楚擊漢軍大破之漢王復堅壁自守謂張良曰諸侯不從奈何對曰楚兵且破二人未有分地其不至固宜君王能與共天下可立致也齊王信之立非君王意信亦不自堅彭越本定梁地始君王以魏豹故拜越為相國今豹死越亦望王而君王不早定今能取睢陽以北至穀城皆以王彭越從陳以東傅海與齊王信信家在楚其意欲復得故邑能出捐此地以許兩人使各自為戰則楚易破也漢王從之於是韓信彭越皆引兵來十一月劉賈南渡淮圍壽春遣人誘楚大司馬周殷殷畔楚以舒屠六舉九江兵迎黥布並行屠城父隨劉賈皆㑹十二月項王至垓下兵少食盡與漢戰不勝入壁漢軍及諸侯兵圍之數重項王夜聞漢軍四面皆楚歌乃大驚曰漢皆已得楚乎是何楚人之多也則夜起飲帳中悲歌慷慨泣數行下左右皆泣莫能仰視於是項王乘其駿馬名騅麾下壯士騎從者八百餘人直夜潰圍南出馳走平明漢軍乃覺之令騎將灌嬰以五千騎追之項王渡淮騎能屬者才百餘人至陰陵迷失道問一田父田父紿曰左左乃陷大澤中以故漢追及之項王乃復引兵而東至東城乃有二十八騎漢騎追者數千人項王自度不得脫謂其騎曰吾起兵至今八嵗矣身七十餘戰未嘗敗北遂霸有天下然今卒困於此此天之亡我非戰之罪也今日固決死願為諸君快戰必潰圍斬將刈旗三勝之令諸君知天亡我非戰之罪也乃分其騎以為四隊四鄉漢軍圍之數重項王謂其騎曰吾為公取彼一將令四面騎馳下期山東為三處於是項王大呼馳下漢軍皆披靡遂斬漢一將是時郎中騎楊喜追項王項王瞋目而叱之喜人馬俱驚辟易數里項王與其騎㑹為三處漢軍不知項王所在乃分軍為三復圍之項王乃馳復斬漢二都尉殺數十百人復聚其騎亡其兩騎耳乃謂其騎曰何如騎皆伏曰如大王言於是項王欲東渡烏江烏江亭長檥船待謂項王曰江東雖小地方千里衆數十萬人亦足王也願大王急渡今獨臣有船漢軍至無以渡項王笑曰天之亡我我何渡為且籍與江東子弟八千人渡江而西今無一人還縱江東父兄憐而王我我何面目見之縱彼不言籍獨不愧於心乎乃以其所乘騅馬賜亭長令騎皆下馬步行持短兵接戰獨籍所殺漢軍數百人身亦被十餘創顧見漢騎司馬吕馬童曰若非吾故人乎馬童面之指示中郎騎王翳曰此項王也項王乃曰吾聞漢購我頭千金邑萬户吾為若德乃刎而死王翳取其頭餘騎相蹂踐爭項王相殺者數十人最其後楊喜吕馬童及郎中吕勝楊武各得其一體五人共㑹其體皆是故分其地封五人皆為列侯楚地悉定獨魯不下漢王引天下兵欲屠之至其城下猶聞絃誦之聲為其守禮義之國為主死節乃持項王頭以示魯父兄魯乃降漢王以魯公禮葬項王於穀城親為發哀哭之而去諸項氏枝屬皆不誅封項伯等四人皆為列侯賜姓劉氏諸民略在楚者皆歸之太史公曰羽起隴畝之中三年遂將五諸侯滅秦分裂天下而封王侯政由羽出位雖不終近古以來未嘗有也及羽背關懷楚放逐義帝而自立怨王侯叛已難矣自矜功伐奮其私智而不師古謂霸王之業欲以力征經營天下五年卒亡其國身死東城尚不覺寤而不自責乃引天亡我非用兵之罪也豈不謬哉楊子法言或問楚敗垓下方死曰天也諒乎曰漢屈羣䇿羣䇿屈羣力楚憞羣䇿而自屈其力屈人者克自屈者負天曷故焉春正月諸侯王皆上疏請尊漢王為皇帝二月甲午王即皇帝位于汜水之陽帝西都洛陽夏五月帝置酒洛陽南宮上曰徹侯諸將毋敢隱朕皆言其情吾所以有天下者何項氏之所以失天下者何髙起王陵對曰陛下使人攻城略地因以與之與天下同其利項羽不然有功者害之賢者疑之此其所以失天下也上曰公知其一未知其二夫運籌帷幄之中决勝千里之外吾不如子房填國家撫百姓給餉餽不絶糧道吾不如蕭何連百萬之衆戰必勝攻必取吾不如韓信三者皆人傑吾能用之此吾所以取天下者也項羽有一范增而不能用此所以為我禽也羣臣說服齊人婁敬戍隴西過洛陽脫挽輅衣羊裘因齊人虞將軍求見上虞將軍欲與之鮮衣婁敬曰臣衣帛衣帛見衣褐衣褐見終不敢易衣於是虞將軍入言上上召見問之婁敬曰陛下都洛陽豈欲與周室比隆哉上曰然婁敬曰陛下取天下與周異周之先自后稷封邰積德絫善十有餘世至于太王王季文王武王而諸侯自歸之遂滅殷為天子及成王即位周公相焉乃營洛邑以為此天下之中也諸侯四方納貢職道里均矣有德則易以王無德則易以亡故周之盛時天下和洽諸侯四夷莫不賓服效其貢職及其衰也天下莫朝周不能制也非唯其德薄也形勢弱也今陛下起豐沛卷蜀漢定三秦與項羽戰滎陽成臯之間大戰七十小戰四十使天下之民肝腦塗地父子暴骨中野不可勝數哭泣之聲未絶傷夷者未起而欲比隆於成康之時臣竊以為不侔也且夫秦地被山帶河四塞以為固卒然有急百萬之衆可立具也因秦之故資甚美膏腴之地此所謂天府者也陛下入關而都之山東雖亂秦之故地可全而有也夫與人鬬不扼其亢拊其背未能全其勝也今陛下案秦之故地此亦扼天下之亢而拊其背也帝問羣臣羣臣皆山東人爭言周王數百年秦二世即亡洛陽東有成臯西有殽澠倍河鄉伊洛其固亦足恃也上問張良良曰洛陽雖有此固其中小不過數百里田地薄四面受敵此非用武之國也關中左殽函右隴蜀沃野千里南有巴蜀之饒北有胡苑之利阻三面而守獨以一面東制諸侯諸侯安定河渭漕挽天下西給京師諸侯有變順流而下足以委輸此所謂金城千里天府之國也婁敬說是也上即日車駕西都長安拜婁敬為郎中號曰奉春君賜姓劉氏諸將之叛漢髙祖四年冬十月韓信襲齊已定臨淄遂東追齊王項王使龍且將兵救齊信擊殺龍且虜齊王廣韓信使人言漢王曰齊僞詐多變反覆之國也南邊楚請為假王以鎮之漢王發書大怒罵曰吾困於此旦暮望若來佐我乃欲自立為王張良陳平躡漢王足因附耳語曰漢方不利寧能禁信之自王乎不如因而立之善遇使自為守不然變生漢王亦悟因復罵曰大丈夫定諸侯即為真王耳何以假為春二月遣張良操印立韓信為齊王徴其兵擊楚項王聞龍且死大懼使䏏台人武涉往說齊王信曰天下共苦秦久矣相與戮力擊秦秦已破計功割地分土而王之以休士卒今漢王復興兵而東侵人之分奪人之地已破三秦引兵出關收諸侯之兵以東擊楚其意非盡吞天下者不休其不知厭足如是甚也且漢王不可必身居項王掌握中數矣項王憐而活之然得脫輒倍約復擊項王其不可親信如此今足下雖自以與漢王為厚交為之盡力用兵必終為所禽矣足下所以得須臾至今者以項王尚存也當今二王之事權在足下足下右投則漢王勝左投則項王勝項王今日亡則次取足下足下與項王有故何不反漢與楚連和參分天下王之今釋此時而自必於漢以擊楚且為智者固若此乎韓信謝曰臣事項王官不過郎中位不過執㦸言不聽畫不用故倍楚而歸漢漢王授我上將軍印豫我數萬衆解衣衣我推食食我言聽計用故吾得以至於此夫人深親信我我倍之不祥雖死不易幸為信謝項王武涉已去蒯徹知天下權在信乃以相人之術說信曰僕相君之面不過封侯又危不安相君之背貴乃不可言韓信曰何謂也蒯徹曰天下初發難也憂在亡秦而已今楚漢分爭使天下之人肝膽塗地父子暴骸骨於中野不可勝數楚人越彭城轉鬬逐北乘利席卷威震天下然兵困於京索之閒迫西山而不能進者三年於此矣漢王將數十萬之衆距鞏雒阻山河之險一日數戰無尺寸之功折北不救此所謂智勇俱困者也百姓罷極怨望無所歸倚以臣料之其勢非天下之賢聖固不能息天下之禍當今兩主之命縣於足下足下為漢則漢勝與楚則楚勝誠能聽臣之計莫若兩利而俱存之參分天下鼎足而居其勢莫敢先動夫以足下之賢聖有甲兵之衆據彊齊從燕趙出空虛之地而制其後因民之欲西鄉為百姓請命則天下風走而響應矣孰敢不聽割大弱彊以立諸侯諸侯已立天下服聽而歸德於齊案齊之故有膠泗之地深拱揖讓則天下之君王相率而朝於齊矣蓋聞天與弗取反受其咎時至不行反受其殃願足下熟慮之韓信曰漢王遇我甚厚吾豈可以鄉利而倍義乎蒯生曰始常山王成安君為布衣時相與為刎頸之交後爭張黶陳澤之事常山王殺成安君汦水之南頭足異處此二人相與天下至歡也然而卒相禽者何也患生於多欲而人心難測也今足下欲行忠信以交於漢王必不能固於二君之相與也而事多大於張黶陳澤者故臣以為足下必漢王之不危己亦誤矣大夫種存亡越霸句踐立功成名而身死亡野獸已盡而獵狗烹夫以交友言之則不如張耳之與成安君者也以忠信言之則不過大夫種之於句踐也此二者足以觀矣願足下深慮之且臣聞勇略震主者身危功蓋天下者不賞今足下戴震主之威挾不賞之功歸楚楚人不信歸漢漢人震恐足下欲持是安歸乎韓信謝曰先生且休矣吾將念之後數日蒯徹復說曰夫聽者事之候也計者事之機也聽過計失而能久安者鮮矣故知者決之斷也疑者事之害也審毫釐之小計遺天下之大數智誠知之决弗敢行者百事之禍也夫功者難成而易敗時者難得而易失也時乎時不再來韓信猶豫不忍倍漢又自以為功多漢終不奪我齊遂謝蒯徹因去佯狂為巫五年冬十月漢王追項羽至固陵與韓信彭越期㑹擊楚信越不至漢王用張良計分地以王二人帝滅楚事見髙十二月漢王還至定陶馳入齊王信壁奪其軍春正月更立齊王信為楚王王淮北郡下邳封魏相國建城侯彭越為梁王王魏故地都定陶六年冬十月人有上書告楚王信反者帝以問諸將皆曰亟發兵坑豎子耳帝默然又問陳平陳平曰人上書言信反信知之乎曰不知陳平曰陛下精兵孰與楚上曰不能過平曰陛下諸將用兵有能過韓信者乎上曰莫及也平曰今兵不如楚精而將不能及舉兵攻之是趣之戰也竊為陛下危之上曰為之奈何平曰古者天子有巡狩㑹諸侯陛下第出僞游雲夢㑹諸侯於陳陳楚之西界信聞天子以好出游其藝必無事而郊迎謁謁而陛下因禽之此特一力士之事耳帝以為然乃發使告諸侯㑹陳吾將南游雲夢上因隨以行楚王信聞之自疑懼不知所為或說信曰斬鍾離眛以謁上上必喜無患信從之十二月上㑹諸侯於陳信持眛首謁上上令武士縛信載後車信曰果若人言狡兔死走狗烹髙鳥盡良弓藏敵國破謀臣亡天下已定我固當烹上曰人告公反遂械繫信以歸因赦天下田肯賀上曰陛下得韓信又治秦中秦形勝之國也帶河阻山地藝便利其以下兵於諸侯譬猶居髙屋之上建瓴水也夫齊東有琅邪即墨之饒南有泰山之固西有濁河之限北有勃海之利地方二千里持㦸百萬此東西秦也非親子弟莫可使王齊者上曰善賜金五百金上還至洛陽赦韓信封為淮陰侯信知漢王畏惡其能多稱病不朝從居常鞅鞅羞與絳灌等列嘗過樊將軍噲噲跪拜送迎言稱臣曰大王乃肯臨臣信出門笑曰生乃與噲等為伍上嘗從容與信言諸將能將兵多少上問曰如我能將幾何信曰陛下不過能將十萬上曰於君何如曰臣多多而益善耳上笑曰多多益善何為為我禽信曰陛下不能將兵而善將將此乃信之所以為陛下禽也且陛下所謂天授非人力也十年初上以陽夏侯陳豨為相國監趙代邊兵豨過辭淮隂侯淮隂侯挈其手辟左右與之步於庭仰天嘆曰子可與言乎豨曰唯將軍令之淮隂侯曰公之所居天下精兵處也而公陛下之信幸臣也人言公之畔陛下必不信再至陛下乃疑矣三至必怒而自將吾為公從中起天下可圖也陳豨素知其能也信之曰謹奉教豨常慕魏無忌之養士及為相守邊告歸過趙賓客隨之者千餘乘邯鄲官舍皆滿趙相周昌求入見上具言豨賓客甚盛擅兵於外數嵗恐有變上令人覆案豨客居代者諸不法事多連引豨豨恐韓王信因使王黃曼丘臣等說誘之太上皇崩上使人召豨豨稱病不至九月遂與王黃等反自立為代王劫略趙代上自東擊之至邯鄲喜曰豨不南據邯鄲而阻漳水吾知其無能為矣周昌奏常山二十五城亡其二十城請誅守尉上曰守尉反乎對曰不上曰是力不足亡罪上令周昌選趙壯士可令將者白見四人上嫚罵曰豎子能為將乎四人慙皆伏地上封各千户以為將左右諫曰從入蜀漢伐楚賞未遍行今封此何功上曰非汝所知陳豨反趙代地皆豨有吾以羽檄徴天下兵未有至者今計唯獨邯鄲中兵耳吾何愛四千户不以慰趙子弟皆曰善又聞豨將皆故賈人上曰吾知所以與之矣乃多以金購豨將豨將多降十一年冬上在邯戰陳豨將侯敞將萬餘人游行王黃將騎千餘軍曲逆張春將卒萬餘人渡河攻聊城漢將軍郭䝉與齊將擊大破之太尉周勃道太原入定代地至馬邑不下攻殘之趙利守東垣帝攻拔之更命曰真定帝購王黃曼丘臣以千金其麾下皆生致之於是陳豨軍遂敗淮隂侯信稱病不從擊豨隂使人至豨所與通謀信謀與家臣夜詐詔赦諸官徒奴欲發以襲吕后太子部署已定待豨報其舍人得罪於信信囚欲殺之春正月舍人弟上變告信欲反狀於吕后吕后欲召恐其黨不就乃與蕭相國謀詐令人從上所來言豨已得死列侯羣臣皆賀相國紿信曰雖疾彊入賀信入吕后使武士縛信斬之長樂鍾室信方斬曰吾悔不用蒯徹之計乃為兒女子所詐豈非天哉遂夷信三族臣光曰世或以韓信為首建大䇿與髙祖起漢中定三秦遂分兵以北禽魏取代仆趙脅燕東擊齊而有之南滅楚垓下漢之所以得天下者大抵皆信之功也觀其距蒯徹之說迎髙祖於陳豈有反心哉良由失職怏怏遂陷悖逆夫以盧綰里閈舊恩猶南面王燕信乃以列侯奉朝請豈非髙祖亦有負於信哉臣以為髙祖用詐謀禽信於陳言負則有之雖然信亦有以取之也始漢與楚相距滎陽信滅齊不還報以自王其後漢追楚至固陵與信期共攻楚而信不至當是之時髙祖固有取信之心矣顧力不能耳及天下已定則信復何恃哉夫乘時以徼利者市井之志也酬功而報德者士君子之心也信以市井之志利其身而以士君子之心望於人不亦難哉是故太史公論之曰假令韓信學道謙讓不伐己功不矜其能則庶幾哉於漢家勳可以比周召太公之徒後世血食矣不務出此而天下已集乃謀畔逆夷滅宗族不亦宜乎上還洛陽聞淮隂侯之死且喜且憐之問吕后曰信死亦何言吕后曰信言恨不用蒯徹計上曰是齊辨士蒯徹也乃詔齊捕蒯徹蒯徹至上曰若教淮陰侯反乎對曰然臣固教之豎子不用臣之䇿故令自夷於此如用臣之計陛下安得而夷之乎上怒曰烹之徹曰嗟乎寃哉烹也上曰若教韓信反何寃對曰秦失其鹿天下共逐之髙材疾足者先得焉跖之狗吠堯堯非不仁狗固吠非其主當是時臣唯獨知韓信非知陛下也且天下鋭精持鋒欲為陛下所為者甚衆顧力不能耳又可盡烹之邪上曰置之上之擊陳豨也徴兵於梁梁王稱病使將將兵詣邯鄲上怒使人讓之梁王恐欲自往謝其將扈輒曰王始不往見讓而往往則為禽矣不如遂發兵反梁王不聽梁太僕得罪亡走漢告梁王與扈輒謀反於是上使使掩梁王梁王不覺遂囚之洛陽有司治反形己具請論如法上赦以為庶人傳處蜀青衣西至鄭逢吕后從長安來彭王為吕后泣涕自言無罪願處故昌邑呂后許諾與俱東至洛陽吕后白上曰彭王壯士今徙之蜀此自遺患不如遂誅之妾謹與俱來於是吕后乃令其舍人告彭越復謀反廷尉王恬開奏請族之上可其奏三月夷越三族梟越首洛陽下詔有收視者輒捕之梁大夫欒布使於齊還奏事越頭下祠而哭之吏捕以聞上召布罵欲烹之方提趨湯布顧曰願一言而死上曰何言布曰方上之困於彭城敗滎陽成臯間項王所以遂不能西者徒以彭王居梁地與漢合從苦楚也當是之時王一顧與楚則漢破與漢而楚破且垓下之㑹微彭王項氏不亡天下已定彭王剖符受封亦欲傳之萬世今陛下一徴兵於梁彭王病不行而陛下疑以為反反形未具以苛小案誅滅之臣恐功臣人人自危也今彭王已死臣生不如死請就烹於是上乃釋布罪拜為都尉秋七月淮南王布反初淮隂侯死布已心恐及彭越誅醢其肉以賜諸侯使者至淮南淮南王方獵見醢因大恐陰令人部聚兵候伺旁郡警急布所幸姬病就醫醫家與中大夫賁赫對門赫乃厚餽遺從姬飲醫家王疑其與亂欲捕赫赫乘傳詣長安上變言布謀反有端可先未發誅也上讀其書語蕭相國相國曰布不宜有此恐仇怨妄誣之請繫赫使人微驗淮南王淮南王布見赫以罪亡上變固已疑其言國陰事漢使又來頗有所驗遂族赫家發兵反反書聞上乃赦賁赫以為將軍上召諸將問計皆曰發兵擊之坑豎子耳何能為乎汝陰侯滕公召故楚令尹薛公問之令尹曰是固當反滕公曰上裂地而封之疏爵而王之其反何也令尹曰往年殺彭越前年殺韓信此三人者同功一體之人也自疑禍及身故反耳滕公言之上上乃召見問薛公薛公對曰布反不足怪也使布出於上計山東非漢之有也出於中計勝敗之數未可知也出於下計陛下安枕而卧矣上曰何謂上計對曰東取吳西取楚并齊取魯傳檄燕趙固守其所山東非漢之有也何謂中計東取吳西取楚并韓取魏據敖倉之粟塞成臯之口勝敗之數未可知也何謂下計東取吳西取下蔡歸重於越身歸長沙陛下安枕而卧漢無事矣上曰是計將安出對曰出下計上曰何謂廢上中計而出下計對曰布故麗山之徒也自致萬乘之主此皆為身不顧後為百姓萬世慮者也故曰出下計上曰善封薛公千户乃立皇子長為淮南王是時上有疾欲使太子往擊黥布太子客東園公綺里季夏黃公角里先生說建成侯吕釋之曰太子將兵有功則位不益無功則從此受禍矣君何不急請吕后承閒為上泣言黥布天下猛將也善用兵今諸將皆陛下故等夷乃令太子將此屬無異使羊將狼莫肯為用且使布聞之則鼓行而西耳上雖病彊載輜車卧而護之諸將不敢不盡力上雖苦為妻子自彊於是吕釋之立夜見吕后吕后承閒為上泣涕而言如四人意上曰吾惟豎子固不足遣而公自行耳於是上自將兵而東羣臣居守皆送至霸上留侯病自彊起至曲郵見上曰臣宜從病甚楚人剽疾願上無與爭鋒因說上令太子為將軍監關中兵上曰子房雖病彊卧而傅太子是時叔孫通為太傅留侯行少傅事發上郡北地隴西車騎巴蜀材官及中尉卒三萬人為皇太子衛軍霸上布之初反謂其將曰上老矣厭兵必不能來使諸將諸將獨患淮隂彭越今皆已死餘不足畏也故遂反果如薛公之言東擊荆荆王賈走死富陵盡劫其兵渡淮擊楚楚發兵與戰徐僮間為三軍欲以相救為竒或說楚將曰布善用兵民素畏之且兵法諸侯自戰其地為散地今别為三彼敗吾一軍餘皆走安能相救不聽布果破其一軍其二軍散走布遂引兵而西十二年冬十月上與布兵遇於蘄西布兵精甚上壁庸城望布軍置陳如項籍軍上惡之與布相望見遙謂布曰何苦而反布曰欲為帝耳上怒罵之遂大戰布軍敗走渡淮數止戰不利與百餘人走江南上令别將追之漢别將擊英布軍洮水南比皆大破之布故與番君婚以故長沙成王臣使人誘布僞欲與亡走越布信而隨之番陽人殺布兹鄉民田舍周勃悉定代郡鴈門雲中地斬陳豨於當城陳豨之反也燕王綰發兵擊其東北當是時陳豨使王黃求救胸奴燕王綰亦使其臣張勝於胸奴言豨等軍破張勝至胡故燕王臧荼子衍出亡在胡見張勝曰公所以重於燕者以習胡事也燕所以久存者以諸侯數反兵連不決也今公為燕欲急滅豨等豨等已盡次亦至燕公等亦且為虜矣公何不令燕且緩陳豨而與胡和事寬得長王燕即有漢急可以安國張勝以為然乃私令胸奴助豨等擊燕燕王綰疑張勝與胡反上書請族張勝勝還具道所以為者燕王乃詐論他人脫勝家屬使得為胸奴間而陰使范齊之陳豨所欲令久亡連兵勿決漢擊黥布豨常將兵居代漢擊斬豨其禆將降言燕王綰使范齊通計謀於豨所帝使使召盧綰綰稱病上又使辟陽侯審食其御史大夫趙堯往迎燕王因驗問左右綰愈恐閉匿謂其幸臣曰非劉氏而王獨我與長沙耳往年春漢族淮隂夏誅彭越皆吕氏計今上病屬任吕后吕后婦人專欲以事誅異姓王者及大功臣乃遂稱病不行其左右皆亡匿語頗泄辟陽侯聞之歸具報上上益怒又得胸奴降者言張勝亡在胸奴為燕使於是上曰盧綰果反矣春二月使樊噲以相國將兵擊綰立皇子建為燕王盧綰與數千人居塞下候伺幸上疾愈自入謝聞帝崩遂亡入胸奴胸奴和親漢髙祖六年𥘉胸奴畏秦北徙十餘年及秦滅胸奴復稍南度河單于頭曼有太子曰冒頓後有所愛閼氏生少子頭曼欲立之是時東胡强而月氏盛乃使冒頓質於月氏既而頭曼急擊月氏月氏欲殺冒頓冒頓盜其善馬騎之亡歸頭曼以為壯令將萬騎冒頓乃作鳴鏑習勒其騎射令曰鳴鏑所射而不悉射者斬之冒頓乃以鳴鏑自射其善馬既又射其愛妻左右或不敢射者皆殺之最後以鳴鏑射單于善馬左右皆射之於是冒頓知其可用從頭曼獵以鳴鏑射頭曼其左右亦皆隨鳴鏑而射遂殺頭曼盡誅其後母與弟及大臣不聽從者冒頓自立為單于東胡聞冒頓立乃使使謂冒頓欲得頭曼時千里馬冒頓問羣臣羣臣皆曰此胸奴寶馬也勿與冒頓曰奈何與人鄰國而愛一馬乎遂與之居頃之東胡又使使謂冒頓欲得單于一閼氏冒頓復問左右左右皆怒曰東胡無道乃求閼氏請擊之冒頓曰奈何與人鄰國愛一女子乎遂取所愛閼氏豫東胡東胡王愈益驕東胡與胸奴中間有棄地莫居千餘里各居其邊為甌脫東胡使使謂冒頓此棄地欲有之冒頓問羣臣羣臣或曰此棄地豫之亦可勿與亦可於是冒頓大怒曰地者國之本也奈何豫之諸言豫之者皆斬之冒頓上馬令國中有後出者斬遂襲擊東胡東胡初輕冒頓不為備冒頓遂滅東胡既歸又西擊走月氏南并樓煩白羊河南王遂侵燕代悉復收䝉恬所奪胸奴故地與漢關故河南塞至朝那膚施是時漢兵方與項羽相距中國罷於兵革以故冒頓得自彊控弦之士三十餘萬威服諸國秋胸奴圍韓王信於馬邑信數使使胡求和解漢發兵救之疑信數閒使有二心使人責讓信信恐誅九月以馬邑降胸奴胸奴冒頓因引兵南踰句注攻太原至晉陽七年冬十月上自將擊韓王信破其軍於銅鞮斬其將王喜信亡走胸奴白土人曼丘臣王黃等立趙苖裔趙利為王復收信敗散兵與信及胸奴謀攻漢胸奴使左右賢王將萬餘騎與王黃等屯廣武以南至晉陽漢兵擊之胸奴輒敗走已復屯聚漢兵乘勝追之㑹天大寒雨雪士卒墮指者什二三上居晉陽聞冒頓居代谷欲擊之使人覘胸奴冒頓匿其壯士肥牛馬但見老弱及羸畜使者十輩來皆言胸奴可擊上復使劉敬往使胸奴未還漢悉兵三十二萬北逐之踰句注劉敬還報曰兩國相擊此宜夸矜見所長今臣往徒見羸瘠老弱此必欲見短伏竒兵以爭利愚以為胸奴不可擊也是時漢兵已業行上怒罵劉敬曰齊虜以口舌得官今乃妄言沮吾軍械繫敬廣武帝先至平城兵未盡到冒頓縱精兵四十萬騎圍帝於白登七日漢兵中外不得相救餉帝用陳平祕計使使間厚遺閼氏閼氏謂冒頓曰兩主不相困今得漢地而單于終非能居之也且漢主亦有神靈單于察之冒頓與王黃趙利期而黃利兵不來疑其與漢有謀乃解圍之一角㑹天大霧漢使人往來胸奴不覺陳平請令彊弩傅兩矢外鄉從解角直出帝出圍欲驅太僕滕公固徐行至平城漢大軍亦到胡騎遂解去漢亦罷兵歸令樊噲止定代地上至廣武赦劉敬曰吾不用公言以困平城吾皆已斬前使十輩矣乃封敬二千户為關內侯號為建信侯帝南過曲逆曰壯哉縣吾行天下獨見洛陽與是耳乃更封陳平為曲逆侯盡食之平從帝征伐凡六出竒計輒益封邑焉十二月胸奴攻代代王喜棄國自歸赦為郃陽侯八年胸奴冒頓數苦北邊上患之問劉敬劉敬曰天下初定士卒罷於兵未可以武服也冒頓殺父代立妻羣母以力為威未可以仁義說也獨可以計久逺子孫為臣耳然恐陛下不能為上曰奈何對曰陛下誠能以適長公主妻之厚奉遺之彼必慕以為閼氏生子必為太子陛下以嵗時漢所餘彼所鮮數問遺因使辨士風諭以禮節冒頓在固為子壻死則外孫為單于豈嘗聞外孫敢與大父抗禮者哉可無戰以漸臣也若陛下不能遣長公主而令宗室及後宫詐稱公主彼知不肯貴近無益也帝曰善欲遣長公主吕后日夜泣曰妾唯太子一女奈何棄之胸奴上竟不能遣九年冬上取家人子名為長公主以妻單于使劉敬往結和親約臣光曰建信侯謂冒頓殘賊不可以仁義說而欲與為婚姻何前後之相違也夫骨肉之恩尊卑之叙唯仁義之人為能知之奈何欲以此服冒頓哉蓋上世帝王之御夷狄也服則懷之以德叛則震之以威未聞與為㛰姻也且冒頓視其父如禽獸而獵之奚有於婦翁建信侯之術固已踈矣况魯元已為趙后又可奪乎惠帝三年春以宗室女為公主嫁胸奴冒頓單于是時冒頓方彊為書使使遺髙后辭極䙝嫚髙后太怒召將相大臣議斬其使者發兵擊之樊噲曰臣願得十萬衆橫行胸奴中中郎將季布曰噲可斬也前胸奴圍髙帝於平城漢兵三十二萬噲為上將軍不能解圍今歌吟之聲未絶傷夷者甫起而噲欲搖動天下妄言以十萬衆橫行是面謾也且夷狄譬如禽獸得其善言不足喜惡言不足怒也髙后曰善令大謁者張釋報書深自謙遜以謝之并遺以車二乘馬二駟冒頓復使使來謝曰未嘗聞中國禮義陛下幸而赦之因獻馬遂和親髙后六年四月胸奴冦狄道攻河陽七年冬十二月胸奴冦狄道略二千餘人文帝前三年五月胸奴右賢王入居河南地侵盜上郡保塞蠻夷殺略人民上幸甘泉遣丞相灌嬰發車騎八萬五千詣髙奴擊右賢王發中尉材官屬衛將軍軍長安右賢王走出塞六年冬十月胸奴單于道漢書曰前時皇帝言和親事稱書意合歡漢邊吏侵侮右賢王右賢王不請聽後義盧侯難支等計與漢吏相距絶二主之約離兄弟之親故罰右賢王使之西求月氏擊之以天之福吏卒良馬力强以夷滅月氏盡斬殺降下定之樓蘭烏孫呼揭及其旁二十六國皆己為胸奴諸引弓之民并為一家北州已定願寢兵休士卒養馬除前事復故約以安邊民皇帝即不欲胸奴近塞則且詔吏民逺舍帝報書曰單于欲除前事復故約朕甚嘉之此古聖王之志也漢與胸奴約為兄弟所以遺單于甚厚倍約離兄弟之親者常在胸奴然右賢王事已在赦前單于勿深誅單于若稱書意明告諸吏使無負約有信敬如單于書後頃之冒頓死子稽粥立號曰老上單于老上單于初立帝復遣宗室女翁主為單于閼氏使宦者燕人中行說傅翁主說不欲行漢强使之說曰必我也為漢患者中行說既至因降單于單于甚親幸之初胸奴好漢繒絮食物中行說曰胸奴人衆不能當漢之一郡然所以强者以衣食異無仰於漢也今單于變俗好漢物漢物不過什二則胸奴盡歸於漢矣其得漢繒絮以馳草棘中衣袴皆裂敝以示不如旃裘之完善也得漢食物皆去之以示不如湩酪之便美也於是說教單于左右疏記以計課其人衆畜牧其遺漢書牘及印封皆令長大倨傲其辭自稱天地所生日月所置胸奴大單于漢使或訾笑胸奴俗無禮義者中行說輒窮漢使曰胸奴約束徑易行君臣簡可久一國之政猶一體也故胸奴雖亂必立宗種今中國雖云有禮義及親屬益踈則相殺奪以至易姓皆從此類也嗟土室之人顧無多辭喋喋占占顧漢所輸胸奴繒絮米蘖令其量中必善美而已矣何以言為乎且所給備善則己不備苦惡則候秋熟以騎馳蹂而稼穡耳梁太傅賈誼上疏曰天下之藝方倒縣凡天子者天下之首何也上也蠻夷者天下之足何也下也今胸奴嫚侮侵掠至不敬也而漢嵗致金絮采繒以奉之足反居下首顧居下倒縣如此莫之能解猶為國有人乎可為流涕者此也今不獵猛敵而獵田彘不搏反冦而搏畜莬玩細娛而不圖大患德可逺加而直數百里外威令不伸可為流涕者此也十一年冬十一月胸奴冦狄道時胸奴數為邊患太子家令潁川鼉錯上言兵事曰兵法曰有必勝之將無必勝之民繇此觀之安邊境立功名在於良將不可不擇也臣又聞用兵臨戰合刃之急者三一曰得地形二曰卒服習三曰器用利兵法步兵車騎弓弩長㦸矛鋋劒楯之地各有所宜不得其宜者或十不當一士不選練卒不服習起居不精動靜不集趨利弗及避難不畢前擊後解與金鼓之指相失此不習勒卒之過也百不當十兵不完利與空手同甲不堅密與袒裼同弩不可以及逺與短兵同射不能中與無矢同中不能入與無鏃同此將不省兵之禍也五不當一故兵法曰器械不利以其卒豫敵也卒不可用以其將豫敵也將不知兵以其主豫敵也君不擇將以其國豫敵也四者兵之至要也臣又聞小大異形彊弱異藝險易異備夫卑身以事彊小國之形也合小攻大大敵國之形也以蠻夷攻蠻夷中國之形也今胸奴地形技藝與中國異上下山阪出入溪澗中國之馬弗與也險道傾反且馳且射中國之騎弗與也風雨罷勞飢渴不困中國之人弗與也此胸奴之長技也若夫平原易地輕車突騎則胸奴之衆易橈亂也徑弩長㦸射疏及逺則胸奴之弓弗能格也堅甲利刃長短相雜遊弩往來什伍俱前則胸奴之兵弗能當也材官騶發矢道同的則胸奴之革笥木薦弗能支也下馬地鬬劒㦸相接去就相薄則胸奴之足弗能給也此中國之長技也以此觀之胸奴之長技三中國之長技五陛下又興數十萬之衆以誅數萬之胸奴衆寡之計以一擊十之術也雖然兵凶器戰危事也故以大為小以彊為弱在俯仰之間耳夫以人之死爭勝跌而不振則悔之無及也帝王之道出於萬全今降胡義渠蠻夷之屬來歸誼者其衆數千飲食長技與胸奴同可賜之堅甲絮衣徑弓利矢益以邊郡之良騎令明將能知其習俗和輯其心者以陛下之明約將之即有險阻以此當之平地通道則以輕車材官制之兩軍相為表裏各用其長技衡加之以衆此萬全之術也帝嘉之賜錯書寵答焉錯又上言曰臣聞秦起兵而攻胡粵者非以衛邊地而救民死也貪戾而欲廣大也故功未立而天下亂且夫起兵而不知其藝戰則為人禽屯則卒積死夫胡貉之人其性耐寒揚粵之人其性耐暑秦之戍卒不耐其水土戍者死於邊輸者僨於道秦民見行如往棄市因以謫發之名曰謫戍先發吏有謫及贅壻賈人後以嘗有市籍者又後以大父母父母嘗有市籍者後入閭取其左發之不順行者憤怨有萬死之害而亡銖兩之報死事之後不得一算之復天下明知禍烈及己也陳勝行戍至於大澤為天下先倡天下從之如流水者秦以威劫而行之之敝也胡人衣食之業不著於地其藝易以擾亂邊境往來轉徙時至時去此胡人之生業而中國之所以離南畝也今胡人數轉牧行獵於塞下以候備塞之卒卒少則入陛下不救則邊民絶望而有降敵之心救之少發則不足多發逺縣才至則胡又已去聚而不罷為費甚大罷之則胡復入如此連年則中國貧苦而民不安矣陛下幸憂邊境遣將吏發卒以治塞甚大惠也然令逺方之卒守塞一嵗而更不知胡人之能不如選常居者家室田作且以備之以便為之髙城深塹要害之處通川之道調立城邑母下千家先為室屋具田器乃募民免罪拜爵復其家豫冬夏衣禀食能自給而止塞下之民祿利不厚不可使久居危難之地胡人入驅而能止其所驅者以其半豫之縣官為贖其民如是則邑里相救助赴胡不避死非以德上也欲全親戚而利其財也此與東方之戍卒不習地藝而心畏胡者功相萬也以陛下之時徙民實邊使逺方無屯戍之事塞下之民父子相保無係虜之患利施後世名稱聖明其與秦之行怨民相去逺矣上從其言募民徙塞下錯復言陛下幸募民徙以實塞下使屯戍之事益省輸將之費益寡甚大惠也下吏誠能稱厚惠奉明法存恤所徙之老弱善遇其壯士和輯其心而勿侵刻使先至者安樂而不思故鄉則貧民相慕而勸往矣臣聞古之徙民者相其陰陽之和嘗其水泉之味然後營邑立城製里割宅先為築室家置器物焉民至有所居作有所用此民所以輕去故鄉而勸之新邑也為置醫巫以救疾病以修祭祀男女有昏生死相恤墳墓相從種樹畜長室屋完安此所以使民樂其處而有長居之心也臣又聞古之制邊縣以備敵也使五家為伍伍有長十長一里里有假士四里一連連有假五百十連一邑邑有假候皆擇其邑之賢材有護習地形知民心者居則習民於射法出則教民於應敵故卒伍成於內則軍政定於外服習以成勿令遷徙幼則同遊長則共事夜戰聲相知則足以相救晝戰目相見則足以相識歡愛之心足以相死如此而勸以厚賞威以重罰則前死不還踵矣所徙之民非壯有材者但費衣糧不可用也未有材力不得良吏猶亡功也陛下絶胸奴不與和親臣竊意其冬來南也一大治則終身創矣欲立威者始於折膠來而不能困使得氣去後未易服也十四年冬胸奴老上單于十四萬騎入朝那蕭關殺北地都尉卬虜人民畜産甚多遂至彭陽使竒兵入燒回中宫候騎至雍甘泉帝以中尉周舍郎中令張武為將軍發車千乘騎卒十萬軍長安旁以備胡冦而拜昌侯盧卿為上郡將軍寧侯魏遫為北地將軍隆慮侯周竈為隴西將軍屯三郡上親勞軍勒兵申教令賜吏卒自欲征胸奴羣臣諫不聽皇太后固要上乃止於是以東陽侯張相如為大將軍成侯董赤內史欒布皆為將軍擊胸奴單于留塞內月餘乃去漢逐出塞即還不能有所殺後二年胸奴連歲入邊殺略人民畜産甚多雲中遼東最甚郡萬餘人上患之乃使使遺胸奴書單于亦使當户報謝復與胸奴和親三年胸奴老上單于死子軍臣單于立六年冬胸奴三萬騎入上郡三萬騎入雲中所殺略甚衆烽火通於甘泉長安以中大夫令免為車騎將軍屯飛狐故楚相蘇意為將軍屯句注將軍張武屯北地河內太守周亞夫為將軍次細柳宗正劉禮為將軍次霸上祝兹侯徐厲為將軍次棘門以備胡上自勞軍至霸上及棘門軍直馳入將以下騎送迎已而之細柳軍軍士吏披甲鋭兵刃彀弓弩持滿天子先驅至不得入先驅曰天子且至軍門都尉曰將軍令曰軍中聞將軍令不聞天子之詔居無何上至又不得入於是上乃使使持節詔將軍吾欲入營勞軍亞夫乃傳言開壁門壁門士請車騎曰將軍約軍中不得驅馳於是天子乃桉轡徐行至營將軍亞夫持兵揖曰介胄之士不拜請以軍禮見天子為動改容式車使人稱謝皇帝敬勞將軍成禮而去既出軍門羣臣皆驚上曰嗟乎此真將軍矣曩者霸上棘門軍若兒戲耳其將固可襲而虜也至於亞夫可得而犯邪稱善者久之月餘漢兵至邊胸奴亦逺塞漢兵亦罷乃拜周亞夫為中尉孝景元年夏四月遣御史大夫青至代下與胸奴和親二年秋與胸奴和親五年遣公主嫁胸奴單于中二年春二月胸奴入燕六年六月胸奴入鴈門至武泉入上郡取苑馬吏卒戰死者二千人隴西李廣為上郡太守嘗從百騎出卒遇胸奴數千騎見廣以為誘騎皆驚上山陳廣之百騎皆大恐欲馳還走廣曰吾去大軍數十里今如此以百騎走胸奴追射我立盡今我留胸奴必以我為大軍之誘必不敢擊我廣令諸騎曰前未到胸奴陳二里所止令曰皆下馬解鞍其騎曰虜多且近即有急奈何廣曰彼虜以我為走今皆解鞍以示不走用堅其意於是胡騎遂不敢擊有白馬將出護其兵李廣上馬與十餘騎奔射殺白馬將而復還至其騎中解鞍令士皆縱馬卧是時㑹暮胡兵終怪之不敢擊夜半時胡兵亦以為漢有伏軍於旁欲夜取之胡皆引兵而去平旦李廣乃歸其大軍後二年三月胸奴入鴈門太守馮敬與戰死發車騎材官屯鴈門孝武建元六年胸奴來請和親天子下其議大行王恢燕人也習胡事議曰漢與胸奴和親率不過數嵗即復倍約不如勿許興兵擊之韓安國曰胸奴遷徙鳥舉難得而制自上古不屬為人今漢行數千里與之爭利則人馬罷乏虜以全制其敝此危道也不如和親羣臣議者多附安國於是上許和親諸吕之變髙祖十年定陶戚姬有寵於上生趙王如意上以太子仁弱謂如意類己雖封為趙王常留之長安上之關東戚姬常從日夜啼泣欲立其子吕后年長常留守益疏上欲廢太子而立趙王大臣爭之皆莫能得御史大夫周昌廷爭之彊上問其說昌為人吃又盛怒曰臣口不能言然臣期期知其不可陛下欲廢太子臣期期不奉詔上欣然而笑吕后側耳於東廂聽既罷見昌為跪謝曰微君太子幾廢時趙王年十嵗上憂萬嵗之後不全也符璽御史趙堯請為趙王置貴彊相及吕后太子羣臣素所敬憚者上曰誰可者堯曰御史大夫昌其人也上乃以昌相趙而以堯代昌為御史大夫十二年十一月上從破黥布歸疾益甚愈欲易太子張良諫不聽因疾不視事叔孫通諫曰昔者晉獻公以驪姬之故廢太子立奚齊晉國亂者數十年為天下笑秦以不蚤定扶蘇令趙髙得以詐立胡亥自取滅祀此陛下所親見今太子仁孝天下皆聞之吕后與陛下攻苦食啖其可背哉陛下必欲廢適而立少臣願先伏誅以頸血汙地帝曰公罷矣吾直戲耳叔孫通曰太子天下本本一搖天下振動奈何以天下為戲乎時大臣固爭者多上知羣臣心皆不附趙王乃止不立初上擊布時為流矢所中行道疾甚吕后問曰陛下百嵗後蕭相國既死誰令代之上曰曹參可問其次曰王陵可然少戇陳平可以助之陳平知有餘然難獨任周勃重厚少文然安劉氏者必勃也可令為太尉吕后復問其次上曰此後亦非乃所知也夏四月甲辰帝崩于長樂宫五月己巳太子即皇帝位尊皇后曰皇太后太后令永巷囚戚夫人髠鉗衣赭衣令舂遣使召趙王如意使者三反趙相周昌謂使者曰髙帝屬臣趙王趙王年少竊聞太后怨戚夫人欲召趙王并誅之臣不敢遣王王且亦病不能奉詔太后怒先使人召昌昌至長安乃使人復召趙王王來未到帝知太后怒自迎趙王霸上與入宫自挾與起居飲食太后欲殺之不得閒惠帝元年冬十二月帝晨出射趙王少不能蚤起太后使人持鴆飲之黎明帝還趙王已死太后遂斷戚夫人手足去眼輝耳飲瘖藥使居厠中命曰人彘居數日乃召帝觀人彘帝見問知其戚夫人乃大哭因病歲餘不能起使人請太后曰此非人所為臣為太后子終不能治天下帝以此日飲為淫樂不聽政臣光曰為人子者父母有過則諫諌而不聽則號泣而隨之安有守髙祖之業為天下之主不忍母之殘酷遂棄國家而不恤縱酒色以傷生若孝惠者可謂篤於小仁而未知大誼也六年冬十月以王陵為右丞相陳平為左丞相以周勃為太尉七年秋八月戊寅帝崩于未央宫初呂太后命張皇后取他人子養之而殺其母以為太子既葬太子即皇帝位年幼太后臨朝稱制髙后元年冬太后議欲立諸吕為王問右丞相陵陵曰髙帝刑白馬盟曰非劉氏而王天下共擊之今王吕氏非約也太后不說問左丞相平太尉勃對曰髙帝定天下王子弟今太后稱制王諸吕無所不可太后喜罷朝王陵讓陳平絳侯曰始與髙帝喋血盟諸君不在邪今髙帝崩太后女主欲王吕氏諸君縱欲阿意背約何面目見髙帝於地下乎陳平絳侯曰於今面折廷爭臣不如君全社稷定劉氏之後君亦不如臣陵無以應之十一月甲子太后以王陵為帝太傅實奪之相權陵遂病免歸乃以左丞相平為右丞相以辟陽侯審食其為左丞相不治事令監宫中如郎中令食其故得幸於太后公卿皆因而决事太后怨趙堯為趙隱王謀乃抵堯罪上黨守任敖嘗為沛獄吏有德於太后乃以為御史大夫太后又追尊其父臨泗侯吕公為宣王兄周吕令武侯澤為悼武王欲以王諸吕為漸太后欲王吕氏乃先立所名孝惠子彊為淮陽王不疑為恆山王使大謁者張釋風大臣大臣乃請立悼武王長子酈侯台為吕王割齊之濟南郡為吕國二年冬十一月吕肅王台薨夏五月丙申封齊悼惠王子章為朱虛侯令入宿衛又以吕祿女妻章四年夏四月丙申太后封女弟嬃為臨光侯少帝寖長自知非皇后子乃出言曰后安能殺吾母而名我我壯即為變太后聞之幽之永巷中言帝病左右莫得見太后語羣臣曰今皇帝病久不已失惑昏亂不能繼嗣治天下其代之羣臣皆頓首言皇太后為天下齊民計所以安宗廟社稷甚深羣臣頓首奉詔遂廢帝幽殺之五月丙辰立恆山王義為帝更名曰弘不稱元年以太后制天下事故也六年冬十一月立肅王弟産為吕王七年春正月太后召趙幽王友友以諸吕女為后弗愛愛他姬諸吕女怒去讒之於太后曰王言呂氏安得王太后百嵗後吾必擊之太后以故召趙王趙王至置邸不得見令衛圍守之弗與食其羣臣或竊饋輒捕論之丁丑趙王餓死二月徙梁王恢為趙王吕王産為梁王梁王不之國為帝太傅吕嬃女為將軍營陵侯劉澤妻澤者髙祖從祖昆弟也齊人田生為之說大謁者張卿曰諸吕之王也諸大臣未大服今營陵侯澤諸劉最長今卿言太后王之吕氏王益固矣張卿入言太后太后然之乃割齊之琅邪郡封澤為琅邪王趙王恢之徙趙心懷不樂太后以吕産女為王后王后從官皆諸吕擅權微伺趙王趙王不得自恣王有所愛姬王后使人鴆殺之六月王不勝悲憤自殺太后聞之以為王用婦人棄宗廟禮廢其嗣是時諸吕擅權用事朱虛侯章年二十有氣力忿劉氏不得職嘗入侍太后燕飲太后令章為酒吏章自請曰臣將種也請得以軍法行酒太后曰可酒酣章請為耕田歌太后許之章曰深耕概種立苗欲疏非其種者鋤而去之太后默然頃之諸吕有一人醉亡酒章追拔劒斬之而還報曰有亡酒一人臣謹行法斬之太后左右皆大驚業已許其軍法無以爭也因罷自是之後諸吕憚朱虛侯雖大臣皆依朱虛侯劉氏為益彊陳平患諸吕力不能制恐禍及己嘗燕居深念陸賈往直入坐而陳丞相不見陸生曰何念之深也陳平曰生揣我何念陸生曰足下極富貴無欲矣然有憂念不過患諸吕少主耳陳平曰然為之奈何陸生曰天下安注意相天下危注意將將相和調則士豫附天下雖有變權不分為社稷計在兩君掌握耳臣常欲謂太尉絳侯絳侯與我戲易吾言君何不交歡太尉深相結因為陳平畫吕氏數事陳平用其計乃以五百金為絳侯壽厚具樂飲太尉報亦如之兩人深相結吕氏謀益衰太后使使告代王欲徙王趙代王謝之願守代邊太后乃立兄子吕祿為趙王追尊祿父建成康侯釋之為趙昭王八年冬十月辛丑立吕肅王子東平侯通為燕王封通弟莊為東平侯春三月太后祓還過軹道見物如蒼犬撠太后掖忽不復見卜之云趙王如意為祟太后遂病掖傷夏四月封中大謁者張釋為建陵侯以其勸王諸吕賞之也秋七月太后病甚乃令趙王祿為上將軍居北軍吕王産居南軍太后誡産祿曰吕氏之王大臣弗平我即崩帝年少大臣恐為變必據兵衛宫慎毋送喪為人所制辛巳太后崩遺詔大赦天下以吕王産為相國以吕祿女為帝后諸吕欲為亂畏大臣絳灌等未敢發朱虛侯以吕祿女為婦故知其謀乃陰令人告其兄齊王欲令發兵西朱虛侯東牟侯為內應以誅諸吕立齊王為帝齊王乃與其舅駟鈞郎中令祝午中尉魏勃隂謀發兵齊相召平弗聽八月丙午齊王欲使人誅相相聞之乃發卒衛王宫魏勃紿召平曰王欲發兵非有漢虎符驗也而相君圍王固善勃請為君將兵衛王召平信之勃既將兵遂圍相府召平自殺於是齊王以駟鈞為相魏勃為將軍祝午為內史悉發國中兵使祝午東詐琅邪王曰吕氏作亂齊王發兵欲西誅之齊王自以年少不習兵革之事願舉國委大王大王自髙帝將也請大王幸之臨菑見齊王計事琅邪王信之西馳見齊王齊王因留琅邪王而使祝午盡發琅邪國兵并將之琅邪王說齊王曰大王髙皇帝適長孫也當立今諸大臣狐疑未有所定而澤於劉氏最為長年大臣固待澤決計今大王留臣無為也不如使我入關計事齊王以為然乃益具車送琅邪王琅邪王既行齊遂舉兵西攻濟南遺諸侯王書陳諸吕之罪欲舉兵誅之相國吕産等聞之乃遣潁隂侯灌嬰將兵擊之灌嬰至滎陽謀曰諸吕擁兵關中欲危劉氏而自立今我破齊還報此益吕氏之資也乃留屯滎陽使使諭齊王及諸侯與連和以待吕氏變共誅之齊王聞之乃還兵西界待約吕祿吕産欲作亂內憚絳侯朱虛等外畏齊楚兵又恐灌嬰畔之欲待灌嬰兵與齊合而發猶豫未决當是時濟川王太淮陽王武常山王朝及魯王張偃皆年少未之國居長安趙王祿梁王産各將兵居南北軍皆吕氏之人也列侯羣臣莫自堅其命太尉絳侯勃不得主兵曲周侯酈商老病其子寄與吕祿善絳侯乃與丞相陳平謀使人劫酈商令其子寄往紿說吕祿曰髙帝與吕后共定天下劉氏所立九王吕氏所立三王皆大臣之議事已布告諸侯諸侯皆以為宜今太后崩帝少而足下佩趙王印不急之國守藩乃為上將將兵留此為大臣諸侯所疑足下何不歸將印以兵屬太尉請梁王歸相國印與大臣盟而之國齊兵必罷大臣得安足下髙枕而王千里此萬世之利也吕祿信然其計欲以兵屬太尉使人報吕産及諸吕老人或以為便或曰不便計猶豫未有所决吕祿信酈寄時與出游獵過其姑吕嬃嬃大怒曰若為將而棄軍吕氏今無處矣乃悉出珠玉寶器散堂下曰毋為他人守也九月庚申旦平陽侯窋行御史大夫事見相國産計事郎中令賈夀使從齊來因數産曰王不早之國今雖欲行尚可得邪具以灌嬰與齊楚合從欲誅諸吕告彥且趣産急入宫平陽侯頗聞其語馳告丞相太尉太尉欲入北軍不得入襄平侯紀通尚符節乃令持節矯內太尉北軍太尉復令酈寄與典客劉揭先說吕祿曰帝使太尉守北軍欲足下之國急歸將印辭去不然禍且起吕祿以為酈況不欺已遂解印屬典客而以兵授太尉太尉至軍吕祿已去太尉入軍門行令軍中曰為吕氏右袒為劉氏左袒軍中皆左袒太尉遂將北軍然尚有南軍丞相平乃召朱虛侯章佐太尉太尉令朱虛侯監軍門令平陽侯告衛尉毋入相國産殿門吕産不知吕祿已去北軍乃入未央宫欲為亂至殿門弗得入徘徊往來平陽侯恐弗勝馳語太尉太尉尚恐不勝諸吕未敢公言誅之乃謂朱虛侯曰急入宫衛帝朱虛侯請卒太尉豫卒千餘人入未央宫門見産廷中日餔時遂擊産産走天風大起以故其從官亂莫敢鬬逐産殺之郎中府吏厠中朱虛侯已殺産帝命謁者持節勞朱虛侯朱虛侯欲奪其節謁者不肯朱虛侯則從與載因節信馳走斬長樂衛尉吕更始還馳入北軍報太尉太尉起拜賀朱虛侯曰所患獨吕産今已誅天下定矣遂遣人分部悉捕諸吕男女無少長皆斬之辛酉捕斬吕祿而笞殺吕嬃使人誅燕王吕通而廢魯王張偃戊辰徙濟川王王梁遣朱虛侯章以誅諸吕事告齊王令罷兵灌嬰在滎陽聞魏勃本教齊王舉兵使使召魏勃至責問之勃曰失火之家豈暇先言丈人而後救火乎因退立股戰而栗恐不能言者終無他語灌將軍熟視笑曰人謂魏勃勇妄庸人耳何能為乎乃罷魏勃灌嬰兵亦罷滎陽歸班固贊曰孝文時天下以酈寄為賣友夫賣友者謂見利而忘義也若寄父為功臣而又執劫雖摧吕祿以安社稷誼存君親可也諸大臣相與隂謀曰少帝及梁淮陽恆山王皆非真孝惠子也吕后以計詐名他人子殺其母養後宫令孝惠子之立以為後及諸王以彊吕氏今皆已夷滅諸吕而所立即長用事吾屬無類矣不如視諸王最賢者立之或言齊王髙帝長孫可立也大臣皆曰吕氏以外家惡而幾危宗廟亂功臣今齊王舅駟鈞虎而冠即立齊王復為呂氏矣代王方今髙帝見子最長仁孝寬厚太后家薄氏謹良且立長固順况以仁孝聞天下乎乃相與共隂使人召代王代王問左右郎中令張武等曰漢大臣皆故髙帝時大將習兵多謀詐此其屬意非止此也特畏髙帝吕太后威耳今已誅諸吕新喋血京師此以迎大王為名實不可信願大王稱疾毋往以觀其變中尉宋昌進曰羣臣之議皆非也夫秦失其政諸侯豪桀並起人人自以為得之者以萬數然卒踐天子之位者劉氏也天下絶望一矣髙帝封王子弟地犬牙相制此所謂磐石之宗也天下服其彊二矣漢興除秦苛政約法今施德惠人人自安難動搖三矣夫以吕太后之嚴立諸吕為三王擅權專制然而太尉以一節入北軍一呼士皆左袒為劉氏叛諸吕卒以滅之此乃天授非人力也今大臣雖欲為變百姓弗為使其黨寧能專一邪方今內有朱虛東牟之親外畏吳楚淮陽琅邪齊代之彊方今髙帝子獨淮南王與大王大王又長賢聖仁孝聞於天下故大臣因天下之心而欲迎立大王大王勿疑也代王報太后計之猶豫未定卜之兆得大橫占曰大橫庚庚余為天王夏啓以光代王曰寡人固己為王矣又何王卜人曰所謂天王者乃天子也於是代王遣太后弟薄昭往見絳侯絳侯等具為昭言所以迎立王意薄昭還報曰信矣毋可疑者代王乃笑謂宋昌曰果如公言乃命宋昌參乘張武等六人乘傳從詣長安至髙陵休止而使宋昌先馳之長安觀變昌至渭橋丞相以下皆迎昌還報代王馳至渭橋羣臣拜謁稱臣代王下車答拜太尉勃進曰願請間宋昌曰所言公公言之所言私王者無私太尉乃跪上天子璽符代王謝曰至代邸而議之後九月己酉晦代王至長安舍代邸羣臣從至邸丞相陳平等皆再拜言曰子弘等皆非孝惠帝子不當奉宗廟大王髙帝長子宜為嗣願大王即天子位代王西鄉讓者三南鄉讓者再遂即天子位羣臣以禮次侍東牟侯興居曰誅吕氏臣無功請得除宫乃與太僕汝隂侯滕公入宫前謂少帝曰足下非劉氏子不當立乃顧麾左右執㦸者掊兵罷去有數人不肯去兵宦者令張釋諭告亦去兵滕公乃召乘輿車載少帝出少帝曰欲將我安之乎滕公曰出就舍舍少府乃奉天子法駕迎代王於邸報曰宫謹除代王即夕入未央宫有謁者十人持㦸衛端門曰天子在也足下何為者而入代王乃謂太尉太尉往諭謁者十人皆掊兵而去代王遂入夜拜宋昌為衛將軍鎮撫南北軍以張武為郎中令行殿中有司分部誅滅梁淮陽恆山王及少帝於邸文帝還坐前殿夜下詔書赦天下文帝元年冬十月陳平謝病上問之平曰髙祖時勃功不如臣及誅諸吕臣功亦不如勃願以右丞相讓勃十一月辛巳上徙平為左丞相太尉勃為右丞相大將軍灌嬰為太尉諸吕所奪齊楚故地皆復與之論誅諸吕功右丞相勃以下益户賜金各有差絳侯朝罷趨出意得甚上禮之恭常目送之郎中安陵袁盎諌曰諸吕悖逆大臣相與共誅之是時丞相為太尉本兵柄適㑹其成功今丞相如有驕主色陛下謙讓臣主失禮竊為陛下弗取也後朝上益莊丞相益畏南粵稱藩漢髙帝十一年五月詔立秦南海尉趙他為南粵王使陸賈即授璽綬與剖符通使使和集百越無為南邊患害初秦二世時南海尉任囂病且死召龍川令趙他語曰秦為無道天下苦之聞陳勝等作亂天下未知所安南海僻逺吾恐盜兵侵地至此欲興兵絶新道自備待諸侯變㑹病甚且番禺負山險阻南海東西數十里頗有中國人相輔此亦一州之主也可以立國郡中長吏無足與言者故召公告之即被他書行南海尉事囂死他即移檄告橫浦陽山湟溪關曰盜兵且至急絶道聚兵自守因稍以法誅秦所置長吏以其黨為假守秦已破滅他即擊并桂林象郡自立為南越武王陸生至尉他魋結箕倨見陸生陸生說他曰足下中國人親戚昆弟墳墓在真定今足下反天性棄冠帶欲以區區之越與天子抗衡為敵國禍且及身矣且夫秦失其政諸侯豪傑並起唯漢王先入關據咸陽項羽倍約自立為西楚霸王諸侯皆屬可謂至彊然漢王起巴蜀鞭笞天下遂誅項羽滅之五年之間海內平定此非人力天之所建也天子聞君王王南越不助天下誅暴逆將相欲移兵而誅王天子憐百姓新勞苦故且休之遣臣授君王印剖符通使君王宜郊迎北面稱臣乃欲以新造未集之越屈彊於此漢誠聞之掘燒王先人冡夷滅宗族使一偏將將十萬衆臨越則越殺王降漢如反復手耳於是尉他乃蹶然起坐謝陸生曰居蠻夷中久殊失禮義因問陸生曰我孰與蕭何曹參韓信賢陸生曰王似賢也復曰我孰與皇帝賢陸生曰皇帝繼五帝三皇之業統理中國中國之人以億計地方萬里萬物殷富政由一家自天地剖判未始有也今王衆不過數十萬皆蠻夷﨑嶇山海間譬若漢一郡耳何乃比於漢尉他大笑曰吾不起中國故王此使我居中國何遽不若漢乃留陸生與飲數月曰越中無足與語至生來令我日聞所不聞賜陸生槖中裝直千金他送亦千金陸生卒拜尉他為南越王令稱臣奉漢約歸報帝大恱拜賈為太中大夫髙后四年夏五月有司請禁南越關市鐡器南越王他曰髙帝立我通使物今髙后聽讒臣别異蠻夷隔絶器物此必長沙王計欲倚中國擊滅南越而并王之自為功也五年春他自稱南越武帝發兵攻長沙敗數縣而去七年九月遣隆慮侯周竈將兵擊南越文帝元年初隆慮侯竈擊南越㑹暑濕士卒大疫兵不能隃領嵗餘髙后崩即罷兵趙他因此以兵威財物賂遺閩越西甌駱役屬焉東西萬餘里乘黃屋左纛稱制與中國侔帝乃為他親冡在真定者置守邑嵗時奉祀召其昆弟尊官厚賜寵之復使陸賈使南越賜他書曰朕髙皇帝側室之子也棄外奉北藩于代道里遼逺壅蔽朴愚未嘗致書髙皇帝棄羣臣孝惠皇帝即世髙后自臨事不幸有疾諸吕為變賴功臣之力誅之已畢朕以王侯吏不釋之故不得不立今即位乃者聞王遺將軍隆慮侯書求親昆弟請罷長沙兩將軍朕以王書罷將軍博陽侯親昆弟在真定者已遣人存問修治先人冢前日聞王發兵於邊為冦災不止當其時長沙苦之南郡尤甚雖王之國庸獨利乎必多殺士卒傷良將吏寡人之妻孤人之子獨人父母得一亡十朕不忍為也朕欲定地犬牙相入者以問吏吏曰髙皇帝所以介長沙土也朕不得擅變焉今得王之地不足以為大得王之財不足以為富服領以南王自治之雖然王之號為帝兩帝並立亡一乘之使以通其道是爭也爭而不讓仁者不為也願與王分棄前惡終今以來通使如故賈至南越南越王恐頓首謝罪願奉明詔長為藩臣奉貢職於是下令國中曰吾聞兩雄不俱立兩賢不並世漢皇帝賢天子自今以來去帝制黃屋左纛因為書稱蠻夷大長老夫臣他昧死再拜上書皇帝陛下老夫故越吏也髙皇帝幸賜臣他璽以為南越王孝惠皇帝即位義不忍絶所以賜老夫者厚甚髙后用事别異蠻夷出令曰毋與蠻夷越金鐡田器馬牛羊即豫豫牡母與牝老夫處僻馬牛羊齒己長自以祭祀不修有死罪使內史藩中尉髙御史平凡三輩上書謝過皆不反又風聞老夫父母墳墓已壞削兄弟宗族已誅論吏相與議曰今內不得振於漢外亡以自髙異故更號為帝自帝其國非敢有害於天下髙皇后聞之大怒削去南越之籍使使不通老夫竊疑長沙王讒臣故發兵以伐其邊老夫處越四十九年于今抱孫焉然夙興夜寐寢不安席食不甘味目不視靡曼之色耳不聽鍾鼓之音者以不得事漢也今陛下幸哀憐復故號通使漢如故老夫死骨不腐改號不敢為帝矣七國之叛漢景帝前三年初孝文時吳太子入見得侍皇太子飲博吳太子博爭道不恭皇太子引博局提吳太子殺之遣其喪歸葬至吳吳王愠曰天下同宗死長安即葬長安何必來葬為復遣喪之長安葬吳王由此稍失藩臣之禮稱疾不朝京師知其以子故繫治驗問吳使者吳王恐始有反謀後使人為秋請文帝復問之使者對曰王實不病漢繫治使者數輩吳王恐以故遂稱病夫察見淵中魚不祥唯上棄前過與之更始於是文帝乃赦吳使者歸之而賜吳王几杖老不朝吳得釋其罪謀亦益解然其居國以銅鹽故百姓無賦卒踐更輒與平賈嵗時存問茂材賞賜閭里他郡國吏欲來捕亡人者公共禁弗豫如此者四十餘年鼂錯數上書言吳過可削文帝寬不忍罰以此吳日益橫及帝即位錯說上曰昔髙帝初定天下昆弟少諸子弱大封同姓齊七十餘城楚四十餘城吳五十餘城封三庶孽分天下半今吳王前有太子之郤詐稱病不朝於古法當誅文帝弗忍因賜几杖德至厚當改過自新反益驕溢即山鑄錢煮海水為鹽誘天下亡人謀作亂今削之亦反不削亦反削之其反亟禍小不削反遲禍大上令公卿列侯宗室雜議莫敢難獨竇嬰爭之由此與錯有郤及楚王戊來朝錯因言戊往年為薄太后服私姦服舍請誅之詔赦削東海郡及前年趙王有罪削其常山郡膠西王卬以賣爵事有姦削其六縣廷臣方議削吳吳王恐削地無已因發謀舉事念諸侯無足與計者聞膠西王勇好兵諸侯皆畏憚之於是使中大夫應髙口說膠西王曰今者主上任用邪臣聽信讒賊侵削諸侯誅罰良重日以益甚語有之曰狧穅及米吳與膠西知名諸侯也一時見察不得安肆矣吳王身有內疾不能朝請二十餘年常患見疑無以自白脅肩纍足猶懼不見釋竊聞大王以爵事有過所聞諸侯削地罪不至此此恐不止削地而已王曰有之子將奈何髙曰吳王自以與大王同憂願因時循理棄軀以除患於天下意亦可乎膠西王瞿然駭曰寡人何敢如是主上雖急固有死耳安得不事髙曰御史大夫鼂錯營惑天子侵奪諸侯朝廷疾怨諸侯皆有背叛之意人事極矣彗星出蝗蟲起此萬世一時而愁勞聖人所以起也吳王內以鼂錯為誅外從大王後車方洋天下所向者降所指者下莫敢不服大王誠幸而許之一言則吳王率楚王略函谷關守滎陽敖倉之粟距漢兵治次舍須大王大王幸而臨之則天下可并兩主分割不亦可乎王曰善歸報吳王吳王猶恐其不果乃身自為使者至膠西面約之膠西羣臣或聞王謀諌曰諸侯地不能當漢十二為叛逆以憂太后非計也今承一帝尚云不易假令事成兩主分爭患乃益生王不聽遂發使約齊菑川膠東濟南皆許諾初楚元王好書與魯申公穆生白生俱受詩於浮丘伯及王楚以三人為中大夫穆生不耆酒元王每置酒常為穆生設醴及子夷王孫王戊即位常設後乃忘設焉穆生退曰可以逝矣醴酒不設王之意怠不去楚人將鉗我於市遂稱疾卧申公白生彊起之曰獨不念先王之德與今王一旦失小禮何足至此穆生曰易稱知幾其神乎幾者動之微吉凶之先見者也君子見幾而作不俟終日先王之所以禮吾三人者為道存也今而忽之是忘道也忘道之人胡可與久處豈為區區之禮哉遂謝病去申公白生獨留王戊稍淫暴太傅韋孟作詩諷諫不聽亦去居於鄒戊因坐削地事遂與吳通謀申公白生諫戊戊胥靡之衣之赭衣使雅舂於市休侯富使人諫王王曰季父不吾與我起先取季父矣休侯懼乃與母太夫人奔京師及削吳㑹稽豫章郡書至吳王遂先起兵誅漢吏二千石以下膠西膠東菑川濟南楚趙亦皆反楚相張尚太傅趙夷吾諫王戊戊殺尚夷吾趙相建德內史王悍諫王遂遂燒殺建德悍齊王後悔背約城守濟北王城壞未完其郎中令劫守王不得發兵膠西王膠東王為渠率與菑川濟南共攻齊圍臨菑趙王遂發兵住其西界欲待吳楚俱進北使胸奴與連兵吳王悉其士卒下令國中曰寡人年六十二身自將少子年十四亦為士卒先諸年上與寡人同下與少子等皆發兵二十餘萬人南使閩東越閩東越亦發兵從吳王起兵於廣陵西涉淮因并楚兵發使遺諸侯書罪狀鼂錯欲合兵誅之吳楚共攻梁破棘壁殺數萬人乘勝而前鋭甚梁孝王遣將軍擊之又敗梁兩軍士卒皆還走梁王城守睢陽初文帝且崩戒太子曰即有緩急周亞夫真可任將兵及七國反書聞上乃拜中尉周亞夫為太尉將三十六將軍往擊吳楚遣曲周侯酈寄擊趙將軍欒布擊齊復召竇嬰拜為大將軍使屯滎陽監齊趙兵初鼂錯所更令三十章諸侯歡譁錯父聞之從潁川來謂錯曰上初即位公為政用事侵削諸侯疏人骨肉口語多怨公何為也錯曰固也不如此天子不尊宗廟不安父曰劉氏安矣而鼂氏危吾去公歸矣遂飲藥死曰吾不忍見禍逮身後十餘日吳楚七國俱反以誅錯為名上與錯議出軍事錯欲令上自將兵而身居守又言徐僮之旁吳所未下者可以豫吳錯素與吳相袁盎不善錯所居坐盎輒避盎所居坐錯亦避兩人未嘗同堂語及錯為御史大夫使吏按盎受吳王財物抵罪詔赦以為庶人吳楚反錯謂丞史曰袁盎多受吳王金錢專為蔽匿言不反今果反欲請治盎宜知其計謀丞史曰事未發治之有絶今兵西向治之何益且不宜有謀錯猶豫未决人有告盎盎恐夜見竇嬰為言吳所以反願至前口對狀嬰入言上乃召盎盎入見上方與錯調兵食上問盎今吳楚反於公意何如對曰不足憂也上曰吳王即山鑄錢煮海為鹽誘天下豪傑白頭舉事此其計不百全豈發呼何以言其無能為也對曰吳銅鹽之利則有之安得豪傑而誘之誠令吳得豪傑亦且輔而為誼不反矣吳所誘皆亡賴子弟亡命鑄錢姦人故相誘以亂錯曰盎䇿之善上曰計安出盎對曰願屏左右上屏人獨錯在盎曰臣所言人臣不得知乃屏錯錯趨避東廂甚恨上卒問盎對曰吳楚相遺書言髙皇帝王子弟各有分地今賊臣鼂錯擅適諸侯削奪之地以故反欲西共誅錯復故地而罷方今計獨有斬錯發使赦吳楚七國復其故地則兵可母血刃而俱罷於是上默然良久曰顧誠何如吾不愛一人以謝天下盎曰愚計出此唯上熟計之乃拜盎為太常密裝治行後十餘日上令丞相青中尉嘉廷尉歐劾奏錯不稱主上德信欲疏羣臣百姓又欲以城邑豫吳無臣子禮大逆無道錯當要斬父母妻子同産無少長皆棄市制曰可錯殊不知壬子上使中尉召錯紿載行市錯衣朝衣斬東市上乃使袁盎與吳王弟子宗正德侯通使吳謁者僕射鄧公為校尉上書言軍事見上上問曰道軍所來聞鼂錯死吳楚罷不鄧公曰吳為反數十嵗矣發怒削地以誅錯為名其意不在錯也且臣恐天下之士拑口不敢復言矣上曰何哉鄧公曰夫鼂錯患諸侯彊大不可制故請削之以尊京師萬世之利也計畫始行卒受大戮內杜忠臣之口外為諸侯報仇臣竊為陛下不取也於是帝喟然長息曰公言善吾亦恨之袁盎劉通至吳吳楚兵已攻梁壁矣宗正以親故先入見諭吳王令拜受詔吳王聞袁盎來知其欲說笑而應曰我已為東帝尚誰拜不肯見盎而留軍中欲劫使將盎不肯使人圍守且殺之盎得間脫亡歸報太尉亞夫言於上曰楚兵剽輕難與爭鋒願以梁委之絶其食道乃可制也上許之亞夫乘六乘傳將㑹兵滎陽發至霸上趙涉遮說亞夫曰吳王素富懷輯死士久矣此知將軍且行必置閒人於殽澠厄狹之間且兵事上神密將軍何不從此右去走藍田出武關抵洛陽間不過差一二日直入武庫擊鳴鼓諸侯聞之以為將軍從天而下也太尉如其計至洛陽喜曰七國反吾乘傳至此不自意全今吾據滎陽滎陽以東無足憂者使吏搜殽澠間果得吳伏兵乃請趙涉為護軍太尉引兵東北走昌邑吳攻梁急梁數使使條侯求救條侯不許又使使訴條侯於上上使告條侯救梁亞夫不奉詔堅壁不出而使弓髙侯等將輕騎兵出淮泗口絶吳楚兵後塞其餉道梁使中大夫韓安國及楚相張尚弟羽為將軍羽力戰安國持重乃得頗敗吳兵吳兵欲西梁城守不敢西即走條侯軍㑹下邑欲戰條侯堅壁不肯戰吳糧絶卒飢數挑戰終不出條侯軍中夜驚內相攻擊擾亂至帳下亞夫堅卧不起頃之復定吳奔壁東南陬亞夫使備西北已而其精兵果奔西北不得入吳楚士卒多飢死叛散乃引而去二月亞夫出精兵追擊大破之吳王濞棄其軍與壯士數千人夜亡走楚王戊自殺吳王之初發也吳臣田祿伯為大將軍田祿伯曰兵屯聚而西無它竒道難以立功臣願得五萬人别循江淮而上收淮南長沙入武關與大王㑹此亦一竒也吳王太子諌曰王以反為名此兵難以借人人亦且反王奈何且擅兵而别多它利害徒自損耳吳王即不許田祿伯吳少將桓將軍說王曰吳多步兵步兵利險漢多車騎車騎利平地願大王所過城不下直去疾西據洛陽武庫食敖倉粟阻山河之險以令諸侯雖無入關天下固已定矣大王徐行留下城邑漢軍車騎至馳入梁楚之郊事敗矣吳王問諸老將老將曰此年少椎鋒可耳安知大慮於是王不用桓將軍計王專并將兵兵未度淮諸賔客皆得為將校尉候司馬獨周丘不用周丘者下邳人亡命吳酤酒無行王薄之不任周丘乃上謁說王曰臣以無能不得待罪行閒臣非敢求有所將也願請王一漢節必有以報王乃豫之周丘得節夜馳入下邳下邳時聞吳反皆城守至傳舍召令入户使從者以罪斬令遂召昆弟所善豪吏告曰吳反兵且至屠下邳不過食頃今先下家室必完能者封侯矣出乃相告下邳皆下周丘一夜得三萬人使人報吳王遂將其兵北略城邑比至陽城兵十餘萬破陽城中尉軍聞吳王敗走自度無與共成功即引兵歸下邳未至疽發背死吳王之棄軍亡也軍遂潰往往稍降太尉條侯及梁軍吳王度淮走丹徒保東越兵可萬餘人收聚亡卒漢使人以利啖東越東越即紿吳王出勞軍使人鏦殺吳王盛其頭馳傳以聞吳太子駒亡走閩越吳楚反凡三月皆破滅於是諸將乃以太尉謀為是然梁王由此與太尉有隙三王之圍臨菑也齊王使路中大夫告於天子天子復令路中大夫還報告齊王堅守漢兵今破吳楚矣路中大夫至三國兵圍臨菑數重無從入三國將與路中大夫盟曰若反言漢已破矣齊趣下三國不且見屠路中大夫既許至城下望見齊王曰漢已發兵百萬使太尉亞夫擊破吳楚方引兵救齊齊必堅守無下三國將誅路中大夫齊初圍急隂與三國通謀約未定㑹路中大夫從漢來其大臣乃復勸王無下三國㑹漢將欒布平陽侯等兵至齊擊破三國兵解圍已後聞齊初與三國有謀將欲移兵伐齊齊孝王懼飲藥自殺膠西膠東菑川王各引兵歸國膠西王徒跣席槀飲水謝太后王太子德曰漢兵還臣觀之已罷可襲願收王餘兵擊之不勝而逃入海未晚也王曰吾士卒皆已壞不可用弓髙侯韓頽當遺膠西王書曰奉詔誅不義降者赦除其罪復故不降者滅之王何處須以從事王肉袒叩頭詣漢軍壁謁曰臣卬奉法不謹驚駭百姓乃苦將軍逺道至于窮國敢請菹醢之罪弓髙侯執金鼓見之曰王苦軍事願聞王發兵狀王頓首䣛行對曰今者鼂錯天子用事臣變更髙皇帝法令侵奪諸侯地卬等以為不義恐其敗亂天下七國發兵且誅今聞錯己誅卬等謹已罷兵歸將軍曰王茍以錯為不善則當以聞及未有詔虎符擅發兵擊義國以此觀之意非徒欲誅錯也乃出詔書為王讀之曰王其自圖王曰如卬等死有餘罪遂自殺太后太子皆死膠東王菑川王濟南王皆伏誅酈將軍兵至趙趙王引兵還邯戰城守酈寄攻之七月不能下胸奴聞吳楚敗亦不肯入邊欒布破齊還并兵引水灌趙城城壞王遂自殺帝以齊首善以迫劫有謀非其罪也召立齊孝王太子壽是為懿王濟北王亦欲自殺幸全其妻子齊人公孫玃謂濟北王曰臣請試為大王明說梁王通意天子說而不用死未晚也公孫玃遂見梁王曰夫濟北之地東接彊齊南牽吳越北脅燕趙此四分五裂之國權不足以自守徑不足以扞冦又非有竒怪云以待難也雖墜言於吳非其正計也鄉使濟北見情實示不從之端則吳必先歷齊畢濟北招燕趙而總之如此則山東之從結而無隙矣今吳王連諸侯之兵驅白徒之衆西與天子爭衡濟北獨底節不下使吳失與而無助跬步獨進瓦解土崩破敗而不救者未必非濟北之力也夫以區區之濟北而與諸侯爭彊是以羔犢之弱而扞虎狼之敵也守職不橈可謂誠一矣功義如此尚見疑於上脅肩低首纍足撫襟使有自悔不前之心非社稷之利也臣恐藩臣守職者疑之臣竊料之能歷西山徑長樂抵未央攘袂而正議者獨大王耳上有全亡之功下有安百姓之名德淪於骨髓恩加於無窮願大王留意詳惟之孝王大說使人馳以聞濟北王得不坐徙封於菑川帝欲以吳王弟德哀侯廣之子續吳以楚元王子禮續楚竇太后曰吳王老人也宜為宗室順善今乃首率七國紛亂天下奈何續其後不許吳許立楚後乙亥徙淮陽王餘為魯王汝南王非為江都王王故吳地立宗正禮為楚王立皇子端為膠西王勝為中山王四年初吳楚七國反吳使者至淮南淮南王欲發兵應之其相曰王必欲應吳臣願為將王乃屬之相已將兵因城守不聽王而為漢漢亦使曲城侯將兵救淮南以故得完吳使者至廬江廬江王不應而往來使越至衡山衡山王堅守無二心及吳楚已破衡山王入朝上以為貞信勞苦之曰南方卑濕徙王王於濟北以褒之廬江王以邊越數使使相交徙為衡山王王江北梁孝王驕縱漢文帝前二年春三月有司請立皇子為諸侯王詔立皇子武為代王參為太原王揖為梁王五年初帝分代為二國立皇子武為代王參為太原王是歲徙代王武為淮陽王以太原王參為代王盡得故地六年梁太傅賈誼上疏曰進言者皆曰天下已安已治矣臣獨以為未也曰安且治者非愚則諛皆非事實知治亂之體者也夫抱火厝之積薪之下而寢其上火未及然因謂之安方今之藝何以異此陛下何不一令臣得孰數之於前因陳治安之策試詳擇焉使為治勞智慮苦身體乏鍾鼓之樂勿為可也樂與今同而加之諸侯軌道兵革不動胸奴賔服百姓素朴生為明帝沒為明神名譽之美垂於無窮使顧成之廟稱為太宗上配太祖與漢亡極立經陳紀為萬世法雖有愚幼不肖之嗣猶得䝉業而安以陛下之明達因使少知治體者得佐下風致此非難也夫樹國固必相疑之藝下數被其殃上數爽其憂甚非所以安上而全下也今或親弟謀為東帝親兄之子西鄉而擊今吳又見告矣天子春秋鼎盛行義未過德澤有加焉猶尚如是況莫大諸侯權力且十此者呼然而天下少安何也大國之王幼弱未壯漢之所置傅相方握其事數年之後諸侯之王大抵皆冠血氣方剛漢之傅相稱病而賜罷彼自丞尉以上遍置私人如此有異淮南濟北之為邪此時而欲為治安雖堯舜不治黃帝曰日中必熭操刀必割今令此道順而全安甚易不肯早為已乃墮骨肉之屬而抗剄之豈有異秦之季世呼其異姓負彊而動者漢已幸而勝之矣又不易其所以然同姓襲是跡而動既有徴矣其藝盡又復然殃禍之變未知所移明帝處之尚不能以安後世將如之何臣竊跡前事大扺彊者先反長沙乃二萬五千户耳功小而最完藝疏而最忠非獨性異人也亦形藝然也曩令樊酈絳灌據數十城而王今雖以殘亡可也令信越之倫列為徹侯而居雖至今存可也然則天下之大計可知己欲諸王之皆忠附則莫若令如長沙王欲臣子勿菹醢則莫若令如樊酈等欲天下之治安莫若衆建諸侯而少其力力少則易使以義國小則亡邪心令海內之藝如身之使臂臂之使指莫不制從諸侯之君不敢有異心輻湊並進而歸命天子割地定制令齊趙楚各為若干國使悼惠王幽王元王之子孫畢以次各受祖之分地盡而止其分地衆而子孫少者建以為國空而置之須其子孫生者舉使君之一寸之地一人之衆天子亡所利焉誠以定治而已如此則卧赤子天下之上而安植遺腹朝委裘而天下不亂當時大治後世誦聖陛下誰憚而久不為此天下之藝方病大瘇一脛之大幾如要一指之大幾如股平居不可屈伸一二指慉身慮亡聊失今不治必為錮疾後雖有扁鵲不能為己病非徒瘇也又苦􅏓盩元王之子帝之從弟也今之王者從弟之子也惠王之子親兄子也今之王者兄子之子也親者或亡分地以安天下疏者或制大權以逼天子臣故曰非徒病瘇也又苦􅏓盩可痛哭者此病是也十一年夏六月梁懷王揖薨無子賈誼復上疏曰陛下即不定制如今之藝不過一傳再傳諸侯猶且人人恣而不制豪植而大彊漢法不得行矣陛下所以為蕃扞及皇太子之所恃者唯淮陽代二國耳代北邊胸奴與彊敵為鄰能自完則足矣而淮陽之比大諸侯厪如黑子之著面適足以餌大國而不足以有所禁禦方今制在陛下制國而令子適足以為餌豈可謂工哉臣之愚計願舉淮南地以益淮陽而為梁王立後割淮陽北邊二三列城與東郡以益梁不可者可徙代王而都睢陽梁起於新郪以北著之河淮陽包陳以南犍之江則大諸侯之有異心者破膽而不敢謀梁足以扞齊趙淮陽足以禁吳楚陛下髙枕終無山東之憂矣此二世之利也當今恬然適遇諸侯之皆少數嵗之後陛下且見之矣夫秦日夜苦心勞力以除六國之禍今陛下力制天下頥指如意髙拱以成六國之禍難以言智茍身無事畜亂宿禍熟視而不定萬年之後傳之老母弱子將使不寧不可謂仁帝於是從誼計徙淮陽王武為梁王北界泰山西至髙陽得大縣四十餘城後嵗餘賈誼亦死死時年三十三矣景帝二年梁孝王以竇太后少子故有寵王四十餘城居天下膏腴地賞賜不可勝道府庫金錢且百巨萬珠玉寶器多於京師築東苑方三百餘里廣睢陽城七十里大治宫室為復道自宫連屬於平臺三十餘里招延四方豪傑之士如吳人枚乘嚴忌齊人羊勝公孫詭鄒陽蜀人司馬相如之屬皆從之遊每入朝上使使持節以乘輿駟馬迎梁王於闕下既至寵幸無比入則侍上同輦出則同事射獵上林中因上疏請留且半嵗梁侍中郎謁者著籍引出入天子殿中與漢宦官無異三年冬十月梁王來朝時上未置太子與梁王宴飲從容言曰千秋萬嵗後傳於王王辭謝雖知非至言然心內喜太后亦然詹事竇嬰引巵酒進上曰天下者髙祖之天下父子相傳漢之約也上何以得傳梁王太后由此憎嬰嬰因病免太后除嬰門籍不得朝請梁王以此益驕中一年初梁孝王以至親有功城守事見七國吳楚攻梁梁王叛之得賜天子旌旗從千乘萬騎出蹕入警王寵信羊勝公孫詭以詭為中尉勝詭多竒邪計欲使王求為漢嗣栗太子之廢也太后意欲以梁王為嗣嘗因置酒謂帝曰安車大駕用梁王為寄帝跪席舉身曰諾罷酒帝以訪諸大臣大臣袁盎等曰不可昔宋宣公不立子而立弟以生禍亂五世不絶小不忍害大義故春秋大居正由是太后議格遂不復言王又嘗上書願賜容車之地徑至長樂宫自使梁國士衆築作甬道朝太后袁盎等皆建以為不可梁王由此怨袁盎及議臣乃與羊勝公孫詭謀隂使人刺殺袁盎及他議臣十餘人賊未得也於是天子意梁逐賊果梁所為上遣田叔吕季主往按梁事捕公孫詭羊勝詭勝匿王後宫使者十餘輩至梁責二千石急梁相軒丘豹及內史韓安國以下舉國大索月餘弗得安國聞詭勝匿王所乃入見王而泣曰主辱者臣死大王無良臣故紛紛至此今勝詭不得請辭賜死王曰何至此安國泣數行下曰大王自度於皇帝孰與臨江王親王曰弗如也安國曰臨江王適長太子以一言過廢王臨江用宫垣事卒自殺中尉府何者治天下終不用私亂公今大王列在諸侯訹邪臣浮說犯上禁撓明法天子以太后故不忍致法於大王太后日夜涕泣幸大王自改大王終不覺寤有如太后宫車即晏駕大王尚誰攀乎語未卒王泣數行而下謝安國曰吾今出勝詭王乃令勝詭皆自殺出之上由此怨望梁王梁王恐使鄒陽入長安見皇后兄王信說曰長君弟得幸於上後宫莫及而長君行迹多不循道理者今袁盎事即窮竟梁王伏誅太后無所發怒切齒側目於貴臣竊為足下憂之長君曰為之奈何陽曰長君誠能精為上言之得毋竟梁事長君必固自結於太后太后厚德長君入於骨髓而長君之弟幸於兩宫金城之固也昔者舜之弟象日以殺舜為事及舜立為天子封之於有庳夫仁人之於兄弟無藏怒無宿怨厚親愛而已是以後世稱之以是說天子徼幸梁事不奏長君曰諾乘閒入言之帝怒稍解是時太后憂梁事不食日夜泣不止帝亦患之㑹田叔等按梁事來還至霸昌廏取火悉燒梁之獄辭空手來見帝帝曰梁有之乎叔對曰死罪有之上曰其事安在田叔曰上毋以梁事為問也上曰何也曰今梁王不伏誅是漢法不行也伏法而太后食不甘味卧不安席此憂在陛下也上大然之使叔等謁太后且曰梁王不知也造為之者獨在幸臣羊勝公孫詭之屬為之耳謹已伏誅死梁王無恙也太后聞之立起坐餐氣平復梁王因上書請朝既至關茅蘭說王使乘布車從兩騎入匿於長公主園漢使使迎王王已入關車騎盡居外不知王處太后泣曰帝果殺吾子帝憂恐於是梁王伏斧質於闕下謝罪太后帝大喜相泣復如故悉召王從官入關然帝益疏王不與同車輦矣帝以田叔為賢擢為魯相六年冬十月梁王來朝上疏欲留上弗許王歸國意忽忽不樂夏四月梁孝王薨竇太后聞之哭極哀不食曰帝果殺吾子帝哀懼不知所為與長公主計之乃分梁為五國盡立孝王男五人為王買為梁王明為濟川王彭離為濟東王定為山陽王不識為濟隂王女五人皆食湯沐邑奏之太后太后乃說為帝加一餐孝王未死時財以巨萬計及死藏府餘黃金尚四十餘萬斤他物稱是通鑑紀事本末卷第二
