  text: 通鑑紀事本末卷第三十七
  hash: sha256:de5bf358ba55c25cee643f573a095326d975fba840cbab00748fc3f3b77afd1b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0001_SBCK_037-1a}
body:
  text: 黃巢之亂唐僖宗乾符元年春正月丁亥翰林學士盧攜上言以為陛下初臨大寶宜深念黎元國家之有百姓如草木之有根柢若秋冬培溉則春夏滋榮臣竊見關東去年旱災自虢至海麥才半收秋稼幾無冬菜至少貧者磑蓬實為麵蓄槐葉為虀或更衰羸亦難采拾常年不稔則散之鄰境今所在皆飢無所依投坐守鄉閭待盡溝壑其蠲免餘稅實無可徵而州縣以有上供及三司錢督趣甚急動加捶撻雖撤屋伐木雇妻鬻子止可供所由酒食之費未得至於府庫也或租稅之外更有它徭朝廷儻不撫存百姓實無生計乞敕州縣應所欠殘稅並一切停徵以俟蠶麥仍發所在義倉亟加賑給行之不可稽緩敕從其言而有司竟不能行徒為空文而已冬十月以吏部侍郎鄭畋户部侍郎盧攜並守本官同平章事上年少政在臣下南牙北司互相矛楯自懿宗以來奢侈日甚用兵不息賦斂愈急關東連年水旱州縣不以實聞上下相蒙百姓流殍無所控訴相聚為盜所在蜂起州縣兵少加以承平日久人不習戰每與盜遇官軍多敗是嵗濮州人王仙芝始聚衆數千起於長垣二年初上之為普王也小馬坊使田令孜有寵及即位使知樞密遂擢為中尉上時年十四專事遊戲政事一委令孜呼為阿父令孜頗讀書多巧數招權納賄除官及賜緋紫皆不關白於上每見常自備果食兩盤與上相對飲啖從容良久而退上與內園小兒狎昵賞賜樂工伎兒所費動以萬計府藏空竭令孜説上籍兩市商旅寶貨悉輸內庫有陳訴者付京兆杖殺之宰相以下鉗口莫敢言夏六月王仙芝及其黨尚君長攻陷濮州曹州衆至數萬天平節度使薛崇出兵擊之為仙芝所敗寃句人黃巢亦聚衆數千人應仙芝巢少與仙芝皆以販私鹽為事巢善騎射喜任俠粗涉書傳屢舉進士不第遂為盜與仙芝攻剽州縣橫行山東民之困於重斂者爭歸之數月之間衆至數萬羣盜浸淫剽掠十餘州至于淮南多者千餘人少者數百人詔淮南忠武宣武義成天平五軍節度使監軍亟加討捕及招懷十二月王仙芝冦沂州平盧節度使宋威表請以步騎五千别為一使兼帥本道兵所在討賊乃以威為諸道行營招討草賊使仍給禁兵三千甲騎五百因詔河南方鎮所遣討賊都頭並取威處分三年春二月敕福建江西湖南諸道觀察刺史皆訓練士卒又令天下鄉村各置刀弓鼓板以備羣盜三月以左僕射王鐸兼門下侍郎同中章事秋七月宋威擊王仙芝於沂州城下大破之仙芝亡去威奏仙芝已死縱遣諸道兵身還青州百官皆入賀居三日州縣奏仙芝尚在攻剽如故時兵始休詔復發之士皆忿怨思亂八月仙芝陷陽翟郟城詔忠武節度使崔安潛發兵擊之安潛慎由之弟也又命昭義節度使曹翔將步騎五千及義成兵衛東都宫以左散騎常侍曾元裕為招討副使守東都又詔山南東道節度使李福選步騎二千守汝鄧要路仙芝進逼汝州詔邠寧節度使李侃鳳翔節度使令狐綯選步兵一千騎兵五百守陜州潼關九月丙子王仙芝陷汝州執刺史王鐐鐐鐸之從父兄弟也東都大震士民挈家逃出城乙酉敕赦王仙芝尚君長罪除官以招諭之仙芝陷陽武攻鄭州昭義監軍判官雷殷符屯中牟擊仙芝破走之冬十月仙芝南攻唐鄧十一月王仙芝攻郢復二州陷之十二月王仙芝攻申光廬夀舒通等州淮南節度使劉鄴奏求益兵敕感化節度使薛能選精兵數千助之鄭畋以言計不行稱疾遜位不許乃上言自沂州奏捷之後仙芝愈肆猖狂屠陷五六州瘡痍數千里宋威衰老多病自妄奏以來諸道尤所不服今淹留亳州殊無進討之意曽元裕擁兵蘄黃專欲望風退縮若使賊陷揚州則江南亦非國有崔安潛威望過人張自勉驍雄良將宫苑使李瑑西平王晟之孫嚴而有勇請以安潛為行營都統瑑為招討使代威自勉為副使代元裕上頗采其言招討副使都監楊復光奏尚君長弟讓據查牙山官軍退保鄧州王仙芝攻蘄州蘄州刺史裴渥王鐸知舉時所擢進士也王鐐在賊中為仙芝以書説渥渥與仙芝約斂兵不戰許為之奏官鐐亦説仙芝許以如約渥乃開城延仙芝及黃巢輩三十餘人入城置酒大陳貨賄以贈之表陳其狀諸宰相多言先帝不赦龐勛期年卒誅之今仙芝小賊非龐勛之比赦罪除官益長姦宄王鐸固請許之乃以仙芝為左神䇿軍押牙兼監察御史遣中使以告身即蘄州授之仙芝得之甚喜鐐渥皆賀未退黃巢以官不及已大怒曰始者共立大誓橫行天下今獨取官赴左軍使此五千餘衆安所歸乎因驅仙芝傷首其衆喧譟不已仙芝畏衆怒遂不受命大掠蘄州城中之人半驅半殺焚其廬舍渥奔鄂州敕使奔襄州鐐為賊所拘賊乃分其軍三千餘人從仙芝及尚君長二千餘人從巢各分道而去四年春二月王仙芝陷鄂州黃巢陷鄆州殺節度使薛崇三月黃巢陷沂州夏四月黃巢與尚讓合軍保查牙山六月庚申王仙芝黃巢攻宋州三道兵與戰不利賊遂圍宋威於宋州甲寅右威衛上將軍張自勉將忠武兵七千救宋州殺賊二千餘人賊解圍遁去王鐸盧攜欲使張自勉以所將兵受宋威節度鄭畋以為威與自勉已有疑忿若在麾下必為所殺不肯署奏八月辛未鐸攜訴於上求罷免庚辰畋請歸滻川養疾上皆不許王仙芝陷安州乙卯王仙芝陷隨州執刺史崔休徴山南東道節度使李福遣其子將兵救隨州戰死福奏求援兵遣左武衛大將軍李昌言將鳯翔五百騎赴之仙芝遂轉掠復郢忠武大將張貫等四千人與宣武兵援襄州自申蔡間道逃歸詔忠武節度使崔安潛宣武節度使穆仁裕遣人約還冬十月鄭畋與王鐸盧攜爭論用兵於上前畋不勝退復上奏以為自王仙芝俶擾崔安潛首請會兵討之繼發士卒罄供資糧賊往來千里塗炭諸州獨不敢犯其境又以本道兵授張自勉解宋州圍使江淮漕運流通不輸冦手今蒙盡以自勉所將七千兵令張貫將之隸宫威自勉獨歸許州威復奏加誣毁因功為辱臣竊痛之安潛出師前後克捷非一一旦強兵盡付它人良將空還若勍冦忽至何以枝梧臣請以忠武四千人授威餘三千人使自勉將之守衛其境既不侵宋威之功又免使安潛愧恥時盧攜不以為然上不能決畋復上言宋威欺罔朝廷敗衄狼籍又聞王仙芝七狀請降威不為聞奏朝野切齒以為宜正軍法迹狀如此不應復與兵權願典內大臣參酌早行罷黜不從黃巢冦掠蘄黃曾元裕擊破之斬首四千餘級巢遁去十一月招討副都監楊復光遣人説諭王仙芝仙芝遣尚君長等請降於復光宋威遣兵於道中劫取君長等十二月威奏與君長等戰於潁川西南生擒以獻復光奏君長等實降非威所擒詔侍御史歸仁紹等鞫之竟不能明斬君長等於狗脊嶺黃巢陷匡城遂陷濮州詔潁川刺史張自勉將諸道兵擊之王仙芝冦荆南節度使楊知溫知至之兄也以文學進不知兵或告賊至知溫以為妄不設備時漢水淺狹賊自賈塹度五年春正月丁酉朔大雪知溫方受賀賊已至城下遂陷羅城將佐共治子城而守之及暮知溫猶不出將佐請知溫出撫士卒知溫紗帽皂裘而行將佐請知溫擐甲以備流矢知溫見士卒拒戰猶賦詩示幕僚遣使告急於山南東道節度使李福福悉其衆自將救之時有沙陀五百在襄陽福與之俱至荆門遇賊沙陀縱騎奮擊破之仙芝聞之焚掠江陵而去江陵城下舊三十萬户至是死者什三四壬寅詔討副使曾元裕大破王仙芝於申州東所殺萬人招降散遣者亦萬人敕以宋威久病罷招討使還青州以曾元裕為招討使潁州刺史張自勉為副使二月貶揚知溫為郴州司馬曾元裕奏大破王仙芝於黃梅殺五萬餘人追斬仙芝傳首餘黨散去黃巢方攻亳州未下尚讓帥仙芝餘衆歸之推巢為王號衝天大將軍改元王霸署官屬巢襲陷沂州濮州既而屢為官軍所敗乃遺天平節度使張禓書請奏之詔以巢為右衛將軍令就鄆州解甲巢竟不至加山南東道節度使李福同平章事賞救荆南之功也三月羣盜陷朗州嶽州招討使曾元裕屯荆襄黃巢自濮州掠宋汴乃以副使張自勉充東南面行營招討使黃巢攻衛南遂攻葉陽翟詔發河陽兵千人赴東都與宣武昭義兵二千人共衛宫闕以左神武大將軍劉景仁充東都應援防遏使并將三鎮兵仍聽於東都募兵二千人景仁昌之孫也又詔曾元裕將兵徑還東都發義成兵三千守轘轅伊闕河隂武牢王仙芝餘黨王重隱陷洪州江西觀察使髙湘奔湖口賊轉掠湖南别將曹師雄掠宣潤詔曾元裕楊復光引兵救宣潤黃巢引兵渡江攻陷虔吉鐃信等州夏四月詔以東都軍儲不足貸商旅富人錢榖以供數月之費仍賜空名殿中侍御史告身五通監察御史告身十通有能出家財助國稍多者賜之時連嵗旱蝗冦盜充斥耕桑半廢租賦不足內藏虛竭無所佽助兵部侍郎判度支楊嚴三表自陳木短不能濟辦乞解使務辭極哀切詔不許五月丁酉鄭畋盧攜皆罷為太子賔客分司六月王仙芝餘黨剽掠浙西朝廷以荆南節度使髙駢先在天平有威名仙芝黨多鄆人乃徙駢為鎮海節度使秋八月黃巢冦宣州宣歙觀察使王凝拒之敗於南陵巢攻宣州不克乃引兵入浙東開山路七百里攻剽福建諸州九月平盧軍奏節度使宋威薨辛丑以諸道行營招討使曽元裕領平盧節度使冬十二月甲戌黃巢陷福州觀察使韋岫棄城走六年春正月鎮海節度使髙駢遣其將張璘梁纘分道擊黃巢屢破之降其將秦彥畢師鐸李罕之許勍等數十人巢遂趣廣南彥徐州人師鐸寃句人罕之項城人也上以羣盜為憂王鐸曰臣為宰相之長在朝不足分陛下之憂請自督諸將討之乃以鐸守司徒兼侍中充荆南節度使南面行營招討都統泰寧節度使李係晟之曽孫也有口才而實無勇略王鐸以其家世良將奏為行營副都統兼湖南觀察使使將精兵五萬并土團屯潭州以塞嶺北之路拒黃巢五月黃巢與浙東觀察使崔璆嶺南東道節度使李迢書求天平節度使二人為之奏聞朝廷不許巢復上表求廣州節度使上命大臣議之左僕射于琮以為廣州市舶寶貨所聚豈可令賊得之亦不許乃議别除官六月宰相請除巢率府率從之秋九月黃巢得率府率告身大怒詬執政急攻廣州即日陷之執節度使李迢轉掠嶺南州縣巢使迢草表述其所懷迢曰豫代受國恩親戚滿朝腕可斷表不可草巢殺之黃巢在嶺南士卒罹瘴疫死者什三四其徒勸之北還以圖大事巢從之自桂州編大筏數千乘暴水沿湘江而下歷衡永州十月癸未抵潭州城下李係嬰城不敢出戰巢急攻一日陷之係奔朗州巢盡殺戍兵流尸蔽江而下尚讓乘勝進逼江陵衆號五十萬時諸道兵未集江陵兵不滿萬人王鐸留其將劉漢宏守江陵自帥衆趣襄陽云欲會劉巨容之師鐸既去漢宏大掠江陵焚蕩殆盡士民逃竄山谷會大雪僵尸滿野後旬餘賊乃至漢宏兖州人也帥其衆北歸為羣盜十一月黃巢北趣襄陽劉巨容與江西招討使淄州刺史曹全晸合兵屯荆門以拒之賊至巨容伏兵林中全晸以輕騎逆戰陽不勝而走賊追之伏發大破賊衆乘勝逐北比至江陵俘斬其什七八巢與尚讓收餘衆度江東走或勸巨容窮追賊可盡也巨容曰國家喜負人有急則撫存將士不愛官賞事寧則棄之或更得罪不若留賊以為富貴之資衆乃止全晸度江追賊會朝廷以泰寧都將段彥謨代為招討使全晸亦止由是賊勢復振攻鄂州陷其外郭轉掠饒信池宣歙杭等十五州衆至二十萬十二月以王鐸為太子賔客分司初兵部尚書盧攜嘗薦高駢可為都統至是駢將張璘等屢破黃巢乃復以攜為門下侍郎平章事凡關東節度使王鐸鄭畋所除者多易置之廣明元年春二月左拾遺侯昌業以盜賊滿關東而上不親政事專務遊戲賞賜無度田令孜專權無上天文變異社稷將危上疏極諫上大怒召昌業至內侍省賜死上善騎射劔槊法算至於音律蒱博無不精妙好蹴鞠鬬雞與諸王賭鵝鵝一頭至直五十緍尤善擊毬嘗謂優人石野豬曰朕若應擊毬進士舉須為狀元對曰若遇堯舜作禮部侍郎恐陛下不免駮放上笑而已度支以用度不足奏借富户及胡商貨財敕借其半鹽鐵轉運使髙駢上言天下盜賊蜂起皆出於飢寒獨富户胡商未耳乃止髙駢奏改楊子院為發運使三月淮南節度使髙駢遣其將張璘擊黃巢屢捷盧攜奏以駢為諸道行營兵馬都統駢乃傳檄徴天下兵且廣召募得土客之兵共七萬威望大振朝廷深倚之夏四月張璘度江擊賊帥王重霸降之屢破黃巢軍巢退保饒州别將常宏以其衆數萬降璘攻饒州克之巢走以諸葛爽為北面行營副招討五月以汝州防禦使諸葛爽為振武節度使黃巢屯信州遇疾疫卒徒多死張璘急擊之巢以金啖璘且致書請降於髙駢求駢保奏駢欲誘致之許為之求節鉞時昭義感化義武等軍皆至淮南駢恐分其功乃奏賊不日當平不煩諸道兵請悉遣歸朝廷許之賊詗知諸道兵已北度淮乃告絶於駢且請戰駢怒令璘擊之兵敗璘死巢勢復振六月黃巢别將陷睦州婺州庚戌黃巢攻宣州陷之秋七月黃巢自采石度江圍天長六合兵勢甚盛淮南將畢師鐸言於髙駢曰朝廷倚公為安危今賊數十萬衆乘勝長驅若涉無人之境不據險要之地以擊之使踰長淮不可復制必為中原大患駢以諸道兵已散張璘復死自度力不能制畏怯不敢出兵但命諸將嚴備自保而已且上表告急稱賊六十餘萬屯天長去臣城五十里先是盧攜謂駢有文武長才若悉委以兵柄黃巢不足平朝野雖有謂駢不足恃者然猶庶幾望之及駢表至上下失望人情大駭詔書責駢散遣諸道兵致賊乘無備度江駢上表言臣奏聞遣歸亦非自專今臣竭力保衛一方必能濟辦但恐賊迤邐過淮宜急敕東道將士善為禦備遂稱風痺不復出戰詔河南諸道發兵屯溵水泰寧節度使齊克讓屯汝州以備黃巢辛酉以淄州刺史曹全晸為天平節度使兼東面副都統九月黃巢衆號十五萬曹全晸以其衆六千與之戰頗有殺獲以衆寡不敵退屯泗上以俟諸軍至併力擊之而髙駢竟不之救賊遂擊全晸破之徐州遣兵三千赴溵水過許昌徐卒素名凶悖節度使薛能自謂前鎮彭城有恩信於徐人館之毬場及暮徐卒大譟能登子城樓問之對以供備疏闕慰勞久之方定許人大懼時忠武亦遣大將周岌詣溵水行未遠聞之夜引兵還比明入城襲擊徐卒盡殺之且怨能之厚徐卒也遂逐之能將奔襄陽亂兵追殺之并其家岌自稱留後汝鄭把截制置使齊克讓恐為岌所襲引兵還兖州於是諸道兵屯溵水者皆散黃巢遂悉衆度淮所過不虜掠惟取丁壯以益兵冬十月以諸葛爽為夏綏節度使黃巢陷申州遂入潁宋徐兖之境十一月詔河東節度使鄭從讜以本道兵授諸葛爽及代州刺史朱玫使南討黃巢乙卯以代北都統李琢為河陽節度使初黃巢將度淮豆盧瑑請以天平節鉞授巢俟其到鎮討之盧攜曰盜賊無厭雖與之節不能止其剽掠不若急發諸道兵扼泗州汴州節度使為都統賊既前不能入關必還掠淮浙偷生海渚耳從之既而淮北相繼告急攜稱疾不出京師大恐庚申東都奏黃巢入汝州境辛酉以河中都虞候王重榮權知留後汝鄭把截制置都指揮使齊克讓奏黃巢自稱天補大將軍轉牒諸軍云各宜守壘勿犯吾鋒吾將入東都即至京邑自欲問罪無預衆人上召宰相議之豆盧瑑崔沆請發關內諸鎮及兩神䇿軍守潼關壬戌日南至上開延英對宰相泣下觀軍容使田令孜奏請選左右神䇿軍弓弩手守潼關臣自為都指揮制置把截使上曰侍衛將士不習征戰恐未足用令孜曰昔安祿山構逆玄宗幸蜀以避之崔沆曰祿山衆才五萬比之黃巢不足言矣豆盧瑑曰哥舒翰以十五萬衆不能守潼關今黃巢衆六十萬而潼關又無哥舒之兵若令孜為社稷計三川帥臣皆令孜腹心比於玄宗則有備矣上不懌謂令孜曰卿且為朕發兵守潼關是日上幸左神䇿軍親閲將士令孜薦左軍馬軍將軍張承範右軍步軍將軍王師會左軍兵馬使趙珂上召見三人以承範為兵馬先鋒使兼把截潼關制置使師會為制置關塞糧料使珂為句當塞柵使令孜為左右神䇿軍內外八鎮及諸道兵馬都指揮制置招討等使飛龍使楊復恭為副使癸亥齊克讓奏黃巢已入東都境臣收軍退保潼關於關外置塞將士屢經戰鬬久乏資儲州縣殘破人煙殆絶東西南北不見主人凍餒交逼兵械刓弊各思鄉閭恐一旦潰去乞早遣資糧及援軍上命選兩神䇿弩手得二千八百人令張承範等將以赴之丁卯黃巢陷東都留守劉允章帥百官迎謁巢入城勞問而已閭里宴然允章乃之曾孫也田令孜奏募坊市人數千以補兩軍辛未陜州奏東都已陷壬申以田令孜為汝洛晉綘同華都統將左右軍東討是日賊陷虢州以神䇿將羅元杲為河陽節度使乙亥張承範等將神䇿弩手發京師神䇿軍士皆長安富家子賂宦官竄名軍籍厚得廪賜但華衣怒馬憑勢使氣未嘗更戰陳聞當出征父子聚泣多以金帛雇病坊貧人代行往往不能操兵是日上御章信門樓臨遣之承範進言聞黃巢擁數十萬之衆鼓行而西齊克讓以飢卒萬人依托關外復遣臣以二千餘人屯於關上又未聞饋餉之計以此拒賊臣竊寒心願陛下趣諸道精兵早為繼援上曰卿輩第行兵尋至矣丁丑承範等至華州會刺史裴虔餘徙宣歙觀察使軍民皆逃入華山城中索然州庫唯塵埃鼠迹顧倉中猶有米千餘斛軍士褁三日糧而行十二月庚辰朔承範等至潼關搜菁中得村民百許使運石汲水為守禦之備與齊克讓軍皆絶糧士卒莫有鬪志是日黃巢前鋒軍抵關下白旗滿野不見其際克讓與戰賊小却俄而巢至舉軍大呼聲振河華克讓力戰自午至酉始解士卒飢甚遂喧譟燒營而潰克讓走入關關左有谷平日禁人往來以榷征稅謂之禁坑賊至倉猝官軍忘守之潰兵自谷而入谷中灌木夀藤茂密如織一夕踐為坦塗承範盡散其緇囊以給士卒遣使上表告急稱臣離京六日甲卒未增一人饋餉未聞影響到關之日巨冦已來以二千餘人拒六十萬衆外軍飢潰踏開禁坑臣之失守鼎鑊甘心朝廷謀臣愧顔何寄或聞陛下已議西巡茍鑾輿一動則上下土崩臣敢以猶生之軀奮冒死之語願與近密及宰臣熟議未可輕動急徵兵以救關防則髙祖太宗之業庶幾猶可扶持使黃巢繼安祿山之亡微臣勝哥舒翰之死辛巳賊急攻潼關承範悉力拒之自寅及申關上矢盡投石以擊之關外有天塹賊驅民千餘人入其中掘土填之須臾即平引兵而度夜縱火焚關樓俱盡承範分兵八百人使王師會守禁坑比至賊已入矣壬午旦賊夾攻潼關關上兵皆潰師會自殺承範變服帥餘衆脫走至野狐泉遇奉天援兵二千繼至承範曰汝來晚矣博野鳯翔軍還至渭橋見所募新軍衣裘溫鮮怒曰此輩何功而然我曹反凍餒遂掠之更為賊鄉導以趣長安賊之攻潼關也朝廷以前京兆尹蕭廪為東道轉運糧料使廪稱疾請休官貶賀州司户黃巢入華州留其將喬鈴守之河中留後王重榮請降於賊癸未制以巢為天平節度使甲申以翰林學士承旨尚書左丞王徽為户部侍郎翰林學士户部侍郎裴徹為工部侍郎並同平章事以盧攜為太子賔客分司田令孜聞黃巢已入關恐天子責已乃歸罪於攜而貶之薦徽徹為相是夕攜飲藥死徹休之從子也百官退朝聞亂兵入城布路竄匿田令孜帥神䇿兵五百奉帝自金光門出惟福穆澤夀四王及妃嬪數人從行百官皆莫知之上奔馳晝夜不息從官多不能及車駕既去軍士及坊市民競入府庫盜金帛晡時黃巢前鋒將柴存入長安金吾大將軍張直方帥文武數十人迎巢於霸上巢乘金裝肩輿其徒皆被髮約以紅繒衣錦繡執兵以從甲騎如流輜重塞塗千里絡繹不絶民夾道聚觀尚讓歷諭之曰黃王起兵本為百姓非如李氏不愛汝曹汝但安居母恐巢館于田令孜第其徒為盜久不勝富見貧者往往施與之居數日各出大掠焚市肆殺人滿街巢不能禁尤憎官吏得者皆殺之上趣駱谷鳯翔節度使鄭畋謁上於道次請車駕留鳳翔上曰朕不欲密邇巨冦且幸興元徴兵以圖收復卿東扞賊鋒西撫諸蕃糾合鄰道勉建大勳畋曰道路梗澀奏報難通請得便宜從事許之戊子上至壻水詔牛朂楊師立陳敬瑄諭以京城不守且幸興元若賊勢猶盛將幸成都宜豫為備擬庚寅黃巢殺唐宗室在長安者無遺類辛卯巢始入宫壬辰巢即皇帝位于含元殿畫皂繒為衮衣擊戰鼓數百以代金石之樂登丹鳯樓下赦書國號大齊改元金統謂廣明之號去唐下體而著黃家日月以為已符瑞唐官三品已上悉停任四品以下位如故以妻曹氏為皇后以尚讓為太尉兼中書令趙璋兼侍中崔璆楊希古並同平章事孟楷蓋洪為左右僕射知左右軍事費傳古為樞密使以太常博士皮日休為翰林學士璆邠之子也時罷浙東觀察使在長安巢得而相之諸葛爽以代北行營屯櫟陽黃巢將碭山朱溫屯東渭橋巢使溫誘説之爽遂降於巢巢以諸葛爽為河陽節度使爽赴鎮羅元杲發兵拒之士卒皆棄甲迎爽元杲逃奔行在鄭畋還鳯翔召將佐議拒賊皆曰賊勢方熾且宜從容以俟兵集乃圖收復畋曰諸君勸畋臣賊乎因悶絶仆地甃傷其面自午至明旦尚未能言會巢使者以赦書至監軍袁敬柔與將佐序立宣示代畋草表署名以謝巢監軍與巢使者宴樂奏將佐以下皆哭使者怪之幕客孫儲曰以相公風痺不能來故悲耳民間聞者無不泣畋聞之曰吾固知人心尚未厭唐賊授首無日矣乃刺指血為表遣所親間道詣行在召將佐諭以逆順皆聽命復刺血與盟然後完城塹繕器械訓士卒密約鄰道合兵討賊鄰道皆許諾發兵會於鳯翔時禁軍分鎮關中者尚數萬聞天子幸蜀無所歸畋使人招之皆往從畋畋分財以結其心軍勢大振丁酉車駕至興元詔諸道各出全軍收復京師己亥黃巢下令百官詣趙璋第投名銜者復其官豆盧瑑崔沆及左僕射于琮右僕射劉鄴太子少師裴諗御史中丞趙濛刑部侍郎李溥京兆尹李湯扈從不及匿民間巢搜獲皆殺之廣德公主曰我唐室之女誓與于僕射俱死執賊刃不置賊并殺之發盧攜尸戮之於市將作監鄭綦庫部郎中鄭係義不臣賊舉家自殺左金吾大將軍張直方雖臣於巢多納亡命匿公卿於復壁巢殺之初樞密使楊復恭薦處士河間張濬拜太常博士遷度支貟外郎黃巢逼潼關濬避亂商山上幸興元道中無供頓漢隂令李康以騾負糗糧數百馱獻之從行軍士始得食上問康卿為縣令何能如是對曰臣不及此乃張濬貟外教臣上召濬詣行在拜兵部郎中義成節度使王處存聞長安失守號哭纍日不俟詔命舉軍入援遣二千人間道詣興元衛車駕黃巢遣使調發河中前後數百人吏民不勝其苦王重榮謂衆曰始吾屈節以紓軍府之患今調財不已又將徴兵吾亡無日矣不如發兵拒之衆皆以為然乃悉驅巢使者殺之巢遣其將朱溫自同州弟黃鄴自華州合兵擊河中重榮與戰大破之獲糧仗四十餘船遣使與王處存結盟引兵營於渭北陳敬瑄聞車駕出幸遣步騎三千奉迎表請幸成都時從兵浸多興元儲偫不豐田令孜亦勸上上從之中和元年春正月車駕發興元辛未上至綿州東川節度使楊師立謁見壬申以工部侍郎判度支蕭遘同平章事鄭畋約前朔方節度使田弘夫涇原節度使程宗楚同討黃巢巢遣其將王暉齎詔召畋畋斬之遣其子凝績詣行在凝績追及上於漢州丁丑車駕至成都館於府舍上遣中使趣髙駢討黃巢道路相望駢終不出兵上至蜀猶冀駢立功詔駢巡內刺史及諸將有功者自監察至常侍聽以墨敕除訖奏聞八月乙卯朔以太子少師王鐸守司徒兼門下侍郎同平章事丙申加鄭畋同平章事加淮南節度使髙駢東面都統加河東節度使鄭從讜兼侍中依前行營招討使代北監軍陳景思帥沙陀酋長李友金及薩葛安慶吐谷渾諸部入援京師至絳州將濟河絳州刺史瞿稹亦沙陀也謂景思曰賊勢方盛未可輕進不若且還代北募兵遂與景思俱還鴈門以樞密使楊復光為京城西南面行營都監黃巢以朱溫為東南面行營都虞候將兵攻鄧州三月辛亥陷之執刺史趙戒因戍鄧州以扼荆襄壬子加陳敬瑄同平章事甲寅敬瑄奏遣左黃頭軍使李鋋將兵擊黃巢辛酉以鄭畋為京城四面諸軍行營都統賜畋詔凡蕃漢將士赴難有功者並聽以墨敕除官畋奏以涇原節度使程宗楚為副都統前朔方節度使唐弘夫為行軍司馬黃巢遣其將尚讓王播帥衆五萬冦鳯翔畋使弘夫伏兵要害自以兵數千多張旗幟踈陳於髙岡賊以畋書生輕之鼓行而前無復行伍伏發賊大敗於龍尾陂斬首二萬餘級伏尸數十里有書尚書省門為詩以嘲賊者尚讓怒應在省官及門卒悉抉目倒懸之大索城中能為詩者盡殺之識字者給賤役凡殺三千餘人瞿稹李友金至代州募兵踰旬得三萬人皆北方雜胡屯於崞西彍悍暴橫稹與友金不能制友金乃説陳景思曰今雖有衆數萬茍無威望之將以統之終無成功吾兄司徒父子勇略過人為衆所服驃騎誠奏天子赦其罪召以為帥則代北之人一麾響應狂賊不足平也景思以為然遣使詣行在言之詔如所請友金以五百騎齎詔詣達靼迎之李克用帥達靼諸部萬人赴之羣臣追從車駕者稍稍集成都南北司朝者近二百人諸道及四夷貢獻不絶蜀中府庫充實與京師無異賞賜不乏士卒欣悅黃巢得王徽逼以官徽陽瘖不從月餘逃奔河中遣人間道奉絹表詣行在詔以徽為兵部尚書前夏綏節度使諸葛爽復自河陽奉表自歸即以為河陽節度使宥州刺史拓跋思恭本黨項羌也糾合夷夏兵會鄜延節度使李孝昌於鄜州同盟討賊奉天鎮使齊克儉遣使詣鄭畋求自效甲子畋傳檄天下藩鎮合兵討賊時天子在蜀詔令不通天下謂朝廷不能復振及得畋檄爭發兵應之賊懼不敢復窺京西夏四月戊寅朔加王鐸兼侍中以拓跋思恭權知夏綏節度使黃巢以其將王玫為邠寧節度使邠州通塞鎮將朱玫起兵誅之讓别將李重古為節度使自將兵討巢是時唐弘夫屯渭北王重榮屯沙苑王處存屯渭橋拓跋思恭屯武功鄭畋屯盩厔弘夫乘龍尾之捷進薄長安壬午黃巢帥衆東走程宗楚先自延秋門入弘夫繼至處存帥鋭卒五千夜入城坊市民喜爭歡呼出迎官軍或以瓦礫擊賊或拾箭以供官軍宗楚等諸將分其功不報鳳翔鄜夏軍士釋兵入第舍掠金帛妓妾處存令軍士首繫白􅔮為號坊市少年或竊其號以掠人賊露宿霸上詗知官軍不整且諸軍不相繼引兵還襲之自諸門分入大戰長安中宗楚弘夫死軍士重負不能走是以甚敗死者什八九處存收餘衆還營丁亥巢復入長安怒民之助官軍縱兵屠殺流血成川謂之洗城於是諸軍皆退賊勢愈熾所署同州刺史王溥華州刺史喬謙商州刺史宋巖聞巢棄長安皆帥衆奔鄧州朱溫斬溥謙釋巖使還商州庚寅拓跋思恭李孝昌與賊戰於王橋不利詔以河中留後王重榮為節度使賊衆上黃巢尊號曰承天應運啓聖睿文宣武皇帝有雙雉集廣陵府舍占者以為野鳥來集城邑將空之兆髙駢惡之乃移檄四方云將入討黃巢悉發巡內兵八萬舟二千艘旌旗甲兵甚盛五月己未出屯東塘諸將數請行期駢託風濤為阻或云時日不利竟不發黃巢之克長安也忠武節度使周岌降之岌嘗夜宴急召監軍楊復光左右曰周公臣賊將不利於內侍不可往復光曰事已如此義不圖全即詣之酒酣岌言及本朝復光泣下良久曰丈夫所感者恩義耳公自匹夫為公侯奈何捨十八葉天子而臣賊乎岌亦流涕曰吾不能獨拒賊故貌奉而心圖之今日召公正為此耳因瀝酒為盟是夕復光遣其養子守亮殺賊使者於驛時秦宗權據蔡州不從岌命復光將忠武兵三千詣蔡州説宗權同舉兵討巢宗權遣其將王淑將兵三千從復光擊鄧州逗留不進復光斬之併其軍分忠武八千人為八都遣牙將鹿晏弘晉暉王建韓建張造李師泰龐從等八人將之王建舞陽人韓建長社人晏弘暉造師泰皆許州人也復光帥八都與朱溫戰敗之遂克鄧州逐北至藍橋而還昭義節度使髙潯會王重榮攻華州克之六月戊戌以鄭畋為司空兼門下侍郎同平章事都統如故邠寧節度副使朱玫屯興平黃巢將王播圍興平玫退屯奉天及龍尾陂西川黃頭軍使李鋋將萬人鞏咸將五千人屯興平為二寨與黃巢戰屢捷陳敬瑄遣神機營使高仁厚將二千人益之初車駕至成都蜀軍賞錢人三緍田令孜為行在都指揮處置使每四方貢金帛輒頒賜從駕諸軍無虛月不復及蜀軍蜀軍頗有怨言秋七月丙寅令孜宴土客都頭以金杯行酒因賜之諸都頭皆拜而受西川黃頭軍使郭琪獨不受起言曰諸將月受俸料豐贍有餘常思難報豈敢無厭顧蜀軍與諸軍同宿衛而賞賚懸殊頗有觖望恐萬一致變願軍容減諸將之賜以均蜀軍使土客如一則上下幸甚令孜默然有間曰汝嘗有何功對曰琪生長山東征戍邊鄙嘗與黨項十七戰契丹十餘戰金創滿身又嘗征吐谷渾傷脅腸出線縫復戰令孜乃自酌酒於别樽以賜琪琪知其毒不得已再拜飲之歸殺一婢吮其血以解毒吐黑汁數升遂帥所部作亂丁卯焚掠坊市令孜奉天子保東城閉門登樓命諸軍擊之琪引兵還營陳敬瑄命都押牙安金山將兵攻之琪夜突圍出奔廣都上日夕專與宦官同處議天下事待外臣殊疏薄庚午左拾遺孟昭圖上疏以為治安之代遐邇猶應同心多難之時中外尤當一體去冬車駕西幸不告南司遂使宰相僕射以下悉為賊所屠獨北司平善况今朝臣至者皆胃死﨑嶇逺奉君親所宜自兹同休等戚伏見前夕黃頭軍作亂陛下獨與令孜敬瑄及諸內臣閉城登樓並不召王鐸已下及收朝臣入城翌日又不對宰相亦不宣慰朝臣臣備位諫官至今未知聖躬安否况疏冗乎儻羣臣不顧君上罪固當誅若陛下不恤羣臣於義安在夫天下者髙祖太宗之天下非北司之天下天子者四海九州之天子非北司之天子北司未必盡可信南司未必盡無用豈天子與宰相了無關涉朝臣皆若路人如此恐收復之期尚勞宸慮尸祿之士得以宴安臣躬被寵榮職在裨益雖遂事不諫而來者可追疏入令孜屏不奏辛未矯詔貶昭圖嘉州司户遣人沉於蟇頥津聞者氣塞而莫敢言鄜延節度使李孝昌權夏州節度使拓跋思恭屯東渭橋黃巢遣朱溫拒之以義武節度使王處存為東南面行營招討使以邠寧節度副使朱玫為節度使秋八月髙潯與黃巢將李詳戰于石橋潯敗奔河中詳乘勝復取華州巢以詳為華州刺史以權知夏綏節度使拓跋思恭為節度使九月李孝昌拓跋思恭與尚讓朱溫戰于東渭橋不利引去初髙駢與鎮海節度使周寶俱出神䇿軍駢以兄事寶及駢先貴有功浸輕之既而封壤相鄰數爭細故遂有隙駢檄寶入援京師寶治舟師以俟之怪其久不行訪諸幕客或曰髙公幸朝廷多故有併吞江東之志聲云入援其實未必非圖我也宜為備寶未之信使人覘駢殊無北上意會駢使人約寶面會瓜洲議軍事寶遂以言者為然辭疾不往且謂使者曰吾非李康髙公復欲作家門功勳以欺朝廷邪駢怒復遣使責寶何敢輕侮大臣寶詬之曰彼此夾江為節度使汝為大臣我豈坊門卒邪由是遂為深仇駢留東塘百餘日詔屢趣之駢上表託以寶及浙東觀察使劉漢宏將為後患辛亥復罷兵還府其實無赴難心但欲禳雉集之異耳忠武監軍楊復光屯武功鳯翔行軍司馬李昌言將本軍屯興平時鳯翔倉庫虛竭犒賞稍薄糧饋不繼昌言知府中兵少因激怒其衆冬十月引軍還襲府城鄭畋登城與士卒言其衆皆下馬羅拜曰相公誠無負我曹畋曰行軍茍能戢兵愛人為國滅賊亦可以順守矣乃以留務委之即日西赴行在天平節度使曹全晸與賊戰死軍中立其兄子存實為留後十一月孟楷朱溫襲鄜夏二軍於富平二軍敗奔歸本道鄭畋至鳯州纍表辭位詔以畋為太子少傅分司以李昌言為鳯翔節度行營招討使十二月以感化留後時溥為節度使賜夏州號定難軍王鐸以髙駢為諸道都統無心討賊自以身為首相發憤請行懇欵流涕至于再三上許之二年春正月辛亥以王鐸兼中書令充諸道行營都都統權知義成節度使俟罷兵復還政府髙駢但領鹽鐵轉運使罷其都統及諸使聽王鐸自辟將佐以太子少師崔安潛為副都統辛未以周岌王重榮為都都統左右司馬諸葛爽及宣武節度使康實為左右先鋒使時溥為催遣綱運租賦防遏使以右神䇿觀軍容使西門思恭為諸道行營都都監又以王處存李孝昌拓跋思恭為京城東北西面都統以楊復光為南面行營都監使又以中書舍人鄭昌圖為義成節度行軍司馬給事中鄭畯為判官直弘文館王搏為推官司勳貟外郎裴贄為掌書記昌圖從讜之從祖兄弟畯畋之弟搏璵之曽孫贄坦之子也又以陜虢觀察使王重盈為東面都供軍使重盈重榮之兄也黃巢以朱溫為同州刺史令溫自取之二月同州刺史米誠奔河中溫遂據之己卯以太子少傅分司鄭畋為司空兼門下侍郎同平章事召詣行在軍務一以咨之以王鐸兼判户部事朱溫冦河中王重榮擊敗之以李昌言為京城西面都統朱玫為河南都統以右神䇿將軍齊克儉為左右神䇿軍內外八鎮兼博野奉天節度使賜鄜坊軍號保大夏四月王鐸將兩川興元之軍屯靈感寺涇原屯京西易定河中屯渭北邠寧鳯翔屯興平保大定難屯渭橋忠武屯武功官軍四集黃巢勢日蹙號令所行不出同華民避亂皆入深山築柵自保農事俱廢長安城中斗米直三十緍賊買人於官軍以為糧官軍或執山柵之民鬻之直數百緍以肥瘠論價五月加淮南節度使髙駢兼侍中罷其鹽鐵轉運使駢既失兵柄又解利權攘𬒮大詬遣幕僚顧雲草表自訴言辭不遜其略曰是陛下不用微臣固非微臣有負陛下又曰姦臣未悟陛下猶迷不思宗廟之焚燒不痛園陵之開毁又曰王鐸僨軍之將崔安潛在蜀貪黷豈二儒生能戢強兵又曰今之所用上至帥臣下及禆將以臣所料悉可坐擒又曰無使百代有抱恨之臣千古留刮席之恥臣但慮冦生東土劉氏復興即軹道之災豈獨往日又曰今賢才在野憸人滿朝致陛下為亡國之君此子等計將安出上命鄭畋草詔切責之其略曰綰利則牢盆在手主兵則都統當權直至京北京西神䇿諸鎮悉在指揮之下可知董制之權而又貴作司徒榮為太尉以為不用如何為用乎又曰朕緣久付卿兵柄不能翦蕩元凶自天長漏網過淮不出一兵襲逐奄殘京國首尾三年廣陵之師未離封部忠臣積望勇士興譏所以擢用元臣誅夷巨冦又曰從來倚仗之意一旦控告無門凝睇東南惟增悽惻又曰謝玄破符堅於淝水裴度平元濟於淮西未必儒臣不如武將又謂宗廟焚燒園陵開毁龜玉毁櫝誰之過與又曰姦臣未悟之言何人肯認陛下猶迷之語朕不敢當又曰卿尚不能縛黃巢於天長安能坐擒諸將又曰卿云劉氏復興不知誰為魁首比朕於劉玄子嬰何太誣罔又曰况天步未傾皇綱尚整三靈不昧百度俱存君臣之禮儀上下之名分所宜遵守未可墮陵朕雖沖人安得輕侮駢臣節既虧自是貢賦遂絶黃巢攻興平興平諸軍退屯奉天秋七月以保大留後東方逵為節度使充京城東靣行營招討使八月黃巢所署同州防禦使朱溫屢請益兵以扞河中知右軍事孟楷抑之不報溫見巢兵勢日蹙知其將亡親將胡真謝瞳勸溫歸國九月丙戌溫殺其監軍嚴實舉州降王重榮溫以舅事重榮王鐸承制以溫為同華節度使使瞳奉表詣行在瞳福州人也李祥以重榮待溫厚亦欲歸之為監軍所告黃巢殺之以其弟思鄴為華州刺史以朱溫為右金吾大將軍河中行營招討使賜名全忠冬十月以平盧大將王敬武為留後時諸道兵皆會關中討黃巢獨平盧不至王鐸遣都統判官諫議大夫張濬往説之敬武已受黃巢官爵不出迎濬見敬武責之曰公為天子藩臣侮慢詔使不能事上何以使下敬武愕然謝之既宣詔將士皆不應濬徐諭之曰人生當先曉逆順次知利害黃巢前日販鹽虜耳公等捨纍葉天子而臣之果何利哉今天下勤王之師皆集京畿而淄青獨不至一旦賊平天子返正公等何面見天下之人乎不亟往分功各取富貴後悔無及矣將士皆改容引咎顧謂敬武曰諫議之言是也敬武即發兵從濬而西黃巢兵勢尚強王重榮患之謂行營都監楊復光曰臣賊則負國討賊則力不足奈何復光曰鴈門李僕射驍勇有強兵其家尊與吾先人嘗共事相善彼亦有徇國之志所以不至者以與河東結隙耳誠以朝旨諭鄭公而召之必來來則賊不足平矣東面宣慰使王徽亦以為然時王鐸在河中乃以墨敕召李克用諭鄭從讜十一月克用將沙陀萬七千自嵐石路趣河中李詳舊卒共逐黃思鄴推華隂鎮使王遇為主以華州降王重榮王鐸承制以遇為刺史十二月以欣代等州留後李克用為鴈門節度使李克用將兵四萬至河中遣從父弟克修先將兵五百濟河嘗賊初克用弟克讓為南山寺僧所殺其僕渾進通歸于黃巢自髙潯之敗諸軍皆畏賊莫敢進及克用軍至賊憚之曰鴉軍至矣當避其鋒克用皆衣黑故謂之鴉軍巢乃捕南山寺僧十餘人遣使齎詔書及重賂因渾進通詣克用以求和克用殺僧哭克讓受其賂以分諸將焚其詔書歸其使者引兵自夏陽度河軍于同州三年春正月李克用將李存貞敗黃揆于沙苑己巳克用進屯沙苑揆巢之弟也王鐸承制以克用為東北面行營都統以楊復光為東面都統監軍使陳景思為北面都統監軍使乙亥制以中書令充諸道行營都統王鐸為義成節度使令赴鎮田令孜欲歸重北司稱鐸討黃巢久無功卒用楊復光䇿召沙陀而破之故罷鐸兵柄以悅復光又以副都統崔安潛為東都留守以都都監西門思恭為右神䇿中尉充諸道租庸兼催促諸道進軍等使令孜自以建議幸蜀收傳國寶列聖真容散家財犒軍為己功令宰相藩鎮共請加賞上以令孜為十軍兼十二衛觀軍容使二月壬子李克用進軍乾坑與河中易定忠武軍合尚讓將十五萬衆屯于梁田陂明日大戰自午至晡賊大敗俘斬數萬伏尸三十里巢將王蟠黃揆襲華州據之王遇亡去甲子李克用進圍華州黃思鄴黃揆嬰城固守克用分騎屯渭北加鳯翔節度使李昌言同平章事黃巢兵數敗食復盡隂為遁計發兵三萬扼藍田道三月壬申遣尚讓將兵救華州李克用王重榮引兵逆戰于零口破之克用進軍渭橋騎軍在渭北克用每夜令其將薛志勤康君立潛入長安燔積聚斬虜而還賊中大驚己丑以河中行營招討副使朱全忠為宣武節度使俟克復長安令赴鎮癸巳李克用等拔華州黃揆棄城走夏四月李克用與忠武將龐從河中將白志遷等引兵先進與黃巢軍戰于渭南一日三戰皆捷義成義武等諸軍繼之賊衆大奔甲辰克用等自光泰門入京師黃巢力戰不勝焚宫室遁去賊死及降者甚衆官軍暴掠無異於賊長安室屋及民所存無幾巢自藍田入商山多遺珍寶於路官軍爭取之不急追賊遂逸去楊復光遣使告捷百官入賀詔留忠武等軍二萬人委大明宫留守王徽及京畿制置使田從異部分守衛長安五月加朱玫李克用東方逵同平章事升陝州為節度以王重盈為節度使又建延州為保塞軍以保大行軍司馬延州刺史李孝恭為節度使克用時年二十八於諸將最少而破黃巢復長安功第一兵勢最強諸將皆畏之克用一目微眇時人謂之獨眼龍詔以崔璆家貴身顯為黃巢相首尾三載不逃不隱於所在斬之黃巢使其驍將孟楷將萬人為前鋒擊蔡州節度使秦宗權逆戰而敗進攻其城宗權遂稱臣於巢與之連兵初巢在長安陳州刺史宛丘趙犨謂將佐曰巢不死長安必東走陳其衝也且巢素與忠武為仇不可不為之備乃完城塹繕甲兵積芻粟六十里之內民有資糧者悉徙之入城多募勇士使其弟昶珝子麓林分將之孟楷既下蔡州移兵擊陳軍于項城犨先示之弱伺其無備襲擊之殺獲殆盡生擒楷斬之巢聞楷死驚恐悉衆屯溵水六月與秦宗權合兵圍陳州掘塹五重百道攻之陳人大恐犨諭之曰忠武素著義勇陳州號為徑兵况吾家久食陳祿誓與此州存亡男子當求生於死中且徇國而死不愈於臣賊而生乎有異議者斬數引鋭兵開門出擊賊破之巢益怒營於州北立宫室百司為持久之計時民間無積聚賊掠人為糧生投於碓磑并骨食之號給糧之處曰舂磨寨縱兵四掠自河南許汝唐鄧孟鄭汴曹濮徐兖等數十州咸被其毒宣武節度使朱全忠帥所部數百赴鎮秋七月丁卯至汴州時汴宋荐飢公私窮竭內外驕軍難制外為大敵所攻無日不戰衆心危懼而全忠勇氣益振詔以黃巢未平加全忠東北面都招討使以李克用為河東節度使召鄭從讜詣行在克用乃自東道過榆次詣鴈門省其父司徒門下同平章事鄭畋罷為太子太保九月感化節度使時溥營於溵水加溥東面兵馬都統十二月趙犨遣人間道求救於鄰道於是周岌時溥朱全忠皆引兵救之全忠與黃巢之黨戰於鹿邑敗之斬首二千餘級遂引兵入亳州而據之四年春正月黃巢兵尚強周岌時溥朱全忠不能支共求救於河東節度使李克用二月克用將蕃漢兵五萬出天井關河陽節度使諸葛爽辭以河橋不全屯兵萬善以拒之克用乃還兵自陜河中度河而東三月朱全忠擊黃巢瓦子寨拔之巢將陜人李唐賔楚丘王虔裕降于全忠黃巢圍陳州幾三百日趙犨兄弟與之大小數百戰雖兵食將盡而衆心益固李克用會許汴徐兖之軍于陳州時尚讓屯太康夏四月癸巳諸軍進拔太康黃思鄴屯西華諸軍復攻之思鄴走黃巢聞之懼退軍故陽里陳州圍始解朱全忠聞巢將至引軍還大梁五月癸亥大雨平地三尺黃巢營為水所漂且聞李克用至遂引兵東北趨汴州屠尉氏尚讓以驍騎五千進逼大梁至于繁臺宣武將豐人朱珍南華龐師古擊却之全忠復告急於李克用丙寅克用與忠武都監使田從異發許州戊辰追及黃巢於中牟北王滿渡乘其半濟奮擊大破之殺萬餘人賊遂潰尚讓帥其衆降時溥别將臨晉李讜曲周霍存甄城葛從周寃句張歸霸及從弟歸厚帥其衆降朱全忠巢踰汴而北己巳克用追擊之於封丘又破之庚午夜復大雨賊驚懼東走克用追之過胙城匡城巢收餘衆近千人東奔兖州辛未克用追至寃句騎能屬者才數百人晝夜行二百餘里人馬疲乏糧盡乃還汴州欲裹糧復追之獲巢幼子及乘輿器服符印得所掠男女萬人悉縱遣之庚辰時溥遣其將李師悅將兵萬人追黃巢六月甲辰武寧將李師悅與尚讓追黃巢至瑕丘敗之巢衆殆盡走至狼虎谷丙午巢甥林言斬巢兄弟妻子首將詣時溥遇沙陀博野軍奪之并斬言首以獻于溥秋七月壬午時溥遣使獻黃巢及家人首并姬妾上御大玄樓受之宣問姬妾汝曹皆勳貴子女世受國恩何為從賊其居首者對曰狂賊凶逆國家以百萬之衆失守宗祧播遷巴蜀今陛下以不能拒賊責一女子置公卿將相於何地乎上不復問皆戮之於市人爭與之酒其餘皆悲怖昏醉居首者獨不飲不泣至於就刑神色肅然上以長安宫室焚毁故久留蜀未歸王徽知京兆尹事招撫流散户口稍歸復繕治宫室百司粗有緒冬十月關東藩鎮表請車駕還京師十二月鳯翔節度使李昌言病表弟昌符知留後昌言薨制以昌符為鳯翔節度使時黃巢雖平秦宗權復熾命將出兵冦掠鄰道陳彥侵淮南秦賢侵江南秦誥陷襄唐鄧孫儒陷東都孟陜虢張晊陷汝鄭盧瑭攻汴宋所至屠翦焚蕩殆無孑遺其殘暴又甚於巢軍行未始轉糧車載鹽尸以從北至衛滑西及關輔東盡青齊南出江淮州鎮存者僅保一城極目千里無復煙火上將還長安畏宗權為患光啓元年春正月戊午下詔招撫之己卯車駕發成都陳敬瑄送至漢州而還二月丙申至鳯翔三月丁卯至京師荆棘滿城孤兔縱橫上凄然不樂己巳赦天下改元時朝廷號令所在惟河西山南劒南嶺南數十州而已藩鎮之亂唐僖宗光啓元年初田令孜在蜀募新軍五十四都每都千人分隸兩神䇿為十軍以統之又南牙北司官共萬餘貟是時藩鎮各專租稅河南北江淮無復上供三司轉運無調發之所度支惟收京畿同華鳯翔等數州租稅不能贍賞賚不時士卒有怨言令孜患之不知所出先是安邑解縣兩池鹽皆隸鹽鐵置官榷之中和以來河中節度使王重榮專之嵗獻三千車以供國用令孜奏復如舊制隸鹽鐵夏四月令孜自兼兩池榷鹽鐵使收其利以贍軍重榮上章論訴不已遣中使往諭之重榮不可時令孜多遣親信覘藩鎮有不附己者輒圖之令孜養子匡祐使河中重榮待之甚厚而匡祐傲甚舉軍皆憤怒重榮乃數令孜罪惡責其無禮監軍為講解僅得脫去匡祐歸以告令孜勸圖之五月令孜徙重榮為泰寧節度使以泰寧節度使齊克讓為義武節度使以義武節度使王處存為河中節度使仍詔李克用以河東軍援處存赴鎮王重榮自以有復京城功為田令孜所擯不肯之兖州纍表論令孜離間君臣數令孜十罪令孜結邠寧節度使朱玫鳯翔節度使李昌符以抗之王處存亦上言幽鎮兵新退臣未敢離易定且王重榮無罪有大功於國不宜輕有改易搖藩鎮心詔趣其上道八月處存引軍至晉州刺史冀君武閉城不內而還冬十月王重榮求救於李克用克用方怨朝廷不罪朱全忠事見諸鎮相克用怨全忠攻選兵市馬聚結諸胡議攻汴州報曰待吾先滅全忠還掃鼠輩如秋葉耳重榮曰待公自關東還吾為虜矣不若先除君側之惡退擒全忠易矣時朱玫李昌符亦隂附朱全忠克用乃上言玫昌符與全忠相表裏欲共滅臣臣不得不自救己集蕃漢兵十五萬決以來年濟河自渭北討二鎮不近京城保無驚擾既誅二鎮乃旋師滅全忠以雪讎恥上遣使者諭釋冠蓋相望朱玫欲朝廷討克用數遣人潛入京城燒積聚或刺殺近侍聲云克用所為於是京師震恐日有訛言令孜遣玫昌符將本軍及神䇿鄜延靈夏等軍合三萬人屯沙苑以討王重榮重榮發兵拒之告急於克用克用引兵赴之十一月重榮遣兵攻同州刺史郭璋出戰敗死重榮與玫等相守月餘克用兵至與重榮俱壁沙苑表請誅令孜及玫昌符詔和解之克用不聽十二月癸酉合戰玫昌符大敗各走還本鎮潰軍所過焚掠克用進逼京城乙亥夜令孜奉天子自開遠門出幸鳯翔初黃巢焚長安宫室而去諸道兵入城縱掠焚府寺民居什六七王徽纍年補葺僅完一二至是復為亂兵焚掠無孑遺矣二年春正月李克用還軍河中與王重榮同表請大駕還宫因罪狀田令孜請誅之上復以飛龍使楊復恭為樞密使戊子令孜請上幸興元上不從是夜令孜引兵入宫劫上幸寶雞黃門衛士從者才數百人宰相朝臣皆不知翰林學士承旨杜讓能宿直禁中聞之步追乘輿出城十餘里得人所遺馬無羈勒解帶繫頸而乘之獨追及上於寶雞明日乃有太子少保孔緯等數人繼至讓能審權之子緯戣之孫也宗正奉太廟神主至鄠遇盜皆失之朝士追乘輿者至盩厔為亂兵所掠衣裝殆盡庚寅上以孔緯為御史大夫使還召百官上留寶雞以待之時田令孜弄權再致播遷天下共忿疾之朱玫李昌符亦恥為之用且憚李克用王重榮之強更與之合蕭遘因邠寧奏事判官李松年至鳯翔遣詔朱玫亟迎車駕癸巳玫引步騎五千至鳯翔孔緯詣宰相欲宣詔召之蕭遘裴徹以令孜在上側不欲往辭疾不見緯令臺吏趣百官詣行在皆辭以無袍笏緯召三院御史泣謂布衣親舊有急猶當赴之豈有天子蒙塵為人臣子纍召而不往者邪御史請辦裝數日而行緯拂衣起曰吾妻病垂死且不顧諸君善自為謀請從此辭乃詣李昌符請騎衛送至行在昌符義之贈裝錢遣騎送之邠寧鳯翔兵追逼乘輿敗神䇿指揮使楊晟於潘氏鉦鼓之聲聞於行宫田令孜奉上發寶雞留禁軍守石鼻為後拒置感義軍於興鳯二州以楊晟為節度使守散關時軍民雜糅鋒鏑縱橫以神䇿軍使王建晉暉為清道斬斫使建以長劒五百前驅奮擊乘輿乃得前上以傳國寶授建使負之以從登大散嶺李昌符焚閣道丈餘將摧折王建扶掖上自煙熖中躍過夜宿板下上枕建膝而寢既覺始進食解御袍賜建曰以其有淚痕故也車駕才入散關朱玫已圍寶雞石鼻軍潰玫長驅攻散關不克嗣襄王煴肅宗之玄孫也有疾從上不及留遵塗驛為玫所得與之俱還鳯翔庚戌李克用還太原二月王重榮朱玫李昌符復上表請誅田令孜朱玫李昌符使山南西道節度使石君涉柵絶險要燒郵驛上由它道以進山谷﨑嶇邠軍迫其後危殆者數四僅得逹山南三月壬午石君涉棄鎮逃歸朱玫癸未鳯翔百官蕭遘等罪狀田令孜及其黨韋昭度請誅之初昭度因供奉僧徹結官官得為相徹師知玄鄙徹所為昭度每與同列詣知玄皆拜之知玄揖使詣徹啜茶山南西道監軍馮翊嚴遵美迎上于西縣丙申車駕至興元戊戌以御史大夫孔緯翰林學士承旨兵部尚書杜讓能並為兵部侍郎同平章事保鑾都將李鋋等敗邠軍於鳯州詔加王重榮應接糧料使使調本道榖十五萬斛以繼國用重榮表稱令孜未誅不奉詔以尚書左丞盧渥為户部尚書充山南西道留後以嚴遵美為內樞密使遣王建帥部兵戍三泉晉暉及神䇿軍使張造帥四都兵屯黑水修棧道以通往來以建遙領壁州刺史將帥遙領州鎮自此始朱玫以田令孜在天子左右終不可去言於蕭遘曰主上播遷六年中原將士冒矢石百姓供饋餉戰死餓死什減七八僅能復京城天下方喜車駕還宫主上更以勤王之功為敕使之榮委以大權使墮綱紀騷擾藩鎮召亂生禍玫昨奉尊命來迎大駕不蒙信察反類脅君吾輩報國之心極矣戰賊之力殫矣安能垂頭弭耳受制於閽寺之手哉李氏孫尚多相公盍改圖以利社稷乎遘曰主上踐阼十餘年無大過惡正以令孜專權肘腋致坐不安席上每言之流涕不已近日上初無行意令孜陳兵帳前迫脅以行不容俟旦罪皆在令孜人誰不知足下盡心王室正有引兵還鎮拜表迎鑾廢立重事伊霍所難遘不敢聞命玫出宣言曰我立李氏一王敢異議者斬夏四月壬子玫逼鳯翔百官奉襄王煴權監軍國事承制封拜指揮仍遣大臣入蜀迎駕盟百官于石鼻驛玫使蕭遘為册文遘辭以文思荒落乃使兵部侍郎判户部鄭昌圖為之乙卯煴受册玫自兼左右神䇿十軍使帥百官奉煴還京師以鄭昌圖同平章事判度支鹽鐵户部各置副使三司之事一以委焉河中百官崔安潛等上襄王箋賀受册田令孜自知不為天下所容乃薦樞密使楊復恭為左神䇿中尉觀軍容使自除西川監軍使往依陳敬瑄復恭斥令孜之黨出王建為利州刺史晉暉為集州刺史張造為萬州刺史李師泰為忠州刺史五月朱玫以中書侍郎同平章事蕭遘為太子太保自加侍中諸道鹽鐵轉運等使加裴徹判度支鄭昌圖判户部以淮南節度使髙駢兼中書令充江淮鹽鐵轉運等使諸道行營兵馬都統淮南右都押牙和州刺史吕用之為嶺南東道節度使大行封拜以悅藩鎮遣吏部侍郎夏侯潭宣諭河北户部侍郎楊陟宣諭江淮諸藩鎮受其命者什六七髙駢仍奉箋勸進初鳯翔節度使李昌符與朱玫同謀立襄王既而玫自為宰相專權昌符怒不受其官更通表興元詔加昌符檢校司徒朱玫遣其將王行瑜將邠寧河西兵五萬追乘輿感義節度使楊晟戰數却棄散關走行瑜進屯鳯州是時諸道貢賦多之長安不之興元從官衛士皆乏食上涕泣不知為計杜讓能言於上曰楊復光與王重榮同破黃巢復京城相親善復恭其兄也若遣重臣往諭以大義且致復恭之意宜有回慮歸國之理上從之遣右諌議大夫劉崇望使于河中齎詔諭重榮重榮即聼命遣使表獻絹十萬匹且請討朱玫以自贖戊戌襄王煴遣使者至晉陽賜李克用詔言上至半塗六軍變擾蒼黃晏駕吾為藩鎮所推今已受册朱玫亦與克用書克用聞其謀皆出於玫大怒大將蓋寓説克用曰鑾輿播遷天下皆歸咎於我今不誅玫黜李煴無以自湔洗克用從之燔詔書囚使者移檄鄰道稱玫敢欺藩方明言晏駕當道巳發蕃漢三萬兵進討凶逆當共立大功寓蔚州人也六月以扈蹕都將楊守亮為金商節度京畿制置使將兵二萬出金州與王重榮克用共討朱玫守亮本姓訾名亮曹州人與弟信皆為楊復光假子更名守亮守信李克用遣使奉表稱方發兵濟河除逆黨迎車駕願詔諸道與臣協力先是山南之人皆言克用與朱玫合人情忷懼表至上出示從官并諭山南諸鎮由是帖然然克用表猶以朱全忠為言上使楊復恭以書諭之云俟三輔事寧别有進止秋七月王行瑜進攻興州感義節度使楊晟棄鎮走據文州詔保鑾都將李鋋扈蹕都將李茂貞陳佩屯大唐峯以拒之茂貞博野人本姓宋名文通以功賜姓名九月朱玫將張行實攻大唐峯李鋋等擊却之金吾將軍滿存與邠軍戰破之復取興州進守萬仞寨長安百官太子太師裴璩等勸進於襄王煴冬十月煴即皇帝位改元建貞遙尊上為太上元皇聖帝十一月田令孜至成都請尋醫許之十二月戊寅諸軍拔鳯州以滿存為鳯州防禦使楊復恭傳檄關中稱得朱玫首者以靜難節度使賞之王行瑜戰數敗恐獲罪於朱玫與其下謀曰今無功歸亦死曷若與汝曹斬玫首定京城迎大駕取邠寧節鉞乎衆從之甲寅行瑜自鳯州擅引兵歸京師玫方視事聞之怒召行瑜責之曰汝擅歸欲反邪行瑜曰吾不反欲誅反者朱玫耳遂擒斬之并殺其黨數百人諸軍大亂焚掠京城士民無衣凍死者蔽地裴徹鄭昌圖帥百官二百餘人奉襄王奔河中王重榮詐為迎奉執煴殺之囚徹昌圖百官死者殆半王重榮函襄王煴首送行在刑部請御興元城南門獻馘百官畢賀太常博士殷盈孫議以為煴為賊臣所逼止以不能死節為罪耳禮公族罪在大辟君為之素服不舉今煴已就誅宜廢為庶人令所在葬其首其獻馘稱賀之禮請俟朱玫首至而行之從之盈孫侑之孫也三年春正月以邠州都將王行瑜為靜難軍節度使扈蹕都頭李茂貞領武定節度使扈蹕都頭楊守宗為金商節度使右衛大將軍顧彥朗為東川節度使金商節度使楊守亮為山南西道節度使二月戊辰削奪三川都監田令孜官爵長流端州然令孜依陳敬瑄竟不行三月癸未詔偽宰相蕭遘鄭昌圖裴徹於所在集衆斬之皆死於岐山時朝士受煴官甚衆法司皆處以極法杜讓能力爭之免者什七八壬辰車駕至鳯翔節度使李昌符恐車駕還京雖不治前過恩賞必疏乃以宫室未完固請駐蹕府舍從之夏六月戊申天威都頭楊守立與鳯翔節度使李昌符爭道麾下相驅帝命中使諭之不止是夕宿衛皆嚴兵為備己酉昌符擁兵燒行宫庚戌復攻大安門守立與昌符戰於通衢昌符兵敗帥麾下走保隴州杜讓能聞難挺身步入侍上韋昭度質其家於軍中誓誅反賊故軍士力戰而勝之守立復恭之假子也壬子以扈駕都將武定節度使李茂貞為隴州招討使以討昌符秋八月壬寅朔李茂貞奏隴州刺史薛知籌以城降斬李昌符滅其族丙子以李茂貞同平章事充鳯翔節度使以韋昭度守太保兼侍中文德元年春二月乙亥上不豫壬午發鳯翔己丑至長安庚寅赦天下改元以韋昭度兼中書令三月己亥上疾復作壬寅大漸皇弟吉王保長而賢羣臣屬望十軍觀軍容使楊復恭請立其弟夀王傑是日下詔立傑為皇太弟監軍國事右軍中尉劉季述遣兵迎傑於六王宅入居少陽院宰相以下就見之癸卯上崩于靈符殿遺制太弟傑更名敏以韋昭度攝冢宰昭宗即位體貌明粹有英氣喜文學以僖宗威令不振朝廷日卑有恢復前烈之志尊禮大臣夢想賢豪踐阼之始中外欣欣焉冬十月辛卯葬惠聖恭定孝皇帝于靖陵廟號僖宗昭宗龍紀元年上將祀圓丘故事中尉樞密皆䙆衫侍從禧宗之世已具襴笏至是又令有司制法服孔緯及諫官禮官皆以為不可上出手札諭之曰卿等所論至當事有從權勿以小瑕遂妨大禮於是宦官始服劒佩侍祠己酉祀圓丘赦天下上在藩邸素疾宦官及即位楊復恭恃援立功所為多不法上意不平政事多謀於宰相孔緯張濬勸上舉大中故事抑宦者權復恭常乘肩輿至太極殿它日上與宰相言及四方反者孔緯曰陛下左右有將反者况四方乎上矍然問之緯指復恭曰復恭陛下家奴乃肩輿造前殿多養壯士為假子使典禁兵或為方鎮非反而何復恭曰子壯士欲以收士心衛國家豈反耶上曰卿欲衛國家何不使姓李而姓楊乎復恭無以對復恭假子天威軍使楊守立本姓胡名弘立勇冠六軍人皆畏之上欲討復恭恐守立作亂謂復恭曰朕欲得卿胡子在左右復恭見守立於上上賜姓名李順節使掌六軍管鑰不期年擢至天武都頭領鎮海節度使俄加平章事及謝日臺吏申請班見百僚孔緯判不集順節至中書色不悅它日語微及之緯曰宰相師長百僚故有班見相公職為都頭而於政事堂班見百僚於意安乎順節不敢復言朱全忠求領鹽鐵孔緯獨執以為不可謂進奏吏曰朱公須此職非興兵不可全忠乃止大順二年秋八月六軍十二衛觀軍容使左軍中尉楊復恭揔宿衛兵専制朝政諸假子皆為節度使刺史又養宦官子六百人皆為監軍假子龍劒節度使守貞武定節度使守忠不輸貢賦上表訕薄朝廷上舅王瓌求節度使上訪於復恭復恭以為不可瓌怒訴之瓌出入禁中頗用事復恭惡之奏以為黔南節度使至吉柏津令山南西道節度使楊守亮覆諸江中宗族賔客皆死以舟敗聞上知復恭所為深恨之李順節既寵貴與復恭爭權盡以復恭隂事告上上乃出復恭為鳯翔監軍復恭愠懟不肯行稱疾求致仕九月乙卯以復恭為上將軍致仕賜以几杖使者致詔命還復恭潛遣腹心張綰刺殺之冬十月楊復恭居第近玉山營假子守信為玉山軍使數往省之或告復恭與守信謀反乙酉上御安喜門陳兵自衛命天威都將李順節神䇿軍使李守節將兵攻其第張綰帥家衆拒戰守信引兵助之順節等不能克丙戌禁軍守含光門俟其開欲出掠兩市遇劉崇望立馬諭之曰天子親在街東督戰汝曹皆宿衛之士當於樓前殺賊立功勿貪小利自取惡名衆皆曰諾遂從崇望而東守信之衆望見兵來遂潰走守信與復恭挈其族自通化門出趣興元永安都頭權安追之擒張綰斬之復恭至興元楊守亮楊守忠楊守貞及綿州刺史楊守厚同舉兵拒朝廷以討李順節為名守厚亦復恭假子也十二月天威都將李順節恃恩驕橫出入常以兵自隨兩軍中尉劉景宣西門君遂惡之白上恐其作亂戊子二人以詔召順節順節入至銀臺門二人邀順節於仗舍坐語供奉官似先知自後斬其首從者大譟而出於是天威捧日登封三都大掠永寧坊至暮乃定百官表賀楊守亮欲自金商襲京師昭信防禦使馮行襲逆擊大破之景福元年春正月鳯翔李茂貞靜難王行瑜鎮國韓建同州王行約秦州李茂莊五節度使上言楊守亮容匿叛臣楊復恭請出軍討之乞加茂貞山南西道招討使朝議以茂貞得山南不可復制下詔和解之皆不聽二月李茂貞王行瑜擅舉兵擊興元茂貞表求招討使不已遺杜讓能西門重遂書陵蔑朝廷上意不能容御延英召宰相諫官議之時宦者有隂與二鎮相表裏者宰相相顧不敢言上不悅給事中牛徽曰先朝多難茂貞誠有翼衛之功諸楊阻兵亟出攻討其志亦在疾惡但不當不俟詔命耳比聞兵過山南殺傷至多陛下儻不以招討使授之使用國法約束則山南之民盡矣上曰此言是也乃以茂貞為山南西道招討使夏四月天威軍使賈德晟以李順節之死頗怨憤西門重遂惡之奏而殺之德晟麾下千餘騎奔鳯翔李茂貞由是益強五月加邠寧節度使王行瑜兼中書令秋七月己巳李茂貞克鳯州感義節度使滿存奔興元茂貞又取興洋二州皆表其子弟鎮之八月辛丑李茂貞攻拔興元楊復恭楊守亮楊守信楊守貞楊守忠滿存奔閬州茂貞表其子繼密權知興元府事二年春正月鳯翔節度使李茂貞自請鎮興元詔以茂貞為山南西道兼武定節度使以中書侍郎同平章事徐彥若同平章事充鳯翔節度使又割果閬二州隸武定軍茂貞欲兼得鳯翔不奉詔秋七月李茂貞恃功驕橫上表及遺杜讓能書辭語不遜上怒欲討之茂貞又上表略曰陛下貴為萬乘不能庇元舅之一身尊極九州不能戮復恭之一豎又曰今朝廷但觀強弱不計是非又曰約衰殘而行法隨盛壯以加恩體物錙銖看人衡纊又曰軍情易變戎馬難羈唯慮甸服生靈因兹受禍未審乘輿播越自此何之上益怒決討茂貞命杜讓能專掌其事讓能諫曰陛下初臨大寶國步未夷茂貞近在國門臣愚以為未宜與之御名太上怨萬一不克悔之無及上曰王室日卑號令不出國門此乃志士憤痛之秋藥弗暝眩厥疾弗瘳朕不能甘心為孱懦之主愔愔度日坐視陵夷卿但為朕調兵食朕自委諸王用兵成敗不以責卿讓能曰陛下必欲行之則中外大臣共宜協力以成聖志不當獨以任臣上曰卿位居元輔與朕同休戚無宜避事讓能泣曰臣豈敢避事况陛下所欲行者憲宗之志也顧時有所未可藝有所不能耳但恐它日臣徒受朝錯之誅不能弭七國之禍也敢不奉詔以死繼之上乃命讓能留中書計畫調度月餘不歸崔昭緯隂結邠岐為之耳目讓能朝發一言二鎮夕必知之李茂貞使其黨糾合市人數百千人擁觀軍容使西門君遂馬訴曰岐帥無罪不宜致討使百姓塗炭君遂曰此宰相事非吾所及市人又邀崔昭緯鄭延昌肩輿訴之二相曰兹事主上專委杜太尉吾曹不預知市人因亂投瓦石二相下輿走匿民家僅自免喪堂印及朝服上命捕其唱帥者誅之用兵之意益堅京師民或亡匿山谷嚴刑所不能禁八月以嗣覃王嗣周為京西招討使神䇿大將軍李鐬副之九月乙亥覃王嗣周帥禁軍三萬送鳯翔節度使徐彥若赴鎮軍于興平李茂貞王行瑜合兵近六萬軍于盩厔以拒之禁軍皆新募市井少年茂貞行瑜所將皆邊兵百戰之餘壬午茂貞等進逼興平禁軍皆望風逃潰茂貞等乘勝進攻三橋京師大震士民奔散市人復守闕請誅首議用兵者崔昭緯心害太尉門下侍郎同平章事杜讓能密遺茂貞書曰用兵非主上意皆出於杜太尉耳甲申茂貞陳於臨臯驛表讓能罪請誅之讓能言於上曰臣固先言之矣請以臣為解上涕下不自禁曰與卿訣矣是日貶讓能梧州刺史制辭略曰棄卿士之臧謀御名太上藩垣之深釁咨詢之際證執彌堅又流觀軍容使西門君遂于儋州內樞密使李周潼于崖州段詡于歡州乙酉上御安福門斬君遂周潼詡再貶讓能雷州司户遣使謂茂貞曰惑朕舉兵者三人也非讓能之罪以內侍駱全瓘劉景宣為左右軍中尉壬辰以東都留守韋昭度為司徒門下侍郎同平章事御史中丞崔胤為户部侍郎同平章事胤慎由之子也外寬弘而內巧險與崔昭緯深相結故得為相季父安潛謂所親曰吾父兄刻苦以立門户終為緇郎所壞緇郎胤小字也李茂貞勒兵不解請誅杜讓能然後還鎮崔昭緯復從而擠之冬十月賜讓能及其弟户部侍郎弘徽自盡復下詔布告中外稱讓能舉枉錯直愛憎繫於一時鬻獄賣官聚斂踰於巨萬自是朝廷動息皆稟於邠岐南北司往往依附二鎮以邀恩澤有崔鋋王超者為二鎮判官凡天子有所可否其不逞者輒訴於鋋超二人則教茂貞行瑜上章論之朝廷小有依違其辭語已不遜制復以茂貞為鳯翔節度使兼山南西道節度使守中書令於是茂貞盡有鳯翔興元洋隴秦等十五州之地以徐彥若為御史大夫邠寧節度使守侍中兼中書令王行瑜求為尚書令韋昭度密奏稱太宗以尚書令執政遂登大位自是不以授人臣惟郭子儀以大功拜尚書令終身避讓行瑜安可輕議十一月以行瑜為太師賜號尚父仍賜鐵劵乾寧元年春正月李茂貞入朝大陳兵自衛數日歸鎮六月戊午以翰林學士承旨禮部尚書李溪同平章事方宣制水部郎中知制誥劉崇魯出班掠麻慟哭上召崇魯問其故對言溪姦邪依附楊復恭西門君遂得在翰林無相業恐危社稷溪竟罷為太子少傅溪鄘之孫也上師溪為文崔昭緯恐溪為相分已權故使崇魯沮之溪十表自訟醜詆崇魯父符受贓枉法事覺自殺弟崇望與楊復恭深交崇魯庭拜田令孜為朱玫作勸進表乃云臣交結內臣何異抱贓唱賊且故事絁巾縿帶不入禁庭臣果不才崇魯自應上章論列豈於正殿慟哭為國不祥無人臣禮乞正其罪詔停崇魯見任溪猶上表不已乞行誅竄表數千言詬詈無所不至秋七月李茂貞遣兵攻閬州拔之楊復恭楊守亮楊守信帥其族黨犯圍走楊復恭守亮守信將自商山奔河東至乾元遇華州兵獲之八月韓建獻于闕下斬于獨栁李茂貞獻復恭遺守亮書訴致仕之由云承天門乃隋家舊業大姪但積粟訓兵勿貢獻吾於荆榛中立夀王才得尊位廢定䇿國老有如此負心門生天子二年崔昭緯與李茂貞王行瑜深相結得天子過失朝廷機事悉以告之邠寧節度副使崔鋋昭緯之族也李溪再入相昭緯使鋋告行瑜曰嚮者尚書令之命已行矣而韋昭度沮之今又引李溪為同列相與熒惑聖聼恐復有杜太尉之事行瑜乃與茂貞表稱溪姦邪昭度無相業宜罷居散秩上報曰軍旅之事朕則與藩鎮圖之至於命相當出朕懷行瑜等論列不已三月溪復罷為太子少師王珂李克用之壻也克用表重榮有功於國請賜其子珂節鉞王珙厚結王行瑜李茂貞韓建三帥更上表稱珂非王氏子請以珂為陜州珙為河中上諭以先已允克用之奏不許初王行瑜求尚書令不獲由是怨朝廷畿內有八鎮兵隸左右軍郃陽鎮近華州韓建求之良原鎮近邠州王行瑜求之宦官曰此天子禁軍何可得也王珂王珙爭河中行瑜建及茂貞皆為珙請不能得恥之珙使人語三帥曰珂不受代而與河東昏姻必為諸公不利請討之行瑜使其弟匡國節度使行約攻河中珂求救於李克用行瑜乃與茂貞建各將精兵數千入朝五月至京師坊市皆竄匿上御安福門以待之三帥盛陳甲兵拜伏舞蹈於門下上臨軒親詰之曰卿輩不奏請俟報輒稱兵入京城其志欲何為乎若不能事朕今日請避賢路行瑜茂貞流汗不能言獨韓建粗述入朝之由上與三帥宴三帥奏稱南北司互有朋黨墮紊朝政韋昭度討西川失䇿李溪作相不合衆心請誅之上未之許是日行瑜等殺昭度溪於都亭驛又殺樞密使康尚弼及宦官數人又言王珂王珙嫡庶不分請除王珙河中徙王行約於陜王珂於同州上皆許之始三帥謀廢上立吉王保至是聞李克用已起兵於河東行瑜茂貞各留兵二千宿衛京師與建皆辭還鎮李克用聞二鎮兵犯闕即日遣使十三輩發北部兵期以來月度河入關六月辛卯以前均州刺史孔緯繡州司户張濬並為太子賔客壬辰以緯為吏部尚書復其階爵癸巳拜司空兼門下侍郎同平章事以張濬為兵部尚書諸道租庸使時緯居華州濬居長水上以崔昭緯等外交藩鎮朋黨相傾思得骨鯁之士故驟用緯濬緯以有疾扶輿至京師見上涕泣固辭上不許孔緯張濬諸鎮相攻謫徙事見李克用大舉蕃漢兵南下上表稱王行瑜李茂貞韓建稱兵犯闕賊害大臣請討之又移檄三鎮行瑜等大懼克用軍至絳州刺史王瑶閉城拒之克用進攻旬日拔之斬瑶於軍門殺城中違拒者千餘人秋七月丙辰朔克用至河中王珂迎謁于路匡國節度使王行約敗於朝邑戊午行約棄同州走己未至京師行約弟行實時為左軍指揮使帥衆與行約大掠西市行實奏稱同華已沒沙陀將至請車駕幸邠州庚申樞密使駱全瓘奏請車駕幸鳯翔上曰朕得克用表尚駐軍河中就使沙陀至此朕自有以枝梧卿等但各撫本軍勿令搖動右軍指揮使李繼鵬茂貞假子也本姓名閻圭與駱全瓘謀劫上幸鳯翔中尉劉景宣與王行實知之欲劫上幸邠州孔緯面折景宣以為不可輕離宫闕向晚繼鵬連奏請車駕出幸於是王行約引左軍攻右軍鼓譟震地上聞亂登承天樓欲諭止之捧日都頭李筠將本軍於樓前侍衛李繼鵬以鳯翔兵攻筠矢拂御衣著于樓桷左右扶上下樓繼鵬復縱火焚宫門煙炎蔽天時有鹽州六都兵屯京師素為兩軍所憚上急召令入衛既至兩軍退走各歸邠州及鳯翔城中大亂互相剽掠上與諸王及親近幸李筠營護蹕都頭李居實帥衆繼至或傳王行瑜李茂貞欲自來迎車駕上懼為所迫辛酉以筠居實兩都兵自衛出啓夏門趣南山宿莎城鎮士民追從車駕者數十萬人比至谷口暍死者三之一夜復為盜所掠哭聲震山谷時百官多扈從不及户部尚書判度支及鹽鐵轉運使薛王知柔獨先至上命權知中書事及置頓使壬戌李克用入同州崔昭緯徐彥若王搏至莎城甲子上徙幸石門鎮命薛王知柔與知樞密院劉光裕還京城制置守衛宫禁丙寅李克用遣節度判官王瓌奉表問起居丁卯上遣內侍郗廷昱齎詔詣李克用軍令與王珂各發萬騎同赴新平又詔彰義節度使張鐇以涇原兵控扼鳯翔李克用遣兵攻華州韓建登城呼曰僕於李公未嘗失禮何為見攻克用使謂之曰公為人臣逼逐天子公為有禮孰為無禮者乎會郗延昱至言李茂貞將兵三萬至盩厔王行瑜將兵至興平皆欲迎車駕克用乃釋華州之圍移兵營渭橋以薛王知柔為清海節度使同平章事仍權知京兆尹判度支充鹽鐵轉運使俟反正日赴鎮上在南山旬餘士民從車駕避亂者日相驚曰邠岐兵至矣上遣延王戒丕詣河中趣李克用令進兵壬午克用發河中八月上遣供奉官張承業詣克用軍承業同州人屢奉使於克用因留監其軍己丑克用進軍渭橋遣其將李存貞為前鋒辛卯拔永夀又遣史儼將三千騎詣石門侍衛癸巳遣李存信存審會保大節度使李思孝攻王行瑜梨園寨擒其將王令陶等獻於行在思孝本姓拓跋思恭之弟也李茂貞懼斬李繼鵬傳首行在上表請罪且遣使求和於克用上復遣延王戒丕丹王允諭克用令且赦茂貞併力討行瑜俟其殄平當更與卿議之且命二王拜克用為兄戊戌削奪王行瑜官爵癸卯以李克用為邠寧四面行營都招討使保大節度使李思孝為北面招討使定難節度使李思諫為東面招討使彰義節度使張鐇為西面招討使克用遣其子存朂詣行在年十一上竒其狀貌撫之曰兄方為國之棟梁它日宜盡忠於吾家克用表請上還京上許之令克用遣騎三千駐三橋為備禦辛亥車駕還京師壬子司空兼門下侍郎平章事崔昭緯罷為右僕射以護國留後王珂盧龍留守劉仁恭各為本鎮節度使時宫室焚毁未暇完葺上寓居尚書省百官往往無袍笏僕馬以李克用為行營都統九月癸亥孔緯薨李克用急攻梨園王行瑜求救於李茂貞茂貞遣兵萬人屯龍泉鎮自將兵三萬屯咸陽之旁克用請詔茂貞歸鎮仍削奪其官爵欲分兵討之上以茂貞自誅繼鵬前已赦宥不可復削奪誅討但詔歸鎮仍令克用與之和解以昭義節度使李罕之檢校侍中充邠寧四面行營副都統史儼敗邠寧兵於雲陽擒雲陽鎮使王令誨等獻之冬十月丙戌河東將李存貞敗邠寧軍於梨園北殺千餘人自是梨園閉壁不敢出貶右僕射崔昭緯為梧州司馬魏國夫人陳氏才色冠後宫上以賜李克用克用令李罕之李存信等急攻梨園城中食盡棄城走罕之等邀擊之所殺萬餘人克梨園等三寨獲王行瑜子知進及大將李元福等克用進屯梨園庚寅王行約王行實燒寧州遁去克用奏請以匡國節度使蘇文建為靜難節度使趣令赴鎮且理寧州招撫降人上遷居大內王行瑜以精甲五千守龍泉寨李克用攻之李茂貞以兵五千救之營於鎮西李罕之擊鳯翔兵走之十一月丁巳拔龍泉寨行瑜走入邠州遣使請降於克用李克用引兵逼邠州王行瑜登城號哭謂克用曰行瑜無罪迫脅乘輿皆李茂貞及李繼鵬所為請移兵問鳯翔行瑜願束身歸朝克用曰王尚父何恭之甚僕受詔討三賊臣公預其一束身歸朝非僕所得專也丁卯行瑜挈族棄城走克用入邠州封府庫撫居人命指揮使髙爽權巡撫軍城奏趣蘇文建赴鎮行瑜走至慶州境部下斬行瑜傳首李克用旋軍渭北加靜難節度使蘇文建同平章事十二月乙酉李克用軍于雲陽乙未進克用爵晉王加李罕之兼侍中以河東大將蓋寓領容管觀察使自餘克用將佐子孫並進官爵李克用遣掌書記李襲古入謝恩密言於上曰比年以來關輔不寧乘此勝勢遂取鳯翔一勞永逸時不可失臣屯軍渭北專俟進止上謀於貴近或曰茂貞復滅則沙陀大盛朝廷危矣上乃賜克用詔褒其忠款而言不臣之狀行瑜為甚自朕出幸以來茂貞韓建自知其罪不忘國恩職貢相繼且當休兵息民克用奉詔而止既而私於詔使曰觀朝廷之意似疑克用有異心也然不去茂貞關中無安寧之日又詔免克用入朝將佐或言今密邇闕廷豈可不入見天子克用猶豫未決蓋寓言於克用曰嚮者王行瑜輩縱兵狂悖致鑾輿播越百姓奔散今天子還未安席人心尚危大王若引兵度渭竊恐復驚駭都邑人臣盡忠在於勤王不在入覲願熟圖之克用笑曰蓋寓尚不欲吾入朝况天下之人乎乃表稱臣總帥大軍不敢徑入朝覲且懼部落士卒侵擾渭北居人辛亥引兵東歸表至京師上下始安詔賜河東士卒錢三十萬緍克用既去李茂貞驕橫如故河西州縣多為茂貞所據以其將胡敬璋為河西節度使三年夏五月戊子遣中使賜崔昭緯死行至荆南追及斬之中外咸以為快初李克用屯渭北李茂貞韓建憚之事朝廷禮甚恭克用去二鎮貢獻漸踈表章驕慢上自石門還於神䇿兩軍之外更置安聖捧宸保寧宣化等軍選補數萬人使諸王將之嗣延王戒丕嗣覃王嗣周又自募麾下數千人茂貞以為欲討己語多怨望嫌隙日御名太上茂貞亦勒兵揚言欲詣闕訟寃京師士民爭亡匿山谷上命通王滋及嗣周戒丕分將諸軍以衛近畿戒丕屯三橋茂貞遂表言延王無故稱兵討臣臣今勒兵入朝請罪上遽遣使告急於河東六月茂貞引兵逼京畿覃王與戰於婁館官軍敗績秋七月茂貞進逼京師延王戒丕曰今關中藩鎮無可依者不若自鄜州濟河幸太原臣請先往告之辛卯詔幸鄜州壬辰上出至渭北韓建遣其子從允表請幸華州上不許以建為京畿都指揮安撫制置及開通四面道路催促諸道綱運等使而建奉表相繼上及從官亦憚逺去癸巳至富平遣宣徽使元公訊召建面議去留甲午建詣富平見上頓首涕泣言方今藩臣跋扈者非止茂貞陛下若去宗廟園陵逺巡邊鄙臣恐車駕濟河無復還期今華州兵力雖微控帶關輔亦足自固臣積聚訓厲十五年矣西距長安不逺願陛下臨之以圖興復上乃從之乙未宿下邽丙申至華州以府署為行宫建視事於龍興寺茂貞遂入長安自中和以來所葺宫室市肆燔燒俱盡乙巳以中書侍郎同平章事崔胤同平章事充武安節度使上以胤崔昭緯之黨也故出之丙午以翰林學士承旨尚書左丞陸扆為户部侍郎同平章事扆陜人也宰相畏韓建不敢專決政事八月丙辰詔建關議朝政建上表固辭乃止韓建移檄諸道令共輸資糧詣行在李克用聞之歎曰去嵗從余言豈有今日之患又曰韓建天下癡物為賊臣弱帝室是不為李茂貞所擒則為朱全忠所虜耳因奏將與鄰道發兵入援上憤天下之亂思得竒傑之士不次用之國子博士朱朴自言得為宰相月餘可致太平上以為然乙丑以朴為左諫議大夫同平章事朴為人庸鄙迂僻無它長制出中外大驚丙寅加韓建兼中書令九月崔胤出鎮湖南韓建之志也胤密求援於朱全忠且教之營東都宫闕表迎車駕全忠與河南尹張全義表請上遷都洛陽全忠仍請以兵二萬迎車駕且言崔胤忠臣不宜出外韓建懼復奏召胤為相遣使諭全忠以且宜安靜全忠乃止乙未復以胤為中書侍郎同平章事以翰林學士承旨兵部侍郎崔逺同平章事逺珙弟璵之孫也丁酉貶中書侍郎同平章事陸扆為硤州刺史崔胤恨扆代已誣扆云黨於李茂貞而貶之己亥以朱朴兼户部凡軍旅財賦之事上一以委之以孫偓為鳯翔四面行營都統又以前定難節度使李思諌為靜難節度使兼副都統冬十月壬子加孫偓行營節度招討處置等使丁巳以韓建知京兆尹兼把截使戊午李茂貞上表請罪願得自新仍獻助修宫室錢韓建復佐佑之竟不出師四年春正月甲申韓建奏防城將張行思等告睦濟韶通彭韓儀陳八王謀殺臣劫車駕幸河中建惡諸王典兵故使行思等告之上大驚召建諭之建稱疾不入令諸王詣建自陳建表稱諸王忽詣臣理所不測事端臣詳酌事體不應與諸王相見又稱諸王當自避嫌疑不可輕為舉錯陛下若以友愛含容請依舊制令歸十六宅妙選師傅教以詩書不令典兵預政且曰乞散彼烏合之兵用光麟趾之化建慮上不從仍引麾下精兵圍行宫表疏連上上不得已是夕詔諸王所領軍士並縱歸田里諸王勒歸十六宅其甲兵並委韓建收掌建又奏陛下選賢任能足清禍亂何必别置殿後四軍顯有厚有薄之恩乖無偏無黨之道且所聚皆坊市無賴姦猾之徒平居猶思禍變臨難必不為用而使之張弓挾刃密邇皇輿臣竊寒心乞皆罷遣詔亦從之於是殿後四軍二萬餘人悉散天子之親軍盡矣捧日都頭李筠石門扈從功第一建復奏斬於大雲橋建又奏玄宗之末永王璘暫出江南遽謀不軌代宗時吐畨入冦光啓中朱玫亂常皆援立宗支以繫人望今諸王銜命四方者乞皆召還又奏諸方士出入禁庭眩惑聖聽宜皆禁止無得入宫詔悉從之建既幽諸王於别第知上意不悅乃奏請立德王為太子欲以解之丁亥詔立德王祐為皇太子仍改名裕己亥罷孫偓鳯翔四面行營節度等使以副都統李思諫為寧塞節度使二月乙亥門下侍郎同平章事孫偓罷守本官中書侍郎同平章事朱朴罷為祕書監朴既秉政所言皆不效外議沸騰太子詹事馬道殷以天文將作監許巖士以醫得幸於上韓建誣二人以罪而殺之且言偓朴與二人交通故罷相夏六月李茂貞表王建攻東川連兵纍嵗不聽詔命甲寅貶建南州刺史乙卯以茂貞為西川節度使以覃王嗣周為鳯翔節度使覃王赴鎮李茂貞不受代圍覃王於奉天秋七月韓建移書李茂貞茂貞解奉天之圍覃王歸華州八月上欲幸奉天親討李茂貞令宰相議之宰相切諌乃止延王戒丕還晉陽韓建奏自陛下即位以來與近輔交惡皆因諸王典兵凶徒樂禍致鑾輿不安比者臣奏罷兵權實慮不測之變今聞延王覃王尚苞隂計願陛下聖斷不疑制於未亂則社稷之福上曰何至於是數日不報建乃與知樞密劉季述矯制發兵圍十六宅諸王被髮或緣垣或登屋或升木呼曰宅家救兒建擁通儀睦濟韶彭韓陳覃延丹十一王至石隄谷盡殺之以謀反聞貶禮部尚書孫偓為南州司馬祕書監朱朴先貶夔州司馬再貶郴州司户九月以彰義節度使張璉為鳯翔西北行營招討使以討李茂貞復以王建為西川節度使同平章事削奪新西川節度使李茂貞官爵復姓名宋文通右拾遺張道古上疏稱國家有五危二亂昔漢文帝即位未幾明習國家事今陛下登極已十年而曾不知為君馭臣之道太宗內安中原外開四夷海表之國莫不入臣今先朝封域日蹙幾盡臣雖微賤竊傷陛下朝廷社稷始為姦臣所弄終為賊臣所有也上怒貶道古施州司户仍下詔罪狀道古宣示諫官道古青州人也光化元年春正月上下詔罪已息兵復李茂貞姓名官爵應諸道討鳯翔兵皆罷之李茂貞韓建皆致書於李克用言大駕出幸纍年乞修和好同奬王室兼乞丁匠助修宫室克用許之初王建攻東川顧彥暉求救於李茂貞茂貞命將出兵救之不暇東逼乘輿詐稱改過與韓建共翼戴天子又聞朱全忠營洛陽宫纍表迎車駕茂貞韓建懼請修復宫闕奉上歸長安詔以韓建為修宫闕使諸道皆助錢及工材建使都將蔡敬思督其役既成二月建自往視之復以李茂貞為鳯翔節度使秋八月庚戌改華州為興德府己未車駕發華州壬戌至長安甲子赦天下改元楊行密據淮南唐僖宗中和二年初淮南節度使髙駢好神仙有方士吕用之坐妖黨亡命歸駢駢厚待之補以軍職用之鄱陽茶商之子也久客廣陵熟其人情爐鼎之暇頗言公私利病駢益竒之稍加信任駢舊將梁纘陳珙馮綬董瑾俞公楚姚歸禮素為駢所厚用之欲専權浸以計去之駢遂奪纘兵族珙家綬瑾公楚歸禮咸見疏用之又引其黨張守一諸葛殷共蠱惑駢守一本滄景村民以術干駢無所遇貧困甚用之謂曰但與吾同心勿憂不富貴遂薦於駢駢寵待埒於用之殷始自鄱陽來用之先言於駢曰玉皇以公職事繁重輟左右尊神一人佐公為理公善遇之欲其久留亦可縻以人間重職明日殷謁見詭辨風生駢以為神補鹽鐵劇職駢嚴潔甥姪輩未嘗得接坐殷病風疽搔捫不替手膿血滿瓜駢獨與之同席促膝傳杯器而食左右以為言駢曰神仙以此試人耳駢有畜犬聞其腥穢多來近之駢怪之殷笑曰殷嘗於玉皇前見之别來數百年猶相識駢與鄭畋有隙用之謂駢曰宰相有遣劒客來刺公者今夕至矣駢大懼問計安出用之曰張先生嘗學斯術可以禦之駢請於守一守一許諾乃使駢衣婦人之服潛於它室而守一代居駢寢榻中夜擲銅器於階令鏗然有聲又密以囊盛彘血灑於庭宇如格鬭之狀及旦笑謂駢曰幾落奴手駢泣謝曰先生於駢乃更生之惠也厚酬以金寶有蕭勝者賂用之求鹽城監駢有難色用之曰用之非為勝也近得上仙書云有寶劒在鹽城井中須一靈官取之以勝上仙左右之人欲使取劒耳駢乃許之勝至監數月函一銅匕首以獻用之見稽首曰此北帝所佩得之則百里之內五兵不能犯駢乃飾以珠玉常置座隅用之自謂磻溪真君謂守一乃赤松子殷乃葛將軍勝乃秦穆公之壻也用之又刻青石為竒字云玉皇授白雲先生髙駢密令左右置道院香案駢得之驚喜用之曰王皇以公焚修功著將輔真官計鸞鶴不曰當降此際用之等謫限亦滿必得陪幢節同歸上清耳是後駢於道院庭中刻木鶴時著羽服跨之日夕齋醮鍊金燒丹費以巨萬計用之微時依止江陽后土廟舉動禱祈及得志白駢崇大其廟江南工材之選每軍旅大事以少牢禱之用之又言神仙好樓居説駢作迎仙樓費十五萬緍又作延和閣髙八丈用之每對駢呵叱風雨仰揖空際云有神仙過雲表駢輒隨而拜之然常厚賂駢左右使伺駢動靜共為欺罔駢不之寤左右小有異議者輒為用之陷死不旋踵但潛撫膺鳴指口不敢言駢倚用之如左右手公私大小之事皆決於用之退賢進不肖淫刑濫賞駢之政事於是大壞矣用之知上下怨憤恐有竊發請置巡察使駢即以用之領之募險獪者百餘人縱橫閭巷間謂之察子民間呵妻詈子靡不知之用之欲奪人資財掠人婦女輒誣以叛逆榜掠取服殺其人而取之所破滅者數百家道路以目將吏士民雖家居皆重足屏氣用之又欲以兵威脅制諸將請選募諸軍驍勇之士二萬人號左右莫邪都駢即以張守一及用之為左右莫邪軍使署置將吏如帥府器械精利衣裝華潔每出入導從近千人用之侍妾百餘人自奉奢靡用度不足輒留三司綱輸其家用之猶慮人泄其姦謀乃言於駢曰神仙不難致但恨學道者不能絶俗纍故不肯降臨耳駢乃悉去姬妾謝絶人事賔客將吏皆不得見有不得已見之者皆先令沐浴齋祓然後見拜起才畢已復引出由是用之得專行威福無所忌憚境內不復知有駢矣三年春三月以淮南押牙合肥楊行愍為廬州刺史行愍本廬州牙將勇敢屢有戰功都將忌之白刺史郎幼復連使出戍於外行愍過辭都將以甘言悅之問其所須行愍曰正須汝頭耳遂起斬之并將諸營自稱入營都知兵馬使幼復不能制薦於髙駢請以自代駢以行愍為淮南押牙知廬州事朝廷因而命之初吕用之因左驍雄軍使俞公楚得見髙駢用之橫甚或以咎公楚公楚數戒用之少自斂無相纍用之銜之右驍雄軍使姚歸禮氣直敢言尤疾用之所為時面數其罪常欲手刃之癸未夜用之與其黨會倡家歸禮潛使人爇其室殺貌類者數人用之易服得免明旦窮治其事獲縱火者皆驍雄之卒用之於是日夜譛二將於駢未幾駢使二將將驍雄卒三千襲賊於慎縣用之密以語行愍云公楚歸禮欲襲廬州行愍發兵掩之二將不為備舉軍盡殪以二將謀亂告駢駢不知用之謀厚賞行愍四年春三月髙駢從子左驍衛大將軍澞疏吕用之罪狀二十餘幅密以呈駢且泣曰用之內則假神仙之説蠱惑尊聽外則盜節制之權殘賊百姓將佐懼死莫之敢言嵗月浸深羽翼將成茍不除之恐髙氏奕代勳庸一朝掃地矣因嗚咽不自勝駢曰汝醉邪命扶出明日以澞狀示用之用之曰四十郎嘗以空乏見告未獲遵命故有此憾因出澞手書數幅呈之駢甚慙遂禁澞出入後月餘以澞知舒州事羣盜陳儒攻舒州澞求救於廬州楊行愍力不能救謀於其將李神福神福請不用寸刃而逐之乃多齎旗幟間道入舒州頃之引舒州兵建廬州旗幟而出指畫地形若布大陳狀賊懼宵遁神福洺州人也久之羣盜吳迥李本復攻舒州澞不能守棄城走駢使人就殺之楊行愍遣其將合肥陶雅清流張訓等將兵擊吳迥李本擒斬之以雅攝舒州刺史秦宗權遣其弟將兵冦廬州據舒城楊行愍遣其將合肥田頵擊走之光啓二年夏四月壬子朱玫奉襄王煴權監軍國事承制封拜五月以和州刺史吕用之為嶺南東道節度使用之建牙開幕一與駢同凡駢之腹心及將校能任事者皆逼以從己諸所施為不復咨稟駢頗疑之隂欲奪其權而根蒂已固無如之何用之知之甚懼訪於其黨前度支巡官鄭杞前知廬州事董瑾杞曰此固為晚矣用之問䇿安出杞曰曹孟德有言寧我負人無人負我明日與瑾共為書一緘授用之其語祕人莫有知者冬十二月夀州刺史張翺遣其將魏虔將萬人冦廬州廬州刺史楊行愍遣其將田頵李神福張訓拒之敗虔于禇城滁州刺史許勍襲舒州刺史陶雅奔廬州髙駢命行愍更名行密三年夏四月髙駢聞秦宗權將冦淮南遣左廂都知兵馬使畢師鐸將百騎屯髙郵時吕用之用事宿將多為所誅師鐸自以黃巢降將常自危師鐸有美妾用之欲見之師鐸不許用之因師鐸出竊往見之師鐸慙怒出其妾由是有隙師鐸將如髙郵用之待之加厚師鐸益疑懼謂禍在旦夕師鐸子娶髙郵鎮遏使張神劒女師鐸密與之謀神劒以為無是事神劒名雄人以其善用劒故謂之神劒時府中藉藉亦以為師鐸且受誅其母使人語之曰設有是事汝自努力前去勿以老母弱子為纍師鐸疑未決會駢子四十三郎者素惡用之欲使師鐸帥外鎮將吏共疏用之罪惡聞於其父密使人紿之曰用之比來頻啓令公欲因此相圖已有委曲在張尚書所宜備之師鐸問神劒曰昨夜使司有文書翁胡不言神劒不寤曰無之師鐸內不自安歸營謀於腹心皆勸師鐸起兵誅用之師鐸曰用之數年以來人怨鬼怒安知天不假手於我誅之邪淮寧軍使鄭漢章我鄉人昔歸順時副將也素切齒於用之聞吾謀必喜乃夜與百騎潛詣漢章漢章大喜悉發鎮兵及驅居民合千餘人從師鐸至髙郵師鐸詰張神劒以所得委曲神劒驚曰無有師鐸聲色浸厲神劒奮曰公何見事之暗用之姦惡天地所不容况近者重賂權貴得嶺南節度復不行或云謀竊據此土使其得志吾輩豈能握刀頭事此妖物邪要冎此數賊以謝淮海何必多言漢章喜遽命取酒割臂血瀝酒共飲之乙巳衆推師鐸為行營使為文告天地移書淮南境內言誅用之及張守一諸葛殷之意以漢章為行營副使神劒為都指揮使神劒以師鐸成敗未可知請以所部留髙郵曰一則為公聲援二則供給糧餉師鐸不悅漢章曰張尚書謀亦善苟終始同心事捷之日子女玉帛相與共之今日豈可復相違師鐸乃許之戊申師鐸漢章發髙郵庚戌詗騎以白髙駢吕用之匿之畢師鐸兵奄至廣陵城下城中驚擾壬子吕用之引麾下徑兵誘以重賞出城力戰師鐸兵少却用之始得斷橋塞門為守備是曰駢登延和閣聞喧噪聲左右以師鐸之變告駢驚急召用之詰之用之徐對曰師鐸之衆思歸為門衛所遏適已隨宜區處計尋退散儻或不已正煩玄女一力士耳願令公勿憂駢曰近者覺君之妄多矣君善為之勿使吾為周侍中言畢慘沮久之用之慙懅而退師鐸退屯山光寺以廣陵城堅兵多甚有悔色癸丑遣其屬孫約與其子詣宣州乞師於觀察使秦彥且許以克城之日迎彥為帥會師鐸館客畢慕顔自城中逃出言衆心離散用之憂窘若堅守之不日當潰師鐸乃悅是日未明駢召用之問以事本末用之始以實對駢曰吾不欲復出兵相攻君可選一溫信大將以我手札諭之若其未從當别處分用之退念諸將皆仇敵往必不利於已甲寅遣其所部討擊副使許戡齎駢之委曲及用之誓狀并酒殽出勞師鐸師鐸始亦望駢舊將勞問得以具陳用之姦惡披泄積憤見戡至大罵曰梁纘韓問何在乃使此穢物來戡未及發言已牽出斬之乙卯師鐸射書入城用之不發即焚之丁巳用之以甲士百人入見駢於延和閣下駢大驚匿于寢室久而後出曰節度使所居無故以兵入欲反邪命左右驅出用之大懼出子城南門舉䇿指之曰吾不可復入此自是髙吕始判矣是夜駢召其從子前左金吾衛將軍傑密議軍事戊午署傑都牢城使泣而勉之以親信五百人給之用之命諸將大索城中丁壯無問朝士書生悉以白刃驅縛登城令分立城上自旦至暮不得休息又恐其與外冦通數易其地家人餉之莫知所在由是城中人亦恨師鐸入城之晚也駢遣大將石鍔以師鐸幼子及其母書并駢委曲至楊子諭師鐸師鐸遽遣其子還曰令公但斬吕張以示師鐸師鐸不敢負恩願以妻子為質駢恐用之屠其家收師鐸母妻子置使院辛酉秦彥遣其將秦稠將兵三千至楊子助師鐸壬戌宣州軍攻南門不克癸亥又攻羅城東南隅城幾陷者數四甲子羅城西南隅守者焚戰格以應師鐸師鐸入城以內其衆用之帥其衆千人力戰于三橋北師鐸垂敗會髙傑以牢城兵自子城出欲擒用之以授師鐸用之乃開參佐門北走駢召梁纘以昭義軍百餘人保子城乙丑師鐸縱兵大掠駢不得已命徹備與師鐸相見於延和閣下交拜如賔主之儀署師鐸節度副使行軍司馬仍承制加左僕射鄭漢章等各遷官有差左莫邪都虞候申及本徐州健將入見駢説之曰師鐸逆黨不多諸門尚未有守者請令公及此選元從三十人夜自教埸門出比師鐸覺之追不及矣然後發諸鎮兵還取府城此轉禍為福也若一二日事定浸恐艱難及亦不得在左右矣言之且泣駢猶豫不聽及恐語泄遂竄匿會張雄至東塘及往歸之丙寅師鐸果分兵守諸門搜捕用之親黨悉誅之師鐸入居使院秦稠以宣軍千人分守使宅及諸倉庫丙寅駢牒請解所任以師鐸兼判府事師鐸遣孫約至宣城趣秦彥過江或説師鐸曰僕射嚮者舉兵蓋以用之輩姦邪暴橫髙令公坐自聾瞽不能區理故順衆心為一方去害今用之既敗軍府廓然僕射宜復奉髙公而佐之但總其兵權以號令誰敢不服用之乃淮南一叛將耳移書所在立可梟擒如此則外有推奉之名內得兼并之實雖朝廷聞之亦無虧臣節使髙公聰明必知內愧如其不悛乃機上肉耳奈何以此功業付之它人豈惟受制於人終恐自相魚肉前日秦稠先守倉庫其相疑已可見且秦司空為節度使廬州夀州其肯為之下乎僕見戰攻之端未有窮已豈惟淮南之人肝腦塗地竊恐僕射功名成敗未可知也不若及今亟止秦司空勿使過江彼若粗識安危必未敢輕進就使它日責我以負約猶不失為髙氏忠臣也師鐸大以為不然明日以告鄭漢章漢章曰此智士也散求之其人畏禍竟不復出戊辰駢遷家出居南第師鐸以甲士百人為衛其實囚之也是日宣軍以所求未獲焚進奉兩樓數十間寶貨悉為煨燼己巳師鐸於府廳視事凡官吏非有兵權者皆如故復遷駢於東第自城陷諸軍大掠晝夜不已至是師鐸始以先鋒使唐宏為靜街使禁止之駢先為鹽鐵使積年不貢奉貨財在揚州者填委如山駢作郊天御樓六軍立仗儀服及大殿元會內署行幸供張器用皆刻鏤金玉蟠龍蹙鳯數十萬事悉為亂兵所掠歸于閭閻張陳寢處其中庚午獲諸葛殷杖殺之棄尸道旁怨家抉其目斷其舌衆以瓦石投之須臾成冡吕用之之敗也其黨鄭杞首歸師鐸師鐸署杞知海陵監事杞至海陵隂記髙霸得失聞於師鐸霸獲其書杖杞背斷手足刳目截舌然後斬之辛未髙駢密以金遺守者畢師鐸聞之壬午復迎駢入道院收髙氏子弟甥姪十餘人同幽之畢師鐸之攻廣陵也吕用之詐為髙駢牒署廬州刺史楊行密行軍司馬追兵入援廬江人袁襲説行密曰髙公昏惑用之姦邪師鐸悖逆凶德參會而求兵於我此天以淮南授明公也趣赴之行密乃悉發廬州兵復借兵於和州刺史孫端合數千人赴之五月至天長鄭漢章之從師鐸也留其妻守淮口用之帥衆攻之旬日不克漢章引兵救之用之聞行密至天長引兵歸之張神劒求貨於畢師鐸師鐸報以俟秦司空之命神劒怒亦以其衆歸楊行密及海陵鎮遏使髙霸曲溪人劉金盱眙人賈令威悉以其衆屬焉行密衆至萬七千人張神劒運髙郵糧以給之甲午秦彥將宣歙兵三萬餘人乘竹筏沿江而下趙暉邀擊於上元殺溺殆半丙申彥入廣陵自稱權知淮南節度事仍以畢師鐸為行軍司馬補池州刺史趙鍠為宣歙觀察使戊戌楊行密帥諸軍抵廣陵城下為八寨以守之秦彥閉城自守六月戊午秦彥遣畢師鐸秦稠將兵八千出城西擊楊行密稠敗死士卒死者什七八城中乏食樵採路絶宣州軍始食人秋八月秦彥以前蘇州刺史張雄兵強冀得其用以僕射告身授雄以尚書告身三通授禆將馮弘鐸等廣陵人競以金玉珠繒詣雄軍貿食通犀帶一得米五升錦衾一得粳五升雄軍既富不復肯戰未幾復助楊行密丁卯彥悉出城中兵萬二千人遣畢師鐸鄭漢章將之陳於城西延袤數里軍勢甚盛行密安卧帳中曰賊近告我牙將李宗禮曰衆寡不敵宜堅壁自守徐圖還師李濤怒曰吾以順討逆何論衆寡大軍至此去將安歸濤願將所部為前鋒保為公破之濤趙州人也行密乃積金帛牟米於一寨使羸弱守之多伏精兵於其旁自將千餘人衝其陳兵始交行密陽不勝而走廣陵兵追之入空寨爭取金帛牟米伏兵四起廣陵衆亂行密縱兵擊之俘斬殆盡積尸十里溝瀆皆滿師鐸漢章單騎僅免自是秦彥不復言出師矣九月髙駢在道院秦彥供給甚薄左右無食至然木像煮革帶食之有相啖者彥與畢師鐸出師屢敗疑駢為厭勝外圍益急恐駢黨有為內應者有妖尼王奉仙言於彥曰揚州分野極災必有一大人死自此喜矣甲戌命其將劉匡時殺駢并子弟甥姪無少長皆死同坎瘞之乙亥楊行密聞之帥士卒縞素向城大哭三日冬十月秦彥遣鄭漢章將步騎五千出擊張神劒髙霸寨破之神劒奔髙郵霸奔海陵楊行密圍廣陵且半年秦彥畢師鐸大小數十戰多不利城中無食米斗直錢五十緍草根木實皆盡以堇泥為餅食之餓死者太半宣軍掠人詣肆賣之驅縛屠割如羊豕訖無一聲積骸流血滿於坊市彥師鐸無如之何嚬蹙而已外圍益急彥師鐸憂悶殆無生意相對抱膝終日悄然行密亦以城久不下欲引還己巳夜大風雨吕用之部將張審威帥麾下士三百晨伏於西壕俟守者易代潛登城啓關納其衆守者皆不鬭而潰先是彥師鐸信重尼奉仙雖戰陳日時賞罰輕重皆取決焉至是復咨於奉仙曰何以取濟奉仙曰走為上䇿乃自開化門出奔東塘行密帥諸軍合萬五千人入城以梁纘不盡節於髙氏為秦畢用斬於戟門之外韓問聞之赴井死以髙駢從孫愈攝副使使改殯駢及其族城中遺民才數百家飢羸非復人狀行密輦西寨米以賑之行密自稱淮南留後秦宗權遣其弟宗衡將兵萬人度淮與楊行密爭揚州以孫儒為副張佶劉建鋒馬殷及宗權族弟彥暉皆從十一月辛未抵廣陵城西據行密故寨行密輜重之未入城者為蔡人所得秦彥畢師鐸至東塘張雄不納將度江趣宣州宗衡召之乃引兵還與宗衡合未幾宗權召宗衡還蔡拒朱全忠孫儒知宗權勢不能久稱疾不行宗衡屢促之儒怒甲戌與宗衡飲酒座中手刃之傳首於全忠宗衡將安仁義降於行密仁義本沙陀將也行密悉以騎兵委之列於田頵之上儒分兵掠鄰州未幾衆至數萬以城下乏食與彥師鐸襲髙郵辛巳髙郵鎮遏使張神劒帥麾下二百人逃歸揚州丙戌孫儒屠髙郵戊子髙郵殘兵七百人潰圍而至楊行密慮其為變分隸諸將一夕盡坑之明日殺神劒於其第楊行密恐孫儒乘勝取海陵壬寅命鎮遏使髙霸帥其兵民悉歸府城曰有違命者族之於是數萬户棄資産焚廬舍挈老幼遷于廣陵戊戌霸與弟暀部將余繞山前常州刺史丁從實至廣陵行密出郭迎之與霸暀約為兄弟置其將卒於法雲寺朝廷以淮南久亂閏月以朱全忠兼淮南節度使東南面招討使楊行密欲遣髙霸屯天長以拒孫儒袁襲曰霸髙氏舊將常俠兩端我勝則來不勝則叛今處之天長是自絶其歸路也不如殺之己酉行密伏甲執霸及丁從實余繞山皆殺之又遣千騎掩殺其黨於法雲寺死者數千人是日大雪寺外數坊地皆赤髙暀出走明日獲而殺之吕用之之在天長也紿楊行密曰用之有銀五萬鋌埋於所居克城之日願備麾下一醉之資庚戌行密閲士卒顧用之曰僕射許此曹銀何食言邪因牽下械繫命田頵鞫之云與鄭杞董瑾謀因中元夜邀髙駢至其第建黃籙齋乘其入靜縊殺之聲言上升因令莫邪都帥諸軍推用之為節度使是日腰斬用之怨家刳裂立盡并誅其族黨軍士發其中堂得桐人書駢姓名於胸桎梏而釘之袁襲言於行密曰廣陵飢弊已甚蔡賊復來民必重困不如避之甲寅行密遣和州將延陵宗以其衆二千人歸和州乙卯又命指揮使蔡儔將兵千人輜重數千兩歸于廬州朱全忠遣內容將張廷範致朝命於楊行密以行密為淮南節度副使又以宣武行軍司馬李璠為淮南留後遣牙將郭言將兵千人送之文德元年春正月甲寅孫儒殺秦彥畢師鐸鄭漢章彥等之歸秦宗衡也其衆猶二千餘人其後稍稍為儒所奪禆將唐宏知其必及禍恐并死乃誣告彥等潛召汴軍儒殺彥等以宏為馬軍使張守一與吕用之同歸楊行密復為諸將合仙丹又欲千軍府之政行密怒而殺之張廷範至廣陵楊行密厚禮之及聞李璠來為留後怒有不受之色廷範密使人白全忠宜自以大軍赴鎮全忠從之至宋州廷範自廣陵逃來曰行密未可圖也甲子李璠至言徐軍遮道全忠乃止二月朱全忠奏以楊行密為淮南留後夏四月壬午孫儒襲揚州克之楊行密出走儒自稱淮南節度使行密將奔海陵袁襲勸歸廬州再為進取之計從之秋八月楊行密畏孫儒之逼欲輕兵襲洪州袁襲曰鍾傳定江西已久兵強食足未易圖也趙鍠新得宣州怙亂殘暴衆心不附公宜卑辭厚幣説和州孫端上元張雄使自採石濟江侵其境彼必來逆戰公自銅官濟江會之破鍠必矣行密從之使蔡儔守廬州帥諸將濟自糝潭孫端張雄為趙鍠所敗鍠將蘇塘漆朗將兵二萬屯曷山袁襲曰公引兵急趨曷山堅壁自守彼求戰不得謂我畏怯因其怠可破也行密從之塘等大敗遂圍宣州鍠兄乾之自池州帥衆救宣州行密使其將陶雅擊乾之于九華破之乾之奔江西以雅為池州制置使昭宗龍紀元年夏五月甲辰潤州制置使阮結卒錢鏐以靜江都將成及代之六月楊行密圍宣州城中食盡人相啖指揮使周進思據城逐趙鍠鍠將奔廣陵田頵追擒之未幾城中執進思以降行密入宣州諸將爭取金帛徐溫獨據米囷為粥以食餓者溫朐山人也鍠將宿松周本勇冠軍中行密獲而釋之以為裨將鍠既敗左右皆散惟李德誠從鍠不去行密以宗女妻之德誠西華人也行密表言於朝詔以行密為宣歙觀察使朱全忠與趙鍠有舊遣使求之行密謀於袁襲襲曰不若斬首以遺之行密從之未幾襲卒行密哭之曰天不欲成吾大功邪何為折吾股肱也吾好寬而襲每勸我以殺此其所以不夀與孫儒遣兵攻廬州蔡儔以州降之冬十月以給事中杜儒休為蘇州刺史錢鏐不悅以知州事沈粲為制置指揮使楊行密遣馬步都虞候田頵等攻常州十一月田頵攻常州為地道入城中宵旌旗甲兵出於制置使社稜之寢室遂虜之以兵三萬戍常州十二月戊寅孫儒自廣陵引兵度江壬午逐田頵取常州以劉建鋒守之儒還廣陵建鋒又逐成及取潤州大順元年春正月汴將龐師古等衆號十萬度淮聲言救行密攻下天長壬子下髙郵二月龐師古引兵深入淮南己巳與孫儒戰於陵亭師古兵敗而還楊行密遣其將馬敬言將兵五千乘虛襲據潤州李友將兵二萬屯青城將攻常州安仁義劉威田頵敗劉建鋒於武進敬言仁義頵屯潤州友合肥人威慎縣人也三月賜宣歙軍號寧國以楊行密為節度使夏六月孫儒求好於朱全忠全忠表為淮南節度使未幾全忠殺其使者復為仇敵秋八月丙寅孫儒攻潤州蘇州刺史杜儒休到官錢鏐使沈粲害之會楊行密將李友拔蘇州粲奔孫儒九月楊行密以其將張行周為常州制置使閏月孫儒遣劉建鋒攻拔常州殺行周遂圍蘇州冬十二月己丑孫儒拔蘇州殺李友安仁義等聞之焚潤州廬舍夜遁儒使沈粲守蘇州又遣其將歸傳道守潤州二年春正月孫儒盡舉淮蔡之兵濟江癸酉自潤州轉戰而南田頵安仁義屢敗退楊行密城戍皆望風奔潰儒將李從立奄至宣州東溪行密守備尚未固衆心危懼夜使其將合肥臺濛將五百人屯溪西濛使士卒傳呼往返數四從立以為大衆繼至遽引去儒前軍至溧水行密使都指揮使李神福拒之神福陽退以示怯儒軍不設備神福夜帥精兵襲之俘斬千人夏四月楊行密遣其將劉威朱延夀將兵三萬擊孫儒于黃池威等大敗延夀舒城人也孫儒軍于黃池五月大水諸營皆沒乃還揚州使其將康暀據和州安景思據滁州楊行密遣其將李神福攻和滁康暀降安景思走秋七月朱全忠遣使與楊行密約共攻孫儒儒恃其兵強欲先滅行密後敵全忠移牒藩鎮數行密全忠之罪且曰俟平宣汴當引兵入朝除君側之惡於是悉焚揚州廬舍盡驅丁壯及婦女度江殺老弱以充食行密將張訓李德誠潛入揚州滅餘火得榖數十萬斛以賑飢民泗州刺史張諫貸數萬斛以給軍訓以行密之命饋之諫由是德行密乙未孫儒自蘇州出屯廣德楊行密引兵拒之儒圍其寨行密將上蔡李簡帥百餘人力戰破寨拔行密出之冬十二月孫儒焚掠蘇常引兵逼宣州錢鏐復遣兵據蘇州儒屢破楊行密之兵旌旗輜重亘百餘里行密求救於錢鏐鏐以兵食助之景福元年春正月楊行密謂諸將曰孫儒之衆十倍於我吾戰數不利欲退保銅官如何劉威李神福曰儒掃地逺來利在速戰宜屯據險要堅壁清野以老其師時出輕騎抄其饋餉奪其俘掠彼前不得戰退無資糧可坐擒也戴友規曰儒與我相持數年勝負略相當今悉衆致死於我我若望風棄城正墮其計淮南士民從公度江及自儒軍來降者甚衆公宜遣將先護送歸淮南使復生業儒軍聞淮南安堵皆有思歸之心人心既搖安得不敗行密悅從之友規廬州人也二月孫儒圍宣州初劉建鋒為孫儒守常州將兵從儒擊楊行密甘露鎮使陳可言帥部兵千人據常州行密將張訓引兵奄至城下可言倉猝出迎訓手刃殺之遂取常州行密别將又取潤州夏五月楊行密屢敗孫儒兵破其廣德營張訓屯安吉斷其糧道儒食盡士卒大疫遣其將劉建鋒馬殷分兵掠諸縣六月行密聞儒疾瘧戊寅縱兵擊之會大雨晦冥儒軍大敗安仁義破儒五十餘寨田頵擒儒於陳斬之傳首京師儒衆多降於行密丁酉楊行密帥衆歸揚州秋七月丙辰至廣陵表田頵守宣州安仁義守潤州先是揚州富庶甲天下時人稱揚一益二及經秦畢孫楊兵火之餘江淮之間東西千里掃地盡矣秋八月以楊行密為淮南節度使同平章事以田頵知宣州留後安仁義為潤州刺史孫儒降兵多蔡人行密選其尤勇健者五千人厚其廪賜以皂衣蒙甲號黑雲都每戰使之先登陷陳四鄰畏之行密以用度不足欲以茶鹽易民布帛掌書記舒城髙勗曰兵火之餘十室九空又漁利以困之將復離叛不若悉我所有易鄰道所無足以給軍選賢守令勸課農桑數年之間倉庫自實行密從之田頵聞之曰賢者之言其利遠哉行密馳射武伎皆非所長而寬簡有智略善撫御將士與同甘苦推心待物無所猜忌嘗早出從者斷馬鞦取其金行密知而不問它日復早出如故人服其度量淮南被兵六年士民轉徙幾盡行密初至賜與將吏帛不過數尺錢不過數百而能以勤儉足用非公宴未嘗舉樂招撫流散輕徭薄斂未及數年公私富庶幾復承平之舊冬十一月廬州刺史蔡儔發楊行密父祖墓與舒州刺史倪章連兵遣使送印於朱全忠以求救全忠惡其反覆納其印不救且牒報行密行密謝之行密遣行營都指揮使李神福將兵討儔二年夏四月李神福圍廬州甲午楊行密自將詣廬州田頵自宣州引兵會之秋七月丁亥楊行密克廬州斬蔡儔左右請發儔父母冡行密曰儔以此得罪吾何為效之八月丙辰楊行密遣田頵將宣州兵二萬攻歙州歙州刺史裴樞城守久不下時諸將為刺史者多貪暴獨池州團練使陶雅寬厚得民歙人曰得陶雅為刺史請聽命行密即以雅為歙州刺史歙人納之雅盡禮見樞送之還朝樞遵慶之曽孫也冬十月舒州刺史倪章棄城走楊行密以李神福為舒州刺史乾寧元年春三月黃州刺史吳討舉州降楊行密夏五月武昌節度使杜洪攻黃州楊行密遣行營都指揮使朱延夀等救之冬十二月吳討畏杜洪之逼納印請代于楊行密行密以先鋒指揮使瞿章權知黃州二年春二月楊行密表朱全忠罪惡請會易定兖鄆河東兵討之三月楊行密浮淮至泗州防禦使臺濛盛飾供帳行密不悅既行濛於卧內得補綻衣馳使歸之行密笑曰吾少貧賤不敢忘本濛甚慙行密攻濠州拔之執刺史張璲丁亥行密圍夀州夏四月楊行密圍夀州不克將還庚寅其將朱延夀請試往更攻一鼓拔之執刺史江從勗行密以延夀權知夀州團練使未幾汴兵數萬攻夀州州兵少吏民忷懼延夀制軍中每旗二十五騎命黑雲隊長李厚將十旗擊汴兵不勝延夀將斬之厚稱衆寡不敵願益兵更往不勝則死都押牙汝陽柴再用亦為之請乃益以五旗厚殊死戰再用助之延夀悉衆乘之汴兵敗走厚蔡州人也行密又遣兵襲漣水拔之三年夏五月淮南將朱延夀奄至蘄州圍其城大將賈公鐸方獵不得還伏兵林中命勇士二人衣羊皮夜入延夀所掠羊羣潛入城約夜半開門舉火為應復衣皮返命公鐸如期引兵至城南門中火舉力戰突圍而入延夀驚曰吾常恐其潰圍而出反潰圍而入如此城安可猝拔乃白行密求軍中與公鐸有舊者持誓書金帛往説之許以昏夀州團練副使柴再用請行臨城與語為陳利害數日公鐸及刺史馬敬章請降以敬章為左都押牙公鐸為右監門衛將軍延夀進拔光州殺刺史劉存四年春二月詔以楊行密為江南諸道行營都統以討武昌節度使杜洪夏四月杜洪為楊行密所攻求救於朱全忠全忠遣其將聶金掠泗州朱友恭攻黃州行密遣右黑雲都指揮使馬珣等救黃州黃州刺史瞿章聞友恭至棄城擁衆南保武昌寨五月辛巳朱友恭為浮梁於樊港進攻武昌寨壬午拔之執瞿章遂取黃州馬珣等皆敗走朱全忠既得兖鄆甲兵益盛秋九月乃大舉擊楊行密遣龐師古以徐宿宋滑之兵七萬壁清口將趣揚州葛從周以兖鄆曹濮之兵壁安豐將趣夀州全忠自將屯宿州淮南震恐楊行密與朱瑾將兵三萬拒汴軍於楚州别將張訓自漣水引兵會之行密以為前鋒龐師古營於清口或曰營地汙下不可久處不聽師古恃衆輕敵居常奕碁朱瑾壅淮上流欲灌之或以告師古師古以為惑衆斬之十一月癸酉瑾與淮南將侯瓉將五千騎潛度淮用汴人旗幟自北來趣其中軍張訓踰柵而入士卒蒼黃拒戰淮水大至汴軍駭亂行密引大軍濟淮與瑾等夾攻之汴軍大敗斬師古及將士首萬餘級餘衆皆潰葛從周屯於夀州西北夀州團練使朱延夀擊破之退屯濠州聞師古敗奔還行密瑾延夀乘勝追之及於渒水從周半濟淮南兵擊之殺溺殆盡從周走免遏後都指揮使牛存節棄馬步鬭諸軍稍得濟淮凡四日不食會大雪汴卒緣道凍餒死還者不滿千人全忠聞敗亦奔還行密遺全忠書曰龐師古葛從周非敵也公宜自來淮上決戰行密大會諸將謂行軍副使李承嗣曰始吾欲先趣夀州副使云不如先向清口師古敗從周自走今果如所料賞之錢萬緍表承嗣領鎮海節度使行密待承嗣及史儼甚厚第舍姬妾咸選其尤者賜之故二人為行密盡力屢立功竟卒於淮南行密由是遂保據江淮之間全忠不能與之爭光化元年春正月兩浙江西武昌淄青各遣使詣闕請以朱全忠為都統討楊行密詔不許二年春正月楊行密與朱瑾將兵數萬攻徐州軍于吕梁朱全忠遣騎將張歸厚救之朱全忠自將救徐州楊行密聞之引兵去汴人追及之於下邳殺千餘人全忠行至輝州淮南兵已退乃還三年加楊行密兼侍中天復二年春三月上以左金吾將軍李儼為江淮宣諭使書御衣賜楊行密拜行密東面行營都統中書令吳王以討朱全忠以朱瑾為平盧節度使馮弘鐸為武寧節度使朱延夀為奉國節度使加武安節度使馬殷同平章事淮南宣歙湖南等道立功將士聽用都統牒承制遷補然後表聞儼張濬之子也賜姓李武寧節度使馮弘鐸介居宣揚之間常不自安然恃樓船之強不事兩道寧國節度使田頵欲圖之募弘鐸人造戰艦工人曰馮公逺求望木故其船堪久用今此無之頵曰第為之吾止須一用耳弘鐸將馮暉顔建説弘鐸先擊頵弘鐸從之帥衆南上聲言攻洪州實襲宣州也揚行密使人止之不從六月辛巳頵帥舟師逆擊于葛山大破之馮弘鐸收餘衆沿江將入海楊行密恐其為後患遣使犒軍且説之曰公徒衆猶盛胡為自棄於滄海之外吾府雖小足以容公之衆使將吏各得其所如何弘鐸左右皆慟哭聽命弘鐸至東塘行密自乘輕舟迎之從者十餘人常服不持兵升弘鐸舟慰諭之舉軍感悅署弘鐸淮南節度副使館給甚厚初弘鐸遣牙將丹徒尚公乃詣行密求潤州行密不許公乃大言曰公不見聽但恐不敵樓船耳至是行密謂公乃曰頗記求潤州時否公乃謝曰將吏各為其主但恨無成耳行密笑曰爾事楊叟如馮公無憂矣行密以李神福為升州刺史楊行密發兵討朱全忠以副使李承嗣權知淮南軍府事軍吏欲以巨艦運糧都知兵馬使徐溫曰運路久不行葭葦堙塞請用小艇庶幾易通軍至宿州會久雨重載不能進士有飢色而小艇先至行密由是竒溫始與議軍事行密攻宿州久不克竟以糧運不繼引還冬十月李儼至揚州楊行密始建制敕院每有封拜輒以告儼於紫極宫玄宗像前陳制書再拜然後下三年春正月楊行密承制加朱瑾東面諸道行營副都統同平章事以升州刺史李神福為淮南行軍司馬鄂嶽行營招討使舒州團練使劉存副之將兵擊杜洪洪將駱殷戍永興棄城走縣民方詔據城降神福曰永興大縣饋運所仰已得鄂之半矣三月淮南將李神福圍鄂州望城中積荻謂監軍尹建峯曰今夕為公焚之建峯未之信時杜洪求救於朱全忠神福遣部將秦臯乘輕舟至灄口舉火炬於樹抄洪以為救兵至果焚荻以應之夏四月杜洪求救於朱全忠全忠遣其將韓勍將萬人屯灄口遣使語荆南節度使成汭武安節度使馬殷武貞節度使雷彥威令出兵救洪汭畏全忠之強且欲侵淮之地以自廣發舟師十萬沿江東下汭作巨艦三年而成制度如府署謂之和州載其餘謂之齊山截海劈浪之類甚衆掌書記李珽諫曰今每艦載甲士千人稻米倍之緩急不可動也吳兵剽輕難與角逐武陵長沙皆吾讎也豈得不為反顧之慮乎不若遣驍將屯巴陵大軍與之對岸堅壁勿戰不過一月吳兵食盡自遁鄂圍解矣汭不聽珽憕之五世孫也五月成汭行未至鄂州馬殷遣大將許德勳將舟師萬餘人雷彥威遣其將歐陽思將舟師三千餘人會於荆江口乘虛襲江陵庚戌陷之盡掠其人及貨財而去將士亡其家皆無鬬志李神福聞其將至自乘輕舟前覘之謂諸將曰彼戰艦雖多而不相屬易制也當急擊之壬子神福遣其將秦裴楊戎將衆數千逆擊汭於君山大破之因風縱火焚其艦士卒皆潰汭赴水死獲其戰艦二百艘韓勍聞之亦引兵去初寧國節度使田頵破馮弘鐸詣廣陵謝楊行密因求池歙為巡屬行密不許行密左右下及獄吏皆求賂於頵頵怒曰吏知吾將下獄邪及還指廣陵南門曰吾不可復入此矣頵兵強財富好攻取行密既定淮南欲保境息民每抑止之頵不從及解釋錢鏐頵尤恨之隂有叛志李神福言於行密曰頵必反宜早圖之行密曰頵有大功反狀未露今殺之諸將人人自危矣頵有良將曰康儒與頵謀議多不合行密知之擢儒為廬州刺史頵以儒為二於已族之儒曰吾死田公亡無日矣頵遂與潤州團練使安仁義同舉兵仁義悉焚東塘戰艦頵遣二使詐為商人詣夀州約奉國節度使朱延夀行密將尚公乃遇之曰非商人也殺一人得其書以告行密行密召李神福於鄂州神福恐杜洪邀之宣言奉命攻荆南勒兵具舟楫及暮遂沿江東下始告將士以討田頵己丑安仁義襲常州常州刺史李遇逆戰極口罵仁義仁義曰彼敢辱我必有備乃引去壬辰行密以王茂章為潤州行營招討使擊仁義不克使徐溫將兵會之溫易其衣服旗幟皆如茂章兵仁義不知益兵復出戰溫奮擊破之行密夫人朱延夀之姊也行密狎侮延夀延夀怨怒隂與田頵通謀頵遣前進士杜荀鶴至夀州與延夀相結又遣至大梁告朱全忠全忠大喜遣兵屯宿州以應之荀鶴池州人也九月朱延夀謀頗泄楊行密詐為目疾對延夀使者多錯亂所見或觸柱仆地謂夫人曰吾不幸失明諸子皆幼軍府事當悉以授三舅夫人屢以書報延夀行密又自遣召之隂令徐溫為之備延夀至廣陵行密迎及寢門執而殺之部兵驚擾徐溫諭之皆聽命遂斬延夀兄弟黜朱夫人初延夀赴召其妻王氏謂曰君此行吉凶未可知願日發一使以安我一日使不至王氏曰事可知矣部分僮僕授兵闔門捕騎至乃集家人聚寶貨發百燎焚府舍曰妾誓不以皎然之軀為讎人所辱赴火而死延夀用法嚴好以寡擊衆嘗遣二百人與汴兵戰有一人應留者請行延夀以違命立斬之田頵襲升州得李神福妻子善遇之神福自鄂州東下頵遣使謂之曰公見機與公分地而王不然妻子無遺神福曰吾以卒伍事吳王今為上將義不以妻子易其志頵有老母不顧而反三綱且不知烏足與言乎斬使者而進士卒皆感勵頵遣其將王壇汪建將水軍逆戰丁未神福至吉陽磯與壇建遇壇建執其子承鼎示之神福命左右射之神福謂諸將曰彼衆我寡當以竒取勝及暮合戰神福陽敗引舟泝流而上壇建追之神福復還順流擊之壇建樓船大列火炬神福令軍中曰望火炬輒擊之壇建軍皆滅火旗幟交雜神福因風縱火焚其艦壇建大敗士卒焚溺死者甚衆戊申又戰于皖口壇建僅以身免獲徐綰行密以檻車載之遺錢鏐鏐剖其心以祭周渭頵聞壇建敗自將水軍逆戰神福曰賊棄城來此天亡也臨江堅壁不戰遣使告行密請發步兵斷其歸路行密遣漣水制置使臺濛將兵應之王茂章攻潤州久未下行密命茂章引兵會濛擊頵田頵聞臺濛將至自將步騎逆戰留其將郭行悰以精兵二萬及王壇汪建水軍屯蕪湖以拒李神福覘者言濛營寨𥚹小才容二千人頵易之不召外兵濛入頵境畨陳而進軍中笑其怯濛曰頵宿將多謀不可不備冬十月戊辰與頵遇於廣德濛先以楊行密書遍賜頵將皆下馬拜受濛因其挫伏縱兵擊之頵兵遂敗又戰于黃池兵交濛偽走頵追之遇伏大敗奔還宣州城守濛引兵圍之頵亟召蕪湖兵還不得入郭行悰王壇汪建及當塗廣德諸戌皆帥其衆降行密以臺濛已破田頵命王茂章復引兵攻潤州十一月乙亥田頵帥死士數百出戰臺濛陽退以示弱頵兵踰壕而鬬濛急擊之頵不勝還走城橋陷墜馬斬之其衆猶戰以頵首示之乃潰濛遂克宣州初行密與頵同閭里少相善約為兄弟及頵首至廣陵行密視之泣下赦其母殷氏行密與諸子皆以子孫禮事之行密以李神福為寧國節度使神福以杜洪未平固讓不拜宣州長史合肥駱知祥善治金榖觀察牙推沈文昌為文精敏嘗為頵草檄罵行密行密以知祥為淮南支計官文昌為節度牙推文昌湖州人也初頵每戰不勝輒欲殺錢傳瓘其母及宣州都虞候郭師從常保護之師從合肥人頵之婦弟也頵敗傳瓘歸杭州錢鏐以師從為鎮東都虞候天祐元年春三月以淮南行軍司馬李神福為鄂嶽招討使復將兵擊杜洪朱全忠遣使請捨鄂嶽復修舊好行密報曰俟天子還長安然後罷兵修好秋八月淮南將李神福攻鄂州未下會疾病還廣陵楊行密以舒州團練使泌陽劉存代為招討使神福尋卒宣州觀察使臺濛卒以其子渥為宣州觀察使昭宣帝天祐二年潤州團練使安仁義勇決得士心故淮南將王茂章攻之踰年不克楊行密使謂之曰汝之功吾不忘也能束身自歸當以汝為行軍副使但不掌兵耳仁義不從茂章為地道入城遂克之仁義舉族登樓衆不敢逼先是攻城諸將見仁義輒罵之惟李德誠不然至是仁義召德誠登樓謂曰汝有禮吾今以為汝功且以愛妾贈之乃擲弓於地德誠掖之而下并其子斬於廣陵市二月朱全忠遣其將曹延祚將兵與杜洪共守鄂州庚子淮南將劉存攻拔之執洪延祚及汴兵千餘人送廣陵悉誅之行密以存為鄂嶽觀察使冬十一月庚辰吳武忠王楊行密薨將佐共請宣諭使李儼承制授楊渥淮南節度使東南諸道行營都統兼侍中弘農郡王王建據蜀唐僖宗廣明元年春三月庚午以左金吾大將軍陳敬瑄為西川節度使敬瑄許州人田令孜之兄也初崔安潛鎮許昌令孜為敬瑄求兵馬使安潛不許敬瑄因令孜得隸左神䇿軍數嵗纍遷至大將軍令孜見關東羣盜日熾隂為幸蜀之計奏以敬瑄及其腹心左神䇿大將軍楊師立牛勗羅元杲鎮三川上令四人擊毬賭三川敬瑄得第一籌即以為西川節度使代安潛夏六月庚寅陳敬瑄至成都中和三年秋七月左驍衛上將軍楊復光卒于河中八都將鹿晏弘等各以其衆散去王建韓建張造晉暉李師泰各帥其衆與之俱田令孜密遣人以厚利誘之二建帥衆數千逃奔行在令孜皆養為假子賜與巨萬拜諸衛將軍使各將其衆號隨駕五都光啓元年秋九月戊申以陳敬瑄為三川及峽內諸州都指揮制置等使二年夏四月田令孜薦樞密使楊復恭為左神䇿中尉觀軍容使自除西川監軍使往依陳敬瑄復恭斥令孜之黨出王建為利州刺史三年春三月山南西道節度使楊守亮忌利州刺史王建驍勇屢召之建懼不往前龍州司倉周庠説建曰唐祚將終藩鎮互相吞噬皆無雄才遠略不能戡濟多難公勇而有謀得士卒心立大功者非公而誰然葭萌四戰之地難以久安閬州地僻人富楊茂實陳田之腹心不修職貢若表其罪興兵討之可一戰而擒也建從之召募溪洞酋豪有衆八千沿嘉陵江而下襲閬州逐其刺史楊茂實而據之自稱防禦使招納亡命軍勢益盛守亮不能制部將張虔裕説建曰公乘天子微弱專據方州若唐室復興公無種矣宜遣使奉表天子仗大義以行師蔑不濟矣部將綦母諫復説建養士愛民以觀天下之變建皆從之初建與東川節度使顧彥朗俱在神䇿軍同討賊建既據閬州彥朗畏其侵暴數遣使問遺饋以軍食建由是不犯東川陳敬瑄惡顧彥朗與王建相親恐其合兵圖已冬十一月謀於田令孜令孜曰建吾子也不為楊興元所容故作賊耳今折簡召之可致麾下乃遣使以書召之建大喜詣梓州見彥朗曰十軍阿父見召當往省之因見陳太師求一大州若得之私願足矣乃留其家於梓州帥麾下精兵二千與從子宗鐬假子宗瑶宗弼宗侃宗辨俱西建至鹿頭關西川參謀李乂謂敬瑄曰王建虎也奈何延之入室彼安肯為公下乎敬瑄悔亟遣人止之且增修守備建怒破關而進敗漢州刺史張頊於綿竹遂拔漢州進軍學射山又敗西川將句惟立於蠶北又拔德陽敬瑄遣使讓之對曰十軍阿父召我來及門而拒之重為顧公所疑退無歸矣田令孜登樓慰諭之建與諸將於清逺橋上髠髮羅拜曰今既無歸且辭阿父作賊矣顧彥朗以其弟彥暉為漢州刺史發兵助建急攻成都三日不克而退還屯漢州敬瑄告難於朝詔遣中使和解之又令李茂貞以書諭建皆不從文德元年春三月王建攻彭州陳敬瑄救之乃去建大掠西川十二州皆被其患夏五月陳敬瑄方與王建相攻貢賦中絶建以成都尚強退無所掠欲罷兵周庠綦母諫以為不可庠曰卭州城塹完固食支數年可據之以為根本建曰吾在軍中久觀用兵者不倚天子之重則衆心易離不若疏敬瑄之罪表請朝廷命大臣為帥而佐之則功庶可成乃使庠草表請討敬瑄以贖罪因求卭州顧彥朗亦表請赦建罪移敬瑄它鎮以靖兩川初黃巢之亂上為夀王從僖宗幸蜀時事出倉猝諸王多徒行至山谷中夀王疲乏不能前卧磻石上田令孜自後至趣之王曰足痛幸軍容給一馬令孜曰此深山安得馬以鞭扶王使前王顧而不言心銜之及即位遣人監西川軍令孜不奉詔上方憤藩鎮跋扈欲以威制之會得彥朗建表以令孜所恃者敬瑄耳六月以韋昭度兼中書令充西川節度使兼兩川招撫制置等使徴敬瑄為龍武統軍王建軍新都時綿竹土豪何義陽安仁費師勤等所在擁兵自保衆或萬人少者千人建遣王宗瑶説之皆率衆附於建給其資糧建軍復振陳敬瑄田令孜聞韋昭度將至治兵完城以拒之初惑義節度使楊晟既失興鳯走據文龍成茂四州王建攻西川田令孜以晟已之故將假威戎軍節度使使守彭州王建攻彭州陳敬瑄遣眉州刺史山行章將兵五萬壁新繁以救之十二月丁亥以韋昭度為行營招討使山南西道節度使楊守亮副之東川節度使顧彥朗為行軍司馬割卭蜀黎雅置永平軍以王建為節度使治卭州充行營諸軍都指揮使戊子削陳敬瑄官爵昭宗龍紀元年春正月戊申王建大破山行章於新繁殺獲近萬人行章僅以身免楊晟懼徙屯三交行章屯濛陽與建相持冬十二月甲子王建敗山行章及西川騎將宋行能於廣都行能奔還成都行章退守眉州壬申行章請降於建大順元年春正月壬寅王建攻卭州陳敬瑄遣其大將彭城楊儒將兵三千助刺史毛湘守之湘出戰屢敗楊儒登城見建兵盛歎曰唐祚盡矣王公治衆嚴而不殘殆可以庇民乎遂帥所部出降建養以為子更其姓名曰王宗儒乙巳建留永平節度判官張琳為卭南招安使引兵還成都琳許州人也陳敬瑄分兵布寨於犀浦郫導江等縣發城中民户一丁晝則穿重壕採竹木運磚石夜則登城擊柝巡警無休息韋昭度營於唐橋王建營於東閶門外建事昭度甚謹辛亥簡州將杜有遷執刺史貟虔嵩降於建建以有遷知州事夏四月乙丑陳敬瑄遣蜀州刺史任從海將兵二萬救卭州戰敗欲以蜀州降王建敬瑄殺之以徐公鉥代為蜀州刺史丙寅嘉州刺史朱實舉州降于建丙子僰道土豪文武堅執戎州刺史謝承恩降于建六月丁巳茂州刺史李繼昌帥衆救成都己未王建擊斬之辛酉資簡都制置應援使謝從本殺雅州刺史張承簡舉城降建秋八月王建退屯漢州陳敬瑄括富民財以供軍置徴督院逼以桎梏捶楚使各自占凡有財者如匿贓虛占急徴咸不聊生九月卭州刺史毛湘本田令孜親吏王建攻之急食盡救兵不至壬戌湘謂都知兵馬使任可知曰吾不忍負田軍容吏民何罪爾可持吾頭歸王建乃沐浴以俟刃可知斬湘及二子降於建士民皆泣甲戌建持永平旌節入卭州以節度判官張琳知留後繕完城隍撫安夷獠經營蜀雅冬十月癸未朔建引兵還成都蜀州將李行周逐李公鉥舉城降建二年春二月韋昭度將諸道兵十餘萬討陳敬瑄三年不能克饋運不繼朝議欲息兵三月乙亥制復敬瑄官爵令顧彥朗王建各帥衆歸鎮夏四月成都城中乏食棄兒滿路民有潛入行營販米入城者邏者得之以白韋昭度昭度曰滿城飢甚忍不救之釋勿問亦有白陳敬瑄者敬瑄曰吾恨無術以救餓者彼能如是勿禁也由是販者浸多然所致不過斗升截筒徑寸半深五分量米而鬻之每筒百餘錢餓殍狼籍軍民強弱相陵將吏斬之不能禁乃更為酷法或斷腰或斜劈死者相繼而為者不止人耳目既熟不以為懼吏民日窘多謀出降敬瑄悉捕其族黨殺之慘毒備至內外都指揮使眉州刺史成都徐耕性仁恕所全活數千人田令孜曰公掌生殺而不刑一人有異志邪耕懼夜取俘囚戮於市王建見罷兵制書曰大功垂成奈何棄之謀於周庠庠勸建請韋公還朝獨攻成都克而有之建表稱陳敬瑄田令孜罪不可赦願畢命以圖成功昭度無如之何由是未能東還建説昭度曰今關東藩鎮迭相吞噬此腹心之疾也相公宜早歸廟堂與天子謀之敬瑄疥癬耳當以日月制之責建可辦也昭度猶豫未決庚子建隂令東川將唐友通等擒昭度親吏駱保於行府門臠食之云其盜軍糧昭度大懼遽稱疾以印節授建牒建知三使留後兼行營招討使即日東還建送至新都跪觴馬前泣拜而别昭度甫出劒門即以兵守之不復內東軍昭度至京師除東都留守建急攻成都環城烽塹亘五十里有狗屠王鷂請詐得罪亡入城説之使上下離心建遣之鷂入見陳敬瑄田令孜則言建兵疲食盡將遁矣出則鬻茶於市隂為吏民稱建英武軍勢強盛由是敬瑄等懈於守僃而衆心危懼建又遣其將京兆鄭渥詐降以覘之敬瑄以為將使乘城既而復以詐得歸建由是悉知城中虛實以渥為親從都指揮使更姓名曰王宗渥秋八月王建攻陳敬瑄益急敬瑄出戰輒敗巡內州縣率為建所取威戎節度使楊晟時饋之食建以兵據新都彭州道絶敬瑄出慰勉士卒皆不應辛丑田令孜登城謂建曰老夫嚮於公甚厚何見困如是建曰父子之恩豈敢忘但朝廷命建討不受代者不得不然儻太師改圖建復何求是夕令孜自攜兩川印節詣建營授之將士皆呼萬歲建泣謝請為父子如初壬寅敬瑄開城迎建癸卯建入城自稱西川留後初陳敬瑄之拒朝命也田令孜欲盜其軍政謂敬瑄曰三兄尊重軍務煩勞不若盡以相付日具記事咨呈兄但髙居自逸而已敬瑄素無智能欣然許之自是軍事皆不由己以至於亡建表敬瑄子陶為雅州刺史使隨陶之官明年罷歸寓居新津以一縣租賦贍之癸丑建分遣士卒就食諸州更文武堅姓名曰王宗阮謝從本曰王宗本陳敬瑄將佐有器幹者建皆禮而用之􅊨􅊨九月東川節度使顧彥朗薨軍中推其弟彥暉知留後冬十月癸未以永平節度使王建為西川節度使甲申廢永平軍建既得西川留心政事容納直言好施樂士用人各盡其才謙恭儉素然多忌好殺諸將有功名者多因事誅之十二月以顧彥暉為東川節度使遣中使宋道弼賜旌節楊守亮使楊守厚囚道弼奪其旌節發兵攻梓州癸卯彥暉求救於王建甲辰建遣其將華洪李簡王宗侃王宗弼救東川建密謂諸將曰爾等破賊彥暉必犒師汝曹於行營報宴因而執之無煩再舉宗侃破守厚七寨守厚走歸綿州彥暉具犒禮諸將報宴宗弼以建謀告之彥暉乃以疾辭景福元年威武節度使楊晟與楊守亮等約攻王建二月丁丑晟出兵掠新繁漢州之境使其將吕蕘將兵二千會楊守厚攻梓州建遣行營都指揮使李簡擊蕘斬之辛丑王建遣族子嘉州刺史宗裕雅州刺史王宗侃威信都指揮使華洪茂州刺史王宗瑶將兵五萬攻彭州楊晟逆戰而敗宗裕等圍之楊守亮遣其將符昭救晟徑趨成都營三學山建亟召華洪還洪疾驅而至後軍尚未集以數百人夜去昭營數里多擊更鼓昭以為蜀軍大至引兵宵遁三月左神策勇勝三都都指揮使楊子實子遷子釗皆守亮之假子也自渠州引兵救楊晟知守亮必敗壬子帥其衆二萬降於王建楊晟遺楊守貞楊守忠楊守厚書使攻東川以解彭州之圍守貞等從之神䇿督將竇行實戍梓州守厚密誘之為內應守厚至涪城行實事泄顧彥暉斬之守厚遁去守貞守忠軍至無所歸盤桓綿劒間王建遣其將吉諫襲守厚破之癸亥西川將李簡邀守忠於鍾陽斬獲三千餘人夏四月簡又破守厚於銅鉾斬獲三千餘人降萬五千人守忠守厚皆走秋七月王建圍彭州久不下民皆竄匿山谷諸寨日出俘掠謂之淘虜都將先擇其善者餘則士卒分之以是為常有軍士王先成者新津人本書生也世亂為兵度諸將惟北寨王宗侃最賢乃往説之曰彭州本西川之巡屬也陳田召楊晟割四州以授之偽署觀察使與之共拒朝命今陳田已平而晟猶據之州民皆知西川乃其大府而司徒乃其主也故大軍始至民不入城而入山谷避之以俟招安今軍至纍月未聞招安之命軍士復從而掠之與盜賊無異奪其資財驅其畜産分其老弱婦女以為奴婢使父子兄弟流離愁怨其在山中者暴露於暑雨殘傷於蛇虎孤危飢渴無所歸訴彼始以楊晟非其主而不從今司徒不加存恤彼更思楊氏矣宗侃惻然不覺屢移其牀前問之先成曰又有甚於是者今諸寨每旦出六七百人入山淘虜薄暮而返曽無守備之意賴城中無人耳萬一有智者為之畫䇿乘虛奔突先伏精兵千人於門內登城望淘虜者稍遠出弓弩手炮各百人攻寨之一面隨以役卒五百負薪土填壕為道然後出精兵奮擊且焚其寨又於三面城下各出耀兵諸寨咸自備禦無暇相救城中得以益兵繼出如此能無敗乎宗侃矍然曰此誠有之將若之何先成請條列為狀以白王建宗侃即命先成草之大指言今所白之事須四面通共宗侃所司止於北面或所白可從乞以牙舉施行事凡七條其一乞招安山中百姓其二乞禁諸寨軍士及子弟無得一人輒出淘虜仍表諸寨之旁七里內聽樵牧敢越表者斬其三乞置招安寨中容數千人以處所招百姓宗侃請選所部將校謹幹者為招安將使將三十人晝夜執兵巡衛其四招安之事須委一人總領今榜帖既下諸寨必各遣軍士入山招安百姓見之無不驚疑如鼠見狸誰肯來者欲招之必有其術願降帖付宗侃專掌其事其五乞嚴勒四寨指揮使悉索前日所虜彭州男女老幼集於營埸有父子兄弟夫婦自相認者即使相從牒具人數部送招安寨有敢私匿一人者斬仍乞勒府中諸營亦令嚴索有自軍前先寄歸者量給資糧悉部送歸招安寨其六乞置九隴行縣於招安寨中以前南鄭令王丕攝縣令設置曹局撫理百姓擇其子弟之壯者給帖使自入山招其親戚彼知司徒嚴禁侵掠前日為軍士所虜者皆獲安堵必歡呼踊躍相帥下山如子歸母不日盡出其七彭州土地宜麻百姓未入山時多漚藏者宜令縣令曉諭各歸田里出所漚麻鬻之以為資糧必漸復業建得之大喜即行之悉如所申明日榜帖至威令赫然無敢犯者三日山中民競出赴招安寨如歸市寨不能容斥而廣之浸有市井又出麻鬻之民見村落無抄暴之患稍稍辭縣令復故業月餘招安寨皆空秋八月辛丑李茂貞攻拔興元楊復恭楊守亮楊守信楊守貞楊守忠滿存奔閬州冬十二月壬午王建遣其將華洪擊楊守亮於閬州破之建遣節度押牙延陵鄭頊使於朱全忠全忠問劒閣頊極言其險全忠不信頊曰茍不以聞恐誤公軍機全忠大笑二年春正月東川留後顧彥暉既與王建有隙李茂貞欲撫之使從已奏請更賜彥暉節詔以彥暉為東川節度使茂貞又奏遣知興元府事李繼密救梓州未幾建遣兵敗東川鳯翔之兵於利州彥暉求和請與茂貞絶乃許之二月甲戌加西川節度使王建同平章事王建屢請殺陳敬瑄田令孜朝廷不許夏四月乙亥建使人告敬瑄謀作亂殺之新津又告田令孜通鳯翔書下獄死建使節度判官馮涓草表奏之曰開匣出虎孔宣父不責它人當路斬蛇叔孫敖蓋非利已專殺不行於閫外先機恐失於彀中涓宿之孫也乾寧元年夏五月王建攻彭州城中人相食彭州內外都指揮使趙章出降王先成請築龍尾道屬于女牆丙子西川兵登城楊晟猶帥衆力戰刁子都虞候王茂權斬之獲彭州馬步使安師建建欲使為將師建泣謝曰師建誓與楊司徒同生死不忍復戴日月惟速死為惠再三諭之不從乃殺之禮葬而祭之更趙章姓名曰王宗勉王茂權名曰宗訓又更王釗名曰宗謹李綰姓名曰王宗綰秋七月綿州刺史楊守厚卒其將常再榮舉城降王建二年秋九月王建遣簡州刺史王宗瑶等將兵赴難甲戌軍于綿州犯闕時王鎮冬十一月雅州刺史王宗侃攻拔利州執刺史李繼顒斬之十二月甲申聞州防禦使李繼雍蓬州刺史費存渠州刺史陳璠各帥所部兵奔王建王建奏東川節度使顧彥暉不發兵赴難而掠奪輜重遣瀘州刺史馬敬儒斷峽路請興兵討之戊子華洪大破東川兵於楸林俘斬數萬拔楸林寨丙申王建攻東川别將主宗弼為東川兵所擒顧彥暉畜以為子戊戌通州刺史李彥昭將部兵二千降於建三年春正月西川將王宗夔攻拔龍州殺刺史田昉閏月丁亥果州刺史張雄降于王建夏五月丙戌上遣中使詣梓州和解兩川王建雖奉詔還成都然猶連兵未解荆南節度使成汭與其將許存泝江略地盡取濵江州縣武泰節度使王建肇棄黔中收餘衆保豐都存又引兵西取渝涪二州汭以其將趙武為黔州留後存為萬州刺史趙武數攻豐都王建肇不能守與存皆降于王建建忌存勇略欲殺之掌書記髙燭曰公方揔攬英雄以圖霸業彼窮來歸我奈何殺之建使戍蜀州隂使知蜀州王宗綰察之宗綰密言存忠勇謙厚有良將才建乃捨之更其姓名曰王宗播秋八月癸丑以王建為鳯翔西面行營招討使四年春二月戊午王建遣卭州刺史華洪彭州刺史王宗祐將兵五萬攻東川以戎州刺史王宗謹為鳯翔西面行營先鋒使敗鳯翔將李繼徽等於玄武繼徽本姓楊名崇本茂貞之假子也庚申王建以決雲都知兵馬使王宗侃為應援開峽都指揮使將兵八千趨渝州決勝都知兵馬使王宗阮為開江防送進奉使將兵七千趨瀘州辛未宗侃取渝州降刺史牟崇厚癸酉宗阮拔瀘州斬刺史馬敬儒峽路始通鳯翔將李繼昭救梓州留偏將守劒門西川將王宗播擊擒之夏四月以右諫議大夫李洵為兩川宣諭使和解王建及顧彥暉五月丙戌王建以節度副使張琳守成都自將兵五萬攻東川更華洪姓名曰王宗滌六月李茂貞表王建攻東川連兵纍歲不聽詔命甲寅貶建南州刺史乙卯以茂貞為西川節度使癸亥王建克梓州南寨執其將李繼寧丙寅宣諭使李洵至梓州己巳見建于張𣏌寨建指執旗者曰戰士之情不可奪也王建與顧彥暉五十餘戰九月癸酉朔圍梓州蜀州刺史周德權言於建曰公與彥暉爭東川三年士卒疲於矢石百姓困於輸挽東川羣盜多據州縣彥暉懦而無謀欲為偷安之計皆啖以厚利恃其救援故堅守不下今若遣人諭賊帥以禍福來者賞之以官不服者威之以兵則彼之所恃反為我用矣建從之彥暉勢益孤德權許州人也復以王建為西川節度使同平章事冬十月壬子知遂州矦紹帥衆二萬乙卯知合州王仁威帥衆千人戊午鳯翔將李繼溥以援兵二千皆降於王建建攻梓州益急庚申顧彥暉聚其宗族及假子共飲遣王宗弼自歸于建酒酣命其假子瑶殺已及同飲者然後自殺建入梓州城中兵尚七萬人建命王宗綰分兵徇昌普等州以王宗滌為東州留後十二月壬戌王建自梓州還戊辰至成都光化元年春正月以兵部尚書劉崇望同平章事充東川節度使夏五月朝廷聞王建已用王宗滌為東川留後乃召劉崇望還為兵部尚書仍以宗滌為留後秋九月己丑東川留後王宗滌言於王建以東川封疆五千里文移往還動踰數月請分遂合瀘渝昌五州别為一鎮建表言之冬十月丁巳以東川留後王宗滌為節度使三年春二月庚申以西川節度使王建兼中書令夏六月癸亥加東川節度使王宗滌同平章事秋七月甲寅以西川節度使王建兼東川信武軍兩道都指揮制置等使天復元年春三月東川節度使王宗滌以疾求代王建表馬步使王宗裕為留後閏六月道士杜從法以妖妄誘昌普合三州民作亂王建遣王宗黯將兵會東川武信兵討之龍臺鎮使王宗侃等討杜從法平之二年春二月西川兵至利州昭武節度使李繼忠棄鎮奔鳯翔王建以劒州刺史王宗偉為利州制置使秋八月西川軍請假道於興元山南西道節度使李繼密遣兵戍三泉以拒之辛丑西川前鋒將王宗播攻之不克退保山寨親吏栁修業謂宗播曰公舉族歸人不為之死戰何以自保宗播令兵衆曰吾與汝曹決戰取功名不爾死於此遂破金牛黑水西縣褒城四寨軍校秦承厚攻西縣矢貫左目達于右目鏃不出王建自舐其創膿潰鏃出王宗播屯馬盤寨繼密戰敗奔還漢中西川軍乘勝至城下王宗滌帥衆先登遂克之繼密請降遷于成都得兵三萬騎五千宗滌入屯漢中王建曰繼密殘賊三輔以其降不忍殺復其姓名曰王萬弘不時召見諸將陵易之萬弘終日縱酒俳優輩亦加戲誚萬弘不勝憂憤醉投池水而卒詔以王忠滌為山南西道節度使宗滌有勇略得衆心王建忌之建作府門繪以朱丹蜀人謂之畫紅樓建以為宗滌姓名應之王宗佶等疾其功復構以飛語建召宗滌至成都詰責之宗滌曰三蜀略平大王聽讒殺功臣可矣建命親隨馬軍都指揮使唐道襲夜飲之酒縊殺之成都為之罷市連營涕泣如喪親戚建以指揮使王宗賀權興元留後道襲閬州人也始以舞童事建後浸預謀畫九月戊申武定節度使李思敬以洋州降王建冬十月王建攻拔興州以軍使王宗浩為興州刺史三年夏四月王建出兵秦隴乘李茂貞之弱也遣判官韋莊入貢亦修好於朱全忠全忠遣押牙王殷報聘建與之宴殷言蜀甲兵誠多但乏馬耳建作色曰當道江山險阻騎兵無所施然馬亦不乏押牙少留當共閲之乃集諸州馬大閲於星宿山官馬八千私馬四千部隊甚整殷歎服建本騎將故得蜀之後於文黎維茂州市胡馬十年之間遂及兹數秋八月庚辰加西川節度使西平王王建守司徒進爵蜀王天祐元年春二月上遣間使以御札告難于王建車駕還洛陽時朱全忠劫建以卭州刺史王宗祐為北路行營指揮使將兵會鳯翔兵迎車駕至興平遇汴兵不得進而還建始自用墨制除官云俟車駕還長安表聞王建賦斂重人莫敢言馮涓因建生日獻頌先美功德後言生民之苦建愧謝曰如君忠諫功業何憂賜之金帛自是賦斂稍損二年冬十一月昭宗之喪朝廷遣告哀使司馬卿宣諭王建至是始入蜀境西川掌書記韋莊為建謀使武定節度使王宗綰諭卿曰蜀之將士世受唐恩去嵗聞乘輿東遷凡上二十表皆不報尋有士卒自汴來聞先帝已罹朱全忠弒逆蜀之將士方日夕枕戈思為先帝報仇不知今兹使來有何事宣諭舍人宜自圖進退卿乃還三年冬十月丙戌王建始立行臺於蜀建東向舞蹈號慟稱自大駕東遷制命不通請權立行臺用李晟鄭畋故事承制封拜仍以榜帖告諭所部藩鎮州縣後梁武帝開平元年秋九月蜀王會將佐議稱帝皆曰大王雖忠於唐唐已亡矣此所謂天與不取者也馮涓獨獻議請以蜀王稱制曰朝興則未爽稱臣賊在則不同為惡王不從涓杜門不出王用安撫副使掌書記韋莊之謀帥吏民哭三日己亥即皇帝位國號大蜀辛丑以前東川節度使兼侍中王宗佶為中書令韋莊為左散騎常侍判中書門下事閬州防禦使唐道襲為內樞密使莊見素之孫也蜀主雖目不知書好與書生談論粗曉其理是時唐衣冠之族多避亂在蜀蜀主禮而用之使修舉故事故其典章文物有唐之遺風蜀主長子校書郎宗仁幼以疾廢立其次子祕書少監宗懿為遂王通鑑紀事本末卷第三十七
