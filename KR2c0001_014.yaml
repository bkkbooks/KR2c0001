body:
  text: 祖逖北伐晉愍帝建興元年初范陽祖逖少有大志與劉琨俱為司州主簿同寢中夜聞雞鳴蹴琨覺曰此非惡聲也因起舞及渡江左丞相睿以為軍咨祭酒逖居京口糾合驍健言於睿曰晉室之亂非上無道而下怨叛也由宗室爭權自相魚肉遂使戎狄乘隙毒流中土今遺民既遭殘賊人思自奮大王誠能命將出師使如逖者統之以復中原郡國豪傑必有望風響應者矣睿素無北伐之志以逖為奮威將軍豫州剌史給千人廪布三千匹不給鎧仗使自召募逖將其部曲百餘家渡江中流擊楫而誓曰祖逖不能清中原而復濟者有如大江遂屯淮隂起冶鑄兵募得二千餘人而後進元帝建武元年初流民張平樊雅各聚衆數千人在譙為塢主王之為丞相也遣行參軍譙國桓宣往説平雅平雅皆請降及豫州剌史祖逖出屯蘆洲遣參軍殷乂詣平雅乂意輕平視其屋曰可作馬廄見大鑊曰可鑄鐡器平曰此乃帝王鑊天下清平方用之奈何毀之乂曰卿未能保其頭而愛鑊邪平大怒於坐斬乂勒兵固守逖攻之歲餘不下乃誘其部將謝浮使殺之逖進據太丘樊雅猶據譙城與逖相拒逖攻之不克請兵於南中郎將王含桓宣時為含參軍令遣宣將兵五百助逖逖謂宣曰卿信義已著於彼今復為我説雅宣乃單馬從兩人詣雅曰祖豫州方欲平蕩劉石倚卿為援前殷乂輕薄非豫州意也雅即詣逖降逖既入譙城石勒遣石虎圍譙王含復遣桓宣救之虎解去逖表宣為譙國內史六月己巳晉王傳檄天下稱石虎敢帥犬羊渡河縱毒今遣琅邪王裒等九軍鋭卒三萬水陸四道徑造賊埸受祖逖節度尋復召裒還建康太興二年初蓬陂塢主陳川自稱陳留太守祖逖之攻樊雅也川遣其將李頭助之頭力戰有功逖厚遇之頭每嘆曰得此人為主吾死無恨川聞而殺之頭黨馮寵帥其衆降逖川益怒大掠豫州諸郡逖遣兵擊破之夏四月川以浚儀叛降石勒祖逖攻陳川于蓬關石勒遣石虎將兵五萬救之戰于浚儀逖兵敗退屯梁國勒又遣桃豹將兵至蓬關逖退屯淮南虎徙川部衆五千户于襄國留豹守川故城三年夏六月祖逖將韓濳與後趙將桃豹分據陳川故城豹居西臺濳居東臺豹由南門濳由東門出入相守四旬逖以布囊盛土如米狀使千餘人運上臺又使數人簷米息於道豹兵逐之棄擔而走豹兵久飢得米以為逖士衆豐飽益懼後趙將劉夜堂以驢千頭運糧饋豹逖使韓濳及别將馮鐡邀擊於汴水盡獲之豹宵遁屯東燕城逖使濳進屯封丘以逼之馮鐵據二臺逖鎮雍丘數遣兵邀擊後趙兵後趙鎮戍歸逖者甚多境土漸蹙先是趙固上官已李矩郭默互相攻擊逖馳使和解之示以禍福遂皆受逖節度秋七月詔加逖鎮西將軍逖在軍與將士同甘苦約已務施勸課農桑撫納新附雖踈賤者皆結以恩禮河上諸塢先有任子在後趙者皆聽兩屬時遣遊軍偽抄之明其未附塢主皆感恩後趙有異謀輒密以告由是多所克獲自河以南多叛後趙歸于晉逖練兵積榖為取河北之計後趙王勒患之乃下幽州為逖修祖父墓置守冢二家因與逖書求通使及互市逖不報書而聽其互市收利十倍逖牙門童建殺新蔡內史周密降于後趙勒斬之送首於逖曰叛臣逃吏吾之深仇將軍之惡猶吾惡也逖深德之自是後趙人叛歸逖者逖皆不納禁諸將不使侵暴後趙之民邊境之間稍得休息四年秋七月甲戌以尚書僕射戴淵為征西將軍都督司兖豫并雍冀六州諸軍事司州剌史鎮合肥八月豫州剌史祖逖以戴淵吳士雖有才望無弘致逺識且已翦荆棘收河南地而淵雍容一旦來統之意甚怏怏又聞王敦與劉刁構隙將有內難知大功不遂感激發病九月壬寅卒於雍丘豫州士女若喪父母譙梁間皆為立祠王敦久懷異志聞逖卒益無所憚冬十月壬午以逖弟約為平西將軍豫州剌史領逖之衆約無綏御之才不為士卒所附初范陽李産避亂依逖見約志趣異常謂所親曰吾以北方鼎沸故逺來就此冀全宗族今觀約所為有不可測之志吾託名姻親當早自為計無事復陷身於不義也爾曹不可以目前之利而忘久長之䇿乃帥子弟十餘人間行歸鄉里永昌元年冬十月祖逖既卒後趙屢冦河南拔襄城城父圍譙豫州剌史祖約不能禦退屯壽春後趙遂取陳留梁鄭之間復騷然矣王敦之亂晉元帝大興二年初王敦患杜曾難制謂梁州剌史周訪曰若擒曾當相論為荆州及曾死而敦不用王廙在荆州多殺陶侃將佐以皇甫方回為侃所敬責其不詣已收斬之士民怨怒上下不安帝聞之徴廙為散騎常侍以周訪代廙為荆州剌史王敦忌訪威名意難之從事中郎郭舒説敦曰鄙州雖荒弊乃用武之國不可以假人宜自領之訪為梁州足矣敦從之六月丙子詔加訪安南將軍餘如故訪大怒敦手書譬解并遺玉環玉碗以申厚意訪抵之於地曰吾豈賈豎可以寶恱邪訪在襄陽務農訓兵隂有圖敦之志守宰有缺輒補然後言上敦患之而不能制三年秋八月辛未梁州剌史周訪卒訪善於撫納士衆皆為致死知王敦有不臣之心私常切齒敦由是終訪之丗未敢為逆敦遣從事中郎郭舒監襄陽軍帝以湘州剌史甘卓為梁州剌史督沔北諸軍事鎮襄陽舒既還帝徴為右丞敦留不遣王敦殺武陵內史向碩帝之始鎮江東也敦與從弟導同心翼戴帝亦推心任之敦總征討導專機政羣從子弟布列顯要時人為之語曰王與馬共天下後敦自恃有功且宗族強盛稍益驕恣帝畏而惡之乃引劉隗刁協等以為腹心稍抑損王氏之權導亦漸見踈外中書郎孔愈陳導忠賢有佐命之勳宜加委任帝出愈為司徒左長史導能任真推分淡如也有識皆稱其善處興廢而敦益懷不平遂構嫌隙初敦辟吳興沈充為參軍充薦同郡錢鳳於敦敦以為鎧曹參軍二人皆巧諂凶狡知敦有異志隂贊成之為之畫䇿敦寵信之勢傾內外敦上疏為導訟屈辭語怨望導封以還敦敦復遣奏之左將軍譙王氶忠厚有志行帝親信之夜召氶以敦疏示之曰王敦以頃年之功位任足矣而所求不已言至於此將若之何氶曰陛下不早裁之以至今日敦必為患劉隗為帝謀出心腹以鎮方面會敦表以宣城內史沈充代甘卓為湘州剌史帝謂氶曰王敦姦逆已著朕為惠皇其勢不逺湘州據上流之勢控三州之會欲以叔父居之何如氶曰臣奉承詔命惟力是視何敢有辭然湘州經蜀寇之餘民物凋弊若得之部比及三年乃可即戎苟未及此雖復灰身亦無益也十二月詔曰晉室開基方鎮之任親賢並用其以譙王氶為湘州剌史長沙鄧騫聞之歎曰湘州之禍其在斯乎氶行至武昌敦與之宴謂氶曰大王雅素佳士恐非將帥才也氶曰公未見知耳鉛刀豈無一割之用敦謂錢鳯曰彼不知懼而學壯語足知其不武無能為也乃聽之鎮時湘土荒殘公私困弊氶躬自儉約傾心綏撫甚有能名四年秋七月甲戌以尚書僕射戴淵為征西將軍都督司兖豫并雍冀六州諸軍事司州剌史鎮合肥丹楊尹劉隗為鎮北將軍都督青徐幽平四州諸軍事青州剌史鎮淮隂皆假節領兵名為討胡實備王敦也隗雖在外而朝廷機事進退士大夫帝皆與之密謀敦遺隗書曰頃承聖上顧眄足下今大賊未滅中原鼎沸欲與足下及周生之徒戮力王室共靜海內若其泰也則帝祚於是乎隆若其否也則天下永無望矣隗答曰魚相忘於江湖人相忘於道術竭股肱之力效之以忠貞吾之志也敦得書甚怒壬午以驃騎將軍王導為侍中司空假節録尚書領中書監帝以敦故并踈忌導御史中丞周嵩上疏以為導忠素竭誠輔成大業不宜聽孤臣之言惑疑似之説放逐舊德以佞伍賢虧既往之恩招將來之患帝頗感寤導由是得全永昌元年春正月王敦以郭璞為記室參軍璞善卜筮知敦必為亂巳預其禍甚憂之大將軍掾穎川陳述卒璞哭之極哀曰嗣祖焉知非福也敦既與朝廷乖離乃羈録朝士有時望者置已幕府以羊曼及陳國謝鯤為長史曼祜之兄孫也曼鯤終日酣醉故敦不委以事敦將作亂謂鯤曰劉隗姦邪將危社稷吾欲除君側之惡何如鯤曰隗誠始禍然城狐社鼠敦怒曰君庸才豈逹大體出為豫章太守又留不遣戊辰敦舉兵於武昌上疏罪狀劉隗稱隗佞邪讒賊威福自由妄興事役勞擾士民賦役煩重怨聲盈路臣備位宰輔不可坐視成敗輒進軍致討隗首朝懸諸軍夕退昔太甲顚覆厥度幸納伊尹之忠殷道復昌願陛下深垂三思則四海乂安社稷永固矣沈充亦起兵於吳興以應敦敦以充為大都督督護東吳諸軍事敦至蕪湖又上表罪狀刁協帝大怒乙亥詔曰王敦憑恃寵靈敢肆狂逆方朕太甲欲見幽囚是可忍也孰不可忍今親帥六軍以誅大逆有殺敦者封五千户侯敦兄光祿勳含乘輕舟逃歸于敦太子中庶子溫嶠謂僕射周顗曰大將軍此舉似有所在當無濫邪顗曰不然人主自非堯舜何能無失人臣安可舉兵以脅之舉動如此豈得云非亂乎處仲狼抗無上其意寧有限邪敦初起兵遣使告梁州剌史甘卓約與之俱下卓許之及敦升舟而卓不赴使參軍孫雙詣武昌諌止敦敦驚曰甘侯前與吾語云何而更有異正當慮吾危朝廷耳吾今但除姦凶若事濟當以甘侯作公雙還報卓意狐疑或説卓且偽許敦待敦至都而討之卓曰昔陳敏之亂吾先從而後圖之論者謂吾懼逼而思變心常愧之今若復爾何以自明卓使人以敦旨告順陽太守魏該該曰我所以起兵拒胡賊者正欲忠於王室耳今王公舉兵向天子非吾所宜與也遂絶之敦遣參軍桓羆説譙王氶請氶為軍司氶歎曰吾其死矣地荒民寡勢孤援絶將何以濟然得死忠義夫復何求氶檄長沙虞悝為長史會悝遭母喪氶往弔之曰吾欲討王敦而兵少糧乏且新到恩信未洽卿兄弟湘中之豪俊王室方危金革之事古人所不辭將何以教之悝曰大王不以悝兄弟猥劣親屈臨之敢不致死然鄙州荒弊難以進討宜且收衆固守傳檄四方敦勢必分分而圖之庶幾可捷也氶乃囚桓羆以悝為長史以其弟望為司馬督護諸軍與零陵太守尹奉建昌太守長沙王循衡陽太守淮陵劉翼舂陵令長沙易雄同舉兵討敦雄移檄逺近列敦罪惡於是一州之內皆應氶惟湘東太守鄭淡不從氶使虞望討斬之以徇四境淡敦姊夫也氶遣主簿鄧騫至襄陽説甘卓曰劉太連雖驕蹇失衆心非有害於天下大將軍以其私憾稱兵向闕此忠臣義士竭節之時也公受任方伯奉辭伐罪乃桓文之功也卓曰桓文則非吾所能然志在徇國當共詳思之參軍李梁説卓曰昔隗嚻跋扈竇融保河西以奉光武卒受其福今將軍有重望於天下但當案兵坐以待之使大將軍事捷當委將軍以方面不捷朝廷必以將軍代之何憂不富貴而釋此廟勝決存亡於一戰邪騫謂梁曰光武當創業之初故隗竇可以文服從容顧望今將軍之於本朝非竇融之比也襄陽之於大府非河西之固也使大將軍克劉隗還武昌增石城之戍絶荆湘之粟將軍欲安歸乎勢在人手而曰我處廟勝未之聞也且為人臣國家有難坐視不救於義安乎卓尚疑之騫曰今既不為義舉又不承大將軍檄此必至之禍愚智所見也且議者之所難以彼強而我弱也今大將軍兵不過萬餘其留者不能五千而將軍見衆既倍之矣以將軍之威名帥此府之精鋭杖節鳴鼓以順討逆豈王含所能禦哉遡流之衆勢不自救將軍之舉武昌若摧枯拉朽尚何顧慮邪武昌既定據其軍實鎮撫二州以恩意招懷士卒使還者如歸此呂蒙所以克關羽也今釋必勝之䇿安坐以待危亡不可以言智矣敦恐卓於後為變又遣參軍丹陽樂道融往邀之必欲與之俱東道融雖事敦而忿其悖逆乃説卓曰主上親臨萬機自用譙王為湘州非專任劉隗也而王氏擅權日久卒見分政便謂失職背恩肆逆舉兵向闕國家遇君至厚今與之同豈不違負大義生為逆臣死為愚鬼永為宗黨之恥不亦惜乎為君之計莫若偽許應命而馳襲武昌大將軍士衆聞之必不戰自潰大勳可就矣卓雅不欲從敦聞道融之言遂決曰吾本意也乃與巴東監軍柳純南平太守夏侯承宜都太守談該等露檄數敦逆狀帥所統致討遣參軍司馬讚孫雙奉表詣臺羅英至廣州約陶侃同進戴淵在江西先得卓書表上之臺內皆稱萬歲陶侃得卓信即遣參軍髙寶帥兵北下武昌城中傳卓軍至人皆奔散敦遣從母弟南蠻校尉魏乂將軍李恆帥甲卒二萬攻長沙長沙城池不完資儲又闕人情震恐或説譙王氶南投陶侃或退據零桂氶曰吾之起兵志欲死於忠義豈可貪生苟免為奔敗之將乎事之不濟令百姓知吾心耳乃嬰城固守未幾虞望戰死甘卓欲留鄧騫為參軍騫不可卓乃遣參軍虞沖與騫偕至長沙遺譙王氶書勸之固守當以兵出沔口斷敦歸路則湘圍自解氶復書稱江左中興草創始爾豈圖惡逆萌自寵臣吾以宗室受任志在隕命而至止尚淺凡百茫然足下能卷甲電赴猶有所及若其發疑則求我於枯魚之肆矣卓不能從帝徵戴淵劉隗入衛建康隗至百官迎于道隗岸幘大言意氣自若及入見與刁協勸帝盡誅王氏帝不許隗始有懼色司空導帥其從弟中領軍邃左衛將軍廙侍中侃彬及諸宗族二十餘人每旦詣臺待罪周顗將入導呼之曰伯仁以百口纍卿顗直入不顧既見帝言導忠誠申救甚至帝納其言顗喜飲酒至醉而出導猶在門又呼之顗不與言顧左右曰今年殺諸賊奴取金印如斗大繫肘後既出又上表明導無罪言甚切至導不之知甚恨之帝命還導朝服召見之導稽首曰逆臣賊子何代無之不意今者近出臣族帝跣而執其手曰茂弘方寄卿以百里之命是何言邪三月以導為前鋒大都督加戴淵驃騎將軍詔曰導以大義滅親可以吾為安東時節假之以周顗為尚書左僕射王邃為右僕射帝遣王廙往諭止敦敦不從而留之廙更為敦用征虜將軍周札素矜險好利帝以為右將軍都督石頭諸軍事敦將至帝使劉隗軍金城札守石頭帝親𬒳甲徇師於郊外以甘卓為鎮南大將軍侍中都督荆梁二州諸軍事陶侃領江州剌史使各帥所統以躡敦後敦至石頭欲攻劉隗杜弘言於敦曰劉隗死士衆多未易可克不如攻石頭周札少恩兵不為用攻之必敗札敗則隗自走矣敦從之以弘為前鋒攻石頭札果開門納弘敦據石頭歎曰吾不復得為盛德事矣謝鯤曰何為其然也但使自今已往日忘日去耳帝命刁協劉隗戴淵帥衆攻石頭王導周顗郭逸虞潭等三道出戰協等兵皆大敗太子紹聞之欲自帥將士決戰升車將出中庶子溫嶠執鞚諌曰殿下國之儲副奈何以身輕天下抽劒斬鞅乃止敦擁兵不朝放士卒劫掠宫省奔散惟安東將軍劉超案兵直衛及侍中二人侍帝側帝脫戎衣著朝服顧而言曰欲得我處當早言何至害民如此又遣使謂敦曰公若不忘本朝於此息兵則天下尚可共安如其不然朕當歸琅邪以避賢路刁協劉隗既敗俱入宫見帝於太極東除帝執協隗手流涕嗚咽勸令避禍協曰臣當守死不敢有二帝曰今事逼矣安可不行乃令給協隗人馬使自為計協老不堪騎乘素無恩紀募從者皆委之行至江乘為人所殺送首於敦隗奔後趙官至太子太傅而卒帝令公卿百官詣石頭見敦敦謂戴淵曰前日之戰有餘力乎淵曰豈敢有餘但力不足耳敦曰吾今此舉天下以為何如淵曰見形者謂之逆體誠者謂之忠敦笑曰卿可謂能言又謂周顗曰伯仁卿負我顗曰公戎車犯順下官親帥六軍不能其事使王旅奔敗以此負公辛未大赦以敦為丞相都督中外諸軍録尚書事江州牧封武昌郡公並讓不受𥘉西都覆沒四方皆勸進於帝敦欲專國政忌帝年長難制欲更議所立王導不從及敦克建康謂導曰不用吾言幾至覆族敦以太子有勇略為朝野所嚮欲誣以不孝而廢之大會百官問溫嶠曰皇太子以何德稱聲色俱厲嶠曰鉤深致逺蓋非淺局所量以禮觀之可謂孝矣衆皆以為信然敦謀遂沮帝召周顗於廣室謂之曰近日大事二宫無恙諸人平安大將軍固副所望邪顗曰二宫自如明詔臣等尚未可知護軍長史郝嘏等勸顗避敦顗曰吾僃位大臣朝廷喪敗寧可復草間求活外投胡越邪敦參軍吕猗嘗為臺郎性姦諂戴淵為尚書惡之猗説敦曰周顗戴淵皆有髙名足以惑衆近者之言曽無怍色公不除之恐必有再舉之憂敦素忌二人之才心頗然之從容問王導曰周戴南北之望當登三司無疑也導不答又曰若不三司止應令僕邪又不答敦曰若不爾正當誅爾又不答丙子敦遣部將陳郡鄧嶽收顗及淵先是敦謂謝鯤曰吾當以周伯仁為尚書令戴若思為僕射是日又問鯤近來人情何如鯤曰明公之舉雖欲大存社稷然悠悠之言實未逹髙義若果能舉用周戴則羣情怗然矣敦怒曰君粗踈邪二子不相當吾已收之矣鯤愕然自失參軍王嶠曰濟濟多士文王以寧奈何戮諸名士敦大怒欲斬嶠衆莫敢言鯤曰明公舉大事不戮一人嶠以獻替忤旨便以釁鼓不亦過乎敦乃釋之黜為領軍長史嶠渾之族孫也顗被收路經太廟大言曰賊臣王敦傾覆社稷枉殺忠臣神祇有靈當速殺之收人以戟傷其口血流至踵容止自若觀者皆為流涕并戴淵殺之於石頭南門之外帝使侍中王彬勞敦彬素與顗善先往哭顗然後見敦敦怪其容慘問之彬曰向哭伯仁情不能已敦怒曰伯仁自致刑戮且凡人遇汝汝何哀而哭之彬曰伯仁長者兄之親友在朝雖無謇愕亦非阿黨而赦後加之極刑所以傷惋也因勃然數敦曰兄抗旌犯順殺戮忠良圖為不軌禍及門户矣辭氣慷慨聲淚俱下敦大怒厲聲曰爾狂悖乃至此以吾為不能殺汝邪時王導在坐為之懼勸彬起謝彬曰腳痛不能拜且此復何謝敦曰腳痛孰若頸痛彬殊無懼容竟不肯拜王導後料檢中書故事乃見顗救已之表執之流涕曰吾雖不殺伯仁伯仁由我而死幽冥之中負此良友沈充拔吳國殺內史張茂初王敦聞甘卓起兵大懼卓兄子卭為敦參軍敦使卭歸説卓曰君此自是臣節不相責也吾家計急不得不爾想便旋軍襄陽當更結好卓雖慕忠義性多疑少決軍于豬口欲待諸方同出軍稽留纍旬不前敦既得建康乃遣臺使以騶虞幡駐卓軍卓聞周顗戴淵死流涕謂卭曰吾之所憂正為今日且使聖上元吉太子無恙吾臨敦上流亦未敢遽危社稷適吾徑據武昌敦勢逼必劫天子以絶四海之望不如還襄陽更思後圖即命旋軍都尉秦康與樂道融説卓曰今分兵斷彭澤使敦上下不得相赴其衆自然離散可一戰擒也將軍起義兵而中止竊為將軍不取且將軍之下士卒各求其利欲求西還亦恐不可得也卓不從道融晝夜泣諌卓不聽道融憂憤而卒卓性本寬和忽更強塞徑還襄陽意氣騷擾舉動失常識者知其將死矣王敦以西陽王羕為太宰加王導尚書令王廙為荆州剌史改易百官及諸軍鎮轉徙黜免者以百數或朝行暮改惟意所欲敦將還武昌謝鯤言於敦曰公至都以來稱疾不朝是以雖建勳而人心實有未逹今若朝天子使君臣釋然則物情皆恱服矣敦曰君能保無變乎對曰鯤近日入覲主上側席遲得見公宫省穆然必無虞也公若入朝鯤請侍從敦勃然曰正復殺君等數百人亦復何損於時竟不朝而去夏四月敦還武昌初宜都內史天門周級聞譙王氶起兵使其兄子該潛詣長沙申􅍁於氶魏乂等攻湘州急氶遣該及從事邵陵周﨑間出求救皆為邏者所得乂使﨑語城中稱大將軍已克建康甘卓還襄陽外瑗理絶﨑偽許之既至城下大呼曰援兵尋至努力堅守乂殺之乂考該至死竟不言其故周級由是獲免乂等攻戰日逼敦又送所得臺中人書疏令乂射以示氶城中知朝廷不守莫不悵惋相持且百日劉翼戰死士卒死傷相枕癸巳乂拔長沙氶等皆被執乂將殺虞悝子弟對之號泣悝曰人生會當有死今闔門為忠義之鬼亦復何恨乂以檻車載氶及易雄送武昌佐吏皆奔散惟主簿桓雄西曹書佐韓階從事武延毀服為僮從氶不離左右乂見桓雄姿貌舉止非凡人憚而殺之韓階武延執志愈固荆州剌史王廙承敦旨殺氶於道中階氶送氶喪至都葬之而去易雄至武昌意氣慷慨曽無懼容敦遣人以檄示雄而數之雄曰此實有之惜雄位微力弱不能救國難耳今日之死固所願也敦憚其辭正釋之遣就舍衆人皆賀之雄笑曰吾安得生既而敦遣人潛殺之魏乂求鄧騫甚急鄉人皆為之懼騫笑曰此欲用我耳彼新得州多殺忠良故求我以厭人望也乃往詣乂乂喜曰君古之解揚也以為别駕詔以陶侃領湘州剌史王敦止侃復還廣州加散騎常侍甘卓家人皆勸卓僃王敦卓不從悉散兵佃作聞諌輒怒襄陽太守周慮密承敦意詐言湖中多魚勸卓遣左右悉出捕魚五月乙亥慮引兵襲卓於寢室殺之傳首於敦并殺其諸子敦以從事中郎周撫督沔北諸軍事代卓鎮沔中撫訪之子也敦既得志暴慢滋甚四方貢獻多入其府將相嶽牧皆出其門以沈充錢鳳為謀主唯二人之言是從所譖無不死者以諸葛瑶鄧嶽周撫李恆謝雍為爪牙充等並凶險驕恣大起營府侵人田宅剽掠市道識者咸知其將敗焉王敦自領寧益二州都督冬十月己丑荆州刺史武陵康侯王廙卒王敦以下邳內史王邃都督青徐幽平四州諸軍事鎮淮隂衛將軍王含都督沔南諸軍事領荆州剌史武昌太守丹陽王諒為交州剌史使諒收交州剌史修湛新昌太守梁碩殺之諒誘湛斬之碩舉兵圍諒於龍編十一月以臨潁元公荀組為太尉辛酉薨罷司徒并丞相府王敦以司徒官屬為留府帝憂憤成疾閏月己丑崩司空王導受遺詔輔政帝恭儉有餘而明斷不足故大業未復而禍亂內興庚寅太子即皇帝位大赦明帝大寧元年王敦謀篡位諷朝廷徴已帝手詔徴之夏四月加敦黃鉞班劒奏事不名入朝不趨劒履上殿敦移鎮姑孰屯于湖以司空導為司徒敦自領楊州牧敦欲為逆王彬諌之甚苦敦變色目左右將收之彬正色曰君昔歲殺兄今又殺弟耶敦乃止以彬為豫章太守帝畏王敦之逼欲以郗鑒為外援拜鑒兖州剌史都督楊州江西諸軍事鎮合肥王敦忌之表鑒為尚書令八月詔徴鑒還道經姑孰敦與之論西朝人士曰樂彥輔短才耳考其實豈勝滿武秋邪鑒曰彥輔道韻平淡愍懷之廢柔而能正武秋失節之士安得擬之敦曰當是時危機交急鑒曰丈夫當死生以之敦惡其言不復相見久留不遣敦黨皆勸敦殺之敦不從鑒還臺遂與帝謀討敦王敦從子允之方總角敦愛其聰警常以自隨敦嘗夜飲允之辭醉先卧敦與錢鳯謀為逆允之悉聞其言即於卧處大吐衣面並汚鳯出敦果照視見允之卧於吐中不復疑之會其父舒拜廷尉允之求歸省父悉以敦鳯之謀白舒舒與王導俱啓帝隂為之備敦欲強其宗族陵弱帝室冬十一月徙王含為征東將軍都督揚州江西諸軍事王舒為荆州剌史監荆州沔南諸軍事王彬為江州剌史會稽內史周札一門五侯宗族強盛吳士莫與為比王敦忌之敦有疾錢鳳勸敦早除周氏敦然之周嵩以兄顗之死心常憤憤敦無子養王含子應為嗣嵩嘗於衆中言應不宜統兵敦惡之嵩與札兄子莚皆為敦從事中郎會道士李脫以妖術惑衆士民頗信事之二年春正月王敦誣周嵩周筵與李脫謀為不軌收嵩筵於軍中殺之遣參軍賀鸞就沈充於吳盡殺周札諸兄子進兵襲會稽札拒戰而死夏五月王敦疾甚矯詔拜王應為武衛將軍以自副以王含為驃騎大將軍開府儀同三司錢鳯謂敦曰脫有不諱便當以後事付應邪敦曰非常之事非常人所能為且應少年豈堪大事我死之後莫若釋兵散衆歸身朝廷保全門户上計也退還武昌收兵自守貢獻不廢中計也及吾尚存悉衆而下萬一僥幸下計也鳯謂其黨曰公之下計乃上䇿也遂與沈充定謀俟敦死即作亂又以宿衛尚多奏令三畨休二初帝親任中書令溫嶠敦惡之請嶠為左司馬嶠乃繆為勤敬綜其府事時進密謀以附其欲深結錢鳯為之聲譽每曰錢世儀精神滿腹嶠素有藻鑑之名鳯甚恱深與嶠結好會丹楊尹缺嶠言於敦曰京尹咽喉之地公宜自選其才恐朝廷用人或不盡理敦然之問嶠誰可者嶠曰愚謂無如錢鳯鳯亦推嶠嶠偽辭之敦不聽六月表嶠為丹陽尹且使伺朝廷嶠恐既去而錢鳯於後間止之因敦餞别嶠起行酒至鳯鳯未及飲嶠偽醉以手版擊鳯幘墜作色曰錢鳯何人溫太真行酒而敢不飲敦以為醉兩釋之嶠臨去與敦别涕泗橫流出閣復入者再三行後鳯謂敦曰嶠於朝廷甚密而與庾亮深交未可信也敦曰太真昨醉小加聲色何得便爾相讒嶠至建康盡以敦逆謀告帝請先為之備又與庾亮共畫討敦之謀敦聞之大怒曰吾乃為小物所欺與司徒導書曰太真别來幾日作如此事當募人生致之自拔其舌帝將討敦以問光祿勳應詹詹勸成之帝意遂決丁卯加司徒導大都督領楊州剌史以溫嶠都督東安北部諸軍事與右將軍卞敦守石頭應詹為護軍將軍都督前鋒及朱雀橋南諸軍事郗鑒行衛將軍都督從駕諸軍事庾亮領左衛將軍以吏部尚書卞壷行中軍將軍郗鑒以為軍號無益事實固辭不受請召臨淮太守蘇峻兖州剌史劉遐同討敦詔徵峻遐及徐州剌史王邃豫州剌史祖約廣陵太守陶瞻等入衛京師帝屯于中堂司徒導聞敦疾篤帥子弟為敦發哀衆以為敦信死咸有奮志於是尚書騰詔下敦府列敦罪惡曰敦輒立兄息以自承代未有宰相繼體而不由王命者也頑凶相奬無所顧忌志騁凶醜以窺神器天不長姦敦以隕斃鳯承凶宄彌復煽逆今遣司徒導等虎旅三萬十道並進平西將軍邃等精鋭三萬水陸齊勢朕親統諸軍討鳯之罪有能殺鳳送首封五千户侯諸文武為敦所授用者一無所問無或猜嫌以取誅滅敦之將士從敦彌年違離家室朕甚愍之其單丁在軍皆遣歸家終身不調其餘皆與假三年休訖還臺當與宿衛同例三畨敦見詔甚怒而病轉篤不能自將將舉兵伐京師使記室郭璞筮之璞曰無成敦素疑璞助溫嶠庾亮及聞卦凶乃問璞曰卿更筮吾壽幾何璞曰思向卦明公起事必禍不久若住武昌壽不可測敦大怒曰卿壽幾何曰命盡今日日中敦乃收璞斬之敦使錢鳯及冠軍將軍鄧嶽前將軍周撫等帥衆向京師王含謂敦曰此乃家事吾當自行於是以含為元帥鳯等問曰事克之日天子云何敦曰尚未南郊何得稱天子便盡卿兵勢保護東海王及裴妃而已乃上疏以誅姦臣溫嶠等為名秋七月壬申朔王含等水陸五萬奄至江寧南岸人情恟懼溫嶠移屯水北燒朱雀桁以挫其鋒含等不得渡帝欲親將兵擊之聞橋已絶大怒嶠曰今宿衛寡弱徵兵未至若賊豕突危及社稷宗廟且恐不保何愛一橋乎司徒導遺含書曰近承大將軍困篤或云已有不諱尋知錢鳯大嚴欲肆姦逆謂兄當抑制不逞還藩武昌今乃與犬羊俱下兄之此舉謂可得如大將軍昔年之事乎昔年佞臣亂朝人懷不寧如導之徒心思外濟今則不然大將軍來屯于湖漸失人心君子危怖百姓勞弊臨終之日委重安期安期斷乳幾日又於時望便可襲宰相之迹邪自開闢以來頗有宰相以孺子為之者乎諸有耳者皆知將為禪代非人臣之事也先帝中興遺愛在民聖主聰明德洽朝野兄乃欲妄萌逆節凡在人臣誰不憤歎導門户小大受國厚恩今日之事明目張膽為六軍之首寧為忠臣而死不為無賴而生矣含不答或以為王含錢鳯衆力百倍苑城小而不固宜及軍勢未成大駕自出拒戰郗鑒曰羣逆縱逸勢不可當可以謀屈難以力競且含等號令不一抄盜相尋吏民懲往年暴掠皆人自為守乘逆順之勢何憂不可且賊無經略逺圖惟恃豕突一戰曠日持久必啓義士之心令智力得展今以此弱力敵彼強冦決勝負於一朝定成敗於呼吸萬一蹉跌雖有申胥之徒義存投袂何補於既往哉帝乃止帝帥諸軍出屯南皇堂癸酉夜募壯士遣將軍假秀中軍司馬曹渾等帥甲卒千人渡水掩其未備平旦戰於越城大破之斬其前鋒將何康秀匹磾之弟也敦聞含敗大怒曰我兄老婢耳門户衰丗事去矣顧謂參軍吕寶曰我當力行因作勢而起困乏復卧乃謂其舅少府羊鑒及王應曰我死應便即位先立朝廷百官然後營葬事敦尋卒應袐不發喪裹尸以席蠟塗其外埋於廳事中與諸葛瑶等日夜縱酒淫樂帝使吳興沈楨説沈充許以為司空充曰三司具瞻之重豈吾所任幣厚言甘古人所畏也且丈夫共事終始當同豈可中道改易人誰容我乎遂舉兵趣建康宗正卿虞潭以疾歸會稽聞之起兵餘姚以討充帝以潭領會稽內史前安東將軍劉超宣城內史鍾雅皆起兵以討充義興人周蹇殺王敦所署太守劉芳平西將軍祖約逐敦所署淮南太守任台沈充師衆萬餘人與王含軍合司馬顧揚説充曰今舉大事而天子已扼其咽喉鋒摧氣沮相持日久必致禍敗今若決破柵塘因湖水以灌京邑乘水勢縱舟師以攻之此上䇿也藉初至之鋭并東西軍之力十道俱進衆寡過倍理必摧陷中䇿也轉禍為福召錢鳯計事因斬之以降下䇿也充皆不能用揚逃歸于吳丁亥劉遐蘇峻等帥精卒萬人至帝夜見勞之賜將士各有差沈充錢鳯欲因北軍初到疲困擊之乙未夜充鳯從竹格渚渡淮護軍將軍應詹建威將軍趙胤等拒戰不利充鳯至宣陽門拔柵將戰劉遐蘇峻自南塘橫擊大破之赴水死者三千人遐又破沈充于青溪尋陽太守周光聞敦舉兵帥千餘人來赴既至求見敦王應辭以疾光退曰今我逺來而不得見公其死乎遽見其兄撫曰王公已死兄何為與錢鳯作賊衆皆愕然丙申王含等燒營夜遁丁酉帝還宫大赦惟敦黨不原命庾亮督蘇峻等追沈充於吳興溫嶠督劉遐等追王含錢鳯於江寧分命諸將追其黨與劉遐軍人頗縱虜掠嶠責之曰天道助順故王含勦絶豈可因亂為亂也遐惶恐拜謝王含欲奔荆州王應曰不如江州含曰大將軍平素與江州云何而欲歸之應曰此乃所以宜歸也江州當人強盛時能立同異此非常人所及今覩困厄必有愍惻之心荆州守文豈能意外行事邪含不從遂奔荆州王舒遣軍迎之沉含父子於江王彬聞應當來密具舟以待之不至深以為恨錢鳯走至闔廬洲周光斬之詣闕自贖沈充走失道誤入故將吳儒家儒誘充內重壁中因笑謂充曰三千户侯矣充曰爾以義存我我家必厚報汝若以利殺我我死汝族滅矣儒遂殺之傳首建康敦黨悉平充子徑當坐誅鄉人錢舉匿之得免其後徑竟滅吳氏有司發王敦瘞出尸焚其衣冠跽而斬之與沈充首同懸于南桁郗鑒言於帝曰前朝誅楊駿等皆先極官刑後聽私殯臣以為王誅加於上私義行於下宜聽敦家收葬於義為弘帝許之司徒導等皆以討敦功受封賞周撫與鄧嶽俱亡周光欲資給其兄而取嶽撫怒曰我與伯山同亡何不先斬我會嶽至撫出門遙謂之曰何不速去今骨肉尚欲相危況他人乎嶽回舟而走與撫共入西陽蠻中明年詔原敦黨撫嶽出首得免死禁錮故吳內史張茂妻陸氏傾家産帥茂部曲為先登以討沈充報其夫仇充敗陸氏詣闕上書為茂謝不克之責詔贈茂太僕有司奏王彬等敦之親族皆當除名詔曰司徒導以大義滅親猶將百世宥之況彬等皆公之近親乎悉無所問有詔王敦綱紀除名參佐禁錮溫嶠上疏曰王敦剛愎不仁忍行殺戮朝廷所不能制骨肉所不能諌處其朝者恆懼危亡故人士結舌道路以目誠賢人君子道窮數盡遵養時晦之辰也原其私心豈遑晏處如陸玩劉胤郭璞之徒常與臣言僃知之矣必其贊導凶悖自當正以典刑如其枉陷姦黨謂宜施之寬貸臣以玩等之誠聞於聖聽當受同賊之責苟默而不言實負其心惟陛下仁聖裁之郗鑒以為先王立君臣之教貴於伏節死義王敦佐吏雖多逼迫然進不能止其逆謀退不能脫身逺遁準之前訓宜加義責帝卒從嶠議冬十月以司徒導為太保領司徒加殊禮西陽王羕領太尉應詹為江州剌史劉遐為徐州剌史代王邃鎮淮陰蘇峻為歷陽內史加庾亮護軍將軍溫嶠前將軍導固辭不受應詹至江州吏民未安詹撫而懷之莫不恱服三年春二月贈故譙王氶甘卓戴淵周顗虞望郭璞王澄等官周札故吏為札訟冤尚書卞壷議以為札守石頭開門延冦不當贈諡司徒導以為往年之事敦姦逆未彰自臣等有識以上皆所未悟與札無異既悟其姦札便以身許國尋取梟夷臣謂宜與周戴同例郗鑒以為周戴死節周札延冦事異賞均何以勸沮如司徒議謂往年有識以上皆與札無異則譙王周戴皆應受責何贈諡之有今三臣既褒則札宜受貶明矣導曰札與譙王周戴雖所見有異同皆人臣之節也鑒曰敦之逆謀履霜日久緣札開門令王師不振若敦前者之舉義同桓文則先帝可為幽厲邪然卒用導議贈札衛尉蘇峻之亂晉成帝咸和元年初王導輔政以寬和得衆及庾亮用事任法裁物頗失人心豫州剌史祖約自以名輩不後郗卞而不豫顧命又望開府復不得及諸表請多不見許遂懷怨望及遺詔褒進大臣又不及約與陶侃二人皆疑庾亮刪之歷陽內史蘇峻有功於國威望漸著有鋭卒萬人器械甚精朝廷以江外寄之而峻頗懷驕溢有輕朝廷之志招納亡命衆力日多皆仰食縣官運漕相屬稍不如意輒肆忿言亮既疑峻約又畏侃之得衆八月以丹楊尹溫嶠為都督江州諸軍事江州剌史鎮武昌尚書僕射王舒為會稽內史以廣聲援又修石頭以備之丹楊尹阮孚以太后臨朝政出舅族謂所親曰今江東創業尚淺主幼時艱庾亮年少德信未孚以吾觀之亂將作矣遂求出為廣州剌史孚咸之子也冬十月南頓王宗自以失職怨望又素與蘇峻善庾亮欲誅之宗亦欲廢執政御史中丞鍾雅劾宗謀反亮使右衛將軍趙胤收之宗以兵拒戰為胤所殺貶其族為馬氏三子綽超演皆廢為庶人免太宰西陽王羕降封弋陽縣王大宗正虞胤左遷桂陽太守宗宗室近屬羕先帝保傅亮一旦翦黜由是愈失逺近之心宗黨卞闡亡奔蘇峻亮符峻送闡峻保匿不與宗之死也帝不之知久之帝問亮曰常日白頭公何在亮對以謀反伏誅帝泣曰舅言人作賊便殺之人言舅作賊當如何亮懼變色二年冬十月庾亮以蘇峻在歷陽終為禍亂欲下詔徵之訪於司徒導導曰峻猜險必不奉詔不若且苞容之亮言於朝曰峻狼子野心終必為亂今日徴之縱不順命為禍猶淺若復經年不可復制猶七國之於漢也朝臣無敢難者獨光祿大夫卞壼爭之曰峻擁強兵逼近京邑路不終朝一旦有變易為蹉跌宜深思之亮不從壼知必敗與溫嶠書曰元規召峻意定此國之大事峻已出狂意而召之是更速其禍也必縱毒蠚以向朝廷朝廷威力雖盛不知果可擒不王公亦同此情吾與之爭甚懇切不能如之何本出足下以為外援而今更恨足下在外不得相與共諌止之或當相從耳嶠亦纍書上亮舉朝以為不可亮皆不聽峻聞之遣司馬何仍詣亮曰討賊外任逺近惟命至於內輔實非所堪亮不許召北中郎將郭默為後將軍領屯騎校尉司徒右長史庾冰為吳國內史皆將兵以備峻冰亮之弟也於是下優詔徴峻為大司農加散騎常侍位特進以弟逸代領部曲峻上表曰昔明皇帝親執臣手使臣北討胡冦今中原未靖臣何敢即安乞補青州界一荒郡以展鷹犬之用復不許峻嚴裝將赴召猶豫未決參軍任讓謂峻曰將軍求處荒郡而不見許事勢如此恐無生路不如勒兵自守阜陵令厈術亦勸峻反峻遂不應命溫嶠聞之即欲帥衆下衛建康三吳亦欲起義兵亮並不聽而報嶠書曰吾憂西陲過於歷陽足下無過雷池一步也朝廷遣使諭峻峻曰臺下云我欲反豈得活邪我寧山頭望廷尉不能廷尉望山頭往者國家危如纍卵非我不濟狡兔既死獵犬宜烹但當死報造謀者耳峻知祖約怨朝廷乃遣參軍徐會推崇約請共討庾亮約大喜其從子智衍並勸成之譙國內史桓宣謂智曰本以強胡未滅將戮力討之使君若欲為雄霸何不助國討峻則威名自舉今乃與峻俱反此安得久乎智不從宣詣約請見約知其欲諌拒而不內宣遂絶約不與之同十一月約遣兄子沛內史渙女壻淮南太守許柳以兵會峻逖妻柳之姊也固諌不從詔復以卞壼為尚書令領右衛將軍以會稽內史王舒行楊州剌史事吳興太守虞潭督三吳等諸郡軍事尚書左丞孔坦司徒司馬舟楊陶回言於王導請及峻未至急斷阜陵守江西當利諸口彼少我衆一戰決矣若峻未來可往逼其城今不先往峻必先至峻至則人心危駭難與戰矣此時不可失也導然之庾亮不從十二月辛亥蘇峻使其將韓晃張健等襲陷姑孰取鹽米亮方悔之壬子彭城王雄章武王休叛奔峻雄釋之子也庚申京師戒嚴假庾亮節都督征討諸軍事以左衛將軍趙胤為歷陽太守使左將軍司馬流將兵據慈湖以拒峻以前射聲校尉劉超為左衛將軍侍中禇翜典征討軍事亮使弟翼以白衣領數百人僃石頭宣城內史桓彞欲起兵以赴朝廷其長史禆惠以郡兵寡弱山民易擾謂宜且案甲以待之彞厲色曰見無禮於其君者若鷹鸇之逐鳥雀今社稷危逼義無宴安辛未彞進屯蕪湖韓晃擊破之因進攻宣城彞退保廣德晃大掠諸縣而還徐州剌史郗鑒欲帥所領赴難詔以北寇不許三年春正月溫嶠入救建康軍于尋陽韓晃襲司馬流於慈湖流素懦怯將戰食炙不知口處兵敗而死丁未蘇峻帥祖渙許柳等衆二萬人濟自橫江登牛渚軍于陵口臺兵禦之屢敗二月庚戌峻至蔣陵覆舟山陶回謂庾亮曰峻知石頭有重戍不敢直下必向小丹楊南道步來宜伏兵邀之可一戰擒也亮不從峻果自小丹楊來迷失道夜行無復部分亮聞乃悔之朝士以京邑危逼多遣家人入東避難左衛將軍劉超獨遷妻孥入居宮內詔以卞壼都督大桁東諸軍事與侍中鍾雅帥郭默趙胤等軍及峻戰于西陵壼等大敗死傷以千數丙辰峻攻青溪柵卞壼帥諸軍拒擊不能禁峻因風縱火燒臺省及諸營寺署一時蕩盡壼背癕新愈創猶未合力疾帥左右苦戰而死二子昣旴隨父後亦赴敵而死其母撫尸哭曰父為忠臣子為孝子夫何恨乎丹楊尹羊曼勒兵守雲龍門與黃門侍郎周導盧江太守陶瞻皆戰死庾亮帥衆將陳于宜陽門內未及成列士衆皆棄甲走亮與弟懌條翼及郭默趙胤俱奔尋陽將行顧謂鍾雅曰後事深以相委雅曰棟折榱崩誰之咎也亮曰今日之事不容復言亮乘小船亂兵相剝掠亮左右射賊誤中柂工應弦而倒船上咸失色欲散亮不動徐曰此手何可使著賊衆乃安峻兵入臺城司徒導謂侍中禇翜曰至尊當御正殿君可啓令速出翜即入上閣躬自抱帝登太極前殿導及光祿大夫陸曄荀嵩尚書張闓共登御床擁衛帝以劉超為右衛將軍使與鍾雅禇翜侍立左右太常孔愈朝服守宗廟時百官奔散殿省蕭然峻兵既入叱禇翜令下翜正立不動呵之曰蘇冠軍來覲至尊軍人豈得侵逼由是峻兵不敢上殿突入後宫宫人及太后左右侍人皆見掠奪峻兵驅役百官光祿勳王彬等皆𬒳捶撻令負簷登蔣山祼剝士女皆以壞席苫草自鄣無草者坐地以土自覆哀號之聲震動內外初姑孰既陷尚書左丞孔坦謂人曰觀峻之勢必破臺城自非戰士不須戎服及臺城陷戎服者多死白衣者無他時官有布二十萬匹金銀五十斤錢億萬絹數萬匹他物稱是峻盡費之太官惟有燒餘米數石以供御膳或謂鍾雅曰君性亮直必不容於冦讎盍早為之計雅曰國亂不能匡君危不能濟各遁逃以求免何以為臣丁巳峻稱詔大赦惟庾亮兄弟不在原例以王導有德望猶使以本官居已之右祖約為侍中太尉尚書令峻自為驃騎將軍録尚書事許柳為丹楊尹馬雄為左衛將軍祖渙為驍騎將軍弋陽王羕詣峻稱述峻功峻復以羕為西陽王太宰録尚書事峻遣兵攻吳國內史庾冰冰不能禦棄郡奔會稽至浙江峻購之甚急吳鈴下卒引冰入船以蘧蒢覆之吟嘯鼓枻泝流而去每逢邏所輒以杖叩船曰何處覔庾冰庾冰正在此人以為醉不疑之冰僅免峻以侍中蔡謨為吳國內史溫嶠聞建康不守號慟人有候之者悲哭相對庾亮至尋陽宣太后詔以嶠為驃騎將軍開府儀同三司又加徐州剌史郗鑒司空嶠曰今日當以滅賊為急未有功而先拜官將何以示天下遂不受嶠素重亮亮雖奔敗嶠愈推奉之分兵給亮三月蘇峻南屯于湖夏四月庾亮溫嶠將起兵討蘇峻而道路斷絶不知建康聲聞會南陽范汪至尋陽言峻政令不一貪暴縱橫滅亡已兆雖強易弱朝廷有倒懸之急宜時進討嶠深納之亮辟汪參護軍事亮嶠互相推為盟主嶠從弟充曰陶征西位重兵強宜共推之嶠乃遣督護王愆期詣荆州邀陶侃與之同赴國難侃猶以不預顧命為恨答曰吾疆埸外將不敢越局嶠屢説不能回乃順侃意遣使謂之曰仁公且守僕當先下使者去已二日平南參軍榮陽毛寶别使還聞之説嶠曰凡舉大事當與天下共之師克在和不宜異同假令可疑猶當外示不覺況自為攜二邪宜急追信改書言必應俱進若不及前信當更遣使嶠意悟即追使者改書侃果許之遣督護龔登帥兵詣嶠嶠有衆七千於是列上尚書陳祖約蘇峻罪狀移告征鎮灑泣登舟陶侃復追龔登還嶠遺侃書曰夫軍有進而無退可增而不可減近已移檄逺近言於盟府刻後月半大舉諸郡軍並在路次惟須仁公軍至便齊進耳仁公今召軍還疑惑逺近成敗之由將在於此僕才輕任重實憑仁公篤愛逺稟成規至於首啓戎行不敢有辭僕與仁公如首尾相衛脣齒相依也恐或者不逹髙旨將謂仁公緩於討賊此聲難追僕與仁公並受方嶽之任安危休戚理既同之且自頃之顧綢繆往來情深義重一旦有急亦望仁公悉衆見救況社稷之難乎今日之憂豈惟僕一州文武莫不翹企假令此州不守約峻樹置官長於此荆楚西逼強胡東接逆賊因之以飢饉將來之危乃當甚於此州之今日也仁公進當為大晉之忠臣參桓文之功退當以慈父之情雪愛子之痛今約峻凶逆無道痛感天地人心齊一咸皆切齒今之進討若以石投卵耳苟復召兵還是為敗於幾成也願深察所陳王愆期謂侃曰蘇峻豺狼也如得遂志四海雖廣公寧有容足之地乎侃深感悟即戎服登舟瞻喪至不臨晝夜兼道而進郗鑒在廣陵城孤糧少逼近胡冦人無固志得詔書即流涕誓衆入赴國難將士爭奮遣將軍夏侯長等間行謂溫嶠曰或聞賊欲挾天子東入會稽當先立營壘屯據要害既防其越逸又斷賊糧運然後清野堅壁以待賊賊攻城不拔野無所掠東道既斷糧運自絶必自潰矣嶠深以為然五月陶侃帥衆至尋陽議者咸謂侃欲誅庾亮以謝天下亮甚懼用溫嶠計詣侃拜謝侃驚止之曰庾元規乃拜陶士行邪亮引咎自責風止可觀侃不覺釋然曰君侯修石頭以擬老子今日反見求邪即與之談宴終日遂與亮嶠同趣建康戎卒四萬旌旗七百餘里鉦鼓之聲震於逺近蘇峻聞西方兵起用參軍賈寧計自姑孰還據石頭分兵以拒侃等乙未峻逼遷帝於石頭司徒導固爭不從帝哀泣升車宫中慟哭時天大雨道路泥濘劉超鍾雅步侍左右峻給馬不肯乘而悲哀慷慨峻聞而惡之然未敢殺也以其親信許方等輔司馬督殿中監外託宿衛內實防禦超等峻以倉屋為帝宫日來帝前肆醜言劉超鍾雅與右光祿大夫荀嵩金紫光祿大夫華恆尚書荀邃侍中丁潭侍從不離帝側時飢饉米貴峻問遺超一無所受繾綣朝夕臣節愈恭雖居幽厄之中超猶啓帝授孝經論語峻使左光祿大夫陸曄守留臺逼迫居民盡聚之後苑使厈術守苑城尚書左丞孔坦奔陶侃侃以為長史𥘉蘇峻遣尚書張闓權督東軍司徒導密令以太后詔諭三吳吏士使起義兵救天子會稽內史王舒以庾冰行奮武將軍使將兵一萬西渡浙江於是吳興太守虞潭吳國內史蔡謨前義興太守顧衆等皆舉兵應之潭母孫氏謂潭曰汝當捨生取義勿以吾老為纍盡遣其家僮從軍鬻其環珮以為軍資謨以庾冰當還舊任即去郡以讓冰蘇峻聞東方兵起遣其將管商張健弘徽守拒之虞潭等與戰互有勝負未能得前陶侃溫嶠軍于茄子浦嶠以南兵習水蘇峻兵便步令將士有上岸者死會峻送米萬斛饋祖約約遣司馬桓撫等迎之毛寶帥千人為嶠前鋒告其衆曰兵法軍令有所不從豈可視賊可擊不上岸擊之邪乃擅往襲撫悉獲其米斬獲萬計約由是飢乏嶠表寶為廬江太守陶侃表王舒監浙東軍事虞潭監浙西軍事郗鑒都督楊州八郡諸軍事令舒潭皆受鑒節度鑒帥衆渡江與侃等會于茄子浦雍州剌史魏該亦以兵會之丙辰侃等舟師直指石頭至于蔡洲侃屯查浦嶠屯沙門浦峻登烽火樓望見士衆之盛有懼色謂左右曰吾本知溫嶠能得衆也庾亮遣督護王彰擊峻黨張曜反為所敗亮送節傳以謝侃侃答曰古人三敗君侯始二當今事急不宜數爾亮司馬陳郡殷融詣侃謝曰將軍為此非融等所裁王彰至曰彰自為之將軍不知也侃曰昔殷融為君子王彰為小人今王彰為君子殷融為小人宣城內史桓彞聞京城不守慷慨流涕進屯涇縣時州郡多遣使降蘇峻禆惠復勸彞宜且與通使以紓交至之禍彞曰吾受國厚恩義在致死焉能忍恥與逆臣通問如其不濟此則命也彞遣將軍俞縱守蘭石峻遣其將韓晃攻之縱將敗左右勸縱退軍縱曰吾受桓侯厚恩當以死報吾之不可負桓侯猶桓侯之不負國也遂力戰而死晃進軍攻彞六月城陷執彞殺之諸軍𥘉至石頭即欲決戰陶侃曰賊衆方盛難與爭鋒當以歲月智計破之既而屢戰無功監軍部將李根請築白石壘侃從之夜築壘至曉而成聞峻軍嚴聲諸將咸懼其來攻孔坦曰不然若峻攻壘必須東北風急令我水軍不得往救今天清靜賊必不來所以嚴者必遣軍出江乘掠京口以東矣已而果然侃使庾亮以二千人守白石峻帥步騎萬餘四靣攻之不克王舒虞潭等數與峻兵戰不利孔坦曰本不須召郗公遂使東門無限今宜遣還雖晚猶勝不也侃乃令鑒與後將軍郭默還據京口立大業曲阿庱亭三壘以分峻之兵勢使郭默守大業壬辰魏該卒祖約遣祖渙桓撫襲湓口陶侃聞之將自擊之毛寶曰義軍恃公公不可動寶請討之侃從之渙撫過皖因攻譙國內史桓宣寶往救之為渙撫所敗箭貫寶髀徹鞍寶使人踏鞍拔箭血流滿鞾還擊渙撫破走之宣乃得出歸于溫嶠寶進攻祖約軍于東關拔合肥戍會嶠召之復歸石頭祖約諸將隂與後趙通謀許為內應後趙將石聰石堪引兵濟準攻壽春秋七月約衆潰奔歷陽聰等虜壽春二萬餘户而歸蘇峻腹心路永厈術賈寧聞祖約敗恐事不濟勸峻盡誅司徒導等諸大臣更樹腹心峻雅敬導不許永等更二於峻導使參軍袁耽濳誘永使歸順九月戊申導携二子與永皆奔白石耽渙之曽孫也陶侃溫嶠等與蘇峻久相持不決峻分遣諸將東西攻掠所嚮多捷人情恟懼朝士之奔西軍者皆曰峻狡黠有膽決其徒驍勇所向無敵若天討有罪則峻終滅亡止以人事言之未易除也溫嶠怒曰諸君怯懦乃更譽賊及纍戰不勝嶠亦憚之嶠軍食盡貸於陶侃侃怒曰使君前云不憂無良將及兵食惟欲得老僕為主耳今數戰皆北良將安在荆州接胡蜀二虜當備不虞若復無食僕便欲西歸更思良算徐來殄賊不為晚也嶠曰凡師克在和古之善教也光武之濟昆陽曹公之拔官渡以寡敵衆杖義故也峻約小豎凶逆滔天何憂不滅峻驟勝而驕自謂無前今挑之戰可一鼓而擒也奈何捨垂立之功設進退之計乎且天子幽逼社稷危殆乃四海臣子肝腦塗地之日嶠等與公並受國恩事若克濟則臣主同祚如其不捷當灰身以謝先帝耳今之事勢義無旋踵譬如騎虎安可中下哉公若違衆獨返人心必沮沮衆敗事義旗將回指於公矣毛寶言於嶠曰下官能留陶公乃往説侃曰公本應鎮蕪湖為南北勢援前既已下勢不可還且軍政有進無退非直整齊三軍示衆必死而已亦謂退無所據終至滅亡往者杜韜非不強盛公竟滅之何至於峻獨不可破邪賊亦畏死非皆勇健公可試與寶兵使上岸斷賊資糧若寶不立效然後公去人心不恨矣侃然之加寶督護而遣之竟陵太守李陽説侃曰今大事若不濟公雖有粟安得而食諸侃乃分米五萬石以餉嶠軍毛寶燒峻句容湖孰積聚峻軍乏食侃遂留不去張健韓晃等急攻大業壘中乏水人飲糞汁郭默懼潛突圍出外留兵守之郗鑒在京口軍士聞之皆失色參軍曹納曰大業京口之扞蔽也一旦不守則賊兵徑至不可當也請還廣陵以俟後舉鑒大會僚佐責納曰吾受先帝顧託之重正復捐軀九泉不足報塞今強冦在近衆心危逼君腹心之佐而生長異端當何以帥先義衆鎮一三軍邪將斬之久乃得釋陶侃將救大業長史殷羡曰吾兵不習步戰救大業而不捷則大事去矣不如急攻石頭則大業自解侃從之羡融之兄也庚午侃督水軍向石頭庾亮溫嶠趙胤帥步兵萬人從白石南上欲挑戰峻將八千人逆戰遣其子碩及其將厈孝分兵先薄趙胤軍敗之峻方勞其將士乘醉望見胤走曰孝能破賊我更不如邪因舍其衆與數騎北下突陳不得入將回趨白木陂馬躓侃部將彭丗李千等投之以矛峻墜馬斬首臠割之焚其骨三軍皆稱萬歲餘衆大潰峻司馬任讓等共立峻弟逸為主閉城自守溫嶠乃立行臺布告逺近凡故吏二千石以下皆令赴臺於是至者雲集韓晃聞峻死引兵趣石頭管啇弘徽攻庱亭壘督護李閎輕車長史滕含擊破之含修之孫也啇走詣庾亮降餘衆皆歸張健四年春正月光祿大夫陸曄及弟尚書左僕射玩説厈術以苑城附于西軍百官皆赴之推曄督宫城軍事陶侃命毛寶守南城鄧嶽守西城右衛將軍劉超侍中鍾雅與建康令管斾等謀奉帝出赴西軍事泄蘇逸使其將平原任讓將兵入宫收超雅帝抱持悲泣曰還我侍中右衛讓奪而殺之初讓少無行太常華恆為本州大中正黜其品及讓為蘇峻將乘勢多所誅殺見恆輒恭敬不敢縱暴及鍾劉之死蘇逸欲并殺恆讓盡心救衛恆乃得免冠軍將軍趙胤遣部將甘苗擊祖約于歷陽戊辰約夜帥左右數百人奔後趙其將牽騰帥衆出降蘇逸蘇碩韓晃并力攻臺城焚太極東堂及祕閣毛寶登城射殺數千人晃謂寶曰君名勇果何不出鬪寶曰君名健將何不入鬪晃笑而退二月丙戌諸軍攻石頭建威長史滕含擊蘇逸大破之蘇碩帥驍勇數百渡淮而戰溫嶠擊斬之韓晃等懼以其衆就張健於曲阿門隘不得出更相蹈藉死者萬數西軍獲蘇逸斬之滕含部將曹據抱帝奔溫嶠船羣臣見帝頓首號泣請罪殺西陽王羕并其二子播充孫嵩及彭城王雄陶侃與任讓有舊為請其死帝曰是殺吾侍中右衛者不可救也乃殺之司徒導入石頭令取故節陶侃笑曰蘇武節似不如是導有慙色丁亥大赦張健疑弘徽等二於已皆殺之帥舟師自延陵將入吳興乙未揚烈將軍王允之與戰大破之獲男女萬餘口健復與韓晃馬雄等輕軍西趨故鄣郗鑒遣參軍李閎追之及於平陵山皆斬之是時宫闕灰燼以建平園為宫溫嶠欲遷都豫章三吳之豪請都會稽二論紛紜未決司徒導曰孫仲謀劉玄德俱言建康王者之宅古之帝王不必以豐儉移都苟務本節用何憂雕弊若農事不修則樂土為墟矣且北冦遊魂伺我之隙一旦示弱竄於蠻越求之望實懼非良計今特宜鎮之以靜羣情自安由是不復徙都以禇翜為丹楊尹時兵火之後民物雕殘翜收集散亡京邑遂安三月壬子論平蘇峻攻以陶侃為侍中太尉封長沙郡公加都督交廣寧州諸軍事郗鑒為侍中司空南昌縣公溫嶠為驃騎將軍開府儀同三司加散騎常侍始安郡公陸曄進爵江陵公自餘賜爵侯伯子男者甚衆卞壼及二子眕盱桓彞劉超鍾雅羊曼陶瞻皆加贈諡路永匡術賈寧皆蘇峻之黨也峻未敗永等去峻歸朝廷王導欲賞以官爵溫嶠曰永等皆峻之腹心首為亂階罪莫大焉晚雖改悟未足以贖前罪得全首領為幸多矣豈可復褒寵之哉導乃止陶侃以江陵偏逺移鎮巴陵朝議欲留溫嶠輔政嶠以王導先帝所任固辭還藩又以京邑荒殘資用不給乃留資蓄具器用而後旋于武昌帝之出石頭也庾亮見帝稽顙哽咽詔亮與大臣俱升御座明日亮復泥首謝罪乞骸骨欲闔門投竄山海帝遣尚書侍中手詔慰喻曰此社稷之難非舅之責也亮上疏自陳祖約蘇峻縱肆凶逆罪由臣發寸斬屠戮不足以謝七廟之靈塞四海之責朝廷復何理齒臣於人次臣亦何顔自次於人理願陛下雖垂寬宥全其首領猶宜棄之任其自存自沒則天下粗知勸戒之綱矣優詔不許亮又欲遁逃山海自暨陽東出詔有司録奪舟船亮乃求外鎮自效出為都督豫州揚州之江西宣城諸軍事豫州剌史領宣城內史鎮蕪湖陶侃溫嶠之討蘇峻也移檄征鎮使各引兵入援湘州剌史益陽侯卞敦擁兵不赴又不給軍糧遣督護將數百人隨大軍而已朝野莫不怪歎及峻平陶侃奏敦阻軍顧望不赴國難請檻車收付廷尉王導以喪亂之後宜加寬宥轉敦安南將軍廣州剌史病不赴徵為光祿大夫領少府敦憂愧而卒追贈本官加散騎常侍諡曰敬臣光曰庾亮以外戚輔政首發禍機國破君危竄身茍免卞敦位列方鎮兵糧俱足朝廷顚覆坐觀勝負人臣之罪孰大於此既不能明正典刑又以寵祿報之晉室無政亦可知矣任是責者豈非王導乎燕討假遼討宇文附晉明帝太寧三年冬十一月慕容廆與假氏方睦為假牙謀使之徙都牙從之即去令支國人不樂假疾陸眷之孫遼欲奪其位以徙都為牙罪十二月帥國人攻牙殺之自立假氏自務勿塵以來日益強盛其地西接漁陽東界遼水所統胡晉三萬餘户控弦四五萬騎成帝咸和八年夏五月甲寅遼東武宣公慕容廆卒六月世子皓以平北將軍行平州剌史督攝部內慕容皓初嗣位用法嚴峻國人多不自安主簿皇甫真切諌不聽皓庶兄建威將軍翰母弟征虜將軍仁有勇略屢立戰功得士心季弟昭有才藝皆有寵於廆皓忌之翰歎曰吾受事於先公不敢不盡力幸賴先公之靈所嚮有功此乃天贊吾國非人力也而人謂吾之所辦以為雄才難制吾豈可坐而待禍邪乃與其子出奔假氏假遼素聞其才冀收其用甚愛重之仁自平郭來奔喪謂昭曰吾等素驕多無禮於嗣君嗣君剛嚴無罪猶可畏況有罪乎昭曰吾輩皆體正嫡於國有分兄素得士心我在內未為所疑伺其間隙除之不難兄趣舉兵以來我為內應事成之日與我遼東男子舉事不克則死不能效建威偷生異域也仁曰善遂還平郭閏月仁舉兵而西或以仁昭之謀告皓皓未之信遣使按驗仁兵已至黃水知事露殺使者還據平郭皓賜昭死遣軍祭酒封奕尉撫遼東以髙詡為廣武將軍將兵五千與庶弟建武將軍幼稚廣威將軍軍寧逺將軍汗司馬遼東佟壽共討仁與仁戰於汶城北皓兵大敗幼稚軍皆為仁所獲夀嘗為仁司馬遂降於仁前大農孫機等舉遼東城以應仁封奕不得入與汗俱還東夷校尉封抽護軍平原乙逸遼東相太原韓嶠皆棄城走於是仁盡有遼東之地假遼及鮮卑諸部皆與仁遙相應援皓追思皇甫真之言以真為平州别駕九年春二月慕容仁以司馬翟楷領東夷校尉前平州别駕龐鑒領遼東相假遼遣兵襲徒河不克復遣其弟蘭與慕容翰共攻柳城柳城都尉石琮城大慕輿埿并力拒守蘭等不克而退遼怒切責蘭等必令拔之休息二旬復益兵來攻士皆重𫀆蒙楯作飛梯四面俱進晝夜不息琮埿拒守彌固殺傷千餘人卒不能拔慕容皓遣慕容汗及司馬封奕等共救之皓戒汗曰賊氣鋭勿與爭鋒汗性驍果以千餘騎為前鋒直進封奕止之汗不從與蘭遇於牛尾谷汗兵大敗死者太半奕整陳力戰故得不沒蘭欲乘勝窮追慕容翰恐遂滅其國止之曰夫為將當務愼重審已量敵非萬全不可動今雖挫其偏師未能屈其大勢皓多權詐好為濳伏若悉國中之衆自將以拒我我縣軍深入衆寡不敵此危道也且受命之日正求此捷若違命貪進萬一取敗功名俱喪何以返面蘭曰此已成擒無有餘理卿正慮遂滅卿國耳今千年在東若進而得志吾將迎之以為國嗣終不負卿使宗廟不祀也千年者慕容仁小字也翰曰吾投身相依無復還理國之存亡於我何有但欲為大國之計且相為惜功名耳乃命所部欲獨還蘭不得已而從之夏四月慕容仁自稱平州剌史遼東公冬十一月慕容皓討遼東甲申至襄平遼東人王岌密信請降師進入城翟楷龐鑒單騎走居就新昌等縣皆降皓欲悉坑遼東民髙詡諌曰遼東之叛實非夲圖直畏仁凶威不得不從今元惡猶存始克此城遽加夷滅則未下之城無歸善之路矣皓乃止分徙遼東大姓於棘城以杜羣為遼東相安輯遺民十二月慕容仁遣兵襲新昌督護新興王寓擊走之遂徙新昌入襄平咸康二年春正月慕容皓將討慕容仁司馬髙詡曰仁叛棄君親民神共怒前此海未嘗凍自仁反以來連年凍者三矣且仁專備陸道天其或者欲使吾乘海冰以襲之也皓從之羣僚皆言涉冰危事不若從陸道皓曰吾計已決敢沮者斬壬午皓帥其弟軍師將軍評等自昌黎東踐冰而進凡三百餘里至歷林口捨輜重輕兵趣平郭去城七里候騎以告仁仁狼狽出戰張英之俘二使也仁恨不窮追及皓至仁以為皓復遣偏師輕出寇抄不知皓自來謂左右曰今兹當不使其匹馬得返矣乙未仁悉衆陳於城之西北慕容軍帥所部降於皓仁衆沮動皓從而縱擊大破之仁走其帳下皆叛遂擒之皓先為斬其帳下之叛者然後賜仁死丁衡遊毅孫機等皆仁所信用也皓執而斬之王冰自殺慕容幼慕容稚佟壽郭充翟楷龐鑒皆東走幼中道而還皓兵追及楷鑒斬之壽充奔髙麗自餘吏民為仁所詿誤者皓皆赦之封髙詡為汝陽侯夏六月假遼遣中軍將軍李詠襲慕容皓詠趣武興都尉張萌擊擒之遼别遣假蘭將步騎數萬屯柳城西回水宇文逸豆歸攻安晉以為蘭聲援皓帥步騎五萬向柳城蘭不戰而遁皓引兵北趣安晉逸豆歸棄輜重走皓遣司馬封奕帥輕騎追擊大破之皓謂諸將曰二虜恥無功必將復至宜於柳城左右設伏以待之乃遣封奕帥騎數千伏於馬兜山三月假遼果將數千騎來冦抄奕縱擊大破之斬其將榮伯保三年春三月慕容皓於乙連城東築好城以逼乙連留折衝將軍蘭勃守之夏四月段遼以車數千兩輸乙連粟蘭勃擊而取之六月遼又遣其從弟楊威將軍屈雲將精騎夜襲皓子遵於興國城遵擊破之初北平陽𥙿事假疾陸眷及遼五丗皆見尊禮遼數與皓相攻𥙿諌曰親仁善鄰國之寶也況慕容氏與我丗婚迭為甥舅皓有才德而我與之構怨戰無虛月百姓雕弊利不輔害臣恐社稷之憂將由此始願兩追前失通好如𥘉以安國息民遼不從出𥙿為北平相假遼數侵趙邊燕王皓遣揚烈將軍宋回稱藩於趙乞師以討遼自請盡帥國中之衆以會之并以其弟寧逺將軍汗為質趙王虎大悅厚加慰答辭其質遣還密期以明年四年春正月燕王皓遣都尉趙槃如趙聽師期趙王虎將擊假遼募驍勇者三萬人悉拜龍騰中郎會遼遣假屈雲襲趙幽州幽州剌史李孟退保易京虎乃以桃豹為橫海將軍王華為渡遼將軍帥舟師十萬出漂渝津支雄為龍驤大將軍姚弋仲為冠軍將軍帥步騎七萬為前鋒以伐遼三月趙槃還至棘城燕王皓引兵攻掠令支以北諸城假遼將追之慕容翰曰今趙兵在南當并力禦之而更與燕鬪燕王自將而來其士卒精鋭若萬一失利將何以禦南敵乎假蘭怒曰吾前為卿所誤以成今日之患吾不復墯卿計中矣乃悉將見衆追之皓設伏以待之大破蘭兵斬首數千級掠五千户及畜産萬計以歸趙王虎進屯金臺支雄長驅入薊假遼所署漁陽上谷代郡守相皆降取四十餘城北平相陽𥙿帥其民數千家登燕山以自固諸將恐其為後患欲攻之虎曰𥙿儒生矜惜名節恥於迎降耳無能為也遂過之至徐無假遼以弟蘭既敗不敢復戰帥妻子宗族豪大千餘家棄令支奔密雲山將行執慕容翰手泣曰不用卿言自取敗亡我固甘心令卿失所深以為愧翰北奔宇文氏遼左右長史劉群盧諶崔恱等封府庫請降虎遣將軍郭太麻秋帥輕騎二萬追遼至密雲山獲其母妻斬首三千級遼單騎走險遣其子乞特真奉表及獻名馬於趙虎受之虎入令支官論功封賞各有差徙假國民二萬餘户於司雍兖豫四州士大夫之有才行者皆擢敘之陽𥙿詣軍門降虎讓之曰卿昔為奴虜走今為士人來豈識知天命將逃匿無地邪對曰臣昔事王公不能匡濟逃于假氏復不能全今陛下天網髙張籠絡四海幽冀豪傑莫不風從如臣比肩無所獨愧生死之命惟陛下制之虎恱即拜北平太守夏四月趙王虎以燕王皓不會趙兵攻假遼而自專其利欲伐之太史令趙攬諌曰歲星守燕分師必無功虎怒鞭之皓聞之嚴兵設僃罷六卿納言常伯冗騎常侍官趙戎卒數十萬燕人震恐皓謂內史髙詡曰將若之何對曰趙兵雖強然不足憂但堅守以拒之無能為也虎遣使四出招誘民夷燕成周內史崔燾居就令遊泓武原令常霸東夷校尉封抽護軍宋晃等皆應之凡得三十六城泓邃之兄子也冀陽流寓之士共殺太守宋燭以降於趙燭晃之從兄也營丘內史鮮于屈亦遣使降趙武寧令廣平孫興曉諭吏民共收屈數其罪而殺之閉城拒守朝鮮令昌黎孫泳帥衆拒趙大姓王清等密謀應趙泳收斬之同謀數百人惶怖請罪泳皆釋之與同拒守樂浪太守鞠彭以境內皆叛選鄉里壯士二百餘人共還棘城戊子趙兵進逼棘城燕王皓欲出亡帳下將慕輿根諌曰趙強我弱大王一舉足則趙之氣勢遂成使趙人收略國民兵強榖足不可復敵竊意趙人正欲大王如此耳奈何入其計中乎今固守堅城其勢百倍縱其急攻猶足枝持觀形察變間出求利如事之不濟不失於走奈何望風委去為必亡之理乎皓乃止然猶懼形於色玄莬太守河間劉佩曰今強寇在外衆心恟懼事之安危繫於一人大王此際無所推委當自強以厲將士不宜示弱事急矣臣請出擊之縱無大捷足以安衆乃將敢死數百騎出衝趙兵所向披靡斬獲而還於是士氣自倍皓問計於封奕對曰石虎凶虐已甚民神共疾禍敗之至其何日之有今空國逺來攻守勢異戎馬雖強無能為患頓兵積日釁隙自生但堅守以俟之耳皓意乃安或説皓降皓曰孤方取天下何謂降也趙兵四面蟻附緣城慕輿根等晝夜力戰凡十餘日趙兵不能克壬辰引退皓遣其子恪帥二千騎追擊之趙兵大敗斬獲三萬餘級趙諸軍皆棄甲逃潰惟遊擊將軍石閔一軍獨全趙之攻棘城也燕右司馬李洪之弟普以為棘城必敗勸洪出避禍洪曰天道幽逺人事難知且當委任勿輕動取悔普固請不已洪曰卿意見明審者當自行之吾受慕容氏大恩義無去就當效死於此耳與普流涕而訣普遂降趙從趙軍南歸死於喪亂洪由是以忠篤著名趙王虎遣渡遼將軍曹伏將青州之衆戍海島運榖三百萬斛以給之又以船三百艘運榖三十萬斛詣髙句麗使典農中郎將王典帥衆萬餘屯田海濵又令青州造船千艘以謀擊燕十二月假遼自密雲山遣使求迎于趙既而中悔復遣使求迎于燕趙王虎遣征東將軍麻秋帥衆三萬迎之敕秋曰受降如受敵不可輕也以尚書左丞陽𥙿遼之故臣使為秋司馬燕王皓自帥諸軍迎遼遼密與燕謀覆趙軍皓遣慕容恪伏精騎七千於密雲山大敗麻秋於三藏口死者什六七秋步走得免陽𥙿為燕所執趙將軍范陽鮮于亮失馬步緣山不能進因止端坐燕兵環之叱令起亮曰身是貴人義不為小人所屈汝曹能殺亟殺不能則去亮儀觀豐偉聲氣雄厲燕兵憚之不敢殺以白皓皓以馬迎之與語大恱用為左常侍以崔毖之女妻之皓盡得假遼之衆待遼以上賔之禮以陽裕為郎中令五年夏四月假遼謀反於燕燕人殺遼及其黨與數十人送遼首於趙冬燕王皓遣長史劉翔參軍鞠運來獻捷論功燕王皓使其子恪霸擊宇文别部霸年十三勇冠三軍六年宇文逸豆歸忌慕容翰才名翰乃陽狂酣飲或卧自便利或被髮歌呼拜跪乞食宇文舉國賤之不復省録以故得行來自遂山川形便皆默記之燕王皓以翰初非叛亂以猜嫌出奔雖在它國常潛為燕計乃遣商人王車通市於宇文部以窺翰翰見車無言撫膺頷之而已皓曰翰欲來也復使車迎之翰彎弓三石餘矢尤長大皓為之造可手弓矢使車埋於道旁而密告之二月翰竊逸豆歸名馬攜其二子過取弓矢逃歸逸豆歸使驍騎百餘追之翰曰吾久客思歸既得上馬無復還理吾嚮日陽愚以誑汝吾之故藝猶在無為相逼自取死也追騎輕之直突而前翰曰吾居汝國久恨恨不欲殺汝汝去我百步立汝刀吾射之一發中者汝可還不中者可來前追騎解刀立之一發正中其環追騎散走皓聞翰至大喜恩遇甚厚八年冬十月建威將軍翰言於皓曰宇文強盛日久屢為國患今逸豆歸篡竊得國羣情不附加之性識庸暗將帥非才國無防衛軍無部伍臣久在其國悉其地形雖逺附強羯聲勢不接無益救援今若擊之百舉百克然髙句麗去國密邇常有窺𨵦之志彼知宇文既亡禍將及已必乘虛深入掩吾不備若少留兵則不足以守多留兵則不足以行此心腹之患也宜先除之觀其勢力一舉可克宇文自守之虜必不能逺來爭利既取髙句麗還取宇文如返手耳二國既平利盡東海國富兵強無返顧之憂然後中原可圖也皓曰善將兵擊髙句麗毀其城而還康帝建元元年春二月宇文逸豆歸遣其相莫淺渾將兵擊燕諸將爭欲擊之燕王皓不許莫淺渾以為皓畏之酣飲縱獵不復設備皓使慕容翰出擊之莫淺渾大敗僅以身免盡俘其衆二年春正月燕王皓與左司馬髙詡謀伐宇文逸豆歸詡曰宇文強盛今不取必為國患伐之必克然不利於將出而告人曰吾往必不返然忠臣不避也於是皓自將伐逸豆歸以慕容翰為前鋒將軍劉佩副之分命慕容軍慕容恪慕容霸及折衝將軍慕輿根將兵三道並進髙詡將發不見其妻使人語以家事而行逸豆歸遣南羅大涉夜干將精兵逆戰皓遣人馳謂慕容翰曰涉夜干勇冠三軍宜小避之翰曰逸豆歸掃其國內精兵以屬涉夜干涉夜干素有勇名一國所賴也今我克之其國不攻自潰矣且吾孰知涉夜干之為人雖有虛名實易與耳不宜避之以挫吾兵氣遂進戰翰自出衝陳涉夜干出應之慕容霸從傍邀擊遂斬涉夜干宇文士卒見涉夜干死不戰而潰燕兵乘勝逐之遂克其都城逸豆歸走死漠北宇文氏由是散亡皓悉收其畜産資貨徙其部衆五千餘落於昌黎闢地千餘里更命涉夜干所居城曰威德城使弟彪戍之而還髙詡劉佩皆中流矢卒詡善天文皓嘗謂曰卿有佳書而不見與何以為忠盡詡曰臣聞人君執要人臣執職執要者逸執職者勞是以后稷播種堯不預焉占候天文晨夜甚苦非至尊之所宜親殿下將安用之皓默然初逸豆歸事趙甚謹貢獻屬路及燕人伐逸豆歸趙王虎使右將軍白勝并州刺吏王霸自甘松出救之比至宇文氏已亡因攻威德城不克而還慕容彪追擊破之慕容翰之與宇文氏戰也為流矢所中卧病積時不出後漸差於其家試騁馬或告翰稱病而私習騎乘疑欲為變燕王皓雖藉翰勇略然中心終忌之乃賜翰死翰曰吾負罪出奔既而復還今日死已晚矣然羯賊跨據中原吾不自量欲為國家蕩一區夏此志不遂沒有遺恨命矣夫飲藥而卒趙魏亂中原冉閔滅石氏附晉懷帝永嘉五年初石勒之為人所掠賣也與其母王氏相失劉琨得之遣使并其從子虎送於勒時虎年十七殘忍無度為軍中患勒白母曰此兒凶暴無賴使軍人殺之聲名可惜不若自除之母曰快牛為犢多能破車汝小忍之及長便弓馬勇冠當時勒以為征虜將軍每屠城邑鮮有遺類然御衆嚴而不煩莫敢犯者指授攻討所向無前勒遂寵任之成帝咸和五年春二月後趙王勒以其子宏為大單于中山王虎怒私謂齊王邃曰主上自都襄國以來端拱仰成以吾身當矢石二十餘年南擒劉嶽北走索頭東平齊魯西定秦雍克十有三州成大趙之業者我也大單于當以授我今乃以與黃吻婢兒念之今人氣塞不能寢食待主上晏駕之後不足復留種也後趙皇太子弘好屬文親敬儒素勒謂徐光曰大雅愔愔殊不似將家子光曰漢祖以馬上取天下孝文以玄默守之聖人之後必有勝殘去殺者天之道也勒甚恱光因説曰皇太子仁孝溫恭中山王雄暴多詐陛下一旦不諱臣恐社稷非太子所有也宜漸奪中山王權使太子早參朝政勒心然之而未能從七年夏四月趙右僕射程遐言於趙主勒曰中山王勇悍權略羣臣莫及觀其志自陛下之外視之蔑如加以殘賊安忍久為將帥威振外內其諸子年長皆典兵權陛下在自當無它恐非少主之臣也宜早除之以便大計勒曰今天下未安大雅沖幼宜得強輔中山王骨肉至親有佐命之功方當委以伊霍之任何至如卿所言卿正恐不得擅帝舅之權耳吾亦當參卿顧命勿過憂也遐泣曰臣所慮者公家陛下乃以私計拒之忠言何自而入乎中山王雖為皇太后所養非陛下天屬雖有微功陛下酬其父子恩榮亦足矣而其志願無極豈將來有益者乎若不除之臣見宗廟不血食矣勒不聽遐退告徐光光曰中山王常切齒於吾二人恐非但危國亦將為家禍也它日光承間言於勒曰今國家無事而陛下神色若有不怡何也勒曰吳蜀未平吾恐後丗不以吾為受命之王也光曰魏承漢運劉僃雖興於蜀漢豈得為不亡乎孫權在吳猶今之李氏也陛下苞括二都平蕩八州帝王之統不在陛下復當在誰且陛下不憂腹心之疾而更憂四支乎中山王藉陛下威略所向輒克而天下皆言其英武亞於陛下且其資性不仁見利忘義父子並據權位勢傾王室而耿耿常有不滿之心近於東宫侍宴有輕皇太子之色臣恐陛下萬年之後不可復制也勒默然始命太子省可尚書奏事且以中常侍嚴震參綜可否惟征伐斷斬大事乃呈之於是嚴震之權過于主相中山王虎之門可設雀羅矣虎愈怏怏不恱八年夏六月趙主勒寢疾中山王虎入侍禁中矯詔羣臣親戚皆不得入疾之增損外無知者又矯詔召秦王宏彭城王堪還襄國勒疾小瘳見宏驚曰吾使王處藩鎮正僃今日有召王者邪將自來邪有召者當按誅之虎懼曰秦王思慕暫還耳今遣之仍留不遣數日復問之虎曰受詔即遣今已半道矣廣阿有蝗虎密使其子冀州剌史邃帥騎三千遊于蝗所秋七月勒疾篤遺命曰大雅兄弟宜善相保司馬氏汝曹之前車也中山王宜深思周霍勿為將來口實戊辰勒卒中山王虎劫太子弘使臨軒收右光祿大夫程遐中書令徐光下廷尉召邃使將兵入宿衛文武皆奔散弘大懼自陳劣弱讓位於虎虎曰君終太子立禮之常也弘涕泣固讓虎怒曰若不堪重任天下自有大義何足豫論弘乃即位大赦殺程遐徐光夜以勒喪濳瘞山谷莫知其處己卯備儀衛虛葬于髙平陵諡曰明帝廟號髙祖趙將石聰及譙郡太守彭彪各遣使來降聰本晉人冒姓石氏朝廷遣督護喬球將兵救之未至聰等為虎所誅秋八月趙主弘以中山王虎為丞相魏王大單于加九錫以魏郡等十三郡為國總攝百揆虎赦其境內立妻鄭氏為魏王后子邃為魏太子加使持節侍中都督中外諸軍事大將軍録尚書事次子宣為使持節車騎大將軍冀州剌史封河間王韜為前鋒將軍司􅊢校尉封樂安王遵封齊王鑒封代王苞封樂平王徙平原王斌為章武王勒文武舊臣皆輔散任虎之府寮親黨悉署臺省要職以鎮軍將軍夔安領左僕射尚書郭殷為右僕射更命太子宫曰崇訓宫太后劉氏以下皆徙居之選勒宫人及車馬服玩之美者皆入丞相府趙劉太后謂彭城王堪曰先帝甫晏駕丞相遽相陵藉如此帝祚之亡殆不復久王將若之何堪曰先帝舊臣皆𬒳踈斥軍旅不復由人宫省之內無可為者臣請奔兖州挾南陽王恢為盟主據廩丘宣太后詔於牧守征鎮使各舉兵以誅暴逆庶幾猶有濟也劉氏曰事急矣當速為之九月堪微服輕騎襲兖州不克南奔譙城丞相虎遣其將郭太追之獲堪于城父送襄國炙而殺之徵南陽王恢還襄國劉氏謀泄虎廢而殺之尊弘母程氏為皇太后堪本田氏子數有功趙主勒養以為子劉氏有膽略勒每與之參決軍事佐勒建功業有吕后之風而不妬忌更過之趙河東王生鎮關中石朗鎮洛陽冬十月生朗皆舉兵以討丞相虎生自稱秦州剌史遣使來降氐帥蒲洪自稱雍州剌史西附張駿虎留太子邃守襄國將步騎七萬攻朗於金墉金墉潰獲㓪刖而斬之進向長安以梁王挺為前鋒大都督生遣將軍郭權帥鮮卑涉璝衆二萬為前鋒以拒之生將大軍繼發軍于蒲阪權與挺戰于潼關大破之挺及丞相左長史劉隗皆死虎還奔澠池枕尸三百餘里鮮卑濳與虎通謀反擊生生不知挺已死懼單騎奔長安權收餘衆退屯渭汭生遂棄長安匿於雞頭山將軍蔣英據長安拒守虎進兵擊英斬之生麾下斬生以降權奔隴右虎還襄國大赦趙主弘命虎建魏臺一如魏武王輔漢故事十二月郭權據上邽遣使來降京兆新平扶風馮翊北地皆應之九年春三月趙丞相虎遣其將郭敖及章武王斌帥步騎四萬西擊郭權軍于華隂夏四月上邽豪族殺權以降虎徙秦州三萬餘户于青并二州長安人陳良夫奔黑羌與北羌王薄句大等侵擾北地馮翊章武王斌樂安王韜合擊破之句大奔馬蘭山郭敖乘勝逐北為羌所敗死者什七八斌等收軍還三城虎遣使誅郭敖秦王宏有怨言虎幽之冬十月趙主弘自齎璽綬詣魏宫請禪位於丞相虎虎曰帝王大業天下自當有議何為自論此邪弘流涕還宫謂太后程氏曰先帝種真無復遺矣於是尚書奏魏臺請依唐虞禪讓故事虎曰弘愚暗居喪無禮不可以君萬國便當廢之何禪讓也十一月虎遣郭殷持節入宫廢弘為海陽王弘安步就車容色自若謂羣臣曰庸昧不堪纂承大統夫復何言羣臣莫不流涕宫人慟哭羣臣詣魏臺勸進虎曰皇帝者盛德之號非所敢當且可稱居攝趙天王幽弘及太后程氏秦王宏南陽王恢于崇訓宫尋皆殺之西羌大都督姚弋仲稱疾不賀虎纍召之乃至正色謂虎曰弋仲常謂大王命丗英雄奈何把臂受託而返奪之邪虎曰吾豈樂此哉顧海陽年少恐不能了家事故代之耳心雖不平然察其誠實亦不之罪虎以夔安為侍中太尉守尚書令郭殷為司空韓晞為尚書左僕射魏郡申鍾為侍中郎闓為光祿大夫王波為中書令文武封拜各有差虎行如信都復還襄國咸康元年秋九月趙王虎遷都于鄴大赦奉天竺僧佛圖澄二年冬十一月趙王虎作太武殿於襄國作東西宫於鄴十二月皆成太武殿基髙二丈八尺縱六十五步廣七十五步甃以文石下穿伏室置衛士五百人以漆灌瓦金璫銀楹珠簾玉璧窮極工巧殿上施白玉牀流蘇帳為金蓮華以冠帳頂又作九殿于顯陽殿後選士民之女以實之服珠玉𬒳綺縠者萬餘人教宫人占星氣馬步射置女太史及雜伎工巧皆與外同以女騎千人為鹵簿皆著紫綸巾熟錦袴金銀鏤帶五文織成鞾執羽儀鳴鼓吹逰宴以自隨於是趙大旱金一斤直粟二斗百姓嗷然而虎用兵不息百役並興使牙門將張彌徙洛陽鍾虡九龍翁仲銅駝飛亷於鄴載以四輪纒輞車轍廣四尺深二尺一鍾沒於河募浮沒三百人入河繫以竹絙用牛百頭鹿櫨引之乃出造萬斛之舟以濟之既至鄴虎大恱為之赦二歲刑賚百官榖帛賜民爵一級又用尚方令解飛之言於鄴南投石於河以作飛橋功費數千萬億橋竟不成役夫飢甚乃止使令長帥民入山澤采橡及魚以佐食復為權豪所奪民無所得三年春正月庚辰趙太保夔安等文武五百餘人入上尊號庭燎油灌下盤死者二十餘人趙王虎惡之腰斬成公假辛巳虎依殷周之制稱大趙天王即位于南郊大赦立其后鄭氏為天王皇后太子邃為天王皇太子諸子為王者皆降為郡公宗室為王者降為縣侯百官封署各有差趙太子邃素驍勇趙王虎愛之常謂羣臣曰司馬氏父子兄弟自相殘滅故使朕得至此如朕有殺阿鐵理否既而邃驕淫殘忍好粧飾美姬斬其首洗血置盤上與賔客傳觀之又烹其肉共食之河間公宣樂安公韜皆有寵於虎邃疾之如讎虎荒耽酒色喜怒無常使邃省可尚書事每有所關白虎恚曰此小事何足白也時或不聞又恚曰何以不白誚責笞捶月至再三邃私謂中庶子李顔等曰官家難稱吾欲行冒頓之事卿從我乎顔等伏不敢對秋七月邃稱疾不視事濳帥宫臣文武五百餘騎飲於李顔别舍因謂顔等曰我欲至冀州殺河間公有不從者斬行數里騎皆逃散顔叩頭固諌邃亦昏醉而歸其母鄭氏聞之私遣中人誚讓邃邃怒殺之佛圖澄謂虎曰陛下不宜數往東宫虎將視邃疾思澄言而還既而瞋目大言曰我為天下主父子不相信乎乃命所親信女尚書往察之邃呼前與語因抽劒擊之虎怒收李顔等詰問顔具言其狀殺顔等三十餘人幽邃于東宫既而赦之引見太武東堂邃朝而不謝俄頃即出虎使謂之曰太子應朝中宫豈可遽去邃徑出不顧虎大怒廢邃為庶人其夜殺邃及其妃張氏并男女二十六人同埋於一棺誅其宫臣支黨二百餘人廢鄭后為東海太妃立其子宣為天王皇太子宣母杜昭儀為天王皇后五年秋七月趙王虎以太子宣為大單于建天子旌旗六年春三月趙王虎以秦公韜為太尉與太子宣迭日省可尚書奏事專決賞刑不復啓白司徒申鍾諌曰賞刑者人君之大柄不可以假人所以防微杜漸消逆亂於未然也太子職在視膳不當預政庶人邃以預政致敗覆車未逺也且二政分權鮮不階禍愛之不以道適所以害之也虎不聽中謁者令申扁以慧悟辨給有寵於虎宣亦昵之使典機密虎既不省事而宣韜皆好酣飲畋獵由是除拜生殺皆決於扁自九卿已下率皆望塵而拜太子詹事孫珍病目求方於侍中崔約約戲之曰溺中則愈珍曰目何可溺約曰卿目睕睕正耐溺中珍恨之以白宣宣於兄弟中最胡狀目深聞之怒誅約父子於是公卿以下畏珍側目八年冬十二月趙王虎作臺觀四十餘所於鄴又營長安洛陽二宫作者四十餘萬人又欲自鄴起閣道至襄國敕河南四州治南伐之僃并朔秦雍嚴西討之資青冀幽州為東征之計皆三五發卒諸州軍造甲者五十餘萬人船夫十七萬人為水所沒虎狼所食者三分居一加之公侯牧宰競營私利百姓失業愁困貝丘人李弘因衆心之怨自言姓名應讖連結黨與署置百寮事發誅之連坐者數千家虎畋獵無度晨出夜歸又多微行躬察作役侍中京兆韋謏諌曰陛下忽天下之重輕行斤斧之間猝有狂夫之變雖有智勇將安所施又興役無時廢民耘穫吁嗟盈路殆非仁聖之所忍為也虎賜謏榖帛而興繕滋繁遊察自若秦公韜有寵於虎太子宣惡之右僕射張離領五兵尚書欲求媚於宣説之曰今諸侯吏兵過限宜漸裁省以壯本根宣使離為奏秦燕義陽樂平四公聽置吏一百九十七人帳下兵二百人自是以下三分置一餘兵五萬悉配東宫於是諸公咸怨嫌釁益深矣青州上言濟南平陵城北石虎一夕移於城東南有狼狐千餘迹隨之迹皆成蹊虎喜曰石虎者朕也自西北徙而東南者天意欲使朕平蕩江南也其敕諸州兵明年悉集朕當親董六師以奉天命羣臣皆賀上皇德頌者一百七人制征士五人出車一乘牛二頭米十五斛絹十匹調不辦者斬民至鬻子以供軍須猶不能給自經於道樹者相望康帝建元二年𥘉趙領軍王朗言於趙王虎曰盛冬雪寒而皇太子使人伐宫材引於漳水役者數萬吁嗟滿道陛下宜因出遊罷之虎從之太子宣怒會熒惑守房宣使太史令趙攬言於虎曰房為天王今熒惑守之其殃不細宜以貴臣王姓者當之虎曰誰可者攬曰無貴於王領軍虎意惜朗使攬更言其次攬無以對因曰其次唯中書監王波耳虎乃下詔追罪波前議楛矢事腰斬之及其四子投尸漳水既而愍其無罪追贈司空封其孫為侯虎作橋於靈昌津用功五百餘萬不成斬匠而罷穆帝永和元年春正月趙王虎以樂平公苞代鎮長安發雍洛秦并州十六萬人治長安未央宫虎好獵晚歲體重不能跨馬乃造獵車千乘刻期校獵自靈昌津南至滎陽東極陽都為獵埸使御史監察其中禽獸有犯者罪至大辟民有美女佳牛馬御史求之不得皆誣以犯獸論死者百餘人發諸州二十六萬人修洛陽宫發百姓牛二萬頭配朔州牧官增置女官二十四等東宫十二等公侯七十餘國皆九等大發民女三萬餘人料為三等以配之太子諸公私令采發者又將萬人郡縣務求美色多強奪人妻殺其夫及夫自殺者三千餘人至鄴虎臨軒簡第以使者為能封侯者十二人荆楚楊徐之民流叛略盡守令坐不能綏懷下獄誅者五十餘人金紫光祿大夫逯明因侍切諌虎大怒使龍騰拉殺之二年夏五月趙中黃門嚴生惡尚書朱軌會久雨生譖軌不修道路又謗訕朝政趙王虎囚之蒲洪諌曰陛下既有襄國鄴宫又修長安洛陽宫殿將以何用作獵車千乘環數千里以養禽獸奪人妻女十萬餘口以實後宫聖帝明王之所為固若是乎今又以道路不修欲殺尚書陛下德政不修天降淫雨七旬乃霽霽方二日雖有鬼兵百萬亦未能去道路之塗潦而況人乎政刑如此其如四海何其如後代何願止作徒罷苑囿出宫女赦朱軌以副衆望虎雖不恱亦不之罪為之罷長安洛陽作役而竟誅朱軌又立私論朝政之法聽吏告其君奴告其主公卿以下朝覲以目相顧不敢復相過從談語三年趙王虎據十州之地聚斂金帛及外國所獻珍異府庫財物不可勝紀猶自以為不足悉發前代陵墓取其金寶沙門吳進言於虎曰胡運將衰晉當復興宜苦役晉人以厭其氣虎使尚書張羣發近郡男女十六萬人車十萬乘運土築華林苑及長牆于鄴北廣袤數十里申鐘石璞趙攬等上疏陳天文錯亂百姓雕弊虎大怒曰使苑牆朝成吾夕沒無恨矣促張羣使然燭夜作暴風大雨死者數萬人郡國前後送蒼麟十六白鹿七虎命司虞張曷柱調之以駕芝蓋大朝會列於殿庭九月命太子宣出祈福于山川因行遊獵宣乘大輅羽葆華蓋建天子旌旗十有六軍戎卒十八萬出自金明門虎從其後宫升陵霄觀望之笑曰我家父子如是自非天崩地陷當復何愁但抱子弄孫日為樂耳宣所舍輒列人為長圍四面各百里驅禽獸至暮皆集其所使文武跪立重行圍守炬火如晝命徑騎百餘馳射其中宣與姬妾乘輦臨觀獸盡而止或獸有迸逸當圍守者有爵則奪馬步驅一日無爵則鞭之一百士卒飢凍死者萬有餘人所過三州十五郡資儲皆無孑遺虎復命秦公韜繼出自并州至于秦雍亦如之宣怒其與已鈞敵愈嫉之宦者趙生得幸於宣無寵於韜微勸宣除之於是始有殺韜之謀矣四年趙秦公韜有寵於趙王虎欲立之以太子宣長猶豫未決宣嘗忤旨虎怒曰悔不立韜也韜由是益驕造堂於太尉府號曰宣光殿梁長九丈宣見而大怒斬匠截梁而去韜怒增之至十丈宣聞之謂所幸楊柸牟成趙生曰凶豎傲愎敢爾汝能殺之吾入西宫當盡以韜之國邑分封汝等韜死主上必臨喪吾因行大事蔑不濟矣柸等許諾秋八月韜夜與僚屬宴於東明觀因宿於佛精舍宣使楊柸等緣獼猴梯而入殺韜置其刀箭而去旦日宣奏之虎哀驚氣絶久之方蘇將出臨其喪司空李農諌曰害秦公者未知何人賊在京師鑾輿不宜輕出虎乃止嚴兵發哀於太武殿宣往臨韜喪不哭直言呵呵使舉衾觀尸大笑而去收大將軍記室參軍鄭靖尹武等將委之以罪虎疑宣殺韜欲召之恐其不入乃詐言其母杜后哀過危惙宣不謂見疑入朝中宫因留之建興人史科知其謀告之虎使收楊柸牟成皆亡去獲趙生詰之具服虎悲怒彌甚囚宣於席庫以鐵環穿其頷而鎖之取殺韜刀箭舐其血哀號震動宫殿佛圖澄曰宣韜皆陛下之子今為韜殺宣是重禍也陛下若加慈恕福祚猶長若必誅之宣當為彗星下掃鄴宫虎不從積柴於鄴北樹標其上標末置鹿盧穿之以繩倚梯柴積送宣其下使韜所幸宦者郝稚劉霸拔其髮抽其舌牽之登梯郝稚以繩貫其頷鹿盧絞上劉霸斷其手足斫眼潰腸如韜之傷四面縱火煙炎際天虎從昭儀已下數千人登中臺以觀之火滅取灰分置諸門交道中殺其妻子九人宣小子才數歲虎素愛之抱之而泣欲赦之其大臣不聽就抱中取而殺之兒挽虎衣大呌至於絶帶虎因此發病又廢其后杜氏為庶人誅其四率已下三百人宦者五十人皆車裂節解棄之漳水汙其東宫以養豬牛東宫衛士十餘萬人皆謫戍涼州先是散騎常侍趙攬言於虎曰宫中將有變宜備之及宣殺韜虎疑其知而不告亦誅之秋九月趙王虎議立太子太尉張舉曰燕公斌有武略彭城公遵有文德惟陛下所擇虎曰卿言正起吾意戎昭將軍張豺曰燕公母賤又嘗有過彭城公母前以太子事廢今立之臣恐不能無微恨陛下宜審思之初虎之拔上邽也張豺獲前趙主曜幼女安定公主有殊色納於虎虎嬖之生齊公丗豺以虎老病欲立世為嗣冀劉氏為太后已得輔政乃説虎曰陛下再立太子其母皆出於倡賤故禍亂相尋今宜擇母貴子孝者立之虎曰卿勿言吾知太子處矣虎再與羣臣議於東堂虎曰吾欲以純灰三斛自滌其腸何為專生惡子年踰二十輒欲殺父今丗方十歲比其二十吾已老矣乃與張舉李農定議令公卿上書請立丗為太子大司農曹莫不肯署名虎使張豺問其故莫頓首曰天下重器不宜立少故不敢署虎曰莫忠臣也然未逹朕意張舉李農知朕意矣可令諭之遂立丗為太子以劉昭儀為后五年春正月趙王虎即皇帝位大赦改元太寧諸子皆進爵為王冠軍大將軍姚弋仲至鄴求見虎虎病弋仲讓虎曰兒死愁邪何為而病兒幼時不擇善人教之使坐於為逆既為逆而誅之又何愁焉且汝久病所立兒幼汝若不愈天下必亂當先憂此勿憂賊也夏四月乙卯趙主虎病甚以彭城王遵為大將軍鎮關右燕王斌為丞相録尚書事張豺為鎮衛大將軍領軍將軍吏部尚書並受遣詔輔政劉后惡斌輔政恐不利於太子與張豺謀去之斌時在襄國遣使詐謂斌曰主上疾已漸愈王須獵者可小停也斌素好獵嗜酒遂留獵且縱酒劉氏與豺因矯詔稱斌無忠孝之心免官歸第使豺弟雄帥龍騰五百人守之乙丑遵自幽州至鄴敕朝堂受拜配禁兵三萬遣之遵涕泣而去是日虎疾小瘳問遵至未左右對曰去已久矣虎曰恨不見之虎臨西閣龍騰中郎二百餘人列拜於前虎問何求皆曰聖體不安宜令燕王入宿衛典兵馬或言乞為皇太子虎曰燕王不在內邪召以來左右言王酒病不能入虎曰促持輦迎之當付璽綬亦竟無行者尋惛眩而入張豺使張雄矯詔殺斌戊辰劉氏復矯詔以豺為太保都督中外諸軍録尚書事如霍光故事侍中徐統歎曰亂將作矣吾無為預之仰藥而死已巳虎卒太子丗即位尊劉氏為皇太后劉氏臨朝稱制以張豺為丞相豺辭不受請以彭城王遵義陽王鑒為左右丞相以慰其心劉氏從之豺與太尉張舉謀誅司空李農舉素與農善密告之農奔廣宗帥乞活數萬家堡上白劉氏使張舉統宿衛諸軍圍之豺以張離為鎮軍大將軍監中外諸軍事以為已副彭城王遵至河內聞喪姚弋仲蒲洪劉寧及征虜將軍石閔武衛將軍王鸞等共説遵曰殿下長且賢先帝亦有意以殿下為嗣正以末年惛惑為張豺所誤今女主臨朝姦臣用事上白相持未下京師宿衛空虛殿下若聲張豺之罪鼓行而討之其誰不開門倒戈而迎殿下者遵從之五月遵自李城舉兵還趣鄴洛州剌史劉國帥洛陽之衆往會之檄至鄴張豺大懼馳召上白之軍丙戌遵軍于蕩隂戎卒九萬石閔為前鋒豺將出拒之耆舊羯士皆曰彭城王來奔喪吾當出迎之不能為張豺守城也踰城而出豺斬之不能止張離亦帥龍騰二千斬關迎遵劉氏懼召張豺入對之悲哭曰先帝梓宫未殯而禍難至此今嗣子沖幼託之將軍將軍將若之何欲加遵重位能弭之乎豺惶怖不知所出但云唯唯乃下詔以遵為丞相領大司馬大都督督中外諸軍録尚書事加黃鉞九錫己丑遵至安陽亭張豺懼而出迎遵命執之庚寅遵擐甲曜兵入自鳯陽門升太武前殿劈踊盡哀退如東閣斬張豺于平樂市夷其三族假劉氏令曰嗣子幼沖先帝私恩所授皇業至重非所克堪其以遵嗣位於是遵即位大赦罷上白之圍辛卯封丗為譙王廢劉氏為太妃尋皆殺之李農來歸罪使復其位尊母鄭氏為皇太后立妃張氏為皇后故燕王斌子衍為皇太子以義陽王鑒為侍中太傅沛王沖為太保樂平王苞為大司馬汝隂王琨為大將軍武興公閔為都督中外諸軍事輔國太將軍甲午鄴中暴風拔樹震雷雨雹大如盂升太武暉華殿災及諸門觀閣蕩然無餘乘與服御燒者太半金石皆盡火月餘乃滅時沛王沖鎮薊聞遵殺丗自立謂其僚佐曰丗受先帝之命遵輒廢而殺之罪莫大焉其敕內外戒嚴孤將親討之於是留寧北將軍沐堅戍幽州帥衆五萬自薊南下傳檄燕趙所在雲集比至常山衆十餘萬軍于苑鄉遇遵赦書沖曰皆吾弟也死者不可復追何為復相殘乎吾將歸矣其將陳暹曰彭城篡弒自尊為罪大矣王雖北斾臣將南轅俟平京師擒彭城然後奉迎大駕沖乃復進遵馳遣王擢以書喻沖沖弗聽遵使武興公閔及李農等帥精卒十萬討之戰于平棘沖兵大敗獲沖于元氏賜死坑其士卒三萬餘人燕平狄將軍慕容霸上書於燕王俊曰石虎窮凶極暴天之所棄餘燼僅存自相魚肉今中國倒懸企望仁恤若大軍一振勢必投戈北平太守孫興亦表言石氏大亂宜以時進取中原俊以新遭大喪弗許霸馳詣龍城言於俊曰難得而易失者時也萬一石氏衰而復興或有英雄據其成資豈惟失此大利亦恐更為後患俊曰鄴中雖亂鄧恆據安樂兵強糧足今若伐趙東道不可由也當由盧龍盧龍山徑險狹虜乘髙斷要首尾為患將若之何霸曰恆雖欲為石氏拒守其將士顧家人懷歸志若大軍臨之自然瓦解臣請為殿下前驅東出徒何濳趣令支出其不意彼聞之勢必震駭上不過閉門自守下不免棄城逃潰何暇禦我哉然則殿下可以安步而前無復留難矣俊猶豫未決以問五材將軍封奕對曰用兵之道敵強則用智敵弱則用勢是故以大吞小猶狼之食豚也以治易亂猶日之消雪也大王自上丗以來積德纍仁兵強士練石虎極其殘暴死未瞑目子孫爭國上下乖亂中國之民墜於塗炭延頸企踵以待振拔大王若揚兵南邁先取薊城次指鄴都宣耀威德懷撫遺民彼孰不扶老提幼以迎大王凶黨將望旗冰碎安能為害乎從事中郎黃泓曰今太白經天歲集畢北天下易主隂國受命此必然之驗也宜速出師以承天意折衝將軍慕輿根曰中國之民困於石氏之亂咸思易主以救湯火之急此千載一時不可失也自武宣王以來招賢養民務農訓兵正俟今日今時至不取更復顧慮豈天意未欲使海內平定邪將大王不欲取天下也俊笑而從之以慕容恪為輔國將軍慕容評為輔弼將軍左長史陽騖為輔義將軍謂之三輔慕容霸為前鋒都督建鋒將軍選精兵二十餘萬講武戒嚴為進取之計初趙主遵之發李城也謂武興公閔曰努力事成以爾為太子既而立太子衍閔恃功欲專朝政遵不聽閔素驍勇屢立戰功夷夏宿將皆憚之既為都督揔內外兵權乃撫循殿中將士皆奏為殿中員外將軍爵關外侯遵弗之疑而更題名善惡以挫抑之衆咸怨怒中書令孟準左衛將軍王鸞勸遵稍奪閔兵權閔益恨望準等咸勸誅之十一月遵召義陽王鑒樂平王苞汝隂王琨淮南王昭等入議於鄭太后前曰閔不臣之迹漸著今欲誅之如何鑒等皆曰宜然鄭氏曰李城還兵無棘奴豈有今日小驕縱之何可遽殺鑒出遣宦者楊環馳以告閔閔遂劫李農及右衛將軍王基密謀廢遵使將軍蘇彥周成帥甲士三千人執遵於南臺遵方與婦人彈碁問成曰反者誰也成曰義陽王鑒當立遵曰我尚如是鑒能幾時遂殺之於琨華殿并殺鄭太后張后太子衍孟準王鸞及上光祿張斐鑒即位大赦以武興公閔為大將軍封武德王司空李農為大司馬並録尚書事郎闓為司空秦州剌史劉羣為尚書左僕射侍中盧諶為中書監趙主鑒使樂平王苞中書令李松殿中將軍張才夜攻石閔李農於琨華殿不克禁中擾亂鑒懼偽若不知者夜斬松才於西中華門并殺苞新興王祗虎之子也時鎮襄國與姚弋仲蒲洪等連兵移檄中外欲共誅閔農閔農以汝隂王琨為大都督與張舉及侍中呼延盛帥步騎七萬分討祗等中領軍石成侍中石啓前河東太守石暉謀誅閔農閔農皆殺之龍驤將軍孫伏都劉銖等結羯士三千伏於胡天亦欲誅閔農鑒在中臺伏都帥三千餘人將升臺挾鑒以攻之鑒見伏都毁閣道臨問其故伏都曰李農等反已在東掖門臣欲帥衛士以討之謹先啓知鑒曰卿是功臣好為官陳力朕從臺上觀卿勿慮無報也於是伏都銖帥衆攻閔農不克屯於鳯陽門閔農帥衆數千毀金明門而入鑒懼閔之殺已馳招閔農開門內之謂曰孫伏都反卿宜速討之閔農攻斬伏都等自鳯陽至琨華橫尸相枕流血成渠宣令內外六夷敢稱兵仗者斬胡人或斬關或踰城而出者不可勝數閔使尚書王簡少府王鬱帥衆數千守鑒於御龍觀懸食以給之下令城中曰近日孫劉構逆支黨伏誅良善一無預也今日已後與官同心者留不同者各任所之敕城門不復相禁於是趙人百里內悉入城胡羯去者填門閔知胡之不為已用班令內外趙人斬一胡首送鳯陽門者文官進位三等武官悉拜牙門一日之中斬首數萬閔親帥趙人以誅胡羯無貴賤男女少長皆斬之死者二十餘萬尸諸城外悉為野犬豺狼所食其屯戍四方者閔皆以書命趙人為將帥者誅之或髙鼻多須濫死者半六年春正月趙大將軍閔欲滅去石氏之迹託以讖文有繼趙李更國號曰衛易姓李氏太赦改元青龍太宰趙庶太尉張舉中軍將軍張春光祿大夫石嶽撫軍石寧武衛將軍張季及公侯卿校龍騰等萬餘人出奔襄國汝隂王琨奔冀州撫軍將軍張沈據滏口張賀度據石瀆建義將軍假勤據黎陽寧南將軍楊羣據桑壁劉國據陽城假龕據陳留姚弋仲據灄頭蒲洪據枋頭衆各數萬皆不附於閔勤末柸之子龕蘭之子也王㓪麻秋自長安赴洛陽秋承閔書誅朗部胡千餘人朗奔襄國秋帥衆歸鄴蒲洪使其子龍驤將軍雄迎擊獲之以為軍師將軍汝隂王琨及張舉王朗帥衆七萬伐鄴大將軍閔帥騎千餘與戰於城北閔操兩刃矛馳騎擊之所向摧陷斬首三千級琨等大敗而去閔與李農帥騎三萬討張賀度于石瀆閏月衛主鑒密遣宦者齎書召張沈等使乘虛襲鄴宦者以告閔農閔農馳還廢鑒殺之并殺趙主虎三十八孫盡滅石氏姚弋仲子曜武將軍益武衛將軍若帥禁兵數千斬關奔灄頭弋仲帥衆討閔軍于混橋司徒申鍾等上尊號於閔閔以讓李農農固辭閔曰吾屬故晉人也今晉室猶存請與諸君分割州郡各稱牧守公侯奉表迎晉天子還都洛陽何如尚書胡睦進曰陛下聖德應天宜登大位晉氏衰微逺竄江表豈能揔馭英雄混一四海乎閔曰胡尚書之言可謂識機知命矣乃即皇帝位大赦改元永興國號大魏二月燕王俊使慕容霸將兵二萬自東道出徒河慕輿于自西道出蠮螉塞俊自中道出盧龍塞以伐趙以慕容恪鮮于亮為前驅命慕輿埿槎山通道留丗子曄守龍城以內史劉斌為大司農與典書令皇甫真留統後事霸軍至三陘趙征東將軍鄧恆惶怖焚倉庫棄安樂遁去與幽州剌史王午共保薊徒河南部都尉孫泳急入安樂撲滅餘火籍其穀帛霸收安樂北平兵糧與俊會臨渠三月燕兵至無終王午留其將王他以數千人守薊與鄧恆走保魯口乙巳俊拔薊執王他斬之俊欲悉坑其士卒千餘人慕容霸諌曰趙為暴虐王興師伐之將以拯民於塗炭而撫有中州也今始得薊而坑其士卒恐不可以為王師之先聲也乃釋之俊入都于薊中州士女降者相繼燕兵至范陽范陽太守李産欲為石氏拒燕衆莫為用乃帥八城令長出降雋復以産為太守産子績為幽州别駕棄其家從王午在魯口鄧恆謂午曰績鄉里在北父已降燕今雖在此恐終難相保徒為人纍不如去之午曰此何言也夫以當今喪亂而績乃能立義捐家情節之重雖古烈士無以過乃欲以猜嫌害之燕趙之士聞之謂我直相聚為賊了無意識衆情一散不可復集此為坐自屠潰也恆乃止午猶慮諸將不與已同心或致非意乃遣績歸績始辭午往見燕王俊俊讓之曰卿不識天命棄父邀名今日乃始來邪對曰臣眷戀舊主志存微節官身所在何事非君殿下方以義取天下臣未謂得見之晚也俊恱善待之俊以弟宜為代郡城郎孫泳為廣寧太守悉置幽州郡縣守宰甲子俊使中部俟釐慕輿句督薊中留事自將擊鄧恆於魯口軍至清梁恆將鹿勃早將數千人夜襲燕營半已得入先犯前鋒都督慕容霸突入幕下霸起奮擊手殺十餘人早不能進由是燕軍得嚴俊謂慕輿根曰賊鋒甚鋭宜且避之根正色曰我衆彼寡力不相敵故乘夜來戰冀萬一獲利今求賊得賊正當擊之復何所疑王但安卧臣等自為王破之俊不能自安內史李洪從俊出營外屯髙冢上根帥左右精勇數百人從中牙直前擊早李洪徐整騎隊還助之早乃退走衆軍追擊四十餘里早僅以身免所從士卒死亡略盡俊引兵還薊魏主閔復姓冉氏初閔父瞻內黃人本姓冉趙主勒破陳午獲之命虎養以為子閔驍勇善戰多䇿略虎愛之比於諸孫尊母王氏為皇太后立妻董氏為皇后子智為皇太子胤明𥙿皆為王以李農為太宰領太尉録尚書事封齊王其子皆封縣公遣使者持節赦諸軍屯皆不從趙新興王祗即皇帝位于襄國改元永寧以汝隂王琨為相國六夷據州都擁兵者皆應之祗以姚弋仲為右丞相親趙王待以殊禮夏四月趙主祗遣汝隂王琨將兵十萬伐魏魏主閔殺李農及其三子并尚書令王謨侍中王衍中常侍嚴震趙升閔遣使臨江告晉曰逆胡亂中原今已誅之能共討者可遣軍來也朝廷不應六月趙汝隂王琨進據邯鄲鎮南將軍劉國自繁陽會之魏衛將軍王泰擊琨大破之死者萬餘人劉國還繁陽冬十一月魏主閔帥步騎十萬攻襄國署其子太原王胤為大單于驃騎大將軍以降胡一千配之為麾下光祿大夫韋謏諌曰胡羯皆我之仇敵今來歸附苟全性命耳萬一為變悔之何及請誅屏降胡去單于之號以防微杜漸閔方欲撫納羣胡大怒誅謏及其子伯陽七年春二月魏主閔攻圍襄國百餘日趙主祗危急乃去皇帝之號稱趙王遣太尉張舉乞師於燕許送傳國璽中軍將軍張春乞師於姚弋仲弋仲遣其子襄帥騎二萬八千救趙誡之曰冉閔棄仁背義屠滅石氏我受人厚遇當為復讎老病不能自行汝才十倍於閔若不梟擒以來不必復見我也弋仲亦遣使告於燕燕王俊遣禦難將軍恱綰將兵三萬往會之冉閔聞俊欲救趙遣大司馬從事中郎廣寧常煒使於燕俊使封裕詰之曰冉閔石氏養息負恩作逆何敢輒稱大號煒曰湯放桀武王伐紂以興商周之業曹孟德養於宦官莫知所出卒立魏氏之基苟非天命安能成功推此而言何必致問𥙿曰人言冉閔初立鑄金為已像以卜成敗而像不成信乎煒曰不聞𥙿曰南來者皆云如是何故隱之煒曰姦偽之人欲矯天命以惑人者乃假符瑞託蓍龜以自重魏主握符璽據中州受命何疑而更反真為偽取決於金像乎𥙿曰傳國璽果安在煒曰在鄴𥙿曰張舉言在襄國煒曰殺胡之日在鄴者殆無孑遺時有迸漏者皆濳伏溝瀆中耳彼安知璽之所在乎彼求救者為妄誕之辭無所不可況一璽乎俊猶以張舉之言為信乃積柴其旁使𥙿以其私誘之曰君更孰思無為徒取灰滅煒正色曰石氏貪暴親帥大兵攻燕國都雖不克而返然志在必取故運資糧聚器械於東北者非以相資乃欲相滅也魏主誅翦石氏雖不為燕臣子之心聞仇讎之滅義當如何而更為彼責我不亦異乎吾聞死者骨肉下于土精魂升于天蒙君之惠速益薪縱火使僕得上訴於帝足矣左右請殺之俊曰彼不憚殺身以徇其主忠臣也且冉閔有罪使臣何預焉使出就館夜使其鄉人趙瞻往勞之且曰君何不以實言王怒欲處君於遼碣之表奈何煒曰吾結髮以來尚不欺布衣況人主乎曲意苟合性所不能直情盡言雖沈東海不敢避也遂卧向壁不復與瞻言瞻具以白俊俊乃囚煒於龍城三月姚襄及趙汝隂王琨各引兵救襄國冉閔遣車騎將軍胡睦拒襄於長蘆將軍孫威拒琨於黃丘皆敗還士卒略盡閔欲自出擊之衛將軍王泰諌曰今襄國未下外救雲集若我出戰必覆背受敵此危道也不若固壘以挫其鋭徐觀其釁而擊之且陛下親臨行陳如失萬全則大事去矣閔將止道士法饒進曰陛下圍襄國經年無尺寸之功今賊至又避不擊將何以使將士乎且太白入昴當殺胡王百戰百克不可失也閔攘袂大言曰吾戰決矣敢沮衆者斬乃悉衆出與襄琨戰恱綰適以燕兵至去魏兵數里疏布騎卒曵柴揚塵魏人望之恟懼襄琨綰三面擊之趙王祗自後衝之魏兵大敗閔與十餘騎走還鄴降胡栗特康等執大單于胤及左僕射劉琦以降趙趙王祗殺之胡睦及司空石璞尚書令徐機中書監盧諶等并將士死者凡十餘萬人閔濳還人無知者鄴中震恐訛言閔已沒射聲校尉張艾請閔親郊以安衆心閔從之訛言乃息閔支解法饒父子贈韋謏大司徒姚襄還灄頭姚弋仲怒其不擒閔杖之一百初閔之為趙相也悉散倉庫以樹私恩與羌胡相攻無月不戰趙所徙青雍幽荆四州之民及氐羌胡蠻數百萬口以趙法禁不行各還本土道路交錯互相殺掠其能逹者什有二三中原大亂因以飢疫人相食無復耕者趙王祗使其將劉顯帥衆七萬攻鄴軍于明光宫去鄴二十三里魏主閔恐召王泰欲與之謀泰恚前言之不從辭以瘡甚閔親臨問之泰固稱疾篤閔怒還宫謂左右曰巴奴乃公豈假汝為命邪要將先滅羣胡却斬王泰乃悉衆出戰大破顯軍追奔至陽平斬首三萬餘級顯懼密使請降求殺祗以自效閔乃引歸會有告王泰欲叛入秦者閔殺之夷其三族夏四月渤海人逢約因趙亂擁衆數千家附於魏魏以約為渤海太守故太守劉準隗之兄子也土豪封放奕之從弟也别聚衆自守閔以準為幽州剌史與約中分渤海燕王俊使封奕討約使昌黎太守髙開討準放開瞻之子也奕引兵直抵約壘遣人謂約曰相與鄉里隔絶日久會遇甚難時事利害人各有心非所論也願單出一相見以寫佇結之情約素信重奕即出見奕於門外各屏騎卒單馬交語奕與論敘平生畢因説之曰與君纍丗同鄉情相愛重誠欲君享祚無窮今既獲展奉不可不盡所懷冉閔乘石氏之亂奄有成資是宜天下服其強矣而禍亂方始固知天命不可力爭也燕王奕丗載德奉義討亂所征無敵今已都薊南臨趙魏逺近之民襁負歸之民厭荼毒咸思有道冉閔之亡匪朝伊夕成敗之形昭然易見且燕王肇開王業虛心賢俊君能翻然改圗則功參絳灌慶流苖裔孰與為亡國將守孤城以待必至之禍哉約聞之悵然不言奕給使張安有勇力奕豫戒之俟約氣下安突前持其馬鞚因挾之而馳至營奕與坐謂曰君計不能自決故相為決之非欲取君以邀功乃欲全君以安民也髙開至渤海準放迎降俊以放為渤海太守準為右司馬約參軍事以約誘於人而遇獲更其名曰釣劉顯弒趙王祗及其丞相樂安王炳太宰趙庶等十餘人傳首于鄴驃騎將軍石寧奔柏人魏主閔焚祗首于通衢拜顯上大將軍大單于冀州牧秋七月劉顯復引兵攻鄴魏主閔擊敗之顯還稱帝於襄國八月燕王俊遣慕容恪攻中山慕容評攻王午于魯口魏中山大守上谷侯龕閉城拒守恪南徇常山軍于九門魏趙郡太守遼西李邽舉郡降恪厚撫之將邽還圍中山侯龕乃降恪入中山遷其將帥土豪數十家詣薊餘皆安堵軍令嚴明秋毫不犯慕容評至南安王午遣其將鄭生拒戰評擊斬之恱綰還自襄國俊乃知張舉之妄而殺之常煒有四男二女在中山俊釋煒之囚使諸子就見之煒上疏謝恩雋手令答曰卿本不為生計孤以州里相存耳今大亂之中諸子盡至豈非天所意邪天且念卿況於孤乎賜妾一人榖三百斛使居凡城以北平太守孫興為中山太守興善於綏撫中山遂安冬十一月逢釣亡歸勃海招集舊衆以叛燕樂陵太守賈堅使人告諭鄉人示以成敗釣部衆稍散遂來奔八年春正月劉顯攻常山魏主閔留大將軍蔣幹使輔太子智守鄴自將八千騎救之顯大司馬清河王寧以棗強降魏閔擊顯敗之追奔至襄國顯大將軍曹伏駒開門納閔閔殺顯及其公卿已下百餘人焚襄國宫室遷其民於鄴趙汝隂王琨以其妻妾來奔斬於建康市石氏遂絶魏主閔既克襄國因遊食常山中山諸郡趙立義將軍假勤聚胡羯萬餘人保據繹幕自稱趙帝夏四月甲子燕王俊遣慕容恪等擊魏慕容霸等擊勤魏主閔將與燕戰大將軍董閏車騎將軍張溫諌曰鮮卑乘勝鋒鋭且彼衆我寡請且避之俟其驕墯然後益兵以擊之閔怒曰吾欲以此衆平幽州斬慕容俊今遇恪而避之人謂我何司徒劉茂特進郎闓相謂曰吾君此行必不還矣吾等何為坐待戮辱皆自殺閔軍于安喜慕容恪引兵從之閔趣常山恪追之丙子及於魏昌之廉臺閔與燕兵十戰燕兵皆不勝閔素有勇名所將兵精鋭燕人憚之慕容恪巡陳諭將士曰冉閔勇而無謀一夫敵耳其士卒飢疲甲兵雖精其實難用不足破也閔以所將多步卒而燕皆騎兵引兵將趣林中恪參軍髙開曰吾騎兵利平地若閔得入林不可復制宜亟遣輕騎邀之既合而陽走誘致平地然後可擊也恪從之魏兵還就平地恪分軍為三部謂諸將曰閔性輕鋭又自以衆少必致死於我我厚集中軍之陳以待之俟其合戰卿等從旁擊之無不克矣乃擇鮮卑善射者五千人以鐵鎖連其馬為方陳而前閔所乘駿馬曰朱龍日行千里閔左操雙刃矛右執鉤戟以擊燕兵斬首三百餘級望見大幢知其為中軍直衝之燕兩軍從旁夾擊大破之圍閔數重閔潰圍東走二十餘里朱龍忽斃為燕兵所執燕人殺魏僕射羣執董閔張溫及閔皆送於薊閔子操奔魯口髙開被創而卒慕容恪進屯常山俊命恪鎮中山己卯冉閔至薊俊大赦立閔而責之曰汝奴僕下才何得妄稱帝閔曰天下大亂爾曹夷狄禽獸之類猶稱帝況我中土英雄何為不得稱帝邪俊怒鞭之三百送於龍城慕容霸軍至繹幕假勤與弟思聰舉城降甲申俊遣慕容評及中尉侯龕帥精騎萬人攻鄴癸巳至鄴魏蔣幹及太子智閉城拒守城外皆降於燕劉寧及弟崇帥胡騎三千奔晉陽五月鄴中大飢人相食故趙時宫人𬒳食略盡蔣幹遣侍中繆嵩詹事劉猗奉表請降且求救於謝尚庚寅燕王俊遣廣威將軍慕容軍殿中將軍慕輿根右司馬皇甫真等帥步騎二萬助慕容評攻鄴辛卯燕人斬冉閔於龍城會大旱蝗燕王俊謂閔為崇遣使祀之諡曰悼武天王初謝尚使戴施據枋頭施聞蔣幹求救乃自倉垣徙屯棘津止幹使者求傳國璽劉猗使繆嵩還鄴白幹幹疑尚不能救沈吟未決六月施帥壯士百餘人入鄴助守三臺紿之曰今燕冦在外道路不通璽未敢送也卿且出以付我我當馳白天子天子聞璽在吾所信卿至誠必多發兵糧以相救餉幹以為然出璽付之施宣言使督護何融迎糧隂令懷璽送于枋頭甲子蔣幹帥鋭卒五千及晉兵出戰慕容評大破之斬首四千級幹脫走入城秋七月王午聞魏敗時鄧恆已死午自稱安國王八月戊辰燕王俊遣慕容恪封奕陽騖攻之午閉城自守送冉操詣燕軍燕人掠其禾稼而還庚午魏長水校尉馬願等開鄴城納燕兵戴施蔣幹懸縋而下奔于倉垣慕容評送魏后董氏太子智太尉申鍾司空條攸等及乘輿服御于薊尚書令王簡左僕射張乾右僕射郎肅皆自殺燕王俊詐云董氏得傳國璽獻之賜號奉璽君賜冉智爵海賔侯以申鍾為大將軍右長史命慕容評鎮鄴謝尚自枋頭迎傳國璽至建康百僚畢賀冬十月故趙將擁兵據州郡者各遣使降燕燕王俊以王擢為益州剌史夔逸為秦州剌史張平為并州剌史李歷為兖州剌史髙昌為安西將軍劉寧為車騎將軍慕容恪屯安平積糧治攻且將討王午丙戌中山蘇林起兵於無極自稱天子恪自魯口還討林閏月戊子燕王俊遣廣威將軍慕輿根助恪攻林斬之王午為其將秦興所殺吕護殺興復自稱安國王燕羣僚共上尊號於燕王俊俊許之十一月丁卯始置百官以國相封奕為太尉左長史陽騖為尚書令右司馬皇甫真為尚書左僕射尚書令張悕為右僕射其餘文武拜授有差戊辰俊即皇帝位大赦自謂獲傳國璽改元元璽追尊武宣王為髙祖武宣皇帝文明王為太祖文明皇帝時晉使適至燕俊謂曰汝還白汝天子我承人乏為中國所推巳為帝矣改司州為中州建留臺於龍都以玄莬太守乙逸為尚書專委留務通鑑紀事本末卷第十四
