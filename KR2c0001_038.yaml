  text: 通鑑紀事本末卷第三十八
  hash: sha256:c7386ca0c6e3b6faaded3991b55454dcd894a041e21e3cb350d193c609c301f8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0001_SBCK_038-1a}
body:
  text: 諸鎮相攻唐僖宗廣明元年冬十一月以忠武大將周岌為忠武節度使初薛能遣牙將上蔡秦宗權調發至蔡州聞許州亂託云赴難選募蔡兵遂逐刺史據其城及周岌為節度使即以宗權為蔡州刺史是先稱留後至是遂授以節度使秋九月周岌逐節度使薛能自中和元年秋八月武寧節度使支詳遣牙將時溥陳璠將兵五千人入關討黃巢溥至東都自知留後溥送詳歸朝璠殺之詔以溥為武寧留後溥表璠為宿州刺史忠武監軍楊復光奏升蔡州為奉國軍以秦宗權為防禦使秋九月昭義十將成麟殺節度使高潯引兵還據潞州天井關戍將孟方立起兵攻麟殺之方立邢州人也冬十二月以感化留後時溥為節度使二年秋八月魏博節度使韓簡亦有兼并之志自將兵三萬攻河陽敗節度使諸葛爽於修武爽棄城走簡留兵戍之因掠邢洛而還九月黃巢所署同州防禦使朱溫殺其監軍嚴實舉州降王重榮王鐸承制以溫為同華節度使冬十月韓簡復引兵擊鄆州節度使曹存實逆戰敗死天平都將下邑朱瑄收餘衆嬰城拒守簡攻之不下詔以瑄權知天平留後以朱溫為右金吾大將軍河中行營招討副使賜名全忠十二月以欣代等州留後李克用為鴈門節度使用歸唐事見李克孟方立既殺成麟引兵歸邢州潞人請監軍吳全朂知留後是歲王鐸墨制以方立知邢州事方立不受遂遷昭義軍於邢州自稱留後表其將李殷鋭為潞州刺史三年春正月成德節度使常山忠穆王王景崇薨軍中立其子節度副使鎔知留後事時鎔生十年矣以天平留後朱瑄為節度使初光州刺史李罕之為秦宗權所攻棄州奔項城餘衆歸諸葛爽爽以為懷州刺史韓簡攻鄆州半年不能下爽復襲取河陽朱瑄請和簡乃捨之引兵擊河陽爽遣罕之逆戰於武陟魏軍大敗而還大將澶州刺史樂行達先歸據魏州軍中共立行達為留後簡為部下所殺己未以行達為魏博留後以王鎔為成德留後三月己丑以河中行營招討副使朱至忠為宣武節度使俟克復長安令赴鎮夏六月宣武節度使朱全忠帥所部數百人赴鎮秋七月丁卯至汴州以成德留後王鎔魏博留後樂行逹天平留後朱瑄為本道節度使昭義節度使孟方立以潞州地險人徑屢篡主帥欲漸弱之九月乃遷治所於昭州大將家及富室皆徙山東潞人不悅監軍祁審誨因人心不安使武鄰鎮使安居受潛以蠟丸乞師於李克成請復軍府於潞州冬十月克用遣其將賀公雅等赴之為方立所敗又遣李克修擊之克修克用弟也辛亥取潞州殺其刺史李殷鋭是後克用每歲出兵爭山東三州之人半為俘馘野無稼穡矣四年春正月賜魏博節度使樂行逹名彥禎周岌時溥朱全忠以黃巢兵尚強共求救於河東節度使李克用夏四月甲戌李克用至汴州營於城外朱全忠固請入城館於上源驛全忠就置酒聲樂饌具皆精豐禮貌甚恭克用乘酒使氣語頗侵之全忠不平薄暮罷酒從者皆霑醉宣武將楊彥洪密與全忠謀連車樹柵以塞衢路發兵圍驛而攻之呼聲動地克用醉不之聞親兵薛志勤史敬思等十餘人格鬬侍者郭景銖滅燭扶克用匿牀下以水沃其面徐告以難克用始張目援弓而起志勤射汴人死者數十須臾煙火四合會大雨震電天地晦冥志勤扶克用帥左右數人踰垣突圍乘電光而行汴人把橋力戰得度史敬思為後拒戰死克用登尉氏門縋城得出監軍陳景思等三百餘人皆為汴人所殺楊彥洪謂全忠曰胡人急則乘馬見乘馬者則射之是夕彥洪乘馬適在全忠前全忠射之殪克用妻劉氏多智略左右先脫歸者以汴人為變告劉氏神色不動立斬之隂召大將約束謀保軍以還比明克用至欲勒兵攻全忠劉氏曰公比為國討賊救東諸侯之急今汴人不道乃謀害公自當訴之朝廷若擅舉兵相攻則天下孰能辨其曲直且彼得以有辭矣克用從之引兵去但移書責全忠全忠復書曰前夕之變僕不之知朝廷自遣使將與楊彥洪為謀彥洪既伏其辜惟公諒察克用養子嗣源年十七從克用自上源出天石之間獨無所傷嗣源本胡人名邈佶烈無姓克用擇軍中驍勇者多養為子名回鶻張政之子曰存信振武孫重進曰存進許州王賢曰存賢安敬思曰存孝皆冒姓李氏丙子克用至許州故寨求糧於周岌岌辭以糧之乃自陝濟河還晉陽夏六月蔡州節度使秦宗權縱兵四出侵噬鄰道天平節度使朱瑄有衆三萬從父弟瑾勇冠軍中宣武節度使朱全忠為宗權所攻勢甚窘求救於瑄瑄遣瑾將兵救之敗宗權於合鄉全忠德之與瑄約為兄弟秋七月朱全忠擊秦宗權敗宗權于溵水李克用至晉陽大治甲兵遣榆次鎮將鴈門李承嗣奉表詣行在自陳有破黃巢大功為朱全忠所圖僅能自免將佐以下從行者三百餘人并牌印皆沒不返全忠仍榜東都陝孟云臣已死行營兵潰令所在邀遮屠翦勿令漏失將士皆號泣冤訴請復仇讎臣以朝廷至公當俟詔命拊循抑止復歸本道乞遣使按問發兵誅討臣遣弟克勤將萬騎在河中俟命時朝廷以大寇初平方務姑息得克用表大恐但遣中使賜優詔和解之克用前後凡八表稱全忠妬功疾能隂狡禍賊異日必為國患惟乞下詔削其官爵臣自帥本道兵討之不用度支糧餉上纍遣楊復恭等諭指稱吾深知卿冤方事之殷姑存大體克用終鬱鬱不平時藩鎮相攻者朝廷不復為之辨曲直由是互相吞噬惟力是視皆無所稟畏矣八月李克用奏請割麟州隸河東又奏請以弟克修為昭義節度使皆許之由是昭義分為二鎮進克用爵隴西郡王克用奏罷雲蔚防禦使依舊隸河東從之冬十二月義昌節度使兼中書令王鐸過魏州魏博節度使樂彥禎之子從訓伏卒數百人於漳南高雞泊圍而殺之彥禎奏云為盜所殺朝廷不能詰光啓元年春正月秦宗權寇潁亳朱全忠敗之於焦夷三月秦宗權稱帝置百官詔以武寧節度使時溥為蔡州四面行營兵馬都統以討之盧龍節度使李可舉成德節度使王鎔惡李克用之強而義武節度使王處存與克用親善為姪鄴娶克用女又河北諸鎮惟義武尚屬朝廷可舉等恐其窺伺山東終為已患乃相與謀曰易定燕趙之餘也約共滅處存而分其地又説雲中節度使赫連鐸使攻克用之背可舉遣其將李全忠將兵六萬攻易州鎔遣將將兵攻無極處存告急於克用克用遣其將康君立等將兵救之夏五月盧龍兵攻易州禆將劉仁恭穴地入城遂克之仁恭深州人也李克用自將救無極敗成德兵成德兵退保新城克用復進擊大破之拔新城成德兵走追至九門斬首萬餘級盧龍兵既得易州驕怠五處存夜遣卒三千蒙羊皮造城下盧龍兵以為羊也爭出掠之處存奮擊大破之復取易州李全忠走李全忠既喪師恐獲罪收餘衆還襲幽州六月李可舉窘急舉族登樓自焚死全忠自為留後秦宗權陷東都秋七月以李全忠為盧龍留後乙巳右補闕當濬上疏以為陛下姑息藩鎮太甚是非功過駢首並足致天下紛紛若此猶未之寤豈可不念駱谷之艱危復懷西顧之計乎宜復振典刑以威四方田令孜之黨言於上曰此疏傳於藩鎮豈不致其猜忿庚戌貶濬萬州司户尋賜死秦宗權攻鄰州道二十餘州陷之唯陳州距蔡百餘里兵力甚弱刺史趙犨日與宗權戰宗權不能屈詔以犨為蔡州節度使犨德朱全忠之援與全忠結昏凡全忠所調發無不立至冬十月癸丑秦宗權敗朱全忠于八角二年秋七月秦宗權陷許州八月盧龍節度使李全忠薨以其子匡威為留後九月李克修攻孟方立甲午擒其將吕臻於焦岡拔故鎮武安臨洛邯鄲沙河以大將安金俊為邢州刺史冬十月李克修攻邢州不克而還十二月秦宗權遣孫儒將兵攻陷鄭州進陷河陽儒自稱留後天平牙將朱瑾逐泰寧節度使齊克讓自稱留後朝廷因以瑾為泰寧節度使三年秦宗權自以兵力十倍於朱全忠而數為全忠所敗耻之欲悉力以攻汴州全忠患兵少二月以諸軍都指揮使朱珍為淄州刺史募兵於東道期以初夏而還夏四月朱珍至淄青旬日應募者萬餘人又襲青州獲馬千匹辛亥還至大梁朱全忠喜曰吾事濟矣時蔡人方寇汴州其將張晊屯北郊秦賢屯板橋各有衆數萬列三十六寨連延二十餘里全忠謂諸將曰彼蓄鋭休兵方來擊我未知朱珍之至謂吾兵少畏怯自守而已宜出其不意先擊之乃自引兵攻秦賢寨士卒踊躍爭先賢不為備連拔四寨斬萬餘級蔡人大驚以為神全忠又使牙將新野郭言募兵於河陽陝虢得萬餘人而還蔡將盧塘屯于萬勝夾汴水而軍以絶汴州運路朱全忠乘霧襲之掩殺殆盡於是蔡兵皆徙就張晊屯於赤岡全忠復就擊之殺二萬餘人蔡人大懼或軍中自相驚全忠乃還大梁養兵休士五月丙子朱全忠出擊張晊大破之秦宗權聞之自鄭州引精兵會之朱全忠求救於兖鄆朱瑄朱瑾皆引兵赴之義成軍亦至辛巳全忠以四鎮兵攻秦宗權於邊孝村大破之斬首二萬餘級宗權宵遁全忠追之至陽武橋而還全忠深德朱瑄兄事之蔡人之守東都河陽許女懷鄭陝虢者聞宗權敗皆棄去宗權發鄭州孫儒發河陽皆屠滅其人焚其廬舍而去宗權之勢自是稍衰秋八月朱全忠欲兼兖鄆而以朱瑄兄弟有功於已攻之無名乃誣瑄招誘宣武軍士移書誚讓瑄復書不遜全忠遣其將朱珍葛從周襲曹州壬子拔之殺刺史丘弘禮又攻濮州與兖鄆兵戰於劉橋殺數萬人朱瑄朱瑾僅以身免全忠與兖鄆始有隙九月朱珍攻濮州朱瑄遣其弟罕將步騎萬人救之辛卯朱全忠逆擊罕於范擒斬之冬十月丁未朱珍拔濮州刺史朱裕奔鄆珍進兵攻鄆瑄使裕詐遺珍書約為內應珍夜引兵赴之瑄開門納汴軍閉而殺之死者數千人汴軍乃退瑄乘勝復取曹州以其屬郭詞為刺史初宣武都指揮使朱珍與排陳斬斫使李唐賓勇略功名略相當全忠每戰使二人偕往無不捷然二人素不相下珍使迎其妻於大梁不白全忠全忠怒追還其妻殺守門者使親吏蔣玄暉召珍以漢賓代揔其衆館驛巡官馮翊敬翔諫曰朱珍未易輕取恐其猜懼生變全忠悔使人追止之珍果自疑丙子夜珍置酒召諸將唐賓疑其有異圖斬關奔大梁珍亦棄軍單騎繼至全忠兩惜其才皆不罪遣還濮州因引兵歸全忠多權數將佐莫測其所為惟敬翔能逆知之往往助其所不及全忠大悅自恨得翔晚凡軍機民政悉以咨之己亥秦宗權陷鄭州朝廷以淮南久亂閏月以朱全忠兼淮南節度使東南面招討使朱全忠以宣武行軍司馬李璠為淮南留後遣牙將郭言將兵千人送之感化節度使時溥自以於全忠為先進官為都統顧不得淮南而全忠得之意甚恨望全忠以書假道於溥溥不許璠至泗州溥以兵襲之郭言力戰得免而還徐汴始構怨十二月癸巳秦宗權所署山南東道留後趙德諲陷荆南節度使張瓌留其將王建肇守城而去遺民才數百家文德元年春正月蔡將石璠將萬餘人寇陳亳朱全忠遣朱珍葛從周將數千騎擊擒之癸亥以全忠為蔡州四面行營都統代時溥諸鎮兵皆受全忠節度二月魏博節度使樂彥禎驕泰不法發六州民築羅城方八十里人苦其役其子從訓尤凶險既殺王鐸魏人皆惡之從訓聚亡命五百餘人為親兵謂之子將牙兵為之藉藉不安從訓懼易服逃出止於近縣彥禎因以為相州刺史從訓遣人至魏運甲兵金帛交錯於路牙兵益疑彥禎懼請避位居龍興寺為僧衆推都將趙文㺹知留後事從訓引兵三萬至城下文㺹不出戰衆復殺之推牙將貴鄉羅弘信知留後事弘信引兵出與從訓戰敗之從訓收餘衆保內黃魏人圍之先是朱全忠將討蔡州遣押牙雷鄴以銀萬兩請糴於魏牙兵既逐彥禎殺鄴於館從訓既敗乃求救於全忠初河陽節度使李罕之與河南尹張全義刻臂為盟相得歡甚罕之勇而無謀性復貪暴意輕全義聞其勤儉力穡笑曰此田舍一夫耳全義聞之不以為忤罕之屢求榖帛全義皆與之而罕之徴求無厭河南不能給小不如所欲輒械河南主吏至河陽杖之河南將佐皆憤怒全義曰李太傅所求奈何不與竭力奉之狀若畏之者罕之益驕罕之所部不耕稼専以剽掠為資啖人為糧至是悉其衆攻絳州絳州刺史王友遇降之進攻晉州護國節度使王重盈密結金義以圖之全義潛發屯兵夜乘虛襲河陽黎明入三城罕之踰垣步走全義盡俘其家遂兼領河陽節度使罕之奔澤州求救於李克用三月朱全忠褁糧於宋州將討秦宗權會樂從訓來告急乃移軍屯滑州遣都押牙李唐賓等將步騎三萬攻蔡州遣都指揮使朱珍等分兵救樂從訓自白馬濟河下黎陽臨河李固三鎮進至內黃敗魏軍萬餘人獲其將周儒等十人李克用以其將康君立為南面招討使督李存孝薛阿檀史儼安金俊安休休五將騎七千助李罕之攻河陽張全義嬰城自守城中食盡求救於朱全忠以妻子為質夏四月朱全忠遣其將丁會葛從周牛存節將兵數萬救河陽李存孝令李罕之以步兵攻城自帥騎兵逆戰於溫河東軍敗安休休懼罪奔蔡州汴人分兵欲斷太行路康君立等懼引兵還全忠表丁會為河陽留後復以張全義為河南尹會夀春人存節博昌人也全義德全忠出已由是盡心附之全忠每出戰全義主給其糧使無乏李罕之為澤州刺史領河陽節度使罕之留其子頎事克用身還澤州専以寇鈔為事自懷孟晉綘數百里間州無刺史縣無令長田無麥禾邑無煙火者殆將十年河中絳州之間有摩雲山絶高民保聚其上寇盜莫能近罕之攻拔之時人謂之李摩雲樂從訓移軍洹水羅弘信遣其將程公信擊從訓斬之與父彥禎皆梟首軍門癸巳遣使以厚幣犒全忠軍請修好全忠乃召軍還詔以羅弘信權知魏博留後加李克用兼侍中五月己亥加朱全忠兼侍中趙德諲既失荆南且度秦宗權必敗壬寅舉山南東道來降且自託於朱全忠全忠表請以德諲自副制以山南東道為忠義軍以德諲為節度使充蔡州四靣行營副都統朱全忠既得洛孟無西顧之憂乃大發兵擊秦宗權大破宗權於蔡州之南克北關門宗權退守中州全忠分諸將為二十八寨以環之六月置佑國軍於河南府以張全義為節度使秋七月李罕之引河東兵寇河陽丁會擊却之以權知魏博留後羅弘信為節度使八月戊辰朱全忠拔蔡州南城九月朱全忠以饋運不繼且秦宗權殘破不足憂引兵還丙申遣朱珍將兵五千送楚州刺史劉瓚之官冬十月徐兵邀朱珍劉瓚不聽前珍等擊之取沛滕二縣斬獲萬計孟方立遣其將奚忠信將兵襲遼州李克修邀擊擒之十一月時溥自將步騎七萬屯吳旌鎮朱珍與戰大破之朱全忠又遣别將攻宿州刺史張友降之丙申秦宗權别將攻陷許州執忠武留後王藴復取許州十二月蔡將申叢執宗權折其足而囚之降於全忠全忠表叢為蔡州留後昭宗龍紀元年春正月汴將龎師古拔宿遷軍于吕梁時溥逆戰大敗還保彭城壬子蔡將郭璠殺申叢送秦宗權於汴告朱全忠云叢謀復立宗權全忠以璠為淮西留後二月朱全忠送秦宗權至京師斬于獨柳京兆尹孫揆監刑宗權於檻車中引首謂揆曰尚書察宗權豈反者邪但輸忠不效耳觀者皆笑揆逖之族孫也三月加朱全忠兼中書令進爵東平郡王全忠既克蔡州軍勢益盛加奉國節度使趙德諲中書令加蔡州節度使趙犨同平章事充忠武節度使以陳州為治所夏五月李克用大發兵遣李罕之李存孝攻孟方立六月拔磁洺二州方立遣大將馬溉袁奉韜將兵數萬拒之戰於琉璃陂方立兵大敗二將皆為所擒克用乘勝進攻邢州方立性猜忌諸將多怨至是皆不為方立用方立慙懼飲藥死弟攝洺州刺史遷素得士心衆奉之為留後求援於朱全忠全忠假道於魏博羅弘信不許全忠乃遣大將王虔裕將精兵數百間道入邢州共守朱珍拔蕭縣據之與時溥相拒朱全忠欲自往臨之珍命諸軍皆葺馬廄李唐賓部將嚴郊獨惰慢軍吏責之唐賓怒見珍訴之珍亦怒以唐賓為無禮拔劒斬之遣騎白全忠云唐賓謀叛淮南左司馬敬翔恐全忠乘怒倉猝處置違宜故留使者逮夜然後從容白之全忠果大驚翔因為畫䇿詐收唐賓妻子繫獄遣騎往慰撫全忠從之軍中始安秋七月全忠如蕭縣未至珍出迎命武士執之責以専殺而誅之諸將霍存等數十人叩頭為之請全忠怒以牀擲之乃退丁未至蕭縣以龎師古代珍為都指揮使八月丙子全忠進攻時溥壁會大雨引兵還大順元年春正月李克用急攻邢州孟遷食竭力盡執王虔裕及汴兵以降克用以安金俊為邢洺團練使二月李克用將兵攻雲州防禦使赫連鐸克其東城鐸求救於盧龍節度使李匡威匡威將兵三萬赴之丙子邢洺團練使安金俊中流矢死河東萬勝軍申信叛降於鐸會幽州軍至克用引還時溥求救於河東李克用遣其將石君和將五百騎赴之李克用巡潞州以供具不厚怒昭義節度使李克修詬而笞之克修慙憤成疾三月薨克用表其弟決勝軍使克恭為昭義留後夏四月宿州將張筠逐刺史張紹光附于時溥朱全忠帥諸軍討之溥出兵掠碭山全忠遣牙內都指揮使朱友裕擊之殺三千餘人擒石君和友裕全忠之子也赫連鐸李匡威請討李克用朱全忠亦上言克用終為國患今因其敗臣請帥汴滑孟三軍與河北三鎮共除之乞朝廷命大臣為統帥初張濬因楊復恭以進復恭中廢更附田令孜而薄復恭及復恭再用事深恨之上知濬與復恭有隙特親倚之濬亦以功名為己任每自比謝安裴度克用之討黃巢屯河中也濬為都統判官克用薄其為人聞其作相私謂詔使曰張公好虛談而無實用傾覆之士也主上采其名而用之它日交亂天下必是人也濬聞而銜之上從容與濬論古今治亂濬曰陛下英睿如此而中外制於強臣此臣日夜所痛心疾首也上問以當今所急對曰莫若強兵以服天下上於是廣募兵於京師至十萬人及全忠等請討克用上命三省御史臺四品以上議之以為不可者什七八杜讓能劉崇望亦以為不可濬欲倚外勢以擠楊復恭乃曰先帝再幸山南沙陀所為也臣常慮其與河朔相表裏致朝廷不能制今兩河藩鎮共請討之此千載一時但乞陛下付臣兵柄旬月可平失今不取後悔無及孔緯曰濬言是也復恭曰先朝播遷雖藩鎮跋扈亦由居中之臣措置未得其宜今宗廟甫安不宜更造兵端上曰克用有興復大功今乘其危攻之天下其謂我何緯曰陛下所言一時之體也張濬所言萬世之利也昨計用兵饋運犒賞之費一二年間未至匱乏在陛下斷志行之耳上以二相言叶僶俯從之曰兹事今付卿二人無貽朕羞五月詔削奪克用官爵屬籍以濬為河東行營都招討制置宣慰使京兆尹孫揆副之以鎮國節度使韓建為都虞候兼供軍糧料使以朱全忠為南面招討使王鎔為東面招討使李匡威為北面招討使赫連鐸副之濬奏給事中牛徽為行營判官徽曰國家以喪亂之餘欲為英武之舉橫挑強冦離諸侯心吾見其顛沛也遂以衰疾固辭䘗僧孺之孫也李克恭驕恣不曉軍事潞人素樂李克修之簡儉且死非其罪潞人憐之由是將士離心初潞人叛孟氏牙將安居受等召河東兵以取潞州及孟遷以邢洺磁州歸李克用克用寵任之以遷為軍城都虞候羣從皆補右職居受等咸怨且懼昭義有精兵號後院將克用既得三州將圖河朔令李克恭選後院將尤驍勇者五百人送晉陽潞人惜之克恭遣牙將李元審及小校馮霸部送晉陽至銅鞮霸劫其衆以叛循山而南至于沁水衆已三千人李元審擊之為霸所傷歸于潞庚子克恭就元審所館視之安居受帥其黨作亂攻而焚之克恭元審皆死衆推居受為留後附于朱全忠居受使召馮霸不至居受懼出走為野人所殺霸引兵入潞自為留後時朝廷方討克用聞克恭死朝臣皆賀全忠遣河陽留後朱崇節將兵入潞州權知留後克用遣康君立李存孝將兵圍之壬子張濬帥諸軍五十二都及邠寧鄜夏雜虜合五萬人發京師上御安喜樓餞之濬屏左右言於上曰俟臣先除外憂然後為陛下除內患楊復恭竊聽聞之兩軍中尉餞濬於長樂坂復恭屬濬酒濬辭以醉復恭戲之曰相公杖鉞專征作態邪濬曰俟平賊還方見作態耳復恭益忌之癸丑削奪李罕之官爵六月以孫揆為昭義節度使充招討副使張濬會宣武鎮國靜難鳯翔保大定難諸軍於晉州秋七月官軍至隂地關朱全忠遣驍將葛從周將千騎潛自壺關夜扺潞州犯圍入城又遣别將李讜李重胤鄧季筠將兵攻李罕之於澤州又遣張全義朱友裕軍於澤州之北為從周應援季筠下邑人也全忠奏臣已遣兵守潞州請孫揆赴鎮張濬亦恐昭義遂為汴人所據分兵二千使揆將之趣潞州八月乙丑揆發晉州李存孝聞之以三百騎伏於長子西谷中揆建牙杖節褒衣大蓋擁衆而行存孝突出擒揆及賜旌節中使韓歸範牙兵五百餘人追擊餘衆於刀黃嶺盡殺之存孝械揆及歸範糸斥以素練徇於潞州城下曰朝廷以孫尚書為潞帥命韓天使賜旌節葛僕射可速歸大梁令尚書視事遂糸斥以獻於克用克用囚之既而使人誘之欲以為河東副使揆曰吾天子大臣兵敗而死分也豈能復事鎮使邪克用怒命以鋸鋸之鋸不能入揆罵曰死狗奴鋸人當用板夾汝豈知邪乃以板夾之至死罵不絶聲李罕之告急於李克用克用遣存孝將五千騎救之九月壬寅朱全忠軍于河陽汴軍之初圍澤州也呼李罕之曰相公每恃河東輕絶當道今張相公圍太原葛僕射入潞府旬日之間沙陀無穴自藏相公何路求生邪及李存孝至選精騎五百繞汴寨呼曰我沙陀之求穴者也欲得爾肉以飽士卒可令肥者出鬬汴將鄧季筠亦驍將也引兵出戰存孝生擒之是夕李讜李重胤收衆遁去存孝罕之隨而擊之至馬牢山大破之斬獲萬計追至懷州而還存孝復引兵攻潞州葛從周朱崇節棄潞州而歸戊申全忠庭責諸將撓敗之罪斬李讜李重胤而還李克用以康立君為昭義留後李存孝為汾州刺史存孝自謂擒孫揆功大當鎮昭義而君立得之憤恚不食者數日縱意刑殺始有叛克用之志李匡威攻蔚州虜其刺史邢善益赫連鐸引吐蕃黠戛斯衆數萬攻遮虜平殺其軍使劉胡子克用遣其將李存信擊之不勝更命李嗣源為存信之副遂破之克用以大軍繼其後匡威鐸皆敗走獲匡威之子武州刺史仁宗及鐸之壻俘斬萬計李嗣源性謹重亷儉諸將相會各自詫勇略嗣源獨默然徐曰諸君喜以口擊賊嗣源但以手擊賊耳衆慙而止冬十月乙酉朱全忠自河陽如滑州視事遣使者請糧馬及假道于魏以伐河東羅弘信不許又請於鎮鎮人亦不許全忠乃自黎陽濟河擊魏官軍出隂地關遊兵至于汾州李克用遣薛志勤李承嗣將騎三千營于洪洞李存孝將兵五千營于趙城鎮國節度使韓建以壯士三百夜襲存孝營存孝知之設伏以待之建兵不利靜難鳯翔之兵不戰而走禁軍自潰河東乘兵勝逐北扺晉州西門張濬出戰又敗官軍死者近三千人靜難鳯翔保大定難之軍先度河西歸濬獨有禁軍及宣武軍合萬人與韓建閉城拒守自是不敢復出存孝引兵攻絳州十一月刺史張行恭棄城走存孝進攻晉州三日與其衆謀曰張濬宰相俘之無益天子禁兵不宜加害乃退五十里而軍濬建自含口遁去存孝取晉絳二州大掠慈隰之境先是克用遣韓歸範歸朝附表訟冤言臣父子三代受恩四朝破龎勛翦黃巢黜襄王存易定致陛下今日冠通天之冠佩白玉之璽未必非臣之力也若以攻雲州為臣罪則拓跋思恭之取鄜延朱全忠之侵徐鄆何獨不討賞彼誅此臣豈無辭且朝廷當阽危之時則譽臣為韓彭伊吕及既安之後則罵臣為戎羯胡夷今天下握兵立功之臣獨不懼陛下它日之罵乎況臣果有大罪六師征之自有典刑何必幸臣之弱而後取之邪今張濬既出師則固難束手已集藩漢兵五十萬欲直扺蒲潼與濬格鬬若其不勝甘從削奪不然方且輕騎呌閽頓首丹陛訴姦回於陛下之扆座納制敕於先帝之廟庭然後自拘司敗恭俟鈇質表至濬已敗朝廷震恐濬與韓建踰王屋至河陽撤民屋為筏以濟河師徒失亡殆盡是役也朝廷倚朱全忠及河朔三鎮及濬至晉州全忠方連兵徐鄆雖遣將攻澤州而身不至行營乃求兵糧於鎮魏鎮魏倚河東為扞蔽皆不出兵惟華邠鳯翔鄄夏之兵會之兵未交而孫揆被擒幽雲俱敗楊復恭復從中沮之故濬軍望風自潰十二月辛丑汴將丁會葛從周擊魏度河取黎陽臨河龎師古霍存下淇門衛縣朱全忠自以大軍繼之二年春正月羅弘信軍于內黃丙辰朱全忠擊之五戰皆捷至永定橋斬首萬餘級弘信懼遣使厚幣請和全忠命止焚掠歸其俘還軍河上魏博自是服於汴庚申制以太保門下侍郎同平章事孔緯為荆南節度使中書侍郎同平章事張濬為鄂嶽觀察使以翰林學士承旨兵部侍郎崔昭緯同平章事御史中丞徐彥若為戶部侍郎同平章事昭緯慎由從子彥若商之子也楊復恭使人劫孔緯於長樂坡斬其旌節資裝俱盡緯僅能自免李克用復遣使上表曰張濬以陛下萬代之業邀自已一時之功知臣與朱溫深仇私相連結臣今身無官爵名是罪人不敢歸陛下藩方且欲於河中寄寓進退行止伏俟指麾詔再貶孔緯均州刺史張濬連州刺史賜克用詔悉復其官爵使歸晉陽二月加李克用守中書令復李罕之官爵再貶張濬繡州司户三月張濬至藍田逃奔華州依韓建與孔緯密求救於朱全忠全忠上表為緯濬訟冤朝廷不得已並聽自便緯至商州而還亦寓居華州夏四月李克用大舉擊赫連鐸敗其兵於河上進圍雲州秋七月李克用急攻雲州赫連鐸食盡奔吐谷渾部既而歸於幽州克用表大將石善友為大同防禦使邢洺節度使李存孝勸李克用攻鎮州克用從之八月克用南巡澤潞遂涉懷孟之境朱全忠遣其將丁會攻宿州克其外城冬十月壬午宿州刺史張筠降于丁會李克用攻王鎔大破鎮兵於龍尾岡斬獲萬計遂拔臨城攻元氏柏鄉李匡威引幽州兵救之克用大掠而還軍于邢州十一月曹州都將郭銖殺刺史郭詞降於朱全忠泰寧節度使朱瑾將萬餘人攻單州乙丑時溥將劉知俊帥衆二千降於全忠知俊沛人徐之驍將也溥軍自是不振全忠以知俊為左右開道指揮使十二月乙酉汴將丁會張歸霸與朱瑾戰金鄉大破之殺獲殆盡瑾單騎走免景福元年春正月王鎔李匡威合兵十餘萬攻堯山李克用遣其將李嗣勳擊之大破幽鎮兵斬獲三萬二月戊寅朱全忠出兵擊朱瑄遣其子友裕將兵前行軍于斗門甲申朱全忠至衛南朱瑄將步騎萬人襲斗門朱友裕棄營走瑄據其營全忠不知乙酉引兵趣斗門至者皆為鄆人所殺全忠退軍瓠河丁亥瑄擊全忠大破之全忠走張歸厚於後力戰全忠僅免副使李璠等皆死朱全忠奏貶河陽節度使趙克裕以佑國節度使張全義兼河陽節度使朱全忠連年攻時溥徐泗濠三州民不得耕穫兖鄆河東兵救之皆無功復值水災人死者什六七溥困甚請和於全忠全忠曰必移鎮乃可溥許之全忠乃奏請移溥它鎮仍命大臣鎮徐州詔以門下侍郎同平章事劉崇望同平章事充感化節度使以溥為太子太師溥恐全忠詐而殺之據城不奉詔崇望及華隂而還忠義節度使趙德諲薨子匡凝代之三月李克用王處存合兵攻王鎔癸丑拔天長鎮戊午鎔與戰於新市大破之殺獲二萬餘人辛酉克用退屯欒城詔和解河東及鎮定幽四鎮夏四月李匡威出兵侵雲代壬寅李克用始引兵還秋八月李克用北巡至天寧軍聞李匡威赫連鐸將兵八萬寇雲州遣其將李君慶發兵於晉陽克用潛入新城伏兵於神堆擒吐谷渾邏騎三百匡威等大驚丙申君慶以大軍至克用遷入雲州丁酉出擊匡威等大破之己亥匡威等燒營而遁追至天成軍斬獲不可勝計九月時溥迫監軍奏稱將士留已冬十月復以溥為侍中感化節度朱全忠奏請追溥新命詔諭解之初邢洺磁州留後李存孝與李存信俱為李克用假子不相睦存信有寵於克用存孝在邢州欲立大功以勝之乃建議取鎮冀存信從中沮之不時聽許及王鎔圍堯山存孝救之不克克用以存信為蕃漢馬步都指揮使與存孝共擊之二人互相猜忌逗遛不進克用更遣李嗣勳等擊破之存信還譖存孝無心擊賊疑與之有私約存孝聞之自以有功於克用而信任顧不及存信憤怨且懼及禍乃潛結王鎔及朱全忠上表以三州自歸於朝廷乞賜旌節及會諸道兵討克用詔以存孝為邢洺磁節度使不許會兵十一月時溥濠州刺史張璲泗州刺史張諌以州附于朱全忠乙未朱全忠遣其子友裕將兵十萬攻濮州拔之執其刺史邵倫遂令友裕移兵擊時溥二年春正月時溥遣兵攻宿州刺史郭言戰死二月李克用引兵圍邢州王鎔遣牙將王藏海致書解之克用怒斬藏海進兵擊鎔敗鎔兵於平山辛巳攻天長鎮旬日不下鎔出兵三萬救之克用逆戰於叱日嶺下大破之斬首萬餘級餘衆潰去河東軍無食脯其尸而啖之時溥求救於朱瑾朱全忠遣其將霍存將騎兵三千軍曹州以備之瑾將兵二萬救徐州存引兵赴之與朱友裕合擊徐兖兵於石佛山下大破之瑾遁歸兖州辛卯徐兵復出存戰死李克用進下井陘李存孝將兵救王鎔遂入鎮州與鎔計事鎔又乞師於朱全忠全忠方與時溥相攻不能救但遺克用書言鄴下有十萬精兵抑而未進克用復書言儻實屯軍鄴下顒望降臨必欲真決雌雄願角逐於常山之尾甲午李匡威引兵救鎔敗河東兵於元氏克用引還邢州鎔犒匡威於藁城輦金帛二十萬以酬之朱友裕圍彭城時溥數出兵友裕閉壁不戰朱瑾宵遁友裕不追都虞候朱友恭以書譖友裕於全忠全忠怒驛書下都指揮使龎師古使代之將且按其事書誤逹於友裕友裕大懼以二千騎逃入山中潛詣碭山匿於伯父全昱之所全忠夫人張氏聞之使友裕單騎詣汴州見全忠泣涕拜伏於庭全忠命左右捽抑將斬之夫人趨就抱之泣曰汝捨兵衆束身歸罪無異志明矣全忠悟而捨之使權知許州友恭夀春人李彥威也幼為全忠家僮全忠養以為子張夫人碭山人多智略全忠敬憚之雖軍府事時與之謀議或將兵出至中塗夫人以為不可遣一介召之全忠立為之返龎師古攻佛山寨拔之自是徐兵不敢出李匡威之救王鎔也將發幽州家人會别弟匡籌之妻美匡威醉而淫之三月匡威自鎮州還至博野匡籌據軍府自稱留後以符追行營兵匡威衆潰歸但與親近留深州進退無所之遣判官李抱真入奏請歸京師京師屢更大亂聞匡威來坊市人恐曰金頭王來圖社稷士民或竄匿山谷王鎔德其以已故致失地迎歸鎮州為築第父事之夏四月汴軍攻徐州纍月不克通事官張濤以書白朱全忠云進兵時日非良故無功全忠以為然敬翔曰今攻城纍月所費甚多徐人已困旦夕且下使將士聞此言則懈於攻取矣全忠乃焚其書癸未全忠自將如徐州戊子龎師古拔彭城時溥舉族登燕子樓自焚死己丑全忠入彭城以宋州刺史張廷範知感化留後奏乞朝廷除文臣為節度使李匡威在鎮州為王鎔完城塹繕甲兵訓士卒視之如子匡威以鎔年少且樂真定土風潛謀奪之李抱真自京師還為之畫䇿隂以恩施悅其將士王氏在鎮久鎮人愛之不徇匡威匡威忌日鎔就第弔之匡威素服衷甲伏兵劫之鎔趨抱匡威曰鎔為晉人所困幾亡矣賴公以有今日公欲得四州此固鎔之願也不若與公共歸府以位讓公則將士莫之拒矣匡威以為然與鎔駢馬陳兵入府會大風雷雨屋瓦皆振匡威入東偏門鎮之親軍閉之有屠者墨君和自缺垣躍出拳毆匡威甲士挾鎔於馬上負之登屋鎮人既得鎔攻匡威殺之并其族黨鎔時年十七體踈瘦為君和所挾頸痛頭偏者纍日李匡籌奏鎔殺其兄請舉兵復寃詔不許幽州將劉仁恭將兵戍蔚州過期未代士卒思歸會李匡籌立戍卒奉仁恭為帥還攻幽州至居庸關為府兵所敗仁恭奔河東李克用厚待之六月李匡籌出兵攻王鎔之樂夀武強以報殺匡威之耻秋七月王鎔遣兵救邢州李克用敗之於平山壬申進擊鎮州鎔懼請以兵糧二十萬助攻邢州克用許之克用治兵於欒城合鎔兵三萬進屯任縣李存信屯琉璃陂八月朱全忠命龎師古移兵攻兖州與朱瑾戰屢破之九月李存孝夜犯李存信營虜奉誠軍使孫考老李克用自引兵攻邢州掘塹築壘環之存孝時出兵突擊塹壘不能成河東牙將袁奉韜密使人謂存孝曰大王惟俟塹成即歸晉陽尚書所憚者獨大王耳諸將非尚書敵也大王若歸咫尺之塹安能沮尚書之鋒鋭邪存孝以為然按兵不出旬日塹壘成飛走不能越存孝由是遂窮汴將鄧季筠從克用攻邢州輕騎逃歸朱全忠大喜使將親軍十二月汴將葛從周攻齊州刺史朱威朱瑄朱瑾引兵救之乾寧元年春正月以李匡籌為盧龍節度使二月朱全忠自將擊朱瑄軍于魚山瑄與朱瑾合兵攻之兖鄆兵大敗死者萬餘人三月邢州城中食盡甲申李存孝登城謂李克用曰兒蒙王恩得富貴苟非困於讒慝安肯捨父子而從仇讎乎願一見王死不恨克用使劉夫人視之夫人引存孝出見克用存孝泥首謝罪曰兒粗立微勞存信逼兒失圖至此克用叱之曰汝遺朱全忠王鎔書毁我萬端亦存信教汝乎囚之歸于晉陽車裂於牙門存孝驍勇克用軍中皆莫及常將騎兵為先鋒所向無敵身被重鎧腰弓髀槊獨舞鐵檛陷陳萬人辟易每以二馬自隨馬稍乏就陳中易之出入如飛克用惜其才意臨刑諸將必為之請因而釋之既而諸將疾其能竟無一人言者既死克用為之不視事者旬日私恨諸將而於李存信竟無所譴又有薛阿檀者其勇與存孝相侔諸將疾之常不得志密與存孝通存孝誅恐事泄遂自殺自是克用兵勢浸弱而朱全忠獨盛矣克用表馬師素為邢洺節度使夏五月朱瑄朱瑾求救於河東李克用遣騎將安福順及弟福慶福遷督精騎五百假道於魏度河應之六月李克用大破吐谷渾殺赫連鐸擒白義誠秋八月昭義節度使康君立詣晉陽謁李克用克用會諸將飲博酒酣克用語及李存孝流涕不已君立素與李存信善一言忤旨克用拔劒斫之囚於馬步司九月庚申朔出之君立已死克用表雲州刺史薛志誠為昭義留後冬十月劉仁恭數因蓋寓獻䇿於李克用願得兵萬人取幽州克用方攻邢州分兵數千欲納仁恭於幽州不克李匡籌益驕數侵河東之境克用怒十一月大舉兵攻匡籌拔武州進圍新州十二月李匡籌遣大將將步騎數萬救新州李克用選精兵逆戰於段莊大破之斬首萬餘級生擒將校三百人以練糸斥之徇於城下是夕新州降辛亥進攻媯州壬子匡籌復發兵出居庸關克用使精騎當其前以疲之遣步將李存審自他道出其背夾擊之幽州兵大敗殺獲萬計甲寅李匡籌挈其族奔滄州義昌節度使盧彥威利其輜重妓妾遣兵攻之於景城殺之盡俘其衆存審本姓符宛丘人克用養以為子丙辰克用進軍幽州其大將請降匡籌素暗懦初據軍府兄匡威聞之謂諸將曰兄失弟得不出吾家亦復何恨但惜匡籌才短不能保守得及二年幸矣二年春正月幽州軍民數萬以麾蓋歌鼓迎李克用入府舍克用命符存審劉仁恭將兵略定巡屬癸未朱全忠遣其將朱友恭圍兖州朱瑄自鄆以兵糧救之友恭設伏敗之於高梧盡奪其餉擒河東將安福順安福慶二月李克用表劉仁恭為盧龍留後留兵戍之壬子還晉陽媯州人高思繼兄弟有武幹為燕人所服克用皆以為都將分掌幽州兵部下士卒皆山北之豪也仁恭憚之久之河東兵戍幽州者暴橫思繼兄弟以法裁之所誅殺甚多克用怒以讓仁恭仁恭訴稱髙氏兄弟所為克用俱殺之仁恭欲收燕人心復引其諸子置帳下厚撫之三月加王鎔兼侍中夏六月辛卯以前均州刺史孔緯繡州司戶張濬並為太子賓客壬辰以緯為吏部尚書復其階爵癸巳以張濬為兵部尚書諸道租庸使九月朱全忠自將擊朱瑄戰於梁山瑄敗走還鄆冬十月朱全忠遣都將葛從周擊兖州自以大軍繼之癸卯圍兖州義武節度使王處存薨軍中推其子節度副使郜為留後十一月齊州刺史朱瓊舉州降於朱全忠瓊瑾之從父兄也朱瑄遣其將賀瓌栁存及河東將何懷寶將兵萬餘人襲曹州以解兖州之圍瓌濮陽人也丁卯全忠自中都引兵夜追之比明至巨野南及之屠殺殆盡生擒瓌存懷寶俘士卒三千餘人是日晡後大風沙塵晦冥全忠曰此殺人未足耳下令所得之俘盡殺之庚午縛瓌等徇於兖州城下謂朱瑾曰卿兄已敗何不早降朱瑾偽遣使請降於朱全忠全忠自就延夀門下與瑾語瑾曰欲送符印願使兄瓊來領之辛巳全忠使瓊往瑾立馬橋上伏驍果董懷進於橋下瓊至懷進突出擒之以入須臾擲首城外全忠乃引兵還以瓊弟玭為齊州防禦使殺柳存何懷寶聞賀瓌名釋而用之朱全忠之去兖州也留葛從周將兵守之朱瑾閉城不復出從周將還乃揚言天平河東救兵至引兵西北邀之夜半潛歸故寨瑾以從周精兵悉出果出兵攻寨從周突出奮擊殺千餘人擒其都將孫漢筠而還朱瑄朱瑾屢為朱全忠所攻民失耕稼財力俱弊告急於河東李克用遣其大將史儼李承嗣將數千騎假道于魏以救之三年春閏正月李克用遣蕃漢都指揮使李存信將萬騎假道于魏以救兖鄆軍于莘縣朱全忠使人謂羅弘信曰克用志吞河朔師還之日貴道可憂存信戢衆不嚴侵暴魏人存信怒發兵三萬夜襲之弘信軍潰退保洺州喪士卒什二三委棄資糧兵械萬數史儼李承嗣之軍隔絶不得還弘信自是與河東絶専志於汴全忠方圖兖鄆畏弘信議其後弘信每有贈遺全忠必對使者北向拜授之曰六兄於豫倍年以長固非諸鄰之比弘信信之全忠以是得専意東方二月朱全忠薦兵部尚書張濬上欲復相之李克用表請發兵擊全忠且言濬朝為相臣則夕至闕廷京師震懼上下詔和解之三月朱全忠遣龎師古將兵伐鄆州敗鄆兵於馬頰遂抵其城下夏四月李克用擊羅弘信攻洹水殺魏兵萬餘進攻魏州五月李克用攻魏博侵掠遍六州朱全忠召葛從周於鄆州使將兵營洹水以救魏博留龎師古攻州鄆六月克用引兵擊從周汴人多鑿坎於陳前戰方酣克用之子鐵林指揮使落落馬遇坎而躓汴人生擒之克用自往救之馬亦躓幾為汴人所獲克用顧射汴將一人斃之乃得免克用請修好以贖落落全忠不許以與羅弘信使殺之克用引軍還葛從周自洹水引兵濟河屯于楊劉復擊鄆及兖鄆河東之兵戰于故樂亭破之兖鄆屬城皆為汴人所據屢求救於李克用克用發兵赴之為羅弘信所拒不得前兖鄆由是不振秋九月河東將李存信攻臨清敗汴將葛從周於宗城北乘勝至魏州北門冬十月李克用自將攻魏州敗魏兵於白龍潭追至觀音門朱全忠復遣葛從周救之屯於洹水全忠以大軍繼之克用乃還十一月朱全忠還大梁復遣葛從周東會龎師古攻鄆州四年春正月龎師古葛從周併兵攻鄆州朱瑄兵少食盡不復出戰但引水為深壕以自固辛卯師古等營於水西南命為浮梁辛巳潛決壕水丙申浮梁成師古夜以中軍先濟瑄聞之棄城奔中都葛從周逐之野人執瑄及妻子以獻朱全忠入鄆州以龐師古為天平留後朱瑾留大將康懷貞守兖州與河東將史儼李承嗣掠徐州之境以給軍食全忠聞之遣葛從周將兵襲兖州懷貞聞鄆州已失守汴兵奄至遂降二月戊申從周入兖州獲瑾妻子朱瑾還無所歸帥其衆趨沂州刺史尹處賓不納走保海州為汴兵所逼與史儼李承嗣擁州民度淮奔楊行密行密逆之於髙郵表瑾留武寧節度使全忠納瑾之妻引兵還張夫人逆於封丘全忠以得瑾妻告之夫人請見之瑾妻拜夫人答拜且泣曰兖鄆與司空同姓約為兄弟以小故恨望起兵相攻使吾姒辱於此它日汴州失守吾亦如吾姒之今日乎全忠乃送瑾妻於佛寺為尼斬朱瑄於汴橋於是鄆齊曹棣兖沂密徐宿陳許鄭滑濮皆入于全忠惟王師範保淄青一道亦服於全忠李存信在魏州聞兖鄆皆陷引兵還淮南舊善水戰不知騎射及得河東兖鄆兵軍聲大振史儼李承嗣皆河東驍將李克用深惜之遣使間道詣楊行密請之行密許之亦遣使詣克用修好初李克用取幽州表劉仁恭為節度使留戍兵及腹心將十人典其機要租賦供軍之外悉輸晉陽及上幸華州克用徵兵於仁恭又遺成德節度使王鎔義武節度使王郜書欲與之共定關中奉天子還長安仁恭辭以契丹入寇須兵扞禦俟虜退然後承命克用屢趣之使者相繼數月兵不出克用移書責之仁恭抵書於地慢罵囚其使者欲殺河東戍將戍將遁逃獲免克用大怒八月自將擊仁恭秋九月丁丑李克用至安塞軍辛巳攻之幽州將單可及引騎兵至克用方飲酒前鋒白賊至矣克用醉曰仁恭何在對曰但見可及輩克用瞋目曰可及輩何足為敵亟命擊之是日大霧不辨人物幽州將楊師侃伏兵於木瓜澗河東兵大敗失亡太半會大風雨震電幽州兵解去克用醒而後知敗責大將李存信等曰吾以醉廢事汝曹何不力爭冬十月劉仁恭奏稱李克用無故稱兵見討本道大破其黨于木瓜澗請自為統帥以討克用詔不許又遺朱全忠書全忠奏加仁恭同平章事朝廷從之仁恭又遣使謝克用陳去就不自安之意克用復書略曰今公仗鉞控兵理民立法擢士則欲其報德選將則望彼酬恩已尚不然人何足信僕料猜防出於骨肉嫌忌生於屏帷持干將而不敢授人捧盟盤而何詞著誓光化元年春三月義昌節度使盧彥威性殘虐又不禮於鄰道與盧龍節度使劉仁恭爭鹽利仁恭遣其子守文將兵襲滄州彥威棄城挈家奔魏州羅弘信不納乃奔汴州仁恭遂取滄景德三州以守文為義昌留後仁恭兵勢益盛自謂得天助有併吞河朔之志為守文請旌節朝廷未許會中使至范陽仁恭語之曰旌節吾自有之但欲得長安本色耳何為纍章見拒為吾言之其悖慢如此朱全忠與劉仁恭修好會魏博兵擊李克用夏四月丁未全忠至巨鹿城下敗河東兵萬餘人逐北至青山口丁未朱全忠遣葛從周分兵攻洺州戊辰拔之斬刺史邢善益夏五月葛從周攻邢州刺史馬師素棄城走辛未磁州刺史袁奉滔自剄全忠以從周為昭義留後守邢洺磁三州而還秋八月上欲藩鎮相與輯睦以太子賓客張有孚為河東汴州宣慰使賜李克用朱全忠詔又令宰相與之書使之和解克用欲奉詔而耻於先自屈乃致書王鎔使通於全忠全忠不從九月魏博節度使羅弘信薨軍中推其子節度副使紹威知留後冬十月李克用遣其將李嗣昭周德威將步騎三萬出青山將復山東三州壬寅進攻邢州葛從周出戰大破之嗣昭等引兵退入青山從周追之將扼其歸路步兵自潰嗣昭不能制會橫衝都將李嗣源以所部兵至謂嗣昭曰吾輩亦去則勢不可支矣我試為公擊之嗣昭曰善我請從公後嗣源乃解鞍厲鏃臨髙布陳左右指畫邢人莫之測嗣源直前奮擊嗣昭繼之從周乃退德威馬邑人也以羅紹威知魏博留後十一月以魏博留後羅紹威為節度使十二月昭義節度使薛志勤薨旬日無帥李罕之擅引澤州兵夜入潞州據之以狀白克用曰薛鐵山死州民無主慮不逞者為變故罕之専命鎮撫取王裁旨克用怒遣人讓之罕之遂遣其子皓請降于朱全忠克用遣李嗣昭將兵討之二年春正月朱全忠表李罕之為昭義節度使劉仁恭發幽滄等十二州兵十萬欲兼河朔攻貝州拔之城中萬餘户盡屠之投尸清水由是諸城各堅守不下仁恭進于魏州營于城北魏博節度使羅紹威求救於朱全忠三月朱全忠遣其將李思安張存敬將兵救魏博屯于內黃癸卯全忠以中軍軍于滑州劉仁恭謂其子守文曰汝勇十倍於思安當先虜鼠輩後擒紹威耳乃遣守文及其妹壻單可及將精兵五萬擊思安於內黃丁未思安使其將袁象先伏兵於清水之右思安逆戰於繁陽陽不勝而却守文逐之及內黃之北思安勒兵還戰伏兵發夾擊之幽州兵大敗斬可及殺獲三萬人守文僅以身免可及幽州驍將號單無敵燕軍失之喪氣思安陳留人也時葛從周自邢州將精騎八百已入魏州戊申仁恭攻上水關館陶門從周與宣義牙將賀德倫出戰顧門者曰前有大敵不可返顧命闔其扉從周等殊死戰仁恭復大敗擒其將薛突厥王鄶郎明日汴魏乘勝合兵擊仁恭破其八寨仁恭父子燒營而遁汴魏之人長驅追之至臨清擁其衆入永濟渠殺溺不可勝紀鎮人亦出兵邀擊於東境自魏至滄五百里間僵尸相枕仁恭自是不振而全忠益橫矣德倫河西胡人也劉仁恭之攻魏州也羅紹威遣使修好於河東且求救壬午李克用遣李嗣昭將兵救之會仁恭已為汴兵所敗紹威復與河東絶嗣昭引還葛從周乘破幽州之勢自土門攻河東拔承天軍别將尉氏叔琮自馬嶺入拔遼州樂平進軍榆次李克用遣內牙軍副周德威擊之叔琮有驍將陳章號陳夜義為前鋒請於叔琮曰河東所恃者周楊五請擒之求一州為賞克用聞之以戒德威德威曰彼大言耳戰于洞渦德威微服往挑戰謂其屬曰汝見陳夜義即走章果逐之德威奮鐵撾擊之墜馬生擒以獻因擊叔琮大破之斬首三千級叔琮棄營走德威追之出石會關又斬千餘級從周亦引還丁巳朱全忠遣河陽節度使丁會攻澤州下之夏五月李克用遣蕃漢馬步都指揮使李君慶將兵攻李罕之己亥圍潞州朱全忠出屯河陽辛丑遣其將張存敬救之壬寅又遣丁會將兵繼之大破河東兵君慶解圍去克用誅君慶及其禆將伊審李弘襲以李嗣昭為蕃漢馬步都指揮使代之攻潞州六月乙丑李罕之疾亟丁卯全忠表罕之為河陽節度使以丁會為昭義節度使未幾又以其將張歸霸守邢州遣葛從周代會守潞州丁丑李罕之薨于懷州秋七月朱全忠召葛從周於潞州使賀德倫守之八月丙寅李嗣昭引兵至潞州城下分兵攻澤州己巳汴將劉玘棄澤州走河東兵進拔天井關以李存璋為澤州刺史賀德倫閉城不出李嗣昭日以鐵騎環其城捕芻牧者附城三十里禾黍皆刈之乙酉德倫等棄城宵遁趣壺關河東將李存審伏兵邀擊之殺獲甚衆葛從周以援兵至聞德倫等已敗乃還三年夏四月朱全忠遣葛從周帥兖鄆滑魏四鎮兵十萬擊劉仁恭五月仁恭遣使卑辭厚禮求救於河東李克用遣周德威將五千騎出黃澤攻邢洺以救之六月劉仁恭將幽州兵五萬救滄州營於乾寧軍葛從周將精兵逆戰於老鴉隄大破仁恭斬首三萬級仁恭走保瓦橋秋七月李克用復遣都指揮使李嗣昭將兵五萬攻邢洺以救仁恭敗汴軍於內丘王鎔遣使和解幽汴會久雨朱全忠召從周還八月李嗣昭又敗汴軍于沙門河攻洺州乙丑朱全忠引兵救之未至嗣昭拔洺州擒刺史朱紹宗全忠命葛從周將兵擊嗣昭九月葛從周自鄴縣度漳水營於黃龍鎮朱全忠自將中軍三萬涉洺水置營李嗣昭棄城走從周設伏於青山口邀擊大破之朱全忠以王鎔與李克用交通移兵伐之下臨城踰滹沱攻鎮州南門焚其關城全忠自至元氏鎔懼遣判官周式詣全忠請和全忠盛怒謂式曰僕屢以書諭王公竟不之聽今兵已至此期於無捨式曰鎮州密邇太原困於侵暴四鄰各自保莫相救恤王公與之連和乃為百姓故也今明公果能為人除害則天下誰不聽命豈惟鎮州明公為唐桓文當崇禮義以成霸業若但窮威武則鎮州雖小城堅食足明公雖有十萬之衆未易攻也況王氏秉旄五代時推忠孝人人欲為之死庸可冀乎全忠笑攬式袂延之帳中曰與公戲耳乃遣客將開封劉捍入見鎔鎔以其子節度副使昭祚及大將子弟為質以文繒二十萬犒軍全忠引還以女妻昭祚成德判官張澤言於王鎔曰河東勍敵也今雖有朱氏之援譬如火發於家安能俟逺水乎彼幽滄易定猶附河東不若説朱公乘勝兼服之使河北諸鎮合而為一則可以制河東矣鎔復遣周式往説全忠全忠喜遣張存敬會魏博兵擊劉仁恭甲寅拔瀛州冬十月丙辰拔景州執刺史劉仁霸辛酉拔莫州張存敬攻劉仁恭下二十城將自瓦橋趣幽州道濘不能進乃引兵西攻易定辛巳拔祁州殺刺史楊約張存敬攻定州義武節度使王郜遣後院都知兵馬使王處直將兵數萬拒之處直請依城為柵俟其師老而擊之孔目官梁汶曰昔幽鎮合兵三十萬攻我于時我軍不滿五千一戰敗之今存敬兵不過三萬我軍十倍於昔奈何示怯欲依城自固乎郜乃遣處直逆戰于沙河易定兵大敗死者過半餘衆擁處直奔還甲申王郜棄城奔晉陽軍中推處直為留後存敬進圍定州丙申朱全忠至城下處直登城呼曰本道事朝廷盡忠於公未嘗相犯何為見攻全忠曰何故附河東對曰吾兄與晉王同時立勳封疆密邇且昏姻也修好往來乃常理耳請從兹改圖全忠許之乃歸罪於梁汶而族之以謝全忠以繒帛十萬犒師全忠乃還仍為處直表求節鉞處直處存之母弟也劉仁恭遣其子守光將兵救定州軍於易水之上全忠遣張存敬襲之殺六萬餘人由是河北諸鎮皆服於全忠先是王郜告急於河東李克用遣李嗣昭將步騎三萬下太行攻懷州拔之進攻河陽河陽留後侯言不意其至狼狽失據嗣昭壞其羊馬城會佑國軍將閻寶引兵救之力戰於壕外河東兵乃退寶鄆州人也天復元年春正月朱全忠既服河北欲先取河中以制河東己亥召諸將謂曰王珂駑材恃太原自驕汰吾今斷長蛇之腰諸君為我以一繩縛之庚子遣張存敬將兵三萬自汜水度河出含山路以襲之全忠以中軍繼其後戊申存敬至絳州晉絳不意其至皆無守備庚戌絳州刺史陶建釗降之壬子晉州刺史張漢瑜降之全忠遣其將侯言守晉州何絪守絳州屯兵二萬以扼河東援兵之路朝廷恐全忠西入關急賜詔和解之全忠不從珂遣間使告急於李克用道路相繼克用以汴人先據晉絳兵不得進珂妻遺克用書曰兒旦暮為俘虜大人何忍不救克用報曰今賊兵塞晉絳衆寡不敵進則與汝兩亡不若與王郎舉族歸朝珂又遺李茂貞書言天子新返正詔藩鎮無得相攻同奬王室今朱公不顧詔命首興兵相加其心可見河中若亡則同華邠岐俱不自保天子神器拱手授人其勢必然矣公宜亟帥關中諸鎮兵固守潼關赴救河中僕自知不武願於公西偏授一小鎮此地請公有之關中安危國祚修短繫公此舉願審思之茂真素無逺圖不報二月甲寅朔河東將李嗣昭攻澤州拔之乙卯張存敬引兵發晉州己未至河中遂圍之王珂勢窮將奔京師而人心離二會浮梁壞流澌塞河舟行甚難珂挈其族數百人欲夜登舟親諭守城者皆不應牙將劉訓曰今人情擾擾若夜出涉河必爭舟紛亂一夫作難事不可知不若且送欵存敬徐圖向背珂從之壬戌珂植白幡於城隅遣使以牌印請降於存敬存敬請開城珂曰吾於朱公有家世事分請公退舍俟朱公至吾自以城授之存敬從之且走白全忠乙丑全忠至洛陽聞之喜馳往赴之戊辰至虞鄉先哭於重榮之墓盡哀河中人皆悅珂欲面縛牽羊出迎全忠遽使止之曰大師舅之恩何可忘若郎君如此使僕異日何以見舅於九泉乃以常禮出迎握手歔欷聫轡入城全忠表張存敬為護國軍留後王珂舉族遷于大梁其後全忠遣珂入朝遣人殺之於華州全忠聞張夫人疾亟遽自河中東歸李克用遣使以重幣請修好於全忠全忠雖遣使報之而忿其書辭蹇傲決欲攻之加幽州節度使劉仁恭魏博節度使羅紹威並兼侍中三月癸未朔朱全忠至大梁癸卯遣宿州刺史氏叔琮等將兵五萬攻李克用入自太行魏博都將張文恭入自磁州新口葛從周以兖鄆兵會成德兵入自土門洺州刺史張歸厚入自馬嶺義武節度使王處直入自飛狐權知晉州侯言以慈隰晉絳兵入自隂地叔琮入天井關進軍昻車辛亥沁州刺史蔡訓以城降河東都將蓋璋詣侯言降即令權知沁州壬子叔琮拔澤州刺史李存璋棄城走叔琮進攻潞州昭義節度使孟遷降之河東屯將李審建王周將步軍一萬騎二千詣叔琮降叔琮進趣晉陽夏四月乙卯叔琮出石會關營於洞渦驛張歸厚引兵至遼州丁巳遼州刺史張鄂降别將白奉國會成德兵自井陘入己未拔承天軍與叔琮烽火相應氏叔琮等引兵抵晉陽城下數挑戰城中大恐李克用登城僃禦不遑飲食時大雨積旬城多頽壞隨加完補河東將李嗣昭李嗣源鑿暗門夜出攻汴壘屢有殺獲李存進敗汴軍於洞渦時汴軍既衆芻糧不給久雨士卒瘧利全忠乃召兵還五月叔琮等自石會關歸諸道軍亦退河東將周德威李嗣昭以精騎五千躡之殺獲甚衆先是汾州刺史李瑭舉州附於汴軍克用遣其將李存審攻之三日而拔執瑭斬之氏叔琮過上黨孟遷挈族隨之南徙朱全忠遣丁會代守潞州六月李克用遣其將李嗣昭周德威將兵出隂地關攻隰州刺史唐禮降之進攻慈州刺史張瓌降之二年春正月河東將李嗣昭周德威攻慈隰朱全忠聞有河東兵二月戊寅朔旋軍河中李嗣昭等攻慈隰下之進逼晉絳己丑全忠遣兄子友寧將兵會晉州刺史氏叔琮擊之李嗣昭等襲取絳州汴將康懷英復取之嗣昭等屯蒲縣乙未汴軍十萬營于蒲南叔琮夜帥衆斷其歸路而攻其壘破之殺獲萬餘人己亥全忠自河中赴之乙巳至晉州三月戊午氏叔琮朱友寧進攻李嗣昭周德威營時汴軍橫陳十里而河東軍不過數萬深入敵境衆心忷懼德威出戰而敗密令嗣昭以後軍先去德威尋引騎兵亦退叔琮友寧長驅乘之河東驚潰擒克用子廷鸞兵仗輜重委棄殆盡朱全忠令叔琮友寧乘勝遂攻河東李克用聞嗣昭等敗遣李存信以親兵逆之至清源遇汴軍存信走還晉陽汴軍取慈隰汾三州辛酉汴軍圍晉陽營于晉祠攻其西門周德威李嗣昭收餘衆依西山得還城中兵未集叔琮攻城甚急每行圍褒衣博帶以示間暇克用晝夜乘城不得寢食召諸將議走保雲州李嗣昭李嗣源周德威曰兒輩在此必能固守王勿為此謀搖人心李存信曰關東河北皆受制於朱溫我兵寡地蹙守此孤城彼築壘穿塹環之以積久制我我飛走無路坐待困斃耳今事勢已急不若且入北虜徐圖進取嗣昭力爭之克用不能決劉夫人言於克用曰存信北川牧羊兒耳安知逺慮王常笑王行瑜輕去其城死於人手今日反效之耶且王昔居達靼幾不自免賴朝廷多事乃得復歸今一足出城則禍變不測塞外可得至耶克用乃止居數日潰兵復集軍府浸安克用弟克寧為欣州刺史聞汴寇至中塗復還晉陽曰此城吾死所也去將何之衆心乃定壬戌朱全忠還河中遣朱友寧將兵西擊李茂貞軍于興平武功之間李嗣昭李嗣源數將敢死士夜入氏叔琮營斬首捕虜汴軍驚擾備禦不暇會大疫丁卯叔琮引兵還嗣昭與周德威將兵追之及石會關叔琮留數馬及旌旗於髙岡之巔嗣昭等以為有伏兵乃引去復取慈隰汾三州自是克用不敢與全忠爭者纍年克用以使引咨幕府曰不貯軍食何以聚衆不置兵甲何以克敵不修城池何以扞禦利害之間請垂議度掌書記李襲吉獻議略曰國富不在倉儲兵強不由衆寡人歸有德神固害盈聚斂寧有盜臣苛政如有猛虎所以鹿臺將散周武以興齊庫既焚晏嬰入賀又曰伏以變法不若養人改作寧如舊貫韓建蓄財無數首事朱溫王珂變法如麻一朝降賊中山城非不峻蔡上兵非不多前事甚明可以為戒旦霸國無貧主強將無弱兵伏願大王崇德愛人去奢省役設險固境訓兵務農定亂者選武臣制理者選文吏錢榖有司刑法有律誅賞由我則下無威福之弊迎密多正則人無譖謗之憂順天時而絶欺誣敬鬼神而禁淫祀則不求富而國富不求安而自安外破元凶內康疲俗名髙五霸道冠八元至於索閭閻定間架增麴蘖檢田疇開國建邦恐未為切克用親軍皆沙陀雜虜喜侵暴良民河東甚苦之其子存朂以為言克用曰此輩從吾攻戰數十年比者帑藏空虛諸軍賣馬以自給今四方諸侯皆重賞以募士我若急之則彼皆散去矣吾安與同保此乎俟天下稍平當更清治之耳存朂幼警給有勇略克用為朱全忠所困封疆日蹙憂形於色存朂進言曰物不極則不返惡不極則不亡朱氏恃其詐力窮凶極暴吞滅四鄰人怨神怒今又攻逼乘輿窺覦神器此其極也殆將斃矣吾家代襲忠貞勢窮力屈無所愧心大人當遵養時晦以待其衰奈何輕為澄喪使羣下失望乎克用悅即命酒奏樂而罷朱溫取淄青唐昭宗天復三年春正月平盧節度使王師範頗好學以忠義自許為治有聲迹朱全忠圍鳯翔韓全誨以詔書徴藩鎮兵入援乘輿師範見之泣下霑矜曰吾屬為帝室藩屏豈得坐視天子困辱如此各擁強兵但自衛乎會張濬自長水亦遺之書勸舉義兵師範曰張公言正合吾意夫復何疑雖力不足當死生以之時關東兵多從全忠在鳯翔師範分遣諸將詐為貢獻及商販包束兵仗載以小車入汴徐兖鄆齊沂河南孟滑河中陝虢華等州期以同日俱發討全忠適諸州者多事泄被擒獨行軍司馬劉鄩取兖州時泰寧節度使葛從周悉將其兵屯邢州鄩先遣人為販油者入城詗其虛將及兵所從入丙午鄩將精兵五百夜自水竇入比明軍城悉定市人皆不知鄩據府舍拜從周母每旦省謁待其妻子甚有恩禮子弟職掌供億如故是日青州牙將張居厚帥壯士二百將小車至華州東城知州事婁敬思疑其有異剖視之其徒大呼殺敬思攻西城崔胤在華州帥衆拒之不克走至商州追獲之全忠留節度判官裴迪守大梁師範遣走卒齎書至大梁迪問以東方事走卒色動迪察其有變屏人問之走卒具以實告迪不暇白全忠亟請馬步都指揮使朱友寧將兵萬餘人東巡兖鄆友寧召葛從周於邢州共攻師範全忠聞變亦分兵先歸使友寧并將之王師範遣使以起兵告李克用克用貽書褒賞之河東監軍張承業亦勸克用發兵救鳯翔克用攻晉州聞車駕東歸乃罷三月戊午朱全忠至大梁王師範弟師魯圍齊州朱友寧引兵擊走之師範遣兵益劉鄩軍友寧擊取之由是兖州援絶葛從周引兵圍之友寧進攻青州戊辰全忠引四鎮及魏博兵十萬繼之夏四月王師範求救於淮南乙未楊行密遣其將王茂章以步騎七千救之又遣别將將兵數萬攻宿州全忠遣其將康懷英救宿州淮南兵遁去五月朱友寧攻博昌月餘不拔朱全忠怒遣客將劉捍往督之捍至友寧驅民丁十餘萬負木石牽牛驢詣城南築土山既至并人畜木石排而築之冤號聲聞數十里俄而城陷盡屠之進拔臨淄抵青州城下遣别將攻登萊淮南將王茂章會王師範弟萊州刺史師誨攻密州拔之斬其刺史劉康乂以淮海都遊奕使張訓為刺史六月乙亥汴兵拔登州師範帥登萊兵拒朱友寧於石樓為兩柵丙子夜友寧擊登州柵柵中告急師範趣茂章出戰茂章按兵不動友寧破登州柵進攻萊州柵比明茂章度其兵已疲乃與師範合兵出戰大破之友寧旁自峻阜馳騎赴敵馬仆青州將張土梟斬之傳首淮南兩鎮兵遂北至米河俘斬萬計魏博之兵殆盡全忠聞友寧死自將兵二十萬晝夜兼行赴之秋七月壬子至臨朐命諸將攻青州王師範出戰汴兵大破之王茂章閉壘示怯伺汴兵稍懈毁柵而出驅馳疾戰戰酣退坐召諸將飲酒已而復戰全忠登髙望見之問降者知為茂章歎曰使吾得此人為將天下不足平也至晡汴兵乃退茂章度衆寡不敵是夕引軍還全忠遣曹州刺史楊師厚追之及於輔唐茂章命先鋒指揮使李虔裕將五百騎為殿虔裕殊死戰師厚擒而殺之師厚穎州人也張訓聞茂章去謂諸將曰汴人將至何以禦之諸將請焚城大掠而歸訓曰不可封府庫植旗幟於城上遣羸弱居前自以精兵殿其後而去全忠遣左踏白指揮使王檀攻密州既至望旗幟數日乃敢入城見府庫城邑皆完遂不復追訓全軍而還全忠以檀為密州刺史八月戊辰朔朱全忠留齊州刺史楊師厚攻青州身歸大梁楊師厚屯臨朐聲言將之密州留輜重於臨朐九月癸卯王師範出兵攻臨朐師厚伏兵奮擊大破之殺萬餘人獲師範弟師克明日萊州兵五千救青州師厚邀擊之殺獲殆盡遂徙寨抵其城下戊午王師範遣副使李嗣業及弟師悅請降於楊師厚曰師範非敢背德韓全誨李茂貞以朱書御札使之舉兵師範不敢違仍請以其弟師魯為質時朱全忠聞李茂貞楊崇本將起兵逼京畿恐其復劫天子西去欲迎車駕都洛陽乃受師範降選諸將使守登萊淄棣等州即以師範權淄青留後師範仍言先遣行軍司馬劉鄩將兵五千據兖州非其自專願釋其罪亦遣使語鄩葛從周攻兖州劉鄩使從周母乘板輿登城謂從周曰劉將軍事我不異於汝新婦輩皆安居人各為其主汝可察之從周歔欷而退攻城為之緩鄩悉簡婦人及民之老疾不足當敵者出之獨與少壯者同辛苦分衣食堅守以扞敵號令整肅兵不為暴民皆安堵久之外援既絶節度副使王彥溫踰城出降城上卒多從之不可遏鄩遣人從容語彥溫曰軍士非素遣者勿多與之俱又遣人徇於城上曰軍士非素遣從副使而敢擅往者族之士卒皆惶惑不敢出敵人果疑彥溫斬之城下由是衆心益固及王師範力屈從周以禍福諭之鄩曰受王公命守此城一旦見王公失勢不俟其命而降非所以事上也及師範使者至丁丑始出降從周為具齎裝送鄩詣大梁鄩曰降將未受梁王寬釋之命安敢乘馬衣裘乎乃素服乘驢至大梁全忠賜之冠帶辭請囚服入見不許全忠慰勞飲之酒辭以量小全忠曰取兖州量何大邪以為元從都押牙是時四鎮將吏皆功臣舊人鄩一旦以降將居其上諸將具軍禮拜於庭鄩坐受自如全忠益竒之未幾表為保大留後葛從周久病全忠以康懷英為泰寧節度使代之昭宣帝天祐二年春正月庚午朱全忠命李振知青州事代王師範二月李振至青州王師範舉族西遷至濮陽素服乘驢而進至犬梁全忠客之表李振為青州留後三月庚午以王師範為河陽節度使朱溫篡唐崔裔誅宦官附唐昭宗光化三年春二月以吏部尚書崔胤同平章事充清海節度使司空門下侍郎同平章事王摶明達有度量時稱良相上素疾宦官樞密使宋道弼景務修專橫崔胤日與上謀去宦官宦官知之由是南北司益相憎疾各結藩鎮為援以相傾奪摶恐其致亂從容言於上曰人君當務明大體無所偏私宦官擅權之弊誰不知之顧其勢未可猝除宜俟多難漸平以道消息願陛下言勿輕泄以速姦變胤聞之譖搏於上曰王摶姦邪已為道弼輩外應上疑之及胤罷相意摶排已愈恨之及出鎮廣州遺朱全忠書具道摶語令全忠表論之全忠上言胤不可離輔弼之地摶與敕使相表裏同危社稷表連上不已上雖察其情迫於全忠不得已胤至湖南復召還六月以胤為司空門下侍郎同平章事摶罷為工部侍郎以道弼監荆南軍務修監青州軍戊辰貶摶溪州刺史己巳又貶崖州司户道弼長流歡州務修長流愛州是日皆賜自盡摶死於藍田驛道弼務修死於霸橋驛於是胤専制朝政勢震中外宦官皆側目不勝其憤初崔胤與上密謀盡誅宦官及宋道弼景務修死宦官益懼上自華州還忽忽不樂多縱酒喜怒不常左右尤自危於是左軍中尉劉季述右軍中尉王仲先樞密使王彥範薛齊偓等隂相與謀曰主上輕佻多變詐難奉事専聽任南司吾輩終罹其禍不若奉太子立之尊主上為太上皇引岐華兵為援控制諸藩誰能害我哉十一月上獵苑中因置酒夜醉歸手殺黃門侍女數人明旦日加辰巳宫門不開季述詣中書白崔胤曰宫中必有變我內臣也得以便宜從事請入視之乃帥禁軍千人破門而入訪問具得其狀出謂胤曰主上所為如是豈可理天下廢昏立明自古有之為社稷大計非不順也胤畏死不敢違庚寅季述召百官陳兵殿庭作胤等連名狀請太子監國以示之使署名胤及百官不得已皆署之上在乞巧樓季述仲先伏將士千人於門外與宣武進奉官陳巖等十餘人入請對季述仲先甫登殿將士大呼突入宣化門至思政殿前逢宫人輒殺之上見兵入驚墮床下起將走季述仲先掖之令坐宫人走白皇后后趨至拜請曰軍容勿驚宅家有事取軍容商量季述等乃出百官狀白上曰陛下厭倦大寶中外羣情願太子監國請陛下保頥東宫上曰昨與卿曹樂飲不覺太過何至於是對曰此非臣等所為皆南司衆情不可遏也願陛下且之東宫待事小定復迎歸大內耳后曰宅家趣依軍容語即取傳國寶以授季述宦官扶上與后同輦嬪御侍從者才十餘人適少陽院季述以銀撾畫地數上曰某時某事汝不從我言其罪一也如此數十不止乃手鎖其門鎔鐵錮之遣左軍副使李師虔將兵圍之上動靜輒白季述穴牆以通飲食凡兵器針刀皆不得入上求錢帛俱不得求紙筆亦不與時大寒嬪御公主無衣衾號哭聞於外季述等矯詔令太子監國迎太子入宫辛卯矯詔令太子嗣位更名縝以上為太上皇皇后為太上皇后甲午太子即皇帝位更名少陽院曰問安宫季述加百官爵秩與將士皆受優賞欲以求媚於衆殺睦王倚凡宫人左右方士僧道為上所寵信者皆榜殺之每夜殺人晝以十車載尸出一車或止一兩尸欲以立威將殺司天監胡秀林秀林曰軍容幽囚君父更欲多殺無辜乎季述憚其言正而止季述等欲殺崔胤而憚朱全忠但解其度支鹽鐵轉運使而已崔胤密致書全忠使興兵圖返正左僕射致仕張濬在長水見張全義於洛陽勸之匡復又與諸藩鎮書勸之進士無棣李愚客遊華州上韓建書略曰僕每讀書見君臣父子之際有傷教害義者恨不得肆之市朝明公居近關重鎮君父幽辱月餘坐視凶逆而忘勤王之舉僕所未諭也僕竊計中朝輔弼雖有志而無權外鎮諸侯雖有權而無志惟明公忠義社稷是依往年車輅播遷號泣奉迎纍歲供饋再復廟朝義感人心至今歌詠此時事勢尤異前日明公地處要衝位兼將相自宫闈變故已涉旬時若不號令率先以圖反正遲疑未決一朝山東侯伯唱義連衡鼓行而西明公求欲自安其可得乎此必然之勢也不如馳檄四方諭以逆順軍聲一振則元凶破膽旬浹之間二豎之首傳於天下計無便於此者建雖不能用厚待之愚堅辭而去朱全忠在定州行營聞亂丁未南還十二月戊辰至大梁季述遣其養子希度詣全忠許以唐社稷輸之又遣供奉官李奉本以太上皇誥示全忠全忠猶豫未決會僚佐議之或曰朝廷大事非藩鎮所宜預知天平節度副使李振獨曰王室有難此霸者之資也今公為唐桓文安危所屬季述一宦豎耳乃敢囚廢天子公不能討何以復令諸侯且幼主位定則天下之權盡歸宦官矣是以太阿之柄授人也全忠大悟即囚希度奉本遣振如京師詗事既還又遣親吏蔣玄暉如京師與崔胤謀之又召程巖赴大梁太子即位纍旬藩鎮箋表多不至王仲先性苛察素知左右軍多積弊及為中尉鉤校軍中財榖得隱沒為姦者痛捶之急徴所負將士頗不安有鹽州雄毅軍使孫德昭為左神䇿指揮使自劉季述等廢立常憤惋不平崔胤聞之遣判官石戩與之遊德昭每酒酣必泣戩知其誠乃密以胤意説之曰自上皇幽閉中外大臣至於行間士卒孰不切齒今反者獨季述仲先耳公誠能誅此二人迎上皇復位則富貴窮一時忠義流千古茍狐疑不決則功落它人之手矣德昭謝曰德昭小校國家大事安敢専之茍相公有命不敢愛死戩以白胤胤割衣帶手書以授之德昭復結右軍清逺都將董彥弼周承誨謀以除夜伏兵安福門外以俟之天復元年春正月乙酉朔王仲先入朝至安福門孫德昭擒斬之馳詣少陽院叩門呼曰逆賊已誅請陛下出勞將士何后不信曰果爾以其首來德昭獻其首上乃與后毁扉而出崔胤迎上御長樂門樓帥百官稱賀周承誨擒劉季述王彥範繼至方詰責已為亂挺所斃薛齊偓赴井死出而斬之滅四人之族并誅其黨二十餘人宦官奉太子匿於左軍獻傳國寶上曰裕幼弱為凶豎所立非其罪也命還東宫黜為德王復名裕丙戌以孫德昭同平章事充靜海節度使賜姓名李繼昭丁亥崔胤進位司徒胤固辭上寵待胤益厚己丑朱全忠聞季述等誅折程巖足械送京師并劉希度李奉本等皆斬於都市由是益重李振庚寅以周承誨為嶺南西道節度使賜姓名李繼誨董彥弼為寧逺節度使賜姓李並同平章事與李繼昭俱留宿衛十日乃出還家賞賜傾府庫時人謂之三使相癸巳進朱全忠爵東平王丙午敕近年宰臣延英奏事樞密使侍側爭論紛然既出又稱上旨未允復有改易撓權亂政自今並依大中舊制俟宰臣奏事畢方得升殿承受公事賜兩軍副使李師虔徐彥孫自盡皆劉季述之黨也鳯翔彰義節度使李茂貞來朝加茂貞守尚書令兼侍中進爵岐王劉季述王仲先既死崔胤陸扆上言禍亂之興皆由中官典兵乞令胤主左軍扆主右軍則諸侯不敢侵陵王室尊矣上猶豫兩日未決李茂貞聞之怒曰崔胤奪軍權未得已欲翦滅諸侯上召李繼昭李繼誨李彥弼謀之皆曰臣等纍世在軍中未聞書生為軍主若屬南司必多所變更不若歸之北司為便上乃謂胤扆曰將士意不欲屬文臣卿曹勿堅求於是以樞密使韓全誨鳯翔監軍使張彥弘為左右中尉全誨亦前鳯翔監軍也又徵前樞密使致仕嚴遵美為兩軍中尉觀軍容處置使遵美曰一軍猶不可為況兩軍乎固辭不起以袁易簡周敬容為樞密使李茂貞辭還鎮崔胤以宦官典兵終為肘腋之患欲以外兵制之諷茂貞留兵三千於京師充宿衛以茂貞假子繼筠將之左諫議大夫萬年韓偓以為不可胤曰兵自不肯去非留之也偓曰始者何為召之邪胤無以應偓曰留此兵則家國兩危不留則家國兩安胤不從夏四月甲戌上謁太廟丁丑赦天下改元初楊復恭為中尉借度支賣麴之利一年以贍兩軍自是不肯復歸至是崔胤草赦欲抑宦官聽酤者自造麴但月輸榷酤錢兩軍先所造麴趣令減價賣之過七月無得復賣崔胤之罷兩軍賣麴也并近鎮亦禁之李茂貞惜其利表乞入朝論奏韓全誨請許之茂貞至京師全誨深與相結崔胤始懼隂厚朱全忠益甚與茂貞為仇敵矣上之返正也中書舍人令狐渙給事中韓偓皆預其謀故擢為翰林學士數召對訪以機密渙綯之子也時上悉以軍國事委崔胤每奏事上與之從容或至然燭宦官畏之側目事無大小皆咨胤而後行胤志欲盡除之韓偓屢諌曰事禁大甚此輩亦不可全無恐其黨迫切更生他變胤不從六月丁卯上獨召偓問曰敕使中為惡者如林何以處之對曰東內之難敕使誰非同惡處之當在正旦今已失其時矣上曰當是時卿何不為崔胤言之對曰臣見陛下詔書云自劉季述等四家之外其餘一無所問夫人主所重莫大於信既下此詔則守之宜堅若復戮一人則人人懼死矣然後來所去者已為不少此其所以忷忷不安也陛下不若擇其尤無良者數人明示其罪置之於法然後撫諭其餘曰吾恐爾曹謂吾心有所貯自今可無疑矣乃擇其忠厚者使為之長其徒有善則奬之有罪則懲之咸自安矣今此曹在公私者以萬數豈可盡誅邪夫帝王之道當以重厚鎮之公正御之至於瑣細機巧此機生則彼機應矣終不能成大功所謂理絲而棼之者也況今朝廷之權散在四方苟能先收此權則事無不可為者矣上深以為然曰此事終以屬卿閏六月崔胤請上盡誅宦官但以宫人掌內諸司事宦官屬耳頗聞之韓全誨等涕泣求哀於上上乃令胤有事封疏以聞勿口奏宦官求美女知書者數人內之宫中隂令詗察其事盡得胤密謀上不之覺也全誨等大懼每宴聚流涕相訣别日夜謀所以去胤之術胤時領三司使全誨等教禁軍對上喧譟訴胤減損冬衣上不得已解胤鹽鐵使時朱全忠李茂貞各有挾天子令諸侯之意全忠欲上幸東都茂貞欲上幸鳯翔胤知謀泄事急遺朱全忠書稱被密詔令全忠以兵迎車駕且言昨者返正皆令公良圖而鳯翔先入朝抄取其功今不速來必成罪人豈惟功為它人所有且見征討矣全忠得書秋七月甲寅遽歸大梁發兵八月甲申上問韓偓曰聞陸扆不樂吾返正正旦易服乘小馬出啓夏門有諸對曰返正之謀獨臣與崔胤輩數人知之扆不知也一旦忽聞宫中有變人情能不驚駭易服逃避何妨有之陛下責其為宰相無死難之志則可也至於不樂返正恐出於讒人之口願陛下察之上乃止韓全誨等懼誅謀以兵制上乃與李繼昭李繼誨李彥弼李繼筠深相結繼昭獨不肯從它日上問韓偓外間何所聞對曰惟聞敕使憂懼與功臣及繼筠交結將致不安亦未知其果然不耳上曰是不虛矣比日繼誨彥弼輩語漸倔強令人難耐令狐渙欲令朕召崔㣧及全誨等於內殿置酒和解之何如對曰如此則彼凶悖益甚上曰為之奈何對曰獨有顯罪數人速加竄逐餘者許其自新庶幾可息若一無所問彼必知陛下心有所貯益不自安事終未了耳上曰善既而宦官恃黨援已成稍不遵敕旨上或出之使監軍或黜守諸陵皆不行上無如之何九月癸丑上急召韓偓謂曰聞全忠欲來除君側之惡大是盡忠然須令與茂貞共其功若兩帥交爭則事危矣卿為我語崔胤速飛書兩鎮使相與合謀則善矣壬戌上又謂偓曰繼誨彥弼輩驕橫益甚纍日前與繼筠同入輒於殿東令小兒歌以侑酒令人驚駭對曰臣必知其然兹事失之於初當正旦立功之時但應以官爵田宅金帛酬之不應聽其恣出入禁中此輩素無知識數求入對或妄論朝政或僭易薦人稍有不從則生怨望況惟知嗜利為敕使以厚利雇之令其如此耳崔胤本留衛兵欲以制敕使也今敕使衛兵相與為一將若之何汴兵若來必與岐兵鬬於闕下臣竊寒心上但愀然憂沮而已冬十月戊戌朱全忠大舉兵發大梁韓全誨聞朱全忠將至丁酉令李繼誨李彥弼等勒兵劫上請幸鳯翔宫禁諸門皆增兵防守人及文書出入搜閲甚嚴上遣人密賜崔胤御札言皆悽愴末云我為宗社大計勢須西行卿等但東行也惆悵惆悵戊戌上遣趙國夫人出語韓偓朝來彥弼輩無禮極甚欲召卿對其勢未可且言上與皇后但涕泣相坰自是學士不復得對矣癸卯全誨等令上入閣召百官追寢正月丙午敕書悉如咸通以來近例是日開延英全誨等即侍側同議政事丁未神䇿都指揮使李繼筠遣部兵掠內庫寶貨帳帷法物韓全誨遣人密送諸王宫人先之鳯翔戊申朱全忠至河中表請車駕幸東都京城大駭士民亡竄山谷是日百官皆不入朝闕前寂無人十一月己酉朔李繼筠等勒兵闕下禁人出入諸軍大掠士民衣紙及布𥜗者滿街極目韓建以幕僚司馬鄴知匡國留後朱全忠引四鎮兵七萬趣同州鄴迎降韓全誨等以李繼昭不與之同遏絶不令見上時崔胤居第在開化坊繼昭帥所部六千餘人及關東諸道兵在京師者共守衛之百官及士民避亂者皆往依之庚戌上遣供奉官張紹孫召百官崔胤等皆表辭不至壬子韓全誨等陳兵殿前言於上曰全忠以大兵逼京師欲劫天子幸洛陽求傳禪臣等請奉陛下幸鳯翔收兵拒之上不許杖劔登乞巧樓全誨等逼上下樓上行才及夀春殿李彥弼已於御院縱火是日冬至上獨坐思政殿翹一足一足踏闌干庭無羣臣旁無侍者頃之不得已與皇后妃嬪諸王百餘人皆上馬慟哭聲不絶出門回顧禁中火已赫然是夕宿鄠縣朱全忠遣司馬鄴入華州謂韓建曰公不早知過自歸又煩此軍少留城下矣是日全忠自故市引兵南度渭韓建遣節度副使李巨川請降獻銀三萬兩助軍全忠乃西南趣赤水癸丑李茂貞迎車駕於田家磑上下馬慰接之甲寅車駕至盩厔乙卯留一日朱全忠至零口西聞車駕西幸與僚佐議復引兵還赤水左朴射致仕張濬説全忠曰韓建茂貞之黨不先取之必為後患全忠聞建有表勸天子幸鳯翔乃引兵逼其城建單騎迎謁全忠責之對曰建目不知書凡表章書檄皆李巨川所為全忠以巨川嘗為建晝䇿斬之軍門謂建曰公許人可即往衣錦丁巳以建為忠武節度使理陳州以兵援送之以前商州刺史李存權知華州徙忠武節度使趙珝為匡國節度使車駕之在華州也商賈輜湊韓建重征之二年得錢九百萬緡至是全忠盡取之是時京師無天子行在無宰相崔胤使太子太師盧渥等二百餘人列狀請朱全忠西迎車駕又使主溥至赤水見全忠計事全忠復書曰進則懼脅君之謗退則懷負國之慙然不敢不勉戊午全忠發赤水辛酉以兵部侍郎盧光啓權句當中書事車駕留岐山三日壬戌至鳯翔朱全忠至長安宰相帥百官班迎於長樂坡明日行復班辭於臨臯驛全忠賞李繼昭之功初令權知匡國留後復留為兩街制置使賜與甚厚繼昭盡獻其兵八千人全忠使判官李擇裴鑄入奏事稱奉密詔及得崔胤書令臣將兵入朝韓全誨等矯詔答以朕避災至此非宦官所劫密詔皆崔胤詐為之卿宜斂兵歸保土宇茂貞遣其將符道昭屯武功以拒全忠癸亥全忠將康懷貞擊破之丁卯以盧光啓為右諫議大夫參知機務戊辰朱全忠至鳯翔軍於城東李茂貞登城謂曰天子避災非臣下無禮讒人誤公至此全忠報曰韓全誨劫遷天子今來問罪迎扈還宫岐王苟不預謀何煩陳諭上屢詔全忠還鎮全忠乃拜表奉辭辛未移兵北趣邠州甲戌制守司空兼門下侍郎同平章事崔胤責授工部尚書户部侍郎同平章事裴樞罷守本官乙亥朱全忠攻邠州丁丑靜難節度使李繼徽請降復姓名楊崇本全忠質其妻於河中令崇本鎮邠州全忠之西入關也韓全誨李茂貞以詔命徵兵河東茂貞仍以書求援於李克用克用遣李嗣昭將五千騎自沁州趣晉州與汴兵戰於平陽北破之乙亥全忠發邠州戊寅次三原十二月癸未崔胤至三原見全忠趣之迎駕己丑全忠遣朱友寧攻盩厔不下戊戌全忠自往督戰盩厔降屠之全忠令崔胤帥百官及京城居民悉遷于華州朱全忠之入關也戎昭節度使馮行襲遣副使魯崇矩聽命於全忠韓全誨遣中使二十餘人分道徵江淮兵屯金州以脅全忠行襲盡殺中使收其詔敕送全忠又遣中使徵兵於王建朱全忠亦遣使乞師於建建外修好於全忠罪狀李茂貞而隂勸茂貞堅守許之救援以武信節度使王宗佶前東川節度使王宗滌等為扈駕指揮使將兵五萬聲言迎車駕其實襲茂貞山南諸州二年春正月朱全忠復屯三原又移軍武功河東將攻慈隰以分全忠兵勢丁卯以給事中韋貽範為工部侍郎同平章事丙子以給事中嚴龜充岐汴和協使賜朱全忠姓李與李茂貞為兄弟全忠不從三月庚戌上與李茂貞及宰相學士中尉樞密宴酒酣茂貞及韓全誨亡去上問韋貽範曰朕何以巡幸至此對曰臣在外不知固問之不對上曰卿何得於朕前妄語云不知又曰卿既以非道取宰相當於公事如法若有不可必準故事怒目視之微言曰此賊兼須杖之二十顧謂韓偓曰此輩亦稱宰相貽範屢以大杯勸上上不即持貽範舉杯直及上頥夏四月丁酉崔胤自華州詣河中泣訴於朱全忠恐李茂貞劫天子幸蜀宜以時迎奉勢不可緩全忠與之宴胤親執板為全忠歌以侑酒五月鳯翔人聞朱全忠且來皆懼癸丑城外居民皆遷入城己未全忠將精兵五萬發河中至東渭橋遇霖雨留旬日庚午工部侍郎平章事韋貽範遭母喪宦官薦翰林學士姚洎為相洎謀於韓偓偓曰若圖永久之利則莫若未就為善儻出上意固無不可且汴軍旦夕合圍孤城難保家族在東可不慮乎洎乃移疾上亦自不許六月丙子以中書舍人蘇檢為工部侍郎同平章事時韋貽範在草土薦檢及姚洎於李茂貞上既不用洎茂貞及宦官恐上自用人協力薦檢遂用之丁丑朱全忠軍于虢縣甲申李茂貞大出兵自將之與朱全忠戰于虢縣之北大敗而還死者萬餘人丙戌全忠遣其將孔勍出散關攻鳯州拔之丁亥全忠進軍鳯翔城下全忠朝服嚮城而泣曰臣但欲迎車駕還宫耳不與岐王角勝也遂為五寨環之秋七月韋貽範之為相也多受人賂許以官既而母喪罷去日為債家所譟親吏劉延美所負尤多故汲汲於起復日遣人詣兩中尉樞密及李茂貞求之甲戌命韓偓草貽範起復制偓曰吾腕可斷此制不可草即上疏論貽範遭憂未數月遽令起復實駭物聽傷國體學士院二中使怒曰學士勿以死為戲偓以疏授之解衣而寢二使不得已奏之上即命罷草仍賜敕褒賞之八月乙亥朔班定無白麻可宣宦官喧言韓侍郎不肯草麻聞者大駭茂貞入見上曰陛下命相而學士不肯草麻與反何異上曰卿輩薦貽範朕不之違學士不草麻朕亦不之違況彼所陳事理明白若之何不從茂貞不悅而出至中書見蘇檢曰姦邪朋黨宛然如舊扼腕者久之貽範猶經營不已茂貞語人曰我實不知書生禮數為貽範所誤會當於邠州安置貽範乃止劉延美赴井死保大節度使李茂勳將兵屯三原救李茂貞朱全忠遣其將康懷英孔勍擊之茂勳遁去茂勳茂貞之從弟也庚戌李茂貞出兵夜擊奉天虜汴將倪章邵棠以歸乙未茂貞大出兵與全忠戰不勝暮歸汴兵追之幾入西門己亥再起復前戶部侍郎同平章事韋貽範使姚洎草制貽範不讓即表謝明日視事九月乙巳朱全忠以久雨士卒病召諸將議引兵歸河中親從指揮使髙季昌左開道指揮使劉知俊曰天下英雄窺此舉一歲矣今茂貞已困奈何捨之去全忠患李茂貞堅壁不出季昌請以譎計誘致之募有能入城為諜者騎士馬景請行曰此行必死願大王録其妻子全忠惻然止之景不可時全忠遣朱友倫發兵於大梁明日將至當出兵迓之景請因此時給駿馬雜衆騎而出全忠從之命諸軍皆秣馬飽士丁未旦偃旗幟潛伏無得妄出營中寂如無人景與衆騎偕出忽躍馬西去詐為逃亡入城告茂貞曰全忠舉軍遁矣獨留傷病者近萬人守營今夕亦去矣請速擊之於是茂貞開門悉衆攻全忠營全忠鼓於中軍百營俱出縱兵擊之又遣數百騎據其城門鳯翔軍進退失據自蹈藉殺傷殆盡茂貞自是喪氣始議與全忠連和奉車駕還京不復以詔書勒全忠還鎮矣全忠表季昌為宋州團練使辛亥李茂貞盡出騎兵於鄰州就芻糧壬子朱全忠穿蚰蜒壕圍鳯翔設大鋪鈴架以絶內外冬十月戊寅夜李茂貞假子彥詢帥三團步兵奔于汴軍己卯李彥韜繼之庚辰朱全忠遣幕僚司馬鄴奉表入城甲申又遣使獻熊白自是獻食物繒帛相繼上皆先以示李茂貞使啓視之茂貞亦不敢啓丙戌復遣使請與茂貞議連和民出城樵采者皆不抄掠丁亥全忠表請修宫闕及迎車駕己丑遣國子司業薛昌祚內使王廷續齎詔賜全忠癸巳茂貞復出兵擊汴軍城西寨敗還全忠以絳袍衣降者使招呼城中人鳯翔軍夜縋去及因樵采去不返者甚衆是後茂貞或遣兵出擊汴軍多不為用散還茂貞疑上與全忠有密約壬寅更於御院北垣外增兵防衛十二月癸卯朔保大節度使李茂勳帥其衆萬餘人救鳯翔屯於城北阪上與城中舉烽相應甲辰上使趙國夫人詗學士院二使皆不在亟召韓偓姚洎竊見之於土門外執手相泣洎請上速還恐為它人所見上遽去朱全忠遣其將孔勍李暉將兵乘虛襲鄜坊壬子拔坊州甲寅大雪汴軍冒之夕進五鼓抵鄜州城下鄜人不為備汴軍入城城中兵尚八千人格鬬至午鄜人始敗擒留後李繼璙勍撫存李茂勳及將士之家桉堵無擾命李暉權知軍府事茂勳聞之引兵遁去汴軍每夜鳴鼓角城中地如動攻城者詬城上人云劫天子賊乘城者詬城下人云奪天子賊是冬大雪城中食盡凍餒死者不可勝計或卧未死肉已為人所咼市中賣人肉斤直錢百犬肉直五百茂貞儲偫亦竭以犬彘供御膳上鬻御衣及小皇子衣於市以充用削漬松柿以飼御馬丙子户部侍郎同平章事韋貽範薨癸亥朱全忠遣人剃城外草以困城中甲子李茂貞增兵守宫門諸宦官自度不免互相尤怨蘇檢數為韓偓經營入相言於茂貞及中尉樞密且遣親吏告偓偓怒曰公與韋公自貶所召歸旬月致位宰相訖不能有所為今朝夕不濟乃欲以此相汚邪十二月李茂勳遣使請降於朱全忠更名周彛於是茂貞山南州鎮皆入王建關中州鎮皆入全忠坐守孤城乃密謀誅宦官以自贖遺全忠書曰禍亂之興皆由全誨僕迎駕至此以備它盜公既志匡社稷請公迎扈還宫僕以弊甲雕兵從公陳力全忠復書曰僕舉兵至此正以乘輿播遷公能協力固所願也丁酉上召李茂貞蘇檢李繼誨李彥弼李繼岌李繼逺李繼忠食議與朱全忠和上曰十六宅諸王以下凍餒死者日有數人在內諸王及公主妃嬪一日食粥一日食湯餅今亦竭矣卿等意如何皆不對上曰速當和解耳鳯翔兵十餘人遮韓全誨於左銀臺門喧罵曰闔境塗炭闔城餒死正為軍容輩數人耳全誨叩頭訴於茂貞茂貞曰卒輩何知命酌酒兩杯對飲而罷又訴於上上亦諭解之李繼昭謂全誨曰昔楊軍容破楊守亮一族今軍容亦破繼昭一族邪慢罵之遂出降於全忠復姓苻名道昭三年春正月甲辰遣殿中侍御史崔構供奉官郭遵誨詣朱全忠營丙午李茂貞亦遣牙將郭啓期往議和解􅊨戊申李茂貞獨見上中尉韓全誨張彥弘樞密使袁易簡周敬容皆不得對茂貞請誅全誨等與朱全忠和解奉車駕還京上喜即遣內養帥鳯翔卒四十人收全誨等斬之以御食使第五可範為左軍中尉宣徽南院使仇承坦為右軍中尉王知古為上院樞密侯楊虔朗為下院樞密使是夕又斬李繼筠李繼誨李彥弼及內諸司使韋處廷等十六人己酉遣韓偓及趙國夫人詣全忠營又遣使囊全誨等二十餘人首以示全忠曰嚮來脅留車駕懼罪離間不欲協和皆此曹也今朕與茂貞決意誅之卿可曉諭諸軍以豁衆憤辛亥全忠遣觀察判官李振奉表入謝全誨等已誅而全忠圍猶未解茂貞疑崔胤教全忠欲必取鳯翔白上急召胤令帥百官赴行在凡四降詔三賜朱書御札言甚切至悉復故官爵胤竟稱疾不至茂貞懼自致書於胤辭甚卑遜全忠亦以書召胤且戲之曰吾未識天子須公來辨其是非胤始來甲寅鳯翔始啓城門丙辰全忠巡諸寨至城北有鳯翔兵自北山下全忠疑其逼已遣兵擊之擒其將李繼欽上遣趙國夫人馮翊夫人詣全忠營詰其故全忠遣親吏蔣玄暉奉表入奏李茂貞請以其子侃尚平原公主又欲以蘇檢女為景王祕妃以自固平原何后之女也后意難之上曰且令我得出何憂爾女后乃從之壬戌平原公主嫁李侃納景王妃蘇氏時鳯翔所誅宦官已七十二人朱全忠又密令京兆搜捕致仕不從行者誅九十人甲子車駕出鳯翔幸全忠營全忠素服待罪命客省使宣釋罪去三仗止報平安以公服入謝全忠見上頓首流涕上命韓偓扶起之上亦泣曰宗廟社稷賴卿再安朕與宗族賴卿再生親解玉帶以賜之少休即行全忠單騎前導十許里上辭之全忠乃令朱友倫將兵扈從自留部分後隊焚撤諸寨友倫存之子也是夕車駕宿岐山丁卯至興平崔胤始帥百官迎謁復以胤為司空門下侍郎同平章事領三司如故己巳入長安庚午全忠崔胤同對胤奏國初承平之時宦官不典兵豫政天寶以來宦官浸盛貞元之末羽林衛為左右神䇿軍以便衛從始令宦官主之以二千人為定制自是參掌機密奪百司權上下彌縫共為不法大則構扇藩鎮傾危國家小則賣官鬻獄蠧害朝政王室衰亂職此之由不剪其根禍終不已請悉罷內諸司使其事務盡歸之省寺諸道監軍俱召還闕下上從之是日全忠以兵驅宦官第五可範已下數百人於內侍省盡殺之冤號之聲徹於內外其出使外方者詔所在收捕誅之止留黃衣幼弱者三十人以備灑掃又詔成德節度使王鎔選進五十人充敕使取其土風深厚人性謹朴也上愍可範等或無罪為文祭之自是宣傳詔命皆令宫人出入其兩軍內外八鎮兵悉屬六軍以崔胤兼判六軍十二衛事臣光曰宦者用權為國家患其來久矣蓋以出入宫禁人主自幼及長與之親狎非如三公六卿進見有時可嚴憚也其間復有性識儇利語言辨給善伺候顔色承迎志趣受命則無違忤之患使令則有稱愜之效自非上智之主燭知物情慮患深逺侍奉之外不任以事則近者日親逺者日踈甘言悲辭之請有時而從浸潤膚受之訴有時而聽於是黜陟刑賞之政潛移於近習而不自知如飲醇酒嗜其味而忘其醉也黜陟刑賞之柄移而國家不危亂者未之有也東漢之衰宦官最名驕橫然皆假人主之權依憑城社以濁亂天下未有能劫脅天子如制嬰兒廢置在手東西出其意使天子畏之若乘虎狼而挾蛇虺如唐世者也所以然者非它漢不握兵唐握兵故也太宗鑒前世之弊深抑宦官無得過四品明皇始隳舊章是崇是長晚節令高力士省決章奏乃至進退將相時與之議自太子王公皆畏事之宦官自此熾矣及中原板蕩肅宗收兵靈武李輔國以東宮舊隸參豫軍謀寵過而驕不復能制遂至愛子慈父皆不能庇以憂悸終代宗踐祚仍遵覆轍程元振魚朝恩相繼用事竊弄刑賞壅蔽聰明視天子如委裘陵宰相如奴虜是以來瑱入朝遇讒賜死吐蕃深侵郊甸匿不以聞致狼狽幸陜李光弼危疑憤鬱以隕其生郭子儀擯廢家居不保丘壟僕固懷恩冤抑無訴遂棄勳庸更為叛亂德宗初立頗振紀綱宦官稍絀而返自興元猜忌諸將以李晟渾瑊為不可信悉奪其兵而以竇文場霍仙鳴為中尉使典宿衛自是太阿之柄落其掌握矣憲宗末年吐突承璀欲廢嫡立庶以成陳洪志之變寶曆狎昵羣小劉克明與蘇佐明為逆其後綘王及文武宣懿僖昭六世皆為宦官所立勢益驕橫王守澄仇士良田令孜楊復恭劉季述韓全誨為之魁傑自稱定䇿國老目天子為門生根深蒂固疾成膏肓不可救藥矣文宗深憤其然志欲除之以宋申錫之賢猶不能有所為反受其殃況李訓鄭注反覆小人欲以一朝譎詐之謀剪纍世膠固之黨遂至涉血禁塗積尸省户公卿大臣連頸就誅闔門屠滅天子陽瘖縱酒飲泣吞氣自比赧獻不亦悲乎以宣宗之嚴毅明察猶閉目搖首自謂畏之況懿僖之驕侈苟聲色毬獵足充其欲則政事一以付之呼之以父固無怪矣賊汚宫闕兩幸梁益皆令孜所為也昭宗不勝其恥力欲清滌而所任不得其人所行不由其道始則張濬覆軍於平陽增李克用跋扈之勢復恭亡命於山南啓宋文通不臣之心終則兵交闕庭矢及御衣漂泊莎城流寓華隂幽辱東內劫遷岐陽崔昌遐無如之何更召朱全忠以討之連兵圍城再罹寒暑御膳不足於糗糒王侯斃踣於飢寒然後全誨就誅乘輿東出翦滅其黨靡有孑遺而唐之廟社因以丘墟矣然則宦者之禍始於明皇盛於肅代成於德宗極於昭宗易曰履霜堅氷至為國家者防微杜漸可不慎其始哉此其為患章章尤著者也自餘傷賢害能召亂致禍賣官鬻獄沮敗師徒蠧害蒸民不可遍舉夫寺人之官自三王之世載於詩禮所以謹閨闥之禁通內外之言安可無也如巷伯之疾惡寺人披之事君鄭衆之辭賞吕強之直諫曹日升之救患馬存亮之弭亂楊復光之討賊嚴遵美之避權張承業之竭忠其中豈無賢才乎顧人主不當與之謀議政事進退士大夫使有威福足以動人耳果或有罪小則刑之大則誅之無所寬赦如此雖使之専橫孰敢哉豈可不察臧否不擇是非欲草剃而禽獮之能無亂乎是以袁紹行之於前而董卓弱漢崔昌遐襲之於後而朱氏篡唐雖快一時之忿而國隨以亡是猶惡衣之垢而焚之患木之蠧而伐之其為害豈不益多哉孔子曰人而不仁疾之已甚亂也斯之謂矣三年春二月壬申朔詔比在鳯翔所除官一切停時宦官盡死惟河東監軍張承業幽州監軍張居翰清海監軍程匡柔西川監軍魚全禋及致仕嚴遵美為李克用劉仁恭楊行密王建所匿得全斬它囚以應詔甲戌門下侍郎同平章事陸扆責授沂王傅分司車駕還京師賜諸道詔書獨鳯翔無之扆曰茂貞罪雖大然朝廷未與之絶今獨無詔書示人不廣崔胤怒奏貶之宫人宋柔等十一人皆韓全誨所獻及僧道士與宦官親厚者二十餘人並送京兆杖殺上謂韓偓曰崔胤雖盡忠然比卿頗用機數對曰凡為天下者萬國皆屬之耳目安可以機數欺之莫若推誠直致雖日計之不足而歲計之有餘也丙子工部侍郎同平章事蘇檢吏部侍郎盧光啓並賜自盡丁丑以中書侍郎同平章事王溥為太子賓客分司皆崔胤所惡也戊寅賜朱全忠號回天再造竭忠守正功臣賜其僚佐敬翔等號迎鑾協贊功臣諸將朱友寧等號迎鑾果毅功臣都頭以下號四鎮靜難功臣上議褒崇全忠欲以皇子為諸道兵馬元帥以全忠副之崔胤請以輝王祚為之上曰濮王長胤承全忠密旨利祚沖幼固請之己卯以祚為諸道兵馬元帥庚辰加全忠守太尉充副元帥進爵梁王以胤為司徒兼侍中胤恃全忠之勢専權自恣天子動靜皆稟之朝臣從上幸鳯翔者凡貶遂三十餘人刑賞繫其愛憎中外畏之重足一迹以敬翔守太府卿朱友寧領寧逺節度使全忠表苻道昭同平章事充天雄節度使遣兵援送之泰州不得至而還初翰林學士承旨韓偓之登進士第也御史大夫趙崇知貢舉上返自鳯翔欲用偓為相偓薦崇及兵部侍郎王贊自代上欲從之崔胤惡其分已權使朱全忠入爭之全忠見上曰趙崇輕薄之魁王贊無才用韓偓何得妄薦為相上見全忠怒甚不得己癸未貶偓濮州司馬上密與偓泣别偓曰是人非復前來之比臣得逺貶及死乃幸耳不忍見篡弒之辱己丑上令朱全忠與李茂貞書取平原公主茂貞不敢違遽歸之壬辰以朱友裕為鎮國節度使乙未全忠奏留步騎萬人於故兩軍以朱友倫為左軍宿衛都指揮使又以汴將張廷範為宫苑使王殷為皇城使蔣玄暉充街使於是全忠之黨布列遍於禁衛及京輔戊戌全忠辭歸鎮留宴夀春殿又餞之於延喜樓上臨軒泣别令於樓前上馬上又賜全忠詩全忠亦和進又賜楊柳枝辭五首百官班辭於長樂驛崔胤獨送至霸橋自置餞席夜二鼓胤始還入城上復召對問以全忠安否置酒奏樂至四鼓乃罷李克用使者還晉陽言崔胤之橫克用曰胤為人臣外倚賊勢內脅其君既執朝政又握兵權權重則怨多勢侔則釁生破家亡國在眼中矣夏五月崔胤奏左右龍武羽林神䇿等軍名存實亡侍衛單寡請每軍募步兵四將每將二百五十人騎兵一將百人合六千六百人選其壯健者分畨侍衛從之令六軍諸衛副使京兆尹鄭元規立格召募於市冬十月辛巳宿衛都指揮使朱友倫與客擊毬於左軍墜馬而卒全忠悲怒疑崔胤故為之凡與同戲者十餘人盡殺之遣其兄子友諒代典宿衛初崔胤假朱全忠兵力以誅宦官全忠既破李茂貞併吞關中威震天下遂有篡奪之志胤懼與全忠外雖親厚私心漸異乃謂全忠曰長安密邇茂貞不可不為守禦之備六軍十二衛但有空名請召募以實之使公無西顧之憂全忠知其意曲從之隂使麾下壯士應募以察其變胤不之知與鄭元規等繕治兵仗日夜不息及朱友倫死全忠益疑胤且欲遷天子都洛恐胤立異天祐元年春正月全忠密表司徒兼侍中判六軍十二衛事充鹽鐵轉運使判度支崔胤専權亂國離間君臣并其黨刑部尚書兼京兆尹六軍諸衛副使鄭元規威逺軍使陳班等皆請誅之乙巳詔責授胤太子少傳分司貶元規循州司户班湊州司户丙午下詔罪狀胤等以裴樞判左三軍事充鹽鐵轉運使獨孤損判右三軍事兼判度支胤所募兵並縱遣之以兵部尚書崔逺為中書侍郎翰林學士左拾遺栁璨為右諌議大夫並同平章事璨公綽之從孫也戊申朱全忠密令宿衛都指揮使朱友諒以兵圍崔胤第殺胤及鄭元規陳班并胤所親厚者數人初上在華州朱全忠屢表請上遷都洛陽上雖不許全忠常令東都留守佑國節度使張全義繕修宫室全忠之克邠州也質靜難軍節度使楊崇本妻子於河中崇本妻美全忠私焉既而歸之崇本怒使謂李茂貞曰唐室將滅父何忍坐視之乎遂相與連兵侵逼京畿復姓名為李繼徽己酉全忠引兵屯河中丁巳上御延喜樓朱全忠遣牙將寇彥卿奉表稱邠歧兵逼畿甸請上遷都洛陽及下樓裴樞已得全忠移書促百官東行戊午驅徙士民號哭滿路罵曰賊臣崔胤召朱溫來傾覆社稷使我曹流離至此老幼繦屬月餘不絶壬戌車駕發長安全忠以其將張廷範為御營使毁長安宫室百司及民間廬舍取其材浮渭沿河而下長安自是遂丘墟矣全忠發河南北諸鎮丁匠數萬令張全義治東都宫室江浙湖嶺諸鎮附全忠者皆輸貨財以助之甲子車駕至華州民夾道呼萬歲上泣謂曰勿呼萬歲朕不復為汝主矣館於興德宫謂侍臣曰鄙語云紇干山頭凍殺雀何不飛去生處樂朕今漂泊不知竟落何所因泣下沾襟左右莫能仰視二月乙亥車駕至陝以東都宫室未成駐留於陕丙子全忠自河中來朝上延全忠入寢室見何后后泣曰自今大家夫婦委身全忠矣三月丁未以朱全忠兼判左右神䇿及六軍諸衛事癸丑全忠置酒私第邀上臨幸乙卯全忠辭上先赴洛陽督修宫室上與之宴羣臣既罷上獨留全忠及忠武節度使韓建飲皇后出自捧玉巵以飲全忠晉國夫人可證附上耳語建躡全忠足全忠以為圖已不飲陽醉而出全忠奏以長安為佑國軍以韓建為佑國節度使以鄭州刺史劉知俊為匡國節度使丁巳上復遣間使以絹詔告急於王建楊行密李克用等令糾帥藩鎮以圖匡復曰朕至洛陽則為所幽閉詔敕皆出其手朕意不得復通夏四月辛巳朱全忠奏洛陽宫室已成請車駕早發表章相繼上纍遣宫人諭以皇后新産未任就路請俟十月東行全忠疑上徘徊俟變怒甚謂牙帳寇彥卿曰汝速至陝即日促百官發來閏月丁酉車駕發陝壬寅全忠逆於新安上之在陝也司天監奏星氣有變期在今秋不利東行故上欲以十月幸洛至是全忠令醫官許昭逺告醫官使閻祐之司天監王墀內都知韋周晉國夫人可證等謀害元帥悉收殺之癸卯上憩於榖水自崔胤之死六軍散亡俱盡所餘擊毬供奉內園小兒共二百餘人從上而東全忠猶忌之為設食於幄盡縊殺之豫選二百餘人大小相類者衣其衣服代之侍衛上初不覺纍日乃寤自是上之左右職掌使令皆全忠之人矣甲辰車駕發榖水入宫御正殿受朝賀乙巳御光政門赦天下改元更命陕州曰興唐府詔討李茂貞楊崇本戊寅敕內諸司惟留宣徽等九使外餘皆停廢仍不以內夫人充使以蔣玄暉為宣徽南院使兼樞密使王殷為宣徽北院使兼皇城使張廷範為金吾將軍充街使以韋震為河南尹兼六軍諸衛副使又徴武寧留後朱友恭為左龍武統軍保大節度使氏叔琮為右龍武統軍典宿衛皆全忠之腹心也癸丑以張全義為天平節度使乙卯以全忠為護國宣武宣義忠武四鎮節度使五月帝宴朱全忠及百官於崇勳殿既罷復召全忠宴於內殿全忠疑不入帝曰全忠不欲來可令敬翔來全忠擲翔使去曰翔亦醉矣辛未全忠東還乙亥至大梁初朱全忠自鳯翔迎車駕還見德王𥙿眉目踈秀且年齒已壯惡之私謂崔胤曰德王嘗姦帝位豈可復留公何不言之胤言於帝帝問全忠全忠曰陛下父子之間臣安敢竊議此崔胤賣臣耳帝自離長安日憂不測與皇后終日沈飲或相對涕泣全忠使樞密使蔣玄暉伺察帝動靜皆知之帝從容謂玄暉曰德王朕之愛子全忠何故堅欲殺之因泣下齧中指血流玄暉具以語全忠全忠愈不自安時李茂貞揚崇本李克用劉仁恭王建楊行密趙匡凝移檄往來皆以興復為辭全忠方引兵西討以帝有英氣恐變生於中欲立幼君易謀禪代乃遣判官李振至洛陽與玄暉及左龍武統軍朱友恭右龍武統軍氏叔琮等圖之八月壬寅帝在椒殿玄暉選龍武牙官史太等百人夜叩宫門言軍前有急奏欲面見帝夫人裴貞一開門見兵曰急奏何以兵為史太殺之玄暉問至尊安在昭儀李漸榮臨軒呼曰寧殺我曹勿傷大家帝方醉遽起單衣繞柱走史太追而弒之漸榮以身蔽帝太亦殺之又欲殺何后后求哀於玄暉乃釋之癸卯蔣玄暉矯詔稱李漸榮裴貞一弒逆宜立輝王祚為皇太子更名祝監軍國事又矯皇后令太子於柩前即位宫中恐懼不敢出聲哭丙午昭宣帝即位時年十三冬十月朱全忠聞朱友恭等弒昭宗陽驚號哭自投於地曰奴輩負我令我受惡名於萬代癸巳至東都伏梓宫慟哭流涕又見帝自陳非己志請討賊先是護駕軍士有掠米於市者甲午全忠奏朱友恭氏叔琮不戢士卒侵擾市肆友恭貶崖州司户復姓名李彥威叔琮貶白州司户尋皆賜自盡彥威臨刑大呼曰賣我以塞天下之謗如鬼神何行事如此望有後乎丙申天平節度使張全義來朝丁酉復以全忠為宣武護國宣義天平節度使以全義為河南尹兼忠武節度使判六軍諸衛事乙巳全忠辭赴鎮庚戌至大梁昭宣帝天祐二年春二月戊戌全忠使蔣玄暉邀昭宗諸子德王𥙿棣王祤虔王禊沂王禋遂王禕景王祕祁王祺雅王禛瓊王祥置酒九曲池酒酣悉縊殺之投尸池中三月戊寅以門下侍郎同平章事獨孤損同平章事充靜海節度使以禮部侍郎河間張文蔚同平章事甲申以門下侍郎同平章事裴樞為左僕射崔逺為右僕射並罷政事初栁璨及第不四年為宰相性傾巧輕佻時天子左右皆朱全忠腹心璨曲意事之同列裴樞崔逺獨孤損皆朝廷宿望意輕之璨以為憾和王傅張廷範本優人有寵於全忠奏以為太常卿樞曰廷範勳臣幸有方鎮何藉樂卿恐非元帥之旨持之不下全忠聞之謂賔佐曰吾常以裴十四器識真純不入浮薄之黨觀此議論本態露矣璨因此并逺損譖於全忠故三人皆罷夏五月乙丑彗星長竟天栁璨恃朱全忠之勢恣為威福會有星變占者曰君臣俱災宜誅殺以應之璨因疏其素所不快者於全忠曰此曹皆聚徒橫議怨望腹非宜以之塞災異李振亦言於全忠曰朝廷所以不理良由衣冠浮薄之徒紊亂綱紀且王欲圖大事此曹皆朝廷之難制者也不若盡去之全忠以為然癸酉貶獨孤損為祿州刺史裴樞為登州刺史崔逺為萊州刺史乙亥貶吏部尚書陸扆為濮州司户工部尚書王溥為淄州司戶庚辰貶太子太保致仕趙崇為曹州司户兵部侍郎王贊為濰州司戶自餘或門胄高華或科第自進居三省臺閣以名檢自處聲迹稍著者皆指以為浮薄貶逐無虛日縉紳為之一空辛巳再貶裴樞為瀧州司戶獨孤損為瓊州司户崔逺為白州司户六月戊子朔敕裴樞獨孤損崔逺陸扆王溥趙崇王贊等並所在賜自盡時全忠聚樞等及朝士貶官者三十餘人於白馬驛一夕盡殺之投尸于河初李振屢舉進士見不中第故深疾搢紳之士言於金忠曰此輩常自謂清流宜投之黃河使為濁流全忠笑而從之振每自汴至洛朝臣必有竄逐者時人謂之鴟梟見朝士皆頥指氣使旁若無人全忠嘗與僚佐及遊客坐於大柳之下全忠獨言曰此木宜為車轂衆莫應有遊客數人起應曰宜為車轂全忠勃然厲聲曰書生輩好順口玩人皆此類也車轂須用夾榆柳木豈可為之顧左右曰尚何待左右數十人捽言宜為車轂者悉撲殺之冬十月丙戌朔以朱全忠為諸道兵馬元帥别開幕府是日全忠部署將士將歸大梁忽變計欲乘勝擊準南敬翔諌曰今出師未踰月平兩大鎮闢地數千里逺近聞之莫不震懾此威望可惜不若且歸息兵俟釁而動不聽辛卯朱全忠發襄州壬辰至棗陽遇大雨自申州抵光州道險狹塗潦人馬疲乏士卒尚未冬服多逃亡全忠使人謂光州刺史柴再用曰下我以汝為蔡州刺史不下且屠城再用嚴設守備戎服登城見全忠拜伏甚恭曰光州城小兵弱不足以辱王之威怒王茍先下夀州敢不從命全忠留其城東旬日而去戊申朱全忠發光州迷失道百餘里又遇雨比及夀州夀人堅壁清野以待之全忠欲圍之無林木可為柵乃退屯正陽十一月丙辰朱全忠度淮而北柴再用抄其後軍斬首三千級獲輜重萬計全忠悔之躁忿尤甚丁卯至大梁先是全忠急於傳禪密使蔣玄暉等謀之玄暉與柳璨等議以魏晉以來皆先封大國加九錫殊禮然後受禪當次第行之乃先除全忠諸道元帥以示有漸仍以刑部尚書裴迪為送告使全忠大怒宣徽副使王殷趙殷衡疾玄暉權寵欲得其處因譛之於全忠曰玄暉璨等欲延唐祚故逗留其事以須變玄暉聞之懼自至夀春具言其狀全忠曰汝曹巧述間事以沮我借使我不受九錫豈不能作天子邪玄暉曰唐祚已盡天命歸王愚智皆知之玄暉與柳璨等非敢有背德但以今兹晉燕岐蜀皆吾勍敵王遽受禪彼心未服不可不曲盡義理然後取之欲為王創萬代之業耳全忠叱曰奴果反矣玄暉惶遽辭歸與璨議行九錫時天子將郊祀百官既習儀裴迪自大梁還言全忠怒曰柳璨蔣玄暉等欲延唐祚乃郊天也璨等懼庚午敕改用來年正月上辛柳璨蔣玄暉等議加朱全忠九錫朝士多竊懷憤邑禮部尚書蘇循獨揚言曰梁王功業顯大曆數有歸朝廷速宜揖讓朝士無敢違者辛巳以全忠為相國揔百揆以宣武宣義天平護國天雄武順佑國河陽義武昭義保義戎昭武定泰寧平盧忠武匡國鎮國武寧忠義荆南等二十一道為魏國進封魏王仍加九錫全忠怒其稽緩讓不受十二月戊子命樞密使蔣玄暉齎手詔詣全忠諭指癸巳玄暉自大梁還言全忠怒不解甲午柳璨奏稱人望歸梁王陛下釋重負今其時也即日遣璨詣大梁達傳禪之意全忠拒之初璨陷害朝士過多全忠亦惡之璨與蔣玄暉張廷範朝夕宴聚深相結為全忠謀禪代事何太后泣遣宫人阿秋阿虔達意玄暉語以它日傳禪之後求子母生全王殷趙殷衡譖玄暉云與柳璨張廷範於積善宫夜宴對太后焚香為誓期興復唐祚全忠信之乙未收玄暉及豐德庫使應頊御厨使朱建武繫河南獄以王殷權知樞密趙殷衡權判宣徽院事全忠三表辭魏王九錫之命丁酉詔許之更以為天下兵馬元帥然全忠已修大梁府舍為宫闕矣是日斬蔣玄暉杖殺應頊朱建武庚子省樞密使及宣徽南院使獨置宣徽使一員以王殷為之趙殷衡為副使辛丑敕罷宫人宣傳詔命及參隨視朝追削蔣玄暉為凶逆百姓令河南揭尸於都門外聚衆焚之玄暉既死王殷與趙殷衡又誣玄暉私侍何太后令阿秋阿虔通導往來己酉全忠密令殷殷衡害太后于積善宫敕追廢太后為庶人阿秋阿虔皆於殿前撲殺庚戌以皇太后喪廢朝三日辛亥敕以宫禁內亂罷來年正月上辛謁郊廟禮癸丑守司空兼門下侍郎同平章事柳璨貶登州刺史太常卿張廷範貶萊州司戶甲寅斬璨於上東門外車裂廷範於都市璨臨刑呼曰負國賊柳璨死其宜矣後梁太祖開平元年初梁王以河北諸鎮皆服惟幽滄未下故大舉伐之欲以堅諸鎮之心既而潞州內叛王燒營而還威望大沮恐中外因此離心欲速受禪以鎮之丁亥王入館于魏有疾卧府中魏博節度使羅紹威恐王襲之入見王曰今四方稱兵為王患者皆以翼戴唐室為名王不如早滅唐以絶人望王雖不許而心德之乃亟歸壬寅至大梁甲辰唐昭宣帝遣御史大夫薛貽矩至大梁勞王貽矩請以臣禮見王揖之升階貽矩曰殿下功德在人三靈改卜皇帝方行舜禹之事臣安敢違乃北面拜舞於庭王側身避之貽矩還言於帝曰元帥有受禪之意矣帝乃下詔以二月禪位于梁又遣宰相以書諭王王辭二月唐大臣共奏請昭宣帝遜位壬子詔宰相帥百官詣元帥府勸進王遣使却之於是朝臣藩鎮乃至湖南嶺南上箋勸進者相繼三月庚寅唐昭宣帝詔薛貽矩再詣大梁諭禪位之意又詔禮部尚書蘇循齎百官箋詣大梁甲辰唐昭宣帝降御札禪位于梁以攝中書令張文蔚為册使禮部尚書蘇循副之攝侍中楊涉為押傳國寶使翰林學士張䇿副之御史大夫薛貽矩為押金寶使尚書左丞趙光逢副之帥百官僃法駕詣大梁楊涉子直史館凝式言於涉曰大人為唐宰相而國家至此不可謂之無過況手持天子璽綬與人雖保富貴奈千載何盍辭之涉大駭曰汝滅吾族神色為之不寧者數日夏四月梁王始御金祥殿受百官稱臣下書稱教令自稱曰寡人辛亥令諸箋表簿籍皆去唐年號但稱月日丙辰張文蔚等至大梁壬戌梁王更名晃王兄全昱聞王將即帝位謂王曰朱三爾可作天子乎甲子張文蔚楊涉乘輅自上源驛從册寶諸司各備儀衛鹵簿前導百官從其後至金祥殿前陳之王被衮冕即皇帝位張文蔚蘇循奉册升殿進讀楊涉張䇿薛貽矩趙光逢以次奉寶升殿讀已降帥百官舞蹈稱賀帝遂與文蔚等宴於玄德殿帝舉酒曰朕輔政未久此皆諸公推戴之力文蔚等皆慙懼俯伏不能對獨蘇循薛貽矩及刑部尚書張禕盛稱帝功德宜應天順人帝復與宗戚飲博於宫中酒酣朱全昱忽以投瓊擊盆中迸散睨帝曰朱三汝本碭山一民也從黃巢為盜天子用汝為四鎮節度使富貴極矣奈何一旦滅唐家三百年社稷自稱帝王行當滅族奚以博為帝不懌而罷乙丑命有司告天地宗廟社稷丁卯遣使宣諭州鎮戊辰大赦改元國號大梁奉唐昭宣帝為濟隂王皆如前代故事唐中外舊臣官爵並如故以汴州為開封府命曰東都以故東都為西都廢故西京以京兆府為大安府置佑國軍於大安府更名魏博曰天雄軍遷濟隂王于曹州栫之以棘使甲士守之二年春二月癸亥鴆殺濟隂王於曹州追諡曰唐哀皇帝郢王篡弒後梁太祖乾化二年帝長子郴王友𥙿早卒次假子博王友文帝特愛之常留守東都兼建昌宫使次郢王友圭其母亳州營倡也為左右控鶴都指揮使無寵次均王友貞為東都馬步都指揮使初元貞張皇后嚴整多智帝敬憚之后殂帝維意聲色諸子雖在外常徵其婦入侍帝往往亂之友文婦王氏色美帝尤寵之雖未以友文為太子帝意常屬之友圭心不平友圭常有過帝撻之友圭益不自安帝疾甚命王氏召友文於東都欲與之訣且付以後事友圭婦張氏亦朝夕侍帝側知之密告友圭曰大家以傳國寶付王氏懷往東都吾屬死無日矣夫婦相泣左右或説之曰事急計生何不改圖時不可失六月丁丑朔帝命敬翔出友圭為萊州刺史即令之官已宣旨未行敕時左遷者多追賜死友圭益恐戊寅友圭易服微行入左龍虎軍見統軍韓勍以情告之勍亦見功臣宿將多以小過被誅懼不自保遂相與合謀勍以牙兵五百人從友圭雜控鶴士入伏於禁中中夜斬關入至寢殿侍疾者皆散走帝驚起問反者為誰友圭曰非它人也帝曰我固疑此賊恨不早殺之汝悖逆如此天地豈容汝乎友圭曰老賊萬段友圭僕夫馮廷諤刺帝腹刃出於背友圭自以敗氊裹之瘞於寢殿祕不發喪遣供奉官丁昭溥馳詣東都命均王友貞殺友文己卯矯詔稱博王友文謀逆遣兵突入殿中賴郢王友圭忠孝將兵誅之保全朕躬然疾因震驚彌致危殆宜令友圭權主軍國之務韓勍為友圭謀多出府庫金帛賜諸軍及百官以取悅辛巳丁昭溥還聞友文已死乃發喪宣遺制友圭即皇帝位秋八月郢王友圭既篡立諸宿將多憤怒雖曲加恩禮終不悅告哀使至河中護國節度使冀王朱友謙泣曰先帝數十年開創基業前日變起宫掖聲聞甚惡吾備位藩鎮心竊恥之友圭加友謙侍中中書令以詔書自辨且徵之友謙謂使者曰所立者為誰先帝晏駕不以理吾且至洛陽問罪何以徵為戊戌以侍衛諸軍使韓勍為西面行營招討使督諸軍討之友謙以河中附於晉以求救九月丁未以感化節度使康懷貞為河西都招討使更以韓勍副之友圭以兵部尚書知崇政院事敬翔太祖腹心恐其不利於已欲解其內職恐失人望庚午以翔為中書侍郎同平章事壬申以户部尚書李振充崇政院使翔多稱疾不預事康懷貞等與忠武節度使牛存節合兵五萬屯河中城西攻之甚急晉王遣其將李存審李嗣肱李嗣恩將兵救之敗梁軍于胡壁嗣恩本駱氏子也朱友謙復告急于晉冬十月晉王自將自澤潞而西遇康懷貞於解縣大破之斬首千級追至白徑嶺而還梁兵解圍退保陝州均王乾化三年春正月癸亥郢王友圭朝享太廟甲子祀圓丘大赦改元鳯歷郢王友圭既得志遽為荒淫內外憤怒友圭雖啖以金繒終莫之附駙馬都尉趙巖犨之子太祖之壻也左龍虎統軍侍衛親軍都指揮使袁象先太祖之甥也巖奉使至大梁均王友貞密與之謀誅友圭巖曰此事成敗在招討楊令公耳得其一言諭禁軍吾事立辦均王乃遣腹心馬慎交之魏州説楊師厚曰郢王篡弒人望屬在大梁公若因而成之此不世之功也且許事成之日賜犒軍錢五十萬緍師厚與將佐謀之曰方郢王弒逆吾不能即討今君臣之分已定無故改圖可乎或曰郢王親弒君父賊也均王舉兵復讎義也奉義討賊何君臣之有彼若一朝破賊公將何以自處乎師厚驚曰吾幾誤計乃遣其將王舜賢至洛陽隂與袁象先謀遣招討馬步都虞候譙人朱漢賔將兵屯滑州為外應趙巖歸洛陽亦與象先密定計友圭治龍驤軍潰亂者搜捕其黨獲者族之經年不已時龍驤軍有戍大梁者友圭徵之均王因使人激怒其衆曰天子以懷州屯兵叛追汝輩欲盡坑之其衆皆懼莫知所為丙戌均王奏龍驤軍疑懼未肯前發戊子龍驤將校見均王泣請可生之路王曰先帝與汝輩三十餘年征戰經營王業今先帝尚為人所弒汝輩安所逃死乎因出太祖像示之而泣曰汝能自趣洛陽雪讎恥則轉禍為福矣衆皆踊躍呼萬歲請兵仗王給之庚寅旦袁象先等帥禁兵數千人突入宫中友圭聞變與妻張氏及馮廷諤趨北垣樓下將踰城自度不免令廷諤先殺妻次殺已廷諤亦自剄諸軍十餘萬大掠都市百司逃散中書侍郎同平章事杜曉侍講學士李珽皆為亂兵所殺門下侍郎同平章事于兢宣政使李振被傷至脯乃定象先巖齎傳國寶詣大梁迎均王王曰大梁國家創業之地何必洛陽乃即帝位於大梁復稱乾化三年追廢友圭為庶人復博王友文官爵三月帝遣使招撫朱友謙友謙復稱藩奉梁年號李氏據鳯翔岐蜀相攻附唐僖宗光啓三年春正月以扈蹕都頭李茂貞領武定節度使茂貞博野人本姓宋名文通以功賜姓名秋八月丙子以李茂貞同平章事充鳯翔節度使文德元年夏五月加鳯翔節度使李茂貞檢校侍中昭宗景福元年春正月鳯翔李茂貞等五節度請出軍討楊守亮鎮之亂並見藩光化二年秋九月以鳯翔節度使李茂貞為鳯翔彰義節度使天復元年春正月鳯翔彰義節度使李茂貞來朝加茂貞守尚書令兼侍中進爵岐王冬十一月韓全誨等劫車駕幸鳯翔朱全忠西迎車駕李茂貞出兵拒之溫篡唐事見朱二年秋九月癸亥以茂貞為鳯翔靜難武定昭武四鎮節度使三年春正月李茂貞請誅韓全誨等與朱全忠和解迎車駕還京溫篡唐事見朱夏五月李茂貞畏朱全忠自以官為尚書令在全忠上纍表乞解去詔復以茂貞為中書令天祐元年夏六月朱全忠之遷車駕於洛陽也李茂貞王建李繼徽傳檄合兵以討朱全忠全忠以鎮國節度使朱友裕為行營都統將步騎數萬擊之命保大節度使劉鄩棄鄜州引兵屯同州癸丑全忠引兵自大梁西討茂貞等秋七月甲子過東都入見壬申至河中西川諸將勸王建乘李茂貞之衰攻取鳯翔建以問節度判官馮涓涓曰兵者凶器殘民耗財不可窮也今梁晉虎爭勢不兩立若併而為一舉兵向蜀雖諸葛亮復生不能敵矣鳯翔蜀之藩蔽不若與之和親結為婚姻無事則務農訓兵保固疆場有事則覘其機事觀釁而動可以萬全建曰善茂貞雖庸才然有強悍之名逺近畏之與全忠力爭則不足自守則有餘使為吾藩蔽所利多矣乃與茂貞修好丙子茂貞遣判官趙鍠如西川為其姪天雄節度使繼崇求昏建以女妻之茂貞數求貨及甲兵於建建皆與之昭宣帝天祐三年秋八月乙酉李茂貞遣其子侃為質於西川王建以侃知彭州後梁太祖開平元年春三月唐昭宣帝禪位于梁是時惟河東鳯翔淮南稱天祐西川稱天復年號餘皆稟梁正朔稱臣奉貢蜀王與弘農王移檄諸道云欲與晉王岐王會兵興復唐室卒無應者蜀王乃謀稱帝下教諭統內吏民又遺晉王書云請各帝一方俟朱溫既平乃詔唐宗室立之退歸藩服晉王不許曰誓於此生靡敢失節岐王治軍甚寬待士卒簡易有告部將苻昭反者岐王直詣其家悉去左右熟寢經宿而還由是衆心悅服然御軍無紀律及聞唐亡以兵羸地蹙不敢稱帝但開岐王府置百官名其所居為宫殿妻稱皇后將吏上書稱箋表鞭扇號令多擬帝者二年夏五月蜀主遣將將兵會岐兵五萬攻雍州晉張承業亦將兵應之六月壬寅以劉知俊為西路行營都招討使以拒之丙辰劉知俊及佑國節度使王重師大破岐兵于幕谷晉蜀兵皆引歸秋九月戊子岐王所署延州節度使胡敬璋寇上平關劉知俊擊破之冬十一月保塞節度使胡敬璋卒靜難節度使李繼徽以其將劉萬子代鎮延州三年春二月保塞節度使劉萬子暴虐失衆心且謀二於梁李繼徽使延州牙將李延實圖之延實因萬子葬胡敬璋攻而殺之遂據延州馬軍都指揮使河西髙萬興與弟萬金聞變以其衆數千人詣劉知俊降岐王置翟州於鄜城其守將亦降夏四月丙申朔劉知俊移軍攻延州李延實嬰城自守知俊遣白水鎮使劉儒分兵圍坊州劉知俊克延州李延實降岐王所署保大節度使李彥博坊州刺史李彥昱皆棄城奔鳯翔鄜州都將嚴弘倚舉城降己未以高萬興為保塞節度使以絳州刺史牛存節為保大節度使五月丁卯帝命劉知俊乘勝取邠州知俊難之辭以闕食乃召還帝將伐河東急徵知俊入朝欲以為河東西面行營都統且以知俊有丹延之功厚賜之知俊弟右保勝指揮使知浣從帝在洛陽密使人語知俊云入必死又白帝請帥弟姪往迎知俊帝許之六月乙未朔知俊奏稱為軍民所留遂以同州附於岐執監軍及將佐之不從者皆械送於岐遣兵入華州逐刺史蔡敬思以兵守潼關帝遣近臣諭劉知俊知俊不報詔削知俊官爵以山南東道節度使楊師厚為西路行營招討使帥侍衛馬步軍都指揮使劉鄩等討之鄩至潼關遂克之帝遣劉知俊姪嗣業持詔詣同州招諭知俊知俊欲輕騎詣行在謝罪弟知偃止之楊師厚等至華州知俊將聶賞開門降知俊聞潼關不守官軍繼至蒼皇失圖乙卯夜舉族奔岐楊師厚至長安岐兵已據城師厚以竒兵並南山急趨自西門入遂克之庚申以劉鄩權佑國留後岐王厚禮劉知俊以為中書令地狹無藩鎮處之但厚給俸祿而已岐王欲取靈州以處劉知俊且以為牧馬之地使知俊自將兵攻之朔方節度使韓遜遣使告急詔鎮國節度使康懷貞感化節度使寇彥卿將兵攻邠寧以救之懷貞等所向皆捷克寧衍二州拔慶州南城刺史李彥廣出降遊兵侵掠及涇州之境劉知俊聞之十二月己丑解靈州圍引兵還帝急召懷貞等還遣兵迎援於三原青谷懷貞等還至三水知俊遣兵據險邀之左龍驤軍使夀張王彥璋力戰懷貞等乃得過懷貞與禆將李德遇許從實王審權分道而行皆與援兵不相值至升平劉知俊伏兵山口懷貞大敗僅以身免德遇等軍皆沒岐王以知俊為彰義節度使鎮涇州四年岐王屢求貨於蜀蜀主皆與之又求巴劔二州蜀主曰吾奉茂貞勤亦至矣若與之地是棄民也寧多與之貨乃復以絲茶布帛七萬遺之乾化元年春正月蜀主之女普慈公主嫁岐王從子秦州節度使繼崇公主遣宦者宋光嗣以絹書遺蜀主言繼崇驕矜嗜酒求歸成都蜀主召公主歸寧辛亥公主至成都蜀主留之以宋光嗣為閣門南院使岐王怒始與蜀絶光嗣福州人也三月岐王聚兵臨蜀東鄙蜀主謂羣臣曰自茂貞為朱溫所困吾常振其乏絶今乃負恩為寇誰為吾擊之兼中書令王宗侃請行蜀主以宗侃為北路行營都統司天少監趙溫圭諌曰茂貞未犯邊諸將貪功深入糧道阻逺恐非國家之利蜀主不聽以兼侍中王宗祐太子少師王宗賀山南節度使唐道襲為三招討使左金吾大將軍王宗紹為宗祐之副帥步騎十二萬伐岐壬辰宗侃等發成都旌旗數百里夏四月乙卯朔岐兵寇蜀興元道襲擊却之蜀主如利州蜀諸將擊岐兵屢破之秋七月蜀主西還留御營使昌王宗鐬屯利州岐玉使彰義節度使劉知俊秦州節度使李繼崇將兵擊蜀乙亥王宗侃王宗賀唐道襲王宗紹與之戰於青泥嶺蜀兵大敗馬步使王宗浩奔興州溺死於江道襲奔興元先是步軍都揮使王宗綰城西縣號安逺軍宗侃宗賀等收散兵走保之知俊繼崇追圍之衆議欲棄興元道襲曰無興元則無安逺利州遂為敵境矣吾必以死守之蜀主以昌王宗鐬為應援招討使定戎團練使王宗播為四招討馬步都指揮使將兵救安逺軍壁於亷讓之間與唐道襲合擊岐兵大破之於明珠曲明日又戰於鳬口斬其成州刺史李彥琛冬十月蜀主如利州命太子監國決雲軍虞候王琮敗岐兵執其將李彥太俘斬三千五百級乙卯捉生將彭君集破岐二寨俘斬三千級王宗侃遣禆將林思諤自中巴間行至泥溪見蜀主告急蜀主命開道都指揮使王宗弼將兵救安逺及劉知俊戰于斜谷破之十一月蜀王宗弼敗岐兵於金牛拔十六寨俘斬六千餘級擒其將郭存等丙申王宗鐬王宗播敗岐兵於黃牛川擒其將蘇厚等丁酉蜀主自利州如興元援軍既集安逺軍望其旗王宗侃等鼓譟而出與援軍交攻岐兵大破之拔二十一寨斬其將李廷志等己亥岐兵解圍遁去唐道襲先伏兵於斜谷邀擊又破之庚子蜀主西還二年冬十二月戊寅蜀行營都指揮使王宗汾攻岐文州拔之守將李繼夔走均王貞明元年夏五月岐王遣彰義節度使劉知俊圍邠州霍彥威固守拒之秋八月乙未蜀主以兼中書令王宗綰為北路行營都制置使兼中書令王宗播為招討使攻秦州兼中書令王宗瑶為東北面招討使同平章事王宗翰為副使攻鳯州冬十一月己巳蜀王宗翰引兵出青泥嶺克固鎮與秦州將郭守謙戰於泥陽川蜀兵敗退保鹿臺山辛未王宗綰等敗秦州兵於金沙谷擒其將李彥巢等乘勝趣秦州興州刺史王宗鐸克階州降其刺史李彥安甲戌王宗綰克成州擒其刺史李彥德蜀軍至上染坊秦州節度使李繼崇遣其子彥秀奉牌印迎降宗絳入秦州表排陳使王宗儔為留後劉知俊攻霍彥威於邠州半歲不克聞秦州降蜀知俊妻子皆遷成都知俊解圍還鳯翔終懼及禍夜帥親兵七十人斬關而出庚辰奔于蜀軍王宗綰自河池兩當進兵會王宗瑶攻鳯州癸未克之蜀置武興軍於鳯州割文興二州隸之以前利州團練使王宗魯為節度使知岐王衰弱十二月舉耀鼎二州降二年秋八月丙午蜀主以王宗綰為東北面都招討集王宗翰嘉王宗夀為第一第二招討將兵十萬出鳯州以王宗播為西北面都招討武信節度使劉知俊天雄節度使王宗儔匡國軍使唐文裔為第一第二第三招討將兵十二萬出秦州以伐岐冬十月甲申蜀王宗綰等出大散關大破岐兵俘斬萬計遂取寶雞己丑王宗播等出故關至隴州丙寅保勝節度使兼侍中李繼岌畏岐王猜忌帥其衆二萬棄隴州奔于蜀軍蜀兵進攻隴州以繼岌為西北面行營第四招討劉知俊會王宗紹等圍鳯翔岐兵不出會大雪蜀主召軍還復李繼岌姓名曰桑弘志三年秋七月蜀主以桑弘志為西北面第一招討王宗宏為東北面第二招討以兼中書令王宗侃為東北面都招討武信節度使劉知俊為西北面都招討四年夏四月岐王復遣使求好于蜀五年春三月丙戌蜀北路行營都招討武德節度使王宗播等自散關擊岐度渭水破岐將孟鐵山會大雨而還分兵戍興元鳯州及威武城戊子天雄節度使同平章事王宗昱攻隴州不克六年冬十一月戊子朔蜀主以兼侍中王宗儔為山南節度使西北面都招討行營安撫使天雄節度使同平章事王宗昱永寧軍使王宗晏左神勇軍使王宗信為三招討以副之將兵伐岐出故關壁於咸宜入良原丁酉王宗儔攻隴州岐王自將萬五千人屯汧陽癸卯蜀將陳彥威出散關敗岐兵于箭筶嶺蜀兵食盡引還宗昱屯秦州宗儔屯上邽宗晏宗信屯威武城後唐莊宗同光元年冬十一月壬寅岐王遣使致書賀帝滅梁以季父自居辭禮甚倨二年春正月岐王聞帝入洛內不自安遣其子行軍司馬彰義節度使兼侍中繼曮入貢始上表稱臣帝以其前朝耆舊與太祖比肩特加優禮每賜詔但稱岐王而不名庚戌加繼曮兼中書令遣還李繼曮見唐甲兵之盛歸語岐王岐王益懼癸丑表請正藩臣之禮優詔不許二月辛巳進岐王爵為秦王仍不名不拜夏四月秦忠敬王李茂貞卒遺奏以其子繼曮權知鳯翔軍府事五月以李繼曮為鳯翔節度使明宗天成元年春二月戊戌李繼曮至鳯翔監軍使柴重厚不以符印與之促令詣闕夏六月李繼曮至華州聞洛中亂復歸鳯翔為之誅柴重厚秋九月壬午賜李繼曮名從曮長興元年春二月乙卯上祀圓丘大赦改元鳯翔節度使兼中書令李從曮入朝陪祀三月壬申制徙從曮為宣武節度使潞王清泰元年夏五月帝之起鳯翔也悉取天平節度使李從曮家財甲兵以供軍將行鳯翔之民遮道請復以從曮鎮鳯翔帝許之至是徙從曮為鳯翔節度使後晉天福三年鳯翔節度使李從曮厚文士而薄武人愛農民而嚴士卒由是將士怨之會發兵戍西邊既出郊作亂突門入城剽掠於市從曮發帳下兵擊之亂兵敗東走欲自訴於朝廷至華州鎮
